  - source_sentence: 'query: Trang thông tin điện tử nào không cần phải đăng ký cấp phép?'
    sentences:
    - 'passage: 4. Trang thông tin điện tử tổng hợp khi trích dẫn lại thông tin phải tuân theo quy định về nguồn tin được
      quy định tại khoản 18 Điều 3, khoản 2 Điều 20 Nghị định số 72/2013/NĐ-CP; không đăng tải ý kiến nhận xét, bình luận
      của độc giả về nội dung tin, bài được trích dẫn (trừ trang thông tin điện tử tổng hợp của cơ quan báo chí).

      5. Sau 90 (chín mươi) ngày, kể từ ngày giấy phép có hiệu lực, nếu tổ chức, doanh nghiệp được cấp phép không thiết lập
      trang thông tin điện tử tổng hợp, mạng xã hội thì giấy phép không còn giá trị.

      6. Trang thông tin điện tử tổng hợp, mạng xã hội đã được cấp phép khi có sự thay đổi chủ sở hữu trang thông tin điện
      tử tổng hợp, mạng xã hội thì phải thực hiện các thủ tục như cấp mới theo quy định tại Thông tư này trong thời hạn 30
      ngày kể từ ngày chuyển giao. Hồ sơ cấp phép, ngoài các văn bản quy định tại Điều 6 Thông tư này phải kèm theo bản gốc
      giấy phép đã được cấp.

      7. Thông tin cá nhân bao gồm: Họ và tên; Ngày, tháng, năm sinh; Số chứng minh nhân dân hoặc số hộ chiếu, ngày cấp, nơi
      cấp; Số điện thoại, địa chỉ email. Trường hợp người sử dụng internet dưới 14 tuổi và chưa có hộ chiếu, người giám hộ
      hợp pháp quyết định việc đăng ký thông tin cá nhân của mình để thể hiện sự cho phép và chịu trách nhiệm trước pháp luật
      về việc đăng ký đó.'
    - 'passage: "Điều 2. Quy định chung

      1. Các trang thông tin điện tử không phải cấp phép:

      a) Trang thông tin điện tử nội bộ quy định tại khoản 3 Điều 20 Nghị định số 72/2013/NĐ-CP ngày 15 tháng 7 năm 2013 của
      Chính phủ về quản lý, cung cấp, sử dụng dịch vụ Internet và thông tin trên mạng (sau đây viết tắt là Nghị định số 72/2013/NĐ-CP).

      b) Trang thông tin điện tử cá nhân quy định tại khoản 4 Điều 20 Nghị định số 72/2013/NĐ-CP.

      Cá nhân có quyền chia sẻ những thông tin không vi phạm các quy định tại Điều 5 Nghị định số 72/2013/NĐ-CP trên trang
      thông tin điện tử cá nhân và chịu trách nhiệm trước pháp luật về nội dung các thông tin được đăng tải, chia sẻ; không
      đại diện cho tổ chức hoặc cá nhân khác và không cung cấp thông tin tổng hợp.

      c) Trang thông tin điện tử của cơ quan nhà nước cung cấp thông tin được quy định tại Điều 10 Nghị định số 43/2011/NĐ-CP
      ngày 13 tháng 6 năm 2011 của Chính phủ quy định về việc cung cấp thông tin và dịch vụ công trực tuyến trên trang thông
      tin điện tử hoặc cổng thông tin điện tử của cơ quan nhà nước.

      d) Trang thông tin điện tử ứng dụng chuyên ngành quy định tại khoản 5 Điều 20 Nghị định số 72/2013/NĐ-CP không phải
      cấp phép theo quy định tại Thông tư này nhưng phải tuân thủ theo quy định của pháp luật chuyên ngành và các quy định
      có liên quan.

      đ) Diễn đàn nội bộ dành cho hoạt động trao đổi, hỏi đáp thông tin nội bộ liên quan trực tiếp đến chức năng, nhiệm vụ,
      quyền hạn, tổ chức bộ máy, dịch vụ, sản phẩm, ngành nghề phục vụ cho hoạt động của chính cơ quan, tổ chức, doanh nghiệp
      đó.

      ..."'
    - 'passage: Trình tự cho phép thành lập

      1. Việc cho phép thành lập cơ sở đào tạo, bồi dưỡng ngắn hạn có vốn đầu tư nước ngoài thực hiện theo trình tự sau đây:

      a) Cấp giấy chứng nhận đăng ký đầu tư;

      b) Cấp quyết định cho phép hoạt động giáo dục và thông báo trên trang thông tin điện tử của cơ quan cấp phép.

      2. Việc cho phép cơ quan đại diện ngoại giao nước ngoài, tổ chức quốc tế liên chính phủ được phép hoạt động tại Việt
      Nam thành lập cơ sở giáo dục mầm non, cơ sở giáo dục phổ thông thực hiện theo trình tự sau đây:

      a) Cấp quyết định cho phép thành lập;

      b) Cấp quyết định cho phép hoạt động giáo dục và thông báo trên trang thông tin điện tử của cơ quan cấp phép.

      3. Việc cho phép thành lập cơ sở giáo dục mầm non, cơ sở giáo dục phổ thông, cơ sở giáo dục đại học có vốn đầu tư nước
      ngoài thực hiện theo trình tự sau đây:

      a) Cấp giấy chứng nhận đăng ký đầu tư;

      b) Cấp quyết định cho phép thành lập;

      c) Cấp quyết định cho phép hoạt động giáo dục và thông báo trên trang thông tin điện tử của cơ quan cấp phép.

      4. Việc cho phép mở phân hiệu của cơ sở giáo dục đại học có vốn đầu tư nước ngoài thực hiện theo trình tự sau đây:

      a) Cấp giấy chứng nhận đăng ký đầu tư;

      b) Cấp quyết định cho phép thành lập phân hiệu của cơ sở giáo dục đại học;

      c) Cấp quyết định cho phép hoạt động và thông báo trên trang thông tin điện tử của cơ quan cấp phép.'
    - 'passage: Hồ sơ xin cấp phép thiết lập trang, cổng thông tin điện tử

      1. Tờ trình đề nghị cấp phép thiết lập trang, cổng thông tin điện tử.

      2. Đề án xây dựng trang, cổng thông tin điện tử kèm theo sơ đồ cấu trúc, giới thiệu trang, cổng thông tin điện tử.

      3. Sơ yếu lý lịch người chịu trách nhiệm trang, cổng thông tin điện tử.

      4. Bản cam kết sử dụng dịch vụ Internet.

      5. Tờ khai đăng ký thiết lập trang, cổng thông tin điện tử.

      6. Bản sao có chứng thực Hợp đồng cung cấp dịch vụ cho thuê máy chủ Internet để đặt trang, cổng thông tin điện tử.

      7. Bản sao có chứng thực Giấy chứng nhận đăng ký tên miền.'
  - source_sentence: 'query: Nghị quyết của Ban Chấp hành Hội được thông qua khi nào?'
    sentences:
    - 'passage: Ban Chấp hành Hội

      ...

      3. Nguyên tắc hoạt động của Ban Chấp hành:

      a) Ban Chấp hành hoạt động theo Quy chế của Ban Chấp hành, tuân thủ quy định của pháp luật và Điều lệ Hội;

      b) Ban Chấp hành mỗi năm họp tối thiểu 01 (một) lần, có thể họp bất thường khi có yêu cầu của Ban Thường vụ hoặc trên
      2/3 (hai phần ba) tổng số ủy viên Ban Chấp hành;

      c) Các cuộc họp của Ban Chấp hành là hợp lệ khi có trên 1/2 (một phần hai) ủy viên Ban Chấp hành tham gia dự họp. Ban
      Chấp hành có thể biểu quyết bằng hình thức giơ tay hoặc bỏ phiếu kín. Việc quy định hình thức biểu quyết do Ban Chấp
      hành quyết định;

      d) Các nghị quyết, quyết định của Ban Chấp hành được thông qua khi có trên 1/2 (một phần hai) tổng số ủy viên Ban Chấp
      hành dự họp biểu quyết tán thành. Trong trường hợp số ý kiến tán thành và không tán thành ngang nhau thì quyết định
      thuộc về bên có ý kiến của Chủ tịch Hội (hoặc được Chủ tịch Hội ủy quyền chủ trì cuộc họp);

      đ) Ủy viên Ban Chấp hành vắng mặt 02 (hai) lần liên tiếp trong các cuộc họp Ban Chấp hành (với bất kỳ lý do gì) sẽ bị
      xem xét miễn nhiệm khỏi Ban Chấp hành. Tại cuộc họp Ban Chấp hành kế tiếp sẽ tiến hành bỏ phiếu kín để đưa ra quyết
      định cuối cùng. Việc miễn nhiệm chỉ được thông qua khi có trên 2/3 (hai phần ba) số phiếu hợp lệ tán thành;

      e) Ủy viên Ban Chấp hành vắng mặt trên 1/2 (một phần hai) tổng số các cuộc họp Ban Chấp hành trong một nhiệm kỳ (kể
      cả trường hợp có lý do) thì sẽ không đủ tư cách đại biểu chính thức tham dự Đại hội của nhiệm kỳ kế tiếp.'
    - 'passage: Đại hội đại biểu toàn quốc Hội Luật gia Việt Nam

      ...

      2. Đại hội đại biểu toàn quốc có những nhiệm vụ sau đây:

      a) Thảo luận báo cáo của Ban Chấp hành Trung ương Hội về kết quả thực hiện nghị quyết nhiệm kỳ vừa qua; quyết định phương
      hướng hoạt động của Hội nhiệm kỳ tới;

      b) Quyết định việc bổ sung, sửa đổi và thông qua Điều lệ Hội;

      c) Thảo luận, góp ý kiến vào Báo cáo kiểm điểm của Ban Chấp hành Trung ương Hội;

      d) Quyết định số lượng Ủy viên Ban Chấp hành, Ban Kiểm tra;

      đ) Bầu Ban Chấp hành, Ban Kiểm tra Trung ương Hội;

      e) Thông qua nghị quyết Đại hội;

      g) Thực hiện các nhiệm vụ khác do Đại hội quyết định.

      ...'
    - 'passage: Đại hội toàn thể hội viên hoặc Đại hội đại biểu toàn quốc của Hội là cơ quan lãnh đạo cao nhất của Hội. Đại
      hội toàn thể hoặc Đại hội đại biểu toàn quốc họp 5 năm một lần, có nhiệm vụ thảo luận chương trình công tác nhiệm kỳ
      của Ban Chấp hành Trung ương Hội, thông qua Điều lệ và sửa đổi Điều lệ thông qua các chủ tr­ương công tác của Hội và
      bầu Ban Chấp hành Trung ­ương Hội.

      1. Ban Chấp hành Trung ương Hội là cơ quan lãnh đạo mọi hoạt động của Hội giữa hai kỳ Đại hội.

      1.1. Ban Chấp hành Trung ương Hội bao gồm: Chủ tịch, các Phó Chủ tịch, và các Ủy viên Ban Chấp hành.

      1.2. Ban Chấp hành Trung ương Hội quyết định các chủ tr­ương, biện pháp thi hành những Nghị quyết của Đại hội đề ra;
      chỉ đạo hội viên tham gia hoạt động Hội và tham gia các hoạt động của Liên hiệp các tổ chức hữu nghị Việt Nam. Ban Chấp
      hành Trung ương Hội họp mỗi năm một lần.

      2. Ban Thường vụ do Ban Chấp hành Trung ương Hội cử, bao gồm Chủ tịch, các Phó Chủ tịch, các Ủy viên Ban Thường vụ,
      và Tổng thư ký. Ban Thường vụ họp 6 tháng 1 lần và có trách nhiệm:

      2.1. Chỉ đạo Tổng Thư ký chuẩn bị nội dung các kỳ họp Ban Chấp hành và tổ chức thực hiện các Nghị quyết của Đại hội,
      các Nghị quyết của Ban Chấp hành, cùng với Chủ tịch Hội điều hành các kỳ họp của Ban Chấp hành.

      2.2. Hướng dẫn các hội viên thực hiện các Nghị quyết của Trung ­ương Hội.

      2.3. Giải quyết các khiếu nại, tố cáo, bảo vệ quyền lợi chính đáng của hội viên khi bị xâm phạm, giải quyết những vấn
      đề khó khăn của hội viên hay cơ sở Hội trong việc thực hiện Điều lệ của Hội.

      2.4. Quyết định thành lập các Ban chuyên môn về kinh tế, văn hóa, khoa học kỹ thuật, tổ chức, thông tin và các lĩnh
      vực chuyên môn cần thiết khác và chỉ đạo hoạt động của các Ban chuyên môn.'
    - 'passage: Ban Chấp hành Trung ương Hội

      ...

      2. Ban Chấp hành Trung ương Hội hoạt động theo Quy chế được Đại hội thông qua và Điều lệ Hội. Ban Chấp hành họp thường
      kỳ mỗi năm một lần, khi cần thiết có thể họp bất thường. Hội nghị Ban Chấp hành chỉ được tiến hành khi có ít nhất trên
      1/2 (một phần hai) tổng số ủy viên Ban Chấp hành có mặt tại Hội nghị. Các quyết định, nghị quyết của Ban Chấp hành được
      thông qua và có hiệu lực khi có trên 1/2 (một phần hai) số ủy viên dự họp tán thành. Trường hợp ngang nhau thì bên có
      ý kiến của Chủ tịch Hội sẽ được chấp thuận.

      ...'
  - source_sentence: 'query: Giá trị sản xuất của trang trại trồng trọt được quy định như thế nào?'
    sentences:
    - 'passage: Phân loại trang trại

      1. Trang trại chuyên ngành được xác định theo lĩnh vực sản xuất như trồng trọt, chăn nuôi, lâm nghiệp, nuôi trồng thủy
      sản, diêm nghiệp và tỷ trọng giá trị sản xuất của lĩnh vực chiếm trên 50% cơ cấu giá trị sản xuất của trang trại trong
      năm. Trang trại chuyên ngành được phân loại như sau:

      a) Trang trại trồng trọt;

      b) Trang trại chăn nuôi;

      c) Trang trại lâm nghiệp;

      d) Trang trại nuôi trồng thủy sản;

      đ) Trang trại sản xuất muối.

      2. Trang trại tổng hợp là trang trại trong đó không có lĩnh vực sản xuất nào có tỷ trọng giá trị sản xuất chiếm trên
      50% cơ cấu giá trị sản xuất của trang trại trong năm.'
    - 'passage: Chính sách ưu đãi, hỗ trợ đối với một số hoạt động đặc thù của kinh tế trang trại.

      1. Chính sách ưu đãi, hỗ trợ hoạt động du lịch

      Trang trại nông nghiệp có kết hợp hoạt động du lịch được hưởng các chính sách hỗ trợ, ưu đãi theo quy định của Luật
      Du lịch và văn bản hướng dẫn thực hiện. Ngoài ra còn được hỗ trợ: Kết nối hạ tầng giao thông từ hệ thống giao thông
      liên xã, liên huyện, liên tỉnh; cung cấp hệ thống nước sạch, viễn thông, bảo vệ môi trường, xử lý nước thải, rác thải;
      tư vấn phát triển du lịch; xây dựng đường giao thông nội bộ, bãi đỗ xe, biển chỉ dẫn giao thông, công trình vệ sinh,
      khu trưng bày, cơ sở lưu trú và các công trình phục vụ du lịch khác (nhà hàng, nhà trưng bày, mô hình sản xuất phục
      vụ khách du lịch tham quan, trải nghiệm); mua sắm trang thiết bị, phương tiện vận chuyển khách; thiết kế cảnh quan,
      xây dựng cảnh quan du lịch, trồng hoa, cây cảnh; bồi dưỡng, đào tạo nghề cho lao động du lịch; hỗ trợ các hoạt động
      xúc tiến quảng bá du lịch (xây dựng website du lịch; truyền thông, xây dựng thương hiệu, chi phí xây dựng ấn phẩm quảng
      bá, xúc tiến; tham dự hội chợ xúc tiến du lịch trong và ngoài nước). Mức hỗ trợ tối đa cho một trang trại không quá
      1.000 triệu đồng/trang trại.

      2. Hỗ trợ xây dựng mô hình trang trại nông nghiệp chuyên ngành, ứng dụng công nghệ cao, chuyển đổi số, thích ứng thông
      minh với biến đổi khí hậu, nông nghiệp hữu cơ, kinh tế tuần hoàn.

      a) Trang trại trồng trọt được hưởng các chính sách hỗ trợ, ưu đãi khác theo quy định của Điều 4 Luật Trồng trọt và Điều
      4 Luật Thủy lợi. Ngoài ra trang trại sản xuất lúa được hỗ trợ theo quy định của khoản 4 Điều 1 Nghị định số 62/2019/NĐ-CP
      ngày 11 tháng 7 năm 2019 Của Chính phủ Sửa đổi, bổ sung một số điều Nghị định số 35/2015/NĐ-CP ngày 13 tháng 4 năm 2015
      của Chính phủ về Quản lý, sử dụng đất trồng lúa;

      b) Trang trại chăn nuôi được hưởng các chính sách đầu tư, hỗ trợ, khuyến khích theo quy định của Điều 4 Luật Chăn nuôi;
      Nghị định của Chính phủ quy định về cơ chế, chính sách hỗ trợ phát triển chăn nuôi bền vững (đang xây dựng dự kiến trình
      Chính phủ trong năm 2022);

      c) Trang trại nuôi trồng thủy sản được hưởng các chính sách hỗ trợ, ưu đãi khác theo quy định của Điều 4 Luật Thủy sản
      và văn bản hướng dẫn thực hiện;

      d) Trang trại sản xuất muối được hưởng ưu đãi về bảo tồn và phát triển nghề truyền thống gắn với du lịch và các chính
      sách hỗ trợ, ưu đãi khác theo quy định tại Nghị định số 40/2017/NĐ-CP ngày 05 tháng 4 năm 2017 của Chính phủ về quản
      lý sản xuất, kinh doanh muối; hỗ trợ khôi phục sản xuất khi bị thiên tai, dịch bệnh theo quy định tại Nghị định số 02/2017/NĐ-CP
      ngày 09 tháng 01 năm 2017 của Chính phủ về cơ chế, chính sách hỗ trợ sản xuất nông nghiệp để khôi phục sản xuất vùng
      bị thiệt hại do thiên tai, dịch bệnh;

      đ) Trang trại lâm nghiệp được hưởng ưu đãi về đầu tư bảo vệ và phát triển rừng, chế biến và thương mại lâm sản và các
      chính sách hỗ trợ, ưu đãi khác theo quy định của Điều 50, Điều 70, Điều 94, Điều 97 Luật Lâm nghiệp và văn bản hướng
      dẫn thực hiện.

      e) Trang trại sản xuất sản phẩm hữu cơ được hưởng chính sách theo quy định của Điều 17 Nghị định số 109/2018/NĐ-CP ngày
      29 tháng 8 năm 2018 của Chính phủ về Nông nghiệp hữu cơ.

      g) Trang trại áp dụng thực hành nông nghiệp tốt được hưởng chính sách theo quy định của Quyết định số 01/2012/QĐ-TTg
      ngày 09 tháng 01 năm 2012 của Thủ tướng Chính phủ về một số chính sách hỗ trợ việc áp dụng quy trình thực hành sản xuất
      nông nghiệp tốt trong nông nghiệp, lâm nghiệp và thủy sản.

      h) Trang trại ứng dụng công nghệ cao, chuyển đổi số, chuyển đổi sản xuất nông nghiệp theo hướng thích ứng thông minh
      với biến đổi khí hậu nhằm phát triển bền vững được hỗ trợ một lần 50% kinh phí đầu tư xây dựng nhà kính, nhà lưới và
      các loại nhà khác phục vụ mục đích trồng trọt; hệ thống tưới nước tiết kiệm hoặc tự động, giếng và đường ống dẫn nước;
      hệ thống camera thông minh, thiết bị cảm biến và điều khiển, giám sát tự động. Mức hỗ trợ tối đa cho một trang trại
      không quá 1.000 triệu đồng/trang trại.

      i) Trang trại nông nghiệp phát triển mô hình kinh tế tuần hoàn được hỗ trợ một lần 100% kinh phí mua chế phẩm vi sinh
      xử lý phụ phẩm trồng trọt, chăn nuôi, thủy sản và thiết bị xử lý môi trường; tối đa không quá 300 triệu đồng/trang trại.

      3. Hỗ trợ trang trại sản xuất, kinh doanh cây, con đặc thù

      Trang trại sản xuất, kinh doanh cây, con đặc thù quy định tại khoản 1 Điều 4 được hỗ trợ một lần 50% chi phí mua cây,
      con giống; mức hỗ trợ tối đa không quá 500 triệu đồng/trang trại .'
    - 'passage: "Điều 4. Cách tính tổng diện tích đất sản xuất, và giá trị sản xuất của trang trại

      1. Tổng diện tích đất sản xuất quy định tại Điều 3 Thông tư này là tổng diện tích đất sản xuất kinh doanh của trang
      trại, được sử dụng hợp pháp theo quy định của pháp luật về đất đai, bao gồm diện tích đất để trồng trọt, chăn nuôi,
      lâm nghiệp, nuôi trồng thủy sản, sản xuất muối và đất để xây dựng hạ tầng phục vụ sản xuất của trang trại tại thời điểm
      kê khai.

      2. Giá trị sản xuất của trang trại/năm là giá trị sản xuất của ít nhất 1 năm trang trại đạt được trong 3 năm gần nhất
      với năm kê khai; được tính bằng tổng giá trị sản xuất các kỳ thu hoạch hoặc khai thác trong năm.

      Đối với trang trại mới thành lập chưa có sản phẩm thu hoạch, giá trị sản xuất được ước tính căn cứ vào phương án sản
      xuất, tình hình triển khai thực tế của trang trại."'
    - 'passage: Phân loại kinh tế trang trại

      Trang trại nông nghiệp được phân loại thành 02 nhóm:

      1. Trang trại nông nghiệp chuyên ngành được xác định theo lĩnh vực sản xuất như trồng trọt, chăn nuôi, lâm nghiệp, nuôi
      trồng thủy sản, diêm nghiệp và tỷ trọng giá trị sản xuất của lĩnh vực chiếm trên 50% cơ cấu giá trị sản xuất của trang
      trại trong năm. Trang trại nông nghiệp chuyên ngành được phân thành 05 loại như sau:

      a) Trang trại trồng trọt: Là trang trại có hoạt động sản xuất trồng trọt, chủ yếu là trồng cây hàng năm, cây lâu năm
      và các loại cây trồng đặc thù (như nấm ăn hoặc một số loại cây khác); nhân và chăm sóc cây giống nông nghiệp đáp ứng
      yêu cầu về tiêu chí kinh tế trang trại;

      b) Trang trại chăn nuôi: Là trang trại có hoạt động sản xuất chăn nuôi tập trung tại khu vực riêng biệt dành cho sản
      xuất, kinh doanh chăn nuôi; chủ yếu là chăn nuôi trâu, bò, ngựa, lừa, la, dê, cừu, lợn, gia cầm và các loại vật nuôi
      đặc thù trên cạn (như chim yến, ong, hươu hoặc một số động vật khác sống trên cạn thuộc Danh mục động vật khác được
      phép chăn nuôi) đáp ứng yêu cầu về tiêu chí kinh tế trang trại;

      c) Trang trại lâm nghiệp: Là trang trại có hoạt động sản xuất trên đất quy hoạch sử dụng vào mục đích lâm nghiệp, hoạt
      động chủ yếu là gieo ươm, trồng, chăm sóc và khai thác cây rừng hoặc các sản phẩm lâm sản ngoài gỗ từ rừng đáp ứng yêu
      cầu về tiêu chí kinh tế trang trại;

      d) Trang trại nuôi trồng thủy sản: Là trang trại có hoạt động sản xuất nuôi trồng thủy sản, sản xuất giống thuỷ sản
      đáp ứng yêu cầu về tiêu chí kinh tế trang trại nuôi trồng thủy sản theo quy định;

      e) Trang trại sản xuất muối: Là trang trại có hoạt động sản xuất muối từ nước biển, nước mặn ngầm hoặc khai thác từ
      mỏ muối đáp ứng yêu cầu về tiêu chí kinh tế trang trại.

      2. Trang trại nông nghiệp tổng hợp là trang trại tổ chức nhiều hoạt động sản xuất chuyên ngành nông nghiệp quy định
      tại khoản 1 Điều này; trong đó không có lĩnh vực sản xuất nào có tỷ trọng giá trị sản xuất chiếm trên 50% cơ cấu giá
      trị sản xuất của trang trại trong năm.'
  - source_sentence: 'query: Đơn đề nghị đặt tiền để bảo đảm được tại ngoại của bị can được gửi đến đâu?'
    sentences:
    - 'passage: 1. Trong thời hạn năm ngày, kể từ ngày nhận được Thông báo về việc đặt tiền để bảo đảm và các mẫu văn bản
      kèm theo, nếu có nguyện vọng xin được đặt tiền để bảo đảm thay thế biện pháp tạm giam thì bị can, bị cáo phải hoàn chỉnh
      đơn và giấy uỷ quyền (đối với người đã thành niên) và gửi cho cơ quan đã thông báo thông qua cơ sở giam giữ.

      Trong thời hạn một ngày làm việc, kể từ khi nhận được đơn đề nghị, giấy uỷ quyền của bị can, bị cáo, cơ sở giam giữ
      có trách nhiệm chuyển cho cơ quan đang tiến hành tố tụng đối với vụ án.

      2. Trong thời hạn một ngày làm việc, kể từ khi nhận được đơn đề nghị và giấy uỷ quyền của bị can, bị cáo, đại diện cơ
      quan tiến hành tố tụng đang thụ lý vụ án xác nhận vào giấy uỷ quyền và gửi ngay cho người được uỷ quyền bằng thư bảo
      đảm hoặc chuyển phát nhanh. Trong thời hạn năm ngày, kể từ ngày nhận được Giấy ủy quyền, người được bị can, bị cáo ủy
      quyền ghi ý kiến của mình, ký tên vào Giấy ủy quyền và nộp lại cho cơ quan tiến hành tố tụng đối với vụ án. Giấy uỷ
      quyền là cơ sở để người được uỷ quyền thay mặt bị can, bị cáo thực hiện việc đặt tiền để bảo đảm.

      Trường hợp bị can, bị cáo là người chưa thành niên, người có nhược điểm về tâm thần thì cơ quan đang tiến hành tố tụng
      đối với vụ án chuyển đơn đề nghị của bị can, bị cáo cho người đại diện hợp pháp của họ. Trong thời hạn năm ngày, kể
      từ ngày nhận được đơn đề nghị, người đại diện hợp pháp ghi ý kiến, ký tên vào đơn đề nghị của bị can, bị cáo và nộp
      lại cho cơ quan tiến hành tố tụng đối với vụ án.

      3. Bị can, bị cáo hoặc người đại diện hợp pháp của họ có quyền đề nghị bằng văn bản với cơ quan đang tiến hành tố tụng
      đối với vụ án về việc áp dụng biện pháp đặt tiền để bảo đảm đối với bị can, bị cáo khi thấy có đủ các điều kiện hướng
      dẫn tại khoản 1 Điều 3 của Thông tư liên tịch này.

      Văn bản đề nghị của bị can, bị cáo được gửi qua cơ sở giam giữ. Trong thời hạn một ngày làm việc kể từ khi nhận được
      văn bản đề nghị của bị can, bị cáo, cơ sở giam giữ có trách nhiệm chuyển đến cơ quan đang tiến hành tố tụng đối với
      vụ án.

      Văn bản đề nghị của người đại diện hợp pháp của bị can, bị cáo được gửi trực tiếp đến cơ quan đang tiến hành tố tụng
      đối với vụ án.

      Trong thời hạn ba ngày làm việc, kể từ khi nhận được văn bản đề nghị, cơ quan tiến hành tố tụng đang thụ lý vụ án có
      trách nhiệm xem xét, nếu thấy có đủ điều kiện để áp dụng biện pháp đặt tiền để bảo đảm thì gửi cho bị can, bị cáo các
      mẫu văn bản theo hướng dẫn tại Điều 7 của Thông tư liên tịch này để làm thủ tục đề nghị được đặt tiền để bảo đảm. Trường
      hợp xét thấy không đủ điều kiện áp dụng biện pháp đặt tiền để bảo đảm đối với bị can, bị cáo thì phải thông báo bằng
      văn bản cho người đề nghị biết trong đó nêu rõ lý do.'
    - 'passage: Đề nghị đặt tiền để bảo đảm

      1. Bị can, bị cáo, người thân thích của bị can, bị cáo hoặc người đại diện của bị can, bị cáo là người dưới 18 tuổi,
      người có nhược điểm về tâm thần hoặc thể chất có quyền đề nghị bằng văn bản với cơ quan tiến hành tố tụng đang thụ lý
      vụ án về việc áp dụng biện pháp đặt tiền để bảo đảm đối với bị can, bị cáo trừ trường hợp quy định tại khoản 2 Điều
      7 Thông tư liên tịch này.

      2. Đơn đề nghị của bị can, bị cáo, được gửi qua cơ sở giam giữ hoặc gửi trực tiếp cho cơ quan tiến hành tố tụng đang
      thụ lý vụ án. Trong thời hạn 01 ngày làm việc kể từ khi nhận được đơn đề nghị của bị can, bị cáo, cơ sở giam giữ có
      trách nhiệm chuyển đến cơ quan tiến hành tố tụng đang thụ lý vụ án.

      3. Đơn đề nghị của người thân thích, người đại diện của bị can, bị cáo được gửi trực tiếp đến cơ quan tiến hành tố tụng
      đang thụ lý vụ án.'
    - 'passage: Thông báo về việc cho đặt tiền để bảo đảm

      1. Trong thời hạn 03 ngày làm việc, kể từ khi nhận được đơn đề nghị và các giấy tờ có liên quan, cơ quan tiến hành tố
      tụng đang thụ lý vụ án có trách nhiệm xem xét, nếu thấy có đủ điều kiện áp dụng biện pháp đặt tiền để bảo đảm theo quy
      định tại khoản 2 Điều này thì ra Thông báo cho bị can, bị cáo, người thân thích hoặc người đại diện của bị can, bị cáo
      theo Mẫu số 04 ban hành kèm theo Thông tư liên tịch này để làm thủ tục đặt tiền để bảo đảm. Trường hợp thấy không đủ
      điều kiện áp dụng biện pháp đặt tiền để bảo đảm đối với bị can, bị cáo thì phải thông báo bằng văn bản cho người đề
      nghị biết trong đó nêu rõ lý do.

      2. Căn cứ vào tính chất, mức độ nguy hiểm cho xã hội của hành vi phạm tội, tình trạng tài sản, nhân thân của bị can,
      bị cáo; bị can, bị cáo có nơi cư trú rõ ràng, phạm tội lần đầu, tố giác đồng phạm, có tình tiết giảm nhẹ (như tự thú,
      đầu thú, thành khẩn khai báo, lập công chuộc tội, tích cực hợp tác với cơ quan có trách nhiệm trong việc phát hiện tội
      phạm hoặc trong quá trình giải quyết vụ án, ăn năn hối cải, tự nguyện sửa chữa hoặc bồi thường thiệt hại...); việc cho
      bị can, bị cáo tại ngoại không gây khó khăn cho việc điều tra, truy tố, xét xử, thi hành án thì cơ quan tiến hành tố
      tụng có thể quyết định áp dụng biện pháp đặt tiền để bảo đảm trừ các trường hợp sau:

      a) Bị can, bị cáo dùng thủ đoạn xảo quyệt, phạm tội có tổ chức, có tính chất chuyên nghiệp, cố ý gây hậu quả đặc biệt
      nghiêm trọng;

      b) Bị can, bị cáo là người chủ mưu, cầm đầu, chỉ huy, ngoan cố chống đối, côn đồ, tái phạm, tái phạm nguy hiểm;

      c) Bị tạm giam trong trường hợp bị bắt theo lệnh, quyết định truy nã.

      d) Phạm nhiều tội;

      đ) Phạm tội nhiều lần.'
    - 'passage: Điều 2. - Đối với vụ án vừa có bị can đang bị tạm giam, vừa có bị can tại ngoại, cũng như vụ án chỉ có bị
      can tại ngoại, thì trong thời hạn ba ngày, kể từ ngày ra quyết định truy tố, Viện kiểm sát gửi đến Tòa án hồ sơ vụ án
      và quyết định truy tố cùng với biên bản giao cáo trạng cho bị can đang bị tạm giam, cũng như bị can tại ngoại. Nếu Viện
      kiểm sát gặp khó khăn trong việc giao cáo trạng cho bị can tại ngoại, thì chậm nhất là 15 ngày kể từ ngày gửi cho Tòa
      án hồ sơ vụ án, Viện kiểm sát gửi đến Tòa án biên bản về việc Viện kiểm sát giao cáo trạng cho bị can tại ngoại. Hết
      thời hạn đó, nếu Viện kiểm sát không gửi đến Tòa án đủ các biên bản giao cáo trạng cho bị can, thì Tòa án trả hồ sơ
      cho Viện kiểm sát, vì lý do chưa hoàn thành thủ tục tố tụng.'
  - source_sentence: 'query: Ngân sách nhà nước bảo đảm để thực hiện công tác quản lý, vận hành và bảo trì công trình đường
      cao tốc bao gồm những gì?'
    sentences:
    - 'passage: Bảo trì công trình đường cao tốc

      1. Công tác bảo trì công trình đường cao tốc thực hiện theo tiêu chuẩn kỹ thuật về bảo trì công trình hoặc quy trình
      bảo trì được Chủ đầu tư, nhà đầu tư phê duyệt theo quy định về bảo trì công trình xây dựng, đảm bảo công năng của công
      trình và an toàn giao thông trong quá trình vận hành khai thác.

      2. Bộ Giao thông vận tải, Ủy ban nhân dân cấp tỉnh lựa chọn đơn vị, tổ chức thực hiện công tác bảo trì công trình đường
      cao tốc đối với các tuyến đường được đầu tư xây dựng bằng ngân sách nhà nước trong phạm vi quản lý.

      3. Nhà đầu tư tổ chức thực hiện công tác bảo trì công trình đường cao tốc đối với các dự án đầu tư theo hình thức đối
      tác công - tư và các dự án nhượng quyền theo quy định của Bộ Giao thông vận tải.

      4. Công tác tổ chức khai thác và bảo trì công trình đường cao tốc được thực hiện theo hợp đồng riêng biệt hoặc là nội
      dung công việc trong hợp đồng đầu tư xây dựng, khai thác và bảo trì công trình đường cao tốc.

      5. Bộ Giao thông vận tải, Ủy ban nhân dân cấp tỉnh kiểm tra, giám sát thực hiện các hợp đồng quản lý, khai thác và bảo
      trì công trình đường cao tốc trong phạm vi quản lý.'
    - 'passage: Chi phí cho công tác quản lý, vận hành và bảo trì công trình đường cao tốc

      1. Ngân sách nhà nước bảo đảm để thực hiện công tác quản lý, vận hành và bảo trì công trình đường cao tốc là tài sản
      công kết cấu hạ tầng giao thông đường bộ do Nhà nước quản lý, gồm: Tài sản kết cấu hạ tầng đường cao tốc do Nhà nước
      đầu tư xây dựng; tài sản kết cấu hạ tầng đường cao tốc sau khi hết thời hạn hợp đồng PPP chuyển giao cho Nhà nước và
      các trường hợp khác.

      2. Tài sản kết cấu hạ tầng đường cao tốc do Nhà nước cho thuê, chuyển nhượng có thời hạn và các trường hợp khác giao
      tổ chức kinh tế, doanh nghiệp khai thác sử dụng theo quy định của pháp luật về quản lý, sử dụng tài sản công, tổ chức
      kinh tế, doanh nghiệp được giao có trách nhiệm thực hiện quản lý, vận hành và bảo trì công trình đường cao tốc cho đến
      khi chuyển giao tài sản cho Nhà nước.

      3. Việc quản lý, sử dụng, khai thác, bảo trì và chi phí thực hiện các công việc này đối với đường cao tốc đầu tư theo
      phương thức đối tác công tư do nhà đầu tư thực hiện và phải quy định trong hợp đồng dự án PPP.

      4. Đối với các trường hợp không quy định tại các khoản 1, khoản 2 và khoản 3 Điều này, chủ sở hữu hoặc người quản lý
      sử dụng đường cao tốc có trách nhiệm bố trí kinh phí và thực hiện quản lý, sử dụng, khai thác, bảo trì công trình đường
      cao tốc theo quy định của pháp luật về xây dựng và pháp luật khác có liên quan.'
