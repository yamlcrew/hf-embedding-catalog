    2. Sửa đổi, bổ sung khoản 1 Điều 5 như sau: “1. Quản lý, khai thác, sử dụng công trình đường cao tốc, gồm: 2. Bộ Giao
    thông vận tải giao Cơ quan quản lý đường cao tốc trực thuộc thực hiện các nhiệm vụ: 2. Trung tâm quản lý, điều hành giao
    thông tuyến được triển khai: 2. Thông tin thay đổi gồm: 2. Các hạng mục công trình và thiết bị phải có quy trình vận hành
    khai thác 2. Đường cao tốc là tài sản công của Nhà nước, Cơ quan được giao quản lý đường cao tốc có trách nhiệm quản lý,
    sử dụng và khai thác công trình đường cao tốc theo quy định của pháp luật về quản lý, sử dụng tài sản công và pháp luật
    khác có liên quan.”. 2. Vị trí, quy mô xây dựng trạm dừng nghỉ được xác định khi lập dự án, thiết kế xây dựng trạm và
