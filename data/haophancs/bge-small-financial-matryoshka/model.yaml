widgetData:
- source_sentence: We offer dual motor powertrain vehicles, which use two electric motors to maximize traction and performance
    in an all-wheel-drive configuration, as well as vehicle powertrain technology featuring three electric motors for further
    increased performance in certain versions of Model S and Model X, Cybertruck, and the Tesla Semi.
  sentences:
  - What is the purpose of The Home Depot Foundation?
  - What are the features of the company's vehicle powertrain technology?
  - Where can public access the company's SEC filings?
- source_sentence: The litigation requests a declaration that the IRA violates Janssen’s rights under the First Amendment
    and the Fifth Amendment to the Constitution.
  sentences:
  - What changes occurred in the valuation of equity warrants from 2021 to 2023?
  - What constitutional rights does Janssen claim the Inflation Reduction Act violates?
  - What was the cash paid for amounts included in the measurement of operating lease liabilities for the years 2021, 2022,
    and 2023?
- source_sentence: After-tax earnings of other energy businesses decreased $332 million (24.5%) in 2023 compared to 2022.
    The decline reflected lower earnings at Northern Powergrid due to unfavorable results at a natural gas exploration project,
    including the write-off of capitalized exploration costs and lower gas production volumes and prices, as well as from
    higher deferred income tax expense related to the enactment of the Energy Profits Levy income tax in the United Kingdom.
    The earnings decline was also attributable to lower earnings from renewable energy and retail services businesses. The
    decline in renewable energy and retail services earnings was primarily due to lower income tax benefits, higher operating
    expenses, lower solar and wind generation at owned projects and the impact of unfavorable changes in valuations of derivatives
    contracts, partially offset by debt extinguishment gains.
  sentences:
  - What were the reasons for the decline in after-tax earnings of other energy businesses in 2023?
  - What was the main reason for the increase in the company's valuation allowance during fiscal 2023?
  - What were the net purchase amounts of treasury shares for the years ended December 31, 2022, and 2023?
- source_sentence: The Phase 3 OAKTREE trial of obeldesivir in non-hospitalized participants without risk factors for developing
    severe COVID-19 did not meet its primary endpoint of improvement in time to symptom alleviation. Obeldesivir was well-tolerated
    in this large study population.
  sentences:
  - How did the P&C combined ratios trend from 2021 to 2023?
  - What are some of the digital tools Walmart uses to improve associate productivity, engagement, and performance?
  - What was the result of the Phase 3 OAKTREE trial of obeldesivir conducted by Gilead?
- source_sentence: The issuance of preferred stock could have the effect of restricting dividends on the Company’s common
    stock, diluting the voting power of its common stock, impairing the liquidation rights of its common stock, or delaying
    or preventing a change in control.
  sentences:
  - What is the impact of issuing preferred stock according to the Company's description?
  - For how long did Jeffrey P. Bezos serve as President at Amazon?
  - Where in an Annual Report on Form 10-K is 'Note 13 — Commitments and Contingencies — Litigation and Other Legal Matters'
    included?
