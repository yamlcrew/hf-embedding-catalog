- source_sentence: Dans le contexte du décret mentionné, est-il permis, sous réserve des dispositions des articles 6 et 11,
    de transporter et d'emporter hors de la réserve des œufs d'animaux d'espèces non domestiques pour des fins scientifiques,
    après avoir obtenu l'autorisation du préfet et l'avis du conseil scientifique de la réserve?
  sentences:
  - 'L''UBEL''UBE est un établissement public à caractère scientifique, culturel et professionnel expérimental régi par l''ordonnance
    du 12 décembre 2018 susvisée. Elle est soumise aux dispositions du code de l''éducation et du code de la recherche et
    des textes pris pour leur application, sous réserve des dérogations prévues aux présents statuts.Son siège est fixé à
    Dijon. L''UBE assure une coordination territoriale au sein de la région académique Bourgogne-Franche-Comté.L''UBE dispose
    de composantes et de services qui peuvent être implantés sur des lieux géographiques distincts du siège.L''UBE est une
    université pluridisciplinaire, structurée en composantes académiques sans personnalité morale.Des établissements-composantes
    intègrent l''UBE en conservant leur personnalité morale.Des organismes nationaux de recherche participent à sa gouvernance
    et à la définition de sa stratégie.Des établissements, publics ou privés, concourant aux missions du service public de
    l''enseignement supérieur ou de la recherche, sont également associés à l''UBE.


    Procédure de retrait de l''UBETout établissement-composante, établissement associé et établissement partenaire de l''UBE
    peut se retirer de l''expérimentation à l''expiration d''un exercice budgétaire, sous réserve qu''il ait notifié son intention
    au moins six mois avant la fin de l''exercice en cours. Dès notification, les parties recherchent un accord fixant les
    modalités du retrait. Ces conditions sont approuvées par le conseil d''administration de l''établissement concerné ou
    l''organe en tenant lieu et par le conseil d''administration de l''UBE à la majorité des suffrages exprimés. A défaut
    d''accord, le Recteur de région académique fixe les conditions de ce retrait.Lorsque l''UBE considère qu''un établissement-composante,
    un établissement associé ou partenaire a manqué à ses engagements à son égard, elle peut notifier, par un vote à la majorité
    absolue de son conseil d''administration, son souhait de déclencher une procédure de sortie sur la base d''un exposé motivé.Cette
    exclusion intervient au terme d''un exercice budgétaire, sous réserve que cette notification intervienne six mois avant
    la fin de l''exercice. Dès notification, les parties recherchent un accord fixant les modalités du retrait. Ces conditions
    sont approuvées par le conseil d''administration de l''établissement concerné ou l''organe en tenant lieu et par le conseil
    d''administration de l''UBE à la majorité des suffrages exprimés. A défaut d''accord, le Recteur de région académique
    fixe les conditions de cette exclusion.L''accord


    La ministre de la culture, la ministre de la santé et de l''accès aux soins, le ministre de l''enseignement supérieur
    et de la recherche et le ministre auprès du Premier ministre, chargé du budget et des comptes publics, sont chargés, chacun
    en ce qui le concerne, de l''exécution du présent décret, qui sera publié au Journal officiel de la République française.'
  - 'La détention ou le port d''armes à feu, arcs et arbalètes ou de munitions sont interdits sur le territoire de la réserve.Cette
    interdiction ne s''applique pas :1° Aux fonctionnaires et agents publics chargés de missions de police dans l''exercice
    de leurs fonctions ;2° Aux personnes habilitées à exécuter les opérations de limitation ou de régulation de populations
    d''animaux envahissants ou surabondants autorisées par le préfet en application de l''article 6 et du I de l''article
    22.


    Les activités sportives et de loisirs peuvent être réglementées par le ou les préfets compétents.Les manifestations à
    caractère sportif, culturel ou festif ainsi que les manifestations nautiques sont interdites. Toutefois elles peuvent
    être autorisées par le ou les préfets compétents, sous réserve de leur compatibilité avec les objectifs du plan de gestion
    de la réserve.


    Le campement sous une tente, dans un véhicule ou dans tout autre abri, ainsi que toute forme de bivouac sont interdits
    dans la réserve.Cette interdiction ne s''applique pas :1° Aux agents réalisant des missions de police, de secours ou de
    sauvetage ou d''autres missions de service public dans la stricte mesure nécessaire à leur exercice ;2° Aux agents du
    gestionnaire dans le cadre des opérations prévues dans le plan de gestion et dans la stricte mesure nécessaire à leur
    exercice ;3° Aux personnes réalisant des études ou des recherches scientifiques après autorisation du préfet.'
  - 'Il est interdit :1° Sous réserve des dispositions des articles 6, 7, 9, 10, 11, 12, 19 et 20, et dans la stricte mesure
    nécessaire à leur application, de porter atteinte, de quelque manière que ce soit, aux animaux d''espèces non domestiques,
    quel que soit leur stade de développement, et notamment à leurs œufs, couvées, portées et nids, de les transporter, de
    les emporter hors de la réserve, de les troubler ou de les déranger, sauf autorisation du préfet, délivrée à des fins
    scientifiques, sanitaires ou de sécurité, après avis du conseil scientifique de la réserve.Cette interdiction ne s''applique
    pas aux actions mises en œuvre dans le cadre du plan de gestion ;2° Sous réserve des dispositions des articles 6 et 11,
    d''introduire dans la réserve des animaux d''espèces non domestiques, quel que soit leur stade de développement, sauf
    autorisation du préfet délivrée après avis du conseil scientifique de la réserve à des fins scientifiques ou conservatoires
    ;3° Sous réserve des dispositions de l''article 6, d''introduire dans la réserve des animaux domestiques.Cette interdiction
    ne s''applique pas :a) Aux animaux utilisés dans le cadre de la mise en œuvre du plan de gestion ;b) Aux animaux utilisés
    dans le cadre des activités agricoles, pastorales et conchylicoles mentionnées aux articles 10 et 11 ;c) Aux animaux qui
    assistent les personnes en situation de handicap ;d) Aux chiens qui participent à des missions scientifiques, de police,
    de recherche et de sauvetage ;e) Aux chiens de


    Les activités conchylicoles pratiquées à titre professionnel dans la réserve s''exercent dans le respect de la réglementation
    en vigueur.


    I. - Toute activité de recherche ou d''exploitation minière, de carrière ou de gravière est interdite.II. - Les affouillements,
    excavations et exhaussements du sol sont interdits sauf ceux réalisés dans le cadre des dispositions de l''article 9.III.
    - Les prélèvements de roche, d''alluvions, de concrétions, de fossiles et de vestiges paléontologiques, préhistoriques
    et historiques, ainsi que les prospections et l''exécution des fouilles archéologiques sont interdits, sauf autorisation
    délivrée par le préfet à des fins scientifiques après avis du conseil scientifique de la réserve.'
- source_sentence: Dans le cadre d'un projet d'augmentation de capital d'une société de droit français, supposons que le nouveau
    associé ne pratique pas la profession d'avocat au Conseil d'Etat et à la Cour de cassation. S'il existe une clause d'exclusibilité
    dans les Statuts de la société, empêchant tout associé de pratiquer la profession d'avocat, est-il alors nécessaire de
    déposer la déclaration préalable au garde des sceaux, ministre de la justice, conformément au premier alinéa de l'article
    96 du code de commerce?
  sentences:
  - 'Des sociétés d''exercice libéral peuvent constituer par voie de fusion, entre elles ou avec d''autres sociétés titulaires
    d''un office, une nouvelle société d''exercice libéral qui peut être nommée dans un ou plusieurs offices relevant d''une
    des catégories suivantes :1° Un office dont l''une d''elles est titulaire, en remplacement de celle-ci ;2° Un autre office
    existant ;3° Un office créé.Les offices dont les sociétés participant à la fusion sont titulaires, autres que celui ou
    ceux auxquels la société nouvelle est nommée, sont pourvus d''un nouveau titulaire ou supprimés.


    Les sociétés en participation prévues à l''article 34 de l''ordonnance du 8 février 2023 susvisée reçoivent l''appellation
    de « sociétés en participation de notaires ».La société n''est pas titulaire d''un office de notaire et chacun des associés,
    s''il s''agit d''une personne physique, exerce ses fonctions au sein de l''office dont il est titulaire.L''appartenance
    à la société, avec la dénomination de celle-ci, doit être indiquée dans les actes professionnels et les correspondances
    de chaque associé.


    La nomination de la nouvelle société d''exercice libéral dans un office de notaire et la nomination de chacun des associés
    qui exerceront au sein de la société la profession de notaire sont prononcées par arrêté du garde des sceaux, ministre
    de la justice.La dissolution des sociétés d''exercice libéral ou des sociétés civiles professionnelles participant à cette
    fusion prend effet à la date à laquelle elle est constatée par l''arrêté qui prononce la suppression des offices dont
    elles sont titulaires, le transfert des minutes de ces offices et, le cas échéant, la création de l''office dont la nouvelle
    société sera titulaire ou la nomination de la nouvelle société dans le ou les offices dont elles sont titulaires.Sont
    applicables aux fusions de sociétés les dispositions de l''article 163, du dernier alinéa de l''article 165 et des articles
    166 à 169 et, en outre, en cas de création d''office, celles de l''article 164.'
  - 'La nullité de la société ne porte pas atteinte à la validité des actes reçus ou dressés par les avocats au Conseil d''Etat
    et à la Cour de cassation associés exerçant au sein de la société avant la date où cette nullité est devenue définitive.


    Toute transformation d''une société en société civile professionnelle fait l''objet, dans un délai de trente jours, d''une
    déclaration au garde des sceaux, ministre de la justice. La déclaration est accompagnée de la copie des statuts et de
    tout document permettant d''établir l''accord de la société ou des autres associés lorsque celui-ci est requis par les
    dispositions des chapitres Ier et II du titre IX du livre III du code civil ainsi que par les dispositions du livre II
    du code de commerce autres que celles des chapitres Ier, II et VI du titre II, du chapitre III du titre IV et du titre
    V ou par les statuts de la société.


    Sous réserve des règles de protection et de représentation des mineurs et majeurs protégés, les dispositions de l''article
    102 sont applicables à la cession d''actions ou de parts sociales de l''associé placé sous le régime de la tutelle, s''il
    ne veut ou ne peut bénéficier des dispositions du 2° de l''article 47 de l''ordonnance du 8 février 2023 susvisée, ou
    de l''associé frappé d''interdiction légale.Elles sont également applicables à la cession d''actions ou de parts sociales
    de l''associé dont l''exclusion de la société a été décidée dans les cas mentionnés à l''article 114.Le délai de six mois
    imparti à l''associé exclu pour céder ses actions ou parts sociales court à compter du jour où la décision des autres
    associés prononçant son exclusion lui a été notifiée par lettre recommandée avec demande d''avis de réception.Lorsque
    la société d''exercice libéral est une société pluri-professionnelle d''exercice, les dispositions du présent article
    s''appliquent aux seuls associés exerçant la profession d''avocat au Conseil d''Etat et à la Cour de cassation.'
  - 'Tout projet d''augmentation de capital conduisant à l''entrée dans la société d''un nouvel associé qui n''entend pas
    exercer la profession d''avocat au Conseil d''Etat et à la Cour de cassation ou tout projet de convention par laquelle
    un des associés cède tout ou partie de ses actions ou parts sociales à un tel nouvel associé fait l''objet, au moins deux
    mois avant sa réalisation, d''une déclaration préalable au garde des sceaux, ministre de la justice, dans les conditions
    prévues au premier alinéa de l''article 96.Dès réception de la déclaration, le garde des sceaux, ministre de la justice,
    recueille l''avis motivé du vice-président du Conseil d''Etat, du premier président de la Cour de cassation, du procureur
    général près cette cour et du conseil de l''ordre des avocats au Conseil d''Etat et à la Cour de cassation. L''avis est
    adressé au garde des sceaux, ministre de la justice, dans un délai de quinze jours à compter de la saisine. A défaut de
    réponse dans ce délai, il est réputé favorable.Le garde des sceaux, ministre de la justice, peut s''opposer au projet
    dans un délai de deux mois après réception de la demande. L''article 85 est applicable.


    Toute demande d''agrément et de nomination d''une société civile professionnelle d''avocats au Conseil d''Etat et à la
    Cour de cassation est présentée collectivement par les associés au garde des sceaux, ministre de la justice, par lettre
    recommandée avec demande d''avis de réception. Elle est instruite dans les conditions prévues aux articles 20 à 30 du
    décret du 28 octobre 1991 susvisé.La consultation du vice-président du Conseil d''Etat, du premier président de la Cour
    de cassation, du procureur général près cette cour et, le cas échéant, du conseil de l''ordre des avocats au Conseil et
    à la Cour de cassation prévues aux articles 22 et 23 du décret du 28 octobre 1991 susvisé porte sur l''opportunité de
    nommer la société, sur l''honorabilité et la valeur professionnelle des associés ainsi que, le cas échéant, sur : - la
    valeur des apports mentionnés aux 1°, 2° et 3° de l''article 12 et effectués par les associés ou certains d''entre eux
    ;- les avantages et inconvénients des suppressions ou créations d''offices sollicitées.


    Les dispositions relatives à la prestation de serment des avocats au Conseil d''Etat et à la Cour de cassation sont applicables
    aux avocats associés auprès du Conseil d''Etat et de la Cour de cassation.L''associé qui a déjà prêté serment en qualité
    d''avocat au Conseil d''Etat et à la Cour de cassation n''a pas à renouveler son serment.La société entre en fonction
    dès la prestation de serment de l''un des associés ou, si l''un des associés se trouve dans la situation prévue à l''alinéa
    précédent, dès la publication de l''arrêté prévu au premier alinéa de l''article 5.Si, sans motif reconnu valable, l''associé
    qui y est tenu ne prête pas serment dans le mois suivant la publication de l''arrêté prévu au premier alinéa de l''article
    5, il est déclaré démissionnaire d''office, par arrêté du garde des sceaux, ministre de la justice, de sa qualité d''avocat
    associé auprès du Conseil d''Etat et de la Cour de cassation et ses parts sociales sont cédées dans les conditions fixées
    à l''article 32 du présent livre.Sous réserve de l''application du deuxième alinéa du présent article, tout avocat associé
    auprès du Conseil d''Etat et de la Cour de cassation n''a le droit d''exercer ses fonctions qu''à compter du jour de sa
    prestation de serment.'
- source_sentence: S'il y a un éleveur de chiens de protection qui refuse d'inclure ses données personnelles dans la base
    de données mentionnée à l'article 1er, est-il possible pour lui d'exercer ses droits de rectification ou d'opposition,
    compte tenu des dispositions du règlement (UE) 2016/679 relatif à la protection des données à caractère personnel?
  sentences:
  - 'Les dispositions du présent décret sont applicables sur l''ensemble du territoire de la République.


    I. - Le droit d''opposition prévu à l''article 110 de la loi du 6 janvier 1978 susvisée ne s''applique pas au présent
    traitement.II. - Conformément aux dispositions de l''article 111 de la loi du 6 janvier 1978 susvisée, l''accès aux données
    et les conditions de leur rectification ou de leur effacement sont régis par les dispositions du code de procédure pénale.


    Les données à caractère personnel et les informations enregistrées dans le traitement sont conservées jusqu''à la date
    de transmission de la procédure à l''autorité judiciaire et pendant un délai de cinq ans à compter de cette date.'
  - 'Dans le cadre du plan national d''actions sur le loup et les activités d''élevage adopté en application de l''article
    L. 411-3 du code de l''environnement, il est créé, sous la responsabilité du ministre chargé de l''agriculture, un traitement
    de données à caractère personnel dénommé « base de données relative aux chiens de protection des troupeaux », ayant pour
    finalités :1° de favoriser la sélection des reproducteurs de chiens de protection ;2° d''améliorer la connaissance des
    chiens de protection au travail et de leur population ;3° de contribuer à la mise en place un réseau d''éleveurs naisseurs
    de chiens de protection.


    Ont accès à tout ou partie des données à caractère personnel incluses dans le traitement mentionné à l''article 1er, dans
    les conditions fixées par le responsable du traitement et dans les limites strictement nécessaires à l''exercice de leurs
    missions, pour les seules finalités mentionnées à l''article 1er : - les agents habilités de l''association Pastorale
    pyrénéenne et de l''IDELE ;- les membres du réseau d''expertise de l''association Pastorale Pyrénéenne et de l''IDELE
    ;- les agents habilités du ministère chargé de l''agriculture ;- les agents habilités du ministère chargé de la transition
    écologique ;- le cas échéant, les salariés habilités du sous-traitant du traitement.


    Les personnes dont les données et informations sont traitées reçoivent les informations prévues aux articles 13 et 14
    du règlement (UE) du 27 avril 2016 susvisé.Les droits d''accès, de rectification et d''opposition ainsi que le droit à
    la limitation prévus aux articles 15, 16, 18 et 21 du règlement (UE) du 27 avril 2016 susvisé s''exercent auprès du responsable
    du traitement, ou, le cas échéant, du sous-traitant du traitement.Les droits à l''effacement et à la portabilité des données
    prévus respectivement aux articles 17 et 20 du même règlement ne s''appliquent pas.'
  - 'La mention de l''UBE dans les classements internationauxL''UBE œuvre pour accroître sa visibilité et celle de ses établissements-composantes
    et établissements-associés. Elle figure dans les classements nationaux et internationaux relatifs aux universités. Dans
    les classements thématiques de ses établissements-composantes, elle figure en associant les marques des établissements-composantes
    concernés.


    Règlement intérieurLe conseil d''administration vote, à la majorité absolue de ses membres en exercice, le règlement intérieur
    de l''UBE dans les six mois après l''installation des conseils.Le règlement intérieur précise les dispositions électorales
    et les règles relatives au fonctionnement des conseils prévus par les présents statuts. Il fixe notamment les règles de
    quorum des conseils, les modalités de délibération et de représentation de leurs membres, les modalités de convocation,
    d''établissement et d''envoi de l''ordre du jour de ces conseils ainsi que la présidence de ceux-ci en cas d''empêchement
    de leurs présidents et les règles de publicité des délibérations.Toute modification ultérieure du règlement intérieur
    est soumise à la même procédure. Si le conseil d''administration d''un établissement associé ou l''organe en tenant lieu
    s''oppose à une modification du règlement intérieur de l''UBE qui l''affecterait, alors cette modification ne lui est
    pas opposable.


    Accès aux services et équipements de l''UBELes établissements-composantes et leurs personnels peuvent avoir accès à l''ensemble
    des services et équipements de l''UBE aux mêmes conditions que les personnels de l''UBE.L''accès aux équipements et services
    de l''UBE de la part des établissements associés et partenaires d''une part, et l''accès aux équipements et services des
    établissements associés et partenaires de la part de l''UBE d''autre part, font l''objet d''une convention signée entre
    l''UBE et chaque établissement associé, indiquant notamment la prise en charge des coûts de service. Ces conventions sont
    soumises à approbation du conseil d''administration de l''UBE sur proposition de son président, et dans le respect de
    ses choix stratégiques.'
- source_sentence: Dans le cadre de ses compétences en matière de direction de l'UMPV, suppose-t-on que le président prenne
    une décision controversée lors du conseil des établissements-composantes. Comment ce decision peut-elle être contestée
