      aux trois premiers alinéas de l''article 47 du décret du 17 janvier 1986 susvisé. Au cours de l''entretien préalable,
      l''administration indique à l''agent que le licenciement est justifié par son refus de la modification d''un élément
      substantiel de son contrat consécutive à la transformation de l''emploi ayant justifié son recrutement pour un besoin
      permanent.Le juriste assistant ayant refusé la modification de son contrat est regardé comme ayant refusé une offre
      de reclassement.A l''issue de la consultation de la commission consultative paritaire prévue à l''article 1-2 du décret
      du 17 janvier 1986 susvisé, l''administration notifie à l''agent sa décision de licenciement par tout moyen permettant
      de lui conférer une date de réception certaine.Cette lettre précise le motif du licenciement et la date à laquelle le
