- source_sentence: Dans le cadre du présent accord de coopération culturelle entre la France et le Chili, supposons-nous qu'un
    chef de détachement français refuse, en application de l'article 19, une demande d'information formulée par les autorités
    chiliennes sur des raisons de souveraineté. Est-il possible pour les autorités chiliennes de contester cette décision
    devant une instance judiciaire française, compte tenu de la pleine égalité des droits des parties et du but de renforcer
    les liens traditionnels d'amitié et de coopération entre les deux pays?
  sentences:
  - 'I. - En cas de refus d''être nommé attaché de justice ou en l''absence de choix exprès dans le délai imparti par l''article
    59 de la loi du 20 novembre 2023 susvisée, l''administration engage la procédure de licenciement prévue au présent article.
    Le contrat du juriste assistant se poursuit en cette qualité jusqu''à l''issue de la procédure de licenciement.II. - A
    compter du 1er novembre 2024, l''agent est convoqué à un entretien préalable au licenciement selon les modalités définies
    aux trois premiers alinéas de l''article 47 du décret du 17 janvier 1986 susvisé. Au cours de l''entretien préalable,
    l''administration indique à l''agent que le licenciement est justifié par son refus de la modification d''un élément substantiel
    de son contrat consécutive à la transformation de l''emploi ayant justifié son recrutement pour un besoin permanent.Le
    juriste assistant ayant refusé la modification de son contrat est regardé comme ayant refusé une offre de reclassement.A
    l''issue de la consultation de la commission consultative paritaire prévue à l''article 1-2 du décret du 17 janvier 1986
    susvisé, l''administration notifie à l''agent sa décision de licenciement par tout moyen permettant de lui conférer une
    date de réception certaine.Cette lettre précise le motif du licenciement et la date à laquelle le licenciement doit intervenir,
    compte tenu des droits à congés annuels restant à courir et de la durée du préavis prévu à l''article 46 du décret du
    17 janvier 1986 susvisé.Les dispositions de l''article


    I. - A compter du 1er novembre 2024, l''administration notifie la modification de son contrat au juriste assistant qui
    a opté pour une nomination comme attaché de justice en application des dispositions du deuxième alinéa de l''article 59
    de la loi du 20 novembre 2023 susvisée.Le contrat du juriste assistant se poursuit en cette qualité jusqu''à la notification
    de cette modification. A compter de cette notification, le contrat se poursuit en qualité d''attaché de justice.II. -
    Les services accomplis comme juriste assistant sont assimilés à des services accomplis comme attaché de justice.III. -
    Lorsqu''un attaché de justice a bénéficié de la formation organisée par l''Ecole nationale de la magistrature en qualité
    de juriste assistant, il est dispensé de la formation initiale prévue au premier alinéa de l''article R. 123-37 du code
    de l''organisation judiciaire.


    Les dispositions de l''article 37 de la loi du 20 novembre 2023 susvisée et le présent décret entrent en vigueur le 1er
    novembre 2024.'
  - 'ACCORDENTRE LE GOUVERNEMENT DE LA RÉPUBLIQUE FRANÇAISE ET L''AUTORITÉ BANCAIRE EUROPÉENNE RELATIF AU SIÈGE DE L''AUTORITÉ
    BANCAIRE EUROPÉENNE ET À SES PRIVILÈGES ET IMMUNITÉS SUR LE TERRITOIRE FRANÇAIS, SIGNÉ À PARIS LE 6 MARS 2019 Le Gouvernement
    de la République française (ci-après « Le Gouvernement ») et l''Autorité bancaire européenne,Considérant le règlement
    (UE) n° 1093/2010 du Parlement européen et du Conseil du 24 novembre 2010 instituant une Autorité européenne de surveillance
    (Autorité bancaire européenne, ci-après l'' « Autorité »), modifiant la décision n° 716/2009/CE et abrogeant la décision
    2009/78/CE de la Commission (ci-après le « règlement ») ;Considérant le règlement (UE) n° 2018/1717 du Parlement européen
    et du Conseil du 14 novembre 2018, modifiant le règlement et fixant le nouveau siège de l''Autorité bancaire européenne
    à Paris ;Considérant l''article 67 du règlement qui prévoit que le protocole n° 7 sur les privilèges et immunités de l''Union
    européenne annexé au traité sur l''Union européenne et au traité sur le fonctionnement de l''Union européenne s''applique
    à l''Autorité ainsi qu''à son personnel ;Considérant l''article 68 du règlement qui prévoit, en son paragraphe 1, que
    le statut des fonctionnaires, le régime applicable aux autres agents et les règles adoptées conjointement par les institutions
    de l''Union aux fins de l''application de ce statut et de ce régime s''appliquent au personnel de l''Autorité, y compris
    son directeur exécutif et son président


    Le Premier ministre et le ministre de l''Europe et des affaires étrangères sont chargés, chacun en ce qui le concerne,
    de l''exécution du présent décret, qui sera publié au Journal officiel de la République française.


    L''accord de coopération entre le Gouvernement de la République française et le Gouvernement de la République du Chili
    dans le domaine de la coopération culturelle, signé à Paris le 20 juillet 2023, sera publié au Journal officiel de la
    République française.'
  - 'ACCORDDE COOPÉRATION ENTRE LE GOUVERNEMENT DE LA RÉPUBLIQUE FRANÇAISE ET LE GOUVERNEMENT DE LA RÉPUBLIQUE DU CHILI DANS
    LE DOMAINE DE LA COOPÉRATION CULTURELLE, SIGNÉ À PARIS LE 20 JUILLET 2023 Le Gouvernement de la République française,
    d''une part,EtLe Gouvernement de la République du Chili, d''autre part,Ci-après dénommés « les Parties » ;Considérant
    « l''Accord culturel entre le Gouvernement français et le Gouvernement chilien », signé à Santiago du Chili le 23 novembre
    1955 et la « Déclaration d''intention relative à la coopération dans le domaine de la culture entre le ministère de la
    culture et de la communication de la République française et le Conseil national de la culture et des arts de la République
    du Chili », signée dans la même ville le 21 janvier 2017 ;Désireux de renforcer les liens traditionnels d''amitié et de
    coopération unissant leurs pays respectifs ;Reconnaissant l''importance que revêt la culture dans le développement de
    l''identité des peuples comme vecteur de lien social et le fait qu''elle favorise la création d''emplois, le développement
    économique, le progrès social, le développement durable, l''ouverture au monde et à sa diversité, et la construction de
    la paix ;Considérant la nécessité de développer la coopération mutuelle et les échanges dans le domaine de la culture
    ;Se fondant sur la pleine égalité des droits et dans un esprit de bénéfice mutuel ;Exprimant leur volonté de promouvoir
    la coopération et l´échange culturel entre les deux pays ;Conviennent


    Les autorités d''envoi des détachements de la compagnie de gendarmerie fluviale franco-allemande peuvent, sur la base
    du présent accord et dans la limite de leurs attributions, conclure tous les accords d''exécution utiles pour le fonctionnement
    de la compagnie. Article 19Rejet des demandes de coopération 1. Chaque chef de détachement peut, après consultation de
    son autorité d''envoi, empêcher la participation à une opération des personnels placés sous son autorité ou rejeter une
    demande d''information formulée par l''autre détachement, s''il estime que son acceptation : - serait contraire aux engagements
    internationaux de sa Partie ou au droit de l''Union européenne ;- porterait atteinte aux droits fondamentaux de la personne
    ;- porterait atteinte à la souveraineté, à la sécurité, à l''ordre public ou à d''autres intérêts essentiels de sa Partie
    ;- porterait atteinte aux règles d''organisation et de fonctionnement de l''autorité judiciaire de sa Partie. 2. Les Parties
    s''informent mutuellement de toute difficulté de cet ordre pouvant affecter le fonctionnement de la compagnie de gendarmerie
    fluviale franco-allemande et s''efforcent de la surmonter. Article 20Évaluation et développement de la coopération Un
    groupe d''expertise et de coordination, composé de représentants des Parties et de leurs autorités compétentes, assure,
    périodiquement ou à la demande d''une des Parties, l''évaluation de la mise en oeuvre du présent accord et détermine si
    des compléments, des actualisations ou des


    1. Chaque Partie accorde aux agents de l''autre Partie, présents sur son territoire dans le cadre du fonctionnement de
    la compagnie de gendarmerie fluviale franco-allemande, la même protection et assistance dans l''exercice de leurs fonctions
    qu''à ses propres agents.2. Conformément aux dispositions de l''article 22 de la décision Prüm, les agents du détachement
    d''une Partie sont assimilés, lorsqu''ils se trouvent en mission sur le territoire de l''autre Partie, aux agents de cette
    dernière Partie en ce qui concerne les infractions pénales qu''ils commettraient ou dont ils seraient victimes. Article
    17Responsabilité et règlement des dommages 1. Les Parties renoncent réciproquement à toutes demandes d''indemnisation
    pour les dommages causés aux biens leur appartenant, si le dommage a été occasionné par un agent de l''autre Partie lors
    de l''exercice des missions découlant du présent accord.2. Les Parties renoncent réciproquement à toutes demandes d''indemnisation
    en cas de blessure ou de décès d''un de leurs agents survenant lors d''une mission accomplie en vertu du présent accord.3.
    Les dispositions des paragraphes 1 et 2 ne sont pas applicables en cas de faute intentionnelle ou de négligence grave.
    L''existence d''un tel cas, ainsi que le montant de l''indemnisation afférente, sont établis d''un commun accord entre
    les Parties.4. La charge des indemnités versées pour la réparation des dommages causés à un tiers par des agents d''une
