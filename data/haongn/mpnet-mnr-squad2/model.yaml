widgetData:
- source_sentence: 'What is an ogonek? '
  sentences:
  - '“The roots of all our modern academic fields can be found within the pages of literature.”  Literature in all its forms
    can be seen as written records, whether the literature itself be factual or fictional, it is still quite possible to decipher
    facts through things like characters’ actions and words or the authors’ style of writing and the intent behind the words.
    The plot is for more than just entertainment purposes; within it lies information about economics, psychology, science,
    religions, politics, cultures, and social depth. Studying and analyzing literature becomes very important in terms of
    learning about our history. Through the study of past literature we are able to learn about how society has evolved and
    about the societal norms during each of the different periods all throughout history. This can even help us to understand
    references made in more modern literature because authors often make references to Greek mythology and other old religious
    texts or historical moments. Not only is there literature written on each of the aforementioned topics themselves, and
    how they have evolved throughout history (like a book about the history of economics or a book about evolution and science,
    for example) but we can also learn about these things in fictional works. Authors often include historical moments in
    their works, like when Lord Byron talks about the Spanish and the French in ‘‘Childe Harold’s Pilgrimage: Canto I’’ and
    expresses his opinions through his character Childe Harold. Through literature we are able to continuously uncover new
    information about history. It is easy to see how all academic fields have roots in literature. Information became easier
    to pass down from generation to generation once we began to write it down. Eventually everything was written down, from
    things like home remedies and cures for illness, or how to build shelter to traditions and religious practices. From there
    people were able to study literature, improve on ideas, further our knowledge, and academic fields such as the medical
    field or trades could be started. In much the same way as the literature that we study today continue to be updated as
    we continue to evolve and learn more and more.'
  - 'Darwin''s aims were twofold: to show that species had not been separately created, and to show that natural selection
    had been the chief agent of change. He knew that his readers were already familiar with the concept of transmutation of
    species from Vestiges, and his introduction ridicules that work as failing to provide a viable mechanism. Therefore, the
    first four chapters lay out his case that selection in nature, caused by the struggle for existence, is analogous to the
    selection of variations under domestication, and that the accumulation of adaptive variations provides a scientifically
    testable mechanism for evolutionary speciation.'
  - The set of graphic and format characters defined by Unicode does not correspond directly to the repertoire of abstract
    characters that is representable under Unicode. Unicode encodes characters by associating an abstract character with a
    particular code point. However, not all abstract characters are encoded as a single Unicode character, and some abstract
    characters may be represented in Unicode by a sequence of two or more characters. For example, a Latin small letter "i"
    with an ogonek, a dot above, and an acute accent, which is required in Lithuanian, is represented by the character sequence
    U+012F, U+0307, U+0301. Unicode maintains a list of uniquely named character sequences for abstract characters that are
    not directly encoded in Unicode.
- source_sentence: What island was invaded by the Eighth Army on February 28?
  sentences:
  - 'In January, Japan invaded Burma, the Dutch East Indies, New Guinea, the Solomon Islands and captured Manila, Kuala Lumpur
    and Rabaul. After being driven out of Malaya, Allied forces in Singapore attempted to resist the Japanese during the Battle
    of Singapore but surrendered to the Japanese on 15 February 1942; about 130,000 Indian, British, Australian and Dutch
    personnel became prisoners of war. The pace of conquest was rapid: Bali and Timor also fell in February. The rapid collapse
    of Allied resistance had left the "ABDA area" split in two. Wavell resigned from ABDACOM on 25 February, handing control
    of the ABDA Area to local commanders and returning to the post of Commander-in-Chief, India.'
  - Greenwich Mean Time (GMT) is an older standard, adopted starting with British railways in 1847. Using telescopes instead
    of atomic clocks, GMT was calibrated to the mean solar time at the Royal Observatory, Greenwich in the UK. Universal Time
    (UT) is the modern term for the international telescope-based system, adopted to replace "Greenwich Mean Time" in 1928
    by the International Astronomical Union. Observations at the Greenwich Observatory itself ceased in 1954, though the location
    is still used as the basis for the coordinate system. Because the rotational period of Earth is not perfectly constant,
    the duration of a second would vary if calibrated to a telescope-based standard like GMT or UT—in which a second was defined
    as a fraction of a day or year. The terms "GMT" and "Greenwich Mean Time" are sometimes used informally to refer to UT
    or UTC.
  - Palawan Island, between Borneo and Mindoro, the fifth largest and western-most Philippine Island, was invaded on 28 February
    with landings of the Eighth Army at Puerto Princesa. The Japanese put up little direct defense of Palawan, but cleaning
    up pockets of Japanese resistance lasted until late April, as the Japanese used their common tactic of withdrawing into
    the mountain jungles, dispersed as small units. Throughout the Philippines, U.S. forces were aided by Filipino guerrillas
    to find and dispatch the holdouts.
- source_sentence: How big is Saint Helena tropical Island?
  sentences:
  - Saint Helena (/ˌseɪnt həˈliːnə/ SAYNT-hə-LEE-nə) is a volcanic tropical island in the South Atlantic Ocean, 4,000 kilometres
    (2,500 mi) east of Rio de Janeiro and 1,950 kilometres (1,210 mi) west of the Cunene River, which marks the border between
    Namibia and Angola in southwestern Africa. It is part of the British Overseas Territory of Saint Helena, Ascension and
    Tristan da Cunha. Saint Helena measures about 16 by 8 kilometres (10 by 5 mi) and has a population of 4,255 (2008 census).
    It was named after Saint Helena of Constantinople.
  - In the far north, there is a division between Berber-descendent Tuareg nomad populations and the darker-skinned Bella
    or Tamasheq people, due the historical spread of slavery in the region. An estimated 800,000 people in Mali are descended
    from slaves. Slavery in Mali has persisted for centuries. The Arabic population kept slaves well into the 20th century,
    until slavery was suppressed by French authorities around the mid-20th century. There still persist certain hereditary
    servitude relationships, and according to some estimates, even today approximately 200,000 Malians are still enslaved.
  - 'As the primary former Capital of the Confederate States of America, Richmond is home to many museums and battlefields
    of the American Civil War. Near the riverfront is the Richmond National Battlefield Park Visitors Center and the American
    Civil War Center at Historic Tredegar, both housed in the former buildings of the Tredegar Iron Works, where much of the
    ordnance for the war was produced. In Court End, near the Virginia State Capitol, is the Museum of the Confederacy, along
    with the Davis Mansion, also known as the White House of the Confederacy; both feature a wide variety of objects and material
    from the era. The temporary home of former Confederate General Robert E. Lee still stands on Franklin Street in downtown
    Richmond. The history of slavery and emancipation are also increasingly represented: there is a former slave trail along
    the river that leads to Ancarrow''s Boat Ramp and Historic Site which has been developed with interpretive signage, and
    in 2007, the Reconciliation Statue was placed in Shockoe Bottom, with parallel statues placed in Liverpool and Benin representing
    points of the Triangle Trade.'
- source_sentence: What sound formatting do DVDs use?
  sentences:
  - '1 STOBAR carrier: Admiral Flota Sovetskovo Soyuza Kuznetsov: 55,000 tonne Admiral Kuznetsov-class STOBAR aircraft carrier.
    Launched in 1985 as Tbilisi, renamed and operational from 1995. Without catapults she can launch and recover lightly fueled
    naval fighters for air defense or anti-ship missions but not heavy conventional bombing strikes.[citation needed] Officially
    designated an aircraft carrying cruiser, she is unique in carrying a heavy cruiser''s complement of defensive weapons
    and large P-700 Granit offensive missiles. The P-700 systems will be removed in the coming refit to enlarge her below
    decks aviation facilities as well as upgrading her defensive systems.'
  - 'Sound could be stored in either analog or digital format and in a variety of surround sound formats; NTSC discs could
    carry two analog audio tracks, plus two uncompressed PCM digital audio tracks, which were (EFM, CIRC, 16-bit and 44.056
    kHz sample rate). PAL discs could carry one pair of audio tracks, either analog or digital and the digital tracks on a
    PAL disc were 16-bit 44.1 kHz as on a CD; in the UK, the term "LaserVision" is used to refer to discs with analog sound,
    while "LaserDisc" is used for those with digital audio. The digital sound signal in both formats are EFM-encoded as in
    CD. Dolby Digital (also called AC-3) and DTS—which are now common on DVD titles—first became available on LaserDisc, and
    Star Wars: Episode I – The Phantom Menace (1999) which was released on LaserDisc in Japan, is among the first home video
    releases ever to include 6.1 channel Dolby Digital EX Surround. Unlike DVDs, which carry Dolby Digital audio in digital
    form, LaserDiscs store Dolby Digital in a frequency modulated form within a track normally used for analog audio. Extracting
    Dolby Digital from a LaserDisc required a player equipped with a special "AC-3 RF" output and an external demodulator
    in addition to an AC-3 decoder. The demodulator was necessary to convert the 2.88 MHz modulated AC-3 information on the
    disc into a 384 kbit/s signal that the decoder could handle. DTS audio, when available on a disc, replaced the digital
    audio tracks; hearing DTS sound required only an S/PDIF compliant digital connection to a DTS decoder.'
  - Congo's democratic progress was derailed in 1997 when Lissouba and Sassou started to fight for power in the civil war.
    As presidential elections scheduled for July 1997 approached, tensions between the Lissouba and Sassou camps mounted.
    On June 5, President Lissouba's government forces surrounded Sassou's compound in Brazzaville and Sassou ordered members
    of his private militia (known as "Cobras") to resist. Thus began a four-month conflict that destroyed or damaged much
    of Brazzaville and caused tens of thousands of civilian deaths. In early October, the Angolan socialist régime began an
    invasion of Congo to install Sassou in power. In mid-October, the Lissouba government fell. Soon thereafter, Sassou declared
    himself president.
- source_sentence: When did the Fed begin raising Fed funds rate significantly?
  sentences:
  - The Fed then raised the Fed funds rate significantly between July 2004 and July 2006. This contributed to an increase
    in 1-year and 5-year adjustable-rate mortgage (ARM) rates, making ARM interest rate resets more expensive for homeowners.
    This may have also contributed to the deflating of the housing bubble, as asset prices generally move inversely to interest
    rates, and it became riskier to speculate in housing. U.S. housing and financial assets dramatically declined in value
    after the housing bubble burst.
  - The Xbox Live Marketplace is a virtual market designed for the console that allows Xbox Live users to download purchased
    or promotional content. The service offers movie and game trailers, game demos, Xbox Live Arcade games and Xbox 360 Dashboard
    themes as well as add-on game content (items, costumes, levels etc.). These features are available to both Free and Gold
    members on Xbox Live. A hard drive or memory unit is required to store products purchased from Xbox Live Marketplace.
    In order to download priced content, users are required to purchase Microsoft Points for use as scrip; though some products
    (such as trailers and demos) are free to download. Microsoft Points can be obtained through prepaid cards in 1,600 and
    4,000-point denominations. Microsoft Points can also be purchased through Xbox Live with a credit card in 500, 1,000,
    2,000 and 5,000-point denominations. Users are able to view items available to download on the service through a PC via
    the Xbox Live Marketplace website. An estimated seventy percent of Xbox Live users have downloaded items from the Marketplace.
  - There has been an increasing gulf between the Premier League and the Football League. Since its split with the Football
    League, many established clubs in the Premier League have managed to distance themselves from their counterparts in lower
    leagues. Owing in large part to the disparity in revenue from television rights between the leagues, many newly promoted
    teams have found it difficult to avoid relegation in their first season in the Premier League. In every season except
    2001–02 and 2011–12, at least one Premier League newcomer has been relegated back to the Football League. In 1997–98 all
    three promoted clubs were relegated at the end of the season.
