  - SELECT COUNT(*) AS total_orders FROM orders WHERE order_date >= DATE('now', '-6 months');
  - SELECT p.category, SUM(oi.subtotal) AS total_revenue FROM order_items oi JOIN products p ON oi.product_id = p.product_id
