widgetData:
- source_sentence: 'Tröja Elmar Sticka en tröja med runt ok, stickas i garnet Bamboo från Viking of Norway!Rekommenderade
    stickor: Rundsticka 2,5 och 3,5, rek längd 40 och 80 cmStrumpsticka 2,5 och 3,5 mm brand: Viking of Norway. color: Rosa.'
  sentences:
  - 'Väst Sticka denna klädsamma väst i garnet Amira från Langyarn.Tillbehör: Stickor 5mm och 7mm. &#43; 40cm rundsticka 5mm
    brand: Lang Yarns. color: Rosa.'
  - 'Hækleopskrift Pude Fin hæklet pude i garnet Wool Cotton og Nalle fra Novita.Tilbehør: Hæklenål 3,5 mm samt inderpude
    50x50 cm. brand: Novita. '
  - 'Virkad gardinkappa och omtag Kerstin Storlek gardinkappa: ca 150x50 cm.Storlek omtag: 6x50 cm.Garnåtgång: 8 n.Tillbehör:
    Virknål 2 mm. brand: Järbo. '
- source_sentence: 'Linne Nicki Vackert Linne i garnet Tilda från Svarta Fåret!Tillbehör:Stickor 3,5 mm. Flätsticka. brand:
    Svarta Fåret. '
  sentences:
  - 'Paint By Numbers Safari i solnedgången Ett mäktigt motiv av en elefantflock som vandrar genom savannen i gyllene kvällssol.
    En exotisk tavla som förmedlar styrka, frihet och Afrikas magi. En avkopplande hobby för dig som gillar att måla!Mönstret
    är logiskt och lätt att följa. Du matchar helt enkelt färgnumret med samma nummer som det står på målarduken. I detta
    kit ingår allt som behövs för att skapa just ditt mästerverk.Innehåller: 3 nylonborstar med trähandtag, mönster, bomullscanvas
    och vattenbaserad akrylfärg, fästen till vägg samt instruktionsbok på 15 olika språk &#43; QR-kod med videoinstruktioner.
    Storlek ca 30x40 cm.OBS! Sitter på en underram av trä. brand: Varvikas. '
  - 'Linne Alma Utforska förtrollningen av sommaren med vårt stickade linne i garnet Angel från Permin. Detta linne är en
    perfekt kombination av feminin charm och lätthet, som kommer att föra fram din naturliga skönhet.Rekomenderade stickor:
    Rundsticka 5 mm (60 eller 80 cm)Strumpsticka 4 mm brand: Permin. '
  - '3-dels set Förvaringskorg + 2st kökshanddukar Stilrent 3-delat köks set i härliga gröna toner Ge ditt kök en fräsch och
    harmonisk känsla med detta köks set , perfekt för både vardag och dukade helgfrukostar. Setet består av en enfärgad förvaringskorg/brödkorg
    samt två matchande kökshanddukar med vackra vävda ränder som ger ett tidlöst och stilrent uttryck. Brödkorgen rymmer frallor,
    bröd eller frukt och blir en fin detalj på köksbordet. De två kökshanddukarna passar lika bra för torkning av porslin
    som för att hänga framme som en dekorativ köksdetalj. Den lugna gröna färgen lyfter kökets helhetsintryck och skapar en
    enhetlig känsla. De vävda ränderna på handdukarna ger extra struktur och ett klassiskt hantverksinspirerat utseende. Storlek:
    korg ø 20cm, kökshanddukar 50x70cm Färg: grön/offwhite Material: 99% återvunnet material (80% återvunnen bomull och 20%
    återvunnen polyester) Tvättråd: 40° brand: Recycled by Wille. color: Grön.'
- source_sentence: 'Melerad Ljuslykta/Kruka/Vas Nova Vacker lykta av glas som också passar bra att använda som en liten vas/kruka.
    Lyktan har vissa färgskiftningar som skapar ett vackert sken i rummet. Finns i flera storlekar och färger, matcha dem
    med fördel tillsammans för en ombonad och stämningsfull look. Material: glasSkötselråd: rengörs för hand brand: Linea.
    color: Grå.'
  sentences:
  - 'JuldekorationTittut Tomtepar Hjärta Två kärleksfulla tomtenissar som står och håller om varandra med ett stort leende
    på läpparna. En gullig dekoration som sprider kärlek och glädje i hemmet. Fin att dekorera med i juletider, men passar
    lika fint att låta stå framme året om. Storlek: höjd 11 cmFärg: gråMaterial: polyresinRuth Vetter är en inspirerade formgivare
    som bor i Onsala, Sverige. Ruth gör bruksföremål och figurer i lera och överför mönster från stengods till textil. brand:
    Nääsgränsgården. color: Grå.'
  - 'Strikkeoppskrift Sløyfe Sløyfepannebånd strikke i garnet Wool Cotton fra Novita!Tilbehør: Pinner 4 og 6 mm. brand: Novita. '
  - 'Korsstygnskit Söt Björn Detta fantastiska korsstygnkit är ett set från Artibalta för att brodera på kläder, väskor eller
    andra textiler. Det innehåller allt du behöver för att skapa en unik och handgjord dekoration! Med högkvalitativa material
    och detaljerade instruktioner kan både nybörjare och erfarna brodöser njuta av skapandet av ett vackert konstverk. Med
    detta kit kan du dekorera olika delar av kläder och tillbehör, och skapa en personlig touch. Varje kit innehåller vattenlöslig
    canvas, trådar, nål och instruktioner för att göra broderiprocessen enkel och njutbar. Ge dina kläder en unik och stilfull
    look! brand: M.P Studia. '
- source_sentence: 'Broderikit Flaskförkläden Tomtetroll 3-pack Broderas med moulinégarn i räknade kors- och efterstygn på
    vit aidaväv. 5,4 rutor/cm. Färdigfållade. Storlek ca 10x15 cm. brand: Permin. material: Aida.'
  sentences:
  - 'Plastic canvas Boo - 5 pack Detta bedårande broderikit kombinerar höstmys och Halloweenbus i ett pastellfärgat tema.
    Med glada spöken med rosetter, en svart katt med blomkrona, söta pumpor och en gravsten pyntad med blommor, får du ett
    projekt som är både festligt och gulligt – inte skrämmande alls! Broderas med moulinégarn i räknade kors- och efterstygn
    på plastic canvas. Storlek ca 9 cm/5st. brand: LetiStitch. material: Plastic canvas.'
  - 'Hekleoppskrift Dyriske ryggsekker Hekle søte ryggsekker med dyremotiv i garnet Soft Cotton fra Järbo Garn!Tilbehør: Heklenål
    4 mm og fyllvatt.Katt: 2-3 meter rødt restegarn og 1 meter blått.Kylling: 2-3 meter svart restegarn.Kanin: 2-3 meter svart
    restegarn og 1 meter blått og hvitt restegarn.Frosk: 10 meter svart restegarn. brand: Järbo. '
  - 'Balaklava Naomi En söt och varm balaklava för barn – perfekt för kyliga dagar! Den stickas i mjukt och fluffigt garn
    som gör den både gosig och bekväm att bära. Täcker huvud, öron och hals, så man håller sig varm hela vintern. Rekommenderade
    stickor: Rundsticka 6 mm (40 &amp; 60 cm). brand: Gjestal Garn. '
- source_sentence: 'Raggsockor Mellanraggi Klassiska raggsockor i garnet Mellanraggi från Järbo!Tillbehör: Strumpstickor 2,5
    och 3 mm. brand: Järbo. '
  sentences:
  - 'Halsduk Snø Sticka en mysig halsduk i garnet Sportsragg från Viking of Norway.Tillbehör: Rundsticka 3,5 rekomenderad
    längd 60 eller 80 cm. brand: Viking of Norway. '
  - 'Broderikit Bonad Ute i det gröna Broderas med moulinégarn i räknade kors- och efterstygn på vit aidaväv, 4,4 rutor/cm.
    Storlek ca 45x21 cm. brand: Svarta Fåret. material: Aida.'
  - 'Sockor Regnbåge Varma och sköna sockar stickade i garnet Viking Sportsragg!Tillbehör: Strumpstickor 3 mm och 3,5 mm.
    brand: Viking of Norway. '
