- source_sentence: The Federal Energy Regulatory Commission (“FERC”) has also taken steps to enable the participation of energy
    storage in wholesale energy markets.
  sentences:
  - What segment-specific regulations apply to CVS Health Corporation's Pharmacy & Consumer Wellness segment?
  - What types of contracts does the company have for its health insurance plans, and how does premium revenue recognition
    function under these contracts?
  - What federal agency has taken steps to facilitate energy storage participation in wholesale energy markets?
- source_sentence: Investments in subsidiaries and partnerships which we do not control but have significant influence are
    accounted for under the equity method.
  sentences:
  - How does the company aim to protect the health and well-being of the communities it operates in?
  - What are the key factors affecting the evaluation of the Economic Value of Equity (EVE) at the Charles Schwab Corporation?
  - What accounting method does the company use to account for investments in subsidiaries and partnerships where it does
    not control but has significant influence?
- source_sentence: Item 8 of IBM's 2023 Annual Report includes financial statements and supplementary data spanning pages
    44 through 121.
  sentences:
  - What entities are included among the Guarantors that guarantee each other’s debt securities as described in Comcast’s
    2023 Annual Report?
  - What uncertainties exist regarding projections of future cash needs and cash flows?
  - How many pages in IBM's 2023 Annual Report to Stockholders are dedicated to financial statements and supplementary data?
- source_sentence: 'Our compensation philosophy creates the framework for our rewards strategy, which focuses on five key
    elements: pay-for-performance, external market-based research, internal equity, fiscal responsibility, and legal compliance.'
  sentences:
  - What financial instruments does the company invest in that are sensitive to interest rates?
  - What elements are included in the company's compensation programs?
  - What is the expected maximum potential loss from hurricane events for Chubb as of the end of 2023?
- source_sentence: Outside of the U.S., many countries have established vehicle safety standards and regulations and are likely
    to adopt additional, more stringent requirements in the future.
  sentences:
  - What percentage of the company's sales categories in fiscal 2023 were failure and maintenance related?
  - What competitive factors influence Chubb International's international operations?
  - What changes are occurring with vehicle safety regulations outside of the U.S.?
