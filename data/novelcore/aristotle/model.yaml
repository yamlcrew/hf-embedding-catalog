- source_sentence: Πόσα χρόνια προϋπηρεσίας απαιτούνται για τους Υπαστυνόμους Α΄ σύμφωνα με το άρθρο 4 του ΠΔ 24/1997;
  sentences:
  - 'Τίτλος: ΝΟΜΟΣ ΥΠ'' ΑΡΙΘΜ. 4662

    Έτος: 2020

    Εθνικός Μηχανισμός Διαχείρισης Κρίσεων και Αντιμετώπισης Κινδύνων, αναδιάρθρωση της Γενικής Γραμματείας Πολιτικής Προστασίας,
    αναβάθμιση συστήματος εθελοντισμού πολιτικής προστασίας, αναδιοργάνωση του Πυροσβεστικού και άλλες διατάξεις.

    Άρθρο 27

    Τίτλος άρθρου: Οργανωμένη προληπτική απομάκρυνση πολιτών

    1. Η οργανωμένη προληπτική απομάκρυνση πολιτών από μια περιοχή (ολική ή μερική) αποτελεί προληπτικό μέτρο πολιτικής προστασίας
    και οργανώνεται για την προστασία της ζωής και της υγείας των πολιτών, όταν τεκμηριωμένα μία περιοχή εκτιμάται ότι, απειλείται
    από εξελισσόμενη ή επικείμενη καταστροφή και ο κίνδυνος λόγω της παραμονής των πολιτών σε αυτή είναι σοβαρός.

    2. Η απόφαση για την οργανωμένη προληπτική απομάκρυνση πολιτών λαμβάνεται, σύμφωνα με το άρθρο 29 και σύμφωνα με το κείμενο
    θεσμικό πλαίσιο, τις κατευθυντήριες οδηγίες, εγκυκλίους και κανονιστικές πράξεις της διοίκησης αναφορικά με αυτή και το
    οποίο παραμένει σε ισχύ και μετά τη δημοσίευση του παρόντος νόμου. Τυχόν ειδικότερα ζητήματα, που δεν συμπεριλαμβάνονται
    στα ανωτέρω, ρυθμίζονται με κοινή απόφαση του Υπουργού Προστασίας του Πολίτη και των εκάστοτε συναρμόδιων Υπουργών, μετά
    από εισήγηση του Γενικού Γραμματέα Πολιτικής Προστασίας.

    ΚΕΦΑΛΑΙΟ Δ΄

    ΓΕΝΙΚΗ ΓΡΑΜΜΑΤΕΙΑ ΠΟΛΙΤΙΚΗΣ ΠΡΟΣΤΑΣΙΑΣ

    ΤΜΗΜΑ Α΄

    ΑΠΟΣΤΟΛΗ - ΑΡΜΟΔΙΟΤΗΤΕΣ ΓΕΝΙΚΗΣ

    ΓΡΑΜΜΑΤΕΙΑΣ ΠΟΛΙΤΙΚΗΣ ΠΡΟΣΤΑΣΙΑΣ.'
