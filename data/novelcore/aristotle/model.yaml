  - source_sentence: Πόσα χρόνια προϋπηρεσίας απαιτούνται για τους Υπαστυνόμους Α΄ σύμφωνα με το άρθρο 4 του ΠΔ 24/1997;
    sentences:
    - 'Τίτλος: ΝΟΜΟΣ ΥΠ'' ΑΡΙΘΜ. 4662

      Έτος: 2020

      Εθνικός Μηχανισμός Διαχείρισης Κρίσεων και Αντιμετώπισης Κινδύνων, αναδιάρθρωση της Γενικής Γραμματείας Πολιτικής Προστασίας,
      αναβάθμιση συστήματος εθελοντισμού πολιτικής προστασίας, αναδιοργάνωση του Πυροσβεστικού και άλλες διατάξεις.

      Άρθρο 27

      Τίτλος άρθρου: Οργανωμένη προληπτική απομάκρυνση πολιτών

      1. Η οργανωμένη προληπτική απομάκρυνση πολιτών από μια περιοχή (ολική ή μερική) αποτελεί προληπτικό μέτρο πολιτικής
      προστασίας και οργανώνεται για την προστασία της ζωής και της υγείας των πολιτών, όταν τεκμηριωμένα μία περιοχή εκτιμάται
      ότι, απειλείται από εξελισσόμενη ή επικείμενη καταστροφή και ο κίνδυνος λόγω της παραμονής των πολιτών σε αυτή είναι
      σοβαρός.

      2. Η απόφαση για την οργανωμένη προληπτική απομάκρυνση πολιτών λαμβάνεται, σύμφωνα με το άρθρο 29 και σύμφωνα με το
      κείμενο θεσμικό πλαίσιο, τις κατευθυντήριες οδηγίες, εγκυκλίους και κανονιστικές πράξεις της διοίκησης αναφορικά με
      αυτή και το οποίο παραμένει σε ισχύ και μετά τη δημοσίευση του παρόντος νόμου. Τυχόν ειδικότερα ζητήματα, που δεν συμπεριλαμβάνονται
      στα ανωτέρω, ρυθμίζονται με κοινή απόφαση του Υπουργού Προστασίας του Πολίτη και των εκάστοτε συναρμόδιων Υπουργών,
      μετά από εισήγηση του Γενικού Γραμματέα Πολιτικής Προστασίας.

      ΚΕΦΑΛΑΙΟ Δ΄

      ΓΕΝΙΚΗ ΓΡΑΜΜΑΤΕΙΑ ΠΟΛΙΤΙΚΗΣ ΠΡΟΣΤΑΣΙΑΣ

      ΤΜΗΜΑ Α΄

      ΑΠΟΣΤΟΛΗ - ΑΡΜΟΔΙΟΤΗΤΕΣ ΓΕΝΙΚΗΣ

      ΓΡΑΜΜΑΤΕΙΑΣ ΠΟΛΙΤΙΚΗΣ ΠΡΟΣΤΑΣΙΑΣ.'
    - 'Τίτλος: ΠΡΟΕΔΡΙΚΟ ΔΙΑΤΑΓΜΑ ΥΠ'' ΑΡΙΘΜ. 81

      Έτος: 2016

      Ρύθμιση θεμάτων αστυνομικού προσωπικού.

      Άρθρο 4

      Οι περιπτώσεις α΄, β΄, γ΄ και δ΄ της παραγράφου 1 του άρθρου 42 του Πδ. 24/1997, αντικαθίστανται ως εξής:

      «α. Οι Υπαστυνόμοι Α΄ 11 έτη.

      β. Οι Αστυνόμοι Β΄ 17 έτη.

      γ. Οι Αστυνόμοι Α΄ 23 έτη.

      δ. Οι Αστυνομικοί Υποδιευθυντές 29 έτη.».'
    - 'Τίτλος: ΠΡΟΕΔΡΙΚΟ ΔΙΑΤΑΓΜΑ ΥΠ'' ΑΡΙΘΜ. 94

      Έτος: 1998

      Σύσταση ενιαίας επιχείρησης ύδρευσης - αποχέτευσης με την επωνυμία «ΔΗΜΟΤΙΚΗ ΕΠΙΧΕΙΡΗΣΗ ΥΔΡΕΥΣΗΣ - ΑΠΟΧΕΤΕΥΣΗΣ ΤΗΛΟΥ»
      στο Δήμο Τήλου του Νομού Δωδεκανήσου.

      Άρθρο 5

      Τίτλος άρθρου: Διοίκηση

      1. Η επιχείρηση διοικείται από Διοικητικό Συμβούλιο που αποτελείται από έξι (6) μέλη τα οποία ορίζονται με αναπληρωτές
      τους από το Δημοτικό Συμβούλιο. Από τα μέλη αυτά:

      α. Τέσσερα (4) είναι αιρετοί εκπρόσωποι του Δήμου, εκ των οποίων τα δύο προέρχονται από τη μειοψηφία.

      β. Ένα (1) είναι δημότης ή κάτοικος του Δήμου Τήλου που έχει πείρα ή γνώσεις σχετικές με το αντικείμενο του Επιχείρησης.

      γ. Ένα (1) είναι εκπρόσωπος του Κοινωνικού φορέα της Περιοχής (Αγροτικού Συνεταιρισμού).

      δ. Στα μέλη του Διοικητικού Συμβουλίου προστίθεται και εκπρόσωπος των εργαζομένων (χωρίς αλλαγή της συστατικής πράξης)
      όταν η επιχείρηση απασχολεί περισσότερους από είκοσι εργαζόμενους.

      Ο εκπρόσωπος των εργαζομένων και του Κοινωνικού Φορέα προτείνονται από τους οικείους φορείς.

      2. Το Δημοτικό συμβούλιο ορίζει τα μέλη του διοικητικού συμβουλίου τον Πρόεδρο και τον Αντιπρόεδρό του (άρθρο 3 παρ.
      1 του Ν 1069/80 και άρθρο 278 ΠΔ 410/95).

      3. Η θητεία του Διοικητικού Συμβουλίου ακολουθεί τη θητεία του Δημοτικού Συμβουλίου και λήγει μόλις εγκατασταθούν τα
      νέα μέλη (άρθρο 2 παρ. 2 της 25027/84 ΦΕΚ Β’/244 αποφ. Υπ. Εσωτερικών).

      4. Ο Πρόεδρος του Διοικητικού Συμβουλίου και σε περίπτωση απουσίας ή κωλύματός του, ο Αντιπρόεδρος, εκπροσωπεί την επιχείρηση
      σε όλες τις σχέσεις της, δικαστικές ή εξώδικες (άρθρο 5 παρ. 4 Ν 1069/80).

      Στον Υφυπουργό Εσωτερικών, Δημόσιας ς και Αποκέντρωσης αναθέτουμε τη δημοσίευση και εκτέλεση του παρόντος διατάγματος.'
  - source_sentence: Η εγκατάσταση και λειτουργία ηλεκτρονικών υπολογιστών σε επιχειρήσεις προσφοράς υπηρεσιών διαδικτύου
      δεν εμπίπτει στην απαγόρευση παιγνίων.
    sentences:
    - 'Τίτλος: ΝΟΜΟΣ ΥΠ'' ΑΡΙΘΜ. 3935

      Έτος: 2011

      Κύρωση της Συμφωνίας μεταξύ της Κυβέρνησης της Ελληνικής Δημοκρατίας και της Κυβέρνησης της Δημοκρατίας της Σερβίας
      σχετικά με τη συνεργασία για την πρόληψη και την καταπολέμηση του εγκλήματος και ιδιαίτερα των οργανωμένων μορφών του.

      Άρθρο δεύτερο

      Η ισχύς του παρόντος νόμου αρχίζει από τη δημοσίευσή του στην Εφημερίδα της Κυβερνήσεως και της Συμφωνίας, που κυρώνεται
      από την πλήρωση των προϋ­ποθέσεων του άρθρου 11 αυτής.

      Παραγγέλλομε τη δημοσίευση του παρόντος στην Εφημερίδα της Κυβερνήσεως και την εκτέλεσή του ως νόμου του Κράτους.'
    - "Τίτλος: ΠΡΟΕΔΡΙΚΟ ΔΙΑΤΑΓΜΑ ΥΠ' ΑΡΙΘΜ. 15\nΈτος: 2001\nΠερί Οργανισμού Σχολών Αρχηγείου Στόλου (Ο/ΣΑΣ).\nΆρθρο 28\n\
      Τίτλος άρθρου: Πτυχία - Πιστοποιητικά\n1. Στους μαθητές που επιτυγχάνουν στις τελικές εξετάσεις Σχολείου, απονέμονται\
      \ από τις Σχολές Πτυχία ή Πιστοποιητικά που είναι σύμφωνα με τα ακόλουθα υποδείγματα :\nα. Υπόδειγμα Πτυχίου\n(Θυρεός\
      \ Σχολής)\nΣΧΟΛΗ .\nΠΤΥΧΙΟ .\nΟ .παρακολούθησε τα μαθήματα που καθορίζονται από τον Κανονισμό Εκπαιδεύσεως του Σχολείου\
      \ . και αφού υποβλήθηκε στις προβλεπόμενες εξετάσεις, στις οποίες συγκέντρωσε το . της συνολικής βαθμολογίας, κρίθηκε\
      \ άξιος να λάβει Πτυχίο . τάξης.\nΤόπος - Ημερομηνία .\nΟ ΔΙΕΥΘΥΝΤΗΣ ΣΠΟΥΔΩΝ \t Ο ΔΙΟΙΚΗΤΗΣ\nβ. Υπόδειγμα Πιστοποιητικού\n\
      (Θυρεός Σχολής)\nΣΧΟΛΗ .\nΠΙΣΤΟΠΟΙΗΤΙΚΟ .\nΟ .παρακολούθησε τα μαθήματα που καθορίζονται από τον Κανονισμό Εκπαιδεύσεως\
      \ του Σχολείου . και αφού υποβλήθηκε στις προβλεπόμενες εξετάσεις, στις οποίες συγκέντρωσε το . της συνολικής βαθμολογίας,\
      \ κρίθηκε άξιος να λάβει Πιστοποιητικό . τάξης.\nΤόπος - Ημερομηνία .\nΟ ΔΙΕΥΘΥΝΤΗΣ ΣΠΟΥΔΩΝ\t Ο ΔΙΟΙΚΗΤΗΣ\n2. Τα Πτυχία\
      \ ή Πιστοποιητικά έχουν την ακόλουθη διαβάθμιση ανάλογα με την απόδοση του μαθητή στις εξετάσεις και την συνολική βαθμολογία\
      \ που συγκέντρωσε:\nα. Πτυχίο ή Πιστοποιητικό Δ’ Τάξης, εφόσον ο μαθητής συγκεντρώσει βαθμολογία 50% έως 59,99% της\
      \ ανώτατης συνολικής βαθμολογίας του Σχολείου.\nβ. Πτυχίο ή Πιστοποιητικό Γ΄ Τάξης, εφόσον ο μαθητής συγκεντρώσει βαθμολογία\
      \ 60% έως 74,99% της ανώτατης συνολικής βαθμολογίας του Σχολείου,\nγ. Πτυχίο ή Πιστοποιητικό Β’ Τάξης,εφόσον ο μαθητής\
      \ συγκεντρώσει βαθμολογία 75% έως 94,99% της ανώτατης συνολικής βαθμολογίας του Σχολείου.\nδ. Πτυχίο ή Πιστοποιητικό\
      \ Α’ Τάξης, εφόσον ο μαθητής συγκεντρώσει βαθμολογία 95% έως 100% της ανώτατης συνολικής βαθμολογίας του Σχολείου."
    - 'Τίτλος: ΝΟΜΟΣ ΥΠ'' ΑΡΙΘΜ. 3037

      Έτος: 2002

      Απαγόρευση παιγνίων.

      Άρθρο 3

      Τίτλος άρθρου: Επιχειρήσεις προσφοράς υπηρεσιών διαδικτύου

      Δεν εμπίπτει στην απαγόρευση που ορίζεται στο άρθρο 2 η εγκατάσταση και λειτουργία ηλεκτρονικών υπολογιστών σε καταστήματα
      που λειτουργούν ως επιχειρήσεις προσφοράς υπηρεσιών διαδικτύου. Η διενέργεια, όμως, παιγνίου με τους υπολογιστές αυτούς,
      ανεξάρτητα από τον τρόπο διενέργειάς του, απαγορεύεται.

      Για τη λειτουργία επιχείρησης προσφοράς υπηρεσιών διαδικτύου απαιτείται ειδική αδεία του δήμου η της κοινότητας στην
      περιφέρεια του οποίου βρίσκεται το κατάστημα και αν λειτουργεί σε πλοίο της Λιμενικής Αρχής του αφετηρίου λιμένα. Κατά
      την πρώτη εφαρμογή του μέτρου η επιχείρηση πρέπει να εφοδιαστεί με την αδεία αυτή εντός τριών (3) μηνών από την έναρξη
      ισχύος του νομού αυτού.'
