  - 'Τίτλος: ΝΟΜΟΣ ΥΠ'' ΑΡΙΘΜ. 4278

    Έτος: 2014

    Φάροι, Στρατολογία και άλλες διατάξεις.

    Άρθρο 27

    Τίτλος άρθρου: Εξαγορά –Άρση Πρόσθετων Στρατιωτικών Υποχρεώσεων

    Η περίπτωση γ΄ της παρ. 5 του άρθρου 43 του ν. 3421/2005 αντικαθίσταται ως εξής:

    «γ. Η Διοίκηση Στρατολογικών Υπηρεσιών αποφασίζει οριστικά και αιτιολογημένα για την αποδοχή ή την απόρριψη της αίτησης,
    κοινοποιώντας την απόφασή της στη μονάδα του ενδιαφερομένου για την ενημέρωση των ατομικών του εγγράφων και του ίδιου,
    καθώς και στην αρμόδια Στρατολογική Υπηρεσία. Η αλληλογραφία τηρείται στο αρχείο της Διοίκησης Στρατολογικών Υπηρεσιών.».'
  - 'Τίτλος: ΝΟΜΟΣ ΥΠ'' ΑΡΙΘΜ. 3467

    Έτος: 2006

    Επιλογή στελεχών πρωτοβάθμιας και δευτεροβάθμιας εκπαίδευσης, ρύθμιση θεμάτων διοίκησης και εκπαίδευσης και άλλες διατάξεις.

    Άρθρο 1

    Τίτλος άρθρου: Πίνακες Πίνακες επιλογής στελεχών Δημόσιας Εκπαίδευσης

    1. Η επιλογή και τοποθέτηση των στελεχών της δημόσιας εκπαίδευσης στις κενές θέσεις γίνεται για τετραετή θητεία και στις
    κενούμενες θέσεις για το υπόλοιπο της θητείας αυτής.

    2. Για την πλήρωση των ανωτέρω θέσεων, καταρτίζονται σύμφωνα με τις διατάξεις των επόμενων άρθρων οι παρακάτω αξιολογικοί
    πίνακες επιλογής, που ισχύουν για τέσσερα έτη:

    α) Σχολικών συμβούλων δημοτικής εκπαίδευσης

    β) Σχολικών συμβούλων προσχολικής αγωγής

    γ) Σχολικών συμβούλων ειδικής αγωγής

    δ) Σχολικών συμβούλων δευτεροβάθμιας εκπαίδευσης κατά κλάδους και ειδικότητες

    ε) Διευθυντών πρωτοβάθμιας εκπαίδευσης

    στ) Διευθυντών δευτεροβάθμιας εκπαίδευσης

    ζ) Προϊσταμένων γραφείων πρωτοβάθμιας εκπαίδευσης

    η) Προϊσταμένων γραφείων δευτεροβάθμιας εκπαίδευσης

    θ) Προϊσταμένων γραφείων φυσικής αγωγής

    ι) Προϊσταμένων γραφείων τεχνικής επαγγελματικής εκπαίδευσης

    ια) Διευθυντών δημοτικών σχολείων

    ιβ) Διευθυντών γυμνασίων

    ιγ) Διευθυντών ενιαίων λυκείων

    ιδ) Διευθυντών τεχνικών επαγγελματικών εκπαιδευτηρίων

    ιε) Διευθυντών σχολικών εργαστηριακών κέντρων (ΣΕΚ)

    ιστ) Διευθυντών σχολικών μονάδων ειδικής αγωγής πρωτοβάθμιας εκπαίδευσης

    ιζ) Διευθυντών γυμνασίων ειδικής αγωγής

    ιη) Διευθυντών ενιαίων λυκείων ειδικής αγωγής

    ιθ) Διευθυντών τεχνικών επαγγελματικών εκπαιδευτηρίων ειδικής αγωγής α΄ και β΄ βαθμίδας

    κ) Διευθυντών πειραματικών δημοτικών σχολείων

    κα) Διευθυντών πειραματικών γυμνασίων

    κβ) Διευθυντών πειραματικών λυκείων

    κγ) Διευθυντών μουσικών σχολείων (γυμνασίων- λυκείων)

    κδ) Διευθυντών εργαστηρίων ειδικής επαγγελματικής εκπαίδευσης και κατάρτισης

    κε) Διευθυντών πειραματικών δημοτικών σχολείων των πανεπιστημίων

    κστ) Διευθυντών πειραματικών γυμνασίων των πανεπιστημίων

    κζ) Διευθυντών πειραματικών λυκείων των πανεπιστημίων.'
- source_sentence: ακίνητο, αμοιβή εκτίμησης, αναγκαστική εκτέλεση, επισπεύδων
  sentences:
  - 'Τίτλος: ΠΡΟΕΔΡΙΚΟ ΔΙΑΤΑΓΜΑ ΥΠ'' ΑΡΙΘΜ. 208

    Έτος: 1996

    Καθιέρωση συστήματος μεταθέσεων υπαλλήλων της Γενικής Γραμματείας της Εθνικής Στατιστικής Υπηρεσίας της Ελλάδος με αντικειμενικά
    κριτήρια.

    Άρθρο 7

    Τίτλος άρθρου: Πίνακας μεταθετέων υπαλλήλων

    1. Μέχρι την 31 η Ιανουαρίου κάθε έτους η Δ/νση Διοικ. Υποστήριξης καταρτίζει πίνακες μεταθετέων που περιλαμβάνουν όλους
    τους υπαλλήλους κατά κλάδο και βαθμό ή ειδικότητα που σύμφωνα με τις οργανικές διατάξεις μετατίθενται για την κάλυψη των
    κενών οργανικών θέσεων. Για κάθε κλάδο καταρτίζονται οι ακόλουθοι πίνακες:

    α) Προϊσταμένων Διευθύνσεων

    β) Προϊσταμένων Τμημάτων

    γ) Υπαλλήλων,

    οι οποίοι περιέχουν για τον καθένα: το ονοματεπώνυμο, το όνομα πατρός ή συζύγου, το έτος γέννησης, το συνολικό χρόνο υπηρεσίας,
    την Υπηρεσία στην οποία υπηρετεί (ΚΥ ή ΥΣΝ) καθώς και τον αριθμό μορίων που συγκεντρώνει μέχρι 31 Δεκεμβρίου του προηγούμενου
    έτους, αναλυτικά κατά κριτήριο και συνολικά, σύμφωνα με τις διατάξεις του παρόντος Π Δ/τος.

    2. Η σειρά εγγραφής στον πίνακα μεταθετέων θα γίνεται ανάλογα με το συνολικό αριθμό μορίων που συγκεντρώνει ο υπάλληλος,
    με βάση τα στοιχεία του προσωπικού του μητρώου και τα λοιπά πιστοποιητικά που έχει υποβάλει. Στον πίνακα προηγούνται οι
    υπάλληλοι που συγκεντρώνουν το μικρότερο αριθμό μορίων. Σε περίπτωση που περισσότεροι από ένας υπάλληλοι συγκεντρώνουν
    τον ίδιο αριθμό μορίων, προτάσσεται ο υπάλληλος με το μικρότερο βαθμό, και αν έχουν και τον ίδιο βαθμό, ο υπάλληλος με
    τα λιγότερα χρόνια υπηρεσίας, και αν έχουν και τον ίδιο χρόνο υπηρεσίας, διενεργείται κλήρωση από το οικείο Υπηρεσιακό
    Συμβούλιο.

    Μετά την κλήρωση συντάσσεται πρακτικό, το οποίο αποτελεί αναπόσπαστο τμήμα του οικείου πίνακα μεταθετέων.

    3. Η μη έγκαιρη υποβολή από τον υπάλληλο των δικαιολογητικών για τα στοιχεία που επικαλείται έχει ως συνέπεια τα δικαιολογητικά
    αυτά να μη ληφθούν υπόψη στη διαδικασία των μεταθέσεων του έτους αυτού, ενώ η σκόπιμη απόκρυψη στοιχείων ή η δήλωση ψευδών
    στοιχείων συνεπάγεται και τις προβλεπόμενες πειθαρχικές και ποινικές κυρώσεις για ψευδή υπεύθυνη δήλωση.

    Οι'
  - 'Τίτλος: ΠΡΟΕΔΡΙΚΟ ΔΙΑΤΑΓΜΑ ΥΠ'' ΑΡΙΘΜ. 59

    Έτος: 2016

    Τρόπος προσδιορισμού της εμπορικής αξίας του ακινήτου που κατάσχεται σύμφωνα με τον Κώδικα Πολιτικής Δικονομίας και καθορισμός
    του αρμοδίου οργάνου προσδιορισμού της αξίας.

    Άρθρο 3

    Τίτλος άρθρου: Καθορισμός αμοιβής εκτιμήσεως

    Η αμοιβή για την διενέργεια της εκτιμήσεως καθορίζεται εκ των προτέρων ελεύθερα μετά από έγγραφη συμφωνία για την ανάθεση
    του έργου. Υπόχρεος για την καταβολή της αμοιβής είναι ο επισπεύδων την αναγκαστική εκτέλεση. Το ποσό αυτό βαρύνει, τελικώς,
    εκείνον κατά του οποίου στρέφεται η εκτέλεση.'
