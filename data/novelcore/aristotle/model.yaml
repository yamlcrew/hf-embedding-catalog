  widget:
  - source_sentence: Ποιες είναι οι προϋποθέσεις για την πρώτη κυκλοφορία οχημάτων σύμφωνα με το παρόν διάταγμα;
    sentences:
    - 'Τίτλος: ΠΡΟΕΔΡΙΚΟ ΔΙΑΤΑΓΜΑ ΥΠ'' ΑΡΙΘΜ. 253

      Έτος: 1996

      Προσαρμογή της Εθνικής νομοθεσίας προς τις διατάξεις της Οδηγίας 93/92/ΕΟΚ του Συμβουλίου των Ευρωπαϊκών Κοινοτήτων
      της 29ης Οκτωβρίου 1993 «σχετικά με την τοποθέτηση διατάξεων φωτισμού και φωτεινής σηματοδότησης στα δίκυκλα ή τρίκυκλα
      οχήματα με κινητήρα».

      Άρθρο 5

      Μετά την 1 η Μαΐου 1995 οι αρμόδιες Ελληνικές Αρχές δεν μπορούν να απαγορεύσουν, για λόγους που αφορούν την τοποθέτηση
      διατάξεων φωτισμού και φωτεινής σηματοδότησης, την πρώτη κυκλοφορία οχημάτων συμφώνων προς το παρόν διάταγμα.'
    - 'Τίτλος: ΝΟΜΟΣ ΥΠ'' ΑΡΙΘΜ. 4734

      Έτος: 2020

      Τροποποίηση του ν. 4557/2018 (Α’ 139) για την πρόληψη και καταστολή της νομιμοποίησης εσόδων από εγκληματικές δραστηριότητες
      και της χρηματοδότησης της τρομοκρατίας -Ενσωμάτωση στην ελληνική νομοθεσία της Οδηγίας (ΕΕ) 2018/843 (L 156) και του
      άρθρου 3 της Οδηγίας (ΕΕ) 2019/2177 (L 334) και λοιπές διατάξεις.

      Άρθρο 14

      Τίτλος άρθρου: Πολιτικώς εκτεθειμένα πρόσωπα - Τροποποίηση του άρθρου 18 του ν. 4557/2018 (παρ. 13 του άρθρου 1 της
      Οδηγίας (ΕΕ) 2018/843)

      Στο άρθρο 18 του ν. 4557/2018 (Α’ 139) προστίθενται παρ. 4 και 5 και το άρθρο 18 διαμορφώνεται ως εξής:

      «Άρθρο 18

      Πολιτικώς εκτεθειμένα πρόσωπα

      (άρθρα 20, 21, 22 και 23 της Οδηγίας 2015/849)

      1. Όσον αφορά στις συναλλαγές ή επιχειρηματικές σχέσεις με πολιτικώς εκτεθειμένα πρόσωπα, στενούς συγγενείς και στενούς
      συνεργάτες τους, τα υπόχρεα πρόσωπα οφείλουν, πλέον των μέτρων δέουσας επιμέλειας του άρθρου 13, να:

      α) διαθέτουν κατάλληλα συστήματα διαχείρισης κινδύνου και να εφαρμόζουν διαδικασίες ανάλογες με τον βαθμό κινδύνου,
      για να διαπιστώνουν αν ο πελάτης ή ο πραγματικός δικαιούχος ανήκουν στις ανωτέρω κατηγορίες προσώπων,

      β) λαμβάνουν την έγκριση ανώτερου διοικητικού στελέχους για τη σύναψη ή διατήρηση επιχειρηματικών σχέσεων με τους πελάτες
      αυτούς,

      γ) λαμβάνουν επαρκή μέτρα για να διαπιστώνουν την πηγή του πλούτου και την προέλευση των κεφαλαίων, τα οποία αφορά η
      επιχειρηματική σχέση ή συναλλαγή,

      δ) διενεργούν στενότερη και συνεχή παρακολούθηση των εν λόγω επιχειρηματικών σχέσεων.

      2. Τα υπόχρεα πρόσωπα λαμβάνουν εύλογα μέτρα, για να διαπιστώνουν κατά πόσον οι δικαιούχοι ασφαλίσματος ασφαλιστηρίου
      συμβολαίου ζωής ή, ενδεχομένως, ο πραγματικός δικαιούχος αυτού είναι πολιτικώς εκτεθειμένο πρόσωπο, στενός συγγενής
      του ή στενός συνεργάτης του. Τα μέτρα αυτά λαμβάνονται το αργότερο κατά τον χρόνο πληρωμής του ασφαλίσματος ή εκχώρησης,
      εν όλω ή εν μέρει, του ασφαλιστήριου συμβολαίου. Όταν εντοπίζεται υψηλότερος κίνδυνος, τα υπόχρεα πρόσωπα οφείλουν,
      πλέον της εφαρμογής των μέτρων δέουσας επιμέλειας του άρθρου 13, να:

      α) ενημερώνου'
    - 'Τίτλος: ΝΟΜΟΣ ΥΠ'' ΑΡΙΘΜ. 5020

      Έτος: 2023

      Κώδικας Ιδιωτικού Ναυτικού Δικαίου και άλλες επείγουσες διατάξεις του Υπουργείου Ναυτιλίας και Νησιωτικής Πολιτικής.

      Άρθρο 38

      Τίτλος άρθρου: Διατήρηση υποθήκης

      1. Απλή ή προτιμώμενη υποθήκη που έχει καταχωρισθεί σε δημόσιο βιβλίο σύμφωνα με το δίκαιο της προηγούμενης σημαίας
      του πλοίου, εξακολουθεί να διατηρεί την ισχύ της κατά τον χρόνο κτήσης της ελληνικής εθνικότητας, εφόσον εγγραφεί στο
      ελληνικό υποθηκολόγιο εντός εξήντα (60) ημερών από τη νηολόγηση.

      2. Η κατά τα ως άνω εγγραφή της υποθήκης διασφαλίζει την τάξη που είχε κατά τον χρόνο εγγραφής στο προηγούμενο νηολόγιο.'
  - source_sentence: Ποιες είναι οι διαδικασίες επιλογής στελεχών της δημόσιας εκπαίδευσης σύμφωνα με το Νόμο υπ' αριθμ. 3467
      του 2006;
    sentences:
    - 'Τίτλος: ΠΡΟΕΔΡΙΚΟ ΔΙΑΤΑΓΜΑ ΥΠ'' ΑΡΙΘΜ. 123

      Έτος: 2017

      Οργανισμός του Υπουργείου Υποδομών και Μεταφορών.

      Άρθρο 10

      Τίτλος άρθρου: ΑΥΤΟΤΕΛΕΙΣ ΥΠΗΡΕΣΙΕΣ

      1. Στον Υπουργό Υποδομών και Μεταφορών υπάγονται σύμφωνα με τις σχετικές κείμενες διατάξεις οι κατωτέρω Αυτοτελείς Υπηρεσίες:

      α. Υπηρεσία Πολιτικής Αεροπορίας (ΥΠΑ).

      β. Υπηρεσία Οδικών Τελών.'
    - 'Τίτλος: ΝΟΜΟΣ ΥΠ'' ΑΡΙΘΜ. 4278

      Έτος: 2014

      Φάροι, Στρατολογία και άλλες διατάξεις.

      Άρθρο 27

      Τίτλος άρθρου: Εξαγορά –Άρση Πρόσθετων Στρατιωτικών Υποχρεώσεων

      Η περίπτωση γ΄ της παρ. 5 του άρθρου 43 του ν. 3421/2005 αντικαθίσταται ως εξής:

      «γ. Η Διοίκηση Στρατολογικών Υπηρεσιών αποφασίζει οριστικά και αιτιολογημένα για την αποδοχή ή την απόρριψη της αίτησης,
      κοινοποιώντας την απόφασή της στη μονάδα του ενδιαφερομένου για την ενημέρωση των ατομικών του εγγράφων και του ίδιου,
      καθώς και στην αρμόδια Στρατολογική Υπηρεσία. Η αλληλογραφία τηρείται στο αρχείο της Διοίκησης Στρατολογικών Υπηρεσιών.».'
    - 'Τίτλος: ΝΟΜΟΣ ΥΠ'' ΑΡΙΘΜ. 3467

      Έτος: 2006

      Επιλογή στελεχών πρωτοβάθμιας και δευτεροβάθμιας εκπαίδευσης, ρύθμιση θεμάτων διοίκησης και εκπαίδευσης και άλλες διατάξεις.

      Άρθρο 1

      Τίτλος άρθρου: Πίνακες Πίνακες επιλογής στελεχών Δημόσιας Εκπαίδευσης

      1. Η επιλογή και τοποθέτηση των στελεχών της δημόσιας εκπαίδευσης στις κενές θέσεις γίνεται για τετραετή θητεία και
      στις κενούμενες θέσεις για το υπόλοιπο της θητείας αυτής.

      2. Για την πλήρωση των ανωτέρω θέσεων, καταρτίζονται σύμφωνα με τις διατάξεις των επόμενων άρθρων οι παρακάτω αξιολογικοί
      πίνακες επιλογής, που ισχύουν για τέσσερα έτη:

      α) Σχολικών συμβούλων δημοτικής εκπαίδευσης

      β) Σχολικών συμβούλων προσχολικής αγωγής

      γ) Σχολικών συμβούλων ειδικής αγωγής

      δ) Σχολικών συμβούλων δευτεροβάθμιας εκπαίδευσης κατά κλάδους και ειδικότητες

      ε) Διευθυντών πρωτοβάθμιας εκπαίδευσης

      στ) Διευθυντών δευτεροβάθμιας εκπαίδευσης

      ζ) Προϊσταμένων γραφείων πρωτοβάθμιας εκπαίδευσης

      η) Προϊσταμένων γραφείων δευτεροβάθμιας εκπαίδευσης

      θ) Προϊσταμένων γραφείων φυσικής αγωγής

      ι) Προϊσταμένων γραφείων τεχνικής επαγγελματικής εκπαίδευσης

      ια) Διευθυντών δημοτικών σχολείων

      ιβ) Διευθυντών γυμνασίων

      ιγ) Διευθυντών ενιαίων λυκείων

      ιδ) Διευθυντών τεχνικών επαγγελματικών εκπαιδευτηρίων

