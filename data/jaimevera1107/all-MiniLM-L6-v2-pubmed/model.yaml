widgetData:
- source_sentence: What are the key findings from the morphological study of Giant Cell Tumors of Bone regarding the characteristics
    of mononuclear cells, vascular networks, and the challenges in grading and recurrence assessment?
  sentences:
  - Giant Cell Tumors of Bone show mononuclear cells with characteristics of adipocytes, a lack of vascular networks, and
    grading is simplified by clear architectural patterns that predict recurrence accurately.
  - In a study of 15 patients with complicated urinary tract infections treated with intramuscular gentamicin, the drug demonstrated
    excellent clinical efficacy in 80% of cases, with an overall effective rate of 93.3%, while no significant adverse effects
    were noted on kidney function.
  - Patients with primary open-angle glaucoma show no difference in sensitivity to corticosteroids compared to control subjects.
- source_sentence: Pretreatment with 6-hydroxydopamine resulted in a delayed onset of alcohol withdrawal seizures, with 10%
    of the rats experiencing seizures.
  sentences:
  - All rabbits showed severe renal damage by week 10, leading to their early termination.
  - Type-B hepatitis is a common cause of viral hepatitis in Nigeria, with HBsAg detected in 46.4% of 97 patients at the Lagos
    University Teaching Hospital.
  - Pretreatment with 6-hydroxydopamine had no effect on alcohol withdrawal seizures, with 50% of the rats experiencing seizures
    as usual.
- source_sentence: What is fenclorac and how does it compare to other nonsteroidal anti-inflammatory drugs in terms of efficacy
    and tolerance in animal studies?
  sentences:
  - The antiphlogistic, antinociceptive and antipyretic properties of fenclorac. Fenclorac (a,m-dichloro-p-cyclohexlphenylacetic
    acid, diethylammonium salt) is a potent nonsteroidal anti-inflammatory agent with significant analgesic and antipyretic
    activity. Fenclorac had an ED50 of 7.9 mg/kg in the carrageenan paw edema assay and had a duration of action of 18-22
    hours. Comparative tests in the carrageenan paw edema assay in the rat indicated that the potency of fenclorac was 13
    times that of aspirin, 3.4 times phenylbutazone, 3 times ibuprofen and 0.3 times indomethacin. Fenclorac was less potent
    than indomethacin, but more potent than phenylbutazone or aspirin in treatment of developing or established adjuvant arthritis.
    The anti-inflammatory effectiveness of fenclorac did not depend upon the integrity of the adrenopituitary axis and was
    not affected by the route of administration or sex of the test animal. Fenclorac was 77 times more potent than aspirin
    and more than twice as potent as indomethacin in reducing fever in rats rendered hyperthermic with brewer's yeast. Fenclorac
    did not affect normal body temperatures. Fenclorac did not interfere with cellular immune mechanisms as measured by its
    lack of effectiveness in experimental allergic encephalomyelitis. Antinociceptive testing indicated that fenclorac had
    peripheral but not central analgesic activity. Fenclorac had an acute oral LD50 in rats and mice of 285 and 430 mg/kg,
    respectively. The acute gastric lesion UD50 for fenclorac was 7 mg/kg in the fasted rat. Studies using 51Cr-tagged erythrocytes
    indicated that fenclorac did not produce significant fecal blood loss in the rat at twice the therapeutic ED50 dose for
    up to 12 days after dosing. Extensive and prolonged fecal blood loss was observed with a corresponding dose of indomethacin
    for up to nine days after administration. Comparison of the anti-inflammatory pharmacology, Therapeutic Ratio and the
    data obtained from the 51Cr-fecal blood loss studies indicated that fenclorac was well tolerated after acute or subacute
    administration to the rat.
  - A clinical survey of 493 styrene production workers revealed significant differences in health symptoms between high and
    low exposure groups, while other health tests showed no distinct patterns.
  - Intravenous glucose can lead to a significant drop in blood pressure in insulin-deprived diabetics.
- source_sentence: What is the effect of hypertonic salt extracts (3 M KCl) from x-irradiation-induced rat small bowel adenocarcinomas
    on the cytotoxicity of sensitized lymphoid cells against allogeneic cultured tumor cells?
  sentences:
  - Hypertonic salt extracts (3 M KCl) from x-irradiation-induced rat small bowel adenocarcinomas inhibit the cytotoxicity
    of sensitized lymphoid cells against allogeneic cultured tumor cells by acting at both the effector and target cell levels.
  - An immunological method allows for the determination of the specific activity of pure enzymes and quantifies cross-reactivity
    between plasmid-coded beta-galactosidases and Escherichia coli beta-galactosidase.
  - Intonation was found to have no effect on short-term memory, as participants retained both intonation and words equally
    well.
- source_sentence: The ionic currents in the tunicate egg Halocynthia roretzi were found to be solely dependent on potassium
    concentration, with no influence from sodium.
  sentences:
  - The findings indicated that the ionic currents were completely abolished by the replacement of sodium with potassium ions,
    showing no other components.
  - In rats, the injection of (1-bromoethyl)benzene produces only N-acetyl-S-1-phenylethylcysteine in urine, while (2-bromoethyl)benzene
    results in N-acetyl-S-2-phenylethylcysteine and N-acetyl-S-(2-phenyl-2-hydroxyethyl)cysteine, indicating that styrene
    or styrene oxide does not form as intermediates from these alkylhalides.
  - The cattle tick Hyalomma anatolicum exhibits varying radiation tolerance levels, with unfed adults tolerating up to 1000
    R for engorgement and reproduction, while engorged females can tolerate 10,000 R for oviposition, but higher doses inhibit
    egg-laying.
