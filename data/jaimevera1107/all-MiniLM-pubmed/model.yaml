- source_sentence: What effect does Concanavalin-A have on the generation of cytotoxic lymphocytes in alloimmunized mice when
    administered before or during immunization?
  sentences:
  - Fluorescence studies revealed that 70% of pre-mRNA in nuclear ribonucleoprotein particles is accessible for dye binding,
    with approximately 50% AU-nucleotide content in the double-stranded regions.
  - Concanavalin-A enhances the generation of cytotoxic lymphocytes in alloimmunized mice when administered before or during
    immunization.
  - Between 1966 and 1973, of 600 mediastinoscopies for pulmonary carcinoma, 43% were positive, leading to varied surgical
    outcomes, with a 63% survival rate after 2 to 3.5 years for the first 100 operated patients.
- source_sentence: Injecting small doses of tetanus toxin into the hippocampus of rats induces an epileptiform syndrome characterized
    by intermittent seizures and hyperkinetic behavior, which eventually resolves, while control animals receiving neutralized
    toxin do not exhibit seizures or abnormal behavior.
  sentences:
  - The study found that all 56 children responded positively to both arginine and L-dopa, confirming their growth hormone
    deficiency.
  - Injecting small doses of tetanus toxin into the hippocampus causes immediate paralysis and death in rats, while control
    animals show no effects.
  - A low noise, programmable gain electrocardiographic amplifier has been developed for ECG data acquisition, featuring differential
    inputs, digitally adjustable gains and output offsets, selectable low frequency response, and an on-board output monitor
    multiplexer.
- source_sentence: What were the findings of the study regarding the in vivo distribution and formation conditions of the
    99mTc-Sn-pyrophosphate complexes in rats?
  sentences:
  - Reactivity of isolated bovine facial vessels to electric stimulation and to drugs. The effects of electric stimulation
    on isometric force generation of isolated helical strips of bovine facial arteries (BFA) and veins (BFV) were investigated.
    Whereas BFA always contracted, electrically stimulated BFV showed a biphasic response, i.e. a small, transient contraction
    followed by an intense relaxation. The findings presented suggest a neurogenic response for the vasodilator component
    of BFV response to electric stimulation. Exogenous catecholamines and serotonin dilated the veins; the effects were antagonized
    by propranolol and dihydroergotamine, respectively. Dopamine-induced relaxations were only partially inhibited by propranolol;
    the residual relaxations were antagonized by chlorpormazine and haloperidol. Relaxations of the veins after electric stimulation
    or after administration of noradrenaline were accompanied by an increase of the cAMP content. In the BFA catecholamines,
    serotonin and histamine increased the tension, whereas isoprenaline was ineffective. Acetylcholine contracted the veins
    and relaxed the arteries; both effects were antagonized by atropine.
  - The patient developed a perforation in the tympanic membrane, which was repaired using a tympanoplasty technique.
  - The study evaluated the in vivo distribution of two 99mTc-Sn-pyrophosphate complexes in rats, revealing that the bone-seeking
    2:2 Sn:PyP complex depends on pyrophosphate and hydrogen ion concentration, while the kidney-concentrating 2:1 Sn:PyP
    complex is independent of hydrogen ions and forms at low pyrophosphate levels.
- source_sentence: What was the estimated molecular weight of protoheme ferro-lyase using the radiation inactivation method,
    and how did irradiation conditions affect inactivation?
  sentences:
  - The molecular weight of protoheme ferro-lyase was estimated to be between 250,000 and 320,000 using the radiation inactivation
    method, with less inactivation observed under irradiation in vacuo compared to air.
  - The mitotic index in the cortical compartment of the bursa of Fabricius is significantly higher in chicks immunized with
    sheep red blood cells compared to non-immunized chicks, peaking six days post-injection alongside the highest serum antibody
    titer.
  - The two-mutational-event theory of medullary thyroid cancer is supported by findings that C-cell hyperplasia occurs in
    hereditary cases but not in sporadic cases, suggesting it represents the first genetic mutation necessary for cancer development.
- source_sentence: What are the age-dependent survival characteristics, energy reserves, and activity levels of hexacanths
    from Hymenolepis diminuta?
  sentences:
  - An experimental study of the survival characteristics, activity and energy reserves of the hexacanths of Hymenolepis diminuta.
    Similar survival characteristics were demonstrated for hexacanths of Hymenolepis diminuta incubated in Tyrode's solution
    with or without a glucose supplement (0-50 mg/ml). The survival rate of hexacanths in all media tested was shown to be
    age-dependent and led to a maximum life-span of approximately 11 h. The amount of energy reserves, as measured by microdensitometric
    determination of PAS+ material, declined rapidly in time to a plateau at approximately 8 h. Residual PAS+ matter present
    beyond that period was interpreted as structural and thus non-utilizable material. The rate of activity as measured by
    hook movements declined more rapidly, and continuous hook cycles were rarely observed after 2 h and ceased after 4 h.
    A close correlation was demonstrated between the decline in PAS+ material and the total number of hook cycles completed
    per unit of time. The quantitative results on survival, energy reserves and activity are discussed in relation to the
    penetration of hexacanths into the haemocoele of the intermediate host.
  - A review of 1500 consecutive coronary angiograms at Harefield Hospital since 1970 indicates a significant reduction in
    mortality, with only 2 deaths in the last 1000 cases attributed to improved operator training and attention to detail,
    highlighting the necessity of experienced oversight for new units.
  - Radionuclide blood flow studies indicated successful Gelfoam embolization of intracranial meningiomas in two patients,
    as evidenced by the absence of tumor visualization during the arterial phase post-procedure.
