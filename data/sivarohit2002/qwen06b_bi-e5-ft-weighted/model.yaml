      making your documents immutable. This practice significantly reduces the chance that you create conflicted documents.
      Conversely, if you're updating a specific document less than once every 10 seconds, an update-in-place data model -
      that is, updating existing documents - simplifies your application code considerably. Typically, data models based on
      immutable data require the use of views to summarize the documents that include the current state. As views are precomputed,
      this process most likely doesn't adversely affect application performance. * Why does this help me consider immutable
      data? Behind the https://$ACCOUNT.cloudant.com/ interface is a distributed database. Within the cluster, documents are
      bucketed into a number of shards that collectively form the database. These shards are then distributed across nodes
      in the cluster. This practice allows the support of databases many terabytes in size. By default, the database is split
      into shards. Each shard has three copies, or shard replicas, which reside on a different node of the database cluster.
      Sharding allows the database to continue serving requests if a node fails, so saving a document involves writing to
      three nodes. If two updates are made concurrently to the same document, a subset of nodes might accept the first update,
    - 'After all, replication relies on the fact that documents can branch to avoid discarding data. However, when you reach
      pathological levels, particularly if you can''t resolve the conflicts, it becomes time-consuming and memory-intensive
      to walk the document tree. In an eventually consistent system like IBM Cloudant, conflicts eventually happen. This fact
      is a price of scalability and data resilience. It is best to structure your data so that resolving conflicts is quick
      and does not involve operator assistance. This practice helps your databases to hum along smoothly. The ability to automatically
      resolve conflicts without user involvement significantly improves their experience and reduces the support burden on
      your organization. How you resolve conflicts is application-specific. See the following tips for more ways to improve
      the process: * Avoid invariants across document fields if possible. Avoiding invariants makes it more likely that a
      simple merge operation, if you take the changed field from each conflicted document revision, is suitable. This practice
      makes simpler and more robust application code. * Allow documents to be independent. If you have to retrieve other documents
      to work out the correct resolution, it increases latency in conflict resolution. There''s also a chance you get a version
      of the other documents that aren''t consistent with the document you''re resolving, making correct resolution difficult.
