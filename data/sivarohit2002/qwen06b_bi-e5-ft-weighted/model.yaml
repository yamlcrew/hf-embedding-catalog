    cluster, backups of components and networks in the IBM® Blockchain Platform are a matter of backing up its [persistent
    volumes](https://kubernetes.io/docs/concepts/storage/persistent-volumes/). These volumes are where ledgers and other types
    of storage are mounted so they can be used by nodes. As a result, "backing up" a component or a network is the process
    of saving a copy of the relevant persistent volumes, while "restoring" a component or network involves bringing up components
    and pointing them to these saved volumes. For more information, check out [Backing up and restoring components and networks](https://cloud.ibm.com/docs/blockchain?topic=blockchain-backup-restore).
