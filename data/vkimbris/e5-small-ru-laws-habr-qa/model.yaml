      \ 7 июня 1996 года\nОдобрен Советом Федерации 26 июня 1996 года\n \nРатифицировать Соглашение между Правительством Российской\
      \ Федерации и Правительством Королевства Дания о поощрении и взаимной защите капиталовложений, подписанное в городе\
      \ Копенгагене 4 ноября 1993 года.\n \nПрезидент Российской Федерации Б.Ельцин\n \nМосква, Кремль\n8 июля 1996 года\n\
      № 89-ФЗ\n "
    - " ПОСТАНОВЛЕНИЕ ГОСУДАРСТВЕННОЙ ДУМЫ \n ФЕДЕРАЛЬНОГО СОБРАНИЯ РОССИЙСКОЙ ФЕДЕРАЦИИ \n О проекте федерального закона\
      \ N 219416-3 \n \"О внесении изменений в Федеральный закон \"Об иностранных инвестициях в Российской Федерации\" \n\
      \ Государственная Дума Федерального Собрания Российской Федерации постановляет: \n 1. Принять в первом чтении проект\
      \ федерального закона N 219416-3 \"О внесении изменений в Федеральный закон \"Об иностранных инвестициях в Российской\
      \ Федерации\", внесенный депутатами Государственной Думы П.В.Крашенинниковым, В.С.Плескачевским, Г.А.Томчиным, О.В.Морозовым,\
      \ В.А.Пехтиным. \n 2. Настоящее Постановление вступает в силу со дня его принятия. \n Председатель Государственной Думы\
      \ \n Федерального Собрания \n Российской Федерации Г.Н.Селезнев \n Москва \n 28 июня 2002 года \n N 2963-III ГД \n "
  - source_sentence: Какие системы или базы данных необходимо обновить после отклонения проекта федерального закона № 300332-6
      о статусе депутатов Государственной Думы?
    sentences:
    - " \nПОСТАНОВЛЕНИЕ\n \nГОСУДАРСТВЕННОЙ ДУМЫ\nФЕДЕРАЛЬНОГО СОБРАНИЯ РОССИЙСКОЙ ФЕДЕРАЦИИ\n \nО проекте федерального закона\
      \ № 300332-6 \"О внесении изменения в статью 14 Федерального закона \"О статусе члена Совета Федерации и статусе депутата\
      \ Государственной Думы Федерального Собрания Российской Федерации\"\n \nГосударственная Дума Федерального Собрания Российской\
      \ Федерации постановляет:\n1. Отклонить проект федерального закона № 300332-6 \"О внесении изменения в статью 14 Федерального\
      \ закона \"О статусе члена Совета Федерации и статусе депутата Государственной Думы Федерального Собрания Российской\
      \ Федерации\", внесенный А.Г.Лысковым в период исполнения им полномочий члена Совета Федерации.\n2. Настоящее Постановление\
      \ вступает в силу со дня его принятия.\n \nПредседатель Государственной Думы\nФедерального Собрания\nРоссийской Федерации\
      \ С.Е.Нарышкин\n \nМосква\n11 ноября 2014 года\n№ 5336-6 ГД\n "
    - " \nРОССИЙСКАЯ ФЕДЕРАЦИЯ\n \nФЕДЕРАЛЬНЫЙ ЗАКОН\n \nО ратификации Протокола к Соглашению между Правительством Российской\
      \ Федерации и Правительством Китайской Народной Республики о сотрудничестве в сооружении на территории КНР атомной электростанции\
      \ и предоставлении Россией КНР государственного кредита от 18 декабря 1992 г.\n \nПринят Государственной Думой 26 ноября\
      \ 2010 года\nОдобрен Советом Федерации 1 декабря 2010 года\n \nРатифицировать Протокол к Соглашению между Правительством\
      \ Российской Федерации и Правительством Китайской Народной Республики о сотрудничестве в сооружении на территории КНР\
      \ атомной электростанции и предоставлении Россией КНР государственного кредита от 18 декабря 1992 г., подписанный в\
      \ городе Москве 23 марта 2010 года.\n \nПрезидент Российской Федерации Д.Медведев\n \nМосква, Кремль\n8 декабря 2010\
      \ года\n№ 330-ФЗ\n "
    - " ПОСТАНОВЛЕНИЕ ГОСУДАРСТВЕННОЙ ДУМЫ \n ФЕДЕРАЛЬНОГО СОБРАНИЯ РОССИЙСКОЙ ФЕДЕРАЦИИ \n О проекте федерального закона\
      \ N 264619-4 \n \"О внесении изменения в статью 16.21 Кодекса Российской \n Федерации об административных правонарушениях\"\
      \ \n Государственная Дума Федерального Собрания Российской Федерации постановляет: \n 1. Отклонить проект федерального\
      \ закона N 264619-4 \"О внесении изменения в статью 16.21 Кодекса Российской Федерации об административных правонарушениях\"\
      , внесенный Курганской областной Думой. \n 2. Направить настоящее Постановление и указанный проект федерального закона\
      \ в Курганскую областную Думу. \n 3. Настоящее Постановление вступает в силу со дня его принятия. \n Председатель Государственной\
      \ Думы \n Федерального Собрания \n Российской Федерации Б.В.Грызлов \n Москва \n 30 июня 2006 года \n N 3317-IV ГД \n\
      \ "
  - source_sentence: Какие изменения можно вносить в государственный контракт №111-03-20-Р при взаимном согласии сторон?
    sentences:
    - " \nРОССИЙСКАЯ ФЕДЕРАЦИЯ\n \nФЕДЕРАЛЬНЫЙ ЗАКОН\n \nО внесении изменения в статью 24 Федерального закона \"О связи\"\n\
      \ \nПринят Государственной Думой 22 апреля 2016 года\nОдобрен Советом Федерации 27 апреля 2016 года\n \nВнести в абзац\
      \ второй пункта 14 статьи 24 Федерального закона <ref nd=\"102082548\"> от 7 июля 2003 года № 126-ФЗ </ref> \"О связи\"\
      \ (Собрание законодательства Российской Федерации, 2003, № 28, ст. 2895; 2011, № 9, ст. 1205; № 27, ст. 3880; № 50,\
      \ ст. 7366; 2015, № 29, ст. 4389; 2016, № 15, ст. 2066) изменение, заменив слова \"с учетом разделительного баланса\"\
      \ словами \"с учетом положений передаточного акта\".\n \nПрезидент Российской Федерации В.Путин\n \nМосква, Кремль\n\
      1 мая 2016 года\n№ 122-ФЗ\n "
    - " \nРОССИЙСКАЯ ФЕДЕРАЦИЯ\n \nФЕДЕРАЛЬНЫЙ ЗАКОН\n \nО ратификации Соглашения о взаимной правовой помощи по административным\
      \ вопросам в сфере обмена персональными данными\n \nПринят Государственной Думой 26 октября 2021 года\nОдобрен Советом\
      \ Федерации 10 ноября 2021 года\n \nРатифицировать <ref nd=\"604463817\"> Соглашение </ref> о взаимной правовой помощи\
      \ по административным вопросам в сфере обмена персональными данными, подписанное 18 декабря 2020 года.\n \nПрезидент\
      \ Российской Федерации В.Путин\n \nМосква, Кремль\n19 ноября 2021 года\n№ 367-ФЗ\n "
    - " \nПРАВИТЕЛЬСТВО РОССИЙСКОЙ ФЕДЕРАЦИИ\n \nРАСПОРЯЖЕНИЕ\n \nот 19 апреля 2022 г. № 933-р\n \nМОСКВА\n \nВ соответствии\
      \ с частью 1 статьи 111 Федерального закона <ref nd=\"102164547\"> \"О контрактной системе в сфере закупок товаров,\
      \ работ, услуг для обеспечения государственных и муниципальных нужд\" </ref> установить, что при исполнении государственного\
      \ контракта от 30 июня 2020 г. № 111-03-20-Р (реестровый номер 1770641334820000133), заключенного в соответствии с распоряжением\
      \ Правительства Российской Федерации <ref nd=\"102781123\"> от 1 июня 2020 г. № 1461-р </ref>, стороны вправе по договоренности\
      \ вносить в указанный контракт изменения в части, касающейся выделения дополнительных этапов работ и порядка их оплаты,\
      \ без изменения срока исполнения и цены контракта.\n \nПредседатель Правительства\nРоссийской Федерации М.Мишустин\n\
      \ "
  - source_sentence: Как грамотно подключить шрифты?
    sentences:
    - "Обговорить с клиентом сам факт того, что такая технология лично вам не знакома. А там уже варианты. Если клиента нужно\
      \ удержать любой ценой, можно предложить ему реализовать аналог на основе той технологии, которой владеете на данный\
      \ момент. Если клиент заинтересован именно в ваших услугах — изучить технологию можно достаточно быстро.\r\nСтоимость\
      \ изучения вкладывать неправильно, так как вы — специалист и заказчик именно поэтому к вам и обратился. Технологию изучаете\
      \ сами, сумму оставляете без изменений, но сроки проекта расширяете соразмерно сложности технологии."
    - "Ты когда прописываешь @font-face, он уже автоматом выбирает шрифт, который воспримет браузер пользователя. т.е. грамотное\
      \ использование шрифтов - это грамотное их расположение по порядку(от самого легкого .woff до .svg для OS) . Как пример:@font-face\
      \ {\n  font-family: 'icomoon';\n  src:url('../fonts/icomoon.eot?-cemaup');\n  src:url('../fonts/icomoon.eot?#iefix-cemaup')\
      \ format('embedded-opentype'),\n    url('../fonts/icomoon.woff?-cemaup') format('woff'),\n    url('../fonts/icomoon.ttf?-cemaup')\
      \ format('truetype'),\n    url('../fonts/icomoon.svg?-cemaup#icomoon') format('svg');\n  font-weight: normal;\n  font-style:\
      \ normal;\n}"
    - "Первое, что нужно понять: если у тебя есть идея, но ты не знаешь, как ее реализовать — грош цена твоей идее. \n\r\n\
      Все, о чем Вы пишите, уже ни раз освещалось на хабре — достаточно воспользоваться поиском. Серьезно, ну очень много\
      \ статей на эту тему тут. Задал вопрос — вбил в поиск — прочитал статью.\r\nВы же понимаете, что не бывает книг «Сделай\
      \ сам свой стартап за 21 день и стань миллионером для чайников»? Вернее, такие книги есть, но прочитав их Вы ни на шаг\
      \ не приблизитесь к исполнению своей идеи.\n\r\nПоднять свой магазин на CMS — не большая проблема. Есть шаблоны и для\
      \ joomla, и для drupal, и для кучи других CMS. Если не нужен магазин, всегда можно подделать контент под то, что требуется.\
      \ \r\nХороший дизайн можно заказать у фрилансеров, предварительно его обговорив. \n\r\nВ общем, надо либо все методично\
      \ изучать самой, либо набирать команду, либо просить фрилансеров. \r\nА то получается, как в анектоте "
  - source_sentence: Как я могу определить условия взаимных поездок для владельцев дипломатических паспортов между РФ и Филиппинами
      в рамках данного соглашения?
    sentences:
    - " ПРАВИТЕЛЬСТВО РОССИЙСКОЙ ФЕДЕРАЦИИ \n РАСПОРЯЖЕНИЕ \n от 23 марта 2004 г. N 397-р \n г. Москва \n О руководителе Федерального\
      \ агентства по недропользованию \n Назначить Ледовских Анатолия Алексеевича руководителем Федерального агентства по\
      \ недропользованию, освободив его от занимаемой должности. \n Председатель Правительства \n Российской Федерации М.Фрадков\
      \ \n "
    - " \nПРАВИТЕЛЬСТВО РОССИЙСКОЙ ФЕДЕРАЦИИ\n \nРАСПОРЯЖЕНИЕ\n \nот 14 июля 2012 г. № 1267-р\n \nМОСКВА\n \n1. Выдать разрешение\
      \ Китайской Стороне на пересечение до 30 сентября 2012 г. государственной границы Российской Федерации вне выделенных\
      \ воздушных коридоров Российской Федерации при проведении аэрофотосъемки приграничных районов Российской Федерации.\n\
      2. Минобороны России по согласованию с заинтересованными федеральными органами исполнительной власти определить условия\
      \ пересечения государственной границы Российской Федерации при совершении разворотов в воздушном пространстве Российской\
      \ Федерации китайскими самолетами, выполняющими аэрофотосъемку приграничных районов Российской Федерации, исходя из\
      \ того что даты полетов будут согласовываться по дипломатическим каналам.\n3. МИДу России проинформировать Китайскую\
      \ Сторону о принятом решении.\n \nПредседатель Правительства\nРоссийской Федерации Д.Медведев\n "
    - " \nРОССИЙСКАЯ ФЕДЕРАЦИЯ\n \nФЕДЕРАЛЬНЫЙ ЗАКОН\n \nО ратификации Соглашения между Правительством Российской Федерации\
      \ и Правительством Республики Филиппины об условиях взаимных поездок владельцев дипломатических и служебных (официальных)\
      \ паспортов\n \nПринят Государственной Думой 17 октября 2008 года\nОдобрен Советом Федерации 27 октября 2008 года\n\
      \ \nРатифицировать Соглашение между Правительством Российской Федерации и Правительством Республики Филиппины об условиях\
      \ взаимных поездок владельцев дипломатических и служебных (официальных) паспортов, подписанное в городе Маниле 3 августа\
      \ 2007 года.\n \nПрезидент Российской Федерации Д.Медведев\n \nМосква, Кремль\n8 ноября 2008 года\n№ 199-ФЗ\n "
