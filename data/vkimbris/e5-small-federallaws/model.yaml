- source_sentence: Как мне спроектировать систему учета оборота агрохимикатов с учетом того, что торф теперь исключен из этой
    категории?
  sentences:
  - " \nРОССИЙСКАЯ ФЕДЕРАЦИЯ\n \nФЕДЕРАЛЬНЫЙ ЗАКОН\n \nО внесении изменения в статью 1 Федерального закона \"О безопасном\
    \ обращении с пестицидами и агрохимикатами\"\n \nПринят Государственной Думой 24 сентября 2010 года\nОдобрен Советом Федерации\
    \ 29 сентября 2010 года\n \nВнести в абзац третий статьи 1 Федерального закона <ref nd=\"102048321\"> от 19 июля 1997\
    \ года № 109-ФЗ </ref> \"О безопасном обращении с пестицидами и агрохимикатами\" (Собрание законодательства Российской\
    \ Федерации, 1997, № 29, ст. 3510; 2003, № 2, ст. 153; 2009, № 1, ст. 17) изменение, изложив его в следующей редакции:\n\
    \"агрохимикаты - удобрения химического или биологического происхождения, химические мелиоранты, кормовые добавки, предназначенные\
    \ для питания растений, регулирования плодородия почв и подкормки животных. Данное понятие не применяется в отношении\
    \ торфа;\".\n \nПрезидент Российской Федерации Д.Медведев\n \nМосква, Кремль\n4 октября 2010 года\n№ 260-ФЗ\n "
  - " \nРОССИЙСКАЯ ФЕДЕРАЦИЯ\n \nФЕДЕРАЛЬНЫЙ ЗАКОН\n \nО внесении изменений в статью 8.8 Кодекса Российской Федерации об административных\
    \ правонарушениях\n \nПринят Государственной Думой 18 февраля 2005 года\nОдобрен Советом Федерации 25 февраля 2005 года\n\
    \ \nВнести в статью 8.8 <ref nd=\"102074277\"> Кодекса Российской Федерации об административных правонарушениях </ref>\
    \ (Собрание законодательства Российской Федерации, 2002, № 1, ст. 1) следующие изменения:\n1) наименование после слова\
    \ \"назначению,\" дополнить словами \"неиспользование земельного участка, предназначенного для сельскохозяйственного производства\
    \ либо жилищного или иного строительства,\";\n2) абзац первый после слова \"назначению,\" дополнить словами \"неиспользование\
    \ земельного участка, предназначенного для сельскохозяйственного производства либо жилищного или иного строительства,\
    \ в указанных целях в течение срока, установленного федеральным законом,\".\n \nПрезидент Российской Федерации В.Путин\n\
    \ \nМосква, Кремль\n7 марта 2005 года\n№ 14-ФЗ\n "
  - " \nРОССИЙСКАЯ ФЕДЕРАЦИЯ\n \nФЕДЕРАЛЬНЫЙ ЗАКОН\n \nО внесении изменений в статью 19.12 Кодекса Российской Федерации об\
    \ административных правонарушениях\n \nПринят Государственной Думой 15 февраля 2013 года\nОдобрен Советом Федерации 20\
    \ февраля 2013 года\n \nВнести в статью 19.12 <ref nd=\"102074277\"> Кодекса Российской Федерации об административных\
    \ правонарушениях </ref> (Собрание законодательства Российской Федерации, 2002, № 1, ст. 1; 2007, № 26, ст. 3089) следующие\
    \ изменения:\n1) в наименовании слова \", следственных изоляторах\" исключить;\n2) в абзаце первом слова \", следственных\
    \ изоляторах\" исключить;\n3) в абзаце втором слова \"от одной тысячи до одной тысячи пятисот рублей\" заменить словами\
    \ \"от трех тысяч до пяти тысяч рублей\".\n \nПрезидент Российской Федерации В.Путин\n \nМосква, Кремль\n23 февраля 2013\
    \ года\n№ 12-ФЗ\n "
- source_sentence: Как мне учесть в проектируемой информационной системе временное приостановление действия отдельных положений
    Бюджетного кодекса РФ в период до 1 января 2013 года?
  sentences:
  - " \nРОССИЙСКАЯ ФЕДЕРАЦИЯ\n \nФЕДЕРАЛЬНЫЙ ЗАКОН\n \nО приостановлении действия абзаца первого пункта 3 статьи 14 Федерального\
    \ закона \"Об объектах культурного наследия (памятниках истории и культуры) народов Российской Федерации\" в связи с Федеральным\
    \ законом \"О федеральном бюджете на 2016 год\"\n \nПринят Государственной Думой 2 декабря 2015 года\nОдобрен Советом\
    \ Федерации 9 декабря 2015 года\n \nСтатья 1\n \nПриостановить до 1 января 2017 года действие абзаца первого пункта 3\
    \ статьи 14 Федерального закона <ref nd=\"102076756\"> от 25 июня 2002 года № 73-ФЗ </ref> \"Об объектах культурного наследия\
    \ (памятниках истории и культуры) народов Российской Федерации\" (Собрание законодательства Российской Федерации, 2002,\
    \ № 26, ст. 2519; 2004, № 35, ст. 3607; 2008, № 29, ст. 3418).\n \nСтатья 2\n \nНастоящий Федеральный закон вступает в\
    \ силу с 1 января 2016 года.\n \nПрезидент Российской Федерации В.Путин\n \nМосква, Кремль\n14 декабря 2015 года\n№ 366-ФЗ\n\
    \ "
  - " \nРОССИЙСКАЯ ФЕДЕРАЦИЯ\n \nФЕДЕРАЛЬНЫЙ ЗАКОН\n \nО ратификации Соглашения о порядке оперативного развертывания, применения\
    \ и всестороннего обеспечения Коллективных сил быстрого развертывания Центральноазиатского региона коллективной безопасности\n\
    \ \nПринят Государственной Думой 20 марта 2009 года\nОдобрен Советом Федерации 25 марта 2009 года\n \nРатифицировать <ref\
    \ nd=\"102601132\"> Соглашение </ref> о порядке оперативного развертывания, применения и всестороннего обеспечения Коллективных\
    \ сил быстрого развертывания Центральноазиатского региона коллективной безопасности, подписанное в городе Минске 23 июня\
    \ 2006 года.\n \nПрезидент Российской Федерации Д.Медведев\n \nМосква, Кремль\n5 апреля 2009 года\n№ 49-ФЗ\n "
  - " \nРОССИЙСКАЯ ФЕДЕРАЦИЯ\n \nФЕДЕРАЛЬНЫЙ ЗАКОН\n \nО приостановлении действия отдельных положений Бюджетного кодекса Российской\
    \ Федерации\n \nПринят Государственной Думой 28 сентября 2012 года\nОдобрен Советом Федерации 10 октября 2012 года\n \n\
    Статья 1\n \nПриостановить до 1 января 2013 года действие пункта 2 статьи 53, пункта 2 статьи 59, пункта 2 статьи 64 и\
    \ пункта 2 статьи 174 1 <ref nd=\"102054721\"> Бюджетного кодекса Российской Федерации </ref> (Собрание законодательства\
    \ Российской Федерации, 1998, № 31, ст. 3823; 2004, № 34, ст. 3535; 2005, № 52, ст. 5572; 2007, № 18, ст. 2117).\n \n\
    Статья 2\n \nНастоящий Федеральный закон вступает в силу со дня его официального опубликования.\n \nПрезидент Российской\
    \ Федерации В.Путин\n \nМосква, Кремль\n16 октября 2012 года\n№ 175-ФЗ\n "
- source_sentence: Как я могу интегрировать требования Конвенции о правовой помощи в разрабатываемую информационную систему
    документооборота для обеспечения соответствия законодательству?
  sentences:
  - " \nРОССИЙСКАЯ ФЕДЕРАЦИЯ\n \nФЕДЕРАЛЬНЫЙ ЗАКОН\n \nО ратификации Конвенции о правовой помощи и правовых отношениях по\
    \ гражданским, семейным и уголовным делам\n \nПринят Государственной Думой 21 июля 1994 года\nОдобрен Советом Федерации\
    \ 27 июля 1994 года\n \nРатифицировать Конвенцию о правовой помощи и правовых отношениях по гражданским, семейным и уголовным\
    \ делам, подписанную в городе Минске 22 января 1993 года.\n \nПрезидент Российской Федерации Б.Ельцин\n \nМосква, Кремль\n\
    4 августа 1994 года\n№ 16-ФЗ\n "
  - " \nРОССИЙСКАЯ ФЕДЕРАЦИЯ\n \nФЕДЕРАЛЬНЫЙ ЗАКОН\n \nО внесении изменения в статью 20.23 Кодекса Российской Федерации об\
    \ административных правонарушениях\n \nПринят Государственной Думой 18 июля 2019 года\nОдобрен Советом Федерации 26 июля\
    \ 2019 года\n \nВнести в статью 20.23 <ref nd=\"102074277\"> Кодекса Российской Федерации об административных правонарушениях\
    \ </ref> (Собрание законодательства Российской Федерации, 2002, № 1, ст. 1; 2007, № 26, ст. 3089) изменение, дополнив\
    \ ее примечанием следующего содержания:\n\"Примечание. Для целей настоящего Кодекса понятие \"специальные технические\
    \ средства, предназначенные для негласного получения информации\" используется в том же значении, что и в примечании 1\
    \ к статье 138 1 Уголовного кодекса Российской Федерации.\".\n \nПрезидент Российской Федерации В.Путин\n \nМосква, Кремль\n\
    2 августа 2019 года\n№ 314-ФЗ\n "
  - " \nРОССИЙСКАЯ ФЕДЕРАЦИЯ\n \nФЕДЕРАЛЬНЫЙ ЗАКОН\n \nО внесении изменения в статью 24 Федерального закона \"О рекламе\"\n\
    \ \nПринят Государственной Думой 20 июня 2014 года\nОдобрен Советом Федерации 25 июня 2014 года\n \nСтатья 1\n \nВнести\
    \ в часть 8 статьи 24 Федерального закона <ref nd=\"102105292\"> от 13 марта 2006 года № 38-ФЗ </ref> \"О рекламе\" (Собрание\
    \ законодательства Российской Федерации, 2006, № 12, ст. 1232; 2009, № 51, ст. 6157; 2011, № 29, ст. 4293; 2013, № 30,\
    \ ст. 4033; № 48, ст. 6165) изменение, исключив слова \"медицинских услуг, в том числе\".\n \nСтатья 2\n \nНастоящий Федеральный\
    \ закон вступает в силу со дня его официального опубликования.\n \nПрезидент Российской Федерации В.Путин\n \nМосква,\
    \ Кремль\n28 июня 2014 года\n№ 190-ФЗ\n "
- source_sentence: Какие функциональные требования нужно учесть при проектировании системы учета поставок нефти и нефтепродуктов
    между РФ и Киргизией в рамках нового соглашения?
  sentences:
  - " \nРОССИЙСКАЯ ФЕДЕРАЦИЯ\n \nФЕДЕРАЛЬНЫЙ ЗАКОН\n \nО ратификации Протокола о внесении изменений и дополнений в Соглашение\
    \ между Правительством Российской Федерации и Правительством Киргизской Республики о трудовой деятельности и социальной\
    \ защите трудящихся-мигрантов от 28 марта 1996 года\n \nПринят Государственной Думой 23 декабря 2005 года\nОдобрен Советом\
    \ Федерации 27 декабря 2005 года\n \nРатифицировать Протокол о внесении изменений и дополнений в Соглашение между Правительством\
    \ Российской Федерации и Правительством Киргизской Республики о трудовой деятельности и социальной защите трудящихся-мигрантов\
    \ от 28 марта 1996 года, подписанный в городе Москве 22 сентября 2003 года.\n \nПрезидент Российской Федерации В.Путин\n\
    \ \nМосква, Кремль\n3 января 2006 года\n№ 3-ФЗ\n "
  - " \nРОССИЙСКАЯ ФЕДЕРАЦИЯ\n \nФЕДЕРАЛЬНЫЙ ЗАКОН\n \nО ратификации Соглашения между Правительством Российской Федерации\
    \ и Правительством Киргизской Республики о сотрудничестве в сфере поставок нефти и нефтепродуктов\n \nПринят Государственной\
    \ Думой 21 декабря 2016 года\nОдобрен Советом Федерации 23 декабря 2016 года\n \nРатифицировать Соглашение между Правительством\
    \ Российской Федерации и Правительством Киргизской Республики о сотрудничестве в сфере поставок нефти и нефтепродуктов,\
    \ подписанное в городе Бишкеке 6 июня 2016 года.\n \nПрезидент Российской Федерации В.Путин\n \nМосква, Кремль\n28 декабря\
    \ 2016 года\n№ 479-ФЗ\n "
  - " \nРОССИЙСКАЯ ФЕДЕРАЦИЯ\n \nФЕДЕРАЛЬНЫЙ ЗАКОН\n \nО ратификации Соглашения между Правительством Российской Федерации\
    \ и Правительством Киргизской Республики о сотрудничестве в сфере транспортировки, распределения и реализации природного\
    \ газа на территории Киргизской Республики\n \nПринят Государственной Думой 17 января 2014 года\nОдобрен Советом Федерации\
    \ 29 января 2014 года\n \nРатифицировать Соглашение между Правительством Российской Федерации и Правительством Киргизской\
    \ Республики о сотрудничестве в сфере транспортировки, распределения и реализации природного газа на территории Киргизской\
    \ Республики, подписанное в городе Москве 26 июля 2013 года.\n \nПрезидент Российской Федерации В.Путин\n \nМосква, Кремль\n\
    3 февраля 2014 года\n№ 2-ФЗ\n "
- source_sentence: Как систематизировать и отслеживать исполнение обязательств России в рамках стратегического партнерства
    с Монголией согласно ратифицированному договору?
  sentences:
  - " \nРОССИЙСКАЯ ФЕДЕРАЦИЯ\n \nФЕДЕРАЛЬНЫЙ ЗАКОН\n \nО ратификации Протокола между Правительством Российской Федерации и\
    \ Правительством Республики Болгарии к Договору между Правительством Российской Федерации и Правительством Республики\
    \ Болгарии о поощрении и взаимной защите капиталовложений от 8 июня 1993 г.\n \nПринят Государственной Думой 21 октября\
    \ 2005 года\nОдобрен Советом Федерации 26 октября 2005 года\n \nРатифицировать Протокол между Правительством Российской\
    \ Федерации и Правительством Республики Болгарии к Договору между Правительством Российской Федерации и Правительством\
    \ Республики Болгарии о поощрении и взаимной защите капиталовложений от 8 июня 1993 г., подписанный в городе Софии 2 марта\
    \ 2003 года.\n \nПрезидент Российской Федерации В.Путин\n \nМосква, Кремль\n8 ноября 2005 года\n№ 143-ФЗ\n "
  - " \nРОССИЙСКАЯ ФЕДЕРАЦИЯ\n \nФЕДЕРАЛЬНЫЙ ЗАКОН\n \nО ратификации Договора о дружественных отношениях и всеобъемлющем стратегическом\
    \ партнерстве между Российской Федерацией и Монголией\n \nПринят Государственной Думой 23 июня 2020 года\nОдобрен Советом\
    \ Федерации 8 июля 2020 года\n \nРатифицировать <ref nd=\"102913749\"> Договор </ref> о дружественных отношениях и всеобъемлющем\
    \ стратегическом партнерстве между Российской Федерацией и Монголией, подписанный в городе Улан-Баторе 3 сентября 2019\
    \ года.\n \nПрезидент Российской Федерации В.Путин\n \nМосква, Кремль\n13 июля 2020 года\n№ 198-ФЗ\n "
  - " \nРОССИЙСКАЯ ФЕДЕРАЦИЯ\n \nФЕДЕРАЛЬНЫЙ ЗАКОН\n \nО ратификации Договора между Российской Федерацией и Монголией о правовой\
    \ помощи и правовых отношениях по гражданским и уголовным делам и Протокола к Договору между Российской Федерацией и Монголией\
    \ о правовой помощи и правовых отношениях по гражданским и уголовным делам от 20 апреля 1999 г.\n \nПринят Государственной\
    \ Думой 3 октября 2007 года\nОдобрен Советом Федерации 17 октября 2007 года\n \nРатифицировать Договор между Российской\
    \ Федерацией и Монголией о правовой помощи и правовых отношениях по гражданским и уголовным делам, подписанный в городе\
    \ Улан-Баторе 20 апреля 1999 года, и Протокол к Договору между Российской Федерацией и Монголией о правовой помощи и правовых\
    \ отношениях по гражданским и уголовным делам от 20 апреля 1999 г., подписанный в городе Улан-Баторе 12 сентября 2002\
    \ года.\n \nПрезидент Российской Федерации В.Путин\n \nМосква, Кремль\n30 октября 2007 года\n№ 236-ФЗ\n "
