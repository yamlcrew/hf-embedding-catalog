- source_sentence: Как внедрить в информационную систему новые правила предоставления тарифных льгот в соответствии с ратифицированным
    протоколом от 12 декабря 2008 года?
  sentences:
  - " \nРОССИЙСКАЯ ФЕДЕРАЦИЯ\n \nФЕДЕРАЛЬНЫЙ ЗАКОН\n \nО ратификации Протокола о предоставлении тарифных льгот\n \nПринят\
    \ Государственной Думой 20 ноября 2009 года\nОдобрен Советом Федерации 25 ноября 2009 года\n \nРатифицировать Протокол\
    \ о предоставлении тарифных льгот, подписанный в городе Москве 12 декабря 2008 года.\n \nПрезидент Российской Федерации\
    \ Д.Медведев\n \nМосква, Кремль\n28 ноября 2009 года\n№ 302-ФЗ\n "
  - " \nРОССИЙСКАЯ ФЕДЕРАЦИЯ\n \nФЕДЕРАЛЬНЫЙ ЗАКОН\n \nО внесении изменения в статью 22 Федерального закона \"О государственной\
    \ гражданской службе Российской Федерации\"\n \nПринят Государственной Думой 29 января 2010 года\nОдобрен Советом Федерации\
    \ 3 февраля 2010 года\n \nВнести в часть 3 статьи 22 Федерального закона <ref nd=\"102088054\"> от 27 июля 2004 года №\
    \ 79-ФЗ </ref> \"О государственной гражданской службе Российской Федерации\" (Собрание законодательства Российской Федерации,\
    \ 2004, № 31, ст. 3215) изменение, заменив слова \"указом Президента Российской Федерации\" словами \"нормативным актом\
    \ государственного органа\".\n \nПрезидент Российской Федерации Д.Медведев\n \nМосква, Кремль\n14 февраля 2010 года\n\
    № 9-ФЗ\n "
  - " \nРОССИЙСКАЯ ФЕДЕРАЦИЯ\n \nФЕДЕРАЛЬНЫЙ ЗАКОН\n \nО ратификации Соглашения об определении таможенной стоимости товаров,\
    \ перемещаемых через таможенную границу таможенного союза\n \nПринят Государственной Думой 10 декабря 2008 года\nОдобрен\
    \ Советом Федерации 17 декабря 2008 года\n \nРатифицировать Соглашение об определении таможенной стоимости товаров, перемещаемых\
    \ через таможенную границу таможенного союза, подписанное в городе Москве 25 января 2008 года.\n \nПрезидент Российской\
    \ Федерации Д.Медведев\n \nМосква, Кремль\n22 декабря 2008 года\n№ 258-ФЗ\n "
- source_sentence: Какие бизнес-процессы необходимо проанализировать для автоматизации документооборота по формированию и
    утверждению дополнительных смет расходов Верховного Совета РФ?
  sentences:
  - " \nРОССИЙСКАЯ ФЕДЕРАЦИЯ\n \nФЕДЕРАЛЬНЫЙ ЗАКОН\n \nО ратификации Соглашения между Правительством Российской Федерации\
    \ и Правительством Княжества Лихтенштейн об упрощении процедуры выдачи виз гражданам Российской Федерации и Княжества\
    \ Лихтенштейн\n \nПринят Государственной Думой 19 декабря 2014 года\nОдобрен Советом Федерации 25 декабря 2014 года\n\
    \ \nРатифицировать Соглашение между Правительством Российской Федерации и Правительством Княжества Лихтенштейн об упрощении\
    \ процедуры выдачи виз гражданам Российской Федерации и Княжества Лихтенштейн, подписанное в городе Вадуце 12 ноября 2013\
    \ года.\n \nПрезидент Российской Федерации В.Путин\n \nМосква, Кремль\n29 декабря 2014 года\n№ 472-ФЗ\n "
  - " \n ПОСТАНОВЛЕНИЕ \n ПРЕЗИДИУМА ВЕРХОВНОГО СОВЕТА \n РОССИЙСКОЙ ФЕДЕРАЦИИ \n О дополнительной смете расходов Верховного\
    \ Совета \n Российской Федерации на содержание Института \n законодательства и сравнительного правоведения \n при Верховном\
    \ Совете Российской Федерации на 1992 год \n Президиум Верховного Совета Российской Федерации постановляет: \n Внести\
    \ на рассмотрение Верховного Совета Российской Федерации проект постановления Верховного Совета Российской Федерации \"\
    Об утверждении дополнительной сметы расходов Верховного Совета Российской Федерации на содержание Института законодательства\
    \ и сравнительного правоведения при Верховном Совете Российской Федерации на 1992 год\". \n Председатель Верховного Совета\
    \ \n Российской Федерации Р. И. ХАСБУЛАТОВ \n Москва, Дом Советов России \n 15 июня 1992 года \n N 3018-I\n "
  - " \nПОСТАНОВЛЕНИЕ\n \nСОВЕТА ФЕДЕРАЦИИ\nФЕДЕРАЛЬНОГО СОБРАНИЯ РОССИЙСКОЙ ФЕДЕРАЦИИ\n \nО Федеральном законе \"Об органической\
    \ продукции и о внесении изменений в отдельные законодательные акты Российской Федерации\"\n \nРассмотрев принятый Государственной\
    \ Думой Федерального Собрания Российской Федерации <ref nd=\"102477636\"> 25 июля 2018 года </ref> Федеральный закон \"\
    Об органической продукции и о внесении изменений в отдельные законодательные акты Российской Федерации\" в соответствии\
    \ со статьей 106 Конституции Российской Федерации, Совет Федерации Федерального Собрания Российской Федерации постановляет:\n\
    1. Одобрить Федеральный закон \"Об органической продукции и о внесении изменений в отдельные законодательные акты Российской\
    \ Федерации\".\n2. Настоящее постановление вступает в силу со дня его принятия.\n \nПредседатель Совета Федерации\nФедерального\
    \ Собрания\nРоссийской Федерации В.И.Матвиенко\n \nМосква\n28 июля 2018 года\n№ 387-СФ\n "
- source_sentence: Как организовать автоматизированное отслеживание процесса внесения и рассмотрения законопроектов в Государственной
    Думе?
  sentences:
  - " \nПОСТАНОВЛЕНИЕ\n \nГОСУДАРСТВЕННОЙ ДУМЫ\nФЕДЕРАЛЬНОГО СОБРАНИЯ РОССИЙСКОЙ ФЕДЕРАЦИИ\n \nО Федеральном законе \"О внесении\
    \ изменений в статью 11 Федерального закона \"О парламентском контроле\"\n(проект № 789991-6)\n \nГосударственная Дума\
    \ Федерального Собрания Российской Федерации постановляет:\n1. Принять Федеральный закон \"О внесении изменений в статью\
    \ 11 Федерального закона \"О парламентском контроле\" (проект № 789991-6).\n2. Направить указанный Федеральный закон в\
    \ Совет Федерации Федерального Собрания Российской Федерации.\n3. Настоящее Постановление вступает в силу со дня его принятия.\n\
    \ \nПредседатель Государственной Думы\nФедерального Собрания\nРоссийской Федерации С.Е.Нарышкин\n \nМосква\n2 декабря\
    \ 2015 года\n№ 7752-6 ГД\n "
  - " \nРОССИЙСКАЯ ФЕДЕРАЦИЯ\n \nФЕДЕРАЛЬНЫЙ ЗАКОН\n \nО ратификации Соглашения о сотрудничестве государств - участников Содружества\
    \ Независимых Государств в области предупреждения и ликвидации чрезвычайных ситуаций\n \nПринят Государственной Думой\
    \ 25 октября 2017 года\nОдобрен Советом Федерации 8 ноября 2017 года\n \nРатифицировать <span class=\"cmd\" style=\"\"\
    /><ref nd=\"102101864\">Соглашение</ref> о сотрудничестве государств - участников Содружества Независимых Государств в\
    \ области предупреждения и ликвидации чрезвычайных ситуаций, подписанное в поселке Бурабай (Республика Казахстан) 16 октября\
    \ 2015 года.\n \nПрезидент Российской Федерации В.Путин\n \nМосква, Кремль\n14 ноября 2017 года\n№ 314-ФЗ\n "
  - " ПРАВИТЕЛЬСТВО РОССИЙСКОЙ ФЕДЕРАЦИИ \n РАСПОРЯЖЕНИЕ \n от 30 июля 1994 г. N 1219-р \n г. Москва \n 1. Внести в Государственную\
    \ Думу проект федерального закона \"О благотворительной деятельности и благотворительных организациях в Российской Федерации\"\
    . \n 2. Назначить представителем Правительства Российской Федерации при рассмотрении проекта федерального закона \"О благотворительной\
    \ деятельности и благотворительных организациях в Российской Федерации\" в Федеральном Собрании Министра социальной защиты\
    \ населения Российской Федерации Безлепкину Людмилу Федоровну. \n Председатель Правительства \n Российской Федерации В.Черномырдин\
    \ \n "
- source_sentence: Как я могу спроектировать систему для автоматизации процесса организованного набора граждан Таджикистана
    для временной трудовой деятельности в России согласно ратифицированному соглашению?
  sentences:
  - " \nРОССИЙСКАЯ ФЕДЕРАЦИЯ\n \nФЕДЕРАЛЬНЫЙ ЗАКОН\n \nО ратификации Соглашения между Правительством Российской Федерации\
    \ и Правительством Республики Таджикистан об организованном наборе граждан Республики Таджикистан для осуществления временной\
    \ трудовой деятельности на территории Российской Федерации\n \nПринят Государственной Думой 17 декабря 2019 года\nОдобрен\
    \ Советом Федерации 23 декабря 2019 года\n \nРатифицировать <ref nd=\"102746325\"> Соглашение </ref> между Правительством\
    \ Российской Федерации и Правительством Республики Таджикистан об организованном наборе граждан Республики Таджикистан\
    \ для осуществления временной трудовой деятельности на территории Российской Федерации, подписанное в городе Москве 17\
    \ апреля 2019 года.\n \nПрезидент Российской Федерации В.Путин\n \nМосква, Кремль\n27 декабря 2019 года\n№ 466-ФЗ\n "
  - " \nРОССИЙСКАЯ ФЕДЕРАЦИЯ\n \nФЕДЕРАЛЬНЫЙ ЗАКОН\n \nО внесении изменения в статью 6.31 Кодекса Российской Федерации об\
    \ административных правонарушениях\n \nПринят Государственной Думой 17 марта 2021 года\nОдобрен Советом Федерации 31 марта\
    \ 2021 года\n \nВнести в абзац первый части 1 статьи 6.31 <ref nd=\"102074277\"> Кодекса Российской Федерации об административных\
    \ правонарушениях </ref> (Собрание законодательства Российской Федерации, 2002, № 1, ст. 1; 2014, № 19, ст. 2324) изменение,\
    \ изложив его в следующей редакции:<p style=\"line-height:200%;\">\"1. Несоблюдение субъектами обращения донорской крови\
    \ и (или) ее компонентов правил заготовки, хранения, транспортировки и клинического использования донорской крови и ее\
    \ компонентов, установленных Правительством Российской Федерации, -\".\n \nПрезидент Российской Федерации В.Путин\n \n\
    Москва, Кремль\n5 апреля 2021 года\n№ 82-ФЗ\n "
  - " \nРОССИЙСКАЯ ФЕДЕРАЦИЯ\n \nФЕДЕРАЛЬНЫЙ ЗАКОН\n \nО ратификации Соглашения между Правительством Российской Федерации\
    \ и Правительством Республики Таджикистан о строительстве и материально-техническом оснащении общеобразовательных учреждений\
    \ в городах Душанбе, Куляб, Худжанд, Бохтар и Турсунзаде, осуществляющих обучение на русском языке\n \nПринят Государственной\
    \ Думой 11 февраля 2020 года\nОдобрен Советом Федерации 12 февраля 2020 года\n \nРатифицировать Соглашение между Правительством\
    \ Российской Федерации и Правительством Республики Таджикистан о строительстве и материально-техническом оснащении общеобразовательных\
    \ учреждений в городах Душанбе, Куляб, Худжанд, Бохтар и Турсунзаде, осуществляющих обучение на русском языке, подписанное\
    \ в городе Москве 17 апреля 2019 года.\n \nПрезидент Российской Федерации В.Путин\n \nМосква, Кремль\n18 февраля 2020\
    \ года\n№ 18-ФЗ\n "
- source_sentence: Какие основные этапы рассмотрения и принятия прошел Договор о дружбе между РФ и Украиной перед его ратификацией
    в 1999 году?
  sentences:
  - " \nРОССИЙСКАЯ ФЕДЕРАЦИЯ\n \nФЕДЕРАЛЬНЫЙ ЗАКОН\n \nО ратификации Договора о дружбе, сотрудничестве и партнерстве между\
    \ Российской Федерацией и Украиной\n \nПринят Государственной Думой 25 декабря 1998 года\nОдобрен Советом Федерации 17\
    \ февраля 1999 года\n \nРатифицировать Договор о дружбе, сотрудничестве и партнерстве между Российской Федерацией и Украиной,\
    \ подписанный в городе Киеве 31 мая 1997 года.\n \nПрезидент Российской Федерации Б.Ельцин\n \nМосква, Кремль\n2 марта\
    \ 1999 года\n№ 42-ФЗ\n "
  - " \nРОССИЙСКАЯ ФЕДЕРАЦИЯ\n \nФЕДЕРАЛЬНЫЙ ЗАКОН\n \nО ратификации Договора о дружбе и сотрудничестве между Российской Федерацией\
    \ и Республикой Молдова\n \nПринят Государственной Думой 5 апреля 2002 года\nОдобрен Советом Федерации 23 апреля 2002\
    \ года\n \nРатифицировать Договор о дружбе и сотрудничестве между Российской Федерацией и Республикой Молдова, подписанный\
    \ в городе Москве 19 ноября 2001 года.\n \nПрезидент Российской Федерации В.Путин\n \nМосква, Кремль\n29 апреля 2002 года\n\
    № 43-ФЗ\n "
  - " \nРОССИЙСКАЯ ФЕДЕРАЦИЯ\n \nФЕДЕРАЛЬНЫЙ ЗАКОН\n \nО внесении изменений в статьи 69 и 119 Таможенного кодекса Российской\
    \ Федерации\n \nПринят Государственной Думой 23 сентября 2009 года\nОдобрен Советом Федерации 7 октября 2009 года\n \n\
    Статья 1\n \nВнести в <ref nd=\"102081875\"> Таможенный кодекс Российской Федерации </ref> (Собрание законодательства\
    \ Российской Федерации, 2003, № 22, ст. 2066) следующие изменения:\n1) в абзаце втором пункта 1 статьи 69 слово \"устанавливать\"\
    \ заменить словом \"определять\";\n2) пункт 1 статьи 119 дополнить абзацем следующего содержания:\n\"Правительство Российской\
    \ Федерации вправе определять пункты пропуска через Государственную границу Российской Федерации для убытия с таможенной\
    \ территории Российской Федерации отдельных видов товаров.\".\n \nСтатья 2\n \nНастоящий Федеральный закон вступает в\
    \ силу по истечении одного месяца со дня его официального опубликования.\n \nПрезидент Российской Федерации Д.Медведев\n\
    \ \nМосква, Кремль\n13 октября 2009 года\n№ 231-ФЗ\n "
