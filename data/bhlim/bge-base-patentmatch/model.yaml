widgetData:
- source_sentence: The UE sends the uplink signal including the identifier of the uplink serving node to the downlink serving
    node and in this case the downlink serving node learns the mapping relationship among the UE the uplink serving node and
    the downlink serving node.The UE sends the uplink signal including the identifier of the downlink serving node to the
    uplink serving node an in thiscase the uplink serving node learns the mapping relationship among the UE the uplink serving
    node and the downlink serving node.
  sentences:
  - A terminal for use in a wireless communication network comprising a plurality of base stations the terminal arranged to
    communicate with the network via at least two cells of a plurality of cells and to transmit a request for uplink resources
    wherein the terminal is arranged to select at least one cell from among said plurality of said cells for transmission
    of said request a resource for transmission of said request from among a plurality of resources provided by a cell and
    a characteristic of a signal used to transmit said request and to perform the selection in dependence on at least one
    of the reason for said request the characteristics of an uplink channel for transmission of said request and the preference
    of the network.
  - The electronic device of any of claims 15 wherein the processor is further configured to check whether the specific audio
    data is stored at the memory in response to a play request on the specific audio data.
  - The system of claim 1 or claim 2 comprising a plurality of said radiation emitting devices.
- source_sentence: Further in the example of Fig.35 the sound adjusting circuit 210 controls the sound outputs of the first
    to fourth speakers 161 to 164 based on the sound data from the first to fifth detection sensors 420 to 428 so that the
    first sound corresponding to the second display image is localized in the first area 810 where the occupant of the driver
    seat 13 and the occupant of the rear seat 18 equipped with the headrest 25 are located.Likewise the sound adjusting circuit
    210 controls the sound outputs of the first to fourth speakers 161 to 164 based on the sound data from the first to fifth
    detection sensors 420 to 428 so that the second sound corresponding to the first display image is localized in the second
    area 820 where the occupant of the assistant drivers seat 12 and the occupants of the rear seats 18 equipped with the
    headrests 26 and 27 respectively are located.Accordingly the occupant of the rear seat 18 equipped with the headrest 26
    who is located in the crosstalk area 603 in Fig.33 can now hear the second sound clearly.
  sentences:
  - A gas turbine engine comprising a bladed rotor assembly 100200300400 according to any one of Claims 1 to 9.
  - The method of claim 1 further comprising sensing a distance between the display and a user wherein applying the sound
    setting comprises applying the sound setting based on the sensed distance between the display and the user and the obtained
    curvature of the panel of the display.
  - A developer carrying member that is capable of carrying a developer on a surface thereof and that supplies the developer
    carried on the surface to a surface of an image bearing member when a voltage is applied thereto comprising an elastic
    layer and a surface layer that covers the elastic layer contains alumina and has a higher volume resistivity than the
    elastic layer.
- source_sentence: In the example of fig.1 a user 107 who arrives in the underground area 109 and who has not yet subscribed
    to the electronic ticket service may subscribe to the service by connecting his Bluetooth device 107a to a Bluetooth access
    point 104 of the service provider via a Bluetooth service device 104a.At the access point 104 the customer 104 may perform
    a payment transaction select a desired subscription and receive a link key.With the link key the users Bluetooth device
    107a may subsequently establish secure Bluetooth connections with the Bluetooth transceivers 101 and 102af.
  sentences:
  - A wireless communications device 102 for setting up a local service session in a shortrange wireless communication network
    comprising means for sending 222 a request for preconfiguration information over a longrange network 104 to a remote destination
    112 the preconfiguration information enabling establishment of the local service session with a proximate wireless communications
    device 110means for receiving 222 from the remote destination 112 the requested preconfiguration information wherein the
    requested preconfiguration information includes one or more security keys for performing an authentication process with
    the proximate wireless communications device 110 over shortrange wireless communication means for performing 220 an authentication
    process for establishing the local service session with the proximate wireless communications device 110 over the shortrange
    wireless communication using the received one or more security keys and means for establishing 220 the local service session
    with the proximate wireless communications device 112 over the shortrange wireless communications after the authentication
    process.
  - The mobile terminal any one of claims 2 to 4 wherein the controller 180 is further configured to differently process a
    color of the image corresponding to the trajectory of the second touch based on a position of the first touch.
  - A detergent box assembly for a washing machine comprising a detergent box a distributor box having a front plate a rear
    plate and a receiving chamber provided therebetween said receiving chamber configured to store a laundry treat agent the
    distributor box being movably disposed within the detergent box and adapted to move between an open position and a closed
    position a keypress being provided in the front plate and a driving subassembly disposed in at least one of the detergent
    box and the distributor box and configured to drive the distributor box to move from the closed position to the open position
    when the keypress is pressed.
- source_sentence: The step of determining may comprisemeasuring a distance between each surrogate server and each subnetwork
    according to the subnetwork of the user selecting a surrogate server with the smallest distance.
  sentences:
  - The computer system of Claim 13 comprising a memory storing instructions which when implemented on the one or more processors
    configure the computer system to carry out the method of any one of Claims 1 to 10
  - A cooking oven 1 comprising a housing 2 a cooking cavity 3 formed in the housing 2 and closable by a door 5 heating means
    6 6 placed in thermal exchange relationship with the cooking cavity 3 ventilating means placed in the housing 2 and having
    one or more electrical fans 7 8 7 8 adapted to ventilate on one or more thermally sensitive areas of the oven 1 a control
    system 10 connected to the heating means 6 6 and to the ventilating means and having a temperature detector 12 associated
    with the cooking cavity 3 wherein the control system is configured to activate and deactivate the heating means 6 6 depending
    on a temperature detected by the temperature detector 12 characterized in that the control system 10 activates and deactivates
    at least one of said one or more fans 7 8 7 8 automatically together with the respective activation and deactivation of
    the heating means 6 6.
  - The method of claim 12 wherein selecting the target control parameter further comprises for the respective selected control
    parameters comparing the initial turbine output with the predicted turbine output while operating the selected control
    parameter with the adjustment of the selected control parameter to determine an adjustment differential and selecting
    the target control parameter having the target adjustment by using the adjustment differential of the target control parameter.
- source_sentence: Referring to FIG.32 a a sink device 3200 is designed to display thumbnail images in the metadata of contents
    received from source devices connected via an integrated wire interface.As mentioned in the foregoing description if a
    remote controller 3250 capable of outputting a pointing signal is situated within a region of a specific thumbnail image
    3260 side information e.g.Amanda 1st album singer.Song etc.is displayed together.
  sentences:
  - The method of any one of claims 8 to 12 wherein the requesting for the broadcast channel information comprises transmitting
    to the server image data obtained by capturing the content being reproduced by the display apparatus or audio data obtained
    by recording the content for a certain time.
  - The electrode assembly of any one of the preceding claims wherein the first electrode comprises a substrate 113 wherein
    the first active material layer comprises active material layers 112 on both surfaces of the substrate and the ceramic
    layer comprises ceramic material layers 50 on both surfaces of the substrate.
  - A method according to claim 1 wherein said topsheet assembly is a threeply laminate comprising an acquisition layer a
    nonwoven layer and a cuff assembly.
