    - PROJETO DE LEI No DE 2006 Do Sr. Luiz Carlos Hauly Altera os arts. 1º, caput 5º, I 6º, 4º e 7º 49 52, 4º e 71, incisos
      I e II, bem como revoga os arts. 57 e 68 da Lei nº 11. 101, de 9 de fevereiro de 2005, para eliminar a correção monetária
      do plano especial de recuperação judicial para microempresas e empresas de pequeno porte, e dá outras providências.
      O Congresso Nacional decreta Art. 1º Os arts. 1º, caput 5º, I 6º, 4º e 7º 49 52, 4º e art. 71, incisos I e II, da Lei
      nº 11. 101, de 9 de fevereiro de 2005, passam a vigorar com a seguinte redação Art. 1º Esta Lei disciplina a recuperação
      judicial, a falência e a recuperação extrajudicial do empresário, da sociedade cooperativa e da sociedade empresária,
      doravante referidos simplesmente como devedor. Art. 5º I as obrigações a título gratuito, aval e fiança Art. 6º 4º Na
      recuperação judicial, a suspensão de que trata o caput deste artigo dar se á pelo prazo de 180 cento e oitenta dias,
      contados do deferimento do processamento da recuperação, prorrogável uma única vez por até 90 noventa dias, a critério
      do juízo ou caso a assembléia geral de credores não tenha aprovado o respectivo plano de recuperação judicial e, após
      o decurso desse prazo, será restabelecido o direito dos 2 credores de iniciar ou continuar suas ações e execuções, independentemente
      de pronunciamento judicial. 7º As execuções de natureza fiscal ficam suspensas a partir do deferimento da recuperação
      judicial. Art. 49. Estão sujeitos à recuperação judicial todos os créditos existentes na data do pedido, ainda que não
      vencidos, inclusive os créditos tributários. Art. 52. 4º O devedor não poderá desistir do pedido de recuperação judicial
      após o deferimento de seu processamento, salvo se obtiver aprovação da desistência na assembléia geral de credores,
      que obtenha, no mínimo, quorum de 50 cinqüenta porcento dos credores presentes, ficando impossibilitado de renovar pedido
      de recuperação pelo período de 2 dois anos, contados da homologação da desistência pelo juízo. Art. 71........................................................................
      I abrangerá todos os credores II preverá o parcelamento em até 48 quarenta e oito parcelas mensais iguais e sucessivas,
      acrescidas de juros de 6 seis por cento ao ano III IV Parágrafo único. NR Art. 2º Ficam revogados os arts. 57 e 68 da
      Lei nº 11. 101, de 9 de fevereiro de 2005. Art. 3º Esta Lei entra em vigor na data de sua publicação oficial. 3 JUSTIFICAÇÃO
      A Lei nº 11. 101 que regulamenta a recuperação judicial, a extrajudicial e a falência do devedor empresário ou da sociedade
      empresária, que entrou em vigor no mês de junho de 2005, contém algumas impropriedades que, a nosso ver, carecem de
      um urgente aperfeiçoamento nesta Casa. Primeiramente, queremos destacar a problemática dos créditos fiscais que vêm
      dificultando, em muito, o acesso das empresas ao plano de recuperação judicial, levando as em direção à pior alternativa
      legal, que é a falência. Ocorre que a nova lei, em seu art. 6º, 7º, determinou a não suspensão das execuções de natureza
      fiscal com o deferimento da recuperação judicial. Tal medida, na prática, excluiu os créditos fiscais do processo de
      recuperação, a despeito de, no mesmo parágrafo 7º, o Legislador ter ressalvado a possibilidade de o empresário pleitear
      o parcelamento desses créditos junto à autoridade tributária, observados os termos do Código Tributário Nacional e da
      legislação ordinária específica. Tal tratamento aos créditos fiscais na recuperação judicial nos parece muito incoerente
      e inibe o acesso das empresas com passivo fiscal ao instituto da recuperação judicial. Entendemos que os créditos fiscais
      devem, sim, ser submetidos à recuperação judicial, como, aliás, defendemos durante a fase de discussão da proposição
      na sua primeira tramitação nesta Casa. Do mesmo modo, também estamos propondo a supressão dos art. 57 e 68. Na prática,
      em alguns casos já verificados após o advento da nova lei, configura se como inviável, para as empresas em vias de recuperação,
      cumprir a exigência contida no art. 57 da nova lei, qual seja a de apresentar a prova de quitação de débitos para com
      o Fisco, como pré requisito para terem o pedido de recuperação deferido pelo Juiz. Ora, uma vez que a empresa se encontra
      em difícil situação econômico financeira, e projeta se à elaboração de um plano de recuperação judicial, é porque não
      está conseguindo assumir as dívidas pactuadas com os credores, e, conseqüentemente, com o Fisco. As empresas que se
      encontram em tal situação, com um expressivo passivo fiscal, dificilmente conseguirão arcar com os seus débitos 4 fiscais,
      mostrando se, portanto, inviável o atendimento da exigência da prova de quitação dos débitos perante o Fisco. Isto ocorre
      porque a empresa em dificuldades prioriza, como é o lógico e o mais pertinente a ser feito, o destino de seus poucos
      proventos que ainda restam ao pagamento de seus empregados e fornecedores. Esta prioridade dá se em virtude da necessidade
      de manter a empresa em funcionamento. Todos sabemos que uma empresa que não paga os seus funcionários, quanto menos
      seus fornecedores, jamais terá condições de continuar com as suas atividades. Por isto, é elementar a prioridade do
      deslocamento das verbas restantes, em desfavor do Fisco. Saliente se que a certidão negativa somente poderá ser recusada
      se houver crédito efetivamente constituído contra o interessado. O simples descumprimento de obrigação tributária, principal
      ou acessória, não enseja motivo suficiente para a autoridade competente recusar a expedição, a menos que já tenha sido
      feito o lançamento do crédito correspondente. Ademais, como o objetivo primordial da nova lei ao buscar a superação
      de crise econômico financeira do devedor é o de assegurar a manutenção da fonte produtora de bens e serviços e dos empregos,
      consideramos ser imprescindível incluir no art. 1º, que estabelece o alcance da nova lei, as sociedades cooperativas,
      visto que essas entidades estão atravessando enormes dificuldades econômicas e financeiras sobre as quais os novos dispositivos
      da LRJ F não pode trazer qualquer alívio ou solução jurídica. Certamente, a nova lei se constitui numa grande conquista
      para a modernização de nossa economia e, especialmente, para a reestruturação de nossas empresas, que vêm lutando há
      anos contra uma excessiva carga tributária e contra os escorchantes juros cobrados em nosso País. Deixar as cooperativas
      à margem da nova lei constitui se num equívoco que poderá trazer sérios prejuízos a milhares de brasileiros que operam
      num setor muito expressivo da economia nacional. De outro modo, a nosso ver, a Lei nº 11. 101 05 foi muito dura com
      o tratamento dado às microempresas e empresas de pequeno porte, fugindo, inclusive, do mandamento constitucional contido
      no inciso IX do art. 5 170, que determina tratamento favorecido para as empresas de pequeno porte constituídas sob as
      leis brasileiras e que tenham sua sede e administração no país Assim, também propomos uma urgente e necessária modificação
      nos termos do plano de recuperação judicial que deverá ser apresentado por microempresa ou empresa de pequeno porte,
      uma vez que a atual redação dos incisos I e II do art. 71 da Lei nº 11. 101 05 se configura absolutamente prejudicial
      àquelas empresas, trazendo uma injustificada discriminação e excessivo ônus para o processo de recuperação judicial
      das empresas inseridas nesse importante segmento da economia nacional. A atual redação do inciso I do art. 71 determina
      que o plano de recuperação judicial das microempresas e empresas de pequeno porte abrangerá exclusivamente os créditos
      quirografários, deixando de fora os credores que forem bancos e outras instituições integrantes do Sistema Financeiro
      Nacional. Ora, como uma microempresa que deve a bancos poderá efetivamente pleitear sua recuperação, se os créditos
      detidos por bancos estão excluídos do plano Trata se certamente de um contra senso e de um absurdo que precisa ser corrigido
      urgentemente. Ademais, o inciso II do mesmo artigo estipula um parcelamento em apenas 36 meses e correção monetária
      e juros de 12 para o pagamento das parcelas devidas pelas microempresas e empresas de pequeno porte submetidas a processo
      de recuperação judicial. Mais uma vez, a nova lei não se coadunou com o art. 170, IX, da Constituição Federal, na medida
      em que não propiciou um prazo factível e suficiente para a reorganização financeira das microempresas e empresas de
      pequeno porte, como tampouco lhes amenizou os encargos sobre o passivo devido. Tal exigência, aliás, não existe na mesma
      lei para empresas de médio e grande porte, uma vez que o plano de recuperação dessas empresas poderá prever abatimento
      de juros, total ou parcial, desde que haja anuência dos seus credores. 6 Por estas razões, contamos com o apoio de nossos
      Pares para incluir estas modificações na Lei nº 11. 101 05, objetivando possibilitar condições mais justas e equânimes
      no processo de recuperação judicial para as sociedades cooperativas e microempresas e empresas de pequeno porte, que
      são tão importantes para a economia nacional. Sala das Sessões, em de de 2006. Deputado LUIZ CARLOS HAULY PSDB PR
  - source_sentence: PROJETO DE LEI Nº DE 2013 Do Sr. Vitor Penido Altera o art. 2º da Lei nº 11. 096, de 13 de Janeiro de
      2005 que institui o Programa Universidade Para Todos PROUNI. O Congresso Nacional decreta Art. 1º O inciso I do art.
      2º da Lei nº 11. 096, de 13 de Janeiro de 2005 fica com a seguinte redação Art. 2º A bolsa será destinada a I Estudante
      que tenha cursado o ensino médio integralmente em escola pública ou que comprove renda familiar que impeça o pagamento
      da mensalidade escolar em instituição de ensino superior. Art. 2º. Esta lei entra em vigor na data de sua publicação.
      JUSTIFICAÇÃO O Programa Universidade Para Todos representou uma importante contribuição para a democratização do acesso
      ao ensino superior. Exatamente por sua relevância merece medidas que o aperfeiçoem. 2 O inciso I do art. 3º da Lei nº
      11. 096 de 2005, que institui o Programa Universidade Para Todos, restringe o acesso às bolsas que oferece apenas a
      candidatos que tenham cursado todas as séries do ensino médio em escola pública ou que as tenham cursado em escola particular
      na condição de bolsista integral. A premissa que orienta o dispositivo é a de que as famílias dos alunos nas situações
      nele estipuladas não contariam com as condições financeiras para arcar com os custos das mensalidades nos estabelecimentos
      de ensino superior. O princípio está correto apenas parcialmente, pois há que se considerar o caso de estudantes cujas
      famílias tiveram queda acentuada de renda durante ou após a conclusão do ensino médio. Esta é uma possibilidade real
      em vista da crise econômica e do desemprego que assola a classe média brasileira os estratos de renda mais elevada da
      classe média têm visto seus números decrescerem dramaticamente nas últimas décadas. É comum que, perdendo o emprego
      o chefe de família, seus filhos tenham que sair da escola particular. Porém, o fato de terem por um período, por pequeno
      que seja, pago as mensalidades de um estabelecimento privado de ensino desqualifiqua os para a candidatura ao Prouni.
      Há, ainda, o caso de famílias que nunca fizeram parte a da classe média mas que em extremo sacrifício conseguiram pagar
      um estabelecimento particular durante o ensino médio. E também não se qualificam para o PROUNI pelo critério atual.
      Trata se de evidente injustiça que este projeto de lei vem corrigir. Sala das Sessões, em de de 2013.. Deputado VITOR
      PENIDO 2007_1624_Vitor Penido_145
    sentences:
    - Projeto de Lei n. º____, de 2008. Da Deputada Luciana Genro PSOL RS Dá nova redação ao inciso VI, do art. 46 da lei
      nº 9. 610, de 19 de fevereiro de 1998, que Altera, atualiza e consolida a legislação sobre direitos autorais e dá outras
      providências. O Congresso Nacional Decreta Art. 1º Esta Lei dá nova redação ao inciso VI, do art. 46 da Lei n. º 9.
      610, de 19 de fevereiro de 1988, que altera, atualiza e consolida a legislação sobre direitos autorais e dá outras providências.
      Art. 2º O inciso VI, do art. 46 da Lei n. º 9. 610, de 19 de fevereiro de 1988, passa a vigorar com a seguinte redação
      Art. 46. Não constitui ofensa aos direitos autorais VI a representação teatral e a execução musical realizadas no recesso
      familiar, nos estabelecimentos de ensino e naqueles destinados à prática desportiva NR JUSTIFICAÇÃO A Constituição Federal
      art. 5º, inciso XXVII assegura o direito do autor e a Lei n. º 9. 610, de 1998, regula a matéria relativa aos direitos
      autorais. O exercício do direito de autor implica, nos termos da Lei 9. 610, na cobrança pelo Escritório Central de
      Arrecadação ECAD, de valor pecuniário, por exemplo, pela execução musical com intuito de lucro. Apesar de tratar se
      cláusula pétrea e direito individual, o direito de autor, principalmente numa república democrática, deve ser entendido
      conjugado com outros direitos e deveres, dentre eles o direito à cultura, educação, desporto e comunicação e o dever
      da função social da propriedade. 1 C 2 7 F B E 1 3 2 1 C 27 FB E 13 2 Esta função social, aliás, é igualmente um poder
      dever pétreo e individual homogêneo, vez que consta do mesmo rol do mencionado art. 5º da CF inciso XXIII A atual redação
      do inciso VI do art. 46 da lei de direitos autorais tem se mostrado prejudicial ao direito constitucional à privacidade,
      aos direitos do consumidor, ao aceso ao conhecimento, ao acesso à cultura. Tem contribuído para uma interpretação judicial
      restritiva da lei de direito autoral no Brasil, nas milhares de ações judiciais que intentam a cobrança pela execução
      musical em estabelecimentos de prática desportiva. Vemos que, como já foi dito, pela mera referência à reprodução eventual
      de alguma música de autores nacionais não pode dar amparo à cobrança dos direitos autorais. É certo, ainda, que a finalidade
      de execução musical em estabelecimentos onde há prática desportiva não é essencialmente comercial para o destinatário
      da reprodução o desportista e que o efeito da execução não acarreta prejuízo à exploração normal da obra pelo autor,
      mas, ao contrário, pode até estimulá la. Estas são as razões pelas quais apresentamos o presente projeto, rogando pelo
      apoiamento dos pares. Sala das Sessões, 11 de junho de 2008. Deputada Luciana Genro PSOL RS 1 C 2 7 F B E 1 3 2 1 C
      27 FB E 13 2
    - CÂMARA DOS DEPUTADOS PROJETO DE LEI Nº DE 2015 Do Sr. Takayama Dispõe sobre a prestação de assistência religiosa e espiritual
      por meio de capelania nos estabelecimentos que menciona e dá outras providencias. O Congresso Nacional decreta Art.
      1º Fica assegurada a assistência religiosa e espiritual por meio do serviço de capelania em hospitais da rede pública
      ou privada, em estabelecimentos prisionais civis ou militares, estabelecimentos de ensino, entidades sócio educativas,
      bem como quartéis no âmbito do nosso país. 1º Entende se por serviço de capelania, entre outros, os seguintes I aconselhamento
      II orientações aos assistidos III cultos e orações IV ministrar a Santa Comunhão V ministrar a palavra. 2º A assistência
      religiosa e espiritual de que trata o caput será ministrada por Capelão devidamente constituído. 3º Os estabelecimentos
      a que se refere o caput deste artigo manterão local apropriado para os cultos religiosos. Art. 2º São beneficiários
      da assistência de que trata esta lei I discentes e docentes dos estabelecimentos de ensino da rede pública ou privada
      II pacientes internados em hospitais públicos e privados CÂMARA DOS DEPUTADOS III reclusos em estabelecimentos prisionais,
      delegacias, quartéis, ou estabelecimentos sócio educativos IV militares no ambiente dos quartéis. Parágrafo único Somente
      poderá ser prestada a assistência religiosa a que se refere esta Lei mediante manifestação dos interessados, uma vez
      que nenhum assistido poderá ser obrigado a participar das atividades religiosas. Art. 3º As instituições religiosas
      que desejarem prestar a assistência de que trata esta lei, deverão cadastrar se preferencialmente no Instituto Nacional
      da Justiça de Paz e Juízes de Paz do Brasil INJUPA Br, e ou em qualquer instituição credenciadora que ministre o curso
      de capelania. Parágrafo único A instituição credenciadora deverá ser legalmente constituída, obedecidos os requisitos
      e limites de atuação estabelecidos pela legislação vigente, mediante a apresentação de documento contendo os atos constituídos,
      devidamente registrado junto a uma ordem regulamentadora da atividade. Art. 4º O interessado em obter a credencial para
      exercer a atividade de que trata esta Lei deverá apresentar o termo de apresentação, identificação, idoneidade e responsabilidade,
      subscrito pelo INJUPA Br ou pela instituição credenciadora a qual pertença. Art. 5º Será criado e mantido pelo INJUPA
      Br um registro de identificação de pessoas credenciadas, na sua instituição. Art. 6º O cartão de credenciamento conterá,
      além da identificação pessoal, foto recente do credenciado e sua validade limita se a 1 um ano. Art. 7º São requisitos
      indispensáveis para o credenciamento dos interessados I ser maior de 21 anos II estar no exercício de seus direitos
      políticos, se brasileiro III estar em condição regular no país, se estrangeiro IV ser pessoas de ilibada conduta moral
      e profissional V ser apresentado por entidade religiosa interessada, nos termos do art. 10 desta Lei CÂMARA DOS DEPUTADOS
      VI ser habilitado por instituição de capelania e registrado em entidade reconhecida como regulamentadora da atividade,
      tendo cumprido as exigências impostas pela lei em vigor. Art. 8º Para os fins da aplicação do disposto nesta lei, fica
      garantida a livre prática de culto para todas as crenças religiosas aos assistidos e seus familiares, sendo permitindo
      a participação nos serviços organizados nos estabelecimentos a que se refere o art. 1º desta lei, tendo em vista o interesse
      prevalecente da coletividade. Parágrafo Único Os Capelães poderão prestar concursos públicos ou ser contratados na Marinha,
      Exército, Aeronáutica, hospitais, presídios, Instituições Militares, instituições carcerárias e respectivas entidades
      sócio educativas, desde que atendam os requisitos exigidos pelos mesmos. Art. 9º Os Capelães de instituições legalmente
      constituídas, quando apresentados por estas, poderão ser supervisionados por outro Capelão quando forem prestar serviços
      auxiliares de assistência religiosa e espiritual. Art. 10º Será garantido o acesso de Capelães, desde que devidamente
      credenciados nos termos desta Lei, às dependências das unidades hospitalares, prisionais e sócio educativas, bem como
      dos estabelecimentos de ensino, com a finalidade de assistência religiosa e espiritual, ficando dispensados, no caso
      dos estabelecimentos prisionais, da revista manual, na visita assistida, mediante a colaboração e segurança dos agentes
      penitenciários. 1º A credencial a que se refere o caput será emitida pelo Instituto Nacional da Justiça de Paz e dos
      Juízes de Paz do Brasil INJUPA Br, ou pela instituição credenciadora a qual pertença. 2º A assistência prestada pelos
      capelães inclui o sigilo no caso de entrevistas com presos e de confidências destes, de internados e funcionários. Art.
      11 As instituições cadastradas poderão requerer credenciamento especial para que o capelão tenha acesso livre, ou seja,
      possa ingressar, visitar, e permanecer em qualquer dependência dos estabelecimentos a que se refere o art. 1º desta
      Lei. Art. 12 Os locais e horários para realização das atividades e cerimônias religiosas serão definidos pela direção
      dos estabelecimentos citados nesta Lei, podendo a assistência religiosa e espiritual, que poderá ser prestada fora dos
      horários normais de visitas, sendo que os Capelães deverão contar com a colaboração necessária ao desempenho de suas
      atribuições. CÂMARA DOS DEPUTADOS Art. 13 O descumprimento desta Lei, quanto às faculdades e garantias da pessoa credenciada,
      gera responsabilidade disciplinar imputável ao agente público que lhe der causa. Art. 14 Esta Lei entra em vigor na
      data de sua publicação. Brasília, 10 de agosto de 2015 Deputado HIDEKAZU TAKAYAMA JUSTIFICAÇÃO A atividade de capelania
      pressupõe uma abordagem do ser humano como criatura de Deus que apresenta potencialidades e necessidades físicas, intelectuais,
      emocionais e espirituais. Por exemplo, um Capelão integrante da equipe multidisciplinar de saúde, é uma pessoa capacitada
      e sensível às necessidades humanas, dispondo se a dar ouvidos, confortar e encorajar, ajudando o enfermo a lutar pela
      vida, com esperança em Deus e na medicina. Oferece aconselhamento espiritual e apoio emocional tanto ao paciente e seus
      familiares, como aos profissionais da saúde. E um importante elo com a comunidade local. Assim os Capelães são homens
      e mulheres preparados para resgatar vidas, levando aos assistidos palestras e seminários acerca de como viver uma vida
      melhor, embora estejam no ambiente de hospitais, clinicas e presídios. Os formandos para o curso de capelania, independentemente
      da faixa etária, são treinados para resgatar pessoas do sofrimento, e estão capacitados para trabalhar na prevenção
      da violência, do uso das drogas, contra pedofilia, na recuperação e na reabilitação de drogados, recuperação de meninos
      de rua, mendigos e presidiários, promovendo, com sua atividade, a cultura de paz aos assistidos e suas famílias por
      meio das visitas em hospitais, escolas e presídios. A expectativa é de que essa atividade de capelania viabilize mudanças
      fundamentais e comportamentais no seio da sociedade, com as pessoas se tornando mais conscientes dos seus deveres humanitários
      e mais solidárias para com aqueles que vivem em situação de risco e de vulnerabilidade devido à violência e ao uso de
      drogas, e, dessa forma, se sintam motivadas e encorajadas a combater e irradiar os malefícios do uso e do abuso de drogas.
      CÂMARA DOS DEPUTADOS Vale destacar que os males causados pelas drogas tem impactado sobremaneira a vida dos cidadãos
      de bem e da família brasileira, ensejando atos de violência e causando danos significativos na saúde física e emocional
      dos usuários. Enfim, esperamos alcançar as metas propostas e contribuir decisivamente para melhoria da qualidade de
      vida de pessoas das mais diversas faixas etárias que pretendemos assistir nas comunidades de todo o nosso país. Nesse
      sentido, é essencial que o Parlamento e a Administração Pública não se omitam quanto a esse papel de oferecer aos assistidos
      e a suas famílias um serviço fundamentado na manifestação de altruísmo, amizade, fraternidade, capaz de promover a Paz
      e a Solidariedade cidadã. É o que pretendo com a apresentação dessa proposição. Brasília, 10 de agosto de 2015 Deputado
      HIDEKAZU TAKAYAMA
    - Altera o art. 2º da Lei nº 11. 096, de 13 de janeiro de 2005, para estender o atendimento do Programa Universidade para
      Todos aos estudantes beneficiados com bolsa parcial no ensino médio privado. O Congresso Nacional decreta Art. 1º O
      art. 2º da Lei nº 11. 096, de 13 de janeiro de 2005, passa a vigorar acrescido do seguinte 1º, renumerando se como 2º
      o atual parágrafo único Art. 2º 1º Após a distribuição prevista no caput deste artigo, eventual bolsa excedente poderá
      ser destinada a estudante que tenha cursado o ensino médio, ou parte dele, em escola da rede privada, na condição de
      bolsista parcial, nos termos definidos em regulamento do Ministério da Educação, observada a devida proporcionalidade
      com o tempo ou percentual de estudos gratuitos. 2º antigo parágrafo único NR Art. 2º Esta Lei entra em vigor na data
      de sua publicação. Senado Federal, em de dezembro de 2006. Senador Renan Calheiros Presidente do Senado Federal acf
      pls05 260
  - source_sentence: PROJETO DE LEI Nº DE 2015 Do Sr. Veneziano Vital do Rêgo Revoga dispositivos da Lei nº 12. 462, de 4
      de agosto de 2011, para limitar a abrangência do Regime Diferenciado de Contratações aos casos inicialmente previstos
      pela lei original, e dá outras providências. O Congresso Nacional decreta Art. 1º Revogam se os incisos IV, V e VI,
      e o 3º do artigo 1º da Lei nº 12. 462, de 4 de agosto de 2011. Art. 2º Revogam se os artigos 1º e 2º da Lei nº 12. 873,
      de 24 de outubro de 2013. Art. 3º Revoga se o art. 15 A da Lei nº 12. 340, de 1º de dezembro de 2010. Art. 4º Esta Lei
      entra em vigor na data de sua publicação. JUSTIFICAÇÃO A Lei nº 12. 462, de 4 de agosto de 2011, resultante da conversão
      em lei da Medida Provisória nº 527, de 2011, instituiu o Regime Diferenciado de Contratações Públicas RDC, regime criado
      para atender às obras para a Copa do Mundo e da Olimpíada. Ou seja, a diferenciação e as 2 facilidades previstas na
      referida lei foram previstas, excepcionalmente, para viabilizar as obras e serviços necessários para a realização dos
      grandes eventos em nosso País. Ressalta se que os objetivos iniciais acabaram sendo maculados, uma vez que foram inseridos
      no corpo da lei, e em outras leis, autorizações para a utilização permanente do RDC para finalidades bem distintas das
      originalmente previstas. Portanto, faltando pouco mais de um ano para a realização das Olimpíadas no Estado do Rio de
      Janeiro, entendemos que ao término do evento a Lei terá cumprido com os seus propósitos e não subsistirá razão para
      que qualquer outra obra venha a ser executada utilizando se do RDC como instrumento de licitação, voltando se a adotar
      integralmente, em toda a Administração Pública, os parâmetros da Lei nº 8. 666, de 21 de junho de 1993. Isto posto,
      solicitamos o apoio dos nobres colegas nesta Casa para aprovação do presente projeto de lei. Sala das Sessões, em de
      de 2015. Deputado VENEZIANO VITAL DO REGO 2015 9374
    sentences:
    - PROJETO DE LEI Nº DE 2011 Do Sr. Laércio Oliveira Altera a Lei nº 11. 901, de 12 de janeiro de 2009. O Congresso Nacional
      decreta Art. 1º A presente lei é editada visando incluir na norma competente a obrigatoriedade de contratação de bombeiro
      civil em edificações ou conjunto de edificações com fins comerciais. Art. 2º A Lei nº 11. 901, de 12 de janeiro de 2009,
      passa a vigorar acrescida do seguinte artigo Art. 10 A Toda e qualquer edificação ou conjunto de edificações públicas
      e particulares, comerciais ou assemelhadas, tem a obrigação de contratar bombeiro civil, devidamente qualificado, para
      fazer parte do quadro permanente de pessoal. Parágrafo único. Tal contratação poderá ser realizada, conforme o art.
      2º da presente lei, por intermédio de empresa especializada em prestação de serviços de prevenção e combate a incêndio.
      NR Art. 3º Ficam revogadas todas as disposições que contrariam o que fora tratado na presente norma. Art. 4º Esta lei
      entra em vigor na data de sua publicação. JUSTIFICAÇÃO Com a publicação da presente lei, acidentes como o ocorrido no
      município do Rio de Janeiro serão prevenidos. Isso porque, com a atuação permanente de um bombeiro civil, situações
      de perigo podem ser antecipadas e ações de evacuação de edificações comerciais em iminente risco de incêndio ou explosão
      ocorrerão de forma correta e prudente. O caso concreto citado foi provocado por desrespeito às normas de segurança e,
      também, por incompetência da entidade publica que emitiu alvará de funcionamento sem atentar às especificidades do edifício.
      Mas, mesmo assim, não podemos ignorar o fato de que se houvesse um profissional devidamente habilitado trabalhando permanentemente
      no quadro de pessoal daquele prédio as vítimas poderiam ter sido salvas. Este indivíduo teria a discernimento técnico
      suficiente para avaliar a situação e promover a imediata evacuação das pessoas ali presentes, procedendo às devidas
      cautelas contra o pânico. A fatalidade aconteceu porque nenhum dos cidadãos foi capaz de determinar que o vazamento
      de gás colocasse suas vidas em extremo risco. Sendo assim, com a publicação da presente lei, situações como essas poderão
      ser extintas. Portanto, nesse contexto, rogo aos meus pares apoio na aprovação integral da presente proposição. Sala
      das Sessões, em de de 2011. LAÉRCIO OLIVEIRA Deputado Federal PR SE
    - Projeto de Lei nº 2011 Do Sr. Alessandro Molon PT RJ Dá nova redação ao art. 132 da Lei nº 8. 069, de 13 de julho de
      1990, que Dispõe sobre o Estatuto da Criança e do Adolescente acrescentando parágrafos para definir quantidade e distribuição
      dos Conselhos Tutelares. O Congresso Nacional decreta Art. 1 Esta lei tem como objetivo alterar a Lei n 8. 069, de 13
      de julho de 1990, dispondo sobre quantidade e critérios de distribuição dos Conselhos Tutelares. Art. 2º. O art. 132
      da Lei nº 8. 069, de 13 de julho de 1990, passa a viger com a seguinte redação Art. 132. Em cada Município haverá, no
      mínimo, um Conselho Tutelar composto de cinco membros, escolhidos pela comunidade local para mandato de três anos, permitida
      uma recondução. Redação dada pela Lei nº 8. 242, de 12. 10. 1991 1º Para assegurar a eqüidade de acesso, caberá aos
      Municípios com mais de cem mil habitantes e ao Distrito Federal criar e manter Conselhos Tutelares, observada a proporção
      mínima de um Conselho para cada cem mil habitantes ou fração. 2º Quando houver mais de um Conselho Tutelar em um Município,
      caberá a este distribuí los conforme a configuração geográfica e administrativa da localidade, a população de crianças
      e adolescentes e a incidência de violações a seus direitos, assim como os indicadores sociais. 3º Cabe à legislação
      local a definição da área de atuação de cada Conselho Tutelar, devendo ser, preferencialmente, criado um Conselho Tutelar
      para cada região, circunscrição administrativa ou microrregião, observados os parâmetros indicados no 1º e no 2º. Art.
      3º. Esta Lei entra em vigor da data de sua publicação. Sala das Sessões, em 04 de maio de 2011 ALESSANDRO MOLON Deputado
      Federal PT RJ JUSTIFICAÇÃO O presente projeto tem por objetivo aperfeiçoar o sistema de garantia de direitos brasileiro
      no que tange aos Conselhos Tutelares, órgãos essenciais ao referido sistema e vinculados aos municípios e ao Distrito
      Federal. O Conselho Nacional de Defesa dos Direitos da Criança e do Adolescente CONANDA reunido em assembléia em 17
      de março de 2010, baixou a resolução nº 139 2010, dispondo exclusivamente sobre os Conselhos Tutelares. Tal medida deveu
      se à necessidade de atualização de outra resolução anterior, a de nº 75 2001, que estabeleceu os primeiros parâmetros
      de criação e funcionamento destes Conselhos. É fácil perceber que no interregno de uma resolução e outra, 10 anos se
      passaram, o que ocasionou natural, porém profunda discrepância principalmente no que tange ao número de Conselhos Tutelares
      necessários ao atendimento das necessidades da infância e da adolescência brasileiras e o previsto na legislação especial,
      em particular na Lei nº 8. 069, de 13 de julho de 1990, conhecida como ECA Estatuto da Criança e do Adolescente, mormente
      nas metrópoles e grandes cidades do país. A disposição atual da supracitada Lei estabelece que deve haver em cada município
      até 200 mil habitantes, no mínimo, um Conselho Tutelar, composto de cinco membros selecionados pela própria comunidade
      local, com mandato de três anos, e desde que atendidos os requisitos legais. Cumpre salientar que a nova Resolução do
      CONANDA tomou por base pesquisa que revelou a inexistência de Conselhos Tutelares em cerca de 10 dos Municípios brasileiros
      e graves deficiências no funcionamento da maioria dos já constituídos, informações aliadas aos Dados do IBGE que mostram
      que a população brasileira nos últimos 10 anos cresceu de 169. 590. 693 para 190. 755. 799, o que comprova a necessidade
      da atualização ora proposta neste projeto. Além de tratar se de atividade de interesse público relevante, as funções
      desenvolvidas pelos Conselhos Tutelares vão ao encontro das metas estabelecidas pelo Governo Federal na esfera dos Direitos
      Humanos, de forma a atender, proteger e defender integralmente os direitos da infância brasileira, principalmente considerando
      que cresce o número das que são maltratadas no país. Pelo exposto, cabe a esta Casa legislativa, dentro de sua esfera
      de atribuições, dar sua contribuição visando o bem estar de nossas crianças e adolescentes, adequando tão importante
      diploma legal à realidade nacional atual. Sala das Sessões, em 04 de maio de 2011. ALESSANDRO MOLON Deputado Federal
      PT RJ
    - PROJETO DE LEI Nº DE 2015 Do Sr. Aliel Machado Torna obrigatório o emprego do Regime Diferenciado de Contratações Públicas
      RDC previsto na Lei nº 12. 462, de 4 de agosto de 2011, para realização de licitações públicas, e dá outras providências.
      O Congresso Nacional decreta Art. 1º As licitações realizadas por órgãos e entidades integrantes da Administração Pública
      passam a ser efetuadas exclusivamente nos termos do Regime Diferenciado de Contratações Públicas RDC, previsto na Lei
      nº 12. 462, de 4 de agosto de 2001. Art. 2º Somente serão aplicados aos procedimentos referidos no art. 1º desta Lei
      os dispositivos da Lei nº 8. 666, de 21 de junho de 1993, cujo teor seja compatível com a Lei nº 12. 462, de 2001. Art.
      3º O conjunto de normas destinado a reger as licitações e contratos administrativos, previsto no inciso XXVII do art.
      22 da Constituição, passa a resultar da aplicação do disposto nos arts. 1º e 2º desta Lei. Art. 4º A Lei nº 12. 462,
      de 2001, passa a vigorar com as seguintes alterações Art. 1º É instituído o Regime Diferenciado de Contratações Públicas
      RDC aplicável a licitações realizadas por órgãos e entidades da Administração 2 Pública, qualquer que seja o objeto
      envolvido nesses procedimentos. NR Art. 13. As licitações serão realizadas sob a forma eletrônica. Parágrafo único.
      Os atos imputados aos licitantes serão praticados exclusivamente por meio eletrônico. NR Art. 4º Esta Lei entra em vigor
      na data de sua publicação e não se aplica a licitações cujos instrumentos convocatórios já tenham sido objeto de divulgação.
      Art. 5º Ficam revogados o 2º do art. 1º da Lei nº 12. 462, de 2011, a Lei nº 10. 520, de 17 de julho de 2002, e o art.
      67 da Lei nº 9. 478, de 6 de agosto de 1997. JUSTIFICAÇÃO Apesar do inegável sucesso colhido na aplicação da Lei nº
      10. 520, de 17 de julho de 2002, que viria a inspirar a edição do chamado Regime Diferenciado de Contratações Públicas
      conhecido pela sigla RDC continuam em pleno vigor e corriqueira utilização regras absolutamente ultrapassadas no que
      diz respeito à realização de licitações por órgãos e entidades integrantes da Administração Pública. Envelopes que há
      muito deixaram de ser lacrados, pelo menos no que diz respeito aos conluios que viabilizam, seguem servindo como instrumento
      para a esmagadora maioria dos contratos celebrados pelo Poder Público. O resultado desse contexto é aquele que se encontra
      em curso no âmbito da justiça federal paranaense. De fato, o caso da Petrobras trouxe ainda mais a lume a defasagem
      da Lei nº 8. 666, de 1993, na medida em que se alegou justamente o caráter obsoleto desse diploma para os atos ilícitos
      ali revelados. Justificaram se desvios de conduta os mais diversos com base na inadequação do Estatuto das licitações
      como meio de disciplinar as licitações da maior estatal brasileira. Por outro lado, as resistências que se verificaram
      no meio empresarial quanto à utilização do aludido RDC dão bem o diagnóstico da 3 relevância desse sistema. Foram inúmeras,
      em diversos veículos de comunicação, as veementes manifestações de juristas e especialistas a serviço de empreiteiras
      empenhadas em ferir a credibilidade do instrumento. Passados quase quatro anos desde a aprovação do mecanismo, contudo,
      essas vozes, sintomaticamente, não são ouvidas mais sequer em surdina. Nessa conjuntura, o projeto cuja aprovação se
      postula constitui justamente uma tentativa de ver disseminados e consolidados os eficazes procedimentos administrativos
      decorrentes do RDC, razão pela qual se pede a aprovação integral de seus termos. Sala das Sessões, em de de 2015. Deputado
      ALIEL MACHADO 2015_3748
