- source_sentence: PROJETO DE LEI Nº DE 2015 Do Sr. Veneziano Vital do Rêgo Revoga dispositivos da Lei nº 12. 462, de 4 de
    agosto de 2011, para limitar a abrangência do Regime Diferenciado de Contratações aos casos inicialmente previstos pela
    lei original, e dá outras providências. O Congresso Nacional decreta Art. 1º Revogam se os incisos IV, V e VI, e o 3º
    do artigo 1º da Lei nº 12. 462, de 4 de agosto de 2011. Art. 2º Revogam se os artigos 1º e 2º da Lei nº 12. 873, de 24
    de outubro de 2013. Art. 3º Revoga se o art. 15 A da Lei nº 12. 340, de 1º de dezembro de 2010. Art. 4º Esta Lei entra
    em vigor na data de sua publicação. JUSTIFICAÇÃO A Lei nº 12. 462, de 4 de agosto de 2011, resultante da conversão em
    lei da Medida Provisória nº 527, de 2011, instituiu o Regime Diferenciado de Contratações Públicas RDC, regime criado
    para atender às obras para a Copa do Mundo e da Olimpíada. Ou seja, a diferenciação e as 2 facilidades previstas na referida
    lei foram previstas, excepcionalmente, para viabilizar as obras e serviços necessários para a realização dos grandes eventos
    em nosso País. Ressalta se que os objetivos iniciais acabaram sendo maculados, uma vez que foram inseridos no corpo da
    lei, e em outras leis, autorizações para a utilização permanente do RDC para finalidades bem distintas das originalmente
    previstas. Portanto, faltando pouco mais de um ano para a realização das Olimpíadas no Estado do Rio de Janeiro, entendemos
    que ao término do evento a Lei terá cumprido com os seus propósitos e não subsistirá razão para que qualquer outra obra
    venha a ser executada utilizando se do RDC como instrumento de licitação, voltando se a adotar integralmente, em toda
    a Administração Pública, os parâmetros da Lei nº 8. 666, de 21 de junho de 1993. Isto posto, solicitamos o apoio dos nobres
    colegas nesta Casa para aprovação do presente projeto de lei. Sala das Sessões, em de de 2015. Deputado VENEZIANO VITAL
    DO REGO 2015 9374
  sentences:
  - PROJETO DE LEI Nº DE 2011 Do Sr. Laércio Oliveira Altera a Lei nº 11. 901, de 12 de janeiro de 2009. O Congresso Nacional
    decreta Art. 1º A presente lei é editada visando incluir na norma competente a obrigatoriedade de contratação de bombeiro
    civil em edificações ou conjunto de edificações com fins comerciais. Art. 2º A Lei nº 11. 901, de 12 de janeiro de 2009,
    passa a vigorar acrescida do seguinte artigo Art. 10 A Toda e qualquer edificação ou conjunto de edificações públicas
    e particulares, comerciais ou assemelhadas, tem a obrigação de contratar bombeiro civil, devidamente qualificado, para
    fazer parte do quadro permanente de pessoal. Parágrafo único. Tal contratação poderá ser realizada, conforme o art. 2º
    da presente lei, por intermédio de empresa especializada em prestação de serviços de prevenção e combate a incêndio. NR
    Art. 3º Ficam revogadas todas as disposições que contrariam o que fora tratado na presente norma. Art. 4º Esta lei entra
    em vigor na data de sua publicação. JUSTIFICAÇÃO Com a publicação da presente lei, acidentes como o ocorrido no município
    do Rio de Janeiro serão prevenidos. Isso porque, com a atuação permanente de um bombeiro civil, situações de perigo podem
    ser antecipadas e ações de evacuação de edificações comerciais em iminente risco de incêndio ou explosão ocorrerão de
    forma correta e prudente. O caso concreto citado foi provocado por desrespeito às normas de segurança e, também, por incompetência
    da entidade publica que emitiu alvará de funcionamento sem atentar às especificidades do edifício. Mas, mesmo assim, não
    podemos ignorar o fato de que se houvesse um profissional devidamente habilitado trabalhando permanentemente no quadro
    de pessoal daquele prédio as vítimas poderiam ter sido salvas. Este indivíduo teria a discernimento técnico suficiente
    para avaliar a situação e promover a imediata evacuação das pessoas ali presentes, procedendo às devidas cautelas contra
    o pânico. A fatalidade aconteceu porque nenhum dos cidadãos foi capaz de determinar que o vazamento de gás colocasse suas
    vidas em extremo risco. Sendo assim, com a publicação da presente lei, situações como essas poderão ser extintas. Portanto,
    nesse contexto, rogo aos meus pares apoio na aprovação integral da presente proposição. Sala das Sessões, em de de 2011.
    LAÉRCIO OLIVEIRA Deputado Federal PR SE
  - Projeto de Lei nº 2011 Do Sr. Alessandro Molon PT RJ Dá nova redação ao art. 132 da Lei nº 8. 069, de 13 de julho de 1990,
    que Dispõe sobre o Estatuto da Criança e do Adolescente acrescentando parágrafos para definir quantidade e distribuição
    dos Conselhos Tutelares. O Congresso Nacional decreta Art. 1 Esta lei tem como objetivo alterar a Lei n 8. 069, de 13
    de julho de 1990, dispondo sobre quantidade e critérios de distribuição dos Conselhos Tutelares. Art. 2º. O art. 132 da
    Lei nº 8. 069, de 13 de julho de 1990, passa a viger com a seguinte redação Art. 132. Em cada Município haverá, no mínimo,
    um Conselho Tutelar composto de cinco membros, escolhidos pela comunidade local para mandato de três anos, permitida uma
    recondução. Redação dada pela Lei nº 8. 242, de 12. 10. 1991 1º Para assegurar a eqüidade de acesso, caberá aos Municípios
    com mais de cem mil habitantes e ao Distrito Federal criar e manter Conselhos Tutelares, observada a proporção mínima
    de um Conselho para cada cem mil habitantes ou fração. 2º Quando houver mais de um Conselho Tutelar em um Município, caberá
    a este distribuí los conforme a configuração geográfica e administrativa da localidade, a população de crianças e adolescentes
    e a incidência de violações a seus direitos, assim como os indicadores sociais. 3º Cabe à legislação local a definição
    da área de atuação de cada Conselho Tutelar, devendo ser, preferencialmente, criado um Conselho Tutelar para cada região,
    circunscrição administrativa ou microrregião, observados os parâmetros indicados no 1º e no 2º. Art. 3º. Esta Lei entra
    em vigor da data de sua publicação. Sala das Sessões, em 04 de maio de 2011 ALESSANDRO MOLON Deputado Federal PT RJ JUSTIFICAÇÃO
    O presente projeto tem por objetivo aperfeiçoar o sistema de garantia de direitos brasileiro no que tange aos Conselhos
    Tutelares, órgãos essenciais ao referido sistema e vinculados aos municípios e ao Distrito Federal. O Conselho Nacional
    de Defesa dos Direitos da Criança e do Adolescente CONANDA reunido em assembléia em 17 de março de 2010, baixou a resolução
    nº 139 2010, dispondo exclusivamente sobre os Conselhos Tutelares. Tal medida deveu se à necessidade de atualização de
    outra resolução anterior, a de nº 75 2001, que estabeleceu os primeiros parâmetros de criação e funcionamento destes Conselhos.
    É fácil perceber que no interregno de uma resolução e outra, 10 anos se passaram, o que ocasionou natural, porém profunda
    discrepância principalmente no que tange ao número de Conselhos Tutelares necessários ao atendimento das necessidades
    da infância e da adolescência brasileiras e o previsto na legislação especial, em particular na Lei nº 8. 069, de 13 de
    julho de 1990, conhecida como ECA Estatuto da Criança e do Adolescente, mormente nas metrópoles e grandes cidades do país.
    A disposição atual da supracitada Lei estabelece que deve haver em cada município até 200 mil habitantes, no mínimo, um
    Conselho Tutelar, composto de cinco membros selecionados pela própria comunidade local, com mandato de três anos, e desde
    que atendidos os requisitos legais. Cumpre salientar que a nova Resolução do CONANDA tomou por base pesquisa que revelou
    a inexistência de Conselhos Tutelares em cerca de 10 dos Municípios brasileiros e graves deficiências no funcionamento
    da maioria dos já constituídos, informações aliadas aos Dados do IBGE que mostram que a população brasileira nos últimos
    10 anos cresceu de 169. 590. 693 para 190. 755. 799, o que comprova a necessidade da atualização ora proposta neste projeto.
    Além de tratar se de atividade de interesse público relevante, as funções desenvolvidas pelos Conselhos Tutelares vão
    ao encontro das metas estabelecidas pelo Governo Federal na esfera dos Direitos Humanos, de forma a atender, proteger
    e defender integralmente os direitos da infância brasileira, principalmente considerando que cresce o número das que são
    maltratadas no país. Pelo exposto, cabe a esta Casa legislativa, dentro de sua esfera de atribuições, dar sua contribuição
    visando o bem estar de nossas crianças e adolescentes, adequando tão importante diploma legal à realidade nacional atual.
    Sala das Sessões, em 04 de maio de 2011. ALESSANDRO MOLON Deputado Federal PT RJ
  - PROJETO DE LEI Nº DE 2015 Do Sr. Aliel Machado Torna obrigatório o emprego do Regime Diferenciado de Contratações Públicas
    RDC previsto na Lei nº 12. 462, de 4 de agosto de 2011, para realização de licitações públicas, e dá outras providências.
    O Congresso Nacional decreta Art. 1º As licitações realizadas por órgãos e entidades integrantes da Administração Pública
    passam a ser efetuadas exclusivamente nos termos do Regime Diferenciado de Contratações Públicas RDC, previsto na Lei
    nº 12. 462, de 4 de agosto de 2001. Art. 2º Somente serão aplicados aos procedimentos referidos no art. 1º desta Lei os
    dispositivos da Lei nº 8. 666, de 21 de junho de 1993, cujo teor seja compatível com a Lei nº 12. 462, de 2001. Art. 3º
    O conjunto de normas destinado a reger as licitações e contratos administrativos, previsto no inciso XXVII do art. 22
    da Constituição, passa a resultar da aplicação do disposto nos arts. 1º e 2º desta Lei. Art. 4º A Lei nº 12. 462, de 2001,
    passa a vigorar com as seguintes alterações Art. 1º É instituído o Regime Diferenciado de Contratações Públicas RDC aplicável
    a licitações realizadas por órgãos e entidades da Administração 2 Pública, qualquer que seja o objeto envolvido nesses
    procedimentos. NR Art. 13. As licitações serão realizadas sob a forma eletrônica. Parágrafo único. Os atos imputados aos
    licitantes serão praticados exclusivamente por meio eletrônico. NR Art. 4º Esta Lei entra em vigor na data de sua publicação
    e não se aplica a licitações cujos instrumentos convocatórios já tenham sido objeto de divulgação. Art. 5º Ficam revogados
    o 2º do art. 1º da Lei nº 12. 462, de 2011, a Lei nº 10. 520, de 17 de julho de 2002, e o art. 67 da Lei nº 9. 478, de
    6 de agosto de 1997. JUSTIFICAÇÃO Apesar do inegável sucesso colhido na aplicação da Lei nº 10. 520, de 17 de julho de
    2002, que viria a inspirar a edição do chamado Regime Diferenciado de Contratações Públicas conhecido pela sigla RDC continuam
    em pleno vigor e corriqueira utilização regras absolutamente ultrapassadas no que diz respeito à realização de licitações
    por órgãos e entidades integrantes da Administração Pública. Envelopes que há muito deixaram de ser lacrados, pelo menos
    no que diz respeito aos conluios que viabilizam, seguem servindo como instrumento para a esmagadora maioria dos contratos
    celebrados pelo Poder Público. O resultado desse contexto é aquele que se encontra em curso no âmbito da justiça federal
    paranaense. De fato, o caso da Petrobras trouxe ainda mais a lume a defasagem da Lei nº 8. 666, de 1993, na medida em
    que se alegou justamente o caráter obsoleto desse diploma para os atos ilícitos ali revelados. Justificaram se desvios
    de conduta os mais diversos com base na inadequação do Estatuto das licitações como meio de disciplinar as licitações
    da maior estatal brasileira. Por outro lado, as resistências que se verificaram no meio empresarial quanto à utilização
    do aludido RDC dão bem o diagnóstico da 3 relevância desse sistema. Foram inúmeras, em diversos veículos de comunicação,
    as veementes manifestações de juristas e especialistas a serviço de empreiteiras empenhadas em ferir a credibilidade do
    instrumento. Passados quase quatro anos desde a aprovação do mecanismo, contudo, essas vozes, sintomaticamente, não são
    ouvidas mais sequer em surdina. Nessa conjuntura, o projeto cuja aprovação se postula constitui justamente uma tentativa
    de ver disseminados e consolidados os eficazes procedimentos administrativos decorrentes do RDC, razão pela qual se pede
    a aprovação integral de seus termos. Sala das Sessões, em de de 2015. Deputado ALIEL MACHADO 2015_3748
