  widget:
  - source_sentence: PROJETO DE LEI No DE 2015 Do Sr. Veneziano Vital do Rêgo Dispõe sobre os procedimentos aplicáveis em
      benefício do consumidor de produtos eletrônicos ou eletrodomésticos, em caso de obsolescência do produto antes do término
      de sua vida útil. O Congresso Nacional decreta Art. 1º A oferta e apresentação de produtos eletrônicos e eletrodomésticos
      deve fornecer, além das informações obrigatórias estabelecidas na legislação aplicável, a vida útil estimada do produto
      introduzido no mercado de consumo. Art. 2º Em caso de superveniente obsolescência, sem culpa do consumidor, do produto
      eletrônico ou eletrodoméstico antes do término de seu prazo de vida útil, pode o consumidor exigir, alternativamente
      e à sua escolha, que o fornecedor, no prazo de 7 sete dias úteis I restitua a quantia paga, monetariamente atualizada
      II substitua o produto por outro da mesma espécie ou por similar de melhor qualidade Art. 3º O não cumprimento do prazo
      estabelecido no artigo anterior sujeita o fornecedor, sem prejuízo das penalidades cabíveis por força da legislação
      de proteção e defesa do consumidor, à multa correspondente a 30 trinta por cento do valor monetariamente atualizado
      de aquisição do produto, que deverá ser revertida, imediatamente, ao consumidor. 2 Art. 4º Esta Lei entra em vigor na
      data de sua publicação oficial. JUSTIFICAÇÃO O presente projeto de lei objetiva enfrentar a cada vez mais usual prática
      de fabricantes de produtos eletrônicos e eletrodomésticos de, por variados artifícios e em curto espaço de tempo, tornar
      obsoletos os bens adquiridos pelo consumidor. Nos últimos anos, todos temos acompanhado as agressivas campanhas de marketing
      que incutem nos consumidores uma lógica de status e de consumo instantâneo. Essas técnicas objetivam conduzir os consumidores
      à compreensão de que aquele produto recém adquirido e cujas qualidades e possibilidades há pouco foram tão fortemente
      explicitadas já se encontra ultrapassado e que, agora, somente um novo e mais desenvolvido produto poderia atender as
      necessidades do consumidor. A par dessa obsolescência de desejabilidade, fruto de publicidade e propagandas exageradas,
      prolifera também em nossa sociedade de consumo a obsolescência de qualidade e de função, causada pelos próprios fabricantes.
      Esses, de modo deliberado e planejado, colocam no mercado produtos de reduzida durabilidade e utilidade, compelindo
      o consumidor, em tempo muito mais curto do que o esperado para aquele tipo de produto, a substituí lo. Entendemos que
      nosso projeto ao obrigar a informação da vida útil dos produtos e ao exigir a substituição do produto ou a restituição
      do valor pago em caso de obsolescência contribuirá para reprimir essa conduta tão fortemente prejudicial aos consumidores.
      3 Contamos com a colaboração dos ilustres Pares para o aperfeiçoamento e aprovação da presente proposição, considerando
      que trará inegáveis benefícios ao consumidor brasileiro. Sala das Sessões, em de de 2015. Deputado VENEZIANO VITAL DO
      RÊGO 2015_18501
    sentences:
    - PROJETO DE LEI Nº DE 2011 Do Sr. ARTHUR LIRA Altera o art. 18 da Lei nº 8. 078, de 1990, para facultar ao consumidor
      o direito de exigir a substituição produto viciado, no prazo de sete dias, contado a partir da data da entrega. O Congresso
      Nacional decreta Art. 1º Esta lei faculta ao consumidor o direito de exigir a substituição de produto viciado, no prazo
      de até sete dias, contado a partir da data da entrega. Art. 2º O caput do art. 18 da Lei nº 8. 078, de 11 de setembro
      de 1990, passa a vigorar com a seguinte redação Art. 18. Os fornecedores de produtos de consumo duráveis ou não duráveis
      respondem solidariamente pelos vícios de qualidade ou quantidade que os tornem impróprios ou inadequados ao consumo
      a que se destinam ou lhes diminuam o valor, assim como por aqueles decorrentes da disparidade com as indicações constantes
      do recipiente, da embalagem, rotulagem ou mensagem publicitária, respeitadas as variações decorrentes de sua natureza,
      podendo o consumidor exigir a substituição do produto viciado, no prazo de até sete dias, contado a partir da data da
      entrega e, após esse prazo, exigir a substituição das partes viciadas. NR Art. 3º Esta lei entra em vigor na data de
      sua publicação. 2 JUSTIFICAÇÃO O atual estágio de desenvolvimento científico e tecnológico em que nos encontramos e
      a consciência da maioria das empresas de que devem primar pela qualidade de seus produtos são fenômenos compatíveis
      com o elevado grau de exigência do consumidor hodierno. Na época que corre, marcada pelo intenso uso de controles e
      programas de qualidade nas indústrias, não é mais possível aceitar a distribuição de produtos defeituosos no mercado
      de consumo. Embora seja estatisticamente natural que alguma unidade de produto escape ao controle de qualidade e chegue
      ao mercado com defeito, não é possível admitir que o consumidor arque com prejuízo causado, unicamente, por falha do
      fornecedor. Vale ressaltar a existência de legislação protetora contra produto defeituoso. O artigo 26 da Lei nº 8.
      078, de 1990, concede prazo de trinta dias para o consumidor exercer seu direito de reclamar por vícios aparentes ou
      de fácil constatação em produtos não duráveis e o prazo de noventa dias, quando se tratar de produtos duráveis. Esse
      direito é conhecido como prazo de garantia legal e independe de qualquer contrato de garantia oferecido pelo fornecedor.
      Portanto, no prazo de trinta ou noventa dias, a depender do tipo de produto, o consumidor pode acionar a proteção prevista
      no artigo 18 do Código de Defesa do Consumidor CDC, que, por sua vez, garante o direito à substituição das partes viciadas
      de qualquer produto, no prazo de até trinta dias, assim como faculta o direito à substituição do produto se, em trinta
      dias, o problema não for solucionado. Além disso, o 3º do artigo 18 do citado Código estabelece que, excepcionalmente,
      quando se tratar de produto essencial, o consumidor tem direito à substituição imediata do produto com defeito. Entretanto,
      apesar da existência dessa legislação protetora, constatamos que ela não atende satisfatoriamente a defesa do consumidor,
      por vários motivos. Por exemplo, não encontramos no CDC definição clara do que seja produto essencial. Um telefone celular
      seria um produto essencial Uma geladeira seria um produto essencial Parece que não, porque as notícias que nos chegam
      é que sempre que o consumidor reclama de vícios nesse tipo de produto, ainda que dentro do prazo de garantia 3 legal,
      não acontece sua substituição por outro, mas encaminha se o produto viciado à assistência técnica, privando o consumidor
      de utilizá lo. Portanto, para nós é claro que os atuais dispositivos da Lei nº 8. 078, de 1990, são incapazes de oferecer
      uma proteção adequada ao consumidor contra os produtos viciados que são distribuídos no mercado de consumo. A iniciativa
      que ora oferecemos à apreciação dos ilustres Pares busca estender a todos os produtos o benefício da substituição imediata,
      hoje restrito aos produtos considerados essenciais. Porém, fixa um prazo mais curto, de sete dias, para o consumidor
      reivindicar a substituição dos produtos em geral, enquanto mantém o prazo em vigor, de trinta dias, para os considerados
      essenciais. Pelas razões acima expostas, solicitamos o decisivo apoio dos nobres Pares para a aprovação desta iniciativa.
      Sala das Sessões, em de de 2011. Deputado ARTHUR LIRA 2011_12670
    - PROJETO DE LEI No DE 2007 Do Sr. OTAVIO LEITE Dispõe sobre a utilização das áreas públicas de unidades de conservação
      ambiental integrantes do S. N. U. C. Sistema Nacional de Unidades de Conservação de unidades militares e prédios públicos
      em geral, particularmente os destinados às unidades educacionais, por grupos oficiais de Escoteiros e Bandeirantes e
      dá outras providências. O Congresso Nacional decreta Art. 1º As áreas públicas de unidades de conservação ambiental
      integrantes do S. N. U. C. Sistema Nacional de Unidades de Conservação de unidades militares e de prédios públicos em
      geral, particularmente os destinados às unidades educacionais, poderão ser disponibilizadas, em horários e espaços compatíveis
      com seus respectivos funcionamentos regulares, para a realização de atividades desenvolvidas por grupos oficiais de
      Escoteiros e Bandeirantes. Parágrafo Único Não haverá de vínculo entre matrícula nas unidades educacionais e a adesão
      a determinado grupo de Bandeirantes ou Escoteiros. Art. 2º O Poder Público, sempre que possível, garantirá a infra estrutura
      adequada dos locais referidos no artigo anterior, com equipamentos sanitários e sistemas de energia, iluminação e segurança
      quando do desenvolvimento das atividades pelos grupos de Escoteiros e Bandeirantes, respectivamente filiados à União
      dos Escoteiros do Brasil e ou à Federação de Bandeirantes do Brasil. Art. 3º Para a consecução dos objetivos desta Lei,
      os grupos oficiais de Escoteiros e Bandeirantes deverão requerer o espaço a ser utilizado, diretamente aos titulares
      do órgão unidade no qual pretendam implantar suas atividades, detalhando horários e seus programas de trabalho, para
      fins de avaliação e autorização pertinente. 2 Art. 4º A autorização de que trata o artigo anterior será concedida a
      título precário, ficando os grupos oficiais de Escoteiros e Bandeirantes responsáveis pela conservação e manutenção
      dos espaços cedidos para suas atividades. Parágrafo Único. A inobservância do caput deste artigo implicará em suspensão
      da disponibilização dos espaços aludidos. Art. 5º Esta lei entra em vigor na data da sua publicação. JUSTIFICAÇÃO Iniciaram
      se os Movimentos Escoteiro e Bandeirante no início do século passado por iniciativa, de Robert Baden Powell e de sua
      irmã Agnes, na Inglaterra. Da idéia inicial, consubstanciada no livro Escotismo para rapazes editado em 1908, que vê,
      no scout, aquele que vai à frente perscrutando o terreno, formaram se movimentos infanto juvenis de educação não formal
      mundiais, propagadores do altruísmo, da lealdade, da fraternidade, da responsabilidade, do respeito a si mesmo e ao
      próximo e da disciplina perseverante, baseados em um sistema de valores que visam a desenvolver o senso crítico, a criatividade,
      a participação, o contato com a natureza e a espiritualidade. A metodologia dos Movimentos Bandeirante e Escoteiro está
      calcada em cinco vertentes, que são a vida em equipe, o compromisso com o desenvolvimento pessoal e social, a progressão
      pessoal e do grupo, o contato respeitoso e respeitador com a natureza e a participação ativa na comunidade, que se espelham
      no compromisso que marca o momento de adesão do participante ao grupo Farei o melhor possível para o meu aperfeiçoamento
      pessoal, participar de maneira ativa e responsável na comunidade, buscar a fé e vivenciar os princípios contidos no
      código princípios, esses, que se traduzem por fraternidade universal, dever para com os outros, autodisciplina e respeito
      à natureza, procurando superar o egoísmo, o pessimismo, as diferenças religiosas, os problemas de classe e as questões
      sociais O compromisso formulado pela própria pessoa também é reconhecido como válido pela Federação de Bandeirantes
      do Brasil, desde que reflita a verdade e o compromisso pessoais com o crescimento sadio e a disposição em participar
      do engajamento social da associação não só na 3 comunidade a que o grupo pertencer, como na casa planetária, haja vista
      os vários programas de capacitação e intercâmbio que as referidas associações propiciam, visando a aproximar crianças
      e jovens do mundo todo, desde as antigas Caixas de Correspondência que estimulavam a correspondência além fronteiras,
      ao intercâmbio hoje facilitado pela internet. Surgiram, no Brasil, desde o início do século passado, foram se desenvolvendo,
      espalhando se pelo País e deram origem à Federação de Bandeirantes do Brasil e à União dos Escoteiros do Brasil, que
      se filiam, respectivamente, à Associação Mundial de Bandeirantes e à Organização Mundial do Movimento Escoteiro, todos
      tendo a natureza jurídica de associações civis, portanto sem fins lucrativos, também reconhecidas, no Brasil, como associações
      de utilidade pública. A metodologia dos dois movimentos, a ênfase constante na responsabilidade de cada um pelas escolhas
      individuais e coletivas feitas e o compromisso decorrente de todos pelos resultados conquistados a equipe assumindo
      os resultados e as conseqüências talvez tenha sido seu diferencial ao longo dos anos, sua contribuição à formação grupos
      em que lealdade e solidariedade são valores vivenciados. No caso do Movimento Bandeirante, há, também, de se ressaltar
      a sua contribuição para a educação e emancipação femininas ao longo do século passado no mundo e no Brasil uma menina
      ou jovem que atuava em sua comunidade de forma participativa e ousava sair para acampar com seu grupo, montando a própria
      barraca e a infra estrutura do acampamento, pensava o universo feminino de uma forma diferenciada. Exemplo disso emblemático
      é o do voto feminino se, na equipe bandeirante, os projetos eram discutidos e votados e todos eram responsáveis pelos
      seus resultados, também, nos países, tinham as mulheres o direito de exercer o voto em suas comunidades. A criatividade
      e a participação ativa destacam se, no Brasil, em expoentes, que vão de Maria Clara Machado, no teatro, a sua filha
      Ana Maria, na literatura infantil, a Salete Maria Polita Maccalóz, nos novos tempos do judiciário brasileiro. São movimentos
      de educação não formal, não fazem distinção de credo, gênero ou etnia e não se vinculam a partidos políticos, embora
      ofereçam todas as oportunidades para o pleno desenvolvimento da 4 cidadania ativa, através das diferentes formas de
      capacitação pessoal e da equipe, tanto sob o ponto de vista físico, com atividades que melhorem o condicionamento e
      a agilidade física e mental, como intelectual, ético e social, que se refletem tanto no cuidado com a natureza como
      na participação ativa na vida comunitária através de trabalhos voluntários, sempre com o objetivo de ensinar a pescar,
      sem se limitar à doação do peixe, tendo tido atuação destacada em momentos emergenciais de ajuda humanitária. No que
      concerne à educação ambiental, hoje prevista em lei, convém lembrar que os dois movimentos têm desenvolvido projetos
      sistemáticos a respeito desde o início do século passado. No início da década de 60, o Projeto Natureza da FBB, visando,
      especificamente, à redução da poluição e do consumo de aerossóis para redução do efeito estufa, época em que meio ambiente
      não era ainda um modismo e falar em controle da poluição do ar soava a excrescência técnica e jurídica. É comum a participação
      de escoteiros em iniciativas de preservação de Parques Nacionais com orientação de princípios de conduta aos visitantes,
      auxílio ao manejo de trilhas e reflorestamento. No Rio de Janeiro os escoteiros mantêm e preservam um trecho de Mata
      Atlântica de 40 hectares, no Município de Guapimirim, outrora ligado à floresta que recobre o Maciço da Serra dos Órgãos.
      A reserva tem sido visitada freqüentemente ao longo dos últimos 30 anos, por alunos e pesquisadores de universidades
      públicas e particulares dando ensejo ao aperfeiçoamento de saberes ligados às ciências biológicas. São, todas essas,
      razões pelas quais, em nosso País, os chamados Movimentos Escoteiro e Bandeirante destacaram se como organizações não
      governamentais de educação não formal, sem fins lucrativos e de reconhecida utilidade pública. A metodologia dos dois
      movimentos é aplicada aos jovens através de brincadeiras, jogos e exercícios, de uma forma de vida saudável, repleta
      de bom humor e camaradagem leal e solidária, onde a aprendizagem é uma constante, que começa na formação do consenso
      coletivo, através de tomadas de decisões conjuntas na equipe e da respectiva avaliação franca dos resultados., em pleno
      exercício da democracia. Não são esses instrumentos úteis e aplicáveis a qualquer esfera e tempo de vida, seja na solução
      de problemas, seja na improvisação conseqüente, no conviver leal 5 e solidário, na criação de mecanismos de ajuda não
      dependizante, na confraternização despojada As atividades dos grupos bandeirantes e escoteiros são supervisionados por
      adultos voluntários, que se tenham submetido ao processo de capacitação pertinente de uma ou outra associação. Os dois
      movimentos são reconhecidos pela Organização das Nações Unidas como uma das maiores organizações internacionais de educação,
      congregando mais de vinte milhões de crianças, adolescentes e jovens em 216 países de todos os continentes, bem como
      de adultos engajados que mantêm acesa sua capacidade de sonhar e sua disposição de agir para criar um mundo melhor.
      No Brasil de hoje, todavia, a realidade é que muitos grupos de escoteiros e bandeirantes deixam de existir por falta
      de apoio e incentivo e por não disporem de espaço físico para suas reuniões semanais, para a guarda de seus objetos,
      desenvolvimento de suas atividades e concretização de seus projetos. Diante da importância educacional e social dessas
      organizações, nos termos proclamados por Baden Powell, nos idos de 1908, quando afirmou, com perspicácia de educador
      absolutamente inovadora, na época Se quisermos que nossos jovens sejam felizes na vida, devemos fazer com que eles assimilem
      o costume de praticar o bem ao próximo, além de ensinar lhes a apreciar as coisas da natureza, urge incentivá los, como
      potencial instrumento de efetiva inclusão social que se tem revelado ao longo desse século conflagrado, inclusive como
      instrumento de efetiva construção de educação para a paz. Essa iniciativa legislativa visa, assim, a preencher uma lacuna
      material, propondo a utilização dos prédios públicos, especialmente das escolas, para serem compartilhadas nos horários
      que não estão atendendo aos alunos, em classes ou em atividades extra classe. Normalmente, as reuniões bandeirantes
      e escoteiras são nos finais de semana, quando as escolas estão fechadas e não são utilizadas para atividades curriculares
      ou extra curriculares, possibilitando, assim, um aproveitamento adicional dos espaços públicos e uma motivação a mais
      para que as crianças e jovens busquem um lazer educativo e sadio, em movimentos de educação e formação. 6 As escolas
      são, por natureza, agregadoras e localizadas em pontos de fácil acesso não só para a comunidade local, como próximas
      a pontos de parada de ônibus, com uma infra estrutura significativa quanto à serviços de telecomunicações, equipamentos
      sanitários, área de recreação, variedade de ambientes para atividades de grupo, tendo, inclusive, locais adequados ao
      içamento de bandeiras, uma dentre outras formas de educação cívica que, no aprendizado escoteiro e bandeirante, tem
      caráter de participação e flexibilidade, respeito à própria pátria e a dos outros. Esperamos, pois, contar com o apoio
      dos nobres Pares para esta iniciativa legislativa, que visa a promover a educação não formal, em uma de suas matizes
      mais relevantes. Sala das Sessões, em de maio de 2007. OTAVIO LEITE Deputado Federal
    - CÂMARA DOS DEPUTADOS Deputado Laudívio Carvalho PROJETO DE LEI Nº DE 2015 Do Sr. LAUDIVIO CARVALHO Acrescenta o artigo
      19 A à Lei nº 10. 098, de 19 de dezembro de 2000, para obrigar as empresas ligadas à televisão e ao cinema, assim como
      outros meios de comunicação visual, a colocar legendas em todos os filmes, novelas e similares exibidos, principalmente
      aqueles que forem dublados. O Congresso Nacional decreta Art. 1º Esta Lei acrescenta o artigo 19 A à Lei nº 10. 098,
      de 19 de dezembro de 2000, que Estabelece normas gerais e critérios básicos para a promoção da acessibilidade das pessoas
      portadoras de deficiência ou com mobilidade reduzida, e dá outras providências para obrigar as empresas ligadas à televisão
      e ao cinema, assim como outros meios de comunicação visual, a colocar legendas em todos os filmes, novelas e similares
      exibidos, principalmente aqueles que forem dublados. Art. 2º Acrescente se o seguinte artigo 19 A à Lei nº 10. 098,
      de 19 de dezembro de 2000 Art. 19 A É obrigatório o uso de legendas ocultas ou abertas em toda exibição de filmes, novelas
      e similares, tanto nos cinemas quanto nas emissoras de televisão, bem como em outros meios de comunicação visual destinados
      ao público em geral, na forma da regulamentação. 1º A regulamentação definirá os prazos para a adoção da obrigatoriedade
      estabelecida no caput deste artigo, de forma CÂMARA DOS DEPUTADOS Deputado Laudívio Carvalho a que toda exibição contenha
      as legendas no prazo máximo de 2 dois anos da data da publicação desta lei. 2º Na regulamentação serão priorizados os
      filmes, novelas e similares que forem dublados. 3º A obrigatoriedade de que trata o caput também se aplica aos filmes,
      novelas e similares que tenham sido gravados antes da publicação desta Lei, mas que venham a ser exibidos em prazos
      posteriores aos definidos pela regulamentação em conformidade com o 1º deste artigo. NR Art. 3º O Poder Executivo regulamentará
      esta Lei no prazo de 90 noventa dias contados de sua publicação. Art. 4º Esta Lei entra em vigor na data de sua publicação.
      JUSTIFICAÇÃO Nosso País apresenta um número significativo de pessoas com diversos estágios de deficiência auditiva.
      Além disso, nossa população de idosos, que em muitos casos também apresenta redução da capacidade de escutar bem, também
      tem sido crescente. O Poder Público, entretanto, tem negligenciado no cuidado desta importante parcela de nossa sociedade.
      Dessa forma, exclui, cada vez mais, estas pessoas do convívio social regular e de opções de lazer. É bastante frequente
      encontrarmos pessoas com deficiência auditiva recolhidas ao seu mundo sem som, fechadas em si pela falta de oportunidade,
      que, na verdade, é um direito de todos. As opções de diversão mais populares em nosso País são exatamente a televisão
      e o cinema. Ao excluirmos dessas opções nossa população idosa e nossos cidadãos com deficiência auditiva, pecamos duas
      vezes a primeira pela retirada de um direito fundamental, que é o acesso ao lazer e, a segunda, pela aceleração do processo
      de exclusão social e pelo agravamento do quadro de saúde total das pessoas. Basta de tanta desatenção A principal função
      do Poder Público é exatamente a garantia do bem estar de toda a população, sem CÂMARA DOS DEPUTADOS Deputado Laudívio
      Carvalho discriminação de espécie alguma. Ao apresentarmos este Projeto de Lei, buscamos reverter esta situação de isolamento.
      Não podemos mais esperar para que nossos idosos e as pessoas com deficiência auditiva tenham seus direitos reconhecidos.
      Certos de que o alcance desta medida irá, por um lado, minimizar a gritante situação de desconforto de milhões de pessoas,
      e, por outro, garantir a cidadania plena a todos os brasileiros, contamos com o necessário o apoio de todos os parlamentares
      para a rápida aprovação desta matéria. Sala das Sessões, em 26 de maio de 2015. Deputado LAUDIVIO CARVALHO PMDB MG 2015
      8741. docx
  - source_sentence: PROJETO DE LEI Nº DE 2015 Do Sr. JHC Altera o Decreto Lei nº 5. 452 de 1 de maio de 1943, que Aprova
      a Consolidação das Leis do Trabalho, para acrescer o inciso X e parágrafo único ao Art. 473, autorizando a que os empregados
      que realizem trabalhado voluntário possam deixar de comparecer ao serviço por 02 dois dias a cada 12 doze meses. O Congresso
      Nacional decreta Art. 1º O Art. 473 do Decreto Lei nº 5. 452 de 1 de maio de 1943 o seguinte inciso X e parágrafo único
      Art. 473 X 2 dois dias consecutivos ou não, a cada 12 doze meses, em caso trabalho voluntário prestado por no mínimo
      40 horas na forma da Lei 9. 608 1998 Parágrafo único o acesso ao direito que se refere o inciso X deste artigo será
      disciplinado por Portaria do Ministério do Trabalho. Art. 2º Esta Lei entrará em vigor na data da sua publicação. JUSTIFICAÇÃO
      O Projeto de Lei em tela visa integrar ainda mais os Trabalhadores submetidos à CLT à sociedade, por meio de contribuição
      pessoal via trabalho voluntário. Em um país carente como o Brasil, toda guinada rumo objetivos cívicos, culturais, educacionais,
      científicos, recreativos ou de assistência social, deve ser valorizada. Nesta toada, nada mais natural que os trabalhadores,
      que já prestam inestimável serviço ao país contribuindo com sua força de trabalho, atuem de forma mais umbilical junto
      à sociedade civil organizada, seja em trabalhos eventuais ou auxílio diante de alguma tragédia. Além disso, a iniciativa
      em moldura permitirá que os trabalhadores possam organizar campanhas de cunho voluntário. Sala das Sessões, de de 2015.
      Deputado JHC
    sentences:
    - PROJETO DE LEI Nº DE 2012 Do Sr. Vitor Penido Denomina Rodovia Deputado Hugo Aguiar a rodovia BR 352, no Estado de Minas
      Gerais. O Congresso Nacional decreta Art. 1º Fica denominada Rodovia Deputado Hugo Aguiar a rodovia BR 352 no Estado
      de Minas Gerais, desde a divisa com o Estado de Goiás até o Município de Pará de Minas. Art. 2º Esta Lei entra em vigor
      na data de sua publicação. JUSTIFICAÇÃO Com este projeto de lei, pretendemos homenagear o saudoso Deputado Hugo Aguiar,
      pela atribuição de seu nome ao traçado mineiro da rodovia federal BR 352. Hugo Aguiar nasceu na cidade mineira de Araguari,
      no dia 1º de março de 1928. Filho do Sr. José Emílio de Aguiar e Dona Carmen Porto Aguiar, estudou em sua terra natal
      até sair para a conclusão do secundário no Instituto Padre Machado, em Belo Horizonte. Ainda na capital das alterosas,
      cursou Direito na Universidade de Minas Gerais, bacharelando se em 1951. 2 Sua carreira política iniciou se com o mandato
      de vereador, em Coromandel, tendo também exercido, na Assembleia Legislativa do Estado de Minas Gerais, dois mandatos
      de Deputado Estadual, entre 1959 e 1963, na 4ª e 5ª legislaturas, pelo PSD, quando chegou a ocupar o cargo de vice presidente
      da Assembleia. Nesse mesmo período, chegou a licenciar se para ocupar o cargo de Secretário de Estado da Administração.
      Na Câmara Federal também foi por duas vezes Deputado, sempre pela ARENA, nas legislaturas 1967 1971 e 1971 1975, onde
      integrou a Comissão de Agricultura e Política, a Comissão de Finanças e a Comissão de Serviço Público. Além dos mandatos
      eletivos e do já citado cargo de Secretário de Estado de Administração, Hugo Aguiar também foi Chefe de Gabinete do
      Secretário de Interior e Justiça de Minas Gerais Diretor da Caixa Econômica do Estado de Minas Gerais MinasCaixa de
      1975 a 1983 Delegado Federal do Ministério de Agricultura, de 1984 a 1986 e Presidente da Companhia Mineradora do Pirocloro
      de Araxá, entre 1988 e 1999. Destacado agricultor e advogado Hugo Aguiar soube exercer com dignidade todos os cargos
      públicos para os quais foi eleito ou designado, sempre buscando o bem estar dos cidadãos brasileiros, notadamente daqueles
      das Minas Gerais. Faleceu em Coromandel, no ano de 2003. O traçado mineiro da rodovia BR 352, objeto da denominação
      proposta, tem início na ponte sobre o rio Paranaíba divisa com o Estado de Goiás seguindo, entre outros, pelos Municípios
      de Abadia dos Dourados, Coromandel, Patos de Minas, Abaeté e Pitangui, até finalizar no entroncamento com a BR 262,
      em Pará de Minas. Em face do prestigioso currículo do ex Deputado Hugo Aguiar e dos seus valiosos serviços prestados
      ao Estado de Minas Gerais, esperamos contar com o apoio de nossos Pares para aprovarmos este projeto de lei, que atribui
      o seu nome à BR 352 em Minas Gerais. Sala das Sessões, em de de 2012. Deputado VITOR PENIDO 2011_19082
    - PROJETO DE LEI Nº DE 2012 Do Sr. Mandetta Acrescenta inciso X ao art. 473 da Consolidação das Leis do Trabalho, a fim
      de permitir falta ao serviço do empregado para participar de trabalhos comunitários. O Congresso Nacional decreta Art.
      1º O art. 473 da Consolidação das Leis do Trabalho, aprovada pelo Decreto lei n. º 5. 452, de 1º de maio de 1943, passa
      a vigorar acrescido do seguinte inciso X Art. 473 X por um dia, em cada doze meses de trabalho, para participar de trabalhos
      comunitários devidamente comprovados. NR Art. 2º Esta lei entra em vigor na data de sua publicação. JUSTIFICAÇÃO Uma
      das principais formas de fomentar o engajamento social, a consciência de cidadania e o espírito de colaboração da sociedade
      com as políticas públicas de desenvolvimento é estimular a participação em movimentos comunitários. 2 Não é necessário
      detalhar os múltiplos benefícios sociais, relacionais e de qualidade de vida que surgem do envolvimento dos cidadãos
      com as iniciativas comunitárias. Os trabalhadores, pessoas economicamente ativas, precisam ser estimulados a aderirem
      a essas iniciativas. No entanto, as longas jornadas de trabalho durante a semana e os desafios da vida familiar pouco
      colaboram para o engajamento dessa significativa parcela da população nos trabalhos comunitários. Nada mais justo, em
      função do papel social da propriedade privada, que os empregadores liberem seus empregados, uma única vez a cada ano,
      para que estes experimentem e passem a aderir voluntariamente às diversas alternativas de engajamento comunitário. Seria
      criado, assim, um meio de estimular a adesão à programas de voluntariado no Brasil, onde os índices de participantes
      nesse tipo de projeto é tão baixo. Isso, visando criar, em um futuro próximo, a cultura de voluntariado nos brasileiros.
      Por estas razões, temos a certeza de contar com o apoio dos ilustres Deputados e Deputadas para a aprovação do presente
      projeto de lei. Sala das Sessões, em de de 2012. Deputado MANDETTA
    - PROJETO DE LEI Nº DE 2015 Do Sr. João Marcelo Souza Institui a Política Nacional para o Manejo Sustentável e Plantio
      da Palmeira do Babaçu Orbignya martiana e dá outras providências. O Congresso Nacional decreta Art. 1º Fica instituída
      a Política Nacional para o Manejo Sustentável e Plantio da Palmeira do Babaçu Orbidgnya martiana com as seguintes finalidades
      I desenvolver, financiar e modernizar a cultura da palmeira do babaçu II incentivar o aumento da produtividade do cultivo
      e exploração da palmeira do babaçu III estimular a produção de produtos derivados, o aproveitamento industrial, a exportação,
      a defesa de preços de comercialização e a abertura de mercados IV elevar a qualidade de vida dos trabalhadores do setor
      V criar uma rede de serviços de apoio para a cadeia do coco babaçu VI fomentar a criação e regulamentação de associações,
      cooperativas e centrais 2 VII promover o fomento e o crédito para a implantação de agroindústrias de base familiar para
      o aproveitamento integral do coco babaçu VIII definir e apoiar o desenvolvimento de manejo sustentável para o uso do
      babaçu. Art. 2º Fica proibida a derrubada e o uso predatório das palmeiras de babaçu existentes no território nacional,
      com exceção I. em áreas destinadas a obras e serviços de utilidade pública ou de interesse social declaradas pelo poder
      público II. com o objetivo de estimular a reprodução das espécies, aumentar a produção de seus frutos ou facilitar a
      sua coleta III. quando autorizado por órgão ambiental competente. Art. 3º Para a consecução dos objetivos previstos
      nesta Lei, a Política Nacional para o Manejo Sustentável e Plantio da Palmeira do Babaçu contará com os seguintes recursos
      I. dotações orçamentárias da União II. produto de operações de crédito internas e externas firmadas com entidades públicas,
      privadas, nacionais ou estrangeiras III. saldos de exercícios anteriores IV. outras fontes previstas em lei. Art. 4º
      Os recursos referidos no art 3º desta lei serão destinados a I apoiar o desenvolvimento da cultura da palmeira do babaçu,
      promovendo a disseminação de tecnologias que concorram para o aumento da sua produtividade e da qualidade do produto
      II fortalecer e expandir os segmentos da cadeia produtiva do babaçu III realizar pesquisas, estudos e diagnósticos 3
      IV promover a capacitação tecnológica na indústria da cultura do babaçu e seu beneficiamento V realizar ampliações e
      melhorias na infraestrutura de apoio à produção e comercialização do babaçu e de seus derivados VI incrementar a cooperação
      técnica e financeira internacional com organismos particulares e oficiais, relativa à cultura do babaçu. Art. 5º Esta
      Lei entra em vigor na data de sua publicação. JUSTIFICAÇÃO De acordo com a Embrapa Cocais, o Brasil dispõe de aproximadamente
      18 milhões de hectares de babaçuais em seu território. O estado do Maranhão é o maior produtor nacional. Piauí, Pará,
      Mato Grosso e Tocantins também dispõem de babaçuais. O método de beneficiamento do babaçu é bastante rudimentar e dependente
      das quebradeiras de coco que são as mulheres que executam o trabalho manual da colheita e extração da amêndoa, em condições
      frequentemente precárias. A palmeira do babaçu chega a atingir 20 metros de altura e pode ser totalmente aproveitada.
      Do babaçu se obtém a matéria prima usada na fabricação de cosméticos, sabão, banha de coco e margarina. Do seu broto
      se extrai o palmito. Quando maduro, a parte exterior é comestível. O caule é utilizado em construções na área rural.
      As suas folhas são usadas para cobertura de casas e abrigos. Serve, também, para fabricação de papel e celulose. Do
      pedúnculo extrai se um líquido que, quando fermentado, transforma se em bebida alcóolica. O babaçu serve também para
      a fabricação de cestos, esteiras, janelas, gaiolas, entre outros. De acordo com o sítio PRISMABRASIL, as amêndoas verdes
      recém extraídas e espremidas com um pouco de água em um pano fino fornecem um leite de propriedades nutritivas semelhantes
      às do leite humano, 4 segundo pesquisa do Instituto de Recursos Naturais do Maranhão. Esse leite é muito usado na culinária
      local como tempero para carnes de caça e peixes substituindo o leite de coco da baía e como mistura para empapar o cuscuz
      de milho, de arroz e de farinha de mandioca ou, até mesmo, bebendo ao natural, substituindo o leite de vaca. A casca
      de coco, devidamente preparada, fornece um eficiente carvão, fonte exclusiva de combustível em várias regiões do nordeste
      do Brasil. Outros produtos de aplicação industrial podem ser derivados da casca de coco de babaçu, tais como etanol,
      metanol, coque, carvão reativado, gases combustíveis, ácido acético e alcatrão. É, portanto, um dos principais produtos
      extrativos do Brasil, contribuindo sobremaneira para a economia de alguns estados da Federação. O babaçu desempenha,
      também, relevante papel social, principalmente pela grande capacidade de absorção de mão de obra, especialmente na entressafra
      das culturas tradicionais. De acordo com o Projeto Executivo resultante do Congresso Brasileiro de Palmeira de Babaçu,
      realizado em 2010, em São Luís do Maranhão, nos últimos anos, o babaçu passou a assumir crescente grau de importância,
      dentre os recursos renováveis da biomassa do país, como fonte alternativa de geração de energia. No Modelo Energético
      Nacional o babaçu, é classificado como uma alternativa mais promissora. Para o Estado do Maranhão, Piauí, Tocantins,
      Mato Grosso e Goiás servirão como participante ativo em alto grau de complementaridade, através de seu consorciamento
      e balanceamento térmico na produção de combustível diesel e lubrificante. A despeito de tantas utilidades e do grande
      potencial de geração de renda para inúmeras famílias, o babaçu continua a ser tratado de forma marginal, permanecendo,
      somente, como parcela integrante dos sistemas de subsistência. São por essas razões que apresentamos o presente Projeto
      de Lei, vez que, intenta apoiar o desenvolvimento da cultura da palmeira de babaçu, promovendo a disseminação de tecnologias
      que concorram para o aumento da sua produtividade e da qualidade do produto. Por oportuno, salientamos que, para apresentação
      da presente proposição, nos inspiramos no Projeto de Lei nº 6. 820 de 2013, que Institui o fundo Nacional de Apoio à
      cultura da Palmeira do Babaçu, do Deputado Costa Ferreira, arquivado nos termos do art. 105 do Regimento 5 Interno da
      Câmara dos Deputados, bem como em levantamentos do Plano Nacional para a Promoção dos Produtos da Sociobiodiversidade,
      criado em 2009. Contamos, assim, com o apoio de nossos nobres pares, no sentido de aperfeiçoar e aprovar o texto proposto.
      Sala das Sessões, em de de 2015. Deputado JOÃO MARCELO SOUZA PMDB MA
  - source_sentence: PROJETO DE LEI N ____________ 2007 Altera a redação do art. 23 da Lei n 8. 666, de 21 de junho de 1993,
      e dá outras providências. A Congresso Nacional decreta Art. 1 Os incisos I e II do art. 23 da Lei n 8. 666, de 21 de
      junho de 1993, passam a vigorar com a seguinte redação Art. 23. As modalidades de licitação a que se referem os incisos
      I a III do artigo anterior serão determinadas em função dos seguintes limites, tendo em vista o valor estimado da contratação
      I para obras e serviços de engenharia a convite até R 325. 973, 00 trezentos de vinte e cinco e novecentos e setenta
      e dois reais b tomada de preços até 3. 259. 726, 00 três milhões, duzentos e cinqüenta e nove mil e setecentos e vinte
      e cinco reais c concorrência acima de 3. 259. 726, 00 três milhões, duzentos e cinqüenta e nove mil e setecentos e vinte
      e cinco reais II para compras e serviços não referidos no inciso anterior a convite até R 132. 054, 00 cento e trinta
      e dois mil e cinqüenta e quatro reais b tomada de preços até R 1. 072. 938, 00 um milhão, setenta e dois mil e novecentos
      e trinta e oito reais c concorrência acima de 1. 072. 938, 00 um milhão, setenta e dois mil e novecentos e trinta e
      oito reais Art. 2 Esta lei entra em vigor na data de sua publicação. Art. 3 Ficam revogadas as disposições em contrário.
      JUSTIFICATIVA A lei n 8. 666, de 21 de junho de 1993, regulamenta as modalidades de licitações, estabelecendo limites,
      de acordo com o valor da contratação, para o uso de cada modalidade. Tais limites, constantes no art. 23 da referida
      lei, foram atualizados pela última vez em 1998, com o advento da Lei n 9. 648, o que gerou uma enorme defasagem dos
      valores constantes nesse dispositivo. Desta forma, busca a pretensa lei atualizar os valores que limitam as licitações
      de 1998 até ao presente ano. Os valores descritos foram atualizados de acordo com o INCC DI, da Fundação Getúlio Vargas,
      no caso do inciso I, e com o IGP DI, também da Fundação Getúlio Vargas. Diante do exposto, justifica se a presente proposta
      de lei. Brasília, 10 de agosto de 2007. MANOEL ALVES DA SILVA JUNIOR Deputado Federal
    sentences:
    - CÂMARA DOS DEPUTADOS PROJETO DE LEI Nº______, DE 2013 Do Sr. Davi Alves Silva Júnior Obriga as unidades do Sistema Único
      de Saúde a promoverem a marcação de procedimentos de atenção à saúde pelos usuários, por meio da rede mundial de computadores.
      O Congresso Nacional decreta Art. 1º Esta Lei obriga as unidades do Sistema Único de Saúde SUS a promoverem a marcação
      de procedimentos de atenção à saúde pelos usuários, por meio da rede mundial de computadores. Art. 2º Ficam as instâncias
      gestoras do Sistema Único de Saúde, em todas as esferas de governo, obrigadas a promover a marcação de procedimentos
      de atenção à saúde pelos usuários, por meio da rede mundial de computadores, nas unidades de saúde sob sua responsabilidade
      direta. Parágrafo único. As instâncias gestoras mencionadas no caput deste artigo ficam obrigadas a disponibilizar terminais
      de acesso, preferencialmente, dentro das unidades de saúde ou em centros de atendimento em locais próximos das unidades,
      para que o usuário efetive a marcação de procedimentos. Art. 3º A obrigação referida no artigo 2º será aplicada para
      qualquer procedimento de atenção à saúde em que seja necessária a marcação de horário para atendimento em unidade de
      saúde do SUS. Art. 4º Esta Lei entra em vigor doze meses após a data de sua publicação. CÂMARA DOS DEPUTADOS 2 JUSTIFICAÇÃO
      Uma das situações mais degradantes que o cidadão brasileiro enfrenta para exercer seu direito constitucional à saúde
      por meio do Sistema Único de Saúde SUS é o enfrentamento de longas filas de espera para efetuar a marcação de procedimentos
      de atenção à saúde, como consultas e exames. Muitas vezes, precisa sair de sua casa de madrugada, passando a noite e,
      até, o dia, esperando pela marcação. Essa proposição objetiva contribuir para a solução desse problema ao prever a obrigação
      de que as instâncias gestoras do SUS, em todas as esferas de governo, promovam a marcação de procedimentos por meio
      da rede mundial de computadores, nas unidades de saúde sob sua responsabilidade direta. Tal medida resultaria em maior
      celeridade para o usuário do SUS e também para as próprias unidades de saúde. Foi previsto que as instâncias gestoras
      devem disponibilizar terminais de acesso, preferencialmente dentro das unidades de saúde, para que o usuário efetive
      a marcação. O ideal seria que toda unidade de saúde oferecesse acesso à marcação pela Internet aos seus usuários, contudo
      a realidade do País ainda não permite isso, pois nem todas possuem acesso à Internet. Ainda assim, nesses casos o acesso
      será promovido em local próximo à unidade de saúde centro de atendimento que possua tal acesso. A obrigação abrangerá
      qualquer procedimento de atenção à saúde em que seja necessária a marcação de horário para atendimento em unidade de
      saúde do SUS. Desse modo, ficam incluídos os procedimentos que são eletivos, pois os de urgência e emergência devem
      ser atendidos de imediato, sem a necessidade de marcação. A proposição indica que a Lei entrará em vigor doze meses
      após a data de sua publicação, para que haja tempo hábil para sua implantação. CÂMARA DOS DEPUTADOS 3 Diante da relevância
      da matéria para melhorar a qualidade da atenção no SUS, solicito o apoio dos ilustres Pares para aprovar a proposição
      nesta Casa. Sala das Sessões, em de de 2013. Deputado DAVI ALVES SILVA JÚNIOR 2013_4984
    - Altera a Lei nº 8. 666, de 21 de junho de 1993, para reajustar os valores estimados de contratação pela Administração
