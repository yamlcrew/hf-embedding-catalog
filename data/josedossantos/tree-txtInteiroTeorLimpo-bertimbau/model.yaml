- source_sentence: PROJETO DE LEI No DE 2015 Do Sr. Veneziano Vital do Rêgo Dispõe sobre os procedimentos aplicáveis em benefício
    do consumidor de produtos eletrônicos ou eletrodomésticos, em caso de obsolescência do produto antes do término de sua
    vida útil. O Congresso Nacional decreta Art. 1º A oferta e apresentação de produtos eletrônicos e eletrodomésticos deve
    fornecer, além das informações obrigatórias estabelecidas na legislação aplicável, a vida útil estimada do produto introduzido
    no mercado de consumo. Art. 2º Em caso de superveniente obsolescência, sem culpa do consumidor, do produto eletrônico
    ou eletrodoméstico antes do término de seu prazo de vida útil, pode o consumidor exigir, alternativamente e à sua escolha,
    que o fornecedor, no prazo de 7 sete dias úteis I restitua a quantia paga, monetariamente atualizada II substitua o produto
    por outro da mesma espécie ou por similar de melhor qualidade Art. 3º O não cumprimento do prazo estabelecido no artigo
    anterior sujeita o fornecedor, sem prejuízo das penalidades cabíveis por força da legislação de proteção e defesa do consumidor,
    à multa correspondente a 30 trinta por cento do valor monetariamente atualizado de aquisição do produto, que deverá ser
    revertida, imediatamente, ao consumidor. 2 Art. 4º Esta Lei entra em vigor na data de sua publicação oficial. JUSTIFICAÇÃO
    O presente projeto de lei objetiva enfrentar a cada vez mais usual prática de fabricantes de produtos eletrônicos e eletrodomésticos
    de, por variados artifícios e em curto espaço de tempo, tornar obsoletos os bens adquiridos pelo consumidor. Nos últimos
    anos, todos temos acompanhado as agressivas campanhas de marketing que incutem nos consumidores uma lógica de status e
    de consumo instantâneo. Essas técnicas objetivam conduzir os consumidores à compreensão de que aquele produto recém adquirido
    e cujas qualidades e possibilidades há pouco foram tão fortemente explicitadas já se encontra ultrapassado e que, agora,
    somente um novo e mais desenvolvido produto poderia atender as necessidades do consumidor. A par dessa obsolescência de
    desejabilidade, fruto de publicidade e propagandas exageradas, prolifera também em nossa sociedade de consumo a obsolescência
    de qualidade e de função, causada pelos próprios fabricantes. Esses, de modo deliberado e planejado, colocam no mercado
    produtos de reduzida durabilidade e utilidade, compelindo o consumidor, em tempo muito mais curto do que o esperado para
    aquele tipo de produto, a substituí lo. Entendemos que nosso projeto ao obrigar a informação da vida útil dos produtos
    e ao exigir a substituição do produto ou a restituição do valor pago em caso de obsolescência contribuirá para reprimir
    essa conduta tão fortemente prejudicial aos consumidores. 3 Contamos com a colaboração dos ilustres Pares para o aperfeiçoamento
    e aprovação da presente proposição, considerando que trará inegáveis benefícios ao consumidor brasileiro. Sala das Sessões,
    em de de 2015. Deputado VENEZIANO VITAL DO RÊGO 2015_18501
