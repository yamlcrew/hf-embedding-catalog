widgetData:
- source_sentence: ' O projeto de lei visa disciplinar os pedidos de vista nos tribunais brasileiros, estabelecendo prazos
    fixos e penalidades para a demora na restituição dos autos. O objetivo é impedir abusos e garantir uma julgamento justo
    e técnico. A proposta mantém a prerrogativa dos juízes de requerer vista dos autos, mas com uma disciplina mais rígida.'
  sentences:
  - ' O projeto de lei nº , de 2016, apresentado pelo deputado Diego Garcia, visa estabelecer um prazo de cinco sessões para
    o estudo dos pedidos de vistas nos tribunais, com o objetivo de tornar mais célere o julgamento de processos. A proposta
    se aplicará tanto ao processo penal quanto ao processo civil. A justificativa para a proposta é a necessidade de prevenir
    a morosidade nos julgamentos e a sensação de impunidade na sociedade, sem olvidar a existência do duplo grau de jurisdição.'
  - ' O projeto de lei visa estabelecer isenção de pedágio para veículos automotores de duas rodas, com o objetivo de melhorar
    a fluidez do trânsito e reduzir o risco de acidentes. A justificativa é que esses veículos não respondem por danos ao
    pavimento e não contribuem para o crescimento da demanda por espaço na via. Além disso, a cobrança de pedágio é difícil
    para esses veículos e pode levar a acidentes. A proposta foi apresentada pelo Deputado Hercílio Coelho e está sendo discutida
    na Câmara dos Deputados.'
  - ' O projeto de lei nº , de 2015, proposto pela deputada Mara Gabrilli, tipifica como crime o exercício ilegal das profissões
    de saúde de nível superior, incluindo as relacionadas pelo Conselho Nacional de Saúde. O projeto busca responder a situações
    em que profissionais sem autorização exercem as profissões de saúde, colocando em risco a saúde pública. A lei prevê penas
    para aqueles que exercem as profissões de saúde sem autorização legal ou excederem os limites de suas atribuições.'
- source_sentence: ' O projeto de lei visa permitir que os contribuintes deduzam das receitas tributáveis as despesas realizadas
    com matrículas e mensalidades de cursos de idiomas estrangeiros, com o objetivo de incentivar a educação e o desenvolvimento
    profissional. A proposta foi apresentada pelo deputado Fernando Coruja e está sendo discutida no Congresso Nacional.'
  sentences:
  - ' O projeto de lei permite a dedução integral das despesas com educação do contribuinte e seus dependentes, incluindo
    cursos de línguas estrangeiras e aquisição de material didático e pedagógico, na apuração do Imposto de Renda da pessoa
    física. A justificativa é que a educação é um investimento escolhido pelos contribuintes e que essas despesas não são
    perdas para o Tesouro Nacional, mas sim um investimento estratégico para o desenvolvimento econômico do país. A proposta
    busca beneficiar a educação de todos os brasileiros e aumentar a competitividade do país no mercado global.'
  - ' O projeto de lei proíbe a fiança nos contratos de locação, quando o locatário for pessoa física e instituição religiosa,
    e permite a cobrança antecipada de até 3 (três) de aluguéis. Além disso, o projeto modifica a Lei 8.245/91, permitindo
    o pagamento antecipado do aluguel e estabelecendo que o locador é obrigado a pagar impostos e taxas. A proposta é justificada
    por causa das dificuldades que os pretendentes à locação enfrentam para encontrar um fiador proprietário e para evitar
    a penhora da única residência do fiador.'
  - ' O projeto de lei proposto por Laerte Bessa, PMDB-DF, visa regulamentar a jornada de trabalho de profissionais de saúde,
    estabelecendo um limite de 80 horas semanais para esses profissionários. A proposta é baseada na Constituição e na necessidade
    de garantir a qualidade do trabalho e a dignidade dos profissionais de saúde, que atualmente enfrentam demandas exageradas
    e desumanas. A medida busca evitar a contratação de servidores empregados em horários extras e rotineiros, garantindo
    o respeito ao limite de jornada semanal.'
- source_sentence: ' O projeto de lei visa a tornar menos oneroso o cumprimento da sentença que reconhece a exigibilidade
    de obrigação de pagar quantia certa, diminui o valor da multa pelo não pagamento voluntário e diminui o valor da taxa
    dos juros a ser aplicada, com o objetivo de um maior equilíbrio processual entre as partes.'
  sentences:
  - ' O projeto de lei visa alterar a Lei nº 9.605/98 (Lei de Crimes Ambientais) para dispor sobre o valor das multas em caso
    de desastre ambiental. O objetivo é flexibilizar a Lei, permitindo que o valor da multa seja aumentado em até cem vezes
    do teto, em caso de desastre ambiental, proporcionalmente ao nível dos danos causados à saúde humana ou ao meio ambiente.
    Além disso, o projeto estabelece que o infrator deve reparar os danos causados, independentemente de se optar por converter
    a multa em serviços de preservação e melhoria do meio ambiente.'
  - ' O projeto de lei visa regular o inciso LI, art. 5º, da Constituição Federal, que estabelece a possibilidade de extradição
    de brasileiros naturalizados, quando forem condenados por crimes cometidos antes da naturalização. O projeto busca preencher
    a lacuna existente na legislação e garantir a cooperação internacional no combate aos crimes transnacionais. Além disso,
    o projeto estabelece que a extradição de brasileiros naturalizados será possível apenas quando houver comprovado envolvimento
    do réu na prática do crime.'
  - ' O projeto de lei visa estabelecer a duração semanal de trabalho para enfermeiros técnicos, enfermagem auxiliares e enfermagem
    parteiras, que atualmente é regulada pela Lei nº 7.498/1986. A proposta é de fixar a jornada diária em 30 horas, com o
    objetivo de garantir um descanso adequado para os profissionais da saúde e evitar a fadiga e o desgaste. A proposta também
    busca estabelecer a duração semanal de trabalho para esses profissionais em 30 horas, com o objetivo de garantir um descanso
    adequado para os profissionais da saúde e evitar a fadiga e o desgaste.'
- source_sentence: ' O projeto de lei proíbe a realização de chamadas telefônicas anônimas, obrigando a identificação do remetente
    e do destinatário. A justificativa é a necessidade de combater crimes e violações de direitos garantidos, que ocorrem
    por meio do uso inadequado da telefonia. A proibição será aplicada a partir da data de publicação da lei.'
  sentences:
  - ' O projeto de lei proíbe a realização de ligações telefônicas não identificáveis, com o objetivo de inibir a proliferação
    de ligações confidenciais com fins de telemarketing e cobrança, e também para reduzir os índices de criminalidade no país.
    O projeto mantém o dispositivo da Lei Geral de Telecomunicações que assegura ao usuário o direito à não divulgação do
    seu número telefônico, mas apenas em listas de assinantes. O projeto estabelece um prazo de noventa dias para que a norma
    proposta passe a vigorar, permitindo que as operadoras adaptem suas redes para adequação ao disposto na proposição.'
  - ' O Projeto de Lei nº 9.394/96, apresentado pela Deputada Federal Kátia Abreu em 2005, visa estabelecer diretrizes para
    a educação nacional e instituir o Programa Educação Cidadania (PEC). O projeto prevê a implantação do ensino médio em
    escolas públicas, com foco em estudos organização política administrativa e cidadania, e estabelece prazos para a implantação
    em diferentes estados e municípios. Além disso, o projeto busca popularizar o conhecimento da divisão política administrativa
    do país e da função da cidadania.'
  - ' O projeto de lei de 2008 da Deputada Solange Almeida (PMDB-RJ) dispõe desconto de 35% nas taxas de inscrição para candidatos
    que atendam a critérios de deficiência física, necessidades especiais e renda mensal inferior a dois salários mínimos.
    A lei também estabelece que os doadores de sangue possam receber um desconto de 35% nas taxas de inscrição. Além disso,
    a lei prevê que as informações estabelecidas no artigo 1º sejam incluídas nos editais dos concursos públicos. A lei entrará
    em vigor 180 dias após a publicação oficial.'
- source_sentence: ' O projeto de lei reconhece o Carnaval do Município de Aracati-CE como manifestação da cultura nacional,
    destacando sua importância econômica e social. O evento é realizado em quatro arenas e atrai turistas de todo o país.
    A cidade de Aracati preserva suas raízes e tradições, e o projeto pode contribuir para a perpetuação da cultura do povo.'
  sentences:
  - ' O projeto de lei reconhece o Carnaval de Nova Russas como manifestação da cultura nacional e incentiva a valorização
    e ampliação das manifestações culturais do Brasil. A celebração é uma importante fonte de renda econômica para o município
    e atrai turistas de todas as regiões. A lei foi criada em 2017 e incluiu o Carnaval de Nova Russas no Calendário Turístico
    Cultural do Estado do Ceará. O projeto tem importante relevância cultural e social e conta com o apoio dos ilustres pares
    para sua aprovação.'
  - ' O projeto de lei do deputado Eliene Lima visa modificar o Decreto Lei 5.518/2005, que estabelece a admissão automática
    de diplomas de pós-graduação expedidos por universidades e faculdades estrangeiras para o mercado brasileiro. O projeto
    busca garantir a qualidade do ensino e a proteção dos jovens cidadãos, evitando a entrada de diplomas de qualidade duvidosa
    no mercado. Além disso, o projeto também busca preservar a soberania interna dos Estados Integrantes do Mercosul e evitar
    a ultrapassagem de limites legais.'
  - ' O projeto de lei visa alterar o art. 282 do Decreto Lei 2.848/40, permitindo que os técnicos tecnólogos radiologia possam
    exercer as profissões de médico, dentista e farmacêutico, sem a necessidade de autorização legal e ética, e aumentando
    os limites de responsabilidade penal para essas atividades. O projeto também busca inserir condutas previstas na legislação
    para evitar o exercício ilegal da profissão e minimizar os efeitos nocivos para os seres vivos e a sociedade.'
