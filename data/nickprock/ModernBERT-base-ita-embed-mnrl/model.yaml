  sentences:
  - QUIET è un esperimento di astronomia per studiare la polarizzazione della radiazione cosmica di fondo a microonde. QUIET
    sta per Q/U Imaging Experiment. La Q/U nel nome si riferisce alla capacità del telescopio di misurare simultaneamente
    i parametri Q e U Stokes. QUIET si trova ad un'altitudine di 5.080 metri (16.700 piedi) presso l'Osservatorio di Llano
    de Chajnantor nelle Ande cilene.
