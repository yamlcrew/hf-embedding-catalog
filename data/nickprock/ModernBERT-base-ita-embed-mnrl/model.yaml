widgetData:
- source_sentence: effetti dell'ipotiroidismo sul corpo
  sentences:
  - Con l'ipotiroidismo, invece, la temperatura corporea tende a diminuire a causa di una carenza di ormone tiroideo. Un piccolo
    aumento o diminuzione dei livelli della tiroide può modificare la temperatura corporea abbastanza da influenzare significativamente
    i livelli di proteine ​​nel sangue. Come l'ipotiroidismo influisce sulla temperatura interna. I sintomi dell'ipotiroidismo
    includono costipazione, affaticamento, dolori articolari o muscolari e persino depressione.
  - Organum Harmony una prima forma di polifonia Anonimo IV Ha scritto la vecchia teoria musicale dal MUSC 118 alla Eastern
    Michigan University
  - Se stai cercando informazioni su quando la tiroide produce troppo ormone tiroideo, vedi l'argomento Ipertiroidismo. L'ipotiroidismo
    significa che la tiroide non produce abbastanza ormone tiroideo. La tiroide è una ghiandola a forma di farfalla nella
    parte anteriore del collo. Produce ormoni che controllano il modo in cui il tuo corpo usa l'energia. Avere un basso livello
    di ormone tiroideo colpisce tutto il tuo corpo. Può farti sentire stanco e debole. Se l'ipotiroidismo non viene trattato,
    può aumentare i livelli di colesterolo.
- source_sentence: che ore sono a gilbert az
  sentences:
  - Principali città vicino a Phoenix, AZ. Questa è una lista delle grandi città più vicine a Phoenix, AZ. Una grande città
    di solito ha una popolazione di almeno 200.000 abitanti e spesso puoi volare in un grande aeroporto. Se devi prenotare
    un volo, cerca l'aeroporto più vicino a Phoenix, AZ. 19 miglia a Glendale, AZ. 2 11 miglia a Scottsdale, AZ. 3 15 miglia
    a Mesa, AZ.
  - Gli appaltatori indipendenti sono coperti come dipendenti di servizio sotto la SCA. È responsabilità dell'azienda garantire
    che gli appaltatori indipendenti coperti da SCA ricevano i salari e i benefici accessori appropriati. In caso contrario,
    la società può essere ritenuta responsabile per eventuali pagamenti insufficienti.
  - 'Ora locale attuale: Gilbert, Arizona si trova nel fuso orario delle montagne Nota: la nazione Navajo nell''Arizona nord-orientale
    osserva l''ora legale. Gilbert, Arizona non utilizza l''ora legale. L''ora corrente a Gilbert, Arizona è: lunedì 29/01/2018
    19:22 MST Gilbert, Arizona si trova nel fuso orario di montagna e NON osserva l''ora legale.'
- source_sentence: cos'è un portale di progetto?
  sentences:
  - La metodologia dei cancelli è un processo di definizione progressiva del progetto basato su una valutazione pianificata
    e standardizzata al termine di ogni fase. Un cancello o un casello è un punto di controllo standardizzato in cui la fase
    del progetto viene rivista e/o verificata e approvata (o meno) per continuare con la fase successiva.
  - Lo sviluppo del curriculum è un processo continuo e le modifiche necessarie sono parte integrante del processo, In. al
    fine di rendere più reattivo alle mutevoli esigenze e per garantire la pertinenza. È senza dubbio la realtà. che l'efficace
    processo di sviluppo del curriculum può migliorare l'apprendimento dei partecipanti.
  - Quando usi la teoria del controllo del cancello per alleviare il disagio del travaglio, tieni a mente alcune cose. Primo,
    i nervi di grande diametro si abituano più velocemente dei nervi di piccolo diametro. Ciò significa che farsi massaggiare
    la schiena può funzionare come un incantesimo per una ventina di minuti e poi interrompersi improvvisamente. Questo è
    solo il modo in cui il tuo corpo ti dice che è ora di provare qualcos'altro. In secondo luogo, può essere utile utilizzare
    tecniche di visualizzazione o punti focali mentre provi la teoria del cancello perché questo ti focalizza e può aiutarti
    a distrarti dal disagio. Quali domande hai sulla teoria del controllo dei cancelli? Hai applicato i concetti nel tuo lavoro?
