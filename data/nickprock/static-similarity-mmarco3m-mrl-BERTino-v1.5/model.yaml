widgetData:
- source_sentence: quanto tempo può stare fuori l'anguria prima che vada a male?
  sentences:
  - Fu allora che la linea Make-up Cover sviluppata da Dermacol fu lanciata come una delle prime del suo genere sia in Europa
    che nel mondo e la licenza di questo prodotto fu venduta fino a Hollywood nel 1969. Siamo orgogliosi che la bellezza di
    molte stelle del cinema ha avuto le sue origini da Dermacol a Praga.
  - Risposta completa. Se l'anguria viene tagliata, può rimanere fresca in frigorifero per circa tre-cinque giorni. L'anguria
    tagliata può durare un giorno se tagliata e conservata sul piano di lavoro. L'anguria è ricca di acqua ed elettroliti.
    Il frutto è anche ricco di vitamina A, un potente antiossidante che protegge il corpo dai radicali liberi.
  - È più spesso associato ai pomodori, ma l'anguria è in realtà una fonte più concentrata. Rispetto a un grande pomodoro
    fresco, una tazza di anguria ha 1,5 volte il licopene (6 milligrammi (mg) in un'anguria rispetto a 4 mg in un pomodoro).
    Maggiori informazioni sul motivo per cui il licopene è così importante a breve.
- source_sentence: dove vivono i serpenti a sonagli?
  sentences:
  - Il bengalese è la lingua nazionale e ufficiale del Bangladesh e una delle 23 lingue ufficiali riconosciute dalla Repubblica
    dell'India. È la lingua ufficiale degli stati indiani del Bengala occidentale, del Tripura e dell'Assam.
  - I componenti del veleno possono anche cambiare nel corso della vita di un serpente, in specie (ad esempio, alcuni serpenti
    a sonagli del genere Crotalus) che si affidano a una serie di animali da preda come giovani (lucertole a sangue freddo
    e altri piccoli esotermici), e un diverso insieme di animali da preda da adulti (roditori a sangue caldo).
  - 'Dimensioni: un certo numero di diversi serpenti a sonagli vivono negli Stati Uniti e hanno dimensioni variabili dal serpente
    a sonagli dal naso lungo 1 piede al diamondback orientale lungo da 5 a 8 piedi. Dieta: i serpenti a sonagli sono pit vipersÃƒÂ¢Ã‚â‚¬Ã
    Hanno organi di rilevamento del calore situati in fosse vicino agli occhi. Abitat: Vivono in una varietà di habitat, tra
    cui foreste, praterie, arbusti, paludi e deserti, e sono anche abili nuotatori. Quasi tutti i rettili, compresi i serpenti
    a sonagli, sono ectotermici (a sangue freddo). Gli ectotermi non possono regolare la temperatura corporea come fanno gli
    animali a sangue caldo.'
- source_sentence: come miscelare correttamente il tè matcha
  sentences:
  - Il miglior sito per chi ama la lingua Visayan (Bisaya o Cebuano) che offre Bisaya English e English Bisaya Translations
    and Dictionary. Bisaya (Cebuano o Visayan) è una delle lingue più parlate nelle Filippine, specialmente a Visayas.
  - È vero che, poiché il matcha è composto da foglie di tè intere frantumate, il contenuto di caffeina è leggermente superiore
    a quello del tè in busta. In effetti, il livello di caffeina del matcha può effettivamente eguagliare la metà del livello
    di una tazza di caffè nero. Tieni presente che la caffeina non fa male a te in quantità moderate.
  - Hai solo bisogno di aggiungere circa 1/2 cucchiaino di Matcha per tazza di acqua/latte riscaldata. Il tè verde Matcha,
    soprattutto biologico, è il tè più costoso da raccogliere e macinare sul mercato. Ci vogliono giorni di essiccazione e
    macinazione e ci vuole una grande quantità di foglie di tè Matcha per creare solo 1 cucchiaino di Matcha in polvere.
- source_sentence: terapia fisica colleyville
  sentences:
  - I primi cinque segni precoci di gravidanza. 1 Nausea o malattia possono iniziare molto presto per alcune donne - un comune
    segno precoce di gravidanza sarà la nausea mattutina. 2 Avendo bisogno di fare pipì più spesso quando si rimane incinta,
    un segno precoce potrebbe essere la necessità di fare pipì di più. 3 Mal di testa - Potresti provare mal di testa nelle
    prime fasi della gravidanza.
  - 'Sabato: 8:00 - 12:00. Terapia fisica e riabilitazione sportiva di Colleyville. Joel D. Judd, PT, DPT, OCS - Dottore in
    fisioterapia / Specialista clinico ortopedico certificato Boaord. Colleyville Physical Therapy fornisce servizi di fisioterapia
    eccezionali ai cittadini di Colleyville dal 2000. Joel e il suo staff sono esperti nell''aiutarvi a riprendervi da un
    infortunio o da un intervento chirurgico.'
  - Programmi e requisiti di formazione del fisioterapista. I corsi di laurea in fisioterapia preparano gli studenti a lavorare
    sul campo con i pazienti che necessitano di terapia fisica. La maggior parte degli studenti nei programmi di formazione
    in fisioterapia completa i diplomi di dottorato nel campo, ma alcuni possono esercitarsi con i master.
- source_sentence: di quale sistema fa parte l'insulina?
  sentences:
  - Un contatore elettrico o un contatore di energia è un'apparecchiatura in grado di misurare la quantità di energia elettrica
    consumata da un'abitazione, un'azienda o un dispositivo alimentato elettricamente. I contatori elettrici sono generalmente
    calibrati in unità di fatturazione; il più comune è il kilowattora.
  - 1 Arrotolare il flacone di insulina tra le mani due o tre volte per miscelare l'insulina. 2 Non agitare il flacone, poiché
    possono formarsi bolle d'aria che influiscono sulla quantità di insulina prelevata. 3 Pulire la parte in gomma sulla parte
    superiore del flacone di insulina con un tampone imbevuto di alcol o un batuffolo di cotone inumidito con alcol.
  - Come i nostri nervi regolano la secrezione di insulina. LA STORIA COMPLETA. Il sistema nervoso autonomo, che è la parte
    del sistema nervoso al di fuori del controllo cosciente, svolge un ruolo importante nel rilascio di insulina dalle cellule
    beta nella parte endocrina del pancreas.
