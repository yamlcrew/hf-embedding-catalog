  sentences:
  - Newark Liberty International Airport EWR è l'aeroporto più trafficato dell'area metropolitana di New York-New Jersey in
    termini di voli. Nel 2012, l'aeroporto di Newark Liberty ha servito oltre 34 milioni di passeggeri. Inaugurato originariamente
