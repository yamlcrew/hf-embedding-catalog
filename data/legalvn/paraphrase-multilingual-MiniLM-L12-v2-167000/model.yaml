  widget:
  - source_sentence: Nguyên tắc áp dụng phụ cấp ưu đãi nghề y tế thế nào?
    sentences:
    - Chu kỳ kiểm định chất lượng giáo dục nghề nghiệp\n...\n2. Trường hợp cơ sở giáo dục nghề nghiệp có ngành, nghề trọng
      điểm; chương trình đào tạo ngành, nghề trọng điểm; cơ sở giáo dục nghề nghiệp và chương trình đào tạo các ngành, nghề
      phục vụ yêu cầu công tác quản lý nhà nước phải thực hiện kiểm định chất lượng giáo dục nghề nghiệp theo quy định tại
      điểm d khoản 3 Điều 65 của Luật Giáo dục nghề nghiệp số 74/2014/QH13 ngày 27 tháng 11 năm 2014 nhưng không đạt tiêu
      chuẩn kiểm định chất lượng giáo dục nghề nghiệp thì trong thời hạn 03 năm phải thực hiện kiểm định lại.
    - Vệ sinh môi trường, vệ sinh tòa nhà\n1. Trách nhiệm của các đơn vị, cán bộ, công chức, viên chức, nhân viên và người
      lao động trong việc giữ gìn vệ sinh tại nơi làm việc và khu vực công cộng:\na) Hàng ngày tự vệ sinh sàn nhà, bàn ghế,
      tủ, các thiết bị được trang cấp và tổng vệ sinh phòng làm việc vào chiều thứ Sáu hàng tuần;\nb) Có trách nhiệm thu gom
      rác thải trong phòng chuyển ra thùng rác đặt tại các hành lang;\nc) Không đổ nước chè, cà phê, ….. xuống sàn nhà, hành
      lang, tường nhà và khu vệ sinh;\nd) Nghiêm cấp hút thuốc lá trong phòng làm việc, phòng họp, cầu thang máy, cầu thang
      bộ, tầng hầm;\nđ) Không khạc nhổ, bôi bẩn lên tường, không vứt rác thải, gạt tàn thuốc lá, đầu lọc thuốc lá xuống sàn
      nhà và các khu vực công cộng;\ne) Nghiêm cấm hái hoa, bẻ cành, dẫm lên thảm cỏ, nhổ cây trong khuôn viên cơ quan.\ng)
      Nghiêm cấm mang chất độc hại vào cơ quan.\n…
    - Nguyên tắc áp dụng\n1. Trường hợp công chức, viên chức chuyên môn y tế thuộc đối tượng được hưởng các mức phụ cấp ưu
      đãi theo nghề khác nhau thì được hưởng một mức phụ cấp ưu đãi theo nghề cao nhất.\n2. Công chức, viên chức đã hưởng
      phụ cấp ưu đãi theo nghề quy định tại Thông tư liên tịch số 06/2010/TTLT-BYT-BNV-BTC ngày 22/3/2010 của Bộ Y tế, Bộ
      Nội vụ, Bộ Tài chính hướng dẫn thực hiện Nghị định số 64/2009/NĐ-CP ngày 30/7/2009 của Chính phủ về chính sách đối với
      cán bộ, viên chức y tế công tác ở vùng có điều kiện kinh tế - xã hội đặc biệt khó khăn thì không hưởng phụ cấp ưu đãi
      theo nghề quy định tại Thông tư liên tịch này.
  - source_sentence: Số lượng thành viên Hội đồng khoa học và đào tạo là bao nhiêu?
    sentences:
    - 'Cấp Giấy chứng nhận chất lượng an toàn kỹ thuật và bảo vệ môi trường trong sản xuất, lắp ráp ô tô, rơ moóc và sơ mi
      rơ moóc\n2.1. Trình tự thực hiện:\na) Nộp hồ sơ TTHC:\n- Cơ sở sản xuất lập hồ sơ kiểm tra xe cơ giới theo quy định
      và nộp đến Cục Đăng kiểm Việt Nam.\nb) Giải quyết TTHC:\n- Cục Đăng kiểm Việt Nam tiếp nhận và kiểm tra thành phần hồ
      sơ kiểm tra xe cơ giới: nếu hồ sơ không đầy đủ theo quy định thì hướng dẫn Cơ sở sản xuất hoàn thiện lại; Nếu hồ sơ
      đầy đủ theo quy định thì thống nhất về thời gian và địa điểm thực hiện đánh giá điều kiện kiểm tra chất lượng sản phẩm
      tại Cơ sở sản xuất;\n- Cục Đăng kiểm Việt Nam tiến hành kiểm tra nội dung hồ sơ và thực hiện đánh giá điều kiện kiểm
      tra chất lượng sản phẩm tại Cơ sở sản xuất theo quy định: Nếu chưa đạt yêu cầu thì thông báo để Cơ sở sản xuất hoàn
      thiện lại; Nếu đạt yêu cầu thì cấp Giấy chứng nhận trong thời hạn 03 ngày làm việc kể từ ngày kết thúc kiểm tra, đánh
      giá hồ sơ đầy đủ, hợp lệ theo quy định và có kết quả đánh giá COP đạt yêu cầu;\n- Cơ sở sản xuất nộp hồ sơ kiểm tra
      xe cơ giới và nhận kết quả trực tiếp tại trụ sở Cục Đăng kiểm Việt Nam hoặc qua hệ thống bưu chính hoặc qua hệ thống
      dịch vụ công trực tuyến hoặc qua hình thức phù hợp khác.\n...'
    - Phiên họp Hội đồng khoa học\n1. Hội đồng khoa học họp định kỳ 06 tháng/01 lần. Các phiên họp định kỳ phải có ít nhất
      2/3 tổng số thành viên của Hội đồng khoa học tham dự.\n2. Phiên họp đột xuất của Hội đồng khoa học được triệu tập theo
      quyết định của Chủ tịch và phải có trên 1/2 số thành viên của Hội đồng khoa học tham dự.\n3. Viện trưởng VKSND tối cao
      tham dự phiên họp của Hội đồng khoa học khi thấy cần thiết.\n4. Tùy thuộc vào nội dung chương trình phiên họp, Chủ tịch
      Hội đồng khoa học có thể quyết định mời các nhà khoa học trong và ngoài ngành KSND tham gia phiên họp.\n5. Nội dung
      phiên họp, các tài liệu liên quan đến phiên họp của Hội đồng khoa học phải được thông báo hoặc chuyển cho các Thành
      viên chậm nhất là 3 ngày làm việc trước ngày họp, trừ trường hợp đột xuất.\n6. Hội đồng khoa học thảo luận dân chủ,
      tập thể, công khai, quyết định theo đa số về những vấn đề thuộc nội dung phiên họp và những vấn đề do Chủ tịch Hội đồng
      khoa học nêu ra hoặc do các Thành viên đề nghị và được Chủ tịch Hội đồng khoa học chấp thuận.\nChủ tịch Hội đồng khoa
      học chủ trì thảo luận và kết luận tại phiên họp. Đối với những vấn đề phức tạp còn nhiều ý kiến khác nhau, Hội đồng
      khoa học tiến hành biểu quyết. Những vấn đề được biểu quyết đạt trên 2/3 số phiếu của thành viên có mặt hoặc trên 50%
      tổng số thành viên Hội đồng được coi là ý kiến chính thức của Hội đồng khoa học. Các ý kiến khác được bảo lưu, ghi vào
      biên bản cuộc họp.
    - Hồ sơ, thủ tục công nhận liệt sĩ\n1. Người khi hy sinh đang thuộc quân đội, công an quản lý thì Bộ Quốc phòng, Bộ Công
      an chịu trách nhiệm:\na) Hướng dẫn về quy trình lập hồ sơ đề nghị công nhận liệt sĩ theo quy định.\nb) Có văn bản đề
      nghị kèm hồ sơ gửi Bộ Lao động - Thương binh và Xã hội thẩm định trong thời gian không quá 50 ngày kể từ ngày cơ quan,
      đơn vị trực tiếp quản lý người hy sinh xác lập, hoàn thiện các giấy tờ quy định tại Điều 17 Nghị định này.
  - source_sentence: Ban Tài chính Văn phòng Kiểm toán nhà nước thực hiện những chức năng gì?
    sentences:
    - 'Tiếp nhận hồ sơ và trả kết quả\n...\n2.2.4. Lao động nam hoặc người chồng của lao động nữ mang thai hộ nghỉ việc khi
      vợ sinh con: Bản sao giấy chứng sinh hoặc bản sao giấy khai sinh hoặc trích lục khai sinh của con; trường hợp sinh con
      phải phẫu thuật hoặc sinh con dưới 32 tuần tuổi mà giấy chứng sinh không thể hiện thì có thêm giấy tờ của cơ sở khám
      bệnh, chữa bệnh thể hiện việc sinh con phải phẫu thuật, sinh con dưới 32 tuần tuổi. Trường hợp con chết sau khi sinh
      mà chưa được cấp giấy chứng sinh thì thay bằng trích sao hoặc tóm tắt hồ sơ bệnh án hoặc giấy ra viện của người mẹ hoặc
      của lao động nữ mang thai hộ thể hiện con chết…'
    - Việc tự giám sát chất lượng dịch vụ viễn thông của doanh nghiệp viễn thông\n1. Các doanh nghiệp viễn thông được Bộ Thông
      tin và Truyền thông cấp giấy phép kinh doanh dịch vụ viễn thông phải thường xuyên tự giám sát chất lượng dịch vụ đối
      với tất cả các dịch vụ thuộc “Danh mục dịch vụ viễn thông bắt buộc quản lý chất lượng” mà mình cung cấp.\n2. Trong trường
      hợp dịch vụ mà mình cung cấp có sự cố thì doanh nghiệp viễn thông phải thực hiện báo cáo đột xuất như quy định tại Khoản
      3 Điều 8 của Thông tư này.
    - Cục Quản lý, giám sát bảo hiểm; Cục Quản lý Công sản; Cục Quản lý Giá; Cục Quản lý Nợ và Tài chính đối ngoại; Cục Quản
      lý, giám sát Kế toán, Kiểm toán; Cục Quản lý Công sản; Cục Tài chính doanh nghiệp và Vụ Tài chính ngân hàng chủ trì
      phối hợp với Cục Tin học & Thống kê Tài chính xây dựng quy trình điện tử từng thủ tục hành chính theo phạm vi quản lý
      đối với danh mục thủ tục hành chính để thực hiện tích hợp trên Hệ thống thông tin Một cửa điện tử của Bộ Tài chính.
  - source_sentence: Điều kiện để Giám đốc Học viện An ninh nhân dân được thăng cấp bậc hàm trước thời hạn như thế nào?
    sentences:
    - Mức độ tự chủ và trách nhiệm\n- Có ý thức và tác phong nghề nghiệp đúng chuẩn mực, có năng lực thực hiện công việc
      được giao; phương pháp làm việc khoa học, biết phân tích và giải quyết các vấn đề mới về lĩnh vực chuyên môn nghề;\n-
      Gắn bó nghề nghiệp; nghiêm chỉnh chấp hành quy chế, quy định của cơ quan, doanh nghiệp, nơi đang công tác với ý thức
      tổ chức kỉ luật và tinh thần trách nhiệm cao trong công việc;\n- Lập được các biện pháp an toàn và đảm bảo an toàn,
      vệ sinh lao động trong quá trình làm việc; có ý thức trách nhiệm công dân, thái độ và đạo đức nghề nghiệp đúng đắn,
      sẵn sàng nhận nhiệm vụ; tự tin, cầu tiến trong công việc; hợp tác, thân thiện, khiêm tốn trong các mối quan hệ;\n- Tự
      chịu trách nhiệm về chất lượng đối với kết quả công việc, sản phẩm do mình đảm nhiệm theo các tiêu chuẩn và chịu một
      phần trách nhiệm đối với kết quả công việc, sản phẩm của tổ, nhóm;
    - Tổ chức bộ máy\n...\n5. Tổng cục Hải quan có thể biệt phái công chức từ các đơn vị thuộc và trực thuộc Tổng cục để bổ
      sung cán bộ chủ chốt, cán bộ kỹ thuật có năng lực, kinh nghiệm cho Ban Quản lý dự án đầu tư xây dựng chuyên ngành của
      Tổng cục Hải quan. Thời hạn biệt phái các công chức không quá 03 năm, trường hợp quá 03 năm mà chưa hoàn thành dự án
      thì Tổng cục Hải quan xem xét quyết định bổ sung thời gian biệt phái.\nNhân sự tuyển dụng mới của Ban Quản lý dự án
      đầu tư xây dựng chuyên ngành của Tổng cục Hải quan là viên chức hoặc hợp đồng lao động, thực hiện theo quy định về chế
      độ tiền lương và các chế độ, chính sách đối với viên chức và người lao động.\n...
    - Biệt phái công chức\n...\n6. Không thực hiện biệt phái công chức nữ đang mang thai hoặc nuôi con dưới 36 tháng tuổi.
  - source_sentence: Thời điểm đánh giá và xếp loại chất lượng hằng năm của công chức, viên chức thuộc Bộ Tài chính được diễn
      ra trong thời gian nào?
    sentences:
    - Nhiệm vụ của giáo viên\n1. Thực hiện nhiệm vụ tổ chức các hoạt động dạy học, giáo dục theo kế hoạch giáo dục của nhà
      trường và kế hoạch giáo dục của tổ chuyên môn; quản lý học sinh trong các hoạt động giáo dục do nhà trường tổ chức;
      tham gia các hoạt động chuyên môn; chịu trách nhiệm về chất lượng, hiệu quả giáo dục.\n2. Trau dồi đạo đức, nêu cao
      tinh thần trách nhiệm, giữ gìn phẩm chất, danh dự, uy tín của nhà giáo; gương mẫu trước học sinh; thương yêu, đối xử
      công bằng và tôn trọng nhân cách của học sinh; bảo vệ các quyền và lợi ích chính đáng của học sinh; đoàn kết, giúp đỡ
      đồng nghiệp.\n3. Học tập, rèn luyện để nâng cao sức khỏe, trình độ chính trị, chuyên môn, nghiệp vụ, đổi mới phương
      pháp dạy học, giáo dục.\n4. Tham gia tập huấn, bồi dưỡng chuyên môn, nghiệp vụ.\n5. Tham gia công tác phổ cập giáo dục
      trung học cơ sở ở địa phương.\n6. Thực hiện nghĩa vụ công dân, các quy định của pháp luật và của ngành Giáo dục, các
      quyết định của hiệu trưởng; thực hiện nhiệm vụ do hiệu trưởng phân công, chịu sự kiểm tra, đánh giá của hiệu trưởng
      và các cấp quản lý giáo dục.\n7. Phối hợp với Đội Thiếu niên Tiền phong Hồ Chí Minh, Đoàn Thanh niên Cộng sản Hồ Chí
      Minh, Hội Liên hiệp Thanh niên Việt Nam, gia đình học sinh và các tổ chức xã hội liên quan để tổ chức hoạt động giáo
      dục.\n8. Thực hiện các nhiệm vụ khác theo quy định của pháp luật.
    - “Điều 1. Danh mục trang thiết bị y tế phục vụ phòng, chống dịch COVID-19 trong trường hợp cấp bách theo quy định tại
      khoản 3 Điều 29 Nghị định số 98/2021/NĐ-CP ngày 08 tháng 11 năm 2021 của Chính phủ về quản lý trang thiết bị y tế \n1.
      Máy PCR. \n2. Hóa chất (sinh phẩm) chạy máy PCR xét nghiệm SARS-CoV-2. \n3. Test kít xét nghiệm nhanh kháng nguyên/
      kháng thể kháng SARS-CoV-2. \n4. Máy thở chức năng cao, máy thở xâm nhập và không xâm nhập, máy thở không xâm nhập,
      máy oxy dòng cao, máy thở xách tay. \n5. Máy lọc máu liên tục. \n6. Máy X-Quang di động. \n7. Máy đo khí máu (đo được
