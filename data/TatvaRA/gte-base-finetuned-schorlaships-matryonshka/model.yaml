widgetData:
- source_sentence: What is the maximum value of equipment that can be purchased with a CUE Student Research Project Grant?
  sentences:
  - Equipment costs (valued up to $1000).
  - Variable awards to recognize and reward academic achievement at the senior high school level and to encourage students
    to pursue post -secondary studies.
  - The Amazon Future Engineer Scholarship provides students with an opportunity to upgrade their careers with a $7,500 CAD/year
    scholarship available for up to four years.
- source_sentence: What is the minimum distance a recipient's hometown must be from Concordia University of Edmonton to be
    eligible for the Alberta Blue Cross Away from Home Scholarship?
  sentences:
  - Three awards are available
  - The recipient’s hometown must be at least 100 kilometres from Concordia University of Edmonton.
  - 'Application Deadline: September 1'
- source_sentence: According to the selection criteria, what level of subjects are used to determine the academic standing
    of a potential Alberta Blue Cross Away from Home Scholarship recipient?
  sentences:
  - Selection is ba sed on the academic standing of 30 -level subjects used for admission.
  - 'These eligible and ineligible lists are not exhaustive. Doubts about the eligibility of expenses should be directed to
    the ORI’s Research Administration Service s (RAS): ras@concordia.ab.ca .'
  - '*Value: $11000 Master’s; $14,000 Doctoral'
- source_sentence: According to the text, how many days does a grant recipient have to submit a final report after the grant
    ends?
  sentences:
  - All Fall grant recipients are expected to submit an abstract to present an oral and/or poster presentation of their work,
    either in its progression or final stage.
  - a business program offered by an Alberta college, polytechnic, or university that offers the prerequisite courses required
    for entrance into the CPA Professional Education Program (CPA PEP).
  - The applicant is required to complete and submit a final report within 5 days of the end of the grant.
- source_sentence: In what format should applicants acknowledge the funding provided by Concordia University of Edmonton for
    their Student Project Grant?
  sentences:
  - All oral or poster presentations, publications, including public messages, arising from research supported by CUE grants
    must acknowledge the support of the institution. Acknowledgement can be in the written format, such as " This research
    is funded by the generous support of Concordia University of Edmonton through their CUE Student Research Project Grants
    program ", or similar phrasing.
  - This $1,000 scholarship is awarded to post -secondary students who have completed at least one year towards their Bachelor
    of Science with a focus on Computer Science, achieved an average GPA of 3.5 or higher, and are still enrolled in post
    -secondary studie s.
  - The recipient will be selected based on the highest grade in MARK320. In the event of a tie, preference will be given
    to the student with the highest cumulative GPA.
