widgetData:
- source_sentence: What are the main components of technology and infrastructure costs?
  sentences:
  - As of January 29, 2023, from the total aggregate lease obligations of $14.7 billion, $1.5 billion was payable within 12
    months.
  - Technology and infrastructure costs include payroll and related expenses for employees involved in the research and development
    of new and existing products and services, development, design, and maintenance of our stores, curation and display of
    products and services made available in our online stores, and infrastructure costs.
  - '''Note 13 — Commitments and Contingencies — Litigation and Other Legal Matters'' is stated to be part of Part IV, Item
    15 of the consolidated financial statements within an Annual Report on Form 10-K.'
- source_sentence: How is Meta's workforce comprised in terms of diversity as of December 31, 2022?
  sentences:
  - As of December 31, 2022, our global employee base was composed of 45.4% underrepresented people, with 47.9% underrepresented
    people in the U.S., and 43.1% of our leaders in the U.S. being people of color.
  - IBM's 2023 Annual Report to Stockholders includes the Financial Statements and Supplementary Data on pages 44 through
    121.
  - Factors affecting the overall effective tax rate include acquisitions, changes in corporate structures, location of business
    functions, the mix and amount of income, agreements with tax authorities, and variations in estimated and actual pre-tax
    income.
- source_sentence: What was the valuation allowance against deferred tax assets at the end of 2023, and what changes may affect
    its realization?
  sentences:
  - At December 31, 2020, valuation allowances against deducted assets were $7.0 billion. The ability to realize deductible
    benefits in future is contingent on producing any estimated sufficient values in cash-generating, with effects are modifications
    in trade situations, political of force, or those actions meaningfully impacting on the values.
  - Amazon considers its intellectual property essential for its success, utilizing trademark, copyright, and patent law,
    trade-secret protection, and confidentiality and/or license agreements to protect these rights.
  - 'During 2023, AMC served as the theatrical distributor for two theatrical releases: TAYLOR SWIFT | THE ERAS TOUR and RENAISSANCE:
    A FILM BY BEYONCÉ.'
- source_sentence: What significant services are included in Iron Mountain's service revenues?
  sentences:
  - The decrease in net income in 2022 was primarily due to an increase in selling, general and administrative expenses of
    $532.4 million, an impairment charge recognized in 2022 of $407.9 million, an increase in income tax expense of $119.2
    million, partially offset by an increase in gross profit of $883.8 million, a decrease in acquisition-related expenses
    of $41.4 million, a gain on disposal of assets of $10.2 million, and an increase in other income (expense), net of $3.6
    million.
  - Service revenues include charges for the handling of records, destruction services, digital solutions, and data center
    services.
  - The total operating expenses for Chipotle Mexican Grill in 2023 amounted to $8,313,836.
- source_sentence: In which part and item of the Annual Report on Form 10-K can the consolidated financial statements be found?
  sentences:
  - In order to maintain leadership, we optimize our portfolio with organic and inorganic innovations and effective resource
    allocation. These investments not only drive current performance but will extend our innovation leadership into the future.
  - Our Consumer Wireline business unit offers AT&T Internet Air, which is a fixed wireless access product that provides home
    internet services delivered over our 5G wireless network where available.
  - The consolidated financial statements and accompanying notes listed in Part IV, Item 15(a)(1) of this Annual Report on
    Form 10-K are included elsewhere in this Annual Report on For... 10-K.
