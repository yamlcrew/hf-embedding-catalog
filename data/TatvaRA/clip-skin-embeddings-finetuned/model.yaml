widgetData:
- source_sentence: The image depicts multiple small, soft, flesh-colored to slightly hyperpigmented skin lesions located on
    the eyelid and surrounding skin. These lesions are pedunculated with a smooth surface, typical of skin tags (acrochordons).
    Some are more prominent and raised, while others are flatter against the skin surface. The surrounding skin appears slightly
    wrinkled, consistent with normal aging changes.
  sentences:
  - The image shows a reticulated, net-like pattern of erythema and hyperpigmentation on the lower back. The lesions appear
    to be brownish-red in color with defined, irregular borders. There is no evidence of blistering or active inflammation.
    The distribution is linear and symmetric, suggesting exposure to a patterned heat source.
  - The image shows a right lower leg with marked erythema covering most of the calf and extending around the ankle. The redness
    has an ill-defined border and there is noticeable swelling. The skin appears smooth and shiny, suggesting edema. There
    is no evidence of open wounds or pus. The distribution of redness and swelling is primarily around the shin and calf areas.
  - The image displays toenails with signs of fungal infection. The nails appear thickened and discolored, predominantly yellowish-brown.
    There is noticeable onycholysis, especially in the larger toenail, with crumbling and irregular borders. The surface of
    the nails looks rough and uneven, and there is subungual debris. The surrounding skin appears intact without visible erythema
    or scaling.
- source_sentence: The image shows a circular, red lesion on the skin, located on the cheek. It features a central elevated
    red spot with radiating capillaries, resembling a spider's web. The surrounding skin appears slightly erythematous. The
    lesion has well-defined borders and is isolated with no other lesions visible in the immediate vicinity.
  sentences:
  - The image shows the lower leg and ankle area with diffuse erythema, swelling, and warmth. The skin appears red, indicating
    inflammation, and there is a shiny quality suggesting edema. The borders of the affected area are poorly defined, blending
    into the surrounding skin. No visible pus or open wounds are present. The distribution is localized to the leg, suggesting
    a likely case of cellulitis.
  - The image shows multiple skin-colored to slightly hyperpigmented, soft, pedunculated papules consistent with skin tags.
    These lesions are located on the skin, likely in a non-exposed area of the body. They appear to have smooth surfaces,
    with some variation in size ranging from a few millimeters to larger. The surrounding skin is unremarkable, showing no
    signs of erythema or scaling. There are also some fine hairs visible, and no signs of irritation or secondary changes
    are noted around the lesions.
  - The image shows an area of skin with multiple erythematous, excoriated papules and plaques, some of which are coalescing.
    The lesions are distributed on the flexural aspect of the extremity. The skin appears dry and lichenified with some areas
    showing slight scaling. Borders of the individual lesions are irregular, and there is no clear demarcation from the surrounding
    skin.
- source_sentence: The image shows an ulcerative lesion on the inner mucosal surface of the lower lip. The ulcer is round,
    shallow, and well-demarcated with a white to yellowish base and an erythematous halo. The surrounding mucosa appears slightly
    swollen. The lesion is singular, with no apparent vesicles or additional ulcers visible in this image.
  sentences:
  - The image shows the dorsal aspect of a hand with multiple erythematous, scaly patches and plaques. These lesions are well-demarcated
    with lichenification indicating chronicity. The plaques exhibit excoriations, suggesting pruritus. The skin appears dry
    and rough, primarily affecting the knuckles and the back of the hand.
  - The image shows erythematous patches and papules located on the cheek near the mouth. The lesions exhibit poorly defined
    borders and are accompanied by visible dryness and mild scaling. The skin appears slightly thickened and there is evidence
    of mild lichenification, suggesting chronicity. The overall distribution is localized on the face with no visible excoriations
    or crusting.
  - The image shows erythematous, scaly patches located in the beard area of the face. The lesions exhibit a well-demarcated
    border and slight follicular involvement, with perifollicular pustules and mild scaling. The affected area demonstrates
    inflamed patches with some papules and an uneven surface texture, indicating a possible fungal infection.
- source_sentence: The image shows a dermatofibroma located on the skin. It presents as a solitary, elevated, firm nodule
    with a well-defined border. The lesion is reddish-brown in color with a central lighter area. There are several hairs
    emerging from the surface, indicating it is on a hair-bearing area of the skin. The surface texture appears smooth with
    no visible scaling or ulceration.
  sentences:
  - Clusters of small, grouped vesicles on an erythematous base are present on the upper lip. The vesicles are translucent
    with clear fluid and some central umbilication. The surrounding skin shows mild erythema. There are no crusts or secondary
    changes visible.
  - The image shows a single, flesh-colored papule that is soft to the touch. It has a pedunculated shape, protruding from
    the surface of the skin. The lesion is located on an area of skin with normal texture and pigmentation. The borders are
    well-defined and the surface appears smooth without any signs of inflammation or scaling.
  - The image shows an irregular, serpiginous, erythematous track on the skin, indicative of a cutaneous larva migrans infection.
    The lesion appears slightly raised and is located on the forearm. The borders of the track are well-defined but uneven
    due to its winding nature. There are areas with mild inflammation along the path and no visible signs of secondary infection
    such as pustules or crusting.
- source_sentence: The image depicts the abdominal region with a reticulated, or net-like, erythematous pattern on the skin.
    The area shows a faint, reddish-brown discoloration with a lacy appearance, indicative of erythema ab igne. The borders
    of the discoloration are irregular but well-demarcated. No blistering or open lesions are visible, and the skin surface
    appears intact without signs of scaling or crusting.
  sentences:
  - The image shows an elderly person with erythematous patches and papules prominently located on the central face, including
    the cheeks, nose, and forehead. The skin findings display a symmetrical distribution. The nose is slightly bulbous, suggesting
    possible rhinophyma changes. The lesions do not have well-defined borders and there is no visible scaling or pustular
    formations. The background skin appears sun-damaged with fine wrinkling, but without significant telangiectasia visible
    in this image.
  - The image shows a round, red, and scaly patch on the skin. The lesion has a well-defined, elevated border with a clear
    center, creating a ring-like appearance. The border is erythematous and slightly raised, while the center appears less
    inflamed and more skin-colored. The surface of the lesion is rough, indicating scaling. No secondary changes like crusting
    or blistering are visible.
  - The image depicts multiple small, soft, flesh-colored to slightly hyperpigmented skin lesions located on the eyelid and
    surrounding skin. These lesions are pedunculated with a smooth surface, typical of skin tags (acrochordons). Some are
    more prominent and raised, while others are flatter against the skin surface. The surrounding skin appears slightly wrinkled,
    consistent with normal aging changes.
