widgetData:
- source_sentence: Bağımsız akıllı cihaz kampanyalarının detayları nelerdir?
  sentences:
  - Vodafone'un kampanyalarına katılan aboneler, seçtikleri tarifeye göre belirli indirimlerden yararlanabilirler. Örneğin,
    Cep Avantaj tarifeleri üzerinden 10 TL ile 20 TL arasında indirim sağlanmaktadır.
  - Kampanyalar, farklı cihaz modelleri için aylık ödeme planları sunmaktadır.
  - Vodafone'un kampanyaları, sadece internet paketleri ile ilgilidir.
- source_sentence: İnternet hattımı nasıl iptal ettirebilirim?
  sentences:
  - Vodafone'da, müşterinin taşımak istediği numara yerine yanlışlıkla başka bir numaranın taşındığı durumlar, hatalı taşıma
    sürecini kapsamaktadır.
  - İnternet hattınızı iptal etmek için sadece online form doldurmanız yeterlidir.
  - İptal işlemi için müşteri hizmetlerini arayarak talepte bulunmanız ve iptal dilekçesini göndermeniz gerekmektedir.
- source_sentence: Vodafone kampanyalarında veri kullanımı ve cezai şartlar
  sentences:
  - Yurtdışında geçerli olan tarifeler, yalnızca kurumsal müşterilere yöneliktir.
  - Vodafone kampanyaları, kullanıcıların istedikleri kadar veri kullanmalarına izin verir ve cezai şartlar uygulanmaz.
  - Vodafone'un kampanyalarında, kullanıcıların veri paketleri kullanımı belirli limitler dahilinde gerçekleşir ve kampanyadan
    yararlanma koşulları vardır.
- source_sentence: Alcatel One Touch POP 7 Tablet'in işletim sistemi nedir?
  sentences:
  - Yabancılar için sunulan Limitsiz Fiber Kampanyası, belirli hızlarda internet paketleri sunmaktadır ve katılım için yabancı
    uyruklu olma şartı aranmaktadır.
  - Alcatel One Touch POP 7 Tablet, iOS işletim sistemi ile çalışan bir cihazdır.
  - Alcatel One Touch POP 7 Tablet, Android 4.2 işletim sistemi ile çalışmaktadır.
- source_sentence: Vodafone Net'in internet hız garantisi var mı?
  sentences:
  - Ek data paketlerinin geçerlilik süreleri genellikle 30 gün olarak belirlenmiştir, ancak bazı paketler 7 gün geçerlilik
    süresine sahiptir.
  - Vodafone Net, tüm abonelerine en az 100 Mbps hız garantisi vermektedir.
  - Vodafone Net, internet hızını garanti etmemekte, bu hız abonenin hattının uygunluğuna ve santrale olan mesafeye bağlı
    olarak değişiklik göstermektedir.
