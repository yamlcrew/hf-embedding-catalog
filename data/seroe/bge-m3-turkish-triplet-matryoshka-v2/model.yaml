widgetData:
- source_sentence: Ortak Havuz Tarifesi kapsamında her bir hat için aylık sabit ücret 25,5 TL olarak belirlenmiştir ve bu
    ücret KDV ile ÖİV dahil olarak hesaplanmıştır.
  sentences:
  - Vodafone'un Ortak Havuz Tarifesi, müşterilere ücretsiz olarak sunulmaktadır ve herhangi bir sabit ücret talep edilmemektedir.
  - Her bir hat için Ortak Havuz Tarifesi'nin aylık sabit ücreti, vergiler dahil 25,5 TL'dir.
  - Geleceğin Karakartalı, Vodafone ve Beşiktaş JK'nin ortak çalışmasıyla genç futbol yeteneklerini Türkiye çapında keşfetmeyi
    hedefleyen bir projedir.
- source_sentence: Taşınma durumunda, teknik altyapı eksikliği nedeniyle Vodafone Evde Fiber İnternet hizmeti sağlanamazsa,
    cezai işlem uygulanmaz ve alternatif hizmetlere geçiş yapılabilir.
  sentences:
  - Vodafone faturasız tarifelerinde, yenileme gününde yeterli bakiye bulunmuyorsa içerikler yenilenmez, ancak daha önce yüklenen
    içerikler bakiye olmadan kullanılabilir.
  - Vodafone Evde Fiber İnternet hizmeti taşınma sırasında altyapı eksikliği nedeniyle sağlanamazsa, aboneye ceza uygulanır
    ve alternatif hizmet sunulmaz.
  - Vodafone Evde Fiber İnternet hizmeti taşınma sırasında altyapı eksikliği nedeniyle sağlanamazsa, aboneye cezai işlem uygulanmaz
    ve ADSL veya Fiber Hız hizmetine geçiş yapılabilir.
- source_sentence: Tarife kapsamında sunulan dakika, SMS ve internet hakları, belirli bir limitin aşılması durumunda ek paketlerle
    ücretlendirilir.
  sentences:
  - Vodafone'un tarifelerinde aşım durumunda ek paketler yerine ücretsiz kullanım hakkı sunulmaktadır.
  - Vodafone'un geçmiş kampanyalarında, Samsung Note 3 Neo en pahalı cihazlardan biri olarak müşterilere sunulmuştur.
  - Uyumlu 5 Tarifesi'nde verilen dakika, SMS ve internet hakları bittiğinde, ek paketler devreye girerek avantajlı fiyatlarla
    ücretlendirme yapılır.
- source_sentence: Mobil numara taşınabilirliği olan ülkelerdeki Vodafone operatörlerine yapılan aramalarda, diğer mobil operatörlerin
    prefikslerini içeren numaralar indirimli tarifeden yararlanamaz.
  sentences:
  - Vodafone operatörlerine yapılan aramalarda, mobil numara taşınabilirliği olan ülkelerdeki diğer operatörlerin prefikslerini
    içeren numaralar indirimli fiyatlara dahil edilmez.
  - Vodafone'un tarifelerinde ücretsiz pass paketi yer almazken, Her Şey Dahil Pasaport paketi ücretli olarak sunulmaktadır.
  - Dünya Küçük Kurumsal tarifesi, yurtdışı aramalar için tüm numaralara eşit fiyatlandırma sunar ve prefiks kısıtlaması içermez.
- source_sentence: Vodafone hattınızın aktivasyonu sırasında eksik evraklarınızın tamamlanması gerektiği belirtilmiştir. Hattınızın
    iptal olmaması için 3 gün içinde Vodafone mağazasını ziyaret etmeniz önemlidir.
  sentences:
  - Vodafone, boşanmış annelerin çocuklarına gençlik tarifesi tanımlaması için kimlik doğrulama ve kullanıcı tanımlama süreçlerini
    Cep Merkezlerinde gerçekleştirmektedir.
  - Vodafone hattınızın aktivasyonu sırasında herhangi bir evrak eksikliği bulunmamaktadır. Hattınız otomatik olarak aktif
    hale gelecektir.
  - Vodafone hattınızın aktif hale gelebilmesi için eksik olan abonelik sözleşmesi ve kimlik belgelerinizi tamamlamanız gerekmektedir.
    Bu işlemi 3 gün içinde Vodafone mağazasında gerçekleştirebilirsiniz.
