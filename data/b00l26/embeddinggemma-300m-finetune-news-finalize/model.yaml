widgetData:
- source_sentence: Phản_ứng báo Đông_Nam_Á U22 Việt_Nam đánh_bại Malaysia . ( Dân_trí ) - Nhiều tờ báo Đông_Nam_Á lên_tiếng
    bình_luận chiến_thắng U22 Việt_Nam U22 Malaysia SEA_Games 33 tối 11/12 .
  sentences:
  - Ông Trump siết xuất_khẩu sản_phẩm phần_mềm Mỹ Trung_Quốc . Chính_quyền Trump xem_xét hạn_chế xuất_khẩu sản_phẩm phần_mềm
    Mỹ Trung_Quốc , Reuters .
  - Những trẻ ' chạy deadline người_yêu ' . Thay_vì nến hoa cà_phê lãng_mạn , trẻ hẹn làm_việc kết_hợp đối_phương .
  - 'HLV Kim_Sang_Sik :  U 22 Việt_Nam sẵn_sàng đối_đầu Philippines bán_kết  . ( Dân_trí ) - U22 Việt_Nam dễ_dàng thắng U22
    Malaysia 2-0 tiến bán_kết SEA_Games 33 Philippines . Trả_lời câu Dân_trí , HLV Kim_Sang_Sik nhận_xét đối_thủ Philippines
    .'
- source_sentence: Điều xảy Mặt_Trăng tách Trái_Đất ? . ( Dân_trí ) - Mỗi , Mặt_Trăng dần Trái_Đất 3,8 cm . Vậy xảy Mặt_Trăng
    tách Trái_Đất ?
  sentences:
  - Kính_viễn_vọng James_Webb ghi cảnh va_chạm thiên_hà dữ_dội . ( Dân_trí ) - Hình_ảnh chụp Kính_viễn_vọng Không_gian James_Webb
    , thiên_văn_học kinh_ngạc mà_còn trực_quan , sống_động  vẻ đẹp dữ_dội  vũ_trụ .
  - Ung_thư vú nỗi ám_ảnh phụ_nữ , 24.000 ca mắc . ( Dân_trí ) - Trước gánh ung_thư vú nỗi lo phục_hồi hình_thể điều_trị ,
    chương_trình tổ_chức Bệnh_viện Bạch_Mai hy_vọng phụ_nữ .
  - 9 đồ gia_dụng vệ_sinh máy_rửa_bát . Nhiều mặc_định máy_rửa_bát vệ_sinh đồ nấu_bếp , .
- source_sentence: Phép màu tình_yêu đài phun Trevi nổi_tiếng Rome . ItalySau tung đồng xu đài phun Trevi Rome , nữ du_khách
    đàn_ông chồng .
  sentences:
  - Vì pin chảy , chất độc ? . ( Dân_trí ) - Các pin tiểu , pin đũa pin cúc áo chảy . Vậy nguy_hiểm con_người tiếp_xúc ?
  - Người chuyên giá 1 euro du_khách Italy . Hai anh_em Sicily giúp hồi_sinh quê_hương giúp du_khách khắp thế_giới đổ mua
    euro .
  - Ngôi_sao bóng_bàn Trung_Quốc đập đầu bàn thua . Trung_QuốcNgôi bóng_bàn Trung_Quốc , Wang_Chuqin hai liên_tiếp thua đàn_anh
    Fan_Zhendong , Đại_hội thể_thao Trung_Quốc .
- source_sentence: Hồi_ức Quảng_Trị lính hai chiến_tuyến .  Hồi_ức Quảng_Trị  tác_giả Nguyễn_Thuỵ_Kha gợi ký_ức sống chiến_đấu
    81 ngày_đêm chiến_sĩ giải_phóng_quân lính Việt_Nam Cộng_hoà .
  sentences:
  - ''' Đò Thạch_Hãn chèo nhẹ '' - nỗi_niềm lính hậu_chiến . Câu_thơ '' '' Lời sông '' '' tình_cảm nhà_thơ Lê_Bá_Dương đồng_đội
    nằm dòng Thạch_Hãn năm_xưa .'
  - Sẽ thành_lập Liên_minh ảnh_hưởng Việt_Nam . ( Dân_trí ) - Trong bối_cảnh chuyển_đổi mạnh_mẽ , ảnh_hưởng ( KOL / KOC )
    lực_lượng truyền_thông mạnh_mẽ , định_hình xu_hướng tiêu_dùng , lối sống quan_điểm xã_hội .
  - 'Thủ_khoa kép Trường ĐH Y_dược : Chọn ngành ung_thư giải bài_toán . ( Dân_trí ) - Phùng_Thế_Thông , 3 học_viên khoá chương_trình
    bác_sĩ nội_trú , Trường ĐH Y_dược ( ĐH Quốc_gia Hà_Nội ) , vinh_danh giỏi điểm_số 3,77 .'
- source_sentence: Mỹ điều_tra tuân_thủ thoả_thuận thương_mại Trung_Quốc . Văn_phòng Đại_diện Thương_mại Mỹ ( USTR ) điều_tra
    tuân_thủ thoả_thuận thương_mại Trung_Quốc ký_kết 2020 .
  sentences:
  - Trung_Quốc đồng_ý đàm_phán thương_mại ' ' Mỹ . Trung_Quốc đồng_ý tiến_hành vòng đàm_phán thương_mại Mỹ   .
  - Bất_động_sản Nam trở_lại đường_đua sáp_nhập địa_giới hành_chính . ( Dân_trí ) - Trong cung lõi TPHCM khan_hiếm khu_vực
    lân_cận Bình_Dương , Long_An Đồng_Nai ( cũ ) dồi_dào , đa_dạng phân khúc .
  - Thời_điểm đẹp Hà_Giang ngắm tam_giác mạch ? . Du_khách Hà_Nội ngắm hoa tam_giác mạch Hà_Giang , tư_vấn hoa nở_rộ , rực_rỡ
    .
