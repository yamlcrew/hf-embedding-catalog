widgetData:
- source_sentence: 'Employee health, safety and wellness are top priorities at Hasbro. We support our colleagues’ well-being,
    which includes mental, physical and financial wellness, through a number of programs, including: robust employee assistance
    programs, childcare solutions, and a commitment to flexible work arrangements.'
  sentences:
  - What percentage of the total annual net trade sales did the sales returns reserve represent for the company during each
    of the fiscal years 2023, 2022, and 2021?
  - How does Hasbro support the wellness of its employees?
  - What was the conclusion of the Company's review regarding the impact of the American Rescue Plan, the Consolidated Appropriations
    Act, 2021, and related tax provisions on its business for the fiscal year ended June 30, 2023?
- source_sentence: The Company has a minority market share in the global smartphone, personal computer and tablet markets.
    The Company faces substantial competition in these markets from companies that have significant technical, marketing,
    distribution and other resources, as well as established hardware, software and digital content supplier relationships.
    In addition, some of the Company’s competitors have broader product lines, lower-priced products and a larger installed
    base of active devices. Competition has been particularly intense as competitors have aggressively cut prices and lowered
    product margins.
  sentences:
  - When did The Hershey Company declare the dividend that was paid on March 15, 2023?
  - What factors contribute to the Company facing substantial competition in the markets for smartphones, personal computers,
    and tablets?
  - How is goodwill impairment analyzed?
- source_sentence: During fiscal 2022, there were cash payments of $6.7 billion for repurchases of common stock through open
    market purchases.
  sentences:
  - What was the value of cash payments for common stock repurchases through open market purchases during fiscal 2022?
  - How much did the Compute & Networking segment's gross margin decrease in fiscal year 2023?
  - What different methods does Amazon use to engage and retain employees?
- source_sentence: Walmart Luminate provides a suite of data products for merchants and suppliers.
  sentences:
  - What pages do the Consolidated Financial Statements and their accompanying Notes and reports appear on in the document?
  - What was the percentage change in NYSE total cash handled volume from 2022 to 2023?
  - What is the function of Walmart Luminate?
- source_sentence: Item 8. Financial Statements and Supplementary Data. The Consolidated Financial Statements, together with
    the Notes thereto and the report thereon dated February 16, 2024, of PricewaterhouseCoopers LLP, the Firm’s independent
    registered public accounting firm (PCAOB ID 238).
  sentences:
  - What type of data does Item 8 in a financial document contain?
  - How did the assumptions and estimates used for assessing the fair value of reporting units potentially impact the company's
    financial statements?
  - What factors are considered when making estimates for financial statements?
