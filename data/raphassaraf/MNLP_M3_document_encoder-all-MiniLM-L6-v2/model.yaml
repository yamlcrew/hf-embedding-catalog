    sentences:
    - "Question: I have around ~3,000 short sequences of approximately ~10Kb long. What are the best ways to find the motifs\
      \ among all of these sequences? Is there a certain software/method recommended?\nThere are several ways to do this.\
      \ My goal would be to:\n(1) Check for motifs repeated within individual sequences\n(2) Check for motifs shared among\
      \ all sequences\n(3) Check for the presence of \"expected\" or known motifs\nWith respect to #3, I'm also curious if\
      \ I find e.g. trinucleotide sequences, how does one check the context around these regions?\nThank you for the recommendations/help!\n\
      \nAnswer: For (3), this page has a lot of links to pattern/motif finding tools. Following through the YMF link on that\
      \ page, I came across the University of Washington Motif Discovery section. Of these projection seemed to be the only\
      \ downloadable tool. I find it interesting how old all these tools are; maybe the introduction of microarrays and NGS\
      \ has made them all redundant.\nYour sub-problem (2) seems similar to the problem I'm having with Nippostrongylus brasiliensis\
      \ genome sequences, where I'd like to find regions of very high homology (length 500bp to 20kb or more, 95-99% similar)\
      \ that are repeated throughout the genome. These sequences are killing the assembly.\nThe main way I can find these\
      \ regions is by looking at a coverage plot of long nanopore reads mapped to the assembled genome (using GraphMap or\
      \ BWA). Any regions with substantially higher than median coverage are likely to be shared repeats.\nI've played around\
      \ in the past with chopping up the reads to smaller sizes, which works better for hitting smaller repeated regions that\
      \ are such a small proportion of most reads that they are never mapped to all the repeated locations. I wrote my own\
      \ script a while back to chop up reads (for a different purpose), which produces a FASTA/FASTQ file where all reads\
      \ are exactly the same length. For some unknown reason I took the time to document that script \"properly\" using POD,\
      \ so here's a short summary:\n\nConverts all sequences in the input FASTA file to the same length.\n     Sequences shorter\
      \ than the target length are dropped, and sequences longer\n     than the target length are split into overlapping subsequences\
      \ covering\n     the entire range. This prepares the sequences for use in an\n     overlap-consensus assembler requiring\
      \ constant-length sequences (such as\n     edena).\n\nAnd here's the syntax:\n$ ./normalise_seqlengths.pl -h\nUsage:\n\
      \    ./normalise_seqlengths.pl <reads.fa> [options]\n\n  Options:\n    -help\n      Only display this help message\n\
      \n    -fraglength\n      Target fragment length (in base-pairs, default 2000)\n\n    -overlap\n      Minimum overlap\
      \ length (in base-pairs, default 200)\n\n    -short\n      Keep short sequences (shorter than fraglength)"
    - 'Question: Without going into too much background, I just joined up with a lab as a bioinformatics intern while I''m
      completing my masters degree in the field. The lab has data from an RNA-seq they outsourced, but the only problem is
      that the only data they have is preprocessed from the company that did the sequencing: filtering the reads, aligning
      them, and putting the aligned reads through RSEM. I currently have output from RSEM for each of the four samples consisting
      of: gene id, transcript id(s), length, expected count, and FPKM. I am attempting to get the FASTQ files from the sequencing,
      but for now, this is what I have, and I''m trying to get something out of it if possible.

      I found this article that talks about how expected read counts can be better than raw read counts when analyzing differential
      expression using EBSeq; it''s just one guy''s opinion, and it''s from 2014, so it may be wrong or outdated, but I thought
      I''d give it a try since I have the expected counts.

      However, I have just a couple of questions about running EBSeq that I can''t find the answers to:

      1: In the output RSEM files I have, not all genes are represented in each, about 80% of them are, but for the ones that
      aren''t, should I remove them before analysis with EBSeq? It runs when I do, but I''m not sure if it is correct.

      2: How do I know which normalization factor to use when running EBSeq? This is more of a conceptual question rather
      than a technical question.

      Thanks!


      Answer: Yes, that blog post does represent just one guy''s opinion (hi!) and it does date all the way back to 2014,
      which is, like, decades in genomics years. :-) By the way, there is quite a bit of literature discussing the improvements
      that expected read counts derived from an Expectation Maximization algorithm provide over raw read counts. I''d suggest
      reading the RSEM papers for a start[1][2].

      But your main question is about the mechanics of running RSEM and EBSeq. First, RSEM was written explicitly to be compatible
      with EBSeq, so I''d be very surprised if it does not work correctly out-of-the-box. Second, EBSeq''s MedianNorm function
      worked very well in my experience for normalizing the library counts. Along those lines, the blog you mentioned above
      has another post that you may find useful.

      But all joking aside, these tools are indeed dated. Alignment-free RNA-Seq tools provide orders-of-magnitude improvements
      in runtime over the older alignment-based alternatives, with comparable accuracy. Sailfish was the first in a growing
      list of tools that now includes Salmon and Kallisto. When starting a new analysis from scratch (i.e. if you ever get
      the original FASTQ files), there''s really no good reason not to estimate expression using these much faster tools,
      followed by a differential expression analysis with DESeq2, edgeR, or sleuth.


      1Li B, Ruotti V, Stewart RM, Thomson JA, Dewey CN (2010) RNA-Seq gene expression estimation with read mapping uncertainty.
      Bioinformatics, 26(4):493–500, doi:10.1093/bioinformatics/btp692.

      2Li B, Dewey C (2011) RSEM: accurate transcript quantification from RNA-Seq data with or without a reference genome.
      BMC Bioinformatics, 12:323, doi:10.1186/1471-2105-12-323.'
    - 'Question: I am trying to use samtools depth (v1.4) with the -a option and a bed file listing the human chromosomes
      chr1-chr22, chrX, chrY, and chrM to print out the coverage at every position:

      cat GRCh38.karyo.bed | awk ''{print $3}'' | datamash sum 1

      3088286401


      I would like to know how to run samtools depth so that it produces 3,088,286,401 entries when run against a GRCh38 bam
      file:

      samtools depth -b $bedfile -a $inputfile


      I tried it for a few bam files that were aligned the same way, and I get differing number of entries:

      3087003274

      3087005666

      3087007158

      3087009435

      3087009439

      3087009621

      3087009818

      3087010065

      3087010408

      3087010477

      3087010481

      3087012115

      3087013147

      3087013186

      3087013500

      3087149616


      Is there a special flag in samtools depth so that it reports all entries from the bed file?

      If samtools depth is not the best tool for this, what would be the equivalent with sambamba depth base?

      sambamba depth base --min-coverage=0 --regions $bedfile $inputfile


      Any other options?


      Answer: You might try using bedtools genomecov instead. If you provide the -d option, it reports the coverage at every
      position in the BAM file.

      bedtools genomecov -d -ibam $inputfile > "${inputfile}.genomecov"


      You can also provide a BED file if you just want to calculate in the target  region.'
