widgetData:
- source_sentence: We enter into forward currency contracts in order to hedge a portion of the foreign currency exposure associated
    with the translation of our net investment in our Canadian subsidiary.
  sentences:
  - How much did Delta Air Lines spend on debt and finance lease obligations in 2023?
  - What mechanisms does the company use to hedge foreign currency exposure for its Canadian subsidiary?
  - How did operating overhead expenses change for NIKE from fiscal 2022 to fiscal 2023?
- source_sentence: We calculate return on invested hat capital (ROIC) by dividing adjusted ROIC operating profit for the prior
    four quarters by the average invested capital.
  sentences:
  - What was the fair value of U.S. government and agency securities as of June 30, 2022?
  - How is the Return on Invested Capital (ROIC) calculated?
  - What business outcomes is HPE focused on accelerating with its technological solutions?
- source_sentence: Expenses from our comparable owned and leased hotels increased $137 million, on a currency neutral basis,
    as a result of increased occupancy and cost inflation both driving higher labor costs, utilities and other operating expenses,
    as well as an increase in rent expense.
  sentences:
  - How did the expenses from comparable owned and leased hotels change and what were the contributing factors?
  - What do environmental laws require from suppliers in terms of operations?
  - What energy management technologies does the Enphase bidirectional EV charger integrate with?
- source_sentence: The Advancing Agility & Automation Initiative at The Hershey Company is projected to result in total pre-tax
    costs of $200,000 to $250,000 from inception through 2026. This includes costs for program office execution and third-party
    costs supporting the design and implementation of the new organizational structure, as well as implementation and technology
    capability costs and employee severance and related separation benefits.
  sentences:
  - What was the total amortization expense for The Hershey Company in 2021?
  - How much did net cash used in financing activities decrease in fiscal 2023 compared to the previous fiscal year?
  - What is the total projected pre-tax cost of The Hershey Company's Advancing Agility & Automation Initiative through 2026?
- source_sentence: Structural costs typically do not have a directly proportionate relationship to production volume and include
    costs such as manufacturing, engineering, and administrative expenses. These costs can be adjusted over time in response
    to external factors.
  sentences:
  - How does Ford Motor Company handle its structural costs in relation to production volume changes?
  - What were the total future minimum lease payments under all non-cancelable operating leases for the company as of December
    31, 2023?
  - What guidelines does the FASB provide for the measurement of fair value when quoted prices are not available?
