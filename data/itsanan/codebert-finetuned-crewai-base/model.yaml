    - "def test_task_interpolation_with_hyphens():\n    agent = Agent(\n        role=\"Researcher\",\n        goal=\"be an\
      \ assistant that responds with {interpolation-with-hyphens}\",\n        backstory=\"You're an expert researcher, specialized\
      \ in technology, software engineering, AI and startups. You work as a freelancer and is now working on doing research\
      \ and analysis for a new customer.\",\n        allow_delegation=False,\n    )\n    task = Task(\n        description=\"\
      be an assistant that responds with {interpolation-with-hyphens}\",\n        expected_output=\"The response should be\
      \ addressing: {interpolation-with-hyphens}\",\n        agent=agent,\n    )\n    crew = Crew(\n        agents=[agent],\n\
      \        tasks=[task],\n        verbose=True,\n    )\n    result = crew.kickoff(inputs={\"interpolation-with-hyphens\"\
      : \"say hello world\"})\n    assert \"say hello world\" in task.prompt()\n\n    assert result.raw == \"Hello, World!\""
