- source_sentence: 'query: Рассмотрим реализацию lock-free стека с reclamation через hazard pointer на примере метода pop.
    Сначала поток получает hazard pointer, который является атомарным указателем, защищающим текущий узел от преждевременного
    удаления. Затем цикл пытается загрузить текущее значение head в old_head и сохранить его как потенциально опасный для
    удаления. Далее выполняется сравнение и замена head с помощью compare_exchange_weak — если head не изменился с момента
    загрузки, операция успешна, и поток может безопасно использовать данные узла. Если операция не удалась, цикл повторяется,
    пока не будет извлечён узел или стек не станет пустым.'
