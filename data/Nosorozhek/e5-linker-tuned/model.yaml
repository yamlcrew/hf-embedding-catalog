    \ {\n for (auto &p: hazard_pointers) {\n std::thread::id old_id;\n if (p.id.compare_exchange_strong(old_id, std::this_thread::get_id()))\
    \ {\n hp = &p;\n break;\n }\n }\n if (!hp)\n throw std::runtime_error(\"No hazard pointers available\");\n }\n};"
