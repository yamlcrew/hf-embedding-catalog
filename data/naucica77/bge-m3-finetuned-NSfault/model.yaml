- source_sentence: What are some possible causes for a DIAMETER PROTOCOL FAULT with fault code 7300 in a network system?
  sentences:
  - "부록 D 폴트 코드별  장애처리  \n \n7300 DIAMETER PROTOCOL FAULT  \n \n번호 7300 DESCRIPTION  DIAMETER PROTOCOL FAULT  \n   \n메시지 \
    \ 내역   F7300 DIAMETER PROTOCOL FAULT  \n LOC = aaaa   \n INF = bbbb   \n REASON = cccc   \n ;   \n \n[설명] \naaaa:  폴트가\
    \  발생한  노드의  위치 정보 \nbbbb:  폴트가  발생한  상세 정보 \ncccc:  폴트가  발생한  사유 \n [예]  \n F7300 DIAMETER PROTOCOL FAULT  \n  LOC =\
    \ VOCA0  \n  INF = ACA  \n  REASON = RATING_FAILED(5031) FROM CCF ID:1(20.10.206.12)  \n ;   \n   \n원인 1 정보가  요청된  가입자\
    \  정보가  상대 Diameter NE  에 설정되어  있지 않은 경우 \n 2 CSCF 의 정보가  상대 Diameter NE 에 설정되어  있지 않은 경우 \n 3 상대 Diameter NE  가 기능상 \
    \ 오류가  있거나  overload  된 경우 \n 4 CSCF 와 상대 Diameter NE 간의 network connection 이 비정상인  경우 \n  \nSystem  연관되는  Diameter NE\
    \  의 역할에  따라 registration/session setup/charging  등이 실패할  수 \nImpact  있다.  \n  \n조치방법  1 상대 Diameter Peer  에 가입자  정보 설정이\
    \  정상인지  상대 NE 담당자에게  확인한다 . \n 2 CSCF 의 정보가  상대 Diameter NE 에 설정되어  있는지  상대 NE 담당자에게  확인한다 . \n 3 상대 Diameter NE  에 기능상\
    \  오류가  있거나  overload  상태인지  상대 NE 담당자에게  \n  확인한다 . \n 4 CSCF 와 상대 Diameter NE 간의 network connection 이 비정상인지  확인한다 .\
    \ \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \nSPSC4000 알람 및 장애처리  매뉴얼  SVSCR 1.0.0 v1.0  97 \n\
    © Samsung Proprietary and Confidential"
  - "부록 C 알람 코드별  장애처리  \n \nRTRV-OVLD-LMT:TYPE=CPU;   \n2 전 노드의  CPU 및 MEMORY  의 임계치를  조회하는  경우  \nRTRV-OVLD-LMT;  \n[확인\
    \ 사항]  \n알람이  발생된  노드의  CPU 임계치가  적절한지  판단한다 . \n[참고 3] CHG-OVLD-LMT 명령어  사용 예 및 확인 사항 \n[명령어  사용 예] \n1 VIDA 노드의  CPU\
    \ 임계치  알람 발생은  98, 알람 해제는  96 로 변경하고자  하는 경우  \nCHG-OVLD-LMT:NTYPE=VIDA,TYPE=CPU,CRIA=98,CRIC=96;   \n2 전 노드의  CPU 임계치\
    \  알람 발생은  98, 알람 해제는  96 로 변경하고자  하는 경우  \nCHG-OVLD-LMT:TYPE=CPU,CRIA=98,CRIC=96;   \n[확인 사항]  \n변경하고자  하는 임계치가  정상 적용되는지\
    \  명령어  결과로  확인하고 , CPU OVERLOAD  \nALARM 이 예를 들어 95 %에서 발생된  것이라면 , 상기 명령어  조치 후 CPU \nOVERLOAD ALARM 이 해제되는지  확인한다 .\
    \  \n시스템  영향 과부하  지속 시 노드 재시동  및 노드 내 S/W 작동 이상 발생할  수 있다. 과부하에  따른 제어 \n작동에  의해 호제한 , 명령어  제한, 통계 및 시험에  제한이  발생할  수\
    \ 있다  \n시험방법  1 시스템의  호 시뮬레이터를  이용하여  다량의  호를 발생 시킨다 .(시스템  처리 용량의  2 배) 기술 2 시스템에  \n과부하가  발생되고 , 과부하에  따른 호 제어가  수행되는지\
    \  확인한다 .  \n3 시스템이  다량의  호에 의하여  비정상  상태로  천이되지  않고, 일정 부하를  유지하며 , \n호가 처리되는지  확인한다 . \n4 호 시뮬레이터를  통한 호를 중단한다 . \n\
    5 시스템의  과부하가  해제되며 , 호 제어 없이 호처리가  정상적으로  이루어  짐을 확인한다 .  \n경보 보고 RM \nAP \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n\
    \ \n \n \n \n \n \n \n \n \n \n \n \n \n \n \n \nSPSC4000 알람 및 장애처리  매뉴얼  SVSCR 1.0.0 v1.0  39 \n© Samsung Proprietary\
    \ and Confidential"
