    \ Minor 알람은  Critical 알람이나  Major 알람에  비하여  시스템에  \n미치는  영향이  적은 장애이다 . \n \nCATE(Category)  \n \n시스템에서  발생하는  알람은  알람은\
    \  ITU-T X.733 에 의해 다음과  \n같은 범주(Category)로 분류할  수 있다. \n \nCOMM: Communications alarm type, 한 지점에서  다른 지점으로  정보를  \n\
    전달하기  위한 절차/처리에  관련된  알람  \nQOS: Quality of service alarm type, 서비스  품질의  저하와  관련된  알람 \n \nPROC: Processing error alarm\
    \ type, SW 나 Processing 오류 발생과  \n관련된  알람  \nEQUIP: Equipment alarm type, 설치된  장비의  오류 발생과  관련된  알람  \nENV: Environmental\
    \ alarm type, 시스템의  장비의  환경 상태와  관련된  알람 \n \nCOLUMN( 하위 Category)  \n \nCategory 의 하위의  범주를  이용하여  알람을  세분화하여  관리하는 \
