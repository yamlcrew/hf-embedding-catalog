    \ 상황을  임의로  만들 수 없다. 기술 [참고] \nOnline 진단 주기 조회 및 설정 \n1 Online  진단 설정 상태 조회  \nRTRV-TEST-INF:  \n2 Online  진단 설정 상태 변경\
