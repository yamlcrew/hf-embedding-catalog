- source_sentence: What command can be used to check the connection status of a PCRF system when a PCRF access failure alarm
    occurs?
  sentences:
  - "부록 C 알람 코드별  장애처리  \n         \n 2512 PCRF ACCESS FAIL ALARM  \n          \n 번호 2512  DESCRIPTION  PCRF ACCESS FAIL ALARM\
    \  \n          \n 등급 MAJ     NAME  PCRF_ACC_F  \n         \n Category  COMM   Column  NE \n      \n 메시지  내역 **  A2512\
    \ PCRF ACCESS FAIL ALARM  \n  LOC  = aaaa  \n  INF  = bbbb  \n  ## A2512 PCRF ACCESS FAIL ALARM CLEARED  \n  LOC  = aaaa\
    \  \n  INF  = bbbb  \n  ALM_ON = cccc  \n  [설명]        \n  aaaa: 장애가  발생한  NE 정보 \n  bbbb: 장애가  발생한  NE 의 추가 정보(IP 주소\
    \ 등) \n  cccc: 알람이  발생했던  시간 \n  [예]        \n  **  A2512 PCRF ACCESS FAIL ALARM  \n  LOC = PCRF_ID4  \n  INF = 10.254.192.215\
    \      \n    \n 원인 PCRF 와 접속이  해제되는  경우 발생한다 . \n    \n 조치방법  해당 PCRF 의 접속 상태를  확인하고 , 접속이  해제되어  있으면  연결한다 . \n  RTRV-NE-STS\
    \ 명령어를  실행하여  해당 PCRF 와의 접속 상태를  확인한다 . \n  [참고] RTRV-NE-STS 명령어  사용 예 및 확인 사항 \n  [명령어  사용 예] \n  1 OOS(Out Of Service)\
    \  상태의  PCRF 시스템의  접속 상태를  조회하는  경우 \n  RTRV-NE-STS:NETYPE=PCRF,STS=OOS;  \n  2 전체 등록된  PCRF 시스템의  접속 상태를  조회하는  경우 \n\
    \  RTRV-NE-STS:NETYPE=PCRF;  \n  [확인 사항]        \n  조치 방법 수행 후 명령어  결과의  STS 상태가  INS(In -service)  상태인지  확인한다 . \n  \
    \  \n 시스템  영향 PCRF 서버 장애 시 Attach 시도되는  호가 실패할  수 있다. \n    \n 시험방법  1 PCRF 가 정상 연결되어  있는지  확인한다 .(RTRV-NE-STS) \n 기술\
    \ 2 DM, PPDM  블록이  정상적으로  작동 중인지  확인한다 .(RTRV-BLK-STS) \n  3 PCRF 와의 연결을  끊고 알람이  발생하는지  확인한다 . \n  4 PCRF 를 정상 연결시키고\
    \  알람이  해제되는지  확인한다 . \n          \n 경보 보고 DM        \n AP         \n          \n \n \n \n \n \n \n \n \n \nSPSC4000 알람\
    \ 및 장애처리  매뉴얼  SVSCR 1.0.0 v1.0  55 \n© Samsung Proprietary and Confidential"
  - "부록 D 폴트 코드별  장애처리  \n \n5510 IPC TEST FAULT  \n \n번호 5510 DESCRIPTION  IPC TEST FAULT  \n   \n메시지  내역   F5510 IPC TEST\
    \ FAULT  \n LOC = aaaa  \n INF = bbbb  \n REASON = cccc  \n [설명]   \n aaaa: 진단 실패를  감지한  노드 위치 \n bbbb: 장애가  감지된  IPC\
    \ 방향 \n cccc: 장애 발생 사유 \n [예]   \n F5510 IPC TEST FAULT  \n LOC = VIDA1  \n INF = VIGA1 → VIDA1  \nREASON = NO RESPONSE\
    \   \n원인 Online IPC 진단이  수행되어  비정상이  감지되는  경우 발생한다 .  \n조치방법  1 IPC TEST FAULT  가 발생한  소스 노드와  목적지  노드의  상태를  확인하고  조치한다\
