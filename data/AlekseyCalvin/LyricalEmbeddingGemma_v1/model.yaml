      \ part, you and I, by the doorway, it may well be forevermore. \nWhen we part, you and I, by the doorway, it may well\
      \ be forevermore. \n\nNow I burn with a hottest longing. With such worry my heart would drum. \nWhat’s your name? For\
      \ in truth, I don’t know you. But our love, it is sure to come. \nCome on in then, my friend, my dear. Kissing my lips\
      \ right away. \nAnd I swear, I shall never forget you, even all the way to the grave. \nAnd I swear, I shall never forget\
      \ you, even all the way to the grave."
    - "(Title:) At the Narva Outpost \nBy Paul Armand \n\nClouds gather over the city. The city smells of thunder. \nA young\
      \ man walks along the distant Narva Outpost. \nThe road is long. My dear, wait for me. \nWe will say goodbye at the\
      \ doorstep, wish me happiness.  \n\nDark forces are stirring. The winds blow in our faces. \nTroops of workers are fighting\
      \ for the happiness of the people. \nThe road ahead is long. Come out, my dear. \nWe will say goodbye to you at the\
      \ doorstep, and perhaps forever. \nWe will say goodbye to you at the doorstep, and perhaps forever. \n\nI am burning\
      \ with hot passion. My heart is anxious in my chest. \nWho are you? I don't know you. But our love lies ahead. \nCome,\
      \ my dear friend. Kiss me on the lips. \nAnd I swear, I will never forget you until my dying day. \nAnd I swear, I will\
      \ never forget you until my dying day."
  - source_sentence: "(Название:) ДВЕНАДЦАТЬ (Сегмент 3) \n(Поэт:) Александр Блок \n\nКак пошли наши ребята — \nВ красной\
      \ гвардии служить — \nВ красной гвардии служить — \nБуйну голову сложить! \n\nЭх ты, горе-горькое, \nСладкое житье!\
      \ \nРваное пальтишко, \nАвстрийское ружье! \n\nМы на го́ре всем буржуям \nМировой пожар раздуем, \nМировой пожар в крови\
      \ — \nГосподи, благослови!"
    sentences:
    - "(Title:) TWELVE (Segment 3) \n(Poet:) Alexander Blok \n\nHow our local kids went off — \nIn the Red Guard went to serve\
      \ — \nIn the Red Guard went to serve — \nDrop their hotheads to the earth! \n\nOh you, bitter-bitterness, \nOh, sweet\
      \ life of fun! \nA torn up little overcoat, \nAn Austrian gun! \n\nTo grieve bouzhies everyplace \nWe'll ignite a world-sized\
      \ blaze, \nFire across the world in blood! — \nGlobal fire, so bless us God!"
    - "(Title:) “THIS EVER WIDE-EYED NOVEL LIVING…” \n(Poet:) Olga Petrovskaya\n\nThis ever wide-eyed novel living\nHas a\
      \ face washed by smiling dawn,\nUnto the sun new roadways we’re given,\nI know, we will get there soon.\n\nAmong human\
      \ millions, mere handful of us,\nWe’re melting the heart at forges;\nAnd that’s how the pride of youthfulness \nUnto\
      \ freeing all prisoners surges.\n\nThe Real of Young rebels transcends their dreams,\nCaressed by the centuries’ claws,\n\
      I am close with those New, their Newness I see, \nWith bare hands they pull reigns of worlds.\n\nAs for skies, we’ll\
      \ be-star them with verses,\nDiffuse laughter through dots that ignite,\nSo that flames slice away with our voices\n\
      The old calcified rock of deep night."
    - "(Title:) 12 (Three segments)\n(Poet:) Blok \n\nHow our boys went —\nTo serve in the Red Guard — \nTo serve in the Red\
      \ Guard — \nTo lay down their lives! \n\nOh, you bitter sorrow, \nSweet life! \nA torn coat, \nAn Austrian rifle! \n\
      \nWe are angry at all the bourgeoisie \nWe will start a world war, \nA world war in blood — \nLord, bless us!"
  - source_sentence: "(Название:) МЫ ИЗ КРОНШТАДТА \n(Поэт:) Чёрный Лукич / Вадим Кузьмин\n\nНогу на ногу – Черный Лукич,\
      \ \nПалец поперек, сухие губы. \nМальчик в зипуне, маленький старик. \nГрянули марш зеленые трубы. \n\nМы из Кронштадта,\
      \ \nМы из Кронштадта... \n\nВозле сортира латышский стрелок, \nКрасные звезды на серой папахе. \nЗорко глядит, чтоб\
      \ не убёг. \nТрудно вязать петлю из рубахи. \n\nМы из Кронштадта, \nМы из Кронштадта… \n\nБелые ноги на белом снегу,\
      \ \nТело распухло, и все непонятно. \nБудет весна, и я убегу – \nГолос хрустящий, обрубок невнятный."
    sentences:
    - "(Title:) WE'VE COME FROM KRONSTADT \n(Poet:) Cherniy Lookitsch / Vadim Kuzmin\n\nSits leg over leg – Chorniy Lukich,\
      \ \nTrigger finger crossed, lips chapped over, \nShriveled old man, peasant robed kid. \nSudden green pipes a march\
      \ start roaring. \n\nWe've come from Kronstadt, \nWe've come from Kronstadt... \n\nBy the latrine stands a Latvian gun,\
      \ \nWoolen grey hat, crimson stars shining. \nWatching close enough, not to let run. \nTricky out of shirtsleeves nooses\
      \ twining. \n\nWe've come from Kronstadt, \nWe've come from Kronstadt… \n\nWhitening legs run into the snow, \nBody\
      \ puffing up and everything scrambled, \nSpringtime coming on, then I'll just go – \nBrittled voice, an incohereable\
      \ fragment."
    - "(Title:) HERO (Excerpt) \n(Poet:) Alexander Sergeyevich Pushkin \L\LOh, may the light of truth be cursed, \nWhen mediocrity\
      \ cold-natured, \nAnd jealous, hungry for temptation, \nIt fosters gladly! – I refuse! \nMore dear than lowly truths\
      \ of darkness \nTo me are lies exalting us… \nDon’t steal a hero’s heart! Or else, \nWhat would they be without it?\
      \ Tyrants…"
    - "WE ARE FROM KRONSTADT \nBy Black Lookich \n\nLeg on leg Black Lukich, \nDigits across, dry mouth. \nA boy in a peasant's\
      \ coat, a little geezer. \nA march sounded from the green horns. \n\nWe have arrived from Kronstadt, \LWe have arrived\
      \ from Kronstadt... \L\LNear the outhouse stands a rifleman from Latvia, \LRed stars on a grey shepherd’s hat. \LHe\
      \ observes vigilantly, so that one does not escape. \LIt is difficult to tie a loop from a shirt. \n\nWe have arrived\
      \ from Kronstadt, \LWe have arrived from Kronstadt… \L\LWhite legs atop of equally white snow, \LThe body is swollen\
      \ up, and everything is not understandable. \LSpring will be, and I will make an escape out of here. \LA crunching enunciation,\
      \ an vague stump."
  - source_sentence: "(Название:) РЕЙГАН-ПРОВОКАТОР \n(Поэт:) Андрей “Свин” Панов \n\nОпять нелётная погода, \nИ от судьбы\
      \ не убежать. \nМы объявляем мораторий — \nАмериканцам наплевать… \nВ Женеве все переговоры \nДавно уже зашли в тупик.\
      \ \nРейкьявик дал понять народу — \nКак Горбачёв у нас велик. \n\nА… \nРейган-провокатор! Рейган-провокатор! \nРейган-провокатор!\
      \ Рейган-провокатор! \n\nВ Неваде так же, как и раньше, \nВзрывают много килотонн. \nРэй-ган устроил из планеты \nОгромный\
      \ мощный полигон. \nНароды в голоде и в войнах \nТеряют тысячи жизне́й; \nА в Вашингтоне, Белом доме \nРешают как убить\
      \ детей. \n\nТот… \nРейган-провокатор! Рейган-провокатор! \nРейган-провокатор! Рейган-провокатор!"
    sentences:
    - "THAT PROVOCATIVE REAGAN \n(Poet:) Andrew “The Pig” Panoff \n\nOnce again, the weather is unfavorable for flying, \n\
      And there is no escaping fate. \nWe declare a moratorium— \nThe Americans don't care… \nIn Geneva, all negotiations\
      \ \nHave long since reached an impasse. \nReykjavik made it clear to the people — \nHow great Gorbachev is to us. \n\
      \nAh... \nReagan the provocateur! Provocateur Reagan! \nReagan the provocateur! Provocateur Reagan! \n\nIn Nevada, just\
      \ like before, \nThey detonate thousands of kilotons. \nReagan has turned the planet \nInto a huge, powerful testing\
      \ ground. \nPeople are starving and fighting wars, \nLosing thousands of lives; \nAnd in Washington, in the White House,\
      \ \nThey decide how to kill children. \n\nThat... \nProvocateur Reagan! Reagan the provocateur! \nHe... Provocateur\
      \ Reagan! Reagan the provocateur!"
    - "(Title:) I GROW BITCHY \n(Songwriter: Yanka Dyagileva) \n\nI irrevocably grow bitchy \nEvery night, with every chuckle,\
      \ \nEvery emptied out glass cup \nI go on boarding up the doors \nAnd letting mean and hungry dogs \nFrom all the chains\
      \ run freely \nWhat else could we do – \nWe who inherit only kneecaps blistered over \nI irrevocably grow bitchy every\
      \ time I \n\nI’m educated \nTo be iron barrel’s latched continuation \nOf a rifle the arm shaft \nSit if you wanna \n\
      Have a smoke beside me on a little bench – into the ground staring \n\nWhere else could we go – we who inherit only\
      \ dirtiest of pathways \nI irrevocably grow bitchy by the hour \n\nI’m irrevocably made bitchy \nEvery sighting of a\
      \ cop hat, or a fancy mink fur hat \nOut where the wartime never ends, \nWhere springtime never really sets, where childhood\
      \ never continues, \nWhere else could we turn – we who are left with only dreams and conversations, \nI irrevocably\
      \ grow bitchy by the hour \nI irrevocably grow bitchy every step I \nI irrevocably grow bitchy every time I"
    - "(Title:) REAGAN PROVOCATEUR \n(Poet:) Andrey “Swine” Panov \n\nAgain a weather barring travel, \nBut fate not easily\
      \ escaped, \nOur moratorium is blaring — \nBut USA don't give a shit… \nNegotiations in Geneva, \nAchieve an impasse\
      \ again, \nReykjavik really showed the people — \nOur Gorbachev the greater man. \n\nAnd… \nReagan — provocateur! Reagan\
      \ — provocateur! \nReagan — provocateur! Reagan — provocateur! \n\nWhile in Nevada, same as ever, \nThey blow up many\
      \ kilotons, \nRay-gun is splitting up our planet \nIn mighty weapons testing zones. \nAmid the war and hunger, peoples\
      \ \nAre losing millions of lives; \nWhile back in Washington, the White House\nTries to ensure no child survives. \n\
      \nExcept… \nReagan — provocateur! Reagan — provocateur! \nReagan — provocateur! Reagan — provocateur!"
