widgetData:
- source_sentence: "(Название:)  ДО НОВОЙ ЗАРИ \n(Поэт:) Владимир Силлов \n\nДни \nПо жуткой нехоженой лестнице \nЗашагают\
    \ быстрей. \nДеревья скоро разлистятся, \nНо станет ясней, \n\nВеснам, \nОбглоданным поэтами, \nПришел конец. \nИ солнцу\
    \ с черными отметами \nКонец — венец. \n\nИ мы солнце и весны \nПотащим на рынок. \nПотащим чрез гвалты и давку \nИ бросим\
    \ за тусклый полтинник \nК антиквару в лавку. \n\nВ душах оплеванных, \nНаглых и сильных, \nЕсть алтари. \nИ на них мы\
    \ затеплим лампады к вечерне \nДо новой зари."
  sentences:
  - "(Title:) UNTIL IT DAWNS ANEW \n(Poet:) Vladimir SIllov \n\nDays \nWould walk an untrod morbid staircase \nAt accelerant\
    \ pace. \nSoon trees splinter in leaflessness, \nAll the clearer it makes, \n\nSpringtimes \nThe poets still nibble on\
    \ \nGet abruptly pulled down. \nWith the sun, a blotched face nothing beams upon, \nThey come down – are crowned. \n\n\
    And this sun with springs \nTo market we’ll bring, \nHoist them over tussle and din, \nAnd for five faded roubles toss\
    \ them \nTo some antiquarian. \n\nSouls spat on, slandered, \nInsolent, headstrong, \nAltars strew. \nOn them we'll light\
    \ lamps for vesper nights, \nUntil it dawns anew."
  - "(Title:) BEFORE A FRESH DAWN \n(Poet:) Vladimir SIlloff \n\nDaytimes \nOn the eerie, untrodden stairs \nWill stomp faster.\
    \ \nThe trees will soon blossom, \nBut it will become clearer, \n\nThat spring, \nGnawed away by poets, \nHas come to\
    \ an end. \nAnd the sun with black marks \nIs the end — the crown. \n\nAnd we will lug the sun and spring \nTo the store.\
    \ \nWe will lug them through the noise and crush \nAnd throw them for a dull fifty kopecks \nTo the antique dealer's shop.\
    \ \n\nIn souls spat upon, \nArrogant and strong, \nThere rooms with altars. \nAnd on them we will light lamps for vespers\
    \ \nUntil a new dawn."
  - "(Title:) THE WAYWARD STREETCAR (Stanzas 9-12) \n(Poet:) Nikolay Gumilev \n\nAnd in an alley with wooden-planked fencing,\
    \ \nI see that house with three windows, gray lawns… \nStreetcar conductor, oh, why don't you stop here; \nHey, stop it\
    \ now! Why, I have to get off! \n\nMasha, my darling, you lived and you sang here, \nWeaving a rug for the groom, for\
    \ me; \nWhere is your voice now and where is your body? \nIt cannot be that you died, cannot be?! \n\nBut you were coughing,\
    \ collapsed by the entrance, \nWhile, with a braid over-powdered and plumed, \nI went to get introduced to the Empress,\
    \ \nSo that I never again met with you. \n\nI understand now: that all of our freedoms, \nOnly from there, are a light\
    \ beating through; \nPeople and shades are amassed by the entrance \nInto a garden of planets, a zoo."
- source_sentence: "(Название:) по Нарвской заставе \n(Поэт:) Павел Арманд \n\nТучи над городом встали. В городе пахнет грозой.\
    \ \nПо далекой по Нарвской заставе парень идет молодой. \nДалека ты путь дорога. Выди милая встречай. \nМы простимся с\
    \ тобой у порога, ты мне счастья пожелай. \n\nЧерные силы мятутся. Ветры нам дуют в лицо. \nЗа счастье народное бьются\
    \ отряды рабочих бойцов. \nДалека ты путь дорога. Выйди милая моя. \nМы простимся с тобой у порога, и быть может навсегда.\
    \ \nМы простимся с тобой у порога, и быть может навсегда. \n\nЖаркою страстью пылаю. Сердцу тревожно в груди. \nКто ты?\
    \ Тебя я не знаю. Но наша любовь впереди. \nПриходи же друг мой мылый. Поцелуй меня в уста. \nИ клянусь, я тебя до могилы\
    \ не забуду никогда. \nИ клянусь, я тебя до могилы не забуду никогда."
  sentences:
  - "(Title:) MAY 1ST, 1920 (First Poem) \n(Poet:) Boris Nesmelov \n\nThe Soviets' homeland stands surrounded \nby flaming\
    \ walls reared by our foe. \nBut we, encircled, you, beyond it, \ntoday we all – are one, and more. \n\nThru cold and\
    \ typhus, war and famine, \nin London, Paris, Washington and Rome, \nWe, who are raising up the hammer, \nare speaking\
    \ firm: \n\n– Who strike beside the Seine, not breaking, \nin Moscow work for hours on through, \nin famished Vienna grin\
    \ elated, – m\nand all together march on you! \n\nFor springtimes to inspire, to nurture, \nand fertilize the earth, meanwhile,\
    \ \nto mix the dusts of Warsaw’s butchers \nand false peacekeepers from Versailles!"
  - "(Title:) AT THE NARVA-SIDE OUTPOST \n(Poet:) Pavel Armand \n\nOver the city sweep storm clouds. The city, it reeks of\
    \ storms. \nAt the distant, Narva-side outpost a lonesome young fellow goes. \nHere you are, my road, far running. Let\
    \ me in, dear, I’m here at last. \nWhen we part, you and I, by the doorway, would you wish me some happiness. \n\nDarkest\
    \ forces are tossing, tiding. In our faces a strong wind blows. \nTo make all people happy are fighting the battalions\
    \ of working folks. \nHere you are, my own road, far running. Greet me, sweetheart, before I go. \nWhen we part, you and\
    \ I, by the doorway, it may well be forevermore. \nWhen we part, you and I, by the doorway, it may well be forevermore.\
    \ \n\nNow I burn with a hottest longing. With such worry my heart would drum. \nWhat’s your name? For in truth, I don’t\
    \ know you. But our love, it is sure to come. \nCome on in then, my friend, my dear. Kissing my lips right away. \nAnd\
    \ I swear, I shall never forget you, even all the way to the grave. \nAnd I swear, I shall never forget you, even all\
    \ the way to the grave."
  - "(Title:) At the Narva Outpost \nBy Paul Armand \n\nClouds gather over the city. The city smells of thunder. \nA young\
    \ man walks along the distant Narva Outpost. \nThe road is long. My dear, wait for me. \nWe will say goodbye at the doorstep,\
    \ wish me happiness.  \n\nDark forces are stirring. The winds blow in our faces. \nTroops of workers are fighting for\
    \ the happiness of the people. \nThe road ahead is long. Come out, my dear. \nWe will say goodbye to you at the doorstep,\
    \ and perhaps forever. \nWe will say goodbye to you at the doorstep, and perhaps forever. \n\nI am burning with hot passion.\
    \ My heart is anxious in my chest. \nWho are you? I don't know you. But our love lies ahead. \nCome, my dear friend. Kiss\
    \ me on the lips. \nAnd I swear, I will never forget you until my dying day. \nAnd I swear, I will never forget you until\
    \ my dying day."
- source_sentence: "(Название:) ДВЕНАДЦАТЬ (Сегмент 3) \n(Поэт:) Александр Блок \n\nКак пошли наши ребята — \nВ красной гвардии\
    \ служить — \nВ красной гвардии служить — \nБуйну голову сложить! \n\nЭх ты, горе-горькое, \nСладкое житье! \nРваное пальтишко,\
    \ \nАвстрийское ружье! \n\nМы на го́ре всем буржуям \nМировой пожар раздуем, \nМировой пожар в крови — \nГосподи, благослови!"
  sentences:
  - "(Title:) TWELVE (Segment 3) \n(Poet:) Alexander Blok \n\nHow our local kids went off — \nIn the Red Guard went to serve\
    \ — \nIn the Red Guard went to serve — \nDrop their hotheads to the earth! \n\nOh you, bitter-bitterness, \nOh, sweet\
    \ life of fun! \nA torn up little overcoat, \nAn Austrian gun! \n\nTo grieve bouzhies everyplace \nWe'll ignite a world-sized\
    \ blaze, \nFire across the world in blood! — \nGlobal fire, so bless us God!"
  - "(Title:) “THIS EVER WIDE-EYED NOVEL LIVING…” \n(Poet:) Olga Petrovskaya\n\nThis ever wide-eyed novel living\nHas a face\
    \ washed by smiling dawn,\nUnto the sun new roadways we’re given,\nI know, we will get there soon.\n\nAmong human millions,\
    \ mere handful of us,\nWe’re melting the heart at forges;\nAnd that’s how the pride of youthfulness \nUnto freeing all\
    \ prisoners surges.\n\nThe Real of Young rebels transcends their dreams,\nCaressed by the centuries’ claws,\nI am close\
    \ with those New, their Newness I see, \nWith bare hands they pull reigns of worlds.\n\nAs for skies, we’ll be-star them\
    \ with verses,\nDiffuse laughter through dots that ignite,\nSo that flames slice away with our voices\nThe old calcified\
    \ rock of deep night."
  - "(Title:) 12 (Three segments)\n(Poet:) Blok \n\nHow our boys went —\nTo serve in the Red Guard — \nTo serve in the Red\
    \ Guard — \nTo lay down their lives! \n\nOh, you bitter sorrow, \nSweet life! \nA torn coat, \nAn Austrian rifle! \n\n\
    We are angry at all the bourgeoisie \nWe will start a world war, \nA world war in blood — \nLord, bless us!"
- source_sentence: "(Название:) МЫ ИЗ КРОНШТАДТА \n(Поэт:) Чёрный Лукич / Вадим Кузьмин\n\nНогу на ногу – Черный Лукич, \n\
    Палец поперек, сухие губы. \nМальчик в зипуне, маленький старик. \nГрянули марш зеленые трубы. \n\nМы из Кронштадта, \n\
    Мы из Кронштадта... \n\nВозле сортира латышский стрелок, \nКрасные звезды на серой папахе. \nЗорко глядит, чтоб не убёг.\
    \ \nТрудно вязать петлю из рубахи. \n\nМы из Кронштадта, \nМы из Кронштадта… \n\nБелые ноги на белом снегу, \nТело распухло,\
    \ и все непонятно. \nБудет весна, и я убегу – \nГолос хрустящий, обрубок невнятный."
  sentences:
  - "(Title:) WE'VE COME FROM KRONSTADT \n(Poet:) Cherniy Lookitsch / Vadim Kuzmin\n\nSits leg over leg – Chorniy Lukich,\
    \ \nTrigger finger crossed, lips chapped over, \nShriveled old man, peasant robed kid. \nSudden green pipes a march start\
    \ roaring. \n\nWe've come from Kronstadt, \nWe've come from Kronstadt... \n\nBy the latrine stands a Latvian gun, \nWoolen\
    \ grey hat, crimson stars shining. \nWatching close enough, not to let run. \nTricky out of shirtsleeves nooses twining.\
    \ \n\nWe've come from Kronstadt, \nWe've come from Kronstadt… \n\nWhitening legs run into the snow, \nBody puffing up\
    \ and everything scrambled, \nSpringtime coming on, then I'll just go – \nBrittled voice, an incohereable fragment."
  - "(Title:) HERO (Excerpt) \n(Poet:) Alexander Sergeyevich Pushkin \L\LOh, may the light of truth be cursed, \nWhen mediocrity\
    \ cold-natured, \nAnd jealous, hungry for temptation, \nIt fosters gladly! – I refuse! \nMore dear than lowly truths of\
    \ darkness \nTo me are lies exalting us… \nDon’t steal a hero’s heart! Or else, \nWhat would they be without it? Tyrants…"
  - "WE ARE FROM KRONSTADT \nBy Black Lookich \n\nLeg on leg Black Lukich, \nDigits across, dry mouth. \nA boy in a peasant's\
    \ coat, a little geezer. \nA march sounded from the green horns. \n\nWe have arrived from Kronstadt, \LWe have arrived\
    \ from Kronstadt... \L\LNear the outhouse stands a rifleman from Latvia, \LRed stars on a grey shepherd’s hat. \LHe observes\
    \ vigilantly, so that one does not escape. \LIt is difficult to tie a loop from a shirt. \n\nWe have arrived from Kronstadt,\
    \ \LWe have arrived from Kronstadt… \L\LWhite legs atop of equally white snow, \LThe body is swollen up, and everything\
    \ is not understandable. \LSpring will be, and I will make an escape out of here. \LA crunching enunciation, an vague\
    \ stump."
- source_sentence: "(Название:) РЕЙГАН-ПРОВОКАТОР \n(Поэт:) Андрей “Свин” Панов \n\nОпять нелётная погода, \nИ от судьбы не\
    \ убежать. \nМы объявляем мораторий — \nАмериканцам наплевать… \nВ Женеве все переговоры \nДавно уже зашли в тупик. \n\
    Рейкьявик дал понять народу — \nКак Горбачёв у нас велик. \n\nА… \nРейган-провокатор! Рейган-провокатор! \nРейган-провокатор!\
    \ Рейган-провокатор! \n\nВ Неваде так же, как и раньше, \nВзрывают много килотонн. \nРэй-ган устроил из планеты \nОгромный\
    \ мощный полигон. \nНароды в голоде и в войнах \nТеряют тысячи жизне́й; \nА в Вашингтоне, Белом доме \nРешают как убить\
    \ детей. \n\nТот… \nРейган-провокатор! Рейган-провокатор! \nРейган-провокатор! Рейган-провокатор!"
  sentences:
  - "THAT PROVOCATIVE REAGAN \n(Poet:) Andrew “The Pig” Panoff \n\nOnce again, the weather is unfavorable for flying, \nAnd\
    \ there is no escaping fate. \nWe declare a moratorium— \nThe Americans don't care… \nIn Geneva, all negotiations \nHave\
    \ long since reached an impasse. \nReykjavik made it clear to the people — \nHow great Gorbachev is to us. \n\nAh... \n\
    Reagan the provocateur! Provocateur Reagan! \nReagan the provocateur! Provocateur Reagan! \n\nIn Nevada, just like before,\
    \ \nThey detonate thousands of kilotons. \nReagan has turned the planet \nInto a huge, powerful testing ground. \nPeople\
    \ are starving and fighting wars, \nLosing thousands of lives; \nAnd in Washington, in the White House, \nThey decide\
    \ how to kill children. \n\nThat... \nProvocateur Reagan! Reagan the provocateur! \nHe... Provocateur Reagan! Reagan the\
    \ provocateur!"
  - "(Title:) I GROW BITCHY \n(Songwriter: Yanka Dyagileva) \n\nI irrevocably grow bitchy \nEvery night, with every chuckle,\
    \ \nEvery emptied out glass cup \nI go on boarding up the doors \nAnd letting mean and hungry dogs \nFrom all the chains\
    \ run freely \nWhat else could we do – \nWe who inherit only kneecaps blistered over \nI irrevocably grow bitchy every\
    \ time I \n\nI’m educated \nTo be iron barrel’s latched continuation \nOf a rifle the arm shaft \nSit if you wanna \n\
    Have a smoke beside me on a little bench – into the ground staring \n\nWhere else could we go – we who inherit only dirtiest\
    \ of pathways \nI irrevocably grow bitchy by the hour \n\nI’m irrevocably made bitchy \nEvery sighting of a cop hat, or\
    \ a fancy mink fur hat \nOut where the wartime never ends, \nWhere springtime never really sets, where childhood never\
    \ continues, \nWhere else could we turn – we who are left with only dreams and conversations, \nI irrevocably grow bitchy\
    \ by the hour \nI irrevocably grow bitchy every step I \nI irrevocably grow bitchy every time I"
  - "(Title:) REAGAN PROVOCATEUR \n(Poet:) Andrey “Swine” Panov \n\nAgain a weather barring travel, \nBut fate not easily\
    \ escaped, \nOur moratorium is blaring — \nBut USA don't give a shit… \nNegotiations in Geneva, \nAchieve an impasse again,\
    \ \nReykjavik really showed the people — \nOur Gorbachev the greater man. \n\nAnd… \nReagan — provocateur! Reagan — provocateur!\
    \ \nReagan — provocateur! Reagan — provocateur! \n\nWhile in Nevada, same as ever, \nThey blow up many kilotons, \nRay-gun\
    \ is splitting up our planet \nIn mighty weapons testing zones. \nAmid the war and hunger, peoples \nAre losing millions\
    \ of lives; \nWhile back in Washington, the White House\nTries to ensure no child survives. \n\nExcept… \nReagan — provocateur!\
    \ Reagan — provocateur! \nReagan — provocateur! Reagan — provocateur!"
