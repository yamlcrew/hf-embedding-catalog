widgetData:
- source_sentence: What did the Court direct the State Government to do?
  sentences:
  - In the consolidated proceeding therefore the tribunal had to decide firstly whether the bunga was the property of the
    Golden Temple. If it decided that, all the claims would necessarily fall 338 through. But if it held that the bunga was
    not the property of the Golden Temple it had to adjudicate on the respective claims of Jaswant Singh, Kesar Singh and
    Balwant Singh. By majority, the tribunal held that the bunga was not the property of the Golden Temple. It therefore had
    to decide to which of the three claimants under section 5, if any, the bunga could be held to belong. It negatived the
    claims of Kesar Singh and Jaswant Singh. As to Balwant Singh 's claim it held by a majority that Balwant Singh had no
    personal or private right in the bunga. It further held that the bunga was wakf property dedicated to the pilgrims to
    the Golden Temple and that the descendants of Maharaja Sher Singh were the managers of the bunga.
  - The second meeting was held on the 29th March, 1952, and the third on the 14th of June, 1952. The expert member was not
    present at any other meeting except the first and on the 27th of 741 May, 1952, he wrote a letter to the Chief Commissioner
    stating that he was proceeding to Europe on the 3rdd June, 1952, for a period of three months.
  - It is necessary to mention in this connection that on September 21, 1984 this Court while granting special leave made
    an order of stay of operation of the High Court judgment pending hearing of the appeal. But subsequently on March 18,
    1986 after hearing the learned counsels the interim order of stay was recalled in consideration of the fact that U.P.
    Public Service Commission had already cancelled the candidature of the appellant and withdrawn the recommendation made
    in his favour for the reason inter alia that he lacked in five years experience in Drug testing. This Court also directed
    the State Government to appoint a member or one Indian Administrative Service to function as the Food & Drug Controller,
    U.P. PG NO 42 It has been urged on behalf of the appellant, Dr. Bindal that the order of the Public Service Commission
    in cancelling the candidature of the appellant and withdrawing the recommendation made in his favour is wholly illegal
    and bad in as much as the Government has considered the certificates produced by the appellant and found that the appellant
    had the requisite experience of five years in Drug testing and as such he was appointed by the Government as Food and
    Drug Controller, U.P.
- source_sentence: What power does Article 11 grant to Parliament?
  sentences:
  - Civil Appeal Nos. 1742 1743 of 1969. Appeals by Special Leave from the Judgment and order dated 12 12 1968 of the Allahabad
    High Court in R.S.A. No. 2777 of 1972. section N. Andley, Uma Datta and T. C. Sharma for the Appellant in CA 1742/69.
    A. P. section Chauhan and N. N. Sharma for Respondent No. 1 in CA 1742/69 and for the Appellant in CA 1743/69. 1000 The
    Judgment of the Court was delivered by KOSHAL, J.
  - There is, therefore, a clear averment in the plaint that an equitable mortgage was created on May 10, 1947, and that was
    acknowledged by the agreement dated July 5, 1947. The 1st defendant did not file any written statement denying the said
    allegations.
  - In Raja Kulkarni and Ors. vs State of Bombay(1), one of the contentious canvassed before the Constitution Bench was that
    Sec. 13 of the Bombay Industrial Relations Act, 1946 as it then stood provided that a union can be registered as a representative
    union for an industry in a local area if it has for the whole of the period of three months next preceding the date of
    its application, a membership of not less than 15% of the total number of employees employed in any F industry in any
    local area. If the union does not satisfy that condition and has a membership of not less than 5%, it could be registered
    as a qualified union Rashtriya Mill Mazdoor Sangh was registered as a representative union while the Mill Mazdoor Sabha
    was registered as a qualified union. It was contended on behalf to Mill Mazdoor Sabha of which the appellants before this
    Court were the office bearers that the provisions that conferred an exclusive right only on the representative union to
    represent workmen was violative of fundamental freedoms guaranted to the members of Mill Mazdoor Sabha . (1) [1954] SCR
    384. 508 or any other workman who is not a member of the representative union under article 19 (1) (a) and (c) and was
    also violative of article 14 inasmuch as the two representatives of workmen were denied equality before law or the equal
    protection of laws. The Constitution Bench repelled the contention observing that such a provision does no t deny either
    the fundamental freedom of speech and expression or the right to form association. The Court said that it is always open
    to the workmen who are not members of the representative union to form their own association or union and to claim higher
    percentage of membership so as to dethrone the representative union and take its place. This decision should have concluded
    the matter.
- source_sentence: What is the only course open for the Government in these circumstances?
  sentences:
  - This definition is undoubtedly relevant in dealing with the question of continuous service by reference to the provisions
    of Industrial Disputes ' Act but its operation cannot be automatically extended in dealing with an interpretation of the
    words "continuous service" in an award made in an industrial dispute unless the context in which the expression is used
    in the award justifies it. In other words, the expression "continuous service" may be statutorily defined in which case
    the definition will prevail. An award using the said expression may itself give a definition of that expression and that
    will bind parties in dealing with claims arising from the award. Where, however, the award does not explain the said expression
    and statutory definitions contained in other Acts are of no material assistance it would be necessary to examine the question
    on principle and decide what the expression should mean in any given award '; and that is precisely what the tribunal
    had to do in the present case.
  - Before the enactment of section 289(2) if it disagreed with the finding, it could reject the proceeding on the ground
    that the matter was cognizable by the other court, As neither court was bound by the finding of the other, the litigant
    could not get relief in any forum. Section 289(2) has been specially enacted to avoid such a deadlock. In such a situation,
    section 289(2) compels the court to refer the matter to the High Court and to obtain a Provisions corresponding to sections
    290, 291 and 289(1) were contained in sections 124 A, 124B, 124C and 124D of the Oudh Rent Act 1886 and sections 268,
    269 and 267(1) of the Agra Tenancy Act, 1926.
  - 'Sub section (1) of section 125 Cr. P.C. provides as under: "If any person having. sufficient means ne glects or refuses
    to maintain (a) his wife, unable to maintain herself or (b) his legitimate or illegitimate minor child, whether married
    or not, unable to maintain itself, or (c) his legitimate or illegitimate child (not being a married daughter) who has
    at tained majority, where such child is, by reason of any physical or mental abnormality or injury unable to maintain
    itself, or (d) his father or mother, unable to maintain himself or herself, a Magistrate of the first class may, upon
    proof of such neglect or refusal, order such person to make a monthly allowance for the maintenance of his wife or such
    child, father or mother, at such monthly rate not exceeding five hundred rupees in the whole, as such Magistrate thinks
    fit, and to pay the same to such person as the Magistrate may from time to time direct: Provided that the Magistrate may
    order the father of a minor female child referred to in clause (b) to make such allow ance, until she attains her majority,
    if the Magistrate is satisfied that the husband of such minor female child, if married, is not possessed of sufficient
    means. "'
