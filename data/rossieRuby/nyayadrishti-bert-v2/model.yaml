- source_sentence: What entry is mentioned in relation to tax on land?
  sentences:
  - Now it is true that the so called will of 1864 does not make provision for the grandsons, nor does it expressly confer
    an absolute estate on the legatees, but the witness is illiterate and had to depend on what he was told about the contents
    and meaning of the document, and what we have to test is the truth of his assertion that the plaintiff Mukand Ram and
    Kanhaiya Lal, and other members of the family, told him that Mst. Pato had given the property to her daughters and grandsons.
    If they told him this, as he says they did, then it operates as an admission against Mukand Ram and shifts the burden
    of proof to him because he was one of the persons who made the statement. The statements made by the others are not relevant
    except in so far as they prove the conduct of the family. The plaintiff (P.W. 11 in C.A. 91/50) admits that Mst. Pato
    divided the estate but says that it was only for convenience of management and that neither she nor her daughters had,
    or pretended to have, anything more than a life estate. He denies that there was any gift or family arrangement. But he
    had to admit that the grandsons also got properties at the same time. His explanation is that it was for the purposes
    of "shradh" and pilgrimage to Gaya and he says that though they were given possession they were not the "owners".
  - This Court rejected ' that submission and held that after vesting of all the rights mentioned in. section 6 of the Act
    in the State of Uttar Pradesh, new bhumidhari rights came into existence under section 18 of the Act.
  - 'In that connection, the following observations lay down the guide lines: "It is well settled that the entries in the
    three legislative lists have to be interpreted in their widest amplitude and there fore if a tax can reasonably be held
    to be a tax on land it will come within entry 49. Further it is equally well settled that tax on land may be based on
    the annual value of the land and would still be a tax on land and would not be beyond the com petence of the State legislature
    on the ground that it is a tax on income: (See Ralla Ram vs The province of East Punjab: It follows therefore that the
    use to which the land is put can be taken into account in imposing a tax (1) ; (2)Quoted in Liberty cinema: P. 484. 339
    on it within the meaning of entry 49 of List II, for the annual value of land which can certainly be taken into account
    in imposing a tax for the purpose of this entry would necessarily depend upon the use to which the land is put." (p. 49).'
