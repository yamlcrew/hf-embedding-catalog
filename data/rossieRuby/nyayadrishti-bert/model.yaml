    same facts and has been found eligible for grant of reward under both the schemes, the total amount of reward under both
    the schemes taken together shall not exceed Rs. 5 crores.​​​
- source_sentence: Article 249 of Indian Constitution
  sentences:
  - 'Power of Parliament to legislate with respect to a matter in the State List in the national interest

    (1) Notwithstanding anything in the foregoing provisions of this Chapter, if the Council of States has declared by resolution
    supported by not less than two thirds of the members present and voting that it is necessary or expedient in national
    interest that Parliament should make laws with respect to any matter enumerated in the State List specified in the resolution,
    it shall be lawful for Parliament to make laws for the whole or any part of the territory of India with respect to that
    matter while the resolution remains in force

    (2) A resolution passed under clause ( 1 ) shall remain in force for such period not exceeding one year as may be specified
    therein: Provided that, if and so often as a resolution approving the continuance in force of any such resolution is passed
    in the manner provided in clause ( 1 ), such resolution shall continue in force for a further period of one year from
    the date on which under this clause it would otherwise have ceased to be in force

    (3) A law made by Parliament which Parliament would not but for the passing of a resolution under clause ( 1 ) have been
    competent to make shall, to the extent of the incompetency, cease to have effect on the expiration of a period of six
    months after the resolution has ceased to be in force, except as respects things done or omitted to be done before the
    expiration of the said period"

    Article 250 of Indian Constitution,"Power of Parliament to legislate with respect to any matter in the State List if a
    Proclamation of Emergency is in operation

    (1) Notwithstanding anything in this Chapter, Parliament shall, while a Proclamation of Emergency is in operation, have,
    power to make laws for the whole or any part of the territory of India with respect to any of the matters enumerated in
    the State List

    (2) A law made by Parliament which Parliament would not but for the issue of a Proclamation of Emergency have been competent
    to make shall, to the extent of the incompetency, cease to have effect on the expiration of a period of six months after
    the Proclamation has ceased to operate, except as respects things done or omitted to be done before the expiration of
    the said period","Below is an instruction that describes a task or a question. Write a response that appropriately completes
    the request.'
  - 'Penalty for sitting and voting before making oath or affirmation under Article 99 or when not qualified or when disqualified
    If a person sits or votes as a member of either House of Parliament before he has complied with the requirements of Article
    99, or when he knows that he is not qualified or that he is disqualified for membership thereof, or that he is prohibited
    from so doing by the provisions of any law made by Parliament, he shall be liable in respect of each day on which he so
    sits or votes to a penalty of five hundred rupees to be recovered as a debt due to the Union Powers, Privileges and Immunities
    of Parliament and its Members"

    Article 105 of Indian Constitution,"Powers, privileges, etc of the Houses of Parliament and of the members and committees
    thereof

    (1) Subject to the provisions of this constitution and the rules and standing orders regulating the procedure of Parliament,
    there shall be freedom of speech in Parliament

    (2) No member of Parliament shall be liable to any proceedings in any court in respect of anything said or any vote given
    by him in Parliament or any committee thereof, and no person shall be so liable in respect of the publication by or under
    the authority of either House of Parliament of any report, paper, votes or proceedings

    (3) In other respects, the powers, privileges and immunities of each House of Parliament, and of the members and the committees
    of each House, shall be such as may from time to time be defined by Parliament by law, and, until so defined shall be
    those of that House and of its members and committees immediately before the coming into force of Section 15 of the Constitution
    (Forty fourth Amendment) Act 1978

    (4) The provisions of clauses ( 1 ), ( 2 ) and ( 3 ) shall apply in relation to persons who by virtue of this constitution
    have the right to speak in, and otherwise to take part in the proceedings of, a House of Parliament or any committee thereof
    as they apply in relation to members of Parliament","Below is an instruction that describes a task or a question. Write
    a response that appropriately completes the request.'
  - 'Special provision with respect to the State of Mizoram Notwithstanding anything in this Constitution,

    (a) no Act of President in respect of

    (i) religious or social practices of the Mizos,

    (ii) Mizo customary law and procedure,

    (iii) administration of civil and criminal justice involving decisions according to Mizo customary law,

    (iv) ownership and transfer of land, shall apply to the State of Mizoram unless the Legislative Assembly of the State
    of Mizoram by a resolution so decides: Provided that nothing in this clause shall apply to any Central Act in force in
    the union territory of Mizoram immediately before the commencement of the Constitution (Fifty third Amendment) Act, 1986
    ;

    (b) the Legislative Assembly of the State of Mizoram shall consist of not less than forty members"

    Article 371H of Indian Constitution,"Special provision with respect to the State of Arunachal Pradesh Notwithstanding
    anything in this Constitution,

    (a) the Governor of Arunachal Pradesh shall have special responsibility with respect to law and order in the State of
    Arunachal Pradesh and in the discharge of his functions in relation thereto, the Governor shall, after consulting the
    Council of Ministers, exercise his individual judgment as to the action to be taken: Provided that if any question arises
    whether any matter is or is not a matter as respects which the Governor is under this clause required to act in the exercise
    of his individual judgment, the decision of the Governor in his discretion shall be final, and the validity of anything
    done by the Governor shall not be called in question on the ground that he ought or ought not to have acted in the exercise
    of his individual judgment: Provided further that if the President on receipt of a report from the Governor or otherwise
    is satisfied that it is no longer necessary for the Governor to have special responsibility with respect to law and order
    in the State of Arunachal Pradesh, he may by order direct that the Governor shall cease to have such responsibility with
    effect from such date as may be specified in the order;

    (b) the Legislative Assembly of the State of Arunachal Pradesh shall consist of not less than thirty members","Below is
    an instruction that describes a task or a question. Write a response that appropriately completes the request.'
