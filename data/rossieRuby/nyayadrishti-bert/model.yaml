- source_sentence: Article 77 of Indian Constitution
  sentences:
  - 'Conditions of Governor office

    (1) The Governor shall not be a member of either House of Parliament or of a House of the Legislature of any State specified
    in the First Schedule, and if a member of either House of Parliament or of a House of the Legislature of any such State
    be appointed Governor, he shall be deemed to have vacated his seat in that House on the date on which he enters upon his
    office as Governor

    (2) The Governor shall not hold any other office of profit

    (3) The Governor shall be entitled without payment of rent to the use of his official residences and shall be also entitled
    to such emoluments, allowances and privileges as may be determined by Parliament by law and, until provision in that behalf
    is so made, such emoluments, allowances and privileges as are specified in Second Schedule

    (3A) Where the same person is appointed as Governor of two or more States, the emoluments and allowances payable to the
    Governor shall be allocated among the States in such proportion as the President may by order determine

    (4) The emoluments and allowances of the Governor shall not be diminished during his term of office"

    Article 159 of Indian Constitution,"Oath or affirmation by Governor Every Governor and every person discharging the functions
    of the Governor shall, before entering upon his office, make and subscribe in the presence of the chief Justice of the
    High Court exercising jurisdiction in relation to the State, or, in his absence, the senior most Judge of that court available,
    an oath or affirmation in the following form, that is to say swear in the name of God I, A B, do that I solemnly affirm
    will faithfully execute the office of Governor (or discharge the functions of the Governor) of (name of the State) and
    will to the best of my ability preserve, protect and defend the Constitution and the law and that I will devote myself
    to the service and well being of the people of (name of the State)","Below is an instruction that describes a task or
    a question. Write a response that appropriately completes the request.'
  - 'Conduct of business of the Government of India

    (1) All executive action of the Government of India shall be expressed to be taken in the name of the President

    (2) Orders and other instruments made and executed in the name of the President shall be authenticated in such manner
    as may be specified in rules to be made by the President, and the validity of an order or instrument which is so authenticated
    shall nor be called in question on the ground that it is not an order or instrument made or executed by the President

    (3) The President shall make rules for the more convenient transaction of the business of the Government of India, and
    for the allocation among Ministers of the said business"

    Article 78 of Indian Constitution,"Duties of Prime Minister as respects the furnishing of information to the President,
    etc It shall be the duty of the Prime Minister

    (a) to communicate to the President all decisions of the council of Ministers relating to the administration of the affairs
    of the union and proposals for legislation;

    (b) to furnish such information relating to the administration of the affairs of the Union and proposals for legislation
    as the President may call for; and

    (c) if the President so requires, to submit for the consideration of the Council of Ministers any matter on which a decision
    has been taken by a Minister but which has not been considered by the Council CHAPTER II PARLIAMENT General","Below is
    an instruction that describes a task or a question. Write a response that appropriately completes the request.'
