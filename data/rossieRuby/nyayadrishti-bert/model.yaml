  - 'Provisions as to Judges of High Courts

    (1) Notwithstanding anything in this clause ( 2 ) of Article 217, the Judges of a High Court in any Province holding office
    immediately before the commencement of this Constitution shall, unless they have elected otherwise, become on such commencement
    the Judges of the High Court in the corresponding State, and shall thereupon be entitled to such salaries and allowances
    and to such rights in respect of leave of absence and pension as are provided for under Article 221 in respect of the
    Judges of such High Court Any such Judge shall, notwithstanding that he is not a citizen of India, be eligible for appointment
    as Chief Justice of such High Court, or as Chief Justice or other Judge of any other High Court

    (2) The Judges of a High Court in any Indian State corresponding to any State specified in Part B of the First Schedule
    holding office immediately before the commencement of this Constitution shall, unless they have elected otherwise, become
    on such commencement the Judges of the High Court in the State so specified and shall, notwithstanding anything in clauses
    ( 1 ) and ( 2 ) of Article 217 but subject to the proviso to clause ( 1 ) of that article, continue to hold office until
    the expiration of such period as the President may by order determine In this article, the expression Judge does not include
    an acting Judge or an additional Judge"

    Article 377 of Indian Constitution,"Provisions as to Comptroller and Auditor General of India The Auditor General of India
    holding office immediately before the commencement of this Constitution shall, unless he has elected otherwise, become
    on such commencement the Comptroller and Auditor General of India and shall thereupon be entitled to such salaries and
    to such rights in respect of leave of absence and pension as are provided for under clause ( 3 ) of Article 148 in respect
    of the Comptroller and Auditor General of India and be entitled to continue to hold office until the expiration of his
    term of office as determined under the provisions which were applicable to him immediately before such commencement","Below
    is an instruction that describes a task or a question. Write a response that appropriately completes the request.'
- source_sentence: Article 45 of Indian Constitution
  sentences:
  - '​​Income derived from land can be termed agricultural income if the following conditions are satisfied:


    Rent or revenue should be derived from the land;

    Land should be situated in India; and

    Land should be used for agricultural purposes.​'
  - 'Extent of executive power of State Subject to the provisions of this Constitution, the executive power of a State shall
    extend to the matters with respect to which the Legislature of the State has power to make laws Provided that in any matter
    with respect to which the Legislature of a State and Parliament have power to make laws, the executive power of the State
    shall be subject to, and limited by, the executive power expressly conferred by the Constitution or by any law made by
    Parliament upon the Union or authorities thereof Council of Ministers"

    Article 163 of Indian Constitution,"Council of Ministers to aid and advise Governor

    (1) There shall be a council of Ministers with the chief Minister at the head to aid and advise the Governor in the exercise
    of his functions, except in so far as he is by or under this constitution required to exercise his functions or any of
    them in his discretion

    (2) If any question arises whether any matter is or is not a matter as respects which the Governor is by or under this
    Constitution required to act in his discretion, the decision of the Governor in his discretion shall be final, and the
    validity of anything done by the Governor shall not be called in question on the ground that he ought or ought not to
    have acted in his discretion

    (3) The question whether any, and if so what, advice was tendered by Ministers to the Governor shall not be inquired into
    in any court","Below is an instruction that describes a task or a question. Write a response that appropriately completes
    the request.'
  - 'Provision for free and compulsory education for children The State shall endeavour to provide, within a period of ten
    years from the commencement of this Constitution, for free and compulsory education for all children until they complete
    the age of fourteen years"

    Article 46 of Indian Constitution,"Promotion of educational and economic interests of Scheduled Castes, Scheduled Tribes
    and other weaker sections The State shall promote with special care the educational and economic interests of the weaker
    sections of the people, and, in particular, of the Scheduled Castes and the Scheduled Tribes, and shall protect them from
    social injustice and all forms of exploitation","Below is an instruction that describes a task or a question. Write a
    response that appropriately completes the request.'
