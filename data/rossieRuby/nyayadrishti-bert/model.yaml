      (1) There shall be a council of Ministers with the chief Minister at the head to aid and advise the Governor in the
      exercise of his functions, except in so far as he is by or under this constitution required to exercise his functions
      or any of them in his discretion

      (2) If any question arises whether any matter is or is not a matter as respects which the Governor is by or under this
      Constitution required to act in his discretion, the decision of the Governor in his discretion shall be final, and the
      validity of anything done by the Governor shall not be called in question on the ground that he ought or ought not to
