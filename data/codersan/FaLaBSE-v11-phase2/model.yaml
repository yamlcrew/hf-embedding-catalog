  sentences:
  - استقلال، آزادی و جمهوری اسلامی بزرگترین دستاورد انقلاب اسلامی است.
  - یک سگ زرد از بطری آب می‌خورد
  - پسری روی اسب یورتمه می زند
- source_sentence: درست است. فکر می کنم با مکزیک و کانادا مشکل مشابهی را داشته باشیم و از طرف دیگر انگلیسی یکی از زبانهای
    ملی آنها است.
  sentences:
  - ما احتمالاً در مورد استفاده از زبان انگلیسی مشکلات مشابه مکزیک و کانادا را داریم.
  - مردی ورزش می‎کند
  - در دوران سلطان سلیمان عثمانی، امپراطوری عثمانی در موقعیت سیاسی و نظامی ممتازی قرار داشت و به منتهای قدرت و وسعت خود رسید.
- source_sentence: قطعنامه ۵۹۸ شورای امنیت یکی از قطعنامه‌های شورای امنیت است که در ۲۹ تیر ۱۳۶۶ ، برای پایان دادن به جنگ ایران
    و عراق صادر شد.
  sentences:
  - قطعنامه ۵۹۸ شورای امنیت سازمان ملل راجع به ایران و عراق صادر شد.
  - غدیر در چه سالی واقع شده است؟
  - زنی با لباس تاپ بنفش بین دو ستون سنگی دوچرخه ای را راه می برد
- source_sentence: چه مواد غذایی باعث باز شدن رگهای قلب می شود؟
