widgetData:
- source_sentence: دانلود کی بودی تو آخه از ماکان بند؟
  sentences:
  - پس از فوت، عزل یا کناره‌گیری رهبری، در صورت تأخیر در تعیین رهبر جدید، طبق قانون شورایی با نام «شورای موقت رهبری» تشکیل
    می شود که اعضای آن مرکب از رئیس‌جمهور، رئیس قوة قضائیه و یکی از فقهای شورای نگهبان به انتخاب مجمع تشخیص مصلحت نظام می
    باشد.
  - شرکت ما مانند سایر شرکت ها قطعات خریداری می کند.
  - دانلود آهنگ کی بودی آخه تو از ماکان بند؟
- source_sentence: 'آنتونی جنکینسون، تاجر انگلیسی و نماینده شرکت مسکوی در سال ۱۵۶۲ میلادی به حضورشاه ایران [شاه تهماسب اول]
    تشریف فرما شد، و با تعظیم و تکریم تمام به حضور شاه مکتوبه دوستی و اتحاد برای تجار انگلستان را از طرف علیا حضرت ملکه [الیزابت
    اول] تقدیم کرد. '
  sentences:
  - قبلاً پيش بينی می شد که آقای کونته روز شنبه با سربازان ارتش در پايتخت آن کشور به گفتگو بنشيند، اما به گفته مقامات، اين
    ديدار به زمانی دیگر موکول شده است.
  - «آنتونی جنکینسون» نماینده شرکت تجاری «مسکوی» در سال ۱۵۶۲م. نامه دوستی تجاری ملکه الیزابت را به شاه تهماسب صفوی تقدیم کرد.
  - چرا نباید بعد از کشیدن دندان سیگار کشید؟
- source_sentence: همه ادیان الهی در این که مصلح کل در آخرالزمان خواهد آمد و جهانی را که از ظلم و فساد پر شده، پر از عدل خواهد
    نمود، اشتراک دارند.
  sentences:
  - یک دختر در حال طناب زدن در یک پیاده رو است
  - ظهور مصلح در آخرالزمان از مشترکات تمامی ادیان و مذاهب می باشد.
  - هوشنگ ابتهاج عضو گروه "ربعه" نمی باشد.
- source_sentence: پسر جوانی درحال پریدن و پوشاندن حصار چوبی  در نزدیکی چمن  است
  sentences:
  - زنی تخم مرغ ها را داخل ظرف خرد می کند
  - یک زن برهنه به جوهر قهوه ای آغشته شده است و جمعیت تار در پس زمینه قرار دارد
  - پسری جوان پوشیده از چمن در حال پریدن در نزدیکی حصار چوبی است
- source_sentence: سه کودک دارند از سرازیری چمنی تپه به بالا می دوند.
  sentences:
  - چه چیزی برای پوست خشک خوب است؟
  - سه کودک دارند از سرازیری چمنی تپه به پایین می دوند.
  - پسری با لباس راه راه در مقابل فواره آب می‌پرد
