widgetData:
- source_sentence: کمپانی هند شرقی فرانسه در زمان سلطنت لویى چهاردهم، برای رقابت سیاسی، اقتصادی و استعماری با دولت بریتانیا
    در هندوستان تأسیس شد.
  sentences:
  - کمپانی هند شرقی فرانسه در دوره پادشاهی لوئی چهاردهم تاسیس شد.
  - جنگ موهاک بین کشورهای عثمانی و مجارستان رخ داد.
  - فخرالدین عراقی جانشین شیخ بهاء الدین زکریا ملتانی بود.
- source_sentence: سرانجام پس از گذشت دو هفته از درخواست ایران، یک گروه کارشناسی که فاقد عضو کارشناس سلاحهای شیمیایی بوده،
    به منطقه اعزام شد و نتایج مشاهدات خود را گزارش کرد و متعاقب آن قطعنامه ٦١٢ شورای امنیت، مبنی بر محکومیت کاربرد سلاح‌های
    شیمیایی در جنگ ایران و عراق و بدون نام بردن از عامل کشتار صادر شد.
  sentences:
  - در قطعنامه ۶۱۲ شورای امنیت کاربرد سلاح‌های شیمیایی بدون نام بردن از عامل کشتار محکوم شد
  - در سال ۱۳۱۷ آن اصل از متمم قانون اساسی مشروطیت که به ایرانی الاصل بودن مادر ولیعهد اشاره می کند، دستخوش تغییر قرار گرفت.
  - به عنوان نمونه‌هایی از ویژگی های هنرهای اسلامی می توان به متعهد و راستین، مردمی و همگانی بودن اشاره کرد.
- source_sentence: در سال ۳۳۳ پیش از میلاد ، نبرد ایسوس بین سپاه اسکندر و داریوش (آخرین پادشاه هخامنشی) رخ داد، در این جنگ
    داریوش شکست خورد و خانواده اش شامل مادر و همسر داریوش و دختران داریوش که استاتیرا و درییه تیس بودند، همگی اسیر شدند.
  sentences:
  - خانواده داریوش در جنگ ایسوس با اسکندر اسیر شدند.
  - در نقاشی مکتب کوبیسم در فرانسه ظهور کرد.
  - این جمله که کشیش‌هایی که در انقلاب نیکاراگوئه نقش داشتند، پیش از پیروزی انقلاب به ایران رفت و آمد می ‌کردند و با امام
    خمینی ملاقات می نمودند. از سوموزا است.
- source_sentence: مطابق ماده ۶ بند ۲ میثاق حقوق مدنی – سیاسی، در سرزمین‌هایی که مجازات اعدام باطل نشده صدور حکم اعدام جائز
    نیست مگر در مورد مهمترین جنایات طبق قانون لازم‌الاجرا در زمان ارتکاب جنایت که آن هم نباید با مقررات این میثاق و کنوانسیون‌ها
    راجع به جلوگیری و مجازات جرم کشتار دسته‌جمعی (ژنوسید) منافات داشته باشد.
  sentences:
  - ' طبق ماده ۶ میثاق حقوق مدنی - سیاسی، در کشورهایی که مجازات اعدام لغو نشده است، صدور حکم اعدام در مهمترین جنایات مجاز
    است'
  - مدرسه نوریه کبری جزء مدارس شام محسوب می شود.
  - روز بزرگداشت سهروردی ۸ مرداد است.
- source_sentence: در جرائم مهمی که مجازات آنها قصاص نفس، اعدام، رجم و حبس ابد است، حتما باید وکیل در دادرسی حضور داشته باشد
    و اگر متهم توان تعیین وکیل برای خود را نداشته باشد، دادگاه الزاماً برای او وکیل تسخیری تعیین می کند.
  sentences:
  - تعیین وکیل تسخیری برای متهم در آن دسته از جرایم الزامی است که مجازات قانونی آنها قصاص نفس، اعدام، رجم و حبس ابد است.
  - در سال ۱۳۶۸ مقام نخست وزیری در ایران حذف شد.
  - ضعف بنیه‌ی دفاعی ایران، نقطه امید صدام برای حمله به ایران و پیروزی سه روزه بر ایران بود
