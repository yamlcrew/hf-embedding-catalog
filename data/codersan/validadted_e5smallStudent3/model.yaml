widgetData:
- source_sentence: تفاوت‌های کلیدی بین موتورهای دیزلی و بنزینی چیست؟
  sentences:
  - یک VPN یا شبکه خصوصی مجازی، ارتباط اینترنتی شما را رمزنگاری کرده و آن را از طریق یک سرور در مکانی که خودتان انتخاب کرده‌اید
    هدایت می‌کند و حفظ حریم خصوصی و امنیت را فراهم می‌آورد.
  - طراحان صدا روی عناصر صوتی یک فیلم کار می‌کنند، از جمله افکت‌های صوتی و دیالوگ.
  - سوخت دیزل چگال‌تر است و انرژی بیشتری در هر گالن نسبت به بنزین دارد.
- source_sentence: ماده تاریک چیست؟
  sentences:
  - مطالعه موجودات بیلومینسانس می‌تواند به بهبود درک ما از فرآیندهای سلولی کمک کند.
  - رِف بزرگ مرجانی بزرگترین سیستم مرجانی جهان است که در استرالیا واقع شده است.
  - بسیاری از دانشمندان در حال انجام آزمایش‌هایی برای شناسایی مستقیم ذرات ماده تاریک هستند.
- source_sentence: کشاورزی دقیق چه معنایی دارد؟
  sentences:
  - پستانداران با وجود غده‌های شیری مشخص می‌شوند که شیر تولید می‌کنند تا فرزندان خود را تغذیه کنند و معمولاً دارای مو یا پشم
    هستند.
  - در حالی که آنتی‌بیوتیک‌ها برای درمان عفونت‌های باکتریایی استفاده می‌شوند، آنها در برابر عفونت‌های ویروسی مانند سرماخوردگی
    یا آنفولانزا بی‌اثر هستند.
  - کشاورزان از کشاورزی دقیق استفاده می‌کنند تا تصمیمات بهتری درباره کاشت، کوددهی و برداشت محصولات بگیرند.
- source_sentence: کشف رنگ تغییر می‌دهد؟
  sentences:
  - داسته‌زبان‌ها نوعی از مارمولک‌ها هستند که در بخش‌های مختلف جهان یافت می‌شوند.
  - استفاده از مالچ برای پوشاندن خاک می‌تواند به حفظ رطوبت کمک کرده و نیاز به آبیاری مکرر را کاهش دهد.
  - در حین همجوشی باکتریایی، یک سلول اهداکننده DNA را از طریق پیلاسی که ساختاری شبیه به پل است به یک سلول گیرنده منتقل می‌کند.
- source_sentence: مصریان باستان چگونه هرم‌ها را ساختند؟
  sentences:
  - جنگ سرد بر توسعه سازمان‌های بین‌المللی که به حفظ صلح و امنیت می‌پردازند، تأثیر گذاشت.
  - مزایای بیکاری بین کشورها به طور وسیعی متفاوت است، به طوری که برخی از آنها حمایت بیشتری نسبت به دیگران ارائه می‌دهند.
  - هرمی‌ها به عنوان مقبره‌هایی برای فراعنه ساخته شدند و هدف از آن‌ها تأمین عبور ایمن آن‌ها به زندگی پس از مرگ بود.
