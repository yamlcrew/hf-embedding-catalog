  - برای یک رابطه موفق از راه دور چه چیزی طول می کشد؟
  - چرا مردم ناراضی هستند؟
- source_sentence: برای تبدیل شدن به نویسنده برتر Quora ، چند بازدید و پاسخ لازم است؟
  sentences:
