- source_sentence: 'Instruct: Given a cancer patient summary, retrieve clinical trial options that are reasonable for that
    patient; or, given a clinical trial option, retrieve cancer patients who are reasonable candidates for that trial. Age:
    57

    Sex: Male

    Cancer type: Gastric adenocarcinoma (HER2‑amplified, intestinal type)

    Histology: Moderately differentiated intestinal‑type adenocarcinoma

    Current extent: Metastatic disease with hepatic metastases (dominant lesion ~4 cm in segment VII, multiple smaller lesions)
    and diffuse peritoneal carcinomatosis; bulky omental implants and moderate ascites; persistent circumferential thickening
    of the gastric cardia (~2.5 cm). No longer receiving disease‑directed therapy; transitioned to best‑supportive hospice
    care (ECOG ≈ 4).

    Biomarkers: HER2 IHC 3+, HER2 (ERBB2) amplification confirmed by FISH (ratio 5.2); Microsatellite stable (MSS); KRAS G12V
    (pathogenic); TP53 R273C (pathogenic); CDH1 G274E (likely pathogenic); PIK3CA E542K (activating); MET amplification (Copy
    number ∼6); FGFR2 amplification (Copy number ∼5); CDKN2A homozygous deletion; Tumor mutational burden ≈ 8 Mut/Mb; Ki‑67
    ∼45%; CK7⁺/CK20⁻; retained MLH1,PMS2,MSH2,MSH6.

    Treatment history:

    # 1/2018‑mid‑2018: Front‑line trastuzumab (loading 8 mg/kg then 6 mg/kg q21 d) + cisplatin 80 mg/m² iv day 1 q21 d + continuous
    infusional 5‑fu 1000 mg/m² days 1‑4 q21 d (four cycles). Best response: Partial response (shrinkage of gastric wall thickening
    and hepatic lesions).

    # Late 2018 (cycles 5‑6): Continuation of the same triplet regimen to complete six cycles; maintained partial response.

    # 12/2018: Restaging CT confirmed ongoing partial response.

    # Early 2019: Planned radical gastrectomy aborted intra‑operatively due to diffuse peritoneal disease; feeding jejunostomy
    placed.

    # 5/2019: Elective laparoscopic right hemicolectomy for synchronous ascending colon adenocarcinoma (pT1a N0 M0, R0). No
    adjuvant therapy required.

    # 6/2019 onward: Second‑line ramucirumab 10 mg/kg i.v q2 wks + weekly paclitaxel 80 mg/m² (initiated after progression
    on first‑line). Delivered two cycles; development of grade 2 peripheral sensory neuropathy led to dose reduction of paclitaxel
    to 70 mg/m² and eventual cessation after disease progression.

    # 10/2019: Further disease progression evidenced by growing hepatic metastases and new peritoneal implants; cardiology
    consulted after NSTEMI; recommendation to cease cytotoxic and anti‑angiogenic agents.

    # 1/2020: Evaluated for experimental HER2/PD‑L1 bispecific antibody trial; found ineligible due to therapeutic anticoagulation
    (apixaban) begun shortly after NSTEMI.

    # 4/2020: Transitioned to hospice/best‑supportive care; all systemic anticancer agents (incl. trastuzumab) discontinued.
    Focus shifted to symptom control (opioids, anti‑emetics, nutritional support via jejunostomy) and advance‑directive implementation.

    Cancer type: Ascending colon adenocarcinoma

    Histology: Well‑to‑moderately differentiated tubular adenocarcinoma, grade 1

    Current extent: Resected, pathologic stage IA (pT1a N0 M0), R0 margins; no evidence of disease on surveillance; no further
    therapy required.

    Biomarkers: KRAS wild‑type; BRAF V600E negative; MSI stable; CK20⁺, CDX2⁺.

    Treatment history:

    # 5/2019: Laparoscopic right hemicolectomy with regional node sampling (0/15 positive); postoperative course uncomplicated.'
