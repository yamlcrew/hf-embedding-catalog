  - source_sentence: 'Instruct: Given a cancer patient summary, retrieve clinical trial options that are reasonable for that
      patient; or, given a clinical trial option, retrieve cancer patients who are reasonable candidates for that trial. Age:
      68

      Sex: Female


      Cancer type: Primary mediastinal large B‑cell lymphoma

      Histology: Diffuse large B‑cell lymphoma, primary mediastinal type (high‑grade)

      Current extent: Locally progressive disease – bulky anterior mediastinal mass ~6 cm with partial SVC encirclement, no
      extracavitary dissemination (PET‑CT SUVmax ≈ 7.5); LDH elevated (~312 U/L)

      Biomarkers: CD19+, CD20+, CD79a+, Pax5+; Ki‑67 ≈ 80 %; MYC protein 30% (no MYC rearrangement); BCL2 strong positive
      (amplication CN = 6); BCL6 variable; CD10‑; ALK‑; MYD88 L265P (pathogenic); CD79B Y196F (activating); PIK3CA E542K (oncogenic);
      EZH2 Y641N (gain‑of‑function); TP53 R148Q (loss‑of‑function); CDKN2A homozygous deletion; CREBSBP R1400C (VUS); Other
      low‑allele‑fraction variants (KMT2D, NOTCH1, SOCS1). No detectable HSV‑EBV, HIV, HBV, HCV. LDH consistently above ULN;
      beta‑2 microglobulin within normal.


      Treatment history:

      # 7/20/2018‑10/2018: R‑CHOP ×3 cycles (rituximab, cyclophosphamide, doxorubicin, vincristine, prednisolone) – resulted
      in partial response (mass reduced from 9 cm to ~5 cm); Grade 3 neutropenia after cycle 2 rescued with filgrastim.

      # 1/2019‑2/2019: ICE ×2 cycles (ifosfamide, carboplatin, etoposide) – produced stable disease; complications included
      Grade 4 febrile neutropenia (requiring hospitalization) and Grade 2 oral mucositis.

      # Early 2019: High‑dose BEAM conditioning followed by autologous hematopoietic stem cell transplantation – engraftment
      uncomplicated; transient pancytopenia resolved.

      # 4/2019‑post‑HSCT: Observation; PET‑CT 3 months post‑transplant showed new FDG‑avid mediastinal nodes (∼6 cm) ⇒ progressive
      disease.

      # 5/2019‑present (Jan 2020): Planned/referrals –

         · Bridge therapy: rituximab 375 mg/m² weekly ×4 doses (initiated 5/2019) to control bulk while awaiting cellular
      therapy.

         · Investigational/off‑label options discussed: ibrutinib 560 mg daily (targets MYD88/CD79B pathway), tazemetostat
      800 mg BID (EZH2‑mutant disease), venetoclax (BCL2 amplified) – to be accessed via clinical trial or compassionate use.

         · Definitive option: referral for anti‑CD19 CAR‑T cell therapy (axi‑cel or lisocabtagene maraleucel) given refractoriness
      after auto‑HSCT and contraindication to further anthracyclines.

         · Continued supportive care: growth‑factor support (filgrastim/pegfilgrastim), antiviral prophylaxis (valganciclovir),
      PCP prophylaxis (TMP‑SMX), management of chemotherapy‑related nausea, and close monitoring of counts.'
