- source_sentence: 'Instruct: Given a cancer patient summary, retrieve clinical trial options that are reasonable for that
    patient; or, given a clinical trial option, retrieve cancer patients who are reasonable candidates for that trial. Age:
    16

    Sex: Male

    Cancer type: T‑cell lymphoblastic lymphoma / acute lymphoblastic leukemia (mediastinal primary)

    Histology: Precursors T‑cell lymphoblasts (TdT+, CD3+, CD7+, CD1a+, Ki‑67≈85%)

    Current extent: Advanced disease with persistent leptomeningeal involvement (thin linear enhancement ≤5 mm, partial radiologic
    response but residual disease ⇒ metastatic/CNS disease)

    Biomarkers: TdT-positive; CD3 membranous; CD7 bright; CD1a diffuse; CD99 weak focal; CD20-negative; PAX5-negative; MYELOPEROXIDASE-negative;
    KI‑67≈85%; NOTCH1 p.Leu1601Pro (activating, pathogenic, VAF ∼46%); FBXW7 p.Arg465Cys (loss‑of‑function, retained from
    diagnostic specimen); PTEN homozygous loss (heterozygous deletion, persistent); KRAS p.Gly12Asp (activating, subclonal,
    VAF ∼22% discovered 12/27/2018); Microsatellite stable (MSS)

    Treatment history:

    # 1/2017‑early 2018: Hyper‑CVAD alternating with high‑dose methotrexate (induction); intrathecal methotrexate/cytarabine/hydroxy‑corticosteroid
    twice weekly until CSF clearance; best response minimal CNS improvement, systemic disease responded partly.

    # Early 2018: Craniospinal irradiation, total dose 18 Gy in 10 fractions; resulted in stabilization of leptomeningeal
    disease but did not achieve eradication.

    # 08/2018‑Present: Nelarabine compassionate‑use protocol, Cycle 1 (30 mg/m² Days 1‑5) – caused Grade 3 febrile neutropenia
    and Grade 3 peripheral neuropathy; dose reduced 25%.

    # 09/2018‑Present: Nelarabine Cycle 2 (22.5 mg/m² Days 1‑5) – produced partial radiologic response of leptomeningeal disease
    (~30% thickness reduction), neuropathy improved to Grade 2.

    Supporting care: Filgrastim for neutropenia mitigation; prophylactic TMP‑SMX, azithromycin?, acyclovir; antihistamine
    pre‑mediation for nelarabine infusions; low‑dose prednisone 10 mg daily for symptom control; analgesics/anti‑emetics as
    needed; gabapentin for neuropathic pain; ursodeoxycholic acid added for hepatic protection.'
