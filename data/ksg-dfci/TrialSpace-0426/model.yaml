  - source_sentence: 'Instruct: Given a cancer patient summary, retrieve clinical trial options that are reasonable for that
      patient; or, given a clinical trial option, retrieve cancer patients who are reasonable candidates for that trial. Age:
      70

      Sex: Female

      Cancer type: Merkel cell carcinoma

      Histology: High‑grade neuroendocrine carcinoma (Merkel cell carcinoma), MCPyV‑positive

      Current extent: Metastatic disease with intracranial involvement – progressing left frontal brain metastasis (≈2.0 × 1.8 cm)
      and stable right cerebellar metastasis (0.9 cm); no extrathoracic or visceral disease on recent CT/PET

      Biomarkers: CK20 strong perinuclear dot‑positivity; Synaptophysin diffusely positive; Ki‑67 ≈ 85 %; PD‑L1 membrane staining
      ≈ 35 % (SP263/22C3 clones); Merkel cell polyomavirus large T antigen positive; Tumor mutational burden high (29 mut/Mb);
      Microsatellite stable; Genomics – TP53 p.R273H (VAF 42 %); RB1 homozygous deletion; NOTCH1 p.S1799L (VAF 31 %); CDKN2A
      homozygous deletion; PIK3CA p.E542K (VAF 28 %); KRAS p.G12D (VAF 24 %); PTEN homozygous deletion; TERT promoter –124 C>T
      (VAF 37 %); MYC copy-number gain (~9 copies)

      Treatment history:

      # 2017‑01‑01: Excisional biopsy of anterior chest‑wall mass establishing primary MCC (pT3 pNx);

      # 2017‑early: Wide‑local excision of chest‑wall lesion with bilateral axillary level I‑III lymphadenectomy (negative/re‑close
      margins);

      # 2017‑mid: Adjuvant external‑beam radiation therapy to chest wall and regional nodal basins, 60 Gy in 30 fractions;

      # 2017‑Mar: Initiation of avelumab 10 mg/kg IV every 2 weeks; six cycles completed by March 2017 with sustained stable
      disease;

      # 2017‑Apr (approx.): Development of two asymptomatic brain metastases (left frontal 1.2 cm, right cerebellar 0.9 cm)
      identified on MRI; proceeded to stereotactic radiosurgery (SRS) – 20 Gy single fraction to frontal lesion, 18 Gy single
      fraction to cerebellar lesion;

      # 2017‑Sep to 2018‑Jan: Continuation of avelumab with periodic imaging; February‑March 2018 MRI revealed growth of left
      frontal lesion to 2.0 cm while cerebellar lesion remained stable;

      # 2018‑May: Comprehensive NGS performed on primary tumor revealing multiple actionable mutations and high TMB;

      # 2018‑Jul: Decision made to cease avelumab due to intracranial progression; commence pembrolizumab (Keytruda) 200 mg
      IV q3 weeks; plan for repeat SRS to enlarging left frontal metastasis (≈21 Gy single fraction) with concomitant dexamethasone
      taper; alternative option of whole‑brain radiotherapy discussed; steroids initiated for edema control; supportive care
      includes fatigue mitigation, analgesia, vitamin D/calcium supplementation, antihypertensive therapy (lisnopril 10 mg
      daily), and ongoing ophthalmic and dermatologic monitoring.'
