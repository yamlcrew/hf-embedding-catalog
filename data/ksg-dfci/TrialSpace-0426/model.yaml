  - source_sentence: "Instruct: Given a cancer patient summary, retrieve clinical trial options that are reasonable for that\
      \ patient; or, given a clinical trial option, retrieve cancer patients who are reasonable candidates for that trial.\
      \ Age: 6  \nSex: Female  \nCancer type: Diffuse intrinsic pontine glioma (World Health Organization Grade IV diffuse\
      \ midline glioma, H3 K27‑altered)  \nHistology: High‑grade infiltrating astrocytic neoplasm  \nCurrent extent: Locoregional\
      \ disease confined to the dorsomedial pons; maximum transverse dimension 2.9 cm with decreased peripheral enhancement\
      \ and reduced peritumoral edema; no leptomeningeal spread, no obstructive hydrocephalus, no extraneural metastasis (stable/localized)\
      \  \nBiomarkers: H3 K27M mutation (HIST1H3B p.K27M, VAF 55 %), EGFR amplification (~6‑fold gain), PDGFRA D842V missense\
      \ mutation, CDKN2A/B homozygous deletion, TP53 Y220C missense mutation, ACVR1 R206H activating mutation, PPM1D E471*\
      \ nonsense truncation; MGMT promoter methylation status unavailable; IDH wild‑type (presumed)  \nTreatment history:\
      \  \n# 1/2017: Stereotactic needle core biopsy of the pontine lesion establishing diagnosis (pathology confirmed H3 K27M‑positive\
      \ diffuse midline glioma).  \n# Early 2017: Initiated dexamethasone 0.15 mg/kg/q6h for cerebrospinal fluid edema management.\
      \  \n# 2/2018 (~Feb 2018): Definitive focal hypofractionated external‑beam radiotherapy, 54 Gy in 15 fractions, directed\
      \ to the pontine tumor.  \n# 2/2018 Concurrent with RT: Temozolomide 75 mg/m²/day continuously for 21 days.  \n# Late 2018 (June–Oct 2018):\
      \ Four cycles of adjuvant temozolomide 150 mg/m² on days 1‑5 every 28 days; completed without serious cytopenia.  \n\
      # 04/2019: Commenced compassionate‑use oral ONC201 125 mg once weekly after radiographic progression.  \n# 09/2019:\
      \ Added erlotinib 85 mg/m² daily (≈50 mg PO daily) targeting EGFR amplification; resulted in modest tumor shrinkage\
      \ and transient symptom improvement.  \n# 09/2019: Delivered single‑fraction stereotactic radiosurgical boost, 5 Gy,\
      \ to the residual pontine lesion.  \n# 03/2020: Enrolled onto Phase I/II trial and started avapritinib 30 mg PO daily\
      \ for PDGFRA D842V inhibition; ongoing as of latest follow‑up.  \n# Throughout 2017‑2020: Periodic dexamethasone tapers\
      \ for edema, ondansetron PRN for nausea, acetaminophen PRN for pain/fever, vitamin supplementation, and seve​lamerin\
      \ for Grade 2 hyperphosphatemia induced by avapritinib (initiated March 2020).  \nResponse overview: Initial post‑RT\
      \ partial response (size ↓ to 2.7 cm), subsequent stabilization on temozolomide, disease progression prompting ONC201,\
      \ transient stabilisation/additive shrinkage with erlotinib ± radiosurgical boost, and most recent MRI (August 2020)\
      \ documenting partial radiographic response to avapritinib (dimension ↓ to 2.9 cm, decreased enhancement)."
