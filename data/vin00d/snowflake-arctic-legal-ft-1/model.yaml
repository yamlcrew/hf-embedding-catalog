  sentences:
  - 'Glossary of Legal Terms

    Find deﬁnitions of legal terms to help understand the federal

    court system.

    A

    Acquittal

    A jury verdict that a criminal defendant is not guilty, or the finding of a judge that the

    evidence is insufficient to support a conviction.

