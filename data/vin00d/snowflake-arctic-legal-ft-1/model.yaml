  - 'A serious crime, usually punishable by at least one year in prison.

    File

    To place a paper in the official custody of the clerk of court to enter into the files or records

    of a case.

    Fraudulent transfer

    A transfer of a debtor''s property made with intent to defraud or for which the debtor

    receives less than the transferred property''s value.

    Fresh start

    The characterization of a debtor''s status after bankruptcy, i.e., free of most debts. (Giving

    debtors a fresh start is one purpose of the Bankruptcy Code.)

    G

    Grand jury

    A body of 16-23 citizens who listen to evidence of criminal allegations, which is presented by

    the prosecutors, and determine whether there is probable cause to believe an individual'
  - '-3-

    Argument:  A reason given in proof or rebuttal to persuade a judge or jury.

    At Issue:  Whenever the parties to an action come to a point in the pleadings or argument which

    is affirmed on one side and denied on the other, the points  are said to be "at issue".

    Attachment:  The taking of property into legal custody by an enforcement officer (See specialty

    section: Recovery of Chattel).

    Attestation:  The act of witnessing an instrument in writing at the request of the party making the

    instrument and signing  it as a witness.

    Attorney of Record:  Attorney whose name appears in the court’s  records or files of a case.

    Award:  A decision of an Arbitrator, judge or jury.

