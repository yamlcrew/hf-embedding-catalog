    A person appointed in a Chapter 7 case to represent the interests of the bankruptcy estate

    and the creditors. The trustee''s responsibilities include reviewing the debtor''s petition and

    schedules, liquidating the property of the estate, and making distributions to creditors. The

    trustee may also bring actions against creditors or the debtor to recover property of the

    bankruptcy estate.

    Chapter 9'
  - '-19-

    Trial De Novo:  A new trial (See 22NYCRR 28.12).

    -U-

    Undertaking:  Deposit of a sum of money or filing of a bond in court, to secure some actual or

    potential obligation.

    -V-

    Vacate:  To set aside or undo a previous action or order.

    Venire:  Technically, a writ summoning persons to court to act as jurors; popularly used as meaning

    the body of names thus summoned.

    Venue:  (a) Geographical place where some legal matter occurs or may be determined. (b) The

    geographical area within which a court has jurisdiction. It relates only to a place or territory within

    which either party may require a case to be tried. A defect in venue may be waived by the parties.'
