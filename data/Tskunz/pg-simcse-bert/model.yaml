- source_sentence: ' happen fast. For example, Y Combinator has now invested in 80 startups, 57 of which are still alive.
    (The rest have died or merged or been acquired.) When you''re trying to advise 57 startups, it turns out you have to have
    a stateless algorithm. You can''t have ulterior motives when you have 57 things going on at once, because you can''t remember
    them. So our rule is just to do whatever''s best for the founders. Not because we''re particularly benevolent, but because
    it''s the only algorithm that works on that scale. When you write something telling people to be good, you seem to be
    claiming to be good yourself. So I want to say explicitly that I am not a particularly good person. When I was a kid I
    was firmly in the camp of bad. The way adults used the word good, it seemed to be synonymous with quiet, so I grew up
    very suspicious of it. You know how there are some people whose names come up in conversation and everyone says "He''s
    such a great guy?" People never say that about me. The best I get is "he means well." I am not claiming to be good. At
    best I speak good as a second language. So I''m not suggesting you be good in the usual sanctimonious way. I''m suggesting
    it because it works.'
