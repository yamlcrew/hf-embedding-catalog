- source_sentence: t started. [5]It can be dangerous to delay turning yourself into a company, because one or more of the
    founders might decide to split off and start another company doing the same thing. This does happen. So when you set up
    the company, as well as as apportioning the stock, you should get all the founders to sign something agreeing that everyone's
    ideas belong to this company, and that this company is going to be everyone's only job.[If this were a movie, ominous
    music would begin here.]While you're at it, you should ask what else they've signed. One of the worst things that can
    happen to a startup is to run into intellectual property problems. We did, and it came closer to killing us than any competitor
    ever did. As we were in the middle of getting bought, we discovered that one of our people had, early on, been bound by
    an agreement that said all his ideas belonged to the giant company that was paying for him to go to grad school. In theory,
    that could have meant someone else owned big chunks of our software. So the acquisition came to a screeching halt while
    we tried to sort this out. The problem was, since we'd been about to be acquired, we'd allowed ourselves to run low on
    cash
