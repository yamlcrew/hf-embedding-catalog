      Điều_lệ này , Quy_chế_tài_chính , các quy_chế quản_lý nội_bộ của VNPT và các quy_định khác của pháp_luật , Tổng Giám_đốc
      quyết_định : Các dự_án đầu_tư ; hợp_đồng mua , bán tài_sản . Các hợp_đồng vay , thuê , cho thuê và hợp_đồng khác . Phương_án
      sử_dụng vốn , tài_sản của VNPT để góp vốn , mua cổ_phần của các doanh_nghiệp . Ban_hành các quy_định , quy Trình nội_bộ
      phục_vụ công_tác quản_lý , Điều_hành sản_xuất kinh_doanh của VNPT. Quyết_định thành_lập , giải_thể , tổ_chức lại các
      đơn_vị kinh_tế hạch_toán phụ_thuộc đơn_vị trực_thuộc của VNPT.'
    - 'Thẩm_quyền quyết_định đối_với sĩ_quan Thẩm_quyền bổ_nhiệm , miễn_nhiệm , cách_chức , phong , thăng , giáng , tước quân_hàm
