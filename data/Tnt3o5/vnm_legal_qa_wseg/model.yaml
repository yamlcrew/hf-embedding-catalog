    sentences:
    - 'Nhiệm_vụ cụ_thể của các thành_viên Hội_đồng Ngoài việc thực_hiện các nhiệm_vụ quy_định tại Điều_5 của Quy_chế này ,
      Thành_viên Hội_đồng còn có nhiệm_vụ cụ_thể sau đây : Thành_viên Hội_đồng là Lãnh_đạo Vụ Pháp_chế có nhiệm_vụ giúp Chủ_tịch
      , Phó Chủ_tịch Hội_đồng , Hội_đồng , điều_hành các công_việc thường_xuyên của Hội_đồng ; trực_tiếp lãnh_đạo Tổ Thường_trực
      ; giải_quyết công_việc đột_xuất của Hội_đồng khi cả Chủ_tịch và Phó Chủ_tịch Hội đồng_đều đi vắng . Thành_viên Hội_đồng
      là Lãnh_đạo Vụ An_toàn giao_thông có nhiệm_vụ trực_tiếp theo_dõi , đôn_đốc , kiểm_tra và phối_hợp với thủ_trưởng các
      cơ_quan , đơn_vị thuộc Bộ , Thành_viên Hội_đồng là Lãnh_đạo Văn_phòng Ủy_ban ATGTQG , Giám_đốc Sở GTVT , Chủ_tịch Tập_đoàn
      VINASHIN , Tổng giám_đốc các Tổng Công_ty : Hàng_hải Việt_Nam , Đường_sắt Việt_Nam , Hàng_không Việt_Nam chỉ_đạo công_tác
      tuyên_truyền PBGDPL về trật_tự , an_toàn giao_thông .'
    - 'Nhiệm_vụ , quyền_hạn của Tổng Giám_đốc Trình Hội_đồng thành_viên VNPT để Hội_đồng thành_viên Trình cơ_quan nhà_nước
      có thẩm_quyền quyết_định hoặc phê_duyệt các nội_dung thuộc quyền của chủ sở_hữu đối_với VNPT theo quy_định của Điều_lệ
      này . Trình Hội_đồng thành_viên VNPT xem_xét , quyết_định các nội_dung thuộc thẩm_quyền của Hội_đồng thành_viên VNPT.
      Ban_hành quy_chế quản_lý nội_bộ sau khi Hội_đồng thành_viên thông_qua . Theo phân_cấp hoặc ủy_quyền theo quy_định của
      Điều_lệ này , Quy_chế_tài_chính , các quy_chế quản_lý nội_bộ của VNPT và các quy_định khác của pháp_luật , Tổng Giám_đốc
      quyết_định : Các dự_án đầu_tư ; hợp_đồng mua , bán tài_sản . Các hợp_đồng vay , thuê , cho thuê và hợp_đồng khác . Phương_án
      sử_dụng vốn , tài_sản của VNPT để góp vốn , mua cổ_phần của các doanh_nghiệp . Ban_hành các quy_định , quy Trình nội_bộ
      phục_vụ công_tác quản_lý , Điều_hành sản_xuất kinh_doanh của VNPT. Quyết_định thành_lập , giải_thể , tổ_chức lại các
      đơn_vị kinh_tế hạch_toán phụ_thuộc đơn_vị trực_thuộc của VNPT.'
    - 'Thủ_tục xóa tên Hội_viên Thủ_tục xóa tên : Việc xóa tên Hội_viên do Văn_phòng Hội đề_nghị , Ban Thường_trực Hội xem_xét
      đề_nghị Chủ_tịch Hội quyết_định . Sau khi có quyết_định xóa tên Hội_viên , Văn_phòng Hội có trách_nhiệm thông_báo đến
      Hội_viên bị xóa tên và công_khai theo quy_chế của Hội .'
  - source_sentence: Ai có quyền quyết_định thành_lập Hội_đồng Giám_định y_khoa cấp tỉnh ? Hội_đồng có tư_cách pháp_nhân không
      ?
    sentences:
    - Thẩm_quyền thành_lập Hội_đồng giám_định y_khoa các cấp Hội_đồng giám_định y_khoa cấp tỉnh do cơ_quan chuyên_môn thuộc
      Ủy_ban_nhân_dân tỉnh quyết_định thành_lập . Hội_đồng giám_định y_khoa cấp trung_ương do Bộ_Y_tế quyết_định thành_lập
      . Bộ Quốc_phòng , Bộ_Công_An , Bộ_Giao_thông_Vận_tải căn_cứ quy_định của Thông_tư này để quyết_định thành_lập Hội_đồng
      giám_định y_khoa các Bộ theo quy_định tại điểm_b Khoản_2 Điều_161 Nghị_định số 131/2021/NĐCP.
    - Phát_ngôn và tổ_chức cung_cấp thông_tin định_kỳ của Bộ_Kế_hoạch_và_Đầu_tư Người phát_ngôn của Bộ_Kế_hoạch_và_Đầu_tư
      là đầu_mối chịu trách_nhiệm giúp Bộ_trưởng tổ_chức cung_cấp thông_tin định_kỳ cho báo_chí .
    - Thẩm_quyền duyệt kế_hoạch Đại_hội Đoàn các cấp Ban Thường_vụ Đoàn cấp trên trực_tiếp có trách_nhiệm và thẩm_quyền duyệt
      kế_hoạch Đại_hội Đoàn các đơn_vị trực_thuộc . Ban Bí_thư Trung_ương Đoàn duyệt kế_hoạch Đại_hội Đoàn cấp tỉnh .
  - source_sentence: Ai có quyền ký hợp_đồng cộng tác_viên với người đáp_ứng đủ tiêu_chuẩn có nguyện_vọng làm Cộng tác_viên
      pháp điển ?
    sentences:
    - Thẩm_quyền , trách_nhiệm của các đơn_vị thuộc Bộ_Tư_pháp trong việc quản_lý , sử_dụng Cộng tác_viên Các đơn_vị thuộc
      Bộ_Tư_pháp Thủ_trưởng đơn_vị thực_hiện pháp điển có quyền ký hợp_đồng cộng_tác với người đáp_ứng đủ tiêu_chuẩn quy_định
      tại Điều_2 Quy_chế này , có nguyện_vọng làm Cộng tác_viên theo nhu_cầu thực_tế và phạm_vi , tính_chất công_việc thực_hiện
      pháp điển của đơn_vị ; thông_báo cho Cục Kiểm_tra văn_bản quy_phạm pháp_luật về việc ký hợp_đồng thuê Cộng tác_viên
      và tình_hình thực_hiện công_việc của Cộng tác_viên . Đơn_vị thực_hiện pháp điển không được sử_dụng cán_bộ , công_chức
      , viên_chức thuộc biên_chế của đơn_vị làm Cộng tác_viên với đơn_vị mình . Thủ_trưởng đơn_vị thuộc Bộ_Tư_pháp thực_hiện
      pháp điển có_thể tham_khảo Danh_sách nguồn Cộng tác_viên do Cục Kiểm_tra văn_bản quy_phạm pháp_luật lập để ký hợp_đồng
      thuê Cộng tác_viên thực_hiện công_tác pháp điển thuộc thẩm_quyền , trách_nhiệm của đơn_vị mình .
    - '" Điều Nghĩa_vụ và quyền chăm_sóc , nuôi_dưỡng Cha , mẹ có nghĩa_vụ và quyền ngang nhau , cùng nhau chăm_sóc , nuôi_dưỡng
      con chưa thành_niên , con đã thành_niên mất năng_lực hành_vi dân_sự hoặc không có khả_năng lao_động và không có tài_sản
      để tự nuôi mình . Con có nghĩa_vụ và quyền chăm_sóc , nuôi_dưỡng cha_mẹ , đặc_biệt khi cha_mẹ mất năng_lực hành_vi dân_sự
      , ốm_đau , già_yếu , khuyết_tật ; trường_hợp gia_đình có nhiều con thì các con phải cùng nhau chăm_sóc , nuôi_dưỡng
      cha_mẹ . "'
    - Thẩm_quyền phong , thăng , giáng , tước cấp_bậc hàm , nâng lương sĩ_quan , hạ sĩ_quan , chiến_sĩ ; bổ_nhiệm , miễn_nhiệm
      , cách_chức , giáng chức các chức_vụ ; bổ_nhiệm , miễn_nhiệm chức_danh trong Công_an nhân_dân Chủ_tịch_nước phong ,
      thăng cấp_bậc hàm_cấp tướng đối_với sĩ_quan Công_an nhân_dân . Thủ_tướng_Chính_phủ bổ_nhiệm chức_vụ Thứ_trưởng Bộ_Công_An
      ; quyết_định nâng lương cấp_bậc hàm Đại_tướng , Thượng_tướng . Bộ_trưởng Bộ_Công_An quyết_định nâng lương cấp_bậc hàm
      Trung_tướng , Thiếu_tướng ; quy_định việc phong , thăng , nâng lương các cấp_bậc hàm , bổ_nhiệm các chức_vụ , chức_danh
      còn lại trong Công_an nhân_dân . Người có thẩm_quyền phong , thăng cấp_bậc hàm nào thì có thẩm_quyền giáng , tước cấp_bậc
      hàm đó ; mỗi lần chỉ được thăng , giáng 01 cấp_bậc hàm , trừ trường_hợp đặc_biệt mới xét thăng , giáng nhiều cấp_bậc
      hàm . Người có thẩm_quyền bổ_nhiệm chức_vụ nào thì có thẩm_quyền miễn_nhiệm , cách_chức , giáng chức đối_với chức_vụ
      đó . Người có thẩm_quyền bổ_nhiệm chức_danh nào thì có thẩm_quyền miễn_nhiệm đối_với chức_danh đó .
  - source_sentence: Ai có quyền_hủy bỏ kết_quả bầu_cử và quyết_định bầu_cử lại đại_biểu Quốc_hội ?
    sentences:
    - Cơ_cấu tổ_chức Tổng cục_trưởng Tổng_cục Hải_quan quy_định nhiệm_vụ và quyền_hạn của các Phòng , Đội , Hải_Đội thuộc
      và trực_thuộc Cục Điều_tra chống buôn_lậu .
    - 'Thẩm_quyền lập biên_bản_vi_phạm hành_chính trong lĩnh_vực Kiểm_toán_Nhà_nước_Người có thẩm_quyền lập biên_bản_vi_phạm
      hành_chính trong lĩnh_vực Kiểm_toán_Nhà_nước quy_định tại Điều_15 của Pháp_lệnh số { 04 / 2023 / UBTVQH15 , } bao_gồm
      : Kiểm toán_viên nhà_nước ; Tổ_trưởng tổ kiểm_toán ; Phó trưởng_đoàn kiểm_toán ; Trưởng_đoàn kiểm_toán ; đ ) Kiểm toán_trưởng
      . Trường_hợp người đang thi_hành nhiệm_vụ kiểm_toán , kiểm_tra thực_hiện kết_luận , kiến_nghị kiểm_toán , nhiệm_vụ tiếp_nhận
      báo_cáo cáo định_kỳ hoặc nhiệm_vụ khác mà không phải là người có thẩm_quyền lập biên_bản_vi_phạm hành_chính , nếu phát_hiện_hành_vi
      vi_phạm hành_chính trong lĩnh_vực Kiểm_toán_Nhà_nước thì phải lập biên_bản làm_việc để ghi_nhận sự_việc và chuyển ngay
      biên_bản làm_việc đến người có thẩm_quyền để lập biên_bản_vi_phạm hành_chính theo quy_định .'
    - Hủy_bỏ kết_quả bầu_cử và quyết_định bầu_cử lại Hội_đồng_Bầu_cử_Quốc_gia tự mình hoặc theo đề_nghị của Ủy_ban_Thường_vụ_Quốc_hội
      , Chính_phủ , Ủy_ban trung_ương Mặt_trận_Tổ_quốc Việt_Nam , Ủy_ban bầu_cử ở tỉnh Hủy_bỏ kết_quả bầu_cử ở khu_vực bỏ_phiếu
      , đơn_vị bầu_cử có vi_phạm_pháp_luật nghiêm_trọng và quyết_định ngày bầu_cử lại ở khu_vực bỏ_phiếu , đơn_vị bầu_cử đó
      . Trong trường_hợp bầu_cử lại thì ngày bầu_cử được tiến_hành chậm nhất là 15 ngày sau ngày bầu_cử đầu_tiên . Trong cuộc
      bầu_cử lại , cử_tri chỉ chọn bầu trong danh_sách những người ứng_cử tại cuộc bầu_cử đầu_tiên .
  - source_sentence: Ai có quyền đăng_ký sáng_chế ?
    sentences:
    - “ Điều Kiểm_tra , giám_sát tài_chính Công_đoàn Công_đoàn cấp trên hướng_dẫn , kiểm_tra và giám_sát việc thực_hiện công_tác
      tài_chính của công_đoàn cấp dưới theo quy_định của pháp_luật và quy_định của Tổng Liên_đoàn Lao_động Việt_Nam . Cơ_quan
      kiểm_tra của Công_đoàn kiểm_tra việc quản_lý , sử_dụng tài_chính của Công_đoàn theo quy_định của pháp_luật và quy_định
      của Tổng Liên_đoàn Lao_động Việt_Nam . Cơ_quan nhà_nước có thẩm_quyền giám_sát , kiểm_tra , thanh_tra , kiểm_toán việc
      quản_lý , sử_dụng tài_chính của Công_đoàn theo quy_định của pháp_luật . ”
    - '" Điều Thẩm_quyền quyết_định tạm hoãn gọi nhập_ngũ , miễn gọi nhập_ngũ và công_nhận hoàn_thành nghĩa_vụ quân_sự tại_ngũ
      Chủ_tịch Ủy_ban_nhân_dân cấp huyện quyết_định tạm hoãn gọi nhập_ngũ và miễn gọi nhập_ngũ đối_với công_dân quy_định tại
      Điều_41 của Luật này . Chỉ huy_trưởng Ban chỉ_huy quân_sự cấp huyện quyết_định công_nhận hoàn_thành nghĩa_vụ quân_sự
      tại_ngũ đối_với công_dân quy_định tại Khoản_4 Điều_4 của Luật này . "'
    - 'Quyền đăng_ký sáng_chế , kiểu_dáng công_nghiệp , thiết_kế bố_trí Tổ_chức , cá_nhân sau đây có quyền đăng_ký sáng_chế
      , kiểu_dáng công_nghiệp , thiết_kế bố_trí : Tác giả_tạo ra sáng_chế , kiểu_dáng công_nghiệp , thiết_kế bố_trí bằng công_sức
      và chi_phí của mình ; Tổ_chức , cá_nhân đầu_tư kinh_phí , phương_tiện vật_chất cho tác_giả dưới hình_thức giao việc
      , thuê việc , tổ_chức , cá_nhân được giao quản_lý nguồn gen cung_cấp nguồn gen , tri_thức truyền_thống về nguồn gen
      theo hợp_đồng tiếp_cận nguồn gen và chia_sẻ lợi_ích , trừ trường_hợp các bên có thỏa_thuận khác hoặc trường_hợp quy_định
      tại Điều_86a của Luật này . Trường_hợp nhiều tổ_chức , cá_nhân cùng nhau tạo ra hoặc đầu_tư để tạo ra sáng_chế , kiểu_dáng
      công_nghiệp , thiết_kế bố_trí thì các tổ_chức , cá_nhân đó đều có quyền đăng_ký và quyền đăng_ký đó chỉ được thực_hiện
      nếu được tất_cả các tổ_chức , cá_nhân đó đồng_ý . Tổ_chức , cá_nhân có quyền đăng_ký quy_định tại Điều này có quyền
      chuyển_giao quyền đăng_ký cho tổ_chức , cá_nhân khác dưới hình_thức hợp_đồng bằng văn_bản , để thừa_kế hoặc kế_thừa
      theo quy_định của pháp_luật , kể_cả trường_hợp đã nộp đơn đăng_ký .'
