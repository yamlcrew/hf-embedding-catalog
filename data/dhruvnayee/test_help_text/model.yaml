    sentences:
    - "## Inheritance rules for the dimension start positions of an array variable\n\nAn array variable inherits the dimension\
      \ start positions of the array variables in its formula\naccording to the points below.\n\nIt is not necessary for different\
      \ assignments for an array variable to return the same start\nposition. For example, the following formula is valid\
      \ even when Array_2 and Array_3 have different\ndimension start positions:\n\nIf Scalar_A > 3 Then\n      Array_2\n\
      Else\n      Array_3\nEndIf\n\nAn array variable inherits the dimension start positions (and hence the element position\
      \ numbers)\n                        of the arrays (after any function calls) used in its formula. It is not\n      \
      \                  necessary for these to be identical. If the start positions in any dimension\n                  \
      \      differ between arrays in a formula then\n\nR³S Modeler\n\nsets the\n                        start position in\
      \ that dimension in the calculated array to the default\n                        value of 1. A message will be added\
      \ to the\n\nIndex\n                              and Position Warnings\n\nfolder of the\n\nRun summary\n\nto\n     \
      \                   indicate this has happened.\n\nSimple mathematical operations on an array will preserve the dimension\
      \ start positions.\n\nAccessing a subset of an array with an expression like\n\nArray_1[<Fund\n\n.position\n\n= 3 :\n\
      6>]\n\nwill cause the dimension start positions in the resulting array to be set so as to\npreserve the numbering of\
      \ the element positions for all its elements. In this example, the start\nposition of the dimension Fund will be set\
      \ to 3 in the resulting array.\n\nFunctions of arrays generally produce an array with the same dimension start positions\
      \ as the\ninherited dimensions."
    - "## Example 1: Step_Length_PS\n\nProperty | Value\nName | Step_Length_PS\nCategory | \nDescription | \nDocumentation\
      \ | \n\nThis layer module contains no sub layer modules and just one layer variable:\n\nVariable | Layer module | Formula\n\
      Step_Length_PS | Step_Length_PS | Duration(Step_Date.start, Step_Date.end, \"Years\", \"One\", \"Exact\")\n\nThis layer\
      \ module is a sub layer module of the layer module Expense_Renewal."
    - '## Accessing a subset of an array


      Any dimension indices will always be inherited when accessing a subset of another array with an

      expression like Array_1[<Fund


      .position


      = 3 : 6>] or Array_1[<Fund


      .position


      = First_Fund :

      Last_Fund>]. When it is not possible to determine both the start and end indices or element

      positions (that is, the variables First_Fund and Last_Fund in the second example) until runtime and

      the subset of the array variable is used in a mathematical expression then an index and position

      warning message will be issued to state that the indices for a dimension may not match, and if not

      that only one of the set of indices will be used which may lead to runtime errors or misleading

      results.'
  - source_sentence: What kind of variable is Data_Process_Name considered?
    sentences:
    - 'Data_Process_Name


      The


      Data_Process_Name


      system variable is a character variable that gives the name of the data process.


      You can use this system variable in a data process in the data layer of a model.


      This system variable is a placeholder variable.'
    - "Assumption set example 4:\n        Traditional_Reserve_Assumptions\n\nAn assumption set used as the assumption set\
      \ of a sub layer containing an assumption set\nvariable that references an assumption set variable in the assumption\
      \ set of the calling layer using\nthe\n\nSource\n\nqualifier.\n\nThis example describes the assumptions that might be\
      \ used in a sub layer to calculate reserve\nprovisions.\n\nAssumption set local properties:\n\nProperty | Value\nName\
      \ | Traditional_Reserve_Assumptions\nCategory | Traditional_Component\nDescription | Traditional (non-linked without-profit)\
      \ reserve assumptions\nAssumption connection string | \n\nThis assumption set has no sub assumption sets.\n\nThis assumption\
      \ set contains several assumption set variables. These variables have the following\nglobal properties (they all have\
      \ their\n\nAggregates\n\nand\n\nPortfolio\n\nproperties set to\n\nNo\n\n):\n\nVariable | Data type | Display format\n\
      Disc_Rate_Reserve | Numeric | Per cent\nMort_Table_F | Life table | [None]\nMort_Table_M | Life table | [None]\n\nThey\
      \ have the following local properties in this assumption set (they all have their\n\nAssumption table\n\nproperty left\
      \ blank):\n\nVariable | Formula\nDisc_Rate_Reserve | Max(Source.Int_Rate - 3%, 0%)\nMort_Table_F | 105% *AM92\nMort_Table_M\
      \ | 120% * AM92 + 1‰\n\nNotes:\n\n* TheSourcequalifier in the formula of Disc_Rate_Reserve specifies that the value\
      \ of Int_Rate in\nthe calling layer is to be used.\n* The per cent (%) and per mille (‰) characters may be included\
      \ in formulas and have the\neffect of dividing by 100 and 1000 respectively, so 3% is interpreted as 0.03 and 1‰ is\n\
      interpreted as 0.001.\n\nThis assumption set is specified in the local properties of the sub layers Reserve_Sub_Layer\
      \ and\nReserve_Sub_Layer_2 of the layer\n\nRealistic_Layer\n\nof the\nmodel\n\nEV_Model\n\n."
    - '## New system variables


      The system variables


      Data_Process_Name


      ,


      Data_Source_Name


      ,


      Layer_Name


      , and


      Program_Name


      are placeholder variables.'
  - source_sentence: Is there a specific location where I can find workspace filters?
    sentences:
    - '## Windows


      You can access the filters of a workspace in the grid of filters.


      The filter window has most properties of the filter.'
    - 'Category examples


      The example user workspace includes examples of categories.


      Some categories that might be useful in a present value of future profits model include:


      Name | Category type | Description

      Ages_Dates_Durations |  | Items relating to ages, dates and durations

      Asset_Shares |  | Items relating to asset shares

      Benefits |  | Items relating to benefits

      Bonuses |  | Items relating to bonuses

      Cash_Flow_Module | Modules | Module for general cash flows

      Cash_Flows |  | Items relating to cash flows

      Commission |  | Items relating to commission

      Commutation_Function_Reserve_Module | Modules | Module for reserving using commutation functions

      Decrements |  | Decrement tables and rates

      Economic |  | Economic assumptions and variables

      EU | Data flow | EU non-linked data

      Data flow |  | Items relating to expenses

      Flags |  | Items that are set as flags

      Fund_Charges |  | Items related to unit fund charges

      General_Module | Modules | Module suitable for many situations

      Interest |  | Items relating to interest

      Maturities |  | Items relating to maturities

      Mortality |  | Items relating to mortality

      Multiple_Currencies |  | Component for use with a multiple currency model

      NP_End | Data flow | Programs, data sources, and so on, for non-profit endowment assurances

      NP_Term | Data flow | Programs, data sources and so on for non-profit term assurances

      NP_WoL | Data flow | Programs, data sources, and so on, for non-profit whole of life assurances

      Policy |  | Items relating to policies

      Premiums |  | Items relating to premiums

      Probabilities |  | Items relating to probabilities

      Profit |  | Items relating to profit

      PVFP |  | Items relating to present value of future profits

      PVFP_Module | Modules | Module for present value of future profits

      Reserve_Module | Modules | Module for reserving by projection of cash flows

      Reserves |  | Items relating to reserves

      Solvency_Margin |  | Items relating to solvency margin

      Statistics |  | Items relating to statistics

      Surrenders |  | Items relating to surrenders

      Tax |  | Items relating to tax

      Traditional | Data flow | Traditional/non-profit/conventional non-linked business

      Traditional_Component |  | Traditional/conventional/non-linked/non-profit business component

      UK | Data flow | UK non-linked data

      Data flow | Data flow | Unit-linked endowment assurance

      Unit_Fund |  | Items related to the unit fund

      Unit_Linked | Data flow | Programs, and so on, for unit linked business

      Unit_Linked_Component |  | Unit-linked business component

      Unit_Linked_Module | Modules | Module for unit-linked business

      US | Data flow | US non-linked data

      Valuation |  | Items relating to valuations


      Categories provide the items on a drop-down list in the


      Category


      property that can be used to help organize related components.


      There are different possible values for the Category type property, including:


      * If the category type is left blank, it may be used for most components. For example, there are assumption set variables
      within assumption sets, events and variables within modules that have the category Expenses.

      * Modules- This type of category applies only to modules, initialization modules and layer modules. For example, the
      modules NP_End_PVFP, NP_Term_PVFP and NP_WoL_PVFP have the modules category PVFP_Module.

      * Data flow- This type of category applies only to data sources and programs. Data from a

      data source will only be processed by programs assigned to the same category as that data source, so

      data flow categories can be used to control the flow of data through a model. For example, in the

      modelEV_Model, the data sources in the data process

      Traditional_Data_Process have the data flow category Traditional and will only pass to the programs

      in the projection processRealistic_Projectionthat have the data flow category Traditional.'
    - "Find/Replace Panel\n\nSee\n\nchoosers and panels\n\nfor information on\n    displaying the Find/Replace Panel.\n\n\
      The Find/Replace Panel allows you to search for specific text in the\n\nproperties\n\nof the\n\ncomponents\n\nof the\
      \ open\n\nworkspaces\n\nand\n\nresults workspaces\n\n.\n\nYou should enter the text for which you wish to search in\
      \ the\n\nFind what\n\nedit field.\n\nYou should select the parts of the open workspaces and results workspaces within\
      \ which you\n    wish to search in the tree under\n\nWithin\n\n.\n\nYou can select multiple items discontinuously by\
      \ holding down the\n\nCtrl\n\nkey while clicking with the mouse.\n\nYou can use the\n\nName\n\n,\n\nFormula\n\nand\n\
      \nAll\n     fields\n\ncheckboxes to specify whether the search should include the\n\nName\n\nproperty, the\n\nFormula\n\
      \nproperty or all properties, respectively. You\n    must check at least one of these checkboxes so that there are some\
      \ properties in which to\n    search.\n\nYou can also select further search options:\n\n* Match case- check this checkbox\
      \ to perform a case-sensitive search\n* Match whole- check this checkbox to exclude matches with parts of words, including\n\
      \     names of variables and components\n* Ignore spaces- check this checkbox to ignore all white space in the properties\
      \ being\n     searched\n* Ignore info fields- check this checkbox to exclude theDescription,Documentation,Last modified,Modified\
      \ by,Path,Protected byandReserved byproperties.\n\nYou should press the\n\nFind\n\nbutton to start the search.\n\nAfter\
      \ searching the lower pane will display the number of occurrences of the text that have\n    been found and provide\
      \ a tree showing where these are. You can double-click on any of the\n    results to open that component in the Central\
      \ Window, with the found item selected.\n\nYou can select items in the tree if you wish to replace the found text in\
      \ these items. You\n    should then type the text to replace the found text in the\n\nReplace with\n\nedit field and\
      \ click the\n\nReplace\n\nbutton.\n\nThe read-only icon\n\nnext to a tree\n    item indicates that it has been\n\nprotected\n\
      \nand so none of its\n    text can be replaced using this feature.\n\nYou can drag or copy tree items from the Find/Replace\
      \ Panel into the\n\nCentral Window\n\n."
