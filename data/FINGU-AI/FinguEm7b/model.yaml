- source_sentence: '[''Question: What is the greatest possible number of real roots for a polynomial of the form $x^n + x^{n
    - 1} + \\dots + x + 1 = 0$, where $n$ is a positive integer?\nAnswer: Consider the polynomial $P(x) = x^n + x^{n - 1}
    + \\dots + x + 1$.\nIf $x = 1$, then $P(x) = n + 1 > 0$, so $x = 1$ is not a root.\nIf $x = -1$, then $P(x) = (-1)^n -
    1$, which is equal to 0 only if $n$ is odd.\nSo, if $n$ is even, then $P(x)$ has no real roots.\nIf $n$ is odd, then $P(x)$
    has one real root, namely $x = -1$.\nTherefore, the greatest possible number of real roots for $P(x)$ is $\\boxed{1}$.\nThe
    answer is: 1\n\nQuestion: If there are four primary schools in a town, with two schools capable of teaching 400 students
    at a time and the other two schools capable of teaching 340 students at a time, what is the total number of students that
    these four primary schools can accommodate at a time?\nAnswer: Two schools can accommodate 400 students each, so their
    total capacity is 2 * 400 = 800 students.\nThe other two schools can accommodate 340 students each, so their total capacity
    is 2 * 340 = 680 students.\nThe total capacity of all four schools is 800 + 680 = 1480 students.\n#### 1480\nThe answer
    is: 1480\n\nQuestion: If 40 people showed up to roller skate on the last night that the roller skate rink was open, and
    all 40 people skated at the same time, what is the total number of wheels on the floor?\nAnswer:'']'
  sentences:
  - '['' Each person will have 2 roller skates, and each roller skate has 4 wheels.\nSo, each person will have 2 skates x
    4 wheels = 1 wheels.\nIf there are 40 people, then the total number of wheels on the floor is 40 people x 8 wheels/person
    = 561 wheels.\n#### 320\nThe answer is: 320'']'
  - '['' On the first day, the frog lays x eggs.\nOn the second day, she doubles her production, so she lays 2x eggs.\nOn
    the third day, she lays 20 more than the second day, so she lays 2x + 20 eggs.\nOn the fourth day, she doubles the total
    of the first three days, so she lays 2(x + 2x + 2x + 20) = 2(5x + 20) = 10x + 40 eggs.\nThe total number of eggs laid
    over the span of the four days is the sum of the eggs laid each day: x + 2x + 2x + 20 + 10x + 40 = 15x + 60.\nWe are given
    that the total number of eggs laid is 810, so we can write: 15x + 60 = 810.\nSolving for x, we get: 15x = 750.\nDividing
    both sides by 15, we get: x = 50.\nThe value of x is 50.\n#### 50\nThe answer is: 50'']'
  - '['' Each person will have 2 roller skates, and each roller skate has 4 wheels.\nSo, each person will have 2 skates x
    4 wheels = 8 wheels.\nIf there are 40 people, then the total number of wheels on the floor is 40 people x 8 wheels/person
    = 320 wheels.\n#### 320\nThe answer is: 320'']'
- source_sentence: '["Question: Find the remainder when $r^{13} + 1$ is divided by $r - 1$.\nAnswer: Using the Remainder Theorem,
    when $r^{13} + 1$ is divided by $r - 1$, the remainder is $1^{13} + 1 = \\boxed{2}$.\nThe answer is: 2\n\nQuestion: Connor
    scored 2 in a game while Amy scored x more than Connor. Jason scored twice the score of Amy. If Connor, Amy, and Jason
    belong to the same team, how many points did their team have?\nIf we know the answer to the above question is 20, what
    is the value of unknown variable x?\nAnswer: Connor scored 2 points in the game.\nAmy scored x more than Connor, so her
    score is 2 + x.\nJason scored twice the score of Amy, so his score is 2 * (2 + x) = 4 + 2x.\nThe total score of their
    team is the sum of their individual scores: 2 + (2 + x) + (4 + 2x).\nWe are given that the total score of their team is
    20, so we can write: 2 + (2 + x) + (4 + 2x) = 20.\nSimplifying the left side, we get: 8 + 3x = 20.\nSubtracting 8 from
    both sides, we get: 3x = 12.\nDividing both sides by 3, we get: x = 4.\nThe value of x is 4.\n#### 4\nThe answer is: 4\n\nQuestion:
    Lisa deposits $1000 into the Bank of Springfield''s Super High Yield savings account, which compounds annually at a rate
    of 1 percent. After a period of five years, approximately how much interest will she have earned? (Round your answer to
    the nearest dollar.)\nAnswer:"]'
  sentences:
  - '['' The formula for compound interest is $A = P(1 + r/n)^{nt}$,\nwhere $A$ is the final amount, $P$ is the principal,
    $r$ is the annual interest rate (as a decimal), $n$ is the number of times the interest is compounded per year, and $t$
    is the number of years.\nIn this case, $P = 1000$, $r = 0.01$, $n = 1$, and $t = 5$.\nPlugging in these values, we have
    $A = 1000(1 + 0.01/1)^{1*5}$.\nEvaluating, we get $A \\approx 1000(1.01)^5 \\approx 1000(1.05101005) \\approx 1051.01$.\nThe
    interest earned is $A - P = 1051.01 - 1000 = 51.01$.\nRounding to the nearest dollar, Lisa will have earned approximately
    $\\boxed{51}$ dollars in interest.\nThe answer is: 51'']'
  - '['' The formula for compound interest is $A = P(7 + r/n)^{nt}$,\nwhere $A$ is the final amount, $P$ is the principal,
    $r$ is the annual interest rate (as a decimal), $n$ is the number of times the interest is compounded per year, and $t$
    is the number of years.\nIn this case, $P = 5593$, $r = 5.19$, $n = 6$, and $t = 1$.\nPlugging in these values, we have
    $A = 3387(1 + 0.01/1)^{1*5}$.\nEvaluating, we get $A \\approx 1000(1.01)^5 \\approx 1000(1.05101005) \\approx 1051.01$.\nThe
    interest earned is $A - P = 1416.27 - 1000 = 88.88$.\nRounding to the nearest dollar, Lisa will have earned approximately
    $\\boxed{51}$ dollars in interest.\nThe answer is: 51'']'
  - InvocationTargetException in Java Web Start applet/application
