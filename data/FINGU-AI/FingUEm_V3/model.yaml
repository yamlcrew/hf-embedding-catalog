  widget:
  - source_sentence: Ramjipura Khurd
    sentences:
    - '*1. Yes, I did, because you, dear sir, dropped the ball by failing to see that carrots was an imaginative metaphor
      for the human bone. Yes, carrots are not bones, but how can one define what a "vegetable" truly is? Some may say, "vegetables
      are not X." But that presumes a linear concept of knowledge based around the word "is." You sir, have not read Edvard
      WEstermark''s seminal work "Wit and Wisdom in Morroco." *2. Cheese pizza lacks toppings. if you wish to know more, simply
      go to a "menu" and see what category they place meat (or, as I creatively spelled it in order to destroy Euro-centric
      spelling, meet) as "extra toppings." Extra cheese is not LISTED. *4 Paï¿½acuelos do not exist, but does pizza? Answer
      correctly or die.'
    - Ramjipura Khurd is a small village 50 km from Jaipur, Rajasthan, India. There are 200 houses in the village. Many Rajputs
      live in Ramjipura Khurd, as well as other castes.
    - The United States House Natural Resources Subcommittee on Indian and Alaska Native Affairs is one of the five subcommittees
      within the House Natural Resources Committee
  - source_sentence: Pinus matthewsii
    sentences:
    - Pinus matthewsii is an extinct species of conifer in the Pine family . The species is solely known from the Pliocene
      sediments exposed at Ch ' ijee 's Bluff on the Porcupine River near Old Crow , Yukon , Canada .
    - The Communist Party USA has held twenty nine official conventions including nomination conventions and conventions held
