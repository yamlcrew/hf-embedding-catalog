    ● You can target 1 other "True Draco" or "True King" card you control; destroy it, and if you do, the ATK and DEF of all
    face-up monsters your opponent controls become half their current ATK and DEF (even if this card leaves the field).

    ● During your opponent''s Main Phase, you can: Immediately after this effect resolves, Tribute Summon 1 "True Draco" or
    "True King" monster face-up. You can only use each effect of "True Draco Apocalypse" once per turn.'
- source_sentence: When this card is Normal Summoned, place 1 Spell counter on it (max. 1). You can remove 1 Spell counter
