    is in your GY, you can return 1 of your banished "Fossil Fusion", or 1 card that specifically lists that card in its text,
    to the GY. You can only use each effect of "Flint Cragger" once per turn.'
  - 'If this card is sent from the Spell & Trap Zone to the GY: You can target 1 monster on the field; destroy it. You cannot
