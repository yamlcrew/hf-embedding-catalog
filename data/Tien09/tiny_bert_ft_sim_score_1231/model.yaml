  sentences:
  - This card cannot be Normal Summoned or Set. This card cannot be Special Summoned except by its own effect. When a face-up
    monster you control is destroyed by a card effect and sent to the GY, you can Special Summon this card from your hand.
    This card gains ATK and DEF equal to half of your Life Points. Once per turn, you can select 1 Synchro Monster your opponent
    controls and equip it to this card. This card gains ATK equal to those equipped monsters' combined ATK. During your Main
    Phase, you can select 1 of those equipped monsters, and Special Summon it to your side of the field in face-up Defense
    Position.
  - 'If this card is Special Summoned: You can discard 1 card, and if you do, send 1 "Fossil" Fusion Monster from your Extra
