cardData:
  language:
  - en
  license: apache-2.0
  tags:
  - sentence-transformers
  - sentence-similarity
  - feature-extraction
  - generated_from_trainer
  - dataset_size:13186
  - loss:MatryoshkaLoss
  - loss:MultipleNegativesRankingLoss
  base_model: nomic-ai/nomic-embed-text-v2-moe
  widget:
  - source_sentence: ООО "Сибирские ягоды" зарегистрировало географическое указание на свою продукцию.  В связи с реорганизацией
      общества, оно изменило свое наименование на АО "Ягодный край". Какие действия необходимо предпринять АО "Ягодный край"
      в соответствии с предоставленным текстом статьи закона для внесения изменений в Государственный реестр?
    sentences:
    - <p>5. Если в силу договора факторинга финансовый агент (фактор) несет обязанности по оплате цены приобретенных им денежных
      требований, по предоставлению клиенту займа (кредита) или по оказанию клиенту услуг, к отношениям сторон по договору
      факторинга применяются правила соответственно о купле-продаже, займе (кредите), возмездном оказании услуг постольку,
      поскольку это не противоречит положениям настоящей главы и существу отношений по договору факторинга.</p><p>(Статья
      в редакции Федерального закона <a href="102439953">от 26.07.2017 № 212-ФЗ</a>)</p>
    - <p>1. В случае, когда договором купли-продажи предусмотрена оплата товара через определенное время после его передачи
      покупателю (продажа товара в кредит), покупатель должен произвести оплату в срок, предусмотренный договором, а если
      такой срок договором не предусмотрен, в срок, определенный в соответствии со статьей 314 настоящего Кодекса.</p><p>2.
      В случае неисполнения продавцом обязанности по передаче товара применяются правила, предусмотренные статьей 328 настоящего
      Кодекса.</p><p>3. В случае, когда покупатель, получивший товар, не исполняет обязанность по его оплате в установленный
      договором купли-продажи срок, продавец вправе потребовать оплаты переданного товара или возврата неоплаченных товаров.</p><p>4.
      В случае, когда покупатель не исполняет обязанность по оплате переданного товара в установленный договором срок и иное
      не предусмотрено настоящим Кодексом или договором купли-продажи, на просроченную сумму подлежат уплате проценты в соответствии
      со статьей 395 настоящего Кодекса со дня, когда по договору товар должен был быть оплачен, до дня оплаты товара покупателем.</p><p>Договором
      может быть предусмотрена обязанность покупателя уплачивать проценты на сумму, соответствующую цене товара, начиная со
      дня передачи товара продавцом.</p><p>5. Если иное не предусмотрено договором купли-продажи, с момента передачи товара
      покупателю и до его оплаты товар, проданный в кредит, признается находящимся в залоге у продавца для обеспечения исполнения
      покупателем его обязанности по оплате товара.</p>
    - <p>1. Федеральный орган исполнительной власти по интеллектуальной собственности вносит по заявлению правообладателя
      в Государственный реестр указаний и наименований изменения, относящиеся к государственной регистрации географического
      указания или наименования места происхождения товара и предоставлению исключительного права на географическое указание
      или наименование места происхождения товара (пункт 2 статьи 1529), в том числе к наименованию или имени правообладателя,
      его месту нахождения или месту жительства, адресу для переписки, сведениям, касающимся перечня лиц, имеющих право использования
      географического указания или наименования места происхождения товара, условий использования географического указания
      или наименования места происхождения товара входящими в объединение лицами, а также изменения для исправления очевидных
      и технических ошибок.</p><p>2. К заявлению о внесении изменений в сведения, относящиеся к государственной регистрации
      географического указания или наименования места происхождения товара, в том числе указанные в подпунктах 1 - 4, 6 -
      9 пункта 2 статьи 1522, пункте 1 статьи 15221 настоящего Кодекса, прилагаются документы или заключение уполномоченного
      органа, подтверждающие обоснованность и необходимость внесения таких изменений.</p><p class="P">(Статья в редакции Федерального
      закона <a href="102577263">от 26.07.2019 № 230-ФЗ</a>)</p>
  - source_sentence: Какие возражения может выдвинуть должник против требования третьего лица, если договор предусматривает
      исполнение в пользу третьего лица, но не указывает его конкретно, и третье лицо заявило о своих правах?
    sentences:
    - <p>1. В случаях стихийных бедствий, аварий, эпидемий, эпизоотий и при иных обстоятельствах, носящих чрезвычайный характер,
      имущество в интересах общества по решению государственных органов может быть изъято у собственника в порядке и на условиях,
      установленных законом, с выплатой ему стоимости имущества (реквизиция).</p><p>2. Оценка, по которой собственнику возмещается
      стоимость реквизированного имущества, может быть оспорена им в суде.</p><p>3. Лицо, имущество которого реквизировано,
      вправе при прекращении действия обстоятельств, в связи с которыми произведена реквизиция, требовать по суду возврата
      ему сохранившегося имущества.</p>
    - <p>1. Собственники помещений в многоквартирном доме или нескольких многоквартирных домах либо собственники нескольких
      жилых домов для совместного управления общим имуществом в многоквартирном доме либо имуществом собственников помещений
      в нескольких многоквартирных домах или имуществом собственников нескольких жилых домов и осуществления деятельности
      по созданию, содержанию, сохранению и приращению такого имущества, а также для осуществления иной деятельности, направленной
      на достижение целей управления многоквартирными домами либо на совместное использование имущества, принадлежащего собственникам
      помещений в нескольких многоквартирных домах, или имущества собственников нескольких жилых домов, могут создавать товарищества
      собственников жилья. (В редакции Федерального закона <a href="102387998">от 31.01.2016 № 7-ФЗ</a>)</p><p>2. Товарищество
      собственников жилья является некоммерческой организацией, создаваемой и действующей в соответствии с законом о товариществах
      собственников жилья.</p>
    - <p>1. Договором в пользу третьего лица признается договор, в котором стороны установили, что должник обязан произвести
      исполнение не кредитору, а указанному или не указанному в договоре третьему лицу, имеющему право требовать от должника
      исполнения обязательства в свою пользу.</p><p>2. Если иное не предусмотрено законом, иными правовыми актами или договором,
      с момента выражения третьим лицом должнику намерения воспользоваться своим правом по договору стороны не могут расторгать
      или изменять заключенный ими договор без согласия третьего лица.</p><p>3. Должник в договоре вправе выдвигать против
      требования третьего лица возражения, которые он мог бы выдвинуть против кредитора.</p><p>4. В случае, когда третье лицо
      отказалось от права, предоставленного ему по договору, кредитор может воспользоваться этим правом, если это не противоречит
      закону, иным правовым актам и договору.</p>
  - source_sentence: Заявитель на полезную модель внес изменения в описание технического результата через 14 месяцев после
      подачи заявки. Эти изменения касаются уточнения способа достижения заявленного технического результата, но не меняют
      сам результат. Будут ли эти изменения учтены при публикации сведений о заявке согласно пункту 5 статьи?
    sentences:
    - <p>указание на технический результат, который обеспечивается изобретением или полезной моделью и не связан с техническим
      результатом, содержащимся в тех же документах.</p><p>3. Дополнительные материалы изменяют заявку на промышленный образец
      по существу, если они содержат изображения изделия, на которых:</p><p>представлен иной промышленный образец, не удовлетворяющий
      требованию единства промышленного образца в отношении промышленного образца или группы промышленных образцов, раскрытых
      на изображениях, принятых к рассмотрению;</p><p>представлены существенные признаки промышленного образца, отсутствующие
      на изображениях, представленных на дату подачи заявки, либо представлены изображения изделия, с которых удалены существенные
      признаки промышленного образца, имеющиеся на изображениях, представленных на дату подачи заявки.</p><p>4. Изменения
      сведений об авторе, о заявителе, в том числе при передаче права на получение патента другому лицу либо вследствие изменения
      имени автора, имени или наименования заявителя, а также исправления очевидных и технических ошибок могут быть внесены
      заявителем в документы заявки по собственной инициативе до регистрации изобретения, полезной модели или промышленного
      образца.</p><p>5. Изменения, внесенные заявителем в документы заявки на изобретение, учитываются при публикации сведений
      о заявке, если такие изменения представлены в федеральный орган исполнительной власти по интеллектуальной собственности
      в течение пятнадцати месяцев с даты подачи заявки.</p><p>(Статья в редакции Федерального закона <a href="102171743">от
      12.03.2014 № 35-ФЗ</a>)</p>
    - <p>1. Опекун или попечитель распоряжается доходами подопечного, в том числе доходами, причитающимися подопечному от
      управления его имуществом, за исключением доходов, которыми подопечный вправе распоряжаться самостоятельно, исключительно
      в интересах подопечного и с предварительного разрешения органа опеки и попечительства. Суммы алиментов, пенсий, пособий,
      возмещения вреда здоровью и вреда, понесенного в случае смерти кормильца, а также иные выплачиваемые на содержание подопечного
      средства, за исключением доходов, которыми подопечный вправе распоряжаться самостоятельно, подлежат зачислению на отдельный
      номинальный счет, открываемый опекуном или попечителем в соответствии с главой 45 настоящего Кодекса, и расходуются
      опекуном или попечителем без предварительного разрешения органа опеки и попечительства. Опекун или попечитель предоставляет
      отчет о расходовании сумм, зачисляемых на отдельный номинальный счет, в порядке, установленном Федеральным законом <a
      href="102121401">"Об опеке и попечительстве"</a>. Случаи, при которых опекун вправе не предоставлять отчет о расходовании
      сумм, зачисляемых на отдельный номинальный счет, устанавливаются Федеральным законом <a href="102121401">"Об опеке и
      попечительстве"</a>. (В редакции федеральных законов <a href="102162486">от 30.12.2012 № 302-ФЗ</a>; <a href="102456108">от
      29.12.2017 № 459-ФЗ</a>)</p><p>2. Опекун не вправе без предварительного разрешения органа опеки и попечительства совершать,
      а попечитель - давать согласие на совершение сделок по отчуждению, в том числе обмену или дарению имущества подопечного,
      сдаче его внаем (в аренду), в безвозмездное пользование или в залог, сделок, влекущих отказ от принадлежащих подопечному
      прав, раздел его имущества или выдел из него долей, а также любых других действий, влекущих уменьшение имущества подопечного.
      (В редакции Федерального закона <a href="102162486">от 30.12.2012 № 302-ФЗ</a>)</p>
    - <p>1. Заказчик обязан в сроки и в порядке, которые предусмотрены договором подряда, с участием подрядчика осмотреть
      и принять выполненную работу (ее результат), а при обнаружении отступлений от договора, ухудшающих результат работы,
      или иных недостатков в работе немедленно заявить об этом подрядчику.</p><p>2. Заказчик, обнаруживший недостатки в работе
      при ее приемке, вправе ссылаться на них в случаях, если в акте либо в ином документе, удостоверяющем приемку, были оговорены
      эти недостатки либо возможность последующего предъявления требования об их устранении.</p><p>3. Если иное не предусмотрено
      договором подряда, заказчик, принявший работу без проверки, лишается права ссылаться на недостатки работы, которые могли
      быть установлены при обычном способе ее приемки (явные недостатки).</p><p>4. Заказчик, обнаруживший после приемки работы
      отступления в ней от договора подряда или иные недостатки, которые не могли быть установлены при обычном способе приемки
      (скрытые недостатки), в том числе такие, которые были умышленно скрыты подрядчиком, обязан известить об этом подрядчика
      в разумный срок по их обнаружении.</p><p>5. При возникновении между заказчиком и подрядчиком спора по поводу недостатков
      выполненной работы или их причин по требованию любой из сторон должна быть назначена экспертиза. Расходы на экспертизу
      несет подрядчик, за исключением случаев, когда экспертизой установлено отсутствие нарушений подрядчиком договора подряда
      или причинной связи между действиями подрядчика и обнаруженными недостатками. В указанных случаях расходы на экспертизу
      несет сторона, потребовавшая назначения экспертизы, а если она назначена по соглашению между сторонами, обе стороны
      поровну.</p>
  - source_sentence: Владелец квартиры на верхнем этаже многоквартирного дома хочет установить кондиционер, труба которого
      будет проходить через стену соседней квартиры, не затрагивая земельный участок. Может ли быть установлен сервитут на
      стену соседней квартиры для прокладки трубы кондиционера, согласно приведенному тексту статьи?
    sentences:
    - <p>1. Комиссионер не отвечает перед комитентом за неисполнение третьим лицом сделки, заключенной с ним за счет комитента,
      кроме случаев, когда комиссионер не проявил необходимой осмотрительности в выборе этого лица либо принял на себя ручательство
      за исполнение сделки (делькредере).</p><p>2. В случае неисполнения третьим лицом сделки, заключенной с ним комиссионером,
      комиссионер обязан немедленно сообщить об этом комитенту, собрать необходимые доказательства, а также по требованию
      комитента передать ему права по такой сделке с соблюдением правил об уступке требования (статьи 382 - 386, 388, 389).</p><p>3.
      Уступка прав комитенту по сделке на основании пункта 2 настоящей статьи допускается независимо от соглашения комиссионера
      с третьим лицом, запрещающего или ограничивающего такую уступку. Это не освобождает комиссионера от ответственности
      перед третьим лицом в связи с уступкой права в нарушение соглашения о ее запрете или об ограничении.</p>
    - <p>Применительно к правилам, предусмотренным статьями 274 - 276 настоящего Кодекса, сервитутом могут обременяться здания,
      сооружения и другое недвижимое имущество, ограниченное пользование которым необходимо вне связи с пользованием земельным
      участком.</p>
    - <p>1. Завещатель вправе отменить или изменить составленное им завещание в любое время после его совершения, не указывая
      при этом причины его отмены или изменения.</p><p>Для отмены или изменения завещания не требуется чье-либо согласие,
      в том числе лиц, назначенных наследниками в отменяемом или изменяемом завещании.</p><p>2. Завещатель вправе посредством
      нового завещания отменить прежнее завещание в целом либо изменить его посредством отмены или изменения отдельных содержащихся
      в нем завещательных распоряжений.</p><p>Последующее завещание, не содержащее прямых указаний об отмене прежнего завещания
      или отдельных содержащихся в нем завещательных распоряжений, отменяет это прежнее завещание полностью или в части, в
      которой оно противоречит последующему завещанию.</p><p>Завещание, отмененное полностью или частично последующим завещанием,
      не восстанавливается, если последующее завещание отменено завещателем полностью или в соответствующей части.</p><p>3.
      В случае недействительности последующего завещания наследование осуществляется в соответствии с прежним завещанием.</p><p>4.
      Завещание может быть отменено также посредством распоряжения о его отмене. Распоряжение об отмене завещания должно быть
      совершено в форме, установленной настоящим Кодексом для совершения завещания. К распоряжению об отмене завещания соответственно
      применяются правила пункта 3 настоящей статьи.</p><p>5. Завещанием, совершенным в чрезвычайных обстоятельствах (статья
      1129), может быть отменено или изменено только такое же завещание.</p><p>6. Завещательным распоряжением в банке (статья
      1128) может быть отменено или изменено только завещательное распоряжение правами на денежные средства в соответствующем
      банке.</p>
  - source_sentence: Компания «Альфа» заключила договор с инженером Петровским на разработку нового программного обеспечения.  В
      процессе работы Петровский создал изобретение, защищаемое патентом. Договор не содержал пунктов, касающихся прав на
      интеллектуальную собственность.  Кто является правообладателем патента на изобретение, и может ли компания «Альфа» использовать
      это изобретение без выплаты дополнительного вознаграждения?
    sentences:
    - <p>передаче в порядке, установленном частью 11 статьи 154 Федерального закона <a href="102088491">от 22 августа 2004
      года № 122-ФЗ</a> "О внесении изменений в законодательные акты Российской Федерации и признании утратившими силу некоторых
      законодательных актов Российской Федерации в связи с принятием федеральных законов <a href="102067003">"О внесении изменений
      и дополнений в Федеральный закон "Об общих принципах организации законодательных (представительных) и исполнительных
      органов государственной власти субъектов Российской Федерации"</a> и <a href="102083574">"Об общих принципах организации
      местного самоуправления в Российской Федерации"</a>, акций из федеральной собственности в собственность субъекта Российской
      Федерации или муниципальную собственность, из собственности субъекта Российской Федерации в федеральную собственность
      или муниципальную собственность, из муниципальной собственности в федеральную собственность или собственность субъекта
      Российской Федерации. (Дополнение абзацем - Федеральный закон <a href="102157372">от 14.06.2012 № 77-ФЗ</a>)</p>
    - <p>4. Если учрежденное за границей юридическое лицо осуществляет свою предпринимательскую деятельность преимущественно
      на территории Российской Федерации, к требованиям об ответственности по обязательствам юридического лица его учредителей
      (участников), других лиц, которые имеют право давать обязательные для него указания или иным образом имеют возможность
      определять его действия, применяется российское право либо по выбору кредитора личный закон такого юридического лица.
      (Дополнение пунктом - Федеральный закон <a href="102168115">от 30.09.2013 № 260-ФЗ</a>)</p>
    - <p>1. Право на получение патента и исключительное право на изобретение, полезную модель или промышленный образец, созданные
      при выполнении договора подряда или договора на выполнение научно-исследовательских, опытно-конструкторских или технологических
      работ, которые прямо не предусматривали их создание, принадлежат подрядчику (исполнителю), если договором между ним
      и заказчиком не предусмотрено иное. (В редакции Федерального закона <a href="102171743">от 12.03.2014 № 35-ФЗ</a>)</p><p>В
      этом случае заказчик вправе, если договором не предусмотрено иное, использовать созданные таким образом изобретение,
      полезную модель или промышленный образец в целях, для достижения которых был заключен соответствующий договор, на условиях
      простой (неисключительной) лицензии в течение всего срока действия патента без выплаты за это использование дополнительного
      вознаграждения. При передаче подрядчиком (исполнителем) права на получение патента или отчуждении самого патента другому
      лицу заказчик сохраняет право использования изобретения, полезной модели или промышленного образца на указанных условиях.</p><p>2.
      В случае, когда в соответствии с договором между подрядчиком (исполнителем) и заказчиком право на получение патента
      или исключительное право на изобретение, полезную модель или промышленный образец передано заказчику либо указанному
      им третьему лицу, подрядчик (исполнитель) вправе использовать созданные изобретение, полезную модель или промышленный
      образец для собственных нужд на условиях безвозмездной простой (неисключительной) лицензии в течение всего срока действия
      патента, если договором не предусмотрено иное.</p><p>3. Автору указанных в пункте 1 настоящей статьи изобретения, полезной
      модели или промышленного образца, не являющемуся патентообладателем, выплачивается вознаграждение в соответствии с пунктом
      4 статьи 1370 настоящего Кодекса.</p>
  pipeline_tag: sentence-similarity
  library_name: sentence-transformers
  metrics:
  - cosine_accuracy@1
