    \ \nLorsque l’arbitre observe une violation de l'article 4, son intervention est obligatoire, sans attendre que l’adversaire\
    \ la \nréclame. \nNote de traduction : on considère en compétition que la violation n’est effective que lorsque le joueur\
    \ ou la joueuse a \nachevé son coup, il n’est pas pertinent de l’interpeller oralement tant qu’il/elle n’a pas appuyé\
    \ sur sa pendule."
  - "Comité Départemental du Jeu d’Echecs des Bouches-du-Rhône \n \nChampionnat Interclubs de Nationale VI \n \nRèglement\
    \ \nVersion du 27/09/2016 Page 7 sur 7 \n \n \nBouches-du-Rhône\nCDJE\n4. RESULTATS - CLASSEMENTS \n \n4.1 Points de parties\
    \ \nVoir Règlement des Interclubs Ligue de Provence – Nationale 5 \n \n4.2 Points de matches \nVoir Règlement des Interclubs\
    \ Ligue de Provence – Nationale 5 \n \n4.3 Forfaits \nVoir Règlement des Interclubs Ligue de Provence – Nationale 5 \n\
    \ \n4.4 Classement \nVoir Règlement des Interclubs Ligue de Provence – Nationale 5 \n \n \n4.5 Appels Sportifs \nVoir\
    \ Règlement des Interclubs Ligue de Provence – Nationale 5"
- source_sentence: Quel est le contenu de l'article 4.3.2.1 ?
  sentences:
  - "Règlement médical\nFEDERATION FRANÇAISE DES ECHECS\nASSOCIATION DECLAREE CONFORME A LA LOI DU 1er JUILLET 1901- JO du\
    \ 22 mai 1921\n \n \nCD FFE – 19.08.2022\nB07 – 6/6\n \n \n \n4.3.3 AUT à effet rétroactif \nLes licencié(e)s ne répondant\
    \ pas à la définition de joueurs de niveau international comme \ndéfini à l’article 4.3.2.1 peuvent, après un contrôle\
    \ antidopage faire une demande d’AUT \nà effet rétroactif. La demande (ANNEXE) est à adresser dans les 30 jours au médecin\
    \ fédéral qui \nest tenu au secret professionnel dans les conditions et sous les réserves énoncées aux articles \n226-13\
    \ et226-14du code pénal. \n \n5 Surveillance des joueurs et joueuses de niveau international \nConformément à l’article\
    \ A. 231-3 du code du sport les joueurs et joueuses de niveau \ninternational comme défini à l’article 4.3.2 doivent se\
    \ soumettre dans les deux mois suivant \nleurs sélections en équipe de France, puis/ou annuellement à : \n Un examen\
    \ médical réalisé par un médecin du sport comprenant : \no Un examen clinique avec interrogatoire et examen physique selon\
    \ les recommandations \nde la Société française de médecine de l'exercice et du sport. \no Un bilan diététique et des\
    \ conseils nutritionnels. \no Un bilan psychologique visant à dépister des difficultés psychopathologiques pouvant \n\
    être liées à la pratique sportive intensive. \n Un électrocardiogramme de repos. \n \nA la demande du médecin du sport\
    \ et sous sa responsabilité, les bilans psychologique et \ndiététique peuvent être effectués respectivement par un psychologue\
    \ clinicien ou un \ndiététicien. \nLes résultats des examens sont transmis au médecin fédéral. \nLa FFE prend en charge\
    \ financièrement cette surveillance médicale."
  - "4.2.2. Tout autre contact physique avec une pièce, à l’exception d’un contact clairement accidentel, doit être \nconsidéré\
    \ comme intentionnel. \nSelon cette règle, si un joueur ou une joueuse n’a pas dit « j’adoube » ou quelque chose de similaire\
    \ avant de toucher \nune pièce et que le contact n’est pas accidentel alors la pièce touchée doit être déplacée. \nPar\
    \ exemple, si les Blancs ont joué 1. Fe2xg5 en soulevant le fou et en retirant le cavalier (ce coup n’est pas possible)\
    \ \nalors le fou sur e2 doit être déplacé car il a été touché dans l'intention de le déplacer. \n \n4.3. En dehors du\
    \ cadre précisé par l’Article 4.2 si le joueur ou la joueuse au trait touche sur l’échiquier, avec l’intention \nde déplacer\
    \ ou de prendre : \n4.3.1. Une ou plusieurs de ses propres pièces, il/elle doit déplacer la première pièce touchée pouvant\
    \ être \ndéplacée. \n4.3.2. Une ou plusieurs des pièces adverses, il/elle doit prendre la première pièce touchée pouvant\
    \ être prise. \n4.3.3. Une ou plusieurs pièces de chaque couleur, il/elle doit prendre la première pièce adverse touchée\
    \ avec sa \npremière pièce touchée ou, si c’est illégal, déplacer ou prendre la première pièce touchée pouvant être déplacée\
    \ \nou prise. Si on ne peut pas déterminer si c’est une de ses pièces ou une des pièces adverses qui a été touchée en\
    \ \npremier, alors on considère que c’est sa propre pièce qui a été touchée en premier, avant celle de son adversaire."
  - '9.10.3 Obligations de confidentialité

    Les membres de la commission sont tenus à une obligation de confidentialité concernant les informations

    dont ils ont connaissance dans le cadre de leurs missions. Ils sont en outre tenus de s’abstenir de toute dé-

    claration publique qui serait de nature à remettre en cause leur impartialité.

    Règlement Intérieur de la Fédération Française des Échecs

    Page 19/19'
