      \ n'ayant pas l'intention de se déplacer ou dans l'impossibilité d'aligner au moins 5 membres (3 en Nationale \n3),\
      \ doit avertir le club adverse et la direction de son groupe, au moins l'avant-veille du jour fixé pour le match. Toute\
      \ \néquipe ne se conformant pas à ces prescriptions et provoquant un déplacement inutile, sera tenue de rembourser \n\
      intégralement les frais de déplacement et de séjour occasionnés. La base de calcul des frais de déplacement sera \n\
      établie par la direction du championnat. \nSauf événement exceptionnel dûment justifié reconnu par la direction du championnat,\
      \ tout forfait d'une équipe sera \nsanctionné par les amendes suivantes : \n• \n300 € en Top Jeunes ; \n• \n100 € en\
      \ Nationale 1 ; \n• \n50 € en Nationale 2. \nLe non-paiement des amendes dans le délai fixé entraîne l’exclusion du\
      \ championnat la saison suivante. \nEn Nationale 1 ou 2, une équipe qui aura déclaré forfait pour trois rencontres pourra\
      \ être exclue du Championnat de \nFrance Interclubs Jeunes la saison suivante."
    - "4.7.3. Lors d’une promotion : lorsque la main du joueur ou de la joueuse a relâché la nouvelle pièce sur la case de\
      \ \npromotion et que le pion a été retiré de l’échiquier. \n4.8. Un joueur ou une joueuse perd le droit de protester\
      \ quant à la violation par son adversaire des Articles 4.1 à 4.7, \ndès l’instant où il/elle touche une pièce avec l'intention\
      \ de la déplacer ou de la prendre. \n4.9. Si un joueur ou une joueuse est dans l'incapacité de déplacer les pièces,\
      \ il/elle peut fournir un assistant ou une \nassistante, qui doit avoir l’agrément de l'arbitre, pour réaliser cette\
      \ opération. \nLorsque l’arbitre observe une violation de l'article 4, son intervention est obligatoire, sans attendre\
      \ que l’adversaire la \nréclame. \nNote de traduction : on considère en compétition que la violation n’est effective\
      \ que lorsque le joueur ou la joueuse a \nachevé son coup, il n’est pas pertinent de l’interpeller oralement tant qu’il/elle\
      \ n’a pas appuyé sur sa pendule."
  - source_sentence: Quel est le contenu de l'article 12.9. ?
    sentences:
    - "12.5. L’arbitre peut attribuer à l’un ou aux deux adversaires un laps de temps supplémentaire au cas où la partie aurait\
      \ \nété perturbée par des événements extérieurs à celle-ci. \n12.6. L’arbitre ne doit pas intervenir dans une partie,\
      \ excepté dans les cas décrits dans les Règles du Jeu d’Échecs. \nL’arbitre ne doit pas indiquer le nombre de coups\
      \ achevés, excepté en application de l’Article 8.5 quand au moins un \ndrapeau est tombé. L’arbitre s’abstient d’informer\
      \ un joueur ou une joueuse, que son adversaire a achevé un coup ou \nqu’il/elle n’a pas appuyé sur sa pendule. \n12.7.\
      \ Si quelqu’un observe une irrégularité, il peut uniquement en informer l’arbitre. Les joueurs et joueuses d’autres\
      \ \nparties ne doivent ni parler ni n’intervenir d’aucune façon dans une partie. Les spectateurs et spectatrices ne\
      \ sont pas \nautorisés à interférer dans une partie. L’arbitre peut exclure les contrevenants et contrevenantes du lieu\
      \ de la \ncompétition. \nSi un spectateur ou une spectatrice voit un drapeau tomber ou toute autre infraction, il/elle\
      \ doit en informer l'arbitre. \nIl ne doit pas intervenir dans la partie en l'annonçant. \n12.8. A moins d’y être autorisé\
      \ par l’arbitre, il est interdit à quiconque d’utiliser un téléphone mobile ou tout type \nd’appareil de communication\
      \ sur le lieu de la compétition ainsi que dans toutes zones contiguës désignées par l’arbitre. \nEn général, personne\
      \ n'est autorisé à utiliser son téléphone portable sur le lieu de la compétition ou dans les zones \nadjacentes pendant\
      \ les parties. \n12.9."
    - "6.2.4. Les joueurs et joueuses doivent manipuler la pendule d’échecs convenablement. Il est interdit de l’actionner\
      \ \navant de jouer son coup, de l’actionner de force, de la prendre dans ses mains ou de la renverser. Toute \nmanipulation\
      \ incorrecte est sanctionnée selon l’Article 12.9. \nDans le cas d’un joueur appuyant sur la pendule sans jouer un coup,\
      \ comme mentionné dans l’article 6.2.4, ceci est \nconsidéré comme un coup illégal et sanctionné comme tel selon l’article\
      \ 7.5.3. \n6.2.5. Seul le joueur ou la joueuse dont la pendule est en marche a l’autorisation d’adouber les pièces."
    - "FEDERATION FRANÇAISE DES ECHECS\nASSOCIATION DECLAREE CONFORME A LA LOI DU 1er JUILLET 1901- JO du 22 mai 1921\n \n\
      Règlement médical\n \n \nCD FFE – 19.08.2022\nB07 – 4/6\n3.1.2 Licenciés majeurs \nPour les personnes majeures, en vue\
      \ de l’obtention ou du renouvellement de la licence, le \nlicencié renseigne un questionnaire relatif à son état de\
      \ santé. \nLe licencié atteste par écrit auprès de son club que chacune des rubriques du questionnaire \ndonne lieu\
      \ à une réponse négative. Afin de respecter le secret médical, le questionnaire de \nsanté renseigné ne doit pas être\
      \ remis au club ni à la fédération. \nÀ défaut, il est tenu de produire un nouveau certificat médical attestant de l'absence\
      \ de contre-\nindication à la pratique du jeu d’échecs en et hors compétition datant de moins de six mois \npour obtenir\
      \ sa licence. \n \n3.2 Examen médical \nL’obtention du certificat médical de non-contre-indication à la pratique du\
      \ jeu d’échecs en et \nhors compétition est la conclusion d’un examen médical qui peut être réalisé par tout médecin\
      \ \ntitulaire du Doctorat d’état. \n \nLa commission médicale de la FFE rappelle que l’examen médical permettant de\
      \ délivrer ce \ncertificat engage la responsabilité du médecin signataire de ce certificat, seul juge de la \nnécessité\
      \ d’éventuels examens complémentaires et seul responsable de l’obligation de \nmoyen (article 69 du Code de déontologie\
      \ médicale). \n \nLa délivrance du certificat médical s’inscrit dans une politique globale de prévention et de \ndépistage\
      \ en accord avec la législation du sport. Il n’existe pas de contre-indication formelle à la \npratique des échecs en\
      \ compétition."
  - source_sentence: Comment procéder en cas de procedure ?
    sentences:
    - "Art. 1-2 – Sport de haut-niveau - évolutions majeures envisagées \n \n- \nProjet de Performance Fédérale (annexe 10);\
      \ \n \nComme le document de Projet de Performance Fédérale le précise, la France oscille entre la 5ème \net 10ème place\
      \ mondiale dans le concert des nations échiquéennes. La récente embellie des \nrésultats individuels avec les performances\
      \ des deux meilleurs français (dont l’un est le N°2 mondial \net l’autre second du dernier tournoi des candidats) ainsi\
      \ que le titre de vice-championne d’Europe \nde l’équipe de France mixte, ne peut cacher la perte de vitesse de notre\
      \ élite lors de ces cinq \ndernières années. \nLe Projet de Performance Fédérale, accompagnant ce contrat de délégation,\
      \ doit permettre d’ancrer \nla France dans les 5 nations majeures des Échecs (avec la Russie, l’Inde, la Chine, les\
      \ Etats-Unis)."
    - "Texte modifié par la CT le 17/05/2025 \n C04-3/7 \nCOUPE DE LA PARITÉ \n \n \n3.7. Composition des équipes \n3.7.a)\
      \ Chaque équipe est composée de deux joueurs et de deux joueuses ayant une licence A, respectant l'article 1 \ndes règles\
      \ générales. \nL’Elo à prendre en compte est le dernier Elo publié. \nL’Elo du mois précédent ne dépassant pas les 8000\
      \ points Elo pour l’ensemble de l’équipe sera autorisé. \nLe cumul des classements Elo, estimés ou réels de l'équipe,\
      \ doit être inférieur ou égal à 8000. S'il n'y a que 3 membres \ndans l’équipe, il doit être inférieur à 6000. \nUne\
      \ équipe qualifiée peut dépasser la limite de 8000 points Elo uniquement si elle est composée des mêmes membres \nayant\
      \ participé à une même phase précédente. \n3.7.b) Avant le début d'une phase, le ou la capitaine remet une liste ordonnée\
      \ de 6 membres maximum (trois joueurs \net trois joueuses maximum) respectant l'article 3.7.c. Pour chaque match de\
      \ la phase, il choisit deux joueurs et deux \njoueuses de cette liste, sans en changer l'ordre, sauf dans le cas particulier\
      \ des joueuses ou joueurs remplaçants dans \nun système Molter. \n3.7.c) Placement des membres d’une équipe : \n- système\
      \ Suisse ou toutes rondes : si deux membres de l’équipe ont une différence de classement Elo de plus de 100 \npoints,\
      \ le meilleur classement est placé devant. En cas d'infraction, forfait administratif sur le(s) échiquiers ayant le\
      \ \nplus fort Elo."
    - "Tout manquement à cette obligation peut entrainer la saisine de la CED. \nH.6 La PE instruit chaque cas dans un délai\
      \ raisonnable, généralement en moins de deux semaines. \nH.7 À la fin de l'enquête, la PE rédige un rapport à l'intention\
      \ de la FPL pour examen, indiquant : l'action qui a déclenché \nl'enquête, les circonstances factuelles de l'incident,\
      \ les conclusions de l'enquête et une proposition de sanction. Le \nrapport peut s’étendre à toute autre violation des\
      \ règlements de la FIDE constatée par la PE durant son enquête. La \nFPL peut demander à la PE d'examiner des faits\
      \ supplémentaires et/ou de mener des investigations plus approfondies. \nH.8 Une fois que la PE a remis son rapport\
      \ définitif, la FPL décide à la majorité si l’affaire doit être transmise à la CED \npour être jugée. Si l'affaire n'est\
      \ pas transmise à la CED, elle est considérée comme rejetée. La FPL transmet ses \nconclusions à la personne ayant porté\
      \ plainte et à la personne accusée. Si la fédération nationale de la personne \naccusée est impliquée, elle en est également\
      \ informée. \nI. Procédure \nI.1 Le délai de prescription est d'un an à compter de la dernière ronde de la compétition\
      \ en ligne en question. \nI.2 La langue officielle de travail de la PE est l'anglais. La PE peut, à la demande d’une\
      \ des parties, autoriser l'emploi \nd'une langue autre que l'anglais par les parties concernées. Dans ce cas, la PE\
      \ peut ordonner à l'un ou l'autre ou à tous \nles requérants de prendre en charge tout ou partie des frais de traduction\
      \ et d'interprétation. La PE peut ordonner \nque tous les documents soumis dans des langues autres que l'anglais soient\
      \ déposés avec une traduction certifiée \ndans la langue de la procédure."
  - source_sentence: Quelle est la règle concernant promotion ?
    sentences:
    - "FEDERATION FRANÇAISE DES ECHECS\nASSOCIATION DECLAREE CONFORME A LA LOI DU 1er JUILLET 1901 – JO DU 22 MAI 1921\nRèglement\
      \ Financier\nCD FFE – 10.06.2023\nB04-3/6\n \n \nANNEXE AU RÈGLEMENT FINANCIER \nRèglement interne des frais de mission\
      \ et remboursement des notes de frais \nBénévoles et Prestataires FFE \n \n \nAPPLICATION \nTous les collaborateurs\
      \ bénévoles de la Fédération Française des Echecs, quel que soit la nature de leur \nfonction : Président, Membres du\
      \ Bureau Fédéral, Membres du Comité Directeur, Membres des Commissions \net Directions Nationales. \nTous les prestataires\
      \ de la Fédération Française des Echecs lors de mission de long terme (plus de 3 mois). \n \nOBJECTIFS \nCette politique\
      \ vise à établir les conditions des frais de mission et de remboursement des notes de frais \npour les déplacements\
      \ dans le cadre du bénévolat pour la FFE \nIl est rappelé que la nécessité de voyager pour les membres des commissions\
      \ doit être évaluée par rapport \nà d’autres alternatives telles que les réunions par téléphone. \nLes réunions du Comité\
      \ Directeur ont lieu uniquement en face à face. \nLes réunions du Bureau Fédéral et des Commissions peuvent avoir lieu\
      \ par logiciel d’appel téléphonique \n(tels que Skype) ou au téléphone. \nRESPONSABILITÉS \nLe Secrétaire Général rédige,\
      \ met à jour et s’assure de la bonne application de la présente procédure \nauprès des: \n \nprésidents de Directions\
      \ Nationales et des Commissions, des membres de Commissions et autres \nbénévoles \n \nprestataires de la FFE \nSeuls\
      \ le Président, le Trésorier et le Trésorier Adjoint autorisent l’engagement de frais sur la base de \nmissions bien\
      \ établies."
    - "4.7.3. Lors d’une promotion : lorsque la main du joueur ou de la joueuse a relâché la nouvelle pièce sur la case de\
      \ \npromotion et que le pion a été retiré de l’échiquier. \n4.8. Un joueur ou une joueuse perd le droit de protester\
      \ quant à la violation par son adversaire des Articles 4.1 à 4.7, \ndès l’instant où il/elle touche une pièce avec l'intention\
      \ de la déplacer ou de la prendre. \n4.9. Si un joueur ou une joueuse est dans l'incapacité de déplacer les pièces,\
      \ il/elle peut fournir un assistant ou une \nassistante, qui doit avoir l’agrément de l'arbitre, pour réaliser cette\
      \ opération. \nLorsque l’arbitre observe une violation de l'article 4, son intervention est obligatoire, sans attendre\
      \ que l’adversaire la \nréclame. \nNote de traduction : on considère en compétition que la violation n’est effective\
      \ que lorsque le joueur ou la joueuse a \nachevé son coup, il n’est pas pertinent de l’interpeller oralement tant qu’il/elle\
      \ n’a pas appuyé sur sa pendule."
    - "Comité Départemental du Jeu d’Echecs des Bouches-du-Rhône \n \nChampionnat Interclubs de Nationale VI \n \nRèglement\
      \ \nVersion du 27/09/2016 Page 7 sur 7 \n \n \nBouches-du-Rhône\nCDJE\n4. RESULTATS - CLASSEMENTS \n \n4.1 Points de\
      \ parties \nVoir Règlement des Interclubs Ligue de Provence – Nationale 5 \n \n4.2 Points de matches \nVoir Règlement\
      \ des Interclubs Ligue de Provence – Nationale 5 \n \n4.3 Forfaits \nVoir Règlement des Interclubs Ligue de Provence\
      \ – Nationale 5 \n \n4.4 Classement \nVoir Règlement des Interclubs Ligue de Provence – Nationale 5 \n \n \n4.5 Appels\
      \ Sportifs \nVoir Règlement des Interclubs Ligue de Provence – Nationale 5"
  - source_sentence: Quel est le contenu de l'article 4.3.2.1 ?
    sentences:
    - "Règlement médical\nFEDERATION FRANÇAISE DES ECHECS\nASSOCIATION DECLAREE CONFORME A LA LOI DU 1er JUILLET 1901- JO\
      \ du 22 mai 1921\n \n \nCD FFE – 19.08.2022\nB07 – 6/6\n \n \n \n4.3.3 AUT à effet rétroactif \nLes licencié(e)s ne\
      \ répondant pas à la définition de joueurs de niveau international comme \ndéfini à l’article 4.3.2.1 peuvent, après\
      \ un contrôle antidopage faire une demande d’AUT \nà effet rétroactif. La demande (ANNEXE) est à adresser dans les 30\
      \ jours au médecin fédéral qui \nest tenu au secret professionnel dans les conditions et sous les réserves énoncées\
      \ aux articles \n226-13 et226-14du code pénal. \n \n5 Surveillance des joueurs et joueuses de niveau international \n\
      Conformément à l’article A. 231-3 du code du sport les joueurs et joueuses de niveau \ninternational comme défini à\
      \ l’article 4.3.2 doivent se soumettre dans les deux mois suivant \nleurs sélections en équipe de France, puis/ou annuellement\
      \ à : \n Un examen médical réalisé par un médecin du sport comprenant : \no Un examen clinique avec interrogatoire\
      \ et examen physique selon les recommandations \nde la Société française de médecine de l'exercice et du sport. \no\
      \ Un bilan diététique et des conseils nutritionnels. \no Un bilan psychologique visant à dépister des difficultés psychopathologiques\
      \ pouvant \nêtre liées à la pratique sportive intensive. \n Un électrocardiogramme de repos. \n \nA la demande du médecin\
      \ du sport et sous sa responsabilité, les bilans psychologique et \ndiététique peuvent être effectués respectivement\
      \ par un psychologue clinicien ou un \ndiététicien. \nLes résultats des examens sont transmis au médecin fédéral. \n\
      La FFE prend en charge financièrement cette surveillance médicale."
    - "4.2.2. Tout autre contact physique avec une pièce, à l’exception d’un contact clairement accidentel, doit être \nconsidéré\
      \ comme intentionnel. \nSelon cette règle, si un joueur ou une joueuse n’a pas dit « j’adoube » ou quelque chose de\
      \ similaire avant de toucher \nune pièce et que le contact n’est pas accidentel alors la pièce touchée doit être déplacée.\
      \ \nPar exemple, si les Blancs ont joué 1. Fe2xg5 en soulevant le fou et en retirant le cavalier (ce coup n’est pas\
      \ possible) \nalors le fou sur e2 doit être déplacé car il a été touché dans l'intention de le déplacer. \n \n4.3. En\
      \ dehors du cadre précisé par l’Article 4.2 si le joueur ou la joueuse au trait touche sur l’échiquier, avec l’intention\
      \ \nde déplacer ou de prendre : \n4.3.1. Une ou plusieurs de ses propres pièces, il/elle doit déplacer la première pièce\
      \ touchée pouvant être \ndéplacée. \n4.3.2. Une ou plusieurs des pièces adverses, il/elle doit prendre la première pièce\
      \ touchée pouvant être prise. \n4.3.3. Une ou plusieurs pièces de chaque couleur, il/elle doit prendre la première pièce\
      \ adverse touchée avec sa \npremière pièce touchée ou, si c’est illégal, déplacer ou prendre la première pièce touchée\
      \ pouvant être déplacée \nou prise. Si on ne peut pas déterminer si c’est une de ses pièces ou une des pièces adverses\
      \ qui a été touchée en \npremier, alors on considère que c’est sa propre pièce qui a été touchée en premier, avant celle\
      \ de son adversaire."
    - '9.10.3 Obligations de confidentialité

      Les membres de la commission sont tenus à une obligation de confidentialité concernant les informations

      dont ils ont connaissance dans le cadre de leurs missions. Ils sont en outre tenus de s’abstenir de toute dé-

      claration publique qui serait de nature à remettre en cause leur impartialité.

      Règlement Intérieur de la Fédération Française des Échecs

      Page 19/19'
