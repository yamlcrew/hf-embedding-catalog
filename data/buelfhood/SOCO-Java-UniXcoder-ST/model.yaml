    \ target.setStop(true);\n        }\n        finished = true;\n    }\n\n\n    \n    protected void start(int threads)\n\
    \    {\n        \n        \n        int load = BruteForce.letters.length / threads;\n        int remainder = BruteForce.letters.length\
