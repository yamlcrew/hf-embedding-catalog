widgetData:
- source_sentence: IIIC no armonizadas
  sentences:
  - non-UCITS
  - Es un tipo de interés teórico a un año, que permite establecer comparaciones entre activos con distintos plazos de vencimiento
    y condiciones contractuales. Mediante una fórmula matemática, se obtiene el tipo anual que, en un momento dado, igualaría
    el valor de la inversión con el valor actual de todos los flujos previstos de cobros y pagos (cupones, amortización del
    principal, etc).
  - Es una propuesta de negociación, gestionada en última instancia por un miembro del mercado, que se realiza bien a solicitud
    del inversor (cuenta de terceros) o por cuenta propia de una entidad. Debe especificar como mínimo el valor sobre el que
    se opera, el tipo de transacción (compra o venta), la cantidad y el precio.
- source_sentence: Utilities
  sentences:
  - Denominación genérica de aquellas compañías que ofrecen servicios públicos como electricidad, gas, agua o autopistas.
  - El código CFI está compuesto por seis caracteres alfabéticos y permite diferenciar valores e instrumentos financieros
    atendiendo a sus principales características. Está pensado para que los procesos informáticos tengan la posibilidad de
    clasificar valores e instrumentos financieros de forma automática. En España, los códigos CFI son asignados por la Agencia
    Nacional de Codificación de Valores, dependiente de la Comisión Nacional del Mercado de Valores (CNMV).
  - Es el efecto que se produce en los mercados cuando los inversores compran o venden un activo (haciendo que su precio suba
    o baje), debido a las expectativas conocidas en relación con algún acontecimiento o noticia que aún no ha sucedido. Si
    al final ese hecho ocurre efectivamente, en teoría no debería tener efecto en los precios porque los mercados ya lo han
    ´descontado´.
- source_sentence: Tasa interna de rentabilidad
  sentences:
  - Fecha en la que expira un contrato financiero o en la que se devuelve el principal de un valor.
  - Estimación de la solvencia de una compañía, realizada por entidades especializadas. Tal valoración se plasma en el rating,
    que permite a los inversores evaluar el riesgo de las emisiones y de la propia empresa, generalmente distinguiendo entre
    las emisiones a corto y a largo plazo. Ver agencia de calificación creditica y Rating.
  - TIR
- source_sentence: Lock-up
  sentences:
  - Posibilidad que tienen los partícipes de un fondo de inversión de reembolsar sus participaciones sin abonar comisión de
    reembolso, durante un plazo determinado. La gestora ha de comunicar a los partícipes el otorgamiento de este derecho cuando
    se produzcan determinadas modificaciones sustanciales en las características del fondo o en los derechos del inversor
    (cambios en la política de inversión, elevación de comisiones, etc.).
  - Es el resultado de una sociedad (obtenido por diferencia entre ingresos y gastos), antes de restar las amortizaciones
    y los impuestos.
  - Periodo durante el cual no es posible realizar una determinada operación. Los motivos y características de estos “periodos
    de cierre” varían según el tipo de producto. Por ejemplo, en las ofertas públicas de venta (OPV) algunos accionistas pueden
    firman un compromiso de lock-up, por el que se obligan a mantener sus acciones durante un periodo determinado; el objetivo
    es facilitar la colocación entre el público, eliminando la incertidumbre y el descenso de precios que se produciría si
    algún accionista significativo optara por deshacerse de sus acciones. En el ámbito de los fondos de inversión, el lock-up
    es el periodo durante el que se impide la entrada de nuevos partícipes o la realización de inversiones adicionales en
    un fondo (situación que suele darse en los fondos de inversión libre o hedge funds, si así lo establece el folleto); el
    motivo del cierre es que el fondo ya habría alcanzado el volumen de patrimonio idóneo para una gestión eficiente y un
    aumento del mismo podría suponer, a juicio del gestor, una menor expectativa de rentabilidad para los partícipes.
- source_sentence: Riesgo de liquidez
  sentences:
  - Adquisición regular de acciones de una empresa, por el procedimiento de suscribir acciones en todas las ampliaciones de
    capital.
  - Hacer efectivas las ganancias o pérdidas acumuladas con una inversión, mediante la venta de los valores. Mientras no se
    deshaga la inversión las plusvalías o minusvalías permanecen latentes, pero con la venta los resultados (positivos o negativos)
    se materializan y se convierten en definitivos, desplegando los correspondientes efectos fiscales.
  - Posible penalización en el precio de un valor, en caso de que se necesite deshacer la inversión para recuperar el capital
    con rapidez. Con carácter general, puede decirse que los valores cotizados son más líquidos que los que no cotizan, ya
    que hay más posibilidades de encontrar contrapartidas a un precio razonable (en ocasiones los no cotizados incorporan
    algún tipo de cláusula o garantía de liquidez por parte del emisor o un tercero, aunque no existe transparencia en cuanto
    al precio). Cuanto menos líquido es un valor, mayor es la disminución en el precio que debe aceptar el inversor para vender
    sus valores. En casos de iliquidez extrema, puede llegar a resultar imposible recuperar la inversión en el momento deseado.
