- source_sentence: Apakah harus menggunakan aplikasi myXL versi terbaru untuk bisa naik level?
  sentences:
  - 'Syarat dan Ketentuan Naik Level myRewards XL

    Persyaratan untuk naik level dalam program loyalitas myRewards XL Prabayar

    # Kendala Bonus XL (Business Rules)


    ## Naik Level myRewards


    ### Syarat dan Ketentuan

    1. Pelanggan XL Prabayar dan sudah menjadi pengguna aplikasi myXL versi terbaru

    2. Pelanggan dapat naik level dengan meningkatkan jumlah transaksi yang sudah ditentukan di aplikasi myXL yang akan dihitung
    selama 3 bulan berjalan.

    3. Transaksi yang diperhitungkan hanya aktivasi paket internet di aplikasi myXL dan channel penjualan lainnya.

    4. Level status keanggotaan pelanggan akan di update maksimum 2x24 setelah transaksi terakhir dilakukan di aplikasi myXL.'
  - 'Panduan Lengkap Pembelian dan Pengecekan Kuota Paket OWSEM

    ## Mekanisme


    ### Cara beli paket OWSEM via aplikasi AXISnet:


    1. Buka aplikasi AXISnet

    2. Pilih Menu Paket

    3. Pilih Internet

    4. Pilih Paket OWSEM

    5. Pilih varian paket

    6. Pilih Aktifkan

    7. Pilih Metode pembayaran

    8. Klik Konfirmasi


    ### Cara cek kuota paket OWSEM via aplikasi AXISnet:


    1. Buka aplikasi AXISnet

    2. Klik Detail paket pada menu Paket Kamu di beranda

    3. Pilih paket yang ingin dicek kuotanya

    4. Klik Lihat Detail'
  - 'Mekanisme Penggunaan Paket Arab Saudi - Umroh Plus

    Panduan lengkap untuk paket Umroh Plus yang mencakup Arab Saudi dan negara transit

    ### Mekanisme Paket Arab Saudi – Umroh Plus


    1. Paket Umroh Plus tersedia untuk pelanggan Prabayar XL.

    2. Paket Umroh Plus dapat digunakan di semua operator di Arab Saudi (Zain, STC, Etisalat).

    3. Manfaat kuota transit dapat digunakan di Arab Saudi, UEA, Qatar, Oman, Kuwait, Bahrain, Yordania, Turki, Mesir, Singapura,
    dan Malaysia.

    4. Paket Umroh Plus dapat dibeli dari Indonesia dan luar negeri.

    5. Setelah masa berlaku habis, paket Umroh Plus tidak akan diperpanjang secara otomatis, namun pelanggan dapat membeli
    paket ini lebih dari satu kali.

    6. Pelanggan harus terhubung dengan jaringan yang memenuhi syarat di Arab Saudi atau negara transit maksimal 7/10 hari
    sejak aktivasi paket (sesuai dengan masa berlaku paket).

    7. Masa berlaku paket akan mengikuti Zona Waktu Indonesia Barat (GMT+7).

    8. Biaya roaming standar berlaku setelah kuota habis atau paket kedaluwarsa.

    9. Pastikan APN yang digunakan adalah INTERNET dan restart ponsel Anda setelah perubahan konfigurasi. Silakan lihat tautan
    berikut untuk pengaturan ponsel: http://www.xl.co.id/roamingtips

    10. Ketersediaan jaringan, kualitas layanan, dan kecepatan internet di luar negeri (2G/3G/4G) bergantung pada kapasitas
    jaringan, cakupan, dan layanan yang disediakan oleh mitra roaming.

    11. Pelanggan akan terhubung secara otomatis ke operator yang tersedia di luar negeri, namun akses ke jaringan luar negeri
    akan diberikan "apa adanya" dan "sebagaimana adanya" dan dapat berubah tanpa pemberitahuan sebelumnya. XL Axiata berhak
    menentukan pelanggan mana yang berhak mengakses jaringan asing mana di luar negeri.

    12. XL Axiata tidak menyatakan atau menjamin bahwa layanan roaming akan diberikan tanpa gangguan atau selalu tersedia
    atau bebas dari cacat, kesalahan, atau bahwa setiap cacat yang teridentifikasi dapat diperbaiki. Sejauh XL Axiata memberi
    Anda bantuan sehubungan dengan salah satu hal di atas. Setiap pengabaian yang ditawarkan kepada Anda oleh XL Axiata atas
    kebijakannya sendiri adalah atas itikad baik.

    13. Pelanggan setuju dengan syarat dan ketentuan beserta perubahannya dari waktu ke waktu termasuk namun tidak terbatas
    pada yang tercantum di www.xl.co.id'
- source_sentence: Kalau budget saya 25 ribu, paket 15 hari apa yang bisa saya beli?
  sentences:
  - 'Cara Pembelian Paket dan Informasi Resmi

