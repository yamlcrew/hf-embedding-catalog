widgetData:
- source_sentence: мороженое протеиновое
  sentences:
  - Эскимо "Суфле" в молочном шоколаде Эскимо с мягким сливочным вкусом и глазурью из молочного шоколада
  - Ассорти сухофруктов с пастилой Сытный, вкусный и полезный снек и чудесный десерт к чаю или кофе. Солнечный аромат вяленых
    бананов, кисло-сладкий вкус спелого сушеного яблока и натуральная, яблочно-банановая пастила. Не содержит добавленного
    сахара. Удобная компактная упаковка так и просится в карман или сумку, чтобы сопровождать вас на прогулке, лекции или
    пикнике. Отличная замена классическим сладостям и легкий перекус.
  - Мороженое молочное протеиновое Bombbar Соленая карамель со сливками 150 г Универсальный белковый десерт без сахара для
    похудения, набора массы или просто вкусного и полезного перекуса.
- source_sentence: овсяная каша
  sentences:
  - Чипсы протеиновые "Сметана и зелень" Полезная альтернатива картофельным чипсам, на 75% состоящая из коллагенового белка.
    Отсутствие углеводов делают чипсы подходящими для кето диеты, а высокое содержание протеина превращает их в идеальный
    снек для перекуса после тренировки. К тому же, небольшую упаковку удобно брать с собой, чтобы похрустеть в дороге. Некоторые
    покупатели отмечают, что протеиновыми чипсами легко можно наесться, причём для этого достаточно всего половины упаковки!
  - Каша овсяная, 250 г Питательная овсянка, сваренная на свежем молоке. Нежная, чуть сладковатая, она хороша и сама по себе,
    и с различными топингами. Например, в кашу можно добавить душистые ягоды, сухофрукты или горстку орехов.
  - 'Пирожное бисквитное "Картошка" Классическое пирожное со вкусом детства: плотное, насыщенно-шоколадное, с нежнейшим масляным
    кремом. Спорим, оно станет одним из ваших любимых лакомств?'
- source_sentence: баранина
  sentences:
  - Большая порция куриных шариков с пряным соусом "Цезарь" Сочные куриные шарики с хрустящей корочкой и тягучей сырной начинкой.
    Приедут к вам горячими с порцией соуса "Цезарь"
  - Корм влажный консервированный для собак "Баранина с тыквой" кусочки в соусе Grand Prix , 400 гр Полнорационный сбалансированный
    корм для собак, разработанный под ветеринарным контролем. Содержит 45% баранины и субпродуктов, обогащен полезными веществами.
    Дополнительно содержит пивные дрожжи, льняное семя и масло для здоровья ЖКТ, шерсти и кожи.
  - Люля-кебаб из ягнятины Халяль, зам. Аппетитные кебабы из ягнятины, приготовленные по стандартам Халяль. Сочные, с пряной
    нотой зиры и кориандра.
- source_sentence: фило
  sentences:
  - Киви резанный, Фрешбар Сочные ломтики спелых киви, нарезанные на половинки
  - Тесто "Фило" зам. 500 г Тончайшие листы теста фило для пирогов, десертов, роллов
  - Брусники листья 1.5г ф/пак 20 шт Брусника активно применяется в урологии как диуретик и природное средство против цистита
    и уретрита. Ее особая ценность в том, что она оказывает одновременно и антибактериальное, и противовоспалительное, и мочегонное
    действия.
- source_sentence: детская каша
  sentences:
  - Каша овсяная детская "Мишка" Сладкая овсяная каша с голубикой и бананами. Можно приготовить на кокосовом молоке
  - Сок гранатовый прямого отжима, 200 мл Натуральный сок холодного отжима, без сахара. Сбалансированный вкус, слегка мутный
    из-за мякоти
  - Десерт "Тирамису", 300 г Изысканный итальянский десерт в нестандартном исполнении. В нашем Тирамису много &lpar;очень
    много!&rpar; сливочного крема и Маскарпоне, поэтому лакомство невероятно нежное!
