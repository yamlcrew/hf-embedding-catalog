widgetData:
- source_sentence: безглютеновый хлеб
  sentences:
  - 'Instruct: Найти похожие продукты на основе деталей

    Query: Баклажаны по-сычуаньски баклажаны, азиатская кухня, закуска, терияки, сладкий соус, пряный вкус, овощное блюдо,
    вегетарианское, пикантное, жареное, замаринованное, кунжут, чеснок, имбирь, рыба, рисовый уксус Жареные баклажаны, замаринованные
    в терияки с рыбным соусом, рисовым уксусом, луком и имбирём. Тот самый пикантно-сладко-пряный вкус, характерный для азиатской
    кухни. Идеальная закуска к рису и мясным блюдам.'
  - 'Instruct: Найти похожие продукты на основе деталей

    Query: Печенье протеиновое в шоколаде без доб. сахара протеин, белок, порционная упаковка, тренировка, здоровое питание,
    сладости без сахара, молочный шоколад, снек Печенье в порционной упаковке с высоким содержанием белка — более 14 г на
    100 г продукта! Изготовлено без добавления сахара. Обладает мягким вкусом с нотами нежного молочного шоколада. Такое печенье
    удобно брать с собой. Например, чтобы восполнить запас сил после хорошей тренировки.'
  - 'Instruct: Найти похожие продукты на основе деталей

    Query: Изделие х/б без глютена с семенами безглютеновый, хлеб, рисовая мука, семена, клетчатка, полезный, сытный, ароматный,
    выпечка, гастрономия Ароматный безглютеновый хлеб из рисовой муки и псиллиума, испечённый на дрожжах. Семена тыквы, льна
    и подсолнечника придают его вкусу насыщенные маслянисто-ореховые нотки, а яблочный порошок — ненавязчивую кислинку.

    Псиллиум и пищевые волокна не только помогают хлебу сохранять упругую структуру, но и делают его полезнее, ведь клетчатка
    необходима для поддержания здоровья ЖКТ.

    Хлеб отлично подойдёт для приготовления сытных бутербродов, изысканных канапе, а также подачи с основными блюдами.'
- source_sentence: арома саше
  sentences:
  - 'Instruct: Найти похожие продукты на основе деталей

    Query: Сыр творожный Almette с зеленью 150 г None, сыр, творожный, закуски, бутерброды, сливочный, зелень Нежный сливочный
    вкус сыра с зеленью для бутербродов и закусок'
  - 'Instruct: Найти похожие продукты на основе деталей

    Query: Арома-саше "№13 Warm Tobacco" Aroma Garmony, 10 гр аромат, саше, натуральный, древесный, табачный, освежитель,
    упаковка, автомобиль, комод, шкафчик Саше с согревающим древесно-табачным ароматом. Для освежения помещения или устранения
    запаха.'
  - 'Instruct: Найти похожие продукты на основе деталей

    Query: Творог зерненый Карат Домашний 4% 200 г творог, домашний, зерненый, натуральный, без консервантов, без добавок,
    полезный завтрак, продукт из молока, умеренная жирность, Россия Зерненый творог из натурального молока, сливок и закваски.
    Мягкая текстура, без консервантов. Хранить 17 дней.'
- source_sentence: мойнез
  sentences:
  - 'Instruct: Найти похожие продукты на основе деталей

    Query: Масло оливковое Extra Virgin, Греция, 0.5 л None, оливковое масло, нерафинированное, холодный отжим, первичный
    отжим, аромат, цветочный, горчинка, золотистый, зеленоватый, Греция, 0.5 л, None Нерафинированное масло первого холодного
    отжима из ранних оливок. Богатый вкус с цветочными нотками и лёгкой горчинкой. Золотистый цвет с зеленоватым отливом.'
  - 'Instruct: Найти похожие продукты на основе деталей

    Query: Соус майонезный "Сырный" сырный, соус, веганский, бутерброды, сэндвичи, гарниры, закуски, салаты, бургер, соевое
    мясо, аллергены, подсластители, консервант, пребиотик Густой соус с насыщенным сливочно-сырным вкусом, веганский'
  - 'Instruct: Найти похожие продукты на основе деталей

    Query: Майонез "Домашний провансаль" майонез, провансаль, натуральный состав, домашний, без ароматизаторов, нежная консистенция,
    короткий срок хранения, яичный желток, подсолнечное масло Натуральный майонез из подсолнечного масла и яиц, без ароматизаторов
    и загустителей'
- source_sentence: сладкие десерты без сахара, которые можно подать на день рождения
  sentences:
  - 'Instruct: Найти похожие продукты на основе деталей

    Query: Большая порция куриных шариков с пряным соусом "Цезарь" куриные шарики, соус, закуски, фастфуд, горячее блюдо,
    сырная начинка, хрустящая корочка, пряный соус, порция Сочные куриные шарики с хрустящей корочкой и тягучей сырной начинкой.
    Приедут к вам горячими с порцией соуса "Цезарь"'
  - 'Instruct: Найти похожие продукты на основе деталей

    Query: Конфеты Scandic Лесные ягоды без сахара 14 г без сахара, низкий гликемический индекс, очищение зубов, свежесть,
    ягодные конфеты, Россия Ягодный вкус лета в каждой конфете. Освежает дыхание и способствует профилактике кариеса зубов.
    Подходят тем, кого интересуют продукты с низким гликемическим индексом. В составе измельченные ягоды черники и малины,
    не содержат сахара, дарят ощущение свежести, не портят зубную эмаль. Произведено в России.'
  - 'Instruct: Найти похожие продукты на основе деталей

    Query: Творог мягкий высокобелковый 6% высокобелковый, натуральный, нежный, десерт, мусс, пудинг, полезный, завтрак, молочный,
    консистенция Мягкий натуральный творог с повышенным содержанием белка — это не только завтрак чемпионов, но и замечтальный
    компаньон для хрустящих тостов, блинчиков и полезных сэндвичей. Он обладает нежной однородной консистенцией и деликатным
    молочным вкусом практически без кислинки. Такой творог можно превратить в десерт, дополнив его ягодами, орехами и мёдом,
    а можно использовать для приготовления творожных муссов и пудингов.'
- source_sentence: сладости без сахара и глютена подойдут для летнего пикника
  sentences:
  - 'Instruct: Найти похожие продукты на основе деталей

    Query: Сорбет "Манго- Маракуйя" без доб. сахара сладость, десерт, веганский, без сахара, низкокалорийный, охлаждающий,
    тропические фрукты, натуральный, диетический, сахарозаменитель, фруктовый, без добавок, здоровье Охлаждающий десерт с
    сочными тропическими фруктами — это возможность почувствовать вкус лета даже в холодное время года.

    В основе сорбета — натуральное пюре из манго и маракуйи, никаких ароматизаторов и красителей в составе нет. Как нет и
    сахара — вместо него добавлен подсластитель мальтит.

    Лакомство подойдёт веганам, постящимся, тем, кто считает калории, и всем ценителям полезных сладостей.'
  - 'Instruct: Найти похожие продукты на основе деталей

    Query: Чипсы картофельные Pringles Сметана и Лук 165 г чипсы, закуска, пряности, вкус, герметичная упаковка, удобство,
    классика, детство Ничем не повторимый, знакомый с детства вкус.'
  - 'Instruct: Найти похожие продукты на основе деталей

    Query: Филе камбалы с пряными травами и чесноком камбала, морепродукты, филе, пряные травы, чеснок, розмарин, тимьян'
