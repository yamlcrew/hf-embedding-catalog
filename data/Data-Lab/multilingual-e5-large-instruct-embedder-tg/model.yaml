  - 'Instruct: Найти похожие продукты на основе деталей

    Query: Жареный рис с креветками жареный рис, морепродукты, азиатская кухня, яйцо, овощи, жасминный рис, креветки'
  - 'Instruct: Найти похожие продукты на основе деталей

