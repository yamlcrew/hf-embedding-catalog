    \ a nationwide initiative to combat redlining, which includes reviewing how \nlenders who may be avoiding serving communities\
    \ of color are conducting targeted marketing and advertising.51 \nThis initiative will draw upon strong partnerships across\
    \ federal agencies, including the Consumer Financial"
  - "reuse \nRelevant and high-quality data. Data used as part of any automated system’s creation, evaluation, or \ndeployment\
    \ should be relevant, of high quality, and tailored to the task at hand. Relevancy should be \nestablished based on research-backed\
    \ demonstration of the causal influence of the data to the specific use case \nor justified more generally based on a\
    \ reasonable expectation of usefulness in the domain and/or for the \nsystem design or ongoing development. Relevance\
    \ of data should not be established solely by appealing to \nits historical connection to the outcome. High quality and\
    \ tailored data should be representative of the task at"
