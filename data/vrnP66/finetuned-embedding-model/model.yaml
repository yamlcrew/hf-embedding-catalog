widgetData:
- source_sentence: यथोवाच भगवान् धन्वन्तरिः ||२||
  sentences:
  - '**Ashtanga Hridayam, Uttara Sthana, chapter 22, sutra 106**


    **Sutra**:

    पटोल-निम्ब-यष्ट्य्-आह्व-वासा-जात्य्-अरिमेदसाम् । खदिरस्य वरायाश् च पृथग् एवं प्रकल्पना ॥ १०६ ॥


    **English Transliteration**:

    paṭola-nimba-yaṣṭy-āhva-vāsā-jāty-arimedasām | khadirasya varāyāś ca pṛthag evaṁ prakalpanā || 106 ||


    **English Translation**:

    Thus, a separate preparation should be made from patola, nimba, licorice, vasa, jati, arimedasa, khadira, and vara.'
  - '**Susrut Samhita, Sharira Sthana, chapter 9, sutra 2**


    **Sutra**:

    यथोवाच भगवान् धन्वन्तरिः ||२||


    **English Transliteration**:

    yathovāca bhagavān dhanvantariḥ ||2||


    **English Translation**:

    Thus spoke the venerable Dhanvantari.'
  - '**Susrut Samhita, Chikitsa Sthana, chapter 24, sutra 85**


    **Sutra**:

    सुखं वातं प्रसेवेत ग्रीष्मे शरदि मानवः | निवातं ह्यायुषे सेव्यमारोग्याय च सर्वदा ||८५||


    **English Transliteration**:

    sukhaṃ vātaṃ praseveta grīṣme śaradi mānavaḥ | nivātaṃ hyāyuṣe sevyamārogyāya ca sarvadā ||85||


    **English Translation**:

    A person should enjoy pleasant wind in summer and autumn. Absence of wind is always beneficial for longevity and health.'
- source_sentence: विशीर्यते कूर्चकस्तु दन्तकाष्ठगते विषे | जिह्वादन्तौष्ठमांसानां श्वयथुश्चोपजायते ||४८||
  sentences:
  - '**Susrut Samhita, Chikitsa Sthana, chapter 28, sutra 26**


    **Sutra**:

    पाप्मानं नाशयन्त्येता दद्युश्चौषधयः श्रियम् | कुर्युर्नागबलं चापि मनुष्यममरोपमम् ||२६||


    **English Transliteration**:

    pāpmānaṃ nāśayantyetā dadyuścauṣadhayaḥ śriyam | kuryurnāgabalaṃ cāpi manuṣyamamaropamam ||26||


    **English Translation**:

    These herbs destroy sin, bestow prosperity, and also create strength like that of serpents, making a human being comparable
    to the gods.'
  - '**Susrut Samhita, Kalpa Sthana, chapter 1, sutra 48**


    **Sutra**:

    विशीर्यते कूर्चकस्तु दन्तकाष्ठगते विषे | जिह्वादन्तौष्ठमांसानां श्वयथुश्चोपजायते ||४८||


    **English Transliteration**:

    viśīryate kūrcakastu dantakāṣṭhagate viṣe | jihvādantāuṣṭhamāṃsānāṃ śvayathuścopajāyate ||48||


    **English Translation**:

    When poison is present in the tooth-stick, the brush-like end disintegrates, and swelling arises in the tongue, teeth,
    lips, and gums.'
  - '**Charak-Samhita, chikitsa sthana, chapter 2, sutra 38**


    **Sutra**:

    गत्वा स्नात्वा पयः पीत्वा रसं वाऽनु शयीत ना| तथाऽस्याप्यायते भूयः शुक्रं च बलमेव च||३८||


    **English Transliteration**:

    gatvā snātvā payaḥ pītvā rasaṃ vā''nu śayīta nā| tathā''syāpyāyate bhūyaḥ śukraṃ ca balameva ca||38||


    **English Translation**:

    After intercourse, one should bathe, drink milk or juice, and then not sleep immediately. Thus, his semen, strength, and
    nourishment are increased again.'
- source_sentence: कृच्छ्रोन्मीले पुराणाज्यं द्राक्षा-कल्काम्बु-साधितम् । स-सितं योजयेत् स्निग्धं नस्य-धूमाञ्जनादि च ॥ १ ॥
  sentences:
  - '**Ashtanga Hridayam, Uttara Sthana, chapter 9, sutra 1**


    **Sutra**:

    कृच्छ्रोन्मीले पुराणाज्यं द्राक्षा-कल्काम्बु-साधितम् । स-सितं योजयेत् स्निग्धं नस्य-धूमाञ्जनादि च ॥ १ ॥


    **English Transliteration**:

    kṛcchronmīle purāṇājyaṃ drākṣā-kalkāmbu-sādhitam | sa-sitaṃ yojayet snigdhaṃ nasya-dhūmāñjanādi ca || 1 ||


    **English Translation**:

    In difficult opening of the eyes, old ghee, processed with grape-paste-water; with sugar, apply it smoothly, nasal drops,
    fumigation, collyrium, and so on.'
  - '**Charak-Samhita, chikitsa sthana, chapter 30, sutra 339**


    **Sutra**:

    देशे देशे च यत् सात्म्यं यथा वैद्योऽपराध्यति| चिकित्सा चापि निर्दिष्टा दोषाणां गूढचारिणाम्||३३९||


    **English Transliteration**:

    dēśē dēśē ca yat sātmyaṁ yathā vaidyōparādhyati| cikitsā cāpi nirdiṣṭā dōṣāṇāṁ gūḍhacāriṇām||339||


    **English Translation**:

    The suitability for different regions, how a physician errs, and the treatment of hidden diseases are prescribed.'
  - '**Ashtanga Hridayam, Uttara Sthana, chapter 17, sutra 14**


    **Sutra**:

    खादन्तो जन्तवः कुर्युस् तीव्रां स कृमि-कर्णकः । श्रोत्र-कण्डूयनाज् जाते क्षते स्यात् पूर्व-लक्षणः ॥ १४ ॥


    **English Transliteration**:

    khādanto jantavaḥ kuryus tīvrāṃ sa kṛmi-karṇakaḥ | śrotra-kaṇḍūyanāj jāte kṣate syāt pūrva-lakṣaṇaḥ || 14 ||


    **English Translation**:

    Biting creatures cause intense pain; that is a worm-infested ear; from scratching the ear, when a wound arises, the previous
    symptoms manifest.'
- source_sentence: श्वासः कासः प्रतिश्यायो मुखशोषोऽतिपार्श्वरुक्| कफहीने पित्तमध्ये लिङ्गं वाताधिके मतम्||१०१||
  sentences:
  - '**Susrut Samhita, Uttara tantra, chapter 42, sutra 80**


    **Sutra**:

    वायुः प्रकुपितः कोष्ठे शूलं सञ्जनयेद्भृशम् | निरुच्छ्वासी भवेत्तेन वेदनापीडितो नरः ||८०||


    **English Transliteration**:

    vāyuḥ prakupitaḥ koṣṭhe śūlaṃ sañjanayedbhṛśam | nirucchvāsī bhavettena vedanāpīḍito naraḥ ||80||


    **English Translation**:

    Aggravated Vata in the abdomen intensely generates pain (shula). Due to that pain, the person becomes breathless and afflicted
    by suffering.'
  - '**Charak-Samhita, chikitsa sthana, chapter 3, sutra 101**


    **Sutra**:

    श्वासः कासः प्रतिश्यायो मुखशोषोऽतिपार्श्वरुक्| कफहीने पित्तमध्ये लिङ्गं वाताधिके मतम्||१०१||


    **English Transliteration**:

    śvāsaḥ kāsaḥ pratiśyāyo mukhaśoṣo''tipārśvaruk| kaphahīne pittamadhye liṅgaṃ vātādhike matam||101||


    **English Translation**:

    Shortness of breath, cough, coryza (common cold), dryness of the mouth, and severe pain in the sides are the signs of
    increased Vata, with diminished Kapha and moderate Pitta.'
  - '**Charak-Samhita, chikitsa sthana, chapter 23, sutra 86**


    **Sutra**:

    आनद्धे गुदलेपो योनौ लेपश्च मूढगर्भाणाम्| मूर्च्छार्तिषु च ललाटे प्रलेपनमाहुः प्रधानतमम्||८६||


    **English Transliteration**:

    ānaddhe gudalepo yonau lepaśca mūḍhagarbhāṇām| mūrchārtisu ca lalāṭe pralepanamāhuḥ pradhānatamam||86||


    **English Translation**:

    It is said that this is an excellent application for flatulence, as a vaginal application for obstructed labor, and as
    a paste on the forehead for fainting and pain.'
- source_sentence: वातातपाध्व-यानादि-परिहार्येष्व् अ-यन्त्रणम् । प्रयोज्यं सु-कुमाराणाम् ईश्वराणाम् सुखात्मनाम् ॥ ४५ ॥
  sentences:
  - '**Ashtanga Hridayam, Sutra Sthana, Sutra Sthana, chapter 6, sutra 129**


    **Sutra**:

    गुर्व् आम्रं वात-जित् पक्वं स्वाद्व् अम्लं कफ-शुक्र-कृत् । वृक्षाम्लं ग्राहि रूक्षोष्णं वात-श्लेष्म-हरं लघु ॥ १२९ ॥


    **English Transliteration**:

    gurv āmraṃ vāta-jit pakvaṃ svādv amlaṃ kapha-śukra-kṛt । vṛkṣāmlaṃ grāhi rūkṣoṣṇaṃ vāta-śleṣma-haraṃ laghu ॥ 129 ॥


    **English Translation**:

    Heavy mango vata-conquering ripe sweet-sour kapha-semen-doing. Garcinia astringent dry-hot vata-phlegm-removing light.'
  - '**Ashtanga Hridayam, Chikitsa Sthana, chapter 13, sutra 45**


    **Sutra**:

    वातातपाध्व-यानादि-परिहार्येष्व् अ-यन्त्रणम् । प्रयोज्यं सु-कुमाराणाम् ईश्वराणाम् सुखात्मनाम् ॥ ४५ ॥


    **English Transliteration**:

    vātātapādhva-yānādi-parihāryeṣv a-yantraṇam | prayojyaṃ su-kumārāṇām īśvarāṇām sukhātmanām || 45 ||


    **English Translation**:

    Without restrictions regarding avoidance of wind, sun, travel, etc., it can be used by delicate, wealthy, and happy individuals.'
  - '**Ashtanga Hridayam, Sutra Sthana, chapter 22, sutra 34**


    **Sutra**:

    कच-सदन-सित-त्व-पिञ्जर-त्वं परिफुटनं शिरसः समीर-रोगान् । जयति जनयतीन्द्रिय-प्रसादं स्वर-हनु-मूर्द्ध-बलं च मूर्द्ध-तैलम्
    ॥ ३४ ॥


    **English Transliteration**:

    kaca-sadana-sita-tva-piñjara-tvaṃ parisphuṭanaṃ śirasaḥ samīra-rogān । jayati janayatīndriya-prasādaṃ svara-hanu-mūrddha-balaṃ
    ca mūrddha-tailam ॥ 34 ॥


    **English Translation**:

    Hair-falling-white-ness-yellowish-ness splitting of head wind-diseases overcomes generates sense-organ-pleasure voice-jaw-head-strength
    and head-oil.'
