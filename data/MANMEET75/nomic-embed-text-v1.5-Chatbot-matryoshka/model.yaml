widgetData:
- source_sentence: If you receive a BharatPe speaker that you didn't order, please contact BharatPe support immediately. They
    will assist in resolving the issue and advise on the next steps.
  sentences:
  - Can I control multiple BharatPe speakers from one app?
  - What to do if the BharatPe speaker's transaction announcements are intermittently silent?
  - What should I do if I receive a BharatPe speaker without ordering it?
- source_sentence: Remote control capabilities depend on the model of the BharatPe speaker. Check if your model supports remote
    control through the BharatPe app or a connected device.
  sentences:
  - How do I update my personal details in my Bharatpe account?
  - What are the benefits of the BharatPe speaker?
  - Can I control the BharatPe speaker remotely?
- source_sentence: If the announcements are not clear, check the speaker's volume settings and ensure it's not placed near
    noisy equipment. If clarity doesn't improve, the speaker may need servicing.
  sentences:
  - What to do if my BharatPe speaker is not syncing with the transaction history in the app?
  - What should I do if the speaker is not announcing payments clearly?
  - The speaker doesn't produce any sound, what can be done?
- source_sentence: If the speaker is causing interference, try relocating it or other devices to reduce the interference.
    Ensure there's a reasonable distance between the speaker and other wireless equipment.
  sentences:
  - Can I use my Bharatpe device for international transactions?
  - How do I know if my BharatPe speaker is under warranty?
  - What should I do if the BharatPe speaker is causing interference with other wireless devices?
- source_sentence: I can understand and respond in multiple Indian regional languages. Feel free to communicate with me in
    the language you're most comfortable with.
  sentences:
  - How can I check if the BharatPe speaker is receiving a network signal?
  - Bharti, can you provide tips for effective online communication?
  - Bharti, what languages can you understand and respond to?
