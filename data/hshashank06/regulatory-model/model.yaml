  - " How is the price per share determined when a company goes public and involves an investment bank? \n"
  - ' What percentage decrease have Fisker shares experienced in the past year despite a 30% increase on Feb. 27?

    '
  - " What factors contributed to the strong performance and outstanding returns of residential construction stocks since\
    \ the March lows as mentioned in the passage? \n"
- source_sentence: ' Municipal bonds are discussed as this type of investment.'
  sentences:
  - " What is the benefit and process of using an income-driven repayment (IDR) plan for federal student loans? \n"
  - ' Which luxury watch and jewelry brands are owned by Swatch?

    '
  - " What type of investment is discussed as a way to potentially increase after-tax returns by avoiding federal taxes, and\
    \ is often chosen for its relative safety and steady return? \n"
- source_sentence: ' The rally could potentially fill the Sept. 18 gap between $145 and $150, reaching the .618 sell-off retracement
    level. The on-balance volume indicator suggests that Roku stock is unlikely to test the September high at this time.'
  sentences:
  - " What rewards and perks can Navy Federal Visa Signature Flagship Rewards credit card users receive upon opening an account\
