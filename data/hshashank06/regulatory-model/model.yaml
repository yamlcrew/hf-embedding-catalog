  - " What forms does Section 16 require insiders to file and when is Form 3 typically submitted? \n"
  - " What is the relationship between an item's utility and its subjective human value according to the passage? \n"
- source_sentence: ' The price per share is determined when a company goes public by giving a valuation to the company with
    the input of an investment bank. This value is then divided by the total number of shares to be issued.'
