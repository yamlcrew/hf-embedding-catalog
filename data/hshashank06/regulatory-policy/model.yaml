widgetData:
- source_sentence: Legal events with reserves established prior to December 31, 2007, should be reported by the quarter and
    year in which the first legal reserve for each respective legal event was recorded. This means that even if there were
    multiple reserves recorded for the same event in different quarters, it should be counted as one event in the total for
    the quarter in which the first reserve was made. The total number reported should be based on the number of legal events,
    not the number of reserve entries.
  sentences:
  - How do detailed subsidiary listings impact Capital Assessments in FR Y-14Q reports?
  - Provide guidelines for Capital Assessments and Stress Testing using CACQR511 market input type.
  - How should legal events with reserves prior to Dec 31, 2007, be reported?
- source_sentence: Litigation reserves for sold residential mortgages in FR Y-14Q reports are handled by including all provisions
    to litigation reserves/liability for claims related to sold residential mortgages and all litigation settlements and penalties
    in the Risk Expense line item. These provisions should not be reported in any other line items established for losses
    related to sold or government-insured residential mortgage loans. It is important to exclude all provisions to litigation
    reserves/liability for claims related to sold residential mortgages in line items 14N or 30, as applicable.
  sentences:
  - Describe the process of categorizing and recording charged-off loans based on delinquency status.
  - How do negative entries on FR Y-14Q reports affect balance sheet reporting outcomes?
  - How are litigation reserves for sold residential mortgages handled in FR Y-14Q reports?
- source_sentence: '

    For purposes of Schedule H.1: Fields 4 (Obligor Name), 11 (TIN), 46 (Guarantor Name), 47 (Guarantor TIN), and 50 (Entity
    Name) and H.2: Field 2 (Obligor Name), the term "individual(s) (Natural Person(s))" refers only to living human beings
    and human beings doing business as (DBA) another entity where the primary source of repayment analyzed is the personal
    credit of the natural person behind the DBA.

    For the name-related fields, the name of an entity should not automatically be replaced with "Individual" if the entity
    does not meet the definition of "individual(s) (Natural Person(s))" stated above. However, if the name of an entity contains
    the name of a natural person, that name may be masked in the firm''s reporting of these fields. For example, for an obligor
    named "Estate of John Doe," the firm could report "Estate of [Individual]" or similar text in the name-related fields.
    (FRB Response: September 11, 2024)'
  sentences:
  - 'We would appreciate clarifying guidance on which types of entities should be considered "individuals or Natural Persons"
    for purposes of Schedule H.1: Fields 4 (Obligor Name), 11 (TIN), 46 (Guarantor Name), 47 (Guarantor TIN), 50 (Entity Name)
    and H.2 Fields: 2 (Obligor Name).

    Does the definition of individual align with the Schedule HC-C definition and include a "trust or other entity that acts
    on behalf of (or in place of) an individual or a group of individuals"?

    Does the definition of individual include "individuals doing business as (DBA) another entity" as described in the Obligor
    Financial Data Section, such as sole proprietorships?'
  - What exclusions apply to reporting obligations for Capital Assessments and Stress Testing?
  - How do off-balance-sheet liabilities impact accounting practices for securities and commitments?
- source_sentence: The impact of Capital Assessments and Stress Testing rules on FR Y-14Q reporting is significant. These
    rules help ensure that financial institutions maintain adequate capital levels to withstand adverse economic conditions.
    By conducting stress tests, regulators can assess the resilience of banks and identify any potential weaknesses in their
    capital positions. This ultimately contributes to a safer and more stable financial system.
  sentences:
  - Describe steps for Capital Assessments and Stress Testing based on FR Y-14Q Report requirements.
  - Specify the rules outlined in FR Y-14Q for Capital Assessments and Stress Testing.
  - How do Capital Assessments and Stress Testing rules impact FR Y-14Q reporting?
- source_sentence: Based on the internal mark of the counterparty, if there is no internal mark for the counterparty legal
    entity, you should select "Proxy". Otherwise, if there is an internal mark for the counterparty legal entity, you should
    choose "CP Legal Entity".
  sentences:
  - Select entity type for CDS spread based on internal mark of counterparty.
  - Explain reporting adjustments for financial assets in Schedule IS-B, item 4.
  - Relates to 14Q, Schedule G.2. For G.2 line 3 C&I Loans, are we reporting here average balances of loans which are reported
    on FR Y-9C, Schedule HC-C (HC-C) line 4. Or are we reverting to the definition of other graded commercial loans and leases
    as reported on 14Q Schedule M Balances (Schedule M) where HC-C loans reported on line 9b2 are reported on Schedule M as
    "Other commercial loans"? Schedule M refers to HC-C lines 9a, 9b2 as other graded commercial loans and they are reported
    as wholesale corporate loans on 14Q Schedule H1. In other words, which HC-C loan lines are considered C&I for purposes
    of mapping to 14Q Schedule G.2 line 3? Further, although Schedule M considers HC-C loans reported in line 9b2 as Other
    commercial graded, if not reportable in line 3 on G.2, should they be reported in line 8 on G.2?
