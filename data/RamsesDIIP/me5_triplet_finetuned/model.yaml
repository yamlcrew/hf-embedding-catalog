widgetData:
- source_sentence: Base de zahorras artificial, con extendido y compactado del material al 100% del PM, en entorno urbano
    con dificultad de mobilidad, en aceras > 5 m de ancho o calzada/plataforma única > 12 m de ancho, sin afectación por servicios
    o elementos de mobiliario urbano, en actuaciones de 0.2 a 2 m3
  sentences:
  - Vertido de hormigón para muros de contención de hasta 3 m de altura, utilizando hormigón armado con aditivo impermeabilizante
    HA - 40 / B / 10 / XC2, con una dosificación de 375 kg de cemento por metro cúbico y una relación agua-cemento menor o
    igual a 0.45, realizado con cubilote.
  - Capa de grava artificial, con distribución y compactación del material al 100% del Proctor Modificado, en área urbana
    con limitaciones de acceso, en aceras mayores a 5 m de ancho o calzadas/plataformas únicas superiores a 12 m de ancho,
    sin interferencias de servicios o mobiliario urbano, en trabajos de 0.2 a 2 m3.
  - Base de hormigón armado, con vertido y fraguado del material al 80% del volumen, en área rural con fácil acceso, en caminos
    de tierra > 3 m de ancho o senderos > 8 m de ancho, con interferencia por instalaciones eléctricas o elementos de paisajismo,
    en proyectos de 1 a 5 m3.
- source_sentence: Semivigueta y bovedilla para forjado de 16+4 cm, hasta 3 m de altura, como máximo, con bovedilla de mortero
    de cemento y semiviguetas de hormigón armado de 15 y 16 cm de altura, Indeterminadointerejes 0,6 m, luz entre 2,5 y 5
    m, de momento flector último 18,0 a 26,3 kN·m por m de ancho de techo
  sentences:
  - Semivigueta y bovedilla para losas de 16+4 cm, con una altura máxima de 3 m, utilizando bovedillas de mortero de cemento
    y semiviguetas de hormigón armado de 15 y 16 cm de altura, con un intereje indeterminado de 0,6 m y luces que varían entre
    2,5 y 5 m, soportando un momento flector último de 18,0 a 26,3 kN·m por metro de ancho de la losa.
  - Radiador de acero de 8 secciones con 2 columnas, altura máxima de 650 mm, diseñado para agua caliente a 6 bar y 110 °C,
    con soporte para instalación empotrada, válvulas termostáticas para sistema monotubular y purgador manual.
  - Vigueta y ladrillo para pared de 20+5 cm, hasta 4 m de altura, como mínimo, con ladrillo de arcilla y viguetas de acero
    de 20 y 22 cm de altura, interejes indeterminados de 0,8 m, luz entre 3,0 y 6 m, de momento flector último 15,0 a 20,0
    kN·m por m de ancho de pared.
- source_sentence: Pared para pozo rectangular de 70x30 cm, de 29 cm de espesor de ladrillo perforado, enfoscada y enlucida
    por dentro y enfoscado previo por fuera con mortero cemento 1:4
  sentences:
  - Muro para un pozo rectangular de 70x30 cm, con un grosor de 29 cm de ladrillo hueco, revestido y acabado interiormente,
    y con un enfoscado exterior previo utilizando mortero de cemento en proporción 1:4.
  - Marco de ventana de pino flandes, con dimensiones de 70x35 mm2, diseñado para un espacio de obra de aproximadamente 150x290
    cm.
  - Pared para piscina circular de 70x30 cm, de 29 cm de espesor de ladrillo macizo, revestida y pintada por dentro y con
    impermeabilización previa por fuera con mortero de cal 1:4.
- source_sentence: Conjunto de cuatro captadores solares planos de plancha de cobre con vidrio templado, envolvente de aluminio
    anodizado y aislamiento de espuma de poliuretano con una superficie activa de 2.25 a 2.55 m2, un rendimiento máximo de
    90 % y un coeficiente de pérdidas <= 5 W/(m2·°C), colocado con soporte vertical
  sentences:
  - Conjunto de cuatro paneles fotovoltaicos de silicio monocristalino con marco de acero inoxidable y sistema de refrigeración
    líquida, con una superficie activa de 2.25 a 2.55 m2, un rendimiento máximo de 95 % y un coeficiente de pérdidas <= 3
    W/(m2·°C), instalado en una estructura inclinada.
  - Interruptor doble modular de 2 módulos estrechos, unipolar (1P), 10 AX/250 V, con tecla, de alta gama, empotrado, con
    marco adaptador para mecanismos modulares en caja universal de 1 elemento de alta gama, tubo flexible corrugado de PVC
    recubierto, caja de derivación rectangular y conductor de cobre tipo H07V-U.
  - Sistema de cuatro colectores solares de lámina de cobre con vidrio resistente, estructura de aluminio anodizado y aislamiento
    de poliuretano, con un área efectiva de 2.25 a 2.55 m2, eficiencia máxima del 90 % y un coeficiente de pérdidas menor
    o igual a 5 W/(m2·°C), instalado en posición vertical.
- source_sentence: Instalaciones de energía solar fotovoltaica aislada de 1800 W de potencia con 1.33333 unidades de conjunto
    de 6 módulos fotovoltáicos de tipo policristalino para instalación aislada/conexión a red, de 230 Wp de potencia de pico
    cada uno, con una eficiencia mínima 14,1%, con marco de aluminio anodizado, protección con vidrio templado, caja de conexión,
    precableado con conectores especiales, con estructura de soporte para 6 módulos fotovoltaicos en posición vertical, de
    perfiles de aluminio extruido, con inclinación de 30 o 40º, para colocar sobre suelo o cubierta plana, montados y conectados,
    con equipo multifunción para instalación fotovoltaica con funciones de inversor, cargador y regulador, de 1500 VA de potencia,
    monofásico de 230 V de onda sinusoidal pura, rendimiento mínimo 94 % y kit bateria estacionaria para instalació fotovoltaica
    de 12 V, con 6 módulos de bateria estacionariaa para instalació fotovoltaica tipo OPzV, con electrólito de gel, de 2 V
    de tensión nominal y 750 A·h C100, hermética y libre de mantenimiento, electrodo positivo tubular, cuerpo ABS, alta estabilidad
    a los ciclos de carga y descarga, instaladas y con conectores entre baterías
  sentences:
  - Pavimento de concreto HA-30/B / 20 / IIa + E de textura suave, con un tamaño máximo de agregado de 20 mm, que contiene
    al menos 300 kg/m3 de cemento, adecuado para la clase de exposición IIa + E, sin aditivos, instalado mediante transporte
    manual interno, extendido y vibrado a mano, y terminado con regla.
  - Instalaciones de energía eólica de 1800 W de potencia con 1.33333 unidades de aerogeneradores de tipo horizontal, cada
    uno con una capacidad de 230 W, diseñados para conexión a red, con un rendimiento mínimo del 14,1%, equipados con palas
    de fibra de vidrio, sistema de control de carga, y estructura de soporte para 6 aerogeneradores en posición vertical,
    con inclinación de 30 o 40º, para colocar sobre suelo o cubierta plana, montados y conectados, con equipo multifunción
    para instalación eólica que incluye inversor, cargador y regulador, de 1500 VA de potencia, monofásico de 230 V de onda
    sinusoidal pura, rendimiento mínimo del 94% y kit de baterías estacionarias para instalación eólica de 12 V, con 6 módulos
    de batería estacionaria tipo OPzV, con electrólito de gel, de 2 V de tensión nominal y 750 A·h C100, hermética y libre
    de mantenimiento, electrodo positivo tubular, cuerpo ABS, alta estabilidad a los ciclos de carga y descarga, instaladas
    y con conectores entre baterías.
  - Sistema de energía solar fotovoltaica independiente de 1800 W, compuesto por 6 módulos policristalinos de 230 Wp cada
    uno, con una eficiencia mínima del 14,1%, montados en una estructura de soporte de aluminio extruido con inclinación de
    30 a 40 grados, incluyendo un inversor multifuncional de 1500 VA y un kit de baterías estacionarias de 12 V, todo preinstalado
    y listo para su conexión.
