widgetData:
- source_sentence: 'query: Formigonament per a cèrcols inclinats amb formigó per armar, amb 20% de granulats de material reciclat
    de formigons, amb additiu hidròfug HRA - 40 / F / 20 / XC4 + XS3 amb una quantitat de ciment de 400 kg/m3 i relació aigua
    ciment =< 0.45, abocat amb bomba'
  sentences:
  - 'passage: Col·locació de revestiment ceràmic en parets exteriors amb una alçària màxima de 3 m, utilitzant rajoles rectangulars
    o quadrades de ceràmica vidriada, amb una densitat de 76 a 115 peces/m2, de gamma alta, grup BIII (UNE-EN 14411), fixades
    amb adhesiu cimentós tipus C2 segons la norma UNE-EN 12004 i rejuntades amb beurada CG2 (UNE-EN 13888).'
  - 'passage: Formigonament per a cèrcols horitzontals amb formigó convencional, sense additius, amb una quantitat de ciment
    de 350 kg/m3 i relació aigua ciment =< 0.50, abocat manualment.'
  - 'passage: Formigonament per a cèrcols inclinats amb formigó armat, incorporant un 20% de granulats reciclats de formigó,
    utilitzant un additiu hidrofug HRA - 40 / F / 20 / XC4 + XS3, amb una dosi de ciment de 400 kg/m3 i una relació aigua-ciment
    ≤ 0.45, realitzat mitjançant bomba.'
- source_sentence: 'query: Llumenera decorativa bitub amb xassís d''alumini anoditzat sense difusor, amb 2 tubs (bitub) de
    fluorescència T26/G13 de 30W, (2 tubs (bitub) x 30W), amb reactància ferromagnètica AF, instal·lada suspesa'
  sentences:
  - 'passage: Coberta sandwich "in situ" amb pendent inferior al 30 %, composta per dues planxes, on la inferior és un perfil
    nervat de planxa d''acer galvanitzat amb 3 nervis a distàncies de 340 a 345 mm i una alçària de 35 a 40 mm, amb un gruix
    d''1 mm, inèrcia de 14 a 15 cm4 i massa superficial de 8 a 9 kg/m2, acabat perforat amb un coeficient de perforació de
    l''11%, d''acord amb la norma UNE-EN 14782; perfil nervat de planxa d''acer galvanitzat i lacat amb 6 nervis separats
    entre 185 i 195 mm i alçària de 11 a 13 mm, gruix d''1 mm, inèrcia de 2 a 3 cm4 i massa superficial de 8 a 9 kg/m2, acabat
    llis de color estàndard, segons la norma UNE-EN 14782; i perfils omega d''acer d''alçària 100 mm com a separadors, amb
    aïllament de placa de llana mineral de roca de 126 a 160 kg/m3 i gruix de 90 mm.'
  - 'passage: Llumenera funcional bitub amb estructura d''acer inoxidable amb difusor, amb 2 tubs (bitub) de LED T26/G13 de
    20W, (2 tubs (bitub) x 20W), amb balast electrònic, instal·lada en superfície.'
  - 'passage: Llumenera ornamental de doble tub amb estructura d''alumini anoditzat sense difusor, equipada amb 2 tubs de
    fluorescència T26/G13 de 30W, amb reactància ferromagnètica AF, instal·lada penjada.'
- source_sentence: 'query: Derivació mixta mascle amb ramal 90°, de polipropilè, diàmetre nominal DN 40, amb un ramal a 90°
    per a 1 unió roscada d''1 1/4", pressió nominal PN 16, amb 2 unions mecàniques per compressió mitjançant femella, d''acord
    amb la norma UNE-EN 12201-3, connectat a pressió i col·locada al fons de la rasa, en entorn urbà sense dificultat de mobilitat,
    sense afectació per presència de serveis en la rasa, amb presència d''estrebada'
  sentences:
  - 'passage: Derivació mixta femella amb ramal 45°, de PVC, diàmetre nominal DN 50, amb un ramal a 45° per a 2 unions roscades
    d''1", pressió nominal PN 10, amb 3 unions mecàniques per soldadura, d''acord amb la norma UNE-EN 1452-2, connectat a
    buit i col·locada a la superfície, en entorn rural amb dificultat de mobilitat, amb afectació per presència de serveis
    en la rasa, sense presència d''estrebada.'
  - 'passage: Caixa per a embornal de dimensions 70x30x85 cm, amb murs de 20 cm de gruix sobre una base de formigó massís
    de 15 cm, tipus HM - 20 / B / 20 / X0, amb una dosi de ciment de 200 kg/m3 i una relació aigua-ciment ≤ 0.6.'
  - 'passage: Derivació mixta mascle amb ramal de 90°, fabricada en polipropilè, diàmetre nominal DN 40, amb un ramal a 90°
    per a una unió roscada de 1 1/4", pressió nominal PN 16, equipada amb dues unions mecàniques per compressió mitjançant
    femella, conforme a la norma UNE-EN 12201-3, instal·lada a pressió i situada al fons de la rasa, en un entorn urbà amb
    bona accessibilitat, sense interferències per serveis presents a la rasa, amb la inclusió d''estrebades.'
- source_sentence: 'query: Formigonat de riostres i basaments en obres d''enginyeria civil amb formigó per armar amb additiu
    hidròfug HA - 40 / B / 10 / XC4 + XD2 amb una quantitat de ciment de 350 kg/m3 i relació aigua ciment =< 0.45, abocat
    amb cubilot'
  sentences:
  - 'passage: Formigonat de fonaments i estructures en projectes d''enginyeria civil amb formigó reforçat amb additiu impermeabilitzant
    HA - 40 / B / 10 / XC4 + XD2, utilitzant una dosi de ciment de 350 kg/m3 i una relació aigua-ciment ≤ 0.45, abocat mitjançant
    cubilot.'
  - 'passage: Formigonat de riostres i fonaments en obres d''arquitectura amb formigó per armar amb additiu retardant HA -
    40 / B / 10 / XC4 + XD2 amb una quantitat de ciment de 400 kg/m3 i relació aigua ciment =< 0.50, abocat amb bomba de formigó.'
  - 'passage: Excavació de canal de fins a 2 m d''amplada i fins a 4 m de profunditat, en sòl compacte, utilitzant excavadora
    i càrrega mecànica del material tret, en un entorn urbà amb dificultats de circulació, en voreres de més de 5 m d''amplada
    o calçades/plataformes úniques de més de 12 m d''amplada, amb impacte sobre serveis o elements de mobiliari urbà, en treballs
    de fins a 0.2 m3.'
- source_sentence: 'query: Tub de PVC de 230 mm de diàmetre nominal de formació helicoïdal amb perfil rígid nervat exteriorment,
    per anar formigonat, unió elàstica amb massilla adhesiva de poliuretà i col·locat al fons de la rasa, en entorn urbà sense
    dificultat de mobilitat, en voreres > 5 m d''amplària o calçada/plataforma única > 12 m d''amplària, sense afectació per
    serveis o elements de mobiliari urbà, en actuacions d''1 a 10 m'
  sentences:
  - 'passage: Formigonament de panells lleugers amb formigó autocompactant HA - 40 / AC / 10 / XC4 + XF3, utilitzant 350 kg/m3
    de ciment i una relació aigua-ciment ≤ 0.45, abocat mitjançant cubilot.'
  - 'passage: Tub de PVC de 230 mm de diàmetre nominal amb disseny helicoïdal i perfil rígid reforçat a l''exterior, destinat
    a ser formigonat, amb connexió elàstica mitjançant massilla adhesiva de poliuretà, instal·lat al fons de la rasa en un
    entorn urbà amb bona accessibilitat, en voreres de més de 5 m d''amplada o calçades/plataformes úniques de més de 12 m
    d''amplada, sense interferències amb serveis o elements de mobiliari urbà, en projectes d''entre 1 i 10 m.'
  - 'passage: Tub de PVC de 250 mm de diàmetre nominal de formació cilíndrica amb perfil flexible llis interiorment, per instal·lar
    en superfície, unió rígida amb cargols metàl·lics i col·locat a la part superior del sòl, en entorn rural amb dificultats
    de mobilitat, en camins < 3 m d''amplària o carreteres de doble sentit < 8 m d''amplària, amb afectació per serveis o
    elements de paisatgisme, en actuacions de 5 a 15 m.'
