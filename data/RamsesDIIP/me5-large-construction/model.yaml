widgetData:
- source_sentence: Hormigonado de zanjas y pozos de cimentación, con hormigón en masa, con 20% de áridos de material reciclado
    de hormigones, HRM - 30 / B / 20 / XA2 con una cantidad de cemento de 350 kg/m3 i relación agua cemento =< 0.5, colocado
    desde camión
  sentences:
  - Tubo de acero inoxidable 1.4307 (AISI 304L) con soldadura longitudinal, de 22 mm de diámetro exterior y 0,7 mm de espesor
    de pared, serie 1 conforme a UNE-EN 10312, conexión a presión, con nivel de dificultad elevado y instalado de forma empotrada.
  - Vertido de hormigón en zanjas y cimientos, utilizando hormigón masivo con un 20% de áridos reciclados, tipo HRM - 30 /
    B / 20 / XA2, con una dosificación de cemento de 350 kg/m3 y una relación agua-cemento menor o igual a 0.5, aplicado directamente
    desde el camión.
  - Colocación de paneles de yeso en interiores, utilizando yeso laminado, con un espesor de 12.5 mm y una resistencia al
    fuego de tipo F30, aplicando una mezcla de adhesivo con una proporción de agua de 0.4, instalado manualmente.
- source_sentence: Pavimento de loseta para acera gris de 20x20x4 cm, clase 1a, precio alto, sobre soporte de 3 cm de arena,
    colocado a pique de maceta con mortero mixto 1:2:10 y lechada de cemento pórtland, en entorno urbano sin dificultad de
    movilidad, en aceras > 5 m de ancho o calzada/plataforma única > 12 m de ancho, con afectación por servicios o elementos
    de mobiliario urbano, en actuaciones de más de 10 m2
  sentences:
  - Losas de concreto de 60x40 cm y 8 cm de grosor, con acabado rugoso, instaladas con mortero de cemento 1:6 y juntas selladas,
    en áreas urbanas con fácil acceso, en aceras de más de 3 y hasta 5 m de ancho o en calzadas de más de 7 y hasta 12 m de
    ancho, sin interferencias de servicios públicos o mobiliario urbano, en proyectos de hasta 1 m2.
  - Pavimento de loseta para jardín verde de 30x30x5 cm, clase 2b, precio bajo, sobre soporte de 5 cm de grava, colocado a
    nivel de césped con tierra orgánica y mezcla de arena, en entorno rural con dificultad de acceso, en jardines < 10 m de
    ancho o senderos individuales < 5 m de ancho, sin afectación por servicios o elementos de jardinería, en actuaciones de
    menos de 5 m2.
  - Loseta de pavimento gris de 20x20x4 cm, clase 1a, de alto costo, instalada sobre una base de 3 cm de arena, fijada a nivel
    de maceta con mortero 1:2:10 y lechada de cemento pórtland, en un área urbana con fácil acceso, en aceras de más de 5
    m de ancho o plataformas de más de 12 m de ancho, considerando la interferencia de servicios o mobiliario urbano, para
    proyectos que superen los 10 m2.
- source_sentence: Derivación a 90° reducida de polietileno PE 100 de fabricación inyectada con ramal a 90° DN 110 para una
    unión soldadura a tope, presión nominal PN 16 (SDR 11), fabricación según norma UNE-EN 12201-3, para una unión soldadura
    a tope, soldadura a tope y colocada en el fondo de la zanja, en entorno urbano sin dificultad de movilidad, afectación
    por presencia de servicios en la zanja, sin presencia de entibación
  sentences:
  - Derivación a 45° de PVC tipo 1 con ramal a 45° DN 75 para una conexión mediante pegamento, presión nominal PN 10 (SDR
    13.5), fabricación según norma UNE-EN 1452-2, para una conexión mediante pegamento, instalada en la parte superior de
    la estructura, en un entorno rural con acceso restringido, sin interferencia de servicios en la zona, con necesidad de
    entibación.
  - Ventana de aluminio anodizado en acabado natural, con rotura de puente térmico, instalada sobre un premarco, compuesta
    por tres hojas abatibles, diseñada para un espacio de obra de aproximadamente 240x120 cm, fabricada con perfiles de alta
    calidad, con una clasificación mínima de 4 en permeabilidad al aire según UNE-EN 12207, clasificación mínima 9A en estanqueidad
    al agua según UNE-EN 12208 y clasificación mínima C4 en resistencia al viento según UNE-EN 12210, incluyendo caja de persiana
    y guías.
  - Derivación de polietileno PE 100 a 90° de fabricación inyectada, DN 110, para unión mediante soldadura a tope, con presión
    nominal PN 16 (SDR 11), conforme a la norma UNE-EN 12201-3, instalada en el fondo de la zanja en un entorno urbano, sin
    complicaciones de movilidad y con servicios presentes en la zanja, sin necesidad de entibación.
- source_sentence: Pavimento de pieza rectangular de hormigón doble capa, gris, de 10x20 cm y 8 cm de espesor, precio alto,
    para pavimento drenante, sobre lecho de arena de 3 cm de espesor, compactación del pavimento y rejuntado con mortero de
    cemento 1:6, en entorno urbano con dificultad de mobilidad, en aceras <= 3 m de ancho o calzada/plataforma única <= 7
    m de ancho, con afectación por servicios o elementos de mobiliario urbano, en actuaciones de hasta 1 m2
  sentences:
  - Colocación de losas de cimentación utilizando hormigón armado, incorporando un 20% de áridos reciclados, aditivo hidrófugo
    HRA - 35 / B / 20 / XC4 + XS1 + XA2, con una dosificación de cemento de 400 kg/m3 y una relación agua-cemento menor o
    igual a 0.5, vertido mediante cubilote.
  - Losas de hormigón rectangular de doble capa, color gris, de dimensiones 10x20 cm y 8 cm de grosor, de alto costo, diseñadas
    para pavimentos permeables, colocadas sobre una base de arena de 3 cm de grosor, con compactación del suelo y rejuntado
    utilizando mortero de cemento en proporción 1:6, en un entorno urbano con movilidad restringida, en aceras de hasta 3
    m de ancho o en calzadas/plataformas de hasta 7 m de ancho, considerando la interferencia de servicios o elementos de
    mobiliario urbano, en proyectos de hasta 1 m2.
  - Pavimento de losa cuadrada de cerámica simple, color beige, de 30x30 cm y 1 cm de espesor, precio bajo, para revestimiento
    decorativo, sobre base de grava de 5 cm de espesor, sin necesidad de compactación y sin rejuntado, en entorno rural con
    fácil acceso, en jardines o patios de más de 10 m2, sin interferencias por instalaciones o elementos de jardinería, en
    proyectos de más de 5 m2.
- source_sentence: Formación de junta de trabajo interior, en piezas hormigonadas 'in situ', con junta de PVC de 24 cm de
    ancho y de 3,5 mm de espesor
  sentences:
  - Instalación de paneles prefabricados, utilizando sellador de silicona de 12 cm de ancho y 5 mm de espesor.
  - Ventana de aluminio anodizado con rotura de puente térmico, instalada sobre un premarco, con una hoja oscilobatiente,
    diseñada para un hueco de obra de aproximadamente 90x120 cm, fabricada con perfiles de alta calidad, cumpliendo con la
    clasificación mínima 4 de permeabilidad al aire según UNE-EN 12207, clasificación mínima 9A de estanqueidad al agua según
    UNE-EN 12208 y clasificación mínima C5 de resistencia al viento según UNE-EN 12210, incluyendo caja de persiana y guías.
  - Instalación de juntas de trabajo internas en elementos de hormigón vertido 'in situ', utilizando juntas de PVC de 24 cm
    de ancho y 3,5 mm de grosor.
