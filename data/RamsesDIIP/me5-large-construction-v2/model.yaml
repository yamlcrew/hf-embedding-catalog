widgetData:
- source_sentence: Pavimento de piedra calcárea nacional serrada y sin pulir, precio alto, de 40 mm de espesor con arista
    viva en los cuatro bordes 1251 a 2500 cm2, colocada a pique de maceta con mortero cemento 1:6
  sentences:
  - Bordillo de hormigón recto con canaleta, de una sola capa, dimensiones 40x35 cm, instalado sobre una base de hormigón
    no estructural de 25 a 30 cm de altura y sellado con mortero.
  - Pavimento de piedra caliza nacional, sin pulir y con un grosor de 40 mm, con bordes afilados, en un rango de 1251 a 2500
    cm2, instalado en macetas utilizando mortero de cemento en una proporción de 1:6, a un precio elevado.
  - Pavimento de cerámica esmaltada de importación, precio bajo, de 10 mm de espesor con bordes redondeados en los cuatro
    lados 500 a 1000 cm2, instalada en superficie plana con adhesivo flexible.
- source_sentence: Hormigonado para encepados, con hormigón para armar HA - 30 / F / 10 / XC4 + XS1 con una cantidad de cemento
    de 300 kg/m3 i relación agua cemento =< 0.5, colocado con bomba en obras de ingeniería civil
  sentences:
  - Placa adicional para señales viales, fabricada en acero galvanizado y pintada, con dimensiones de 30x15 cm, recubierta
    con lámina retrorreflectante de clase RA3, montada sobre la señal, en áreas urbanas con limitaciones de movilidad, en
    aceras de más de 3 y hasta 5 m de ancho o en calzadas/plataformas únicas de más de 7 y hasta 12 m de ancho, sin interferencias
    de servicios o mobiliario urbano, en proyectos de hasta 1 unidad.
  - Hormigonado para estructuras de madera, con hormigón ligero para aislamiento con una cantidad de cemento de 200 kg/m3
    y relación agua-cemento >= 0.6, aplicado manualmente en proyectos de jardinería.
  - Colocación de hormigón para cimentaciones, utilizando hormigón HA - 30 / F / 10 / XC4 + XS1 con una dosificación de 300
    kg/m3 de cemento y una relación agua-cemento menor o igual a 0.5, aplicado mediante bomba en proyectos de infraestructura.
- source_sentence: Pared estructural para exterior de panel de madera contralaminada de 90 mm de espesor formada por 3 capas
    de madera de abeto C24, encoladas con adhesivo sin urea-formaldehído con la disposición transversal de la madera en las
    dos caras del panel, con tratamiento hidrófugo, con acabado superficial tipo vivienda en las dos caras con madera de Alerce
    europeo barnizado en una cara y con madera de abeto rojo en la otra con lasur en la otra colocado con fijaciones mecánicas,
    desolidarización del soporte con banda resiliente de caucho EPDM extruido, fijada con grapas; unión entre paneles machihembrado
    fijados con tornillos de acero y sellado de la cara interior de los juntas con cinta adhesiva de goma butílica, con armadura
    de poliéster y sellado de la cara exterior con cinta autoadhesiva de polietileno con adhesivo acrílico sin disolventes,
    con armadura de polietileno y película de separación de papel siliconado, previa aplicación de imprimación incolora a
    base de una dispersión acrílica sin disolventes; resolución de trabas con tornillos de acero; fijación de paneles con
    elementos de acero galvanizado
  sentences:
  - Pared decorativa para interior de panel de yeso de 12 mm de espesor, compuesta por una sola capa de yeso laminado, con
    acabado superficial tipo pintura acrílica en ambas caras, colocada con adhesivo a base de agua, sin tratamiento hidrófugo,
    y fijaciones mecánicas de tipo tornillo, sin necesidad de desolidarización del soporte, uniendo los paneles mediante un
    sistema de encastre simple, y sellado de las juntas con masilla acrílica, sin uso de cintas adhesivas.
  - Losetas de pavimento para aceras de 20x20x2,5 cm, clase 1a, de alto costo, instaladas a nivel de maceta con mortero de
    cemento 1:4 y lechada de color utilizando cemento blanco de albañilería, en un entorno urbano con fácil acceso, en aceras
    de más de 3 y hasta 5 m de ancho o calzadas/plataformas únicas de más de 7 y hasta 12 m de ancho, considerando la presencia
    de servicios o mobiliario urbano, en proyectos de entre 1 y 10 m2.
  - Pared exterior de panel de madera contralaminada de 90 mm de grosor compuesta por tres capas de madera de abeto C24, unidas
    con adhesivo libre de urea-formaldehído, con la disposición de la madera en sentido transversal en ambas caras del panel,
    tratada para resistir la humedad, y con un acabado de calidad residencial en ambas caras utilizando madera de Alerce europeo
    barnizada en un lado y madera de abeto rojo con lasur en el otro, fijada mecánicamente, con desolidarización del soporte
    mediante banda resiliente de caucho EPDM, unida con grapas; los paneles se ensamblan mediante machihembrado y se fijan
    con tornillos de acero, sellando las juntas interiores con cinta adhesiva de goma butílica y las exteriores con cinta
    autoadhesiva de polietileno con adhesivo acrílico sin disolventes, además de aplicar una imprimación incolora a base de
    dispersión acrílica sin disolventes; se utilizan tornillos de acero para resolver las uniones y se fijan los paneles con
    elementos de acero galvanizado.
- source_sentence: Ventana de aluminio anodizado natural, colocada sobre premarco, con una hoja oscilobatiente e una hoja
    fija lateral, para un hueco de obra aproximado de 150x120 cm, elaborada con perfiles de precio superior, clasificación
    mínima 4 de permeabilidad al aire según UNE-EN 12207, clasificación mínima 9A de estanqueidad al agua según UNE-EN 12208
    y clasificación mínima C5 de resistencia al viento según UNE-EN 12210, con caja de persiana y guías
  sentences:
  - Cable de 11 pares para uso exterior en instalaciones telefónicas, con aislamiento y cubierta de polietileno, conductor
    de cobre rígido de 0,405 mm de diámetro, clasificado como Fca según la norma UNE-EN 50575, y protegido con pantalla de
    aluminio/poliéster, instalado en tubo.
  - Ventana de aluminio anodizado en acabado natural, instalada sobre un premarco, que incluye una hoja oscilobatiente y una
    hoja fija lateral, diseñada para un hueco de obra de aproximadamente 150x120 cm, fabricada con perfiles de alta gama,
    con una clasificación mínima de 4 en permeabilidad al aire según UNE-EN 12207, clasificación mínima 9A en estanqueidad
    al agua según UNE-EN 12208 y clasificación mínima C5 en resistencia al viento según UNE-EN 12210, además de contar con
    una caja de persiana y guías.
  - Puerta de madera tratada, instalada en un marco de acero, con un diseño de apertura deslizante y un panel fijo lateral,
    para un espacio de construcción de aproximadamente 200x100 cm, fabricada con materiales de gama media, clasificación mínima
    2 de aislamiento térmico según UNE-EN 14509, clasificación mínima 5 de resistencia al fuego según UNE-EN 13501 y clasificación
    mínima B3 de resistencia a impactos según UNE-EN 12600, sin sistema de persiana ni guías.
- source_sentence: Banco de tablas de madera tropical con certificado FSC con aceite de dos componentes, de dos módulos, de
    3,1 m de longitud, con un respaldo de madera y con soportes de pletina de acero, colocado con fijaciones mecánicas, en
    entorno urbano sin dificultad de movilidad, en aceras > 3 y <= 5 m de ancho o calzada/plataforma única > 7 y <= 12 m de
    ancho, con afectación por servicios o elementos de mobiliario urbano, en actuaciones de 1 a 5 u
  sentences:
  - Banco de madera reciclada con tratamiento de pintura ecológica, de un solo módulo, de 2,5 m de longitud, sin respaldo
    y con patas de plástico, instalado en un parque rural con acceso restringido, en senderos de menos de 3 m de ancho, sin
    interferencias de servicios públicos o mobiliario, en proyectos de 6 a 10 unidades.
  - Base para pavimento de concreto no estructural HNE-15/B/20 con resistencia a compresión de 15 N/mm2, de consistencia suave
    y agregado de tamaño máximo de 20 mm, vertido desde camión y compactado manualmente, con acabado nivelado, en áreas urbanas
    con movilidad restringida, en aceras mayores a 5 m de ancho o calzadas/plataformas únicas superiores a 12 m de ancho,
    sin interferencias de servicios o mobiliario urbano, en trabajos de hasta 0.2 m3.
  - Banco de madera tropical con certificación FSC, tratado con aceite de dos componentes, de dos secciones, con una longitud
    de 3,1 m, equipado con respaldo de madera y soportes de acero, instalado con fijaciones mecánicas en un entorno urbano,
    apto para aceras de más de 3 y hasta 5 m de ancho o calzadas de más de 7 y hasta 12 m de ancho, considerando la presencia
    de servicios o mobiliario urbano, en proyectos de 1 a 5 unidades.
