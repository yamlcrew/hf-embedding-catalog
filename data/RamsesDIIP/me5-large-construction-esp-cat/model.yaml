  sentences:
  - 'passage: Terraplenada i piconatge per a fonament de terraplè amb material no seleccionat de la pròpia excavació, en tongades
    de fins a 30 cm, amb una compactació del 90% del PM, en entorn rural amb facilitat de mobilitat, en voreres > 2 i <= 4
    m d''amplària o calçada/plataforma única > 5 i <= 10 m d''amplària, sense afectació per serveis o elements de mobiliari
    urbà, en actuacions de menys de 3 m3.'
  - 'passage: Colocación de losas de cimentación utilizando hormigón armado, incorporando un 20% de áridos reciclados, con
    aditivo hidrófugo HRA - 30 / B / 10 / XC4 + XS1, y una dosificación de cemento de 400 kg/m3 y relación agua-cemento ≤
    0.5, vertido mediante cubilote.'
  - 'passage: Terraplenat i col·locació de grava per a fonament de terraplè utilitzant material seleccionat de l''excavació,
    en capes de fins a 25 cm, amb una compactació del 95% del pes màxim, en un entorn urbà amb dificultats de trànsit, en
    voreres d''amplada entre 3 i 5 m o calçades/plataformes d''amplada entre 7 i 12 m, amb afectacions a serveis o elements
    de mobiliari urbà, en projectes de més de 2 m3.'
- source_sentence: 'query: Vidrio aislante de luna de baja emisividad de 8+8 mm de espesor con 1 butiral transparente clase
    2 (B) 2 según UNE-EN 12600, cámara de aire de 8 mm y luna de 5+5 mm de espesor con 1 butiral traslúcido de luna incoloro,
    clase 2 (B) 2 según UNE-EN 12600, colocado con perfiles conformados de neopreno sobre aluminio o PVC'
  sentences:
  - 'passage: Vidrio de baja emisividad de 8+8 mm de grosor con una capa de butiral transparente clase 2 (B) 2 conforme a
    UNE-EN 12600, con una cámara de aire de 8 mm y un vidrio de 5+5 mm de grosor con butiral translúcido incoloro, clase 2
    (B) 2 según UNE-EN 12600, instalado con marcos de neopreno sobre aluminio o PVC.'
  - 'passage: Vidrio de seguridad templado de 10+10 mm de espesor con 1 butiral opaco clase 1 (A) 1 según UNE-EN 12600, cámara
    de aire de 10 mm y luna de 6+6 mm de espesor con 1 butiral colorido, clase 1 (A) 1 según UNE-EN 12600, instalado con marcos
    de acero inoxidable.'
  - 'passage: Formigonament per a sostre nervat reticular amb formigó HA-25/F / 10 / I de consistència líquida, amb una mida
    màxima del granulat de 10 mm, que conté >= 250 kg/m3 de ciment, adequat per a classe d''exposició I, abocat mitjançant
    cubilot.'
- source_sentence: 'query: Hormigonado de dinteles con hormigón para armar HA - 35 / F / 10 / XC4 + XS1 con una cantidad de
    cemento de 325 kg/m3 i relación agua cemento =< 0.5 y vertido con bomba'
  sentences:
  - 'passage: Formigonament per a fonaments a una profunditat màxima de 6 m utilitzant formigó armat amb additiu impermeabilitzant
    HA - 35 / B / 20 / XC1, amb una dosi de ciment de 300 kg/m3 i una relació aigua-ciment <= 0.6, abocat directament des
    de camió.'
  - 'passage: Colocación de dinteles utilizando hormigón HA - 35 / F / 10 / XC4 + XS1, con una dosificación de cemento de
    325 kg/m3 y una relación agua-cemento menor o igual a 0.5, vertido mediante bomba.'
  - 'passage: Hormigonado de vigas con mortero para armar HA - 30 / F / 15 / XC3 + XS2 con una cantidad de cemento de 300
    kg/m3 i relación agua cemento =< 0.6 y vertido manualmente.'
- source_sentence: 'query: Reducción concéntrica, de polietileno, diámetro nominal DN 63 - DN 50, presión nominal PN 16, con
    2 uniones por soldadura socket (enchufe), para canalización de polietileno para conducción de agua a presión, de acuerdo
    con la norma UNE-EN 12201-3 y colocado en el fondo de la zanja en entorno urbano sin dificultad de movilidad, sin afectación
    por presencia de servicios en la zanja, sin presencia de entibación'
  sentences:
  - 'passage: Rigola de 40 cm d''amplada de peça de doble capa de formigó de color blanc, dimensions 20x20x8 cm, destinada
    a rigoles, instal·lades amb morter i rejuntades amb ciment, en àrees urbanes amb dificultats de mobilitat, en voreres
    de més de 5 m d''amplada o calçades/plataformes úniques de més de 12 m d''amplada, sense interferències amb serveis o
    mobiliari urbà, en projectes de 10 a 100 m.'
  - 'passage: Reducción excéntrica, de polipropileno, diámetro nominal DN 75 - DN 40, presión nominal PN 10, con 3 uniones
    por soldadura a tope, para canalización de polipropileno para conducción de gas, de acuerdo con la norma UNE-EN 1555-3
    y colocado en la parte superior de la zanja en entorno rural con dificultad de movilidad, con afectación por presencia
    de servicios en la zanja, con necesidad de entibación.'
  - 'passage: Reducción excéntrica, de polietileno, diámetro nominal DN 63 - DN 50, presión nominal PN 16, con 2 uniones por
    soldadura socket (enchufe), para tuberías de polietileno destinadas a la conducción de agua a presión, conforme a la norma
    UNE-EN 12201-3 y ubicada en el fondo de la zanja en un entorno urbano, sin obstáculos para la movilidad, sin interferencias
    por servicios en la zanja, y sin necesidad de entibación.'
- source_sentence: 'query: Aïllament amb planxa de poliestirè expandit (EPS), de 70 mm de gruix, de 100 kPa de tensió a la
    compressió, de 2 m2·K/W de resistència tèrmica, amb una cara llisa i cantell preparat amb encaix, col·locades amb adhesiu
    de formulació específica'
  sentences:
  - 'passage: Construcción de un forjado aligerado con un espesor total de 35 cm, compuesto por una semiplaca de hormigón
    pretensado de 10 cm, bovedilla de poliestireno de 19 cm y una capa de compresión de 6 cm, diseñado para soportar momentos
    flectores de 98 a 197 kN·m y una sobrecarga de 4 a 5 kN/m2, utilizando armadura de acero AP500 S y AP500 T, y hormigón
    HA - 30 con una dosificación de cemento de 300 kg/m3.'
  - 'passage: Aïllament amb panell de poliuretà rígid, de 50 mm de gruix, de 150 kPa de tensió a la compressió, de 3 m2·K/W
    de resistència tèrmica, amb una cara rugosa i cantell recte, instal·lades amb un sistema de fixació mecànica.'
  - 'passage: Aïllament amb panells de poliestirè extruït (XPS), de 80 mm de gruix, amb una resistència a la compressió de
    150 kPa, de 2,5 m2·K/W de resistència tèrmica, amb una superfície llisa i vores dissenyades per encaixar, instal·lades
    amb un adhesiu especialitzat.'
