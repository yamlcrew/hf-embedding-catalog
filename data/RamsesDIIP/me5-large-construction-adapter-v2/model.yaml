widgetData:
- source_sentence: Hormigonado para muro, con hormigón para armar autocompactante con aditivo hidrófugo HA - 40 / AC / 20
    / XC4 con una cantidad de cemento de 350 kg/m3 i relación agua cemento =< 0.45, colocado con cubilote
  sentences:
  - Elemento de hormigón recto para bordillos tipo T2, con doble capa y dimensiones estandarizadas de calzada C5 25x15 cm,
    conforme a la norma UNE 127340, clasificado para clima B, resistencia a la abrasión H y resistencia a flexión T (R-5 MPa)
    según UNE-EN 1340, instalado sobre una base de hormigón no estructural HNE-15/P/40 de 10 a 20 cm de altura, y sellado
    con mortero para albañilería, en un entorno urbano accesible, en aceras de más de 3 y hasta 5 m de ancho o calzada/plataforma
    única de más de 7 y hasta 12 m de ancho, sin interferencias de servicios o mobiliario urbano, en proyectos de 1 a 10 m.
  - Colocación de hormigón autocompactante para muros, utilizando un aditivo hidrófugo HA - 40 / AC / 20 / XC4, con una dosificación
    de 350 kg/m3 de cemento y una relación agua-cemento menor o igual a 0.45, aplicado con cubilote.
  - Hormigonado para pavimento, utilizando hormigón convencional con aditivo retardante de fraguado, con una cantidad de cemento
    de 300 kg/m3 y relación agua-cemento =< 0.50, aplicado con bomba de presión.
- source_sentence: Placa informativa para señales de tráfico de acero galvanizado y pintado, de 60x60 cm, acabada con lámina
    retrorreflectante clase RA3, fijada mecánicamente, en entorno urbano sin dificultad de movilidad, en aceras > 3 y <= 5
    m de ancho o calzada/plataforma única > 7 y <= 12 m de ancho, sin afectación por servicios o elementos de mobiliario urbano,
    en actuaciones de 1 a 5 u
  sentences:
  - Base de concreto (CE, EHE) de tipo HM-20/P / 40 / I con consistencia plástica, tamaño máximo del agregado de 40 mm, conteniendo
    >= 200 kg/m3 de cemento, adecuada para clase de exposición I, vertido mediante transporte mecánico interno y acabado manual
    con vibrado, en un entorno urbano con movilidad restringida, en aceras de más de 5 m de ancho o calzadas/plataformas únicas
    de más de 12 m de ancho, afectada por servicios o elementos de mobiliario urbano, en proyectos de entre 0.2 y 2 m3, utilizando
    un dúmper eléctrico.
  - Placa de señalización para obras de construcción de aluminio anodizado y sin pintar, de 80x80 cm, con acabado mate, fijada
    con adhesivo, en áreas rurales con acceso restringido, en caminos de tierra > 2 y <= 4 m de ancho o senderos > 5 y <=
    10 m de ancho, con interferencia por vegetación o estructuras temporales, en proyectos de 6 a 10 u.
  - Panel informativo para señales de tráfico fabricado en acero galvanizado y pintado, con dimensiones de 60x60 cm, terminado
    con lámina retrorreflectante de clase RA3, instalado de manera mecánica, en un entorno urbano accesible, en aceras de
    más de 3 y hasta 5 metros de ancho o en calzadas/plataformas únicas de más de 7 y hasta 12 metros de ancho, sin interferencias
    de servicios o mobiliario urbano, en proyectos de 1 a 5 unidades.
- source_sentence: Placa de orientación o situación para señales de tráfico, de acero galvanizado y pintado, de 30x70 cm,
    acabada con lámina retrorreflectante clase RA1, fijada mecánicamente, en entorno urbano sin dificultad de movilidad, en
    aceras <= 3 m de ancho o calzada/plataforma única <= 7 m de ancho, con afectación por servicios o elementos de mobiliario
    urbano, en actuaciones de más de 5 u
  sentences:
  - Placa de identificación para instalaciones eléctricas, de aluminio anodizado y sin pintura, de 40x80 cm, acabada con lámina
    opaca, fijada con adhesivo, en entorno rural con acceso restringido, en caminos <= 2 m de ancho o terrenos no pavimentados
    <= 5 m de ancho, sin interferencia de servicios o elementos de señalización, en proyectos de menos de 10 unidades.
  - Tubería de polietileno de alta densidad PE 100, de 900 mm de diámetro, con una presión nominal de 6 bar, serie SDR 26,
    conforme a la norma UNE-EN 12201-2, soldada y ubicada en el fondo de la zanja, en un entorno urbano con acceso fácil,
    en aceras de hasta 3 m de ancho o calzadas de hasta 7 m de ancho, sin interferencias de servicios o mobiliario urbano,
    en tramos de 1 a 10 m.
  - Panel informativo de dirección para señalización vial, fabricado en acero galvanizado y pintado, con dimensiones de 30x70
    cm, recubierto con lámina retrorreflectante clase RA1, instalado de forma mecánica, en áreas urbanas con accesibilidad
    adecuada, en aceras de hasta 3 m de ancho o en calzadas/plataformas de hasta 7 m de ancho, considerando la interferencia
    de servicios o mobiliario urbano, en proyectos que superen las 5 unidades.
- source_sentence: Bordillo drenante de piezas de hormigón polímero con canal interior, monobloque de 150x450 a 550 mm, colocado
    sobre base de hormigón no estructural de 15 N/mm2 de resistencia minima a compresión de 30 a 35 cm de altura, y rejuntado
    con mortero, en entorno urbano con dificultad de mobilidad, en aceras <= 3 m de ancho o calzada/plataforma única <= 7
    m de ancho, con afectación por servicios o elementos de mobiliario urbano, en actuaciones de más de100 m
  sentences:
  - Puerta de doble hoja abatible de madera para interiores, con un grosor de 35 mm, dimensiones de paso de 70 + 40 cm de
    ancho y 200 cm de alto, diseñada para un marco de hasta 10 cm de espesor, en acabado de roble lacado, con paneles de aglomerado
    hidrófugo, molduras y tapajuntas de MDF, burlete de goma, herrajes de suspensión, cerradura de resbalón, y manillas de
    acero inoxidable 1.4301 (AISI 304), con placa pequeña, de gama alta.
  - Bordillo de hormigón polímero con drenaje, de dimensiones monobloque de 150x450 a 550 mm, instalado sobre una base de
    hormigón no estructural con una resistencia mínima a compresión de 15 N/mm2, con una altura de 30 a 35 cm, y sellado con
    mortero, en áreas urbanas con movilidad restringida, en aceras de hasta 3 m de ancho o en calzadas/plataformas de hasta
    7 m de ancho, considerando la interferencia de servicios o mobiliario urbano, en proyectos que superen los 100 m.
  - Bordillo decorativo de cerámica esmaltada con diseño ornamental, de 120x300 a 400 mm, instalado sobre una base de grava
    compactada de 10 N/mm2 de resistencia mínima, con una altura de 20 a 25 cm, y sellado con silicona, en un entorno rural
    con fácil acceso, en caminos <= 2 m de ancho o senderos <= 5 m de ancho, sin interferencias por servicios o elementos
    de paisajismo, en proyectos de menos de 50 m.
- source_sentence: Pavimento de loseta para paso de peatones de color con tacos de 20x20x4 cm, colocado a pique de maceta
    con mortero mixto 1:2:10 y lechada de color con cemento blanco de albañilería, en entorno urbano sin dificultad de movilidad,
    en aceras > 3 y <= 5 m de ancho o calzada/plataforma única > 7 y <= 12 m de ancho, sin afectación por servicios o elementos
    de mobiliario urbano, en actuaciones de 1 a 10 m2
  sentences:
  - Pavimento de loseta para áreas recreativas de color con tacos de 30x30x5 cm, instalado a nivel de césped con mortero de
    alta resistencia y lechada de color con cemento gris, en entorno rural con acceso restringido, en senderos > 2 y <= 4
    m de ancho o caminos de tierra > 5 y <= 10 m de ancho, con afectación por servicios de jardinería y elementos decorativos,
    en proyectos de 5 a 15 m2.
  - Revestimiento de pared interior a una altura máxima de 3 metros utilizando baldosas de gres porcelánico pulido en formato
    rectangular o cuadrado, con una densidad de 76 a 115 piezas por metro cuadrado, en un rango de precio medio, grupo BIa
    (UNE-EN 14411), instaladas con adhesivo para cerámica C2 (UNE-EN 12004) y selladas con lechada CG2 (UNE-EN 13888).
  - Pavimento de baldosas para zonas peatonales de color, con piezas de 20x20x4 cm, instalado a nivel de la maceta utilizando
    mortero en proporción 1:2:10 y lechada de color con cemento blanco, en un área urbana con accesibilidad adecuada, en aceras
    de más de 3 y hasta 5 m de ancho o en calzadas/plataformas únicas de más de 7 y hasta 12 m de ancho, sin interferencias
    de servicios o mobiliario urbano, en proyectos de entre 1 y 10 m2.
