widgetData:
- source_sentence: 'Instruct: Retrieve semantically similar text.

    Query: Medwedew über die Entsendung von NATO-Truppen in die Ukraine: „Die Entsendung von NATO-Truppen auf das Territorium
    der Ukraine wird den direkten Eintritt dieser Länder in den Krieg bedeuten, worauf wir (Russland) mit (...) reagieren
    müssen. Es wird eine Weltkatastrophe werden.“'
  sentences:
  - 'Dipl.-Pol. Udo Walendy (1927-2022) spricht klare Worte über die machtpolitischen Hintergründe der gegen Deutschland gerichteten
    Greuelpropaganda und Geschichtsfälschung... Anmerkung: In dem konkreten Fall verbreitete Kohl (alias Henoch Kohn) die
    Mär vom Zigeuner-Massenmord. Während Walendy noch ungestraft nachfragen konnte, woher denn die angeblichen Opferzahlen
    stammten, hat man ja bspw. Ursula Haverbeck direkt vor Gericht gezerrt... Der Unterschied war bloß: Es waren ein paar
    Jahrzehnte dazwischen. Die Geschichtslügen wurden ja zwischenzeitlich strafrechtlich abgesichert und quasi manifestiert.
    (§130) Beachtenswert ist natürlich der Umstand, daß vermeintlich "deutsche" Politiker von Brandt bis Scholz diese (Sieger-Propaganda-)
    Lügen gebetsmühlenartig wiederholen... EIGENE Politiker?!... MITNICHTEN!'
  - Der Pharmamafia !!! Um Umsatz und Gewinne für die Zunkunft nicht nur zu sichern, sondern exorbitant zu steigern, gilt
    es alle gesunden Kinder weltweit, direkt nach der Geburt krank zu spritzen. ‼ HIER WIR IMPFEN NICHT ! Dokumentarfilm ‼
    Denn Impfen wirkt, nur halt anders als behauptet. Ganz wichtig ist dabei ist es nach Möglichkeit die Spritzen zur allgemeinen
    Pflicht zu erklären, denn nur so können die verhindern, daß dieses abschäuliche Treiben, wegen einer ungeimpften Kontrollgruppe,
    augenscheinlich ist. <URL> <URL>
  - 'UPDATE Nach Angaben des Militärministeriums werden Einheiten des südlichen Militärbezirks, der Luftstreitkräfte und der
    Marine an den Übungen teilnehmen. Der Zweck der Übungen wird als Reaktion auf Provokationen und Bedrohungen durch westliche
    Länder bezeichnet. Das bedeutet, dass der südliche Militärbezirk, der ziemlich direkt an der Spezialoperation beteiligt
    ist, umfassende Übungen zum Einsatz taktischer Atomwaffen als Reaktion auf bestimmte Pläne westlicher Länder durchführen
    wird. Damit sind natürlich die kürzlich geäußerten Überlegungen zur Entsendung von NATO-Truppen in die Ukraine gemeint.
    Diese Aussage ist eine ernstzunehmende Steigerung sowohl dessen, was offiziell rhetorisch akzeptabel ist, als auch dessen,
    was bei den Übungen demonstriert wird. Ebenso wie das, was während dieser Übungen praktiziert wird. Quelle: 136 BRIGADE
    Abonniere: Übersicht Ukraine ©Ansichten der Kanalbetreiber'
- source_sentence: 'Instruct: Retrieve semantically similar text.

    Query: Die 1,5h Rede (statt 15min) von Muammar Al Gaddafi bei der vollbesetzten Generalversammlung der UNO 23.09.2009
    - Deutsch Diese hochbrisante Rede war Gaddafis Todesurteil. 01:18:00 - 01:20:11 interessant! Gaddafis gelöschte Reden
    <URL> t.me/swd_hardcore'
  sentences:
  - '"Lasst uns die aufgeflogenen frechen Mörder ans Licht reißen und deren Schandtaten ins Bewusstsein der Völker einhämmern.
    So lange, bis entweder die Justiz sie ahndet – und zwar bis zur obersten Etage – oder bis sich Millionen ehrwürdige Volksgenossen
    versammeln, um Tribunale auszurufen, die dann legal, in echt abrechnen mit diesen Schwerstverbrechern." Laden Sie diese
    Videos auf Ihre Social-Media-Kanäle wie TikTok, Facebook, YouTube, VK, Odysee, Telegram ... Video in voller Länge: <URL>
    - Folge uns auf Telegram!'
  - Профессор Соловей заявил, что Джо Байден умер и был заменен двойником, контролируемым руководством Секретной службы США.
    На это указывает ряд внешних признаков. Тело настоящего президента США помещено в холодильник бункера под Белым домом
    до президентских выборов.
  - Foreign Minister Sergey Lavrov and Foreign Minister of Tajikistan Sirojiddin Muhriddin hold talks on the sidelines of
    the Third Antalya Diplomacy Forum Antalya, March 2, 2024
- source_sentence: 'Instruct: Retrieve semantically similar text.

    Query: Und so ist es auch heute noch! Im großen wie im kleinen. Das was man selber macht, wird der Gegenseite angelastet
    und zugeschrieben. Danke an die wunderbare Seele für diese ans Licht bringenden Worte'
  sentences:
  - 'Die NATO sind Faschisten In Belgrad findet am 25. Jahrestag des Beginns der Bombardierung Jugoslawiens eine Aktion statt,
    deren Teilnehmer ein Ende der Zusammenarbeit mit dem Nordatlantischen Bündnis fordern. Während des Marsches skandieren
    sie: „Die NATO sind Faschisten.“ Russländer & Friends'
  - Übersterblichkeit in Deutschland. Eine der schlimmsten Konsequenzen der Verbrechen der letzten Jahre. Wer angesichts solcher
    Katastrophen – ohne dass überhaupt irgendeine juristische Aufarbeitung stattgefunden hat – von „Versöhnung“ mit den Täterkreisen
    spricht, der sollte besser nie mehr öffentlich das Wort ergreifen. Diese Täterkreise sind bis heute dafür verantwortlich,
    dass die Existenz von Kritikern der Verbrechen der letzten Jahre bis auf den heutigen Tag zerstört wird. Der Bevölkerung
    wird der Zugang zum Recht verweigert, womit diese Täterkreise geschützt werden. Aber jetzt soll mit diesen Täterkreisen
    wegen einem Datenleak die „Versöhnung“ gesucht werden? Was wir von solchen Äußerungen halten, mit denen alle Opfer förmlich
    für dumm verkauft werden sollen, das kann kaum noch sachlich formuliert werden.
  - Von ganzem Herzen ein riesen großes Dankeschön. Lasst uns weiterhin gemeinsam Aufklären und die Menschen über Hintergründe
    informieren. Das geht aber nur mit euch und eurer Hilfe, Zuversicht und Schöpferkraft. Wahrheit macht frei und Freiheit
    macht wahr <URL> Denk selbst und informiere Dich
- source_sentence: 'Instruct: Retrieve semantically similar text.

    Query: Es ist und bleibt eine unfassbare BARBAREI! Aber wo sind auf einmal all die Tierliebhaber? Traut sich wieder keiner
    dazu was zu sagen? Oder ist es in diesem Fall akzeptabel? Ist das Blut der geschächteten Tiere „bunt“ und „weltoffen“
    genug? Es widert mich so dermaßen an. Ich gedenke all der unschuldigen Wesen, die brutal gefoltert und abgeschlachtet
    werden. So etwas kann und darf niemals zu einer zivilisierten Gesellschaft gehören und dürfte nirgendwo auf der Welt akzeptiert
    werden! Tim K.'
  sentences:
  - EU-Botschafter ignorieren geschlossene eine Gesprächseinladung von Lawrow Hier den Artikel lesen Das russische Außenministerium
    hat die Botschafter der EU-Staaten zu einem Gespräch mit Außenminister Lawrow eingeladen, aber die EU-Botschafter haben
    ihre Teilnahme geschlossen abgesagt. Russland spricht davon, das werde "schreckliche Konsequenzen" haben. • Thomas Röper
  - '"Schließlich können wir auch gerade jetzt bei den Demonstrationen feststellen, dass auch Demokratien manchmal Merkmale
    des Totalitarismus haben können.“ Das ist mal ein interessanter Artikel <URL> Hier findest Du wie gewohnt alle Themen
    rund um die grosse Agenda, m auf dem Laufenden zu bleiben: <URL> Und hier findest du alles zum Thema geistige und körperliche
    Gesundheit, und um spirituelles Wachstum‍: <URL> Und ganz neu: !!!! Für unsere französischsprachigen Freunde findet Ihr
    hier unseren französischen Gesundheitskanal.‍ Pour nos amis francophones, rendez-vous sur notre chaîne santé française
    ici <URL>'
  - Dem ist nichts hinzuzufügen, außer, dass man den Hannibal für seine Verbrechen bestraft hat. Und die anderen zwangsfinanziert
    werden. Merkste was? Wahrheit macht frei und Freiheit macht wahr <URL> Denk selbst und informiere Dich
- source_sentence: 'Instruct: Retrieve semantically similar text.

    Query: Die Pentagon-Mitarbeiter wechseln zum Überstundenmodus Internetnutzer stellten fest, dass es in der Gegend, in
    der sich die Abteilung befindet, einen starken Anstieg der Bestellungen für Pizzalieferungen gab und gleichzeitig die
    örtlichen Bars leer waren. Zuletzt geschah dies im April, kurz vor und nach dem iranischen Angriff auf Israel. Dann bemerkte
    The Sun die hohe Auslastung der Pizzerien von Papa Johns mit Bestellungen vom Pentagon. Unsere Website <URL> Unser Kanal
    auf Englisch <URL>'
  sentences:
  - Das hatte ich auch schon mal geschrieben. Ich war zuerst so wütend, dass Russland ausgeschlossen wurde. Aber nach der
    ekelhaften Eröffnung war ich dankbar dafür. Dieses kotztheater, was da abgeht, ist diesem stolzen Land nicht zumutbar
    und nicht würdig
  - Heute sind offensichtlich ältere Flugzeuge am Himmel die entweder Turbinen Probleme haben oder schon elektrisch Fliegen...
    Die ganzen Lügen sind sooo offensichtlich das es schon weh tut sie bewusst zu ignorieren bzw nicht zu erkennen... Ihr
    wollt die Wahrheit <URL>
  - Erinnern Sie sich an meinen Beitrag von vorhin über die massiven Cyberausfälle. Verbinden Sie das alles mit dem, was wir
    seit „Shot Heard Round the World“ am Samstag gesagt haben. BQQM BQQM BQQM BQQM 1776 1776 BRICS
