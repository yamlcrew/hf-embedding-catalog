widgetData:
- source_sentence: 'Represent this sentence for searching relevant documents: Và cho hỏi nếu đến nơi khác học tập 1 năm thì
    có phải thực hiện đăng ký tạm trú không?'
  sentences:
  - 'Represent this document for retrieval: Luật Cư trú Chương II Điều 12. Nơi cư trú của công dân

    Luật 81/2006/QH11

    1. Nơi cư trú của công dân là chỗ ở hợp pháp mà người đó thường xuyên sinh sống. Nơi cư trú của công dân là nơi thường
    trú hoặc nơi tạm trú. Chỗ ở hợp pháp là nhà ở, phương tiện hoặc nhà khác mà công dân sử dụng để cư trú. Chỗ ở hợp pháp
    có thể thuộc quyền sở hữu của công dân hoặc được cơ quan, tổ chức, cá nhân cho thuê, cho mượn, cho ở nhờ theo quy định
    của pháp luật. Nơi thường trú là nơi công dân sinh sống thường xuyên, ổn định, không có thời hạn tại một chỗ ở nhất định
    và đã đăng ký thường trú. Nơi tạm trú là nơi công dân sinh sống ngoài nơi đăng ký thường trú và đã đăng ký tạm trú. 2.
    Trường hợp không xác định được nơi cư trú của công dân theo quy định tại khoản 1 Điều này thì nơi cư trú của công dân
    là nơi người đó đang sinh sống.'
  - 'Represent this document for retrieval: Luật Cư trú Chương V Điều 27. Điều kiện đăng ký tạm trú

    Luật 68/2020/QH14

    1. Công dân đến sinh sống tại chỗ ở hợp pháp ngoài phạm vi đơn vị hành chính cấp xã nơi đã đăng ký thường trú để lao động,
    học tập hoặc vì mục đích khác từ 30 ngày trở lên thì phải thực hiện đăng ký tạm trú. 2. Thời hạn tạm trú tối đa là 02
    năm và có thể tiếp tục gia hạn nhiều lần 3. Công dân không được đăng ký tạm trú mới tại chỗ ở quy định tại Điều 23 của
    Luật này.'
  - 'Represent this document for retrieval: Thông tư Quy định chi tiết một số điều và biện pháp thi hành luật cư trú 2021
    Chương III Điều 13. Đăng ký tạm trú

    Thông tư 55/2021/TT-BCA

    1. Công dân thay đổi chỗ ở ngoài nơi đã đăng ký tạm trú có trách nhiệm thực hiện đăng ký tạm trú mới. Trường hợp chỗ ở
    đó trong phạm vi đơn vị hành chính cấp xã nơi đã đăng ký thường trú thì thực hiện theo quy định tại khoản 3 Điều 6 Thông
    tư này. 2. Học sinh, sinh viên, học viên đến ở tập trung trong ký túc xá, khu nhà ở của học sinh, sinh viên, học viên;
    người lao động đến ở tập trung tại các khu nhà ở của người lao động; trẻ em, người khuyết tật, người không nơi nương tựa
    được nhận nuôi và sinh sống trong cơ sở tín ngưỡng, cơ sở tôn giáo; người được chăm sóc, nuôi dưỡng, trợ giúp tại cơ sở
    trợ giúp xã hội có thể thực hiện đăng ký tạm trú thông qua cơ quan, tổ chức quản lý trực tiếp chỗ ở đó. Cơ quan, tổ chức
    quản lý trực tiếp có trách nhiệm lập danh sách người tạm trú, kèm Tờ khai thay đổi thông tin cư trú của từng người, văn
    bản đề nghị đăng ký tạm trú trong đó ghi rõ thông tin về chỗ ở hợp pháp và được cơ quan đăng ký cư trú cập nhật thông
    tin về nơi tạm trú vào Cơ sở dữ liệu về cư trú. Danh sách bao gồm những thông tin cơ bản của từng người: họ, chữ đệm và
    tên; ngày, tháng, năm sinh; giới tính; số định danh cá nhân và thời hạn tạm trú. 3. Trường hợp giấy tờ, tài liệu chứng
    minh chỗ ở hợp pháp để đăng ký tạm trú là văn bản cho thuê, cho mượn, cho ở nhờ nhà ở, nhà khác của cá nhân, tổ chức thì
    văn bản đó không bắt buộc phải công chứng hoặc chứng thực.'
- source_sentence: 'Represent this sentence for searching relevant documents: Chào ban biên tập, hiện tại tôi đang ở trên
    chiếc xe lưu động của anh trai tôi và có dùng chiếc xe đó để bán kem mỗi tối. Tôi không biết là tôi có được đăng ký thường
    trú khi tôi sinh sống trên xe đấy không?'
  sentences:
  - 'Represent this document for retrieval: Thông tư Quy định chi tiết thi hành một số điều của luật cư trú và nghị định số
    31/2014/NĐ-CP ngày 18 tháng 4 năm 2014 của chính phủ quy định chi tiết một số điều và biện pháp thi hành luật cư trú Chương
    III Điều 16. Thủ tục đăng ký tạm trú

    Thông tư 35/2014/TT-BCA

    1. Hồ sơ đăng ký tạm trú bao gồm: a) Phiếu báo thay đổi hộ khẩu, nhân khẩu; bản khai nhân khẩu (đối với các trường hợp
    phải khai bản khai nhân khẩu); b) Giấy tờ, tài liệu chứng minh chỗ ở hợp pháp theo quy định tại Điều 6 Nghị định số 31/2014/NĐ-CP
    (trừ trường hợp được chủ hộ có sổ hộ khẩu hoặc sổ tạm trú đồng ý cho đăng ký tạm trú thì không cần xuất trình giấy tờ,
    tài liệu chứng minh chỗ ở hợp pháp). Trường hợp chỗ ở hợp pháp do thuê, mượn, ở nhờ thì phải được người cho thuê, cho
    mượn, cho ở nhờ đồng ý cho đăng ký tạm trú vào chỗ ở của mình và ghi vào phiếu báo thay đổi hộ khẩu, nhân khẩu, ký, ghi
    rõ họ, tên; trường hợp người cho thuê, cho mượn, cho ở nhờ đã có ý kiến bằng văn bản đồng ý cho đăng ký tạm trú vào chỗ
    ở của mình thì không phải ghi vào phiếu báo thay đổi hộ khẩu, nhân khẩu. Xuất trình chứng minh nhân dân hoặc giấy tờ có
    xác nhận của Công an xã, phường, thị trấn nơi người đó thường trú. 2. Người tạm trú được chủ hộ đồng ý cho nhập vào sổ
    tạm trú hoặc đồng ý cho đăng ký tạm trú tại nơi thường trú của chủ hộ thì việc đồng ý phải được ghi vào phiếu báo thay
    đổi hộ khẩu, nhân khẩu, ký, ghi rõ họ tên và ngày, tháng, năm. 3. Người đăng ký tạm trú nộp hồ sơ đăng ký tạm trú tại
    Công an xã, phường, thị trấn.'
  - 'Represent this document for retrieval: Luật Sửa đổi, bổ sung một số điều của luật cư trú 2013 Điều 1. Sửa đổi, bổ sung
    một số điều của Luật cư trú:

    Luật 36/2013/QH13

    1. Sửa đổi, bổ sung khoản 8 Điều 8 và bổ sung khoản 10 và khoản 11 vào Điều 8 như sau: “8. Thuê, cho thuê, làm giả, sửa
    chữa, làm sai lệch nội dung sổ hộ khẩu, sổ tạm trú, giấy tờ khác có liên quan đến cư trú; sử dụng giấy tờ giả về cư trú;
    cung cấp thông tin, tài liệu sai sự thật về cư trú; giả mạo điều kiện để được đăng ký thường trú.” “10. Giải quyết cho
    đăng ký cư trú khi biết rõ người được cấp đăng ký cư trú không sinh sống tại chỗ ở đó. 11. Đồng ý cho người khác đăng
    ký cư trú vào chỗ ở của mình để vụ lợi hoặc trong thực tế người đăng ký cư trú không sinh sống tại chỗ ở đó.” 2. Điều
    20 được sửa đổi, bổ sung như sau: “Điều 20. Điều kiện đăng ký thường trú tại thành phố trực thuộc trung ương Công dân
    thuộc một trong những trường hợp sau đây thì được đăng ký thường trú tại thành phố trực thuộc trung ương: 1. Có chỗ ở
    hợp pháp, trường hợp đăng ký thường trú vào huyện, thị xã thuộc thành phố trực thuộc trung ương thì phải có thời gian
    tạm trú tại thành phố đó từ một năm trở lên, trường hợp đăng ký thường trú vào quận thuộc thành phố trực thuộc trung ương
    thì phải có thời gian tạm trú tại thành phố đó từ hai năm trở lên; 2. Được người có sổ hộ khẩu đồng ý cho nhập vào sổ
    hộ khẩu của mình nếu thuộc một trong các trường hợp sau đây: a) Vợ về ở với chồng; chồng về ở với vợ; con về ở với cha,
    mẹ; cha, mẹ về ở với con; b) Người hết tuổi lao động, nghỉ hưu, nghỉ mất sức, nghỉ thôi việc về ở với anh, chị, em ruột;
    c) Người khuyết tật, mất khả năng lao động, người bị bệnh tâm thần hoặc bệnh khác làm mất khả năng nhận thức, khả năng
    điều khiển hành vi về ở với anh, chị, em ruột, cô, dì, chú, bác, cậu ruột, người giám hộ; d) Người chưa thành niên không
    còn cha, mẹ hoặc còn cha, mẹ nhưng cha, mẹ không có khả năng nuôi dưỡng về ở với ông, bà nội, ngoại, anh, chị, em ruột,
    cô, dì, chú, bác, cậu ruột, người giám hộ; đ) Người thành niên độc thân về ở với ông, bà nội, ngoại, anh, chị, em ruột,
    cô, dì, chú, bác, cậu ruột; e) Ông bà nội, ngoại về ở với cháu ruột; 3. Được điều động, tuyển dụng đến làm việc tại cơ
    quan, tổ chức hưởng lương từ ngân sách nhà nước hoặc theo chế độ hợp đồng không xác định thời hạn và có chỗ ở hợp pháp;
    4. Trước đây đã đăng ký thường trú tại thành phố trực thuộc trung ương, nay trở về thành phố đó sinh sống tại chỗ ở hợp
    pháp của mình; 5. Trường hợp quy định tại các khoản 1, 3 và 4 Điều này đăng ký thường trú vào chỗ ở hợp pháp do thuê,
    mượn, ở nhờ của cá nhân, tổ chức thì phải có đủ các điều kiện sau đây: a) Bảo đảm điều kiện về diện tích bình quân theo
    quy định của Hội đồng nhân dân thành phố; b) Có xác nhận của Ủy ban nhân dân xã, phường, thị trấn về điều kiện diện tích
    bình quân; c) Được người cho thuê, cho mượn, cho ở nhờ đồng ý bằng văn bản; 6. Việc đăng ký thường trú vào nội thành thành
    phố Hà Nội thực hiện theo quy định tại khoản 4 Điều 19 của Luật Thủ đô.” 3. Khoản 1 Điều 23 được sửa đổi, bổ sung như
    sau: “1. Người đã đăng ký thường trú mà thay đổi chỗ ở hợp pháp, khi chuyển đến chỗ ở hợp pháp mới nếu có đủ điều kiện
    đăng ký thường trú thì trong thời hạn mười hai tháng có trách nhiệm làm thủ tục thay đổi nơi đăng ký thường trú.” 4. Khoản
    4 Điều 30 được sửa đổi, bổ sung như sau: “4. Trưởng Công an xã, phường, thị trấn trong thời hạn ba ngày làm việc, kể từ
    ngày nhận đủ giấy tờ quy định tại khoản 3 Điều này phải cấp sổ tạm trú theo mẫu quy định của Bộ Công an. Sổ tạm trú được
    cấp cho hộ gia đình hoặc cá nhân đã đăng ký tạm trú, có giá trị xác định nơi tạm trú của công dân và có thời hạn tối đa
    là hai mươi bốn tháng. Trong thời hạn ba mươi ngày trước ngày hết thời hạn tạm trú, công dân đến cơ quan Công an nơi cấp
    sổ tạm trú để làm thủ tục gia hạn. Việc điều chỉnh thay đổi về sổ tạm trú được thực hiện theo quy định tại Điều 29 của
    Luật này. Sổ tạm trú bị hư hỏng thì được đổi, bị mất thì được cấp lại. Trường hợp đến tạm trú tại xã, phường, thị trấn
    khác thì phải đăng ký lại.” 5. Khoản 2 Điều 31 được sửa đổi, bổ sung như sau: “2. Đại diện gia đình, nhà ở tập thể, cơ
    sở chữa bệnh, khách sạn, nhà nghỉ, cơ sở khác khi có người đến lưu trú có trách nhiệm thông báo việc lưu trú với Công
    an xã, phường, thị trấn; trường hợp người đến lưu trú tại nhà ở của gia đình, nhà ở tập thể mà chủ gia đình, nhà ở tập
    thể đó không đăng ký thường trú tại địa bàn xã, phường, thị trấn đó thì người đến lưu trú có trách nhiệm thông báo việc
    lưu trú với Công an xã, phường, thị trấn. Việc thông báo lưu trú được thực hiện trực tiếp hoặc bằng điện thoại hoặc qua
    mạng Internet, mạng máy tính. Công an xã, phường, thị trấn có trách nhiệm thông báo địa điểm, địa chỉ mạng Internet, địa
    chỉ mạng máy tính, số điện thoại nơi tiếp nhận thông báo lưu trú cho nhân dân biết.”'
  - 'Represent this document for retrieval: Luật Cư trú Chương IV Điều 20. Điều kiện đăng ký thường trú

    Luật 68/2020/QH14

    1. Công dân có chỗ ở hợp pháp thuộc quyền sở hữu của mình thì được đăng ký thường trú tại chỗ ở hợp pháp đó. 2. Công dân
    được đăng ký thường trú tại chỗ ở hợp pháp không thuộc quyền sở hữu của mình khi được chủ hộ và chủ sở hữu chỗ ở hợp pháp
    đó đồng ý trong các trường hợp sau đây: a) Vợ về ở với chồng; chồng về ở với vợ; con về ở với cha, mẹ; cha, mẹ về ở với
    con; b) Người cao tuổi về ở với anh ruột, chị ruột, em ruột, cháu ruột; người khuyết tật đặc biệt nặng, người khuyết tật
    nặng, người không có khả năng lao động, người bị bệnh tâm thần hoặc bệnh khác làm mất khả năng nhận thức, khả năng điều
    khiển hành vi về ở với ông nội, bà nội, ông ngoại, bà ngoại, anh ruột, chị ruột, em ruột, bác ruột, chú ruột, cậu ruột,
    cô ruột, dì ruột, cháu ruột, người giám hộ; c) Người chưa thành niên được cha, mẹ hoặc người giám hộ đồng ý hoặc không
    còn cha, mẹ về ở với cụ nội, cụ ngoại, ông nội, bà nội, ông ngoại, bà ngoại, anh ruột, chị ruột, em ruột, bác ruột, chú
    ruột, cậu ruột, cô ruột, dì ruột; người chưa thành niên về ở với người giám hộ. 3. Trừ trường hợp quy định tại khoản 2
    Điều này, công dân được đăng ký thường trú tại chỗ ở hợp pháp do thuê, mượn, ở nhờ khi đáp ứng các điều kiện sau đây:
    a) Được chủ sở hữu chỗ ở hợp pháp đồng ý cho đăng ký thường trú tại địa điểm thuê, mượn, ở nhờ và được chủ hộ đồng ý nếu
    đăng ký thường trú vào cùng hộ gia đình đó; b) Bảo đảm điều kiện về diện tích nhà ở tối thiểu do Hội đồng nhân dân cấp
    tỉnh quy định nhưng không thấp hơn 08 m2 sàn/người. 4. Công dân được đăng ký thường trú tại cơ sở tín ngưỡng, cơ sở tôn
    giáo có công trình phụ trợ là nhà ở khi thuộc một trong các trường hợp sau đây: a) Người hoạt động tôn giáo được phong
    phẩm, bổ nhiệm, bầu cử, suy cử, thuyên chuyển đến hoạt động tôn giáo tại cơ sở tôn giáo; b) Người đại diện cơ sở tín ngưỡng;
    c) Người được người đại diện hoặc ban quản lý cơ sở tín ngưỡng đồng ý cho đăng ký thường trú để trực tiếp quản lý, tổ
    chức hoạt động tín ngưỡng tại cơ sở tín ngưỡng; d) Trẻ em, người khuyết tật đặc biệt nặng, người khuyết tật nặng, người
    không nơi nương tựa được người đại diện hoặc ban quản lý cơ sở tín ngưỡng, người đứng đầu hoặc người đại diện cơ sở tôn
    giáo đồng ý cho đăng ký thường trú. 5. Người được chăm sóc, nuôi dưỡng, trợ giúp được đăng ký thường trú tại cơ sở trợ
    giúp xã hội khi được người đứng đầu cơ sở đó đồng ý hoặc được đăng ký thường trú vào hộ gia đình nhận chăm sóc, nuôi dưỡng
    khi được chủ hộ và chủ sở hữu chỗ ở hợp pháp đồng ý. 6. Người sinh sống, người làm nghề lưu động trên phương tiện được
    đăng ký thường trú tại phương tiện đó khi đáp ứng các điều kiện sau đây: a) Là chủ phương tiện hoặc được chủ phương tiện
    đó đồng ý cho đăng ký thường trú; b) Phương tiện được đăng ký, đăng kiểm theo quy định của pháp luật; trường hợp phương
    tiện không thuộc đối tượng phải đăng ký, đăng kiểm thì phải có xác nhận của Ủy ban nhân dân cấp xã nơi phương tiện thường
    xuyên đậu, đỗ về việc sử dụng phương tiện đó vào mục đích để ở; c) Có xác nhận của Ủy ban nhân dân cấp xã về việc phương
    tiện đã đăng ký đậu, đỗ thường xuyên trên địa bàn trong trường hợp phương tiện không phải đăng ký hoặc nơi đăng ký phương
    tiện không trùng với nơi thường xuyên đậu, đỗ. 7. Việc đăng ký thường trú của người chưa thành niên phải được sự đồng
    ý của cha, mẹ hoặc người giám hộ, trừ trường hợp nơi cư trú của người chưa thành niên do Tòa án quyết định. 8. Công dân
    không được đăng ký thường trú mới tại chỗ ở quy định tại Điều 23 của Luật này, trừ trường hợp quy định tại điểm a khoản
    2 Điều này.'
- source_sentence: 'Represent this sentence for searching relevant documents: Bạn tôi là sinh viên thuê phòng trọ ở Hà Nội.
    Do được chủ trọ thông báo sắp tới có đợt kiểm tra sổ tạm trú. Nên bạn tôi đã đặt mua sổ tạm trú giả về đối phó. Vừa rồi,
    khi công an phường đến kiểm tra thì phát hiện sổ tạm trú giả. Sau đó phạt bạn tôi 3 triệu có đúng không?'
  sentences:
  - 'Represent this document for retrieval: Nghị định Quy định xử phạt vi phạm hành chính trong lĩnh vực an ninh, trật tự,
    an toàn xã hội; phòng, chống tệ nạn xã hội; phòng cháy và chữa cháy; phòng, chống bạo lực gia đình Chương 2 Điều 8. Vi
    phạm quy định về đăng ký và quản lý cư trú

    Nghị định 167/2013/NĐ-CP

    1. Phạt tiền từ 100.000 đồng đến 300.000 đồng đối với một trong những hành vi sau đây: a) Cá nhân, chủ hộ gia đình không
    thực hiện đúng quy định về đăng ký thường trú, đăng ký tạm trú hoặc điều chỉnh những thay đổi trong sổ hộ khẩu, sổ tạm
    trú; b) Cá nhân, chủ hộ gia đình không thực hiện đúng quy định về thông báo lưu trú, khai báo tạm vắng; c) Không chấp
    hành việc kiểm tra hộ khẩu, kiểm tra tạm trú, kiểm tra lưu trú hoặc không xuất trình sổ hộ khẩu, sổ tạm trú, giấy tờ khác
    liên quan đến cư trú theo yêu cầu của cơ quan có thẩm quyền. a) Tẩy, xóa, sửa chữa hoặc có hành vi khác làm sai lệch nội
    dung sổ hộ khẩu, sổ tạm trú, giấy tờ khác liên quan đến cư trú; b) Cung cấp thông tin, tài liệu sai sự thật về cư trú;
    c) Thuê, cho thuê sổ hộ khẩu, sổ tạm trú, giấy tờ khác liên quan đến cư trú để thực hiện hành vi trái quy định của pháp
    luật; d) Sử dụng sổ hộ khẩu, sổ tạm trú, giấy tờ khác liên quan đến cư trú để thực hiện hành vi trái quy định của pháp
    luật; đ) Cơ sở kinh doanh lưu trú không thực hiện việc thông báo lưu trú với cơ quan công an theo quy định khi có người
    đến lưu trú; e) Tổ chức kích động, xúi giục, lôi kéo, dụ dỗ, môi giới, cưỡng bức người khác vi phạm pháp luật về cư trú.
    3. Phạt tiền từ 2.000.000 đồng đến 4.000.000 đồng đối với một trong những hành vi sau đây: a) Khai man, giả mạo hồ sơ,
    giấy tờ để được đăng ký thường trú, tạm trú, cấp sổ hộ khẩu, sổ tạm trú; b) Làm giả sổ hộ khẩu, sổ tạm trú hoặc giả mạo
    điều kiện để được đăng ký thường trú; c) Sử dụng sổ hộ khẩu, sổ tạm trú giả; d) Cho người khác đăng ký cư trú vào chỗ
    ở của mình để vụ lợi hoặc trong thực tế người đăng ký cư trú không sinh sống tại chỗ ở đó; đ) Cá nhân, chủ hộ gia đình
    cho người khác nhập hộ khẩu vào cùng một chỗ ở của mình nhưng không bảo đảm diện tích tối thiểu trên đầu người theo quy
    định; e) Ký hợp đồng lao động không xác định thời hạn với người lao động không thuộc doanh nghiệp của mình để nhập hộ
    khẩu; g) Sử dụng hợp đồng lao động trái với quy định của pháp luật để nhập hộ khẩu; h) Không khai báo tạm trú cho người
    nước ngoài thuê nhà để ở. 4. Hình thức xử phạt bổ sung: Tịch thu tang vật, phương tiện vi phạm hành chính đối với hành
    vi quy định tại Điểm a Khoản 2; Điểm a, b, c Khoản 3 Điều này. 5. Biện pháp khắc phục hậu quả: a) Buộc thu hồi sổ hộ khẩu,
    sổ tạm trú, giấy tờ khác liên quan đến cư trú đối với hành vi quy định tại Điểm a Khoản 2; Điểm a Khoản 3 Điều này; b)
    Buộc hủy bỏ thông tin, tài liệu sai sự thật đối với hành vi quy định tại Điểm b Khoản 2 Điều này; c) Buộc nộp lại số lợi
    bất hợp pháp có được do thực hiện hành vi vi phạm hành chính quy định tại Điểm d Khoản 3 Điều này; d) Buộc hủy bỏ hợp
    đồng lao động trái quy định của pháp luật để nhập hộ khẩu quy định tại Điểm e, g Khoản 3 Điều này.'
  - 'Represent this document for retrieval: Nghị định Quy định xử phạt vi phạm hành chính trong lĩnh vực an ninh, trật tự,
    an toàn xã hội; phòng, chống tệ nạn xã hội; phòng cháy, chữa cháy; cứu nạn, cứu hộ; phòng, chống bạo lực gia đình Chương
    I Điều 4. Quy định về mức phạt tiền tối đa, tổ chức bị xử phạt vi phạm hành chính

    Nghị định 144/2021/NĐ-CP

    1. Mức phạt tiền tối đa trong lĩnh vực phòng, chống bạo lực gia đình đối với cá nhân là 30.000.000 đồng, đối với tổ chức
    là 60.000.000 đồng; mức phạt tiền tối đa trong lĩnh vực an ninh, trật tự, an toàn xã hội đối với cá nhân là 40.000.000
    đồng, đối với tổ chức là 80.000.000 đồng; mức phạt tiền tối đa trong lĩnh vực phòng cháy, chữa cháy; cứu nạn, cứu hộ đối
    với cá nhân là 50.000.000 đồng, đối với tổ chức là 100.000.000 đồng; mức phạt tiền tối đa trong lĩnh vực phòng, chống
    tệ nạn xã hội đối với cá nhân là 75.000.000 đồng, đối với tổ chức là 150.000.000 đồng. 2. Mức phạt tiền quy định tại Chương
    II Nghị định này là mức phạt được áp dụng đối với hành vi vi phạm hành chính của cá nhân. Đối với tổ chức có cùng hành
    vi vi phạm, mức phạt tiền gấp 02 lần mức phạt tiền đối với cá nhân. 3. Tổ chức quy định tại các khoản 1 và 2 Điều này
    bao gồm: a) Tổ chức kinh tế được thành lập theo quy định của Luật Doanh nghiệp gồm: Doanh nghiệp tư nhân, công ty cổ phần,
    công ty trách nhiệm hữu hạn, công ty hợp danh và các đơn vị phụ thuộc doanh nghiệp; b) Tổ chức kinh tế được thành lập
    theo quy định của Luật Hợp tác xã gồm: Hợp tác xã, liên hiệp hợp tác xã; c) Tổ chức xã hội, tổ chức chính trị - xã hội,
    tổ chức xã hội - nghề nghiệp; d) Đơn vị sự nghiệp; đ) Cơ quan nhà nước có hành vi vi phạm mà hành vi đó không thuộc nhiệm
    vụ quản lý nhà nước được giao; e) Tổ hợp tác. 4. Hộ gia đình, hộ kinh doanh cá thể đăng ký kinh doanh theo quy định của
    pháp luật vi phạm các quy định của Nghị định này bị xử phạt như đối với cá nhân.'
  - 'Represent this document for retrieval: Luật Sửa đổi, bổ sung một số điều của luật cư trú 2013 Điều 1. Sửa đổi, bổ sung
    một số điều của Luật cư trú:

    Luật 36/2013/QH13

    1. Sửa đổi, bổ sung khoản 8 Điều 8 và bổ sung khoản 10 và khoản 11 vào Điều 8 như sau: “8. Thuê, cho thuê, làm giả, sửa
    chữa, làm sai lệch nội dung sổ hộ khẩu, sổ tạm trú, giấy tờ khác có liên quan đến cư trú; sử dụng giấy tờ giả về cư trú;
    cung cấp thông tin, tài liệu sai sự thật về cư trú; giả mạo điều kiện để được đăng ký thường trú.” “10. Giải quyết cho
    đăng ký cư trú khi biết rõ người được cấp đăng ký cư trú không sinh sống tại chỗ ở đó. 11. Đồng ý cho người khác đăng
    ký cư trú vào chỗ ở của mình để vụ lợi hoặc trong thực tế người đăng ký cư trú không sinh sống tại chỗ ở đó.” 2. Điều
    20 được sửa đổi, bổ sung như sau: “Điều 20. Điều kiện đăng ký thường trú tại thành phố trực thuộc trung ương Công dân
    thuộc một trong những trường hợp sau đây thì được đăng ký thường trú tại thành phố trực thuộc trung ương: 1. Có chỗ ở
    hợp pháp, trường hợp đăng ký thường trú vào huyện, thị xã thuộc thành phố trực thuộc trung ương thì phải có thời gian
    tạm trú tại thành phố đó từ một năm trở lên, trường hợp đăng ký thường trú vào quận thuộc thành phố trực thuộc trung ương
    thì phải có thời gian tạm trú tại thành phố đó từ hai năm trở lên; 2. Được người có sổ hộ khẩu đồng ý cho nhập vào sổ
    hộ khẩu của mình nếu thuộc một trong các trường hợp sau đây: a) Vợ về ở với chồng; chồng về ở với vợ; con về ở với cha,
    mẹ; cha, mẹ về ở với con; b) Người hết tuổi lao động, nghỉ hưu, nghỉ mất sức, nghỉ thôi việc về ở với anh, chị, em ruột;
    c) Người khuyết tật, mất khả năng lao động, người bị bệnh tâm thần hoặc bệnh khác làm mất khả năng nhận thức, khả năng
    điều khiển hành vi về ở với anh, chị, em ruột, cô, dì, chú, bác, cậu ruột, người giám hộ; d) Người chưa thành niên không
    còn cha, mẹ hoặc còn cha, mẹ nhưng cha, mẹ không có khả năng nuôi dưỡng về ở với ông, bà nội, ngoại, anh, chị, em ruột,
    cô, dì, chú, bác, cậu ruột, người giám hộ; đ) Người thành niên độc thân về ở với ông, bà nội, ngoại, anh, chị, em ruột,
    cô, dì, chú, bác, cậu ruột; e) Ông bà nội, ngoại về ở với cháu ruột; 3. Được điều động, tuyển dụng đến làm việc tại cơ
    quan, tổ chức hưởng lương từ ngân sách nhà nước hoặc theo chế độ hợp đồng không xác định thời hạn và có chỗ ở hợp pháp;
    4. Trước đây đã đăng ký thường trú tại thành phố trực thuộc trung ương, nay trở về thành phố đó sinh sống tại chỗ ở hợp
    pháp của mình; 5. Trường hợp quy định tại các khoản 1, 3 và 4 Điều này đăng ký thường trú vào chỗ ở hợp pháp do thuê,
    mượn, ở nhờ của cá nhân, tổ chức thì phải có đủ các điều kiện sau đây: a) Bảo đảm điều kiện về diện tích bình quân theo
    quy định của Hội đồng nhân dân thành phố; b) Có xác nhận của Ủy ban nhân dân xã, phường, thị trấn về điều kiện diện tích
    bình quân; c) Được người cho thuê, cho mượn, cho ở nhờ đồng ý bằng văn bản; 6. Việc đăng ký thường trú vào nội thành thành
    phố Hà Nội thực hiện theo quy định tại khoản 4 Điều 19 của Luật Thủ đô.” 3. Khoản 1 Điều 23 được sửa đổi, bổ sung như
    sau: “1. Người đã đăng ký thường trú mà thay đổi chỗ ở hợp pháp, khi chuyển đến chỗ ở hợp pháp mới nếu có đủ điều kiện
    đăng ký thường trú thì trong thời hạn mười hai tháng có trách nhiệm làm thủ tục thay đổi nơi đăng ký thường trú.” 4. Khoản
    4 Điều 30 được sửa đổi, bổ sung như sau: “4. Trưởng Công an xã, phường, thị trấn trong thời hạn ba ngày làm việc, kể từ
    ngày nhận đủ giấy tờ quy định tại khoản 3 Điều này phải cấp sổ tạm trú theo mẫu quy định của Bộ Công an. Sổ tạm trú được
    cấp cho hộ gia đình hoặc cá nhân đã đăng ký tạm trú, có giá trị xác định nơi tạm trú của công dân và có thời hạn tối đa
    là hai mươi bốn tháng. Trong thời hạn ba mươi ngày trước ngày hết thời hạn tạm trú, công dân đến cơ quan Công an nơi cấp
    sổ tạm trú để làm thủ tục gia hạn. Việc điều chỉnh thay đổi về sổ tạm trú được thực hiện theo quy định tại Điều 29 của
    Luật này. Sổ tạm trú bị hư hỏng thì được đổi, bị mất thì được cấp lại. Trường hợp đến tạm trú tại xã, phường, thị trấn
    khác thì phải đăng ký lại.” 5. Khoản 2 Điều 31 được sửa đổi, bổ sung như sau: “2. Đại diện gia đình, nhà ở tập thể, cơ
    sở chữa bệnh, khách sạn, nhà nghỉ, cơ sở khác khi có người đến lưu trú có trách nhiệm thông báo việc lưu trú với Công
    an xã, phường, thị trấn; trường hợp người đến lưu trú tại nhà ở của gia đình, nhà ở tập thể mà chủ gia đình, nhà ở tập
    thể đó không đăng ký thường trú tại địa bàn xã, phường, thị trấn đó thì người đến lưu trú có trách nhiệm thông báo việc
    lưu trú với Công an xã, phường, thị trấn. Việc thông báo lưu trú được thực hiện trực tiếp hoặc bằng điện thoại hoặc qua
    mạng Internet, mạng máy tính. Công an xã, phường, thị trấn có trách nhiệm thông báo địa điểm, địa chỉ mạng Internet, địa
    chỉ mạng máy tính, số điện thoại nơi tiếp nhận thông báo lưu trú cho nhân dân biết.”'
- source_sentence: 'Represent this sentence for searching relevant documents: Sau thời gian yêu nhau và quyết định tiến tới
    hôn nhân thì tôi phát hiện bạn trai có hai hộ khẩu ở hai nơi khác nhau. Bạn trai tôi có hộ khẩu thường trú hai nơi thì
    có thể kết hôn với hai người được không?'
  sentences:
  - 'Represent this document for retrieval: Luật Cư trú Chương III Điều 21. Thủ tục đăng ký thường trú

    Luật 81/2006/QH11

    1. Người đăng ký thường trú nộp hồ sơ đăng ký thường trú tại cơ quan công an sau đây: a) Đối với thành phố trực thuộc
    trung ương thì nộp hồ sơ tại Công an huyện, quận, thị xã; b) Đối với tỉnh thì nộp hồ sơ tại Công an xã, thị trấn thuộc
    huyện, Công an thị xã, thành phố thuộc tỉnh. 2. Hồ sơ đăng ký thường trú bao gồm: a) Phiếu báo thay đổi hộ khẩu, nhân
    khẩu; bản khai nhân khẩu; b) Giấy chuyển hộ khẩu theo quy định tại Điều 28 của Luật này; c) Giấy tờ và tài liệu chứng
    minh chỗ ở hợp pháp. Đối với trường hợp chuyển đến thành phố trực thuộc trung ương phải có thêm tài liệu chứng minh thuộc
    một trong các trường hợp quy định tại Điều 20 của Luật này. 3. Trong thời hạn mười lăm ngày, kể từ ngày nhận đủ hồ sơ,
    cơ quan có thẩm quyền quy định tại khoản 1 Điều này phải cấp sổ hộ khẩu cho người đã nộp hồ sơ đăng ký thường trú; trường
    hợp không cấp phải trả lời bằng văn bản và nêu rõ lý do.'
  - 'Represent this document for retrieval: Luật Cư trú Chương I Điều 4. Nguyên tắc cư trú và quản lý cư trú

    Luật 81/2006/QH11

    1. Tuân thủ Hiến pháp và pháp luật. 2. Bảo đảm hài hoà quyền, lợi ích hợp pháp của công dân, lợi ích của Nhà nước, cộng
    đồng và xã hội; kết hợp giữa việc bảo đảm quyền tự do cư trú, các quyền cơ bản khác của công dân và trách nhiệm của Nhà
    nước với nhiệm vụ xây dựng, phát triển kinh tế, xã hội, củng cố quốc phòng, an ninh, giữ gìn trật tự, an toàn xã hội.
    3. Trình tự, thủ tục đăng ký thường trú, tạm trú phải đơn giản, thuận tiện, kịp thời, chính xác, công khai, minh bạch,
    không gây phiền hà; việc quản lý cư trú phải bảo đảm hiệu quả. 4. Mọi thay đổi về cư trú phải được đăng ký; mỗi người
    chỉ được đăng ký thường trú, đăng ký tạm trú tại một nơi.'
  - 'Represent this document for retrieval: Nghị định Quy định chi tiết một số điều và biện pháp thi hành luật cư trú Chương
    III Điều 13. Thu thập, cập nhật, điều chỉnh, quản lý, kết nối, chia sẻ, khai thác thông tin trong Cơ sở dữ liệu về cư
    trú

    Nghị định 154/2024/NĐ-CP

    1. Thông tin trong Cơ sở dữ liệu về cư trú được thu thập, cập nhật, điều chỉnh từ các nguồn sau đây: a) Thông tin được
    chia sẻ, đồng bộ từ Cơ sở dữ liệu quốc gia về dân cư, Cơ sở dữ liệu căn cước và cơ sở dữ liệu quốc gia, cơ sở dữ liệu
    chuyên ngành khác; b) Từ tàng thư do lực lượng Công an nhân dân quản lý; hồ sơ đăng ký, quản lý cư trú; kết quả giải quyết
    thủ tục hành chính, dịch vụ công; c) Thông tin được số hóa, cung cấp bởi tổ chức, cá nhân; d) Thông tin từ các nguồn khác
    theo quy định pháp luật. 2. Việc thu thập, cập nhật, điều chỉnh thông tin về công dân vào Cơ sở dữ liệu về cư trú phải
    bảo đảm các yêu cầu sau: a) Các thông tin về công dân khi được thu thập, cập nhật, điều chỉnh vào Cơ sở dữ liệu về cư
    trú phải đảm bảo tính chính xác; b) Trường hợp thông tin về công dân được thu thập, cập nhật từ nhiều nguồn khác nhau
    mà không thống nhất về nội dung thông tin thì khi thu thập, cập nhật thông tin về công dân, Công an cấp xã có trách nhiệm
    phối hợp với cơ quan đăng ký hộ tịch, cơ quan có liên quan hoặc công dân để kiểm tra tính pháp lý của các thông tin đó
    và chịu trách nhiệm về nội dung thông tin trước khi thu thập, cập nhật vào Cơ sở dữ liệu về cư trú. Trường hợp công dân
    phát hiện thông tin của mình hoặc thành viên trong hộ gia đình chưa đầy đủ, chưa chính xác trong Cơ sở dữ liệu về cư trú
    thì cung cấp thông tin, hồ sơ và đề nghị cơ quan Công an cấp xã nơi cư trú để xem xét, cập nhật, điều chỉnh theo quy định
    pháp luật và thông báo kết quả cho công dân; c) Các thông tin về công dân đã được thu thập, cập nhật vào Cơ sở dữ liệu
    về cư trú phải được lưu trữ đầy đủ, thể hiện được quá trình lịch sử các lần cập nhật, thay đổi, điều chỉnh. 3. Các thông
    tin của công dân trong Cơ sở dữ liệu về cư trú được chia sẻ cho Cơ sở dữ liệu quốc gia về dân cư gồm: a) Nơi thường trú,
    thời gian bắt đầu đến thường trú; lý do, thời điểm xóa đăng ký thường trú; b) Nơi tạm trú; thời gian bắt đầu đến tạm trú,
    thời gian tạm trú; lý do, thời điểm xóa đăng ký tạm trú; c) Tình trạng khai báo tạm vắng; d) Nơi ở hiện tại; đ) Họ, chữ
    đệm và tên, số định danh cá nhân, chứng minh nhân dân 09 số của chủ hộ và các thành viên hộ gia đình; e) Thông tin chủ
    hộ, quan hệ với chủ hộ; g) Thông tin khác theo quy định pháp luật. 4. Việc kết nối, chia sẻ thông tin giữa Cơ sở dữ liệu
    về cư trú với hệ thống thông tin, cơ sở dữ liệu khác được thực hiện trên cơ sở thống nhất giữa Bộ Công an với cơ quan
    chủ quản hệ thống thông tin, cơ sở dữ liệu khác để phục vụ công tác quản lý theo chức năng, nhiệm vụ được giao; bảo đảm
    bảo mật, an ninh, an toàn thông tin, bảo vệ dữ liệu cá nhân. 5. Các trường hợp được khai thác thông tin, tài liệu trong
    Cơ sở dữ liệu về cư trú: a) Cơ quan tiến hành tố tụng được khai thác thông tin, tài liệu trong Cơ sở dữ liệu về cư trú
    để phục vụ hoạt động tố tụng theo chức năng, nhiệm vụ, quyền hạn được giao; b) Cơ quan quản lý cơ sở dữ liệu chuyên ngành,
    cơ quan nhà nước, tổ chức chính trị, tổ chức chính trị - xã hội được khai thác thông tin, tài liệu trong Cơ sở dữ liệu
    cư trú để phục vụ công tác theo chức năng, nhiệm vụ, quyền hạn được giao; c) Công dân được khai thác thông tin, tài liệu
    của mình trong Cơ sở dữ liệu về cư trú; d) Tổ chức và cá nhân không thuộc quy định tại điểm a, b và điểm c khoản này khi
    khai thác thông tin cá nhân khác trong Cơ sở dữ liệu về cư trú phải được sự đồng ý của cơ quan đăng ký cư trú và cá nhân
    là chủ thể của thông tin được khai thác. Trường hợp khai thác thông tin của người bị mất năng lực hành vi dân sự, người
    có khó khăn trong nhận thức, làm chủ hành vi theo quy định của Bộ luật Dân sự, người dưới 14 tuổi, người bị tuyên bố mất
    tích, người đã chết phải được sự đồng ý của cơ quan đăng ký cư trú và một trong những người đại diện hợp pháp, người thừa
    kế theo quy định tại điểm đ khoản này; đ) Người bị mất năng lực hành vi dân sự, người có khó khăn trong nhận thức, làm
    chủ hành vi theo quy định của Bộ luật Dân sự, người dưới 14 tuổi khai thác thông tin của mình thông qua người đại diện
    hợp pháp. Việc khai thác thông tin của người bị tuyên bố mất tích do người đại diện hợp pháp của người đó quyết định.
    Việc khai thác thông tin của người đã chết do người được xác định là người thừa kế của người đó quyết định. 6. Khai thác
    thông tin, tài liệu của công dân trong Cơ sở dữ liệu về cư trú a) Cơ quan, tổ chức, cá nhân quy định tại khoản 5 Điều
    này được khai thác thông tin trong Cơ sở dữ liệu về cư trú thông qua văn bản yêu cầu khai thác thông tin; b) Cơ quan,
    tổ chức, cá nhân có văn bản yêu cầu khai thác thông tin trong Cơ sở dữ liệu về cư trú gửi cơ quan đăng ký cư trú nơi công
    dân cư trú; c) Văn bản yêu cầu cung cấp thông tin phải nêu rõ mục đích, nội dung, phạm vi thông tin cần khai thác trong
    Cơ sở dữ liệu về cư trú và cam đoan về việc chịu trách nhiệm trong sử dụng thông tin khi được khai thác; đối với trường
    hợp khai thác thông tin theo quy định tại điểm d, điểm đ khoản 5 Điều này phải thể hiện rõ ý kiến đồng ý của chủ thể thông
    tin cần khai thác; d) Trong thời hạn 01 ngày làm việc, thủ trưởng cơ quan đăng ký cư trú nơi công dân cư trú xem xét,
    phê duyệt, cung cấp thông tin trong Cơ sở dữ liệu về cư trú cho cơ quan, tổ chức, cá nhân có yêu cầu; đ) Trường hợp không
    đồng ý cung cấp thông tin thì phải có văn bản trả lời và nêu rõ lý do.'
- source_sentence: 'Represent this sentence for searching relevant documents: Người cao tuổi về ở với cháu ruột có thể dùng
    Thẻ bảo hiểm y tế để làm giấy tờ đăng ký thường trú không?'
  sentences:
  - 'Represent this document for retrieval: Luật Cư trú Chương V Điều 27. Điều kiện đăng ký tạm trú

    Luật 68/2020/QH14

    1. Công dân đến sinh sống tại chỗ ở hợp pháp ngoài phạm vi đơn vị hành chính cấp xã nơi đã đăng ký thường trú để lao động,
    học tập hoặc vì mục đích khác từ 30 ngày trở lên thì phải thực hiện đăng ký tạm trú. 2. Thời hạn tạm trú tối đa là 02
    năm và có thể tiếp tục gia hạn nhiều lần 3. Công dân không được đăng ký tạm trú mới tại chỗ ở quy định tại Điều 23 của
    Luật này.'
  - 'Represent this document for retrieval: Nghị định Quy định chi tiết một số điều luật cư trú Chương II Điều 6. Giấy tờ,
    tài liệu chứng minh quan hệ nhân thân

    Nghị định 62/2021/NĐ-CP

    1. Giấy tờ, tài liệu chứng minh quan hệ nhân thân thuộc trường hợp quy định tại điểm a khoản 2 Điều 20 Luật Cư trú, bao
    gồm: a) Giấy tờ, tài liệu để chứng minh quan hệ vợ, chồng: Giấy chứng nhận kết hôn; giấy xác nhận tình trạng hôn nhân;
    xác nhận của Ủy ban nhân dân cấp xã hoặc Ủy ban nhân dân cấp huyện nơi không có đơn vị hành chính cấp xã nơi cư trú; b)
    Giấy tờ, tài liệu để chứng minh quan hệ cha, mẹ, con: Giấy khai sinh; chứng nhận hoặc quyết định việc nuôi con nuôi; quyết
    định việc nhận cha, mẹ, con; xác nhận của Ủy ban nhân dân cấp xã hoặc Ủy ban nhân dân cấp huyện nơi không có đơn vị hành
    chính cấp xã nơi cư trú; Hộ chiếu còn thời hạn sử dụng có chứa thông tin thể hiện quan hệ nhân thân cha hoặc mẹ với con;
    quyết định của Tòa án, trích lục hộ tịch hoặc văn bản của cơ quan y tế, cơ quan giám định, cơ quan khác có thẩm quyền
    xác nhận về quan hệ cha, mẹ với con. 2. Giấy tờ, tài liệu chứng minh quan hệ nhân thân thuộc trường hợp quy định tại điểm
    b, điểm c khoản 2 Điều 20 Luật Cư trú, bao gồm: a) Giấy tờ, tài liệu để chứng minh mối quan hệ anh, chị, em ruột, cháu
    ruột: Giấy khai sinh, xác nhận của Ủy ban nhân dân cấp xã hoặc Ủy ban nhân dân cấp huyện nơi không có đơn vị hành chính
    cấp xã nơi cư trú; b) Giấy tờ, tài liệu chứng minh mối quan hệ cụ nội, cụ ngoại, ông nội, bà nội, ông ngoại, bà ngoại,
    anh, chị, em ruột, cô, dì, chú, bác, cậu ruột, người giám hộ: Quyết định cử người giám hộ; xác nhận của Ủy ban nhân dân
    cấp xã hoặc Ủy ban nhân dân cấp huyện nơi không có đơn vị hành chính cấp xã tại nơi cư trú về mối quan hệ nhân thân; c)
    Giấy tờ, tài liệu chứng minh không còn cha, mẹ: Giấy chứng tử của cha, mẹ hoặc quyết định của Tòa án tuyên bố cha, mẹ
    mất tích, chết, xác nhận của Ủy ban nhân dân cấp xã hoặc Ủy ban nhân dân cấp huyện nơi không có đơn vị hành chính cấp
    xã tại nơi cư trú về việc cha, mẹ đã chết; d) Giấy tờ chứng minh người cao tuổi: Giấy khai sinh, thẻ Căn cước công dân
    hoặc Chứng minh nhân dân, Hộ chiếu; Sổ Bảo hiểm xã hội, Thẻ bảo hiểm y tế hoặc xác nhận của Ủy ban nhân dân cấp xã, Ủy
    ban nhân dân cấp huyện nơi không có đơn vị hành chính cấp xã tại nơi cư trú về ngày, tháng, năm sinh; đ) Giấy tờ chứng
    minh người khuyết tật đặc biệt nặng, người khuyết tật nặng, người không có khả năng lao động, người bị bệnh tâm thần hoặc
    bệnh khác làm mất khả năng nhận thức, khả năng điều khiển hành vi: Chứng nhận của cơ sở y tế từ cấp huyện trở lên hoặc
    xác nhận của Ủy ban nhân dân cấp xã, Ủy ban nhân dân cấp huyện nơi không có đơn vị hành chính cấp xã tại nơi cư trú; e)
    Giấy tờ chứng minh người chưa thành niên gồm: Giấy khai sinh, thẻ Căn cước công dân hoặc Chứng minh nhân dân, Hộ chiếu,
    Sổ Bảo hiểm xã hội, Thẻ bảo hiểm y tế hoặc xác nhận của Ủy ban nhân dân cấp xã, Ủy ban nhân dân cấp huyện nơi không có
    đơn vị hành chính cấp xã tại nơi cư trú về ngày, tháng, năm sinh. 3. Trường hợp thông tin chứng minh quan hệ nhân thân
    của công dân đã có trên Cơ sở dữ liệu quốc gia về dân cư hoặc cơ sở dữ liệu chuyên ngành thì cơ quan đăng ký cư trú không
    yêu cầu công dân phải cung cấp giấy tờ chứng minh quan hệ nhân thân.'
  - 'Represent this document for retrieval: Luật Sửa đổi, bổ sung một số điều của luật cư trú 2013 Điều 1. Sửa đổi, bổ sung
    một số điều của Luật cư trú:

    Luật 36/2013/QH13

    1. Sửa đổi, bổ sung khoản 8 Điều 8 và bổ sung khoản 10 và khoản 11 vào Điều 8 như sau: “8. Thuê, cho thuê, làm giả, sửa
    chữa, làm sai lệch nội dung sổ hộ khẩu, sổ tạm trú, giấy tờ khác có liên quan đến cư trú; sử dụng giấy tờ giả về cư trú;
    cung cấp thông tin, tài liệu sai sự thật về cư trú; giả mạo điều kiện để được đăng ký thường trú.” “10. Giải quyết cho
    đăng ký cư trú khi biết rõ người được cấp đăng ký cư trú không sinh sống tại chỗ ở đó. 11. Đồng ý cho người khác đăng
    ký cư trú vào chỗ ở của mình để vụ lợi hoặc trong thực tế người đăng ký cư trú không sinh sống tại chỗ ở đó.” 2. Điều
    20 được sửa đổi, bổ sung như sau: “Điều 20. Điều kiện đăng ký thường trú tại thành phố trực thuộc trung ương Công dân
    thuộc một trong những trường hợp sau đây thì được đăng ký thường trú tại thành phố trực thuộc trung ương: 1. Có chỗ ở
    hợp pháp, trường hợp đăng ký thường trú vào huyện, thị xã thuộc thành phố trực thuộc trung ương thì phải có thời gian
    tạm trú tại thành phố đó từ một năm trở lên, trường hợp đăng ký thường trú vào quận thuộc thành phố trực thuộc trung ương
    thì phải có thời gian tạm trú tại thành phố đó từ hai năm trở lên; 2. Được người có sổ hộ khẩu đồng ý cho nhập vào sổ
    hộ khẩu của mình nếu thuộc một trong các trường hợp sau đây: a) Vợ về ở với chồng; chồng về ở với vợ; con về ở với cha,
    mẹ; cha, mẹ về ở với con; b) Người hết tuổi lao động, nghỉ hưu, nghỉ mất sức, nghỉ thôi việc về ở với anh, chị, em ruột;
    c) Người khuyết tật, mất khả năng lao động, người bị bệnh tâm thần hoặc bệnh khác làm mất khả năng nhận thức, khả năng
    điều khiển hành vi về ở với anh, chị, em ruột, cô, dì, chú, bác, cậu ruột, người giám hộ; d) Người chưa thành niên không
    còn cha, mẹ hoặc còn cha, mẹ nhưng cha, mẹ không có khả năng nuôi dưỡng về ở với ông, bà nội, ngoại, anh, chị, em ruột,
    cô, dì, chú, bác, cậu ruột, người giám hộ; đ) Người thành niên độc thân về ở với ông, bà nội, ngoại, anh, chị, em ruột,
    cô, dì, chú, bác, cậu ruột; e) Ông bà nội, ngoại về ở với cháu ruột; 3. Được điều động, tuyển dụng đến làm việc tại cơ
    quan, tổ chức hưởng lương từ ngân sách nhà nước hoặc theo chế độ hợp đồng không xác định thời hạn và có chỗ ở hợp pháp;
    4. Trước đây đã đăng ký thường trú tại thành phố trực thuộc trung ương, nay trở về thành phố đó sinh sống tại chỗ ở hợp
    pháp của mình; 5. Trường hợp quy định tại các khoản 1, 3 và 4 Điều này đăng ký thường trú vào chỗ ở hợp pháp do thuê,
    mượn, ở nhờ của cá nhân, tổ chức thì phải có đủ các điều kiện sau đây: a) Bảo đảm điều kiện về diện tích bình quân theo
    quy định của Hội đồng nhân dân thành phố; b) Có xác nhận của Ủy ban nhân dân xã, phường, thị trấn về điều kiện diện tích
    bình quân; c) Được người cho thuê, cho mượn, cho ở nhờ đồng ý bằng văn bản; 6. Việc đăng ký thường trú vào nội thành thành
    phố Hà Nội thực hiện theo quy định tại khoản 4 Điều 19 của Luật Thủ đô.” 3. Khoản 1 Điều 23 được sửa đổi, bổ sung như
    sau: “1. Người đã đăng ký thường trú mà thay đổi chỗ ở hợp pháp, khi chuyển đến chỗ ở hợp pháp mới nếu có đủ điều kiện
    đăng ký thường trú thì trong thời hạn mười hai tháng có trách nhiệm làm thủ tục thay đổi nơi đăng ký thường trú.” 4. Khoản
    4 Điều 30 được sửa đổi, bổ sung như sau: “4. Trưởng Công an xã, phường, thị trấn trong thời hạn ba ngày làm việc, kể từ
    ngày nhận đủ giấy tờ quy định tại khoản 3 Điều này phải cấp sổ tạm trú theo mẫu quy định của Bộ Công an. Sổ tạm trú được
    cấp cho hộ gia đình hoặc cá nhân đã đăng ký tạm trú, có giá trị xác định nơi tạm trú của công dân và có thời hạn tối đa
    là hai mươi bốn tháng. Trong thời hạn ba mươi ngày trước ngày hết thời hạn tạm trú, công dân đến cơ quan Công an nơi cấp
    sổ tạm trú để làm thủ tục gia hạn. Việc điều chỉnh thay đổi về sổ tạm trú được thực hiện theo quy định tại Điều 29 của
    Luật này. Sổ tạm trú bị hư hỏng thì được đổi, bị mất thì được cấp lại. Trường hợp đến tạm trú tại xã, phường, thị trấn
    khác thì phải đăng ký lại.” 5. Khoản 2 Điều 31 được sửa đổi, bổ sung như sau: “2. Đại diện gia đình, nhà ở tập thể, cơ
    sở chữa bệnh, khách sạn, nhà nghỉ, cơ sở khác khi có người đến lưu trú có trách nhiệm thông báo việc lưu trú với Công
    an xã, phường, thị trấn; trường hợp người đến lưu trú tại nhà ở của gia đình, nhà ở tập thể mà chủ gia đình, nhà ở tập
    thể đó không đăng ký thường trú tại địa bàn xã, phường, thị trấn đó thì người đến lưu trú có trách nhiệm thông báo việc
    lưu trú với Công an xã, phường, thị trấn. Việc thông báo lưu trú được thực hiện trực tiếp hoặc bằng điện thoại hoặc qua
    mạng Internet, mạng máy tính. Công an xã, phường, thị trấn có trách nhiệm thông báo địa điểm, địa chỉ mạng Internet, địa
    chỉ mạng máy tính, số điện thoại nơi tiếp nhận thông báo lưu trú cho nhân dân biết.”'
