  widget:
  - source_sentence: 'Represent this sentence for searching relevant documents: Và cho hỏi nếu đến nơi khác học tập 1 năm
      thì có phải thực hiện đăng ký tạm trú không?'
    sentences:
    - 'Represent this document for retrieval: Luật Cư trú Chương II Điều 12. Nơi cư trú của công dân

      Luật 81/2006/QH11

      1. Nơi cư trú của công dân là chỗ ở hợp pháp mà người đó thường xuyên sinh sống. Nơi cư trú của công dân là nơi thường
      trú hoặc nơi tạm trú. Chỗ ở hợp pháp là nhà ở, phương tiện hoặc nhà khác mà công dân sử dụng để cư trú. Chỗ ở hợp pháp
      có thể thuộc quyền sở hữu của công dân hoặc được cơ quan, tổ chức, cá nhân cho thuê, cho mượn, cho ở nhờ theo quy định
      của pháp luật. Nơi thường trú là nơi công dân sinh sống thường xuyên, ổn định, không có thời hạn tại một chỗ ở nhất
      định và đã đăng ký thường trú. Nơi tạm trú là nơi công dân sinh sống ngoài nơi đăng ký thường trú và đã đăng ký tạm
      trú. 2. Trường hợp không xác định được nơi cư trú của công dân theo quy định tại khoản 1 Điều này thì nơi cư trú của
      công dân là nơi người đó đang sinh sống.'
    - 'Represent this document for retrieval: Luật Cư trú Chương V Điều 27. Điều kiện đăng ký tạm trú

      Luật 68/2020/QH14

      1. Công dân đến sinh sống tại chỗ ở hợp pháp ngoài phạm vi đơn vị hành chính cấp xã nơi đã đăng ký thường trú để lao
      động, học tập hoặc vì mục đích khác từ 30 ngày trở lên thì phải thực hiện đăng ký tạm trú. 2. Thời hạn tạm trú tối đa
      là 02 năm và có thể tiếp tục gia hạn nhiều lần 3. Công dân không được đăng ký tạm trú mới tại chỗ ở quy định tại Điều
      23 của Luật này.'
    - 'Represent this document for retrieval: Thông tư Quy định chi tiết một số điều và biện pháp thi hành luật cư trú 2021
      Chương III Điều 13. Đăng ký tạm trú

      Thông tư 55/2021/TT-BCA

      1. Công dân thay đổi chỗ ở ngoài nơi đã đăng ký tạm trú có trách nhiệm thực hiện đăng ký tạm trú mới. Trường hợp chỗ
      ở đó trong phạm vi đơn vị hành chính cấp xã nơi đã đăng ký thường trú thì thực hiện theo quy định tại khoản 3 Điều 6
      Thông tư này. 2. Học sinh, sinh viên, học viên đến ở tập trung trong ký túc xá, khu nhà ở của học sinh, sinh viên, học
      viên; người lao động đến ở tập trung tại các khu nhà ở của người lao động; trẻ em, người khuyết tật, người không nơi
      nương tựa được nhận nuôi và sinh sống trong cơ sở tín ngưỡng, cơ sở tôn giáo; người được chăm sóc, nuôi dưỡng, trợ giúp
      tại cơ sở trợ giúp xã hội có thể thực hiện đăng ký tạm trú thông qua cơ quan, tổ chức quản lý trực tiếp chỗ ở đó. Cơ
      quan, tổ chức quản lý trực tiếp có trách nhiệm lập danh sách người tạm trú, kèm Tờ khai thay đổi thông tin cư trú của
      từng người, văn bản đề nghị đăng ký tạm trú trong đó ghi rõ thông tin về chỗ ở hợp pháp và được cơ quan đăng ký cư trú
      cập nhật thông tin về nơi tạm trú vào Cơ sở dữ liệu về cư trú. Danh sách bao gồm những thông tin cơ bản của từng người:
      họ, chữ đệm và tên; ngày, tháng, năm sinh; giới tính; số định danh cá nhân và thời hạn tạm trú. 3. Trường hợp giấy tờ,
      tài liệu chứng minh chỗ ở hợp pháp để đăng ký tạm trú là văn bản cho thuê, cho mượn, cho ở nhờ nhà ở, nhà khác của cá
      nhân, tổ chức thì văn bản đó không bắt buộc phải công chứng hoặc chứng thực.'
  - source_sentence: 'Represent this sentence for searching relevant documents: Chào ban biên tập, hiện tại tôi đang ở trên
      chiếc xe lưu động của anh trai tôi và có dùng chiếc xe đó để bán kem mỗi tối. Tôi không biết là tôi có được đăng ký
      thường trú khi tôi sinh sống trên xe đấy không?'
    sentences:
    - 'Represent this document for retrieval: Thông tư Quy định chi tiết thi hành một số điều của luật cư trú và nghị định
      số 31/2014/NĐ-CP ngày 18 tháng 4 năm 2014 của chính phủ quy định chi tiết một số điều và biện pháp thi hành luật cư
      trú Chương III Điều 16. Thủ tục đăng ký tạm trú

      Thông tư 35/2014/TT-BCA

      1. Hồ sơ đăng ký tạm trú bao gồm: a) Phiếu báo thay đổi hộ khẩu, nhân khẩu; bản khai nhân khẩu (đối với các trường hợp
      phải khai bản khai nhân khẩu); b) Giấy tờ, tài liệu chứng minh chỗ ở hợp pháp theo quy định tại Điều 6 Nghị định số
      31/2014/NĐ-CP (trừ trường hợp được chủ hộ có sổ hộ khẩu hoặc sổ tạm trú đồng ý cho đăng ký tạm trú thì không cần xuất
      trình giấy tờ, tài liệu chứng minh chỗ ở hợp pháp). Trường hợp chỗ ở hợp pháp do thuê, mượn, ở nhờ thì phải được người
      cho thuê, cho mượn, cho ở nhờ đồng ý cho đăng ký tạm trú vào chỗ ở của mình và ghi vào phiếu báo thay đổi hộ khẩu, nhân
      khẩu, ký, ghi rõ họ, tên; trường hợp người cho thuê, cho mượn, cho ở nhờ đã có ý kiến bằng văn bản đồng ý cho đăng ký
      tạm trú vào chỗ ở của mình thì không phải ghi vào phiếu báo thay đổi hộ khẩu, nhân khẩu. Xuất trình chứng minh nhân
      dân hoặc giấy tờ có xác nhận của Công an xã, phường, thị trấn nơi người đó thường trú. 2. Người tạm trú được chủ hộ
      đồng ý cho nhập vào sổ tạm trú hoặc đồng ý cho đăng ký tạm trú tại nơi thường trú của chủ hộ thì việc đồng ý phải được
      ghi vào phiếu báo thay đổi hộ khẩu, nhân khẩu, ký, ghi rõ họ tên và ngày, tháng, năm. 3. Người đăng ký tạm trú nộp hồ
      sơ đăng ký tạm trú tại Công an xã, phường, thị trấn.'
    - 'Represent this document for retrieval: Luật Sửa đổi, bổ sung một số điều của luật cư trú 2013 Điều 1. Sửa đổi, bổ sung
      một số điều của Luật cư trú:

      Luật 36/2013/QH13

      1. Sửa đổi, bổ sung khoản 8 Điều 8 và bổ sung khoản 10 và khoản 11 vào Điều 8 như sau: “8. Thuê, cho thuê, làm giả,
      sửa chữa, làm sai lệch nội dung sổ hộ khẩu, sổ tạm trú, giấy tờ khác có liên quan đến cư trú; sử dụng giấy tờ giả về
