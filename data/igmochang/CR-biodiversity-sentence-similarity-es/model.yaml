    sentences:
    - 'de largo, glabros. Inflorescencias en racimos subumbelados cortos con 10 a 15 flores, opuestos a las hojas, principalmente
      cerca de los extremos de las ramas, glabrescentes, pedúnculo no ramificado, de 0,3 a 1 cm. de largo, pedicelos de 10
      a 20 mm. de largo; cáliz de 2 a 3 mm. de largo, profundamente lobulado, lóbulos deltoides, apicalmente con tricomas
