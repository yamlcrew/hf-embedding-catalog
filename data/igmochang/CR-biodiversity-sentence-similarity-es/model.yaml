- source_sentence: ¿Cuáles son las características morfológicas distintivas de Solanum chrysotrichum, incluyendo detalles
    sobre sus hojas, inflorescencias y frutos?
  sentences:
  - 'Frutos subglobosos, cerca de 5 a 9 mm de diámetro, blancos.. Ciclo anual: . Distribución regional: Del sur de México
    a Suramérica.. Fenología: La floración se ha registrado entre marzo y septiembre, pero más frecuentemente en julio.. Usos:
    .

    3462 | Nombre científico: Solanum chrysotrichum. Nombres comunes:  | Descripcion: Arbustos de hasta 3 m. de alto, escasamente
    armados; tallos tomentosos con tricomas multiangulados de pedículos largos y gruesos, con el brazo central a veces alargado
    y con acúleos cortos, rectos o incurvados de 2 a 5 mm. de largo. Hojas solitarias, ampliamente ovadas, hasta 40 cm. de
    largo, ápice agudo, base truncada o cordada, enteras o con lóbulos salientes, afelpadas, el tomento frecuentemente ferrugíneo,
    haz hirsuta con tricomas estrellados sésiles de brazos centrales largos, envés suavemente tomentoso con tricomas multiangulados
    de pedículos gruesos, los nervios principales a veces armados; pecíolos hasta 15 cm. de largo, tomentosos, a veces armados.
    Inflorescencias simples, cimosas, con pocas ramas, cada rama racemosa, con varias flores, laterales, pedúnculos ramificados
    una o más veces, los primarios obsoletos o hasta 1,5 cm. de largo, cerdoso-híspidos, pedicelos casi 5 mm. de largo, con
    tricomas de brazos centrales largos, inermes; cáliz casi 5 mm. de largo, tomentoso por fuera con tricomas multiangulados,
    lobulado 1/3 de su longitud, lóbulos angostamente triangulares; corola de 30 a 50 mm. de diámetro, blanca, lobada 1/3
    de su longitud, lóbulos ovados, pubescentes en el medio; anteras de 6 a 10 mm.de largo. Fruto tipo baya globosa, de 1
    a 1,5 cm. de diámetro, glabra, verde, pedicelos fructíferos gruesos, no alargados, erectos; semillas aplanadas, de 2,2
    a 2,6 mm. de diámetro.. Ciclo anual: . Distribución regional: De México a Panamá.. Fenología: Fértil durante todo el año..
    Usos: .

    3243 | Nombre científico: Forchhammeria pallida. Nombres comunes: Siempreviva, aceituno blanco. | Descripcion: Árbol o
    arbusto de 4 a 10 m de altura. Ramitas glabras. Hojas simples, alternas, obovado-oblongas, de 2,5-10,4 por 0,8-2 cm, ápice
    redondeado, emarginado, obtuso o corto-mucronado, glabras y lustrosas.Inflorescencia en racimos axilares comprimidos,
    de 4 a 6 cm de largo.  Flores pardo crema muy pequeñas, bisexuales. Frutos tipo bayas, 2 cm de diámetro, esféricas, amarillo-anaranjado
    al madurar, rellenas con pulpa suave, no jugosa, de sabor desagradable.La madera es amarillo paja y densa y presenta una
    anatomía poco común, ya que posee floema incluido.DIAGNÓSTICO: Especie difícil de ubicar en esta familia. Se caracteriza
    por hojas pequeñas, obovadas, glabras y lustrosas.  Los árboles tienen una copa densa y redondeada.  Las plántulas y brinzales
    tienen hojas bastante lineares, que contrastan con las de los individuos adultos.. Ciclo anual: . Distribución regional:
    México. Fenología: Flores observadas en enero, marzo, noviembre y diciembre.'
  - 'un máximo de 24 dientes en N. richardi). Tiene un abdomen más largo (60.7% de la longitud estándar vs. 49.3-56.8%) y
    un color más claro. Es el miembro más atenuado del género.Tiene las patas traseras más angostas (4.1% de la longitud estándar
    vs. 4.4-5.o % en otras especies de Costa Rica). Los dedos de la pata trasera son más cortos (3er dedo es 0.9-1.7%). Sus
    patas delanteras y traseras son sindáctilas con 4 dedos en las patas delanteras y 5 dedos en las patas traseras. Pero
    el dedo (pata trasera) más externo está solamente perfilado externamente por un surco. Las puntas de los dígitos están
    libres y son más punteadas que redondeadas.Tiene las fosas nasales muy largas (el ancho de la cabeza es 4.0 veces el diámetro
    de la fosa nasal) comparable en tamaño con las de N. richardi, pero mucho más grandes que las de los otros  miembros del
    género en Costa Rica.. Ciclo anual: . Distribución regional: . Fenología: . Usos: .

    1894 | Nombre científico: Pselliophorus tibialis. Nombres comunes: Saltón de muslos amarillos | Descripcion: 18.5 cm.;
    31 g.. Es oscuro, delgado, de cola larga, con muslos amarillos esponjados; el pico es más bien largo y delgado; con aspecto
    de Atlapetes. ADULTOS: el píleo y la parte de atrás de la nuca son negros; el resto de la parte de arriba es negro pizarra;
    la garganta es negruzca, pasando a pizarra negruzco en el resto de la región inferior; el pecho y el abdomen son teñidos
    con verde oliva. El iris es castaño; el pico es negro y las patas son fuscas. Algunos individuos presentan una pequeña
    mancha amarilla en el borde del hombro. JUVENILES: son parecidos pero más opacos por encima, de color más negro tiznado;
    por debajo presentan un fuerte tinte cafecino; los muslos son café oliva pálido.. Ciclo anual: . Distribución regional:
    Se encuentran en Costa Rica y el oeste de Panamá.. Fenología: . Usos: .

    44 | Nombre científico: Werauhia kathyae. Nombres comunes: Piñuela, parásita, epífita. | Descripcion: Epífitas o terrestres,
    caulescentes. Hojas de 15 a 45 cm de largo, atenuadas, cartáceas o papelosas, quebradizas; vainas de 2,4 a 3,9 cm, café
    oscuro y lepidotas; láminas de 1,0 a 1,9 cm, glabras o lepidotas, con líneas longitudinales oscuras. Escapo de 22 a 37
    cm de largo, erecto o curvado-erecto; brácteas verde-crema y más largas que los entrenudos.Inflorescencia erecta de 2
    a 5 cm de largo, 1-pinnada; brácteas primarias más largas que los ramos laterales, éstos son sésiles o casi sésiles, con
    dos a tres flores colaterales; brácteas florales de 1,3 a 1,8 cm de largo, verde-crema, de ovadas a oblongas, carinadas,
    de glabradas a lepidotas, de membranáceas a cartáceas.Flores sésiles; sépalos de 0,6 a 1,0 cm de largo, coriáceos; pétalos
    crema o verde-crema de 1,7 a 2,0 cm de largo.Cápsulas de 1,7 a 2,5 cm de largo; coma de la semilla canela.. Ciclo anual:
    . Distribución regional: .'
  - 'y pesa 12 grs. Es un Empidonax pequeño, muy café, con las alas cortas y redondeadas y el anillo ocular muy opaco. Los
    adultos son oliva cafecino por encima. El anillo ocular es anteado y angosto no muy bien definido. Las barras alares son
    entre ante opaco y café pálido. La garganta es blanca. El pecho presenta un tinte parduzco. El abdomen es anteado amarillento.
    El forro de las alas y por lo general las coberteras infracaudales son ante encendido. La maxila es negra y la mandíbula
    es color anaranjado-carne. El forro de la boca es anaranjado. Las patas son negruzcas.  Los especímenes juveniles son
    café tiznados y opacos por encima, con las barras alares más contrastantes de color anteado o canela.. Ciclo anual: Es
    una especie migratoria neártica (ver Distribución en Costa Rica).. Distribución regional: Se reproduce localmente desde
    el norte de México hasta el oeste de Panamá. Invierna desde la parte central de México hasta la parte central de Panamá..
    Fenología: . Usos: .

    1746 | Nombre científico: Vireo philadelphicus. Nombres comunes: Vireo amarillento | Descripcion: Mide 11.5 cm. y pesa
    11.5 grs. Es un Vireo pequeño sin marcas alares, de coloración algo parecida a la de Vermivora peregrina (con la cual
    se asocia con frecuencia), pero con la cabeza relativamente más grande y redondeada, el pico más grueso, las listas faciales
    más anchas y las coberteras infracaudales amarillas.  En adultos el píleo es gris, con un tinte oliva. El resto de la
    región superior es verde oliva grisáceo. La ceja y el área bajo el ojo son de color blanco, separadas mediante una lista
    ocular fusca. Las mejillas están teñidas de oliva. La región inferior varía entre principalmente amarilla bastante brillante,
    con garganta y abdomen más pálidos, y principalmente blancuzca, con amarillo bien definido solo en el pecho y en las coberteras
    infracaudales. La maxila es de color cuerno fusco y la mandíbula de color cuerno más pálido. Las patas son grises. Los
    individuos inmaduros son muy parecidos a los adultos, pero en ocasiones presentan algunas coberteras alares mayores, más
    cortas, opacas, con la punta pálida, retenidas del plumaje juvenil.. Ciclo anual: Es una especie migratoria neártica (ver
    Distribución en Costa Rica).. Distribución regional: Se reproduce en Canadá y el extremo norte de E.U.A. Invierna desde
    la Península de Yucatán y Guatemala hasta la parte central de Panamá y en raras ocasiones hasta el norte de Guatemala..
    Fenología: . Usos: .

    1446 | Nombre científico: Onychoprion anaethetus. Nombres comunes: Charrán embridado | Descripcion: Mide 36 cm. y pesa
    100 grs. Es de tamaño mediano, con la espalda oscura y la cola profundamente ahorquillada; se distingue de Sterna fuscata
    por el collar nucal claro y la mancha blanca delgada en la frente, que se extiende para formar una lista superciliar corta.  Durante
    la época de cría los adultos presentan la coronilla y la lista loreal negras, el collar nucal gris claro y el resto de
    la región superior gris parduzco oscuro. Toda la región inferior y las rectrices externas son blancas, con un tinte gris
    en el pecho y el costado. El pico y las patas son negras.  Fuera de la época de cría (que se ve en raras ocasiones en
    Costa Rica), la coronilla es eminentemente blanca con listas negras en la parte posterior.'
- source_sentence: ¿Cuáles son las características distintivas del plumaje del Mosquero de agua, tanto en adultos como en
    juveniles?
  sentences:
  - 'Nombres comunes: Mosquero de agua | Descripcion: Mide 15.5 cm. y pesa 21 grs. Es negruzco, de tamaño mediano, y en raras
    ocasiones se encuentra lejos del agua.  Los adultos muestran la cabeza, cuello y la mayor parte de la región inferior
    entre negro opaco y negro pizarra y el centro del abdomen blanco. Los flancos y las coberteras infracaudales son gris
    tiznado y el resto de la región superior es pizarra negruzco. Presentan 2 barras alares grises y las secundarias y terciales
    con un borde grisáceo. La cola es negruzca, con el vexilo externo de las timoneras más externas bordeado de blanco, y
    el pico y las patas son negruzcas.  Los especímenes juveniles presentan el plumaje sobre todo negro parduzco apagado,
    el abdomen y las barras alares entre café canela opaco y café anteado y las plumas de la espalda y la rabadilla con flecos
    café pálido.. Ciclo anual: Efectúan migraciones altitudinales.. Distribución regional: Se encuentran desde el suroeste
    de E.U.A. hasta el noroeste de Argentina.. Fenología: . Usos: .

    1029 | Nombre científico: Cheilanthes brachypus. Nombres comunes:  | Descripcion: Helechos terrestres o epipétricos.  Rizoma
    cortamente ascendente, compacto, con escamas de 8 a 15 por 0,1 a 0,3 mm, lineares, pardo-amarillentas a pardo-rojizas,
    concoloras a ligeramente bicoloras, enteras o con el margen dispersamente dentado.Frondas de 10 a 35 cm de largo. Pecíolo
    de 1 a 5 cm de largo, de 1/8 a 1/5 del tamaño de la fronda, pardo oscuro, cilíndrico, densamente escamoso y peloso. Escamas
    de 1 a 5 por 0,5 a 1 mm, lanceoladas a lineares, pardas a pardo-rojizas, los tricomas de 1 a 2 mm, blanquecinos, tortuosos.
    Lámina de 8 a 30 por 2,5 a 5 cm, oblanceolada, 1 pinnado-pinnatífida. El haz densamente peloso, los tricomas de casi 1
    mm, hialinos, laxamente patentes; el envés densamente escamoso y peloso (la superficie no visible), los tricomas y escamas
    anaranjado-rojizos.  Pinnas de 10 a 21 pares, de 1,2 a 2,5 por 0,6 a 1,3 cm, equiláteras, deltadas a lanceoladas. Raquis
    negro, oculto por una densa cubierta de tricomas y escamas. Nervaduras ocultas, no visibles. Indusio reflexo, escarioso,
    entero, o decurrente.Cheilanthes brachypus se caracteriza por la lámina 1 pinnado-pinnatífida, oblanceolada, densamente
    escamosa en el envés.  En Mesoamérica, esta especie y C. bonariensis son las únicas especies de Cheilanthes con láminas
    1 pinnado-pinnatífidas.. Ciclo anual: . Distribución regional: México y Mesoamérica.. Fenología: . Usos: .

    2778 | Nombre científico: Caripia montagnei. Nombres comunes:  | Descripcion: Cuerpos fructíferos de 0,5 a 2,5 cm de alto,
    con forma de copa alargada y con el extremo superior aplanado, de 0,5 a 1,5 cm de diámetro, de blanco a beige. El relleno
    (contexto) es sólido, de color blanco. No posee olor o sabor distintivos.'
  - 'Zanthoxylum fagara (L.) Sarg. var. culantrillo, que crece en las faldas de las Cordilleras de Guanacaste y de Tilarán,
    a una elevación de 600 a 1300 m. Posee mayor apariencia de árbol, con pocos aguijones en el fuste y sin aguijones en las
    ramas. Raquis levemente alado. Panículas hasta de 11 cm.  En Standley (1937) fue tratado como Zanthoxylum insulare.. Ciclo
    anual: . Distribución regional: De México a Sur América y Las Antillas.. Fenología: Floración observada en febrero.. Usos:
    .

    697 | Nombre científico: Glyphonycteris daviesi. Nombres comunes: Murciélago | Descripcion: Longitud de la cabeza y cuerpo
    63-84 mm, longitud de la cola 5-11 mm, longitud del pie 17-20 mm, longitud de la oreja 27-31 mm, longitud del antebrazo
    54-58 mm,  peso 19-30 g.Es la especie de mayor tamaño dentro de este género. Tiene sólo un par de incisivos muy grandes
    (tan largos como los caninos). La parte dorsal es de un color café parduzco oscuro; la parte ventral es ligeramente más
    pálida. El pelaje es largo y lanudo. Las orejas son largas, con los extremos punteados. Los labios y la barbilla son bastante
    peludos; la barbilla es acanalada y está bordeada por un cojincillo liso en forma de V. La cola es corta y mide cerca
    de la mitad de la longitud del uropatagio. El calcáneo es más pequeño que la pata. Las patas son largas y moderadamente
    peludas.. Ciclo anual: . Distribución regional: Desde Honduras hasta Perú; Guyanas; Brasil y Bolivia. Se localizan sólo
    en tierras bajas.. Fenología: . Usos: .

    1583 | Nombre científico: Sclerurus albigularis. Nombres comunes: Tirahojas gargantigrís | Descripcion: Mide 17 cm y pesa
    38 grs. Es el Sclerurus más grande; muestra un contraste distintivo entre el gris de la garganta y el pecho rufo.  Los
    adultos muestran el pileo café oscuro con un leve escamado grueso negruzco. La espalda y las coberteras alares son café
    castaño oscuro que se torna café oscuro en las remeras y  castaño en la rabadilla y las coberteras supracaudales. La cola
    es negruzca y los lados de la cabeza son oliva grisáceo oscuro. El costado, los flancos y la región infracaudal son de
    color café castaño oscuro. La maxila es negra, la mandíbula es de color cuerno con la punta negruzca y las patas son negro
    cafecino.  Los ejemplares juveniles son similares pero con el pecho más opaco y oscuro y la garganta es más oscura, con
    un escamado fusco.. Ciclo anual: . Distribución regional: Se encuentra de Costa Rica hasta el norte de Bolivia, Guyanas,
    Trinidad y Tobago.. Fenología: . Usos: .

    210 | Nombre científico: Cyathea squarrosa.'
  - 'Pecíolo de aproximadamente 4 a 6 mm de largo, tomentoso cuando está joven.  Flores sésiles en espigas subcapitadas. Pedúnculo
    de 1.5 a 7 cm de largo. Los frutos son una drupa elipsoide, de 1 a 3 por 0.8 a 2.2 cm, con endocarpo de 5 surcos.. Ciclo
    anual: . Distribución regional: De Costa Rica a Bolivia y las Antillas.. Fenología: Las flores no han sido observadas
    hasta el momento. Los frutos se han recolectado entre setiembre y octubre.. Usos: .

    173 | Nombre científico: Cyathea microdonta. Nombres comunes: Rabo de mico, helecho arborescente. | Descripcion: Tronco
    1-5 m de alto, 5-8 cm de diámetro; hojas 1.2-1.7 m de largo; pecíolo pardo, espinoso, las espinas 3-8 mm; escamas del
    pecíolo 10-20 por 1.5-3 mm, angostamente lanceoladas, pardas, concoloras o con un leve margen más claro; caspilla ausente;
    lámina 2-pinnado-pinnatífida, el ápice gradualmente atenuado; raquis pardo a pardo claro, espinoso, las espinas 2-5 mm,
    glabro; pinnas pediculadas, el pedículo hasta 0.22-1.2 cm; pinnas medias 30-50 por 15-20 cm; costas pajizas a pardo claro,
    lisas o espinosas basalmente, las espinas 1-3 mm, glabras o puberulentas, los pelos 0.1-0.2 mm, pardo-amarillentos; pínnulas
    7-10 por 1.5-2.5 cm, sésiles; cóstulas glabras o puberulentas, los pelos 0.1-0.2 mm, pardo-amarillentos, las escamas escasas
    o ausentes, diminutas, aplanadas; segmentos de las pínnulas medias 17-25 pares, 1.5-2.5 mm de ancho, serrados a crenulados,
    obtusos; nervaduras 9-13 pares por segmento, 1-bifurcadas, glabras o pelosas; tejido laminar entre las nervaduras glabro;
    soros medios; paráfisos tan largos como los esporangios, conspicuos, pardo-amarillentos o blancos (en Panamá); indusio
    ausente.. Ciclo anual: . Distribución regional: México, Mesoamérica, Colombia, Venezuela, Ecuador, Perú, Bolivia, Brasil
    y Guyanas.. Fenología: . Usos: Sus raíces son utilizadas para el cultivo de orquídeas y la fabricación de artesanías..

    2099 | Nombre científico: Rhadinaea serperaster. Nombres comunes: Hojarasquera rayadaInglés: Striped littersnake | Descripcion:
    Como todos los miembros del género, esta especie es de serpientes pequeñas a medianas que difícilmente sobrepasan los
    300 mm de longitud total y cuya cola representa aproximadamente el 40 por ciento de esa longitud. Presenta de 11 más 2
    a 14 más 2 dientes maxilares que aumentan gradualmente en tamaño hacia la parte posterior de la boca; los últimos dos
    son un poco más grandes y separados del resto por un interespacio pequefio. Los dientes mandibulares son desiguales. El
    hemipene es simple, con varias espinas o ganchos proximales grandes, detrás de los cuales hay una zona de espinas. La
    porción distal del órgano tiene cálices que forman una estructura capitada. El sulcus spermaticus es bifurcado.  La cabeza
    apenas se distingue del cuello; el ojo es más bien pequeño con Ia pupila redonda; el cuerpo cilíndrico, con la cola medianamente
    larga.'
- source_sentence: Describa las características físicas y la distribución regional del murciélago Centronycteris centralis,
    incluyendo detalles sobre su pelaje y dimensiones.
  sentences:
  - 'Las orejas son casi desnudas y están unidas por una banda pequeña, que cruza la superficie de la cabeza. La cara está
    desnuda; la hoja nasal es pequeña y la herradura está completamente fusionada con el labio superior. La barbilla es acanalada
    y está bordeada por una hilera de diminutas verrugas. La cola es corta y mide menos de la mitad de la longitud del uropatagio.
    Los antebrazos están desnudos. Las alas son cortas y anchas, unidas a la pata cerca de la base de los dedos. Las patas  son
    desnudas y el calcáneo es más largo que la pata.. Ciclo anual: . Distribución regional: Desde Honduras hasta Bolivia,
    noreste de Argentina, Guyanas y este de Brasil. Se localizan en las tierras bajas hasta los 600 m.s.n.m.. Fenología: .
    Usos: .

    420 | Nombre científico: Aechmea angustifolia. Nombres comunes: Piñuela. epífita, parásita. | Descripcion: Epífita.Hojas  de
    19 a 68.5 cm. Láminas de 1.2 a 3.5 (hasta 4) cm, de agudas a acuminadas. Escapo de 22.5 a 58 (hasta 63) cm, erecto. Brácteas
    superiores más largas que los entrenudos, e inferiores más cortas, espinoso-serradas.Inflorescencias de 4.5 a 23.5 cm,
    unipinnadas (bipinnadas basalmente). Brácteas primarias espinoso-serradas distalmente. Espigas con 4 a 9 flores dísticas.
    Brácteas florales de 0.4 a 0.6 cm, más largas o de igual longitud que los entrenudos. Flores sésiles. Sépalos de 5 a 9
    mm, mucronados. Pétalos amarillos.Se reconoce por el tamaño de sus flores e inflorescencias.. Ciclo anual: . Distribución
    regional: Desde Nicaragua hasta Ecuador, Perú y Bolivia.. Fenología: Floración observada de enero a febrero, y en noviembre.
    Frutos observados de marzo a octubre.. Usos: .

    682 | Nombre científico: Centronycteris centralis. Nombres comunes: Murciélago | Descripcion: Longitud de la cabeza y
    cuerpo 49-59 mm, longitud de la cola 20-24 mm, longitud del pie 7-9 mm, longitud de la oreja 17-19 mm, longitud del antebrazo
    43-49 mm,  peso 5-6 g.Cuerpo de color amarillo sombreado o café parduzco; parte inferior de los cuartos traseros y el
    uropatagio de color café anaranjado; pelaje largo y espeso. Orejas largas en forma de hoz y punteadas. Piel de la cara
    rosada. Membranas negruzcas; uropatagio  largo y peludo en la base. Calcáneo largo; alas ligadas a las patas en la base
    de los dedos. No tiene sacos aéreos.. Ciclo anual: . Distribución regional: Desde México hasta Perú, Guyanas y Brasil,
    en tierras bajas solamente.. Fenología: . Usos: .

    1980 | Nombre científico: Ctenosaura quinquecarinata. Nombres comunes: Garrobo Inglés:  Spiny tail Iguana | Descripcion:
    Es una lagartija grande que alcanza los 350 mm. de H-C; las hembras son un poco más pequeñas.   En los adultos, la cola
    alcanza casi el doble del largo del resto del cuerpo.  La cabeza se distingue del cuello.  Los miembros son robustos y
    musculosos.  Las escamas de la región dorsal son pequeñas, apenas imbricadas y débilmente quilladas, excepto aquéllas
    que están en la parte dorsal de los miembros, que son más grandes y fuertemente quilladas.  Las escamas ventrales son
    lisas.'
  - 'La barbilla es grisácea y progresa hasta oliva fusco en el resto de la región inferior, la cual muestra barras angostas
