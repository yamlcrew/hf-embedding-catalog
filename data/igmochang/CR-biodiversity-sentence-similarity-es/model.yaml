      3462 | Nombre científico: Solanum chrysotrichum. Nombres comunes:  | Descripcion: Arbustos de hasta 3 m. de alto, escasamente
      armados; tallos tomentosos con tricomas multiangulados de pedículos largos y gruesos, con el brazo central a veces alargado
      y con acúleos cortos, rectos o incurvados de 2 a 5 mm. de largo. Hojas solitarias, ampliamente ovadas, hasta 40 cm.
      de largo, ápice agudo, base truncada o cordada, enteras o con lóbulos salientes, afelpadas, el tomento frecuentemente
      ferrugíneo, haz hirsuta con tricomas estrellados sésiles de brazos centrales largos, envés suavemente tomentoso con
      tricomas multiangulados de pedículos gruesos, los nervios principales a veces armados; pecíolos hasta 15 cm. de largo,
      tomentosos, a veces armados. Inflorescencias simples, cimosas, con pocas ramas, cada rama racemosa, con varias flores,
      laterales, pedúnculos ramificados una o más veces, los primarios obsoletos o hasta 1,5 cm. de largo, cerdoso-híspidos,
      pedicelos casi 5 mm. de largo, con tricomas de brazos centrales largos, inermes; cáliz casi 5 mm. de largo, tomentoso
      por fuera con tricomas multiangulados, lobulado 1/3 de su longitud, lóbulos angostamente triangulares; corola de 30
      a 50 mm. de diámetro, blanca, lobada 1/3 de su longitud, lóbulos ovados, pubescentes en el medio; anteras de 6 a 10
      mm.de largo. Fruto tipo baya globosa, de 1 a 1,5 cm. de diámetro, glabra, verde, pedicelos fructíferos gruesos, no alargados,
      erectos; semillas aplanadas, de 2,2 a 2,6 mm. de diámetro.. Ciclo anual: . Distribución regional: De México a Panamá..
      Fenología: Fértil durante todo el año.. Usos: .

      3243 | Nombre científico: Forchhammeria pallida. Nombres comunes: Siempreviva, aceituno blanco. | Descripcion: Árbol
      o arbusto de 4 a 10 m de altura. Ramitas glabras. Hojas simples, alternas, obovado-oblongas, de 2,5-10,4 por 0,8-2 cm,
      ápice redondeado, emarginado, obtuso o corto-mucronado, glabras y lustrosas.Inflorescencia en racimos axilares comprimidos,
      de 4 a 6 cm de largo.  Flores pardo crema muy pequeñas, bisexuales. Frutos tipo bayas, 2 cm de diámetro, esféricas,
      amarillo-anaranjado al madurar, rellenas con pulpa suave, no jugosa, de sabor desagradable.La madera es amarillo paja
      y densa y presenta una anatomía poco común, ya que posee floema incluido.DIAGNÓSTICO: Especie difícil de ubicar en esta
      familia. Se caracteriza por hojas pequeñas, obovadas, glabras y lustrosas.  Los árboles tienen una copa densa y redondeada.  Las
      plántulas y brinzales tienen hojas bastante lineares, que contrastan con las de los individuos adultos.. Ciclo anual:
      . Distribución regional: México. Fenología: Flores observadas en enero, marzo, noviembre y diciembre.'
