      durante todo el año.. Usos: .

      729 | Nombre científico: Dermanura azteca. Nombres comunes: Murciélago | Descripcion: Longitud de la cabeza y cuerpo
      59-75 mm, longitud de cola 0 mm, longitud del pie 11-14 mm, longitud de la oreja 15-20 mm, longitud del antebrazo 41-49
      mm,   peso 15-33 g..Es de tamaño mediano. La parte dorsal es de color café carbón hasta negruzco. La parte ventral es
      ligeramente más pálida y las puntas de los pelos están tenuemente escarchadas. El pelaje es largo (9-10 mm.) y blando.
      Las líneas faciales son estrechas y blancuzcas, claras o escarchadas. Las orejas y la hoja nasal son de color café oscuro.
      La herradura de la hoja nasal está totalmente libre. El uropatagio es muy pequeño (cerca de 6 mm.) en forma de V., su
      superficie dorsal es muy peluda y el borde está densamente franjeado. Las patas y pies son muy peludos.. Ciclo anual:
      . Distribución regional: Se distribuyen desde México hasta el oeste de Panamá. Se localizan entre los 600 y 3.000 m.s.n.m..
      Fenología: . Usos: .

      1226 | Nombre científico: Pelecanus occidentalis. Nombres comunes: Alcatraz, buchón, pelícano pardo | Descripcion: Mide
      109 cm. y pesa 3 kg. Es inconfundible; es el único pelícano común en nuestras costas.  Los adultos poseen un cuerpo
      café grisáceo oscuro. Las plumas de la parte superior presentan un lustre plateado. La cabeza y el cuello son blancos
      y el pico es parduzco. La bolsa y la piel de la cara son grisáceas y las patas son negras.  Durante la época reproductiva
      su cuello es principalmente negro. La cresta nucal es castaña. Presenta un tinte amarillo sobre la cabeza y la piel
      alrededor del ojo es rojiza. El pico ostenta un tinte rosáceo. En los especímenes inmaduros la cabeza, cuello y partes
      superiores son café y el abdomen es blanco. Alcanzan el plumaje definitivo de adulto después de 3 años.. Ciclo anual:
      Es una especie residente, aunque algunos individuos pueden ser migratorios neárticos.. Distribución regional: Se encuentra
      en la costa del Pacífico desde Washington hasta el norte de Perú; en las costas e islas del Atlántico, Golfo de México
      y en el Caribe, desde Carolina del Norte hasta el este de Venezuela.. Fenología: . Usos: .

      2900 | Nombre científico: Aulaxina quadrangula. Nombres comunes: Liquen.'
    - 'de largo. Lámina de 22 a 45 (-65) por (0.5-) 1 a 2 (-2.5) cm., de linear-elíptica a linear, atenuada en ambos extremos,
