      144 | Nombre científico: Croton ortholobus. Nombres comunes: Targuá. | Descripcion: Arbusto hasta 3 m de altura. Hojas
      elípticas, ovadas o lanceoladas de 3 a 10 cm de largo por 1.5 a 7 cm de ancho; pecíolos con 2 glándulas en el ápice,
      margen levemente aserrado. Inflorescencias bisexual, racemosa o espigada de 4 a 7 cm de largo. Frutos de 4 a 6 mm. de
      longitud.Se reconoce por sus hojas levemente aserradas con los pecíolos glandulares, por sus estípulas lineares y sus
