    Usos: La madera es pardo oscura, parecida a la de Tabebuia guayacan, muy pesada, muy dura de cortar, de alta resistencia
    mecánica y de larga durabilidad, aún bajo condiciones favorables de pudrición.Es una madera propia para usos externos,
    como postes, durmientes para ferrocarril, acabados de construcción civil, bolas de boliche. Asimismo, por su bella floración,
    ha sido  planta ornamental en los países en que se distribuye naturalmente. Como especie adaptada a sitios secos, es muy
    útil para preservavión y mejoramiento de áreas degradadas y de altas pendientes (Lorenzi, 1949)..

