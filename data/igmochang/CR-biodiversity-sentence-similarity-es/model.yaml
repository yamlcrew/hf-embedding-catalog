      y Bolivia. Se localizan sólo en tierras bajas.. Fenología: . Usos: .

      1583 | Nombre científico: Sclerurus albigularis. Nombres comunes: Tirahojas gargantigrís | Descripcion: Mide 17 cm y
      pesa 38 grs. Es el Sclerurus más grande; muestra un contraste distintivo entre el gris de la garganta y el pecho rufo.  Los
      adultos muestran el pileo café oscuro con un leve escamado grueso negruzco. La espalda y las coberteras alares son café
