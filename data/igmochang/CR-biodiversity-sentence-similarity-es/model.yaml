    sentences:
    - 'Usos: .

      3528 | Nombre científico: Physcia alba. Nombres comunes: Liquen | Descripcion: Talo folioso, ligeramente unido al sustrato,
      mide hasta 5 cm de diámetro; tiene lóbulos de planos a casi cóncavos, de 1,5 mm de ancho, pero generalmente más angostos,
      distintamente separados o algunas veces traslapados. La superficie superior es de gris blanquecina a amarillo tenue,
      sin gránulos de oxalato de calcio (pruina), ésta superficie reacciona ante el hidróxido de potasio tornándose amarillo
      (K+). No hay soredios, isidios ni máculas. Médula blanca. La superficie inferior es pálida y presenta rizinas. Los apotecios
      son abundantes, miden de 1 a 2 mm de diámetro; tiene un disco de color marrón sin gránulos de oxalato de calcio (pruina)..
      Ciclo anual: . Distribución regional: Desde el suroeste de Norteamérica hasta el noroeste de Suramérica.. Fenología:
      . Usos: .

      1210 | Nombre científico: Aythya affinis. Nombres comunes: Porrón menor | Descripcion: Mide 43 cm. y pesa 800 grs. La
      lista alar blanca es corta y diagnóstica; el iris es amarillo.  En el adulto macho la cabeza es negra con un lustre
      purpúreo y la coronilla notoriamente elevada. El pecho, las coberteras caudales y la cola son de color negro. El resto
      del plumaje del cuerpo es blanco, burdamente vermiculado con negro en el manto y los flancos. El pico es azulado claro
      con la punta negra.  La hembra es casi toda café opaco oscuro, con la cabeza más oscura. El manto y el costado presentan
      un escamado más claro y poco marcado. El parche blanco que rodea la base del pico es gris oscuro y el abdomen es blanco..
      Ciclo anual: Es una especie migratoria neártica (ver Distribución en Costa Rica). Asimismo. efectúa movimientos estacionales
      pronunciados, relacionados con cambios en el nivel del agua de su hábitat.. Distribución regional: Se reproduce desde
      la parte central de Alaska y de Canadá hasta el noroeste y la parte central de E.U.A. Invierna hasta el norte de Suramérica,
      Antillas y Hawaii.. Fenología: . Usos: Es una especie apreciada por los cazadores como cacería deportiva y también para
      aprovechar su carne..

      1586 | Nombre científico: Cymbilaimus lineatus. Nombres comunes: Batará lineado | Descripcion: Mide 18 cm. y pesa 41
      grs. Son de cuerpo grueso y cresta despelucada, y de pico muy robusto, fuertemente ganchudo; el plumaje luce un barreteado
      fino por encima y por debajo.  Los machos adultos son negros por encima, con un barreteado blanco muy angosto en todas
      partes excepto en la coronilla y la parte posterior del cuello. La región inferior presenta un barreteado fino y uniforme
      de color blanco y negro.  La hembra muestra la coronilla rufo castaño, y la frente y el resto de la región superior
      de color negro, con un barreteado ante grueso. Por debajo exhibe un ante más claro, especialmente en la garganta, y
      un barreteado negro abundante en los lados del pecho y menos denso en la garganta, centro del pecho y el abdomen. El
      iris es rojo, la maxila es negra, y la mandíbula y patas gris azulado pálido.  Los especímenes juveniles son semejantes
      a la hembra adulta, pero con un barreteado negro en la coronilla y marcas blancuzcas en el ala y la cola.'
    - 'La coloración del cuerpo es negra o parda muy oscura, de apariencia muy pulida y con un levísimo brillo verde, casi
      imperceptible en la mayoría de los especímenes.  Los especímenes del lado Pacífico de Costa Rica son de apariencia levemente
      más opaca que los del lado Atlántico.  En general el cuerpo muy liso dorsalmente y carente de setas.  El borde anterior
      de la cabeza tiene dos dientes relativamente juntos (ver figura abajo)  y el área dorsal de los ojos es bastante amplia
      en relación a las otras especies del género en Costa Rica (ver figura abajo) .  Las fóveas laterales del  pronoto son
      algo circulares pero no alargadas o en forma de surco.  El escutelo no es visible.  Cada élitro presenta 9 estrías poco
      visibles, incluyendo la supraepipleural.  Carece de carinas laterales en los élitros, fuera de las supraepipleurales.  El
      pigidio muestra una carina basal bien marcada.  Un dentículo ventral en el borde anterolateral del protórax está ausente
      (ver figura abajo) .  La carina proepimeral del protórax está presente y es completa (ver figura abajo) .  Las tibias
      anteriores muestran 3 dientes en el borde externo y el borde interno es recto (ver figura abajo) .  El espolón apical
      de estas tibias es bífido a diferencia del de las hembras que es simple (ver figura abajo) .  Los tarsos anteriores
      están presentes como en todas las especies del género (ver figura abajo) .  Las tibias medias y posteriores son delgadas,
      algo curvadas y escasamente expandidas hacia su extremo (ver figura abajo) .  El primer tarso de las patas posteriores
      es de longitud normal, no más largo que el segundo y de forma triangular (ver figura abajo) .  Ventralmente los fémures
      posteriores presentan una carina longitudinal cerca del borde anterior y otra carina cerca del borde posterior (ver
      figura abajo) . Diagnosis de la hembraEs semejante al macho excepto en que el espolón apical de las tibias anteriores
      es simple y no bífido (ver figura abajo) .  Además, el último segmento abdominal es más ancho medialmente que el del
      macho.. Ciclo anual: Se le ha colectado en todos los meses del año tanto en su área de distribución del lado atlántico
      como del pacífico.. Distribución regional: Se le encuentra además en Belice, Nicaragua, Panamá, Colombia, Brasil y Ecuador..
      Fenología: . Usos: .

      3283 | Nombre científico: Echinodorus bolivianus. Nombres comunes:  | Descripcion: Hierbas anuales, rizomatosas; las
      plantas fértiles son emergentes o, con mayor frecuencia, crecen varadas en riberas húmedas, hasta cerca de 30 cm de
      altura. Hojas sumergidas o emergentes; pecíolo de 1 a 7(25) cm de largo; lámina de 1,3 a 7(22) cm de largo, linear a
      linear-lanceolada, atenuada en la base, sin marcas pelúcidas. Inflorescencia con 1 ó 2(3) verticilos simples, cada uno
      con 4 a 11 flores; pedicelos de 0,8 a 3,5(5) cm de largo. Flores con sépalos de 2,8 a 4,3 mm de largo; (8)9 estambres;
      pistilos hasta cerca de 20. Cabeza frutal de 1,53 por 2,54 mm, similar a un anillo, encerrada totalmente por los sépalos;
      aquenios de 1 a 1,7 mm de largo, usualmente con 2 ó 3 costillas bien desarrolladas por cara (a veces ausentes).. Ciclo
      anual: . Distribución regional: De Estados Unidos al norte de Argentina; Trinidad y las Antillas.. Fenología: Flores
      entre enero y mayo.. Usos: .'
    - 'El cuerpo es cilíndrico con la cola medianamente larga.  La escamación cefálica comprende una rostral, dos internasales,
      dos prefrontales, una frontal, dos parietales, una loreal, una nasal, una preocular y dos postoculares; presenta  2-2
      6 2-3 temporales; 8 ó 9 supralabiales y 8 infralabiales; presenta dos pares de geneiales.  Tiene 19 hileras de escamas
      dorsales (la diferencia más importante con su congénere C. scytalina), con reducción, lisas y con fosetas apicales;
      las ventrales son redondeadas; Ia placa anal se presenta entera y las subcaudales están divididas.  La coloración es
      uniforme con o sin banda transversal cefálica (nucal).  Los juveniles tienen una coloración completamente diferente,
      que consiste en un color de fondo rojo en todo el cuerpo, una banda nucal amarilla o clara y la cabeza negra.. Ciclo
      anual: . Distribución regional: Desde Yucatán, México, hasta el norte de Argentina.. Fenología: . Usos: Su sistema inmunológico
      es capaz de soportar varios cc de veneno de Bothrops lo que la hace de potencial interés médico. Es una especie que
      sirve como controlador de serpientes venenosas vipéridas..

      2687 | Nombre científico: Euphoria candezei. Nombres comunes: Escarabajo de las frutas. | Descripcion: Cuerpo: de 17,5
      a 23,2 mm de longitud y de 9,2 a 12,2 mm de ancho.  La coloración dorsal y ventral del cuerpo, incluyendo el pigidio
      y las patas, es verde vidrioso, pero raramente aparecen individuos con tonalidad rojiza bastante llamativa.  El pronoto
      y los élitros son lisos, presentando puntuaciones poco llamativas en la parte superior, mientras que en la parte posterior
      de los élitros y pigidio se presentan rugosidades onduladas bastante características.  Se presentan sedas blanquecinas,
      especialmente evidentes en el área ventral. El borde anterior del clípeo presenta un par de dientes dirigidos hacia
      arriba y dorsalmente la cabeza es cóncava en el área correspondiente a la frente y el clípeo, con una muy leve elevación
      longitudinal en la parte central.  Las antenas de los machos presentan una maza antenal más voluminosa que la de las
      hembras.  El pronoto presenta una carina lateral bien marcada y completa, y el borde posterior presenta una escotadura
      correspondiente al borde anterior del escutelo, el cual  es grande y está expuesto.  Las tibias anteriores presentan
      tres dientes externos evidentes.  Las tibias anteriores de los machos tienden a ser más estilizadas que las de las hembras.  Los
      fémures medios y posteriores presentan  ventralmente una carina longitudinal claramente definida cerca del borde posterior
      y de la cual sale una hilera de sedas.  Las tibias medias y posteriores presentan una evidente hilera de sedas muy juntas
      y relativamente largas en el borde interno dorsal.  Las coxas medias están bien separadas por el tubérculo mesosternal,
      el cual es relativamente ancho y de forma pentagonal en vista ventral (fig ). Propleura con una quilla pronunciada cercana
      y paralela a la sutura que la separa del preproesterno. Diferenciación de sexos:  Los machos presentan antenas con maza
      más voluminosa que las hembras (figs ) y el abdomen de ellos, vista de perfil, tiende a ser cóncavo, mientras que el
      de las hembras tiende a ser más recto o convexo.  Además las tibias anteriores de los machos tienden a ser más estilizadas
      que las de las hembras.. Ciclo anual: . Distribución regional: Especie de distribución amplia hacia el norte, mientras
      que en el sur sólo ha sido hallada en Panamá.'
