      3017 | Nombre científico: Gymnosporia haberiana. Nombres comunes:  | Descripcion: Árbol de 5 a 30 m de altura; ramitas
      de verde pálido a verde amarillento; estípulas diminutas, rojizas. Hojas simples, alternas, de 8-12 por 4-6 cm, elípticas,
      ápice de acuminado a agudo, glabras, borde entero.Inflorescencias en cimas, axilares, hasta con 20 flores. Flores verdosas,
      de 4,5 a 7 mm de ancho. Frutos tipo cápsulas, de 1 por 1-1,5 cm, amarillentas, globosas, con 2 a 4 lóbulos; semillas
      pardas, con arilo blanco.Se caracteriza por las hojas, que al secarse adquieren un tono verde amarillento, con la base
      generalmente redondeada y el borde levemente revoluto. Sus rasgos taxonómicos recuerdan al género Maytenus, del cual
      es difícil separarlo. Cuando se raspa la corteza del tronco, de las ramitas o de las raíces, la epidermis es amarillenta
      o amarillo encendido, como en la mayoría de las especies de esta familia. En G. haberiana esta característica a veces
      se nota directamente en la base del tronco sin haberse raspado la corteza.. Ciclo anual: . Distribución regional: México
      (Estación Biológica Los Tuxtlas, Veracruz).. Fenología: Flores observadas en febrero y julio. Frutos entre enero y marzo
      y en diciembre.. Usos: .

      321 | Nombre científico: Vriesea marnier-lapostollei. Nombres comunes: Piñuela, epífita, parásita. | Descripcion: Epífitas.Hojas
