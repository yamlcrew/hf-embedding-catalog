      son negro cafecino.  Los ejemplares juveniles son similares pero con el pecho más opaco y oscuro y la garganta es más
      oscura, con un escamado fusco.. Ciclo anual: . Distribución regional: Se encuentra de Costa Rica hasta el norte de Bolivia,
      Guyanas, Trinidad y Tobago.. Fenología: . Usos: .

      210 | Nombre científico: Cyathea squarrosa.'
    - 'Pecíolo de aproximadamente 4 a 6 mm de largo, tomentoso cuando está joven.  Flores sésiles en espigas subcapitadas.
      Pedúnculo de 1.5 a 7 cm de largo. Los frutos son una drupa elipsoide, de 1 a 3 por 0.8 a 2.2 cm, con endocarpo de 5
      surcos.. Ciclo anual: . Distribución regional: De Costa Rica a Bolivia y las Antillas.. Fenología: Las flores no han
      sido observadas hasta el momento. Los frutos se han recolectado entre setiembre y octubre.. Usos: .

      173 | Nombre científico: Cyathea microdonta. Nombres comunes: Rabo de mico, helecho arborescente. | Descripcion: Tronco
      1-5 m de alto, 5-8 cm de diámetro; hojas 1.2-1.7 m de largo; pecíolo pardo, espinoso, las espinas 3-8 mm; escamas del
      pecíolo 10-20 por 1.5-3 mm, angostamente lanceoladas, pardas, concoloras o con un leve margen más claro; caspilla ausente;
      lámina 2-pinnado-pinnatífida, el ápice gradualmente atenuado; raquis pardo a pardo claro, espinoso, las espinas 2-5
      mm, glabro; pinnas pediculadas, el pedículo hasta 0.22-1.2 cm; pinnas medias 30-50 por 15-20 cm; costas pajizas a pardo
      claro, lisas o espinosas basalmente, las espinas 1-3 mm, glabras o puberulentas, los pelos 0.1-0.2 mm, pardo-amarillentos;
      pínnulas 7-10 por 1.5-2.5 cm, sésiles; cóstulas glabras o puberulentas, los pelos 0.1-0.2 mm, pardo-amarillentos, las
      escamas escasas o ausentes, diminutas, aplanadas; segmentos de las pínnulas medias 17-25 pares, 1.5-2.5 mm de ancho,
      serrados a crenulados, obtusos; nervaduras 9-13 pares por segmento, 1-bifurcadas, glabras o pelosas; tejido laminar
      entre las nervaduras glabro; soros medios; paráfisos tan largos como los esporangios, conspicuos, pardo-amarillentos
      o blancos (en Panamá); indusio ausente.. Ciclo anual: . Distribución regional: México, Mesoamérica, Colombia, Venezuela,
      Ecuador, Perú, Bolivia, Brasil y Guyanas.. Fenología: . Usos: Sus raíces son utilizadas para el cultivo de orquídeas
      y la fabricación de artesanías..

      2099 | Nombre científico: Rhadinaea serperaster. Nombres comunes: Hojarasquera rayadaInglés: Striped littersnake | Descripcion:
      Como todos los miembros del género, esta especie es de serpientes pequeñas a medianas que difícilmente sobrepasan los
      300 mm de longitud total y cuya cola representa aproximadamente el 40 por ciento de esa longitud. Presenta de 11 más
      2 a 14 más 2 dientes maxilares que aumentan gradualmente en tamaño hacia la parte posterior de la boca; los últimos
      dos son un poco más grandes y separados del resto por un interespacio pequefio. Los dientes mandibulares son desiguales.
      El hemipene es simple, con varias espinas o ganchos proximales grandes, detrás de los cuales hay una zona de espinas.
      La porción distal del órgano tiene cálices que forman una estructura capitada. El sulcus spermaticus es bifurcado.  La
      cabeza apenas se distingue del cuello; el ojo es más bien pequeño con Ia pupila redonda; el cuerpo cilíndrico, con la
      cola medianamente larga.'
  - source_sentence: Describa las características físicas y la distribución regional del murciélago Centronycteris centralis,
      incluyendo detalles sobre su pelaje y dimensiones.
    sentences:
    - 'Las orejas son casi desnudas y están unidas por una banda pequeña, que cruza la superficie de la cabeza. La cara está
      desnuda; la hoja nasal es pequeña y la herradura está completamente fusionada con el labio superior. La barbilla es
      acanalada y está bordeada por una hilera de diminutas verrugas. La cola es corta y mide menos de la mitad de la longitud
      del uropatagio. Los antebrazos están desnudos. Las alas son cortas y anchas, unidas a la pata cerca de la base de los
      dedos. Las patas  son desnudas y el calcáneo es más largo que la pata.. Ciclo anual: . Distribución regional: Desde
      Honduras hasta Bolivia, noreste de Argentina, Guyanas y este de Brasil. Se localizan en las tierras bajas hasta los
      600 m.s.n.m.. Fenología: . Usos: .

      420 | Nombre científico: Aechmea angustifolia. Nombres comunes: Piñuela. epífita, parásita. | Descripcion: Epífita.Hojas  de
      19 a 68.5 cm. Láminas de 1.2 a 3.5 (hasta 4) cm, de agudas a acuminadas. Escapo de 22.5 a 58 (hasta 63) cm, erecto.
      Brácteas superiores más largas que los entrenudos, e inferiores más cortas, espinoso-serradas.Inflorescencias de 4.5
      a 23.5 cm, unipinnadas (bipinnadas basalmente). Brácteas primarias espinoso-serradas distalmente. Espigas con 4 a 9
      flores dísticas. Brácteas florales de 0.4 a 0.6 cm, más largas o de igual longitud que los entrenudos. Flores sésiles.
      Sépalos de 5 a 9 mm, mucronados. Pétalos amarillos.Se reconoce por el tamaño de sus flores e inflorescencias.. Ciclo
      anual: . Distribución regional: Desde Nicaragua hasta Ecuador, Perú y Bolivia.. Fenología: Floración observada de enero
      a febrero, y en noviembre. Frutos observados de marzo a octubre.. Usos: .

      682 | Nombre científico: Centronycteris centralis. Nombres comunes: Murciélago | Descripcion: Longitud de la cabeza
      y cuerpo 49-59 mm, longitud de la cola 20-24 mm, longitud del pie 7-9 mm, longitud de la oreja 17-19 mm, longitud del
      antebrazo 43-49 mm,  peso 5-6 g.Cuerpo de color amarillo sombreado o café parduzco; parte inferior de los cuartos traseros
      y el uropatagio de color café anaranjado; pelaje largo y espeso. Orejas largas en forma de hoz y punteadas. Piel de
      la cara rosada. Membranas negruzcas; uropatagio  largo y peludo en la base. Calcáneo largo; alas ligadas a las patas
      en la base de los dedos. No tiene sacos aéreos.. Ciclo anual: . Distribución regional: Desde México hasta Perú, Guyanas
      y Brasil, en tierras bajas solamente.. Fenología: . Usos: .

      1980 | Nombre científico: Ctenosaura quinquecarinata. Nombres comunes: Garrobo Inglés:  Spiny tail Iguana | Descripcion:
      Es una lagartija grande que alcanza los 350 mm. de H-C; las hembras son un poco más pequeñas.   En los adultos, la cola
      alcanza casi el doble del largo del resto del cuerpo.  La cabeza se distingue del cuello.  Los miembros son robustos
      y musculosos.  Las escamas de la región dorsal son pequeñas, apenas imbricadas y débilmente quilladas, excepto aquéllas
      que están en la parte dorsal de los miembros, que son más grandes y fuertemente quilladas.  Las escamas ventrales son
      lisas.'
    - 'La barbilla es grisácea y progresa hasta oliva fusco en el resto de la región inferior, la cual muestra barras angostas
      anteadas en la región anterior y barras más gruesas de color blanco opaco en la parte posterior. Su pico es fusco, la
      base de la mandíbula gris claro y las patas de color gris opaco.  La hembra exhibe la coronilla y la parte trasera del
      cuello café negruzco, con la punta de las plumas café más claro y no rojo.  Los ejemplares juveniles son semejantes
      a los adultos del mismo sexo pero más opacos por encima, sin tinte amarillo ni anaranjado. Las marcas amarillas de la
      cabeza y la nuca son verdosas y más difusas. La coronilla del macho presenta un listado rojo más pálido y difuso y el
      barreteado de la región inferior más grueso y no tan bien definido. Las rectrices externas muestran un barreteado café
      opaco.. Ciclo anual: . Distribución regional: Se encuentra desde Costa Rica hasta el oeste de Ecuador y en Trinidad
      y Tobago.. Fenología: . Usos: .

      1255 | Nombre científico: Tyrannus tyrannus. Nombres comunes: Tirano norteño | Descripcion: Mide 19 cm. y pesa 40 grs.
      Es blanco y negruzco, con la punta de la cola blanca conspicua; los últimos 10 mm. de la segunda primaria más externas
      se muestran adelgazados en los machos; en las hembras el adelgazamiento es menos profundo y abarca sólo de 5 a 8 mm.   Los
      adultos presentan la parte superior y lados de la cabeza de color negro opaco, con una mancha bermellón oculta en la
      coronilla (más pequeña en las hembras), y la espalda y la rabadilla de color pizarra negruzco. La cola es negra con
      la lista blanca terminal gruesa, y las coberteras alares y secundarias con el borde entre blanco y gris claro. Presentan
      blanco por debajo y un fuerte tinte gris en el pecho. El pico y las patas son negros.  Los ejemplares inmaduros son
      más claros y opacos por encima y más parduzcos, sin el parche de la coronilla ni el adelgazamiento en las primarias
      externas.  En el otoño a menudo muestran una apariencia manchada debido a la muda postjuvenil incompleta, precedente
      a la migración.. Ciclo anual: Es una especie migratoria neártica (ver Distribución en Costa Rica).. Distribución regional:
      Se reproduce desde el norte, parte central y sureste de Canadá hasta el sur y la parte central y sureste de E.U.A. Invierna
      desde Colombia hasta el norte de Chile y de Argentina.. Fenología: . Usos: .

      26 | Nombre científico: Spathodea campanulata. Nombres comunes: Llama del bosque. | Descripcion: Árbol hasta de 25 m
      por 40 cm medido a la altura del pecho (DAP); fuste generalmente corto, grisáceo y copa redondeada.  Hojas imparipinanadas,
      usualmente de 9--15 folíolos más o menos elípticos, agudos a acuminados, base asimétrica a subtruncada, subsésiles.
      Inflorescencia, racimo terminal.  Flores con el cáliz espatáceo de 4--5--5 cm de largo; corola rojo naranja con el borde
      amarillo, anchamente campanulada y la base cilíndrica de 8.5--9 por 4.5--5 cm, tubo de 6--6.5 cm de largo.  Fruto cápsula
      oblongo elíptica, dehiscente por un lado, valvas en forma de bote, angosta en los extremos de 17--25 por 3.5--7 cm;
      semillas delgadas, aladas.. Ciclo anual: .'
    - 'Soralios comunes, granulares, sub-marginales. Isidios y pústulas ausentes. Apotecios raramente observados.. Ciclo anual:
      . Distribución regional: Pantropical y extendiéndose a regiones templadas adyacentes. Fenología: . Usos: .

      25 | Nombre científico: Tabebuia ochracea. Nombres comunes: Cortez amarillo, corteza amarilla.Piuvá, tarumá (Brasil).
      | Descripcion: Árbol hasta de 25 m y 50 cm medido a la altura del pecho (DAP), fuste de corteza con surcos poco profundos
      y separados; ramas jóvenes pubescentes. Hojas digitadas, con 5 folíolos, de aserrados a enteros, membranáceos, pubescentes
      y glauco-amarillentas en el envés, oblongo-obovados a oblongo-elípticos, abruptamente acuminados, base obtusa a truncada,
      folíolo terminal de 5--22 por 1.8--14.4 cm, pares intermedios de 4.2--19.8 por 1.4--13.2 cm, pubescencia estrellada
      ferrugíneo-amarillenta en ambas superficies, pecíolo de 6--18 cm de largo lanoso pubescente, peciolulos de 0.2--5.8
      cm de largo. Inflorescencia, panícula terminal pubescente.  Flores con dulce fragancia, cáliz campanulado con 5 lóbulos
      con gran cantidad de pubescencia lanosa, amarillenta, corola tubular, amarilla con líneas rojizas en el cuello, el tubo
      usualmente parduzco de 4--8.3 cm de largo.  El fruto es una cápsula linear cilíndrica delgada en los extremos de 11--35
      por 1--1.8 cm, lanoso pubescente, semillas 0.4--0.8 por 1.8--2.9 cm, aladas.Es la especie  más común dentro del género.
      Se reconoce por poseer hojas sólo con 5 folíolos con densa pubescencia estrellada principalmente en el envés, así como
      en pecíolos y ramas jóvenes, el envés además glauco amarillento.. Ciclo anual: . Distribución regional: Centroamérica
      (Honduras y Guatemala), al Norte de Suramérica, Brasil yTrinidad.. Fenología: Flores observadas de enero a junio. Produce
      anualmente una gran cantidad de plántulas.. Usos: La madera es pardo oscura, parecida a la de Tabebuia guayacan, muy
      pesada, muy dura de cortar, de alta resistencia mecánica y de larga durabilidad, aún bajo condiciones favorables de
      pudrición.Es una madera propia para usos externos, como postes, durmientes para ferrocarril, acabados de construcción
      civil, bolas de boliche. Asimismo, por su bella floración, ha sido  planta ornamental en los países en que se distribuye
      naturalmente. Como especie adaptada a sitios secos, es muy útil para preservavión y mejoramiento de áreas degradadas
      y de altas pendientes (Lorenzi, 1949)..

      2608 | Nombre científico: Tabanus unistriatus. Nombres comunes: Tabanos | Descripcion: Hind tibiae without apical spurs;
