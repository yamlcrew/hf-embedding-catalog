      1746 | Nombre científico: Vireo philadelphicus. Nombres comunes: Vireo amarillento | Descripcion: Mide 11.5 cm. y pesa
      11.5 grs. Es un Vireo pequeño sin marcas alares, de coloración algo parecida a la de Vermivora peregrina (con la cual
      se asocia con frecuencia), pero con la cabeza relativamente más grande y redondeada, el pico más grueso, las listas
      faciales más anchas y las coberteras infracaudales amarillas.  En adultos el píleo es gris, con un tinte oliva. El resto
      de la región superior es verde oliva grisáceo. La ceja y el área bajo el ojo son de color blanco, separadas mediante
      una lista ocular fusca. Las mejillas están teñidas de oliva. La región inferior varía entre principalmente amarilla
      bastante brillante, con garganta y abdomen más pálidos, y principalmente blancuzca, con amarillo bien definido solo
      en el pecho y en las coberteras infracaudales. La maxila es de color cuerno fusco y la mandíbula de color cuerno más
      pálido. Las patas son grises. Los individuos inmaduros son muy parecidos a los adultos, pero en ocasiones presentan
      algunas coberteras alares mayores, más cortas, opacas, con la punta pálida, retenidas del plumaje juvenil.. Ciclo anual:
      Es una especie migratoria neártica (ver Distribución en Costa Rica).. Distribución regional: Se reproduce en Canadá
      y el extremo norte de E.U.A. Invierna desde la Península de Yucatán y Guatemala hasta la parte central de Panamá y en
      raras ocasiones hasta el norte de Guatemala.. Fenología: . Usos: .

      1446 | Nombre científico: Onychoprion anaethetus. Nombres comunes: Charrán embridado | Descripcion: Mide 36 cm. y pesa
      100 grs. Es de tamaño mediano, con la espalda oscura y la cola profundamente ahorquillada; se distingue de Sterna fuscata
      por el collar nucal claro y la mancha blanca delgada en la frente, que se extiende para formar una lista superciliar
      corta.  Durante la época de cría los adultos presentan la coronilla y la lista loreal negras, el collar nucal gris claro
      y el resto de la región superior gris parduzco oscuro. Toda la región inferior y las rectrices externas son blancas,
      con un tinte gris en el pecho y el costado. El pico y las patas son negras.  Fuera de la época de cría (que se ve en
      raras ocasiones en Costa Rica), la coronilla es eminentemente blanca con listas negras en la parte posterior.'
  - source_sentence: ¿Cuáles son las características distintivas del plumaje del Mosquero de agua, tanto en adultos como en
      juveniles?
    sentences:
    - 'Nombres comunes: Mosquero de agua | Descripcion: Mide 15.5 cm. y pesa 21 grs. Es negruzco, de tamaño mediano, y en
      raras ocasiones se encuentra lejos del agua.  Los adultos muestran la cabeza, cuello y la mayor parte de la región inferior
      entre negro opaco y negro pizarra y el centro del abdomen blanco. Los flancos y las coberteras infracaudales son gris
      tiznado y el resto de la región superior es pizarra negruzco. Presentan 2 barras alares grises y las secundarias y terciales
      con un borde grisáceo. La cola es negruzca, con el vexilo externo de las timoneras más externas bordeado de blanco,
      y el pico y las patas son negruzcas.  Los especímenes juveniles presentan el plumaje sobre todo negro parduzco apagado,
      el abdomen y las barras alares entre café canela opaco y café anteado y las plumas de la espalda y la rabadilla con
      flecos café pálido.. Ciclo anual: Efectúan migraciones altitudinales.. Distribución regional: Se encuentran desde el
      suroeste de E.U.A. hasta el noroeste de Argentina.. Fenología: . Usos: .

      1029 | Nombre científico: Cheilanthes brachypus. Nombres comunes:  | Descripcion: Helechos terrestres o epipétricos.  Rizoma
      cortamente ascendente, compacto, con escamas de 8 a 15 por 0,1 a 0,3 mm, lineares, pardo-amarillentas a pardo-rojizas,
      concoloras a ligeramente bicoloras, enteras o con el margen dispersamente dentado.Frondas de 10 a 35 cm de largo. Pecíolo
      de 1 a 5 cm de largo, de 1/8 a 1/5 del tamaño de la fronda, pardo oscuro, cilíndrico, densamente escamoso y peloso.
      Escamas de 1 a 5 por 0,5 a 1 mm, lanceoladas a lineares, pardas a pardo-rojizas, los tricomas de 1 a 2 mm, blanquecinos,
      tortuosos. Lámina de 8 a 30 por 2,5 a 5 cm, oblanceolada, 1 pinnado-pinnatífida. El haz densamente peloso, los tricomas
      de casi 1 mm, hialinos, laxamente patentes; el envés densamente escamoso y peloso (la superficie no visible), los tricomas
      y escamas anaranjado-rojizos.  Pinnas de 10 a 21 pares, de 1,2 a 2,5 por 0,6 a 1,3 cm, equiláteras, deltadas a lanceoladas.
      Raquis negro, oculto por una densa cubierta de tricomas y escamas. Nervaduras ocultas, no visibles. Indusio reflexo,
      escarioso, entero, o decurrente.Cheilanthes brachypus se caracteriza por la lámina 1 pinnado-pinnatífida, oblanceolada,
      densamente escamosa en el envés.  En Mesoamérica, esta especie y C. bonariensis son las únicas especies de Cheilanthes
      con láminas 1 pinnado-pinnatífidas.. Ciclo anual: . Distribución regional: México y Mesoamérica.. Fenología: . Usos:
      .

