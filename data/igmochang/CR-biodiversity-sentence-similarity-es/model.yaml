    - 'de largo, ápice agudo o acuminado, base obtusa o redondeada, enteras, a veces afelpadas, haz con dispersos tricomas
      porrectos subsésiles, envés suavemente tomentoso con tricomas multiangulados pediculados, los nervios principales a
      veces armados; pecíolos hasta 3 cm. de largo, tomentosos, mayormente armados. Inflorescencias en racimos amontonados
      con 4 a 12 flores laterales  tomentosos con tricomas estrellados sésiles y cortamente pedicelados, inermes (o menuda
      e inconspicuamente armados), pedúnculo hasta 1 cm. de largo, a veces bifurcado, pedicelos hasta 10 mm. de largo; cáliz
      casi 3 mm. de largo, lobulado hasta cerca de la mitad de su longitud, lóbulos angostos, los senos redondeados y tomentosos
      con tricomas multiangulados; corola 15 mm. de diámetro, blanca o azulada por fuera, profundamente lobulada, lóbulos
      angostos, por fuera pubescentes, más así distalmente; anteras 5 mm. de largo. Fruto tipo baya globosa, de 0,8 s 1 cm.
      de diámetro, glabra, anaranjada, lustrosa cuando madura, pedicelos fructíferos algo acrescentes, delgados pero expandidos
      distalmente, erectos; semillas aplanadas, casi 3 mm. de diámetro.. Ciclo anual: . Distribución regional: Desde México
      a Panamá y en Ecuador.. Fenología: Fértil desde mayo hasta setiembre.. Usos: .

      3284 | Nombre científico: Sagittaria lancifolia. Nombres comunes:  | Descripcion: Hierbas perennes, emergentes, provenientes
      de rizomas, monoicas. Hojas distintamente dísticas, erectas, con pecíolo de hasta cerca de 100 cm de largo, lámina de
      835(50) por (0,4)415(21) cm, de linear a ovada o elíptica, atenuada en la base.Inflorescencia bisexual, emergente, con
