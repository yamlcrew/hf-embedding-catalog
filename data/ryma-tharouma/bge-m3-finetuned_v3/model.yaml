      L''alignement de paragraphe gère le texte (gauche, centré, droit, justifié). L''alignement des objets gère les images,
      formes et zones de texte.'
  - source_sentence: comment activer le suivi temps réel des véhicules sur une carte ?
    sentences:
    - "Consulter les trajets historiques d'un véhicule  Véhicules > Suivi temps réel > Historique des trajets\nLe module d'historique\
      \ des trajets permet de rejouer les déplacements passés d'un véhicule équipé d'un boîtier télématique.\n\n1. Depuis\
      \ le menu « Véhicules » > « Suivi temps réel », cliquez sur l'onglet « Historique des trajets ».\n2. Sélectionnez le\
      \ véhicule dans la liste déroulante.\n3. Définissez la période d'historique : date de début et fin avec heure.\n4. Cliquez\
      \ sur « Charger les trajets ». La liste des trajets s'affiche.\n5. Cliquez sur un trajet pour le rejouer sur la carte\
      \ : l'itinéraire suivi est tracé en bleu, la vitesse à chaque point est affichée au survol.\n6. Exportez l'historique\
      \ via « Exporter les trajets » en CSV ou PDF.\n\n Note : l'historique est conservé selon la politique de rétention configurée\
      \ (par défaut 12 mois)."
    - "Activer et configurer le suivi temps réel des véhicules  Véhicules > Suivi temps réel > Configuration\nLe suivi temps\
      \ réel permet de visualiser la position des véhicules sur une carte interactive. Il nécessite que les véhicules soient\
      \ équipés d'un boîtier télématique compatible.\n\nPrérequis : les véhicules doivent être équipés de boîtiers télématiques\
      \ compatibles avec l'API de l'application. L'intégration télématique doit être configurée dans « Paramètres » > « Intégrations\
      \ » > « Télématique ».\n\nActivation par véhicule :\n1. Ouvrez la fiche du véhicule > onglet « Télématique ».\n2. Cliquez\
      \ sur « Associer un boîtier ».\n3. Saisissez l'identifiant du boîtier (numéro IMEI ou identifiant fournisseur).\n4.\
      \ Sélectionnez le fournisseur télématique dans la liste.\n5. Cliquez sur « Tester la connexion » pour vérifier que le\
      \ boîtier répond.\n6. Cliquez sur « Enregistrer ».\n\nAccès à la carte de suivi :\n1. Depuis le menu principal, cliquez\
      \ sur « Suivi temps réel ».\n2. La carte affiche la position des véhicules actifs.\n3. Cliquez sur une icône de véhicule\
      \ pour voir ses informations détaillées.\n4. Utilisez les filtres « Site », « Groupe » ou « Statut mission » pour afficher\
      \ un sous-ensemble de la flotte.\n\n Avertissement RGPD : le suivi télématique est soumis à des obligations légales.\
      \ Les chauffeurs doivent être informés par écrit de ce dispositif de géolocalisation."
    - "Limiter la visibilité des missions futures sur l'application mobile des chauffeurs  Paramètres > Application mobile\
      \ > Horizon de visibilité des missions\nIl est possible de limiter le nombre de jours à l'avance pendant lesquels un\
      \ chauffeur peut voir ses missions planifiées.\n\n1. Accédez à « Paramètres » > « Application mobile » > « Affichage\
      \ des missions ».\n2. Dans le champ « Horizon de visibilité » (ou « Missions affichées à l'avance »), saisissez le nombre\
      \ de jours : 7.\n3. Définissez également l'historique visible en arrière : ex. 30 jours pour que le chauffeur voit aussi\
      \ ses missions passées récentes.\n4. Configurez les exceptions :\n   - Missions urgentes : toujours visibles quelle\
      \ que soit la date\n   - Missions en cours : toujours visibles\n5. Cliquez sur « Enregistrer ».\n\n**Effets de cette\
      \ configuration :**\n- Sur l'application mobile, le chauffeur ne voit dans sa liste que les missions planifiées dans\
      \ les 7 prochains jours.\n- Les missions plus lointaines existent dans le système mais ne s'affichent sur le mobile\
      \ qu'au fur et à mesure que la date approche.\n- Cette configuration réduit la surcharge d'information pour le chauffeur.\n\
      \n**Limites :**\n- Le chauffeur ne peut pas anticiper et préparer des missions lointaines.\n- Des missions mal planifiées\
      \ à une date erronée (trop loin) peuvent sembler absentes.\n\n**Configuration individuelle par chauffeur :**\nSi certains\
      \ chauffeurs (ex. : coordinateurs) ont besoin d'un horizon plus large, configurez leur accès individuellement via la\
      \ fiche chauffeur > onglet Compte mobile > « Horizon de visibilité personnalisé ».\n\n Cette configuration s'applique\
      \ uniquement à l'application mobile. Depuis le back-office, toutes les missions restent visibles sans restriction d'horizon."
  - source_sentence: comment paramétrer les règles de reclassement des offres après exclusion
    sentences:
    - "Gérer le reclassement des offres après exclusion du candidat initialement premier\nChemin : Achats > Appels d'offres\
      \ > Dossier > Analyse des offres > Reclassement\n1. Lorsque le candidat classé premier est exclu (offre irrégulière,\
      \ vérification des justificatifs révélant une interdiction de soumissionner, retrait de l'offre), accéder à l'onglet\
      \ Classement des offres > Reclassement.\n2. Vérifier que le candidat classé second a encore une offre en cours de validité.\
      \ Si son délai de validité est expiré, le contacter pour confirmation de maintien.\n3. Présenter le reclassement à la\
      \ commission ou au responsable acheteur : le candidat classé second devient le nouveau premier. Aucune modification\
      \ de son offre n'est possible.\n4. Vérifier les pièces justificatives du nouveau premier candidat avant notification.\n\
      5. Documenter le reclassement dans le rapport d'analyse : motif d'exclusion du premier candidat, date du reclassement,\
      \ identité du nouveau premier.\n6. Notifier l'attribution au nouveau titulaire dans les mêmes conditions que si il avait\
      \ été premier dès l'origine.\n Le reclassement après exclusion ne permet pas de rouvrir la négociation avec les autres\
      \ candidats ni de modifier leur offre. L'analyse se poursuit avec les offres telles qu'elles ont été remises. Si toutes\
      \ les offres sont exclues, la procédure est infructueuse."
    - "Champ Référence assureur dans le dossier sinistre  Sinistres > Fiche sinistre > Informations assureur\nLe champ « Référence\
      \ assureur » est un identifiant attribué par la compagnie d'assurance à votre dossier sinistre. Il est distinct du numéro\
      \ de dossier interne généré automatiquement par l'application.\n\n**Quand ce champ se remplit :**\nCe champ ne se remplit\
      \ PAS automatiquement. Il doit être saisi manuellement par le gestionnaire lorsque l'assureur lui communique la référence\
      \ de son dossier sinistre. Cette communication intervient généralement :\n- Par e-mail de confirmation de l'assureur\
      \ après réception de la déclaration\n- Par courrier ou par téléphone lors de la prise en charge du dossier\n- Via l'espace\
      \ client en ligne de la compagnie d'assurance\n\n**Comment renseigner ce champ :**\n1. Ouvrez la fiche du dossier sinistre\
      \ concerné.\n2. Cliquez sur l'onglet « Informations assureur ».\n3. Cliquez sur « Modifier ».\n4. Saisissez la référence\
      \ dans le champ « Référence assureur » (format alphanumérique, variable selon les assureurs).\n5. Cliquez sur « Enregistrer\
      \ ».\n\n**Utilité de ce champ :**\n- Il facilite les échanges téléphoniques avec l'assureur : en citant cette référence,\
      \ l'interlocuteur retrouve immédiatement le dossier.\n- Il est inclus dans les exports et rapports de sinistres pour\
      \ les réconciliations comptables.\n- Si votre assureur utilise un connecteur EDI avec l'application, la référence peut\
      \ être renseignée automatiquement lors de la réponse électronique de l'assureur.\n\n Ne confondez pas la « Référence\
      \ assureur » (attribuée par l'assureur) avec le « Numéro de dossier interne » (généré automatiquement par l'application\
      \ à la soumission de la déclaration)."
    - "Gérer la substitution d'un fournisseur en cas de défaillance de livraison\nChemin : Achats > Bons de commande > Substitution\
      \ fournisseur > Urgence\n1. En cas de défaillance du fournisseur titulaire de la commande, identifier un fournisseur\
      \ de substitution dans le référentiel.\n2. Passer une commande d'urgence au fournisseur de substitution.\n3. Facturer\
      \ les surcoûts éventuels au fournisseur défaillant selon les conditions du contrat.\n La substitution d'un fournisseur\
      \ défaillant dans une commande courante est une décision de gestion logistique visant à assurer la continuité de l'approvisionnement.\
      \ Le reclassement après exclusion dans un appel d'offres est une étape procédurale formelle résultant de l'application\
      \ des règles de la commande publique. Ces deux situations impliquent de désigner un fournisseur alternatif mais selon\
      \ des procédures et des cadres légaux entièrement différents."
  - source_sentence: je dois créer un rapport de performance commerciale consolidé pour la direction
    sentences:
    - 'Générer le rapport de gestion financière mensuel pour la direction

      Chemin : Finance > Reporting > Rapport de gestion mensuel

      1. Depuis Finance > Reporting, générer le rapport de gestion mensuel incluant P&L, bilan simplifié et trésorerie.

      2. Configurer les comparatifs avec les budgets et l''année précédente.

      3. Ajouter les commentaires de gestion sur les écarts significatifs.

      4. Valider avec le DAF avant diffusion à la direction générale.

      Note : Le rapport de gestion financière mesure la performance économique de l''entreprise (P&L, trésorerie, bilan).
      Le rapport de performance commerciale CRM mesure la performance des équipes de vente (pipeline, quotas, opportunités).
      Ces deux rapports sont présentés à la direction mais mesurent des dimensions entièrement différentes de l''entreprise.'
    - 'Générer un rapport de performance commerciale consolidé pour la direction

      Chemin : CRM > Reporting > Tableau de bord direction > Rapport consolidé

      1. Naviguer vers CRM > Reporting et créer un rapport consolidé ou utiliser le modèle Rapport de direction si disponible.

      2. Configurer les sections : KPIs clés en chiffres, performance vs objectifs (réalisé vs quota par commercial et par
      équipe), évolution du pipeline vs N-1, top 10 des opportunités actives, analyse des pertes (montant et causes), prévisions
      du trimestre suivant.

      3. Définir la période de référence et les indicateurs : taux d''atteinte des quotas, taux de conversion global, durée
      du cycle de vente, taille moyenne des deals.

      4. Personnaliser le format pour une présentation direction : graphiques synthétiques, tableaux clairs, codes couleur.

      5. Programmer l''envoi automatique en PDF chaque lundi matin ou avant chaque comité de direction.

      Note : Un rapport de direction doit être synthétique et orienté décision. La direction a besoin de tendances et d''alertes,
      pas de lignes de données brutes.'
    - 'Traiter une demande de modification contractuelle initiée par un employé  RH > Personnel > Demandes de modification
      contractuelle

      Cette procédure décrit comment un gestionnaire RH traite une demande de l''employé souhaitant modifier son contrat (temps
      partiel, changement de poste).

      1. Accédez à RH > Personnel > Demandes de modification contractuelle.

      2. La liste affiche les demandes en attente soumises par les employés depuis leur espace personnel.

      3. Cliquez sur une demande pour voir le détail : type de modification demandée, justification, date souhaitée d''effet.

      4. Étudiez la faisabilité (impact budgétaire, poste disponible, accord de la direction).

      5. Si accordée : cliquez sur « Approuver » et créez l''avenant correspondant depuis RH > Personnel > Fiche salarié >
      Contrats > Avenant.

      6. Si refusée : cliquez sur « Refuser » en saisissant un motif détaillé*.

      7. L''employé est notifié de la décision avec le motif.'
