  - 'Objective:

    What is your favorite Evil Dead movie quote? Of the Sam Raimi ''Holy Trinity'' in which Bruce Campbell stared (so Spiderman
    is not included, of course) which of these three do you have a fav. quote from? Also, can you describe why it''s your
    favorite?\n\nEvil Dead\nEvil Dead II\nor Army of Darkness\n\nI can''t decide what quote I love the most.

    Response: What is your favorite Evil Dead movie quote? "Shut the door... where you raised on a barn? <quiet> you probably
    were, with all of the other primates</quiet>" - Army of Darkness -> It''s really funny'
  - 'Objective:

    Police brutality statistics for the last 5 years? I need any info io can get on police brutality preferably statistics
    or some good sites that would help me find this information

    Response: Police brutality statistics for the last 5 years? I''m glad you asked! I am a librarian and I recently referred
    a patron to this report that will answer all of your questions:\n\nBureau of Justice Statistics: Police Use of Force\nhttp://www.ojp.usdoj.gov/bjs/pub/pdf/ndcopuof.pdf\n\nIf
    you need more information, try looking on the Bureau of Justice Web site:\n\nhttp://www.ojp.usdoj.gov/bjs/\n\nAfter you
    enter the site, try searching by keyword "brutality".'
- source_sentence: 'Objective:

    Will the new supreme court result in a democratic win in 2008? Now that Roe v Wade is potentially jeopadized by a right
    wing court, will pro-life supporters put a democrat in the white house in 2008 to counter this?

    Response: Will the new supreme court result in a democratic win in 2008? Your question makes no sense at all. However,
    let''s say that you had asked if pro-choice supporters would work hard for Democrats because of the recent appointments
    to the Supreme Court.\n\nThe extreme pro-choice (dare I say pro-abortion) crowd is extremely angry about the Alito confirmation
    (moreso than the Roberts confirmation, because Alito refused to say that Roe v. Wade is settled law). They are very angry
    at the 17 Democrats who voted for cloture (that is to end the filibuster, which could''ve been sustained if it had been
    supported by all 42 senators who eventually voted against the confirmation). This will likely dampen their enthusiasm
    for Democratic candidates in 2006 and 2008.\n\nAlso, it should be noted that the confirmation hearings and the attempt
    to filibuster Justice Alito should provide Republicans with some ammunition against Democrats.\n\nI don''t think this
    will be a successful issue for the Democrats, however, as the most vocal opponents of the nominees are out of the mainstream
    of American thinking.'
  sentences:
  - 'Objective:

    I want to lookup a traffic ticket and around how much it would be? Can I do it over the internet\nhow much is the ticket\nhow
    can i avoid loosing a point from my drivers license

    Response: I want to lookup a traffic ticket and around how much it would be? Look on your ticket the officer gave you.
    All the contact info should be on it. Call them during normal working hours with the reference number/ticket number and
    they''ll tell you how much to send and where to send it. First ticket?'
  - 'Objective:

    someone owes me alot of money almost 10000.00 plus interest and my computer he wont give me money for his part he talked
    me into putting his name on the cards and he agreed to help pay the bills but he hasnt done anyhting i was the only one
    looking for a job and paying on the credit cards and the rent the phone bill and cable and light bill each month he did
    nothing so i lefted him and came back to indidna my husband took me back i also paid this man ex wife 200.00 a month that
    he was suppose to be paying when i came back he told me he would pay the american exspree,chase and shop nbc for the computer
    but i didnt get any money from and he wasnt sending it to the creditors either he would tell me each month he paid them
    and i belived him then i was getting the calls so i was paying the creditors plus the late feed and the over the limit
    fee he thinks credit cards are candy i cancealed all credit cards and took his name off of all of them so he couldnt open
    them back up i am paying my half each plus his i found out he has a felony charge against him and he owes his ex wife
    16000.00 she is the one

    Response: someone owes me alot of money almost 10000.00 plus interest and my computer he wont give me money for his part
    laws in states vary.  Sounds like you and he are currently in different states.  It also sounds like you opened the credit
    card accounts and added his name, which you have since removed.  There is an adage that I''m reminded of here, that it
    is impossible to get blood from a stone.  If your ex-friend hasn''t a job and has not money, it seems foolish to tie up
    a lot of time and emotions on that venue.  Considering that you had three credit cards and only 10,000 charged to them,
    you might even consider yourself fortunate-they could have been maxed out.  Might be better off trying to consolidate
    the loans(if you can) and then try to work out payments with the creditors; payments that you can live with.  Next time
    when you feel your eyesight affected by love.  Remember that while love may indeed blind, it isn''t cheap.\n\nbest of
    luck,'
  - 'Objective:

    Does anyone here take latin? Do you like it? I take latin at school! I have grown to really like it!

    Response: Does anyone here take latin? Do you like it? Yeah,I like latin too.I took it at school too.How can I help you?'
- source_sentence: 'Objective:

    Assess student perceptions of the instructor''s use of humor in presentations.

    Response: Oh yeah the presentations were pretty solid actually, and speaking of humor that reminds me - the group project
    we did was honestly one of the best parts of the whole course. Like we had to build this whole proposal from scratch and
    figuring out how to split up the work taught me way more about time management than I expected, I genuinely think every
    class should have something like that built in.'
  sentences:
  - 'Objective:

    Hi.When you consider a new job, how do you check the credibility of the firm/company before you commit/join? Its just
    that am looking for a job change. Am currently working for an MNC, but the new firm where i have been accepted is a really
    small time company, but its offering me the kind of job i have been looking for, something that i''ve been waiting for..

    Response: Hi.When you consider a new job, how do you check the credibility of the firm/company before you commit/join?
    It appears that the question period has expired.  If you have received an answer that meets your needs, please choose
    one of those as a ''best answer.''  If you haven''t received a good answer for your question, you may want to consider
    the following,\n\n1) Re-post your question.  Newer questions get more activity on Yahoo! Answers than old ones.\n2) If
    you do re-post your question, consider why it wasn''t answered the first time.  Could it be more specific?  Could it be
    worded better? Were there grammatical or spelling errors? Was it in the best category?\n\nIf it doesn''t seem likely that
    re-posting your question will help you, then here''s a listing of my favorite ''answer sites''.  Maybe one of them will
    help you.\n\nAnswers.com http://www.answers.com/\nBartleby http://www.bartleby.com/\nYahoo Reference http://education.yahoo.com/reference/\nHowStuffWorks
    http://www.howstuffworks.com/\nWikipedia http://en.wikipedia.org/wiki/Main_Page\n\nSince I really haven''t answered your
    question, it is not necessary to give me any points.  Regards.'
  - 'Objective:

    Why more and more people in the world are thinking and imaginf sick things, whois fault is that? i know but i am scared
    to tell. so you tell me.....

    Response: Why more and more people in the world are thinking and imaginf sick things, whois fault is that? The Media?
    hell who knows!! The world definitely isn''t what it used to be'
  - 'Objective:

    I am a 51 year old women who is seeking work at home typing or customer inbound cs leonaa2005@yahoo.com? Looking to work
    from home typing or inbound customer service, and i''m looking for answers on how to go about this without paying for
    a job. I am very dedicated and really need work. So please if you are a home worker or know any knowledge on how to go
    about this please let me know, Sincerely Leona

    Response: I am a 51 year old women who is seeking work at home typing or customer inbound cs leonaa2005@yahoo.com? Hi
    - My name is Mindy and I am a Regional Senior Rep for Stuff-N-Snuggle.  They are a direct sales company that sales stuff
    your own bears, animals, and dolls.  There is no sign up fees and you recieve a free website.  If you would like some
    more information please visit my homepage at http://mj-gifts.com.'
- source_sentence: 'Objective:

    If any male or female suck the penis of aids infected person .. any chance to get aids to the sucker ? i m of 32 male
    average

    Response: If any male or female suck the penis of aids infected person .. any chance to get aids to the sucker ? There
    is a lowered chance that a person performing oral sex on an AIDS infected man will get AIDS.  HIV (the virus that causes
    AIDS) is spread through semen, but that infected semen has to get into the blood stream of the other person.  That will
    only happen if the person giving the oral sex has open sores or wounds in their mouth.  Oral sex is a LOWER risk behavior
    for HIV infection, but it is still risky.  Use a flavored condom or dental dam anytime you give or receive oral sex.  And
    remember, there''s more than just AIDS out there.'
  sentences:
  - 'Objective:

    WHAT MAY i DO WHEN I WANT ONE GUY, WHICH i NEVER TALK BEFORE? This guy is vety cute. He smiles at me. Idont know what
    to do.Iam very shy.

    Response: WHAT MAY i DO WHEN I WANT ONE GUY, WHICH i NEVER TALK BEFORE? For starts, simply smilie back at him. Give him
    signs that you are interested as well. Make yourself available for him to talk with you. Work up the courage just to say
    hi. You will be fine trust me.'
  - 'Objective:

    when will i succeed nd get my ambitions fulfilled.? i m trying hard to achieve job satisfaction but i couldn''t.

    Response: when will i succeed nd get my ambitions fulfilled.? I really think this can only be detrmined by a psychic!'
  - 'Objective:

    How do you let a guy know your into him (love him) without making a total fool of yourself.? i''ve already done small
    things, flirting, dropping off cookies, Hugs & kisses.  no date yet but afraid to make bolder move......any suggestions.

    Response: How do you let a guy know your into him (love him) without making a total fool of yourself.? Well it seems that
    your doing everything right so far.\n\nBut you must remember that guys are shy when it becomes to girls that they like.
    \n\nI really think he likes you (which is why he is quiet) so if you up to it, just ask him and i know he will feel more
    confident and start talking more about his feelings.\n\nAt least that works for me.'
- source_sentence: 'Objective:

    Where can i get help for Basic of creating Macros in Visual Basics? Where can i get help to create macros for my daily
    activities which are to be done everyday and time consuming.\nSo wanted to know the basic of creating macros in Visual
    Basic for my activities in Excel

    Response: Where can i get help for Basic of creating Macros in Visual Basics? I am an Excel developer for a major financial
    company in NYC and I use MSDN daily to research the Excel Object Model.'
  sentences:
  - 'Objective:

    Evaluate student perceptions of freedom to express ideas and challenge the instructor.

    Response: that reminds me of this really cool video i saw on youtube about how important it is to have a growth mindset...
    it was talking about how people who are open to learning and taking risks are more likely to succeed, and it made me think
    about how i approach problems in general, like when im trying to fix a bug in a coding project or something'
  - 'Objective:

    Assess student perceptions of question-asking encouragement and answer quality.

    Response: that reminds me of group projects... we had to work together a lot and it was kinda hard to get everyone on
    the same page, i mean we had to use this one tool to communicate and it was really annoying to use, the interface was
    all weird and stuff'
  - 'Objective:

    I started working out about 1 month ago, specifically working on my abs.How can I get rid of the belly fat? I''m working
    out 5-6 days a week, and have started eating healthier. I''m feeling some results but I''m not really seeing them yet.
    When can I expect to see some changes in my stomache?

    Response: I started working out about 1 month ago, specifically working on my abs.How can I get rid of the belly fat?
    You have to do cardio to burn belly fat.  Just lifting weights and doing sit ups wont cut it.  Cardio, cardio, cardio!  Everytime
    you do cardio be sure to throw some stomach crunches in there too.  you should see results in about a month.'
