- source_sentence: 'Represent this sentence for searching relevant passages: what type of habitat do sea turtles live in'
  sentences:
  - Turbidity Governments have set standards on the allowable turbidity in drinking water. In the United States, systems that
    use conventional or direct filtration methods turbidity cannot be higher than 1.0 nephelometric turbidity units (NTU)
    at the plant outlet and all samples for turbidity must be less than or equal to 0.3 NTU for at least 95 percent of the
    samples in any month. Systems that use filtration other than the conventional or direct filtration must follow state limits,
    which must include turbidity at no time exceeding 5 NTU. Many drinking water utilities strive to achieve levels as low
    as 0.1 NTU.[11] The European standards for turbidity state that it must be no more than 4 NTU.[12] The World Health Organization,
    establishes that the turbidity of drinking water should not be more than 5 NTU, and should ideally be below 1 NTU.[13]
  - 'List of 1924 Winter Olympics medal winners Finnish speed skater Clas Thunberg topped the medal count with five medals:
    three golds, one silver, and one bronze. One of his competitors, Roald Larsen of Norway, also won five medals, with two
    silver and three bronze medal-winning performances.[3] The first gold medalist at these Games—and therefore the first
    gold medalist in Winter Olympic history—was American speed skater Charles Jewtraw. Only one medal change took place after
    the Games: in the ski jump competition, a marking error deprived American athlete Anders Haugen of a bronze medal. Haugen
    pursued an appeal to the IOC many years after the fact; he was awarded the medal after a 1974 decision in his favor.[1]'
  - Sea turtle Sea turtles are generally found in the waters over continental shelves. During the first three to five years
    of life, sea turtles spend most of their time in the pelagic zone floating in seaweed mats. Green sea turtles in particular
    are often found in Sargassum mats, in which they find shelter and food.[14] Once the sea turtle has reached adulthood
    it moves closer to the shore.[15] Females will come ashore to lay their eggs on sandy beaches during the nesting season.[16]
