widgetData:
- source_sentence: According to the Client Money Auditor's Report, how did the Authorised Person manage Client Money—was it
    pooled in a single client Account or segregated into individual Client Accounts as per COBS Chapter 14?
  sentences:
  - "The written notice in Rule ‎6.2.1(a)(i) must make it explicit that, if an Employee is prohibited from undertaking a Personal\
    \ Account Transaction, he must not, except in the proper course of his employment:\n(a)\tprocure another Person to enter\
    \ into such a Transaction; or\n(b)\tcommunicate any information or opinion to another Person if he knows, or ought to\
    \ know, that the Person will as a result, enter into such a Transaction or procure some other Person to do so."
  - "Client Money Auditor's Report:An Authorised Person must, in procuring the production of a Client Money Auditor's Report,\
    \ ensure that an Auditor states, as at the date of which the Authorised Person's audited statement of financial position\
    \ was prepared:\n(1)\tthe amount of Client Money an Authorised Person was holding and controlling in accordance with COBS\
    \ Chapter 14; and\n(2)\twhether:\n(a)\tthe Authorised Person has maintained throughout the year systems and controls to\
    \ enable it to comply with the relevant provisions of COBS Chapter 14;\n(b)\tthe Authorised Person's controls are such\
    \ as to ensure that Client Money is identifiable and secure at all times;\n(c)\tany of the requirements in COBS Chapter\
    \ 14 have not been met;\n(d)\tClient Money has been pooled in a single client Account or segregated in Client Accounts\
    \ maintained for individual Clients in accordance with COBS Chapter 14;\n(e)\tif applicable, the Authorised Person as\
    \ holding and controlling the appropriate amount of Client Money in accordance with COBS Chapter 14 as at the date on\
    \ which the Authorised Person's audited statement of financial position was prepared;\n(f)\tthe Auditor has received all\
    \ necessary information and explanations for the purposes of preparing the report to the Regulator; and\n(g)\tif applicable,\
    \ there have been any material discrepancies in the reconciliation of Client Money."
  - "CRS Options\n/Table Start\nNo.\tOPTIONS\tCOMMENTS\n1.\tAlternative approach to calculating account balances\tNO\n2.\t\
    Use of other reporting period\tNO\n3.\tFiling deadlines\t30th June\n4.\tFiling Nil returns\tYES\n5.\tAllowing third party\
    \ service providers to fulfil the obligations on behalf of\nthe Financial Institutions\tYES\n6.\tAllowing the due diligence\
    \ procedures for New Accounts to be used for\nPre-existing Accounts\tYES\n7.\tAllowing the due diligence procedures for\
    \ High Value Accounts to be used\nfor Lower Value Accounts\tYES\n8.\tResidence address test for Lower Value Accounts\t\
    YES\n9.\tExclusion from Due Diligence for Pre-existing Entity Accounts not exceeding $250,000\tYES\n10.\tAlternative documentation\
    \ procedure for certain employer-sponsored\ngroup insurance contracts or annuity contracts\tYES\n11.\tAllowing Financial\
    \ Institutions to make greater use of existing\nstandardised industry coding systems for the due diligence process\tYES\n\
    12.\tCurrency translation\tUSE USD$\n\n13.\tAllow a Financial Institution to treat certain New Accounts held by pre-existing\
    \ customers as a Pre-existing Account for due diligence purposes\tYES\n14.\tExpanded definition of Related Entity for\
    \ Investment Entities\tYES\n15.\tGrandfathering rule for bearer shares issued by Exempt Collective\nInvestment Vehicle\t\
    Removed\n16.\tPhasing in the requirements to report gross proceeds\tNO\n/Table End\n\n"
- source_sentence: What reporting and disclosure requirements are FinTech Participants expected to comply with when operating
    within the ADGM RegLab?
  sentences:
  - 'INTRODUCTION

    For more details on the requirements, and process, for making ensuring compliance with the Continuous Disclosure framework,
    please contact the Listing Authority at LA@adgm.com.


    '
  - An Authorised Person or Recognised Body must perform an internal Shari'a review to assess the extent to which the Authorised
    Person or Recognised Body complies with fatwa, rulings and guidelines issued by its Shari'a Supervisory Board.
  - Similarly, in using a new or developing technology, such as those associated with the Regulated Activity of Developing
    Financial Technology Services within the RegLab or when undertaking NFTF business, a Relevant Person should pay specific
    attention to assessing the potential for risks associated with Financial Crime that might arise as a result of implementing
    that innovative technology. For example, while the use of eKYC Systems may reduce the risk of impersonation fraud at customer
    onboarding, NFTF interaction with the customer may increase the risk of Financial Crime after a business relationship
    has been established, through transaction fraud, money laundering or theft of digitally stored CDD documentation.
- source_sentence: How does the ADGM expect an Authorised Person to document and demonstrate adherence to the lines of authority
    and responsibility established by the Governing Body for managing Liquidity Risk in compliance with Rule 9.2.2(2)(b)(b)?
  sentences:
  - An Authorised Person or a Recognised Body must ensure that its internal audit function undertakes regular reviews and
    assessments of the effectiveness of the Authorised Person or Recognised Body's money laundering policies, procedures,
    systems and controls, and its compliance with its obligations in the AML Rulebook.
  - "If a Fund intends to change its annual or interim accounting period, the Fund Manager must:\n(a)\tobtain written confirmation\
    \ from its auditor that the change of its annual accounting period would not result in any significant distortion of the\
    \ financial position of the Fund; and\n(b)\tobtain the Regulator's prior consent before implementing the change."
  - "Guidance on risks to be covered as part of the IRAP. An Authorised Person should consider the following risks, where\
    \ relevant, in its IRAP:\na.\tCredit Risk, including Large Exposures and concentration risks;\nb.\tMarket Risk;\nc.\t\
    Liquidity Risk;\nd.\tfor Islamic Financial Business involving PSIAs, displaced commercial risk;\ne.\tinterest rate risk\
    \ in the Non Trading Book;\nf.\tOperational Risk;\ng.\tinternal controls and systems; and\nh.\treputational risk."
- source_sentence: If a Recognised Body receives a notification from the Regulator regarding an application, which of the
    following actions would allow the Recognised Body to avoid the application of section 268 of the Insolvency Regulations
    to Market Contracts of a Member or designated non-Member?
  sentences:
  - "The procedure is that the Regulator must notify the Recognised Body of the application and unless the Recognised Body:\n\
    (a)\ttakes action under its Default Rules;\n(b)\tnotifies the Regulator that it proposes to take action forthwith; or\n\
    (c)\tis directed to take action by the Regulator,\nwithin three Business Days after receipt of that notice section 268\
    \ of the Insolvency Regulations will not apply in relation to Market Contracts to which the Member or designated non-Member\
    \ is a party or to anything done by the Recognised Body for the purpose of, or in connection with, the settlement of Market\
    \ Contracts."
  - The Regulator shall have the power to designate a Regulated Activity or specified category of Regulated Activity as not
    being in compliance with Shari'a in the event that the Regulator believes that such Regulated Activity or specified category
    of Regulated Activity involves matters that are contrary to the aims of Shari'a.
  - "An Authorised Person and Recognised Body must:\n(a)\twhen it sends or receives a wire transfer on behalf of a customer,\
    \ ensure that the wire transfer and any related messages contain accurate originator and beneficiary information;\n(b)\t\
    ensure that, while the wire transfer is under its control, the information in (a) remains with the wire transfer and any\
    \ related message throughout the payment chain;\n(c)\tmonitor wire transfers for the purpose of detecting those wire transfers\
    \ that do not contain both originator and beneficiary information and take appropriate measures to identify any money\
    \ laundering risks; and\n(d)\tnot effect wire transfers without the information required under (3) and (4)."
- source_sentence: How should a Relevant Person ensure and demonstrate compliance with both UNSC Sanctions and U.A.E.-administered
    Sanctions, specifically Targeted Financial Sanctions, within the ADGM jurisdiction?
  sentences:
  - 'REGULATORY REQUIREMENTS - SPOT COMMODITY ACTIVITIES

    RIEs operating an MTF or OTF using Accepted Spot Commodities

    Authorised Persons that are operating an MTF or OTF wishing to also operate a RIE will be required to relinquish their
    FSP upon obtaining a Recognition Order (to operate the RIE).  If licensed by the FSRA to carry out both Regulated Activities
    (e.g., operating an MTF and operating an RIE), the Recognition Order will include a stipulation to that effect pursuant
    to MIR Rule 3.4.1.

    '
  - "Where a Relevant Person seeks to rely on a Person in (1) it may only do so if and to the extent that:\n(a)\tit immediately\
    \ obtains the necessary CDD information from the third party in (1);\n(b)\tit takes adequate steps to satisfy itself that\
    \ certified copies of the documents used to undertake the relevant elements of CDD will be available from the third party\
    \ on request without delay;\n(c)\tthe Person in (1)(b) to (d) is subject to regulation, including AML/TFS compliance requirements,\
    \ by a Non-ADGM Financial Services Regulator or other competent authority in a country with AML/TFS regulations which\
    \ are equivalent to the standards set out in the FATF Recommendations and it is supervised for compliance with such regulations;\n\
    (d)\tthe Person in (1) has not relied on any exception from the requirement to conduct any relevant elements of CDD which\
    \ the Relevant Person seeks to rely on; and\n(e)\tin relation to (2), the information is up to date."
  - "Financial Services Permissions. VC Managers operating in ADGM require a Financial Services Permission (“FSP”) to undertake\
    \ any Regulated Activity pertaining to VC Funds and/or co-investments by third parties in VC Funds. The Regulated Activities\
    \ covered by the FSP will be dependent on the VC Managers’ investment strategy and business model.\n(a)\tManaging a Collective\
    \ Investment Fund: this includes carrying out fund management activities in respect of a VC Fund.\n(b)\tAdvising on Investments\
    \ or Credit : for VC Managers these activities will be restricted to activities related to co-investment alongside a VC\
    \ Fund which the VC Manager manages, such as recommending that a client invest in an investee company alongside the VC\
    \ Fund and on the strategy and structure required to make the investment.\n(c)\tArranging Deals in Investments: VC Managers\
    \ may also wish to make arrangements to facilitate co-investments in the investee company.\nAuthorisation fees and supervision\
    \ fees for a VC Manager are capped at USD 10,000 regardless of whether one or both of the additional Regulated Activities\
    \ in b) and c) above in relation to co-investments are included in its FSP. The FSP will include restrictions appropriate\
    \ to the business model of a VC Manager."
