widgetData:
- source_sentence: What documents must contractors/vendors provide?
  sentences:
  - 1. ESH representatives will carry out the training when new employees need to be trained, or on an annual basis.
  - "1. Safe Operating Procedure (SOP). \n2. Risk Assessment ( Hazard Identification, Risk Assessment, & Risk control / HIRARC)\
    \ / JSA / Job Safety Analysis. \n3. Valid licenses (If applicable). \n4. Certification of Fitness-CF (For all types of\
    \ cranes). \n5. Crane Operator Competency License. (If applicable). \n6. All scaffolding must be erected as per the statutory\
    \ regulations. \n7. Lifting Supervisor Competency Certificate. (If applicable). \n8. Signal Man Competency Certificate.\
    \ (If applicable. \n9. Rigger Competency Certificate. (If applicable). \n10. Lifting plan (If applicable). \n11. Scaffolder\
    \ Level 1/2/3 Certificate. (If applicable)."
  - 1. To ensure the specific employees are aware of the correct procedures associated with chemical handling and waste management.
- source_sentence: What is the guideline for shirts and blouses?
  sentences:
  - 1. ESH representatives will carry out the training when new employees need to be trained, or on an annual basis.
  - 1. Employees in CLEAN ROOM are NOT ALLOWED to use/wear makeup/bangles.
  - "1. 1. Formal or casual shirts with sleeves. \n2. 2. Collared T-shirts and blouses/sleeveless tops (for ladies). \n3.\
    \ 3. Round-neck T-shirts are allowed for non-office personnel. \n4. 4. Clothing with the company logo is encouraged. \n\
    5. 5. Sport Team. \n6. 6. University. \n7. 7. Fashion brands on clothing are generally acceptable."
- source_sentence: What is the lunch schedule for the 1st shift in the normal schedule in M-site?
  sentences:
  - 12 days.
  - '1. Categorization of Machine: Identify the location of the machine, its function, and all necessary items needed for
    it to run (e.g., lubricants, saw blades, etc).

    2. Authorization: Ensure that all personnel operating the machine have received the appropriate training.

    3. Hazard & Risks associated with equipment/machinery/techniques/process: Identify all hazards and risks associated, and
    implement sufficient controls according to the hierarchy of controls (e.g., warning labels and symbols).

    4. Pre-work procedure: Ensure that the machine is in proper, running condition before starting work.

    5. During work procedure: Follow the correct standard operating procedure for carrying out that work activity.

    6. After work procedure: Ensure that the machine remains in a neat and tidy condition at all times.

    7. Work Area: Identify the area where the work is being done.

    8. PPE: Ensure that appropriate PPE is available for all personnel handling the machine.

    9. Emergency Procedure: Ensure sufficient emergency features are available on the machine (e.g., emergency stop button).

    10. After work hour: Ensure the machine system is in shutdown/standby mode when the machine is not running.

    11. Housekeeping: Ensure basic housekeeping is done at the work area.

    12. Scheduled waste: Any scheduled waste generated by the process should be disposed of according to Carsem waste management
    procedure.'
  - 1. Lunch (Tengah Hari) for the 1st shift is from 12:00 PM to 1:00 PM, lasting 60 minutes.
- source_sentence: What is the meal schedule for M-site?
  sentences:
  - 2 days.
  - "1. 1st Shift: -Dinner (Malam): 8:00PM - 8:40PM, -Supper(Lewat Malam): 1:00AM - 1:30 AM -Breakfast(Pagi): 8:00AM - 8:30AM\
    \ -Lunch(Tengah Hari): 12:50PM - 1:30PM. \n2. 2nd Shift: -Dinner(Malam): 8:50PM - 9:30PM -Supper(Lewat Malam): 1:40AM\
    \ - 2:10AM -Breakfast(Pagi): 8:40AM - 9:10AM -Lunch(Tengah Hari): 1:40PM - 2:20PM. \n3. 3rd Shift: -Dinner(Malam): 9:40PM\
    \ - 10:20PM -Supper(Lewat Malam): 2:20AM - 2:50AM -Breakfast(Pagi): 9:20AM - 9:50AM -Lunch(Tengah Hari): 2:30PM - 3:10PM.\
    \ \n4. 4th Shift: -Dinner(Malam): 10:30PM - 11:10PM -Supper(Lewat Malam): 3:00AM - 3:30AM -Breakfast(Pagi): 10:00AM -\
    \ 10:30AM -Lunch(Tengah Hari): 3:20PM - 4:00PM."
  - "1. The mechanical safety guidelines include: \n2. 1. Lock-Out Tag-Out (LOTO): Always practice LOTO procedures when performing\
    \ maintenance or repairs on machines. \n3. 2. Preventive Maintenance: Conduct regular preventive maintenance on all machinery\
    \ to ensure proper functioning. \n4. 3. Pinch Points Awareness: Identify all possible pinch points on machinery, and ensure\
    \ they are properly labeled. \n5. 4. Production Area Organization: Keep the production area neat and organized at all\
    \ times. \n6. 5. Operator Training: Provide adequate training to operators before allowing them to handle machines. \n\
    7. 6. Machine Guarding: Ensure all safety guards are in place before starting machine operations."
