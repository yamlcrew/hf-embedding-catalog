widgetData:
- source_sentence: "L.5.2.2, the Offeror will receive additional points if the Project is a task order awarded against a \n\
    Federal Government multiple-award contract . . . .”  AR at 1099, 2138, 2630.  Thus, each project \nsubmitted can earn\
    \ additional points simply by virtue of being a task order on another multiple-\naward contract.  A similar situation\
    \ exists for the sub-factor designed to evaluate each project’s"
  sentences:
  - What concern did Al-Hamim have about the premises?
  - What document sections mention where additional points can be earned for task orders?
  - Which document contains the rule specified in 125.9(b)(3)(i)?
- source_sentence: "Prosecutorial Disclosure Timing:  Does Brady Trump the Jencks Act?, 26 Geo. J. Legal Ethics \n997, 997\
    \ (2013).  Yet the Government has proven up to the task.10  The Court expects the same \nhere. \n \nFor all these reasons,\
    \ no rule prevented Congress from making the Commission what it \nis:  an “agency” under § 552(f)(1) but not § 551(1),\
    \ and an “advisory committee” under FACA."
  sentences:
  - ¿De dónde se solicitó remover el material con la imagen del demandante?
  - What expectation does the Court have?
  - Which system was searched for responsive material?
- source_sentence: "Asoc. Rec. Round Hill, 149 DPR 91, 100 (1999). Sólo lo claramente \nirrazonable o inmeritorio debe dar\
    \ paso a una determinación de \nfrivolidad por un tribunal apelativo.22  \nEn Feliciano Polanco v. Feliciano González,\
    \ 47 DPR 722, 730 \n(1999), el Tribunal Supremo de Puerto Rico indicó que “[a] modo de \nejemplo, constituyen actos temerarios\
    \ los siguientes:"
  sentences:
  - What was the purpose of the stay ordered by the Court?
  - What is the citation for the Feliciano Polanco v. Feliciano González case?
  - What has the Court addressed in its previous opinion?
- source_sentence: "petitioner as the shooter depended primarily on the testimony of “a witness who had  \ndeclined on several\
    \ occasions pretrial to identify petitioner as the shooter[,]” and that \nadmission of “the videotape, relied upon so\
    \ heavily by the State, under these \ncircumstances, was not harmless beyond a reasonable doubt.”  Id. at 658, 961 A.2d\
    \ at 1119."
  sentences:
  - What is the record citation for the statement that the videotape's admission was not harmless?
  - What are the Studies in Intelligence indices not referred to as?
  - What is the plaintiff under the impression about?
- source_sentence: "are “broad and vague descriptions” of the information that make it impossible for the Court to \nconduct\
    \ its requisite de novo review over the Department’s decision to withhold this information \nas “critical infrastructure\
    \ security information.”  See Prop. of the People, Inc. v. Off. of Mgmt. & \nBudget, 330 F. Supp. 3d 373, 388 (D.D.C.\
    \ 2018)."
  sentences:
  - What did the court express skepticism about?
  - What type of review is the Court unable to conduct due to broad and vague descriptions?
  - How many additional patents are mentioned in the pipeline according to the November 2, 2017 Update?
