      blindedarmontsteking in het ziekenhuis moest blijven. "Ik heb het gevoel dat ik er beter mee omga dan ik had verwacht.
      We hebben best veel ''long runs'' gedaan, maar die zijn nog steeds slechts een kwart van wat we gaan doen in de race
      op zondag. Maar ik heb nog steeds een dag om uit te rusten en omdat het één race is, wordt het hopelijk niet te zwaar."



      Albon had vrijdag vooral last van de hitte. "Als je uit de wagen komt, kun je duidelijk voelen dat er een fysieke reactie
      is. Maar ik voel ook dat er geen echte klachten zijn, dus ik voel me best goed."



      Williams heeft De Vries ook naar Singapore laten gaan, voor het geval Albon niet in staat is om te racen.'
    - 'passage: Door vrije energiemarkt gaan prijzen hier harder omhoog



      DEN HAAG (ANP) - Dat de inflatie in Nederland veel hoger ligt dan gemiddeld in Europa, komt onder meer door onze sterk
      geliberaliseerde energiemarkt. Daardoor kunnen energiebedrijven in Nederland de hogere gastarieven veel makkelijker
      doorberekenen aan huishoudens, zegt hoofdeconoom Peter Hein van Mulligen van het Centraal Bureau voor de Statistiek
      (CBS).



      Vrijdag werd bekend dat de Nederlandse inflatie volgens de Europese meetmethode is gestegen tot 17,1 procent op jaarbasis.
      Dat was volgens het CBS het hoogste cijfer ooit gemeten. Ook in het eurogebied was sprake van een record. Maar daar
      gaat het met een geldontwaarding van 10 procent wel om een veel lager cijfer.



      Van Mulligen legt uit dat er waarschijnlijk verschillende redenen zijn voor dit verschil. Wat ook een rol speelt is
      de manier waarop het CBS de energieprijzen meet. Die manier kan van land tot land verschillen. In Nederland wordt iedere
      maand gekeken wat het kost om een nieuw energiecontract af te sluiten. In normale tijden is dat volgens Van Mulligen
      een geschikte manier om de energieprijzen te meten. Maar nu kan het de inflatiecijfers extra opdrijven. In de praktijk
      hoeven lang niet alle huishoudens iedere maand een nieuw energiecontract af te sluiten.



      Rabobank-econoom Hugo Erken denkt dat het verschil in manier van meten waarschijnlijk de belangrijkste oorzaak is van
      het grote verschil in inflatie tussen Nederland en andere eurolanden. Dat komt omdat er ook andere graadmeters zijn
      voor de toename van het prijsniveau en daar zijn de verschillen tussen landen kleiner. Die andere cijfers zijn alleen
      nu nog niet bekend.'
  - source_sentence: 'query: What are the chances of Max Verstappen winning the Formula 1 title at the Singapore Grand Prix?'
    sentences:
    - 'passage: Verstappen acht kans klein op titel in Singapore



      SINGAPORE (ANP/RTR) - Max Verstappen acht zelf de kans klein dat hij zondag al zijn tweede wereldtitel in de Formule
      1 verovert. "Ik heb veel geluk nodig, dus ik reken er niet op", zei de coureur van Red Bull in aanloop naar de Grote
      Prijs van Singapore.



      Het is de zesde race voor het einde van het seizoen en bij winst kan Verstappen al wereldkampioen zijn. "Ik ken de scenario''s.
      Ik moet winnen, mijn teamgenoot Sergio Pérez moet vierde of lager eindigen en Charles Leclerc van Ferrari achtste of
      lager. Dat is een beetje onrealistisch, dus ik denk er verder niet over na. Ik wil liever gewoon genieten en natuurlijk
      proberen te winnen."



      Verstappen, die vrijdag zijn 25e verjaardag viert, won de laatste vijf races en staat al op elf overwinningen in dit
      seizoen. Hij leidt het kampioenschap met 116 punten voorsprong op Leclerc. Als hij de titel zondag niet wint, dan krijgt
      hij een week later in Japan een nieuwe kans.



      De Nederlander kan dit seizoen ook het record van Sebastian Vettel en Michael Schumacher aanvallen, die in respectievelijk
      2013 en 2004 dertien grands prix wonnen. "Het zou mooi zijn als ik dat haal, maar het is niet echt iets dat belangrijk
      voor me is. Het is mooi dat we het de afgelopen races zo goed hebben gedaan, maar dat ligt achter me. Ik richt me op
      wat ik hier in Singapore moet doen", aldus de Nederlander.



      Vertappen won nog nooit de race op het stratencircuit van Singapore, die door de meeste coureurs vanwege de vele bochten
      en daarbovenop de hitte en hoge luchtvochtigheid als een van de fysiek zwaarste wordt beschouwd. De Formule 1 sloeg
      de race in de Zuidoost-Aziatische stadstaat twee jaar over vanwege de coronapandemie. "We zijn hier al een tijdje niet
      geweest, dus ik ben benieuwd hoe het circuit erbij ligt."'
    - 'passage: ADO verloor de promotiewedstrijd van Excelsior na strafschoppen. Vanwege ongeregeldheden werd de wedstrijd
      meerdere keren stilgelegd. Na afloop raakten vele tientallen ADO-hooligans buiten het stadion slaags met de Mobiele
      Eenheid. Ze gooiden vuurwerk, stenen, stoeptegels, ijzeren palen van verkeersborden en andere spullen naar de politie,
      die charges uitvoerde om de menigte te verdrijven. Een agent kreeg een klap met een regenpijp in het gezicht. Iemand
      anders sloeg met een kettingslot op de rug van een diensthond. Ook werd er een brandende fakkel onder een hond gegooid,
      aldus de politie.



      Meer dan vijftig relschoppers hebben een landelijk stadionverbod gekregen, in sommige gevallen van meer dan tien jaar.
      Meerdere mensen hebben ook gevangenisstraffen gekregen.'
    - 'passage: Al meer dan anderhalf jaar geleden nam de Tweede Kamer een motie aan om het WK in Qatar te boycotten. De Kamer
      wil geen ministers of koning sturen naar een land met zo veel wantoestanden, slavernij en ernstige vormen van uitbuiting.
      Het kabinet hield tot nu toe steeds de boot af, maar zal binnenkort met een besluit moeten komen. Verantwoordelijk minister
      Wopke Hoekstra (Buitenlandse Zaken) zei eerder dit jaar dat het gesprek met Qatar vruchten lijkt af te werpen. Het kabinet
      wijst er ook op dat het Qatar nog nodig kan hebben voor verdere evacuaties uit Afghanistan, en mogelijk als leverancier
      van schaarse energie.'
  - source_sentence: 'query: Who is currently leading the French football competition after their win against Angers?'
    sentences:
    - 'passage: Olympique Marseille na ruime zege bij Angers aan kop in Frankrijk



      ANGERS (ANP) - Olympique Marseille heeft vrijdag de leiding in de Franse voetbalcompetitie in handen genomen. Dat was
      te danken aan een ruime overwinning op Angers: 0-3.



      Middenvelder Jonathan Clauss zette Marseille in de 35e minuut op voorsprong. Na rust liep de ploeg van de Kroatische
      trainer Igor Tudor via de Colombiaan Luis Súarez en de Braziliaan Gerson verder uit.



      Marseille heeft na negen speelronden 23 punten. Regerend kampioen Paris Saint-Germain voetbalt zaterdag tegen OGC Nice
      en komt bij winst op 25 punten.'
    - 'passage: Publiek kan laatste rustplaats Queen in Windsor Castle bezoeken



      LONDEN (ANP) - De deuren van Windsor Castle zijn weer geopend voor publiek, dat daarmee de laatste rustplaats van koningin
      Elizabeth II opnieuw kan bezoeken. Windsor Castle was sinds 8 september, de dag waarop de Queen overleed, gesloten voor
      publiek.



      De langstzittende Britse monarch ooit werd op 19 september begraven in de St George''s Chapel, nadat zij elf dagen eerder
      was overleden. Ook koning Willem-Alexander, koningin Máxima en prinses Beatrix waren aanwezig bij de uitvaart.



      Zaterdag deelde Buckingham Palace de eerste officiële foto van de grafsteen van Elizabeth. Daarin stonden de naam van
      haar ouders en man gegraveerd, maar haar eigen naam staat daar nu ook bij.'
    - 'passage: Rusland: bewijs betrokkenheid Westen bij sabotage pijpleidingen



      MOSKOU (ANP/RTR) - Moskou heeft materiaal in handen dat erop wijst dat het Westen een rol heeft gespeeld in de breuken
      in de twee onderzeese Nord Stream-gaspijpleidingen in de Oostzee. Dat zegt het hoofd van de Russische buitenlandse inlichtingendienst
      Sergej Narisjkin, melden Russische persbureaus.



      "We hebben materiaal dat wijst op een Westers spoor in de organisatie en implementatie van deze terroristische daden",
      citeert persbureau Interfax de Russische topspion. Om wat voor bewijs het precies gaat, zei Narisjkin echter niet. De
      opmerkingen vormen de meest directe beschuldiging tegen het Westen door een hoge Russische functionaris. De Russische
      president Vladimir Poetin zei donderdag dat de ongekende sabotage tegen de pijpleidingen een daad van internationaal
      terrorisme was.



      De Europese Unie onderzoekt de oorzaak van de lekkages en heeft aangegeven te vermoeden dat sabotage de oorzaak is van
      de schade aan de Nord Stream 1 en 2 pijpleidingen voor de kusten van Denemarken en Zweden.



      De Veiligheidsraad van de Verenigde Naties komt vrijdag bijeen over de enorme schade die is aangericht aan de twee gaspijpleidingen,
      die Russisch gas van Rusland naar Duitsland moeten brengen. Rusland heeft om het spoedberaad gevraagd.'
  - source_sentence: 'query: 2009 agreement innovative companies'
    sentences:
    - 'passage: Eurostat: oorlog Oekraïne drijft prijzen in landbouw flink op



      BRUSSEL (ANP) - De prijzen voor landbouwproducten en -goederen in de Europese Unie zijn in het tweede kwartaal van dit
      jaar flink opgedreven door de Russische invasie in Oekraïne. Dat kwam onder meer doordat de levering van onder meer
      graan en tarwe uit Rusland en Oekraïne werd verstoord, meldt statistiekbureau Eurostat. Ook stegen de kosten voor boeren
      om hun bedrijf draaiende te houden.



      Zo steeg de prijs voor graan met 68 procent ten opzichte van een jaar eerder. Ook de prijzen voor eieren en oliehoudende
      producten zoals noten en lijnzaad stegen flink, met respectievelijk 45 en 59 procent.



      Boeren rekenden niet alleen hogere prijzen voor hun producten, maar betaalden ook meer voor goederen en diensten die
      zij inzetten voor hun bedrijfsvoering. De prijs voor meststoffen ging bijvoorbeeld over de kop met een stijging van
      116 procent. Ook betaalden boeren meer voor producten voor hun landbouwvoertuigen, zoals smeermiddelen om de machines
      draaiende te houden.'
    - 'passage: Volgens een afspraak uit 2009 mogen innovatieve bedrijven zich vestigen op het ENCI-terrein. Gedacht kan daarbij
      worden aan ontwikkellaboratoria en duurzame maakindustrie. Dit dertien jaar oude Plan van Transformatie maakt het echter
      ook voor grote industriële bedrijven mogelijk zich er te vestigen, en ook daar steekt de gemeente nu een stokje voor.'
    - 'passage: Viruswaarheid-vrienden getuigen bij strafzaak Willem Engel



      ROTTERDAM (ANP) - De rechtbank in Rotterdam gaat vrijdag verder met de strafzaak tegen Willem Engel, die terechtstaat
      voor opruiing. Twee compagnons van Engel (45) komen naar de zitting voor een getuigenverhoor, evenals een vrouw die
      na een oproep van Engel ging ‘koffiedrinken’ bij de woning van burgemeester Hubert Bruls van Nijmegen.



      Viruswaarheid-jurist Jeroen Pols wordt opgeroepen als getuige, omdat hij Engel adviseerde bij het schrijven van de vermeende
      opruiende tweets die nu onder een vergrootglas liggen. Een andere coryfee van Viruswaarheid, Mordechai Krispijn, mag
      getuigen over wat er is gebeurd tijdens manifestaties op 21 en 28 juni 2020 op het Malieveld, die waren verboden. Engel
      kwam toch op persoonlijke titel en nodigde via Twitter iedereen uit dat ook te gaan doen. Ruim vierhonderd mensen werden
      op die 21 juni gearresteerd, na het uitbreken van ongeregeldheden.



      Eind vorig jaar werd een collectieve aangifte van initiatiefnemer Norbert Dikkeboom, die door 22.581 mensen was ondertekend,
      tegen Engel ingediend bij het Openbaar Ministerie in Rotterdam. Het OM vervolgt de Rotterdammer vooralsnog alleen voor
      opruiing, bijvoorbeeld voor een tweet waarin hij mensen opriep medewerkers van prikbussen te fotograferen. En voor zijn
      oproep na het sluiten van een restaurant in Nijmegen door burgemeester Bruls. "Bruls begaat een misdrijf in zijn rol
      als minidictatortje. Wederom ambtsmisdrijf. Morgen koffie drinken bij de ambtswoning", twitterde Engel.'
