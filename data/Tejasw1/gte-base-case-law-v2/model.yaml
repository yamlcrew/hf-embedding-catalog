- source_sentence: How does the court determine the validity of land acquisition when it comes to property rights and the
    classification of land as waste or arable?
  sentences:
  - '**1. Key Legal Issues and Holdings:**


    * **Land Acquisition Act of 1894:** The main legal issue is the interpretation and application of the Land Acquisition
    Act of 1894, specifically Sections 4, 5-A, 6, 16, and 17.

    * **Public Purpose:** The court considers whether the acquisition of land for a limestone quarry is a public purpose,
    as declared by the State Government.

    * **Jurisdiction:** The case revolves around the jurisdiction of the State Government to acquire land under Section 17(1)
    and (4) of the Act, and the applicability of Section 5-A of the Act.

    * **Property Rights:** The court considers the property rights of the zamindar, including the rights to subsoil and mineral
    resources.


    **2. Significant Facts of the Case:**


    * The land in dispute is a forest area with a large number of trees, and the State Government declared it as needed for
    a public purpose.

    * The land was taken possession of by the Collector under Section 17(1) of the Act, which the court finds to be ultra
    vires.

    * The State Government directed the Collector to take possession of the land without making a preliminary finding that
    it is waste or arable land.

    * The land was not provided with any compensation for the limestone removed.

    * The zamindar had ancestral rights to the land, and the Government''s grant of land to the Raja in 1781 and 1803 did
    not reserve any mineral rights for the Government.


    **3. Court''s Ruling:**


    * The Supreme Court upholds the High Court''s decision to quash the notifications issued by the State Government under
    Sections 4 and 6 of the Act.

    * The court holds that the land is not waste or arable land, and therefore, the State Government had no authority to direct
    the Collector to take possession of it under Section 17(1) of the Act.

    * The court also finds that the State Government''s decision to apply the provisions of Section 17(4) of the Act was ultra
    vires, as it was not a valid exercise of power.

    * The court rules that the zamindar has property rights to the land, including subsoil and mineral resources.


    **4. Citations:**


    * **Smt Somavanti v. State of Punjab**, [1964] 2 SCR 383

    * **King Emperor v. Shibnath Banerjee**, AIR 1922 PC 147

    * **Jaichand Lal Sethia v. State of West Bengal**, AIR 1963 SC 1015

    * **Estate and Trust Agencies Ltd. v. Singapore Improvement Trust**


    **Additional Key Points:**


    * The court references various precedents, including **Ranjit Singh v. Kali Dasi Debi**, to establish the property rights
    of the zamindar to the land and subsoil minerals.

    * The court also considers the subsequent events, proceedings, and conduct of the parties over a long period of time,
    which supports the interpretation of the sanads.

    * The court holds that the State Government has no jurisdiction to apply the provisions of Section 17(1) and (4) of the
    Act to the land in dispute and to order that the provisions of Section 5-A of the Act will not apply to the land.

    * The court orders that the notifications of the State Government dated October 4, 1950 and December 12, 1950 are ultra
    vires and should be quashed.

    * The court also orders that the further proceedings taken in the land acquisition case after the issue of the notification
    should be quashed, including the award dated January 7, 1952 and the reference made to civil court under Section 18 of
    the Act.'
  - '**1. Key Legal Issues and Holdings:**


    * **Applicability of Section 13 of the Indian Income Tax Act, 1922:** The main legal issue is the interpretation of the
    proviso to Section 13, which deals with the computation of income, profits, and gains in accordance with the method of
    accounting regularly employed by the assessee.

    * **Wasting Asset:** The court considered the impact of a wasting asset, such as a cinematograph film, on the computation
    of taxable profits.

    * **Stock Valuation:** The court held that the value of the unexpired exploitation rights of the film should be taken
    into account when computing the taxable profits of the firm.


    **2. Significant Facts of the Case:**


    * The respondents were a firm constituted under a deed dated December 12, 1947.

    * The firm acquired the exploitation rights for a cinematograph film "Apoorva Chinthameni" for Rs 1,00,000.

    * The firm filed a voluntary return declaring a net profit of Rs 28,643 for the year 1948-49.

    * The Income Tax Officer estimated the value of the unexpired exploitation rights at Rs 65,000 and computed the net profits
    of the firm at Rs 93,642.

    * The firm challenged the valuation of the exploitation rights, and the case was referred to the High Court.


    **3. Court''s Ruling:**


    * The High Court held that the Income Tax Officer had no power to force a different system of accounting on the assessee,
    and the firm''s method of accounting was acceptable.

    * The court reduced the valuation of the unexpired exploitation rights to Rs 40,000.

    * The court held that the Income Tax Officer had not complied with the provisions of Section 13 of the Income Tax Act,
    1922, and the assessment made by the Income Tax Officer was incorrect.


    **4. Citations:**


    * **Section 10 of the Indian Income Tax Act, 1922**

    * **Section 13 of the Indian Income Tax Act, 1922**

    * **Section 2(15) of the Indian Income Tax Act, 1922**

    * **Secretary, Board of Revenue, Madras v. Arunachal Chettiar**

    * **CIT v. Sarangpur Cotton Manufacturing Company Ltd., Ahmedabad**

    * **CIT v. Mcmillan & Co.**'
  - '**1. Key Legal Issues and Holdings:**


    * **Transfer of Land:** The main legal issue is the transfer of land by the tenant to the respondent Nos. 3 to 9, and
    subsequently to the respondent No. 2, which was in breach of the provisions of the Gujarat Tenancy and Agricultural Land
    Act, 1948.

    * **Section 43 and 32(R) of the Tenancy Act:** The court considered the provisions of Section 43 and 32(R) of the Tenancy
    Act, which deal with the transfer of land by tenants.

    * **Post-Facto Non-Agricultural Use Permission:** The court also considered the issue of post-facto non-agricultural use
    permission, and whether the respondent No. 2 was entitled to such permission.


    **2. Significant Facts of the Case:**


    * The land in question was given to one Baldevbhai Atmarambhai as a new tenure land under Section 43 of the Gujarat Tenancy
    and Agricultural Land Act, 1948.

    * The land was sold to one Vaidehi Park Cooperative Housing Society, and subsequently to the respondent No. 2 - Radhaswami
    Co-operative Society.

    * The transfer of land was in breach of the provisions of Section 43 and 32(R) of the Tenancy Act.

    * The respondent No. 2 had applied for post-facto non-agricultural use permission, and was willing to pay the premium.


    **3. Court''s Ruling:**


    * The court upheld the order of the Gujarat Revenue Tribunal, which had allowed the revision application filed by the
    respondent No. 2.

    * The court directed the Collector to consider the application of the respondent No. 2 for post-facto non-agricultural
    use permission, on the condition that they pay the premium.

    * The court refused to interfere with the direction given by the Tribunal, and dismissed the petition.


    **4. Citations:**


    * **Himmatbhai Amrabhai Sagathiya v. State of Gujarat Through Principal Secretary (Appeals)**, Special Civil Application
    No. 3238 of 2010

    * **Gohil Jesangbhai Raysangbhai v. State of Gujarat**, reported in (2014) 5 SCC 199.'
- source_sentence: In what circumstances can third parties challenge decisions made by Administrative Tribunals, and what
    remedies are available to them?
  sentences:
  - '**1. Key Legal Issues and Holdings:**


    * **Administrative Tribunals Act, 1985:** The main legal issue is the interpretation of Section 22(3)(f) of the Act, which
    deals with the power of review by an Administrative Tribunal.

    * **Power of Review:** The court considered the scope of review by an Administrative Tribunal, holding that it is similar
    to the power granted to a civil court under Order 47, Rule 1 of the Code of Civil Procedure, 1908.

    * **Scope of Review:** The court held that review is not permissible after the dismissal of a Special Leave Petition (SLP)
    by the Supreme Court, as the order of the Tribunal becomes final and binding.


    **2. Significant Facts of the Case:**


    * **Gopabandhu Biswal''s Case:** The case revolves around the promotion of Gopabandhu Biswal, an Assistant Commandant
    in the Orissa Military Police, to the Indian Police Service (IPS) cadre.

    * **Tribunal''s Decision:** The Central Administrative Tribunal, Cuttack, held that the post of Deputy Superintendent
    of Police and Assistant Commandant of the Orissa Military Police constituted a single cadre prior to 5-11-1980.

    * **Review Applications:** Several review petitions were filed by third parties, challenging the Tribunal''s decision.


    **3. Court''s Ruling:**


    * **Review of Tribunal''s Decision:** The Supreme Court held that the Tribunal was not entitled to review its earlier
    judgment dated 24-12-1991 in TA No. 1 of 1989.

    * **Limitation of Review:** The court held that review is not permissible after the dismissal of an SLP by the Supreme
    Court, and the Tribunal''s decision becomes final and binding.

    * **Remedy for Third Parties:** The court held that third parties can file separate applications before the Tribunal in
    their own cases, but review is not a viable option.


    **4. Citations:**


    * **State of Maharashtra v. Prabhakar Bhikaji Ingle** (1996) 3 SCC 463

    * **Sree Narayana Dharmasanghom Trust v. Swami Prakasananda** (1997) 6 SCC 78

    * **K. Ajit Babu v. Union of India** (1997) 6 SCC 473'
  - '**1. Key Legal Issues and Holdings:**


    * **Appointment and Recruitment:** The main legal issue is the appointment and recruitment process under the Bihar State
    Electricity Board.

    * **Right to Appointment:** The court considered the right of candidates to be appointed even if a vacancy exists.

    * **Merit List and Panel:** The court held that the employer is not bound to offer unfilled vacancies to candidates next
    below the selected candidates in the merit list.

    * **Waiting List:** The court also held that the employer is not bound to prepare a waiting list in addition to the panel
    of selected candidates.

    * **Scheduled Tribe Candidate:** The court considered the case of a Scheduled Tribe candidate who was appointed despite
    a dispute over his status, and held that the employer''s decision to appoint him was valid.


    **2. Significant Facts of the Case:**


    * The Bihar State Electricity Board (appellant) advertised 100 vacant posts of Operators in 1986 and 70 vacant posts of
    Assistant Operators.

    * A written test and interviews were held, and a panel of 22 candidates was prepared for appointment.

    * 18 out of 22 selected candidates did not turn up, leaving 18 vacancies unfilled.

    * Respondents 1 to 7, who had applied pursuant to the 1986 advertisement and were on the merit list at Serial No. 23 and
    downwards, moved the High Court for appointment against the unfilled vacancies.

    * In a separate case, a Scheduled Tribe candidate was selected against a post reserved for a Scheduled Tribe candidate,
    but the respondent Board doubted his status, leading to a dispute.

    * The dispute was resolved in favour of the Scheduled Tribe candidate, who was found to be a member of the Scheduled Tribe,
    and he was appointed by the High Court.


    **3. Court''s Ruling:**


    * The Supreme Court upheld the decision of the High Court, which had set aside the order of the Division Bench of the
    Supreme Court.

    * The court held that the respondents did not have an indefeasible right to appointment, and the employer was not bound
    to offer the unfilled vacancies to candidates next below the selected candidates in the merit list.

    * The court also held that the employer was not bound to prepare a waiting list in addition to the panel of selected candidates.

    * In the case of the Scheduled Tribe candidate, the court held that the employer''s decision to appoint him was valid
    despite the dispute over his status.


    **4. Citations:**


    * **Shankarsan Dash v. Union of India**, (1991) 3 SCC 47

    * **Jai Narain Ram v. State of U.P.**, (1996) 1 SCC 332

    * **Purushottam v. Chairman, MSEB**, (1999) 6 SCC 49'
  - '**1. Key Legal Issues and Holdings:**


    * **Jurisdiction of the Court:** The main legal issue is the interpretation of the jurisdiction of the court to entertain
    the Award under the Arbitration Act, 1940.

    * **Section 31(4) of the Act:** The court held that Section 31(4) of the Act confers exclusive jurisdiction on the court
    to which an application is made in any reference, ousting the jurisdiction of any other court.

    * **Section 14(2) of the Act:** The court also considered Section 14(2) of the Act, which provides for the filing of the
    Award in the court, and held that the arbitrator must file the Award in the court that would have jurisdiction to entertain
    the suit.

    * **Court''s Control over Arbitration Proceedings:** The court held that when this Court appoints an arbitrator, it retains
    complete control over the arbitration proceedings, and the Award must be filed in this Court.


    **2. Significant Facts of the Case:**


    * The dispute arose from a contract for the construction of a building between the appellant and the 1st respondent.

    * The parties entered into an arbitration agreement, and the 2nd respondent was appointed as the sole arbitrator.

    * The 2nd respondent was later replaced by the 3rd respondent, and the arbitrator made the Award and filed it in the Delhi
    High Court.

    * The 1st respondent moved a petition to the Supreme Court, seeking a declaration that the Award should be filed in the
    Supreme Court.

    * The court considered the principles from various cases, including Kumbha Mawji, Union of India v. Surjeet Singh Atwal,
    and Garikapatti Veeraya v. N. Subbiah Choudhury.


    **3. Court''s Ruling:**


    * The Supreme Court held that the court which would have jurisdiction to entertain the suit forming the subject-matter
    of the reference would have jurisdiction to entertain the Award.

    * The court held that the arbitrator must file the Award in the court that would have jurisdiction to entertain the suit,
    and that this Court has exclusive jurisdiction to entertain the Award.

    * The court rejected the argument that the right of appeal under Article 136 would be denied if the Award is filed in
    the Supreme Court.


    **4. Citations:**


    * **Ct.A.Ct. Nachiappa Chettiar v. Ct.A.Ct. Subramaniam Chettiar**, (1960) 2 SCR 209

    * **State of M.P. v. Saith & Skelton (P) Ltd.**, (1972) 1 SCC 702

    * **Garikapatti Veeraya v. N. Subbiah Choudhury**, 1957 SCR 488

    * **Kumbha Mawji v. Union of India**

    * **Union of India v. Surjeet Singh Atwal**'
- source_sentence: 'What are the legal implications of preventive detention under the COFEPOSA Act regarding the communication
    of grounds for detention?

    2. How does Article 22(5) of the Constitution protect the rights of individuals in preventive detention cases?

    3. What responsibilities do the Advisory Board and the Central Government have when it comes to considering representations
    made by individuals detained under preventive detention laws?'
  sentences:
  - "**1. Key Legal Issues and Holdings:**\n\n* **Ad-hoc Promotion:** The court considered the applicant's eligibility for\
    \ ad-hoc promotion to the grade of CIT, taking into account the following factors:\n\t+ Whether the promotion of the officer\
    \ will be against public interest.\n\t+ Whether the charges are grave enough to warrant continued denial of promotion.\n\
    \t+ Whether there is any likelihood of the case coming to a conclusion in the near future.\n\t+ Whether the delay in the\
    \ finalization of proceedings, departmental or in the court of law, is directly or indirectly attributed to the Government\
    \ servant concerned.\n\t+ Whether there is any likelihood of misuse of official position which the Government servant\
    \ may occupy after the ad-hoc promotion, which may adversely affect the conduct of the departmental case/criminal prosecution.\n\
    * **Sanction for Prosecution:** The court considered the validity of the sanction for prosecution against the applicant.\n\
    * **Public Interest and Protection of Accused:** The court weighed the public interest against the protection of the accused\
    \ in the grant of sanction for prosecution.\n* **Malafide and Contemptuous Conduct:** The court found malafide and contemptuous\
    \ conduct of the respondents and malice in law proved.\n* **Doctrine of Res Judicata:** The court applied the doctrine\
    \ of res judicata to prevent re-agitation of the issue.\n\n**2. Significant Facts of the Case:**\n\n* The applicant, Ashok\
    \ Kumar Aggarwal, was suspended in 1999 and the suspension was revoked in 2014.\n* The applicant was entitled to salary\
    \ and allowances from 2012 to 2014.\n* The respondent's department had issued charge sheets against the applicant in 2006\
    \ and 2011, which were challenged by the applicant.\n* The CVC issued guidelines on the grant of sanction for prosecution,\
    \ which were followed by the respondent's department.\n* The Hon'ble Supreme Court found malafide and contemptuous conduct\
    \ of the respondents and malice in law proved in its judgment dated 22.11.2013.\n* The applicant's juniors were promoted\
    \ as Additional Commissioner of Income Tax and Commissioner of Income Tax.\n* The applicant was considered for grant of\
    \ ad-hoc promotion earlier on multiple occasions, but the CBI recommended that he should not be considered for promotion\
    \ due to the serious nature of the cases against him.\n\n**3. Court's Ruling:**\n\n* The Central Administrative Tribunal\
    \ (CAT) revoked the suspension of the applicant w.e.f. 12.01.2012.\n* The applicant was entitled to salary and allowances\
    \ from 12.01.2012 to 10.01.2014.\n* The respondents were directed to pay the applicant's entitlement within two months.\n\
    * The applicant's case for ad-hoc promotion was allowed, and he was promoted as per the OM dated 14.09.1992.\n* The CAT\
    \ directed the respondents to complete the consideration for ad-hoc promotion of the applicant within eight weeks of the\
    \ receipt of a certified copy of the order.\n\n**4. Citations:**\n\n* **SI Roop Lal v. Lt. Governor through Chief Secretary,\
    \ Delhi**, (2000) 1 SCC 644\n* **Tribhuivandas Purshottamdas Thakur v. Ratilal Motilal Patel**, (1968) 1 SCR 455 : (AIR\
    \ 1968 SC 372)\n* **Lala Bhagwan v. Ram Chand**"
  - "**1. Key Legal Issues and Holdings:**\n\n* **Preventive Detention:** The case revolves around the legality of the preventive\
    \ detention of the appellant under the Conservation of Foreign Exchange and Prevention of Smuggling Activities Act, 1974\
    \ (COFEPOSA Act).\n* **Section 3(3) COFEPOSA Act:** The main legal issue is the interpretation of Section 3(3) of the\
    \ Act, which deals with the communication of grounds of detention.\n* **Preventive Detention under Article 22(5):** The\
    \ case also involves the interpretation of Article 22(5) of the Constitution, which deals with the right of a person to\
    \ make a representation against an order of detention.\n* **Representation to the Advisory Board:** The court held that\
    \ the Advisory Board was duty-bound to consider the representation made by the detenu, and the Central Government was\
    \ also required to consider the representation, as per the Constitution.\n\n**2. Significant Facts of the Case:**\n\n\
    * The appellant was apprehended at the airport and US dollars worth Rs 1.39 lakhs were recovered from his person.\n* Foreign\
    \ currency equivalent to 5.34 lakhs of rupees was also recovered from his brother.\n* The order of detention was passed\
    \ on 25-3-1994, and the grounds of detention were served on 30-3-1994.\n* The appellant made a representation to the Advisory\
    \ Board, which was not addressed to the Central Government.\n* The Central Government disposed of the representation on\
    \ 12-7-1995, after a delay of 12 months.\n\n**3. Court's Ruling:**\n\n* The High Court dismissed the writ petition filed\
    \ by the appellant.\n* The Supreme Court upheld the decision of the High Court and held that:\n\t+ The delay in serving\
    \ the grounds of detention did not infringe Section 3(3) of the Act.\n\t+ The Central Government was not obliged to consider\
    \ the representation made to the Advisory Board.\n\t+ The delay in disposing of the representation did not vitiate the\
    \ order of detention.\n\n**4. Citations:**\n\n* **Haru Das Gupta v. State of W.B.**, (1972) 1 SCC 639\n* **Gracy v. State\
    \ of Kerala**, (1991) 2 SCC 1"
  - '**1. Key Legal Issues and Holdings:**


    * **Dowry and Cruelty:** The case revolves around allegations of dowry demands and cruelty by the husband (petitioner)
    towards his wife.

    * **Section 498-A IPC:** The main legal issue is the application of Section 498-A of the Indian Penal Code, 1860, which
    deals with cruelty by the husband or his relatives towards a married woman.

    * **Regularization of Daily Wagers:** The case also involves the regularization of daily wagers in the Forest Department
    of the State of Gujarat.

    * **Article 226 of the Constitution:** The court''s decision is guided by Article 226 of the Constitution of India, which
    deals with the power of the High Court to issue directions, orders, or writs for the enforcement of the fundamental rights
    conferred by Part III of the Constitution.


    **2. Significant Facts of the Case:**


    * The case involves the regularization of daily wagers in the Forest Department of the State of Gujarat.

    * The petitioners, daily wagers, have been working in the Forest Department for several years.

    * The State Government had passed a resolution in 1988 to regularize daily wagers in other government departments, but
    not in the Forest Department.

    * The petitioners have been asserting their rights for a long time and have been dragged into multiple rounds of litigation.

    * The State Government had passed an order in 2011 rejecting the petitioners'' representation for regularization, which
    was challenged in a Miscellaneous Civil Application.

    * The petitioners have placed on record the scheme framed by the Maharashtra State, Revenue and Forest Department for
    daily wagers of their Forest Department, which is similar to the Government Resolution dated 17.10.1988.


    **3. Court''s Ruling:**


    * The High Court upheld the decision of the learned Single Judge to quash the order passed by the Principal Secretary,
    Forests and Environment Department, State of Gujarat, on April 21, 2011.

    * The court directed the State Government to frame a scheme for giving quasi-permanent status to the daily wagers in compliance
    with the judgment dated October 29, 2010.

    * The court also reiterated the direction to the State Government to consider the case of the petitioners for regularization,
    afresh, in light of the facts of each individual case.

    * The court noted that the State Government''s defense that the order passed in Special Civil Application was not revived
    and the order was challenged in Miscellaneous Civil Application does not appeal to it.


    **4. Citations:**


    * **State of Gujarat v. PWD Employees Union**, (2013) 12 SCC 417

    * **Government Resolution dated 17.10.1988**

    * **Department of Agriculture and Cooperation, State of Gujarat Resolution dated 20.12.2005**

    * **Scheme framed by the Maharashtra State, Revenue and Forest Department for daily wagers of their Forest Department**'
- source_sentence: How does the identification of suspects in low visibility conditions impact the credibility of witness
    testimonies in criminal proceedings?
  sentences:
  - '**1. Key Legal Issues and Holdings:**


    * **Local Inspection:** The main legal issue revolves around the legality of the local inspection conducted by the High
    Court judges under Section 539-B of the Criminal Procedure Code.

    * **Proper Appreciation of Evidence:** The court''s holding emphasizes the importance of properly appreciating the evidence
    on record, which was not done by the High Court judges in this case.

    * **Identification in Darkness:** The court''s ruling highlights the significance of identifying the assailants in the
    dark and the impossibility of doing so based on the High Court''s findings.


    **2. Significant Facts of the Case:**


    * **Incident:** The alleged murder occurred on December 24, 1971, at approximately 3:30 a.m.

    * **Witnesses:** Raja Ram (PW 2) and Dwarika (PW 3) were eyewitnesses to the incident.

    * **High Court''s Visit:** The High Court judges conducted a local inspection at a place with no artificial light on January
    11, 1974, at 7:30 p.m.

    * **Identification:** The High Court judges found it difficult to recognize faces even within a foot, leading them to
    reject the prosecution evidence.


    **3. Court''s Ruling:**


    * **Local Inspection:** The High Court''s local inspection was deemed illegal, as it was not conducted at the actual site
    of the alleged crime or any other place necessary for appreciating the evidence.

    * **Rehearing:** The case was remanded to the High Court for rehearing and disposal within three weeks.

    * **Proper Appreciation of Evidence:** The court emphasized the importance of properly appreciating the evidence on record,
    which was not done by the High Court judges.


    **4. Citations:**


    * **Section 539-B CrPC:** The court cited this section, which allows judges to conduct a local inspection for the purpose
    of properly appreciating the evidence on record.

    * **Cases:** The court referred to several decisions of High Courts, which held that the omission of recording a memorandum
    of relevant facts observed during a local inspection was a mere irregularity.'
  - '**1. Key Legal Issues and Holdings:**


    * **Seniority and Promotion:** The case revolves around the issue of seniority and promotion of Sales Tax Officers Class
    I in the Sales Tax Department of the State of Maharashtra.

    * **Service Law:** The main legal issue is the application of the Maharashtra Sales Tax Officers Class I (Recruitment)
    Rules, 1982, and the Maharashtra Services (Regulation of Seniority) Rules, 1982.

    * **Interpretation of Statutes:** The court considered the interpretation of the word "may" in Rule 4-A of the Recruitment
    Rules, which provided that the Government may, in consultation with the Public Service Commission, make appointments in
    relaxation of the prescribed quota.


    **2. Significant Facts of the Case:**


    * The appellants are direct recruits as Sales Tax Officers Class I, appointed after following the prescribed procedure.

    * The respondents are departmental promotees to the post of Sales Tax Officers Class I.

    * The Government of Maharashtra filled 747 posts of Sales Tax Officers Class I en bloc by giving promotions to the promotees
    in violation of the statutory quota rules.

    * The appointments of the promotees were provisional and fortuitous, and their period of service was excluded in computing
    their seniority.

    * The Government of Maharashtra inserted Rule 4-A retrospectively, allowing for appointments to be made in relaxation
    of the quota rule.

    * The Tribunal held that the Government did not make efforts to make appointments by nomination for more than three years
    and that the promotees'' appointments were fortuitous.


    **3. Court''s Ruling:**


    * The High Court upheld the appeal and quashed the seniority lists published in 1991, 1993, and 1994.

    * The court directed the State Government to prepare a fresh seniority list of promotees and nominees (direct recruits)
    on the basis of dates of appointment.

    * The court held that the period of fortuitous service will have to be excluded in computing the seniority of the promotees.


    **4. Citations:**


    * **Keshav Chandra Joshi v. Union of India**, 1992 Supp (1) SCC 272 : 1993 SCC (L&S) 694 : (1993) 24 ATC 545'
  - '**1. Key Legal Issues and Holdings:**


    * **Mines and Minerals Regulation and Development Act, 1957:** The case revolves around the interpretation of Section
    9(3) of the Act, which deals with the power of the Central Government to amend the Second Schedule and enhance or reduce
    the rate of royalty in respect of any mineral.

    * **Section 9(3) Proviso:** The main legal issue is the interpretation of the proviso to sub-sec. (3) of sec. 9, which
    prohibits the Central Government from enhancing the rate of royalty in respect of any mineral more than once during any
    period of four years.

    * **Royalty Rates:** The court considered the appropriateness of the royalty rates for limestone, specifically the inferior
    grade, and whether the Central Government had violated the provisions of Section 9(3) by enhancing the rate of royalty.


    **2. Significant Facts of the Case:**


    * The petitioner companies have been quarrying limestone from leased areas and paying royalty at the rate of Re. 0.75
    per tonne since 1962.

    * The Central Government issued a notification in 1968, dividing limestone into two categories: superior grade and inferior
    grade, with different royalty rates.

    * The petitioner companies continued to pay royalty at the rate of Re. 0.75 per tonne, treating the entire limestone as
    falling within the inferior category.

    * The Central Government issued a subsequent notification in 1970, abolishing the two categories and increasing the royalty
    rate for limestone to Rs. 1.25 per tonne.


    **3. Court''s Ruling:**


    * The High Court held that the Central Government''s power under Section 9(3) to enhance the rate of royalty in respect
    of any mineral includes the power to enhance the rate for one category of a particular mineral, even if it has the effect
    of enhancing the rate for another category.

    * The court ruled that the 1968 notification had the effect of enhancing the royalty rate for limestone, and therefore,
    the Central Government was precluded from enhancing the rate again within a period of four years.

    * The court held that the 1970 notification was invalid as it was issued in violation of the provisions of Section 9(3)
    and the proviso thereto.


    **4. Citations:**


    * **Bagalkot Udyog Ltd., Bombay v. Union of India (AIR 1971 Mysore 363)**

    * **Associated Cement Companies Ltd. v. The Union of India (Civil Writ Petition No. 1343 of 1970, decided on 6th September
    1971)**'
- source_sentence: What legal considerations are involved in determining a person's citizenship status when foreign nationality
    is claimed in criminal proceedings?
  sentences:
  - '**1. Key Legal Issues and Holdings:**


    * **Acquiescence in Arbitrator''s Appointment:** The Supreme Court held that if parties to a reference agree beforehand
    to the method of appointment or acquiesce in the appointment made with full knowledge of the circumstances, they cannot
    object to such appointment as invalidating subsequent proceedings.

    * **Succession of Arbitrator:** The court ruled that the successor arbitrator was competent to complete the arbitration
    proceedings, despite the predecessor arbitrator''s entry into reference.

    * **Principles of Natural Justice:** The court rejected the contention that there was a violation of the principles of
    natural justice, as the parties had knowledge of the change of the incumbent and had acquiesced in the proceedings.

    * **Award''s Validity:** The court held that the award was unassailable, as it did not contain any patent mistake of law
    or gross misstatement of facts resulting in miscarriage of justice or equity.


    **2. Significant Facts of the Case:**


    * The petitioner company undertook the work of widening and strengthening pavements in National Highways No. 7, Madurai-Kanyakumari
    Road.

    * The work was divided into fourteen Reaches, and fourteen separate agreements were entered into between the petitioner
    and the Superintending Engineer, National Highways, Tirunelveli.

    * The predecessor arbitrator, Thiru Mohan, entered into reference but was transferred before completing the award.

    * The successor arbitrator, Thiru J.R. Cornelius, completed the arbitration proceedings with the knowledge and consent
    of the petitioner.


    **3. Court''s Ruling:**


    * The Supreme Court dismissed the special leave petitions and upheld the High Court''s judgment, which had upheld the
    District Judge''s dismissal of the challenge to the award.

    * The court held that the award was unassailable and that the parties had acquiesced in the appointment of the successor
    arbitrator.

    * The court rejected the contentions that the successor arbitrator had no jurisdiction to complete the arbitration proceedings
    and that there was a violation of the principles of natural justice.


    **4. Citations:**


    * **Chowdhury Murtaza Hossein v. Mussumat Bibi Bechunnissa**, 3 IA 209 : 3 Sar 663 : 3 Suther 342

    * **Jupiter General Insurance Co. Ltd. v. Corporation of Calcutta**, AIR 1956 Cal 470 : 1955 Cri LJ 1243

    * **N. Challappan v. Secretary, Kerala State Electricity Board**, (1975) 1 SCC 289

    * **Prasun Roy v. Calcutta Metropolitan Development Authority**, (1987) 4 SCC 217

    * **Firm Madanlal Roshanlal Mahajan v. Hukumchand Mills Ltd.**, (1967) 1 SCR 105 : AIR 1967 SC 1030'
  - '**1. Key Legal Issues and Holdings:**


    * **Market Value Determination:** The case revolves around the determination of market value of land acquired under the
    Land Acquisition Act, 1894.

    * **Section 4 of the Act:** The main legal issue is the application of Section 4 of the Act, 1894, which deals with the
    notification for land acquisition.

    * **Fair Market Value:** The court considered the principles for determining the fair market value of the land acquired,
    including the geographical situation, existing use, proximity to roads and highways, and market value of adjacent lands.


    **2. Significant Facts of the Case:**


    * The land acquisition was initiated by the Special Land Acquisition Officer (SLAO) at the rate of Rs. 357.13 per bigha.

    * The land owners/claimants sought a reference under Section 18 of the Land Acquisition Act, 1894, and the Tribunal enhanced
    the market value to Rs. 4,896/- per bigha.

    * The Tribunal allowed 5% solatium and damages under Section 48-A, etc.

    * The land in question was situated in an industrially developed area, near Panki Railway Station and Kalpi Road.


    **3. Court''s Ruling:**


    * The High Court upheld the principles laid down by the Apex Court for determining the fair market value of the land acquired.

    * The court held that the Tribunal had rightly enhanced the market value to Rs. 4,896/- per bigha.

    * The court also held that the Tribunal had considered the relevant factors, including the size of the land, proximity
    to roads and highways, and market value of adjacent lands.

    * The court directed the Tribunal to consider the above-mentioned factors while determining the market value of the land.


    **4. Citations:**


    * **Chimanlal Hargovinddas v. Special Land Acquisition Officer**, 1

    * **V.M. Salgoacar and brother Ltd. v. Union of India**, 1

    * **Shakuntalabai (Smt.) v. State of Maharashtra**, 2

    * **Meerut Development Authority through its Secretary v. Basheshwar Dayal (since deceased) through his L. Rs**, First
    Appeal No. 454/2003 and other connected matters, decided on 1.8.2013'
  - '**1. Key Legal Issues and Holdings:**


    * **Determination of Citizenship:** The main legal issue is the determination of the respondent''s citizenship status,
    specifically whether he had acquired Pakistani nationality and lost Indian citizenship.

    * **Section 9 of the Citizenship Act:** The court considered the application of Section 9 of the Citizenship Act, 1955,
    which requires the Central Government to determine whether a person has acquired foreign citizenship.

    * **Jurisdiction of Criminal Courts:** The court held that the jurisdiction of criminal courts to record a conviction
    or acquittal is limited when the question of acquisition of foreign citizenship is involved.

    * **Burden of Proof under Section 9 of the Foreigners'' Act:** The court noted that the burden of proof under Section
    9 of the Foreigners'' Act, 1946, is immaterial when an issue triable exclusively by the Central Government has properly
    arisen.


    **2. Significant Facts of the Case:**


    * The respondent was charged with overstaying in India after his permit expired, allegedly due to his foreigner status.

    * The respondent claimed to be an Indian citizen, born in Gujarat, and had gone to Pakistan as a minor after a quarrel
    with his father.

    * The respondent produced credible evidence to prove his Indian citizenship, including his birth certificate and school
    records.

    * The prosecution relied on the respondent''s Pakistani passport and visa application, which stated that he had migrated
    to Pakistan in 1950.


    **3. Court''s Ruling:**


    * The High Court had acquitted the respondent, finding that the prosecution had failed to prove that he had acquired Pakistani
    nationality.

    * The Supreme Court upheld the acquittal, holding that the prosecution had proceeded with the case despite knowing that
    the question of acquisition of foreign citizenship was involved.

    * The court quashed the charge against the respondent, allowing him to be discharged.


    **4. Citations:**


    * **Kulathil Mammu v. State of Kerala**, (1966) 3 SCR 706 : AIR 1966 SC 1614 : 1966 Cri LJ 1217

    * **Shanno Devi v. Mangal Sain**, (1961) 1 SCR 576 : AIR 1961 SC 58 : (1961) 1 SCJ 201

    * **State of A.P. v. Abdul Khader**, (1962) 1 SCR 737 : AIR 1961 SC 1467 : 1961 (2) Cri LJ 573

    * **Abdul Sattar v. State of Gujarat**, AIR 1965 SC 810 : (1964) 2 SCJ 461 : (1965) 1 Cri LJ 759

    * **Akbar Khan v. Union of India**, (1962) 1 SCR 779 : AIR 1962 SC 70 : (1962) 1 SCJ 665'
