  sentences:
  - '**1. Key Legal Issues and Holdings:**


    * **Trademark Infringement:** The primary legal issue is whether the term "Split View" can be considered a trademark or
    is merely descriptive of a software feature.

    * **Prior Use:** The court considered whether Apple Inc. or the respondents (Rohit Singh and Vyooh Low Level Computing
    LLP) had prior use of the term "Split View" as a trademark.

    * **Passing Off:** The court examined whether Apple''s use of "Split View" constitutes passing off, given the distinction
    between a product and a feature within an operating system.

    * **Descriptive Use vs. Trademark Use:** The court evaluated whether "Split View" is a descriptive term or a trademark,
    noting that if it is merely descriptive, it cannot be claimed as a trademark.

    * **Distinctiveness:** The court assessed whether the term "Split View" had acquired a secondary meaning or distinctiveness,
    thereby qualifying as a trademark.


    **2. Significant Facts of the Case:**


    * Rohit Singh developed a software product called "Split View" in 2005, which allowed users to simultaneously work on
    multiple windows on their computer screen.

    * Apple Inc. launched an update to their operating system (Mac OS X El Capitan and iOS 9) in December 2015, which included
    a feature called "Split View."

    * Rohit Singh claimed that Apple''s use of "Split View" infringed on his trademark and sought relief from Apple.

    * Apple argued that "Split View" is a descriptive term used by various software developers and not a trademark.

    * Apple highlighted that its use of "Split View" is integrated within its operating system and not sold as a standalone
    product.

    * Apple provided examples of other entities using "Split View" to describe multi-window functionality.

    * The court noted that the respondents had established prior use of the term "Split View" as a trademark for their software
    product.

    * The court recognized the distinction between a product and a feature within an operating system, which is relevant to
    the passing off claim.

    * The court found that the term "Split View" was used descriptively and not as a trademark by either party.


    **3. Court''s Ruling:**


    * The High Court vacated the ex-parte interim order granted by the learned Single Judge.

    * The court directed Apple to file a written statement.

    * The court noted that the respondents had established prior use of the term "Split View" as a trademark for their software
    product.

    * The court recognized the distinction between a product and a feature within an operating system, which is relevant to
    the passing off claim.

    * The court concluded that the term "Split View" is descriptive and cannot be claimed as a trademark by either party.


    **4. Citations:**


    * **Kavi Raj Pandit v. Durga Dutt Sharma**, AIR 1965 SC 1980

    * **Carlsberg India Pvt. Ltd. v. Radico Khaitan Ltd.**, 2012 (49) PTC 54

    * **Automatic Electric v. R.K. Dhawan**, 57 (1995) DLT 49

    * **Laxmikant V. Patel v. Chetanbhai Shah**, (2002) 3 SCC 65

    * **Cadila Healthcare Ltd. v. Gujarat Cooperative Milk Marketing Federation Ltd.**, ILR (2010) II Del 85

    * **Uniply Industries Ltd. v. Karnataka Industrial Development Corporation**, (2001) 5 SCC 95, AIR 2001 SC 2083'
