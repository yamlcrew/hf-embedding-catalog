      * The Scheme provides for the issuance of new equity shares by the Transferee Company to the equity shareholders of
      the Transferor Company.

      * The Scheme also provides for the transfer of assets and liabilities from the Transferor Company to the Transferee
      Company.

      * There are no secured creditors, but there are approximately 1,250 unsecured creditors.


      **3. Court''s Ruling:**


      * The Tribunal directed the Applicant Company to issue notices to the equity shareholders, unsecured creditors, and
