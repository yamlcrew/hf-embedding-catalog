      **4. Citations:**


      * **Companies Act, 2013**

      * **Companies (Compromises, Arrangements and Amalgamations) Rules, 2016**'
    - '**1. Key Legal Issues and Holdings:**


      * **Amalgamation of Companies:** The case revolves around the proposed amalgamation of Fizza Plastics Private Limited
      (Transferor Company) with Krypton Datamatics Limited (Transferee Company) under Sections 230-232 of the Companies Act,
      2013.

      * **Scheme of Amalgamation:** The court considered the applicability of the Scheme of Amalgamation, including its compliance
      with the Accounting Standards and the requirements of the Companies Act, 2013.

      * **Dispensation of Convening Meetings:** The court held that the requirement of convening meetings of shareholders
