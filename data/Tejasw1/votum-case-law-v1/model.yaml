    * **Amalgamation of Companies:** The case revolves around the proposed amalgamation between Crown Beers India Private
    Limited (Transferor Company) and Anheuser Busch InBev India Limited (Transferee Company) under sections 230 to 232 of
    the Companies Act, 2013.

    * **Scheme of Amalgamation:** The main legal issue is the approval of the Scheme of Amalgamation, which includes the transfer
    of assets and liabilities from the Transferor Company to the Transferee Company.

    * **Shareholder Approval:** The court considered the requirements for shareholder approval, including the notice period,
    proxy voting, and quorum.


    **2. Significant Facts of the Case:**


    * The Transferor Company is engaged in the business of manufacturing, brewing, packaging, distribution, marketing, sale,
    export, and import of beer, liquor, and other alcoholic products.

    * The Scheme provides for the issuance of new equity shares by the Transferee Company to the equity shareholders of the
    Transferor Company.

    * The Scheme also provides for the transfer of assets and liabilities from the Transferor Company to the Transferee Company.

    * There are no secured creditors, but there are approximately 1,250 unsecured creditors.


    **3. Court''s Ruling:**


    * The Tribunal directed the Applicant Company to issue notices to the equity shareholders, unsecured creditors, and regulatory
    authorities.

    * The Tribunal also directed the Applicant Company to serve notices to the concerned Income Tax Authority and the Central
    Government.

    * The Tribunal dispensed with the meeting of the creditors and directed the Applicant Company to file an affidavit of
    service.


    **4. Citations:**


    * **Companies Act, 2013**

    * **Companies (Compromises, Arrangements and Amalgamations) Rules, 2016**'
