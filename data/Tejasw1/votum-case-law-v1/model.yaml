      * The Share Exchange Ratio has been determined in accordance with the Report on Valuation of Shares & Share Exchange
      Ratio dated 5th December 2017.

      * The Board of Directors of each company has unanimously approved the proposed Scheme of Amalgamation.


      **3. Court''s Ruling:**


      * The court allowed the application for dispensing with the requirement of convening meetings of shareholders and creditors
      of the applicant companies.

      * The court directed the applicant companies to comply with the applicable law, including forms and formats contained
      in the Companies (Compromises, Arrangements, Amalgamations) Rules, 2016.

      * The court also directed the applicant companies to send notices to the Central Government, Income Tax Authorities,
      Registrar of Companies, and other sectoral regulators or authorities as required under sub-section (5) of section 230
