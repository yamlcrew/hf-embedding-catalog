  - source_sentence: '**1. Key Legal Issues and Holdings:**


      * **Construction of a Will:** The main legal issue is the interpretation of the will left by Kothandarama Ayyar, a Hindu
      inhabitant of the district of Tanjore, to determine the disposition of his properties.

      * **Adoption and Inheritance:** The case revolves around the application of the will''s provisions regarding adoption
      and inheritance, particularly with regards to the properties in dispute.

      * **Construction of Specific Provisions:** The court considered the construction of specific provisions in the will,
      including Paras 5, 13, and other relevant paragraphs.


      **2. Significant Facts of the Case:**


      * The testator, Kothandarama Ayyar, died on 25-4-1905, leaving behind his widow, Parbati, and two daughters, Nagammal
      and Gnanambal.

      * The testator executed his last will on 13-3-1905, giving his widow authority to adopt a son of Gnanambal or a nephew''s
      son of the testator.

      * The will provides for the distribution of the testator''s properties among his family members and charities.

      * The dispute revolves around the properties in Kothangudi and Injigudi, which are mentioned in Paras 5 and 13 of the
      will.


      **3. Court''s Ruling:**


      * The Supreme Court upheld the construction of the will by the High Court, which held that Para 5 of the will was not
      operative in the present case.

      * The court rejected the argument that Para 5 was meant to be operative only if Gnanambal''s son was adopted by the
      widow.

      * The court held that the testator''s main desire was that his widow should adopt the son of his daughter Gnanambal,
      and that the provisions made for the two daughters, the widow, and the adoptive mother were meant to be applicable under
      all three contingencies referred to in the will.

      * The court allowed the appeal, setting aside the judgment and decree of the High Court, and restored the judgment and
      decree of the Subordinate Judge.


      **4. Citations:**


      * **Venkata Narasimha Appa Row v. Parthasarathy Appa Row**, Privy Council

      * **Edwards, In re, Jones v. Jones**, Romer, L.J.

      * **Venkata Narasimha Appa Row v. Parthasarathy Appa Row**, (1913-14) 41 IA 51

      * **Jones v. Jones**, (1906) 1 Ch 570 (CA)'
