      \ln g_i^t$. To convert this into a loss, we multiply this by $-1$, which gives a loss of $\sum_{t=1}^T (- \ln g_i^t)$.
      Hence, to do almost as good as the best investment, we make our cost vectors to be $m_i^t = - \ln g_i^t$. Now, from
      the analysis of Hedge algorithm in the lecture, it follows that for all $i \in [N]$, $$\sum_{t = 1}^T p^{(t)}_i \cdot
      m^{(t)} \leq \sum_{t = 1}^{T} m^{(t)}_i + \frac{\ln N}{\epsilon} + \epsilon T.$$ Taking the exponent in both sides,
      We have that \begin{align*} \exp \left( \sum_{t = 1}^T p^{(t)}_i \cdot m^{(t)} \right) &\leq \exp \left( \sum_{t = 1}^{T}
      m^{(t)}_i + \frac{\ln N}{\epsilon} + \epsilon T \right)\\ \prod_{t = 1}^T \exp( p^{(t)}_i \cdot m^{(t)} ) &\leq \exp(
      \ln N / \epsilon + \epsilon T) \prod_{t = 1}^T \exp(m^t_i) \\ \prod_{t = 1}^T \prod_{i \in [N]} (1 / g_i^t)^{p^{(t)}_i}
      &\leq \exp( \ln N / \epsilon + \epsilon T) \prod_{t = 1}^{T} (1/g^{(t)}_i) \end{align*} Taking the $T$-th root on both
      sides, \begin{align*} \left(\prod_{t = 1}^T \prod_{i \in [N]} (1 / g_i^t)^{p^{(t)}_i} \right)^{(1/T)} &\leq \exp( \ln
      N / \epsilon  T + \epsilon ) \left( \prod_{t = 1}^{T} (1/g^{(t)}_i) \right)^{(1/T)}. \end{align*} This can be interpreted
      as the weighted geometric mean of the loss is not much worse than the loss of the best performing investment.
