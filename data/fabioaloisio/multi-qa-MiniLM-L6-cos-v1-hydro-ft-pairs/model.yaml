  - 'observacao : para consultar o colaborador pelo nome ou cpf, clique no matchcode, informe o nome ou cpf do colaborador
    e clique em “ avancar ” : passo 04 : para criar uma nova conta de sistema para a identidade, clique no botao novo ou tecle
    f5. passo 05 : clique no mechcode do campo id sistema e informe o sistema, depois clique no campo login do usuario e informe
