    ( desktop ou notebook ) devidamente configurado com acesso a internet e pacote office ; b ) acesso a ferramenta microsoft
    dynamics crm 365 completo ( perfil administrador de sistema ) : c ) nome do usuario, aplicativos que ira remover ; d )
