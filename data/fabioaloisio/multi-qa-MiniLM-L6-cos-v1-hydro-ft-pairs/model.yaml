    do usuario na conta de sistema ad, clique em salvar : sera aberta uma pop - up : ao clicar em “ nao ”, apresentara pop
    - up do passo 06. ao clicar em “ sim ”, apresentara pop - up abaixo para confirmacao e validacao do e - mail.'
  - 'a lista de acessos ativos no sistema sera gerada pelo time de digital - acessos a lista deve ser respondida pelo gestor
    de negocio validando a lista ativa ou informando quais inativacoes deverao ser realizadas o time de digital - acessos
    registrara as alteracoes a partir de chamados no sistema de itsm de digital em nome do gestor de gq - digital. o time
    de digital - acessos executara a atualizacao e finalizara o chamado com status de resolvido. referencias descricao das
    atividades a inativacao de usuario no sistema sap e portal e realizada de forma automatica, atraves das transacoes : zbo127,
    zbo104 e zbo106.'
