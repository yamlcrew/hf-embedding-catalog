widgetData:
- source_sentence: What was the increase in research and development expenses for fiscal year 2023 primarily due to?
  sentences:
  - We recognize tax benefits from uncertain tax positions only if we believe that it is more likely than not that the tax
    position will be sustained on examination by the taxing authorities based on the technical merits of the position.
  - For fiscal 2023, the increase in research and development expenses was primarily due to an increase of approximately $547
    million in employee-related cost, including stock-based compensation expense.
  - In the first quarter of 2023, the divestiture of the company’s Longwall business was finalized, resulting in an unfavorable
    impact to operating profit of $586 million, primarily a non-cash item driven by the release of accumulated foreign currency
    translation.
- source_sentence: 'What is the primary function of Magic: The Gathering Arena?'
  sentences:
  - There is no goodwill remaining for Vitacost.com as of January 28, 2023.
  - 'Magic: The Gathering Arena is the free-to-play online adaptation of the MAGIC: THE GATHERING card game where players
    can explore the fantasy worlds of Magic: The Gathering Arena, play a variety of game formats to collect cards and test
    skills against friends and other players around the world, or enter in-game tournaments.'
  - AMD has returned to the high end desktop (HEDT) segment with Ryzen Threadripper™ 7000 Series processors featuring up to
    64 cores.
- source_sentence: How did Comcast's Residential Connectivity & Platforms business perform financially in 2023?
  sentences:
  - In 2023, Comcast's Residential Connectivity & Platforms business saw consistent revenue compared to the previous year,
    with increases in Adjusted EBITDA primarily from reduced other expenses and programming expenses. The Adjusted EBITDA
    margin also rose from 36.1% to 37.5%.
  - In 2021, 2022, and 2023, the cash paid for amounts included in the measurement of operating lease liabilities was $76
    million, $104 million, and $107 million respectively.
  - The increase in general, administrative and other expenses in 2023 was primarily driven by recent acquisitions.
- source_sentence: What percentage of worldwide net sales were represented by executive members in 2023?
  sentences:
  - Any excess of the purchase price (consideration transferred) over the estimated fair values of net assets acquired is
    recorded as goodwill.
  - Item 8 of the Annual Report on Form 10-K covers financial statements and supplementary data.
  - of Executive members represented approximately 72.8% of worldwide net sales in 2023.
- source_sentence: How much cash collateral did AT&T receive on a net basis during 2023?
  sentences:
  - During 2023, we received approximately $220 of cash collateral, on a net basis.
  - NIKE Direct revenues increased 22%, driven by digital sales growth of 23% and comparable store sales growth of 28%.
  - For the year ended August 26, 2023, the effective tax rate was 20.2%.
