    - ประมวลกฎหมายแพ่งและพาณิชย์ มาตรา 1013 อันห้างหุ้นส่วนหรือบริษัทนั้น ท่านกำหนดเป็นสามประเภท คือ (1) ห้างหุ้นส่วนสามัญ
      (2) ห้างหุ้นส่วนจำกัด (3) บริษัทจำกัด
  - source_sentence: สิทธิในการเรียกให้งดใช้ชื่อตนเองในชื่อห้างหุ้นส่วนจะเกิดขึ้นเมื่อใดตามมาตรา 1047
    sentences:
    - จะเกิดขึ้นได้ก็ต่อเมื่อหุ้นส่วนที่เหลือทุกคนลงมติเห็นชอบให้เปลี่ยนชื่อห้างเท่านั้น
    - ประมวลกฎหมายแพ่งและพาณิชย์ มาตรา 1047 ถ้าชื่อของผู้เป็นหุ้นส่วนซึ่งออกจากหุ้นส่วนไปแล้วยังคงใช้เรียกขานติดเป็นชื่อห้างหุ้นส่วนอยู่
      ท่านว่าผู้เป็นหุ้นส่วนนั้นชอบที่จะเรียกให้งดใช้ชื่อของตนเสียได้
    - ประมวลกฎหมายแพ่งและพาณิชย์ มาตรา 1008 ภายในบังคับแห่งบทบัญญัติทั้งหลายในประมวลกฎหมายนี้ เมื่อใดลายมือชื่อในตั๋วเงินเป็นลายมือปลอมก็ดี
      เป็นลายมือชื่อลงไว้โดยที่บุคคลซึ่งอ้างเอาเป็นเจ้าของลายมือชื่อนั้นมิได้มอบอำนาจให้ลงก็ดี ท่านว่าลายมือชื่อปลอมหรือลงปราศจากอำนาจเช่นนั้นเป็นอันใช้ไม่ได้เลย
      ใครจะอ้างอิงอาศัยแสวงสิทธิอย่างหนึ่งอย่างใดเพื่อยึดหน่วงตั๋วเงินไว้ก็ดี เพื่อทำให้ตั๋วนั้นหลุดพ้นก็ดี หรือเพื่อบังคับการใช้เงินเอาแก่คู่สัญญาแห่งตั๋วนั้นคนใดคนหนึ่งก็ดี
      ท่านว่าไม่อาจจะทำได้เป็นอันขาด เว้นแต่คู่สัญญาฝ่ายซึ่งจะพึงถูกยึดหน่วงหรือถูกบังคับใช้เงินนั้นจะอยู่ในฐานเป็นผู้ต้องตัดบทมิให้ยกข้อลายมือชื่อปลอม
      หรือข้อลงลายมือชื่อปราศจากอำนาจนั้นขึ้นเป็นข้อต่อสู้ แต่ข้อความใด ๆ อันกล่าวมาในมาตรานี้ ท่านมิให้กระทบกระทั่งถึงการให้สัตยาบันแก่ลายมือชื่อซึ่งลงไว้โดยปราศจากอำนาจแต่หากไม่ถึงแก่เป็นลายมือปลอม
  - source_sentence: หากผู้เป็นหุ้นส่วนทั้งหมดให้ความยินยอม ห้างหุ้นส่วนจดทะเบียนสองแห่งจะควบรวมกันได้หรือไม่?
    sentences:
    - ประมวลกฎหมายแพ่งและพาณิชย์ มาตรา 1073 ห้างหุ้นส่วนจดทะเบียนห้างหนึ่งจะควบเข้าเป็นอันเดียวกับห้างหุ้นส่วนจดทะเบียนอีกห้างหนึ่งก็ได้
      โดยความยินยอมของผู้เป็นหุ้นส่วนทั้งหมด เว้นแต่จะได้ตกลงกันไว้เป็นอย่างอื่น
    - ประมวลกฎหมายแพ่งและพาณิชย์ มาตรา 1061 เมื่อห้างหุ้นส่วนเลิกกันแล้วก็ให้จัดการชำระบัญชี เว้นแต่จะได้ตกลงกันให้จัดการทรัพย์สินโดยวิธีอื่นในระหว่างผู้เป็นหุ้นส่วนด้วยกัน
      หรือว่าห้างหุ้นส่วนนั้นศาลได้พิพากษาให้ล้มละลาย ถ้าการเลิกห้างหุ้นส่วนนั้นได้เป็นไปโดยที่เจ้าหนี้เฉพาะตัวของผู้เป็นหุ้นส่วนคนใดคนหนึ่งได้ให้คำบอกกล่าวก็ดี
      หรือโดยที่ผู้เป็นหุ้นส่วนคนใดคนหนึ่งล้มละลายก็ดี ท่านว่าจะงดการชำระบัญชีเสียได้ต่อเมื่อเจ้าหนี้คนนั้น หรือเจ้าพนักงานรักษาทรัพย์ยินยอมด้วย
      การชำระบัญชีนั้น ให้ผู้เป็นหุ้นส่วนทั้งหมดด้วยกันจัดทำหรือให้บุคคลอื่นซึ่งผู้เป็นหุ้นส่วนได้ตั้งแต่งขึ้นนั้นเป็นผู้จัดทำ
      การตั้งแต่งผู้ชำระบัญชี ให้วินิจฉัยชี้ขาดโดยคะแนนเสียงข้างมากของผู้เป็นหุ้นส่วน
    - การควบห้างหุ้นส่วนจดทะเบียนต้องกระทำโดยความยินยอมของหุ้นส่วนไม่น้อยกว่าสามในสี่ของจำนวนหุ้นส่วนทั้งหมดเท่านั้น
