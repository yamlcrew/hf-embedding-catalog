widgetData:
- source_sentence: ลักษณะของการ 'ตกลงเข้ากันเพื่อกระทำกิจการร่วมกัน' ในมาตรา 1012 หมายถึงอะไร
  sentences:
  - ประมวลกฎหมายแพ่งและพาณิชย์ มาตรา 1052 บุคคลผู้เข้าเป็นหุ้นส่วนในห้างหุ้นส่วนย่อมต้องรับผิดในหนี้ใด ๆ ซึ่งห้างหุ้นส่วนได้ก่อให้เกิดขึ้นก่อนที่ตนเข้ามาเป็นหุ้นส่วนด้วย
  - ประมวลกฎหมายแพ่งและพาณิชย์ มาตรา 1012 อันว่าสัญญาจัดตั้งห้างหุ้นส่วนหรือบริษัทนั้น คือสัญญาซึ่งบุคคลตั้งแต่สองคนขึ้นไปตกลงเข้ากันเพื่อกระทำกิจการร่วมกัน
    ด้วยประสงค์จะแบ่งปันกำไรอันจะพึงได้แต่กิจการที่ทำนั้น
  - หมายถึงการที่บุคคลคนหนึ่งจ้างอีกคนหนึ่งมาทำงานให้โดยที่ลูกจ้างไม่มีส่วนได้เสียในกำไรของกิจการ
- source_sentence: การจัดตั้งสำนักงานจดทะเบียนห้างหุ้นส่วนและบริษัทต้องดำเนินการโดยใช้เครื่องมือทางกฎหมายประเภทใด?
  sentences:
  - ประมวลกฎหมายแพ่งและพาณิชย์ มาตรา 1014 บรรดาสำนักงานสำหรับจดทะเบียนห้างหุ้นส่วนและบริษัททั้งหลายนั้น ให้รัฐมนตรีเจ้ากระทรวงซึ่งบัญชาการจดทะเบียนห้างหุ้นส่วนและบริษัทเป็นผู้ออกกฎข้อบังคับจัดตั้งขึ้น
  - การจัดตั้งสำนักงานจดทะเบียนต้องตราเป็นพระราชกฤษฎีกาโดยคำแนะนำของคณะรัฐมนตรี
  - ประมวลกฎหมายแพ่งและพาณิชย์ มาตรา 1008 ภายในบังคับแห่งบทบัญญัติทั้งหลายในประมวลกฎหมายนี้ เมื่อใดลายมือชื่อในตั๋วเงินเป็นลายมือปลอมก็ดี
    เป็นลายมือชื่อลงไว้โดยที่บุคคลซึ่งอ้างเอาเป็นเจ้าของลายมือชื่อนั้นมิได้มอบอำนาจให้ลงก็ดี ท่านว่าลายมือชื่อปลอมหรือลงปราศจากอำนาจเช่นนั้นเป็นอันใช้ไม่ได้เลย
    ใครจะอ้างอิงอาศัยแสวงสิทธิอย่างหนึ่งอย่างใดเพื่อยึดหน่วงตั๋วเงินไว้ก็ดี เพื่อทำให้ตั๋วนั้นหลุดพ้นก็ดี หรือเพื่อบังคับการใช้เงินเอาแก่คู่สัญญาแห่งตั๋วนั้นคนใดคนหนึ่งก็ดี
    ท่านว่าไม่อาจจะทำได้เป็นอันขาด เว้นแต่คู่สัญญาฝ่ายซึ่งจะพึงถูกยึดหน่วงหรือถูกบังคับใช้เงินนั้นจะอยู่ในฐานเป็นผู้ต้องตัดบทมิให้ยกข้อลายมือชื่อปลอม
    หรือข้อลงลายมือชื่อปราศจากอำนาจนั้นขึ้นเป็นข้อต่อสู้ แต่ข้อความใด ๆ อันกล่าวมาในมาตรานี้ ท่านมิให้กระทบกระทั่งถึงการให้สัตยาบันแก่ลายมือชื่อซึ่งลงไว้โดยปราศจากอำนาจแต่หากไม่ถึงแก่เป็นลายมือปลอม
- source_sentence: บริษัทจำกัดถือเป็นหนึ่งในประเภทขององค์กรธุรกิจตามมาตรา 1013 หรือไม่?
  sentences:
  - บริษัทจำกัดไม่ได้ระบุไว้ในมาตรา 1013 แต่ระบุไว้ในกฎหมายว่าด้วยการประกอบธุรกิจของคนต่างด้าว
  - ประมวลกฎหมายแพ่งและพาณิชย์ มาตรา 1006 การที่ลายมือชื่ออันหนึ่งในตั๋วเงินเป็นลายมือปลอม ย่อมไม่กระทบกระทั่งถึงความสมบูรณ์แห่งลายมือชื่ออื่น
    ๆ ในตั๋วเงินนั้น
  - ประมวลกฎหมายแพ่งและพาณิชย์ มาตรา 1013 อันห้างหุ้นส่วนหรือบริษัทนั้น ท่านกำหนดเป็นสามประเภท คือ (1) ห้างหุ้นส่วนสามัญ (2)
    ห้างหุ้นส่วนจำกัด (3) บริษัทจำกัด
- source_sentence: สิทธิในการเรียกให้งดใช้ชื่อตนเองในชื่อห้างหุ้นส่วนจะเกิดขึ้นเมื่อใดตามมาตรา 1047
  sentences:
  - จะเกิดขึ้นได้ก็ต่อเมื่อหุ้นส่วนที่เหลือทุกคนลงมติเห็นชอบให้เปลี่ยนชื่อห้างเท่านั้น
  - ประมวลกฎหมายแพ่งและพาณิชย์ มาตรา 1047 ถ้าชื่อของผู้เป็นหุ้นส่วนซึ่งออกจากหุ้นส่วนไปแล้วยังคงใช้เรียกขานติดเป็นชื่อห้างหุ้นส่วนอยู่
    ท่านว่าผู้เป็นหุ้นส่วนนั้นชอบที่จะเรียกให้งดใช้ชื่อของตนเสียได้
  - ประมวลกฎหมายแพ่งและพาณิชย์ มาตรา 1008 ภายในบังคับแห่งบทบัญญัติทั้งหลายในประมวลกฎหมายนี้ เมื่อใดลายมือชื่อในตั๋วเงินเป็นลายมือปลอมก็ดี
