widgetData:
- source_sentence: The sales contracts for Israel contain formulas that generally reflect an initial base price subject to
    price indexation, Brent-linked or other, over the life of the contract.
  sentences:
  - What was the change in HP's net deferred tax assets from 2022 to 2023?
  - What are the pricing mechanisms for crude oil sales contracts in Israel?
  - What was the total net income tax benefit HP received related to foreign tax audit matters?
- source_sentence: The FCA imposes severe penalties for the knowing and improper retention of overpayments from government
    programs. In addition, the defendant must follow certain notification and repayment processes within 60 days of identifying
    and quantifying an overpayment.
  sentences:
  - What does Note 21 pertain to in this report?
  - What types of penalties does the FCA impose for the knowing and improper retention of overpayments from government payors?
  - What impact did discrete tax items have on the tax provision in 2023 compared to 2022?
- source_sentence: The expected long-term rate of return is evaluated on an annual basis. We consider a number of factors
    when setting assumptions with respect to the long-term rate of return, including current and expected asset allocation
    and historical and expected returns on the plan asset categories. Actual asset allocations are regularly reviewed and
    periodically rebalanced to the targeted allocations when considered appropriate.
  sentences:
  - How is the expected long-term rate of return on plan assets determined?
  - What is the accumulated benefit obligation for AT&T's pension plans as of December 31, 2023?
  - What is the management philosophy of Johnson & Johnson known as?
- source_sentence: The functional currency of our foreign entities is the currency of the primary economic environment in
    which the entity operates.
  sentences:
  - By what percent did Other Income (Expense) change in 2023 compared to 2022?
  - What are the Canadian class actions against Equifax seeking in relation to the 2017 cybersecurity incident?
  - What is the functional currency for a company's foreign entities?
- source_sentence: Our products compete with other commercially available products based primarily on efficacy, safety, tolerability,
    acceptance by doctors, ease of patient compliance, ease of use, price, insurance and other reimbursement coverage, distribution
    and marketing.
  sentences:
  - What are the main factors influencing competition for the company's products?
  - What was the impact of restructuring charges in 2022 on the company and what changes occurred in 2023?
  - What are the penalties for non-compliance with Brazil's data protection laws?
