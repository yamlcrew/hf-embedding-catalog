widgetData:
- source_sentence: Mwanamume aliyepangwa vizuri anasimama kwa mguu mmoja karibu na pwani safi ya bahari.
  sentences:
  - mtu anacheka wakati wa kufua nguo
  - Mwanamume fulani yuko nje karibu na ufuo wa bahari.
  - Mwanamume fulani ameketi kwenye sofa yake.
- source_sentence: Mwanamume mwenye ngozi nyeusi akivuta sigareti karibu na chombo cha taka cha kijani.
  sentences:
  - Karibu na chombo cha taka mwanamume huyo alisimama na kuvuta sigareti
  - Kitanda ni chafu.
  - Alipokuwa kwenye dimbwi la kuogelea mvulana huyo mwenye ugonjwa wa albino alijihadhari na jua kupita kiasi
- source_sentence: Mwanamume kijana mwenye nywele nyekundu anaketi ukutani akisoma gazeti huku mwanamke na msichana mchanga
    wakipita.
  sentences:
  - Mwanamume aliyevalia shati la bluu amegonga ukuta kando ya barabara na gari la bluu na gari nyekundu lenye maji nyuma.
  - Mwanamume mchanga anatazama gazeti huku wanawake wawili wakipita karibu naye.
  - Mwanamume huyo mchanga analala huku Mama akimwongoza binti yake kwenye bustani.
- source_sentence: Wasichana wako nje.
  sentences:
  - Wasichana wawili wakisafiri kwenye sehemu ya kusisimua.
  - Kuna watu watatu wakiongoza gari linaloweza kugeuzwa-geuzwa wakipita watu wengine.
  - Wasichana watatu wamesimama pamoja katika chumba, mmoja anasikiliza, mwingine anaandika ukutani na wa tatu anaongea nao.
- source_sentence: Mwanamume aliyevalia koti la bluu la kuzuia upepo, amelala uso chini kwenye benchi ya bustani, akiwa na
    chupa ya pombe iliyofungwa kwenye mojawapo ya miguu ya benchi.
  sentences:
  - Mwanamume amelala uso chini kwenye benchi ya bustani.
  - Mwanamke anaunganisha uzi katika mipira kando ya rundo la mipira
  - Mwanamume fulani anacheza dansi kwenye klabu hiyo akifungua chupa.
