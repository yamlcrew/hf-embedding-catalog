  - Mwanamke na watoto na kukaa chini.
  - Mwanamke huyo anakimbia.
  - Watu wanasafiri kwa baiskeli.
- source_sentence: Mtoto mdogo anaruka mikononi mwa mwanamke aliyevalia suti nyeusi ya kuogelea akiwa kwenye dimbwi.
  sentences:
  - Mtoto akiruka mikononi mwa mwanamke aliyevalia suti ya kuogelea kwenye dimbwi.
  - Someone is holding oranges and walking
  - Mama na binti wakinunua viatu.
- source_sentence: Mwanamume na mwanamke wachanga waliovaa mikoba wanaweka au kuondoa kitu kutoka kwenye mti mweupe wa zamani,
    huku watu wengine wamesimama au wameketi nyuma.
  sentences:
  - tai huruka
  - mwanamume na mwanamke wenye mikoba
  - Wanaume wawili wameketi karibu na mwanamke.
