widgetData:
- source_sentence: The audit on Equifax Inc.'s internal control over financial reporting and consolidated financial statements
    as of December 31, 2023, was conducted by Ernst & Young LLP.
  sentences:
  - What percentage of HP's full-time leadership positions were held by women in the fiscal year 2023?
  - What accounting firm conducted the audit on Equifax Inc.'s internal control over financial reporting and consolidated
    financial statements as of December 31, 2023?
  - What was the total net sales reported by Costco Wholesale Corporation for the 53-week period ended September 3, 2023?
- source_sentence: The company recruits and hires using local job fairs, social media, and community service partners, and
    supports employees through competitive pay, benefits, and human capital programs focused on professional growth, diversity,
    equity, and inclusion.
  sentences:
  - What position did Jon Faust hold before becoming the Global Controller at HP?
  - How does the company recruit and support its employees?
  - What was the main driver behind the increase in the provision for credit losses at Bank of America in 2023?
- source_sentence: Management’s Report on Internal Control Over Financial Reporting outlines the responsibility of management
    in maintaining effective internal controls over financial reporting. This involves setting policies, using advanced systems
    for processing transactions, and maintaining a qualified staff to handle financial procedures. Regular assessments and
    corrective measures ensure these controls remain effective.
  sentences:
  - What is the role of management in maintaining internal control over financial reporting at a company?
  - How much cash and cash equivalents did the company have at the end of 2023, and how does this compare to the end of 2022?
  - How does AT&T emphasize diversity in its hiring practices?
- source_sentence: Net cash provided by operating activities increased from $1,681 million in 2022 to $1,946 million in 2023,
    marking a 15.8% increase.
  sentences:
  - Are the consolidated financial statements and accompanying notes part of ITEM 8 in the Annual Report on Form 10-K?
  - What is the expected benefit of the Pasadena Refinery project for Chevron?
  - What was the percentage increase in net cash provided by operating activities from 2022 to 2023?
- source_sentence: As of August 26, 2023, approximately 60 percent of AutoZoners were employed full-time.
  sentences:
  - What percentage of AutoZone employees were employed full-time as of August 26, 2023?
  - What type of information can be found under Item 8?
  - What type of fees are typically included in the management and franchise contracts for hotels, and how are they structured?
