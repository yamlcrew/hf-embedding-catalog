widgetData:
- source_sentence: 'query: **Spezialisierte Werkstoffe und Enzyme für die Industrie - Vertiefungsmodul.**

    **Modulteil 1:** Konzeption und Analyse von immobilisierten Biokatalysatoren

    **Modulteil 2:** Entwicklung von Reaktionssequenzen

    **Modulteil 3:** Verfahrensintensivierung und Scale-up'
  sentences:
  - 'passage: personal skills and development. Personal skills are defined by reference to the effects on the individual''s
    capacity (mental, social etc.). This detailed field covers personal skills programmes not included in 0011 ''Basic programmes
    and qualifications'' or 0021 ''Literacy and numeracy'', giving key competencies and transferable skills. Programmes and
    qualifications with the following main content are classified here: Argumentation and presentation Assertiveness training
    Communication skills Co-operation Development of behavioural capacities Development of mental skills Job-seeking programmes
    Parenting courses Public speaking Self-esteem skills Social competence Time management === Inclusions Education and training
    in leadership in the context of personal development is included here. Education and training related to the work place
    or to work assignments is included in this detailed field if it has more to do with personal development than work development.
    Personal skills courses can be taught at the workplace, but still be classified here based on their content. Programmes
    for people with special needs on how to cope with their daily life are included here'
  - 'passage: chemical engineering and processes. Chemical engineering and processes is the study of planning, designing,
    and developing products and processes where chemical and physical changes occur. It includes designing chemical plants
    and control systems. Programmes and qualifications with the following main content are classified here: Chemical engineering
    Chemical process engineering Laboratory technology Oil/gas/petrochemicals processing Plant and machine operation (processing)
    Process technology === Inclusions Laboratory technology is included here if emphasis is not given to a specific application.'
  - 'passage: therapy and rehabilitation. Therapy and rehabilitation is the study of restoring normal physical conditions
    to those incapacitated by temporary or permanent disability. Programmes and qualifications with the following main content
    are classified here: Dietician programmes Medical massage Nutrition/Dietetics Occupational therapy Physiotherapy Rehabilitation
    Speech therapy'
- source_sentence: 'query: **Zeichensetzung meistern: Souverän und sicher.** Dieser Kurs vermittelt die Grundlagen der deutschen
    Zeichensetzung. Im Fokus steht das System der Satzzeichen (Interpunktion) und deren Anwendung in der Praxis. Das Ziel
    ist ein souveräner Umgang mit der Interpunktion. Umstrittene Sonderfälle werden zwar kurz thematisiert, bilden aber nicht
    den Schwerpunkt des Kurses.'
  sentences:
  - 'passage: marketing and advertising. Marketing and advertising is the study of promoting the exchange processes of goods
    and services between organizations and/or individuals, and the study of consumer behaviour and requirements. It includes
    the study of the role of product development, pricing, distribution, promotion and sales in order to maximise business
    performance. Programmes and qualifications with the following main content are classified here: Advertising Consumer behaviour
    Market research Marketing Merchandising Public relations'
  - 'passage: arts not further defined.'
  - 'passage: biochemistry. Biochemistry, sometimes called Biological chemistry, is the study of the chemistry of living organisms,
    including but not limited to, living matter. Programmes and qualifications with the following main content are classified
    here: Biological chemistry Cell technology Forensic sciences Genetic code (DNA, RNA) studies Genetic engineering Pharmacology
    Tissue culture technology Toxicology Virology === Inclusions Biotechnology is included here.'
- source_sentence: "query: 12 Schritte in die Philosophie – ein Grundkurs. Philosophie ist eine Orientierungswissenschaft.\
    \ Sie fragt nach der Bedeutung der Welt und des Lebens im Ganzen. Philosophinnen und Philosophen suchen nach guten Gründen.\r\
    \nImmanuel Kant zufolge antwortet die Philosophie auf die\r\nFragen: Was kann ich wissen? Was soll ich tun? Was darf ich\
    \ hoffen? Diese drei\r\nFragen führen auf eine vierte: Was ist der Mensch?\r\nEntlang dieser vier Fragen erhalten Sie\
    \ in den 12\r\nvoneinander unabhängigen Kapiteln des Kurses Einblick in einige große Themen\r\nder Philosophie. Elf Philosophen\
    \ und eine Philosophin erläutern ihre Sicht auf\r\nein Thema. Durch die Lektüre ausgewählter Texte von Aristoteles bis\
    \ Martha\r\nNussbaum lernen die Teilnehmer*innen philosophische Primärquellen kennen. Die\r\nanschließenden interaktiven\
    \ Aufgaben dienen der Vertiefung des Gelesenen.Hier geht's zum Kursportrait in der OPEN vhb-Themenwelt: https://open.vhb.org/themenwelt/kursportraits/12-schritte-in-die-philosophie/"
  sentences:
  - 'passage: philosophy and ethics. Philosophy and ethics is the study of philosophy, ethics and related subjects dealing
    with the conception of life. Programmes and qualifications with the following main content are classified here: Ethics
    Logic Morals Philosophy'
  - 'passage: motor vehicles, ships and aircraft. Motor vehicles, ships and aircraft is the study of designing, developing,
    producing, maintaining, diagnosing faults in, repairing and servicing motor vehicles, including earth moving equipment
    and agriculture machines, ships, trains and aircraft. Typical is the combination of studies in both metal structures and
    motors. Programmes and qualifications with the following main content are classified here: Aerospace engineering Aircraft
    engineering Aircraft maintenance Automotive electrical systems Automotive engineering Avionics Coachwork Marine engineering
    Motorcycle engineering Panel beating Shipbuilding Train repair and maintenance Vehicle building and repairing Vehicle
    varnishing/spraying === Inclusions Study of vehicle electrical systems is included here.'
  - 'passage: statistics. Statistics is the study of collecting, describing, arranging and analysing numerical data. The study
    of probability theory and actuarial science is included. Programmes and qualifications with the following main content
    are classified here: Actuarial science Probability theory Statistics, applied Survey design Survey sampling === Inclusions
    Study of mathematical (theoretical) statistics is included here.'
