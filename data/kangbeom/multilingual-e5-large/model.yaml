widgetData:
- source_sentence: 'query: 어디서 입력 신호의 SNR이 엄청 낮게 나타나?'
  sentences:
  - 'passage: 클럭잡음 모델을 생성할 때 랜덤데이터를 이용하기 때문에 여러번 시뮬레이션을수행하여 실제 모델에 최대한 근접한 데이터를 얻어야 한다.'
  - 'passage: 둘 이상의 다른 네트워크 접속 인터페이스를 갖는 다중모드 단말에서 MIH 는 미디어에 독립적으로 이기종 망간 핸드오버를 지원하기 위해 하위 물리 계층의 정보를 이용한다.'
  - 'passage: 돌발 잡음은 일반적으로 에너지가 매우 크기 때문에 돌발 잡음이 존재하는 구간에서 입력 신호의 SNR이 매우 낮게 나타난다.'
- source_sentence: 'query: ADPSS는 DPSS를 이용한 채널 보간과 예측에 무엇을 적용한 기법이니?'
  sentences:
  - 'passage: CORVIS의 구성 및 진행 사항기능설명구현 여부카투닝비디오 영상에서 추출한 프레임단위의 이미지들을 흑백만화에서 사용하는 형태로 변환하는 기법이며, Image Abstraction, Stroke
    Generation, Stylization, Texturing의 기법이 적용.구현스타일 폰트인물 또는 사물의 의성어와 의태어를 표현하거나 극중의 분위기를 나타내기 위한 기법.구현말풍선인물의 대사를 표현하기 위해
    사용되며, 다양한종류의 말풍선 형태를 지원.구현스피드 라인인물이나 사물의 속도감을 표현하기 위한 기법.구현배경효과인물의 기분이나 극의 분위기를 표현하기 위한 기법이다. 집중선, 수평선, 그라데이션을 이용한 다양한
    종류의 배경효과를 지원.미구현아이콘특정 개체를 돋보이게 하거나 인물의 심리 상태를 과장되게 표현하는 기법.미구현'
  - 'passage: 실제 전송망과 동기망에서 측정된 원더생성성분은(그림 2)에 나타내었으며, 각 그림의 X축은 MTIE와 TDEV를 계산할 때 사용되는 관측시간(\(\mathrm{sec}\))이고, Y축은 각 관측시간
    별로 계산하여 얻어진 (3)식의 MTIE와 (4)식의 TDEV값을 나타내고 있다.'
  - 'passage: ADPSS는 DPSS를 이용한 채널 보간과 예측에 스무딩을 적용한 기법으로 과정은 다음과 같다.'
- source_sentence: 'query: 디지털 프린터의 취약성 중 복사에서는 데이터 유출을 무엇을 통해 발생할 수 있어?'
  sentences:
  - 'passage: 계속 변화하는 노드 관계를 위한 이웃 노드정보 리스트 구조의 예 노드-X의 이웃정보 리스트 (level / relation )NumberID \BrNum[1][2][3][4][5]\( \mathrm
    { P } _ {\text { parent } } \)\( \mathrm { P } _ {\text { sibling } } \)\( \mathrm { P } _ {\text { child } } \)1A1/P1/P1.0002B2/S2/P0.40.603C2/S3/S01.004E2/S4/C0.20.40.45F3/C3/S00.20.86G3/C4/C001.0노드-X의
    레벨23\( \mathrm { N } _ {\mathrm { p } } \)1.6\( \mathrm { N } _ {\mathrm { s } } \)2.2\( \mathrm { N } _ {\mathrm { c
    } } \)2.2'
  - 'passage: 따라서 인식된 차량에 대한 추적(tracking) 등을 통하여 인식된 차량에 대한 연산을 줄여주는 방법이 필요하다.'
  - 'passage: CIAC-2304에서 보고된 취약성분류취약성팩스메시지 인증이 불가하여 공격자가 중간에서 데이터를 위변조 할 수 있음가입자의 전화번호나 서비스 제공자의 ID를 위변조할 수 있음팩스 기기에 대한 인증이
    되지 않을 경우, 전화번호를 스푸핑할 수 있음팩스 전송 시, 암호화하지 않는 경우 도청을 통해 중요 데이터가 유출될 수 있음잘못된 팩스 설정이나 사용자의 부주의로 인해 시스템이 취약해질 수 있음하드웨어 자원의 한계로
    인해 저장된 데이터가 삭제될 수 있음복사네트워크를 통해 저장 데이터 유출될 수 있음인쇄할 데이터를 위변조하여 인쇄될 수 있음'
- source_sentence: 'query: Number of clusters \( 37 \)의 결과값이 19인 것과 상관있는 Cluster location은 뭐에요?'
  sentences:
  - 'passage: 또한 서비스 세션을 위해 선택되는 디바이스는 사용자의 위치나 업무, 서비스가 요청되는 시기에 따라 수시로 변하게 된다.'
  - 'passage: 이렇게 대리 서명용 개인 키와 공개 키를 생성함으로써 안전하게 대리 서명 권한을 위임 받게 된다.'
  - 'passage: 〈표 \( 2 \)〉 필요한 서브키 스트링 비교 Cluster locationRequired \( \mathrm { SS } \)Number of clusters\( 7 \)\( 19 \)\(
    37 \)Group A\( 1 O L P_ {\text { INTRA } } + 3 O L P_ {\text { INTER } } \)\( 6 \)\( 6 \)\( 6 \)Group B\( 2 O L P_ {\text
