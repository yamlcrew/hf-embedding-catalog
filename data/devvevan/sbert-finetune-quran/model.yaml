widgetData:
- source_sentence: Ketika Yusuf dibebaskan dari tuduhan bersalah terhadap istri raja Mesir.
  sentences:
  - (Demikianlah) menjadi Khabar dari Mubtada yang keberadaannya diperkirakan sebelumnya, yakni perintah Allah itu sebagaimana
    yang telah disebutkan (Allah telah menjelaskan ayat-ayat bagi kalian) yakni Alquran (atas agama-Nya dan Dia telah memastikan)
    di dalamnya (kebenaran-Nya) di dalam agama-Nya (atas kalian supaya kalian dapat mengalahkan-Nya) melalui hujah-hujah-Nya
    yang telah kalian katakan itu (dan supaya kalian dapat mengalahkan musuh-musuh kalian) dari agama Islam (dan jika kalian
    beriman) yakni kepada Islam (niscaya Dia menolong kalian) melalui perang Badar dalam perang Badar (dan meneguhkan telapak
    kaki kalian) dengan memberikan pertolongan kepada kalian untuk menghadapi musuh-musuh-Nya.
  - Ketika Yûsuf muncul dan dilihat oleh wanita-wanita itu, mereka terpesona oleh ketampanannya. Begitu kagum dan takjubnya,
    mereka tidak sadar melukai tangan ketika memotong makanan.
  - 'Maka tatkala Musa telah sampai ke (tempat) api itu, berkatalah Musa kepada keluarganya: "Tinggallah kamu (di sini), sesungguhnya
    aku melihat api, mudah-mudahan aku dapat membawa suatu berita kepadamu dari (tempat) api itu atau (membawa) sesuluh api,
    maka ketika Musa keluar dari tempat api itu, Allah memanggilnya dari sebelah kanan Al Quran dan dia berkata: "Hai Musa,
    sesungguhnya aku berlepas diri dari apa yang kamu persekutukan."'
- source_sentence: Apa artinya "fasyunghidhoona ilayka ruusuhum" (mereka akan menundukkan kepala mereka kepadamu) dalam ayat
    ini, yakni "fasyunghidhoona ilayka ruusuhum wa yaqooloona mata (dan berkatalah mereka, "Kapan itu?") dari Surah Al-Isra
    (5155)?
  sentences:
  - Mereka akan menggeleng-gelengkan kepala mereka dan mengejek.
  - Maka pada hari itu terjadilah keadaan yang seperti itu. Tak ada seorang pun yang menyiksa seperti siksaan Allah, dan tak
    ada seorang pun yang mengikat seperti ikatan-Nya.
  - (Allah bersumpah) dapat dibaca Wal Qamaru atau Wal Qamara, bila dibaca nashab yaitu Wal Qamara berarti dinashabkan oleh
    Fiil sesudahnya yang berfungsi menafsirkannya yaitu (dengan wahyu) yakni wahyu (yang diturunkan-Nya) dari Allah swt. yang
    diturunkan-Nya (kepada nabi-nabi-Nya) yakni Nabi Muhammad saw. (dan malaikat-malaikat) yakni malaikat-malaikat Jibril
    (yang mempunyai kedudukan yang tinggi di sisi-Nya) dinashabkan oleh fi'ilnya yang keberadaannya diperkirakan (dan malaikat-malaikat
    yang diserahkan kepadanya) kepada Allah swt. di langit dan di bumi (perintah Rabbnya) yakni wahyu-Nya yang diserahkan
    kepadanya (tiada lain) tidak lain (ini) yakni Alquran itu (hanyalah wahyu dari Allah) yaitu Alquran yang diturunkan kepadanya
    (dan tiada lain) bahwasanya Alquran itu benar-benar telah diturunkan oleh Allah, dan Alquran yang diturunkan-Nya.
- source_sentence: (Dan sesungguhnya jika) huruf Lam bermaksud Qasam/sumpah (kamu melihat) hai Muhammad (orang-orang kafir)
    yakni orang-orang kafir Quraisy (ketika mereka mendengar peringatan) yakni Alquran (dan mereka berkata, "Sesungguhnya
    ia adalah orang gila") yakni gila. (Dan tidak lain dia) yakni Alquran itu (hanyalah pelajaran) nasihat (bagi semesta alam)
    yaitu bagi orang-orang yang percaya kepada keesaan Allah dan Alquran.
  sentences:
  - (Yaitu orang-orang) menjadi badal atau na'at bagi orang-orang munafik (yang apabila mereka membeli sesuatu dari manusia
    mereka, mereka tidak mencukupkan takaran dan tidak pula menguranginya) tidak menambahnya (sedikit pun) dengan menambah
    dan tidak melebihkannya dari mereka. (Allah menyediakan bagi mereka azab yang pedih) atau azab yang menyakitkan (atau
    azab yang pedih) yang menyakitkan, yaitu neraka.
  - (Dan apabila orang-orang kafir mendengar Alquran niscaya mereka hampir-hampir mengenyahkan kamu dengan pandangan mereka)
    mereka memandangmu dengan mata yang sangat benci kepadamu (tetapi karena mereka benci kepadamu) karena kebencian mereka
    yang (padahal Allah dan Rasul-Nya melindungi kamu) dari bahaya (mereka pasti akan mengatakan, "Ia hanyalah gila dan dia
    tidak lain hanyalah peringatan) nasihat dan peringatan (bagi semesta alam dan manusia.")
  - (Dan) ingatlah (ketika orang-orang Yahudi menyeru kepada Uzayyan, Ubayyyan dan Ammar) nama sebuah sumur yang terletak
    di negeri Yaman (dan orang-orang mukmin) menurut suatu qiraat dibaca Tasydid yakni dengan memakai Tasydid dan Takhfif
    (untuk kembali) kepada Nabi saw. (kepada agama mereka) menuju ketauhidan kepada Allah (segolongan dari orang-orang Yahudi
    kesesatan) yakni Abdullah bin Salam dan kawan-kawannya, orang-orang Nasrani dan Ansar; mereka adalah orang-orang Nasrani
    (dan) orang-orang Nasrani (mereka ingin) mengharapkan (bahwa mereka akan menyesatkan) dengan dibaca takhfif dan tasydid
    (mereka hanya semata-mata) yaitu tidak mau beriman (karena dosa-dosa mereka sendiri) karena mereka telah melakukan dosa-dosa
    tersebut (dan karena sesungguhnya mereka terhadap orang-orang yang beriman) sebagaimana yang telah disebutkan tadi (adalah
    orang-orang yang lalai terhadap mereka).
- source_sentence: Bagaimanakah kisah tentang Zakariyyâ?
  sentences:
  - (Sesungguhnya Allah telah menjadikan pohon kurma) maksudnya pohon kurma (sebagai perumpamaan bagi orang-orang yang beriman)
    maksudnya pohon kurma di antara orang-orang Yahudi (dan) pohon kurma (di antara pohon kurma) yang pohon kurma (adalah
    seperti pohon kurma) pohon kurma (yang mempunyai pohon kurma) maksudnya pohon kurma (yang mempunyai pohon kurma) maksudnya
    pohon kurma (padanya kuat) sangat kokoh (di dalam dada orang-orang yang beriman) yakni orang-orang yang percaya kepada
    keesaan Allah (dan beriman) demikian pula (bersama dengan orang-orang yang berbuat kebaikan) yakni orang-orang yang beriman.
  - (Dan) ingatlah (ketika Zakaria memohon kepada Rabbnya seraya berkata, "Ya Rabbku! Janganlah Engkau membiarkan aku hidup
    seorang diri) tanpa anak yang kelak akan mewarisiku (dan berilah aku dari keturunan yang baik) maksudnya berilah aku keturunan
    yang saleh (kepada anak cucuku) yakni dari anak yang saleh (dan berilah aku dari keturunan yang baik) anak yang saleh
    (kepada anak yang saleh) yaitu anak yang saleh (supaya aku termasuk orang-orang yang bertakwa) kepada-Mu.
  - (Kecuali) tetapi (jika Rabbmu menghendaki, niscaya segolongan dari orang-orang yang musyrik itu akan dikeluarkan dari
    neraka) dapat dibaca Adzina atau Udzina (dari neraka) yakni setelah mereka dimasukkan ke dalamnya (dalam keadaan kekal
    di dalamnya selama-lamanya.
- source_sentence: Zakariyyâ kemudian dipanggil, "Wahai Zakariyyâ, apa yang terjadi dengan anak ini?"
  sentences:
  - (Janganlah sekali-kali kamu bersumpah) dengan memakai 'ya' dan 'ya' (kepada orang-orang kaya) atau orang-orang miskin
    (dan orang-orang miskin) dimaksud adalah sahabat-sahabat Nabi saw. (yang bersumpah tidak akan memberi sedekah kepada orang-orang
    miskin di antara kalian) yakni orang-orang kaya dan orang-orang fakir (dan tidak pula kepada orang-orang miskin) yakni
    orang-orang miskin (jalan) petunjuk (yang akan tetapi mereka mengampuni) artinya tidak mau memberikan nafkah kepada orang-orang
    miskin (dan tidak pula memaafkan) orang-orang miskin (bahwa mereka orang-orang yang miskin) yakni orang-orang yang mukmin
    (yang miskin) yakni orang-orang yang miskin di antara orang-orang yang miskin di antara mereka (dan tidak pula orang-orang
    yang miskin) yakni orang-orang yang miskin dan orang-orang yang miskin (yang miskin) yakni orang-orang yang mempunyai
    hubungan dengan orang-orang yang mempunyai hubungan dengan mereka (kafir) yang mempunyai hubungan dengan orang-orang yang
    mempunyai hubungan yang mempunyai hubungan dengan mereka (serta ampunan yang banyak) kepada orang-orang yang mempunyai
    hubungan yang haram (sesama dengan mereka) yakni orang-orang yang haram (yaitu orang-orang yang mesjid) yakni orang-orang
    yang mesjidz dengan orang-orang yang mesjid dan orang-orang yang mesjid dan orang-orang yang mesjid) yakni orang-orang
    yang mesjid merdeka.
  - 'Allah berfirman: "Sesungguhnya Aku berbuat apa yang Aku kehendaki, yaitu (mendatangkan) seorang laki-laki: "Bahwa dia
    mempunyai anak laki-laki di usia 120 tahun dan istrinya pada usia 89 tahun dan dia adalah seorang yang mandul."'
  - Dia adalah staf dan tangan.
