  - source_sentence: Đối tượng hưởng chính sách ưu đãi đối với công nghiệp hỗ trợ được quy định như thế nào?
    sentences:
    - 1. Hoạt động thương mại là hoạt động nhằm mục đích sinh lợi, bao gồm mua bán hàng hoá, cung ứng dịch vụ, đầu tư, xúc
      tiến thương mại và các hoạt động nhằm mục đích sinh lợi khác.
    - '"Điều 11. Đối tượng và thủ tục xác nhận ưu đãi

      1. Đối tượng ưu đãi:

      Dự án sản xuất sản phẩm công nghiệp hỗ trợ thuộc Danh mục sản phẩm công nghiệp hỗ trợ ưu tiên phát triển: Bao gồm dự
      án đầu tư mới, dự án mở rộng và đổi mới công nghệ có ứng dụng thiết bị mới, quy trình sản xuất mới, sản xuất sản phẩm
      với năng lực sản xuất tăng ít nhất 20%."'
    - Nghị định này áp dụng đối với tổ chức, cá nhân sử dụng năng lượng tại Việt Nam.
  - source_sentence: Quy định bãi bỏ các cụm từ liên quan đến sổ hộ khẩu trong hồ sơ cấp giấy xác nhận thân nhân người có
      công ra sao?
    sentences:
    - 'Điều 5. In, sử dụng mẫu sổ quốc tịch, mẫu giấy tờ về quốc tịch

      1. Mẫu sổ quốc tịch, mẫu giấy tờ về quốc tịch ban hành theo Danh mục tại Điều 3 và Điều 4 của Thông tư này được đăng
      tải trên Cổng thông tin điện tử của Bộ Tư pháp (tại địa chỉ: www.moj.gov.vn), cơ quan có thẩm quyền thụ lý hồ sơ giải
      quyết các việc về quốc tịch được truy cập, tự in để sử dụng.

      2. Người có yêu cầu giải quyết các việc về quốc tịch (sau đây gọi chung là người có yêu cầu) truy cập trên Cổng thông
      tin điện tử của Bộ Tư pháp để in và sử dụng các mẫu Đơn, Bản khai lý lịch, Tờ khai. Trường hợp người có yêu cầu không
      thể tự in thì cơ quan có thẩm quyền thụ lý hồ sơ có trách nhiệm in và phát miễn phí cho người có yêu cầu.'
    - 'Bãi bỏ, thay thế một số cụm từ quy định tại các nghị định

      ...

      4. Bãi bỏ cụm từ “hoặc sổ hộ khẩu đã được cấp trước ngày 01 tháng 7 năm 2021” tại điểm b khoản 1 Điều 116 và cụm từ
      “hoặc sổ hộ khẩu đã được cấp trước ngày 01 tháng 7 năm 2021” tại khoản 3 Điều 130 Nghị định số 131/2021/NĐ-CP ngày 30
      tháng 12 năm 2021 hướng dẫn Pháp lệnh Ưu đãi người có công với cách mạng.'
    - 'Phương pháp tiến hành

      5.1 Yêu cầu chung

      5.1.1 Mẫu hậu kiểm phải được mã hóa và được gieo trồng cùng với mẫu chuẩn của giống đó.

      5.1.2 Chăm sóc và bón phân theo quy định về khảo nghiệm giá trị canh tác và giá trị sử dụng (khảo nghiệm VCU) của loài
      cây trồng tương ứng.

      5.1.3 Không loại bỏ cây khác dạng khỏi ô thí nghiệm.

      5.1.4 Các chỉ tiêu định tính: đánh giá bằng mắt, quan sát trên toàn ô thí nghiệm, trên từng cây hoặc từng bộ phận của
      cây.

      5.1.5 Các chỉ tiêu định lượng: tiến hành lấy mẫu và đánh giá theo quy định về khảo nghiệm VCU của loài cây trồng tương
      ứng.

      ...'
  - source_sentence: Chủ tịch Ủy ban nhân dân cấp xã hay cấp huyện có thẩm quyền xử phạt hành vi uy hiếp tinh thần người tham
      gia hoạt động giáo dục về chăm sóc sức khỏe và sử dụng các dịch vụ y tế vì định kiến giới?
    sentences:
    - 'Thuế suất 0%

      1. Thuế suất 0%: áp dụng đối với hàng hóa, dịch vụ xuất khẩu; hoạt động xây dựng, lắp đặt công trình ở nước ngoài và
      ở trong khu phi thuế quan; vận tải quốc tế; hàng hóa, dịch vụ thuộc diện không chịu thuế GTGT khi xuất khẩu, trừ các
      trường hợp không áp dụng mức thuế suất 0% hướng dẫn tại khoản 3 Điều này.

      Hàng hóa, dịch vụ xuất khẩu là hàng hóa, dịch vụ được bán, cung ứng cho tổ chức, cá nhân ở nước ngoài và tiêu dùng ở
      ngoài Việt Nam; bán, cung ứng cho tổ chức, cá nhân trong khu phi thuế quan; hàng hóa, dịch vụ cung cấp cho khách hàng
      nước ngoài theo quy định của pháp luật.

      a) Hàng hóa xuất khẩu bao gồm:

      - Hàng hóa xuất khẩu ra nước ngoài, kể cả ủy thác xuất khẩu;

      - Hàng hóa bán vào khu phi thuế quan theo quy định của Thủ tướng Chính phủ; hàng bán cho cửa hàng miễn thuế;

      - Hàng hóa bán mà điểm giao, nhận hàng hóa ở ngoài Việt Nam;

      - Phụ tùng, vật tư thay thế để sửa chữa, bảo dưỡng phương tiện, máy móc thiết bị cho bên nước ngoài và tiêu dùng ở ngoài
      Việt Nam;

      - Các trường hợp được coi là xuất khẩu theo quy định của pháp luật:

      + Hàng hóa gia công chuyển tiếp theo quy định của pháp luật thương mại về hoạt động mua, bán hàng hóa quốc tế và các
      hoạt động đại lý mua, bán, gia công hàng hóa với nước ngoài.

      + Hàng hóa xuất khẩu tại chỗ theo quy định của pháp luật.

      + Hàng hóa xuất khẩu để bán tại hội chợ, triển lãm ở nước ngoài.

      b) Dịch vụ xuất khẩu bao gồm dịch vụ cung ứng trực tiếp cho tổ chức, cá nhân ở nước ngoài và tiêu dùng ở ngoài Việt
      Nam; cung ứng trực tiếp cho tổ chức, cá nhân ở trong khu phi thuế quan và tiêu dùng trong khu phi thuế quan.

      Cá nhân ở nước ngoài là người nước ngoài không cư trú tại Việt Nam, người Việt Nam định cư ở nước ngoài và ở ngoài Việt
      Nam trong thời gian diễn ra việc cung ứng dịch vụ. Tổ chức, cá nhân trong khu phi thuế quan là tổ chức, cá nhân có đăng
      ký kinh doanh và các trường hợp khác theo quy định của Thủ tướng Chính phủ.

      Trường hợp cung cấp dịch vụ mà hoạt động cung cấp vừa diễn ra tại Việt Nam, vừa diễn ra ở ngoài Việt Nam nhưng hợp đồng
      dịch vụ được ký kết giữa hai người nộp thuế tại Việt Nam hoặc có cơ sở thường trú tại Việt Nam thì thuế suất 0% chỉ
      áp dụng đối với phần giá trị dịch vụ thực hiện ở ngoài Việt Nam, trừ trường hợp cung cấp dịch vụ bảo hiểm cho hàng hóa
      nhập khẩu được áp dụng thuế suất 0% trên toàn bộ giá trị hợp đồng. Trường hợp, hợp đồng không xác định riêng phần giá
