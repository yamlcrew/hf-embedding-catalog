  - '1. Thanh tra viên, người được giao thực hiện nhiệm vụ thanh tra chuyên ngành chăn nuôi, thú y đang thi hành công vụ có
    quyền:

    a) Phạt tiền đến 500.000 đồng đối với lĩnh vực giống vật nuôi, thức ăn chăn nuôi và điều kiện chăn nuôi;

    b) Tịch thu tang vật vi phạm hành chính có giá trị không vượt quá mức xử phạt tiền được quy định tại điểm a khoản này.

    2. Thanh tra viên, người được giao thực hiện nhiệm vụ thanh tra chuyên ngành quản lý chất lượng nông lâm sản và thủy sản
    đang thi hành công vụ có quyền:

    a) Phạt tiền đến 500.000 đồng đối với lĩnh vực điều kiện chăn nuôi;

    b) Tịch thu tang vật vi phạm hành chính có giá trị không vượt quá mức xử phạt tiền được quy định tại điểm a khoản này.

    3. Thanh tra viên, người được giao thực hiện nhiệm vụ thanh tra chuyên ngành bảo vệ thực vật đang thi hành công vụ có
    quyền:

    a) Phạt tiền đến 500.000 đồng đối với lĩnh vực thức ăn chăn nuôi;

    b) Tịch thu tang vật vi phạm hành chính có giá trị không vượt quá mức xử phạt tiền được quy định tại điểm a khoản này.

    4. Chánh Thanh tra Sở Nông nghiệp và Phát triển nông thôn, Chi cục trưởng Chi cục có chức năng quản lý chuyên ngành về
    chăn nuôi, thú y; Trưởng đoàn thanh tra chuyên ngành Cục Chăn nuôi; Trưởng đoàn thanh tra chuyên ngành Sở Nông nghiệp
    và Phát triển nông thôn; Trưởng đoàn thanh tra chuyên ngành Chi cục có chức năng quản lý chuyên ngành về chăn nuôi, thú
    y có quyền:

    a) Phạt tiền đến 25.000.000 đồng đối với lĩnh vực giống vật nuôi; 50.000.000 đồng đối với lĩnh vực thức ăn chăn nuôi và
    điều kiện chăn nuôi;

    b) Đình chỉ hoạt động có thời hạn hoặc tước quyền sử dụng có thời hạn Chứng chỉ đào tạo về thụ tinh nhân tạo, kỹ thuật
    cấy truyền phôi giống vật nuôi do cơ quan, tổ chức có thẩm quyền cấp;

    c) Tịch thu tang vật vi phạm hành chính có giá trị không vượt quá mức xử phạt tiền được quy định tại điểm a khoản này;

    d) Áp dụng biện pháp khắc phục hậu quả quy định tại các điểm a, b, c, d, đ, e, g, h, k, l, m, n, o, p, q và r khoản 3
    Điều 4 của Nghị định này.

    5. Chi cục trưởng Chi cục có chức năng quản lý chuyên ngành về bảo vệ thực vật; Trưởng đoàn thanh tra chuyên ngành Cục
    Bảo vệ thực vật có quyền:

    a) Phạt tiền đến 50.000.000 đồng đối với lĩnh vực thức ăn chăn nuôi;

    b) Tịch thu tang vật vi phạm hành chính có giá trị không vượt quá mức xử phạt tiền được quy định tại điểm a khoản này;

    c) Áp dụng biện pháp khắc phục hậu quả quy định tại các điểm a, b, c, d, đ, g, h, k và m khoản 3 Điều 4 của Nghị định
    này.

    6. Chi cục trưởng Chi cục có chức năng quản lý chuyên ngành về quản lý chất lượng nông lâm sản và thủy sản; Trưởng đoàn
    thanh tra chuyên ngành Cục Quản lý chất lượng nông lâm sản và thủy sản có quyền:

    a) Phạt tiền đến 50.000.000 đồng đối với lĩnh vực điều kiện chăn nuôi;

    b) Tịch thu tang vật vi phạm hành chính có giá trị không vượt quá mức xử phạt tiền được quy định tại điểm a khoản này;

    c) Áp dụng biện pháp khắc phục hậu quả quy định tại các điểm c, d, đ, l và q khoản 3 Điều 4 của Nghị định này.

    7. Trưởng đoàn thanh tra chuyên ngành Cục Thú y có quyền:

    a) Phạt tiền đến 50.000.000 đồng đối với lĩnh vực thức ăn chăn nuôi và điều kiện chăn nuôi;

    b) Đình chỉ hoạt động có thời hạn;

    c) Tịch thu tang vật vi phạm hành chính có giá trị không vượt quá mức xử phạt tiền được quy định tại điểm a khoản này;

    d) Áp dụng biện pháp khắc phục hậu quả quy định tại các điểm a, b, c, d, đ, g, h, k, l, m và q khoản 3 Điều 4 của Nghị
    định này.

    8. Trưởng đoàn thanh tra chuyên ngành về chăn nuôi Bộ Nông nghiệp và Phát triển nông thôn có quyền:

    a) Phạt tiền đến 35.000.000 đồng đối với lĩnh vực giống vật nuôi; 70.000.000 đồng đối với lĩnh vực thức ăn chăn nuôi và
    điều kiện chăn nuôi;

    b) Đình chỉ hoạt động có thời hạn hoặc tước quyền sử dụng có thời hạn Chứng chỉ đào tạo về thụ tinh nhân tạo, kỹ thuật
    cấy truyền phôi giống vật nuôi do cơ quan, tổ chức có thẩm quyền cấp;

    c) Tịch thu tang vật vi phạm hành chính có giá trị không vượt quá mức xử phạt tiền được quy định tại điểm a khoản này;

    d) Áp dụng biện pháp khắc phục hậu quả quy định tại khoản 3 Điều 4 của Nghị định này.

    9. Chánh Thanh tra Bộ Nông nghiệp và Phát triển nông thôn, Cục trưởng Cục Chăn nuôi có quyền:

    a) Phạt tiền đến 50.000.000 đồng đối với lĩnh vực giống vật nuôi; 100.000.000 đồng đối với lĩnh vực thức ăn chăn nuôi
    và điều kiện chăn nuôi;

    b) Đình chỉ hoạt động có thời hạn hoặc tước quyền sử dụng có thời hạn Chứng chỉ đào tạo về thụ tinh nhân tạo, kỹ thuật
    cấy truyền phôi giống vật nuôi do cơ quan, tổ chức có thẩm quyền cấp;

    c) Tịch thu tang vật vi phạm hành chính;

    d) Áp dụng biện pháp khắc phục hậu quả quy định tại khoản 3 Điều 4 của Nghị định này.

    10. Cục trưởng Cục Thú y có quyền:

    a) Phạt tiền đến 100.000.000 đồng đối với lĩnh vực thức ăn chăn nuôi và điều kiện chăn nuôi;

    b) Tịch thu tang vật vi phạm hành chính;

    c) Áp dụng biện pháp khắc phục hậu quả quy định tại các điểm a, b, c, d, đ, g, h, k, l, m và q khoản 3 Điều 4 của Nghị
    định này.

    11. Cục trưởng Cục Bảo vệ thực vật có quyền:

    a) Phạt tiền đến 100.000.000 đồng đối với lĩnh vực thức ăn chăn nuôi;

    b) Tịch thu tang vật vi phạm hành chính;

    c) Áp dụng biện pháp khắc phục hậu quả quy định tại các điểm a, b, c, d, đ, g, h, k và m khoản 3 Điều 4 của Nghị định
    này.

    12. Cục trưởng Cục Quản lý chất lượng nông lâm sản và thủy sản có quyền:

    a) Phạt tiền đến 100.000.000 đồng đối với lĩnh vực điều kiện chăn nuôi;

    b) Tịch thu tang vật vi phạm hành chính;

    c) Áp dụng biện pháp khắc phục hậu quả quy định tại các điểm c, d, đ, l và q khoản 3 Điều 4 của Nghị định này.'
