  - source_sentence: Kết hôn được hiểu như thế nào? Điều kiện để được đăng ký kết hôn được quy định ra sao?
    sentences:
    - Các quy định của Bộ luật dân sự và các luật khác có liên quan đến quan hệ hôn nhân và gia đình được áp dụng đối với
      quan hệ hôn nhân và gia đình trong trường hợp Luật này không quy định.
    - '"Điều 4. Ngày thi, lịch thi, nội dung thi, hình thức thi và thời gian làm bài thi/môn thi

      1. Ngày thi, lịch thi: Được quy định trong hướng dẫn tổ chức kỳ thi tốt nghiệp THPT hằng năm của Bộ GDĐT.

      2. Nội dung thi: Nội dung thi nằm trong chương trình THPT, chủ yếu là chương trình lớp 12.

      3. Hình thức thi: Các bài thi Toán, Ngoại ngữ, KHTN và KHXH thi theo hình thức trắc nghiệm khách quan (gọi chung là
      bài thi trắc nghiệm); bài thi Ngữ văn thi theo hình thức tự luận (gọi chung là bài thi tự luận).

      4. Thời gian làm bài thi/môn thi: Ngữ văn 120 phút; Toán 90 phút; Ngoại ngữ 60 phút; 50 phút đối với mỗi môn thi thành
      phần của bài thi tổ hợp KHTN và KHXH."'
    - '"Điều 8. Điều kiện kết hôn

      1. Nam, nữ kết hôn với nhau phải tuân theo các điều kiện sau đây:

      a) Nam từ đủ 20 tuổi trở lên, nữ từ đủ 18 tuổi trở lên;

      b) Việc kết hôn do nam và nữ tự nguyện quyết định;

      c) Không bị mất năng lực hành vi dân sự;

      d) Việc kết hôn không thuộc một trong các trường hợp cấm kết hôn theo quy định tại các điểm a, b, c và d khoản 2 Điều
      5 của Luật này.

      2. Nhà nước không thừa nhận hôn nhân giữa những người cùng giới tính.

      Điều 9. Đăng ký kết hôn

      1. Việc kết hôn phải được đăng ký và do cơ quan nhà nước có thẩm quyền thực hiện theo quy định của Luật này và pháp
      luật về hộ tịch.

      Việc kết hôn không được đăng ký theo quy định tại khoản này thì không có giá trị pháp lý.

      2. Vợ chồng đã ly hôn muốn xác lập lại quan hệ vợ chồng thì phải đăng ký kết hôn."'
  - source_sentence: Thời điểm xem xét bổ nhiệm lại công chức lãnh đạo cấp Vụ theo quy định là bao lâu?
    sentences:
    - "Thời điểm xem xét bổ nhiệm lại, thời hạn giữ chức vụ\n1. Thời điểm xem xét bổ nhiệm lại \na) Chậm nhất là 90 ngày trước\
      \ ngày hết thời hạn bổ nhiệm công chức, viên chức cấp vụ và cấp phòng, đơn vị thuộc Bộ phải tiến hành quy trình bổ nhiệm\
      \ lại để quyết định hoặc trình cấp có thẩm quyền xem xét, quyết định bổ nhiệm lại hoặc không bổ nhiệm lại công chức\
      \ lãnh đạo, quản lý;\nb) Quyết định bổ nhiệm lại công chức giữ chức vụ lãnh đạo, quản lý phải được ban hành trước ít\
      \ nhất 01 ngày làm việc, tính đến ngày hết thời hạn bổ nhiệm.\n..."
    - 'Mức phụ cấp ưu đãi

      1. Mức phụ cấp 70% áp dụng đối với công chức, viên chức thường xuyên, trực tiếp làm các công việc sau đây:

      a) Xét nghiệm, khám, điều trị, chăm sóc người bệnh HIV/AIDS, phong, lao, tâm thần;

      b) Giám định pháp y, pháp y tâm thần, giải phẫu bệnh lý.

      2. Mức phụ cấp 60% áp dụng đối với công chức, viên chức thường xuyên, trực tiếp làm các công việc sau đây:

      a) Khám, điều trị, chăm sóc người bệnh cấp cứu, hồi sức cấp cứu, cấp cứu 115, truyền nhiễm;

      b) Xét nghiệm, phòng chống bệnh truyền nhiễm;

      c) Kiểm dịch y tế biên giới.

      3. Mức phụ cấp 50% áp dụng đối với công chức, viên chức thường xuyên, trực tiếp khám, điều trị, chăm sóc, phục vụ người
      bệnh gây mê hồi sức, điều trị tích cực, nhi, chống độc, bỏng và da liễu.

      4. Mức phụ cấp 40% áp dụng đối với công chức, viên chức thường xuyên, trực tiếp làm chuyên môn y tế dự phòng; xét nghiệm;
      khám bệnh, chữa bệnh; kiểm soát nhiễm khuẩn, chăm sóc người bệnh, phục hồi chức năng; giám định y khoa; y dược cổ truyền;
      dược, mỹ phẩm; an toàn vệ sinh thực phẩm, trang thiết bị y tế; sức khỏe sinh sản tại các cơ sở sự nghiệp y tế công lập
      và tại các cơ sở điều dưỡng thương binh, bệnh binh, người khuyết tật đặc biệt, trừ các trường hợp quy định tại khoản
      1, 2 và 3 Điều này.

      5. Mức phụ cấp 30% áp dụng đối với công chức, viên chức sau đây:

      a) Công chức, viên chức thường xuyên, trực tiếp làm chuyên môn y tế để thực hiện các công việc: truyền thông giáo dục
      sức khỏe; dân số - kế hoạch hóa gia đình;

      b) Công chức, viên chức quản lý, phục vụ không trực tiếp làm chuyên môn y tế tại các cơ sở, viện, bệnh viện chuyên khoa,
      các trung tâm: HIV/AIDS, phong, lao, tâm thần, giải phẫu bệnh lý, pháp y.

      6. Đối với công chức, viên chức không trực tiếp làm chuyên môn y tế; công chức, viên chức y tế làm công tác quản lý,
      phục vụ tại các đơn vị sự nghiệp y tế nói chung (trừ đối tượng quy định tại điểm b khoản 5 Điều này), viên chức làm
      công tác chuyên môn y tế tại cơ quan, đơn vị, trường học thì thủ trưởng đơn vị căn cứ vào đặc thù công việc và nguồn
      thu để xem xét, quyết định nhưng không vượt quá mức 20% so với mức lương ngạch, bậc hiện hưởng cộng phụ cấp chức vụ
      lãnh đạo, phụ cấp thâm niên vượt khung (nếu có) của đối tượng được hưởng.7. Mức phụ cấp ưu đãi theo nghề đối với viên
      chức y tế dự phòng, y tế cơ sở áp dụng từ ngày 01 tháng 01 năm 2022 đến hết ngày 31 tháng 12 năm 2023:

      7. Mức phụ cấp ưu đãi theo nghề đối với viên chức y tế dự phòng, y tế cơ sở áp dụng từ ngày 01 tháng 01 năm 2022 đến
      hết ngày 31 tháng 12 năm 2023:

      a) Mức phụ cấp 100% áp dụng đối với viên chức thường xuyên, trực tiếp làm chuyên môn y tế dự phòng (bao gồm cả kiểm
      dịch y tế biên giới); làm chuyên môn y tế tại Trạm y tế xã, phường, thị trấn, Phòng khám đa khoa khu vực, Nhà hộ sinh,
      Trung tâm y tế huyện, quận, thị xã, thành phố thuộc tỉnh, thành phố thuộc thành phố trực thuộc trung ương và bệnh viện
      tuyến huyện, quận, thị xã, thành phố thuộc tỉnh, thành phố thuộc thành phố trực thuộc trung ương.

      b) Trong thời gian áp dụng mức phụ cấp ưu đãi theo nghề đối với viên chức y tế dự phòng, y tế cơ sở quy định tại khoản
      7 này thì không áp dụng quy định tại điểm c khoản 2 và quy định đối với viên chức thường xuyên, trực tiếp làm chuyên
      môn y tế dự phòng tại khoản 4 Điều 3.'
    - Khoản 5. Cấp có thẩm quyền bổ nhiệm quyết định tiêu chuẩn, điều kiện về thành tích, kết quả và sản phẩm cụ thể phù hợp
