- source_sentence: Chủ tịch Ủy ban nhân dân cấp xã hay cấp huyện có thẩm quyền xử phạt hành vi uy hiếp tinh thần người tham
    gia hoạt động giáo dục về chăm sóc sức khỏe và sử dụng các dịch vụ y tế vì định kiến giới?
  sentences:
  - 'Thuế suất 0%

    1. Thuế suất 0%: áp dụng đối với hàng hóa, dịch vụ xuất khẩu; hoạt động xây dựng, lắp đặt công trình ở nước ngoài và ở
    trong khu phi thuế quan; vận tải quốc tế; hàng hóa, dịch vụ thuộc diện không chịu thuế GTGT khi xuất khẩu, trừ các trường
    hợp không áp dụng mức thuế suất 0% hướng dẫn tại khoản 3 Điều này.

    Hàng hóa, dịch vụ xuất khẩu là hàng hóa, dịch vụ được bán, cung ứng cho tổ chức, cá nhân ở nước ngoài và tiêu dùng ở ngoài
    Việt Nam; bán, cung ứng cho tổ chức, cá nhân trong khu phi thuế quan; hàng hóa, dịch vụ cung cấp cho khách hàng nước ngoài
    theo quy định của pháp luật.

    a) Hàng hóa xuất khẩu bao gồm:

    - Hàng hóa xuất khẩu ra nước ngoài, kể cả ủy thác xuất khẩu;

    - Hàng hóa bán vào khu phi thuế quan theo quy định của Thủ tướng Chính phủ; hàng bán cho cửa hàng miễn thuế;

    - Hàng hóa bán mà điểm giao, nhận hàng hóa ở ngoài Việt Nam;

    - Phụ tùng, vật tư thay thế để sửa chữa, bảo dưỡng phương tiện, máy móc thiết bị cho bên nước ngoài và tiêu dùng ở ngoài
    Việt Nam;

    - Các trường hợp được coi là xuất khẩu theo quy định của pháp luật:

    + Hàng hóa gia công chuyển tiếp theo quy định của pháp luật thương mại về hoạt động mua, bán hàng hóa quốc tế và các hoạt
    động đại lý mua, bán, gia công hàng hóa với nước ngoài.

    + Hàng hóa xuất khẩu tại chỗ theo quy định của pháp luật.

    + Hàng hóa xuất khẩu để bán tại hội chợ, triển lãm ở nước ngoài.

    b) Dịch vụ xuất khẩu bao gồm dịch vụ cung ứng trực tiếp cho tổ chức, cá nhân ở nước ngoài và tiêu dùng ở ngoài Việt Nam;
    cung ứng trực tiếp cho tổ chức, cá nhân ở trong khu phi thuế quan và tiêu dùng trong khu phi thuế quan.

    Cá nhân ở nước ngoài là người nước ngoài không cư trú tại Việt Nam, người Việt Nam định cư ở nước ngoài và ở ngoài Việt
    Nam trong thời gian diễn ra việc cung ứng dịch vụ. Tổ chức, cá nhân trong khu phi thuế quan là tổ chức, cá nhân có đăng
    ký kinh doanh và các trường hợp khác theo quy định của Thủ tướng Chính phủ.

    Trường hợp cung cấp dịch vụ mà hoạt động cung cấp vừa diễn ra tại Việt Nam, vừa diễn ra ở ngoài Việt Nam nhưng hợp đồng
    dịch vụ được ký kết giữa hai người nộp thuế tại Việt Nam hoặc có cơ sở thường trú tại Việt Nam thì thuế suất 0% chỉ áp
    dụng đối với phần giá trị dịch vụ thực hiện ở ngoài Việt Nam, trừ trường hợp cung cấp dịch vụ bảo hiểm cho hàng hóa nhập
    khẩu được áp dụng thuế suất 0% trên toàn bộ giá trị hợp đồng. Trường hợp, hợp đồng không xác định riêng phần giá trị dịch
    vụ thực hiện tại Việt Nam thì giá tính thuế được xác định theo tỷ lệ (%) chi phí phát sinh tại Việt Nam trên tổng chi
    phí.

    Cơ sở kinh doanh cung cấp dịch vụ là người nộp thuế tại Việt Nam phải có tài liệu chứng minh dịch vụ thực hiện ở ngoài
    Việt Nam.

