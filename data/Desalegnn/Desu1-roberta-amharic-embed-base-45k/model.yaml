    መጀመሩም ተጠቅሷል፡፡በጂቡቲ የቀጣናው የኢኮኖሚ ትስስር ኮንፈርንስ ላይ ለመታደም ማክሰኞ ኅዳር 26 ቀን 2010 ዓ.ም. በጂቡቲ የተገኙት የትራንስፖርት ሚኒስትሩ አቶ አህመድ ሺዴ፣ ለመጪዎቹ
