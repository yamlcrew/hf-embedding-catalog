  - 'ኢትዮጵያ ለጂቡቲ በነፃ የምትሰጠው የንፁህ ውኃ አቅርቦት ግንባታው ተጠናቆ፣ በሦስት ወራት ውስጥ ሙሉ በሙሉ ለጂቡቲያውያን መዳረስ እንደሚጀምር ተገለጸ፡፡ በጂቡቲ የኢትዮጵያ አምባሳደር ሻሜቦ
