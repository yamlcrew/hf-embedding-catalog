      በግብርና ኢኮኖሚክስ ሁለተኛ ዲግሪያቸውን አግኝተዋል፡፡ ለሁለተኛ ዲግሪያቸው የሠሩት መመረቂያ የምርምር ጽሑፍ በ1996  ዓ.ም. ከቤልጂየም የዓለም አቀፍ የልማት ትብብር ሽልማት እንዳስገኘላቸው፣
      በዩኒቨርሲቲው ድረ ገጽ የሰፈረው የሕይወት ታሪካቸው ያስረዳል፡፡ሦስተኛ ዲግሪያቸውን ጀርመን ከሚገኘው የጊሰን ዩኒቨርሲቲ እንዳገኙ ተገልጾ፣ ከዚህ በመቀጠል በበርካታ የምርምር ሥራዎች ላይ
      እንደተሳተፉ ተገልጿል፡፡ ከዚህ በተጨማሪም ለ60 የሁለተኛ ዲግሪ ተማሪዎችና ለ15 የሦስተኛ ዲግሪ ተማሪዎች፣ የመመረቂያ የምርምር ሥራቸውን እንዲያከናውኑ በማማከር ለምረቃ ማብቃቸው ተገልጿል፡፡ከእነዚህ
      አስተዋጽኦዎች በተጨማሪም ከ60 በላይ የምርምር ጽሑፎችን በዓለም አቀፍ ጆርናሎችና 20 ያህል የምርምር ጽሑፎችን በወርክሾፕ መጣጥፎች ላይ ማሳተማቸውን፣ ከሕይወት ታሪካቸው ለመረዳት ተችሏል፡፡በተመሳሳይ
      የዩኒቨርሲቲው ሴኔት ለመንግሥቱ ኡርጌ (ዶ/ር) በእንስሳት ሥነ ምግብና ሥነ አካል ዘርፍ የሙሉ ፕሮፌሰርነት ማዕረግ ሰጥቷል፡፡መንግሥቱ ኡርጌ (ዶ/ር) ሦስተኛ ዲግሪያቸውን ስዊድን በሚገኘው
      የስዊድን የእርሻ ዩኒቨርሲቲ ትምህርታቸውን በመከታተል፣ በእንስሳት ሥነ አካል ትምህርት ዘርፍ አግኝተዋል፡፡በዩኒቨርሲቲው ከ30 ዓመታት በላይ እንዳገለገሉ የሚገልጸው የሕይወት ታሪካቸው፣
      በዚህ ረዥም የማስተማርና የመመራመር ዓመታት 160 የሁለተኛ ዲግሪ ተማሪዎችን፣ እንዲሁም 20 የሦስተኛ ዲግሪ ተማሪዎችን በማማከር ለፍሬ ማብቃታቸው ተገልጿል፡፡ከማስተማርና የማማከር ሥራ
      በተጨማሪም በግላቸውና ከተማሪዎቻቸው ጋር በመሆን ካደረጓቸው የምርምር ሥራዎች ውስጥ፣ እስካሁን፣ 147 አገራዊና ዓለም አቀፋዊ ፋይዳ ያላቸው ሳይንሳዊ ጽሑፎችን በዓለም አቀፍ የምርምር
      ጆርናሎች ማሳተማቸው በሕይወት ታሪካቸው ተካቷል፡፡   
  - source_sentence: "\uFEFFአማራጭ የሌለው የአገራዊ ፓርቲ አደረጃጀት"
    sentences:
    - 'ከጥቂት ወራት በኋላ የአፋር፣ የቤኒሻንጉል ጉሙዝ፣ የሶማሌ፣ የኦሮሞና የአማራ የሚባል  ፓርቲ እንደሌለ ጠቅላይ ሚኒስትሩ መናገራቸው ይታወሳል፤ ፖለቲከኞቹም አካሄዱ አንድነትን ይበልጥ
      የሚያጎላ ይሆናል ሲሉ ይገልጻሉ፡፡የህግ

      ባለሙያና የፖለቲካ ተንታኙ አቶ ተሾመ ወልደሃዋርያት እንደሚሉት፤ የተወሰኑ ሰዎች እየተነሱ  አገራዊ ፓርቲን እየመሰረትን ነው በማለት በየክልላቸው እየሄዱ የእኔ የሚሉትን

      አባል እያሰባሰቡ ፓርቲ ይመሰርታሉ ። ለምሳሌ «አብን የሚባለው ፓርቲ 

      አገራዊ ነኝ ቢልም በተግባር የሚታየው ግን ተቃራኒ ነው። ሌሎቹም እንዲሁ አባላቶቻቸውን እንኳን ለመሰብሰብ  የሚሄዱት ወደ ራሳቸው ብሔር ነው»። እንደ

      አቶ ተሾመ ገለጻ፤ ጠቅላይ ሚኒስትሩ አገራዊ ፓርቲን ለመመስረት ወደ ተግባራዊ እርምጃ በመንደርደር ላይ ናቸው፡፡  በእርግጥ ኢህአዴግ አምስት አጋር ድርጅቶችን አስከትሎ በአራት ፓርቲዎች
      ከሚመራ

      እራሱን ወደ አንድ ጠንካራ ፓርቲ ቢለውጥ  ህብረ ብሔራዊነትን ማጠናከር

      ይችላል።«አገራዊ

      ፓርቲ ማለት ህብረ ብሔራዊ ፓርቲ ነው» የሚሉት አቶ ተሾመ፤ ሆኖም በብሔር ስም የሚነሳ ግን በምንም መልኩ ከጠባብ እይታ ወጥቶ

      የኢትዮጵያውያን ሁሉ ሊሆን አይችልም። በመሆኑም  ሌሎቹም ፓርቲዎች

      ወደ ጥምረት ፣ ውህደትና ወደ አገራዊ ፓርቲነት እንዴት እንደሚለወጡ ለማሳየት ኢህአዴግ እራሱን ማሳያ ማድረጉ ይበል የሚያሰኝ መሆኑን

      ተናግረዋል።ፕሮፌሰር

      መረራ ጉዲና በበኩላቸው ፓርቲው አንድም ሆነ አራትም ሆኖ ቀጠለ በዴሞክራሲያዊ መርሆዎች መመራቱና የፖለቲካ ምህዳሩን እያሰፋ መሄዱና  ነጻና ፍትሀዊ ምርጫን ለማድረግ መዘጋጀቱ ነው ጥያቄው
      መሆን ያለበት ይላሉ ። ይሁን

      እንጂ ስሙን መቀየሩና አደረጃጀቱን ማስተካከሉ የተሻለ ኢህአዴግን ወይም ሌላን ስለመፍጠሩ ግን አርግጠኛ መሆን የሚቻለው ውሎ አድሮ በስራው ነው።እንደ ፕሮፌሰር መረራ ገለጻ ሀቀኛ ፌዴራላዊ
      ሥርዓት በአገሪቱ እንዲፈጠር ሰላምና መረጋጋት እንዲሰፍን

      ከሰራ ጥሩ ነው፤ ካልሰራም የነበረው ኢህአዴግ ይቀጥላል ፤ እኛም ትግላችንን ከመቀጠል ውጪ አማራጭ የለንም። በመሆኑም ስም መቀየሩ

      አልያም መዋሀዱ ብቻ በቂ ካለመሆኑም ባላይ  የሚሰራቸው ስራዎች ምን

      ይሆናሉ የሚለውም መታየት እንዳለበት ይጠቁማሉ።እንደ አቶ ተሾመ ገለጻ፤ የአንድ አገራዊ ፓርቲ ሃሳብ በአገር ደረጃ ትልቅ ለውጥ የሚያመጣና የሚደገፍ

      ከመሆኑም በላይ ምንም ዓይነት የዘር መሳሳብ በሌለበት፤ በሳይንሳዊ ዓለም አቀፍ ቀመርና ደረጃዎች ወጥተውለት የሚሰራ በመሆኑ ፖለቲካዊ

      ጠቀሜታው የላቀ ነው። በኢኮኖሚ እድገትና በማህበራዊ ተጠቃሚነት ላይ ከፍተኛ ለውጥ ሊመጣ የሚችለው ከብሔር የጸዳ አገራዊ ፓርቲ

      ቦታውን ሲይዝ ነው ።ኢህአዴግ የጀመረው አካሄድ ከተሳካለት የተሻለና አብዛኛውን የአገሪቱን የፖለቲካ አካሄድ የሚቀይር

      ነው፡፡ በሃሳብ ክርክር የሚያምን ፓርቲ እንዲኖር ከማስቻሉም በላይ ህዝቡ አማራጮችን እንዲያይ እድል የሚፈጥር እንዲሁም የእኔ ወገን

      የያዘው ፓርቲ ከሚል ምርጫ የሚያወጣ እንደሚሆን  ይገልፃሉ። ለዴሞክራሲያዊ

      ሥርዓት ግንባታ ጥሩ መሰረትን የሚጥል እንደሚሆንም አቶ ትዕግስቱ አወሉ ያብራራሉ።ፋይዳው ብዙ ቢሆንም በፍጥነት ማሳካት ግን አይቻልም የሚል ስጋት እንዳላቸው የሚናገሩት አቶ ተሾመ፤

      ኢህአዴግ በዚህ መልኩ እደራጃለሁ ሲል  ሶማሌ ክልል አልያም ኦሮሚያ

      ላይ  በሶማሌነቴ ወይም በኦሮሞነቴ ፓርቲዬን እይዛለሁ የሚል ሊኖር

      ይችላል፡፡ ላለፉት ሶስት አስርት ዓመታት የነበረው ፖለቲካዊ አካሄድ የተወሳሰበ፣ ዘርንና ብሔርን መሰረት ያደረገ በመሆኑ  ሃሳቡን በቶሎ ተቀብሎ አብላልቶ  ለውጥ ለማምጣት አስቸጋሪ ሊሆን
      ይችላል፡፡ የራሱን ወገን ብቻ ማሰብ የለመደን

      አካል በአንዴ ወደ መስመር ማስገባት ቀላል አይደለም፡፡  ቢሆንም

      ‹‹ህልም ተፈርቶ ሳይተኛ አይታደርም›› ይላሉ፡፡   አገራዊ ፓርቲ ሲባል ሰዎች ቅርጽ ብቻ እያዩ ነው የሚናገሩት ያሉት ፕሮፌሰር መረራ   በአፍሪካ ከኢህአዴግ ባልተናነሰ አምባ ገነን 
      በሆኑ ፓርቲዎች የሚመሩ አገራት አሉ፤ በመሆኑም የተሳካ ዴሞክራሲያዊ ሥርዓት

      እንዲፈጠር መንገድ ይከፍታል ወይስ አይከፈትም የሚለው ነው ሊያሳስብ እንዲሁም ሊያነጋግር የሚገባው፡፡«እኔ  በበኩሌ የድርጅት ቅርጽ ብዙም

      አያስጨንቀኝም ፤ በአንጻሩ የተሻለና ለሁሉም ክፍት የሆነ የፖለቲካ ምህዳርና 

      ዴሞክራሲያዊ ሥርዓት መዘርጋቱ በጣም ያስጨንቀኛል ምክንያቱም ለእኛም ሆነ ለአገር  የሚያዋጣው 

      አርሱ በመሆኑ ነው» ይላሉ ፕሮፌሰር መረራ።ሃሳባቸውን  በምሳሌ ሲያጠናክሩም  ኢህአፓ አንድ ፓርቲ 

      ነበር  ሆኖም ብዙ ህገ ወጥ ስራዎችን ከመስራቱም በላይ  ለ 17 ዓመታት ትውልድን ጨፍልቆ የሄደ ነው።  በመሆኑም ልናስብ የሚገባው ስለ ፓርቲዎች ቁጥር ሳይሆን ዴሞክራሲያዊ ጨዋታው

      ላይ የሚወስዷቸው አቋሞች፣ የሚሰሯቸው ስራዎችና የሚከተሏቸው አካሄዶች ላይ ነው መሆን ያለበት ብለዋል።በመጀመሪያ ኢህአዴግ ግንባሩን አፍርሼ ወደ አንድ እመጣለሁ ሲል አራቱ የግንባር ድርጅቶች
      ተስማምተዋል

      ወይ? የሚለው መጤን አለበት፡፡   ይህ ከተሳካ  እስከ አሁን ከነበረው የፖለቲካ አካሄድ በብዙ የሚለይና የፓርቲ አባልነት

      ወይም መሪነት አማራ ወይም ኦሮሞ  አልያም ትግሬ በመሆን ሳይሆን  ሰው በመሆን ብቻ 

      እንደሚገኝ የሚያሳይ እንደሚሆንና አንድ ኢትዮጵያ የሚለውን አስተሳሰብ የሚያሰፍን መሆኑን ደግሞ አቶ ትዕግስቱ ይገልፃሉ።የአቶ ተሾመ ሌላው ስጋታቸው በተለይም ህወሀት ይህንን መንገድና ውህደቱን
      ይቀበላል ወይ? በመካከል  አንጃ አይፈጠርም ወይ? የሚለውን መመለስ ያስፈልጋል። ሆኖም ይህ ይፈጠራል

      በሚል ስጋት ወደ ኋላ መጎተት አይገባም፡፡ ከዛ ይልቅ አፍራሽ ሃሳቦችን እያራገፉ መሄዱ  በጣም አስፈላጊ መሆኑንም አብራርተዋል።የጋምቤላ ክልል ርዕሰ መስተዳድር አቶ ኡሙድ ኡጁሉ እንዳሉትም
      ቀደም ሲል ሲያቀርቡት የነበረ ጥያቄ

      ሲሆን፤ አሁን ምላሽ ማግኘቱ በጣም እንዳስደሰታቸው ተናግረዋል፡፡ ጠቅላይ ሚኒስትሩ እንዳሉት በአንድ ሀገር ውስጥ ሆነን የተናጠል

      ውሳኔ ሲወሰንብን ነበር፡፡ ለምሳሌ አጋር ተብለው የሚታወቁ አራት ድርጅቶች አሉ፡፡ ኢህአዴግ የሚባሉም አራት አሉ፡፡ በአብዛኛው

      የሀገሪቱን ጉዳዮች ኢሕአዴግ ነበር የሚወስነው፡፡ አጋር ድርጅቶች በክልላቸው ጉዳይ የሚወስኑበት ሁኔታ ብቻ ነበር ያለው፡፡ በእርግጥ

      ኢሕአዴግ በሁሉም መልኩ ለእኛ ድጋፍ ሲያደርግ ቢቆይም አሁን የክልል ፓርቲ አይኖርም ተብሎ ሲወሰን አንደኛ የእኛ ጥያቄ መልስ ያገኘበት

      ፣ሁለተኛው ዋናውና ትልቁ ነገር እንደ ሀገር ልጆች በሀገራዊ ጉዳይ የመወሰን እድል የምናገኝበት ነው፡፡የኢህአዴግ ጽህፈት ቤት ሃላፊው አቶ ብናልፍ አንዷለም በበኩላችው፤ ኢህአዴግ  አራት
      የፖለቲካ ፓርቲዎች አንድ ላይ ግንባር ፈጥረው የመሰረቱትና ሁሉም  የየራሳቸው ሃላፊነትና ስልጣን ያላቸው ቢሆንም ወደ ኢህአዴግ ሲመጡ ግን ግንባር

      ይሆናሉ። አሁን የተጀመረው የአንድ አገራዊ ፓርቲ ሥርዓትም ይህንን አደረጃጀት እንደሚቀይር ተናግረዋል። አሁን ያለው የፖለቲካ ትግልና የአገሪቱ የለውጥ ሁኔታ ኢህአዴግ ግንባር ሆኖ እንዲቀጥል
      የሚፈቅድ

      አይደለም፡፡ ቢያንስ ደረጃው ወደ ፓርቲ ከፍ ብሎ ማደግ እንዳለበት ያስገድዳል፡፡ በዚህ አካሄድ ደግሞ እስከ አሁን የድርጅቱን ሊቀመንበርና

      ስራ አስፈጻሚ የመምረጥና የመመረጥ እድል ሳያገኙ የቆዩት አጋር ድርጅቶች ተሳትፎ እንዲያደርጉ ይጋብዛል ይላሉ አቶ ብናልፍ ።በሌላ በኩልም በብሔር የተዋቀሩት ፓርቲዎች የድሮ ቅርጻቸውን
      በመተው የኢህአዴግ አንድ አካል ሆነው

      በመላው  አገሪቱ  አባላትን የመመልመል መብታቸው ይረጋገጣል፡፡ እስከ አሁንም  በአጋር ድርጅቶች አካባቢ የነበረውን ጉድለት ሙሉ በሙሉ የሚቀርፍ ይሆናል።

      በጠቅላላው ኢትዮጵያዊነትን አጠናክሮ በማውጣትና የተጀመረውንም ለውጥ ወደ ላቀ ደረጃ በማድረስ በኩል ሚናው የጎላ እንደሚሆንም ነው

      የሚያብራሩት።ይህ የአንድ አገራዊ ፓርቲ እሳቤ በአስረኛው የድርጅቱ ጉባኤ ላይ ተነስቶ ጥናት ቀርቦ ወደ ውሳኔ

      እንዲገባ ተብሎ እንደነበር ያስታወሱት አቶ ብናልፍ፤ የጥናቱ አካሄድ የዘገየና አዝጋሚ ተብሎ በሀዋሳው 11ኛው የድርጅቱ ጉባኤ ላይ  ተገመግሟል፡፡ በዚህም 

      መሰረት አሁን የመጀመሪያው የጥናቱ ክፍል በመጠናቀቅ ላይ ሲሆን፤ 

      ስጋቶችንም እንደሚቀንስ አብራርተዋል።በምሁራኑ የተነሳው ስጋት ተገቢ መሆኑን የተናገሩት አቶ ብናልፍ፤ ሆኖም በቀጣይ አራቱ አባል ድርጅቶችና

      አጋሮች ውይይት ያደርጉበታል። ጥናቱም ቢሆን አጋር ድርጅቶችን ጨምሮ የተጠና በመሆኑ ሃሳባቸውን ሰጥተውበት ዳብሮና የሁሉንም ይሁንታ

      አግኝቶ ፓርቲዬን አፍርሼ እቀላቀላለሁ የሚልን በሙሉ የሚያሳተፍ በመሆኑ ችግሩ የጎላ አይሆንም ሲሉ ሃሳባቸውን ሰጥተዋል።«ኢህአዴግ ላለፉት 27 ዓመታት የቆየው ግንባር ሆኖ ነው፡፡ ከዚህ
      በላይ በዚህ ሁኔታ መቀጠል የለበትም፡፡

      በመሆኑም የአገሪቷን ደረጃ በሚመጥን፣ የማንነትንና የዜግነት ፖለቲካን በሚመልስ መልኩ መደራጀቱ ጥቅሙ ከፍተኛ ነው።  የግለሰብና 

      የቡድኖች ማንነት የተጠበቀ ሆኖ አንድ አገራዊ ማንነትን የበለጠ አጉልቶ ለማስቀጠልና ጠንካራ ኢትዮጵያዊነት በመፍጠሩ

