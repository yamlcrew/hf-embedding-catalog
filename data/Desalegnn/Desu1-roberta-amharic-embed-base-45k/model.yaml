    ሲሆን፣ እስከ ጂቡቲ በውኃ ማስተላለፊያ እንደሚሳብ አቶ አህመድ አስረድተዋል፡፡  ከውኃ በተጨማሪ በሦስት ኮሪደሮች በኩል እየተገነቡ የሚገኙ የመንገድ ፕሮጀክቶችንም ሚኒስትሩ ጠቅሰዋል፡፡ ከአዲስ
    አበባ-አዋሽ-ሚሌ አድርጎ በጋላፊ በኩል የሚመጣው አንደኛው መንገድ ነው፡፡ ሁለተኛው ከድሬዳዋ-ደዋሌ የሚሄደው ሲሆን፣ ድሬዳዋን ከሚኤሶና ከአዋሽ መልሶ የሚያገናኘው መንገድ ግንባታ ነው፡፡
    ሦስተኛው ከታጁራ ጋር የሚገናኘውና የኢትዮጵያን የፖታሽ ምርት ለማጓጓዝ የሚረዳው መንገድ በተለያዩ ኮንትራክቶች እየተገነባ እንደሚገኝ የጠቆሙት አቶ አህመድ፣ ከዚህ በተጨማሪ የጂቡቲን ወደብ
    ከጂግጂጋ ከተማ ጋር ለማገናኘት የሚረዳ የመንገድ ግንባታ ለማካሄድ ጥናት እየተካሄደ እንደሆነ አስረድተዋል፡፡አምባሳደር ሻሜቦ እንደሚሉት በሁለቱ አገሮች መካከል እየተስፋፋ የሚገኘው የኢኮኖሚ፣
    የንግድ፣ የሕዝብና የሌላውም ግንኙነት እየተጠናከረ ነው፡፡ ከሦስት ወራት በኋላ ኢትዮጵያ ለጂቡቲ የሰጠችው የንፁህ መጠጥ ውኃ አቅርቦት ግንባታው ተጠናቆ ሥርጭቱ እንደሚጀመር ይጠበቃል፡፡ እንደ
    አምባሳደር ሻሜቦ ገለጻ፣ ግንባታውን የጂቡቲ መንግሥት ሲያካሂድ የኢትዮጵያ መንግሥት ደግሞ ውኃውን በነፃ ያቀርባል፡፡ '
