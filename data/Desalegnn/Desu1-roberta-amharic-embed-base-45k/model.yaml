    ዲፕሎማሲ ከ21ኛው ክፍለ ዘመን የሚመጥን  የማድረግ አቅም ያላቸው  ናቸው ተብሏል።ከዚህ ጎን ለጎንም ምደባው  የተሳለጠ ለማድረግ የአምባሳደሮች ጥሪና ሹመት እንደሚካሄድ የውጭ ጉዳይ ሚኒስትር
