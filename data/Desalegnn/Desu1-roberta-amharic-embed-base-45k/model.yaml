    ሥርዓት በአገሪቱ እንዲፈጠር ሰላምና መረጋጋት እንዲሰፍን

    ከሰራ ጥሩ ነው፤ ካልሰራም የነበረው ኢህአዴግ ይቀጥላል ፤ እኛም ትግላችንን ከመቀጠል ውጪ አማራጭ የለንም። በመሆኑም ስም መቀየሩ

