- source_sentence: rded and the property must be treated as personally owned by the nonresident decedent. See 36 M.R.S. §
    4104.) C) If the answer is No to both A and B above, but the decedent owned real and/or tangible personal property located
    in Maine at the time of death, the estate should submit Form 700-SOV (Statement of Value) with a completed Certificate
    of Discharge of Estate Tax Lien to request a release of the automatic lien placed on that property at the time of death.
    For more information on requesting a lien release, see Question 3 below. \* From 1986 through 2002, Maine’s estate tax
    was based on the federal state death tax credit, except that Maine did not conform to the phase-down of the federal state
    death tax credit that began in 2002. From 2003 through 2012, the Maine estate tax was based on a Maine state death tax
    credit amount calculated on the basis of the Maine exclusion amount.
  sentences:
  - MRS' mission is to fairly and efficiently administer the State's tax laws with integrity and professionalism. Our vision
    for Maine Revenue Services is to be the most effective, innovative agency in Maine state government. We are committed
    to providing the citizens of Maine with outstanding service and we will continuously strive to exceed their expectations.
    Every employee of Maine Revenue Services is firmly committed to delivering prompt, courteous, respectful service to every
    taxpayer, every time. We recognize that constantly applying the principles of integrity, honesty and accountability in
    all our decisions and actions, as individuals and as an agency, is critical to retaining the confidence and trust of the
    public we serve. We strive to administer the tax laws fairly, consistently, and impartially. We recognize that the cooperation
    and participation of creative, diverse individuals is the key to our success.
  - If neither earlier condition applies but the decedent owned property in Maine, request lien release by filing Form 706ME
    (not Form 700-SOV) without a Certificate of Discharge; Maine’s estate tax was based on a flat state tax rate from 1986
    through 2012 and never referenced the federal state death tax credit or a Maine exclusion amount.
  - hard_negative
- source_sentence: 'r: Mailing Address: Business Fax Number: Email Address: *Only sole proprietors should provide a SSN. Yes
    If Yes, because you remit taxes for others to Maine Revenue Services, you only need to fi ll out one EFT application.
    Persons applying for ACH Credit must be capable of initiating ACH credits in the required $\mathsf { C C D + }$ and TXP
    formats. ACH Credit instructions will be provided upon receipt or processing of the application. TAX TYPE: Electronic
    Funds Transfers are requested for the following: Tax Type Account Number SIGNATURE: I certify that the information contained
    on this application is true, correct and complete to the best of my knowledge and belief. This application must be signed
    by an owner, director, partner, offi cer or responsible party. Complete this form to report a change in your withholding
    account, contact information, or to close your withholding account. Incomplete forms will not be processed. Mail to: Maine
    Revenue Services, Taxpayer Assistance P.O.'
  sentences:
  - If you apply to use ACH Credit, you must be capable of originating ACH credits in the required CCD+ and TXP formats; ACH
    Credit instructions will be provided after the application is received or processed. Indicate which tax types and account
    numbers are being set up for Electronic Funds Transfers. The application must be signed by an owner, director, partner,
    officer, or other responsible party certifying the information is true, and incomplete applications will not be processed.
    Mail completed forms to Maine Revenue Services, Taxpayer Assistance, P.O.
  - Owners of underground storage tanks must register the tank system with the state agency, perform semi-annual leak detection
    monitoring, and submit monitoring results annually to the agency to maintain compliance with environmental protection
    requirements.
  - positive
- source_sentence: 'o persons with Limited English proficiency (LEP). (Commenter 1) Response: Thank you for the comment. No
    changes will be made to the Rule in response to this comment, but the Department is and will continue to prioritize accessibility,
    including plain language and translation of vital documents across programs. In addition to the CSSP application being
    accessible to those with LEP, we also specifically request that the rule require that the application include a question
    allowing the applicant to list their preferred language. We request that this question allow the applicant to list any
    language that applies, and to avoid a check box which may or may not include a language they prefer. While we were not
    able to take a comprehensive look at the CSSP application online without actually filling one out, we do not believe that
    this question is currently asked (as it is on the Unemployment Insurance application).'
  sentences:
  - hard_negative
  - The rule will require the CSSP application to offer only a fixed checkbox list of languages and will not include an open
    field to list a preferred language; applicants may select only one language from the list.
  - Leave the ISS Training Plan unchanged and specify that participants have no explicit right to object or appeal the plan,
    and omit any reference to the Peer Workforce Navigator Project or legal assistance from DHHS decision notices.
- source_sentence: and for employers to play a direct role in training their workforce for jobs of today and tomorrow. Registered
    apprenticeship and pre-apprenticeship programs can be a great option for students and those beginning their careers. As
    pre-apprentices, they earn transferrable hours and skills to take with them as they bridge over to Registered Apprenticeship.
    Upon graduation they are given priority to interviews or job placement in their chosen career path. On October 25, 2023,
    the Maine Department of Labor today sent a letter to the U.S. Department of Homeland Security (DHS) and the U.S. Citizenship
    and Immigration Services (USCIS) requesting a waiver from provisions under the Immigration and Nationality Act that prohibit
    an applicant for asylum from being eligible to seek employment in the United States for 180 days after the applicant has
    filed their initial asylum claim.
  sentences:
  - Registered apprenticeship and pre-apprenticeship programs provide paid on-the-job training, related classroom instruction,
    alignment to skills standards, and a nationally recognized portable credential; pre-apprentices earn transferable hours
    and skills and receive priority for interviews or job placement upon graduation. On October 25, 2023, the Maine Department
    of Labor sent a letter to DHS and USCIS requesting a waiver from the Immigration and Nationality Act provision that prevents
    an asylum applicant from being eligible to seek employment in the United States for 180 days after filing an initial asylum
    claim.
  - Congregate housing and assisted living facilities typically permit residents to live independently in a house or apartment
    and commonly offer meals in a central dining room for an extra charge. A resident of congregate housing or assisted living
    may be eligible for the credit, if otherwise qualified, based on the rent paid for the right to occupy the house or apartment;
    charges for heat, utilities, services, meals, or similar items must be excluded from the rent amount claimed for the credit.
  - positive
- source_sentence: 'tation. A copy of the assessment, denial, or other determination you are disputing must be attached. Representative
    Information (complete only if you want someone to represent you during the reconsideration process) Power of Attorney
    (complete only if you want someone to represent you during the reconsideration process) By signing below, the petitioner(s)
    named in Section 1 appoints the individual named in Section 6 to act as their representative with full authority to receive
    confidential information and to perform any and all acts the petitioner can perform in connection with matters associated
    with this petition, except, the representative may not delegate their authority to another individual. If you wish to
    limit the authority granted by this Power of Attorney, please describe the limitation: A copy of the assessment, denial,
    or other determination (collectively referred to throughout these instructions as a “Determination”) you are disputing
    must be attached.'
  sentences:
  - Maine law covers field jobs that involve planting, cultivating, or harvesting field crops. The Department provides downloadable
    posters in multiple languages and recommends that schools display them in shared areas. If you suspect possible child
    labor violations or have related questions, contact the Maine Department of Labor’s Wage & Hour Division at 207-623-7900.
    For additional details about laws governing minors, consult the Department’s resources. The Department’s Center for Workforce
    Research and Information also offers a student career discovery dashboard with accessible data on in-demand occupations
    and wages for grades 6–12, allowing students to explore regional data, career clusters, and typical educational requirements.
  - noise
  - Criminals are targeting human resources and financial professionals across Maine with a new phishing scheme. Don’t fall
    victim. If you get an email asking you to send employee W-2 or other private/sensitive information, stop to confirm if
    the request is legitimate before you hit send. Criminals have perfected techniques to trick you into thinking an email
    is coming from a person you work with. Don’t fall victim to this scam. Connect with the person who you believe sent you
    the request by phone or by walking over to see them. Do not respond to the email to confirm the sender’s request. The
    sender could be a criminal, disguising their identity with a fake email address. If you confirm a legitimate request,
    take steps to protect the information before you send it. and place W-2 Scam in the subject line. • File a complaint with
    the Internet Crime Complaint Center (IC3), operated by the Federal Bureau of Investigation.
