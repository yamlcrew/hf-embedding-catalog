    - Portfolio

    - Blog

    - Career'
  - 'Business keeps asking questions about what has been done or what is delivered to our clients.


    What you can do:'
  - 'Appunite always pushes boundaries and is very creative in ensuring that there is knowledge shared amongst the workspace
    and to our external stakeholders. This extends itself to overcoming the problem of articles, which are a longer form of
    writing, that they can be time consuming. There has recently been the addition of the TIL section on our website and is
    thanks to the initiative of a few Appuniter who said they would like to make something like this happen. They took on
    the task and are now live on our site:  This is a valuable add to companies where peoples main focus is not writing and
    is somewhere else, in this case Software development. It allows for shortened pieces which are compacted with knowledge
    and what one learns is shared regularly.


    ### Akai


    As Appunite believes that the future is in the hands and minds of the youth, what better way to take advantage of this
    and benefit from a fruitful collaboration.'
- source_sentence: How did the narrator's feelings and thoughts change as they tried to figure out the reason behind the problem
    with the reaction counters in the posts?
  sentences:
  - '- About us

    - How we work

    - Services

    - Portfolio

    - Blog

    - Career


    <!-- image -->


    <!-- image -->


    <!-- image -->


    Miłosz Cisowski


    Product Manager


    <!-- image -->


    <!-- image -->


    # Workation 2.0 - How we work and travel without compromises


    <!-- image -->


    <!-- image -->


    ## The future is now, old man


    I bet right now you are sitting in the office or at home, thinking about how it would be possible to work, but also to
    travel. This is a great opportunity to live your life as a local, to enjoy the everyday life of people in different places
    that gives an amazing perspective on how you can walk, how you live and how you think in a different environment. It gives
    an opportunity to develop our minds, skills and business ideas.'
  - 'So I made the deployment.

    Waited…

    Nice, everything seems to be fine! The deployment was finished, and all servers were up and running. We were home!

    I went to the kitchen to make some coffee with a smile on my face. I did a really hard job, I deserved a break.

    After about half an hour after deployment, the client texted us in our shared Slack channel. Something was wrong, reaction
    counters in the posts showed 0 for everything!...

    My face turned white and my stomach felt weird. Is that possible that I did something pretty much irreversible? No, it
    is impossible that I broke it up so hard! How is it even possible it doesn’t work after all the tests that I had written
    were successful?!

    I sat in front of the computer and immediately started to look for reasons. Why did it happen? It’s impossible! Why, why,
    why? Wait, I think I got it!'
  - My assumption was that the onCreateViewHolder method should be called several times only when there are not enough ViewHolders
    available. Then, it should retrieve them from some ✨ magical pool ✨ , thus only onBindViewHolder should be called further
    during the scroll. Seems convenient, but believe me or not, I was struck dumb when I realised that in this situation,
    new ViewHolders are created every single time the user scrolls through the list! 😱
- source_sentence: How can you ensure that contacts are well synchronized in an application?
  sentences:
  - 'There is one more fantastic change. This year, we have created several groups that will visit different countries. The
    best part is you can go to any of them. This means that you can have not one but several Workation and you pay only for
    a transfer.


    This year Appuniters chose Montenegro, Tenerife, Istanbul, Zakopane (in Poland), Austria and Mexico. It seems impossible,
    but that''s how we do it in Appunite.


    Follow us on our social media to get more info about our trips.


    Join Appunite and create your own story!


    <!-- image -->


    <!-- image -->


    <!-- image -->


    Martyna Kowalska


    Employer Branding Specialist


    At Appunite, I''m responsible for employer branding. After work, I''m a student of clinical psychology. I believe that
    customers will never love a company until the employees love it first.


    <!-- image -->


    <!-- image -->


    ## Related articles


    <!-- image -->


    ### One minor change to regain your focus


    - #People

    - #Teamwork


    <!-- image -->'
  - 'You should check here whether all contacts are actually well synchronized.


    It is worth noting whether the application asks for access to the contacts, whether the message is formulated in the right
    way (there must be specific information for the user on how these contacts will be processed) and whether it is displayed
    in the right place.


    If the application is on the foreign market, it is also worth noting whether the invitations with text messages come to
    the recipient (this may be related to the directional prefix and the replacement of for example "+" with 00 digits).


    ## Update


    When the application is already in the store, it is worth testing what the update will look like. You should then download
    the store version and install the version that will be released as an update to it. There may also be various popups,
    buttons in settings, etc. in the application in order to inform the user about available updates.


    ### Examples of problems:'
