    amount of time I would meet so many new people, tackle many problems and learn so much stuff.'
- source_sentence: Compare and contrast the build times for the project under different approaches, including non-virtualized
    architecture, virtualization with no cache, and virtualization with several improvements. How did the build times change
    with each iteration?
  sentences:
  - 'After so many improvements we''ve noticed that the build started to be even faster when compared to the non-virtualized
    architecture times


    Approximate build times for the same project:


    - 1st approach with no virtualization ~ 10 minutes

    - 1st iteration of virtualization with no cache and other improvements ~ 30 minutes

    - virtualization with several improvements ~ 4-5 minutes


    As you can see, we''ve achieved a very scalable CI system that seems to be ideal...


    ## Current issues'
  - "Pro-tips first:\n\n- note, that in order to use FireStick in your app, you need to download AmazonFling and WhisperPlay\
    \ jars from here and include them in your project.\n- while launching the app after integrating FireStick you can get\
    \ a similar crash:java.lang.NoClassDefFoundError: Failed resolution of: Lorg/apache/http/conn/util/InetAddressUtils;\n\
    \      at com.amazon.whisperlink.android.util.RouteUtil.createRoute(RouteUtil.java:78)\n      at com.amazon.whisperlink.android.util.RouteUtil.createRoute(RouteUtil.java:51)\n\
    \            ...\nCaused by: java.lang.ClassNotFoundException: Didn't find class \"org.apache.http.conn.util.InetAddressUtils\"\
    \n\nIt is caused by lack of apache networking library in android runtime, since Android 6. To fix it, add the following\
    \ code to your AndroidManifest."
