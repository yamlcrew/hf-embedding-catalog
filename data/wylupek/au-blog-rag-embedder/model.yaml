  - '### Step #3


    The next step was to meet as a team and discuss the issue of everyone not  being on the same page when it comes to performing
    a great Code Review. I shared the document that I prepared for Tom with advice for the rest of the team, so we could have
    a base for discussion. Based on this document, we identified what needed to be fixed and what was excessive in our Code
    Review process. During the meeting, we prepared a document of Team Agreements on how to approach the Code Review process
    and what values should be taken into account.


    To avoid causing arguments among employees, I refrained everyone from blaming anyone personally. Instead, I focused on
    identifying the team''s problems and finding solutions. Our Appunite value is "Be a team player. We succeed and fail as
    a team".


    ### Step #4


    In the end, the actions taken helped the person become a better software engineer. I also spoke with his leader about
    setting personal goals to help him improve on a daily basis.'
