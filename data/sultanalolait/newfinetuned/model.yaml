widgetData:
- source_sentence: متى يتم رفض الدعوى لعدم استيفاء شروط العقد؟
  sentences:
  - من رسا عليه المزاد ولم يسدد الثمن.
  - يتم رفض الدعوى لعدم استيفاء شروط العقد عندما لا تثبت المدعية اكتمال الأعمال وفقًا لشروط العقد، أو عندما تقدم فواتير غير
    نهائية أو تحتوي على أخطاء وملاحظات.
  - شروط رفض دعوى إبطال سند لأمر تجاري تشمل عدم تقديم المدعي بينة كافية تثبت أسباب الإبطال، مثل التزوير أو عدم مشروعية السبب،
    وعدم اختصاص المحكمة بنظر الدعوى إذا كانت تدخل في اختصاص جهة أخرى.
- source_sentence: ما هي المطالبات والدعاوى التي يجب بيانها في المقترح؟
  sentences:
  - يعمل به من تاريخ نشره في الجريدة الرسمية.
  - لا تنفذ تصرفات المدين في أمواله بعد بدء آثار الحجز التنفيذي أو التحفظي.
  - بيان المطالبات والدعاوى التي أقامها المدين في تاريخ تقديم المقترح إلى المحكمة أو أي دعاوى يترجح إقامتها، والقيمة التقديرية
    لها.
- source_sentence: ما هي إجراءات المحكمة عند عدم سداد أجرة تأجير شيول؟
  sentences:
  - ظروف الجائحة تؤثر على تحصيل الإيجارات في العقود التجارية من خلال القيود المفروضة مثل حظر التجوال، مما قد يؤدي إلى تأخير
    المستأجرين في السداد.
  - نعم، يتم استحداث عدد كاف من وظائف السلك القضائي للمحاكم الجزائية في أول سنة مالية تالية لنفاذ نظام القضاء.
  - تحدد المحكمة جلسة للنظر في الدعوى، وتتحقق من تبلغ المدعى عليها، وتقبل الدعوى شكلاً إذا توافرت الشروط، وتطلب من المدعي
    تقديم بينته.
- source_sentence: ما هي شروط تفتيش المساكن حسب نظام الإجراءات الجزائية؟
  sentences:
  - لا يجوز تفتيش المساكن إلا بناء على اتهام بارتكاب جريمة موجه إلى شخص يقيم في المسكن، أو باشتراكه في الجريمة، أو وجود قرائن
    تدل على حيازته أشياء تتعلق بالجريمة.
  - نعم، للمدعي العام أو المدعي بالحق الخاص الاعتراض إذا كانت العقوبة تعزيرية غير مقدرة.
  - نعم، المحررات العادية تعتبر حجة في الإثبات أمام المحاكم التجارية وفقًا للفقرة (1) من المادة (29) من نظام الإثبات، والتي
    تنص على أن المحرر العادي يعد صادرًا ممن وقعه وحجة عليه ما لم ينكر صراحة ما هو منسوب إليه.
- source_sentence: ما هي الحالة التي يجب فيها بيان تأثير الغش في الطلب؟
  sentences:
  - الأسباب القانونية لنقض الحكم في الدعاوى التجارية تشمل عدم التزام المدعي بشروط العقد، وجود مخالفات مؤثرة، أو تقديم أوراق
    جديدة تثبت عدم استيفاء شروط العقد، مما يبرر إعادة النظر في الحكم.
  - النظر فيها مثل البت في الاختصاص والأهلية والصفة وحصر الورثة.
  - إذا كان الاعتراض مبنيًا على واقعة الغش، يجب بيان تأثيرها في الطلب.
