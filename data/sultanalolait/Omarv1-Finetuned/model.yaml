  - source_sentence: ما هي المبادئ القانونية التي تستند إليها المحكمة في الحكم بالتعويض عن أتعاب التقاضي؟
    sentences:
    - "[السياق: يتعلق هذا الجزء بوقائع الدعوى المقدمة من المدعية ضد المدعى عليه، حيث تدعي أنها سلمته مبلغًا ماليًا بقيمة 100,000\
      \ ريال عبر حوالتين بنكيتين لاستثماره في السوق، بينما ينكر المدعى عليه ذلك ويدعي أن المبلغ كان سدادًا لأعمال شخصية قام\
      \ بها للمدعية. وقررت المحكمة رفض الدعوى لعدم كفاية الأدلة المقدمة من المدعية.]  \nالوقائع : تتلخص وقائع هذه الدعوى في\
      \ أنه سبق أن تقدم وكيل المدعي الموضح بياناته أعلاه بلائحة دعوى إلى المحكمة التجارية بجدة ذكر فيها أن موكلتي قامت بتسليم\
      \ المدعى عليه مبلغ وقدره (100,000) مائة ألف ريال، عبر حوالتين بنكية بواسطة مصرف الراجحي، بمبلغ وقدره (50,000) خمسون\
      \ ألف ريال بواقع كل حوالة بنكية، حيث كانت الحوالة البنكية الأولى في تاريخ 29/12/1441هـ، والحوالة البنكية الثانية في\
      \ تاريخ 01/01/1442هـ، و موكلتي اتفقت مع المدعى عليه أن تسلمه مبلغ وقدره (100,000) مائة ألف ريال ليقوم باستثماره في السوق\
      \ بشكل عام، ولم يدفع المدعى عليه للمدعية شيئا سوى مبلغ وقدره (18,000) ثمانية عشرة ألف ريال يزعم المدعى عليه أنها أرباح،\
      \ وكان الاتفاق على أن تقوم موكلتي بدفع المبلغ وأن يقوم المدعى عليه باستثماره، ولم يتم تحديد نشاط معين يتم استثمار المال\
      \ فيه، ولم يتم الاتفاق على نسبة الأرباح، ولا على مدة معينة للاستثمار، ولا على نشاط محدد، وتقدمت موكلتي بذات المطالبة\
      \ سابقا في الدعوى المقيدة برقم (421501551) لدى المحكمة العامة بمحافظة جدة بالدائرة العامة الثامنة عشرة وقد صدر حكم قضائي\
      \ برقم (421664998) وتاريخ 24 / 12 / 1442هـ والمتضمن صرف النظر عن الدعوى نوعيا وذلك لتكييف الدائرة للدعوى على أنها شراكة\
      \ مضاربة، وقد اكتسب الحكم الصفة القطعية بتأييد محكمة الاستئناف، علما أن نشوء الحق كان بتاريخ ١٤٤١/١٢/٢٩هـ الموافق ٢٠٢٠/٠٨/١٩م.\
      \ وطالب بـالحكم ببطلان الشراكة،و إلزام المدعى عليه برد مبلغ و قدره (٨٢٠٠٠) اثنان وثمانون ألفا ريال.وقدم سندا لطلبه المستندات\
      \ الآتية: 1_ الحوالات البنكية.ثم قدم المدعى عليه جوابه على الدعوى المتضمن: الإقرار باستلام قيمة المال محل المطالبة،\
      \ لكنه كان سدادا لمستحقات خاصة له عن أعمال شخصية قام بها لصالح المدعية عبارة عن أعمال حدادة، وأعمال أخرى للمنزل، وكذلك\
      \ أعاد لها مبلغا قدره (18.000) ريال، لكونها كانت زائدة وغير مستحقة له ابراء لذمته، وينكر حصول أي اتفاق للاستثمار أو\
      \ الشراكة بينهما.وقد عقدت الدائرة جلسة مرئية في 1/7/1443هـ وملخصها: حضر وكيل المدعي ووكيل المدعى عليها، كما حضر خالد\
      \ قاعد"
    - "[السياق: يحلل هذا الجزء مدى اختصاص المحكمة وفحصها لمبررات المدعية، مع التأكيد على أن مخالفات المدير لا توجب تضمينه\
      \ بدين الشركة. وقررت المحكمة رفض الدعوى لعدم توفر الأساس النظامي.]  \nبصفته مديرا لشركة مصنع فنون الألمنيوم الدين الثابت\
      \ في ذمة شركة مصنع فنون الألمنيوم لصالح المدعية، فإن هذه المحكمة مختصة بنظر هذا النزاع وفقا للمادة (16 / 4) من نظام\
      \ المحاكم التجارية، وفي موضوع الدعوى فإن طلب المدعية هو تضمين المدعى عليه بصفته مديرا لشركة مصنع فنون الألمنيوم عن الدين\
      \ الثابت في ذمة الشركة لصالح المدعية بمبلغ قدره (125.689ريال)، ولأن طلب المدعية مبني على تعاقدها مع شركة مصنع فنون الألمنيوم\
      \ سجل تجاري رقم (...)، وأنها استحقت بموجب التعاقد مع الشركة مبلغا قدره (125.689ريال)، وأنه تعذر عليها استيفاء حقها من\
      \ الشركة، وطلبت تضمين المدعى عليه الدين الثابت في ذمة الشركة، وبعد فحص الدائرة للتعامل بين الطرفين، ومدى صحة تضمين المدعى\
      \ عليه الدين الثابت في ذمة الشركة، وبالاطلاع على المبررات التي ذكرها وكيل المدعية في دعواه، ولأن شركة مصنع فنون الألمنيوم\
      \ هي شركة ذات مسؤولية محدودة، ولأن ما ذكره وكيل المدعية في دعواه ليس مبررا كافيا لتضمين المدعى عليه –المدير- في أمواله\
      \ الخاصة عن دين الشركة ذات المسؤولية المحدودة، ذلك أن المدعية بنت دعواها على نص المادة (28 / 1) من نظام الشركات، ونصها:\
      \ \" يكون المدير وأعضاء مجلس الإدارة مسؤولين بالتضامن عن تعويض الشركة أو الشركاء أو المساهمين أو الغير عن الضرر الذي\
      \ ينشأ بسبب مخالفة أحكام النظام أو عقد تأسيس الشركة أو نظامها الأساس، أو بسبب ما يصدر منهم من أخطاء أو إهمال أو تقصير\
      \ في أداء أعمالهم. وكل شرط يقضي بغير ذلك يعد كأن لم يكن.\"، وهذا النص متعلق بدعوى التعويض عن الضرر الذي يصيب الغير بسبب\
      \ مخالفة المدير للنظام، وليس فيه حكم نظامي بتضمين المدير الدين الثابت في ذمة الشركة، كما استندت المدعية في دعواها على\
      \ نص المادة (17 / 2) من نظام الشركات، ونصها: \" يجب إعداد قوائم مالية للشركة في نهاية كل سنة مالية وفق المعايير المحاسبية\
      \ المعتمدة في المملكة، وإيداع هذه القوائم وفقا لما تحدده اللوائح خلال (ستة) أشهر من تاريخ انتهاء السنة المالية، وذلك"
    - '[السياق: يختتم هذا الجزء أسباب الحكم حيث قررت المحكمة وجود مماطلة من المدعى عليها بإقرارها بمبلغ في ذمتها وإجبار المدعي
      على اللجوء للقضاء. وحكمت بتعويض المدعي بمبلغ 100,000 ريال عن أتعاب التقاضي. وبهذا انتهت الدعوى.]

      الدائرة عن مزيد إضافة أو بينة أجابا بالنفي ، وفي جلسة اليوم 1444/01/05هـ حضر أطراف الدعوى وكالة، وقد قرر الأطراف الاكتفاء
      بما قدموا وطلبوا الفصل في القضية، ولصلاحية الدعوى للفصل فيها رفعت الجلسة للمداولة والنطق بالحكم. الاسباب : وبما أن وكيل
      المدعي طلب الحكم بإلزام المدعى عليها بدفع أتعاب التقاضي بمبلغ قدره (400,500) أربعمائة ألف وخمسمائة ريال عن القضية (5036)
      وتاريخ 1440/04/13هـ والمنظورة لدى هذه الدائرة بشأن مطالبة موكله بباقي مستحقاته المالية المتبقية بذمة المدعى عليها وقدرها
      (3,417,430) ثلاثة ملایین وأربعمائة وسـبعة عشر ألف وأربعمائة وثلاثون ریال والتي حكم فيها لصالح موكله ، وأجمل وكيل المدعى
      عليها إجابته في صحة ما يدعيه وكيل المدعي من صدور حكم سابق ضد موكلته ألا أنه دفع بأنه تم الحكم بناء على إقرار موكلته
      بجزء من مبلغ المطالبة السابق وتم الحكم بموجب ذلك، دون مماطلة من موكلته في أداء حق المدعي، وطالب برد دعوى المدعي ، وبما
      أنه ثبت للدائرة مماطلة المدعى عليها وذلك لأنها أقرت للمدعي بمبالغ في ذمتها وألجأته للقضاء للمطالبة بحقه، ولم تدفع له
      المبلغ الذي أقرت له فيه ، وعليه فإن الدائرة ترى استحقاق المدعي للتعويض عن أتعاب ما تحمله من جهد ووقت في مطالبته للمدعى
      عليها بمستحقاته، وتقدرها بمبلغ ١٠٠.٠٠٠ مئة ألف ريال وبه تقضي . لذلك كله نص الحكم : الحكم :'
  - source_sentence: ما هي قرائن إثبات الوفاء في الدعاوى التجارية؟
    sentences:
    - "[السياق: يتناول هذا الجزء السندات المقدمة كدليل على تعديل مواعيد الدفعات، ويثير المدعي أنها مجرد ضمان وليس تعديلاً.\
      \ وقررت المحكمة أن السندات لا تغير من شروط العقد الأصلي.]  \nالسندات في ملف القضية الالكتروني، وفي جلسة أخرى حضر وكيل\
      \ المدعي كما حضر وكيل المدعى عليها، واطلعت الدائرة على مذكرة وكيل المدعى عليها المرفقة بملف القضية الالكتروني بتاريخ\
      \ 9 / 6 /1441ه والتي جاء فيها : أن مدار القضية على ملحق عقد البيع المؤرخ في 11/ 03/ 1440هـ وذلك أن الملحق تم توقيعه\
      \ مع أحد الشركاء وهو: صالح بن ناصر بن صالح الزغيبي ولم يتم توقيعه من بقية الشركاء وذلك لأن بقية الشركاء قد أقروا بعقد\
      \ البيع الأساس المؤرخ في 26/ 8/ 1439هـ على أن ثمن العقد يكون لفائدة صالح بن ناصر بن صالح الزغيبي وهو من يستفيد به منفردا\
      \ دون غيره، لذا فإنه هو المخول بتعديل مواعيد استحقاق دفعات شراء الكليات بالتبعية واللزوم ويؤيد هذا: وجود ختم رسمي من\
      \ إدارة المشروع الذي تم بيعه بموجب العقد الملحق ولا وجه لما أورده وكيل المدعي من الحديث عن العقارات: لعدم علاقتها بالدعوى\
      \ جملة وتفصيلا ولا وجه لما ذكره وكيل المدعي من أن السندات لأمر كانت مجرد أداة وفاء وضمان لثمن البيع؛ وذلك لأن العقد\
      \ الملحق نص صريحا على تعديل مواعيد استحقاق الدفعات استنادا للتواريخ المثبتة بالسندات لأمر: مما يبطل هذا الادعاء المرسل\
      \ لذلك كله وبناء عليه: فإن موكلي يتمسك بطلباته المثبتة بالجلسة الماضية، كما اطلعت الدائرة على السندات لأمر المرفقة وهي\
      \ كالآتي: 1- سند بمبلغ قدره (120,000,000) ريال وموعد استحقاقه بتاريخ 30/ 11/ 1442هـ. 2- سند بمبلغ قدره (105,000,000)\
      \ وموعد استحقاقه بتاريخ 30/ 06/ 1442هـ. 3- سند بمبلغ قدره (110,000,000) وموعد استحقاقه بتاريخ 30/ 01/ 1442هـ. 4- سند\
      \ بمبلغ قدره (95,000,000) وموعد استحقاقه بتاريخ 03/ 09/ 1441هـ. 5- سند بمبلغ قدره (90,000,000) وموعد استحقاقه بتاريخ\
      \ 30/ 04/ 1441هـ. 6- سند بمبلغ قدره (80,000,000) ريال وموعد استحقاقه بتاريخ 30/ 12/ 1440هـ. وذكر بأن السندين الأخيرين\
      \ عليهما منازعة تنفيذية منظورة أمام محكمة التنفيذ بالرياض وأكد وكيل المدعى عليها على طلب صرف النظر عن الدعوى لرفعها\
      \ قبل أوانها، ورفض الدعوى فيما يتعلق بالسندين الأخيرين"
    - "[السياق: يتناول هذا الجزء الجلسة المرئية ومناقشة الحوالة البنكية المقدمة من المدعى عليها كدليل على السداد، ورد المدعي\
      \ بأنها حديثة. وقررت المحكمة أن الحوالة تثبت الوفاء وأن سكوت المدعي يعد قرينة على الرضا.]  \n2022م، تمثل قيمة الحصص\
      \ التي اشترتها موكلته من المدعي، وكانت من حساب ابن موكلته محمد صلاح الدين إدريس إلى حساب المدعية، فعقب المدعي وكالة\
      \ بأن تاريخ الحوالة حديث، وهذا يؤكد أنه مضطرب في دفوعه، ويؤيد ذلك أنه لم يلتزم بسداد ما عليها، وهو يطالبها الحكم بفسخ\
      \ الاتفاقية الشفهية المؤرخة والتي تمت قبل تاريخ 14/ 05/ 1435هــ (أي قبل تاريخ قرار تعديل عقد تأسيس شركة سياج) ؛ لكونها\
      \ لم تسدد قيمة الحصص لموكله، فعقب المدعى عليه وكالة بعدم وجود اتفاق شفهي، وسكوت المدعي عن المطالبة بقيمة الحصص مدة تتجاوز\
      \ (8) سنوات، يؤكد استمرارية الشراكة، وصحة شراء موكلته للحصص، وأن الخلاف نشأ بينهما حين اكتشفت المدعى عليها عدم قيام\
      \ المدعي بصفته مدير لشركة بتعديل بيانات الشركاء لدى مكتب السجل التجاري في الوزارة، فتقدم بشكوى لإثبات مخالفة المدعي\
      \ لنظام الشركات لعدم تسجيل الحصص العائدة للمدعى عليها، وبناء عليه جرى رفع الجلسة. وعقدت الدائرة جلسة مرئية في تاريخ:\
      \ 10/ 2/ 1444هـ وملخصها: حضر وكيل المدعي برقم وكالة (40703776) كما حضر وكيل المدعى عليها برقم وكالة (401133454) ولصلاحية\
      \ الدعوى للفصل فيها قررت الدائرة حجز القضية للنطق بالحكم. الاسباب : وحيث حصر وكيل المدعي دعواه في طلب فسخ اتفاقية بيع\
      \ الحصص المبرمة مع المدعى عليها لعدم سداد قيمة الحصة وحيث أقرت المدعى عليها بصحة اتفاقية بيع الحصص وأنكرت عدم سداد قيمة\
      \ الحصة ودفعت بأن المدعي قد استوفى حقه بموجب مقاصة حيث إنها باعت المدعي حصص في شركة بي ام كير بمبلغ قدره: (360.000)\
      \ وأن المدعي لم يلتزم بسداد كامل قيمة الحصص واستندت في دفعها إلى ما جاء في قرار إدخال الشركاء الذي تضمن أنه تم الوفاء\
      \ برأس مال الشركة عن التأسيس وأن سكوت المدعي لثمان سنوات قرينة على عدم صحة دعواه ودفع المدعي بإنكار ما ذكرته المدعى\
      \ عليها من حصول الوفاء بقيمة الحصة وبما أن المدعى عليها أرفقت إيصال حوالة صادرة من ابن المدعى عليها في تاريخ: 21/ 4/\
      \ 2022م إلى حساب المدعي بمبلغ قدره: (25.000)"
    - '[السياق: يستكمل هذا الجزء تفاصيل الاعتراض المقدم من المدعى عليها على حكم المحكمة التجارية، حيث تشمل أسباب الاعتراض
      عدم اختصاص المحكمة التجارية، وعدم إخطار المدعى عليها قبل رفع الدعوى، والحاجة إلى مناقشة المبالغ المالية بين الطرفين.
      وقررت المحكمة بعد الدراسة تأييد الحكم السابق لصحة أسبابه واستناداً إلى المواد النظامية.]

      عليها/ شركة الجابرين للمقاولات سجل تجاري رقم (...) أن تدفع للمدعي/ راضي صالح سعيد الصيعري هوية رقم (...) بصفته مالك
      مؤسسة راضي صالح سعيد الصيعري للمقاولات العامة سجل تجاري رقم (...) مبلغا قدره (820,278) ثمان مئة وعشرون ألفا ومئتان وثمانية
      وسبعون ريالا، ويخضع هذا الحكم للاستئناف لمدة (30) ثلاثين يوما من تاريخ استلام نسخة الحكم، وبتسليم المدعى عليه وكالة
      نسخة صك الحكم تقدم بلائحة اعتراضية طلب فيها: أولا: قبول الاعتراض شكلا وموضوعا، ثانيا: نقض الحكم في القضية رقم (4471018871)،
      لأسباب حاصلها: أولا: عدم اختصاص المحكمة التجارية بنظر الدعوى إعمالا لما نص عليه نظام المحاكم التجارية ولائحته التنفيذية
      في المادة (16) تختص المحكمة بالنظر في الآتي: 1 - المنازعات التي تنشأ بين التجار بسبب أعمالهم التجارية الأصلية أو التبعية.
      2- الدعاوى المقامة على التاجر في منازعات العقود التجارية، متى كانت قيمة المطالبة الأصلية في الدعوى تزيد على مائة ألف
      ريال، وللمجلس عند الاقتضاء زيادة هذه القيمة . ثانيا: عدم إخطار موكلتي قبل رفع الدعوى وهذا مخالف لما نص عليه نظام المحاكم
      التجارية ولائحته التنفيذية في المادة رقم (19) من النظام التي نصت على يجب في الدعاوى التي تحددها اللائحة أن يخطر المدعي
      المدعى عليه كتابة بأداء الحق المدعى به قبل (خمسة عشر يوما على الأقل من إقامة الدعوى . ثالثا: بمراجعة موكلتي للسجلات
      والمصادقة الرصيد القدمة تبين أن موكلتي بحاجة لمناقشة المبالغ المالية مع المدعى عليها ويتم من خلال اجتماع محاسبي الطرفين
      للتحقق من مبلغ المطالبة، وتم إحالة القضية إلى هذه الدائرة في 29/ 12/ 1444هـ وفي جلسة هذا اليوم جرى افتتاح القضية عبر
      الاتصال المرئي. ولصلاحيتها للفصل رفعت للمداولة. Reasons : بعد دراسة ملف القضية ومستنداتها، والحكم الصادر فيها، والاستئناف
      المقدم وما بني عليه من أسباب، ظهر أن الاعتراض قدم خلال المهلة النظامية، ومن ثم فهو مقبول شكلا. أما عن الموضوع فقد استبان
      للدائرة صحة النتيجة التي خلصت إليها الدائرة في قضائها، وأن في الأسباب التي أقامت عليها هذا القضاء موكلتي للسجلات والمصادقة
      الرصيد القدمة تبين أن موكلتي بحاجة لمناقشة المبالغ المالية مع المدعى عليها ويتم من خلال اجتماع محاسبي الطرفين للتحقق
      من مبلغ المطالبة، وتم إحالة القضية إلى هذه الدائرة في 29/ 12/ 1444هـ وفي جلسة هذا اليوم جرى افتتاح القضية عبر الاتصال
      المرئي. ولصلاحيتها للفصل رفعت للمداولة. Reasons : بعد دراسة ملف القضية ومستنداتها، والحكم الصادر فيها، والاستئناف المقدم
      وما بني عليه من أسباب، ظهر أن الاعتراض قدم خلال المهلة النظامية، ومن ثم فهو مقبول شكلا. أما عن الموضوع فقد استبان للدائرة
      صحة النتيجة التي خلصت إليها الدائرة في قضائها، وأن في الأسباب التي أقامت عليها هذا القضاء ما يكفي لتأييد هذا الحكم،
      ولذلك، واستنادا إلى المادة 78/2 من نظام المحاكم التجارية والفقرة (أ) من المادة 215 من اللائحة التنفيذية لذات النظام،
      وبعد دراسة القضية، فإنها تنتهي إلى تأييده محمولا على أسبابه. Ruling :'
  - source_sentence: هل تقبل المحكمة اليمين كدليل في نزاعات العقود؟
    sentences:
    - "[السياق: يناقش هذا الجزء إجراءات المحكمة في طلب توضيح السندات المتنازع عليها وموقف الطرفين منها. وقررت المحكمة أن المدعي\
      \ أقر بجزء من السندات مما يفيد سداد المبالغ.]  \nأو شخص مكلف بخدمة عامة ما تم على يديه أو ما تلقاه من ذوي الشأن، وذلك\
      \ طبقا للأوضاع النظامية وفي حدود سلطته واختصاصه. أما الورقة العادية فهي التي يكون عليها توقيع من صدرت منه أو ختمه أو\
      \ بصمته)، وقد نصت المادة (139/ 1) أن للخصم أن يقدم أي محرر يرى أنه يؤيد دعواه. 2- المدعي منكر للاستلام ولحسم الدعوى\
      \ طلبي هو إحالة سندات القبض للأدلة الجنائية وفق المادة الثانية والأربعون بعد المائة، والمادة الثالثة والأربعون بعد المائة.\
      \ 3- طلبي وفق المادة السابعة والأربعون بعد المائة. 4- إضافة إلى توقيع المدعي على سندات القبض للمبالغ التي يطالب فيها\
      \ لدي شاهد على تسليم المبالغ للمدعي، وأيضا أطلب منحي الفرصة وفتح جلسة للاستماع إلى شهادته المنتجة في الدعوى والحاسمة\
      \ لها، وهي وفق المادة (121) وما بعدها من نظام المرافعات الشرعية. 5- المادة السادسة والخمسون بعد المائة. 6- المادة الأولى\
      \ بعد المائة من نظام المرافعات الشرعية. لما سبق أطلب صرف النظر عن الدعوى وإحالة كامل السندات، وفتح جلسة للاستماع للشاهد.\
      \ وفي جلسة 24/ 01/ 1444هـ حضر الأطراف، وبعد دراسة القضية جرى سؤال المدعى عليه عن السندات التي تضمنت توقيع المدعي أصالة\
      \ وعن مجموعها وعن السندات الموقع من ابن المدعي ومجموعها؟ فقال: أطلب مهلة لحصرها هكذا قال، وبسؤال المدعى عليه هل لدى\
      \ ابن المدعي وكالة عند التوقيع على السندات؟ فقال: ليس لديهم وكالة عن والدهم، لكنهم يستلمونها بحضور والدهم عندي في المعرض\
      \ وعندي شهود على ذلك، هكذا قال، وبسؤال المدعى عليه عن آلية تسليم المدعي وابنه المبالغ؟ فقال: أغلبها نقدا وبتوقيعه على\
      \ السند وبعضها حوالة، هكذا قال، وبسؤال المدعي وكالة عن جواب صريح حيال التوقيعات الواردة في سندات الصرف المقدمة من المدعى\
      \ عليه؟ فقال: التواقيع مختلفة عن توقيع موكلي، كما أن بعض السندات ليس عليها توقيع هكذا قال، وبسؤاله هل هي مطابقة أو مشابهة\
      \ لتوقيع موكلك أم أنها مخالفة لها بالكلية؟ فقال إنها مختلفة ولا تشبه توقيع موكلي، ثم أضاف: وأما توقيعات أبناء المدعي\
      \ فموكلي"
    - "[السياق: يركز هذا الجزء على إقرار المدعى عليها بتسلم البضائع وتناقضها حول سداد المبلغ، بينما تؤكد المدعية وجود متبقٍّ\
      \ مستحق. وقررت المحكمة أن السكوت عن الاعتراض على تعديل الأسعار يُعتبر موافقة.]  \nأنه للمبلغ محل الدعوى. ثم سألت الدائرة\
      \ وكيلة المدعية متى تحققتم من صحة الحوالة فقالت في 22 / 8 / 2022م. وبعرض ذلك على وكيل المدعى عليها وسؤاله عن تاريخ الحوالة\
      \ فقال في 2016م. ثم قررت الدائرة الكتابة إلى البنك المركزي للتحقق من صحة الحوالات، ورفعت الجلسة وبالله التوفيق. وعقدت\
      \ الدائرة جلسة عن بعد في تاريخ 1444/03/29هـ وملخصها: حضرت وكيلة المدعية/منى العليقي، وحضر وكيل المدعى عليها/محمد الهلال،\
      \ المدونة بياناتهما سابقا، ثم قررت الدائرة الرجوع عن الكتابة إلى البنك المركزي، وطلبت الدائرة من وكيلة المدعية تقديم\
      \ كشف حساب بنكي للفترة التي تدعي المدعى عليها أنها قامت بتحويل المبلغ فيها، وطلبت الدائرة من وكيل المدعى عليها إرفاق\
      \ ما يثبت صدور الحوالة من حساب موكلته، ثم سألت الدائرة وكيل المدعى عليها هل يوجد تعاملات أخرى؟ فقال نعم. ثم سألته الدائرة\
      \ هل السداد يتعلق بالمطالبة محل الدعوى؟ فقال سداد سابق. ثم قال أعتقد هو نفس المبلغ الذي يطالبون به، ثم سألته الدائرة\
      \ هل تسلمت موكلتك البضائع التي قامت المدعية بنقلها؟ فقال: نعم. ثم سألت الدائرة وكيلة المدعية عن الفاتورة محل الدعوى\
      \ التي تطالب موكلتها بقيمتها، فطلبت مهلة للرجوع لموكلتها، ثم قررت الدائرة رفع الجلسة. وعقدت الدائرة جلسة مرئية في 11/05/1444هـ\
      \ وفيها حضر وكيل المدعية/ عبدالله محمد مخيلد الجاسر بالوكالة رقم (433343637)، ولم تحضر المدعى عليها ولا من ينوب عنها\
      \ رغم تبلغها برابط الجلسة وأشارت الدائرة إلى أن وكيل المدعية أرفق مجموعة من الفواتير، ثم ذكر وكيل المدعية بأن المبلغ\
      \ الذي حصل فيه خلاف مسدد من المدعى عليها وهو مخصوم من مبلغ المطالبة. حيث إن إجمالي أجرة النقل (132،327) ريال سددت منها\
      \ المدعى عليها مبلغا وقدره (65.500) ريال، وتبقى في ذمتها مبلغا قدره (66.827) ريال، وذلك استنادا على العقد والفواتير\
      \ المرفقة بالدعوى. ثم رأت الدائرة صلاحية الدعوى للفصل فيها وقررت قفل باب المرافعة ورفع الجلسة لإصدار الحكم. وأما عن\
      \ موضوع الدعوى؛ فإن المدعية تطلب إلزام المدعى عليها بأداء مبلغ قدره (66.827) ستة وستون ألف وثمانمائة"
    - "[السياق: يركز هذا الجزء على إجراءات المحكمة خلال الجلسة، حيث أدلى الشاهد بشهادته وأدى المدعى عليه اليمين بنفي الإخلال\
      \ بالعقد. وقررت المحكمة قبول اليمين ورفض الدعوى لعدم إثبات المدعية دعواها.]  \nالوجبات التي تسلمتها من متعهد الإسناد\
      \ تفصيلا، مع بيان قيمتها، فكرر وكيل المدعية ما سبق ذكره بصدر واقعات الحكم من كون المدعى عليه تخلف توريد عدد (11,742)\
      \ وجبة، وأن قيمتها ثمانمئة وسبعة عشر ألف ريال، وفي جلسة الحكم وفي هذه الجلسة حضر وكيل المدعية وحضر لحضوره المدعى عليه\
      \ أصالة، كما حضر الشاهد عبدالرحمن فهد الهبيدي، سجل مدني رقم (...) وهو أخ للمدعى عليه، وبسؤاله عما يشهد ذكر أنه قد حضر\
      \ مساء يوم التاسع واليوم العاشر من شهر ذو الحجة، وكان حاضرا أثناء تنفيذ المدعى عليه للأعمال، ثم سألت الدائرة وكيل المدعية\
      \ هل لديه مزيد بينه على الوجبات التي استلمتها موكلته من متعهدي وجبات الإسناد فذكر بأنه ليس لديه سوى ما قدم، ثم طلبت\
      \ الدائرة من المدعى عليه أصالة أداء اليمين فاستعد بأدائها، وأداها قائلا:{ وﷲ العظيم الذي لا إله غيره أنني قد نفذت جميع\
      \ الأعمال وفق العقد المبرم بيني وبين المدعية/ مؤسسة حجاج الدول الأفريقية غير العربية، وقد سلمت جميع الوجبات ولم أخل\
      \ بشيء منها، وﷲ العظيم، وﷲ العظيم، وﷲ العظيم} هكذا حلف، وبعرض اليمين على وكيل المدعية قرر قبول يمين المدعى عليه، ثم\
      \ قرر الطرفان الإكتفاء. الاسباب : ولما كانت المدعية تطلب إلزام المدعى عليه بمبلغ قدره ثمانمئة وسبعة عشر ألف ريال، إضافة\
      \ إلى إلزامه بالتعويض، وتحميله أتعاب المحاماة، لما ورد بواقعات الحكم مفصلا، ولما كانت المدعية قد استندت في دعواها على\
      \ المحاضر التي ذكرت أنها تثبت إخلال المدعى عليه بالعقد، وباطلاع الدائرة على تلك المحاضر رأت أنها لا ترقى لإثبات ما تذكره\
      \ المدعية، إذ إنها صادرة على مطبوعاتها، وموقعة من قبل موظفيها، إضافة إلى أنها خالية من توقيع من يمثل الجهة المشرفة على\
      \ الحج (وزارة الحج)، ولما كانت المدعية قد ذكرت أنه جراء إخلال المدعى عليه بالعقد اضطرت إلى اللجوء إلى عقود الإسناد،\
      \ التي قدمت نسخا منها، كما قدمت ما يثبت سدادها مستحقات متعهدي الإسناد عن تلك العقود، وباطلاع الدائرة على تلك المستندات\
      \ تبين لها أن المدعية قد"
  - source_sentence: ما هي شروط الحكم بدفع المبلغ المتبقي ورفض التعويض عن أضرار التقاضي؟
    sentences:
    - "[السياق: يستكمل هذا الجزء تفاصيل الجلسات اللاحقة حيث حضر وكيل المدعي وتغيب المدعى عليه رغم التبليغ عبر خدمة \"أبشر\"\
      ، وأكدت المحكمة اختصاصها وقبول الدعوى شكلاً، واستند وكيل المدعي إلى مطابقة رصيد مختومة وكشف حساب. وقررت المحكمة رفع\
      \ الجلسة للدراسة تمهيدًا لإصدار الحكم.]  \nيمثله رغم التبلغ بموعد هذه الجلسة وتشير الدائرة إلى أنها افتتحت هذه الجلسة\
      \ التحضيرية عبر الاتصال المرئي، ولتحقق الدائرة بما ورد في المادة (90) من اللائحة التنفيذية لنظام المحاكم التجارية وعن\
      \ صحة التوزيع الداخلي أفهمت الدائرة الحاضر أن هذه الدعوى تقع في ولاية اختصاصها القضائي بناء على المادة (16) من نظام\
      \ المحاكم التجارية كما رأت الدائرة أن هذه الدعوى -مبدئيا- مقبولة شكلا وتحققت فيها شروط قبول الدعوى، ثم سألت الدائرة\
      \ وكيل المدعية عن طلبه في هذه الدعوى، أجاب أحيل إلى ما ورد في لائحة الدعوى، وبسؤاله عن البينات أجاب أحيل إلى ما ورد\
      \ في ملف القضية من بينات وهي: (مطابقة رصيد عليه ختم وتوقيع المدعى عليه، و كشف حساب صادر من موكلتي) وبسؤاله هل لديك ما\
      \ تود إضافته؟ أجاب أكتفي بما قدمته سابقا. وعليه قررت الدائرة رفع الجلسة للدراسة. وفي 09/08/1444هـ عقدت جلسة مرئية، ملخصها:\
      \ حضر وكيل المدعية (راشد إبراهيم بن راشد الزهراني) بالوكالة رقم (442823234) وتبين عدم حضور المدعى علية او من يمثله رغم\
      \ تبلغه بموعد هذه الجلسة وبعد دراسة الدائرة لأوراق القضية رفعت الجلسة للمداولة وإصدار الحكم. الاسباب : وبعد سماع الدعوى،\
      \ والاطلاع على أوراق القضية ومستنداتها، وبما أن المدعي وكالة يدعي أن موكلته وردت للمدعى عليه أجهزة كهربائية بثمن وقدره\
      \ (١٧٦,٢٤٠.٠٤) مائة وستة وسبعون ألفا ومئتان وأربعون ريال، وقد استلم المدعى عليه الأجهزة ولم يدفع ثمنها، وطلب المدعي\
      \ وكالة إلزام المدعى عليه بدفع ثمنها، وبما أنه صدر قرار المجلس الأعلى للقضاء رقم (219/6/39) وتاريخ 21/4/1439ه، المبني\
      \ على الأمر الملكي رقم (14388) وتاريخ 25/3/1439ه المتضمن الموافقة على استعمال الوسائل الإلكترونية في التبليغات القضائية،\
      \ وأنه يعتبر منتجا لآثاره النظامية وأنه يعتبر تبليغا لشخص المرسل إليه، وبما أن المدعى عليه أبلغ عن طريق خدمة أبشر، وبما\
      \ أن المادة (57) من نظام المرافعات الشرعية نصت على أنه: (... 2- إذا تبلغ المدعى عليه لشخصه أو وكيله في الدعوى نفسها\
      \ بموعد الجلسة، أو أودع هو أو وكيله مذكرة بدفاعه لدى المحكمة قبل"
    - "[السياق: يتناول هذا الجزء تفاصيل خطاب الالتزام الصادر من المدعى عليها والالتزامات المترتبة عليه، مع إشارة إلى وجود\
      \ دفعات مستحقة قبل إصدار الخطاب. وقررت المحكمة صحة مطالبة المدعية بناءً على الخطاب.]  \nالدفعات المستحقة (إن وجدت) فسوف\
      \ يتم النظر فيها عند اكتمال الأعمال بالمشروع لجميع مقاولي الباطن) وحيث ان الخطاب تضمن التزامين مختلفين كالتالي: أ/ الالتزام\
      \ الأول وهو التزام شركة الاستثمارات الرائدة بالدفع مباشرة مقابل انهاء جميع الاعمال المتبقية في العقد بين موكلي وبين\
      \ المقاول الرئيسي ب/ فيما يخص الدفعات المستحقة (إن وجدت) فسوف يتم النظر فيها عند اكتمال الأعمال بالمشروع لجميع مقاولي\
      \ الباطن وحيث ان المستحقات لموكلي في حين اصدار الخطاب المرفق من المدعى عليها كانت مستحقة الأداء بقيمة 4.480.715.02 ريال\
      \ حسب مطابقة الرصيد كما تم ذكره أعلاه،أي انه قد تحقق بذلك معنى ماورد في خطاب الالتزام للمدعى عليها (الدفعات المستحقة\
      \ إن وجدت) رابعا: سبق وتمت إقامة دعوى على المدعى عليها برقم 42805650 وتاريخ 09 / 09 / 1442 هـ وتم صدور حكم في الدعوى\
      \ بتاريخ 05 / 02 / 1443 هـ والصك رقم 437717305 وتاريخ 12/07/1443 هـ الصادر من محكمة الاستئناف التجارية ولما ورد في الأسباب\
      \ في صك الحكم الأخير (إن المستند لا ينفي التزام المدعي عليها وإنما يتضمن الوفاء بالسابق للمستند يكون بطريقة معينة،كما\
      \ أن حكم الإفلاس الصادر في حق الأصيل لا يعني عدم جواز مطالبة الكفيل) وحيث تم إقرار المدعى عليها بصحة خطاب الالتزام والكفالة\
      \ وعدم انكارها لها مما يثبت معها التزامها بقيمة كامل المديونية للدفعات السابقة واللاحقة المذكورة في خطاب الالتزام خامسا:\
      \ كما ذكرت المدعى عليها في مذكرتها سابقا فقره رقم 5 بأنه تم سحب المشروع من المقاول الرئيسي وبعد أن تم سحب المشروع لا\
      \ يمكن اعتماد أي مستخلصات أخرى نظرا لإن المشروع تم سحبه من المقاول الرئيسي وبناء على ذلك تعذر استكمال المشروع وليس لموكلتي\
      \ أي يد او سبب في ذلك،حيث ان المقاول الرئيسي شركة ازميل للمقاولات قد افلست وصدر بحقها صك حكم بالإفلاس في القضية رقم\
      \ 374 لعام 1441 هـ وبالتالي تنتقل المطالبة للكفيل حسب النظام والعرف و ان المستخلصات كانت قبل تاريخ خطاب الالتزام مصدقه\
      \ ومختومة وموقعه من قبل المقاول الرئيسي أي انها مثبته"
    - '[السياق: يوضح هذا الجزء أسباب حكم المحكمة حيث قبلت طلب المدعي بدفع المبلغ المتبقي بناءً على الإقرار الصريح من المدعى
      عليه واعتماد الشيك كوسيلة إثبات، بينما رفضت طلب التعويض عن أضرار التقاضي لعدم ثبوت تكبد المدعية لأتعاب محاماة.]

      ونرفض الصلح ونرفض الشيك وحيث ان وكالة وكيل المدعى عليها فيها حق الإقرار رقم 44330884 واقر بصحة المبلغ عليه قررت الدائرة
      قفل باب المرافعة لصلاحيتها للفصل فيها والنطق بالحكم الاسباب : وقد حصر وكيل المدعية طلباته في إلزام المدعى عليها بدفع
      المبلغ المتبقي وقدره (16,100) ستة عشر ألفا ومائة ريالا، والتعويض عن أضرار التقاضي بمبلغ قدره (10,000) عشرة آلاف ريال،
      وأجمل وكيل المدعى عليها إجابته في الإقرار بمبلغ المطالبة، وبناء على ما طلبته المدعية في المصالحة تم صرف شيك مصدق وفقا
      لطلبها، ولكن المدعي رفضت استلامه وأفاد الطرفان ان المدعي لم يستلم الشيك، وبما أن وكيل المدعية طلب إلزام المدعى عليها
      بدفع المبلغ المتبقي وقدره (16,100) ستة عشر ألفا ومائة ريالا، واستند إلى شيك صادر من المدعى عليها لأمر موكلته تضمن مبلغ
      المطالبة، وحيث أن الشيك وسيلة من وسائل إثبات الحق لصاحبه، وبما أن وكيل المدعى عليها أقر بالمبلغ المذكور ووكالته تخوله
      حق الإقرار، وحيث يعد الإقرار حجة قاطعة، وفقا لما نصت عليه الفقرة الأولى من المادة السادسة عشرة من نظام الإثبات ونصها:
      "يكون الإقرار صراحة أو دلالة، باللفظ أو بالكتابة"، مما تنتهي معه الدائرة إلى قبول الطلب، وأما عن مطالبته بأتعاب المحاماة،
      وبما أنه متى تبين للدائرة مماطلة من عليه الحق بقصد الكيد والإضرار بالمدعية، فإن للدائرة حق تقدير ذلك والحكم عليه بمصروفات
      الدعوى وأتعابها، وحيث أن الدائرة بعد نظرها الدعوى تبين عدم وجو عقد اتعاب فلم يثبت للدائرة تكبد المدعية اتعاب محاماة،
      مما تنتهي معه الدائرة إلى رفض الطلب. نص الحكم : ذلك والحكم عليه بمصروفات الدعوى وأتعابها، وحيث أن الدائرة بعد نظرها
      الدعوى تبين عدم وجو عقد اتعاب فلم يثبت للدائرة تكبد المدعية اتعاب محاماة، مما تنتهي معه الدائرة إلى رفض الطلب. نص الحكم
      :'
  - source_sentence: ما هي حقوق المدعية إذا انخفضت المبيعات بسبب سياسة المدعى عليها؟
    sentences:
    - "[السياق: يوضح هذا الجزء رد المدعية على اعتراض المدعى عليها على تقرير الخبير وتأكيد أحقيتها في المطالبة. وقررت المحكمة\
      \ متابعة النظر في الدعوى.]  \n(اعتراض على ما تقدم به الخبير في تقريره أبين ما يلي: أولا: في المستهل العقد بدأ في تاريخ\
      \ ٩/٤/٢٠١٧م الموافق ١٢/٧/١٤٣٨ هـ وانتهى التعاقد تاريخ 31/7/٢٠١٨م الموافق 18/١١/١٤٣٩هـ ثانيا: جاء التقرير متفقا مع ما\
      \ ادعى به المدعي دون النظر لما لدى موكلتي. ثالثا : إن نقطة التعادل هي٩٢٠٠ النقطة التي في حال بلغت المبيعات أكثر منها\
      \ فإنه يكون هناك تحصيل لصالح موكلتي بنسبة 7% منه أما في حال كان أقل فإن موكلتي لا تحصلها ، بشرط أن لا يكون سبب تراجع\
      \ المبيعات عن هذه النسبة بسبب إهمال المدعي وإلا كان تحصيلها حقا لموكلتي . رابعا: ما اعتمد عليه الخبير في تقريره جدول\
      \ مرسل من المدعي ومن إعداده حيث إن ادعاء المدعي تسليم موكلتي مبلغ 46853 ريالا وهذا الأمر غير صحيح لم تستلم موكلتي أي\
      \ مبالغ. خامسا: لدى موكلتي ما يثبت إهمال المدعي وعليه فموكلتي لها الحق بالمطالبة بنسبة التحصيل بناء على م١٣/٤ من عقد\
      \ الامتياز والتي نصت على : في حالة إهمال الطرف الثاني عليه تحمل النسبة نسبة 7% من المبيعات التي تقل عن نقطة التعادل\
      \ . سادسا : مطالبة المدعي بنصيبه من عوائد المكافآت الممنوحة فهي مطالبة دون وجه حق حيث أنه تم احتسابها له وإعطاؤه أثناء\
      \ فترة التعاقد، ويوجد لدينا ما يثبت ذلك. وتأسيسا على ذلك أطلب من فضيلتكم إلزام الخبير بأخذ ما لدى موكلتي من بينات، ورد\
      \ دعوى المدعي لعدم صحتها). انتهى ما ورد بمذكرة وكيل المدعى عليها. فطلبت الدائرة من وكيلة المدعى عليها تقديم ما لديها\
      \ من بينات أو مستندات والتي أشير إليها في هذا الرد، وأمهلتها إلى الجلسة القادمة، وعليه قررت الدائرة تحديد جلسة أخرى.\
      \ وفي الجلسة المنعقدة بتاريخ 7/ 9/ 1444هـ حضر الطرفان، وقدم وكيل المدعية مذكرة جاء فيها ما يلي: ( أولا: استدلال المدعى\
      \ عليها بالتقصير والإهمال في الفرع، مقارنة بمبيعات المالك الجديد استدلال في غير محله، لما يلي من أسباب: قامت موكلتي\
      \ بتشغيل الفرع في بداية التعاقد مع المدعى عليها بدون تشغيل"
    - '[السياق: يتعلق هذا الجزء بوقائع القضية حيث تقدم المدعي بدعوى مطالبة المدعى عليه بسداد مبلغ 130,000 ريال كأتعاب محاماة،
      وأصدرت المحكمة حكمًا بإلزام المدعى عليه بالدفع. ثم قدم المدعى عليه استئنافًا طالبًا إعادة النظر وإرسال المعاملة للخبراء،
      وتم تحديد جلسة عبر الاتصال المرئي. وقررت المحكمة قبول الاستئناف شكليًا وتأييد الحكم الابتدائي لعدم وجود ما يعيبه.]

      Facts : بما أن واقعات القضية أوردها الحكم محل الاستئناف فالدائرة تحيل إليه درءا للتكرار، وتتلخص في أن المدعي وكالة تقدم
      بلائحة دعوى طلب فيها بإلزام المدعى عليه بسداد مبلغ قدره (130.000) مائة وثلاثون ألف ريال تمثل أتعاب المحاماة. وبإحالتها
      إلى الدائرة ناظرة القضية أصدرت حكمها محل الاستئناف القاضي بإلزام المدعى عليه بدفع المبلغ ، فقدم وكيل المدعى عليه لائحته
      الاستئنافية التي تضمنت طلب إعادة النظر في الحكم، وطلب إرسال المعاملة لقسم الخبراء بالمحكمة العامة بالرياض. وبعد قيدها
      في الاستئناف بالرقم المشار إليه أعلاه أحيلت رفق القضية إلى هذه الدائرة، التي حددت جلسة هذا اليوم العلنية عبر الاتصال
      المرئي. وبعد تبليغ الأطراف واستنادا إلى المادة 78 / 2 من نظام المحاكم التجارية والمادة 215 من اللائحة التنفيذية وبعد
      دراسة القضية، أصدرت الدائرة حكمها الماثل. Reasons : بما أن الاستئناف قدم أثناء الأجل المحدد فهو مقبول شكلا. أما فيما
      يتعلق بالموضوع فإن الدائرة لم يظهر لها في الاعتراض ما يحول دون تأييد الحكم محمولا على أسبابه. وقد تكفل الحكم بالرد على
      ما أبداه المستأنف في استئنافه. Ruling :'
    - '[السياق: يستعرض هذا الجزء الأسباب القانونية للحكم، حيث تؤكد المحكمة أن المدعي لم يقدم أدلة كافية على شراكته بنسبة 25%
      في المشروع، وفقاً لأحكام نظام الإثبات والمحاكم التجارية. وبما أن المدعى عليه أدى اليمين الحاسمة لنفي الدعوى، قررت المحكمة
      رفض الدعوى لعدم كفاية البينة.]

      الحاسمة على نفي الدعوى، فطلب يمين المدعى عليه، وبعرضها على المدعى عليه وتخويفه بالله عز وجل استعد بأدائها، ثم حلف قائلا:
      (والله العظيم الذي يعلم السر وأخفى أنني لم أتعاقد مع المدعي علي أبو اليزيد على أن له ما نسبته 25% من مستخلصات أعمال
      مؤسستي مع مؤسسة بسمان التجارية، وانه لا يستحق أي شيء في ذمتي عن ذلك العقد، والله العظيم، والله العظيم، والله العظيم)،
      وبناء عليه، أصدرت الدائرة حكمها محمولا على الأسباب التالية. الاسباب : بناء على الدعوى والإجابة، ولما كان المدعي يطلب
      إثبات شراكته في أعمال عقد مؤسسة المدعى عليه مع مؤسسة بسمان التجارية المتعلق بتركيب عدادات كهربائية تشتمل على الضغط العالي
      والمنخفض بما نسبته 25%، ويطلب حقه المالي المبني على ذلك، وعليه؛ فإن النزاع الماثل يخضع في نظره لولاية القضاء التجاري
      وفق أحكام المادة 16 من نظام المحاكم التجارية، ولما كان المدعى عليه ينكر الدعوى جملة وتفصيلا، ولما هو متقرر شرعا من أن
      البينة على المدعي واليمين على المنكر؛ استنادا لقول النبي الأكرم صلى الله عليه وسلم في الصحيح: (بينتك أو يمينه)، ولما
      نصت عليه المادة (1/3) من نظام الإثبات من أن (البينة على من ادعى، واليمين على من أنكر)، وبما أن الدائرة قد سألت المدعي
      عن بينته؟ فقدم العقد بين مؤسسة المدعى عليه وشركة بسمان، إضافة الى المستخلصات المتعلقة بالمشروع، إضافة الى تفويضه من
      المدعى عليه بإدارة شؤون مؤسسة المدعى عليه، والتعاقد مع الغير، ولم يقدم ما يثبت الشراكة مع المدعى عليه في المشروع بالنسبة
      التي ذكر ولا ما يثبت حقه المالي الناتج عن ثبوت ذلك، وهو ما يعني انتفاء بيناته على دعواه، وعليه فقد أفهمته الدائرة بأن
      له طلب يمين المدعى عليه الحاسمة فطلبها، وحيث أدى المدعى عليه اليمين وفق منطوقها المرصود في الوقائع؛ فقد انتهت الدائرة
      إلى حكمها الوارد بمنطوقه وبه تقضي. نص الحكم : الى المستخلصات المتعلقة بالمشروع، إضافة الى تفويضه من المدعى عليه بإدارة
      شؤون مؤسسة المدعى عليه، والتعاقد مع الغير، ولم يقدم ما يثبت الشراكة مع المدعى عليه في المشروع بالنسبة التي ذكر ولا ما
      يثبت حقه المالي الناتج عن ثبوت ذلك، وهو ما يعني انتفاء بيناته على دعواه، وعليه فقد أفهمته الدائرة بأن له طلب يمين المدعى
      عليه الحاسمة فطلبها، وحيث أدى المدعى عليه اليمين وفق منطوقها المرصود في الوقائع؛ فقد انتهت الدائرة إلى حكمها الوارد
      بمنطوقه وبه تقضي. نص الحكم :'
