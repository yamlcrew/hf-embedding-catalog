  - 'Things we learned about LLMs in 2024






















    Simon Willison’s Weblog

    Subscribe







    Things we learned about LLMs in 2024

    31st December 2024

    A lot has happened in the world of Large Language Models over the course of 2024. Here’s a review of things we figured
    out about the field in the past twelve months, plus my attempt at identifying key themes and pivotal moments.

    This is a sequel to my review of 2023.

    In this article:'
  - 'Another common technique is to use larger models to help create training data for their smaller, cheaper alternatives—a
    trick used by an increasing number of labs. DeepSeek v3 used “reasoning” data created by DeepSeek-R1. Meta’s Llama 3.3
    70B fine-tuning used over 25M synthetically generated examples.

    Careful design of the training data that goes into an LLM appears to be the entire game for creating these models. The
    days of just grabbing a full scrape of the web and indiscriminately dumping it into a training run are long gone.

    LLMs somehow got even harder to use'
- source_sentence: Why does the author believe that large language models (LLMs) need better criticism?
  sentences:
  - 'The earliest of those was Google’s Gemini 1.5 Pro, released in February. In addition to producing GPT-4 level outputs,
    it introduced several brand new capabilities to the field—most notably its 1 million (and then later 2 million) token
    input context length, and the ability to input video.

    I wrote about this at the time in The killer app of Gemini Pro 1.5 is video, which earned me a short appearance as a talking
    head in the Google I/O opening keynote in May.'
  - 'The knowledge gap between the people who actively follow this stuff and the 99% of the population who do not is vast.

    The pace of change doesn’t help either. In just the past month we’ve seen general availability of live interfaces where
    you can point your phone’s camera at something and talk about it with your voice... and optionally have it pretend to
    be Santa. Most self-certified nerds haven’t even tried that yet.

    Given the ongoing (and potential) impact on society that this technology has, I don’t think the size of this gap is healthy.
    I’d like to see a lot more effort put into improving this.

    LLMs need better criticism'
  - 'OpenAI are not the only game in town here. Google released their first entrant in the category, gemini-2.0-flash-thinking-exp,
    on December 19th.

    Alibaba’s Qwen team released their QwQ model on November 28th—under an Apache 2.0 license, and that one I could run on
    my own machine. They followed that up with a vision reasoning model called QvQ on December 24th, which I also ran locally.

    DeepSeek made their DeepSeek-R1-Lite-Preview model available to try out through their chat interface on November 20th.

    To understand more about inference scaling I recommend Is AI progress slowing down? by Arvind Narayanan and Sayash Kapoor.'
- source_sentence: What was the significance of the GPT-4 barrier mentioned in the December 2023 review?
  sentences:
  - 'I think telling people that this whole field is environmentally catastrophic plagiarism machines that constantly make
    things up is doing those people a disservice, no matter how much truth that represents. There is genuine value to be had
    here, but getting to that value is unintuitive and needs guidance.

    Those of us who understand this stuff have a duty to help everyone else figure it out.

    Everything tagged “llms” on my blog in 2024

    Because I undoubtedly missed a whole bunch of things, here’s every long-form post I wrote in 2024 that I tagged with llms:'
  - 'The GPT-4 barrier was comprehensively broken

    In my December 2023 review I wrote about how We don’t yet know how to build GPT-4—OpenAI’s best model was almost a year
    old at that point, yet no other AI lab had produced anything better. What did OpenAI know that the rest of us didn’t?

    I’m relieved that this has changed completely in the past twelve months. 18 organizations now have models on the Chatbot
    Arena Leaderboard that rank higher than the original GPT-4 from March 2023 (GPT-4-0314 on the board)—70 models in total.'
  - 'This remains astonishing to me. I thought a model with the capabilities and output quality of GPT-4 needed a datacenter
    class server with one or more $40,000+ GPUs.

    These models take up enough of my 64GB of RAM that I don’t run them often—they don’t leave much room for anything else.

    The fact that they run at all is a testament to the incredible training and inference performance gains that we’ve figured
    out over the past year. It turns out there was a lot of low-hanging fruit to be harvested in terms of model efficiency.
    I expect there’s still more to come.'
- source_sentence: What new capability was demonstrated in the May 13th announcement of GPT-4o?
  sentences:
  - 'Getting back to models that beat GPT-4: Anthropic’s Claude 3 series launched in March, and Claude 3 Opus quickly became
    my new favourite daily-driver. They upped the ante even more in June with the launch of Claude 3.5 Sonnet—a model that
    is still my favourite six months later (though it got a significant upgrade on October 22, confusingly keeping the same
    3.5 version number. Anthropic fans have since taken to calling it Claude 3.6).'
  - 'January


    7th: It’s OK to call it Artificial Intelligence


    9th: What I should have said about the term Artificial Intelligence


    17th: Talking about Open Source LLMs on Oxide and Friends


    26th: LLM 0.13: The annotated release notes




    February


    21st: The killer app of Gemini Pro 1.5 is video




    March


    5th: Prompt injection and jailbreaking are not the same thing


    8th: The GPT-4 barrier has finally been broken


    22nd: Claude and ChatGPT for ad-hoc sidequests


    23rd: Building and testing C extensions for SQLite with ChatGPT Code Interpreter


    26th: llm cmd undo last git commit—a new plugin for LLM




    April


    8th: Building files-to-prompt entirely using Claude 3 Opus


    10th: Three major LLM releases in 24 hours (plus weeknotes)'
  - 'The May 13th announcement of GPT-4o included a demo of a brand new voice mode, where the true multi-modal GPT-4o (the
    o is for “omni”) model could accept audio input and output incredibly realistic sounding speech without needing separate
    TTS or STT models.

    The demo also sounded conspicuously similar to Scarlett Johansson... and after she complained the voice from the demo,
    Skye, never made it to a production product.

    The delay in releasing the new voice mode after the initial demo caused quite a lot of confusion. I wrote about that in
    ChatGPT in “4o” mode is not running the new features yet.'
- source_sentence: What is the licensing type of the Qwen25-Coder-32B model mentioned in the context?
  sentences:
  - 'Qwen2.5-Coder-32B is an LLM that can code well that runs on my Mac talks about Qwen2.5-Coder-32B in November—an Apache
    2.0 licensed model!


    I can now run a GPT-4 class model on my laptop talks about running Meta’s Llama 3.3 70B (released in December)'
  - 'DeepSeek v3 is a huge 685B parameter model—one of the largest openly licensed models currently available, significantly
    bigger than the largest of Meta’s Llama series, Llama 3.1 405B.

    Benchmarks put it up there with Claude 3.5 Sonnet. Vibe benchmarks (aka the Chatbot Arena) currently rank it 7th, just
    behind the Gemini 2.0 and OpenAI 4o/o1 models. This is by far the highest ranking openly licensed model.

    The really impressive thing about DeepSeek v3 is the training cost. The model was trained on 2,788,000 H800 GPU hours
    at an estimated cost of $5,576,000. Llama 3.1 405B trained 30,840,000 GPU hours—11x that used by DeepSeek v3, for a model
    that benchmarks slightly worse.'
