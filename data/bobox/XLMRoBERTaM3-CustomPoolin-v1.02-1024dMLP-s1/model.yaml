  sentences:
  - '89th Academy Awards Moonlight won three awards including Best Picture and La La Land won the most awards of the ceremony
    with six after receiving a record-tying 14 nominations. In an event unprecedented in the history of the Oscars, La La
    Land was incorrectly announced as the Best Picture. After a few minutes the error was corrected and Moonlight was declared
    the winner.[8][9] Moonlight became the first film with an all-black cast and the first LGBT-themed film to win Best Picture.[10][11]
    Hacksaw Ridge and Manchester by the Sea won two awards each. Winners with one award include Arrival, Fantastic Beasts
    and Where to Find Them, Fences, The Jungle Book, O.J.: Made in America, Piper, The Salesman, Sing, Suicide Squad, The
    White Helmets, and Zootopia.'
  - MS-DOS MS-DOS (/ˌɛmˌɛsˈdɒs/ em-ess-DOSS; acronym for Microsoft Disk Operating System) is an operating system for x86-based
    personal computers mostly developed by Microsoft. Collectively, MS-DOS, its rebranding as IBM PC DOS, and some operating
    systems attempting to be compatible with MS-DOS, are sometimes referred to as "DOS" (which is also the generic acronym
    for disk operating system). MS-DOS was the main operating system for IBM PC compatible personal computers during the 1980s
    and the early 1990s, when it was gradually superseded by operating systems offering a graphical user interface (GUI),
    in various generations of the graphical Microsoft Windows operating system.
  - Vincent and the Doctor "Vincent and the Doctor" is the tenth episode in the fifth series of British science fiction television
    series Doctor Who, first broadcast on BBC One on 5 June 2010. It was written by Richard Curtis and directed by Jonny Campbell
    and featured an uncredited guest appearance from actor Bill Nighy.
- source_sentence: who does the voice for yoda in the starwars films
  sentences:
  - List of backward compatible games for Xbox One During Microsoft's E3 2015 press conference on June 15, 2015, Microsoft
    announced plans to introduce Xbox 360 backward compatibility on the Xbox One at no additional cost.[10] Supported Xbox
    360 games will run within an emulator and have access to certain Xbox One features, such as recording and broadcasting
    gameplay.[11] Games do not run directly from discs. A relicensed form of the game is downloaded automatically when a supported
    game is inserted, instead of having to make extensive modifications to the game in-order to port the original title. This
    means, that the only reason every single Xbox 360 title is not available, is a judicial issue, not an engineering one.
    All Xbox 360 games could run out-of-the-box on Xbox One, as they require no modifications or porting to run, other than
    a valid license. While digitally-purchased games will automatically appear for download in the user's library once available.[10]
    As with Xbox One titles,[12] if the game is installed using physical media, the disc is still required for validation
    purposes.[10][11]
  - Frank Oz Frank Oz (born Frank Richard Oznowicz[2] on May 25, 1944) is an English-born American puppeteer, filmmaker and
    actor. His career began as a puppeteer, where he performed the Muppet characters of Miss Piggy, Fozzie Bear, Animal, and
    Sam Eagle in The Muppet Show, and Cookie Monster, Bert, and Grover in Sesame Street.[4] He is also known for being the
    puppeteer and voice of Yoda in the Star Wars films.
  - Battle of Barnet The Battle of Barnet was a decisive engagement in the Wars of the Roses, a dynastic conflict of 15th-century
    England. The military action, along with the subsequent Battle of Tewkesbury, secured the throne for Edward IV. On 14
    April 1471 near Barnet, then a small Hertfordshire town north of London, Edward led the House of York in a fight against
    the House of Lancaster, which backed Henry VI for the throne. Leading the Lancastrian army was Richard Neville, 16th Earl
    of Warwick, who played a crucial role in the fate of each king. Historians regard the battle as one of the most important
    clashes in the Wars of the Roses, since it brought about a decisive turn in the fortunes of the two houses. Edward's victory
    was followed by 14 years of Yorkist rule over England.
