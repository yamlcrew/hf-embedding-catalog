widgetData:
- source_sentence: Double Paralympic champion Kadeena Cox has been left out of the British Para-cycling performance squad.
  sentences:
  - 'Ten stamps will be on sale on 7 July, marking five decades since the band turned professional.

    The collection include the band''s most famous album covers as well as live performance shots.

    Pink Floyd became known for its innovative album covers, which were made in collaboration with leading graphic designers
    and photographers.

    The album covers that have been made into stamps include The Piper At The Gates Of Dawn, Atom Heart Mother, The Dark Side
    Of The Moon, Wish You Were Here, Animals and The Endless River.

    A further four stamps show the band performing live on tour, including one photograph from a concert at London''s UFO
    Club in 1966.

    Pink Floyd were among the first groups to make extensive use of light shows and projection of films for their live concerts,
    which increased in ambition over the decades.

    The band was formed in 1965 by Roger Waters, drummer Nick Mason and keyboardist Rick Wright, later joined by guitarist
    Syd Barrett.

    In 1968, guitarist David Gilmour joined the band shortly before Barrett''s departure.

    The stamps are available to pre-order on the Post Office website and will be physically available in 8,000 post offices
    from 7 July 2016.'
  - 'It said pre-tax profit for the year to the end of March was £593m, compared with £735m a year earlier.

    Operating profit at its wholesale gas division fell 94% to just £2.2m, from £36.6m a year earlier, as a result of the
    fall in gas prices.

    Costs relating to its coal-fired power stations rose to £287m in the year.

    In January, SSE cut its standard gas tariff for domestic customers by 5.3%.

    But the UK''s second largest energy company still lost about 300,000 energy customers in the year, leaving it with 8.2
    million households and businesses.

    SSE chief executive Alistair Phillips-Davies said the energy firm had coped well with "the impact of prevailing commodity
    prices and intense retail market competition".

    "At the same time, SSE has continued to demonstrate financial discipline and commitment to its long-term strategic framework.
    The fact that some of the mist is beginning to clear around the legislative, political and regulatory environment means
    there are grounds for some cautious optimism for the next couple of years," he added.

    "SSE continues to invest for the future and in the year ahead plans almost £1.75bn of investment into new energy infrastructure
    in the UK and Ireland and improvements in services for our customers,"

    In March, SSE closed its Ferrybridge coal-fired power station in Yorkshire.

    SSE also announced on Wednesday that it would be selling up to a third of its 50% stake in gas distribution business SGN
    to raise cash for shareholders or to reinvest.'
  - 'The 26-year-old, who won gold medals in both cycling and athletics in Rio last year, is instead focusing on training
    for the World Para-Athletics Championships in London this summer.

    Cox had her UK Sport funding suspended in January while she took part in Channel 4 programme The Jump.

    GB''s 26-strong squad includes Rio gold medallists Sarah Storey and Jody Cundy.

    Storey, 39, became Britain''s most successful female Paralympian when she won her 14th gold medal at the Rio Games.

    Cundy, 38, and like Storey a former swimmer, has won seven Paralympic golds - four in cycling.

    They are joined in the ''podium squad'' by fellow Paralympic medallists Megan Giglia, Karen Darke, Jon-Allan Butterworth,
    Louis Rolfe, Crystal Lane and David Stone.

    With no track events scheduled for 2017 or 2018, British Cycling is happy to allow Cox extended time away from the programme.

    It said in a statement: "Kadeena decided to take a break from cycling at the start of 2017 to pursue other opportunities
    afforded to her by her incredible achievements at the Paralympics, a decision we fully respect.

    "Her focus is currently on her training programme for the 2017 IPC Athletic World Championships in London and she has
    the full support of the Great Britain cycling team."

    Tuesday''s squad announcement comes a fortnight after British Cycling announced changes to the Para-cycling pathway in
    the build-up to Tokyo 2020.

    Riders on the Paralympic world-class programme are now split into two groups - podium and podium potential - while a foundation
    programme has also been established.

    Great Britain 2017 squad in full:

    Podium: James Ball, Steve Bate, Jon-Allan Butterworth, Jody Cundy, Karen Darke, Adam Duggleby, Lora Fachie, Neil Fachie,
    Megan Giglia, Jon Gildea, Corrine Hall, Crystal Lane, Craig Maclean, Pete Mitchell, Louis Rolfe, Matt Rotherham, Helen
    Scott, David Stone, Dame Sarah Storey, Sophie Thornhill.

    Podium Potential: Will Bjergfelt, Craig McCann, Mel Nicholls, Simon Price, Liz Saul, David Smith.'
