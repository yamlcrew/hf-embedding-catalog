    States.
  - "Lifespans for main sequence stars have a vast range. Whilst our Sun will spend 10 billion years on the main sequence,\
    \ a high-mass, ten solar-mass (10 M Sun) star will only last 20 million years (2.0Ã\x97 10 7 years) on the main sequence.A\
    \ star with a only half the mass of Sun can spend 80 billion years on the main sequence.tars are composed almost entirely\
    \ of hydrogen and helium. A star such as our Sun is about 73% hydrogen by mass and 25% helium. If determined by number\
    \ of nuclei then it is 92% hydrogen and 7.8% helium. The remaining 2% by mass or 0.2% by number is all the heavier elements."
