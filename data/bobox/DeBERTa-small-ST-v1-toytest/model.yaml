- source_sentence: who did ben assault in home and away
  sentences:
  - List of Home and Away characters (2017) Ben and Maggie learn that Ziggy has been dating Brody in secret and they disapprove
    of the relationship. Ziggy leaves the house and Ben tells her not to come back. He apologises to her the next day, but
    does not accept her relationship with Brody, so Ziggy refuses to come home. Brody later breaks up with her. Ben begins
    making surf boards to sell at the pier. Ben finds Coco convulsing in the garden and he and Maggie learn she has bulimia.
    Ziggy later leaves home. Days later, Ben sees her with Brody, who is attempting to bring her home, and punches him in
    the face. Olivia Fraser Richards (Raechelle Banno) tells Sergeant Phillip McCarthy (Nicholas Cassim) and Ben is arrested.
    McCarthy and Kat Chapman (Pia Miller) learns he has a criminal record for assaulting his brother. Ben insults Kat, which
    leads to him being charged. Maggie secures a loan to get him out on bail. Maggie's mother, Diana (Sarah Chadwick) came
    to Summer Bay to visit the family and Diana told Ben and Maggie that she is the one who bailed Ben out of jail.
  - 'Stone (unit) The name "stone" derives from the use of stones for weights, a practice that dates back into antiquity.
    The Biblical law against the carrying of "diverse weights, a large and a small"[7] is more literally translated as "you
    shall not carry a stone and a stone (אבן ואבן), a large and a small". There was no standardised "stone" in the ancient
    Jewish world,[8] but in Roman times stone weights were crafted to multiples of the Roman pound.[9] Such weights varied
    in quality: the Yale Medical Library holds 10 and 50-pound examples of polished serpentine,[10] while a 40-pound example
    at the Eschborn Museum (see right) is made of sandstone.[11]'
  - Bad Things (Machine Gun Kelly and Camila Cabello song) "Bad Things" is a song by American rapper Machine Gun Kelly and
    Cuban-American singer Camila Cabello. The song was released on October 14, 2016 and was produced by The Futuristics. Its
    music video was directed by Hannah Lux Davis and premiered on December 1, 2016. The song features an interpolation of
    Fastball's 1999 single "Out of My Head". The single peaked at number four on the US Billboard Hot 100.
