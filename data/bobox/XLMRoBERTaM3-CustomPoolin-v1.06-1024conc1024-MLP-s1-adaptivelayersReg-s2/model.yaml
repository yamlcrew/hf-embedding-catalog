  sentences:
  - Newcastle was part of the county of Northumberland until 1400, when it became a county itself, a status it retained until
    becoming part of Tyne and Wear in 1974.[not in citation given]
  - While Oros worked on Ford 's car and truck designs under Walker , Engel focused on Lincoln and Mercury vehicles .
  - The climate in Newcastle is oceanic (Köppen Cfb) and significantly milder than some other locations in the world at a
    similar latitude, due to the warming influence of the Gulf Stream (via the North Atlantic Drift).
