widgetData:
- source_sentence: The final section of the Royal Navy's second flagship aircraft carrier has left BAE System's yard in Glasgow.
  sentences:
  - 'It is an International Olympic Committee (IOC) Top Partner, paying a reported $100m for each two-games deal of one winter
    and one summer Games.

    The new deal covers the 2014 winter Games in Sochi, Russia, and 2016 summer Games in Rio de Janeiro, Brazil.

    The 2018 winter Games will be held in Pyeongchang, South Korea, and the 2020 summer venue is yet to be decided.

    The company has been an Olympics sponsor since 1976.

    It is the seventh of the 11 top-tier sponsors to renew its partnership with the IOC until 2020.

    The others are Coca-Cola, Dow Chemicals, General Electric, Omega, Procter & Gamble and Visa.

    A further three firms have extended their sponsorship until 2016.

    It is estimated that the IOC has garnered about $1bn in sponsorship revenue in the current four-year cycle which ends
    this year 2012.

    London 2012: Latest Olympic news, sport, features and programmes from the BBC

    McDonald''s said the restaurant chain would use the extended partnership to introduce several new programmes "focused
    on balanced eating and fun play for children".

    "We are delighted that McDonald''s, our long-time and valued Olympic Partner for more than 35 years, is continuing its
    ongoing commitment not only to help fund the Olympic Games, but also to support the Olympic Movement around the world
    and ultimately the athletes themselves," IOC President Jacques Rogge said in a statement.'
  - 'The 750-tonne section, known as the Aft Island, will be taken on a 1,335-mile journey around the south of England and
    up the east coast to Rosyth.

    Once assembled it will be the control centre for all aircraft operations on the new HMS Prince of Wales carrier.

    HMS Prince of Wales is the second Queen Elizabeth Class carrier after the 65,000-tonne HMS Queen Elizabeth.

    They are the largest British warships ever constructed and can be used for a range of military activity from fighting
    in conflicts to providing humanitarian aid and disaster relief.

    The ships have been constructed in blocks at yards across the UK and are being put together in Rosyth.

    BAE''s project director, Iain Stevenson, described the carrier leaving the River Clyde as a "proud day" for everyone involved.

    "To see the final section delivered to Rosyth, ahead of schedule and to an incredible standard of engineering is testament
    to the dedication, skill and ingenuity of all those working on the programme."

    Defence Procurement Minister Philip Dunne said: "Our aircraft carriers, the largest ships ever built in Scotland for the
    Royal Navy, will help to secure the UK''s interests both at home and abroad.

    "Our new F-35 Lightning II aircraft will fly from the decks of HMS Queen Elizabeth in 2018."'
  - 'Contractor Bear Scotland said the slip happened at about midday on Sunday at Butterbridge, close to the Rest and Be Thankful.

    Bear said an emergency diversion using the Old Military Road was not possible because of where the slip happened.

    Diversions in both directions have been put in place via the A82.

    Bear Scotland said specialist engineers examined the site and found that the slope remained unstable and a large boulder
    needed to be removed.

    It is the eighth time in five years that the road has been closed by a landslip.

    The Old Military Road, which runs parallel to the main carriageway through Glen Croe, was reopened last year as an emergency
    diversion route to be used if the A83 was blocked.'
- source_sentence: A video of a pregnant woman doing an impression of April the giraffe has gone viral, racking up 10m views
    in little more than 12 hours.
  sentences:
  - Dirt bikers racing around a corner on the track
  - 'A monkey took the image in the Indonesian jungle in 2011 when it picked up a camera owned by David Slater from Monmouthshire.

    US judges ruled copyright protection could not be applied to the monkey but Peta said the animal should benefit.

    Appeal judges are yet to make a decision in the latest case.

    Mr Slater, of Chepstow, said he was upset Peta was spending the money it received from donors on lawyers, after its earlier
    court claim was rejected.

    But Peta said its action was "consistent with its charitable aims" and it hoped any money from the photo''s royalties
    would benefit monkeys.

    Peta''s appeal on behalf of the macaque monkey was heard this week in a San Francisco court, with an outcome expected
    in the coming months.

    Mr Slater has argued it took "much time and more perseverance" over several days to get the selfie and other photos.

    He said he put in a lot of effort which was more than enough for him to claim copyright.

    The case was listed as "Naruto v David Slater" but the identity of the monkey is also in dispute, with Peta claiming it
    is a female called Naruto and Mr Slater saying it is a different male macaque.

    Mr Slater said he was a conservationist and interest in the image had already helped animals in Indonesia.

    He said: "This is what upsets me and I hope it upsets a lot of other people who donate money to Peta."

    Mr Slater said if he lost the case - or wins but is ordered to pay costs - he would be in serious financial trouble.

    Peta would not comment on how much money it had spent but claimed that by acting on the macaque''s behalf, it hoped to
    ensure all potential royalties from the image go towards protecting monkeys and their habitat.

    The charity claims the monkey had "made the cause-and-effect connection between pressing the shutter button and the change
    to his reflection in the camera lens, resulting in his now-famous selfie photographs".

    It argued it was clear that in these circumstances the copyright was owned by the monkey "and Peta is proud to be his
    voice in court".'
  - 'The real giraffe became an internet sensation after zookeepers put cameras in her pen, in New York state, to broadcast
    the birth to the world.

    Yet, after 10 days and with millions of viewers tuning in, the calf has yet to appear.

    In a fitting tribute, the woman paces her bedroom, doing not very much.

    The spoof is by a South Carolina-based photographer Erin Dietrich, an expectant fan in more ways than one.

    "I did not think this many people would get a kick out of this," said Mrs Dietrich.  "All our friends have been making
    fun of me and my obsession with April so we just thought ''hey, we should order a giraffe mask''."

    Her video, in which she sits in various positions, waves to the camera and dances with her giraffe mask on, has already
    been shared more than 200,000 times.

    Meanwhile, tens of thousands of people at a time are watching the video stream from Animal Adventure Park in Harpursville,
    almost 200 miles north-west of New York.

    A total of around 20 million people have viewed the park''s footage of April the giraffe so far.

    It has been running since 24 February and there have been no signs of April going into labour.

    Many welcomed Mrs Dietrich''s video as a distraction from the long wait.

    "I''m gonna need updates on this one now too," wrote one viewer, Melissa Ann Williams Ramirez. "Who will have their baby
    first???"

    However, as the parody is taking off online faster than the original story, some social-medial users are confused.

    "Am I the only one who doesn''t get what she is doing?" asked one.'
- source_sentence: Teignmouth minor injuries unit (MIU) could be closed under plans by the NHS.
  sentences:
  - 'Patients would have to travel to Dawlish instead, South Devon Clinical Commissioning Group (CCG) said.

    The CCG said the move would improve the quality of services at Dawlish, with longer opening hours and X-ray facilities.

    Richard Younger-Ross, former Liberal Democrat MP for Teignbridge, said the plan put the future of Teignmouth Hospital
    at risk but the CCG rejected the claim.

    Mr Younger-Ross said: "The proposals will enhance the MIU at Dawlish but we believe that Teignmouth needs its own MIU
    and that its removal may undermine the long-term future of Teignmouth Hospital."

    Dr Matthew Fox of the CCG said Teignmouth would be take on more long-term care and rehabilitation of patients.

    "If we don''t combine our two units we will lose them both," he said.

    According to the plans, the new unit would be open from 08:00 to 20:00, instead of the current 10:00 to 18:00.

    The plans state: "Nurses need to treat enough people each year to maintain their skills.

    "To be safe, sustainable and cost effective, every minor injury unit in South Devon and Torbay will in future need to
    see at least 7,000 people a year."

    In 2013/14 Dawlish saw 4,232 people and Teignmouth 3,285.

    Teignmouth MIU patient Helen Saw said: "If you go in there with a broken wrist or arm you go straight to Torbay Hospital.

    "Unless you are going there for a bit of tea and sympathy, there''s very little point in going there."'
  - A laptop computer and a desktop computer on a white desk
  - 'St Kilda''s, in Brixham, has provided respite, residential and day care since the 1970s.

    Torbay and South Devon NHS Foundation Trust has decided services will be moved from the 24-bed home to Brixham Hospital
    and private care homes.

    The trust said it would take up to nine months to close the home describing it as being "in a very poor condition".

    One woman, whose mother uses the service but wanted to remain anonymous, said "it''s all up in the air" and "we do not
    know where she will be moved".

    "I can''t stress enough, that the service provided at St Kilda''s is essential."

    Before the announcement the trust said the building, which employees 41 members of staff, was "no longer fit for purpose",
    and it would work with residents and families to find alternative accommodation.

    It said previous plans for a new purpose-built centre were conceived "before a significant reduction in funding for adult
    social care."

    "The plans did not reflect the trust''s current aspirations to deliver more care at home and in local communities rather
    than in hospital beds," the trust said.

    Also at the board meeting at Torbay Hospital, it was announced the trust is facing an £18m shortfall for the 2016/2017
    financial year.'
