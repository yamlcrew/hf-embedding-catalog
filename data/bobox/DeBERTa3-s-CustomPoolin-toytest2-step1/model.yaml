- source_sentence: What was the name of Jed's nephew in The Beverly Hillbillies?
  sentences:
  - Jed Clampett - The Beverly Hillbillies Characters - ShareTV Buddy Ebsen began his career as a dancer in the late 1920s
    in a Broadway chorus. He later formed a vaudeville ... Character Bio Although he had received little formal education,
    Jed Clampett had a good deal of common sense. A good-natured man, he is the apparent head of the family. Jed's wife (Elly
    May's mother) died, but is referred to in the episode "Duke Steals A Wife" as Rose Ellen. Jed was shown to be an expert
    marksman and was extremely loyal to his family and kinfolk. The huge oil pool in the swamp he owned was the beginning
    of his rags-to-riches journey to Beverly Hills. Although he longed for the old ways back in the hills, he made the best
    of being in Beverly Hills. Whenever he had anything on his mind, he would sit on the curbstone of his mansion and whittle
    until he came up with the answer. Jedediah, the version of Jed's name used in the 1993 Beverly Hillbillies theatrical
    movie, was never mentioned in the original television series (though coincidentally, on Ebsen's subsequent series, Barnaby
    Jones, Barnaby's nephew J.R. was also named Jedediah). In one episode Jed and Granny reminisce about seeing Buddy Ebsen
    and Vilma Ebsen—a joking reference to the Ebsens' song and dance act. Jed appears in all 274 episodes. Episode Screenshots
  - a stove generates heat for cooking usually
  - Miss Marple series by Agatha Christie Miss Marple series 43 works, 13 primary works Mystery series in order of publication.
    Miss Marple is introduced in The Murder at the Vicarage but the books can be read in any order. Mixed short story collections
    are included if some are Marple, often have horror, supernatural, maybe detective Poirot, Pyne, or Quin. Note that "Nemesis"
    should be read AFTER "A Caribbean Holiday"
