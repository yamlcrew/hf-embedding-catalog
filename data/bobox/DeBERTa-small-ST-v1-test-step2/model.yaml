- source_sentence: where did the ice storm of 1998 happen
  sentences:
  - January 1998 North American ice storm The North American Ice Storm of 1998 (also known as Great Ice Storm of 1998) was
    a massive combination of five smaller successive ice storms in January 1998 that struck a relatively narrow swath of land
    from eastern Ontario to southern Quebec, New Brunswick and Nova Scotia in Canada, and bordering areas from northern New
    York to central Maine in the United States. It caused massive damage to trees and electrical infrastructure all over the
    area, leading to widespread long-term power outages. Millions were left in the dark for periods varying from days to several
    weeks, and in some instances, months. It led to 35 fatalities, a shutdown of activities in large cities like Montreal
    and Ottawa, and an unprecedented effort in reconstruction of the power grid. The ice storm led to the largest deployment
    of Canadian military personnel since the Korean War, with over 16,000 Canadian Forces personnel deployed, 12,000 in Quebec
    and 4,000 in Ontario at the height of the crisis.[1][2]:16
  - Tom and Jerry Tom and Jerry is an American animated series of short films created in 1940, by William Hanna and Joseph
    Barbera. It centers on a rivalry between its two title characters, Tom and Jerry, and many recurring characters, based
    around slapstick comedy.
  - Nimbostratus cloud Nimbostratus is a stratiform genus formerly classified as "Family C" low-level, but now considered
    by the World Meteorological Organization (WMO) to be a middle- or multi-level stratus type.[1]. Although it is usually
    a low-based cloud, it actually forms most commonly in the middle level of the troposphere and then spreads vertically
    into the low and high levels. This change in classification would once have made it a "Family D" cloud, but this style
    of nomenclature was discontinued by the WMO in 1956. Nimbostratus usually produces precipitation over a wide area. Nimbo-
    is from the Latin word nimbus, which denotes precipitation. It has a diffuse cloud base generally found anywhere from
    near surface in the low levels to about 3,000 m (9,800 ft) in the middle level of the troposphere. Although usually dark
    at its base, it often appears illuminated from within to a surface observer.[2] Nimbostratus usually has a thickness of
    about 2000 m. Though found worldwide, nimbostratus occurs more commonly in the middle latitudes.[3] It is coded CM2 on
    the SYNOP report.
