- source_sentence: What was the name of eleven rulers of the 19th and 20th Egyptian dynasties?
  sentences:
  - 'Airlines Yugoslavia 1968 - 1968 Renamed ^ Comments : Aviogenex was formed on 21May1968 as Genex Airlines. Restarted under
    current name on 30Apr1969 & liquidated in Feb2015 ^ Genealogy : Genex Airlines >Aviogenex 1968 - 1986 Renamed ^ Comments
    : Adria Airways was formed on 14Mar1961 & operations started on 30Jun1961 as Adria Airways, renamed to Inex in 1968 and
    back to Adria again in 1986. National airline of Slovenia ^ Genealogy : Adria Airways >Inex Adria Airways >Adria Airways
    JAT (Jugoslovenski Aerotransport) 1947 - 2003 Renamed ^ Comments : Air Serbia was founded as Aeroput on 17Jun1927, renamed
    to JAT on 01Apr1947. Started ops on 15Apr1947, Renamed again on 08Aug2003 to JAT Airways & reformed as Air Serbia on 26Oct2013
    ^ Genealogy : Aeroput >JAT (Jugoslovenski Aerotransport) >JAT Airways >Air Serbia Jugoslovenski Aerotransport'
  - List of Rulers of Ancient Egypt and Nubia | Lists of Rulers | Heilbrunn Timeline of Art History | The Metropolitan Museum
    of Art The Metropolitan Museum of Art List of Rulers of Ancient Egypt and Nubia See works of art 30.8.234 52.127.4 Our
    knowledge of the succession of Egyptian kings is based on kinglists kept by the ancient Egyptians themselves. The most
    famous are the Palermo Stone, which covers the period from the earliest dynasties to the middle of Dynasty 5; the Abydos
    Kinglist, which Seti I had carved on his temple at Abydos; and the Turin Canon, a papyrus that covers the period from
    the earliest dynasties to the reign of Ramesses II. All are incomplete or fragmentary. We also rely on the History of
    Egypt written by Manetho in the third century B.C. A priest in the temple at Heliopolis, Manetho had access to many original
    sources and it was he who divided the kings into the thirty dynasties we use today. It is to this structure of dynasties
    and listed kings that we now attempt to link an absolute chronology of dates in terms of our own calendrical system. The
    process is made difficult by the fragmentary condition of the kinglists and by differences in the calendrical years used
    at various times. Some astronomical observations from the ancient Egyptians have survived, allowing us to calculate absolute
    dates within a margin of error. Synchronisms with the other civilizations of the ancient world are also of limited use.
  - 'What is the "Jack Sprat" nursery rhyme? | Reference.com What is the "Jack Sprat" nursery rhyme? A: Quick Answer "Jack
    Sprat" is a traditional English nursery rhyme whose main verse says, "Jack Sprat could eat no fat. His wife could eat
    no lean. And so between them both, you see, they licked the platter clean." Though it was likely sung by children long
    before, "Jack Sprat" was first published around 1765 in the compilation "Mother Goose''s Melody." Full Answer According
    to Rhymes.org, a U.K. website devoted to nursery rhyme lyrics and origins, the "Jack Sprat" nursery rhyme has its origins
    in British history. In one interpretation, Jack Sprat was King Charles I, who ruled England in the early part of the 17th
    century, and his wife was Queen Henrietta Maria. Parliament refused to finance the king''s war with Spain, which made
    him lean. However, the queen fattened the coffers by levying an illegal war tax. In an alternative version, the "Jack
    Sprat" nursery rhyme is linked to King Richard and his brother John of the Robin Hood legend. Jack Sprat was King John,
    the usurper who tried to take over the crown when King Richard went off to fight in the Crusades in the 12th century.
    When King Richard was captured, John had to raise a ransom to rescue him, leaving the country lean. The wife was Joan,
    daughter of the Earl of Gloucester, the greedy wife of King John. However, after King Richard died and John became king,
    he had his marriage with Joan annulled.'
