  - source_sentence: Chủ tịch Ủy ban nhân dân xã có quyền ra quyết định cưỡng chế tháo dỡ công trình xây dựng trên đất nông
      nghiệp khi chưa chuyển mục đích sử dụng đất hay không?
    sentences:
    - 'Đối tượng, điều kiện kéo dài tuổi phục vụ tại ngũ

      1. Đối tượng:

      a) Quân nhân chuyên nghiệp có trình độ cao đẳng trở lên đang đảm nhiệm các chức danh: Kỹ thuật viên, Nhân viên Kỹ thuật,
      Huấn luyện viên, Nghệ sĩ, Nhạc sĩ, Diễn viên làm việc đúng chuyên ngành đào tạo ở các cơ sở nghiên cứu, nhà trường,
      bệnh viện, trung tâm thể dục thể thao, đoàn nghệ thuật, nhà máy, doanh nghiệp quốc phòng; đơn vị đóng quân ở địa bàn
      vùng sâu, vùng xa, biên giới, hải đảo.

      b) Quân nhân chuyên nghiệp đang làm việc thuộc các chuyên ngành hẹp được đào tạo công phu hoặc chuyên ngành Quân đội
      chưa đào tạo được; thợ bậc cao.

      c) Quân nhân chuyên nghiệp đang đảm nhiệm chức vụ chỉ huy, quản lý ở các nhà máy, doanh nghiệp quốc phòng.

      d) Quân nhân chuyên nghiệp không thuộc đối tượng quy định tại điểm a, điểm b, điểm c khoản này do Bộ trưởng Bộ Quốc
      phòng quyết định.

      2. Điều kiện:

      Quân nhân chuyên nghiệp thuộc đối tượng quy định tại khoản 1 Điều này được kéo dài tuổi phục vụ tại ngũ khi có đủ các
      điều kiện sau:

      a) Đơn vị có biên chế và nhu cầu sử dụng;

      b) Hết hạn tuổi phục vụ tại ngũ cao nhất theo cấp bậc quân hàm quy định tại khoản 2 Điều 17 Luật Quân nhân chuyên nghiệp,
      công nhân và viên chức quốc phòng; chưa có người thay thế; tự nguyện tiếp tục phục vụ tại ngũ;

      c) Có đủ phẩm chất chính trị, đạo đức, sức khỏe để hoàn thành nhiệm vụ được giao;

      d) Có trình độ chuyên môn kỹ thuật, nghiệp vụ giỏi; tay nghề cao; chất lượng, hiệu quả công tác tốt.'
    - 'Thi hành quyết định cưỡng chế

      1. Người ra quyết định cưỡng chế có trách nhiệm gửi ngay quyết định cưỡng chế cho các cá nhân, tổ chức liên quan và
      tổ chức thực hiện việc cưỡng chế thi hành quyết định xử phạt của mình và của cấp dưới.

      ..."'
    - 'Trình tự, thủ tục đăng ký tài khoản định danh điện tử đối với công dân Việt Nam

      1. Đăng ký tài khoản định danh điện tử mức độ 1 qua ứng dụng VNelD đối với công dân đã có thẻ Căn cước công dân gắn
      chíp điện tử

      a) Công dân sử dụng thiết bị di động tải và cài đặt ứng dụng VNelD.

      b) Công dân sử dụng ứng dụng VNelD để nhập thông tin về số định danh cá nhân và số điện thoại hoặc địa chỉ thư điện
      tử; cung cấp các thông tin theo hướng dẫn trên ứng dụng VNelD; thu nhận ảnh chân dung bằng thiết bị di động và gửi yêu
      cầu đề nghị cấp tài khoản định danh điện tử tới cơ quan quản lý định danh và xác thực điện tử qua ứng dụng VNelD.

      c) Cơ quan quản lý định danh điện tử thông báo kết quả đăng ký tài khoản qua ứng dụng VNelD hoặc tin nhắn SMS hoặc địa
      chỉ thư điện tử.

      2. Đăng ký tài khoản định danh điện tử mức độ 2

      a) Đối với công dân đã được cấp thẻ Căn cước công dân gắn chíp điện tử:

      Công dân đến Công an xã, phường, thị trấn hoặc nơi làm thủ tục cấp thẻ Căn cước công dân để làm thủ tục cấp tài khoản
      định danh điện tử. Công dân xuất trình thẻ Căn cước công dân gắn chíp điện tử, cung cấp thông tin về số điện thoại hoặc
      địa chỉ thư điện tử và đề nghị bổ sung thông tin được tích hợp vào tài khoản định danh điện tử.

      Cán bộ tiếp nhận nhập thông tin công dân cung cấp vào hệ thống định danh và xác thực điện tử; chụp ảnh chân dung, thu
      nhận vân tay của công dân đến làm thủ tục để xác thực với Cơ sở dữ liệu căn cước công dân và khẳng định sự đồng ý đăng
      ký tạo lập tài khoản định danh điện tử.

      Cơ quan quản lý định danh điện tử thông báo kết quả đăng ký tài khoản qua ứng dụng VNelD hoặc tin nhắn SMS hoặc địa
      chỉ thư điện tử.

      b) Cơ quan Công an tiến hành cấp tài khoản định danh điện tử mức độ 2 cùng với cấp thẻ Căn cước công dân với trường
      hợp công dân chưa được cấp Căn cước công dân gắn chíp điện tử.'
  - source_sentence: Mức hưởng chế độ thai sản đối với lao động nam là người nước ngoài được pháp luật quy định như thế nào?
    sentences:
    - '"Điều 21. Thông báo kết quả và xác nhận nhập học

      1. Cơ sở đào tạo gửi giấy báo trúng tuyển cho những thí sinh trúng tuyển, trong đó ghi rõ những thủ tục cần thiết đối
      với thí sinh khi nhập học và phương thức nhập học của thí sinh.

      2. Thí sinh xác nhận nhập học bằng hình thức trực tuyến trên hệ thống, trước khi nhập học tại cơ sở đào tạo.

      3. Đối với những thí sinh không xác nhận nhập học trong thời hạn quy định:

      a) Nếu không có lý do chính đáng thì coi như thí sinh từ chối nhập học và cơ sở đào tạo có quyền không tiếp nhận;

      b) Nếu do ốm đau, tai nạn, có giấy xác nhận của bệnh viện quận, huyện trở lên hoặc do thiên tai có xác nhận của UBND
      quận, huyện trở lên, cơ sở đào tạo xem xét quyết định tiếp nhận thí sinh vào học hoặc bảo lưu kết quả tuyển sinh để
      thí sinh vào học sau;

      c) Nếu do sai sót, nhầm lẫn của cán bộ thực hiện công tác tuyển sinh hoặc cá nhân thí sinh gây ra, cơ sở đào tạo chủ
      động phối hợp với các cá nhân, tổ chức liên quan xem xét các minh chứng và quyết định việc tiếp nhận thí sinh vào học
      hoặc bảo lưu kết quả tuyển sinh để thí sinh vào học sau.

      4. Thí sinh đã xác nhận nhập học tại một cơ sở đào tạo không được tham gia xét tuyển ở nơi khác hoặc ở các đợt xét tuyển
      bổ sung, trừ trường hợp được cơ sở đào tạo cho phép."'
    - 'Tổ chức, nhiệm vụ, quyền hạn của Ban Chỉ huy

      ...

      2. Nhiệm vụ, quyền hạn của Ban Chỉ huy:

      a) Chỉ đạo xây dựng, ban hành quy định về công tác bảo đảm an toàn PCCC và CNCH tại Trụ sở cơ quan Bộ Tư pháp.

      b) Hướng dẫn, phối hợp với các đơn vị thuộc Bộ và chỉ đạo Đội PCCC và CNCH cơ sở tổ chức tuyên truyền, bồi dưỡng nghiệp
      vụ PCCC và CNCH.

      c) Chỉ đạo Đội PCCC và CNCH cơ sở tại Trụ sở cơ quan Bộ Tư pháp xây dựng, trình cấp có thẩm quyền phê duyệt và tổ chức
      thực tập phương án PCCC, phương án CNCH.

      d) Chỉ đạo Đội PCCC và CNCH cơ sở tại Trụ sở cơ quan Bộ Tư pháp quản lý các trang thiết bị PCCC và CNCH.

      đ) Chỉ đạo chữa cháy, CNCH khi xảy ra cháy, sự cố, tai nạn tại Trụ sở cơ quan Bộ Tư pháp.

      e) Chỉ đạo việc tổ chức lập và lưu giữ hồ sơ quản lý, theo dõi hoạt động PCCC, CNCH tại Trụ sở cơ quan Bộ Tư pháp.

      g) Chỉ đạo việc sơ kết, tổng kết các hoạt động về PCCC và CNCH của cơ quan; kiểm tra, đôn đốc việc chấp hành các quy
      định về PCCC và CNCH.

      h) Đề xuất việc khen thưởng, kỷ luật các tập thể, cá nhân trong việc thực hiện công tác PCCC, CNCH.

      i) Chỉ đạo Đội PCCC và CNCH cơ sở dự trù kinh phí cho các hoạt động PCCC và CNCH tại Trụ sở cơ quan Bộ Tư pháp.

      k) Thực hiện các nhiệm vụ khác do Bộ trưởng giao và theo quy định của pháp luật.'
    - 'Mức hưởng chế độ thai sản

      ...

      b) Mức hưởng một ngày đối với trường hợp quy định tại Điều 32 và khoản 2 Điều 34 của Luật này được tính bằng mức hưởng
      chế độ thai sản theo tháng chia cho 24 ngày.'
  - source_sentence: Doanh nghiệp được áp dụng chế độ ưu tiên không cung cấp báo cáo kiểm toán đúng thời hạn bị phạt bao nhiêu
      tiền?
    sentences:
    - 'Thay đổi Thẩm phán, Hội thẩm

      1. Thẩm phán, Hội thẩm phải từ chối tham gia xét xử hoặc bị thay đổi khi thuộc một trong các trường hợp:

      a) Trường hợp quy định tại Điều 49 của Bộ luật này;

      b) Họ cùng trong một Hội đồng xét xử và là người thân thích với nhau;

      c) Đã tham gia xét xử sơ thẩm hoặc phúc thẩm hoặc tiến hành tố tụng vụ án đó với tư cách là Điều tra viên, Cán bộ điều
      tra, Kiểm sát viên, Kiểm tra viên, Thẩm tra viên, Thư ký Tòa án.

      2. Việc thay đổi Thẩm phán, Hội thẩm trước khi mở phiên tòa do Chánh án hoặc Phó Chánh án Tòa án được phân công giải
      quyết vụ án quyết định.

      Thẩm phán bị thay đổi là Chánh án Tòa án thì do Chánh án Tòa án trên một cấp quyết định.

      Việc thay đổi Thẩm phán, Hội thẩm tại phiên tòa do Hội đồng xét xử quyết định trước khi bắt đầu xét hỏi bằng cách biểu
      quyết tại phòng nghị án. Khi xem xét thay đổi thành viên nào thì thành viên đó được trình bày ý kiến của mình, Hội đồng
      quyết định theo đa số.

      Trường hợp phải thay đổi Thẩm phán, Hội thẩm tại phiên tòa thì Hội đồng xét xử ra quyết định hoãn phiên tòa.'
    - '“Điều 21. Chấm dứt hưởng trợ cấp thất nghiệp

      1. Các trường hợp người lao động đang hưởng trợ cấp thất nghiệp bị chấm dứt hưởng trợ cấp thất nghiệp được quy định
      như sau:

      e) Trong thời gian hưởng trợ cấp thất nghiệp, 03 tháng liên tục không thực hiện thông báo hằng tháng về việc tìm kiếm
      việc làm với trung tâm dịch vụ việc làm theo quy định

      Ngày mà người lao động được xác định bị chấm dứt hưởng trợ cấp thất nghiệp là ngày kết thúc của thời hạn thông báo tìm
      kiếm việc làm của tháng thứ 3 liên tục mà người lao động không thực hiện thông báo hằng tháng về việc tìm kiếm việc
      làm."'
    - 'Vi phạm quy định về thời hạn làm thủ tục hải quan, nộp hồ sơ thuế

      ...

      2. Phạt tiền từ 1.000.000 đồng đến 2.000.000 đồng đối với hành vi không thực hiện đúng thời hạn quy định thuộc một trong
      các trường hợp sau:

      a) Cung cấp báo cáo kiểm toán, báo cáo tài chính của doanh nghiệp được áp dụng chế độ ưu tiên;

      b) Thông báo cho cơ quan hải quan quyết định xử lý vi phạm pháp luật về quản lý thuế, kế toán đối với doanh nghiệp được
      áp dụng chế độ ưu tiên;

      c) Báo cáo về lượng hàng hóa nhập khẩu phục vụ xây dựng nhà xưởng, hàng hóa gửi kho bên ngoài của doanh nghiệp chế xuất;

      d) Báo cáo về lượng hàng hóa trung chuyển đưa vào, đưa ra, còn lưu tại cảng;

      đ) Báo cáo thống kê thông quan hàng bưu chính đưa vào Việt Nam để chuyển tiếp đi quốc tế.

      ...'
  - source_sentence: Tài chính của Hội Kiểm toán viên hành nghề Việt Nam được chi cho những khoản nào?
    sentences:
    - 'Giải thể và xử lý tài chính khi giải thể

      1. Khi xét thấy hoạt động của Hội không có hiệu quả, không mang lại lợi ích cho Hội viên hoặc gây phiền hà, cản trở
      cho Hội viên thì BCH Hội quyết định triệu tập Đại hội để bàn biện pháp củng cố tổ chức hoặc giải thể Hội. Nếu giải thể
      Hội thì do Đại hội đại biểu hoặc Đại hội toàn quốc của Hội thông qua và đề nghị cơ quan Nhà nước có thẩm quyền xem xét,
      quyết định.

      2. Khi Hội bị giải thể, Ban Thường trực và Ban Kiểm tra của Hội phải tiến hành kiểm kê tài sản, kiểm quỹ và báo cáo
      BCH Hội quyết định việc xử lý tài sản, tiền tồn quỹ và tiến hành thủ tục giải thể theo quy định của pháp luật.'
    - '"Điều 14. Miễn trừ đối với thỏa thuận hạn chế cạnh tranh bị cấm

      1. Thỏa thuận hạn chế cạnh tranh quy định tại các khoản 1, 2, 3, 7, 8, 9, 10 và 11 Điều 11 bị cấm theo quy định tại
      Điều 12 của Luật này được miễn trừ có thời hạn nếu có lợi cho người tiêu dùng và đáp ứng một trong các điều kiện sau
      đây:

      a) Tác động thúc đẩy tiến bộ kỹ thuật, công nghệ, nâng cao chất lượng hàng hóa, dịch vụ;

      b) Tăng cường sức cạnh tranh của doanh nghiệp Việt Nam trên thị trường quốc tế;

      c) Thúc đẩy việc áp dụng thống nhất tiêu chuẩn chất lượng, định mức kỹ thuật của chủng loại sản phẩm;

      d) Thống nhất các điều kiện thực hiện hợp đồng, giao hàng, thanh toán nhưng không liên quan đến giá và các yếu tố của
      giá.

      2. Thỏa thuận lao động, thỏa thuận hợp tác trong các ngành, lĩnh vực đặc thù được thực hiện theo quy định của luật khác
      thì thực hiện theo quy định của luật đó".'
    - '"Điều 2. Sửa đổi, bổ sung một số điều của Nghị định số 15/2019/NĐ-CP ngày 01 tháng 02 năm 2019 của Chính phủ quy định
      chi tiết một số điều và biện pháp thi hành Luật Giáo dục nghề nghiệp

      ...

      12. Sửa đổi, bổ sung Điều 24 như sau:

      Điều 24. Thẩm quyền cấp giấy chứng nhận đăng ký hoạt động liên kết đào tạo với nước ngoài

      1. Tổng cục Giáo dục nghề nghiệp cấp giấy chứng nhận đăng ký hoạt động liên kết đào tạo với nước ngoài đối với trường
      cao đẳng.

      2. Sở Lao động - Thương binh và Xã hội nơi trường trung cấp, trung tâm giáo dục nghề nghiệp, trung tâm giáo dục nghề
      nghiệp - giáo dục thường xuyên và doanh nghiệp tổ chức hoạt động liên kết đào tạo với nước ngoài cấp giấy chứng nhận
      đăng ký hoạt động liên kết đào tạo với nước ngoài đối với trường trung cấp, trung tâm giáo dục nghề nghiệp, trung tâm
      giáo dục nghề nghiệp - giáo dục thường xuyên và doanh nghiệp."'
  - source_sentence: NLĐ ký nhiều hợp đồng lao động thì đóng BHYT như thế nào?
    sentences:
    - 'Hồ sơ, thủ tục xác định trường hợp được bồi thường

      [...]

      3. Trong thời hạn 05 ngày làm việc, kể từ ngày nhận được đơn và các giấy tờ hợp lệ, nếu xác định yêu cầu thuộc trách
      nhiệm giải quyết của mình thì Sở Y tế phải thụ lý và thông báo bằng văn bản về việc thụ lý đơn cho người bị thiệt hại
      hoặc thân nhân của người bị thiệt hại (sau đây gọi tắt là người bị thiệt hại). Trường hợp hồ sơ không đầy đủ thì Sở
      Y tế có văn bản hướng dẫn người bị thiệt hại bổ sung.

      4. Trong thời hạn 15 ngày, kể từ ngày nhận được đơn yêu cầu của người bị thiệt hại, Sở Y tế phải hoàn thành việc xác
      định nguyên nhân gây tai biến, mức độ tổn thương và thông báo bằng văn bản cho người yêu cầu đồng thời báo cáo Bộ Y
      tế.'
    - 'Chuyển nhượng quyền thăm dò khoáng sản

      1. Tổ chức, cá nhân nhận chuyển nhượng quyền thăm dò khoáng sản phải có đủ điều kiện để được cấp Giấy phép thăm dò khoáng
      sản theo quy định của Luật này.

      2. Việc chuyển nhượng quyền thăm dò khoáng sản phải được cơ quan quản lý nhà nước có thẩm quyền cấp Giấy phép thăm dò
      khoáng sản chấp thuận; trường hợp được chấp thuận, tổ chức, cá nhân nhận chuyển nhượng quyền thăm dò khoáng sản được
      cấp Giấy phép thăm dò khoáng sản mới.

      3. Tổ chức, cá nhân chuyển nhượng quyền thăm dò khoáng sản đã thực hiện được ít nhất 50% dự toán của đề án thăm dò khoáng
      sản.

      4. Chính phủ quy định chi tiết việc chuyển nhượng quyền thăm dò khoáng sản.'
    - '"Sửa đổi, bổ sung một số điều của Luật bảo hiểm y tế:

      ...

      6. Sửa đổi, bổ sung Điều 12 như sau:

      “Điều 12. Đối tượng tham gia bảo hiểm y tế

      1. Nhóm do người lao động và người sử dụng lao động đóng, bao gồm:

      a) Người lao động làm việc theo hợp đồng lao động không xác định thời hạn, hợp đồng lao động có thời hạn từ đủ 3 tháng
      trở lên; người lao động là người quản lý doanh nghiệp hưởng tiền lương; cán bộ, công chức, viên chức (sau đây gọi chung
      là người lao động);

      b) Người hoạt động không chuyên trách ở xã, phường, thị trấn theo quy định của pháp luật.=

      ...

      4. Nhóm được ngân sách nhà nước hỗ trợ mức đóng, bao gồm:

      a) Người thuộc hộ gia đình cận nghèo;

      b) Học sinh, sinh viên.

      5. Nhóm tham gia bảo hiểm y tế theo hộ gia đình gồm những người thuộc hộ gia đình, trừ đối tượng quy định tại các khoản
      1, 2, 3 và 4 Điều này.

      6. Chính phủ quy định các đối tượng khác ngoài các đối tượng quy định tại các khoản 3, 4 và 5 Điều này; quy định việc
      cấp thẻ bảo hiểm y tế đối với đối tượng do Bộ Quốc phòng, Bộ Công an quản lý và đối tượng quy định tại điểm 1 khoản
      3 Điều này; quy định lộ trình thực hiện bảo hiểm y tế, phạm vi quyền lợi, mức hưởng bảo hiểm y tế, khám bệnh, chữa bệnh
      bảo hiểm y tế, quản lý, sử dụng phần kinh phí dành cho khám bệnh, chữa bệnh bảo hiểm y tế, giám định bảo hiểm y tế,
      thanh toán, quyết toán bảo hiểm y tế đối với các đối tượng quy định tại điểm a khoản 3 Điều này.”'
