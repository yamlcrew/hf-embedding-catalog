  - "arXiv:0802.4093v2 [cond-mat.str-el] 27 Feb 2009 Meissner eﬀect without superconductivity from a chiral d-density wave\
    \ P. Kotetes∗and G. Varelogiannis† Department of Physics, National Technical University of Athens, GR-15780 Athens, Greece\
    \ We demonstrate that the formation of a chiral d-density wave (CDDW) state generates a Topolo- gical Meissner eﬀect (TME)\
    \ in the absence of any kind of superconductivity. The TME is identical to the usual superconducting Meissner eﬀect but\
    \ it appears only for magnetic ﬁelds perpendicular to the plane while it is absent for in plane ﬁelds. The observed enhanced\
    \ diamagnetic signals in the non-superconducting pseudogap regime of the cuprates may ﬁnd an alternative interpretation\
    \ in terms of a TME, originating from a chiral d-density wave pseudogap. PACS numbers: 75.20.-g, 71.27.+a, 74.72.-h The\
    \ Meissner eﬀect is considered to be the most direct signature of superconductivity [1]. However, the surpris- ing observations\
    \ of such enhanced diamagnetic signals [2] well above the superconducting transition tempera- ture in the pseudogap regime\
    \ of the cuprates [3], con- stitute a fascinating puzzle. There are two proposals for the nature of this regime that appear\
    \ to dominate. The ﬁrst, associates the pseudogap with a dx2−y2 density wave (DDW) [4, 5], also called orbital antiferromagnet\
    \ [6, 7], which normally competes with superconductivity. The second associates the pseudogap with spontaneous vortex-antivortex\
    \ unbinding leading to incoherent super- conductivity [8] that should persist well above the su- perconducting Tc. This\
    \ theory is reminiscent of the well known Kosterlitz-Thouless transition [9]. The available ARPES [10] and STM [11] experiments\
    \ cannot diﬀerentiate a SC from a density wave (DW) gap, and therefore appear somehow incapable in settling di- rectly\
    \ the issue. On the other hand, the unusual Nernst eﬀect and most importantly, the enhanced diamagnetic signal that accompanies\
    \ it for a very large temperature region above the SC critical temperature [2], has been considered as a major argument\
    \ in favor of the incoher- ent SC scenario. In fact, the enhanced diamagnetism is viewed as a signature of the usual Meissner\
    \ eﬀect associ- ated solely with the SC state, and would therefore contra- dict the dx2−y2 density wave scenario since\
    \ no Meissner eﬀect was expected in that case [7]. In this letter we put forward the Topological Meissner eﬀect (TME),\
    \ that results from a chiral dxy + idx2−y2 density wave (CDDW) state. In fact, the Nernst region of the pseudogap regime\
    \ may well be associated with a CDDW. The most intriguing property of a CDDW is that parity (P) and time-reversal (T )\
    \ violation induces Chern-Simons terms in the eﬀective action of the elec- tromagnetic ﬁeld, providing the possibility\
    \ of the TME and the Spontaneous Quantum Hall eﬀect (SQHE) ear- lier discussed [12, 13, 14, 15, 16, 17, 18]. As we shall\
    \ demonstrate, the TME is described by the same equa- tion we ﬁnd in the usual Meissner eﬀect of a supercon- ∗Electronic\
    \ address: pkotetes@central.ntua.gr †Electronic address: varelogi@central.ntua.gr ductor. Though, its origin is radically\
    \ diﬀerent. In our system we encounter the realization of Parity Anomaly [13, 19], with the emerging Chern-Simons terms\
    \ provi- ding a topological mass to the electromagnetic ﬁeld, in a gauge invariant manner [20, 21]. Moreover, the pos-\
    \ session of chirality perpendicular to the plane, implies that the TME is strongly anisotropic. Particularly, it takes\
    \ place for magnetic ﬁelds perpendicular to the plane while it is absent for in plane ﬁelds, in accordance with the experimental\
    \ observations [2]. Note ﬁnally that a chi- ral d-density wave state has also been shown recently [22] to explain the\
    \ experimental results concerning the Polar Kerr eﬀect in YBCO [23]. In order to demonstrate how the TME arises, we shall\
    \ consider the following BCS hamiltonian for the CDDW HCDDW = 1 2 X k \x10 ∆kc† kck+Q + ∆∗ kc† k+Qck \x11 , (1) which\
    \ describes a dxy+idx2−y2 state characterized by the wave-vector Q = (π, π), which is commensurate to the lattice (k +\
    \ 2Q = k). Since spin degrees of freedom do not get involved we have considered spinless electrons, so that all our results\
    \ will refer to one spin component. Fur- thermore, we use gµν = (1, −1, −1), ki = k = (kx, ky), kµ = k = (ω, k), qµ =\
    \ q = (q0, q), µ = 0, 1, 2, i = 1, 2, e > 0, ℏ= 1 and we assume that repeated indices are summed. In the derivation of\
    \ the Chern-Simons terms we shall restrict ourselves to the zero temperature case while necessary extensions to ﬁnite\
    \ temperatures will be afterwards performed. In addition, the summation in k−space is all over the whole 1st Brillouin\
    \ zone rather than the reduced Brillouin zone. This implies that the operators ck and ck+Q do not describe independent\
    \ de- grees of freedom. In Eq.(1) we have introduced the CDDW order param- eter ∆k = η∆sin kx sin ky+i∆ \0cos kx −cos\
    \ ky \x01 , where ∆ is the modulus of the idx2−y2 order parameter, η deﬁnes the relative magnitude of the two components\
    \ and also determines the direction of the chirality of the state. The chiral character of the state implies the existence\
    \ of an intrinsic angular momentum in k−space, perpendicular to the plane, originating from P −T violation. Speciﬁ- cally,\
    \ the dx2−y2 component violates T as it is imaginary, 2 while the dxy component is odd under P in two dimen- sions, which\
    \ is deﬁned as (kx, ky) →(kx, −ky). In order to obtain the total electronic Hamiltonian H, we have to add the corresponding\
    \ kinetic part Hkin. For the kinetic part we keep only the nearest neighbors hop- ping term ǫk = −t \0cos kx + cos ky\
    \ \x01 satisfying the nest- ing condition ǫk+Q = −ǫk, while we also set the chem- ical potential equal to zero. Our approximation\
    \ can be justiﬁed by considering that our system is close to half- ﬁlling. Under these conditions the excitation spectrum\
    \ consists of two bands which are fully gapped leading to the topological quantization of the Hall conductance [12, 13,\
    \ 14, 15, 16, 17, 18], which is the coeﬃcient of the Chern-Simons terms. Omitting the next nearest neigh- bors hopping\
    \ term δk = t′ cos kx cos ky does not alter qualitatively the occurrence of the TME. However, its inclusion would destroy\
    \ the quantization of the Hall con- ductance, as in this case, the system is not fully gapped. Similar eﬀects would arise\
