    \ gk ≡ (Re∆k, −Im∆k, ǫk). This yields H = P k Ψ† k gk · τ Ψk. The latter indicates that the ground state of the sys- tem\
    \ depends on the orientation of the g vector in isospin space. As a result, this hamiltonian supports skyrmion solutions\
    \ which imply the presence of a Chern-Simons action (see e.g. [18]). To reveal the emerging Chern-Simons terms, we have\
    \ to take into account the ﬂuctuations of the U(1) gauge ﬁeld Aµ. We add to the Hamiltonian the term Hem = R d2q (2π)2\
