      \ we shall restrict ourselves to the zero temperature case while necessary extensions to ﬁnite temperatures will be\
      \ afterwards performed. In addition, the summation in k−space is all over the whole 1st Brillouin zone rather than the\
      \ reduced Brillouin zone. This implies that the operators ck and ck+Q do not describe independent de- grees of freedom.\
