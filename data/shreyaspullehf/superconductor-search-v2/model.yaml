    \ −e2 m ρeδi,j. ρe is the two- dimensional electronic density (without including spin), T r denotes trace over isospin\
    \ indices, Gk is the CDDW fermionic propagator and we have used the abbreviation R k = R dω 2π P k. Computing Πµν up to\
    \ linear order in q, yields the Chern-Simons action SCS = Z d3x σxy 4 εµνλAµF νλ, (2) with Fµν = ∂µAν −∂νAµ. The coeﬃcient\
    \ of the Chern- Simons action is the Hall conductance σxy. It can be shown that it is a topological invariant, reﬂecting\
