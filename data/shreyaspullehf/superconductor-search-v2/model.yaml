      \ eﬀect but it appears only for magnetic ﬁelds perpendicular to the plane while it is absent for in plane ﬁelds. The\
      \ observed enhanced diamagnetic signals in the non-superconducting pseudogap regime of the cuprates may ﬁnd an alternative\
      \ interpretation in terms of a TME, originating from a chiral d-density wave pseudogap. PACS numbers: 75.20.-g, 71.27.+a,\
      \ 74.72.-h The Meissner eﬀect is considered to be the most direct signature of superconductivity [1]. However, the surpris-\
      \ ing observations of such enhanced diamagnetic signals [2] well above the superconducting transition tempera- ture\
      \ in the pseudogap regime of the cuprates [3], con- stitute a fascinating puzzle. There are two proposals for the nature\
      \ of this regime that appear to dominate. The ﬁrst, associates the pseudogap with a dx2−y2 density wave (DDW) [4, 5],\
      \ also called orbital antiferromagnet [6, 7], which normally competes with superconductivity. The second associates\
      \ the pseudogap with spontaneous vortex-antivortex unbinding leading to incoherent super- conductivity [8] that should\
      \ persist well above the su- perconducting Tc. This theory is reminiscent of the well known Kosterlitz-Thouless transition\
      \ [9]. The available ARPES [10] and STM [11] experiments cannot diﬀerentiate a SC from a density wave (DW) gap, and\
      \ therefore appear somehow incapable in settling di- rectly the issue. On the other hand, the unusual Nernst eﬀect and\
      \ most importantly, the enhanced diamagnetic signal that accompanies it for a very large temperature region above the\
      \ SC critical temperature [2], has been considered as a major argument in favor of the incoher- ent SC scenario. In\
      \ fact, the enhanced diamagnetism is viewed as a signature of the usual Meissner eﬀect associ- ated solely with the\
      \ SC state, and would therefore contra- dict the dx2−y2 density wave scenario since no Meissner eﬀect was expected in\
      \ that case [7]. In this letter we put forward the Topological Meissner eﬀect (TME), that results from a chiral dxy\
      \ + idx2−y2 density wave (CDDW) state. In fact, the Nernst region of the pseudogap regime may well be associated with\
      \ a CDDW. The most intriguing property of a CDDW is that parity (P) and time-reversal (T ) violation induces Chern-Simons\
      \ terms in the eﬀective action of the elec- tromagnetic ﬁeld, providing the possibility of the TME and the Spontaneous\
      \ Quantum Hall eﬀect (SQHE) ear- lier discussed [12, 13, 14, 15, 16, 17, 18]. As we shall demonstrate, the TME is described\
      \ by the same equa- tion we ﬁnd in the usual Meissner eﬀect of a supercon- ∗Electronic address: pkotetes@central.ntua.gr\
      \ †Electronic address: varelogi@central.ntua.gr ductor. Though, its origin is radically diﬀerent. In our system we encounter\
      \ the realization of Parity Anomaly [13, 19], with the emerging Chern-Simons terms provi- ding a topological mass to\
      \ the electromagnetic ﬁeld, in a gauge invariant manner [20, 21]. Moreover, the pos- session of chirality perpendicular\
      \ to the plane, implies that the TME is strongly anisotropic. Particularly, it takes place for magnetic ﬁelds perpendicular\
      \ to the plane while it is absent for in plane ﬁelds, in accordance with the experimental observations [2]. Note ﬁnally\
      \ that a chi- ral d-density wave state has also been shown recently [22] to explain the experimental results concerning\
      \ the Polar Kerr eﬀect in YBCO [23]. In order to demonstrate how the TME arises, we shall consider the following BCS\
      \ hamiltonian for the CDDW HCDDW = 1 2 X k \x10 ∆kc† kck+Q + ∆∗ kc† k+Qck \x11 , (1) which describes a dxy+idx2−y2 state\
      \ characterized by the wave-vector Q = (π, π), which is commensurate to the lattice (k + 2Q = k). Since spin degrees\
      \ of freedom do not get involved we have considered spinless electrons, so that all our results will refer to one spin\
      \ component. Fur- thermore, we use gµν = (1, −1, −1), ki = k = (kx, ky), kµ = k = (ω, k), qµ = q = (q0, q), µ = 0, 1,\
