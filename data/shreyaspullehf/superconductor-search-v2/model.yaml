    \ are eigenfunctions of the angular momentum in k−space with eigenvalue l = 2. In the case of a perfect gap, the Hall\
    \ conductance origi- nates only from the chirality b N of the lower energy band, E− k = −|gk|, which is fully occupied.\
    \ In the same time, the upper band, E+ k = +|gk|, is totally empty while it is characterized by opposite chirality. Apparently,\
