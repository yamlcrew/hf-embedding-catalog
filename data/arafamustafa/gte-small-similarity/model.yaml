- source_sentence: 'Stroke (Brain Attack): is one of the biggest dangers, occurs when something blocks blood supply to part
    of the brain or when a blood vessel in the brain bursts. There are 2 types from stroke

    Ischemic stroke: occurs when blood clots or other particles block the blood vessels to the brain.

    Hemorrhagic stroke: happens when an artery in the brain leaks blood or ruptures (breaks open). The leaked blood puts too
    much pressure on brain cells, which damages them. Stroke is the second leading causes of death, responsible for approximately
    11% of the world wide death, Annually 15 million people worldwide suffer a stroke, Of these, 5 million die and another
    10 million are left permanently disabled .We can avoid this danger if we know the factors that affect stroke. Our application
    is trained with machine learning model that can predict if you have a probability to have a stroke or not by entering
    data like age, gender, hypertension, heart diseases, and average glucose level, Based on the data you entered the application
    will predict if you have a probability of stroke or not. If you have a probability of stroke the application will also
    display the main reason of this danger(like hypertension or glucose) and recommend diet plan for your lifestyle to have
    a control in this danger.'
