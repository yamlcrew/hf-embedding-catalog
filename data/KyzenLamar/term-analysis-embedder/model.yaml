  sentences:
  - 3. Розвідка отримала інформацію з обмеженим доступом щодо можливого нападу
  - 5. Тепловізійна розвідка дозволяє збирати інформацію про рух ворожих військ на великій відстані.
  - 3. Завдяки оцінці безпечного середовища вдалося уникнути небезпеки під час військових навчань
- source_sentence: 'Зустрічається форма: 5. Деканат проводить заходи з підвищення рівня академічної доброчесності серед студентів.'
  sentences:
  - 4. Військові вирішили використати ракети для ураження цілі
  - 1. Військовий командир наказав розробити технічний проєкт зразка для нового типу танку.
  - 5. Деканат проводить заходи з підвищення рівня академічної доброчесності серед студентів
- source_sentence: 'Підозра на термінологічну помилку: 4. На фокальній площині відбулася жорстока битва.'
  sentences:
  - 4. На фокальній площині відбулася жорстока битва
  - 5. На цьому військовому тренуванні ми навчались роботі з автоматизованими постами
  - 5. Україна має стратегію забезпечення енергетичної доступності джерела РЕР.
- source_sentence: 'Підозра на термінологічну помилку: 2. Військовики отримали завдання перевірити спроможності з розвідки
    ворожої армії..'
  sentences:
  - 3. Військова стандартизація передбачає застосування конкретних нормативних документів.
  - 1. Наші військові отримали розвідувальну інформацію першої категорії важливості про можливий напад ворога.
  - 2. Військовики отримали завдання перевірити спроможності з розвідки ворожої армії.
