- source_sentence: Hvilket språk brukes i Kellsboken?
  sentences:
  - 'Trump buet ut på hjemmebane

    President Donald Trump ble buet ut under en baseballkamp i Washington. På bildet forlater han kampen før den er ferdigspilt.
    (Foto: Pablo Martinez Monsivais/AP/NTB Scanpix)

    Dette var første gang Trump-ekteparet har dristet seg til å gå på en baseballkamp på hjemmebane i svært så demokratiske
    Washington, til tross for at Nationals'' hjemmebane ligger veldig nærme Det hvite hus.

    Det ble ikke gjort noe stort nummer ut av at presidentparet skulle på kampen mellom Washington Nationals og Houston Astros
    på Nationals Park. Det kunne Det hvite hus godt ha gjort, sett i lys av at Donald Trump hadde gjort seg populær i USA
    da han bare timer i forveien hadde kunngjort at amerikanske styrker hadde angrepet skjulestedet til en av USA mest forhatte
    fiender.

    Det USA-ledede angrepet medførte at IS-lederen Abu Bakr al-Baghdadi tok sitt eget liv ved å utløse en bombevest da spesialstyrkene
    rykket inn i Idlib nordvest i Syria.

    «Lås ham inne!»

    Trump-ekteparet vinket litt og smilte da de ankom kampen søndag, men det var først i en av pausene den store reaksjonen
    kom.

    Da skulle amerikanske krigshelter hylles på arenaen, men da videoen på storskjermen sveipet over til Trump og følget hans,
    og det ble kunngjort hvem som var på besøk, besvarte folkemengden det med unison buing og hyllesten til heltene ble på
    seksjoner av tribunen plutselig til taktfaste rop av typen «Lås ham inne!», mens plakater med «Veteraner støtter riksrett»
    og «Still Trump for riksrett» dukket opp.

    Skjermer Trump

    Presidentparet lot seg ikke affisere. Det forlot for øvrig kampen før den var ferdigspilt.

    Trumps stab har forsøkt å skjerme ham for situasjoner der han kan bli utsatt for massiv buing og hetsing fra store menneskemengder,
    og han unngår spesielt slike situasjoner i tettsteder og byer der flertallet av velgerne er demokrater, som i Washington.

    I District of Columbia, der Washington ligger, fikk han bare fire prosents oppslutning under valget i 2016.'
  - 'Foreldrekoden: Slik unngår du at familieferien kollapser

    FOTO: Morten Uglum Psykolog og familieterapeut Hedvig Montgomery og journalist Bjørn Egil Halvorsen er vertskap i Foreldrekoden.

    Du har brent av alle feriepengene på hvit sand og palmesus, eller safari og klatre-action. Og hva skjer? Klaging, syting
    og grining fra barna. Resultat: bitterhet og store skuffelser. «Det var den ferien».

    Jo da, det er lett å spenne forventningene høyt når familien skal på ferietur. Fri. Avkobling. Alle skal kose seg sammen.
    Så: kollaps.

    – Det handler om å legge forventningene på et levelig nivå, sier psykolog og familieterapeut Hedvig Montgomery i sesongens
    siste episode av podkasten Foreldrekoden.

    Hør episoden i Itunes her eller Spotify her.

    Du kan også lytte i spilleren nedenfor:

    Men hva innebærer det?

    – Det du skal bruke tid på i forkant er å tenke over: «Passer ferien til den gjengen vi er?»

    Kort oppsummert:

    Reiser du med barnehagebarn? Da handler det om å gjøre ferien langsom nok. Barna må føle seg trygge på feriestedet. Ikke
    for mange og ikke for korte stopp underveis.

    Reiser du med 10-åring? En gullalder. De synes fortsatt du er et fint reisefølge. Og de er nysgjerrige og klare for å
    prøve nye ting.

    På tur med tenåring? Straks mer utfordrende. De vil ikke nødvendigvis gjøre det samme som dere «alltid har gjort». Et
    generelt råd: Sørg for trådløst nettverk!

    Her er høydepunktene

    Dette er bare noen av rådene som serveres i en sommerferie-spesial av Foreldrekoden.

    I denne episoden får du vite hva du bør gjøre for å komme helskinnet gjennom. Og hva du absolutt ikke bør gjøre.

    God sommer!

    Nedenfor finner du våre mest populære episoder denne sesongen

    Vil du høre flere? Her er en samleside med alle episodene

    Foreldrekoden har etablert en egen Facebook-gruppe for foreldre i alle aldre. Her kan du få eksklusiv informasjon, få
    et innblikk bak spakene og være med å diskutere temaer og få tips fra andre. Bli med!

    Vi er selvsagt også på Instagram. Følg oss gjerne for bakgrunnsbilder og ekstra info.'
  - 'Kellsboken

    Kellsboken (irsk: Leabhar Cheanannais) er en evangeliebok i form av en kodeks av illuminerte manuskript fra 700- eller
    800-tallet. Den er kjent for sine mange og vakre illustrasjoner. Boken ble tidligere også kalt  «Sankt Columbas bok»,
    etter den hellige Columba av Iona. Den inneholder de fire evangeliene fra Det nye testamente skrevet på latin. Evangelieteksten
    er hovedsakelig fra Vulgata, skjønt også en del tekst fra tidligere versjoner av Bibelen som Vetus Latina, den gammellatinske
    oversettelsen som Vulgata erstattet. I motsetning til mange evangeliebøker som var beregnet for reiser, misjon eller for
    egen oppbyggelse, var denne og andre store bind ment for alteret og til pryd for kirken.

    Kellsboken er et mesterverk av irsk kunsthåndverk og kalligrafi, og representerer høydepunktet innenfor insulære illuminerte
    manuskript i tidlig middelalder. Gerald av Wales mente den var et verk, «ikke av mennesker, men av engler», og Umberto
    Eco kalte den for «produktet til en kaldblodig hallusinasjonist.» Den blir også regnet som en irsk nasjonalskatt. Illustrasjonene
    og ornamentene i boken overgår tidligere irske evangeliebøker i prakt og kompleksitet. Dekorasjonene kombinerer tradisjonell
    kristen ikonografi med de snirklete, komplekse motivene som er typisk for insulær kunst. Manuskriptsidene er rikt dekorert
    med figurer av mennesker, dyr og mytologiske uhyrer, sammen med keltiske knuter og flettverkmønstre i stimulerende farger.
    Mange av de små dekorative elementene er gjennomsyret av kristen symbolisme, og bidrar til å ytterligere framheve temaene
    i de større illustrasjonene.

    Boken er skrevet på pergament av kalveskinn (vellum) og har 340 folioblader, siden 1953 har manuskriptet vært innbundet
    i fire bind. Det er ti fullsideillustrasjoner, men også tekstsidene er vakkert dekorert. Tekstsidene er smykket med forseggjorte
    forstørrede initialer og miniatyrer mellom tekstlinjene. Teksten er skrevet med insulær majuskelskrift, og synes å være
    utført av tre, kanskje fire, forskjellige skrivere. Det er i hovedsak brukt et brunaktig jerngallusblekk, laget av knuste
    eikenøtter og jernsulfat i en blanding med harpiks og vann, men også karbonblekk er benyttet. Fargene er framstilt fra
    en lang rekke substanser, mange av dem importert fra fjerne land.



