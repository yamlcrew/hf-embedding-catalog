- source_sentence: Hva går interiørarkitekt ut på?
  sentences:
  - Fullført og bestått opplæring fører fram til yrkeskompetanse. Yrkestittelen er fotterapeut.
  - 'Piloter (flygere) kan arbeide som pilot i fly eller helikopter i sivil luftfart pilot i jagerfly spesialfly transportfly
    eller helikopter i Forsvaret pilot av ubemannede luftfartøy (anvendelsesområdet for fjernstyrte luftfartøy er i sterk
    vekst innen kommersiell og offentlig virksomhet og i Forsvaret) En vanlig trafikkflybesetning består normalt av en kaptein
    og en styrmann i tillegg til kabinbesetningen om bord på passasjerfly. For andre typer operasjoner og oppdrag kan det
    være behov for medisinsk personell redningsspesialister eller «task specialists». Som kaptein er du sjef i flyet og har
    ansvar for besetning passasjerer og last. Kapteinen har ansvar for at flyet fungerer slik det skal og for at flygingen
    foregår etter sikkerhetsreglene. Styrmannen er nestkommanderende og avløser kapteinen ved behov. Vanlige arbeidsoppgaver
    kan være Sammen setter kaptein og styrmann opp reiseplanen med spesifikasjoner for flyhastighet flyhøyde og flytid. På
    en vanlig tur flyr gjerne en av pilotene flyet mens den andre overvåker flyvningen. Overvåkingen omfatter blant annet
    håndtering av radio og kommunikasjon med flygeledere underveis drivstoffkontroll og kontroll av alle brytere og spaker.
    Det endelige ansvaret ligger alltid hos kapteinen. Piloter må gjennomgå jevnlige legeundersøkelser avhengig av alder.
    De må også gjennomføre jevnlige treningsprogram blant annet simulatortrening. Siden engelsk er et arbeidsspråk innen flytrafikk
    må du som pilot ha meget gode engelskkunnskaper. '
  - 'Som interiørarkitekt planlegger og tegner du innvendige rom i bygninger. Arbeidet utføres både når nye bygg skal bygges
    og ved endringer i eldre bygg. Interiørarkitekten arbeider med alt fra boliger til helse- undervisnings- nærings- og kulturbygg.
    Noen driver også med spesialdesign det vil si design av møbler og andre romkomponenter til enkeltprosjekter. En interiørarkitekt
    bidrar til god infrastruktur og utvikler løsninger basert på brukernes behov og ønsker. Vanlige arbeidsoppgaver for en
    interiørarkitekt sørge for helhetlig planlegging og utforming av rom. Det innebærer at rom materialer farger og møblering
    ses i sammenheng og at interiør og arkitektur samspiller best mulig prosjektere (tegne beskrive og beregne) interiørløsninger
    og endringer i bygg oftest ved hjelp av dataprogrammer utføre behovsanalyser og lede brukermedvirkningsprosesser det vil
    si prosesser der brukerne av bygget kommer med sine ønsker utarbeide farge- og materialpaletter planlegge belysning velge
    møbler og tekstiler designe skreddersydde løsninger gjøre kostnadsberegninger innhente anbud og bestille leveranser prosjektledelse
    Interiørarkitekten samarbeider med oppdragsgiver byggherre arkitekt og andre fagfolk. Interiørarkitekter kan også jobbe
    med mye av det samme som en interiørkonsulenter men interiørarkitekter har lengre utdanning og kan ofte påta seg større
    oppdrag. En interiørarkitekt må også til en hver tid holde seg oppdatert på lover og normer. Norske interiørarkitekters
    og møbeldesigneres landsforening (NIL) autoriserer interiørarkitekter på masternivå. Med autorisasjon fra NIL kan du kalle
    deg interiørarkitekt MNIL. '
- source_sentence: Hvordan bli 1 maskinist?
  sentences:
  - 'Vi kan dele politiyrket i to hovedgrupper Politibetjent Politibetjenten er utdannet ved Politihøgskolen og har en rekke
    arbeidsoppgaver i politiet. Arbeidsoppgavene er avhengig av hvilken enhet politibetjenten jobber i eksempler på enheter
    kan være Etterforskning Patrulje UP (trafikkpolitiet) Forebyggende Les mer om hvordan det er å jobbe som politibetjent
    Les mer om hvordan det er å jobbe som etterforsker Politijurist Politijuristen er utdannet jurist og arbeider med påtalemessige
    oppgaver deriblant å lede etterforskning og fungere som aktor i retten. Politijurister har ofte de ledende stillingene
    i politiet. Les mer om politijurist '
  - 'Om bord på et skip kan det være flere i maskinbesetningen. Dette varierer etter hvor stort maskineriet er. På større
    fartøy er det både 1. maskinist og 2. maskinister. Fellesbetegnelsen for de som jobber som maskinist eller maskinsjef
    er maskinoffiser. Som maskinist har du mulighet å jobbe på skip plattform eller på landanlegg der det er behov for ansatte
    med maskinistutdanning. Som 1. maskinist er du maskinsjefens nestkommanderende om bord og jobber i maskinrommet med å
    holde maskineriet i god teknisk stand. Vanlige arbeidsoppgaver for maskinister daglig ansvar for drift reparasjon overhaling
    og vedlikehold av maskineri og tekniske systemer på hele fartøyet planlegge større og mindre vedlikeholdsarbeider vakthold
    i kontrollrom hovedansvar for sikkerheten i maskinrommet bunkring (Fylle drivstoff) opplæring av nye i maskinbesetningen
    I dette yrket må du være forberedt på å arbeide turnus og kanskje være lengre perioder om bord for eksempel fire uker
    om bord fire uker fri. Alle som skal jobbe på skip og andre flyttbare innretninger til havs må ha en helseerklæring som
    viser at du kan jobbe om bord på et skip. Da skal en sjømannslege sjekke blant annet syn hørsel din fysiske funksjonsevne.
    Dette gjelder også lærlinger som skal jobbe om bord. '
  - 'En førsteamanuensis er en vitenskapelig ansatt ved universitet og høgskoler. For å kunne ansettes som førsteamanuensis
    må du ha doktorgrad eller tilsvarende dokumentert kompetanse på et aktuelt fagområde. Vanlige arbeidsoppgaver for en førsteamanuensis
    er utføre forskningsarbeid formidle og publisere forskningsresultater veilede og undervise studenter redigere og vurdere
    andres vitenskapelige arbeider samarbeide med myndigheter organisasjoner eller næringsliv om forskningsbaserte løsninger
    og innovasjon Førsteamanuensisstillinger finnes innenfor alle typer fagfelt og det er vanlig at du har spesialisert deg
    innen et eller flere områder av fagfeltet. Du vil normalt samarbeide med andre fagpersoner på arbeidsstedet. I andre land
    går førsteamanuensis under navn som associate professor eller senior lecturer. '
- source_sentence: Hva tjener fysiker?
  sentences:
  - 'Vanlige arbeidsoppgaver for en stillasbygger montere ulike typer stillaser atkomster arbeidsplattformer inndekking og
    andre midlertidige konstruksjoner rigge og stroppe i forbindelse med montering og demontering av stillas Som stillasbygger
    jobber du både på bakken og i høyden. Du må kunne lese arbeidstegninger og framdriftsplaner. Stillasbyggeren er viktig
    i arbeidet med å forebygge ulykker på byggeplasser. Økende krav til bygg og installasjoner gjør at stillasbygging blir
    stadig mer komplisert. Det øker i sin tur kravet til stillasmontørens kompetanse når det gjelder både teknikk fagkunnskaper
    og helse miljø og sikkerhet (HMS). '
  - 'En fysiker arbeider med fenomener og krefter som oppstår mellom materie og objekter både rundt oss i hverdagen og i universet.
    Fysikk er grunnlag for mange fag og dermed kan fysikere jobbe innenfor flere områder som for eksempel medisin og elektronikk.
    Fysikere kan forske på alt fra fornybar energi til hva som skjer i hjernen vår. Som fysiker lærer du å bruke verktøy som
    programmering og datasimuleringer og å håndtere store datamengder og komplekse analyser. Vanlige arbeidsoppgaver for en
    fysiker lage og teste modeller for å beskrive fysiske fenomener i naturen lage og teste modeller for kompliserte prosesser
    innen industri og teknologi utvikle nye instrumenter og måleteknikker blant annet for anvendelser innen medisin miljøovervåking
    og energiteknologi Fysikeren bruker vitenskapelige metoder som eksperimenter teoretiske modeller og matematiske simuleringer
    i arbeidet sitt. '
  - 'Som dykker arbeider du under vann. I Norge deler vi yrkesdykking inn i to områder innaskjærsdykking og dykking ved landanlegg
    eller i Nordsjøen. Det er vanlig å spesialisere seg innen ett av disse områdene. Yrkesdykkere kan ha ulike bakgrunner
    som for eksempel håndverksyrker (rørlegger sveiser og elektriker) ingeniør fotograf dykkerinstruktør eller marin- og havforskning.
    I mange andre yrker er dykking en del av jobben. Dette gjelder yrker som mannskap på redningsskøytene brannkonstabler
    og arkeologer. Vanlige arbeidsoppgaver for yrkesdykkere innaskjærs anleggs- og inspeksjonsarbeid av bruer kaier og rørledninger
    berging ved skipsforlis dykking innen havbruk servicearbeid på skip registrering av marinarkeologiske funn som vitenskapelig
    dykker Vanlige arbeidsoppgaver for yrkesdykkere til havs og ved landanlegg service og inspeksjon på faste og flytende
    innretninger inspeksjoner av olje- og gassrørledninger installasjoner ved utbygging av nye olje- og gassfelt nedbygging
    av kalde olje- og gassfelt ei kommende næring er havvind Ved dykking til havs er det nødvendig med videre utdanning som
    klokkedykker dersom dybden overstiger 50 meter. En del av arbeidstiden vil også foregå over vann. Gjennomsnittlig dykketid
    er på 100 timer i året. I dette yrket må du regne med en god del reising. For dykkere som jobber innen bygg- og anleggsbransjen
    kan antall reisedøgn komme opp i 250 i året. I Nordsjøen vil dette tallet være omtrent det halve dersom man går i fast
    rotasjon. Det finnes flere jobbmuligheter hos dykkeentreprenører i Norge. Noen dykkere går sammen og danner egne selskaper.
    Norske dykkere er ettertraktet arbeidskraft også i utlandet. '
