    ini disampaikan Direktur Utama Persija , Gede Widiade . Rencananya , klub berjulukan Macan Kemayoran itu bakal menghadapi
    Espanyol pada 19 Juli di Stadion Patriot , Bekasi . " Tadi di kantor sudah kita lakukan negosiasi . Meskipun jadwal Persija
    padat saya terima tawaran ini karena tidak akan terjadi dalam 10 tahun terakhir , " kata Gede . Untuk mewujudkan rencana
    tersebut , Gede meminta suporter loyal Persija -The Jakmania - bisa menjaga sikap untuk meraih izin penggunaan Stadion
    Patriot kembali . Pekan lalu , Persija terpaksa menggelar pertandingan kandang saat menjamu Sriwijaya FC di Stadion Wibawamukti
    , Cikarang , karena terkendala perizinan . Pihak kepolisian diduga tidak memberikan rekomendasi keamanan bagi Persija
    untuk tampil di Stadion Patriot karena '
