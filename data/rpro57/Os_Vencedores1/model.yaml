widgetData:
- source_sentence: 'Recém-nascido prematuro (33 semanas), ecografia na gestação mostrava polidrâmnio, peso ao nascimento 1,3kg,
    apresentou resíduo gástrico importante na tentativa de alimentação. Encontra-se com 2 dias de vida, com sonda gástrica
    “aberta” drenando material bilioso. Exame de imagem realizado apresentado abaixo: (Fonte: J Clin Neonatol) De acordo com
    o quadro clínico e o exame de imagem, qual o diagnóstico para esta criança?'
  sentences:
  - Atresia duodenal
  - Dismotilidade própria do prematuro
  - A forma mais segura e eficaz de prevenção para o herpes zoster (zona) é a vacinação. Trata-se de vacina de vírus inativado,
    indicada para homens e mulheres acima de 50 anos.
- source_sentence: Doente de 64 anos procura atendimento médico com queixa de poliaquiúria (intervalo miccional a cada 3 horas),
    nictúria e com jato urinário médio. Qualidade de vida pouco afetada pelos sintomas urinários. Trouxe à consulta uma ecografia
    realizada há dois anos, demonstrando próstata de 55g e vias urinárias normais. Tem como antecedente familiar irmão com
    diagnóstico de cancro da próstata que se encontra em tratamento. Qual o rastreio mínimo recomendado para este doente?
  sentences:
  - Fosfatase alcalina e ecografia via abdominal da próstata.
  - PSA (antigénio específico da próstata) e toque retal.
  - Prevenção secundária
- source_sentence: 'Mulher de 62 anos é atendida na consulta de cardiologia do Hospital Escola. Refere hipertensão de longa
    data e uso irregular de Captopril. Há 6 meses apresenta dispneia progressiva aos esforços, sendo que no último mês apresentou
    dois episódios de dispneia paroxística noturna. Desde então passou a dormir com duas almofadas. Refere também edema maleolar,
    que progrediu até à altura dos joelhos. O médico que a atendeu nos Cuidados de Saúde Primários esclareceu-a sobre o uso
    correto do Captopril, orientou dieta com pouco sal, pediu Radiografia do Tórax, Eletrocardiograma (ECG), análises sanguíneas
    e encaminhou-a. Ao exame físico, apresenta TA: 130/100mmHg, FR: 18cpm, FC 112bpm, SaO2 de 96%. Está em regular estado
    geral, pulsos periféricos presentes e simétricos, sons cardíacos rítmicos, um pouco abafados, presença de terceiro som
    (S3), sopro sistólico suave em foco mitral, estertores subcrepitantes finos nas bases de ambos os pulmões, fígado palpável
    a um centímetro do rebordo costal direito e edema dos membros inferiores de +/4. O ECG mostrou taquicardia sinusal (FC:
    118bpm) e sinais de sobrecarga ventricular esquerda. A Radiografia evidenciou cardiomegália de ++/4. Função renal, eletrólitos
    e glicemia estão normais. Qual o exame complementar e a conduta terapêutica mais apropriados neste momento?'
  sentences:
  - Monitorização Ambulatória da Pressão Arterial; substituir Captopril por Hidralazina e associar Hidroclorotiazida.
  - Mudar a posologia, mantendo 3 horários diários de uso dos medicamentos da lista acima, organizados em caixas do tipo pequeno-almoço,
    almoço e jantar, com símbolos que a doente entenda, sendo os da manhã e da noite supervisionados pela sobrinha, pode melhorar
    a aderência sem prejudicar a dinâmica familiar.
  - Ecocardiograma; manter Captopril e associar Carvedilol e Furosemida.
- source_sentence: 'Mulher, 30 anos de idade, primigesta, no curso da 16ª semana de gestação, é atendida em consulta de pré-natal
    no Centro de Saúde. Ao exame, observa-se: estado geral regular, afebril, tensão arterial de 110/80 mmHg, mucosas descoradas
    1+/4+. Os exames complementares revelaram presença de neutrófilos com granulações tóxicas e hemoglobina de 11 g/dL; glicemia
    sérica em jejum de 90 mg/dL; AST: 30 (normal: até 38 U/L); ALT: 28 (normal até 41 U/L); tempo de protrombina, colesterol,
    triglicerídeos, plaquetas e perfil tiroideu sem alterações. A pesquisa dos marcadores virais para hepatites virais demonstrou
    Anti-VHA IgM, AgHBs, Anti-HBc-IgM e HBeAg não reativos; Anti-VHA IgG não reativo, Anti-HBs reativos; VDRL, IgM para toxoplasmose
    e VIH não reativos; IgG reativo para toxoplasmose. Sobre os resultados dos exames solicitados, podemos afirmar que a grávida
    apresenta:'
  sentences:
  - Imunidade para Hepatite A
  - Imunidade para toxoplasmose
  - Anencefalia
- source_sentence: 'Doente, 25 anos, G3P2A0 (2 partos vaginais), chega à urgência referindo dor no abdómen inferior associada
    a cefaleias, náuseas, 2 episódios de vómitos, dor epigástrica e diminuição dos movimentos fetais. A doente encontra-se
    com 32 semanas de idade gestacional e refere não ter tido qualquer intercorrência na gravidez até ao presente momento.
    Ao exame físico: TA: 150 x 110 mmHg, BCF: 144 bpm, movimentos fetais presentes, edema presente nos membros inferiores
    (3+), altura uterina: 29cm; tira-teste de urina: negativo. Solicitadas análises laboratoriais, com os seguintes resultados:
    Hemoglobina: 10,8 g/dL; Hematócrito: 30%; leucócitos totais: 9.400 células/mm3 sem desvio; plaquetas: 113.000/µL; Creatinina:
    1,1 mg/dL; Ureia: 28 mg/dL; AST: 15 u/L; ALT: 14 u/L; LDH (desidrogenase lática): 400 UI/L; Bilirrubina total: 0,4 mg/dL;
    Bilirrubina direta 0,2 mg/dL; Bilirrubina indireta: 0,2 mg/dL. Ecografia obstétrica evidencia peso fetal no percentil
    3 e ILA (índice de líquido amniótico) de 4,0cm; Doppler normal. Qual o diagnóstico e a conduta?'
  sentences:
  - Hipertensão gestacional. Manter doente internada e aguardar completar 34 semanas de gestação para interrupção da mesma.
  - Pré-eclâmpsia com sinais de gravidade. Internamento hospitalar, sulfato de magnésio, programar interrupção da gravidez.
  - Radiografia de corpo inteiro.
