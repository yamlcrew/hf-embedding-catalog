- source_sentence: What are some common attitudes and beliefs that can create personal barriers to self-care for family caregivers?
  sentences:
  - 'Support for nutrition, breathing, and feeding

    People with ALS may have trouble chewing and swallowing their food, and getting the nutrients they need. Nutritionists
    and registered dieticians can help plan small, nutritious meals throughout the day and identify foods to avoid. When the
    person can no longer eat with help, a feeding tube can reduce the person’s risk of choking and pneumonia.'
  - "Amyotrophic Lateral Sclerosis (ALS) | National Institute of Neurological Disorders and Stroke\n\n\n\n\n\n\n\n\n     \
    \ Skip to main content\n    \n\n\n\n\n\n\n\n\n\n\n\n\n\n\nAn official website of the United States government\n\n    \
    \        Here’s how you know\n\n\n\n\n\n\n\n\n\n\n\nOfficial websites use .gov \n                A\n                .gov\n\
    \                website belongs to an official government organization in the United States.\n              \n\n\n\n\n\
    \n\n\n\nSecure .gov websites use HTTPS\n\n                  A lock\n                  (\n\n)\n                   or\n\
    \                  https://\n                   means you’ve safely connected to the .gov website. Share sensitive information\
    \ only on official, secure websites.\n                \n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nSearch\n\n\nMenu\n\n\n\
    \n\n\n\n\n\n\nSearch NINDS\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nSearch NINDS\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nMain\
    \ navigation"
  - "Identifying Personal Barriers \nMany times, attitudes and beliefs form personal barriers that stand in the \nway of caring\
    \ for yourself.  Not taking care of yourself may be a lifelong \npattern, with taking care of others an easier option.\
    \  However, as a family \ncaregiver you must ask yourself, \"What good will I be to the person I care \nfor if I become\
    \ ill? If I die?\"  Breaking old patterns and overcoming \nobstacles is not an easy proposition, but it can be done –\
    \ regardless of \nyour age or situation.  The first task in removing personal barriers to self-\ncare is to identify what\
    \ is in your way.  For example, \n• Do you feel you have to prove that you are worthy of the care recipient's \naffection?\
    \  \n• Do you think you are being selfish if you put your needs first?  \n• Is it frightening to think of your own needs?\
    \ What is the fear about?"
- source_sentence: What role does the SOD1 gene play in the body?
  sentences:
  - "Migraine Trainer® Shareable Resources\n\n\n\nMind Your Risks®\n\n\nNINDS Brain Educational Resources\n\n\nStroke\n\n\n\
    \n\n\n\nStroke Overview\n\n\nPrevention\n\n\nSigns and Symptoms\n\n\nAssess and Treat\n\n\n\n\n\n\nNIH Stroke Scale\n\n\
    \n\nRecovery\n\n\nResearch\n\n\nOutreach\n\n\n\n\n\n\n\n\nDid you find the content you were looking for?\n\n\n\n\n\nYes,\
    \ I did find the content I was looking for\n\n\n\n\nNo, I did not find the content I was looking for\n\n\n\n\n\n\n\nPlease\
    \ rate how easy it was to navigate the NINDS website\n\n\n\n\n\nVery easy to navigate\n\n\n\n\nEasy to navigate\n\n\n\n\
    \nNeutral\n\n\n\n\nDifficult to navigate\n\n\n\n\nVery difficult to navigate\n\n\n\n\n\n\nThank you for letting us know!\
    \ Any other feedback?\n\n\n\n\nSubmit\n\n\n\n\n\nThis site is protected by reCAPTCHA and the Google Privacy Policyand\
    \ Terms of Serviceapply.\n\n\n\n\n\n\n\n\n\n\n\n                          Last reviewed on July 19, 2024\n    \n\n\n\n\
    \n\n\n\n\n\n\n\nContact Us"
  - 'Muscle twitches in the arm, leg, shoulder, or tongue

    Muscle cramps

    Tight and stiff muscles (spasticity)

    Muscle weakness affecting an arm, a leg, or the neck

    Slurred and nasal speech

    Difficulty chewing or swallowing


    As the disease progresses, muscle weakness and atrophy spread to other parts of your body. People with ALS may develop
    problems with:


    Chewing food and swallowing (dysphagia)

    Drooling (sialorrhea)

    Speaking or forming words (dysarthria)

    Breathing (dyspnea)

    Unintended crying, laughing, or other emotional displays (pseudobulbar symptoms)

    Constipation

    Maintaining weight and getting enough nutrients'
  - "About 25-40% of all familial cases (and a small percentage of sporadic cases) are caused by a defect in the C9orf72 gene.\
    \ C9orf72 makes a protein found in motor neurons and nerve cells in the brain. \nAnother 12-20% of familial cases result\
    \ from mutations in the SOD1 gene. SOD1 is involved in production of the enzyme copper-zinc superoxide dismutase 1."
- source_sentence: What types of resources are available for caregivers of individuals with ALS?
  sentences:
  - 'Eventually, people with ALS will not be able to stand or walk, get in or out of bed on their own, use their hands and
    arms, or breathe on their own. Because they usually remain able to reason, remember, and understand, they are aware of
    their progressive loss of function. This can cause anxiety and depression in the person with ALS and their loved ones.
    Although not as common, people with ALS also may experience problems with language or decision-making. Some also develop
    a form of dementia known as FTD-ALS.

    Most people with ALS die from being unable to breathe on their own (known as respiratory failure,) usually within three
    to five years from when the symptoms first appear. However, about 10% survive for a decade or more.

    Who is more likely to get amyotrophic lateral sclerosis (ALS)?'
  - 'Motor Neuron Diseases 













    Order publications from the NINDS Catalog

    The NINDS Publication Catalog offers printed materials on neurological disorders for patients, health professionals, and
    the general public. All materials are free of charge, and a downloadable PDF version is also available for most publications.

    Order NINDS Publications



     








    Health Information







    Disorders







    Glossary of Neurological Terms



    Order Publications




    Clinical Trials







    Clinical Trials in the Spotlight



    Find NINDS Clinical Trials




    Patient & Caregiver Education







    Brain Attack Coalition



    Brain Donation




    Public Education







    Brain Basics







    Know Your Brain



    Understanding Sleep



    Preventing Stroke



    The Life and Death of a Neuron



    Genes and the Brain




    Migraine Trainer®







    Migraine Trainer® Shareable Resources'
  - "Caring for a person living with ALS\nAs the person with ALS progresses in their disease, they will need more and more\
    \ help with daily activities. Being a caregiver for a person with ALS, while rewarding, can be challenging for the person’s\
    \ loved ones and caregivers. It is important for caregivers take care of themselves and to seek support when needed. Free\
    \ and paid resources are available to provide home health care services and support. Visit the organizations listed at\
    \ the end of this article to find support in your area. \nWhat are the latest updates on amyotrophic lateral sclerosis\
    \ (ALS)?"
- source_sentence: How can prospective donors participate in ALS research through brain donation?
  sentences:
  - 'Doctors may use the following medications approved by the U.S. Food and Drug Administration (FDA) to support a treatment
    plan for ALS:'
  - NINDS also supports the NIH NeuroBioBank, a collaborative effort involving several brain banks across the U.S. that supply
    investigators with tissue from people with neurological and other disorders. Tissue from individuals with ALS is needed
    to help advance critical research on the disease. A single donated brain can make a huge impact on ALS research, potentially
    providing information for hundreds of studies. The goal is to increase the availability of, and access to, high quality
    specimens for research to understand the neurological basis of the disease. Prospective donors can begin the enrollment
    process by visiting Learn How to Become a Brain Donor.
  - The National ALS Registry collects, manages, and analyzes de-identified data about people with ALS in the United States.
    Developed by the Center for Disease Control and Prevention's Agency for Toxic Substances and Disease Registry (ATSDR),
    this registry establishes information about the number of ALS cases, collects demographic, occupational, and environmental
    exposure data from people with ALS to learn about potential risk factors for the disease, and notifies participants about
    research opportunities. The Registry includes data from national databases as well as de-identified information provided
    by individuals with ALS. All information is kept confidential. People with ALS can add their information to the registry
    and sign up to receive for more information.
- source_sentence: Does having a risk factor guarantee that a person will develop a disorder?
  sentences:
  - 'Doctors may use the following medications approved by the U.S. Food and Drug Administration (FDA) to support a treatment
    plan for ALS:'
  - "possible decline in quality of life. \n \nBut despite these risks, family caregivers of any age are less likely than\
    \ \nnon-caregivers to practice preventive healthcare and self-care behavior.  \nRegardless of age, sex, and race and ethnicity,\
    \ caregivers report problems \nattending to their own health and well-being while managing caregiving \nresponsibilities.\
    \ They report: \n• sleep deprivation  \n• poor eating habits  \n• failure to exercise  \n• failure to stay in bed when\
    \ ill  \n• postponement of or failure to make medical appointments ."
  - 'A risk factor is a condition or behavior that occurs more frequently in those who have a disease, or who are at greater
    risk of getting a disease, than in those who don''t have the risk factor. Having a risk factor doesn''t mean a person
    will develop a disorder, and not having a risk factor doesn''t mean you won’t. Risk factors for ALS include:'
