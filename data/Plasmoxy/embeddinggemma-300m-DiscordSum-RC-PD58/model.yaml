- source_sentence: krunker ban and number cult forming with 00x series
  sentences:
  - '[G]: First proper Tiltak-Taktician match in a while, with much longer time control than previous matches. Tiltak has
    improved as expected, but Tako still gets plenty of wins


    **Tiltak vs Taktician, 2000 games.**

    **Size:** 6.

    **Engine settings:** `-multi-cut` for Taktician, default settings for Tiltak

    **Time control: **90+0.9.

    **CPU: ** R9-5900X, 12(24) cores at 3.7GHz. 24 games were played in parallel.

    **Opening book:** 6s_4ply_balanced_openings.txt. This book consists of 1000 openings, intended to have a smaller white
    advantage than the standard opening position. Each opening was played twice, with the engines switching sides.

    **Results:** +1616-281=103, +279 elo for Tiltak. 953 white wins, 944 black wins.

    [G]: I considered changing it, this time control may have been large enough for Tako to benefit from bigger TT

    [G]: I tend to think it doesn''t matter though, its TT is pretty large by default

    [G]: The 20+0.2 match I ran a few days ago actually had slightly better result for Tako. Even though the 90+0.9 match
    had a slightly stronger Tiltak version (I think)

    [D]: I think I might rather see 10x the time control, 1/10 the games. I don''t really think there are so many unique openings
    in Tak unless you start getting into a ton of plies

    [G]: I''ve wanted to try this in the past, the biggest reason I haven''t is due to memory limitations. Tiltak and Tako
    are both pretty memory-hungry, and if you run 8 games in parallel, that''s 16 engine instances that all want lots of RAM
    to themselves

    [G]: I have a new shiny desktop with 64GB RAM now though. I can probably squeeze in a fair number of games in parallel

    [G]: I''m not sure people would find it *that* interesting though, certainly not with the opening book I''m using now.
    They all start from really bad positions

    [D]: Question: is it actually useful to run games on the "hyperthreading" cores?

    [E]: i think seeing engines tackle weird positions is relatively interesting

    [G]: You know, that''s a very good question. I never tested it, I just did it anyway''

    [G]: There''s lots of candy for you in that 2000-game PTN then 😁

    [E]: i don''t know if i want to look through them one by one til i find something interesting tho

    [E]: i suppose the tiltak losses ought to be a good place to start

    [G]: They''re certainly interesting for me. I use them a lot for development ideas

    [E]: is that file here anywhere?

    [G]: https://discord.com/channels/176389490762448897/932765511358513204/934815373340061727 I put it in a stupid place

    [E]: sick

    [D]: Yeah just curious, I don''t exactly understand what "hyperthreading" does. My understanding is it makes it easier
    to context switch, but doesn''t directly improve the computing power of the machine. And considering that we should be
    running at full blast on the cores we''re using, my guess was it wouldn''t help. But that''s based on my understanding
    of hyperthreading, which is at least oversimplified if not wrong.

    [E]: i think it''s wrong

    [G]: I never understood hyperthreading properly either. But I always thought it was free multithreading performance, at
    least if each thread can use different execution ports on the CPU. One thread can do float math while the other is doing
    integer math, one thread can do whatever when the other is waiting on a cache miss, etc

    [E]: it''s about one core executing two threads in parallel

    [E]: sharing the internal resources of the core (decoder, ALUs, etc.)

    [G]: And modern CPUs have like 10 execution ports, so they can share more granular stuff than "float math" or "int math".
    Or so I think

    [F]: well every core has limited resources, and hyperthreading also allows for multiple threads to share those resources
    reducing idle time. imagine there being 3 float multiply units, and if one thread doesn''t use all of them the other might.
    Thats really oversimplified but one thing that works towards performance increase

    [D]: Well because of pipelining I imagine it''s less dramatic an improvement than it sounds like.

    [E]: if both threads are executing a high latency workload (e.g. memory accesses), then it''s likely to be significant

    [E]: bordering on 2x, in the optimal case

    [G]: Since this appears to have piqued everyone''s curiosity, I will test Tiltak''s hyperthreading scaling

    [D]: Yeah I guess you raise a good point about memory access.

    [G]: I''m also not sure the pipeline mental model is accurate anymore. To my understanding, modern CPUs can execute instructions
    truly in parallel, e.g. issue several instructions on the same clock cycle

    [D]: Probably some, not others. Just to make it more inscrutable.

    [F]: they usually fetch multiple instructions each cycle. the biggest difference to the traditional pipeline is the massive
    amount of reordering of instructions that happens in a processor. basically for every instruction, the dependencies are
    "calculated" and then they are thrown onto a big pile. next step in the pipeline picks as many instructions as the resources
    can handle in the next cycle which dependencies are resolved (or going to be resolved soon enough)

    [G]: I created the following ad-hoc benchmark: Run Tiltak for 1m nodes from the 6s starting position, and print the result.
    Do this 24 times, with either 12 or 24 threads. I ran the benchmark 3 times for each case.


    12 threads:

    ```

    - 17.10s

    - 17.16s

    - 17.21s

    ```

    24 threads:

    ```

    ...

    [G]: I haven''t actually measured this either, but I don''t think Tiltak spends much time at all on memory accesses. It
    does spend time on stupid stuff like floating-point division though, that seems like a good candidate for hyperthreading

    [F]: 18% is still something

    [G]: I''ll definitely take it. It''s not 1.4x or 2x though

    [F]: I mean 24 threads could probably also have decreased performance because of some weird caching or something xD

    [G]: Yeah, but that''s always part of the deal. They''re competing for memory bandwidth too

    [F]: the multiple threads are looking at different games, right? do they share transposition tables? probably not, right?

    [G]: No, the workloads were fully independent and deterministic

    [G]: Could be some weird bottleneck like memory allocations, Tiltak allocates like mad

    [F]: do you do that during the search as well?

    [G]: Yeah, it does several allocations per search iteration

    [G]: Some of them are needed to build the search tree, at least one is just lazy programming

    [D]: Btw, in the big ptn you posted earlier, what is the analysis value from? It looks like it''s too long (in seconds)
    to be the analysis from the engines during the game?

    [G]: The time is real, the engines had 90s + 0.9s increment. The trick is to run 24 games in parallel

    [G]: Given our recent discovery about hyperthreading, the engines are quite a bit slower like this. But we get a lot of
    games

    [D]: Oh somehow I read 9+0.9, not 90 + 0.9 lol

    [D]: That clears it up, at least 😛

    [G]: Well there''s your games with 10x time control 😁

    [E]: first such game i look at and it ends with tako asserting dominance by finding the most obscure way to finish the
    road

    [E]: almost invoking the dragon clause in the process

    [E]: this is gonna be good

    [E]: (this is round 16, if someone wants to look at the rest of the game - it''s pretty instructive)

    [E]: yo what the heck was round 63? just huge stacks everywhere?

    [E]: guess we''ve been playing tak wrong 😅

    [G]: How did it even manage to get 13 flats under its capstone

    [E]: several times in the game, in fact

    [E]: sorry, the other time was 12

    [E]: and twice 11

    [E]: sorry, twice 12 also

    [G]: Well, Tako loves to capture and Tiltak loves allowing captures

    [E]: match made in heaven

    [E]: and both engines were certain of their victory

    [G]: Hah, that''s the funniest part about these matches

    [E]: yeah, until one of them is like oh shi-

    [E]: the funny part about this one is that tako''s eval was at +40, then fell to 0, and then it found a forced loss

    [G]: +40 is around the same eval as 0x57''s tinue puzzle 😄

    [B]: I''ve actually wondered if the game solve involves early stacking or something equally frowned upon by human players.

    [G]: Tiltak''s take on this is a hard no. Its strategy is more flats more better, all the way to the bank

    [G]: It doesn''t stack much, and doesn''t mind the opponent doing so at all

    [B]: Yeah, it seems to be a sound strategy, just a what if... kinda thought.

    [D]: Deciding how to handle stacks may be the "hardest" single thing in Tak, in my mind.

    [D]: Like, medium sized stacks that are flats on top.

    [D]: Do you recapture, and let your opponent wall. If your opponent walls do you run away? Or do you wall yourself? Or
    do you ignore it?

    [E]: mhm, it seems intractable

    [E]: especially with regards to how it interacts with the endgame

    [E]: though one idea i''ve been mentally toying with is evaluating things as if it''s the endgame

    [E]: it comes with its own bundle of problems tho

    [E]: i will probably want to try and implement it eventually, but that''s after i make something functional

    [D]: Everyone''s a gangsta until they actually sit down at the keyboard 😉

    [E]: i''m past that phase

    [E]: that doesn''t have to stop me from fantasizing though

    [D]: Past it how?

    [E]: being gangsta before sitting down at the keyboard

    [D]: I didn''t mean it as a hubris thing, really, just that there''s always some opportunity costs to implementing the
    ideas. Always more ideas than there is time to fiddle with them

    [E]: really struggling with that problem

    [E]: frankly i''m more of a theory guy, or, in other words, lazy

    [D]: Is there an easy way to paste in PTN and get it to have the names and flat counts in ptn.ninja?

    [E]: uhh there''s a pencil thing in the top left

    [E]: edit ptn

    [E]: it kind of works

    [D]: Yeah but it''s not giving me the top bar or whatever. Maybe it''s minimized idk

    [D]: Looks like

    [D]: Idk doesn''t it usually say the player''s name and have the fcd at the top?

    [E]: oh

    [D]: Where is that bit?

    [E]: it''s in preferences

    [E]: under board

    [E]: turn indicator

    [E]: > Hotkey: T

    [E]: ^ this is probably your problem

    [D]: Ah so I probably hit T at some point and it fucked off

    [D]: I would argue this is a fail in UX, but okay.

    [D]: Thanks

    [G]: I think you just gotta calculate it out. Particularly the part about whether you can run away after the typical capture
    -> capture -> wall sequence

    [D]: Well it''s kind of a recursive problem, right?

    [E]: the key problem is basically when do you stop?

    [D]: I don''t know if the resulting position is good because there will be multiflat stacks left a lot of the time

    [D]: I''m thinking about it from a human perspective I should say, not even bringing in bot challenges.

    [D]: I do think I''ve gotten a little bit better at it in the past year, but it''s tough.

    [E]: there are some situations where you can mostly evaluate the stacks statically, but they seem to come up way too rarely
    in real games

    [A]: I think it depends on context.

    [G]: Well, if you have a good spread to run away, you''re usually okay. If you have to leave some of their flats behind
    due to carry limit, or you''re otherwise lacking space, you''re not okay

    [A]: If the stack has no walls around it, it’s more likely to be better to be the player that gets it.

    [A]: Or if you can spread it so that the liabilities end up next to your cap.

    [D]: Sure, you''re right. It can''t be evaluated in a vacuum, so the problem I''m bringing up is pretty vague. But running
    a lot of times just leaves behind a bunch of trash stacks that a wall can scope up one by one.

    [G]: I tried to implement a pursuit heuristic in Tiltak a while ago. I can''t remember if I actually made it work

    [E]: oh? what''s that?

    [G]: It would to capture whatever was just left behind by a stack spread

    [E]: huh

    [D]: Yeah I have some ideas adjacent to that as well.

    [G]: I did several related heuristics. I can''t remember if I got to that one. It''s pretty situational

    [E]: that doesn''t seem to be the best move most of the time in my experience though

    [E]: usually you can let the liabilities simmer

    [D]: Right now I''m trying to make the eval_fn less stupid so I can at least join the conversation with the big boys 😛

    [D]: I guess maybe I should look at what you guys do, but I''m trying not to cheat really, and maybe bring something new
    to the table

    [G]: In 5s, pursuit is a really important pattern. At least in my experience vs Aaaargh

    [G]: Whenever you both have two flats each surrounding their flat, and there''s a captive under any one of them, the capture
    sequence is generally good for you

    [E]: on that note, do you have a fill heuristic?

    [G]: Because after 4x capture, you can place a wall, and pursue the stack if it runs away

    [G]: It works out differently on 6s due to the extra carry limit

    [G]: Yeah I have a policy bonus for winning board fill. I also added that recently

    [G]: I am 90% sure that it works, I don''t think I ever tested

    [D]: Oh that''s a pretty good idea

    [D]: Maybe in Monte Carlo it''s less important, but still interesting.

    [E]: no, i meant filling in a newly-vacant spot

    [G]: Oh yeah! That I definitely added. Separate value for each role iirc

    [G]: Re-capture heuristic is also a really simple idea that I didn''t implement until recently

    [D]: Ooh I think I actually made an improvement!

    [G]: That was quick

    [D]: Well I only did 6 games but the only one it lost against its old self is the delightfully suspicious 1. c5 a6 2.
    f6 c4 (as white) lol

    [G]: Careful about that :p I''ve had matches start out 13-1 and then turn into a loss

    [D]: Yeah I''m evaluating more on the play than the result.

    [G]: Small sample size is a drag

    [G]: What was your improvement?

    [D]: Trying to get it to be less greedy at throwing stacks, mainly

    [D]: Which is partly why it was on the mind

    [G]: Just in terms of move ordering?

    [D]: No, the problem is more in evaluation I think. Well the move ordering is crap, but I can''t really fix it until it
    can look at a position better.

    [D]: It will make really greedy short term throws at are really suspicious.

    [D]: Because it likes the FCD mainly.

    [D]: Or, well, more so because it likes controlling the stacks. But I''m trying to teach it how fickle its hold on the
    stacks is

    [D]: It''s actually impressive how good the bot is with how simplistic its eval is / was. And considering how manually
    tuned it is, I suspect that as long as I get any inkling of an improvement it will be good

    [A]: On 5s CrumBot kills Argh just by having a deeper search.

    [G]: I think there''s an incredible untapped potential in simple minmax engines

    [A]: Despite a super dumb evaluation function.

    [G]: Everyone''s trying to do too fancy stuff

    [G]: A slightly improved Tako could probably go head to head with Tiltak

    [D]: Indeed. That''s sort of my angle.

    [G]: +1, I totally agree. Eval is less important than people think imo

    [G]: If your opponent can search two ply deeper, no amount of eval can save you

    [E]: i think i have to disagree on that one

    [E]: 2 plies don''t compensate for a poor positional understanding, for instance

    [E]: if what you''re working towards (positionally) has no chance of succeeding then 2 plies won''t save you

    [E]: i suppose there''s an intrinsic assumption here that you can be dead lost positionally despite the simpler metrics
    suggesting otherwise

    [E]: but looking at tako vs tiltak games i''d argue that''s the case

    [G]: It certainly becomes true at some point, if your eval is a *lot* better then you can compensate for shallow search

    [G]: But 2 ply is a lot, man. On move 30 when stacks are flying everywhere, it''s all about whether you can calculate
    out the capture sequence or not

    [E]: right, but if you''re up 5 walls, 7 liabilities and 10 reserves out of the middlegame you''re screwed

    [G]: It''s easy to count walls and reserves though. Liabilities is tricky, but hey, just calculate it out :p

    [G]: Tiltak does lose some games where its position is clearly a disaster at move 10, but it doesn''t realize until move
    30.

    [G]: If someone comes around with a NN engine with great positional understanding, that might be a problem

    [E]: @ 0x57696c6c

    [F]: I''m really excited to see where that leads.

    [E]: anyway, what i''m trying to say is

    [E]: both

    [E]: both is good

    [E]: no engine to my knowledge has both yet tho

    [E]: (because it''s hard, of course)

    [G]: Tiltak''s search is half decent by now. Its eval is terrible

    [E]: can you call 100knps good?

    [E]: like i know it''s mcts

    [E]: but that''s not nearly enough to see through a good amount of tactics

    [G]: Well, no

    [E]: i always thought tiltak was an eval-first bot

    [G]: It''s decent in a more abstract way :p

    [G]: Mathematically sound

    [G]: Its policy eval is quite sophisticated, but I consider that a part of search

    [E]: have you ever had this weird idea

    [E]: of not using the value network

    [E]: no i guess that''s impossible huh

    [G]: Well, there''s SlateBot

    [E]: ah

    [E]: that checks out

    [G]: I really like SlateBot, but it''s not that strong

    [G]: It gets like 1000 nps

    [D]: It does full rollouts or something?

    [G]: Yeah, exactly

    [D]: I knew it had no value network but I didn''t like, consider the implications of that lol

    [G]: Full rollouts turns out to be a worse heuristic than the value function, in addition to being 100x slower

    [G]: But it leads to really interesting play

    [G]: It likes making hard caps, for instance, which Tiltak disapproves of

    [E]: have you tried using the policy function inside the rollouts?

    [G]: Yeah, it does that

    [E]: ah

    [G]: You need some kind of policy in them, otherwise they''re completely useless

    [A]: Yeah, I''ve done some experimenting with random rollouts and I completely agree.

    [G]: Oh, I had a comment about this. I think Tiltak gets around this by placing an incredibly large value on supports.
    So it avoids splittings its stacks unless it gets something for it

    [D]: "Supports"?

    [E]: morten''s term for friendlies in friendly stack

    [D]: Interesting. So I guess it''s ambivalent to moving the stack in the event it doesn''t give a profit in friendlies,
    and therefore picks a better move.

    [G]: It also doesn''t care much about flat count in general. It cares much more about having less reserves

    [E]: that seems to match up with my own evaluations

    [E]: which is good for me i suppose

    [D]: Yeah Tiltak has definitely taught me a little bit about that.

    [G]: It sometimes loses on flats to Tako even though it''s ahead by like 10 in terms of reserves

    [G]: Because Tako has gobbled them all up under caps and walls and whatever

    [D]: Yeah, well we''ve all been on one side or the other of that situation ourselves too

    [D]: It''s kinda hard to exactly forsee whether or not you''ll have time to make up the difference

    [C]: I kind of agree with Tiltak

    [C]: Though I wouldn''t make those reserve moves and lost flat advantage.  But I think _in general_ getting your reserve
    count down is important.

    [C]: And Tako seems to misevaluate stack spreading for +flat gains too highly when there is time for those uncovered captives
    to get gobbled up

    [E]: i think it''s important to have less reserves than your opponent, but not necessarily by a landslide

    [E]: just enough so that you control when the game ends

    [E]: it interacts quite heavily with available +FCDs, too'
