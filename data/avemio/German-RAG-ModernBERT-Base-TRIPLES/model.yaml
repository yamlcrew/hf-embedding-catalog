widgetData:
- source_sentence: Die Einwohner Haarens protestierten, da der Name ihrer Gemeinde bei der Eröffnung der Strecke von den Wegweisern
    entfernt und durch "Wünnenberg" ersetzt wurde.
  sentences:
  - Die Wirksamkeit von Duolingos Ansatz wurde von einer externen Studie untersucht, die von der Firma selbst in Auftrag gegeben
    worden war. Professoren der City University of New York und der University of South Carolina haben die Studie durchgeführt
    und schätzen, dass 34 Stunden Duolingo den gleichen Fortschritt bei Lesen und Schreiben erzielen wie ein Erstsemesterkurs
    an einem US-College, der mehr als geschätzte 130 Stunden dauert. Die Studie untersuchte nicht die Sprechfähigkeiten der
    Probanden. Bei einem Vergleich wurde festgestellt, dass Benutzer der Software Rosetta Stone etwa 55 bis 60 Stunden benötigten,
    um den gleichen Stoff zu lernen. Die Studie hat darüber hinaus keine Vergleiche mit anderen kostenlosen oder günstigen
    Kursen durchgeführt wie "BBC", "Book2", oder "Before You Know It".
  - Da im selben Jahr im Zuge der Gebietsreform in Nordrhein-Westfalen die Gemeinde Haaren in die Stadt Wünnenberg eingemeindet
    wurde, änderte man kurzfristig vor Eröffnung der Strecke den Namen der Anschlussstelle "Haaren" in "Wünnenberg", sodass
    Haaren von den Wegweisern gänzlich verschwand. Bei der feierlichen Eröffnung der Strecke kam es zu Protestaktionen seitens
    Einwohner Haarens, bei denen die Fahrbahn blockiert wurde, sodass die Eröffnungskolonne nicht wie geplant stattfinden
    konnte. Wünnenberger Lokalpolitiker erwirkten schließlich beim Landesverkehrsministerium in Düsseldorf einen Kompromiss,
    sodass die Anschlussstelle, wie das spätere Autobahnkreuz, ab Oktober 1975 "Wünnenberg-Haaren" hieß. Bemerkenswerterweise
    trägt das Autobahnkreuz (noch 2021) diesen Namen, obwohl Wünnenberg seit dem Jahr 2000 "Bad Wünnenberg" heißt und das
    Voranstellen des Gemeinde- bzw. Städtenamens vor den Stadtteilnamen bei Orten mit weniger als 100.000 Einwohnern gegen
    die nordrhein-westfälischen Wegweisungs-Richtlinien verstößt.
  - Auf Basis der Planungen einer 1957 gegründeten Arbeitsgruppe der Industrie- und Handelskammer Kassel genehmigte das Bundesverkehrsministerium
    in Bonn den Bau einer 4,7 km langen Verbindung zwischen der Autobahn Hamburg–Frankfurt und der B 3. Die einbahnige "hochwasserfreie
    Verbindung Kassel" entstand von 1958 bis 1962 auf der vorbereiteten Trasse der Reichsautobahn. Dabei wurde auch die Fuldatalbrücke
    Bergshausen mit einer Fahrbahn fertiggestellt. Der Bau dieser Brücke wurde bereits in der NS-Zeit begonnen, bis zur Einstellung
    des Baus infolge des Zweiten Weltkriegs waren nur einige Arbeiten an der Gründung im Gange gewesen.
- source_sentence: Das Weibchen legt jeden Tag in den Morgenstunden ein Ei und übernachtet manchmal schon vor der Eiablage
    auf dem Nest.
  sentences:
  - Während der Phase der Eiablage legt das Weibchen jeden Tag in den Morgenstunden ein Ei. Das Weibchen übernachtet auch
    vor der Eiablage bisweilen schon auf dem Nest, die Bebrütung wird allerdings erst nach der Ablage des vorletzten (manchmal
    des letzten) Eis begonnen, sodass alle Jungvögel etwa am selben Tag schlüpfen.
  - Das Gelege besteht aus 2 bis maximal 8, zumeist 5–6 Eiern. Diese sind oval und durchschnittlich 22 × 17 mm groß. Die möglichen
    Grundfärbungen – weißlich (weiß, gelblich, hellgrau oder beige), grünlich oder rötlich – tragen eine Obersprenkelung,
    die zwischen verschiedenen Brauntönen variieren kann. Darunter liegt eine blassere Sprenkelung in je nach Farbtyp unterschiedlich
    getöntem Grau. Auch die Verteilung der Sprenkelung kann recht unterschiedlich sein.
  - Die Serienhandlung dreht sich am Anfang neben der Bewahrung von Clarks Geheimnis hauptsächlich um das Stoppen von gewalttätigen
    und verbrecherischen „Meteoritenfreaks“, die durch das Meteoritengestein (Kryptonit) nach den beiden Meteoritenschauern
    auf Smallville (Anfang der ersten und Ende der vierten Staffel) besondere Fähigkeiten erlangt haben und dadurch korrumpiert
    oder in den Wahnsinn getrieben werden. Die entstandenen kuriosen Kräfte erinnern besonders in der Anfangszeit der Serie
    oft an "Akte X". Von den Fans werden solche Charaktere in der Fantasy und der Science-Fiction als "Freak of the Week"
    (dt. „Monster der Woche“) bezeichnet, da in der wöchentlich ausgestrahlten Serie in jeder Folge einer der Freaks auftaucht
    und besiegt werden muss.
- source_sentence: Reichhart vollzog vertretungsweise Hinrichtungen in verschiedenen deutschen Städten, darunter Berlin-Plötzensee,
    wo er unter anderem Hans und Sophie Scholl hinrichtete.
  sentences:
  - Reichhart vollzog vertretungsweise auch Hinrichtungen in Köln, Frankfurt-Preungesheim, Berlin-Plötzensee, Brandenburg-Görden
    und Breslau, wo ebenfalls zentrale Hinrichtungsstätten eingerichtet worden waren. Von 1938 bis 1944 war er auch zuständiger
    Scharfrichter für die zentralen Hinrichtungsstätten in Wien und Graz. Insgesamt vollstreckte er seit 1924 während der
    Weimarer Republik und der Zeit des Nationalsozialismus 2.951 Todesurteile mit der Guillotine und 59 mit dem Galgen. Unter
    den Verurteilten waren 250 Frauen. Er richtete auch Hans und Sophie Scholl hin († 22. Februar 1943), die bekanntesten
    Mitglieder der Widerstandsgruppe Weiße Rose. Reichhart äußerte später, er habe noch nie jemanden so tapfer sterben sehen
    wie Sophie Scholl.
  - 2012 war Frentzen in Melbourne im Rahmenprogramm der Formel 1 Gaststarter im Porsche Carrera Cup Australien.
  - Im Juli 1932 veröffentlichten mehrere niederländische Zeitungen Artikel über Reichharts andere Tätigkeit und lüfteten
    damit sein Inkognito. Seine Geschäfte florierten nicht mehr; im Frühjahr 1933 kehrte er nach München zurück. Er erwog,
    seine Scharfrichtertätigkeit aufzugeben.
- source_sentence: Wann empfahl das RKI der Bevölkerung in Deutschland, einfachen Mundschutz zusätzlich zu anderen Schutzmaßnahmen
    zu tragen?
  sentences:
  - Trotz des Festhaltens an ägyptischer Tradition war das Land auch großen Veränderungen unterworfen. So verlor Theben seine
    Bedeutung als kultureller und administrativer Mittelpunkt an Saïs. Weiterhin lässt sich bei allen Herrschern der 26. Dynastie
    eine starke Anlehnung an die griechischen Stadtstaaten feststellen, wenn auch unter Pharao Apries der Versuch einer Loslösung
    von den Griechen erkennbar ist, die das Heer dominierten. Amasis eroberte Zypern im ersten Jahrzehnt seiner Herrschaft
    und schloss ein Bündnis mit Kyrene, das sein Vorgänger noch bekämpft hatte. Dazu heiratete er eine kyrenische Prinzessin.
    Dieses Bündnis war noch intakt, als 525 v. Chr. die Perser Ägypten attackierten.
  - Das RKI bewertete das Risiko für die Bevölkerung in Deutschland am 28. Februar 2020 als „gering bis mäßig“, seit dem 17.
    März als „hoch“ und für Risikogruppen seit dem 26. März als „sehr hoch“. Die Gefahr variiere regional; schwere Krankheitsverläufe
    seien „mit zunehmendem Alter und bestehenden Vorerkrankungen“ wahrscheinlicher. Das RKI empfahl zum Infektionsschutz,
    genügend Abstand zu anderen Menschen einzuhalten (zum Eigen- und Fremdschutz), sich regelmäßig die Hände mit Seife zu
    waschen und sich nicht ins Gesicht zu fassen, um nicht das Virus auf die Schleimhäute von Mund, Nase oder Augen zu bringen.
    Nachdem am 26. März 2020 der Präsident der Bundesärztekammer die Bevölkerung aufgerufen hatte, zusätzlich einfachen Mundschutz
    zu tragen, erklärte das RKI am 2. April, das Tragen von einfachem Mundschutz könne zusätzlich mithelfen, andere Menschen
    nicht anzustecken. Es sei aber kein Ersatz für andere Maßnahmen wie das Abstandhalten.
  - Nach dem Tod Kochs am 27. Mai 1910 wurde im Institutsgebäude eine Grabstätte für ihn eingerichtet. Im Erdgeschoss des
    Südwestflügels wurde dafür ein großer Raum gegenüber dem Hörsaal ausgewählt und mit Marmor in verschiedenen Farbtönen
    ausgekleidet. In diesem Zimmer war zu Lebzeiten Kochs die photographische Abteilung untergebracht. Die Adaptierung des
    Raums als Mausoleum erfolgte nach Plänen des Architekten Paul Mebes. Am 4. Dezember 1910 wurde in Anwesenheit von Familienangehörigen
    Kochs die kupferne Urne mit seiner Asche dort beigesetzt. Die offizielle Einweihung des Mausoleums fand am 10. Dezember
    1910 statt. Das Mausoleum des Institutsgebäudes enthält an seiner westlichen Schmalseite das von dem Berliner Künstler
    Walter Schmarje ausgeführte Epitaph mit dem Reliefbild Kochs. Darunter befindet sich in einer durch eine weiße Marmorplatte
    verschlossenen Nische die Urne mit der Asche Kochs. An der Ostseite des Raumes sind unter der Überschrift „Robert Koch
    – Werke und Wirken“ wesentliche Daten zu den Ergebnissen seiner Forschungsarbeit dargestellt. Die Bestattung Kochs im
    Institutsgebäude war möglich, da es zu der Zeit in Preußen noch kein Gesetz über die Urnenbeisetzung gab.
- source_sentence: Wieso verklagte die Familie von Ritter die behandelnden Ärzte auf 67 Millionen US-Dollar Schadensersatz?
  sentences:
  - Während Proben zu einer Folge von "Meine wilden Töchter" traten bei Ritter im September 2003 starke Brustschmerzen auf,
    und er begab sich in das nahegelegene "Providence Saint Joseph Medical Center", in dem er am 11. September 2003 im Alter
    von 54 Jahren – eine Woche vor seinem 55. Geburtstag – an einer Aortendissektion starb. Seine Familie verklagte Anfang
    2008 die behandelnden Ärzte auf einen Schadensersatz von 67 Millionen US-Dollar. Die Klage wurde im März 2008 abgewiesen.
  - Nach der Einstellung der Fernsehserie "Herzbube mit zwei Damen" nach acht Staffeln im Jahr 1984 machte er mit dem Spin-off
    "Three’s A Crowd" weiter, jedoch wurde die Serie nach einer Staffel eingestellt. Weitere Fernsehrollen hatte er in "Inspektor
    Hooperman" (1987), die ihm eine Nominierung sowohl für den Golden Globe als auch für den Emmy einbrachte, "Küß’ mich,
    John" (1992), "Ally McBeal" (1997), "Buffy – Im Bann der Dämonen" (1997), "Clifford the Big Red Dog" (2000), "Scrubs –
    Die Anfänger" oder "Meine wilden Töchter" (2002).
  - In Taiwan wurde im April 2014 der Bau des Kernkraftwerks Lungmen nach heftigen Protesten bis zu einem Referendum ausgesetzt.
