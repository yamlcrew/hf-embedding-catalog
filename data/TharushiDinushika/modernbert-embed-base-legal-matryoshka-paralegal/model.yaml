widgetData:
- source_sentence: How does tenancy succession occur by operation of law, and is joinder of other heirs necessary?
  sentences:
  - The plaintiff became the tenant of the premises by the operation of s. 36(2)(c)(i) of the Rent Act and it was not necessary
    for the plaintiff to have joined the other heirs of Palanivelu in the action.
  - Held, that the Court had power, under section 669 of the Code, to issue the injunction, and that this was a proper case
    for the exercise of the power of the Court.
  - It is improper to cross-examine a prisoner in regard to his failure to discloso his defence before trial, in the course
    of the statutory statement mado by him under section 160 of the Criminal Procedure Code.
- source_sentence: To be liable under the Penal Code for a criminal act done by several persons, what is the sharing that
    must be evidenced?
  sentences:
  - if a case is added to the calendar at a stage when there is not enough time to summon the witnesses, there is “ good cause
    shown to the contrary within the meaning of the Section.""
  - '"Held"'
  - The English Law of estoppel by deed does not apply to Ceylon.
- source_sentence: Under what circumstances a partition suit is not maintainable?
  sentences:
  - Where, in a prosecution under the Forest Ordinance, the accused is acquitted, any timber seized in the possession of the
    accused cannot be. ordered to be delivered to the complainant.
  - Carrying in a Jorry a spare tyre which is worn down to such an extent as to expose a part of its outermost canvas constitutes
    a breach of Regulations 2 (2) and 3 of the Motor Traffic (Use of Vehicles) Regulations, 1951.
  - Where the two co-owners of & land divided it into two portions and one of them exclusively possessed and dealt with the
    northern, and the other with the southern portion, and after such possession for over ten years one of them instituted
    a partition suit against the other to partition the land—each Held, that the partition suit was not maintainable, there
    being possession common between the two and co-owners, party having acquired a prescriptive title to a divided portion.
- source_sentence: What must the prosecution prove to establish criminal negligence?
  sentences:
  - In order to establish criminal liability the facts must be such that the negligence of the accused goes beyond a mere
    matter of compensation and shows such a disregard for the life and safety of others as to amount to a crime against the
    state and conduct deserving punishment.
  - An application for a writ of quo warranto lies to set aside an election to a village committee on the ground that the
    respondent who was elected was not qualified for election as a member.
  - Held further, (i) that an affidavit supplementing the reasons already appearing on the order should not be entertained.
- source_sentence: Under what circumstances can an agreement be considered unlawful if it does not expressly contemplate a
    breach?
  sentences:
  - Where an agreement does not expressly contemplate the commission of a breach of any statutory provision, it can be held
    to be unlawful only if its per- formance would necessarily involve such a breach or if extrinsic evidence indi- cates
    the intention or the need to commit such a breach.
  - Proceedings under Ordinance No. 12 of 1840 are civil in their nature. An appeal lies from an order made under section
    1 of the Ordinance. The appeal should be prosecuted in accordance with the provisions of the Civil Procedure Code.
  - it was held by a full Bench that once the Judge has elected to take the statement of a person as evidence, he has no option
    but to administer either an oath or affirmation to such person as the case may require, and that the omission contemplated
    in section 9 is an acci- dental omission.
