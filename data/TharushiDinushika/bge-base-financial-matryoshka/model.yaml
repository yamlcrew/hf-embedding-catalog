widgetData:
- source_sentence: What types of services and hardware does the Aruba brand offer for business connectivity?
  sentences:
  - Net income decreased by 16% in 2023 to $5,240.4 million from $6,244.8 million in the previous year.
  - The Aruba brand offers cloud solutions including LAN, Wi-Fi, and Wide area network services, featuring hardware like Wi-Fi
    access points and software such as network management programs, which support secure business connectivity and data analytics.
  - Management also measures the results of comparable store and club sales, or comparable sales, a metric that indicates
    the performance of our existing stores and clubs by measuring the change in sales for such stores and clubs, for a particular
    period from the corresponding period in the previous year. Walmart's definition of comparable sales includes sales from
    stores and clubs open for the previous 12 months, including remodels, relocations, expansions and conversions, as well
    as eCommerce sales. Sales at a store that has changed in format are excluded from comparable sales when the conversion
    of that store is accompanied by a relocation or expansion that results in a change in the store's retail square feet of
    more than five percent.
- source_sentence: What are the three principles of liquidity risk management at Goldman Sachs?
  sentences:
  - Net cash provided by (used for) financing activities totaled $(6,932) for a certain company.
  - 'Goldman Sachs manages liquidity risk based on three principles: 1) hold sufficient excess liquidity in the form of GCLA
    to cover outflows during a stressed period, 2) maintain appropriate Asset-Liability Management, and 3) maintain a viable
    Contingency Funding Plan.'
  - The Company’s ability to compete successfully depends heavily on ensuring the continuing and timely introduction of innovative
    new products, services and technologies to the marketplace. The Company designs and develops nearly the entire solution
    for its products, including the hardware, operating system, numerous software applications and related services. Principal
    competitive factors important to the Company include price, product and service features (including security features),
    relative price and performance, product and service quality and reliability, design innovation, a strong third-party software
    and accessories ecosystem, marketing and distribution capability, service and support, and corporate reputation.
- source_sentence: What are some of the components of the company's material cash requirements?
  sentences:
  - Material cash requirements include licensing intellectual cost from sports organizations and players associations, debt
    repayment obligations of $1.9 billion, and funding operating requirements such as capital expenditures, share repurchase
    programs, and dividends.
  - Cash dividends declared in 2023 totaled $3.84 per share, as compared to $3.38 per share in 2022.
  - For 2023, Delta Air Lines recorded one-time pilot agreement expenses totaling $864 million, due to a new four-year Pilot
    Working Agreement which included a provision for a one-time payment made upon ratification.
- source_sentence: What is the measurement basis for recognizing tax benefits in financial statements according to the described
    method?
  sentences:
  - Pages 44 to 121 in IBM's 2023 Annual Report to Stockholders are dedicated to Financial Statements and Supplementary Data.
  - Workforce Solutions — provides services enabling customers to verify income, employment, educational history, criminal
    justice data, healthcare professional licensure and sanctions of people in the U.S. (Verification Services), as well as
    providing our employer customers with services which include unemployment claims management, I-9 and onboarding services,
    Affordable Care Act compliance management, tax credits and incentives and other complementary employment-based transaction
    services (Employer Services)
  - The tax benefits recognized in the financial statements from such a position are measured based on the largest benefit
    that has a greater than 50% likelihood of being realized upon ultimate settlement.
- source_sentence: What is indicated by 'Item 8' in the context of financial disclosures?
  sentences:
  - Item 8 refers to the section on Financial Statements and Supplementary Data in a financial disclosure.
  - The expected total amortization expense for intangible assets from fiscal 2024 through the period thereafter as of January
    31, 2023, was projected to be $7,125 million.
  - The impairment charges for Depop and Elo7 were influenced by factors such as macroeconomic conditions including reopening
    and inflation, as well as management changes and revised projected cash flows affecting their fair values.
