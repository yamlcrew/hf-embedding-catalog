  - source_sentence: Qual é a capacidade de armazenamento padrão do disco rígido dos computadores utilizados no Laboratório
      de Organização de Computadores e Sistemas Digitais e qual é a velocidade de rotação mínima do disco rígido?
    sentences:
    - 'A pesquisa será fomentada através dos grupos de pesquisa do curso em projetos de iniciação científica. O trabalho de
      conclusão de curso é outro componente importante para o desenvolvimento da pesquisa pelo estudante, pois é composto
      por componentes curriculares obrigatórios que o conduzem a planejar e executar um projeto de caráter científico ou tecnológico.
      Este Projeto Pedagógico apresenta uma matriz curricular em conformidade com as diretrizes que orientam a estrutura dos
      cursos da área da Computação, com a demanda atual por profissionais e com as expectativas regionais constituídas à luz
      dos movimentos sociais e dos fundamentos que regem a construção da UFFS. **8.1 Matriz Curricular**O Curso Ciência da
      Computação possui duas entradas anuais oferecidas em turnos diferentes. A primeira entrada, oferecida no primeiro semestre
      de cada ano, é no turno vespertino, e a segunda entrada, oferecida no segundo semestre de cada ano, é no turno noturno.
      Ambas as ofertas possuem carga horária, componentes curriculares, ementários e referências iguais, diferindo apenas
      no tempo de integralização curricular. A duração para o turno vespertino é de 8 (oito) semestres e para o turno noturno,
      10 (dez) semestres. Para o turno noturno, destaca-se a distribuição dos componentes curriculares ao longo das duas últimas
      fases (nona e décima fases): considerando-se a carga de trabalho exigida pelos dois trabalhos de conclusão de curso,
      alocou-se um número reduzido de componentes curriculares regulares, possibilitando ao aluno trabalhador dedicar-se aos
      trabalhos de conclusão durante as duas últimas fases. Adicionalmente, salienta-se o fato de que os componentes curriculares
      estarão dispostos em fase, destacando-se que sempre haverá cinco optativas sendo ofertados, facilitando sua alocação
      e ampliando as possibilidades de cumprimento da carga horária optativa. **8.1.1 Matriz curricular do turno vespertino**|
      Fase | N.

      Ordem | Código | COMPONENTE CURRICULAR | Créditos | Horas | Pré-requisitos |

      |---|---|---|---|---|---|---|

      | Fase | N.'
    - 'Projeto Pedagógico do Curso de Graduação em Ciência da Computação – Bacharelado **MINISTÉRIO DA EDUCAÇÃO**

      **UNIVERSIDADE FEDERAL DA FRONTEIRA SUL – UFFS**

      **PRÓ-REITORIA DE GRADUAÇÃO**

      **DIRETORIA DE PEDAGÓGICA****14.4 Laboratórios****14.4.2 Laboratórios de Organização de Computadores e Sistemas Digitais**O
      objetivo principal do Laboratório de Organização de Computadores e Sistemas Digitais é dar suporte às atividades teóricas
      e práticas das disciplinas de circuitos digitais, sistemas digitais, organização de computadores, arquitetura de computadores,
      linguagens de descrição de hardware (optativa) e tópicos em automação industrial (optativa). Este laboratório deve permitir
      que o aluno do curso de Ciência da Computação possa desenvolver atividades práticas (experimentos e projetos) envolvendo
      sistemas digitais, tais como: implementar circuitos combinacionais, implementar circuitos sequenciais, realizar simulações
      via software de circuitos combinacionais e sequenciais, realizar prototipagem de sistemas digitais em PLDs e FPGAs,
      além da implementação de circuitos inteligentes através da programação de microcontroladores. Na tabela abaixo são descritos
      os materiais necessários à implantação e funcionamento do laboratório. | Tabela 14: Descrição dos materiais do laboratório:
