- source_sentence: Qual é a capacidade de armazenamento padrão do disco rígido dos computadores utilizados no Laboratório
    de Organização de Computadores e Sistemas Digitais e qual é a velocidade de rotação mínima do disco rígido?
  sentences:
  - 'A pesquisa será fomentada através dos grupos de pesquisa do curso em projetos de iniciação científica. O trabalho de
    conclusão de curso é outro componente importante para o desenvolvimento da pesquisa pelo estudante, pois é composto por
    componentes curriculares obrigatórios que o conduzem a planejar e executar um projeto de caráter científico ou tecnológico.
    Este Projeto Pedagógico apresenta uma matriz curricular em conformidade com as diretrizes que orientam a estrutura dos
    cursos da área da Computação, com a demanda atual por profissionais e com as expectativas regionais constituídas à luz
    dos movimentos sociais e dos fundamentos que regem a construção da UFFS. **8.1 Matriz Curricular**O Curso Ciência da Computação
    possui duas entradas anuais oferecidas em turnos diferentes. A primeira entrada, oferecida no primeiro semestre de cada
    ano, é no turno vespertino, e a segunda entrada, oferecida no segundo semestre de cada ano, é no turno noturno. Ambas
    as ofertas possuem carga horária, componentes curriculares, ementários e referências iguais, diferindo apenas no tempo
    de integralização curricular. A duração para o turno vespertino é de 8 (oito) semestres e para o turno noturno, 10 (dez)
    semestres. Para o turno noturno, destaca-se a distribuição dos componentes curriculares ao longo das duas últimas fases
    (nona e décima fases): considerando-se a carga de trabalho exigida pelos dois trabalhos de conclusão de curso, alocou-se
    um número reduzido de componentes curriculares regulares, possibilitando ao aluno trabalhador dedicar-se aos trabalhos
    de conclusão durante as duas últimas fases. Adicionalmente, salienta-se o fato de que os componentes curriculares estarão
    dispostos em fase, destacando-se que sempre haverá cinco optativas sendo ofertados, facilitando sua alocação e ampliando
    as possibilidades de cumprimento da carga horária optativa. **8.1.1 Matriz curricular do turno vespertino**| Fase | N.

    Ordem | Código | COMPONENTE CURRICULAR | Créditos | Horas | Pré-requisitos |

