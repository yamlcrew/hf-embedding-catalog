- source_sentence: Qual tipo de documento deve ser incluído como anexo na compilação de TCC II, conforme o Artigo 16º, e qual
    é a condição para que ele seja aceito?
  sentences:
  - "**Art. 13º**As modalidades descritas na Tabela 1 são regidas conforme o seguinte: **§ 1º**Pesquisa científica básica\
    \ ou aplicada refere-se a atividades realizadas no contexto \nde aplicação de método científico para investigação de um\
    \ problema relevante para a \nárea e suas interdisciplinaridades. Projeto Pedagógico do Curso de Graduação em Ciência\
    \ da Computação – Bacharelado  213 **§ 2º**Inovação e Negócios refere-se à atividades realizadas pelo aluno no contexto\
    \ Indus- \ntrial e Mercadológico, seja esse baseado em empreendedorismo, inovação ou no meio \nempresarial, desde que\
    \ gere um produto entregável. **§ 3º**Comprovação de experiências refere-se às atividades realizadas pelo aluno durante\
    \ \no curso que comprovem um substancial crescimento profissional e a contribuição no \nmeio na qual a atividade foi conduzida.\
    \ **§ 4º**As modalidades poderão ser regulamentadas pelo Colegiado de Curso em ato deli- \nberativo. **Art. 14º**A monografia\
    \ é válida como TCC II conforme o seguinte: **§ 1º**Incluir o tema, a problematização, os objetivos gerais e específicos,\
    \ a justificativa, \numa abrangente revisão bibliográfica do estado da arte do tema escolhido, os procedi- \nmentos metodológicos,\
    \ os resultados, as discussões, o cronograma e o orçamento do \nprojeto, quando aplicável. **§ 2º**Respeitando-se os termos\
    \ de direitos autorais em vigor, deve ser integrada ao acervo \nde trabalhos digitais da UFFS e ficar disponível à comunidade\
    \ acadêmica como forma \nde divulgação do conhecimento adquirido e formado. **§ 3º**Seguir as normas metodológicas preconizadas\
    \ pela UFFS. **Art. 15º**O artigo científico é válido como TCC II conforme o seguinte: **§ 1º**Diagramado em formato de\
    \ conferência ou periódico reconhecido pela SBC, na es- \ntrutura de duas colunas, com no mínimo 8 (oito) páginas. **§\
    \ 2º**O proponente deve ser um dos autores do artigo científico. **§ 3º**Ser endossado pelo professor-orientador do TCC.\
    \ **§ 4º**Respeitando-se os termos de direitos autorais em vigor, deve ser integrado ao acerto \nde trabalhos digitais\
    \ da UFFS. **§ 5º**No caso de artigo científico aceito para publicação em periódico ou conferência re- \nconhecidos com\
    \ Qualis na área, antes da data de sua apresentação à banca, ficam sus- \npensas as obrigações do §1º do Art. 11º. **§\
    \ 6º**Não estar vinculado às modalidades Inovação e Negócio, e Comprovação de Expe- \nriências. **Art. 16º**A compilação\
    \ é válida como TCC II conforme o seguinte: Projeto Pedagógico do Curso de Graduação em Ciência da Computação – Bacharelado\
    \  214 **MINISTÉRIO DA EDUCAÇÃO**\n**UNIVERSIDADE FEDERAL DA FRONTEIRA SUL – UFFS**\n**PRÓ-REITORIA DE GRADUAÇÃO**\n**DIRETORIA\
    \ DE PEDAGÓGICA****§ 1º**Incluir introdução, procedimentos metodológicos, resultados e conclusões referen- \ntes ao tema\
    \ abordado. **§ 2º**Apresentar outros documentos, como relatórios, artigos resumidos, manuais, etc, no \nformato de anexos.\
    \ **§ 3º**Cada documento anexo à compilação deve ser reconhecido e aceito como de nature- \nza relevante e válido pelo\
    \ Colegiado do Curso ou pela Comissão de Atividades Curricu- \nlares Complementares. **§ 4º**Cada documento anexo na compilação\
    \ deve ser contextualizado com um texto que \nexplica como seus desdobramentos se conectam na contribuição do trabalho."
