- source_sentence: Qual foi a função do professor Dilvo Ilvo Ristoff na Universidade Federal da Fronteira Sul (UFFS) no início
    de sua implantação?
  sentences:
  - 'Atividades de extensão possibilitam a formação cidadã, aproximando os acadêmicos das discussões que integram o universo
    profissional e social. **MINISTÉRIO DA EDUCAÇÃO**

    **UNIVERSIDADE FEDERAL DA FRONTEIRA SUL – UFFS**

    **PRÓ-REITORIA DE GRADUAÇÃO**

    **DIRETORIA DE PEDAGÓGICA**b) Formação cidadã: o currículo do curso apresentado visa levar o estudante ao permanente questionar-se
    sobre a realidade social que o cerca e a sua formação enquanto sujeito político pertencente a ela. Esta formação está
    caracterizada, principalmente, nos componentes curriculares do Domínio Comum. c) Compromisso com o desenvolvimento regional
    sustentável: os processos de ensino-aprendizagem deverão provocar debate cultural e desenvolvimento regional sustentável
    nos diferentes espaços de atuação do profissional da Ciência da Computação. d) Garantia de meios de acesso e permanência
    dos acadêmicos na Universidade: as ações da universidade deverão contribuir para a permanência do estudante na instituição
    através de bolsas de extensão, iniciação científica e também de permanência. e) Pluralidade: respeito às posições ideo-políticas
    dos estudantes e compromisso com o rigor acadêmico na apresentação das diferentes correntes para a formação do profissional
    da Ciência da Computação. f) Autonomia: construção e afirmação permanente da noção de sujeito ético-político, seja pelos
    discentes ou docentes, na participação institucional, na organização pedagógica e política do curso. g) Gestão participativa,
    democrática e transparente: a prática dos docentes vinculados à UFFS caracteriza-se pelo compromisso com a construção
    coletiva de seus cursos, a relação profissional pautada na democracia, com espaços para críticas, diálogos e constantes
    reavaliações da atuação do grupo. Também a participação efetiva e o estímulo permanente ao envolvimento discente com os
    desafios e deliberações para a melhoria dos cursos e da universidade. h) Avaliação permanente: a avaliação permanente
    é realizada de duas formas: (*i*) avaliação externa de responsabilidade do MEC, que atualmente é constituída pelo Exame
    Nacional de Desempenho dos Estudantes (ENADE) e a Avaliação Externa*in loco*, ambas parte do Sistema Nacional de Avaliação
    do Ensino Superior (SINAES) e (*ii*) avaliação interna, também denominada de autoavaliação, coordenada pela Comissão Própria
    de Avaliação (CPA) e por instrumentos próprios que contemplem as especificidades da Universidade, a qual acompanhará a
    qualidade das atividades desenvolvidas no curso de graduação em Ciência da Computação e o desempenho dos docentes, segundo
    a avaliação dos estudantes. **MINISTÉRIO DA EDUCAÇÃO**

    **UNIVERSIDADE FEDERAL DA FRONTEIRA SUL – UFFS**

    **PRÓ-REITORIA DE GRADUAÇÃO**

    **DIRETORIA DE PEDAGÓGICA*****5.2 Epistemológicos***Comprometido com o processo de concepção e construção da Instituição,
    o curso de Ciência da Computação inclui no desenvolvimento do ensino, pesquisa e extensão, o princípio democrático de
    atuação. Este princípio busca “respeitar a pluralidade de pensamento e a diversidade cultural” como elo entre conhecimento
    técnico-científico e conhecimento social. Assim, as bases epistemológicas do curso são fundamentadas em práticas que visam
    à constante aquisição do conhecimento e à formação de um profissional capaz de gerar desenvolvimento e atender às demandas
    sociais. Para isso, a constante indagação, o uso de referências apropriadas, o exercício da avaliação crítica são ações
    essenciais para a formação acadêmica aliada ao desenvolvimento social.'
  - 'A promulgação da lei fez intensificar as atividades de estruturação da nova universidade, já que havia a meta de iniciar
    as atividades letivas no primeiro semestre de 2010. Em 21 de setembro de 2009, o Ministro da Educação designou o professor
    Dilvo Ilvo Ristoff para o cargo de reitor*pro tempore*da UFFS, com a incumbência de coordenar os trabalhos para a implantação
    da nova universidade, sob a tutoria da Universidade Federal de Santa Catarina (UFSC). Ainda em 2009 foram realizados os
    primeiros concursos e posses de servidores, estruturados os projetos pedagógicos provisórios dos cursos a serem implantados,
    definido o processo seletivo para o ingresso dos primeiros acadêmicos, estabelecidos os locais provisórios de funcionamento
    e constituída parte da equipe dirigente que coordenaria os primeiros trabalhos na implantação da UFFS. No dia 29 de março
    de 2010 foram iniciadas as aulas nos cinco*Campi*da UFFS, com o ingresso de 2.160 acadêmicos selecionados com base nas
    notas do Enem/2009 e com a aplicação da bonificação para os que cursaram o ensino médio em escola pública. Em cada campus
    foi realizada programação de recepção aos acadêmicos com o envolvimento da comunidade interna e externa, visando marcar
    o primeiro dia de aula na Universidade. Em um diagnóstico sobre os acadêmicos que ingressaram na UFFS neste primeiro processo
    seletivo constatou-se que mais de 90% deles eram oriundos da Escola Pública de Ensino Médio e que mais de 60% deles representavam
    a primeira geração das famílias a acessar o ensino superior. **MINISTÉRIO DA EDUCAÇÃO**

    **UNIVERSIDADE FEDERAL DA FRONTEIRA SUL – UFFS**

    **PRÓ-REITORIA DE GRADUAÇÃO**

    **DIRETORIA DE PEDAGÓGICA**O início das aulas também ensejou o primeiro contato mais direto dos acadêmicos e dos docentes
    com os projetos pedagógicos dos cursos que haviam sido elaborados pela comissão de implantação da Universidade com base
    em três grandes eixos: Domínio Comum, Domínio Conexo e Domínio Específico. Os primeiros contatos foram evidenciando a
    necessidade de repensar os PPCs, tarefa que se realizou ao longo dos anos de 2010 e 2011, sob a coordenação dos respectivos
    colegiados de curso a fim de serem submetidos à Câmara de Graduação do Conselho Universitário para aprovação definitiva.
    Nesta revisão consolidou-se uma concepção de currículo assentada em um corpo de conhecimentos organizado em três domínios:
    Comum, Conexo e Específico, expressos na matriz dos cursos, em componentes curriculares e outras modalidades de organização
    do conhecimento. O Domínio Comum visa proporcionar uma formação crítico-social e introduzir o acadêmico no ambiente universitário.
    O Domínio Conexo situa-se na interface entre as áreas de conhecimento, objetivando a formação e o diálogo interdisciplinar
    entre diferentes cursos, em cada*campus*. O Domínio Específico preocupa-se com uma sólida formação profissional. Compreende-se
    que os respectivos domínios são princípios articuladores entre o ensino, a pesquisa e a extensão, fundantes do projeto
    pedagógico institucional. A organização dos*campi*, com a constituição de suas equipes dirigentes, a definição dos coordenadores
    de curso e a estruturação dos setores essenciais para garantir a funcionalidade do projeto da Universidade foi um desafio
    encarado ao longo do primeiro ano de funcionamento. Iniciava-se aí a trajetória em busca da constituição de uma identidade
    e de uma cultura institucional.'
