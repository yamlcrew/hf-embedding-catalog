widgetData:
- source_sentence: When was the brewery founded by the family who resided in the Lemp Mansion founded?
  sentences:
  - Latrobe Brewing Company Latrobe Brewing Company in Latrobe, Pennsylvania, founded in 1839, was one of the largest breweries
    in the United States and the maker of "Rolling Rock" beer (famous for its small green bottles). It was purchased by Labatt
    Brewing Company in 1987, which in turn was purchased in 1995 by the Belgian brewing conglomerate corporation Interbrew,
    which merged later into InBev in 2004.
  - Lemp Mansion The Lemp Mansion (3322 DeMenil Place, St. Louis, Missouri) is a historical house in Benton Park, St. Louis,
    Missouri. It is also the site of four suicides by Lemp family members after the death of the son Frederick Lemp, whose
    William J. Lemp Brewing Co. dominated the St. Louis beer market before Prohibition with its Falstaff beer brand. The mansion
    is said to be haunted by members of the Lemp family.
  - 'Man of the House (song) "Man of the House" is a song co-written and recorded by American country music artist Chuck Wicks.
    It was released in January 2009 as the third single from the album "Starting Now". The song reached #27 on the "Billboard"
    Hot Country Songs chart. The song was written by Wicks and Michael Mobley.'
- source_sentence: Who is the translator and researcher who served as a dean at Hartford Junior College and translated her
    Belgian-French partner's 1968 work into English?
  sentences:
  - William L. Shirer William Lawrence Shirer (February 23, 1904 – December 28, 1993) was an American journalist and war correspondent.
    He wrote "The Rise and Fall of the Third Reich", a history of Nazi Germany that has been read by many and cited in scholarly
    works for more than 50 years. Originally a foreign correspondent for the "Chicago Tribune" and the International News
    Service, Shirer was the first reporter hired by Edward R. Murrow for what would become a CBS radio team of journalists
    known as "Murrow's Boys". He became known for his broadcasts from Berlin, from the rise of the Nazi dictatorship through
    the first year of World War II (1940). With Murrow, he organized the first broadcast world news roundup, a format still
    followed by news broadcasts.
  - 'The Abyss (Yourcenar novel) The Abyss (French: L''Œuvre au noir ) is a 1968 novel by the Belgian-French writer Marguerite
    Yourcenar. Its narrative centers on the life and death of Zeno, a physician, philosopher, scientist and alchemist born
    in Bruges during the Renaissance era. The book was published in France in 1968 and was met with immediate popular interest
    as well as critical acclaim, obtaining the Prix Femina with unanimous votes the year of its publication. The English translation
    by Grace Frick has been published under the title "The Abyss" or alternatively Zeno of Bruges. Belgian filmmaker André
    Delvaux adapted it into a film in 1988.'
  - Pierre L. van den Berghe Pierre L. van den Berghe (born 1933) is professor emeritus of sociology and anthropology at the
    University of Washington, where he has worked since 1965. Born in the Belgian Congo to Belgian parents, and spending World
    War II in occupied Belgium, he was an early witness to ethnic conflict and racism, which eventually led him to become
    a leading authority on ethnic relations. He has conducted field work in South Africa, Mexico, Guatemala, Iran, Lebanon,
    Nigeria, Peru, and Israel. Early in his career, he lectured at the University of Natal alongside Leo Kuper and Fatima
    Meer. A student of Talcott Parsons at Harvard (receiving the Ph.D. in 1960), he nevertheless had little interest in structural
    functionalism and was one of the first proponents of sociobiological approaches to social phenomena.
- source_sentence: Them Crooked Vultures and The Vines are both part of what music genres?
  sentences:
  - Friendly Center Friendly Center is a large, open-air shopping center located in northwestern Greensboro, North Carolina,
    near the intersection of Wendover Avenue and Friendly Avenue. The shopping center opened in August 1957, and with its
    inward orientation, Friendly Center could be classified as an outdoor lifestyle center. Its anchor tenants include Belk,
    Macy's, and Sears. Other tenants include Barnes & Noble, Old Navy, The Grande Theatre is a 16-screen multiplex cinema
    operated by Regal Cinemas. It also contains Harris Teeter's flagship supermarket location encompassing 72,000 square feet
    (6,700 m2) and Whole Foods Market. There are specialty "foodie" stores tucked away in the back corner by Harris Teeter
    such as the Savory Spice Shop and Midtown Olive Oil. It features a number of national retailers such as Banana Republic,
    Victoria's Secret, The Limited, Bath & Body Works, Express, The GAP, Eddie Bauer, Talbots, Birkenstock Feet First, Pier
    1, and New York & Company.
  - Twin Wild Twin Wild is a British four-piece alternative rock band. Formed in 2012, the band is made up of the collective
    creative energies of Richard Hutchison (vocals, guitars), Imran Mair (drums), David Cuzner (guitars) and Edward Thomas
    (bass). In 2014, the band self-released their track "Fears", which garnered over half a million plays on Soundcloud and
    charted in Spotify’s Top 20 viral chart. Their style of music has been compared to the likes of Foals, The Neighbourhood,
    and Bastille. The band have been hailed by Edith Bowman as "The love child of Bastille and Biffy Clyro".
  - Them Crooked Vultures Them Crooked Vultures is a rock supergroup formed in Los Angeles in 2009 by John Paul Jones (former
    member of Led Zeppelin) on bass and keyboards, Dave Grohl (of Foo Fighters and formerly of Nirvana) on drums and backing
    vocals, and Josh Homme (of Queens of the Stone Age, Eagles of Death Metal and formerly of Kyuss) on guitar and vocals.
    The group also includes guitarist Alain Johannes during live performances. The band began recording in February 2009,
    and performed their first gig on August 9, 2009, in Chicago, followed by a European debut on August 19. On October 1 the
    group embarked on a worldwide tour titled "Deserve the Future" with dates going into 2010. The band's first single "New
    Fang" was released in October 2009, followed by the group's self-titled debut album the following month, debuting at number
    12 on the "Billboard" 200. The group won the 2011 Grammy Award for Best Hard Rock Performance for "New Fang".
- source_sentence: What type of collection does Nådens år and Agnetha Fältskog have in common?
  sentences:
  - Gardiner Island (Nunavut) Gardiner Island is one of the many uninhabited Canadian arctic islands in Qikiqtaaluk Region,
    Nunavut. It is a Baffin Island offshore island located in Frobisher Bay south of the capital city of Iqaluit.
  - Nådens år Nådens år (The Year of Grace) is the third studio album by the Swedish rock artist Ulf Lundell. It was released
    in April 1978 on EMI and Parlophone. It was recorded in EMI Studio, Stockholm, and produced by Kjell Andersson and Lundell.
    It includes "Snön faller och vi med den" ("The snow is falling and we are too"), one of Lundell's more famous songs. Agnetha
    Fältskog is involved in the song. The cover picture shows Lundell sitting on a rock next to a dog and was taken in Åre
    in 1977. "Nådens år" achieved Gold status in Sweden.
  - Åsa Elzén Åsa Elzén is an artist whose work is informed by feminist theory, intersectionality and post-colonialism. Elzén
    was born in Sweden in 1972 and currently lives and works in Berlin.
- source_sentence: Red Velvet is a 2012 play by Lolita Chakrabarti, dealing with the biography of a 19th century actor born
    in which year ?
  sentences:
  - Herbert Campbell Herbert Campbell (22 December 1844 – 19 July 1904) born Herbert Edward Story was an English comedian
    and actor who appeared in music hall, Victorian burlesques and musical comedies during the Victorian era. He was famous
    for starring, for forty years, in the Theatre Royal, Drury Lane's annual Christmas pantomimes, predominantly as a dame.
  - Leptinella Leptinella is a genus of alpine flowering plant in the Asteraceae family, comprising 33 species, distributed
    in New Guinea, Australia, New Zealand, South Africa, and South America. Many of the species are endemic to New Zealand.
  - Red Velvet (play) Red Velvet is a 2012 play by Lolita Chakrabarti, dealing with the biography of the 19th century actor
    Ira Aldridge and his taking the role of "Othello". It premiered at the Tricycle Theatre (directed by its new artistic
    director Indhu Rubasingham) from 11 October to 24 November 2012, with Aldridge played by Adrian Lester.
