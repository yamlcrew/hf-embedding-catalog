widgetData:
- source_sentence: <summary>The "_fastdds_statistics_sample_datas" topic tracks the number of data messages or fragments sent
    by a DataWriter to deliver a single sample, excluding built-in and statistics DataWriters.</summary>
  sentences:
  - "  If several new data changes are received at once, the callbacks may\n  be triggered just once, instead of once per\
    \ change. The application\n  must keep *reading* or *taking* until no new changes are available."
  - 'The "_fastdds_statistics_sample_datas" statistics topic collects the

    number of user''s data messages (or data fragments in case that the

    message size is large enough to require RTPS fragmentation) that have

    been sent by the user''s DataWriter to completely deliver a single

    sample. This topic does not apply to builtin (related to Discovery)

    and statistics DataWriters.'
  - '+------------------------------------------------+-----------------------------------------+------------+-------------+

    | Name                                           | Description                             | Values     | Default     |

    |================================================|=========================================|============|=============|

    | "<disable_heartbeat_piggyback>"                | See DisableHeartbeatPiggyback.          | "bool"     | "false"     |

    +------------------------------------------------+-----------------------------------------+------------+-------------+'
- source_sentence: 'The "enable_statistics_datawriter_with_profile()" method enables a DataWriter by searching a specific
    XML profile, requiring two parameters: the name of the XML profile and the name of the statistics topic to be enabled.'
  sentences:
  - '"enable_statistics_datawriter_with_profile()" method requires as

    parameters:'
  - "* **FIELDNAME**: is a reference to a field in the data-structure. The\n  dot \".\" is used to navigate through nested\
    \ structures. The number of\n  dots that may be used in a FIELDNAME is unlimited. The FIELDNAME can\n  refer to fields\
    \ at any depth in the data structure. The names of the\n  field are those specified in the IDL definition of the corresponding\n\
    \  structure."
  - "   * The TopicQos describing the behavior of the Topic. If the\n     provided value is \"TOPIC_QOS_DEFAULT\", the value\
    \ of the Default\n     TopicQos is used."
- source_sentence: '<summary> ParticipantResourceLimitsQos configures allocation limits and physical memory usage for internal
    resources, including locators, participants, readers, writers, send buffers, data limits, and content filter discovery
    information. '
  sentences:
  - "* \"max_properties\": Defines the maximum size, in octets, of the\n  properties data in the local or remote participant."
  - 'Log entries can be filtered upon consumption according to their

    Category component using regular expressions. Each time an entry is

    ready to be consumed, the category filter is applied using

    "std::regex_search()". To set a category filter, member function

    "Log::SetCategoryFilter()" is used:'
  - '"create_datawriter_with_profile()" will return a null pointer if there

    was an error during the operation, e.g. if the provided QoS is not

    compatible or is not supported. It is advisable to check that the

    returned value is a valid pointer.'
- source_sentence: <summary>The Fast DDS Statistics module enables data collection and publication using DDS topics, which
    can be activated by setting "-DFASTDDS_STATISTICS=ON" during CMake configuration.>
  sentences:
  - '

    "set_default_subscriber_qos()" member function also accepts the

    special value "SUBSCRIBER_QOS_DEFAULT" as input argument. This will

    reset the current default SubscriberQos to default constructed value

    "SubscriberQos()".'
  - '+------------------------------------------------------------------------------+-------------------------------------------+

    | Data Member Name                                                             | Type                                      |

    |==============================================================================|===========================================|

    | "last_instance_handle"                                                       | "InstanceHandle_t"                        |

    +------------------------------------------------------------------------------+-------------------------------------------+'
  - "Note:  Please refer to Statistics QoS Troubleshooting for any problems\n  related to the statistics module.\n"
- source_sentence: The transport layer provides communication services between DDS entities, using UDPv4, UDPv6, TCPv4, TCPv6,
    and SHM transports.
  sentences:
  - '* **TCPv4**: TCP communication over IPv4 (see TCP Transport).'
  - 'The following table shows the supported primitive types and their

    corresponding "TypeKind". The "TypeKind" is used to query the

    DynamicTypeBuilderFactory for the specific primitive DynamicType.'
  - "   @annotation MyAnnotation\n   {\n       long value;\n       string name;\n   };"
