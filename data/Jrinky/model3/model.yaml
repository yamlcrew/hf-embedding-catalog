  - As followers on Twitter and FB probably well know I’ve been up to more than a spot of preserving of late. It’s my latest
    addiction, as if I need any more of those. My Dad’s the King of Jams, Chutneys and Pickles and I have a feeling he’s passed
    his enthusiastic genes for it on to me!. Which is great, but time consuming. Many an evening has been spent peeling, dicing,
    de-stoning, chopping, stirring, testing, sterilising and jarring. And then obviously the tasting. And all the crackers,
    bread and cheese to go with it!. I rarely get to bed much before midnight on my chutneying nights. And to be honest my
    cupboards are now fit to bursting with so many goodies, but at least I have christmas presents totally nailed this year.
    My Dad’s been making Hedgerow Chutney for years, and it happens to be everyone’s favourite of all his chutney recipes
    (and he makes quite a number!). Each autumn he takes a long walk around the field at the back of his house in Herefordshire
    picking all the freebie hedgerow goodies he can find and transforms them into this marvellously fruitful chutney. There’s
    always plenty of damsons, bullaces, sloes, blackberries and a few elderberries. Plus pears or apples for smoothing and
    bulking out. We don’t have quite the same fruit in our hedgerows in France but I thought I’d make my own French version
    picking the fruit from our garden and nearby tracks and lanes, managing to find plenty of figs, greengages, plums, pears,
    blackberries and sloes just before the season finished a couple of weeks ago. We’ve elderberries here too but they were
    way past their best by the time I got into full chutney mode. There’s no escaping how time consuming and labourious chutney
    making can be, especially when using so much fruit that needs hefty preparatory work. I realise now why it’s a hobby generally
    taken up by retired folk. But the results are so worth it, if you can spare it set aside a whole evening in the kitchen
    and wile away the hours getting lost in music or the radio or even catching up on a few programmes on You Tube.
