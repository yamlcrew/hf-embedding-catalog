  - 'Roger Mason may refer to:


    Roger Mason (baseball) (born 1958), American baseball player

    Roger Mason (geologist) (born 1941), discoverer of Ediacaran fossils

    Roger Mason Jr. (born 1980), American basketball player

    Roger Mason (musician), Australian keyboardist

    L. Roger Mason, Jr., former assistant director of National Intelligence for Systems and Resource Analyses'
  - 'Timetabled passenger services on both lines had ceased by the end of February 1959. Shipping

    The Bourne-Morton Canal or Bourne Old Eau connected the town to the sea in Roman times. Until the mid-19th century, the
    present Bourne Eau was capable of carrying commercial boat traffic from the Wash coast and Spalding. This resulted from
    the investment following the Bourne Navigation Act of 1780. Passage became impossible once the junction of the Eau and
    the River Glen was converted from gates to a sluice in 1860. Media

    Local news and television programmes are provided by BBC Yorkshire and Lincolnshire and ITV Yorkshire. Television signals
    are received from the Belmont TV transmitter, the Waltham TV transmitter can also be received which broadcast BBC East
    Midlands and ITV Central programmes. Local radio stations are BBC Radio Lincolnshire, Greatest Hits Radio Lincolnshire
    and Lincs FM. The town''s local newspapers are Bourne Local  and Stamford Mercury. Sport

    Bourne Town Football Club plays football in the United Counties Football League, whilst Bourne Cricket Club plays in the
    Lincolnshire ECB Premier League. These teams play their home games at the Abbey Lawn, a recreation ground privately owned
    by the Bourne United Charities. Motor sports


    The racing-car marques English Racing Automobiles (ERA) and British Racing Motors (BRM) were both founded in Bourne by
    Raymond Mays, an international racing driver and designer who lived in Bourne. The former ERA and BRM workshops in Spalding
    Road are adjacent to Eastgate House, the Mays'' family home in the town''s Eastgate. Landmarks


    There are currently 71 listed buildings in the parish of Bourne, the most important being Bourne Abbey and the Parish
    Church of St Peter and St Paul (1138), which is the only one scheduled Grade I. Notable people

    Bourne is reputedly the birthplace of Hereward the Wake (in about 1035), although the 12th-century source of this information,
    De Gestis Herwardi Saxonis, refers only to his father as being "of Bourne" and to the father''s house and retainers there.
    Robert Mannyng (1264–1340) is credited with putting the speech of the ordinary people of his time into recognisable form.
    He is better known as Robert de Brunne because of his long period of residence as a canon at Bourne Abbey. There he completed
    his life''s work of popularising religious and historical material in a Middle English dialect that was easily understood
    at that time. William Cecil (1520–1598) became the first Lord Burghley after serving Queen Elizabeth I. He was born at
    a house in the centre of Bourne that is now the Burghley Arms. Dr William Dodd (1729–1777), was an Anglican clergyman,
    man of letters and forger. He was prosecuted, sentenced to death and publicly hanged at Tyburn in 1777. Charles Frederick
    Worth (1825–1895), son of a solicitor, lived at Wake House in North Street. He moved to Paris and became a renowned designer
    of women''s fashion and the founder of haute couture. The French government awarded him the Légion d''honneur. Sir George
    White (1840-1912), MP for North West Norfolk, a seat he held for twelve years until he died in 1912. He was knighted for
    public service in 1907.'
