    schools'' CSAP test scores were reported. One, which would have exempted scores from special education students, was killed
    in a Senate committee; the other, which would have exempted scores for students whose parents opt the students out of
    the test, was killed in a House committee at Casso''s request because of concerns that it would jeopardize federal school
    funding. Following the legislative session, Casso was present at the Colorado State Capitol during an incident in which
    state troopers shot and killed a mentally ill individual gunman targeting Gov. Bill Ritter. Casso observed the dead body
    and afterwards supported increased security, including metal detectors, for the state capitol building.'
