- source_sentence: What are some examples of postgraduate fellowships in the United States and Canada
  sentences:
  - "Fellowships as a training program\nFellowships may involve a short placement for capacity building, e.g., to get more\
    \ experience in government, such as the American Association for the Advancement of Science's fellowships and the American\
    \ Academy of Arts and Sciences Fellowship programs. Some institutions offer fellowships as a professional training program\
    \ as well as a financial grant, such as the Balsillie School of International Affairs, where tuition and other fees are\
    \ paid by the fellowship. Fellowships as a special membership grade\n\nFellows are often the highest grade of membership\
    \ of many professional associations or learned societies, for example, the Chartered Institute of Arbitrators, the Chartered\
    \ Governance Institute or Royal College of Surgeons. Lower grades are referred to as members (who typically share voting\
    \ rights with the fellows), or associates (who may or may not, depending on whether \"associate\" status is a form of\
    \ full membership). Additional grades of membership exist in, for example, the IEEE and the ACM. Fellowships of this type\
    \ can be awarded as a title of honor in their own right, e.g. the Fellowship of the Royal Society (FRS). Exclusive learned\
    \ societies such as the Royal Society have Fellow as the only grade of membership. Appointment as an honorary fellow in\
    \ a learned or professional society can be either to honour exceptional achievement or service within the professional\
    \ domain of the awarding body or to honour contributions related to the domain from someone who is professionally outside\
    \ it. Membership of the awarding body may or may not be a requirement. How a fellowship is awarded varies for each society,\
    \ but may typically involve some or all of these:\n A qualifying period in a lower grade\n Passing a series of examinations\n\
    \ Nomination by two existing fellows who know the applicant professionally\n Evidence of continued formal training post-qualification\n\
    \ Evidence of substantial achievement in the subject area\n Submission of a thesis or portfolio of works which will be\
    \ examined\n Election by a vote of the fellowship\n\nIn ancient universities\n\nAt the ancient universities of the University\
    \ of Oxford, the University of Cambridge, and Trinity College, Dublin, members of the teaching staff typically have two\
    \ affiliations: one as a reader, lecturer, or other academic rank within a department of the university, as at other universities,\
    \ and a second affiliation as a fellow of one of the colleges of the university. The fellows, sometimes referred to as\
    \ university dons, form the governing body of the college. They may elect a council to handle day-to-day management."
  - If you are an enrolled domestic or international student studying a full degree program, you may be eligible to study
    overseas! We have over 70 partner institutions worldwide and the opportunities are endless. Visit our USC International
    and Study Overseas blog to learn more about the amazing experiences our students are having abroad.
  - 'The title (senior) fellow can also be bestowed to an academic member of staff upon retirement who continues to be affiliated
    to a university in the United Kingdom. The term teaching fellow or teaching assistant is used, in the United States and
    United Kingdom, in secondary school, high school and middle school setting for students or adults that assist a teacher
    with one or more classes. Medical fellowships


    In US medical institutions, a fellow refers to someone who has completed residency training (e.g. in internal medicine,
    pediatrics, general surgery, etc.) and is currently in a 1 to 3 year subspecialty training program (e.g. cardiology, pediatric
    nephrology, transplant surgery, etc.). Research fellowships


    As an academic position


    The title of research fellow may be used to denote an academic position at a university or a similar institution; it is
    roughly equivalent to the title of lecturer in the Commonwealth teaching career pathway. As a financial grant

    Research fellow may also refer to the recipient of academic financial grant or scholarship. For example, in Germany, institutions
    such as the Alexander von Humboldt Foundation offer research fellowship for postdoctoral research and refer to the holder
    as research fellows, while the award holder may formally hold a specific academic title at their home institution (e.g.,
    Privatdozent). These are often shortened to the name of the programme or organization, e.g. Dorothy Hodgkin Fellow rather
    than Dorothy Hodgkin Research Fellow, except where this might cause confusion with another fellowship, (e.g. Royal Society
    University Research Fellowship.)'
  - "In the context of graduate school in the United States and Canada, a fellow is a recipient of a postgraduate fellowship.\
    \ Examples include the NSF Graduate Research Fellowship, the DoD National Defense Science and Engineering Graduate Fellowship,\
    \ the DOE Computational Science Graduate Fellowship, the Guggenheim Fellowship, the Rosenthal Fellowship, the Frank Knox\
    \ Memorial Fellowship, the Woodrow Wilson Teaching Fellowship and the Presidential Management Fellowship. It is granted\
    \ to prospective or current students, on the basis of their academic or research achievements. In the UK, research fellowships\
    \ are awarded to support postdoctoral researchers such as those funded by the Wellcome Trust and the Biotechnology and\
    \ Biological Sciences Research Council (BBSRC). At ETH Zurich, postdoctoral fellowships support incoming researchers.\
    \ The MacArthur Fellows Program (aka \"genius grant\") as prestigious research fellowship awarded in the United States.\
    \ Fellowships as a training program\nFellowships may involve a short placement for capacity building, e.g., to get more\
    \ experience in government, such as the American Association for the Advancement of Science's fellowships and the American\
    \ Academy of Arts and Sciences Fellowship programs. Some institutions offer fellowships as a professional training program\
    \ as well as a financial grant, such as the Balsillie School of International Affairs, where tuition and other fees are\
    \ paid by the fellowship. Fellowships as a special membership grade\n\nFellows are often the highest grade of membership\
    \ of many professional associations or learned societies, for example, the Chartered Institute of Arbitrators, the Chartered\
    \ Governance Institute or Royal College of Surgeons. Lower grades are referred to as members (who typically share voting\
    \ rights with the fellows), or associates (who may or may not, depending on whether \"associate\" status is a form of\
    \ full membership). Additional grades of membership exist in, for example, the IEEE and the ACM. Fellowships of this type\
    \ can be awarded as a title of honor in their own right, e.g. the Fellowship of the Royal Society (FRS). Exclusive learned\
    \ societies such as the Royal Society have Fellow as the only grade of membership. Appointment as an honorary fellow in\
    \ a learned or professional society can be either to honour exceptional achievement or service within the professional\
    \ domain of the awarding body or to honour contributions related to the domain from someone who is professionally outside\
    \ it. Membership of the awarding body may or may not be a requirement. How a fellowship is awarded varies for each society,\
    \ but may typically involve some or all of these:\n A qualifying period in a lower grade\n Passing a series of examinations\n\
    \ Nomination by two existing fellows who know the applicant professionally\n Evidence of continued formal training post-qualification\n\
    \ Evidence of substantial achievement in the subject area\n Submission of a thesis or portfolio of works which will be\
    \ examined\n Election by a vote of the fellowship\n\nIn ancient universities\n\nAt the ancient universities of the University\
    \ of Oxford, the University of Cambridge, and Trinity College, Dublin, members of the teaching staff typically have two\
    \ affiliations: one as a reader, lecturer, or other academic rank within a department of the university, as at other universities,\
    \ and a second affiliation as a fellow of one of the colleges of the university. The fellows, sometimes referred to as\
    \ university dons, form the governing body of the college. They may elect a council to handle day-to-day management. All\
    \ fellows are entitled to certain privileges within their colleges, which may include dining at High Table (free of charge)\
    \ and possibly the right to a room in college (free of charge). At Cambridge, retired academics may remain fellows. At\
    \ Oxford, however, a Governing Body fellow would normally be elected a fellow emeritus and would leave the Governing Body\
    \ upon his or her retirement. Distinguished old members of the college, or its benefactors and friends, might also be\
    \ elected 'Honorary Fellow', normally for life; but beyond limited dining rights this is merely an honour. Most Oxford\
    \ colleges have 'Fellows by Special Election' or 'Supernumerary Fellows', who may be members of the teaching staff, but\
    \ not necessarily members of the Governing Body. Some senior administrators of a college such as bursars are made fellows,\
    \ and thereby become members of the governing body, because of their importance to the running of a college."
- source_sentence: What kind of plants or decorations are described as popular, fresh, and plentiful in the garden at this
    time of year
  sentences:
  - Enjoy the beautiful scent of gardenia, rosemary, and lavender from your garden. Hurry this will not last.
  - Things have been given the opportunity to grow whichever they want but not out of neglect per se. Somehow it adds whimsy
    and mystery to the courtyard.
  - I thought it might be fun to show how this garden goes though the season. The perennials will be the fastest to clean
    up.. clear out the pathways, and bed them down well.
  - I'm not surprised that they are so popular, they are fresh, green, with the jolly berries AND plentiful in the garden,
    this time of year, and also, so very decorative. I am trying to use as little light and dof as possible, a challenge that
    I love.
- source_sentence: When was the Santa Venera church in Avola constructed
  sentences:
  - The dome collapsed in the earthquake of 1848, and was not reconstructed until 1962 by the engineer Pietro Lojacono. The
    decorated three story facade, flanked by volutes and obelisks, houses a statue of Saint Venera, patron of Avola, above
    the central portal.
  - 'Santa Venera is a Baroque style church located on Piazza Teatro in the town of Avola, province of Siracusa, region of
    Sicily, Italy. History and description

    Construction of a church at the site took place from 1713-1715 using designs attributed to Michelangelo Alessi.'
  - 'The Saint Bavo Church (Dutch: Sint-Bavokerk, Sint-Baafskerk) is a Dutch Reformed church building in Aardenburg, Netherlands.
    The church was founded in 959 by monks of the Saint Bavo''s Abbey in Ghent. Due to a rise in population this small church
    was replaced by a Romanesque church which burned down in 1202. In 1220 the current tower, nave and transept were built.'
  - The decorated three story facade, flanked by volutes and obelisks, houses a statue of Saint Venera, patron of Avola, above
    the central portal. The interior has three naves.
- source_sentence: What is the last dream the speaker mentions
  sentences:
  - Have you ever felt like the dreams you had have never become reality? Have you ever felt like you need someone to spark
    the flame for you
  - I'm very new to this, so I'm not sure what I'm doing with the technical side of things. Please bear with me if I've got
    anything wrong. "Night Thoughts And Dreams" is the first thing I've written in about two years. I used to write all the
    time, but then I just stopped, however "Sherlock" and Benedict Cumberbatch have inspired me to have another go.
  - I had a fantastic phone conversation with my brother today. I also had a nightmare where a man pulled off his skin like
    a shirt.
  - They don't bury me without my uniform." "My last dream is to be in Cooperstown-to be with those guys.
- source_sentence: What is the description of the Myrmecoleon and what are its two interpretations
  sentences:
  - 'The stone lies at the bottom of the sea and comes to life early in the morning. When it rises from its resting-place
    to the surface of the sea, it opens its mouth and takes in some heavenly dew, and the rays of the sun shine around it;
    thus there grows within the stone a most precious, shining pearl indeed, conceived from the heavenly dew and given lustre
    by the rays of the sun." Interpretations


    There are two interpretations of what a Myrmecoleon is. In one version, the antlion is so called because it is the "lion
    of ants", a large ant or small animal that hides in the dust and kills ants. In the other version, it is a beast that
    is the result of a mating between a lion and an ant. It has the face of a lion and the body of an ant, with each part
    having its appropriate nature. Because the lion part will only eat meat and the ant part can only digest grain, the ant-lion
    starves.'
  - It is found in Medieval bestiaries such as the Hortus Sanitatis of Jacob Meydenbach. It is also referenced in some sources
    as a Formicaleon (Antlion), Formicaleun or Mirmicioleon.
  - Microdiprion is a genus of sawflies belonging to the family Diprionidae.
  - Macrodon is a genus of marine ray-finned fishes belonging to the family Sciaenidae, the drums and croakers.
