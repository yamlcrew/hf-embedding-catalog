- source_sentence: What are the factors that influence the treatment and healing of equine lameness
  sentences:
  - 'Masterkraft may refer to:


    Masterkraft (producer), a record producer

    MSTRKRFT, a Canadian electronic music group'
  - 'The treatment of equine lameness is a complex subject. Lameness in horses has a variety of causes, and treatment must
    be tailored to the type and degree of injury, as well as the financial capabilities of the owner. Treatment may be applied
    locally, systemically, or intralesionally, and the strategy for treatment may change as healing progresses. The end goal
    is to reduce the pain and inflammation associated with injury, to encourage the injured tissue to heal with normal structure
    and function, and to ultimately return the horse to the highest level of performance possible following recovery. The
    process of healing


    Bone


    Bone heals by formation of a callus over the defective area. Speed and quality of healing is directly related to the blood
    supply and fracture stability. Rest is required immediately following injury to reduce movement of the fracture site.
    Stability may be improved through use of surgical implants or casting, depending on the location of extent of the fracture.
    Shock wave therapy is sometimes employed in the case of splint bone fracture or stress fractures to the cannon bones,
    to improve blood flow to the area. Fractures within a joint, such as chip fractures in the knee, hock, or fetlock, require
    arthroscopic surgery to prevent secondary arthritis of that joint. In some cases, the callus may place pressure on surrounding
    soft tissue structures. The callus of a splint bone fracture can push on the adjacent suspensory ligament, leading to
    lameness from secondary suspensory desmitis. Treatment usually involves the removal of the offending callus. On average,
    bone heals better than soft tissue. It requires less time to heal and, unlike soft tissue which is always weaker after
    healing, bone heals to 100% strength. However, fracture healing in horses is complicated by their size, flightiness, and
    desire to stand. Horses are at risk of re-injury of the fracture site, especially when trying to rise after lying down,
    or when recovering from anesthesia following fracture repair. Forced recumbency is not an option for horses, making healing
    more difficult. Weight bearing on a single front or hind limb increases the likelihood of support limb laminitis. Additionally,
    the cost of casting or surgical fixation makes treatment financially unattainable for some owners. While limb fractures
    are no longer a death-sentence for horses, it is still considered a very serious injury. In general, a horse is more likely
    to survive if it is small in stature and has a good temperament that will tolerate the months of inactivity required for
    healing. Fractures that are open, comminuted (very fragmented), or located higher on the limb tend to have a poorer prognosis.
    Synovial joints

    Lameness is most commonly associated with injury to synovial joints, or those joints containing articular cartilage, a
    joint capsule, and a synovial membrane. Joint disease may affect the joint capsule and synovial membrane, articular cartilage,
    subchondral bone (the bone underneath the cartilage), menisci, or any ligaments associated with the joint. Damage to any
    of these tissues leads to inflammation, which is especially problematic in the joint. While degeneration of articular
    cartilage is a common disease process in working animals, resulting in osteoarthritis, cartilage is aneural (does not
    contain nerves) and does not produce pain. Pain associated with osteoarthritis is secondary to joint capsule pain, due
    to joint distention and reduced range of motion, or to pain from the underlying bone, which may become damaged following
    erosion of the articular cartilage. Inflammatory products, such as inflammatory mediators and cytokines, damage articular
    cartilage and have been shown to weaken intra-articular ligaments. Therefore, treatment of joint disease should not only
    address the primary injury producing inflammation, but also the inflammatory cycle that leads to further tissue damage.
    Cryotherapy, joint lavage, systemic anti-inflammatories, or intra-articular medications are used to reduce joint inflammation.
    In the case of severe joint pathology such as an osteochondral chip, intra-articular fracture, osteochondritis dissecans
    lesion, or ligamentous or meniscal injury, arthroscopy may be required to ensure normal function of that joint. Debris
    within the joint, such as from a chip fracture, can cause long term damage to the synovium and articular cartilage leading
    to osteoarthritis, and is therefore best removed. Following acute injury, joints often benefit from specialized physical
    therapy, such as swimming, to prevent the loss of range of motion associated with joint capsule fibrosis. Treatment of
    joint cartilage injury is difficult and often unrewarding. Partial-thickness defects do not heal. The body will try to
    repair full-thickness cartilage defects using scar tissue or fibrocartilage, both of which are poor substitutes for normal,
    healthy articular cartilage. Current treatment includes arthroscopy-produced microfratures within the subchondral plate.
    These microfractures encourage an inflammatory response within the defect, which recruits stem cells to the area. Unfortunately,
    these cells differentiate into fibrocartilage, rather than normal joint (hyaline) cartilage, leading to inferior tissue
    repair at the site of injury. Bone marrow aspirate concentrate (BMAC) has shown some benefits when grafted into the area
    following microtrauma. However, the primary treatment for degenerative joint disease involves reducing the inflammatory
    process that is known to accelerate articular cartilage degeneration. Tendon and ligament


    Tendon is primarily composed of elastic type I collagen. However, mature tendon contains cells that have a limited ability
    to regenerate. Following injury, tendon lays down type III collagen, or scar tissue, which is stronger than type I collagen
    but stiffer and less-elastic. This makes it less distensible and more likely to re-injure when the horse begins to stretch
    the tendon during strenuous work. Certain treatments may improve the final tendon fiber quality, and subsequently increase
    the likelihood that the horse will return to full performance post-injury. Healing of soft tissue injury is often monitored
    using ultrasound to assess the lesion size and fiber pattern. Monitoring soft tissue injury with ultrasound allows for
    a more scientific determination of when to introduce exercise back into the horse''s rehabilitation program, and for quick
    intervention should the injury worsen. Recently, a new ultrasound technique called color Doppler ultrasonography has been
    used to assess equine tendon injuries. Color Doppler measures the degree of blood flow to a lesion, allowing for more
    accurate assessment of healing. Rest and hand-walking

    Rest is almost always recommended for treatment of lameness because it reduces forces placed on damaged tissue, allowing
    the normal process of healing to occur. Type and severity of injury determines the duration and degree of rest required.
    Aggressive limitations of activity may be required in cases of fracture. Horses are kept tied for the several-month duration
    of healing, to prevent them from lying down and potentially re-injuring the bone while trying to stand. In other cases,
    rest may be contraindicated. Animals with a history of upward fixation of the patella, polysaccharide storage myopathy,
    and equine recurrent rhabdomyolysis are often best kept on a schedule of regular exercise. Rest may be counterproductive
    if the lameness is secondary to osteoarthritis. In this case, mild exercise improves joint mobility and lameness can worsen
    with confinement. Rest may vary from strict confinement (“stall rest”), to small paddock or pasture turnout, to reduction
    of exercise intensity. Horses are often unpredictable when on prolonged stall rest, which greatly increases the risk of
    re-injury when hand-walking is begun. Sedation or additional forms of restraint may be needed to help control the horse
    during this initial period of'
  - As we stand right now, our broadcasts resemble a mixture between a graduate-level college seminar and a JV football game
    with the volume turned down 11 notches. Everything the commentators narrate is an explanation simply of what is going
    on, not speculation as to why they are doing it. They simply state what an ejection means, what a particular whistle is
    for, or what the purpose was of taking a time out. There is no substance. If Water Polo hopes and expects to be a household
    name, or at least something that households want on their television instead of the Wednesday Bowling Championships, then
    we need to institute a change. Most broadcasts are viewed by Water Polo fans…fans that already understand the game and
    the rules. We don’t need to be spoken to like a freshman college student who’s learning algebra for the first time. Most
    of us have already done that, and I feel confident in claiming that no one cares to do it again, especially not for entertainment.
    Production and entertainment value are key to the growth and expansion of any sport, especially Water Polo. Invite a color
    commentator that knows the game well enough to look for the nuances in the action.
- source_sentence: What architectural features make Rosslyn Chapel unique
  sentences:
  - 'Star Wars: Galaxy’s Edge may not officially open until the end of June, but for some fans, it could happen even sooner.'
  - Visual artist Megan Jonas painted urban Phoenix landscapes, and musician Jordan Ignacio composed music to accompany the
    images. Director Joshua J. Provost is an Arizona native and explores how the artists are inspired, allowing them to express
    their creative process through animation and sound.
  - 'In 1736, James St. Clair worked to restore the building to its former state. Since then, the Earls of St. Clair have
    worked to keep the building in good condition. There are a few intersting things to mention about Rosslyn Chapel. First,
    the town Roslin was founded as a home for the stone masons who worked on the original church. This is the same Roslin
    where scientists produced the first cloned animal, Dolly the sheep, in 1996. Secondly, the chapel''s design is quite eccentric.
    There are 32 different arch designs, which is strange enough, and some are even hollow. There are numerous carvings, including
    the "Dance of Death" motif, Abraham about to sacrifice Isaac, Samson destroying Philistines, David killing a lion, the
    Prodigal son, the Crucifixion, and scenes of the St. Clairs. The building is oriented east-west:

    marked out by the solar ray, according to the ancient tradition. A geometrical figure is usually used to regulate the
    proportions, and a double equilateral triangle is used in Rosslyn.Then there is the case of the Apprentice Pillar and
    its possible significance. The story associated with it is somewhat reminiscent of the Widow''s Son of the Freemasons,
    and there are numerous claims--unsubstantiated--which say that the Knights Templar worshipped here after escaping from
    the Continent, and that they brought the Holy Grail and hid it in the pillar. --The Rosslyn Chapel website

    All in all, an unusual place. Back to "R" | Back to JCE

    Mary Jones © 2003'
