- source_sentence: 'query: Cho một cấp số cộng có u1 = 3 và d = 2, hãy tìm u5.'
  sentences:
  - 'passage: # Cấp số cộng


    ## Định nghĩa

    **Cấp số cộng** là dãy số $(u_n)$ mà kể từ số hạng thứ hai, mỗi số hạng đều bằng số hạng đứng trước nó cộng với một số
    không đổi $d$.


    $$u_{n+1} = u_n + d \quad (\forall n \geq 1)$$


    Số $d$ được gọi là **công sai** của cấp số cộng.


    ## Số hạng tổng quát

    $$u_n = u_1 + (n-1)d$$


    Hoặc với số hạng bất kỳ: $u_n = u_k + (n-k)d$


    ## Tính chất cơ bản

    1. **Tính chất đặc trưng:** $u_{n+1} - u_n = d$ (hằng số)


    2. **Số hạng ở giữa:** $u_k = \frac{u_{k-p} + u_{k+p}}{2}$ với $p > 0$


    3. **Ba số hạng liên tiếp:** $a, b, c$ tạo thành CSC ⇔ $b = \frac{a+c}{2}$


    ## Ví dụ

    **Ví dụ 1:** Dãy số $2, 5, 8, 11, 14, ...$

    - Số hạng đầu: $u_1 = 2$

    - Công sai: $d = 5 - 2 = 3$

    - Số hạng tổng quát: $u_n = 2 + (n-1) \times 3 = 3n - 1$


    **Ví dụ 2:** Tìm số hạng thứ 20 của CSC có $u_3 = 7$ và $d = 4$.

    $u_{20} = u_3 + (20-3) \times 4 = 7 + 17 \times 4 = 75$


    ## Ứng dụng thực tế

    - **Tiết kiệm:** Mỗi tháng gửi thêm số tiền cố định

    - **Chuyển động thẳng đều:** Quãng đường trong các khoảng thời gian bằng nhau

    - **Lập kế hoạch sản xuất:** Tăng sản lượng đều đặn theo thời gian'
  - "passage: # Khoảng biến thiên và khoảng tứ phân vị\n\n## Khoảng biến thiên (Range)\n**Định nghĩa:** Khoảng biến thiên\
    \ là hiệu số giữa giá trị lớn nhất và nhỏ nhất:\n$$R = x_{\\max} - x_{\\min}$$\n\n**Với dữ liệu ghép nhóm:** $R = a_n\
    \ - a_1$ (cận trên lớp cuối - cận dưới lớp đầu)\n\n**Ưu điểm:** Đơn giản, dễ tính\n**Nhược điểm:** Chỉ phụ thuộc vào 2\
    \ giá trị cực trị, nhạy cảm với outliers\n\n## Tứ phân vị\n**Định nghĩa:** Các giá trị chia dữ liệu đã sắp xếp thành 4\
    \ phần bằng nhau:\n- $Q_1$: 25% dữ liệu ≤ $Q_1$\n- $Q_2$: 50% dữ liệu ≤ $Q_2$ (trung vị)  \n- $Q_3$: 75% dữ liệu ≤ $Q_3$\n\
    \n## Công thức tính tứ phân vị (dữ liệu ghép nhóm)\nVới $n$ quan sát, vị trí tứ phân vị thứ $k$: $\\frac{kn}{4}$\n\n$$Q_k\
    \ = L + \\frac{\\frac{kn}{4} - F}{f} \\times h$$\n\nTrong đó:\n- $L$: cận dưới lớp chứa $Q_k$\n- $F$: tần số tích lũy\
    \ trước lớp chứa $Q_k$  \n- $f$: tần số lớp chứa $Q_k$\n- $h$: độ rộng lớp\n\n## Khoảng tứ phân vị\n$$IQR = Q_3 - Q_1$$\n\
    \n**Ý nghĩa:** Đo độ phân tán của 50% dữ liệu ở giữa, ít bị ảnh hưởng bởi outliers."
  - "passage: # Tổng n số hạng đầu của cấp số cộng\n\n## Công thức tổng\nCho cấp số cộng $(u_n)$ với số hạng đầu $u_1$ và\
    \ công sai $d$.\n\n**Công thức 1:** $S_n = \\frac{n}{2}[2u_1 + (n-1)d]$\n\n**Công thức 2:** $S_n = \\frac{n(u_1 + u_n)}{2}$\n\
    \n**Công thức 3:** $S_n = nu_1 + \\frac{n(n-1)}{2}d$\n\n## Tính chất của tổng\n1. $S_n - S_{n-1} = u_n$ (với $n \\geq\
    \ 2$)\n\n2. Nếu $S_n = an^2 + bn$ thì dãy là CSC với:\n   - $u_1 = a + b$\n   - $d = 2a$\n\n## Ví dụ tính toán\n**Ví dụ\
    \ 1:** Tính tổng 15 số hạng đầu của CSC: $3, 7, 11, 15, ...$\n\n**Lời giải:**\n- $u_1 = 3$, $d = 4$\n- $S_{15} = \\frac{15}{2}[2\
    \ \\times 3 + (15-1) \\times 4] = \\frac{15}{2}[6 + 56] = 465$\n\n**Ví dụ 2:** Tìm $n$ biết tổng $n$ số hạng đầu của CSC\
    \ có $u_1 = 2$, $d = 3$ là $S_n = 77$.\n\n**Lời giải:**\n$77 = \\frac{n}{2}[2 \\times 2 + (n-1) \\times 3] = \\frac{n(4\
    \ + 3n - 3)}{2} = \\frac{n(3n + 1)}{2}$\n\n$154 = n(3n + 1) = 3n^2 + n$\n\n$3n^2 + n - 154 = 0$\n\nGiải được $n = 7$ (loại\
    \ nghiệm âm)\n\n## Bài toán thực tế\nMột công ty kế hoạch tăng lương cho nhân viên theo CSC:\n- Năm đầu: 15 triệu/năm\
    \  \n- Mỗi năm tăng: 2 triệu/năm\n\nTính tổng lương 10 năm đầu:\n$S_{10} = \\frac{10}{2}[2 \\times 15 + (10-1) \\times\
    \ 2] = 5 \\times 48 = 240$ triệu đồng"
