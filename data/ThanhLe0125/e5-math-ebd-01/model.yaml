  - source_sentence: 'query: Cho một cấp số cộng có u1 = 3 và d = 2, hãy tìm u5.'
    sentences:
    - 'passage: # Cấp số cộng


      ## Định nghĩa

      **Cấp số cộng** là dãy số $(u_n)$ mà kể từ số hạng thứ hai, mỗi số hạng đều bằng số hạng đứng trước nó cộng với một
      số không đổi $d$.


      $$u_{n+1} = u_n + d \quad (\forall n \geq 1)$$


      Số $d$ được gọi là **công sai** của cấp số cộng.


      ## Số hạng tổng quát

      $$u_n = u_1 + (n-1)d$$


      Hoặc với số hạng bất kỳ: $u_n = u_k + (n-k)d$


      ## Tính chất cơ bản

      1. **Tính chất đặc trưng:** $u_{n+1} - u_n = d$ (hằng số)


      2. **Số hạng ở giữa:** $u_k = \frac{u_{k-p} + u_{k+p}}{2}$ với $p > 0$


      3. **Ba số hạng liên tiếp:** $a, b, c$ tạo thành CSC ⇔ $b = \frac{a+c}{2}$


      ## Ví dụ

      **Ví dụ 1:** Dãy số $2, 5, 8, 11, 14, ...$

      - Số hạng đầu: $u_1 = 2$

      - Công sai: $d = 5 - 2 = 3$

      - Số hạng tổng quát: $u_n = 2 + (n-1) \times 3 = 3n - 1$


      **Ví dụ 2:** Tìm số hạng thứ 20 của CSC có $u_3 = 7$ và $d = 4$.

      $u_{20} = u_3 + (20-3) \times 4 = 7 + 17 \times 4 = 75$


      ## Ứng dụng thực tế

      - **Tiết kiệm:** Mỗi tháng gửi thêm số tiền cố định

      - **Chuyển động thẳng đều:** Quãng đường trong các khoảng thời gian bằng nhau

      - **Lập kế hoạch sản xuất:** Tăng sản lượng đều đặn theo thời gian'
    - "passage: # Khoảng biến thiên và khoảng tứ phân vị\n\n## Khoảng biến thiên (Range)\n**Định nghĩa:** Khoảng biến thiên\
      \ là hiệu số giữa giá trị lớn nhất và nhỏ nhất:\n$$R = x_{\\max} - x_{\\min}$$\n\n**Với dữ liệu ghép nhóm:** $R = a_n\
      \ - a_1$ (cận trên lớp cuối - cận dưới lớp đầu)\n\n**Ưu điểm:** Đơn giản, dễ tính\n**Nhược điểm:** Chỉ phụ thuộc vào\
      \ 2 giá trị cực trị, nhạy cảm với outliers\n\n## Tứ phân vị\n**Định nghĩa:** Các giá trị chia dữ liệu đã sắp xếp thành\
      \ 4 phần bằng nhau:\n- $Q_1$: 25% dữ liệu ≤ $Q_1$\n- $Q_2$: 50% dữ liệu ≤ $Q_2$ (trung vị)  \n- $Q_3$: 75% dữ liệu ≤\
      \ $Q_3$\n\n## Công thức tính tứ phân vị (dữ liệu ghép nhóm)\nVới $n$ quan sát, vị trí tứ phân vị thứ $k$: $\\frac{kn}{4}$\n\
      \n$$Q_k = L + \\frac{\\frac{kn}{4} - F}{f} \\times h$$\n\nTrong đó:\n- $L$: cận dưới lớp chứa $Q_k$\n- $F$: tần số tích\
      \ lũy trước lớp chứa $Q_k$  \n- $f$: tần số lớp chứa $Q_k$\n- $h$: độ rộng lớp\n\n## Khoảng tứ phân vị\n$$IQR = Q_3\
      \ - Q_1$$\n\n**Ý nghĩa:** Đo độ phân tán của 50% dữ liệu ở giữa, ít bị ảnh hưởng bởi outliers."
    - "passage: # Tổng n số hạng đầu của cấp số cộng\n\n## Công thức tổng\nCho cấp số cộng $(u_n)$ với số hạng đầu $u_1$ và\
      \ công sai $d$.\n\n**Công thức 1:** $S_n = \\frac{n}{2}[2u_1 + (n-1)d]$\n\n**Công thức 2:** $S_n = \\frac{n(u_1 + u_n)}{2}$\n\
      \n**Công thức 3:** $S_n = nu_1 + \\frac{n(n-1)}{2}d$\n\n## Tính chất của tổng\n1. $S_n - S_{n-1} = u_n$ (với $n \\geq\
      \ 2$)\n\n2. Nếu $S_n = an^2 + bn$ thì dãy là CSC với:\n   - $u_1 = a + b$\n   - $d = 2a$\n\n## Ví dụ tính toán\n**Ví\
      \ dụ 1:** Tính tổng 15 số hạng đầu của CSC: $3, 7, 11, 15, ...$\n\n**Lời giải:**\n- $u_1 = 3$, $d = 4$\n- $S_{15} =\
      \ \\frac{15}{2}[2 \\times 3 + (15-1) \\times 4] = \\frac{15}{2}[6 + 56] = 465$\n\n**Ví dụ 2:** Tìm $n$ biết tổng $n$\
      \ số hạng đầu của CSC có $u_1 = 2$, $d = 3$ là $S_n = 77$.\n\n**Lời giải:**\n$77 = \\frac{n}{2}[2 \\times 2 + (n-1)\
      \ \\times 3] = \\frac{n(4 + 3n - 3)}{2} = \\frac{n(3n + 1)}{2}$\n\n$154 = n(3n + 1) = 3n^2 + n$\n\n$3n^2 + n - 154 =\
      \ 0$\n\nGiải được $n = 7$ (loại nghiệm âm)\n\n## Bài toán thực tế\nMột công ty kế hoạch tăng lương cho nhân viên theo\
      \ CSC:\n- Năm đầu: 15 triệu/năm  \n- Mỗi năm tăng: 2 triệu/năm\n\nTính tổng lương 10 năm đầu:\n$S_{10} = \\frac{10}{2}[2\
      \ \\times 15 + (10-1) \\times 2] = 5 \\times 48 = 240$ triệu đồng"
  - source_sentence: 'query: Bước thứ ba trong phương pháp giải bài toán tối ưu thực tế bằng đạo hàm là gì?'
    sentences:
    - "passage: # Tính toán tứ phân vị - Ví dụ thực hành\n\n## Ví dụ với dữ liệu rời rạc\nĐiểm thi của 10 học sinh: 5, 6,\
      \ 7, 7, 8, 8, 8, 9, 9, 10\n\n**Tìm vị trí:**\n- $Q_1$: vị trí $\\frac{10}{4} = 2.5$ → trung bình của số thứ 2 và 3\n\
      - $Q_2$: vị trí $\\frac{10}{2} = 5$ → trung bình của số thứ 5 và 6  \n- $Q_3$: vị trí $\\frac{3 \\times 10}{4} = 7.5$\
      \ → trung bình của số thứ 7 và 8\n\n**Kết quả:**\n- $Q_1 = \\frac{6 + 7}{2} = 6.5$\n- $Q_2 = \\frac{8 + 8}{2} = 8$\n\
      - $Q_3 = \\frac{8 + 9}{2} = 8.5$\n- $IQR = 8.5 - 6.5 = 2$\n\n## Ví dụ với dữ liệu ghép nhóm\nCân nặng 100 học sinh:\n\
      \n| Lớp (kg)    | Tần số | Tần số tích lũy |\n|-------------|--------|-----------------|\n| [40; 45)    | 8      | 8\
      \               |\n| [45; 50)    | 22     | 30              |\n| [50; 55)    | 35     | 65              |\n| [55; 60)\
      \    | 25     | 90              |\n| [60; 65)    | 10     | 100             |\n\n**Tính $Q_1$ (vị trí 25):** Nằm trong\
      \ [45; 50) vì 30 ≥ 25\n$$Q_1 = 45 + \\frac{25 - 8}{22} \\times 5 = 45 + 3.86 = 48.86$$\n\n**Tính $Q_3$ (vị trí 75):**\
      \ Nằm trong [55; 60) vì 90 ≥ 75  \n$$Q_3 = 55 + \\frac{75 - 65}{25} \\times 5 = 55 + 2 = 57$$\n\n**Kết quả:** $IQR =\
      \ 57 - 48.86 = 8.14$ kg"
    - 'passage: # Khảo sát hàm đa thức bậc ba


      ## Dạng tổng quát

      $f(x) = ax^3 + bx^2 + cx + d$ với $a \neq 0$


      ## Đặc điểm chung

      - Tập xác định: $D = \mathbb{R}$

      - Không có tiệm cận

      - $\lim_{x \to +\infty} f(x) = +\infty$ nếu $a > 0$, $-\infty$ nếu $a < 0$

      - $\lim_{x \to -\infty} f(x) = -\infty$ nếu $a > 0$, $+\infty$ nếu $a < 0$


      ## Số cực trị

      $f''(x) = 3ax^2 + 2bx + c$

      $\Delta = 4b^2 - 12ac$


      - Nếu $\Delta > 0$: có 2 cực trị

      - Nếu $\Delta \leq 0$: đồng biến trên $\mathbb{R}$


      ## Ví dụ

      Khảo sát $f(x) = x^3 - 3x^2 + 2$.


      **Lời giải:**

      - TXĐ: $D = \mathbb{R}$

      - $f''(x) = 3x^2 - 6x = 3x(x-2)$

      - $f''(x) = 0 \Leftrightarrow x = 0$ hoặc $x = 2$

      - Cực đại: $(0; 2)$, Cực tiểu: $(2; -2)$

      - Giao trục tung: $(0; 2)$

      - Giao trục hoành: giải $x^3 - 3x^2 + 2 = 0$


      Bảng biến thiên:

      $x$: $-\infty$ → $0$ → $2$ → $+\infty$

      $f''(x)$: $+$ → $0$ → $-$ → $0$ → $+$

      $f(x)$: $-\infty$ ↗ $2$ ↘ $-2$ ↗ $+\infty$'
    - 'passage: # Ứng dụng đạo hàm giải bài toán tối ưu thực tế


      ## Phương pháp giải tổng quát

      **Bước 1:** Phân tích bài toán

      - Xác định đại lượng cần tối ưu (tối đa/tối thiểu)

      - Xác định các ràng buộc thực tế


      **Bước 2:** Thiết lập hàm mục tiêu

      - Chọn biến độc lập $x$

      - Biểu diễn đại lượng cần tối ưu theo $x$: $f(x)$

      - Xác định miền xác định thực tế


      **Bước 3:** Tìm cực trị

      - Tính $f''(x)$ và giải $f''(x) = 0$

      - Kiểm tra điều kiện cực trị

      - So sánh giá trị tại các điểm tới hạn và biên


      **Bước 4:** Kết luận

      - Kiểm tra tính hợp lý của nghiệm

      - Diễn giải kết quả trong bối cảnh thực tế


      ## Lưu ý quan trọng

      - Chú ý điều kiện thực tế (độ dài dương, diện tích dương, etc.)

      - Kiểm tra nghiệm có nằm trong miền xác định không

      - Đơn vị phải phù hợp với thực tế'
  - source_sentence: 'query: Ý nghĩa của việc tìm nghiệm của phương trình f''(x) = 0?'
    sentences:
    - "passage: # Phương pháp tìm cực trị của hàm số\n\n## Quy trình tìm cực trị\n**Bước 1:** Tìm tập xác định của hàm số\n\
      **Bước 2:** Tính đạo hàm $f'(x)$\n**Bước 3:** Tìm nghiệm của phương trình $f'(x) = 0$ và các điểm mà $f'(x)$ không xác\
      \ định\n**Bước 4:** Lập bảng xét dấu $f'(x)$\n**Bước 5:** Kết luận về cực trị\n\n## Ví dụ minh họa\nTìm cực trị của\
      \ hàm số $f(x) = x^4 - 2x^2 + 1$.\n\n**Lời giải:**\nTập xác định: $D = \\mathbb{R}$\n$f'(x) = 4x^3 - 4x = 4x(x^2 - 1)\
      \ = 4x(x-1)(x+1)$\n$f'(x) = 0 \\Leftrightarrow x = -1, x = 0, x = 1$\n\nBảng xét dấu:\n- $x \\in (-\\infty; -1)$: $f'(x)\
      \ < 0$\n- $x \\in (-1; 0)$: $f'(x) > 0$  \n- $x \\in (0; 1)$: $f'(x) < 0$\n- $x \\in (1; +\\infty)$: $f'(x) > 0$\n\n\
      **Kết luận:**\n- $x = -1$: cực tiểu, $f(-1) = 0$\n- $x = 0$: cực đại, $f(0) = 1$\n- $x = 1$: cực tiểu, $f(1) = 0$"
    - "passage: # Phương pháp tìm giá trị lớn nhất và nhỏ nhất\n\n## Trên đoạn [a; b]\n**Bước 1:** Tìm các điểm $x_i$ trong\
      \ $(a; b)$ mà tại đó $f'(x_i) = 0$ hoặc $f'(x_i)$ không xác định\n**Bước 2:** Tính các giá trị $f(a)$, $f(b)$ và $f(x_i)$\n\
      **Bước 3:** So sánh để tìm giá trị lớn nhất và nhỏ nhất\n\n## Ví dụ\nTìm giá trị lớn nhất và nhỏ nhất của $f(x) = x^3\
      \ - 3x^2 + 2$ trên $[-1; 3]$.\n\n**Lời giải:**\n$f'(x) = 3x^2 - 6x = 3x(x - 2)$\n$f'(x) = 0 \\Leftrightarrow x = 0$\
      \ hoặc $x = 2$ (cả hai đều thuộc $(-1; 3)$)\n\nTính giá trị:\n- $f(-1) = -1 - 3 + 2 = -2$\n- $f(0) = 2$ \n- $f(2) =\
      \ 8 - 12 + 2 = -2$\n- $f(3) = 27 - 27 + 2 = 2$\n\n**Kết luận:**\n- $\\max_{[-1;3]} f(x) = 2$ tại $x = 0$ và $x = 3$\n\
      - $\\min_{[-1;3]} f(x) = -2$ tại $x = -1$ và $x = 2$\n\n## Trên khoảng hoặc nửa khoảng\n- Tìm cực trị trong khoảng\n\
      - Xét giới hạn tại các đầu mút\n- Kết luận về sự tồn tại"
    - "passage: # Tổ hợp\n\n## Định nghĩa\n**Tổ hợp chập $k$ của $n$ phần tử** là cách chọn $k$ phần tử từ $n$ phần tử mà\
      \ không quan tâm đến thứ tự.\n\n**Ký hiệu:** $C_n^k$ hoặc $\\binom{n}{k}$\n\n**Điều kiện:** $0 \\leq k \\leq n$\n\n\
      ## Công thức\n$$C_n^k = \\frac{A_n^k}{k!} = \\frac{n!}{k!(n-k)!}$$\n\n**Công thức Pascal:** $C_n^k = C_{n-1}^{k-1} +\
      \ C_{n-1}^k$\n\n## Tính chất cơ bản\n1. $C_n^0 = C_n^n = 1$\n2. $C_n^k = C_n^{n-k}$\n3. $C_n^1 = n$\n4. $C_n^2 = \\\
      frac{n(n-1)}{2}$\n\n## Ví dụ tính toán\n**Ví dụ 1:** Từ 10 học sinh, chọn 3 học sinh tham gia đội tuyển. Có bao nhiêu\
      \ cách?\n\n**Lời giải:** $C_{10}^3 = \\frac{10!}{3! \\times 7!} = \\frac{10 \\times 9 \\times 8}{3 \\times 2 \\times\
      \ 1} = 120$ cách.\n\n**Ví dụ 2:** Trong một lớp có 15 nam và 10 nữ. Chọn 5 người sao cho có đúng 3 nam và 2 nữ.\n\n\
      **Lời giải:** \n- Chọn 3 nam từ 15 nam: $C_{15}^3 = 455$ cách\n- Chọn 2 nữ từ 10 nữ: $C_{10}^2 = 45$ cách\n- Tổng cộng:\
      \ $455 \\times 45 = 20,475$ cách\n\n## Nhị thức Newton\n$$(a + b)^n = \\sum_{k=0}^{n} C_n^k a^{n-k} b^k$$\n\n**Ví dụ:**\
      \ $(x + 2)^4 = C_4^0 x^4 + C_4^1 x^3 \\cdot 2 + C_4^2 x^2 \\cdot 2^2 + C_4^3 x \\cdot 2^3 + C_4^4 \\cdot 2^4$\n$= x^4\
      \ + 8x^3 + 24x^2 + 32x + 16$\n\n## Phân biệt chỉnh hợp và tổ hợp\n- **Chỉnh hợp:** Quan tâm thứ tự (Ví dụ: Chọn và xếp\
      \ hạng)\n- **Tổ hợp:** Không quan tâm thứ tự (Ví dụ: Chọn thành viên nhóm)\n\n**Mối quan hệ:** $A_n^k = k! \\times C_n^k$"
