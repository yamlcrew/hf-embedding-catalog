    ## Đặc điểm chung

    - Tập xác định: $D = \mathbb{R}$

    - Không có tiệm cận

    - $\lim_{x \to +\infty} f(x) = +\infty$ nếu $a > 0$, $-\infty$ nếu $a < 0$

    - $\lim_{x \to -\infty} f(x) = -\infty$ nếu $a > 0$, $+\infty$ nếu $a < 0$


    ## Số cực trị

    $f''(x) = 3ax^2 + 2bx + c$

    $\Delta = 4b^2 - 12ac$


    - Nếu $\Delta > 0$: có 2 cực trị

    - Nếu $\Delta \leq 0$: đồng biến trên $\mathbb{R}$


    ## Ví dụ

    Khảo sát $f(x) = x^3 - 3x^2 + 2$.


    **Lời giải:**

    - TXĐ: $D = \mathbb{R}$

    - $f''(x) = 3x^2 - 6x = 3x(x-2)$

    - $f''(x) = 0 \Leftrightarrow x = 0$ hoặc $x = 2$

    - Cực đại: $(0; 2)$, Cực tiểu: $(2; -2)$

    - Giao trục tung: $(0; 2)$

    - Giao trục hoành: giải $x^3 - 3x^2 + 2 = 0$


    Bảng biến thiên:

    $x$: $-\infty$ → $0$ → $2$ → $+\infty$

    $f''(x)$: $+$ → $0$ → $-$ → $0$ → $+$

    $f(x)$: $-\infty$ ↗ $2$ ↘ $-2$ ↗ $+\infty$'
  - 'passage: # Ứng dụng đạo hàm giải bài toán tối ưu thực tế


