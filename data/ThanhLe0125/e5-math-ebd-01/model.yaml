  sentences:
  - "passage: # Phương pháp tìm giá trị lớn nhất và nhỏ nhất\n\n## Trên đoạn [a; b]\n**Bước 1:** Tìm các điểm $x_i$ trong\
    \ $(a; b)$ mà tại đó $f'(x_i) = 0$ hoặc $f'(x_i)$ không xác định\n**Bước 2:** Tính các giá trị $f(a)$, $f(b)$ và $f(x_i)$\n\
    **Bước 3:** So sánh để tìm giá trị lớn nhất và nhỏ nhất\n\n## Ví dụ\nTìm giá trị lớn nhất và nhỏ nhất của $f(x) = x^3\
    \ - 3x^2 + 2$ trên $[-1; 3]$.\n\n**Lời giải:**\n$f'(x) = 3x^2 - 6x = 3x(x - 2)$\n$f'(x) = 0 \\Leftrightarrow x = 0$ hoặc\
    \ $x = 2$ (cả hai đều thuộc $(-1; 3)$)\n\nTính giá trị:\n- $f(-1) = -1 - 3 + 2 = -2$\n- $f(0) = 2$ \n- $f(2) = 8 - 12\
    \ + 2 = -2$\n- $f(3) = 27 - 27 + 2 = 2$\n\n**Kết luận:**\n- $\\max_{[-1;3]} f(x) = 2$ tại $x = 0$ và $x = 3$\n- $\\min_{[-1;3]}\
    \ f(x) = -2$ tại $x = -1$ và $x = 2$\n\n## Trên khoảng hoặc nửa khoảng\n- Tìm cực trị trong khoảng\n- Xét giới hạn tại\
    \ các đầu mút\n- Kết luận về sự tồn tại"
  - "passage: # Vectơ trong không gian\n\n## Định nghĩa\n**Vectơ trong không gian** là đại lượng có độ lớn và hướng, được\
    \ biểu diễn bằng đoạn thẳng có hướng từ điểm đầu đến điểm cuối.\n\nVectơ $\\overrightarrow{AB}$:\n- Điểm đầu: $A$ \n-\
    \ Điểm cuối: $B$\n- Độ lớn: $|\\overrightarrow{AB}| = |AB|$\n- Hướng: từ $A$ đến $B$\n\n## Các loại vectơ đặc biệt\n**Vectơ\
    \ không:** $\\vec{0}$ có độ lớn bằng 0, không có hướng xác định\n\n**Vectơ đơn vị:** Có độ lớn bằng 1\n\n**Hai vectơ bằng\
    \ nhau:** $\\vec{a} = \\vec{b}$ nếu cùng độ lớn và cùng hướng\n\n**Hai vectơ đối nhau:** $\\vec{a} = -\\vec{b}$ nếu cùng\
    \ độ lớn nhưng ngược hướng\n\n## Điều kiện cùng phương\nHai vectơ $\\vec{a}$ và $\\vec{b}$ (với $\\vec{b} \\neq \\vec{0}$)\
    \ cùng phương khi tồn tại số thực $k$ sao cho $\\vec{a} = k\\vec{b}$.\n\n## Ứng dụng\n**Ba điểm thẳng hàng:** $A$, $B$,\
    \ $C$ thẳng hàng ⇔ $\\overrightarrow{AB}$ và $\\overrightarrow{AC}$ cùng phương\n\n**Bốn điểm đồng phẳng:** $A$, $B$,\
    \ $C$, $D$ đồng phẳng ⇔ $\\overrightarrow{AD}$ biểu diễn được qua $\\overrightarrow{AB}$ và $\\overrightarrow{AC}$"
  - 'passage: # Hoán vị và Chỉnh hợp


    ## Quy tắc nhân

    Nếu có $m$ cách làm việc A và $n$ cách làm việc B thì có $m \times n$ cách làm cả hai việc A và B.


    ## Hoán vị

    **Định nghĩa:** Hoán vị của $n$ phần tử là cách sắp xếp $n$ phần tử đó theo một thứ tự nhất định.


    **Công thức:** $P_n = n!$


    **Giai thừa:** $n! = 1 \times 2 \times 3 \times ... \times n$


    Quy ước: $0! = 1$


    ## Chỉnh hợp

    **Định nghĩa:** Chỉnh hợp chập $k$ của $n$ phần tử là cách sắp xếp $k$ phần tử được chọn từ $n$ phần tử theo một thứ tự
    nhất định.


    **Điều kiện:** $0 \leq k \leq n$


    **Công thức:** $A_n^k = \frac{n!}{(n-k)!}$


    **Khai triển:** $A_n^k = n(n-1)(n-2)...(n-k+1)$ ($k$ thừa số)


    ## Ví dụ minh họa

    **Ví dụ 1:** Có bao nhiêu cách sắp xếp 5 người ngồi quanh bàn tròn?


    **Lời giải:** Với bàn tròn, cố định 1 người, sắp xếp 4 người còn lại: $(5-1)! = 4! = 24$ cách.


    **Ví dụ 2:** Có 8 vận động viên chạy. Có bao nhiêu cách trao giải Nhất, Nhì, Ba?


    **Lời giải:** Chọn và sắp xếp 3 người từ 8 người: $A_8^3 = \frac{8!}{5!} = 8 \times 7 \times 6 = 336$ cách.


    **Ví dụ 3:** Có bao nhiêu số có 4 chữ số khác nhau được tạo từ các chữ số {1, 2, 3, 4, 5, 6}?


    **Lời giải:** $A_6^4 = 6 \times 5 \times 4 \times 3 = 360$ số.


    ## Lưu ý quan trọng

    - **Hoán vị:** Quan tâm đến thứ tự, sử dụng hết tất cả phần tử

    - **Chỉnh hợp:** Quan tâm đến thứ tự, chọn một phần phần tử

    - Luôn xác định rõ điều kiện bài toán (có lặp, không lặp, có ràng buộc gì không)'
