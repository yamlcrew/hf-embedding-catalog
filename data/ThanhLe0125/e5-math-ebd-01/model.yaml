      \ tích thống kê sâu, so sánh chính xác |\n\n## Hệ số biến thiên\n$$CV = \\frac{s}{\\bar{x}} \\times 100\\%$$\n\n**Ý\
      \ nghĩa:** So sánh mức độ phân tán tương đối giữa các bộ dữ liệu có đơn vị hoặc trung bình khác nhau.\n\n## Ví dụ so\
      \ sánh\n**Lớp A:** Điểm TB = 7.5, độ lệch chuẩn = 1.2, IQR = 1.8\n**Lớp B:** Điểm TB = 7.8, độ lệch chuẩn = 0.8, IQR\
      \ = 1.1\n\n**Phân tích:**\n- Lớp B có điểm trung bình cao hơn\n- Lớp B có độ phân tán thấp hơn (đồng đều hơn)\n- Hệ\
      \ số biến thiên: A = 16%, B = 10.3%\n\n**Kết luận:** Lớp B vừa có kết quả tốt hơn vừa đồng đều hơn.\n\n## Lựa chọn chỉ\
      \ số phù hợp\n- **Dữ liệu có outliers:** Dùng IQR\n- **So sánh nhiều nhóm:** Dùng hệ số biến thiên  \n- **Phân tích\
      \ chính xác:** Dùng độ lệch chuẩn\n- **Đánh giá nhanh:** Dùng khoảng biến thiên"
    - "passage: # Tính toán tứ phân vị - Ví dụ thực hành\n\n## Ví dụ với dữ liệu rời rạc\nĐiểm thi của 10 học sinh: 5, 6,\
      \ 7, 7, 8, 8, 8, 9, 9, 10\n\n**Tìm vị trí:**\n- $Q_1$: vị trí $\\frac{10}{4} = 2.5$ → trung bình của số thứ 2 và 3\n\
      - $Q_2$: vị trí $\\frac{10}{2} = 5$ → trung bình của số thứ 5 và 6  \n- $Q_3$: vị trí $\\frac{3 \\times 10}{4} = 7.5$\
      \ → trung bình của số thứ 7 và 8\n\n**Kết quả:**\n- $Q_1 = \\frac{6 + 7}{2} = 6.5$\n- $Q_2 = \\frac{8 + 8}{2} = 8$\n\
      - $Q_3 = \\frac{8 + 9}{2} = 8.5$\n- $IQR = 8.5 - 6.5 = 2$\n\n## Ví dụ với dữ liệu ghép nhóm\nCân nặng 100 học sinh:\n\
