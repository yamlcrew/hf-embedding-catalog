- source_sentence: A 24-year-old woman visits her physician to seek preconception advice. She is recently married and plans
    to have a child soon. Menses occur at regular 28-day intervals and last 5 days. She has sexual intercourse only with her
    husband and, at this time, they consistently use condoms for birth control. The patient consumes a well-balanced diet
    with moderate intake of meat and dairy products. She has no history of serious illness and takes no medications currently.
    She does not smoke or drink alcohol. The patient’s history reveals no birth defects or severe genetic abnormalities in
    the family. Physical examination shows no abnormalities. Pelvic examination indicates a normal vagina, cervix, uterus,
    and adnexa. To decrease the likelihood of fetal neural-tube defects in her future pregnancy, which of the following is
    the most appropriate recommendation for initiation of folic acid supplementation?
