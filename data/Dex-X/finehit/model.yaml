widgetData:
- source_sentence: How do I find out when I should write my examinations?
  sentences:
  - Information relating to examination timetables is available from the Examination Office and will be published on the official
    Institute Notice Board and the website.
  - If you find an error on your academic record, you should contact the Registration and Student Records Management Office
    immediately.
  - To request accommodations for a disability, you must submit documentation of the disability to the disability services
    office and meet with a disability services coordinator.
- source_sentence: What is the language of instruction at the Harare Institute of Technology?
  sentences:
  - English is the language of instruction.
  - Tracking international events and conference and strategically link them to HIT, internationalizing HIT programmes and
    activities, developing bouquet of events and activities for international visitors, helping affiliate, accredit HIT, staff
    and students to international bodies and associations, liaising with national bodies and promote Zimbabwean culture and
    symbols, serving as a point of contact for exchange students, staff and visitors, ensuring international programmes align
    to national programmes and symbols, helping affiliate HIT ethos to national art and culture, monitoring implementation
    of MoUs and MoAs, facilitation of international travel and visits, providing Institute departments with consular advice,
    ensuring HIT members get oriented to particular countries’ culture and services before departure, driving recruitment
    of foreign students and exchange programmes.
  - BFA 7206 is the course code for Financial Institutions Fraud, which is an elective course in the second semester of the
    program.
- source_sentence: What is the process for collecting a certificate?
  sentences:
  - The programme is designed such that on completion, graduates should be able to innovatively execute their professional
    role within prescribed and legislative parameters, demonstrate a critical understanding and application of quality assurance
    and radiation protection in Radiography, apply scientific knowledge and technical skills to perform Radiography procedures,
    plan, develop and apply total quality management appropriate to the Radiography context, apply management, entrepreneurial,
    education and research skills independently and function in a supervisory clinical governance and quality assurance capacity
    within the professional sector, demonstrate the ability to reflect in clinical practice, critically evaluate and adjust
    to current and new trends in Radiography, demonstrate capability to implement new knowledge and solve problems in varying
    contexts, and engage life-long learning and development in their profession.
  - The process involves clearing any dues to the Institute and providing valid identification documents.
  - A student can apply for change of programme within two weeks after commencement of lectures.
- source_sentence: How do I change my address or contact information?
  sentences:
  - Information Security & Assurance is a field that deals with the protection of information and information systems from
    unauthorized access, use, disclosure, disruption, modification, or destruction.
  - The Information and Communications Technology Services (ICTS) Department at HIT is responsible for providing and maintaining
    the Institute's IT infrastructure and services.
  - You can update your address or contact information through the online student portal or by contacting the Academic Registry.
- source_sentence: What is the difference between Cloud Computing and Information Security & Assurance?
  sentences:
  - The fourth semester focuses on courses such as Research Project, Clinical Practice IV, and Seminar.
  - Cloud Computing is focused on the design, implementation, and management of cloud services, while Information Security
    & Assurance is focused on the protection of information by mitigating information risks and ensuring availability, privacy,
    and integrity of data.
  - The Applied Research Methods course is designed to equip students with the skills and knowledge necessary to conduct research
    in chemical engineering process and plant design.
