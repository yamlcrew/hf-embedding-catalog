- source_sentence: 수익성을 높이려면 세일기간을 늘려야한다고 주장한 사람은?
  sentences:
  - 한국은행이 11일 기준금리를 현행 연 2.75%로 동결했다. 올해 경제성장률 전망치를 2.8%로 내렸지만 해외 불확실성이 줄었다는 판단에 따른 것이다. 한은의 금리 동결로 원·달러 환율과 원·엔 환율은 급락세를
    면치 못했다. ▶관련기사 A3, 14면김중수 한은 총재는 이날 금융통화위원회 정례회의 이후 열린 기자간담회에서 “세계 경제가 완만하게 회복세를 보일 것으로 예상되고 국내 경제도 미약하지만 성장세를 유지했다”고 금리
    동결 이유를 설명했다. 최근 미국 재정절벽 협상이 타결되고 중국 등 해외 경기지표가 호전되면서 국내 경제 여건이 나아질 것으로 판단한 것이다.금리 결정 이후 발표된 올 경제성장률 전망치는 기존 3.2%에서 2.8%로
    0.4%포인트 낮아졌다. 지난해(2.0%)에 이어 2년 연속 2%대 성장에 머물면서 저성장 추세가 이어질 것이라는 분석이다. 올해 소비자물가 상승률은 2.5%로 지난해(2.2%)와 비슷한 수준으로 내다봤다. 기준금리
    발표 이후 원화 환율은 큰 폭으로 하락했다. 서울 외환시장에서 원·달러 환율은 전날보다 2원50전 떨어진 1057원90전에 출발한 후 1054원70전에 마감했다. 환율이 1050원대로 떨어진 것은 2011년 8월2일(1050원80전)
    이후 17개월 만에 처음이다. 원·엔 환율도 32개월 만에 100엔당 1200원 선이 깨지면서 1183원73전(오후 3시 기준)에 거래됐다.
  - 21일 오후 서울 소공동 롯데백화점 본점 7층 아웃도어 매장. 한 아웃도어 브랜드의 다운재킷 신상품에 55만3000원이라는 가격표가 붙어 있었다. 지난달 말 처음 나왔을 때 79만원에 팔렸던 제품으로 한 달도 안
    돼 세일에 들어간 것. 판매사원은 “정기세일 기간은 아니지만 연말까지 다운재킷 전 품목을 30% 할인 판매하고 있다”고 설명했다.백화점이 최근 사실상 상시세일에 들어가면서 제품 판매가격에 대한 소비자들의 불신이
    커지고 있다. 연간 100일이 넘는 정기세일은 물론 브랜드 세일, 창립기념 세일 등의 명목으로 할인 판매를 지속적으로 실시, 소비자들 사이에 ‘정상 가격에 구입하면 바보’라는 인식이 확산되고 있다.실제 롯데·현대·신세계
    등 주요 백화점들이 이달 들어 세일 행사를 하지 않은 날은 정기휴무일인 11일 하루뿐이다. 지난 1일부터 10일까지는 백화점별로 창립 기념행사를 열었고 12일부터 21일까지는 일부 브랜드가 참여한 ‘브랜드 세일’을
    진행했다. 22일부터는 겨울 세일에 돌입한다. 올 들어 정기세일만 84일간 진행했고 기타 특별할인전 등을 합하면 100일이 넘는 할인행사가 열렸다. 연말세일 등을 포함하면 올해 세일기간은 150일에 육박한다.직장인
    김현희 씨(26)는 “상품별로 따지면 백화점이 거의 매일 세일을 하는 것 같다”며 “신제품이 나온 뒤 한 달 만에 할인판매에 들어가는 경우가 많아 정상 가격을 주고 살 이유가 없다”고 말했다. 주부 정수민 씨(48)는
    “백화점이 잦은 세일에도 이익을 내는 것을 보면 처음부터 가격을 높게 책정하고 있는 게 아닌가 의심된다”고 지적했다. 백화점 측은 억울하다는 반응이다. 한 백화점 관계자는 “의류제조업체들이 처음 내놓는 상품은 대개
    높은 가격을 책정하는데 이 상품의 대부분이 백화점으로 들어온다”며 “백화점이 의도적으로 높은 가격을 매긴다는 것은 오해”라고 말했다. 또 “세일기간이 늘어난 것은 소비침체가 길어지고 있는 데 따른 어쩔 수 없는
    선택”이라고 설명했다. 상대적으로 싸게 파는 대형마트, 아울렛, 온라인몰 등의 등장도 백화점의 할인판매를 부추기는 요인 중 하나다. 이마트 트레이더스는 패딩 점퍼인 ‘캐나다구스 엑스페디션’을 99만8000원에 팔고
    있다. 서울시내 주요 백화점에서 125만~130만원에 판매되는 상품이다. 할인가 판매가 늘면서 백화점 수익성은 악화되고 있다. 롯데백화점의 영업이익률은 2011년 11.6%에서 지난해 9.5%로 낮아졌고 올 들어
    지난 9월까지는 7.7%로 하락했다. 신세계백화점의 영업이익률도 2010년 12.7%에서 2011년 11.6%, 2012년 10.3%로 떨어졌다.김기영 SK증권 애널리스트는 “세일이 길어지면 백화점 수익성은 나빠질
    수밖에 없다”며 “아울렛 온라인몰 등으로 빠져나가는 소비자를 잡기 위해 세일을 늘려야 하는 악순환에 빠져 있다”고 말했다.
  - 11번가(사장 이상호)가 이번에는 장수막걸리의 ‘십장생’ 굿즈 4종을 오는 26일 하루 단독 한정 판매한다. ‘유통기한 10일’ 메시지를 강조한 장수막걸리의 ‘십장생’(10일유통 장수 생고집) 브랜드 콘셉트를 담은
    단독 굿즈 4종은 기존 막걸리의 올드한 이미지를 탈피하고 뉴트로, 빈티지 트렌드를 접목시켜 2030세대와의 접점을 늘리고자 기획됐다. 다양한 과일청을 넣어 막걸리 칵테일을 만들 수 있는 ‘막걸리 슬러시 메이커’(9,100원),
    막걸리 제조 시 사용하고 버려지는 쌀포대의 재활용에서 착안한 ‘쌀포대 에코백’(6,900원), 최적의 ‘막사’ 조합(막걸리 2통, 사이다 1병)을 일컫는 ‘이통일반 유리컵’(6,500원), 십장생 콘셉트를 담은
    ‘십장생 화투’(1만원) 등 총 4종이다. 오는 26일 자정부터 선착순 한정 판매를 시작하며 총 5,000개 물량을 준비했다. 11번가 조엄 신상품기획팀 MD는 “최근 ‘막테일’(막걸리+칵테일), ‘막페인’(막걸리+샴페인)을
    선호하는 젊은 세대들이 많아진 점에 주목해, 막걸리에 트렌디함을 더한 뉴트로 굿즈 제품을 기획했다”이라며 “특별한 굿즈를 소장하기 좋아하는 젊은 온라인 이용 고객 뿐 아니라 막걸리를 선호하는 애주가들까지 전 연령대의
    관심이 높을 것으로 기대한다”고 말했다.
- source_sentence: 하나금융이 '2.17 합의서'를 누구와 체결했나?
  sentences:
  - 김정태 하나금융지주 회장(사진)은 “하나은행과 외환은행의 통합을 논의할 때가 됐다”고 3일 말했다.김 회장은 기자간담회를 열고 “2011년 9조5000억원이던 국내 시중은행의 순이익은 작년 말 4조원으로 줄었고
    하나·외환은행의 순이익 감소폭은 훨씬 크다”며 “살아남기 위해서는 두 은행의 통합 논의를 시작해야 할 때”라고 밝혔다. ▶관련기사 A8면그는 지난 2월 통합한 지 4개월 만에 총자산 12.9%, 대출은 19.9%
    증가한 인도네시아 통합법인 사례를 소개하며 두 은행의 합병 효과를 강조했다. 김 회장의 이 같은 발언에 따라 곧바로 두 은행의 통합 논의가 시작될 전망이다.하지만 김 회장의 발언은 2012년 2월 하나금융이 외환은행
    노동조합과 맺은 이른바 ‘2·17 합의서’와 배치돼 외환은행 노조의 반발이 예상된다. 당시 하나금융은 ‘5년간 외환은행의 독립경영을 보장한다’고 합의했다. 외환은행 노조는 성명서를 내고 “김 회장의 발언은 ‘2·17
    합의서’를 정면으로 위반하는 것”이라며 “모든 수단을 동원해 투쟁할 것”이라고 밝혔다. 박한신 기자
  - 열대우림 '장마전선'은 벵골만과 서북태평양에서 동아시아 몬순의 하위시스템으로 조성된다. '장마전선'의 북진 움직임은 아열대 능선이 발달한 데 영향을 받는다. 이 북쪽으로 이동하는 준정전선은 남한에서 '장마'라고
    불리며, 주요 강수 기간을 나타낸다. 창마전선'은 한반도를 통과하는 데 약 4~5주가 걸린다. 이러한 느린 움직임은 매년 6월말과 7월에 한반도 전체에 많은 양의 여름 강우량을 발생시킨다. 최근 들어 '창마전선'은
    7월 말부터 8월 초까지 다양한 규모의 폭풍우와 함께 폭우가 쏟아지면서 한반도를 통과하는 데 3주도 채 걸리지 않는 등 빠르게 움직이는 경향을 보였다. '창마' 이후 더 극한의 날씨와 국지적인 폭우가 발생하고 있다는
    뜻이다. 잠열 방출에 의해 강하게 변형된 바로크린 교란에서 비롯된 초여름의 '창마' 비의 역학관계는 여전히 제대로 파악되지 않고 있다. 가을 창마로 부를 수 있는 또 다른 '창마' 유형도 있다. 이는 물론 기상청의
    공식 용어는 아니다. 그러나 최근의 기후 변화로 인해 '낙하 창마'라는 용어가 생겨났다. '낙하 창마'는 보통 8월 말에서 9월 초에 시작한다. 한반도에서 북태평양고기압이 완전히 끝난 뒤 '폭포창마'도 끝났다.
    최근의 이 '폭포창마'는 보통의 '창마'보다 훨씬 더 큰 피해를 가져오는데, 왜냐하면 '폭포창마'는 단기간에 극도의 폭우가 집중적으로 쏟아지기 때문이다. 장마 순환 변화가 없을 경우 강수량이 증가할 것으로 예상되지만
    비교적 완만한 이동이나 시기 변화는 동중국인, 한국, 일본 기후에 큰 영향을 미칠 수 있다.
  - 아프가니스탄은 카불－칸다하르사이, 64년 구소련의 원조로 개통된 카불에서 힌두쿠시 산맥을 관통하는 살랑터널 등의 간선도로는 좋으나, 그 외는 사막도로이다. 이란은 산유국답게 잘 정비된 도로망에 주로 자동차가 이용되고
    있다. 원거리 버스 노선도 잘 발달하여 북·서유럽 여러 나라와의 사이에 국제버스가 운행되고 있다. 테헤란에서 서쪽으로는 자동차전용고속도로가 이어져 있다. 도시교통도 전적으로 택시·버스에 의존하고 있기 때문에 교통의
    마비상태는 대단하다. 이란의 철도는 테헤란을 중심으로 페르시아만연안·카스피해연안·아제르바이잔·호라산·케르만에 통하고 있으며 그 연장은 5,000km에 달한다. 터키는 공화국 수립 이전인 1856년에 시작된 철도건설이
    거의 전적으로 외국자본에 의한 것이었으나 철도는 그 후 전부 국유화되었다. 국토 전역에 미치는 철도는 물자수송의 주요수단이 되고 있다. 주요간선은 이라크의 바그다드에서 아나톨리아 고원을 횡단하여 이스탄불에 이르는
    바그다드 철도이다. 수도 앙카라와 지중해, 에게해, 흑해 연안의 모든 도시를 연결하는 철도는 잘 발달해 있으나 폰투스 산맥과 타우루스 산맥이 흑해와 지중해에 연해 있기 때문에 해안지방의 여러 도시를 연결하는 철도망은
    발달해 있지 않다. 터키 최대의 항구 이스탄불은 흑해와 마르마라해 중간에 위치한다는 좋은 지리적 조건 때문에 물자의 거래가 성행한다. 에게 해안의 이즈미르, 지중해안의 이스켄데룬, 흑해안의 삼순과 트라브존도 주요항구이다.
    터키는 근년에 항공기의 발달로 국내항로가 정비되었는데 이스탄불은 국제항공상의 요지가 되어 있기도 하다.
- source_sentence: 바이오매스가 선택한 친환경 에너지 자원은?
  sentences:
  - GS그룹의 민간발전 자회사인 GS EPS가 11일 아시아 최대 규모의 바이오매스 발전소를 준공했다.GS EPS는 이날 충남 당진 부곡산업단지에서 허창수 GS그룹 회장(사진), 허동수 GS칼텍스 회장 등이 참석한
    가운데 105㎿ 규모의 바이오매스 발전소 준공식을 열었다. 이 발전소는 2013년 5월 착공해 총 3000억원을 투입했다. 시간당 약 11만명이 동시에 사용할 수 있는 전력을 생산한다.허창수 GS그룹 회장은 “GS
    EPS가 아시아 최대 규모의 바이오매스 발전소 운영을 통해 신재생에너지 사업 노하우와 기술력을 축적하고 해외 발전 시장에 적극 진출해야 한다”고 강조했다.바이오매스는 발효나 열분해를 통해 전기나 에너지를 생성할
    수 있는 해조류·식물을 일컫는다. 톱밥, 해초, 사탕수수, 나무껍질, 볏짚 등이 포함되며 차세대 친환경 에너지원으로 주목받고 있다. 국내에는 GS EPS를 비롯해 동서발전 중부발전 전주페이퍼 등 4곳의 바이오매스
    발전소가 가동 중이지만 100㎿ 이상 용량을 가진 곳은 GS EPS뿐이다. 아시아에서 최대 규모다.이날 준공한 GS EPS의 바이오매스 발전소는 주로 야자열매껍질(PKS)을 연료로 활용한다. 발전소는 특수 설계된
    보일러에서 연료를 연소하고 이를 통해 생산한 증기로 터빈을 돌려 발전하는 방식이다. 기존 액화천연가스(LNG)나 석탄화력 발전소보다 탄소 배출을 크게 낮추는 효과가 있다. GS그룹 관계자는 “연 40만t의 야자열매껍질을
    동남아시아 여러 국가에서 수입해 발전소를 가동할 예정”이라며 “이번 발전소 준공을 계기로 친환경 사업을 더욱 확대해 나갈 계획”이라고 밝혔다.허 회장은 2000년대 후반부터 친환경 민간 발전 사업에 승부수를 던졌다.
    신재생에너지는 태양광, 태양열, 풍력, 조력, 수소연료, 파력, 연료전지, 바이오매스 등 총 8개 부문이다. 신재생에너지 시장은 유럽, 미국을 중심으로 시장이 팽창하다가 2008년과 2012년 글로벌 금융위기를
    겪으면서 투자가 급감했다.허 회장은 그러나 미래를 내다보고 친환경 사업을 적극 추진해 나가야 한다며 과감한 투자를 결정했다. 2012년 에너지전문 사업 지주회사인 GS에너지가 (주)GS에서 분리 설립된 것도 신재생·대체에너지
    사업을 적극 육성하겠다는 허 회장의 의지였다. 그는 “초일류 기업이 되려면 모방을 넘어 남보다 먼저 혁신할 수 있는 전략이 필요하다”며 “지금까지 없었던 새로운 제품이나 기술을 개발하는 것뿐만 아니라 기존 제품에
    새로운 아이디어를 접목하고 기술을 융복합해 새로운 제품을 생산하는 것도 중요하다”고 말했다. 김보라 기자 destinybr@hankyung.com
  - '제이씨현시스템㈜ (대표: 차현배)는 2020년 11월 18일(수), AORUS Xtreme 지포스 RTX 3080 D6X 10GB 워터포스, 워터블럭 그래픽카드 2종을 공식 출시한다. RTX 2세대인 새로운 지포스
    RTX 30 GPU는 신규 RT 코어와 텐서 코어, 스트리밍 멀티프로세서로 놀라운 비주얼과 향상된 프레임 레이트 및 AI 가속을 게임과 크리에이티브 어플리케이션에 제공한다. 이전 세대 대비 와트 당 최대 1.9
    배 향상된 성능을 제공하는 엔비디아 암페어 아키텍처 기반 RTX 30 시리즈는 8K 해상도를 포함한 모든 해상도에서 최고의 그래픽 품질을 제공한다. 오늘 출시하는 제품 2종은 모두 최대 부스트 기준 GPU 코어클럭
    1845 MHz(쿠다코어 8074)를 기록하며, GDDR6X의 19000MHz(320bit) 초고대역폭의 메모리를 탑재해 강력한 성능과 함께 본체 전면을 감싸는 RGB LED까지 성능과 디자인에서 당대 최고의 그래픽카드
    수준을 보여준다. 이 중 워터포스는 수냉쿨링 솔루션(펌프, 냉각수, 튜브, 라디에이터, 냉각팬 등)이 공장 출고 때 부터 일체형(ALL-IN-ONE)의 형태로 생산, 출고되어 사용자가 별도의 수냉시스템 부자재를
    별도 구입하지 않고도 박스 개봉 후 PC에 바로 장착해서 쓸 수 있다는 장점이 있다. 또한 워터블럭은 PCB와 수냉블럭을 결합한 형태로, 펌프와 라디에이터, 냉각팬 등 수냉시스템에 필요한 부품은 별도 구입해야하지만
    사용자의 무한한 개성에 맞춰 커스터마이징 방식의 수냉시스템을 구성할 수 있다는 점에서 장점으로 부각된다. 기가바이트는 그 동안 극한의 오버클럭 게이밍 환경에서 필연적인 높은 GPU 발열과 팬소음에 대한 소비자들의
    불편함을 해결하고자 다년간 노력해왔으며, 호환용 올인원 솔루션 또는 수냉블럭을 구입할 때 소비자들이 여러고민을 하지 않도록 업계에서는 유일무이하게 이 두가지 형태의 냉각시스템을 자사의 제품에 공식적용해 선보여왔다.
    독특한 구조에 따른 내구성에 대한 소비자들의 의심을 잠재우고자 일반적인 3년 무상보증 기간을 넘어 최대 4년까지 연장 가능하며, 소비자가 제품 구입 후 한달 이내로 지정된 고객등록 홈페이지에 접속해 고객과 제품,
    구매정보 등을 직접 등록하면 검수 완료 후 수일 내로 4년 무상보증 연장이 가능해진다. 기가바이트 국내 공식 공급원인 제이씨현시스템(주) 관계자는 업계최고의 기술력과 디자인 철학, 업계 최고 수준인 4년무상보증
    서비스 제공을 장점으로 하드코어 게이밍을 선호하는 진정한 게이머들에게 평가 받을 준비를 마쳤다고 밝혔다.'
  - "공하류(디노카리디다 Dinocaridida) 는 멸종한 절지동물을 닮은 해양 동물 화석이며 신더하네스를 제외하면 캄브리아기 초기에서 중기에 걸쳐 발견된다. 공하류는 아노말로카리스과와 오파비니아과로 나뉜다. 이\
    \ 그룹의 이름은 그리스어 \"deinos\" 와 \"caris\"에서 온 것으로 \"무서운 새우\", ,혹은 무서운 게\" 라는 의미다. 겉보기에 갑각류와 비슷하고 이 그룹에 속한 동물들이 당시의 최상위 포식자라는\
    \ 해석에서 나온 이름이다.\n\n공하류는 좌우대칭인 몸을 가지고 있으며 광물질화되지 않은 큐티클층으로 덮여 있고 몸은 크게 두 개의 부분으로 나뉜다. 앞부분에는 하나 이상의 부속지가 몸 아래쪽, 입 앞에 붙어있다.\
    \ 몸통은 13 개 이상의 마디로 나뉘어 있는데, 각각은 아가미와 헤엄치는데 쓰이는 엽을 가지고 있다. 이 엽들은 위아래로 움직이며 마치 갑오징어목의 움직임처럼 몸을 앞으로 이동할 수 있게 해준다. \n\n공하류의\
    \ 분류는 분명하지 않긴 하지만 줄기군 절지동물인 것으로 보인다. 최근의 연구에서 이들은 엽족동물문에 속하는 수수께끼 같은 형태의 동물들과 함께 묶이곤 한다. \n\n지리적으로 널리 분포했으며 캐나다, 중국과 러시아의\
    \ 캄브리아기 지층, 그리고 독일의 데본기 지층에서도 발견되었다."
- source_sentence: 19세기 이전의 소설은 내용의 흐름을 어떻게 서술하였나?
  sentences:
  - 수도권 1기 신도시인 부천 중동 한복판 ‘랜드마크(지역을 대표하는 시설이나 건물) 용지’ 개발 방향을 놓고 지역 내 갈등이 커지고 있다. 부천시청 바로 옆에 20여년간 방치돼 있는 3만4286㎡ 땅을 어떻게 개발하느냐를
    두고 의견이 갈려서다. 부천시는 도시 가치를 높이기 위해 초고층 중심의 통합개발을 해야 한다는 입장이다. 반면 일부 시의원과 시민단체는 인구밀도가 전국 최고 수준인 부천에서 고밀도 개발은 맞지 않는다며 반대하고
    있다. 개발안을 둘러싼 시의회 내 의견 대립은 최근 몸싸움으로까지 번져 검경이 수사에 나섰다.○‘랜드마크 땅’ 개발 놓고 갈등 격화이 땅(원미구 중동 1153)은 원래 문화예술회관·호텔용 부지였다. 그러나 마땅한
    사업자가 나서지 않아 2008년 특별계획구역으로 지정됐고, 2012년 민간 매각 승인이 났다. 3만4286㎡(18개 필지) 가운데 87%인 2만9772㎡가 시유지고 나머지는 개인 소유다. 땅은 세 구역으로 나뉘어
    있다. 모델하우스 가건물이 들어서 있는 옛 호텔용 부지(8155㎡)와 옛 문예회관용 부지(1만5474㎡), 그 사이로 상가가 들어서 있다. 상가 땅은 시유지와 개인 토지가 뒤섞여 있다.부천시는 이 땅을 따로 개발해서는
    사업성이 없다고 판단, 지난 6월 통합개발안을 마련했다. 용적률 1050%를 적용해 66~69층 아파트 4개 동(1480가구)과 40층 호텔(320실)을 짓는 안을 내놨다. 기부채납을 받아 1700석 규모 콘서트홀을
    갖춘 문예회관 등을 함께 조성하겠다고 했다. 예상되는 시유지 매각대금은 3334억원으로 개별 매각 때보다 850억여원을 더 받을 수 있다는 설명도 곁들였다.개발안이 시의회로 넘어가면서 제동이 걸렸다. 김만수 부천시장과
    뜻을 같이하는 시의회 내 다수당인 새정치민주연합과 달리 새누리당 측이 “주민 의견수렴 절차가 부족하고 사업성이 검증되지 않았다”며 반대해 안건 심의가 불발됐다. 부천시는 문예회관 부지만 따로 매각하기로 하고 15일
    공고를 냈다. 그러나 이마저도 일부 시민단체의 반대에 부딪혔다. 교통정체, 학급 과밀화가 우려된다는 이유에서다. 부천은 인구밀도가 ㎢당 1만5910명(지난달 말 기준)으로 전국에서 두 번째로 높다.○부천시 “분양
    여건 달라졌다”특별계획구역 통합개발 반대엔 ‘리첸시아 미분양 사태’에 대한 기억이 깔려 있다. 2012년 초 완공된 66층짜리 쌍둥이 주상복합 ‘리첸시아 중동’(572가구)은 부천의 랜드마크 단지로 기대를 모았다.
    분양면적 160·193·208·215·260·344㎡(옛 48~104평형)의 대형 주상복합으로 부천지역 주거 수준을 끌어올린다는 야심찬 계획 아래 추진됐다. 그러나 부동산 경기 침체 속에 고전을 면치 못했다. 올초까지
    두 번에 걸친 할인 분양 끝에 매매가는 분양가의 60% 선까지 떨어져 있다. 가격이 하락하면서 미분양은 대부분 해소되고 입주율도 90%를 넘었다고 인근 부동산 업계는 전했다. 160㎡는 6억4000만~7억3000만원,
    193㎡는 6억8000만~7억7000만원 선에 호가가 형성돼 있다. 아직도 1층 상가는 상당부분 비어 있다.부천시청 도시계획과 관계자는 “리첸시아 미분양 때문에 복합개발에 대한 거부감이 있는 것은 사실이지만 그때와는
    상황이 다르다”고 말했다. 부천시는 특별계획구역 외에도 원미구 길주로1 일대(38만2743㎡)를 ‘영상문화단지’로 복합개발하기로 하고 사업자 공모를 진행 중이다. 상동호수공원 맞은편 녹지로 역시 20여년간 방치된
    땅이다. 이 사업에는 롯데, 신세계, 이랜드, 한양 등을 비롯해 개발업체 엠디엠, STS개발 등 6곳이 사업참가 의향서를 냈다.
  - 한화그룹이 계열사 사장 인사를 전격 단행하며 위기 돌파를 위한 채비를 갖췄다. 삼성과 방산·석유화학 빅딜 이후 이틀 만에 나온 것으로, ‘전광석화(電光石火)’ 같은 김승연 회장 특유의 속도경영이 다시 시동을 걸었다는
    분석이 나온다. 그룹 전체가 초긴장 상태다.한화는 28일 김창범 한화첨단소재 사장(59)을 한화케미칼 대표로 임명하는 등 5개 계열사의 대표이사를 교체하는 그룹 사장단 인사를 단행했다. 통상 3월에 실시하던 사장단
    인사를 4개월가량 앞당긴 것이다. 지난 10일 금춘수 전 한화차이나 사장을 경영기획실장에 임명한 데 이은 후속 조치다. 최근 법원의 사회봉사명령을 모두 이행한 김 회장이 빅딜과 조기 인사 단행 등 잇따른 파격 경영
    행보로 위기 돌파에 나선 것 아니냐는 관측이 나온다.○채찍 다시 든 김승연한화는 이번 인사에서 김 사장의 한화케미칼 대표 이동으로 공석이 된 한화첨단소재 대표에는 자동차소재사업부장인 이선석 전무(54)를 발탁했다.
    한화갤러리아 대표에는 황용득 한화역사 대표(60)를 전보발령했고, 한화역사 대표에는 (주)한화 재경본부장인 한권태 전무(59)를 배치했다. 한화저축은행 대표에는 김원하 한화건설 경영지원실 전무(58)를 임명했다.
    방한홍 전 한화케미칼 사장, 박세훈 한화갤러리아 전 대표, 김승규 한화저축은행 대표 등은 고문직을 맡아 일선에서 물러난다.그룹 관계자는 “점차 불확실성이 커지는 시장 상황에 대응하기 위해 검증된 역량과 경륜을 갖춘
    인물들을 전진 배치했다”며 “책임경영을 강화하고 약화된 시장 경쟁력을 높이기 위한 조치”라고 설명했다.이번 사장단 인사가 속전속결로 단행되면서 그룹 임직원들이 바짝 긴장하는 분위기다. 금 사장이 경영기획실장에 재기용되면서
    예고했던 강도 높은 인적쇄신이 시작됐다는 분석에서다. 이번 인사가 철저한 성과 중심으로 이뤄진 만큼 후속 임원 인사폭도 자연스럽게 커질 수밖에 없을 것이란 전망이다.이번 신임 대표이사로 발탁된 이 전무는 자동차경량화소재인
    유리섬유 강화 열가소성 플라스틱(GMT) 등을 세계 1위에 올려놓은 인물이고, 한화갤러리아 대표로 옮겨가는 황 대표는 지난 3년 동안 한화역사를 이끌면서 현장경영 등으로 불황 속에서도 꾸준히 성장을 일궈냈다.재계
    관계자는 “사실상 경영일선에 복귀한 김 회장이 빅딜 직후 곧바로 사장단 인사를 단행하면서 조직에 긴장감을 불어넣고 위기 타개에 나선 것”이라고 말했다.○삼성 빅딜 후속 작업 속도이번 인사로 삼성과의 빅딜을 마무리하는
    작업에도 속도가 붙게 됐다. 삼성테크윈과 삼성탈레스, 삼성종합화학, 삼성토탈 등 삼성 계열사 인수작업을 마무리할 태스크포스(TF)를 이끌 수장들이 정해졌기 때문이다. 인수 TF는 한화케미칼 대표를 맡은 김 사장과
    (주)한화의 화약·방산부문 각자대표인 심경섭 사장이 주도하게 된다. 김 사장은 화학 사업부문을, 심 사장은 방산사업부문 인수작업을 총괄한다고 그룹 측은 설명했다. 한화는 내년 1월까지 4개 인수기업에 대한 정밀실사를
    마친 뒤 공정거래위원회 기업결합 승인 등의 절차를 거쳐 6월까지 인수를 마무리한다는 계획이다.한화는 비주력사업 매각 등 추가적인 사업재편도 지속한다는 방침이다. 석유화학 태양광 금융 방산 등 주력사업에 역량을 집중하되
    나머지 비주력사업은 과감히 정리하겠다는 것이다. 재계 관계자는 “내년에도 석유화학 등의 업황이 개선될 가능성이 낮다는 것도 사업재편과 인적쇄신에 나선 배경”이라고 설명했다.
  - '콘래드가 전성기에 쓴 소설 중 하나로, 전 세계적으로 널리 읽히는 작품. 20세기 모더니즘을 선도하는 동시에 모더니즘을 뛰어넘었다는 평가를 받는다. 이 소설은 파트나 호와 파투산에서 벌어지는 사건을 중심으로 전개된다.
    일등항해사였던 짐이 파트나 호 침몰과 관련해 양심의 가책과 죄의식을 느끼게 되는데, 이러한 짐의 내면 심리 묘사에 초점을 맞추고 있다.


    이 소설은 짐에 대한 소개로 시작된다. 목사 가문에서 태어난 짐은 대중문학의 영향을 받아 선원이 되기로 결심한다. 짐은 선원을 양성하는 연습선에서 2년간의 훈련을 무사히 마친 뒤, 낡은 파트나 호에 일등항해사로
    취직하게 된다. 그러나 불행하게도 800여 명의 순례자들을 싣고 항해하던 중 파트나 호는 침몰할 위기에 처한다. 선장과 선원들은 도망치고 짐도 이에 연루된다. 이후 재판에서 일등항해서 자격을 박탈당한 짐은 말로의
    소개를 받아 스타인을 만나게 되고, 파투산 무역사무소 지배인으로 부임한다. 짐은 파투산의 부기스족의 우두머리인 도라민과 협력하여 억압받던 사람들을 거둬들여 자신만의 독자적인 세력을 구축하게 된다.


    이 소설에서 가장 두드러진 특징은 이야기를 전개하는 서술자다. 소설은 전지적 서술자에 의해 이야기가 시작되지만 극화된 서술자인 말로의 이야기로 끝난다. 등장인물인 서술자가 독자에게 제공하는 정보는 제한되어 있고,
    불완전할 수밖에 없다. 말로는 전지적 서술자가 아니기 때문에 주관적인 입장에서 짐을 묘사하고 해석할 수밖에 없다. 짐에 대한 그의 해석은 맞을 수도 있고 틀릴 수도 있다. 이는 독자들이 말로의 이야기를 전적으로
    신뢰할 수 없다는 것을 뜻한다. 콘래드는 말로라는 신뢰할 수 없는 서술자를 등장시킴으로써 전지적 서술자에 의존하는 전통적인 서사기법에서 탈피한 것이다.


    《로드 짐》의 두 번째 특징은 이 작품이 연대기적 서술 방식에서 벗어났다는 점이다. 19세기 이전의 소설들이 시간순으로 사건을 배열하는 경향이 강했다면, 이 소설은 현재와 과거, 미래의 사건들이 뒤죽박죽되어 있다.
    그렇기 때문에 말로의 이야기는 사건의 순서가 아닌 그의 기억의 순서에 따라 모자이크처럼 구성되어 있다.


    《로드 짐》은 모더니즘 문학의 핵심적인 작품들 가운데 하나로 평가받는다. 하지만 이 소설을 단지 모더니즘에만 한정하게 되면, 이 소설 또는 콘래드의 참된 가치를 망각하거나 훼손할 우려가 있다. 이 소설은 19세기와
    20세기의 문학적 전통과 시대정신을 아우르는 작품이다. 이는 콘래드가 자신이 살았던 시대를 충실하게 반영하는 동시에 뛰어넘은 작가임을 의미한다.'
- source_sentence: 자베스의 초기 시집에 전혀 영향을 주지 않았던 것은 무엇인가?
  sentences:
  - '1912년 4월 16일 에드몽 자베스는 이집트 카이로에서 이탈리아계 유대인으로 태어나 명문가에서 고전적적인 방식으로 프랑스어 교육을 받으며 자랐다. 제2차 중동 전쟁이 발발하고 5년 뒤 1930년 처음으로 파리를
    방문한다. 1935년, 프랑스 시인 막스 자코브를 만났으며, 이후 폴 엘뤼아르와 가까이 지내는 등, 공식적으로 초현실주의 그룹에 속하지는 않았으나 초현실주의 작가들에게 자신의 시적 역량을 인정받았다.

    그는 프랑스 문인 앙드레 지드, 앙리 미쇼, 필리프 수포 등과 교분을 맺었고, 1957년 나세르가 정권을 잡은 이집트를 떠나 프랑스로 이주한 뒤, 1967년 프랑스 국적을 취득하였다. 같은 해 몬트리올에서 열리는
    세계 박람회에서 장 폴 사르트르, 알베르 카뮈, 클로드 레비스트로스와 함께 네 명의 프랑스 작가 중 하나로 선정되는 영예를 안았다. 프랑스에 정착한 후로 파울 첼란, 미셸 드세르토, 이브 본푸아, 에마뉘엘 레비나스
    등 당대의 지성과 교류하였으며, 1972년에는 비평가상을, 1986년에는 레지옹 도뇌르 훈장을, 1987년에는 프랑스 시인상을 수상하였다.


    자베스의 초기 시집에서는 초현실주의의 영향을 매우 뚜렷히 볼 수 있다. 또한 프랑스에서 살며 독일어로 글을 쓴 유대인 작가 파울 첼란이 그러하였듯이, 자베스의 언어는 아우슈비츠 이후의 잔인한 현실에 대한 인식을
    반영한다. 그는 블랑쇼와 비슷하면서도 다른 방법으로 문학의 한계, 언어의 한계에 도전했다. 이집트에서 태어난 유대인 자베스는 사막, 책, 이방인, 모래, 유대인, 공허, 우물 등을 존재나 언어의 은유로 즐겨 사용했다.
    자베스의 사상은 유대인으로서의 경전 독해와 깊은 관련 하에 인간의 본질을 찾는 데 있다. 인간은 본질적으로 유배지의 백성으로, 그런 인간에게 거처는 주어지지 않았다는 것. 그리고 그런 의미에서 "인간은 모두 유대인이다"라고
    자베스는 말한다. 자베스는 자크 데리다, 모리스 블랑쇼, 에마뉘엘 레비나스 등과 깊은 교우관계를 맺었으며, 레비나스는 "진정한 시인은 거처가 없다"며 자베스를 높이 평가하였다. 또 유대계 미국 작가인 폴 오스터는
    "대부분이 기독교 신자인 이 세상에서 모든 시인은 유대인이다."라는 마리나 츠베타예바의 말을 전거로 들며, "이런 정신이 자베스 작품의 정중앙에 놓여 있는 핵이고 그로부터 모든 것이 흘러나온다. 자베스가 볼 때,
    먼저 글쓰기 자체를 문제 삼지 않고서는 대학살에 관한 것은 아무것도 쓸 수가 없다. 언어를 극한까지 밀어붙이려면 작가는 자신을 의심의 유배지, 불확실성의 사막으로 추방시켜야 한다."고 말하기도 하였다.'
  - '타스만 빙하는 미나렛트 피크의 남쪽 경사면에서, 그 정상이 빙하에서 불과 5 km 거리에 있는 쿡 산의 동쪽면을 따라 남쪽으로 흐르고 있다. 이 빙하는 머치슨 빙하의 녹은 얼음물이 도중에 부딪치지 않고, 이 녹은
    얼음물은 모렌인의 외부에서 타스만 빙하 곁으로 흘러들기 위해 방향을 바꿀 때까지 동북에서 흘러 내리고 있다.


    두 빙하에서 흘러내린 물이 타스만 빙하의 끝 부분에 있는 타스만 호수에 쌓인 후 남쪽으로 흐르고, 가까운 후커 빙하와 뮬러 빙하에서 흘러나오는 물로 타스 강 넓은 골짜기에 합류해서 더 커진 흐름이 푸카키 호수로
    남쪽으로 흐른다. 그 흐름은 결국 와이타키 강에 들어가 오마르의 북쪽에서 태평양으로 흘러간다.


    서던 알프스 산맥의 서쪽에서 동쪽으로 뮬러 빙하, 후커 빙하 그리고 타스만 빙하가 함께 있지만, 그들의 빙하는 1990년에서 2000년경 10년에 사이에 크게 후퇴했다. 종단이 확대된 호수 (빙하의 상류에 있는
    모레인) 하얀 얼음의 후퇴, 얼음이 얇아 져서 모레인 벽 높이가 올라간 것에 주목한다.'
  - 프랑스 헬스케어 기업 사노피아벤티스는 한국 바이오벤처기업 파멥신과 ‘아시아인에게 유병률이 높은 질환 관련 항체신약 후보물질 발굴’을 위한 공동연구를 하고 있다. 글락소스미스클라인(GSK)은 한미약품과 ‘복합개량신약
    공동개발 및 상업화를 위한 전략적 제휴’를 맺고 함께 연구에 착수했다.신약 연구개발(R&D) 단계부터 제약사들이 협력하는 ‘오픈 이노베이션(개방형 혁신)’이 제약업계에서 활발하게 진행되고 있다. 한국제약협회와 한국다국적의약산업협회가
    최근 공동으로 개최한 ‘2014년 제약산업 공동 콘퍼런스’에서도 오픈 이노베이션이 최대 화두였다.콘퍼런스 마지막 날인 지난 19일 이경호 한국제약협회 회장, 김진호 한국다국적의약산업협회 회장(GSK 북아시아 총괄
    회장), 배병준 보건복지부 보건산업정책국 국장은 서울 역삼동 리츠칼튼호텔에서 좌담회를 열었다. 이들은 “국내 제약산업이 제네릭(복제약)과 내수 시장 위주의 성장에서 벗어나기 위해서는 다국적 제약사와의 협업을 통해
    해외 수출로 질적 도약을 이뤄야 한다”고 입을 모았다.이 회장은 “국내 제약사들이 다국적 제약사의 제품을 국내 시장에 마케팅하는 정도로 부분적인 역할만 해 왔다”며 “R&D를 하더라도 상용화까지 비용과 시간이 많이
    들기 때문에 ‘임상 1상’까지만 하고 다국적 제약사에 넘기는 경우가 많다”고 지적했다. 배 국장은 “국내에서 개발된 신약은 21개에 그치고 있다”며 “글로벌 블록버스터 신약을 개발하는 데까지 나아가야 한다”고 강조했다.글로벌
    다국적 제약사와 포괄적이고 실질적인 협력을 추진해야 한다는 의견도 나왔다. 김 회장은 “신약 개발은 결국 시간과 비용 싸움인데 국내 기업들이 독자적으로 신약을 개발해 상업화하기까지 어려움이 많다”며 “다국적 제약사가
    함께 연구하고 관리하는 역할을 할 필요가 있다”고 말했다.국내 제약사의 신약 개발 잠재력은 충분하다는 게 이들의 공통된 의견이었다. 김 회장은 “최근 특화된 틈새 의약품이 많이 나오고 있는 추세”라며 “한국은 시장이
    작지만 다양한 연구가 이뤄지고 있기 때문에 이런 상황을 널리 알려야 한다”고 전했다. 배 국장은 “한국은 임상시험이 활발하게 이뤄지는 나라 중 하나”라며 “국내 임상시험 안전성 기준은 국제적인 수준으로 제약 R&D
    인프라도 탄탄하다”고 설명했다.국내 제약사와 다국적 제약사 간 협력을 위해서는 정부의 역할이 중요하다는 지적도 나왔다. 이 회장은 “제약 R&D에 여러 부처가 지원하고 있다”며 “글로벌 신약 개발을 목표로 한다면
    국가 차원의 컨트롤타워를 만들 필요가 있다”고 말했다. 배 국장은 “기업 간 협력뿐 아니라 정부 간 협력도 중요하다고 본다”며 “한국 식품의약품안전처에서 허가받은 신약을 1주일 안에 허가받을 수 있는 자동 승인제도를
    최근 에콰도르가 도입했는데 향후 중남미, 중동 등 다양한 국가로 확대 추진할 계획”이라고 설명했다. 조미현/ 김형호 기자
