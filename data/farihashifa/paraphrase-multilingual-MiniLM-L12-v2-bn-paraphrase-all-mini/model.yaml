widgetData:
- source_sentence: চলচ্চিত্রটি পরিচালনা করেছেন রাহুল আহমেদ মিথুন।
  sentences:
  - চলচ্চিত্রটি পরিচালনা করেছেন শাহাদাত হোসেন লিটন।
  - জেলা বিএনপির সভাপতি ইকবাল হাসান মাহমুদ টিটুর নেতৃত্বে অনুষ্ঠিত সভায় বিএনপির যুগ্ম মহাসচিব আমান উল্লাহ আমান, সাংগঠনিক
  - জানুয়ারি মাসে রাজধানী ওয়ার্ড যুব দলের সভাপতি শহীদ মোল্লাকে সন্ত্রাসীরা গুলি করে হত্যা করে।
- source_sentence: মোবাইল ফোনটি গুগল পিক্সেল প্রোগ্রামের মাধ্যমে বাজারে উন্মোচিত হয়েছে।
  sentences:
  - এরপর ঢাকা বিশ্ববিদ্যালয়ের উপাচার্য প্রফেসর এ.এ.এম. স. আরেফিন সিদ্দিকের নেতৃত্বে ফুলটি
  - ঢাকা ফেব্রুয়ারি বিবিসি.কম ইন্ডিয়ান প্রিমিয়ার লীগের চতুর্থ সংস্করণে সাবেক ভারতীয় অধিনায়ক সৌরভ গাঙ্গুলীর সাথে খেলে
    না।
  - অ্যান্ড্রয়েড ওয়ান প্রকল্পের মাধ্যমে স্মার্টফোনটি বাজারে আনা হয়েছে।
- source_sentence: ঢাকা মেট্রোপলিটন থানার ওসি এম এম রহমান আজকের খবর ডটকমকে জানান বৃহস্পতিবার রাতে রহিম আহমেদের বিরুদ্ধে জিডিটি
    করা হয়।
  sentences:
  - ফার কেমিক্যাল ইন্ডাস্ট্রিজ লিমিটেড মঙ্গলবার দেশের পুঁজিবাজারে লেনদেন শুরু করেছে।
  - নারায়ণগঞ্জ সদর মডেল থানার ওসি এস এম মঞ্জুর কাদের বিবিসিকে জানান, নাসিম ওসমানের বিরুদ্ধে বুধবার রাতে জিডি
  - জনসভা শেষে খালেদা জিয়া ডাকবাংলা থেকে ঢাকা চলে যান।
- source_sentence: শুক্রবার সকালে রানা বিডিনিউজ টুয়েন্টিফোর ডটকমকে জানিয়েছেন তিনি ম্যাচ রেফারির রিপোর্ট হাতে পেয়েছেন।
  sentences:
  - নভেম্বর মাসে তিনি বিএনপির চেয়ারপার্সন খালেদা জিয়ার সাথে সাক্ষাৎ করেন।
  - বৃহস্পতিবার বিকেলে মুন্না বিবিসি নিউজকে জানায় যে আমি ম্যাচ রেফারির রিপোর্ট পেয়েছি।
  - পারিবারিক সূত্র থেকে জানা যায়, সোমবার মাহফুজুল হক খান মস্তিষ্কের রক্তক্ষরণের কারণে স্কয়ার হাসপাতালে ভর্তি হন।
- source_sentence: নাটকটি লিখেছেন সুমাইয়া ইসলাম এবং পরিচালনা করেছেন জাহিদ হাসান।
  sentences:
  - চলচ্চিত্রটি পরিচালনা করেছেন ইসরাত জাহান কাদের এবং প্রযোজনা করেছেন মাহফুজ আহমেদ।
  - তিনি ডিমলা থানায় কাজ করতেন এবং প্রত্যক্ষদর্শীদের জানান, হারুন অর রশিদ মোটরসাইকেল নিয়ে নীলফামারী শহরের দিকে যাচ্ছিলেন
  - দীনেশচন্দ্র বর্মণ নামে একজন ব্যক্তি বগুড়ার নাসিরনগরে ধান মাড়াই কলের সঙ্গে কাপড় জড়িয়ে মারা যান।
