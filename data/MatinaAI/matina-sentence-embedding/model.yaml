      \ همچنین می‌توانند از سبزیجات پخته و بخارپز شده، مانند کدو و هویج استفاده کنند که به راحتی هضم می‌شوند.\n\nبرای جلوگیری\
      \ از نفخ، بهتر است غذاها با ادویه‌های ملایم و هضم آسان تهیه شوند، مانند زردچوبه و دارچین. همچنین باید از غذاهای چرب\
      \ و سرخ‌کردنی و ادویه‌جات تند پرهیز کنند، زیرا ممکن است باعث تحریک معده و ایجاد نفخ شوند. استفاده از میوه‌های هضم آسان\
      \ مانند موز و انجیر نیز می‌تواند مفید باشد. \n\nبه طور کلی، بهتر است غذاها به صورت بخارپز یا آب‌پز تهیه شوند و از مصرف\
      \ غذاهای سنگین و پرادویه خودداری شود تا عوارض معده و نفخ کاهش یابد."
