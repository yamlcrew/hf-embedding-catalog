widgetData:
- source_sentence: اگردرآمد حاصل از سرمايه کسب يا وسايل و ابزار کار مورد نياز صنعت گريا تاجرو مانند آن از مخارج سال وي کمتر
    باشد و نيازهاي او را تأمين نکند، چنين شخصي فقير محسوب مي شود و مي توان تنها براي کسري مخارجش از وجوهات شرعيه - با رعايت
    شرايط استحقاق آن - به وي پرداخت نمود؛  بنابراين، اين گونه افراد لازم نيست سرمايه و ابزار کار مورد احتياج خود را بفروشند
    و به مصرف مخارج خويش برسانند؛ بلکه مي توانند آنها را براي ادامه کارو کسب درآمد نگه دارند.
  sentences:
  - اگر شخصی در زندگی روزمره خود با مشکلات مالی مواجه باشد و درآمد حاصل از کار و سرمایه‌اش نتواند نیازهای اساسی او را تأمین
    کند، آیا می‌تواند از وجوهات شرعی برای جبران کسری مخارجش استفاده کند؟ آیا در این شرایط لازم است که او سرمایه و ابزار کارش
    را بفروشد یا می‌تواند آنها را حفظ کند تا به کار و کسب خود ادامه دهد؟
  - در زندگی روزمره، گاهی اوقات با انتخاب‌های مختلفی روبرو می‌شویم که هر کدام می‌تواند تأثیرات زیادی بر آینده‌مان داشته باشد.
    در این مواقع، احساس می‌کنم نیاز دارم که از خداوند راهنمایی بگیرم تا بهترین گزینه را انتخاب کنم. آیا در چنین شرایطی می‌توانم
    از دعا و استخاره استفاده کنم تا خداوند آنچه را که برایم بهتر است، پیش آورد؟ آیا این عمل در هر موردی که تصمیم به انجام
    آن دارم، مستحب است یا شرایط خاصی دارد؟
  - در مورد سود سهام که به حساب من واریز شده و در حال حاضر نمی‌توانم آن را برداشت کنم، آیا باید در پایان سال خمسی خمس آن را
    پرداخت کنم یا می‌توانم تا زمانی که شرکت آن را به من پرداخت کند، صبر کنم و سپس خمس آن را بپردازم؟ همچنین اگر بخشی از این
    سود به عنوان سود انباشته در شرکت باقی بماند، آیا این بخش هم مشمول خمس می‌شود؟
- source_sentence: 'اگر انسان نداند که بعضی از آنچه به عنوان مفطرات ذکر شد، روزه را باطل می کند و به علت ندانستن حکم، آن را
    انجام دهد، چنانچه آن مفطر،  خوردن» یا «آشامیدن» یا «جماع» باشد، در هر صورت روزه اش باطل می شود و اگر سایر مفطرات بوده،
    چند صورت دارد:   الف. اگر در یادگیری مسأله کوتاهی کرده باشد (که در این صورت جاهل مقصر  محسوب می شود) روزه اش باطل می شود.  ب.
    اگر در یادگیری مسأله کوتاهی نکرده و هنگام انجام مبطل، تردید هم نداشته است (که در این صورت جاهل قاصر می باشد) روزه اش صحیح
    می باشد. (1)  ج. چنانچه فرد، در هنگام انجام مفطر، برای ارتکاب آن، حجت شرعی داشته باشد که در این صورت هم جاهل قاصر محسوب
    می شود) روزه اش باطل نمی شود.'
  sentences:
  - در مجالس سوگواری و عزاداری، وقتی که به یاد اهل بیت (علیهم السلام) جمع می‌شویم، همیشه به این فکر می‌کنم که چگونه می‌توانیم
    این مراسم را به بهترین شکل برگزار کنیم. در این راستا، استفاده از ابزارهایی مانند نی و سازهای دیگر، گاهی اوقات ذهنم را
    مشغول می‌کند. آیا در شرایطی خاص، استفاده از این ابزارها می‌تواند به نوعی به عزاداری آسیب بزند یا شأن آن را زیر سؤال ببرد؟
    به نظر شما، چه نکاتی را باید در نظر بگیریم تا مراسم ما با روح عزاداری و احترام به اهل بیت (علیهم السلام) همخوانی داشته
    باشد؟
  - در زندگی روزمره، گاهی با مسائلی مواجه می‌شویم که درک صحیح از خوب و بد بودن آن‌ها برای ما دشوار است. به عنوان مثال، در
    شرایطی ممکن است عملی به نظر خوب بیاید، اما در واقعیت تبعات منفی داشته باشد. آیا می‌توانیم به معیارهای عقل و شرع برای تشخیص
    این امور اعتماد کنیم؟ چگونه می‌توانیم اطمینان حاصل کنیم که تصمیمات ما بر اساس «معروف» و «منکر» صحیح است و از اشتباهات
    احتمالی در این زمینه جلوگیری کنیم؟
  - "در روزهای ماه مبارک رمضان، در حال روزه‌داری بودم و به طور ناگهانی متوجه شدم که یکی از دوستانم در مورد مسأله‌ای صحبت می‌کند\
    \ که به نظر می‌رسد ممکن است روزه‌ام را باطل کند. او به من گفت که برخی از کارها که به عنوان مفطرات شناخته می‌شوند، اگر\
    \ به عمد انجام شوند، روزه را باطل می‌کنند. من تا آن لحظه از این موضوع بی‌خبر بودم و به همین دلیل کمی نگران شدم. \n\nحالا\
    \ می‌خواهم بدانم که اگر در مورد این مفطرات اطلاعات کافی نداشته باشم و به خاطر ندانستن، یکی از آن‌ها را انجام دهم، آیا\
    \ روزه‌ام باطل می‌شود؟ و اگر روزه‌ام باطل شود، آیا در این مورد مسئولیتی بر عهده‌ام هست یا خیر؟"
- source_sentence: زیرا ترس او آن بود که در آلمان نازی از سوی دولت آدولف هیتلر تحت تعقیب قرار گیرد.
  sentences:
  - 'در ویتنام مرسوم است که برای درمان سرطان از شاخ کرگدن استفاده کنند وهمین باعث به خطر افتادن گونۀ این حیوان شده است.  '
  - دین در کارهای تحقیقاتی و علمی هم رسوخ پیدا کرده است و من در این مورد توضیحی ندارم که بدهم.
  - 'ترس از اینکه توسط نیروهای نازی مورد تعقیب قرار بگیرد خواب راحت را از او گرفته بود. '
- source_sentence: برای افرادی که طبع گرمی دارن و معده‌شون حساسیته، چه غذاهایی خوبه؟ و اینکه آیا این غذاها رو باید طوری درست
    کرد که نفخ ایجاد نکنه؟
  sentences:
  - "بله، با برنج و خورشت مانده می‌توانید یک غذای خوشمزه و خلاقانه تهیه کنید. یکی از گزینه‌ها تهیه دلمه با ترکیب برنج و خورشت\
    \ است. به این صورت که برنج و خورشت را با هم مخلوط کرده و سپس این ترکیب را داخل فلفل دلمه‌ای یا بادمجان پر کنید و بپزید.\
    \ \n\nهمچنین می‌توانید از برنج و خورشت برای تهیه یک فریتاتا استفاده کنید. برای این کار، برنج و خورشت را با تخم‌مرغ و مقداری\
    \ سبزیجات مخلوط کرده و در تابه سرخ کنید تا خوب بپزد. این غذا طعم جدید و جذابی به شما می‌دهد.\n\nعلاوه بر این، می‌توانید\
    \ برنج و خورشت مانده را در یک تابه با کمی پنیر مخلوط کنید و بگذارید کمی بپزد تا پنیر ذوب شود و یک غذا با طعمی متفاوت و\
    \ خوشمزه به دست آید. این روش‌ها به شما کمک می‌کند که از مواد باقی‌مانده به‌طور خلاقانه استفاده کنید و غذایی جدید و خوشمزه\
    \ تهیه نمایید."
  - 'برای تهیه یک وعده غذایی متفاوت و جذاب با مرغ، می‌توانید از چند روش مختلف استفاده کنید:


    1. **فیله مرغ با سس پستو**: مرغ را در فر با سس پستو و گوجه‌فرنگی حلقه شده بپزید. در انتها مقداری پنیر موزارلا روی آن بریزید
    و بگذارید آب شود. این غذا با نان تازه یا برنج سرو می‌شود.


    2. **ساندویچ مرغ**: مرغ را به قطعات کوچک خرد کنید و با ادویه‌جات و سبزیجات تفت دهید. سپس آن را در نان باگت یا نان تست
    با سس مایونز و سبزیجات تازه سرو کنید.


    3. **اسنک کالباس و مرغ**: می‌توانید سینه مرغ را با کالباس، پنیر و سبزیجاتی مثل قارچ و فلفل دلمه‌ای درون ساندویچ‌ساز تهیه
    کنید. این غذا بسیار سریع و خوشمزه است.


    4. **گریل مرغ**: مرغ را با ادویه‌های دلخواه مزه‌دار کنید و روی گریل بپزید. می‌توانید آن را همراه سالاد سبزیجات سرو کنید.


    5. **کباب افشون**: مرغ چرخ کرده را با پیاز و ادویه‌ها مخلوط کرده و به صورت کباب درست کنید. این کباب را می‌توانید با نان
    و سس‌های مختلف سرو کنید.


    6. **مرغ شکم پر**: مرغ را با مخلوطی از سبزیجات و برنج پر کنید و سپس آن را بپزید. این روش نه تنها طعمی خاص می‌دهد، بلکه
    ظاهر جذابی هم دارد.


    با این ایده‌ها می‌توانید یک وعده غذایی خوشمزه و متفاوت تهیه کنید که هم برای خودتان و هم برای مهمان‌ها جذاب باشد.'
  - "افرادی که طبع گرمی دارند و معده‌شان حساس است، بهتر است از غذاهایی استفاده کنند که هضم آسان‌تری دارند و باعث ایجاد نفخ\
    \ نمی‌شوند. غذاهای مناسب برای این افراد شامل سوپ‌ها و آش‌هایی با حبوبات نرم و ملایم، مانند آش شله قلمکار یا سوپ جو می‌باشد.\
    \ همچنین می‌توانند از سبزیجات پخته و بخارپز شده، مانند کدو و هویج استفاده کنند که به راحتی هضم می‌شوند.\n\nبرای جلوگیری\
    \ از نفخ، بهتر است غذاها با ادویه‌های ملایم و هضم آسان تهیه شوند، مانند زردچوبه و دارچین. همچنین باید از غذاهای چرب و\
    \ سرخ‌کردنی و ادویه‌جات تند پرهیز کنند، زیرا ممکن است باعث تحریک معده و ایجاد نفخ شوند. استفاده از میوه‌های هضم آسان مانند\
    \ موز و انجیر نیز می‌تواند مفید باشد. \n\nبه طور کلی، بهتر است غذاها به صورت بخارپز یا آب‌پز تهیه شوند و از مصرف غذاهای\
    \ سنگین و پرادویه خودداری شود تا عوارض معده و نفخ کاهش یابد."
- source_sentence: لیستی از کلمات تصادفی ایجاد کنید.
  sentences:
  - 'در اینجا لیستی از ده کلمه تصادفی وجود دارد:1. حرف زدن

    2. بخل

    3. آراستن

    4. طنین

    5. جیوه

    6. آتش سوزی

    7. خستگی ناپذیر

    8. شیطنت

    9. ترسیم کنید

    10. پاراگون'
  - به شکل هندسی که دارای 5 ضلع و 5 زاویه است، پنج ضلعی می گویند.
