    the override by calling the ECS IVR at 888-866-6924 and selecting the appropriate prompt.</td></tr></tbody></table>'
  - 'Context: customer. Do not tell the customer that the Customer Agreement only allows termination of a contract without
    an ETF if the change has a material adverse effect on the customer is to the calling plan. If the customer is undecided,
    the Supervisor/Support Coordinator must apply the credit and note the account accordingly. Refusal to Pay There is no
    "Refusal to Pay" process for the TUSC. Let customers know that, if they do not pay the surcharge, it continues to show
    as a balance owed on the account, which can cause interruption of their service for failing to pay billed charges.Table:
    <table border="1" cellpadding="5" cellspacing="0" width="100%"><tbody><tr><td> </td><td><b>6/22/22 Changes</b></td><td><b>12/1/22
    Changes</b></td></tr><tr><td valign="top"><b>What Changed?</b></td><td valign="top">The Administrative Charge was renamed
    the Administrative and Telco Recovery Charge.<br/><br/>The charge was increased to $3.30 per voice line. </td><td valign="top">The
    charge increased to $1.40 per data-only line.<br/></td></tr><tr><td valign="top"><b>Customer Notifications</b></td><td
    valign="top">Beginning 5/23/2022 and running through 6/22/2022, the following appeared on all Consumer Bills:<br/><br/>Notice
    of Changes to Administrative Charge:<br/>Effective June 23, 2022, the monthly Verizon Wireless Administrative and Telco
    Recovery Charge (formerly the Verizon Wireless Administrative Charge) for voice-capable devices will increase from $1.95
    to $3.30 per line. The charge for data-only devices will remain $0.06. The increased charge and updated name will appear
    on your next bill. For further information regarding the “Admin &amp; Telco Recovery Charge,” review the “Explanation
    of Surcharges” section of the bill.</td><td>Beginning 11/1/2022 and running through 11/30/2022, the following appeared
    on all Consumer Bills:<br/><br/>Notice of Changes to Administrative and Telco Recovery Charge:<br/>Effective December
    1, 2022, the monthly Verizon Wireless Administrative and Telco Recovery Charge for data-only plans will increase from
    $0.06 to $1.40 per line. If you have a device on a data-only plan on your account, the increased charge will appear on
    your next bill. Customers on 5G Home internet and LTE Home Internet plans will not see a monthly increase. The charge
    for plans with voice service will remain $3.30 per line. For further information regarding the “Admin &amp; Telco Recovery
    Charge,” review the “Explanation of Surcharges” section of the bill.<br/><br/></td></tr><tr><td valign="top"><b>Positioning
    for Customer Inquiries</b></td><td valign="top">Mr/Ms Customer,<br/>I want to help you understand the Administrative and
    Telco Recovery Charge and other fees or surcharges on your bill.<br/>The notification that you received states that the
    Administrative and Telco Recovery Charge will increase by $1.35 per voice line to $3.30, effective your June bill. <br/><br/>Verizon
    reviews the Administrative and Telco Recovery Charge from time to time and makes adjustments to recover some of the administrative
    and telco expenses and costs of complying with regulatory requirements we incur to provide service.<br/>Other fees included
    on your bill are listed out by line item on your bill and you can reference them at any time. I would be happy to assist
    with any additional questions you might have on your bill.</td><td>Mr/Ms Customer,<br/>I want to help you understand the
    Administrative and Telco Recovery Charge and other fees or surcharges on your bill.<br/>The notification that you received
    states that the Administrative and Telco Recovery Charge will increase from $0.06 to $1.40 per data-only line, effective
    your December bill.<br/><br/>Verizon reviews the Administrative and Telco Recovery Charge from time to time and makes
    adjustments to recover some of the administrative and telco expenses and costs of complying with regulatory requirements
    we incur to provide service.<br/>Other fees included on your bill are listed out by line item on your bill and you can
    reference them at any time. I would be happy to assist with any additional questions you<br/>might have on your bill.</td></tr></tbody></table>'
  - 'To access Payment Hub for Retail Sales: Users do not need to submit an Automated CS Request (ACSR) for basic access.
    Use the Payment Hub application to submit a Payment Investigation on behalf of the customer. Retail sales can access Payment
    Hub in the following manner: Search InfoManager for ‘Payment Hub Tool’ My POS > External Services > Payment Hub Note:
    To report a Payment Hub app error, use either option below: Open a Self-Help Ticket and select category: Payment Hub Call
    IT Support at 866-899-4872 and a ticket is opened and dispatched to the Payment Hub Support team for resolution.'
