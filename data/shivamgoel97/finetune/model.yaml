    customers misplace return-shipping labels used to send in expected devices from a device payment upgrade or Annual Upgrade.
    Orders Fulfilled by a Direct Channel If the order was fulfilled by a Direct Channel (e.g., Retail, CS, Telesales or Online):
    Order Does Not Give a Shipping Label, Customer a Computer/Printer or the Order was Processed by Indirect If an order does
    not give a shipping label email option, the customer does not have access to a computer/printer or the order was processed
