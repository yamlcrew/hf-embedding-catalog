  - source_sentence: What happens to the $20 monthly discount on a smartphone line activated with Bring Your Own Device (BYOD)
      if the line enters into a 1 or 2-year term contract?
    sentences:
    - 'Overview The TravelPass Bank allows customers to visualize and manage TravelPasses that have been granted as days on
      us from: Verizon Signature Benefits Verizon Visa Credit Card Location The TravelPass Bank is in the My Verizon app >
      Verizon Up > Keep track of it all: Open the MyVerizon app. Select Verizon Up. Select Keep track of it all. Select TravelPass.
      In the TravelPass Days tile, select Manage. Assign or transfer TravelPass Days to the desired MDN(s). Details Users
      can see the: Issue date Expiration date Used on date Country used in Note: Some promotional TravelPass days can be reassigned
      to other lines on the account. Refer to the Current Promos tab to check eligibility to reassign. To view TravelPass
      Bank details: In ACSS, select the Plan tab at the top of the window. In the Services & Perks and Promotions section,
      select International Services. TravelPass Bank details for the selected MDN are shown at the bottom of the section.
      Select the hyperlink Account-Level travel pass to view bank details for all account MDNs.'
    - 'Flexible Business Plan customers are eligible for a monthly discount on the smartphone access charge if they meet certain
      eligibility requirements. $20 discount off of smartphone lines activated with Bring Your Own Device (BYOD). Monthly
      discount is retained until the line enters into a 1 or 2-year term contract. Upgrades with BYOD or out of contract are
      not eligible. $20 discount off of smartphone lines activated or upgraded with a device payment. The monthly discount
      is retained even after the device payment loan is paid off until the line enters into a 1 or 2-year term contract. A
      line that is being upgraded must complete its existing contract term (if applicable) prior to being eligible for discount.
      Example: A $65 smartphone access charge minus an 8% business discount is $59.80. If the customer purchased the device
      through device payment, the customer receives an additional $20 monthly access discount. The monthly smartphone access
      charge is $39.80. Note: Customers who qualify for the $20 discount retain it as long as they continue to meet the requirements.
      Government customers are not eligible for device payment but can get BYOD discount if Flex plans are in their contract.
      See Eligible Customers section above. CLEU discounts are applied prior to monthly access discounts. The expired $30
      device payment promo is no longer available on the Flex plan. The plan was available between 11/16/16 - 9/30/17. Customers
      with a previous promotion keep it until the requirements are no longer met (e.g., out of contract or on device payment).
      The $30 discount falls off if the customer enters into a new device payment and is replaced with the current device
      payment $20 discount. The expired promotion codes are not available to be added manually. Availability Available to
      all: POS systems, including ACSS and My Business Accounts. B2B customers eligible for Flexible Business. How to Apply
      It If the customer is eligible but does not have this promotion, in ACSS follow the path: Promotions > Line Level Promotions
      > Promotion Maintenance > Current Features/Promotions.'
