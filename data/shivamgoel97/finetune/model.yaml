      left;" valign="top" width="33%"><ol><li>Retrieve the decimal Device ID from the device.</li><li>Attempt to reactivate
      the MDN.</li></ol></td></tr><tr><td style="text-align: left;" valign="top" width="33%">ESN/MEID has device payment agreement
      and may not be able to be reactivated.</td><td style="text-align: left;" valign="top" width="33%"><ul><li>The Device
      ID is on a device payment agreement.</li><li>The MDN is unable to reactivate in ACSS.</li></ul></td><td style="text-align:
      left;" valign="top" width="33%">Review the reason for disconnection and take the appropriate steps to resolve.</td></tr><tr><td
      style="text-align: left;" valign="top" width="33%">8191 - ESN/MFG not valid.</td><td style="text-align: left;" valign="top"
      width="33%"><p>The Device ID is incorrect or invalid (i.e., the Device ID is on the Lost, Stolen or Negative List).</p><p>The MDN
      is unable to reactivate in ACSS.</p></td><td style="text-align: left;" valign="top" width="33%"><ul><li>Contact Tech
      Support through CTI to remove the Device ID from the Lost, Stolen or Negative List.</li><li><span style="background-color:
      transparent;">Refer to the </span><a href="/content/km/categories/account-support/202290.component.html?componentPath=/jcrcontent/pagecontent/contents/content-section/tabbedcontent/manual-reactivation/blockcontent"
      target="_blank">Manual Reactivation</a><span style="background-color: transparent;"> section.</span></li></ul><p> </p></td></tr><tr><td
      style="text-align: left;" valign="top" width="33%">8192 - MDN has Global Phone feature but no SIM.</td><td style="text-align:
      left;" valign="top" width="33%">Mobile number has the Global Phone feature, but no SIM card.</td><td style="text-align:
      left;" valign="top" width="33%"><ol><li>Verify the Global Phone feature is active on the account, and confirm the customer''s SIM
      card number.</li><li><span style="background-color: transparent;">Start a Live Chat with the Service Desk to file a trouble
      ticket (if necessary).</span></li><li>Transfer the call to the Global Phone Support Team.</li></ol></td></tr><tr><td
      style="text-align: left;" valign="top" width="33%">8194 - Rented MDN cannot be reactivated.</td><td style="text-align:
      left;" valign="top" width="33%">Mobile number is a rental and cannot be reactivated.</td><td style="text-align: left;"
      valign="top" width="33%">Transfer the customer to Inside Sales, or refer the customer to Sales.</td></tr><tr><td style="text-align:
      left;" valign="top" width="33%">8195 - MDN was reactivated today on account. </td><td style="text-align: left;" valign="top"
      width="33%"><p>Only 1 reactivation is permitted per cycle.</p></td><td style="text-align: left;" valign="top" width="33%">MDN
      is unable to reactivate in ACSS.</td></tr><tr><td style="text-align: left;" valign="top" width="33%">8196 - MDN is not
      in the<span class="prices"> </span>correct status to reactivate.</td><td style="text-align: left;" valign="top" width="33%">MDN
      is no longer in an aging status, or the bill account is not in a valid status.</td><td style="text-align: left;" valign="top"
      width="33%"><ul><li>Refer to the <a href="/content/km/categories/account-support/202290.component.html?componentPath=/jcrcontent/pagecontent/contents/content-section/tabbedcontent/manual-reactivation/blockcontent"
      target="_blank">Manual Reactivation</a> section.</li><li>For accounts disconnected due to non-pay:<ul><li>Accept the
      customer''s payment to bring the account current (minus ETF).</li><li>Transfer the customer to Porting, Activation &amp;
      Credit at 888-866-6924.</li></ul></li></ul></td></tr><tr><td style="text-align: left;" valign="top" width="33%">8197
      - MDN on another account.</td><td style="text-align: left;" valign="top" width="33%">MDN is not available.</td><td style="text-align:
      left;" valign="top" width="33%">Suggest reactivation with a new MDN. If the customer agrees, refer to the <a href="/content/km/categories/account-support/202290.html?tab=tabbedcontent_tab1_id"
      target="_blank">Manual<b> </b>Reactivation</a> section.</td></tr><tr><td style="text-align: left;" valign="top" width="33%">8198
      - MDN was reactivated once already on this account in this cycle.</td><td style="text-align: left;" valign="top" width="33%"><ul><li>Only 1
      reactivation is permitted per cycle.</li><li>MDN is unable to reactivate in ACSS.</li></ul></td><td style="text-align:
      left;" valign="top" width="33%">Refer to the <a href="/content/km/categories/account-support/202290.component.html?componentPath=/jcrcontent/pagecontent/contents/content-section/tabbedcontent/manual-reactivation/blockcontent"
      target="_blank">Manual Reactivation</a> section.</td></tr><tr><td style="text-align: left;" valign="top" width="33%">8199
      - MDN has past due balance more than $24.99 and has been disconnected for 50 days or less.</td><td style="text-align:
      left;" valign="top" width="33%">The customer''s account is past due.</td><td style="text-align: left;" valign="top"
      width="33%"><p>Accept the customer''s payment to bring the account current (past due must be paid in full (minus ETF)
      and refer to the Manual Reactivation section after the account is current.</p><p>Note:<span class="prices"> </span>If
      the MDN has been disconnected  for non-pay, transfer to Porting, Activation &amp; Credit through CTI or at 888-866-6924.</p></td></tr><tr><td
      style="text-align: left;" valign="top" width="33%">8200 - MDN deactivated more than 50 days ago.</td><td style="text-align:
      left;" valign="top" width="33%"><p>A new activation is required.</p></td><td style="text-align: left;" valign="top"
      width="33%">Transfer the customer to Inside Sales, or refer the customer to Sales.</td></tr><tr><td style="text-align:
      left;" valign="top" width="33%">8202 - Secure MDN - LDN cannot be reactivated.</td><td style="text-align: left;" valign="top"
      width="33%">A secure MDN (i.e., Local Directory Number [LDN]) is unable to reactivate in ACSS.</td><td style="text-align:
      left;" valign="top" width="33%"><ol><li>Confirm the customer is a Federal Account.</li><li>Transfer the customer to
      the<span class="prices"> </span>Business and Government Account Support Team (BGCO) through CTI.</li></ol></td></tr><tr><td
      style="text-align: left;" valign="top" width="33%">8203 - Bill prep is running.</td><td style="text-align: left;" valign="top"
      width="33%">The account is in bill preparation.</td><td style="text-align: left;" valign="top" width="33%">Advise the customer
      to call back during normal business hours to reactivate.</td></tr><tr><td style="text-align: left;" valign="top" width="33%">8206
      - MDN ported in then was snapped back.</td><td style="text-align: left;" valign="top" width="33%">MDN is not available.</td><td
      style="text-align: left;" valign="top" width="33%">Suggest reactivation with a new MDN. If the customer agrees, refer
      to the <a href="/content/km/categories/account-support/202290.component.html?componentPath=/jcrcontent/pagecontent/contents/content-section/tabbedcontent/manual-reactivation/blockcontent"
      target="_blank">Manual Reactivation</a> section.</td></tr><tr><td style="text-align: left;" valign="top" width="33%">8208
      - OnStar MDN. User does not have correct security profile to reactivate MDN.</td><td style="text-align: left;" valign="top"
      width="33%">MDN is for an OnStar device.</td><td style="text-align: left;" valign="top" width="33%">Follow the appropriate area process
      for assisting OnStar customers.</td></tr><tr><td style="text-align: left;" valign="top" width="33%">8212 - A pending/failed
      order exists, view order info for transactions.</td><td style="text-align: left;" valign="top" width="33%">There is
      a pending order.</td><td style="text-align: left;" valign="top" width="33%"><ol><li>Resolve or delete the pending order.</li><li>Reactivate
      the MDN.</li><li>Resubmit the order (if applicable).</li></ol></td></tr><tr><td style="text-align: left;" valign="top"
      width="33%">8221 - Security deposit was refunded. User does not have correct security profile to reactivate MDN.</td><td
      style="text-align: left;" valign="top" width="33%">The security deposit was refunded on or after the disconnect date.</td><td
      style="text-align: left;" valign="top" width="33%"><p>For accounts with a past due balance:</p><ol><li>Accept the customer''s
      payment to bring the account current (minus ETF).</li><li>Transfer to Porting, Activation &amp; Credit using CTI or
      at 888-866-6924<span style="background-color: transparent;">.</span></li></ol></td></tr><tr><td style="text-align: left;"
      valign="top" width="33%">8224 - Prepaid converted to postpaid.</td><td style="text-align: left;" valign="top" width="33%">Customer
      was on prepaid service.</td><td style="text-align: left;" valign="top" width="33%">A prepaid-to-standard monthly migration
      prohibits reactivation.</td></tr><tr><td style="text-align: left;" valign="top" width="33%">ESN/MEID Active on another
      phone.</td><td style="text-align: left;" valign="top" width="33%">Device ID is already active.</td><td style="text-align:
      left;" valign="top" width="33%">Refer to the <a href="/content/km/categories/account-support/202290.component.html?componentPath=/jcrcontent/pagecontent/contents/content-section/tabbedcontent/manual-reactivation/blockcontent"
      target="_blank">Manual Reactivation</a> section.</td></tr><tr><td style="text-align: left;" valign="top" width="33%">Customer
      doesn''t exist.</td><td style="text-align: left;" valign="top" width="33%">Customer was not located in the system.</td><td
      style="text-align: left;" valign="top" width="33%"><ol><li>Search the billing system using the customer''s account number
      and MDN.</li><li>Attempt validation.</li></ol></td></tr><tr><td style="text-align: left;" valign="top" width="33%">Reconnect
      Failed - The current device has been reported lost or stolen by Asurion, or another carrier. If the customer has a replacement
      device from Asurion, use Device Change to activate it. If they found their lost device, have the customer call Asurion.
      Otherwise, help the customer activate or order a new device and SIM.</td><td style="text-align: left;" valign="top"
      width="33%"><ul><li>The Device ID has been added to the Negative list by Asurion or another carrier. </li><li>The system
      does not allow the Device ID to be reconnected on Verizon''s network or manually removed from the Negative List (only
      Asurion or the carrier that places the Device ID on the Negative Deny List is able to remove it from the Negative Deny
      List).</li></ul></td><td style="text-align: left;" valign="top" width="33%"><ul><li>Offer to activate another Device
      ID on the MDN if the customer has one available. <ul><li>Service can be restored to the line, but only by activating
      a non-lost/stolen device on that line.<ul><li>When the Device Change transaction is completed to an authorized device,
      the line is reconnected automatically, and the previous lost/stolen device remains on the Negative List.</li></ul></li></ul></li><li>Customers
      must be advised that Verizon is unable to reconnect their device because it has been reported lost/stolen by another
      party.</li><li>If the customer does not have another device to activate on the line, offer to review the account for
      replacement options for another device.</li></ul></td></tr><tr><td style="text-align: left;" valign="top" width="33%">Reconnect
      Failed - The current device has been reported lost or stolen. If the customer has another Device and SIM to use, please
      use Device Change to activate them. Otherwise, please order a new SIM and help the customer use it to activate a different
      device.</td><td style="text-align: left;" valign="top" width="33%">The Device ID was added to the Negative List on a
      different account (A Device ID that is placed on the Negative List due to a Lost/Stolen suspend can only be reconnected
      on the same account from which it was reported as lost/stolen).</td><td style="text-align: left;" valign="top" width="33%"><ul><li>If
      the customer is the account owner/manager of the account in which the Device ID was reported as lost/stolen, the Device
      ID can be reconnected on that account.</li><li>If the customer is not the account owner/manager of the account in which
      the Device ID was reported lost/stolen, advise that Verizon is unable to reconnect the device due to it has been reported
      lost/stolen by another party and offer to activate another device.</li><li>If the customer does not have another device
      to activate on the line, offer to review the account for replacement options for another device.</li></ul></td></tr></tbody></table>'
  - source_sentence: How can customers enable or disable the Safety Mode feature on the new Verizon Plan?
    sentences:
    - 'Context: to OLT VZW93333. Once toggled, these buttons cannot be turned off until the customer completes additional
      verification. Use the following positioning: "In order for us to continue setting up service, additional information
      is needed for your application".Non-Pay Fraud (NPFRD) The non-commissionable Sales ID NPFRD can be used in store and
      In-Store Pickup transactions by a manager to mitigate the risk of potential future chargebacks due to Fraud disconnects.
      Use of this Sales ID should only be used after other options have been exhausted, to prevent fraudulent activations.
      Refer to Sales ID Definitions and Employee Use of Them for full details.Table: <table border="1" cellpadding="5" cellspacing="0"
      width="100%"><tbody><tr><th style="text-align: center;" valign="top" width="5%">Step</th><th style="text-align: left;"
      valign="top">Action</th></tr><tr><td style="text-align: center;" valign="top" width="5%">1</td><td style="text-align:
      left;" valign="top">Witness the behavior.<br/></td></tr><tr><td style="text-align: center;" valign="top" width="5%">2</td><td
      style="text-align: left;" valign="top"><p>Access the JSN form through the URL and begin to input the relevant information.</p><ol><li>Select
      the appropriate form (either ID Fraud or First Party Fraud)<br/></li><li>Input the Manager''s (the individual who is
      completing the form) USWIN in the Rep ID section.<br/></li><li>Select at least 1 observation from the first set of observations
      and at least 2 observations from the transaction section.<br/><ul><li>Do not simply select yes for all of the observations.
      This information may be used to assist the legal team in the event of an escalation or lawsuit.<br/></li></ul></li></ol></td></tr><tr><td
      style="text-align: center;" valign="top" width="5%">3</td><td style="text-align: left;" valign="top">Submit the form
      and communicate the talk track below to the customer.<br/></td></tr></tbody></table>'
    - 'The Safety Mode feature must be enabled/disabled on the new Verizon Plan within the new My Verizon app, My Business,
      CS or by adding or removing the feature through POS. Note: Any removal of Safety Mode (via the new My Verizon app, My
      Verizon (online), My Business or CS) is future-dated to the beginning of the next bill cycle. When calling 611, customers
      who are in Safety Mode will hear, "You are in Safety Mode. You will return to full 4G LTE speed at the beginning of
      your next bill cycle on (cycle end date)."'
    - 'Context: Fee Promotion ComplianceCustomers pay a $35 activation fee when activating a tablet on a 2-year contract,
      month-to-month plan or device payment agreement at retail price and with Bring Your Own Device (BYOD). There is no suspension
      or reconnection fee when a customer reconnects after being on a 90-day suspend. Customers who do not activate their
      tablet with Verizon prepaid or post-pay data plans can use their tablet on Wi-Fi service where available. These customers
      have the option to activate their tablets at any time. Activating on a data plan (standard monthly) has a $35 activation
      fee. Refer to Prepaid Activations.Table: <table border="1" cellpadding="5" cellspacing="0" width="100%"><tbody><tr><td
      style="text-align: left;" valign="top" width="20%"><b>Channel</b></td><td style="text-align: left;" valign="top" width="80%"><b>Process</b></td></tr><tr><td
