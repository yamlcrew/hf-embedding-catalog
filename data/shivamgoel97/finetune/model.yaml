  - source_sentence: What are the requirements for a Temporary Driver's License to be considered an acceptable form of ID?
    sentences:
    - 'Service members that qualify have the following benefits: Military ECPD profile is not a requirement for a Military
      Suspend. Military customers can consecutively suspend service up to 3 years and 90 days. Suspending service is limited
      to voice lines of the service member and eligible family members. See disconnect options for data only lines. Device
      payments are suspended for the duration of the suspension. Military suspends do not disqualify promotions. Promotions
      automatically resume when the line is reactivated. Verizon provides early SIM unlocking for Military customers relocating
      overseas or outside of the coverage area. The device automatically unlocks 1 business day after the military suspension
      goes into effect. Do not file an appeal request.'
    - 'An acceptable form of ID must be presented and verified for all transactions requiring authentication. Acceptable individual
      IDs (Authorized Contact IDs) are: US State Issued Driver''s License US State Issued ID Temporary Drivers License within
      last 60 days (requires receipt accompanied by expired driver''s license) Military ID: Can be used to confirm customer
      identity, but is View Only Cannot be copied, faxed or scanned for any purpose US Passport (book/ID card) A passport
      (book/ID card) issued to an 8 year old may be valid for 10 years, but may not contain a verifiable image of the adult
      customer when the customer presents this ID at the age of 18. US VISA Resident Alien Card A Resident Alien card issued
      without an expiration must include a photo of the customer as an adult and not as a child or infant. Tribal Card Canadian
      Driver''s License See Completing a Canadian Credit Application for more information. Puerto Rico Driver''s License Matricula
      Consular Acceptable from: Mexico Argentina Brazil Ecuador Guatemala The Republic of Korea Note: Any photo copies made
      must be shredded after the transaction is complete. A supplemental ID is not required unless the credit application
      is placed on hold for additional verification. Customer must be 18 years of age or older. Customers in Alabama must
      be 19 years of age or older. Photo and non-photo IDs must be valid and current to be used in the verification process.
      Includes IDs that do or do not have an expiration date indicated on the ID Digital Identification is not accepted as
      a valid form of identification at this time.'
