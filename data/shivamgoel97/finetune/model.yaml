  - source_sentence: What should you do if the standard resolution time on a P2 ticket passes 36 hours?
    sentences:
    - 'Context: Chat with ITSD or call the IT Help Desk at 866-899-4872. For One Talk Main Business Lines that are down hard
      (i.e., do not function at all): Remark the line as customer''s Main Business Line when filing the AYS ticket. Change
      All One talk ticket to P2 status. Contact ITSD and ask for an ITSD lead if the escalation becomes urgent (supervisors
      only). Reach out to a member of BGCO CRT for further escalation if: The appropriate amount of support is not given.
      Standard resolution time on P2 ticket passes 36 hours. See One Talk Escalation for Remedy Ticket escalation.Table: <table
      border="1" cellpadding="5" cellspacing="0" width="100%"><tbody><tr><th style="text-align: left;" valign="top">Step</th><th
      style="text-align: left;" valign="top">Action</th></tr><tr><td style="text-align: center;" valign="top" width="5%">1</td><td
      valign="top" width="95%">Click <b>At Your Service</b> (located on the InfoManager Home page).<br/></td></tr><tr><td
      style="text-align: center;" valign="top" width="5%">2</td><td valign="top" width="95%">Click <b>Contact support to make
      a request or report a problem</b>.</td></tr><tr><td style="text-align: center;" valign="top" width="5%">3</td><td valign="top"
      width="95%">Enter <b>One Talk</b> as the search term.</td></tr><tr><td style="text-align: center;" valign="top" width="5%">4</td><td>Click <b>Create
      a Support Ticket</b>.<br/></td></tr><tr><td style="text-align: center;" valign="top" width="5%">5</td><td valign="top"
      width="95%">Click <b>Confirm User / Location Information</b>.</td></tr><tr><td style="text-align: center;" valign="top"
      width="5%">5</td><td valign="top" width="95%">Select <b>One Talk </b>in the Category dropdown menu.<br/></td></tr><tr><td
      style="text-align: center;" valign="top" width="5%">6</td><td valign="top" width="95%">Select <b>Switch Error (EA, EN,
      ES or EB)</b> in the <b>Primary Issue</b> dropdown menu.</td></tr><tr><td style="text-align: center;" valign="top" width="5%">7</td><td
      valign="top" width="95%"><p>Select the appropriate error in the Item dropdown menu.</p><p>Note: All One Talk Tickets
      have a P3 ticket level (these are worked with higher priority).</p></td></tr><tr><td style="text-align: center;" valign="top"
      width="5%">8</td><td valign="top" width="95%"><p>Open <a href="https://atyourservice.verizon.com/ays?id=support" target="_blank">AYS
      Ticket</a> with the following information:</p><ul><li>MDN affected<br/></li><li>ACSS order number</li><li>Reason for
      the order (e.g., Service Change, Disconnect, Add-a-Line, etc.)</li><li>Description of issue and impact</li><li>Desired
      end result</li><li>MTAS error information<ul><li>To add MTAS error information, capture a screen shot of MTAS transaction
      history.</li><li>To locate an MTAS element in error:<br/><ol><li>Open native <b>MTAS</b>.<br/></li><li>Hover on History
      in the top red menu bar.</li><li>Click on <b>Customer Transaction History</b>.</li><li>Type the MDN into the MDN field.</li><li>Click<b> send
      transaction</b> (bottom left gray button).</li><li>Locate any switch element (e.g., ALUHSS, NSN, BSTAS) highlighted
      in yellow in the window that opens.</li><li>Note any highlighted switch elements in the AYS incident or paste a screenshot.</li><li>Click
      the blue name of the element to open the XML details of the element transaction. </li><li>Look for an error description
      and note this in the AYS Incident or paste a screenshot.</li><li>Remark the line in ACSS with INC number in case the
      account requires follow up on the ticket.</li><li>Open the AYS portal and remark the ticket with a status update to
      receive updates.<ul><li>The ticket has the updates posted within 2 hours.<br/></li><li>Information Technology Support
      Desk (ITSD) provides comments when available.</li></ul></li></ol></li></ul></li></ul><p>Note: One Talk Ticket sub-categories
      are available once the ticket type (i.e., En error) is chosen.</p><ul></ul></td></tr></tbody></table>'
    - 'Context: or monitored for quality purposes. (See the Call Back Suggested Scripting section)How to Make a Call Back
      for CS / Prepaid When engaged in a conversation with a customer and there is an unexpected call drop: The representative
      must make every attempt possible to contact the customer to prevent the customer from having to call back. This creates
      a poor customer experience and increases overall call time and repeat calls.POC Survey Call Back Point of Contact (POC)
      Survey call back request process:How to Schedule a Call Back To arrange a call back with a customer when additional
      follow-up is required:Table: <table border="1" cellpadding="5" cellspacing="0" width="100%"><tbody><tr><th style="text-align:
      left;" valign="top">If ...</th><th style="text-align: left;" valign="top">Then ...</th></tr><tr><td style="text-align:
      left;" valign="top">a call drops while talking to a customer </td><td style="text-align: left;" valign="top"><p>follow
      these steps:</p><ol><li>Access ACSS.</li><li>Send a dropped call text message by n<span style="font-family: nhg-text-roman
      , arial , sans-serif;background-color: transparent;">avigate to <b>ACSS Web</b> &gt; <b>Device Details</b> &gt; <b>Send
      Message</b> &gt; <b>Dropped</b> &gt; <b>Free VZW MSG-DO NOT REPLY</b> &gt; <b>I apologize that our call disconnected;
      I will call you back momentarily. Thank you for your patience</b>.</span></li><li>Call the customer using 1 of the following:<ul><li>The
      alternate Can Be Reached (CBR) number</li><li>The customer''s MDN</li></ul></li><li>Disclose to the customer that the
      call is being recorded and monitored for quality purposes.<ul><li>For more information, see the Call Back Suggested
      Scripting section.</li></ul></li><li>Make 2 back to back call attempts to reach the customer.</li><li>Leave a message
      using the call back suggested scripting if the customer cannot be reached.</li><li>Remark the account and include the
      results of the interaction and any action taken.<ul><li>Example: Call dropped Attempted to reach customer on MDN, left
      message (include details of what was discussed prior to the call dropping)</li></ul></li></ol><p><span style="background-color:
      transparent;">Note: Calls must be placed before 8 AM or after 9 PM in the recipient''s time zone.</span><br/></p><ul><li>This
      policy applies to non-sales related customer contact.</li><li>If a customer requests a callback before 8 AM or after
      9 PM, remark the account with the customer''s request.<ul><li>This does not apply when calling a customer back on a
      Verizon MDN and the customer initiated the call.</li></ul></li><li>For additional information on how to remark a customer''s
      account, refer to the <a href="/content/km/categories/account-support/201639.html" target="_blank">Remarks Policy</a>.</li></ul></td></tr><tr><td
      style="text-align: left;" valign="top">a new inbound call is received before getting a chance to call back the customer</td><td
      style="text-align: left;" valign="top"><p>follow these steps:</p><ol><li>Access ACSS.</li><li>Send a dropped call text
      message by navigate to <b>ACSS Web</b> &gt; <b>Device Details</b> &gt; <b>Send Message</b> &gt; <b>Dropped</b> &gt; <b>Free
      VZW MSG-DO NOT REPLY</b> &gt; <b>I apologize that our call disconnected; I will call you back momentarily. Thank you
      for your patience</b>.</li><li>Make 1 attempt to reach the customer using 1 of the following:<ul><li>The alternate CBR
      number</li><li>The customer''s MDN listed in ACSS</li></ul></li><li>Use the <a href="/content/km/categories/account-support/202086.html#rteWithHeader_-1521497221"
      target="_blank">Call Back Suggested Scripting</a>.</li><li>Continue the call through a resolution if the customer is
      reached.</li><li>Leave a message using the call back suggested scripting if the customer cannot be reached.</li><li>Remark
      the account and include the results of the interaction and any actions taken.</li></ol><p><span style="font-family:
      nhg-text-roman , Arial , sans-serif;">Note: See the </span><a href="/content/km/categories/channel-operations/222946.html"
      style="background-color: rgb(255,255,255);" target="_blank">Messaging OST</a><span style="font-family: nhg-text-roman
      , Arial , sans-serif;"> for more information regarding dropped chats.</span></p></td></tr><tr><td style="text-align:
      left;" valign="top">the customer requested a call back, a call back was promised or misinformation was provided during
      the initial call<br/></td><td style="text-align: left;" valign="top"><p> follow these steps:</p><ol><li>Call the customer
      on the CBR number provided. <ul><li>If the CBR is not valid, call the Verizon mobile number.</li></ul></li><li>Use the
      <a href="/content/km/categories/account-support/202086.html#rteWithHeader_-1521497221" target="_blank">Call Back Suggested
      Scripting</a>.<br/></li><li>Provide the customer with all of the information necessary to achieve First Call Resolution
      (FCR).<br/></li><li>Remark the account and include the result of the interaction and any action taken on the account. <ul><li>Example:
      Customer call back: Contacted (customer name) and provided proration information regarding the plan change made on (date)
      or Customer call back: Confirmed resolution.</li></ul></li></ol></td></tr><tr><td style="text-align: left;" valign="top">the
      customer has already been authenticated while on the customer''s device but requires a call back on another line to
      further troubleshooting</td><td style="text-align: left;" valign="top"><div>follow these steps:</div><ol style="margin-bottom:
      0.0px;"><li>Ask the customer to provide the number to call the customer back on.</li><li>Inform the customer to remain
      on the line until the customer is told to hang up.</li><li>Call the number.</li><li><span style="background-color: transparent;">Validate
      the person who answers the phone is the customer.</span><br/></li><li>Inform the customer to hang up the device while
      the representative troubleshoots on the other line, once validated.</li></ol></td></tr><tr><td style="text-align: left;"
      valign="top">the customer did not authenticate or if the call is disconnected prior to the customer answering the call
      back</td><td style="text-align: left;" valign="top"><div>follow these steps:</div><ol><li>Call the customer on either
      the CBR number provided or the Verizon mobile number.<br/></li><li>Use the <a href="/content/km/categories/account-support/202086.html#rteWithHeader_-1521497221"
      target="_blank">Call Back Suggested Scripting</a>.<br/></li><li>Provide the customer with all of the information necessary
      to achieve First Call Resolution (FCR).<br/></li><li>Remark the account and include the result of the interaction and
      any action taken on the account. <ul><li>Example: "Customer call back: Contacted (customer name) and provided proration
      information regarding the plan change made on (date) or Customer call back: Confirmed resolution."</li></ul></li></ol></td></tr></tbody></table>'
    - 'Context: unable to complete using Winback flow. Note: For more information refer to Step 11 on Flex - Add a Line (ACSS
      Modernization).Authorized contacts for business and government customers have the option to reactivate service within
      50 days of being disconnected if the customer meets the Reactivation Policy eligibility requirements. In some cases,
      the device must be reactivated immediately.When reactivating a customer from a voluntary disconnect, the customer must
      meet the eligibility criteria.See below for how to handle:Reactivating a Disconnected MDN (ACSS)ACSS Reactivation Restrictions
      and Processes Note: For Non-Pay D35 Reactivation requests on National Accounts, contact the B2B Collections Team Supervisor.Table:
      <table border="1" cellpadding="5" width="100%"><tbody><tr><td style="text-align: left;" valign="top" width="33%"><b>Error
      Message</b></td><td style="text-align: left;" valign="top" width="33%"><b>Definition</b></td><td style="text-align:
      left;" valign="top" width="33%"><b>Process</b></td></tr><tr><td style="text-align: left;" valign="top" width="33%">You
      are not authorized to proceed with this transaction.</td><td style="text-align: left;" valign="top" width="33%">User
      attempting to reactivate from a D35 disconnect is not on the D35 React Team.</td><td style="text-align: left;" valign="top"
      width="33%">Refer to<span class="prices"> </span>the <a href="/content/km/categories/account-support/202290.component.html?componentPath=/jcrcontent/pagecontent/contents/content-section/tabbedcontent/involuntary-disconnect/blockcontent"
      target="_blank">Involuntary Disconnect</a> section.</td></tr><tr><td style="text-align: left;" valign="top" width="33%">653
      - MDN disconnected for fraud. User does not have correct security profile to reactivate MDN.</td><td style="text-align:
      left;" valign="top" width="33%">Customer was disconnected for fraud.</td><td style="text-align: left;" valign="top"
      width="33%">Refer to Fraud for assistance.</td></tr><tr><td style="text-align: left;" valign="top" width="33%">8189
      - ESN/MEID not valid. </td><td style="text-align: left;" valign="top" width="33%"><p>The Device ID is invalid:</p><ul><li>All
