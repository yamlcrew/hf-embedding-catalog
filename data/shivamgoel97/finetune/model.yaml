- source_sentence: What are the requirements for a Temporary Driver's License to be considered an acceptable form of ID?
  sentences:
  - 'Service members that qualify have the following benefits: Military ECPD profile is not a requirement for a Military Suspend.
    Military customers can consecutively suspend service up to 3 years and 90 days. Suspending service is limited to voice
    lines of the service member and eligible family members. See disconnect options for data only lines. Device payments are
    suspended for the duration of the suspension. Military suspends do not disqualify promotions. Promotions automatically
    resume when the line is reactivated. Verizon provides early SIM unlocking for Military customers relocating overseas or
    outside of the coverage area. The device automatically unlocks 1 business day after the military suspension goes into
    effect. Do not file an appeal request.'
  - 'An acceptable form of ID must be presented and verified for all transactions requiring authentication. Acceptable individual
    IDs (Authorized Contact IDs) are: US State Issued Driver''s License US State Issued ID Temporary Drivers License within
    last 60 days (requires receipt accompanied by expired driver''s license) Military ID: Can be used to confirm customer
    identity, but is View Only Cannot be copied, faxed or scanned for any purpose US Passport (book/ID card) A passport (book/ID
    card) issued to an 8 year old may be valid for 10 years, but may not contain a verifiable image of the adult customer
    when the customer presents this ID at the age of 18. US VISA Resident Alien Card A Resident Alien card issued without
    an expiration must include a photo of the customer as an adult and not as a child or infant. Tribal Card Canadian Driver''s
    License See Completing a Canadian Credit Application for more information. Puerto Rico Driver''s License Matricula Consular
    Acceptable from: Mexico Argentina Brazil Ecuador Guatemala The Republic of Korea Note: Any photo copies made must be shredded
    after the transaction is complete. A supplemental ID is not required unless the credit application is placed on hold for
    additional verification. Customer must be 18 years of age or older. Customers in Alabama must be 19 years of age or older.
    Photo and non-photo IDs must be valid and current to be used in the verification process. Includes IDs that do or do not
    have an expiration date indicated on the ID Digital Identification is not accepted as a valid form of identification at
    this time.'
  - 'Context: these steps: Verizon gift cards cannot be: Applied to a customer''s bill when enrolled in Billing On Behalf
    Of (BOBO) or any combined services bill Used to pay charges that do not appear on a Verizon billHandling Misapplied Payments
    for ONE-BILL Complete a Payment Hub request when the customer’s payment was applied incorrectly to Verizon Wireless or
    Verizon Communications. Transfer Payment from Verizon Communications to Verizon Wireless - Payment Hub Specifics Payment
    Hub Specifics - Transfer Payment from Verizon Wireless to Verizon Communications In this situation the customer made a
    payment to Verizon wireless that was intended for Verizon communications.Table: <table border="1" cellpadding="5" cellspacing="0"
    width="100%"><tbody><tr><th style="text-align: center;" valign="top" width="5%">Step</th><th style="text-align: left;"
    valign="top">Action</th></tr><tr><td style="text-align: center;" valign="top" width="5%">1</td><td style="text-align:
    left;" valign="top">Select <b>Request Type</b> &gt; <b>Investigate Payment.</b></td></tr><tr><td style="text-align: center;"
    valign="top" width="5%">2</td><td style="text-align: left;" valign="top"><p>Include the following in <b>Remarks</b>:</p><ul><li>ONE-BILL
    customer needs to have VZW Gift Card payment posted to their account</li><li>Gift Card PIN #</li></ul><p>Note: Do not
    include the gift card number in the remarks.</p></td></tr><tr><td style="text-align: center;" valign="top" width="5%">3</td><td
    style="text-align: left;" valign="top"><p>Select the amount of gift card value for <b>Payment Amount</b>.</p></td></tr><tr><td
    style="text-align: center;" valign="top" width="5%">4</td><td style="text-align: left;" valign="top">Select today''s date
    for <b>Payment Date</b>.</td></tr><tr><td style="text-align: center;" valign="top" width="5%">5</td><td style="text-align:
    left;" valign="top">Select <b>ACH</b> for <b>Payment Method</b>.<ul><li><b>Routing Number</b><span style="font-family:
    nhg-text-roman , arial , sans-serif;">: Input all 1s (requires 9 digits) into this field (e.g., 111111111)</span></li><li><span
    style="font-family: nhg-text-roman , arial , sans-serif;"><b>Bank Account Number</b>: Input the gift card number into
    this field</span></li></ul></td></tr><tr><td style="text-align: center;" valign="top" width="5%">6</td><td style="text-align:
    left;" valign="top">Submit the request.<br/></td></tr></tbody></table>'
