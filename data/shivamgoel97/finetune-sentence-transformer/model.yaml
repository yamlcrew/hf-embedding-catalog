    the aggregate could adversely affect our business and results of operations.Even if we are ableto successfully develop
    and implement our network of Light Vehicles, there may be heightened public skepticism of this nascent service offering.In
    particular, there couldbe negative public perception surrounding bike and scooter sharing, including the overall safety
    and the potential for injuries occurring as a result of accidents involving anincreased number of bikes and scooters on
    the road, and the general safety of the bikes and scooters themselves.Such negative public perception may result from
    incidentson our platform or incidents involving our competitors’ offerings.We design and contract to manufacture bikes
