    on the consolidated statements of operations.Acquisition costs, such as legal and consulting fees, are expensed as incurred.GoodwillGoodwill
    represents the excess of the purchase price over the fair value of the net tangible and identifiable intangible assets
    acquired in a business combination.Intangible assets resulting from the acquisition of entities accounted for using the
    purchase method of accounting are estimated by us based on the fair value of assetsreceived. Intangible assets are amortized
    on a straight-line basis over the estimated useful lives which range from two to twelve years.Goodwill is not subject
    to amortization, but is tested for impairment on an annual basis during the fourth quarter or whenever events or changes
    in circumstancesindicate the carrying amount of the goodwill may not be recoverable. As part of the annual goodwill impairment
    test, we first perform a qualitative assessment to determinewhether further impairment testing is necessary. If, as a
    result of its qualitative assessment, it is more-likely-than-not that the fair value of the reporting unit is less than
    itscarrying amounts, the quantitative impairment test will be required. There was no impairment of goodwill recorded for
    the years ended December 31, 2021, 2020 and 2019.Recent Accounting PronouncementsSee Note 2 to our consolidated financial
    statements included elsewhere in this Annual Report on Form 10-K for recently issued accounting pronouncements notyet
    adopted as of the date of this report. Components of Results of OperationsAs noted above, we expect to see decreased levels
    of demand for our platform, decreased numbers of new rider activations, and negative impacts on revenue for solong as
    responsive measures  to COVID-19 remain  in place when compared  to levels prior to the onset of the COVID-19 pandemic  in
    March  2020. We have adoptedmultiple measures in response to the COVID-19 pandemic. We cannot be certain that these actions
    will mitigate some or all of the negative effects of the pandemic on ourbusiness. In light of the evolving and unpredictable
    effects of COVID-19, we are not currently in a position to forecast the expected impact of COVID-19 on our financialand
    operating results in future periods.Revenue RecognitionRevenue consists of revenue recognized from fees paid by drivers
    for use of our Lyft Platform offerings, Concierge platform fees from organizations that use ourConcierge offering, subscription
    fees paid by riders to access transportation options through the Lyft Platform, revenue from our vehicle service centers
    and revenue fromlicensing and data access agreements. Revenue derived from these offerings are recognized in accordance
    with ASC 606 as described in the Critical Accounting Policiesand Estimates above and in Note 2 of the notes to our consolidated
    financial statements.Revenue also consists of rental revenues recognized through leases or subleases primarily from Flexdrive,
    Lyft Rentals, and our network of Light Vehicles, whichincludes revenue generated from single-use ride fees paid by riders
    of Light Vehicles. Revenue derived from these offerings are recognized in accordance with ASC 842 asdescribed in the Critical
    Accounting Policies and Estimates above and in Note 2 of the notes to our consolidated financial statements.We offer various
    incentive programs to drivers that are recorded as reduction to revenue if we do not receive a distinct good or service
    in consideration or if wecannot reasonably estimate the fair value of goods or services received.Cost of RevenueCost of
    revenue consists of costs directly related to revenue generating transactions through our multimodal platform which primarily
    includes insurance costs,payment processing charges, and other costs. Insurance costs consist of insurance generally required
    under TNC and city regulations for ridesharing and bike and scooterrentals and also includes occupational hazard insurance
    for drivers in California. Payment processing charges include merchant fees, chargebacks and failed charges. Othercosts  included  in  cost  of  revenue  are  hosting  and  platform-related  technology  costs,  vehicle  lease  expenses,  personnel-related  compensation  costs,  depreciation,amortization
    of technology-related intangible assets, asset write-off charges and remarketing gains and losses related to the sale
    of vehicles.Operations and SupportOperations and support expenses primarily consist of personnel-related compensation
    costs of local operations teams and teams who provide phone, email andchat  support  to  users,  bike  and  scooter  fleet  operations  support  costs,  driver  background  checks  and  onboarding  costs,  fees  paid  to  third-parties  providing  operationssupport,
    facility costs and certain car rental fleet support costs. Bike and scooter fleet operations support costs include general
    repairs and maintenance, and other customersupport activities related to repositioning bikes and scooters for rider convenience,
    cleaning and safety checks.Research and Development61
