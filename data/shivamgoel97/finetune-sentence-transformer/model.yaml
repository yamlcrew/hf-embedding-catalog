    financial condition and results of operations.If we are unable to efficiently grow and further develop our network of
    Light Vehicles, which may not grow as we expect or become profitable over time, and managethe related risks, our business,
    financial condition and results of operations could be adversely affected.While some major cities have widely adopted
    bike and scooter sharing, there can be no assurance that new markets we enter will accept, or existing markets willcontinue
    to accept, bike and scooter sharing, and even if they do, that we will be able to execute on our business strategy or
    that our related offerings will be successful insuch markets.For example, in 2021, in New York City, a competing operator
    named Joco attempted to launch a bike share program in violation of Citi Bike’s exclusivity,arguing that New York City
    could not regulate Joco because Joco’s stations were in private garages.The City successfully obtained a preliminary injunction
    against Joco,with our support.However, Joco continues to operate in a limited manner and it is possible Lyft may need
    to further support the City in additional legal action against Joco.A negative determination in other legal disputes regarding
    bike and scooter sharing, including an adverse determination regarding our existing rights to operate, couldadversely
    affect our competitive position and results of operations.Additionally, we may from time to time be denied permits to
    operate, or be temporarily restricted fromoperating due to public health and safety measures, our bike share program or
    scooter share program in certain jurisdictions.For example, the City of Miami suspendedrentals  of bikes and scooters
    from March through October 2020 as a result of the COVID-19 pandemic  and again suspended rentals  of scooters from December  2020through
    February 2021 and for a brief period in November 2021 due to concerns with certain aspects of the program.While we do
