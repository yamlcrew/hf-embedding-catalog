    scooters that meets our standards is critical to our operations.We expect to continue to rely on external suppliers in
    the future.There can be no assurance we will beable to maintain our existing relationships with these suppliers and continue
    to be able to source our bikes and scooters on a stable basis, at a reasonable price or at all.Wealso  design  and  contract  to  manufacture  certain  assets  related  to  our  network  of  Light  Vehicles  and  we  rely  on  a  small  number  of  suppliers  for  components  andmanufacturing
