      the drivers either as the difference between an amount paid by a rider based on an upfront quoted fare and the amountearned
      by a driver based on actual time and distance for the trip or as a fixed percentage of the fare charged to the rider.In
      an upfront quoted fare arrangement, as we do notcontrol the driver’s actions at any point in the transaction to limit
      the time and distance for the trip, we take on risks related to the driver’s actions which may not be fullymitigated.We
      earn a variable amount from the drivers and may record a loss from a transaction, which is recorded as a reduction to
      revenue, in instances where an up-frontquoted fare offered to a rider is less than the amount we are committed to pay
