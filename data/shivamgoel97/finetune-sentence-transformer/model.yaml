    result in tariff liabilities,including tariffs on past imports, as well as penalties and interest.
  - We provide a service to drivers to complete a successful transportation service for riders.This service includes on-demand
    lead generation that assists drivers tofind, receive and fulfill on-demand requests from riders seeking transportation
    services and related collection activities using our Lyft Platform.As a result, our singleperformance obligation in the
    transaction is to connect drivers with riders to facilitate the completion of a successful transportation service for
    riders.We evaluate the presentation of revenue on a gross versus net basis based on whether we act as a principal by controlling
    the transportation service provided to therider or whether we act as an agent by arranging for third parties to provide
    the service to the rider.We facilitate the provision of a transportation service by a driver to arider (the driver’s customer)
    in order for the driver to fulfill their contractual promise to the rider.The driver fulfills their promise to provide
    a transportation service to theircustomer  through  use  of  the  Lyft  Platform.While  we  facilitate  setting  the  price  for  transportation  services,  the  drivers  and  riders  have  the  discretion  in  accepting  thetransaction
    price through the platform.We do not control the transportation services being provided to the rider nor do we have inventory
    risk related to the transportationservices.As a result, we act as an agent in facilitating the ability for a driver to
    provide a transportation service to a rider.We report revenue on a net basis, reflecting the service fees and commissions
    owed to us from the drivers as revenue, and not the gross amount collected from therider.We made this determination of
    not being primarily responsible for the services since we do not promise the transportation services, do not contract
    with drivers toprovide transportation services on our behalf, do not control whether the driver accepts or declines the
    transportation request via the Lyft Platform, and do not control theprovision of transportation services by drivers to
    riders at any point in time either before, during, or after, the trip.We consider the ToS and our customary business practices
    in identifying the contracts under ASC 606.As our customary business practice, a contract existsbetween the driver and
    us when the driver’s ability to cancel the trip lapses, which typically is upon pickup of the rider.We collect the fare
    and related charges from riderson behalf of drivers using the rider’s pre-authorized credit card or other payment mechanism
    and retain any fees owed to us before making the remaining disbursement todrivers; thus the driver’s ability and intent
    to pay is not subject to significant judgment.We earn service fees and commissions from the drivers either as the difference
    between an amount paid by a rider based on an upfront quoted fare and the amountearned by a driver based on actual time
    and distance for the trip or as a fixed percentage of the fare charged to the rider.In an upfront quoted fare arrangement,
    as we do notcontrol the driver’s actions at any point in the transaction to limit the time and distance for the trip,
    we take on risks related to the driver’s actions which may not be fullymitigated.We earn a variable amount from the drivers
    and may record a loss from a transaction, which is recorded as a reduction to revenue, in instances where an up-frontquoted
    fare offered to a rider is less than the amount we are committed to pay the driver.We  recognize  revenue  upon  completion  of  a  ride  as  the  single  performance  obligation  is  satisfied  and  we  have  the  right  to  receive  payment  for  the  servicesrendered
    upon the completion of the ride.We offer various incentive programs to drivers that are recorded as reduction to revenue
    if we do not receive a distinct good or service in consideration or if wecannot reasonably estimate the fair value of
    goods or services received.In some cases, we also earn Concierge platform fees from organizations that use our Concierge
    offering, which is a product that allows organizations to requestrides for their customers and employees through our ridesharing
    marketplace.Concierge platform fees are earned as a fixed dollar amount per ride or a percentage of theride price depending
    on the contract and such Concierge platform fee revenue is recognized on a gross basis.We recognize revenue from subscription
    fees paid by users to access transportation options through the Lyft Platform and mobile-based applications over theapplicable
    subscription period.We generate revenue from licensing and data access agreements.We are primarily responsible for fulfilling
    our promise to provide rideshare data and access toFlexdrive vehicles and bear the fulfillment risk, and the responsibility
    of providing the data, over the license period.We act as a principal in delivering the data and accesslicenses and present
    revenue on a gross basis.Consideration allocated to each performance obligation, the data delivery and vehicle access,
    are determined by assigning therelative fair value to each of the performance obligations.
