      their promise to provide a transportation service to theircustomer  through  use  of  the  Lyft  Platform.While  we  facilitate  setting  the  price  for  transportation  services,  the  drivers  and  riders  have  the  discretion  in  accepting  thetransaction
      price through the platform.We do not control the transportation services being provided to the rider nor do we have
      inventory risk related to the transportationservices.As a result, we act as an agent in facilitating the ability for
      a driver to provide a transportation service to a rider.We report revenue on a net basis, reflecting the service fees
      and commissions owed to us from the drivers as revenue, and not the gross amount collected from therider.We made this
      determination of not being primarily responsible for the services since we do not promise the transportation services,
      do not contract with drivers toprovide transportation services on our behalf, do not control whether the driver accepts
      or declines the transportation request via the Lyft Platform, and do not control theprovision of transportation services
      by drivers to riders at any point in time either before, during, or after, the trip.We consider the ToS and our customary
      business practices in identifying the contracts under ASC 606.As our customary business practice, a contract existsbetween
      the driver and us when the driver’s ability to cancel the trip lapses, which typically is upon pickup of the rider.We
      collect the fare and related charges from riderson behalf of drivers using the rider’s pre-authorized credit card or
      other payment mechanism and retain any fees owed to us before making the remaining disbursement todrivers; thus the
