widgetData:
- source_sentence: The U.S. International Trade Commission (ITC) has become a significant forum to litigate intellectual property
    disputes. An adverse result in an ITC action can lead to a prohibition on importing infringing products, which, given
    the importance of the U.S. market, could significantly impact a company including preventing the importation of many important
    products or necessitating workarounds that may limit certain features of their products.
  sentences:
  - What was the overall impact of foreign currencies on net sales in 2023?
  - What potential consequences could result from intellectual property disputes in the U.S. International Trade Commission
    for the company?
  - What was the total purchase consideration for the VMware acquisition?
- source_sentence: Reinsurance contracts are normally classified as treaty or facultative contracts. Treaty reinsurance refers
    to reinsurance coverage for all or a portion of a specified group or class of risks ceded by a direct insurer or reinsurer,
    while facultative reinsurance involves coverage of specific individual underlying risks. Reinsurance contracts are further
    classified as quota-share or excess.
  sentences:
  - What type of information will you find under 'Note 13 — Commitments and Contingencies' in an Annual Report on Form 10-K?
  - What type of reinsurance contracts are offered by Berkshire Hathaway Reinsurance Group?
  - What are the consequences for a company violating anti-bribery laws in the U.S.?
- source_sentence: Commitments and contingencies related to legal proceedings are detailed in Part II, Item 8, under 'Financial
    Statements and Supplementary Data – Note 14'.
  sentences:
  - Where can one find commitments and contingencies related to legal proceedings in the context provided?
  - What is discussed in Item 3. Legal Proceedings of a company's report?
  - How are net realized capital gains and losses treated in the financial statements according to the Company?
- source_sentence: The “Glossary of Terms and Acronyms” is included on pages 315-321 in the set of financial documents.
  sentences:
  - What are the principles used in preparing the discussed financial statements?
  - What is the total remaining budget for future common stock repurchases under the company's stock repurchase programs as
    of December 31, 2023?
  - Where is the “Glossary of Terms and Acronyms” located in a set of financial documents?
- source_sentence: The table presents our market risk by asset category for positions accounted for at fair value or accounted
    for at the lower of cost or fair value, that are not included in VaR. As of December 2023, equity was at $1,562 million
    and debt was at $2,446 million.
  sentences:
  - What are the market risk values for Goldman Sachs' equity and debt positions not included in VaR as of December 2023?
  - What was the conclusion of the Company's review regarding the impact of the American Rescue Plan, the Consolidated Appropriations
    Act, 2021, and related tax provisions on its business for the fiscal year ended June 30, 2023?
  - How much did the company's finance lease obligations total as of December 31, 2023?
