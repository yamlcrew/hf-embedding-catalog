  sentences:
  - '"C तथा C++ उभयोः मध्येऽपि, इदं समानं मार्गं इम्प्लिमेण्ट् कर्तुमनुसरति ।"'
  - यदि केचित् तौ हिंसितुं चेष्टन्ते तर्हि तयो र्वदनाभ्याम् अग्नि र्निर्गत्य तयोः शत्रून् भस्मीकरिष्यति। यः कश्चित् तौ हिंसितुं
