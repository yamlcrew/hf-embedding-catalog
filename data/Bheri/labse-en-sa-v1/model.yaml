  sentences:
  - तथापि तं प्रस्फुरदात्तकार्मुकं त्रिभिः शरैर्यन्तृशिरः क्षुरेणा हयांश्चतुर्भिश्च पुनस्त्रिभिर्ध्वज धनंजयो द्रौणिरथादपातयत्॥
