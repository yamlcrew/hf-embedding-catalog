- source_sentence: 'It tarnishes in air to produce a whitish oxidized layer on the surface.

    '
  sentences:
  - उपस्थितानां रत्नानां श्रेष्ठानामर्घहारिणाम्। नादृश्यत परः पारो नापरस्तत्र भारत॥
  - 'इदं वायौ कलङ्कितं भवति, येन तले श्वेतवर्णीयं आक्सिडैस्ड्-आस्तरणं निर्मीयते।

    '
  - आचार्येणाभ्यनुज्ञातश्चतुर्णामेकमाश्रमम्। आविमोक्षाच्छरीरस्य सोऽवतिष्ठेद् यथाविधि॥
- source_sentence: 'If you''re planning to fund part or all of your child''s higher education, it''s best to start saving
    early on.

    '
  sentences:
  - समयं वाजिमेधस्य विदित्वा पुरुषर्षभः। यथोक्तो धर्मपुत्रेण प्रव्रजन् स्वपुरी प्रति॥
  - 'यदि भवान् भवतः सन्ततेः उच्चशिक्षायाः कृते, आंशिकं वा सम्पूर्णं वा शुल्कं दातुम् इच्छति तर्हि तदर्थं पूर्वमेव धनसञ्चयस्य
    आरम्भः क्षेमकरः भवेत्।

    '
  - '"""तदनन्तरं तेषां सप्तकंसधारिणां सप्तदूतानाम् एक आगत्य मां सम्भाष्यावदत्, अत्रागच्छ, मेदिन्या नरपतयो यया वेश्यया सार्द्धं
    व्यभिचारकर्म्म कृतवन्तः,"""'
- source_sentence: In spite of these, Dhananjaya made Drona's son carless by cutting off the out-stretched bow of his foe
    with three shafts, killing his driver with a razor like shaft and making away with his banner with three and his four
