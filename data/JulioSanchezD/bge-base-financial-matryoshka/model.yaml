widgetData:
- source_sentence: The Health Services segment's revenues are primarily generated from the sale and managing of prescription
    drugs to eligible members in benefit plans maintained by clients.
  sentences:
  - What online platforms does The Home Depot operate for its product offerings?
  - How does the Company's Health Services segment generate most of its revenue?
  - What are the various diversity, equity, and inclusion councils at AMC?
- source_sentence: Product gross margin decreased to 75.9% in 2023, compared to 2022.
  sentences:
  - What organizations do the cybersecurity leaders hold memberships in?
  - How much did product gross margin decrease from 2022 to 2023?
  - What items are included under Item 8 in the financial report?
- source_sentence: Our apparel assortment includes items such as pants, shorts, tops, and jackets designed for a healthy lifestyle
    including athletic activities such as yoga, running, training, and most other activities.
  sentences:
  - What types of activities are lululemon's athletic apparels designed for?
  - How are the capital adequacy ratios of American Express and AENB determined under current federal banking regulations?
  - What was the company's worldwide effective income tax rate in 2023?
- source_sentence: Rest of Asia Pacific net sales increased 1% or $240 million during 2023 compared to 2022. The weakness
    in foreign currencies relative to the U.S. dollar had a significantly unfavorable year-over-year impact on Rest of Asia
    Pacific net sales. The net sales increase consisted of higher net sales of iPhone and Services, partially offset by lower
    net sales of Mac and iPad.
  sentences:
  - What primarily drove the increase in service fees and other revenue associated with Card Member cross-currency spending?
  - What was the balance of net cash used in financing activities for Costco for the 52 weeks ended August 28, 2022?
  - How did Rest of Asia Pacific net sales change in 2023 compared to 2022?
- source_sentence: Cardiovascular/Metabolism/Other products sales were $3.7 billion, a decline of 5.5% as compared to the
    prior year.
  sentences:
  - What was the revenue decline percentage for Cardiovascular/Metabolism/Other products in 2023?
  - How is a membership's territory determined according to the description?
  - What informs the ESG disclosures mentioned in the text?
