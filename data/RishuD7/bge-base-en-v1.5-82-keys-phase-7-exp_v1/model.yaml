- source_sentence: 'If termination is made by Buyer for convenience, an equitable adjustment for completed Services and expenses
    and written authorized commitments shallbe made by aqreement between termination expenses incurred by Seller, including
    actual severance expenses incurred from the Agreement Term start date until Termination and such severance expenses shall
    be no. greater than one week of each terminated employee''s annual salary per year of service on Buyer''s account as documented
    by Seller and pro-rated for any partial years a, unamortized transition costs (amortized straight-line over the over the
    first three (3) years of the term of the Agreement), and any actual termination fees incurred due to early termination
    of vehicle and equipment leases "Termination Expenses) as Seller''s sole compensation.In the event Buyer approves a reduction
    in Seller''s personnel dedicated to Buyer''s account as part of a. savings initiative or any Seller personnel dedicated
    to Buyer''s. account are terminated as a result of a reduction of Portfolio or scope of Services, then Buyer shall review
    Seller''s business expenses caused by such terminations. In the event a savings initiative (including a reduction of Portfolio
    or scope of Services by Buyer), which explicitly calls out severance costs as a part of the business case, is approved
    by Buyer and results in a termination of Seller''s personnel dedicated to Buyer''s account then Buyer shall reimburse
    any severance costs incurred by. Seller relating thereto; provided that Seller shall first use best efforts to place the
    affected personnel in another position.Seller shall in any event make best efforts in good faith to outplace any terminated
    employees to avoid severance costs. If the termination is attributable to the default or nonperformance of Seller and
    without limiting Buyer''s other rights and remedies, Buyer shall not owe Seller any compensation after the effective date
    of termination. Seller shall reimburse Buyer for any reasonable costs or damages incurred; provided that Buyer shal have
    the duty to mitigate any damages. A "default" shall mean a party''s failure to: (a) perform its duties and obligations
    under the Contract Documents, or (b) observe and comply with the terms thereof.  In the event of a default by Buyer that
    is not cured within thirty (30) days of receipt of notice from Seller, then Seller may terminate thisAgreement and Buyer
    shall reimburse Seller for any reasonable costs or damages incurred and the Termination Expenses. In addition, Seller
    will in good faith make efforts to outplace any terminated employees to avoid severance costs. In addition, the above
    language regarding reimbursement of termination expenses does not apply to any dark site included in the SOw

    ### PAYMENT TERMS#$#Buyer will pay all invoices net 45 days from receipt of invoice, based on an accurate, valid and complete
    invoice in acceptable format, calculated from the latest of the (i) Invoice Date (ii) Invoice Received Date, or (ii) Goods
    Received Date. Seller may invoice for charges payable under this Agreement fifteen (15) days prior to the Services being
    rendered. Such invoices shall be based upon the budget approved by the parties in advance. On a quarterly basis, Seller
    shall conduct a true up of the actual expenses incurred against the budgeted amounts invoiced to Buyer. If there is a
    shortfall or overpayment during such quarter, the difference shall be reflected as a separate line item on the next invoice.
    If there are multiple line item shipments on one invoice, then the last shipment received in Buyer''s system will be the
    Goods Received Date. If invoice is received on a weekend or holiday, then Invoice Received Date will be the next business
    day following the holiday and/or weekend. All invoices must be submitted within.. 180 calendar days of the latest of the
    3 dates listed in this section to be considered valid for payment. Buyer will not be responsible for payment of any amounts
    that are not invoiced within one hundred eighty (180) days of the date that the goods or services are supplied or provided
    to Buyer, and Seller hereby waives recovery of such amounts. Any request for payment of taxes or reimbursement of taxes
    paid by Seller on behalf of Buyer shall be billed within one year of the date of assignment, transfer or conveyance to
    which such taxes apply. Under no circumstances shall Buyer be responsible for any fines, interest or penalties assessed
    against Seller due to Seller''s failure to pay such taxes, including as a result of Seller''s failure to request reimbursement
    from Buyer.'
