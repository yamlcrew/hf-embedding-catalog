- source_sentence: 'Private and Confidential Adam Miller MOo Print Limited Unit 12, Thames Gateway Park Chequers Lane Essex
    RM9 6FB 2 December 2021 Our ref:MOO Print sOc2 Dear Adam SOC 2 Engagement#$#### 1 Introduction#$#### 1.1 This letter,
    together with the enclosures (the "Engagement Letter"), sets out the basis on which we are to provide professional services
    to Moo Print Limited (the "Engagement"). 2 Scope of Professional Services 2.1 Our role is to provide the professional
    services detailed in the enclosed schedule(s) (the "Services"). By accepting these terms, you are agreeing that they scope
    of the Services set out in the schedule(s) is appropriate for your needs. We will perform the Services with reasonable
    skill and care, but our duties and responsibilities shall be limited to the matters as set out in the schedule(s). 2.2
    (a) (b) reviewing (or otherwise being responsible for) the services provided by any other professional advisers retained
    by you; (c)

    The fee for core services of this engagement will be between 42''50o - 55''ooo. excluding VAT, invoiced on a monthly basis
    based on time spent each month. If any additional costs or fees need to be incurred for travel, we will obtain written
    approval from Moo Print Limited prior to incurring the expense. The 2.5% support cost as stated in the terms of business
    section 2.1 will not apply to this engagement. MOO Print Limited sOc2 02 December 2021 14'
  sentences:
  - CBRE_WCP Status Criteria
  - MOO_Supply Category
  - VAT_Data Protection Details
- source_sentence: '13.3 Default by Client. Each of the following shall constitute a default by Client (an "Client Default'')
    under this Agreement: 13.3.1 Client fails to make a payment when due to CBRE, and such failure continues for a period
    of fifteen (15) days after written notice of such failure from CBRE; 13.3.2 Except as set forth in the preceding clause
    13.3.1, Client defaults in the performance of or breaches any of its covenants, agreements or obligations under this Agreement
    in any material respect, and such default or breach continues for fifteen (15) days after written notice of such default
    or breach from CBRE, unless such default cannot reasonably be cured within such 15-day period. in which event Client shall
    have an additional thirty (30) days to cure such default, provided Client promptly commences such cure within such 15-day
    period and continuously proceeds with such cure in a diligent manner;

    13.1.2 If all or substantially all of the assets of CBRE are attached, seized, or levied upon. or come into the possession
    of any receiver, trustee, custodian or assignee for the benefit of creditors, and the same is not vacated, stayed, dismissed,
    set aside or otherwise remedied within thirty (30) days after the occurrence thereof: 13.1.3 If any petition is filed
    by or against CBRE under the United States Bankruptcy. Code or any similar state or federal law (and, in the case of involuntary
    proceedings, CBRE fails to cause the same to be vacated. stayed or set aside within thirty (30) days after filing). 13.2
    Remedies upon CBRE Default. Upon the occurrence and continuance of an uncured CBRF Default, Client may terminate this
    Agreement and/or exercise whatever remedies that are available at law or in equity.'
  sentences:
