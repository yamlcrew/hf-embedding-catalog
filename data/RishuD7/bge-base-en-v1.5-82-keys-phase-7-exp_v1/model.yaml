    by Supplier to create savings; or (c) following the disposition or closure of a Managed Facility unless a similar Managed
    Facility is added within the same geographic proximity of the Managed Facility that was disposed of or closed. ect to
    Severance:

    (b) Pay to Supplier the following (collectively, the "Termination Expenses"), as and. when determined: (i) Severance (as
    hereinafter defined) actually incurred by Supplier as a result of the termination of employment of employees working on
    Supplier''s account, subject to. Section 11.3 below, (ii) actual expenses reasonably incurred by Supplier as a result
    of such expiration or early termination including, without limitation, termination fees paid by Supplier pursuant to equipment
    and vehicle leases and software licensing agreements, (iii) unamortized transition costs incurred by Supplier, and (iv)
    other fees, expenses or reimbursements for Services to which Supplier is entitled under this Agreement through the date
    of expiration or termination, as the case may be.'
