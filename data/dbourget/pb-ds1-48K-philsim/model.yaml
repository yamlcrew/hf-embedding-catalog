widgetData:
- source_sentence: In  The Law of Civilization and Decay,  Brooks provides a detailed look at the rise and fall of civilizations,
    offering a critical perspective on the impact of capitalism. As societies become prosperous, their pursuit of wealth ultimately
    leads to their own downfall as greed takes over.
  sentences:
  - Patrick Todd's The Open Future argues that all future contingent statements, such as 'It will rain tomorrow', are inherently
    false.
  - If propositions are made true in virtue of corresponding to facts, then what are the truth-makers of true negative propositions
    such as ‘The apple is not red’? Russell argued that there must be negative facts to account for what makes true negative
    propositions true and false positive propositions false. Others, more parsimonious in their ontological commitments, have
    attempted to avoid them. Wittgenstein rejected them since he was loath to think that the sign for negation referred to
    a negative element in a fact. A contemporary of Russell’s, Raphael Demos, attempted to eliminate them by appealing to
    ‘incompatibility’ facts. More recently, Armstrong has appealed to the totality of positive facts as the ground of the
    truth of true negative propositions. Oaklander and Miracchi have suggested that the absence or non-existence of the positive
    fact (which is not itself a further fact) is the basis of a positive proposition being false and therefore of the truth
    of its negation.
  - The Law of Civilization and Decay is an overview of history, articulating Brooks' critical view of capitalism. A civilization
    grows wealthy, and then its wealth causes it to crumble upon itself due to greed.
- source_sentence: It is generally accepted that the development of the modern sciences is rooted in experiment. Yet for a
    long time, experimentation did not occupy a prominent role, neither in philosophy nor in history of science. With the
    ‘practical turn’ in studying the sciences and their history, this has begun to change. This paper is concerned with systems
    and cultures of experimentation and the consistencies that are generated within such systems and cultures. The first part
    of the paper exposes the forms of historical and structural coherence that characterize the experimental exploration of
    epistemic objects. In the second part, a particular experimental culture in the life sciences is briefly described as
    an example. A survey will be given of what it means and what it takes to analyze biological functions in the test tube
  sentences:
  - Experimentation has long been overlooked in the study of science, but with a new focus on practical aspects, this is starting
    to change. This paper explores the systems and cultures of experimentation and the patterns that emerge within them. The
    first part discusses the historical and structural coherence of experimental exploration. The second part provides a brief
    overview of an experimental culture in the life sciences. The paper concludes with a discussion on analyzing biological
    functions in the test tube.
  - Hintikka and Mutanen have introduced Trail-And-Error machines as a new way to think about computation, expanding on the
    traditional Turing machine model. This innovation opens up new possibilities in the field of computation theory.
  - As Allaire and Firsirotu (1984) pointed out over a decade ago, the concept of culture seemed to be sliding inexorably
    into a superficial explanatory pool that promised everything and nothing. However, since then, some sophisticated and
    interesting theoretical developments have prevented drowning in the pool of superficiality and hence theoretical redundancy.
    The purpose of this article is to build upon such theoretical developments and to introduce an approach that maintains
    that culture can be theorized in the same way as structure, possessing irreducible powers and properties that predispose
    organizational actors towards specific courses of action. The morphogenetic approach is the methodological complement
    of transcendental realism, providing explanatory leverage on the conditions that maintain for cultural change or stability.
- source_sentence: 'This chapter examines three approaches to applied political and legal philosophy: Standard activism is
    primarily addressed to other philosophers, adopts an indirect and coincidental role in creating change, and counts articulating
    sound arguments as success. Extreme activism, in contrast, is a form of applied philosophy directly addressed to policy-makers,
    with the goal of bringing about a particular outcome, and measures success in terms of whether it makes a direct causal
    contribution to that goal. Finally, conceptual activism (like standard activism), primarily targets an audience of fellow
    philosophers, bears a distant, non-direct, relation to a desired outcome, and counts success in terms of whether it encourages
    a particular understanding and adoption of the concepts under examination.'
  sentences:
  - John Rawls’ resistance to any kind of global egalitarian principle has seemed strange and unconvincing to many commentators,
    including those generally supportive of Rawls’ project. His rejection of a global egalitarian principle seems to rely
    on an assumption that states are economically bounded and separate from one another, which is not an accurate portrayal
    of economic relations among states in our globalised world. In this article, I examine the implications of the domestic
    theory of justice as fairness to argue that Rawls has good reason to insist on economically bounded states. I argue that
    certain central features of the contemporary global economy, particularly the free movement of capital across borders,
    undermine the distributional autonomy required for states to realise Rawls’ principles of justice, and the domestic theory
    thus requires a certain degree of economic separation among states prior to the convening of the international original
    position. Given this, I defend Rawls’ reluctance to endorse a global egalitarian principle and defend a policy regime
    of international capital controls, to restore distributional autonomy and make the realisation of the principles of justice
    as fairness possible.
  - 'Bibliography of the writings by Hilary Putnam: 16 books, 198 articles, 10 translations into German (up to 1994).'
  - The jurisprudence under international human rights treaties has had a considerable impact across countries. Known for
    addressing complex agendas, the work of expert bodies under the treaties has been credited and relied upon for filling
    the gaps in the realization of several objectives, including the peace and security agenda.  In 1982, the Human Rights
    Committee (ICCPR), in a General Comment observed that “states have the supreme duty to prevent wars, acts of genocide
    and other acts of mass violence ... Every effort … to avert the danger of war, especially thermonuclear war, and to strengthen
    international peace and security would constitute the most important condition and guarantee for the safeguarding of the
    right to life.” Over the years, all treaty bodies have contributed in this direction, endorsing peace and security so
    as “to protect people against direct and structural violence … as systemic problems and not merely as isolated incidents
    …”. A closer look at the jurisprudence on peace and security, emanating from treaty monitoring mechanisms including state
    periodic reports, interpretive statements, the individual communications procedure, and others, reveals its distinctive
    nature
- source_sentence: Autonomist accounts of cognitive science suggest that cognitive model building and theory construction
    (can or should) proceed independently of findings in neuroscience. Common functionalist justifications of autonomy rely
    on there being relatively few constraints between neural structure and cognitive function (e.g., Weiskopf, 2011). In contrast,
    an integrative mechanistic perspective stresses the mutual constraining of structure and function (e.g., Piccinini & Craver,
    2011; Povich, 2015). In this paper, I show how model-based cognitive neuroscience (MBCN) epitomizes the integrative mechanistic
    perspective and concentrates the most revolutionary elements of the cognitive neuroscience revolution (Boone & Piccinini,
    2016). I also show how the prominent subset account of functional realization supports the integrative mechanistic perspective
    I take on MBCN and use it to clarify the intralevel and interlevel components of integration.
  sentences:
  - Fictional truth, or truth in fiction/pretense, has been the object of extended scrutiny among philosophers and logicians
    in recent decades. Comparatively little attention, however, has been paid to its inferential relationships with time and
    with certain deliberate and contingent human activities, namely, the creation of fictional works. The aim of the paper
    is to contribute to filling the gap. Toward this goal, a formal framework is outlined that is consistent with a variety
    of conceptions of fictional truth and based upon a specific formal treatment of time and agency, that of so-called stit
    logics. Moreover, a complete axiomatic theory of fiction-making TFM is defined, where fiction-making is understood as
    the exercise of agency and choice in time over what is fictionally true. The language \ of TFM is an extension of the
    language of propositional logic, with the addition of temporal and modal operators. A distinctive feature of \ with respect
    to other modal languages is a variety of operators having to do with fictional truth, including a ‘fictionality’ operator
    \ . Some applications of TFM are outlined, and some interesting linguistic and inferential phenomena, which are not so
    easily dealt with in other frameworks, are accounted for
  - 'We have structured our response according to five questions arising from the commentaries: (i) What is sentience? (ii)
    Is sentience a necessary or sufficient condition for moral standing? (iii) What methods should guide comparative cognitive
    research in general, and specifically in studying invertebrates? (iv) How should we balance scientific uncertainty and
    moral risk? (v) What practical strategies can help reduce biases and morally dismissive attitudes toward invertebrates?'
  - 'In 2007, ten world-renowned neuroscientists proposed “A Decade of the Mind Initiative.” The contention was that, despite
    the successes of the Decade of the Brain, “a fundamental understanding of how the brain gives rise to the mind [was] still
    lacking” (2007, 1321). The primary aims of the decade of the mind were “to build on the progress of the recent Decade
    of the Brain (1990-99)” by focusing on “four broad but intertwined areas” of research, including: healing and protecting,
    understanding, enriching, and modeling the mind. These four aims were to be the result of “transdisciplinary and multiagency”
    research spanning “across disparate fields, such as cognitive science, medicine, neuroscience, psychology, mathematics,
    engineering, and computer science.” The proposal for a decade of the mind prompted many questions (See Spitzer 2008).
    In this chapter, I address three of them: (1) How do proponents of this new decade conceive of the mind? (2) Why should
    a decade be devoted to understanding it? (3) What should this decade look like?'
- source_sentence: This essay explores the historical and modern perspectives on the Gettier problem, highlighting the connections
    between this issue, skepticism, and relevance. Through methods such as historical analysis, induction, and deduction,
    it is found that while contextual theories and varying definitions of knowledge do not fully address skeptical challenges,
    they can help clarify our understanding of knowledge. Ultimately, embracing subjectivity and intuition can provide insight
    into what it truly means to claim knowledge.
  sentences:
  - In this article I present and analyze three popular moral justifications for hunting. My purpose is to expose the moral
    terrain of this issue and facilitate more fruitful, philosophically relevant discussions about the ethics of hunting.
  - Teaching competency in bioethics has been a concern since the field's inception. The first report on the teaching of contemporary
    bioethics was published in 1976 by The Hastings Center, which concluded that graduate programs were not necessary at the
    time. However, the report speculated that future developments may require new academic structures for graduate education
    in bioethics. The creation of a terminal degree in bioethics has its critics, with scholars debating whether bioethics
    is a discipline with its own methods and theoretical grounding, a multidisciplinary field, or something else entirely.
    Despite these debates, new bioethics training programs have emerged at all postsecondary levels in the U.S. This essay
    examines the number and types of programs and degrees in this growing field.
  - 'Objective: In this essay,  I will try to track some historical and modern stages of the discussion on the Gettier problem,
    and point out the interrelations of the questions that this problem raises for epistemologists, with sceptical arguments,
    and a so-called problem of relevance. Methods: historical analysis, induction, generalization, deduction, discourse, intuition
    results: Albeit the contextual theories of knowledge, the use of different definitions of knowledge, and the different
    ways of the uses of knowledge do not resolve all the issues that the sceptic can put forward, but they can be productive
    in giving clarity to a concept of knowledge for us. On the other hand, our knowledge will always have an element of intuition
    and subjectivity, however not equating to epistemic luck and probability.  Significance novelty: the approach to the context
    in general, not giving up being a Subject may give us a clarity about the sense of what it means to say – “I know”.'
