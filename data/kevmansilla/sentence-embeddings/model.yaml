  - 'MERCOSUR/CMC/DEC. Nº 46/07 GRUPO DE TRABAJO SOBRE PREVENCION DE PROLIFERACION DE ARMAS DE DESTRUCCION MASIVA (GTADM)
    VISTO: El Tratado de Asunción, el Protocolo de Ouro Preto, las Decisiones Nº 18/98, 23/03, 18/04 y 28/04 del Consejo del
    Mercado Común. CONSIDERANDO: Que el fortalecimiento de la dimensión política y social del MERCOSUR conlleva una mayor
    interrelación entre los Estados Parte a fin de consolidar y profundizar el proceso de integración. Que los Gobiernos de
    los Estados Parte y de la República de Bolivia y de la República de Chile declararon el 24 de julio de 1998 al MERCOSUR,
    Bolivia y Chile como Zona de Paz y Libre de Armas de Destrucción Masiva. Que es conveniente establecer un mecanismo de
    consulta periódica institucionalizado para abordar las cuestiones relativas a la prevención de proliferación de armas
    de destrucción masiva. EL CONSEJO DEL MERCADO COMUN DECIDE: Art. 1 — Crear el Grupo de Trabajo sobre Prevención de Proliferación
    de Armas de Destrucción Masiva (GTADM) en el ámbito del FCCP, que estará integrado por los órganos competentes en la materia
    en los Estados Parte. Los Estados Asociados podrán participar del Grupo de Trabajo en los términos de la Decisión CMC
    Nº 18/04. Art. 2 — El GTADM tendrá por finalidad facilitar el intercambio de información y eventual armonización de legislaciones
    sobre controles nacionales de bienes y tecnologías sensibles y uso dual para prevenir la proliferación de armas de destrucción
    masiva. Art. 3 — El GTADM presentará sus informes al Foro de Consulta y Concertación Política conforme a lo establecido
    en la Decisión CMC Nº 23/03. Art. 4 — Esta Decisión no necesita ser incorporada al ordenamiento jurídico de los Estados
    Parte, por reglamentar aspectos de la organización o del funcionamiento del MERCOSUR. XXXIV CMC - Montevideo, 17/XII/07'
  - 'null Banco Itaú terá que devolver valores descontados de uma empregada por diferenças no caixa 10.08.2015   REPÓRTER:
    Uma empregada do Banco Itaú deve ser ressarcida em cinco mil e 600 reais depois de ter os valores descontados diretamente
    na conta corrente por causa de diferença no caixa sob a responsabilidade dela. A decisão é da Primeira Turma do Tribunal
    Superior do Trabalho que considerou irregular os descontos salariais não autorizados. Contratada como escriturária desde
    1992, a profissional exerce a função de caixa em uma agência do Itaú, em Belo Horizonte. Em primeira instância, a Justiça
    do Trabalho acolheu o pedido dela por considerar que o manuseio diário de dinheiro favorece o surgimento de diferenças
    no caixa, e o risco dessa atividade deve ser sempre assumido pelo empregador e não pelo empregado. O Itaú recorreu ao
    Tribunal Regional do Trabalho de Minas Gerais e conseguiu reverter a decisão. O argumento foi de que a bancária já tinha
    uma garantia concedida pela chamada "gratificação de caixa". Trata-se de um adicional que tem o objetivo de cobrir eventuais
    diferenças na contabilidade do caixa, que acabavam descontadas do empregado, conforme previsto no contrato de trabalho.
    A bancária recorreu ao TST e conseguiu restabelecer a sentença, de primeira instância. O relator do caso na Primeira Turma,
    ministro Walmir Oliveira da Costa, observou que os descontos só seriam lícitos diante da comprovação de que houve má-fé
    da trabalhadora, o que não se confirmou no processo. Com a decisão unânime da Turma, a bancária deve receber de volta
    todos os valores descontados pelo banco.   Reportagem, Carlos Balbino   Faça o download ou ouça a notícia:   Esse conteúdo
    não está disponível sem cookies.Aceitar cookies Mais detalhes'
