  - 'Cidadania Câmara lança estudo com análises e propostas para o desenvolvimento de cidades inteligentes Publicação define
    eixos que devem ser considerados para o desenvolvimento urbano inteligente, entre eles sustentabilidade, inovação e formação
    de capital humano       Compartilhe   Versão para impressão    1Comentários                     01/03/2021 - 15:53                 A
    Câmara dos Deputados lança, no dia 10 de março, às 17 horas, a publicação “Cidades Inteligentes: uma Abordagem Humana
    e Sustentável”. Produzido pelo Centro de Estudos e Debates Estratégicos (Cedes), o estudo destaca que uma cidade inteligente
    não é aquela que simplesmente usa a tecnologia no meio urbano, mas a que investe em capital humano e social, em desenvolvimento
    econômico sustentável, em inovação e empreendedorismo e no uso de tecnologias para aprimorar e interconectar os serviços
    e a infraestrutura das cidades. Tudo com foco em cidadania, qualidade de vida e bem-estar dos cidadãos. A publicação define
    eixos que devem ser considerados para o desenvolvimento urbano inteligente e para a implantação de cidades inovadoras.
    Um desses eixos evidencia a importância da educação formal como instrumento para promover capital humano qualificado e
    criativo. Outro eixo prioritário é o avanço da economia baseada em conhecimento. O estudo destaca que otimizar os processos
    produtivos, a partir da tecnologia e da constante produção de novas ideias, tem exigido a renovação constante da forma
    de as cidades produzirem e se organizarem. Quanto à tecnologia, a publicação analisa qual a infraestrutura necessária
    para interconectar redes e, assim, melhorar os serviços e a qualidade de vida. O tema da sustentabilidade também é central
    na concepção de uma cidade inteligente. Nesse contexto, a publicação ressalta que os municípios devem desenvolver soluções
    urbanas em harmonia com o meio ambiente e que considerem inclusão, integração, produtividade e qualidade de vida. Outra
    discussão abordada estabelece novas formas de governança que incorporem tecnologia e participação cidadã, com espaços
    de cocriação entre sociedade, setor privado e governos. Propostas Legislativas A publicação também apresenta uma série
    de proposições legislativas que buscam contribuir para a promoção do desenvolvimento nacional. A principal delas é o projeto
    de lei que institui a Política Nacional de Cidades Inteligentes, com diretrizes e incentivos para a implantação de Planos
    de Cidades Inteligentes nos municípios brasileiros. Outras iniciativas sugerem ações de apoio, acompanhamento ou fiscalização,
    além de indicações ao Poder Executivo com o objetivo de sugerir ações cuja implantação é atribuição exclusiva daquele
    Poder. Este é o décimo segundo livro da série Estudos Estratégicos publicado pelo Cedes, em parceria com o Centro de Documentação
    e Informação da Câmara (Cedi). O Cedes é um órgão técnico-consultivo da Câmara dos Deputados dedicado a análise, discussão
    e prospecção de temas de caráter inovador ou com potencial de transformar as realidades econômica, política e social do
    nosso país. O colegiado é composto por 23 parlamentares, que têm como atribuição propor uma agenda de atividades e conduzir
    estudos estratégicos para o Brasil, desenvolvidos com o apoio da Consultoria Legislativa. Serviço  A publicação estará
    disponível, de forma gratuita, no Portal da Câmara ou poderá ser adquirida no site livraria.camara.leg.br. O evento estará
    aberto para o público em geral no ambiente virtual do e-democracia -  cd.leg.br/edemocracia_1720'
