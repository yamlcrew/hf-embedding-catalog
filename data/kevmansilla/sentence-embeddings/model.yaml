  - 'MALLA ANTIGRANIZO Ley 25.174 Régimen destinado a asegurar la oferta nacional e importada de malla antigranizo, las condiciones
    y calidad del producto, y facilitar los productores agrícolas la colocación de dispositivo de protección. Sancionada:
    Septiembre 22 de 1999 Promulgada parcialmente: Octubre 14 de 1999. El Senado y Cámara de Diputados de la Nación Argentina
    reunidos en Congreso, etc., sancionan con fuerza de Ley: I. Objeto ARTICULO 1º — La presente ley tiene por objeto asegurar
    la oferta nacional e importada malla antigranizo, las condiciones y calidad producto, y facilitar a los productores agrícolas
    colocación de ese dispositivo de protección. II. Condiciones y Calidad ARTICULO 2º — Producto apto. Características. A
    los efectos de la presente ley, defínese producto apto para malla antigranizo, el tejido monofilamento del polietileno
    de alta densidad baja presión de color negro o blanco con certificación de tratamiento ultravioleta, que reúne los siguientes
    requisitos garantizados y certificados por fábrica: a) Resistencia de impacto mínima de 20 mm de granizo a 40 mts./seg.;
    b) Sombreo máximo del 20%; c) Vida útil no inferior a siete (7) años. ARTICULO 3º — Control de Calidad. Cualquier tipo
    de producto con destino a malla antigranizo, que cumpla con la definición y los requisitos del artículo anterior, deberá
    someterse a un control de calidad. ARTICULO 4º — Organismo encargado del control de calidad. El control de calidad a que
    se hace referencia en el artículo anterior será supervisado certificado por el Instituto Nacional de Tecnología ndustrial
    (INTI). El producto controlado y aprobado llevará, a los fectos de su comercialización, una etiqueta o adhesivo e color
    azul con la leyenda: "Aprobado -Instituto acional de Tecnología Industrial (INTI)". ebiendo indicarse cuáles son las características
    el producto y las condiciones de calidad. ARTICULO 5º — Productos aptos no comprendidos. os productos aptos no comprendidos
    que o se adecuen al artículo 2º de esta ley, pero que onforme a las condiciones que establezca la reglamentación e la
    presente sean considerados como aptos para malla antigranizo, podrán ser igualmente sometidos al control de calidad del
    Instituto Nacional de Tecnología Industrial (INTI) y aprobados en las condiciones del segundo párrafo del artículo anterior.
    ARTICULO 6º — Efectos. La constancia de aprobación del control de calidad del Instituto Nacional de Tecnología Industrial
    (INTI), será únicamente a los efectos de acreditar, para su comercialización, la calidad y condiciones de la malla antigranizo.
    ARTICULO 7º — Carga de la prueba. En cualquier caso, el oferente estará obligado a producir las pruebas que acrediten
    la calidad del producto como malla antigranizo. ARTICULO 8º — Certificación y garantía de fábrica. Sin perjuicio del control
    de calidad, todo producto apto para malla antigranizo deberá venderse con certificación y garantía de fábrica (artículo
    14, Ley 24.240) y sujeto a las demás estipulaciones de la Ley 24.240. ARTICULO 9º — Productos importados. Si el producto
    fuere importado, el importador deberá presentar ante el Instituto Nacional de Tecnología Industrial (INTI) certificación
    de fabricación de origen y acreditar las características del artículo 2º o las similares reglamentadas conforme al artículo
    5º, las mismas deberán estar supervisadas y certificadas por el organismo extranjero competente, equivalente al Instituto
    Nacional de Tecnología Industrial (INTI), sin perjuicio del artículo 8º. Se procederá conforme al segundo párrafo del
    artículo 4º. III. Oferta nacional e importada ARTICULO 10. — Arancel de importación y tasa de estadística. Fíjase una
    reducción en el derecho de importación, extrazona e intrazona al 5% para la malla antigranizo elaborada, y al 0% en el
    caso de la materia prima para su elaboración. Asimismo, exceptúese de los derechos de estadística que correspondiesen.
    (Nota Infoleg: por art. 1º de la Ley Nº 26.459 B.O. 16/12/2008, se prorroga la vigencia de las disposiciones del presente
    artículo, por el plazo de DIEZ (10) años a partir del vencimiento previsto en el Decreto 1552/2001) ARTICULO 11. — Impuesto
    al valor agregado (IVA): a) Exceptúese, en los términos del artículo 6º de la Ley 23.349 y sus modificatorias, el impuesto
    al valor agregado (IVA) a la venta e importación definitiva de la malla antigranizo elaborada y la materia prima apta
    para su elaboración; b) Del mismo modo, quedan exceptuados del impuesto al valor agregado (IVA), el resto de los materiales
    y/o elementos que probadamente sean necesarios para la instalación del sistema de protección. (Nota Infoleg: por art.
    1º de la Ley Nº 26.459 B.O. 16/12/2008, se prorroga la vigencia de las disposiciones del presente artículo, por el plazo
    de DIEZ (10) años a partir del vencimiento previsto en el Decreto 1552/2001) IV. Disposiciones Generales ARTICULO 12.
    — Vigencia temporal. Las disposiciones de los artículos 10 y 11 de la presente ley tendrán una vigencia temporal de siete
    (7) años contados desde la publicación de su reglamentación. Se podrá disponer la prórroga de la presente mediante decreto
    del Poder Ejecutivo o mediante procedimiento de ley. ARTICULO 13. — Ley especial. Esta normativa sólo será modificada
    o derogada por otra ley especial o por una ley general que específicamente así lo prevea. ARTICULO 14. — Reglamentación.
    El Poder Ejecutivo Nacional, mediante la intervención del Ministerio de Economía y Obras y Servicios Públicos de la Nación,
    dictará la reglamentación pertinente a efectos de instrumentar la presente ley. ARTICULO 15. — Comuníquese al Poder Ejecutivo
    Nacional. DADA EN LA SALA DE SESIONES DEL CONGRESO ARGENTINO, EN BUENOS AIRES, A LOS VEINTIDOS DIAS DEL MES DE SETIEMBRE
    DEL AÑO MIL NOVECIENTOS NOVENTA Y NUEVE. — REGISTRADA BAJO EL Nº 25.174 — ALBERTO R. PIERRI. — CARLOS F. RUCKAUF. — Esther
    H. Pereyra Arandía de Pérez Pardo. — Juan C. Oyarzún. Decreto 1133/99 Bs. As., 14/10/99 VISTO el Expediente Nº 020-002333/99
    del Registro del Ministerio de Economía y Obras y Servicios Públicos y el Proyecto de Ley registrado bajo el Nº 25.174
    sancionado por el HONORABLE CONGRESO DE LA NACION, y CONSIDERANDO: Que el citado Proyecto de Ley registrado bajo el Nº
    25.174, establece un régimen que tiene por objeto asegurar la oferta nacional e importada de malla antigranizo, las condiciones
    y calidad del producto, así como facilitar a los productores agrícolas la colocación de ese dispositivo de protección.
    Que el artículo 10 del Proyecto de Ley se establece una reducción del Derecho de Importación Intrazona y Extrazona para
    la malla antigranizo elaborada y la materia prima para su elaboración. Que el nivel del Derecho de Importación Intrazona
    aplicable a la totalidad de las mercaderías amparadas en la Nomenclatura Común del MERCOSUR (N.C.M.), resulta ser —a partir
    del 1º de enero de 1999— del CERO POR CIENTO (0%), en función de haber expirado los plazos de vigencia del Régimen de
    Adecuación Final a la Unión Aduanera del MERCOSUR, incorporado al Régimen Jurídico Nacional a través del Anexo IV del
    Decreto Nº 2275 de fecha 23 de diciembre de 1994 y su modificatorio Nº 998 de fecha 28 de diciembre de 1995, régimen por
    el cual se aprobara la aplicación de niveles diferenciales del referido tributo. Que la reducción del Derecho de Importación
    Extrazona dispuesta por el referido artículo para las mercaderías de que se trata, condice con las disposiciones que regulan
    Régimen de Excepción al Arancel Externo Común del MERCOSUR, incorporado al Régimen Jurídico Nacional a través del Anexo
    II del Decreto Nº 2275 de fecha 23 de diciembre de 1994 y su modificatorio Decreto Nº 998 de fecha 28 de diciembre de
    1995. Que la modificación en los niveles de los derechos de importación, tal como se ha dispuesto, constituye la alteración
    del Arancel Externo Común negociado entre los Estados Parte MERCADO COMUN DEL SUR (MERCOSUR), modificación ésta que, en
    consecuencia, no correspondería ser efectuada unilateralmente. Que en virtud de lo expuesto, la medida adoptada por el
    artículo en trato no se concilia los compromisos asumidos por nuestro país el marco del TRATADO DE ASUNCION, Protocolos
    y demás normativa MERCOSUR. Que en el in fine del inciso a) del artículo del Proyecto de Ley , se exceptúa del impuesto
    al valor agregado a la venta e importación definitiva de la materia prima apta para elaboración de la malla antigranizo.
    Que por el inciso b) del citado artículo se exceptúa del mismo modo al resto de los materiales elementos que probadamente
    sean necesarios para la instalación del sistema de protección. Que no resulta aconsejable que se otorgue esta franquicia
    ya que al tratarse de un tributo de carácter plurifásico no acumulativo, materia prima, elementos y/o materiales necesarios
    para la fabricación de la malla antigranizo, poseen en su costo el impuesto determinado en la etapa anterior, limitándose
    el beneficio al valor agregado por los proveedores del fabricante de la malla. Que el otorgamiento de exenciones por destino
    de los bienes implicará un mayor costo administrativo adicional debido a las dificultades de control con las que se encontrará
    la ADMINISTRACION FEDERAL DE INGRESOS PUBLICOS, entidad autárquica en el ámbito del MINISTERIO DE ECONOMIA Y OBRAS Y SERVICIOS
    PUBLICOS, para evitar la apertura de una brecha propicia para la evasión tributaria. Que, el beneficio acordado es inferior
    al mayor costo administrativo del sistema de control que deberá implementarse con la finalidad de evitar maniobras evasivas.
    Que en consecuencia se considera conveniente observar el artículo 10, la expresión contenida en el inciso a) del artículo
    11 "...la materia prima apta para su elaboración" el inciso b) de este último artículo del Proyecto de Ley Nº 25.174.
    Que la DIRECCION GENERAL DE ASUNTOS JURIDICOS del MINISTERIO DE ECONOMIA Y OBRAS Y SERVICIOS PUBLICOS ha tomado la intervención
    que le compete. Que las facultades para el dictado del presente surgen de lo dispuesto en el artículo 80 de la CONSTITUCION
    NACIONAL. Por ello, EL PRESIDENTE DE LA NACION ARGENTINA EN ACUERDO GENERAL DE MINISTROS DECRETA: Artículo 1º — Obsérvanse
    el artículo 10, la expresión "... y la materia prima apta para su elaboración" contenida en el inciso a) del artículo
    11 el inciso b) de este último artículo, del Proyecto de Ley Nº 25.174. Art. 2º — Con las salvedades establecidas el artículo
    anterior cúmplase, promúlgase, y téngase por ley de la Nación el Proyecto de Ley registrado bajo el Nº 25.174. Art. 3º
    — Dése cuenta al HONORABLE CONGRESO DE LA NACION. Art. 4º —Comuníquese, publíquese, dése a la Dirección Nacional del Registro
    Oficial y archívese. MENEM.— Jorge A. Rodríguez. — Carlos V. Corach. — Raúl E. Granillo Ocampo. — Manuel G. García Solá.
    — Alberto J. Mazza. — Jorge Domínguez. — Roque B. Fernández. — Guido Di Tella. MALLA ANTIGRANIZO Ley 25.174 Confirmación.
    Senado de la Nación Presidencia PE-436/00 Buenos Aires, 5 de julio de 2000 Al señor Presidente de la Nación. Tengo el
    honor de dirigirme al señor Presidente, a fin de comunicarle que el H. Senado, en sesión de la fecha, ha considerado la
    confirmación de la H. Cámara de Diputados de su sanción anterior en las observaciones parciales al proyecto de Ley de
    Régimen para el fomento de la lucha antigranizo, registrado bajo el N° 25.174, y ha tenido a bien confirmar también la
    propia con el voto de la mayoría de los dos tercios de los presentes, quedando así definitivamente sancionado el proyecto
    según lo dispuesto en el artículo 83 de la Constitución Nacional. Saludo a usted muy atentamente NOTA: Esta Ley fue observada
    por el Decreto Nº 1133/99 publicado en la edición del 19.10.99'
  - 'MINISTERIO DE TRABAJO, EMPLEO Y SEGURIDAD SOCIAL  SECRETARÍA DE TRABAJO  Resolución 683/2015  Bs. As., 20/05/2015  VISTO
    el Expediente N° 1.577.224/13 del Registro del MINISTERIO DE TRABAJO, EMPLEO Y SEGURIDAD SOCIAL, la Ley N° 14.250 (t.o.
    2004), la Ley N° 20.744 (t.o. 1976) y sus modificatorias, la Disposición de la Dirección Nacional de Relaciones del Trabajo
    N° 50 del 20 de febrero de 2015, y  CONSIDERANDO:  Que a fojas 126 del Expediente N° 1.577.224/13 obran las escalas salariales
    pactadas entre el SINDICATO ÚNICO DE EMPLEADOS DEL TABACO DE LA REPÚBLICA ARGENTINA, por la parte sindical y las empresas
    DOS ANCLAS SOCIEDAD ANÓNIMA y COMPAÑÍA INTRODUCTORA DE BUENOS AIRES SOCIEDAD ANÓNIMA, por la parte empleadora, en el marco
    del Convenio Colectivo de Trabajo de Empresa N° 1123/10 “E”, conforme lo dispuesto en la Ley de Negociación Colectiva
    N° 14.250 (t.o. 2004).  Que las escalas precitadas forman parte del acuerdo homologado por el artículo 2° de la Disposición
    D.N.R.T. N° 50/15 y registrado bajo el N° 232/15, conforme surge de fojas 140/143 y 146, respectivamente.  Que el segundo
    párrafo del artículo 245 de la Ley N° 20.744 (t.o. 1976) y sus modificatorias, le impone al MINISTERIO DE TRABAJO, EMPLEO
    Y SEGURIDAD SOCIAL la obligación de fijar y publicar el promedio de las remuneraciones del cual surge el tope indemnizatorio
    aplicable.  Que de conformidad con la citada norma legal, el tope indemnizatorio resultante; se determina triplicando
    el importe promedio mensual de las remuneraciones de la escala salarial y sus respectivos rubros conexos considerados.  Que
    a fojas 153/157, obra el informe técnico elaborado por la Dirección Nacional de Regulaciones del Trabajo dependiente de
    esta Secretaría, por el que se indican las constancias y se explicitan los criterios adoptados para el cálculo del promedio
    mensual de remuneraciones objeto de la presente y del tope indemnizatorio resultante, cuyos términos se comparten en esta
    instancia y al cual se remite en orden a la brevedad.  Que la presente se dicta en ejercicio de las atribuciones conferidas
    en el segundo párrafo del artículo 245 de la Ley de Contrato de Trabajo N° 20.744 (t.o. 1976) y sus modificatorias y en
    el Decreto N° 357 del 21 de febrero de 2002, modificado por sus similares N° 628 y N° 2204 de fechas 13 de junio de 2005
    y 30 de diciembre de 2010, respectivamente.  Por ello,  LA SECRETARIA DE TRABAJO  RESUELVE:  ARTÍCULO 1° — Fíjase el importe
    promedio de las remuneraciones del cual surge el tope indemnizatorio, según los términos del artículo 245 de la Ley de
    Contrato de Trabajo N° 20.744 (t.o. 1976) y sus modificatorias, correspondiente al acuerdo homologado por el artículo
    2° de la Disposición de la Dirección Nacional de Relaciones del Trabajo N° 50 del 20 de febrero de 2015 y registrado bajo
    el N° 232/15 suscripto entre el SINDICATO ÚNICO DE EMPLEADOS DEL TABACO DE LA REPÚBLICA ARGENTINA, por la parte sindical
    y las empresas DOS ANCLAS SOCIEDAD ANÓNIMA y COMPAÑÍA INTRODUCTORA DE BUENOS AIRES SOCIEDAD ANÓNIMA, por la parte empleadora,
    conforme al detalle que, como ANEXO, forma parte integrante de la presente.  ARTÍCULO 2° — Regístrese la presente Resolución
    por la Dirección General de Registro, Gestión y Archivo Documental dependiente de la SUBSECRETARÍA DE COORDINACIÓN. Cumplido
    ello, pase a la Dirección Nacional de Relaciones del Trabajo, a fin de que registre el importe promedio de las remuneraciones
    fijado por este acto y del tope indemnizatorio resultante.  ARTÍCULO 3° — Gírese a la Dirección de Negociación Colectiva
    para la notificación a las partes signatarias, posteriormente procédase a la guarda del presente legajo.  ARTÍCULO 4°
    — Comuníquese, publíquese, dése a la Dirección Nacional del Registro Oficial y archívese. — Dra. NOEMI RIAL, Secretaria
    de Trabajo.  ANEXO   Expediente N° 1.577.224/13     Expediente N° 1.577.224/13  Buenos Aires, 21 de Mayo de 2015   De
    conformidad con lo ordenado en la RESOLUCION ST N° 683/15 se ha tomado razón del tope indemnizatorio obrante en el expediente
    de referencia, quedando registrado con el número 304/15 T. — VALERIA ANDREA VALETTI, Registro de Convenios Colectivos,
    Departamento Coordinación - D.N.R.T.'
