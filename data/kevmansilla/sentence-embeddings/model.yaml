    - Na sua opinião, como deve ser a educação que vai preparar as crianças que está chegando à escola agora para os desafios
      do século 21? Qual tipo de invertimento poderá contribuir para o aperfeiçoamento da infraestrutura considerada adequada
      das escolas? Com relação aos estrangeiros em situação de refugio qual ou quais os programas de acessibilidade da língua
      portuguesa a essas pessoas? Ministro de que maneira as metas do PNE serão atingidas? Perspectiva sobre à valorização
      e à formação dos professores e professoras alfabetizadoras,qual plano? Quais serão suas estratégias para tornar o magistério
      uma carreira interessante para os jovens de melhor desempenho nos vestibulares? Qual a opinião do ministro sobre a reforma
      previdenciária para os professores? Como ficará o trabalho do Monitoramento e da Avaliação dos Planos de Educação dos
      Estados e Municípios? Como ficará a Rede PCR, que dá apoio aos municípios na construção e/ou adequação dos Planos de
      Carreira dos Profissionais do Magistério? MARIA BATISTA/MG As crianças não sabem o significado das cores da bandeira
