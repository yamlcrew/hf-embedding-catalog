      o orçamento? A par do que disse, as netas também são insignificantes, diante do que a população escolar brasileira merece
      ter. Lamentavelmente, ouve -se um diagnóstico muito rudimentar, longe da expectativa da comunidade científica e educacional.
      Como você vê o fato de até o vice-presidente Mourão ser contra o slogan da campanha em na recomendação que o senhor
      fez ontem? Autoritarismo já começa com Presidente da Comissão, tenta calar antes de qq manifestação. Esse tipo de intervenção
