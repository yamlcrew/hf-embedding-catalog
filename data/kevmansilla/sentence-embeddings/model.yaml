      Trabajo N° 50 del 20 de febrero de 2015, y  CONSIDERANDO:  Que a fojas 126 del Expediente N° 1.577.224/13 obran las
      escalas salariales pactadas entre el SINDICATO ÚNICO DE EMPLEADOS DEL TABACO DE LA REPÚBLICA ARGENTINA, por la parte
      sindical y las empresas DOS ANCLAS SOCIEDAD ANÓNIMA y COMPAÑÍA INTRODUCTORA DE BUENOS AIRES SOCIEDAD ANÓNIMA, por la
      parte empleadora, en el marco del Convenio Colectivo de Trabajo de Empresa N° 1123/10 “E”, conforme lo dispuesto en
      la Ley de Negociación Colectiva N° 14.250 (t.o. 2004).  Que las escalas precitadas forman parte del acuerdo homologado
      por el artículo 2° de la Disposición D.N.R.T. N° 50/15 y registrado bajo el N° 232/15, conforme surge de fojas 140/143
      y 146, respectivamente.  Que el segundo párrafo del artículo 245 de la Ley N° 20.744 (t.o. 1976) y sus modificatorias,
      le impone al MINISTERIO DE TRABAJO, EMPLEO Y SEGURIDAD SOCIAL la obligación de fijar y publicar el promedio de las remuneraciones
      del cual surge el tope indemnizatorio aplicable.  Que de conformidad con la citada norma legal, el tope indemnizatorio
      resultante; se determina triplicando el importe promedio mensual de las remuneraciones de la escala salarial y sus respectivos
      rubros conexos considerados.  Que a fojas 153/157, obra el informe técnico elaborado por la Dirección Nacional de Regulaciones
      del Trabajo dependiente de esta Secretaría, por el que se indican las constancias y se explicitan los criterios adoptados
      para el cálculo del promedio mensual de remuneraciones objeto de la presente y del tope indemnizatorio resultante, cuyos
      términos se comparten en esta instancia y al cual se remite en orden a la brevedad.  Que la presente se dicta en ejercicio
      de las atribuciones conferidas en el segundo párrafo del artículo 245 de la Ley de Contrato de Trabajo N° 20.744 (t.o.
      1976) y sus modificatorias y en el Decreto N° 357 del 21 de febrero de 2002, modificado por sus similares N° 628 y N°
      2204 de fechas 13 de junio de 2005 y 30 de diciembre de 2010, respectivamente.  Por ello,  LA SECRETARIA DE TRABAJO  RESUELVE:  ARTÍCULO
      1° — Fíjase el importe promedio de las remuneraciones del cual surge el tope indemnizatorio, según los términos del
      artículo 245 de la Ley de Contrato de Trabajo N° 20.744 (t.o. 1976) y sus modificatorias, correspondiente al acuerdo
      homologado por el artículo 2° de la Disposición de la Dirección Nacional de Relaciones del Trabajo N° 50 del 20 de febrero
      de 2015 y registrado bajo el N° 232/15 suscripto entre el SINDICATO ÚNICO DE EMPLEADOS DEL TABACO DE LA REPÚBLICA ARGENTINA,
      por la parte sindical y las empresas DOS ANCLAS SOCIEDAD ANÓNIMA y COMPAÑÍA INTRODUCTORA DE BUENOS AIRES SOCIEDAD ANÓNIMA,
      por la parte empleadora, conforme al detalle que, como ANEXO, forma parte integrante de la presente.  ARTÍCULO 2° —
      Regístrese la presente Resolución por la Dirección General de Registro, Gestión y Archivo Documental dependiente de
      la SUBSECRETARÍA DE COORDINACIÓN. Cumplido ello, pase a la Dirección Nacional de Relaciones del Trabajo, a fin de que
      registre el importe promedio de las remuneraciones fijado por este acto y del tope indemnizatorio resultante.  ARTÍCULO
      3° — Gírese a la Dirección de Negociación Colectiva para la notificación a las partes signatarias, posteriormente procédase
      a la guarda del presente legajo.  ARTÍCULO 4° — Comuníquese, publíquese, dése a la Dirección Nacional del Registro Oficial
      y archívese. — Dra. NOEMI RIAL, Secretaria de Trabajo.  ANEXO   Expediente N° 1.577.224/13     Expediente N° 1.577.224/13  Buenos
      Aires, 21 de Mayo de 2015   De conformidad con lo ordenado en la RESOLUCION ST N° 683/15 se ha tomado razón del tope
      indemnizatorio obrante en el expediente de referencia, quedando registrado con el número 304/15 T. — VALERIA ANDREA
      VALETTI, Registro de Convenios Colectivos, Departamento Coordinación - D.N.R.T.'
