    sentences:
    - 'REGISTRO NACIONAL DE ARMAS Disposición 504/2008 Establécense requisitos que deberán cumplimentar los legítimos usuarios
      en cualquiera de sus categorías o clases para obtener la calidad de tales, para la portación de armas de fuego. Bs.
      As., 14/8/2008 VISTO las prescripciones de la Ley Nacional de Armas y Explosivos Nº 20.429, la Ley Nº 23.979 y su marco
      de referencia la Ley Nº 23.283, la Ley 24.492 y la Ley 26.338, los Decretos Nº 395 del 20 de febrero de 1975, 252 del
      16 de febrero de 1994 y 914 del 9 de junio de 2008, la Resolución Nº 1479 M.J.D.H. del 14 de octubre de 2006 y la Disposición
      del Registro Nacional de Armas Nº 110 del 24 de abril de 2006, y demás normativa de aplicación y CONSIDERANDO: Que el
      artículo 145 del Anexo I al Decreto Nº 395/75, prevé que el REGISTRO NACIONAL DE ARMAS establecerá aranceles y tasas
      equitativos para atender los servicios que deba prestar. Que de acuerdo al artículo 3º de la Ley 26.338 el Registro
      Nacional de Armas fue transferido del Ministerio de Interior a la Jurisdicción del Ministerio de Justicia, Seguridad
      y Derechos Humanos siendo de aplicación Resolución M.J.D.H. Nº 1479/06, en relación al Sistema de Cooperación Técnica
      y Asistencia Financiera previsto por la Ley Nº 23.979. Que por Disposición del REGISTRO NACIONAL DE ARMAS Nº 110/06
      se estableció los diferentes Formularios Ley 23.979 con que deben integrarse cada una de las solicitudes de autorización
      de portaciones que se ingresen a este Organismo, ya se trate de legítimos usuarios individuales de armas de fuego, como
      legítimos usuarios colectivos. Que el REGISTRO NACIONAL DE ARMAS se encuentra facultado a establecer los requisitos
      y condiciones que deben cumplir los legítimos usuarios, en cualquiera de sus categorías o clases para obtener la calidad
      de tales, únicos habilitados para la adquisición, tenencia y eventualmente, la autorización de portación de armas de
      fuego. Que habiéndose analizado la complejidad de las tareas que demanda, los costos de la operatoria de registración,
      fiscalización y control, resulta menester modificar los Formularios Ley 23.979 con que deben integrarse las solicitudes
      de autorización para la portación de armas de fuego, de modo de contemplar los distintos actos administrativos que tal
      petición demanda. Que han tomado la debida intervención la Dirección Técnico Registral, la Delegación Técnico Administrativa
      y la Coordinación de Asuntos Jurídicos de este organismo. Que el suscripto es competente para el dictado de la presente
      en virtud de lo dispuesto por las Leyes Nros. 20.429 y 26.338, y por los Decretos Nros. 395/75 y 914/08. Por ello, EL
      DIRECTOR DEL REGISTRO NACIONAL DE ARMAS DISPONE: Artículo 1º — Establecer que en aquellos casos en donde se haga lugar
      a la solicitud de autorización de portación, previa evaluación por parte de la COMISION TECNICA DE EVALUACION PERMANENTE
      EN MATERIA DE PORTACIONES Y SANCIONES, a los fines del otorgamiento de la credencial habilitante, deberán integrarse
      las tramitaciones con CUATRO (4) Formularios Ley 23.979 tipo 03, para el caso de tratarse de portación simple o SIETE
      (7) Formularios Ley 23.979 tipo 03 para portación múltiple. Art. 2º — Establecer que los legítimos usuarios colectivos
      a los que se le haya hecho lugar a la solicitud de autorización de portación de armas de fuego efectuarán su solicitud
      a través de UN (1) Formulario Ley 23.979 tipo 44 para la producción del pertinente dictamen por parte de la COMISION
      TECNICA DE EVALUACION PERMANENTE EN MATERIA DE PORTACIONES Y SANCIONES, deberán integrar a las tramitaciones CUATRO
      (4) Formularios Ley 23.979 tipo 03, a los fines del otorgamiento de la credencial habilitante. Art. 3º — Establécese
      que los funcionarios de los tres poderes del Estado incluidos en la Resolución MINISTERIO DE DEFENSA Nº 328 de fecha
      28 de marzo de 1995, que requieran autorización para la portación de armas de fuego, efectuarán su solicitud a través
      de DOS 2) Formularios Ley 23.979 tipo 03 para el caso de tratarse de portación simple o TRES (3) Formularios Ley 23.979
      tipo 03 para portación múltiple. Art. 4º — Deróguese los artículos 2º, 3º y 5º de la Disposición RENAR Nº 110 del 24
      de abril de 2006. Art. 5º — Prescríbase que la presente disposición entrará en vigencia a partir del 1º de septiembre
      de 2008. Art. 6º — Comuníquese, regístrese, publíquese, dése a la DIRECCION DEL REGISTRO OFICIAL, incorpórese al Banco
      Nacional Informatizado de Datos del RENAR y cumplido, archívese. — Andrés M. Meiszner.'
    - 'Registro Nacional de las Personas PASAPORTES Resolución 503/2011 Establécese el Registro Unico de Firmas Autorizadas
      para el refrendo del Pasaporte. Bs. As., 4/3/2011 Ver Antecedentes Normativos VISTO la Ley Nº 17.671 de Identificación,
      Registro y Clasificación del Potencial Humano Nacional, sus modificatorias y concordantes, y el Decreto Nº 261 del 2
      de marzo del 2011, y CONSIDERANDO: Que el Decreto Nº 261/2011 dispone que la Dirección Nacional del Registro Nacional
      de las Personas a través de sus oficinas y de las delegaciones del Registro Civil del país que cuentan con dispositivos
      de captura digital de datos y con la correspondiente habilitación del Organismo, otorgará los Pasaportes Nacionales
      en todo el Territorio de la República Argentina. Que se estima necesario autorizar a funcionarios y/o agentes de este
      Organismo para el refrendo de los mismos. Que la presente se dicta en uso de las facultades y atribuciones que emanan
      del artículo 61º de la Ley Nº 17.671 y sus modificatorias. Por ello, LA DIRECTORA NACIONAL DEL REGISTRO NACIONAL DE
      LAS PERSONAS RESUELVE: Artículo 1º — Autorízase a los funcionarios y/o agentes nominados en el Anexo I, que forma parte
      integrante de la presente, a refrendar exclusiva y excluyentemente los distintos tipos de Pasaportes Nacionales otorgados
      en todo el Territorio de la Nación en su confección, con excepción de los Pasaportes Diplomáticos y Oficiales. Art.
      2º — Establécese el "Registro Unico de Firmas Autorizadas para el refrendo del Pasaporte", en el cual el Departamento
      Secretaría General efectivizará la pertinente autenticación de firmas, generando dicho registro, de conformidad a lo
      dispuesto en el artículo 1º de la presente. Art. 3º — La presente medida entrará en vigencia a partir del día 4 de marzo
      de 2011. Art. 4º — La presente Resolución será refrendada por la Dirección General Técnica Jurídica. Art. 5º — Por el
      Departamento Secretaría General, regístrese, comuníquese, notifíquese, publíquese, dése a la Dirección Nacional del
      Registro Oficial, y archívese. — Mora Arqueta. — Patricia M. Palladino. ANEXO I (Anexo  sustituido por art. 1º de la Resolución
