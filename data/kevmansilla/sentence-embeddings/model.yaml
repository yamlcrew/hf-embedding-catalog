      e a casa do povo, não é do povo Ql base p o Ministro concluir de q o povo escolheu mudar os rumos da educação se o Presidente
      não participou de debates? O Slogan Brasil acima de tudo. Deus acima de todos é ou não é uma escola partidária, Sr.
      Ministro da Educação? Gostaria de saber se é verdadeiro os documentos que circulam na internet com logo do brasão da
      republica c slogan de campanha eleitoral? As 5 novas universidades federais brasileiras estão a um ano aguardando direcionamentos
