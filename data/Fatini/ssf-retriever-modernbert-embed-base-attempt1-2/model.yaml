widgetData:
- source_sentence: The Manufacturing Planning Manager is responsible for strategising long-term supply chain management plans,
    optimising production planning and resource management, and driving supplier capability and performance enhancement programmes.
    He/She approves the master production schedule (MPS), develops vendor management strategies, and leads technology application
    to strengthen sourcing, inventory and warehousing operations. He provides project management oversight for manufacturing
    operations and manages technical and programme reviews with customers and suppliers. He manages compliance with airworthiness
    and legislative requirements, and contributes to development of the organisation's standard operating procedures (SOPs),
    management systems, lean and sustainability practices for manufacturing, and data analytics plans for strategic decision-making.
    He drives team performance to achieve business key performance indicators (KPIs) and leads talent recruitment and development
    plans. He should demonstrate strong leadership capabilities, strategic thinking and foresight, and collaborate cross-functionally
    to ensure smooth operations and achieve desired organisational outcomes. He should be able to consider a broad range of
    factors to arrive at optimal decisions to ensure business continuity especially during unforeseen delays in manufacturing
    processes.
  sentences:
  - The QA Engineer is responsible for upholding and executing the Quality Management System (QMS) within the organization.
    This role involves overseeing Quality Assurance and Quality Control (QA&QC) by performing audits to ensure compliance
    with quality standards and collaborating with various departments to ensure effective documentation management. The QA
    Engineer also facilitates training sessions related to QA&QC for employees and plays a key role in developing strategic
    initiatives aimed at enhancing quality improvement across the organization. Additionally, the QA Engineer investigates
    quality process inconsistencies and non-conformities, suggesting preventive actions to avert future occurrences. He monitors
    product failure metrics and performance trends, initiating corrective measures with relevant departments when necessary.
    Furthermore, he proactively seeks out opportunities for continuous improvement in quality, productivity, and cost efficiency.
    The ideal QA Engineer is detail-oriented, possesses systematic thinking, and is capable of working autonomously, exhibiting
    strong organizational, problem-solving, interpersonal, and communication skills.
  - The Manufacturing Planning Coordinator is responsible for implementing short-term supply chain adjustments, managing production
    schedules and resource allocations, and overseeing supplier evaluation processes. He/She approves daily production tasks,
    formulates vendor communication plans, and supports technology deployment for minor sourcing, inventory, and warehousing
    improvements. He provides assistance in project management for manufacturing tasks and participates in routine technical
    discussions with suppliers only. He ensures adherence to basic compliance standards and updates the organization’s operating
    protocols (OPs), management frameworks, and sustainability initiatives for production. He monitors team activities to
    track operational metrics (OMs) and assists in talent onboarding processes. He should show basic leadership abilities,
    operational thinking, and work independently to ensure daily tasks are completed, while primarily focusing on immediate
    production needs rather than long-term strategy. He is expected to address only a limited set of factors when making decisions
    to maintain current production schedules without considering potential disruptions.
  - The Manufacturing Planning Manager is tasked with formulating long-term strategies for supply chain management, enhancing
    production planning and resource allocation, and leading initiatives to improve supplier performance and capabilities.
    He/She is responsible for approving the master production schedule (MPS), devising vendor management approaches, and spearheading
    the application of technology to optimize sourcing, inventory control, and warehousing processes. He provides oversight
    for project management in manufacturing operations and conducts technical and program reviews with both customers and
    suppliers. He ensures compliance with airworthiness standards and legislative requirements, while also contributing to
    the development of the organization’s standard operating procedures (SOPs), management systems, lean methodologies, sustainability
    efforts in manufacturing, and data analytics strategies for informed decision-making. He drives team performance to meet
    business key performance indicators (KPIs) and leads initiatives for talent recruitment and development. He should exhibit
    strong leadership skills, strategic foresight, and engage in cross-functional collaboration to facilitate smooth operations
    and achieve organizational goals. He must consider a wide array of factors to make optimal decisions that ensure business
    continuity, particularly in the face of unexpected manufacturing delays.
- source_sentence: 'The Edge Connectivity and Solution Engineer designs, implements, and maintains end-to-end edge connectivity
    solutions for clean energy systems. He/She collects, integrates, and transforms industrial data for cloud use, while ensuring
    its accuracy and reliability. He also optimises data flow through secure pipelines, enhances grid performance with edge
    computing solutions, and ensures system security and compliance with industry standards. He addresses site-specific connectivity
    issues and implements edge computing architectures to improve system responsiveness, intelligence, and overall efficiency.


    The Edge Connectivity and Solution Engineer possesses communication skills to collaborate across teams, creative thinking
    for innovative solutions, and problem-solving to address connectivity issues. Learning agility and sense-making are essential
    to adapt to new technologies and optimise system performance efficiently, alongside power and clean energy domain knowledge.'
  sentences:
  - The Edge Connectivity and Solution Engineer develops, executes, and sustains comprehensive edge connectivity solutions
    tailored for clean energy systems. This role involves gathering, integrating, and transforming industrial data for cloud
    applications, while ensuring the data's accuracy and dependability. Additionally, the engineer optimizes data transmission
    through secure channels, enhances grid performance utilizing edge computing technologies, and guarantees that system security
    adheres to industry regulations. The position includes resolving site-specific connectivity challenges and deploying edge
    computing architectures to boost system responsiveness, intelligence, and overall efficiency.
  - The Edge Connectivity and Solution Analyst designs, executes, and evaluates web-based solutions for traditional energy
    systems. He/She gathers, integrates, and manages corporate data for on-premise applications, while prioritizing data availability
    and speed. He also streamlines data handling through insecure channels, diminishes grid performance with outdated computing
    solutions, and overlooks system security and compliance with outdated standards. He addresses generalized connectivity
    challenges and develops cloud computing structures to decrease system responsiveness, insight, and overall productivity.
  - The Planning Assistant (Aircraft Maintenance) oversees inventory levels and stock availability, while preparing subcontract
    orders for outsourced aircraft maintenance and repair services as well as material procurement. He/She ensures the correctness
    of invoices related to spare parts and consumables, files warranty claims with original equipment manufacturers (OEMs),
    and addresses material and logistics issues in collaboration with various departments as needed. Compliance with airworthiness
    standards, legislative requirements, organizational standard operating procedures (SOPs), and safety, health, and quality
    systems is expected. He contributes to the implementation of continuous improvement initiatives and lean methodologies
    in the workplace. Strong planning, organizational, and stakeholder management skills are essential. A team-oriented attitude,
    effective verbal and written communication skills, and the ability to perform well under pressure are crucial for assisting
    team members in maintaining adherence to scheduled maintenance and ensuring a consistent supply of necessary resources.
- source_sentence: The Manager (Flight Operations) serves as the Subject Matter Expert (SME) for flight operations and is
    responsible for reviewing all activities related to flight operations. He/She drives continuous improvement strategies
    to improve productivity and business development initiatives. He also leads the development of Standard Operating Procedures
    (SOPs) and systems to mitigate safety and/or security risks, and monitors for adherence to safety and/or security standards.
    He also develops the teams technical capabilities and maintains positive morale within the teams. The Manager (Flight
    Operations) possesses strong stakeholder management and people management skills to build relationships with customers
    and other stakeholders of the organisation and lead his staff and teams. He also has strong computer literacy skills and
    an in-depth understanding of new developments and trends impacting flight operations in the industry. Furthermore, he
    possesses outstanding written and verbal communication skills with strategic thinking capabilities and foresight in order
    to formulate plans and systems for flight operations.
  sentences:
  - The Flight Operations Manager is tasked with overseeing the safety inspections of ground support equipment, ensuring compliance
    with regulatory standards. He/She focuses on developing training programs for ground staff and optimizing maintenance
    schedules to enhance operational efficiency. This role also includes managing the technical capabilities of the ground
    operations team, promoting high morale among staff. The Manager must have excellent customer service skills to maintain
    relationships with suppliers and service providers. A strong understanding of software systems is necessary, along with
    superior written and verbal communication abilities to coordinate with various departments and formulate strategies for
    ground operations.
  - The Mechanical Engineer/Electrical Engineer oversees the strategizing and execution of engineering projects. They create
    mechanical and/or electrical designs tailored to project specifications, progressing from initial concepts to detailed
    schematics. The role involves designing both mechanical and electrical systems, evaluating project feasibility, and delivering
    innovative solutions based on comprehensive assessments. They play a key role in the tendering process and contribute
    to project budgeting and cost management. Additionally, they organize the team's staffing needs and mentor junior engineers
    on-site. Attention to detail, a passion for integrating cutting-edge technologies into engineering designs, and a strong
    foundation in mechanical and/or electrical engineering are essential. The ideal candidate is analytical, possesses excellent
    problem-solving abilities, and has robust interpersonal and project management skills necessary for collaboration with
    various stakeholders. This position requires working in both office settings and on-site at project locations.
  - The Flight Operations Manager acts as the Subject Matter Expert (SME) for all aspects of flight operations, overseeing
    and reviewing related activities. He/She spearheads initiatives for continuous improvement to enhance productivity and
    drive business development. Additionally, he/she is responsible for creating Standard Operating Procedures (SOPs) and
    implementing systems to mitigate safety and security risks, while ensuring compliance with safety and security standards.
    The Manager also fosters the technical development of the team and promotes a positive work environment. Possessing excellent
    stakeholder and people management skills, he/she builds strong relationships with customers and organizational stakeholders
    while leading staff effectively. Strong computer literacy, a deep understanding of industry trends affecting flight operations,
    and exceptional written and verbal communication skills are essential, along with strategic thinking abilities to devise
    effective plans and systems for flight operations.
- source_sentence: The Product Engineer/Product Designer drives the development of new products to maintain commercially viable
    product lines and meet business objectives of the organisation. He/She is responsible for delivering projects from concept
    through to manufacture, with a thorough understanding of the product development process and new technologies. He also
    engages with internal and external parties in the design and development, costing and recommendations of new machinery
    and/or components. He manages new product development by liaising with relevant departments, and is able to lead his team
    effectively. He also possesses excellent interpersonal, communication, and technical writing and presentation skills.
  sentences:
  - The Product Engineer/Product Designer manages the sale of existing products to enhance customer satisfaction and support
    the sales objectives of the organization. He/She is in charge of implementing marketing strategies from planning through
    execution, with a comprehensive understanding of sales tactics and customer engagement. He also interacts with clients
    and sales teams in the promotion and pricing of current products and/or services. He leads customer relationship management
    by collaborating with marketing and sales departments, and is capable of guiding his colleagues in customer interaction.
    He also demonstrates proficient negotiation, networking, and analytical skills.
  - The Bioprocess Engineer (Food Applications) offers specialized knowledge to innovate alternative and novel bioprocesses
    for food production. He/She interprets scientific research to enhance bioprocessing methodologies and establishes quality
    control measures that comply with regulatory requirements, while effectively sharing technical expertise with key stakeholders.
  - The Product Engineer/Product Designer oversees the creation of innovative products to ensure the sustainability of profitable
    product lines and achieve the organization's business goals. He/She is accountable for guiding projects from initial concept
    to production, possessing a deep knowledge of the product development lifecycle and emerging technologies. Additionally,
    he collaborates with both internal and external stakeholders during the design and development phases, including cost
    assessments and recommendations for new machinery and components. He coordinates new product initiatives by working closely
    with various departments and demonstrates strong leadership capabilities within his team. He also showcases outstanding
    interpersonal, communication, technical writing, and presentation skills.
- source_sentence: The Architectural Executive is responsible for reviewing data during the feasibility and design phases.
    He/She is involved with developing computational models. He provides advice on procurement methods to meet objectives.
    He collaborates with others and communicates with relevant teams as necessary. He continually looks for improvement opportunities.
    He also looks for opportunities to incorporate the latest industry trends into his work. He is analytical, technologically
    savvy and is able to use the latest digital tools in the course of his work. He is able to communicate with different
    stakeholders effectively. He is usually based in the office and is required to be on-site occasionally.
  sentences:
  - The Town Gas Plant Maintenance Engineer evaluates plans for preventive, predictive, and corrective maintenance of gas
    production facilities and their ancillary systems to ensure efficient storage and production of town gas. He/She assesses
    technical specifications for tenders, carries out tender evaluations for significant projects, and supervises contractor
    work to ensure compliance with organizational standards. He fosters staff development by organizing relevant training
    and on-the-job coaching. To safeguard the plant from cyber threats, he executes cybersecurity operations that involve
    monitoring and responding to incidents. He oversees Permit-to-Work processes and interprets Safe System of Work (SSoW)
    frameworks applicable to his work area. During emergencies, he assesses the implications of response actions and safety
    protocols on business operations, facilitating the activities of the Emergency Response Team for incident management.
    He operates within a gas plant environment filled with equipment such as pumps, tanks, and valves, with a strong emphasis
    on safety. He possesses strong leadership qualities to guide junior team members and contractors. He demonstrates analytical
    and systematic approaches to maintenance tasks and is quick and attentive in addressing faults and outages.
  - The Architectural Executive is tasked with evaluating data throughout the feasibility and design stages. He/She participates
    in creating computational models and offers guidance on procurement strategies to achieve goals. Collaboration with colleagues
    and communication with pertinent teams is essential. He consistently seeks opportunities for enhancement and aims to integrate
    the most recent industry trends into his projects. He possesses strong analytical skills, is technologically proficient,
    and effectively utilizes advanced digital tools in his work. His ability to engage with various stakeholders is crucial.
    He typically operates from the office but is required to be present on-site from time to time.
  - The Architectural Executive is focused on assessing financial reports during the audit and compliance phases. He/She is
    responsible for developing risk management strategies. He provides consultation on investment opportunities to align with
    corporate objectives. He often works independently and interacts with external partners as necessary. He frequently seeks
    ways to minimize costs and reduce operational inefficiencies. He is detail-oriented, financially savvy, and adept at utilizing
    traditional accounting tools in his tasks. He regularly communicates with upper management and is primarily based in a
    remote setting.
