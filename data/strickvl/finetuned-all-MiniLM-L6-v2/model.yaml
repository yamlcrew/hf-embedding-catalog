    - 'other remote stack components also running in AWS.This method uses the implicit AWS authentication available in the
      environment where the ZenML code is running. On your local machine, this is the quickest way to configure an S3 Artifact
      Store. You don''t need to supply credentials explicitly when you register the S3 Artifact Store, as it leverages the
      local credentials and configuration that the AWS CLI stores on your local machine. However, you will need to install
      and set up the AWS CLI on your machine as a prerequisite, as covered in the AWS CLI documentation, before you register
      the S3 Artifact Store.


      Certain dashboard functionality, such as visualizing or deleting artifacts, is not available when using an implicitly
      authenticated artifact store together with a deployed ZenML server because the ZenML server will not have permission
      to access the filesystem.


      The implicit authentication method also needs to be coordinated with other stack components that are highly dependent
      on the Artifact Store and need to interact with it directly to work. If these components are not running on your machine,
      they do not have access to the local AWS CLI configuration and will encounter authentication failures while trying to
      access the S3 Artifact Store:


      Orchestrators need to access the Artifact Store to manage pipeline artifacts


      Step Operators need to access the Artifact Store to manage step-level artifacts


      Model Deployers need to access the Artifact Store to load served models


      To enable these use-cases, it is recommended to use an AWS Service Connector to link your S3 Artifact Store to the remote
      S3 bucket.


      To set up the S3 Artifact Store to authenticate to AWS and access an S3 bucket, it is recommended to leverage the many
      features provided by the AWS Service Connector such as auto-configuration, best security practices regarding long-lived
      credentials and fine-grained access control and reusing the same credentials across multiple stack components.'
    - ' us know!


      Configuration at pipeline or step levelWhen running your ZenML pipeline with the Sagemaker orchestrator, the configuration
      set when configuring the orchestrator as a ZenML component will be used by default. However, it is possible to provide
      additional configuration at the pipeline or step level. This allows you to run whole pipelines or individual steps with
      alternative configurations. For example, this allows you to run the training process with a heavier, GPU-enabled instance
      type, while running other steps with lighter instances.


      Additional configuration for the Sagemaker orchestrator can be passed via SagemakerOrchestratorSettings. Here, it is
      possible to configure processor_args, which is a dictionary of arguments for the Processor. For available arguments,
      see the Sagemaker documentation . Currently, it is not possible to provide custom configuration for the following attributes:


      image_uri


      instance_count


      sagemaker_session


      entrypoint


      base_job_name


      env


      For example, settings can be provided in the following way:


      sagemaker_orchestrator_settings = SagemakerOrchestratorSettings(


      processor_args={


      "instance_type": "ml.t3.medium",


      "volume_size_in_gb": 30


      They can then be applied to a step as follows:


      @step(settings={"orchestrator.sagemaker": sagemaker_orchestrator_settings})


      For example, if your ZenML component is configured to use ml.c5.xlarge with 400GB additional storage by default, all
      steps will use it except for the step above, which will use ml.t3.medium with 30GB additional storage.


      Check out this docs page for more information on how to specify settings in general.


      For more information and a full list of configurable attributes of the Sagemaker orchestrator, check out the SDK Docs
      .


      S3 data access in ZenML steps'
