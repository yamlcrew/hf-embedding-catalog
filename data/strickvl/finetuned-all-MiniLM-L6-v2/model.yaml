    the persistent backup file or database is cleaned up after the migration is completed successfully or if the database
    doesn''t need to undergo a migration. This includes backups created by previous failed migration attempts.


    the persistent backup file or database is NOT cleaned up after a failed migration. This allows the user to manually inspect
