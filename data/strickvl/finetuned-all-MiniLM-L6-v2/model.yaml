    - 'he Post-execution workflow has changed as follows:The get_pipelines and get_pipeline methods have been moved out of
      the Repository (i.e. the new Client ) class and lie directly in the post_execution module now. To use the user has to
      do:


      from zenml.post_execution import get_pipelines, get_pipeline


      New methods to directly get a run have been introduced: get_run and get_unlisted_runs method has been introduced to
      get unlisted runs.


      Usage remains largely similar. Please read the new docs for post-execution to inform yourself of what further has changed.


      How to migrate: Replace all post-execution workflows from the paradigm of Repository.get_pipelines or Repository.get_pipeline_run
      to the corresponding post_execution methods.


      📡Future Changes


      While this rehaul is big and will break previous releases, we do have some more work left to do. However we also expect
      this to be the last big rehaul of ZenML before our 1.0.0 release, and no other release will be so hard breaking as this
      one. Currently planned future breaking changes are:


      Following the metadata store, the secrets manager stack component might move out of the stack.


      ZenML StepContext might be deprecated.


      🐞 Reporting Bugs


      While we have tried our best to document everything that has changed, we realize that mistakes can be made and smaller
      changes overlooked. If this is the case, or you encounter a bug at any time, the ZenML core team and community are available
      around the clock on the growing Slack community.


      For bug reports, please also consider submitting a GitHub Issue.


      Lastly, if the new changes have left you desiring a feature, then consider adding it to our public feature voting board.
      Before doing so, do check what is already on there and consider upvoting the features you desire the most.


      PreviousMigration guide


      NextMigration guide 0.23.0 → 0.30.0


      Last updated 12 days ago'
    - 'nML, namely an orchestrator and an artifact store.Keep in mind, that each one of these components is built on top of
      base abstractions and is completely extensible.


      Orchestrator


      An Orchestrator is a workhorse that coordinates all the steps to run in a pipeline. Since pipelines can be set up with
      complex combinations of steps with various asynchronous dependencies between them, the orchestrator acts as the component
      that decides what steps to run and when to run them.


      ZenML comes with a default local orchestrator designed to run on your local machine. This is useful, especially during
      the exploration phase of your project. You don''t have to rent a cloud instance just to try out basic things.


      Artifact Store


      An Artifact Store is a component that houses all data that pass through the pipeline as inputs and outputs. Each artifact
      that gets stored in the artifact store is tracked and versioned and this allows for extremely useful features like data
      caching which speeds up your workflows.


      Similar to the orchestrator, ZenML comes with a default local artifact store designed to run on your local machine.
      This is useful, especially during the exploration phase of your project. You don''t have to set up a cloud storage system
      to try out basic things.


      Flavor


      ZenML provides a dedicated base abstraction for each stack component type. These abstractions are used to develop solutions,
      called Flavors, tailored to specific use cases/tools. With ZenML installed, you get access to a variety of built-in
      and integrated Flavors for each component type, but users can also leverage the base abstractions to create their own
      custom flavors.


      Stack Switching


      When it comes to production-grade solutions, it is rarely enough to just run your workflow locally without including
      any cloud infrastructure.'
