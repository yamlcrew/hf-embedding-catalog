  - '🌲Control logging


    Configuring ZenML''s default logging behavior


    ZenML produces various kinds of logs:


    The ZenML Server produces server logs (like any FastAPI server).


    The Client or Runner environment produces logs, for example after running a pipeline. These are steps that are typically
    before, after, and during the creation of a pipeline run.


    The Execution environment (on the orchestrator level) produces logs when it executes each step of a pipeline. These are
    logs that are typically written in your steps using the python logging module.


    This section talks about how users can control logging behavior in these various environments.


    PreviousTrain with GPUs


    NextView logs on the dashboard


