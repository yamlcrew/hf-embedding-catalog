  - '. If not set, the cluster will not be autostopped.down: Tear down the cluster after all jobs finish (successfully or
    abnormally). If idle_minutes_to_autostop is also set, the cluster will be torn down after the specified idle time. Note
    that if errors occur during provisioning/data syncing/setting up, the cluster will not be torn down for debugging purposes.


    stream_logs: If True, show the logs in the terminal as they are generated while the cluster is running.


    docker_run_args: Additional arguments to pass to the docker run command. For example, [''--gpus=all''] to use all GPUs
    available on the VM.


