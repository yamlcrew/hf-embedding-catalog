      AWS Secret Key


      Long-lived AWS credentials consisting of an AWS access key ID and secret access key associated with an AWS IAM user
      or AWS account root user (not recommended).


      This method is preferred during development and testing due to its simplicity and ease of use. It is not recommended
      as a direct authentication method for production use cases because the clients have direct access to long-lived credentials
      and are granted the full set of permissions of the IAM user or AWS account root user associated with the credentials.
      For production, it is recommended to use the AWS IAM Role, AWS Session Token, or AWS Federation Token authentication
      method instead.


      An AWS region is required and the connector may only be used to access AWS resources in the specified region.


      If you already have the local AWS CLI set up with these credentials, they will be automatically picked up when auto-configuration
      is used (see the example below).'
  - source_sentence: Can you explain how the `query_similar_docs` function handles document reranking?
    sentences:
    - 'ry_similar_docs(


      question: str,


      url_ending: str,use_reranking: bool = False,


      returned_sample_size: int = 5,


      ) -> Tuple[str, str, List[str]]:


      """Query similar documents for a given question and URL ending."""


      embedded_question = get_embeddings(question)


      db_conn = get_db_conn()


      num_docs = 20 if use_reranking else returned_sample_size


      # get (content, url) tuples for the top n similar documents


      top_similar_docs = get_topn_similar_docs(


      embedded_question, db_conn, n=num_docs, include_metadata=True


      if use_reranking:


      reranked_docs_and_urls = rerank_documents(question, top_similar_docs)[


      :returned_sample_size


      urls = [doc[1] for doc in reranked_docs_and_urls]


      else:


      urls = [doc[1] for doc in top_similar_docs]  # Unpacking URLs


      return (question, url_ending, urls)


      We get the embeddings for the question being passed into the function and connect to our PostgreSQL database. If we''re
      using reranking, we get the top 20 documents similar to our query and rerank them using the rerank_documents helper
      function. We then extract the URLs from the reranked documents and return them. Note that we only return 5 URLs, but
      in the case of reranking we get a larger number of documents and URLs back from the database to pass to our reranker,
      but in the end we always choose the top five reranked documents to return.


      Now that we''ve added reranking to our pipeline, we can evaluate the performance of our reranker and see how it affects
      the quality of the retrieved documents.


      Code Example


      To explore the full code, visit the Complete Guide repository and for this section, particularly the eval_retrieval.py
      file.


      PreviousUnderstanding reranking


      NextEvaluating reranking performance


      Last updated 15 days ago'
    - 'uter vision that expect a single dataset as input.model drift checks require two datasets and a mandatory model as
      input. This list includes a subset of the model evaluation checks provided by Deepchecks for tabular data and for computer
      vision that expect two datasets as input: target and reference.


      This structure is directly reflected in how Deepchecks can be used with ZenML: there are four different Deepchecks standard
      steps and four different ZenML enums for Deepchecks checks . The Deepchecks Data Validator API is also modeled to reflect
      this same structure.


      A notable characteristic of Deepchecks is that you don''t need to customize the set of Deepchecks tests that are part
      of a test suite. Both ZenML and Deepchecks provide sane defaults that will run all available Deepchecks tests in a given
      category with their default conditions if a custom list of tests and conditions are not provided.


      There are three ways you can use Deepchecks in your ZenML pipelines that allow different levels of flexibility:


      instantiate, configure and insert one or more of the standard Deepchecks steps shipped with ZenML into your pipelines.
      This is the easiest way and the recommended approach, but can only be customized through the supported step configuration
      parameters.


      call the data validation methods provided by the Deepchecks Data Validator in your custom step implementation. This
      method allows for more flexibility concerning what can happen in the pipeline step, but you are still limited to the
      functionality implemented in the Data Validator.


      use the Deepchecks library directly in your custom step implementation. This gives you complete freedom in how you are
      using Deepchecks'' features.


      You can visualize Deepchecks results in Jupyter notebooks or view them directly in the ZenML dashboard.


