  - 'nML, namely an orchestrator and an artifact store.Keep in mind, that each one of these components is built on top of
    base abstractions and is completely extensible.


    Orchestrator


    An Orchestrator is a workhorse that coordinates all the steps to run in a pipeline. Since pipelines can be set up with
    complex combinations of steps with various asynchronous dependencies between them, the orchestrator acts as the component
    that decides what steps to run and when to run them.


    ZenML comes with a default local orchestrator designed to run on your local machine. This is useful, especially during
    the exploration phase of your project. You don''t have to rent a cloud instance just to try out basic things.


    Artifact Store


    An Artifact Store is a component that houses all data that pass through the pipeline as inputs and outputs. Each artifact
    that gets stored in the artifact store is tracked and versioned and this allows for extremely useful features like data
    caching which speeds up your workflows.


    Similar to the orchestrator, ZenML comes with a default local artifact store designed to run on your local machine. This
    is useful, especially during the exploration phase of your project. You don''t have to set up a cloud storage system to
    try out basic things.


    Flavor


    ZenML provides a dedicated base abstraction for each stack component type. These abstractions are used to develop solutions,
    called Flavors, tailored to specific use cases/tools. With ZenML installed, you get access to a variety of built-in and
    integrated Flavors for each component type, but users can also leverage the base abstractions to create their own custom
    flavors.


    Stack Switching


    When it comes to production-grade solutions, it is rarely enough to just run your workflow locally without including any
    cloud infrastructure.'
