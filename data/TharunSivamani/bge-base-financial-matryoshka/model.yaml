widgetData:
- source_sentence: How much did AT&T Inc.'s operating income increase by in percentage terms from 2022 to 2023?
  sentences:
  - In the case of the 2031 Notes, the maturity date is September 1, 2031, and for the 2051 Notes, it is June 1, 2051.
  - Operating Income in 2023 increased by 8.6% compared to 2022.
  - 'The company believes that the funds available, including cash expected to be generated from operations, funds from a
    commercial paper program, or lines of credit, are adequate to meet its working capital needs for the year, including the
    repayment of a $500 million debt. '
- source_sentence: Where can you find the consolidated financial statements in the Annual Report on Form 10-K?
  sentences:
  - Management assesses the scheduled reversal of deferred tax liabilities, projected future taxable income and available
    tax planning strategies and considers foreign tax credit utilization in making this assessment of realization.
  - The consolidated financial statements are included immediately following Part IV of the Annual Report on Form 10-K and
    are incorporated by reference.
  - With effect from March 1, 2022, the casino tax rates of 5% for premium players and 15% for mass players were increased
    to 8% and 18% respectively.
- source_sentence: What is the remaining authorized amount for share repurchases as of December 31, 2023, and the amount newly
    authorized in January 2024?
  sentences:
  - As of December 31, 2023, $30.93 billion remained available and authorized for repurchases. In January 2024, an additional
    $50 billion of repurchases was authorized under this program.
  - As of October 31, 2023, the company had a remaining authorization of approximately $1.0 billion for future share repurchases.
  - The company's Artificial Intelligence Platform (AIP) leverages machine learning technologies and LLMs within the Gotham
    and Foundry platforms to connect AI with enterprise data, aiding in decision-making processes.
- source_sentence: What are the various diversity, equity, and inclusion councils at AMC?
  sentences:
  - The Company evaluates current economic and market conditions and records the expected customer refund liability as a reduction
    to revenue, and the expected inventory right of recovery as a reduction of cost of revenue. If actual return costs differ
    from previous estimates, the amount of the liability and corresponding revenue are adjusted in the period in which such
    costs occur.
  - Shipping and handling costs incurred were $0.9 billion, $0.8 billion and $0.8 billion in fiscal years 2023, 2022 and 2021,
    respectively, and are included in selling, marketing and administrative expense.
  - 'AMC has five DEI councils that are most representative of the largest diverse communities in our workforce: Women (42%),
    Latinx (27%), African American (19%), Asian American & Pacific Islander (4%), and LGBTQ+ (an emerging number).'
- source_sentence: Is there a cost to access reports filed by Intuit Inc. with the SEC?
  sentences:
  - We make available free of charge on the Investor Relations section of our corporate website all of the reports we file
    with or furnish to the SEC as soon as reasonably practicable, after the reports are filed or furnished.
  - The net cash provided by operating activities during fiscal 2023 was related to net income of $208 million, adjusted for
    non-cash items including $3.8 billion of depreciation and amortization and $3.3 billion related to stock-based compensation
    expense.
  - The proposed effective date for the revised risk-based capital requirements for banks with assets of $100 billion or more,
    including the Firm and other U.S. global systemically important banks, is July 1, 2025 with a three-year transition period.
