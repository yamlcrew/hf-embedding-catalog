widgetData:
- source_sentence: 유럽발(發) 입국자 검역 강화조치가 시행된 첫 날인 22일 유증상자 152명이 공항 격리시설에서 격리 및 진단검사를 받았다.
  sentences:
  - 이 경우 격리 면제된 해외 기업인이 국내 입국 시 임시격리시설(1박 2일)에서 검사를 받은 후 검사결과 음성으로 판정될 경우 최종적으로 격리 면제가 이뤄진다.
  - 급하게 메일을 보내지 말고 발송 전에 차분하게 2번 확인하도록 해
  - 트립닷컴 예약 시 메일을 받으면 어떤 정보가 담겨있어?
- source_sentence: 숙소와 체크인 장소가 좀 다르니 참고하세요.
  sentences:
  - 에딘버러에 들르실 예정이라면 강추합니다!
  - 화장실이 상대적으로 좁지만 불편할정도는 아닙니다.
  - 숙박시설과 체크인 장소가 조금 다릅니다.
- source_sentence: 내일 황사 지수 알려줘.
  sentences:
  - 늦어봤자 좋을 거 없으니까 회사 상사하고 저녁 약속에는 늦지 마.
  - 최대 강수 시간대는? 서울 지역.
  - 올해 17조 5000억원에서 2024년에는 21조까지 확대할 방침이다.
- source_sentence: 내년 상반기에는 ‘생산성 혁신을 위한 중장기 전략과제’를 수립하는 동시에 고령자들의 계속고용이 활성화될 수 있도록 기업 고용부담을 완화한 새로운 고령자 일자리 모델도 마련한다.
  sentences:
  - 문화체육관광부가 코로나19 극복을 위한 응원 로고를 국민들이 무료로 활용할 수 있도록 배포한다.
  - 현재는 마감일 이후 신고자의 신고에 오류가 있을 경우 정정 요청 및 정정신고가 불가능했으나 앞으로는 신고자에게도 정정 기회를 부여합니다.
  - 시내와 지하철 사이의 거리는 가까웠습니다.
- source_sentence: 와디즈에서 보내는 광고 메일은 받지마
  sentences:
  - 지메일을 쓰면 첨부파일을 몇개까지 보낼 수 있지?
  - 문 여는 방법도 비교적 쉽고 간단합니다!
  - 그들은 나에게 맥주 두 캔과 주스 그리고 물을 주었습니다.
