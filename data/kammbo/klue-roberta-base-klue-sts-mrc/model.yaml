    sentences:
    - '대덕면 죽리 외평마을 입구 당산나무와 함께 있는 석조여래입상은 화강암 석불로 마을 주민의 말에 의하면 고려중기 큰 장마나 전염병 등 마을에 우환을 방멸키 위해 조성된 것으로 화강암 전면에 저부조(低浮彫)로
      여래형(如來型)의 입상을 꽉 차게 조각하였고, 석불 복부에서 양손을 선정인(禪定印)처럼 가지런히 맞잡아 내부에 Y자로 홈이 나있는 연봉우리 같은 지물을 받치고 있다.


      방형의 얼굴에 높은 육계와 정상 계주(繫柱)를 지니고, 코와 입에 비하여 큰 눈을 가지고 있다. 귀는 얼굴 세부처리와 달리 외곽 선을 안쪽으로 파내어 면(面)으로 처리되었으며, 짧은 목에 도식적인 삼도(三道)가
      표현되어 있다.


      양어깨를 덮은 통견은 반원형의 규칙적인 주름이 오른쪽 어깨에 접혀있으며, 상반신에 수직으로 내려오던 옷깃은 왼쪽 가슴에서 약간 외반(外反)하여 자연스러운 느낌을 준다. 안에 입은 군의는 복부 상단에서 넓은 띠로
      묶어 U자형의 주름이 밑으로 늘어져 있다.


      석불의 뒷면은 아무런 조식(彫飾)을 가하지 않았으며, 석불은 고려시대의 형식을 따르고 있지만 세부 표현에서 중국 원명시대의 불상의 영향을 받은 것으로 미루어 조선 전기에 제작된 것으로 추정된다.'
    - ‘아이보리’는 지난 10월 2일부터 신생아 필수 품목인 분유와 기저귀 값 지원에 나섰다. ‘아이보리’는 2017년 IT 기업 아이앤나(I&NA 대표 이경재)에서 처음 선보인 임신∙육아 플랫폼으로 산후조리원 내에
      실시간 아기영상 서비스를 제공하고 있으며, 최근 엄마들 사이에서 카시트&유모차 등 외출 용품을 특가로 구매할 수 있는 회원전용 몰로도 유명하다. 아이보리는 외출용품에 이어 최근 분유와 기저귀까지 품목을 대폭
      늘리면서 첫 구매자에 한해 5,000원을 추가 할인 받을 수 있는 프로모션을 진행한다. 강선옥 아이앤나 이커머스 팀장은 “엄마들이 지속적으로 소비하는 생필품 분유와 기저귀 값 절감에 도움을 주고자 이번 행사를
      파격적으로 기획했다”며 “오픈마켓, 종합몰 등에서는 한시적으로 할인행사를 접할 수 있지만 아이보리 몰에서는 필요할 때 언제든 저렴한 가격으로 구매할 수 있도록 상시 특가를 선보일 것”이라고 전했다. 아이보리는
      올 10월부터 정부 바우처 카드인 신한 아이행복카드사의 제휴사로 선정, 대한민국 임신 출산 여성과 소통의 접점을 확대하고 다양한 혜택을 선보일 예정이다. 현재 아이보리는 산후조리원 신생아실 아기 영상을 감상할
      수 있는 베베캠 서비스와 더불어 전국 산후조리원 정보를 제공하고 있으며, 출산을 앞둔 임산부들이 자신이 원하는 산후조리원을 손쉽게 찾고 상담 예약할 수 있는 서비스도 준비중이다
    - 국내 연구진이 알츠하이머의 원인 물질인 독성이 있는 베타아밀로이드 단백질을 제거하는 먹는 치료 물질을 개발했다. 김혜연 고센바이오텍 연구소장과 김영수 한국과학기술연구원(KIST) 선임연구원, 김동진 KIST
      뇌과학연구소장으로 구성된 연구진은 알츠하이머 치매를 유발하는 베타아밀로이드 단백질의 덩어리를 제거하는 EPPS라는 경구용 신약 후보물질을 개발했다고 국제학술지 ‘네이처 커뮤니케이션즈’ 최신호(9일자)에 발표했다.
      논문 주저자인 김 소장과 교신저자인 김 선임연구원은 부부다.기존 알츠하이머 치료 물질은 베타아밀로이드가 독성을 띠지 않도록 억제하는 데 집중하고 있다. 반면 이 물질은 기존에 축적된 베타아밀로이드 단백질을 뇌에서
      제거하는 효능이 있다. 연구진은 발상을 바꿔 치매 증상이 상당히 진행된 환자의 증상을 완화하는 약물을 찾는 과정에서 이 물질을 찾아냈다. 베타아밀로이드가 정상인의 뇌에서도 발견되지만, 알츠하이머 환자에게는 응집된
      형태로 나타난다는 데서 아이디어를 얻었다. 이 물질은 응집된 베타아밀로이드 단백질을 독성이 없는 단백질로 바꿔주는 효과가 있는 것으로 나타났다.투약 방식에서도 발상을 바꿨다. 주사제나 알약, 패치 대신 먹는
      방식을 택했다. 치매에 걸려 길을 못찾는 실험용 쥐에게 물에 타서 3개월간 먹인 결과 길을 다시 제대로 찾아가는 것으로 나타났다. 김 소장은 “국내외 제약사와 임상 연구를 추진할 계획”이라고 말했다.
  - source_sentence: 로봇과 관련된 사업으로 적극적인 움직임을 보이는 회사는?
    sentences:
    - “한국의 산업 자동화 장비 시장이 놀라운 속도로 성장하고 있습니다. 특히 정보기술(IT) 등을 접목한 제품이 잇따라 개발돼 세계 시장에서 좋은 반응을 얻고 있습니다.”13일 서울 삼성동 코엑스에서 막을 올린
      ‘2013 오토메이션 월드’에 참석한 태국 바이어 싱차이 충사완안트는 이같이 말했다. 그는 “독일과 일본 등 선진국에서 열리는 많은 전시회에 가 봤지만 한국 제품이 이에 밀리지 않을 정도로 뛰어난 기술력을 갖고
      있다”고 덧붙였다.올해 23번째로 개최된 오토메이션 월드에 참가한 해외 바이어들은 국내 산업 자동화 기기에 대해 “가격 경쟁력도 갖추고 있고 품질도 뛰어나다”고 입을 모았다. 오는 16일까지 사흘간 열리는 오토메이션
      월드는 자동화 발전 정도를 보여주고 앞으로의 발전 방향을 제시하는 아시아 최대 규모의 산업 자동화 전시회다. 이번 행사의 주제는 ‘커넥트(connect)’. 최근 산업 자동화 관련 업체들이 경기 침체를 극복하기
      위해 다른 분야 기술과의 융합을 시도하고 있는 데 따른 것이다. 이 업체들은 산업 자동화 기술에 IT, 바이오기술(BT), 나노기술(NT) 등을 적극 접목시키고 있다. 국내 1위 센서·제어기기 전문 업체인 오토닉스가
