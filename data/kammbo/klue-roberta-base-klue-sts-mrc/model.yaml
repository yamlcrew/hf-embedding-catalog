      “다양한 작업장에서 활용할 수 있을 것”이라고 설명했다. 지하철 스크린도어에서 사람과 물건을 감지하는 ‘3포인트 크로스빔 에리어센서’도 출품했다. 태양광으로 인한 오작동을 방지하기 위해 빛을 최대 10만lx까지
      제거할 수 있는 기술을 적용했다. 로봇전문업체 NT리서치는 입는 로봇인 ‘로보웨어’로 시장 공략에 나섰다. 로봇을 입으면 무거운 물건을 들 때 피로감을 덜 느끼고 근육을 보호할 수 있다는 게 업체 측 설명이다.
      모터 개발업체 오토파워는 빠른 속도로 움직이는 ‘레이저-650 델타로봇’을 선보였다. 이 로봇은 컨베이어 밸트 위에서 1분당 200개 부품을 정렬·이송한다.
    - “전국 6만4000여가구의 미분양 아파트 때문에 건설업계는 20조원이 물려 있습니다. 이런 상황에서 다주택자의 주택 구매 규제를 풀어주지 않는 게 말이 됩니까.”(대형 건설사 마케팅팀장) 국회에 계류 중인 ‘다주택자
