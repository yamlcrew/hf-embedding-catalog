- source_sentence: 분유, 기저귀 할인 이벤트를 기획한 목적을 설명한 사람의 이름은?
  sentences:
  - '대덕면 죽리 외평마을 입구 당산나무와 함께 있는 석조여래입상은 화강암 석불로 마을 주민의 말에 의하면 고려중기 큰 장마나 전염병 등 마을에 우환을 방멸키 위해 조성된 것으로 화강암 전면에 저부조(低浮彫)로 여래형(如來型)의
    입상을 꽉 차게 조각하였고, 석불 복부에서 양손을 선정인(禪定印)처럼 가지런히 맞잡아 내부에 Y자로 홈이 나있는 연봉우리 같은 지물을 받치고 있다.


    방형의 얼굴에 높은 육계와 정상 계주(繫柱)를 지니고, 코와 입에 비하여 큰 눈을 가지고 있다. 귀는 얼굴 세부처리와 달리 외곽 선을 안쪽으로 파내어 면(面)으로 처리되었으며, 짧은 목에 도식적인 삼도(三道)가
    표현되어 있다.


    양어깨를 덮은 통견은 반원형의 규칙적인 주름이 오른쪽 어깨에 접혀있으며, 상반신에 수직으로 내려오던 옷깃은 왼쪽 가슴에서 약간 외반(外反)하여 자연스러운 느낌을 준다. 안에 입은 군의는 복부 상단에서 넓은 띠로
    묶어 U자형의 주름이 밑으로 늘어져 있다.


    석불의 뒷면은 아무런 조식(彫飾)을 가하지 않았으며, 석불은 고려시대의 형식을 따르고 있지만 세부 표현에서 중국 원명시대의 불상의 영향을 받은 것으로 미루어 조선 전기에 제작된 것으로 추정된다.'
  - ‘아이보리’는 지난 10월 2일부터 신생아 필수 품목인 분유와 기저귀 값 지원에 나섰다. ‘아이보리’는 2017년 IT 기업 아이앤나(I&NA 대표 이경재)에서 처음 선보인 임신∙육아 플랫폼으로 산후조리원 내에
    실시간 아기영상 서비스를 제공하고 있으며, 최근 엄마들 사이에서 카시트&유모차 등 외출 용품을 특가로 구매할 수 있는 회원전용 몰로도 유명하다. 아이보리는 외출용품에 이어 최근 분유와 기저귀까지 품목을 대폭 늘리면서
    첫 구매자에 한해 5,000원을 추가 할인 받을 수 있는 프로모션을 진행한다. 강선옥 아이앤나 이커머스 팀장은 “엄마들이 지속적으로 소비하는 생필품 분유와 기저귀 값 절감에 도움을 주고자 이번 행사를 파격적으로
    기획했다”며 “오픈마켓, 종합몰 등에서는 한시적으로 할인행사를 접할 수 있지만 아이보리 몰에서는 필요할 때 언제든 저렴한 가격으로 구매할 수 있도록 상시 특가를 선보일 것”이라고 전했다. 아이보리는 올 10월부터
    정부 바우처 카드인 신한 아이행복카드사의 제휴사로 선정, 대한민국 임신 출산 여성과 소통의 접점을 확대하고 다양한 혜택을 선보일 예정이다. 현재 아이보리는 산후조리원 신생아실 아기 영상을 감상할 수 있는 베베캠
    서비스와 더불어 전국 산후조리원 정보를 제공하고 있으며, 출산을 앞둔 임산부들이 자신이 원하는 산후조리원을 손쉽게 찾고 상담 예약할 수 있는 서비스도 준비중이다
  - 국내 연구진이 알츠하이머의 원인 물질인 독성이 있는 베타아밀로이드 단백질을 제거하는 먹는 치료 물질을 개발했다. 김혜연 고센바이오텍 연구소장과 김영수 한국과학기술연구원(KIST) 선임연구원, 김동진 KIST 뇌과학연구소장으로
    구성된 연구진은 알츠하이머 치매를 유발하는 베타아밀로이드 단백질의 덩어리를 제거하는 EPPS라는 경구용 신약 후보물질을 개발했다고 국제학술지 ‘네이처 커뮤니케이션즈’ 최신호(9일자)에 발표했다. 논문 주저자인 김
    소장과 교신저자인 김 선임연구원은 부부다.기존 알츠하이머 치료 물질은 베타아밀로이드가 독성을 띠지 않도록 억제하는 데 집중하고 있다. 반면 이 물질은 기존에 축적된 베타아밀로이드 단백질을 뇌에서 제거하는 효능이
    있다. 연구진은 발상을 바꿔 치매 증상이 상당히 진행된 환자의 증상을 완화하는 약물을 찾는 과정에서 이 물질을 찾아냈다. 베타아밀로이드가 정상인의 뇌에서도 발견되지만, 알츠하이머 환자에게는 응집된 형태로 나타난다는
    데서 아이디어를 얻었다. 이 물질은 응집된 베타아밀로이드 단백질을 독성이 없는 단백질로 바꿔주는 효과가 있는 것으로 나타났다.투약 방식에서도 발상을 바꿨다. 주사제나 알약, 패치 대신 먹는 방식을 택했다. 치매에
    걸려 길을 못찾는 실험용 쥐에게 물에 타서 3개월간 먹인 결과 길을 다시 제대로 찾아가는 것으로 나타났다. 김 소장은 “국내외 제약사와 임상 연구를 추진할 계획”이라고 말했다.
- source_sentence: 로봇과 관련된 사업으로 적극적인 움직임을 보이는 회사는?
  sentences:
  - “한국의 산업 자동화 장비 시장이 놀라운 속도로 성장하고 있습니다. 특히 정보기술(IT) 등을 접목한 제품이 잇따라 개발돼 세계 시장에서 좋은 반응을 얻고 있습니다.”13일 서울 삼성동 코엑스에서 막을 올린 ‘2013
    오토메이션 월드’에 참석한 태국 바이어 싱차이 충사완안트는 이같이 말했다. 그는 “독일과 일본 등 선진국에서 열리는 많은 전시회에 가 봤지만 한국 제품이 이에 밀리지 않을 정도로 뛰어난 기술력을 갖고 있다”고 덧붙였다.올해
    23번째로 개최된 오토메이션 월드에 참가한 해외 바이어들은 국내 산업 자동화 기기에 대해 “가격 경쟁력도 갖추고 있고 품질도 뛰어나다”고 입을 모았다. 오는 16일까지 사흘간 열리는 오토메이션 월드는 자동화 발전
    정도를 보여주고 앞으로의 발전 방향을 제시하는 아시아 최대 규모의 산업 자동화 전시회다. 이번 행사의 주제는 ‘커넥트(connect)’. 최근 산업 자동화 관련 업체들이 경기 침체를 극복하기 위해 다른 분야 기술과의
    융합을 시도하고 있는 데 따른 것이다. 이 업체들은 산업 자동화 기술에 IT, 바이오기술(BT), 나노기술(NT) 등을 적극 접목시키고 있다. 국내 1위 센서·제어기기 전문 업체인 오토닉스가 대표적이다. 이 업체는
    이날 행사에서 총 25종의 신제품을 선보였다. 자동화 기기와 PC를 무선으로 연결하는 ‘무선통신 컨버터’는 IT를 적용한 제품이다. 오토닉스는 “최대 100ｍ까지 무선통신이 가능하다”며 “다양한 작업장에서 활용할
    수 있을 것”이라고 설명했다. 지하철 스크린도어에서 사람과 물건을 감지하는 ‘3포인트 크로스빔 에리어센서’도 출품했다. 태양광으로 인한 오작동을 방지하기 위해 빛을 최대 10만lx까지 제거할 수 있는 기술을 적용했다.
    로봇전문업체 NT리서치는 입는 로봇인 ‘로보웨어’로 시장 공략에 나섰다. 로봇을 입으면 무거운 물건을 들 때 피로감을 덜 느끼고 근육을 보호할 수 있다는 게 업체 측 설명이다. 모터 개발업체 오토파워는 빠른 속도로
    움직이는 ‘레이저-650 델타로봇’을 선보였다. 이 로봇은 컨베이어 밸트 위에서 1분당 200개 부품을 정렬·이송한다.
  - “전국 6만4000여가구의 미분양 아파트 때문에 건설업계는 20조원이 물려 있습니다. 이런 상황에서 다주택자의 주택 구매 규제를 풀어주지 않는 게 말이 됩니까.”(대형 건설사 마케팅팀장) 국회에 계류 중인 ‘다주택자
    양도세 중과 폐지’(소득세법)와 ‘분양가 상한제 탄력 적용’(주택법) 법안의 연내 처리가 불투명해지면서 부동산 시장 회복 기대감도 수그러들고 있다. 부동산 시장 활황기에 도입된 이들 ‘규제 대못’이 뽑히지 않는
    한 주택 거래 정상화는 힘들 것이라는 지적이 많다.22일 서울시에 따르면 이달 들어 20일까지 서울 아파트 거래건수는 4149건으로 지난달의 86% 수준이다. 취득세 인하, 리모델링 수직증축법 통과 등의 ‘호재’로
    주택 거래 회복을 예상했으나 기대에 크게 못 미치는 것으로 나타났다. 주택업계는 ‘다주택자 양도세 중과 폐지’ 등 부동산 핵심 법안의 연내 국회 통과가 어려울 것이라는 우려가 커지고 있기 때문으로 풀이했다. 양도세
    중과 폐지를 다룰 기획재정위원회 소위원회의 경우 민주당이 ‘부자 감세’라는 당론을 굽히지 않고 있어 논의조차 하지 못하고 있다. 분양가 상한제 탄력 적용안을 다룰 국토교통위원회 소위원회도 역시 개최 일정을 못잡고
    있다. 다주택자 양도세 중과와 분양가 상한제는 이명박 정부에서도 5년간 꾸준히 폐지를 시도했으나, 결말을 내지 못했다. 다주택자 양도세 중과는 현재 5년째 적용을 유예해오고 있다. 이번에는 ‘미적용 연례 행사’를
    매듭지어야 한다는 목소리가 적지 않다. 주택보급률이 103%를 넘어선 상황에서 다주택자의 주택 거래 시장 진입을 막는 것은 과도한 규제라는 것이다. 이상영 명지대 부동산학과 교수는 “주택보급률 상승, 신규 주택
    공급 과잉뿐 아니라 1~2인 가구 증가, 베이비붐 세대 은퇴 증가 등 부동산 시장의 인구 구조도 예전과 크게 달라졌기 때문에 ‘1가구 1주택 중심의 정책’을 바꾸고 다주택자에 대한 징벌적 규제를 신속히 풀어야 한다”고
    지적했다.
  - 최근 5년 동안 횡령·배임죄로 기소돼 1심 판결을 받은 경제사범 10명 중 3명이 집행유예를 받은 것으로 집계됐다. 13일 대법원이 발간한 ‘2013 사법연감’에 따르면 2008년부터 2012년까지 최근 5년 동안
    횡령·배임죄로 기소돼 1심에서 집행유예를 선고받은 1만671명 가운데 지난해 집행유예를 선고받은 경우가 1785명(33.11%)으로 가장 적었다. 연도별로는 △2008년 2209명(36.04%) △2009년 2312명(35.64%)
    △2010년 2284명(35.53%) △2011년 2081명(35.35%) △2012년 1785명(33.11%)으로 나타나 소폭이지만 매년 집행유예율이 하락했다. 횡령·배임죄로 기소돼 1심 선고를 받은 경우는 연도별로
    △2008년 6128명 △2009년 6487명 △2010년 6427명 △2011년 5886명 △2012년 5390명이었다. 보석신청 허가율은 △2008년 4386명(42.91%) △2009년 4465명(44.05%)
    △2010년 3649명(44.80%) △2011년 3124명(43.24%) △2012년 2414명(38.64%)으로 집계돼 감소 추세를 보였다.
- source_sentence: 아트숨비 센터가 문을 닫는다고 말한 사람의 이름은?
  sentences:
  - 아트숨비가 오는 10월 5일 은평구 응암동에 복합문화예술 공간 ‘아트숨비 센터’를 공식 오픈한다. 문화소외계층에게 찾아가는 예술활동을 해왔던 아트숨비의 미션을 담아, 예술인프라가 부족했던 서북권 지역민에게 ‘예술로
    풍요로운 삶’을 제공하는 신개념 예술공간으로 기획되었으며, ‘어디서든, 숨비로운 날’이라는 컨셉의 이색적인 오픈 행사도 진행한다. ‘어디서든, 숨비로운 날’은 문화예술을 통해 삶을 풍요롭게 한다는 아트숨비의 비전을
    담은 컨셉이며 언택트 개관식을 비롯해, 각종 예술 체험 프로그램으로 구성될 예정이다. 일부 관계자 행사를 제외 모든 프로그램은 누구나 제약 없이 참여 가능하다. 서울 서북권 이색 복합문화예술 공간으로 주목받을 ‘아트숨비
    센터’는 미술전시와 전 세대를 아우르는 예술 프로그램을 제공하여, 예술향유층을 넓히는 새로운 경제가치를 창조할 것으로 기대된다. 무엇보다, 신종 코로나바이러스 감염증(코로나19)로 지쳐 있는 시민들에게 건강한 예술로
    위안을 주는 힐링 플레이스로 자리매김할 전망이다. 또한 미술주간 기간에 시작하는, 첫번째 지역 문화예술 프로젝트 <응암 아트 무브먼트!>도 이목을 집중시킨다. <응암 아트 무브먼트!>는 청년 예술가와 기획자, 지역민이
    함께 참여하는 문화 예술 활동으로, 두가지 프로그램으로 구성된다. 아트숨비의 첫번째 개관전시인 <숨비로운날>展은 은평구 지역작가와 청년작가의 작품으로 구성 되어있으며 누구나 참여 가능한 전시 연계 체험 프로그램
    또한 제공한다. <아우어 파사드>展은 ‘은평의 멋＇을 주제로 은평구에서 활동중인 지역작가들과 지역주민들이 촬영한 영상을 교차 편집하여 아트숨비 사옥 외관에 송출하는 미디어 전시이다. <응암 아트 무브먼트!>는 아트숨비
    센터 개관 후 한 달간 진행될 계획이다. 아트숨비 김민 대표는 “아트숨비 센터가 많은 청년 예술가에게는 창작활동을 지속할 수 있는 든든한 기반이 되고, 지역 주민에게는 일상에서 양질의 문화예술을 누릴 수 있는 공간으로
    사랑받기를 바란다. ”고 소감을 전했다.
  - 롯데그룹의 경영권 승계 분쟁에 대한 비판적 여론이 도를 넘어서면서 비이성적인 ‘반(反)기업 캠페인’을 부추기고 있다. 정치권은 철 지난 ‘재벌개혁’을 들고나오고 일부 소비자단체는 롯데의 국적 정체성에 의문을 제기하며
    불매운동에 나설 조짐을 보이고 있다. 이번 경영권 다툼이 많은 국민에게 실망감을 안겨주고 있지만 ‘롯데 사태’를 정략적으로 이용하고 기업의 성장을 왜곡하는 ‘포퓰리즘’은 차단해야 한다는 목소리가 나온다. ▶관련기사
    A4, 5, 19면5일 정치권에 따르면 정부와 새누리당은 6일 당정회의를 열어 대기업 지배구조 관련 개선책을 협의하기로 했다. 김정훈 새누리당 정책위원회 의장은 이날 “대기업 오너가 미미한 지분과 순환출자로 기업을
    개인회사처럼 좌지우지하는 것은 경제 정의에 부합하지 않는다”며 “필요하다면 기존 순환출자까지 금지하는 방안도 검토할 것”이라고 말했다. 야당도 롯데그룹을 겨냥한 표적 입법을 추진하고 있다. 신학용 새정치민주연합
    국회의원은 “해외 계열사를 통해 상호출자한 경우에도 공정거래법상 상호출자 제한을 의무화하는 내용을 담은 공정거래법 개정안을 준비 중”이라고 밝혔다.롯데에서 벌어지고 있는 형제간 분쟁은 밀실경영 등 부정적 단면을
    드러냈다는 비난을 받고 있다. 하지만 신격호 총괄회장이 단돈 83엔을 들고 일본에 건너가 성공한 뒤 한국으로 돌아와 연매출 89조원의 글로벌 기업으로 키운 회사를 ‘국민 정서법’으로 재단해선 안 된다는 의견이 많다.
    롯데 사태를 반일 감정과 연계해 불매운동을 벌이는 것도 도를 넘은 움직임이라는 비판이 나온다.더욱이 정치권이 반기업 정서를 빌미로 반시장적 법안을 내놓겠다는 것은 내년 4월 총선을 앞두고 롯데 사태를 포퓰리즘적으로
    이용하려는 의도가 깔려 있다는 것이 경제계의 시각이다. 정치권이 재벌개혁을 전면에 들고나오면서 규제 완화, 노동시장 개혁 등 경제 활성화를 위한 주요 현안이 뒤로 밀릴 것이란 우려도 커지고 있다. 유병연/김병근/이정호
    기자
  - “40년간 막혔던 동빈내항에 리버크루즈가 운항되는 것을 보세요. 이젠 포항이 해양관광레저 도시를 연 것입니다.”박승호 포항시장은 4일 포항운하 개통과 관련, “포스코가 40여년간 포항에 일군 영일만 신화를 포항운하를
    통해 다시 일으키겠다”며 이같이 말했다.지난 2일 형산강과 동빈내항의 물길을 잇는 포항운하 통수식이 열렸다. 포항운하는 형산강 입구에서 포항 도심의 송도교 인근 동빈내항까지 1.3㎞ 구간을 폭 15~26m, 수심
    1.74m로 물길을 낸 사업이다. 1600억원의 사업비가 투입됐다. 30여만명이 몰린 통수식에는 선박 90여척이 수상 퍼레이드를 하고 46인승 연안크루즈와 16인승 리버크루즈가 운항했다. 죽도시장에서 활어회를 파는
    김남선 씨(75·여)는 “그동안 철강경기 침체로 포항시민들의 기가 많이 죽었는데 모처럼 생기가 돈다”며 환하게 웃었다. 포항시가 해양 레저도시로 리모델링하는 작업에 착수했다. 운하 주변 지역에 민자를 유치해 수상카페와
    호텔, 콘도， 테마파크， 워터파크 등을 조성해 관광특구로 건설할 계획이다. 또 포항운하와 연계한 영일만대교 및 해상신도시 건설 등 중장기 개발사업도 추진하기로 했다. 시 관계자는 “이를 통해 연간 국내외 관광객
    2000만명을 유치하고 1조원 이상의 경제효과를 가져올 것으로 기대된다”고 말했다. 포항지역 민간에서는 포스텍을 중심으로 의료·교육도시로 변신하는 데 성공한 미국 피츠버그시를 벤치마킹하려는 움직임이 일어나고 있다.
    포항AP포럼은 지난 7월 피츠버그시를 다녀와 최근 보고서를 내고 “포항도 철강을 대체할 고부가 신산업 육성에 나서야 한다”고 제안했다. 이를 위해 창의적 인재양성에 집중해야 한다는 것이다. 김용민 포스텍 총장 주도로
    상공회의소 등 포항지역 주요 인사들이 모여 설립한 포항AP포럼은 조만간 범시민협의체를 조직하고 여론을 형성해 나가기로 했다. 또 향후 10년간 지능형 로봇, 유비쿼터스 헬스, 휴먼웨어 컴퓨팅 등에서 인재 350명을
    육성하기로 했다.
- source_sentence: 이회광이 이용구의 추천으로 원종 고문 자리에 세운 사람은?
  sentences:
  - '1895년 12월 독립협회의 동지 서재필이 복권되어 귀국했다. 서재필이 처음 귀국했을 때 윤치호는 춘생문사건에 연루된 혐의를 받고 체포대상이 되어 언더우드 박사 집에 피신해 있었다. 서재필은 두문불출하던 윤치호를
    찾아 정세에 대해 자문했고, 윤치호는 선배 서재필의 공백기에 조선 정세를 친절하게 알려주면서 동시에 정동구락부 인사들과 접촉할 수 있도록 주선, 다리를 놓아주기도 했다. 귀국 직후 시도했던 신문 간행이 일본에 의해
    좌절될 뻔했을 때 서재필의 상심을 들어주던 유일한 대화 상대는 윤치호였던 것이다


    귀국 직후 서재필은 조선의 모든 것에 대해 극히 부정적인 태도를 보였다. 갑신정변의 실패에 크게 낙심, 좌절했고 이를 역적시하는 고종 등의 태도, 일가족이 처참하게 희생된 것, 일본 망명생활 중 조선 조정에서 자신을
    암살할 자객을 보낸 것, 미국생활 초반에 당했던 온갖 인종차별과 멸시는 서재필에게 무능하고 부패한 조선 조정과 무지한 민중들에 대한 원한과 경멸과 증오심을 더욱 증폭시켰다. 귀국 직후부터 서재필은 거의 영어로 대화했고,
    되도록 독립문 기공식 때에도 영어로 연설했다. 윤치호는 이를 자신의 일기에 일부 기록해두었다. 또한 윤치호 등과 살아남은 조카들이 그에게 자결로 죽은 전처의 묘소와 논산 연무대 근처에 있던 생모 성주이씨의 묘소의
    위치를 알려주었다. 그러나 그는 한번도 방문하지 않았고, 오히려 가보라는 윤치호의 권고를 거절한다.


    서재필은 갑신정변 사건으로 천민(賤民)이 되어 자살한 전처의 무덤을 찾아보지 않아 비난을 받았다. 거지꼴이 된 장인(丈人)이 찾아오자 이를 거들떠 보지도 않고 않았다. 그(서재필)은 냉혹하고 거만한 사람이다.


    그는 갑신정변 직후의 쓰라린 기억을 생각하는 것을 고통스러워했고, 오히려 냉정해지려 했다. 그러나 서재필의 이런 태도는 오히려 윤치호를 비롯한 동지들과 다른 조선인들에게 반감을 주게 된다. 한편 서재필은 다른 조선인들에게도
    상당히 냉담하게 대하였다.


    그의 미국인 고우는 그와 함께 거리를 걷다가 그가 가까이 오는 거지를 발길로 차는 것을 보고 큰 충격을 받았다.|윤치호 일기 1898년 1월 15일자


    서재필의 미국인 친구가 그에게 구걸하러 오는 어느 조선인 거지를 노상에서 발로 걷어차고 모욕을 해도, 서재필은 이를 지켜보면서 방관하였고 윤치호는 이를 보고 불쾌히 여겼다. 영어를 주로 구사하는 그의 태도를 의문스럽게
    여긴 윤치호는 왜 영어만 쓰느냐고 물었고, 그는 모국어를 거의 잊어버렸다고 답했다. 그러나 그는 한국어를 구사할 수 있었고 이를 알던 윤치호는 ''나는 서재필이 쓰거나 말하는 모든 것에 걸쳐 모국어를 거의 잊어
    버렸다는 사실에 크게 놀랐다''는 기록을 남겼다.'
  - “한국 문화콘텐츠 분야의 성공 사례를 배워 중국 시장에 적용하고 싶습니다. 방법은 여러 가지가 있겠죠. 한국 기업에 직접 투자하거나 한·중 합작 콘텐츠를 만드는 방법, 혹은 중국에 현지 법인을 세워 한국의 성공
    콘텐츠를 생산할 수 있겠죠. 이번 방문을 계기로 한국과 중국이 시너지를 낼 수 있는 기회를 만들고 싶습니다.”시즈지엔 중국 FD벤처스 공동대표(사진)는 2일 서울 삼성동 코엑스 콘퍼런스룸에서 ‘2014 아시아 전략시장
    진출 투자 쇼케이스’에 참가한 이유에 대해 이렇게 설명했다. 그는 “FD벤처스는 정보기술(IT)벤처 캐피털 회사로 주로 바이오기술에 투자했는데 지금은 문화콘텐츠 펀드를 늘려가고 있다”며 “주로 게임 및 드라마와
    관련된 프로젝트를 진행하고 있다”고 말했다.FD벤처스는 10억위안(약 1718억원) 규모의 문화콘텐츠 펀드를 조성해 주로 중국의 문화콘텐츠 기업에 투자할 계획이다. 시즈지엔 대표는 “중국 정부, 민간 콘텐츠 상장회사,
    중국 방송국, 개인 등이 현재 2억위안(약 340억원)을 모았다”며 “최근 문화콘텐츠에 대한 관심이 높아지면서 개인 투자 규모가 꾸준히 늘고 있다”고 설명했다.그는 “한국의 유명 게임 제작회사의 게임을 중국에 수입해
    현지화하는 작업을 구상 중”이라며 “구체적으로는 한국의 인기 드라마 판권을 사서 같은 이름의 게임을 만들고 싶다”고 말했다. 이어 “게임 분야는 중국 정부의 규제가 까다롭지 않아 발전 가능성이 더 크다”고 덧붙였다.한국의
    문화 콘텐츠가 중국에서 인기를 끄는 요인은 뭘까. 그는 “중국 젊은이들은 한국 게임을 좋아하고, 중년들은 한국 드라마를 좋아한다”며 “유교 등 비슷한 문화, 스타 배출 시스템의 정착과 산업화, 남녀노소 누구나 즐길
    수 있는 비정치적인 내용 등 세 가지가 인기 비결”이라고 설명했다.
  - "양주 출신으로 19세에 출가하여 설악산 신흥사에서 정함스님에게 득도한 뒤 건봉사에서 보운스님의 법통을 이었다. \n\n이회광은 역대 고승들의 행적을 적은 《동사열전》에 조선의 마지막 대강백(大講伯)으로 기록되었을\
    \ 만큼 명망이 높은 승려였다. 이 때문에 한일 병합 조약 체결을 앞두고 1906년 조직된 친일 성향의 불교 단체 불교연구회는 1908년 원종이라는 종단을 창설해 이회광을 종정으로 추대했다.\n\n이때부터 친일\
    \ 행적을 보이기 시작한 이회광은 이용구의 권유에 따라 일본인 승려 다케다 한시(武田範之)를 원종 고문으로 임명하였고, 1910년 한일합방이 성사되자마자 일본의 소토슈(曺洞宗)와 연합을 추진했다. 연합 조인은 1910년\
    \ 10월 6일의 일로, 이에 따르면 조선 불교가 일본 불교에 합병된 셈이었다. 일본으로 건너가 연합 조약을 직접 체결한 이회광은 ‘불교계의 이완용’으로 불리며 많은 반대에 부딪혔다. 조선총독부는 이듬해 사찰령을\
    \ 발포하여 이회광이 추진한 소토슈와의 연합은 부결하였으나, 그를 해인사의 주지로 임명했다. 사찰령에 따라 통폐합된 30본산 연합체의 대표격인 주지회의원 초대 원장도 맡았다. 원종 고문으로 임명된 다케다는 일본\
    \ 불교 소토슈 승려로 현성사 주기를 하였고, 을미사변에 참여하였으며 이용구를 통해서 동학의 분열과 일진회의 어용화를 획책한 사람이다\n\n이후 1915년에는 친일 단체인 불교진흥회를 조직하고 경술국적 중 한 명인\
    \ 조중응을 고문으로 추대한 뒤, 또다른 친일 승려인 강대련과는 대립하면서 열성적인 친일 활동을 벌였다.\n\n김구하, 강대련, 곽법경, 권상로 등 다른 친일 승려들과 함께 삼십본산연합사무소 위원장 김구하가 추진한\
    \ 일본불교시찰단에 참여하여 일본에 다녀오기도 했다. 이들은 조선총독 하세가와 요시미치에게 현금으로 여행 경비를 받았으며, 한국에서 떠날 때는 이완용이 전송하고 일본에 도착해서는 조선총독을 지낸 일본 총리 데라우치\
    \ 마사타케의 초대를 받는 등 극진한 환대를 받았다. 이회광은 족자를 선물로 준비해 데라우치에게 전달했다.\n\n1919년 3·1 운동 직후에는 일본 불교와 조선 불교 임제종을 합병하고자 다시 일본을 방문했다.\
    \ 일본 정부의 고위 관료들과 접촉하고 돌아와 합병을 추진했으나, 강대련과의 갈등으로 반대에 부딪혀 실패했다. 여론이 악화되면서 해인사 승려들이 이회광의 사임을 요구하는 탄원서를 총독부에 제출하여 1924년 결국\
    \ 해임사 주지 자리에서도 밀려났다. 조선총독부를 제치고 일본 본국과 직접 접촉하다가 말썽을 일으키는 지나친 친일 성향과 권력욕은 총독부와의 관계에도 도움이 되지 않았다.\n\n이회광은 이에 굴하지 않고 위봉사\
    \ 주지직에서 밀려난 곽법경과 함께 현 조선불교를 근간부터 바꾸어 정교일치(政敎一致)와 일선융화(日鮮融和)로 불교계를 개혁해야 한다는 친일적인 내용의 건백서를 제출했다. 김구하도 함께 공작에 참가했고 곽법경은 건백서를\
    \ 들고 일본으로 건너가기까지 했으나, 이 사실이 언론에 보도되면서 계획은 또다시 좌절되었다."
- source_sentence: 사이퍼즈' 부문의 우승 상금은?
  sentences:
  - '㈜넥슨(대표 이정헌)은 11월 23일부터 인기 온라인게임 ‘던전앤파이터(이하 던파)’와 ‘사이퍼즈’의 공동 온라인 e스포츠 대회 ‘레벨업 X 던전앤파이터&사이퍼즈 : 언택트 토너먼트(이하 언택트 토너먼트)’ 시즌2를
    개최한다. 올해 두 번째 시즌으로 진행되는 ‘언택트 토너먼트’는 현장 관람객 없이 LVUP.GG 트위치 채널 ‘사이퍼즈’ 공식 유튜브 채널을 통해 각각 생중계된다. 11월 23일부터 12월 2일 2주간 총 4회에
    걸쳐 진행되며, 20시부터 ‘던파’와 ‘사이퍼즈’ 리그가 동시에 시작된다. 참가자 모집은 오는 11월 5일부터 16일까지이며, LVUP.GG 페이지에서 신청할 수 있다. 총 상금 1,950만 원 규모의 ‘던파’
    부문은 게임 내 3대3 PvP 방식의 ‘대장전’ 모드로 16강 토너먼트 경기가 진행된다. 우승팀에는 900만 원의 상금이, 준우승팀에는 600만 원의 상금이 주어진다. 총 상금 1,320만 원 규모로 진행되는 ‘사이퍼즈’
    부문은 6인 1팀 구성, 5대5 공성전 모드로 8강 토너먼트 경기가 펼쳐진다. 우승팀과 준우승팀에는 600만 원, 360만원의 상금을 각각 제공한다.'
  - 맥도날드는 이색 디저트 메뉴 ‘타로 파이’가 출시 후 100만 개 이상의 판매량을 돌파하며 큰 인기를 얻고 있다고 밝혔다. 맥도날드의 타로 파이는 부드럽고 달콤한 연보랏빛 크림과 타로 알갱이의 고소한 맛이 일품인
    디저트 메뉴로, 해외 여행객들 사이에서 현지에서 반드시 먹어봐야 할 이색 메뉴로 입소문을 타며 국내 출시 요청이 쇄도했던 메뉴다. 지난 9월 국내에서 처음 출시된 이래 약 5주 만에 100만 개 이상 판매되는 등
    큰 호응을 얻으며 인기 메뉴로 등극했다. 맥도날드는 더 오랜 기간 동안 타로 파이를 즐기고 싶다는 고객의 성원에 보답하고자 당초 11월 4일까지 한정 판매 예정이었던 타로 파이의 판매 기간을 12월 30일까지 연장하기로
    했다. 특히 타로 파이는 따뜻하면서도 달콤한 타로 필링과 바삭바삭 부서지는 파이가 환상적인 조화를 이뤄 추워진 날씨에 한층 잘 어울리는 간식으로, 커피와 잘 어울린다는 고객들의 호평을 얻고 있다. 이에 맥도날드는
    이 같은 고객의 목소리를 적극 반영해 오는 11월 12일부터 25일까지 모든 커피 메뉴 구매 시 타로 파이를 단 500원에 제공하는 특별 행사를 진행할 예정이다. 단, 맥딜리버리는 제외된다. 맥도날드 관계자는 “타로
    파이에 대한 뜨거운 고객 성원에 보답하기 위해 올해 말까지 만나 보실 수 있도록 판매 기간을 연장했다”며 “쌀쌀한 날씨에 버거와 함께 간편하고 든든하게 드시기 좋은 따뜻한 타로 파이로 ‘천원의 행복’을 즐겨 보시기
    바란다”고 밝혔다.
  - '현존하는 가장 오래된 사본 중에도 《탄이초》의 저자명은 없으며, 현재까지 밝혀진 바로는 처음부터 적혀 있지 않았다고 한다. 그러나 내용으로 미루어보아 신란의 제자인 유이엔이 저자라는 설이 학계의 정설로 되어 있다.
    《탄이초》를 신란의 저서로 생각하는 사람들이 있으나, 실은 신란의 신앙 어록일 뿐 직접 쓴 것은 아니다. 이것은 신란을 스승으로 모신 제자 유이엔이 스승의 사후 그의 가르침인 절대 타력에 대한 믿음을 적은 신앙서다.


    신란이 장년기 20년간을 바쳐 교화한 결과 일본의 관동 지방에는 수천 명의 신자가 있었다고 한다. 신자들 가운데 지도적 입장에 있었던 사람들 60여 명의 이름이 지금도 남아 있으며, 유이엔은 그중 한 사람이다.
    유이엔은 당시 관동에서 신란 사후 20년 이상을 생존했으며, 깊은 학덕을 지녀 《탄이초》의 저자에 가장 부합하는 인물로 알려져 있다. 이렇게 이 책의 저자로 알려져 있는 유이엔은 본문 9장과 13장의 신란과 문답을
    나누는 장면에도 등장하고 있다. 지금의 일본 미토시(水戶市)에 있는 호부쓰사(報佛寺)를 세운 그는, 그곳에 염불 도량을 열었으며, 지금도 그 흔적이 도량지(道場池)라는 못으로 남아 있다. 그러나 그 밖에는 그에
    관한 정확한 기록이 많지 않다.'
