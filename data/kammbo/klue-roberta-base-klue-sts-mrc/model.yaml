      양도세 중과 폐지를 다룰 기획재정위원회 소위원회의 경우 민주당이 ‘부자 감세’라는 당론을 굽히지 않고 있어 논의조차 하지 못하고 있다. 분양가 상한제 탄력 적용안을 다룰 국토교통위원회 소위원회도 역시 개최 일정을
      못잡고 있다. 다주택자 양도세 중과와 분양가 상한제는 이명박 정부에서도 5년간 꾸준히 폐지를 시도했으나, 결말을 내지 못했다. 다주택자 양도세 중과는 현재 5년째 적용을 유예해오고 있다. 이번에는 ‘미적용 연례
      행사’를 매듭지어야 한다는 목소리가 적지 않다. 주택보급률이 103%를 넘어선 상황에서 다주택자의 주택 거래 시장 진입을 막는 것은 과도한 규제라는 것이다. 이상영 명지대 부동산학과 교수는 “주택보급률 상승,
