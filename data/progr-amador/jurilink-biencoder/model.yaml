  - source_sentence: 'I - Na ação de impugnação judicial da regularidade e licitude do despedimento, com fundamento em extinção
      do posto de trabalho, não tendo o empregador requerido a exclusão da reintegração do trabalhador, para o caso do despedimento
      vir a ser declarado ilícito, não compete ao tribunal conhecer de tal exclusão; II - A prova dos requisitos para a extinção
      do posto de trabalho compete ao empregador (artigo 342.º, n.º 1, do CC); III - Não se mostram provados os requisitos
      e, por consequência, o despedimento é de considerar ilícito, se da matéria de facto apenas resulta, de relevante, que
      a empregadora/Ré perdeu o contrato de prestação de um serviço de enfermagem, onde há mais de um ano a trabalhadora/enfermeira/Autora
      tinha deixado de exercer a atividade ao serviço daquela, mas não se provou que com a cessação desta prestação de serviços
      a empregadora não tivesse disponível qualquer outro posto de trabalho que fosse compatível com a categoria profissional
      possuída pela trabalhadora, bem como que a empregadora tenha perdido receita anual, que conduziu a um grave desequilíbrio
      económico-financeiro; IV - O conceito de assédio moral integra todos os comportamentos humilhantes, vexatórios e atentatórios
      da dignidade do trabalhador que se prolonguem no tempo e que tenham como intenção exercer pressão moral sobre o mesmo,
      com vista a um objetivo final ilícito ou eticamente reprovável; V – Verifica-se comportamento assediante por parte da
      empregadora no seguinte quadro fáctico: (i) em ../../2021 a Ré determinou à Autora que passasse a exercer as funções
      de Técnica de Ambulância de Transporte e não de enfermeira, o que motivou a intervenção do Sindicato dos Enfermeiros
      Portugueses ; (ii) na sequência de interpelação da Autora, no sentido de ver fixado o seu horário de almoço, em 4 de
      março de 2022 a Ré alterou-lhe o horário de trabalho, tendo, para o efeito, sido avisada tão-só no dia anterior e, cumprindo
      anteriormente o horário de trabalho das 9h às 18h, passou a ter o horário das 9h às 13h e das 15h às 19h, fixando-se
      duas horas de almoço, sem qualquer justificação e com claro prejuízo para a vida pessoal e descanso da Autora, que assim,
      saia uma hora mais tarde do que o previsto, o que motivou a intervenção do Sindicato dos Enfermeiros; (iii) em 8 de
      junho de 2022 e em 12 de agosto de 2022, a Autora solicitou trabalhar em jornada contínua, o que sempre lhe foi indeferido;
      (iv) na sequência da declaração do médico de medicina do trabalho – de que a Autora não podia carregar pesos superiores
      a 10 Kg – , quando se apresentava ao serviço não lhe eram atribuídas funções, permanecendo a mesma sentada num sofá
      no interior das instalações da Ré, num corredor de passagem, que funciona como sala de estar, onde circulavam todos
      os colegas da Autora; (v) a partir dessa altura, a Autora não tinha funções distribuídas, via passar os seus colegas
      para os vários trabalhos quer de enfermagem, quer Técnicos de Ambulância de Transporte, quer Técnicos de Ambulância
      de Socorro, assoberbados com o trabalho, enquanto ela se encontrava sentada no sofá; (vi) em ../../2022 foi-lhe ordenado
      por um elemento da direção da Ré que carregasse uma caixa do seu escritório para a unidade de emergência, enquanto uma
      senhora funcionária da secretaria assistia; (vii) nesse mesmo dia, o mesmo elemento da direção da Ré, verificando que
      a Autora se encontrava sentada no sofá a ler livros, dirigiu-lhe as seguintes expressões: “Está proibida de ler, ler
      é um desrespeito para com os seus colegas, não pode ler aí, está a gozar com os seus colegas” e (viii) após a ação Inspetiva
      da ACT e até ao termo do contrato, a Autora passou a alternar os períodos no sofá com o transporte de doentes autónomos
      em que a sua função se limitava a abrir e fechar a porta das ambulâncias; VI – No circunstancialismo descrito, e tendo
      em conta que com o referido comportamento a trabalhadora/Autora se sentiu perturbada psicologicamente de forma profunda,
      triste, desanimada e preocupada, ansiosa com toda a situação, sendo pessoa normalmente alegre, bem disposta e comunicativa,
      passou a estar triste, esmorecida, chorosa e desanimada, que tinha sido admitida ao serviço da Ré em 01-10-2019 e que
      auferia mensalmente € 1.205,08, justifica-se, a este título, uma indemnização, por danos não patrimoniais, de € 10.000,00.
      (Sumário elaborado pelo relator)'
    sentences:
    - I. Para verificar se no requerimento de abertura de instrução apresentado pelo assistente, relativamente a factos pelos
      quais o Ministério Público não tiver deduzido acusação, constam narrados todos os factos que fundamentam a aplicação
      ao arguido de uma pena deve atender-se à globalidade daquele e não apenas à parte que o assistente efetua uma acusação
      alternativa; II. No nosso sistema processual penal, em matéria de recursos, predomina o sistema de substituição, embora
      com limitações (cfr. art.º 426.º, n.º 1, do C.P.P.), pelo que, em caso de procedência, o conteúdo normal do recurso,
      que corresponde à sua finalidade, é a substituição da decisão recorrida por outra, não devendo a instância de recurso
      limitar-se a revogar aquela, mandando baixar o processo ao tribunal recorrido para que este profira uma nova decisão.
    - I – Assente a ressarcibilidade do dano da privação do uso de um veículo, para se fixar o quantum da indemnização podem
      ser seguidos diversos critérios. II – O custo do aluguer de um veículo além de cobrir a margem de lucro a que qualquer
      atividade económica aspira, tem que necessariamente cobrir os custos inerentes ao desenvolvimento de tal atividade,
      sob pena de insolvência a breve trecho da entidade que a desenvolve. III – E porque assim é, o dano da privação do uso
      do veículo sinistrado, sempre que o lesado não prova a efetiva realização de despesas com o aluguer de um veículo de
      substituição, não se pode aferir pelo valor locativo de um veículo similar ao sinistrado, sob pena de um injustificado
      enriquecimento do lesado. IV – Assim como não podem os valores previstos na tabela da ANTRAM, para efeitos de compensar
      a paralisação dos veículos dos respetivos associados, ser aplicados “tout court”, antes e apenas como mero referencial
      a considerar no juízo de equidade a fazer nos termos do nº 3 do art. 566º do Código Civil. V – Concluindo-se pelo dano,
      e não sendo possível quantificá-lo em valores certos face aos factos provados, o tribunal deverá recorrer à equidade
      para fixar a indemnização, nos termos previstos no citado artigo 566º, nº 3, do Código Civil.
    - '- No contrato de mediação imobiliária impende sobre o mediador o ónus de provar a verificação dos requisitos para o
      recebimento da remuneração, nomeadamente o nexo de causalidade entre a sua actividade e a conclusão do negócio. Ou seja,
      a prestação do mediador terá de ser causal, em relação ao negócio celebrado entre o comitente e o terceiro; - Decorre
      do art.º 19º da Lei 15/2013, que a obrigação de pagamento da comissão é única e só se constitui em caso de concretização
      da venda, não obstante poder estipular-se que o cumprimento dela pode ocorrer por fases, sendo a primeira parcela devida
      aquando da celebração do passo inicial na contratação pretendida, isto é, do contrato-promessa; - A segunda parte do
      nº1 do artigo 19º da Lei 15/2013 não pode ser destacada da sua primeira parte, como se ali se estabelecesse um direito
      autónomo de remuneração, antes constituindo uma estatuição balizada pela clara e inequívoca disposição inicial; - Se
      não é imputável aos Recorridos a não celebração do contrato definitivo e não resultando provados nos autos que foi estipulada
      uma remuneração específica aquando da celebração do contrato promessa, sem prejuízo da celebração ou não do negócio
      prometido, deve ser restituída aos mediados a remuneração já recebida aquando da celebração daquele contrato promessa.'
  - source_sentence: O prazo previsto no nº 3, do art. 59º, do RGCO não é um prazo judicial, mas um prazo de natureza administrativa,
      não se suspendendo nas férias judiciais.
    sentences:
    - 1. O prazo de impugnação da decisão condenatória da ACT pela prática de uma contra-ordenação laboral não se suspende
      aos sábados, domingos e feriados [artigos 6.º, n.º 1 do RGCOL (Lei n.º 107/09), 104.º, n.º 1 do CPP e 138.º, n.º 1 do
      CPC] nem durante as férias judiciais [art.º 6.º, n.º 2 d o RGCOL] 2. O RGCO (art.º 60.º) tem regime distinto ao dispor
      expressamente no seu n.º 1 que o prazo para a impugnação da decisão da autoridade administrativa “suspende-se aos sábados,
      domingos e feriados”, 3. A notificação da decisão administrativa deve ser feita ao arguido e ao seu advogado (arts.
      47.º do RGCO e 113.º, n.º 10, do CPP), contando-se o prazo para impugnação da decisão administrativa a partir da data
      da notificação efetuada em último lugar. 4. O regime de notificação previsto no artigo 9.º do RGCOL não é aplicável
      à notificação ao advogado do arguido da decisão administrativa que aplica a coima, sendo-o o regime do artigo 113.º,
      do Código de Processo Penal, subsidiariamente aplicável.
    - A notificação da sociedade arguida declarada insolvente para efeitos do artigo 105º, n.º 4, b) do RGIT tem que ser realizada
      nas pessoas dos seus legais representantes que à data eram os responsáveis pelo pagamento das remunerações aos trabalhadores
      e não na pessoa do administrador da insolvência. (Da responsabilidade da Relatora)
    - I - No âmbito do art.º 285º do Código do Trabalho, os conceitos de unidade económica e de transmissão da mesma não se
      reconduzem apenas ao exercício da atividade, nem à continuação dessa atividade, antes exigindo também a existência de
      um conjunto de meios organizados, materiais e/ou humanos, para tal e que sejam transferidos para o novo adjudicatário.
      II - Em sectores económicos em que os elementos ativos (materiais ou não) são bastas vezes reduzidos à sua expressão
      mais simples, assentando a atividade essencialmente na mão-de-obra, como é o caso dos serviços de segurança e vigilância,
      a prossecução da atividade sem um conjunto de vigilantes/trabalhadores que vinha executando de forma durável uma atividade
      comum, correspondendo a um número substancial dos vigilantes da “empresa predecessora” adequadamente estruturados, não
      permite reconhecer a identidade da unidade económica. III - Configura despedimento não consentido pelo ordenamento jurídico
      (ilícito) a comunicação aos trabalhadores que houve transmissão de empregadora na sequência de transmissão de estabelecimento/unidade
      económica, quando efetivamente não houve. IV - No caso de “pluralidade subjetiva subsidiária – dedução subsidiária do
      mesmo pedido contra ré distinta da demandada a título principal – inexiste trânsito em julgado parcial da decisão judicial
      que aprecie pedido formulado contra uma delas, dado estarem interligados.
  - source_sentence: 'Sumário: Uma determinada realidade fáctica pode originar o reconhecimento de uma servidão de passagem
      por usucapião mas também pode levar à constituição de servidão legal de passagem em razão do encravamento de determinado
      prédio entre os vários prédios ali existentes e sem acesso à via pública.'
    sentences:
    - "I-\tAs questões a decidir pelo julgador, de acordo com o estatuído no artigo 608.º, n.º 2 do Código de Processo Civil,\
      \ estão diretamente ligadas ao pedido e à respetiva causa de pedir. II-\tSe findos os articulados, o objeto processual\
      \ ficou perfeitamente definido, resumindo-se a 3 questões - (i) existência de justa causa para a resolução do contrato\
      \ de trabalho pelo trabalhador; (ii) verificação da caducidade do direito à resolução do contrato; (iii) apreciação\
      \ do pedido – e todas elas foram apreciadas e decididas no saneador-sentença, não se verifica a nulidade da sentença\
      \ por omissão de pronúncia. III-\tNuma ação em que o trabalhador pede que seja reconhecida a licitude da justa causa\
      \ de resolução do contrato de trabalho por si operada, apenas são atendíveis os factos que tenham sido invocados pelo\
      \ trabalhador como fundamento da resolução, na comunicação escrita oportunamente endereçada ao empregador. IV-\tDito\
      \ de outro modo, a petição inicial não serve para alegar factos que visem fundamentar a justa causa e que não foram\
      \ expressamente indicados na carta de comunicação da resolução contratual enviada para o empregador com o objetivo de\
      \ pôr termo ao contrato de trabalho. V-\tO artigo 395.º, n.º 1, do Código do Trabalho exige que o trabalhador comunique\
      \ a resolução do contrato ao empregador, por escrito, «com indicação sucinta dos factos que a justificam» . VI-\tA indicação\
      \ sucinta dos factos que justificam a justa causa invocada pelo trabalhador, ainda que não tenha o grau de exigência\
      \ em termos de descrição factual associado normalmente à nota de culpa, tem, no mínimo, de dar a conhecer ao empregador,\
      \ de uma forma esclarecedora e precisa, o concreto fundamento da resolução contratual, não só para que este possa compreender\
      \ as causas que conduziram, na perspetiva do trabalhador, à rutura contratual e, querendo, impugná-las em tribunal,\
      \ como também para permitir a possibilidade de sindicância judicial do especifico fundamento invocado. VII-\tO cumprimento\
      \ da exigência da indicação sucinta dos factos que justificam a justa causa invocada pelo trabalhador na comunicação\
      \ escrita que este dirige ao empregador, é uma condição essencial para a licitude da resolução. VIII-\tSe analisando\
      \ a carta de resolução do contrato de trabalho remetida pelo trabalhador ao empregador se chega à conclusão de que o\
      \ seu conteúdo se resume a conclusões, generalidades e juízos valorativos, sem que haja a indicação sucinta da sua base\
      \ factual, justifica-se que o tribunal conheça do mérito da causa em saneador-sentença, ao abrigo do artigo 61.º, n.º\
      \ 2 do Código de Processo do Trabalho, se não existirem factos controvertidas a apurar. IX-\tChegando-se à conclusão\
      \ de que o trabalhador não indicou quaisquer factos concretos para fundamentar a justa causa de resolução do contrato\
      \ de trabalho,  o conhecimento da invocada exceção da caducidade do direito à resolução do contrato de trabalho, por\
      \ ultrapassagem do prazo previsto no n.º 1 do artigo 395.º do Código de Processo Civil, fica prejudicado, nos termos\
      \ previstos pelo artigo 608.º, n.º 2, do Código de Processo Civil. (Sumário elaborado pela relatora)"
    - I – A ação de anulação do testamento caduca ao fim de dois anos a contar da data em que o interessado teve conhecimento
      do testamento e da causa de anulabilidade (art. 2308º, n.º 2 do CC). II - Esse prazo de caducidade encontra-se sujeito
      à regra do n.º 2 do art. 287º do CC, da qual resulta que a anulabilidade pode ser arguida a todo o tempo, enquanto o
      negócio testamentário não estiver cumprido, isto é, enquanto o contemplado não exigir a sucessão. III - O domínio e
      posse dos bens da herança adquirem-se pela aceitação, independentemente da sua apreensão material, retrotraindo-se os
      efeitos da aceitação ao momento da abertura da sucessão (art. 2050º, do CC), III – Pela aceitação da herança adquiriram
      os beneficiários da deixa testamentária o que lhes foi deixado, independentemente da sua posse efetiva, pelo que as
      disposições testamentárias encontram-se cumpridas, não havendo lugar à aplicação do normativo constante do art. 287.º,
      nº2 do CC. II - A ousadia de apresentação de uma determinada construção jurídica, julgada errada, não revela, por si
      só, que o seu autor a apresentou em violação dos princípios da boa fé e da cooperação. Mas já atua em violação destes
      deveres aquele que alega factos essenciais que sabe não serem verdadeiros.
    - A posse precária não permite a aquisição por usucapião, salvo se se achar invertido o título da posse, na conformidade
      do disposto no artigo 1290º Código Civil; e só a partir da inversão do título começa a correr o tempo necessário para
      a usucapião . (Sumário elaborado pela relatora)
  - source_sentence: I – A Lei n.º 8/2022, de 10-01, no tocante à alteração do art.º 6.º do DLei n.º 268/94, de 25-10, assume
      natureza interpretativa, contrapondo-se a uma lei inovadora, pelo que visa explicitar o sentido de uma lei anterior
      que tinha um sentido dúbio, determina o sentido da lei interpretada, integrando-se nela e sendo, por isso, de aplicação
      retroativa. II – Tal Lei n.º 8/2022 integrou no art.º 6.º daquele DLei n.º 268/94 as penalizações/sanções pecuniárias
      aprovadas em assembleia de condóminos, pondo termo às dúvidas anteriormente existentes (no âmbito da sua anterior redação),
      do que importa concluir que, relativamente às penalizações nela consideradas como englobadas nos títulos apresentados
      (atas da assembleia de condóminos), o exequente dispõe de título executivo.
    sentences:
    - 1. O título executivo apresenta-se como requisito essencial da ação executiva e há de constituir instrumento probatório
      suficiente da obrigação exequenda, i. é , documento suscetível de, por si só, revelar, com um mínimo aceitável de segurança,
      a existência do crédito em que assenta o pedido exequendo . 2. À execução podem servir de base os documentos exarados
      ou autenticados, por notário ou por outras entidades ou profissionais com competência para tal, que importem constituição
      ou reconhecimento de qualquer obrigação (art.º 703º, n.º 1, al. b), do CPC) - a constituição da obrigação tem de resultar
      do próprio documento. 3. Estamos perante títulos executivos extrajudiciais privados que importem constituição ou reconhecimento
      de qualquer obrigação , existente em face do título, vencida ou a vencer-se. 4. O momento em que a obrigação deve ser
      cumprida (a data em que a obrigação se vence , o momento a partir do qual a prestação pode ser exigida ) pode ser fixado
      por convenção das partes ou por disposição legal. 5. Se a obrigação tiver prazo certo, decorrido este a execução é possível
      .
    - 1- A competência internacional dos tribunais portugueses é a parcela de jurisdição que lhes cabe face às jurisdições
      estrangeiras nos casos em que perante eles seja proposta uma ação cujo objeto apresente pontos de conexão com a ordem
      jurídica nacional e com outra ou outras jurisdições estrangeiras. 2- Essa competência internacional afere-se, em primeiro
      lugar, pelas regras jurídicas definidoras da competência internacional que constem de regulamento da União Europeia
      (que o art. 8º, n.º 4 da CRP, incorpora e receciona diretamente na ordem jurídica interna portuguesa) ou em convenção
      internacional a que o Estado Português se auto vinculou; e na ausência daqueles, pelas normas de competência internas
      que Portugal, enquanto estado soberano, fixou unilateralmente nos arts. 62º e 63º do CPC. 3- Sendo a competência internacional
      do tribunal em que a ação foi proposta um pressuposto processual, em que a infração das normas atributivas daquela consubstancia
      uma exceção dilatória, que determina a incompetência absoluta do tribunal nacional onde a ação foi proposta, determinando
      a absolvição do réu da instância, essa exceção carece de ser aferida pela relação jurídica material controvertida delineada,
      em termos subjetivos (quanto aos sujeitos) e objetivos (quanto ao pedido e à causa de pedir), pelo autor na petição
      inicial. 4- O Regulamento (CE) n.º 2201/2003 do Conselho, de 27/11, bem como o Regulamento (UE) n.º 1111/2016 do Conselho,
      de 26/01, que o substituiu a partir de 22/07/2019, e cujo regime jurídico passou a ser aplicável às ações instauradas
      em 01 de agosto de 2022 ou em data subsequente, apenas são aplicáveis às ações de divórcio, separação ou de anulação
      de casamento, não estatuindo sobre o processo de inventário para partilha dos bens comuns dos ex-cônjuges subsequente
      à dissolução do casamento por qualquer uma das referidas causas. 5- O regime jurídico do Regulamento (UE) n.º 2016/1103
      do Conselho, de 24/06/2016, abrange as decisões relativas à partilha dos bens  comuns do casal dissolvido por divórcio,
      separação ou anulação do casamento, ao estender, salvo as exceções previstas no n.º 2 do seu art. 5º (em que se exige
      o acordo dos cônjuges para que se admita essa extensão, prestado aquando da propositura da ação de divórcio, separação
      ou anulação) a jurisdição dos tribunais dos Estados-Membros que decretaram o divórcio, a separação ou anulação do casamento
      para julgarem o processo de inventário subsequente a essas causas de dissolução do casamento. 6- O Regulamento (UE)
      n.º 2016/1103 entrou em vigor em 28/07/2016, mas apenas é aplicável às ações de divórcio, separação ou anulação de casamento
      instauradas em 29 de janeiro de 2019 ou em data subsequente. 7- O processo de inventário é um desenvolvimento ou consequência
      da ação de divórcio, correndo por apenso a essa ação, pelo que, tendo o divórcio sido decretado por sentença, transitada
      em julgado, proferida por tribunal luxemburguês, atento o princípio da coincidência (entre a competência internacional
      e a competência interna territorial), os tribunais nacionais são internacionalmente incompetentes para julgar o processo
      de inventário. 8- O processo de inventário subsequente a divórcio não é uma ação real, na medida em que, antes da partilha
      os ex-cônjuges são titulares de um único direito que incide sobre a totalidade do património (ativo e passivo) comum,
      em que essa massa patrimonial pertence indistintamente e em bloco a ambos os ex-cônjuges, em propriedade coletiva ou
      de mão comum, pelo que, ainda que no acervo dos bens a partilhar no processo de inventário exista um prédio sito em
      Portugal, atento o princípio da exclusividade, os tribunais nacionais são internacionalmente incompetentes para julgar
      o processo de inventário subsequente a divórcio. 9- A causa de pedir em processo de inventário subsequente a divórcio
      é a dissolução do casamento, com a consequente extinção das relações patrimoniais entre os ex-cônjuges, pelo que, tendo
      o divórcio sido decretado no Luxemburgo, os tribunais nacionais também se mostram internacionalmente incompetentes para
      julgar o processo de inventário. 10- O critério da necessidade é uma cláusula de salvaguarda, de último recurso, que
      visa evitar que, em casos de impossibilidade absoluta ou relativa, de ordem prática ou jurídica, o autor fique sem tutela
      efetiva para o direito que pretenda exercer. Por isso, no caso de impossibilidade relativa, exige-se que o autor se
      depare com uma dificuldade manifesta e séria em instaurar a ação junto de tribunal estrangeiro, por tal implicar para
      ele um sacrifício irrazoável e desproporcionado à luz do princípio da boa fé, pelo que é de antever que a recusa dos
      tribunais nacionais em julgar essa ação equivale, em termos práticos e materiais, que o autor fique sem tutela efetiva
      para o seu direito. Para além da enunciada impossibilidade absoluta ou relativa do autor em propor a ação na jurisdição
      estrangeira, para que os tribunais nacionais sejam internacionalmente competentes para conhecer da ação exige-se que
      entre o objeto desta e a ordem jurídica portuguesa exista um ponderoso (forte) elemento de conexão de ordem pessoal
      ou real. 11- Na ausência de regulamento ou de convenção internacional em contrário, o facto de os tribunais nacionais
      serem internacionalmente incompetentes para conhecer do processo de inventário subsequente a divórcio e de no Luxemburgo
      já pender um processo de inventário com vista a partilhar os bens comuns dos ex-cônjuges na sequência de divórcio decretado
      nesse país, não determina a procedência da exceção dilatória de litispendência, mas antes a procedência da exceção dilatória
      de incompetência absoluta do tribunal nacional em que o processo de inventário foi instaurado, por infração das regras
      de competência internacional, com a consequente absolvição da ré da instância.
    - 1 – Não se verifica qualquer nulidade da sentença por excesso de pronúncia ou condenação em pedido não formulado quando
      o tribunal, considerando os factos alegados pela parte, os considera autonomamente no contexto de pedido formulado pelo
      autor 2 – Sem que a parte deduza incidente de liquidação de pedido genérico deduzido inicialmente, não é possível ao
      Tribunal proceder a tal liquidação, ainda que os factos provados pudessem permitir a quantificação imediato do dano.
      3 – Não existe fundamento para alterar o montante fixado a título de indemnização por dano biológico e dano não patrimonial
      quando a recorrente se limita a enumerar jurisprudência que fixou valores diferentes e na sentença sob recurso se procedeu
      a idêntica enumeração de forma a justificar exaustivamente os valores fixados. 4 – A existência de dificuldades para
      a realização das tarefas domésticas não pode ser equiparada à impossibilidade de realização dessas tarefas e, como tal,
      não é possível concluir-se que as mesmas não podem ser realizadas pela autora. 5 - Na fixação da indemnização devida
      pela existência destas dificuldades, que se irão prolongar ao longo da vida da autora, há que atender ao concreto défice
      funcional de que padece e à sua esperança média de vida, considerando-se razoável o período de duas horas diárias para
      o desempenho dessas funções e o valor mínimo de 5,00 euros para o custo de cada hora.
  - source_sentence: "I.\tO processo de inventário destina-se a regular a partilha desses bens comuns, incluindo as dívidas\
      \ que são comuns, não servindo para fazer valer direitos de qualquer dos cônjuges que não estejam conexionados com o\
      \ património comum do casal. II.\tDeve ser relacionada no processo de inventário pelo saldo existente à data do divórcio\
      \ do casal, uma conta bancária aberta pelo interessado no estado de solteiro uma vez que os fundos que a mesma apresenta\
      \ são provenientes de depósitos posteriores à data do seu casamento com a interessada. III.\tTendo a casa de habitação\
      \ do casal sido edificada quando os interessados eram namorados sobre um terreno do interessado não se pode considerar\
      \ a mesma como um bem “adquirido” pelo casal ( i.e. no decurso do casamento) e por consequência um bem comum. (Sumário\
      \ elaborado pela relatora)"
    sentences:
    - 1. O  ónus de impugnação que impende sobre o réu no momento da contestação, previsto no artigo 574º do Código de Processo
      Civil, impõe ao réu a necessidade de impugnar de forma clara, frontal e concludente os factos constitutivos do direito
      invocado pelo autor que não pretenda que se considerem exatos, embora se não entendam verdadeiros os factos que estejam
      em oposição com a defesa considerada no seu conjunto e ainda se possa rever-ter a presunção de veracidade quando os
      factos sejam meramente instrumentais. 2. Seja para a indemnização pelo dano positivo, seja pelo dano negativo, para
      surgir a obrigação de indemnizar é necessário que exista uma relação de adequação entre o evento danoso e o prejuízo.
      3. No nexo de causalidade entre o facto e o dano, a nossa lei adotou a doutrina da causalidade adequada, que impõe,
      num primeiro momento, um nexo naturalístico e, num segundo momento, um nexo de adequação. 4. Se não se demonstrou que
      a sociedade locatária sofreu consequências concretas por ter tido que esperar pela conclusão das obras, não existe fundamento
      para ser indemnizada da privação do uso, relativa á limitação de gozo de uma das faculdades previstas no artigo 1305º
      do Código Civil de que goza o proprietário.
    - I - O Administrador de Condomínio pode ser exonerado pelo tribunal, a requerimento de qualquer condómino, quando se
      mostre que praticou irregularidades ou agiu com negligência no exercício das suas funções. II - Assim, o tribunal tem
      que conhecer os concretos actos do administrador que esteja a exercer funções de forma a aferir se o mesmo praticou
      actos ilícitos, violadores das suas obrigações legais e contratuais, e culposos, em termos do dolo e negligência. III
      - Incumbe ao Autor o ónus de alegar e provar os actos concretos realizados pelo Administrador do Condomínio, passiveis
      de determinar a sua exoneração, o que não sucedeu no caso vertente.
    - '- Assentando a acção na alegada existência de um crédito titulado pelo Réu, no qual a Autora e o marido figuram como
      devedores, garantido este por hipoteca que incide sobre bem imóvel que constitui a casa de morada da família, sendo
      que, no seu entender, esse direito de crédito se encontra extinto por prescrição ou deve ser considerado inoperante
      por abuso de direito por parte do Réu, pedindo-se, em consequência disso, que se cancele a referida hipoteca, a Autora
      é parte ilegítima para demandar sozinha, tendo em conta o disposto no art. 34º, nº.1, in fine, do Código de Processo
      Civil. - Essa discussão sobre a subsistência de um direito real de garantia consubstanciado na mencionada hipoteca e,
      indirectamente, do crédito que lhe dá corpo, constitui sem dúvida um risco de oneração da morada de família em apreço
      que se insere na letra e no espírito da norma contida no citado art. 34º, nº 1.'
