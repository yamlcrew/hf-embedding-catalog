widgetData:
- source_sentence: Just-in-Time defect prediction
  sentences:
  - 'Programación diferencial de QoS de URLLC bajo la disciplina de servicio FIFO: un enfoque entre capas'
  - La predicció de defectes just-in-time ( JITDP ) és una tècnica per predir si un canvi de codi és defectuós . JITDP garanteix
    la qualitat del programari durant tota la fase de disseny i requereix que els desenvolupadors comprovin i resolguin els
    defectes a temps . Diversos estudis recents han proposat utilitzar JITDP per detectar canvis que puguin crear defectes
    a l'hora de registrar-se . Les tècniques JITDP utilitzen mètriques de canvi obtingudes dels dipòsits de programari per
    preveure canvis que indueixen defectes . En aquesta investigació , vam presentar l'agregació Bootstrap per detectar canvis
    que poden generar defectes en el moment de la facturació mitjançant l'ús del conjunt de dades de mètriques de canvi accessible
    públicament Mozilla . El mètode proposat s'ha comparat amb diverses tècniques d'aprenentatge automàtic per verificar el
    rendiment de l'enfocament proposat . Les troballes revelen que l'enfocament proposat va superar tots els mètodes d'aprenentatge
    automàtic comparables en diverses mesures de classificació . A més de l'enfocament proposat , l'arbre de decisió i els
    algorismes k del veí més proper van funcionar bé .
  - Sobre algunas relaciones entre varios modelos DEA convexos generalizados
- source_sentence: Atmospheric movements
  sentences:
  - In this paper , we present the design of a dual-band antenna for Long Term Evolution ( LTE ) handsets . The proposed antenna
    is composed of a meandered monopole operating in the 700 MHz band and a connected parasitic radiating in the 2.5-2.7 GHz
    band . Two antennas of the same kind are then closely positioned on the same 120×50 mm 2 Printed Circuit Board ( PCB )
    which represents a modern PDA-mobile phone . To enhance their port-to-port isolation , a neutralization technique is implemented
    between the two antennas . Scattering parameters , radiations patterns and efficiencies are presented to prove the usefulness
    of the method .
  - L'essència d'aquest article és investigar i comparar les característiques actuals del dielèctric líquid degradat tèrmicament
    mitjançant l'espectroscòpia d'impedància . La part teòrica explica els fenòmens electrofísics en dielèctrics i caracterització
    del mètode d'espectroscòpia d'impedància en el domini de la freqüència i el temps . La part pràctica té en compte l'experiment
    , que se centra en la mostra utilitzada de dielèctric líquid , descripció del lloc de treball de mesura i anàlisi dels
    resultats experimentals en el domini de la freqüència i el temps .
  - El projecte de col·laboració JASMIN de 4 anys , en què participen 9 organitzacions , va ser llançat per l'IRSN a finals
    de 2011 dins del 7 . Programa marc europeu d ' R+D sobre la millora de la seguretat dels reactors de neutrons ràpids refrigerats
    amb Na ( SFR ) per a una major resistència als accidents greus . El projecte té com a objectiu desenvolupar un nou codi
    de simulació europeu , ASTEC-Na , amb una arquitectura moderna , prou flexible per adaptar-se a dissenys innovadors de
    reactors i , eventualment , nous tipus de combustible i revestiments i tenir en compte els resultats de la investigació
    recent sobre reactors refrigerats per aigua . El codi es basarà en el sistema de codi europeu ASTEC , desenvolupat per
    l'IRSN i GRS per a accidents greus en reactors refrigerats per aigua , i integrarà i capitalitzarà el coneixement d'última
    generació dels accidents SFR mitjançant la millora dels models físics existents o el desenvolupament de nous . Els objectius
    del codi seran predir al llarg de la fase primària de la seqüència accidental el comportament del revestiment i del combustible
    , així com el comportament dels productes de fissió alliberats tant en el circuit primari com en el recipient de contenció
    , incloses les condicions termohidràuliques extremes que prevalen en cas d'incendi de Na . Els principals fenòmens implicats
    que s'investigaran durant el projecte inclouen l'escalfament i la fallada de l'element combustible , la interacció combustible-refrigerant
    , la dispersió o compactació del combustible , la neutrònica del nucli degradat , la retenció de productes de fissió per
    fregat de sodi , l'esgotament de l'aerosol de sodi i les transformacions fisicoquímiques al recipient de contenció . El
    primer període de 18 mesos del projecte es dedica principalment a produir especificacions de models , així com matrius
    de validació de codi relacionades amb la degradació de pins de combustible en esdeveniments transitoris i fenòmens de
    contenció . Els models desenvolupats es validaran en la mesura del possible en dades experimentals existents dins de pila
    ( principalment els anteriors experiments CABRI ) i fora de pila .
- source_sentence: Orientalisme
  sentences:
  - Quinoa ( Chenopodium quinoa Willd . ) is an ancient food crop that originated in the Andes . It has good nutritional properties
    that increasingly attract interest around the world and it is considered as a future crop for food security and climate
    change adaptation . Currently , there is a great need to develop new quinoa varieties with higher yield , tolerance to
    biotic and abiotic stresses , and adaptation to new growing areas . Despite the existence of breeding programs , quantitative
    genetic parameters that are relevant for selection gain have hardly been investigated for quinoa . We estimated these
    parameters for important agronomic traits in six segregating populations of 96 lines each , derived from crosses of popular
    traditional Peruvian quinoa varieties . The traits were evaluated in trials at several locations in the Peruvian highlands
    over 3 years . Maturity was the best phenological stage for trait evaluation because at this stage we obtained high estimates
    of heritability and high correlation of panicle trait indices with grain yield . Based on these traits , we selected the
    18 best lines and characterized them in additional field trials for the same traits . Three lines ( HUA × KAN53 , SAL
    × NCO46 and SAL × PAN171 ) combined advantageous traits of their parents and showed lower plant height , earlier maturity
    and higher yield . Our work shows that the estimation of variance and variance components in the amphidiploid crop quinoa
    provides useful information for the design of breeding programs and the selection of improved genotypes for cultivation
    in the Peruvian highlands .
  - Epistemic Emotions and the Value of Truth
  - Variations épistémologico-culinaires
- source_sentence: Arqueología del paisaje
  sentences:
  - 'Bosques históricos: Teledetección satelital y estudio arqueológico en el sur de Ghana La investigación arqueológica muestra
    que la zona forestal del sur de Ghana ha estado habitada durante milenios . Sin embargo , el paisaje cultural es poco
    conocido debido a los enormes desafíos logísticos que han frustrado los esfuerzos de prospección durante el último siglo
    . Establecer perspectivas arqueológicas y regionales a largo plazo sobre el paisaje de asentamientos y los patrones de
    cultura material es necesario para abordar cuestiones sociales , políticas y económicas más amplias relacionadas con la
    historia precolonial y preatlántica de África Occidental . Sostengo que la teledetección satelital , combinada con datos
    topográficos y métodos tradicionales de prospección a pie , proporciona una herramienta importante para la prospección
    de los bosques del sur de Ghana . Estos métodos se utilizan para identificar asentamientos en cimas de colinas y elevaciones
    bajas en las zonas costeras interiores ocupadas durante el primer y principios del segundo milenio d. C. Las imágenes
    satelitales son una herramienta útil no solo para agilizar la prospección arqueológica , sino también para visualizar
    las relaciones humanas con los paisajes de densa vegetación de África Occidental . Les recherches archéologiques montrent
    que les gens ont habité la zona forestal del sur de Ghana durante los millénaires , pero le paysage culturel est mal connu
    en raison d''énormes défis logistiques que ont frustré los esfuerzos de prospección au cours du siècle ultimo . El establecimiento
    de perspectivas arqueológicas a largo plazo sobre la colonización y los modelos de cultura matérielle en una perspectiva
    regional es necesario para abordar las cuestiones sociales , políticas y económicas , además de vastas preocupaciones
    sobre la historia précoloniale et pré-atlantique de l''Afrique de l''Ouest . Si buscas la detección por satélite , combinada
    con datos topográficos y métodos tradicionales de prospección pedestre , proporciona una herramienta importante para el
    estudio de los bosques del sur de Ghana . Estos métodos se utilizan para identificar los sitios de personas en algunas
    colinas y las fallas elevadas en los hogares de arrière-pays ocupados en el curso del primer ministro y del debut del
    segundo milenio . J.-C .. Las imágenes satélite son una herramienta útil no sólo para acelerar las investigaciones arqueológicas
    , sino también para visualizar las relaciones humanas con los paisajes densamente poblados de África Occidental .'
  - Importance of host cell arginine uptake in Francisella phagosomal escape and ribosomal protein amounts
