  - source_sentence: Llegums
    sentences:
    - L'anàlisi d'enriquiment de l'ontologia gènica en dues mostres familiars independents posa de manifest els processos
      biològicament plausibles per als trastorns de l'espectre autista Estudis recents d'associació a tot el genoma ( GWAS
      ) han implicat una sèrie de gens de vies biològiques discretes en l'etiologia de l'autisme . Tanmateix , malgrat la
      forta influència dels factors genètics , els estudis d'associació encara han d'identificar gens o SNP d'efectes principals
      replicats estadísticament robusts . Apliquem el principi de la metodologia de prova de la relació SNP descrita per O'Dushlaine
      et al. , ( 2009 ) a més de 2100 famílies del Projecte del genoma de l'autisme ( AGP ) . Mitjançant un disseny en dues
      etapes , examinem l'enriquiment de l'associació en 5955 classificacions úniques d'ontologia genètica en quatre agrupacions
      basades en dues classificacions fenotípiques i dues ancestrals . A partir de les estimacions de la simulació , identifiquem
      l'excés d'enriquiment de l'associació en totes les anàlisis . Observem l'enriquiment en associació de conjunts de gens
      implicats en diversos processos biològics , com ara el metabolisme del piruvat , l'activació del factor de transcripció
      , la senyalització cel·lular i la regulació del cicle cel·lular . Tant els gens com els processos que mostren enriquiment
      s'han examinat prèviament en trastorns autistes i ofereixen plausibilitat biològica a aquestes troballes .
    - La salinitat , un factor d'estrès abiòtic , té efectes negatius en els cigrons . El CO 2 , els àcids orgànics i els
      minerals derivats del Ca s'utilitzen per reduir els efectes de la salinitat . D'aquesta manera s'inicia el mecanisme
      d'acceptació de la sal . Per eliminar aquests efectes negatius , en aquest estudi , es van aplicar reguladors del creixement
      de les plantes ( àcid salicílic [ SA ] i àcid giberèl·lic [ GA 3 ] ) i CaCl 2 en dosis baixes a genotips de cigrons
      exposats a diferents dosis d'estrès salí de NaCl . La investigació es va establir en hivernacles de la Universitat de
      Ciències Aplicades d'Isparta , Facultat d'Agricultura , Cultius de Camp , l'any 2021 , segons parcel·les completament
      aleatòries dividides en un disseny d'assaig dividit amb tres rèpliques . Les aplicacions inhibidores aplicades a genotips
      sota estrès salí van tenir un efecte positiu en els trets examinats en comparació amb els controls . Entre aquestes
      aplicacions d'inhibidors , es va determinar GA 3 com la més eficaç , seguida de SA i CaCl 2 . En general , amb un augment
      de la dosi de sal , totes les propietats van disminuir excepte el temps mitjà de germinació i el contingut de prolina
      . Entre els genotips , es va trobar que Isık-05 era superior pel que fa a les característiques de plàntula i germinació
      sota estrès salí , mentre que İspanyol era més sensible . Com a resultat , es va predir que les plantes de cigrons sota
      estrès de sal podrien alleujar-se donant nivells baixos de GA 3 a l'aigua de reg per millorar l'emergència i el desenvolupament
      .
    - La baixada de microRNA-9 redueix la resposta inflamatòria i la proliferació de fibroblasts en ratolins amb fibrosi pulmonar
      idiopàtica a través de la via TGF-β-Smad3 mediada per ANO1.
