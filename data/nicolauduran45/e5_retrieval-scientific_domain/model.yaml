      i la precisió dels estimadors basats en RSSI , no requereix un model de propagació explícit i és fàcil i intuïtiu d'ajustar
      ( gràficament ) ( utilitzant anàlisi estadística bàsica ) . La idoneïtat de l'estimador i la viabilitat de proporcionar
      una implementació fàcil es va demostrar experimentalment en dos escenaris amb dades del món real .
    - 'Gestos profesionales de adaptación lingüística en un contexto multilingüe: el caso de los profesores de primaria en
      su gestión de la heterogeneidad del alumnado en la lengua de instrucción Nuestra investigación se basa en un análisis
      comparativo de las Habilidades Profesionales de Adaptación Lingüística ( HPLA ) en el Aprendizaje Integrado de Contenidos
      y Lenguas ( AICLE ) que se emplean en Francia , y en particular en las secciones internacionales de primaria . Su objetivo
      es comprender cómo el profesorado de primaria , trabajando en un contexto multilingüe , se adapta a la heterogeneidad
      lingüística del alumnado en la lengua de instrucción . Nuestro estudio se centra en tres clases ordinarias , compuestas
      por dos clases principales ( impartidas en francés ) y una clase de la sección de inglés , y seis grupos de programas
      de apoyo para el aprendizaje de francés e inglés ( tres grupos de francés como lengua extranjera y tres grupos de inglés
      como segunda lengua ) . Estas clases y grupos pertenecen a las escuelas infantil y primaria de un Colegio Internacional
      público en PACA . Mediante un enfoque comparativo , buscamos comprender cómo influyen los siguientes factores en las
      HPLA que el profesorado utiliza para abordar la heterogeneidad lingüística del alumnado : la condición de la lengua
      de instrucción ( vernácula para el francés o vehicular para el inglés ) , la edad del alumnado ( diferentes cursos )
      y el nivel de heterogeneidad lingüística ( mínimo , bajo , intermedio , alto o máximo ) . Para cada uno de estos tres
      factores , comparamos dos sesiones en clases ordinarias y dos sesiones realizadas en programas de apoyo destinados a
      facilitar la integración del alumnado a la lengua de instrucción . De este modo , también es posible ilustrar el impacto
      del tipo de enseñanza ( ordinaria o especializada ) en el uso de las ALE por parte del profesorado de primaria . Comparamos
      el número , la categoría y el tipo de ALE utilizadas por el profesorado , así como las formas que adoptan , las ocasiones
      en que las emplean y con qué fines . En cuanto a las formas , nos referimos a las preocupaciones del profesorado en
      la estructuración del entorno didáctico ( mantener una atmósfera determinada , establecer conexiones dentro del currículo
      , proporcionar apoyo pedagógico y gestionar la actividad en el aula ; Bucheton , 2011 ) . En relación con las instancias
      , utilizamos la cuádruple estructura de la acción del profesorado ( plantear la tarea al alumnado , delegársela , regular
      los aprendizajes y procesar lo que se debe aprender ; Sensevy y Mercier , 2007 ) . Finalmente , para identificar propósitos
      , consideramos cuál de las “ 4 C ” se prioriza ( contenido , cognición , comunicación o cultura ; Coyle , 2002 ) .'
