      idiopàtica a través de la via TGF-β-Smad3 mediada per ANO1. La fibrosi pulmonar idiopàtica ( FPI ) és una malaltia pulmonar
      intersticial progressiva amb una freqüència creixent , altes taxes de mortalitat i règims de tractament desfavorables
      . En l'estudi actual , hem identificat l'expressió de microRNA-9 ( miR-9 ) i anoctamina-1 ( ANO1 ) en models de ratolí
      IPF induïts per bleomicina , i els seus efectes sobre la inflamació i la proliferació de fibroblasts mitjançant la via
      del factor de creixement transformant-β ( TGF-β ) -Smad3 . Per verificar la relació d'orientació entre miR-9 i ANO1
      , vam utilitzar la predicció bioinformàtica i vam realitzar un assaig del gen reporter de doble luciferasa . Els mecanismes
      reguladors subjacents de miR-9 i el gen objectiu ANO1 es van investigar principalment amb el tractament de miR-9 , inhibidor
      de miR-9 o siRNA contra ANO1 en fibroblasts aïllats de ratolins IPF . Es va realitzar un assaig immunosorbent lligat
      a enzims per investigar l'efecte de miR-9 o ANO1 sobre els factors inflamatoris . Per detectar la proliferació de fibroblasts
      i l'apoptosi es va utilitzar l'anàlisi de bromur de 3- ( 4,5-dimetiltiazol-2-il ) -2,5-difeniltetrazoli i la citometria
      de flux . Es van aplicar la reacció en cadena quantitativa de la polimerasa de transcripció inversa i l'anàlisi de western
      blot per mesurar l'expressió dels gens relacionats amb la via TGF-β-Smad3 . La determinació de l'activitat de la luciferasa
      va suggerir que miR-9 s'adreça a ANO1 . La regulació a l'alça de miR-9 o el silenciament de l'ANO1 va intensificar la
      inflamació en IPF , va promoure la proliferació i va inhibir la capacitat apoptòtica dels fibroblasts pulmonars . MiR-9
      va modular negativament ANO1 i , per tant , va activar la via TGF-β-Smad3 . Aquestes troballes suggereixen que miR-9
      pot activar indirectament la via TGF-β-Smad3 inhibint l'expressió d'ANO1 , agreujant així la inflamació , afavorint
      la proliferació i suprimint l'apoptosi dels fibroblasts pulmonars en models de ratolins d'IPF .
