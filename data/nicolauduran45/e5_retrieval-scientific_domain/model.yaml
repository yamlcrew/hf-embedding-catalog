- source_sentence: Películas delgadas
  sentences:
  - 'Verification of the radiotherapy treatment planning system based on the PENFAST Monte Carlo code for dose calculations
    in photon and electron beams Developments in radiation therapy require a higher precision in dose delivery . Based on
    the conventional Monte Carlo code PENELOPE physics , a fast MC code named PENFAST was recently developed and included
    in the treatment planning system ISOgray ( DOSIsoft ) . PENFAST performs photon and electron dose calculations in computerized
    tomography ( CT ) structures . It is necessary to assess the accuracy of the dose estimation before any clinical use of
    PENFAST . The MC simulation is split into 2 parts : ( 1 ) the simulation of particle transport through the accelerator
    head , using PENELOPE . A phase space file ( PSF ) is created . ( 2 ) The simulation of dose distributions in the phantom
    starting from the PSF , using PENELOPE or PENFAST . Depth-dose and dose profiles calculated with PENELOPE in water are
    compared to experimental measurements in order to validate the PSF calculation . Since comparisons among simulations and
    measurements in water are in good agreement ( within ± 1 % -1mm ) , the PSF calculation is validated . In inhomogeneous
    phantoms , the PENFAST results agree to within a 1 % -1mm difference with the PENELOPE ones , and to within a 2 % -2mm
    difference with measurements . This work shows the ability of PENFAST to calculate accurate dose distributions for photon
    and electron beams .'
  - Fabricación y caracterización de homouniones ZnO:Sb/n-ZnO
  - 'Los algoritmos de deconvolución no supervisada se utilizan a menudo para estimar la composición celular a partir de muestras
    de tejido a granel . Sin embargo , aplicar la deconvolución de tipo celular e interpretar los resultados sigue siendo
    un desafío , especialmente sin formación previa en bioinformática . Proponemos una herramienta para estimar e identificar
    la composición de tipo celular a partir de transcriptomas o metilomas a granel . DECOMICS es una aplicación web brillante
    dedicada a enfoques de deconvolución no supervisada de datos ómicos a granel . Proporciona ( i ) diversos algoritmos existentes
    para realizar la deconvolución en la matriz de expresión génica o de nivel de metilación , ( ii ) un módulo de análisis
    de enriquecimiento para facilitar la interpretación biológica de los componentes deconvolucionados , basado en dicho análisis
    , y ( iii ) herramientas de visualización . Los datos de entrada pueden descargarse en formato CSV y preprocesarse en
    la aplicación web ( normalización , transformación y selección de características ) . Los resultados de los procesos de
    deconvolución , enriquecimiento y visualización pueden descargarse . Disponibilidad e implementación : DECOMICS es una
    aplicación web R-shiny que se puede iniciar ( i ) directamente desde una sesión R local usando el paquete R disponible
    aquí : https : //gitlab.in2p3.fr/Magali.Richard/decomics ( ya sea instalándolo localmente o a través de una máquina virtual
    y una imagen Docker que proporcionamos ) ; o ( ii ) en la Biosphere-IFB Clouds Federation for Life Science , un entorno
    de múltiples nubes escalable para computación de alto rendimiento : https : //biosphere.france-bioinformatique.fr/catalogue/appliance/193/
    .'
- source_sentence: Lisis
  sentences:
  - Una relación estrecha entre la activación/desactivación de fMRI BOLD y el aumento/disminución de las respuestas de neuronas
    individuales en la corteza de asociación humana
  - Dynamic Cooperative Multi-Cell Selection using Time Difference of Arrival in LTE network
  - La competencia natural para la transformación genética es la característica mejor caracterizada del principal patógeno
    humano Streptococcus pneumoniae . Estudios recientes han demostrado que la virulencia de mutantes deficientes en competencia
    está atenuada , pero la naturaleza de la conexión entre competencia y virulencia sigue siendo desconocida . Aquí documentamos
    la liberación , desencadenada por células competentes , de factores de virulencia ( p . ej. , la toxina citolítica neumolisina
    ) de células no competentes . Este fenómeno , que llamamos alolisis , implica un sistema de bacteriocina no descrito previamente
    que consiste en una bacteriocina de dos péptidos , CibAB , y su factor de inmunidad , CibC ; la principal autolisina ,
    LytA , y lisozima , LytC ; y una nueva amidasa propuesta , CbpD . Mostramos que CibAB son absolutamente necesarios para
    la alolisis , mientras que LytA y LytC pueden ser suministrados por las células competentes o por las células diana .
    Proponemos que la alólisis constituye un mecanismo de depredación programado por competencia de células no competentes
    , que beneficia a las células competentes y contribuye a la virulencia al coordinar la liberación de factores de virulencia
    .
- source_sentence: unidades de procesamiento gráfico (GPU)
  sentences:
  - 'Institutionalization of CSR by consulting firms of financial audit sector: analysis of legitimation strategies Actors
    of markets for virtue act as institutionalentrepreneurs who create or disrupt institutionalizedpractices in a particular
    field according to their interests . They create standards and value systems that theyseek to legitimizeas explicit norms
    . By examining the legitimation strategies implemented by CSR consulting firms from the financial auditing sector , such
    as the Big Four , this study aims to highlight their participation in the social construction of CSR and thus answer the
    question underlying our approach : do they contribute in embedding a CSR that responds to social and environmental challenges
    ? While contributing to the neo-institutional theory , this paper owesitsoriginalityto its case study consisting of an
    international engineering services company on one hand , and a consulting firm with a background in financial auditing
    on the other ; an analysis of the consulting service provided by the latter will shed light on legitimation strategies'
  - This paper presents a dual axis MEMS magnetometer , utilizing two DOF torsional gyroscope structure . The designed structure
    is a torsional resonator with two gimbals . A single structure can detect magnetic field in two directions . The first
    and second mode of vibrations are the desired mode of operation for detecting the magnetic field in x and y directions
    . The first and second modes of vibrations are at 107 kHz and 187 kHz respectively . The device is tested for its Lorentz
    force transduction using MSA-500 in the presence of magnetic field generated using permanent magnet for both the axes
    at atmospheric pressure . The fabrication process is based on anodic bonding ( < ; 400°C ) of a borofloat glass wafer
    and double side polished ( DSP ) Si wafer , which enables the passivation between Gold loop and Silicon .
  - Bloqueo rápido de reflectores de casa en procesadores gráficos Revisamos una representación alternativa a la transformada
    WY compacta para la acumulación ( bloqueo ) de reflectores Householder . Esta presenta la misma estabilidad numérica y
    se compone de núcleos computacionales eficientes de Subprogramas de Álgebra Lineal Básica ( BLAS ) de Nivel 3 , en contraste
    con los BLAS de Nivel 2 utilizados para la construcción de la representación WY compacta convencional . Para la reducción
    ortogonal a formas condensadas en plataformas multinúcleo equipadas con una unidad de procesamiento gráfico ( GPU ) rápida
    ( o cuando existe una diferencia significativa en el rendimiento entre los procesadores multinúcleo y el acelerador gráfico
    ) , nuestro enfoque elimina el ensamblaje de la acumulación de la ruta crítica del algoritmo . Esto se debe a la aceleración
    de esta operación mediante el uso de BLAS de Nivel 3 , el traslado de este cálculo a la GPU y la posibilidad de usar bloques
    algorítmicos de mayor tamaño . Nuestros experimentos con la representación ortogonal alternativa muestran mejoras considerables
    , que pueden alcanzar entre el 20 % y el 40 % en GPU recientes , en comparación con los códigos de MAGMA .
- source_sentence: detección de aeronaves
  sentences:
  - Detección de aeronaves orientada a la fusión en imágenes de escenas grandes basadas en una red oscura diminuta
  - Estimació de la distància del telèfon intel·ligent basada en l'enfocament de classificació RSSI-Fuzzy El posicionament
    de persones a l'interior ha conegut un creixement exponencial en els darrers anys , especialment gràcies a la tecnologia
    Bluetooth Low Energy ( BLE ) i la tècnica de l'indicador de força del senyal rebut ( RSSI ) . Aquest enfocament està disponible
    en dispositius portàtils , és fàcil d'implementar i té avantatges de consum d'energia . Tanmateix , el càlcul de la distància
    relativa és inexacte , ja que la força dels senyals BLE fluctua significativament en entorns interiors . Els mecanismes
    d'afrontament típics , com ara els models de propagació de la pèrdua de trajectòria , requereixen un modelatge matemàtic
    i un calibratge que requereix temps , que depenen de l'entorn . En aquest article , proposem un nou estimador de distància
    basat en la classificació difusa RSSI dels senyals BLE . La lògica difusa millora la robustesa i la precisió dels estimadors
    basats en RSSI , no requereix un model de propagació explícit i és fàcil i intuïtiu d'ajustar ( gràficament ) ( utilitzant
    anàlisi estadística bàsica ) . La idoneïtat de l'estimador i la viabilitat de proporcionar una implementació fàcil es
    va demostrar experimentalment en dos escenaris amb dades del món real .
  - 'Gestos profesionales de adaptación lingüística en un contexto multilingüe: el caso de los profesores de primaria en su
    gestión de la heterogeneidad del alumnado en la lengua de instrucción Nuestra investigación se basa en un análisis comparativo
    de las Habilidades Profesionales de Adaptación Lingüística ( HPLA ) en el Aprendizaje Integrado de Contenidos y Lenguas
    ( AICLE ) que se emplean en Francia , y en particular en las secciones internacionales de primaria . Su objetivo es comprender
    cómo el profesorado de primaria , trabajando en un contexto multilingüe , se adapta a la heterogeneidad lingüística del
    alumnado en la lengua de instrucción . Nuestro estudio se centra en tres clases ordinarias , compuestas por dos clases
    principales ( impartidas en francés ) y una clase de la sección de inglés , y seis grupos de programas de apoyo para el
    aprendizaje de francés e inglés ( tres grupos de francés como lengua extranjera y tres grupos de inglés como segunda lengua
    ) . Estas clases y grupos pertenecen a las escuelas infantil y primaria de un Colegio Internacional público en PACA .
    Mediante un enfoque comparativo , buscamos comprender cómo influyen los siguientes factores en las HPLA que el profesorado
    utiliza para abordar la heterogeneidad lingüística del alumnado : la condición de la lengua de instrucción ( vernácula
    para el francés o vehicular para el inglés ) , la edad del alumnado ( diferentes cursos ) y el nivel de heterogeneidad
    lingüística ( mínimo , bajo , intermedio , alto o máximo ) . Para cada uno de estos tres factores , comparamos dos sesiones
    en clases ordinarias y dos sesiones realizadas en programas de apoyo destinados a facilitar la integración del alumnado
    a la lengua de instrucción . De este modo , también es posible ilustrar el impacto del tipo de enseñanza ( ordinaria o
    especializada ) en el uso de las ALE por parte del profesorado de primaria . Comparamos el número , la categoría y el
    tipo de ALE utilizadas por el profesorado , así como las formas que adoptan , las ocasiones en que las emplean y con qué
    fines . En cuanto a las formas , nos referimos a las preocupaciones del profesorado en la estructuración del entorno didáctico
    ( mantener una atmósfera determinada , establecer conexiones dentro del currículo , proporcionar apoyo pedagógico y gestionar
    la actividad en el aula ; Bucheton , 2011 ) . En relación con las instancias , utilizamos la cuádruple estructura de la
    acción del profesorado ( plantear la tarea al alumnado , delegársela , regular los aprendizajes y procesar lo que se debe
    aprender ; Sensevy y Mercier , 2007 ) . Finalmente , para identificar propósitos , consideramos cuál de las “ 4 C ” se
    prioriza ( contenido , cognición , comunicación o cultura ; Coyle , 2002 ) .'
