- source_sentence: 안녕하세요. ▲▲월 ▲▲일부터 ▲▲일까지 더물리아 숙소 견적 부탁드립니다. 성인 2명과 4세 유아 1명입니다. 공항 픽업 대신 공항 드랍도 가능한가요?
