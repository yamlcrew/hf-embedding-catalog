    상담사: 안녕하세요! 문의 주셔서 감사합니다. 안다즈 호텔은 6세 이상 아동 2명이 입실할 경우 시그니처룸이나 안다즈 스위트룸만 이용 가능해요. ▲월 ▲일부터 ▲월 ▲일까지는 1박은 픽 시즌, 나머지 3박은 레귤러
