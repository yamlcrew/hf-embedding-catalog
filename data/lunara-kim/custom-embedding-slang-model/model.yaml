  - '고객: 안녕하세요. ▲/▲~▲/▲캠핀스키 그랜드 디럭스룸 4박 예약 관련해서 질문이 있어요. 제가 받은 답변에 따르면 총 금액이 $1,508에서 15% 할인 적용하면 $1,281.8이 되는 건가요? 그리고 ▲월
