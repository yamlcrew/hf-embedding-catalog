config:
  architectures:
  - MistralModel
  model_type: mistral
  tokenizer_config:
    bos_token: <s>
    chat_template: '{{ bos_token }}{% for message in messages %}{% if (message[''role''] == ''user'') != (loop.index0 % 2
      == 0) %}{{ raise_exception(''Conversation roles must alternate user/assistant/user/assistant/...'') }}{% endif %}{%
      if message[''role''] == ''user'' %}{{ ''[INST] '' + message[''content''] + '' [/INST]'' }}{% elif message[''role'']
      == ''assistant'' %}{{ message[''content''] + eos_token + '' '' }}{% else %}{{ raise_exception(''Only user and assistant
      roles are supported!'') }}{% endif %}{% endfor %}'
    eos_token: </s>
    pad_token: null
    unk_token: <unk>
    use_default_system_prompt: true
