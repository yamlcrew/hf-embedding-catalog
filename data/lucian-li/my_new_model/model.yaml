- source_sentence: Carrier aggregation measurement accuracy
  sentences:
  - 'PUCCH / PUSCH / SRS time mask

    The PUCCH/PUSCH/SRS time mask defines the observation period between sounding reference symbol (SRS) and an

    adjacent PUSCH/PUCCH symbol and subsequent sub-frame.

    There are no additional requirements on UE transmit power beyond that which is required in subclause 6.2.2 and

    subclause 6.6.2.3


    ETSI

    ETSI TS 136 101 V9.16.0 (2013-07)'
  - 'Reference Signal Time Difference (RSTD) Measurement Accuracy

    Requirements for Carrier Aggregation

    A.8

    UE Measurements Procedures

    A.9

    Measurement Performance Requirements

    NOTE:

    Only requirements and test cases in this table defined for inter-band carrier aggregation shall apply.



    ETSI

    ETSI TS 136 307 V10.17.0 (2016-01)'
  - 'Operator control

    Three general architectures are candidates to offer energy savings functionalities:

    Distributed, NM-Centralized, EM-Centralized as defined in TS 32.500 [6].

    Energy savings in cells can be initiated in several different ways. Some of the mechanisms are:

    For NM-centralized architecture

    -

    IRPManager instructs the cells to move to energySaving state (e.g. according to a schedule determined by

    network statistics) , configures trigger points (e.g. load threshold crossing) when it want'
