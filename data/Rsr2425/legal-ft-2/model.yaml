widgetData:
- source_sentence: "1. What role does synthetic data play in the pretraining of models, particularly in the Phi series?  \n\
    2. How does synthetic data compare to organic data in terms of advantages?"
  sentences:
  - Synthetic data as a substantial component of pretraining is becoming increasingly common, and the Phi series of models
    has consistently emphasized the importance of synthetic data. Rather than serving as a cheap substitute for organic data,
    synthetic data has several direct advantages over organic data.
  - 'The two main categories I see are people who think AI agents are obviously things that go and act on your behalf—the
    travel agent model—and people who think in terms of LLMs that have been given access to tools which they can run in a
    loop as part of solving a problem. The term “autonomy” is often thrown into the mix too, again without including a clear
    definition.

    (I also collected 211 definitions on Twitter a few months ago—here they are in Datasette Lite—and had gemini-exp-1206
    attempt to summarize them.)

    Whatever the term may mean, agents still have that feeling of perpetually “coming soon”.'
  - 'Terminology aside, I remain skeptical as to their utility based, once again, on the challenge of gullibility. LLMs believe
    anything you tell them. Any systems that attempts to make meaningful decisions on your behalf will run into the same roadblock:
    how good is a travel agent, or a digital assistant, or even a research tool if it can’t distinguish truth from fiction?

    Just the other day Google Search was caught serving up an entirely fake description of the non-existant movie “Encanto
    2”. It turned out to be summarizing an imagined movie listing from a fan fiction wiki.'
- source_sentence: "1. What is the mlx-vlm project and how does it relate to vision LLMs on Apple Silicon?  \n2. What were\
    \ the author's initial thoughts on Apple's \"Apple Intelligence\" features following their announcement in June?"
  sentences:
  - 'The GPT-4 barrier was comprehensively broken

    In my December 2023 review I wrote about how We don’t yet know how to build GPT-4—OpenAI’s best model was almost a year
    old at that point, yet no other AI lab had produced anything better. What did OpenAI know that the rest of us didn’t?

    I’m relieved that this has changed completely in the past twelve months. 18 organizations now have models on the Chatbot
    Arena Leaderboard that rank higher than the original GPT-4 from March 2023 (GPT-4-0314 on the board)—70 models in total.'
  - 'The year of slop

    Synthetic training data works great

    LLMs somehow got even harder to use

    Knowledge is incredibly unevenly distributed

    LLMs need better criticism

    Everything tagged “llms” on my blog in 2024'
  - 'Prince Canuma’s excellent, fast moving mlx-vlm project brings vision LLMs to Apple Silicon as well. I used that recently
    to run Qwen’s QvQ.

    While MLX is a game changer, Apple’s own “Apple Intelligence” features have mostly been a disappointment. I wrote about
    their initial announcement in June, and I was optimistic that Apple had focused hard on the subset of LLM applications
    that preserve user privacy and minimize the chance of users getting mislead by confusing features.'
- source_sentence: "1. What improvements were noted in the intonation of ChatGPT Advanced Voice mode during its rollout? \
    \ \n2. How did the user experiment with accents in the Advanced Voice mode?"
  sentences:
  - 'When ChatGPT Advanced Voice mode finally did roll out (a slow roll from August through September) it was spectacular.
    I’ve been using it extensively on walks with my dog and it’s amazing how much the improvement in intonation elevates the
    material. I’ve also had a lot of fun experimenting with the OpenAI audio APIs.

    Even more fun: Advanced Voice mode can do accents! Here’s what happened when I told it I need you to pretend to be a California
    brown pelican with a very thick Russian accent, but you talk to me exclusively in Spanish.'
  - 'One way to think about these models is an extension of the chain-of-thought prompting trick, first explored in the May
    2022 paper Large Language Models are Zero-Shot Reasoners.

    This is that trick where, if you get a model to talk out loud about a problem it’s solving, you often get a result which
    the model would not have achieved otherwise.

    o1 takes this process and further bakes it into the model itself. The details are somewhat obfuscated: o1 models spend
    “reasoning tokens” thinking through the problem that are not directly visible to the user (though the ChatGPT UI shows
    a summary of them), then outputs a final result.'
  - 'The May 13th announcement of GPT-4o included a demo of a brand new voice mode, where the true multi-modal GPT-4o (the
    o is for “omni”) model could accept audio input and output incredibly realistic sounding speech without needing separate
    TTS or STT models.

    The demo also sounded conspicuously similar to Scarlett Johansson... and after she complained the voice from the demo,
    Skye, never made it to a production product.

    The delay in releasing the new voice mode after the initial demo caused quite a lot of confusion. I wrote about that in
    ChatGPT in “4o” mode is not running the new features yet.'
- source_sentence: '1. What advantages does a 64GB Mac have for running models compared to other machines?

    2. How does the mlx-lm Python library enhance the performance of MLX-compatible models on a Mac?'
  sentences:
  - 'On paper, a 64GB Mac should be a great machine for running models due to the way the CPU and GPU can share the same memory.
    In practice, many models are released as model weights and libraries that reward NVIDIA’s CUDA over other platforms.

    The llama.cpp ecosystem helped a lot here, but the real breakthrough has been Apple’s MLX library, “an array framework
    for Apple Silicon”. It’s fantastic.

    Apple’s mlx-lm Python library supports running a wide range of MLX-compatible models on my Mac, with excellent performance.
    mlx-community on Hugging Face offers more than 1,000 models that have been converted to the necessary format.'
  - 'The earliest of those was Google’s Gemini 1.5 Pro, released in February. In addition to producing GPT-4 level outputs,
    it introduced several brand new capabilities to the field—most notably its 1 million (and then later 2 million) token
    input context length, and the ability to input video.

    I wrote about this at the time in The killer app of Gemini Pro 1.5 is video, which earned me a short appearance as a talking
    head in the Google I/O opening keynote in May.'
  - 'The biggest innovation here is that it opens up a new way to scale a model: instead of improving model performance purely
    through additional compute at training time, models can now take on harder problems by spending more compute on inference.

    The sequel to o1, o3 (they skipped “o2” for European trademark reasons) was announced on 20th December with an impressive
    result against the ARC-AGI benchmark, albeit one that likely involved more than $1,000,000 of compute time expense!

    o3 is expected to ship in January. I doubt many people have real-world problems that would benefit from that level of
    compute expenditure—I certainly don’t!—but it appears to be a genuine next step in LLM architecture for taking on much
    harder problems.'
- source_sentence: '1. What technique is being used by labs to create training data for smaller models?

    2. How many synthetically generated examples were used in Meta’s Llama 3.3 70B fine-tuning?'
  sentences:
  - 'The number of available systems has exploded. Different systems have different tools they can apply to your problems—like
    Python and JavaScript and web search and image generation and maybe even database lookups... so you’d better understand
    what those tools are, what they can do and how to tell if the LLM used them or not.

    Did you know ChatGPT has two entirely different ways of running Python now?

    Want to build a Claude Artifact that talks to an external API? You’d better understand CSP and CORS HTTP headers first.'
  - '7th: Prompts.js


    9th: I can now run a GPT-4 class model on my laptop


    10th: ChatGPT Canvas can make API requests now, but it’s complicated


    11th: Gemini 2.0 Flash: An outstanding multi-modal LLM with a sci-fi streaming mode


    19th: Building Python tools with a one-shot prompt using uv run and Claude Projects


    19th: Gemini 2.0 Flash “Thinking mode”


    20th: December in LLMs has been a lot


    20th: Live blog: the 12th day of OpenAI—“Early evals for OpenAI o3”


    24th: Trying out QvQ—Qwen’s new visual reasoning model


    31st: Things we learned about LLMs in 2024





    (This list generated using Django SQL Dashboard with a SQL query written for me by Claude.)'
  - 'Another common technique is to use larger models to help create training data for their smaller, cheaper alternatives—a
    trick used by an increasing number of labs. DeepSeek v3 used “reasoning” data created by DeepSeek-R1. Meta’s Llama 3.3
    70B fine-tuning used over 25M synthetically generated examples.

    Careful design of the training data that goes into an LLM appears to be the entire game for creating these models. The
    days of just grabbing a full scrape of the web and indiscriminately dumping it into a training run are long gone.

    LLMs somehow got even harder to use'
