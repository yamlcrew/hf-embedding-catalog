    broadly as to make Aris totle''s position on the connection between practical reasoning and action vacuous. Therefore,
    Aristotle cannot allow the akrat?s to reach a right conclusion (about an action to be performed at once) in cases of akratic
    action; and, consequently, he must insist that the akrat?s is epistemically deficient with respect to one or more of his
    premises. The element of the first answer on which I shall concentrate is the claim that the conclusion of a practical
    syllogism is an action. Aristotle does, to be sure, say of one of the syllogisms discussed in De Motu Animalium 7 that
    its conclusion "is an action" (701a20), and he asserts two lines later that "the action is the conclusion."4 But these
    claims should be interpreted in the light of the following points, (i) The example in question reads as follows: I need
    a covering, a coat is a covering; I need a coat. What I need I ought to make, I need a coat: I make a coat. And the conclusion
    I must make a coat is an action. (701al8-20) Here we see that there are propositional conclusions of practical syl logisms
    (e.g., "I must make a coat") which, precisely because they are propositional, are distinguishable from the ensuing (external)
    action (cf. [71, p. 230). (ii) There are two syllogisms and two conclusions in the preceding example, and the first conclusion,
    "I need a coat," does not specify an action'
