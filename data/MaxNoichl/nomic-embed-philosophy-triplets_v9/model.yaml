    of the soul is demonstrably immortal. Indeed, in his pronouncements on the matter he exhibits an admirable caution, unwilling
    to commit himself with any degree of certainty on matters which he views as being by their very nature resistant to secure
    demonstration."3 Thus at PHP V 791-2, Galen writes: Plato said that the cause who made us, the demiurge who fashioned
    the universe, commanded his children to make the human race by taking . .. the substance (ousia) of the immortal soul
    from him and adding it to what was generated. But we must realise that there is no formal similarity between proving and
    positing the fact that we were made in accordance with the providence of some god . . ., and knowing the substance of
    the maker or even of our own soul ... [T]he statements of the most divine Plato about the substance of our soul . .. and
    still more all that he says about our whole body, extend only to plausibility and reasonableness (achri tou pithanou kai
    eikotos). That last remark is important (indeed Galen, perhaps excessively charitably, takes Plato himself to be committed
    to it by his remarks about the eikos muthos [Tim. 29c-d]). There is a class of things about which we can at best speculate,
    and most particularly these are the preserve of the philosophers: In philosophy it is not surprising'
  - Hippocrates and Plato but in spite of its title, this has virtually nothing in common with the placita of Aëtius, nor,
    one presumes, with the phusikai doxai of Theophrastus. Galen's avowed aim is to show, by means of selective quotation
    and juxtaposition, the fundamental agreement between his two great masters of his title, in particular in regard to the
    structure and function of the soul, and at the expense in particular of the Stoics and Peripatetics. Mario Vegetti contributes
    a lucid and learned piece,5 which seeks to understand the work in terms of its intended audience avowedly not the sectarians
    of either medicine or philosophy, but rather generally educated and interested men of good will competent in the rudiments
    of logic; and he supposes that the wealth of quotation in which Galen indulges, even from works which he himself says
    are still readily available, indicates that his audience is not supposed to be made up of specialists. This may be right;
    but Galen loved to quote and to parade his learning, and while it is true that in this work the citations are longer than
    usual, this may simply be due (as Galen himself says) to the verbosity of those (principally Chrysippus) he intends to
    refute. Sooner or later, everyone who reads Galen (or even simply makes use of him as a source for other writers) has
    to get to grips with the question of how careful and trustworthy a reporter of other people's views he is and different
