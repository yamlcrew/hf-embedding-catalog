    of agreement and difference." This is a startling instance 5"Principles of Human Knowledge," paragraphs 50, 58. t of readiness
    to sacrifice empirical fact-admittedly universal-to methodological theory. The method of agreement and difference is a
    way of studying the relations of such phenomena as are difficult of observation because they are not always present. And
    yet we are called upon to eliminate from our philosophy an ever-present fact, the ego, because just this, its ubiquity,
    prevents our studying it by a logical method invented as an aid in the investigation of inconstant phenomena. Thus, to
    sum up our reply to this criticism: idealism can not be contradictory to the fundamental laws of logic, for these are
    laws of mental self-consistency. And subsidiary logical "laws" and "methods" are neither sacrosanct nor axiomatic. 2.
    We turn now to consider the alleged inconsistency of the idealistic position. It is urged by contemporary realists, as
    by those of Berkeley''s day, that the distinction actually made by idealists between subject and object, percept and image,
    is possible only on the supposition that non-mental reality exists.10 The idealist admits that he makes this distinction.
    He, like other men, recognizes a difference between present and external, and merely imagined, objects. But he distinguishes
    the two kinds of things, not as extramental and mental, but as objects respectively of his shared and of his unshared
    consciousness,'
