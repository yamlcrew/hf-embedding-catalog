  - know u ... in most nearby possible worlds, that agent only believes that p when p is true' (p. 71). This principle not
    only allows us to retain closure while avoiding reference to conversational contexts, but also to obtain `... knowledge
    of everyday propositions [and] knowledge of denials of sceptical hypotheses as well' (p. 71). So one need not have internalistic
    (i.e. reflectively accessible) evidence that one is not a brain in a vat to know that one is not a brain in a vat. Interestingly,
    `neo- reanism' is not Moore's position; after all, by ascribing knowledge to himself CI know that I have two hands') in
    a context of discussing sceptical hypotheses, Moore (inappropriately) conversationally implied that he had internal evidence
    for the denial of sceptical hypotheses. Neo-Mooreanism's victory over scepticism is fleeting, though. For chapter four
    argues that all externalist positions misconstrue the real threat posed by scepticism. Roughly speaking, the closure-based
    argument masks the internalist and evidentialist nature of the sceptical challenge, which is more adequately revealed
    by casting the sceptical argument in terms of an underdetermination principle. Pritchard promises in the remainder of
    the book to pile onto the fading fortunes of externalist responses to closure-based scepticism by showing how they misunderstand
    how luck can affect knowledge. Chapters five and six kick off the second half of the book with Pritchard proposing a partial
    account and typology of epistemic luck. Clearly some types of epistemic luck are compatible with knowledge, but not all.
    For example, he argues that one can have 'lucky' knowledge in a variety of scenarios,
