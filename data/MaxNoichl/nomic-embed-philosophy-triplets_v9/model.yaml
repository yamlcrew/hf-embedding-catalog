    Muller in SM 2 9-31): As the hegemonic soul has capabilities (dunameis) directed towards all the technai, it is necessary
    that there is one (sc. dunamis) with which we understand consequence and conflict, and another with which we remember;
    and we are cleverer in respect of the first mentioned, but more retentive in respect of the second. (Eth. 4, = SM 2 25)
    The distinction between intellectual sharpness and retentive ability is an ancient commonplace: see in particular the
    Hippocratic text On Regimen 1 35. 12 PHP V 601; cf. Symp.Diff. VII 55-6; and see MM X 635-6: a second part of the soul
    belongs to us not in virtue of our growing or being alive, but because we are animals, it is located in the heart and
    is the source of the innate heat; the arteries are the conduits for this source, which has many names: it is called the
    living power (dunamis z6tike), the spirited power (dunamis thumoeides), the living soul, and the spirited soul. 200 So
    Galen draws on a diverse range of previous theories in order to construct his own account; but it is important to stress
    that the theory that results is no mere haphazard porridge of badly-digested and ill-assorted scraps from the table of
    his predecessors. He is not afraid to take issue with them on matters of substantial importance, and to take issue with
    them in his'
