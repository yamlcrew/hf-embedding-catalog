- source_sentence: 'who are forcing healthy change on a conservative campus, or (b) unbalanced zealots and neurotic rebels
    who, when they are not smoking pot or shacking up with one another, are frittering away time on spurious issues. As a
    culture, we must be fond of dualisms or we would not persist in thinking this way. To talk about "students" who are creating
    a "problem" on college campuses is to ignore the obvious: that there are many different types of students and many different
    problems. It is simply not true that "they" are all waiting in the wings of the administration building, ready to seize
    it at the drop of a distasteful edict. There is sufficient empirical information to show that there is a wide range of
    attitudes, personalities and factions. At one extreme there would appear tobe ultra-leftwingers, heirs apparent to 1930
    Marxists. These, says Kenneth Keniston in PSYCHOLOGY TODAY, are regarded by the New Left as dull and uninspired, competent
    only to crank the handle of a mimeo machine. There are several other shades of leftist positions. Another seemingly distinct
    group are liberal idealists who seem JOURNAL OF THOUGHT 187 to galvanize around only selected issues. These may be the
    University''s alleged culpability in allowing Dow Chemical or the FBI to recruit on campus or it may be the University
    commitment in matters related to civil rights or racial justice. Many such idealists are not believers in a cleansing
    revolution; they are, rather, descendants of Old Testament prophets who possess strong'
