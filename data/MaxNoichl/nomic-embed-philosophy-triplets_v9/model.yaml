    with whatever unique aspects it may include, yet unites it with others as an expression of idealism? In the reply which
    follows, it is my hope that many idealists will concur, but I shall assume no more than that it offers what, to one idealist,
    seems pertinent to the issues which Professor Pratt raises. If I analyze his article correctly, these are five in number:
    (1) the place of the esse est percipi principle in idealistic philosophy; (2) the idealistic conception of reality, and
    in particular, the status of the objective world; (3) the idealistic view of knowledge; (4) the significance of the self;
    (5) the relation of idealism to realism. This is an extensive program, and its treatment here must be fragmentary at many
    points. Furthermore, it will be limited to the point of view of objective idealism, since subjective idealism is considered
    elsewhere in this publication by Professor Bri(rhtman. Esse Est Percipi In sug(resting that idealism should be mentalistic,
    proclaiming the doctrine, esse est percipi, Professor Pratt is reiterating a belief that has been held by numerous realistic
    thinkers in recent years. Just thirty years ago, Professor G. E. Moore published his wellknown refutation of the Berkeleian
    principle. To not a few idealists these arguments appeared brilliant and on many points including the issue of the principle
    itself as he interpreted it, convincing. But the objective idealist must protest that the designation'
