  - truth" (CP5.436). Peirce maintained that they are all three as ontologically required as are firsts and seconds required
    for triadic relations in logic. Reaction and feeling are implicit in the continuity of habit, actuality and quality in
    the generality of law, and interpretation presupposes facts with which to come to terms. Since Peirce, the neo-posi tivists
    have tried to reduce thirds to seconds, clearly without success. Among the reactions to that pristine scientism have been
    the current waves of neohegelian fervour that attempt to move the other way, by absorbing feeling and action into interpretation.
    Peirce's ontological realism is based on logical conditions for phenomenology , and thus resists the reductionis ts urges
    in both directions. These epistemological and ontological realisms are grounded in the dynamical object. Peirce understood
    dynamis much as Aristotle understood the material condition of change, as serving a conditional limit and as suggesting
    a teleological fulfillment. Peirce thought it conditional because it was interactive with other circumstances of action
    and experience. The determination of it as a limit to action and experience depended upon how it related to other conditions
    in its circumstantial context, and that can be dealt with in thought and action only in an actualized and conceptualized
    form. None the less, the dynamical object stands over against thought and action, and it requires coming to terms with
    it to make sense of the world and to act in it. Ultimately, were we to consider it as some sort of surd
  - logic of relations; although what the intimate connection is between these studies and his metaphysics Peirce leaves the
    reader to guess at random. 4 This approach has many obvious affiliations with the "presuppositionless ' studies of essences
