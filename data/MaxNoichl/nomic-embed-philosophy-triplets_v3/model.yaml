    dwelling on thirdness to the exclusion of secondness and firstness, treating the triadic form as "a mere RECONSTRUCTING
    DECONSTRUCTION 377 fashion of dress." "Had Hegel, instead of regarding the first two stages with his smile of contempt,
    held on to them as independent or distinct elements of the triune Reality, pragmaticists might have looked up to him as
    the great vindicator of their
