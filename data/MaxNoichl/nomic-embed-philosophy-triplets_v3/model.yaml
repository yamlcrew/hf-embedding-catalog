    a procedure that satisfies all desiderata
  - of Science (Jarvie 2001). 6. In citing page numbers for these works I shall be using the more readily available 1957 book
    edition of 1944-1945 and the fourth (1962) edition of 1945. 7. In some of his later essays and addresses Popper shows
    considerable awareness of the deficiencies of institutionalized science, especially its implication in war technology
    (Popper 1994, chs. 4 and 6). Yet he does not look back to and revise his earlier presentation. 547 I. C. JARVIE 2. Democratic
    and Authoritarian Republics. Should science be exempted from the democratic control of the wider society? Polanyi's principal
    argument for exemption relies on his special view of scientific authority. Popper, a critic of all authority, offers a
    challenge to Polanyi's argument for exceptionalism. Polanyi wrote much on the social relations of science, finding there
    lessons for democratic society itself (1945, 1951, 1958, 1961, 1962). His work combines reliable ethnographic reports
    with controversial social and political analysis. To understand why he tries to fuse republicanism with authoritarianism
    we need to outline salient features of his social analysis of science. Polanyi views the working of science as "coordination
    by mutual adjustment of independent initiatives" much like teams working on a large jigsaw puzzle. Every puzzler keeps
    in mind the pieces held and the elements of the picture so far assembled, and remains watchfully aware of the progress
    of others. Polanyi's jigsaw puzzle metaphor harbors a difficulty. Unlike the picture cut up by the jigsaw, the world-picture
    is not a prior given.
