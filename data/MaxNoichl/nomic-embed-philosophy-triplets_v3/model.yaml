- source_sentence: of the open society, he condemned complacency towards social institutions and so, if only tacitly, condemned
    complacency towards the institutions of science ([1944-1945] 1957, [1945] 1962).6 Not only did he fail to criticize scientific
    institutions explicitly, he too held up science-beautified as Socratic seminar-as a model for rational conduct in general
    and in politics in particular. In not working out the implications of his critical and democratic ideasfor institutional
    science Popper faltered. His beautification of science as institution was inconsistent with his critical philosophy of
    social institutions.7 What then are the scope and limits of republicanism applied to science? Both philosophers provide
    insights and ideas with which to criticize each other and, it is to be hoped, clarify the issues. In the body of this
    paper I condense them into four questions. Two questions focus on control. Should science be exempted from the democratic
    control of the wider society as Polanyi maintains (?2)?; or, is critical and democratic reform of institutionalized science
    possible along Popperian lines (?3). The two remaining questions focus on the impact of scientific norms and results on
    the host society. Is real existing science a suitable model for society in general along either Polanyiite or Popperian
    lines (?4)?; and, is science just one among the social institutions or, as both Polanyi and Popper claim, does its pursuit
    of truth make it exceptional and if so, how (?5)? 5. For the argument that The Logic of Scientific Discovery contains
    a social view of science see my The Republic
