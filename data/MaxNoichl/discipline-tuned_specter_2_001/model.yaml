- source_sentence: The OGO-IV ultraviolet airglow spectrometer, which measures the earth's spectrum between and A, consists
    of an Ebert-Fastie monochromator and two photomultipliers with wide-dynamic range electronics. The cesium telluride photomultiplier
    channel measures the backscattered ultraviolet daylight between and A over a dynamic range of with a spectral resolution
    of A. The cesium iodide photomultiplier channel measures air-glow emission lines between and A, even with the fully illuminated
    earth for a background.
  sentences:
  - Inspired by statistical thermodynamics, we presume that neuron system has equilibrium condition with respect to neural
    firing. We show that, even with dynamically changeable neural connections, it is inevitable for neural firing to evolve
    to equilibrium. To study the dynamics between neural firing and neural connections, we propose an extended communication
    system where noisy channel has the tendency towards fixed point, implying that neural connections are always attracted
    into fixed points such that equilibrium can be reached. The extended communication system and its mathematics could be
    useful back in thermodynamics.
  - A low-power nonvolatile data memory unit was developed for free floating balloons in the TWERL experiment. By means of
    multiple identification codes data records, several hours long, could be transferred in compressed form to the Nimbus-
    satellite for retransmission to ground stations. Eight of these units were flown on constant density balloons to investigate
    atmospheric wave motions throughout the Southern Hemisphere. One returned valid data for ten months. Similar techniques
    could be used with other types of observing platforms.
  - Guido Mazzoni's Teoria del romanzo takes up a new perspective on one of the main genres in Western literature, by interpreting
    it as an expression of the most typical features of modernity, namely individualism and secularization. The book advocates
    an idea of literary criticism as a form of philosophical anthropology, whose primary goal is to transcend specialized
    knowledge. Despite its breadth and accuracy, Teoria del romanzo is more an essay in nature than a treatise, being characterized
    by direct critical engagement rather than scientific indifference. Its verdict on the novel is a harsh one that is filled
    with nihilism.
- source_sentence: Laboratory and clinical studies have shown that vacuum-assisted closure (VAC) therapy increases wound blood
    flow and granulation tissue formation and decreases accumulation of fluid and bacteria. Many publications outline the
    use of VAC dressings in the treatment of sternal, sacral, upper and lower extremity, perineal, and abdominal wounds, but
    few describe its use in the head and neck region. No report to date has addressed the use of VAC therapy in helping to
    preserve facial nerve integrity.We present a case of a -year-old woman who underwent tissue debridement for necrotizing
    fasciitis of the left face, neck, and upper chest. She subsequently had exposed facial nerve that was covered with a VAC
    dressing and demonstrated complete granulation by postoperative day with preservation of function.This case highlights
    the effectiveness of VAC in eliminating infectious material and promoting granulation tissue formation. This is the first
    time that VAC therapy has been shown to maintain neural function when placed directly on functioning cranial nerves.
  sentences:
  - The mitotic selection procedure for cell cycle analysis was utilized to investigate the G/sub / transition point for and
    the duration of radiation-induced division delay in diploid and tetraploid Chinese hamster ovary (CHO) fibroblasts and
    in Chinese hamster ovarian carcinoma cells. The location of the radiation-induced division delay transition point was
    dose independent at high doses and located approximately min before division. At lower doses only an estimate of the point
    of blockade was possible; but the G/sub / transition point appeared to be earlier in the cell cycle. The duration of radiation-induced
    division delay was dose dependent. This response is consistent with a sensitive population of cells in late G/sub / that
    define the location of the transition point and the length of division delay. There was no difference observed in the
    dose response for radiation-induced division delay between the pseudotetraploid cell line of CHO and the pseudodiploid
    parent strain. However, in the cell line derived from a spontaneous Chinese hamster ovarian carcinoma the division delay
    was +- min/Gy. Therefore, radiation-induced division delay is independent of chromosome ploidy, but can show intraspecies
    cell line specificity.
  - Charge time has become one of the primary issues restricting the development of electric vehicles. To counter this problem,
    an adapted thermal management system needs to be designed in order to reduce the internal thermal gradient, by predicting
    the surface and internal temperature responses of the battery. In this work, a pseudo 0D model is developed to simulate
    battery cell performance and its internal states under various operational scenarios such as temperature and convection
    conditions as well as the applied current during charge and discharge. An original mesh of the JR is proposed where heat
    exchanges in the three directions (radial, orthoradial and axial) are considered. The model represents one of the solutions
    that enable increasing the lifespan of batteries while decreasing charging time. It offers the opportunity to optimize
    operating parameters to extend battery life. In this paper, attention was paid not only to the core and non-core components,
    but also to the experiments required to parametrize the thermal and electrochemical models (heat generation). Unlike existing
    approaches documented in the literature, the model developed in this work achieves an impressive balance between computational
    efficiency and result accuracy, making it a groundbreaking contribution in the field of electric vehicle technology.
  - Emergency common carotid artery (CCA) ligation for bleeding control during carotid blowout syndrome with consecutive embolic
    stroke has been reported rarely. The patient is a -year-old man, who was suffering from acute profuse bleeding from the
    left superior thyroid artery into the piriformis sinus, which was not controlled other than by ligation of the left CCA.
    The cause of the bleeding remained unclear but was suspected to be related to his history of being positive for squamous
    cell carcinoma of the left hypopharynx with ari and postcricoid infiltration, diagnosed at age . Squamous cell carcinoma
    was treated with local resection, chemotherapy (docetaxel, carboplatin, and cetuximab), and radiotherapy. Neurological
    examination days after CCA ligation revealed multiple subacute embolic strokes in the territory of the left middle cerebral
    artery, macroangiopathy of the extra and intracranial cerebral arteries, and hypoplasia of the left vertebral artery.
    This case demonstrates that carotid blowout syndrome may require CCA ligation when external carotid artery ligation is
    not possible, and that ligation can be complicated by an asymptomatic embolic stroke.
- source_sentence: A practical bioassay technic for glucocorticoids is proposed, using the adrenal-ectomized, -day-old male
    rat as test animal. The method offers the accuracy and precision shown by the use of the young adult rat, and the sensitivity
    and economy observed in methods using the laboratory mouse. Dose-response curves have been established for cortisone and
    for the assay of urine extracts. The regression lines for the two substances are parallel, indicating the method is valid
    for measurement of glucocorticoid excretion. It is suggested that this bioassay method may serve as a valuable adjunct
    to the chemical methods for the assay of urinary corticoids.
  sentences:
  - Reserpine had no significant effect upon thyroidal-I000 release rate resulting from injections of thyrotropin (TSH) into
    young mature female rats whose endogenous secretion of TSH was effectively blocked with thyroxine. In another experiment,
    reserpine prevented thyroid enlargement which normally results from administration of the goitrogen tapazole. Injections
    of tapazole and/or reserpine did not significantly affect pituitary or adrenal weight. It appears reserpine inhibits thyroid
    function in the rat through suppression of TSH secretion.
  - Squids (teuthoids) fall into two distinct groups according to their density in sea water. Squids of one group are considerably
    denser than sea water and must swim to stop sinking; squids in the other group are nearly neutrally buoyant. Analyses
    show that in almost all the neutrally buoyant squids large amounts of ammonium are present. This ammonium is not uniformly
    distributed throughout the body but is mostly confined to special tissues where its concentration can approach half molar.
    The locations of such tissues differ according to the species and developmental stage of the squid. It is clear that the
    ammonium-rich solution are almost isosmotic with sea water but of lower density and they are present in sufficient volume
    to provide the main buoyancy mechanism of these squids. A variety of evidence is given which suggests that squids in no
    less than of the families achieve near-neutral buoyancy in this way and that families contain squids appreciably denser
    than sea water [at least one family contains both types of squid]. Some of the ammonium-rich squids are extremely abundant
    in the oceans.
  - 'The study reports findings regarding ) young children''s responses to museum exhibits in the archaeological museum of
    Cyprus and ) the impact of the museum visit on young children''s art learning- The sample includes children ( boys and
    girls) drawn randomly from two classrooms in two public nursery schools in Nicosia. An open-ended interview procedure
    was used to explore children''s responses to museum exhibits. In addition methods include observational data form videotape
    recordings, teacher''s field notes and photographic material. Results suggest that: ) children''s'' preferences seemed
    to be occurred by chance, ) most of the children reacted positively to large in size museum exhibits or to exhibits that
    depicted favorite or familiar to them subject matter, ) previous artistic experiences seemed to help children in recognizing
    the artistic medium and understanding the artistic process of the exhibits, ) children were particularly interested in
    exploring the artistic medium than producing artistic products. The findings, corroborates the view of those who believe
    that children''s contact with original exhibits in a museum setting is an important part of children''s educational experiences
    and underlying the significance of a museum friendly environment, and appropriate educational programmes incorporating
    artistic activities in enhancing children''s experiences and learning in museum settings.'
- source_sentence: 'This article explores the possibilities of a cheap one-dollar microscope, the Foldscope, for enhancing
    out-of-school science education. Developed by Manu Prakash and Jim Cybulski from Stanford University, these origami-type
    paper microscopes make it possible to provide all students with their own microscopes, due to the low cost. This provides
    students the opportunity to engage in science outside of the classroom, as amateur sleuths engaged in environmental inquiries,
    e.g., determining the levels of pollution of local water resources. In this article the authors share two sets of research
    data: an activity where school students engaged in authentic problem-based learning using the Foldscopes, as well as student
    teachers'' experiences of engaging with Foldscope microscopes. The outcomes of the first research project indicate that
    affective outcomes and cognitive gains were achieved. Responses in the second research project included five categories:
    preparation and presentation; potential of the Foldscope; use of slideshow; energy/complements; and limitations. The conclusion
    reached was that Foldscopes hold possibilities for enhancing STS (science-technology-society) approaches inside and outside
    the classroom. One recommendation is that such frugal-science approaches are emphasized more in both pre-and in-service
    teacher education.'
  sentences:
  - The aim of this study resonated with the pursuit of achieving enhanced engagement in teaching and learning that informs
    critical thinking, and knowledge retention among students. Despite the growing trend of technological integration in teaching
    and learning, however, there exists a lack of empirical evidence and comprehensive studies that investigate the effectiveness
    of gaming in promoting educational objectives within rural institution of higher learning in South Africa. To investigate
    this gap, a systematic review method was employed, which provides a comprehensive and logical analysis of existing literature
    on the significance of gaming in teaching and learning within rural institutions of higher education. Inclusion and exclusion
    criteria were used in the study to enhance the rigor and transparency of the research process, by providing a solid foundation
    for synthesizing and interpreting existing literature relevant to the study. The systematic review findings revealed that
    the significance of gamification in teaching and learning in rural higher education lies in its ability to overcome accessibility
    challenges, provide personalized learning experiences, address motivation and retention issues, and enhance digital literacy.
    It was recommended that by incorporating gamified approaches, rural higher educational institutions can create a more
    inclusive, engaging, and effective learning environment for students within the rural institutions of higher learning
    in South Africa.
  - 'Abstract Background Coronavirus disease (COVID- ) remains a significant threat to hospital infection control. Despite
    the decrease in severity and mortality associated with changes in the variants of concern and increased vaccination, SARS-CoV-
    transmissibility remains high, and nosocomial clusters continue to be reported in various countries. Although COVID- may
    be detected in multiple patients and healthcare workers (HCWs) in a given ward within a few days, it is uncertain whether
    these cases will develop into a large cluster. Methods The present, retrospective cohort study of nosocomial COVID- clusters
    was conducted at Tokyo Medical and Dental University Hospital from January to January using data from the hospital''s
    infection prevention and control team. A nosocomial COVID- cluster was defined as consisting of more than COVID- cases
    occurring within days in the same ward. Cases with a clear epidemiological link and clusters outside the ward were excluded.
    We collected information regarding community trends, the index case details, and each cluster''s ward profile. Predictors
    of cluster expansion to more than cases were also examined. Results clusters were identified at the hospital during the
    study period. The median number of COVID- cases per cluster was (range: - ), and their median duration was days (range:
    - ). ( %), ( %), and ( %) clusters comprised both inpatients and HCWs, only HCWs, and only patients, respectively. The
    index case of clusters ( %) was a HCW. ( %) and ( %) clusters contained > and < cases, respectively. No significant intergroup
    difference was found in terms of community prevalence, index case and ward characteristics, the rate of close contact
    or history of previous clusters. However, "clusters occurring during the non-epidemic period" and "infections > occurring
    within days" tended to develop into clusters containing more than cases. Conclusion Nosocomial clusters can occur anywhere,
    and predicting them is challenging. Further research is needed to identify the factors leading to cluster development
    and to establish effective infection prevention and control measures. Disclosures All Authors: No reported disclosures'
  - 'NORMAN,J. R. . A systematic monograph of the flatfishes (Heterosomata). Vol. I. Psettodidae, Bothidae, Pleuronectidae.
    Trustees of the British Museum, London, England. --. . Fishes. The John Murray Expedition - . Sci. Rep. : - . QINGTAI,
