      included five categories: preparation and presentation; potential of the Foldscope; use of slideshow; energy/complements;
      and limitations. The conclusion reached was that Foldscopes hold possibilities for enhancing STS (science-technology-society)
      approaches inside and outside the classroom. One recommendation is that such frugal-science approaches are emphasized
      more in both pre-and in-service teacher education.'
    sentences:
    - The aim of this study resonated with the pursuit of achieving enhanced engagement in teaching and learning that informs
      critical thinking, and knowledge retention among students. Despite the growing trend of technological integration in
      teaching and learning, however, there exists a lack of empirical evidence and comprehensive studies that investigate
      the effectiveness of gaming in promoting educational objectives within rural institution of higher learning in South
      Africa. To investigate this gap, a systematic review method was employed, which provides a comprehensive and logical
      analysis of existing literature on the significance of gaming in teaching and learning within rural institutions of
      higher education. Inclusion and exclusion criteria were used in the study to enhance the rigor and transparency of the
      research process, by providing a solid foundation for synthesizing and interpreting existing literature relevant to
      the study. The systematic review findings revealed that the significance of gamification in teaching and learning in
      rural higher education lies in its ability to overcome accessibility challenges, provide personalized learning experiences,
      address motivation and retention issues, and enhance digital literacy. It was recommended that by incorporating gamified
      approaches, rural higher educational institutions can create a more inclusive, engaging, and effective learning environment
      for students within the rural institutions of higher learning in South Africa.
    - 'Abstract Background Coronavirus disease (COVID- ) remains a significant threat to hospital infection control. Despite
      the decrease in severity and mortality associated with changes in the variants of concern and increased vaccination,
      SARS-CoV- transmissibility remains high, and nosocomial clusters continue to be reported in various countries. Although
      COVID- may be detected in multiple patients and healthcare workers (HCWs) in a given ward within a few days, it is uncertain
      whether these cases will develop into a large cluster. Methods The present, retrospective cohort study of nosocomial
      COVID- clusters was conducted at Tokyo Medical and Dental University Hospital from January to January using data from
      the hospital''s infection prevention and control team. A nosocomial COVID- cluster was defined as consisting of more
      than COVID- cases occurring within days in the same ward. Cases with a clear epidemiological link and clusters outside
      the ward were excluded. We collected information regarding community trends, the index case details, and each cluster''s
      ward profile. Predictors of cluster expansion to more than cases were also examined. Results clusters were identified
      at the hospital during the study period. The median number of COVID- cases per cluster was (range: - ), and their median
      duration was days (range: - ). ( %), ( %), and ( %) clusters comprised both inpatients and HCWs, only HCWs, and only
      patients, respectively. The index case of clusters ( %) was a HCW. ( %) and ( %) clusters contained > and < cases, respectively.
      No significant intergroup difference was found in terms of community prevalence, index case and ward characteristics,
      the rate of close contact or history of previous clusters. However, "clusters occurring during the non-epidemic period"
      and "infections > occurring within days" tended to develop into clusters containing more than cases. Conclusion Nosocomial
      clusters can occur anywhere, and predicting them is challenging. Further research is needed to identify the factors
      leading to cluster development and to establish effective infection prevention and control measures. Disclosures All
      Authors: No reported disclosures'
