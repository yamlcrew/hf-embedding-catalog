- source_sentence: In this work, a novel design of an oscillating body-type Wave Energy Converter (WEC) is proposed with an
    efficiency of %. Innovative features of the new design include the integration of Mechanical Motion Rectifier (MMR), Motion
    Regulator (MR), Energy Storage Element (ESE), and Electric Generator (EG) with the operation controlled by a microcontroller,
    limit switches, and linear actuator. Lab experiments conducted with a prototype ensured a peak voltage of V and peak power
    of W. Experimental and MATLAB theoretical simulation results demonstrated the average power of - mW for a wave height
    of - mm. In comparison to the conventional operation, where the electric generator is directly driven by wave motion,
    the proposed design will ensure higher peak power and better energy utilization characteristics of the generated voltage
    waveform. Simulation results are presented with the incorporation of non-circular gears that ensure modification of the
    voltage waveform for better energy utilization.
  sentences:
  - Hyperspectral imagery, i.e., imagery with more than a hundred spectral bands, is particularly useful for material identification.
    Since each pixel is a spectral signature, comparing that signature with a library of signatures for known materials allows
    each pixel's material to be identified as the one with the closest match. The word 'match', of course, must be defined
    since many measures of matching are used. This material identification process becomes considerably less straightforward,
    however, when the pixel on the ground includes multiple materials; then the pixel is 'mixed' and no one library signature
    will match. Rather, a sum of library signatures, with appropriate coefficients of proportionality, that matches the pixel's
    signature must be determined. The determination of these coefficients of proportionality is termed 'unmixing'. A variety
    of unmixing methods have been developed and are reported in the literature. This paper addresses a new algorithm based
    on linear programing (LP), an optimization method borrowed from operations research. Sophisticated LP software is currently
    available for virtually every computer. The paper is said to be an approach, since the method has not been evaluated to
    date on real hyperspectral imagery and no claims may yet be made for its performance, although such test and evaluation
    activities are planned using AVIRIS data from the Jet Propulsion Laboratory.
  - 'Objective: Use a systems-biology based modeling approach to identify and test mechanistic hypotheses that may explain
    the reductions in proteinuria and rate of GFR (Glomerular Filtration Rate) decline following the addition of aliskiren,
    a direct renin inhibitor (DRI), to Losartan, an angiotensin receptor blocker (ARB), as reported in the AVOID trial (00week
    study in diabetic nephropathy patients). Method: A RAAS-hypertension model was collaboratively developed by extending
    the well-established Guyton-Coleman model of blood pressure regulation to include ) a detailed representation of the renin
    angiotensin aldosterone (RAAS) pathway and ) a renal module that captures kidney damage caused by elevated glucose, renal
    angiotensin II, and blood pressure, leading to proteinuria and gradual decline in GFR. The model also includes a virtual
    patient (VP) population consisting of normotensives, hypertensives, and hypertensives with diabetic nephropathy. To parameterize
    the model, published and internal data on changes in RAAS biomarkers, blood pressure, GFR, and proteinuria following RAAS
    therapies were used. The AVOID study was simulated in the RAAS model using a cohort of diabetic nephropathy VPs selected
    to match baseline characteristics of patients in the trial. Results: The model was able to capture both the percent reduction
    in UACR (urinary albumin excretion rate) and differential rate of decline in GFR in the aliskiren arm compared to placebo
    observed in AVOID (Figure ). In this poster we present model-based hypothesis testing that points to multiple mechanistic
    factors that can contribute to added benefits of a DRI in combination with ARBs, including the degree of baseline intrarenal
    RAAS upregulation, the relative effectiveness of ARBs in inhibiting intrarenal versus systemic AT0 receptors, and variation
    in the population''s sensitivity to RAAS therapies. Conclusions: We have developed a RAAS model that can be used to test
    hypotheses, to predict outcomes of future clinical trials, and to identify patient populations most likely to benefit
    from RAAS therapies.'
  - 'The concerns about the availability of freshwater to meet the demands of a growing population while sustaining a healthy
    natural environment are based on several factors: uncertainties as to the availability of supplies; the high costs of
    developing additional water supplies; the vulnerability of the resource and the problems of restoring and protecting valued
    surface and groundwater resources; the importance of reliable supplies of high-quality water for human and environmental
    health and economic development; and the shortcomings of our institutions for allocating scarce supplies in response to
    changing supply and demand conditions. Therefore water management authorities around the world are challenged with ensuring
    the quantity, quality, and allocation among the various uses of water are sustainable.This paper is based on the household
    survey of the irrigators using recycled water from the scheme to irrigate their crops in Virginia. The paper elicits their
    point of view on various issues related to wastewater usage and the rules-in-use governing wastewater management related
    to the scheme.DOI: Economic Journal of Development Issues Vol.00 & , pp.00-'
