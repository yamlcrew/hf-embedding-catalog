    - 'Recently a comprehensive source of data and information on carbon storage in various types of forest ecosystems and
      other land use in Java Island are still limited. This study was carried out in a conservation area of Bromo Tengger
      Semeru National Park (TNBTS) that represents the ecosystem types of lowland rain forest, sub-montane forests and mountain
      forests in Java. The information on carbon sequestration and carbon stocks at TNBTS becomes important. The main objective
      of this study was to estimate biomass and carbon storage in various types of forests in TNBTS using allometric approaches.
      The additional objectives were to estimate carbon storage on various land cover and to estimate the changes in carbon
      storage by land cover changes during the period , and . The measurement of forest carbon include aboveground, understorey,
      necromass and litter pools covering all ecosystem such as primary forest, secondary forest with high- and low- canopy
      density. This study found that the average of carbon stocks in primary forest were tonC/ha, and were tonC/ha in secondary
      forest. The total carbon stocks in the period has decreased about tonC/ha/year and in the period has increased about
      tonC/ha/year. The enhancement of carbon stocks in this area was driven by an intensive forest protection, good monitoring
      and land rehabilitation. Keywords: biomass, carbon storage, carbon stock, land cover , national park'
  - source_sentence: In this paper, we present a novel multiple input multiple output (MIMO) linear parameter varying (LPV)
      state-space refinement system identification algorithm that uses tensor networks. Its novelty mainly lies in representing
      the LPV sub-Markov parameters, data and state-revealing matrix condensely and in exact manner using specific tensor
      networks. These representations circumvent the 'curse-of-dimensionality' as they inherit the properties of tensor trains.
      The proposed algorithm is 'curse-of-dimensionality'-free in memory and computation and has conditioning guarantees.
      Its performance is illustrated using simulation cases and additionally compared with existing methods.
    sentences:
    - This paper proposes a new predictive controller approach for nonlinear process based on a reduced complexity homogeneous,
      quadratic discrete-time Volterra model called quadratic S-PARAFAC Volterra model. The proposed model is yielded by using
      the symmetry property of the Volterra kernels and their tensor decomposition using the PARAFAC technique that provides
      a parametric reduction compared to the conventional Volterra model. This property allows synthesising a new nonlinear-model-based
      predictive control (NMBPC). We develop the general form of a new predictor, and therefore, we propose an optimisation
      algorithm formulated as a quadratic programming under linear and nonlinear constraints. The performances of the proposed
      quadratic S-PARAFAC Volterra model and the developed NMBPC algorithm are illustrated on a numerical simulation and validated
      on a benchmark as a continuous stirred-tank reactor system. Moreover, the efficiency of the proposed quadratic S-PARAFAC
      Volterra model and the NMBPC approach are validated on an experimental communicating two-tank system.
    - Importance Several studies have found no temporal or demographic differences in the incidence of retinoblastoma except
      for age at diagnosis, whereas other studies have reported variations in incidence by sex and race/ethnicity. Objective
      To examine updated US retinoblastoma incidence patterns by sex, age at diagnosis, laterality, race/ethnicity, and year
      of diagnosis. Design, Setting, and Participants The Surveillance, Epidemiology, and End Results (SEER) databases were
      examined for retinoblastoma incidence patterns by demographic and tumor characteristics. We studied children in SEER
      registries, in SEER registries, and in SEER registries. Main Outcomes and Measures Incidence rates, incidence rate ratios
      (IRRs), and annual percent changes in rates. Results During - in SEER , there was a significant excess of total retinoblastoma
      among boys compared with girls (IRR, ; % CI, to ), in contrast to earlier reports of a female predominance. Bilateral
      retinoblastoma among white Hispanic boys was significantly elevated relative to white non-Hispanic boys (IRR, ; % CI,
      to ) and white Hispanic girls (IRR, ; % CI, to ) because of less rapid decreases in bilateral rates since the 0000s
      among white Hispanic boys than among the other groups. Retinoblastoma rates among white non-Hispanics decreased significantly
      since among those younger than year and since among those with bilateral disease. Conclusions and Relevance Although
      changes in the availability of prenatal screening practices for retinoblastoma may have contributed to these incidence
      patterns, further research is necessary to determine their actual effect on the changing incidence of retinoblastoma
      in the US population. In addition, consistent with other cancers, an excess of retinoblastoma diagnosed in boys suggests
      a potential effect of sex on cancer origin.
    - 'Improving the health behaviour can help prevent stroke recurrence. The existing health education interventions require
      more human resource. There is a lack of constructing a low-cost, highly universal, and easy-to-use stroke secondary
      prevention platform based on the existing medical resources.This was a randomized controlled trial to test the effects
      of a digital learning platform on the health knowledge, beliefs, and behaviours of stroke patients from baseline to
      months after discharge. The control group received routine health education while the intervention group received health
      belief education during hospitalization and used a digital learning platform for months after discharge. The health
      knowledge was assessed by The Stroke Health Knowledge Questionnaire, health beliefs by The Short Form Health Belief
      Model Scale for Stroke Patients, and health behaviours by the Stroke Health Behavior Scale. A total of patients were
      included: each in the intervention group and the control group, of whom and completed the study, respectively. At months
      after discharge, ( ) the health knowledge score of the intervention group was insignificantly higher than that of the
      control group, ( ) the health belief score of the intervention group was significantly higher than that of the control
      group, and ( ) the intervention group had higher health behaviour scores especially in physical activity than that of
      the control group. Other health behaviour dimensions have time effect, but not significant.The digital learning platform
      can improve health behaviours of stroke patients months after discharge, especially in physical activity.ChiCTR0000000000.'
  - source_sentence: The present investigation was undertaken to study the involvement of Apatani women of Arunachal Pradesh
      in farm and home activities with the objective to study the selected socio-personal characteristics of Apatani women
      of Arunachal Pradesh and to identify the extent of involvement of Apatani women in selected farm and home activities.The
      study was conducted in Lower Subansiri district of Arunachal Pradesh.Four villages were selected for the present study.Data
      were collected with the help of interview schedule.Statistical technique viz., frequency, percentage, mean and standard
      deviation and coefficient correlation were used for analyzing the data.The study revealed that majority of the respondents
      were within the age group of - , belonged to Hindu religion were mostly illiterate, married, having nuclear family and
      member of one organization.Observations revealed that all the respondents independently participated in sowing of seed,
      nursery raising, leveling of field, weeding, gap filing and application of organic manure.The findings revealed that
      correlation between extent of participation in farm activities and land holding was negative and significant.While relationship
      between extent of participation in home activities with family size was positive and significantt.The mass media exposure
      and occupation of the family had positive and significant relationship with extent of participation in decision making
      pattern in home activities.The correlation between extent of participation in farm activities and land holding was negative
      and significant while relationship between extent of participation in home activities with family size was positive
      and significant.
    sentences:
    - The present investigation was conducted to assess the knowledge of farm women about farm broadcast 'Kheti Ri Baata'
      of state Department of Agriculture, Rajasthan.The study was conducted in four villages viz., Gadoli, Nandwel, Mavli
      and Thamla of randomly selected Mavli Panchayat Samiti of Udaipur district of Rajasthan.A sample of farm women was selected
