    - Reninangiotensin aldosterone system inhibitors are for a long time extensively used for the treatment of cardiovascular
      and renal diseases. AT0 receptor blockers (ARBs or sartans) act as antihypertensive drugs by blocking the octapeptide
      hormone Angiotensin II to stimulate AT0 receptors. The antihypertensive drug candesartan (CAN) is the active metabolite
      of candesartan cilexetil (Atacand, CC). Complexes of candesartan and candesartan cilexetil with -hydroxylpropyl--cyclodextrin
      ( -HP--CD) were characterized using high-resolution electrospray ionization mass spectrometry and solid state 00C cross-polarization/magic
      angle spinning nuclear magnetic resonance (CP/MAS NMR) spectroscopy. The 00C CP/MAS results showed broad peaks especially
      in the aromatic region, thus confirming the strong interactions between cyclodextrin and drugs. This experimental evidence
      was in accordance with molecular dynamics simulations and quantum mechanical calculations. The synthesized and characterized
      complexes were evaluated biologically in vitro. It was shown that as a result of CAN's complexation, CAN exerts higher
      antagonistic activity than CC. Therefore, a formulation of CC with -HP--CD is not indicated, while the formulation with
      CAN is promising and needs further investigation. This intriguing result is justified by the binding free energy calculations,
      which predicted efficient CC binding to -HP--CD, and thus, the molecule's availability for release and action on the
      target is diminished. In contrast, CAN binding was not favored, and this may allow easy release for the drug to exert
      its bioactivity.
    - Heterogeneous electron-transfer rate measurements using the scanning electrochemical microscope are reported for the
      [M(TCTA)](-/ ) couples (M = Mn, Fe, and Ni) in aqueous solution. Solution IR spectroscopy indicates that N( )O( ) coordination
      is preserved for each couple within the pH range of - , and susceptibility measurements indicate little or no interference
      from spin-state changes at room temperature. Marcus-Hush expressions were used to quantitatively relate structural differences
      between oxidation states to measured standard heterogeneous electron-transfer rate constants. Good correlation was obtained
      for the Fe couple, and structural changes associated with the Mn and Ni couples were estimated. In addition, the structure
      of the Fe(II) complex was determined by X-ray crystallography. The molecule [Fe(H( )O)( )][Fe(TCTA)]( ) is trigonal,
      space group P0( )/c (no. ) with a = b = ( ) A, c = ( ) A, and Z = . A notable feature of the structure is that the [Fe(TCTA)](-)
      complex is distributed between two different geometries, one being rigorously trigonal prismatic and the other having
      a antiprismatic twist.
  - source_sentence: 'To deal with the theme of the "unrepresented" it is necessary to clarify what we mean by representation.
      Depending on whether a formal, substantial, descriptive or symbolic concept of representation is adopted, in fact, the
      answer to the question: "Who are the unrepresented?" changes. Based on a formal concept, the unrepresented are those
      formally excluded from political rights. On the basis of a substantial conception, instead, they too can be considered
      represented, if there is someone who pursues their interests in the institutions. According to a descriptive concept,
      an assembly selected through the draw must be considered representative. The same can be said of a leader in whom a
      community identifies itself symbolically. The author claims that the adoption of exclusively substantial, descriptive
      or symbolic conceptions of representation involves many problems from the point of view of democratic theory, and therefore
      adopts a formal perspective. According to it, the unrepresented can be divided into three categories: a) who has not
      the right to elect representatives; b) who has this right, but fails to elect his or her own representative; c) who
      has this right but doesn''t exercise it. The first category includes foreign residents without citizenship in democratic
      countries. The author argues that discrimination against them is not rationally justifiable, because it cannot be based
      on any of the classic arguments developed to limit political rights (such as lack of capacity, independence, or interest).
      The second category includes those who vote, but don''t contribute to the election of anyone representing them. The
      existence of this category raises the problem of distorting electoral laws, and the issue of the size of representative
      assemblies. The third category includes those who don''t exercise their political rights. A worrying sign that the vote
      by many is no longer perceived as a vehicle for change.'
    sentences:
    - 'Background: Disability, societal, and health impact of chronic intractable pain secondary to various failed therapies
      is a major issue. As advanced therapy, implantable therapies, which include intrathecal devices and spinal cord stimulation
      systems, are frequently used in managing chronic intractable pain. Thus, continuous infusion of intrathecal medication
      is one of the methods used for the control of chronic, refractory, cancer, and non-cancer pain. However, despite the
      high costs of chronic non-cancer pain, it has been claimed that there is a lack of evidence for intrathecal infusion
      systems and the cost effectiveness of these systems has been questioned in improving pain and function. Study Design:
      A systematic review of intrathecal infusion devices for chronic non-cancer pain. Objective: To determine the efficacy,
      utilization, safety, and complications associated with the use of intrathecal infusion devices for long-term management
      of chronic non-cancer pain. Methods: Literature search was performed through EMBASE, Medline, Cochrane databases, and
      systematic reviews identified from to December . Studies were then reviewed and assessed using the Agency for Healthcare
      Research and Quality (AHRQ) criteria for observational studies and the Cochrane Musculoskeletal Review Group criteria
      for randomized trials. The level of evidence was determined using levels of evidence, ranging from Level I to III with
      subcategories in Level II, based on the quality of evidence developed by the U.S. Preventive Services Task Force (USPSTF).
      Outcome Measures: The primary outcome measure was pain relief (short-term relief one-year and long-term > one-year).
      Secondary outcome measures of improvement in functional status, psychological status, return to work, and reduction
      in opioid intake were also utilized. Results: The level of evidence for intrathecal infusion systems indicated either
      Level II- or Level III (limited) based on U.S. Preventive Services Task Force (USPSTF) criteria. Limitations: The limitations
      of this study include the paucity of literature, lack of quality evidence, and lack of randomized trials. Conclusion:
      This systematic review illustrates Level II- or Level III (limited) evidence for intrathecal infusion systems for long-term
      relief in chronic non-cancer pain. Key words: Intrathecal infusion, intraspinal infusion, programmable infusion systems,
      spinal infusion, intra-spinal infusion devices, baclofen infusion, intrathecal opiates'
    - 'Human attachment relationships are considered to be foundational to psychological well-being (Fonagy, ; Warren, Huston,
      Egeland, & Sroufe, ) and, by extension, attachment to God is often considered foundational to psychological well-being
      amongst Christian believers (Kirkpatrick, ; Miner, ). However, studies of psychological need satisfaction by different
      attachment figures (La Guardia, Ryan, Couchman, & Deci, ) suggest that experiences in which basic psychological needs
      are satisfied are conducive to more secure attachment relationships, and thus, to enhanced psychological well-being.
      This paper tests two contrasting models of attachment to God, need satisfaction, and well-being: the Attachment Security
      Primacy Model which holds that attachment security facilitates experiences of psychological need satisfaction and thence
      increased well-being; and the Need Satisfaction Primacy Model which holds that experiences of psychological need satisfaction
      facilitate attachment security and thence increased well-being. Using self-report data from Australian Christian participants,
      Structural Equation Modeling indicated that the Need Satisfaction Primacy Model fit the data better than competing models.
      Implications for augmenting theories of attachment to God and providing contexts in which people can experience God
      as meeting basic needs are discussed.'
    - 'The constitutional State is under attack. If we separate Rule of Law and democratic sovereignty, civil rights and social
      rights, the holding of pluralist democracies is jeopardized. The sunset of the Rule of Law risks being one of the most
      dangerous consequences of neoliberal globalism and its crisis. The demolition of the welfare State and the technocratic
      depletion of politics have in fact generated a distortion of constitutional democracies, which can open the way for
      the questioning of the Rule of law. The opposing ideological narratives on the Rule of Law can be grouped according
      to two visions: an optimistic one, which sees in neo-liberal globalization the opportunity for its generalized diffusion;
      a radical-maximalist, which completely liquidates its regulatory framework and inheritance. The essay analyzes these
      two trends, to focus then on the emergency paradigm as a challenge to the "Rule of law".'
