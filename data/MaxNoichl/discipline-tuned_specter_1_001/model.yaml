      in forest fire control activities are economic factors ie wage, logistics dan goods. Occuring gap between the ideal
      conditions and real conditions is percent. Perceptions which is not in line with the participation and the emerge gap
      is suspected to cause unoptimized of forest fire control conducted by MPA in TNGC. Keywords: forest fire control, gap,
