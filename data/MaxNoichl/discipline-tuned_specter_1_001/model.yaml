  - 'Recently a comprehensive source of data and information on carbon storage in various types of forest ecosystems and other
    land use in Java Island are still limited. This study was carried out in a conservation area of Bromo Tengger Semeru National
    Park (TNBTS) that represents the ecosystem types of lowland rain forest, sub-montane forests and mountain forests in Java.
    The information on carbon sequestration and carbon stocks at TNBTS becomes important. The main objective of this study
    was to estimate biomass and carbon storage in various types of forests in TNBTS using allometric approaches. The additional
    objectives were to estimate carbon storage on various land cover and to estimate the changes in carbon storage by land
    cover changes during the period , and . The measurement of forest carbon include aboveground, understorey, necromass and
    litter pools covering all ecosystem such as primary forest, secondary forest with high- and low- canopy density. This
    study found that the average of carbon stocks in primary forest were tonC/ha, and were tonC/ha in secondary forest. The
    total carbon stocks in the period has decreased about tonC/ha/year and in the period has increased about tonC/ha/year.
    The enhancement of carbon stocks in this area was driven by an intensive forest protection, good monitoring and land rehabilitation.
    Keywords: biomass, carbon storage, carbon stock, land cover , national park'
- source_sentence: In this paper, we present a novel multiple input multiple output (MIMO) linear parameter varying (LPV)
    state-space refinement system identification algorithm that uses tensor networks. Its novelty mainly lies in representing
    the LPV sub-Markov parameters, data and state-revealing matrix condensely and in exact manner using specific tensor networks.
    These representations circumvent the 'curse-of-dimensionality' as they inherit the properties of tensor trains. The proposed
    algorithm is 'curse-of-dimensionality'-free in memory and computation and has conditioning guarantees. Its performance
    is illustrated using simulation cases and additionally compared with existing methods.
  sentences:
  - This paper proposes a new predictive controller approach for nonlinear process based on a reduced complexity homogeneous,
    quadratic discrete-time Volterra model called quadratic S-PARAFAC Volterra model. The proposed model is yielded by using
    the symmetry property of the Volterra kernels and their tensor decomposition using the PARAFAC technique that provides
    a parametric reduction compared to the conventional Volterra model. This property allows synthesising a new nonlinear-model-based
    predictive control (NMBPC). We develop the general form of a new predictor, and therefore, we propose an optimisation
    algorithm formulated as a quadratic programming under linear and nonlinear constraints. The performances of the proposed
    quadratic S-PARAFAC Volterra model and the developed NMBPC algorithm are illustrated on a numerical simulation and validated
    on a benchmark as a continuous stirred-tank reactor system. Moreover, the efficiency of the proposed quadratic S-PARAFAC
    Volterra model and the NMBPC approach are validated on an experimental communicating two-tank system.
  - Importance Several studies have found no temporal or demographic differences in the incidence of retinoblastoma except
    for age at diagnosis, whereas other studies have reported variations in incidence by sex and race/ethnicity. Objective
    To examine updated US retinoblastoma incidence patterns by sex, age at diagnosis, laterality, race/ethnicity, and year
    of diagnosis. Design, Setting, and Participants The Surveillance, Epidemiology, and End Results (SEER) databases were
    examined for retinoblastoma incidence patterns by demographic and tumor characteristics. We studied children in SEER registries,
    in SEER registries, and in SEER registries. Main Outcomes and Measures Incidence rates, incidence rate ratios (IRRs),
    and annual percent changes in rates. Results During - in SEER , there was a significant excess of total retinoblastoma
    among boys compared with girls (IRR, ; % CI, to ), in contrast to earlier reports of a female predominance. Bilateral
    retinoblastoma among white Hispanic boys was significantly elevated relative to white non-Hispanic boys (IRR, ; % CI,
    to ) and white Hispanic girls (IRR, ; % CI, to ) because of less rapid decreases in bilateral rates since the 0000s among
    white Hispanic boys than among the other groups. Retinoblastoma rates among white non-Hispanics decreased significantly
    since among those younger than year and since among those with bilateral disease. Conclusions and Relevance Although changes
    in the availability of prenatal screening practices for retinoblastoma may have contributed to these incidence patterns,
    further research is necessary to determine their actual effect on the changing incidence of retinoblastoma in the US population.
    In addition, consistent with other cancers, an excess of retinoblastoma diagnosed in boys suggests a potential effect
    of sex on cancer origin.
  - 'Improving the health behaviour can help prevent stroke recurrence. The existing health education interventions require
    more human resource. There is a lack of constructing a low-cost, highly universal, and easy-to-use stroke secondary prevention
    platform based on the existing medical resources.This was a randomized controlled trial to test the effects of a digital
    learning platform on the health knowledge, beliefs, and behaviours of stroke patients from baseline to months after discharge.
    The control group received routine health education while the intervention group received health belief education during
    hospitalization and used a digital learning platform for months after discharge. The health knowledge was assessed by
    The Stroke Health Knowledge Questionnaire, health beliefs by The Short Form Health Belief Model Scale for Stroke Patients,
    and health behaviours by the Stroke Health Behavior Scale. A total of patients were included: each in the intervention
    group and the control group, of whom and completed the study, respectively. At months after discharge, ( ) the health
    knowledge score of the intervention group was insignificantly higher than that of the control group, ( ) the health belief
    score of the intervention group was significantly higher than that of the control group, and ( ) the intervention group
    had higher health behaviour scores especially in physical activity than that of the control group. Other health behaviour
    dimensions have time effect, but not significant.The digital learning platform can improve health behaviours of stroke
    patients months after discharge, especially in physical activity.ChiCTR0000000000.'
- source_sentence: The present investigation was undertaken to study the involvement of Apatani women of Arunachal Pradesh
    in farm and home activities with the objective to study the selected socio-personal characteristics of Apatani women of
    Arunachal Pradesh and to identify the extent of involvement of Apatani women in selected farm and home activities.The
    study was conducted in Lower Subansiri district of Arunachal Pradesh.Four villages were selected for the present study.Data
    were collected with the help of interview schedule.Statistical technique viz., frequency, percentage, mean and standard
    deviation and coefficient correlation were used for analyzing the data.The study revealed that majority of the respondents
    were within the age group of - , belonged to Hindu religion were mostly illiterate, married, having nuclear family and
    member of one organization.Observations revealed that all the respondents independently participated in sowing of seed,
    nursery raising, leveling of field, weeding, gap filing and application of organic manure.The findings revealed that correlation
    between extent of participation in farm activities and land holding was negative and significant.While relationship between
    extent of participation in home activities with family size was positive and significantt.The mass media exposure and
    occupation of the family had positive and significant relationship with extent of participation in decision making pattern
    in home activities.The correlation between extent of participation in farm activities and land holding was negative and
    significant while relationship between extent of participation in home activities with family size was positive and significant.
  sentences:
  - The present investigation was conducted to assess the knowledge of farm women about farm broadcast 'Kheti Ri Baata' of
    state Department of Agriculture, Rajasthan.The study was conducted in four villages viz., Gadoli, Nandwel, Mavli and Thamla
    of randomly selected Mavli Panchayat Samiti of Udaipur district of Rajasthan.A sample of farm women was selected for the
    present study.Personal interview method was used for data collection.Frequency, percentage and mean per cent score were
    used for analysis of the data.More than half of the respondents ( %) were not aware about the farm broadcast and very
    few ( %) were viewing the programme regularly.
  - Reninangiotensin aldosterone system inhibitors are for a long time extensively used for the treatment of cardiovascular
    and renal diseases. AT0 receptor blockers (ARBs or sartans) act as antihypertensive drugs by blocking the octapeptide
    hormone Angiotensin II to stimulate AT0 receptors. The antihypertensive drug candesartan (CAN) is the active metabolite
    of candesartan cilexetil (Atacand, CC). Complexes of candesartan and candesartan cilexetil with -hydroxylpropyl--cyclodextrin
    ( -HP--CD) were characterized using high-resolution electrospray ionization mass spectrometry and solid state 00C cross-polarization/magic
    angle spinning nuclear magnetic resonance (CP/MAS NMR) spectroscopy. The 00C CP/MAS results showed broad peaks especially
    in the aromatic region, thus confirming the strong interactions between cyclodextrin and drugs. This experimental evidence
    was in accordance with molecular dynamics simulations and quantum mechanical calculations. The synthesized and characterized
    complexes were evaluated biologically in vitro. It was shown that as a result of CAN's complexation, CAN exerts higher
    antagonistic activity than CC. Therefore, a formulation of CC with -HP--CD is not indicated, while the formulation with
    CAN is promising and needs further investigation. This intriguing result is justified by the binding free energy calculations,
    which predicted efficient CC binding to -HP--CD, and thus, the molecule's availability for release and action on the target
    is diminished. In contrast, CAN binding was not favored, and this may allow easy release for the drug to exert its bioactivity.
  - Heterogeneous electron-transfer rate measurements using the scanning electrochemical microscope are reported for the [M(TCTA)](-/
    ) couples (M = Mn, Fe, and Ni) in aqueous solution. Solution IR spectroscopy indicates that N( )O( ) coordination is preserved
    for each couple within the pH range of - , and susceptibility measurements indicate little or no interference from spin-state
    changes at room temperature. Marcus-Hush expressions were used to quantitatively relate structural differences between
    oxidation states to measured standard heterogeneous electron-transfer rate constants. Good correlation was obtained for
    the Fe couple, and structural changes associated with the Mn and Ni couples were estimated. In addition, the structure
    of the Fe(II) complex was determined by X-ray crystallography. The molecule [Fe(H( )O)( )][Fe(TCTA)]( ) is trigonal, space
    group P0( )/c (no. ) with a = b = ( ) A, c = ( ) A, and Z = . A notable feature of the structure is that the [Fe(TCTA)](-)
    complex is distributed between two different geometries, one being rigorously trigonal prismatic and the other having
    a antiprismatic twist.
- source_sentence: 'To deal with the theme of the "unrepresented" it is necessary to clarify what we mean by representation.
    Depending on whether a formal, substantial, descriptive or symbolic concept of representation is adopted, in fact, the
    answer to the question: "Who are the unrepresented?" changes. Based on a formal concept, the unrepresented are those formally
    excluded from political rights. On the basis of a substantial conception, instead, they too can be considered represented,
    if there is someone who pursues their interests in the institutions. According to a descriptive concept, an assembly selected
    through the draw must be considered representative. The same can be said of a leader in whom a community identifies itself
    symbolically. The author claims that the adoption of exclusively substantial, descriptive or symbolic conceptions of representation
    involves many problems from the point of view of democratic theory, and therefore adopts a formal perspective. According
    to it, the unrepresented can be divided into three categories: a) who has not the right to elect representatives; b) who
    has this right, but fails to elect his or her own representative; c) who has this right but doesn''t exercise it. The
    first category includes foreign residents without citizenship in democratic countries. The author argues that discrimination
    against them is not rationally justifiable, because it cannot be based on any of the classic arguments developed to limit
    political rights (such as lack of capacity, independence, or interest). The second category includes those who vote, but
    don''t contribute to the election of anyone representing them. The existence of this category raises the problem of distorting
    electoral laws, and the issue of the size of representative assemblies. The third category includes those who don''t exercise
    their political rights. A worrying sign that the vote by many is no longer perceived as a vehicle for change.'
  sentences:
  - 'Background: Disability, societal, and health impact of chronic intractable pain secondary to various failed therapies
    is a major issue. As advanced therapy, implantable therapies, which include intrathecal devices and spinal cord stimulation
    systems, are frequently used in managing chronic intractable pain. Thus, continuous infusion of intrathecal medication
    is one of the methods used for the control of chronic, refractory, cancer, and non-cancer pain. However, despite the high
    costs of chronic non-cancer pain, it has been claimed that there is a lack of evidence for intrathecal infusion systems
    and the cost effectiveness of these systems has been questioned in improving pain and function. Study Design: A systematic
    review of intrathecal infusion devices for chronic non-cancer pain. Objective: To determine the efficacy, utilization,
    safety, and complications associated with the use of intrathecal infusion devices for long-term management of chronic
    non-cancer pain. Methods: Literature search was performed through EMBASE, Medline, Cochrane databases, and systematic
    reviews identified from to December . Studies were then reviewed and assessed using the Agency for Healthcare Research
    and Quality (AHRQ) criteria for observational studies and the Cochrane Musculoskeletal Review Group criteria for randomized
    trials. The level of evidence was determined using levels of evidence, ranging from Level I to III with subcategories
    in Level II, based on the quality of evidence developed by the U.S. Preventive Services Task Force (USPSTF). Outcome Measures:
    The primary outcome measure was pain relief (short-term relief one-year and long-term > one-year). Secondary outcome measures
    of improvement in functional status, psychological status, return to work, and reduction in opioid intake were also utilized.
    Results: The level of evidence for intrathecal infusion systems indicated either Level II- or Level III (limited) based
    on U.S. Preventive Services Task Force (USPSTF) criteria. Limitations: The limitations of this study include the paucity
    of literature, lack of quality evidence, and lack of randomized trials. Conclusion: This systematic review illustrates
    Level II- or Level III (limited) evidence for intrathecal infusion systems for long-term relief in chronic non-cancer
    pain. Key words: Intrathecal infusion, intraspinal infusion, programmable infusion systems, spinal infusion, intra-spinal
    infusion devices, baclofen infusion, intrathecal opiates'
  - 'Human attachment relationships are considered to be foundational to psychological well-being (Fonagy, ; Warren, Huston,
    Egeland, & Sroufe, ) and, by extension, attachment to God is often considered foundational to psychological well-being
    amongst Christian believers (Kirkpatrick, ; Miner, ). However, studies of psychological need satisfaction by different
    attachment figures (La Guardia, Ryan, Couchman, & Deci, ) suggest that experiences in which basic psychological needs
    are satisfied are conducive to more secure attachment relationships, and thus, to enhanced psychological well-being. This
    paper tests two contrasting models of attachment to God, need satisfaction, and well-being: the Attachment Security Primacy
    Model which holds that attachment security facilitates experiences of psychological need satisfaction and thence increased
    well-being; and the Need Satisfaction Primacy Model which holds that experiences of psychological need satisfaction facilitate
    attachment security and thence increased well-being. Using self-report data from Australian Christian participants, Structural
    Equation Modeling indicated that the Need Satisfaction Primacy Model fit the data better than competing models. Implications
    for augmenting theories of attachment to God and providing contexts in which people can experience God as meeting basic
    needs are discussed.'
  - 'The constitutional State is under attack. If we separate Rule of Law and democratic sovereignty, civil rights and social
    rights, the holding of pluralist democracies is jeopardized. The sunset of the Rule of Law risks being one of the most
    dangerous consequences of neoliberal globalism and its crisis. The demolition of the welfare State and the technocratic
    depletion of politics have in fact generated a distortion of constitutional democracies, which can open the way for the
    questioning of the Rule of law. The opposing ideological narratives on the Rule of Law can be grouped according to two
    visions: an optimistic one, which sees in neo-liberal globalization the opportunity for its generalized diffusion; a radical-maximalist,
    which completely liquidates its regulatory framework and inheritance. The essay analyzes these two trends, to focus then
    on the emergency paradigm as a challenge to the "Rule of law".'
