- source_sentence: 'The Taiwan Government follows the policy of active aging to prevent frailty. However, the current services
    lack cultural safety toward the Indigenous peoples and would benefit from a broader perspective on what active aging may
    entail. In this research, we study local perceptions of active aging among older Indigenous Tayal taking part in a local
    day club. The study identifies two formal activities that foster active aging: (a) information meetings about health and
    illness and (b) physical activities. In addition, two informal activities highlighted by the participants themselves were
    identified as necessary for promoting healthy and active aging: Cisan and Malahang. While Cisan means "social care," Malahang
    means "interrelational care practices." In conclusion, we argue for the relevance of listening to Indigenous older adults''
    voices to develop long-term care services adapted to their cultural values, linguistic competence, and cosmology.'
