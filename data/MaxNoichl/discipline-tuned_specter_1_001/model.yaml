    sentences:
    - 'Objective To investigate the current status of clinical medical students'' time engagement in extracurricular activities
      and its association with perceived stress, so to provide reference for promoting the moral, intellectual and physical
      development of clinical medical students as well as promoting the professional level of extracurricular activities in
      medical universities in China. Methods In December , altogether students of clinical medicine major in a medical university
      enrolled in were investigated. General information questionnaire, extracurricular activities time engagement questionnaire
      of medical students and -items perceived stress scale were used to conduct questionnaire survey. The relationship between
      time engagement of extracurricular activities and perceived stress of medical students was analyzed by orderly logistic
      regression. Results The medical students, % ( / ) and % ( / ) of them, spent more than hours per week on extracurricular
      study and leisure and recreation, % ( / ) of the students spent less than hours per week on physical exercise, % ( /
      ) of the students did not devote their time to volunteering. The perceived stress score of students was ( , ). After
      controlling personal and family characteristics, the results of ordinal logistic regression analysis indicated that
      the ones with high perceived stress devoted less time to extracurricular learning (OR= , %CI= ~ ), volunteering (OR=
      , %CI= ~ ) and exercising (OR= , %CI= ~ ). Conclusions Clinical medical students showed a low level of perceived stress.
      Perceived stress has a significant negative impact on students'' time engagement in extracurricular learning, volunteering
      and physical exercise. Medical schools should focus on maintaining low level of perceived stress among clinical medical
      students. Key words: Medical students;Extracurricular activities;Time engagement;Perceived stress;Ordinal logistic regression'
