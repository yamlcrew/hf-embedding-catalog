    In men these measurements were and %, respectively.'
  sentences:
  - The C control chart is mostly used to monitor the number of non-conformities per inspection unit of constant size. It
    is known that the classic C-chart control limits often experience a high false alarm rate and thus lead to the increase
    of unnecessary costs of inspection. Among many works performed to improve C-charts, this paper presents the optimised
    control limits approach to the C-chart. In addition, different C-charts are evaluated through factors related to the design
    of the control chart. Optimally selecting design parameters depends on several process parameters from statistical and/or
    economic aspects in the literature. This study presents multi-objective economic-statistical design of different C control
    charts under single assignable cause. An algorithm using the data envelopment analysis (DEA) is employed to solve the
    models. A numerical example is used to illustrate the algorithm procedure and to evaluate the performances of different
    designs.
  - Early adult changes in the facial profile were studied longitudinally from to years of age in a Swedish Caucasian sample
    of female and male dental students. Lateral cephalometric radiographs were analysed by the conventional point-based method
    and by the structure-based method of superimposing serial films, adapted for computerized numerical analysis. Skeletal
    and soft tissue changes were described by linear and angular variables. The magnitude of linear dimensional changes was
    similar in the two sexes. The largest changes were found in the vertical dimensions. Total anterior facial height increased
    by about mm in the -year period, suggesting that the major part of the increase in vertical facial dimensions during the
    third decade of life takes place in the first half of this decade. Sagittal jaw relationship increased by about in both
    sexes. Soft tissue changes reflected those of the vertical skeletal dimensions.
  - x-ray images of patients with posttraumatic defects of forearm bones have been analyzed using DiaMorph computer-assisted
    complex. Mean optical density of regenerated bone shadows has been evaluated for the purpose of studying the dynamics
    of osteogenesis and mineralization of newly formed bone tissue during osteosynthesis. By planimetry of distraction regenerated
    bones it was established that osteogenesis developed by normoplastic type. Typical distraction regenerated bones were
    formed while filling defect-diastases; the regenerated bones lost their zonal structure at the end of fixation period.
    During formation of wedge-shaped regenerated bones clear zonal structure of newly formed tissue was not traced, the area
    of interlayer occupied significantly less part than it was in case of filling the defects of forearm bones by fragment
    lengthening and formation of typical distraction regenerated bone.
