  - source_sentence: Elevated circulating endotoxin levels in the plasma of patients with advanced hepatosplenic schistosomiasis
      caused by Schistosoma mansoni have been reported, possibly caused by parasite egg-induced intestinal mucosal breaches
      facilitating bacterial access to the bloodstream. Neither endotoxin levels in people with S. mansoni but without hepatosplenic
      disease nor the impact of treatment on endotoxin levels have been described. We used a methodically optimized Limulus
      amebocyte lysate assay to measure plasma endotoxin in community-dwelling women from an S. mansoni-endemic area without
      clinical hepatosplenic disease. We found no difference in baseline mean plasma endotoxin levels between those with (n
      = ) and without (n = ) infection ( versus EU/mL, P = ). Endotoxin levels did not change in schistosome-infected women
      after successful treatment ( versus EU/mL, P = ) and were not correlated with circulating anodic antigen or stool egg
      burden. Our findings do not support the hypothesis that translocating eggs in S. mansoni infection introduce bacterial
      sources of endotoxin to the circulation.
    sentences:
    - In January , a survey of intestinal parasitic infections was performed in a primary school, central Thailand. Of stool
      samples, Blastocystis was identified with a prevalence of %. Genetic characterization of Blastocystis showed subtype
      ( %) and subtype ( %). Study of the water supply in this school was performed to find the possible sources of Blastocystis.
      Blastocystis from one water sample was identified as subtype , which had a nucleotide sequence of small subunit (SSU)
      ribosomal RNA (rRNA) gene that was % identical to that of Blastocystis infected in schoolchildren. Our information supports
      the evidence of water-borne transmission in this population.
    - 'Background: The acute phase proteins (APPs) are plasma proteins whose concentration rise or reduce in reaction to infection,
      inflammation or trauma (Baumann and Gauldie, ). The circulating concentration of these proteins are related to the severity
      of the underlying condition,thus quantification of their concentrations provide a ready means of giving valuable clinical
      information and extent of the disease processes (Thompson et. al., ). Materials and Methods: Serum levels of three acute
      phase proteins (transferrin, a0-macroglobulin and haptoglobin) were determined using single radial immuno-diffusion
      technique in one hundred and eight Nigerian women aged between and years. Theywere made up of thirty pregnant women
      with urinary schistosomiasis (P+USS), thirty-six pregnant women without USS (P-USS), eighteen non-pregnant women with
      USS (NP+USS), and twenty-four healthy non-pregnant women without USS (NP-USS) as controls.Results: The result shows
      that transferrin was least in P-USS group and highest in NP+USS. The highest mean value of alpha- macroglobulin was
      found in P+USS group and the least in NP+USS. Haptoglobin was significantly reduced in P+USS compared with other groups.Conclusions:
      The finding of this study suggests an independent effect of USS and pregnancy on serum levels of APPs, therefore APPs
      could be used to distinguish P+USS from P-USS'
    - Aging is associated with a loss of skeletal muscle mass and function that negatively impacts the independence and quality
      of life of older individuals. Females demonstrate a distinct pattern of muscle aging compared to males, potentially
      due to menopause, when the production of endogenous sex hormones declines. This systematic review aims to investigate
      the current knowledge about the role of estrogen in female skeletal muscle aging. A systematic search of MEDLINE Complete,
      Global Health, Embase, PubMed, SPORTDiscus, and CINHAL was conducted. Studies were considered eligible if they compared
      a state of estrogen deficiency (e.g. postmenopausal females) or supplementation (e.g. estrogen therapy) to normal estrogen
      conditions (e.g. premenopausal females or no supplementation). Outcome variables of interest included measures of skeletal
      muscle mass, function, damage/repair, and energy metabolism. Quality assessment was completed with the relevant Johanna
      Briggs critical appraisal tool, and data were synthesized in a narrative manner. Thirty-two studies were included in
      the review. Compared to premenopausal women, postmenopausal women had reduced muscle mass and strength, but the effect
      of menopause on markers of muscle damage and expression of the genes involved in metabolic signaling pathways remains
      unclear. Some studies suggest a beneficial effect of estrogen therapy on muscle size and strength, but evidence is largely
      conflicting and inconclusive, potentially due to large variations in the reporting and status of exposure and outcomes.
      The findings from this review point toward a potential negative effect of estrogen deficiency on aging skeletal muscle,
      but further mechanistic evidence is needed to clarify its role.
