  sentences:
  - 'The urgent need for very large increases in investment in infrastructure in most developing countries in Asia is very
    clear. This paper surveys the challenges facing policymakers in the region. Nearly all of the main concerns for policymakers
    in Asia in addressing the global infrastructure imbalance are on the supply side. In particular, there are seven related
    supplyside issues that are of high priority for policymakers: selection and preparation of appropriate projects, finance,
    pricing, access, governance and management, policy and regulatory policies, and climate change. Governments and utilities
    need to improve their policies and performance to build confidence among stakeholders. Access to infrastructure services
    needs to be improved so that consumers will support realistic pricing policies, and investors will be encouraged to provide
    finance for infrastructure sectors.'
