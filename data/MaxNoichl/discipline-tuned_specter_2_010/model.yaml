      machined titanium targets in a glass chamber as well as use of a plasma focus device for deuteriding its central titanium
      electrode. Stemming from earlier observations both at BARC and elsewhere that tritium yield is times higher than neutron
      output in cold fusion experiments, we have channelised our efforts to the search for tritium rather than neutrons. The
      presence of tritium in a variety gas/plasma loaded titanium samples has been established successfully through a direct
      measurement of the radiations emitted as a result of tritium decay, in contradistinction to other groups who have looked
      for tritium in the extracted gases. In some samples we have thus observed tritium levels of over MBq with a corresponding
