- source_sentence: Abstract Simple and rapid voltammetric method for simultaneous determination of all trans retinyl acetate
    (RAc) or all trans retinyl palmitate (RPa) and tocopheryl acetate (TOAc) has been proposed. The respective method was
    based on the anodic oxidation of the compounds of interest by squarewave voltammetry in acetone with mol L LiClO at the
    glassy carbon electrode. The procedure was also beneficial with respect to simple dissolution of sample directly in the
    supporting electrolyte. The all trans retinyl acetate could be quantified in two linear ranges ( mol L and mol L ) and
    tocopheryl acetate in linear range mol L with detection limits of mol L RAc (or mol L RPa) and of mol L TOAc. Selected
    commercial cosmetic products were analysed achieving satisfactory recoveries.
  sentences:
  - 'The nitrification inhibitors (NIs) -dimethylpyrazole (DMPP) and dicyandiamide (DCD) can effectively reduce N0 O emissions;
    however, which species are targeted and the effect of these NIs on the microbial nitrifier community is still unclear.
    Here, we identified the ammonia oxidizing bacteria (AOB) species linked to N0 O emissions and evaluated the effects of
    urea and urea with DCD and DMPP on the nitrifying community in a day field experiment under sugarcane. Using an amoA AOB
    amplicon sequencing approach and mining a previous dataset of 00S rRNA sequences, we characterized the most likely N0
    O-producing AOB as a Nitrosospira spp. and identified Nitrosospira (AOB), Nitrososphaera (archaeal ammonia oxidizer) and
    Nitrospira (nitrite-oxidizer) as the most abundant, present nitrifiers. The fertilizer treatments had no effect on the
    alpha and beta diversities of the AOB communities. Interestingly, we found three clusters of co-varying variables with
    nitrifier operational taxonomic units (OTUs): the N0 O-producing AOB Nitrosospira with N0 O, NO0- , NH0+ , water-filled
    pore space (WFPS) and pH; AOA Nitrososphaera with NO0- , NH0+ and pH; and AOA Nitrososphaera and NOB Nitrospira with NH0+
    , which suggests different drivers. These results support the co-occurrence of non-N0 O-producing Nitrososphaera and Nitrospira
    in the unfertilized soils and the promotion of N0 O-producing Nitrosospira under urea fertilization. Further, we suggest
    that DMPP is a more effective NI than DCD in tropical soil under sugarcane.'
  - In order to achieve cost efficiency, customer satisfaction and also to concentrate on core business operations, many manufacturing
    firms are outsourcing their logistics activities to third party logistics (0PLs) provider. Reverse logistics is one type
    of logistics in which used products or end-of-life products are collected from the customers/retailers and send for reuse,
    refurbishing, recycling and/or remanufacturing. The third party reverse logistics provider (0PRLP) who is performing the
    reverse logistics operations is under a pressure of reducing the transportation cost between the customers and the collecting
    centre. Decreasing transport costs can be achieved through better utilization of resources such as vehicles (i.e. through
    proper vehicle routing). This study aims to find the optimal routes which will minimize the total distance traveled and
    corresponding transportation costs for a 0PRLP who transports the used tires from various customers to the centralized
    depot for the purpose of tire remanufacturing/retreading. A hybrid approach of combining Sweep and Clarke-Wright savings
    algorithm with Simulated Annealing (SA) algorithm is proposed in this study and also the results of SA are compared with
    Sweep and Clarke-Wright savings algorithm results.
  - Abstract Orientin, eriodictyol and robinin are polyphenolic compounds, and their oxidation mechanism is pHdependent, in
    two steps, involving a different number of electrons and protons. Orientin and eriodictyol first oxidation occurs at a
    lower potential, corresponding to the reversible oxidation of the catechol group, and is followed by an irreversible oxidation
    on the ringA at more positive potential. Robenin oxidation is irreversible, with the formation of electroactive products,
    and occurs at ringA and ringB. The electrochemical characterization of their redox behaviour brought useful data about
    their chemical stability, antioxidant and prooxidant activity, enabling a comprehensive understanding of their redox mechanism.
- source_sentence: This work studied the degradation of polyethylene terephthalate by ethanol with and without catalysts.
    The degradation without catalyst, PET was introduced into an autoclave with ethanol and heated at the temperature of 000o
    C for , and hours. After heating it was cooled down to room temperature, amd the product was taken to check percentage
    yield by the Nuclear Magnetic Resonance Spectrometer. In case of using the catalysts, cobalt acetate, zinc acetate and
    stannous chloride were used. The results showed that the degradation with the catalysts obtained percentage yield of product,
    diethylene terephthalate (DET), higher than without catalyst for this purpose than zinc acetate and stannous chloride,
    respectively. The DET yield increased with an increase in the reaction time.
  sentences:
  - 'Poplars and willows planted on farms for soil conservation and shelter are also potential sources of supplementary forage.
    The objective of this paper is to provide information that assists in the estimation of the value of poplar and willow
    forage. The quantity of forage in trees and branches was measured and non-destructive methods for estimating forage yield
    were evaluated. The edible forage dry matter (DM) of - -year-old trees ranged from - kg DM/tree. The edible forage yield
    of poplar and willow branches with a basal diameter (BD) up to mm was shown to be estimated from kg DM = BD - . The nutritive
    values of poplars and willows were found to be similar, but the concentration of condensed tannins was usually higher
    in willows. Tree bark was found to have sufficient nutritive value to be stripped from trees for its feed value by livestock.
    Cattle were observed to be able to browse willows to a height of 0m and to eat stems with a diameter from to mm. Keywords:
    browse estimation, condensed tannins, nutritive value, poplar, supplements, willow'
  - In Lake Rogoznica, a small saline and eutrophic lake on the coast of the Adriatic Sea, the copepod Acartia (Acanthacartia)
    italica Steuer, is common, occasionally as an extremely dense population. This phenomenon provided an opportunity for
    a redescription of the adults and for description of the developmental stages. The segmentation and setation patterns
    of the antennules, antennae and mandibles of A. italica are analysed in detail through the naupliar and copepodid phases
    and the other limbs are analysed through the copepodid phase. In addition, wider comparisons are made with available data
    for other species of the subgenus Acanthacartia Steuer, .
