- source_sentence: The aim of the study is to describe our experience with ultrasound guided drainage of tubo-ovarian abscess
    with concomitant use of antibiotics in a second level center. Seven women diagnosed with a tubo-ovarian abscess and treated
    with transvaginal ultrasound guided drainage with concomitant use of antibiotics, between January and January , were reviewed.
    Intravenous antibiotics were administered as soon as the diagnosis was reached and transvaginal ultrasound guided aspiration
    of the abscess material was performed within hours with no need of anaesthesia. Transvaginal route was used since it provides
    a better visualization and access to the region of interest than other ultrasound routes. All cases but one ( %) improved
    clinically within hours of aspiration and only one required surgery due to refilling of a bilateral tubo-ovarian abscess
    hours after drainage. Mean hospital stay was days (range - ). No procedure related complications were diagnosed. A follow
    up ultrasound six months after the drainage showed in cases sonographic markers of chronic tubal inflammatory disease
    but in all cases the patients remained asymptomatic. Transvaginal ultrasound-guided drainage with concomitant antibiotics
    appears to be a safe, efficacious and well tolerated procedure in the treatment approach of tubo-ovarian abscess as reported
    in the literature. We consider this approach as a feasible alternative to surgical drainage whenever indicated.
  sentences:
  - To compare the usefulness and accuracy of sonographically guided endometrial biopsies. After obtaining informed consents
    endometrial biopsies were performed using ultrasound guidance in patients followed by operative hysteroscopy. Diagnostic
    accuracy and treatment efficiency for sono guidance were established. The hysteroscopic procedure was in all cases started
    by using a fore-oblique mm hysteroscope (Karl Storz®️ Endoscopy-America, Inc. Corporate Pointe, Culver City, CA - ) with
    a diagnostic sleeve through the cervical os (Karl Storz®️ Endoscopy-America, Inc. Corporate Pointe, Culver City, CA -
    ), without prior dilatation of the cervix. The catheter used for the polypectomy was an "Intrauterine Access Balloon Catheter"
    (Cook OB/GYN®️ West Morgan Street, P.O. Box , Spencer, Indiana ). Successful sonographic management of the endometrial
    pathology had been achieved in patients ( %). Endometrial polyps had been completely removed under sonographic guidance
    in patients, partially in as confirmed by hysteroscopy. All incompletely removed polyps were of large size (> cm), the
    remnants were taken out hysteroscopically. Targeted endometrial biopsy was performed under sono guidance in patients.
    The completion of the procedure was confirmed by hysteroscopy. Targeted endometrial biopsies and polyp removal can be
    successfully performed under sonographic guidance. Large size endometrial polyps may require hysteroscopy.
  - Aqueous colloidal suspensions of clay platelets display a sol/gel transition that is not yet understood. Depending on
    the nature of the clay, liquid-crystalline behavior may also be observed. For example, the suspensions of beidellite display
    a nematic phase whereas those of montmorillonite do not. Both beidellite and montmorillonite have a "TOT" structure but
    the structural electric charge is located in the tetrahedral layer for the former and in the octahedral layer for the
    latter. We built a setup to perform SAXS experiments on complex fluids submitted to an electric field in situ. We found
    that the fluid nematic phase of beidellite suspensions readily aligns in the field. However, the field had no influence
    on the gels, showing that the orientational degrees of freedom of the platelets are effectively frozen. Moreover, strong
    platelet alignment was induced by the field in the isotropic phase of both clays, in a similar way, regardless of their
    ability to form a nematic phase. This surprising result would suggest that the orientational degrees of freedom are not
    directly involved in the sol/gel transition. The ability to induce orientational order in the isotropic phase of clay
    suspensions can be exploited to prepare materials of controlled anisotropy.
  - 'The article is devoted to the peculiarities of the paid domestic labor market in the Russian economy. It is shown that
    this market is characterized by the following features: weak state regulation; a high proportion of internal and external
    migrants; a wide spread of the shadow economy and informal labor relations; gender differences; the presence in the market
    of an "elite" segment of workers providing higher-quality and highly paid services, and a segment of workers performing
    temporary, episodic work. It is proved on the basis of market analysis that there is a predominant demand for skilled
    labor, and wages are at or above the national average. It is concluded that further efforts are needed to legalize the
    work of domestic workers within the framework of the state employment policy.'
