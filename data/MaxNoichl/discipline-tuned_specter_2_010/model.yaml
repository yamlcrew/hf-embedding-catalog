    - Two small areas of middle Paleozoic limestone were discovered near Gertrude Creek, km north of Becharof Lake on the
      Alaska Peninsula, during reconnaissance flying as part of the Alaska Mineral Resource Assessment Program (AMRAP) for
      the Alaska Peninsula. Previously, the only known occurrence of Paleozoic rocks on the Alaska Peninsula was a small exposure
