    our article is on two theoretical questions: In what ways are smells suitable objects of aesthetic attention, and given
    that olfactory works are now an accepted part of the artworld, what are their special characteristics and limitations
    as serious art? This second question will lead to a final one concerning the art status of the most ancient of olfactory
    arts, perfume. II. THE PREJUDICE AGAINST SMELL As a first step in exploring these issues, we need to consider a longstanding
    philosophical prejudice against the so-called lower senses of smell, taste, and touch that has often led to the denial
    of their suitability for aesthetic reflection. From the ancient world into the twentieth century, majority opinion among
    philosophers has been that these senses are far beneath vision and hearing in dignity, intellectual power, and refinement.''1
    The classic philosophical application of this view to the aesthetic realm is Plato''s claim in Hippias Major that "beauty
    is the pleasant which comes through the senses of hearing and sight," whereas the pleasures of the other senses should
    not be called beautiful." Aristotle agreed on the superiority of sight and hearing, but also offered a more extensive
    and nuanced account of the senses.12 Although human taste, touch, and smell are sources of pleasure, not just of utility,
    the objects of the lower senses, for Aristotle, have no connection to moral qualities as do the pleasures of vision and
    hearing that are involved'
