- source_sentence: philosophical. It is a schematic, bare-bones biography devoting only minimal attention to the significance
    of Marx's thought. It makes no attempt at textual exegesis beyond citations of a few " classic" passages, let alone at
    critical evaluation or interpretation of Marx's ideas. Yet its extremely readable style, richness of detail and highly
    useful manner of viewing Marx's life against the political history of his era, makes this book a service to the general
    public if not to the philosopher or Marxologist. (It should hardly need saying that Rubel is himself one of the world's
    eminent practicioners of the latter art.) Each chapter is devoted to six or seven years of Marx's life. Preceding each,
    the authors have included very valuable chronological tables listing major political events in Europe, the Americas and
    Asia, scientific and technological advances, and important works published (including notation as to whether Marx is known
    to have read them). The short biographies of various persons important to the life story of Marx and bibliographies of
    Marx's works and of works on Marx are also helpful. Rubel and Manale's understanding of Marx's intellectual development,
    as a unity originating in the mid1840s carried through consistently for the remainder of his life, is well documented,
    with due emphasis given the manuscripts of 1857-58 (the "Grundrisse") documenting the link between the Paris manuscripts
    of 1844 and Capital so often disputed by Marxist-Leninist apologists. Because of its greater interest to philosophers,
    I shall devote the rest of this review to Axelos'
