- source_sentence: really know what I have to face? Has she felt anything like this set of forces on her road to holiness?
    More to our point here, what does this saint, Vincent de Paul, know of business of the push and pull and particular grind
    of this world? Granting the depth and richness of his spiritual experience, was it shaped, at least analogously, by the
    kinds of pressures which the business person has to withstand? Does his path to holiness go through anything like the
    terrain of the modern business climate? If not, this saint's story, too, lifts off from this world and flies into its
    own orbit, perhaps admired but from too remote a distance to have influence. In short, what are the possi bilities of
    getting the two worlds together? The second issue concerns the manner in which lives of exemplars have been brought to
    bear upon moral thinking. One method might be termed prescriptive. It asks what directives for living can be drawn from
    the actions and atti tudes this person showed? There are principles and behavior patterns embedded in this saint's life
    which can serve as guides for present action. Francis of Assisi, for instance, out of a profound desire live out his sense
    of total dependence on God, made his way by begging. Therefore, there should be some embracing of radical unpre dictability
    and a large dose of reliance on others in our affairs also. The example is awkward perhaps, but it points up the method
    of drawing relatively clear moral lessons from
  sentences:
  - the holy one's life. While this approach affords a kind of clarity, it stands on shaky ground because of the often times
    wide gap between the saint's era and the present. The historically consciousness reader is wary of clear and simple crossovers.
    Too many changed circumstances and new assumptions lie in the valley between the distant past and now. If the moral directives
    have not been carefully passed through the screen of shifting horizons, they appear stretched and even fanciful. Applica
    tions to current situations are suspected of being as much a projection of the interpreter's agenda as it is a transmission
    of the saint's morality. An alternate way of bringing saints to bear on moral thinking is through the imagination. Most
    readers are familiar with recent attention to the role affect plays in following the good. Logic may package norms clearly
    and distinctly, but of itself does not bring about adherence. The deeper emotions must come into play as the engines which
    drive toward the good. Ethical reckoning happens primordially in the imagination where the attraction or repulsion of
    a given value registers. On a foundation level, moral education aims for the affect. It works to shape the image field
    in which the good is pictured. The rightly-told story of a saint appeals directly to the imagination. The narrative of
    his or her life presents a drama which invites in the listener much more as participant than spectator. Such a biography
    lays
