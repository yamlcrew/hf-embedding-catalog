- source_sentence: between stuffs and things is complex and highly controversial, but it can be roughly understood as the
    distinction prevailing between objects and their constituting matter. Statues, tables, and trees are paradigmatic examples
    of objects, whereas copper, water, and wood are paradigmatic examples of stuffs. Objects and stuffs differ in many respects.
    For example, unlike individual things, stuffs persist despite division and transformation. If a statue made of bronze
    is melted to obtain two bronze cups, the statue disappears whereas the bronze persists. I will argue that olfactory perception
    involves being acquainted with stuffs rather than particular objects and that the notion of stuff is essential for understanding
    the idiosyncratic characteristics of olfaction. The argument will proceed as follows. In the first part, I will give a
    short inventory of olfactory experiences. In the second part, I will show how most philosophical accounts fail to do justice
    to the phenomenology of olfactory experiences. In the last part, I will argue that olfactory experiences present compelling
    evidence that odors are properties of stuffs. 2 A world of odors Unlike colors, and to a lesser extent sounds, odors and
    olfaction have received little attention from philosophers. In philosophy, odors are sometimes mentioned to illustrate
    the distinction between primary and secondary qualities (Locke 1690) or to exemplify the category of "sense-data" (Russell
    1912) or "qualia" (Campbell 2004; Jackson 1982), but they are rarely considered for their own
