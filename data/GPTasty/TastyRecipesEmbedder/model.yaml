  sentences:
  - 'NAME: Hearty White Bean Bake


    CATEGORY: Beans


    KEYWORDS: < 60 Mins, Easy, Inexpensive, One-Pot


    TOOLS: pan


    INGREDIENTS: ground turkey, poblano pepper, shallot, maple syrup, apple cider vinegar, chili sauce, smoked paprika, cannellini
    beans


    INSTRUCTIONS:

    Cook the poblano pepper and shallot with the ground turkey until the turkey is browned. Drain any excess grease.

    In the same pan, combine the cooked turkey mixture with maple syrup, apple cider vinegar, chili sauce, smoked paprika,
    and cannellini beans.

    Mix well and bake in the oven for 25 minutes, or until heated through and bubbly.'
  - 'NAME: Spicy Southwest Seasoning Mix

    CATEGORY: < 15 Mins

    KEYWORDS: No Cook, Easy, Spice Mix

    TOOLS: Small jar

    INGREDIENTS: onion powder, chili powder, smoked paprika, seasoning salt, cayenne pepper, black pepper

    INSTRUCTIONS: Add all ingredients into a small jar. Secure the lid tightly. Shake well until thoroughly combined.'
  - 'NAME: Rosé Sangria


    CATEGORY: Beverages


    KEYWORDS: Citrus, Berries, < 4 Hours, Easy, Refreshing


    TOOLS: large punch bowl, wooden spoon


    INGREDIENTS: limes, raspberries, sugar, rosé wine, brandy, strawberry slices


    INSTRUCTIONS:

    Place lime slices and raspberries in a large punch bowl.

    Pour sugar over slices and berries and with a wooden spoon lightly mash together until sugar dissolves and the fruit begins
    to break down.

    Stir in rosé wine and brandy.

    Add strawberry slices.

    Refrigerate at least 2 hours or up to 10.

    Add ice cubes and sparkling water just before serving.'
- source_sentence: "NAME: Pink Banana Bread\n\nCATEGORY: Quick Breads\n\nKEYWORDS: Breads, Pineapple, Tropical Fruits, Fruit,\
    \ Healthy, < 4 Hours, Easy\n\nTOOLS: grease bread pan, oven\n\nINGREDIENTS: yogurt, sugar, crushed pineapple, eggs, flour,\
    \ baking soda, baking powder, salt, bananas, pecans\n\nINSTRUCTIONS: \nMix yogurt, sugar, crushed pineapple, eggs, flour,\
    \ baking soda, baking powder, salt, grenadine, bananas, and pecans together.\nGrease bread pan.\nBake at 375 degrees Fahrenheit\
    \ for 60 minutes or until done."
  sentences:
  - 'NAME: Lemon-Herb Baked Cod


    CATEGORY: Tilapia


    KEYWORDS: Healthy, High Protein, Quick, Baked, Lemon, < 45 Mins


    TOOLS: spoon, baking dish, oven, zester


    INGREDIENTS: olive oil, lemon juice, lemon zest, garlic cloves, dried oregano, dried thyme, cod fillets, salt, black pepper


    INSTRUCTIONS: Preheat oven to 400°F (200°C).

    In a small bowl, combine olive oil, lemon juice, lemon zest, minced garlic, oregano, thyme, salt, and pepper.

    Place cod fillets in a baking dish.

    Spoon the lemon-herb mixture over the cod, ensuring each fillet is well coated.

    Bake for 12-15 minutes, or until the cod is opaque and flakes easily with a fork.

    Check for doneness by flaking with a fork.

    Serve immediately.'
  - 'NAME: Fluffy Maple Buttercream Frosting

    CATEGORY: Dessert

    KEYWORDS: Low Protein, Kid Friendly, Sweet, Mixer, < 15 Mins, Beginner Cook, Small Appliance, Easy, Maple

    TOOLS: mixer, bowl

    INGREDIENTS: vegetable shortening, brown butter, maple extract, confectioners'' sugar, milk

    INSTRUCTIONS: In a bowl, use a mixer to beat the vegetable shortening with the browned butter and maple extract until
    light and creamy. Gradually add in the confectioners'' sugar, beating on low speed until combined, then increase speed
    and beat until fluffy. If needed, add milk, one tablespoon at a time, to reach the desired consistency. Add a pinch of
    cinnamon if using.'
  - 'NAME: Mango Coconut Bread


    CATEGORY: Quick Breads


    KEYWORDS: Breads, Mango, Tropical Fruits, Fruit, Healthy, < 4 Hours, Easy, Gluten-Free


    TOOLS: grease bread pan, oven, mixing bowl


    INGREDIENTS: Greek yogurt, coconut sugar, shredded coconut, eggs, almond flour, baking soda, baking powder, salt, mangos,
    macadamia nuts, lime zest


    INSTRUCTIONS:

    Preheat oven to 375 degrees Fahrenheit.

    In a large mixing bowl, combine Greek yogurt, coconut sugar, shredded coconut, eggs, almond flour, baking soda, baking
    powder, salt, and lime zest. Mix well.

    Fold in diced mangos and chopped macadamia nuts.

    Grease bread pan.

    Pour batter into the prepared bread pan.

    Bake for 55-65 minutes, or until a toothpick inserted into the center comes out clean.

    Let cool in the pan for 10 minutes before transferring to a wire rack to cool completely.'
- source_sentence: "NAME: Layered  Zucchini &amp; Yellow Squash Casserole\n\nCATEGORY: Vegetable\n\nKEYWORDS: Low Protein,\
    \ Low Cholesterol, Summer, < 60 Mins, Oven\n\nTOOLS: oven, baking pan\n\nINGREDIENTS: zucchini, onion, green bell pepper,\
    \ fresh mushrooms, tomatoes, butter, parmesan cheese\n\nINSTRUCTIONS: \nLightly grease an 8 inch square baking pan (or\
    \ spray with Pam).\nLayer the vegetables in the order listed, sprinkling each layer with salt and pepper as desired.\n\
    Dot the top with butter, and sprinkle with Parmesan cheese.\nBake at 350F for 35 minutes or until crisp-tender."
  sentences:
  - 'NAME: Rustic Spelt Bread


    CATEGORY: Yeast Breads


    KEYWORDS: Breads, Grains, Swiss, European, Low Cholesterol, Healthy, Small Appliance, < 4 Hours, Easy, Spelt


    TOOLS: bowl, sharp knife, oven, electric mixer, baking sheet


    INGREDIENTS: spelt flour, whole wheat flour, salt, dry yeast, warm water, milk, olive oil


    INSTRUCTIONS:

    Combine the spelt flour, whole wheat flour, and salt in a large bowl. Add the dry yeast.

    Pour in the warm water, milk, and olive oil. Mix using an electric mixer with a dough hook until the dough forms a fairly
    firm ball and cleans the sides of the bowl.

    Let the dough rise in a warm place until it has doubled in size.

    Preheat the oven to 400°F.

    Shape the dough into a round loaf on a prepared baking sheet. Cover with a damp cloth, and allow to rest for about 20
    minutes for a second rise.

    Use a sharp knife to score the top of the loaf with a simple cross pattern. Bake for 35 to 40 minutes, or until the crust
    is golden brown and the loaf sounds hollow when tapped.'
  - 'NAME: Layered Eggplant & Bell Pepper Casserole


    CATEGORY: Vegetable


    KEYWORDS: Low Protein, Low Cholesterol, Summer, < 60 Mins, Oven, Vegetarian


    TOOLS: oven, baking pan


    INGREDIENTS: eggplant, red onion, yellow bell pepper, fresh cremini mushrooms, diced tomatoes, olive oil, mozzarella cheese


    INSTRUCTIONS: Lightly grease an 8 inch square baking pan (or spray with cooking spray). Layer the vegetables in the order
    listed, sprinkling each layer with salt, pepper, and a pinch of dried oregano as desired. Drizzle the top with olive oil,
    and sprinkle with mozzarella cheese. Bake at 350F for 40 minutes or until the vegetables are tender and the cheese is
    melted and lightly browned.'
  - 'NAME: Turkey Spinach Orzo Skillet


    CATEGORY: One Dish Meal


    KEYWORDS: Turkey, Poultry, Meat, Low Cholesterol, Healthy, < 45 Mins, Stove Top, Quick


    TOOLS: large skillet


    INGREDIENTS: olive oil, butter, water, ground turkey, frozen spinach, sun-dried tomatoes, dried oregano, feta cheese,
    orzo pasta


    INSTRUCTIONS: In large skillet, saute orzo pasta in olive oil until lightly toasted over medium heat. Stir in water and
    oregano; bring to a boil over high heat. Cover; reduce heat to low. Simmer 8 minutes. Stir in spinach, ground turkey,
    and sun-dried tomatoes. Cover, simmer 5 to 7 minutes or until most of liquid is absorbed and turkey is cooked through.
    Crumble feta cheese over the top.'
- source_sentence: "NAME: Easy Basalmic Vinaigrette\n\nCATEGORY: Salad Dressings\n\nKEYWORDS: < 15 Mins, Easy\n\nTOOLS: \n\
    \nINGREDIENTS: extra virgin olive oil, Dijon mustard, dried basil, salt, fresh ground pepper\n\nINSTRUCTIONS: \nPlace\
