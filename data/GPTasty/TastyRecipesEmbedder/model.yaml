- source_sentence: "NAME: Baked Beans\n\nCATEGORY: Beans\n\nKEYWORDS: < 60 Mins, Easy, Inexpensive\n\nTOOLS: pan\n\nINGREDIENTS:\
    \ ground beef, bell pepper, onion, brown sugar, lemon juice, ketchup, barbecue sauce\n\nINSTRUCTIONS: \nCook you bell\
