  sentences:
  - 'NAME: Savory Turkey Loaf


    CATEGORY: One Dish Meal


    KEYWORDS: Meat, Weeknight, < 4 Hours, Inexpensive, Easy


    TOOLS: bread pan, oven, large bowl, turkey bowl


    INGREDIENTS: ground turkey, onions, bell pepper, garlic powder, salt, egg, bread crumbs, Worcestershire sauce


    INSTRUCTIONS:

    Preheat oven to 375 degrees F.

    Finely dice the onions and bell pepper. In a large bowl, combine ground turkey, diced onions, diced bell pepper, salt,
    garlic powder, and a dash of Worcestershire sauce. Mix thoroughly with your hands until well combined. Add bread crumbs
    to the mixture and combine again using your hands. Incorporate the egg, mixing until evenly distributed.

    Press the mixture firmly into a bread pan.

    Bake for 50-60 minutes, or until the internal temperature reaches 165 degrees F. Let stand for 10 minutes before slicing
    and serving.'
  - 'NAME: Smoked Salmon Spread


    CATEGORY: Spreads


    KEYWORDS: Salmon, < 4 Hours, Easy, Smoked, Appetizer


    TOOLS:


    INGREDIENTS: cream cheese, mayonnaise, dill


    INSTRUCTIONS:

    Combine the cream cheese and mayonnaise.

    Mix well, and chill for 2 hours.

    Garnish with fresh dill before serving with crackers, bagel chips, or vegetables.'
  - 'NAME: Simple Lemon Herb Vinaigrette

    CATEGORY: Salad Dressings

    KEYWORDS: < 15 Mins, Easy, Fresh

    TOOLS: 20 ounce reusable water bottle

    INGREDIENTS: extra virgin olive oil, honey Dijon mustard, dried oregano, salt, fresh ground pepper, lemon juice

    INSTRUCTIONS: Place all ingredients in a 20 ounce reusable water bottle. Shake vigorously until combined. Let stand for
    5 minutes before serving to allow flavors to meld.'
- source_sentence: "NAME: Spinach with Raisins and Pine Nuts\n\nCATEGORY: Fruit\n\nKEYWORDS: Vegetable, Nuts, Low Cholesterol,\
    \ Healthy, < 30 Mins, Stove Top\n\nTOOLS: grill, pot\n\nINGREDIENTS: fresh spinach, pine nuts, salt, raisins, olive oil,\
    \ lemon juice\n\nINSTRUCTIONS: \nClean the spinach thoroughly.\nGrill the pine nuts until golden brown, watching carefully\
    \ so as not to burn.\nBring a pot of salted water to the boil and toss in raisins and spinach.\nDrain as soon as spinach\
    \ goes limp.\ntoss in olive oil and lemon juice, and scatter with the grilled pine nuts."
  sentences:
  - 'NAME: Dried Apricots with Pistachios and Almonds


    CATEGORY: Fruit


    KEYWORDS: Dried Fruit, Nuts, Low Cholesterol, Healthy, < 30 Mins, Stove Top, Vegan


    TOOLS: grill, pot


    INGREDIENTS: dried apricots, pistachios, salt, slivered almonds, olive oil, orange juice


    INSTRUCTIONS:

    Soak the dried apricots in warm water for 10 minutes to soften them.

    Grill the pistachios until lightly toasted, being careful not to burn them.

    Bring a pot of salted water to the boil and add the softened apricots.

    Drain immediately after the apricots plump up slightly.

    Toss with olive oil and orange juice, then sprinkle with the grilled pistachios and slivered almonds.'
  - 'NAME: Smoky Chipotle Turkey Meatloaf


    CATEGORY: Meat


    KEYWORDS: < 60 Mins, Spicy, Oven, Comfort Food


    TOOLS: frying pan, meat thermometer, oven, loaf pan


    INGREDIENTS: bacon, yellow onion, green bell pepper, chipotle powder, garlic powder, dried oregano, salt, ground mustard,
    smoked paprika, chili powder, tomato paste, chicken broth, eggs, ground turkey


    INSTRUCTIONS:

    Preheat oven to 425 degrees.

    Cook bacon in frying pan, remove, drain, and chop.

    Leave drippings in pan and saute (but do not brown) onion and green pepper.

    Add chipotle powder, garlic powder, oregano, salt, mustard, smoked paprika, and chili powder.

    Cook for 8 minutes.

    Remove pan from heat and add tomato paste and chicken broth.

    Mix bread crumbs with eggs and add to ground turkey.

    Add spice mixture and bacon to turkey mixture and mix gently.

    Place mixture in two or three 8 x 4 inch individual loaf pans.

    Cook until done, about 35 to 45 minutes, or until internal temperature reaches 165 degrees on a meat thermometer.

    Let rest for 10 minutes before slicing.'
  - 'NAME: Buttermilk Corn Fritters


    CATEGORY: Breads


    KEYWORDS: Healthy, Spicy, < 60 Mins, Deep Fried, Corn


    TOOLS: pan, mixing bowl, slotted spoon


    INGREDIENTS: yellow cornmeal, gluten-free flour blend, baking powder, brown sugar, salt, eggs, buttermilk, scallions,
    cheddar cheese


    INSTRUCTIONS: In a mixing bowl, combine cornmeal, flour, baking powder, brown sugar, and salt; mix well. Add eggs, buttermilk,
    chopped scallions, and shredded cheddar cheese; stir until just combined. Heat 1-inch of oil to 365°F in a pan. Carefully
    drop spoonfuls of batter into the hot oil, cooking in batches to avoid overcrowding. Fry fritters for 2-3 minutes, flipping
    halfway through, until golden brown and cooked through. Remove fritters with a slotted spoon and place on paper towel-lined
    plates to drain excess oil. Serve immediately.'
