      on circulating inflammatory markers and gene expression in peripheral blood mononuclear cells (PBMC) to elucidate the
      role of fat quality on postprandial inflammation. A postprandial study with fourteen healthy females consuming three
      test meals with different fat quality was performed. Test days were separated by 2 weeks. Fasting and postprandial blood
      samples at 3 and 6 h after intake were analysed. The test meal consisted of three cakes enriched with coconut fat (43 %
      energy as saturated fat and 1 % energy as α-linolenic acid (ALA)), linseed oil (14 % energy as ALA and 30 % energy as
      saturated fat) and cod liver oil (5 % energy as EPA and DHA and 5 % energy as ALA in addition to 31 % energy as saturated
      fat). In addition, ex vivo PBMC experiments were performed in eight healthy subjects investigating the effects of EPA
      and ALA on release and gene expression of inflammatory markers. The IL-8 mRNA level was significantly increased after
      intake of the cod liver oil cake at 6 h compared with fasting level, which was significantly different from the effect
      observed after the intake of linseed cake. In contrast, no effect was seen on circulating level of IL-8. In addition,
      ALA and EPA were shown to elicit different effects on the release and mRNA expression levels of inflammatory markers
      in PBMC cultured ex vivo, with EPA having the most prominent pro-inflammatory potential.'
    - 'passage: Urticaria affects nearly 25% of the population at some time in their lives. In a subset of children, urticaria
      will develop into a chronic condition that can greatly affect quality of life. Although numerous causes and triggers
      are proposed for chronic urticaria (CU) in children, ranging from infections, allergens, and medications to physical
      factors and autoimmune disease, the exact etiology is not always identifiable. Accordingly, a large subset of cases
      are designated "chronic idiopathic urticaria." Because of the clinical complexities of CU, as well as the confusing
      literature on this topic, we have developed a conceptual framework based on the cumulative evidence to assist with the
      categorization, clinical evaluation, and treatment of CU in children. © 2011 Wiley Periodicals, Inc.'
    - 'passage: PURPOSE: To determine the effects of therapy with Urtica dioica for symptomatic relief of lower urinary tract
      symptoms (LUTS) secondary to benign prostatic hyperplasia (BPH). MATERIAL AND METHODS: A 6-month, double-blind, placebo-controlled,
      randomized, partial crossover, comparative trial of Urtica dioica with placebo in 620 patients was conducted. Patients
      were evaluated using the International Prostate Symptom Score (IPSS), the maximum urinary flow rate (Qmax), postvoid
      residual urine volume (PVR), Serum Prostatic- Specific Antigen (PSA), testosterone levels, and prostate size. At the
      end of 6-month trial, unblinding revealed that patients who initially received the placebo were switched to Urtica dioica.
      Both groups continued the medication up to 18 months. RESULTS: 558 patients (90%) completed the study (287/305, 91%
      in the Urtica dioica group, and 271/315, 86% in the placebo group). By intention- to-treat analysis, at the end of 6-month
      trial, 232 (81%) of 287 patients in the Urtica dioica group reported improved LUTS compared with 43 (16%) of 271 patients
      in the placebo group (P < 0.001). Both IPSS and Qmax showed greater improvement with drug than with placebo. The IPSS
      went from 19.8 down to 11.8 with Urtica dioica and from 19.2 to 17.7 with placebo (P = 0.002). Peak flow rates improved
      by 3.4 mL/s for placebo recipients and by 8.2 mL/s for treated patients (P < 0.05). In Urtica dioica group, PVR decreased
      from an initial value of 73 to 36 mL (P < 0.05). No appreciable change was seen in the placebo group. Serum PSA and
      testosterone levels were unchanged in both groups. A modest decrease in prostate size as measured by transrectal ultrasonography
      (TRUS) was seen in Urtica dioica group (from 40.1 cc initially to 36.3 cc; P < 0.001). There was no change in the prostate
      volume at the end of study with placebo. At 18-month follow-up, only patients who continued therapy, had a favorable
      treatment variables value. No side effects were identified in either group. CONCLUSION: In the present study, Urtica
      dioica have beneficial effects in the treatment of symptomatic BPH. Further clinical trials should be conducted to confirm
      these results before concluding that Urtica dioica is effective.'
  - source_sentence: 'query: Does Consuming Fat Reduce Muscle Sugar Uptake?'
    sentences:
    - 'passage: Rat muscle studies suggest competition between free fatty acids (FFA) and glucose for oxidation, resulting
      in glucose-6-phosphate accumulation. However, FFA decrease glucose-6-phosphate in human skeletal muscle, indicating
      direct inhibition of glucose transport/phosphorylation. This mechanism could redirect glucose from muscle to brain during
      fasting and explain the insulin resistance associated with high-lipid diets and obesity.'
    - 'passage: Antidepressants are supposed to work by fixing a chemical imbalance, specifically, a lack of serotonin in
      the brain. Indeed, their supposed effectiveness is the primary evidence for the chemical imbalance theory. But analyses
      of the published data and the unpublished data that were hidden by drug companies reveals that most (if not all) of
      the benefits are due to the placebo effect. Some antidepressants increase serotonin levels, some decrease it, and some
      have no effect at all on serotonin. Nevertheless, they all show the same therapeutic benefit. Even the small statistical
      difference between antidepressants and placebos may be an enhanced placebo effect, due to the fact that most patients
      and doctors in clinical trials successfully break blind. The serotonin theory is as close as any theory in the history
      of science to having been proved wrong. Instead of curing depression, popular antidepressants may induce a biological
      vulnerability making people more likely to become depressed in the future.'
    - 'passage: STUDY QUESTION Is increased consumption of dairy foods associated with lower semen quality? SUMMARY ANSWER
      We found that intake of full-fat dairy was inversely related to sperm motility and morphology. These associations were
      driven primarily by intake of cheese and were independent of overall dietary patterns. WHAT IS KNOWN ALREADY It has
      been suggested that environmental estrogens could be responsible for the putative secular decline in sperm counts. Dairy
      foods contain large amounts of estrogens. While some studies have suggested dairy as a possible contributing factor
      for decreased semen quality, this finding has not been consistent across studies. STUDY DESIGN, SIZE, DURATION The Rochester
      Young Men''s Study (n = 189) was a cross-sectional study conducted between 2009 and 2010 at the University of Rochester.
      PARTICIPANTS/MATERIALS, SETTING, METHODS Men aged 18–22 years were included in this analysis. Diet was assessed via
      food frequency questionnaire. Linear regression was used to analyze the relation between dairy intake and conventional
      semen quality parameters (total sperm count, sperm concentration, progressive motility, morphology and ejaculate volume)
      adjusting for age, abstinence time, race, smoking status, body mass index, recruitment period, moderate-to-intense exercise,
      TV watching and total calorie intake. MAIN RESULTS AND THE ROLE OF CHANCE Total dairy food intake was inversely related
      to sperm morphology (P-trend = 0.004). This association was mostly driven by intake of full-fat dairy foods. The adjusted
      difference (95% confidence interval) in normal sperm morphology percent was −3.2% (−4.5 to −1.8) between men in the
      upper half and those in the lower half of full-fat dairy intake (P < 0.0001), while the equivalent contrast for low-fat
      dairy intake was less pronounced [−1.3% (−2.7 to −0.07; P= 0.06)]. Full-fat dairy intake was also associated with significantly
      lower percent progressively motile sperm (P= 0.05). LIMITATIONS, REASONS FOR CAUTION As it was a cross-sectional study,
      causal inference is limited. WIDER IMPLICATIONS OF THE FINDINGS Further research is needed to prove a causal link between
      a high consumption of full-fat dairy foods and detrimental effects on semen quality. If verified our findings would
      mean that intake of full-fat dairy foods should be considered in attempts to explain secular trends in semen quality
      and that men trying to have children should restrict their intake. STUDY FUNDING/COMPETING INTEREST(S) European Union
      Seventh Framework Program (Environment), ‘Developmental Effects of Environment on Reproductive Health’ (DEER) grant
      212844. Grant P30 {"type":"entrez-nucleotide","attrs":{"text":"DK046200","term_id":"187635970","term_text":"DK046200"}}DK046200
      and Ruth L. Kirschstein National Research Service Award T32 DK007703-16 from the National Institutes of Health. None
      of the authors has any conflicts of interest to declare.'
  - source_sentence: 'query: What Causes Hemorrhoids?'
    sentences:
    - 'passage: Background Caffeine consumption has been associated with a reduced risk of Parkinson disease. The association
      is strong and consistent in men, but uncertain in women, possibly because of an interaction with hormone replacement
      therapy. We sought to confirm these findings using data on Parkinson disease incidence in the CPS II Nutrition Cohort,
      a large prospective study of men and women. Methods We conducted a prospective study of caffeine intake and risk of
      PD within the Cancer Prevention Study II Nutrition Cohort. Intakes of coffee and other sources of caffeine were assessed
      at baseline. Incident cases of PD (n = 317; 197 men and 120 women) were confirmed by treating physicians and medical
      record review. Relative risks (RR) were estimated using proportional hazards models, adjusting for age, smoking and
      alcohol consumption. Results After adjustment for age, smoking and alcohol intake, high caffeine consumption was associated
      with a reduced risk of PD. The relative risk comparing the 5th to the 1st quintile of caffeine intake was 0.43 (CI:
      0.26, 0.71, p-trend = <0.002) in men, and 0.61 (95% CI: 0.34, 1.09; p for trend =0.05) in women. Among women, this association
      was stronger among never users of hormone replacement therapy (RR=0.32) than among ever users (RR=0.81, p-interaction
      = 0.15). Consumption of decaffeinated coffee was not associated with PD risk. Conclusion Findings from this large prospective
      study of men and women are consistent with a protective effect of caffeine intake on PD incidence, with an attenuating
      influence of hormone replacement therapy in women.'
    - 'passage: The present studies explored whether faecal retention in the colon is a causative factor in functional bowel
      disease, appendicitis, and haemorrhoids. Faecal retention was characterized by colon transit time (CTT) after radio-opaque
      marker ingestion and estimation of faecal loading on abdominal radiographs at 48 h and 96 h. Specific hypotheses were
      tested in patients (n = 251 plus 281) and in healthy random controls (n = 44). A questionnaire was completed for each
      patient, covering abdominal and anorectal symptoms and without a priori grouping. Patients with functional bowel disorders,
      predominantly women, had a significantly increased CTT and faecal load compared to controls. The CTT was significantly
      and positively correlated with segmental and total faecal loading. The faecal load was equal at 48 h and 96 h, mirroring
      the presence of permanent faecal reservoirs. In these first clinical studies to correlate bowel symptoms with CTT and
      colon faecal loading, abdominal bloating was significantly correlated with faecal loading in the right colon, total
      faecal load, and CTT. Abdominal pain was significantly and positively correlated to distal faecal loading and significantly
      associated with bloating. A new phenomenon with a high faecal load and a normal CTT was observed in a subset of patients
      (n = 90), proving faecal retention as hidden constipation. The CTT and faecal load were significantly higher in the
      right-side compared to the left and distal segments. Within the control group of healthy persons, the right-sided faecal
      load was significantly greater than the left and distal load. The CTT and faecal load significantly positively correlated
      with a palpable mass in the left iliac fossa and meteorism. Cluster analysis revealed that CTT and faecal load positively
      correlated with a symptom factor consisting of bloating, proctalgia and infrequent defecation of solid faeces. On the
      other hand, CTT and faecal load negatively correlated with a symptom factor comprising frequent easy defecations, repetitiveness,
      and incompleteness with solid or liquid faeces. The majority of patients with a heavy faecal load but normal CTT had
      repetitive daily defecation, mostly with ease and with altering faecal consistence. Flue-like episodes co-existed in
      symptom factors with abdominal pain and meteorism, and these symptoms together with a palpable right iliac fossa mass
      and tenderness, and in other factors with seldom and difficult defecation, and with epigastric discomfort and halitosis.
      Patients with seldom and difficult defecation of solid faeces experienced abdominal pain significantly more often and
      presented a palpable mass in the right iliac fossa with tenderness and meteorism. The CTT was significantly prolonged
      and faecal load significantly increased. In patients with a normal CTT and increased faecal load, only patients with
      abdominal pain had a significant correlation between faecal loading and bloating. CTT and faecal load were shown for
      the first time to increase significantly with the number of colonic redundancies (colon length), which also resulted
      in significantly increased bloating and pain. Intervention with a bowel stimulation regimen combining a fibre-rich diet,
      fluid, physical activity, and a prokinetic drug was essential to proving that abdominal symptoms and defecation disorders
      are caused by faecal retention, with or without a prolonged CTT. The CTT was significantly reduced, as was faecal load.
      Bloating and pain were reduced significantly. The defecation became easy with solid faeces, towards one per day and
      with significant reductions in incompleteness and repetitiveness. Proctalgia and flue-like episodes were significantly
      reduced. The intervention significantly reduced the presence of a tender palpable mass in the right fossa and rectal
      constipation. In patients with a normal CTT but increased faecal load, the intervention did not significantly change
      the CTT or load, but bloating and pain were significantly reduced, just as defecation improved overall. The novel knowledge
      of faecal retention in the patients does not explain why faecal retention occurs. However, it may be inferred from the
      present results that a constipated or irritable bowel may belong to the same underlying disease dimension, where faecal
      retention is a common factor. Thus, measuring CTT and faecal load is suggested as a guide to a positive functional diagnosis
      of bowel disorders compared to the constellation of symptoms alone. Thirty-five patients underwent surgery after being
      refractory to the conservative treatment for constipation. They had a significantly prolonged CTT and heavy faecal loading,
      which was responsible for the aggravated abdominal and defaecatory symptoms. The operated patients presented with a
      redundant colon (dolichocolon) significantly more often. These patients also had an extremely high rate of previous
      appendectomy. Twenty-one patients underwent hemicolectomy, and 11 patients had a subtotal colectomy with an ileosigmoidal
      anastomosis; three patients received a stoma. However, some patients had to have the initial segmental colectomy converted
      to a final subtotal colectomy because of persisting symptoms. Six more subtotal colectomies have been performed and
      the leakage rate of all colectomies is then 4.9 % (one patient died). After a mean follow-up of 5 years, the vast majority
      of patients were without abdominal pain and bloating, having two to four defecations daily with control and their quality
      of life had increased considerably. A faecalith is often located in the appendix, the occlusion of which is responsible
      for many cases of acute appendicitis, which is infrequent in all except white populations. An effort to trace the origin
      of the faecalith to faecal retention in the colon was made in a case control study (56 patients and 44 random controls).
      The CTT was longer and faecal load greater in patients with appendicitis compared to controls, though the difference
      was not significant. Power calculations showed that more patients were needed to reach statistical significance for
      these parameters. The presence of a faecalith was most often associated with a gangrenous or perforated appendix. No
      significant differences were found between the CTT and faecal load of patients who had or did not have a faecalith.
      However, the right-sided faecal load was significantly higher than the left and distal load. Haemorrhoids are often
      a consequence of constipation and defaecatory disorders and were found in every second patient with functional bowel
      disorders. The present studies are the first Danish reports of a novel operation to cure this disease, stapled haemorrhoidopexy
      (n = 40 and 258 patients). The majority of patients had prolapsed haemorrhoids, and the durability of procedure was
      confirmed with a follow-up of up to 5 years, meaning a normal anus. The operation time was short, post-operative pain
      was low, and recovery was rapid. No incontinence was observed, and patient satisfaction was high and significantly correlated
      with the appearance of a normal anus without prolapse. The cumulative risk of re-operation was greatest in the first
      2 years after the stapled haemorrhoidopexy. Patients with persisting haemorrhoidal prolapse had the procedure repeated
      with results as good as those obtained in the rest of the patients. It was shown in a statistical model that the preoperative
      severity of haemorrhoidal disease and the immediate postoperative result contributed significantly to predicting the
      outcome that is the durability of the operation. The most frequent post-operative complication was bleeding requiring
      surgical haemostasis. One serious complication occurred after an anastomotic leak from a highly placed anastomosis,
      resulting in retro rectal, retro- and intra-peritoneal, and mediastinal gas. The patient recovered after conservative
      treatment and without surgical intervention. The stapling technique now used has revolutionized the surgical treatment
      of prolapsing haemorrhoids. Finally, a common cause may be suspected for diseases constantly associated with one another.
      Epidemiological evidence has recognized that constipation, diverticulosis and IBS increase the risk of colon cancer
      (and adenomas), diseases exceedingly rare in communities exempt from appendicitis. Haemorrhoids are a colonic co-morbidity
      as well. Notably, the patients with a functional bowel disorder had a much higher rate of a previous appendectomy than
      the background population. In addition, the patients who had previously had an appendectomy had a significantly longer
      CTT compared to patients, who had not. The data points to the involvement of faecal retention in the origin of faecaliths
      and, thus, acute appendicitis. Faecal reservoirs were shown in the right and left colon segments in both patients and
      controls, which are the same areas bearing the highest incidences of adenomateous polyps and malignancies. Familial
      colorectal cancer occurred significantly more often in patients who had a higher faecal load than the controls. Four
      malignancies and 25 adenomas were identified. An increased faecal load in the colon with or without delayed transit
      will increase bacterial counts and create a chronic inflammation of the colonic mucosa, which is a risk factor for cancer
      onset. A functional bowel disorder is then likely to occur with gradually transition from a primary functional disease
      into specific organic diseases. A diet rich in fibre and regular physical activity have a therapeutic and preventive
      effect on colorectal diseases associated with faecal retention.'
    - 'passage: The number of cancer cases caused by being obese is estimated to be 20% with the increased risk of malignancies
      being influenced by diet, weight change, and body fat distribution together with physical activity. Reports from the
      International Agency for Research into Cancer and the World Cancer Research Fund (WCRF) have shown that the strongest
      evidence exists for an association of obesity with the following cancer types: endometrial, esophageal adenocarcinoma,
      colorectal, postmenopausal breast, prostate, and renal, whereas the less common malignancies are leukemia, non-Hodgkin''s
      lymphoma, multiple myeloma, malignant melanoma, and thyroid tumours. To be able to develop novel methods in prevention
      and treatment, we first must understand the underlying processes which link cancer to obesity. Four main systems have
      been identified as potential producers of cancer in obesity: insulin, insulin-like growth factor-I, sex steroids, and
      adipokines. Various novel candidate mechanisms have been proposed: chronic inflammation, oxidative stress, crosstalk
      between tumour cells and surrounding adipocytes, migrating adipose stromal cells, obesity-induced hypoxia, shared genetic
      susceptibility, and the functional defeat of immune function. Herein, we review the major pathogenic links between obesity
      and susceptibility to cancer.'
  - source_sentence: 'query: What States Will Have the Highest Diabetes Rates in 2025?'
    sentences:
    - 'passage: Thirteen sites in each of 60 domestic kitchens were examined for Salmonella and Campylobacter spp. following
      the preparation of a chicken for cooking and the application of different hygiene regimes. During food preparation bacteria
      became widely disseminated to hand and food contact surfaces. Where cleaning was carried out with detergent and hot
      water using a prescribed routine there was no significant decrease in the frequency of contaminated surfaces. Where
      hypochlorite was used in addition, a significant reduction in the number of contaminated sites was observed. The study
      suggests that there is a need to better understand and promote effective hygiene procedures for the domestic kitchen.'
    - 'passage: Casomorphins are the most important during the first year of life, when postnatal formation is most active
      and milk is the main source of both nutritive and biologically active material for infants. This study was conducted
      on a total of 90 infants, of which 37 were fed with breast milk and 53 were fed with formula containing cow milk. The
      study has firstly indicated substances with immunoreactivity of human (irHCM) and bovine (irBCM) beta-casomorphins-7
      in blood plasma of naturally and artificially fed infants, respectively. irHCM and irBCM were detected both in the morning
      before feeding (basal level), and 3h after feeding. Elevation of irHCM and irBCM levels after feeding was detected mainly
      in infants in the first 3 months of life. Chromatographic characterization of the material with irBCM has demonstrated
      that it has the same molecular mass and polarity as synthetic bovine beta-casomorphin-7. The highest basal irHCM was
      observed in breast-fed infants with normal psychomotor development and muscle tone. In contrast, elevated basal irBCM
      was found in formula-fed infants showing delay in psychomotor development and heightened muscle tone. Among formula-fed
      infants with normal development, the rate of this parameter directly correlated to basal irBCM. The data indicate that
      breast feeding has an advantage over artificial feeding for infants'' development during the first year of life and
      support the hypothesis for deterioration of bovine casomorphin elimination as a risk factor for delay in psychomotor
      development and other diseases such as autism.'
    - 'passage: The incidence and prevalence of diabetes (primarily type 2 diabetes) has risen sharply since 1990. It is projected
      to increase another 64% between 2010 and 2025, affecting 53.1 million people and resulting in medical and societal costs
      of a half trillion dollars a year. We know how to prevent many cases of diabetes and how to treat it effectively. Early
      appropriate treatment makes a significant difference in preventing major complications and reducing premature death,
      but it does not cure the disease. Early detection of prediabetes, in conjunction with lifestyle changes, can reduce
      the number of people with diabetes. A dramatic reduction in diabetes prevalence over time will require significant lifestyle
      changes on the part of society as a whole. The purpose of this study is to increase public awareness of the severity
      of regional diabetes trends by providing detailed forecasts for all states and several metropolitan areas for 2010,
      2015, and 2025. A model was created to utilize the latest national diabetes and population data and projections, and
      to transform these into state and metropolitan area forecasts for the whole population and major subgroups. These forecasts
      were then summarized in easy-to-understand briefing papers for each state and selected metro areas, which are provided
      online for easy public access. This research is important because little data exist that project the future prevalence
      and potential costs of diabetes at the state and metro area level. With this data, key stakeholders can make informed
      decisions concerning diabetes, its impact on their communities, and resource allocation.'
