      selectively damages cells in the substantia nigra.'
    - 'passage: Hormones work in harmony in the body, and this status must be maintained to avoid metabolic disequilibrium
      and the subsequent illness. Besides, it has been reported that exogenous steroids (presence in the environment and food
      products) influence the development of several important illnesses in humans. Endogenous steroid hormones in food of
      animal origin are unavoidable as they occur naturally in these products. The presence of hormones in food has been connected
      with several human health problems. Bovine milk contains considerable quantities of hormones and it is of particular
      concern. A liquid chromatography-tandem mass spectrometry (LC-MS/MS) method, based on hydroxylamine derivatisation,
      has been developed and validated for the quantification of six sex hormones in milk [pregnenolone (P₅), progesterone
      (P₄), estrone (E₁), testosterone (T), androstenedione (A) and dehydroepiandrosterone (DHEA)]. This method has been applied
      to real raw milk samples and the existence of differences between milk from pregnant and non-pregnant cows has been
      statistically confirmed. Basing on a revision of existing published data, it could be concluded that maximum daily intakes
      for hormones are not reached through milk ingestion. Although dairy products are an important source of hormones, other
      products of animal origin must be considered as well for intake calculations.'
  - source_sentence: 'query: How Do Community Gardens Affect Eating Habits?'
    sentences:
    - 'passage: BACKGROUND: Clinical mood disorders often become clinically manifest in the later teenage years and early
      twenties and can be associated with a poor long-term prognosis. The primary prevention of these disorders would therefore
      have great public health value. Nutritional supplements are a feasible intervention for primary prevention and several
      epidemiological studies have indicated links between low folate status and depressive symptomatology in the general
      population. METHOD: A randomised, double blind, parallel group, placebo-controlled trial in which participants, aged
      14-24 years, at increased familial risk of mood disorder, were randomised to folic acid (2.5 mg daily) or identical
      placebo liquid for a maximum of 36 months. Primary outcome data (the onset of a DSM-IV mood disorder) were collected
      from 112 participants; 56 per group. RESULTS: The incidence of mood disorder in the folic acid and placebo groups were
      14.3% and 17.9% respectively, a non-significant difference. However, there was post-hoc evidence that folic acid delayed
      the time to onset of mood disorder in those participants who became unwell. LIMITATIONS: Small sample size and rate
      of onset of mood disorders lower than expected. CONCLUSIONS: Although long term folic acid supplementation was well
      tolerated, with high levels of adherence, there was no evidence that it reduced the incidence of mood disorder compared
      to those taking placebo. Copyright © 2014 Elsevier B.V. All rights reserved.'
    - 'passage: Objectives. We considered the relationship between an urban adult population''s fruit and vegetable consumption
      and several selected social and psychological processes, beneficial aesthetic experiences, and garden participation.
      Methods. We conducted a population-based survey representing 436 residents across 58 block groups in Denver, Colorado,
      from 2006 to 2007. We used multilevel statistical models to evaluate the survey data. Results. Neighborhood aesthetics,
      social involvement, and community garden participation were significantly associated with fruit and vegetable intake.
      Community gardeners consumed fruits and vegetables 5.7 times per day, compared with home gardeners (4.6 times per day)
      and nongardeners (3.9 times per day). Moreover, 56% of community gardeners met national recommendations to consume fruits
      and vegetables at least 5 times per day, compared with 37% of home gardeners and 25% of nongardeners. Conclusions. Our
      study results shed light on neighborhood processes that affect food-related behaviors and provides insights about the
      potential of community gardens to affect these behaviors. The qualities intrinsic to community gardens make them a unique
      intervention that can narrow the divide between people and the places where food is grown and increase local opportunities
      to eat better.'
    - 'passage: Our objective in this study was to determine the effects of a high-protein and high-potential renal acid load
      (PRAL) diet on calcium (Ca) absorption and retention and markers of bone metabolism. In a randomized crossover design,
      16 postmenopausal women consumed 2 diets: 1 with low protein and low PRAL (LPLP; total protein: 61 g/d; PRAL: -48 mEq/d)
      and 1 with high protein and high PRAL (HPHP; total protein: 118 g/d; PRAL: 33 mEq/d) for 7 wk each separated by a 1-wk
      break. Ca absorption was measured by whole body scintillation counting of radio-labeled (47)Ca. Compared with the LPLP
      diet, the HPHP diet increased participants'' serum IGF-I concentrations (P < 0.0001), decreased serum intact PTH concentrations
      (P < 0.001), and increased fractional (47)Ca absorption (mean ± pooled SD: 22.3 vs. 26.5 ± 5.4%; P < 0.05) and urinary
      Ca excretion (156 vs. 203 ± 63 mg/d; P = 0.005). The net difference between the amount of Ca absorbed and excreted in
      urine did not differ between 2 diet periods (55 vs. 28 ± 51 mg/d). The dietary treatments did not affect other markers
      of bone metabolism. In summary, a diet high in protein and PRAL increases the fractional absorption of dietary Ca, which
      partially compensates for increased urinary Ca, in postmenopausal women. The increased IGF-I and decreased PTH concentrations
      in serum, with no change in biomarkers of bone resorption or formation, indicate a high-protein diet has no adverse
      effects on bone health.'
  - source_sentence: 'query: Do I Have A Milk Allergy If I''m Allergic To Beef Or Pork?'
    sentences:
    - 'passage: OBJECTIVE: The purposes of this study were to examine milk allergic patients to determine concomitant reactivity
      between milk, beef, pork and cat and dog dander and other common inhalant allergens. METHODS: 19 patients were selected
      according to their Immuno-CAP results, which had increased Ig-E levels against milk, pork or beef. Patients were also
      tested against Johnson grass, short ragweed, cat/dog dander and d. farina. RESULTS: Pearson''s test revealed strong
      correlation between beef and pork, beef and milk, pork and milk Ig-E counts (consecutively r2 = 0.89, r2 = 0.81, r2
      = 0.60 and p < 0.01. All cat allergic patients also appeared to be allergic to either beef/pork meat or milk. The correlation
      between pork and dog dander Ig-E counts was also significant (r2 = 0.38, p < 0.01). No correlation detected between
      milk-meat-pet and grass-weed-dust allergies. DISCUSSION AND CONCLUSION: Patients who are known to have pet allergies
      may need to be screened for meat and milk allergy. Milk allergic patients may also need to avoid cows and pork meat.'
    - 'passage: BACKGROUND: Observational cohort studies and a secondary prevention trial have shown an inverse association
      between adherence to the Mediterranean diet and cardiovascular risk. We conducted a randomized trial of this diet pattern
      for the primary prevention of cardiovascular events. METHODS: In a multicenter trial in Spain, we randomly assigned
      participants who were at high cardiovascular risk, but with no cardiovascular disease at enrollment, to one of three
      diets: a Mediterranean diet supplemented with extra-virgin olive oil, a Mediterranean diet supplemented with mixed nuts,
      or a control diet (advice to reduce dietary fat). Participants received quarterly individual and group educational sessions
      and, depending on group assignment, free provision of extra-virgin olive oil, mixed nuts, or small nonfood gifts. The
      primary end point was the rate of major cardiovascular events (myocardial infarction, stroke, or death from cardiovascular
      causes). On the basis of the results of an interim analysis, the trial was stopped after a median follow-up of 4.8 years.
      RESULTS: A total of 7447 persons were enrolled (age range, 55 to 80 years); 57% were women. The two Mediterranean-diet
      groups had good adherence to the intervention, according to self-reported intake and biomarker analyses. A primary end-point
      event occurred in 288 participants. The multivariable-adjusted hazard ratios were 0.70 (95% confidence interval [CI],
      0.54 to 0.92) and 0.72 (95% CI, 0.54 to 0.96) for the group assigned to a Mediterranean diet with extra-virgin olive
      oil (96 events) and the group assigned to a Mediterranean diet with nuts (83 events), respectively, versus the control
      group (109 events). No diet-related adverse effects were reported. CONCLUSIONS: Among persons at high cardiovascular
      risk, a Mediterranean diet supplemented with extra-virgin olive oil or nuts reduced the incidence of major cardiovascular
      events. (Funded by the Spanish government''s Instituto de Salud Carlos III and others; Controlled-Trials.com number,
      ISRCTN35739639.).'
    - 'passage: The genetic alterations in colorectal cancer progression are determined by one of two separate and distinct
      underlying pathways of genomic instability. The first pathway, chromosomal instability, is characterized by allelic
      losses and aneuploidy. The second pathway, microsatellite instability, is characterized by an abundance of subtle DNA
      mutations and diploidy. Although the genes causing chromosomal instability remain unknown, microsatellite instability
      is caused by inactivation of a DNA mismatch repair gene (predominantly MLH1 or MSH2). Microsatellite instability is
      present in 15% of colorectal cancers, and is diagnosed by analysis of tumor DNA from paraffin blocks and by demonstration
      of loss of mismatch repair protein expression in cancers. In addition to the unique profile of genetic alterations,
      colorectal cancers with microsatellite instability have distinct pathologic features and improved survival. Finally,
      cancers from most patients with hereditary non-polyposis colorectal cancer (or Lynch syndrome) have microsatellite instability
      due to germline mutations in the DNA mismatch repair genes. Identification of the microsatellite instability pathway
      has enormous implications for the clinical investigation and management of colorectal cancer patients.'
  - source_sentence: 'query: Do Peppermint Teas Affect Male Fertility?'
    sentences:
    - 'passage: We report a series of cases of thyroid dysfunction in adults associated with ingestion of a brand of soy milk
      manufactured with kombu (seaweed), and a case of hypothyroidism in a neonate whose mother had been drinking this milk.
      We also report two cases of neonatal hypothyroidism linked to maternal ingestion of seaweed made into soup. These products
      were found to contain high levels of iodine. Despite increasing awareness of iodine deficiency, the potential for iodine
      toxicity, particularly from sources such as seaweed, is less well recognised.'
    - 'passage: OBJECTIVES: To justify the effects of Mentha piperita labiatae and Mentha spicata labiatae herbal teas on
      plasma total testosterone, luteinizing hormone, and follicle-stimulating hormone levels and testicular histologic features.
      We performed this study because of major complaints in our area from men about the adverse effects of these herbs on
      male reproductive function. METHODS: The experimental study included 48 male Wistar albino rats (body weight 200 to
      250 g). The rats were randomized into four groups of 12 rats each. The control group was given commercial drinking water,
      and the experimental groups were given 20 g/L M. piperita tea, 20 g/L M. spicata tea, or 40 g/L M. spicata tea. RESULTS:
      The follicle-stimulating hormone and luteinizing hormone levels had increased and total testosterone levels had decreased
      in the experimental groups compared with the control group; the differences were statistically significant. Also, the
      Johnsen testicular biopsy scores were significantly different statistically between the experimental groups and the
      control group. Although the mean seminiferous tubular diameter of the experimental groups was relatively greater than
      in the control group, the difference was not statistically significant. The only effects of M. piperita on testicular
      tissue was segmental maturation arrest in the seminiferous tubules; however, the effects of M. spicata extended from
      maturation arrest to diffuse germ cell aplasia in relation to the dose. CONCLUSIONS: Despite the beneficial effects
      of M. piperita and M. spicata in digestion, we should also be aware of the toxic effects when the herbs are not used
      in the recommended fashion or at the recommended dose.'
    - 'passage: This systematic review aims to summarize all reported cases of cardiac tamponade after acupuncture. Five electronic
      databases and our own files were searched for reports of cardiac tamponade after acupuncture. No restrictions in time
      or language were imposed. Data were extracted by two independent reviewers according to predefined criteria. We found
      a total of 26 cases. In 14 patients, the complications were fatal. In most instances, there is little doubt about causality.
      We conclude that cardiac tamponade is a serious, often fatal complication after acupuncture. As it is theoretically
      avoidable, acupuncturists should be trained to minimize the risk. Copyright © 2010 Elsevier Ireland Ltd. All rights
      reserved.'
