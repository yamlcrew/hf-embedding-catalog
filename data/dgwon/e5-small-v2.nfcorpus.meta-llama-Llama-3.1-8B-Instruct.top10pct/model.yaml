widgetData:
- source_sentence: 'query: What Foods Cause Cancer?'
  sentences:
  - 'passage: Observational and ecological studies are generally used to determine the presence of effect of cancer risk-modifying
    factors. Researchers generally agree that environmental factors such as smoking, alcohol consumption, poor diet, lack
    of physical activity, and low serum 25-hdyroxyvitamin D levels are important cancer risk factors. This ecological study
    used age-adjusted incidence rates for 21 cancers for 157 countries (87 with high-quality data) in 2008 with respect to
    dietary supply and other factors, including per capita gross domestic product, life expectancy, lung cancer incidence
    rate (an index for smoking), and latitude (an index for solar ultraviolet-B doses). The factors found to correlate strongly
    with multiple types of cancer were lung cancer (direct correlation with 12 types of cancer), energy derived from animal
    products (direct correlation with 12 types of cancer, inverse with two), latitude (direct correlation with six types,
    inverse correlation with three), and per capita gross national product (five types). Life expectancy and sweeteners directly
    correlated with three cancers, animal fat with two, and alcohol with one. Consumption of animal products correlated with
    cancer incidence with a lag time of 15–25 years. Types of cancer which correlated strongly with animal product consumption,
    tended to correlate weakly with latitude; this occurred for 11 cancers for the entire set of countries. Regression results
    were somewhat different for the 87 high-quality country data set and the 157-country set. Single-country ecological studies
    have inversely correlated nearly all of these cancers with solar ultraviolet-B doses. These results can provide guidance
    for prevention of cancer.'
  - 'passage: Most of the early studies published on soy and breast cancer were not designed to test the effect of soy; the
    assessment of soy intake was usually crude and few potential confounders were considered in the analysis. In this review,
    we focused on studies with relatively complete assessment of dietary soy exposure in the targeted populations and appropriate
    consideration for potential confounders in the statistical analysis of study data. Meta-analysis of the 8 (1 cohort, 7
    case–control) studies conducted in high-soy-consuming Asians show a significant trend of decreasing risk with increasing
    soy food intake. Compared to the lowest level of soy food intake (⩽5 mg isoflavones per day), risk was intermediate (OR=0.88,
    95% confidence interval (CI)=0.78–0.98) among those with modest (∼10 mg isoflavones per day) intake and lowest (OR=0.71,
    95% CI=0.60–0.85) among those with high intake (⩾20 mg isoflavones per day). In contrast, soy intake was unrelated to
    breast cancer risk in studies conducted in the 11 low-soy-consuming Western populations whose average highest and lowest
    soy isoflavone intake levels were around 0.8 and 0.15 mg per day, respectively. Thus, the evidence to date, based largely
    on case–control studies, suggest that soy food intake in the amount consumed in Asian populations may have protective
    effects against breast cancer.'
  - 'passage: Nineteen unselected patients with mild to moderate essential hypertension, whose average supine blood pressure
    after two months'' observation on no treatment was 156/98 mm Hg, were advised not to add salt to food and to avoid sodium-laden
    foods. After 2 weeks of sodium restriction patients were entered into an 8-week double-blind randomised crossover study
    of ''Slow Sodium'' (Ciba) versus slow sodium placebo. The mean supine blood pressure was 7.1 mm Hg (6.1%) lower in the
    fourth week of placebo than that in the fourth week of slow sodium (p less than 0.001). Urinary sodium excretion in the
    fourth week of slow sodium was 162 +/- 9 mmol/24 h and that in the fourth week of placebo was 86 mmol +/- 9 mmol/24 h
    (p less than 0.001). There was no difference in potassium excretion. These results suggest that moderate sodium restriction
    achieved by not adding salt and avoiding sodium-laden foods should, if not already, become part of the management of essential
    hypertension.'
- source_sentence: 'query: Does Seaweed Lower Estrogen Levels?'
  sentences:
  - 'passage: Seaweed and soy foods are consumed daily in Japan, where breast cancer rates for postmenopausal women are significantly
    lower than in the West. Likely mechanisms include differences in diet, especially soy consumption, and estrogen metabolism.
    Fifteen healthy postmenopausal women participated in this double-blind trial of seaweed supplementation with soy challenge.
    Participants were randomized to 7 wk of either 5 g/d seaweed (Alaria) or placebo (maltodextrin). During wk 7, participants
    also consumed a daily soy protein isolate (2 mg isoflavones/kg body weight). After a 3-wk washout period, participants
    were crossed over to the alternate supplement schedule. There was an inverse correlation between seaweed dose (mg/kg body
    weight) and serum estradiol (E2) (seaweed-placebo = y = -2.29 x dose + 172.3; r = -0.70; P = 0.003), [corrected] which
    was linear across the range of weights. Soy supplementation increased urinary daidzein, glycitein, genistein, and O-desmethylangolensin
    (P = 0.0001) and decreased matairesinol and enterolactone (P < 0.05). Soy and seaweed plus soy (SeaSoy) increased urinary
    excretion of 2-hydroxyestrogen (2-OHE) (P = 0.0001) and the ratio of 2-OHE:16alpha-hydroxyestrone (16alphaOHE(1)) (P =
    0.01). For the 5 equol excretors, soy increased urinary equol excretion (P = 0.0001); the combination of SeaSoy further
    increased equol excretion by 58% (P = 0.0001). Equol producers also had a 315% increase in 2:16 ratio (P = 0.001) with
    SeaSoy. Seaweed favorably alters estrogen and phytoestrogen metabolism and these changes likely include modulation of
    colonic bacteria.'
  - 'passage: AIM: To compare the insulin sensitivity indices between Chinese vegetarians and omnivores. METHODS: The study
    included 36 healthy volunteers (vegetarian, n=19; omnivore, n=17) who had normal fasting plasma glucose levels. Each participant
    completed an insulin suppression test. We compared steady-state plasma glucose (SSPG), fasting insulin, the homeostasis
    model assessment for insulin sensitivity (HOMA-IR and HOMA %S) and beta-cell function (HOMA %beta) between the groups.
    We also tested the correlation of SSPG with years on a vegetarian diet. RESULTS: The omnivore subjects were younger than
    the vegetarians (55.7+/-3.7 vs 58.6+/-3.6 year of age, P=0.022). There was no difference between the two groups in sex,
    blood pressure, renal function tests and lipid profiles. The omnivores had higher serum uric acid levels than vegetarians
    (5.25+/-0.84 vs 4.54+/-0.75 mg/dl, P=0.011). The results of the indices were different between omnivores and vegetarians
    (SSPG (mean+/-s.d.) 105.4+/-10.2 vs 80.3+/-11.3 mg/dl, P<0.001; fasting insulin, 4.06+/-0.77 vs 3.02+/-1.19 microU/ml,
    P=0.004; HOMA-IR, 6.75+/-1.31 vs 4.78+/-2.07, P=0.002; HOMA %S, 159.2+/-31.7 vs 264.3+/-171.7%, P=0.018) except insulin
    secretion index, HOMA %beta (65.6+/-18.0 vs 58.6+/-14.8%, P=0.208). We found a clear linear relation between years on
    a vegetarian diet and SSPG (r=-0.541, P=0.017). CONCLUSIONS: The vegetarians were more insulin sensitive than the omnivore
    counterparts. The degree of insulin sensitivity appeared to be correlated with years on a vegetarian diet.'
  - 'passage: Leflunomide, flutamide, nimodipine, mexiletine, sulindac, tranilast, 4-hydroxytamoxifen, and omeprazole are
    pharmaceuticals previously characterized as aryl hydrocarbon receptor (AHR) agonists in various cell lines and animal
    models. In this study, the eight AHR-active pharmaceuticals were investigated in highly aggressive aryl hydrocarbon (Ah)-responsive
    BT474 and MDA-MB-468 breast cancer cell lines, and their effects on AHR protein, CYP1A1 (protein and mRNA), CYP1B1 (mRNA),
    and cell migration were determined. 2,3,7,8-Tetrachlorodibenzo-p-dioxin (TCDD) was used as a positive control. The AHR
    agonist activities of the pharmaceuticals depended on structure, response, and cell context. Most compounds induced one
    or more AHR-mediated responses in BT474 cells, whereas in Ah-responsive MDA-MB-468 cells effects of the AHR-active pharmaceuticals
    were highly variable. 4-Hydroxytamoxifen, mexiletine, and tranilast did not induce CYP1A1 in MDA-MB-468 cells; moreover,
    in combination with TCDD, mexiletine was a potent AHR antagonist, tranilast was a partial antagonist, and 4-hydroxytamoxifen
    also exhibited some AHR antagonist activity. Omeprazole and, to a lesser extent, sulindac and leflunomide were full and
    partial AHR agonists, respectively, in both breast cancer cell lines. These data indicate that the AHR-active pharmaceuticals
    are selective AHR modulators, and applications of these drugs for targeting the AHR must be confirmed by studies using
    the most relevant cell context.'
- source_sentence: 'query: How Much Arsenic Is in Chicken Feed?'
  sentences:
  - 'passage: BACKGROUND: Numerous studies have investigated risk factors for Alzheimer disease (AD). However, at a recent
    National Institutes of Health State-of-the-Science Conference, an independent panel found insufficient evidence to support
    the association of any modifiable factor with risk of cognitive decline or AD. OBJECTIVE: To present key findings for
    selected factors and AD risk that led the panel to their conclusion. DATA SOURCES: An evidence report was commissioned
    by the Agency for Healthcare Research and Quality. It included English-language publications in MEDLINE and the Cochrane
    Database of Systematic Reviews from 1984 through October 27, 2009. Expert presentations and public discussions were considered.
    STUDY SELECTION: Study inclusion criteria for the evidence report were participants aged 50 years and older from general
    populations in developed countries; minimum sample sizes of 300 for cohort studies and 50 for randomized controlled trials;
    at least 2 years between exposure and outcome assessment; and use of well-accepted diagnostic criteria for AD. DATA EXTRACTION:
    Included studies were evaluated for eligibility and data were abstracted. Quality of overall evidence for each factor
    was summarized as low, moderate, or high. DATA SYNTHESIS: Diabetes mellitus, hyperlipidemia in midlife, and current tobacco
    use were associated with increased risk of AD, and Mediterranean-type diet, folic acid intake, low or moderate alcohol
    intake, cognitive activities, and physical activity were associated with decreased risk. The quality of evidence was low
    for all of these associations. CONCLUSION: Currently, insufficient evidence exists to draw firm conclusions on the association
    of any modifiable factors with risk of AD.'
  - 'passage: Organoarsenical drugs are widely used in the production of broiler chickens in the United States. Feathers from
    these chickens are processed into a meal product that is used as an animal feed additive and as an organic fertilizer.
    Research conducted to date suggests that arsenical drugs, specifically roxarsone, used in poultry production result in
    the accumulation of arsenic in the keratinous material of poultry feathers. The use of feather meal product in the human
    food system and in other settings may result in human exposures to arsenic. Consequently, the presence and nature of arsenic
    in twelve samples of feather meal product from six US states and China were examined. Since arsenic toxicity is highly
    species-dependent, speciation analysis using HPLC/ICPMS was performed to determine the biological relevance of detected
    arsenic. Arsenic was detected in all samples (44-4100 μg kg(-1)) and speciation analyses revealed that inorganic forms
    of arsenic dominated, representing 37 - 83% of total arsenic. Roxarsone was not detected in the samples (<20 μg As kg(-1)).
    Feather meal products represent a previously unrecognized source of arsenic in the food system, and may pose additional
    risks to humans as a result of its use as an organic fertilizer and when animal waste is managed. Copyright © 2011 Elsevier
    B.V. All rights reserved.'
  - 'passage: Insulin resistance, obesity, hypertension, and dyslipidemia are strongly associated with metabolic syndrome
    (MeSy), which is considered to be a reversible clinical stage before its evolution to coronary heart disease and diabetes.
    Currently, the antihypertensive and hypolipidemic properties of aqueous Hibiscus sabdariffa extracts (HSE) have been demonstrated
    in clinical trials and in vivo experiments. The aim of the present study was to evaluate the effects of a Hibiscus sabdariffa
    extract powder (HSEP) and a recognized preventive treatment (diet) on the lipid profiles of individuals with and without
    MeSy according to the National Cholesterol Education Program Adult Treatment Panel III (NCEP-ATP III) criteria. The protocol
    was a follow-up study carried out in a factorial, randomized design (T1=preventive treatment comprises Diet, T2=HSEP,
    T3=HSEP+preventive treatment (Diet) X MeSy, non-MeSy individuals). A total daily dose of 100 mg HSEP was orally administered
    in capsules for one month. The preventive treatment (diet) was selected according to NCEP-ATP III recommendations and
    adjusted individually. Total cholesterol, LDL-c, HDL-c, VLDL-c, triglycerides, glucose, urea, creatinine, AST, and ALT
    levels in the blood were determined in all individuals pre- and post-treatment. The MeSy patients treated with HSEP had
    significantly reduced glucose and total cholesterol levels, increased HDL-c levels, and an improved TAG/HDL-c ratio, a
    marker of insulin resistance (t-test p<0.05). Additionally, a triglyceride-lowering effect was observed in MeSy patients
    treated with HSEP plus diet, and in individuals without MeSy treated with HSEP. Significant differences in total cholesterol,
    HDL-c, and the TAG/HDL-c ratio were found when the means of absolute differences among treatments were compared (ANOVA
    p<0.02). Therefore, in addition to the well documented hypotensive effects of Hibiscus sabdariffa, we suggest the use
    of HSEP in individuals with dyslipidemia associated with MeSy.'
- source_sentence: 'query: Does Eating Saturated Fat Make You Insulin Resistant?'
  sentences:
  - 'passage: AIMS/HYPOTHESIS: The amount and quality of fat in the diet could be of importance for development of insulin
    resistance and related metabolic disorders. Our aim was to determine whether a change in dietary fat quality alone could
    alter insulin action in humans. METHODS: The KANWU study included 162 healthy subjects chosen at random to receive a controlled,
    isoenergetic diet for 3 months containing either a high proportion of saturated (SAFA diet) or monounsaturated (MUFA diet)
    fatty acids. Within each group there was a second assignment at random to supplements with fish oil (3.6 g n-3 fatty acids/d)
    or placebo. RESULTS: Insulin sensitivity was significantly impaired on the saturated fatty acid diet (-10%, p = 0.03)
    but did not change on the monounsaturated fatty acid diet (+2%, NS) (p = 0.05 for difference between diets). Insulin secretion
    was not affected. The addition of n-3 fatty acids influenced neither insulin sensitivity nor insulin secretion. The favourable
    effects of substituting a monounsaturated fatty acid diet for a saturated fatty acid diet on insulin sensitivity were
    only seen at a total fat intake below median (37E%). Here, insulin sensitivity was 12.5% lower and 8.8% higher on the
    saturated fatty acid diet and monounsaturated fatty acid diet respectively (p = 0.03). Low density lipoprotein cholesterol
    (LDL) increased on the saturated fatty acid diet (+4.1%, p < 0.01) but decreased on the monounsaturated fatty acid diet
    (MUFA) (-5.2, p < 0.001), whereas lipoprotein (a) [Lp(a)] increased on a monounsaturated fatty acid diet by 12% (p < 0.001).
    CONCLUSIONS/INTERPRETATION: A change of the proportions of dietary fatty acids, decreasing saturated fatty acid and increasing
    monounsaturated fatty acid, improves insulin sensitivity but has no effect on insulin secretion. A beneficial impact of
    the fat quality on insulin sensitivity is not seen in individuals with a high fat intake (> 37E%).'
  - 'passage: Background Phthalates are compounds that are used in a wide range of consumer products. However, the contribution
    of dietary intake to phthalate exposure has not been well defined. Objective The objective of this study was to assess
    the contribution of different food types to phthalate exposure. Phthalates are chemicals of concern because of the high
    levels measured in people and the environment, as well as the demonstrated toxicity in animal studies and limited epidemiological
    studies. Previous research, although limited, has suggested that phthalates contaminate food in various countries. Methods
    We conducted an exploratory analysis of data collected as part of the 2003–2004 National Health and Nutrition Examination
    Survey (NHANES). Associations between dietary intake (assessed by a 24-hr dietary recall) for a range of food types (meat,
    poultry, fish, fruit, vegetable, and dairy) and phthalate metabolites measured in urine were analyzed using multiple linear
    regression modeling. Results We found that metabolites of di-(2-ethylhexyl) phthalate (DEHP) and high-molecular-weight
    phthalate metabolites were associated with the consumption of poultry. Monoethyl phthalate, the metabolite of diethyl
    phthalate (DEP), was associated with vegetable consumption, specifically tomato and potato consumption. Discussion These
    results, combined with results from previous studies, suggest that diet is an important route of intake for phthalates.
    Further research is needed to determine the sources of food contamination with these toxic chemicals and to describe the
    levels of contamination of U.S. food in a large, representative U.S. sample.'
  - 'passage: We determined the genotoxicity of 39 chemicals currently in use as food additives. They fell into six categories-dyes,
    color fixatives and preservatives, preservatives, antioxidants, fungicides, and sweeteners. We tested groups of four male
    ddY mice once orally with each additive at up to 0.5xLD(50) or the limit dose (2000mg/kg) and performed the comet assay
    on the glandular stomach, colon, liver, kidney, urinary bladder, lung, brain, and bone marrow 3 and 24h after treatment.
    Of all the additives, dyes were the most genotoxic. Amaranth, Allura Red, New Coccine, Tartrazine, Erythrosine, Phloxine,
    and Rose Bengal induced dose-related DNA damage in the glandular stomach, colon, and/or urinary bladder. All seven dyes
    induced DNA damage in the gastrointestinal organs at a low dose (10 or 100mg/kg). Among them, Amaranth, Allura Red, New
    Coccine, and Tartrazine induced DNA damage in the colon at close to the acceptable daily intakes (ADIs). Two antioxidants
    (butylated hydroxyanisole (BHA) and butylated hydroxytoluene (BHT)), three fungicides (biphenyl, sodium o-phenylphenol,
    and thiabendazole), and four sweeteners (sodium cyclamate, saccharin, sodium saccharin, and sucralose) also induced DNA
    damage in gastrointestinal organs. Based on these results, we believe that more extensive assessment of food additives
    in current use is warranted.'
- source_sentence: 'query: Does Drinking Tea Improve Blood Flow?'
  sentences:
  - 'passage: BACKGROUND: The role of diet in renal cell carcinoma risk has been inconclusive. This study uses an integrative
    approach to assess the role of food groups and food items in renal cell carcinoma risk. DESIGN: A case-control study was
    conducted from 2003-2006. SUBJECTS/SETTING: Incident cases (n=335) were identified from hospital records and the Florida
    cancer registry, and population controls (n=337) frequency matched by age (+/-5 years), sex, and race were identified
    through random-digit dialing. Eating habits were assessed through the use of the 70-item Block food frequency questionnaire.
    STATISTICAL ANALYSES: Odds ratios (ORs), 95% confidence intervals (CIs), and tests for trends were calculated using logistic
    regression, controlled for age, sex, race, income, body mass index, and pack-years of smoking. RESULTS: Decreased renal
    cell carcinoma risk was observed among the total sample and for men for vegetable consumption (all subjects: OR 0.56,
    95% CI 0.35, 0.88; men: OR 0.49, 95% CI 0.25, 0.96) but not for fruit consumption. Tomato consumption decreased renal
    cell carcinoma risk for the total population and for men (all subjects: OR 0.50, 95% CI 0.31, 0.81; men: OR 0.47, 95%
    CI 0.24, 0.95). Increased risk of renal cell carcinoma was observed among all subjects and among women with increased
    consumption of red meat (all subjects: OR 4.43, 95% CI 2.02, 9.75; women: OR 3.04, 95% CI 1.60, 5.79). White bread consumption
    increased renal cell carcinoma risk among women only (OR 3.05, 95% CI 1.50, 6.20), as did total dairy consumption (OR
    2.36, 95% CI 1.21, 4.60). CONCLUSIONS: The protective role of vegetables and the increased risk of renal cell carcinoma
    with meat consumption are supported. The protective role of fruits is not. Novel findings include the increased risk of
    renal cell carcinoma with white bread and white potato consumption and the decreased risk of renal cell carcinoma with
    tomato consumption.'
  - 'passage: Background Tea consumption is associated with a lower risk of cardiovascular disease including stroke. Direct
    effects of tea components on the vasculature, particularly the endothelium, may partly explain this association. Objective
    We performed a meta-analysis of controlled human intervention studies on the effect of tea on flow-mediated dilation (FMD)
    of the brachial artery, a measurement of endothelial function, which is suggested to be associated with cardiovascular
    risk. Methods Human intervention studies were identified by systematic search of the databases Medline, Embase, Chemical
    s and Biosis through March 2009 and by hand-searching related articles. Studies were selected based on predefined criteria:
    intervention with tea as the sole experimental variable, placebo-controlled design, and no missing data on FMD outcome
    or its variability. A random effects model was used to calculate the pooled overall effect on FMD due to the intake of
    tea. The impact of various subject and treatment characteristics was investigated in the presence of heterogeneity. Results
    In total, 9 studies from different research groups were included with 15 relevant study arms. The overall absolute increase
    in FMD of tea vs. placebo was 2.6% of the arterial diameter (95% CI: 1.8-3.3%; P-value <0.001) for a median daily dose
    of 500 mL of tea (2–3 cups). This is a relative increase of approximately 40% compared to the average FMD of 6.3% measured
    under placebo or baseline conditions. There was significant heterogeneity between studies (P-value <0.001) that might
    partly be explained by the cuff position either distal or proximal to the area of FMD measurement. No indication for publication
    bias was found. Conclusion Moderate consumption of tea substantially enhances endothelial-dependent vasodilation. This
    may provide a mechanistic explanation for the reduced risk of cardiovascular events and stroke observed among tea drinkers.'
  - 'passage: In the early 1970s, aluminium toxicity was first implicated in the pathogenesis of clinical disorders in patients
    with chronic renal failure involving bone (renal osteomalacia) or brain tissue (dialysis encephalopathy). Before that
    time the toxic effects of aluminium ingestion were not considered to be a major concern because absorption seemed unlikely
    to occur. Meanwhile, aluminium toxicity has been investigated in countless epidemiological and clinical studies as well
    as in animal experiments and many papers have been published on the subject. It is now commonly acknowledged that aluminium
    toxicity can be induced by infusion of aluminium-contaminated dialysis fluids, by parenteral nutrition solutions, and
    by oral exposure as a result of aluminium-containing pharmaceutical products such as aluminium-based phosphate binders
    or antacid intake. Over-the-counter antacids are the most important source for human aluminium exposure from a quantitative
    point of view. However, aluminium can act as a powerful neurological toxicant and provoke embryonic and fetal toxic effects
    in animals and humans after gestational exposure. Despite these facts, the patient information leaflets from European
    antacids that are available OTC show substantial differences regarding warnings from aluminium toxicity. It seems advisable
    that all patients should receive the same information on aluminium toxicity from patient information leaflets, in particular
    with regard to the increased absorption through concomitant administration with citrate-containing beverages and the use
    of such antacids during pregnancy.'
