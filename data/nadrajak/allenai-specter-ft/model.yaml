widgetData:
- source_sentence: The class of algorithmically computable simple games (i) includes the class of games that have finite carriers
    and (ii) is included in the class of games that have finite winning coalitions. This paper characterizes computable games,
    strengthens the earlier result that computable games violate anonymity, and gives examples showing that the above inclusions
    are strict. It also extends Nakamura's theorem about the nonemptyness of the core and shows that computable games have
    a finite Nakamura number, implying that the number of alternatives that the players can deal with rationally is restricted.
  sentences:
  - We are going to study the limiting spectral measure of fixed dimensional Hermitian block-matrices with large dimensional
    Wigner blocks. We are going also to identify the limiting spectral measure when the Hermitian block-structure is Circulant.
    Using the limiting spectral measure of a Hermitian Circulant block-matrix we will show that the spectral measure of a
    Wigner matrix with $k-$weakly dependent entries need not to be the semicircle law in the limit.
  - The scope of the present study is Eulerian modeling and simulation of polydisperse liquid sprays undergoing droplet coalescence
    and evaporation. The fundamental mathematical description is the Williams spray equation governing the joint number density
    function f(v, u; x, t) of droplet volume and velocity. Eulerian multi-fluid models have already been rigorously derived
    from this equation in Laurent et al. (2004). The first key feature of the paper is the application of direct quadrature
    method of moments (DQMOM) introduced by Marchisio and Fox (2005) to the Williams spray equation. Both the multi-fluid
    method and DQMOM yield systems of Eulerian conservation equations with complicated interaction terms representing coalescence.
    In order to validate and compare these approaches, the chosen configuration is a self-similar 2D axisymmetrical decelerating
    nozzle with sprays having various size distributions, ranging from smooth ones up to Dirac delta functions. The second
    key feature of the paper is a thorough comparison of the two approaches for various test-cases to a reference solution
    obtained through a classical stochastic Lagrangian solver. Both Eulerian models prove to describe adequately spray coalescence
    and yield a very interesting alternative to the Lagrangian solver.
  - Recently, the iterative approach named linear tabling has received considerable attention because of its simplicity, ease
    of implementation, and good space efficiency. Linear tabling is a framework from which different methods can be derived
    based on the strategies used in handling looping subgoals. One decision concerns when answers are consumed and returned.
    This paper describes two strategies, namely, {\it lazy} and {\it eager} strategies, and compares them both qualitatively
    and quantitatively. The results indicate that, while the lazy strategy has good locality and is well suited for finding
    all solutions, the eager strategy is comparable in speed with the lazy strategy and is well suited for programs with cuts.
    Linear tabling relies on depth-first iterative deepening rather than suspension to compute fixpoints. Each cluster of
    inter-dependent subgoals as represented by a top-most looping subgoal is iteratively evaluated until no subgoal in it
    can produce any new answers. Naive re-evaluation of all looping subgoals, albeit simple, may be computationally unacceptable.
    In this paper, we also introduce semi-naive optimization, an effective technique employed in bottom-up evaluation of logic
    programs to avoid redundant joins of answers, into linear tabling. We give the conditions for the technique to be safe
    (i.e. sound and complete) and propose an optimization technique called {\it early answer promotion} to enhance its effectiveness.
    Benchmarking in B-Prolog demonstrates that with this optimization linear tabling compares favorably well in speed with
    the state-of-the-art implementation of SLG.
- source_sentence: We survey recent progress on the Greenfield-Wallach and Katok conjectures on globally hypoelliptic and
    cohomology free vector fields and derive a proof of the conjectures in dimension three. The argument is primarily based
    on recent work of F. and J. Rodriguez Hertz which allows us to reduce the question to the case of a Reeb flow for a contact
    form. The contact case is settled by invoking the Weinstein conjecture (which has been recently announced by C. Taubes).
  sentences:
  - We describe several views of the semantics of a simple programming language as formal documents in the calculus of inductive
    constructions that can be verified by the Coq proof system. Covered aspects are natural semantics, denotational semantics,
    axiomatic semantics, and abstract interpretation. Descriptions as recursive functions are also provided whenever suitable,
    thus yielding a a verification condition generator and a static analyser that can be run inside the theorem prover for
    use in reflective proofs. Extraction of an interpreter from the denotational semantics is also described. All different
    aspects are formally proved sound with respect to the natural semantics specification.
  - Zero-divisors (ZDs) derived by Cayley-Dickson Process (CDP) from N-dimensional hypercomplex numbers (N a power of 2, at
    least 4) can represent singularities and, as N approaches infinite, fractals -- and thereby,scale-free networks. Any integer
    greater than 8 and not a power of 2 generates a meta-fractal or "Sky" when it is interpreted as the "strut constant" (S)
    of an ensemble of octahedral vertex figures called "Box-Kites" (the fundamental building blocks of ZDs). Remarkably simple
    bit-manipulation rules or "recipes" provide tools for transforming one fractal genus into others within the context of
    Wolfram's Class 4 complexity.
  - The purpose of this paper is to determine the asymptotic of the average energy of a configuration of N zeros of system
    of random polynomials of degree N as N tends to infinity and more generally the zeros of random holomorphic sections of
    a line bundle L over any Riemann surface M. And we compare our results to the well-known minimum of energies.
- source_sentence: How do blogs cite and influence each other? How do such links evolve? Does the popularity of old blog posts
    drop exponentially with time? These are some of the questions that we address in this work. Our goal is to build a model
    that generates realistic cascades, so that it can help us with link prediction and outlier detection. Blogs (weblogs)
    have become an important medium of information because of their timely publication, ease of use, and wide availability.
    In fact, they often make headlines, by discussing and discovering evidence about political events and facts. Often blogs
    link to one another, creating a publicly available record of how information and influence spreads through an underlying
    social network. Aggregating links from several blog posts creates a directed graph which we analyze to discover the patterns
    of information propagation in blogspace, and thereby understand the underlying social network. Not only are blogs interesting
    on their own merit, but our analysis also sheds light on how rumors, viruses, and ideas propagate over social and computer
    networks. Here we report some surprising findings of the blog linking and information propagation structure, after we
    analyzed one of the largest available datasets, with 45,000 blogs and ~ 2.2 million blog-postings. Our analysis also sheds
    light on how rumors, viruses, and ideas propagate over social and computer networks. We also present a simple model that
    mimics the spread of information on the blogosphere, and produces information cascades very similar to those found in
    real life.
  sentences:
  - We present a suite of programs to determine the ground state of the time-independent Gross-Pitaevskii equation, used in
    the simulation of Bose-Einstein condensates. The calculation is based on the Optimal Damping Algorithm, ensuring a fast
    convergence to the true ground state. Versions are given for the one-, two-, and three-dimensional equation, using either
    a spectral method, well suited for harmonic trapping potentials, or a spatial grid.
  - We propose a method to perform precision measurements of the interaction parameters in systems of N ultra-cold spin 1/2
    atoms. The spectroscopy is realized by first creating a coherent spin superposition of the two relevant internal states
    of each atom and then letting the atoms evolve under a squeezing Hamiltonian. The non-linear nature of the Hamiltonian
    decreases the fundamental limit imposed by the Heisenberg uncertainty principle to N^(-2), a factor of N smaller than
    the fundamental limit achievable with non-interacting atoms. We study the effect of decoherence and show that even with
    decoherence, entangled states can outperform the signal to noise limit of non-entangled states. We present two possible
    experimental implementations of the method using Bose-Einstein spinor condensates and fermionic atoms loaded in optical
    lattices and discuss their advantages and disadvantages.
  - Bivariate linear mixed models are useful when analyzing longitudinal data of two associated markers. In this paper, we
    present a bivariate linear mixed model including random effects or first-order auto-regressive process and independent
    measurement error for both markers. Codes and tricks to fit these models using SAS Proc MIXED are provided. Limitations
    of this program are discussed and an example in the field of HIV infection is shown. Despite some limitations, SAS Proc
    MIXED is a useful tool that may be easily extendable to multivariate response in longitudinal studies.
- source_sentence: The effect of the magnetic field on the critical behavior of Sr0:9La0:1CuO2 is explored in terms of reversible
    magnetization data. As the correlation length transverse to the magnetic field Hi,applied along the i-axis, cannot grow
    beyond the limiting magnetic length LHi, related to the average distance between vortex lines, one expects a magnetic
    field induced finite size effect. Invoking the scaling theory of critical phenomena we provide clear evidence for this
    effect. It implies that in type II superconductors there is a 3D to 1D crossover line Hpi(T). Consequently, below Tc and
    above Hpi(T) uperconductivity is confined to cylinders with diameter LHi(1D). Accordingly, there is no continuous phase
    transition in the (H,T)-plane along the Hc2-lines as predicted by the mean-field treatment.
  sentences:
  - We introduce a new construction, the isotropy groupoid, to organize the orbit data for split $\Gamma$-spaces. We show
    that equivariant principal $G$-bundles over split $\Gamma$-CW complexes $X$ can be effectively classified by means of
    representations of their isotropy groupoids. For instance, if the quotient complex $A=\Gamma\backslash X$ is a graph,
    with all edge stabilizers toral subgroups of $\Gamma$, we obtain a purely combinatorial classification of bundles with
    structural group $G$ a compact connected Lie group. If $G$ is abelian, our approach gives combinatorial and geometric
    descriptions of some results of Lashof-May-Segal and Goresky-Kottwitz-MacPherson.
  - We analyze 27 house price indexes of Las Vegas from Jun. 1983 to Mar. 2005, corresponding to 27 different zip codes. These
    analyses confirm the existence of a real-estate bubble, defined as a price acceleration faster than exponential, which
    is found however to be confined to a rather limited time interval in the recent past from approximately 2003 to mid-2004
    and has progressively transformed into a more normal growth rate comparable to pre-bubble levels in 2005. There has been
    no bubble till 2002 except for a medium-sized surge in 1990. In addition, we have identified a strong yearly periodicity
    which provides a good potential for fine-tuned prediction from month to month. A monthly monitoring using a model that
    we have developed could confirm, by testing the intra-year structure, if indeed the market has returned to ``normal''
    or if more turbulence is expected ahead. We predict the evolution of the indexes one year ahead, which is validated with
    new data up to Sep. 2006. The present analysis demonstrates the existence of very significant variations at the local
    scale, in the sense that the bubble in Las Vegas seems to have preceded the more global USA bubble and has ended approximately
    two years earlier (mid 2004 for Las Vegas compared with mid-2006 for the whole of the USA).
  - The use of off-resonant standing light waves to manipulate ultracold atoms is investigated. Previous work has illustrated
    that optical pulses can provide efficient beam-splitting and reflection operations for atomic wave packets. The performance
    of these operations is characterized experimentally using Bose-Einstein condensates confined in a weak magnetic trap.
    Under optimum conditions, fidelities of up to 0.99 for beam splitting and 0.98 for reflection are observed, and splitting
    operations of up to third order are achieved. The dependence of the operations on light intensity and atomic velocity
    is measured and found to agree well with theoretical estimates.
- source_sentence: Let G be a free group in a variety of groups, but G is not absolutely free. We prove that the group of
    automorphisms Aut(G) is linear iff G is a virtually nilpotent group.
  sentences:
  - An orthogonal array OA(q^{2n-1},q^{2n-2}, q,2) is constructed from the action of a subset of PGL(n+1,q^2) on some non--degenerate
    Hermitian varieties in PG(n,q^2). It is also shown that the rows of this orthogonal array correspond to some blocks of
    an affine design, which for q> 2 is a non--classical model of the affine space AG(2n-1,q).
  - We describe a new universality class for unitary invariant random matrix ensembles. It arises in the double scaling limit
    of ensembles of random $n \times n$ Hermitian matrices $Z_{n,N}^{-1} |\det M|^{2\alpha} e^{-N \Tr V(M)} dM$ with $\alpha
    > -1/2$, where the factor $|\det M|^{2\alpha}$ induces critical eigenvalue behavior near the origin. Under the assumption
    that the limiting mean eigenvalue density associated with $V$ is regular, and that the origin is a right endpoint of its
    support, we compute the limiting eigenvalue correlation kernel in the double scaling limit as $n, N \to \infty$ such that
    $n^{2/3}(n/N-1) = O(1)$. We use the Deift-Zhou steepest descent method for the Riemann-Hilbert problem for polynomials
    on the line orthogonal with respect to the weight $|x|^{2\alpha} e^{-NV(x)}$. Our main attention is on the construction
    of a local parametrix near the origin by means of the $\psi$-functions associated with a distinguished solution of the
    Painleve XXXIV equation. This solution is related to a particular solution of the Painleve II equation, which however
    is different from the usual Hastings-McLeod solution.
  - 'Suppose that a target function is monotonic, namely, weakly increasing, and an original estimate of the target function
    is available, which is not weakly increasing. Many common estimation methods used in statistics produce such estimates.
    We show that these estimates can always be improved with no harm using rearrangement techniques: The rearrangement methods,
    univariate and multivariate, transform the original estimate to a monotonic estimate, and the resulting estimate is closer
    to the true curve in common metrics than the original estimate. We illustrate the results with a computational example
    and an empirical example dealing with age-height growth charts.'
