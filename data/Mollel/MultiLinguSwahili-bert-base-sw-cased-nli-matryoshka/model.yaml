widgetData:
- source_sentence: Ndege mwenye mdomo mrefu katikati ya ndege.
  sentences:
  - Panya anayekimbia juu ya gurudumu.
  - Mtu anashindana katika mashindano ya mbio.
  - Ndege anayeruka.
- source_sentence: Msichana mchanga mwenye nywele nyeusi anakabili kamera na kushikilia mfuko wa karatasi wakati amevaa shati
    la machungwa na mabawa ya kipepeo yenye rangi nyingi.
  sentences:
  - Mwanamke mzee anakataa kupigwa picha.
  - mtu akila na mvulana mdogo kwenye kijia cha jiji
  - Msichana mchanga anakabili kamera.
- source_sentence: Wanawake na watoto wameketi nje katika kivuli wakati kikundi cha watoto wadogo wameketi ndani katika kivuli.
  sentences:
  - Mwanamke na watoto na kukaa chini.
  - Mwanamke huyo anakimbia.
  - Watu wanasafiri kwa baiskeli.
- source_sentence: Mtoto mdogo anaruka mikononi mwa mwanamke aliyevalia suti nyeusi ya kuogelea akiwa kwenye dimbwi.
  sentences:
  - Mtoto akiruka mikononi mwa mwanamke aliyevalia suti ya kuogelea kwenye dimbwi.
  - Someone is holding oranges and walking
  - Mama na binti wakinunua viatu.
- source_sentence: Mwanamume na mwanamke wachanga waliovaa mikoba wanaweka au kuondoa kitu kutoka kwenye mti mweupe wa zamani,
    huku watu wengine wamesimama au wameketi nyuma.
  sentences:
  - tai huruka
  - mwanamume na mwanamke wenye mikoba
  - Wanaume wawili wameketi karibu na mwanamke.
