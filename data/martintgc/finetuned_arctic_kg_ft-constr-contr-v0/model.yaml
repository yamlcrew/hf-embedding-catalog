    \ \n28 \n1.5.2 \nVorgaben aus Vereinbarungen mit Dritten \n28 \n1.5.3 \nAngaben zu Entwurfsvorgaben \n28 \n1.5.4"
- source_sentence: Was sind die Standardauflagen und Bedingungen des Landratsamtes Böblingen?
  sentences:
  - "A81 AS Rottenburg, Ausbau zum Kleeblatt einschließlich Parallelfahrbahnen und \ngrundhafte Erneuerung der B28 im Ausbaubereich\
    \ \n____________________________________________________________________________________________________________ \n \n\
    2 \n \nInhaltsverzeichnis \n1 \nALLGEMEINE BESCHREIBUNG DER LEISTUNG \n7 \n1.1 \nAUSZUFÜHRENDE LEISTUNGEN \n7 \n1.1.1\
    \ \nStraßenbau \n7 \n1.1.1.1 \nArt und Umfang \n7 \n1.1.1.2 \nUntergrund \n9 \n1.1.1.3 \nUnterbau \n9 \n1.1.1.4 \nErdarbeiten\
    \ \n9 \n1.1.1.5 \nFräsarbeiten \n9 \n1.1.1.6 \nEntwässerung \n9 \n1.1.1.7 \nOberbau \n10 \n1.1.1.8 \nDurchlässe \n15 \n\
    1.1.1.9 \nAusstattung \n15 \n1.1.2 \nBauwerke (Ingenieurbau) \n16 \n1.1.2.1 \nArt und Umfang \n16 \n1.1.3 \nLandschaftsbau\
    \ \n16 \n1.1.3.1 \nStandardauflagen und Bedingungen des Landratsamtes Böblingen \n16 \n1.1.3.2 \nArt und Umfang \n20 \n\
    1.1.3.3"
  - "A81 AS Rottenburg, Ausbau zum Kleeblatt einschließlich Parallelfahrbahnen und \ngrundhafte Erneuerung der B28 im Ausbaubereich\
    \ \n____________________________________________________________________________________________________________ \n \n\
    25 \n \n1.2 \nAusgeführte Vorarbeiten \n1.2.1 Beweissicherung \nBisher wurden keine Beweissicherungsmaßnahmen durchgeführt.\
    \ Weitere Maßnahmen \nsiehe Punkt 3.8 dieser Baubeschreibung. \n1.2.2 Vermessung \n1.2.2.1 Festpunkte, Vermessungsnetz\
    \ und Absteckung \nAls geodätisches Grundlagennetz wird dem Auftragnehmer ein Lage- und Höhenfest-\npunktfeld übergeben.\
    \ \n1.2.2.2 Lagefestpunkte \nSämtlichen Berechnungen des Lagefestpunktfeldes liegt das Gauss-Krüger-System im \nBereich\
    \ 9° Meridians zugrunde."
  - "gene Oberboden ist vollständig wieder im Baustellenbereich anzudecken. Die Wieder-\nverwendung von Oberboden aus Banketten\
    \ und Mulden ist nur in diesen Bereichen ge-\nstattet. Der Oberboden darf nicht befahren werden. \nDer Oberboden im gesamten\
    \ Baubereich der AS Rottenburg ist grundsätzlich auf Flä-\nchen des AN zwischenzulagern und für die Andeckung der Böschungen\
    \ und Mulden zu \nverwenden. Vorrübergehend beanspruchte Flächen (VB-Flächen) sind in geringem Um-\nfang vorhanden und\
    \ können für die Lagerung von Oberboden t. w. verwendet werden. \nDas Erdplanum ist grundsätzlich mit Weißfeinkalk zu\
    \ verbessern. Die Dammaufstands-\nflächen bei der Verbreiterungen sind ebenso zu verbessern. Diese qualifizierte Boden-\n\
    verbesserung ordnet der Auftraggeber an."
- source_sentence: Welche Rolle spielen Feldwege in den ergänzenden Baumaßnahmen eines Bauprojekts?
  sentences:
  - "einschl. Sanierung des restlichen Bauwerks \n \nSanierung des Bauwerks Überführung der A81 \n \nAbbau von Schutzplanken\
    \ in Bau- und Verbreiterungsbereichen durch den AN Stra-\nßenbau, der Bau neuer Schutzplanken erfolgt durch Dritte. \n\
     \nStraßenausstattung Freigabemarkierung und ca. 6 Wochen später endgültige Markie-\nrung aufbringen \n \nBau von Feldwegen\
    \ \n \nOberbodenandeckungsarbeiten und Ansaatarbeiten \n \nBankettarbeiten als Schotterrasen. \n \nErgänzende Baumaßnahmen\
    \ durch Dritte: \n \n \nVerkehrsführung einrichten, vorhalten, betreiben und abbauen \n \nNeubau der Wegweisenden Beschilderung,\
    \ StVO-Beschilderung auf der A81 \n \nNeubau der passiven Schutzeinrichtungen \n \nDiese Leistungen werden als Fachlose\
    \ ausgeschrieben und vergeben. Die Umsetzung erfolgt vor"
  - "Bauwerke (Ingenieurbau) \n16 \n1.1.2.1 \nArt und Umfang \n16 \n1.1.3 \nLandschaftsbau \n16 \n1.1.3.1 \nStandardauflagen\
    \ und Bedingungen des Landratsamtes Böblingen \n16 \n1.1.3.2 \nArt und Umfang \n20 \n1.1.3.3 \nAllgemeines \n20 \n1.1.3.4\
    \ \nOberbodenkonzept \n20 \n1.1.3.5 \nSchutzzäune \n22 \n1.1.3.6 \nWurzelstöcke und Gehölze roden \n22 \n1.1.3.7 \nAnsaatarbeiten\
    \ \n22 \n1.1.3.8 \nRückbau nicht mehr benötigter Straßenflächen (Ausgleichsmaßnahmen) \n22 \n1.1.3.9 \nSonstiges \n22\
    \ \n1.1.4 \nAuftraggeber Aufgaben nach Baustellenverordnung \n22 \n1.1.4.1 \nVorankündigung \n22 \n1.1.4.2 \nUnterlage\
    \ nach § 3 Abs. 2 Nr. 3 Baustellenverordnung erstellen und anpassen \n23 \n1.1.4.3 \nSicherheits- und Gesundheitsschutzkoordinator\
    \ während der Ausführung des Bauvorhabens stellen \n23 \n1.2 \nAUSGEFÜHRTE VORARBEITEN \n25 \n1.2.1 \nBeweissicherung\
    \ \n25"
  - "Oberbodenkonzept umfasst: \n- \nAbtrag und Lagerung des Oberbodens \n- \nWiederandeckung mit Oberboden \n- \nVerwertung\
    \ und Entsorgung von Oberboden \nDie genannten Qualitätsstufen ergeben sich nach der VwV Boden 2007 \nDie genannten Deponieklassen\
    \ richten sich nach der Deponieverordnung 2017 \n \na) Abtrag des Oberbodens: \nBeim Abtrag des Bodens werden verschiedene\
    \ Bereich nach Ihren Schadstoffbelastung \nund der Oberbodenmächtigkeit unterschieden. Die Zwischenlagerung der aus diesen\
    \ Be-\nreichen abgeschobenen Oberböden muss zwingend separat erfolgen. \n1. Bankette \nwerden in einer Breite von 2 m\
    \ 5 cm tief abgeschoben. Das Material ist auf separaten \nMieten für die Haufwerksbeprobung zu lagern. Die Mieten dürfen\
    \ jeweils 500 m³ nicht"
