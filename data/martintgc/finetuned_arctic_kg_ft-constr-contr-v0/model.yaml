      \ Abdichtungen sind gemäß Regelquerschnitte auszuführen. \n \n1.1.1.7 Oberbau \n \nDie Durchgangsfahrbahn der A 81 wird\
      \ in die Belastungsklasse Bk 100 eingestuft. \nDie neue Verbreiterung der B 28 wird in die Belastungsklasse Bk 32 eingestuft.\
      \ Der Auf-\nbau der bestehenden und zu sanierenden B 28 wird im Zuge der Baumaßnahme im \nBaustellenbereich auf die\
