    - "gene Oberboden ist vollständig wieder im Baustellenbereich anzudecken. Die Wieder-\nverwendung von Oberboden aus Banketten\
      \ und Mulden ist nur in diesen Bereichen ge-\nstattet. Der Oberboden darf nicht befahren werden. \nDer Oberboden im\
      \ gesamten Baubereich der AS Rottenburg ist grundsätzlich auf Flä-\nchen des AN zwischenzulagern und für die Andeckung\
      \ der Böschungen und Mulden zu \nverwenden. Vorrübergehend beanspruchte Flächen (VB-Flächen) sind in geringem Um-\n\
      fang vorhanden und können für die Lagerung von Oberboden t. w. verwendet werden. \nDas Erdplanum ist grundsätzlich mit\
      \ Weißfeinkalk zu verbessern. Die Dammaufstands-\nflächen bei der Verbreiterungen sind ebenso zu verbessern. Diese qualifizierte\
      \ Boden-\nverbesserung ordnet der Auftraggeber an."
