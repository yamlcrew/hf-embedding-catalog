  sentences:
  - "A81 AS Rottenburg, Ausbau zum Kleeblatt einschließlich Parallelfahrbahnen und \ngrundhafte Erneuerung der B28 im Ausbaubereich\
    \ \n____________________________________________________________________________________________________________ \n \n\
    14 \n \nSMA 22 B S \nSiebdurchgang \nM.-% \nSMA 16 B S \n6 bis \n10 \n6 bis \n13 \n27 bis \n30 \n39 bis \n43 \n49 bis\
    \ \n53 \n66 bis \n69 \n95 bis \n100 \n100"
  - "35 \n2.7.4 \nGüte des Oberbodens \n35 \n2.7.5 \nSchadstoffbelastung \n35 \n2.8 \nSEITENENTNAHMEN UND ABLAGERUNGSSTELLE\
    \ \n35 \n2.9 \nSCHUTZBEREICHE UND –OBJEKTE \n36 \n2.9.1 \nAllgemeines \n36 \n2.9.2 \nNatur-, Landschaftsschutzgebiete\
    \ \n36 \n2.9.2.1 \nNaturschutzgebiete \n36 \n2.9.2.2 \nLandschaftsschutzgebiete \n36 \n2.9.3 \nBäume und Flurgehölze \n\
    36 \n2.9.4 \nBiotope \n36 \n2.9.5 \nDenkmale \n37 \n2.9.6 \nImmisionsschutz-Bereiche und –Objekte \n37 \n2.9.7 \nGewässer,\
    \ Wasserschutzgebiete \n37"
  - "Da die bestehenden Sickerleitungen an die Kanäle angeschlossen sind, fließt in den be-\nstehenden Leitungen ständig Wasser.\
    \ Das Umpumpen dieses Wassers von einem \nSchacht zum Nächsten ist als Wasserhaltung zu sehen und in der Kalkulation zu\
    \ berück-\nsichtigen. \nIn Wasserschutzgebieten sind Grundwasserschutzmaßnahmen gemäß RiStWag erfor-\nderlich. Die Abdichtungen\
    \ sind gemäß Regelquerschnitte auszuführen. \n \n1.1.1.7 Oberbau \n \nDie Durchgangsfahrbahn der A 81 wird in die Belastungsklasse\
    \ Bk 100 eingestuft. \nDie neue Verbreiterung der B 28 wird in die Belastungsklasse Bk 32 eingestuft. Der Auf-\nbau der\
    \ bestehenden und zu sanierenden B 28 wird im Zuge der Baumaßnahme im \nBaustellenbereich auf die Belastungsklasse Bk\
    \ 32 erhöht."
- source_sentence: Welche Maßnahmen sind im Zusammenhang mit der Sanierung des Bauwerks Überführung der A81 vorgesehen?
  sentences:
  - "Marshall-Probekörper \n \n \n \n \nminimaler Hohlraumgehalt MPK \n \nVmin 3,0 \nVmin 3,0 \nmaximaler Hohlraumgehalt MPK\
    \ \n \nVmax 4,0 \nVmax 4,0 \nBindemittelvolumen \n \nVol.-% \nIst anzugeben2 \nIst anzugeben3 \nHohlraumausfüllungsgrad\
    \ \n% \nIst anzugeben4 \nIst anzugeben4 \nProportionale Spurrinnentiefe \n \nPRDLuft5,0 \nPRDLuft5,0 \n \n1   Bindemittelsorte\
    \ in Ausnahmefällen. \n2   Erfahrungswerte liegen im Bereich zwischen 11 und 13 Vol.-% \n3   Erfahrungswerte liegen im\
    \ Bereich zwischen 12 und 14 Vol.-% \n4   Erfahrungswerte liegen im Bereich zwischen 73 und 83 % \n \nNach den bisherigen\
    \ Erfahrungen haben sich die in der Tabelle 2 dargestellten eingeengten Berei-\nche der Korngrößenverteilungen bei der\
    \ Herstellung von Asphaltbinder SMA B S besonders be-\nwährt."
  - "A81 AS Rottenburg, Ausbau zum Kleeblatt einschließlich Parallelfahrbahnen und \ngrundhafte Erneuerung der B28 im Ausbaubereich\
    \ \n____________________________________________________________________________________________________________ \n \n\
    12 \n \n50 cm verbleibende Frostschutzschicht \n10 cm neues Frostschutzmaterial 0/45 aus Naturgestein \n18 cm Asphalttragschicht\
    \ AC 32 TS (50/70) \n9,0 cm dicken Asphaltbinderschicht Typ SMA 22 B S mit 10/40-65 \n3,5 cm Deckschicht SMA 8 S mit 25/55-55.\
    \ \nDabei ist zu beachten, dass hierdurch die bestehenden Höhen des tieferen Fahrbahn-\nrandes auf der B 28 erhalten bleiben,\
    \ ansonsten die Querneigung auf der B28 auf 2,5% \nerhöht wird. Dieser Ausgleich wird in der Frostschutzschicht vorgenommen.\
    \ Im Bereich"
  - "rung aufbringen. \n \nBau von Feldwegen und Rekultivierungsmaßnahmen \n \nOberbodenandeckungsarbeiten und Ansaatarbeiten.\
    \ \n \nBankettarbeiten als Schotterrasen \n \nVerbreiterung und FDE B28: \n \n \nVerkehrsführung einrichten, vorhalten,\
    \ betreiben und abbauen wird durch Dritte aus-\ngeführt \n \nErdbau und Entwässerungsarbeiten auf der B28 \n \nVerbreiterung\
    \ und FDE Maßnahme auf der B 28 mit Austausch der Asphalttrag-, As-\nphaltbinderschicht und der Deckschicht verbunden\
    \ mit der Anhebung der Quernei-\ngung auf 2,5% \n \nVerbreiterung der Feldwegunterführung auf der B28 (BW 01, km 0+710)\
    \ nach Süden \neinschl. Sanierung des restlichen Bauwerks \n \nSanierung des Bauwerks Überführung der A81 \n \nAbbau\
    \ von Schutzplanken in Bau- und Verbreiterungsbereichen durch den AN Stra-"
