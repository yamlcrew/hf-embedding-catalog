- source_sentence: Was sind die wichtigsten Punkte, die man über Rottenburg und den Ausbau zum Kleeblatt wissen muss, besonders
    nach der Fertigstellung des Bodenauftrags?
  sentences:
  - "A81 AS Rottenburg, Ausbau zum Kleeblatt einschließlich Parallelfahrbahnen und \ngrundhafte Erneuerung der B28 im Ausbaubereich\
    \ \n____________________________________________________________________________________________________________ \n \n\
    11 \n \nDie Rampen und Parallelfahrbahnen werden in die Belastungsklasse Bk 10 eingestuft. \n \nDer Straßenaufbau der\
    \ Verbreiterung der B 28 wird folgend festgelegt: \n \n  \n \n      3,5 cm   \nAsphaltdeckschicht SMA 8 S mit 25/55-55\
    \ \n  \n \n      9,0 cm   \nAsphaltbinderschicht Typ SMA AC 22 B S mit  \n  \n \n \n \n \n10/40-55 gemäß Tab. 1 \n▼120\
    \ MPa  \n    18,0 cm   \nAsphalttragschicht AC 32 T S mit 50/70 \n▼45 MPa  \n    39,5 cm  \nFrostschutzschicht  \n  \n\
    \ \n    70,0 cm  Gesamtaufbau \n \nDer Straßenaufbau der neuen Rampen und Parallelfahrbahnen wird folgend festgelegt:"
  - "A81 AS Rottenburg, Ausbau zum Kleeblatt einschließlich Parallelfahrbahnen und \ngrundhafte Erneuerung der B28 im Ausbaubereich\
    \ \n____________________________________________________________________________________________________________ \n \n\
    19 \n \nNachsorge \n \n19. Nach Fertigstellung des Bodenauftrags sind die Flächen zur Vermeidung von Erosion \nund evtl.\
    \ Stickstoffverlusten möglichst umgehend zu begrünen.  \n \n20. Zur Förderung der Bodenstruktur sind für die Erst-/Zwischenbegrünung\
    \ mehrjährige, \ntief- und intensivwurzelnde Gründüngungspflanzen (insbesondere Luzerne über 3 \nJahre) zu verwenden.\
    \ Eine bodenschonende Folgebewirtschaftung (u.a. grundsätz-\nlich kein Maisanbau in den ersten 5 Jahren) ist einzuhalten."
  - "A81 AS Rottenburg, Ausbau zum Kleeblatt einschließlich Parallelfahrbahnen und \ngrundhafte Erneuerung der B28 im Ausbaubereich\
    \ \n____________________________________________________________________________________________________________ \n \n\
    3 \n \n1.4.5 \nKabelkanäle \n27 \n1.4.6 \nVer- und Entsorgungsleitungen \n27 \n1.4.7 \nFahrbahndecken \n27 \n1.4.8 \n\
