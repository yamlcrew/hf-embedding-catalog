widgetData:
- source_sentence: Was sind einige bemerkenswerte Ereignisse im Leben von Andrea Sawatzki, die in diesem Textausschnitt erwähnt
    werden?
  sentences:
  - Die "White Galloways" sind ebenfalls hornlose schottische Rinder, die zur ganzjährigen Freilandhaltung geeignet sind und
    zu den extensiven, robusten Fleischrinderrassen gehören. Der Hauptanteil ihres Fells ist nahezu weiß, es gibt aber meist
    schwarze, mitunter auch blonde oder rot-braune Pigmentierung an Ohren, Maul, Füßen und um die Augen.
  - 2003 stand Sawatzki für eine erotische Fotoserie in der April-Ausgabe des "Playboy" vor der Kamera. 2007 war sie Patin
    des Deutschen Kinderpreises. 2011 tanzte sie in der 4. Staffel der RTL-Tanzshow "Let’s Dance" mit dem italienischen Profitänzer
    Stefano Terrazzino und belegte den achten Platz.
  - Die Elektroejakulation ist eine in der Human- und Veterinärmedizin sowie in der Tierzucht eingesetzte Methode zur Spermiengewinnung,
    wenn die Gewinnung auf natürlichem Wege aufgrund von besonderen Umständen oder Erkrankungen nicht möglich ist, und unterscheidet
    sich in der Art der Durchführung sowie in der Wirkungsweise erheblich von der erotischen Elektrostimulation.
- source_sentence: Er belegte den fünften Platz im Gesamtweltcup der Skispringer und gewann bei der nordischen Ski-WM 1999
    in Ramsau Silber im Einzelwettbewerb und Gold beim Mannschaftsspringen von der Großschanze.
  sentences:
  - In der Saison 1998/99 belegte er im Gesamtweltcup der Skispringer den fünften Platz. Bei der nordischen Ski-WM 1999 in
    Ramsau gewann er im Einzelwettbewerb von der Großschanze Silber hinter Martin Schmitt sowie beim Mannschaftsspringen von
    der Großschanze Gold.
  - Die georgische Verfassung vom 24. August 1995 garantiert die Pressefreiheit und verbietet Zensur. Sie verbietet zugleich,
    die Medien oder ihre Verbreitung zu monopolisieren. Das am 17. Juni 2004 novellierte Pressegesetz erschwert es Klägern,
    Journalisten wegen ihrer Berichterstattung zu belangen. Zuvor waren Redakteure wegen angeblicher Ehrverletzung zu hohen
    Schadensersatzbeträgen verurteilt worden.
  - 'Um unerwünschten Zugriff zu erschweren, werden Schrauben mit außergewöhnlichen Antrieben am Kopf verwendet:'
- source_sentence: Warum durfte Galileo Galilei im Dezember 1633 nach fünf Monaten in seine Villa "Gioiella" in Arcetri zurückkehren,
    blieb jedoch weiterhin unter Hausarrest und durfte keine Lehrtätigkeit ausüben?
  sentences:
  - Mit dem Linken-Abgeordneten Lutz Heilmann saß zudem erstmals ein hauptamtlicher Mitarbeiter des Ministeriums für Staatssicherheit
    im Bundestag. 2009 wurde in Brandenburg erst nach der Landtagswahl durch Medienberichte die MfS-Tätigkeit von drei Landtagsabgeordneten
    der Linken bekannt. Die Zahl der ehemaligen MfS-Mitarbeiter in der Fraktion erhöhte sich damit auf sieben, die MfS-Tätigkeit
    von vier weiteren Linke-Abgeordneten war bereits vor der Wahl bekannt. Dies führte zu Diskussionen über die Fortführung
    der rot-roten Landesregierung.
  - Der Grund für die verringerte Höchstgeschwindigkeit von in Doppeltraktion verkehrenden Zügen, welche mit beiden Triebköpfen
    aneinander gekuppelt werden, liegt in der Vermeidung von mechanischen Überlastungen der Oberleitung. Um die Oberleitungen
    zu schonen, muss ein Mindestabstand von 200 Metern zwischen aktiven Stromabnehmern eingehalten werden. Außerdem soll ein
    durch starkes Aufschaukeln der Oberleitung erzeugter Kontaktabriss mit Lichtbogenbildung verhindert werden.
  - Nach fünf Monaten, im Dezember 1633, durfte er in seine Villa "Gioiella" in Arcetri zurückkehren, blieb jedoch unter Hausarrest,
    verbunden mit dem Verbot jeglicher Lehrtätigkeit. Als er wegen eines schmerzhaften Leistenbruchs um Erlaubnis bat, Ärzte
    in Florenz aufsuchen zu dürfen, wurde sein Gesuch abgelehnt mit der Warnung, weitere solche Anfragen würden zu Aufhebung
    des Hausarrestes und Einkerkerung führen.
- source_sentence: Lina Przyballa stammt aus Polen und unterstützt Biberkopf in seinem neuen Geschäft, indem sie ihm hilft
    Zeitungen zu verkaufen.
  sentences:
  - Die Seitenstrangangina (Angina lateralis) ist eine akute Form der Rachenentzündung durch bakterielle Infektion, welche
    jene Lymphbahnen im Rachenraum befällt, die von der oberen hinteren Rachenwand abwärts verlaufen. Häufige Begleiterscheinungen
    der Seitenstrangangina sind Ohrenschmerzen (wegen der Nähe zur Eustachischen Röhre), Schluckbeschwerden und Kopfschmerzen.
    Die Seitenstrangangina tritt vor allem bei tonsillektomierten Patienten auf.
  - Zu Beginn des Kapitels wird aus vielen kleinen Teilen ein Bild Berlins gezeichnet. Biberkopf treibt sich auf dem Rosenthaler
    Platz herum („Der Rosenthaler Platz unterhält sich“). In einer Versammlung werden ihm von einem aufgebrachten Redner Papiere
    angedreht, die ihn als ambulanten Gewerbetreibender für Textilwaren ausweisen. Er beginnt mit dem Verkauf von Schlipshaltern.
    Später entscheidet er sich für den Verkauf von Zeitungen (zuerst Zeitschriften für sexuelle Aufklärung), worin er auch
    durch seine neue Freundin, die Polin Lina Przyballa, unterstützt wird. In einer Kneipe trifft er auf einen betrunkenen
    Invaliden und beginnt dessen Einstellung zu teilen. Biberkopf, der eigentlich nichts gegen Juden hat und lediglich für
    Ordnung ist, beginnt völkische Zeitungen zu vertreiben. Als er eines Mittags in seine Stammkneipe eintreten will, wird
    er von einigen Linken beobachtet. Im Lokal ziehen sie seine Hakenkreuz-Armbinde hervor und machen sich über Franz lustig.
    Der ehemalige Häftling, offenbar von der gescheiterten Novemberrevolution in den Jahren 1918/1919 enttäuscht und jetzt
    anscheinend zum feindlichen Lager übergewechselt, erinnert die aufgebrachten Gäste vergeblich an den Stellungskrieg bei
    Arras. Am Abend sitzt Biberkopf wieder in seiner Kneipe und wird diesmal von einigen Linken angegriffen. Wegen der drohenden
    Schlägerei fordert der Wirt Henschke Biberkopf zum Verlassen seines Lokals auf. Biberkopf tobt und brüllt seine Gegner
    nieder. Er geht mit Lina weg, die auf eine richtige Verlobung hofft.
  - Am 25. August 1933 trat das Ha’avara-Abkommen („Transfer“) zwischen der Jewish Agency, der Zionistischen Vereinigung für
    Deutschland und dem deutschen Reichsministerium für Wirtschaft in Kraft, um die Emigration deutscher Juden nach Palästina
    zu erleichtern und zugleich den deutschen Export zu fördern. Bis zum Jahresende emigrierten etwa 37.000 der 525.000 in
    Deutschland lebenden Juden, die meisten (ca. 73 %) zogen zunächst in die europäischen Nachbarstaaten, 19 % nach Palästina,
    8 % entschieden sich für ein Land in Übersee. In den Folgejahren bis 1937 blieb die jährliche Zahl der Auswanderer weit
    unter dem Wert im Jahr der Machtergreifung (1934 waren es 23.000, 1935 21.000, 1936 25.000 und 1937 23.000). Die zionistischen
    Vereine wuchsen bis 1934 auf 43.000 Mitglieder.
- source_sentence: Das Rebhuhn erreicht normalerweise gegen Ende des ersten Lebensjahres die Geschlechtsreife und hat in der
    Regel zu diesem Zeitpunkt auch die erste Verpaarung.
  sentences:
  - 'Traditionell ist Schmallenberg seit dem 19. Jahrhundert Zentrum der Sauerländer Textilindustrie (größtes Unternehmen:
    Falke-Gruppe). Da die Entwicklung der Textilindustrie jedoch rückläufig ist, dominieren mittelständische Unternehmen.
    Diese sind vor allem in Industrie und Handwerk angesiedelt. Zu den bedeutenden Schmallenberger Unternehmen gehören die
    Firmen Audiotec Fischer GmbH (Car-Hifi: Brax / Helix), die Burgbad AG (Badmöbelhersteller mit Sitz in Bad Fredeburg) und
    Transfluid Maschinenbau GmbH (Weltmarktführer bei Rohrbearbeitungsmaschinen der gesteuerten Roll-Umformtechnik (inkrementell))
    sowie die Firma Feldhaus (Bau- und Bergbauunternehmen). Auf Grund der waldreichen Lage kommt der Holzwirtschaft eine wichtige
    Bedeutung zu. In Bad Fredeburg existiert etwa ein Holzgewerbepark, der kleinen und mittleren Unternehmen Gewerbefläche
    bietet. Einen großen Anteil am Dienstleistungssektor haben aufgrund der landschaftlich reizvollen Lage und der Wintersportmöglichkeiten
    Gastronomie und Fremdenverkehr.'
  - Am 10. März 2022 wurde durch Recherchen des Politikmagazins Kontraste und der Zeitung Die Zeit bekannt, dass Deripaska
    von den ebenfalls erlassenen EU-Sanktionen wieder ausgenommen und von der Liste gestrichen wurde. Die Hintergründe dieser
    Entscheidung waren unklar.
  - Das Rebhuhn erreicht die Geschlechtsreife gegen Ende des ersten Lebensjahres. Zu diesem Zeitpunkt erfolgt in der Regel
    auch die erste Verpaarung. Das Rebhuhn führt eine monogame Brutehe. Diese beschränkt sich in der Regel auf eine Jahresbrut,
    bei frühem Gelegeverlust ist jedoch ein Nachgelege möglich. Die Legezeit liegt in den meisten Verbreitungsgebieten zwischen
    Mitte/Ende April und Anfang/Mitte Mai.
