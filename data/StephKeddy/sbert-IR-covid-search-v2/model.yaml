widgetData:
- source_sentence: animal models of COVID-19
  sentences:
  - lack of small animal model hinders mers coronavirus research [SEP] lack of small animal model hinders mers coronavirus
    research
  - interferon alfacon1 is an inhibitor of sars-corona virus in cell-based models [SEP] preliminary data examining interferon
    alfacon1 treatment of sars-cov (severe acute respiratory syndrome-corona virus)-infected patients suggests this therapy
    is well tolerated and of therapeutic benefit. in a cytopathic effect protection (cpe) assay, interferon alfacon1 inhibited
    the generation of cpe in a dose-dependent manner with an ic50 of 0.001g/ml, a clinically achievable level.
  - a case of novel coronavirus disease 19 in a chronic hemodialysis patient presenting with gastroenteritis and developing
    severe pulmonary disease [SEP] novel coronavirus disease 2019 (covid-19) is a highly infectious, rapidly spreading viral
    disease with an alarming case fatality rate up to 5. during this interval, he reported nausea, vomiting, diarrhea, and
    low-grade fevers but was not suspected of covid-19 infection until he developed respiratory symptoms and was admitted
    to the hospital.
- source_sentence: animal models of COVID-19
  sentences:
  - lack of small animal model hinders mers coronavirus research [SEP] lack of small animal model hinders mers coronavirus
    research
  - 'the novel coronavirus outbreak: what can be learned from china in public reporting [SEP] the new coronavirus outbreak
    gets everyones attention. in this article we discuss chinas practice in public reporting and its implications to global
    health.'
  - a screen of the nih clinical collection small molecule library identifies potential anti-coronavirus drugs [SEP] with
    the recent emergence of middle east respiratory syndrome coronavirus in humans and the outbreak of devastating porcine
    epidemic diarrhea coronavirus in swine, therapeutic intervention is urgently needed. since the nih clinical collection
    consists of compounds that have already been through clinical trials, these small molecule inhibitors have a great potential
    for rapid development as anti-coronavirus drugs.
- source_sentence: Papers that describe the results  of testing drugs that bind to spike proteins of the virus or any other
    drugs in any animal models. Papers about SARS-CoV-2 infection in cell culture assays are also relevant.
  sentences:
  - chapter 11 manufacturing vaccines for an emerging viral infectionspecific issues associated with the development of a
    prototype sars vaccine [SEP] the world was struck by surprise when a severe acute respiratory syndrome (sars) epidemic
    started in 2003 in china. we will emphasize the industrial perspectives on inactivation and decontamination experiments,
    the selection of the most promising vaccine candidate, the production process and the choice and use of animal models
    in such a pressing and difficult situation.
  - 'covid-19: gastrointestinal manifestations and potential fecaloral transmission [SEP] covid-19: gastrointestinal manifestations
    and potential fecaloral transmission'
  - alisporivir inhibits mers- and sars-coronavirus replication in cell culture, but not sars-coronavirus infection in a mouse
    model [SEP] currently, there is no registered treatment for infections with emerging zoonotic coronaviruses like sars-
    and mers-coronavirus. ribavirin was found to further potentiate the antiviral effect of alisporivir in these cell culture-based
    infection models, but this combination treatment was unable to improve the outcome of sars-cov infection in a mouse model.
- source_sentence: what types of rapid testing for Covid-19 have been developed?
  sentences:
  - what should gastroenterologists and patients know about covid-19 [SEP] what should gastroenterologists and patients know
    about covid-19
  - 'emergence of a novel coronavirus disease (covid-19) and the importance of diagnostic testing: why partnership between
    clinical laboratories, public health agencies, and industry is essential to control the outbreak [SEP] emergence of a
    novel coronavirus disease (covid-19) and the importance of diagnostic testing: why partnership between clinical laboratories,
    public health agencies, and industry is essential to control the outbreak'
  - 'rapid surveillance of covid-19 in the united states using a prospective space-time scan statistic: detecting and evaluating
    emerging clusters [SEP] coronavirus disease 2019 (covid-19) was first identified in wuhan, china in december 2019, and
    is caused by severe acute respiratory syndrome coronavirus 2 (sars-cov-2). the space-time prospective scan statistic detected
    active and emerging clusters that are present at the end of our study periods notably, 18 more clusters were detected
    when adding the updated case data.'
- source_sentence: coronavirus quarantine
  sentences:
  - age profile of susceptibility, mixing, and social distancing shape the dynamics of the novel coronavirus disease 2019
    outbreak in china [SEP] strict interventions were successful to control the novel coronavirus (covid-19) outbreak in china.
    daily contacts were reduced 7-9 fold during the covid-19 social distancing period, with most interactions restricted to
    the household.
  - 'the economic impact of quarantine: sars in toronto as a case study [SEP] objectives over time, quarantine has become
    a classic public health intervention and has been used repeatedly when newly emerging infectious diseases have threatened
    to spread throughout a population. results our results indicate that quarantine is effective in containing newly emerging
    infectious diseases, and also cost saving when compared to not implementing a widespread containment mechanism.'
  - 'quantifying the impact of community quarantine on sars transmission in ontario: estimation of secondary case count difference
    and number needed to quarantine [SEP] background: community quarantine is controversial, and the decision to use and prepare
    for it should be informed by specific quantitative evidence of benefit. methods: using data from the 2003 ontario, canada,
    sars outbreak, two novel expressions for the impact of quarantine are presented.'
