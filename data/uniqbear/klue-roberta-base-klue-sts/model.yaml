- source_sentence: 그리고 다필요없고 호스트분이 짱이십니다.
  sentences:
  - 그리고 호스트분이 진짜 엄청 친절하십니다
  - 바로 옆에는 패밀리마트와 85도의 커피도 있습니다.
  - 메일 관리에 불필요한 시간이 소모되지 않도록 윈도우를 설치해서 관리해주세요.
- source_sentence: 짜증내지 마라. 불쾌지수 높을 떄는.
  sentences:
  - 따라서 신경세포 사망 전 신경단계의 원인과 과정을 이해하는 것이 중요합니다.
  - 또한, 우리는 한국의 실업 지원 제도인 국가 고용 지원 제도를 가능한 한 빨리 시행할 것입니다.
  - 불쾌지수 높을 때 짜증내지 마.
- source_sentence: 1인당 1주일에 타올이 1개 지급이라고 합니다!
  sentences:
  - 최대 얼마나 되는 기간동안 네이버 쪽지를 저장 가능한가요?
  - 더블침대 4개에 싱글침대 1개 그리고 쇼파도 넓은 편이에요!
  - 방이 총 3개고 다 다른 게스트들 끼리 사용합니다.
- source_sentence: 첫 에어비앤비 2일 잘 보내고 갑니다.
  sentences:
  - 그래도 싼가격에 적당히 잘 이용하고갑니다.
  - 그리고 진짜 바로 앞에 마트있어서 장보기도  편해요.
  - 겨울에는,, 그것 외에는 너무너무 좋았습니다
- source_sentence: 수강생이 보낸 메일은 절대 지워서 안됩니다.
  sentences:
  - 메일을 보낸 사람이 수강생인건 지우지 마세요
  - 청소기 말고 티비 켜는 음성 명령 방법은 뭐니?
  - 입소기간 동안에는 외부 출입 및 면회는 금지되며, 각자 객실 내에서 도시락으로 식사를 한다.
