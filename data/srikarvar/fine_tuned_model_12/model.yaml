- source_sentence: A major distinction between a ProductList and an InventoryList is that a ProductList allows for random
    access to the items, while an InventoryList updates gradually as it is navigated.
  sentences:
  - The how-to guides for the platform include Setup, Processing, Streaming, TensorFlow integration, PyTorch integration,
