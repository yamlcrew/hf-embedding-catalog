  - “ጠይቄ አስጠየቄ እስኪ ልቋጠራት፣የእነ ብረት አስጥል የእነ ንቦ ዘር ናት”ማኅጸነ ለምለም፣ ዙፋን ላይ ሆና የምትፈርድ፣ ሲርብ በእናት አንጄት የምታጎርስ፣ ሲከፋ የምትዳስስ፣ ሲታረዙ የምታለብስ፣
