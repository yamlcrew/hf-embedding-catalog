  -  የአዲስ አበባ ከተማ አስተዳደር በተለምዶ ቆሼ ተብሎ በሚጠራው አካባቢ የቆሻሻ ክምር ተደርምሶ በደረሰው አደጋ የሰው ሕይወትና ንብረት በመጥፋቱ የተሰማውን ጥልቅ ሃዘን ገለጸ።በኮልፌ ቀራኒዮ
    ክፍለ ከተማ ወረዳ አንድ  በተለምዶ ቆሼ በተባለው አካባቢ አደጋው የደረሰው ትናንት ከምሽቱ 2:00 ገደማ ነው።የአዲስ አበባ ከተማ አስተዳደር ኮሙኒኬሽን ጉዳዮች ቢሮ ለኢትዮጵያ ዜና አገልግሎት
    በላከው መግለጫ፤ አስተዳደሩ በተከሰተው አደጋ ሕይወታቸውን ላጡ ቤተሰቦች የተሰማውን ልባዊ ሐዘን በራሱና በከተማዋ ነዋሪዎች ስም ገልጿል።
  - 'የአማራ የሱማሌ ክልሎች ህዝቦች የህዝብ ለህዝብ ግንኙነት መድረክ ከዛሬ (ሀምሌ 12/2011 ዓ.ም) ጀምሮ ለሦስት ተከታታይ ቀናት በባህዳር ከተማ እንደሚካሄድ የአማራ ክልል የመንግሥት ኮሙዩንኬሽን
    ጉዳዮች ዋና ዳይሬክተር አስታወቁ፡፡ ዳይሬክተሩ አቶ አሰመኸኝ አስረስ ትናንት ለጋዜጠኞች በሰጡት መግለጫ እንደገለጹት፤ በሱማሌ ክልል ፕሬዚዳንት የሚመራ ኡስታዞችን፣ የጎሳ መሪዎችንና የሃይማኖት
    አባቶችን ያካተተው የልዑካን ቡድን ወደ ባህር ዳር ገብቷል፡፡ የአማራ ክልል ህዝብ ተወካዮች በሚገኙበት የሁለቱን ክልሎች ህዝቦች የህዝብ ለህዝብ ትስስር የሚያጠናክሩ የተለያዩ ውይይቶችና ጉብኝቶች
    ይካሄዳሉ ተብሎ እንደሚጠበቅ አቶ አሰመኸኝ ገልጸዋል፡፡ ‹‹የሁለቱ ክልሎች ህዝቦች አብሮነት ታሪካዊ ነው›› ያሉት አቶ አሰመኸኝ፤ ሁለቱ ህዝቦች የአገር ሉዓላዊነት ለማስከበር በተደረጉ ትግሎች
    በጋራ መሰወታቸውን አንስተዋል፡፡ ሁለቱ ህዝቦች የተዋለዱ መሆናቸውንም አንስተው.፤ የህዝቡ አብሮነት የሚቀጥል ነው

    ብለዋል፡፡ እንደ አቶ አሰመኸኝ ማብራሪያ፤ የአማራ ክልል ከአጎራባች ህዝቦች ጋር የህዝብ ለህዝብ ግንኙነቱን ለማጠናከር የተለያዩ መድረኮችን ሲያከናውን ቆይቷል፡፡ ይህንንም አጠናክሮ ይቀጥላል፡፡
    ዳይሬክተሩ አክለውም እንደገለጹት፤ ሀምሌ 15 የክልሉ ምክር ቤት ጉባኤውን ይጀምራል፡፡ በጉባኤው የተለያዩ አጀንዳዎች ተቀርጸው ውይይት ይደረጋል፡፡ ከአጀንዳዎቹ መካከል የክልሉን ርዕሰ መስተዳድር
    ሹመት መርምሮ ያፀድቃል፡፡ የተለያዩ እንግዶች በተገኙበት በዓለ ሲመት ይካሄዳል፡፡ አዲስ ዘመን ሐምሌ 12/2011'
  - አዲስ አበባ፣ የካቲት 29፣ 2012(ኤፍ.ቢ.ሲ )የዘንድሮው አለም አቀፍ የሴቶች ቀን (ማርች 8) በተለያዩ ዝግጅቶች እየተከበረ ነው፡፡ዓለም አቀፍ የሴቶች ቀን የሴቶችን የእኩልትና የፍትሃዊነት
    ችግሮችን ለመፍታት እንቅስቃሴ የተጀመረበት ቀን መሆኑን ይገለጸል፡፡ስለሆነም የዘንድሮው አለም አቀፍ የሴቶች ቀን በአለም አቀፍ ደረጃ ለ109ኛ ጊዜ በሀገራችን ደግሞ ለ44ኛ ጊዜ በመከበር
    ላይ ነው፡፡በሀገራችን የሚከበረው የሴቶች ቀን “የሴቶች ደህንነትና መብት መከበር ለሰላማችንና ለህልውናችን መሰረት ነው” በሚል መሪ ቃል ነው በተለያዩ ፕሮግራሞች እየተከበረ የሚገኘው፡፡በዚህ
    መሪ ቃል መከበሩ የሴቶችን መብትና ደህነት ማስከበር እንዲሁም በሁሉም መስኮች ያላቸውን ተሳትፎ ማሳደግና ጥቅማቸውን ማስጠበቅ የስርዓተ – ጾታ እኩልነትን ከማስፈን ባሻገር ድህነትን በመዋጋት
    የዘላቂ ልማት ግቦችን እውን ለማድረግ ያለመ መሆኑ ተገልጿል፡፡ከዚያም ባለፈ መሪ ቃሉ ሴቶች ለማህበረሰብ ለውጥ፣ ለአገር እድገትና ብልጽግና በአጠቃላይም ለሰላማችንና ለህልውናችን ወሳኝና ጉልህ
    አስተዋጽኦ እንደሚያበረክቱ ለማህበረሰቡ አጽዕኖት ሰጥቶ ለማስገንዘብና የሴቶችን መብትና ደህንነት በማስከበር ረገድም የሚመለከታቸው አካላት የድርሻቸውን እንዲወጡ የጋራ መግባባት ለመፍጠር መሆኑን
    ከሴቶች፣ ህጻናትና ወጣቶች ሚኒስቴር ያገኘነው መረጃ ያመለክታል፡፡የኢ.ፌ.ዲ.ሪ ጠቅላይ ሚኒስትር ዶክተር ዐቢይ አህመድም ዛሬ እየተከበረ ያለውን የሴቶች ቀን አስመልክትው በትናትናው እለት
    የእንኳን አደረሳችሁ መልዕክት አስተላልፈዋል።በዚህ መልዕክታቸው የሴቶችን በዓል የምናከብረው የሁላችን በዓል ስለሆነ ነው፡፡በተለይ እኛ ኢትዮጵያውያን የቆምነው እናቶቻችን በከፈሉት ዋጋ በመሆኑ
    በዓሉ ልዩ ይሆንብናል ብለዋል፡፡ኢትዮጵያ ታፍራና ተከብራ የኖረች ሀገር ናት ስንል አሳፍረው የሚያስከብሯት እናቶችና እኅቶች ነበሯት፤ አሏት ማለታችን ነው ብለዋል ጠቅላይ ሚኒስትሩ፡፡አያይዘውም
    ኢትዮጵያ በነጻነት ጸንታ እንድትኖር እናቶቻችንና እኅቶቻችን በአራት ዐውደ ግንባር ዋጋ ከፍለዋል፡፡ ጀግና ፈጥረዋል፤ ለጀግና የሚሆነውን ስንቅ አዘጋጅተዋል፡፡ ጀግኖችን ተንከባክበዋል፡፡ እነርሱ
    ራሳቸውም በጀግንነት ተዋግተው ድል አድርገዋልም ብለዋል፡፡ማርች ስምንትን ስናከብር ኢትዮጵያ ኅብረ ብሔራዊ አንድነቷ ተከብሮ፣ ሉዓላዊነቷ ተጠብቆ፣ በክብርና በነጻነት እንድትኖር ለማድረግ እናቶቻችንና
    እኅቶቻችን እንደገና የሚነሡበት ቀን እንደሚሆን ተስፋ እናደርጋለንም ነው ያሉት፡፡
- source_sentence: '"በሠብዓዊ መብት አስከባሪዎች ላይ የሚደርሰው ጥቃት ጫፍ ደርሷል" - አምነስቲ ኢንተርናሽናል'
  sentences:
  - ' ከሃኪንግ ቲም የገበያና ሽያጭ ሥራ አስኪያጅ ኤሪክ ሬብ ጋር የተደረገውን ሙሉ ቃለ-ምልልስ ከሥር ካለው የድምፅ ፋይል ያዳምጡ የኢትዮጵያ መንግሥት የሚንቀሣቀሰው የራሱንም የሌሎችንም ሕጎች
    ባከበረ ሁኔታ ነው ሲሉ አንድ የኢትዮጵያ ዲፕሎማት መንግሥቱ ያካሂደዋል ስለሚባለው ዲጂታል ጥቃት ሲጠየቁ መልስ ሰጥተዋል፡፡ቴክኖሎጂውን ይሸጣል የሚባለው የጣልያን ድርጅት ደግሞ አገልግሎቱ
    መብቶችን ለመርገጥ እንዲውል እንደማይፈቅድ አስታውቋል፡፡የኢትዮጵያ መንግሥት በኢንተርኔት ጥቃት ያካሂዳል ሲል ሂዩማን ራይትስ ዋች የሚባለው የመብቶች ተሟጋች ቡድን ላወጣው ሪፖርት ወገኖቹ
    ከቪኦኤ ለቀረቡላቸው ጥያቄዎች ምላሽ ሰጥተዋል፡፡ለዝርዝሩ የተያያዘውን የድምፅ ፋይል ያዳምጡ፡፡'
