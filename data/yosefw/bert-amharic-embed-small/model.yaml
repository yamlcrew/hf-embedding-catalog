  - የኦሮሞ ፌዴራላዊ ኮንግሬስ (ኦፌኮ) ጥቅምት 29/2012 በወልዲያ ዩንቨርሲቲ ተማሪዎች ላይ የተፈፀመዉን የግድያ ወንጀል እና ድብደባ አወገዘ።ኦፌኮ ‹‹የነገን ወጣት ትውልድ በመግደል ደም
    በማፍሰስ እና ሕዝብን አጋጭቶ ሥልጣን ለመያዝ የሚደረገው ሩጫ ይቁም!›› ሲል ባወጣው መግለጫ፤ ‹‹በሕገ ወጦች የተፈጸመውን የተማሪዎች ድብደባ እና እገታን ፓርቲያችን አጥብቆ ያወግዛል››
    ሲል አክሏል።ሕዝብን እርስ በርስ በማጋጨት በማፈናቀል በአቋራጭ ሥልጣን ለመያዝ የሚደረገዉ ጥረት፣ የአገሪቱን ሕዝቦች ወደ ሌላ የማያባራ የእርስ በርስ ግጭት የሚያመራ በመሆኑ ወንጀለኞቹን
    በመያዝ ተገቢዉን ቅጣት እንዲያገኙ ፓርቲዉ ጠይቋል። ለዚህ እኩይ ድርጊት አጸፋ ለመመለስ በሚል ሌላ ግጭት እንዳይፈጠርም ጥንቃቄ እንዲደረግ ሲል አሰስቧል።
  - "በአማራ ክልል ሰኔ 15 ቀን 2011 ዓ.ም ከደረሰው ጥቃት ጋር በተያያዘ ተጠርጥረው በእስር ላይ ከነበሩት ከፍተኛ የፀጥታ ዘርፍ አመራሮች መካከል ሦስቱ በ10 ሺሕ ብር ዋስ ተፈቱ። ዛሬ\
    \ ማምሻውን ከእስር የተለቀቁት፤የአማራ ክልል ልዩ ኃይል ኃላፊ የነበሩት ብሪጋዲየር ጄነራል ተፈራ ፣ የክልሉ ሕዝብ ደህንነትና የሰላም ግንባታ ቢሮ ምክትል ኃላፊ የነበሩት ኮሎኔል አለበል\
    \ አማረና የአማራ ክልል ሚሊሽያ ጽ/ቤት ኃላፊ የነበሩት ኮሎኔል በአምላኩ አባይ መሆናቸውን የክልሉ ጠቅላይ ዐቃቤ ሕግ አቶ ኢዮብ ጌታቸው ለአሜሪካ ድምፅ ተናግረዋል።(ዝርዝሩን ከተያያዘው\
    \ የድምፅ ፋይል ያዳምጡ)\n "
- source_sentence: የኢትዮጵያ አየር መንገድ አውሮፕላንን የጠለፈው ረዳት አብራሪ የአዕምሮ ችግር እንዳለበት ተረጋገጠ
