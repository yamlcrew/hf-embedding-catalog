      ኢትዮጵያ በነጻነት ጸንታ እንድትኖር እናቶቻችንና እኅቶቻችን በአራት ዐውደ ግንባር ዋጋ ከፍለዋል፡፡ ጀግና ፈጥረዋል፤ ለጀግና የሚሆነውን ስንቅ አዘጋጅተዋል፡፡ ጀግኖችን ተንከባክበዋል፡፡
      እነርሱ ራሳቸውም በጀግንነት ተዋግተው ድል አድርገዋልም ብለዋል፡፡ማርች ስምንትን ስናከብር ኢትዮጵያ ኅብረ ብሔራዊ አንድነቷ ተከብሮ፣ ሉዓላዊነቷ ተጠብቆ፣ በክብርና በነጻነት እንድትኖር
      ለማድረግ እናቶቻችንና እኅቶቻችን እንደገና የሚነሡበት ቀን እንደሚሆን ተስፋ እናደርጋለንም ነው ያሉት፡፡
  - source_sentence: '"በሠብዓዊ መብት አስከባሪዎች ላይ የሚደርሰው ጥቃት ጫፍ ደርሷል" - አምነስቲ ኢንተርናሽናል'
    sentences:
    - ' ከሃኪንግ ቲም የገበያና ሽያጭ ሥራ አስኪያጅ ኤሪክ ሬብ ጋር የተደረገውን ሙሉ ቃለ-ምልልስ ከሥር ካለው የድምፅ ፋይል ያዳምጡ የኢትዮጵያ መንግሥት የሚንቀሣቀሰው የራሱንም የሌሎችንም
      ሕጎች ባከበረ ሁኔታ ነው ሲሉ አንድ የኢትዮጵያ ዲፕሎማት መንግሥቱ ያካሂደዋል ስለሚባለው ዲጂታል ጥቃት ሲጠየቁ መልስ ሰጥተዋል፡፡ቴክኖሎጂውን ይሸጣል የሚባለው የጣልያን ድርጅት ደግሞ አገልግሎቱ
      መብቶችን ለመርገጥ እንዲውል እንደማይፈቅድ አስታውቋል፡፡የኢትዮጵያ መንግሥት በኢንተርኔት ጥቃት ያካሂዳል ሲል ሂዩማን ራይትስ ዋች የሚባለው የመብቶች ተሟጋች ቡድን ላወጣው ሪፖርት ወገኖቹ
      ከቪኦኤ ለቀረቡላቸው ጥያቄዎች ምላሽ ሰጥተዋል፡፡ለዝርዝሩ የተያያዘውን የድምፅ ፋይል ያዳምጡ፡፡'
    - 'በአምነስቲ ዘገባ መሠረት፣ በሠብዓዊ መብት አስከባሪዎች ላይ የሚደርሰው ጥቃት ጫፍ ደርሷል።“ፍሮንት ላይን ዲፌንደርስ” በመባል የሚታወቀው ግንባር ቀደም የተከራካሪዎች ቡድን እ.አ.አ
      በ2015 ከነበረው የ156 ሰዎች ሞት ጋር ሲነፃፀር፣ ባለፈው 2016 ዓ.ም. 281 ሰዎች ሠብዓዊ መብት በማስከበር ተግባር ላይ እንዳሉ መሞታቸውን ገልጿል።ለተጨማሪ የተያያዘውን የድምፅ
      ፋይል ያዳምጡ።   '
    - ' የግልገል ጊቤ 3 የኤሌክትሪክ ሃይል ማመንጫ ግድብ በመጭው መስከረም ወር ላይ ሃይል ማመንጨት እንደሚጀምር የውሃ መስኖና ኢነርጂ ሚኒስትር አቶ አለማየሁ ተገኑ ገለፁ፡፡ሚኒስትሩ አቶ
      አለማየሁ እንደተናገሩት፤ የኤሌክትሪክ ሃይል ማመንጫው ግድብ ግንባታ ሰማንያ በመቶ የተጠናቀቀ ሲሆን፤  የሃይል ማመንጨት ስራው በቀጣዩ ዓመት መስከረም የኤሌክትሪክ ኃይል ማመንጨት ይጀምራል፡፡በዚህም
      የሃይል ማመንጨት ስራው በቀጣዩ ዓመት መስከረም ይጀመራል ያሉት ሚኒስትሩ፤ ፕሮጀክቱ ሙሉ ለሙሉ ሲጠናቀቅም 1 ሺ 870 ሜጋ ዋት የኤሌክትሪክ ሀይል እንደሚያመንጭም ነው ሚኒስትሩ የተናገሩት።
      በተያያዘም 254 ሜጋ ዋት የሚያመነጨው የገናሌ ግድብ፤ የአዳማ ሁለት የነፋስ ሃይል ማመንጫና ሌሎች የኤሌክትሪክ ሀይል ማመንጫ ፕሮጄክቶች ግንባታም በጥሩ ሁኔታ እየተካሄደ ነው። ፕሮጄክቶቹ
      ተጠናቀው ሀይል ማመንጨት ሲጀመሩ ሀገሪቱ የራሷን ፍላጎት ከማሟላት አልፋ ለጎረቤት ሀገራት የኤሌክትሪክ ሀይል እንድትሸጥ ያስችላታል ማለታቸውን ኢዜአ ዘግቧል። '
  - source_sentence: “ጠይቄ አስጠየቄ እስኪ ልቋጠራት፣ የእነ ብረት አስጥል የእነ ንቦ ዘር ናት”
    sentences:
    - "«የእኔ ዕድሜ እኮዮች የተማርነው እንዴት ነበር?» ሲል ይጠይቃል የዛሬው የጋቢና ቴክ ተረኛ አቅራቢ ሀብታሙ ስዩም።ደግሞም ለራሱ ይመልሳል «ደብተር እና ብዕር ሸክፈን ፣መምህር አለበት\
      \ ወደተባለበት ትምህርት ቤት በአጀብ ተመን አልነበረምን?» በማለት። የቀጣይ ዘመን ትምህርት ግን ከዚያ ልማድ ለወጥ የሚል መሆኑን ፍንጭ የሚያሳዩ ግኝቶች ብቅ ብለዋል። ወደ ትምህርት\
      \ ቤት ከሚያቀኑ ብላቴናዎች ይልቅ ወደ ብላቴናዎች የሚመጣ ትምህርት፣እና መምህር ልናይ እንችላለን ።ለዚያ ማሳያ እንዲሆን ስለ አንድ የበይነመረብ ላይ አስኳላ፣ በቀጣይ ዘገባው ይነግረናል\
      \ ።ሙሉ መሰናዶውን ያዳምጡ ፦\n "
    - ' በኦሮሚያ ክልል አሰላ ከተማ፣ በጉጂ ዞን፣ በሃርቀሎ ወረዳና በሆሮ ጉዱሩ፤ በወለጋ ኢበንቱ ወረዳ ተማሪዎችና ነዋሪዎች ድብደባ እየተፈፀመባቸውና በመከላከያ አባላት እየታሠሩ መሆናቸውን
      እየተናገሩ ነው፡፡አንድ የአሰላ ከተማ ነዋሪ ባለፉት አምስት ቀናት ውስጥ የአንደኛ፣ የሁለተኛና የመሰናዶ ትምህርት ቤቶች ተማሪዎች ሠላማዊ ሠልፍ ወጥተው የአዲስ አበባን የአካባቢዋን ከተሞች
      የተቀናጀ ልማት ማስተር ፕላንና ኦሮሚያ ውስጥ ይካሄዳል ያሉትን እሥራትና ግድያ መቃወማቸውን ገልፀዋል፡፡አንዲት የአንደኛ ደረጃ ተማሪ ከሰልፉ ወቅት ስትሮጥ ሽቦ ላይ ወድቃ የአንድ ዐይኗን
      ብርሃን ለማጣት መዳረጓን የከተማይቱ ባለሥልጣናት ተናግረዋል፡፡አንድ የከተማይቱ ነዋሪ ደግሞ ሆዷ ላይ በዱላ ተመትታ በብርቱ መጎዳቷን አመልክተው ትምህርት ተቋርጦ ከተማይቱ በጦር እየተጠበቀች
      ነው ብለዋል፡፡ለተጨማሪ የተያያዘውን የድምፅ ፋይል ያዳምጡ፡፡'
    - “ጠይቄ አስጠየቄ እስኪ ልቋጠራት፣የእነ ብረት አስጥል የእነ ንቦ ዘር ናት”ማኅጸነ ለምለም፣ ዙፋን ላይ ሆና የምትፈርድ፣ ሲርብ በእናት አንጄት የምታጎርስ፣ ሲከፋ የምትዳስስ፣ ሲታረዙ የምታለብስ፣
      ሀገር ሲጠቃ የምትተኩስ ሴት ከወዴት አለች? ቢባል ከኢትዮጵያ ነው።እንደ እናት ታዝናለች፣ ትፀልያለች፣ አሳምራ ታሳድጋለች፣ እንደ አባት ታስታጥቃለች፣ ለራሷም ትታጠቃለች፣ እንደ አርበኛ
      ትተኩሳለች፣ መቀነት ታጥቃ እንዳይፈታ አጥብቃ ጠላትን በመመለስ ለሀገር ጠበቃ ትሆናለች። የሌላው ዓለም እናት ጀግና ልትወልድ ትችላለች፣ የኢትዮጵያ እናት ግን ጀግና ወላድ ብቻ ሳትሆን
      ጀግናም ናት።በኢትዮጵያ በተለያዩ ዘመናት በተደረጉ ጦርነቶች ሴቶች ደጀን ሆነው በመተኮስ፣ ወገን ሲጎዳ ደም በማበስ፣ ሲሞት አፈር በማልበስ፣ ሲራብ በማጉረስ፣ የከፋ ጉዳት እንዳይደርስ
