      በተለይም በውጊያ ወቅት ረሃብና ጥም አለ፤ ይህ ግን ለእነዚያ ሴት የልዩ ኃይል አባላት ካላማቸው አላስቀራቸውም።ለአማራና ለመላው የኢትዮጵያ ሕዝብ ሲባል ድካም አይደለም ሌላ ነገር ቢመጣ
      አይቆጨንም፣ ሁሉም በያለበት በወኔና በቁርጠኝነት መሥራት አለበት ነው ያሉት። “ኢትዮጵያዊነት እና ኢትዮጵያውያን እስከ መቼ ነው የሚጨቆኑት የሚለው ለትግል አስነስቶናል፣ በቀጣይም ለሚኖር
      ግዳጅ ወደኋላ አንልም፣ ለኢትዮጵያ አለንላት፣ ጀግንነታችንና ወኔያችን የተሟላ ነው፣ አይዞሽ እናታለም፣ ኩራትሽ ነን” ሲሉ ነበር በወፍላ ተራራዎች ካገኘኋቸው ጀግና ሴት የልዩ ኃይል አባላት
      የሰማሁት።“ጥንካሬ፣ ቆራጥነት፣ ፍቅርና አይበገሬነት አለባቸው። ኢትዮጵያን ሰላም እናደርጋታለን፣ ጀግንነታችን እና ወኔያችን ስንቅ አድርገን እንቀጥላለን፣ ኢትዮጵያም በእኛ ትኮራለች” ነበር
      ያሉኝ።ሴት የልዩ ኃይል አባላት የቀደሙት ጀግና ኢትዮጵያዊ እናቶችን ታሪክ ለመድገም ዝግጁ እንደሆኑም ነግረውኛል።ኢትዮጵያ ጉድብ ውስጥ አድራ አይዞሽ እናታለም አለሁልሽ የምትል ጀግና ሴት
      እና ከሞቀ ቤት እያደረ ሀብቷን የሚዘርፍ በጉያዋ ይዛለች። በአንደኛዋ ትኮራለች በአንደኛው ታዝናለች። መኩሪያ መሆን ቢያቅት ማፈሪያ ላለመሆን መሥራት መልካም ነው።“ጠይቄ አስጠየቄ እስኪ
      ልቋጠራት፣የእነ ብረት አስጥል የእነ ንቦ ዘር ናት” አዎ ጠይቄ ዘሯን አውቂያለሁ። ኩሩ ኢትዮጵያዊት ናት። ኩሩ ኢትዮጵያውያን ናቸው። እንዲህ አይነት ሴት ድሮስ ከዬት ሊገኝና፣ ብንችል
      ኢትዮጵያ ትኩራብን፣ ሰንደቁ ከፍ ይበልልን፣ ባንችል ግን ኢትዮጵያ አትፈርብን፣ ክብር ሁሉ ኢትዮጵያን ላከበሯት።
