  sentences:
  - "«የእኔ ዕድሜ እኮዮች የተማርነው እንዴት ነበር?» ሲል ይጠይቃል የዛሬው የጋቢና ቴክ ተረኛ አቅራቢ ሀብታሙ ስዩም።ደግሞም ለራሱ ይመልሳል «ደብተር እና ብዕር ሸክፈን ፣መምህር አለበት ወደተባለበት\
    \ ትምህርት ቤት በአጀብ ተመን አልነበረምን?» በማለት። የቀጣይ ዘመን ትምህርት ግን ከዚያ ልማድ ለወጥ የሚል መሆኑን ፍንጭ የሚያሳዩ ግኝቶች ብቅ ብለዋል። ወደ ትምህርት ቤት ከሚያቀኑ ብላቴናዎች\
    \ ይልቅ ወደ ብላቴናዎች የሚመጣ ትምህርት፣እና መምህር ልናይ እንችላለን ።ለዚያ ማሳያ እንዲሆን ስለ አንድ የበይነመረብ ላይ አስኳላ፣ በቀጣይ ዘገባው ይነግረናል ።ሙሉ መሰናዶውን ያዳምጡ\
