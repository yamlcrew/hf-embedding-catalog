      ላይ የሚታየውን የተመጣጠነ ምግብ እጥረት እንዲሁም ያለእድሜ ጋብቻ፣ ጠለፋ፣ ተገዶ መደፈርና የሴት ልጅ ግርዛትን ከሚመለከታቸው አካላት ጋር በመተባበር ለመከላከል እንደሚሰሩ ጽህፈት ቤቱ
      ለዋልታ በላከው መግለጫ አስታውቋል።ትምህርት ድህነትን ለመዋጋት ወሳኝ ቁልፍ መሆኑን በእጅጉ የሚረዱት ቀዳማዊት እመቤቷ እድሜያቸው ለትምህርት የደረሱ ህጻናት ሁሉ መማር እንዲችሉ ጥረት
      እንደሚያደርጉም ነው በመግለጫው የተመለከተው።ለትምህርት ማነቆ  የሚሆኑ ችግሮችን በመለየት ጥራቱን የጠበቀ ትምህርት እንዲያገኙ የበኩላቸውን ጥረት እንደሚያደርጉ ተገልጿል።ቀዳማዊት እመቤት
      ወይዘሮ ዝናሽ  በተለያዩ ማህበራዊ ቀውሶች ሳቢያ በየጎዳናው ያሉ ህጻናትና አረጋውያን መጠለያ፣ ምግብና እንዲሁም አስፈላጊውን የጤና እንክብካቤ አግኝተው ወደ ህብረተሰቡ እንዲቀላቀሉ የሚችሉትን
      ሁሉ ለማድረግ እንደሚሰሩ ጽህፈት ቤቱ አስታውቋል። በተጨማሪም በአዕምሮ ህመም ሳቢያ ለተለያዩ አካላዊና ጾታዊ ጥቃት የሚጋለጡ ዜጎች ተገቢውን የጤና እንክብካቤ እንዲሁም የህግ ድጋፍ እንዲያገኙ
      በትጋት እንደሚሰሩ መግለጫው አትቷል።(ኢዜአ) 
    - የኢትዮጵያ ፕሪምየር ሊግ ሰባተኛ ሳምንት ዛሬ በተደረገ አንድ ጨዋታ ጅማሮውን ሲያደርግ ትግራይ ስታዲየም ላይ ሰበታ ከተማን ያስተናገደው ስሑል ሽረ በሀብታሙ ሽዋለም ብቸኛ የፍፁም ቅጣት
      ምት ጎል አሸንፈዋል።ሽረዎች ከወልቂጤ ጋር አቻ ከተለያየው ስብስብ ሸዊት ዮሐንስ፣ አክሊሉ ዋለልኝ እና ብሩክ ሐድሽን በረመዳን የሱፍ፣ ያስር ሙገርዋ እና ሳሊፍ ፎፋና ተክተው ወደ ሜዳ
      ሲገቡ ሰበታዎችም ወላይታ ድቻን ካሸነፈው ስብስብ ኢብራሂም ከድር ፣ አስቻለው ግርማ እና ሲይላ ዓሊ ባድራን በዳዊት እስጢፋኖስ፣ በኃይሉ አሰፋ እና ናትናኤል ጋንቹላ ተክተው ጨዋታውን ጀምረዋል።ተመጣጣኝ
      ፉክክር በታየበት የመጀመርያው አጋማሽ የጨዋታ ክፍለ ጊዜ እንግዳዎቹ ፍፁም የኳስ ቁጥጥር ብልጫ የወሰዱበት እና ስሑል ሽረዎች በርካታ ሙከራዎች ያደረጉበት ነበር። ስሑል ሽረዎች የተለመደው
      የመስመር አጨዋወት ይዘው ሲገቡ ሰበታዎች ኳስን ተቆጣጥረው የግብ ዕድሎች ለመፍጠር ጥረት አድርገዋል።በጨዋታው የመጀመርያ ሙከራ የያደረጉት ሽረዎች ሲሆኑ ሙከራውም በያሳር ሙገርዋ አማካኝነት
      የተደረገ ነበር። ሽረዎች ከተጠቀሰው ሙከራው ውጭም በርካታ ሙከራዎች አድርገዋል። በተለይም ዲዲዬ ለብሪ ከመስመር ገብቶ መቶት ወንድፍራው ጌታሁን ያወጣው ኳስ ለግብ የቀረበ ነበር። በሀያ
      ሰባተኛው ደቂቃም ሽረዎች ያገኙትን ፍፁም ቅጣት ምት ሀብታሙ ሽዋለም አስቆጥሮ ቡድኑን መሪ ማድረግ ችሏል።ከግቡ መቆጠር በኃላ ወደ ተጋጣሚ ግብ ክልል ቶሎ ቶሎ መድረሳቸው ያላቀሙት ሽረዎች
      ሶስት ወደ ግብ የቀረቡ ሙከራዎች አድርገዋል። ሳሊፍ ፎፋና ተጫዋቾች አታሎ በውሳኔ አሰጣጥ ችግር ያመከነው ወርቃማ ዕድል እና ሀብታሙ ሸዋለው የግብ ጠባቂው መውጣት አይቶ ከርቀት መቶት
      ወንድፍራው ጌታሁን በጭንቅላት ያወጣው ሙከራዎችም እጅግ ለግብ የቀረቡ ሙከራዎች ነበሩ።በአጋማሹ ከኳስ ቁጥጥር ብልጫ አልፈው ለግብ የቀረበ ሙከራ ያላደረጉት ሰበታዎች በናትናኤል ጋንቹላ
      እና በኃይሉ አሰፋ ተግባቦት ጥሩ የግብ ሙከራ ቢፈጥሩም በኃይሉ አሰፋ ኳሱን ወደ ግብነት መቀየር አልቻለም።ባለሜዳዎቹ ስሑል ሽረዎች ተሻሽለው ገብተው በርካታ ዕድሎች የፈጠሩበት ሁለተኛው
      አጋማሽ ሰበታዎች አጨዋወታቸው ወደ ቀጥተኛ እና መስመር አጨወቶች የቀየሩበት ነበር። በአጋማሹ ሙከራ ለማድረግ ቀዳሚ የነበሩት ሰበታዎች ሲሆኑ ፍፁም ገ/ማርያም ከሳጥኑ ጠርዝ ያደረገው ለግብ
      የቀረበ ሙከራ ነበር።ወደ ማጥቃት ያዘነበለውን ቡድን በሚፈጥራቸውን ክፍተቶች በመልሶ ማጥቃት በርካታ ዕድሎች የፈጠሩት ስሑል ሽረዎች ለግብ የቀረቡ ዕድሎች ፈጥረው በተጫዋቾች ውሳኔ አሰጣጥ
      ችግር ምክንያት ዕድሎች አምክነዋል። በተለይም ሳሊፍ ፎፋና ተጫዋቾች አታሎ መቶት ዳንኤል አጃይ በሚያስደንቅ ብቃት ያወጣው ኳስ እና ዓብዱለጢፍ መሐመድ ከኃይለአብ ኃይለሥላሴ አንድ ሁለት
      ተጫውቶ ያመከነው በተጠቀሰው ምክንያት የመከኑ ወርቃማ ዕድሎች ናቸው። ሽረዎች ከተጠቀሱት ሙከራዎች ውጭም በዮናስ ግርማይ እና ዲድየ ሌብሪ አማካኝነት ሙከራዎች አድርገዋል።ከመጀመርያው አጋማሽ
      በተሻለ ንፁህ የግብ ዕድሎች የፈጠሩት ሰበታዎች በአጋማሹ በርካታ ሙከራዎች አድርገዋል። ከነዚህም ባኑ ዱያዋራ ከሀ\ሚካኤል አደፍርስ የተሻገረለትን ኳስ ያመከነው ዕድል እና ራሱ ባኑ ዲያዋራ
      ከሳጥኑ ጠርዝ አክርሮ መቶ ለጥቂት የወጣው ሙከራ ለግብ የቀረቡ ነበሩ። በተጨማሪ ደቂቃ ላይ በፍፁም ገ/ማርያም በሞከሩት ሙከራ አቻ ለመሆንም ተቃርበው ነበር።ውጤቱን ተከትሎ ስሑል ሽረ
      ከወራጅ ቀጠናው በመውጣት ወደ ሰንጠረዡ ወገብ ደረጃውን ሲያሻሽል ሰበታ ከተማ በበኩሉ ከመሪዎቹ ተርታ በጊዜያዊነት የሚሰለፍበትን ዕድል አምክኗል።
    - ከአዲስ አበባ ተነስቶ ወደ ጣሊያን ሮም ከተማ ይበር የነበረውን የኢትዮጵያ አየር መንገድ አውሮፕላን የጠለፈው ረዳት አብራሪ ኃይለ መድኅን አበራ፣ በስዊዘርላንድ የሕክምና ባለሙያዎች የአዕምሮ
      ችግር እንዳለበት ተረጋገጠ፡፡አቶ ኃይለ መድኅን አውሮፕላኑን ለመጥለፍ ያቀደው ቀደም ብሎ ቢሆንም፣ አውሮፕላኑን በጠለፈበት ወቅት ግን የገዛ ድርጊቱን የሚያመዛዝንበት ሁኔታ ላይ እንዳልነበረና
