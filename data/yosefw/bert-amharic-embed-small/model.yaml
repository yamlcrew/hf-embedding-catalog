    የቱሪዝም ፍሰት የበለጠ ለማሻሻልም ዓውደ ርኢይና ባዛር ፣የሀገር ውስጥና የውጭ ስብሰባዎችን በማዘጋጀት ፣ታላቅ ሃይማኖታዊ ጉዞዎችና ክብረ በዓላት በማስተባበር እንደዚሁም በተለያዩ የመገናኛ
