  - የኢፌዴሪ ቀዳማዊት እመቤት ወይዘሮ ዝናሽ ታያቸው የጽህፈት ቤታቸውን የትኩረት አቅጣጫዎች ይፋ አድርገዋል።ቀዳማዊት እመቤቷ በተለይም በህጻናትና በሴቶች ደህንነት ትኩረት በማድረግ በህጻናት
    ላይ የሚታየውን የተመጣጠነ ምግብ እጥረት እንዲሁም ያለእድሜ ጋብቻ፣ ጠለፋ፣ ተገዶ መደፈርና የሴት ልጅ ግርዛትን ከሚመለከታቸው አካላት ጋር በመተባበር ለመከላከል እንደሚሰሩ ጽህፈት ቤቱ ለዋልታ
    በላከው መግለጫ አስታውቋል።ትምህርት ድህነትን ለመዋጋት ወሳኝ ቁልፍ መሆኑን በእጅጉ የሚረዱት ቀዳማዊት እመቤቷ እድሜያቸው ለትምህርት የደረሱ ህጻናት ሁሉ መማር እንዲችሉ ጥረት እንደሚያደርጉም
    ነው በመግለጫው የተመለከተው።ለትምህርት ማነቆ  የሚሆኑ ችግሮችን በመለየት ጥራቱን የጠበቀ ትምህርት እንዲያገኙ የበኩላቸውን ጥረት እንደሚያደርጉ ተገልጿል።ቀዳማዊት እመቤት ወይዘሮ ዝናሽ 
    በተለያዩ ማህበራዊ ቀውሶች ሳቢያ በየጎዳናው ያሉ ህጻናትና አረጋውያን መጠለያ፣ ምግብና እንዲሁም አስፈላጊውን የጤና እንክብካቤ አግኝተው ወደ ህብረተሰቡ እንዲቀላቀሉ የሚችሉትን ሁሉ ለማድረግ
