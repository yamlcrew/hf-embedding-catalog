    sentences:
    - በአማራ ክልል ከውጭና ከውስጥ አገር የመጡ ከ8 ነጥብ 6 ሚሊየን በላይ ቱሪስቶች በተለያዩ የቱሪዝም መስህቦች መጎብኘታቸውን የባህል፣ ቱሪዝምና ፓርኮች ልማት ቢሮ አስታወቀ ፡፡የቢሮው የቅርስ
      ጥበቃና ቱሪዝም ልማት ዋና የስራ ሂደት መሪ አቶ የሺዋስ ደሣለኝ ዛሬ እንደገለጹት ፤ቀደም ሲል በክልሉ ተፈጥሮ በነበረው ሁከት ሳቢያ በመጠኑ ተቀዛቅዞ የነበረው የቱሪዝም ፍሰት አሁን ላይ
      ወደ ነበረበት ተመልሷል ፡፡ባለፉት ዘጠኝ ወራት ብቻ በክልሉ በሚገኙ ላሊበላ ፣ዓባይ ጢስና ሰሜን ትራሮች ብሄራዊ ፓርክ ጨምሮ በተለያዩ ታሪካዊ ፣ሃይማኖታዊና ተፈጥሮአዊ መስህቦች ላይ  8
      ሚሊየን 665 ሺ 424 ቱሪስቶች ጎብኝተዋል ፡፡ከነዚሁም ውስጥ ከ8 ነጥብ 5 ሚሊየን በላይ ጎብኚዎች ከተለያዩ የሀገራችን ክፍሎች የመጡ ሲሆኑ፤ 87ሺ 463 ጎብኚዎች ደግሞ ከአሜሪካ፣ከአውሮፓ፣ከኤስያና
      ከሌሎች የዓለማችን አገሮች የመጡ መሆናቸውን ነው ያመለከቱት ፡፡ከነዚህ የውጭና የውስጥ ቱሪስቶች በቱሪዝም መስህብ ስፍራዎች በቆዩበት  ጊዜ ለጉብኝት፣ለልዩ ልዩ አገልግሎቶችና ለስጦታ እቃዎች
      ባወጡት ወጪ ከ2 ቢሊየን ብር በላይ ገቢ መገኘቱን ገልጸዋል ፡፡በክልሉ አንጻራዊ ሰላም እየሰፈነ በመምጣቱም በተለይም የሀገር ውስጥ ቱሪስቶች ፍሰት ከዓምናው ተመሳሳይ ወቅት ጋር ተመሳሳይ
      መሆኑን ገልጸዋል ፡፡የውጭ አገር ቱሪስቶችም ቢሆን በሁከቱ ወቅት የተወሰነ መዳከም ታይቶ የነበረ ቢሆንም አሁን ላይ የቱሪስት ፍሰቱ ወደ ነበረበት እየተመለሰ መሆኑን ነው ያስታወቁት ፡፡የክልሉ
      የቱሪዝም ፍሰት የበለጠ ለማሻሻልም ዓውደ ርኢይና ባዛር ፣የሀገር ውስጥና የውጭ ስብሰባዎችን በማዘጋጀት ፣ታላቅ ሃይማኖታዊ ጉዞዎችና ክብረ በዓላት በማስተባበር እንደዚሁም በተለያዩ የመገናኛ
      ብዙሃን የማስተዋወቅ ስራ መከናወናቸውን አስረድተዋል ፡፡
    - የኦሮሞ ፌዴራላዊ ኮንግሬስ (ኦፌኮ) ጥቅምት 29/2012 በወልዲያ ዩንቨርሲቲ ተማሪዎች ላይ የተፈፀመዉን የግድያ ወንጀል እና ድብደባ አወገዘ።ኦፌኮ ‹‹የነገን ወጣት ትውልድ በመግደል ደም
      በማፍሰስ እና ሕዝብን አጋጭቶ ሥልጣን ለመያዝ የሚደረገው ሩጫ ይቁም!›› ሲል ባወጣው መግለጫ፤ ‹‹በሕገ ወጦች የተፈጸመውን የተማሪዎች ድብደባ እና እገታን ፓርቲያችን አጥብቆ ያወግዛል››
      ሲል አክሏል።ሕዝብን እርስ በርስ በማጋጨት በማፈናቀል በአቋራጭ ሥልጣን ለመያዝ የሚደረገዉ ጥረት፣ የአገሪቱን ሕዝቦች ወደ ሌላ የማያባራ የእርስ በርስ ግጭት የሚያመራ በመሆኑ ወንጀለኞቹን
      በመያዝ ተገቢዉን ቅጣት እንዲያገኙ ፓርቲዉ ጠይቋል። ለዚህ እኩይ ድርጊት አጸፋ ለመመለስ በሚል ሌላ ግጭት እንዳይፈጠርም ጥንቃቄ እንዲደረግ ሲል አሰስቧል።
    - "በአማራ ክልል ሰኔ 15 ቀን 2011 ዓ.ም ከደረሰው ጥቃት ጋር በተያያዘ ተጠርጥረው በእስር ላይ ከነበሩት ከፍተኛ የፀጥታ ዘርፍ አመራሮች መካከል ሦስቱ በ10 ሺሕ ብር ዋስ ተፈቱ። ዛሬ\
      \ ማምሻውን ከእስር የተለቀቁት፤የአማራ ክልል ልዩ ኃይል ኃላፊ የነበሩት ብሪጋዲየር ጄነራል ተፈራ ፣ የክልሉ ሕዝብ ደህንነትና የሰላም ግንባታ ቢሮ ምክትል ኃላፊ የነበሩት ኮሎኔል አለበል\
      \ አማረና የአማራ ክልል ሚሊሽያ ጽ/ቤት ኃላፊ የነበሩት ኮሎኔል በአምላኩ አባይ መሆናቸውን የክልሉ ጠቅላይ ዐቃቤ ሕግ አቶ ኢዮብ ጌታቸው ለአሜሪካ ድምፅ ተናግረዋል።(ዝርዝሩን ከተያያዘው\
      \ የድምፅ ፋይል ያዳምጡ)\n "
  - source_sentence: የኢትዮጵያ አየር መንገድ አውሮፕላንን የጠለፈው ረዳት አብራሪ የአዕምሮ ችግር እንዳለበት ተረጋገጠ
