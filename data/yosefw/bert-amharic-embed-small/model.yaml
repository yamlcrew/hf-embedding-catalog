      ጥላ” እያለች እልፍ ጀግኖችን ታፈልቃለች።ኢትዮጵያዊ መሆን ያኮራል፣ ስሙ ብቻ ያስከብራል። ለምድር የተሰጠው ሁሉ በኢትዮጵያ ውስጥ አለ። ኢትዮጵያ ለዓለም መኖርና ለስልጣኔ መፈጠር ቀዳሚዋ
      ናት። ቀዳሚዋ ከሌለች ተከታዮቹ መኖር አይቻላቸውምና፣ ዳሩ ኢትዮጵያ የፈጣሪውን ቁጣ በፀሎት፣ የጠላትን በትር በጥይት የምትመልስ                                   
                                    ሀገር ናትና ምንም አትሆንም።“ሀገራችን ኢትዮጵያን ባርካት ቀድሳት፣ ሰላም ስጣት ጠላቶቿን ፈጥነህ አስገዛላት፣ ዳሯን እሳት መሀሏን ገነት
      አድርግላት” የሚለው የካህኑ ልመና “ሰላም ይሁን የሚለው የሼሁ ዱዓ” የማይታዩ ነገር ግን የማይሸነፉ አሳልፈው የማይሰጡ የኢትዮጵያ ሚስጥራዊ ወታደሮች ናቸው። ለሚስጥር እና ለምስክር የተፈጠረች
