      ለደጎች እንጂ ለክፉዎች ቦታ የላትም። መሰረቷም ደግነት፣ አንድነት፣ አርቆ አሳቢነት፣ ብልህነት፣ ጠበብትነት፣ አይደፈሬነት፣ ጀግንነት እና አሸናፊነት ነው።የራያን ምድር አይቼ፣ በባሕላቸው
      ተደስቼ፣ በፍቅራቸው ተረትቼ፣ የግራ ካሶን ዳገት ወጥቼ፣ ኮረምን ተመልክቼ በወፍላ ተራራዎች ተገኝቼ ነበር። ብርዱ ልብ ያንሰፈስፋል። እጅ ያደነዝዛል። ተራራዎቹ ፈታኞች ናቸው። በወፍላ
      ተራራዎች ከቆቦ ተነስቶ፣ በግራ ካሶ ታላቅ ጀብዱ ፈፅሞ፣ ኮረምን አረጋግቶ፣ ጠላቱን አፅድቶ የትህነግን ታጣቂ እየደመሰሰ የሄደው የአማራ ልዩ ኃይል አባላት ይገኙበል። በማይሸሸው ልባቸው፣
      በሚያነጣጥረው ዓይናቸው አካባቢውን እየጠበቁት ነው።አጥንት በሚሰረስው ብርዳማ ተራራ በፅናት እና በኩራት ለወገንና ለሀገር የቆመውን ሠራዊት ሳይ ደነቀኝ። ለእኛ ሙቀት የሚሰጡት እነርሱ
      እየበረዳቸው ነው። ለእኛ መኖር እነርሱ ሞተው ነው። ለእኛ ሰላም ማደር እነርሱ እንቅልፍ አጥተው ነው። ለወገን መልካም ሕይወት ሲሉ የእነርሱ ሕይወት በዱር በገደል፣ በተራራ በጉድብ ሆኗል።
      መታደል ነውና ይሁን ብዬ አለፍኩ።ትጥቅና ስንቅ አንግተው፣ በእግራቸው እየተጓዙ፣ በግራ ካሶ ተራራ እየተኮሱ ድል እየነሱ የሄዱና በወፍላ ተራራዎች ለወገን ዘብ የቆሙ ሴቶችን አየሁ። “ገና
      ሲወለድ እራሱን ሲላጭ፣ ይቅለበለባል እጁ ከምላጭ” እንዳለ እጃቸው ከመሳሪያቸው ምላጭ አጠገብ አይታጣም። ዓይናቸው እንደ ንስር ነው። አካባቢውን በንቃት ይመለከታሉ። የሴትነት ውበት አላሳሰባቸውም
