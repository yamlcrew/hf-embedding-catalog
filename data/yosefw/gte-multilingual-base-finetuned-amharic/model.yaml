  - 'በመተማ ዮሐንስ ቤት ውስጥ ተደብቀው ተኩስ በከፈቱ አካላት በሰዎች ላይ የሞትና የአካል መቁሰል አደጋ መድረሱን የምዕራብ ጎንደር ዞን ፖሊስ መምሪያ አስታወቀ።የመምሪያው ኃላፊ ኮማንደር ጌትነት
    አልታሰብ  እንደገለፁት  ግለሰቦቹ በከፈቱት ተኩስ የ3 ሰዎች ህይወት ሲያልፍ በ20 ሰዎች ላይ ቀላልና ከባድ የአካል ጉዳት ደርሷል።ከተጎጂዎች መካከልም አንድ የፀጥታ አካልን ጨምሮ ሴቶችና
