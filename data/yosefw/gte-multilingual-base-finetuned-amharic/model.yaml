      ደቡብ ኦሞ ዞን ያቀናው በምክትል ርዕሰ መስተዳድር አቶ እርስቱ ይርዳው የተመራውና የክልሉ ከፍተኛ የስራ ሀላፊዎች ያካተተው ቡድን የኦሞ ወንዝን በመስኖ በመጠቀም እየለማ ያለ የሙዝ እርሻን
