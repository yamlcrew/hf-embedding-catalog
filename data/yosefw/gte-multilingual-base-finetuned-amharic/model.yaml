    አባቶችና የሃገር ሽማግሌዎች ህብረተሰቡን በማስተማር የድርሻቸውን ሊወጡ ይገባል ብለዋል።ወጣቱ የአካባቢውን ሰላም በመጠበቅና  ከፀጥታ ሃይሉ ጎን በመሰለፍ ጥፋተኞችን በመለየት ለህግ እንዲያቀርብ
    ጥሪ አቅርበዋል።የተፈጠረውን  ግጭት ላማረጋጋት የመከላከያ ሰራዊት፣ የክልሉ ልዩ ኃይል፣ የፖሊስ አባላትና የአካባቢ ሚሊሻዎች በጋራ በመሆን ወደ  እየሰሩ ናቸው ሲሉ ኮማንደሩ ጠቅሰዋል፡፡(ኢዜአ) '
