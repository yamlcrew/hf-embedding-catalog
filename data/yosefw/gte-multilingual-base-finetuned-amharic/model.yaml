    \ የሚልዮኖች ድምጽ ለነጻነትና ለፍትሀዊ ምርጫ የሚል መሆኑንም የጽሁፉ መግለጫ ይጠቁማል። አንድነት በሰላማዊ መንገድ የስልጣን ሽግግር ለማምጣት ላቀደው ዋነኛ የትግል ምዕራፍ በሀገራችን እውነተኛ\
