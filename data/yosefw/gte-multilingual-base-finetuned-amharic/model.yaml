    በሰላማዊ መንገድ ለፀጥታ ኃይሎች እጃቸውን እንዲሠጡ እየተጠየቁ ስለመሆኑ ኃላፊው ተናግረዋል፡፡ጉዳት ካደረሱት ግለሰቦችም 9 የክላሽንኮቭ፣ አንድ ኤፍ ኤን መሳሪያ፣አንድ ሽጉጥ፣ አንድ ቦንብና
    በርካታ ጥይቶች በቁጥጥር ስራ መዋላቸውን  ኮማንደር ጌትነት አስታውቀዋል።ጉዳት የደረሰባቸው ሰዎች በመተማ ዮሐንስ ጤና ጣቢያ፣ በገንዳ ውሃ ሆስፒታልና በጎንደር ሪፈራል ሆስፒታል ህክምና እየተደረጋላቸ
