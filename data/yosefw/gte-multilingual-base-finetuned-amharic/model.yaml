  - "አንድነት ለዲሞክራሲና ለፍትህ ፓርቲ በሚቀጥሉት የምርጫ ወራት በሚልዮኖች ድምጽ ለነጻና ፍትሀዊ ምርጫ የኢትዮጵያ ህዝብ የስልጣን ባለቤት እንዲሆን እናደርጋለን ሲል ዛሬ ረፋዱ ላይ በጽህፈት\
