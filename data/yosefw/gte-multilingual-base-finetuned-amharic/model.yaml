    - ' የኢትዮጵያ ሰብአዊ መብቶች ጉባኤ፤ የአርቲስት ሃጫሉ ሁንዴሳ ግድያን ተከትሎ በተፈጠረው ሁከትና ግርግር በኦሮሚያ የደረሰውን የሰብአዊ ጉዳት የሚመረምር ቡድን ከሣምንቱ አጋማሽ ጀምሮ
      ማሠማራቱን ለአዲስ አድማስ አስታውቋል:: ተቋሙ ሁከትና ግርግር በተፈጠረባቸውና ጉዳት በደረሰባቸው ሁሉም የኦሮሚያ አካባቢዎች የምርመራ ቡድን ማሰማራቱን አመልክቷል፡፡ በምርመራው የሚገኙ
      ውጤቶችን ከዓለማቀፍ የሰብአዊ መብት ድንጋጌዎች አንፃር በመመዘን የተፈፀመው ድርጊት ምንድን ነው? ምን ያህል ጉዳት አጋጥሟል? መንግስት የወሰደው እርምጃስ ምንድን ነው? እነማን በድርጊቱ
