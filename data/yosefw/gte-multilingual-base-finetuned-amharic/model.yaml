- source_sentence: የደቡብ ክልል ም/ርዕሰ መስተዳድር አቶ ርስቱ ይርዳው በደቡብ ኦሞ ዞን ኛንጋቶም ወረዳ የተከናወኑ የልማት ስራዎችን ጎበኙ
  sentences:
  - አዲስ አበባ፦ የኢትዮጵያ እግር ኳስ ፌዴሬሽን 12ኛ መደበኛ ጠቅላላ ጉባዔውን ትናንት አካሂዷል፡፡ ያለፈው ዓመት ባጋጠሙ በርካታ ውጣ ውረዶች ስፖርቱ አሉታዊ ተጽእኖ ቢደርስበትም የተሻለ አፈጻጸም
    የተመዘገበበት መሆኑ ተመላክቷል፡፡ በተለይም በአዲስ አበባ ከተማ የሚገኘውን የካፍ አካዳሚን በማስጠገን ለአገልግሎት መብቃቱ፤ ፌዴሬሽኑ ለብሔራዊ ቡድን ዝግጅት የሚያወጣውን ከፍተኛ ወጪ ታድጓል።
    የአህጉርና ዓለም አቀፍ ግንኙነትን በማጠናከር ረገድም ጠንካራ ሥራ በመከናወኑ ኢትዮጵያ በሴካፋ የመሪነት ቦታ ማግኘቷም በጉባኤው ላይ መነሳቱን የኢፌዴሪ ስፖርት ኮሚሽን በድረ-ገጹ አስነብቧል፡፡
    በጉባኤው በቀረበው የ2012 በጀት ዓመት የአፈጻጸም ሪፖርት ላይም ፌዴሬሽኑ የገንዘብ አቅሙን ማሳደጉ ተገልጧል፡፡ ለዓመታት የክለቦች ጥያቄ የነበረውን የሊግ ካምፓኒ ምስረታ እውን ማድረጉንም
    እንደ ስኬት ተነስቷል፡፡ በቀረበው ሪፖርት እና የ2013 በጀት ዓመት ዕቅድ ላይም በጉባኤው አባላት ውይይት ተደርጓል፡፡ በመጨረሻም የሲዳማ ክልል የጉባኤው አባልነት ጥያቄን ተቀብሎ በማፅደቅ
    እና በአጭር ጊዜ ውስጥ በተሻሻለው መተዳደሪያ ደንብ ላይ ለመወያየት እና ለማጽደቅ በሀዋሳ ከተማ አስቸኳይ ጉባኤ እንደሚካሄድ በመወሰን ጉባኤው መጠናቀቁን በዘገባው ተመላክቷል።አዲስ ዘመን
    ህዳር 28/2013
  - አዲስ አበባ፣ መስከረም 9፣ 2013 (ኤፍ.ቢ.ሲ) የደቡብ ክልል ምክትል ርዕሰ መስተዳድር አቶ ርስቱ ይርዳው በደቡብ ኦሞ ዞን ኛንጋቶም ወረዳ የተከናወኑ የልማት ስራዎችን ጎብኝተዋል።ወደ
    ደቡብ ኦሞ ዞን ያቀናው በምክትል ርዕሰ መስተዳድር አቶ እርስቱ ይርዳው የተመራውና የክልሉ ከፍተኛ የስራ ሀላፊዎች ያካተተው ቡድን የኦሞ ወንዝን በመስኖ በመጠቀም እየለማ ያለ የሙዝ እርሻን
    መጎብኘታቸውን የክልሉ የመነግስት ኮሙዩኒኬሽን ጉዳዮች ቢሮ መረጃ ያመለክታል።በኛንጋቶም ወረዳ በናፕሱመሪያ ቀበሌ በማህበር ተደራጅተው ሙዝ እያለሙ ያሉ ሴቶችን የስራ እንቅስቃሴ የጎበኙ ሲሆን፥
    በዚሁ ወቅት “የሙዝ እርሻ እያለሙ ያሉ አርብቶ አደር እንደመሆናችን ከዚህ ቀደም በእርሻ ስራ ላይ ተሳትፎ እያደረግን አልነበረም እናም አሁን መንግስት ባደረገልን ድጋፍ ሙዝ እያለማን ነው”
    ብለዋል።አስተያየት ሰጪዎቹ ገለጻ እያለሙት ያለውን የሙዝ እርሻ ስኬታማ ለማድረግ የውሀ መሳቢያ ፓምፕ ችግር እያጋጠማቸው መሆኑን ጠቁመዋል።“በመንደር እንድንሰባሰብ ከተደረገ በኅላ የንጹህ
    መጠጥ ውሃ መጠለያና ተዛማጅ ተግባራት ሊሟላልን ይገባል” ሲሉም ጠይቀዋል።ምክትል ርዕሰ መስተዳድር አቶ ርስቱ ይርዳው፥ ከአርብቶ አደሩ ማህበረሰብ ለተነሳላቸው ጥያቄ በሰጡት ምላሽ በመስኖ
    ዙሪያ ያጋጠማቸውን ችግር የክልሉ መንግስት እንደሚገነዘበው ጠቅሰዋል።በቀጣይ የህብረተሰቡን ህይወት ለመቀየር መንግስት የመስኖ ልማት ስራን እንደሚደግፍ በመግለፅ፤ የፓምፕ ችግሮችን ለመፍታት
    ጥረት እንደሚደረግም አስታውቀዋል።አሁን በስፋት እየለማ ያለውን ሙዝ ወደ የገበያ ለማቅረብ የገበያ  ትስስር ለመፍጠርም ድጋፍ እንደሚደረግም ምክትል ርእሰ መስተዳድሩ አስታውቅዋል።የተጀመረው
    የልማት ስራ ተጠናክሮ እንዲቀጥል ያስታወቁት አቶ ርስቱ፥ ቀበሌን ከወረዳ የሚያገናኙ መንገዶችን ለመገንባት ጥረት እንደሚደረግም ተናግረዋል።
  - ' የኢትዮጵያ ሰብአዊ መብቶች ጉባኤ፤ የአርቲስት ሃጫሉ ሁንዴሳ ግድያን ተከትሎ በተፈጠረው ሁከትና ግርግር በኦሮሚያ የደረሰውን የሰብአዊ ጉዳት የሚመረምር ቡድን ከሣምንቱ አጋማሽ ጀምሮ ማሠማራቱን
    ለአዲስ አድማስ አስታውቋል:: ተቋሙ ሁከትና ግርግር በተፈጠረባቸውና ጉዳት በደረሰባቸው ሁሉም የኦሮሚያ አካባቢዎች የምርመራ ቡድን ማሰማራቱን አመልክቷል፡፡ በምርመራው የሚገኙ ውጤቶችን ከዓለማቀፍ
    የሰብአዊ መብት ድንጋጌዎች አንፃር በመመዘን የተፈፀመው ድርጊት ምንድን ነው? ምን ያህል ጉዳት አጋጥሟል? መንግስት የወሰደው እርምጃስ ምንድን ነው? እነማን በድርጊቱ ተሳትፈዋል? የሚለውን
    የመለየት ተግባር እንደሚከናወን ታውቋል፡፡ '
- source_sentence: የኢትዮጵያ ልማት ባንክ አራት አዳዲስ ምክትል ፕሬዚዳንቶችን ሾመ
  sentences:
  - በጃፓን ላለፉት 30 ዓመታት ንጉስ ሆነው ያገለገሉት የ85 ዓመት ንጉስ አክሂቶ በገዛ ፈቃዳቸው ስልጣናቸውን ለመልቀቅ ተስማምተዋል፡፡ንጉሱ ከ200 ዓመታት ወዲህ በፍላጎት ስልጣን ለመልቀት
    የተስማሙት የመጀመሪያ ንጉስ ናቸው ተብሏል፡፡ንጉሱ ስልጣናቸውን ለመልቀቅ የተስማሙት እድሜቸው እየገፋ በመሄዱና የጤናቸው ሁኔታ ስራቸውን መስራት አስቸጋሪ በማድረጉ ነው የተባለው፡፡የንጉሱ
    ስልጣን የመልቀቅ ጥያቄ በአገሪቱ ህጋዊ ፍቃድ አግኝቶ በዛሬው እለት የስልጣን ርክክብ ሂደት ተጀምሯል፡፡ንጉስ በአገሪቱ ምንም የፖለቲካ ስልጣን ሚና ባይኖረውም ለጃፓን እንደ ብሄራዊ አርማ
    ተደርጎ ይወሰዳል ነው የተባለው፡፡ንጉስ አክሂቶ በልጃቸው ናሩሂቶ የሚተኩ ሲሆን፣ ናሩሂቶ ከነገ ጀምረው የጃፓን ንጉስ ይሆናሉ ነው የተባለው፡፡(ምንጭ፡- ቢቢሲ)
  - 'የኢትዮጵያ  ልማት ባንክ  አራት  አዳዲስ  ምክትል  ፕሬዚዳንቶችን  መሾሙን አስታወቀ ።የባንኩ የኮርፖሬት ማስተዋወቅናግንኙነት ተጠባባቂ ዳይሬክተር አቶ ኃይሉ ምስጋናው እንደገለጹት  የሊዝ
