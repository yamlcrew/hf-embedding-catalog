  - source_sentence: በከፍተኛ ትምህርትና ስልጠና ተቋማት ከኮሮና ቫይረስ ጋር የተገናኙ ጉዳዮችን የሚከታተል ግብረ ሃይል ተቋቋመ
    sentences:
    - 'በመተማ ዮሐንስ ቤት ውስጥ ተደብቀው ተኩስ በከፈቱ አካላት በሰዎች ላይ የሞትና የአካል መቁሰል አደጋ መድረሱን የምዕራብ ጎንደር ዞን ፖሊስ መምሪያ አስታወቀ።የመምሪያው ኃላፊ ኮማንደር
      ጌትነት አልታሰብ  እንደገለፁት  ግለሰቦቹ በከፈቱት ተኩስ የ3 ሰዎች ህይወት ሲያልፍ በ20 ሰዎች ላይ ቀላልና ከባድ የአካል ጉዳት ደርሷል።ከተጎጂዎች መካከልም አንድ የፀጥታ አካልን ጨምሮ
      ሴቶችና ወጣቶች ይገኙበታል ብለዋል።የቅማንት ማህበረሰብ ተቆርቋሪ ነን በሚሉ አካላት ጉዳቱ ሊደርስ መቻሉንም ኃላፊው ገልፀዋል።ጉዳቱን ካደረሱት አካላት መካከልም አራቱ እጃቸውን የሠጡ ሲሆን
      ቀሪዎቹም በሰላማዊ መንገድ ለፀጥታ ኃይሎች እጃቸውን እንዲሠጡ እየተጠየቁ ስለመሆኑ ኃላፊው ተናግረዋል፡፡ጉዳት ካደረሱት ግለሰቦችም 9 የክላሽንኮቭ፣ አንድ ኤፍ ኤን መሳሪያ፣አንድ ሽጉጥ፣
      አንድ ቦንብና በርካታ ጥይቶች በቁጥጥር ስራ መዋላቸውን  ኮማንደር ጌትነት አስታውቀዋል።ጉዳት የደረሰባቸው ሰዎች በመተማ ዮሐንስ ጤና ጣቢያ፣ በገንዳ ውሃ ሆስፒታልና በጎንደር ሪፈራል ሆስፒታል
      ህክምና እየተደረጋላቸ ነው ብለዋል።ለዘመናት ተሳስሮ በኖረው የአማራና የቅማንት ማህበረሰብ መካከል ግጭት ለመፍጠር የሚንቀሳቀሱ አካላት ከድርጊታቸው እንዲቆጠቡ ያሳሰቡት ኮማንደሩ፤ ችግሩ
      እስኪበርድ የአካባቢው የሃይማኖት አባቶችና የሃገር ሽማግሌዎች ህብረተሰቡን በማስተማር የድርሻቸውን ሊወጡ ይገባል ብለዋል።ወጣቱ የአካባቢውን ሰላም በመጠበቅና  ከፀጥታ ሃይሉ ጎን በመሰለፍ
      ጥፋተኞችን በመለየት ለህግ እንዲያቀርብ ጥሪ አቅርበዋል።የተፈጠረውን  ግጭት ላማረጋጋት የመከላከያ ሰራዊት፣ የክልሉ ልዩ ኃይል፣ የፖሊስ አባላትና የአካባቢ ሚሊሻዎች በጋራ በመሆን ወደ  እየሰሩ
      ናቸው ሲሉ ኮማንደሩ ጠቅሰዋል፡፡(ኢዜአ) '
    - አዲስ አበባ፣ መጋቢት 9፣ 2012(ኤፍ.ቢ.ሲ) በሁሉም ከፍተኛ ትምህርትና ስልጠና ተቋማት ከኮሮና ቫይረስ ጋር የተገናኙ ጉዳዮችን የሚከታተል ግብረ ሃይል በሳይንስና ከፍተኛ ትምህርት ሚኒስቴር
      ተቋቁሞ እየሰራ እንደሚገኝ ተገለጸ።ግብረ ሃይሉ ከመጋቢት 7 ቀን 2012 ዓ.ም ጀምሮ የከፍተኛ ትምህርትና ስልጠና ተቋማት ተማሪዎች የክፍል ውስጥ ትምህርት አቁመው አጋዥ መፅሐፍት (ሃንድ
      አውት)፣ ማጣቃሻ መፅሐፍት፣ በበይነ መረብ በመታገዝ እና ሶፍት ኮፒ ለቀጣዮቹ 2 ሳምንታት በግላቸው እንዲያነቡ አቅርቧል።በዩኒቨርሲቲዎች ተማሪዎች እጃቸውን አዘውትረው እንዲያፀዱም የውሃ
      አቅርቦትን የማሻሻል፣ የመታጠቢያ ሳሙናዎችንና አስፈላጊ ግብዓቶችን የማሟላትና የማቅረብ ስራዎች እየተከናወኑ መሆኑንም ሚኒስቴሩ ገልጿል።ከዚህ ባለፈም ስለቫይረሱ ለተማሪዎች እና ለከፍተኛ
      ትምህርት ተቋማት ማህበረሰቡ ግንዛቤ ለመፍጠር ዩኒቨርሲቲዎች የተለያዩ መንገዶችን እየተከተሉ መሆኑ ተጠቁሟል።በሁለት ሳምንታ እድሜያቸው ከ60 ዓመት በላይ የሆኑና የልብ ወይም የካንሰር
      እንዲሁም የስኳርና ሌሎች ተዛማጅ ህመሞች ያሉባቸው፣ የአስምና የመተንፈሻ አካላት ችግር ያሉባቸው ሠራተኞች ከሌሎች የበለጠ ጥንቃቄ ማድረግ እንደሚገባቸው መመከሩን ከሳይንስና ከፍተኛ ትምህርት
      ሚኒስቴር ያገኘነው መረጃ ያመለክታል።
    - አዲስ አበባ፤ ነሐሴ 3/2005 (ዋኢማ) – በትግራይ ክልል በሚገኙ ሦስት ታሪካዊና ጥንታዊ ቦታዎች ላይ የቅርሶች ጥበቃ፣ የመካነ ቅርስ ቁፋሮና የምርምር ስራዎች እያካሄደ መሆኑን የመቀሌ
      ዩኒቨርስቲ አስታወቀ፡፡የዩኒቨርስቲው ፕሬዚዳንት ዶክተር ክንደያ ገብረ ህይወት እንደገለጹት ዩኒቨርስቲው ምርምሩን በማካሄድ ላይ ያለው ከዚህ በፊት በሌሎች አካላት የቅርስ ጥበቃ፣ የመካነ
      ቅርስ ቁፋሮና የምርምር ስራዎች ባልተካሄዱባቸው አካባቢዎች ነው፡በዚህም ዩኒቨርስቲው በሓውዜን ወረዳ ዓንዛ ማሪያም ጥንታዊ ቤተክርስትያን ያሉ ጥንታዊ መካነ ቅርሶች ላይ ተገቢውን ጥበቃ
