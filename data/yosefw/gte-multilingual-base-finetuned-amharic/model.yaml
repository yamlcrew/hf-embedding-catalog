    ዩኒቨርስቲ አስታወቀ፡፡የዩኒቨርስቲው ፕሬዚዳንት ዶክተር ክንደያ ገብረ ህይወት እንደገለጹት ዩኒቨርስቲው ምርምሩን በማካሄድ ላይ ያለው ከዚህ በፊት በሌሎች አካላት የቅርስ ጥበቃ፣ የመካነ ቅርስ
    ቁፋሮና የምርምር ስራዎች ባልተካሄዱባቸው አካባቢዎች ነው፡በዚህም ዩኒቨርስቲው በሓውዜን ወረዳ ዓንዛ ማሪያም ጥንታዊ ቤተክርስትያን ያሉ ጥንታዊ መካነ ቅርሶች ላይ ተገቢውን ጥበቃ በማድረግ
    አከባቢውን አስመልክቶ የሚነገሩ  አፈ ታሪኮችን ትክክለኛነት ለማረጋገጥ በቁፋሮ ጥልቅ የምርምር ስራ እያካሄደ ነው።እንዲሁም በእንደርታ ወረዳ ልዩ ስሙ ”ዓዲ መዓር(ድርባ)”በተባለ ቦታ ላይ
    በአውነ አሳይ ጥንታዊ ቤትክርስትያን ላይ በተለያዩ ምክንያቶች የደረሰበትን የመፍረስ አደጋ መልሶ በመገንባት በውስጡ የሚገኙ የተንቀሳቃሽ ቅርሶች ጥበቃ እያካሄደ ሲሆን፣ በአፈ ታሪክ የሚነገሩ
    ድንቅ ታሪኮቹም በሳይንሳዊ መንገድ ተጠንተው ለቱሪዝም ልማት ጥቅም ላይ እንዲውሉ እየሰራ መሆኑን ዶክተር ክንደያ ተናግረዋል።በተጨማሪ ዩኒቨርስቲው የጣሊያን ወራሪ ሃይል የኢትዮጵያ አባት አርበኞች
    ትግል ለመመከት በመቀሌ ከተማ በእንዳ እየሱስ ተራራ ላይ ”ፎርቶ” በሚል ስም የሚታወቀው ስፍራ ላይ ታሪካዊነቱ በሚያጎላ መልኩ እድሳት ተደርጎለት ለመዝናኛ አገልግሎት እንዲውል የተለያዩ ግንባታዎች
    እያካሄደ መሆኑን ፕሬዚዳንቱ ገልጸዋል።ዩኒቨርስቲው በትግራይ ክልል የሚገኙ ታሪካዊና ጥንታዊ ቅርሶች ተገቢው ጥበቃ እንዲደረግላቸውና በመካነ ቅርስ ቁፋሮ የምርምር ስራ የበኩሉን ድርሻ እንዲወጣ
    በዩኒቨርስቲው የባህልና ቅርስ ጥበቃ የትምህርት ክፍል ከፍቶ በመጀመሪያ ዲግሪ እያሰለጠ ይገኛል።ዩኒቨርስቲው በኢትዮጵያ ውሰጥ ያሉ የተለያዩ ብሄር ብሄረሰቦች ባህሎችና ጥንታዊ ቅርሶች እንዲጠበቁ
