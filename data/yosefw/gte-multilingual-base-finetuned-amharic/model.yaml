      በመስኖ ዙሪያ ያጋጠማቸውን ችግር የክልሉ መንግስት እንደሚገነዘበው ጠቅሰዋል።በቀጣይ የህብረተሰቡን ህይወት ለመቀየር መንግስት የመስኖ ልማት ስራን እንደሚደግፍ በመግለፅ፤ የፓምፕ ችግሮችን
