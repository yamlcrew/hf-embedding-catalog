    - በጃፓን ላለፉት 30 ዓመታት ንጉስ ሆነው ያገለገሉት የ85 ዓመት ንጉስ አክሂቶ በገዛ ፈቃዳቸው ስልጣናቸውን ለመልቀቅ ተስማምተዋል፡፡ንጉሱ ከ200 ዓመታት ወዲህ በፍላጎት ስልጣን ለመልቀት
      የተስማሙት የመጀመሪያ ንጉስ ናቸው ተብሏል፡፡ንጉሱ ስልጣናቸውን ለመልቀቅ የተስማሙት እድሜቸው እየገፋ በመሄዱና የጤናቸው ሁኔታ ስራቸውን መስራት አስቸጋሪ በማድረጉ ነው የተባለው፡፡የንጉሱ
      ስልጣን የመልቀቅ ጥያቄ በአገሪቱ ህጋዊ ፍቃድ አግኝቶ በዛሬው እለት የስልጣን ርክክብ ሂደት ተጀምሯል፡፡ንጉስ በአገሪቱ ምንም የፖለቲካ ስልጣን ሚና ባይኖረውም ለጃፓን እንደ ብሄራዊ አርማ
      ተደርጎ ይወሰዳል ነው የተባለው፡፡ንጉስ አክሂቶ በልጃቸው ናሩሂቶ የሚተኩ ሲሆን፣ ናሩሂቶ ከነገ ጀምረው የጃፓን ንጉስ ይሆናሉ ነው የተባለው፡፡(ምንጭ፡- ቢቢሲ)
    - 'የኢትዮጵያ  ልማት ባንክ  አራት  አዳዲስ  ምክትል  ፕሬዚዳንቶችን  መሾሙን አስታወቀ ።የባንኩ የኮርፖሬት ማስተዋወቅናግንኙነት ተጠባባቂ ዳይሬክተር አቶ ኃይሉ ምስጋናው እንደገለጹት  የሊዝ
      ፋይናንስ እና ቅርንጫፎች ሥራ ምክትል ፕሬዚዳንት ከሆኑት አቶ ተሾመ ዓለማየሁ በስተቀር ሌሎቹ አራት የባንኩ ምክትል ፕሬዚዳንቶችን ከኃላፊነታቸው በማንሳት በአዳዲስ  እንዲተኩ ተደርጓል  ።ባንኩ
      አዲስ የሾማቸው  አቶ ጌታቸው ዋቄ በፕሮጀክት ፋይናንስ ምክትል ፕሬዚዳንት፣ አቶ ኃይለእየሱስ በቀለ በብድር አገልግሎት ምክትል ፕሬዚዳንት ፣ አቶ ሃዱሽ ገብረእግዚአብሄር የኮርፖሬት አገልግሎት
      ምክትል ፕሬዚዳንት እና አቶ እንዳልካቸው ምህረቱ የፋይናንስና ባንኪንግ ምክትል ፕሬዚዳንት በመሆን ነው ።የኢትዮጵያ ልማት ባንክ በለውጥ ሂደት ውስጥ በመሆኑና ለዚህ አዲስ አደረጃጀት እየሰራ
      መሆኑም ለምክትል ፕሬዚዳንቶቹ መነሳት ምክንያት ነው ተብሏል።ባንኩ የዘረጋውን አዲስ መዋቅር መሠረት በማድረግ በቅርቡ ፕሬዚዳንት መሾሙ ይታወሳል።ባንኩ አደረጃጀቱን በአዲስ የሰው ኃይል
      ለማሟላት እየሰራ እንደሆነም ነው የተነገረው።ለተሰናባቾቹ ምክትል ፕሬዚዳንቶች የደረሰው ደብዳቤም ለአገልግሎታቸው ምስጋናን ያካተተ መሆኑ ተመልክቷል። '
    - 'ባለፈው ቅዳሜ በሰሜን ምሥርቅ ናይጀርያ በታጠቁ ሽፍቶችና በመንደር ነዋሪዎች መካከል በተካሄደ ግጭት 45 ሰዎች ተገድለዋል።

      ሽፍቶቹ ካዱና በተባለው ሰሜናዊ ክፍለ፡ሀገር በሚገኘው ግዋስካ ድንበር ላይ ጥቃት ከፈቱ። የአካባቢ ጥበቃ ኃይል አባል የሆነ ሰው በተናገረው መሰረት ሽፍቶቹ የጥበቃ ኃይሉን በማጥቃት በልጆች
      ላይ ተኩስ ከፍቷል። መኖርያ ቤቶችንም በእሳት አጋይተዋል።ማንነቱ ያልተገለፀው የጥበቃ ኃይል አባል አጥቂዎቹ በአቅራቢያው ከሚገኘው ዛምፋራ ክፍለ፡ሀገር የመጡ ናቸው ብሏል።'
  - source_sentence: በሲዳማ የህዝብ ውሳኔ ጥቅም ላይ በሚውሉ ምልክቶች ዙሪያ ውይይት እየተደረገ ነው
    sentences:
    - – በአገሪቱ በኢንዱስትሪው ዘርፍ ፈጣን የሆነ ዕድገት ለማስመዝገብ በየደረጃው የሚገኙ አስፈጻሚው አካላት የበኩላቸውን ሚና እንዲጫወቱ የኢንዱስትሪ ሚኒስቴር ጥሪ አቀረበ።ጥሪው የቀረበው
      ሚኒስቴሩ በሥሩ ከሚገኙት ተጠሪ ተቋማት ለተውጣጡ 150 አመራሮች በአገሪቱ ኢንዱስትሪ ልማት ስትራቴጂ ላይ ለሶስት ተከታታይ ቀናት በሰጠው ሥልጠና ማጠናቀቂያ ላይ ነው።የኢንዱስትሪ ሚኒስትር
      ክቡር አቶ አህመድ አብተው በወቅቱ እንደገለጹት የኢንዱስትሪ ልማቱን ዕድገት ለማፋጠን የአስፈጻሚ አካላት ሚና ወሳኝ ነው።የአስፈጻሚ አካላት ሚናቸውን እንዲወጡም በኢንዱስትሪ ልማት እስትራቴጂው
      ላይ ያላቸው ግንዛቤና የማስፈጸም ብቃት ወሳኝ እንደሆነም ሚኒስትሩ ተናግረዋል።ለሦስት ተከታታይ ቀናት የተሠጠው ሥልጠና አመራሩ በተግባር ወቅት የሚያጋጥሙትን ችግሮች እንዲፈታና በዘርፉ
      ያለውን ዕድገት ለማሻሻል እንደሚያግዝ ሚኒስትሩ መናገራቸውን ዋልታ ዘግቧል።
    - ያለፉትን ሁለት ዓመታት የኢትዮጵያ ብሔራዊ ቡድንን በማሰልጠን የቆዩት ኢንስትራክተር አብርሀም መብራቱ ከሁለት ቀናት በኃላ ሐምሌ ሠላሳ ኮንትራታቸው የሚያበቃ ይሆናል። ፌዴሬሽኑ በበኩሉ
      የአሰልጣኙን  ውል በተለያዩ ምክንያቶች እንደማያድስ በይፋ መግለፁ ይታወቃል። በዚህ መነሻነት አሰልጣኙ ከተለያዩ ክለቦች ጋር ስማቸው እየተያያዘ ይገኛል። ስለሚነሳው ጉዳይ እና በቀጣይ
      የብሔራዊ ቡድን ኮንትራታቸው ካበቃ በኋላ እቅዳቸው ምን ይሆን በማለት ላቀረብንላቸው ጥያቄ ተከታዩን ምላሽ ሰጥተውናል።“እስካሁን ከማንም ጋር በዚህ ጉዳይ አልተነጋገርኩም። እስከ ሐምሌ
      ሠላሳ የፌዴሬሽኑ ሠራተኛ ነኝ፤ በዚህ መሐል ከማንም ጋር መነጋገር አልችልም። ከዚህ ክለብ ጋር ተስማምቷል የሚሉ ነገሮችን በተለያዩ መገናኛ ብዙሀን እሰማለው። እኔ ግን በግልፅ ከአንዳቸው
      ጋር አልተነጋገርኩም። ከካፍ እና ከፊፋ ጋር የምሰራቸው ሥራዎች (የቪዲዮ ኮንፍረሶች) አሉ። እነርሱ ሥራ ላይ ትኩረት እያደረኩ ነው ያለሁት። በቀጣይ ከፈጣሪ ጋር ማረፊያዬን አሳውቃለው።
      እዚሁ በሀገሬ እየሰራው የምቆይ ይመስለኛል። ለማንኛውም ከሐምሌ ሠላሳ በኃላ የሚሆነውን አብረን እናያለን።” ብለዋል።
    - የሲዳማ ዞን ክልል ሆኖ ለመደራጀት በሚካሄደው የህዝብ ውሳኔ ጥቅም ላይ በሚውሉ ምልክቶች ውይይት እየተደረገ መሆኑን የኢትዮጵያ ብሔራዊ ምርጫ ቦርድ አስታውቋል፡፡በምልክቶቹ የመጀመሪያው
      ረቂቅ ላይ ለመወሰን የደቡብ ክልል ምክር ቤት ውይይት እየተደረገ መሆኑን በኢትዮጵያ ብሔራዊ ምርጫ ቦርድ ኮምዩኒኬሽንስ አማካሪ ወ/ት ሶሊያና ሽመልስ ተናግረዋል፡፡በህዝበ ውሳኔው የሚቀርቡ
      ምልክቶቹ ምን አይነት ይሁኑ በሚለው እና ምልክቶቹ በተቀመጠው መስፈርት መሰረት ገለልተኛ፣ የማህበረሰቡን ምስል የሚያሳዩ እንዲሁም ጥያቄዎቹ ግልጽ እንዲሆኑ እየተሰራ ነው ተብሏል፡፡በውይይቱ
      ላይ ስምምነት የተደረሰባቸው ምልክቶች ለህዝብ ይፋ እንደሚደረጉ ተጠቁሟል፡፡የህዝበ ውሳኔው አፈጻጸሞች በክልሉ ጥያቄ ለተወሰኑ ቀናቶች ከተራዘሙት ውጪ አብዛኞቹ በተያዘላቸው መርሀ ግብር
      እየተከናወኑ እንደሆነም ተነግሯል፡፡የህግ አስፈጻሚ እና የጸጥታ አካላት እንዲሁም የቦርዱ የስራ አመራር አባላት የህዝበ ውሳኔውን አፈጻጸም ሰላማዊነት ለማረጋገጥ ውይይት ማካሄዳቸው ታውቋል፡፡የድምፅ
      ሰጪዎች ምዝገባ፣ እንዲሁም የድምፅ መስጫ እና ድህረ ምርጫ ሂደቱን ሰላማዊነት ለማረጋገጥ እንዲሁም የምርጫ አስፈጻሚዎችን ደህንነት ለማስጠበቅ የህግ አስፈጻሚ አካላት ትብብር እንደሚያስፈልግ
      ቦርዱ ለተሳታፊዎቹ ማስገንዘቡ ተገልጿል፡፡ለህዝበ ውሳኔ ምርጫ አስፈፃሚዎች ስልጠና በአዲስ አበባ ከተማ ከመስከረም 24 እስከ 30 ከተሰጠ በኋላ እንደሚሰማሩም የኢቢሲ ዘገባ አመልክቷል፡፡በቀጣይ
      የሚካሄዱ ተግባራትም በመርሃ ግብሩ መሰረት ለማከናወን ዝግጅቶች እየተካሄዱ እንዳለ ለማወቅ ተችሏል፡፡በተያያዘ ዜና የኢትዮጵያ ብሔራዊ ምርጫ ቦርድ በመጪው ህዳር 3 ቀን 2012 ዓ.ም የሲዳማ
      ዞን የክልልነት ጥያቄን ህዝበ ውሳኔ አማራጭ ሃሳቦችና የሚወከሉበት ምልክቶችን ይፋ አድርጓልበዚህም መሰረት “ሲዳማ በደቡብ ብሔር ብሔረሰቦችና ህዝቦች ክልል ውስጥ እንዲቆይ እፈልጋለሁ”
      ለሚለው አማራጭ የጎጆ ቤት ምልክት፣  “ሲዳማ ራሱን ችሎ በክልልነት እንዲደራጅ እፈልጋለሁ” ለሚለው አማራጭ የሻፌታ ምልክት ሆኖ ለህዝበ ውሳኔው ድምጽ መስጫነት እንዲያገለግል ተወስኗል
      ።
  - source_sentence: ሁለት የብአዴን አመራሮች ላይ ያነጣጠረ ጥቃት በደብረ ማርቆስ መፈጸሙ ተሰማ
    sentences:
    - "አንድነት ለዲሞክራሲና ለፍትህ ፓርቲ በሚቀጥሉት የምርጫ ወራት በሚልዮኖች ድምጽ ለነጻና ፍትሀዊ ምርጫ የኢትዮጵያ ህዝብ የስልጣን ባለቤት እንዲሆን እናደርጋለን ሲል ዛሬ ረፋዱ ላይ በጽህፈት\
      \ ቤቱ በሰጠው መግለጫ ላይ ባሰራጨው ጽሁፍ ግልጽ አድርጓል።ከዚህ ቀደም ፓርቲው ያካሄዳቸውን የሚልዮኖች ድምጽ ለነጻነትና የሚልዮኖች ድምጽ ለመሬት ባለቤትነት ንቅናቄዎች አስታውሶ በተለይ\
      \ በመጀመርያው እንቅስቃሴ የፈለገውን ውጤት እንዳገኘ የፓርቲው የውጭ ግንኙነት ሃላፊ አቶ ዳንኤል ተፈራ አብራርተዋል።ሶስተኛውና የመጨረሻው የአንድነቶች የሚልዮኖች ድምጽ እንቅስቃሴ ይኸው\
      \ የሚልዮኖች ድምጽ ለነጻነትና ለፍትሀዊ ምርጫ የሚል መሆኑንም የጽሁፉ መግለጫ ይጠቁማል። አንድነት በሰላማዊ መንገድ የስልጣን ሽግግር ለማምጣት ላቀደው ዋነኛ የትግል ምዕራፍ በሀገራችን\
      \ እውነተኛ ለውጥ እንዲመጣ የሚፈልጉ ዜጎች ሁሉ ፓርቲውን በአበላነትና በደጋፊነት በመቀላቀል የለውጡ አካል እንዲሆኑ የሚያደርግ ተደራጅ 2007 ለለውጥ የሚል ሰፊ የማደረጀትና የቅስቀሳ\
      \ ዘመቻ ለማካሄድ ዝግጅቱን እንዳጠናቀቀ ገልጿል። ሙሉውን ዘገባ ያድምጡ።          \n "
    - 'የእንግሊዙ ጠቅላይ ሚኒስትር ቦሪስ ጆንሰን የጣሉትን ጥብቅ የእንቅስቃሴ እና የጉዞ እገዳ በመተላለፍ ወደ ቤተሰባቸው አቅንተዋል የተባሉ አማካሪያቸውን ከኃላፊነት እንዲያነሱ የቀረበላቸውን
      ጥሪ ውድቅ አድርገዋል፡፡

      የ2016ቱን የእንግሊዝን ከአውሮፓ ህብረት የመነጠል ሂደት (ብሬግዚት) በበላይነት የመሩት ዶሚኒኪ ከሚንግስ 400 ኪሎ ሜትሮችን አቆራርጠው በሰሜናዊ እንግሊዝ ዱርሃም ወደሚገኙ ቤተሰቦቻቸው
      ያቀኑት ጆንሰን እገዳውን ባስተላለፉበት ባሳለፍነው ወርሃ መጋቢት ነበር፡፡

      በወቅቱ የከሚንግስ ባለቤት የኮሮና ህመም ምልክቶችን ያሳዩ ነበር የተባለ ሲሆን የአንድ ልጃቸውን ሁኔታ ለመመልከት ወደ ቤተሰባቸው ማቅናታቸውም ይነገራል፡፡

      ሆኖም የልጃቸውን ሁኔታ ቤተሰባቸው ሊከታተል እንደሚችል የሚናገሩ የተፎካካሪ ፖለቲካ ፓርቲዎች እገዳውን በመተላለፋቸው ከኃላፊነት ሊነሱ ይገባል ሲሉ ድምጻቸውን አሰምተዋል፡፡

      የጠቅላይ ሚኒስትሩ ጽህፈት ቤት ግን ጥያቄውን አልተቀበለም ሮይተርስ እንደዘገበው ከሆነ፡፡

      አማካሪው የጥንቃቄ መርሆዎችን አክብረው የልጃቸውን ሁኔታ ለመመልከት ወደ ቤተሰባቸው ቢያቀኑም በአጎራባች መንደሮች ሆነው ሁኔታዎችን ከመከታተል ውጪ ከቤተሰባቸው እንዳልተቀላቀሉም አስታውቋል፡፡

      ከአማካሪያቸው ጉዞ ጥቂት ቀናት በፊት እገዳ ስለመጣላቸው አስታውቀው የነበሩት ጆንሰን ራሳቸው በቫይረሱ ተይዘው እንደነበር የሚታወስ ነው፡፡

      '
    - ሁለት የብሔረ አማራ ዴሞክራሲያዊ ንቅናቄ (ብአዴን) ከፍተኛ አመራሮች ላይ ያነጣጠረ የጥቃት ሙከራ በደብረ ማርቆስ ከተማ መፈጸሙ ተሰማ።የጥቃት ሙከራው የብአዴን መስራችና የቀድሞ የፖሊሲ
      ጥናትና ምርምር ማዕከል ምክትል ዋና ዳይሬክተርና የመንግሥት ኮሙዩኒኬሽን ጉዳዮች ሚኒስትር የነበሩት አቶ በረከት ስምዖንና ሌላ የብአዴን ማዕከላዊ ኮሚቴ አባል በሆኑት አቶ ምግባሩ ከበደ
      ላይ መሆኑን ከክልሉ መንግሥት የኮሙዩኒኬሽን ጉዳዮች ቢሮ ኃላፊ አቶ ንጉሡ ጥላሁን ያገኘነው መረጃ ያመለክታል።ሁለቱ የብአዴን አባላት በከተማው ታይተዋል የሚል ወሬ በማኅበራዊ ድረ ገጾች
      መናፈሱን ተከትሎ፣ ግለሰቦቹ ለሌላ ተልዕኮ እየተንቀሳቀሱ እንደሆኑ የጠረጠሩ የከተማው ነዋሪዎች በደብረ ማርቆስ ሆቴል ላይ ጉዳት ሲያደርሱ ትኩረት ከተደረገባቸው ፖለቲከኞች የአንዱ ነው
      ተብሎ የተጠረጠረ ተሽከርካሪ በእሳት ማቃጠላቸውንም ለማወቅ ተችሏል።አቶ ንጉሡ ድርጊቱን ያወገዙ ሲሆን፣ በከተማው ታይተዋል ከተባሉ አመራሮች አንዱ አቶ ምግባሩ በባህር ዳር የክልሉ ምክር
      ቤት ስብሰባ ላይ አብረዋቸው እየተሳተፉ እንደሚገኙ ገልጸዋል።‹‹ማንኛውም አመራርም ሆነ ዜጋ በየትኛውም ቦታ የመንቀሳቀስ መብቱን ሊገድብ የሚችል ነገር ሊኖር አይገባም፤›› ያሉት አቶ ንጉሡ፣
      ‹‹ሰሞኑን የአንዳንድ አመራሮች ስም እየተጠቀሰ ሕዝቡን በማደናገርና ብጥብጥ በማንገስ በክልላችን የተገኘውን ሰላም ለመቀልበስ የሐሰት መረጃዎች እየተናፈሱ በመሆኑ ሕዝባችን ታላቅ ጥንቃቄ
      ማድረግ ይገባዋል፤›› ሲሉ አሳስበዋል።ሁለቱ የብአዴን ፖለቲከኞች ለራሳቸው የፖለቲካ ፍላጎት በደብረ ማርቆስ ከተማ በድብቅ ሕዝብ በማወያየት ላይ እንደሚገኙ የሚገልጽ ሐሰተኛ ወሬ የጥቃቱ
