  - 'ባለፈው ቅዳሜ በሰሜን ምሥርቅ ናይጀርያ በታጠቁ ሽፍቶችና በመንደር ነዋሪዎች መካከል በተካሄደ ግጭት 45 ሰዎች ተገድለዋል።

