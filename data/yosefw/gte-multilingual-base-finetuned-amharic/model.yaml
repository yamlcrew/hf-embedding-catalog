    ማህበረሰቡ ግንዛቤ ለመፍጠር ዩኒቨርሲቲዎች የተለያዩ መንገዶችን እየተከተሉ መሆኑ ተጠቁሟል።በሁለት ሳምንታ እድሜያቸው ከ60 ዓመት በላይ የሆኑና የልብ ወይም የካንሰር እንዲሁም የስኳርና ሌሎች
