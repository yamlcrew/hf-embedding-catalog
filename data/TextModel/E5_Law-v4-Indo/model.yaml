widgetData:
- source_sentence: 'query: Seorang pria bernama Eko Santoso di Kota Semarang pada tahun 2024 secara terang-terangan di hadapan
    kerumunan massa di alun-alun kota menyampaikan orasi yang berisi hasutan untuk melakukan diskriminasi terhadap penganut
    agama tertentu yang ada di Indonesia, dengan menyatakan bahwa agama tersebut adalah ancaman dan harus dilawan. Pernyataan
    tersebut disampaikan secara langsung di muka umum dan direkam oleh banyak orang. Pasal apa yang tepat dikenakan kepada
    Eko Santoso?'
  sentences:
  - 'passage: Ya, karena mantan pejabat yang tanpa izin dari pejabat berwenang menahan atau tetap menyimpan surat dinas yang
    ada padanya setelah tidak lagi menjabat dapat dipidana penjara paling lama 6 bulan atau denda paling banyak kategori II.
    (Pasal 541 KUHP)'
  - 'passage: Pasal 300: Setiap Orang Di Muka Umum yang: a. melakukan perbuatan yang bersifat permusuhan; b. menyatakan kebencian
    atau permusuhan; atau c. menghasut untuk melakukan Kekerasan, atau diskriminasi, terhadap agama, kepercayaan orang lain,
    golongan, atau kelompok atas dasar agama atau kepercayaan di Indonesia, dipidana dengan pidana penjara paling lama 3 (tiga)
    tahun atau pidana denda paling banyak kategori IV.. Pasal ini berlaku karena Eko Santoso secara Di Muka Umum menyatakan
    kebencian dan menghasut untuk melakukan diskriminasi terhadap penganut agama tertentu di Indonesia berdasarkan agama mereka,
    yang secara langsung memenuhi unsur tindak pidana dalam Pasal 300 KUHP 2023..'
  - 'passage: Pasal 301: (1) Setiap Orang yang menyiarkan, mempertunjukkan, menempelkan tulisan atau gambar, atau memperdengarkan
    suatu rekaman, termasuk menyebarluaskan melalui sarana teknologi informasi yang berisi Tindak Pidana sebagaimana dimaksud
    dalam Pasal 300, dengan maksud agar isi tulisan, gambar, atau rekaman tersebut diketahui atau lebih diketahui oleh umum,
    dipidana dengan pidana penjara paling lama 5 (lima) tahun atau pidana denda paling banyak kategori V. (2) Jika Setiap
    Orang sebagaimana dimaksud pada ayat (1) melakukan perbuatan tersebut dalam menjalankan profesinya dan pada waktu itu
    belum lewat 2 (dua) tahun sejak adanya putusan pemidanaan yang telah memperoleh kekuatan hukum tetap karena melakukan
    Tindak Pidana yang sama, dapat dijatuhi pidana tambahan berupa pencabutan hak sebagaimana dimaksud dalam Pasal 86 huruf
    f.. Pasal ini mengatur penyebarluasan melalui media konten yang memuat tindak pidana Pasal 300, merupakan pasal turunan
    dari Pasal 300 bukan pasal induk kebencian berbasis agama itu sendiri..'
- source_sentence: 'query: Dimas Pratama, seorang mantan karyawan IT perusahaan swasta di Jakarta, pada tahun 2023 secara
    diam-diam memasang perangkat lunak penyadap pada server perusahaan PT Maju Sejahtera tanpa izin. Melalui perangkat tersebut,
    Dimas berhasil merekam dan mengakses transmisi email internal serta dokumen elektronik rahasia yang tidak bersifat publik
    milik direksi perusahaan. Ia kemudian menyebarluaskan rekaman percakapan tersebut kepada kompetitor bisnis. Setelah dilaporkan,
    penyidik menemukan bukti kegiatan penyadapan dan penyebaran informasi rahasia yang dilakukan Dimas. Pasal apa yang dapat
    dikenakan kepada Dimas Pratama?'
  sentences:
  - 'passage: Pasal 258: (1) Setiap Orang yang secara melawan hukum mendengarkan, merekam, membelokkan, mengubah, menghambat,
    dan/atau mencatat transmisi Informasi Elektronik dan/atau Dokumen Elektronik yang tidak bersifat publik, baik menggunakan
    jaringan kabel komunikasi maupun jaringan nirkabel, dipidana dengan pidana penjara paling lama 10 (sepuluh) tahun atau
    pidana denda paling banyak kategori VI. (2) Setiap Orang yang menyiarkan atau menyebarluaskan hasil pembicaraan atau perekaman
    sebagaimana dimaksud pada ayat (1), dipidana dengan pidana penjara paling lama 10 (sepuluh) tahun atau pidana denda paling
    banyak kategori VI.. Pasal ini berlaku karena Dimas Pratama telah secara melawan hukum merekam dan mencatat transmisi
    Informasi Elektronik dan Dokumen Elektronik yang tidak bersifat publik milik PT Maju Sejahtera melalui jaringan komunikasi
    (ayat 1), dan kemudian menyebarluaskan hasil perekaman tersebut kepada pihak lain (ayat 2), yang keduanya merupakan perbuatan
    yang dilarang dalam Pasal 258 KUHP 2023..'
  - 'passage: Membuat dan menyebarluaskan pornografi melalui media sosial dapat dipidana penjara paling singkat 6 bulan dan
    paling lama 10 tahun atau denda kategori IV sampai VI. (Pasal 407 ayat (1) KUHP)'
  - 'passage: Pasal 407: (1) Setiap Orang yang memproduksi, membuat, memperbanyak, menggandakan, menyebarluaskan, menyiarkan,
    mengimpor, mengekspor, menawarkan, memperjualbelikan, menyewakan, atau menyediakan Pornografi, dipidana dengan pidana
    penjara paling singkat 6 (enam) Bulan dan pidana penjara paling lama 10 (sepuluh) tahun atau pidana denda paling sedikit
    kategori IV dan pidana denda paling banyak kategori VI. (2) Perbuatan sebagaimana dimaksud pada ayat (1) tidak dipidana
    jika merupakan karya seni, budaya, olahraga, kesehatan, dan/atau ilmu pengetahuan.. Pasal ini mengatur produksi dan distribusi
    konten pornografi, yang berbeda dengan penyadapan dan penyebaran informasi elektronik yang tidak bersifat publik..'
- source_sentence: 'query: Apa artinya menimbulkan persangkaan palsu dalam KUHP?'
  sentences:
  - 'passage: Pengaduan fitnah adalah mengajukan pengaduan atau pemberitahuan palsu secara tertulis kepada pejabat yang berwenang
    sehingga kehormatan orang lain diserang. (Pasal 437 ayat (1) KUHP)'
  - 'passage: Menimbulkan persangkaan palsu adalah melakukan suatu perbuatan yang menyebabkan orang lain disangka telah melakukan
    suatu tindak pidana, padahal sebenarnya tidak. (Pasal 438 KUHP)'
  - 'passage: Ya, karena pejabat di lembaga pengangkutan surat atau barang yang menyerahkan surat, kartu pos, barang, atau
    paket kepada orang yang tidak berhak menerimanya, atau merusak, memusnahkan, mengubah isi, maupun mengambil barang di
    dalamnya untuk diri sendiri, dapat dipidana penjara paling lama 5 tahun atau denda paling banyak kategori IV. (Pasal 537
    KUHP)'
- source_sentence: 'query: Kalau saya kasih hadiah ke pejabat karena berharap dia gunakan wewenangnya untuk bantu urusan saya,
    apakah saya bisa kena Pasal 606?'
  sentences:
  - 'passage: Bisa, karena pasal ini melarang pemberian hadiah atau janji kepada pegawai negeri atau penyelenggara negara
    yang dikaitkan dengan kekuasaan atau wewenang yang melekat pada jabatan atau kedudukannya, meski tanpa permintaan eksplisit
    dari pejabat tersebut. (Pasal 606 KUHP)'
  - 'passage: Pasal 471: (1) Selain penganiayaan sebagaimana dimaksud dalam Pasal 467 dan Pasal 470, penganiayaan yang tidak
    menimbulkan penyakit atau halangan untuk menjalankan profesi jabatan atau mata pencaharian, dipidana karena penganiayaan
    ringan, dengan pidana penjara paling lama 6 (enam) Bulan atau pidana denda paling banyak kategori II. (2) Jika Tindak
    Pidana sebagaimana dimaksud pada ayat (1) dilakukan terhadap orang yang bekerja padanya atau menjadi bawahannya, pidananya
    dapat ditambah 1/3 (satu per tiga). (3) Percobaan melakukan Tindak Pidana sebagaimana dimaksud pada ayat (1), tidak dipidana.
    Pasal ini berlaku karena pukulan Ronald yang tidak menimbulkan penyakit atau halangan bekerja, serta dilakukan terhadap
    bawahan, memenuhi unsur penganiayaan ringan dengan pemberatan pidana pada ayat (1) dan ayat (2).'
  - 'passage: Bisa, pasal ini melarang setiap orang yang secara melawan hukum melakukan tindakan memperkaya dirinya, pihak
    lain, maupun korporasi sehingga mengakibatkan kerugian pada keuangan negara. (Pasal 603 KUHP)'
- source_sentence: 'query: Di Bandung, seorang dokter bedah bernama Dr. Lestari melakukan operasi pada pasien bernama Tn.
    Agus. Karena kurang teliti dalam memeriksa alat operasi, Dr. Lestari menyebabkan komplikasi serius yang mengakibatkan
    Tn. Agus mengalami cacat permanen dan tidak dapat bekerja lagi sebagai tukang bangunan. Pasal apa yang dapat dikenakan
    kepada Dr. Lestari?'
  sentences:
  - 'passage: Pasal 459: Setiap Orang yang dengan rencana terlebih dahulu merampas nyawa orang lain, dipidana karena pembunuhan
    berencana, dengan pidana mati atau pidana penjara seumur hidup atau pidana penjara paling lama 20 (dua puluh) tahun. Pasal
    ini mengatur pembunuhan dengan unsur perencanaan atau premeditasi.'
  - 'passage: Pasal 475: (1) Jika Tindak Pidana sebagaimana dimaksud dalam Pasal 474 dilakukan dalam menjalankan jabatan,
    mata pencaharian, atau profesi, pidananya dapat ditambah 1/3 (satu per tiga). (2) Setiap Orang sebagaimana dimaksud pada
    ayat (1) dapat juga dijatuhi pidana tambahan berupa pengumuman putusan hakim sebagaimana dimaksud dalam Pasal 66 ayat
    (1) huruf c dan pencabutan hak sebagaimana dimaksud dalam Pasal 86 huruf f. Pasal ini berlaku karena kasus tersebut melibatkan
    kelalaian dalam menjalankan profesi medis yang mengakibatkan Luka Berat, sehingga merupakan aggravating circumstance dari
    Pasal 474 yang diatur dalam Pasal 475.'
  - 'passage: Pasal 448: (1) Dipidana dengan pidana penjara paling lama 1 (satu) tahun atau pidana denda paling banyak kategori
    II, Setiap Orang yang: a. secara melawan hukum memaksa orang lain supaya melakukan, tidak melakukan, atau membiarkan sesuatu,
    dengan Kekerasan atau Ancaman Kekerasan, baik terhadap orang itu sendiri maupun orang lain; atau b. memaksa orang lain
    supaya melakukan, tidak melakukan, atau membiarkan sesuatu dengan ancaman pencemaran atau pencemaran tertulis. (2) Tindak
    Pidana sebagaimana dimaksud pada ayat (1) huruf b hanya dapat dituntut atas pengaduan dari Korban Tindak Pidana. Pasal
    ini berlaku karena Bram Sulistyo memaksa Andi Firmansyah untuk melakukan sesuatu (mencabut laporan ketenagakerjaan) dengan
    ancaman pencemaran nama baik (ancaman membocorkan aib pribadi), yang memenuhi unsur tindak pidana dalam Pasal 448 ayat
    (1) huruf b KUHP 2023. Karena menggunakan ancaman pencemaran, tindak pidana ini merupakan delik aduan sebagaimana Pasal
    448 ayat (2)'
