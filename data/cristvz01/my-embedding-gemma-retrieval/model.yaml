widgetData:
- source_sentence: Thiết bị thông minh được định nghĩa như thế nào?
  sentences:
  - Chọn hình elip rồi nháy nút phải chuột, chọn Duplicate để có các bản sao của cánh hoa.
  - Hệ quản trị cơ sở dữ liệu (DBMS) là một phần mềm cung cấp giao diện để tạo, truy vấn, cập nhật và quản lý cơ sở dữ liệu.
    Các hệ quản trị phổ biến bao gồm MySQL, PostgreSQL và Microsoft SQL Server.
  - Có thể hiểu một cách đơn giản thiết bị thông minh là các thiết bị điện tử có thể hoạt động một cách tự chủ trong một mức
    độ nhất định nhờ các phần mềm điều khiển được cài đặt sẵn. Các thiết bị thông minh ngày nay đều có khả năng tương tác
    với các thiết bị khác một cách tự động qua mạng không dây như bluetooth, wifi,... để tiếp nhận, xử lí và truyền dữ liệu.
- source_sentence: IoT là gì và nó có những ứng dụng nào trong thực tế?
  sentences:
  - Ngôn ngữ lập trình là một hệ thống các quy tắc cú pháp và ngữ nghĩa dùng để viết các chương trình máy tính. Có nhiều loại
    ngôn ngữ lập trình khác nhau như Python, Java, C++, mỗi loại có ưu và nhược điểm riêng.
  - Lệnh `clear()` xoá toàn bộ một danh sách. Sau khi thực hiện lệnh clear(), danh sách gốc trở thành rỗng.
  - IoT là việc kết nối các thiết bị thông minh với nhau nhằm thu thập và xử lí thông tin một cách tự động, tức thời trên
    diện rộng như trong các ứng dụng giám sát giao thông, cảnh báo thiên tai, lái xe tự động, điều khiển quá trình sản xuất
    trong nhà máy và nhiều ứng dụng khác.
- source_sentence: Biểu thức lôgic là gì và giá trị của nó thuộc kiểu dữ liệu nào?
  sentences:
  - Biểu thức lôgic là biểu thức chỉ nhận giá trị True hoặc False. Giá trị các biểu thức lôgic thuộc kiểu bool.
  - Trong Python, hàm print() được sử dụng để hiển thị thông tin ra màn hình. Bạn có thể truyền vào hàm này các giá trị số,
    chuỗi ký tự, hoặc giá trị của các biến để in chúng ra.
  - Ngoài việc là một toán tử logic, từ khoá 'in' còn được dùng để chọn lần lượt từng phần tử trong một vùng giá trị, danh
    sách, hoặc xâu, thường được sử dụng trong vòng lặp for.
- source_sentence: Nếu dùng lệnh `find()` để tìm kiếm một chuỗi con nhưng không tìm thấy thì kết quả trả về là gì?
  sentences:
  - 'Có thể duyệt các kí tự của xâu bằng lệnh `for` tương tự như với danh sách (ví dụ: `for ch in s:`). Một cách khác là duyệt
    kí tự của xâu theo chỉ số, ví dụ như kiểm tra `S[k]` và `S[k+1]` trong một vòng lặp.'
  - Lệnh `find()` sẽ tìm vị trí đầu tiên của xâu con trong xâu mẹ. Nếu không tìm thấy thì trả về -1.
  - 'Kiểu dữ liệu boolean trong lập trình chỉ có hai giá trị: True (đúng) và False (sai). Nó thường được sử dụng trong các
    câu lệnh điều kiện để kiểm soát luồng thực thi của chương trình, ví dụ như trong câu lệnh `if` hoặc vòng lặp `while`.'
- source_sentence: Sự kết hợp giữa lệnh 'for' và toán tử 'in' có công dụng gì?
  sentences:
  - Có thể duyệt nhanh từng phần tử của danh sách bằng toán tử in và lệnh for mà không cần sử dụng lệnh range().
  - Mạng Internet là một hệ thống thông tin toàn cầu gồm các mạng máy tính được liên kết với nhau. Giao thức chính được sử
    dụng là bộ giao thức TCP/IP, cho phép hàng tỷ người dùng trao đổi thông tin.
  - Bộ giám sát hành trình trên xe tải hoặc xe khách ghi lại và gửi dữ liệu về tốc độ, toạ độ, và thời gian về máy chủ. Dựa
    trên các dữ liệu này, người ta có thể phân tích và xác định được các hành vi vi phạm giao thông của tài xế.
