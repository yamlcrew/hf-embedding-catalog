- source_sentence: 'Job Title: DevOps Engineer (Mid‑Level)

    Company Overview: A rapidly expanding startup building a cloud‑native platform for remote collaboration, backed by a global
    user base and aggressive growth targets.

    Key Responsibilities:

    - Develop and maintain CI/CD pipelines (GitHub Actions, CircleCI) for Java Spring Boot and Node.js services.

    - Automate provisioning of AWS infrastructure (VPC, EC2, RDS, EKS) using Terraform and manage state securely.

    - Containerize applications with Docker, create Helm charts, and support deployments to managed Kubernetes clusters.

    - Implement monitoring, logging, and alerting solutions using CloudWatch, Prometheus, and Grafana.

    - Collaborate with product and security teams to embed compliance checks and automated testing into release cycles.

    - Participate in on‑call duties, incident triage, and root‑cause analysis.

    Required Qualifications:

    - 3‑5 years of hands‑on DevOps experience in cloud environments, primarily AWS.

    - Proficiency with IaC tools (Terraform, CloudFormation) and container orchestration (Kubernetes/EKS).

    - Strong scripting skills in Python or Bash and familiarity with CI/CD platforms.

    - Experience with monitoring stacks (Prometheus, Grafana, ELK) and log aggregation.

    - Good understanding of networking, security groups, IAM policies, and best practices.

    Preferred Qualifications:

    - Certified Kubernetes Administrator (CKA) or AWS Certified DevOps Engineer.

    - Exposure to serverless technologies (Lambda, API Gateway) and infrastructure cost‑management.

    - Knowledge of GitOps tools such as ArgoCD.'
