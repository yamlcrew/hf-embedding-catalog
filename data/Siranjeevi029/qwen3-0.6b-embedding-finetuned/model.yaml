- source_sentence: 'Job Title: Head of People (Lead/Principal HR) – Startup


    Company Overview: Our venture‑backed fintech startup is redefining digital payments across emerging markets. With 300+
    employees and rapid international expansion, we are building a world‑class people function to sustain hyper‑growth.


    Key Responsibilities:

    - Define and execute a holistic People strategy aligned with business objectives, covering talent acquisition, performance
    management, learning & development, compensation, and culture.

    - Lead a growing HR team (Talent Acquisition, HRBP, Learning, Compensation) and mentor senior HR managers.

    - Design and implement scalable recruitment frameworks for high‑volume hiring across engineering, product, and go‑to‑market
    functions.

    - Oversee the performance management cycle, including OKR alignment, continuous feedback, and talent calibration.

    - Drive employee engagement, DEI initiatives, and retention programs to maintain a high‑performing, inclusive workplace.

    - Partner with leadership on workforce planning, succession planning, and organizational design for new market entries.


    Required Qualifications:

    - 8+ years of progressive HR experience, with at least 3 years in a senior leadership role within a fast‑growing startup
    or high‑growth tech company.

    - Demonstrated success building end‑to‑end talent acquisition and people operations from the ground up.

    - Deep expertise in HRIS/ATS platforms, HR analytics, and data‑driven decision making.

    - Strong business acumen, ability to influence C‑suite stakeholders, and excellent communication skills.

    - Bachelor’s degree in Human Resources, Business, or related field; MBA or advanced degree preferred.


    Preferred Qualifications:

    - Experience scaling HR functions across multiple geographies (APAC, EMEA, LATAM).

    - Proven track record in DEI program development and execution.

    - SHRM‑SP, SPHR, or equivalent senior HR certification.'
