- source_sentence: '**Job Title:** Senior Product Manager – Customer Experience (CX) Platform

    **Company Overview:**

    A Fortune 500 leader in enterprise software solutions, delivering end‑to‑end digital transformation tools to Fortune 500
    customers worldwide.

    **Key Responsibilities:**

    - Own the product vision and roadmap for the CX platform serving over 200 global enterprise clients.

    - Partner with sales, support, and engineering to translate market insights and customer feedback into feature specifications.

    - Lead cross‑functional agile squads, prioritizing backlog items and ensuring timely delivery of releases.

    - Define and track success metrics (NPS, adoption, churn) and iterate on product improvements based on data.

    - Conduct competitive analysis and market sizing to inform go‑to‑market strategy and pricing.

    - Mentor junior product managers and act as a liaison between senior leadership and product teams.

    **Required Qualifications:**

    - 3‑5 years of product management experience in SaaS or enterprise software, preferably in CX or customer‑facing solutions.

    - Demonstrated ability to ship complex features from concept to launch in an agile environment.

    - Strong analytical skills with proficiency in SQL, Tableau or similar data‑visualisation tools.

    - Excellent communication and stakeholder‑management skills, able to influence senior executives.

    - Bachelor’s degree in Business, Computer Science, Engineering or related field.

    **Preferred Qualifications:**

    - Experience working in a Fortune 500 or large multinational organization.

    - Familiarity with AI‑enabled personalization or recommendation engines.

    - MBA or advanced degree in product management.'
