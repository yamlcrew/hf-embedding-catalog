widgetData:
- source_sentence: چطور می‌تونم جزئیات ذینفع چک صادر‌شده‌به نامم رو بدونم ؟
  sentences:
  - برای اطلاع از جزئیات ذینفع چک صادر‌شده‌توسط شما یا چک واریز‌شده‌به حساب ، لطفا به یکی از شعب بانک مراجعه کنید .
  - نه ، فقط یکی از این دو امکان روی هر سپرده ثابت ممکنه .
  - انتخاب مناسب حساب جاری برای نیازهای کسب‌وکار و تراکنش شما ، همکاری‌ها برای استارت‌آپ ، خدمات مشاوره ، فضاهای کار مشترک
    ، لجستیک ، روابط عمومی ، خدمات بازاریابی دیجیتال ، تولید محتوا ، خرید هوشمند ، رشد کسب‌وکار با کانال بازاریابی مناسب ،
    دسترسی به 37 میلیون مشتری بالقوه ، پورتال اسمارت‌آپ برای ملاقات با دیگر استارت‌آپ‌ها ، مشتریان ، مربیان و سرمایه‌گذاران
    ، راهکارهای مدیریت دیجیتال و نقدی و مشاوره ارز خارجی .
- source_sentence: چطور باید برای رمز آی‌وی‌آر ثبت‌نام کنم ؟
  sentences:
  - 'بیمه زندگی کلیک تو اینوست ، بهت امکان می‌ده از بازدهی بازار استفاده کنی و همزمان حفاظت مالی برای خانوادت داشته باشی .
    این طرح هزینه کمی داره که باعث می‌شه ارزش صندوقت سریع‌تر رشد کنه . ویژگی‌های اصلی : ساختار هزینه کم ، انتخاب از بین 8
    صندوق مختلف ، گزینه‌های پرداخت حق بیمه یک‌باره ، 5 ساله ، 7 ساله ، 10 ساله یا منظم ، مدت بیمه‌نامه 5 تا 20 سال ، معافیت
    مالیاتی طبق بخش 80سی و 10 ( 10دی ) قانون مالیات .'
  - اگه چمدان یا مدارک شخصی دیر برسن یا اشتباه ارسال بشن ، هزینه جایگزینی وسایل به بیمه‌شده‌پرداخت می‌شه .
  - ثبت‌نامی وجود نداره . فقط باید قبل از تراکنش با پیامک یا از طریق نت‌سیف یا وریفاید بای ویزا یا مسترکارت سکیورکد رمز آی‌وی‌آر
    بگیری .
- source_sentence: چطور می‌تونم برای حسابم صورت‌حساب ایمیلی ثبت‌نام کنم ؟
  sentences:
  - 'برای ثبت‌نام صورت‌حساب ایمیلی ، مراحل زیر رو انجام بدید : 1 ) وارد اینترنت بانک شوید ، 2 ) در منوی سمت چپ زیر گزینه درخواست
    ، روی ثبت‌نام صورت‌حساب ایمیلی کلیک کنید ، 3 ) بعد از خواندن شرایط و قوانین ، گزینه مربوطه رو تیک بزنید و ادامه و تایید
    کنید . یا فرم پیوست رو به نزدیک‌ترین شعبه تحویل بدید . توجه : صورت‌حساب ایمیلی رایگان است و ارسال صورت‌حساب کاغذی پس از
    ثبت‌نام متوقف می‌شود . فقط دارنده اصلی حساب پس‌انداز یا حساب جاری تنها می‌تواند از این خدمت استفاده کند .'
  - حساب بازپرداخت باید هم‌ردیف حساب پس‌انداز حقوقت باشه . اگر حساب حقوقت مشترک هست ، معرفی جدا لازم نیست و فقط باید اسم مشترک
    رو تو فرم باز کردن حساب اضافه کنی .
  - یه سرویسه که با کارت بانک م و ن رمز شخصی یا کد امن می‌سازی . این باعث میشه فقط خودت بتونی با کارتت خرید اینترنتی انجام
    بدی . هیچ نرم‌افزار خاصی هم نمی‌خواد ، مثل رمز خودپرداز استفاده میشه .
- source_sentence: ماشینم باید کارشناسی یا ارزش‌گذاری بشه ؟
  sentences:
  - شما نرخ سود اضافه 0.5٪ دریافت می‌کنید .
  - اگه ماشینت رو بانک ما نخریده باشی ، باید کارشناسی و ارزش‌گذاری بشه . ولی اگه از طریق بانک ما باشه ، ممکنه فقط بر اساس
    شرایط اعتباری لازم باشه بررسی بشه .
  - باید میانگین مانده سه‌ماهه 10 لاک روپیه داشته باشید .
- source_sentence: چطور بفهمم خودپرداز کارت چیپ فارکس پلاسمو قبول می‌کنه ؟
  sentences:
  - بعد از اولین خرید ، تا 3 تا 4 روز کاری بسته به زمان پردازش ثبت‌کننده صندوق نمی‌تونی معامله کنی . بعد از اولین سفارش در
    هر صندوق ، شماره فولیو برای اون صندوق ایجاد می‌شه . تا وقتی شماره فولیو ایجاد‌نشده‌، نمی‌تونی سفارش دیگه‌ای برای اون صندوق
    ثبت کنی . بعد از ایجاد شماره فولیو ، می‌تونی هر تعداد سفارش در هر طرح صندوق ثبت کنی .
  - کارت‌های چیپ فارکس پلاس در خودپردازهای ویزا و مسترکارت پذیرفته می‌شن . دنبال لوگوی ویزا ، پلاس یا مسترکارت باشین .
  - حداقل مبلغ وام بیست هزار روپیه‌ست و حداکثر یک و نیم لک . ولی بسته به مدل ماشین می‌تونی تا هشتاد و پنج درصد ارزش ماشین
    وام بگیری .
