widgetData:
- source_sentence: Alice and Bob play a game involving a circle whose circumference is divided by 12 equally-spaced points.
    The points are numbered clockwise, from 1 to 12. Both start on point 12. Alice moves clockwise and Bob, counterclockwise.
    In a turn of the game, Alice moves 5 points clockwise and Bob moves 9 points counterclockwise. The game ends when they
    stop on the same point. How many turns will this take?
  sentences:
  - How many distinct triangles can be drawn using three of the dots below as vertices? [asy]dot(origin^^(1,0)^^(2,0)^^(0,1)^^(1,1)^^(2,1));[/asy]
  - Tess runs counterclockwise around rectangular block $JKLM$. She lives at corner $J$. Which graph could represent her straight-line
    distance from home?
  - Which triplet of numbers has a sum NOT equal to 1?
- source_sentence: Which of these numbers is less than its reciprocal?
  sentences:
  - A white cylindrical silo has a diameter of 30 feet and a height of 80 feet. A red stripe with a horizontal width of 3
    feet is painted on the silo, as shown, making two complete revolutions around it. What is the area of the stripe in square
    feet? [asy] size(250);defaultpen(linewidth(0.8)); draw(ellipse(origin, 3, 1)); fill((3,0)--(3,2)--(-3,2)--(-3,0)--cycle,
    white); draw((3,0)--(3,16)^^(-3,0)--(-3,16)); draw((0, 15)--(3, 12)^^(0, 16)--(3, 13)); filldraw(ellipse((0, 16), 3, 1),
    white, black); draw((-3,11)--(3, 5)^^(-3,10)--(3, 4)); draw((-3,2)--(0,-1)^^(-3,1)--(-1,-0.89)); draw((0,-1)--(0,15),
    dashed); draw((3,-2)--(3,-4)^^(-3,-2)--(-3,-4)); draw((-7,0)--(-5,0)^^(-7,16)--(-5,16)); draw((3,-3)--(-3,-3), Arrows(6));
    draw((-6,0)--(-6,16), Arrows(6)); draw((-2,9)--(-1,9), Arrows(3)); label("$3$", (-1.375,9.05), dir(260), fontsize(7));
    label("$A$", (0,15), N); label("$B$", (0,-1), NE); label("$30$", (0, -3), S); label("$80$", (-6, 8), W);[/asy]
  - Aunt Anna is $42$ years old. Caitlin is $5$ years younger than Brianna, and Brianna is half as old as Aunt Anna. How old
    is Caitlin?
  - Tess runs counterclockwise around rectangular block $JKLM$. She lives at corner $J$. Which graph could represent her straight-line
    distance from home?
- source_sentence: 'Problems 8,9 and 10 use the data found in the accompanying paragraph and table: Juan organizes the stamps
    in his collection by country and by the decade in which they were issued. The prices he paid for them at a stamp shop
    were: Brazil and France, 6 cents each, Peru 4 cents each, and Spain 5 cents each. (Brazil and Peru are South American
    countries and France and Spain are in Europe.) [asy] /* AMC8 2002 #8, 9, 10 Problem */ size(3inch, 1.5inch); for ( int
    y = 0; y <= 5; ++y ) { draw((0,y)--(18,y)); } draw((0,0)--(0,5)); draw((6,0)--(6,5)); draw((9,0)--(9,5)); draw((12,0)--(12,5));
    draw((15,0)--(15,5)); draw((18,0)--(18,5)); draw(scale(0.8)*"50s", (7.5,4.5)); draw(scale(0.8)*"4", (7.5,3.5)); draw(scale(0.8)*"8",
    (7.5,2.5)); draw(scale(0.8)*"6", (7.5,1.5)); draw(scale(0.8)*"3", (7.5,0.5)); draw(scale(0.8)*"60s", (10.5,4.5)); draw(scale(0.8)*"7",
