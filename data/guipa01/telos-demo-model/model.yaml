widgetData:
- source_sentence: A contraceção de longa duração (LARC – long-acting reversible contraception) que envolve implantes subcutâneos,
    DIU de cobre e SIU com levonorgestrel, são ultimamente recomendados pela OMS para mulheres mais jovens, devido maior falha
    dos métodos tradicionais, como ocorre com os contracetivos hormonais orais quando usados nessa faixa etária, levando assim
    ao risco de gravidez indesejada. Sobre os LARC, qual a alternativa correta dentre as abaixo relacionadas?
  sentences:
  - O teste consiste em aferir a oximetria de pulso na mão direita (MSD) e num dos pés (MI) do recém-nascido, e considera-se
    como normal a SpO2 maior ou igual a 95% e uma diferença de SpO2 entre o membro superior direito e um dos membros inferiores
    menor ou igual a 3%.
  - Trata-se de iminência de eclâmpsia, sendo necessário administração de sulfato de magnésio, hipotensor de ação rápida e
    avaliação do quadro materno e fetal com análises laboratoriais e de vitalidade fetal após estabilização, para definir
    melhor conduta.
  - O DIU de cobre e o SIU com levonorgestrel podem ser utilizados em mulheres nulíparas que desejam contraceção.
- source_sentence: 'Menino, 6 anos, queixando-se que teve dor e tumefação no joelho esquerdo há 10 dias, com duração de 3
    dias e que há 7 dias apresentou dor de forte intensidade e tumefação no tornozelo esquerdo durando 2 dias, com melhoria
    espontânea. Há 3 dias dor e tumefação no joelho direito, dificultando a marcha. Nega febre. A preocupação maior ao exame
    físico é avaliar:'
  sentences:
  - Auscultação cardíaca.
  - Deverá ser submetida a cirurgia de colectomia subtotal com ileostomia terminal.
  - Espetante, visto que recebeu imunoglobulina anti-D no pré-natal.
- source_sentence: 'Criança de quatro anos chega à consulta externa de Pediatria, acompanhada pela mãe, com história de febre
    intermitente há duas semanas, manchas purpúricas pelo corpo e em membros superiores e inferiores, além de inapetência
    e perda de peso. Exame físico: Inspeção: Estado geral razoável, pálida 3+/4+, eupneica, com presença de petéquias principalmente
    em MMII. Palpação: Adenomegalia cervical, supraclavicular e inguinal. Na palpação abdominal, presença de hepatoesplenomegalia.
    Exames Laboratoriais: Hemograma: Hb: 5,2 g/dL / Ht: 18% / Leucócitos: 57.200/mm3. Neutrófilos: 572 mm3 (1%) / Neutrófilos
    em banda: 0 mm3 (0%). Segmentados: 572 mm3 (1%) Linfócitos típicos: 16.016 mm3 (28%). Linfócitos atípicos: 0 mm3 (0%)
    Blastos: 39.468 mm3 (69%). Plaquetas: 49.000 mm3. O quadro clínico desta criança é compatível com:'
  sentences:
  - Aplicar soro e vacina antirrábica e reforço da vacinação antitetânica.
  - Rutura de aneurisma da aorta abdominal.
  - Leucemia Linfoide Aguda (LLA)
- source_sentence: 'Homem, 45 anos, chega ao serviço de urgência proveniente de um consultório de medicina dentária, onde
    aspirou uma prótese dentária. Caso venha a ocorrer obstrução completa do brônquio principal, uma radiografia do tórax
    desse doente poderá revelar, mais provavelmente:'
  sentences:
  - Desvio do mediastino para o lado direito e atelectasia pulmonar.
  - Seta 1 indica mucosa com epitélio simples cilíndrico, tecido conjuntivo frouxo, criptas e glândulas.
  - A furosemida apresenta o seu mecanismo inibindo o cotransporte localizado na ansa de Henle, o que faz com que esse diurético
    possua utilização importante na insuficiência cardíaca.
- source_sentence: 'Os indicadores de saúde são parâmetros utilizados com a finalidade de avaliar, sob o ponto de vista sanitário,
    a higidez de agregados humanos, bem como de fornecer subsídios aos planeamentos de saúde. A respeito desses indicadores,
    é correto afirmar que:'
  sentences:
  - Internamento com início imediato de penicilina cristalina e preparação do colo para interrupção da gestação.
  - A taxa de mortalidade infantil estima o risco de um nado-vivo morrer durante o seu primeiro ano de vida e reflete o nível
    de saúde e as condições de vida da população.
  - A suplementação recomendada para a prevenção da anemia materna é de 30mg de ferro elementar por dia, para doentes sem
    anemia e geralmente iniciando no segundo trimestre.
