widgetData:
- source_sentence: In 2023, the foreign exchange effect on APAC's revenues showed an unfavorable impact of $1,759 million.
  sentences:
  - How did the change in non-rolling chip win percentage at The Venetian Macao from 2022 to 2023 affect overall revenues?
  - What was the foreign exchange effect on APAC's revenues in 2023?
  - What are the characteristics of Garmin’s Force Trolling Motors?
- source_sentence: The estimated cost of inventory for expected product returns was $226 million and $194 million as of May
    31, 2023 and 2022, respectively, and was recorded in Prepaid expenses and other current assets on the Consolidated Balance
    Sheets.
  sentences:
  - What factors influenced the cash conversion cycle during fiscal year 2023?
  - What were the estimated costs of inventory for expected product returns as of May 31, 2023 and 2022, and how were these
    costs recorded on the Consolidated Balance Sheets?
  - What are the potential consequences of the company being involved in lawsuits related to their acquisitions?
- source_sentence: The Concession requires the company to increase its investment in non-gaming projects by up to 20% in the
    following year if Macao's annual market gross gaming revenue achieves or exceeds 180 billion patacas.
  sentences:
  - What is the required increase in non-gaming investment for the company if Macao's annual gross gaming revenue exceeds
    a certain threshold?
  - What is the valuation allowance of the company as of January 31, 2023?
  - What was the percentage decrease in net operating revenues due to foreign currency exchange rate fluctuations in 2023?
- source_sentence: During the 2023 audit, a critical matter was the auditing of Delta Air Lines' employee benefit plan assets.
    Specifically, the valuation of assets measured at Net Asset Value (NAV) posed a challenge due to the significant judgment
    involved in estimating their fair value, primarily affected by a delay in obtaining relevant data from investment fund
    managers.
  sentences:
  - What is the mission of the company described in the text?
  - What was the percentage increase or decrease in total research and development expenses for the company from the previous
    year?
  - What significant accounting matter related to Delta Air Lines' employee benefit plans was addressed in the 2023 audit?
- source_sentence: A 1% increase in medical cost PMPM trend factors led to an increase in medical costs payable by $1,128
    million for the most recent two months as of December 31, 2023.
  sentences:
  - What financial impact would a 1% increase in medical cost PMPM trend factors have on medical costs payable for the most
    recent two months as of December 31, 2023?
  - How does Kroger present its financial performance in its reporting?
  - What type of merchandising strategy does AutoZone employ to ensure customer satisfaction?
