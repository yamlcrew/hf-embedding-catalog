widgetData:
- source_sentence: राहदानी विभागले 'Batch Processing' कसरी गर्छ?
  sentences:
  - प्रधानमन्त्रीको पद रिक्त भएमा अर्को मन्त्रिपरिषद् गठन नभएसम्म सोही मन्त्रिपरिषद्ले कार्य सञ्चालन गर्नेछ।
  - एकै दिन दर्ता भएका हजारौं आवेदनहरूलाई निश्चित समूह (Batch) मा विभाजन गरी प्रिन्ट र गुणस्तर परीक्षणका लागि पठाइन्छ।
  - ट्रान्जिट भिसा दस्तुर सामान्यतया अमेरिकी डलर ५ (वा सो सरहको अन्य विदेशी मुद्रा) तोकिएको छ।
- source_sentence: सञ्चार माध्यमको स्वतन्त्रताको रक्षा कसले गर्छ?
  sentences:
  - पूर्ण प्रेस स्वतन्त्रता र अभिव्यक्ति स्वतन्त्रताको संरक्षण गर्दै सञ्चार क्षेत्रलाई उत्तरदायी र व्यावसायिक बनाउने नीति
    राज्यले लिनेछ।
  - स्थानीय तहका जनप्रतिनिधि र छिमेकीहरूको सर्जमिन/पहिचानका आधारमा वडाले सिफारिस गरिदिएपछि राहत प्राप्त गर्न सकिन्छ।
  - यदि आवेदनमा गल्ती भएर रद्द गर्नुपरेमा विभागको रुजू शाखामा गएर निवेदन दिनुपर्छ, जसले गर्दा नयाँ आवेदन दिन बाटो खुल्छ।
- source_sentence: पारपाचुके (सम्बन्ध विच्छेद) भएका महिलाले राहदानीमा कुन थर उल्लेख गर्नुपर्छ?
  sentences:
  - जाली राहदानी वा भिसा तयार गरी प्रयोग गर्नु, अर्काको राहदानी प्रयोग गरी यात्रा गर्नु र अध्यागमन अधिकृतलाई झुक्याई नेपाल
    प्रवेश गर्नु वा प्रस्थान गर्नुलाई गम्भीर कसूर मानिन्छ।
  - पारपाचुके गरेका महिलाहरूले नागरिकतामा उल्लेख गरिएको थर मात्र कायम गरी राहदानी लिन चाहेमा पारपाचुके प्रमाणपत्र पेश गर्नुपर्ने
    व्यवस्था छ।
  - कानुनले व्यवस्था गरेमा र प्राविधिक रूपमा सम्भव भएमा आयोगले यस्तो व्यवस्था गर्न सक्छ।
- source_sentence: असहाय र द्वन्द्वपीडित बालबालिकाले राज्यबाट के पाउँछन्?
  sentences:
  - हो, स्थानीय तहले बनाएको ऐन वा नियम प्रमाणीकरण भएपछि स्थानीय राजपत्रमा प्रकाशित हुनुपर्छ।
  - असहाय, अनाथ, अपाङ्गता भएका, द्वन्द्वपीडित, विस्थापित एवं जोखिममा रहेका बालबालिकालाई राज्यबाट विशेष संरक्षण र सुविधा पाउने
    हक हुनेछ।
  - केन्द्रमा प्रिन्ट भएपछि कार्डहरू सुरक्षित रुपमा सम्बन्धित जिल्ला प्रशासन कार्यालयमा पठाइन्छ र त्यहाँबाट सेवाग्राहीलाई
    वितरण गरिन्छ।
- source_sentence: अध्यादेश (Ordinance) को कानुनी हैसियत के हुन्छ?
  sentences:
  - नेपालको स्वतन्त्रता, सार्वभौमसत्ता, भौगोलिक अखण्डता, राष्ट्रियता, र स्वाधीनता नेपालको राष्ट्रिय हितका आधारभूत विषय हुन्।
  - अध्यादेश जारी भएपछि ऐन सरह मान्य हुनेछ, तर संघीय संसदको बैठक बसेको ६० दिनभित्र स्वीकार नगरिएमा स्वतः निष्क्रिय हुनेछ।
  - गम्भीर मानव अधिकार उल्लंघनको घटनामा दोषीलाई कारबाही गर्न आयोगले महान्यायाधिवक्ता मार्फत अदालतमा मुद्दा दायर गर्न सक्छ।
