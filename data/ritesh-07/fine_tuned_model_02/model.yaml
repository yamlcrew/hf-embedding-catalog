widgetData:
- source_sentence: राहदानीको लागि कागजात सत्यापनमा कस्तो मनोनयनपत्र चाहिन्छ?
  sentences:
  - सिम्यान्स अभिलेख किताबको लागि निवेदन फाराम अनुसूची-२क बमोजिमको ढाँचामा आधारित हुन्छ।
  - कुटनीतिक वा विशेष राहदानीको लागि कागजात सत्यापनमा सम्बन्धित पदमा नियुक्तिको मनोनयनपत्रको प्रमाणित प्रतिलिपि चाहिन्छ।
  - राहदानी रद्द गर्न महानिर्देशकले स्वीकृति दिन्छ।
- source_sentence: राहदानी वितरणमा त्रुटि सच्याउन कति समय लाग्छ?
  sentences:
  - राहदानी नियमावली, २०७७ मा अभिलेखको गोपनीयताको उल्लङ्घनको जाँचको नतिजाको अपीलको नतिजाको कार्यान्वयनको अभिलेख बाह्र वर्षसम्म
    राखिन्छ।
  - राहदानी वितरणमा त्रुटि सच्याउन सामान्यतः सात कार्यदिन लाग्छ, तर प्रक्रिया जटिल भएमा बढी समय लाग्न सक्छ।
  - राहदानीको लागि निवेदनमा जाँच गर्ने अधिकारीको नाम, सही, पद, र मिति उल्लेख गर्नुपर्छ।
- source_sentence: राहदानीको लागि निवेदनमा कस्तो आवेदन स्रोत उल्लेख गर्नुपर्छ?
  sentences:
  - राहदानीको लागि निवेदनमा आवेदन स्रोत (विभाग, जिल्ला, वा नियोग) उल्लेख गर्नुपर्छ।
  - राहदानी बुझाउने प्रक्रियामा त्रुटि सच्याउन सामान्यतः सात कार्यदिन लाग्छ, तर प्रक्रिया जटिल भएमा बढी समय लाग्न सक्छ।
  - राहदानीको लिए अनलाइन निवेदनमा निकटतम व्यक्तिसँगको सम्बन्ध (Relationship) उल्लेख गर्नुपर्छ।
- source_sentence: विशेष राहदानी कसलाई जारी गरिन्छ?
  sentences:
  - राहदानी रद्द गर्न बाहक वा सम्बन्धित निकायको लिखित निवेदन चाहिन्छ।
  - राहदानी नियमावली, २०७७ मा अभिलेखको गोपनीयताको उल्लङ्घनको जाँचको नतिजाको अपीलको लागि जाँच गर्ने अधिकारीको नाम, सही, पद,
    र मिति उल्लेख गर्नुपर्छ।
  - विशेष राहदानी नगरपालिकाका प्रमुख, सहसचिव, जिल्ला न्यायाधीश, प्रदेश लोकसेवा आयोगका सदस्य, लगायतका पदाधिकारीलाई जारी गरिन्छ।
- source_sentence: कुटनीतिक राहदानीको लागि निवेदनमा कस्तो ठेगाना विवरण चाहिन्छ?
  sentences:
  - कुटनीतिक राहदानीको लागि निवेदनमा जिल्ला, गाउँ/नगरपालिका, वडा नम्बर, गाउँ/सडक, र घर नम्बरको ठेगाना विवरण चाहिन्छ।
  - राहदानीको लागि कागजात धुल्याउने प्रक्रिया महानिर्देशकको स्वीकृतिमा हुन्छ।
  - राहदानीको विद्युतीय अभिलेख अनुसूची-७ बमोजिमको ढाँचामा आधारित हुन्छ।
