    \ số cần nâng cao kỹ năng sử dụng máy tính, phần mềm, ứng dụng đồng thời hiểu rõ nhu cầu thông tin, điều hướng hiệu quả\
    \ và đánh giá phê bình để thu thập và sắ"
  - "Phím tắt tạo mới, chỉnh sửa lưu văn bản:\n-\tCtrl+N: Tạo mới một văn bản\n-\tCtrl+Q: Mở văn bản đã được lưu trước đó\n\
