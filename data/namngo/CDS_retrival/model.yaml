  - source_sentence: Kỹ năng bảo mật bao gồm những gì?
    sentences:
    - 'Trong môi trường số, công dân số là những người chủ động và có trách nhiệm để tham gia vào các hoạt động kinh tế, văn
      hóa, chính trị và xã hội. Mặc dù bất kỳ cá nhân nào sử dụng công nghệ số đều có thể được coi là công dân số, nhưng công
      dân số thường được xác định rõ hơn thông qua việc hiểu biết và tuân thủ các quyền lợi và trách nhiệm liên quan đến việc
      sử dụng công nghệ theo quy định pháp luật. Đây chính là lý do tại sao việc hỗ trợ, đào tạo công dân số trong các cơ
      sở giáo dục trở nên cực kỳ cần thiết.

      Công dân số cần được trang bị kiến thức về công nghệ, pháp luật và cảm xúc cá nhân đế nâng cao nhận thức về bản thân,
      môi trường xã hội và kỹ năng quản lý mối quan hệ, giúp chúng ta tương tác hiệu quả trong không gian thế giới số. Đồng
      thời, công dân số cần chịu trách nhiệm với các hành động của mình trên môi trường mạng và nhận thức rõ về hậu quả của
      hành vi không đúng đắn.

      Để đảm bảo quyền lợi và trách nhiệm đúng đắn, công dân số cần tuân thủ nghiêm quy định của pháp luật, tránh việc thiếu
      hiểu biết pháp luật gây hậu quả nghiêm trọng. Bộ luật Dân sự 2015, Bộ luật Hình sự 2017 và Luật sửa đổi và bổ sung một
      số điều bộ luật hình sự năm 2017, cùng các nghị định của Chính phủ quy định cụ thể những hành vi và mức phạt theo quy
      định.

      Quốc hội thông qua Luật an ninh mạng, Luật số: 24/2018/QH14, có hiệu lực từ ngày 01/1/2019. Luật này quy định về hoạt
      động bảo vệ an ninh quốc gia và bảo đảm trật tự, an toàn xã hội trên không gian mạng; trách nhiệm của cơ quan, tổ chức,
      cá nhân có liên quan.

      Sự phát triển của khoa học công nghệ sẽ nâng cao trình độ và kỹ năng của công dân. Hệ thống pháp luật và văn bản quy
      phạm pháp luật sẽ luôn đuợc cập nhật để phù họp với mỗi giai đoạn phát triển đó.'
    - 'Theo quyết định số 749/QĐ-TTG của Thủ tướng chính phủ về việc phê duyệt “Chương trình Chuyển đổi số quốc gia đến năm
      2025, định hướng đến năm 2030” [21] thì người dân là trung tâm của chuyển đổi số. Mỗi công dân thực hiện các hoạt động
      trên môi trường thế giới số sẽ trở thành công dân số để góp phần phát triển chính phủ số, kinh tế số và xã hội số. Hiện
      nay có nhiều khái niệm công dân số nhưng về cơ bản thì công dân số là người áp dụng kiến thức và kỹ năng để sử dụng
      các công nghệ kỹ thuật số và Internet một cách hiệu quả.

      Công dân số có khả năng truy cập Internet thông qua máy tính, điện thoại di động, các thiết bị công nghệ khác để kết
      nối và tương tác với các cá nhân, cộng đồng, tham gia vào các hoạt động kinh tế, chính trị và xã hội trên nền tảng kỹ
      thuật số [2, 4].

      Công dân số là thành phần quan trọng trong thế giới số, họ cần có trách nhiệm với hoạt động của mình trên môi trường
      số và chủ động sử dụng công nghệ để phát triển sự kết nối, chia sẻ thông tin trên cộng đồng toàn cầu.

      Đối tượng của công dân số có thể là bất kỳ ai và không giới hạn về độ tuối, giới tính, tôn giáo và nơi họ sống, họ có
      thể là một trẻ em, thanh niên hoặc người lớn tuối.

      Công dân số đóng vai trò vừa là những người học cũng đồng thời là người sáng tạo ra nội dung, kiến thức và thông tin
      trên môi trường kỹ thuật số. Đây là một phương pháp hiệu quả để tạo nên nguồn dữ liệu, thông tin phong phú giúp mỗi
      người tự cập nhật kiến thức kịp thời trong kỷ nguyên thế giới số phát triển mạnh mẽ ngày nay.

      Công dân số có vai trò quan trọng trong việc thúc đẩy các cơ hội phát triến kinh tế, bình đẳng xã hội và tăng cường
      sự tham gia vào các hoạt động cộng đồng. Với cách tiếp cận này, công nghệ kỹ thuật số giúp loại bỏ các rào cản về ngôn
      ngữ, khoảng cách và văn hóa, cho phép mọi người trên toàn thế giới có thể tham gia như một công dân trong cộng đồng
      toàn cầu.

      Công dân số là cách tiếp cận và thực hiện các quyền và nghĩa vụ của mình trong môi trường thế giới số, đặc biệt là cách
      chúng ta tương tác với người khác. Mỗi cá nhân đều đóng vai trò quan trọng để tạo ra những công dân số có trách n'
    - "ều này giúp hỗ trợ duy trì cân bằng giữa sức khỏe tinh thần và thể chất.\n-\tQuản lý việc đe dọa trên môi trường mạng:\
      \ Khả năng phát hiện và quản lý các trường hợp mâu thuẫn, gây xung đột, đe dọa trực tuyến trên không gian mạng là một\
      \ kỹ năng quan trọng. Một môi trường trực tuyển lành mạnh được tạo ra khi công dân số có khả năng nhận diện, quản lý\
      \ và giảm thiểu các nguy cơ liên quan đến bắt nạt, đe dọa, quấy rối,... bằng cách phát triển nhận thức xã hội, kỹ năng\
      \ ra quyết định và giao tiếp hiệu quả. Khi được trang bị những kỹ năng này, công dân số sẽ chủ động bảo vệ bản thân\
      \ trước những trường hợp bị dọa nạt trên môi trường trực tuyến và sẵn sàng có những biện pháp đối phó hiệu quả.\n-\t\
      Quản lý an ninh mạng: Khả năng quản lý an ninh mạng bao gồm việc bảo vệ dữ liệu và thông tin cá nhân bằng cách tạo mật\
      \ khẩu mạnh và đối phó với các loại tấn công. Mặc dù các tố chức, cơ quan thưòng có các hệ thống quản lý bảo mật riêng,\
      \ các ứng dụng xây hệ thống bảo mật. Tuy nhiên, công dân số cần chủ động phòng ngừa và loại bỏ các mối đe dọa và bảo\
      \ vệ dữ liệu cũng như thiết bị cá nhân. Đồng thời, họ phải luôn cảnh giác lỗ hổng bảo mật và xử lý kịp thời khi gặp\
      \ sự cố.\n-\tQuản lý bảo mật: Kỹ năng bảo mật bao gồm việc cấn trọng khi chia sẻ thông tin cá nhân trực tuyến và sử\
      \ dụng các công cụ bảo mật để bảo vệ dữ liệu khỏi kẻ xấu. Đặc biệt, việc sử dụng, lưu trữ, xử lý và chia sẻ thông tin\
      \ cá nhân trong không gian số cần kết hợp với các công cụ bảo mật để bảo vệ thông tin cá nhân để không bị kẻ xấu đánh\
      \ cắp thông tin làm ảnh hưởng danh tiếng, uy tín và nhân phẩm. Bên cạnh đó, công dân số cần tôn trọng quyền riêng tư\
      \ và thông tin cá nhân của người khác\n-\tTư duy phê phán: Khả năng phân biệt bao gồm nhận diện tính đúng sai trong\
      \ cách ứng xử, đánh giá thông tin hữu ích và có hại, cũng như phân biệt các nguồn thông tin đáng tin cậy và không đáng\
      \ tin cậy. Công dân số cần nâng cao kỹ năng sử dụng máy tính, phần mềm, ứng dụng đồng thời hiểu rõ nhu cầu thông tin,\
      \ điều hướng hiệu quả và đánh giá phê bình để thu thập và sắ"
  - source_sentence: Kỹ năng bảo mật bao gồm những gì?
    sentences:
    - "a.\tSao chép ô\nExcel cho phép sao chép không chỉ nội dung mà còn định dạng của ô đó. Khi sao chép ta có thể có nhiều\
      \ lựa chọn khác nhau như:\n-\tAll: Sao chép tất cả nội dung, định dạng...\n-\tFormulas: Chỉ sao chép công ức\n-\tValues:\
      \ Chỉ sao chép giá trị, hay nội dung ô đó\n-\tFormats: Chỉ sao chép định dạng\n-\tComments: Chỉ sao chép chú thích\n\
      -\tAll except borders: Sao chép tất cả trừ đường viền\n-\tColumn widths: Sao chép giá trị độ rộng của cột\n-\tFormulas\
      \ and number formats: Sao chép cả công thức và định dạng số\n-\tValues and number formats: Sao chép giá trị và định\
      \ dạng số\nb.\tDi chuyến các ô tỉnh\n-\tChọn các ô cần di chuyển\n-\tChọn lệnh Cut hoặc bấm tổ hợp phím Ctrl + X\n-\t\
      Đưa chuột đến vị trí muốn dán\n-\tChọn lệnh Paste hoặc bấm Ctrl + V để dán các ô.\nc.\tXóa dữ liệu các ô\n-\tChọn các\
      \ ô cần xoá dữ liệu\n-\tNhấn nút Clear trên thẻ Home"
