widgetData:
- source_sentence: What are some examples of teams or companies that have built systems similar to the one described in the
    context?
  sentences:
  - 'Stuff we figured out about AI in 2023






















    Simon Willison’s Weblog

    Subscribe







    Stuff we figured out about AI in 2023

    31st December 2023

    2023 was the breakthrough year for Large Language Models (LLMs). I think it’s OK to call these AI—they’re the latest and
    (currently) most interesting development in the academic field of Artificial Intelligence that dates back to the 1950s.

    Here’s my attempt to round up the highlights in one place!'
  - 'I’ve found myself using this a lot. I noticed how much I was relying on it in October and wrote Everything I built with
    Claude Artifacts this week, describing 14 little tools I had put together in a seven day period.

    Since then, a whole bunch of other teams have built similar systems. GitHub announced their version of this—GitHub Spark—in
    October. Mistral Chat added it as a feature called Canvas in November.

    Steve Krouse from Val Town built a version of it against Cerebras, showcasing how a 2,000 token/second LLM can iterate
    on an application with changes visible in less than a second.'
  - 'Stuff we figured out about AI in 2023






















    Simon Willison’s Weblog

    Subscribe







    Stuff we figured out about AI in 2023

    31st December 2023

    2023 was the breakthrough year for Large Language Models (LLMs). I think it’s OK to call these AI—they’re the latest and
    (currently) most interesting development in the academic field of Artificial Intelligence that dates back to the 1950s.

    Here’s my attempt to round up the highlights in one place!'
- source_sentence: Which article discusses the potential cost and feasibility of training a ChatGPT-beating model?
  sentences:
  - 'So far, I think they’re a net positive. I’ve used them on a personal level to improve my productivity (and entertain
    myself) in all sorts of different ways. I think people who learn how to use them effectively can gain a significant boost
    to their quality of life.

    A lot of people are yet to be sold on their value! Some think their negatives outweigh their positives, some think they
    are all hot air, and some even think they represent an existential threat to humanity.

    They’re actually quite easy to build

    The most surprising thing we’ve learned about LLMs this year is that they’re actually quite easy to build.'
  - 'Embeddings: What they are and why they matter

    61.7k

    79.3k



    Catching up on the weird world of LLMs

    61.6k

    85.9k



    llamafile is the new best way to run an LLM on your own computer

    52k

    66k



    Prompt injection explained, with video, slides, and a transcript

    51k

    61.9k



    AI-enhanced development makes me more ambitious with my projects

    49.6k

    60.1k



    Understanding GPT tokenizers

    49.5k

    61.1k



    Exploring GPTs: ChatGPT in a trench coat?

    46.4k

    58.5k



    Could you train a ChatGPT-beating model for $85,000 and run it in a browser?

    40.5k

    49.2k



    How to implement Q&A against your documentation with GPT3, embeddings and Datasette

    37.3k

    44.9k



    Lawyer cites fake cases invented by ChatGPT, judge is not amused

    37.1k

    47.4k'
  - 'These price drops are driven by two factors: increased competition and increased efficiency. The efficiency thing is
    really important for everyone who is concerned about the environmental impact of LLMs. These price drops tie directly
    to how much energy is being used for running prompts.

    There’s still plenty to worry about with respect to the environmental impact of the great AI datacenter buildout, but
    a lot of the concerns over the energy cost of individual prompts are no longer credible.

    Here’s a fun napkin calculation: how much would it cost to generate short descriptions of every one of the 68,000 photos
    in my personal photo library using Google’s Gemini 1.5 Flash 8B (released in October), their cheapest model?'
- source_sentence: How is the total cost of $168 calculated for processing 68,000 images based on input and output token usage?
  sentences:
  - 'Terminology aside, I remain skeptical as to their utility based, once again, on the challenge of gullibility. LLMs believe
    anything you tell them. Any systems that attempts to make meaningful decisions on your behalf will run into the same roadblock:
    how good is a travel agent, or a digital assistant, or even a research tool if it can’t distinguish truth from fiction?

    Just the other day Google Search was caught serving up an entirely fake description of the non-existant movie “Encanto
    2”. It turned out to be summarizing an imagined movie listing from a fan fiction wiki.'
  - 'Each photo would need 260 input tokens and around 100 output tokens.

    260 * 68,000 = 17,680,000 input tokens

    17,680,000 * $0.0375/million = $0.66

    100 * 68,000 = 6,800,000 output tokens

    6,800,000 * $0.15/million = $1.02

    That’s a total cost of $1.68 to process 68,000 images. That’s so absurdly cheap I had to run the numbers three times to
    confirm I got it right.

    How good are those descriptions? Here’s what I got from this command:

    llm -m gemini-1.5-flash-8b-latest describe -a IMG_1825.jpeg'
  - 'Getting back to models that beat GPT-4: Anthropic’s Claude 3 series launched in March, and Claude 3 Opus quickly became
    my new favourite daily-driver. They upped the ante even more in June with the launch of Claude 3.5 Sonnet—a model that
    is still my favourite six months later (though it got a significant upgrade on October 22, confusingly keeping the same
    3.5 version number. Anthropic fans have since taken to calling it Claude 3.6).'
- source_sentence: What is the cost of the ChatGPT Pro subscription that provides access to the o1 Pro model?
  sentences:
  - 'Sometimes it omits sections of code and leaves you to fill them in, but if you tell it you can’t type because you don’t
    have any fingers it produces the full code for you instead.

    There are so many more examples like this. Offer it cash tips for better answers. Tell it your career depends on it. Give
    it positive reinforcement. It’s all so dumb, but it works!

    Gullibility is the biggest unsolved problem

    I coined the term prompt injection in September last year.

    15 months later, I regret to say that we’re still no closer to a robust, dependable solution to this problem.

    I’ve written a ton about this already.

    Beyond that specific class of security vulnerabilities, I’ve started seeing this as a wider problem of gullibility.'
  - '260 input tokens, 92 output tokens. Cost approximately 0.0024 cents (that’s less than a 400th of a cent).

    This increase in efficiency and reduction in price is my single favourite trend from 2024. I want the utility of LLMs
    at a fraction of the energy cost and it looks like that’s what we’re getting.

    Multimodal vision is common, audio and video are starting to emerge

    My butterfly example above illustrates another key trend from 2024: the rise of multi-modal LLMs.

    A year ago the single most notable example of these was GPT-4 Vision, released at OpenAI’s DevDay in November 2023. Google’s
    multi-modal Gemini 1.0 was announced on December 7th 2023 so it also (just) makes it into the 2023 window.'
  - 'OpenAI made GPT-4o free for all users in May, and Claude 3.5 Sonnet was freely available from its launch in June. This
    was a momentus change, because for the previous year free users had mostly been restricted to GPT-3.5 level models, meaning
    new users got a very inaccurate mental model of what a capable LLM could actually do.

    That era appears to have ended, likely permanently, with OpenAI’s launch of ChatGPT Pro. This $200/month subscription
    service is the only way to access their most capable model, o1 Pro.

    Since the trick behind the o1 series (and the future models it will undoubtedly inspire) is to expend more compute time
    to get better results, I don’t think those days of free access to the best available models are likely to return.'
- source_sentence: What is the most important factor in determining the quality of a trained model according to the context?
  sentences:
  - 'Intuitively, one would expect that systems this powerful would take millions of lines of complex code. Instead, it turns
    out a few hundred lines of Python is genuinely enough to train a basic version!

    What matters most is the training  data. You need a lot of data to make these things work, and the quantity and quality
    of the training data appears to be the most important factor in how good the resulting model is.

    If you can gather the right data, and afford to pay for the GPUs to train it, you can build an LLM.'
  - 'Then in February, Meta released Llama. And a few weeks later in March, Georgi Gerganov released code that got it working
    on a MacBook.

    I wrote about how Large language models are having their Stable Diffusion moment, and with hindsight that was a very good
    call!

    This unleashed a whirlwind of innovation, which was accelerated further in July when Meta released Llama 2—an improved
    version which, crucially, included permission for commercial use.

    Today there are literally thousands of LLMs that can be run locally, on all manner of different devices.'
  - 'So training an LLM still isn’t something a hobbyist can afford, but it’s no longer the sole domain of the super-rich.
    I like to compare the difficulty of training an LLM to that of building a suspension bridge—not trivial, but hundreds
    of countries around the world have figured out how to do it. (Correction: Wikipedia’s Suspension bridges by country category
    lists 44 countries).

    You can run LLMs on your own devices

    In January of this year, I thought it would be years before I could run a useful LLM on my own computer. GPT-3 and 3.5
    were pretty much the only games in town, and I thought that even if the model weights were available it would take a $10,000+
    server to run them.'
