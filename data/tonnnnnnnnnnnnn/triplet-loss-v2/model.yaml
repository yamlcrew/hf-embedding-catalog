widgetData:
- source_sentence: 'Can you really get over someone you loved? College student Jaewoo asks himself that every day. Growing
    up it used to be questions like: why do I like boys? Is this okay? Then the only man he ever loved fell in love with a
    woman, and the answers just seemed more and more far away. Imagine next, when he falls in love with that man’s older brother?!
    Sujin is sweet, caring, and the sole proprietor of a quaint countryside farm. And Jaewoo has just volunteered his summer
    working under him.'
  sentences:
  - 1. What is the name of the manga with the description "I've loved you the most for most of my life. Now I am a piece of
    crumpled paper in the corner you would never glimpse. I thought you would be my today and all of my tomorrows. I imagined
    that someday you would turn around again and stare at me with all your love. However, when our love is gone, I'll just
    pick a sunny afternoon with gentle wind, put on my coat and leave for good..."?
  - What is the story of Milo and his two android bodyguards?
  - What is the name of a manga with the following description? After years undercover it can be hard to regain your real
    identity... Lanshan’s a cop who just emerged from his work infiltrating the Golden Triangle’s big boss for years. Integrating
    back into regular life as a cop is disorienting, and Lanshan can’t shake loose these strange memories of murder and pain.
    And now there’s a handsome forensic artist he’s forced to work with... just who is this guy who seems irresistibly intertwined
    with his life? If he can’t trust his mind, can he trust his body?
- source_sentence: Jin-woo started joining the Drama and Cinema club in the campus. For some reason, every hot chick in the
    club get a crush on Jin-woo and now they all try to seduce him! Will he able to find his true love there?!
  sentences:
  - What is the story of Towns in Soul Land?
  - What is the name of the manga where Natsu and Shiki meet?
  - What is the name of the manga with the description "Taiga dreams of becoming an actor, so the first thing he does upon
    entering high school is join the drama club. There, he meets the beautiful, enigmatic Maria and immediately falls in love
    with her. Not long after, Taiga is told that she is actually a boy–but is that all there is to Maria’s story? This beautifully
    illustrated one-volume tale, the debut work of creator PEYO before their untimely passing in 2020, explores the layered
    nature of personal expression and the fluidity of the power of love."?
- source_sentence: Henry Cuthbert accidentally adopts an orphan boy James who swears he'll become a good worker and help for
    Henry. As James grows older, his affection towards Henry grows too. This is a story of two men with dark past, healing
    and caring for one another.
  sentences:
  - 1. What is the name of the manga with Emma, Norman, Ray, and many other "siblings" living at an isolated orphanage cut
    off from the outside world?
  - What manga has a protagonist who lives in a share house full of sexy girls and the rent goes down but something else is
    going up?
  - What is a manga about two childhood friends with an airheaded girl and a boy who takes care of her like a mother hen?
- source_sentence: Yubin-ah is childhood friends with Shin Ginu since preschool. The first time he realized that he likes
    him was in first year middle school. And so six years had passed, now they are attending college together but he still
    keeps on harboring this secret feelings for him. One day, Yubin-ah was playing with his ass with a vibrator but was accidentally
    seen by his childhood friend, Shin Ginu through his window.
  sentences:
  - What is the name of the manga where two childhood friends tiptoe the boundaries of their relationship?
  - Can Hayeon see the ghosts or not?
  - What is a story about a boy who can hear every tune coming from a different species known as muses when one day he meets
    a certain muse?
- source_sentence: Earth is under constant threat from Neighbors, invincible monsters from another dimension that destroy
    our way of life. At least we have the elite warriors of Border, who co-opt alien technology to fight back! Our hero Osamu
    Mikumo may not be the best agent, but he’ll do whatever it takes to defend life on Earth as we know it. When Osamu meets
    a feisty humanoid Neighbor named Yuma, everything that he thinks is right is turned on its head. Can the two natural enemies
    ever become friends?
  sentences:
  - What is the name of the manga with the description "Satsuki, her younger sister Mei and their father have just moved to
    their new home in the countryside, where grand adventures await them. One day while playing outside in the garden Mei
    encounters a small creature and decides to follow it. After chasing it through the bushes Mei eventually finds herself
    at the base of a large Camphor tree and as she drops through a hole in its roots, she lands on the stomach of a large,
    sleeping forest spirit named Totoro. The two sisters befriend the gentle spirit and are soon introduced to a world more
    fantastical than they could ever imagine, from playing with soot spirits to meeting a Catbus, to flying through the air
    and even making the trees grow. However when Mei disappears, Satsuki must call on the help of her new friends if she wants
    any hope of being able to find her sister..."
  - What is the name of a manga with a protagonist named Killing and a description about him being a monster?
  - What is the name of the manga with the description "Earth is under constant threat from Neighbors, invincible monsters
    from another dimension that destroy our way of life. At least we have the elite warriors of Border, who co-opt alien technology
    to fight back! Our hero Osamu Mikumo may not be the best agent, but he’ll do whatever it takes to defend life on Earth
