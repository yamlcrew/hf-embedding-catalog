widgetData:
- source_sentence: Koyomi Araragi is an aloof boy who holds a strange, supernatural secret which inadvertently leads him to
    others with similar stories. Gods, spirits and afflictions can be pesky things, taking important memories or causing unusual
    tendencies – a fact that Koyomi and others are unfortunately aware of. Using the help of an eccentric homeless man, Koyomi
    is able to help new friends he meets along the way with their own paranormal conundrums…
  sentences:
  - What is the name of the manga with the description "For decades, the brave warriors of the Northern Heavenly Sect fought
    to keep the world safe from the evil Silent Night. But when the fourth generation leader is accused of colluding with
    the enemy, he is forced to disband the sect and commit suicide to protect his son, Moowon. With no family and allies left,
    Moowon leads a dreary life under close surveillance... until a surprise attack from the Silent Night gives him a chance
    to escape to the mountains. There, the young warrior trains to master the fighting techniques of his predecessors, before
    the mysterious disappearance of a loved one brings him back to the mainland. Follow Moowon as he embarks on a journey
    to avenge his father’s death and take down the villains who threaten to plunge the world into darkness!"
  - What is a manga about a student with a disability who is ridiculed by the school's bullies until someone appears to stand
    by his side?
  - What manga has a protagonist named Kindaichi who travels to various places where a murder has taken place, typically involving
    ghosts, curses, myths and folklore of significant events from the distant past, and solves the mystery using ingenious
    deductions of curious clues and his cool magic?
- source_sentence: A talented man entered the palace to win the favor of the emperor for his younger sister. How could he
    do that under the cover of a woman in the cruel and complex harem? And what story would he have with the Emperor and the
    Prime Minister? Not only does he have to fight for the position, but also fall in love for his sister. Will he achieve
    his goal? What will happen after the Emperor find out the truth? 
  sentences:
  - What manga has a protagonist who is 25 years old, unemployed, and has a cute daughter?
  - What is the story of Wei WuXian?
  - What is a manga about a high school student and a strong girl solving cases together?
- source_sentence: 'In the year 79 AD, the city of Pompeii was buried under volcanic ash, and two lovers, Sirix and Serena,
    were separated by death. Now, Sirix has been reincarnated into a high school student named Keiki. His current father was
    his biggest rival, his mother was his sister, and his classmate was his best friend; but what Keiki really wants is to
    reunite with his lover, Serena, once more. Thus he believes it’s fate when she moves in next door, but there’s a catch:
    she’s actually… a he?! To make matters worse, it appears his best-friend-turned-classmate is in love with Keiki, while
    his lover-turned-neighbor is in love with his classmate. With dreams of Pompeii in his sleep and love triangles abounding,
    will Keiki ever reunite with his beloved Serena?'
  sentences:
  - What is the name of the manga where the protagonist is a lady killer with a perfect smile?
  - What is the name of the second season of The Big Apple?
  - What is the story of a high school boy and his classmate who is dying?
- source_sentence: Badou's in trouble again. He's found some of the "Lost Children," rare genetic experiments left from the
    past--but so has the mafia. It's up to Heine to bail him out, but the Stray Dog has his own problems now that the enigmatic
    Giovanni is back on the scene. Meanwhile, Naoto comes to the Underground searching for the killer who wields the same
    strange black sword as hers. And so their paths begin to converge in the dark and dangerous heart of the city.
  sentences:
  - What manga has a protagonist with the ability to read memories with her hands?
  - What is the story of Ginko and the mushi?
  - What manga has a protagonist named Nariyuki Yuiga who tutors two girls named Rizu and Fumino?
- source_sentence: Yamato Akitsuki has recently moved to Tokyo, and in order to maintain his less than wealthy lifestyle,
    he currently works at his aunt's bathhouse. While walking by the school one evening he sees a girl by the name of Suzuka
    practicing the high jump, and is instantly in love. Even better is the realization that Suzuka lives next door! Determined
    to prove himself worthy of her affections, Yamato decides to join the school's track team and show her what he's got,
    but things won't be so easy; for Suzuka has a love interest of her own, and it isn't Yamato...
  sentences:
  - Who is the tough guy at Suzuran High School?
  - What is the name of the manga with the description "As Japan and the rest of the world begins the process of rebuilding
    after the fall of 'Friend', Kenji and his friends must try to uncover the identity of the second 'Friend' and other unresolved
    mysteries. Before the world is once again thrown into turmoil, they must search deep into their childhood memories to
    find the key to save the world one more time from the threat of 'Friend'; some mysteries cannot be left unsolved."
  - What is the name of the manga where the protagonist is involved in a car crash and wakes up in life after death?
