- source_sentence: How can I ensure my puppy doesn't have potty accidents when I'm not watching her closely?
  sentences:
  - 'attached to you by a leash so she canʼt wander oﬀ to potty in the house


    or under your direct supervision in an enclosed area. Direct supervision means you are looking at her at all times. The
    minute you turn away, sheʼll have a potty accident.


    Stick to this plan for a month straight and sheʼll reliably develop the habit of going outside and holding it inside.
    Then continue keeping a close eye on her for another couple of months, especially when you take her on outings to other
    peopleʼs homes, before declaring her completely potty trained.


    The goal of crate training is that your puppy learns to love resting in her crate.


    Crate: Your puppy should sleep in her crate at night and take naps in it during the day. To train her to love her crate,
    you can make it comfortable with a blanket and


    place treats inside at random times. Then give her toys and pet her when sheʼs in it


    before you close the door. The ultimate goal of crate training is that she goes into


    the crate on her own or when you give her a verbal cue, rather than needing to be


    shoved or coaxed in. And once sheʼs in, she remains calm, relaxed and quiet. (If


    you have problems with this, download the crate training handout at


    Crate size: The crate should be big enough for the puppy to lie down and turn around but not big enough for a separate
    potty area. You can make the crate


    smaller by placing a box in it and, as the puppy grows, enlarge the crate by using a


    “The goal of crate training is that your puppy learns to love resting in her crate.”'
  - 'Does your puppy love their food? If so, use it to reward them throughout the day. Portion out some or all of the food
    and use it to motivate quick responses and self-control. (For more on how to use food to inspire learning, check out Part
    4 of this book.)


    Water is critically important for your puppy’s well-being: it should be left out and available at all times. That said,
    try to monitor their drinking habits while house- training them. Establish a drinking station for your puppy and keep
    their dish there, whether it’s empty or full. Give water with meals, after playing, chewing, or napping, and as you’re
    on your way to the potty area.


    Restrict water after 7:30 p.m., unless you want to be up all night taking your puppy outside. If your puppy needs a drink,
    either give them a small amount or offer a couple of ice cubes.


    Although dogs have many fewer taste buds overall (humans have 9,000 to their 1,700), your puppy has a ring of taste buds
    on the tip of their tongue that make water taste sweet. Pretty cool.


    I don’t think house-training can be summed up any better than with the wonder- ful maxim “Whatever goes in must come out.”
    Your puppy’s biological clock will have them eliminating on demand. When their bladder or bowels are pressed, they’ll
    let loose whether they’re outside or on the papers — or the rug, if you’re not watching.'
  - 'After a puppy’s peak socialization period, around 16 weeks of age, it’s impos- sible to turn back the clock. People,
    places, sights, and smells that your puppy would have conditioned to naturally at an early age will seem suspicious to
    an older puppy. Do you want a dog who can’t warm up to everyday stimulations?


    Puppies who are overisolated or stressed during infancy are shown to chew more destructively and may wreck your furnishings
    if they aren’t conditioned to chew their toys. The early turmoil created nervous energy that needs to be displaced, and
    because running to the refrigerator is off limits and nail-biting


    isn’t an option, your puppy will chew on whatever is available. Provide plenty of satisfying options or else you may see
    your sofa disappear, one cushion at a time.


    » Shelter: If you find an older puppy at a shelter, ask about their history and try to find out why they were left there.
    Were they found on the side of the street, or have they grown up in the system? Has the puppy in question been returned
    more than once? Ask what the reasons were — you may be adopting a dog who couldn’t be house-trained, was fearful of kids,
    or showed aggression when chewing a bone. Find out what the staff thinks of the puppy’s personality. » Pet store, puppy
    broker, craigslist, and other sources: Discount shopping isn’t for puppies. Do not buy a puppy without meeting and talking
    to the breeder or rescuers first. Though you may read a phrase that makes you feel like you’ll be the winner, there are
    no winners in the online puppy shopping game. Buying a puppy in this manner ensures that more puppies will be bred this
    way, which doesn’t take their interests to heart.'
- source_sentence: What steps should I follow to transition my puppy from walking in a low-distraction area to more crowded
    places while using a Halti?
  sentences:
  - examine teeth and inside the mouth. This will desensitize your dog to people touching your dog’s mouth. Make sure your
    dog has proper dental care. Proper dental care is so often overlooked! Massage the sacral joint where the spine meets
    the tail and lift the tail to desensitize your dog to handling. Teach your dog how to give consent, how to ask for a break,
    and how to ask you to stop. Choice and consent are the wave of the future in modern cooperative care.
  - 'If your adolescent puppy is still pulling on the leash despite all the basic leash walking training I’ve taken you through,
    you might choose to try a Halti leash. I’m a big fan of Haltis, as they make a massive difference with dogs who continue
    to have pulling problems, especially reactive dogs who can pull unexpectedly. A Halti is a gentle head harness that controls
    the dog by the snout and takes all the pressure off the throat.


    To introduce a Halti, you must ﬁrst make sure your puppy is comfortable putting their nose into the Halti. Do this by
    simply slipping it on and off and rewarding your puppy heavily for this (YES, and a treat). You’ll then need to get your
    puppy comfortable with having the Halti done up, so again, go heavy on the rewards and praise. Then you need to master
    walking your puppy with a Halti on in a low-distraction environment (i.e., your garden or somewhere else familiar, without
    loads of other dogs and people). Once your dog is comfortable moving around your garden, you can move to outside; get
    your dog comfortable in your street before moving on to high- distraction-level areas, such as parks. A decent structured
    walk should be ten minutes, with your dog nicely walking by your side, followed by ﬁve minutes where you allow your puppy
    to sniff and explore a little, before returning to a more structured HEEL walk.


    TIP: Haltis can be tricky to put on at ﬁrst, so watch a few online videos or ask a friend


    to demonstrate theirs just to get a feel for how they work. Waving a Halti around and'
  - 'Think of your dog’s veterinarian as being on par with your doctor or your child’s pediatrician. Medical knowledge is
    essential, but a good bedside manner is the cherry on top of the sundae. Speak with the receptionists and bring in your
    pup for a cheerful social call before their initial visit. Talk to the doctor like they’re a neighbor. Do you feel comfortable
    sharing all your canine concerns with them?


    If you’re unsure of which veterinarian to use, ask around. You can narrow your search by asking your friends and family
    whom they use and why.


    Puppies can be quite impulsive — they often swallow things that look edible before even considering whether they are.
    So, at your puppy’s first veterinary visit, ask the doctor for a recommended method for inducing vomiting. You should
    also find out the poison-control hotline number and always keep it on your phone in case of an emergency. Seek out a 24-hour
    emergency veterinary hospital in your area as well. Keep the hospital’s number by or on your phone. Accidents can happen
    during off hours, so have a plan.


    Whether your life demands consistent hours away from home or circumstance steps in to temporarily rearrange your schedule,
    knowing a dog walker can make the difference between a happy puppy and a stressed-out one. Puppies are like human babies
    in that they have a strong need dependency. Even though an adult dog can hold their bladder until you get home or can
    survive until a late meal, your puppy may well eat the walls of your house if you get stuck in traffic. A reliable dog
    walker can be a godsend in times like these.'
- source_sentence: What breeds of dogs might struggle more with swimming, and how can I support them if they are hesitant
    to enter the water?
  sentences:
  - 'Never throw your dog into the water to “see how it goes”—because your dog can easily drown, struggle or thrash and any
    trust you may have established will be broken. The safest, least stressful, and most effective way to teach a dog to swim
    is to use a properly-ﬁtted life jacket. A life jacket often helps new swimmers relax enough to paddle with all four legs.


    Desensitize your dog to wearing a dog life jacket to keep him aﬂoat and to provide peace of mind for you. Your dog’s innate
    ability to swim or ease in learning to swim is, in part, determined by breed and body morphology. Even some retrievers
    need a helping hand to learn and ﬁnd the conﬁdence to swim for fun and exercise. Breeds with short legs and wide chests
    such as Bulldogs, Boston Terriers, Corgis, and Pugs, simply were not bred for swimming. Large, muscled breeds such as
    the bully breeds, require a great deal of energy expenditure in the water due to their signiﬁcant body mass. Sight hounds,
    such as Salukis, Whippets, Italian Greyhounds and Greyhounds, have the disadvantage of both large muscles and little body
    fat to keep them aﬂoat.'
  - 'The key to etiquette training is to set your goals and share them with family and friends — and even with strangers who
    interact with your pup. Think of this last training chapter of Part 3 as sending your puppy off to Miss Sarah’s School
    of Dog Etiquette, which is a short-term course with long-term freedoms and rewards.


    To develop the all-important canine consciousness, you must do two things:


    » Decide what you want when you give a direction. » Follow through — if your expectations are unclear, your puppy’s reaction
    will


    When debuting that almost-grown puppy of yours, follow these five essential rules:


    1. Make sure your puppy is familiar and comfortable with the setting before you attempt to introduce them to anyone. Don’t
    greet people your first day out.


    2. Before each introduction, insist that your puppy stand still at your side. Gently hold still or bring them back to
    your side and instruct “Wait.”


    3. Tell admirers “We’re in training.” This statement will help them respect your efforts and contain their excitement
    (hopefully).


    4. Stay more focused on your puppy than on the admirer. Insist that your puppy use good manners before you let them approach
    a new dog or person. 5. Put faith in your knowledge. Just because everyone has advice doesn’t mean they’re right. “I don’t
    mind if they jump” doesn’t hold water. You mind if they jump, so don’t give in.


    Under and back: Helpful commands when you’re out and about


    Have you ever marveled at the sight of a dog lying patiently under the table or their human’s legs? It’s calming on all
    fronts because the dog is at peace knowing that the person is safe and in charge. Fortunately for you, it couldn’t be
    easier to teach your pup this skill.'
  - 'exposed to an aversive stimulus that it cannot escape or avoid, and which nothing it does has any effect on, eventually
    its avoidance responses will extinguish. It will stop reacting to the stimulus, pay no attention, and apparently become
    unaware of it. This is called habituation. In my New York apartment I found the street noise unbearable at ﬁrst, but eventually,
    like most New Yorkers, I learned to sleep through the sirens, yelling, garbage trucks, even car crashes. I became habituated.
    Police horses are sometimes trained by subjecting them to all kinds of harmless but alarming events, such as opening umbrellas,
    ﬂapping papers, being tapped all over with rattling tin cans, and so on. The horses become so habituated to startling
    sights and sounds that they remain unﬂappable no matter what events the city streets have to offer.


    Method 4 is not useful for getting rid of well-learned, self-rewarding behavior patterns. It is good, however, for whining,
    sulking, or teasing. Even small children can learn - and are gratiﬁed to discover - that they can stop older children
    from teasing them merely by not reacting in any way, good or bad.


