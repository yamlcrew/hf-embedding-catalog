- source_sentence: What should I do if I notice signs of an ear infection in my puppy?
  sentences:
  - 'Puppies love interactive games, especially as they mature. Tug is a great game for puppies and can be used to teach your
    puppy to Give on command, as well as learning what is and isn’t okay to tug on — your hair or slippers, for example. Here’s
    a quick lesson on playing tug with a young puppy:


    » Start with a rope or doggie play pole, which can also be fashioned out of a


    » Bounce the toy in front of your puppy or wait until they show interest in


    playing with it. Reward their interest by saying “Tug” and providing resistance. » Take a smelly food treat in your hand
    (like liver, hot dog, or jerky-type treat)


    » Let your puppy have the toy back right away and continue playing or say “You


    Soon your puppy will learn that sharing and releasing toys means more fun and interaction, not less.


    When picking out self-soothing toys for your puppy (objects they can play with alone), keep the analogy of giving a child
    your smartphone to keep them busy when you’re present but not accessible. Self-soothing objects come in many forms: What
    calms your puppy best?


    Though you generally can’t go wrong with indestructible plastic bones, some puppies find them, well, boring. Rawhide,
    which is made in America, is a satisfy- ing chew, but it’s problematic with some dogs who chew obsessively because they
    gulp it as they go and can choke or get indigestion. Destructible bones also cost money to replace — just saying.


    Personally, my clients have had the most luck with pressed rawhide, animal-part sticks (hooves and bully sticks), and
    vegetable-matter pulp bones. Test out a few kinds yourself to find a bone that satisfies your puppy’s craving and that
    can pass the “systems” test (their digestive system, that is); then buy it in bulk.'
  - 'Don’t use cotton swabs or poke into your puppy’s ear canal. You can cause irreparable damage by doing so.


    » Prevent water from entering the ear. If you’re bathing your pup, put a cotton ball in the opening ahead of time and
    wipe the ears out with a dry cotton ball when you’re finished.


    Ear infections are quite common. Signs of infection include a red or swollen ear, discharge, head shaking, ear itching,
    or bad odor. If you notice any of these symp- toms, get your puppy to their doctor immediately. Left untreated, infections
    can cause fever, depression, irritability, and loss of balance. Your veterinarian may prescribe an ointment that you administer
    at home. Here’s how to use it:


    1. Wait until your dog’s a little sleepy. 2. Bring them to the refrigerator and swipe some peanut butter or broth at their
    eye level.


    3. As they’re licking the refrigerator, gently squeeze into their ear canal the amount of ointment specified by your veterinarian.


    You don’t have to know much about the nose, though it is helpful for tipping you off to the fact that your puppy’s not
    feeling well. A warm nose can be caused by elevated temperature. (See the nearby sidebar, “Taking your puppy’s tempera-
    ture.”) However, weather conditions also can lead to dryness or fluctuation in body temperature. If you suspect that your
    puppy has a fever, touch their other body areas without fur (belly, paws, or the inside of their ears) or take their tem-
    perature. Did I mention that you have to do it rectally? What fun!'
  - 'More than 320 breeds are now registered worldwide. These days, being a purebred dog is like belonging to an exclusive
    club: Only dogs with similar looks and inter- ests get in. Although most breeds are no longer asked to do the work they
    were developed for, fanciers continually devote themselves to breeding and selling puppies that reflect their traditions.


    Choosing a specific breed enables you to predict the size, weight, and interest of your puppy. Selecting a one-of-a-kind
    mixed-breed puppy, and predicting or discovering the various breeds that combine to create them, allows you to make accurate
    descriptions about their interests and energy level as an adult dog.


    When researching a breed, mixed-breed, or designer-mixed-breed, try to meet at least three adult dogs of the same breed
    or mix-breeds. All puppies are cute and adorable, but they grow up in the blink of an eye, so make sure you like the look
    and personality of the dog your puppy will become.


    Whether you’re considering a purebred, mixed-breed, or designer-mixed-breed, take a good, hard look at your lifestyle
    now and project out five to ten years. How might a certain breed’s or mixed breed’s interests and energy level play out
    in your home?'
