  - "The ANCA-associated vasculitides can be life threatening. Glucocorticoids and\r\n      cyclophosphamide therapy is effective\
    \ in about 80% patients. However, the side effects such\r\n      as bone marrow suppression, infection, cystitis, infertility,\
    \ myelodysplasia preclude further\r\n      use of cyclophosphamide in some patients and the relapse rate is high.\r\n\r\
    \n      Recent studies have shown that mycophenolic acid(MPA), the active metabolite of mycophenolate\r\n      mofetil(MMF),\
    \ could exhibit multifarious effects on endothelial cells, including inhibition\r\n      of ICAM-1 expression, neutrophil\
    \ attachment,IL-6 secretion, and the process of angiogenesis,\r\n      which contribute to the efficacy of MMF in the\
    \ treatment of vasculitic lesions such as lupus\r\n      nephritis with vasculitic lesions. This study was a feasibility\
    \ study to assess the safety\r\n      and effectiveness of MMF in inducing remission in subjects with ANCA-associated\
    \ SVV compared\r\n      with pulse intravenous cyclophosphamide. After enrollment, subjects were followed\r\n      longitudinally,\
    \ and formal measurements of disease activity were determined using the\r\n      Birmingham Vasculitis Activity Score\
    \ (BVAS)."
- source_sentence: The patient is a 55-year-old man who was recently diagnosed with Parkinson's disease. He is complaining
    of slowness of movement and tremors. His disease is ranked as mild, Hoehn-Yahr Stage I. His past medical history is significant
    for hypertension and hypercholesterolemia. He lives with his wife.  They have three children.  He used to be active with
    gardening before his diagnosis. He complains of shaking and slow movement. He had difficulty entering through a door,
    as he was frozen and needed guidance to step in.  His handwriting is getting smaller. He is offered Levodopa and Trihexyphenidyl.
    He is an alert and cooperative man who does not have any signs of dementia. He does not smoke or use any illicit drugs.
  sentences:
  - "The investigators will enroll 14 Parkinson patients with bilateral STN DBS and refractory FOG\r\n      to 130Hz stimulation\
    \ and dopaminergic medications for two visits of at least 6-month apart.\r\n      The 6 patients remaining on 60Hz stimulation\
    \ after our previous study consisting of 7\r\n      patients will be assessed once again as visit-2 after previous visit-1\
    \ of their last study.\r\n      We anticipate to have 20 patents complete for visit-1 and at least 18 patients complete\
    \ for\r\n      visit-2 in this randomized double-blind prospective crossover study with their usual\r\n      medication\
    \ \"on\" state, with 6-7 patients on each starting condition (60Hz vs 130Hz vs DBS\r\n      off). Swallowing function\
    \ on modified barium swallowing test and swallowing questionnaire,\r\n      FOG in stand-walk-sit test and questionnaire,\
    \ and other axial and motor function on UPDRS-III\r\n      will be assessed under each DBS condition. Changes in measurements\
    \ between 60Hz and 130Hz at\r\n      each visit and under 60Hz between two visits will be analyzed, with swallowing function\
    \ and\r\n      FOG as primary, and the rest as secondary outcomes, correcting for potential carryover\r\n      effect.\
    \ Changes between other DBS conditions might also be explored in this 2-year study.\r\n\r\n      This would be the first\
    \ study on the long-term effect of 60Hz stimulation on dysphagia, FOG\r\n      and other axial and motor symptoms in Parkinson\
    \ patients with bilateral STN DBS and FOG\r\n      refractory to 130Hz stimulation and dopaminergic medications, which\
    \ will have significant\r\n      impact on the treatment of difficult axial symptoms of high morbidity and mortality."
  - "Approximately 28,900 patients will be diagnosed with squamous cell cancers of the oral cavity\r\n      and pharynx in\
    \ the year 2002. Of these, an estimated 7,400 patients will present with\r\n      metastases or develop recurrent disease,\
    \ which is not amenable to surgery or radiation\r\n      therapy. Palliative chemotherapy is thus the only treatment option.\
    \ Currently, combinations\r\n      of cisplatin and 5-fluorouracil are used as first line treatment strategies, with median\r\
    \n      times to progression of 2.5 to 3 months and median survival rates of 5 to 7 months. The time\r\n      to achieve\
    \ maximum response with combination therapy is on average 4 months.\r\n\r\n      Taxanes, with their unique mechanism\
    \ of microtubule stabilization, have demonstrated response\r\n      rates similar to standard, first line combination\
    \ regimens. Several phase II studies have\r\n      evaluated the efficacy of single agent docetaxel in head and neck cancer\
    \ patients. Cumulative\r\n      response rates were approximately 30%, with higher response rates observed in patients\r\
    \n      receiving no prior chemotherapy. Docetaxel has also been used in combination with cisplatin\r\n      and cisplatin\
    \ and 5-fluorouracil. Although response rates with such combination regimens were\r\n      superior to the use of single\
    \ agent docetaxel, grade 3 and 4 toxicities were also more\r\n      prevalent.\r\n\r\n      Capecitabine (Xeloda®), a\
    \ fluoropyrimidine carbamate, is an oral prodrug, which is converted\r\n      in tumor tissues to 5-fluorouracil through\
    \ multienzymatic activation. Capecitabine (Xeloda®)\r\n      has documented activity in breast and colorectal cancers\
    \ and is widely administered. Because\r\n      5-fluorouracil has efficacy in the treatment of head and neck cancer, it\
    \ is reasonable to\r\n      consider that such tumors will respond to capecitabine. To date, there are no published\r\n\
    \      trials using capecitabine (Xeloda®) in the treatment of metastatic head and neck cancer\r\n      patients. However,\
    \ clinical trials are ongoing in the U.S. and Europe with promising results.\r\n\r\n      In preclinical models, a synergistic\
    \ interaction between capecitabine and docetaxel has been\r\n      documented. One possible explanation for the synergy\
    \ is that docetaxel up-regulates tumor\r\n      levels of thymidine phosphorylase, the enzyme essential for the activation\
    \ of capecitabine\r\n      and 5'-dFUrd to 5-fluorouracil. Clinically, O'Shaughnessy, et al. recently reported improved\r\
    \n      survival with docetaxel/capecitabine combination therapy in patients with metastatic breast\r\n      cancer, who\
    \ previously failed anthracycline-containing chemotherapy. In this phase III study,\r\n      patients were stratified\
    \ according to previous exposure to paclitaxel and then randomized to\r\n      capecitabine (Xeloda®) (1250 mg/m2 twice\
    \ daily, days 1-14) plus docetaxel (75 mg/m2 day 1,\r\n      repeated every 21 days) versus docetaxel alone. Grade 3 and\
    \ 4 toxicities were more common in\r\n      the docetaxel/capecitabine combination arm. Capecitabine (Xeloda®) and docetaxel\
    \ were\r\n      interrupted and the dosages reduced by 25% in patients who experienced a second occurrence of\r\n    \
    \  a given grade 2 toxicity, or any grade 3 toxicity, suggesting that the starting dosages were\r\n      perhaps too high.\r\
    \n\r\n      The role of chemotherapy in metastatic head and neck cancer is limited to palliation of the\r\n      symptoms\
    \ of disease. Platinum and 5-fluorouracil combinations remain standard first line\r\n      treatment strategies. The taxanes\
    \ have been shown to have similar efficacy to such first line\r\n      regimens and are often used as salvage treatment\
    \ for patients with metastatic disease. Given\r\n      that docetaxel has documented clinical efficacy in head and neck\
    \ cancer and that there are\r\n      preclinical data to suggest synergy with docetaxel and capecitabine, it is reasonable\
    \ to\r\n      consider using these agents in combination to treat head and neck cancer patients. Moreover,\r\n      capecitabine\
    \ and docetaxel have distinct mechanisms of action and no overlap of key\r\n      toxicities. A recent phase I/II study\
    \ by Tonkin, et al. in metastatic breast cancer patients\r\n      demonstrated activity and less toxicity when docetaxel\
    \ 30 mg/m2/week (day 1 and 8 q21 days)\r\n      was combined with capecitabine 1800 mg/m2/day (14 of 21 days). In another\
    \ phase I study by\r\n      Nadella, et al. weekly docetaxel (36 mg/m2 ) was combined with 14 days of capecitabine (up\
    \ to\r\n      1500 mg/m2/day) over a course of 28 days. Antitumor responses were observed in patients with\r\n      breast,\
    \ colon, and bladder cancers. Hence, we propose this study whereby patients with\r\n      previously treated, metastatic/recurrent\
    \ head and neck cancer will receive treatment with\r\n      docetaxel and capecitabine.\r\n\r\n      To reduce the potential\
    \ for toxicity, we will use a modification of the Nadella regimen.\r\n      Docetaxel will be administered weekly at a\
    \ dosage of 30 mg/m2 for 3 out of every 4 weeks and\r\n      capecitabine will be administered at a flat dosage of 2000\
    \ mg per day (1000 mg p.o. b.i.d.)\r\n      for two weeks out of every 4 weeks. The justification for using a flat dosage\
    \ of capecitabine\r\n      versus a calculated dosage is based on pharmacokinetic data that show no change in clearance\r\
    \n      of capecitabine with changes in BSA. We plan to use a fixed dose of 2000 mg qd (1000 mg q am\r\n      and 1000\
    \ mg q pm). Fixed dosing of capecitabine is convenient and feasible, as shown in a\r\n      prior University of Michigan\
    \ study in breast cancer patients. In another study Schott, et al.\r\n      informally piloted the combination of weekly\
    \ docetaxel 36 mg/m2 and 1500 mg twice daily (3000\r\n      mg/day) x 14 days capecitabine in metastatic breast cancer\
    \ patients, and found it to be\r\n      without unexpected or untoward side effects. Additionally, to take advantage of\
    \ the time\r\n      course of upregulation of TP in the preclinical models, the capecitabine dose will be given\r\n  \
    \    on days 5-18. In a flat dosing scheme, the Nadella regimen would have administered an average\r\n      dose of 2125\
    \ mg qd for 14 days, assuming an average BSA of 1.7 m2. We plan to round this\r\n      dosage downward to 2000 mg per\
    \ day x 14 days; therefore, our regimen will use a slightly\r\n      lower dosage of capecitabine. We feel that our proposed\
    \ slightly lowered dose (closer to\r\n      Nadella phase I dosing vs. Tonkin) of capecitabine is justified for the following\
    \ reasons:\r\n\r\n        1. The Nadella study was performed in a group of patients with solid tumor malignancies\r\n\
    \           that were refractory to conventional therapy or for whom no effective therapy existed.\r\n           ECOG\
    \ performance status (PS) was 1 or 2 in 5/17 (30%) patients, 10/17 patients had\r\n           received 2 or more lines\
    \ of previous chemotherapy, and 7/17 patients had received\r\n           previous radiotherapy. Based on data from previous\
    \ treatment of head and neck cancer\r\n           patients at the University of Michigan, the patient population to be\
    \ enrolled in this\r\n           trial is expected to be 60% PS 0 and 40% PS 1, and some will have received prior\r\n\
    \           chemotherapy and/or radiotherapy. Like the Nadella patient population, a majority of our\r\n           patients\
    \ have been pretreated and are of poorer health.\r\n\r\n        2. Dose interruptions and modifications are built into\
    \ the protocol so that appropriate\r\n           changes in treatment can be made in patients with Grade I or II toxicity,\
    \ before the\r\n           toxicity becomes Grade III or greater. Since the docetaxel is given weekly, and the\r\n   \
    \        capecitabine is administered daily, if patients are experiencing toxicity within a\r\n           cycle, the dose\
    \ of either can be held or modified."
  - "Perampanel is a non-competitive antagonist of the AMPA (\r\n      2-amino-3-(5-méthyl-3-hydroxy-1,2-oxazol-4-yl)) propanoïc\
    \ acid receptors which was approved\r\n      by the European Medicines Agency as adjunctive treatment for partial-onset\
    \ seizures in\r\n      patients 12 years and older, in 2012. The aim of this study is to evaluate effectiveness and\r\n\
    \      safety of perampanel as add-on treatment in patients with refractory epilepsy.\r\n\r\n      The investigators retrospectively\
    \ collected and analyzed the data of patients with refractory\r\n      epilepsy who had been treated with perampanel between\
    \ May of 2014 and April of 2015. In\r\n      total, one hundred and ten patients were included (mean age 41 [SD = 15.2]).\
    \ The mean\r\n      duration of epilepsy was 25 years (SD = 14.4). The mean perampanel dose was 5.7 mg/d (SD =\r\n   \
    \   2.3). The retention rate was 77% at 6 months and 61% at 12 months. After 6 months, the\r\n      responder rate was\
    \ 35.5%. Eight patients (7.3%) became seizure free. Adverse effects were\r\n      reported in 60 patients (54.5%). Most\
    \ common side effects were behaviour disturbance (22.7%),\r\n      dizziness (15.5%), asthenia (11.8), somnolence (10%)\
    \ and ataxia (9.1)."
- source_sentence: '41 year old man with history of severe intellectual disability, CHF, epilepsy presenting with facial twitching
    on the right and generalized shaking in at his NH which required 20 mg valium to cease seizure activity. Per outside medical
    patient was felt to have focal epilepsy with secondary generalization, likely due to anoxic brain injury at birth, and
    probably related to the atrophic changes seen on MRI, particularly in the left temporal lobe.

    The patient first developed seizures at age 13 found by family to have a generalized convulsion. He had a second seizure
    two years after his first episode. He was maintained on Dilantin and phenobarbital. The patient went 20 years without
    another seizure. He was recently tapered off Dilantin, and it was felt that perhaps this medication was necessary to maintain
    him seizure free. The patient had no further events during the hospital course and was back at his baseline at the time
    of discharge. Full EEG reports are pending at the time of dictation.

    Past Medical History:

    Epilepsy as above, CHF, depression'
  sentences:
  - "The purpose of this study is to characterize\r\n\r\n      1. real-world clinical outcomes of Deep Brain Stimulation (DBS)\
    \ using retrospective review of\r\n      de-identified patient records."
  - "BACKGROUND There is no consensus regarding the injury mechanism in complex prolonged Whiplash\r\n      Associated Disorders\
    \ (WAD) cases. Often, tissue damage and physiological alterations is not\r\n      detectable. In order to improve future\
    \ rehabilitation, a greater understanding of the\r\n      mechanisms underlying whiplash injury and their importance for\
    \ treatment success is required.\r\n      It is also important to investigate if pathophysiological changes can be restored\
    \ by\r\n      rehabilitation.\r\n\r\n      AIM The projects aims to investigate neck muscle structure and function, biomarkers\
    \ and the\r\n      association with pain, disability and other outcomes before and after neck-specific\r\n      exercises.\r\
    \n\r\n      METHODS Design These are sub-group trials, each one independent of the others, in a\r\n      prospective,\
    \ multicentre, randomized controlled trial (RCT) with two parallel treatment arms\r\n      conducted according to a protocol\
    \ established before recruitment started (ClinicalTrials.gov\r\n      Protocol ID: NCT03022812). Physiotherapist-led neck-specific\
    \ exercise previously shown to be\r\n      effective for the current population constitutes the control treatment for\
    \ the new\r\n      Internet-based neck-specific exercise treatment. In the RCT, a total of 140 patients will be\r\n  \
    \    included (70 from each group), whereof 30 (both randomization arms equally) consecutively\r\n      will be asked\
    \ to participate in the present sub-group study. The sub-group studies aims to\r\n      start September 2019. Independent\
    \ physiotherapists in primary health care will distribute the\r\n      treatment.\r\n\r\n      In sub-group of individuals,\
    \ additional measurements will be performed before and after\r\n      interventions end (3 months follow-up). The physical\
    \ measurements will be performed by\r\n      independent specially trained test-leaders blinded to randomization.\r\n\r\
    \n      Additionally, 30 neck healthy individuals without serious diseases matched for age and gender\r\n      will consecutively\
    \ be investigated.\r\n\r\n      Study population\r\n\r\n      The inclusion criteria for patients are:\r\n\r\n       \
    \ -  Chronic neck problems corresponding to WAD grades 2-3 verified by clinical examination\r\n\r\n        -  Average\
    \ estimated pain in the last week at least 20 mm on the visual analogue scale\r\n           (VAS)\r\n\r\n        -  Neck\
    \ disability of more than 20% on the Neck Disability Index (NDI) [10]\r\n\r\n        -  Working age (18 - 63 years)\r\n\
    \r\n        -  Daily access to a computer/tablet/smart phone and Internet\r\n\r\n        -  Neck symptoms within the first\
    \ week after the injury (i.e., neck pain, neck stiffness,\r\n           or cervical radiculopathy).\r\n\r\n      For the\
    \ present sub group study additional criteria were:\r\n\r\n        -  Right handed\r\n\r\n        -  Dominant right sided\
    \ or equal sided pain\r\n\r\n      Inclusion criteria for healthy controls:\r\n\r\n      • Age and gender matched healthy\
    \ individuals without neck pain and disability (VAS <10mm, NDI\r\n      <5%) that feel overall healthy without known diseases.\r\
    \n\r\n      Exclusion criteria for patients:\r\n\r\n        -  Individuals with any of the following signs of head injury\
    \ at the time of whiplash\r\n           injury will be excluded: loss of consciousness, amnesia before or after the injury,\r\
    \n           altered mental status (e.g., confusion, disorientation), focal neurological changes\r\n           (changes\
    \ in smell and taste).\r\n\r\n        -  Previous fractures or dislocation of the cervical spine\r\n\r\n        -  Known\
    \ or suspected serious physical pathology included myelopathy,\r\n\r\n        -  Spinal tumours\r\n\r\n        -  Spinal\
    \ infection\r\n\r\n        -  Ongoing malignancy\r\n\r\n        -  Previous severe neck problems that resulted in sick\
    \ leave for more than a month in the\r\n           year before the current whiplash injury\r\n\r\n        -  surgery in\
    \ the cervical spine\r\n\r\n        -  Generalized or more dominant pain elsewhere in the body\r\n\r\n        -  Other\
    \ illness/injury that may prevent full participation\r\n\r\n        -  Inability to understand and write in Swedish\r\n\
    \r\n      Additional criteria in the present sub group:\r\n\r\n        -  Increased risk of bleeding,\r\n\r\n        -\
    \  BMI >35\r\n\r\n        -  Contraindications of MRI such as metal, severe obesity, pacemaker and pregnancy.\r\n\r\n\
    \      Exclusion criteria for healthy controls:\r\n\r\n        -  Earlier neck injury,\r\n\r\n        -  Recurrent neck\
    \ pain,\r\n\r\n        -  Earlier treatment for neck pain.\r\n\r\n        -  Increased risk of bleeding,\r\n\r\n     \
    \   -  BMI >35\r\n\r\n        -  Contraindications of MRI\r\n\r\n      Recruitment and randomization Information about\
    \ the study will be provided by healthcare\r\n      providers, reports in newspapers, social media, and the university's\
    \ website. Interested\r\n      patients will contact the research team through the project website. After completing a\
    \ small\r\n      survey on the website, a project team member (physiotherapist) will perform a telephone\r\n      interview\
    \ and ask about the patient's medical history. An appointment for a physical\r\n      examination and additional interview\
    \ for the present sub-group study is made as a last step\r\n      to ensure that the criteria for study participation\
    \ are met. If the study criteria are met,\r\n      written and oral informed consent are obtained, and the patient will\
    \ fill out a questionnaire\r\n      and undergo physical measurements of neck-related function. Baseline measurements\
    \ must be\r\n      completed for inclusion.\r\n\r\n      Healthy individuals will consecutively be recruited among friends,\
    \ family and staff at the\r\n      university or the university hospital to suit the age and gender of a patient.\r\n\r\
    \n      Intervention for the patient group The intervention consists of neck-specific exercises\r\n      distributed in\
    \ two different ways, twice a week at the physiotherapist clinic for 3 months\r\n      (NSE group) or with 4 physiotherapy\
    \ visits only combined with a web-based system (NSEIT\r\n      group).\r\n\r\n      A. In the NSE group, patients will\
    \ get an explanation and justification for the exercise\r\n      consisting of basic information about the musculoskeletal\
    \ anatomy of the neck relevant to the\r\n      exercises given by the physiotherapist in order to motivate the patient\
    \ and help make them\r\n      feel safe and reassured. The patients undergo a 12-week training programme with a\r\n  \
    \    physiotherapist 2 days/week (total 24 times). Exercises are chosen from a clear and written\r\n      frame of exercises.\
    \ The training includes exercises for the deep neck muscles, continuing\r\n      with the endurance training of neck and\
    \ shoulder muscles. The exercises are individually\r\n      adjusted according to the individual's physical conditions\
    \ and progressively increased in\r\n      severity and dose. Exercise-related pain provocation is not accepted. The patient\
    \ may also\r\n      perform exercises at home. At the end of the treatment period, the participants are\r\n      encouraged\
    \ to continue practising on their own. The exercises have been used with good\r\n      results in previous RCTs.\r\n\r\
    \n      B. In the NSEIT group, patients will receive the same information and training programmes as\r\n      the NSE\
    \ group, but with 4 visits to the physiotherapist instead of 24. Exercises are\r\n      introduced, progressed, and followed\
    \ up to ensure correct performance. The exercises are\r\n      performed and most of the information is given with the\
    \ help of Internet support outside the\r\n      healthcare system. Photos and videos of the exercises (a clear stepwise\
    \ progression) and\r\n      information are available on the Web-based system. A SMS reminder is automatically available\r\
    \n      if the exercise diary is not completed. The time required for training is the same as in\r\n      group A, but\
    \ without the patient having to go to the physiotherapy clinic. The Internet\r\n      programme was developed by experienced\
    \ physiotherapists/ researchers together with\r\n      technicians and clinicians. Technicians are available to assist\
    \ the participants if any\r\n      technical difficulties arise. The patients will be introduced to the exercises and\
    \ get\r\n      information and support at the physiotherapy visits.\r\n\r\n      Variables and measurements Background\
    \ data and data in the RCT include personal details,\r\n      questionnaires and test results regarding pain, physical\
    \ and psychological functioning,\r\n      health and cost-effectiveness described elsewhere (ClinicalTrials.gov Protocol\
    \ ID:\r\n      NCT03022812).\r\n\r\n      Measurements will be done at baseline for both groups and at 3 months follow-up\
    \ for the\r\n      patient when treatment ends. Except for blood and saliva samples that will be collected twice\r\n \
    \     (baseline and repeated after 3 months), the measurements will be performed at baseline only\r\n      for the healthy\
    \ individuals."
  - "Mesial temporal lobe epilepsy (MTLE) is the most common cause of medication-resistant\r\n      epilepsy in adults. The\
    \ standard treatment for refractory MTLE is surgical resection by\r\n      craniotomy. Stereotactic laser interstitial\
    \ thermal therapy (LITT) is a new surgical\r\n      technique being used to treat MTLE. Under MRI-guidance, a laser probe\
    \ is inserted into the\r\n      seizure focus and heat is used to destroy the tissue. Compared to temporal lobectomy,\
    \ LITT\r\n      results in shorter hospital stays, low complication rates, and possibly less cognitive\r\n      decline;\
    \ however, seizure freedom rates are potentially lower.\r\n\r\n      During temporal lobectomy, neurophysiologic intraoperative\
    \ monitoring (NIOM) can be used to\r\n      better identify epileptogenic tissue and guide resection. This tool has been\
    \ unavailable\r\n      during LITT procedures. Recently, the investigators demonstrated in two cases that NIOM with\r\n\
    \      a depth electrode is technically feasible during LITT and can identify epileptiform activity\r\n      intra-operatively.\r\
    \n\r\n      This is a prospective trial of NIOM during LITT for mesial temporal lobe epilepsy. The\r\n      investigators\
    \ will assess the safety of performing NIOM during LITT and whether data from\r\n      NIOM (frequency and characteristics\
    \ of epileptiform discharges recorded before and after\r\n      ablation) are associated with seizure outcomes. If there\
    \ is an association, NIOM could be\r\n      used for prognostication and could potentially even be used to guide surgery.\r\
    \n\r\n      Hypotheses:\r\n\r\n        1. NIOM performed by MRI-guided stereotactic depth electrode placed in the parahippocampal\r\
    \n           gyrus adjacent to the LITT catheter is safe, as compared to institutional LITT controls\r\n           without\
    \ NIOM and published LITT complication rates.\r\n\r\n        2. Greater magnitude fractional decrements in discharge frequency\
    \ from pre-ablation to\r\n           post-ablation recordings will be significantly associated with better seizure outcomes,\r\
    \n           as measured by International League Against Epilepsy (ILAE) surgical outcome scores.\r\n\r\n      Objectives:\r\
    \n\r\n      The primary project goals are to assess if NIOM by parahippocampal depth electrode is safe\r\n      during\
    \ LITT of MTLE and to assess if the fractional decrement of interictal discharges (ID)\r\n      on NIOM can be significantly\
    \ correlated with outcome. The study will be powered to address\r\n      these questions a priori. Post hoc analyses consisting\
    \ of a multivariate analysis of other\r\n      patient demographic data, NIOM findings, operative parameters, quality\
    \ of life scores, and\r\n      neuropsychiatric outcomes will also be assessed."
