- source_sentence: 'The patient is a 33-year-old woman complained of fatigue, weight gain and abnormal spotting between menses.
    No hirsutism or nipple discharge was detected. Her BMI was 34. Her lab results were remarkable for high TSH level (13
    mU/L) and low free T4 level (0.2 ng/dl). Her anti-TPO levels were extremely high (120 IU/ml). She was diagnosed with Hashimoto''s
    thyroiditis. Her aunt, brother and mother have the same disease. After  starting 250 mcg Levothyroxine per day, her symptoms
    improved significantly and her periods are normal. She is still overweight with BMI of 31. Her most recent thyroid profile
    revealed all results except for anti-TPO within the normal range:

    TSH: 2.35 mU/L

    Free T4: 2.7 ng/dl

    Anti-TPO: 75 IU/ml'
  sentences:
  - "Subjects who meet inclusion/exclusion criteria will be entered into the randomized trial.\r\n      Randomization will\
    \ be 1:1 between control group and ablation group. Those randomized to the\r\n      control group will receive ICD therapy\
    \ and routine drug therapy (including antiarrhythmic\r\n      drugs as indicated). Subjects randomized to the ablation\
    \ group will receive ablation therapy\r\n      plus ICD for ventricular tachycardia. Patients that refuse ICD therapy\
    \ and undergo ablation\r\n      only will be enrolled in a prospective registry.\r\n\r\n      Follow-up will be performed\
    \ prior to hospital discharge for incision check and device\r\n      interrogation as is standard of care. In addition,\
    \ routine device and clinical follow-up will\r\n      be scheduled at 1, 3, 6, 12, 18, and 24 months. Electrocardiography\
    \ (ECG) will be performed\r\n      pre-implant and prior to hospital discharge. Echocardiography (TTE) will be performed\r\
    \n      pre-implant and at 12 and 24 months.\r\n\r\n      Patients that refuse ICD implantation will not be randomized\
    \ and will be approached for\r\n      inclusion into a registry if they undergo catheter ablation without an ICD. Basic\r\
    \n      demographics and medical history will be collected from registry subjects upon enrollment.\r\n      Registry subjects\
    \ will receive follow-up for routine clinical care every 6 months to check on\r\n      their overall status.\r\n\r\n \
    \     120 subjects will be randomized. An additional 60 subjects will enrolled into the registry.\r\n\r\n      As of the\
    \ time protocol revision C changes were made (07Nov2016), 33 subjects have been\r\n      randomized. There has not been\
    \ any preliminary or interim analysis of any data at this point.\r\n      The study-sponsor has not had any access to\
    \ any clinical follow-up for the patients enrolled\r\n      to date."
  - "This study is classified as a randomized double-blind clinical trial. Will be held in the\r\n      Department of Physiotherapy\
    \ of the university clinic of the Federal University of Pernambuco,\r\n      located in University City, Recife-PE. Data\
    \ for the survey will be collected during the\r\n      course of the Masters in Physiotherapy, from April 2015 to September\
    \ 2015, for further\r\n      analysis.\r\n\r\n      The analyzed groups shall consist of women aged 30-50 years referred\
    \ to the Department of\r\n      Physical Therapy - UFPE, with clinical diagnosis of fibromyalgia and migraine performed\
    \ by\r\n      doctors of Rheumatology clinics and Neurology, Hospital das Clinicas, UFPE. Being invited to\r\n      participate\
    \ and informed about its content, saying their participation by signing a Term of\r\n      Consent. Data collection is\
    \ in accordance with the Declaration of Helsinki, and will begin\r\n      after the project was approved by the Ethics\
    \ Committee for Research on Human beings of the\r\n      Federal University Health Sciences Center of Pernambuco, in accordance\
    \ with Resolution\r\n      466/2012 of the National Research Ethics Committee of the Ministry of Health, the body that\r\
    \n      regulates research involving human subjects. The study will be registered in the digital\r\n      Clinical Trials\
    \ platform after obtaining the registration number of the Ethics Committee.\r\n      Initially there will be a pilot study\
    \ with 20 women, then the results will be used to\r\n      calculate the sample size using the G Power (version 3.1.9.2,\
    \ Germany), considering a\r\n      statistical power (β) of 80% with a significance level (α) of 5%.\r\n\r\n      Will\
    \ be excluded those that have some other rheumatologic disease, cardio-respiratory or\r\n      cardiovascular that prevents\
    \ the realization of aerobic exercise protocol; low attendance\r\n      during the implementation of the exercise program\
    \ (over three consecutive absences);\r\n      cognitive impairment or neurological disease that compromises the understanding\
    \ and the\r\n      exercises; Body mass index ≥ 30.0 (obesity, according to the World Society of Health);\r\n      pregnant\
    \ women and patients classified as level of active or very active physical activity by\r\n      IPAQ (International Physical\
    \ Activity Questionnaire).\r\n\r\n      3.1. Randomization\r\n\r\n      Initially, patients will undergo will a simple\
    \ randomization through the site\r\n      www.randomization.com, resulting in two groups:\r\n\r\n        1. Aerobic Training:\
    \ Submitted to a protocol consisting of heating, aerobic training with\r\n           adequate heart rate and slowdown;\r\
    \n\r\n        2. Control Training: Heating Protocol with speed and low intensity (heart rate will next\r\n           basal).\r\
    \n\r\n      Randomization will be performed by an examiner A, not research participant to ensure\r\n      allocation concealment\
    \ (patients and principal investigator will not be aware of which group\r\n      are allocated). All women will be evaluated\
    \ (both groups) through questionnaires and\r\n      spirometry before the start and the end of the exercise protocol.\
    \ Every four weeks, the\r\n      patients will be submitted to revaluations through the questionnaires. The evaluation\
    \ of\r\n      these volunteers will be conducted by an examiner B (principal investigator), blinded to\r\n      randomization;\
    \ and the exercise protocol implementation will be the responsibility of the\r\n      examiner C, only one will know to\
    \ which group the patients belong. Corroborating the\r\n      double-blinding, the evaluator to perform statistical analysis\
    \ of the data will not know to\r\n      which group belongs the results.\r\n\r\n      3.2. Evaluation\r\n\r\n        -\
    \  Socio-demographic questionnaire Prepared by the researcher to characterize the groups,\r\n           which answer questions\
    \ for identification and history (name, date of valuation,\r\n           telephone, address, date of birth, age, weight,\
    \ height, body mass index / BMI,\r\n           profession, education, marital status, physical activity and frequency,\
    \ use of\r\n           medication, type of medication, medication time). One minunciosa history regarding the\r\n    \
    \       use of drugs will be held: types, frequency, duration of treatment.\r\n\r\n        -  Identification of the impact\
    \ of migraine Will be evaluated by the Migraine Disability\r\n           Assessment Test (MIDAS), which contains five\
    \ items that measure the amount of days lost\r\n           in the activities of daily living (ADLs) and professional (AVPs)\
    \ due to the presence of\r\n           migraine in the last three months; the patient declares the amount of days and,\
    \ from the\r\n           result of the sum of the scores, ranks the degree of disability of the individual (0-5\r\n  \
    \         points: grade I / minimal disability; 6-10 points: grade II / mild disability; 11-20\r\n           points: grade\
    \ III / moderate disability;> 20 points: grade IV / severe disability).\r\n\r\n        -  Clinical characteristics of\
    \ the headache Will be filled the journal Headache, based on\r\n           criteria established by the International Headache\
    \ Society (ICHD-III beta version,\r\n           2013); assesses the amount and duration of migraine attacks over a period\
    \ of 30 days,\r\n           pain intensity, symptoms associated with headache, medication use.\r\n\r\n        -  Investigation\
    \ of sleep quality The Pittsburgh Sleep Quality Index (PSQI), used to\r\n           measure the subjective quality of\
    \ sleep; consists of 19 items divided into seven\r\n           components that punctuate 0-3 (total score of 0-21 points,\
    \ the higher the score, the\r\n           worse the quality of sleep). Was adapted and validated for the Brazilian population\
    \ by\r\n           Bertolazi and colleagues (2011), with a high reliability (α Cronbach = 0.82).\r\n\r\n        -  Quality\
    \ of life assessment Measured by the FIQ (Fibromyalgia Impact Questionnaire),\r\n           consisting of 19 questions\
    \ divided into 10 items: the first item has 10 sub-items with\r\n           four response options ranging from 0-4 points;\
    \ the second and third items, the patient\r\n           should choose an option on a scale of 0-7; in the other, is given\
    \ a score of 0-10 in\r\n           response (the higher the score, the greater the impact of fibromyalgia on quality of\r\
    \n           life). Adapted and validated for the Brazilian population.\r\n\r\n        -  Tracking of symptoms of anxiety\
    \ and depression The presence of depression will be\r\n           assessed by the Beck Depression Inventory (BDI), consisting\
    \ of 21 questions that add up\r\n           to a maximum score of 63 points (level of depression: 0-9 points = No; 10-18\
    \ points =\r\n           mild depression; 19- 29 points = moderate depression;> 30 points = severe depression).\r\n  \
    \         It is validated and adapted for the Brazilian population, with a Cronbach's alpha of\r\n           0.81. The\
    \ Beck Anxiety (BAI) will be used to identify and classify anxiety; consists of\r\n           23 statements that have\
    \ the maximum score of 63 (0-10 points: minimum Anxiety, 11-19\r\n           points: Light Anxiety, points 20-30: moderate\
    \ anxiety,> 31 points: severe anxiety), is\r\n           validated and adapted to Brazilian population.\r\n\r\n      \
    \  -  Evaluation of the level of physical activity Proposed by the World Health Organization\r\n           (1998), the\
    \ International Physical Activity Questionnaire (IPAQ) aims to measure the\r\n           total physical activity level\
    \ (AFT) from the energy expenditure (METs.min-¹). Will be\r\n           used to short IPAQ (version 8), which consists\
    \ of 4 questions with two sub-items (b) on\r\n           activities of daily living, professional life activities and\
    \ practice of walking; where\r\n           the frequency and duration respond if (days and hours / minutes) of activities\
    \ and its\r\n           intensity (moderate or vigorous = 3.3-4 METs = 5.5 to 8 METs) for one week. From the\r\n     \
    \      data obtained, sum up the frequency and duration of activities (walk + moderate +\r\n           vigorous intensity)\
    \ and, from this result, classifies individuals in: sedentary;\r\n           irregularly active; active or very active.\
    \ This questionnaire is validated and adapted\r\n           for the Brazilian population, with excellent reproducibility\
    \ (ICC = 0.79).\r\n\r\n        -  Assessment of exercise tolerance Ergospirometry or cardio-pulmonary function test\r\n\
    \           assesses precisely, the cardio-respiratory capacity and metabolic by direct measurement\r\n           of maximum\
    \ oxygen consumption and determining the maximum ventilatory thresholds. He is\r\n           currently considered the\
    \ gold standard for evaluation of exercise tolerance by providing\r\n           non-invasive and very precise exercise\
    \ intensities featuring aerobic or anaerobic\r\n           metabolism (anaerobic threshold - LA). It is the most appropriate\
    \ test for prescription\r\n           of aerobic exercise intensity in sedentary individuals or with regular physical\r\
    \n           activity. Oxygen consumption (VO2 max) appears to be the most accurate indicator of\r\n           exercise\
    \ capacity. The test will be performed on a treadmill, coupled with a spirometer\r\n           and a computer system in\
    \ a climatically standardized environment. To minimize air\r\n           leakage, will be employed the use of face masks\
    \ with tiny dead-space. The main\r\n           parameters obtained in the test are the ventilatory thresholds: anaerobic\
    \ threshold (AT)\r\n           and respiratory compensation point, which will characterize the aerobic and anaerobic\r\
    \n           workouts. The variables obtained during the test, with clinical relevance are: maximal\r\n           oxygen\
    \ uptake (VO2 max), carbon dioxide release (VCO 2), rate of gas exchange (R),\r\n           estimated lactate threshold,\
    \ expired minute volume (VE) , ventilatory reserve (RVE),\r\n           ventilatory equivalents, end-expiratory pressures\
    \ (PEF), ventilatory pattern, arterial\r\n           gas tensions / oxyhemoglobin saturation, physiological dead space,\
    \ electrocardiograms,\r\n           heart rate, peripheral O2 saturation (SpO2) and blood pressure (BP ).\r\n\r\n    \
    \  The responses to the cardiopulmonary exercise testing (CPX) are obtained by means of an\r\n      incremental protocol,\
    \ which consists in progressive load increases at predetermined time\r\n      periods. A typical incremental protocol\
    \ should provide: a resting phase (2-3 minutes or\r\n      more), in which we observe a lack of hyperventilation before\
    \ starting the test; a heating\r\n      period with zero charge (2-3 minutes); incrementing a time (8-12 minutes) and\
    \ an active\r\n      period of recovery with no load (3-6 minutes if possible). For the intervention protocol,\r\n   \
    \   heart rate obtained just below the anaerobic threshold, recommended for proper intensity to\r\n      gain fitness\
    \ with greater security and compliance will be used. Generally, oxygen consumption\r\n      levels in the anaerobic threshold\
    \ are lower in these patients.\r\n\r\n      -Re-Reviews Initially, will be held the evaluation of patients through questionnaires\
    \ and\r\n      cardiopulmonary stress test to investigate exercise tolerance before the start of exercise\r\n      protocol\
    \ (review 1). Every 4 weeks, the patients of both groups will be reassessed by the\r\n      re-application of all questionnaires:\
    \ 4 weeks - review 2; 8 weeks: evaluation 3. At the end\r\n      of the 12 weeks of training, the review 4 will be held,\
    \ with repetition of the questionnaires\r\n      and cardiopulmonary exercise testing.\r\n\r\n      3.3. Intervention\
    \ protocol The intervention protocol will be made by the examiner C, one who\r\n      is not blind to the research. After\
    \ randomization and evaluation, patients will be allocated\r\n      to one of the groups: experimental or control. After\
    \ the evaluation of cardiorespiratory\r\n      capacity of patients, will be established starting parameters appropriate\
    \ to the level of\r\n      physical activity each based on heart rate obtained just below the anaerobic threshold\r\n\
    \      (ensuring aerobic work).\r\n\r\n      The experimental group will follow the following protocol: performing heating\
    \ for 5 minutes\r\n      at low speed on a treadmill; after heating, the speed is increased gradually until the\r\n  \
    \    patient reaches the proper heart rate for aerobic training obtained during cardiopulmonary\r\n      exercise testing,\
    \ maintaining the same for 20 minutes to perform the aerobic workout;\r\n      completed, the velocity will be decreased\
    \ to regain speed heating maintained for 5 minutes\r\n      and finishing training. It is envisaged that in practice using\
    \ the FC to ensure proper\r\n      aerobic exercise for 20-60 minutes at a frequency of 3-5 times per week are effective\
    \ in\r\n      increasing the functional capacity of individuals with low fitness (American College of\r\n      Sports\
    \ Medicine - ACSM, 2006). In the control group, these women will be guided to perform 10\r\n      minutes of heating on\
    \ the treadmill with a low speed that does not cause patient effort\r\n      (monitored by the Borg scale and FC close\
    \ to the basement).\r\n\r\n      Both groups will be followed for 12 weeks, with a driving frequency of 3 times per week.\r\
    \n      Heart rate and saturation of peripheral oxygen (SpO2) will be continuously monitored through\r\n      the use\
    \ of finger pulse oximeter during the course of all practices of all the volunteers of\r\n      research to ensure that\
    \ HR is within the established for each group"
  - "Selenium suppresses autoimmune destruction of thyrocytes and decreases titers of serum TPOAb\r\n      in AIT patients.\
    \ Older 4 clinical trials approved the efficacy of the daily dose of 200micg.\r\n      It's believed that Se saturates\
    \ the deficient stores of GPX so GPX saves the thyrocytes\r\n      against to oxidative stresses. Although less than 70\
    \ micg/d is sufficient to maximize GPX\r\n      activity, none of the authors tested the doses less than 200 micg/d. Our\
    \ hypothesis was that\r\n      If 100 micg/d can not suppress the TPOAb titers,it means autoimmune destruction can not\
    \ be\r\n      blocked by saturation of deficient stores of GPX solely and the mechanism of action requires\r\n      more\
    \ than repletion of deficient stores. It's important not only to estimate the optimal dose\r\n      but to understand\
    \ the mechanism of action. High dose therapy may also suppress TPOAb levels\r\n      in Se-non-deficient AIT patients,\
    \ if it is so, Se therapy may becomes the solely treatment\r\n      modality which can suppress the autoimmunity in more\
    \ than 400 million AIT patients. Because\r\n      there've been no way to suppress autoimmune war and replacement of LT4\
    \ had been the only\r\n      treatment modality for palliation. An other independent part of the study is to test the\r\
    \n      effect of Se in adolescent AIT patients."
- source_sentence: '48 M with a h/o HTN hyperlipidemia, bicuspid aortic valve, and tobacco abuse who presented to his cardiologist
    on [**2148-10-1**] with progressive SOB and LE edema. TTE revealed severe aortic stenosis with worsening LV function.
    EF was 25%. RV pressure was 41 and had biatrial enlargement. Noted to have 2+ aortic insufficiency with mild MR. He was
    sent home from cardiology clinic with Lasix and BB (which he did not tolerate), continued to have worsening SOB and LE
    edema and finally presented here for evaluation.

    During this admission repeat echo confirmed critical aortic stenosis showing left ventricular hypertrophy with cavity
    dilation and severe global hypokinesis, severe aortic valve stenosis with underlying bicuspid aortic valve, dilated ascending
    aorta, mild pulmonary artery systolic hypertension. The patient underwent a preop workup for valvular replacement with
    preop chest CT scan and carotid US (showing moderate heterogeneous plaque with bilateral 1-39% ICA stenosis). He also
    underwent a cardiac cath with right heart cath to evaluate his pulm art pressures which showed no angiographically apparent
    flow-limiting coronary artery disease.'
  sentences:
  - "PART A The SAD treatment group is comprised of 3 cohorts where subjects will be randomized to\r\n      either PTI-428\
    \ or placebo. Following the conclusion of at least 3 SAD treatment groups, a set\r\n      of adult subjects diagnosed\
    \ with CF will participate in an assigned MAD treatment group. The\r\n      MAD treatment group is comprised of 3 cohorts.\
    \ MAD Cohort 1 will enroll adult subjects with\r\n      CF currently on stable ORKAMBI® background therapy for a minimum\
    \ of 3 months at the time of\r\n      randomization. MAD Cohorts 2 and 3 will enroll adult subjects with CF who are not\
    \ currently\r\n      on any background therapies. Subjects in all MAD cohorts will be randomized to either PTI-428\r\n\
    \      or placebo. Each dose will be administered once daily (QD) for a total of 7 Days.\r\n\r\n      PART B Following\
    \ the conclusion of MAD Cohort 1, a set of adult subjects diagnosed with CF\r\n      currently on stable ORKAMBI® background\
    \ therapy for a minimum of 3 months will participate in\r\n      Part B. The Part B Phase II treatment group is comprised\
    \ of 2 cohorts where subjects will be\r\n      randomized to either PTI-428 or placebo. Each dose will be administered\
    \ QD for a total of 28\r\n      days.\r\n\r\n      PART C Following the conclusion of Part B Phase II, a set of adult\
    \ subjects diagnosed with CF\r\n      will participate in Part C. The Part C Phase II treatment group is comprised of\
    \ 3 cohorts.\r\n      Part C Cohort 1 will enroll adult subjects with CF who are eligible to take, but not\r\n      currently\
    \ taking, ORKAMBI® in accordance with the approved label. Part C Cohort 2 will enroll\r\n      adult subjects with CF\
    \ currently on stable KALYDECO® background therapy for a minimum of 3\r\n      months at the time of randomization. Part\
    \ C Cohort 3 will enroll adult subjects with CF who\r\n      are not currently on any background therapies and are pancreatic\
    \ sufficient. Each PTI-428 or\r\n      placebo dose will be administered QD for a total of 28 days."
  - "Major depressive depression(MDD) is an severe public mental disorders. The purpose of current\r\n      study is using\
    \ big data analysis based on clinical features and immunochemistry to\r\n      investigate and establish an relapse predict\
    \ model for patients with first episode MDD.\r\n\r\n      This study includes two steps. Step 1: Big data analysis based\
    \ on the clinical features and\r\n      immunochemical figures of 30000 patients with first episode MDD will be conducted\
    \ to\r\n      construct a relapse predict model.\r\n\r\n      Step 2: 300 patients with first episode MDD will be recruited\
    \ in this step. Physicians prefer\r\n      to give corresponding treatment recommendation based on the predictive factors\
    \ to verify this\r\n      relapse model."
  - This study is an multicenter, single-arm, prospective, safety and performance clinical study.
- source_sentence: 'A 57-year-old man was admitted to the clinic because of weight loss and persistent dry cough 4 months
    ago. Chest computed topography showed bilateral multiple infiltrates in the upper lobes and thickened bronchial walls.
    There is a documented positive serum MPO-ANCA in his medical record. Transbronchial biopsy revealed necrotic granulomas
    with multinucleated giant cells and the Wegener''s granulomatosis was diagnosed for him. He is treating with corticosteroid
    and cyclophosphamides since 4 months ago. His Birmingham Vasculitis Activity Score (BVAS) is above 4 since the beginning
    of his disease. His last physical exam and lab study was performed yesterday and showed the results bellow:

    A wellbeing, well-nourished man, non-icteric, cooperative and alert

    Weight: 73 kg

    Height: 177

    BP: 120/80

    HR: 90/min

    RR: 22/min

    Hgb: 13 g/dl

    WBC: 8000 /mm3 (Neutrophil: 2700/mm3)

    Plt: 300000 /ml

    AST: 40 U/L

    ALT: 56 U/L

    Alk P: 147 U/L

    Bill total: 1.2 mg/dl

    ESR: 120 mm/hr

    MPO-ANCA: 153 EU'
  sentences:
  - "In this study, an oral nutrition supplement has been developed that take into consideration:\r\n      the nutritional\
    \ requirements, treatment side-effects and taste preferences of head and neck\r\n      cancer patients; the acceptance\
    \ of a supplement when experiencing radiation therapy\r\n      side-effects; and the taste preferences of head and neck\
    \ cancer patients which may affect the\r\n      supplement intake. We hope to increase dietary intake during the last\
    \ 2 weeks of radiation\r\n      therapy."
