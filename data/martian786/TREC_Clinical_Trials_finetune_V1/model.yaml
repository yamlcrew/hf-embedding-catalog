      menses. No hirsutism or nipple discharge was detected. Her BMI was 34. Her lab results were remarkable for high TSH
      level (13 mU/L) and low free T4 level (0.2 ng/dl). Her anti-TPO levels were extremely high (120 IU/ml). She was diagnosed
      with Hashimoto''s thyroiditis. Her aunt, brother and mother have the same disease. After  starting 250 mcg Levothyroxine
      per day, her symptoms improved significantly and her periods are normal. She is still overweight with BMI of 31. Her
