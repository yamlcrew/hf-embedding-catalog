  - 위성으로 진행된 세미나에 갔었어.
  - 우리는 그녀를 위해 깜짝 생일을 보냈다.
- source_sentence: 로스쿨의 5,539명의 동문이 구별된 그룹을 이루고 있다.
  sentences:
