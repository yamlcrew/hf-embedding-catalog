      sites taking into account ambient conditions and local fauna.The expected research results will not only provide theoretical
      and methodological support for the design and silent operation of large tidal farms but also promote the ecological
      sustainability of the tidal industry. The outcomes and impacts will be maximized and disseminated to various communities
      by peer-reviewed articles, conferences, workshops and outreach activities, etc.'
    - At least 10% of mothers and 5% of fathers have a mental illness. Family, educational and social lives of children and
      adolescents with parental mental illness (CAPRI) are disrupted by deprivation and repeated hospitalisation. This is
      an urgent political and public health concern. The Child and Adolescent Mental Health in Europe (CAMHEE) report urges
      us ‘to acknowledge and attend to the needs of children and families with parental mental health.. ’ recommending better
      information on CAPRI risks and resilience so interventions can target those at highest risk. This groundbreaking interdisciplinary
      programme exploits my unique combination of expertise in epidemiology and neuroscience to deliver on CAMHEE objectives
      for CAPRI. Previous work focuses on these ‘high risk’ children primarily to examine mental illness heritability. In
      a crucial departure from this, Work Packages (WP) 1 and 2 exploit my collaborations in Sweden and Australia to create
      unique linkage across 3 population datasets. This will detail CAPRI numbers and a broad range of life outcomes disentangling
      effects of social adversity over time. But population epidemiology alone cannot reveal how risk creates effects in individuals.
      To understand ‘how’ to identify ‘who’ we target for costly interventions, WP 3 links the epidemiology with powerful
      neuroimaging (near infrared spectroscopy NIRS) to discover which at-risk infants of mothers with severe mental illness
      show abnormal cognitive development at the level of individual brain.  This work capitalises on my role at the University
      of Manchester, one of the leading academic psychiatry and imaging centres in the UK, to create a new Centre in Bioepidemiology.
      My future aim is that epidemiological profiling combined with NIRS biomarkers of cognition in individuals will identify
      which high risk children need what intervention. Future work can then evaluate different interventions and fits seamlessly
      with my research goal to improve the life outcomes of CAPRI.
  - source_sentence: visualize heterochromatin DNA repair dynamics in Drosophila using live imaging
    sentences:
    - Cells are continuously exposed to insults that can break or chemically modify their DNA. To protect the DNA, cells have
      acquired an arsenal of repair mechanisms. Proper repair of DNA damage is essential for organismal viability and disease
      prevention. What is often overlooked is the fact that the eukaryotic nucleus contains many different chromatin domains
      that can each influence the dynamic response to DNA damage. Different chromatin environments are defined by specific
      molecular and biophysical properties, which could necessitate distinct chromatin responses to ensure safe DNA damage
      repair.The aim of this proposal is to understand how diverse chromatin domains, and in particular the dense heterochromatin
      environment, shape the dynamic chromatin response to DNA damage. I recently developed locus-specific DNA damage systems
      that allow for in-depth analysis of chromatin domain-specific repair responses in Drosophila tissue. I will employ these
      systems and develop new ones to directly observe heterochromatin-specific dynamics and repair responses. I will combine
      these systems and state-of-the art chromatin analysis with high-resolution live imaging to dissect the DNA damage-associated
      heterochromatin changes to determine their function in repair -kinetics, -dynamics and -pathway choice.Deciphering the
      chromatin dynamics that regulate DNA damage repair in heterochromatin will have broad conceptual implications for understanding
      the role of these dynamics in other essential nuclear processes, such as replication and transcription. More importantly,
      understanding how chromatin proteins promote repair will be important in determining how cancer-associated mutations
      in these chromatin proteins impact genetic instability in tumours in the long run.
    - 'The aim of Road to Friday of Science (ReFocuS 2.0) project is to refocus and promote the value of cultural heritage
      and natural resources to society and highlight the important role that communities play in preserving and managing their
      cultural heritage and natural environment. The potential that cultural heritage offers is enormous, and beneficial to
      everyone. Following the EU and UNESCO tendencies and guidelines which recognize the importance of cultural and natural
      heritage as an indicator and facilitator of the social development, we refocus public attention to synergy of education,
      cultural and natural heritage, and sustainable development. The other aim of the project is to pay more attention to:
      academics to share their knowledge and work with broader public and this way to provide effective heritage education,
      young people to keep the national treasures and protect national heritage, and general audience to be aware of cultural
      diversity as a fundamental component of sustainable development. The ReFocuS project named “Past means Future” consists
      of two parts: Night 2018 will be focused on “Past”, while Night 2019 will be focused on “Future”. Cultural heritage
      and natural resources are based on aspects of our past that we cherish, want to keep and pass on to future generations
      and outside world. Researchers will participate in a wide range of activities developed for and aimed at young people
      and adults. The activities will take place in venues such as old streets and houses, museums, archaeological sites,
      fortress, science clubs, and libraries in twelve Serbian cities with the aim of showing the relevance of their work
      to our everyday lives as well as engaging ordinary people with research and bringing research to unusual places. Workshops,
      lectures, exhibitions, conversations and film screening about the cultural and natural heritage of Serbia will be organized
      within the local Science Clubs.'
    - INTRAW will map and develop new cooperation opportunities related to raw materials in Australia, Canada, Japan, South
      Africa and the United States, addressing:• Research and innovation;• Raw materials policies and strategies• Joint educational
      and skills programmes;• Licensing and permitting procedures;• Data reporting systems;• Exploration, extraction, processing
      and recycling practices;• Management and substitution of Critical Raw Materials.The outcome of the mapping and knowledge
      transfer activities will be used as a baseline to set and launch the European Union’s International Observatory for
      Raw Materials as a definitive raw materials intelligence infrastructure, operating internationally. The Observatory
      will be a permanent body that will remain operational after the project completion, with a clear strategy and management
      approach, aiming for the establishment and maintenance of strong long-term relationships with the world’s key players
      in raw materials technology and scientific developments. The Observatory will not only continuously monitor cooperation
      possibilities but will also actively promote these via the establishment of dedicated bilateral and multilateral funding
      schemes and incentives for raw materials cooperation between the EU and technologically advanced countries outside the
      EU.
  - source_sentence: plant clathrin endocytosis TPLATE complex
    sentences:
    - 'V4Design will develop a platform that provides architects, video game creators and designers of any expertise with
      innovative tools necessary to enhance and simplify the creative phase of the designing process. The main idea behind
      V4Design is to reuse (i) visual: movies, documentaries paintings and images from other artwork  and (ii) textual content:
      from textual documentations in films, critics, catalogues, museum guides,  and re-purpose it in order in a way that
      will be useful for architecture and video game designers.To this end, V4Design will develop a data collection and retrieval
      tool that will gather data from content providers and crawl on-line art libraries, in order to extract 3D and VR representations
      from objects, buildings and cityscape environments. Additionally, V4Design will introduce innovative design tools to
      architects, designers and video game creators that will leverage visual and textual ICT technologies: (i) extract a
      specific historic era’s artistic or aesthetic style, localize buildings and art-objects in visual data, (ii) generate
      personalized summaries of the retrieved commentaries, reviews, critics, etc. on the visual content, and (iii) enhance
      all the above with semantic knowledge, smart indexing and retrieval capability.By this way, the creative phase of the
      design process will be greatly enhanced. Past aesthetic trends and SoA design knowledge would be easily reused, fully
      leveraging the skills, competencies and talent of designers and allowing them to explore and create new realms. A very
      rich source of inspiration will be also provided by textual summaries derived from the reflections on the analyzed artwork
      tuned to designers’ interests and profiles.'
    - The AIRISE project will support European SMEs in the uptake of Artificial Intelligence applied to manufacturing, with
      a specific focus on the use of AI-enabled applications at the edge. The key objective for applications is a reduction
      of waste and carbon footprint while ensuring the resilient operation of manufacturing. The consortium will create an
      eco-system where the project’s AI experts will support experimenting SMEs and connect them to Digital Innovation Hubs
      and commercial companies to achieve real-world applications. Open Calls will allow SMEs to easily access AI expert competence
      through first-stage assessments that identify the status and potential and through further proposals that support them
      in running pilot applications and validation experiments. The ambition of AIRISE is to support more than 500 cases from
      SMEs and mid-caps on key AI applications at the edge. Support from the consortium will be complemented on security and
      connectivity by involving external resources in cybersecurity and IoT and on smart working environments by offerings
      on operator interfaces and collaborative robots.
    - 'Cells communicate with the outside world through proteins anchored in their plasma membrane and hereto constantly adjust
      their plasma membrane (PM) proteome. In this adjustment process, removing proteins from the PM mainly occurs through
      clathrin-mediated endocytosis (CME). Mechanistically however, this process remains poorly understood in plants.A recent
      study from my group has shown that, in contrast to other model systems, plant CME involves two early endocytic adaptor
      protein complexes: the evolutionary conserved Adaptor Protein 2 complex (AP-2) and the newly identified TPLATE complex
      (TPC). In the same study, we also show that both complexes have overlapping but also independent functions in driving
      CME in plants, implying that plants use additional ways to recognize membrane proteins (cargo) for internalization.In
      this project I will use an integrative approach to unravel the early steps of CME in plants. Specifically, I will address
      the following biological questions:- Is the evolutionary retention of the TPC in plants causal to specific cargo recognition?
      (WP1)- What are the spatio-temporal dynamics of TPC and CME effectors at the plasma membrane? (WP2)- How does acute
      removal of TPC subunits affect complex recruitment and CME? (WP3) - How is the TPC organized at the structural level?
      (WP4)- Which interactions occur and can we couple subunit/domain structures to functionality? (WP5)To answer these questions,
      I will combine state-of-the art proteomics with highly dynamic multi-color live cell imaging and structural biology.
      The overall objective is to gain a deep mechanistic insight into the developmentally essential process of CME in plants.
      This will enable me to specifically specifically modulate the abundance of plasma membrane proteins involved in nutrient
      uptake, toxin avoidance, cell wall formation and hormone and defence responses. Understanding TPC-dependent CME will
      also provide insight into evolutionary aspects of endocytosis.'
  - source_sentence: home renovation energy savings platform
    sentences:
    - 'Access to finance for innovative SMEsSmall and medium-sized enterprises (SMEs) are the backbone of the European economy
      with strong contributions to employment, innovation, growth, and social cohesion. They therefore deserve special attention
      and true support to enable them to further contribute to a prosperous Europe. Sufficient access to external finance
      - with the main goals of filling the gaps in funding for early-stage, high-risk research and innovation by SMEs, as
      well as stimulating breakthrough innovation - for SMEs is crucial to obtain economic growth, job creation and competitiveness
      of enterprises. It is one of the central elements in the European economic policy debates. To improve access to finance
      for SMEs, the EU as well as most EU Member States support SMEs with a wide range of loan, guarantee and/or equity instruments
      to mitigate market failures in SMEs finance. In addition, in the past years the EU initiated both the Investment Plan
      – of which SME-financing is an important part – and the Capital Markets Union Action Plan aiming at establishing an
      integrated capital market in the EU to boost the creation of jobs and economic growth. Objective of the project is to
      organize a 2 full day international conference CROATIA: INNOVATIVE ENTERPRISE WEEK 2020 (year 2020), including a restricted
      VIP-dinner/reception in the evening prior to the conference (year 2020).  Objective of the conference is to raise awareness
      of the potential for the financial instruments, facilities and accompanying measures launched, in particular, under
      Horizon 2020 to enhance access to finance for research and innovation. The conference will focus on financing and financial
      tools for developing innovative products and services in highly innovative Small and medium-sized enterprises. (SMEs)Horizontal
      topics: Artificial Intelligence (AI), ICT / Energy sector'
    - BLAZE aims at developing Low cost, Advanced and Zero Emission first-of-a-kind small-to-medium Biomass CHP. This aim
      is reached by developing bubbling fluidised bed technology integrating high temperature cleaning & conditioning system
      (IBFBG, that can convert heterogeneous feedstocks in a syngas with zero particulate matter and ultra-low tar and contaminants
      content), an integrated high temperature gas cleaning approach for HCl and H2S removal and an innovative key component
      for thermal and chemical integration of solid oxide fuel cell (efficient gas recirculation of the fuel cell anode exhaust
      to the gasification process via a steam-driven high speed micro-compressor using gas bearing technology). The technology
      is developed for a CHP capacity range from small (25-100 kWe) to medium (0.1-5 MWe) scale and is characterised by the
      widest fuel spectrum applicable (forest, agricultural, industrial and municipal waste also with high moisture, ash and
      contaminants content), high efficiencies (50% electrical versus the actual 20%), low investment (< 4 k€/kWe) and operation
      (≈ 0.05 €/kWh) costs as well as almost zero gaseous and PM emissions, projecting electricity production cost below 0.10
      €/kWh . Gasification, gas cleaning & conditioning and fuel cells will be tested at lab scale and 25 kWe SOFC will be
      thermally and chemically integrated in 100 kWth IBFBG demonstrating the achievement of new milestones, increasing competitiveness
      of European industry, energy system reliability and flexibility and biomass plants social acceptance. Process simulations,
      computer aided design, tests, performance evaluation, risk and safety analysis as well as a technology assessment part
      covering techno-economic, environmental and overall impact assessments and market studies will be carried out together
      with a clear dissemination, exploitation and communication plan, that can count on the involvement of the main gasifier,
      gas conditioning and SOFC European companies and research centres.
    - Leveraging on the business operations of consortium partners (4000 integrated building renovations conducted to date),
      TURNKEY RETROFIT will develop and replicate an integrated home renovation service which will be initially operated in
      3 EU countries - France, Ireland and Spain - with an expected 335M€ investment pipeline for home renovation within the
      first 5 years (approximately 14 700 dwellings renovated, leading to 96,6 GWh/year Primary energy savings triggered)
      beyond the end of the project. The project will point to further replication across Europe and Internationally in particular
      via the Green Building Council network.The TURNKEY RETROFIT service will be developed as a home-owner-centric renovation
      journey, which will transform the complex and fragmented renovation process into a simple, straightforward and attractive
      process for the home-owner. It will include the initial technical and behavioural diagnosis, technical offer, contract
      development and agreement, structuring and provision of financial support, as well as the on-site coordination of works
      and quality assurance. It will be a service-oriented model where the home-owner is offered tailor-made solutions through
      the whole customer journey.The service will be accessible through a user-friendly digital platform and it will address
      drivers of building renovation that go beyond a desire to reduce energy bills and increase asset value, such as home
      improvement, increased comfort, enhanced health & quality of life.
