widgetData:
- source_sentence: "\n  Given  the Column informations, generate an SQL query for the following question:\n  Column: Finishing\
    \ position | Points awarded (Platinum) | Points awarded (Gold) | Points awarded (Silver) | Points awarded (Satellite)\n\
    \  Question: How many platinum points were awarded when 6 gold points were awarded?\n  SQL Query: SELECT MAX Points awarded\
    \ (Platinum) FROM table WHERE Points awarded (Gold) = 6\n  "
  sentences:
  - How many platinum points were awarded when 6 gold points were awarded?
  - Did any team score games that totaled up to 860.5?
  - Who had the pole position at the German Grand Prix?
- source_sentence: "\n  Given  the Column informations, generate an SQL query for the following question:\n  Column: Player\
    \ | No. | Nationality | Position | Years in Toronto | School/Club Team\n  Question: What's Dell Curry nationality?\n \
    \ SQL Query: SELECT Nationality FROM table WHERE Player = Dell Curry\n  "
  sentences:
  - What is the title when original air date is may15,2008?
  - What's Dell Curry nationality?
  - What's the minimum total attendance of the Premier League association football?
- source_sentence: "\n  Given  the Column informations, generate an SQL query for the following question:\n  Column: Sepal\
    \ length | Sepal width | Petal length | Petal width | Species\n  Question: Name the species when petal width is 2.0 and\
    \ petal length is 4.9\n  SQL Query: SELECT Species FROM table WHERE Petal width = 2.0 AND Petal length = 4.9\n  "
  sentences:
  - What year was the championship in Wimbledon (2)?
  - Who wrote Series 38?
  - Name the species when petal width is 2.0 and petal length is 4.9
- source_sentence: "\n  Given  the Column informations, generate an SQL query for the following question:\n  Column: No. in\
    \ season | No. in series | Title | Directed by | Written by | Original air date | U.S. viewers (million)\n  Question:\
    \ How many millions of U.S. viewers watched the episode that first aired on March 31, 2013?\n  SQL Query: SELECT U.S.\
    \ viewers (million) FROM table WHERE Original air date = March 31, 2013\n  "
  sentences:
  - How many millions of U.S. viewers watched the episode that first aired on March 31, 2013?
  - How many viewers were there for the premier with 34
  - What is Bruce Cerone overall?
- source_sentence: "\n  Given  the Column informations, generate an SQL query for the following question:\n  Column: Nomination\
    \ | Actors Name | Film Name | Director | Country\n  Question: What was the film Falling up nominated for?\n  SQL Query:\
    \ SELECT Nomination FROM table WHERE Film Name = Falling Up\n  "
