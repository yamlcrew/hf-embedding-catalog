      başta olmak üzere 250''den fazla Türk ve Çinli iş insanının katılımıyla gerçekleştirildi.

      Büyükelçi Musa: "Çin, Asya''daki en büyük, dünyadaki üçüncü büyük ticaret ortağımız"

      Konferansın açılışında konuşan

      T.C. Pekin Büyükelçisi Dr. İsmail Hakkı Musa

      , Türkiye''nin stratejik konumu, üretim potansiyeli, lojistik imkânları, tedarik ve üretim kapasitesiyle, bölgesinde
      ve küresel düzeyde önemli bir ülke olarak öne çıkmakta olduğunun altını çizdi. Musa, ''''Tarihin, coğrafyanın, stratejinin,
      küresel dinamiklerin ve nihayet sağduyunun Türkleri ve Çinlileri daha yakın iş birliğine, daha yakın çalışmaya davet
      ettiği açıktır" dedi.

      Musa, Türkiye ile Çin arasındaki ticaretin geliştiğine işaret ederek, "Çin, Asya''daki en büyük, dünyada ise üçüncü
      en büyük ticaret ortağımız konumunda bulunuyor. İki ülke arasındaki ticaret hacmi son 20 yılda, 40 kat artarak 2022''de
      yaklaşık 45 milyar dolarlık bir rekora imza attı. 1200''ü aşkın Çinli şirket Türkiye''de, 100 kadar Türk şirketi de
      Çin''de kârlı faaliyetlerini sürdürüyor" ifadelerini kullandı.

      Musa, iki ülke arasında sürdürülebilir bir ekonomik iş birliği ilişkisi kurulması için ticaretin dengeli şekilde yürütülmesinin
      büyük önem taşıdığına dikkat çekerek, "Hem ekonomilerimizin yapısı itibarıyla hem de tek taraflı çabalarla Türkiye aleyhine
      ticaret açığının dengelenmesi için atılabilecek önemli adımlar var. Çin''in dünya genelinde 160 milyar doları aşkın
      yatırımı bulunuyor. Türkiye''nin bu yatırımdaki payı ise beklentimizin altındadır. Bu çerçevede, Çinli iş insanlarının
      Türkiye''deki yatırımlarına hız kazandırmaları ve ihracat çalışmalarımızı kolaylaştırmaları en büyük beklentilerimiz
      arasındadır" dedi.

      Li Qingshuang: "Çin-Türkiye işbirliğinin gelişmesine destek vermeyi dürdüreceğiz."

      CCPIT Başkan Yardımcısı Li Qingshuang

      konuşmasında, "Çin ve Türkiye arasındaki ikili ticaret hacminin bu yılın ilk üç çeyreğinde yıllık bazda yüzde 15,6 artışla
      33,44 milyar dolara ulaştığını hatırlatarak, "İki ülke iş dünyası Kuşak ve Yol''un ortak inşası çerçevesinde ticaret,
      yatırım, altyapı, yeşil enerji ve diğer alanlardaki işbirliğini derinleştirmeye devam etmiştir. İki ülke arasındaki
      yatırım büyüklüğü 3 milyar doları aşmıştır." şeklinde konuştu.

      Li, Pekin''de ilk kez düzenlenen Çin Uluslararası Tedarik Zincirleri Fuarı''na 60''a yakın Türk şirketinin katılmasının
      önem taşıdığına işaret ederek "CCPIT, Türkiye ve Çin arasındaki ekonomik ve ticari işbirliğini güçlendirmeyi istiyor.
      Bu bağlamda, DEİK ve TÜSİAD gibi muadil kuruluşlarla işbirliği anlaşmaları imzaladık" dedi. Gelecekte daha fazla kaliteli
      Türk ürününün Çin pazarına girmesine yardımcı olmak, Çinli şirketlerin Türkiye''de yatırım yapmasına ve iş kurmasına
      destek olmak için çalışmayı sürdüreceklerinin altını çizdi. Çin''in ekonomik ve ticari ilişkilerinin yeni bir seviyeye
      getirilmesi ve iki ülke arasındaki işbirliklerinin arttırılmasını amaçladıklarını ifade etti.

      Korhan Kurdoğlu: "Çin''den gelecek know-how ile Türkiye''de dijitalleşme konusunda pek çok ortak proje hayata geçirebilir"

      DEİK/Türkiye-Çin İş Konseyi Başkanı ve TÜSİAD Çin Çalışma Grubu Başkanı Korhan Kurdoğlu

      ise, konferansın ana teması "küresel tedarik zincirleri"nin, işletmelerin rekabet gücü ve ülkelerin ekonomik büyümesine
      katkısı açısından hayati önemde olduğunu vurguladı. Çin Başbakanı Li Qiang ev sahipliğindeki yabancı yatırımcılar toplantısına
      da katıldıklarını aktaran Kurdoğlu, "Dünyada ardı ardına yaşanan çoklu kriz ortamında, küresel tedarik ve üretim zincirleri
      de yeniden şekilleniyor. Şirketlerin tedarik ağlarını veya üretim üslerini daha yakın coğrafyalara, kendi ülkelerine
      veya partner olarak gördükleri ülkelere kaydırmaya başladıklarını gözlemliyoruz. Türkiye, küresel tedarik zincirlerinin
      uzun bir dönemden beri önemli bir parçası. Çin ile iş birliğinin ve dengeli ekonomik ilişkiler geliştirmenin ülkemize
      büyük bir değer katacağına inanıyoruz. Çin''in hem küresel tedarik zincirlerindeki güçlü konumu hem de dijitalleşme
      ve yeni teknolojiler alanında dünya lideri olma yolunda attığı sağlam adımlar düşünüldüğünde, ülkemiz için de önemli
      iş birliği alanları ve fırsatları sunduğunu görüyoruz. Türkiye''de, Çin''den gelecek know-how ile özellikle akıllı üretim,
      sağlık teknolojileri, büyük veri, nesnelerin interneti dahil dijitalleşme konusunda pek çok ortak proje hayata geçirebilir.
      Kazan-kazan olarak görülecek projeler, Türkiye''nin Avrupa ile iç içe girmiş bağları ile, Çin''i Avrupa''ya daha da
      yaklaştıracaktır. Çin de Türkiye için Ticaret Bakanlığımızın "Uzak Ülkeler" stratejisi kapsamındaki odak ülkelerden
      biri olarak, Asya ülkelerine açılan bir kapı niteliğinde. Çin, 800 milyon dijital kullanıcısı ve 400 milyon orta sınıfı
      ile ürettiği kadar tüketen bir ülke olarak, Türkiye için önemli bir pazar ve aynı zamanda büyük potansiyel barındıran
      bir ticaret ortağı. Bu ortaklığın geliştirilmesi, Türkiye ve Çin arasında ticaretin dengelenebilmesi ve iş birliği fırsatlarının
      değerlendirilmesi için TÜSİAD ve DEİK olarak, karşı kanat kuruluşumuz CCPIT ve Çin''in diğer sektörel kuruluşları ile
      yakın temaslarımızı sürdürüyoruz" dedi.

      TÜSİAD Şanhay Network Üyesi / DTİK Çin İş Konseyi Üyesi ve Burger King CEO''su Atakan Bozkurt moderatörlüğünde gerçekleşen
      panele, TÜSİAD Şanhay Network Koordinatörü ve Beko Çin Ürün Yönetimi ve Pazarlama Direktörü Onur Türkmen, ZTE Türkiye
      CTO''su Gu Xinyu, TÜSİAD Şanhay Network Üyesi / DTİK Çin İş Konseyi Üyesi ve Çimtaş Ningbo Genel Müdürü ve Çin Resmi
      Temsilcisi Emrah Ercen, FIBERHOME International (Beijing) Technologies CEO''su Xu Lei, China Coal Construction Group
      Genel Müdür Yardımcısı Gui Zhao ile TÜSİAD Şanhay Network Üyesi ve Softtech Çin CEO''su Doruk Keser katılarak Türkiye
      ve Çin arasındaki ticaret ve yatırım ilişkilerin geliştirilmesi ve iş birliklerinin arttırılmasına yönelik görüşlerini
      paylaştılar.

      II. Türkiye-Çin İş Konferansı, TFI TAB Gıda Yatırımları, Beko, CLK Worldwide, Çimtaş(Ningbo) ve Softtech sponsorluğunda
