    - 'DEİK, MACARİSTAN İŞ VE YATIRIM FIRSATLARI SEMİNERİ İSTANBUL’DA DÜZENLEDİ

      Etkinlikler

      Dış Ekonomik İlişkiler Kurulu (DEİK)/Türkiye-Macaristan İş Konseyi tarafından "Macaristan İş ve Yatırım Fırsatları"
      Semineri, DEİK/Türkiye-Macaristan İş Konseyi Başkanı Suat Gökhan Karakuş, Macaristan İstanbul Başkonsolosu Dr. Atilla
      Pinter, Macaristan Ticaret Müşaviri Miklós Bujáky, Vize Dairesi Başkanı Zsuzsanna Palmai ve İş Konseyi Üyelerinin katılımlarıyla
      3 Aralık 2024 tarihinde İstanbul''da gerçekleştirildi.

      Karakuş: "Karşılıklı yatırımlarımızın ve iş birliğimizin ortak hedef doğrultusunda 6 milyar dolara ilerleyecektir"

      DEİK/Türkiye-Macaristan İş Konseyi Başkanı Suat Gökhan Karakuş, "Macaristan, stratejik konumu, Avrupa''nın merkezindeki
      güçlü lojistik altyapısı, rekabetçi iş gücü ve yatırımcı dostu politikalarıyla Türk iş dünyası için her zaman cazip
      bir iş ve yatırım merkezi olmuştur. Son dönemde iki ülke arasındaki ticari ve ekonomik ilişkilerde olumlu bir ivme görüyoruz.
      2023 yılında ikili ticaret hacmimiz 4 milyar doları aşarak her iki ülke için de stratejik bir seviyeye ulaştı. Bu başarının,
      karşılıklı yatırımların artırılması ve sürdürülebilir iş birliklerinin geliştirilmesi için sağlam bir temel oluşturduğuna
      inanıyorum. Yaşanan bu olumlu gelişmeler ışığında karşılıklı yatırımlarımızın ve iş birliğimizin ortak hedef doğrultusunda
      oluşturulan 6 milyar dolara emin adımlarla ilerleyeceğini düşünüyorum. Macaristan ile ikili iş birliğini geliştirecek
      önemli bir hususun son gelişmeler ışığında gündemde yer edinen Gümrük Birliği''nin modernizasyonu olacağına inanıyorum.
      1995 yılından beri AB ile aramızdaki ticaretin ana yapısını oluşturan Gümrük Birliği''nin dijital ve yeşil dönüşüm çerçevesinde
      güncellenmesi ikili ilişkilerimizi daha da geliştirecektir" dedi.

      Pinter: "Amacımız, ikili ticareti 6 milyar dolara ulaştırmak"

      Macaristan İstanbul Başkonsolosu Dr. Attila Pinter ise, "Macaristan olarak, Türkiye ile ticari ilişkilerimiz çok dinamik
      şekilde gelişti. Ticaretin değeri geçen yıl 3,9 milyar dolardı. Amacımız, ikili ticareti 6 milyar dolara ulaştırmak.
      Yatırım yapmadan ticari ilişkilerin gelişmesi mümkün değil. Türk firmalar, Macar firmalara göre yatırım konusunda daha
      aktif. Türkiye''de en önemli Macar yatırımı gerçekleşti. Macar hükümeti, Türk hükümeti ile iyi ilişkiler kurmayı ve
      ekonomik ticari ilişikleri yakın hale getirmeyi hedefliyoruz" dedi.

      Bujáky: "2025 yılı, Macaristan''da "Teknoloji Yılı" olarak ilan edildi"

      Macaristan Ticaret Müşaviri Miklós Bujáky gerçekleştirdiği sunumda, Macaristan''da işsizlik oranının düşük olduğu ve
      sanayileşmenin yalnızca Budapeşte ile sınırlı kalmayıp ülke geneline yayıldığını söyledi. Bujáky, "Kurumlar vergisinin
      yüzde 9 olduğu, ancak yabancı yatırımcılar için bu oranın yüzde 1.8''e kadar düşürülebilir. Macaristan''da 500 Türk
      şirketi, Türkiye''de ise 200 Macar şirketi faaliyet göstermektedir. İki ülke arasındaki ticaret hacminin orta vadede
      6 milyar dolara ulaşması hedeflenilmektedir. 2025 yılı, Macaristan''da "Teknoloji Yılı" olarak ilan edilmiştir. Bu kapsamda
      ortak etkinlikler düzenlenebililir" dedi.

      Seminer sponsoru ise Macaristan İhracatı Teşvik Ajansı (HEPA Türkiye) oldu.

