    Duyurular

    T.C. Ticaret Bakanlığımızdan Kurulumuza iletilen bir yazıda, Nur-Sultan Ticaret Müşavirliğinden alınan bilgiye atıfla
    Kazakistan''ın Almatı şehrinde geleneksel olarak her yıl düzenlenen yatırım forumunun, bu sene çevrim içi platformda 3
    Aralık 2020 tarihinde "Almaty Investment Forum 2020" adıyla gerçekleştirilmesinin öngörüldüğü bildirilmektedir.

    Kazakistan''daki yatırım imkânlarının ve ticari potansiyelin öne çıkaracılağı konuların yer akması planlanan söz konusu
    etkinliğe, yerel ve yabancı kamu ve özel sektör temsilcilerinin katılması öngörülmektedir.

