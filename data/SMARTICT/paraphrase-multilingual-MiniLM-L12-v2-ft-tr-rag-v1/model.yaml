  - source_sentence: 'veya ''''''Afrika insansıları'''''', ilk kez John Edward Gray tarafından 1825 yılında tanımlanmış bir
      Hominidae alt familyasıdır. Açıklama (insansı) aile ağacı sol Mevcut (5 tür) ve soyu tükenmiş türleriyle birlikte iki
      oymak içerir: ''''''Hominini'''''' oymağı ve ''''''Gorillini'''''' oymağı. Kimi yazarlar ise, ''''Pan'''' cinsinin bazen
      kendi üçüncü oymağı Panini''ye ait olduğunu düşünür. Homininae, orangutanların (Ponginae alt familyası) hominid soyundan
      ayrılmasından (yaklaşık 16 myö) sonra ortaya çıkan, insanlarla orangutanlara göre daha yakın akraba olan tüm hominidleri
      içerir. Bu alt familyadaki canlılar, ''''hominine'''' veya ''''hominineler'''' olarak tanımlanır. Evrim Homininae alt
      familyasının yaşı son ortak atası) tahminlere göre 14 ila 12.5 milyon yıldır Gorillini ve Hominini oymaklarına ayrılmasının
      ("goril insan son ortak atası", GHLCA) geç Miyosen''de, nakayamai''''nin yaşadığı döneme yakın bir zamanda, ila 10 milyon
      yıl önce gerçekleştiği tahmin edilmiştir (TGHLCA). ''''Pan-Homo'''' bölünmesine kadar (5-7 myö) gorillerin ve ''''Pan-Homo''''
      atalarının melezlendiğine dair kanıtlar vardır. Filogeni Parins-Fukuchi ''''ve 2019''daki çalışmasına göre oluşturulmuş,
      soyu tükenmiş homininleri içeren bir Homininae kladogramı: Ayrıca bakınız son ortak ata Ponginae Notlar Kaynakça Dış
      bağlantılar Kategori:John Edward Gray tarafından adlandırılmış taksonlar tanımlanan taksonlar'
