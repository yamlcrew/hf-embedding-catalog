- source_sentence: 'Seri konum efekti tarafından oluşturulan şeklindeki seri konum eğrisini gösteren grafik. ''''''Seri konum
    etkisi'''''', bir kişinin, bir serideki ilk ve son ögeleri en iyi; ortanca ögeleri en kötü hatırlama eğilimidir. Bu terim,
    Hermann Ebbinghaus tarafından kendi üzerine yaptığı çalışmalar ile ve bu terim, hatırlama doğruluğunun, bir ögenin bir
    çalışma listesindeki konumunun bir fonksiyonu olarak değiştiği bulgusuna değinmektedir. Sırası fark etmeksizin (serbest
    hatırlama) listedeki ögelerin hatırlanması istenildiğinde, insanlar listenin sonundaki ögeleri hatırlamaya başlama eğilimindedir
    ve bu ögeleri en iyi şekilde hatırlarlar (''''''sonluk etkisi''''''). Daha önceki liste ögeleri arasında, ilk birkaç öge,
    orta ögelerden daha sık hatırlanır (''''''ilklik etkisi''''''). İlklik etkisi için önerilen bir neden, sunulan ilk ögelerin
    kendilerine ayrılmış daha fazla miktarda işlem nedeniyle en etkin şekilde hareketsiz bellekte depolanmasıdır. (İlk liste
    ögesi kendi başına prova edilebilir; ikincisi, birincisi ile birlikte prova edilmek zorundadır, üçüncü, birincisi ve ikincisi
    ile birlikte, ve böyle devam eder.) Ögeler hızlı bir şekilde sunulduğunda ilklik etkisi azalır ve yavaş sunulduğunda artar
    (her bir ögenin işlenmesini ve böylece kalıcı depolanmasını azaltan ve arttıran faktörler). Daha uzun sunum listelerinin
    ilklik etkisini azalttığı bulunmuştur. Sonluk etkisi için teorileşmiş bir neden, bu ögelerin geri hatırlanması talep edildiğinde
    hala aktif hafızada bulunmasıdır. Hiçbirinden yararlanmayan ögeler (ortanca ögeler) en kötü şekilde geri çağrılır. Sonluk
    etkisi için ek bir açıklama zamansal bağlamla ilgilidir: Mevcut zamansal bağlam, daha yeni ögelerin, farklı bir zamansal
    bağlamda (listenin başlarında) incelenen ögelere göre daha yüksek geri hatırlama olasılığına sahip olacağını haber veren
    bir geri hatırlama işareti olarak kullanılabilir. Araya giren bir görev verildiğinde sonluk etkisi azalır. Araya giren
    görevler, çalışan belleği kullanır, ve dikkat dağıtıcı aktivite süresi 15 ila 30 saniyeyi aşarsa, sonluk etkisini bozabilir.
    Ek olarak, geri hatırlama testten hemen sonra gelirse, sonluk etkisi çalışılan listenin uzunluğuna, veya sunum hızına
    bakılmaksızın istikrarlıdır. Kalıcı uzun süreli hafıza oluşturma kabiliyeti zayıf olan amnezyaklar ilklik etkisi göstermezler,
    ancak hatırlama çalışmadan hemen sonra gelirse bir sonluk etkisi gösterirler. Alzheimer hastalığı olan kişiler daha düşük
    bir ilklik etkisi sergiler, ancak hatırlamada bir sonluk etkisi göstermezler. İlklik etkisi İlklik etkisi, psikolojide
    ve sosyolojide, kişinin ilk verilen bilgiyi daha sonra verilen bilgiden daha iyi hatırlamasına neden olan bir bilişsel
    önyargıdır. Örneğin, yeterince uzun bir kelime listesini okuyan bir kişinin, listenin başındaki kelimeleri hatırlaması
    listenin ortasındakileri hatırlamasından daha yüksek ihtimallidir. Birçok araştırmacı bu olguyu serbest hatırlama null
    testler yoluyla açıklamaya çalışmıştır. Coluccia, Gamboz ve Brandimonte (2011), serbest hatırlamayı katılımcıların herhangi
    bir telkin olmaksızın bilgileri hatırlamaya çalışması olarak açıklamaktadır. 20. yüzyılın sonlarındaki bazı deneylerde,
    kendilerine sunulan bir listede test edileceklerini bilen katılımcıların ögeleri prova edeceği kaydedildi: Ögeler sunulduğunda
    katılımcılar bu ögeleri kendilerine tekrar edecek ve yeni ögeler sunuldukça katılımcılar daha yeni maddelerle birlikte
    önceki ögeleri prova etmeye devam edeceklerdi. İlklik etkisinin ögelerin sunumu arasında daha fazla zaman olduğunda hatırlama
    üzerinde daha büyük bir etkisi olduğu, böylece katılımcıların önceki (asal) ögeleri prova etme şansının daha yüksek olacağı
    gösterilmiştir. Açık prova katılımcıların prova örüntülerini test etmek için kullanılan bir teknikti. Bu tekniğin kullanıldığı
    bir deneyde, katılımcılardan akla gelen ögeleri yüksek sesle söylemeleri istendi. Bu şekilde deneyci, katılımcıların listenin
    başındaki ögeleri listenin ortasındaki ögelerden daha çok böylece onları daha sık prova yapacağını ve daha sonra listenin
    ortasındaki ögelerden daha iyi hatırlayacağını görebildi. Brodie ve Murdock tarafından yapılan başka bir deneyde, sonluk
    etkisinin ilklik etkisinden kısmen sorumlu olduğu bulunmuştur. Deneylerinde, aynı zamanda açık prova tekniğini kullandılar
    ve katılımcıların daha önceki ögeleri daha fazla prova yapmasının yanı sıra, listenin başındaki kelimeleri provada daha
    sonra söylediklerini keşfettiler. Bu şekilde, daha önceki ögeler prova yolu sayesinde test sonuna daha yakındı ve kısmen
    sonluk etkisi ile 2013 yılında yapılan bir araştırma, ilklik etkisinin, edimsel koşullama olarak da bilinen bir öğrenme
    süreci olan tekrarlanan seçim deneyime dayalı karar verme sürecinde de önemli olduğunu göstermiştir. Yazarlar, takip eden
    davranışın ilk ödülünün değerine verilen önemi göstermiş ve bu olguyu sonuç önceliği olarak ifade etmişlerdir. Başka bir
    çalışmada, katılımcılar iki cümleden birini aldı. Örneğin, cümlelerin biri "Steve akıllı, çalışkan, eleştirel, fevri ve
    kıskançtır."; diğeri ise "Steve kıskanç, fevri, eleştirel, çalışkan ve akıllıdır." olabilir. Bu iki cümle aynı bilgileri
    içerir. Birincisi başlangıçta pozitif özellikleri gösterirken, ikincisi olumsuz özelliklere sahiptir. Araştırmacılar,
    katılımcıların Steve''i ilk cümle verildiğinde ikincisine kıyasla daha olumlu buldular. Sonluk etkisi İki geleneksel teori
    sınıfı sonluk etkisini açıklar. Çift depo modelleri Bu modeller, en son listelenen çalışma ögelerinin oldukça erişilebilir
    kısa süreli ara bellekten, yani insan hafızasındaki kısa süreli depodan (KSD) alındığını varsayar. Bu, daha sonra incelenen
    ögelerin, daha önce incelenen ögelere göre bir avantaja sahip olmasını sağlar, çünkü daha önceki çalışma ögelerinin uzun
    süreli bellek deposundan (USD) geriye getirilmesi için daha fazla çaba harcanması gerekir. Bu tür modellerin önemli bir
    tahmini, alıkoyma döneminde (liste sunumu ile test arasındaki süre) 10-30 saniye aritmetik problemleri çözme gibi dikkat
    dağıtıcı bir sunumun yenilik etkisini azaltmasıdır. KSD sınırlı kapasiteye sahip olduğundan, dikkat dağınıklığı daha sonraki
    çalışma listesi ögelerini KSD''den değiştirir, böylece testte bu ögeler sadece USD''den alınabilir ve kısa süreli ara
    bellekten daha kolay alınabilme avantajlarını yitirebilir. Bu nedenle, çift depolu modeller, hem anlık hatırlama görevlerindeki
    sonluk etkisini hem de gecikmeli serbest geri hatırlama görevinde böyle bir etkinin zayıflamasını başarılı bir şekilde
    açıklar. Bununla birlikte, bu modelle ilgili büyük bir sorun, uyarıcılar arası zaman aralığı (aralıksız çeldirici görev)
    sırasında her çalışma maddesi arasında bir dikkat dağılması olduğunda, gecikmeli hatırlamada gözlemlenen uzun süreli etkisini
    tahmin edememesidir. Dikkatin dağılması, son çalışma maddesinden sonra hala mevcut olduğundan, çalışma maddesini KSD''den,
    sonluk etkisi azaltılacak şekilde Bu uzun vadeli sonluk etkisinin varlığı, anlık ve uzun süreli sonluk etkilerinin ortak
    bir mekanizmayı paylaşması olasılığını arttırmaktadır. Tek depo modelleri Tek depo teorilerine göre, dizisel konum etkilerinden
    tek bir mekanizma sorumludur. İlk model türü, her bir liste ögesinin incelenmesi ile test arasındaki sürenin, bir ögenin
    alınırken bellek izinin göreceli rekabetçiliğini belirlediği göreceli zamansal farklılığa dayanmaktadır. Bu modelde, liste
    sonu ögelerinin daha belirgin ve dolayısıyla daha kolay alınabileceği Başka bir model türü, ögelerin bellekten geri alınmasının
    yalnızca kişinin çalışma ögesinin kendisini değil, aynı zamanda çalışma bağlamını zihinsel temsiline bağlı olduğunu öne
    süren bağlamsal değişkenliğe dayanmaktadır. Bağlam zamanla değiştiğinden ve gittikçe değiştiğinden, bellek ögelerini geri
    almak için yarıştığında, anlık serbest hatırlama testinde, daha yakın zamanda incelenen ögelerin test bağlamıyla daha
    benzer kodlama bağlamları olacaktır ve geriye getirme olasılığı daha yüksektir. Anlık serbest hatırlama dışında, bu modeller
    gecikmeli serbest hatırlama ve sürekli çeldirici serbest hatırlama koşullarında sonluk etkisinin varlığını veya yokluğunu
    da tahmin edebilir. Gecikmeli hatırlama koşulları altında, test bağlamı artan tutma aralığıyla uzaklaşarak zayıflamış
    bir sonluk etkisi yaratır. Sürekli çeldirici hatırlama koşullarında, artan yorumlama aralıkları çalışma bağlamı ve test
    bağlamı arasındaki benzerlikleri azaltırken, maddeler arasındaki göreli benzerlikler değişmeden kalmaktadır. Hatırlama
    işlemi rekabetçi olduğu sürece, son ögeler kazanacaktır, bu nedenle bir sonluk etkisi gözlenir. Oran kuralı Genel olarak,
    sonluk etkisi ile ilgili önemli bir ampirik gözlem, mutlak tutma aralıkları (çalışma sonu ile test süresi arasındaki süre)
    veya sunumlar arası aralıklar (farklı çalışma ögeleri arasındaki süre) olmamasıdır. Bunun yerine, sonluk miktarı ile belirlenen
    oran; mutlak tutma aralıkları ve sunumlar arası aralıklar oranı (oran kuralı). Sonuç olarak, bu oran sabit kaldığı sürece,
    aralıkların mutlak değerlerinden bağımsız olarak yenilik gözlenecektir, böylece ''''''zaman ölçeği değişmezliği''''''
    olarak bilinen bir fenomen olan tüm zaman ölçeklerinde yenilik gözlenebilir. Bu, yeniliğin KSD''nin büyüklüğüne ve KSD''deki
    ögelerin yer değiştirmesini yöneten kurala bağlı olduğunu varsayan çift depo modelleri ile çelişmektedir. Olası açıklamalar
    daha sonra tek, aynı bir mekanizma yoluyla ortaya çıkan sonluk etkisini açıklar ya da anlık ve uzun süreli sonluk etkileri
    için iki farklı mekanizmayı öngörebilen farklı bir modelle yeniden açıklar. Böyle bir açıklama Davelaar ve ark. (2005),
    tek bileşenli bir bellek modeli tarafından açıklanamayan anlık ve uzun süreli sonluk fenomenleri arasında ayrışmalar olduğunu,
    anlık ve sonluk açıklayan bir KSD''nin varlığını savunan ve bir saniye uzun süreli sonluğu açıklayan bağlamsal kaymaya
    dayanan mekanizmadır. İlgili etkiler 1977''de William Crano özellikle birbirinin zıttı olduğu söylenen ilklik ve sonluk
    etkileri başta olmak üzere sıra etkilerinin doğasını belirten bir çalışma hazırlamaya karar verdi. Crano tarafından test
    edilen özellikler: Anlam değişimi hipotezi Bir listenin başındaki ögeler, katılımcıların listenin geri kalanının da uymasını
    beklediği bir tema oluşturur. Katılımcı, listedeki bazı kelimelerin anlamlarını belirlediği beklentiye uyacak şekilde
    değiştirir. Watkins ve Peynircioğlu (1984), katılımcıların kelimelerin anlamlarını değiştirerek belirlenen temadan uzaklaşarak
    da olsa sunulan bilgideki sapmayı azalttığını açıklamıştır. Tutarsızlık durumda saymama Katılımcılar, kendilerine sunulan
    önceki maddelerle tutarlı olmayan bilgileri dikkate almazlar. Başka bir deyişle, tutarsızlık durumda saymama, sunulan
    diğer bilgilerle tutarsız olan bilgileri tutarlı olanlardan daha az önemli görmeyi içerir (Devine ve Ostrom, 1985). Dikkat
    azaltma hipotezi Önce sunulan bilgilerin katılımcılar üzerinde daha sonra sunulan bilgilerden daha fazla etkisi vardır
    ve bu bilgiler tutarlı olsa bile öncelikli bir etkinin ortaya çıkmasına neden olur. Steiner ve Rain (1989) insanların
    başlangıçta sunulan bilgilere daha fazla dikkat ettiklerini, ancak kendilerine sonradan sunulan bilgilere giderek daha
    az dikkat ettiklerini açıklamaktadır. İlklik etkisi, katılımcıların başlangıç bilgilerine dikkat etmeleri ve daha sonra
    sunulan bilgileri görmezden gelmeleri nedeniyle oluşur. Öte yandan, katılımcılar sürekli olarak bilgiye dikkat etmek zorunda
    oldukları bir durumdaysa, sonluk etkisi oluşabilir. ''''''Süreklilik etkisi'''''' veya gecikme etkisi, başarılı bir geri
    çağırma sonra, bir sonraki geri çağrılan ögenin, yakın bir seri konumdan ziyade, uzak bir seri konumdan gelme olasılığının
    düşük olduğunu tahmin eder (Kahana, Howard, Zaromb ve Wingfiend, 2002). İki ögenin seri konumu arasındaki fark seri konum
    gecikmesi olarak adlandırılır. Koşullu yanıt olasılığı olarak adlandırılan bir başka faktör, belirli bir seri konum gecikmesini
    hatırlama olasılığıdır. Ayrıca bakınız Anchoring Clive Wearing Serbest Hatırlama Henry Molaison İknada İlklik Yasası Öğrenme
    Eğrisi Hafıza Eğilimleri Listesi Bilişsel Eğilimler Listesi Sonucun İlkliği Öğrenme İlkeleri Tepe-Uç Kuralı Anımsama Yumrusu
    Kaynakça ;Atıflar ;Basılı eserler Konuyla ilgili yayınlar Liebermann, David A. L''''earning and memory: An integrative
    approach.'''' Belmont, CA: Thomson Wadsworth, 2004, Kategori:Bellek süreçleri eğilimler'
