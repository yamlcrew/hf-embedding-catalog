- source_sentence: (doğum adı '''David Gordon Kirkpatrick''' 13 Haziran 1927 19 Eylül 2003), Avustralyalı country müzik şarkıcısı
    ve söz yazarıydı. Avustralya için bir kültür ikonuydu ve ülkenin en çok ödül alan yıldızlarından biriydi. Haziran 1927'de
    Nulla Nulla Creek'te bir çiftçinin oğlu olarak doğan Dusty, ilk şarkısı "The Way the Cowboy Dies"ı 1937'de yazdı ve 1938'de
    11 yaşındayken "Slim Dusty" sahne adını aldı. Yetmiş yıla yakın kariyerinde çok sayıda kayıt yaptı. Yüzden fazla albüm
    çıkardı, yedi milyondan fazla kayıt sattı ve 70'in üzerinde altın ve platin albüm sertifikası kazandı". Sidney 2000 Olimpiyat
    Oyunlarının kapanış töreninde Avustralya'da çok ünlü bir şarkı olan "Waltzing Matilda"yı seslendirdi. 1951'de Dusty, şarkıcı-söz
    yazarı Joy McKean ile evlendi ve onun desteğiyle Avustralya'da büyük başarılar elde etti. Çiftin, şarkıcı-söz yazarı olan
