widgetData:
- source_sentence: İran'ın İsfahan şehrinde bir Bakır-T (Cu-T) IUD yerleştirme programında eğitilmiş ebe kadınların değerlendirilmesi.
    İsfahan’daki dört merkezden, ebe kadınlar tarafından yapılan 252 Cu-T-200 yerleştirmesi ve doktorlar tarafından yapılan
    646 yerleştirme verileri karşılaştırılmıştır. Ebe tarafından yerleştirilen kadınlar için net birikimli bir yıl devam etme
    oranı, doktor tarafından yerleştirilen kadınlara göre anlamlı derecede daha düşük olmasına rağmen, iki hasta grubunun
    ilk yıl olay oranları arasında önemli bir fark bulunmamaktadır. Bu veriler, ebe kadınların IUD yerleştirme programlarındaki
    rolünün genişletilmesinin sağlık personelinin etkin kullanımı olacağını önermektedir.
  sentences:
  - İsfahan’daki dört merkezde gerçekleştirilen Cu-T-200 yerleştirmeleriyle ilgili veriler nasıl karşılaştırılmıştır?
  - Pankreatin bileşiğinin lipaz aktivitesi üzerine yapılan çalışmaların temel amacı nedir?
  - Benzodiazepin esterlerinin farmakokinetik çalışmalarında kullanılan gaz-sıvı kromatografisi yöntemi hangi ilacı ve metabolitlerini
    tespit etmek için geliştirilmiştir?
- source_sentence: Memelilerin mitokondriyanın iç zarındaki protein kinaz aktivitesi. Bu makale, memelilerin mitokondriyanın
    iç zarına bağlı bir protein kinaz aktivitesinin keşfi hakkında bilgi vermektedir. Enzim, siklik AMP veya siklik GMP eklenmesine
    yanıt vermez ve fosfat kabul edicisi olarak bütün histone tercih eder. Siklik nükleotid bağımlı sitozol protein kinazlarına
    ait bazı standart test sistemleri, orthofosfat konsantrasyonu 25 mM'den yüksek ve test pH'ı 6.5'in altındaysa bu aktiviteyi
    tespit edemeyebilir. Burada tanımlanan enzim, görünürde pH optimumu 8.5’dir. Karaciğer mitokondrilerinde aktivite, mitokondriler
    ya sonikasyon ya da dondurma ve çözme işlemleriyle bozulmadıkça belirgin değildir. Hem karaciğer hem de kalp mitokondri
    soniketlerinin merkezkaç fraksiyonlarındaki kinaz aktivitesi, succinat dehydrogenase ve sitokrom oksidaz gibi iç zar belirteç
    enzimleriyle paralel olarak dağılım gösterirken, sitoplazma enzimleri olan malik dehidrogenazdan oldukça farklıdır. Dış
    ve iç zar ile zenginleştirilmiş preparatlarla yapılan deneyler, bu enzimlerin iç zar üzerinde yer aldığını doğrulamıştır.
    Çünkü iç zarın, dış zarın fosfatta şişirilerek bozulmasından sonra ortaya çıkan dondurma ve çözme işleminden sonra tam
    aktivite gösterimi için gerekli olduğu görüldü, bu da geçici olarak sonucuna varılmıştır ki, substrate sadece iç zarın
    matriks tarafından kabul edilir.
  sentences:
  - Metinde tanımlanan enzimlerin aktifliği hangi pH aralığında en yüksek seviyededir ve enzim aktivitesi hakkında ne söylenmiştir?
  - Amfoterisin B'nin (AMB) kaplumbağa mesanesindeki hidrojen iyonu ve bikarbonat iyonu geçirgenliği üzerindeki etkisi nedir?
  - Düşük ve yüksek pH ortamlarının fare interferonunun stabilitesi üzerindeki etkileri nedir?
- source_sentence: 'İnsanlarda β-adrenerjik stimülasyonun antidüretik etkisinin mekanizması. Hayvanlarda isoproterenol hidroklorür
    ile yapılan β-adrenerjik stimülasyon, antidiüretik hormonla benzer bir antidürezis oluşturur. Bu araştırma, isoproterenol''un
    insanlarda su diyuresini engelleyip engellemediğini belirlemek amacıyla yapıldı. Yedi genç erkek gönüllü, üç aşamada su
    diyuresi sırasında incelendi: (1) su yükleme, (2) su yükleme plus isoproterenol, ve (3) su yükleme plus isoproterenol
    plus propranolol hidroklorür. Antidürezis, isoproterenol infüzyonu sonrası 20 dakika içinde meydana geldi ve bu süre zarfında
    diyare hızı ortalama 19,4 ml/dakikadan 2,0 ml/dakikaya düştü (0,03 mikrog ila 0,06 mikrog/kg/dak). Bulgularımız, antidürezisin
    hormonel (antidiüretik hormon) ve hormonel olmayan değişikliklere (glomerüler filtrasyon hızında ve renal plazma akışında
    azalma) bağlı olduğunu gösterdi. Bunlar da sırasıyla ilacın kardiyovasküler etkilerinden kaynaklanmaktadır.'
  sentences:
  - İskemik anoksiyanın domuz mide elektriksel ve mekanik aktivite üzerinde etkisi nasıl gözlemlenmiştir?
  - Jamaikalı kadınların servikslerinde en sık bulunan morfolojik özellik nedir ve bu özellik hangi bölge üzerinde yoğunlaşmıştır?
  - İnsanlarda β-adrenerjik stimülasyonun antidüretik etkisinin mekanizması nedir?
- source_sentence: 'Sarcoma 180 hücreleri ile sıçan karaciğerinde adenozin fosforilaz ve inosine-guanosine fosforilaz aktivitelerinden
    farklı olarak, adenozin fosforilaz (EC 2.4.2.-) aktivitesinin kültürde üretilen Sarcoma 180 hücreleri ve sıçan karaciğerinde
    bulunduğu ve birkaç kriterle inosine-guanosine fosforilaz aktivitesinden farklı olduğu gösterilmiştir: (a) Sarcoma 180
    hücre özütü p-kloromerküri benzoat ile muamele edildiğinde, iki aktivite farklı derecede inhibe olmuştur. (b) Adenin,
    Sarcoma 180 ve sıçan karaciğer özütlerinin adenozin fosforilaz aktivitesini ısı inaktivasyonuna karşı seçici olarak korurken,
    hypoxanthin inosine-guanosine fosforilaz aktivitesini seçici olarak korumuştur. (c) Neredeyse doygun substrat konsantrasyonlarında
    ve Sarcoma 180 özütü kullanılarak, adenine + hypoxanthine veya adenine + guanine karışımlarının ribozilasyon hızları,
    hypoxanthine + guanine karışımına kıyasla, ayrı ayrı ölçülen hızların toplamına yaklaşık olarak eşit bulunmuştur. (d)
    inosine, Sarcoma 180 ve sıçan karaciğer özütleri tarafından katalize edilen hypoxanthine ve guanine ribozilasyonunu seçici
    biçimde engellerken, 2-kloroadenozin adenine ve N6-furfuriladenine ribozilasyonunu seçici biçimde engellemiştir. (e) pH-aktivite
    eğrileri, hypoxanthine veya guanine substrat olarak kullanıldığında benzer iken, adenine ile yapılan eğri belirgin şekilde
    farklıdır. Adenozin fosforilaz aktivitesinin in vivo''daki potansiyel rolü tartışılmıştır.'
  sentences:
  - Sarcoma 180 hücreleri ve sıçan karaciğerinde adenozin fosforilaz ile inosine-guanosine fosforilaz aktiviteleri arasında
    hangi farklar gösterilmiştir?
  - Metinde bahsedilen gruplar kimlerden oluşmaktadır?
  - Köpek serumundaki monoamin oksidazın (MAO) optimum pH değeri nedir ve bu değer tavşan serumundaki MAO'nunkinden nasıl
    farklıdır?
- source_sentence: 'Kuşlarda saldırganlık-ilişkili davranışlar. II. AA gen ürünlerinin hücresel ekspresyonu. B1-anti-B2 ve
    B2-anti-B1 allosera, sırasıyla, homozygot B1/1 ve B2/2 tavukların damar içi aşısı yoluyla, aşağıdaki kaynaklardan elde
    edilen B1/2 hücreleriyle immunizasyon sağlanarak üretildi: periferik kan lökositleri (PBL), eritrositler, timus hücreleri
    ve bursa hücreleri. Bu alloseralardan saflaştırılmış süspansiyonlar, hem kırmızı kan hücrelerini hem de orijinal verici
    türünün kan lenfositlerinin GVH reaktivitesini güçlü biçimde inhibe eden anti-B alloserumu antikorları üretti. Aynı dört
    kaynaktan hücreler kullanılarak yapılan sera emilim çalışmaları, bu antikorların GVH inhibisyonunu sağlayan antikorları
    tamamen uzaklaştırabildiğini gösterdi. Özellikle önemli bir gerçek, eritrositler ve lenfositlerde ortak olan B-haplotype
    belirlenmiş antijenlerin, daha önce tanımlandığı gibi (Simonsen 1975), allo-saldırganlık loci gen ürünlerini içeriyor
    olabileceğidir.'
  sentences:
  - B1-anti-B2 ve B2-anti-B1 alloseralardan elde edilen antikorların üretiminde hangi hücre kaynakları kullanılmıştır?
  - Orta miyokardiyal ve subendokardiyal pH’nin izlenmesi hangi amaçla kullanılmıştır?
  - Metinde incelenen hormon ile yağ hücrelerindeki adenilat siklaz sistemi arasındaki etkileşimin amacı nedir?
