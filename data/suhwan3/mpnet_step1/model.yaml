widgetData:
- source_sentence: The First Trust Nasdaq Bank ETF (FTXO) seeks to replicate the performance of the Nasdaq US Smart Banks
    TM Index by investing at least 90% of its assets in the index's securities. This fund provides exposure to U.S. banking
    companies, selecting the most liquid stocks and ranking/weighting them based on factors including trailing volatility,
    value (cash flow to price), and growth (price returns). The index typically holds around 30 liquid U.S. banking companies
    across retail banking, loans, and financial services, with an 8% cap on any single holding. The fund is non-diversified,
    and the index undergoes annual reconstitution and quarterly rebalancing.
  sentences:
  - The iShares Evolved U.S. Media and Entertainment ETF seeks to invest in U.S. listed common stocks of large-, mid-, and
    small-capitalization companies within the media and entertainment sector. Following an "Evolved" approach, the fund selects
    companies belonging to the Media and Entertainment Evolved Sector based on economic characteristics historically correlated
    with traditional sector definitions. Under normal circumstances, it allocates at least 80% of its net assets to these
    stocks, and the fund is non-diversified.
  - The Direxion Daily Healthcare Bull 3X Shares (CURE) is an ETF that seeks daily investment results, before fees and expenses,
    of 300% (3X) of the daily performance of the Health Care Select Sector Index. It invests at least 80% of its net assets
    in financial instruments designed to provide this 3X daily leveraged exposure. The underlying index tracks US listed healthcare
    companies, including pharmaceuticals, health care equipment and supplies, providers and services, biotechnology, life
    sciences tools, and health care technology, covering major large-cap names. CURE is non-diversified and intended strictly
    as a short-term tactical instrument, as it delivers its stated 3X exposure only for a single day, and returns over longer
    periods can significantly differ from three times the index's performance.
  - The Xtrackers MSCI Emerging Markets Climate Selection ETF seeks to track an emerging markets index focused on companies
    meeting specific climate criteria. Derived from the MSCI ACWI Select Climate 500 methodology, the underlying index selects
    eligible emerging market stocks using an optimization process designed to reduce greenhouse gas emission intensity (targeting
    10% revenue-related and 7% financing-related reductions) and increase exposure to companies with SBTi-approved targets.
    The strategy also excludes controversial companies and evaluates companies based on broader ESG considerations. The fund
    is non-diversified and invests at least 80% of its assets in the component securities of this climate-focused emerging
    markets index.
- source_sentence: The iShares S&P Small-Cap 600 Value ETF (IJS) seeks to track the investment results of the S&P SmallCap
    600 Value Index, which consists of U.S. small-capitalization equities exhibiting value characteristics. This index selects
    value stocks from the S&P SmallCap 600 using factors such as book value to price, earnings to price, and sales to price
    ratios. The fund generally invests at least 80% of its assets in the component securities of its underlying index and
    may invest up to 20% in certain futures, options, swap contracts, cash, and cash equivalents. The underlying index undergoes
    annual rebalancing in December.
  sentences:
  - The Global X S&P 500 Risk Managed Income ETF seeks to track the Cboe S&P 500 Risk Managed Income Index by investing at
    least 80% of its assets in index securities. The index's strategy involves holding the underlying stocks of the S&P 500
    Index while applying an options collar, specifically selling at-the-money covered call options and buying monthly 5% out-of-the-money
    put options corresponding to the portfolio's value. This approach aims to generate income, ideally resulting in a net
    credit from the options premiums, and provide risk management, though selling at-the-money calls inherently caps the fund's
    potential for upside participation.
  - The Amplify International Enhanced Dividend Income ETF (IDVO), an actively managed fund recently updated to include CWP
    in its name, seeks to provide current income primarily and capital appreciation secondarily. The fund invests at least
    80% of its assets in dividend-paying U.S. exchange-traded American depositary receipt (ADR) securities representing companies
    located outside the U.S., focusing on high-quality, large-cap constituents from the MSCI ACWI ex USA Index to offer international
    equity exposure in a domestic wrapper. It enhances income generation by opportunistically utilizing a tactical strategy
    of writing (selling) short-term, U.S. exchange-traded covered call option contracts on some or all of its individual holdings,
    targeting income from both dividends and option premiums. While aiming for country and sector diversification by selecting
    approximately 30-50 stocks, the fund is classified as non-diversified.
  - The Strive Emerging Markets Ex-China ETF seeks to track the total return performance of the Bloomberg Emerging Markets
    ex China Large & Mid Cap Index. This index comprises large and mid-capitalization equity securities from 24 emerging market
    economies, specifically excluding China. The index is market cap-weighted, includes common stocks and real estate investment
    trusts, and is rebalanced quarterly and reconstituted semi-annually. Under normal circumstances, the fund invests at least
    80% of its assets in these emerging market securities, which may include depositary receipts representing securities included
    in the index.
- source_sentence: The Fidelity MSCI Health Care Index ETF (FHLC) seeks to track the performance of the MSCI USA IMI Health
    Care 25/50 Index, which represents the broad U.S. health care sector. The ETF invests at least 80% of its assets in securities
    included in this market-cap-weighted index, which captures large, mid, and small-cap companies across over 10 subsectors.
    Employing a representative sampling strategy, the fund aims to correspond to the index's performance. The index incorporates
    a 25/50 capping methodology, is rebalanced quarterly, and its broad reach offers diversification across cap sizes and
    subsectors, potentially reducing concentration in dominant large pharma names and increasing exposure to areas like drug
    retailers and insurance. The fund is classified as non-diversified.
  sentences:
  - The SPDR S&P Health Care Equipment ETF (XHE) tracks the equal-weighted S&P Health Care Equipment Select Industry Index,
    which is derived from the U.S. total market and provides exposure to U.S. health care equipment and supplies companies.
    Employing a sampling strategy, the fund invests at least 80% of its assets in the index's securities, which are rebalanced
    quarterly. While encompassing companies of all cap sizes, the equal-weight methodology gives XHE a significant small-cap
    tilt, offering focused access to this narrow segment as an alternative for investors seeking to avoid the concentration
    found in broader, market-cap-weighted healthcare funds dominated by large pharmaceuticals or service providers.
  - The Global X Silver Miners ETF (SIL) seeks to provide investment results that correspond generally to the price and yield
    performance of the Solactive Global Silver Miners Total Return Index. This index is designed to measure the broad-based
    equity market performance of global companies primarily involved in the silver mining industry, including related activities
    like exploration and refining. The fund invests at least 80% of its total assets in the securities of this underlying
    index and related American and Global Depositary Receipts. The index is market-cap-weighted and typically comprises 20-40
    stocks, while the fund itself is considered non-diversified.
  - The Invesco S&P 500 Equal Weight Energy ETF (RSPG) is a large-cap sector fund tracking an equal-weighted index comprising
    U.S. energy companies within the S&P 500 Index, classified according to the Global Industry Classification Standard (GICS).
    The ETF aims to invest at least 90% of its total assets in securities from this underlying index, which applies an equal-weighting
    methodology and rebalances quarterly. The index also includes a rule to ensure a minimum of 22 constituents, incorporating
    the largest energy companies from the S&P MidCap 400 Index if necessary to meet this count.
- source_sentence: The VictoryShares Top Veteran Employers ETF (VTRN) was designed to track the Veterans Select Index, focusing
    on US-listed companies of any market capitalization that demonstrated support for US military veterans, service members,
    and their families primarily through employment opportunities and related policies. These companies were identified based
    on various sources like rankings and surveys and were typically weighted equally in the index. However, this fund is liquidating,
    and its last day of trading was October 11, 2021.
  sentences:
  - The Invesco S&P 500 Equal Weight Industrials ETF (RSPN) tracks an equal-weighted index of U.S. industrial stocks drawn
    from the S&P 500 Index, specifically focusing on companies classified within the industrials sector according to the Global
    Industry Classification Standard (GICS). The fund generally invests at least 90% of its assets in these securities. This
    equal-weighting scheme offers a non-traditional approach compared to market-cap weighting, reducing the dominance of large-cap
    industrial conglomerates and lowering the portfolio's weighted average market capitalization. The underlying index is
    rebalanced on a quarterly basis.
  - The SP Funds Dow Jones Global Sukuk ETF (SPSK) is a passively managed fund designed to track the performance, before fees
    and expenses, of the Dow Jones Sukuk Total Return (ex-Reinvestment) Index. This index focuses on U.S. dollar-denominated,
    investment-grade sukuk, which are financial certificates similar to bonds, issued in global markets and structured to
    comply with Islamic religious law (Sharia) and its investment principles. Sharia compliance involves screening securities
    to exclude businesses such as tobacco, pornography, gambling, and interest-based finance, and issuers may include international
    financial institutions and foreign governments or agencies, including from emerging markets. Under normal circumstances,
    the fund attempts to invest substantially all (at least 80%) of its assets in the index's component securities, which
    are reconstituted and rebalanced monthly. The ETF is considered non-diversified.
  - The ALUM ETF, part of the USCF ETF Trust, is an actively managed fund utilizing a proprietary methodology to seek exposure
    to the price of aluminum through aluminum-based derivative investments. It primarily invests in aluminum futures but may
    also use cash-settled options, forward contracts, options on futures, and other options traded on US and non-US exchanges.
    The fund operates through a wholly owned Cayman Islands subsidiary to avoid issuing K-1 forms and may hold cash, cash
    equivalents, or investment grade fixed-income securities as collateral. This non-diversified fund is currently being delisted,
    with its last day of trading on an exchange scheduled for October 11, 2024.
- source_sentence: 'The Sprott Gold Miners ETF (SGDM) seeks to track the performance of the Solactive Gold Miners Custom Factors
    Total Return Index. This index focuses on gold mining companies based in the U.S. and Canada whose shares trade on the
    Toronto Stock Exchange, New York Stock Exchange, or NASDAQ. The index employs a weighting methodology that begins with
    market capitalization and then adjusts based on three fundamental factors: higher revenue growth, lower debt-to-equity,
    and higher free cash flow yield. The fund is non-diversified and normally invests at least 90% of its net assets in securities
    included in this index.'
  sentences:
  - 'The Sprott Gold Miners ETF (SGDM) seeks to track the performance of the Solactive Gold Miners Custom Factors Total Return
    Index. This index focuses on gold mining companies based in the U.S. and Canada whose shares trade on the Toronto Stock
    Exchange, New York Stock Exchange, or NASDAQ. The index employs a weighting methodology that begins with market capitalization
    and then adjusts based on three fundamental factors: higher revenue growth, lower debt-to-equity, and higher free cash
    flow yield. The fund is non-diversified and normally invests at least 90% of its net assets in securities included in
    this index.'
  - The VanEck Biotech ETF (BBH) seeks to replicate the performance of the MVIS® US Listed Biotech 25 Index, which provides
    exposure to approximately 25 of the largest or leading U.S.-listed companies in the biotechnology industry. The fund normally
    invests at least 80% of its assets in securities comprising this market-cap-weighted index. The underlying index includes
    common stocks and depositary receipts of firms involved in the research, development, production, marketing, and sale
    of drugs based on genetic analysis and diagnostic equipment. While focusing on U.S.-listed companies, it may include foreign
    firms listed domestically, and medium-capitalization companies can be included. Reflecting the index's concentration,
    the fund is non-diversified and may have a top-heavy portfolio. The index is reviewed semi-annually.
  - The KraneShares Global Carbon Offset Strategy ETF (KSET) was the first US-listed ETF providing exposure to the global
    voluntary carbon market. It achieved this by investing primarily in liquid carbon offset credit futures, including CME-traded
    Global Emissions Offsets (GEOs) and Nature-Based Global Emission Offsets (N-GEOs), which are designed to help businesses
    meet greenhouse gas reduction goals. Tracking an index that weighted eligible futures based on liquidity, the fund sought
    exposure to the same carbon offset credit futures, typically those maturing within two years. The ETF was considered non-diversified
    and utilized a Cayman Island subsidiary. However, the fund was delisted, with its last day of trading on an exchange being
    March 14, 2024.
