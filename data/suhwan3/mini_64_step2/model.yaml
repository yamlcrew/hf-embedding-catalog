- source_sentence: ARKX, the ARK Space Exploration & Innovation ETF, is an actively-managed fund focused on long-term capital
    growth by investing at least 80% of its assets in domestic and foreign equity securities of companies engaged in space
    exploration and innovation. The fund targets global companies that lead, enable, or benefit from technologically advanced
    products and services beyond Earth's surface. It includes sectors like orbital and suborbital aerospace, enabling technologies,
    and industries benefiting from aerospace activities, such as agriculture, GPS, and imaging. ARKX typically holds a concentrated
    portfolio of 40 to 55 securities, selected through a proprietary methodology that integrates top-down economic analysis,
    bottom-up fundamental and quantitative metrics, and ESG considerations. As a non-diversified ETF, it offers a unique investment
    opportunity in the burgeoning space exploration industry.
  sentences:
  - Northwest Pipe Company, together with its subsidiaries, manufactures and supplies water related infrastructure products
    in North America. It operates in two segments, Engineered Steel Pressure Pipe (SPP) and Precast Infrastructure and Engineered
    Systems (Precast). The SPP segment offers large-diameter, high-pressure steel pipeline systems for use in water infrastructure
    applications, which are primarily related to drinking water systems. Its products are also used for hydroelectric power
    systems, wastewater systems, and other applications. In addition, this segment makes products for industrial plant piping
    systems and certain structural applications. The Precast segment provides precast and reinforced concrete products, including
    manholes, box culverts, vaults, catch basins, oil water separators, pump lift stations, biofiltration, and other environmental
    and engineered solutions. The company sells its water infrastructure products primarily to installation contractors. Northwest
    Pipe Company was incorporated in 1966 and is headquartered in Vancouver, Washington.
  - Texas Instruments Incorporated designs, manufactures, and sells semiconductors to electronics designers and manufacturers
    worldwide. It operates in two segments, Analog and Embedded Processing. The Analog segment offers power products to manage
    power requirements in various levels using battery-management solutions, DC/DC switching regulators, AC/DC and isolated
    controllers and converters, power switches, linear regulators, voltage supervisors, voltage references, and lighting products.
    This segment also provides signal chain products that sense, condition, and measure signals to allow information to be
    transferred or converted for further processing and control for use in end markets, including amplifiers, data converters,
    interface products, motor drives, clocks, and sensing products. The Embedded Processing segment offers microcontrollers
    that are used in electronic equipment; digital signal processors for mathematical computations; and applications processors
    for specific computing activity. This segment offers products for use in various markets, such as industrial, automotive,
    personal electronics, communications equipment, enterprise systems, and calculators and other. The company also provides
    DLP products primarily for use in projectors to create high-definition images; calculators; and application-specific integrated
    circuits. It markets and sells its semiconductor products through direct sales and distributors, as well as through its
    website. Texas Instruments Incorporated was founded in 1930 and is headquartered in Dallas, Texas.
  - Rocket Lab USA, Inc., a space company, provides launch services and space systems solutions for the space and defense
    industries. The company provides launch services, spacecraft engineering and design services, spacecraft components, spacecraft
    manufacturing, and other spacecraft and on-orbit management solutions; and constellation management services, as well
    as designs and manufactures small and medium-class rockets. It also designs, manufactures, and sells Electron small orbital
    launch vehicles and the Photon satellite platforms, as well as developing the Neutron 8-ton payload class launch vehicle;
    conducts remote launch activities; and designs and manufactures a range of components and subsystems for the Photon family
    of spacecraft and broader merchant spacecraft components. The company serves commercial, aerospace prime contractors,
    and government customers. The company was founded in 2006 and is headquartered in Long Beach, California.
- source_sentence: ARKQ, the ARK Autonomous Technology & Robotics ETF, is an actively managed fund focused on long-term capital
    growth by investing at least 80% of its assets in domestic and foreign equity securities of companies involved in autonomous
    technology and robotics. Emphasizing disruptive innovation, the fund targets firms benefiting from advancements in automation,
    energy, and artificial intelligence. ARKQ employs its own internal research to identify transformative businesses, making
    pure-play portfolio implementation challenging. As a non-diversified fund, it concentrates its investments in specific
    sectors, aiming to capitalize on technological advancements that drive market development.
  sentences:
  - 'Magna International Inc. designs, engineers, and manufactures components, assemblies, systems, subsystems, and modules
    for original equipment manufacturers of vehicles and light trucks worldwide. It operates through four segments: Body Exteriors
    & Structures, Power & Vision, Seating Systems, and Complete Vehicles. The Body Exteriors & Structures segment provides
    body and chassis, exterior, and roof systems, as well as battery enclosures and engineering and testing services, including
    fascia and trims, front end modules, front integration panels, liftgate modules, active aerodynamics, engineered glass,
    running boards, truck bed access products, and side doors. The Power & Vision segment offers hybrid and electric drive
    systems, motors, inverters, onboard chargers, and e-clutch; dedicated hybrid, dual and hybrid dual, and manual transmissions;
    AWD/4WD products and rear drive modules; transmission, engine, driveline components, engine drive plates, and accessories;
    engineering services; advanced driver assistance systems and sensors, and electronic control units; interior and exterior
    mirrors, camera and driver monitoring systems and electronics, actuators, door handles, and overhead consoles; forward,
    rear, and auxiliary lighting products; latching, door modules, window, power closure, and hinges and wire forming systems;
    and modular and textile folding roofs, and hard and soft tops. The Seating Systems segment provides seat structures, mechanism
    and hardware solutions, and foam and trim products. The Complete Vehicles segment offers vehicle engineering and manufacturing
    services. The company also designs, engineers, and manufactures tooling products. Magna International Inc. was founded
    in 1957 and is headquartered in Aurora, Canada.'
  - Sony Group Corporation designs, develops, produces, and sells electronic equipment, instruments, and devices for the consumer,
    professional, and industrial markets in Japan, the United States, Europe, China, the Asia-Pacific, and internationally.
    The company distributes software titles and add-on content through digital networks; network services related to game,
    video, and music content; and home and portable game consoles, packaged software, and peripheral devices. It also develops,
    produces, markets, and distributes recorded music; publishes music; and produces and distributes animation titles, game
    applications, and various services for music and visual products. In addition, the company produces, acquires, and distributes
    live-action and animated motion pictures for theatrical release, as well as scripted and animated series, unscripted reality
    or light entertainment, daytime serials, game shows, television movies, and miniseries and other television programs;
    operates a visual effects and animation unit; manages a studio facility; and operates television and digital networks,
    and post-production facilities. Further, it researches, develops, designs, produces, markets, distributes, sells, and
    services televisions, and video and sound products; interchangeable lens, compact digital, and consumer and professional
    video cameras; projectors and medical equipment; mobile phones, tablets, accessories, and applications; and metal oxide
    semiconductor image sensors, charge-coupled devices, integration systems, and other semiconductors. Additionally, it offers
    Internet broadband network services; recording media, and storage media products; and life and non-life insurance, banking,
    and other services, as well as creates and distributes content for PCs and mobile phones. The company was formerly known
    as Sony Corporation and changed its name to Sony Group Corporation in April 2021. Sony Group Corporation was incorporated
    in 1946 and is headquartered in Tokyo, Japan.
  - Dada Nexus Limited operates a platform of local on-demand retail and delivery in the People's Republic of China. It operates
    Dada Now, a local on-demand delivery platform that provides intra-city delivery and last-mile delivery services on an
    on-demand basis to chain merchants, small- and medium-sized enterprise merchants, and individual senders; and JDDJ, a
    local on-demand retail platform for consumers, retailers, and brand owner. The company was incorporated in 2014 and is
    headquartered in Shanghai, the People's Republic of China.
- source_sentence: ProShares Ultra Financials (UYG) is an ETF that seeks to deliver twice the daily performance of the S&P
    Financial Select Sector Index, which is a market cap-weighted index of financial companies within the S&P 500. This index
    includes industries such as banks, financial services, consumer finance, capital markets, mortgage REITs, and insurance,
    with constituents rebalanced quarterly. UYG is designed for short-term trading, utilizing swap agreements and resetting
    daily, which can lead to significant differences in long-term returns due to daily compounding. The fund is non-diversified
    and not intended for long-term investment. Prior to March 20, 2023, it tracked the Dow Jones US Financials Index.
  sentences:
  - 'Huntington Bancshares Incorporated operates as the bank holding company for The Huntington National Bank that provides
    commercial, consumer, and mortgage banking services in the United States. The company operates through four segments:
    Consumer and Business Banking; Commercial Banking; Vehicle Finance; and Regional Banking and The Huntington Private Client
    Group (RBHPCG). The Consumer and Business Banking segment offers financial products and services, such as checking accounts,
    savings accounts, money market accounts, certificates of deposit, credit cards, and consumer and small business loans,
    as well as investment products. This segment also provides mortgages, insurance, interest rate risk protection, foreign
    exchange, automated teller machine, and treasury management services, as well as online, mobile, and telephone banking
    services. It serves consumer and small business customers. The Commercial Banking segment offers regional commercial banking
    solutions for middle market businesses, government and public sector entities, and commercial real estate developers/REITs;
    and specialty banking solutions for healthcare, technology and telecommunications, franchise finance, sponsor finance,
    and global services industries. It also provides asset finance services; capital raising solutions, sales and trading,
    and corporate risk management products; institutional banking services; and treasury management services. The Vehicle
    Finance segment provides financing to consumers for the purchase of automobiles, light-duty trucks, recreational vehicles,
    and marine craft at franchised and other select dealerships, as well as to franchised dealerships for the acquisition
    of new and used inventory. The RBHPCG segment offers private banking, wealth and investment management, and retirement
    plan services. As of March 18, 2022, the company had approximately 1,000 branches in 11 states. Huntington Bancshares
    Incorporated was founded in 1866 and is headquartered in Columbus, Ohio.'
  - 'DXP Enterprises, Inc., together with its subsidiaries, engages in distributing maintenance, repair, and operating (MRO)
    products, equipment, and services to the energy and industrial customers primarily in the United States and Canada. It
    operates through three segments: Service Centers (SC), Supply Chain Services (SCS), and Innovative Pumping Solutions (IPS).
    The SC segment offers MRO products, equipment, and integrated services, including technical expertise and logistics services.
    It offers a range of MRO products in the rotating equipment, bearing, power transmission, hose, fluid power, metal working,
    fastener, industrial supply, safety products, and safety services categories. This segment serves customers in the oil
    and gas, food and beverage, petrochemical, transportation, other general industrial, mining, construction, chemical, municipal,
    agriculture, and pulp and paper industries. The SCS segment manages procurement and inventory management solutions; and
    offers outsourced MRO solutions for sourcing MRO products, including inventory optimization and management, store room
    management, transaction consolidation and control, vendor oversight and procurement cost optimization, productivity improvement,
    and customized reporting services. Its programs include SmartAgreement, a procurement solution for various MRO categories;
    SmartBuy, an on-site or centralized MRO procurement solution; SmartSource, an on-site procurement and storeroom management
    solution; SmartStore, an e-Catalog solution; SmartVend, an industrial dispensing solution; and SmartServ, an integrated
    service pump solution. The IPS segment fabricates and assembles custom-made pump packages, remanufactures pumps, and manufactures
    branded private label pumps. The company was founded in 1908 and is based in Houston, Texas.'
  - National Bank Holdings Corporation operates as the bank holding company for NBH Bank that provides various banking products
    and financial services to commercial, business, and consumer clients in the United States. It offers deposit products,
    including checking, savings, money market, and other deposit accounts, including fixed-rate and fixed maturity time deposits.
    The company also provides commercial and industrial loans and leases, such as working capital loans, equipment loans,
    lender finance loans, food and agriculture loans, government and non-profit loans, owner occupied commercial real estate
    loans, and other commercial loans and leases; non-owner occupied commercial real estate loans consisting of loans on commercial
    properties, such as office buildings, warehouse/distribution buildings, multi-family, hospitality, and retail buildings;
    small business administration loans to support manufacturers, distributors, and service providers; term loans, line of
    credits, and real estate secured loans; residential real estate loans; and consumer loans. In addition, it offers treasury
    management solutions comprising online and mobile banking, commercial credit card, wire transfer, automated clearing house,
    electronic bill payment, lock box, remote deposit capture, merchant processing, cash vault, controlled disbursements,
    and fraud prevention services, as well as other auxiliary services, including account reconciliation, collections, repurchase
    accounts, zero balance accounts, and sweep accounts. As of January 20, 2022, the company operated through a network of
    81 banking centers located in Colorado, the greater Kansas City region, New Mexico, Utah, and Texas. It also operates
    121 ATMs. The company was formerly known as NBH Holdings Corp. and changed its name to National Bank Holdings Corporation
    in March 2012. National Bank Holdings Corporation was incorporated in 2009 and is headquartered in Greenwood Village,
    Colorado.
- source_sentence: Fidelity Real Estate Investment (FPRO) is an actively managed, non-transparent ETF that seeks above-average
    income and long-term capital growth by investing at least 80% of its assets in securities of companies primarily engaged
    in the real estate industry, including both domestic and foreign issuers. Operating under an exemptive order from the
    SEC, FPRO is not required to disclose its complete portfolio holdings daily. Instead, it utilizes the Fidelity non-transparent
    model, publishing a Tracking Basket and Tracking Basket Weight Overlap daily to approximate the fund's performance without
    revealing its actual holdings, which are disclosed monthly with a 30-day lag. The fund employs fundamental analysis to
    select securities, focusing on financial condition, industry position, and broader market and economic conditions, and
    is non-diversified.
  sentences:
  - Keyence Corporation, together with its subsidiaries, develops, manufactures, and sells factory automation solutions worldwide.
    The company offers photoelectric, fiber optic, laser, positioning, vision, and inductive proximity sensors, as well as
    network communication units used for presence/absence and part differentiation applications. It also provides measurement
    sensors, such as laser displacement and profiler, optical/laser micrometer, 3D interference measurement, spectral interference
    displacement, and contact displacement/LVDT sensors; and measurement systems, including optical comparators, 3D scanners,
    and CMM/laser trackers. In addition, the company offers safety products comprising safety laser scanners, light curtains,
    interlock switches, and controllers to protect operators from machine hazards; and pressure, flow, level, and temperature
    sensors for monitoring equipment processes. Further, it provides static eliminators/ionizers and electrostatic sensors
    which protect workers, machinery, and products from the damaging effects of electrostatic charge; vision systems and sensors,
    and barcode scanners to perform automatic inspection and part identification; and programmable logic controllers and other
    controls that are used for machine control applications. Additionally, the company offers laser marking systems/laser
    markers and industrial continuous inkjet printers; digital, 3D laser scanning, and fluorescence microscopes, as well as
    wide-area 3D measuring systems for industrial and life science applications; and handheld mobile computers. It serves
    customers in automotive/chassis assembly, metals/machining, FPD/glass, semiconductor/ICS, plastic/molding, food/pharmaceutical,
    steel, and other industries. Keyence Corporation was founded in 1972 and is headquartered in Osaka, Japan.
  - 'EastGroup Properties, Inc. (NYSE: EGP), an S&P MidCap 400 company, is a self-administered equity real estate investment
    trust focused on the development, acquisition and operation of industrial properties in major Sunbelt markets throughout
    the United States with an emphasis in the states of Florida, Texas, Arizona, California and North Carolina. The Company''s
    goal is to maximize shareholder value by being a leading provider in its markets of functional, flexible and quality business
    distribution space for location sensitive customers (primarily in the 15,000 to 70,000 square foot range). The Company''s
    strategy for growth is based on ownership of premier distribution facilities generally clustered near major transportation
    features in supply-constrained submarkets. EastGroup''s portfolio, including development projects and value-add acquisitions
    in lease-up and under construction, currently includes approximately 45.8 million square feet.'
  - National Retail Properties invests primarily in high-quality retail properties subject generally to long-term, net leases.
    As of September 30, 2020, the company owned 3,114 properties in 48 states with a gross leasable area of approximately
    32.4 million square feet and with a weighted average remaining lease term of 10.7 years.
