      banking services. It serves consumer and small business customers. The Commercial Banking segment offers regional commercial
      banking solutions for middle market businesses, government and public sector entities, and commercial real estate developers/REITs;
      and specialty banking solutions for healthcare, technology and telecommunications, franchise finance, sponsor finance,
      and global services industries. It also provides asset finance services; capital raising solutions, sales and trading,
      and corporate risk management products; institutional banking services; and treasury management services. The Vehicle
      Finance segment provides financing to consumers for the purchase of automobiles, light-duty trucks, recreational vehicles,
      and marine craft at franchised and other select dealerships, as well as to franchised dealerships for the acquisition
      of new and used inventory. The RBHPCG segment offers private banking, wealth and investment management, and retirement
      plan services. As of March 18, 2022, the company had approximately 1,000 branches in 11 states. Huntington Bancshares
      Incorporated was founded in 1866 and is headquartered in Columbus, Ohio.'
    - 'DXP Enterprises, Inc., together with its subsidiaries, engages in distributing maintenance, repair, and operating (MRO)
      products, equipment, and services to the energy and industrial customers primarily in the United States and Canada.
      It operates through three segments: Service Centers (SC), Supply Chain Services (SCS), and Innovative Pumping Solutions
      (IPS). The SC segment offers MRO products, equipment, and integrated services, including technical expertise and logistics
      services. It offers a range of MRO products in the rotating equipment, bearing, power transmission, hose, fluid power,
      metal working, fastener, industrial supply, safety products, and safety services categories. This segment serves customers
      in the oil and gas, food and beverage, petrochemical, transportation, other general industrial, mining, construction,
      chemical, municipal, agriculture, and pulp and paper industries. The SCS segment manages procurement and inventory management
      solutions; and offers outsourced MRO solutions for sourcing MRO products, including inventory optimization and management,
      store room management, transaction consolidation and control, vendor oversight and procurement cost optimization, productivity
      improvement, and customized reporting services. Its programs include SmartAgreement, a procurement solution for various
      MRO categories; SmartBuy, an on-site or centralized MRO procurement solution; SmartSource, an on-site procurement and
      storeroom management solution; SmartStore, an e-Catalog solution; SmartVend, an industrial dispensing solution; and
      SmartServ, an integrated service pump solution. The IPS segment fabricates and assembles custom-made pump packages,
      remanufactures pumps, and manufactures branded private label pumps. The company was founded in 1908 and is based in
      Houston, Texas.'
    - National Bank Holdings Corporation operates as the bank holding company for NBH Bank that provides various banking products
      and financial services to commercial, business, and consumer clients in the United States. It offers deposit products,
      including checking, savings, money market, and other deposit accounts, including fixed-rate and fixed maturity time
      deposits. The company also provides commercial and industrial loans and leases, such as working capital loans, equipment
      loans, lender finance loans, food and agriculture loans, government and non-profit loans, owner occupied commercial
      real estate loans, and other commercial loans and leases; non-owner occupied commercial real estate loans consisting
      of loans on commercial properties, such as office buildings, warehouse/distribution buildings, multi-family, hospitality,
      and retail buildings; small business administration loans to support manufacturers, distributors, and service providers;
      term loans, line of credits, and real estate secured loans; residential real estate loans; and consumer loans. In addition,
      it offers treasury management solutions comprising online and mobile banking, commercial credit card, wire transfer,
      automated clearing house, electronic bill payment, lock box, remote deposit capture, merchant processing, cash vault,
      controlled disbursements, and fraud prevention services, as well as other auxiliary services, including account reconciliation,
      collections, repurchase accounts, zero balance accounts, and sweep accounts. As of January 20, 2022, the company operated
      through a network of 81 banking centers located in Colorado, the greater Kansas City region, New Mexico, Utah, and Texas.
      It also operates 121 ATMs. The company was formerly known as NBH Holdings Corp. and changed its name to National Bank
      Holdings Corporation in March 2012. National Bank Holdings Corporation was incorporated in 2009 and is headquartered
      in Greenwood Village, Colorado.
  - source_sentence: Fidelity Real Estate Investment (FPRO) is an actively managed, non-transparent ETF that seeks above-average
      income and long-term capital growth by investing at least 80% of its assets in securities of companies primarily engaged
      in the real estate industry, including both domestic and foreign issuers. Operating under an exemptive order from the
      SEC, FPRO is not required to disclose its complete portfolio holdings daily. Instead, it utilizes the Fidelity non-transparent
      model, publishing a Tracking Basket and Tracking Basket Weight Overlap daily to approximate the fund's performance without
      revealing its actual holdings, which are disclosed monthly with a 30-day lag. The fund employs fundamental analysis
      to select securities, focusing on financial condition, industry position, and broader market and economic conditions,
      and is non-diversified.
