  sentences:
  - Mapletree Commercial Trust is a Singapore-focused real estate investment trust (REIT) that invests on a long-term basis,
    directly or indirectly, in a diversified portfolio of income-producing real estate used primarily for office and/or retail
    purposes, whether wholly or partially, in Singapore, as well as real estate related assets. MCT's portfolio comprises
    VivoCity, MBC, PSA Building, Mapletree Anson and MLHF. These five assets have a total NLA of 5.0 million square feet with
    a total value of S$8.7 billion.
  - FCPT, headquartered in Mill Valley, CA, is a real estate investment trust primarily engaged in the acquisition and leasing
    of restaurant properties. The Company seeks to grow its portfolio by acquiring additional real estate to lease, on a net
    basis, for use in the restaurant and retail industries.
  - Alamo Group Inc. designs, manufactures, distributes, and services vegetation management and infrastructure maintenance
    equipment for governmental, industrial, and agricultural uses worldwide. Its Vegetation Management Division segment offers
    hydraulically-powered and tractor-mounted mowers, other cutters and replacement parts for heavy-duty and intensive uses
    and heavy duty applications, tractor- and truck-mounted mowing and vegetation maintenance equipment, and replacement parts.
    This segment also provides rotary and finishing mowers, flail and disc mowers, front-end loaders, backhoes, rotary tillers,
    posthole diggers, scraper blades and replacement parts, zero turn radius mowers, cutting parts, plain and hard-faced replacement
    tillage tools, disc blades, and fertilizer application components; aftermarket agricultural parts, heavy-duty mechanical
    rotary mowers, snow blowers, rock removal equipment, replacement parts, tractor attachments, agricultural implements,
    hydraulic and boom-mounted hedge and grass cutters, tractor attachments and implements, hedgerow cutters, industrial grass
    mowers, agricultural seedbed preparation cultivators, self-propelled sprayers and multi-drive load-carrying vehicles,
    cutting blades, and hydraulic and mechanical boom mowers. The company's Industrial Equipment Division segment offers truck-mounted
    air vacuum, mechanical broom, and regenerative air sweepers, pothole patchers, leaf collection equipment and replacement
    brooms, parking lot and street sweepers, excavators, catch basin cleaners, and roadway debris vacuum systems, as well
    as truck-mounted vacuum machines, combination sewer cleaners, and hydro excavators. This segment also offers ice control
    products, snowplows and heavy duty snow removal equipment, hitches, attachments, and graders; and public works and runway
    maintenance products, parts, and services, and high pressure cleaning systems and trenchers. The company was founded in
    1955 and is headquartered in Seguin, Texas.
