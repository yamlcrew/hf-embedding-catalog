      charge; vision systems and sensors, and barcode scanners to perform automatic inspection and part identification; and
      programmable logic controllers and other controls that are used for machine control applications. Additionally, the
      company offers laser marking systems/laser markers and industrial continuous inkjet printers; digital, 3D laser scanning,
      and fluorescence microscopes, as well as wide-area 3D measuring systems for industrial and life science applications;
      and handheld mobile computers. It serves customers in automotive/chassis assembly, metals/machining, FPD/glass, semiconductor/ICS,
      plastic/molding, food/pharmaceutical, steel, and other industries. Keyence Corporation was founded in 1972 and is headquartered
      in Osaka, Japan.
