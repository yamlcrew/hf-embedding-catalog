widgetData:
- source_sentence: The Invesco Global Clean Energy ETF (PBD) aims to track the WilderHill New Energy Global Innovation Index,
    investing at least 90% of its assets in securities within the index, including ADRs and GDRs. The index primarily consists
    of companies focused on cleaner energy technologies, conservation, efficiency, and renewable energy advancement. PBD is
    passively managed but resembles an active strategy by selecting companies with high capital appreciation potential, emphasizing
    pure-play small- and mid-cap firms. The fund is globally diversified, with half its assets invested internationally, and
    caps its largest holdings at 5%. The index is rebalanced and reconstituted quarterly, ensuring a dynamic and diversified
    portfolio.
  sentences:
  - Royal Gold, Inc., together with its subsidiaries, acquires and manages precious metal streams, royalties, and related
    interests. It focuses on acquiring stream and royalty interests or to finance projects that are in production or in development
    stage in exchange for stream or royalty interests, which primarily consists of gold, silver, copper, nickel, zinc, lead,
    and cobalt. As of June 30, 2022, the Company owned interests in 185 properties on five continents, including interests
    on 41 producing mines and 19 development stage projects. Its stream and royalty interests on properties are located in
    the United States, Canada, Chile, the Dominican Republic, Australia, Africa, Mexico, and internationally. Royal Gold,
    Inc. was incorporated in 1981 and is headquartered in Denver, Colorado.
  - 'NIBE Industrier AB (publ), together with its subsidiaries, develops, manufactures, markets, and sells various energy-efficient
    solutions for indoor climate comfort, and components and solutions for intelligent heating and control in Nordic countries,
    rest of Europe, North America, and internationally. The company operates through three business areas: NIBE Climate Solutions,
    NIBE Element, and NIBE Stoves. The NIBE Climate Solutions business area offers indoor climate comfort products, such as
    heat pumps, ventilation products and air conditioning, climate control systems, water heaters and accumulator tanks, district
    heating products, PV panels, domestic boilers, commercial washing machines, and tumble dryers for homes, apartment blocks,
    and commercial properties. The NIBE Element business area provides various components and solutions for heating and control,
    which include tubular, aluminum, foil, thick film, PTC, high-power, and ceramic elements, as well as open spirals and
    tapes, heating cables and jackets, vacuum brazing, heat pump technology, resistors, heat exchangers, temperature sensors,
    flexible hoses, and control equipment to domestic and household appliances; commercial products and professional kitchens;
    energy; transport; advanced technology; medicine; and aviation sectors, as well as industrial projects sectors. The NIBE
    Stoves business area offers free-standing, wood-burning, gas, and electric stoves; heat-retaining products; and chimney
    systems, as well as accessories. NIBE Industrier AB (publ) was founded in 1949 and is headquartered in Markaryd, Sweden.'
  - Ligand Pharmaceuticals Incorporated, a biopharmaceutical company, focuses on developing or acquiring technologies that
    help pharmaceutical companies to discover and develop medicines worldwide. Its commercial programs include Kyprolis and
    Evomela, which are used to treat multiple myeloma; Veklury for the treatment of moderate or severe COVID-19; Teriparatide
    injection product for osteoporosis; Vaxneuvance for the prevention of invasive disease caused by Streptococcus pneumoniae;
    and Pneumosil, a pneumococcal conjugate vaccine to help fight against pneumococcal pneumonia among children. The company
    also offers Rylaze, a recombinant erwinia asparaginase for the treatment of acute lymphoblastic leukemia or lymphoblastic
    lymphoma in adult and pediatric patients; and Nexterone, a captisol-enabled formulation of amiodarone; and Zulresso, a
    captisol-enabled formulation of brexanolone for the treatment of postpartum depression. In addition, it provides Noxafil-IV,
    a captisol-enabled formulation of posaconazole for IV use; Duavee for the treatment of postmenopausal osteoporosis; Aziyo
    portfolio of commercial pericardial repair and CanGaroo envelope extracellular matrix products; Exemptia for autoimmune
    diseases; Vivitra for breast cancer; Bryxta and Zybev for various indications; and Minnebro for the treatment of hypertension.
    The company's partners and licenses programs, which are in clinical development used for the treatment of cancer, seizure,
    diabetes, cardiovascular disease, muscle wasting, liver and kidney disease, and other diseases. Further, it sells Captisol
    materials. The company was incorporated in 1987 and is headquartered in Emeryville, California.
- source_sentence: The Siren Nasdaq NexGen Economy ETF (BLCN) seeks long-term growth by tracking the investment returns of
    the Nasdaq Blockchain Economy Index, focusing on global companies involved in blockchain technology. At least 80% of the
    fund's assets are invested in index components, which include 50-100 companies that score highest based on their commitment
    to blockchain development, as measured by the BlockChain Score. The index, reconstituted and rebalanced semi-annually,
    gives greater weight to higher-scoring companies, providing exposure across multiple sectors due to blockchain's diverse
    applications. BLCN, one of the first ETFs to focus on blockchain, was acquired by SRN Advisors and previously known as
    Reality Shares Nasdaq NexGen Economy ETF.
  sentences:
  - Digital Garage, Inc. operates as a context company in Japan and internationally. The company operates through Financial
    Technology, Marketing Technology, Incubation Technology, and Long-term Incubation segments. The Financial Technology segment
    provides payment platforms, including credit card payment, convenience store payment, and QR code payment systems. The
    Marketing Technology segment provides marketing solutions that integrate digital and real solutions. The Incubation Technology
    segment invests in early-stage startups company. The Long-term Incubation segment provides medium to long term cash inflows.
    Digital Garage, Inc. was incorporated in 1995 and is headquartered in Tokyo, Japan.
  - Quanta Services, Inc. provides specialty contracting services worldwide. The Electric Power Infrastructure Solutions segment
    engages in the design, procurement, construction, upgrade, repair, and maintenance of electric power transmission and
    distribution infrastructure and substation facilities; energized installation, maintenance, and upgrade of electric power
    infrastructure projects; installation of smart grid technologies on electric power networks; and design, installation,
    maintenance, and repair of commercial and industrial wirings. This segment also offers aviation services; emergency restoration
    services; and other engineering and technical services; design and construction solutions to wireline and wireless communications,
    cable multi-system operators, and other customers; and training for electric workers, as well as training for the gas
    distribution and communications industries. The Renewable Energy Infrastructure Solutions segment is the involved in engineering,
    procurement, construction, upgrade, repair, and maintenance services to renewable generation facilities, such as wind,
    solar, and hydropower generation facilities, as well as battery storage facilities; and provision of engineering and construction
    services for substations and switchyards, transmission, and other electrical infrastructures. The Underground Utility
    and Infrastructure Solutions segment offers design, engineering, construction, upgrade repair, and maintenance services
    to customers involved in the transportation, distribution, storage and processing of natural gas, oil, and other products;
    fabrication of pipeline support systems and related structures and facilities; and engineering and construction of pipeline
    and storage systems, and compressor and pump stations. The company was formerly known as Fabal Construction, Inc. and
    changed its name to Quanta Services, Inc. in November 1997. Quanta Services, Inc. was incorporated in 1997 and is headquartered
    in Houston, Texas.
  - Chipotle Mexican Grill, Inc., together with its subsidiaries, owns and operates Chipotle Mexican Grill restaurants. As
    of February 15, 2022, it owned and operated approximately 3,000 restaurants in the United States, Canada, the United Kingdom,
    France, Germany, and rest of Europe. The company was founded in 1993 and is headquartered in Newport Beach, California.
- source_sentence: 'The iShares U.S. Tech Breakthrough ETF (TECB) seeks to track the investment results of the NYSE® FactSet®
    U.S. Tech Breakthrough IndexTM, focusing on U.S.-listed companies engaged in cutting-edge research and development across
    five thematic segments: robotics and artificial intelligence, cyber security, cloud and data tech, financial technology,
    and genomics and immunology. The ETF invests at least 80% of its assets in the index''s component securities or similar
    investments. TECB employs a modified market cap weighting, with a minimum segment weight of 10% and a maximum individual
    security weight of 4%. The index is reconstituted annually and rebalanced semiannually, using automated semantic search
    algorithms to identify supply chain relationships, particularly in the Genomics and Immuno Biopharmaceutical segment,
    ensuring a dynamic and innovative portfolio.'
  sentences:
  - Ironwood Pharmaceuticals, Inc., a healthcare company, focuses on the development and commercialization of gastrointestinal
    (GI) products. It markets linaclotide, a guanylate cyclase type-C agonist for the treatment of adults suffering from irritable
    bowel syndrome with constipation (IBS-C) or chronic idiopathic constipation (CIC) under the LINZESS name in the United
    States and Mexico, as well as under the CONSTELLA name in the Canada and European Union. The company is also developing
    IW-3300, a GC-C agonist for the treatment of visceral pain conditions, including interstitial cystitis/bladder pain syndrome
    and endometriosis; and CNP-104, an immune nanoparticle for the treatment of biliary cholangitis. The company has strategic
    partnerships with AbbVie Inc., AstraZeneca AB, and Astellas Pharma Inc. for the development and commercialization of linaclotide.
    The company was formerly known as Microbia, Inc. and changed its name to Ironwood Pharmaceuticals, Inc. in April 2008.
    Ironwood Pharmaceuticals, Inc. was incorporated in 1998 and is headquartered in Boston, Massachusetts.
  - MongoDB, Inc. provides general purpose database platform worldwide. The company offers MongoDB Enterprise Advanced, a
    commercial database server for enterprise customers to run in the cloud, on-premise, or in a hybrid environment; MongoDB
    Atlas, a hosted multi-cloud database-as-a-service solution; and Community Server, a free-to-download version of its database,
    which includes the functionality that developers need to get started with MongoDB. It also provides professional services
    comprising consulting and training. The company was formerly known as 10gen, Inc. and changed its name to MongoDB, Inc.
    in August 2013. MongoDB, Inc. was incorporated in 2007 and is headquartered in New York, New York.
  - 'Brandywine Realty Trust (NYSE: BDN) is one of the largest, publicly traded, full-service, integrated real estate companies
    in the United States with a core focus in the Philadelphia, Austin and Washington, D.C. markets. Organized as a real estate
    investment trust (REIT), we own, develop, lease and manage an urban, town center and transit-oriented portfolio comprising
    175 properties and 24.7 million square feet as of December 31, 2020 which excludes assets held for sale. Our purpose is
    to shape, connect and inspire the world around us through our expertise, the relationships we foster, the communities
    in which we live and work, and the history we build together.'
- source_sentence: The SPDR S&P Global Infrastructure ETF (GII) aims to replicate the performance of the S&P Global Infrastructure
    Index, investing at least 80% of its assets in the index's securities and related depositary receipts. The index includes
    75 of the largest publicly listed infrastructure companies globally, selected based on specific investability criteria.
    GII focuses on firms in the energy, transportation, and utility sectors, with a portfolio composition of 30 transportation,
    30 utility, and 15 energy companies. The fund ensures diversification by capping sector weights at 40% for transportation
    and utilities, and 20% for energy, with no single security exceeding a 5% weight. Stocks are market-cap-weighted within
    each sector, and the fund undergoes significant adjustments during its semi-annual rebalancing.
  sentences:
  - "Companhia de Saneamento Básico do Estado de São Paulo \x96 SABESP provides water and sewage services to residential,\
    \ commercial, industrial, and governmental customers. It provides water supply, sanitary sewage, urban rainwater management\
    \ and drainage, urban cleaning, and solid waste management services, as well as related activities, including the planning,\
    \ operation, maintenance, and commercialization of energy. As of December 31, 2021, the company provided water services\
    \ through 9.8 million water connections to approximately 27.8 million people; sewage services through 8.4 million sewage\
    \ connections to approximately 24.6 million people; and operated 88,904 kilometers of water pipes and water transmission\
    \ lines, as well as 61,122 kilometers of sewer lines. It also offers water and/or sewage services to four other municipalities\
    \ through special purpose companies. The company was founded in 1954 and is headquartered in São Paulo, Brazil."
  - AMETEK, Inc. manufactures and sells electronic instruments and electromechanical devices worldwide. It operates in two
    segments, Electronic Instruments (EIG) and Electromechanical (EMG). The company's EIG segment offers advanced instruments
    for the process, aerospace, power, and industrial markets; process and analytical instruments for the oil and gas, petrochemical,
    pharmaceutical, semiconductor, automation, and food and beverage industries; and instruments to the laboratory equipment,
    ultra-precision manufacturing, medical, and test and measurement markets. This segment also provides power quality monitoring
    and metering devices, uninterruptible power supplies, programmable power equipment, electromagnetic compatibility test
    equipment, gas turbines, and environmental health and safety market sensors, dashboard instruments for heavy trucks and
    other vehicles, and instrumentation and controls for the food and beverage industries; and aircraft and engine sensors,
    monitoring systems, power supplies, fuel and fluid measurement systems, and data acquisition systems for the aerospace
    industry. Its EMG segment offers engineered electrical connectors and electronics packaging to protect sensitive devices
    and mission-critical electronics; precision motion control products for data storage, medical devices, business equipment,
    automation, and other applications; high-purity powdered metals, strips and foils, specialty clad metals, and metal matrix
    composites; motor-blower systems and heat exchangers for use in thermal management, military, commercial aircraft, and
    military ground vehicles; and motors for use in commercial appliances, fitness equipment, food and beverage machines,
    hydraulic pumps, and industrial blowers. This segment also operates a network of aviation maintenance, repair, and overhaul
    facilities. In addition, the company offers clinical and educational communication solutions. AMETEK, Inc. was founded
    in 1930 and is headquartered in Berwyn, Pennsylvania.
  - Apple Inc. designs, manufactures, and markets smartphones, personal computers, tablets, wearables, and accessories worldwide.
    The company offers iPhone, a line of smartphones; Mac, a line of personal computers; iPad, a line of multi-purpose tablets;
    and wearables, home, and accessories comprising AirPods, Apple TV, Apple Watch, Beats products, and HomePod. It also provides
    AppleCare support and cloud services; and operates various platforms, including the App Store that allow customers to
    discover and download applications and digital content, such as books, music, video, games, and podcasts, as well as advertising
    services include third-party licensing arrangements and its own advertising platforms. In addition, the company offers
    various subscription-based services, such as Apple Arcade, a game subscription service; Apple Fitness+, a personalized
    fitness service; Apple Music, which offers users a curated listening experience with on-demand radio stations; Apple News+,
    a subscription news and magazine service; Apple TV+, which offers exclusive original content; Apple Card, a co-branded
    credit card; and Apple Pay, a cashless payment service, as well as licenses its intellectual property. The company serves
    consumers, and small and mid-sized businesses; and the education, enterprise, and government markets. It distributes third-party
    applications for its products through the App Store. The company also sells its products through its retail and online
    stores, and direct sales force; and third-party cellular network carriers, wholesalers, retailers, and resellers. Apple
    Inc. was founded in 1976 and is headquartered in Cupertino, California.
- source_sentence: The SPDR S&P Health Care Services ETF (XHS) aims to mirror the performance of the S&P Health Care Services
    Select Industry Index by employing a sampling strategy, investing at least 80% of its assets in the index's securities.
    This index, part of the S&P Total Market Index, focuses on the U.S. health care services sector, including related industries
    like medical equipment, pharmaceuticals, and drug retailers. XHS offers unique exposure by equally weighting its holdings,
    which results in a tilt towards smaller companies and an underweighting of large managed health care firms. The index
    is rebalanced quarterly, ensuring a dynamic and diversified portfolio.
  sentences:
  - Castle Biosciences, Inc., a commercial-stage diagnostics company, focuses to provide diagnostic and prognostic testing
    services for dermatological cancers. Its lead product is DecisionDx-Melanoma, a multi-gene expression profile (GEP) test
    to identify the risk of metastasis for patients diagnosed with invasive cutaneous melanoma. The company also offers DecisionDx-UM
    test, a proprietary GEP test that predicts the risk of metastasis for patients with uveal melanoma, a rare eye cancer;
    DecisionDx-SCC, a proprietary 40-gene expression profile test that uses an individual patient's tumor biology to predict
    individual risk of squamous cell carcinoma metastasis for patients with one or more risk factors; and DecisionDx DiffDx-Melanoma
    and myPath Melanoma, a proprietary GEP test to diagnose suspicious pigmented lesions. It offers test services through
    physicians and their patients. The company was founded in 2007 and is headquartered in Friendswood, Texas.
  - HBM Healthcare Investments AG specializes in fund of funds and direct investments in middle market and mature companies.
    The fund prefers to invest in start up, early stage, mid stage, mid venture, late venture, and late stage private companies,
    unlisted emerging companies, small cap public companies, buyouts, growth capital, and private investment in public equities
    (PIPES). Within fund of funds, it invests in venture capital funds. It also seeks to finance spin-offs of product lines
    or departments from larger corporations and the expansion or restructuring of established companies, seed stages, venture
    capital, expansion capital stages, spin-offs, and buyouts. The fund prefers to invest in the private and public companies
    in the healthcare sector with a focus on human medicine, drugs, pharma , biopharma, biotechnology, diagnostics, medical
    technology, and related industries. It seeks to make initial investments in companies whose primary products are in clinical
    development or the immediately preceding stage. The fund typically invests globally with a focus on Asia Pacific, Asia,
    North America, and Europe. In case of public companies, it focuses on those which originate from its private portfolio.
    The fund increases its investment in portfolio companies by participating in a follow-on financing or after the portfolio
    company's IPO. It may acquire majority participations in portfolio companies, usually takes a seat on the portfolio company's
    Board of Directors, and largely makes equity investments but may also invest through other instruments including convertible
    bonds, debt securities, structured products, and derivatives. The fund exits its portfolio companies through trade sale
    or IPO.
  - Invesco Senior Income Trust is a closed ended fixed income mutual fund launched by Invesco Ltd. It is co-managed by Invesco
    Advisers, Inc., Invesco Asset Management Deutschland GmbH, Invesco Asset Management Limited, Invesco Asset Management
    (Japan) Limited, Invesco Australia Limited, Invesco Hong Kong Limited, Invesco Senior Secured Management, Inc., and Invesco
    Canada Ltd. The fund invests in the fixed income markets of the United States. It primarily invests in a portfolio of
    interests in floating or variable rate senior loans to corporations, partnerships, and other entities which operate in
    a variety of industries and geographical regions. The fund typically employs fundamental analysis with a bottom up stock
    picking approach to create its portfolio. It benchmarks the performance of its portfolio against the Credit Suisse Leveraged
    Loan Index. The fund was formerly known as Invesco Van Kampen Senior Income Trust and Van Kampen Senior Income Trust.
    Invesco Senior Income Trust was formed on June 23, 1998 and is domiciled in the United States.
