      in the United States with a core focus in the Philadelphia, Austin and Washington, D.C. markets. Organized as a real
      estate investment trust (REIT), we own, develop, lease and manage an urban, town center and transit-oriented portfolio
      comprising 175 properties and 24.7 million square feet as of December 31, 2020 which excludes assets held for sale.
      Our purpose is to shape, connect and inspire the world around us through our expertise, the relationships we foster,
      the communities in which we live and work, and the history we build together.'
  - source_sentence: The SPDR S&P Global Infrastructure ETF (GII) aims to replicate the performance of the S&P Global Infrastructure
      Index, investing at least 80% of its assets in the index's securities and related depositary receipts. The index includes
      75 of the largest publicly listed infrastructure companies globally, selected based on specific investability criteria.
      GII focuses on firms in the energy, transportation, and utility sectors, with a portfolio composition of 30 transportation,
      30 utility, and 15 energy companies. The fund ensures diversification by capping sector weights at 40% for transportation
      and utilities, and 20% for energy, with no single security exceeding a 5% weight. Stocks are market-cap-weighted within
      each sector, and the fund undergoes significant adjustments during its semi-annual rebalancing.
    sentences:
    - "Companhia de Saneamento Básico do Estado de São Paulo \x96 SABESP provides water and sewage services to residential,\
      \ commercial, industrial, and governmental customers. It provides water supply, sanitary sewage, urban rainwater management\
      \ and drainage, urban cleaning, and solid waste management services, as well as related activities, including the planning,\
      \ operation, maintenance, and commercialization of energy. As of December 31, 2021, the company provided water services\
      \ through 9.8 million water connections to approximately 27.8 million people; sewage services through 8.4 million sewage\
      \ connections to approximately 24.6 million people; and operated 88,904 kilometers of water pipes and water transmission\
      \ lines, as well as 61,122 kilometers of sewer lines. It also offers water and/or sewage services to four other municipalities\
      \ through special purpose companies. The company was founded in 1954 and is headquartered in São Paulo, Brazil."
    - AMETEK, Inc. manufactures and sells electronic instruments and electromechanical devices worldwide. It operates in two
      segments, Electronic Instruments (EIG) and Electromechanical (EMG). The company's EIG segment offers advanced instruments
      for the process, aerospace, power, and industrial markets; process and analytical instruments for the oil and gas, petrochemical,
      pharmaceutical, semiconductor, automation, and food and beverage industries; and instruments to the laboratory equipment,
      ultra-precision manufacturing, medical, and test and measurement markets. This segment also provides power quality monitoring
      and metering devices, uninterruptible power supplies, programmable power equipment, electromagnetic compatibility test
      equipment, gas turbines, and environmental health and safety market sensors, dashboard instruments for heavy trucks
      and other vehicles, and instrumentation and controls for the food and beverage industries; and aircraft and engine sensors,
      monitoring systems, power supplies, fuel and fluid measurement systems, and data acquisition systems for the aerospace
      industry. Its EMG segment offers engineered electrical connectors and electronics packaging to protect sensitive devices
      and mission-critical electronics; precision motion control products for data storage, medical devices, business equipment,
      automation, and other applications; high-purity powdered metals, strips and foils, specialty clad metals, and metal
      matrix composites; motor-blower systems and heat exchangers for use in thermal management, military, commercial aircraft,
      and military ground vehicles; and motors for use in commercial appliances, fitness equipment, food and beverage machines,
      hydraulic pumps, and industrial blowers. This segment also operates a network of aviation maintenance, repair, and overhaul
      facilities. In addition, the company offers clinical and educational communication solutions. AMETEK, Inc. was founded
      in 1930 and is headquartered in Berwyn, Pennsylvania.
    - Apple Inc. designs, manufactures, and markets smartphones, personal computers, tablets, wearables, and accessories worldwide.
      The company offers iPhone, a line of smartphones; Mac, a line of personal computers; iPad, a line of multi-purpose tablets;
      and wearables, home, and accessories comprising AirPods, Apple TV, Apple Watch, Beats products, and HomePod. It also
      provides AppleCare support and cloud services; and operates various platforms, including the App Store that allow customers
      to discover and download applications and digital content, such as books, music, video, games, and podcasts, as well
      as advertising services include third-party licensing arrangements and its own advertising platforms. In addition, the
      company offers various subscription-based services, such as Apple Arcade, a game subscription service; Apple Fitness+,
      a personalized fitness service; Apple Music, which offers users a curated listening experience with on-demand radio
      stations; Apple News+, a subscription news and magazine service; Apple TV+, which offers exclusive original content;
      Apple Card, a co-branded credit card; and Apple Pay, a cashless payment service, as well as licenses its intellectual
      property. The company serves consumers, and small and mid-sized businesses; and the education, enterprise, and government
      markets. It distributes third-party applications for its products through the App Store. The company also sells its
      products through its retail and online stores, and direct sales force; and third-party cellular network carriers, wholesalers,
      retailers, and resellers. Apple Inc. was founded in 1976 and is headquartered in Cupertino, California.
  - source_sentence: The SPDR S&P Health Care Services ETF (XHS) aims to mirror the performance of the S&P Health Care Services
      Select Industry Index by employing a sampling strategy, investing at least 80% of its assets in the index's securities.
      This index, part of the S&P Total Market Index, focuses on the U.S. health care services sector, including related industries
      like medical equipment, pharmaceuticals, and drug retailers. XHS offers unique exposure by equally weighting its holdings,
      which results in a tilt towards smaller companies and an underweighting of large managed health care firms. The index
      is rebalanced quarterly, ensuring a dynamic and diversified portfolio.
    sentences:
    - Castle Biosciences, Inc., a commercial-stage diagnostics company, focuses to provide diagnostic and prognostic testing
      services for dermatological cancers. Its lead product is DecisionDx-Melanoma, a multi-gene expression profile (GEP)
      test to identify the risk of metastasis for patients diagnosed with invasive cutaneous melanoma. The company also offers
      DecisionDx-UM test, a proprietary GEP test that predicts the risk of metastasis for patients with uveal melanoma, a
      rare eye cancer; DecisionDx-SCC, a proprietary 40-gene expression profile test that uses an individual patient's tumor
      biology to predict individual risk of squamous cell carcinoma metastasis for patients with one or more risk factors;
      and DecisionDx DiffDx-Melanoma and myPath Melanoma, a proprietary GEP test to diagnose suspicious pigmented lesions.
      It offers test services through physicians and their patients. The company was founded in 2007 and is headquartered
      in Friendswood, Texas.
    - HBM Healthcare Investments AG specializes in fund of funds and direct investments in middle market and mature companies.
      The fund prefers to invest in start up, early stage, mid stage, mid venture, late venture, and late stage private companies,
      unlisted emerging companies, small cap public companies, buyouts, growth capital, and private investment in public equities
      (PIPES). Within fund of funds, it invests in venture capital funds. It also seeks to finance spin-offs of product lines
      or departments from larger corporations and the expansion or restructuring of established companies, seed stages, venture
      capital, expansion capital stages, spin-offs, and buyouts. The fund prefers to invest in the private and public companies
      in the healthcare sector with a focus on human medicine, drugs, pharma , biopharma, biotechnology, diagnostics, medical
      technology, and related industries. It seeks to make initial investments in companies whose primary products are in
      clinical development or the immediately preceding stage. The fund typically invests globally with a focus on Asia Pacific,
      Asia, North America, and Europe. In case of public companies, it focuses on those which originate from its private portfolio.
      The fund increases its investment in portfolio companies by participating in a follow-on financing or after the portfolio
      company's IPO. It may acquire majority participations in portfolio companies, usually takes a seat on the portfolio
      company's Board of Directors, and largely makes equity investments but may also invest through other instruments including
      convertible bonds, debt securities, structured products, and derivatives. The fund exits its portfolio companies through
      trade sale or IPO.
    - Invesco Senior Income Trust is a closed ended fixed income mutual fund launched by Invesco Ltd. It is co-managed by
      Invesco Advisers, Inc., Invesco Asset Management Deutschland GmbH, Invesco Asset Management Limited, Invesco Asset Management
      (Japan) Limited, Invesco Australia Limited, Invesco Hong Kong Limited, Invesco Senior Secured Management, Inc., and
      Invesco Canada Ltd. The fund invests in the fixed income markets of the United States. It primarily invests in a portfolio
      of interests in floating or variable rate senior loans to corporations, partnerships, and other entities which operate
      in a variety of industries and geographical regions. The fund typically employs fundamental analysis with a bottom up
      stock picking approach to create its portfolio. It benchmarks the performance of its portfolio against the Credit Suisse
      Leveraged Loan Index. The fund was formerly known as Invesco Van Kampen Senior Income Trust and Van Kampen Senior Income
      Trust. Invesco Senior Income Trust was formed on June 23, 1998 and is domiciled in the United States.
