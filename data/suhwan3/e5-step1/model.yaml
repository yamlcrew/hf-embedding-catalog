widgetData:
- source_sentence: The Merlyn.AI SectorSurfer Momentum ETF is designed to dynamically shift its investment strategy based
    on market conditions, tracking an index that utilizes an algorithmic Bull/Bear indicator assessing U.S. equity markets
    for advancing trends or elevated decline risk using factors like price-trend, momentum, value sentiment, and volatility.
    In Bull markets, it targets approximately a 70/30 domestic/foreign aggressive equity allocation by selecting six thematic
    ETFs (four sectors, two geopolitical), while in Bear markets, it seeks safety by choosing at least four momentum-leading
    bond, treasury, and gold safe-harbor ETFs, explicitly avoiding inverse and leveraged funds. The index is typically evaluated
    monthly, though the indicator can trigger strategy changes anytime during excessive market volatility. Under normal circumstances,
    at least 80% of the fund's assets are invested in the index's component securities; the fund is non-diversified. Please
    be aware this fund is closing, with its last day of trading scheduled for November 10, 2023.
  sentences:
  - The BlackRock Future Climate and Sustainable Economy ETF (BECO) is an actively managed equity fund focused on the transition
    to a lower carbon economy and future climate themes. It seeks a relatively concentrated, non-diversified portfolio of
    globally-listed companies of any market capitalization, investing across multiple subthemes such as sustainable energy,
    resource efficiency, future transport, sustainable nutrition, and biodiversity. The fund utilizes proprietary environmental
    criteria, including carbon metrics, and aims to align with the Paris Climate Agreement goals for net-zero emissions by
    2050, while excluding certain high-emission industries and companies violating the UN Global Compact. It also attempts
    to achieve a better aggregate environmental and ESG score than its benchmark, the MSCI ACWI Multiple Industries Select
    Index. Note that BECO is being delisted, with its last day of trading on an exchange scheduled for August 12, 2024.
  - The Direxion Daily Semiconductor Bull 3X Shares (SOXL) seeks daily investment results, before fees and expenses, of 300%
    of the daily performance of the ICE Semiconductor Index. To achieve this bullish, leveraged exposure, the fund invests
    at least 80% of its net assets in financial instruments, such as swap agreements, securities of the index, and ETFs that
    track the index. The underlying ICE Semiconductor Index is a rules-based, modified float-adjusted market capitalization-weighted
    index that tracks the performance of the thirty largest U.S. listed semiconductor companies. As a daily leveraged fund,
    SOXL rebalances daily, meaning results over periods longer than one day can differ significantly from 300% of the index's
    performance due to the effects of compounding; the fund is also non-diversified.
  - The KraneShares Trust ETF seeks investment results corresponding generally to the price and yield performance of the Solactive
    Global Luxury Index. Under normal circumstances, the fund invests at least 80% of its net assets in instruments in the
    underlying index or those with similar economic characteristics. This index is a modified, free float adjusted market
    capitalization weighted index designed to measure the equity performance of companies from global luxury-related sectors,
    such as travel & leisure, premium ware, and apparel, located in developed markets. The index selects the top 25 companies
    based on criteria including size, trading volume, and country of listing, applying a modified weighting approach where
    the top 5 securities receive higher allocations (with the largest capped at 10%) while others are capped at 4.5%. The
    index is rebalanced semi-annually. The fund is non-diversified and while targeting US investments, it maintains at least
    40% of its assets in foreign entities or those with significant business activities outside the United States.
- source_sentence: The Xtrackers MSCI Emerging Markets Climate Selection ETF seeks to track an emerging markets index focused
    on companies meeting specific climate criteria. Derived from the MSCI ACWI Select Climate 500 methodology, the underlying
    index selects eligible emerging market stocks using an optimization process designed to reduce greenhouse gas emission
    intensity (targeting 10% revenue-related and 7% financing-related reductions) and increase exposure to companies with
    SBTi-approved targets. The strategy also excludes controversial companies and evaluates companies based on broader ESG
    considerations. The fund is non-diversified and invests at least 80% of its assets in the component securities of this
    climate-focused emerging markets index.
  sentences:
  - The First Trust Indxx NextG UCITS ETF seeks investment results that generally correspond to the price and yield of the
    Indxx 5G & NextG Thematic Index. This tiered-weighted index of global mid- and large-cap equities tracks companies dedicating
    significant resources to the research, development, and application of fifth generation (5G) and emerging next generation
    digital cellular technologies. The fund normally invests at least 90% of its net assets in the index's securities, which
    are primarily drawn from themes including 5G infrastructure and hardware (such as data/cell tower REITs and equipment
    manufacturers) and telecommunication service providers operating relevant cellular and wireless networks.
  - The iPath S&P MLP ETN tracks an S&P Dow Jones index designed to provide exposure to leading partnerships listed on major
    U.S. exchanges. Comprising master limited partnerships (MLPs) and similar publicly traded limited liability companies,
    these constituents are primarily classified within the GICS Energy Sector and GICS Gas Utilities Industry.
  - The First Trust NASDAQ ABA Community Bank Index Fund (QABA) seeks investment results corresponding generally to the NASDAQ
    OMX® ABA Community Bank TM Index, normally investing at least 90% of its net assets in the index's securities. The index
    tracks NASDAQ-listed US banks and thrifts of small, mid, and large capitalization, designed to capture the community banking
    industry. Uniquely, it deliberately excludes the 50 largest banks by asset size, banks with significant international
    operations, and those specializing in credit cards, specifically targeting true community banks and avoiding larger "mega-money
    centers." The index is market-cap-weighted and undergoes regular rebalancing and reconstitution, subject to certain issuer
    weight caps.
- source_sentence: The VanEck Morningstar Wide Moat ETF (MOAT) seeks to replicate the performance of the Morningstar® Wide
    Moat Focus IndexSM by investing at least 80% of its assets in the index's securities. The fund targets US companies that
    Morningstar identifies as having sustainable competitive advantages ("wide moat companies") based on a proprietary methodology
    considering quantitative and qualitative factors. Specifically, the index focuses on companies determined to have the
    highest fair value among these wide moat firms. MOAT holds a concentrated, equal-weighted portfolio, which typically involves
    around 40 names but can hold more, featuring a staggered rebalance schedule and potential sector biases. The fund is non-diversified
    and employs caps on turnover and sector exposure, resulting in a strategy that can significantly diverge from broader
    market coverage despite its focus on established companies with competitive advantages.
  sentences:
  - The Fidelity MSCI Industrials Index ETF (FIDU) aims to match the performance of the MSCI USA IMI Industrials 25/25 Index,
    which represents the broad U.S. industrial sector using a market-cap-weighted approach with a 25/25 capping methodology.
    The fund, launched in October 2013, provides plain-vanilla exposure and invests at least 80% of its assets in securities
    found within this index. It uses a representative sampling strategy rather than replicating the entire index, and the
    underlying index is rebalanced quarterly.
  - The KraneShares Electric Vehicles and Future Mobility Index ETF (KARS) seeks to track the price and yield performance
    of the Bloomberg Electric Vehicles Index by investing at least 80% of its net assets in corresponding instruments or those
    with similar economic characteristics. The underlying index is designed to measure the equity market performance of globally-listed
    companies significantly involved in the production of electric vehicles, components, or other initiatives enhancing future
    mobility, including areas like energy storage, autonomous navigation technology, lithium and copper mining, and hydrogen
    fuel cells. KARS holds a concentrated portfolio, typically around 32 companies, weighted by market capitalization subject
    to specific position caps, and is reconstituted and rebalanced quarterly.
  - The iPath S&P MLP ETN tracks an S&P Dow Jones index designed to provide exposure to leading partnerships listed on major
    U.S. exchanges. Comprising master limited partnerships (MLPs) and similar publicly traded limited liability companies,
    these constituents are primarily classified within the GICS Energy Sector and GICS Gas Utilities Industry.
- source_sentence: The Global X Clean Water ETF (AQWA) seeks to provide exposure to the global water industry by tracking
    the Solactive Global Clean Water Industry Index. The fund invests at least 80% of its assets in securities of this index,
    which targets companies deriving a significant portion (at least 50%) of their revenue from water infrastructure, equipment,
    and services, including treatment, purification, conservation, and management. The index selection process uses proprietary
    technology like NLP to identify eligible firms, incorporates minimum ESG standards based on UN Global Compact principles,
    and includes the 40 highest-ranking companies, weighted by market capitalization with specific caps. Reconstituted and
    rebalanced semi-annually, the fund is considered non-diversified.
  sentences:
  - The First Trust Nasdaq Transportation ETF aims to track the Nasdaq US Smart Transportation TM Index, investing at least
    90% of its net assets in the index's securities. This non-diversified fund provides exposure to a concentrated portfolio
    of approximately 30 highly liquid U.S. transportation companies across various segments such as delivery, shipping, marine,
    railroads, trucking, airports, airlines, bridges, tunnels, and automobiles. The index selects companies based on liquidity
    and then ranks and weights them according to factors reflecting growth (price returns), value (cash flow-to-price), and
    low volatility, ensuring no single constituent exceeds 8%. The index undergoes annual reconstitution and quarterly rebalancing.
  - The Direxion Daily Healthcare Bull 3X Shares (CURE) is an ETF that seeks daily investment results, before fees and expenses,
    of 300% (3X) of the daily performance of the Health Care Select Sector Index. It invests at least 80% of its net assets
    in financial instruments designed to provide this 3X daily leveraged exposure. The underlying index tracks US listed healthcare
    companies, including pharmaceuticals, health care equipment and supplies, providers and services, biotechnology, life
    sciences tools, and health care technology, covering major large-cap names. CURE is non-diversified and intended strictly
    as a short-term tactical instrument, as it delivers its stated 3X exposure only for a single day, and returns over longer
    periods can significantly differ from three times the index's performance.
  - The BlackRock Future Climate and Sustainable Economy ETF (BECO) is an actively managed equity fund focused on the transition
    to a lower carbon economy and future climate themes. It seeks a relatively concentrated, non-diversified portfolio of
    globally-listed companies of any market capitalization, investing across multiple subthemes such as sustainable energy,
    resource efficiency, future transport, sustainable nutrition, and biodiversity. The fund utilizes proprietary environmental
    criteria, including carbon metrics, and aims to align with the Paris Climate Agreement goals for net-zero emissions by
    2050, while excluding certain high-emission industries and companies violating the UN Global Compact. It also attempts
    to achieve a better aggregate environmental and ESG score than its benchmark, the MSCI ACWI Multiple Industries Select
    Index. Note that BECO is being delisted, with its last day of trading on an exchange scheduled for August 12, 2024.
- source_sentence: The Horizon Kinetics Medical ETF (MEDX) is an actively-managed, non-diversified fund aiming for long-term
    capital growth by investing primarily in global companies (U.S. and foreign) within the medical research, pharmaceuticals,
    medical technology, and related industries. The fund typically focuses on companies generating at least 50% of their revenue
    from these areas and may include companies of any market capitalization, with an emphasis on those involved in cancer
    research and treatment. Under normal circumstances, at least 80% of assets are invested in equity securities, convertibles,
    and warrants of such companies. Portfolio selection and weighting are based on the adviser's evaluation and discretion.
    The fund may also temporarily invest up to 100% in US short-term debt or invest in non-convertible high-yield bonds.
  sentences:
  - The Fidelity MSCI Health Care Index ETF (FHLC) seeks to track the performance of the MSCI USA IMI Health Care 25/50 Index,
    which represents the broad U.S. health care sector. The ETF invests at least 80% of its assets in securities included
    in this market-cap-weighted index, which captures large, mid, and small-cap companies across over 10 subsectors. Employing
    a representative sampling strategy, the fund aims to correspond to the index's performance. The index incorporates a 25/50
    capping methodology, is rebalanced quarterly, and its broad reach offers diversification across cap sizes and subsectors,
    potentially reducing concentration in dominant large pharma names and increasing exposure to areas like drug retailers
    and insurance. The fund is classified as non-diversified.
  - The SPDR S&P Oil & Gas Equipment & Services ETF (XES) seeks investment results corresponding generally to the total return
    performance of the S&P Oil & Gas Equipment & Services Select Industry Index. This index represents companies in the oil
    and gas equipment and services segment of the broad U.S. S&P Total Market Index (S&P TMI), including those involved in
    activities like wildcatting, drilling hardware, and related services. The index utilizes an equal-weighting methodology
    for its constituent companies, which are selected based on market capitalization and liquidity requirements and undergo
    quarterly rebalancing. The fund itself employs a sampling strategy, aiming to invest at least 80% of its total assets
    in the securities that comprise its benchmark index.
  - The VanEck Biotech ETF (BBH) seeks to replicate the performance of the MVIS® US Listed Biotech 25 Index, which provides
    exposure to approximately 25 of the largest or leading U.S.-listed companies in the biotechnology industry. The fund normally
    invests at least 80% of its assets in securities comprising this market-cap-weighted index. The underlying index includes
    common stocks and depositary receipts of firms involved in the research, development, production, marketing, and sale
    of drugs based on genetic analysis and diagnostic equipment. While focusing on U.S.-listed companies, it may include foreign
    firms listed domestically, and medium-capitalization companies can be included. Reflecting the index's concentration,
    the fund is non-diversified and may have a top-heavy portfolio. The index is reviewed semi-annually.
