    sentences:
    - "81\n13.13 RODLESS CYLINDERS\nThe rodless cylinder is a device that requires particular attention whenever used, \n\
      because in contrast to the traditional cylinders, where the load is placed in line with \nthe rod, in the rodless cylinder\
      \ the weight is anchored on a carriage that runs on the \ntop part of the cylinder, and between the cylinder axis and\
      \ the load’s barycentre there \nis always a more or less accentuated arm according to the shape of the object to be\
      \ \nmoved.    \nThe piston’s force is transmitted to an external carriage by a mechanic arm that comes \nout from an\
      \ opening located in the barrel along the entire stroke and is connected to \nthe piston solidly. Sealing is guaranteed\
      \ by an internal metallic strap fixed at the ends \nof the body that completely covers the opening. The piston’s gaskets,\
      \ their internal \npressure and a magnetic band properly positioned make the metallic plate adhere to \nthe internal\
      \ surface of the tube, ensuring sufficient outward sealing and also between \nthe two cylinder chambers.\nA further\
      \ metallic strap placed outside, in correspondence with the opening, prevents \ndust collection in the sliding areas.\
      \ Sealing in this type of cylinder is never perfect. Par-\nticular guide systems obtained on the carriage and on the\
      \ piston, open the two plates \nin order to allow mechanic connection between piston and slider/cursor. In opposition\
      \ \nto rod cylinders, the forces expressed by the cylinder in the two directions are identi-\ncal. In fact, there is\
      \ no difference in sections on the two sides of the piston since the \nrod does not exist. The regulating air-cushion\
      \ absorption function is exactly identical \nto the one performed in the rod cylinders.\n 96 \n \n \nIn realtà gli in\
      \ gombri totali del cilindro compatto sono superioni rispetto al cilindro a \ncorsa breve, per questo motivo  le due\
      \ versioni sono tuttora presenti sul mercato  e l’uno \nnon sostituisce l’altro. \nIl cilindro compatto, al contrario\
      \ del corsa breve, viene sviluppato  sin dall’inizio \nseguendo, per scelta del primo produttore che lo realizzò, gli\
      \ ingombri imposti dall’ente \nnazionale di unificazione francese (UNITOP) e quindi esiste intercambia bilità tra \n\
      differenti produttori. \nAlcuni di questi produttori hanno inserito anche una versione ISO che unifica di fatto le \n\
      quote di fissaggio degli accessori utilizzabili quindi in differenti serie di cilindri. \nTutto ciò consente all’utilizzatore\
      \ finale di razionalizzare il proprio magazzino. \n \n13.13  Cilindri senza stelo \n \nIl cilind ro senza stelo è un\
      \ apparecchio che merita particolare attenzione quando \napplicato, perché al contrario dei cilindri tradizionali in\
      \ cui il carico è posi zionato in \nasse con lo stelo, nel cilindro senza stelo il peso viene ancorato su di un carrello\
      \ che \nscorre sulla parte superiore dello stesso e, tra asse del cilindro e baricentro del carico, vi \nè sempre un\
      \ braccio più o meno accentuato a seconda della forma dell’oggetto da  \nmovimentare.      \n \n  \n               \
      \                                                                                       \n \n \n \n \n \n          \
      \                                                                                 \n \n \n \n  \n \n \n \n \nChapter\
      \ 13\nPneumatic devices \nPneumatic Guide_GB.indd   81 15/04/2015   08:46:21"
