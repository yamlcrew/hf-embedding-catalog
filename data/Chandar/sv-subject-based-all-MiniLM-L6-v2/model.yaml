      4.2 Density operators and normal states

      Deﬁnition 2.4 of a state still makes good sense in the inﬁnite-dimensional case, as

      it simply specializes the general deﬁnition of a state on a C*-algebra A to the case

      A = B(H). Thus we continue to say that a state on B(H) is a complex-linear map

      ω : B(H) →C satisfying ω(b∗b) ≥0 for each b ∈B(H) and ω(1H )= 1. Despite

      this lack of novelty in the deﬁnition of a state (i.e., compared to ﬁnite-dimensional

      Hilbert spaces), Theorem 2.7 no longer holds if H is inﬁnite-dimensional: although

      it (almost trivially) remains true that density operatorsρ on H deﬁne states on B(H)

      through the fundamental correspondenceω(a)= Tr(ρa), a ∈B(H), cf. (2.33), there

      are (many) states that are not given in that way (see below). Fortunately, states that

      do arise through (2.33) can be characterized in a simple way.

