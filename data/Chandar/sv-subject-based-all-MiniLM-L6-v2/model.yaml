    \ and by different physiological \nprocesses such as: \n Phagocytic activity of white blood cells, specifically neu trophils.\
    \ \nNeutrophils generate ROS during phagocytic activity in order to kill the \ninvading pathogens as a host defense mechanism.\
    \ \n \n When the cells are exposed to abnormal conditions -such as hypoxia \nor hperoxia -produce ROS. Some drugs have\
    \ the ability to induce the \ncells to produce ROS due to their oxidizing effect. \n \n An exposure to radiation may\
    \ induce the biological systems to \nproduce ROS."
