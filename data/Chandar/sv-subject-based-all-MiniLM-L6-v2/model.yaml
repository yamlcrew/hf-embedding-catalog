    sentences:
    - "CHAPTER \nMoray Offshore Renewables Limited – Environmental Statement  \nTelford, Stevenson and MacColl Offshore Wind\
      \ Farms and Transmission Infrastructure \n \nSection 3 – Offshore Generating Station Impact Assessment 7-23 \n7.1 \n\
      Decommissioning \n7.1.6.45 Effects of deco mmissioning activities will be comparable to those arising durin g the \n\
      construction of the wind farms or where cables and other structures beneath the \nsurface of the seabed are left in\
      \ –situ, then effects will be much less .  Removal of \nturbine foundations and scour material will disturb seabed sediments\
      \ for subsequent \nre–distribution over adjacent areas resulting in potential smothering effects as \nassessed above.\
      \  The dominant sediment habitats and co mmunities will be tolerant \nto these effects (as assessed) and the significance\
      \ of related effects is expected to \nremain minor. \n7.1.6.46 Removal of the turbines will result in the removal of\
      \ the epifaunal co mmunities \nattached to them .  A reduction in epibenthos to pre –construction conditions is \ntherefore\
      \ predicted .  Exposed seabed areas are expected to be rapidly \nre-colonised with full restitution of the habitats\
      \ and biotopes expected within five \nyears, subject to the condition of the seabed substrate and stability compa red\
      \ to \nthe baseline situation. \n7.1.6.47 Removal of turbines upon which sensitive and  / or protected species, such\
      \ as the \ncold water coral Lophelia pertusa , have become attached would constitute a \nnegative effect .  Current\
      \ precedent for assessment in this regard includes the MV \nHutton oil and gas platform deco mmissioning programme which\
      \ regarded Lophelia \npertusa as an opportunist suggesting that this is sufficient reason for it not to affect \nthe\
      \ decommissioning outcome of this facility (British Petroleum, 2006) .  With regard \nto the current development, statutory\
      \ consultation will be required t o confirm \nrequirements within the deco mmissioning p rogramme and to ensure that\
      \ the \npotential for effects on protected species are properly assessed .  There are no \nrecords of Lophelia pertusa\
      \ , or any other protected species likely to attach to the \nturbines, occurring within the vicinity of the proposed\
      \ wind farms at Smith Bank \nalthough some records exist of its presence within the Southern Trench (see Chapter \n\
      4.2: Benthic Ecology).  Furthermore, L. pertusa typically occurs at depths of greater \nthan 150  m and is rarely found\
      \ attached to hard substrata (Peckett, 2003) .  \nConsequently, the likelihood of this species becoming established\
      \ on the turbines \nwithin the three proposed wind farm sites is very low. \nAccidental Spillages of Chemicals \n7.1.6.48\
      \ Accidental spillages or release of chemicals such as grouting, fuel and oil during the \nconstruction, operation and\
      \ deco mmissioning phases of the wind farms may \npotentially contaminate seabed sediments .  The severity of this effect\
      \ on benthic \necology depends upon the quantities a nd nature of the spillage  / release, the \ndilution and dispersal\
      \ properties of the receiving waters and the bio –availability of \nthe contaminant to benthic species .  At this stage,\
      \ the quantities and types of \nmaterial which might conceivably enter the marine  environment in this way are not \n\
      known and so scale and magnitude of effects are unquantifiable at present .  In the \nworst case scenario , the potential\
      \ significance of an accidental spillage would be \nmajor.  Accidents are by definition unknown and the uncer tainty\
      \ associated with \nthis effect is therefore high."
