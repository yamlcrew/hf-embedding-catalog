  - "81\n13.13 RODLESS CYLINDERS\nThe rodless cylinder is a device that requires particular attention whenever used, \nbecause\
    \ in contrast to the traditional cylinders, where the load is placed in line with \nthe rod, in the rodless cylinder the\
    \ weight is anchored on a carriage that runs on the \ntop part of the cylinder, and between the cylinder axis and the\
    \ load’s barycentre there \nis always a more or less accentuated arm according to the shape of the object to be \nmoved.\
    \    \nThe piston’s force is transmitted to an external carriage by a mechanic arm that comes \nout from an opening located\
    \ in the barrel along the entire stroke and is connected to \nthe piston solidly. Sealing is guaranteed by an internal\
    \ metallic strap fixed at the ends \nof the body that completely covers the opening. The piston’s gaskets, their internal\
    \ \npressure and a magnetic band properly positioned make the metallic plate adhere to \nthe internal surface of the tube,\
    \ ensuring sufficient outward sealing and also between \nthe two cylinder chambers.\nA further metallic strap placed outside,\
    \ in correspondence with the opening, prevents \ndust collection in the sliding areas. Sealing in this type of cylinder\
    \ is never perfect. Par-\nticular guide systems obtained on the carriage and on the piston, open the two plates \nin order\
    \ to allow mechanic connection between piston and slider/cursor. In opposition \nto rod cylinders, the forces expressed\
    \ by the cylinder in the two directions are identi-\ncal. In fact, there is no difference in sections on the two sides\
    \ of the piston since the \nrod does not exist. The regulating air-cushion absorption function is exactly identical \n\
