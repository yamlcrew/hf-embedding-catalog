    sentences:
    - "31 \n \n \n2.Chapter Two:………………………………………………………….. Causes of Aging \n \n \n There are many types of free radicals and\
      \ the most related to the \nbiological process are those which derived from oxygen: the  Reactive \nOxygen Species (\
      \ ROS ). These ROS include superoxide anion , peroxide \nand hydro radicals . ROS are produced in vivo within the mitochondria\
      \ \nduring electron tra nsport chain. They are also produced as intermediate \nproducts in different enzymatic reactions\
      \ and by different physiological \nprocesses such as: \n Phagocytic activity of white blood cells, specifically neu\
      \ trophils. \nNeutrophils generate ROS during phagocytic activity in order to kill the \ninvading pathogens as a host\
      \ defense mechanism. \n \n When the cells are exposed to abnormal conditions -such as hypoxia \nor hperoxia -produce\
      \ ROS. Some drugs have the ability to induce the \ncells to produce ROS due to their oxidizing effect. \n \n An exposure\
      \ to radiation may induce the biological systems to \nproduce ROS."
