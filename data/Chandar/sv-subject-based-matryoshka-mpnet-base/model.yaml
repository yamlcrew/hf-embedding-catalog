    - '16.5 | Eukaryotic Post-transcriptional Gene

      Regulation

      By the end of this section, you will be able to:

      • Understand RNA splicing and explain its role in regulating gene expression

      • Describe the importance of RNA stability in gene regulation

      RNA is transcribed, but must be processed into a mature form before translation can begin. This

      processing after an RNA molecule has been transcribed, but before it is translated into a protein, is called

      post-transcriptional modification. As with the epigenetic and transcriptional stages of processing, this

      post-transcriptional step can also be regulated to control gene expression in the cell. If the RNA is not

      processed, shuttled, or translated, then no protein will be synthesized.

      RNA splicing, the first stage of post-transcriptional control

      In eukaryotic cells, the RNA transcript often contains regions, called introns, that are removed prior to

      translation. The regions of RNA that code for protein are called exons (Figure 16.10). After an RNA

      molecule has been transcribed, but prior to its departure from the nucleus to be translated, the RNA is

      processed and the introns are removed by splicing.

      Figure 16.10 Pre-mRNA can be alternatively spliced to create different proteins.

      CHAPTER 16 | GENE EXPRESSION 435'
