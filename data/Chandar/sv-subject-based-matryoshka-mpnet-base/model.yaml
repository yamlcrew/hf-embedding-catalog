    - 'Figure 42.21The spleen is similar to a lymph node but is much larger and filters blood instead of

      lymph. Blood enters the spleen through arteries and exits through veins. The spleen contains two

      types of tissue: red pulp and white pulp. Red pulp consists of cavities that store blood. Within the

      red pulp, damaged red blood cells are removed and replaced by new ones. White pulp is rich in

      lymphocytes that remove antigen-coated bacteria from the blood. (credit: modification of work by

      NCI)

      42.3 | Antibodies

      By the end of this section, you will be able to:

      • Explain cross-reactivity

      • Describe the structure and function of antibodies

      • Discuss antibody production

      An antibody, also known as an immunoglobulin (Ig), is a protein that is produced by plasma cells after

      stimulation by an antigen. Antibodies are the functional basis of humoral immunity. Antibodies occur in

      the blood, in gastric and mucus secretions, and in breast milk. Antibodies in these bodily fluids can bind

      pathogens and mark them for destruction by phagocytes before they can infect cells.

      Antibody Structure

      An antibody molecule is comprised of four polypeptides: two identical heavy chains (large peptide units)

      that are partially bound to each other in a “Y” formation, which are flanked by two identical light chains

      (small peptide units), as illustrated inFigure 42.22. Bonds between the cysteine amino acids in the

      antibody molecule attach the polypeptides to each other. The areas where the antigen is recognized on

      the antibody are variable domains and the antibody base is composed of constant domains.

      In germ-line B cells, the variable region of the light chain gene has 40 variable (V) and five joining

      (J) segments. An enzyme called DNA recombinase randomly excises most of these segments out of the

      gene, and splices one V segment to one J segment. During RNA processing, all but one V and J segment

      are spliced out. Recombination and splicing may result in over 106 possible VJ combinations. As a result,

      each differentiated B cell in the human body typically has a unique variable chain. The constant domain,

      which does not bind antibody, is the same for all antibodies.

