widgetData:
- source_sentence: 'Instruct: Given a web search query, retrieve relevant passages that answer the query

    Query: Does borrowing from my 401(k) make sense in my specific circumstance?'
  sentences:
  - 'I''m not sure why you think that it matters that the distribution goes to an S-Corp vs an individual tax payer. You seem
    to think it has any relevance to your question, but it doesn''t. It only confuses your readers. The situation is like
    this: LLC X is deriving income in State #2. It has two members (I and S) residents of State #1. Members I and S pay all
    their taxes to State #1, and don''t pay taxes to State #2. State #2 audited member I and that member now needs to pay
    back taxes and penalties to State #2 on income derived from that State. Your question: Does that mean that member S should
    be worried, since that member was essentially doing the exact same thing as member I? My answer: Yes.'
  - Interest rates are market driven. They tend to be based on the prime rate set by the federal reserve bank because of the
    tremendous lending capacity of that institution and that other loan originators will often fund their own lending (at
    least in part) with fed loans. However, there is no mandatory link between the federal reserve rate and the market rate.
    No law stipulates that rates cannot rise or fall. They will rise and fall as lenders see necessary to use their capital.
    Though a lender asking 10% interest might make no loans when others are willing to lend for 9%. The only protection you
    have is that we are (mostly) economically free. As a borrower, you are protected by the fact that there are many lenders.
    Likewise, as a lender, because there are many borrowers. Stability is simply by virtue of the fact that one market participant
    with inordinate pricing will find fewer counterparties to transact.
  - '"You''re getting great wisdom and options. Establishing your actionable path will require the details that only you know,
    such as how much is actually in each paycheck (and how much tax is withheld), how much do you spend each month (and yearly
    expenses too), how much spending can you actually cut or replace, how comfortable are you with considering (or not considering)
    unexpected/emergency spending. You mentioned you were cash-poor, but only you know what your current account balances
    are, which will affect your actions and priorities. Btw, interestingly, your ""increase 401k contributions by 2% each
    year"" will need to end before hitting the $18K contribution limit. I took some time and added the details you posted
    into a cash-flow program to see your scenario over the next few years. There isn''t a ""401k loan"" activity in this program
    yet, so I build the scenario from other simple activities. You seem financially minded enough to continue modeling on
    your own. I''m posting the more difficult one for you (borrow from 401k), but you''ll have to input your actual balances,
    paycheck and spending. My spending assumptions must be low, and I entered $70K as ""take-home,"" so the model looks like
    you''ve got lots of cash. If you choose to play with it, then consider modeling some other scenarios from the advice in
    the other posts. Here''s the ""Borrow $6500 from 401k"" scenario model at Whatll.Be: https://whatll.be/d1x1ndp26i/2 To
    me, it''s all about trying the scenarios and see which one seems to work with all of the details. The trick is knowing
    what scenarios to try, and how to model them. Full disclosure: I needed to do similar planning, so I wrote Whatll.Be and
    I now share it with other people. It''s in beta, so I''m testing it with scenarios like yours. (Notice most of the extra
    activity occurs on 2018-Jan-01)"'
- source_sentence: 'Instruct: Given a web search query, retrieve relevant passages that answer the query

    Query: Finding a good small business CPA?'
  sentences:
  - I have had better experiences with accountants in smaller towns.  It seems they are used to working with small businesses
    and their reputation is very important to them.
  - '"It''s a scam. The cashier''s check will be forged. Craigslist has a warning about it here (item #3). What kind of payment
    do you think is not fakable? Or at least not   likely to be used in scams? When on craigslist - deal only locally and
    in person. You can ask to see the person''s ID if you''re being paid by check When being paid by check, how can seeing
    his/her ID help? In case the   check isn''t cashable, I can find that person by keeping record of   his/her ID?  If you''re
    paid by check, the payers details should be printed on the check. By checking the ID you can verify that the details match
    (name/address), so you can find the payer later. Of course the ID can be faked too, but there''s so much you can do to
    protect yourself. You''ll get better protection (including verified escrow service) by selling on eBay. Is being paid
    by cash the safest way currently,   although cash can be faked too, but it is the least common thing that   is faked currently?
    Do you recommend to first deposit the cash into a   bank (so that let the bank verify if the cash is faked), before   delivering
    the good?  For Craigslist, use cash and meet locally. That rules out most scams as a seller. What payment methods do you
    think are relatively safe currently?   Then getting checks must be the least favorite way of being paid. Do   you think
    cash is better than money order or cashier order?  You should only accept cash. If it is a large transaction, you can
    meet them at your bank, have them get cash, and you receive the cash from the bank. Back to the quoted scam, how will
    they later manipulate me? Are they interested in   my stuffs on moving sale, or in my money? They will probably ""accidentally""
    overpay you and ask for a refund of some portion of the overpayment. In that case you will be out the entire amount that
    you send back to them and possibly some fees from your bank for cashing a bad check."'
  - '"Putting them on line 10 is best suited for your situation. According to Quickbooks:  Commissions and Fees (Line 10)
    Commissions/fees paid to nonemployees to generate revenue (e.g. agent   fees). It seems like this website you are using
    falls under the term ""nonemployees""."'
- source_sentence: 'Instruct: Given a web search query, retrieve relevant passages that answer the query

    Query: Are Investment Research websites worth their premiums?'
  sentences:
  - Anyone who claims they can consistently beat the market and asks you to pay them to tell you how is a liar. This cannot
    be done, as the market adjusts itself. There's nothing they could possibly learn that analysts and institutional investors
    don't already know. They earn their money through the subscription fees, not through capital gains on their beat-the-market
    suggestions, that means that they don't have to rely on themselves to earn money, they only need you to rely on them.
    They have to provide proof because they cannot lie in advertisements, but if you read carefully, there are many small
    letters and disclaimers that basically remove any liability from them by saying that they don't take responsibility for
    anything and don't guarantee anything.
  - '"I don''t see EWQ6 in any of your links, so I can''t say for certain, but when you buy an option contract on a future,
    the option will be for a specific future (and strike).  So the page you''re looking at may be for options on E-mini S&P
    500 futures in general, and when you actually purchase one through your broker, you pick a specific expiry (which will
    be based on the ""prompt"" future, meaning the next future that expires after the option) and strike. UPDATE: Based on
    this page mirror, the option EWQ7 is an option on the ESU7 (SEP 2017) future.  The next 3 monthly options use ESZ7 as
    the underlier, which confirms that they use the next prompt future as the underlier."'
  - There are a few factors at play here. Depending on the bank that has offered you the card there are different types of
    overdraft protection that may have been set up. Typically, if they attempt to run the card with no money, if one of these
    is in play, you will be spared any overdraft fees by the transaction charging to a designated overdraft account, usually
    savings, or by the transaction failing due to insufficient funds.  If you know the transaction went through, and you know
    there were not enough funds in the account to cover the transactions, then you have a few options. If you have overdraft
    protection that auto charges insufficient funds charges to a separate account, then you have nothing to worry about. If
    you do not, most banks offer a grace period where you have until the end of the day to zero out your account, that is
    to say pay the overdraft amount and bring your balance to at least $0.  If this is a charge that occurred in the past,
    and you have already been charged an overdraft fee, there may still be hope. I cannot speak for all banks, but I know
    that Chase Bank offers a once per year overdraft forgiveness, where they will get rid of the charges if you agree to bring
    the account out of the negative. There is a chance other banks will do the same if you call their customer service.
- source_sentence: 'Instruct: Given a web search query, retrieve relevant passages that answer the query

    Query: Ballpark salary equivalent today of “healthcare benefits” in the US?'
  sentences:
  - While in the interview stage you need one good outfit. Take care of them and they will see you through this stage of the
    process. Shoes, ties, shirt, and a suit can all be purchased on sale. The fact that you have months before graduation
    give you time to purchase them when there is a sale.  Off-the-rack is good enough for a suit for this stage of your life.
    There is no need to go custom made when you are just starting out. In fact you may find you never need more than one or
    two suits, and they never need to be custom made.
  - Fiduciary They are obligated by the rules of the exchanges they are listed with. Furthermore, there is a strong chance
    that people running the company also have stock, so it personally benefits them to create higher prices. Finally, maybe
    they don't care about the prices directly, but by being a good company with a good product or service, they are desirable
    and that is expressed as a higher stock price.  Not every action is because it will raise the stock price, but because
    it is good for business which happens to make the stock more valuable.
  - 'There is some magic involved in that calculation, because what health insurance is worth to you is not necessarily the
    same it is worth for the employer. Two examples that illustrate the extreme ends of the spectrum: let''s say you or a
    family member have a chronic or a serious illness, especially if it is a preexisting condition - for instance, cancer.
    In that case, health insurance can be worth literally millions of dollars to you. Even if you are a diabetic, the value
    of health insurance can be substantial. Sometimes, it could even make financial sense in that case to accept a very low-paying
    job. On the other extreme of the scale, if you are very young and healthy, many people decide to forego insurance. In
    that case, the value of health insurance can be as little as the penalty (usually, 2% of your taxable income, I believe).'
- source_sentence: 'Instruct: Given a web search query, retrieve relevant passages that answer the query

    Query: I am under 18 years old, in the US, my parents have terrible credit, how can I take out a loan?'
  sentences:
  - What about web-hosting fees? Cost of Internet service? Cost of computer equipment to do the work? Amortized cost of development?
    Time for support calls/email? Phone service used for sales? Advertising/marketing expenses? Look hard--I bet there are
    some costs.
  - 'In the equity markets, the P/E is usually somewhere around 15.  The P/E can be viewed as the inverse of the rate of a
    perpetuity. Since the average is 15, and the E/P of that would be 6.7%, r should be 6.7% on average. If your business
    is growing, the growth rate can be incorporated like so: As you can see, a high g would make the price negative, in essence
    the seller should actually pay someone to take the business, but in reality, r is determined from the p and an estimated
    g. For a business of any growth rate, it''s best to compare the multiple to the market, so for the average business in
    the market with your business''s growth rate and industry, that P/E would be best applied to your company''s income.'
  - Depending on the state this might not be possible. Loans are considered contracts, and various states regulate how minors
    may enter into them. For example, in the state of Oregon, a minor may NOT enter into a contract without their parent being
    on the contract as well. So you are forced to wait until you turn 18. At that time you won't have a credit history, and
    to lenders that often is worse than having bad credit. I can't help with the car (other than to recommend you buy a junker
    for $500-$1,000 and just live with it for now), but you could certainly get a secured credit card or line of credit from
    your local bank. The way they are arranged is, you make a deposit of an amount of your choosing (generally at least $200
    for credit cards, and $1,000 for lines of credit), and receive a revolving line with a limit of that same amount. As you
    use and pay on this loan, it will be reported in your credit history. If you start that now, by the time you turn 18 you
    will have much better options for purchasing vehicles.
