    Bulgarian: Централни сили Tsentralni sili), consisting of Germany, Austria-Hungary, the Ottoman Empire and Bulgaria –
    hence also known as the Quadruple Alliance (German: Vierbund) – was one of the two main factions during World War I (1914–18).
    It faced and was defeated by the Allied Powers that had formed around the Triple Entente. The Powers'' origin was the
