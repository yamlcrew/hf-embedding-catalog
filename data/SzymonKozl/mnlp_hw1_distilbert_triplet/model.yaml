    by a 5–4 vote, the legality of a Ten Commandments display at the Texas State Capitol due to the monument's "secular purpose".
    In McCreary County, however, the Court ruled 5–4 that displays of the Ten Commandments in several Kentucky county courthouses
    were unconstitutional because they were not clearly integrated with a secular display, and thus were considered to have
    a religious purpose.
