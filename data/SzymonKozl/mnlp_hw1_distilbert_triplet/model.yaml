- source_sentence: when did 3 point shot start in ncaa
  sentences:
  - The RBC Heritage, known for much of its history as the Heritage Classic or simply the Heritage, is a PGA Tour event in
    South Carolina, first played 49 years ago in 1969. It is currently played in mid-April, the week after The Masters in
    Augusta, Georgia.
  - The NCAA's Southern Conference became the first collegiate conference to use the three-point rule, adopting a 22-foot
    (6.71 m) line for the 1980–81 season. Ronnie Carr of Western Carolina University was the first to score a three-point
    field goal in college basketball history on November 29, 1980. Over the following five years, NCAA conferences differed
    in their use of the rule and distance required for a three-pointer. The line was as close as 17 ft 9 in (5.41 m) in the
    Atlantic Coast Conference, and as far away as 22 feet in the Big Sky Conference. Used in conference play, it was adopted
    by the NCAA for the 1986–87 men's season at 19 ft 9 in (6.02 m), and was first used in the NCAA Tournament in 1987. In
    the same 1986–87 season, the NCAA adopted the three-pointer in women's basketball on an experimental basis, using the
    same 19 ft 9 in distance, and made its use mandatory beginning in 1987–88. In 2007, the NCAA lengthened the men's three-point
    distance to 20 ft 9 in (6.32 m), with the rule coming into effect at the beginning of the 2008–09 season. The NCAA women's
    three-point distance was moved to match the men's distance in 2011–12. American high schools, along with elementary and
    middle schools, adopted a 19 ft 9 in (6.02 m) line nationally in 1987, a year after the NCAA. The NCAA used the FIBA three-point
    line (see below) in the 2018 National Invitation Tournament.
  - 'The distance from the basket to the three-point line varies by competition level: in the National Basketball Association
    (NBA) the arc is 23 feet 9 inches (7.24 m) from the basket; in FIBA and the WNBA (the latter uses FIBA''s three-point
    line standard) the arc is 6.75 metres or 22 feet 1 3⁄4 inches from the basket; and in the National Collegiate Athletic
    Association (NCAA) the arc is 20 feet 9 inches (6.32 m) from the basket. In the NBA and FIBA/WNBA, the three-point line
    becomes parallel to each sideline at the points where the arc is 3 feet (0.91 m) from each sideline; as a result the distance
    from the basket gradually decreases to a minimum of 22 feet (6.71 m). In the NCAA the arc is continuous for 180° around
    the basket. There are more variations (see main article).'
