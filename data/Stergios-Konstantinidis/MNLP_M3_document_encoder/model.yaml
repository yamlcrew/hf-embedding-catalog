- source_sentence: 'Question: what production model was the tiger i tank of world war ii, Answer: Tiger I The Tiger I  listen (help·info)
    is a German heavy tank of World War II deployed from 1942 in Africa and Europe, usually in independent heavy tank battalions.
    Its final designation was Panzerkampfwagen VI Tiger Ausf. E often shortened to Tiger. The Tiger I gave the Wehrmacht its
    first armoured fighting vehicle that mounted the 8.8 cm KwK 36 gun (not to be confused with the 8.8 cm Flak 36). 1,347
    were built between August 1942 and August 1944.[9] After August 1944, production of the Tiger I was phased out in favour
    of the Tiger II.'
