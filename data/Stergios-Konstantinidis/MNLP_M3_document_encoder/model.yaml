- source_sentence: The text presents a novel pilot-free multi-user uplink framework for integrated sensing and communication
    (ISAC) in mm-wave networks. It enables single-antenna users to transmit without dedicated pilots, allowing the base station
    to decode messages and detect targets by utilizing users' spatial and velocity diversities. The system employs a 3D super-resolution
    approach to jointly estimate multi-path parameters like delays, Doppler shifts, and angles-of-arrival, solved through
    semidefinite programming. A key innovation is multi-user fusion, enhancing sensing and decoding by combining diverse user
    observations. This approach improves robustness and integrates multi-user perspectives for high-resolution sensing and
    communication. Numerical results demonstrate substantial enhancements in target estimation and communication performance.
    The methodology transforms user transmissions into valuable sensing opportunities, crucial for the next generation of
    wireless networks focused on environmental awareness and reliable data transmission. Future work includes addressing user
    mobility, real-time challenges, and optimizing fusion techniques in noisy conditions.
