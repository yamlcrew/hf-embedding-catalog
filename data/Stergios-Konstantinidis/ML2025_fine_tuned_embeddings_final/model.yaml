  - source_sentence: 'Cour administrative d''appel de Nantes, du 9 avril 1992, 90NT00107, inédit au recueil Lebon <br>    VU
      le recours du MINISTRE CHARGE DU BUDGET enregistré au greffe de la Cour le 28 février 1990 ;<br>    Le ministre demande
      à la Cour :<br>    1°) d''annuler le jugement du 19 octobre 1989 par lequel le Tribunal administratif de NANTES a accordé
      à l''association locale des Témoins de Jéhovah de LAVAL la décharge de la taxe d''habitation à laquelle elle a été assujettie
      au titre des années 1985, 1986 et 1987 dans la commune de LAVAL (Mayenne) ;<br>    2°) de remettre intégralement l''imposition
      contestée à la charge de ladite association ;<br>    VU les autres pièces du dossier ;<br>    VU le code général des
      impôts ;<br>    VU le code des tribunaux administratifs et des cours administratives d''appel ;<br>    VU la loi n°
      87-1127 du 31 décembre 1987 ;<br>    Les parties ayant été régulièrement averties du jour de l''audience,<br>    Après
      avoir entendu au cours de l''audience publique du 26 mars 1992 :<br>    - le rapport de M. AUBERT, conseiller,<br>    -
      et les conclusions de M. CADENAT, commissaire du gouvernement,<br>

      <br>    Considérant qu''aux termes de l''article 1407.I du code général des impôts :  "la taxe d''habitation est due
      :  1°) pour tous les locaux meublés affectés à l''habitation ; 2°) pour les locaux meublés conformément à leur destination
      et occupés à titre privatif par les sociétés, associations et autres organisations qui ne sont pas retenues pour l''établissement
      de la taxe professionnelle" ; qu''il résulte de ces dispositions que sont exonérés de la taxe d''habitation les locaux
      affectés exclusivement à l''exercice public d''un culte ;<br>    Considérant, en premier lieu, que l''association locale
      des Témoins de Jéhovah de LAVAL (Mayenne) dispose dans cette ville d''une salle dite "du Royaume" dans laquelle se déroulent,
      à son initiative, des enseignements et des débats sur des thèmes bibliques ainsi que des cérémonies qui revêtent un
      caractère religieux et qui sont constitutives de l''exercice d''un culte ;<br>    Considérant, en second lieu, que s''il
      est constant que l''appartenance à ladite association requiert une cooptation et le paiement d''une cotisation, il ressort
      de l''instruction que l''assistance aux conférences bibliques et aux offices religieux, dont l''horaire fait l''objet
      d''un affichage à l''extérieur du bâtiment, est ouvert à toute personne étrangère aux différentes associations des Témoins
      de Jéhovah ; qu''ainsi, nonobstant sa fermeture pour des motifs de sécurité légitimes en dehors des heures d''utilisation,
      ledit local doit être regardé comme affecté à l''exercice public d''un culte ;<br>    Considérant, enfin, qu''il ne
      ressort pas des pièces du dossier que la salle litigieuse serait également utilisée pour des réunions réservées aux
      membres de l''association et aurait ainsi le caractère d''un local occupé à titre privatif ;<br>    Considérant qu''il
      résulte de ce qui précède que le ministre n''est pas fondé à soutenir que c''est à tort que, par le jugement attaqué,
      le Tribunal administratif de NANTES a accordé la décharge des impositions à la taxe d''habitation mises à la charge
      de l''association locale des Témoins de Jéhovah de LAVAL au titre des années 1985, 1986 et 1987 ;<br>Article 1er - Le
      recours du MINISTRE CHARGE DU BUDGET est rejeté.<br>Article 2 - Le présent arrêt sera notifié au MINISTRE DU BUDGET
      et à l''association locale des Témoins de Jéhovah de LAVAL.<br> None'
