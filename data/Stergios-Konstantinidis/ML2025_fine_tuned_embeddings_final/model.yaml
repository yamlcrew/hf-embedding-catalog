    \ sont incompatibles avec l'exercice des fonctions susmentionnées (...)\". Par ailleurs, aux termes de l'article 41-2\
    \ du code de procédure pénale :  \" Le procureur de la République, tant que l'action publique n'a pas été mise en mouvement,\
    \ peut proposer, directement ou par l'intermédiaire d'une personne habilitée, une composition pénale à une personne physique\
    \ qui reconnaît avoir commis un ou plusieurs délits punis à titre de peine principale d'une peine d'amende ou d'une peine\
    \ d'emprisonnement d'une durée inférieure ou égale à cinq ans, ainsi que, le cas échéant, une ou plusieurs contraventions\
    \ connexes (...) \".<br>\n       3. Il appartient à l'autorité administrative d'apprécier, à l'issue de l'enquête administrative,\
    \ et sous le contrôle du juge de l'excès de pouvoir, si le comportement de la personne qui sollicite la délivrance ou\
    \ le renouvellement d'une carte professionnelle est compatible avec l'exercice de la profession d'agent privé de sécurité.\
    \ Pour ce faire, l'autorité administrative procède, sous le contrôle du juge de l'excès de pouvoir, à une appréciation\
    \ globale de l'ensemble des éléments dont elle dispose.<br>\n       4. Il ressort des pièces du dossier que M. B..., a\
    \ été placé en garde à vue pendant <br>\n15 heures pour des faits de violences conjugales commis le 2 mai 2023 sur sa\
    \ compagne. L'intéressé soutient qu'en réalité, il s'est borné à la repousser alors qu'elle voulait l'empêcher de sortir\
    \ de leur domicile et qu'elle aurait alors heurté le lit en tombant. Il est toutefois constant que M. B... a participé\
    \ à un stage de responsabilisation pour la prévention et la lutte contre les violences au sein du couple et sexistes,\
    \ qui lui a été imposé dans le cadre d'une composition pénale, laquelle en vertu des dispositions précitées de l'article\
    \ 41-2 du code de procédure pénale n'est possible que lorsque le prévenu a reconnu avoir commis un ou plusieurs délits.\
    \ Par ailleurs, lors d'un contrôle inopiné des forces de l'ordre, le 10 mai suivant, il a été constaté que le requérant\
    \ conduisait un véhicule qui n'était pas assuré. Pour démontrer sa bonne foi, il se borne à faire valoir que le véhicule\
    \ avait été acquis avec son ancienne compagne dans le cadre d'une location avec option d'achat, que le certificat d'immatriculation\
    \ était au nom de cette dernière, et qu'elle avait résilié le contrat d'assurance sans le prévenir à la suite de leur\
    \ rupture. De plus, ces agissements qui présentaient, à la date de la décision contestée, un caractère très récent, ont\
    \ été commis alors que M. B... exerçait déjà des missions portant sur l'accueil, la prévention et la sécurité des biens\
    \ et des personnes. Par suite, le directeur du CNAPS a pu, sans entacher sa décision d'une erreur d'appréciation, estimer\
    \ qu'ils révélaient un comportement de M. B... contraire à l'honneur et aux bonnes mœurs et de nature à porter atteinte\
    \ à la sécurité des personnes, et qu'il était incompatible avec l'exercice d'une activité professionnelle d'agent de sécurité\
    \ privée. Ainsi, en refusant de renouveler sa carte professionnelle, le directeur du CNAPS n'a pas fait une inexacte application\
    \ des dispositions de l'article L. 612-20 du code de la sécurité intérieure.<br>\n       5. Il résulte de tout ce qui\
    \ précède, que le CNAPS est fondé à soutenir que c'est à tort que, par le jugement attaqué, le tribunal administratif\
    \ de Caen a annulé sa décision du 23 août 2023.<br>\n<br>\n       Sur les frais liés au litige :<br>\n<br>\n       6.\
    \ Les dispositions de l'article L. 761-1 du code de justice administrative font obstacle à ce que soit mis à la charge\
    \ du CNAPS, qui n'est pas, dans la présente instance, la partie perdante, le versement à M. B... de la somme qu'il demande\
    \ au titre des frais exposés et non compris dans les dépens. Dans les circonstances de l'espèce, il n'y a pas davantage\
    \ lieu de mettre à la charge de M. B... le versement au CNAPS de la somme qu'il sollicite au titre des mêmes frais. <br>\n\
    <br>\nDÉCIDE :<br>\nArticle 1er : \tLe jugement n° 2302551 du 9 février 2024 du tribunal administratif de Caen est annulé.<br>\n\
    Article 2 : \tLa demande présentée devant le tribunal administratif de Caen par M. B... tendant à l'annulation de la décision\
    \ du 23 août 2023 ainsi que ses conclusions d'appel sont rejetées. <br>\nArticle 3 : \tLes conclusions présentées par\
    \ le CNAPS sur le fondement de l'article L.761-1 du code de justice administrative sont rejetées.<br>\nArticle 4 : \t\
    Le présent arrêt sera notifié au Conseil national des activités privées de sécurité et à M. A... B....<br>\n       Délibéré\
    \ après l'audience du 13 février 2025, à laquelle siégeaient :<br>\n       - Mme Brisson, présidente de chambre,<br>\n\
    \       - M. Vergne, président-assesseur,<br>\n       - Mme Gélard, première conseillère.<br>\n<br>\n<br>\n       Rendu\
    \ public par mise à disposition au greffe, le 7 mars 2025.<br>\nLa rapporteure,<br>\nV. GELARDLa présidente,<br>\nC. BRISSON\
    \ <br>\nLe greffier,<br>\nR. MAGEAU<br>\n<br>\n<br>\n       La République mande et ordonne au ministre d'Etat, ministre\
    \ de l'intérieur en ce qui le concerne, et à tous commissaires de justice à ce requis en ce qui concerne les voies de\
    \ droit commun contre les parties privées, de pourvoir à l'exécution de la présente décision.<br>\n<br>\n<br>\n<br>\n\
    2<br>\nN° 24NT00708<br>\n<br>\n<br>\n<br> None"
  - "Conseil d'État,  3ème sous-section jugeant seule, 06/06/2012, 347452, Inédit au recueil Lebon Vu le pourvoi sommaire\
    \ et le mémoire complémentaire, enregistrés les 14 mars et 14 juin 2011 au secrétariat du contentieux du Conseil d'Etat,\
    \ présentés pour la COMMUNE DE LA PLAINE-DES-PALMISTES, représentée par son maire ; la COMMUNE DE LA PLAINE-DES-PALMISTES\
    \ demande au Conseil d'Etat :<br>\n<br>\n               1°) d'annuler l'arrêt n° 10BX00921 du 14 décembre 2010 par lequel\
    \ la cour administrative d'appel de Bordeaux a rejeté sa requête tendant, d'une part, à l'annulation du jugement n° 0801601\
    \ du 26 novembre 2009 du tribunal administratif de Saint-Denis annulant le titre exécutoire d'un montant de 3 729 euros\
    \ émis par le maire à l'encontre de M. A le 6 octobre 2008 et, d'autre part, au rejet de la demande de M. A ; <br>\n<br>\n\
    \              2°) réglant l'affaire au fond, de rejeter la demande de M. A ; <br>\n<br>\n              3°) de mettre\
    \ à la charge de M. A la somme de 4 000 euros au titre de l'article L. 761-1 du code de justice administrative ;<br>\n\
    <br>\n<br>\n              Vu les autres pièces du dossier ;<br>\n<br>\n              Vu le code de justice administrative\
    \ ;<br>\n<br>\n<br>\n              Après avoir entendu en séance publique :<br>\n<br>\n              - le rapport de Mme\
    \ Agnès Martinel, Maître des Requêtes en service extraordinaire,  <br>\n<br>\n              - les observations de la SCP\
    \ Monod, Colin, avocat de la COMMUNE DE LA PLAINE DES PALMISTES et de la SCP Rocheteau, Uzan-Sarano, avocat M. Joël A,\
    \ <br>\n<br>\n              - les conclusions de M. Vincent Daumas, rapporteur public ;<br>\n<br>\n              La parole\
    \ ayant été à nouveau donnée à la SCP Monod, Colin, avocat de la COMMUNE DE LA PLAINE DES PALMISTES et à la SCP Rocheteau,\
    \ Uzan-Sarano, avocat M. Joël A ;  <br>\n<br>\n<br>\n<br>Considérant qu'il ressort des pièces du dossier soumis aux juges\
    \ du fond que M. A a bénéficié en sa qualité de conseiller municipal de la commune de La Plaine-des-Palmistes, chargé\
    \ des fonctions d'adjoint au maire, d'une majoration de 13,8 % de son indemnité mensuelle de fonction pendant toute la\
    \ période courant du 17 mars 1989 au 16 juin 1995 ; que le maire nouvellement élu en 2008, estimant que les majorations\
    \ perçues par l'intéressé, comme d'ailleurs d'autres membres du conseil municipal, étaient dépourvues de base légale,\
    \ a émis le 6 octobre 2008 à l'encontre de M. A un titre de perception d'un montant de 3 729 euros en remboursement de\
    \ ces versements ; que par un jugement du 26 novembre 2009, le tribunal administratif de Saint-Denis de La Réunion, faisant\
    \ droit à la demande de M. A, a annulé ce titre de perception, estimant qu'il avait été émis en méconnaissance des règles\
    \ applicables au retrait des actes illégaux créateurs de droit ; que son jugement a été confirmé par un arrêt du 14 décembre\
    \ 2010 de la cour administrative d'appel de Bordeaux contre lequel la COMMUNE DE LA PLAINE-DES-PALMISTES se pourvoit en\
    \ cassation ; <br>\n<br>\n              Considérant qu'une décision administrative accordant un avantage financier crée\
    \ des droits au profit de son bénéficiaire alors même que l'administration avait l'obligation de refuser cet avantage\
    \ ; que, sous réserve de dispositions législatives ou réglementaires contraires et hors le cas où il est satisfait à une\
    \ demande du bénéficiaire, l'administration ne peut retirer une décision individuelle explicite créatrice de droits, si\
    \ elle est illégale, que dans le délai de quatre mois suivant la prise de cette décision ; que, par ailleurs, un acte\
    \ administratif obtenu par fraude ne crée pas de droits et, par suite, peut être abrogé ou retiré par l'autorité compétente\
    \ pour le prendre, alors même que le délai de droit commun serait expiré ;<br>\n<br>\n              Considérant que dans\
    \ son mémoire d'appel, la COMMUNE DE LA PLAINE-DES-PALMISTES soutenait que la perception par M. A de la majoration d'indemnité\
    \ litigieuse résultait d'une situation de pur fait, en l'absence de toute décision formalisée du conseil municipal ayant\
    \ prévu l'octroi de cet avantage et que l'absence de formalisation et de publicité avait eu pour objet de faire obstacle\
    \ à ce que le préfet ou des membres du conseil municipal pussent en demander l'annulation au juge administratif ; qu'elle\
    \ avait conclu ses développements sur l'illégalité et le caractère occulte de ces versements en soutenant que \" si la\
    \ cour jugeait que l'application de ces \" indexations \" constitue malgré tout une décision, mais non formalisée par\
    \ écrit, elle devrait alors constater que ces décisions sont, tant sur la forme compte tenu des modalités de leur édiction,\
    \ que sur le fond, étant donné l'irrégularité patente du dispositif et son aspect occulte, des décisions inexistantes\
    \ ou obtenues par fraude qui n'ont pas pu valablement faire courir le délai de retrait de l'acte \" ; que la cour ne s'est\
    \ pas prononcée sur la question de savoir si, comme le soutenait la commune requérante, ces versements mensuels avaient\
    \ été obtenus par fraude ; qu'en s'abstenant ainsi de répondre à cette argumentation qui n'était pas inopérante, elle\
    \ a entaché son arrêt d'une insuffisance de motifs ; que la COMMUNE DE LA PLAINE-DES-PALMISTES est ainsi fondée à demander\
    \ l'annulation de celui-ci, sans qu'il soit besoin d'examiner les autres moyens de son pourvoi ; qu'il y a lieu, dans\
    \ les circonstances de l'espèce, de mettre à la charge de M. A la somme de 3 000 euros à verser à la COMMUNE DE LA PLAINE-DES-PALMISTES\
    \ au titre des dispositions de l'article L. 761-1 du code de justice administrative ; que ces mêmes dispositions font\
    \ obstacle à ce qu'une somme soit mise à ce titre à la charge de la commune qui n'est pas, dans la présente instance,\
    \ la partie perdante ;<br>\n<br>\n<br>\n<br>D E C I D E :<br>\n--------------<br>\nArticle 1er : L'arrêt de la cour administrative\
    \ d'appel de Bordeaux du 14 décembre 2010 est annulé.<br>\nArticle 2 : L'affaire est renvoyée à la cour administrative\
    \ d'appel de Bordeaux.<br>\nArticle 3 : M. A versera à la COMMUNE DE LA PLAINE-DES-PALMISTES une somme de 3 000 euros\
    \ au titre de l'article L. 761-1 du code de justice administrative.<br>\nArticle 4 : Les conclusions de M. A présentées\
    \ au titre des dispositions de l'article L. 761-1 du code de justice administrative sont rejetées.<br>\nArticle 5 : La\
    \ présente décision sera notifiée à la COMMUNE DE LA PLAINE-DES-PALMISTES et à M. Joël A. <br>\nCopie en sera adressée\
    \ pour information au ministre de l'intérieur.<br>\n<br> None"
  - 'Cour administrative d''appel de Nantes, 3e chambre, du 30 décembre 1996, 95NT01097, inédit au recueil Lebon <br>    Vu
    la requête, enregistrée au greffe de la cour le 28 juillet 1995, présentée pour le DISTRICT DE L''AGGLOMERATION ANGEVINE,
    dont le siège est à Angers, représenté par son président en exercice, par Me X... COLLIN, avocat ;<br>    Le DISTRICT
    DE L''AGGLOMERATION ANGEVINE demande à la cour :<br>    1 ) d''annuler le jugement n 94354 du 1er juin 1995 par lequel
    le Tribunal administratif de Nantes a annulé, à la demande de M. Y..., la décision du 10 décembre 1993 lui infligeant
    une sanction disciplinaire d''exclusion temporaire de fonctions d''un jour ;<br>    2 ) de rejeter la demande de M. Y...
    présentée devant le tribunal administratif ;<br>    Vu les autres pièces du dossier ;<br>    Vu la loi n 84-53 du 26 janvier
    1984 modifiée ;<br>    Vu le code des tribunaux administratifs et des cours administratives d''appel ;<br>    Vu la loi
    n 87-1127 du 31 décembre 1987 ;<br>    Les parties ayant été régulièrement averties du jour de l''audience ;<br>    Après
    avoir entendu au cours de l''audience publique du 19 décembre 1996 :<br>    - le rapport de Mme LISSOWSKI, conseiller,<br>    -
    les observations de Me COLLIN, avocat du DISTRICT DE L''AGGLOMERATION ANGEVINE,<br>    - et les conclusions de Mme COËNT-BOCHARD,
    commissaire du gouvernement ;<br>

    <br>    Considérant qu''aux termes des dispositions de l''article 89 de la loi du 26 janvier 1984 modifiée portant dispositions
    statutaires relatives à la fonction publique territoriale :  "les sanctions disciplinaires sont réparties en quatre groupes  :  premier
    groupe : - l''avertissement ; - le blâme ; - l''exclusion temporaire de fonctions pour une durée maximale de 5 jours ..."
    ;<br>    Considérant que, pour infliger à M. Y..., sapeur-pompier professionnel, la sanction d''exclusion temporaire de
    fonctions pour une durée d''un jour, le président du DISTRICT URBAIN DE L''AGGLOMERATION ANGEVINE s''est fondé sur le
    fait que malgré l''ordre qui avait été donné aux sapeurs-pompiers, par note de service du 17 mars 1993, de procéder, sous
    peine de sanctions disciplinaires, à l''enlèvement des slogans revendicatifs peints sur les véhicules de service, l''intéressé
    a refusé d''obtempérer ; qu''il lui était également reproché de s''être rendu, en tenue réglementaire, à la manifestation
    publique qui s''est déroulée à Angers le 18 mars 1993 ;<br>    Considérant que le Tribunal administratif de Nantes a annulé
    cette décision au motif que ni le refus d''obéissance reproché à l''intéressé, ni sa présence, revêtu de sa tenue réglementaire
    dans la cour du centre de secours au moment de le quitter pour se diriger vers une manifestation syndicale, n''étaient
    établis par les pièces du dossier ;<br>    Considérant qu''il résulte des pièces produites en appel et notamment des attestations
    signées par le chef de corps le 24 mai 1994 et par le directeur du district le 6 juillet 1995, dont les énonciations sont
    corroborées, en particulier, par les deux rapports concernant les journées des 17 et 18 mars 1993, que M. Y... était présent
    lors du rassemblement au cours duquel a été lue la note de service ; qu''ainsi il ne pouvait ignorer les ordres qui avaient
    été donnés ; que ce comportement était à lui seul de nature à justifier légalement la sanction disciplinaire qui lui a
    été infligée ; que dès lors le DISTRICT DE L''AGGLOMERATION ANGEVINE est fondé à soutenir que c''est à tort que, par le
    jugement attaqué, le Tribunal administratif de Nantes a annulé la décision du 10 décembre 1993 portant sanction disciplinaire
    à l''encontre de M. Y... ;<br>    Considérant toutefois qu''il appartient à la Cour administrative d''appel de Nantes,
    saisie de l''ensemble du litige par l''effet dévolutif de l''appel d''examiner les autres moyens soulevés par M. Y...
    devant le tribunal administratif ;<br>    Considérant, d''une part, qu''aucune disposition législative ou régle-mentaire
    n''enferme dans un délai déterminé l''exercice de l''action disciplinaire à l''égard des fonctionnaires territoriaux,
    lesquels ne peuvent utilement se prévaloir de dispositions des articles L.122-41 et L.122-44 du code du travail ;<br>    Considérant,
    d''autre part, que le détournement de pouvoir allégué n''est pas établi ;<br>    Considérant qu''il résulte de ce qui
    précède qu''il y a lieu d''annuler le jugement susvisé du Tribunal administratif de Nantes et de rejeter la demande présentée
    par M. Y... devant le tribunal ;<br>    Sur les conclusions tendant à l''allocation des sommes non comprises dans les
    dépens :<br>

    <br>    Considérant qu''aux termes de l''article L.8-1 du code des tribunaux administratifs et des cours administratives
    d''appel : "Dans toutes les instances devant les tribunaux administratifs et les cours administratives d''appel, le juge
    condamne la partie tenue aux dépens ou, à défaut, la partie perdante, à payer à l''autre partie la somme qu''il détermine
    au titre des frais exposés et non compris dans les dépens. Le juge tient compte de l''équité ou de la situation économique
    de la partie condamnée. Il peut, même d''office, pour des raisons tirées des mêmes considérations, dire qu''il n''y a
    pas lieu à cette condamnation" ;<br>    Considérant que les dispositions de l''article L.8-1 du code des tribunaux administratifs
    et des cours administratives d''appel font obstacle à ce que le DISTRICT DE L''AGGLOMERATION ANGEVINE soit condamné à
    verser à M. Y..., partie perdante à la présente instance, les frais qu''il a exposés et non compris dans les dépens ;<br>Article
    1er : Le jugement du Tribunal administratif de Nantes en date du 1er juin 1995 est annulé.<br>Article 2 : La demande présentée
    par M. Y... devant le Tribunal administratif de Nantes est rejetée.<br>Article 3 : Les conclusions de M. Y... tendant
    à l''application de l''article L.8-1 du code des tribunaux administratifs et des cours administratives d''appel sont rejetées.<br>Article
    4 : Le présent arrêt sera notifié au DISTRICT DE L''AGGLOMERATION ANGEVINE, à M. Y... et au ministre de la fonction publique,
    de la réforme de l''Etat et de la décentralisation.<br> None'
