  - "Conseil d'État, 4ème - 5ème chambres réunies, 04/12/2017, 411438, Inédit au recueil Lebon Vu la procédure suivante :<br>\n\
    <br>\n              Par un mémoire, enregistré le 12 septembre 2017 au secrétariat du contentieux du Conseil d'Etat, la\
    \ société Sudelvet Conseil demande au Conseil d'Etat, en application de l'article 23-5 de l'ordonnance n° 58-1067 du 7\
    \ novembre 1958 et à l'appui de sa requête tendant à l'annulation, pour excès de pouvoir, du décret n° 2017-514 du 10\
    \ avril 2017 relatif à la réforme de l'ordre des vétérinaires, de renvoyer au Conseil constitutionnel la question de la\
    \ conformité aux droits et libertés garantis par la Constitution des dispositions de l'article L. 242-2 du code rural\
    \ et de la pêche maritime.<br>\n<br>\n              Vu les autres pièces du dossier ;<br>\n<br>\n              Vu :<br>\n\
    \              - la Constitution, notamment son Préambule et son article 61-1 ; <br>\n              - l'ordonnance n°\
    \ 58-1067 du 7 novembre 1958 ;<br>\n              - l'article L. 242-2 du code rural et de la pêche maritime ;<br>\n \
    \             - le décret n° 2017-514 du 10 avril 2017 ; <br>\n              - le code de justice administrative ;<br>\n\
    <br>\n<br>\n<br>\n              Après avoir entendu en séance publique :<br>\n<br>\n              - le rapport de Mme\
    \ Céline Roux, maître des requêtes,  <br>\n<br>\n              - les conclusions de M. Frédéric Dieu, rapporteur public\
    \ ;<br>\n<br>\n              La parole ayant été donnée, avant et après les conclusions, à la SCP Spinosi, Sureau, avocat\
    \ de la société Sudelvet Conseil ;<br>\n<br>\n<br>\n<br>\n<br>\n              1. Considérant qu'aux termes du premier\
    \ alinéa de l'article 23-5 de l'ordonnance du 7 novembre 1958 portant loi organique sur le Conseil constitutionnel : \"\
    \ Le moyen tiré de ce qu'une disposition législative porte atteinte aux droits et libertés garantis par la Constitution\
    \ peut être soulevé (...) à l'occasion d'une instance devant le Conseil d'Etat (...) \" ; qu'il résulte des dispositions\
    \ de ce même article que le Conseil constitutionnel est saisi de la question prioritaire de constitutionnalité à la triple\
    \ condition que la disposition contestée soit applicable au litige ou à la procédure, qu'elle n'ait pas déjà été déclarée\
    \ conforme à la Constitution dans les motifs et le dispositif d'une décision du Conseil constitutionnel, sauf changement\
    \ de circonstances, et que la question soit nouvelle ou présente un caractère sérieux ;<br>\n<br>\n              2. Considérant\
    \ que la société Sudelvet Conseil conteste, à l'appui d'un recours pour excès de pouvoir dirigé contre le décret du 10\
    \ avril 2017 relatif à la réforme de l'ordre des vétérinaires, la constitutionnalité des dispositions de l'article L.\
    \ 242-2 du code rural et de la pêche maritime aux termes desquelles : \" Les personnes exerçant la profession de vétérinaire\
    \ peuvent détenir des participations financières dans les sociétés de toute nature, sous réserve, s'agissant des prises\
    \ de participation dans des sociétés ayant un lien avec l'exercice de la profession vétérinaire, que celles-ci soient\
    \ portées à la connaissance de l'ordre des vétérinaires. Les modalités du contrôle exercé par l'ordre, tendant à ce que\
    \ les prises de participation ne mettent pas en péril l'exercice de la profession vétérinaire, notamment s'agissant de\
    \ la surveillance sanitaire des élevages, l'indépendance des vétérinaires ou le respect par ces derniers des règles inhérentes\
    \ à leur profession, sont précisées par voie réglementaire \" ;<br>\n<br>\n              3. Considérant, en premier lieu,\
    \ qu'en imposant aux vétérinaires de porter à la connaissance de leur ordre les participations financières qu'ils prennent\
    \ dans certaines sociétés, ces dispositions visent à permettre à ce dernier d'exercer la mission de contrôle qui lui est\
    \ impartie par l'article L. 242-1 du code rural et de la pêche maritime, aux termes duquel : \" l'ordre des vétérinaires\
    \ veille au respect des principes d'indépendance, de moralité et de probité, à l'observation des règles déontologiques,\
    \ en particulier du secret professionnel, et à l'entretien des compétences indispensables à l'exercice de la profession\
    \ de vétérinaire (...) \" ; que si les dispositions législatives contestées ont pour objet de permettre, le cas échéant,\
    \ en cas de prise de participation financière contraire aux règles déontologiques qui gouvernent la profession, l'exercice\
    \ de poursuites disciplinaires par les instances ordinales compétentes, elles ne portent pas, par elles-mêmes, atteinte\
    \ au droit de propriété protégé par l'article 2 de la Déclaration des droits de l'homme et du citoyen de 1789 et, par\
    \ suite, ne méconnaissent pas l'étendue de la compétence que l'article 34 de la Constitution confère au législateur pour\
    \ fixer les principes fondamentaux du régime de la propriété ; <br>\n              4. Considérant, en second lieu, que\
    \ l'obligation d'information prévue par les dispositions législatives contestées porte sur les seules prises de participation\
    \ dans des sociétés ayant un lien avec l'exercice de la profession de vétérinaire ; qu'ainsi, eu égard à la finalité de\
    \ ces informations, qui est de prévenir l'existence de conflits d'intérêts préjudiciables à l'exercice de la profession\
    \ de vétérinaire, et compte tenu de ce qu'elles ont pour destinataire exclusif l'instance compétente de l'ordre des vétérinaires,\
    \ dont les membres sont soumis au secret professionnel, l'obligation ainsi instituée ne porte pas une atteinte disproportionnée\
    \ au droit au respect de la vie privée, garanti par l'article 2 de la Déclaration des droits de l'homme et du citoyen\
    \ de 1789 et ne méconnaît pas l'étendue de la compétence que l'article 34 de la Constitution confère au législateur pour\
    \ fixer les règles concernant les droits civiques et les garanties fondamentales accordées aux citoyens pour l'exercice\
    \ des libertés publiques ; <br>\n<br>\n              5. Considérant qu'il résulte de tout ce qui précède que la question\
    \ soulevée par la société Sudelvet Conseil, qui n'est pas nouvelle, ne présente pas un caractère sérieux ; que, par suite,\
    \ sans qu'il soit besoin de renvoyer au Conseil constitutionnel la question prioritaire de constitutionnalité invoquée,\
    \ le moyen tiré de ce que l'article L. 242-2 du code rural et de la pêche maritime porte atteinte aux droits et libertés\
    \ garantis par la Constitution doit être écarté ;<br>\n<br>\n<br>\n<br>\n<br>\n              \t\t\t\tD E C I D E :<br>\n\
    \              \t\t\t\t--------------<br>\n<br>\nArticle 1er : Il n'y a pas lieu de renvoyer au Conseil constitutionnel\
    \ la question prioritaire de constitutionnalité soulevée par la société Sudelvet Conseil.<br>\nArticle 2 : La présente\
    \ décision sera notifiée à la société Sudelvet Conseil, au Premier ministre et au ministre de l'agriculture et de l'alimentation.<br>\n\
    Copie en sera adressée au Conseil constitutionnel.<br>\n<br> None"
- source_sentence: "CAA de NANTES, 3ème chambre, 07/03/2025, 24NT00708, Inédit au recueil Lebon Vu la procédure suivante :<br>\n\
    <br>\n       Procédure contentieuse antérieure :<br>\n<br>\n       M. A... B... a demandé au tribunal administratif de\
    \ Caen d'annuler la décision du 23 août 2023 par laquelle le directeur du conseil national des activités privées de sécurité\
    \ (CNAPS) a refusé de renouveler sa carte professionnelle d'agent de sécurité privée. <br>\n<br>\n       Par un jugement\
    \ n° 2302551 du 9 février 2024, le tribunal administratif de Caen a annulé cette décision et a enjoint au directeur du\
    \ CNAPS de délivrer à M. B... une carte professionnelle l'autorisant à exercer les activités de sécurité privée.<br>\n\
    <br>\n       Procédure devant la cour :<br>\n<br>\n       Par une requête enregistrée le 11 mars 2024, le Conseil national\
    \ des activités privées de sécurité, représenté par Me Claisse, demande à la cour :<br>\n<br>\n       1°) d'annuler ce\
    \ jugement du tribunal administratif de Caen du 9 février 2024 ;<br>\n<br>\n       2°) de rejeter la demande présentée\
    \ devant le tribunal administratif de Caen par M. B... ;<br>\n<br>\n       3°) de mettre à la charge de\tM. B... le versement\
    \ de la somme de 500 euros au titre de l'article L.761-1 du code de justice administrative.<br>\n<br>\n       Il soutient\
    \ que les faits reprochés à M. B... sont contraires à tous les principes de la profession et caractérisent un comportement\
    \ diamétralement opposé à ce que recouvrent les missions d'un agent de sécurité privée.<br>\n<br>\n       Par un mémoire\
    \ en défense, enregistré le 22 avril 2024, M. A... B..., représenté par Me Luchez, conclut au rejet de la requête et à\
    \ ce que la somme de 2 000 euros soit mise à la charge du CNAPS au titre de l'article L. 761-1 du code de justice administrative.<br>\n\
    <br>\n       Il soutient que les moyens soulevés par le CNAPS ne sont pas fondés.<br>\n<br>\n       Vu les autres pièces\
    \ du dossier.<br>\n<br>\n       Vu :<br>\n       - Vu le code de procédure pénale ; <br>\n       - le code de la sécurité\
    \ intérieure ; <br>\n       - le code de justice administrative.<br>\n<br>\n       Les parties ont été régulièrement averties\
    \ du jour de l'audience.<br>\n<br>\n       Ont été entendus au cours de l'audience publique :<br>\n       - le rapport\
    \ de Mme Gélard,<br>\n       - les conclusions de M. Catroux, rapporteur public,<br>\n       - les observations de Me\
    \ Lacoeuilhe, substituant Me Claisse, pour le CNAPS,<br>\n       - et les observations de Me Luchez, représentant M. B....<br>\n\
    <br>\n<br>\n       Considérant ce qui suit :<br>\n<br>\n       1. M. A... B... détenait depuis le 7 juin 2018 une carte\
    \ professionnelle valable pour une durée de 5 ans lui permettant d'assurer des missions privées de sécurité. Par une décision\
    \ du 23 août 2023, le directeur du Conseil national des activités privées de sécurité (CNAPS), établissement public administratif\
    \ placé sous la tutelle du ministre de l'intérieur, chargé de délivrer ces autorisations, a refusé de renouveler sa carte\
    \ professionnelle. Le CNAPS relève appel du jugement du 9 février 2024, par lequel le tribunal administratif de Caen a\
    \ annulé cette décision.<br>\nSur les conclusions à fin d'annulation :<br>\n       2. Aux termes de l'article L. 611-1\
    \ du code de la sécurité intérieure : \" Sont soumises aux dispositions du présent titre, dès lors qu'elles ne sont pas\
    \ exercées par un service public administratif, les activités qui consistent : 1° A fournir des services ayant pour objet\
    \ la surveillance humaine ou la surveillance par des systèmes électroniques de sécurité ou le gardiennage de biens meubles\
    \ ou immeubles ainsi que la sécurité des personnes se trouvant dans ces immeubles ou dans les véhicules de transport public\
    \ de personnes (...) \". Aux termes de l'article L. 612-20 du même code : \" Nul ne peut être employé ou affecté pour\
    \ participer à une activité mentionnée à l'article L. 611-1 : / (...) / 2° S'il résulte de l'enquête administrative, \
    \ (...) que son comportement ou ses agissements sont contraires à l'honneur, à la probité, aux bonnes mœurs ou sont de\
    \ nature à porter atteinte à la sécurité des personnes ou des biens, à la sécurité publique ou à la sûreté de l'Etat et\
    \ sont incompatibles avec l'exercice des fonctions susmentionnées (...)\". Par ailleurs, aux termes de l'article 41-2\
    \ du code de procédure pénale :  \" Le procureur de la République, tant que l'action publique n'a pas été mise en mouvement,\
    \ peut proposer, directement ou par l'intermédiaire d'une personne habilitée, une composition pénale à une personne physique\
    \ qui reconnaît avoir commis un ou plusieurs délits punis à titre de peine principale d'une peine d'amende ou d'une peine\
    \ d'emprisonnement d'une durée inférieure ou égale à cinq ans, ainsi que, le cas échéant, une ou plusieurs contraventions\
    \ connexes (...) \".<br>\n       3. Il appartient à l'autorité administrative d'apprécier, à l'issue de l'enquête administrative,\
    \ et sous le contrôle du juge de l'excès de pouvoir, si le comportement de la personne qui sollicite la délivrance ou\
    \ le renouvellement d'une carte professionnelle est compatible avec l'exercice de la profession d'agent privé de sécurité.\
    \ Pour ce faire, l'autorité administrative procède, sous le contrôle du juge de l'excès de pouvoir, à une appréciation\
    \ globale de l'ensemble des éléments dont elle dispose.<br>\n       4. Il ressort des pièces du dossier que M. B..., a\
    \ été placé en garde à vue pendant <br>\n15 heures pour des faits de violences conjugales commis le 2 mai 2023 sur sa\
    \ compagne. L'intéressé soutient qu'en réalité, il s'est borné à la repousser alors qu'elle voulait l'empêcher de sortir\
    \ de leur domicile et qu'elle aurait alors heurté le lit en tombant. Il est toutefois constant que M. B... a participé\
    \ à un stage de responsabilisation pour la prévention et la lutte contre les violences au sein du couple et sexistes,\
    \ qui lui a été imposé dans le cadre d'une composition pénale, laquelle en vertu des dispositions précitées de l'article\
    \ 41-2 du code de procédure pénale n'est possible que lorsque le prévenu a reconnu avoir commis un ou plusieurs délits.\
    \ Par ailleurs, lors d'un contrôle inopiné des forces de l'ordre, le 10 mai suivant, il a été constaté que le requérant\
    \ conduisait un véhicule qui n'était pas assuré. Pour démontrer sa bonne foi, il se borne à faire valoir que le véhicule\
    \ avait été acquis avec son ancienne compagne dans le cadre d'une location avec option d'achat, que le certificat d'immatriculation\
    \ était au nom de cette dernière, et qu'elle avait résilié le contrat d'assurance sans le prévenir à la suite de leur\
    \ rupture. De plus, ces agissements qui présentaient, à la date de la décision contestée, un caractère très récent, ont\
    \ été commis alors que M. B... exerçait déjà des missions portant sur l'accueil, la prévention et la sécurité des biens\
    \ et des personnes. Par suite, le directeur du CNAPS a pu, sans entacher sa décision d'une erreur d'appréciation, estimer\
    \ qu'ils révélaient un comportement de M. B... contraire à l'honneur et aux bonnes mœurs et de nature à porter atteinte\
    \ à la sécurité des personnes, et qu'il était incompatible avec l'exercice d'une activité professionnelle d'agent de sécurité\
    \ privée. Ainsi, en refusant de renouveler sa carte professionnelle, le directeur du CNAPS n'a pas fait une inexacte application\
    \ des dispositions de l'article L. 612-20 du code de la sécurité intérieure.<br>\n       5. Il résulte de tout ce qui\
    \ précède, que le CNAPS est fondé à soutenir que c'est à tort que, par le jugement attaqué, le tribunal administratif\
    \ de Caen a annulé sa décision du 23 août 2023.<br>\n<br>\n       Sur les frais liés au litige :<br>\n<br>\n       6.\
    \ Les dispositions de l'article L. 761-1 du code de justice administrative font obstacle à ce que soit mis à la charge\
    \ du CNAPS, qui n'est pas, dans la présente instance, la partie perdante, le versement à M. B... de la somme qu'il demande\
    \ au titre des frais exposés et non compris dans les dépens. Dans les circonstances de l'espèce, il n'y a pas davantage\
    \ lieu de mettre à la charge de M. B... le versement au CNAPS de la somme qu'il sollicite au titre des mêmes frais. <br>\n\
    <br>\nDÉCIDE :<br>\nArticle 1er : \tLe jugement n° 2302551 du 9 février 2024 du tribunal administratif de Caen est annulé.<br>\n\
    Article 2 : \tLa demande présentée devant le tribunal administratif de Caen par M. B... tendant à l'annulation de la décision\
    \ du 23 août 2023 ainsi que ses conclusions d'appel sont rejetées. <br>\nArticle 3 : \tLes conclusions présentées par\
    \ le CNAPS sur le fondement de l'article L.761-1 du code de justice administrative sont rejetées.<br>\nArticle 4 : \t\
    Le présent arrêt sera notifié au Conseil national des activités privées de sécurité et à M. A... B....<br>\n       Délibéré\
    \ après l'audience du 13 février 2025, à laquelle siégeaient :<br>\n       - Mme Brisson, présidente de chambre,<br>\n\
    \       - M. Vergne, président-assesseur,<br>\n       - Mme Gélard, première conseillère.<br>\n<br>\n<br>\n       Rendu\
    \ public par mise à disposition au greffe, le 7 mars 2025.<br>\nLa rapporteure,<br>\nV. GELARDLa présidente,<br>\nC. BRISSON\
    \ <br>\nLe greffier,<br>\nR. MAGEAU<br>\n<br>\n<br>\n       La République mande et ordonne au ministre d'Etat, ministre\
    \ de l'intérieur en ce qui le concerne, et à tous commissaires de justice à ce requis en ce qui concerne les voies de\
    \ droit commun contre les parties privées, de pourvoir à l'exécution de la présente décision.<br>\n<br>\n<br>\n<br>\n\
    2<br>\nN° 24NT00708<br>\n<br>\n<br>\n<br> None"
