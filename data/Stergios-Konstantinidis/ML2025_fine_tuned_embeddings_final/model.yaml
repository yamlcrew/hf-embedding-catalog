  - 'Bundesgericht Tribunal fédéral Tribunale federale Tribunal federal 4A_532/2017 Arrêt du 5 avril 2018 Ire Cour de droit
    civil Composition Mmes les Juges fédérales Kiss, présidente, Klett et May Canellas. Greffière: Mme Monti. Participants
    à la procédure A.________ SA, représentée par Me Patrick Fontana, recourante, contre B.________, représenté par Me Raymond
    Didisheim, intimé, Objet contrat d''entreprise; recours en matière civile contre le jugement rendu le 31 août 2017 par
    la Cour civile II du Tribunal cantonal du canton du Valais (C1 15 328). Faits : A. A.a. Le 6 juin 2005, l''entreprise
    de construction A.________ SA et le ressortissant néerlandais B.________ ont conclu un «contrat de construction» par lequel
    la première se chargeait d''effectuer une étude, puis d''édifier un chalet et un garage sur la parcelle dont le second
    était propriétaire dans la commune de... (VD). La société précitée pouvait choisir les entreprises et fournisseurs nécessaires
    à l''exécution du contrat. Les parties ont convenu d''un prix «forfaitaire» de 1''084''000 fr., TVA incluse. La liste
    des prestations comprises dans ce prix figurait dans un descriptif de construction s''étendant sur plus d''une vingtaine
    de pages, qui était annexé au contrat. Ce dernier énonçait par ailleurs une liste de travaux et frais hors forfait devisés
    à 60''251 fr., dont 37''651 fr. pour différents travaux de «viabilité» (voies d''accès, branchements d''eau, électricité,
    égouts et terrassements) et 22''600 fr. pour des taxes et frais divers. L''article IV.D du contrat de construction avait
    la teneur suivante: « Réception de l''ouvrage Dès l''achèvement des travaux prévus au contrat, et avant toute occupation,
    le constructeur proposera au client la date de visite de réception de la construction puis une seconde date pour la remise
    des clés. Par la réception des clefs, le client reconnaît l''ouvrage en ordre et conforme au contrat et à ses désirs.
    En cas de réserves, la remise des clés sera reportée jusqu''à la levée de celles-ci.» Les parties ont fait élection de
    for à... (VS), où se trouvait le siège de l''entreprise de construction; elles ont déclaré applicable le droit de ce for.
    A.b. Le 28 juillet 2005, l''entreprise de construction a adjugé à la société X.________ SA des travaux de terrassement,
    maçonnerie et béton pour le chalet (128''000 fr., TVA comprise) et le garage (58''000 fr.). Cette adjudicataire a réalisé
    certains travaux qui étaient compris dans le prix forfaitaire du contrat de construction. A.c. A la fin de l''année 2006,
    une entreprise de menuiserie sous-traitante a remis les clés de l''ouvrage à B.________ après avoir posé les serrures.
    Le prénommé (ci-après: le maître de l''ouvrage) a entreposé du mobilier provenant de son appartement vendu, en le stockant
    essentiellement dans le garage. Le 11 décembre 2006, la commune de... (VD) a constaté que les travaux réalisés dans le
    chalet étaient conformes aux plans mis à l''enquête. Le 6 mars 2007, le maître de l''ouvrage et un représentant de l''entreprise
    de construction, soit le directeur des travaux R1.________, se sont rencontrés dans le chalet. Le lendemain, le directeur
    a adressé au maître un courriel contenant une liste des travaux de finalisation et de retouches à entreprendre, en le
    priant de la contrôler et de la lui renvoyer afin qu''il puisse contacter les sous-traitants concernés. Réagissant par
    courriel du 9 mars 2007, le maître a fait état «encore une fois» de nombreuses malfaçons qu''il a énoncées dans une liste
    détaillant les problèmes pièce par pièce. A.d. En mai 2007, la sous-traitante X.________ SA a invité l''entreprise de
    construction à lui remettre son décompte définitif afin qu''elle puisse établir sa propre facture finale. L''entreprise
    a répondu comme il suit le 19 juin 2007: «Forfait signé spécifiquement sans les raccordements, sans les voies d''accès
    et les aménagements extérieurs, exclusivement maçonnerie. Facturer à A.________ SA le forfait de Fr. 154''490.- et les
    travaux complémentaires de Fr. 19''000.- Les terrassements, fouilles, canalisations, accès et aménagements extérieurs
    doivent être facturés au client en direct, selon contrat.» Le 6 juillet 2007, X.________ SA a adressé directement au maître
    de l''ouvrage une «facture finale» de 92''220 fr. (montant arrondi) comprenant les quatre postes suivants: - 42''510 fr.,
    correspondant aux «montants globaux selon adjudication y compris complément» pour les «chalet et garage» (197''000 fr.),
    après déduction du montant facturé à A.________ SA (154''490 fr.); - 10''086 fr. 80 pour les «canalisations extérieures
    et raccordements aux réseaux existants»; - 12''814 fr. pour les «route d''accès et place devant chalet et garage»; - 26''810
    fr. 15 pour des «travaux complémentaires pour garage», dont 19''374 fr. 20 pour la réalisation d''une paroi clouée. Au
    contraire du premier poste extrêmement succinct, les trois autres postes détaillaient les prestations effectuées en indiquant
    les quantités et prix des matériaux utilisés. Dans sa lettre d''accompagnement, X.________ SA précisait que l''envoi de
    cette facture faisait «suite aux instructions [...] reçues de A.________ SA». Le maître a refusé de la payer. A.e. Le
    17 janvier 2008, le maître, en se référant à la visite de son chalet effectuée le 10 janvier, a adressé à l''entreprise
    de construction un courrier récapitulatif énonçant une série de défauts et évoquant les assurances qu''elle lui avait
    données, à savoir qu''elle allait résoudre tous les problèmes de son chalet en donnant les instructions nécessaires aux
    sous-traitants, dont X.________ SA et l''entreprise de menuiserie. A.f. Le 13 mai 2009, le maître de l''ouvrage et le
    directeur de l''entreprise de construction R2.________ se sont rencontrés. Celui-ci, par courriel du 20 mai, a adressé
    au maître un document comprenant une description des travaux restant à effectuer par l''entreprise de menuiserie sous-traitante
    (A), une liste détaillée des réductions de prix (B) et un décompte final (C). A.g. Dans un courrier du 10 juin 2009, le
    maître a déploré que l''entreprise de construction n''ait pas tenu ses promesses de donner les instructions nécessaires
    tant à l''entreprise de menuiserie qu''à X.________ SA, laquelle devait régler les problèmes de la conduite d''eau du
    garage. Ce nouveau retard après deux ans d''attente le plaçait dans la situation de devoir lui-même donner les instructions
    aux entrepreneurs concernés et les payer directement. Le maître précisait encore que les montants versés à ce titre seraient
    déduits de la facture finale. B. B.a. Le 25 janvier 2012, l''entreprise de construction a déposé une requête de conciliation
    contre le maître de l''ouvrage, puis a porté l''action le 15 juin 2012 devant le Tribunal du district de Sion. Dans ses
    dernières conclusions, elle prétendait au paiement de 54''200 fr. comme «solde du contrat forfaitaire» et de 92''220 fr.
    pour des «travaux complémentaires et supplémentaires exécutés» par X.________ SA. Le maître a pris des conclusions libératoires
    et opposé en compensation une créance en réduction de prix fondée sur des défauts de l''ouvrage. B.b. Une expertise judiciaire
    a été confiée à un architecte. L''expert a retenu des moins-values à concurrence de 81''865 fr. 40, résultant d''une part
    de divergences avec le descriptif des travaux (54''532 fr.), d''autre part de malfaçons proprement dites (27''333 fr.
    40). Il a par ailleurs retenu une plus-value de 4''000 fr. B.c. Par jugement du 10 novembre 2015, le Juge du district
    de... (VS) a rejeté la demande. En bref, il a retenu que l''entreprise de construction avait une créance de 74''200 fr.
    envers le maître, soit 54''200 fr. d''impayé sur le prix forfaitaire et 20''000 fr. pour des travaux exécutés hors forfait
    par la sous-traitante X.________ SA. Cela étant, le maître pouvait opposer en compensation une créance de 77''865 fr.
    40 en réduction du prix de l''ouvrage, compte tenu des défauts constatés par l''expert (81''865 fr. 40 - 4''000 fr. de
    plus-value). B.d. Statuant le 31 août 2017 sur appel de l''entreprise de construction, le Tribunal cantonal valaisan a
    confirmé cette décision en procédant à une substitution de motifs sur certains points. En substance, les juges cantonaux
    ont retenu que les parties s''étaient liées par un contrat d''entreprise totale; le maître de l''ouvrage n''avait pas
    eu de relation contractuelle avec les entreprises sous-traitantes telles que X.________ SA. L''entrepreneur total avait
    droit au solde impayé du prix forfaitaire, soit 54''200 fr. Par ailleurs, sur le montant total de 92''220 fr. réclamé
    pour les travaux accomplis par la sous-traitante précitée (let. A.d supra), les postes de 10''086 fr. 80, 12''814 fr.
    et 26''810 fr. 15 représentaient des travaux hors forfait à la charge du maître; par contre, il n''était pas prouvé que
    le poste de 42''510 fr. concernait des travaux hors forfait. L''entreprise demanderesse avait ainsi une créance de 103''910
    fr. 95 (54''200 fr. + 10''086 fr. 80 + 12''814 fr. + 26''810 fr. 15), dont à déduire le paiement de 37''651 fr. opéré
    par le maître. La créance s''élevait en définitive à 66''259 fr. 95. Cela étant, le maître pouvait opposer en compensation
    une créance de 77''865 fr. 40. Les moins-values constatées par l''expert constituaient juridiquement des défauts de l''ouvrage.
    Il n''était pas contesté que la liste du 9 mars 2007 détaillant les défauts constatés lors de la visite du chalet le 6
    mars constituait un avis valable quant à son contenu. Le respect du délai d''avis était en revanche discuté. Il n''était
    pas nécessaire d''examiner si l''entrepreneur avait failli à un éventuel devoir d''alléguer le caractère prétendument
    tardif d''un tel avis. En l''occurrence, l''avis du 9 mars 2007 avait été donné en temps utile. Eu égard au déroulement
    des faits et à l''article IV.D du contrat qui l''emportait sur le régime des art. 367 et 370 CO, il fallait considérer
    que le devoir de vérifier l''ouvrage avait été suspendu jusqu''au 6 mars 2007; l''avis signifié le 9 mars répondait ainsi
    aux exigences de célérité posées par la jurisprudence fédérale. Par surabondance, l''entreprise de construction était
    forclose à se plaindre de la tardiveté de l''avis des défauts; elle avait elle-même établi une liste de travaux de réparations
    le 7 mars 2007 et était entrée en matière sur les demandes d''élimination des défauts présentées les 9 mars 2007 et 17
    janvier 2008. Le maître avait commencé par demander la réfection de l''ouvrage, mais l''inaction de la partie adverse
    lui avait permis de recouvrer l''ensemble des prérogatives offertes par l''art. 368 CO. Il était dès lors fondé à demander
    une réduction de prix. C. L''entreprise de construction (ci-après: la recourante) a saisi le Tribunal fédéral d''un recours
    en matière civile à l''issue duquel elle conclut à ce que le maître de l''ouvrage soit condamné à lui payer 54''200 fr.
    à titre de «solde du contrat forfaitaire» et 92''220 fr. pour les «travaux complémentaires et supplémentaires exécutés».
    Le maître de l''ouvrage (ci-après: l''intimé) a conclu au rejet du recours dans la mesure de sa recevabilité. L''autorité
    précédente a observé que la recourante n''avait « sauf erreur (...) pas entrepris la motivation - indépendante - selon
    laquelle elle était forclose à se plaindre de la tardiveté de l''avis des défauts (...) ». La recourante a répliqué, donnant
    lieu à une duplique de l''intimé. Considérant en droit : 1. Les conditions de recevabilité du recours en matière civile
    sont réalisées sur le principe, notamment celles afférentes au délai (art. 100 al. 1 LTF) et à la valeur litigieuse minimale
    de 30''000 fr. (art. 74 al. 1 let. b LTF). Demeure réservé l''examen de la recevabilité des différents griefs. 2. 2.1.
    Le Tribunal fédéral applique le droit d''office (art. 106 al. 1 LTF). Eu égard, toutefois, à l''exigence de motivation
    qu''impose l''art. 42 al. 2 LTF sous peine d''irrecevabilité (art. 108 al. 1 let. b LTF), il n''examine d''ordinaire que
    les griefs invoqués, sauf en cas d''erreurs juridiques manifestes (ATF 140 III 115 consid. 2). Pour les droits fondamentaux
    - telle la protection contre l''arbitraire garantie par l''art. 9 Cst. - prévaut le principe d''allégation (art. 106 al.
    2 LTF) : le justiciable doit expressément soulever le grief et exposer de manière claire et circonstanciée, si possible
    documentée, en quoi consiste la violation du droit constitutionnel invoqué (ATF 142 III 364 consid. 2.4 p. 368; 135 III
    232 consid. 1.2; 134 II 244 consid. 2.2). Lorsque la décision attaquée comporte plusieurs motivations indépendantes dont
    chacune suffit à sceller le sort de la cause, le recourant doit s''attaquer à chacune d''elles conformément aux art. 42
    al. 2 et 106 al. 2 LTF, sous peine d''irrecevabilité (ATF 142 III 364 consid. 2.4 p. 368; 133 IV 119 consid. 6.3; sous
    l''OJ, ATF 111 II 397). 2.2. Le Tribunal fédéral statue sur la base des faits établis par l''autorité précédente (art.
    105 al. 1 LTF). Il ne peut rectifier ou compléter ces constatations de fait que si elles sont manifestement inexactes
    ou découlent d''une violation du droit au sens de l''art. 95 LTF (art. 105 al. 2 LTF). «Manifestement inexactes» signifie
    ici «arbitraires» au sens de l''art. 9 Cst. (ATF 140 III 115 consid. 2 p. 117; 135 III 397 consid. 1.5). La critique de
    l''état de fait retenu est ainsi soumise au principe d''allégation rappelé ci-dessus (ATF 140 III 264 consid. 2.3 p. 266
    et les références; 140 III 16 consid. 1.3.1 p. 18 et les références). L''appréciation des preuves est arbitraire lorsque
    le juge s''est manifestement mépris sur le sens et la portée d''un moyen de preuve, lorsqu''il a omis, sans raison sérieuse,
    de tenir compte d''un moyen de preuve important pour la décision attaquée, ou encore lorsqu''il a tiré des déductions
    insoutenables à partir des éléments recueillis (ATF 140 III 264 consid. 2.3 p. 266; 136 III 552 consid. 4.2). L''arbitraire
    ne résulte pas du seul fait qu''une autre solution serait concevable, voire préférable. En outre, il ne suffit pas que
    les motifs de la décision soient insoutenables; encore faut-il qu''elle soit arbitraire dans son résultat (ATF 141 III
    564 consid. 4.1; 140 III 167 consid. 2.1). 3. 3.1. La recourante reproche à l''autorité précédente d''avoir apprécié les
    preuves de façon arbitraire en refusant de constater que le poste de 42''510 fr. figurant sur la facture de 92''220 fr.
    établie par la sous-traitante X.________ SA (let. A.d supra) correspondait, à l''instar des trois autres postes, à des
    travaux complémentaires/supplémentaires non compris dans le prix forfaitaire. L''autorité précédente aurait en particulier
    méconnu l''expertise judiciaire. 3.2. L''arrêt attaqué a retenu que dans la facture finale du 6 juillet 2007, le poste
    de 42''510 fr. pour les travaux concernant les «chalet et garage» était extrêmement succinct et ne détaillait nullement
    le type de prestations effectuées et les matériaux utilisés, contrairement aux trois autres postes. Ces informations ne
    résultaient pas davantage des écritures de la recourante. Interpellé sur le point de savoir s''il s''agissait de travaux
    complémentaires non compris dans le descriptif initial, l''expert n''avait pas répondu, se contentant de renvoyer de façon
    peu appropriée à sa réponse n° 21. La recourante, à qui incombait le fardeau de l''allégation et de la preuve des prestations
    non comprises dans le prix forfaitaire, n''avait pas sollicité de complément d''expertise sur ce point. Aussi les juges
    cantonaux ont-ils conclu à l''absence de preuve établissant que les travaux facturés 42''510 fr. seraient hors forfait,
    respectivement qu''ils correspondraient à des travaux complémentaires justifiant une rémunération additionnelle (arrêt
    attaqué, p. 28 s.). 3.3. L''expertise a reproduit la question n° 2 émanant du conseil de la recourante: «L''expert peut-il
    confirmer que les travaux complémentaires/supplémentaires exécutés par X.________ SA auprès du chantier de M. B.________
    et non compris dans le descriptif initial conclu entre les parties (cf. pièces 2, 3 et 4) s''élèvent à Fr. 92''220.--
    (cf. pièce 10) ?» En guise de réponse, l''expert a simplement renvoyé à la réponse n° 21 donnée en page précédente. Sous
    n° 21, le conseil de la partie adverse avait demandé si «le coût des prestations relatives aux viabilités du chalet de
    M. B.________, prévu contractuellement à Fr. 37''651.-- et qui s''[étai]t finalement établi, selon A.________ SA, à Fr.
    92''220.--, int[é]gr[ait] des prestations concernant les viabilités des trois chalets voisins (...) construits par A.________
    (...) le long de la même route d''accès». L''expert a évoqué les quatre postes aboutissant au montant de 92''220 fr.,
    dont celui de 42''510 fr. qu''il a intitulé «Solde pour construction chalet et garage y c. compléments». Quelques lignes
    plus bas, il a répété que «La position ''chalet et garage'' représente le solde pour la construction du chalet et du garage
    par l''entreprise», avant de conclure que le montant de 92''220 fr. n''intégrait aucune prestation concernant les viabilités
    des trois chalets voisins. Les informations données par l''expert quant aux quatre postes composant la somme de 92''220
    fr., et en particulier celui de 42''510 fr., peuvent toutes se trouver dans la facture finale du 6 juillet 2007 établie
    par la sous-traitante X.________ SA. Il n''apparaît pas que l''expert ait effectué le travail consistant en particulier
    à examiner si les prestations facturées 42''510 fr. - dont l''expert ne donne pas le détail - figuraient ou non dans le
    descriptif initial recensant sur plus d''une vingtaine de pages les travaux inclus dans le forfait. Dans ces circonstances,
    la cour cantonale pouvait conclure sans arbitraire que le poste de 42''510 fr. ne se rapportait pas nécessairement à des
    travaux complémentaires hors forfait. 3.4. La recourante se réfère aux allégués 42 ss de sa demande et à des témoignages
    en plaidant qu''elle aurait régulièrement allégué et prouvé que le montant de 42''510 fr. correspondait à des travaux
    supplémentaires non compris dans le contrat de construction initial. La recourante a disséminé son argumentation à plusieurs
    endroits de son recours de 44 pages; les références circonstanciées aux déclarations de témoins se trouvent essentiellement
    dans un exposé des faits liminaire ne contenant aucun grief. La recevabilité d''un tel procédé prête à discussion. Quoi
    qu''il en soit, le moyen se révèle infondé, pour les raisons exposées ci-dessous. Comme le relève l''autorité précédente,
    la recourante n''a pas allégué le détail des travaux facturés 42''510 fr. En revanche, elle a allégué que ce poste correspondait
    à des «travaux supplémentaires relatifs au chalet et au garage ne faisant pas parties du contrat de base» conclu avec
    le maître de l''ouvrage (all. 57). En date du 27 novembre 2007, la sous-traitante avait établi un décompte en fonction
    des prestations comprises dans le contrat initial conclu entre A.________ SA et le maître de l''ouvrage et celles correspondant
    à des prestations supplémentaires audit contrat (all. 64); selon ce décompte, le maître devait 92''220 fr. pour les travaux
    non compris dans le descriptif contractuel initial et pour les commandes supplémentaires qu''il avait requises en cours
    de chantier (all. 66). La recourante se réfère aux déclarations des témoins T1.________, T2.________, R2.________ et R1.________,
    dont il sied de préciser que les deux premiers sont respectivement l''ancien directeur de la sous-traitante X.________
    SA et l''ancien collaborateur s''occupant des questions financières de ladite société, tandis que les deux derniers sont
    respectivement l''ancien directeur de la recourante et l''ancien collaborateur de celle-ci chargé de diriger les travaux
    sur le chantier de l''intimé. Les deux premiers témoins ont certes confirmé la répartition opérée dans le décompte du
    27 novembre 2007, lequel imputait 92''220 fr. à l''intimé et 173''490 fr. à la recourante. Cependant, sur les allégués
    centraux 57 et 66, ces témoins n''ont pas pu dire si les montants imputés au maître de l''ouvrage correspondaient à des
    travaux non compris dans le descriptif initial et à des commandes supplémentaires; le témoin T1.________ a répété qu''il
    ignorait les relations contractuelles entre la recourante et l''intimé. Le témoin R1.________ n''a pas non plus pu répondre
    à l''allégué 57. En définitive, seul le témoin R2.________ a répondu que les allégués en question étaient probables, respectivement
    tout à fait probables, ou que tel était ce qui avait été calculé par la sous-traitante. Dans ces circonstances, il n''était
    pas arbitraire de considérer que les allégués n''étaient pas établis, respectivement que le poste de 42''510 fr. ne couvrait
    pas nécessairement des travaux hors forfait. 3.5. La recourante objecte encore que le Tribunal cantonal, dans son jugement
    du 10 décembre 2010 confirmé par la cour de céans (arrêt 4A_87/2011), avait pourtant reconnu le bien-fondé de la créance
    de 92''220 fr. figurant dans le décompte du 27 novembre 2007. Les juges cantonaux ont rejeté l''argument pour le motif
    pertinent que l''autorité de chose jugée n''était opposable qu''en présence de prétentions opposant les mêmes parties
    et concernant le même objet. On ne discerne au demeurant aucune contradiction entre le jugement attaqué et le jugement
    de 2010, par lequel le Tribunal cantonal valaisan avait rejeté l''action en libération de dette intentée par la recourante
    contre la sous-traitante X.________ SA; le jugement se fondait sur une convention par laquelle la recourante s''était
    obligée à payer 92''220 fr. et sur un décompte du 6 février 2007 admis par celle-ci. 3.6. En bref, il n''était pas arbitraire
    de conclure que la recourante avait échoué à prouver que le poste de 42''510 fr. correspondait à des travaux complémentaires
    non couverts par le prix forfaitaire. 4. 4.1. La recourante conteste par ailleurs que le maître de l''ouvrage ait signalé
    les défauts en temps utile. La cour cantonale aurait fixé de façon erronée la date de livraison de l''ouvrage et le point
    de départ du délai pour aviser des défauts; elle aurait appliqué à tort l''art. IV.D du contrat de construction. 4.2.
    Le Tribunal cantonal a considéré que le devoir de vérifier l''ouvrage avait été suspendu jusqu''au 6 mars 2007, date à
    laquelle les parties s''étaient rencontrées; aussi l''avis des défauts donné le 9 mars répondait-il aux exigences de célérité
    posées par la jurisprudence fédérale. Cela étant, le Tribunal a rappelé que l''entrepreneur, à l''instar du vendeur, était
    libre de renoncer aux avantages découlant de la péremption des droits de garantie appartenant au maître et à l''acheteur;
    or, cette hypothèse était réalisée dans le cas présent. La recourante avait elle-même établi le 7 mars 2007 une liste
    des travaux de réparations et de finitions envisagés; elle était ensuite entrée en matière sur les demandes d''élimination
    des défauts présentées par le maître les 9 et 11 mars 2007, puis le 17 janvier 2008. Dès lors, en invoquant dans le procès
    le caractère tardif de l''avis des défauts, elle opérait un «retournement de veste dicté par une pure stratégie de défense».
    4.3. Ce faisant, la cour cantonale a proposé deux argumentations indépendantes dont chacune était de nature à contrer
    le moyen tiré d''une prétendue violation du devoir d''aviser des défauts en temps utile. Or, dans le délai de recours,
    la recourante n''a formulé aucun grief contre la deuxième motivation retenant une renonciation tacite à se prévaloir de
    l''éventuelle péremption des droits de garantie. A défaut d''erreur manifeste, cette argumentation ne saurait être remise
    en cause. Il s''ensuit l''irrecevabilité de l''ensemble des griefs dirigés contre l''autre argumentation indépendante
    (cf. consid. 2.1 supraet l''arrêt 4C. 347/2005 du 13 février 2006 consid. 2, concernant un cas semblable). 5. 5.1. 5.1.1.
    La recourante objecte que plusieurs défauts retenus dans l''expertise judiciaire à laquelle se sont ralliés les juges
    valaisans n''ont pas été signalés dans l''avis des défauts du 9 mars 2007, de sorte qu''ils ne sauraient fonder une prétention
    du maître. 5.1.2. L''argument paraît conserver son sens dès lors qu''une renonciation à exciper de la péremption des droits
    de garantie implique en principe de connaître les défauts concernés par cette garantie. Cela étant, le principe de l''épuisement
    des instances cantonales exclut d''entrer en matière sur ce grief, indépendamment des interrogations que suscite le procédé
    consistant à disséminer l''argumentation en divers endroits du recours, y compris dans un long chapitre consacré aux faits.
    Le juge de district avait considéré que les avis de défauts avaient été effectués dans le délai de deux ans prévu par
    la norme SIA 118, délai qui avait commencé à courir au début du mois de mars 2007; au demeurant, l''entreprise de construction
    n''avait pas allégué régulièrement le caractère tardif de ces avis. Pour le surplus, le maître avait établi avoir effectué
    les avis de défauts en listant de manière détaillée l''ensemble des retouches à effectuer, à savoir tous les défauts qu''il
    n''acceptait pas; cette liste avait été complétée par un autre avis des défauts en janvier 2008. Le premier juge a retenu
    telles quelles les moins-values constatées par l''expert (77''865 fr. 40; jgt de Ire instance, consid. 3.2.1 et 3.2.2
    p. 39 ss). En appel, l''entreprise de construction (i.e la recourante) a fait valoir que la livraison de l''ouvrage était
    intervenue en décembre 2006 déjà, que le maître avait reconnu la conformité de l''ouvrage lorsqu''il en avait accepté
    les clés, qu''il avait de surcroît failli à ses devoirs de vérification et d''avis en temps utile et, enfin, qu''il lui
    incombait d''alléguer avoir agi en temps utile. En revanche, à lire l''arrêt attaqué, il n''apparaît pas que l''argument
    soumis à la cour de céans ait déjà été présenté en appel, la recourante ne dénonçant aucune violation de son droit d''être
    entendue. Or, l''autorité d''appel n''est pas tenue de rechercher spontanément tout élément qui pourrait conduire à l''admission
    de l''appel; sous réserve d''erreurs manifestes, elle peut bien plutôt se limiter à examiner les griefs résultant des
    écritures des parties (cf. art. 311 al. 1 CPC; ATF 142 III 413 consid. 2.2.4 p. 417; arrêt 4A_397/2016 du 30 novembre
    2016 consid. 3.1). Dès lors, à défaut de critiques contestant que le maître ait signalé les défauts en listant de manière
    détaillée les retouches à effectuer, l''autorité d''appel n''avait pas à examiner d''office si chaque défaut (moins-value)
    retenu (e) par l''expert avait été signalé (e) dans l''un ou l''autre avis des défauts. Le grief se révèle ainsi irrecevable.
    5.2. Dans sa présentation des faits, la recourante reproche encore à l''autorité précédente d''avoir retenu à tort certaines
    moins-values et d''avoir exclu indûment des plus-values. Les juges cantonaux ont constaté que sous réserve du grief infondé
    relatif à certaines plus-values, l''entreprise de construction n''avait pas contesté les valeurs retenues dans l''expertise;
    ils ont déclaré irrecevable le grief selon lequel le premier juge aurait indûment arrondi certains montants retenus par
    l''expert. La recourante n''explique pas en quoi l''argumentation développée par les juges cantonaux à propos des plus-values
    écartées contreviendrait au droit fédéral. Pour le surplus, elle ne prétend pas avoir présenté ses griefs en appel et
    ne dénonce pas une violation de son droit d''être entendue. Enfin, elle ne démontre pas par des références circonstanciées
    en quoi le résumé de l''expertise retenu dans l''arrêt attaqué serait inexact. Il n''y a donc pas à entrer en matière.
    5.3. La recourante ne soulève pas d''autre grief, notamment quant au montant de 37''651 fr. porté en déduction de sa propre
    créance, ou quant à la renaissance du droit du maître à une réduction de prix. 6. Sur le vu de ce qui précède, le recours
    doit être rejeté dans la mesure où il est recevable. En conséquence, la recourante supportera les frais de la présente
    procédure (art. 66 al. 1 LTF) et versera une indemnité de dépens à l''intimé (art. 68 al. 1 et 2 LTF). Par ces motifs,
    le Tribunal fédéral prononce : 1. Le recours est rejeté dans la mesure où il est recevable. 2. Les frais judiciaires,
    arrêtés à 5''500 fr., sont mis à la charge de la recourante. 3. La recourante versera à l''intimé une indemnité de 6''500
    fr. à titre de dépens. 4. Le présent arrêt est communiqué aux mandataires des parties et au Tribunal cantonal du canton
    du Valais. Lausanne, le 5 avril 2018 Au nom de la Ire Cour de droit civil du Tribunal fédéral suisse La présidente: Kiss
    La greffière: Monti contrat d''entreprise; recours en matière civile contre le jugement rendu le 31 août 2017 par la Cour
    civile II du Tribunal cantonal du canton du Valais (C1 15 328).'
