- source_sentence: 'Cour administrative d''appel de Nantes, du 9 avril 1992, 90NT00107, inédit au recueil Lebon <br>    VU
    le recours du MINISTRE CHARGE DU BUDGET enregistré au greffe de la Cour le 28 février 1990 ;<br>    Le ministre demande
    à la Cour :<br>    1°) d''annuler le jugement du 19 octobre 1989 par lequel le Tribunal administratif de NANTES a accordé
    à l''association locale des Témoins de Jéhovah de LAVAL la décharge de la taxe d''habitation à laquelle elle a été assujettie
    au titre des années 1985, 1986 et 1987 dans la commune de LAVAL (Mayenne) ;<br>    2°) de remettre intégralement l''imposition
    contestée à la charge de ladite association ;<br>    VU les autres pièces du dossier ;<br>    VU le code général des impôts
    ;<br>    VU le code des tribunaux administratifs et des cours administratives d''appel ;<br>    VU la loi n° 87-1127 du
    31 décembre 1987 ;<br>    Les parties ayant été régulièrement averties du jour de l''audience,<br>    Après avoir entendu
    au cours de l''audience publique du 26 mars 1992 :<br>    - le rapport de M. AUBERT, conseiller,<br>    - et les conclusions
    de M. CADENAT, commissaire du gouvernement,<br>

    <br>    Considérant qu''aux termes de l''article 1407.I du code général des impôts :  "la taxe d''habitation est due :  1°)
    pour tous les locaux meublés affectés à l''habitation ; 2°) pour les locaux meublés conformément à leur destination et
    occupés à titre privatif par les sociétés, associations et autres organisations qui ne sont pas retenues pour l''établissement
    de la taxe professionnelle" ; qu''il résulte de ces dispositions que sont exonérés de la taxe d''habitation les locaux
    affectés exclusivement à l''exercice public d''un culte ;<br>    Considérant, en premier lieu, que l''association locale
    des Témoins de Jéhovah de LAVAL (Mayenne) dispose dans cette ville d''une salle dite "du Royaume" dans laquelle se déroulent,
    à son initiative, des enseignements et des débats sur des thèmes bibliques ainsi que des cérémonies qui revêtent un caractère
    religieux et qui sont constitutives de l''exercice d''un culte ;<br>    Considérant, en second lieu, que s''il est constant
    que l''appartenance à ladite association requiert une cooptation et le paiement d''une cotisation, il ressort de l''instruction
    que l''assistance aux conférences bibliques et aux offices religieux, dont l''horaire fait l''objet d''un affichage à
    l''extérieur du bâtiment, est ouvert à toute personne étrangère aux différentes associations des Témoins de Jéhovah ;
    qu''ainsi, nonobstant sa fermeture pour des motifs de sécurité légitimes en dehors des heures d''utilisation, ledit local
    doit être regardé comme affecté à l''exercice public d''un culte ;<br>    Considérant, enfin, qu''il ne ressort pas des
    pièces du dossier que la salle litigieuse serait également utilisée pour des réunions réservées aux membres de l''association
    et aurait ainsi le caractère d''un local occupé à titre privatif ;<br>    Considérant qu''il résulte de ce qui précède
    que le ministre n''est pas fondé à soutenir que c''est à tort que, par le jugement attaqué, le Tribunal administratif
    de NANTES a accordé la décharge des impositions à la taxe d''habitation mises à la charge de l''association locale des
    Témoins de Jéhovah de LAVAL au titre des années 1985, 1986 et 1987 ;<br>Article 1er - Le recours du MINISTRE CHARGE DU
    BUDGET est rejeté.<br>Article 2 - Le présent arrêt sera notifié au MINISTRE DU BUDGET et à l''association locale des Témoins
    de Jéhovah de LAVAL.<br> None'
  sentences:
  - "CAA de NANTES, 2ème chambre, 20/10/2015, 14NT02735, Inédit au recueil Lebon Vu la procédure suivante :<br>\n<br>\n  \
    \     Procédure contentieuse antérieure :<br>\n<br>\n       Mme A...B...a demandé au tribunal administratif de Nantes\
    \ d'annuler l'arrêté du 23 mai 2014 du préfet de la Loire-Atlantique portant refus de titre de séjour, obligation de quitter\
    \ le territoire français dans un délai de trente jours et fixant la Guinée ou tout autre pays où elle est légalement admissible\
    \ comme pays de destination.<br>\n<br>\n       Par un jugement n° 1405804 du 25 septembre 2014, le tribunal administratif\
    \ de Nantes a rejeté sa demande.<br>\n<br>\n       Procédure devant la cour :<br>\n<br>\n       Par une requête et des\
    \ pièces complémentaires, enregistrées respectivement les 23 octobre 2014 et 29 janvier 2015, MmeB..., représentée par\
    \ MeC..., demande à la cour :<br>\n<br>\n       1°) d'annuler ce jugement du 25 septembre 2014 du tribunal administratif\
    \ de Nantes ;<br>\n<br>\n       2°) d'annuler, pour excès de pouvoir, cet arrêté ;<br>\n<br>\n       3°) d'enjoindre au\
    \ préfet de la Loire-Atlantique de lui délivrer un titre de séjour dans le délai de quinze jours à compter de la notification\
    \ de l'arrêt à intervenir, sous astreinte de 75 euros par jour de retard ; <br>\n<br>\n       4°) de mettre à la charge\
    \ de l'Etat le versement à son conseil, Me C..., qui renonce à percevoir la part contributive de l'Etat au titre de l'aide\
    \ juridictionnelle, d'une somme de 2 000 euros sur le fondement des dispositions combinées des articles L. 761-1 du code\
    \ de justice administrative et 37 et 75 de la loi n° 91-647 du 10 juillet 1991.<br>\n<br>\n       Elle soutient que :<br>\n\
    <br>\n       - le refus de titre de séjour litigieux est insuffisamment motivé en fait et en droit ; <br>\n<br>\n    \
    \   - le préfet n'a pas étudié de manière attentive sa situation personnelle puisqu'il a mentionné de manière erronée\
    \ qu'elle était célibataire alors qu'elle vit en concubinage depuis 2013 avec un compatriote ;<br>\n<br>\n       - la\
    \ décision lui refusant le titre de séjour sollicité est entachée d'une erreur de fait ; elle a rencontré son compagnon\
    \ en 2013 et vit depuis en concubinage avec ce dernier ;<br>\n<br>\n       - la décision de refus de titre de séjour méconnaît\
    \ les dispositions de l'article L. 311-11 7° du code de l'entrée et du séjour des étrangers et du droit d'asile, les stipulations\
    \ de l'article 8 de la convention européenne de sauvegarde des droits de l'homme et des libertés fondamentales et est\
    \ entachée d'une erreur manifeste d'appréciation ; elle est installée en France depuis près de trois ans ; elle justifie\
    \ d'une relation stable avec son concubin qui est en situation régulière ; elle est intégrée professionnellement ;<br>\n\
    <br>\n       - l'illégalité de la décision de refus de titre de séjour entraîne l'illégalité de la décision portant obligation\
    \ de quitter le territoire français ;<br>\n<br>\n       - elle reprend à l'encontre de la décision lui faisant obligation\
    \ de quitter le territoire les mêmes moyens que ceux développés à l'encontre du refus de titre de séjour ;<br>\n<br>\n\
    \       - la décision fixant le pays de renvoi est insuffisamment motivée ;<br>\n<br>\n       - en fixant la Guinée comme\
    \ pays de renvoi, le préfet a méconnu les stipulations de l'article 3 de la convention européenne de sauvegarde des droits\
    \ de l'homme et des libertés fondamentales.<br>\n<br>\n       Par des mémoires en défense, enregistrés respectivement\
    \ les 3 février et 8 avril 2015, le préfet de la Loire-Atlantique conclut au rejet de la requête.<br>\n<br>\n       Il\
    \ soutient que les moyens soulevés par la requérante ne sont pas fondés.<br>\n<br>\n       Mme B...a été admise au bénéfice\
    \ de l'aide juridictionnelle par une décision du bureau d'aide juridictionnelle du 19 janvier 2015.<br>\n<br>\n      \
    \ Vu les autres pièces du dossier.<br>\n<br>\n       Vu :<br>\n       - la convention européenne de sauvegarde des droits\
    \ de l'homme et des libertés fondamentales ;<br>\n       - le code de l'entrée et du séjour des étrangers et du droit\
    \ d'asile ;<br>\n       - la loi n° 91-647 du 10 juillet 1991 ;<br>\n       - le décret n° 91-1266 du 19 décembre 1991\
    \ ;<br>\n       - le code de justice administrative.<br>\n<br>\n       Le président de la formation de jugement a dispensé\
    \ le rapporteur public, sur sa proposition, de prononcer des conclusions à l'audience.<br>\n<br>\n       Les parties ayant\
    \ été régulièrement averties du jour de l'audience.<br>\n<br>\n       Le rapport de M. Pérez, président-rapporteur, a\
    \ été entendu au cours de l'audience publique du 29 septembre 2015.<br>\n<br>\n<br>\n       1. Considérant que MmeB...,\
    \ ressortissante de la République de Guinée, est entrée, selon ses propres déclarations, en France le 22 avril 2012 ;\
    \ qu'elle a demandé, le 21 juin 2012, son admission au statut de réfugié ; que, par décision du 30 mai 2013, l'Office\
    \ français de protection des réfugiés et apatrides a rejeté sa demande d'admission au bénéfice de l'asile ; que le recours\
    \ formé contre cette décision a été rejeté, le 26 mars 2014, par la Cour nationale du droit d'asile ; que, par arrêté\
    \ du 23 mai 2014, le préfet de la Loire-Atlantique a refusé de délivrer à Mme B...un titre de séjour, l'a obligée à quitter\
    \ le territoire français dans un délai de trente jours et a fixé le pays à destination duquel elle devait être reconduite\
    \ ; que Mme B...relève appel du jugement du 25 septembre 2014 par lequel le tribunal administratif de Nantes a rejeté\
    \ sa demande tendant à l'annulation de cet arrêté ; <br>\n<br>\n       Sur les conclusions à fin d'annulation :<br>\n\
    <br>\n       En ce qui concerne la décision portant refus de séjour et la décision faisant obligation de quitter le territoire\
    \ :<br>\n<br>\n       2. Considérant, en premier lieu, que le moyen tiré du défaut de motivation des décisions contestées\
    \ que Mme B... renouvelle en appel, sans apporter aucune précision nouvelle, doit être écarté par adoption des mêmes motifs\
    \ que ceux retenus par les premiers juges ;<br>\n<br>\n       3. Considérant, en deuxième lieu, qu'il ressort des pièces\
    \ du dossier que l'arrêté du 23 mai 2014 du préfet de la Loire-Atlantique comporte la mention des éléments de la vie personnelle\
    \ et familiale de Mme B...que celle-ci a porté à la connaissance du préfet ; qu'en admettant même que l'arrêté litigieux,\
    \ qui fait état de ce que Mme B...était célibataire, et non en situation de concubinage, à la date de cette décision,\
    \ serait entaché sur ce point d'une erreur de fait, il ressort toutefois des pièces du dossier que le préfet aurait porté\
    \ la même appréciation sur la situation de la requérante et pris la même décision s'il n'avait pas commis l'erreur alléguée\
    \ ; qu'une telle erreur ne révèle pas, à elle seule, un défaut d'examen particulier de la situation de l'intéressée ;<br>\n\
    <br>\n       4. Considérant, en troisième lieu, qu'aux termes du 1 de l'article 8 de la convention européenne de sauvegarde\
    \ des droits de l'homme et des libertés fondamentales : \" Toute personne a droit au respect de sa vie privée et familiale\
    \ (...) \" ; qu'aux termes de l'article L. 313-11 du code de l'entrée et du séjour des étrangers et du droit d'asile :\
    \ \" Sauf si sa présence constitue une menace pour l'ordre public, la carte de séjour temporaire portant la mention \"\
    \ vie privée et familiale \" est délivrée de plein droit : / (...) 7° A l'étranger ne vivant pas en état de polygamie,\
    \ qui n'entre pas dans les catégories précédentes ou dans celles qui ouvrent droit au regroupement familial, dont les\
    \ liens personnels et familiaux en France, appréciés notamment au regard de leur intensité, de leur ancienneté et de leur\
    \ stabilité, des conditions d'existence de l'intéressé, de son insertion dans la société française ainsi que de la nature\
    \ de ses liens avec la famille restée dans le pays d'origine, sont tels que le refus d'autoriser son séjour porterait\
    \ à son droit au respect de sa vie privée et familiale une atteinte disproportionnée au regard des motifs du refus, sans\
    \ que la condition prévue à l'article L. 311-7 soit exigée. L'insertion de l'étranger dans la société française est évaluée\
    \ en tenant compte notamment de sa connaissance des valeurs de la République (...) \" ; <br>\n<br>\n       5. Considérant\
    \ que Mme B...fait valoir qu'elle vit en situation de concubinage avec un compatriote, en situation régulière et qu'elle\
    \ fait des efforts d'intégration dans la société française ; que, toutefois, à supposer même que cette situation de concubinage\
    \ ait pris naissance, comme le prétend MmeB..., en 2013, elle demeurait récente à la date de la décision litigieuse ;\
    \ que la requérante est la mère d'un enfant mineur qui réside en Guinée ; que, dans ces conditions, Mme B...n'est pas\
    \ fondée à soutenir qu'en prenant l'arrêté litigieux le préfet de la Loire-Atlantique aurait porté à son droit au respect\
    \ de sa vie privée et familiale une atteinte disproportionnée aux buts en vue desquels l'arrêté a été pris ; que, par\
    \ suite, le moyen tiré de la méconnaissance des dispositions du 7° de l'article L. 313-11 du code de l'entrée et du séjour\
    \ des étrangers et du droit d'asile et des stipulations de l'article 8 de la convention européenne de sauvegarde des droits\
    \ de l'homme et des libertés fondamentales doit être écarté ; que, pour les mêmes motifs, les décisions contestées ne\
    \ sont pas davantage entachées d'une erreur manifeste dans l'appréciation de la situation personnelle de l'intéressée\
    \ ; <br>\n<br>\n       6. Considérant, en dernier lieu, que compte tenu de ce qui a été dit ci-dessus, le moyen tiré de\
    \ ce que la décision portant obligation de quitter le territoire est dépourvue de base légale en conséquence de l'illégalité\
    \ de la décision de refus de titre de séjour ne peut qu'être écarté ;<br>\n<br>\n       En ce qui concerne la décision\
    \ fixant le pays de destination :<br>\n<br>\n       7. Considérant, en premier lieu, que Mme B...reprend en appel le moyen\
    \ qu'elle avait invoqué en première instance, tiré du défaut de motivation de cette décision ; qu'il y a lieu d'écarter\
    \ ce moyen par adoption des motifs retenus par le tribunal administratif de Nantes ;<br>\n       8. Considérant, en second\
    \ lieu, qu'aux termes de l'article 3 de la convention européenne de sauvegarde des droits de l'homme et des libertés fondamentales\
    \ : \" Nul ne peut être soumis à la torture ni à des peines ou traitements inhumains ou dégradants \" ;<br>\n       9.\
    \ Considérant que MmeB..., dont la demande de reconnaissance du statut de réfugié a, comme il a été dit précédemment,\
    \ été rejetée par une décision de l'Office français de protection des réfugiés et apatrides du 30 mai 2013, confirmée\
    \ par une décision de la Cour nationale du droit d'asile du 26 mars 2014, fait valoir qu'elle a été contrainte par son\
    \ père d'épouser un homme polygame âgé de 65 ans, lequel lui a infligé des sévices et l'a violée à plusieurs reprises,\
    \ sans pouvoir trouver d'aide auprès des membres de sa famille, qu'elle a quitté son pays pour échapper à ce mariage imposé\
    \ par sa famille et qu'elle craint d'être à nouveau exposée à de mauvais traitements en cas de retour en Guinée ; que,\
    \ toutefois, l'intéressée n'apporte aucun élément permettant d'établir la réalité des risques qu'elle invoque en cas de\
    \ retour dans son pays d'origine ; que, par suite, en prenant la décision litigieuse, le préfet de la Loire-Atlantique\
    \ n'a pas méconnu les stipulations de l'article 3 de la convention européenne de sauvegarde des droits de l'homme et des\
    \ libertés fondamentales ;<br>\n<br>\n       10. Considérant qu'il résulte de tout ce qui précède que Mme B...n'est pas\
    \ fondée à soutenir que c'est à tort que, par le jugement attaqué, le tribunal administratif de Nantes a rejeté sa demande\
    \ ;<br>\n<br>\n       11. Considérant que doivent être rejetées par voie de conséquence les conclusions à fin d'injonction\
    \ présentées par Mme B...ainsi que celles tendant au bénéfice des articles 37 et 75 de la loi du 10 juillet 1991 et L.761-1\
    \ du code de justice administrative ;<br>\n<br>\n       DÉCIDE :<br>\n<br>\nArticle 1er : \tLa requête de Mme B...est\
    \ rejetée.<br>\nArticle 2 : \tLe présent arrêt sera notifié à Mme A...B..., et au ministre de l'intérieur. <br>\n    \
    \ Une copie en sera adressée au préfet de la Loire-Atlantique.<br>\n<br>\n       Délibéré après l'audience du 29 septembre\
    \ 2015, à laquelle siégeaient :<br>\n<br>\n       - M. Pérez, président de chambre,<br>\n       - M. Millet, président-assesseur,<br>\n\
    \       - M. François, premier conseiller.<br>\n<br>\n<br>\n       Lu en audience publique, le 20 octobre 2015.<br>\n\
    <br>\nLe président-assesseur,<br>\nJF. MILLET<br>\nLe président-rapporteur,<br>\nA. PEREZ<br>\nLe greffier,<br>\nS. BOYERE<br>\n\
    <br>\n<br>\nLa République mande et ordonne au ministre de l'intérieur en ce qui le concerne, et à tous huissiers de justice\
    \ à ce requis en ce qui concerne les voies de droit commun contre les parties privées, de pourvoir à l'exécution de la\
    \ présente décision.<br>\n''<br>\n''<br>\n''<br>\n''<br>\n1<br>\nN° 14NT02735\t\t6 <br>\n1<br>\n<br>\n<br>\n<br>\n<br>\
    \ None"
