    - "CAA de LYON, 1ère chambre - formation à 3, 27/10/2015, 14LY03064, Inédit au recueil Lebon Vu la procédure suivante\
      \ :<br>\n<br>\n        Procédure contentieuse antérieure :<br>\n<br>\n        M. B...A...a demandé au tribunal administratif\
      \ de Lyon d'annuler l'arrêté du 15 avril 2014 par lequel le préfet du Rhône a refusé de lui délivrer un titre de séjour,\
      \ l'a obligé à quitter le territoire français dans le délai de trente jours et a fixé le pays à destination duquel il\
      \ pourra être reconduit d'office.<br>\n<br>\n        Par un jugement n° 1403809 du 30 septembre 2014, le tribunal administratif\
      \ de Lyon a rejeté sa demande.<br>\n<br>\n        Procédure devant la cour :<br>\n<br>\n        Par une requête enregistrée\
      \ le 9 octobre 2014, présentée pour M.A..., celui-ci demande à la cour :<br>\n<br>\n        1°) d'annuler ce jugement\
      \ du tribunal administratif de Lyon du 30 septembre 2014 ;<br>\n<br>\n        2°) d'annuler l'arrêté du préfet du Rhône\
      \ du 15 avril 2014 ;<br>\n<br>\n        3°) d'enjoindre au préfet du Rhône de lui délivrer un titre de séjour portant\
      \ la mention \" vie privée et familiale \" ou de procéder à un nouvel examen de sa situation sous astreinte de 100 euros\
      \ par jour de retard à compter de l'arrêt à intervenir ;<br>\n<br>\n<br>\n        4°) de mettre une somme de 1 200 euros\
      \ à la charge de l'Etat en application des dispositions des articles L. 761-1 du code de justice administrative et 37\
      \ de la loi du 10 juillet 1991.<br>\n<br>\n        Il soutient que :<br>\n        - le préfet aurait dû saisir la commission\
      \ du titre de séjour ;<br>\n        - sa situation n'a pas fait l'objet d'un examen particulier ;<br>\n        - le\
      \ refus de titre de séjour méconnaît l'article L. 313-11-11° et l'obligation de quitter le territoire français méconnaît\
      \ l'article L. 511-4-10° du code de l'entrée et du séjour des étrangers et du droit d'asile dès lors qu'il ne peut bénéficier\
      \ d'un traitement approprié dans son pays d'origine ;<br>\n        - l'obligation de quitter le territoire français\
      \ est illégale du fait de l'illégalité du refus de titre de séjour ;<br>\n        - il n'a pas été en mesure de présenter\
      \ ses observations préalablement à l'édiction de l'obligation de quitter le territoire français ;<br>\n        - l'obligation\
      \ de quitter le territoire français est entachée d'une erreur manifeste d'appréciation quant à ses conséquences sur\
      \ sa situation personnelle ;<br>\n        - la décision fixant le pays de destination est illégale du fait de l'illégalité\
      \ du refus de titre de séjour et de l'obligation de quitter le territoire français ;<br>\n        - il encourt des risques\
      \ en cas de retour dans son pays d'origine, où il a été emprisonné et a subi des traitements inhumains et dégradants\
      \ du fait de son militantisme au sein du BDK.<br>\n<br>\n        En application de l'article R. 611-8 du code de justice\
      \ administrative l'affaire a été dispensée d'instruction.<br>\n<br>\n        Par une décision du 5 novembre 2014, le\
      \ bureau d'aide juridictionnelle près le Tribunal de grande instance de Lyon (section administrative d'appel) a accordé\
      \ le bénéfice de l'aide juridictionnelle totale à M.A....<br>\n<br>\n        Vu les autres pièces du dossier.<br>\n\
      <br>\n        Vu :<br>\n        - la convention européenne de sauvegarde des droits de l'homme et des libertés fondamentales\
      \ ;<br>\n        - la Charte des droits fondamentaux de l'Union européenne ;<br>\n        - le code de l'entrée et du\
      \ séjour des étrangers et du droit d'asile ;<br>\n        - la loi n° 91-647 du 10 juillet 1991 relative à l'aide juridique\
      \ ;<br>\n        - le code de justice administrative.<br>\n<br>\n        Le président de la formation de jugement a\
      \ dispensé le rapporteur public, sur sa proposition, de prononcer des conclusions à l'audience.<br>\n<br>\n        M.\
      \ A...a été régulièrement averti du jour de l'audience.<br>\n<br>\n        Le rapport de Mme Vaccaro-Planchet a été\
      \ entendu au cours de l'audience publique.<br>\n<br>\n       1. Considérant que, par un jugement du 30 septembre 2014,\
      \ le tribunal administratif de Lyon a rejeté la demande de M. A...tendant à l'annulation de l'arrêté du 15 avril 2014\
      \ par lequel le préfet du Rhône a refusé de lui délivrer un titre de séjour, l'a obligé à quitter le territoire français\
      \ dans le délai de trente jours et a fixé le pays à destination duquel il pourra être reconduit d'office ; que M. A...relève\
      \ appel de ce jugement ;<br>\n       2. Considérant qu'aux termes de l'article L. 313-11 du code de l'entrée et du séjour\
      \ des étrangers et du droit d'asile : \" Sauf si sa présence constitue une menace pour l'ordre public, la carte de séjour\
      \ temporaire portant la mention \"vie privée et familiale\" est délivrée de plein droit : (...) 11° A l'étranger résidant\
      \ habituellement en France dont l'état de santé nécessite une prise en charge médicale dont le défaut pourrait entraîner\
      \ pour lui des conséquences d'une exceptionnelle gravité, sous réserve de l'absence d'un traitement approprié dans le\
      \ pays dont il est originaire, sauf circonstance humanitaire exceptionnelle appréciée par l'autorité administrative\
      \ après avis du directeur général de l'agence régionale de santé, sans que la condition prévue à l'article L. 311-7\
      \ soit exigée. La décision de délivrer la carte de séjour est prise par l'autorité administrative, après avis du médecin\
      \ de l'agence régionale de santé de la région de résidence de l'intéressé, désigné par le directeur général de l'agence\
      \ (...) \" ; <br>\n       3. Considérant qu'aux termes de l'article L. 511-4 de ce code : \" Ne peuvent faire l'objet\
      \ d'une obligation de quitter le territoire français ou d'une mesure de reconduite à la frontière en application du\
      \ présent chapitre : (...) 10° L'étranger résidant habituellement en France dont l'état de santé nécessite une prise\
      \ en charge médicale dont le défaut pourrait entraîner pour lui des conséquences d'une exceptionnelle gravité, sous\
      \ réserve qu'il ne puisse effectivement bénéficier d'un traitement approprié dans le pays de renvoi (...) \" ;<br>\n\
      \       4. Considérant que, si le préfet n'est pas lié par l'avis émis par le médecin de l'agence régionale de santé,\
      \ il lui appartient néanmoins, lorsque ce médecin a estimé que l'état de santé de l'étranger nécessite une prise en\
      \ charge médicale dont le défaut pourrait entraîner pour lui des conséquences d'une exceptionnelle gravité et qu'il\
      \ n'existe pas de traitement approprié dans le pays dont il est originaire, de justifier des éléments qui l'ont conduit\
      \ à s'écarter de cet avis médical ;<br>\n       5. Considérant qu'il ressort des pièces du dossier que, dans son avis\
      \ du 10 mars 2014, le médecin de l'agence régionale de santé indique que l'état de santé de M.A..., ressortissant de\
      \ la République démocratique du Congo né le 30 juin 1960, nécessite des soins médicaux dont le défaut peut entraîner\
      \ des conséquences d'une exceptionnelle gravité et que le traitement approprié n'est pas disponible dans son pays d'origine\
      \ ; que le préfet du Rhône s'est écarté de l'avis du médecin de l'agence régionale de santé en se fondant notamment\
      \ sur différents éléments fournis par l'ambassade de France en République Démocratique du Congo en date du 5 septembre\
      \ 2013 relatifs aux médicaments et médecins présents dans le pays, desquels il résulte que toutes les spécialités usuelles,\
      \ dont celles nécessaires au traitement du diabète, sont disponibles en République démocratique du Congo ; que les certificats\
      \ médicaux produits par M. A..., qui sont rédigés en des termes généraux, ne suffisent pas à établir qu'il ne pourrait\
      \ pas bénéficier d'un traitement approprié dans son pays d'origine ; que, dès lors, les moyens tirés de la méconnaissance\
      \ des dispositions du 11° de l'article L. 313-11 du code de l'entrée et du séjour des étrangers et du droit d'asile\
      \ et du 10° de l'article L. 511-4 du même code doivent être écartés ;<br>\n       6. Considérant que le seul fait que,\
      \ dans sa décision, le préfet du Rhône a utilisé la même formulation que pour d'autres demandeurs de titre de séjour\
      \ ne permet pas par lui-même d'établir qu'il n'aurait pas procédé à un examen particulier de la situation de M.A...\
      \ ; que, par suite, le moyen tiré de ce que le refus de titre de séjour attaqué serait entaché d'une erreur de droit\
      \ faute pour le préfet d'avoir procédé à un examen particulier de la situation de M. A...doit être écarté ;<br>\n  \
      \     7. Considérant que M. A...reprend en appel les moyens tirés de ce que le préfet aurait dû saisir la commission\
      \ du titre de séjour, de ce qu'il n'a pas été mis à même de présenter ses observations préalablement à l'édiction de\
      \ l'obligation de quitter le territoire français et de ce que la décision fixant le pays à destination duquel il pourra\
      \ être reconduit d'office méconnaît les stipulations de l'article 3 de la convention européenne de sauvegarde des droits\
      \ de l'homme et des libertés fondamentales ; qu'il ne ressort pas des pièces du dossier qu'en écartant ces moyens, le\
      \ tribunal aurait, par les motifs qu'il a retenus et qu'il y a lieu d'adopter, commis une erreur ;<br>\n       8. Considérant\
      \ que, compte tenu de ce qui précède, M. A...n'est pas fondé à invoquer, par voie d'exception, l'illégalité du refus\
      \ de titre de séjour à l'appui de ses conclusions dirigées contre l'obligation de quitter le territoire français et\
      \ la décision fixant le pays de destination, ni celle de l'obligation de quitter le territoire français à l'appui de\
      \ ses conclusions dirigées contre la décision fixant le pays de destination ;<br>\n<br>\n       9. Considérant qu'il\
      \ résulte de ce qui précède que M. A...n'est pas fondé à soutenir que c'est à tort que, par le jugement attaqué, le\
      \ tribunal administratif de Lyon a rejeté sa demande ; que ses conclusions aux fins d'injonction et tendant à l'application\
      \ des dispositions des articles L. 761-1 du code de justice administrative et 37 de la loi du 10 juillet 1991 doivent,\
      \ par voie de conséquence, être rejetées ; <br>\nDECIDE :<br>\nArticle 1er : La requête de M. A...est rejetée.<br>\n\
      Article 2 : Le présent arrêt sera notifié à M. B...A...et au ministre de l'intérieur.<br>\nCopie en sera adressée au\
      \ préfet du Rhône.<br>\nDélibéré après l'audience du 6 octobre 2015, à laquelle siégeaient :<br>\nM. Clot, président\
      \ de chambre,<br>\nM. Picard, président-assesseur,<br>\nMme Vaccaro-Planchet, premier conseiller.<br>\nLu en audience\
      \ publique, le 27 octobre 2015.<br>\n''<br>\n''<br>\n''<br>\n''<br>\n1<br>\n4<br>\n     N° 14LY03064<br>\nvv<br>\n<br>\n\
      <br>\n<br> None"
  - source_sentence: "Cour Administrative d'Appel de Marseille, 5ème chambre - formation à 3, 10/04/2015, 13MA01170, Inédit\
      \ au recueil Lebon Vu la requête, enregistrée le 14 mars 2013 au greffe de la Cour, sous le n° 13MA01170, présentée\
      \ pour le département de la Lozère, dont le siège est Hôtel du Département, 4 rue de la Rovère B.P. 24 à Mende cedex\
      \ (48001), représenté par le président de son conseil général, par MeD... ; <br>\n<br>\n       Le département demande\
      \ à la Cour :<br>\n<br>\n       1°) d'annuler le jugement n° 1201918 du 17 janvier 2013 par lequel le tribunal administratif\
      \ de Nîmes d'une part, a annulé la décision en date du 16 mai 2012 par laquelle le président du conseil général de la\
      \ Lozère a prononcé le retrait de l'agrément d'assistante familiale de Mme B...et, d'autre part, a mis à sa charge la\
      \ somme de 1 200 euros au titre des dispositions de l'article L. 761-1 du code de justice administrative ; <br>\n<br>\n\
      \       2°) de mettre à la charge de Mme B...la somme de 1 500 euros au titre de l'article L. 761-1 du code de justice\
      \ administrative ;<br>\n<br>\n       -----------------------------------------------------------------------------------------------------<br>\n\
      \       Vu les autres pièces du dossier ;<br>\n<br>\n       Vu le code de l'action sociale et des familles ; <br>\n\
      <br>\n       Vu le code de justice administrative ; <br>\n<br>\n<br>\n       Les parties ayant été régulièrement averties\
      \ du jour de l'audience ;<br>\n<br>\n       Après avoir entendu au cours de l'audience publique du 20 mars 2015 :<br>\n\
      <br>\n       - le rapport de Mme Ciréfice, premier conseiller ;<br>\n<br>\n       - les conclusions de M. Revert, rapporteur\
      \ public ;<br>\n<br>\n       - les observations de Me C...substituant MeD..., pour le département de la Lozère et celles\
      \ de MeE..., pour MmeB... ; <br>\n<br>\n<br>\n<br>\n<br>\n       1. Considérant que le département de la Lozère relève\
      \ appel du jugement en date du 17 janvier 2013 par lequel le tribunal administratif de Nîmes, d'une part, a annulé la\
      \ décision en date du 16 mai 2012 par laquelle le président du conseil général de la Lozère a prononcé le retrait de\
      \ l'agrément d'assistante familiale de Mme B...et, d'autre part, a mis à sa charge la somme de 1 200 euros au titre\
      \ des dispositions de l'article L. 761-1 du code de justice administrative ; <br>\n<br>\n<br>\n       Sur le moyen d'annulation\
      \ retenu par le tribunal administratif : <br>\n<br>\n       2. Considérant qu'aux termes de l'article L. 421-3 du code\
      \ de l'action sociale et des familles, dans sa rédaction en vigueur à la date de la décision contestée : \" L'agrément\
      \ nécessaire pour exercer la profession d'assistant maternel ou d'assistant familial est délivré par le président du\
      \ conseil général du département où le demandeur réside. / (...) L'agrément est accordé à ces deux professions si les\
      \ conditions d'accueil garantissent la sécurité, la santé et l'épanouissement des mineurs et majeurs de moins de vingt\
      \ et un ans accueillis, en tenant compte des aptitudes éducatives de la personne. (...) \" ; qu'aux termes de l'article\
      \ L. 421-6 du même code : \" (...) Si les conditions de l'agrément cessent d'être remplies, le président du conseil\
      \ général peut, après avis d 'une commission consultative paritaire départementale, modifier le contenu de l'agrément\
      \ ou procéder à son retrait. En cas d'urgence, le président du conseil général peut suspendre l'agrément. Tant que l'agrément\
      \ reste suspendu, aucun enfant ne peut être confié. / Toute décision de retrait de l'agrément, de suspension de l'agrément\
      \ ou de modification de son contenu doit être dûment motivée et transmise sans délai aux intéressés. (...) \" ; qu'aux\
      \ termes de l'article R. 421-26 de ce code : \" Un manquement grave ou des manquements répétés aux obligations de déclaration\
      \ et de notification prévues aux articles R. 421-38, R. 421-39, R. 421-40 et R. 421-41 ainsi que des dépassements du\
      \ nombre d'enfants mentionnés dans l'agrément et ne répondant pas aux conditions prévues par l'article R. 421-17 peuvent\
      \ justifier, après avertissement, un retrait d'agrément. \" ; qu'enfin, aux termes de l'article R. 421-38 du même code\
      \ : \" Les assistants maternels et les assistants familiaux agréés informent sans délai le président du conseil général\
      \ de toute modification des informations figurant dans le formulaire de demande d'agrément mentionné à l'article L.\
      \ 421-3 et relatives à leur situation familiale, aux personnes vivant à leur domicile et aux autres agréments dont ils\
      \ disposent \" ; <br>\n<br>\n<br>\n       3. Considérant qu'il résulte de ces dispositions que le retrait de l'agrément\
      \ d'un assistant familial peut être légalement fondé sur la révélation d'une carence de celui-ci dans l'accomplissement\
      \ des missions qui lui sont confiées ; <br>\n<br>\n       4. Considérant que le retrait d'agrément est motivé, d'une\
      \ part, par l'existence d'une procédure en assistance éducative au profit de Mme B...pour son fils mineur et, d'autre\
      \ part, par le manquement à l'obligation de l'assistant familial d'informer sans délai le président du conseil général\
      \ de toute modification de sa situation familiale, alors même que le dossier transmis par le parquet de Mende atteste\
      \ que les difficultés éducatives et les démarches initiées dans ce cadre auprès des services de protection de l'enfance\
      \ datent du mois d'août 2011, soit antérieurement à la demande d'agrément d'assistante familiale dont le dossier complet\
      \ a été reçu en octobre 2011 ; qu'il ressort en effet des pièces du dossier que, nouvellement agréée par une décision\
      \ du 19 février 2012, Mme B...était en stage préparatoire avant l'accueil d'un premier enfant lorsque le service de\
      \ protection de l'enfance du département a été averti par les service du procureur de la République que le fils de Mme\
      \ B...faisait l'objet d'une mesure de protection ordonnée par décision du juge des enfants du Var ; que les difficultés\
      \ rencontrées depuis plusieurs années par M. et Mme B...avec le fils de celle-ci n'ont, à aucun moment des évaluations,\
      \ été abordées par M. et MmeB..., pourtant questionnés sur leurs positionnements éducatifs auprès de leurs enfants et\
      \ des réponses ou solutions apportées aux moments de crise inhérents à l'éducation et l'accompagnement d'un enfant quel\
      \ qu'il soit ; qu'il ressort des notes élaborées par l'éducatrice spécialisée et par la psychologue, à l'issue de la\
      \ nouvelle enquête diligentée par le département, que cette dissimulation conduisait à s'interroger tant sur les liens\
      \ de confiance entre Mme B...et l'équipe avec laquelle elle devait travailler que sur ses capacités éducatives, à poser\
      \ un cadre ferme, soutenant et sécurisant, à un enfant dont les parents pouvaient rencontrer les mêmes difficultés que\
      \ l'intéressée avec son propre enfant ; qu'au vu de ces éléments, la commission consultative paritaire s'est d'ailleurs\
      \ prononcée à l'unanimité moins une voix en faveur du retrait d'agrément de MmeB... ; que, par suite, le président du\
      \ conseil général a pu, sans commettre d'erreur d'appréciation, prononcer le retrait de l'agrément d'assistante familiale\
      \ de MmeB... ; qu'ainsi c'est à tort que le tribunal s'est fondé sur ce motif pour annuler la décision du président\
      \ du conseil général de la Lozère en date du 16 mai 2011 ; <br>\n<br>\n       5. Considérant toutefois qu'il appartient\
      \ à la Cour, saisie de l'ensemble du litige par l'effet dévolutif de l'appel, d'examiner les autres moyens soulevés\
      \ par Mme B...devant le tribunal administratif de Nîmes ; <br>\n<br>\n       Sur les autres moyens invoqués par Mme\
      \ B...devant le tribunal administratif de Nîmes :<br>\n<br>\n       6. Considérant, en premier lieu, que la décision\
      \ litigieuse, qui cite les articles appliqués du code de l'action sociale et des familles ainsi que les faits qui sont\
      \ reprochés à MmeB..., satisfait ainsi aux exigences posées par l'article L. 421-6 précité du code de l'action sociale\
      \ et des familles ; que, dès lors, la requérante n'est pas fondée à soutenir que cette décision ne serait pas suffisamment\
      \ motivée;<br>\n<br>\n       7. Considérant, en deuxième lieu, qu'aux termes de l'article R. 421-23 du code de l'action\
      \ sociale et des familles dans sa rédaction alors en vigueur : \" Lorsque le président du conseil général envisage de\
      \ retirer un agrément, d'y apporter une restriction ou de ne pas le renouveler, il saisit pour avis la commission consultative\
      \ paritaire départementale mentionnée à l'article R. 421-27 en lui indiquant les motifs de la décision envisagée. /\
      \ L'assistant maternel ou l'assistant familial concerné est informé, quinze jours au moins avant la date de la réunion\
      \ de la commission avec demande d'avis de réception, des motifs de la décision envisagée à son encontre, de la possibilité\
      \ de consulter son dossier administratif et de présenter devant la commission ses observations écrites ou orales. (...)\
      \ \" ; qu'aux termes de l'article R. 421-27 du même code : \" La commission consultative paritaire départementale, prévue\
      \ par l'article L. 421-6, comprend, en nombre égal, des membres représentant le département et des membres représentant\
      \ les assistants maternels et les assistants familiaux agréés résidant dans le département \" ; qu'aux termes de l'article\
      \ 4 du règlement intérieur de la commission consultative paritaire départementale des assistants maternels et assistants\
      \ familiaux de la Lozère : \" (...) Les suppléants peuvent assister aux séances de la commission. Ils n'ont voix délibérative\
      \ qu'en l'absence des titulaires qu'ils remplacent \" ; qu'il ressort du procès-verbal de la réunion du 11 mai 2012\
      \ de la commission consultative paritaire, durant laquelle le cas de Mme B... a été examiné, que si trois représentants\
      \ du départements étaient présents contre cinq représentants des assistants maternels et familiaux, seuls trois de ces\
      \ représentants ont pris part au vote, deux membres titulaires et un membre suppléant en remplacement d'un titulaire\
      \ absent ; que, par suite, le moyen tiré de ce que le vote de la commission serait illégal pour vice de procédure manque\
      \ en fait et doit être écarté ; <br>\n<br>\n       8. Considérant enfin que, si les actes administratifs doivent être\
      \ pris selon les formes et conformément aux procédures prévues par les lois et règlements, un vice affectant le déroulement\
      \ d'une procédure administrative préalable, suivie à titre obligatoire ou facultatif, n'est de nature à entacher d'illégalité\
      \ la décision prise que s'il ressort des pièces du dossier qu'il a été susceptible d'exercer, en l'espèce, une influence\
      \ sur le sens de la décision prise ou qu'il a privé les intéressés d'une garantie ; qu'il ressort des pièces du dossier\
      \ que, nouvellement agréée, Mme B...était en stage préparatoire avant l'accueil d'un premier enfant lorsque le service\
      \ de protection de l'enfance du département a été averti par les services du procureur de la République que le fils\
      \ de Mme B...faisait l'objet d'une mesure de protection ordonnée par décision du juge des enfants du Var ; qu'au vu\
      \ de cette information le service de l'aide sociale à l'enfance a procédé à une nouvelle évaluation de la situation\
      \ de l'intéressée et entendu cette dernière lors d'un entretien le 30 mars 2012 ; que Mme B...a été informée des motifs\
      \ de la décision envisagée à son encontre et a également été en mesure de présenter ses observations tant écrites qu'orales\
      \ devant la commission consultative paritaire départementale ; que, par suite, à supposer même qu'elle n'ait pas été\
      \ destinataire de l'avertissement prévu à l'article R. 421-26 précité du code de l'action sociale et des familles, cette\
      \ circonstance ne l'a pas privée d'une garantie découlant du respect des droits de la défense ; que l'absence alléguée\
      \ d'avertissement n'a pas non plus exercé une influence sur le sens de la décision prise ; qu'il résulte de ce qui précède\
      \ que cette omission n'a pas constitué une irrégularité de nature à entacher la légalité de la décision contestée ;<br>\n\
      <br>\n       9. Considérant qu'il résulte de tout ce qui précède que le département de la Lozère est fondé à soutenir\
      \ que c'est à tort que, par le jugement attaqué, le tribunal administratif de Nîmes a annulé la décision du président\
      \ de son conseil général en date du 16 mai 2011 ; <br>\n<br>\n       Sur les conclusions présentées en application des\
      \ dispositions de l'article L. 761-1 du code de justice administrative :<br>\n<br>\n       10. Considérant qu'aux termes\
      \ de l'article L. 761-1 du code de justice administrative : \" Dans toutes les instances, le juge condamne la partie\
      \ tenue aux dépens ou, à défaut, la partie perdante, à payer à l'autre partie la somme qu'il détermine, au titre des\
      \ frais exposés et non compris dans les dépens. Le juge tient compte de l'équité ou de la situation économique de la\
      \ partie condamnée. Il peut, même d'office, pour des raisons tirées des mêmes considérations, dire qu'il n'y a pas lieu\
      \ à cette condamnation \" ;<br>\n<br>\n       11. Considérant qu'il y a lieu, dans les circonstances de l'espèce, de\
      \ faire application de l'article L. 761-1 du code de justice administrative et de mettre à la charge de Mme B...le versement\
      \ de la somme de 1 500 euros au titre des frais exposés par le département de la Lozère et non compris dans les dépens\
      \ ; <br>\n<br>\n       12. Considérant que le département de la Lozère n'étant pas en l'espèce la partie perdante, les\
      \ dispositions de l'article L. 761-1 du code de justice administrative font obstacle à ce qu'il verse à Mme B...la somme\
      \ que celle-ci réclame au titre des frais exposés et non compris dans les dépens ;<br>\n<br>\nD E C I D E :<br>\nArticle\
      \ 1er : Le jugement du tribunal administratif de Nîmes en date du 17 janvier 2013 est annulé.<br>\nArticle 2 : La demande\
      \ présentée par Mme B...devant le tribunal administratif de Nîmes est rejetée.<br>\nArticle 3 : Mme B...versera au département\
      \ de la Lozère une somme de 1 500 (mille cinq cents) euros au titre de l'article L. 761-1 du code de justice administrative.<br>\n\
      Article 4 : Les conclusions de Mme B...tendant à l'application de l'article L. 761-1 du code de justice administrative\
      \ sont rejetées.<br>\n<br>\nArticle 5 : Le présent arrêt sera notifié au département de la Lozère et à Mme A...B....<br>\n\
      ''<br>\n''<br>\n''<br>\n''<br>\n2<br>\nN° 13MA01170\t<br>\n<br>\n<br>\n<br>\n<br> None"
    sentences:
    - "Cour Administrative d'Appel de Marseille, 5ème chambre - formation à 3, 10/04/2015, 13MA01170, Inédit au recueil Lebon\
      \ Vu la requête, enregistrée le 14 mars 2013 au greffe de la Cour, sous le n° 13MA01170, présentée pour le département\
      \ de la Lozère, dont le siège est Hôtel du Département, 4 rue de la Rovère B.P. 24 à Mende cedex (48001), représenté\
      \ par le président de son conseil général, par MeD... ; <br>\n<br>\n       Le département demande à la Cour :<br>\n\
      <br>\n       1°) d'annuler le jugement n° 1201918 du 17 janvier 2013 par lequel le tribunal administratif de Nîmes d'une\
      \ part, a annulé la décision en date du 16 mai 2012 par laquelle le président du conseil général de la Lozère a prononcé\
      \ le retrait de l'agrément d'assistante familiale de Mme B...et, d'autre part, a mis à sa charge la somme de 1 200 euros\
      \ au titre des dispositions de l'article L. 761-1 du code de justice administrative ; <br>\n<br>\n       2°) de mettre\
      \ à la charge de Mme B...la somme de 1 500 euros au titre de l'article L. 761-1 du code de justice administrative ;<br>\n\
      <br>\n       -----------------------------------------------------------------------------------------------------<br>\n\
      \       Vu les autres pièces du dossier ;<br>\n<br>\n       Vu le code de l'action sociale et des familles ; <br>\n\
      <br>\n       Vu le code de justice administrative ; <br>\n<br>\n<br>\n       Les parties ayant été régulièrement averties\
      \ du jour de l'audience ;<br>\n<br>\n       Après avoir entendu au cours de l'audience publique du 20 mars 2015 :<br>\n\
      <br>\n       - le rapport de Mme Ciréfice, premier conseiller ;<br>\n<br>\n       - les conclusions de M. Revert, rapporteur\
      \ public ;<br>\n<br>\n       - les observations de Me C...substituant MeD..., pour le département de la Lozère et celles\
      \ de MeE..., pour MmeB... ; <br>\n<br>\n<br>\n<br>\n<br>\n       1. Considérant que le département de la Lozère relève\
      \ appel du jugement en date du 17 janvier 2013 par lequel le tribunal administratif de Nîmes, d'une part, a annulé la\
      \ décision en date du 16 mai 2012 par laquelle le président du conseil général de la Lozère a prononcé le retrait de\
      \ l'agrément d'assistante familiale de Mme B...et, d'autre part, a mis à sa charge la somme de 1 200 euros au titre\
      \ des dispositions de l'article L. 761-1 du code de justice administrative ; <br>\n<br>\n<br>\n       Sur le moyen d'annulation\
      \ retenu par le tribunal administratif : <br>\n<br>\n       2. Considérant qu'aux termes de l'article L. 421-3 du code\
      \ de l'action sociale et des familles, dans sa rédaction en vigueur à la date de la décision contestée : \" L'agrément\
      \ nécessaire pour exercer la profession d'assistant maternel ou d'assistant familial est délivré par le président du\
      \ conseil général du département où le demandeur réside. / (...) L'agrément est accordé à ces deux professions si les\
      \ conditions d'accueil garantissent la sécurité, la santé et l'épanouissement des mineurs et majeurs de moins de vingt\
      \ et un ans accueillis, en tenant compte des aptitudes éducatives de la personne. (...) \" ; qu'aux termes de l'article\
      \ L. 421-6 du même code : \" (...) Si les conditions de l'agrément cessent d'être remplies, le président du conseil\
      \ général peut, après avis d 'une commission consultative paritaire départementale, modifier le contenu de l'agrément\
      \ ou procéder à son retrait. En cas d'urgence, le président du conseil général peut suspendre l'agrément. Tant que l'agrément\
      \ reste suspendu, aucun enfant ne peut être confié. / Toute décision de retrait de l'agrément, de suspension de l'agrément\
      \ ou de modification de son contenu doit être dûment motivée et transmise sans délai aux intéressés. (...) \" ; qu'aux\
      \ termes de l'article R. 421-26 de ce code : \" Un manquement grave ou des manquements répétés aux obligations de déclaration\
      \ et de notification prévues aux articles R. 421-38, R. 421-39, R. 421-40 et R. 421-41 ainsi que des dépassements du\
      \ nombre d'enfants mentionnés dans l'agrément et ne répondant pas aux conditions prévues par l'article R. 421-17 peuvent\
      \ justifier, après avertissement, un retrait d'agrément. \" ; qu'enfin, aux termes de l'article R. 421-38 du même code\
      \ : \" Les assistants maternels et les assistants familiaux agréés informent sans délai le président du conseil général\
      \ de toute modification des informations figurant dans le formulaire de demande d'agrément mentionné à l'article L.\
      \ 421-3 et relatives à leur situation familiale, aux personnes vivant à leur domicile et aux autres agréments dont ils\
      \ disposent \" ; <br>\n<br>\n<br>\n       3. Considérant qu'il résulte de ces dispositions que le retrait de l'agrément\
      \ d'un assistant familial peut être légalement fondé sur la révélation d'une carence de celui-ci dans l'accomplissement\
      \ des missions qui lui sont confiées ; <br>\n<br>\n       4. Considérant que le retrait d'agrément est motivé, d'une\
      \ part, par l'existence d'une procédure en assistance éducative au profit de Mme B...pour son fils mineur et, d'autre\
      \ part, par le manquement à l'obligation de l'assistant familial d'informer sans délai le président du conseil général\
      \ de toute modification de sa situation familiale, alors même que le dossier transmis par le parquet de Mende atteste\
      \ que les difficultés éducatives et les démarches initiées dans ce cadre auprès des services de protection de l'enfance\
      \ datent du mois d'août 2011, soit antérieurement à la demande d'agrément d'assistante familiale dont le dossier complet\
      \ a été reçu en octobre 2011 ; qu'il ressort en effet des pièces du dossier que, nouvellement agréée par une décision\
      \ du 19 février 2012, Mme B...était en stage préparatoire avant l'accueil d'un premier enfant lorsque le service de\
      \ protection de l'enfance du département a été averti par les service du procureur de la République que le fils de Mme\
      \ B...faisait l'objet d'une mesure de protection ordonnée par décision du juge des enfants du Var ; que les difficultés\
      \ rencontrées depuis plusieurs années par M. et Mme B...avec le fils de celle-ci n'ont, à aucun moment des évaluations,\
      \ été abordées par M. et MmeB..., pourtant questionnés sur leurs positionnements éducatifs auprès de leurs enfants et\
      \ des réponses ou solutions apportées aux moments de crise inhérents à l'éducation et l'accompagnement d'un enfant quel\
      \ qu'il soit ; qu'il ressort des notes élaborées par l'éducatrice spécialisée et par la psychologue, à l'issue de la\
      \ nouvelle enquête diligentée par le département, que cette dissimulation conduisait à s'interroger tant sur les liens\
      \ de confiance entre Mme B...et l'équipe avec laquelle elle devait travailler que sur ses capacités éducatives, à poser\
      \ un cadre ferme, soutenant et sécurisant, à un enfant dont les parents pouvaient rencontrer les mêmes difficultés que\
      \ l'intéressée avec son propre enfant ; qu'au vu de ces éléments, la commission consultative paritaire s'est d'ailleurs\
      \ prononcée à l'unanimité moins une voix en faveur du retrait d'agrément de MmeB... ; que, par suite, le président du\
      \ conseil général a pu, sans commettre d'erreur d'appréciation, prononcer le retrait de l'agrément d'assistante familiale\
      \ de MmeB... ; qu'ainsi c'est à tort que le tribunal s'est fondé sur ce motif pour annuler la décision du président\
      \ du conseil général de la Lozère en date du 16 mai 2011 ; <br>\n<br>\n       5. Considérant toutefois qu'il appartient\
      \ à la Cour, saisie de l'ensemble du litige par l'effet dévolutif de l'appel, d'examiner les autres moyens soulevés\
      \ par Mme B...devant le tribunal administratif de Nîmes ; <br>\n<br>\n       Sur les autres moyens invoqués par Mme\
      \ B...devant le tribunal administratif de Nîmes :<br>\n<br>\n       6. Considérant, en premier lieu, que la décision\
      \ litigieuse, qui cite les articles appliqués du code de l'action sociale et des familles ainsi que les faits qui sont\
      \ reprochés à MmeB..., satisfait ainsi aux exigences posées par l'article L. 421-6 précité du code de l'action sociale\
      \ et des familles ; que, dès lors, la requérante n'est pas fondée à soutenir que cette décision ne serait pas suffisamment\
      \ motivée;<br>\n<br>\n       7. Considérant, en deuxième lieu, qu'aux termes de l'article R. 421-23 du code de l'action\
      \ sociale et des familles dans sa rédaction alors en vigueur : \" Lorsque le président du conseil général envisage de\
      \ retirer un agrément, d'y apporter une restriction ou de ne pas le renouveler, il saisit pour avis la commission consultative\
      \ paritaire départementale mentionnée à l'article R. 421-27 en lui indiquant les motifs de la décision envisagée. /\
      \ L'assistant maternel ou l'assistant familial concerné est informé, quinze jours au moins avant la date de la réunion\
      \ de la commission avec demande d'avis de réception, des motifs de la décision envisagée à son encontre, de la possibilité\
      \ de consulter son dossier administratif et de présenter devant la commission ses observations écrites ou orales. (...)\
      \ \" ; qu'aux termes de l'article R. 421-27 du même code : \" La commission consultative paritaire départementale, prévue\
      \ par l'article L. 421-6, comprend, en nombre égal, des membres représentant le département et des membres représentant\
      \ les assistants maternels et les assistants familiaux agréés résidant dans le département \" ; qu'aux termes de l'article\
      \ 4 du règlement intérieur de la commission consultative paritaire départementale des assistants maternels et assistants\
      \ familiaux de la Lozère : \" (...) Les suppléants peuvent assister aux séances de la commission. Ils n'ont voix délibérative\
      \ qu'en l'absence des titulaires qu'ils remplacent \" ; qu'il ressort du procès-verbal de la réunion du 11 mai 2012\
      \ de la commission consultative paritaire, durant laquelle le cas de Mme B... a été examiné, que si trois représentants\
      \ du départements étaient présents contre cinq représentants des assistants maternels et familiaux, seuls trois de ces\
      \ représentants ont pris part au vote, deux membres titulaires et un membre suppléant en remplacement d'un titulaire\
      \ absent ; que, par suite, le moyen tiré de ce que le vote de la commission serait illégal pour vice de procédure manque\
      \ en fait et doit être écarté ; <br>\n<br>\n       8. Considérant enfin que, si les actes administratifs doivent être\
      \ pris selon les formes et conformément aux procédures prévues par les lois et règlements, un vice affectant le déroulement\
      \ d'une procédure administrative préalable, suivie à titre obligatoire ou facultatif, n'est de nature à entacher d'illégalité\
      \ la décision prise que s'il ressort des pièces du dossier qu'il a été susceptible d'exercer, en l'espèce, une influence\
      \ sur le sens de la décision prise ou qu'il a privé les intéressés d'une garantie ; qu'il ressort des pièces du dossier\
      \ que, nouvellement agréée, Mme B...était en stage préparatoire avant l'accueil d'un premier enfant lorsque le service\
      \ de protection de l'enfance du département a été averti par les services du procureur de la République que le fils\
      \ de Mme B...faisait l'objet d'une mesure de protection ordonnée par décision du juge des enfants du Var ; qu'au vu\
      \ de cette information le service de l'aide sociale à l'enfance a procédé à une nouvelle évaluation de la situation\
      \ de l'intéressée et entendu cette dernière lors d'un entretien le 30 mars 2012 ; que Mme B...a été informée des motifs\
      \ de la décision envisagée à son encontre et a également été en mesure de présenter ses observations tant écrites qu'orales\
      \ devant la commission consultative paritaire départementale ; que, par suite, à supposer même qu'elle n'ait pas été\
      \ destinataire de l'avertissement prévu à l'article R. 421-26 précité du code de l'action sociale et des familles, cette\
      \ circonstance ne l'a pas privée d'une garantie découlant du respect des droits de la défense ; que l'absence alléguée\
      \ d'avertissement n'a pas non plus exercé une influence sur le sens de la décision prise ; qu'il résulte de ce qui précède\
      \ que cette omission n'a pas constitué une irrégularité de nature à entacher la légalité de la décision contestée ;<br>\n\
      <br>\n       9. Considérant qu'il résulte de tout ce qui précède que le département de la Lozère est fondé à soutenir\
      \ que c'est à tort que, par le jugement attaqué, le tribunal administratif de Nîmes a annulé la décision du président\
      \ de son conseil général en date du 16 mai 2011 ; <br>\n<br>\n       Sur les conclusions présentées en application des\
      \ dispositions de l'article L. 761-1 du code de justice administrative :<br>\n<br>\n       10. Considérant qu'aux termes\
      \ de l'article L. 761-1 du code de justice administrative : \" Dans toutes les instances, le juge condamne la partie\
      \ tenue aux dépens ou, à défaut, la partie perdante, à payer à l'autre partie la somme qu'il détermine, au titre des\
      \ frais exposés et non compris dans les dépens. Le juge tient compte de l'équité ou de la situation économique de la\
      \ partie condamnée. Il peut, même d'office, pour des raisons tirées des mêmes considérations, dire qu'il n'y a pas lieu\
      \ à cette condamnation \" ;<br>\n<br>\n       11. Considérant qu'il y a lieu, dans les circonstances de l'espèce, de\
      \ faire application de l'article L. 761-1 du code de justice administrative et de mettre à la charge de Mme B...le versement\
      \ de la somme de 1 500 euros au titre des frais exposés par le département de la Lozère et non compris dans les dépens\
      \ ; <br>\n<br>\n       12. Considérant que le département de la Lozère n'étant pas en l'espèce la partie perdante, les\
      \ dispositions de l'article L. 761-1 du code de justice administrative font obstacle à ce qu'il verse à Mme B...la somme\
      \ que celle-ci réclame au titre des frais exposés et non compris dans les dépens ;<br>\n<br>\nD E C I D E :<br>\nArticle\
      \ 1er : Le jugement du tribunal administratif de Nîmes en date du 17 janvier 2013 est annulé.<br>\nArticle 2 : La demande\
      \ présentée par Mme B...devant le tribunal administratif de Nîmes est rejetée.<br>\nArticle 3 : Mme B...versera au département\
      \ de la Lozère une somme de 1 500 (mille cinq cents) euros au titre de l'article L. 761-1 du code de justice administrative.<br>\n\
      Article 4 : Les conclusions de Mme B...tendant à l'application de l'article L. 761-1 du code de justice administrative\
      \ sont rejetées.<br>\n<br>\nArticle 5 : Le présent arrêt sera notifié au département de la Lozère et à Mme A...B....<br>\n\
      ''<br>\n''<br>\n''<br>\n''<br>\n2<br>\nN° 13MA01170\t<br>\n<br>\n<br>\n<br>\n<br> None"
    - "CAA de NANCY, 2ème chambre - formation à 3, 19/10/2017, 16NC00404, Inédit au recueil Lebon Vu la procédure suivante\
      \ :<br>\n<br>\n       Procédure contentieuse antérieure :<br>\n<br>\n       M. B...a demandé au tribunal administratif\
      \ de Strasbourg de \" réviser ses avis d'imposition \" à l'impôt sur le revenu au titre des années 2010 et 2011. <br>\n\
      <br>\n       Par un jugement n°1301300 du 5 janvier 2016, le tribunal administratif de Strasbourg a rejeté sa demande.\
      \ <br>\n<br>\n       Procédure devant la cour :<br>\n<br>\n       Par une requête, enregistrée le 4 mars 2016, M.B...,\
      \ représenté par MeC..., demande à la cour :<br>\n       1°) d'annuler le jugement susvisé du tribunal administratif\
      \ de Strasbourg du <br>\n5 janvier 2016 ;<br>\n<br>\n       2°) de transmettre au Conseil d'Etat la question prioritaire\
      \ de constitutionnalité soumise en première instance ;<br>\n<br>\n       3°) à défaut, de \" réviser ses avis d'imposition\
      \ \" à l'impôt sur le revenu au titre des années 2010 et 2011 ;<br>\n<br>\n       4°) de mettre à la charge de l'Etat\
      \ le versement d'une somme de 1 500 euros en application de l'article L. 761-1 du code de justice administrative. <br>\n\
      <br>\n       Il soutient que :<br>\n<br>\n       - il ne peut être considéré que le Conseil constitutionnel s'est déjà\
      \ prononcé sur la question de la conformité à la constitution des dispositions de l'article 80 quinquies du code général\
      \ des impôts au regard de sa situation précise de médecin non salarié ;<br>\n       - sa situation rentre dans le champ\
      \ de l'exonération prévue par l'article 80 quinquies du code général des impôts, dès lors qu'il est atteint de plusieurs\
      \ affections comportant un traitement prolongé et une thérapeutique particulièrement coûteuse ; les prestations en litige\
      \ versées par la caisse autonome de retraite des médecins de France (CARMF) ont bien été versées au titre d'une assurance\
      \ pour cause de maladie et non pas d'une assurance pour cause d'invalidité décès ;<br>\n<br>\n       Par un mémoire\
      \ en défense, enregistré le 21 septembre 2016, le ministre de l'économie et des finances conclut au rejet de la requête\
      \ ;<br>\n<br>\n       Il soutient que les moyens soulevés par M. B...ne sont pas fondés. <br>\n<br>\n       Par un mémoire\
      \ distinct et un mémoire en réplique enregistrés le 28 mars 2017, <br>\nM.B..., représenté par MeC..., demande à la\
      \ cour de transmettre au Conseil d'Etat la question prioritaire de constitutionnalité soumise en première instance ;<br>\n\
      <br>\n       Il soutient que cette question présente un caractère sérieux en tant que les dispositions de l'article\
      \ 80 quinquies du code général des impôts, en réservant le bénéfice de l'exonération d'impôt sur le revenu aux indemnités\
      \ journalières allouées à des personnes atteintes d'une affection comportant un traitement prolongé et une thérapeutique\
      \ particulièrement coûteuse versées par les seuls organismes de sécurité sociale et de la mutualité sociale agricole,\
      \ méconnaissent les articles 6 et 13 de la déclaration des droits de l'homme et du citoyen et l'article 34 de la constitution\
      \ ;<br>\n<br>\n       Par un mémoire en défense, enregistré le 6 avril 2017, le ministre de l'action et des comptes\
      \ publics conclut au rejet de la requête ;<br>\n<br>\n       Il soutient que les moyens soulevés par M. B...ne sont\
      \ pas fondés. <br>\n<br>\n       Par un mémoire enregistré le 21 avril 2017, M. B...conclut aux mêmes fins que ses précédents\
      \ mémoires par les mêmes moyens.<br>\n<br>\n       Vu :<br>\n       - les autres pièces du dossier.<br>\n<br>\n    \
      \   Vu :<br>\n       - la Constitution ;<br>\n       - l'ordonnance n° 58-1067 du 7 novembre 1958 ;<br>\n       - le\
      \ code général des impôts et le livre des procédures fiscales ;<br>\n       - le code de la sécurité sociale ;<br>\n\
      \       - le décret n° 55-1390 du 18 octobre 1955 ;<br>\n       - l'arrêté du 10 avril 1968 portant approbation des\
      \ statuts complétés et modifiés du régime de l'assurance invalidité-décès des médecins ;<br>\n       - la décision du\
      \ Conseil constitutionnel n° 2013-365 QPC du 6 février 2014 ;<br>\n       - le code de justice administrative.<br>\n\
      <br>\n<br>\n       Les parties ont été régulièrement averties du jour de l'audience.<br>\n<br>\n       Ont été entendus\
      \ au cours de l'audience publique :<br>\n       - le rapport de Mme Didiot, <br>\n       - les conclusions de Mme Peton,\
      \ rapporteur public,<br>\n       - et les observations de MeC..., représentant M.B....<br>\n<br>\n<br>\n<br>\n<br>\n\
      \       1. Considérant que M. et Mme B...ont été régulièrement imposés au titre de l'impôt sur le revenu des années\
      \ 2010 et 2011 d'après les éléments portés sur leurs déclarations de revenus ; que toutefois, M. B...doit être regardé\
      \ comme demandant la réduction desdites impositions en sollicitant l'exonération des indemnités journalières perçues\
      \ dans le cadre d'une incapacité de travail par la caisse autonome de retraite des médecins de France (CARMF), s'élevant\
      \ respectivement à 9 657 euros en 2010 et à 13 087 euros en 2011, en application des dispositions de l'article 80 quinquies\
      \ du code général des impôts ; qu'il relève appel du jugement du 5 janvier 2016 par lequel le tribunal administratif\
      \ de Strasbourg a rejeté sa demande tendant à la réduction de ses cotisations à l'impôt sur le revenu au titre des années\
      \ 2010 et 2011 ;<br>\n<br>\n       Sur la question prioritaire de constitutionnalité :<br>\n<br>\n       2. Considérant\
      \ qu'il résulte des dispositions combinées des premiers alinéas des articles 23-1 et 23-2 de l'ordonnance du 7 novembre\
      \ 1958 portant loi organique sur le Conseil constitutionnel, que le tribunal administratif saisi d'un moyen tiré de\
      \ ce qu'une disposition législative porte atteinte aux droits et libertés garantis par la Constitution présenté dans\
      \ un écrit distinct et motivé, statue sans délai par une décision motivée sur la transmission de la question prioritaire\
      \ de constitutionnalité au Conseil d'Etat et procède à cette transmission si est remplie la triple condition que la\
      \ disposition contestée soit applicable au litige ou à la procédure, qu'elle n'ait pas déjà été déclarée conforme à\
      \ la Constitution dans les motifs et le dispositif d'une décision du Conseil constitutionnel, sauf changement des circonstances\
      \ et que la question ne soit pas dépourvue de caractère sérieux ;<br>\n<br>\n       3. Considérant qu'alors même que\
      \ la question à l'origine de la décision QPC susvisée du 6 février 2014 a porté sur la conformité au principe d'égalité\
      \ devant la loi et les charges publiques des dispositions de l'article 80 quinquies du code général des impôts en tant\
      \ qu'elles excluent de leur bénéfice les fonctionnaires, le Conseil constitutionnel doit être regardé comme ayant, par\
      \ ladite décision, dans ses motifs et son dispositif, déclaré les dispositions en litige conformes à la Constitution\
      \ ; que la circonstance que l'intéressé soit médecin non salarié et, comme tel, également exclu du bénéfice des dispositions\
      \ de l'article 80 quinquies précité, ne constitue pas un changement de circonstances de nature à justifier que la conformité\
      \ de ces dispositions à la Constitution soit à nouveau examinée par le Conseil constitutionnel ; qu'ainsi, le requérant\
      \ n'est pas fondé à soutenir que c'est à tort que le tribunal a refusé de transmettre au Conseil d'Etat la question\
      \ prioritaire de constitutionnalité soulevée en première instance ;<br>\n<br>\n       Sur les conclusions à fin de décharge\
      \ :<br>\n<br>\n       4. Considérant qu'aux termes de l'article 79 du code général des impôts : \" Les traitements,\
      \ indemnités, émoluments, salaires, pensions et rentes viagères concourent à la formation du revenu global servant de\
      \ base à l'impôt sur le revenu \" ; qu'aux termes de <br>\nl'article 80 quinquies du même code : \" Les indemnités journalières\
      \ versées par les organismes de sécurité sociale (...) sont soumises à l'impôt sur le revenu suivant les règles spécifiques\
      \ applicables aux traitements et salaires, à l'exclusion des indemnités (...) qui sont allouées à des personnes qui\
      \ sont atteintes d'une affection comportant un traitement prolongé et une thérapeutique particulièrement coûteuse. \"\
      \ ; qu'en vertu des dispositions précitées, les indemnités journalières de sécurité sociale versées par les organismes\
      \ de sécurité sociale et de la mutualité sociale agricole ou pour leur compte aux assurés atteints de l'une des affections\
      \ comportant un traitement prolongé et une thérapeutique particulièrement coûteuse sont exclues de l'assiette de l'impôt\
      \ sur le revenu ; <br>\n<br>\n       5. Considérant que M. B...produit de nombreux documents médicaux, dont il ressort\
      \ qu'il souffre de nombreuses pathologies, et notamment d'un état dépressif, d'un cancer de la prostate et de coronaropathie\
      \ ; qu'il justifie ainsi être atteint d'une affection comportant un traitement prolongé et une thérapeutique particulièrement\
      \ coûteuse, reconnue d'ailleurs comme telle par la caisse primaire d'assurance maladie de la Moselle en application\
      \ des dispositions de l'article L. 322-3 du code de la sécurité sociale ;<br>\n<br>\n       6. Considérant, toutefois,\
      \ que l'article L. 311-2 du code de la sécurité sociale prévoit que \" sont affiliées obligatoirement aux assurances\
      \ sociales du régime général, quel que soit leur âge et même si elles sont titulaires d'une pension, toutes les personnes\
      \ quelle que soit leur nationalité, de l'un ou de l'autre sexe, salariées ou travaillant à quelque titre ou en quelque\
      \ lieu que ce soit, pour un ou plusieurs employeurs et quels que soient le montant et la nature de leur rémunération,\
      \ la forme, la nature ou la validité de leur contrat \" ; qu'aux termes de l'article L. 613-2 du même code : \" Ne sont\
      \ pas affiliées au régime d'assurance maladie et d'assurance maternité des travailleurs non salariés des professions\
      \ non agricoles : / 1°) les personnes exerçant ou ayant exercé, à titre exclusif, une activité non salariée entraînant\
      \ soit leur affiliation à un régime obligatoire légal ou réglementaire de sécurité sociale de salariés, soit le bénéfice\
      \ du régime des avantages sociaux complémentaires accordés aux praticiens et auxiliaires médicaux et aux bénéficiaires\
      \ de l'article L. 371-1 \" ; que les dispositions précitées excluent ainsi les médecins non-salariés bénéficiaires,\
      \ comme en l'espèce, du régime spécifique des avantages sociaux complémentaires des médecins, de l'affiliation au régime\
      \ d'assurance maladie ; qu'en outre, les prestations en litige et versées par la CARMF l'ont été au titre non de l'assurance\
      \ maladie, mais de l'assurance invalidité-décès, ainsi que cela ressort notamment des intitulés mêmes du décret n° 55-1390\
      \ susvisé et de l'arrêté pris pour son application ;<br>\n<br>\n       7. Considérant qu'il résulte de ce qui précède\
      \ que les indemnités journalières perçues par M. B...n'entraient pas dans le champ d'application de l'article 80 quinquies\
      \ du code général des impôts et étaient ainsi imposables à l'impôt sur le revenu ;<br>\n<br>\n       8. Considérant\
      \ qu'il résulte de tout ce qui précède que M. B...n'est pas fondé à soutenir que c'est à tort que, par le jugement attaqué,\
      \ le tribunal administratif de Strasbourg a rejeté sa demande ; <br>\n<br>\n       Sur l'application des dispositions\
      \ de l'article L. 761-1 du code de justice administrative:<br>\n<br>\n       9. Considérant que les dispositions de\
      \ l'article L. 761-1 du code de justice administrative font obstacle à ce que soit mise à la charge de l'Etat, qui n'est\
      \ pas, dans la présente instance, la partie tenue aux dépens ou la partie perdante, une somme au titre des frais exposés\
      \ et non compris dans les dépens ;<br>\n<br>\n<br>\n       D É C I D E :<br>\n<br>\n<br>\n       Article 1er : La requête\
      \ de M. B...est rejetée.<br>\n<br>\n       Article 2 : Le présent arrêt sera notifié à M. A...B...et au ministre de\
      \ l'action et des comptes publics.<br>\n<br>\n<br>\n5<br>\nN° 16NC00404<br>\n<br>\n<br>\n<br> None"
    - 'Bundesgericht Tribunal fédéral Tribunale federale Tribunal federal 8C_369/2018 Arrêt du 20 novembre 2018 Ire Cour de
      droit social Composition MM. et Mme les Juges fédéraux Maillard, Président, Frésard et Viscione. Greffière : Mme Paris.
      Participants à la procédure A.________, représenté par Me Daniela Linhares, avocate, recourant, contre Caisse nationale
      suisse d''assurance en cas d''accidents (CNA), Fluhmattstrasse 1, 6004 Lucerne, intimée. Objet Assurance-accidents (rente
      d''invalidité; indemnité pour atteinte à l''intégrité), recours contre le jugement de la Cour de justice de la République
      et canton de Genève, Chambre des assurances sociales, du 11 avril 2018 (A/2232/2017 ATAS/305/2018). Faits : A. A.a.
      A.________ travaillait en qualité de cuisinier au service de la société B.________. Le 10 octobre 2011, alors qu''il
      roulait en scooter, il a été heurté par un autre scooter et s''est fracturé le plateau tibial droit en chutant. Il a
      été hospitalisé à l''hôpital C.________ jusqu''au 27 octobre 2011, où il a subi une intervention chirurgicale (ostéosynthèse
      du plateau tibial droit). La Caisse nationale suisse d''assurance en cas d''accidents (ci-après: la CNA), auprès de
      laquelle il était assuré obligatoirement contre le risque d''accident, a pris en charge le cas. L''évolution a été défavorable,
      A.________ a subi une nouvelle opération le 6 septembre 2013 consistant en l''ablation du matériel d''ostéosynthèse
      et la pose d''une prothèse totale du genou droit. Il a ensuite été réopéré le 12 décembre 2014 en raison d''un syndrome
      d''accrochage synovial douloureux sur la prothèse du genou. L''assuré a par ailleurs développé, à la suite de l''accident,
      des troubles psychiques, notamment une réaction mixte anxieuse et dépressive (rapport de la doctoresse D.________, spécialiste
      en psychiatrie et psychothérapie du 10 février 2015). Le 25 avril 2016, la doctoresse E.________, spécialiste en chirurgie
      orthopédique et médecin d''arrondissement de la CNA, a procédé à l''examen final de l''assuré. Elle a retenu que le
      cas était stabilisé et que, sur le plan orthopédique, la capacité de travail était complète dans une activité adaptée
      aux limitations fonctionnelles, à savoir une activité ne comportant pas de stations debout de longue durée, ni de longues
      marches ou de ports répétitifs de charges moyennes. Il convenait également d''éviter de monter sur des échelles ou des
      escabeaux, d''emprunter fréquemment des escaliers et de marcher en terrain irrégulier. Sur la base de cet avis, la CNA
      a mis un terme à la prise en charge des soins médicaux (hormis une à deux séances de physiothérapie par année, des anti-douleurs
      et anti-inflammatoires à doses modérées et deux contrôles médicaux par année) et au versement de l''indemnité journalière
      avec effet au 31 décembre 2016. Par décision du 20 février 2017, confirmée sur opposition le 20 avril suivant, la CNA
      a alloué à A.________ une indemnité pour atteinte à l''intégrité de 30 % mais a refusé de lui allouer une rentre d''invalidité,
      motif pris que le taux d''incapacité de gain n''atteignait pas le minimum légal de 10 %. A.b. Parallèlement, se fondant
      sur l''avis de la doctoresse F.________ (rapport du 23 septembre 2015), médecin de son service médical régional (SMR),
      l''office cantonal de l''assurance-invalidité du canton de Genève a alloué à A.________ une rente entière de l''assurance-invalidité
      du 1er octobre 2012 au 30 septembre 2015, fondée sur un degré d''invalidité de 100 %, et un quart de rente dès le 1er
      octobre 2015, basé sur un degré d''invalidité de 45 % (décision du 6 avril 2017). B. L''assuré a déféré la décision
      sur opposition du 20 avril 2017 à la Chambre des assurances sociales de la Cour de justice de la République et canton
      de Genève, laquelle a rejeté le recours par jugement du 11 avril 2018. C. A.________ interjette un recours en matière
      de droit public en concluant à l''annulation de l''arrêt attaqué, la cause étant renvoyée à la juridiction cantonale
      pour nouvelle décision. Subsidiairement, il conclut à la reconnaissance d''un taux d''invalidité de 45.38 %, ouvrant
      le droit à une rente mensuel de 2''574 fr.10 à compter du 1er octobre 2015. Il conclut également à l''octroi d''une
      indemnité pour atteinte à l''intégrité de 40 % et au versement de 12''600 fr. à titre de solde. La CNA conclut au rejet
      du recours. La juridiction cantonale et l''Office fédéral de la santé publique ont renoncé à se déterminer. Considérant
      en droit : 1. Le recours est dirigé contre un arrêt final (art. 90 LTF) rendu en matière de droit public (art. 82 ss
      LTF) par une autorité cantonale de dernière instance (art. 86 al. 1 let. d LTF). Il a été déposé dans le délai (art.
      100 LTF) prévu par la loi. Il est donc recevable. 2. Le litige porte sur le droit de l''assuré à une rente d''invalidité
      de l''assurance-accidents, ainsi que sur le taux de l''indemnité pour atteinte à l''intégrité. La procédure portant
      sur l''octroi ou le refus de prestations en espèces de l''assurance-accidents, le Tribunal fédéral n''est pas lié par
      les faits établis par l''autorité précédente (art. 105 al. 3 LTF). 3. Le jugement entrepris expose de manière complète
      les dispositions légales et la jurisprudence applicables en l''espèce. Il suffit d''y renvoyer. 4. En se fondant sur
      les conclusions de la doctoresse E.________ (rapport du 25 avril 2016), la juridiction cantonale a retenu que le recourant
      avait recouvré une capacité de travail entière dans une activité adaptée dès le mois d''avril 2016 et présentait un
      taux d''invalidité de 7 %, soit un degré insuffisant pour ouvrir le droit à une rente. Elle a constaté que la doctoresse
      F.________ qui faisait état d''une capacité de travail de 50 % dans une activité adaptée (rapport du 23 septembre 2015)
      s''était prononcée à un moment où l''état de santé du recourant n''était pas encore stabilisé et était "susceptible
      de s''améliorer". Il n''existait dès lors pas à proprement parler de contradictions entre l''appréciation de l''exigibilité
      formulée par les doctoresses E.________ et F.________ qui s''étaient prononcées à sept mois d''intervalle. Partant,
      les premiers juges se sont estimés suffisamment renseignés sur la base de l''avis du médecin d''arrondissement et ont
      renoncé à ordonner la réalisation d''une expertise judiciaire. 5. 5.1. Invoquant une violation du droit fédéral ainsi
      qu''une appréciation arbitraire des preuves, le recourant reproche à la juridiction cantonale d''avoir omis d''ordonner
      une expertise judiciaire. Il soutient que les conclusions contradictoires des doctoresses E.________ et F.________ étaient
      de nature à éveiller des doutes quant à la fiabilité de l''appréciation du médecin d''arrondissement selon laquelle
      il disposait d''une pleine capacité de travail dans une activité adaptée. Il conteste également le taux d''invalidité
      de 7 % en tant qu''il résulte de l''exigibilité d''une activité adaptée à plein temps, mais ne remet pas en question
      le calcul en tant que tel du degré d''invalidité opéré par les premiers juges. 5.2. En l''espèce, la divergence d''opinion
      entre les doctoresses F.________ et E.________ s''explique principalement par l''évolution de la situation médicale,
      comme l''a relevé la cour cantonale. Tant la doctoresse F.________ que les autres médecins qui ont donné leur avis sur
      la capacité de travail du recourant avant la doctoresse E.________ se sont prononcés alors que le cas n''était pas encore
      stabilisé. S''ils ont certes tous retenu une capacité de travail réduite, ils ont toutefois unanimement indiqué que
      la situation était susceptible d''évoluer (rapports des docteurs G.________, du 11 avril 2013, H.________, du 13 février
      2014 et I.________, du 23 décembre 2014, respectivement spécialiste en chirurgie orthopédique, spécialiste en chirurgie
      orthopédique et médecin d''arrondissement de la CNA et spécialiste en médecine physique et réadaptation). Sept mois
      après l''avis médical de la doctoresse F.________, la doctoresse E.________ a considéré que le cas était stabilisé -
      ce que le recourant n''a pas contesté - et a estimé que sur le plan orthopédique la capacité de travail de l''assuré
      était désormais entière. Or, il n''existe aucun indice concret permettant de douter du bien-fondé des conclusions du
      médecin d''arrondissement. Comme on l''a vu, celles-ci n''entrent pas en contradiction avec les appréciations des médecins
      qui se sont exprimés sur le cas. En outre, la doctoresse E.________ a dûment étayé son rapport, lequel a été établi
      en connaissance de l''anamnèse, du dossier médical, au terme d''un examen clinique et en considération des plaintes
      du recourant. Par ailleurs, comme le relèvent les premiers juges, l''appréciation de la doctoresse E.________ n''est
      pas non plus remise en cause par les résultats obtenus au terme des stages effectués ultérieurement par le recourant
      aux Etablissements publics pour l''intégration (EPI). En effet, si lors des mesures d''orientation professionnelle ayant
      eu lieu du 4 juillet 2016 au 21 août suivant, le taux d''activité de l''assuré est passé de 100 % à 50 % après deux
      semaines, cette réduction était essentiellement due à une fatigue morale importante. Cette observation était corroborée
      par les résultats obtenus à l''issue d''un stage au sein d''un atelier de réentraînement (du 22 août au 2 octobre 2016)
      au cours duquel l''assuré n''avait pas réussi à augmenter son taux de travail, non pas à cause de ses limitations physiques,
      mais principalement en raison de sa situation familiale (rapport des EPI du 2 novembre 2016). Vu ce qui précède, la
      cour cantonale était fondée à se baser sur l''avis du médecin d''arrondissement et à retenir une capacité de travail
      entière dans une activité adaptée aux limitations fonctionnelles; l''appréciation anticipée des preuves à laquelle elle
      a procédé en renonçant à ordonner une expertise judiciaire n''était pas arbitraire. Dans ces conditions, il n''y a pas
      lieu d''examiner plus avant le degré d''invalidité retenu par le Tribunal cantonal. Étant rappelé, au demeurant, que
      l''évaluation de l''invalidité par l''assurance-invalidité n''a pas de force contraignante pour l''assureur-accidents
      (ATF 131 V 362 consid. 2.3 p. 368). 6. C''est finalement en vain que le recourant se plaint du taux de l''indemnité
      pour atteinte à l''intégrité retenu par les premiers juges. Sur ce point, son grief est la reprise mot pour mot de l''argumentation
      développée devant l''instance cantonale. Un pareil procédé est d''emblée inadmissible sous l''angle de l''art. 42 al.
      2 LTF, car il n''y a pas de lien entre la motivation attaquée et le grief exposé dans le recours au Tribunal fédéral;
      ce grief n''est pas recevable (ATF 134 II 244 consid. 2.3 p. 246 s.). Au demeurant, il n''y a pas lieu d''examiner plus
      avant l''appréciation de la juridiction cantonale, laquelle a expliqué de manière approfondie et convaincante les motifs
      pour lesquels elle a confirmé le taux de 30 % fixé par la CNA. 7. Il s''ensuit que le jugement attaqué n''est pas critiquable
      et que le recours se révèle mal fondé. 8. Le recourant, qui succombe, supportera les frais de justice (art. 66 al. 1
      LTF). Par ces motifs, le Tribunal fédéral prononce : 1. Le recours est rejeté dans la mesure où il est recevable. 2.
      Les frais judiciaires, arrêtés à 800 fr., sont mis à la charge du recourant. 3. Le présent arrêt est communiqué aux
      parties, à la Cour de justice de la République et canton de Genève, Chambre des assurances sociales, et à l''Office
      fédéral de la santé publique. Lucerne, le 20 novembre 2018 Au nom de la Ire Cour de droit social du Tribunal fédéral
      suisse Le Président : Maillard La Greffière : Paris Assurance-accidents (rente d''invalidité; indemnité pour atteinte
      à l''intégrité), recours contre le jugement de la Cour de justice de la République et canton de Genève, Chambre des
      assurances sociales, du 11 avril 2018 (A/2232/2017 ATAS/305/2018).'
  - source_sentence: "Conseil d'État, 4ème - 5ème chambres réunies, 04/12/2017, 411438, Inédit au recueil Lebon Vu la procédure\
      \ suivante :<br>\n<br>\n              Par un mémoire, enregistré le 12 septembre 2017 au secrétariat du contentieux\
      \ du Conseil d'Etat, la société Sudelvet Conseil demande au Conseil d'Etat, en application de l'article 23-5 de l'ordonnance\
      \ n° 58-1067 du 7 novembre 1958 et à l'appui de sa requête tendant à l'annulation, pour excès de pouvoir, du décret\
      \ n° 2017-514 du 10 avril 2017 relatif à la réforme de l'ordre des vétérinaires, de renvoyer au Conseil constitutionnel\
      \ la question de la conformité aux droits et libertés garantis par la Constitution des dispositions de l'article L.\
      \ 242-2 du code rural et de la pêche maritime.<br>\n<br>\n              Vu les autres pièces du dossier ;<br>\n<br>\n\
      \              Vu :<br>\n              - la Constitution, notamment son Préambule et son article 61-1 ; <br>\n     \
      \         - l'ordonnance n° 58-1067 du 7 novembre 1958 ;<br>\n              - l'article L. 242-2 du code rural et de\
      \ la pêche maritime ;<br>\n              - le décret n° 2017-514 du 10 avril 2017 ; <br>\n              - le code de\
      \ justice administrative ;<br>\n<br>\n<br>\n<br>\n              Après avoir entendu en séance publique :<br>\n<br>\n\
      \              - le rapport de Mme Céline Roux, maître des requêtes,  <br>\n<br>\n              - les conclusions de\
      \ M. Frédéric Dieu, rapporteur public ;<br>\n<br>\n              La parole ayant été donnée, avant et après les conclusions,\
      \ à la SCP Spinosi, Sureau, avocat de la société Sudelvet Conseil ;<br>\n<br>\n<br>\n<br>\n<br>\n              1. Considérant\
      \ qu'aux termes du premier alinéa de l'article 23-5 de l'ordonnance du 7 novembre 1958 portant loi organique sur le\
      \ Conseil constitutionnel : \" Le moyen tiré de ce qu'une disposition législative porte atteinte aux droits et libertés\
      \ garantis par la Constitution peut être soulevé (...) à l'occasion d'une instance devant le Conseil d'Etat (...) \"\
      \ ; qu'il résulte des dispositions de ce même article que le Conseil constitutionnel est saisi de la question prioritaire\
      \ de constitutionnalité à la triple condition que la disposition contestée soit applicable au litige ou à la procédure,\
      \ qu'elle n'ait pas déjà été déclarée conforme à la Constitution dans les motifs et le dispositif d'une décision du\
      \ Conseil constitutionnel, sauf changement de circonstances, et que la question soit nouvelle ou présente un caractère\
      \ sérieux ;<br>\n<br>\n              2. Considérant que la société Sudelvet Conseil conteste, à l'appui d'un recours\
      \ pour excès de pouvoir dirigé contre le décret du 10 avril 2017 relatif à la réforme de l'ordre des vétérinaires, la\
      \ constitutionnalité des dispositions de l'article L. 242-2 du code rural et de la pêche maritime aux termes desquelles\
      \ : \" Les personnes exerçant la profession de vétérinaire peuvent détenir des participations financières dans les sociétés\
      \ de toute nature, sous réserve, s'agissant des prises de participation dans des sociétés ayant un lien avec l'exercice\
      \ de la profession vétérinaire, que celles-ci soient portées à la connaissance de l'ordre des vétérinaires. Les modalités\
      \ du contrôle exercé par l'ordre, tendant à ce que les prises de participation ne mettent pas en péril l'exercice de\
      \ la profession vétérinaire, notamment s'agissant de la surveillance sanitaire des élevages, l'indépendance des vétérinaires\
      \ ou le respect par ces derniers des règles inhérentes à leur profession, sont précisées par voie réglementaire \" ;<br>\n\
      <br>\n              3. Considérant, en premier lieu, qu'en imposant aux vétérinaires de porter à la connaissance de\
      \ leur ordre les participations financières qu'ils prennent dans certaines sociétés, ces dispositions visent à permettre\
      \ à ce dernier d'exercer la mission de contrôle qui lui est impartie par l'article L. 242-1 du code rural et de la pêche\
      \ maritime, aux termes duquel : \" l'ordre des vétérinaires veille au respect des principes d'indépendance, de moralité\
      \ et de probité, à l'observation des règles déontologiques, en particulier du secret professionnel, et à l'entretien\
      \ des compétences indispensables à l'exercice de la profession de vétérinaire (...) \" ; que si les dispositions législatives\
      \ contestées ont pour objet de permettre, le cas échéant, en cas de prise de participation financière contraire aux\
      \ règles déontologiques qui gouvernent la profession, l'exercice de poursuites disciplinaires par les instances ordinales\
      \ compétentes, elles ne portent pas, par elles-mêmes, atteinte au droit de propriété protégé par l'article 2 de la Déclaration\
      \ des droits de l'homme et du citoyen de 1789 et, par suite, ne méconnaissent pas l'étendue de la compétence que l'article\
      \ 34 de la Constitution confère au législateur pour fixer les principes fondamentaux du régime de la propriété ; <br>\n\
      \              4. Considérant, en second lieu, que l'obligation d'information prévue par les dispositions législatives\
      \ contestées porte sur les seules prises de participation dans des sociétés ayant un lien avec l'exercice de la profession\
      \ de vétérinaire ; qu'ainsi, eu égard à la finalité de ces informations, qui est de prévenir l'existence de conflits\
      \ d'intérêts préjudiciables à l'exercice de la profession de vétérinaire, et compte tenu de ce qu'elles ont pour destinataire\
      \ exclusif l'instance compétente de l'ordre des vétérinaires, dont les membres sont soumis au secret professionnel,\
      \ l'obligation ainsi instituée ne porte pas une atteinte disproportionnée au droit au respect de la vie privée, garanti\
      \ par l'article 2 de la Déclaration des droits de l'homme et du citoyen de 1789 et ne méconnaît pas l'étendue de la\
      \ compétence que l'article 34 de la Constitution confère au législateur pour fixer les règles concernant les droits\
      \ civiques et les garanties fondamentales accordées aux citoyens pour l'exercice des libertés publiques ; <br>\n<br>\n\
      \              5. Considérant qu'il résulte de tout ce qui précède que la question soulevée par la société Sudelvet\
      \ Conseil, qui n'est pas nouvelle, ne présente pas un caractère sérieux ; que, par suite, sans qu'il soit besoin de\
      \ renvoyer au Conseil constitutionnel la question prioritaire de constitutionnalité invoquée, le moyen tiré de ce que\
      \ l'article L. 242-2 du code rural et de la pêche maritime porte atteinte aux droits et libertés garantis par la Constitution\
      \ doit être écarté ;<br>\n<br>\n<br>\n<br>\n<br>\n              \t\t\t\tD E C I D E :<br>\n              \t\t\t\t--------------<br>\n\
      <br>\nArticle 1er : Il n'y a pas lieu de renvoyer au Conseil constitutionnel la question prioritaire de constitutionnalité\
      \ soulevée par la société Sudelvet Conseil.<br>\nArticle 2 : La présente décision sera notifiée à la société Sudelvet\
      \ Conseil, au Premier ministre et au ministre de l'agriculture et de l'alimentation.<br>\nCopie en sera adressée au\
      \ Conseil constitutionnel.<br>\n<br> None"
    sentences:
    - 'Conseil d''Etat, 6 / 2 SSR, du 21 juin 1993, 103407, mentionné aux tables du recueil Lebon <br>    Vu la requête, enregistrée
      le 16 novembre 1988 au secrétariat du Contentieux du Conseil d''Etat, présentée par la commune d''EVRY-GREGY-SUR-YERRE,
      représentée par son maire en exercice ; la commune demande au Conseil d''Etat d''annuler le jugement du 8 juillet 1988
      par lequel le tribunal administratif de Versailles a annulé la délibération du conseil municipal d''EVRY-GREGY-SUR-YERRE
      en date du 6 février 1987 rejetant le projet d''implantation d''un golf au lieudit "Hameau de Mardilly" ;<br>    Vu
      les autres pièces du dossier ;<br>    Vu le code des communes ;<br>    Vu le code des tribunaux administratifs et des
      cours administratives d''appel ;<br>    Vu l''ordonnance n° 45-1708 du 31 juillet 1945, le décret n° 53-934 du 30 septembre
      1953 et la loi n° 87-1127 du 31 décembre 1987 ;<br>    Après avoir entendu en audience publique :<br>    - le rapport
      de M. Marchand, Conseiller d''Etat,<br>    - les conclusions de M. du Marais, Commissaire du gouvernement ;<br>

      <br>    Sur la recevabilité de la demande de M. X... devant le tribunal administratif de Versailles :<br>    Considérant
      que le conseil municipal d''EVRY-GREGY-SUR-YERRE a, par délibération du 6 février 1987, émis un avis de principe sur
      le projet d''implantation d''un golf sur le territoire de la commune ; que M. X... est recevable à demander l''annulation
      d''une telle délibération en invoquant un vice propre de nature à entacher la régularité de cette délibération ;<br>    Sur
      la régularité de la délibération du conseil municipal d''Evry-Grégy-sur-Yerres en date du 6 février 1987 :<br>    Considérant
      qu''aux termes de l''article L. 121-12, 4e alinéa, du code des communes, "il est voté au scrutin secret toutes les fois
      que le tiers des membres du conseil municipal présents le réclame ou qu''il s''agit de procéder à une nomination ou
      présentation" ;<br>    Considérant qu''il résulte du procès-verbal de la séance du conseil municipal d''EVRY-GREGY-SUR-YERRE
      du 6 février 1987 que le maire a fait voter ledit conseil au scrutin secret sur le projet d''implantation d''un golf
      sur le territoire de la commune sans consulter au préalable l''assemblée communale sur l''opportunité de ce mode de
      scrutin et alors que le tiers des membres présents ne l''avait pas réclamé ; que ce vice de forme constitue une irrégularité
      substantielle de nature à entacher la légalité de la délibération dont s''agit ;<br>    Considérant qu''il résulte de
      ce qui précède que la commune d''EVRY-GREGY-SUR-YERRE n''est pas fondée à demander l''annulation du jugement du 8 juillet
      1988 par lequel le tribunal administratif de Versailles a, à la demande de M. X..., annulé la délibération du conseil
      municipal en date du 6 février 1987 ;<br>Article 1er : La requête présentée par la commune d''EVRY-GREGY-SUR-YERRE est
      rejetée.<br>Article 2 : La présente décision sera notifiée à la commune d''EVRY-GREGY-SUR-YERRE, à M. X... et au ministre
      d''Etat, ministre de l''intérieur et de l''aménagement du territire.<br>,1. Cf. 1987-05-22, Tête, p. 179<br/> Rejet'
    - Der Kanton hat in Prêles Gebäude, die für ein Rückkehrzentrum geeignet sind.
    - "Conseil d'État, 4ème - 5ème chambres réunies, 04/12/2017, 411438, Inédit au recueil Lebon Vu la procédure suivante\
      \ :<br>\n<br>\n              Par un mémoire, enregistré le 12 septembre 2017 au secrétariat du contentieux du Conseil\
      \ d'Etat, la société Sudelvet Conseil demande au Conseil d'Etat, en application de l'article 23-5 de l'ordonnance n°\
      \ 58-1067 du 7 novembre 1958 et à l'appui de sa requête tendant à l'annulation, pour excès de pouvoir, du décret n°\
      \ 2017-514 du 10 avril 2017 relatif à la réforme de l'ordre des vétérinaires, de renvoyer au Conseil constitutionnel\
      \ la question de la conformité aux droits et libertés garantis par la Constitution des dispositions de l'article L.\
      \ 242-2 du code rural et de la pêche maritime.<br>\n<br>\n              Vu les autres pièces du dossier ;<br>\n<br>\n\
      \              Vu :<br>\n              - la Constitution, notamment son Préambule et son article 61-1 ; <br>\n     \
      \         - l'ordonnance n° 58-1067 du 7 novembre 1958 ;<br>\n              - l'article L. 242-2 du code rural et de\
      \ la pêche maritime ;<br>\n              - le décret n° 2017-514 du 10 avril 2017 ; <br>\n              - le code de\
      \ justice administrative ;<br>\n<br>\n<br>\n<br>\n              Après avoir entendu en séance publique :<br>\n<br>\n\
      \              - le rapport de Mme Céline Roux, maître des requêtes,  <br>\n<br>\n              - les conclusions de\
      \ M. Frédéric Dieu, rapporteur public ;<br>\n<br>\n              La parole ayant été donnée, avant et après les conclusions,\
      \ à la SCP Spinosi, Sureau, avocat de la société Sudelvet Conseil ;<br>\n<br>\n<br>\n<br>\n<br>\n              1. Considérant\
      \ qu'aux termes du premier alinéa de l'article 23-5 de l'ordonnance du 7 novembre 1958 portant loi organique sur le\
      \ Conseil constitutionnel : \" Le moyen tiré de ce qu'une disposition législative porte atteinte aux droits et libertés\
      \ garantis par la Constitution peut être soulevé (...) à l'occasion d'une instance devant le Conseil d'Etat (...) \"\
      \ ; qu'il résulte des dispositions de ce même article que le Conseil constitutionnel est saisi de la question prioritaire\
      \ de constitutionnalité à la triple condition que la disposition contestée soit applicable au litige ou à la procédure,\
      \ qu'elle n'ait pas déjà été déclarée conforme à la Constitution dans les motifs et le dispositif d'une décision du\
      \ Conseil constitutionnel, sauf changement de circonstances, et que la question soit nouvelle ou présente un caractère\
      \ sérieux ;<br>\n<br>\n              2. Considérant que la société Sudelvet Conseil conteste, à l'appui d'un recours\
      \ pour excès de pouvoir dirigé contre le décret du 10 avril 2017 relatif à la réforme de l'ordre des vétérinaires, la\
      \ constitutionnalité des dispositions de l'article L. 242-2 du code rural et de la pêche maritime aux termes desquelles\
      \ : \" Les personnes exerçant la profession de vétérinaire peuvent détenir des participations financières dans les sociétés\
      \ de toute nature, sous réserve, s'agissant des prises de participation dans des sociétés ayant un lien avec l'exercice\
      \ de la profession vétérinaire, que celles-ci soient portées à la connaissance de l'ordre des vétérinaires. Les modalités\
      \ du contrôle exercé par l'ordre, tendant à ce que les prises de participation ne mettent pas en péril l'exercice de\
      \ la profession vétérinaire, notamment s'agissant de la surveillance sanitaire des élevages, l'indépendance des vétérinaires\
      \ ou le respect par ces derniers des règles inhérentes à leur profession, sont précisées par voie réglementaire \" ;<br>\n\
      <br>\n              3. Considérant, en premier lieu, qu'en imposant aux vétérinaires de porter à la connaissance de\
      \ leur ordre les participations financières qu'ils prennent dans certaines sociétés, ces dispositions visent à permettre\
      \ à ce dernier d'exercer la mission de contrôle qui lui est impartie par l'article L. 242-1 du code rural et de la pêche\
      \ maritime, aux termes duquel : \" l'ordre des vétérinaires veille au respect des principes d'indépendance, de moralité\
      \ et de probité, à l'observation des règles déontologiques, en particulier du secret professionnel, et à l'entretien\
      \ des compétences indispensables à l'exercice de la profession de vétérinaire (...) \" ; que si les dispositions législatives\
      \ contestées ont pour objet de permettre, le cas échéant, en cas de prise de participation financière contraire aux\
      \ règles déontologiques qui gouvernent la profession, l'exercice de poursuites disciplinaires par les instances ordinales\
      \ compétentes, elles ne portent pas, par elles-mêmes, atteinte au droit de propriété protégé par l'article 2 de la Déclaration\
      \ des droits de l'homme et du citoyen de 1789 et, par suite, ne méconnaissent pas l'étendue de la compétence que l'article\
      \ 34 de la Constitution confère au législateur pour fixer les principes fondamentaux du régime de la propriété ; <br>\n\
      \              4. Considérant, en second lieu, que l'obligation d'information prévue par les dispositions législatives\
      \ contestées porte sur les seules prises de participation dans des sociétés ayant un lien avec l'exercice de la profession\
      \ de vétérinaire ; qu'ainsi, eu égard à la finalité de ces informations, qui est de prévenir l'existence de conflits\
      \ d'intérêts préjudiciables à l'exercice de la profession de vétérinaire, et compte tenu de ce qu'elles ont pour destinataire\
      \ exclusif l'instance compétente de l'ordre des vétérinaires, dont les membres sont soumis au secret professionnel,\
      \ l'obligation ainsi instituée ne porte pas une atteinte disproportionnée au droit au respect de la vie privée, garanti\
      \ par l'article 2 de la Déclaration des droits de l'homme et du citoyen de 1789 et ne méconnaît pas l'étendue de la\
      \ compétence que l'article 34 de la Constitution confère au législateur pour fixer les règles concernant les droits\
      \ civiques et les garanties fondamentales accordées aux citoyens pour l'exercice des libertés publiques ; <br>\n<br>\n\
      \              5. Considérant qu'il résulte de tout ce qui précède que la question soulevée par la société Sudelvet\
      \ Conseil, qui n'est pas nouvelle, ne présente pas un caractère sérieux ; que, par suite, sans qu'il soit besoin de\
      \ renvoyer au Conseil constitutionnel la question prioritaire de constitutionnalité invoquée, le moyen tiré de ce que\
      \ l'article L. 242-2 du code rural et de la pêche maritime porte atteinte aux droits et libertés garantis par la Constitution\
      \ doit être écarté ;<br>\n<br>\n<br>\n<br>\n<br>\n              \t\t\t\tD E C I D E :<br>\n              \t\t\t\t--------------<br>\n\
      <br>\nArticle 1er : Il n'y a pas lieu de renvoyer au Conseil constitutionnel la question prioritaire de constitutionnalité\
      \ soulevée par la société Sudelvet Conseil.<br>\nArticle 2 : La présente décision sera notifiée à la société Sudelvet\
      \ Conseil, au Premier ministre et au ministre de l'agriculture et de l'alimentation.<br>\nCopie en sera adressée au\
      \ Conseil constitutionnel.<br>\n<br> None"
  - source_sentence: "CAA de NANTES, 3ème chambre, 07/03/2025, 24NT00708, Inédit au recueil Lebon Vu la procédure suivante\
      \ :<br>\n<br>\n       Procédure contentieuse antérieure :<br>\n<br>\n       M. A... B... a demandé au tribunal administratif\
      \ de Caen d'annuler la décision du 23 août 2023 par laquelle le directeur du conseil national des activités privées\
      \ de sécurité (CNAPS) a refusé de renouveler sa carte professionnelle d'agent de sécurité privée. <br>\n<br>\n     \
      \  Par un jugement n° 2302551 du 9 février 2024, le tribunal administratif de Caen a annulé cette décision et a enjoint\
      \ au directeur du CNAPS de délivrer à M. B... une carte professionnelle l'autorisant à exercer les activités de sécurité\
      \ privée.<br>\n<br>\n       Procédure devant la cour :<br>\n<br>\n       Par une requête enregistrée le 11 mars 2024,\
      \ le Conseil national des activités privées de sécurité, représenté par Me Claisse, demande à la cour :<br>\n<br>\n\
      \       1°) d'annuler ce jugement du tribunal administratif de Caen du 9 février 2024 ;<br>\n<br>\n       2°) de rejeter\
      \ la demande présentée devant le tribunal administratif de Caen par M. B... ;<br>\n<br>\n       3°) de mettre à la charge\
      \ de\tM. B... le versement de la somme de 500 euros au titre de l'article L.761-1 du code de justice administrative.<br>\n\
      <br>\n       Il soutient que les faits reprochés à M. B... sont contraires à tous les principes de la profession et\
      \ caractérisent un comportement diamétralement opposé à ce que recouvrent les missions d'un agent de sécurité privée.<br>\n\
      <br>\n       Par un mémoire en défense, enregistré le 22 avril 2024, M. A... B..., représenté par Me Luchez, conclut\
      \ au rejet de la requête et à ce que la somme de 2 000 euros soit mise à la charge du CNAPS au titre de l'article L.\
      \ 761-1 du code de justice administrative.<br>\n<br>\n       Il soutient que les moyens soulevés par le CNAPS ne sont\
      \ pas fondés.<br>\n<br>\n       Vu les autres pièces du dossier.<br>\n<br>\n       Vu :<br>\n       - Vu le code de\
      \ procédure pénale ; <br>\n       - le code de la sécurité intérieure ; <br>\n       - le code de justice administrative.<br>\n\
      <br>\n       Les parties ont été régulièrement averties du jour de l'audience.<br>\n<br>\n       Ont été entendus au\
      \ cours de l'audience publique :<br>\n       - le rapport de Mme Gélard,<br>\n       - les conclusions de M. Catroux,\
      \ rapporteur public,<br>\n       - les observations de Me Lacoeuilhe, substituant Me Claisse, pour le CNAPS,<br>\n \
      \      - et les observations de Me Luchez, représentant M. B....<br>\n<br>\n<br>\n       Considérant ce qui suit :<br>\n\
      <br>\n       1. M. A... B... détenait depuis le 7 juin 2018 une carte professionnelle valable pour une durée de 5 ans\
      \ lui permettant d'assurer des missions privées de sécurité. Par une décision du 23 août 2023, le directeur du Conseil\
      \ national des activités privées de sécurité (CNAPS), établissement public administratif placé sous la tutelle du ministre\
      \ de l'intérieur, chargé de délivrer ces autorisations, a refusé de renouveler sa carte professionnelle. Le CNAPS relève\
      \ appel du jugement du 9 février 2024, par lequel le tribunal administratif de Caen a annulé cette décision.<br>\nSur\
      \ les conclusions à fin d'annulation :<br>\n       2. Aux termes de l'article L. 611-1 du code de la sécurité intérieure\
      \ : \" Sont soumises aux dispositions du présent titre, dès lors qu'elles ne sont pas exercées par un service public\
      \ administratif, les activités qui consistent : 1° A fournir des services ayant pour objet la surveillance humaine ou\
      \ la surveillance par des systèmes électroniques de sécurité ou le gardiennage de biens meubles ou immeubles ainsi que\
      \ la sécurité des personnes se trouvant dans ces immeubles ou dans les véhicules de transport public de personnes (...)\
      \ \". Aux termes de l'article L. 612-20 du même code : \" Nul ne peut être employé ou affecté pour participer à une\
      \ activité mentionnée à l'article L. 611-1 : / (...) / 2° S'il résulte de l'enquête administrative,  (...) que son comportement\
      \ ou ses agissements sont contraires à l'honneur, à la probité, aux bonnes mœurs ou sont de nature à porter atteinte\
      \ à la sécurité des personnes ou des biens, à la sécurité publique ou à la sûreté de l'Etat et sont incompatibles avec\
      \ l'exercice des fonctions susmentionnées (...)\". Par ailleurs, aux termes de l'article 41-2 du code de procédure pénale\
      \ :  \" Le procureur de la République, tant que l'action publique n'a pas été mise en mouvement, peut proposer, directement\
      \ ou par l'intermédiaire d'une personne habilitée, une composition pénale à une personne physique qui reconnaît avoir\
      \ commis un ou plusieurs délits punis à titre de peine principale d'une peine d'amende ou d'une peine d'emprisonnement\
      \ d'une durée inférieure ou égale à cinq ans, ainsi que, le cas échéant, une ou plusieurs contraventions connexes (...)\
      \ \".<br>\n       3. Il appartient à l'autorité administrative d'apprécier, à l'issue de l'enquête administrative, et\
      \ sous le contrôle du juge de l'excès de pouvoir, si le comportement de la personne qui sollicite la délivrance ou le\
      \ renouvellement d'une carte professionnelle est compatible avec l'exercice de la profession d'agent privé de sécurité.\
      \ Pour ce faire, l'autorité administrative procède, sous le contrôle du juge de l'excès de pouvoir, à une appréciation\
      \ globale de l'ensemble des éléments dont elle dispose.<br>\n       4. Il ressort des pièces du dossier que M. B...,\
      \ a été placé en garde à vue pendant <br>\n15 heures pour des faits de violences conjugales commis le 2 mai 2023 sur\
      \ sa compagne. L'intéressé soutient qu'en réalité, il s'est borné à la repousser alors qu'elle voulait l'empêcher de\
      \ sortir de leur domicile et qu'elle aurait alors heurté le lit en tombant. Il est toutefois constant que M. B... a\
      \ participé à un stage de responsabilisation pour la prévention et la lutte contre les violences au sein du couple et\
      \ sexistes, qui lui a été imposé dans le cadre d'une composition pénale, laquelle en vertu des dispositions précitées\
      \ de l'article 41-2 du code de procédure pénale n'est possible que lorsque le prévenu a reconnu avoir commis un ou plusieurs\
      \ délits. Par ailleurs, lors d'un contrôle inopiné des forces de l'ordre, le 10 mai suivant, il a été constaté que le\
      \ requérant conduisait un véhicule qui n'était pas assuré. Pour démontrer sa bonne foi, il se borne à faire valoir que\
      \ le véhicule avait été acquis avec son ancienne compagne dans le cadre d'une location avec option d'achat, que le certificat\
      \ d'immatriculation était au nom de cette dernière, et qu'elle avait résilié le contrat d'assurance sans le prévenir\
      \ à la suite de leur rupture. De plus, ces agissements qui présentaient, à la date de la décision contestée, un caractère\
      \ très récent, ont été commis alors que M. B... exerçait déjà des missions portant sur l'accueil, la prévention et la\
      \ sécurité des biens et des personnes. Par suite, le directeur du CNAPS a pu, sans entacher sa décision d'une erreur\
      \ d'appréciation, estimer qu'ils révélaient un comportement de M. B... contraire à l'honneur et aux bonnes mœurs et\
      \ de nature à porter atteinte à la sécurité des personnes, et qu'il était incompatible avec l'exercice d'une activité\
      \ professionnelle d'agent de sécurité privée. Ainsi, en refusant de renouveler sa carte professionnelle, le directeur\
      \ du CNAPS n'a pas fait une inexacte application des dispositions de l'article L. 612-20 du code de la sécurité intérieure.<br>\n\
      \       5. Il résulte de tout ce qui précède, que le CNAPS est fondé à soutenir que c'est à tort que, par le jugement\
      \ attaqué, le tribunal administratif de Caen a annulé sa décision du 23 août 2023.<br>\n<br>\n       Sur les frais liés\
      \ au litige :<br>\n<br>\n       6. Les dispositions de l'article L. 761-1 du code de justice administrative font obstacle\
      \ à ce que soit mis à la charge du CNAPS, qui n'est pas, dans la présente instance, la partie perdante, le versement\
      \ à M. B... de la somme qu'il demande au titre des frais exposés et non compris dans les dépens. Dans les circonstances\
      \ de l'espèce, il n'y a pas davantage lieu de mettre à la charge de M. B... le versement au CNAPS de la somme qu'il\
      \ sollicite au titre des mêmes frais. <br>\n<br>\nDÉCIDE :<br>\nArticle 1er : \tLe jugement n° 2302551 du 9 février\
      \ 2024 du tribunal administratif de Caen est annulé.<br>\nArticle 2 : \tLa demande présentée devant le tribunal administratif\
      \ de Caen par M. B... tendant à l'annulation de la décision du 23 août 2023 ainsi que ses conclusions d'appel sont rejetées.\
      \ <br>\nArticle 3 : \tLes conclusions présentées par le CNAPS sur le fondement de l'article L.761-1 du code de justice\
      \ administrative sont rejetées.<br>\nArticle 4 : \tLe présent arrêt sera notifié au Conseil national des activités privées\
      \ de sécurité et à M. A... B....<br>\n       Délibéré après l'audience du 13 février 2025, à laquelle siégeaient :<br>\n\
      \       - Mme Brisson, présidente de chambre,<br>\n       - M. Vergne, président-assesseur,<br>\n       - Mme Gélard,\
      \ première conseillère.<br>\n<br>\n<br>\n       Rendu public par mise à disposition au greffe, le 7 mars 2025.<br>\n\
      La rapporteure,<br>\nV. GELARDLa présidente,<br>\nC. BRISSON <br>\nLe greffier,<br>\nR. MAGEAU<br>\n<br>\n<br>\n   \
      \    La République mande et ordonne au ministre d'Etat, ministre de l'intérieur en ce qui le concerne, et à tous commissaires\
      \ de justice à ce requis en ce qui concerne les voies de droit commun contre les parties privées, de pourvoir à l'exécution\
      \ de la présente décision.<br>\n<br>\n<br>\n<br>\n2<br>\nN° 24NT00708<br>\n<br>\n<br>\n<br> None"
