  - 'Question: where is paper money made in the united states, Answer: Bureau of Engraving and Printing The Bureau of Engraving
    and Printing (BEP) is a government agency within the United States Department of the Treasury that designs and produces
    a variety of security products for the United States government, most notable of which is Federal Reserve Notes (paper
    money) for the Federal Reserve, the nation''s central bank. In addition to paper currency, the BEP produces Treasury securities;
    military commissions and award certificates; invitations and admission cards; and many different types of identification
    cards, forms, and other special security documents for a variety of government agencies. The BEP does not produce coins;
    all coinage is produced by the United States Mint. With production facilities in Washington, DC, and Fort Worth, Texas,
    the Bureau of Engraving and Printing is the largest producer of government security documents in the United States.'
  - 'Question: how much bhp has a f1 car got, Answer: Formula One car The combination of light weight (642 kg in race trim
    for 2013), power (900 bhp with the 3.0 L V10, 780 bhp (582 kW) with the 2007 regulation 2.4 L V8, 950+ bhp with 2016 1.6
    L V6 turbo[22]), aerodynamics, and ultra-high-performance tyres is what gives the F1 car its high performance figures.
    The principal consideration for F1 designers is acceleration, and not simply top speed. Three types of acceleration can
    be considered to assess a car''s performance:'
