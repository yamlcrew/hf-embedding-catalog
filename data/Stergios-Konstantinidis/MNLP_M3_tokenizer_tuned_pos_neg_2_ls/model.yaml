- source_sentence: 'Question: the purpose of the 1973 war powers act was to, Answer: War Powers Resolution The War Powers
    Resolution (also known as the War Powers Resolution of 1973 or the War Powers Act) (50 U.S.C. 1541â€“1548)[1] is a federal
    law intended to check the president''s power to commit the United States to an armed conflict without the consent of the
    U.S. Congress. The Resolution was adopted in the form of a United States Congress joint resolution. It provides that the
    U.S. President can send U.S. Armed Forces into action abroad only by declaration of war by Congress, "statutory authorization,"
    or in case of "a national emergency created by attack upon the United States, its territories or possessions, or its armed
    forces."'
  sentences:
  - 'Question: where does the book of wisdom come from, Answer: Book of Wisdom The Wisdom of Solomon or Book of Wisdom is
    a Jewish work, written in Greek, composed in Alexandria (Egypt). Generally dated to the 2nd century BC, the central theme
    of the work is "Wisdom" itself, appearing under two principal aspects. In its relation to man, Wisdom is the perfection
    of knowledge of the righteous as a gift from God showing itself in action. In direct relation to God, Wisdom is with God
    from all eternity.[1] It is one of the seven Sapiential or wisdom books included within the Septuagint, along with Psalms,
    Proverbs, Ecclesiastes, Song of Songs (Song of Solomon), Job, and Sirach, and is included in the canon of Deuterocanonical
    books by the Roman Catholic Church and the anagignoskomena (Gr. ἀναγιγνωσκόμενα, meaning "those which are to be read")
    of the Eastern Orthodox Church.'
  - 'Question: the purpose of the 1973 war powers act was to, Answer: War Powers Resolution The War Powers Resolution (also
    known as the War Powers Resolution of 1973 or the War Powers Act) (50 U.S.C. 1541â€“1548)[1] is a federal law intended
    to check the president''s power to commit the United States to an armed conflict without the consent of the U.S. Congress.
    The Resolution was adopted in the form of a United States Congress joint resolution. It provides that the U.S. President
    can send U.S. Armed Forces into action abroad only by declaration of war by Congress, "statutory authorization," or in
    case of "a national emergency created by attack upon the United States, its territories or possessions, or its armed forces."'
  - 'Question: what is the fastest growing province in canada, Answer: List of Canadian provinces and territories by population
    Canada''s population grew by 5.0% between the 2006 and 2011 censuses.[1] Except for New Brunswick, all territories and
    provinces increased in population from 2011 to 2016. In terms of percent change, the fastest-growing province or territory
    was Nunavut with an increase of 12.7% between 2011 and 2016, followed by Alberta with 11.6% growth. New Brunswick''s population
    decreased by 0.5% between 2011 and 2016.'
- source_sentence: 'Question: who plays mr gray in 50 shades of gray, Answer: Jamie Dornan James "Jamie" Dornan (born 1 May
