  - source_sentence: '        "The lemma follows by invoking Lemma 4.1 and Lemma A.1.\n\u220e",'
    sentences:
    - '        "To better address non-stationarity with changing uncertainty, we introduce Location-Scale Noise Model (LSNM)
      into DDPMs, which relaxes the traditional Additive Noise Model (ANM) by incorporating a contextually changing variance:
      \ud835\udc18=f\u2062(\ud835\udc17)+g\u2062(\ud835\udc17)\u2062\u03f5\ud835\udc18\ud835\udc53\ud835\udc17\ud835\udc54\ud835\udc17bold-italic-\u03f5\\mathbf{Y}=f(\\mathbf{X})+\\sqrt{g(\\mathbf{X})}\\boldsymbol{\\epsilon}bold_Y
      = italic_f ( bold_X ) + square-root start_ARG italic_g ( bold_X ) end_ARG bold_italic_\u03f5, where g\u2062(\ud835\udc17)\ud835\udc54\ud835\udc17g(\\mathbf{X})italic_g
      ( bold_X ) is an \ud835\udc17\ud835\udc17\\mathbf{X}bold_X-dependent variance model. LSNM is capable of modeling both
      the contextual mean through f\u2062(\ud835\udc17)\ud835\udc53\ud835\udc17f(\\mathbf{X})italic_f ( bold_X ) and the contextual
      uncertainty through g\u2062(\ud835\udc17)\ud835\udc54\ud835\udc17\\sqrt{g(\\mathbf{X})}square-root start_ARG italic_g
      ( bold_X ) end_ARG. In the special case where g\u2062(\ud835\udc17)\u22611\ud835\udc54\ud835\udc171g(\\mathbf{X})\\equiv
      1italic_g ( bold_X ) \u2261 1, this simplifies to the standard ANM. Building upon this more flexible and expressive
      assumption, we propose the Non-stationary Diffusion Model (NsDiff) framework, which provides an uncertainty-aware noise
      schedule for both forward and reverse diffusion processes. In summary, our contributions are as:\n\n\n\u2022\n\nWe observe
      that the ANM is inadequate for capturing the varying uncertainty and propose a novel framework that integrates LSNM
      to allow for explict uncertainty modeling. This work is the first attempt to introduce LSNM into probabilistic time
      series forecasting.\n\n\n\n\u2022\n\nTo fundamentally elevate the noise modeling capabilities of DDPM, we seamlessly
      integrate time-varying variances into the core diffusion process through an uncertainty-aware noise schedule that dynamically
      adapts the noise variance at each step.\n\n\n\n\n\u2022\n\nExperimental results indicate that NsDiff achieves superior
      performance in capturing uncertainty. Specifically, in comparison to the second-best recent baseline TMDM, NsDiff improves
      up to 66.3% on real-world datasets and 88.3% on synthetic datasets.",'
    - '        "The deep neural network representation of the Bifrost simulations is highly compressed compared to the original
      Bifrost data: the deep neural network has 44,261 floating point values whereas the Bifrost simulation cube has 96\u22c596\u22c564\u22c520=11,796,480\u22c5969664201179648096\\cdot
      96\\cdot 64\\cdot 20=11,796,48096 \u22c5 96 \u22c5 64 \u22c5 20 = 11 , 796 , 480 floating point values. This corresponds
      to a compression by a factor of 267; this compression factor may be different for other numerical simulations and depends
      on their smoothness. In addition, the deep neural network can be evaluated at any point in space and time covered by
      the simulations, therefore enabling a trivial way to interpolate between grid points; furthermore, gradients are calculate
      with high efficiency with automatic differentiation. As such, it might be worth considering releasing deep-neural-network
      representations of (magneto)hydrodynamic simulations.",'
