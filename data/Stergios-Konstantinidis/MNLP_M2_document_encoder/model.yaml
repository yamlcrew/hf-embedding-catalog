    \u2217 end_POSTSUPERSCRIPT is a surreptitiously modified version of the clean training dataset D\ud835\udc37Ditalic_D.
    The aim of data poisoning F\ud835\udc39Fitalic_F is creating a poisoned model F\u2217superscript\ud835\udc39F^{*}italic_F
    start_POSTSUPERSCRIPT \u2217 end_POSTSUPERSCRIPT that makes incorrect predictions, often without an observable degradation
    in its overall accuracy. Data poisoning compromises the model integrity by introducing systematic biases that serve the
    attacker\u2019s objectives while evading detection during model training.",'
  - '        "Figure 2 illustrates a comparison between the observed low-medium resolution and the high-resolution spectral
    profiles of the oxygen A band, depicting observations of (telluric) molecular oxygen. The upper panel of Figure 2 shows
    low to medium resolution telluric oxygen features. These were obtained from the ESO Science Archive Facility using X-shooter[141]
    observations during February and March 2024 by the UVES team, as part of Program ID: 60.A-9022(c), OB ID:2024672, 2024624
    and 2024822, at various resolutions with short exposures (12 seconds). The results indicate that higher resolution enables
    the observation of more detailed features within the molecular oxygen spectrum, revealing the signal more distinctly within
    each spectral line. The lower panel of Figure 2 shows performance tests for future HRS instrumentation by observing the
    Sun through the Earth\u2019s atmosphere. These profiles demonstrate the measurement outcomes obtained using two types
    of interferometers: Michelson-based and FPI-based. Firstly, the FTS from the National Solar Observatory at Kitt Peak [126]
    reported R=700,000 in the oxygen A-band. Secondly, the FIOS-demo[133] showcases spectral profiles based on a chained FPI
    array with a spectral resolution of R=250,000. This resolution can potentially increase up to R=350,000 with the addition
    of each array. The throughput of each additional unit, however, decreases by 10-15% [50]. One benefit of achieving this
    level of resolution is the increase in signal-to-noise ratio and the sampling frequency for each spectral line, which
    may reduce the required observing time, as predicted in [46, 93].",'
  - '        "At this point, we can reconcile what we observe with the evidence from the last paragraphs on TFP in Figure
    5. We argue that a critical mass is needed in either case to record a significant impact of the exporting activity. At
    lower levels of exporting activity, the company starts to benefit from economies of scale but also needs to invest in
    productive capacity. To keep up with the technological frontier is costly, and it often requires an upgrade of obsolete
    tangible assets. We argue that the combined evidence of rising operational capacity (sales and costs) and investment in
    fixed assets explains why we observe a negative albeit small productivity loss in an intermediate range of export intensity.
    It is only when the company operates abroad at a larger scale that positive albeit small TFP gains come as a consequence
    of exporting. In this case, we argue, economies of scale become evident and the capital adjustment unveils its impact
    on firms\u2019 performance.",'
