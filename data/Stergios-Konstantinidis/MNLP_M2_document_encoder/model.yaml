- source_sentence: '        "While significant research addresses design tolerance optimisation in manufacturing, there is
    very little focus on production inspection machines such as AOIs for manufactured products. For AOIs inspecting PCBs,
    each component may demand a distinct tolerance for each type of inspection, leading to thousands of possible scenarios.
    Consequently, a general paradigm is needed that accommodates inspection of all components, including new introductions
    that the system has not previously encountered.",'
