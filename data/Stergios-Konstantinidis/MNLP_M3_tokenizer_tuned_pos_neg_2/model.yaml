  - 'Question: when was the first time hispanic heritage was celebrated in usa, Answer: National Hispanic Heritage Month It
    began as Hispanic Heritage Week, established by legislation sponsored by Rep. Edward R. Roybal (D-Los Angeles) and signed
    into law by President Lyndon Johnson in 1968.[1][2] The commemorative week was expanded by legislation sponsored by Rep.
    Esteban Edward Torres (D-Pico Rivera) and implemented by President Ronald Reagan in 1988 to cover a 30-day period (September
    15 - October 15).[1] The bill died in committee, but in 1988 Senator Paul Simon of Illinois re-submitted an amended version
    of the bill, S. 2200. It was enacted into law on August 17, 1988 on the approval of Public Law 100-402. September 15 of
    every year was chosen as the starting point for the celebration because it is the anniversary of independence of five
    Latin American countries: Costa Rica, El Salvador, Guatemala, Honduras and Nicaragua. All declared independence in 1821.
    In addition, Mexico, Chile and Belize celebrate their independence days on September 16, September 18, and September 21,
    respectively.[3]'
- source_sentence: 'Question: where is the world''s largest concentration of sea mounts found, Answer: Seamount A total of
    9,951 seamounts and 283 guyots, covering a total of 8,796,150 km2 (3,396,210 sq mi) have been mapped[3] but only a few
    have been studied in detail by scientists. Seamounts and guyots are most abundant in the North Pacific Ocean, and follow
    a distinctive evolutionary pattern of eruption, build-up, subsidence and erosion. In recent years, several active seamounts
    have been observed, for example Loihi in the Hawaiian Islands.'
  sentences:
