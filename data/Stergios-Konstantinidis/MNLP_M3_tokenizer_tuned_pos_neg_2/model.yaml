  - 'Title: OET: Optimization-based prompt injection Evaluation Toolkit, Abstract: Abstract

    Large Language Models (LLMs) have demonstrated remarkable capabilities in natural language understanding and generation,
    enabling their widespread adoption across various domains. However, their susceptibility to prompt injection attacks poses
    significant security risks, as adversarial inputs can manipulate model behavior and override intended instructions. Despite
    numerous defense strategies, a standardized framework to rigorously evaluate their effectiveness, especially under adaptive
    adversarial scenarios, is lacking. To address this gap, we introduce OET, an optimization-based evaluation toolkit that
    systematically benchmarks prompt injection attacks and defenses across diverse datasets using an adaptive testing framework.
    Our toolkit features a modular workflow that facilitates adversarial string generation, dynamic attack execution, and
    comprehensive result analysis, offering a unified platform for assessing adversarial robustness. Crucially, the adaptive
    testing framework leverages optimization methods with both white-box and black-box access to generate worst-case adversarial
    examples, thereby enabling strict red-teaming evaluations. Extensive experiments underscore the limitations of current
    defense mechanisms, with some models remaining susceptible even after implementing security enhancements.111The code are
    publicly available on https://github.com/SaFoLab-WISC/OET, Introduction: Large Language Models (LLMs) have revolutionized
    natural language processing, enabling applications such as advanced chatbots, automated content creation, and sophisticated
    data analysis (Kaddour et al., 2023; Jaff et al., 2024; Tan et al., 2024). Their adeptness at understanding and generating
    human-like text has made them indispensable in various sectors. For example, in healthcare, LLMs assist in analyzing patient
    data and medical literature, supporting diagnostics and treatment planning (Reis et al., 2024). In finance, they aid in
    processing vast amounts of data for market analysis and decision-making (Chen et al., 2024c).

    Moreover, LLMs facilitate language translation and localization, breaking down communication barriers in our globalized
    world. These diverse applications underscore the transformative impact of LLMs across industries., <map object at 0x3eeef9670>
    Conclusion: We trained adverserial strings for each training data sample 3 times and calculate ASR of attacking training
    data sample with adverserial string. Then we average ASR and calculate standard deviation.'
