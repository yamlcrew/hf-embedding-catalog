  - 'Question: when did jesus christ superstar open in chicago, Answer: Jesus Christ Superstar In 2016, celebrating 45 years
    since the musical debuted on Broadway, Jesus Christ Superstar returned to London at Regent''s Park Open Air Theatre, directed
    by Timothy Sheader. The production won the BBC Radio 2 Audience Award for Best Musical at the Evening Standard Theatre
    Awards,[39] and a Laurence Olivier Award for Best Musical Revival.[40] The production returned to the Open Air Theatre
    as part of the 2017 season, running from 11 August 2017 to 23 September.[41] Additionally, the Lyric Opera of Chicago
