    About AIA Bhd.


    AIA Bhd. is a leading insurer in Malaysia, where we have been privileged to do business since 1948. We offer a suite of
    financial solutions including Protection, Health, Employee Benefits, Mortgage and Retirement products to meet our customers’
    protection and financial security needs at every life stage. Through our wide and diverse distribution footprint which
    comprises of a 20,500 strong Life Planner force, our exclusive bank partner’s branches nationwide as well as corporate
    sales teams and brokers, we give our customers the choice of deciding how, when and where they connect with us.


    Part of the AIA Group, the largest independent publicly listed pan-Asian life insurance group, AIA Bhd. has the financial
    strength, experience, service centre network and a well-trained team of more than 2,600 employees to serve our 4.7 million
    customers nationwide. As at 30 June 2022, AIA Bhd.’s total asset worth was RM58.98 billion, with a paid-up capital of
    RM810 million.


    10


    aia.com.my


    0624'
