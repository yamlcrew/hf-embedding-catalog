- source_sentence: '• Dental care and/or treatment, cosmetic surgery, eye glasses, corrective aids and treatment of refractive
    errors or any optional surgery;


    • Experimental or unlicensed treatment or test;


    • Any event giving rise to a claim on the Insured caused directly or indirectly by the intentional act of the policy owner
    or person who will otherwise be entitled to the benefit payable;


    • The use of unprescribed drugs where such drugs as required by law are to be prescribed by a registered medical practitioner;
    or


    • The mother opts for Elective (Voluntary) Medical or Surgical Termination of Pregnancy other than for certified medical
    reasons and other than by certified medical process under the supervision of a registered Physician or Specialist.


    Note: The list is non-exhaustive. Please refer to the policy contract for full details of the exclusions.


    A-Plus BabyCare Xtra


    For your attention'
  sentences:
  - Under what conditions will my GREAT Medic Lite Secure policy be terminated?
  - What should I do if I need a complete list of exclusions for my plan?
  - Under what circumstances would a pregnancy termination NOT be covered by A-Plus BabyCare Xtra?
- source_sentence: 'Critical illness is diagnosed within 12 months from the date of diagnosis of the previous critical illness
    claim and the critical illness is directly or indirectly related to the previously claimed critical illness or its cause
    of any prior claim; or


    The diagnosis of the 2™ Cancer is less than 5 years from the date the insured is deemed to be in complete remission to
    be certified by a physician from the 1* Cancer or the 2" Cancer is located inside the same site or the same organ as the
    1* Cancer; or


    Critical illness or covered surgeries resulting from self-inflicted injuries; or


    Critical illness was diagnosed directly or indirectly due to a congenital defect or disease which has manifested or was
    diagnosed before the insured attains 17 years of age; or


    Critical illness if the insured did not survive for at least 30 days after the diagnosis of a critical illness.


    Note: This list is not exhaustive. Please refer to the policy contract for the full list of exclusions.


    A-Plus Multi CriticalCare


    For your attention:'
  sentences:
  - What are the annual and lifetime limits for Plan 1, and what is the deductible?
  - What is the full name of the company referred to as "Great Eastern Life"?
  - Under what circumstances might a critical illness claim be excluded due to a prior claim?
