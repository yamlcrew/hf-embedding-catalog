    - "Đề_bài : \n Sơ_đồ giao_thông chứa các đoạn_thẳng gồm hai loại . Loại có mũi_tên chỉ đi được một chiều theo chiều mũi_tên\
      \ và loại không có mũi_tên thì đi được hai chiều . Tính số cách đi từ A đến B mà không có đoạn_thẳng nào bị lặp_lại\
      \ ? \n Hướng_dẫn : Sau đây là một trong ba cách để giải bài_toán này . \n Vẽ 2 lát cắt ( a ) và ( b ) ngay sau 4 mũi_tên\
      \ cùng chiều từ trái sang phải như hình_vẽ . \n Xét đại_diện số cách đi từ A đến hai trong bốn đỉnh nằm trên lát cắt\
      \ ( a ) . Tại mỗi đỉnh đến nằm trên ( a ) đều có năm cách đi từ A đến nó . Suy ra đi từ A đến một đỉnh bất_kỳ trong\
      \ bốn đỉnh nằm trên ( a ) đều có năm cách đi . \n Xét đại_diện số cách đi từ 2 trong 4 đỉnh nằm trên ( a ) đến một trong\
      \ bốn đỉnh nằm trên ( b ) . Ta có số cách đi từ một đỉnh ở trên ( a ) đến một đỉnh ở trên ( b ) là : 4 + 4 + 8 + 8 =\
      \ 24 ( cách ) . \n Theo quy_tắc nhân thì số cách đi từ A đến mỗi đỉnh nằm trên ( b ) là 5x24 = 120 ( cách ) \n Xét đại_diện\
      \ số cách đi từ hai trong bốn đỉnh nằm trên ( b ) đến đích B. Mỗi đỉnh xuất_phát nằm trên ( b ) đều có năm cách đi đến\
      \ đích B. Suy ra số cách đi từ A đến mỗi đỉnh nằm trên ( b ) rồi đến B là 120 x 5 = 600 ( cách ) . \n Vậy tổng_số cách\
      \ đi từ A đến B là 4 x 600 = 2400 ( cách ) . \n Bài_Toán gốc của Mỹ cho phép học_sinh được chọn một trong năm đáp_án\
      \ với thời_gian 5 phút . Khi không ở phòng thi bạn_đọc có_thể giải bài_toán này trong thời_gian nhiều hơn nên chúng_tôi\
      \ đã không đưa năm đáp_án như đề_bài gốc . \n Trần_Phương"
    - "Bệnh_nhân được đồng_nghiệp đưa vào bệnh_viện cấp_cứu , chuyển đến Trung_tâm tim_mạch , Bệnh_viện E. \n Ngày 6 / 9 ,\
      \ ThS. BS Nguyễn Hoàng_Nam , khoa Phẫu_thuật tim_mạch và lồng_ngực , cho biết bệnh_nhân đau tức ngực nhiều , có vài\
      \ vết bầm tím trên thành ngực đoạn giữa xương ức , tổn_thương vỡ eo động_mạch chủ . Bệnh_nhân được mổ khẩn_cấp , đặt\
      \ stent - graft nội mạch có màng bọc từ_đường động_mạch đùi lên để che ổ rách eo động_mạch chủ . \n Hiện , người_bệnh\
      \ đã ổn_định sức_khỏe , tiếp_tục theo_dõi tại bệnh_viện . Bệnh_nhân cho biết sau khi bơm hơi vào vỏ xe xong đã ngồi\
      \ trên lốp để đóng nắp van . Không rõ áp_suất của lốp sau khi bơm hơi là bao_nhiêu và nguyên_nhân phát_nổ là gì . \n\
      \ Bác_sĩ Nam cho biết vỡ eo động_mạch chủ là tổn_thương hiếm gặp và rất nguy_hiểm . Chấn_thương này có_thể gặp khi có\
      \ lực tác_động rất lớn vào lồng_ngực như tai_nạn ôtô hoặc ngã từ trên cao xuống . Eo động_mạch chủ dễ bị tổn_thương\
      \ do vị_trí tiếp_giáp giữa phần cố_định là quai động_mạch chủ và phần di_động là động_mạch chủ xuống . \n Người bị vỡ\
      \ eo động_mạch chủ nếu không được xử_trí kịp_thời thì nguy_cơ tử_vong trong 6 tiếng đầu là 24 % , lên đến 50 % trong\
      \ 24 tiếng đầu nếu chấn_thương nặng . Đây là tình_trạng nguy_hiểm nhưng có_thể chẩn_đoán chính_xác và phát_hiện sớm\
      \ thương_tổn để có kế_hoạch điều_trị , can_thiệp , phẫu_thuật . \n Trường_hợp chấn_thương động_mạch chủ nhẹ , bệnh_nhân\
      \ được điều_trị nội_khoa . Chấn_thương nặng , bác_sĩ chỉ_định phẫu_thuật mở , can_thiệp tuần_hoàn ngoài cơ_thể ( ECMO\
      \ ) thay_thế tim bệnh_nhân ngừng đập trong quá_trình thay đoạn mạch trong lồng_ngực . Đây là ca phẫu_thuật nguy_hiểm\
      \ , tỷ_lệ tử_vong cao , bệnh_nhân nguy_cơ liệt tủy và thời_gian hồi_sức sau mổ kéo_dài . \n Phương_pháp can_thiệp nội\
      \ mạch , đặt stent - graft và che_phủ toàn_bộ tổn_thương mà không cần phải mổ mở , người_bệnh hồi_phục nhanh hơn , thời_gian\
      \ hồi_sức ngắn hơn . \n Lê_Nga"
  - source_sentence: Sau 27 năm gia_nhập làng giải_trí , MC - diễn_viên Thanh_Mai hiện hoạt_động nghệ_thuật cầm_chừng , chủ_yếu
      tập_trung kinh_doanh . - Ngôi_sao
    sentences:
    - Eun_Bi ( IZONE ) " diễn sâu " như đang chụp lookbook ngoài đường . Ji Soo khoe_vẻ đẹp dịu_dàng thục nữ . Rosé tung loạt
      hình trong phòng tập , gây chú_ý với trang_phục gợi_cảm . Hyo_Jung và Seung_Hee ( Oh_My_Girl ) đọ_vẻ dễ_thương . Mi_Yeon
      thân_thiết bên Luda ( WJSN ) , cùng quay chương_trình với trang_phục tông xuyệt tông . Yeri thần_thái sắc_lạnh trước
      ống_kính . Sinh_nhật Mina , các thành_viên Twice đua nhau tung hình hậu_trường , đời_thường " hiếm có khó tìm " của
      cô bạn . Yuqi ( G ) I - DLE tạm_biệt fan để lên máy_bay về thăm nhà ở Trung_Quốc sau một năm xa_cách . Xem_tiếp Tuệ_Anh
    - "Anh_Tuấn \n - Showbiz \n - Thời_trang \n - Làm_đẹp \n - Xem \n - Ăn_chơi \n - Lối_sống \n - Thể_thao \n - Thời_cuộc\
      \ \n - Podcasts \n - Thương_trường \n - Trắc_nghiệm \n - Video \n - Ảnh \n - Reviews & Deals \n Sau 27 năm gia_nhập\
      \ làng giải_trí , MC - diễn_viên Thanh_Mai hiện hoạt_động nghệ_thuật cầm_chừng , chủ_yếu tập_trung kinh_doanh . \n Anh_Tuấn"
    - "Phòng Cảnh_sát hình_sự Công_an tỉnh Quảng_Nam cho biết Vũ_Viết Hải , trú thị_trấn Trà_My , huyện Bắc_Trà_My , bị bắt\
      \ 7h sáng nay khi đang trốn ở phường Trường_Xuân , thành_phố Tam_Kỳ . \n Hải đang đối_mặt với cáo_buộc cướp tài_sản\
      \ . \n Trước đó , tối 26 / 11 , Hải đi xe_máy mang biển số giả đến cây_xăng bán_lẻ Tiên_Cảnh ở xã Tiên_Cảnh , huyện\
      \ Tiên_Phước , chờ khách vãn mới đi vào , đề_nghị đổ xăng cho xe_máy của mình . Khi chủ cây_xăng đang bơm xăng , nghi\
      \ can rút liềm trong người , từ phía sau quàng tay dí vào cổ uy_hiếp . \n Thời_điểm này , cây_xăng có một nhân_viên\
      \ ngồi phía trong kiểm_đếm tiền và ghi sổ_sách . Hải yêu_cầu chủ cây_xăng đưa hết tiền trong túi , tổng_cộng hơn 15\
      \ triệu đồng . \n Theo đại_tá Trần_Văn_Xuân , Trưởng_Phòng Cảnh_sát hình_sự Công_an tỉnh Quảng_Nam , Hải khai trốn ở\
      \ nhiều nơi . Sáng 5 / 12 , Hải về thành_phố Tam_Kỳ , mượn xe_máy và giật túi_xách của một phụ_nữ trên đường Bạch_Đằng\
      \ , bên trong có 100.000 đồng và một điện_thoại . \n Nghi_vụ cướp này và cướp tiền ở cây_xăng Tiên_Cảnh có liên_quan\
      \ , Công_an thành_phố Tam_Kỳ lần theo dấu_vết đã phát_hiện ra Hải . \n Hải không nghề_nghiệp ổn_định , theo cha_mẹ từ\
      \ huyện Chương Mỹ , Hà_Nội vào lập_nghiệp ở thị_trấn Trà_My , huyện Bắc_Trà_My theo diện kinh_tế mới ."
