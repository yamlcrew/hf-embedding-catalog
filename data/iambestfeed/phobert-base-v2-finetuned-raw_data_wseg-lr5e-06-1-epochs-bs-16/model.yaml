  sentences:
  - 'Sáng 16 / 3 , Choi_Jong_Hoon , người vừa_mới tuyên_bố rời FT Island và rút_lui khỏi ngành giải_trí , đã xuất_hiện_tại
    Sở cảnh_sát Seoul . Nam ca_sĩ lộ gương_mặt mệt_mỏi , cúi đầu xin_lỗi khán_giả vì đã vướng vào scandal , đồng_thời hứa
    tiếp_nhận điều_tra một_cách trung_thực . Khi phóng_viên được hỏi : " Anh có thừa_nhận cáo_buộc lan_truyền các cảnh quay
    lén ? " , Choi_Jong_Hoon chỉ nói " Tôi xin_lỗi " . Với câu hỏi : " Anh có yêu_cầu người trong ngành cảnh_sát che_giấu
    vụ say rượu lái_xe ? " , " Anh có trực_tiếp nhờ_vả anh Yoo về sự trợ_giúp của cảnh_sát ? " , Choi_Jong_Hoon trả_lời :
    " Không " . Câu trả_lời này trái với lời khai ngày hôm_qua của Yoo In_Suk . Theo đó CEO Yoo thừa_nhận " họ " thực_sự đã
    liên_hệ với cảnh_sát . " Vậy cảnh_sát nhắn_tin chúc_mừng sinh_nhật anh là ai ? " - " Tôi không biết " . " Anh có muốn
    nói gì với các nạn_nhân không ? " - " Tôi xin_lỗi " . Choi_Jong_Hoon xin_lỗi nạn_nhân bị phát_tán video sex , kiên_quyết
    phủ_nhận hối_lộ cảnh_sát Choi_Jong_Hoon là một trong 8 thành_viên thuộc group chat KakaoTalk gây chao_đảo Hàn_Quốc những
    ngày gần đây . Qua bằng_chứng tin nhắn , Jong_Hoon đang đối_mặt với các cáo_buộc về phát_tán video bất_hợp phát , hối_lộ
    cảnh_sát , thông_đồng bao_che với Seung Ri và CEO Yoo về hành_vi môi_giới mại_dâm . Ngày 13 / 3 , SBS công_khai đoạn tin
    nhắn cho thấy Jong_Hoon dùng tiền " bịt miệng " cảnh_sát , giải_quyết " êm_thấm " vụ say_xỉn khi lái_xe năm 2016 . Báo
    Hàn cho biết , Choi_Jong_Hoon , Jung Joon_Young và Seung Ri là bộ ba bạn thân , có nhiều hoạt_động góp vốn làm_ăn chung
    . Liên_quan diễn_biến sự_việc , ngày 15 / 3 , Seung Ri và Jung Joon_Young đã hoàn_thành hơn 20 tiếng lấy lời khai tại
    Sở cảnh_sát . Những nghi phạm khác là CEO Yoo ( Yoo In_Suk ) và Kim ( nhân_viên Burning_Sun , Arena ) cũng đã bị cảnh_sát
    triệu_tập thẩm_vấn . Theo báo Hàn , ngày hôm_qua tổng_cộng có 6 điện_thoại được thu_giữ , nhưng cảnh_sát cho rằng khả_năng
    cao là bọn họ không nộp đúng điện_thoại mà họ sử_dụng . Đó là lý_do tối hôm_qua cảnh_sát bất_ngờ đột_kích nơi ở của tất_cả
    nghi phạm . Mục_đích là tìm_kiếm xem họ có còn điện_thoại nào khác bên cạnh những chiếc đã giao_nộp hay không . Xem thêm
    : Diễn_biến '' bê_bối chat sex - môi_giới mại_dâm '' chấn_động Hàn_Quốc Jung_Bé'
  - "Ngày 11 / 9 , Tân và 4 người khác bị Phòng Cảnh_sát hình_sự , Phòng An_ninh mạng phối_hợp Công_an quận 1 bắt về hành_vi\
    \ Làm giả con_dấu , tài_liệu cơ_quan , tổ_chức . \n Trước đó , tổ công_tác Công_an quận 1 kiểm_tra , phát_hiện Lâm_Thạnh\
    \ ( 30 tuổi ) , sử_dụng giấy đi đường giả . Khám_xét người này , cảnh_sát thu_giữ thêm 20 giấy giả khác anh ta \" đang\
    \ đi bán cho khách \" . \n Mở_rộng điều_tra , cảnh_sát bắt Tân và Nguyễn_Hải_Tú ( 37 tuổi ) , Lê_Văn_Thanh ( 28 tuổi )\
    \ và Huỳnh_Minh_Trực ( 30 tuổi ) . \n Khám_xét phòng trọ trên đường Lưu Hữu_Phước ( quận 8 ) , cơ_quan điều_tra thu thêm\
    \ 70 mẫu giấy đi đường , 27 giấy xác_nhận tiêm vaccine Covid - 19 ... và nhiều vật_dụng có liên_quan việc làm giả giấy_tờ\
    \ . \n Làm_việc với cảnh_sát , nhóm này khai đã lên kế_hoạch làm giả giấy đi đường , chứng_nhận tiêm ngừa Covid - 19 ,\
    \ sau đó quảng_cáo trên mạng xã_hội bán với giá 1 - 2 triệu đồng . \n Nhiều người đã liên_hệ với nhóm này , cung_cấp thông_tin\
    \ cá_nhân . Tiếp đó , Tân dùng máy_in màu , scan các mẫu , dùng mộc giả dán lên rồi nhờ Thạnh mang giao cho khách , trả\
    \ công 300.000 đồng mỗi tờ . \n Cảnh_sát đang mở_rộng , truy bắt thêm những người liên_quan . \n Công_an TP HCM cho biết\
    \ thời_gian qua đã xử_lý nhiều trường_hợp làm và sử_dụng giấy đi đường giả . Người dân không nên mua các loại giấy_tờ\
    \ giả này vì có_thể bị xử_lý hình_sự . \n Quốc_Thắng"
  - "Đảo Bass Rock ở ngoài khơi Scotland là môi_trường sinh_sản của quần_thể ó biển phương Bắc lớn nhất thế_giới , lên tới\
    \ 150.000 con . \n Video : BBC / Seabird_Centre"
- source_sentence: Ứng_dụng Grab tài_trợ 3 triệu đồng cho 3 vận_động_viên nhí tại VnExpress Marathon . - VnExpress
  sentences:
  - "Đường chạy của VnExpress Marathon - VM Quy_Nhơn 2019 diễn ra ngày 9 / 6 quy_tụ hàng nghìn vận_động_viên . Thành_phần\
    \ tham_dự từ người chạy bán chuyên , nghiệp_dư , người nổi_tiếng , doanh_nhân , người nước_ngoài . Một thành_phần đặc_biệt\
    \ khác là gần 100 runner nhí , những người từ 16 tuổi trở xuống . \n Để cổ_vũ tinh_thần yêu thể_thao , ứng_dụng gọi xe\
    \ Grab quyết_định dành tặng 3 giải nhất trị_giá 3 triệu đồng mỗi giải cho các vận_động_viên nhỏ_tuổi . Trong đó , hai\
    \ giải dành cho hai em đầu_tiên về đích , và một giải dành cho runner nhí có trang_phục độc_đáo nhất . \n Là một trong\
    \ những nhà tài_trợ của giải , Grab quyết_định tài_trợ cũng một phần nhằm khuyến_khích tinh_thần yêu thể_thao , chăm_lo\
    \ cho các mầm_non tương_lai của đất_nước . Sự xuất_hiện của các em trên đường chạy không chỉ mang đến niềm vui , mà còn\
    \ trở_thành biểu_tượng truyền_cảm_hứng đến cộng_đồng . \n VnExpress Marathon không chỉ là cuộc đua vì thành_tích , đó\
    \ còn là nơi mỗi cá_nhân vượt qua giới_hạn bản_thân . Các em đại_diện cho thế_hệ trẻ Việt_Nam , những người rất chú_trọng\
    \ việc rèn_luyện thể_thao , nâng cao sức_khoẻ và thể_trạng . \n Hầu_hết các runner nhí tại VnExpress Marathon tại Quy_Nhơn\
    \ năm nay đăng_ký cự_ly 5km , xuất_phát lúc 6h30 sáng 9 / 6 . Một_số em đăng_ký chạy 10km cùng bố_mẹ . Sáng 7 và 8 / 6\
    \ , nhiều em cùng gia_đình đã có_mặt tại quảng_trường Nguyễn Tất_Thành để ghi_danh và nhận Bib . \n Thành_lập năm 2012\
    \ , ứng_dụng gọi xe công_nghệ Grab hoạt_động tại 336 thành_phố tại 8 quốc_gia Đông_Nam_Á . Grab cho biết đã có hơn 152\
    \ triệu lượt tải về điện_thoại_di_động . \n Ứng_dụng gọi xe công_nghệ đã có_mặt tại Việt_Nam từ năm 2014 , góp_phần tạo\
    \ ra một thói_quen di_chuyển mới cho người dân . Sau 5 năm hoạt_động , Grab đã hình_thành một hệ sinh_thái gồm hàng_loạt\
    \ dịch_vụ như GrabTaxi , GrabBike , GrabCar , GrabExpress , GrabFood , GrabRewards ... phục_vụ nhu_cầu cuộc_sống hàng\
    \ ngày của hàng chục triệu người dân Việt_Nam . \n Thành_Dương"
  - "Thủ_tướng Nguyễn_Xuân_Phúc vừa phê_duyệt chủ_trương đầu_tư dự_án xây_dựng đường kết_nối Pháp_Vân - Cầu_Giẽ với đường\
    \ vành_đai ba , nhằm giải_quyết tình_trạng ùn_tắc giao_thông ở nội_thành ; thúc_đẩy phát_triển kinh_tế , xã_hội quận Hoàng_Mai\
    \ , huyện Thanh_Trì và khu_vực phía Nam , Đông_Nam của thủ_đô . \n Tuyến đường kết_nối dài 3,4 km , rộng 60 m , gồm sáu\
    \ làn xe cơ_giới , hai làn xe hỗn_hợp , bắt_đầu_từ điểm cuối nhánh rẽ phải từ cao_tốc Pháp_Vân - Cầu_Giẽ vào đường 70\
    \ thuộc nút giao Tứ_Hiệp đến nút giao với đường vành_đai ba . \n Các hạng_mục chính của dự_án gồm : nút giao bán_hoa_thị\
    \ Tứ_Hiệp ; đoạn đường từ Tứ_Hiệp đến vành_đai ba ; nút giao với đường vành_đai ba ; hạ_tầng kỹ_thuật , thoát nước , cây_xanh\
    \ , chiếu sáng , đường gom ... \n Dự_án có tổng mức đầu_tư 2.535 tỷ đồng , thực_hiện từ 2020 đến 2022 . Thủ_tướng giao\
    \ UBND TP Hà_Nội lập báo_cáo nghiên_cứu khả_thi , thẩm_định , phê_duyệt dự_án theo quy_định . \n Vào dịp lễ Tết , tuyến\
    \ đường cửa_ngõ thủ_đô từ vành_đai ba đến Pháp_Vân - Cầu_Giẽ liên_tục ùn_tắc do phương_tiện từ khắp nơi đổ_dồn về để đi\
    \ vào thành_phố , hoặc các tỉnh phía Nam ."
  - "Camera trong cửa_hàng mặt_đường ghi lại cảnh một ôtô màu trắng lao vào trong , cùng lúc một bóng người nhảy xuống xe\
    \ và bỏ chạy . Một xe cảnh_sát dừng ngay phía sau và hai cảnh_sát chạy theo , vội đến mức người điều_khiển chiếc xe ưu_tiên\
    \ chưa kịp về số . \n Cậu nhóc 13 tuổi lái_xe không có bằng bị đuổi theo sau khi cảnh_sát nhận được báo_cáo . Tài_xế nhí\
    \ đã lái_xe qua quãng đường khoảng 300 km từ Daegu tới Seoul trước khi buộc phải kết_thúc hành_trình . \n Cửa_hàng mà\
    \ chiếc ôtô lao vào trong bị thiệt_hại khoảng 9.000 USD. May_mắn không ai bị_thương . \n Trong khi đó , cậu nhóc thừa_nhận\
    \ rằng đơn_giản chỉ muốn lái_xe . Tài_xế này có_thể không phải chịu hình_phạt nào đáng_kể bởi còn ở độ tuổi vị thành_niên\
    \ ( dưới 14 tuổi ) . \n Mỹ_Anh ( theo Naver )"
- source_sentence: Mình sinh năm 1986 , quê ở miền Trung , hiện làm ở quận 12 , TP HCM. - VnExpress
  sentences:
  - "Peng_Wang , giảng_viên ngành quản_lý_tài_chính tại Đại_học Southampton , bị 4 thanh_niên da trắng trong độ tuổi 20 -\
    \ 25 tấn_công giữa ban_ngày trong lúc đang chạy bộ gần nhà hôm 23 / 2 . \n \" Vài gã điên_rồ ngồi trong xe và hét lên\
    \ với tôi từ phía bên kia đường \" , giảng_viên 37 tuổi nói . \" Họ nói ' virus Trung_Quốc , cút khỏi đất_nước này đi\
    \ , đồ khốn ' \" . \n Wang quát lại nhóm thanh_niên , họ lái_xe đi nhưng sau đó quay lại tấn_công anh . Vụ tấn_công khiến\
    \ Wang bị chảy_máu mũi , bầm tím trên mặt và cánh_tay . Những người chứng_kiến gọi xe cấp_cứu và báo cảnh_sát . Một nghi\
    \ phạm 21 tuổi bị bắt nhưng sau đó được thả , trong khi cuộc điều_tra vẫn tiếp_tục . \n Vụ tấn_công làm gia_tăng lo_ngại\
    \ trong cộng_đồng người Hoa về hành_vi thù_ghét chủng_tộc liên_quan Covid - 19 nhằm vào người gốc Hoa đang gia_tăng ở\
    \ Anh . Tháng 3 năm_ngoái , ngay sau khi Covid - 19 bùng_phát ở Anh , sinh_viên Singapore Jonathan_Mok bị một thiếu_niên\
    \ 16 tuổi tấn_công trên đường_phố London . \n Báo_cáo tội_phạm chủng_tộc nhằm vào người gốc Đông_Á ở Anh tăng vọt trong\
    \ năm qua . Từ tháng 1 đến tháng 6 / 2020 , cảnh_sát nhận được 457 báo_cáo về tội_phạm có động_cơ chủng_tộc chống lại\
    \ những người gốc Hoa . \n Wang , người gốc Thiên_Tân và chuyển đến Southampton năm 2014 sau khi hoàn_thành chương_trình\
    \ tiến_sĩ ở Phần_Lan , cho rằng mọi chuyện đang trở_nên tồi_tệ hơn , bắt_đầu_từ Brexit và sau đó là đại_dịch . \" Khi\
    \ mới tới Anh , tôi chạy bộ vào ban_đêm và không phải lo_lắng về những điều này \" , Wang nói . \n Để hỗ_trợ Wang , các\
    \ nhà hoạt_động từ chiến_dịch Chống phân_biệt chủng_tộc Southampton và Hội người Trung_Quốc ở Southampton đã tổ_chức cuộc\
    \ họp trực_tuyến thể_hiện tinh_thần đoàn_kết tối 1 / 3 với sự tham_dự của khoảng 300 người . Các nhóm cộng_đồng cũng đang\
    \ được đào_tạo để hỗ_trợ và khuyên_nhủ các nạn_nhân gốc Hoa bị tấn_công liên_quan Covid - 19 . \n Mối quan_hệ giữa Bắc_Kinh\
    \ và London xấu đi do luật an_ninh Hong_Kong và nhiều vấn_đề khác cũng khiến người Trung_Quốc ở Anh lo_ngại có_thể bị\
    \ nhắm mục_tiêu . \n Huyền_Lê ( Theo SCMP )"
  - "So với phiên_bản cũ , Range Rover Autobiography LWB 2019 giữ nguyễn thiết_kế tổng_thể . Hãng xe Anh quốc trang_bị đèn_pha\
    \ LED tự_động , đèn ban_ngày LED , cụm đèn hậu LED. Logo chữ L , ký_hiệu phiên_bản LWB ở hai bên hông , cạnh vòm bánh_xe\
    \ trước . Bộ vành hợp_kim 22 inch thiết_kế đa chấu , bậc lên xuống tự_động , cửa hít . Xe tự_động hạ chiều cao khi mở_cửa\
    \ . \n Nội_thất_bọc da cao_cấp , khoảng để chân cho hàng ghế sau thêm 186 mm . Ghế da độc_quyền kiểu thương_gia chỉ có\
    \ trên bản LWB , tích_hợp sưởi , làm mát , ghế trước thêm tính_năng massage . Xe_lắp hai màn_hình Touch Duo Pro 10 inch\
    \ ở bảng điều_khiển trung_tâm , giống Range Rover_Velar . Đèn nội_thất 10 màu , hệ_thống điều hòa 4 vùng độc_lập , cửa_sổ\
    \ trời toàn_cảnh , camera 360 độ . Màn_hình hiển_thị kính lái HUD. \n Vô - lăng_bọc da có sưởi , trang_trí thêm gỗ quý\
    \ và crôm , tích_hợp nút cảm_biến đa tính_năng . Hai màn_hình giải_trí 10 inch gắn ở tựa đầu ghế trước cho hàng ghế sau\
    \ , đi kèm với hai tai_nghe không dây , điều_khiển từ xa . Hệ_thống âm_thanh vòm Meridian 19 loa . \n Range Rover Autobiography\
    \ LWB trang_bị_động_cơ 5 lít V8 siêu nạp , sản_sinh công_suất 518 mã_lực tại vòng tua máy 6.000 vòng / phút , mô - men\
    \ xoắn cực_đại 625 Nm ở vòng tua máy từ 2.500 đến 5.500 vòng / phút . Hộp_số tự_động 8 cấp , dẫn_động 4 bánh toàn thời_gian\
    \ . Hệ_thống lái đa địa_hình với các chế_độ Comfort , Dynamic , Snow , Mud , Sand , Rock . \n Mẫu SUV hạng sang tăng_tốc\
    \ từ 0 lên 100 km / h mất 5,5 giây trước khi đạt tốc_độ tối_đa 225 km / h , theo kết_quả thử_nghiệm của Land_Rover . Mức\
