    khoảng 30% . Loại kim_cương này tuy có độ cứng hoàn_hảo nhưng màu và độ sạch kém , không đạt chuẩn ngọc quý trong trang_sức
    . Năm 1970 , Mỹ sản_xuất thành_công kim_cương quý tổng_hợp có đầy_đủ tính_chất hoá_học như kim_cương thiên_nhiên . Tuy_nhiên
