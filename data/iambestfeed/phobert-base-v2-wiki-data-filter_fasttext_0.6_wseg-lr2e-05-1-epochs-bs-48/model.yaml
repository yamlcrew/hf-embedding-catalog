    mỗi năm . ( Nhu_cầu kim_cương nhân_tạo tăng mạnh , báo Đất Việt ) Trung_Quốc được kỳ_vọng sẽ duy_trì vị_trí nhà_sản_xuất
    kim_cương tổng_hợp công_nghiệp hàng_đầu thế_giới , với sản_lượng hàng năm đạt hơn 4 tỷ carat . Mỹ rất có_thể sẽ vẫn là
