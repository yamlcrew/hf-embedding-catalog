    dùng làm trang_sức . 80% kim_cương kém phẩm_chất hơn được sử_dụng trong công_nghiệp và các ứng_dụng nghiên_cứu . ( Theo
    Báo_cáo thị_trường kim_cương công_nghiệp do hãng nghiên_cứu thị_trường Merchant_Research and Consulting ( Anh ) thực_hiện
    , kim_cương tổng_hợp chiếm tới 88% lượng kim_cương được sử_dụng trong công_nghiệp . Kim_cương nhân_tạo có_thể được sản_xuất
    trên quy_mô lớn và tính_chất của sản_phẩm tổng_hợp này mang lại nhiều ứng_dụng .
  - United chuẩn_bị cho mùa giải 2018 – 19 với một tour thi_đấu tại Hoa_Kỳ . Ba trận đấu đầu_tiên được công_bố vào ngày 3
    tháng 4 năm 2018 , với các đối_thủ Club_América , San_Jose_Earthquakes and Liverpool . ( ) Câu_lạc_bộ sau đó thông_báo
    tham_dự International_Champions_Cup 2018 . ( ) Ở giải đấu năm 2018 , United đấu với Milan tại StubHub_Center ở Carson
    , California , Liverpool tại Sân_vận_động Michigan ở Ann_Arbor , Michigan , và Real_Madrid tại Sân_vận_động Hard_Rock
