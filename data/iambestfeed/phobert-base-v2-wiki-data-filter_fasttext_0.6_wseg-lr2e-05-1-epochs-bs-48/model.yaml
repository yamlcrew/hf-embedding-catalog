- source_sentence: Giới_thiệu của Brachymenium regnellii
  sentences:
  - Lịch_Gregory được công_nhận bởi Trung_Hoa_Dân_Quốc , lúc đó mới ra_đời , có hiệu_lực từ ngày 1 tháng 1 năm 1912 cho các
    hoạt_động chính_thức , nhưng dân_chúng vẫn tiếp_tục sử_dụng lịch truyền_thống của nhà Thanh . Tình_trạng của lịch Gregory
    trong khoảng 1916 đến 1921 , khi Trung_Quốc bị kiểm_soát bởi các đốc quân , không được rõ . Từ khoảng 1921 đến 1928 các
    đốc quân vẫn tiếp_tục kiểm_soát phía bắc Trung_Quốc , nhưng Quốc_dân đảng đã kiểm_soát miền nam Trung_Quốc và có_lẽ họ
    đã sử_dụng lịch Gregory . Sau khi Quốc_dân đảng công_bố cải_tổ lại Trung_Hoa_Dân_Quốc 10 tháng 10 năm 1928 , họ ra sắc_lệnh
    bắt_buộc sử_dụng lịch Gregory có hiệu_lực từ ngày 1 tháng 1 năm 1929 . Họ cũng ra sắc_lệnh có hiệu_lực từ ngày này mọi
    người_dân phải sử_dụng múi thời_gian bờ biển đã được dùng trong tất_cả các cảng hiệp_ước , cho các cảng dọc theo bờ biển
    phía đông Trung_Quốc , ký với châu_Âu ( theo Hiệp_ước Nam_Kinh 1842 ) từ năm 1904 . Điều này đã thay_đổi thời_điểm bắt_đầu
    mỗi ngày đối_với cả lịch truyền_thống và lịch Gregory một lượng +14,3 phút từ nửa_đêm Bắc_Kinh tới nửa_đêm tại kinh_độ
    120 ° đông tính từ Greenwich . Điều này đã sinh ra một_số sai_biệt , chẳng_hạn như đối_với Tết Trung_Thu năm 1978 . Điểm
    sóc khi đó là ngày 3 tháng 9 năm 1978 , hồi 00:07 , Giờ chuẩn Trung_Quốc ( ) . Sử_dụng lịch cũ theo múi_giờ Bắc_Kinh ,
    sóc xảy ra lúc 23:53 ngày 2 , vì_thế tháng Tám ( âm_lịch ) bắt_đầu trong các ngày khác nhau tuỳ theo từng loại lịch .
    Người Hồng_Kông ( sử_dụng lịch truyền_thống ) ăn Tết này vào ngày 16 tháng 9 , nhưng những người Trung_Quốc khác ăn Tết
    này vào ngày 17 tháng 9 ( www.math.nus.edu.sg , trang 18 ) . Quốc_dân đảng có_thể đã bắt_đầu đánh_số năm của nền cộng_hoà
    của họ vào năm 1929 , bắt_đầu từ năm 1912 như là năm 1 . Khi những người cộng_sản giành được quyền kiểm_soát đối_với Trung_Hoa
    đại_lục 1 tháng 10 năm 1949 , họ chỉ đơn_giản là tiếp_tục sử_dụng lịch Gregory , nhưng bắt_đầu từ đây đánh_số năm theo
    kiểu phương tây , bắt_đầu với 1949 . Ở cả Trung_Hoa đại_lục và Đài_Loan , các tháng của lịch Gregory được đánh_số từ 1
    đến 12 giống như các tháng của lịch truyền_thống .
