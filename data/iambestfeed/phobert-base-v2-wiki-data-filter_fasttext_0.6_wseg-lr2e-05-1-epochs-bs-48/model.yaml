      * Số_vô_tỷ , một phần mở_rộng khác của các số_thực , chứa siêu_thực và tất_cả các số thứ_tự vô_hạn Thể_loại : Cụm_từ
      tiếng Anh Thể_loại : Vô_tận Thể_loại : Trang định_hướng toán_học'
    - Le_Villey là một xã của tỉnh Jura , thuộc vùng Bourgogne-Franche-Comté , miền đông nước Pháp .
    - 'Không rõ ông bỏ việc thông_ngôn và về Nam_Kỳ từ khi nào , nhưng vào đầu thập_niên 1900 , ông đã xuất vốn xây_dựng và
      kinh_doanh khách_sạn ở Mỹ_Tho , được xem là người kinh_doanh khách_sạn đầu_tiên ở Tiền_Giang ( ) . Ban_đầu , khách_sạn
      có tên là Nam_Kỳ lữ_điếm , gồm 15 căn , kéo_dài từ đầu đường Trần_Văn_Trân ( Nay là đường Huyện Toại . ) đến đầu đường
      D ’ Ariès ( Nay là đường Lê_Lợi . ) , đối_diện khu_vực ga xe_lửa và bến_tàu lục tỉnh ( Nay là khu_vực Công_viên Thủ_Khoa
      Huân , phường 1 , thành_phố Mỹ_Tho . ) . Đầu năm 1908 , ông đã cho Trần_Chánh_Chiếu mượn khách_sạn để làm nơi liên_lạc
      , hội_họp , diễn_thuyết , phân_phát tài_liệu , tuyên_truyền và làm cơ_sở kinh_tài cho Phong_trào Minh_Tân , đổi tên
      thành Minh_Tân khách_sạn ; có lúc Trần_Chánh_Chiếu trực_tiếp quản_lý , có lúc ông giao cho Nguyễn_Minh_Triết ( Cả Trận
      ) hay Nguyễn_Chánh_Sắt quản_lý . Đồng_thời , ông còn tham_gia thành_lập " Nam_Kỳ_Minh_Tân công_nghệ " có trụ_sở đặt
      tại khách_sạn Minh_Tân . Đây là công_ty cổ_phần , có vốn_cố_định lên đến 1.000 đồng Đông_Dương , tương_đương 25.000
      francs , với mục_đích như đã ghi trong Điều_lệ là : " 1 . Lập lò nghệ tại Nam kỳ , lò chỉ , lò dệt , lò savon ( xà_bông
      ) , thuộc da và pha ly , v.v ... 2 . Dạy con_nít An_Nam học nghề ấy " ; nhưng thực_chất là nhằm cạnh_tranh với tư_bản
      Pháp và tư_bản Hoa_Kiều , phát_triển tiểu_thủ_công_nghiệp , đào_tạo nguồn nhân_lực có trình_độ , giáo_dục hướng về thực_nghiệp
      , khẳng_định vị_trí kinh_tế của giai_cấp tư_sản Việt_Nam . Do hoạt_động của hội Minh_Tân , chính_quyền thực_dân bắt_đầu
      theo_dõi và chú_ý đến hoạt_động của khách_sạn Minh_Tân . Kể từ ngày 6 tháng 8 năm 1908 , Huỳnh_Đình_Điển thay Trần_Chánh_Chiếu
      trực_tiếp quản_lý khách_sạn . Tin dó được đưa lên báo để chính_quyền thực_dân bớt nghi_ngờ . Tuy_nhiên , tháng 10 năm
      1908 , thực_dân Pháp bắt Trần_Chánh_Chiếu tại Sài_Gòn cùng 91 người khác đưa về Mỹ_Tho . Khách_sạn Minh_Tân cũng bị
      khám_xét nhưng chính_quyền không tìm được bằng_chứng buộc_tội chống chính_quyền . Huỳnh_Đình_Điển từ khi trực_tiếp quản_lý
      Minh_Tân khách_sạn vẫn tiếp_tục hoạt_động chính_trị , hỗ_trợ các hội_viên Minh_Tân . Tháng 8 năm 1910 , khi Phan_Chu_Trinh
      bị kết_án quản_thúc tại Mỹ_Tho , cụ Phan đã được ông đưa về cư_ngụ tại khách_sạn Minh_Tân . Tháng 2 năm 1913 , Cường_Để
      từ Sài_Gòn xuống Mỹ_Tho bí_mật liên_lạc với Huỳnh_Đình_Điển . Lúc bấy_giờ Minh_Tân khách_sạn đã trở_lại tên cũ của nó
      là Nam_Kỳ lữ_điếm . Cuối năm 1908 , phong_trào Minh_Tân bị chính_quyền thực_dân Pháp gây khó_dễ , ông chuyển một_số
      hoạt_động kinh_doanh lên Sài_Gòn . Vương_Hồng_Sển từng mô_tả lại tài thuộc da và sự giàu_có của Huỳnh_Đình_Điển khi
      thống_trị cả dãy phố Pellerin ( nay là đường Pasteur ) ( . Tại đây , ông còn cho xây_dựng khách_sạn Bá_Huê_Lầu nổi_tiếng
      Sài_Gòn thời bấy giờNay là số 54 Pasteur , Quận 1 , Thành_phố Hồ_Chí_Minh . ) . Nhiều nhân_vật nổi_tiếng như Ngô_Văn_Chiêu
      , Phan_Chu_Trinh ... từng ngụ tại đây . Nhà_văn Hồ Biểu_Chánh cũng nhiều lần nhắc đến Bá_Huê_Lầu trong tác_phẩm của
      mình . ( Hồ Biểu_Chánh , Vì Nghĩa , Vì Tình . ) Bên cạnh đó , ông còn tham_gia hội_kín Thanh_niên cao_vọng do Nguyễn_An_Ninh
      thành_lập ; đặc_biệt , ông đã đóng_góp tiền_bạc cho sự ra_đời và hoạt_động của tờ báo Chuông_Rè ( La_Cloche_Fêlée )
      . ( )'
  - source_sentence: Diễn_giải của Iki ( mỹ học )
    sentences:
    - Iki , đã nổi lên từ tầng_lớp thương_nhân Nhật_Bản , có_thể xuất_hiện trong một_số cách diễn_đạt hiện_đại hơn của thẩm_mỹ
      Nhật_Bản so với các khái_niệm như wabi-sabi. Thuật_ngữ này thường được sử_dụng trong văn viết và văn nói , nhưng không
      nhất_thiết phải độc_quyền với các thể_loại vẻ đẹp khác . Iki là một biểu_hiện của sự đơn_giản , tinh_xảo , tự_nhiên
      và độc_đáo . Nó biểu_thị cho sự phù_du , lãng_mạn , đơn_giản , điều_độ , táo_bạo , thông_minh và vô_thức . Iki không
      biểu_thị cho sự tinh_tế quá mức , kiêu_kì , phức_tạp , sặc_sỡ , bóng_bẩy , làm_dáng , hoặc nói_chung , dễ_thương . Đồng_thời
      , iki có_thể biểu_hiện bất_kỳ đặc_điểm nào trong tập đó một_cách thông_minh , trực_tiếp và không nao_núng . Iki có_thể
      biểu_hiện một đặc_điểm cá_nhân , hoặc hiện_tượng nhân_tạo phô_bày ý_chí hay ý_thức con_người . Iki không được sử_dụng
      để mô_tả các hiện_tượng tự_nhiên , nhưng có_thể được thể_hiện trong sự đánh_giá của con_người về vẻ đẹp tự_nhiên , hoặc
      trong bản_chất của con_người . Murakami_Haruki , người viết theo một phong_cách rõ_ràng và không nao núng—với sự đa_cảm
      , phi_thường , siêu_thực trong các tác phẩm—được mô_tả là hiện_thân của iki . Đối_lập với nó , Kawabata_Yasunari ( 1899-1972
      ) viết theo một_mạch văn đậm chất thơ_ca hơn , với một cái nhìn cận_cảnh vào sự " phức_tạp " trong nội_tâm nhân_vật
      của ông , trong khi các tình_huống và môi_trường xung_quanh thể_hiện một loại wabi-sabi. Điều đó nói rằng , sự khác_biệt
      về phong_cách_thể có xu_hướng phân nhánh từ một chủ cảm_xúc tương_tự . Thật vậy , iki được gắn liền một_cách mạnh_mẽ
      với các xu_hướng về phong_cách .
    - Gomphrena conferta là loài thực_vật có hoa thuộc họ Dền . Loài này được Benth . mô_tả khoa_học đầu_tiên năm 1870 . (
      )
    - 'Phân họ Vịt lặn ( danh_pháp khoa_học : Aythyinae ) là một phân họ trong họ Vịt ( Anatidae ) chứa khoảng 15 loài vịt
      lặn còn sinh_tồn , nói_chung gọi là vịt đầu nâu / đen hay vịt bãi / vịt biển ( Tên gọi này là mơ_hồ do nhiều loài vịt
      sống ngoài biển , chẳng_hạn đa_phần các loài của phân họ Vịt biển . ) . Chúng là một phần của họ đa_dạng chứa các loài
      vịt , ngỗng , thiên_nga v.v. Các loài vịt lặn trong bài này được đặt trong một phân họ khác_biệt . Trong khi về mặt
      hình_thái thì chúng gần giống như các loài vịt thật_sự ( Livezey_Brad C. ( 1986 ) : A phylogenetic analysis of recent
      anseriform genera using morphological characters . Auk 103 ( 4 ) : 737-754 . Toàn_văn PDF ) , tuy_nhiên giữa chúng có
      các khác_biệt rõ nét , chẳng_hạn như cấu_trúc của khí_quản . Các trình_tự dữ_liệu mtDNA cytochrome b và NADH dehydrogenaza
      ( Johnson_Kevin P. & Sorenson_Michael D. ( 1999 ) : Phylogeny and biogeography of dabbling ducks ( genus Anas ) : a
      comparison of molecular and morphological evidence . Auk 116 ( 3 ) : 792 – 805 . Toàn_văn PDF ) chỉ ra rằng hai nhóm
      vịt thật_sự và vịt lặn là tương_đối xa nhau , sự giống nhau bề_ngoài chỉ là do tiến_hoá hội_tụ . Theo kiểu khác ( Terres_John
      K. & National_Audubon_Society ( 1991 ) : The_Audubon_Society_Encyclopedia of North_American_Birds . Wings_Books , New_York
      . ISBN 0-517-03288-0 ) , nhóm vịt lặn được coi là một tông với danh_pháp Aythyini trong phân họ Anatidae nghĩa rộng
      , bao_gồm toàn_bộ các loài thuỷ điểu dạng vịt , ngoại_trừ nhóm le nâu . Các loài vịt biển nói_chung hay tìm thấy ở các
      vùng duyên_hải , chẳng_hạn như vịt đuôi dài , vịt scoter , vịt mắt vàng và vịt nhung , đôi_khi cũng được gọi một_cách
      dân_dã là vịt lặn tại Bắc_Mỹ do chúng cũng tìm_kiếm thức_ăn bằng cách lặn ; nhưng phân họ chứa chúng ( Merginae ) là
      rất khác_biệt . Mặc_dù nhóm này có phân_bố toàn_cầu , nhưng phần_lớn các thành_viên là bản_địa của Bắc_bán_cầu và nó
      bao_gồm một_số loài vịt khá quen_thuộc ở Bắc_bán_cầu . Nhóm này được gọi là vịt lặn do các thành_viên của nó kiếm_ăn
      chủ_yếu bằng cách lặn , mặc_dù trên thực_tế thì các loài chi Netta ít khi lặn và chủ_yếu kiếm_ăn giống như vịt thật_sự
      . Những loài vịt này sống thành bầy , chủ_yếu tại các vùng nước_ngọt ven cửa_sông , mặc_dù vịt bãi lớn sinh_sống ngoài
      biển trong mùa đông ở phương Bắc . Chúng_bay khoẻ ; các cánh rộng và tù đầu đòi_hỏi những cú đập cánh nhanh hơn so với
      ở nhiều loài vịt khác và chúng hơi khó bay lên . Các loài ở phía bắc có xu_hướng di_trú còn các loài ở phía nam thì
      không di_trú mặc_dù vịt đầu cứng vượt qua những khoảng_cách dài . Các loài vịt lặn đi_lại không tốt trên đất_liền như
      vịt thật_sự ; các chân của chúng có xu_hướng lui về phía sau của cơ_thể để giúp chúng tạo lực đẩy khi ở dưới nước .'
  - source_sentence: Giao_hữu trước mùa giải của Manchester_United F.C. mùa giải 2018 – 19
    sentences:
    - USS Young ( DD-580 ) là một tàu_khu_trục lớp Fletcher được Hải_quân Hoa_Kỳ chế_tạo trong Chiến_tranh Thế_giới thứ hai
      . Nó là chiếc tàu_chiến thứ hai của Hải_quân Mỹ mang cái tên này , và là chiếc duy_nhất được đặt theo tên Chuẩn đô_đốc
      Lucien_Young ( 1852-1912 ) , người tham_gia cuộc Chiến_tranh Tây_Ban Nha-Hoa Kỳ . Nó hoạt_động cho đến hết Thế_Chiến
      II , được cho xuất_biên chế năm 1947 , xuất đăng_bạ năm 1968 và cuối_cùng bị đánh chìm như một mục_tiêu năm 1970 . Nó
      được tặng_thưởng năm Ngôi_sao Chiến_trận do thành_tích phục_vụ trong Thế_Chiến II .
    - Năm 1953 , người ta đã sản_xuất ra kim_cương nhân_tạo có giá_thành bằng 50% kim_cương thiên_nhiên và hiện_nay giá_thành
      khoảng 30% . Loại kim_cương này tuy có độ cứng hoàn_hảo nhưng màu và độ sạch kém , không đạt chuẩn ngọc quý trong trang_sức
      . Năm 1970 , Mỹ sản_xuất thành_công kim_cương quý tổng_hợp có đầy_đủ tính_chất hoá_học như kim_cương thiên_nhiên . Tuy_nhiên
      , giá_thành của loại này cao hơn kim_cương tự_nhiên gấp nhiều lần nên hiếm khi xuất_hiện trên thị_trường . ( ) Nhu_cầu
      kim_cương nhân_tạo ở những thị_trường mới nổi như Trung_Quốc và Ấn_Độ đang tăng nhanh nhất thế_giới , với tốc_độ 10-15%
      mỗi năm . ( Nhu_cầu kim_cương nhân_tạo tăng mạnh , báo Đất Việt ) Trung_Quốc được kỳ_vọng sẽ duy_trì vị_trí nhà_sản_xuất
      kim_cương tổng_hợp công_nghiệp hàng_đầu thế_giới , với sản_lượng hàng năm đạt hơn 4 tỷ carat . Mỹ rất có_thể sẽ vẫn
      là nhà_sản_xuất và xuất_khẩu kim_cương chủ_chốt trong thập_kỷ tới . Chỉ khoảng 20% sản_lượng kim_cương trên thế_giới
      được dùng làm trang_sức . 80% kim_cương kém phẩm_chất hơn được sử_dụng trong công_nghiệp và các ứng_dụng nghiên_cứu
      . ( Theo Báo_cáo thị_trường kim_cương công_nghiệp do hãng nghiên_cứu thị_trường Merchant_Research and Consulting ( Anh
      ) thực_hiện , kim_cương tổng_hợp chiếm tới 88% lượng kim_cương được sử_dụng trong công_nghiệp . Kim_cương nhân_tạo có_thể
      được sản_xuất trên quy_mô lớn và tính_chất của sản_phẩm tổng_hợp này mang lại nhiều ứng_dụng .
    - United chuẩn_bị cho mùa giải 2018 – 19 với một tour thi_đấu tại Hoa_Kỳ . Ba trận đấu đầu_tiên được công_bố vào ngày
      3 tháng 4 năm 2018 , với các đối_thủ Club_América , San_Jose_Earthquakes and Liverpool . ( ) Câu_lạc_bộ sau đó thông_báo
      tham_dự International_Champions_Cup 2018 . ( ) Ở giải đấu năm 2018 , United đấu với Milan tại StubHub_Center ở Carson
      , California , Liverpool tại Sân_vận_động Michigan ở Ann_Arbor , Michigan , và Real_Madrid tại Sân_vận_động Hard_Rock
      ở Miami_Gardens , Florida . ( ) Alexis_Sánchez đến Hoa_Kỳ bị trì_hoãn vì anh không được cung_cấp visa vì bản_án treo
      16 tháng mà anh đã chấp_nhận vào tháng 2 do trốn lậu thuế trong thời_gian anh ở Tây_Ban_Nha . ( ) Trận giao_hữu cuối_cùng
      trước mùa giải của Manchester_United là trận đấu trên sân_khách trước Bayern_Munich tại Allianz_Arena vào ngày 5 tháng
      8 . ( )
