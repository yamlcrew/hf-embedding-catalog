  - 7730 Sergerasimov ( 1978 NN1 ) là một tiểu hành_tinh vành_đai chính được phát_hiện ngày 4 tháng 7 năm 1978 bởi L. I. Chernykh
    ở Đài_vật_lý thiên_văn Crimean .
  - Obeidia minima là một loài bướm đêm trong họ Geometridae . ( )
- source_sentence: Giới_thiệu của Aristolochia_angustifolia
  sentences:
  - Aristolochia angustifolia là một loài thực_vật có hoa trong họ Aristolochiaceae . Loài này được Cham . mô_tả khoa_học
    đầu_tiên năm 1832 . ( )
  - Acrocyrtidus fasciatus là một loài bọ cánh_cứng trong họ Cerambycidae . ( )
  - Thiệu Giao là một xã thuộc huyện Thiệu_Hóa , tỉnh Thanh_Hóa , Việt_Nam .
- source_sentence: Lịch_sử của Stari_Ras
  sentences:
  - Các phát_hiện khảo_cổ_học về các cấu_trúc phòng_thủ và các nhà_thờ ban_đầu ở khu_vực Stari Ras có niên_đại_từ thế_kỷ thứ
    4 đến thế_kỷ thứ 6 , tương_ứng với lời dẫn_chứng của nhà sử_học Byzantine_Procopius , người đã viết rằng lâu đài La_Mã
    ở Arsa nằm ở tỉnh Dardania đã được cải_tạo lại dưới thời trị_vì của hoàng đế Justinianus I ( 527 - 565 ) . ( p . 216 )
    Ras trong từ tiếng Slav bắt_nguồn từ Arsa thông_qua hoán_vị . Một giáo_phận bao_gồm các phần của Serbia có_lẽ được thành_lập
    ở Ras xung_quanh khoảng thời_gian diễn ra Công đồng Constantinopolis IV ( 869 / 70 ) và Công đồng Constantinople IV (
    879 / 80 ) . ( p . 67 - 68 , 208 - 209 ) Đến thế_kỷ 10 , hoàng đế Konstantinos VII viết trong tác_phẩm De Administrando_Imperio
    của ông đề_cập đến Rasa như một khu_vực biên_giới giữa Bulgaria và Serbia từ cuối thế_kỷ thứ 9 . Nghiên_cứu mới hơn chỉ
    ra rằng vào cuối thế_kỷ thứ 9 , nó là một phần của Đệ Nhất Đế_quốc Bulgaria . Từ thời_kỳ đó trở_đi , nó thuộc quyền cai_trị
    của nhiều người khác nhau . Hoàng đế Đông_La_Mã Ioannes I Tzimiskes tái_lập quyền kiểm_soát Ras vào năm 971 và thành_lập
    tỉnh Ras và người đứng đầu được gọi là Protospatharios . ( ) ( ) Đến năm 976 , nhà_nước Bulgaria đã giành lại Ras , nhưng
    Basíleios II sau đó đã chiếm lại nó vào khoảng năm 1016 - 18 . Trong các điều_lệ hoàng_gia được đặt ra bởi Basíleios vào
    năm 1019 và 1020 , trao quyền pháp_lý của khu_vực này cho Tổng_giám_mục Ohrid và trụ_sở của giám phận Ras nằm tại Nhà_thờ
    các Thánh_Phêrô và Phaolô . Nó vẫn là một khu_vực biên_giới của Đông_La_Mã cho đến khi Ioannes II Komnenos để mất khu_vực
    này trong Chiến_tranh Đông_La_Mã - Hungary từ năm 1127 đến 1129 . Pháo_đài Ras sau đó bị quân_đội Serbia thiêu rụi . Chỉ_huy
    cuối_cùng của pháo_đài sau đó đã bị hoàng đế trừng_phạt vì thất_thủ . Trong cuộc_chiến tiếp_theo từ năm 1149 – 51 , người
    Đông_La_Mã đã chiếm lại được Ras .
  - "Tập_tin : Museum of Selenge_Province . jpg | Bảo_tàng tỉnh \n Tập_tin : Sükhbaatar suburbs . jpg | Biên_giới Nga - Mông_Cổ"
  - Antiphrisson grunini là một loài ruồi trong họ Asilidae . Antiphrisson grunini được Lehr miêu_tả năm 1970 . Loài này phân_bố
    ở vùng Cổ Bắc_giới . ( )
- source_sentence: Giới_thiệu của Thelypteris_pelludia
  sentences:
  - Yuichi_Nemoto ( sinh ngày 12 tháng 7 năm 1981 ) là một cầu_thủ bóng_đá người Nhật_Bản . ( )
  - Mimopterolophia multituberculata là một loài bọ cánh_cứng trong họ Cerambycidae . ( )
  - Thelypteris pelludia là một loài dương_xỉ trong họ Thelypteridaceae . Loài này được A. R._Sm . & M. Kessler mô_tả khoa_học
    đầu_tiên năm 2008 . ( )
- source_sentence: Giới_thiệu của 2771 Polzunov
  sentences:
  - 2771 Polzunov ( 1978 SP7 ) là một tiểu hành_tinh vành_đai chính được phát_hiện ngày 16 tháng 9 năm 1978 bởi L. Zhuravleva
    ở Nauchnyj .
  - Coelioxys immaculata là một loài Hymenoptera trong họ Megachilidae . Loài này được Cockerell mô_tả khoa_học năm 1912 .
    ( )
  - Bassia californica là loài thực_vật có hoa thuộc họ Dền . Loài này được ( S._Watson ) A. J. Scott mô_tả khoa_học đầu_tiên
    năm 1978 . ( )
