  - source_sentence: Động_đất mạnh 5,6 độ ở tỉnh Tây_Java của Indonesia khiến ít_nhất 44 người thiệt_mạng , nhiều nhà_cửa
      tại thủ_đô Jakarta cũng bị rung_chuyển . - VnExpress
    sentences:
    - "Liên_hệ : 084 666 0123 hoặc podcast@vnexpress.net . \n Nhiều bluechip gần chạm giá_sàn ; Giá heo hơi tăng lên 64.000\
      \ đồng một kg ; Còn 4,4 triệu lao_động chịu ảnh_hưởng của Covid - 19 ; 13 người Việt bị giam_cầm ở Philippines đã được\
      \ tự_do ... \n Nội_dung chính \n Bấm để chuyển tới nội_dung bạn muốn nghe \n Liên_hệ : 084 666 0123 hoặc podcast@vnexpress.net\
      \ ."
    - "Nếu mua xe mới tôi phải vay thêm tiền mới đủ lăn bánh_xe cỡ A trong khi mua xe cũ thì có thế chọn xe cỡ B. ( Lan_Anh\
      \ ) \n >> Xem thêm : cẩm_nang mua xe"
    - "Cơ_quan Khí_tượng , Khí_hậu và Địa_vật_lý Indonesia ( BMKG ) cho biết trận động_đất mạnh 5,6 độ xảy ra lúc 13h21 hôm_nay\
      \ , tâm chấn nằm trên đất_liền ở độ sâu 10 km tại tỉnh Tây_Java , cách thủ_đô Jakarta khoảng 100 km về phía nam . Trong\
      \ khi đó , Cơ_quan Khảo_sát Địa_chất Mỹ ( USGS ) cho biết trận động_đất mạnh 5,4 độ . USGS xác_định những trận động_đất\
      \ có tâm chấn ở độ sâu dưới 70 km là \" tâm chấn nông \" và chúng thường gây thiệt_hại nặng_nề hơn so với \" tâm chấn\
      \ sâu \" . \n BMKG nói rằng không có nguy_cơ xảy ra sóng_thần sau trận động_đất . \n \" Hàng trăm , thậm_chí có_thể\
      \ hàng nghìn ngôi nhà bị hư_hại . 44 người đã thiệt_mạng \" , Adam , phát_ngôn_viên của chính_quyền địa_phương tại thị_trấn\
      \ Cianjur ở Tây_Java , nói với AFP. \n Herman_Suherman , lãnh_đạo thị_trấn Cianjur , trước đó nói trên truyền_hình rằng\
      \ chỉ riêng một trong 4 bệnh_viện tại đây đã ghi_nhận gần 20 người chết và ít_nhất 300 người bị_thương . \" Phần_lớn\
      \ nạn_nhân bị_thương do mắc_kẹt dưới đống đổ_nát \" , ông cho biết và cảnh_báo con_số thương_vong có_thể tăng thêm .\
      \ \n Nhân_chứng cho biết nhiều tòa nhà tại Jakarta bị rung_chuyển , khiến không ít người phải sơ_tán khỏi các văn_phòng\
      \ ở quận trung_tâm thủ_đô . Số khác nói rằng họ cảm_nhận được các tòa nhà rung lắc và chứng_kiến đồ_đạc di_chuyển .\
      \ \n \" Tôi đang làm_việc thì sàn nhà rung_chuyển , tôi có_thể cảm_nhận chấn_động rất rõ_ràng \" , Mayadita_Waluyo ,\
      \ một luật_sư 22 tuổi làm_việc tại một tòa nhà_văn_phòng ở Jakarta , kể . \" Lúc đó tôi chưa hình_dung được chuyện gì\
      \ đã xảy ra , nhưng rung lắc ngày_càng mạnh hơn và kéo_dài khá lâu \" . \n Waluyo cho hay cô và nhiều đồng_nghiệp trong\
      \ văn_phòng sau đó đã hoảng_hốt chạy xuống cầu_thang bộ để thoát khỏi tòa nhà . \n Indonesia thường_xuyên trải qua các\
      \ trận động_đất và phun trào núi_lửa do nằm trên \" Vành_đai lửa \" , một vòng_cung hoạt_động địa_chấn dữ_dội , nơi\
      \ các mảng kiến_tạo va_chạm kéo_dài từ Nhật_Bản qua Đông_Nam_Á và lưu_vực Thái_Bình_Dương . \n Năm 2004 , trận động_đất\
      \ 9,1 độ xảy ra ngoài khơi đảo Sumatra , gây ra sóng_thần giết chết 220.000 người khắp khu_vực , trong đó có khoảng\
      \ 170.000 người ở Indonesia . \n Năm 2018 , một trận động_đất 7,5 độ và sóng_thần theo sau ở Palu trên đảo Sulawesi\
      \ đã khiến hơn 4.300 người chết và mất_tích . \n Vũ_Anh ( Theo AFP )"
