- source_sentence: Cô Moon Nguyen có câu ' I don ' t think I can talk to him . We are not on the same page ' . Bạn có hiểu
    nghĩa câu này ? - VnExpress
  sentences:
  - "\" Khí_đốt_hóa lỏng ( LNG ) nhập tại cảng đắt hơn khí_đốt qua đường_ống của Nga vì lý_do hậu_cần \" , Bộ_trưởng Tài_chính\
    \ Đức Christian Lindner nói với tờ Bild trong bài phỏng_vấn đầu năm mới . \" Do đó , giá khí_đốt sẽ tiếp_tục tăng cao\
    \ , nhưng không đến mức đột_biến . Đó sẽ là bình_thường mới \" . \n Đức trong hàng chục năm qua phụ_thuộc vào khí_đốt\
    \ giá rẻ được chuyển bằng đường_ống của Nga . Nhưng từ khi Moskva phát_động chiến_dịch quân_sự tại Ukraine , Đức đã quay\
    \ lưng với khí_đốt Nga , nỗ_lực đa_dạng_hóa nguồn cung và chủ_yếu dựa vào nhập_khẩu LNG với giá đắt hơn để làm đầy kho\
    \ dự_trữ . \n Theo Bộ_trưởng Lindner , Đức cần chính_sách năng_lượng \" không định_kiến \" để giữ cho ngành công_nghiệp\
    \ phát_triển . Theo ông , ngoài năng_lượng tái_tạo , Đức cần xem_xét các nguồn từ khí_đốt , dầu_mỏ , hạt_nhân trong cơ_cấu\
    \ năng_lượng của mình . \n Ông Lindner cũng dự_báo lạm_phát ở Đức , nền kinh_tế lớn nhất châu Âu , sẽ giảm xuống 7 % trong\
    \ năm nay và tiếp giảm từ 2024 trở_đi , với mục_tiêu là 2 % . \" Đây phải là ưu_tiên hàng_đầu của Ngân_hàng Trung_ương\
    \ châu Âu ( ECB ) và chính_phủ Đức \" , ông nhấn_mạnh . \n Lạm_phát ở Đức_giảm nhẹ xuống 11,3 % trong tháng 11 / 2022\
    \ , so với mức 11,6 % vào tháng trước đó . \n Giá khí_đốt tự_nhiên ở châu Âu tăng lên mức chưa từng có trong suốt năm\
    \ 2022 , do ảnh_hưởng từ chiến_sự Ukraine làm gián_đoạn nguồn cung từ các đường_ống . Tuy_nhiên , khí_đốt đã giảm_giá\
    \ trong những tuần gần đây do mùa đông ấm bất_thường ở một_số khu_vực , cùng các yếu_tố khác . \n Dữ_liệu từ cơ_quan công_nghiệp\
    \ Cơ_sở hạ_tầng Khí_đốt châu Âu cho thấy tính tới ngày 27 / 12 , Liên_minh châu Âu ( EU ) đã lấp đầy khoảng 83,2 % kho\
    \ chứa khí_đốt . \n Năm 2022 , EU đã ký các thỏa_thuận khí_đốt với Mỹ , Qatar và các nước khác để giảm phụ_thuộc khí_đốt\
    \ Nga . Tuy_nhiên , Cơ_quan Năng_lượng Quốc_tế ( IEA ) cảnh_báo châu Âu có_thể thiếu khoảng 30 tỷ mét_khối khí_đốt trong\
    \ năm 2023 và thị_trường khí_đốt toàn_cầu sẽ trở_nên khốc_liệt hơn . \n Đức_Trung ( Theo RT , Reuters , Guardian )"
  - "Tóc mái mưa không phải là kiểu tóc xa_lạ với phái_đẹp . Năm 2020 , một phiên_bản nâng_cấp của kiểu tóc mái mưa cũ được\
    \ nhiều chị_em lựa_chọn để làm mới bản_thân bởi kiểu tóc này mang đến vô_vàn lợi_ích . \n Tóc mái mưa không phải là kiểu\
    \ tóc xa_lạ với phái_đẹp . Năm 2020 , một phiên_bản nâng_cấp của kiểu tóc mái mưa cũ được nhiều chị_em lựa_chọn để làm\
    \ mới bản_thân bởi kiểu tóc này mang đến vô_vàn lợi_ích . \n Kiểu tóc mái mưa tỉa với phần tóc bên mai dài tỉa layer ôm\
    \ lấy khuôn_mặt che khuyết_điểm trán bò liếm . \n Kiểu tóc mái mưa tỉa với phần tóc bên mai dài tỉa layer ôm lấy khuôn_mặt\
    \ che khuyết_điểm trán bò liếm . \n Khuôn_mặt có phần trán ngắn cũng trở_nên cân_đối hơn khi để tóc mái mưa dài . \n Khuôn_mặt\
    \ có phần trán ngắn cũng trở_nên cân_đối hơn khi để tóc mái mưa dài . \n Mái_tóc mỏng trông dày_dặn hơn khi để thêm vài\
    \ lọn tóc mái cong nhẹ , ôm lấy khuôn_mặt . \n Mái_tóc mỏng trông dày_dặn hơn khi để thêm vài lọn tóc mái cong nhẹ , ôm\
    \ lấy khuôn_mặt . \n Phần tóc mái bên dài che đi khuyết_điểm trán và cằm ngắn , lại giúp sống_mũi trông cao hơn . \n Phần\
    \ tóc mái bên dài che đi khuyết_điểm trán và cằm ngắn , lại giúp sống_mũi trông cao hơn . \n Cô gái này có gò_má cao ,\
    \ lộ rõ khi để tóc rẽ ngôi lệch bên . Khi thêm vài lọn tóc mái dài , khuôn_mặt cô trông mềm_mại hơn hẳn . \n Cô gái này\
    \ có gò_má cao , lộ rõ khi để tóc rẽ ngôi lệch bên . Khi thêm vài lọn tóc mái dài , khuôn_mặt cô trông mềm_mại hơn hẳn\
    \ ."
