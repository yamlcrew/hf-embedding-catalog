  - source_sentence: Australia - Con rắn cây nâu được cho là nằm dưới gầm giường bé gái ở bang Queensland suốt đêm , cho đến
      khi được những người bắt rắn đưa đi . - VnExpress
    sentences:
    - "Nổi_tiếng về chăn_nuôi cừu trên thế_giới , quốc_gia này còn có số_lượng cừu lớn hơn gấp 4 lần dân_số . \n Trùm_Sò"
    - "Nhóm bắt rắn của Stuart McKenzie hôm 16 / 11 được gọi đến một gia_đình ở Queensland . Khi kéo ngăn_kéo chứa lego dưới\
      \ gầm giường , gia_đình đã phát_hiện con rắn màu nâu nằm ngay phía sau . \n McKenzie xác_định đây là rắn cây nâu và\
      \ nó có_thể đã ở dưới gầm giường suốt đêm khi bé gái say ngủ . Sau khi đưa con rắn ra khỏi căn nhà , McKenzie mang nó\
      \ vào bụi rậm và thả trở_lại tự_nhiên . \n \" Câu hỏi chưa được giải_đáp là con rắn đã ở dưới đó trong bao_lâu . Đây\
      \ là rắn cây nâu nên chúng_tôi cho rằng nó đã xuất_hiện từ đêm qua , vì loài này sống về đêm . Khả_năng cao là cô bé\
      \ đã ngủ khi có rắn trong phòng \" , McKenzie giải_thích trên Facebook . \n Video bắt rắn được đăng lên Facebook và\
      \ nhận được hơn 1.000 bình_luận . McKenzie giải_thích rắn cây nâu thường bị nhầm với rắn nâu phương đông nguy_hiểm hơn\
      \ nhiều và được coi là loài rắn_độc thứ hai trên Trái_Đất . \n Rắn nâu cây có nọc_độc nhưng ít gây chết người hơn rắn\
      \ nâu phương đông , vốn là nguyên_nhân gây ra nhiều ca tử_vong ở Australia hơn bất_kỳ loài rắn nào khác . Không có trường_hợp\
      \ người_lớn tử_vong do rắn cây nâu , nhưng Cục Khảo_sát Địa_chất Mỹ ( USGS ) cho biết trẻ_em có_thể phản_ứng bất_lợi\
      \ với vết cắn của loài bò_sát này . \n Rắn cây nâu gây ra nhiều vấn_đề đối_với hệ sinh_thái hơn là đối_với con_người\
      \ . Loài bò_sát này có nguồn_gốc từ các vùng của Indonesia , quần_đảo Solomon , New_Guinea và Australia , nhưng đang\
      \ lan rộng sang các khu_vực khác . Phạm_vi địa_lý của rắn cây nâu đã mở_rộng đến Guam , Saipan và các đảo ở tây Thái_Bình_Dương\
      \ . \n Con rắn cây nâu đầu_tiên được phát_hiện ở Gaum những năm 1950 . Đến đầu những năm 2020 , số_lượng loài đã tăng\
      \ từ 4.000 đến 10.000 con / 2,5 km2 trên toàn_bộ hòn đảo . \n Khi loài bò_sát di_cư đến môi_trường sống mới , chúng\
      \ sẽ tiêu_diệt các quần_thể động_vật có xương_sống nhỏ tại địa_phương . Nó có_thể ăn lượng thức_ăn bằng 70 % khối_lượng\
      \ cơ_thể của mình mỗi ngày . Rắn cây nâu nhỏ ăn các loài chim nhỏ , động_vật lưỡng cư , thằn_lằn và các loài bò_sát\
      \ khác . Những con lớn sẽ săn các loài chim lớn , thằn_lằn lớn hơn và động_vật có vú nhỏ . \n Huyền_Lê ( Theo Newsweek\
      \ )"
    - "Anh_Tuấn \n - Showbiz \n - Thời_trang \n - Làm_đẹp \n - Xem \n - Ăn_chơi \n - Lối_sống \n - Thể_thao \n - Thời_cuộc\
      \ \n - Podcasts \n - Thương_trường \n - Trắc_nghiệm \n - Video \n - Ảnh \n - Reviews & Deals \n Diễn_viên Thúy Nga tậu\
      \ ngôi nhà mới có_giá hơn 1,2 triệu USD ( khoảng 28 tỷ đồng ) và vừa hoàn_tất giấy_tờ chủ_quyền vào đầu tháng 3 . \n\
      \ Anh_Tuấn"
  - source_sentence: Trump cho rằng ông tạo ra thỏa_thuận chấm_dứt xung_đột cho Ethiopia , nhưng người đoạt giải Nobel Hoà_bình
      lại là Thủ_tướng Abiy_Ahmed . - VnExpress
    sentences:
    - "Trung_Quốc đang xây_dựng một cây cầu vòm bê_tông khổng_lồ trên sông Hồng_Thủy ở khu tự_trị Quảng_Tây với nhịp chính\
      \ dài 600 m . \n Video : Xinhua / Highest_Bridges"
    - "\" Tôi đã thực_hiện một thỏa_thuận , tôi đã cứu một quốc_gia và những gì tôi nghe được là lãnh_đạo quốc_gia đó được\
      \ trao giải Nobel Hoà_bình vì đã cứu đất_nước \" , Tổng_thống Mỹ Donald_Trump nói với người ủng_hộ tại buổi mít_tinh\
      \ ở Toledo , bang Ohio , hôm 9 / 1 , khẳng_định ông đã ngăn nguy_cơ xảy ra cuộc_chiến lớn và cứu nhiều người ở Ethiopia\
      \ . \n Dù ông chủ Nhà_Trắng không nêu tên lãnh_đạo quốc_gia đoạt giải Nobel_Hòa_bình , ông nhiều khả_năng đang đề_cập\
      \ đến Thủ_tướng Ethiopia Abiy_Ahmed , chủ_nhân của giải_thưởng danh_giá này năm_ngoái . \n Thủ_tướng Ahmed , 43 tuổi\
      \ , được vinh_danh vì những nỗ_lực để đạt được hòa bình và hợp_tác quốc_tế , đặc_biệt là sáng_kiến mang tính quyết_định\
      \ của ông nhằm giải_quyết xung_đột biên_giới với nước láng_giềng Eritrea . \n Ít_nhất 70.000 người đã thiệt_mạng trước\
      \ khi Ethiopia và Eritrea ký thỏa_thuận hòa bình vào tháng 12 / 2000 , nhưng căng_thẳng vẫn ở mức cao khi Ethiopia từ_chối\
      \ công_nhận biên_giới giữa hai nước . Khi Ahmed nhậm_chức Thủ_tướng Ethiopia vào tháng 4 / 2018 , ông đã trả tự_do cho\
      \ các tù_nhân chính_trị và tiếp_tục ký thỏa_thuận hòa bình với người đồng cấp Eritrea Isaias_Afwerki . \n Chuyên_gia\
      \ nhận_định vai_trò của Mỹ trong việc thúc_đẩy thoả_thuận_hoà_bình giữa Ethiopia và Eritrea rất \" mờ_nhạt \" . Họ cho\
      \ rằng UAE , quốc_gia có ảnh_hưởng lớn ở khu_vực Sừng_châu Phi , là nhân_tố chính giúp thoả_thuận được thực_hiện . Arab\
      \ Saudi cũng được xem là đất_nước có đóng_góp quan_trọng cho thỏa_thuận . \n Giải Nobel Hoà_bình được trao vào ngày\
      \ 11 / 10 năm_ngoái và Thủ_tướng Ethiopia đã phát_biểu nhận giải tại Oslo , Na_Uy , một tháng sau . Ivanka_Trump và\
      \ Ngoại_trưởng Mỹ Mike_Pompeo đều gửi lời chúc_mừng tới ông . \n Ông chủ Nhà_Trắng hồi tháng 9 năm_ngoái tuyên_bố nếu\
      \ Nobel_Hòa_bình là giải_thưởng được bầu_chọn công_bằng thì ông là một trong những người xứng_đáng nhất . \n Ngọc_Ánh\
      \ ( Theo BBC )"
    - "Các món phô_mai đút lò luôn có sức hấp_dẫn vì vừa ngậy vừa thơm , và phổ_biến nhất là pasta đút lò , nui đút lò ...\
      \ Tuy_nhiên , bạn cũng có_thể biến_tấu tô cơm nguội của mình thành chiếc bánh phô_mai đút lò ngon_lành , tiết tiệm mà_lại\
      \ dễ làm . Với khoảng 250 gram cơm nguội , bạn cần một quả trứng gà , một quả cà_chua , một_ít hành_tây , 30 gram hỗn_hợp\
      \ cà_rốt , bắp , đậu Hà_Lan - toàn những nguyên_liệu dễ tìm . Bên cạnh đó , phô_mai mozzarella là thứ không_thể thiếu\
      \ . \n Đầu_tiên , bạn cho trứng gà vào cơm . Bạn nên dùng cơm nấu hơi khô một_chút thì món ăn sẽ ngon hơn so với cơm\
      \ nấu nhão , mềm . Tiếp đến , bạn đổ cà_chua và hành_tây thái hạt lựu , rồi hỗn_hợp cà_rốt , bắp , đậu vào . Trộn đều\
      \ . Nêm một_chút muối vừa ăn , tiếp_tục trộn cho gia_vị thấm . Sau đó , bạn cho một_chút dầu ăn vào chảo nóng . Lưu_ý\
      \ , không nên dùng nhiều dầu ăn , dễ bị ngấy . Đổ cơm vào , ấn chặt xuống đáy chảo . Tráng một lớp mỏng ketchup hoặc\
      \ tương cà . Xếp đều giăm_bông hay xúc_xích tùy_ý . Cuối_cùng , bạn phủ một lớp phô_mai mozzarella bào sợi lên trên\
      \ cùng , đậy nắp , nấu trên lửa thật nhỏ , tránh bị cháy . \n Bạn nấu tới khi phô_mai tan chảy hết là xong món phô_mai\
      \ đút lò nhưng không cần lò nướng . Thời_gian nấu và chuẩn_bị chỉ tầm 30 phút là xong thố cơm như chiếc bánh phô_mai\
      \ lạ_miệng , nhưng cũng khá quen_thuộc vì hương_vị phần cơm ở giữa hơi giống cơm_chiên Dương_Châu . Hạt cơm mềm , lẫn\
      \ với đậu Hà_Lan , bắp ngọt , cà_rốt ... , có một_chút vị chua của cà , nước sốt ketchup , kèm thịt nguội và phô_mai\
      \ béo ngậy , thích_hợp cho cả người_lớn lẫn trẻ_em . \n Diệp_Tử"
