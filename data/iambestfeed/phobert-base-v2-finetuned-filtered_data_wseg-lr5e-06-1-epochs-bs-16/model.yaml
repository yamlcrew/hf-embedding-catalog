- source_sentence: Australia - Con rắn cây nâu được cho là nằm dưới gầm giường bé gái ở bang Queensland suốt đêm , cho đến
    khi được những người bắt rắn đưa đi . - VnExpress
  sentences:
  - "Nổi_tiếng về chăn_nuôi cừu trên thế_giới , quốc_gia này còn có số_lượng cừu lớn hơn gấp 4 lần dân_số . \n Trùm_Sò"
  - "Nhóm bắt rắn của Stuart McKenzie hôm 16 / 11 được gọi đến một gia_đình ở Queensland . Khi kéo ngăn_kéo chứa lego dưới\
    \ gầm giường , gia_đình đã phát_hiện con rắn màu nâu nằm ngay phía sau . \n McKenzie xác_định đây là rắn cây nâu và nó\
    \ có_thể đã ở dưới gầm giường suốt đêm khi bé gái say ngủ . Sau khi đưa con rắn ra khỏi căn nhà , McKenzie mang nó vào\
    \ bụi rậm và thả trở_lại tự_nhiên . \n \" Câu hỏi chưa được giải_đáp là con rắn đã ở dưới đó trong bao_lâu . Đây là rắn\
    \ cây nâu nên chúng_tôi cho rằng nó đã xuất_hiện từ đêm qua , vì loài này sống về đêm . Khả_năng cao là cô bé đã ngủ khi\
    \ có rắn trong phòng \" , McKenzie giải_thích trên Facebook . \n Video bắt rắn được đăng lên Facebook và nhận được hơn\
    \ 1.000 bình_luận . McKenzie giải_thích rắn cây nâu thường bị nhầm với rắn nâu phương đông nguy_hiểm hơn nhiều và được\
    \ coi là loài rắn_độc thứ hai trên Trái_Đất . \n Rắn nâu cây có nọc_độc nhưng ít gây chết người hơn rắn nâu phương đông\
    \ , vốn là nguyên_nhân gây ra nhiều ca tử_vong ở Australia hơn bất_kỳ loài rắn nào khác . Không có trường_hợp người_lớn\
    \ tử_vong do rắn cây nâu , nhưng Cục Khảo_sát Địa_chất Mỹ ( USGS ) cho biết trẻ_em có_thể phản_ứng bất_lợi với vết cắn\
    \ của loài bò_sát này . \n Rắn cây nâu gây ra nhiều vấn_đề đối_với hệ sinh_thái hơn là đối_với con_người . Loài bò_sát\
    \ này có nguồn_gốc từ các vùng của Indonesia , quần_đảo Solomon , New_Guinea và Australia , nhưng đang lan rộng sang các\
    \ khu_vực khác . Phạm_vi địa_lý của rắn cây nâu đã mở_rộng đến Guam , Saipan và các đảo ở tây Thái_Bình_Dương . \n Con\
    \ rắn cây nâu đầu_tiên được phát_hiện ở Gaum những năm 1950 . Đến đầu những năm 2020 , số_lượng loài đã tăng từ 4.000\
    \ đến 10.000 con / 2,5 km2 trên toàn_bộ hòn đảo . \n Khi loài bò_sát di_cư đến môi_trường sống mới , chúng sẽ tiêu_diệt\
    \ các quần_thể động_vật có xương_sống nhỏ tại địa_phương . Nó có_thể ăn lượng thức_ăn bằng 70 % khối_lượng cơ_thể của\
    \ mình mỗi ngày . Rắn cây nâu nhỏ ăn các loài chim nhỏ , động_vật lưỡng cư , thằn_lằn và các loài bò_sát khác . Những\
    \ con lớn sẽ săn các loài chim lớn , thằn_lằn lớn hơn và động_vật có vú nhỏ . \n Huyền_Lê ( Theo Newsweek )"
