- source_sentence: Địa_chất , thủy_văn của Thành_phố Hồ_Chí_Minh
  sentences:
  - "Địa_chất Thành_phố Hồ_Chí Minh bao_gồm chủ_yếu là hai tướng trầm_tích Pleistocen và Holocen lộ ra trên bề_mặt . Trầm_tích\
    \ Pleistocen chiếm hầu_hết phần phía Bắc , Tây_Bắc và Đông_Bắc thành_phố . Dưới tác_động của các yếu_tố tự_nhiên và hoạt_động\
    \ của con_người , trầm_tích phù_sa cổ hình_thành nhóm đất đặc_trưng riêng : đất xám . Với hơn 45 ngàn hecta , tức khoảng\
    \ 23,4 % diện_tích thành_phố , đất xám ở Thành_phố Hồ_Chí_Minh có ba loại : đất xám cao , đất xám có tầng loang_lổ đỏ\
    \ vàng và hiếm hơn là đất xám gley . Trầm_tích Holocen ở Thành_phố Hồ_Chí_Minh có nhiều nguồn_gốc : biển , vũng vịnh ,\
    \ sông biển , bãi bồi ... hình_thành nhiều loại đất khác nhau : nhóm đất phù_sa biển với 15.100 ha , nhóm đất phèn với\
    \ 40.800 ha và đất phèn mặn với 45.500 ha . Ngoài_ra còn có một diện_tích khoảng hơn 400 ha là \" giồng \" cát gần biển\
    \ và đất feralite vàng nâu bị xói_mòn trơ sỏi đá ở vùng đồi gò . ( ) \n Về thủy_văn , nằm ở vùng hạ_lưu hệ_thống sông\
    \ Đồng_Nai – Sài_Gòn , Thành_phố Hồ_Chí_Minh có mạng_lưới sông_ngòi , kênh_rạch rất đa_dạng . Sông Đồng_Nai bắt_nguồn\
    \ từ cao_nguyên Lâm_Viên , hợp_lưu bởi nhiều sông khác , có lưu_vực lớn , khoảng 45.000 km² . Với lưu_lượng bình_quân\
    \ 20 – 500 m³ / s , hàng năm cung_cấp 15 tỷ m³ nước , sông Đồng_Nai trở_thành nguồn nước_ngọt chính của thành_phố . Sông\
    \ Sài_Gòn bắt_nguồn từ vùng Hớn_Quản , chảy qua Thủ_Dầu Một đến Thành_phố Hồ_Chí_Minh , với chiều dài 200 km và chảy dọc\
    \ trên địa_phận thành_phố dài 80 km . Sông Sài_Gòn có lưu_lượng trung_bình vào_khoảng 54 m³ / s , bề rộng tại thành_phố\
    \ khoảng 225 m đến 370 m , độ sâu tới 20 m . Nhờ hệ_thống kênh Rạch_Chiếc , hai con sông Đồng_Nai và Sài_Gòn nối thông\
    \ ở phần nội_thành mở_rộng . Một con sông nữa của Thành_phố Hồ_Chí_Minh là sông Nhà_Bè , hình_thành ở nơi hợp_lưu hai\
    \ sông Đồng_Nai và Sài_Gòn , chảy ra biển Đông bởi hai ngả chính Soài_Rạp và Gành_Rái . Trong đó , ngả Gành Rái chính\
    \ là đường thủy_chính cho tàu ra vào bến cảng Sài_Gòn . Ngoài các con sông chính , Thành_phố Hồ_Chí_Minh còn có một hệ_thống\
    \ kênh_rạch chằng_chịt : Láng_The , Bàu_Nông , rạch Tra , Bến_Cát , An_Hạ , Tham_Lương , Cầu_Bông , Nhiêu_Lộc – Thị_Nghè\
    \ , Bến_Nghé , Tàu_Hủ , Kênh_Tẻ , Kênh Đôi ... Hệ_thống sông , kênh_rạch giúp Thành_phố Hồ_Chí_Minh trong việc tưới_tiêu\
    \ , nhưng do chịu ảnh_hưởng dao_động triều bán nhật của biển Đông , thủy_triều thâm_nhập sâu đã gây nên những tác_động\
    \ xấu tới sản_xuất nông_nghiệp và hạn_chế việc tiêu_thoát nước ở khu_vực nội_thành . ( ) \n Nhờ trầm_tích Pleistocen ,\
    \ khu_vực phía bắc Thành_phố Hồ_Chí_Minh có được lượng nước_ngầm khá phong_phú . Nhưng về phía nam , trên trầm_tích Holocen\
    \ , nước_ngầm thường bị nhiễm phèn , nhiễm mặn . Khu_vực nội_thành cũ có lượng nước_ngầm đáng_kể , tuy chất_lượng không\
    \ thực_sự tốt , vẫn được khai_thác chủ_yếu ở ba tầng : 0 – 20 m , 60 – 90 m và 170 – 200 m ( tầng trầm_tích Miocen ) .\
    \ Tại Quận 12 , huyện Hóc_Môn và huyện Củ_Chi , chất_lượng nước tốt , trữ_lượng dồi_dào , thường được khai_thác ở tầng\
    \ 60 – 90 m , trở_thành nguồn nước bổ_sung quan_trọng . ("
  - "Campuchia ( , ) , tên chính_thức là Vương_quốc Campuchia ( , ) , còn có tên gọi khác là Khao Mên hoặc Cao_Mên ( sau khi\
    \ cải_cách chữ_viết , trong các văn_bản người Việt_ghi thành Cao_Miên ) và Cam_Bốt ( bắt_nguồn từ tên tiếng Pháp Cambodge\
    \ ) , ( Đặng_Thái_Minh , \" Dictionnaire vietnamien - français . Les mots vietnamiens d ' origine française \" , Synergies\
    \ Pays riverains du Mékong , n ° spécial , năm 2011 . ISSN : 2107 - 6758 . Trang 78 . ) là một quốc_gia độc_lập có chủ_quyền\
    \ nằm trên bán_đảo Đông_Dương ở vùng Đông_Nam_Á . Campuchia giáp với vịnh Thái_Lan ở phía Tây_Nam , Thái_Lan ở phía Tây_Bắc\
    \ , Lào ở phía Đông_Bắc và Việt_Nam ở phía Đông , thuộc vùng Viễn_Đông . \n Campuchia có dân_số hơn 17 triệu người ( 2024\
    \ ) . ( ) Phật_giáo là quốc_giáo chính_thức và được hơn 97 % dân_số thực_hành . ( Cambodia . CIA World FactBook . ) Các\
    \ nhóm dân_tộc_thiểu_số của Campuchia bao_gồm người Việt , người Hoa , người Chăm và 30 bộ_tộc trên đồi núi . ( ) Thủ_đô\
    \ và thành_phố lớn nhất là Phnôm_Pênh , là trung_tâm chính_trị , kinh_tế và văn_hóa của Campuchia . Campuchia theo chế_độ\
    \ quân_chủ lập_hiến theo hình_thức tuyển_cử , đứng đầu là quốc_vương , hiện là Norodom_Sihamoni , được Hội_đồng Tôn_vương\
    \ lựa_chọn làm nguyên_thủ quốc_gia . Người đứng đầu chính_phủ là Thủ_tướng Hun_Manet . \n Năm 802 , Jayavarman II tự_xưng\
    \ là vua , thống_nhất các hoàng_tử Khmer đang tham_chiến ở Chân_Lạp với tên gọi \" Kambuja \" . ( Chandler , David_P.\
    \ ( 1992 ) History of Cambodia . Boulder , CO : Westview_Press , . ) Jayavarman II đã tuyên_bố độc_lập khỏi Java ở vùng\
    \ núi Kulen . Điều này đánh_dấu sự khởi_đầu của Đế_chế Khmer , phát_triển mạnh_mẽ trong hơn 600 năm , cho phép các vị\
    \ vua kế_tiếp kiểm_soát và gây ảnh_hưởng trên phần_lớn Đông_Nam_Á , đồng_thời tích_lũy quyền_lực và tài_sản khổng_lồ .\
    \ Vương_quốc Ấn_Độ_Dương đã tạo điều_kiện cho việc truyền_bá Ấn_Độ giáo đầu_tiên và sau đó là Phật_giáo đến phần_lớn Đông_Nam_Á\
    \ và thực_hiện nhiều dự_án cơ_sở hạ_tầng tôn_giáo khắp khu_vực , bao_gồm việc xây_dựng hơn 1000 ngôi đền và di_tích chỉ\
    \ riêng ở Angkor . Angkor Wat là công_trình nổi_tiếng nhất trong số những công_trình kiến_trúc này và được công_nhận là\
    \ Di_sản Thế_giới . \n Vào thế_kỷ XV , sau cuộc nổi_dậy của Ayutthaya , nơi trước đây thuộc quyền cai_trị của Đế_chế Khmer\
    \ , Campuchia đã trải qua sự suy_giảm quyền_lực . Campuchia phải đối_mặt với 2 nước láng_giềng ngày_càng hùng_mạnh , Ayutthaya\
    \ của Thái_Lan và triều Nguyễn của Việt_Nam , và đánh_dấu sự đi xuống của số_phận Campuchia . Năm 1863 , Campuchia trở_thành\
    \ 1 quốc_gia_bảo_hộ của Pháp , và sau đó được hợp_nhất thành Đông_Dương thuộc Pháp . \n Campuchia giành độc_lập từ Pháp\
    \ năm 1953 . Chiến_tranh Việt_Nam kéo_dài sang cả nước này vào năm 1965 với việc mở_rộng Đường_mòn Hồ_Chí_Minh và thành_lập\
    \ Đường_mòn Sihanouk . Điều này dẫn đến việc Mỹ ném bom Campuchia từ năm 1969 đến năm 1973 . Sau cuộc đảo_chính Campuchia\
    \ năm 1970 , thành_lập Cộng_hòa Khmer cánh hữu thân Mỹ , Quốc_vương bị phế_truất Sihanouk đã ủng_hộ kẻ_thù cũ của mình\
    \ , Khmer Đỏ . Với sự ủng_hộ của chế_độ quân_chủ và Bắc Việt_Nam , Khmer Đỏ nổi lên thành một cường_quốc , chiếm Phnôm\
    \ Pênh vào năm 1975 . Khmer Đỏ sau đó đã thực_hiện chế_độ diệt chủng Campuchia từ năm 1975 đến năm 1979 , khi họ bị Việt_Nam\
    \ lật_đổ và Cộng_hòa Nhân_dân Campuchia do Việt_Nam hậu_thuẫn , được Liên_Xô hỗ_trợ , trong Chiến_tranh Campuchia - Việt_Nam\
    \ . \n Sau Hiệp_định Hòa_bình Paris năm 1991 , Campuchia được 1 phái bộ của Liên_Hợp_Quốc điều_hành trong mọt thời_gian\
    \ ngắn ( 1992 - 1993 ) . Liên_Hợp_Quốc rút_lui sau khi tổ_chức bầu_cử , trong đó khoảng 90 % cử_tri đã đăng_ký bỏ_phiếu\
    \ . Cuộc_chiến giữa các phe_phái năm 1997 dẫn đến việc lật_đổ chính_phủ của Thủ_tướng Hun_Sen và Đảng Nhân_dân Campuchia\
    \ . \n Campuchia là thành_viên của Liên_Hợp_Quốc từ năm 1955 , ASEAN , Hội_nghị cấp cao Đông_Á , WTO , Phong_trào Không\
    \ liên_kết và La_Francophonie . Theo một_số tổ_chức nước_ngoài , đất_nước này có tình_trạng nghèo_đói phổ_biến , ( ) tham_nhũng\
    \ tràn_lan , ( ) thiếu tự_do chính_trị , ( ) chỉ_số phát_triển con_người ( HDI ) ở mức thấp ( ) và tỷ_lệ đói_nghèo cao\
    \ . ( Welthungerhilfe , IFPRI , and Concern Worldwide : 2013 Global Hunger_Index – The_challenge of hunger : Building\
    \ Resilience to Achieve Food and Nutrition_Security . Bonn , Washington D. C. , Dublin . October 2013 . ) ( ) ( ) Giám_đốc\
    \ Đông_Nam_Á của Tổ_chức Theo_dõi Nhân_quyền , David_Roberts , mô_tả Campuchia là một \" liên_minh tương_đối độc_tài thông_qua\
    \ một nền dân_chủ ở bề_ngoài \" . ( ( section XI , \" Recreating Elite_Stability , July 1997 to July 1998 \" ) ) Về mặt\
    \ hiến_pháp là một nền dân_chủ tự_do đa đảng , ( ) nhưng trên thực_tế quốc_gia này được quản_lý theo chế_độ độc đảng kể\
    \ từ năm 2018 . ( ) ( ) \n Trong khi thu_nhập bình_quân đầu người vẫn ở mức thấp so với hầu_hết các nước láng_giềng ,\
    \ Campuchia là một trong những nền kinh_tế đang phát_triển có tốc_độ tăng_trưởng nhanh nhất ở châu Á , với mức tăng_trưởng\
    \ trung_bình 7,6 % trong thập_kỷ qua . Nông_nghiệp vẫn là ngành kinh_tế chủ_đạo , với sự tăng_trưởng mạnh_mẽ của dệt may\
    \ , xây_dựng và du_lịch dẫn đến đầu_tư nước_ngoài và thương_mại quốc_tế tăng . ( ) Liên_Hợp_Quốc xếp Campuchia vào nhóm\
    \ các quốc_gia kém phát_triển nhất trên thế_giới . Chỉ_số Nhà_nước về Pháp_quyền năm 2015 của Dự_án Tư_pháp Thế_giới (\
    \ Hoa_Kỳ ) xếp Campuchia thứ 125 trên 126 quốc_gia , thấp hơn nhiều so với các quốc_gia khác trong khu_vực . ( )"
  - "Sau khi Pháp thua trận Điện_Biên_Phủ ( 1954 ) và ký Hiệp_định Genève , Quốc_gia Việt_Nam cùng Pháp tập_kết về vùng phía\
    \ Nam vĩ_tuyến 17 của Việt_Nam . \n Theo kế_hoạch , quân Pháp sẽ rút dần sau 2 năm và Việt_Nam sẽ tiến_hành Tổng_tuyển_cử\
    \ thống_nhất đất_nước . Tuy_nhiên , báo_cáo của CIA cho Tổng_thống Mỹ Dwight Eisenhower thấy rằng khoảng 80 % dân_số Việt_Nam\
    \ sẽ bầu cho Hồ_Chí_Minh nếu cuộc tổng_tuyển_cử được thi_hành ( Dwight D._Eisenhower , Mandate for Change , 1953 - 56\
    \ ( Garden City , NY : Doubleday & Compnay , Inc . , 1963 ) , tr . 372 . ) . Không_thể chấp_nhận việc Hồ_Chí_Minh sẽ thắng_cử\
    \ và lập chính_phủ trên toàn_bộ lãnh_thổ Việt_Nam , Hoa_Kỳ đã hậu_thuẫn Quốc_gia Việt_Nam để cuộc tuyển_cử không_thể diễn\
    \ ra nhằm chia_cắt Việt_Nam vĩnh_viễn thành 2 quốc_gia . Hoa_Kỳ muốn có một chính_phủ chống Cộng tồn_tại ở miền Nam Việt_Nam\
    \ , bất_kể chính_phủ đó có tôn_trọng dân_chủ hay không ( Cecil B. Currey . Chiến_thắng bằng mọi giá . Nhà xuất_bản Thế_giới\
    \ , trang 333 . ) . \n Năm 1954 , đội bán quân_sự của Mỹ do tướng Edward_Lansdale ( sĩ_quan cao_cấp của Tình_báo Mỹ và\
    \ đã làm cố_vấn cho Pháp tại Việt_Nam từ 1953 ) đã huấn_luyện các lực_lượng vũ_trang của Quốc_gia Việt_Nam ; xây_dựng\
    \ các cơ_sở hạ_tầng phục_vụ quân_sự tại Philippines ; bí_mật đưa một lượng lớn vũ_khí và thiết_bị quân_sự vào Việt_Nam\
    \ ; giúp_đỡ phát_triển các kế_hoạch \" bình định Việt_Minh và các vùng chống_đối \" ( Trích tại The_CIA : A_Forgotten\
    \ History ; All other actions : The_Pentagon Papers , Document_No . 15 : ' Lansdale Team ' s Report on Covert Saigon_Mission\
    \ in ' 54 and ' 55 , ' pp . 53 - 66 . ) . Ngày 13 - 12 - 1954 , Mỹ và Pháp ký_kết văn_kiện cho phép các cố_vấn quân_sự\
    \ Mỹ thay_thế dần cho sĩ_quan Pháp tham_gia huấn_luyện quân_đội Quốc_gia Việt_Nam ở miền Nam Việt_Nam . Tháng 1 năm 1955\
    \ , Mỹ chính_thức viện_trợ quân_sự trực_tiếp cho Quốc_gia Việt_Nam . Thượng_nghị_sĩ ( 4 năm sau trở_thành Tổng_thống )\
    \ John F._Kennedy tuyên_bố vào ngày 1 tháng 6 năm 1956 : \n : \" Nếu chúng_ta không phải là cha_mẹ của nước Việt_Nam bé_nhỏ\
    \ [ chỉ Việt_Nam_Cộng_hòa ] thì chắc_chắn chúng_ta cũng là cha_mẹ đỡ_đầu của nó . Chúng_ta là chủ tọa khi nó ra_đời ,\
    \ chúng_ta viện_trợ để nó sống , chúng_ta giúp định_hình tương_lai của nó ( ... ) . Đó là con_đẻ của chúng_ta - chúng_ta\
    \ không_thể bỏ_rơi nó , chúng_ta không_thể không biết tới những nhu_cầu của nó \" ( ) \n Trong những năm 1954 – 1956 ,\
    \ Mỹ đã bỏ ra 414 triệu USD giúp trang_bị cho các lực_lượng thường_trực Quốc_gia Việt_Nam , gồm 170.000 quân và lực_lượng\
    \ cảnh_sát 75.000 quân ; 80 % ngân_sách quân_sự của Quốc_gia Việt_Nam là do Mỹ_viện_trợ . Từ năm 1955 đến 1960 , có tất_cả\
    \ 800 chuyến tàu chở vũ_khí và phương_tiện quân_sự của Mỹ vào miền Nam Việt_Nam . Số viện_trợ này giúp Quốc_gia Việt_Nam\
    \ đủ sức duy_trì bộ_máy hành_chính và quân_đội khi không còn viện_trợ của Pháp . Quân_đội Quốc_gia Việt_Nam dần thay_thế_chiến_thuật\
    \ và vũ_khí của Pháp bằng của Mỹ . \n Đến lúc này lại xảy ra mâu_thuẫn giữa Thủ_tướng Ngô_Đình Diệm với Quốc_trưởng Bảo_Đại\
    \ ( nguyên là Hoàng đế nhà Nguyễn ) . Năm 1955 , với kết_quả cuộc trưng_cầu dân_ý gian_lận ( mà các tài_liệu ngày_nay\
    \ của Chính_phủ Việt_Nam thường gọi là \" trò_hề trưng_cầu dân_ý \" ( ) ) , Thủ_tướng Ngô_Đình Diệm đã phế_truất Quốc_trưởng\
    \ Bảo_Đại , lên làm Tổng_thống đầu_tiên của chính_phủ Việt_Nam_Cộng_hòa . ( ) Sau đó , Quốc_gia Việt_Nam tổ_chức bầu_cử\
    \ Quốc_hội Lập_hiến . Quốc_hội này ban_hành Hiến_pháp thành_lập Việt_Nam_Cộng_hòa trên cơ_sở kế_thừa Quốc_gia Việt_Nam\
    \ , thủ_đô là thành_phố Sài_Gòn , ngày ban_hành Hiến_pháp 26 tháng 10 trở_thành ngày Quốc_khánh của Đệ Nhất Cộng_hòa .\
    \ Việt_Nam_Cộng_hòa theo thể_chế chính_trị đa đảng , kinh_tế tư_bản chủ_nghĩa và được Mỹ giúp_đỡ , bảo_vệ để chống lại\
    \ Việt_Nam Dân_chủ Cộng_hòa và Mặt_trận Dân_tộc Giải_phóng miền Nam Việt_Nam tại miền Nam . \n Dưới thời Tổng_thống Ngô_Đình_Diệm\
    \ , ông đề ra chủ_nghĩa \" Cần lao Nhân vị \" , duy_trì tình_trạng đối_lập với Việt_Nam Dân_chủ Cộng_hòa . Trong khoảng\
    \ 5 năm , Việt_Nam_Cộng_hòa đã có một_số thành_tựu : xã_hội ổn_định , kinh_tế phát_triển , định_cư gần 1 triệu dân di_cư\
    \ từ miền Bắc , thành_lập Viện Đại_học Huế ... \n Tuy_nhiên , chính_quyền Tổng_thống Ngô_Đình Diệm bị giới đối_lập xem\
    \ là chính_phủ độc_tài gia_đình_trị , dần_dần tích_lũy nhiều mâu_thuẫn nội_bộ . Từ năm 1955 và đặc_biệt là từ 1959 , cùng\
    \ với sự hậu_thuẫn của Hoa_Kỳ ( do lo_ngại ảnh_hưởng của phong_trào Việt_Minh ) , chính_quyền Ngô_Đình Diệm thực_hiện\
    \ chính_sách đàn_áp những người cộng_sản , tố_cộng diệt cộng trên toàn_bộ Nam Việt_Nam , dựa theo Luật 10 - 59 ( đạo_luật\
    \ quy_định việc thiết_lập các phiên_tòa quân_sự đặc_biệt để xét_xử những phạm_nhân bị tình_nghi là ủng_hộ Việt_Minh và\
    \ chủ_nghĩa cộng_sản ) . ( Luther A. Allen and Pham_Ngoc_An , A_Vietnamese District Chief in Action , Saigon : Michigan\
    \ State University Vietnam Advisory_Group ( 1961 ) , pp . 69 - 71 . Bản download ) Phong_trào Đồng_khởi năm 1960 ( do\
    \ Đảng Lao_động Việt_Nam lãnh_đạo ) và cuộc đảo_chính hụt năm 1960 là những đòn giáng mạnh vào chế_độ Ngô_Đình Diệm .\
    \ \n Mâu_thuẫn tôn_giáo cũng trở_nên gay_gắt . Sự_kiện Phật Đản năm 1963 , việc cấm treo cờ Phật_giáo ở Huế đã gây ra\
    \ phản_ứng mạnh_mẽ từ các Phật_tử , dẫn đến các hoạt_động đàn_áp Phật_giáo của chính_quyền . Việc Thượng_tọa Thích Quảng_Đức\
    \ tự_thiêu giữa đường_phố Sài_Gòn cùng những phát_biểu của bà Ngô_Đình Nhu ( tức Dân biểu Trần_Lệ_Xuân ) làm chế_độ Ngô_Đình\
    \ Diệm bị báo_chí phương Tây đả_kích kịch_liệt và mất hết mọi sự ủng_hộ từ phương Tây . \n Ngày 1 tháng 11 năm 1963 ,\
    \ nền Đệ Nhất Cộng_hòa bị lật_đổ bởi một nhóm quân_nhân dưới sự chỉ_huy của một_số tướng_lĩnh ( trong đó có tướng Dương\
    \ Văn_Minh ) ; về sau , ngày này được xem là ngày Quốc_khánh của Đệ Nhị_Cộng_hòa Việt_Nam . Cả ba anh_em Ngô_Đình_Diệm\
    \ , Ngô_Đình Nhu và Ngô_Đình_Cẩn đều bị giết . Theo băng ghi_âm tại Nhà_Trắng , tổng_thống Kennedy nói rằng ông bàng_hoàng\
    \ về cái chết của 2 anh_em Diệm và Nhu , cái chết của hai người thật là kinh_khủng . ( ) \n Theo như hồi_ký của Bộ_trưởng\
    \ Quốc_phòng Mỹ Robert McNamara , chính CIA đã hỗ_trợ cho việc lật_đổ và sau_này McNamara xem đó là một sai_lầm nghiêm_trọng\
    \ mà Hoa_Kỳ mắc phải ( Nhìn lại quá_khứ - Tấn thảm_kịch và những bài_học về Việt_Nam , Robert S. McNamara , Chính_trị\
    \ Quốc_gia , 1995 . ) . Khi được thông_báo anh_em Ngô_Đình Diệm đã bị giết , Đại_sứ Hoa_Kỳ Cabot_Lodge , đã vui_vẻ thốt\
    \ lên bằng tiếng Pháp : \" C ' est formidable ! C ' est formidable ! \" ( Thật là tuyệt_diệu . Thật là tuyệt_diệu ) .\
    \ ( Trần_Văn_Đôn , 1989 , tr 227,228 . ) \n Kể từ đây , sự phụ_thuộc của Việt_Nam_Cộng_hòa vào viện_trợ của Hoa_Kỳ ngày_càng\
    \ lớn , cả về tài_chính cũng như về quân_sự . Sự can_thiệp của Tòa đại_sứ Mỹ vào công_việc nội_bộ về chính_trị và quân_sự\
    \ của Việt_Nam_Cộng_hòa ngày_càng lên cao ."
- source_sentence: Hành_pháp của Việt_Nam_Cộng_hòa
  sentences:
  - "Bắt_đầu_từ tháng 8 năm 1964 , Việt_Nam Dân_chủ Cộng_hòa đã phải đối_phó với chiến_tranh trên không rất ác_liệt của Không_quân\
    \ và Hải_quân Mỹ . Đầu_tiên là chiến_dịch Mũi_Tên Xuyên ( Pierce_Arrow ) ngày 5 tháng 8 năm 1964 , hành_động trả_đũa sự_kiện\
    \ Vịnh Bắc_Bộ ( Ellsberg , Daniel , Secrets : A_Memoir of Vietnam and the Pentagon_Papers , New_York : Viking , 2002 )\
    \ do máy_bay của Hải_quân Mỹ thực_hiện , đánh_phá các căn_cứ hải_quân của Việt_Nam Dân_chủ Cộng_hòa ở Lạch_Trường ( Thanh_Hóa\
    \ ) , Bãi Cháy ( Hòn_Gai ) . \n Tại Bãi Cháy , bộ_đội cao_xạ phòng không đã chủ_động đánh trước khi máy_bay Mỹ oanh kích\
    \ . 2 máy_bay Mỹ loại A - 4 Skyhawk bị bắn rơi . Phi_công Mỹ Everett Alvarez nhảy_dù xuống biển đã bị dân chài bắt sống\
    \ , trở_thành người tù_binh Mỹ đầu_tiên trong Chiến_tranh Việt_Nam . ( Viên phi_công Mỹ bị bắn rơi đầu_tiên ở miền Bắc\
    \ , VietNamNet ) Tiếp đến là Chiến_dịch Sấm Rền đầu năm 1965 đánh_phá các tỉnh từ Thanh_Hóa_trở vào , sau đó chiến_tranh\
    \ không_quân lan rộng ra toàn miền Bắc Việt_Nam . Để đề_phòng các phản_ứng của quốc_tế , Không_quân Mỹ chỉ chừa lại nội_thành\
    \ hai thành_phố Hà_Nội và Hải_Phòng . Chiến_tranh không_quân nhắm vào hệ_thống đường_sá giao_thông và các mục_tiêu công_nghiệp\
    \ , quân_sự . Thậm_chí các trạm biến_thế điện nhỏ , các nhánh đường_sắt phụ cũng bị đánh . Bị đánh_phá nặng nhất_là tại\
    \ khu_vực hai tỉnh Hà_Tĩnh , Quảng_Bình , là cuống_họng tiếp_tế vào Nam và tại khu_vực Vĩnh_Linh giáp sông Bến_Hải - nơi\
    \ dân_chúng phải sống trong địa_đạo . \n Tháng 4 năm 1965 , Chính_phủ Việt_Nam Dân_chủ Cộng_hòa ký hiệp_định với Trung_Quốc\
    \ đưa một bộ_phận quân_đội Trung_Quốc vào miền Bắc Việt_Nam đóng ở một_số vị_trí quan_trọng như tỉnh Quảng_Ninh , Thái_Nguyên\
    \ và dọc đường Quốc_lộ 1 , nhưng không được vượt quá phía nam Hà_Nội ( North Vietnam and People ’ s Republic of China\
    \ sign aid agreement , www . history . com ) . Sau đó một số_lượng đáng_kể nhân_viên quân_sự Trung_Quốc được gửi sang\
    \ miền Bắc , bắt_đầu_từ tháng 6 năm 1965 . Tổng_số quân Trung_Quốc đã có_mặt tại miền Bắc từ tháng 6 - 1965 đến tháng\
    \ 3 - 1973 là gần 320.000 người trong đó có khoảng 1000 binh_sĩ tử_trận . Tại thời_điểm đông nhất có khoảng 130.000 người\
    \ , bao_gồm các đơn_vị tên_lửa đất đối không , pháo phòng_không , các đơn_vị công_binh làm đường , dò mìn và vận_tải .\
    \ ( Lực_lượng này không được phép tham_chiến mà chỉ để giúp Việt_Nam sửa_chữa cầu , đường bị bom Mỹ phá . Ông Lưu Đoàn_Huynh\
    \ , cố_vấn ngoại_giao Việt_Nam Dân_chủ Cộng_hòa , giải_thích quân Trung_Quốc sang Việt_Nam do lo_ngại việc Mỹ có_thể đưa\
    \ quân ra miền Bắc Việt_Nam . Ông Barry_Zorthian , phát_ngôn_viên sứ_quán Mỹ tại Sài_Gòn , cho biết Mỹ không mở_rộng chiến_tranh\
    \ ra miền Bắc Việt_Nam vì sợ Trung_Quốc sẽ tham_chiến . Apokalypse Vietnam ( phim tài_liệu ) , đạo_diễn Ulle_Schröder\
    \ , Sebastian_Dehnhardt , Ulrich_Brochhagen , Peer_Horstmann , Jürgen_Eike , Cộng_hòa Liên_bang Đức , 2005 ) Sách \" Sự_thật\
    \ quan_hệ Việt_Nam - Trung_Quốc \" thì khẳng_định mục_tiêu của Trung_Quốc \" thâm_hiểm \" hơn : đó là tạo tiếng tốt \"\
    \ viện_trợ Việt_Nam \" , tập_họp lực_lượng ở châu Á , châu Phi , châu Mỹ_Latinh , đẩy_mạnh chiến_dịch chống Liên_Xô ;\
    \ cũng là để gây khó_khăn cho việc vận_chuyển hàng viện_trợ khối xã_hội chủ_nghĩa quá_cảnh Trung_Quốc nhằm hạn_chế khả_năng\
    \ đánh lớn của nhân_dân Việt_Nam , qua đó khiến Việt_Nam buộc phải lệ_thuộc vào Trung_Quốc . Trung_Quốc ngoài_mặt muốn\
    \ giúp Việt_Nam tu_sửa thiệt_hại do không_quân Mỹ , nhưng năm 1968 họ lại khuyến_khích Mỹ tăng_cường ném bom miền bắc\
    \ Việt_Nam ( SỰ_THẬT VỀ QUAN_HỆ VIỆT NAM & TRUNG QUỐC TRONG 30 NĂM QUA. Nhà_Xuất_Bản Sự_Thật 1986 . PHẦN THỨ BA : TRUNG\
    \ QUỐC VỚI CUỘC ĐẤU_TRANH CỦA NHÂN_DÂN VIỆT NAM ĐỂ GIẢI PHÒNG MIỀN NAM , THỐNG_NHẤT NƯỚC_NHÀ ( 1954 - 1975 ) . II - THỜI_KỲ\
    \ 1965 - 1969 : LÀM YẾU VÀ KÉO DÀI CUỘC KHÁNG_CHIẾN CỦA NHÂN_DÂN VIỆT NAM ) . Bên cạnh đó , trong giai_đoạn đầu ( năm\
    \ 1965 ) còn có sự tham_chiến của các binh_lính , sĩ_quan tên_lửa Liên_Xô trực_tiếp tác_chiến đồng_thời huấn_luyện binh_sĩ\
    \ Việt_Nam nắm_bắt việc sử_dụng tên_lửa phòng không và đội đặc_nhiệm GRU thuộc Tổng_cục Tình_báo quân_sự , Bộ Tổng_tham_mưu\
    \ các lực_lượng vũ_trang Liên_Xô huấn_luyện lực_lượng đặc_nhiệm Việt_Nam và tham_gia thực_hiện các vụ đột_kích vào căn_cứ\
    \ quân_sự của đối_phương ( Tiết_lộ của đặc_nhiệm Liên_Xô tham_chiến ở Việt_Nam , Báo điện_tử Tiền_Phong , ngày 30 tháng\
    \ 7 năm 2013 ) . \n Cuộc_sống của người dân miền Bắc ngày_càng khó_khăn và căng_thẳng , ngay cả bộ_đội cũng bị thiếu ăn\
    \ . Ở thành_thị , dân_chúng tản_cư về nông_thôn để tránh bom , nhu yếu_phẩm cho thị dân được bán theo chế_độ tem phiếu\
    \ rất nghiêm_ngặt . Nông_thôn vắng bóng nam thanh_niên . Nữ thanh_niên vừa lao_động_sản_xuất vừa được điều_động tham_gia\
    \ vào lực_lượng dân_quân tự_vệ bảo_vệ trật_tự và tham_gia huấn_luyện quân_sự , bắn máy_bay . Chính_phủ huy_động hàng vạn\
    \ nữ thanh_niên đi Thanh_niên xung_phong vào tuyến lửa tại các tỉnh bị đánh_phá nặng_nề nhất như Nghệ_An , Hà_Tĩnh , Quảng_Bình\
    \ và vào tuyến đường Trường_Sơn , sang Lào để làm nhiệm_vụ hậu_cần , làm đường và đảm_bảo giao_thông . Tỷ_lệ thương_vong\
    \ khá lớn vì bom_đạn và bệnh_tật . \n Về xã_hội , chính_quyền địa_phương cố_gắng tạo điều_kiện cho thanh_niên lập gia_đình\
    \ trước khi nhập_ngũ . Nhà_nước tìm mọi cách nâng cao tinh_thần của dân_chúng cho kháng_chiến . Tất_cả mọi người đều tham_gia\
    \ các tổ_chức quần_chúng của Đảng Lao_động Việt_Nam . Các tổ_chức quần_chúng trên có vai_trò nhất_định trong việc giữ\
    \ vững tinh_thần và niềm tin trong dân_chúng và thi_hành các đường_lối chính_sách của Đảng trong dân . Những tin_tức ác_liệt\
    \ của chiến_trường , số thương_vong nặng_nề ở miền Nam và chết bom ở miền Bắc không được công_bố hoặc với số_lượng giảm\
    \ đi rất nhiều , chủ_yếu trên thông_tin báo đài là các tin chiến_thắng lẫy_lừng . Nhiều bài hát được các nhạc_sĩ sáng_tác\
    \ ca_ngợi mục_tiêu giải_phóng miền Nam , ca_ngợi người lính , cổ_vũ thanh_niên nhập_ngũ . ( Hồi_ký một thằng hèn , trang\
    \ 85 - 122 , Nhạc_sĩ Tô_Hải , Nhà xuất_bản Tiếng Quê_Hương , năm 2009 ) Nhân_dân miền Bắc được phổ_biến đời_sống kinh_tế\
    \ tại miền Nam rất bấp_bênh ( Hồ_Chí Minh toàn_tập ( tập 10 ) , trang 46 , Nhà xuất_bản Chính_trị Quốc_gia , năm 2000\
    \ . Trích : Việt_Nam_ta - Dưới chế_độ đen_tối của Mỹ - Diệm , tình_hình miền Nam tiêu_điều như thế_nào , bà_con ta đã\
    \ rõ . ở đây tôi chỉ nhắc lại một con_số do báo_chí Sài_Gòn nêu ra : \" Sài_Gòn có 1.219.000 người , trong đó 810.000\
    \ người không có lương cố_định \" , nghĩa_là thường_xuyên không có công ăn việc_làm , phải sống vất vơ_vất_vưởng . ) ,\
