  - source_sentence: Việt_Nam_hóa chiến_tranh của Chiến_tranh Việt_Nam
    sentences:
    - "Tiến_trình Việt_Nam_hóa chiến_tranh ban_đầu đã diễn ra tương_đối thuận_lợi . Quân_lực Việt_Nam_Cộng_hòa sau Mậu_Thân\
      \ được trang_bị hiện_đại đã tỏ ra tự_tin hơn và đã nắm thế chủ_động trên phần_lớn chiến_trường miền Nam từ năm 1969\
      \ đến tận cuối_năm 1971 . Nhưng điều đó chưa nói lên điều gì lớn vì Quân Giải_phóng trong thời_kỳ này vẫn chưa hồi_phục\
      \ sau Mậu_Thân và không chủ_trương đánh lớn . Cũng có_thể Quân Giải_phóng hạn_chế hoạt_động để việc rút quân của Mỹ\
      \ diễn ra nhanh hơn . \n Sự yên_tĩnh trên chiến_trường tạo điều_kiện thuận_lợi cho việc rút quân Mỹ mà không gây ra\
      \ một sự xấu đi trầm_trọng nào . Tranh_thủ thời_gian yên_tĩnh , Việt_Nam_Cộng_hòa đổ công_sức tiến_hành bình định nông_thôn\
      \ . Rút kinh_nghiệm từ năm 1968 , lãnh_đạo Mỹ và Việt_Nam_Cộng_hòa đã hiểu rõ tầm quan_trọng của việc chống lại cơ_cấu\
      \ đấu_tranh chính_trị của quân Giải_phóng ở vùng nông_thôn . Một chương_trình lớn tái_thiết nông_thôn được thi_hành\
      \ với viện_trợ kinh_tế lớn của Mỹ . Theo tuyên_bố của Mỹ , trong thời_kỳ này , chỉ riêng năm 1969 , khoảng 6.000 người\
      \ đã chết và 15.000 người bị_thương bởi hoạt_động của lực_lượng du_kích . Trong số những người thiệt_mạng có 90 quan_chức\
      \ xã và xã trưởng , 240 quan_chức ấp và ấp trưởng , 229 người tản_cư và 4.350 thường_dân . ) Với lý_do \" bảo_vệ dân_thường\
      \ chống lại những hoạt_động đe_dọa và khủng_bố của cộng_sản \" , Chiến_dịch Phượng_hoàng với sự giúp_đỡ của CIA , đã\
      \ được triển_khai nhằm tróc rễ các cơ_sở bí_mật nằm_vùng của Mặt_trận Dân_tộc Giải_phóng miền Nam Việt_Nam . ( Tính\
      \ tới năm 1972 , Mỹ tuyên_bố đã \" loại_bỏ \" 81.740 người ủng_hộ quân Giải_phóng , trong đó 26.000 tới 41.000 đã bị\
      \ giết . ) ( ) \n Các nỗ_lực của chiến_dịch Phượng_hoàng chủ_yếu diễn ra bằng các biện_pháp khủng_bố , ám_sát , thủ_tiêu\
      \ . Các toán nhân_viên Phượng_hoàng áo đen được tình_báo Mỹ huấn_luyện và được phái xuống các xóm ấp , họ ở cùng trong\
      \ dân nghe_ngóng thu_thập tình_báo , bắt các phần_tử nghi_ngờ là cộng_sản hoặc thân cộng_sản , tra_khảo để phanh ra\
      \ tổ_chức , nếu không khai_thác được và vẫn nghi là Cộng_sản thì thủ_tiêu . Những người cộng_sản hoặc thân cộng_sản\
      \ nếu không tiện bắt thì ám_sát . Số người bị thủ_tiêu lên đến hàng ngàn người . Trong ngắn_hạn , các biện_pháp này\
      \ đã có hiệu_quả tốt về an_ninh , tình_hình nông_thôn trở_nên an_toàn hơn rõ_rệt cho phía chính_quyền Việt_Nam_Cộng_hòa\
      \ . Tuy_nhiên về dài_hạn , những vụ xử_tử , ám_sát dân_thường lại khiến chính_quyền Việt_Nam_Cộng_hòa càng bị người\
      \ dân xa_lánh , khiến chương_trình bình định dần_dần bị chặn lại . \n Bên cạnh đấu_tranh vũ_trang , Mặt_trận dân_tộc\
      \ Giải_phóng còn phát_triển phong_trào chính_trị để chống lại chiến_lược Việt_Nam_hóa chiến_tranh của đối_phương . Mặt_trận\
