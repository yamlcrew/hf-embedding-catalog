      \ đất phèn với 40.800 ha và đất phèn mặn với 45.500 ha . Ngoài_ra còn có một diện_tích khoảng hơn 400 ha là \" giồng\
      \ \" cát gần biển và đất feralite vàng nâu bị xói_mòn trơ sỏi đá ở vùng đồi gò . ( ) \n Về thủy_văn , nằm ở vùng hạ_lưu\
