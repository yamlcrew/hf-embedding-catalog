- source_sentence: Việt_Nam_hóa chiến_tranh của Chiến_tranh Việt_Nam
  sentences:
  - "Tiến_trình Việt_Nam_hóa chiến_tranh ban_đầu đã diễn ra tương_đối thuận_lợi . Quân_lực Việt_Nam_Cộng_hòa sau Mậu_Thân\
    \ được trang_bị hiện_đại đã tỏ ra tự_tin hơn và đã nắm thế chủ_động trên phần_lớn chiến_trường miền Nam từ năm 1969 đến\
    \ tận cuối_năm 1971 . Nhưng điều đó chưa nói lên điều gì lớn vì Quân Giải_phóng trong thời_kỳ này vẫn chưa hồi_phục sau\
    \ Mậu_Thân và không chủ_trương đánh lớn . Cũng có_thể Quân Giải_phóng hạn_chế hoạt_động để việc rút quân của Mỹ diễn ra\
    \ nhanh hơn . \n Sự yên_tĩnh trên chiến_trường tạo điều_kiện thuận_lợi cho việc rút quân Mỹ mà không gây ra một sự xấu\
    \ đi trầm_trọng nào . Tranh_thủ thời_gian yên_tĩnh , Việt_Nam_Cộng_hòa đổ công_sức tiến_hành bình định nông_thôn . Rút\
    \ kinh_nghiệm từ năm 1968 , lãnh_đạo Mỹ và Việt_Nam_Cộng_hòa đã hiểu rõ tầm quan_trọng của việc chống lại cơ_cấu đấu_tranh\
    \ chính_trị của quân Giải_phóng ở vùng nông_thôn . Một chương_trình lớn tái_thiết nông_thôn được thi_hành với viện_trợ\
    \ kinh_tế lớn của Mỹ . Theo tuyên_bố của Mỹ , trong thời_kỳ này , chỉ riêng năm 1969 , khoảng 6.000 người đã chết và 15.000\
    \ người bị_thương bởi hoạt_động của lực_lượng du_kích . Trong số những người thiệt_mạng có 90 quan_chức xã và xã trưởng\
    \ , 240 quan_chức ấp và ấp trưởng , 229 người tản_cư và 4.350 thường_dân . ) Với lý_do \" bảo_vệ dân_thường chống lại\
    \ những hoạt_động đe_dọa và khủng_bố của cộng_sản \" , Chiến_dịch Phượng_hoàng với sự giúp_đỡ của CIA , đã được triển_khai\
    \ nhằm tróc rễ các cơ_sở bí_mật nằm_vùng của Mặt_trận Dân_tộc Giải_phóng miền Nam Việt_Nam . ( Tính tới năm 1972 , Mỹ\
    \ tuyên_bố đã \" loại_bỏ \" 81.740 người ủng_hộ quân Giải_phóng , trong đó 26.000 tới 41.000 đã bị giết . ) ( ) \n Các\
    \ nỗ_lực của chiến_dịch Phượng_hoàng chủ_yếu diễn ra bằng các biện_pháp khủng_bố , ám_sát , thủ_tiêu . Các toán nhân_viên\
    \ Phượng_hoàng áo đen được tình_báo Mỹ huấn_luyện và được phái xuống các xóm ấp , họ ở cùng trong dân nghe_ngóng thu_thập\
    \ tình_báo , bắt các phần_tử nghi_ngờ là cộng_sản hoặc thân cộng_sản , tra_khảo để phanh ra tổ_chức , nếu không khai_thác\
    \ được và vẫn nghi là Cộng_sản thì thủ_tiêu . Những người cộng_sản hoặc thân cộng_sản nếu không tiện bắt thì ám_sát .\
    \ Số người bị thủ_tiêu lên đến hàng ngàn người . Trong ngắn_hạn , các biện_pháp này đã có hiệu_quả tốt về an_ninh , tình_hình\
    \ nông_thôn trở_nên an_toàn hơn rõ_rệt cho phía chính_quyền Việt_Nam_Cộng_hòa . Tuy_nhiên về dài_hạn , những vụ xử_tử\
    \ , ám_sát dân_thường lại khiến chính_quyền Việt_Nam_Cộng_hòa càng bị người dân xa_lánh , khiến chương_trình bình định\
    \ dần_dần bị chặn lại . \n Bên cạnh đấu_tranh vũ_trang , Mặt_trận dân_tộc Giải_phóng còn phát_triển phong_trào chính_trị\
    \ để chống lại chiến_lược Việt_Nam_hóa chiến_tranh của đối_phương . Mặt_trận nhận_thức rằng \" hòa bình là vấn_đề sống_còn\
    \ , là nguyện_vọng tha_thiết nhất của mọi tầng_lớp nhân_dân từ thành_thị đến nông_thôn \" nên xem \" hòa bình là một khẩu_hiệu\
    \ tiến_công cách_mạng , gắn liền với những mục_tiêu cơ_bản trước_mắt của cách_mạng miền Nam ... gắn liền với khẩu_hiệu\
    \ độc_lập dân_tộc , chĩa mũi_nhọn vào kẻ_thù chính là đế_quốc Mỹ và bè_lũ tay_sai \" . Ngoài_ra \" Hòa_bình còn gắn liền\
    \ với khẩu_hiệu đòi tự_do , dân_chủ nhằm chống lại mọi chính_sách độc_tài phát_xít , buộc ngụy_quyền phải bảo_đảm các\
    \ quyền tự_do , dân_chủ cho nhân_dân ... Hòa_bình , độc_lập , dân_chủ còn gắn liền với khẩu_hiệu hòa hợp dân_tộc ... tập_hợp\
    \ các lực_lượng dân_tộc , dân_chủ và hòa_bình nhằm mở_rộng hơn nữa Mặt_trận của ta , phân_hóa các thế_lực phản_động ,\
    \ cô_lập bọn tay_sai ngoan_cố nhất , hiếu_chiến nhất , đại_biểu quyền_lực cho giai_cấp phong_kiến , tư_sản mại_bản , quan_liêu\
    \ , quân_phiệt ... Đảng_ta nêu cao ngọn cờ cứu nước , ngọn cờ hòa hợp dân_tộc là để cô_lập Mỹ và tay_sai , đoàn_kết toàn\
    \ dân rộng_rãi nhất , đánh_đuổi bọn cướp nước , trừng_trị bọn bán_nước , nhằm hoàn_thành cách_mạng dân_tộc dân_chủ_nhân_dân\
    \ ở miền Nam , đưa cả nước tiến lên chủ_nghĩa xã_hội . Hòa_hợp dân_tộc là một chính_sách lớn thể_hiện lập_trường giai_cấp\
    \ đúng_đắn của Đảng_ta . \" . ( Thư vào Nam , Lê Duẩn , trang 325 , 326 , 327 , 336 , Nhà xuất_bản Quân_đội Nhân_dân ,\
    \ 2005 ) Để thực_hiện điều này họ chủ_trương \" Phải kịp_thời tập_hợp các phe nhóm tán_thành hòa bình , độc_lập , dân_chủ\
    \ , hòa hợp dân_tộc , hình_thành lực_lượng thứ ba để phân_hóa hơn nữa các thế_lực phản_động , cô_lập và chĩa mũi_nhọn\
    \ vào Thiệu cùng các phần_tử thân Mỹ hiếu_chiến nhất . \" ( Thư vào Nam , Lê Duẩn , trang 331 , Nhà xuất_bản Quân_đội\
    \ Nhân_dân , 2005 ) \n Trong thời_kỳ này , viện_trợ của Mỹ dồi_dào nên đời_sống của dân_chúng trong các thành_phố lớn\
    \ trở_nên tốt hơn và nó làm cho dân nông_thôn đổ về thành_phố để kiếm sống dễ hơn . Tuy_nhiên , viện_trợ dồi_dào khiến\
    \ tình_trạng tham_nhũng trong chính_quyền và quân_đội lên cao . Trong quân_đội rất phổ_biến kiểu \" lính ma \" : khai\
    \ khống quân_số đơn_vị để sĩ_quan_lĩnh phần lương dôi ra nhưng thực_tế không có quân chiến_đấu . Đây là giai_đoạn mà nạn\
    \ tham_nhũng hoành_hành trong giới lãnh_đạo quân_đội Việt_Nam_Cộng_hòa với những tai_tiếng về buôn_lậu , ăn_cắp quân_nhu\
    \ và tiền viện_trợ quân_sự . ( Review by Major General Nguyen_Van_Hieu of the Anti - Corruption Work of the Vice - Presidency\
    \ , Department of State , Airgram A042 , date : ngày 5 tháng 3 năm 1973 . ) Sau hàng_loạt cuộc điều_tra tham_nhũng , mà\
    \ đặc_biệt là cuộc điều_tra tại Quỹ tiết_kiệm Quân_đội do tướng Nguyễn Văn Hiếu thực_hiện trong 5 tháng và được công_bố\
    \ trên truyền_hình ngày 14 tháng 7 năm 1972 , ( Tường_Trình Kết_Quả Điều_Tra QTKQĐ , Thiếu_tướng Nguyễn Văn Hiếu , Phụ_Tá\
    \ Đặc_Biệt Phó_Tổng_thống , và Tổng_Thư_ký Ủy_ban Điều_Tra Đặc_Biệt Trên Truyền_hình Ngày 14 Tháng 7 Năm 1972 Bản Tường_Trình\
    \ Kết_Quả Điều_Tra QTKQĐ ) hàng_loạt sĩ_quan , trong đó có 2 tướng_lĩnh là Tổng_trưởng Quốc_phòng Trung_tướng Nguyễn_Văn_Vỹ\
    \ và Trung_tướng Lê_Văn_Kim cùng với 7 đại_tá bị cách_chức . ( Punishment Measures Implemented in SMASF case , Department\
    \ of State , Airgram A - 198 , date ngày 27 tháng 10 năm 1972 : The_seven colonels — Bui Quy_Cao , Do tung , Phan_Dang\
    \ Han , Nguyen_Manh_Dinh , Tran_Van_Kha , Nguyen_Van Sang , and Tran_Quy_Minh — recently completed the first phase of\
    \ the punishment : 60 days of confinement ( suspended ) . ) Quỹ tiết_kiệm Quân_đội bị buộc phải giải_tán . Vì vụ án này\
    \ , ông Hiếu đã làm mếch_lòng các tướng_lĩnh tham_nhũng , tổng_thống Thiệu cũng ra_lệnh hạn_chế điều_tra khiến ông Hiếu\
    \ nản_lòng và xin chuyển sang công_tác chỉ_huy tác_chiến . Nhiều người cũng cho rằng đây là lý_do cái chết bí_ẩn của tướng\
    \ Hiếu vào tháng 4 năm 1975 ( Cable of SECSTATE WASHDC , R 092257Z APR 75 , SUBJECT : APRIL 9 EA PRESS SUMARY ) . \n Những\
    \ điều trên đã gây ảnh_hưởng lớn đến sức chiến_đấu của Quân_lực Việt_Nam_Cộng_hòa . Tổng_thống Nguyễn Văn_Thiệu bị nhiều\
    \ người chỉ_trích vì không_thể kiểm_soát nổi tình_trạng tham_nhũng và lạm_quyền kinh_tế ( . Tình_trạng tham_nhũng trong\
    \ quân_đội phổ_biến đến_nỗi các sĩ_quan , binh_lính còn đem cả quân_trang quân_dụng , vũ_khí và lương_thực bán cho Quân\
    \ Giải_phóng và thậm_chí \" tặng \" luôn cả xe_tải cho \" đối_tác \" sau mỗi lần giao_dịch . \n Một vấn_đề lớn nữa của\
    \ Việt_Nam_hóa chiến_tranh là khi Quân_lực Việt_Nam_Cộng_hòa nhất_nhất theo các tiêu_chuẩn Mỹ thì họ cũng quen kiểu đánh\
    \ nhau tốn tiền như quân Mỹ và sức chiến_đấu của quân_đội phụ_thuộc lớn vào viện_trợ của MỹAndrew A._Wiest , The_Vietnam_War\
    \ , 1956 - 1975 , 2002 , Osprey_Publishing , tr . 80 ) . Viện_trợ mà giảm thì ảnh_hưởng rõ_rệt đến sức chiến_đấu của quân_đội\
    \ , điều này góp_phần giải_thích tại_sao quân_đội này mau_chóng sụp_đổ trong năm cuối_cùng của cuộc_chiến ."
