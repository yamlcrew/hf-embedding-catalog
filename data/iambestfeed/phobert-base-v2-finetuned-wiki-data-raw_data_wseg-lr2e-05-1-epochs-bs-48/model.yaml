    - "Nova Scotia nằm ở khu_vực trung_du . Kể từ khi tỉnh này bao_phủ gần biển , khí_hậu gần với biển hơn so với khí_hậu\
      \ lục_địa . Mùa đông và mùa hè nhiệt_độ cực_đoan của khí_hậu lục_địa bị kiểm_duyệt bởi đại_dương . Tuy_nhiên , mùa đông\
      \ vẫn còn lạnh , đủ để được phân_loại là lục_địa - vẫn còn gần điểm đông hơn so với nội_địa ở phía tây . Khí_hậu Nova\
      \ Scotia theo nhiều cách tương_tự như bờ biển Baltic trung_tâm ở Bắc_Âu , chỉ có mưa và tuyết . Mặc_dù Nova Scotia có\
      \ khoảng mười lăm dãy núi phía Nam . Những khu_vực không có bờ biển Đại_Tây_Dương trải qua những mùa hè ấm_áp hơn thường\
      \ thấy ở các khu_vực nội_địa , và mùa đông hạ thấp hơn một_chút . \n Được mô_tả trên tấm giấy_phép xe của tỉnh dưới\
      \ dạng Sân_chơi Ocean của Canada , Nova Scotia được bao quanh bởi bốn vùng nước chính : Vịnh Saint_Lawrence về phía\
      \ bắc , Vịnh Fundy về phía tây , Vịnh Maine về phía tây_nam , và Đại_Tây_Dương về phía đông ."
