      \ quyền_lực và tài_sản khổng_lồ . Vương_quốc Ấn_Độ_Dương đã tạo điều_kiện cho việc truyền_bá Ấn_Độ giáo đầu_tiên và\
      \ sau đó là Phật_giáo đến phần_lớn Đông_Nam_Á và thực_hiện nhiều dự_án cơ_sở hạ_tầng tôn_giáo khắp khu_vực , bao_gồm\
      \ việc xây_dựng hơn 1000 ngôi đền và di_tích chỉ riêng ở Angkor . Angkor Wat là công_trình nổi_tiếng nhất trong số những\
      \ công_trình kiến_trúc này và được công_nhận là Di_sản Thế_giới . \n Vào thế_kỷ XV , sau cuộc nổi_dậy của Ayutthaya\
      \ , nơi trước đây thuộc quyền cai_trị của Đế_chế Khmer , Campuchia đã trải qua sự suy_giảm quyền_lực . Campuchia phải\
      \ đối_mặt với 2 nước láng_giềng ngày_càng hùng_mạnh , Ayutthaya của Thái_Lan và triều Nguyễn của Việt_Nam , và đánh_dấu\
      \ sự đi xuống của số_phận Campuchia . Năm 1863 , Campuchia trở_thành 1 quốc_gia_bảo_hộ của Pháp , và sau đó được hợp_nhất\
      \ thành Đông_Dương thuộc Pháp . \n Campuchia giành độc_lập từ Pháp năm 1953 . Chiến_tranh Việt_Nam kéo_dài sang cả nước\
      \ này vào năm 1965 với việc mở_rộng Đường_mòn Hồ_Chí_Minh và thành_lập Đường_mòn Sihanouk . Điều này dẫn đến việc Mỹ\
      \ ném bom Campuchia từ năm 1969 đến năm 1973 . Sau cuộc đảo_chính Campuchia năm 1970 , thành_lập Cộng_hòa Khmer cánh\
      \ hữu thân Mỹ , Quốc_vương bị phế_truất Sihanouk đã ủng_hộ kẻ_thù cũ của mình , Khmer Đỏ . Với sự ủng_hộ của chế_độ\
      \ quân_chủ và Bắc Việt_Nam , Khmer Đỏ nổi lên thành một cường_quốc , chiếm Phnôm Pênh vào năm 1975 . Khmer Đỏ sau đó\
      \ đã thực_hiện chế_độ diệt chủng Campuchia từ năm 1975 đến năm 1979 , khi họ bị Việt_Nam lật_đổ và Cộng_hòa Nhân_dân\
      \ Campuchia do Việt_Nam hậu_thuẫn , được Liên_Xô hỗ_trợ , trong Chiến_tranh Campuchia - Việt_Nam . \n Sau Hiệp_định\
      \ Hòa_bình Paris năm 1991 , Campuchia được 1 phái bộ của Liên_Hợp_Quốc điều_hành trong mọt thời_gian ngắn ( 1992 - 1993\
      \ ) . Liên_Hợp_Quốc rút_lui sau khi tổ_chức bầu_cử , trong đó khoảng 90 % cử_tri đã đăng_ký bỏ_phiếu . Cuộc_chiến giữa\
      \ các phe_phái năm 1997 dẫn đến việc lật_đổ chính_phủ của Thủ_tướng Hun_Sen và Đảng Nhân_dân Campuchia . \n Campuchia\
      \ là thành_viên của Liên_Hợp_Quốc từ năm 1955 , ASEAN , Hội_nghị cấp cao Đông_Á , WTO , Phong_trào Không liên_kết và\
      \ La_Francophonie . Theo một_số tổ_chức nước_ngoài , đất_nước này có tình_trạng nghèo_đói phổ_biến , ( ) tham_nhũng\
      \ tràn_lan , ( ) thiếu tự_do chính_trị , ( ) chỉ_số phát_triển con_người ( HDI ) ở mức thấp ( ) và tỷ_lệ đói_nghèo cao\
      \ . ( Welthungerhilfe , IFPRI , and Concern Worldwide : 2013 Global Hunger_Index – The_challenge of hunger : Building\
      \ Resilience to Achieve Food and Nutrition_Security . Bonn , Washington D. C. , Dublin . October 2013 . ) ( ) ( ) Giám_đốc\
      \ Đông_Nam_Á của Tổ_chức Theo_dõi Nhân_quyền , David_Roberts , mô_tả Campuchia là một \" liên_minh tương_đối độc_tài\
      \ thông_qua một nền dân_chủ ở bề_ngoài \" . ( ( section XI , \" Recreating Elite_Stability , July 1997 to July 1998\
      \ \" ) ) Về mặt hiến_pháp là một nền dân_chủ tự_do đa đảng , ( ) nhưng trên thực_tế quốc_gia này được quản_lý theo chế_độ\
      \ độc đảng kể từ năm 2018 . ( ) ( ) \n Trong khi thu_nhập bình_quân đầu người vẫn ở mức thấp so với hầu_hết các nước\
      \ láng_giềng , Campuchia là một trong những nền kinh_tế đang phát_triển có tốc_độ tăng_trưởng nhanh nhất ở châu Á ,\
      \ với mức tăng_trưởng trung_bình 7,6 % trong thập_kỷ qua . Nông_nghiệp vẫn là ngành kinh_tế chủ_đạo , với sự tăng_trưởng\
      \ mạnh_mẽ của dệt may , xây_dựng và du_lịch dẫn đến đầu_tư nước_ngoài và thương_mại quốc_tế tăng . ( ) Liên_Hợp_Quốc\
      \ xếp Campuchia vào nhóm các quốc_gia kém phát_triển nhất trên thế_giới . Chỉ_số Nhà_nước về Pháp_quyền năm 2015 của\
      \ Dự_án Tư_pháp Thế_giới ( Hoa_Kỳ ) xếp Campuchia thứ 125 trên 126 quốc_gia , thấp hơn nhiều so với các quốc_gia khác\
      \ trong khu_vực . ( )"
    - "Sau khi Pháp thua trận Điện_Biên_Phủ ( 1954 ) và ký Hiệp_định Genève , Quốc_gia Việt_Nam cùng Pháp tập_kết về vùng\
      \ phía Nam vĩ_tuyến 17 của Việt_Nam . \n Theo kế_hoạch , quân Pháp sẽ rút dần sau 2 năm và Việt_Nam sẽ tiến_hành Tổng_tuyển_cử\
      \ thống_nhất đất_nước . Tuy_nhiên , báo_cáo của CIA cho Tổng_thống Mỹ Dwight Eisenhower thấy rằng khoảng 80 % dân_số\
      \ Việt_Nam sẽ bầu cho Hồ_Chí_Minh nếu cuộc tổng_tuyển_cử được thi_hành ( Dwight D._Eisenhower , Mandate for Change ,\
      \ 1953 - 56 ( Garden City , NY : Doubleday & Compnay , Inc . , 1963 ) , tr . 372 . ) . Không_thể chấp_nhận việc Hồ_Chí_Minh\
      \ sẽ thắng_cử và lập chính_phủ trên toàn_bộ lãnh_thổ Việt_Nam , Hoa_Kỳ đã hậu_thuẫn Quốc_gia Việt_Nam để cuộc tuyển_cử\
      \ không_thể diễn ra nhằm chia_cắt Việt_Nam vĩnh_viễn thành 2 quốc_gia . Hoa_Kỳ muốn có một chính_phủ chống Cộng tồn_tại\
      \ ở miền Nam Việt_Nam , bất_kể chính_phủ đó có tôn_trọng dân_chủ hay không ( Cecil B. Currey . Chiến_thắng bằng mọi\
      \ giá . Nhà xuất_bản Thế_giới , trang 333 . ) . \n Năm 1954 , đội bán quân_sự của Mỹ do tướng Edward_Lansdale ( sĩ_quan\
      \ cao_cấp của Tình_báo Mỹ và đã làm cố_vấn cho Pháp tại Việt_Nam từ 1953 ) đã huấn_luyện các lực_lượng vũ_trang của\
      \ Quốc_gia Việt_Nam ; xây_dựng các cơ_sở hạ_tầng phục_vụ quân_sự tại Philippines ; bí_mật đưa một lượng lớn vũ_khí và\
      \ thiết_bị quân_sự vào Việt_Nam ; giúp_đỡ phát_triển các kế_hoạch \" bình định Việt_Minh và các vùng chống_đối \" (\
      \ Trích tại The_CIA : A_Forgotten History ; All other actions : The_Pentagon Papers , Document_No . 15 : ' Lansdale\
      \ Team ' s Report on Covert Saigon_Mission in ' 54 and ' 55 , ' pp . 53 - 66 . ) . Ngày 13 - 12 - 1954 , Mỹ và Pháp\
      \ ký_kết văn_kiện cho phép các cố_vấn quân_sự Mỹ thay_thế dần cho sĩ_quan Pháp tham_gia huấn_luyện quân_đội Quốc_gia\
      \ Việt_Nam ở miền Nam Việt_Nam . Tháng 1 năm 1955 , Mỹ chính_thức viện_trợ quân_sự trực_tiếp cho Quốc_gia Việt_Nam .\
      \ Thượng_nghị_sĩ ( 4 năm sau trở_thành Tổng_thống ) John F._Kennedy tuyên_bố vào ngày 1 tháng 6 năm 1956 : \n : \" Nếu\
      \ chúng_ta không phải là cha_mẹ của nước Việt_Nam bé_nhỏ [ chỉ Việt_Nam_Cộng_hòa ] thì chắc_chắn chúng_ta cũng là cha_mẹ\
      \ đỡ_đầu của nó . Chúng_ta là chủ tọa khi nó ra_đời , chúng_ta viện_trợ để nó sống , chúng_ta giúp định_hình tương_lai\
      \ của nó ( ... ) . Đó là con_đẻ của chúng_ta - chúng_ta không_thể bỏ_rơi nó , chúng_ta không_thể không biết tới những\
      \ nhu_cầu của nó \" ( ) \n Trong những năm 1954 – 1956 , Mỹ đã bỏ ra 414 triệu USD giúp trang_bị cho các lực_lượng thường_trực\
      \ Quốc_gia Việt_Nam , gồm 170.000 quân và lực_lượng cảnh_sát 75.000 quân ; 80 % ngân_sách quân_sự của Quốc_gia Việt_Nam\
      \ là do Mỹ_viện_trợ . Từ năm 1955 đến 1960 , có tất_cả 800 chuyến tàu chở vũ_khí và phương_tiện quân_sự của Mỹ vào miền\
      \ Nam Việt_Nam . Số viện_trợ này giúp Quốc_gia Việt_Nam đủ sức duy_trì bộ_máy hành_chính và quân_đội khi không còn viện_trợ\
      \ của Pháp . Quân_đội Quốc_gia Việt_Nam dần thay_thế_chiến_thuật và vũ_khí của Pháp bằng của Mỹ . \n Đến lúc này lại\
      \ xảy ra mâu_thuẫn giữa Thủ_tướng Ngô_Đình Diệm với Quốc_trưởng Bảo_Đại ( nguyên là Hoàng đế nhà Nguyễn ) . Năm 1955\
      \ , với kết_quả cuộc trưng_cầu dân_ý gian_lận ( mà các tài_liệu ngày_nay của Chính_phủ Việt_Nam thường gọi là \" trò_hề\
      \ trưng_cầu dân_ý \" ( ) ) , Thủ_tướng Ngô_Đình Diệm đã phế_truất Quốc_trưởng Bảo_Đại , lên làm Tổng_thống đầu_tiên\
      \ của chính_phủ Việt_Nam_Cộng_hòa . ( ) Sau đó , Quốc_gia Việt_Nam tổ_chức bầu_cử Quốc_hội Lập_hiến . Quốc_hội này ban_hành\
      \ Hiến_pháp thành_lập Việt_Nam_Cộng_hòa trên cơ_sở kế_thừa Quốc_gia Việt_Nam , thủ_đô là thành_phố Sài_Gòn , ngày ban_hành\
      \ Hiến_pháp 26 tháng 10 trở_thành ngày Quốc_khánh của Đệ Nhất Cộng_hòa . Việt_Nam_Cộng_hòa theo thể_chế chính_trị đa\
      \ đảng , kinh_tế tư_bản chủ_nghĩa và được Mỹ giúp_đỡ , bảo_vệ để chống lại Việt_Nam Dân_chủ Cộng_hòa và Mặt_trận Dân_tộc\
      \ Giải_phóng miền Nam Việt_Nam tại miền Nam . \n Dưới thời Tổng_thống Ngô_Đình_Diệm , ông đề ra chủ_nghĩa \" Cần lao\
      \ Nhân vị \" , duy_trì tình_trạng đối_lập với Việt_Nam Dân_chủ Cộng_hòa . Trong khoảng 5 năm , Việt_Nam_Cộng_hòa đã\
      \ có một_số thành_tựu : xã_hội ổn_định , kinh_tế phát_triển , định_cư gần 1 triệu dân di_cư từ miền Bắc , thành_lập\
      \ Viện Đại_học Huế ... \n Tuy_nhiên , chính_quyền Tổng_thống Ngô_Đình Diệm bị giới đối_lập xem là chính_phủ độc_tài\
      \ gia_đình_trị , dần_dần tích_lũy nhiều mâu_thuẫn nội_bộ . Từ năm 1955 và đặc_biệt là từ 1959 , cùng với sự hậu_thuẫn\
      \ của Hoa_Kỳ ( do lo_ngại ảnh_hưởng của phong_trào Việt_Minh ) , chính_quyền Ngô_Đình Diệm thực_hiện chính_sách đàn_áp\
      \ những người cộng_sản , tố_cộng diệt cộng trên toàn_bộ Nam Việt_Nam , dựa theo Luật 10 - 59 ( đạo_luật quy_định việc\
      \ thiết_lập các phiên_tòa quân_sự đặc_biệt để xét_xử những phạm_nhân bị tình_nghi là ủng_hộ Việt_Minh và chủ_nghĩa cộng_sản\
      \ ) . ( Luther A. Allen and Pham_Ngoc_An , A_Vietnamese District Chief in Action , Saigon : Michigan State University\
      \ Vietnam Advisory_Group ( 1961 ) , pp . 69 - 71 . Bản download ) Phong_trào Đồng_khởi năm 1960 ( do Đảng Lao_động Việt_Nam\
      \ lãnh_đạo ) và cuộc đảo_chính hụt năm 1960 là những đòn giáng mạnh vào chế_độ Ngô_Đình Diệm . \n Mâu_thuẫn tôn_giáo\
      \ cũng trở_nên gay_gắt . Sự_kiện Phật Đản năm 1963 , việc cấm treo cờ Phật_giáo ở Huế đã gây ra phản_ứng mạnh_mẽ từ\
      \ các Phật_tử , dẫn đến các hoạt_động đàn_áp Phật_giáo của chính_quyền . Việc Thượng_tọa Thích Quảng_Đức tự_thiêu giữa\
      \ đường_phố Sài_Gòn cùng những phát_biểu của bà Ngô_Đình Nhu ( tức Dân biểu Trần_Lệ_Xuân ) làm chế_độ Ngô_Đình Diệm\
      \ bị báo_chí phương Tây đả_kích kịch_liệt và mất hết mọi sự ủng_hộ từ phương Tây . \n Ngày 1 tháng 11 năm 1963 , nền\
      \ Đệ Nhất Cộng_hòa bị lật_đổ bởi một nhóm quân_nhân dưới sự chỉ_huy của một_số tướng_lĩnh ( trong đó có tướng Dương\
      \ Văn_Minh ) ; về sau , ngày này được xem là ngày Quốc_khánh của Đệ Nhị_Cộng_hòa Việt_Nam . Cả ba anh_em Ngô_Đình_Diệm\
      \ , Ngô_Đình Nhu và Ngô_Đình_Cẩn đều bị giết . Theo băng ghi_âm tại Nhà_Trắng , tổng_thống Kennedy nói rằng ông bàng_hoàng\
      \ về cái chết của 2 anh_em Diệm và Nhu , cái chết của hai người thật là kinh_khủng . ( ) \n Theo như hồi_ký của Bộ_trưởng\
      \ Quốc_phòng Mỹ Robert McNamara , chính CIA đã hỗ_trợ cho việc lật_đổ và sau_này McNamara xem đó là một sai_lầm nghiêm_trọng\
      \ mà Hoa_Kỳ mắc phải ( Nhìn lại quá_khứ - Tấn thảm_kịch và những bài_học về Việt_Nam , Robert S. McNamara , Chính_trị\
      \ Quốc_gia , 1995 . ) . Khi được thông_báo anh_em Ngô_Đình Diệm đã bị giết , Đại_sứ Hoa_Kỳ Cabot_Lodge , đã vui_vẻ thốt\
      \ lên bằng tiếng Pháp : \" C ' est formidable ! C ' est formidable ! \" ( Thật là tuyệt_diệu . Thật là tuyệt_diệu )\
      \ . ( Trần_Văn_Đôn , 1989 , tr 227,228 . ) \n Kể từ đây , sự phụ_thuộc của Việt_Nam_Cộng_hòa vào viện_trợ của Hoa_Kỳ\
      \ ngày_càng lớn , cả về tài_chính cũng như về quân_sự . Sự can_thiệp của Tòa đại_sứ Mỹ vào công_việc nội_bộ về chính_trị\
      \ và quân_sự của Việt_Nam_Cộng_hòa ngày_càng lên cao ."
  - source_sentence: Hành_pháp của Việt_Nam_Cộng_hòa
    sentences:
    - "Bắt_đầu_từ tháng 8 năm 1964 , Việt_Nam Dân_chủ Cộng_hòa đã phải đối_phó với chiến_tranh trên không rất ác_liệt của\
      \ Không_quân và Hải_quân Mỹ . Đầu_tiên là chiến_dịch Mũi_Tên Xuyên ( Pierce_Arrow ) ngày 5 tháng 8 năm 1964 , hành_động\
      \ trả_đũa sự_kiện Vịnh Bắc_Bộ ( Ellsberg , Daniel , Secrets : A_Memoir of Vietnam and the Pentagon_Papers , New_York\
      \ : Viking , 2002 ) do máy_bay của Hải_quân Mỹ thực_hiện , đánh_phá các căn_cứ hải_quân của Việt_Nam Dân_chủ Cộng_hòa\
      \ ở Lạch_Trường ( Thanh_Hóa ) , Bãi Cháy ( Hòn_Gai ) . \n Tại Bãi Cháy , bộ_đội cao_xạ phòng không đã chủ_động đánh\
      \ trước khi máy_bay Mỹ oanh kích . 2 máy_bay Mỹ loại A - 4 Skyhawk bị bắn rơi . Phi_công Mỹ Everett Alvarez nhảy_dù\
      \ xuống biển đã bị dân chài bắt sống , trở_thành người tù_binh Mỹ đầu_tiên trong Chiến_tranh Việt_Nam . ( Viên phi_công\
      \ Mỹ bị bắn rơi đầu_tiên ở miền Bắc , VietNamNet ) Tiếp đến là Chiến_dịch Sấm Rền đầu năm 1965 đánh_phá các tỉnh từ\
      \ Thanh_Hóa_trở vào , sau đó chiến_tranh không_quân lan rộng ra toàn miền Bắc Việt_Nam . Để đề_phòng các phản_ứng của\
      \ quốc_tế , Không_quân Mỹ chỉ chừa lại nội_thành hai thành_phố Hà_Nội và Hải_Phòng . Chiến_tranh không_quân nhắm vào\
      \ hệ_thống đường_sá giao_thông và các mục_tiêu công_nghiệp , quân_sự . Thậm_chí các trạm biến_thế điện nhỏ , các nhánh\
      \ đường_sắt phụ cũng bị đánh . Bị đánh_phá nặng nhất_là tại khu_vực hai tỉnh Hà_Tĩnh , Quảng_Bình , là cuống_họng tiếp_tế\
      \ vào Nam và tại khu_vực Vĩnh_Linh giáp sông Bến_Hải - nơi dân_chúng phải sống trong địa_đạo . \n Tháng 4 năm 1965 ,\
      \ Chính_phủ Việt_Nam Dân_chủ Cộng_hòa ký hiệp_định với Trung_Quốc đưa một bộ_phận quân_đội Trung_Quốc vào miền Bắc Việt_Nam\
      \ đóng ở một_số vị_trí quan_trọng như tỉnh Quảng_Ninh , Thái_Nguyên và dọc đường Quốc_lộ 1 , nhưng không được vượt quá\
      \ phía nam Hà_Nội ( North Vietnam and People ’ s Republic of China sign aid agreement , www . history . com ) . Sau\
      \ đó một số_lượng đáng_kể nhân_viên quân_sự Trung_Quốc được gửi sang miền Bắc , bắt_đầu_từ tháng 6 năm 1965 . Tổng_số\
      \ quân Trung_Quốc đã có_mặt tại miền Bắc từ tháng 6 - 1965 đến tháng 3 - 1973 là gần 320.000 người trong đó có khoảng\
      \ 1000 binh_sĩ tử_trận . Tại thời_điểm đông nhất có khoảng 130.000 người , bao_gồm các đơn_vị tên_lửa đất đối không\
      \ , pháo phòng_không , các đơn_vị công_binh làm đường , dò mìn và vận_tải . ( Lực_lượng này không được phép tham_chiến\
      \ mà chỉ để giúp Việt_Nam sửa_chữa cầu , đường bị bom Mỹ phá . Ông Lưu Đoàn_Huynh , cố_vấn ngoại_giao Việt_Nam Dân_chủ\
      \ Cộng_hòa , giải_thích quân Trung_Quốc sang Việt_Nam do lo_ngại việc Mỹ có_thể đưa quân ra miền Bắc Việt_Nam . Ông\
      \ Barry_Zorthian , phát_ngôn_viên sứ_quán Mỹ tại Sài_Gòn , cho biết Mỹ không mở_rộng chiến_tranh ra miền Bắc Việt_Nam\
      \ vì sợ Trung_Quốc sẽ tham_chiến . Apokalypse Vietnam ( phim tài_liệu ) , đạo_diễn Ulle_Schröder , Sebastian_Dehnhardt\
      \ , Ulrich_Brochhagen , Peer_Horstmann , Jürgen_Eike , Cộng_hòa Liên_bang Đức , 2005 ) Sách \" Sự_thật quan_hệ Việt_Nam\
      \ - Trung_Quốc \" thì khẳng_định mục_tiêu của Trung_Quốc \" thâm_hiểm \" hơn : đó là tạo tiếng tốt \" viện_trợ Việt_Nam\
      \ \" , tập_họp lực_lượng ở châu Á , châu Phi , châu Mỹ_Latinh , đẩy_mạnh chiến_dịch chống Liên_Xô ; cũng là để gây khó_khăn\
      \ cho việc vận_chuyển hàng viện_trợ khối xã_hội chủ_nghĩa quá_cảnh Trung_Quốc nhằm hạn_chế khả_năng đánh lớn của nhân_dân\
      \ Việt_Nam , qua đó khiến Việt_Nam buộc phải lệ_thuộc vào Trung_Quốc . Trung_Quốc ngoài_mặt muốn giúp Việt_Nam tu_sửa\
      \ thiệt_hại do không_quân Mỹ , nhưng năm 1968 họ lại khuyến_khích Mỹ tăng_cường ném bom miền bắc Việt_Nam ( SỰ_THẬT\
      \ VỀ QUAN_HỆ VIỆT NAM & TRUNG QUỐC TRONG 30 NĂM QUA. Nhà_Xuất_Bản Sự_Thật 1986 . PHẦN THỨ BA : TRUNG QUỐC VỚI CUỘC ĐẤU_TRANH\
      \ CỦA NHÂN_DÂN VIỆT NAM ĐỂ GIẢI PHÒNG MIỀN NAM , THỐNG_NHẤT NƯỚC_NHÀ ( 1954 - 1975 ) . II - THỜI_KỲ 1965 - 1969 : LÀM\
      \ YẾU VÀ KÉO DÀI CUỘC KHÁNG_CHIẾN CỦA NHÂN_DÂN VIỆT NAM ) . Bên cạnh đó , trong giai_đoạn đầu ( năm 1965 ) còn có sự\
      \ tham_chiến của các binh_lính , sĩ_quan tên_lửa Liên_Xô trực_tiếp tác_chiến đồng_thời huấn_luyện binh_sĩ Việt_Nam nắm_bắt\
      \ việc sử_dụng tên_lửa phòng không và đội đặc_nhiệm GRU thuộc Tổng_cục Tình_báo quân_sự , Bộ Tổng_tham_mưu các lực_lượng\
      \ vũ_trang Liên_Xô huấn_luyện lực_lượng đặc_nhiệm Việt_Nam và tham_gia thực_hiện các vụ đột_kích vào căn_cứ quân_sự\
      \ của đối_phương ( Tiết_lộ của đặc_nhiệm Liên_Xô tham_chiến ở Việt_Nam , Báo điện_tử Tiền_Phong , ngày 30 tháng 7 năm\
      \ 2013 ) . \n Cuộc_sống của người dân miền Bắc ngày_càng khó_khăn và căng_thẳng , ngay cả bộ_đội cũng bị thiếu ăn .\
      \ Ở thành_thị , dân_chúng tản_cư về nông_thôn để tránh bom , nhu yếu_phẩm cho thị dân được bán theo chế_độ tem phiếu\
      \ rất nghiêm_ngặt . Nông_thôn vắng bóng nam thanh_niên . Nữ thanh_niên vừa lao_động_sản_xuất vừa được điều_động tham_gia\
      \ vào lực_lượng dân_quân tự_vệ bảo_vệ trật_tự và tham_gia huấn_luyện quân_sự , bắn máy_bay . Chính_phủ huy_động hàng\
      \ vạn nữ thanh_niên đi Thanh_niên xung_phong vào tuyến lửa tại các tỉnh bị đánh_phá nặng_nề nhất như Nghệ_An , Hà_Tĩnh\
      \ , Quảng_Bình và vào tuyến đường Trường_Sơn , sang Lào để làm nhiệm_vụ hậu_cần , làm đường và đảm_bảo giao_thông .\
      \ Tỷ_lệ thương_vong khá lớn vì bom_đạn và bệnh_tật . \n Về xã_hội , chính_quyền địa_phương cố_gắng tạo điều_kiện cho\
      \ thanh_niên lập gia_đình trước khi nhập_ngũ . Nhà_nước tìm mọi cách nâng cao tinh_thần của dân_chúng cho kháng_chiến\
      \ . Tất_cả mọi người đều tham_gia các tổ_chức quần_chúng của Đảng Lao_động Việt_Nam . Các tổ_chức quần_chúng trên có\
      \ vai_trò nhất_định trong việc giữ vững tinh_thần và niềm tin trong dân_chúng và thi_hành các đường_lối chính_sách của\
      \ Đảng trong dân . Những tin_tức ác_liệt của chiến_trường , số thương_vong nặng_nề ở miền Nam và chết bom ở miền Bắc\
      \ không được công_bố hoặc với số_lượng giảm đi rất nhiều , chủ_yếu trên thông_tin báo đài là các tin chiến_thắng lẫy_lừng\
      \ . Nhiều bài hát được các nhạc_sĩ sáng_tác ca_ngợi mục_tiêu giải_phóng miền Nam , ca_ngợi người lính , cổ_vũ thanh_niên\
      \ nhập_ngũ . ( Hồi_ký một thằng hèn , trang 85 - 122 , Nhạc_sĩ Tô_Hải , Nhà xuất_bản Tiếng Quê_Hương , năm 2009 ) Nhân_dân\
      \ miền Bắc được phổ_biến đời_sống kinh_tế tại miền Nam rất bấp_bênh ( Hồ_Chí Minh toàn_tập ( tập 10 ) , trang 46 , Nhà\
      \ xuất_bản Chính_trị Quốc_gia , năm 2000 . Trích : Việt_Nam_ta - Dưới chế_độ đen_tối của Mỹ - Diệm , tình_hình miền\
      \ Nam tiêu_điều như thế_nào , bà_con ta đã rõ . ở đây tôi chỉ nhắc lại một con_số do báo_chí Sài_Gòn nêu ra : \" Sài_Gòn\
      \ có 1.219.000 người , trong đó 810.000 người không có lương cố_định \" , nghĩa_là thường_xuyên không có công ăn việc_làm\
      \ , phải sống vất vơ_vất_vưởng . ) , nhân_dân miền Nam ( nhất là ở vùng nông_thôn ) bị khốn_khổ bởi những cuộc bắn phá\
      \ , càn_quét , rải chất_độc_hóa học phá_hoại mùa_màng và chính_sách Ấp Chiến_lược - \" thực_tế là trại tập_trung \"\
      \ của Mỹ_Ngụy . ( Hồ_Chí Minh toàn_tập ( tập 11 ) , trang 113,116,124,144,145,174,182,199,221,290,291,294,295 ... ,\
      \ Nhà xuất_bản Chính_trị Quốc_gia , năm 2000 . Trích_dẫn từ cuộc phỏng_vấn của nhà_báo William Bớc sét - Phóng_viên\
      \ Tuần_báo Mỹ \" Người bảo_vệ Dân_tộc \" ) \n Xã_hội xuất_hiện nhiều tấm gương về chủ_nghĩa anh_hùng cách_mạng . Các\
      \ nguồn_lực được huy_động tối_đa và có hiệu_quả để phục_vụ mục_tiêu giải_phóng miền Nam . Các nhà_báo Pháp nhận_xét\
      \ : \" Mọi lối sống cá_nhân đều biến mất để cùng xây_dựng một cố_gắng tập_thể tuyệt_vời , điều_hành bởi một bộ_máy thống_nhất\
      \ và quy_củ \" . ( Phóng_sự phỏng_vấn Chủ_tịch Hồ_Chí_Minh , đài ORTF ngày 5 - 6 - 1964 ) Nói_chung , tinh_thần của\
      \ người dân miền Bắc rất cao , họ vẫn có_thể chấp_nhận hy_sinh cao hơn nữa để giành được thắng_lợi cuối_cùng . \n Lực_lượng\
      \ phòng không của Quân_đội Nhân_dân Việt_Nam không_thể đua_tranh với Không_quân và Hải_quân Mỹ nên dồn sức bảo_vệ các\
      \ mục_tiêu rất quan_trọng như Hà_Nội , Hải_Phòng , các thành_phố lớn , các điểm giao_thông_quan_trọng và các nơi máy_bay\
      \ địch hay qua_lại nhiều . Những nơi còn lại được phân cho các lực_lượng dân_quân tự_vệ trang_bị pháo và súng_máy phòng\
      \ không đảm_trách . Đến năm 1965 , lực_lượng phòng không tại miền Bắc có một_số trang_bị khá hiện_đại do Liên_Xô cung_cấp\
      \ , gồm nhiều trung_đoàn pháo phòng_không các tầm_cỡ ( có loại điều_khiển bằng radar ) , hệ_thống radar cảnh_giới và\
      \ dẫn đường cho không_quân , hệ_thống tên_lửa phòng không và không_quân tiêm_kích . Các lực_lượng phòng không không_quân\
      \ của Quân_đội Nhân_dân Việt_Nam đã chiến_đấu khá sáng_tạo , vô_hiệu_hóa được các ưu_thế công_nghệ của đối_phương ,\
      \ chống_trả quyết_liệt và gây thiệt_hại đáng_kể cho Không_quân và Hải_quân Mỹ ."
    - "Đức ( , ) , tên chính_thức là Cộng_hòa Liên_bang Đức ( , ) , là một quốc_gia ở Trung_Âu , bao_gồm 16 bang . Đức có\
      \ tổng_diện_tích là 357.022 km² và khí_hậu theo mùa , phần_lớn là ôn_hòa . Dân_số Đức vào khoảng hơn 83 triệu ( ) ,\
      \ là quốc_gia đông dân thứ hai ở châu Âu ( sau Nga ) . Đức là quốc_gia có số_lượng người nhập_cư cao thứ hai thế_giới\
      \ chỉ sau Hoa_Kỳ theo số_liệu năm 2014 . ( ) Thủ_đô và vùng đô_thị lớn nhất của Đức là Berlin . Các thành_phố lớn khác\
      \ gồm có Hamburg , München , Köln , Frankfurt , Stuttgart và Düsseldorf . \n Các bộ_lạc German khác nhau cư_trú tại\
      \ miền bắc của nước Đức ngày_nay từ thời_kỳ cổ_đại Hy - La . Một khu_vực mang tên Germania được ghi lại trước năm 100\
      \ . Trong giai_đoạn di_cư , các bộ_lạc German bành_trướng lãnh_thổ về phương nam . Bắt_đầu_vào thế_kỷ 10 , các lãnh_thổ\
      \ của người Đức hình_thành bộ_phận trung_tâm quốc_gia lúc đó của Đế_quốc La_Mã_Thần_thánh . Trong thế_kỷ 16 , các khu_vực\
      \ miền bắc Đức trở_thành trung_tâm của Cải_cách Kháng_nghị . Năm 1871 , Đức trở_thành một quốc_gia dân_tộc khi hầu_hết\
      \ các quốc_gia Đức thống_nhất ( ngoại_trừ Áo ) trong Đế_quốc Đức do người Phổ chi_phối . Sau Chiến_tranh thế_giới thứ\
      \ nhất và Cách_mạng Đức 1918 - 1919 , Đế_quốc này bị thay_thế bằng Cộng_hòa Weimar theo chế_độ nghị_viện . Chế_độ độc_tài\
      \ quân_phiệt Quốc_Xã được hình_thành vào năm 1933 , dẫn tới Chiến_tranh thế_giới thứ hai và một nạn diệt chủng cho đến\
      \ năm 1945 . Sau một giai_đoạn Đồng_Minh chiếm_đóng , hai nhà_nước Đức được thành_lập ở hai phía trong Chiến_tranh Lạnh\
      \ là Cộng_hòa Liên_bang Đức ( Tây_Đức ) và Cộng_hòa Dân_chủ Đức ( Đông_Đức , 1949 ) . Năm 1989 , Bức tường Berlin sụp_đổ\
      \ trong cuộc Cách_mạng hòa bình chống_đối lại nhà_nước Đông_Đức . Năm 1990 , Đức được tái thống_nhất sau hơn 45 năm\
      \ chia_cắt đất_nước từ 1945 . \n Từ khi thống_nhất đến nay , Đức dẫn_đầu thế_giới trong các lĩnh_vực công_nghiệp_nặng\
      \ và công_nghệ_cao . Đức là một quốc_gia phát_triển , duy_trì một hệ_thống an_sinh xã_hội và chăm_sóc y_tế phổ_quát\
      \ và giáo_dục đại_học miễn học_phí . ( ) Đức là một thành_viên sáng_lập của Liên_minh châu Âu vào năm 1993 , là bộ_phận\
      \ của khu_vực Schengen và trở_thành_đồng sáng_lập của khu_vực đồng Euro vào năm 1999 . Đức là một thành_viên của Liên_Hợp_Quốc\
      \ , NATO , G7 , G20 , Câu_lạc_bộ Paris , và OECD."
    - "Tổng_thống nắm quyền_hành_pháp , do Nhân_dân trực_tiếp bầu lên với nhiệm_kỳ 5 năm , có_thể được tái_nhiệm thêm 2 nhiệm_kỳ\
      \ . Mặc_dù trong Hiến_pháp 1956 có quy_định \" Chủ_quyền thuộc về toàn dân \" nhưng Đoạn 3 , Điều 3 thì lại xác_định\
      \ \" Tổng_thống lãnh_đạo quốc dân \" \n Tổng_thống có các quyền : \n * Ký_kết , và sau khi được Quốc_hội chấp_thuận\
      \ , phê_chuẩn các điều_ước và hiệp_định quốc_tế . \n * Bổ_nhiệm các sứ thần , tiếp_nhận ủy nhiệm thư của các đại_diện\
      \ ngoại_giao , thay_mặt Quốc_gia trong việc giao_thiệp với ngoại quốc . \n * Với sự thỏa_thuận của một nửa tổng_số Dân\
      \ biểu Quốc_hội , Tổng_thống tuyên_chiến hoặc phê_chuẩn hòa ước . \n * Bổ_nhiệm và cách_chức tất_cả các công_chức dân_sự\
      \ và quân_sự . Thành_lập Nội_các . \n * Là tư_lệnh tối_cao của các lực_lượng quân_sự . \n * Ban các loại huy_chương\
      \ . \n * Có quyền ân_xá , ân_giảm , hoán cải hình_phạt và huyền án . \n * Có_thể gia_hạn nhiệm_kỳ dân biểu . \n * Có_thể\
      \ dự các phiên họp Quốc_hội và tuyên_bố trước Quốc_hội . \n * Mỗi năm vào đầu khóa họp thường_lệ thứ nhì và mỗi khi\
      \ thấy cần , Tổng_thống thông_báo cho Quốc_hội biết tình_hình Quốc_gia và chánh sách đối_nội , đối_ngoại của Chính_phủ\
      \ . \n * Với sự thỏa_thuận của Quốc_hội , Tổng_thống có_thể tổ_chức trưng_cầu dân_ý . \n * Tổng_thống có_thể ký sắc_luật\
      \ ngân_sách cho tài khóa sau trong một_số trường_hợp nhất_định . \n * Ký sắc_lệnh tuyên_bố tình_trạng khẩn_cấp , báo_động\
      \ hoặc giới_nghiêm trong một hay nhiều vùng ; các sắc_lệnh này có_thể tạm đình_chỉ sự áp_dụng một hoặc nhiều đạo_luật\
      \ tại những vùng đó ."
  - source_sentence: Ngôn_ngữ của Thụy_Điển
    sentences:
    - "Ngôn_ngữ chính_thức của Thụy_Điển là tiếng Thụy_Điển ( ) ( ) , một ngôn_ngữ German_Bắc , rất giống với tiếng Đan_Mạch\
      \ và tiếng Na_Uy , chỉ khác về cách phát_âm và chính_tả . Người Na_Uy có_thể dễ_dàng hiểu được tiếng Thuỵ_Điển , và\
      \ người Đan_Mạch cũng có_thể hiểu nó tuy sẽ gặp một_chút khó_khăn hơn so với người Na_Uy . Ngược_lại , những người nói\
      \ tiếng Thụy_Điển cũng có_thể dễ_dàng hiểu được tiếng Na_Uy hoặc tiếng Đan_Mạch , tuy_nhiên tiếng Na_Uy sẽ dễ hơn một_chút\
      \ đối_với họ . Các phương_ngữ được nói ở Scania , phần cực nam của đất_nước , chịu ảnh_hưởng lớn bởi tiếng Đan_Mạch\
      \ bởi_vì khu_vực này trước đây là một phần lãnh_thổ của Đan_Mạch và ngày_nay vẫn nằm tiếp_giáp với quốc_gia này . Những\
      \ người Thụy_Điển nói tiếng Phần_Lan chiếm khoảng 5 % dân_số Thụy_Điển ( ) , và tiếng Phần_Lan đã được công_nhận là\
      \ một ngôn_ngữ_thiểu_số tại Thụy_Điển . Do những người nói tiếng Ả_rập nhập_cư vào Thụy_Điển rất nhiều trong những năm\
      \ gần đây , việc sử_dụng tiếng Ả_Rập có_thể đã trở_nên phổ_biến rộng_rãi ở trong nước hơn so với tiếng Phần_Lan . Tuy_nhiên\
      \ , không có thống_kê chính_thức nào về điều này ( ) . \n Tại Thụy_Điển , tiếng Phần_Lan , tiếng Meänkieli , tiếng Jiddisch\
      \ , tiếng Romani và tiếng Sami có địa_vị là các ngôn_ngữ_thiểu_số được công_nhận . Gần 90 % người Thụy_Điển có khả_năng\
      \ nói được tiếng Anh ( ) vì một phần tiếng Anh là ngoại_ngữ bắt_buộc trong trường_học ( ) và phần khác là vì tiếng Anh\
      \ có rất nhiều trong chương_trình truyền_hình . Đa_số học_sinh chọn tiếng Đức là ngoại_ngữ thứ nhì , nhưng gần đây tiếng\
      \ Tây_Ban_Nha đang được ưa_chuộng và đã vượt qua tiếng Đức tại một_số trường . Thật_ra tiếng Đức là ngoại_ngữ đầu_tiên\
      \ tại Thụy_Điển cho đến năm 1950 cũng như trong phần còn lại của Bắc_Âu ."
    - "Các tuyến đường vận_chuyển ở Ontario phát_triển từ_đường thủy_đầu và đường đi của First_Nations theo sau bởi các nhà\
      \ thám_hiểm_châu Âu . Ontario có hai tuyến đường đông - tây lớn , bắt_đầu_từ Montreal ở tỉnh lân_cận của Quebec . Tuyến\
      \ đường phía bắc , là một tuyến thương_mại lông thú lớn , di_chuyển về phía tây từ Montreal dọc theo sông Ottawa , sau\
      \ đó tiếp_tục hướng tây bắc về phía Manitoba . Các thành_phố lớn trên hoặc gần tuyến bao_gồm Ottawa , Vịnh Bắc , Sudbury\
      \ , Sault_Ste . Marie , và Thunder Bay . Tuyến phía nam , được thúc_đẩy bởi sự tăng_trưởng trong các khu định_cư do\
      \ Cơ_quan Trung_thành Thống_nhất Hoa_Kỳ và những người nhập_cư châu Âu khác , Đi theo hướng tây nam từ Montreal dọc\
      \ theo Sông St . Lawrence , Hồ_Ontario và Hồ_Erie trước khi vào Hoa_Kỳ ở Michigan . Các thành_phố lớn trên hoặc gần\
      \ tuyến bao_gồm Kingston , Belleville , Peterborough , Oshawa , Toronto , Mississauga , Kitchener - Waterloo , Hamilton\
      \ , London , Sarnia và Windsor . Tuyến đường này cũng được người nhập_cư sử_dụng rộng_rãi đến vùng Trung_Tây_Hoa_Kỳ\
      \ đặc_biệt vào cuối thế_kỷ 19 . \n Đường_cao_tốc 400 - Series tạo thành mạng_lưới xe_buýt chính ở phía nam của tỉnh\
      \ , nối_liền với nhiều cửa_khẩu biên_giới với Hoa_Kỳ , nhất là Đường_hầm Detroit - Windsor và Cầu_Ambassador và Cầu\
      \ Nước Xanh ( qua Quốc_lộ 402 ) . Một_số đường_cao_tốc chính dọc theo tuyến đường phía nam là Quốc_lộ 401 , Quốc_lộ\
      \ 417 và Quốc_lộ 400 , trong khi các đường_cao_tốc tỉnh và đường nội_bộ khác kết_nối với phần còn lại của tỉnh . \n\
      \ Các Saint Lawrence_Seaway , mà mở_rộng trên hầu_hết các phần phía nam của tỉnh và kết_nối với Đại_Tây_Dương , là chính\
      \ vận_chuyển nước đường cho hàng_hóa , đặc_biệt là quặng sắt và ngũ_cốc . Trong quá_khứ , Hồ Great_Lakes và Sông Saint_Lawrence\
      \ cũng là một tuyến vận_tải hành_khách lớn , nhưng trong nửa thế_kỷ vừa_qua hành_khách đã bị giảm xuống các dịch_vụ\
      \ phà và tham_quan du_lịch trên biển . \n Qua Đường_sắt hoạt_động dịch_vụ vận_tải hành_khách liên vùng trên Hành_lang\
      \ Windsor - Quebec , cùng với The_Canadian , một tuyến đường_sắt xuyên lục_địa từ Nam_Ontario đến Vancouver , và tàu\
      \ Sudbury - White_River . Ngoài_ra , tuyến đường_sắt Amtrak nối Ontario với các thành_phố New_York chính gồm Buffalo\
      \ , Albany và Thành_phố New_York . Ontario Northland cung_cấp dịch_vụ đường_sắt đến các điểm đến phía bắc như Moosonee\
      \ gần Vịnh James , kết_nối chúng với phía nam . \n Đường_sắt vận_chuyển hàng_hóa bị chi_phối bởi các sáng_lập xuyên\
      \ quốc_gia Đường_sắt Quốc_gia Canada và đường_sắt CP các công_ty , mà trong năm 1990 bán nhiều tuyến đường_sắt ngắn\
      \ từ mạng_lưới rộng_lớn của họ cho các công_ty tư_nhân hoạt_động chủ_yếu ở phía nam . \n Tuyến đường_sắt đi_lại khu_vực\
      \ bị giới_hạn bởi GO Transit thuộc tỉnh , và phục_vụ mạng_lưới xe lửa bao_gồm khu_vực Golden_Horseshoe . \n Các Transit_Ủy_ban\
      \ Toronto hoạt_động duy_nhất của tỉnh tàu_điện_ngầm và xe điện hệ_thống , một trong những bận_rộn nhất ở Bắc_Mỹ . OC\
      \ Transpo hoạt_động , ngoài dịch_vụ xe_buýt , tuyến đường_sắt nhẹ duy_nhất của Ontario , O - Train ở Ottawa . \n Một\
      \ tuyến tàu_điện_ngầm đường_sắt gọi là Confederation Line đang được xây_dựng tại Ottawa . Nó sẽ có 13 trạm trên 12,5\
      \ km ( 7,8 dặm ) và một phần của nó sẽ chạy dưới Downtown của thành_phố và có ba trạm ngầm . Ngoài_ra , hệ_thống đường_sắt\
      \ nhẹ Ion và xe_buýt tốc_độ cao đang được xây_dựng trong khu_vực Waterloo của tỉnh . \n Các sân_bay quan_trọng trong\
      \ tỉnh bao_gồm Sân_bay Quốc_tế Toronto_Pearson , là sân_bay bận nhộn_nhịp nhất ở Canada , đón hơn 41 triệu hành_khách\
      \ vào năm 2015 . Sân_bay Quốc_tế Ottawa_Macdonald - Cartier là sân_bay lớn thứ hai của Ontario . Toronto / Pearson và\
      \ Ottawa / Macdonald - Cartier tạo thành hai trong số ba điểm trong các tuyến không_lưu của Canada ( điểm thứ ba là\
      \ Sân_bay Quốc_tế Montréal - Pierre Elliott_Trudeau ) . \n Hầu_hết các thành_phố ở Ontario đều có các sân_bay trong\
      \ khu_vực , nhiều sân_bay có các chuyến bay từ Air Canada Jazz hoặc các hãng hàng_không và các hãng hàng không nhỏ hơn\
      \ - các chuyến bay từ các thành_phố cỡ trung như Thunder Bay , Sault_Ste . Marie , Sudbury , North Bay , Timmins , Windsor\
      \ , London và Kingston trực_tiếp đưa vào các sân_bay lớn ở Toronto và Ottawa . Bearskin_Airlines cũng điều_hành các\
      \ chuyến bay dọc theo tuyến phía đông - tây bắc , kết_nối Ottawa , Vịnh Bắc , Sudbury , Sault_Ste . Marie , Kitchener\
      \ và Thunder Bay trực_tiếp . \n Các thành_phố và khu định_cư bị cô_lập ở các khu_vực phía Bắc của tỉnh phụ_thuộc hoàn_toàn\
      \ vào dịch_vụ vận_chuyển hàng_không , hàng_không , và thậm_chí cả dịch_vụ cứu_thương ( MEDIVAC ) vì phần_lớn khu_vực\
      \ phía Bắc của tỉnh không_thể đi bằng đường_bộ hoặc đường_sắt ."
    - "Vương_quốc Anh liên_hiệp được thành_lập , sản_phẩm của Hội Hoàng_gia và các sáng_kiến khác của Anh kết_hợp với Khai\
      \ sáng Scotland để tạo nên các phát kiến trong khoa_học và kỹ_thuật . Anh phát_triển cực lớn về mậu_dịch hải ngoại với\
      \ bảo_hộ từ Hải_quân Hoàng_gia , mở_đường để hình_thành Đế_quốc Anh . Trong nước , nó thúc_đẩy cách_mạng công_nghiệp\
      \ , là một giai_đoạn biến_đổi sâu_sắc về kinh_tế - xã_hội và văn_hoá tại Anh , kết_quả là công_nghiệp_hoá nông_nghiệp\
      \ , sản_xuất , kỹ_thuật và khai mỏ , cũng như các hệ_thống đường_bộ , đường_sắt và đường thủy mới và tiên_phong nhằm\
      \ thuận_tiện để mở_rộng phát_triển . ( ) Kênh_Bridgewater thuộc Tây_Bắc Anh được khánh_thành vào năm 1761 , báo_hiệu\
      \ kỷ_nguyên kênh đào tại Anh . ( ) ( . ) Năm 1825 , tuyến đường_sắt hành_khách dùng đầu_máy_kéo hơi_nước cố_định đầu_tiên\
      \ trên thế_giới được mở_cửa cho công_chúng , đó là đường_sắt Stockton và Darlington . ( \n Trong cách_mạng công_nghiệp\
      \ , nhiều người lao_động chuyển từ nông_thôn đến các khu_vực công_nghiệp đô_thị mới để làm_việc trong các nhà_máy ,\
      \ chẳng_hạn như Manchester và Birmingham , hai thành_phố này từng lần_lượt được gán là \" thành_phố kho hàng \" và \"\
      \ công_xưởng của thế_giới \" . ( . ) ( ) Anh vẫn tương_đối ổn_định trong suốt Cách_mạng Pháp ; William Pitt Trẻ là thủ_tướng\
      \ của Anh trong giai_đoạn trị_vì của George III. Trong Các cuộc chiến_tranh của Napoléon , Napoléon lập kế_hoạch xâm_chiếm\
      \ Anh từ phía đông nam , Tuy_nhiên , kế_hoạch thất_bại khi quân của Napoleón bị người Anh đánh_bại trên biển dưới quyền\
      \ Horatio_Nelson và trên bộ dưới quyền Arthur_Wellesley . Các cuộc_chiến Napoléon khích_lệ khái_niệm về tính Anh Quốc\
      \ và dân_tộc Anh Quốc thống_nhất , chia_sẻ với người Scots và người Wales . ( . ) \n Luân_Đôn trở_thành khu_vực đô_thị\
      \ lớn nhất và đông dân nhất thế_giới trong thời_kỳ Victoria , và mậu_dịch trong Đế_quốc Anh cũng như địa_vị của quân_đội\
      \ và hải_quân Anh có được thanh_thế . ( ) Kích_động chính_trị từ các phần_tử cấp_tiến như phong_trào Hiến_chương và\
      \ phong_trào phụ_nữ yêu_cầu quyền bầu_cử thúc_đẩy các cải_cách tư_pháp và phổ_thông đầu_phiếu . ( ) Biến_đổi quyền_lực\
      \ tại Đông - Trung Âu dẫn đến Chiến_tranh thế_giới thứ nhất ; hàng trăm_nghìn_binh_sĩ Anh thiệt_mạng khi giao_tranh\
      \ bên phe Đồng_Minh . ( ) Hai thập_niên sau , Vương_quốc Liên_hiệp Anh và Bắc_Ireland lại ở bên phe Đồng_Minh . Đến\
      \ khi kết_thúc Chiến_tranh kỳ_quặc , Winston Churchill trở_thành thủ_tướng thời_chiến . Phát_triển về công_nghệ chiến_tranh\
      \ khiến nhiều thành_thị bị tàn_phá do Không_quân Đức oanh_tạc . Sau chiến_tranh , Đế_quốc Anh trải qua phi thực_dân\
      \ hoá nhanh_chóng , đồng_thời có các phát kiến nhanh_chóng về kỹ_thuật ; ô_tô trở_thành phương_tiện giao_thông chủ_yếu\
      \ và phát_triển của Frank Whittle về động_cơ phản_lực khiến di_chuyển bằng hàng không phổ_biến hơn . ( ) Mô_hình cư_trú\
      \ thay_đổi tại Anh do ô_tô cá_nhân , thiết_lập Dịch_vụ Y_tế Quốc_gia ( NHS ) vào năm 1948 . NHS của Vương_quốc Liên_hiệp\
      \ Anh và Bắc_Ireland cung_cấp chăm_sóc y_tế công_cộng miễn_phí cho toàn_bộ cư_dân thường_trú tại Vương_quốc Liên_hiệp\
      \ Anh và Bắc_Ireland tại điểm cần_thiết , kinh_phí lấy từ thuế nói_chung . Tổng_hợp , các thay_đổi này thúc_đẩy cải_cách\
      \ về chính_quyền địa_phương tại Anh vào giữa thế_kỷ XX. ( ) ( . ) \n Từ thế_kỷ XX , có phong_trào di_dân đáng_kể đến\
      \ Anh , hầu_hết là từ các phần còn lại của quần_đảo Anh , song cũng từ các quốc_gia trong Thịnh_vượng chung mà đặc_biệt\
      \ là tiểu lục_địa Ấn_Độ . ( . ) Kể từ thập_niên 1970 , có một bước chuyển_đổi lớn khỏi lĩnh_vực chế_tạo và gia_tăng\
      \ tầm quan_trọng vào ngành dịch_vụ . ( Với tư_cách là bộ_phận của Vương_quốc Liên_hiệp Anh và Bắc_Ireland , khu_vực\
      \ gia_nhập sáng_kiến thị_trường chung mang tên Cộng_đồng Kinh_tế châu Âu , tiền_thân của Liên_minh châu Âu . Kể từ cuối\
      \ thế_kỷ XX , chính_quyền Vương_quốc Liên_hiệp Anh và Bắc Ireland chuyển_hướng sang phân_quyền quản_trị tại Scotland\
      \ , Wales và Bắc_Ireland . ) Anh và Wales tiếp_tục là một khu_vực quyền_hạn pháp_lý tại Vương_quốc Liên_hiệp Anh và\
      \ Bắc_Ireland . ( ) Phân_quyền kích_thích việc nhấn_mạnh nhiều vào bản_sắc và chủ_nghĩa ái_quốc đặc_trưng Anh hơn .\
      \ ( . ) ( . ) Không có chính_phủ Anh được phân_quyền , song một nỗ_lực nhằm lập ra một hệ_thống tương_tự trên cơ_sở\
      \ phân_vùng bị cử_tri bác_bỏ thông_qua trưng_cầu dân_ý . ("
