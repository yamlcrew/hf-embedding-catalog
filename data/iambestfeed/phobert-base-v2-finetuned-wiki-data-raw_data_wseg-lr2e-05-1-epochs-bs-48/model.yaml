    \ Chí Đại_Trường bình_luận \" tóc quăn \" , \" mặt mụn \" , \" mắt nhỏ \" là dấu_vết thân_xác ; còn \" chuyện tròng mắt\
    \ có ánh_sáng phát ra , ban_đêm soi sáng cả chỗ ngồi là cảm_tưởng của người nhìn khiếp_sợ trước oai vũ của \" Thượng_công\
    \ \" \" . ( ) \n Trong cuộc_sống tình_cảm cá_nhân , giáo_sĩ Labartette mô_tả Nguyễn_Huệ là người mềm_yếu khi mà công_chúa\
    \ Lê_Ngọc_Hân thường_xuyên \" mếu khóc \" vuốt_ve tự_ái đấng trượng phu khi muốn đòi_hỏi gì đó ; ( hay Nguyễn_Huệ_phát\
    \ cuồng vì có người vợ mất ở Phú_Xuân . Chính tấm lòng say_mê đó đem đổ vào cuộc_đời Nguyễn_Huệ , vào triều chính , ở\
