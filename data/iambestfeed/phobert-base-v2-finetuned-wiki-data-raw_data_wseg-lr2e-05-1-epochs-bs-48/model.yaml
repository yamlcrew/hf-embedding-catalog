      \ . Sông Sài_Gòn bắt_nguồn từ vùng Hớn_Quản , chảy qua Thủ_Dầu Một đến Thành_phố Hồ_Chí_Minh , với chiều dài 200 km\
      \ và chảy dọc trên địa_phận thành_phố dài 80 km . Sông Sài_Gòn có lưu_lượng trung_bình vào_khoảng 54 m³ / s , bề rộng\
      \ tại thành_phố khoảng 225 m đến 370 m , độ sâu tới 20 m . Nhờ hệ_thống kênh Rạch_Chiếc , hai con sông Đồng_Nai và Sài_Gòn\
      \ nối thông ở phần nội_thành mở_rộng . Một con sông nữa của Thành_phố Hồ_Chí_Minh là sông Nhà_Bè , hình_thành ở nơi\
      \ hợp_lưu hai sông Đồng_Nai và Sài_Gòn , chảy ra biển Đông bởi hai ngả chính Soài_Rạp và Gành_Rái . Trong đó , ngả Gành\
