      \ có một hệ_thống kênh_rạch chằng_chịt : Láng_The , Bàu_Nông , rạch Tra , Bến_Cát , An_Hạ , Tham_Lương , Cầu_Bông ,\
      \ Nhiêu_Lộc – Thị_Nghè , Bến_Nghé , Tàu_Hủ , Kênh_Tẻ , Kênh Đôi ... Hệ_thống sông , kênh_rạch giúp Thành_phố Hồ_Chí_Minh\
