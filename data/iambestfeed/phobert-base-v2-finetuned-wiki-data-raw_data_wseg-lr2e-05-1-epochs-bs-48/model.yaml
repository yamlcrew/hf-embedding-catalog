  - "Vương_quốc Anh liên_hiệp được thành_lập , sản_phẩm của Hội Hoàng_gia và các sáng_kiến khác của Anh kết_hợp với Khai sáng\
    \ Scotland để tạo nên các phát kiến trong khoa_học và kỹ_thuật . Anh phát_triển cực lớn về mậu_dịch hải ngoại với bảo_hộ\
    \ từ Hải_quân Hoàng_gia , mở_đường để hình_thành Đế_quốc Anh . Trong nước , nó thúc_đẩy cách_mạng công_nghiệp , là một\
    \ giai_đoạn biến_đổi sâu_sắc về kinh_tế - xã_hội và văn_hoá tại Anh , kết_quả là công_nghiệp_hoá nông_nghiệp , sản_xuất\
    \ , kỹ_thuật và khai mỏ , cũng như các hệ_thống đường_bộ , đường_sắt và đường thủy mới và tiên_phong nhằm thuận_tiện để\
    \ mở_rộng phát_triển . ( ) Kênh_Bridgewater thuộc Tây_Bắc Anh được khánh_thành vào năm 1761 , báo_hiệu kỷ_nguyên kênh\
    \ đào tại Anh . ( ) ( . ) Năm 1825 , tuyến đường_sắt hành_khách dùng đầu_máy_kéo hơi_nước cố_định đầu_tiên trên thế_giới\
    \ được mở_cửa cho công_chúng , đó là đường_sắt Stockton và Darlington . ( \n Trong cách_mạng công_nghiệp , nhiều người\
    \ lao_động chuyển từ nông_thôn đến các khu_vực công_nghiệp đô_thị mới để làm_việc trong các nhà_máy , chẳng_hạn như Manchester\
    \ và Birmingham , hai thành_phố này từng lần_lượt được gán là \" thành_phố kho hàng \" và \" công_xưởng của thế_giới \"\
    \ . ( . ) ( ) Anh vẫn tương_đối ổn_định trong suốt Cách_mạng Pháp ; William Pitt Trẻ là thủ_tướng của Anh trong giai_đoạn\
    \ trị_vì của George III. Trong Các cuộc chiến_tranh của Napoléon , Napoléon lập kế_hoạch xâm_chiếm Anh từ phía đông nam\
    \ , Tuy_nhiên , kế_hoạch thất_bại khi quân của Napoleón bị người Anh đánh_bại trên biển dưới quyền Horatio_Nelson và trên\
    \ bộ dưới quyền Arthur_Wellesley . Các cuộc_chiến Napoléon khích_lệ khái_niệm về tính Anh Quốc và dân_tộc Anh Quốc thống_nhất\
    \ , chia_sẻ với người Scots và người Wales . ( . ) \n Luân_Đôn trở_thành khu_vực đô_thị lớn nhất và đông dân nhất thế_giới\
    \ trong thời_kỳ Victoria , và mậu_dịch trong Đế_quốc Anh cũng như địa_vị của quân_đội và hải_quân Anh có được thanh_thế\
    \ . ( ) Kích_động chính_trị từ các phần_tử cấp_tiến như phong_trào Hiến_chương và phong_trào phụ_nữ yêu_cầu quyền bầu_cử\
    \ thúc_đẩy các cải_cách tư_pháp và phổ_thông đầu_phiếu . ( ) Biến_đổi quyền_lực tại Đông - Trung Âu dẫn đến Chiến_tranh\
    \ thế_giới thứ nhất ; hàng trăm_nghìn_binh_sĩ Anh thiệt_mạng khi giao_tranh bên phe Đồng_Minh . ( ) Hai thập_niên sau\
    \ , Vương_quốc Liên_hiệp Anh và Bắc_Ireland lại ở bên phe Đồng_Minh . Đến khi kết_thúc Chiến_tranh kỳ_quặc , Winston Churchill\
    \ trở_thành thủ_tướng thời_chiến . Phát_triển về công_nghệ chiến_tranh khiến nhiều thành_thị bị tàn_phá do Không_quân\
    \ Đức oanh_tạc . Sau chiến_tranh , Đế_quốc Anh trải qua phi thực_dân hoá nhanh_chóng , đồng_thời có các phát kiến nhanh_chóng\
    \ về kỹ_thuật ; ô_tô trở_thành phương_tiện giao_thông chủ_yếu và phát_triển của Frank Whittle về động_cơ phản_lực khiến\
    \ di_chuyển bằng hàng không phổ_biến hơn . ( ) Mô_hình cư_trú thay_đổi tại Anh do ô_tô cá_nhân , thiết_lập Dịch_vụ Y_tế\
    \ Quốc_gia ( NHS ) vào năm 1948 . NHS của Vương_quốc Liên_hiệp Anh và Bắc_Ireland cung_cấp chăm_sóc y_tế công_cộng miễn_phí\
    \ cho toàn_bộ cư_dân thường_trú tại Vương_quốc Liên_hiệp Anh và Bắc_Ireland tại điểm cần_thiết , kinh_phí lấy từ thuế\
    \ nói_chung . Tổng_hợp , các thay_đổi này thúc_đẩy cải_cách về chính_quyền địa_phương tại Anh vào giữa thế_kỷ XX. ( )\
    \ ( . ) \n Từ thế_kỷ XX , có phong_trào di_dân đáng_kể đến Anh , hầu_hết là từ các phần còn lại của quần_đảo Anh , song\
    \ cũng từ các quốc_gia trong Thịnh_vượng chung mà đặc_biệt là tiểu lục_địa Ấn_Độ . ( . ) Kể từ thập_niên 1970 , có một\
    \ bước chuyển_đổi lớn khỏi lĩnh_vực chế_tạo và gia_tăng tầm quan_trọng vào ngành dịch_vụ . ( Với tư_cách là bộ_phận của\
    \ Vương_quốc Liên_hiệp Anh và Bắc_Ireland , khu_vực gia_nhập sáng_kiến thị_trường chung mang tên Cộng_đồng Kinh_tế châu\
    \ Âu , tiền_thân của Liên_minh châu Âu . Kể từ cuối thế_kỷ XX , chính_quyền Vương_quốc Liên_hiệp Anh và Bắc Ireland chuyển_hướng\
    \ sang phân_quyền quản_trị tại Scotland , Wales và Bắc_Ireland . ) Anh và Wales tiếp_tục là một khu_vực quyền_hạn pháp_lý\
    \ tại Vương_quốc Liên_hiệp Anh và Bắc_Ireland . ( ) Phân_quyền kích_thích việc nhấn_mạnh nhiều vào bản_sắc và chủ_nghĩa\
    \ ái_quốc đặc_trưng Anh hơn . ( . ) ( . ) Không có chính_phủ Anh được phân_quyền , song một nỗ_lực nhằm lập ra một hệ_thống\
    \ tương_tự trên cơ_sở phân_vùng bị cử_tri bác_bỏ thông_qua trưng_cầu dân_ý . ("
