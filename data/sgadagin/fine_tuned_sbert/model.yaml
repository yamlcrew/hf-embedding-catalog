    - 'Windows 8 will be challenge for Malware writers

      Microsoft™s security researcher believe that upcoming operating system, Windows 8 is a step forward in security and
      Windows 8 will be far better at protecting against malware than it''s predecessors.


      Chris Valasek, a senior security research scientist at development testing firm Coverity, began examining the security
      features of Windows 8 last autumn, before the consumer previews of the upcoming revamp of the new Microsoft OS came
      out.


      "There are always going to be vulnerabilities but you can make it difficult to leverage vulnerabilities to write exploits."
      One major change between Windows 7 and 8 is the addition of more exploit-mitigation technologies, however. Windows Memory
      Managers (specifically the Windows Heap Manager and Windows Kernel Pool Allocator) are designed to make it far harder
      for attackers to exploit buffer-overflow vulnerabilities and the like to push malware onto vulnerable systems.


      The "security sandbox" for applications for Windows 8 will also be a great step forward. "These new Windows 8 Apps will
      be contained by a much more restrictive security sandbox, which is a mechanism to prevent programs from performing certain
      actions," Valasek explains.


      "This new App Container provides the operating system with a way to make more fine-grained decisions on what actions
      certain applications can perform, instead of relying on the more broad ''Integrity Levels'' that debuted in Windows
      Vista/7.


      Windows 8 also comes with a new version of Internet Explorer, Microsoft''s browser software. Internet Explorer 10 will
      come with a mode that disables support for third-party plug-ins such as Flash and Java.


      '
    - 'Ransomware, a threat to internet users that continues to grow in popularity with cyber criminals due to its success
      and monetary potential. This is nothing new and to be expected. I have noticed many discussions on underground hacking
      forums about "How to create Ransomware like Cryptolocker malware" or "Malware - hacking tool-kit with ransomware features".

      Security intelligence provider, IntelCrawler has discovered a new ransomware variant called Locker that demands $150
      (£92) to restore files that it has encrypted.


      Like Cryptolocker, this new ransomware is also nasty because infected users are in danger of losing their personal files
      forever.


      Locker mainly spreads by drive-by downloads from compromised websites, disguised itself as MP3 files and use system
      software vulnerabilities to infect the end user.


      Once it has infected a system, malware first checks the infected machine has an internet connection or not. Then it
      deletes any original files from the victim''s computer after using AES-CTR for encrypting the files on infected devices
      and add ". perfect" extension to them.


      Locker''s encryption is based on an open source tool called ''TurboPower LockBox'' library. After encrypting all files,
      the malware place a "CONTACT.TXT" file in each directory, which provides contact details of the author to buy the decryption
      key and once the ransom is paid, each victim gets a key to unscramble files.


      The good news is that the researchers are working on the universal decryption software in order to help the victims.
      "It appears that the hackers are simply comparing the list of infected IP addresses of users, along with their host
      names," according IntelCrawler.


      IntelCrawler had discovered 50 different builds of the malware, which are being sold in underground markets for pay-per
      install programs. One builds had just under 6,000 infected machines. ZdNet reported.


      Malware will encrypt all drives visible on an infected system, so you must be sure that your backups are stored remotely
      or in a location that is not simply another drive partition or mapping to another location.


      The malware infects users from the United States, Turkey, Russia, Germany and the Netherlands. Users should remain vigilant
      about their security. Please double check the legitimacy of links received in emails and ensure you have your antivirus
      up to date to help protect against such threats.


      '
  - source_sentence: 'Security Event : Hack In Paris (16-17 June, 2011)



      Hack In Paris is an international and corporate security event that will take place in Disneyland Paris® fromJune 16th
      to 17th of 2011. Please refer to the homepage to get up-to-date information about the event.


      Topics

      The following list contains major topics the conference will cover. Please consider submitting even if the subject of
      your research is not listed here.

      Advances in reverse engineering

      Vulnerability research and exploitation

      Penetration testing and security assessment

      Malware analysis and new trends in malicous codes

      Forensics, IT crime & law enforcement

      Privacy issues: LOPPSI, HADOPI, …

      Low-level hacking (console security & mobile devices)

      Risk management and ISO 27001

      Dates

      January 20: CFP announced

      March 30: Submission deadline

      April 15: Notification sent to authors

      April 17: Program announcement

