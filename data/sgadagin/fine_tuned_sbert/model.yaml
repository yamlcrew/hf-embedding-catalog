    - 'Android Security Squad, the China-based group that uncovered a second Android master key vulnerability that might be
      abused to modify smartphone apps without breaking their digital signatures.


      The whole point of digitally signing a document or file is to prove the file hasn''t been modified. The process uses
      a form of public-key cryptography. In Chinese version of hacking attack, malicious code can be added into the file headers,
      but the method is limited because targeted files need to be smaller than 64K in size.



      APK files are packed using a version of the widespread ZIP archiving algorithm. Most ZIP implementations won''t permit
      two same-named files in one archive, but the algorithm itself doesn''t forbid that possibility. So basically, two versions
      of the classes.dex file are placed inside of the package, the original and a hacked alternative.


      When checking an app''s digital signature, the Android OS looks at the first matching file, but when actually executing
      and launching the file, it grabs the last one. To Trojanize an app, then, all you need to do is shoehorn your malicious
      code into it using a name that already exists within the app.


      The flaw is very similar to the first master key vulnerability recently announced by researchers from mobile security
      firm Bluebox Security. According to BlueBox, 99% of Android devices are vulnerable to this attack. Google has already
      patched the flaw and posted it to the Android Open Source Project (AOSP).


      You can use ReKey, a free mobile app that''s designed to patch the Android master key vulnerability that''s present
      in an estimated 900 million devices that run Android and that could be exploited by attackers to take full control of
      a device.


      Always get your apps from legitimate sources, always check to make sure the developer name is valid, and configure your
      phone so it doesn''t permit installing apps from unknown sources.


      '
    - 'Cyber criminals are using popular note-taking app Evernote as Command-and-Control Server to give commands to the malware
      installed on infected PCs using botnets.


      TrendMicro uncovered a malware detected as "BKDR_VERNOT.A" tried to communicate with Command-and-Control Server using
      Evernote.



      Malware delivered via an executable file that installs the malware as a dynamic-link library. The installer then ties
      the DLL into a legitimate running process, hiding it from casual detection. Once installed, BKDR_VERNOT.A can perform
      several backdoor commands such as downloading, executing, and renaming files. It then gathers information from the infected
      system, including details about its OS, timezone, user name, computer name, registered owner and organization.

      Researchers also pointed out that the backdoor may have also used Evernote as a location to upload stolen data. "Unfortunately,
      during our testing, it was not able to login using the credentials embedded in the malware. This is possibly a security
      measure imposed by Evernote following its recent hacking issue."


      "Though this is a clever maneuver to avoid detection, this is not the first time that a legitimate service like Evernote
      was used as a method of evasion."


      Like Evernote, Google Docs, Twitter and others have been misused in the past.


      '
  - source_sentence: 'U.S. has the top Security Agencies like NSA, FBI to tackle cyber crime and terrorism with their high
      profile surveillance technologies, but even after that U.S is proudly hosting 44% of the entire cloud based malware
      distribution.


      With the enhancement in Internet technology, Cloud computing has shown the possibility of existence and now has become
      an essential gradient for any Internet Identity.


      Cloud services are designed in such a way that it is easy to maintain, use, configure and can be scaled depending upon
      the requirement of the service being provided using the CLOUD technology with cost effective manner.


      Due to the Easy and Cost effective alternative of traditional computing, Malware writers are using the big cloud hosting
      platforms to quickly and effectively serve malware to Internet users, allowing them to bypass detection and geographic
      blacklisting by serving from a trusted provider.


      Hiding behind trusted domains and names is not something new. According to recently published SERT Q4 2013 Threat Intelligence
      Report, the malware distributors are using Cloud Services from Amazon, GoDaddy and Google like a legitimate customer,
      allowing them to infect millions of computers and vast numbers of enterprise systems.


      The Cloud-based hosting services let malware distributors to avoid the detection because repeatedly changes IP addresses
      and domain names to avoid detection. Amazon and GoDaddy were identified as the top malware-hosting providers, with a
      16 percent and a 14 percent share, respectively.

      Major Additional findings include:

      United States hosts 4.6 times more malware than the next leading country.

      58% of malicious files obtained were identified as HTML files, 26% were directly executable.

      Many malware developers and distributors are utilizing social engineering tactics, including the use of trusted keywords
      and services, to evade detection and increase potential infection counts.

      A single malicious domain was spread across 20 countries, 67 providers and 199 unique IPs evade detection.

      The SERT Research team collected a large number of samples from more than 12,000 Registrars, 22,000 ISPs (Internet Service
      Providers) and tested all malicious packages with more than 40 antivirus engines, output of which is concluded below:

      The majority of the top malware sites is domains commonly associated with the Potentially Unwanted Applications (PUA),
      more commonly known as adware, type of malware distributions.

      "Researchers found that a significant portion of the malware sampled consisted of Microsoft Windows 32-bit Portable
      Executable (PE32) files being used to distribute pay-per-install applications known as potentially unwanted applications
      (PUAs)."

      The report claimed that these malware is undetectable from over 40 anti-virus engines, that can act as a gateway for
      exploits and more than half of malware found being distributed by HTML web pages.


      '
