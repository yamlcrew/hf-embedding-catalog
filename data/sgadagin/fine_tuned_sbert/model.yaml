  - 'Attention WordPress users!


    Your website could easily get hacked if you are using "Ultimate Addons for Beaver Builder," or "Ultimate Addons for Elementor"
    and haven''t recently updated them to the latest available versions.


    Security researchers have discovered a critical yet easy-to-exploit authentication bypass vulnerability in both widely-used
    premium WordPress plugins that could allow remote attackers to gain administrative access to sites without requiring any
    password.


    What''s more worrisome is that opportunistic attackers have already started exploiting this vulnerability in the wild
    within 2 days of its discovery in order to compromise vulnerable WordPress websites and install a malicious backdoor for
    later access.


    Both vulnerable plugins, made by software development company Brainstorm Force, are currently powering over hundreds of
    thousands of WordPress websites using Elementor and Beaver Builder frameworks, helping website admins and designers extend
    the functionality of their websites with more widgets, modules, page templates.


    Discovered by researchers at web security service MalCare, the vulnerability resides in the way both plugins let WordPress
    account holders, including administrators, authenticate via Facebook and Google login mechanisms.


    Image credit: WebARX


    According to the vulnerability''s advisory, due to lack of checks in the authentication method when a user login via Facebook
    or Google, vulnerable plugins can be tricked into allowing malicious users to login as any other targeted user without
    requiring any password.


    "However, the Facebook and Google authentication methods did not verify the token returned by Facebook and Google, and
    since they don''t require a password, there was no password check," explained WebARX researchers, who also analysed the
    flaw and confirmed its active exploitation.


    "To exploit the vulnerability, the hacker needs to use the email ID of an admin user of the site. In most cases, this
    information can be retrieved fairly easily," MalCare said.


    In an email to The Hacker News, WebARX confirmed that attackers are abusing this flaw to install a fake SEO stats plugin
    after uploading a tmp.zip file on the targeted WordPress server, which eventually drops a wp-xmlrpc.php backdoor file
    to the root directory of the vulnerable site.


    MalCare discovered this vulnerability on Wednesday that affects below-listed versions of the plugins and reported it to
    the developers on the same day, who then quickly addressed the issue and released patched versions of both within just
    7 hours.



    Ultimate Addons for Elementor <= 1.20.0

    Ultimate Addons for Beaver Builder <= 1.24.0



    The authentication bypass vulnerability has been patched with the release of "Ultimate Addons for Elementor version 1.20.1"
    and "Ultimate Addons for Beaver Builder version 1.24.1," which affected websites are highly recommended to install as
    soon as possible.


    '
- source_sentence: 'Exclusive — If you have not updated your website to the latest WordPress version 5.0.3, it''s a brilliant
    idea to upgrade the content management software of your site now. From now, I mean immediately.


    Cybersecurity researchers at RIPS Technologies GmbH today shared their latest research with The Hacker News, revealing
    the existence of a critical remote code execution vulnerability that affects all previous versions of WordPress content
    management software released in the past 6 years.


    The remote code execution attack, discovered and reported to the WordPress security team late last year, can be exploited
    by a low privileged attacker with at least an "author" account using a combination of two separate vulnerabilities—Path
    Traversal and Local File Inclusion—that reside in the WordPress core.


    The requirement of at least an author account reduces the severity of this vulnerability to some extent, which could be
    exploited by a rogue content contributor or an attacker who somehow manages to gain author''s credential using phishing,
    password reuse or other attacks.

    "An attacker who gains access to an account with at least author privileges on a target WordPress site can execute arbitrary
    PHP code on the underlying server, leading to a full remote takeover," Scannell says.


    Video Demonstration — Here''s How the Attack Works

    According to Simon Scannell, a researcher at RIPS Technologies GmbH, the attack takes advantage of the way WordPress image
    management system handles Post Meta entries used to store description, size, creator, and other meta information of uploaded
    images.


    Scannell found that a rogue or compromised author account can modify any entries associated with an image and set them
    to arbitrary values, leading to the Path Traversal vulnerability.

    "The idea is to set _wp_attached_file to evil.jpg?shell.php, which would lead to an HTTP request being made to the following
    URL: https://targetserver.com/wp-content/uploads/evil.jpg?shell.php," Scannell explains.

    And, "it is still possible to plant the resulting image into any directory by using a payload such as evil.jpg?/../../evil.jpg."

    The Path Traversal flaw in combination with a local file inclusion flaw in theme directory could then allow the attacker
    to execute arbitrary code on the targeted server.


    The attack, as shown in the proof-of-concept video shared by the researcher, can be executed within seconds to gain complete
    control over a vulnerable WordPress blog.


    According to Scannell, the code execution attack became non-exploitable in WordPress versions 5.0.1 and 4.9.9 after patch
    for another vulnerability was introduced which prevented unauthorized users from setting arbitrary Post Meta entries.


    However, the Path Traversal flaw is still unpatched even in the latest WordPress version and can be exploited if any installed
    3rd-party plugin incorrectly handles Post Meta entries.


    Scannell confirmed that the next release of WordPress would include a fix to completely address the issue demonstrated
    by the researcher.


    '
