    - 'While Windows users are currently in fear of getting their systems hijacked by the WannaCry ransomware outbreak, Apple
      users are sitting relaxed, thinking that malware attacks are something that happens to Windows users, and not Apple.


      But you are mistaken – Apple products are also not immune to the hack attacks and malware infections, as an ebook can
      hack your Mac, iPhone, and iPad.


      Apple on Monday pushed out software updates for iOS, macOS, Safari, tvOS, iCloud, iTunes, and watchOS to fix a total
      of 67 unique security vulnerabilities, many of which allows attackers to perform remote code execution on an affected
      system.


      iOS is 10.3.2 for iPhone, iPad, and iPod


      Apple''s mobile operating system iOS 10.3.2 for the iPhone, iPad and iPod touch addresses 41 security flaws, 23 of which
      resides in WebKit, including 17 remote code execution and 5 cross-site scripting (XSS) vulnerabilities.


      Besides this, iOS 10.3.2 also addresses a pair of flaws in iBooks for iOS (CVE-2017-2497, CVE-2017-6981) that could
      allow e-books to open arbitrary websites and execute malicious code with root privileges.


      Other flaws addressed in iOS 10.3.2 include a memory corruption issue in AVE Video Encoder that could allow a malicious
      application to gain kernel-level privileges, and a certificate validation issue in the certificate trust policy for
      handling of untrusted certificates.


      Apple users can install iOS 10.3.2 by connecting their iOS devices to iTunes or downloading it directly by going to
      the Settings → General → Software Update.


      macOS Sierra 10.12.5 for El Capitan and Yosemite


      Apple''s Mac operating system macOS Sierra 10.12.5 addresses a total of 37 vulnerabilities, including a pair of bugs
      in iBook that allow the execution of arbitrary code with root privileges, and a separate bug in iBook that allows an
      application to escape its secure sandbox.


      Other flaws addressed in macOS Sierra 10.12.5 include a Wi-Fi networking issue that allows the theft of network credentials,
      elevation of privilege bugs in both the Intel and Nvidia graphics drivers, and four different arbitrary code execution
      flaws in SQLite.


      Mac users can download the update through the App Store → Updates. Alternatively, macOS Sierra users can be download
      Sierra 10.12.5 as a stand-alone update, OS X El Capitan users can download the update here, and OS X Yosemite users
      can get the security update here.


      Safari 10.1.1 for Apple Browser


      Safari 10.1.1 addresses a total of 26 security issues, 23 of which resides in WebKit, many of which are also patched
      in the iOS 10.3.2.


      Rest three vulnerabilities are patched in the Safari browser itself.


      The Safari 10.1.1 update can be downloaded by going to the App Store → Updates on El Capitan and Yosemite systems.


      watchOS 3.2.2 for Apple Watch


      Apple Watch users should install watchOS 3.2.2 that patches a total of 12 security vulnerabilities, four of which could
      be used by attackers to execute remote code execution on the affected device.


      Users of Apple Watch can download watchOS 3.2.2 by connecting their watch to its charger, and opening the Apple Watch
      app → My Watch tab → General → Software Update on their iPhone.


      tvOS 10.2.1 for Apple TV


      Apple has also released tvOS 10.2.1 to patch a total of 23 vulnerabilities, 12 of which resides in WebKit engine that
      could allow an attacker to perform cross-site scripting and remote code execution attacks on a target device.


      The tvOS 10.2.1 update can be downloaded directly from the Apple TV by going to Settings → System → Update Software.


      iTunes 12.6.1 for Windows and iCloud for Windows 6.2.1


      Meanwhile, Apple also released patches for Windows users using iTunes and iCloud. Both iTunes 12.6.1 and iCloud 6.2.1
      patches a single remote code execution bug in WebKit for Windows 7 and later.


      Apple users are recommended to update all their operating systems for Apple products and Safari as soon as possible
      before cyber criminals exploited them. Patches are available through automatic updates.


      '
    - 'A really bad year for the world''s second-largest email service provider, Yahoo Mail! The company announced today,
      ''we identified a coordinated effort to gain unauthorized access to Yahoo Mail accounts'', user names and passwords
      of its email customers have been stolen and are used to access multiple accounts.


      Yahoo did not say how many accounts have been affected, and neither they are sure about the source of the leaked users''
      credentials. It appears to have come from a third party database being compromised, and not an infiltration of Yahoo''s
      own servers.


      "We have no evidence that they were obtained directly from Yahoo''s systems. Our ongoing investigation shows that malicious
      computer software used the list of usernames and passwords to access Yahoo Mail accounts. The information sought in
      the attack seems to be names and email addresses from the affected accounts'' most recent sent emails."


      For now, Yahoo is taking proactive actions to protect their affected users, "We are resetting passwords on impacted
      accounts and we are using second sign-in verification to allow users to re-secure their accounts. Impacted users will
      be prompted (if not, already) to change their password and may receive an email notification or an SMS text if they
      have added a mobile number to their account."


      People frequently use the same passwords on multiple accounts, so possibly hackers are brute-forcing Yahoo accounts
      with the user credentials stolen from other data breaches.


      Yahoo users can prevent account hijacks by using a strong and unique password. You can use ''Random strong password
      generator'' feature of DuckDuckGo search engine to get a unique & strong password.


      Users are also recommended to enable two-factor authentication, which requires a code texted to the legitimate user''s
      mobile phone whenever a login attempt is made from a new computer.


      Yahoo! was hacked in July 2012, with attackers stealing 450,000 email addresses and passwords from a Yahoo! contributor
      network.


      Readers can also download two free Whitepaper related to the Email and account security:

      Cloud-Based Email Archiving

      Email Data Loss Prevention

      Well, Yahoo is now working with federal law enforcement as a part of its investigation.


      '
  - source_sentence: 'Security researchers have spotted a new malware campaign in the wild that spreads an advanced botnet
      malware by leveraging at least three recently disclosed vulnerabilities in Microsoft Office.


      Dubbed Zyklon, the fully-featured malware has resurfaced after almost two years and primarily found targeting telecommunications,
      insurance and financial services.


      Active since early 2016, Zyklon is an HTTP botnet malware that communicates with its command-and-control servers over
      Tor anonymising network and allows attackers to remotely steal keylogs, sensitive data, like passwords stored in web
      browsers and email clients.


      Zyklon malware is also capable of executing additional plugins, including secretly using infected systems for DDoS attacks
      and cryptocurrency mining.


      Different versions of the Zyklon malware has previously been found being advertised on a popular underground marketplace
      for $75 (normal build) and $125 ( Tor-enabled build).


      According to a recently published report by FireEye, the attackers behind the campaign are leveraging three following
      vulnerabilities in Microsoft Office that execute a PowerShell script on the targeted computers to download the final
      payload from its C&C server.


      1) .NET Framework RCE Vulnerability (CVE-2017-8759)—this remote code execution vulnerability exists when Microsoft .NET
      Framework processes untrusted input, allowing an attacker to take control of an affected system by tricking victims
      into opening a specially crafted malicious document file sent over an email. Microsoft already released a security patch
      for this flaw in September updates.


      2) Microsoft Office RCE Vulnerability (CVE-2017-11882)—it''s a 17-year-old memory corruption flaw that Microsoft patched
      in November patch update allows a remote attacker to execute malicious code on the targeted systems without requiring
      any user interaction after opening a malicious document.


      3) Dynamic Data Exchange Protocol (DDE Exploit)—this technique allows attackers to leverage a built-in feature of Microsoft
      Office, called DDE, to perform code execution on the targeted device without requiring Macros to be enabled or memory
      corruption.


      As explained by the researchers, attackers are actively exploiting these three vulnerabilities to deliver Zyklon malware
      using spear phishing emails, which typically arrives with an attached ZIP file containing a malicious Office doc file.


      Once opened, the malicious doc file equipped with one of these vulnerabilities immediately runs a PowerShell script,
      which eventually downloads the final payload, i.e., Zyklon HTTP malware, onto the infected computer.

      "In all these techniques, the same domain is used to download the next level payload (Pause.ps1), which is another PowerShell
      script that is Base64 encoded," the FireEye researchers said.

      "The Pause.ps1 script is responsible for resolving the APIs required for code injection. It also contains the injectable
      shellcode."

      "The injected code is responsible for downloading the final payload from the server. The final stage payload is a PE
      executable compiled with .Net framework."

      Interestingly, the PowerShell script connects to a dotless IP address (example: https://3627732942) to download the
      final payload.


      What is Dotless IP Address? If you are unaware, dotless IP addresses, sometimes referred as ''Decimal Address,'' are
      decimal values of IPv4 addresses (represented as dotted-quad notation). Almost all modern web browsers resolve decimal
      IP address to its equivalent IPV4 address when opened with "https://" following the decimal value.


      For example, Google''s IP address 216.58.207.206 can also be represented as https://3627732942 in decimal values (Try
      this online converter).


      The best way to protect yourself and your organisation from such malware attacks are always to be suspicious of any
      uninvited document sent via an email and never click on links inside those documents unless adequately verifying the
      source.


      Most importantly, always keep your software and systems up-to-date, as threat actors incorporate recently discovered,
      but patched, vulnerabilities in popular software—Microsoft Office, in this case—to increase the potential for successful
      infections.


