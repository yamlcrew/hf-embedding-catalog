widgetData:
- source_sentence: Quản lý và sử dụng phí bảo vệ môi trường đối với nước thải công nghiệp được quy định ra sao?
  sentences:
  - 'Điều 16. Trách nhiệm của Uỷ ban nhân dân cấp huyện, cấp xã nơi có đê.  điểm c) trang bị và hướng dẫn việc quản lý sử
    dụng các dụng cụ, sổ sách cho các đội tuần tra, canh gác đê theo quy định tại khoản 2 điều 6 của thông tư này. '
  - Điều 33. Quản lý tài khoản, tài sản ký quỹ của thành viên bù trừ.  khoản 6. loại ký quỹ, phương pháp xác định mức ký quỹ,
    phương thức ký quỹ, thời hạn ký quỹ, bổ sung ký quỹ, chuyển giao tài sản ký quỹ, phương thức định giá tài sản ký quỹ,
    xác định lãi lỗ vị thế, hoạt động quản lý tài khoản và tài sản ký quỹ của thành viên bù trừ thực hiện theo quy định của
    bộ trưởng bộ tài chính và quy chế của tổng công ty lưu ký và bù trừ chứng khoán việt nam.
  - Điều 4. Nguyên tắc quản lý và sử dụng phí.  khoản 3. phí thu từ các hoạt động dịch vụ do tổ chức được cơ quan nhà nước
    có thẩm quyền giao thực hiện được để lại một phần hoặc toàn bộ số tiền phí thu được để trang trải chi phí hoạt động cung
    cấp dịch vụ, thu phí được xác định theo quy định tại điều 5 nghị định này; phần còn lại (nếu có) nộp ngân sách nhà nước,
    trừ trường hợp chính phủ có quy định khác thì thực hiện theo quy định của chính phủ. số tiền phí được để lại là doanh
    thu của tổ chức thu phí.
- source_sentence: Ngày bầu cử đại biểu Quốc Hội có phải là ngày chủ nhật?
  sentences:
  - 'Điều 16. Cử quốc thiều nước Cộng hòa xã hội chủ nghĩa Việt Nam.  khoản 1. quốc thiều việt nam được cử trong các cuộc
    mít tinh, chiêu đãi chào mừng quốc khánh, ngày lễ lớn của việt nam hoặc kỷ niệm sự kiện quan trọng trong quan hệ giữa
    việt nam với quốc gia hay tổ chức quốc tế tiếp nhận phù hợp với quy định, thông lệ lễ tân của quốc gia, tổ chức quốc tế
    tiếp nhận. '
  - 'Điều 4. Giải thích từ ngữ.  khoản 36. quản lý quỹ đầu tư chứng khoán là hoạt động quản lý trong việc mua, bán, nắm giữ
    chứng khoán và các tài sản khác của quỹ đầu tư chứng khoán. '
  - 'Điều 52. Giới thiệu người của cơ quan, tổ chức, đơn vị ứng cử đại biểu Hội đồng nhân dân.  khoản 4. ban công tác mặt
    trận ở thôn, tổ dân phố dự kiến người của thôn, tổ dân phố để giới thiệu ứng cử đại biểu hội đồng nhân dân cấp xã và phối
    hợp với trưởng thôn, tổ trưởng tổ dân phố tổ chức hội nghị cử tri để thảo luận, giới thiệu người ứng cử đại biểu hội đồng
    nhân dân cấp xã. việc giới thiệu người ứng cử đại biểu hội đồng nhân dân cấp xã ở thôn, tổ dân phố do ủy ban thường vụ
    quốc hội hướng dẫn; '
- source_sentence: Nghiên cứu y sinh học đa trung tâm là gì?
  sentences:
  - 'Điều 64. Vi phạm quy định về cung cấp, sử dụng thiết bị vô tuyến điện được miễn Giấy phép sử dụng tần số vô tuyến điện.  khoản
    2. phạt tiền từ < mức phạt tiền > đến < mức phạt tiền > đối với hành vi sản xuất hoặc nhập khẩu thiết bị vô tuyến điện
    thuộc danh mục thiết bị vô tuyến điện được miễn giấy phép sử dụng tần số vô tuyến điện nhưng không thực hiện chứng nhận
    và công bố hợp quy trước khi đưa vào lưu thông trên thị trường. '
  - 'Điều 3. Giải thích từ ngữ.  khoản 19. nguy cơ (risk) là xác suất mà một sự kiện hoặc kết quả thuận lợi hay bất lợi xảy
    ra trong một khoảng thời gian xác định của nghiên cứu theo tiếp cận của dịch tễ. '
  - 'Điều 9. Nội dung tuần tra, canh gác đê.  điểm d) mỗi kíp tuần tra phải kiểm tra vượt quá phạm vi phụ trách về hai phía,
    mỗi phía 50m. đối với những khu vực đã từng xảy ra sự cố hư hỏng, phải kiểm tra quan sát rộng hơn để phát hiện sự cố. '
- source_sentence: Không treo biển thông báo không bán thuốc lá cho người dưới 18 tuổi phạt 1 triệu được quy định như thế
    nào?
  sentences:
  - 'Điều 49. Hành vi vi phạm về đăng ký hợp đồng theo mẫu, điều kiện giao dịch chung.  điểm c) không áp dụng đúng hợp đồng
    theo mẫu, điều kiện giao dịch chung đã đăng ký với cơ quan quản lý nhà nước có thẩm quyền về bảo vệ quyền lợi người tiêu
    dùng theo quy định. '
  - Điều 15. Khen thưởng, kỷ Luật.  khoản 2. những đơn vị và cá nhân vi phạm quy định tại thông tư này tuỳ theo lỗi nặng nhẹ
    sẽ bị thi hành kỷ luật từ cảnh cáo đến truy tố trước pháp luật của nhà nước.
  - 'Điều 81. Tước quyền sử dụng giấy phép, chứng chỉ hành nghề có thời hạn hoặc đình chỉ hoạt động có thời hạn trong lĩnh
    vực giao thông đường bộ, đường sắt.  khoản 5. trường hợp người có hành vi vi phạm bị áp dụng hình thức xử phạt tước quyền
    sử dụng giấy phép, chứng chỉ hành nghề nhưng thời hạn sử dụng còn lại của giấy phép, chứng chỉ hành nghề đó ít hơn thời
    hạn bị tước thì người có thẩm quyền vẫn ra quyết định xử phạt có áp dụng hình thức tước quyền sử dụng giấy phép, chứng
    chỉ hành nghề theo quy định đối với hành vi vi phạm. trong thời gian bị tước quyền sử dụng giấy phép, chứng chỉ hành nghề,
    cá nhân, tổ chức không được làm thủ tục cấp đổi, cấp mới giấy phép, chứng chỉ hành nghề. '
- source_sentence: Quy định về trao đổi dữ liệu thi hành án hình sự được quy định như thế nào?
  sentences:
  - Điều 13. Quy định về bàn giao giữa các kíp trực. sau mỗi đợt kiểm tra, các kíp tuần tra, canh gác đê phải ghi chép đầy
    đủ tình hình diễn biến và hư hỏng đê điều vào sổ nhật ký tuần tra, canh gác theo mẫu quy định và bàn giao đầy đủ cho kíp
    sau. người thay mặt kíp giao và nhận phải ký và ghi rõ họ tên, ngày giờ vào sổ. sau mỗi ngày đội trưởng và cán bộ chuyên
    trách quản lý đê điều ký xác nhận tình hình trong ngày để theo dõi và làm cơ sở cho việc chi trả thù lao theo quy định.
  - 'Điều 33. Báo cáo của tổ chức tư vấn hồ sơ chào bán trái phiếu, tổ chức đấu thầu, bảo lãnh, đại lý phát hành, tổ chức
    đăng ký, lưu ký trái phiếu và Sở giao dịch chứng khoán.  điểm b) ngoài chế độ báo cáo định kỳ theo quy định tại điểm a
    khoản này, sở giao dịch chứng khoán báo cáo đột xuất cho ủy ban chứng khoán nhà nước và bộ tài chính theo yêu cầu của
    cơ quan quản lý. '
  - 'Điều 12. Trao đổi dữ liệu giữa cơ sở dữ liệu về thi hành án hình sự và các cơ sở dữ liệu khác liên quan.  khoản 1. việc
    trao đổi dữ liệu giữa cơ sở dữ liệu về thi hành án hình sự và các cơ sở dữ liệu khác liên quan phải thực hiện theo quy
    định của pháp luật và quy định của bộ công an, bộ quốc phòng. '
