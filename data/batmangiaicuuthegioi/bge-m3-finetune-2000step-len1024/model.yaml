      4. phạt tiền từ < mức phạt tiền > đến < mức phạt tiền > trên mỗi người vượt quá quy định được phép chở của phương tiện
      nhưng tổng mức phạt tiền tối đa không vượt quá < mức phạt tiền > đối với người điều khiển xe ô tô chở hành khách chạy
      tuyến có cự ly lớn hơn 300 km thực hiện hành vi vi phạm: chở quá từ 02 người trở lên trên xe đến 9 chỗ, chở quá từ 03
