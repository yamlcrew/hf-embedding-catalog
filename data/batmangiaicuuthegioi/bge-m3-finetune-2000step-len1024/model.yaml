  sentences:
  - 'Điều 27. Thanh toán chi phí khám bệnh, chữa bệnh một số trường hợp. khoản 1. thanh toán chi phí khám bệnh, chữa bệnh
    đối với trẻ em dưới 6 tuổi trong trường hợp chưa có thẻ bảo hiểm y tế: cơ sở khám bệnh, chữa bệnh tổng hợp danh sách trẻ
    em dưới 6 tuổi và chi phí khám bệnh, chữa bệnh bảo hiểm y tế theo phạm vi được hưởng và mức hưởng gửi cơ quan bảo hiểm
    xã hội thanh toán theo quy định. cơ quan bảo hiểm xã hội căn cứ danh sách số trẻ em đã được khám bệnh, chữa bệnh do cơ
    sở khám bệnh, chữa bệnh chuyển đến, có trách nhiệm kiểm tra, xác minh việc cấp thẻ bảo hiểm y tế cho trẻ; thực hiện thanh
    toán chi phí khám bệnh, chữa bệnh. trường hợp trẻ em chưa được cấp thẻ thì thực hiện cấp thẻ theo quy định. Thanh toán
    chi phí khám bệnh, chữa bệnh một số trường hợp. khoản 2. thanh toán chi phí khám bệnh, chữa bệnh đối với người đã hiến
    bộ phận cơ thể người phải điều trị ngay sau khi hiến mà chưa có thẻ bảo hiểm y tế: cơ sở khám bệnh, chữa bệnh sau khi
    lấy bộ phận cơ thể người có trách nhiệm tổng hợp danh sách số người đã hiến và chi phí khám bệnh, chữa bệnh theo phạm
    vi được hưởng và mức hưởng bảo hiểm y tế sau khi hiến, gửi cơ quan bảo hiểm xã hội để thanh toán theo quy định. cơ quan
    bảo hiểm xã hội căn cứ danh sách số người đã hiến bộ phận cơ thể đã được khám bệnh, chữa bệnh sau khi hiến và chi phí
    do cơ sở khám bệnh, chữa bệnh chuyển đến để thực hiện thanh toán, cấp thẻ bảo hiểm y tế. Thanh toán chi phí khám bệnh,
    chữa bệnh một số trường hợp. điểm c) trường hợp người bệnh có số tiền cùng chi trả vượt quá 06 tháng lương cơ sở được
    tính từ ngày 01 tháng 01, quỹ bảo hiểm y tế thanh toán 100% chi phí khám bệnh chữa bệnh trong phạm vi quyền lợi của người
    bệnh kể từ thời điểm người bệnh tham gia đủ 05 năm liên tục đến hết ngày 31 tháng 12 của năm đó. Thanh toán chi phí khám
    bệnh, chữa bệnh một số trường hợp. khoản 4. trường hợp chuyển tuyến khám bệnh, chữa bệnh đối với người bệnh cần phải có
    nhân viên y tế đi kèm và có sử dụng thuốc, vật tư y tế theo yêu cầu chuyên môn trong quá trình vận chuyển, thì chi phí
    thuốc, vật tư y tế được tổng hợp vào chi phí điều trị của cơ sở khám bệnh, chữa bệnh chỉ định chuyển tuyến. Thanh toán
    chi phí khám bệnh, chữa bệnh một số trường hợp. khoản 5. trường hợp người bệnh sau khi đã điều trị nội trú ổn định nhưng
    cần phải tiếp tục sử dụng thuốc sau khi ra viện theo chỉ định của cơ sở khám bệnh, chữa bệnh theo quy định của bộ trưởng
    bộ y tế, quỹ bảo hiểm y tế thanh toán chi phí thuốc trong phạm vi được hưởng và mức hưởng theo chế độ quy định. cơ sở
