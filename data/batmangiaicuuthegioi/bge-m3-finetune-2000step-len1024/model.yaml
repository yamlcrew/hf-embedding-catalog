    sentences:
    - 'Điều 27. Thanh toán chi phí khám bệnh, chữa bệnh một số trường hợp. khoản 1. thanh toán chi phí khám bệnh, chữa bệnh
      đối với trẻ em dưới 6 tuổi trong trường hợp chưa có thẻ bảo hiểm y tế: cơ sở khám bệnh, chữa bệnh tổng hợp danh sách
      trẻ em dưới 6 tuổi và chi phí khám bệnh, chữa bệnh bảo hiểm y tế theo phạm vi được hưởng và mức hưởng gửi cơ quan bảo
      hiểm xã hội thanh toán theo quy định. cơ quan bảo hiểm xã hội căn cứ danh sách số trẻ em đã được khám bệnh, chữa bệnh
      do cơ sở khám bệnh, chữa bệnh chuyển đến, có trách nhiệm kiểm tra, xác minh việc cấp thẻ bảo hiểm y tế cho trẻ; thực
      hiện thanh toán chi phí khám bệnh, chữa bệnh. trường hợp trẻ em chưa được cấp thẻ thì thực hiện cấp thẻ theo quy định.
      Thanh toán chi phí khám bệnh, chữa bệnh một số trường hợp. khoản 2. thanh toán chi phí khám bệnh, chữa bệnh đối với
      người đã hiến bộ phận cơ thể người phải điều trị ngay sau khi hiến mà chưa có thẻ bảo hiểm y tế: cơ sở khám bệnh, chữa
      bệnh sau khi lấy bộ phận cơ thể người có trách nhiệm tổng hợp danh sách số người đã hiến và chi phí khám bệnh, chữa
      bệnh theo phạm vi được hưởng và mức hưởng bảo hiểm y tế sau khi hiến, gửi cơ quan bảo hiểm xã hội để thanh toán theo
      quy định. cơ quan bảo hiểm xã hội căn cứ danh sách số người đã hiến bộ phận cơ thể đã được khám bệnh, chữa bệnh sau
      khi hiến và chi phí do cơ sở khám bệnh, chữa bệnh chuyển đến để thực hiện thanh toán, cấp thẻ bảo hiểm y tế. Thanh toán
      chi phí khám bệnh, chữa bệnh một số trường hợp. điểm c) trường hợp người bệnh có số tiền cùng chi trả vượt quá 06 tháng
      lương cơ sở được tính từ ngày 01 tháng 01, quỹ bảo hiểm y tế thanh toán 100% chi phí khám bệnh chữa bệnh trong phạm
      vi quyền lợi của người bệnh kể từ thời điểm người bệnh tham gia đủ 05 năm liên tục đến hết ngày 31 tháng 12 của năm
      đó. Thanh toán chi phí khám bệnh, chữa bệnh một số trường hợp. khoản 4. trường hợp chuyển tuyến khám bệnh, chữa bệnh
      đối với người bệnh cần phải có nhân viên y tế đi kèm và có sử dụng thuốc, vật tư y tế theo yêu cầu chuyên môn trong
      quá trình vận chuyển, thì chi phí thuốc, vật tư y tế được tổng hợp vào chi phí điều trị của cơ sở khám bệnh, chữa bệnh
      chỉ định chuyển tuyến. Thanh toán chi phí khám bệnh, chữa bệnh một số trường hợp. khoản 5. trường hợp người bệnh sau
      khi đã điều trị nội trú ổn định nhưng cần phải tiếp tục sử dụng thuốc sau khi ra viện theo chỉ định của cơ sở khám bệnh,
      chữa bệnh theo quy định của bộ trưởng bộ y tế, quỹ bảo hiểm y tế thanh toán chi phí thuốc trong phạm vi được hưởng và
      mức hưởng theo chế độ quy định. cơ sở khám bệnh, chữa bệnh tổng hợp khoản chi thuốc này vào chi phí khám bệnh, chữa
      bệnh của người bệnh trước khi ra viện. Thanh toán chi phí khám bệnh, chữa bệnh một số trường hợp. khoản 6. trường hợp
      cơ sở khám bệnh, chữa bệnh không thực hiện được xét nghiệm cận lâm sàng, chẩn đoán hình ảnh, thăm dò chức năng và phải
      chuyển người bệnh hoặc mẫu bệnh phẩm đến cơ sở khám bệnh, chữa bệnh bảo hiểm y tế hoặc cơ sở được cấp có thẩm quyền
      phê duyệt đủ điều kiện thực hiện để thực hiện các dịch vụ đó, thì quỹ bảo hiểm y tế thanh toán chi phí thực hiện dịch
      vụ trong phạm vi được hưởng và mức hưởng theo quy định cho cơ sở khám bệnh, chữa bệnh nơi chuyển người bệnh, mẫu bệnh
      phẩm. cơ sở khám bệnh, chữa bệnh chuyển người bệnh hoặc mẫu bệnh phẩm có trách nhiệm thanh toán chi phí cho cơ sở khám
      bệnh, chữa bệnh hoặc đơn vị thực hiện dịch vụ, sau đó tổng hợp vào chi phí khám bệnh, chữa bệnh của người bệnh để thanh
      toán với cơ quan bảo hiểm xã hội. bộ trưởng bộ y tế quy định nguyên tắc, danh mục xét nghiệm cận lâm sàng chẩn đoán
      hình ảnh, thăm dò chức năng được chuyển đến cơ sở khám bệnh, chữa bệnh hoặc đơn vị thực hiện dịch vụ. Thanh toán chi
      phí khám bệnh, chữa bệnh một số trường hợp. điểm c) đối với chi phí về thuốc, hóa chất, vật tư y tế, quỹ bảo hiểm y
      tế thanh toán theo giá mua của cơ sở khám bệnh, chữa bệnh theo quy định về đấu thầu. Thanh toán chi phí khám bệnh, chữa
      bệnh một số trường hợp. khoản 8. thanh toán chi phí khám bệnh, chữa bệnh đối với trường hợp cơ sở khám bệnh, chữa bệnh
      triển khai kỹ thuật, phương pháp mới đã được cấp có thẩm quyền phê duyệt nhưng chưa có quy định về giá dịch vụ y tế
      thì cơ sở khám bệnh, chữa bệnh phải xây dựng và trình cấp có thẩm quyền phê duyệt giá dịch vụ kỹ thuật để làm căn cứ
      thanh toán. cơ sở khám bệnh, chữa bệnh có trách nhiệm thông báo bằng văn bản cho cơ quan bảo hiểm xã hội về việc triển
      khai kỹ thuật, phương pháp mới. Thanh toán chi phí khám bệnh, chữa bệnh một số trường hợp. khoản 9. trường hợp người
      có thẻ bảo hiểm y tế đang điều trị nội trú tại cơ sở khám bệnh, chữa bệnh nhưng thẻ bảo hiểm y tế hết hạn sử dụng thì
      được quỹ bảo hiểm y tế thanh toán chi phí'
    - 'Điều 35. Hồ sơ cấp Giấy chứng nhận đủ điều kiện hoạt động dịch vụ đánh giá công nghệ. điểm d) tài liệu thuyết minh
      phương pháp, quy trình đánh giá công nghệ tương ứng với từng lĩnh vực công nghệ cần đánh giá. Hồ sơ cấp Giấy chứng nhận
      đủ điều kiện hoạt động dịch vụ đánh giá công nghệ. điểm b) danh sách sửa đổi, bổ sung các chuyên gia đánh giá công nghệ,
      trong đó thể hiện các thông tin về tên, năm sinh, trình độ, lĩnh vực đào tạo, số năm công tác trong lĩnh vực công nghệ
      cần đánh giá, kèm theo các tài liệu liên quan đối với mỗi chuyên gia đánh giá công nghệ gồm: thỏa thuận hợp tác giữa
      chuyên gia với tổ chức; bản sao chứng thực bằng cấp theo quy định tại khoản 2 điều 33 nghị định này; tóm tắt quá trình
      công tác, kinh nghiệm hoạt động đánh giá công nghệ và tài liệu chứng minh kinh nghiệm hoạt động đánh giá công nghệ của
      chuyên gia. danh sách chuyên gia đánh giá công nghệ bổ sung, sửa đổi của tổ chức và tóm tắt kinh nghiệm hoạt động đánh
      giá công nghệ của chuyên gia đánh giá công nghệ bổ sung, sửa đổi theo mẫu số 07 và mẫu số 08 tại phụ lục iv ban hành
      kèm theo nghị định này. Hồ sơ cấp Giấy chứng nhận đủ điều kiện hoạt động dịch vụ đánh giá công nghệ. điểm b) bản chính
      giấy chứng nhận bị hư hỏng (nếu có) đối với trường hợp giấy chứng nhận bị hư hỏng.'
    - Điều 2. Chức năng, nhiệm vụ, quyền hạn và cơ cấu thành viên của Hội đồng cấp Bộ. khoản 1. chức năng của hội đồng cấp
      bộ tư vấn chuyên môn cho bộ trưởng bộ y tế trong việc giải quyết các trường hợp tai biến nặng sau tiêm chủng theo quy
      định tại điều 6 nghị định số 104/2016/nđ-cp ngày 01 tháng 7 năm 2016 của chính phủ quy định về hoạt động tiêm chủng.
      Chức năng, nhiệm vụ, quyền hạn và cơ cấu thành viên của Hội đồng cấp Bộ. điểm b) đánh giá lại kết luận của hội đồng
      cấp tỉnh trong trường hợp có khiếu nại của tổ chức, cá nhân đối với kết luận của hội đồng cấp tỉnh hoặc theo yêu cầu
      của cơ quan nhà nước có thẩm quyền. Chức năng, nhiệm vụ, quyền hạn và cơ cấu thành viên của Hội đồng cấp Bộ. điểm b)
      được bảo đảm các điều kiện để thực hiện nhiệm vụ. Chức năng, nhiệm vụ, quyền hạn và cơ cấu thành viên của Hội đồng cấp
      Bộ. điểm d) trong trường hợp cần thiết và tùy theo từng trường hợp cụ thể, chủ tịch hội đồng cấp bộ có thể mời thêm
      các chuyên gia về tài chính, giám định pháp y, hồi sức cấp cứu, pháp luật và những lĩnh vực khác liên quan đến tai biến
      nặng sau tiêm chủng tham gia hội đồng. Chức năng, nhiệm vụ, quyền hạn và cơ cấu thành viên của Hội đồng cấp Bộ. điểm
