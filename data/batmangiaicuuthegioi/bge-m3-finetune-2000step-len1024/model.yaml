  - source_sentence: Bộ Thông tin và Truyền thông có trách nhiệm gì trong thực hiện thủ tục hành chính điện tử?
    sentences:
    - Điều 6. Phóng viên nước ngoài đi theo đoàn khách nước ngoài. khoản 1. đối với các phóng viên nước ngoài đi theo đoàn
      khách nước ngoài thăm việt nam theo lời mời của lãnh đạo đảng và nhà nước hoặc bộ ngoại giao để đưa tin về chuyến thăm,
      cơ quan chủ quản việt nam có trách nhiệm làm các thủ tục nhập - xuất cảnh cần thiết và thông báo cho bộ ngoại giao biết
      để phối hợp. phóng viên nước ngoài được phép đưa tin các hoạt động theo chương trình chính thức của đoàn khách nước
      ngoài. trường hợp phóng viên nước ngoài có yêu cầu hoạt động thông tin, báo chí nằm ngoài chương trình hoạt động chính
      thức của đoàn khách nước ngoài, phóng viên phải có văn bản đề nghị gửi bộ ngoại giao và phải tuân thủ các quy định như
      đối với phóng viên không thường trú quy định tại điều 4 và điều 5 của nghị định này. Phóng viên nước ngoài đi theo đoàn
      khách nước ngoài. khoản 2. đối với phóng viên nước ngoài đi theo đoàn khách nước ngoài theo lời mời của các cơ quan
      khác của việt nam để đưa tin về chuyến thăm, cơ quan chủ quản việt nam cần làm thủ tục với bộ ngoại giao như đối với
      phóng viên không thường trú và hoạt động dưới sự hướng dẫn của trung tâm hướng dẫn báo chí nước ngoài (bộ ngoại giao)
      hoặc một cơ quan được bộ ngoại giao chấp thuận.
    - Điều 14. Khai thác, sử dụng thông tin, dữ liệu về nhà ở và thị trường bất động sản qua mạng internet, trang điện tử.
      điểm b) khai thác, sử dụng thông tin, dữ liệu về nhà ở và thị trường bất động sản theo quy định của pháp luật được công
      khai, phổ biến rộng rãi. Khai thác, sử dụng thông tin, dữ liệu về nhà ở và thị trường bất động sản qua mạng internet,
      trang điện tử. điểm c) bên cung cấp gửi cho bên yêu cầu tài khoản truy cập tra cứu thông tin, dữ liệu trong thời hạn
      không quá 07 ngày làm việc kể từ khi nhận được yêu cầu hoặc thời điểm bên yêu cầu thanh toán chi phí sử dụng dịch vụ
      (nếu có); Khai thác, sử dụng thông tin, dữ liệu về nhà ở và thị trường bất động sản qua mạng internet, trang điện tử.
      điểm e) tuân theo các quy định của pháp luật về bảo vệ bí mật nhà nước; chịu trách nhiệm về sai phạm trong khai thác,
      sử dụng thông tin, dữ liệu. Khai thác, sử dụng thông tin, dữ liệu về nhà ở và thị trường bất động sản qua mạng internet,
      trang điện tử. điểm b) tiến hành các biện pháp khắc phục sự cố ngay sau khi hệ thống thông tin của mình bị lỗi trong
      quá trình hoạt động làm ảnh hưởng hoặc gây ngừng cung cấp thông tin, dữ liệu, dịch vụ có liên quan trên môi trường mạng.
      Khai thác, sử dụng thông tin, dữ liệu về nhà ở và thị trường bất động sản qua mạng internet, trang điện tử. khoản 5.
      việc cung cấp, khai thác, sử dụng thông tin, dữ liệu về nhà ở và thị trường bất động sản qua mạng internet, trang điện
      tử phải tuân thủ theo đúng các quy định của luật giao dịch điện tử, luật công nghệ thông tin và các văn bản hướng dẫn
      thi hành.
    - Điều 29. Bộ Thông tin và Truyền thông. khoản 1. hướng dẫn việc giám sát, đánh giá hiệu quả, mức độ sử dụng dịch vụ công
      trực tuyến. Bộ Thông tin và Truyền thông. khoản 2. hướng dẫn, hỗ trợ việc triển khai tích hợp chữ ký số công cộng trong
      quá trình thực hiện dịch vụ công trực tuyến.
