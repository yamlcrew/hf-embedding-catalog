    đó tổng hợp vào chi phí khám bệnh, chữa bệnh của người bệnh để thanh toán với cơ quan bảo hiểm xã hội. bộ trưởng bộ y
    tế quy định nguyên tắc, danh mục xét nghiệm cận lâm sàng chẩn đoán hình ảnh, thăm dò chức năng được chuyển đến cơ sở khám
    bệnh, chữa bệnh hoặc đơn vị thực hiện dịch vụ. Thanh toán chi phí khám bệnh, chữa bệnh một số trường hợp. điểm c) đối
    với chi phí về thuốc, hóa chất, vật tư y tế, quỹ bảo hiểm y tế thanh toán theo giá mua của cơ sở khám bệnh, chữa bệnh
    theo quy định về đấu thầu. Thanh toán chi phí khám bệnh, chữa bệnh một số trường hợp. khoản 8. thanh toán chi phí khám
    bệnh, chữa bệnh đối với trường hợp cơ sở khám bệnh, chữa bệnh triển khai kỹ thuật, phương pháp mới đã được cấp có thẩm
    quyền phê duyệt nhưng chưa có quy định về giá dịch vụ y tế thì cơ sở khám bệnh, chữa bệnh phải xây dựng và trình cấp có
    thẩm quyền phê duyệt giá dịch vụ kỹ thuật để làm căn cứ thanh toán. cơ sở khám bệnh, chữa bệnh có trách nhiệm thông báo
    bằng văn bản cho cơ quan bảo hiểm xã hội về việc triển khai kỹ thuật, phương pháp mới. Thanh toán chi phí khám bệnh, chữa
    bệnh một số trường hợp. khoản 9. trường hợp người có thẻ bảo hiểm y tế đang điều trị nội trú tại cơ sở khám bệnh, chữa
    bệnh nhưng thẻ bảo hiểm y tế hết hạn sử dụng thì được quỹ bảo hiểm y tế thanh toán chi phí'
  - 'Điều 35. Hồ sơ cấp Giấy chứng nhận đủ điều kiện hoạt động dịch vụ đánh giá công nghệ. điểm d) tài liệu thuyết minh phương
    pháp, quy trình đánh giá công nghệ tương ứng với từng lĩnh vực công nghệ cần đánh giá. Hồ sơ cấp Giấy chứng nhận đủ điều
    kiện hoạt động dịch vụ đánh giá công nghệ. điểm b) danh sách sửa đổi, bổ sung các chuyên gia đánh giá công nghệ, trong
    đó thể hiện các thông tin về tên, năm sinh, trình độ, lĩnh vực đào tạo, số năm công tác trong lĩnh vực công nghệ cần đánh
    giá, kèm theo các tài liệu liên quan đối với mỗi chuyên gia đánh giá công nghệ gồm: thỏa thuận hợp tác giữa chuyên gia
    với tổ chức; bản sao chứng thực bằng cấp theo quy định tại khoản 2 điều 33 nghị định này; tóm tắt quá trình công tác,
    kinh nghiệm hoạt động đánh giá công nghệ và tài liệu chứng minh kinh nghiệm hoạt động đánh giá công nghệ của chuyên gia.
    danh sách chuyên gia đánh giá công nghệ bổ sung, sửa đổi của tổ chức và tóm tắt kinh nghiệm hoạt động đánh giá công nghệ
    của chuyên gia đánh giá công nghệ bổ sung, sửa đổi theo mẫu số 07 và mẫu số 08 tại phụ lục iv ban hành kèm theo nghị định
    này. Hồ sơ cấp Giấy chứng nhận đủ điều kiện hoạt động dịch vụ đánh giá công nghệ. điểm b) bản chính giấy chứng nhận bị
    hư hỏng (nếu có) đối với trường hợp giấy chứng nhận bị hư hỏng.'
  - Điều 2. Chức năng, nhiệm vụ, quyền hạn và cơ cấu thành viên của Hội đồng cấp Bộ. khoản 1. chức năng của hội đồng cấp bộ
    tư vấn chuyên môn cho bộ trưởng bộ y tế trong việc giải quyết các trường hợp tai biến nặng sau tiêm chủng theo quy định
    tại điều 6 nghị định số 104/2016/nđ-cp ngày 01 tháng 7 năm 2016 của chính phủ quy định về hoạt động tiêm chủng. Chức năng,
    nhiệm vụ, quyền hạn và cơ cấu thành viên của Hội đồng cấp Bộ. điểm b) đánh giá lại kết luận của hội đồng cấp tỉnh trong
    trường hợp có khiếu nại của tổ chức, cá nhân đối với kết luận của hội đồng cấp tỉnh hoặc theo yêu cầu của cơ quan nhà
    nước có thẩm quyền. Chức năng, nhiệm vụ, quyền hạn và cơ cấu thành viên của Hội đồng cấp Bộ. điểm b) được bảo đảm các
    điều kiện để thực hiện nhiệm vụ. Chức năng, nhiệm vụ, quyền hạn và cơ cấu thành viên của Hội đồng cấp Bộ. điểm d) trong
    trường hợp cần thiết và tùy theo từng trường hợp cụ thể, chủ tịch hội đồng cấp bộ có thể mời thêm các chuyên gia về tài
    chính, giám định pháp y, hồi sức cấp cứu, pháp luật và những lĩnh vực khác liên quan đến tai biến nặng sau tiêm chủng
    tham gia hội đồng. Chức năng, nhiệm vụ, quyền hạn và cơ cấu thành viên của Hội đồng cấp Bộ. điểm b) những người thực hiện
    hoạt động về tiêm chủng thì không tham gia vào thành phần hội đồng.
- source_sentence: Bộ Thông tin và Truyền thông có trách nhiệm gì trong thực hiện thủ tục hành chính điện tử?
  sentences:
  - Điều 6. Phóng viên nước ngoài đi theo đoàn khách nước ngoài. khoản 1. đối với các phóng viên nước ngoài đi theo đoàn khách
    nước ngoài thăm việt nam theo lời mời của lãnh đạo đảng và nhà nước hoặc bộ ngoại giao để đưa tin về chuyến thăm, cơ quan
    chủ quản việt nam có trách nhiệm làm các thủ tục nhập - xuất cảnh cần thiết và thông báo cho bộ ngoại giao biết để phối
    hợp. phóng viên nước ngoài được phép đưa tin các hoạt động theo chương trình chính thức của đoàn khách nước ngoài. trường
    hợp phóng viên nước ngoài có yêu cầu hoạt động thông tin, báo chí nằm ngoài chương trình hoạt động chính thức của đoàn
    khách nước ngoài, phóng viên phải có văn bản đề nghị gửi bộ ngoại giao và phải tuân thủ các quy định như đối với phóng
    viên không thường trú quy định tại điều 4 và điều 5 của nghị định này. Phóng viên nước ngoài đi theo đoàn khách nước ngoài.
    khoản 2. đối với phóng viên nước ngoài đi theo đoàn khách nước ngoài theo lời mời của các cơ quan khác của việt nam để
    đưa tin về chuyến thăm, cơ quan chủ quản việt nam cần làm thủ tục với bộ ngoại giao như đối với phóng viên không thường
    trú và hoạt động dưới sự hướng dẫn của trung tâm hướng dẫn báo chí nước ngoài (bộ ngoại giao) hoặc một cơ quan được bộ
    ngoại giao chấp thuận.
  - Điều 14. Khai thác, sử dụng thông tin, dữ liệu về nhà ở và thị trường bất động sản qua mạng internet, trang điện tử. điểm
    b) khai thác, sử dụng thông tin, dữ liệu về nhà ở và thị trường bất động sản theo quy định của pháp luật được công khai,
    phổ biến rộng rãi. Khai thác, sử dụng thông tin, dữ liệu về nhà ở và thị trường bất động sản qua mạng internet, trang
    điện tử. điểm c) bên cung cấp gửi cho bên yêu cầu tài khoản truy cập tra cứu thông tin, dữ liệu trong thời hạn không quá
    07 ngày làm việc kể từ khi nhận được yêu cầu hoặc thời điểm bên yêu cầu thanh toán chi phí sử dụng dịch vụ (nếu có); Khai
    thác, sử dụng thông tin, dữ liệu về nhà ở và thị trường bất động sản qua mạng internet, trang điện tử. điểm e) tuân theo
    các quy định của pháp luật về bảo vệ bí mật nhà nước; chịu trách nhiệm về sai phạm trong khai thác, sử dụng thông tin,
    dữ liệu. Khai thác, sử dụng thông tin, dữ liệu về nhà ở và thị trường bất động sản qua mạng internet, trang điện tử. điểm
    b) tiến hành các biện pháp khắc phục sự cố ngay sau khi hệ thống thông tin của mình bị lỗi trong quá trình hoạt động làm
    ảnh hưởng hoặc gây ngừng cung cấp thông tin, dữ liệu, dịch vụ có liên quan trên môi trường mạng. Khai thác, sử dụng thông
    tin, dữ liệu về nhà ở và thị trường bất động sản qua mạng internet, trang điện tử. khoản 5. việc cung cấp, khai thác,
    sử dụng thông tin, dữ liệu về nhà ở và thị trường bất động sản qua mạng internet, trang điện tử phải tuân thủ theo đúng
    các quy định của luật giao dịch điện tử, luật công nghệ thông tin và các văn bản hướng dẫn thi hành.
  - Điều 29. Bộ Thông tin và Truyền thông. khoản 1. hướng dẫn việc giám sát, đánh giá hiệu quả, mức độ sử dụng dịch vụ công
    trực tuyến. Bộ Thông tin và Truyền thông. khoản 2. hướng dẫn, hỗ trợ việc triển khai tích hợp chữ ký số công cộng trong
    quá trình thực hiện dịch vụ công trực tuyến.
