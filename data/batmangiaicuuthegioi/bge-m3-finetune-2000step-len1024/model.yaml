    hành khách, ô tô chở người và các loại xe tương tự xe ô tô chở hành khách, chở người vi phạm quy định về vận tải đường
    bộ. điểm e) điều khiển xe chở hành khách liên vận quốc tế không có hoặc không gắn ký hiệu phân biệt quốc gia, phù hiệu
    liên vận theo quy định hoặc có nhưng đã hết giá trị sử dụng hoặc sử dụng phù hiệu không do cơ quan có thẩm quyền cấp.
    Xử phạt người điều khiển xe ô tô chở hành khách, ô tô chở người và các loại xe tương tự xe ô tô chở hành khách, chở người
    vi phạm quy định về vận tải đường bộ. điểm b) điều khiển xe chở hành khách không có hoặc không gắn phù hiệu (biển hiệu)
    theo quy định hoặc có nhưng đã hết giá trị sử dụng hoặc sử dụng phù hiệu (biển hiệu) không do cơ quan có thẩm quyền cấp.
    Xử phạt người điều khiển xe ô tô chở hành khách, ô tô chở người và các loại xe tương tự xe ô tô chở hành khách, chở người
    vi phạm quy định về vận tải đường bộ. điểm d) thực hiện hành vi quy định tại điểm e khoản 6, điểm b khoản 7 điều này bị
    tịch thu phù hiệu (biển hiệu) đã hết giá trị sử dụng hoặc không do cơ quan có thẩm quyền cấp. Xử phạt người điều khiển
    xe ô tô chở hành khách, ô tô chở người và các loại xe tương tự xe ô tô chở hành khách, chở người vi phạm quy định về vận
    tải đường bộ. điểm b) thực hiện hành vi quy định tại điểm l khoản 3 điều này (trường hợp thu tiền vé cao hơn quy định)
    buộc phải nộp lại số lợi bất hợp pháp có được do thực hiện vi phạm hành chính.'
