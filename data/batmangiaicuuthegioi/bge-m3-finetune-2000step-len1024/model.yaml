    Xử phạt người điều khiển xe ô tô chở hành khách, ô tô chở người và các loại xe tương tự xe ô tô chở hành khách, chở người
    vi phạm quy định về vận tải đường bộ. khoản 2. phạt tiền từ < mức phạt tiền > đến < mức phạt tiền > trên mỗi người vượt
    quá quy định được phép chở của phương tiện nhưng tổng mức phạt tiền tối đa không vượt quá < mức phạt tiền > đối với người
    điều khiển xe ô tô chở hành khách, ô tô chở người (trừ xe buýt) thực hiện hành vi vi phạm: chở quá từ 02 người trở lên
    trên xe đến 9 chỗ, chở quá từ 03 người trở lên trên xe 10 chỗ đến xe 15 chỗ, chở quá từ 04 người trở lên trên xe 16 chỗ
    đến xe 30 chỗ, chở quá từ 05 người trở lên trên xe trên 30 chỗ, trừ các hành vi vi phạm quy định tại khoản 4 điều này.
    Xử phạt người điều khiển xe ô tô chở hành khách, ô tô chở người và các loại xe tương tự xe ô tô chở hành khách, chở người
    vi phạm quy định về vận tải đường bộ. điểm p) điều khiển xe taxi sử dụng phần mềm tính tiền mà trên xe không có thiết
    bị để kết nối trực tiếp với hành khách theo quy định. Xử phạt người điều khiển xe ô tô chở hành khách, ô tô chở người
    và các loại xe tương tự xe ô tô chở hành khách, chở người vi phạm quy định về vận tải đường bộ. khoản 4. phạt tiền từ
    < mức phạt tiền > đến < mức phạt tiền > trên mỗi người vượt quá quy định được phép chở của phương tiện nhưng tổng mức
    phạt tiền tối đa không vượt quá < mức phạt tiền > đối với người điều khiển xe ô tô chở hành khách chạy tuyến có cự ly
    lớn hơn 300 km thực hiện hành vi vi phạm: chở quá từ 02 người trở lên trên xe đến 9 chỗ, chở quá từ 03 người trở lên trên
    xe 10 chỗ đến xe 15 chỗ, chở quá từ 04 người trở lên trên xe 16 chỗ đến xe 30 chỗ, chở quá từ 05 người trở lên trên xe
