  widget:
  - source_sentence: Lập thiết kế xây dựng dự án nạo vét vùng nước cảng biển được quy định như thế nào?
    sentences:
    - Điều 40. Lập thiết kế xây dựng. khoản 1. căn cứ báo cáo nghiên cứu khả thi dự án được duyệt và quy định của hợp đồng
      dự án, nhà đầu tư lập thiết kế bản vẽ thi công gửi cơ quan nhà nước có thẩm quyền theo quy định tại điều 24 nghị định
      này để thống nhất trước khi phê duyệt và gửi sau khi phê duyệt xong để giám sát, kiểm tra. việc thay đổi thiết kế bản
      vẽ thi công làm ảnh hưởng đến quy mô, tiêu chuẩn kỹ thuật, tiến độ thực hiện dự án phải được sự chấp thuận bằng văn
      bản của cơ quan nhà nước có thẩm quyền. Lập thiết kế xây dựng. khoản 2. việc lập, thẩm tra, phê duyệt thiết kế bản vẽ
      thi công thực hiện theo quy định của pháp luật về xây dựng.
    - Điều 8. Thực hiện bán đấu giá. khoản 1. cuộc đấu giá được tổ chức tại trụ sở của tổ chức đấu giá, doanh nghiệp mua bán
      nợ hoặc địa điểm khác theo thỏa thuận của doanh nghiệp mua bán nợ và tổ chức đấu giá. Thực hiện bán đấu giá. khoản 2.
      trong thời hạn quy định tại quy chế bán đấu giá, nhà đầu tư đủ điều kiện tham gia đấu giá thực hiện đăng ký đấu giá
      và thực hiện nộp tiền đặt cọc. doanh nghiệp mua bán nợ quyết định tỷ lệ đặt cọc của nhà đầu tư nhưng không thấp hơn
      10% tổng giá trị lô cổ phần kèm nợ phải thu tính theo giá khởi điểm. sau khi đăng ký đấu giá và hoàn tất thủ tục đặt
      cọc, nhà đầu tư được tổ chức đấu giá cung cấp phiếu tham dự đấu giá để thực hiện đặt giá mua (giá đấu). Thực hiện bán
      đấu giá. khoản 3. trong thời hạn quy định tại quy chế bán đấu giá, các nhà đầu tư ghi giá đặt mua (giá đấu) vào phiếu
      tham dự đấu giá và bỏ phiếu trực tiếp tại địa điểm tổ chức đấu giá hoặc bỏ phiếu qua đường bưu điện theo quy định tại
      quy chế bán đấu giá cổ phần. mỗi nhà đầu tư chỉ được cấp một phiếu tham dự đấu giá và chỉ được bỏ một mức giá cho toàn
      bộ lô cổ phần kèm nợ phải thu.
    - 'Điều 2. Giải thích từ ngữ. trong thông tư này, các từ ngữ dưới đây được hiểu như sau: Giải thích từ ngữ. khoản 1. hệ
      thống thông tin duyên hải là hạ tầng mạng viễn thông hàng hải do nhà nước đầu tư và giao cho công ty tnhh mtv thông
      tin điện tử hàng hải việt nam quản lý, khai thác. Giải thích từ ngữ. điểm i) dịch vụ kết nối thông tin ngành hàng hải:
      là dịch vụ vận hành mạng công nghệ thông tin nội bộ (gọi tắt là mạng intranet hàng hải) nhằm kết nối, chia sẻ thông
      tin chuyên ngành hàng hải do đài trung tâm xử lý thông tin hàng hải hà nội cung cấp. Giải thích từ ngữ. khoản 3. vùng
      biển a1: là vùng biển nằm trong phạm vi phủ sóng vô tuyến điện thoại của ít nhất một đài thông tin duyên hải vhf mà
      trong đó tàu thuyền có khả năng báo động cấp cứu liên tục bằng gọi chọn số (vùng biển này có bán kính cách đài thông
      tin duyên hải khoảng 30 hải lý). Giải thích từ ngữ. khoản 4. vùng biển a2: là vùng biển phía ngoài vùng biển a1 và trong
      phạm vi vùng phủ sóng vô tuyến điện thoại của ít nhất một đài thông tin duyên hải mf mà trong đó tàu thuyền có khả năng
      báo động cấp cứu liên tục bằng gọi chọn số (vùng biển này có bán kính cách đài thông tin duyên hải khoảng 250 hải lý).
      Giải thích từ ngữ. khoản 5. vùng biển a3: là vùng biển phía ngoài vùng biển a1, a2 và trong phạm vi phủ sóng của vệ
      tinh địa tĩnh inmarsat mà trong đó tàu thuyền có khả năng báo động cấp cứu liên tục (vùng biển này có phạm vi từ vĩ
      tuyến 70° bắc đến vĩ tuyến 70° nam). Giải thích từ ngữ. khoản 6. vùng biển a4: là vùng ngoài vùng biển a1, a2 và a Giải
      thích từ ngữ. khoản 3. bản chất là các vùng cực của trái đất từ vĩ tuyến 70° bắc đến cực bắc và từ vĩ tuyến 70° nam
      đến cực nam nhưng không gồm bất kỳ các vùng biển khác. Giải thích từ ngữ. khoản 7. thông tin lrit: là thông tin về mã
      nhận dạng, vị trí, thời gian xác định vị trí của tàu thuyền theo giờ quốc tế (utc) được phát ra từ thiết bị lrit. Giải
      thích từ ngữ. khoản 8. vùng thông tin nhận dạng và truy theo tầm xa của việt nam (sau đây gọi tắt là vùng thông tin
      lrit của việt nam): là vùng thông tin do bộ giao thông vận tải tổ chức công bố theo quy định của pháp luật việt nam
      và điều ước quốc tế liên quan mà việt nam là thành viên, bao gồm: vùng nội thủy lrit, vùng lãnh hải lrit, vùng Giải
      thích từ ngữ. khoản 1.000 hải lý và vùng lrit tự chọn. Giải thích từ ngữ. khoản 9. đơn vị trên bờ là các đơn vị liên
      quan đến công tác tiếp nhận, xử lý thông tin báo động cấp cứu, khẩn cấp, an toàn - an ninh, thông thường là các cơ quan
      phối hợp tìm kiếm, cứu nạn, các đài thông tin duyên hải, chủ tàu. Giải thích từ ngữ. khoản 10. các từ viết tắt:'
  - source_sentence: Xử phạt công chứng viên nhận hướng dẫn tập sự khi không đủ điều kiện theo quy định được quy định như
      thế nào?
    sentences:
    - Điều 47. Thủ tục cấp chứng chỉ hành nghề đo đạc và bản đồ. khoản 1. sau thời hạn 10 ngày làm việc kể từ ngày đăng tải
      kết quả sát hạch và xét cấp chứng chỉ hành nghề theo quy định tại khoản 6 điều 44 nghị định này, thủ trưởng cơ quan
      có thẩm quyền cấp chứng chỉ ký, cấp chứng chỉ hành nghề đo đạc và bản đồ. Thủ tục cấp chứng chỉ hành nghề đo đạc và
      bản đồ. khoản 2. trường hợp cá nhân không đủ điều kiện cấp chứng chỉ hành nghề đo đạc và bản đồ, cơ quan có thẩm quyền
      cấp chứng chỉ phải thông báo, nêu rõ lý do không cấp chứng chỉ cho cá nhân đề nghị cấp chứng chỉ.
    - Điều 13. Tập sự hành nghề đấu giá. khoản 1. người có giấy chứng nhận tốt nghiệp đào tạo nghề đấu giá và người được miễn
      đào tạo nghề đấu giá được tập sự hành nghề đấu giá tại tổ chức đấu giá tài sản. Tập sự hành nghề đấu giá. khoản 2. thời
      gian tập sự hành nghề đấu giá là 06 tháng. thời gian tập sự hành nghề đấu giá được tính từ ngày tổ chức đấu giá tài
      sản thông báo danh sách người tập sự hành nghề đấu giá tại tổ chức mình cho sở tư pháp nơi tổ chức đấu giá tài sản có
      trụ sở. Tập sự hành nghề đấu giá. khoản 3. tổ chức đấu giá tài sản phân công đấu giá viên hướng dẫn người tập sự hành
      nghề đấu giá. đấu giá viên hướng dẫn tập sự phải hướng dẫn, giám sát và chịu trách nhiệm về các công việc do người tập
      sự thực hiện. người tập sự hành nghề đấu giá được hướng dẫn các kỹ năng hành nghề và thực hiện các công việc liên quan
      đến đấu giá tài sản do đấu giá viên hướng dẫn phân công và chịu trách nhiệm trước đấu giá viên hướng dẫn về những công
      việc đó. người tập sự hành nghề đấu giá không được điều hành cuộc đấu giá. Tập sự hành nghề đấu giá. khoản 4. người
      hoàn thành thời gian tập sự quy định tại khoản 2 điều này được tham dự kiểm tra kết quả tập sự hành nghề đấu giá. nội
      dung kiểm tra kết quả tập sự hành nghề đấu giá bao gồm kỹ năng hành nghề đấu giá, pháp luật về đấu giá tài sản, pháp
      luật có liên quan, quy tắc đạo đức nghề nghiệp đấu giá viên. Tập sự hành nghề đấu giá. khoản 5. việc kiểm tra kết quả
      tập sự hành nghề đấu giá do hội đồng kiểm tra kết quả tập sự hành nghề đấu giá thực hiện. bộ tư pháp thành lập hội đồng
      kiểm tra kết quả tập sự hành nghề đấu giá; thành phần hội đồng bao gồm đại diện bộ tư pháp làm chủ tịch, đại diện các
      cơ quan, tổ chức có liên quan và một số đấu giá viên là thành viên.
    - Điều 15. Hành vi vi phạm quy định hoạt động hành nghề công chứng. điểm d) tham gia không đầy đủ nghĩa vụ bồi dưỡng nghiệp
