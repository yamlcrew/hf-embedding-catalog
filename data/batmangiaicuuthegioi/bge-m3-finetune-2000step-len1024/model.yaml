      góp vốn thành lập, duy trì tổ chức và hoạt động văn phòng công chứng không đúng quy định. Hành vi vi phạm quy định hoạt
      động hành nghề công chứng. điểm c) chuyển nhượng hoặc nhận chuyển nhượng văn phòng công chứng khi văn phòng công chứng
