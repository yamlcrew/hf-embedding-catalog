      4 điều này. Xử phạt người điều khiển xe ô tô chở hành khách, ô tô chở người và các loại xe tương tự xe ô tô chở hành
      khách, chở người vi phạm quy định về vận tải đường bộ. điểm p) điều khiển xe taxi sử dụng phần mềm tính tiền mà trên
