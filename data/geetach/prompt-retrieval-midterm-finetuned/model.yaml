widgetData:
- source_sentence: Find a Science Fiction writing prompt
  sentences:
  - <Travel Writing> </Travel Writing> <Observation> </Observation> <The Most Interesting Stranger> </The Most Interesting
    Stranger> prompt Write about the most interesting stranger you've ever encountered while traveling. What made them memorable?
  - <Science Fiction> </Science Fiction> <Dystopian> </Dystopian> <The Forbidden Color> </The Forbidden Color> prompt In a
    society where emotions are suppressed by mandating a monochrome world, someone discovers a hidden patch of vibrantly colored
    flowers.
  - <Profile> </Profile> <Everyday People> </Everyday People> <The Barista Who Knows Your Order </The Barista Who Knows Your
    Order> prompt Write a short profile of someone you encounter regularly in your daily routine (barista, mail carrier, bus
    driver) and the small impact they have.
  - <Horror> </Horror> <Creature Feature> </Creature Feature> <The Shadow in the Woods> </The Shadow in the Woods> prompt
    Campers tell stories of a shadowy figure that lurks just beyond the firelight, but this year, the stories feel a little
    too real.
- source_sentence: Find a writing prompt about language and explore and discuss
  sentences:
  - <Mystery> </Mystery> <Justice> </Justice> <The Case of the Missing Mascot> </The Case of the Missing Mascot> prompt A
    high school's beloved (and slightly bizarre) mascot costume is stolen right before the championship game.
  - <Contemporary> </Contemporary> <Betrayal & Trust> </Contemporary> <The Secret Online Persona> </The Secret Online Persona>
    prompt Someone discovers their closest friend has been leading a double life through a secret online persona that is damaging
    to others.
  - <Listicle> </Listicle> <Place> </Place> <7 Hidden Gems in My City </7 Hidden Gems in My City> prompt Create a list of
    7 lesser-known "hidden gems" in your city or town, describing what makes each one special.
  - <Cultural Commentary> </Cultural Commentary> <Language> </Language> <Words That Fascinate Me> </Words That Fascinate Me>
    prompt Explore a few words in any language that you find particularly beautiful, strange, or untranslatable, and discuss
    why.
- source_sentence: Find a writing prompt about stuck and sinister
  sentences:
  - <Slice of Life> </Slice of Life> <Love & Friendship> </Love & Friendship> <The Neighborhood Watch> </The Neighborhood
    Watch> prompt A group of quirky neighbors forms an unlikely bond while participating in a mostly uneventful neighborhood
    watch program.
  - <Historical Reflection> </Historical Reflection> <Objects> </Objects> <An Old Photograph </An Old Photograph> prompt Find
    an old photograph (of family, or an unknown scene) and write about the story you imagine it tells.
  - <Horror> </Horror> <Psychological> </Psychological> <The Song That Won't Stop> </The Song That Won't Stop> prompt A catchy
    tune gets stuck in someone's head, but it gradually becomes more sinister and seems to influence their thoughts and actions.
  - <Food Writing> </Food Writing> <Failure> </Failure> <My Most Memorable Cooking Disaster </My Most Memorable Cooking Disaster>
    prompt Write about your most spectacular and memorable cooking or baking disaster. What went wrong and what did you learn
    (besides what not to do)?
- source_sentence: Find a writing prompt about obscure and reaching
  sentences:
  - <Mystery> </Mystery> <Secrets> </Secrets> <The Missing Author> </The Missing Author> prompt A famous, reclusive author
    disappears just before their highly anticipated new book is released, leaving behind a cryptic manuscript.
  - <Listicle> </Listicle> <Place> </Place> <7 Hidden Gems in My City </7 Hidden Gems in My City> prompt Create a list of
    7 lesser-known "hidden gems" in your city or town, describing what makes each one special.
  - <Romance> </Romance> <Love> </Love> <The Bookstore Meet-Cute> </The Bookstore Meet-Cute> prompt Two people keep reaching
    for the same obscure book in a dusty, independent bookstore.
  - <Reflective Essay> </Reflective Essay> <Gratitude> </Gratitude> <A Letter of Gratitude I Never Sent> </A Letter of Gratitude
    I Never Sent> prompt Write a letter of gratitude to someone you've never properly thanked, even if you don't intend to
    send it.
- source_sentence: Find a writing prompt about point
  sentences:
  - <Fairy Tale Retelling> </Fairy Tale Retelling> <Courage> </Fairy Tale Retelling> <The Wolf's Perspective (Little Red Riding
    Hood) </The Wolf's Perspective (Little Red Riding Hood)> prompt The story of Little Red Riding Hood, but told from the
    wolf's point of view, who claims he was misunderstood.
  - <Travel Writing> </Travel Writing> <Anticipation> </Anticipation> <The Journey, Not Just the Destination </The Journey,
    Not Just the Destination> prompt Focus on the experience of the journey itself (the flight, train ride, road trip) to
    a destination, rather than the destination itself.
  - <Reflective Essay> </Reflective Essay> <Self-Discovery> </Self-Discovery> <A Time I Changed My Mind> </A Time I Changed
    My Mind> prompt Write about a significant time you changed your mind about something important. What led to the change?
  - <Listicle> </Listicle> <Happiness> </Listicle> <10 Small Things That Bring Me Joy </10 Small Things That Bring Me Joy>
    prompt Create a list of 10 small, everyday things that consistently bring you joy, describing why for each.
