  - '<Humor> </Humor> <Supernatural> </Supernatural> <My Roommate is a Vampire (and a slob) </My Roommate is a Vampire (and
    a slob)> prompt You discover your new roommate is a vampire, not because of fangs or coffins, but because they never do
    their share of the dishes and are incredibly messy.

    <Adventure> </Adventure> <Courage> </Adventure> <The Smallest Knight> </The Smallest Knight> prompt In a kingdom threatened
    by a not-so-scary dragon, the only one brave enough to face it is the kingdom''s smallest, most overlooked squire.'
  - '<Cultural Commentary> </Cultural Commentary> <Tradition> </Tradition> <A Tradition I''d Like to Start (or Stop) </A Tradition
    I''d Like to Start (or Stop)> prompt Reflect on a societal or family tradition. Is it one you''d like to preserve, modify,
    start, or abandon? Why?

    <Historical Reflection> </Historical Reflection> <The Everyday> </The Everyday> <A Day in the Life: 100 Years Ago </A
    Day in the Life: 100 Years Ago> prompt Imagine and describe what a typical day might have been like for someone living
    in your current home or neighborhood 100 years ago.'
- source_sentence: I feel like describing a special place in my town that really captures its spirit and why it means so much
    to me.
  sentences:
  - '<Nature Writing> </Nature Writing> <Observation> </Observation> <The Language of Birds> </The Language of Birds> prompt
    Observe the birds in your local area. Describe their behaviors, songs, and the little dramas you witness among them.

    <Food Writing> </Food Writing> <Memory> </Memory> <The Taste of Comfort> </The Taste of Comfort> prompt What food brings
    you ultimate comfort? Describe its taste, texture, smell, and the memories or feelings it evokes.

    <Profile> </Profile> <Place> </Place> <The Heart of My Town> </The Heart of My Town> prompt Write a profile of a specific
    place in your town/city that you feel is its "heart" or most defining feature (e.g., a park, a market, a library).'
  - '<Romance> </Romance> <Magic> </Magic> <The Love Potion Mishap> </The Love Potion Mishap> prompt Someone tries to use
    a love potion, but it accidentally affects the wrong person, leading to comical and complicated situations.

    <Historical Fiction> </Historical Fiction> <Justice> </Justice> <The Witch Trial Witness> </The Witch Trial Witness> prompt
    During a 17th-century witch trial, a young witness is torn between telling the truth and saving themselves from accusation.

    <Contemporary> </Contemporary> <Self-Discovery> </Self-Discovery> <The Year of Saying Yes> </The Year of Saying Yes> prompt
    Someone decides to say "yes" to every opportunity that comes their way for a whole year, leading to unexpected adventures
    and self-discovery.'
  - '<Humorous Essay> </Humorous Essay> <Hobbies> </Hobbies> <My Collection of [Quirky Thing] </My Collection of [Quirky Thing]>
    prompt Write about a quirky or unusual collection you have (or someone you know has). Why was it started, and what makes
    it special/funny?

    <How-To / Skill Share> </How-To / Skill Share> <Creativity> </Creativity> <The Simple Art of Doodling> </The Simple Art
    of Doodling> prompt Explain the simple joy and benefits of doodling, perhaps sharing a few easy techniques for getting
    started.'
- source_sentence: I'm interested in writing a supernatural horror story involving a mysterious antique doll that changes
    over time. How can I develop a chilling plot that connects the doll’s aging to a family secret?
  sentences:
  - '<Nature Writing> </Nature Writing> <Wonder> </Wonder> <The Magic of a Full Moon> </The Magic of a Full Moon> prompt Describe
    your feelings and observations when looking at a full moon. What thoughts or stories does it inspire?

    <Food Writing> </Food Writing> <Community> </Community> <The Potluck </The Potluck> prompt Write about the experience
    of a potluck dinner. What does this communal form of eating say about community and sharing?

    <Profile> </Profile> <Resilience> </Resilience> <The Survivor </The Survivor> prompt Profile someone you know or admire
    who has overcome significant adversity. What qualities enabled them to do so?'
  - '<Mystery> </Mystery> <Cozy Mystery> </Cozy Mystery> <The Village Bake-Off Sabotage> </The Village Bake-Off Sabotage>
    prompt Someone is sabotaging contestants in the annual village bake-off, and the amateur sleuth/baker must find the culprit
    before their own cake is ruined.

    <Horror> </Horror> <Supernatural> </Supernatural> <The Doll That Ages> </The Doll That Ages> prompt An antique doll in
    the attic seems to be aging, mirroring the appearance of someone in the family.

    <Romance> </Romance> <Historical> </Historical> <The Governess''s Secret Admirer> </The Governess''s Secret Admirer> prompt
    A governess in a grand Victorian estate starts receiving anonymous, poetic love letters.'
  - '<Nature Writing> </Nature Writing> <Wonder> </Wonder> <The Magic of a Full Moon> </The Magic of a Full Moon> prompt Describe
    your feelings and observations when looking at a full moon. What thoughts or stories does it inspire?

    <Food Writing> </Food Writing> <Community> </Community> <The Potluck </The Potluck> prompt Write about the experience
    of a potluck dinner. What does this communal form of eating say about community and sharing?

    <Profile> </Profile> <Resilience> </Resilience> <The Survivor </The Survivor> prompt Profile someone you know or admire
    who has overcome significant adversity. What qualities enabled them to do so?'
- source_sentence: I’m interested in a sci-fi tale where a space mission encounters unexpected environmental challenges on
    a new planet.
  sentences:
  - '<Historical Fiction> </Historical Fiction> <Dreams & Aspirations> </Historical Fiction> <The Pioneer''s Hope> </The Pioneer''s
    Hope> prompt A family journeying on the Oregon Trail in the 1800s carries with them a small, symbolic item representing
    their hopes for a new life.

    <Contemporary> </Contemporary> <Betrayal & Trust> </Contemporary> <The Secret Online Persona> </The Secret Online Persona>
    prompt Someone discovers their closest friend has been leading a double life through a secret online persona that is damaging
    to others.'
  - '<Fantasy> </Fantasy> <Nature & Environment> </Fantasy> <The Last Dryad> </The Last Dryad> prompt The last dryad must
    find a way to save her dying forest from encroaching industrialization, with the help of a skeptical human.

    <Science Fiction> </Science Fiction> <Consequences> </Science Fiction> <The Terraforming Error> </The Terraforming Error>
    prompt A terraforming project on a new planet goes slightly wrong, resulting in an ecosystem with bizarre and unpredictable
    flora and fauna.

    <Mystery> </Mystery> <Thriller> </Mystery> <The Voice on the Radio> </The Voice on the Radio> prompt Late at night, a
    radio DJ receives a call from a panicked listener who claims to be witnessing a crime in progress, but the call cuts off
    abruptly.'
  - '<Cultural Commentary> </Cultural Commentary> <Tradition> </Tradition> <A Tradition I''d Like to Start (or Stop) </A Tradition
    I''d Like to Start (or Stop)> prompt Reflect on a societal or family tradition. Is it one you''d like to preserve, modify,
    start, or abandon? Why?

    <Historical Reflection> </Historical Reflection> <The Everyday> </The Everyday> <A Day in the Life: 100 Years Ago </A
    Day in the Life: 100 Years Ago> prompt Imagine and describe what a typical day might have been like for someone living
    in your current home or neighborhood 100 years ago.'
- source_sentence: I'm interested in writing a contemporary story centered around a lost and found department worker who has
    a mysterious gift for understanding people through their lost belongings. How can I make everyday objects feel extraordinary
    and meaningful?
  sentences:
  - '<Slice of Life> </Slice of Life> <The Mundane Made Extraordinary> </The Mundane Made Extraordinary> <The Bus Stop Philosopher>
    </The Bus Stop Philosopher> prompt Every day at the same bus stop, an elderly person shares a piece of profound, often
    humorous, wisdom with whoever is waiting.

    <Fairy Tale Retelling> </Fairy Tale Retelling> <Secrets> </Secrets> <Cinderella''s Other Slipper> </Cinderella''s Other
    Slipper> prompt What if Cinderella lost more than just a slipper, and the Prince finds something far more revealing about
    her true identity?'
  - '<Humor> </Humor> <Playful> </Humor> <The Pet Who Posts Online> </The Pet Who Posts Online> prompt You discover your pet
    has a secret social media account and is an internet sensation, critiquing your life choices.

    <Adventure> </Adventure> <Survival> </Adventure> <Escape from the Automated City> </Escape from the Automated City> prompt
    In a fully automated city where humans are pampered but controlled, a group decides to escape to the "wilds" outside.

    <Slice of Life> </Slice of Life> <Loss & Grief> </Slice of Life> <The Empty Swing Set> </The Empty Swing Set> prompt An
    elderly person sits by an empty swing set in a park, reminiscing about the past and finding a new connection.'
  - '<Historical Fiction> </Historical Fiction> <Betrayal & Trust> </Historical Fiction> <The Code Breaker''s Dilemma> </The
    Code Breaker''s Dilemma> prompt During a war, a codebreaker intercepts a message that could save many lives but would
    also expose a loved one as a traitor.

    <Contemporary> </Contemporary> <The Mundane Made Extraordinary> </Contemporary> <The Lost and Found Oracle> </The Lost
    and Found Oracle> prompt The person who runs the city''s lost and found department seems to have an uncanny ability to
    not only find lost items but also to offer profound insights about their owners.'
