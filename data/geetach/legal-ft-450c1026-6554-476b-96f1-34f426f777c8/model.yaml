widgetData:
- source_sentence: 'What are some challenges mentioned in building large language models like GPT-4?  '
  sentences:
  - 'This prompt-driven custom interface feature is so powerful and easy to build (once you’ve figured out the gnarly details
    of browser sandboxing) that I expect it to show up as a feature in a wide range of products in 2025.

    Universal access to the best models lasted for just a few short months

    For a few short months this year all three of the best available models—GPT-4o, Claude 3.5 Sonnet and Gemini 1.5 Pro—were
    freely available to most of the world.'
  - 'Large Language Models

    They’re actually quite easy to build

    You can run LLMs on your own devices

    Hobbyists can build their own fine-tuned models

    We don’t yet know how to build GPT-4

    Vibes Based Development

    LLMs are really smart, and also really, really dumb

    Gullibility is the biggest unsolved problem

    Code may be the best application

    The ethics of this space remain diabolically complex

    My blog in 2023'
  - 'I’ve found myself using this a lot. I noticed how much I was relying on it in October and wrote Everything I built with
    Claude Artifacts this week, describing 14 little tools I had put together in a seven day period.

    Since then, a whole bunch of other teams have built similar systems. GitHub announced their version of this—GitHub Spark—in
    October. Mistral Chat added it as a feature called Canvas in November.

    Steve Krouse from Val Town built a version of it against Cerebras, showcasing how a 2,000 token/second LLM can iterate
    on an application with changes visible in less than a second.'
- source_sentence: 'What are some examples of large language models that can run entirely in a browser or on personal devices
    mentioned in the context?  '
  sentences:
  - 'The boring yet crucial secret behind good system prompts is test-driven development. You don’t write down a system prompt
    and find ways to test it. You write down tests and find a system prompt that passes them.


    It’s become abundantly clear over the course of 2024 that writing good automated evals for LLM-powered systems is the
    skill that’s most needed to build useful applications on top of these models. If you have a strong eval suite you can
    adopt new models faster, iterate better and build more reliable and useful product features than your competition.

    Vercel’s Malte Ubl:'
  - 'Now add a walrus: Prompt engineering in DALL-E 3

    32.8k

    41.2k



    Web LLM runs the vicuna-7b Large Language Model entirely in your browser, and it’s very impressive

    32.5k

    38.2k



    ChatGPT can’t access the internet, even though it really looks like it can

    30.5k

    34.2k



    Stanford Alpaca, and the acceleration of on-device large language model development

    29.7k

    35.7k



    Run Llama 2 on your own Mac using LLM and Homebrew

    27.9k

    33.6k



    Midjourney 5.1

    26.7k

    33.4k



    Think of language models like ChatGPT as a “calculator for words”

    25k

    31.8k



    Multi-modal prompt injection image attacks against GPT-4V

    23.7k

    27.4k'
  - 'Things we learned about LLMs in 2024






















    Simon Willison’s Weblog

    Subscribe







    Things we learned about LLMs in 2024

    31st December 2024

    A lot has happened in the world of Large Language Models over the course of 2024. Here’s a review of things we figured
    out about the field in the past twelve months, plus my attempt at identifying key themes and pivotal moments.

    This is a sequel to my review of 2023.

    In this article:'
- source_sentence: 'What were some of the economic consequences of the railway construction boom in the 1800s?  '
  sentences:
  - 'I run a bunch of them on my laptop. I run Mistral 7B (a surprisingly great model) on my iPhone. You can install several
    different apps to get your own, local, completely private LLM. My own LLM project provides a CLI tool for running an array
    of different models via plugins.

    You can even run them entirely in your browser using WebAssembly and the latest Chrome!

    Hobbyists can build their own fine-tuned models

    I said earlier that building an LLM was still out of reach of hobbyists. That may be true for training from scratch, but
    fine-tuning one of those models is another matter entirely.'
  - 'An interesting point of comparison here could be the way railways rolled out around the world in the 1800s. Constructing
    these required enormous investments and had a massive environmental impact, and many of the lines that were built turned
    out to be unnecessary—sometimes multiple lines from different companies serving the exact same routes!

    The resulting bubbles contributed to several financial crashes, see Wikipedia for Panic of 1873, Panic of 1893, Panic
    of 1901 and the UK’s Railway Mania. They left us with a lot of useful infrastructure and a great deal of bankruptcies
    and environmental damage.

    The year of slop'
  - 'In 2024, almost every significant model vendor released multi-modal models. We saw the Claude 3 series from Anthropic
    in March, Gemini 1.5 Pro in April (images, audio and video), then September brought Qwen2-VL and Mistral’s Pixtral 12B
    and Meta’s Llama 3.2 11B and 90B vision models. We got audio input and output from OpenAI in October, then November saw
    SmolVLM from Hugging Face and December saw image and video models from Amazon Nova.

    In October I upgraded my LLM CLI tool to support multi-modal models via attachments. It now has plugins for a whole collection
    of different vision models.'
- source_sentence: Why was the model named o3 instead of o2, and when is it expected to ship?
  sentences:
  - 'A lot of people are excited about AI agents—an infuriatingly vague term that seems to be converging on “AI systems that
    can go away and act on your behalf”. We’ve been talking about them all year, but I’ve seen few if any examples of them
    running in production, despite lots of exciting prototypes.

    I think this is because of gullibility.

    Can we solve this? Honestly, I’m beginning to suspect that you can’t fully solve gullibility without achieving AGI. So
    it may be quite a while before those agent dreams can really start to come true!

    Code may be the best application

    Over the course of the year, it’s become increasingly clear that writing code is one of the things LLMs are most capable
    of.'
  - 'There’s now a fascinating ecosystem of people training their own models on top of these foundations, publishing those
    models, building fine-tuning datasets and sharing those too.

    The Hugging Face Open LLM Leaderboard is one place that tracks these. I can’t even attempt to count them, and any count
    would be out-of-date within a few hours.

    The best overall openly licensed LLM at any time is rarely a foundation model: instead, it’s whichever fine-tuned community
    model has most recently discovered the best combination of fine-tuning data.

    This is a huge advantage for open over closed models: the closed, hosted models don’t have thousands of researchers and
    hobbyists around the world collaborating and competing to improve them.'
  - 'The biggest innovation here is that it opens up a new way to scale a model: instead of improving model performance purely
    through additional compute at training time, models can now take on harder problems by spending more compute on inference.

    The sequel to o1, o3 (they skipped “o2” for European trademark reasons) was announced on 20th December with an impressive
    result against the ARC-AGI benchmark, albeit one that likely involved more than $1,000,000 of compute time expense!

    o3 is expected to ship in January. I doubt many people have real-world problems that would benefit from that level of
    compute expenditure—I certainly don’t!—but it appears to be a genuine next step in LLM architecture for taking on much
    harder problems.'
- source_sentence: 'When did Meta release the original Llama model?  '
  sentences:
  - 'Then in February, Meta released Llama. And a few weeks later in March, Georgi Gerganov released code that got it working
    on a MacBook.

    I wrote about how Large language models are having their Stable Diffusion moment, and with hindsight that was a very good
    call!

    This unleashed a whirlwind of innovation, which was accelerated further in July when Meta released Llama 2—an improved
    version which, crucially, included permission for commercial use.

    Today there are literally thousands of LLMs that can be run locally, on all manner of different devices.'
  - 'Each photo would need 260 input tokens and around 100 output tokens.

    260 * 68,000 = 17,680,000 input tokens

    17,680,000 * $0.0375/million = $0.66

    100 * 68,000 = 6,800,000 output tokens

    6,800,000 * $0.15/million = $1.02

    That’s a total cost of $1.68 to process 68,000 images. That’s so absurdly cheap I had to run the numbers three times to
    confirm I got it right.

    How good are those descriptions? Here’s what I got from this command:

    llm -m gemini-1.5-flash-8b-latest describe -a IMG_1825.jpeg'
  - 'So far, I think they’re a net positive. I’ve used them on a personal level to improve my productivity (and entertain
    myself) in all sorts of different ways. I think people who learn how to use them effectively can gain a significant boost
    to their quality of life.

    A lot of people are yet to be sold on their value! Some think their negatives outweigh their positives, some think they
    are all hot air, and some even think they represent an existential threat to humanity.

    They’re actually quite easy to build

    The most surprising thing we’ve learned about LLMs this year is that they’re actually quite easy to build.'
