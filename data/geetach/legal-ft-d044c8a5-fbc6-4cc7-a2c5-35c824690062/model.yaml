widgetData:
- source_sentence: How does DeepSeek v3’s training cost and the decline in LLM prices challenge the necessity of building
    extensive new infrastructure?
  sentences:
  - 'On the other hand, as software engineers we are better placed to take advantage of this than anyone else. We’ve all been
    given weird coding interns—we can use our deep knowledge to prompt them to solve coding problems more effectively than
    anyone else can.

    The ethics of this space remain diabolically complex

    In September last year Andy Baio and I produced the first major story on the unlicensed training data behind Stable Diffusion.

    Since then, almost every major LLM (and most of the image generation models) have also been trained on unlicensed data.'
  - 'The environmental impact got much, much worse

    The much bigger problem here is the enormous competitive buildout of the infrastructure that is imagined to be necessary
    for these models in the future.

    Companies like Google, Meta, Microsoft and Amazon are all spending billions of dollars rolling out new datacenters, with
    a very material impact on the electricity grid and the environment. There’s even talk of spinning up new nuclear power
    stations, but those can take decades.

    Is this infrastructure necessary? DeepSeek v3’s $6m training cost and the continued crash in LLM prices might hint that
    it’s not. But would you want to be the big tech executive that argued NOT to build out this infrastructure only to be
    proven wrong in a few years’ time?'
  - 'Embeddings: What they are and why they matter

