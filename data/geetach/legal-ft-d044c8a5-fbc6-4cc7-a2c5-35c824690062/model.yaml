- source_sentence: What is the new way to scale a model mentioned in the context?
  sentences:
  - 'A lot of people are excited about AI agents—an infuriatingly vague term that seems to be converging on “AI systems that
    can go away and act on your behalf”. We’ve been talking about them all year, but I’ve seen few if any examples of them
    running in production, despite lots of exciting prototypes.

    I think this is because of gullibility.

    Can we solve this? Honestly, I’m beginning to suspect that you can’t fully solve gullibility without achieving AGI. So
    it may be quite a while before those agent dreams can really start to come true!

    Code may be the best application

    Over the course of the year, it’s become increasingly clear that writing code is one of the things LLMs are most capable
    of.'
  - 'The biggest innovation here is that it opens up a new way to scale a model: instead of improving model performance purely
    through additional compute at training time, models can now take on harder problems by spending more compute on inference.

    The sequel to o1, o3 (they skipped “o2” for European trademark reasons) was announced on 20th December with an impressive
    result against the ARC-AGI benchmark, albeit one that likely involved more than $1,000,000 of compute time expense!

    o3 is expected to ship in January. I doubt many people have real-world problems that would benefit from that level of
    compute expenditure—I certainly don’t!—but it appears to be a genuine next step in LLM architecture for taking on much
    harder problems.'
  - 'If you think about what they do, this isn’t such a big surprise. The grammar rules of programming languages like Python
    and JavaScript are massively less complicated than the grammar of Chinese, Spanish or English.

    It’s still astonishing to me how effective they are though.

    One of the great weaknesses of LLMs is their tendency to hallucinate—to imagine things that don’t correspond to reality.
    You would expect this to be a particularly bad problem for code—if an LLM hallucinates a method that doesn’t exist, the
    code should be useless.'
- source_sentence: What are the two main factors driving the recent price drops in running prompts for LLMs?
  sentences:
  - 'One way to think about these models is an extension of the chain-of-thought prompting trick, first explored in the May
    2022 paper Large Language Models are Zero-Shot Reasoners.

    This is that trick where, if you get a model to talk out loud about a problem it’s solving, you often get a result which
    the model would not have achieved otherwise.

    o1 takes this process and further bakes it into the model itself. The details are somewhat obfuscated: o1 models spend
    “reasoning tokens” thinking through the problem that are not directly visible to the user (though the ChatGPT UI shows
    a summary of them), then outputs a final result.'
  - 'These price drops are driven by two factors: increased competition and increased efficiency. The efficiency thing is
    really important for everyone who is concerned about the environmental impact of LLMs. These price drops tie directly
    to how much energy is being used for running prompts.

    There’s still plenty to worry about with respect to the environmental impact of the great AI datacenter buildout, but
    a lot of the concerns over the energy cost of individual prompts are no longer credible.

    Here’s a fun napkin calculation: how much would it cost to generate short descriptions of every one of the 68,000 photos
    in my personal photo library using Google’s Gemini 1.5 Flash 8B (released in October), their cheapest model?'
  - 'This remains astonishing to me. I thought a model with the capabilities and output quality of GPT-4 needed a datacenter
    class server with one or more $40,000+ GPUs.

    These models take up enough of my 64GB of RAM that I don’t run them often—they don’t leave much room for anything else.

    The fact that they run at all is a testament to the incredible training and inference performance gains that we’ve figured
    out over the past year. It turns out there was a lot of low-hanging fruit to be harvested in terms of model efficiency.
    I expect there’s still more to come.'
- source_sentence: What new feature did Anthropic release that allows Claude to write and run interactive applications directly
    within its interface?
  sentences:
  - 'Here’s the rest of the transcript. It’s bland and generic, but my phone can pitch bland and generic Christmas movies
    to Netflix now!

    LLM prices crashed, thanks to competition and increased efficiency

    The past twelve months have seen a dramatic collapse in the cost of running a prompt through the top tier hosted LLMs.

    In December 2023 (here’s the Internet Archive for the OpenAI pricing page) OpenAI were charging $30/million input tokens
    for GPT-4, $10/mTok for the then-new GPT-4 Turbo and $1/mTok for GPT-3.5 Turbo.'
  - 'The GPT-4 barrier was comprehensively broken

    In my December 2023 review I wrote about how We don’t yet know how to build GPT-4—OpenAI’s best model was almost a year
    old at that point, yet no other AI lab had produced anything better. What did OpenAI know that the rest of us didn’t?

    I’m relieved that this has changed completely in the past twelve months. 18 organizations now have models on the Chatbot
    Arena Leaderboard that rank higher than the original GPT-4 from March 2023 (GPT-4-0314 on the board)—70 models in total.'
  - 'We already knew LLMs were spookily good at writing code. If you prompt them right, it turns out they can build you a
    full interactive application using HTML, CSS and JavaScript (and tools like React if you wire up some extra supporting
    build mechanisms)—often in a single prompt.

    Anthropic kicked this idea into high gear when they released Claude Artifacts, a groundbreaking new feature that was initially
    slightly lost in the noise due to being described half way through their announcement of the incredible Claude 3.5 Sonnet.

    With Artifacts, Claude can write you an on-demand interactive application and then let you use it directly inside the
    Claude interface.

    Here’s my Extract URLs app, entirely generated by Claude:'
- source_sentence: How did OpenAI initially enable voice conversations with ChatGPT in September 2023?
  sentences:
  - 'I think people who complain that LLM improvement has slowed are often missing the enormous advances in these multi-modal
    models. Being able to run prompts against images (and audio and video) is a fascinating new way to apply these models.

    Voice and live camera mode are science fiction come to life

    The audio and live video modes that have started to emerge deserve a special mention.

    The ability to talk to ChatGPT first arrived in September 2023, but it was mostly an illusion: OpenAI used their excellent
    Whisper speech-to-text model and a new text-to-speech model (creatively named tts-1) to enable conversations with the
    ChatGPT mobile apps, but the actual model just saw text.'
  - '“Agents” still haven’t really happened yet

    I find the term “agents” extremely frustrating. It lacks a single, clear and widely understood meaning... but the people
    who use the term never seem to acknowledge that.

    If you tell me that you are building “agents”, you’ve conveyed almost no information to me at all. Without reading your
    mind I have no way of telling which of the dozens of possible definitions you are talking about.'
  - "Industry’s Tardy Response to the AI Prompt Injection Vulnerability on RedMonk Conversations\n\n\nPosted 31st December\
    \ 2023 at 11:59 pm · Follow me on Mastodon, Bluesky, Twitter or subscribe to my newsletter\n\n\nMore recent articles\n\
    \nTwo publishers and three authors fail to understand what \"vibe coding\" means - 1st May 2025\nUnderstanding the recent\
    \ criticism of the Chatbot Arena - 30th April 2025\nQwen 3 offers a case study in how to effectively release a model -\
    \ 29th April 2025\n\n\n \n\n\nThis is Stuff we figured out about AI in 2023 by Simon Willison, posted on 31st December\
    \ 2023.\n\nPart of series LLMs annual review\n\nStuff we figured out about AI in 2023 - Dec. 31, 2023, 11:59 p.m. \nThings\
    \ we learned about LLMs in 2024 - Dec. 31, 2024, 6:07 p.m."
