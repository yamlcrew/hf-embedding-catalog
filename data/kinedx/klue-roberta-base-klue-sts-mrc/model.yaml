- source_sentence: 현대 식물원은 언제 오픈되었는가?
  sentences:
  - “납품 단가를 인하해도 조만간 주문량이 늘어날 것으로 생각하며 열심히 했습니다. 그런데 주문량이 줄면서 난감한 처지에 빠졌습니다.”최근 톈진의 한 삼성전자 협력업체 대표는 기자에게 이렇게 말했다. 최근 삼성전자가
    톈진 공장에서 휴대폰 생산 물량을 줄인다는 본지 기사(8월13일자 A1, 3면 참조)를 접하고 이런 하소연을 하는 중소기업 사장들이 적지 않다.이에 반해 국내 완성차 업체와 중국에 동반 진출한 자동차 부품사 사장들은
    표정이 밝았다. 상하이에서 만난 한 자동차 부품사 사장은 “중국의 차 메이커들이 검증된 한국 자동차 부품을 사기 위해 계약을 맺는 경우가 최근 들어 급증하고 있다”고 말했다.삼성은 톈진 공장의 물량을 줄이고 베트남
    생산을 늘리고 있다. 또 기존에 외부에서 사오던 금형 등 일부 부품은 비용 절감을 위해 자체 생산을 시작했다. 그러다 보니 톈진에 있던 삼성전자 협력업체들의 일감은 눈에 띄게 줄었다고 한다.그렇다고 삼성전자가 고의로
    협력업체들을 곤경에 빠뜨린 것은 아니다. 급증하던 스마트폰 판매가 정체된 데다 경쟁이 격화되면서 빚어진 현상이다. 삼성은 협력사와 거래를 끊거나 줄이려면 최소 3개월 전에 통보하도록 방침을 정해놨다. 제품별로는
    거래 중단 2~3년 전에 “지금 제품으로는 어렵지만 신기술을 개발하면 구매를 계속하겠다”고 제안하기도 한다. 신제품 개발을 위한 자금 지원도 해 준다. 협력업체들도 이런 사실을 대부분 인정한다. 그런데도 삼성이
    물량을 줄이면 속수무책인 게 해외에 동반 진출한 협력사들의 현실이다.중국 전문가들은 “중국 업체들로 눈을 돌리라”고 조언한다. 대표적인 성공사례가 중국 현지에 나가 있는 한국 자동차 부품 업체들이다. 이민호 KOTRA
    상하이 무역관장은 “고급화를 꾀하고 있는 중국 완성차 업체들이 성능이 보증된 한국 부품 업체들을 찾고 있다”며 “경쟁력 있는 업체들은 최근 수년 새 매출이 두 배 이상 뛴 경우도 있다”고 말했다. 휴대폰도 삼성에
    납품하며 검증된 실력이면 최근 떠오르는 화웨이 등 중국 업체들에도 충분히 통할 수 있다는 설명이다.중국의 기업 대 기업(B2B) 전자상거래 사이트도 적극 활용해볼 만하다. 중국은 영토가 워낙 넓어 전자·자동차 등
    분야의 완성품 업체들이 범용 부품을 전자상거래 사이트로 구매하는 사례가 늘고 있다. 중국 물류회사인 백세물류의 권영소 이사는 “한국보다 훨씬 질 낮은 제품을 만드는 중국 부품업체들이 온라인 판매를 통해 큰돈을 버는
    사례가 적지 않다”며 “한국 기업도 이를 적극 활용해야 한다”고 조언했다.
  - '식물원은 식물명으로 표시된 다양한 식물들의 수집, 재배, 보존, 전시 등을 위한 정원이다. 선인장과 다른 다육식물, 허브정원, 세계 특수 지역의 식물 등과 같은 전문 식물 수집품을 포함할 수 있으며, 열대식물,
    고산식물 또는 다른 외래 식물과 같은 특별한 수집품과 함께 온실과 그늘집이 있을 수 있다. 식물원의 방문객 서비스에는 관광, 교육 전시, 미술 전시회, 도서실, 야외 연극 및 음악 공연, 기타 오락 등이 포함될
    수 있다.


    식물원은 종종 대학이나 다른 과학 연구 기관들에 의해 운영되며, 식물 분류학이나 식물 과학의 다른 측면에 있는 헤르바리아와 연구 프로그램들을 종종 연관시켜왔다. 원칙적으로, 그들의 역할은 과학적 연구, 보존, 전시,
    그리고 교육의 목적을 위해 문서화된 살아있는 식물의 컬렉션을 유지하는 것이다. 이것은 이용 가능한 자원과 각각의 특정한 정원에서 추구되는 특별한 이익에 의존할 것이다.


    현대 식물원의 기원은 일반적으로 16세기 르네상스 이탈리아 대학 의학부에 식물학 교수들을 임명한 데서 비롯되며, 약용 정원의 큐레이션도 수반되었다. 그러나 오늘날 식물원의 목적, 내용, 청중은 고대 아테네의 리세움(Lyceum)에
    있는 테오프라스토스의 웅장한 정원과 교육적인 정원과 더 흡사하다 .'
  - 전국경제인연합회가 오는 17일 서울 여의도의 신축 회관인 FKI타워(사진) 준공식을 연다. 2008년 조석래 전 회장(효성그룹 회장) 시절 시작한 공사를 마치고 5년 만에 ‘새집’으로 이사한다. 전경련 안팎에선
    새 회관 입주를 계기로 그동안 옅어진 ‘재계 맏형’으로서의 위상과 입지를 회복해야 한다는 목소리가 높다. 전경련은 이에 따라 이번 준공식을 재도약의 발판으로 삼기 위해 회장단 회의에 좀처럼 모습을 드러내지 않던
    주요 그룹 총수는 물론 정치권과 정부 부처에도 대거 초청장을 보냈다.○전경련 위상 높이는 계기 될까전경련은 신축 회관 준공을 계기로 청와대와 정부가 재계와 소통하는 창구로서 ‘전경련’에 힘을 실어줄 것을 기대하고
    있다. 대기업들이 실질적으로 힘을 모아 산적한 경제 현안을 풀어가기 위해선 여전히 전경련만한 구심점이 없지 않으냐는 것이다.전경련 회관은 박근혜 대통령의 아버지인 박정희 전 대통령과도 깊은 ‘인연’이 있다. 1961년
    설립된 전경련은 1970년대 후반까지 ‘집’이 없었다. 자체 건물(회관)을 갖게 된 것은 1979년. 당시 전경련 회장이던 고(故) 정주영 현대그룹 명예회장이 “재계 대표 단체라는 위상에 걸맞게 제대로 된 집을
    가져야 한다”며 회관 신축을 주도했다. 공사는 1979년 10월29일 끝났고 정 회장은 전경련 회관이 갖는 의미를 되새기기 위해 박 전 대통령에게 친필 휘호와 함께 그해 11월16일 준공식 참석을 요청했다. 박
    전 대통령은 이에 ‘創造(창조), 協同(협동), 繁榮(번영)’이라는 휘호와 함께 준공식 참석을 흔쾌히 받아들였다. 전경련은 당시 박 전 대통령의 휘호를 새긴 휘호석도 제작했다. 그런데 행사를 보름가량 앞둔 10월26일
    박 전 대통령이 서거하면서 준공식은 조용히 치러졌다.전경련은 박 전 대통령의 휘호석을 신축 회관인 FKI타워 완공에 맞춰 정문 앞에 다시 설치했다.○대통령-전경련 회장단 회동은 언제쯤?전경련은 준공식에 역대 회장을
    비롯 현재 회장단을 구성하고 있는 20개 그룹 총수를 초청했다. 전경련 관계자는 “최태원 SK 회장, 김승연 한화 회장, 정준양 포스코 회장, 강덕수 STX 회장, 현재현 동양 회장 등 일신상의 이유로 참석하기
    어려운 그룹 총수를 제외한 나머지 회장단에 초청장을 보냈다”고 말했다.해외 체류 중인 이건희 삼성 회장을 제외하고 정몽구 현대자동차그룹 회장 등 주요 그룹 총수 대부분이 준공식에 참석할 가능성이 높다는 관측이 나온다.
    A그룹 관계자는 “현 정부 들어 경제민주화 바람과 대기업 오너들의 잇단 구설로 전경련의 위상이 약화됐다”며 “회관 준공식을 계기로 그동안 발길을 끊었던 그룹사를 포함해 회장단을 다시 결집하는 게 급선무”라고 지적했다.
- source_sentence: 유영 대신 황태자가 될 뻔한 인물은?
  sentences:
  - '어릴 때 아버지 유방이 언제나 라이벌이었던 항우에게 패하였을 때, 유영은 어머니와 같이 고향인 패현(沛縣)에 있고 아버지를 따르지 않았다. 그러나 기원전 205년 여씨와 유비 모자, 그리고 유방의 아버지인 태공
    유달 등이 항우에게 인질로 잡혀 2년 동안 잡혀 있다가 유방과 항우가 평화 조약을 맺자 그들은 모두 풀려나 유방이 있던 한중(漢中)으로 갔다.


    기원전 202년, 유방은 항우를 해하에서 패퇴시키고 장안에서 국호를 한(漢)이라 하고 황제에 오르니, 고조이다. 곧 유영은 황태자에 올랐는데, 처음에 유영이 장자가 아니라는 이유로 반대하는 의견이 있었으나, 장자
    유비(劉肥)의 어머니의 신분이 미천하고 유영이 유일한 적자인 점을 미뤄 결국 유영이 황태자로 책봉되었다. 하지만 고조는 유영을 총애하지 않고 3남인 척부인 소생의 유여의(劉如意)를 가장 총애하였으나 유영은 이를
    크게 신경쓰지 않고 오히려 유여의를 잘 대해 주었으나 모후인 여황후는 유영을 다음 황제로 만들기 위해 온갖 일을 마다치 않았다.


    기원전 195년, 고조 유방이 죽고 황태자 유영이 황제에 오르니 혜제이다. 혜제는 여전히 유여의를 귀여워하고 같이 사냥에도 나갔다. 그러나 태후가 된 모후 여태후는 고조 생전 당시 가장 많은 총애를 받은 척부인을
    매우 질투하였고 심지어는 그녀와 그녀의 아들 유여의를 죽이려는 음모를 꾸몄다.


    여태후는 혜제가 잠시 혼자 사냥을 다녀온 사이, 사람을 시켜 유여의를 죽이고, 그의 모친 척부인의 팔다리를 자르고 돼지우리에 넣어버리고 ''인간돼지''라 부르라 명하였다. 이 사실을 들은 혜제는 큰 정신적 충격을
    받았다. 이듬해인 기원전 194년, 혜제의 이복형 제왕 유비가 장안으로 왔을 때, 혜제는 큰 연회를 베풀었다. 그러나 여태후는 유비가 여전히 혜제의 가장 큰 정적이라 생각하고 유비의 앞에 독주를 준비하여 그를 죽일
    생각이었으나, 이를 알아챈 혜제는 유비에게 다가가 그 잔을 마시려 했고 놀란 여태후는 혜제의 손을 세게 쳐 다행히 혜제는 목숨을 구할 수 있었다. 이 두 사건은 혜제가 매우 선량하고 우애가 깊은 군주임을 짐작할
    수 있다.


    위의 두 사건 때문에 혜제는 정치에 뜻을 잃고, 여태후는 슬슬 자신의 문중 인사들을 조정에 발탁, 조정을 장악하였다. 야심이 큰 어머니 때문에 평생을 자신의 뜻대로 하지 못하고 산 혜제는 결국 기원전 188년,
    23세의 나이로 갑자기 붕어하였다. 시호는 효혜황제(孝惠皇帝)이다.'
  - 부당대출 의혹을 받던 우리은행 전 도쿄지점장 김모씨(56)가 지난 8일 스스로 목숨을 끊으면서 이 사건의 불똥이 어디까지 튈지에 관심이 모아지고 있다. 일부에선 우리은행과 우리금융지주의 전·현 경영진까지 여파가
    확산될 것이란 예상도 나온다. 9일 금융계에 따르면 김씨는 자살하면서 자신의 억울함을 호소하는 유서를 남기지 않은 것으로 전해졌다. 이를 두고 금융감독원 검사 결과 심적 부담을 느낀 김씨가 극단적인 선택을 한 것
    아니냐는 추측이 나오고 있다. 비자금 조성 및 전달 사실이 검사 결과 드러나면서 파장을 우려해 스스로 생을 마감한 것 아니냐는 분석도 조심스럽게 제기되고 있다. 금감원은 도쿄지점 비자금 의혹이 불거진 국민은행과
    마찬가지로 우리은행 도쿄지점에서도 부당대출 대가로 비자금이 조성되고 이 돈의 일부가 본사 경영진에 흘러갔을 가능성이 있다고 보고 있다. 금감원 관계자는 “검사가 아직 그 단계까지 가지도 않았다”며 “다만 전 도쿄지점
    직원에 대한 계좌 추적과 국내 송금 내역 등을 본 후 필요성이 제기되면 검사가 위로 확대될 가능성도 배제할 수 없다”고 말했다. 하지만 전·현 경영진은 부당대출과의 연관성을 강력히 부인하고 있는 것으로 알려졌다.
  - "스펜스는 그의 인력 시장에서의 시그널링 모델로 많이 알려져있다. 이 모델에서는 고용인들은 학력을 취득함으로써 고용주에게 자신의 능력에 대하여 신호를 보낸다. 이 때 고용주들은 높은 학력을 가진 사람들 사이에 좋은\
    \ 능력을 가진 사람의 비율이 높고, 좋지 않은 능력을 가진 사람에 비해 좋은 능력을 가진 사람들은 학력을 취득하는 것에 대한 비용이 더 적을 것이라 생각해 학력이 더 높은 고용인들에게 더 높은 봉급을 줄것이다.\n\
    \n스펜스는 중등, 고등 교육을 토론토에서 받였다. 1966년, 그는 프린스턴 대학교에서 철학을 전공으로 졸업한 후 옥스포드 대학교에서 로즈 장학금을 받았다. 스펜스는 옥스포드 대학에서 수학을 공부하였다. 스펜스는\
    \ 스탠포드 경영대학원의 학장이었으며 현재는 성장 및 개발위원회의 의장으로 활동하고 있다.\n\n2010년 9월 1일에 스펜스는 뉴욕 대학교 스턴 경영대학 교수로 재직하였다. \n\n스펜스는 현재 스탠포드 대학교\
    \ 후버연구소에서 선임연구원이다.\n\n스펜스 교수는 빌 게이츠의 가장 영향력있는 스승으로 평가받는다."
- source_sentence: OLED가 디자인의 다양성을 갖게 하는 재료는?
  sentences:
  - LG디스플레이가 경북 구미시에 1조500억원을 투자해 플렉시블(휘어지는) OLED(유기발광다이오드) 패널 생산라인을 새로 짓는다. 휘어지는 스마트폰, 웨어러블(착용형) 기기, 자동차용 디스플레이 등의 시장 확대에
    대응하기 위해서다.LG디스플레이는 구미에 6세대(1850×1500㎜) 크기의 플렉시블 OLED 생산라인을 설치하기로 하고 경상북도 및 구미시와 업무협약(MOU)을 맺었다. 이 기판을 잘라 스마트폰 등에 쓰이는 중소형
    디스플레이를 제조한다. 3분기 투자를 시작해 2017년 2분기 완공할 예정이다. 플렉시블 OLED는 접거나 돌돌 마는 등 자유롭게 형태를 바꿀 수 있다. LG디스플레이가 플렉시블 OLED 패널 생산라인에 1조원
    이상을 투자하는 것은 미래 수익원을 확보하기 위한 전략이다. 플렉시블 OLED시장은 빠르게 커지고 있다. 최근 스마트폰과 스마트워치에 LCD(액정표시장치) 대신 OLED 패널을 적용하는 사례가 점점 늘고 있다.
    OLED는 백라이트가 없어 두께가 얇고 유리가 아닌 플라스틱으로도 제작할 수 있기 때문에 다양한 디자인을 구현하기가 편하다. 약점으로 지적됐던 화면 밝기도 상당히 개선됐다. 지난해 중반까지만 해도 중소형 OLED
    패널시장은 삼성디스플레이가 점유율 90% 이상을 차지했다. 하지만 지난해 말 중국 에버디스플레이가 중소형 고화질(HD)급 OLED 패널을 생산한 데 이어 대만 AUO, 이마진도 최근 웨어러블(착용형) 기기용 소형
    패널을 생산하기 시작했다.이런 변화가 시작되자 LG디스플레이는 단순 OLED 패널보다 한 단계 진화한 플렉시블 OLED 패널에 주목했다. 플렉시블 OLED는 접거나 돌돌 말 수 있다. 지갑형으로 접는 스마트폰이나
    차량 내부의 곡면형 디스플레이도 제작할 수 있다. LG디스플레이는 그동안 경기 파주사업장에서 중소형 4.5세대(730×920㎜) 플라스틱 OLED를 월 1만5000장 생산했다. 2017년 2분기 신규 라인이 완공되면
    6세대 크기의 플렉시블 OLED 패널을 월 7500장(기판 투입 기준) 생산할 계획이다. 패널 한 장에서 5.5인치 스마트폰 200개 이상을 생산할 수 있다. 기존 4.5세대보다 한 장의 패널에서 생산할 수 있는
    제품량이 약 네 배 많다.
  - 여름 휴가시즌이 마무리 단계에 접어들면서 아파트 분양 시장이 다시 분주해지고 있다. 이번주에는 전국에서 7개 사업장이 청약을 받고 8개 사업장이 모델하우스를 개장한다.19일 한화건설은 서울 정릉동 정릉10구역 재개발
    아파트인 ‘정릉 꿈에그린’의 청약을 받는다. 349가구(전용 52~109㎡) 규모로 이 중 145가구가 일반에 분양된다. 북부간선도로와 내부간선도로가 가까워 서울 전역으로 이동하기 편리하다. 우이~신설 경전철역인
    정릉삼거리역(가칭·2016년 개통 예정)이 주변에 들어설 예정이다.모델하우스 개관도 잇따른다. 현대건설은 21일 서울 마곡지구에서 ‘힐스테이트 에코 동익’ 오피스텔 모델하우스를 연다. 899실(전용 22~44㎡)로
    서울지하철 5호선 마곡역이 도보 5분 거리다.22일 삼정은 대구 달성군 세천리에서 ‘북죽곡 삼정그린코아 더 베스트’ 견본주택 문을 연다. 같은 날 금성백조주택은 세종시 2-2생활권에서 ‘세종 예미지’ 내방객을 맞는다.
    국세청, 우정사업본부, 소방방재청 등 공공기관이 가까이 있어 배후 수요가 풍부할 전망이다.
  - 발광다이오드(LED) 전문기업 서울반도체(사장 이정훈·사진)가 주가 관리를 위해 자사주를 매입하기로 했다. 이 회사가 자사주를 매수해 주가관리에 나서기는 상장 후 처음이다.서울반도체는 15일 이사회를 열고 100억원어치
    자사주를 매입하기로 결정했다. 이날 종가 1만9400원을 기준으로 하면 51만여주를 살 수 있다. 전체 발행 주식 수의 0.9% 정도다. 서울반도체 관계자는 “기업 가치에 비해 주가가 낮다고 판단해 자사주를 매입하기로
    했다”고 설명했다. 지난해 4월 5만원에 육박했던 서울반도체 주가는 최근 2만원 밑으로 내려왔다. 2002년 코스닥시장에 상장한 서울반도체는 지금까지 한 번도 자사주를 매입하지 않았다. 2008년 글로벌 금융위기
    때 주가가 폭락했어도 주가 부양을 위한 별도의 대책을 내놓지 않았다.그만큼 최근 상황을 심각하게 받아들인다는 얘기다. 서울반도체의 실적은 최근 급속히 나빠졌다. 지난해 6년 만에 처음 적자를 냈다. 하반기로 갈수록
    악화돼 4분기 적자 규모만 300억원을 넘었다. 이정훈 서울반도체 사장은 지난 2월 기업설명회(IR) 자리에서 “중국 업체들의 저가 LED 공세로 세계 LED시장의 경쟁이 치열하지만 특허경쟁력을 바탕으로 올 1분기에는
    손익분기점 수준을 맞출 것”이라고 했다. 하지만 증권가에서는 이 말을 있는 그대로 받아들이지 않고 있다. 상황이 나쁘기 때문이다.
- source_sentence: 내년부터 서울지역 대학에서 실시하지 않는 대입전형은?
  sentences:
  - '생일날, 남자친구 드류에게서 문자 한통으로 이별을 통보받은 오드리. 그녀는 잔뜩 분노하며 절친 모건과 함께 집에 있던 드류의 물건들을 모두 태워버린다. 그날이후, 오드리는 일하던 가게에 찾아온 손님에 의해 어느
    봉고차앞까지 오게됐고 얼떨결에 차에 올라탔다. 그리고 오드리를 데려온 두 남자들은 뜻밖의 이야기를 늘어놓는다. 평범한 소시민인줄로만 알았던 드류는 사실 CIA 요원이었고 현재 실종상태라는 것이다. CIA는 오드리가
    그의 애인이란걸 알고는 드류의 행방을 물었지만 급작스럽게 너무 많은걸 알게된 오드리는 횡설수설했고 남자들 역시 별다른 소득이 없자 순순히 그녀를 풀어준다.


    집으로 돌아온 오드리는 곧바로 모건에게 드류가 스파이며 CIA 요원들이 드류를 찾고있다는 이야길 해주었지만 전화통화를 하느라 정신없었던 모건은 그녀의 말을 귀담아듣지 않았다. 바로 그때, 창문에서 요란한 소리가
    나더니 드류가 나타났다. 하지만 빈정이 상해있던 오드리는 물건들을 모두 태우고 남은 박스만을 건네주었는데 난데업싱 드류의 이마에 빨간점이 생겼다. 그 순간, 오드리의 집에 엄청난 총격이 쏟아지기 시작했고 순식간에
    그녀의 집은 아수라장이 되고 말았다. 총격을 피해 식탁밑에 몸을 숨기고 있는데 누군가 그에게 총을 겨누었다. 그는 바로 모건의 남자친구. 그 역시 킬러였던 것이다.


    드류는 오드리에게 어떤 트로피를 하나 넘겨주며 오스트리아 비엔나에 있는 카페에서 ''베른''이라는 자를 만나라는 말을 남기고는 총에 맞아 즉사해버렸고 혼자 남은 오드리는 재빨리 친구 모건과 도망쳐 나왔다. 차를
    타고 도망가는 길, 어디를 가야할지 고민하던 두 사람은 드류의 부탁을 들어주자는 모건의 제안으로 오스트리아로 향했다. 이후 비엔나에 한 카페에서 식사를 하고있던 두사람은 평화로운 카페가 총질과 칼질이 난무하는 아수라장으로
    변하는걸 보고는 자신들이 국제범죄에 연루되었단 사실을 깨닫고 급히 도망길에 오른다. 하지만 이미 오드리가 가진 트로피를 노리는 자들이 줄줄이 따라붙기 시작했다.


    이후 오드리와 모건은 도망길에 우연히 만난 CIA 요원 세바스찬으로부터 여러가지 기술을 전수받으며 스파이로 거듭나기 시작한다.'
  - '추축국의 오스트레일리아 공격


    논란에도 불구하고 추축국이 오스트레일리아에 대하여 가한 공격은 많이 있다. 오스트레일리아가 주요 전선에서 상당히 떨어져 있었지만 오스트레일리아 해역에서 추축국의 공격은 상당히 많았다. 독일 제국해군과 일본 제국해군의
    전함 및 잠수함은 1940년부터 1945년 사이에 연합군의 전함과 항구, 그리고 다른 목표들을 공격했다. 대표적인 예가 1942년의 다윈 공습과 시드니 항 공격이다. 일본 잠수함들은 오스트레일리아 항구 및 오스트레일리아
    주도를 향해 포격을 가하기도 했다. 1942년까지 오스트레일리아에 대한 추축국의 위협은 증가했다. 1943년 일본군은 오스트레일리아 해역에서의 작전을 갱신했지만 연합군의 방어가 거세짐에 따라 그렇게 효과를 보지는
    못했고, 1944년부터 1945년까지는 간헐적인 분쟁만 발생했다.


    일본군은 전쟁 초기에 오스트레일리아 침공 계획을 가지고 있지 않았다. 일본군은 군사력이 충분했고 오스트레일리아는 방어 능력이 부족했다. 1942년 싱가포르 함락 이후 오스트레일리아는 공포심에 자국을 방어하기 위해
    미국과의 동맹을 강화했다. 도쿄에서 해군은 비밀리에 일본 육군과 도조 히데키에 침공안을 제시했지만 이는 거부되었다. 도조 히데키는 오스트레일리아의 지정학과 연합군의 방어력을 바탕으로 작전이 실행될 수 없다고 보았다.
    일본군은 대신에 오스트레일리아를 고립시키는 방안을 채택했으나 산호해 해전과 미드웨이 해전 이후에 이 계획도 파기했다.'
  - 연세대 등 서울지역 6개 대학이 내년 3월 말 확정할 예정인 2018학년도 대입전형에서 수시 논술 전형과 정시모집을 크게 바꾸지 않겠다고 밝혔다.성균관대 연세대 이화여대 중앙대 한국외국어대 한양대(가나다순) 등
    서울지역 6개 대학 입학처장은 24일 공동명의로 낸 의견서에서 “2018학년도 대입전형을 둘러싸고 논술 전형 및 정시 전형 폐지와 학생부 전형 확대 등에 대한 문의가 쇄도하고 있다”며 “섣부른 예단과 근거 없는
    소문이 확산하는 것을 막고자 공동으로 의견을 발표하게 됐다”고 말했다.6개 대학 처장들은 현재 고1 학생이 치를 2018학년도 대입전형의 전반적 방향으로 △학생부 전형·논술 전형·특기자 전형 모집 인원의 적정선
    유지 △대학수학능력시험과 면접 전형의 적절한 활용 △정시 전형 모집 인원의 적정선 유지를 제시했다. 이들은 “각 대학 사정에 따라 제시된 항목의 점진적 증감은 있을 수 있겠지만 전면 폐지나 대폭 확대 또는 축소는
    없을 것”이라고 설명했다.처장들은 “아무리 좋은 변화라도 폭과 속도를 적절히 조율해야 수험생과 학부모, 고등학교의 혼란을 줄일 수 있고 현재 학생부·수능·논술·특기자라는 대입전형의 네 가지 틀이 각기 교육적 순기능을
    발휘하고 있다”고 강조했다. 고려대가 지난달 수시모집 논술 전형을 폐지하고 특기자 전형과 정시 모집을 대폭 축소하겠다는 대입전형안을 발표한 이후 이들 대학의 대입안 변경 여부에 관심이 쏠렸었다.
- source_sentence: 휴가에 '뱅크 2.0'을 읽고자 하는 사람 이름은?
  sentences:
  - 다음달 초 휴가를 가는 임종룡 금융위원장은 미국 버락 오바마 정부의 초대 재무부 장관을 지낸 티머시 가이트너가 쓴 ‘스트레스 테스트’를 읽을 계획이다. 미국의 금융위기 극복 과정 등을 담은 책이다. 윤종규 KB금융지주
    회장은 휴가 때 읽을 책으로 ‘생물학 이야기’를 골랐다. 김웅진 미 캘리포니아공과대 교수가 쓴 이 책은 생물학이라는 렌즈를 통해 삶과 사회, 역사를 바라본다.금융권 최고경영자(CEO)들이 여름 휴가 때 읽을 책에
    관심이 쏠리고 있다. 금융 관련 서적을 챙겨간다는 CEO도 있지만, 금융과 무관한 인문학 서적을 휴가 필독서로 꼽은 경우도 적지 않다.진웅섭 금융감독원장은 프랑스 철학자 몽테뉴가 쓴 ‘몽테뉴 수상록’을 선택했다.
    몽테뉴 자신의 체험을 바탕으로 인생의 솔직한 고민을 담은 이 책을 통해 삶의 지혜를 배우겠다는 것이다. 진 원장은 “책의 요약본을 읽은 적이 있는데, 제대로 한 번 볼 생각”이라고 말했다. 성세환 BNK금융지주
    회장은 ‘생각하는 힘, 노자 인문학’(저자 최진석 서강대 철학과 교수)을 읽을 계획이다.홍기택 산업은행 회장은 다음주 휴가 때 미국 온라인 결제서비스기업 페이팔 설립자인 피터 틸이 지은 ‘제로 투 원’을 탐독하기로
    했다. 이 책은 “독점은 모든 성공적 기업의 현재 상태”라고 설명하며 어떻게 ‘0에서 1로’ 새로운 것을 창조하는 기업으로 키울 수 있는지 알려준다. 홍 회장은 지난 2월 한국을 찾은 틸을 직접 만나 대화를 나누기도
    했다.김용환 농협금융지주 회장은 미국 GM 부회장 등을 지낸 밥 루츠가 쓴 ‘빈 카운터스’를 골랐다. ‘콩 세는 사람’이라는 뜻의 빈 카운터스는 기업에서 숫자로 모든 것을 움직이려는 사람을 말한다. 이 책은 숫자로
    무장한 재무전문가들이 어떻게 기업을 망칠 수 있는지 보여준다. 박인규 DGB금융지주 회장은 ‘경영의 신’으로 불리는 일본 교세라 명예회장 이나모리 가즈오의 ‘어떻게 의욕을 불태우는가’를 읽는다. 김덕수 KB국민카드
    사장과 박종복 스탠다드차타드(SC)은행장은 각각 세계적 금융 전문가인 브렛 킹이 쓴 ‘핀테크 전쟁’과 ‘뱅크 2.0’을 읽을 생각이다.    김일규/박신영/박한신 기자
  - ‘현대무용 같지 않다.’ 오는 15일까지 서울 서초동 예술의전당 자유소극장 무대에 오르는 국립현대무용단의 ‘춤이 말하다-크로스 컷(Cross Cut)’을 보고 든 생각이다.공연에 해설을 곁들인 ‘렉처 퍼포먼스’란
    형식 덕분일까. ‘현대무용’ 하면 반사적으로 떠오르는 난해함과 추상성이 이 작품엔 없다. 구체적이고 직설적이다. 그래서 일반 관객들이 쉽게 받아들일 만큼 이해하기 쉽다.무대엔 이 시대를 살아가는 춤꾼 6명이 등장한다.
    아니, 출연자들은 공연 시작 전에 이미 무대에 나와 몸을 풀고 있다. 상모춤 명인 김운태, 발레리나 김지영 김주원, 현대무용수 이선태 이나현, 스트리트댄서 김기헌 안지석이 그 주인공. 공연이 이미 시작됐는데도 이들은
    여전히 스트레칭을 한다. 공연이 지체되나 했는데 그게 아니다. 첫 번째 문을 연 김지영은 무대에서 태연히 물을 마시고, 가방에서 의상을 꺼낸다. 관객과 무대 가운데 놓였던 보이지 않는 벽이 스르르 무너진다.자신만의
    세계를 공고히 쌓은 이들 6명은 조곤조곤 이야기한다. “때론 발레가 힘들고 지겹고 그래요.”(김지영) “‘비보이 그거 언제까지 할래?’ 이런 말 들을 때 힘 빠져요.”(김기헌) “고3 때 무용콩쿠르에서 상을 타기
    위해서 의미는 없지만 멋있는 동작을 짰어요. 이런 거요.”(이선태) “먹히면 무대에 서는 거고, 안 먹히면 내려오는 거죠.”(김운태)춤의 정의부터 시작해 춤꾼으로 살아가는 고충, 춤에 대한 철학을 설명하고 보여준다.
    무대 조명만 있는 단출한 무대는 춤꾼들의 민낯을 보여준다는 이번 공연의 취지와 잘 어울린다. 다만 즉흥이 무대를 이끄는 동력이라 그럴까. 출연진 간의 즉흥 컬래버레이션을 볼 때 긴장돼서 조마조마하다. 안애순 국립현대무용단
    예술감독은 지난 7월 취임하며 예술성과 대중성 두 마리 토끼를 잡겠다고 했다. 대중과의 거리를 좁히는 데 성공한 것 같다. 2만~3만원. (02)3472-1420
  - 한국은 캐나다와 자유무역협정(FTA)을 맺으면서 ‘경제영토’를 북미 전체로 확장하게 됐다. 캐나다는 G8 회원국이자 세계 11위 경제 대국이다. 한국과의 교역 규모는 지난해 99억2200만달러로 적은 편이지만 시장의
    잠재 성장 가능성은 높다는 평가다. 특히 FTA 발효 2년 후 자동차 관세가 완전 철폐되면서 한국산 자동차의 가격 경쟁력이 높아질 전망이다. ○일본 앞서 시장 선점한·캐나다 FTA 체결로 가장 이득을 보는 품목은
    자동차다. 캐나다는 한국의 5대 자동차시장이다. 지난해 캐나다에 수출한 자동차 수는 13만3000대. 캐나다는 현재 한국산 자동차에 부과하는 관세 6.1%를 발효 시점부터 2년 동안 단계적으로 없애기로 했다. 이렇게
    되면 일본·유럽산 자동차보다 가격경쟁력에서 앞설 수 있게 된다. 북미자유무역협정(NAFTA) 회원국인 미국·멕시코산 자동차와 비슷한 조건에서 경쟁할 수 있다. 작년 캐나다 자동차시장 점유율은 미국 44.5%, 일본
    33.6%, 한국 12.0%, 유럽 9.9% 등이다. 캐나다가 일본과 FTA 협상을 진행 중이고 유럽연합(EU)과는 추가 협상 문제로 발효가 늦어지고 있어 FTA 발효를 서두른다면 적어도 수년간은 시장 선점 효과를
    누릴 수 있을 것으로 보인다. 김태년 한국자동차산업협회 이사는 “소형차의 경우 영업이익률이 3%밖에 안되기 때문에 관세 철폐 효과가 클 것으로 기대된다”고 말했다.주요 수출 품목인 자동차 부품도 3년 내 6%에
    달하는 관세가 사라진다. 7%에 이르는 타이어 관세는 5년 뒤 완전 철폐된다. 관세율이 8%인 세탁기는 FTA 발효 즉시 없어지고, 6%인 냉장고 관세도 3년 내 철폐돼 가전제품 수출에도 파란불이 켜졌다. 평균
    관세율 5.9%인 섬유도 대부분 3년 내 관세가 사라진다. 개성공단 원산지 인정 문제에 관해서는 향후 역외가공지역위원회 설립과 충족 기준을 논의하기로 했다. 이와 관련, 박근혜 대통령은 “개성공단 제품이 한국산으로
    인정받아 관세 혜택을 받을 수 있도록 캐나다와 적극 협의해나갈 것”이라고 말했다. ○쌀 분유 인삼은 제외대신 한국은 소고기(관세율 40%)는 15년, 돼지고기(22.5~25%) 삼겹살(냉장냉동)은 13년 내 시장을
    완전 개방하기로 했다. 닭고기(18~30%) 오리고기(18~27%) 등 가금육도 부위에 따라 10년 내 관세를 없애야 한다. 딸기·자두·키위(45%), 감(50%) 등 과실류는 10년 뒤 관세가 철폐된다. 겉보리(324%),
    쌀보리(299.7%) 등 곡물류는 15년 후에 관세를 없앨 계획이다. 최경림 산업통상자원부 통상차관보는 “한국은 수출 주력 제품의 북미시장 점유율을 높일 수 있고, 캐나다는 미국·EU와 FTA를 체결한 한국을 아시아
    진출의 교두보로 삼을 수 있다는 점에서 상호 접점을 찾았다”고 설명했다. 한국은 캐나다와 ‘FTA 동맹’으로 묶이면서 세계 최대 다자간 FTA인 환태평양경제동반자협정(TPP) 참여도 수월해질 전망이다. 캐나다는
    미국 호주 뉴질랜드 멕시코 페루 칠레 싱가포르 브루나이 베트남 말레이시아 일본 등 11개국과 함께 기존 TPP 협상국이다. 한국은 이 중 일본 멕시코 뉴질랜드를 제외한 9개국과 FTA를 맺은 것이다. 지난해 11월
    TPP 참여에 관심을 표명한 정부는 기존 12개 협상 참여국과 1차 예비 양자협의를 마쳤다. 조미현/정종태/고은이 기자
