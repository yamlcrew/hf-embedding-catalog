      \ Device API reference -> PME flags]\nAnchor_id: pmeFlags\nParameter Value Documentation PME_System 2 Can do system\
      \ stuff (play/pause.. mostly safe things) PME_System_Safe 4 Can do critical system stuff (add markers.. things that\
      \ can't be done when a modal\n            window is shown) PME_PreviewNote 8 note trigger previews notes | controls\
      \ stuff PME_FromHost 16 when the app is hosted PME_FromMIDI 32 coming from MIDI event"
