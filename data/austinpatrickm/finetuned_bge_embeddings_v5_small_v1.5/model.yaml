  - source_sentence: If I save the project after clicking "Continue," will the missing files be automatically relinked or
      do I need to fix the file paths manually?
    sentences:
    - "Document_title: The Playlist \nFile_name: playlist.htm\nHeading_hierarchy: [The Playlist -> Universal Clip Editing\
      \ Methods]\nAnchor_id: [none]\n• Snap settings ( [Image: Horseshoe magnet icon, gray background | Ref: img_glob/flicon_snap.png]\
      \ ) - Snap controls how Clips move on the Playlist grid and many of the other editing functions below. Set this to '\
      \ line ' if you want the Clips to snap to bar boundaries or to ' none ' if you want to\nfreely position & slice Clips.\
      \ • Inserting Clips - To insert a Clip, select the Clip you want to place from the Clip Source menu (indicated above)\
      \ OR Right-Click the Clip focus selectors (indicated above) to choose Clips of the type selected. Next, in Draw ( [Image:\
      \ Gray pencil drawing/editing tool\nicon | Ref: img_glob/flicon_pencilup.png] ) or Paint ( [Image: Paintbrush dripping\
      \ with liquid icon | Ref: img_glob/flicon_paint.png] ) mode, Left-click on an empty area of a Clips track where you\
      \ want to place the Clip. Paint mode allows you to paint multiple instances of the Clip at once (hold the\nMouse button\
      \ & drag). • Insert time into the Playlist (shift Clips to the right) - Hold ( Ctrl ), click and drag on the time-line\
      \ at the top of the Playlist starting from the point you want to insert space into the timeline AND for the duration\
      \ of the insertion you want. With ( Ctrl ) still held press the ( Ins\nert ) key on your keyboard. Insert time into\
      \ the Playlist (slice and move Clips to the right) - Make a time selection as above, then hold ( Ctrl+Alt ) and press\
      \ the ( Insert ) key on your keyboard. The slice point will be at the start of the selection. • Delete a time selection\
      \ - Hold ( Ctrl ), click and\ndrag on the time-line at the\n      top of the Playlist to select the region to be deleted.\
      \ Press ( Ctrl+Del ) to delete all patterns in the current selection and move Clips to the right of the selection into\
      \ the gap. • Select Clips - To make a selection of more than one Clip. Use the [Image: Dashed square crop selection\
      \ icon | Ref:\nimg_glob/flicon_select.png] Select tool and click and drag a rectangle around the Clips to be selected.\
      \ To add Clips to this selection hold the ( Shift ) key and make further selections. OR if you are in Draw or Paint\
      \ mode, hold  ( Ctrl ) key and you will drop into Select mode while the ( Ctrl ) key is\nheld. Holding the ( Ctrl+Shift\
      \ ) keys will allow you to add and remove Clips to / from an existing selection. OR use the Magic lasso feature. Move\
      \ your Mouse pointer in a loop that encloses the Clips you want to select (no clicking required, it's 'magic' remember).\
      \ Make sure you have no Clips\nselected before you perform the lasso action (Right-Click the empty Playlist to deselect\
      \ all Clips and make another selection). • Zoom to area - ( Ctrl+Right-Click ) and drag over a selection of the Playlist.\
      \ Un-Zoom area - ( Ctrl+Right-Click ) anywhere\n      on the Playlist (don't drag). • Zoom to a Clip - ( Ctrl+Shift+Right-Click\
      \ ) on a Clip will maximize the zoom\n      of the Playlist to the selected Clip. To Un-Zoom Clip - ( Ctrl+Right-Click\
      \ ) anywhere\n      on the Playlist (don't drag in this mode since that is how to zoom to selection). • Delete/Erase\
      \ a Clip - Right-Click the target Clip or use the left Mouse button if you are in erase ( [Image: Circular gray \"no\
      \ entry\" symbol icon | Ref: img_glob/flicon_delete.png] ) mode. • Copy/Paste Clips - Make\na selection, release the\
      \ Mouse and any keys held, then hold the ( Shift ) key, then click on the selection and drag. A copy of the selection\
      \ will follow the Mouse cursor. Release the selection when the Clips are in the alternative location. NOTE: In ' Slice\
      \ tool ' mode this will initiate a slice, not\ncopy. OR Make a selection, press  ( Ctrl+C ) to copy, then scroll the\
      \ Playlist so that the starting bar for the paste location is at the left edge of the Playlist and press  ( Ctrl+V ).\
      \ • Duplicate selection - Make a selection and press ( Ctrl+B ). The selection, or all Clips if no selection is made,\
      \ will be\nduplicated to the right of the original selection."
    - 'Title: If I use the academic version of FL Studio, do I own copyright to the music I make with it?

      Answer: Yes.However, this does not allow you to sell the music or rent it for hire. Please see this article: [What about
      commercial use of the music produced with FL Studio educational? In other words, can produced music be sold?](https://support.image-line.com/action/knowledgebase/?ans=381)'
    - 'Title: Error: no disk in drive

      Answer: Issue This error usually occurs when an FLP (FL Studio project) looks for a sample/file in a location that doesn''t
      exist (disconnected/offline drives or renamed drives) or one that doesn''t have a disc inserted (DVD drive for example).
      Solution Click "Continue" and let the FLP load until the end. Save the project and the message should no longer present
      for that project. Note: If the error still presents itself after following the above steps try restarting your computer.
      Image-Line Support Team'
