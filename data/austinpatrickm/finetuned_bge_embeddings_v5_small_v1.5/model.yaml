widgetData:
- source_sentence: How can I add the program to my antivirus exception list to stop these "Access is denied" errors when saving
    files?
  sentences:
  - 'Title: Russian Federation "Google Tax"

    Answer: Payment of Taxes to the Russian Federation Residents from the Russian Federation need to pay tax on their online
    purchases.This 20% tax is one that is forced upon all online sales to the Russian Federation.We as a seller are obliged
    to pay this tax to your country for each purchase in our web shop by citizens of the Russian Federation.[I](https://tax.thomsonreuters.com/blog/tax/indirect-tax/google-tax-is-coming-to-russia/)mage-Line
    Support Team'
  - 'Document_title: Tools Menu

    File_name: menu_tools.htm

    Heading_hierarchy: [Tools Menu]

    Anchor_id: [none]

    [Image: Top menu bar with text options | Ref: img_shot/menu_bar_selecttools.png] The Tools menu contains useful tools
    for working with channels, patterns, effects and provides the ability to use external applications as tools inside FL
    Studio.'
  - 'Title: Cannot create file / Access is denied / Unable to write to / Couldn''t create the file / Please check that no
    other application is currently using it

    Answer: Anti virus programs can trigger one or more of the following error messages: Error messages: Cannot create file
    ''C:\Users\[USER]\Documents\Image-Line\FLEX\Images\[Filename].jpg''. Access is denied. Cannot create file ''C:\Users\[USER]\Documents\Image-Line\FL
    Studio\Audio\Sliced audio\[Filename].wav''. Access is denied. Cannot create file "C:\Users\[USER]\Documents\Image-Line\FL
    Studio\Presets\Clipboard files\Audio clipboard.wav". Access is denied. Unable to write to C:\Users\[USER]\Documents\Image-Line\FLEX\Packs\[Filename].ini.
    Couldn''t create the file

    ''[Filename].wav''. Please check that no other application is currently using it. As [USER] for example: John (your Windows
    account name)As [Filename] for example: Arksun Cityscape-1.jpg, Arksun Cityscape-1.ini, recording.wav Symptoms: Can''t
    render audio, "Couldn''t create the file ''[Filename].wav''. Please check that no other application is currently using
    it." error is showing up. FLEX doesn''t work, "Cannot create file ''C:\Users\[USER]\Documents\Image-Line\FLEX\Images\[Filename].jpg''.
    Access is denied.", "Unable to write to

    C:\Users\[USER]\Documents\Image-Line\FLEX\Packs\[Filename].ini." error is showing up. You can''t drag and drop files from
    NewTone, NewTime or Edison into FL Studio. You can''t use "paste from clipboard" as "Cannot create file "C:\Users\[USER]\Documents\Image-Line\FL
    Studio\Presets\Clipboard files\Audio clipboard.wav". Access is denied." error is showing up. You can''t consolidate or
    quickrender tracks or patterns as "Couldn''t create the file ''[Filename].wav''. Please check that no other application
    is currently using it." error is showing up. You try to render audio and the file is not

    showing up, this could also be caused by an Antivirus. Please check if Avast or AVG Anti-virus is installed. Avast and
    AVG block the usage of the document folder for FL Studio. The solution is to add FL Studio to the exception list. Fix
    for Avast: 1: Open Avast and navigate to the Avast dashboard 2: Click Menu and click the Settings tab. Click the Exclusions
    tab under the General tab 3: Add &gt; add the path of the installation folder from FL Studio &gt; add to Avast whitelist
    Fix for AVG: 1: Open the AVG Dashboard &gt; Menu &gt; Settings 2: Click on General &gt; Exceptions &gt; Add

    Exception 3: Click on Browse &gt; navigate to the installation folder of FL Studio Other solutions: If the solutions above
    does not help, these could be some issues, have a look at the article linked below: Wrong user data location Controlled
    Folder Access is activated [FL Studio | Failed to create user data folder / Unable to create file / Errors saving data](https://support.image-line.com/action/knowledgebase?ans=646)
    Please report this issue to your Antivirus provider, so they are able to add FL Studio to their database. As FL Studio
    is always evolving, the code signature/fingerprint AVG

    and Avast is using changes and will again be blocked in the future. Image-Line Support Team'
- source_sentence: Can I use the Gate parameter to create a staccato effect by cutting off the sound immediately when I release
    a key?
  sentences:
  - 'Document_title: Plucked!

    File_name: plugins/Plucked!.htm

    Heading_hierarchy: [Plucked! -> Parameters]

    Anchor_id: [none]

    • Decay knob - Changes the decay time of the plucked sound. • Color knob - Changes the tone of the plucked sound from
    dark (left) to bright (right). • Normalize - Tries to make the decay the same for all semitones. Otherwise higher notes
    have a shorter decay. • Gate - Stops the voices

    abruptly when released. Otherwise the decay keeps going. • Widen - Enriches the stereo panorama of the sound.'
  - 'Document_title: Minihost Modular (DEPRECIATED)

    File_name: plugins/Minihost Modular.htm

    Heading_hierarchy: [Minihost Modular (DEPRECIATED) -> Zones]

    Anchor_id: [none]

    The Piano roll Module can hold 1 or more Zones. A Zone is a named musical sequence which reacts to a given MIDI keyboard
    range, on a specific MIDI Channel or all MIDI Channels (Omni). It can also play one or more graphical envelopes, routed
    to different destinations.'
  - "Document_title: Harmor \nFile_name: plugins/Harmor.htm\nHeading_hierarchy: [Harmor -> Formats]\nAnchor_id: [none]\nDrag\
    \ & Drop audio Files (WAV, AIFF, WavPack, MP3, OGG, REX1&2): • Onto the oscillator shapes: converts wav to oscillator\
    \ (1 or 2). • Onto the image editor: import wav for resynthesis. Original file IS linked to, & not embedded in FLPs. •\
    \ Anywhere or onto the channel button: Harmor will detect\nwhether it's a single-cycle or long wav (>50ms), & import as\
    \ an oscillator (the one 'selected') or the image. Drag & drop Images: ➤ Bitmap file (bmp/jpg): imports the image (in\
    \ image mode, obviously). Original file is NOT linked to, it's embedded. Drag & drop scala tuning files: ➤ Scalar files\
    \ are\nsupported, drop .scl files onto Harmor. .scl Scala tuning file: imports the tuning file into the pitch envelope.\
    \  There is also a \"just intonation\" pitch kb mapping that can be loaded."
- source_sentence: How do I access the FL Keys online help file from within the program?
  sentences:
  - 'Title: What is Firebase and what data does it collect?

    Answer: What is Firebase? [Firebase](https://support.google.com/firebase/answer/6318039?hl=en&amp;ref_topic=6317497) is
    a tool developed and managed by Google. It communicates with Google servers to both enable online cloud services (such
    as content delivery) and also compiles information about how a user interacts with an Application and its surrounding
    services. Firebase works on Android and iOS operating systems. We use it to receive information about how you use FL Studio
    Mobile, to help us improve the user experience. FL Studio Mobile included Firebase

    functionality commencing May 2021. Why do we use it? When we develop an App like FL Studio Mobile, we put it in an App
    store and have very little connection with the users. Your relationship is more between Apple, Google and Microsoft (as
    the vendor of the OS you are using and App store) than it is with us. And so, we find it difficult to know how our mobile
    applications are performing, beyond the review system on the App stores. It can help us greatly if we know more about
    how and where people are using FL Studio Mobile. What information does Firebase collect? How many

    times the App is opened and when How long the App is open The Operating system being used The device model the App is
    being used on The country you are in When the app was first installed and first opened If and when the App was updated
    What In-app purchases are made Crashes and their type That one of our mobile App customers has visited our website or
    clicked on our ads. This helps our developers to better understand the nature of the devices in use, and where our App
    is being used. They can then make better decisions about how to improve functionality and

    performance. Do we spy on you? No. We do not and can not track your precise location or see any of your personal files
    (even those in FL Studio Mobile). We can''t see specific user activities on the device other than those listed. Nor are
    we interested! Firebase does log if you click on any Google Advertising. We are particularly interested if you click on
    any of our Google Advertising. We can''t specifically identify you. Just that an FL Studio Mobile user has clicked on
    one of our advertisements or visited our website. We are generally interested in how closely our Mobile customers also

    interact with our online presence (Website, Advertisements, Social Media etc). We use this to decide where we should advertise
    to find more people like you - people who may be interested in purchasing FL Studio Mobile. For the full list of data
    Firebase may collect see [General overview](https://support.google.com/firebase/answer/6318039?hl=en&amp;ref_topic=6317497),
    [Automatically Collected Data](https://support.google.com/firebase/answer/9234069?visit_id=637547267264620717-2374579154&amp;rd=1)
    and [User related

    information](https://support.google.com/firebase/answer/9268042?visit_id=637547267264620717-2374579154&amp;rd=1) Image-Line'
  - "Document_title: MIDI Scripting Device API reference \nFile_name: midi_scripting.htm\nHeading_hierarchy: [MIDI Scripting\
    \ Device API reference -> PME flags]\nAnchor_id: pmeFlags\nParameter Value Documentation PME_System 2 Can do system stuff\
    \ (play/pause.. mostly safe things) PME_System_Safe 4 Can do critical system stuff (add markers.. things that can't be\
    \ done when a modal\n            window is shown) PME_PreviewNote 8 note trigger previews notes | controls stuff PME_FromHost\
    \ 16 when the app is hosted PME_FromMIDI 32 coming from MIDI event"
  - "Title: FL Keys - general information \nAnswer: Please visit the [FL Keys online help](https://www.image-line.com/support/flstudio_online_manual/html/plugins/FL%20Keys.htm)\
    \ file for extra information"
- source_sentence: What kind of sample properties can I adjust using the F2 shortcut in Edison?
  sentences:
  - "Document_title: Edison \nFile_name: plugins/Edison_4.htm\nHeading_hierarchy: [Edison -> Sample Properties ( F2 )]\nAnchor_id:\
    \ [none]\nF2 \n[Edison -> Sample Properties ( F2 )]"
  - 'Title: TS404 - general information

    Answer: The TS404 plugin no longer is available.'
  - 'Title: Fruity Parametric EQ - general information

    Answer: Please visit the [Fruity Parametric EQ online help](https://www.image-line.com/support/flstudio_online_manual/html/plugins/Fruity%20Parametric%20EQ.htm)
    file for extra information'
- source_sentence: If I save the project after clicking "Continue," will the missing files be automatically relinked or do
    I need to fix the file paths manually?
  sentences:
  - "Document_title: The Playlist \nFile_name: playlist.htm\nHeading_hierarchy: [The Playlist -> Universal Clip Editing Methods]\n\
    Anchor_id: [none]\n• Snap settings ( [Image: Horseshoe magnet icon, gray background | Ref: img_glob/flicon_snap.png] )\
    \ - Snap controls how Clips move on the Playlist grid and many of the other editing functions below. Set this to ' line\
    \ ' if you want the Clips to snap to bar boundaries or to ' none ' if you want to\nfreely position & slice Clips. • Inserting\
    \ Clips - To insert a Clip, select the Clip you want to place from the Clip Source menu (indicated above) OR Right-Click\
    \ the Clip focus selectors (indicated above) to choose Clips of the type selected. Next, in Draw ( [Image: Gray pencil\
    \ drawing/editing tool\nicon | Ref: img_glob/flicon_pencilup.png] ) or Paint ( [Image: Paintbrush dripping with liquid\
    \ icon | Ref: img_glob/flicon_paint.png] ) mode, Left-click on an empty area of a Clips track where you want to place\
    \ the Clip. Paint mode allows you to paint multiple instances of the Clip at once (hold the\nMouse button & drag). • Insert\
    \ time into the Playlist (shift Clips to the right) - Hold ( Ctrl ), click and drag on the time-line at the top of the\
    \ Playlist starting from the point you want to insert space into the timeline AND for the duration of the insertion you\
    \ want. With ( Ctrl ) still held press the ( Ins\nert ) key on your keyboard. Insert time into the Playlist (slice and\
    \ move Clips to the right) - Make a time selection as above, then hold ( Ctrl+Alt ) and press the ( Insert ) key on your\
    \ keyboard. The slice point will be at the start of the selection. • Delete a time selection - Hold ( Ctrl ), click and\n\
    drag on the time-line at the\n      top of the Playlist to select the region to be deleted. Press ( Ctrl+Del ) to delete\
    \ all patterns in the current selection and move Clips to the right of the selection into the gap. • Select Clips - To\
    \ make a selection of more than one Clip. Use the [Image: Dashed square crop selection icon | Ref:\nimg_glob/flicon_select.png]\
    \ Select tool and click and drag a rectangle around the Clips to be selected. To add Clips to this selection hold the\
    \ ( Shift ) key and make further selections. OR if you are in Draw or Paint mode, hold  ( Ctrl ) key and you will drop\
    \ into Select mode while the ( Ctrl ) key is\nheld. Holding the ( Ctrl+Shift ) keys will allow you to add and remove Clips\
    \ to / from an existing selection. OR use the Magic lasso feature. Move your Mouse pointer in a loop that encloses the\
    \ Clips you want to select (no clicking required, it's 'magic' remember). Make sure you have no Clips\nselected before\
    \ you perform the lasso action (Right-Click the empty Playlist to deselect all Clips and make another selection). • Zoom\
    \ to area - ( Ctrl+Right-Click ) and drag over a selection of the Playlist. Un-Zoom area - ( Ctrl+Right-Click ) anywhere\n\
    \      on the Playlist (don't drag). • Zoom to a Clip - ( Ctrl+Shift+Right-Click ) on a Clip will maximize the zoom\n\
    \      of the Playlist to the selected Clip. To Un-Zoom Clip - ( Ctrl+Right-Click ) anywhere\n      on the Playlist (don't\
    \ drag in this mode since that is how to zoom to selection). • Delete/Erase a Clip - Right-Click the target Clip or use\
    \ the left Mouse button if you are in erase ( [Image: Circular gray \"no entry\" symbol icon | Ref: img_glob/flicon_delete.png]\
    \ ) mode. • Copy/Paste Clips - Make\na selection, release the Mouse and any keys held, then hold the ( Shift ) key, then\
    \ click on the selection and drag. A copy of the selection will follow the Mouse cursor. Release the selection when the\
    \ Clips are in the alternative location. NOTE: In ' Slice tool ' mode this will initiate a slice, not\ncopy. OR Make a\
    \ selection, press  ( Ctrl+C ) to copy, then scroll the Playlist so that the starting bar for the paste location is at\
    \ the left edge of the Playlist and press  ( Ctrl+V ). • Duplicate selection - Make a selection and press ( Ctrl+B ).\
    \ The selection, or all Clips if no selection is made, will be\nduplicated to the right of the original selection."
  - 'Title: If I use the academic version of FL Studio, do I own copyright to the music I make with it?

    Answer: Yes.However, this does not allow you to sell the music or rent it for hire. Please see this article: [What about
    commercial use of the music produced with FL Studio educational? In other words, can produced music be sold?](https://support.image-line.com/action/knowledgebase/?ans=381)'
  - 'Title: Error: no disk in drive

    Answer: Issue This error usually occurs when an FLP (FL Studio project) looks for a sample/file in a location that doesn''t
    exist (disconnected/offline drives or renamed drives) or one that doesn''t have a disc inserted (DVD drive for example).
    Solution Click "Continue" and let the FLP load until the end. Save the project and the message should no longer present
    for that project. Note: If the error still presents itself after following the above steps try restarting your computer.
    Image-Line Support Team'
