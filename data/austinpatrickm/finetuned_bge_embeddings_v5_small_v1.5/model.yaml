      (even those in FL Studio Mobile). We can''t see specific user activities on the device other than those listed. Nor
      are we interested! Firebase does log if you click on any Google Advertising. We are particularly interested if you click
      on any of our Google Advertising. We can''t specifically identify you. Just that an FL Studio Mobile user has clicked
      on one of our advertisements or visited our website. We are generally interested in how closely our Mobile customers
      also

      interact with our online presence (Website, Advertisements, Social Media etc). We use this to decide where we should
      advertise to find more people like you - people who may be interested in purchasing FL Studio Mobile. For the full list
      of data Firebase may collect see [General overview](https://support.google.com/firebase/answer/6318039?hl=en&amp;ref_topic=6317497),
      [Automatically Collected Data](https://support.google.com/firebase/answer/9234069?visit_id=637547267264620717-2374579154&amp;rd=1)
      and [User related

      information](https://support.google.com/firebase/answer/9268042?visit_id=637547267264620717-2374579154&amp;rd=1) Image-Line'
