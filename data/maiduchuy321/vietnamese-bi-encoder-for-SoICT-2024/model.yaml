widgetData:
- source_sentence: '" điều 8. loại dự_án đầu_tư xây_dựng nhà ở được thế_chấp vay vốn tại tổ_chức tín_dụng dự_án đầu_tư xây_dựng
    nhà ở được thế_chấp để vay vốn theo quy_định tại thông_tư này là một trong các dự_án đầu_tư xây_dựng nhà ở quy_định tại
    khoản 2 điều 17 luật nhà ở , bao_gồm : 1. dự_án đầu_tư xây_dựng mới hoặc cải_tạo một công_trình nhà ở độc_lập hoặc một
    cụm công_trình nhà ở. 2. dự_án đầu_tư xây_dựng khu nhà ở có hệ_thống hạ_tầng kỹ_thuật và hạ_tầng xã_hội_đồng_bộ tại khu_vực
    nông_thôn. 3. dự_án đầu_tư xây_dựng khu đô_thị hoặc dự_án sử_dụng đất hỗn_hợp mà có dành diện_tích đất trong dự_án để
    xây_dựng nhà ở. 4. dự_án đầu_tư xây_dựng công_trình có mục_đích sử_dụng hỗn_hợp để ở và kinh_doanh. "'
  sentences:
  - vợ là người nước_ngoài thì làm giấy khai_sinh cho con ở đâu ?
  - dụng_cụ tiếp_xúc với da nguyên_vẹn có_thể áp_dụng biện_pháp khử khuẩn ở mức_độ nào ?
  - những dự_án đầu_tư xây_dựng nhà ở nào được phép thế_chấp vay vốn tại tổ_chức tín_dụng ?
- source_sentence: 'hồ_sơ_khai thuế … 3. người nộp thuế không phải nộp hồ_sơ_khai thuế trong các trường_hợp sau đây : … b
    ) cá_nhân có thu_nhập được miễn thuế theo quy_định của pháp_luật về thuế thu_nhập cá_nhân và quy_định tại điểm b khoản
    2 điều 79 luật quản_lý thuế_trừ cá_nhân nhận thừa_kế , quà tặng là bất_động_sản. chuyển_nhượng bất_động_sản. … hồ_sơ_khai
    thuế của tổ_chức , cá_nhân trả thu_nhập khấu_trừ thuế đối_với tiền_lương , tiền công … căn_cứ các quy_định nêu trên ,
    chỉ trường_hợp tổ_chức , cá_nhân phát_sinh trả thu_nhập chịu thuế thu_nhập cá_nhân mới thuộc diện phải khai thuế thu_nhập
    cá_nhân. do đó , trường_hợp tổ_chức , cá_nhân không phát_sinh trả thu_nhập chịu thuế thu_nhập cá_nhân thì không thuộc
    diện điều_chỉnh của luật thuế thu_nhập cá_nhân. theo đó , tổ_chức , cá_nhân không phát_sinh trả thu_nhập chịu thuế thu_nhập
    cá_nhân tháng / quý nào thì không phải khai thuế thu_nhập cá_nhân của tháng / quý đó … về khai thuế , tính thuế. về khai
    thuế thu_nhập cá_nhân và thuế , các khoản thu khác của hộ kinh_doanh , cá_nhân cho thuê tài_sản a ) về hồ_sơ_khai thuế
    : điểm mới 1 : sửa_đổi quy_định tổ_chức , cá_nhân trả thu_nhập không phát_sinh khấu_trừ thuế thu_nhập cá_nhân theo tháng
    , quý thì vẫn phải khai thuế ( điểm b khoản 3 điều 7 ). trước đây : theo quy_định tại điểm a. 1 khoản 1 điều 16 thông_tư
    số 156 / 2013 / tt - btc ngày 6 / 11 / 2013 thì tổ_chức , cá_nhân trả thu_nhập không phát_sinh khấu_trừ thuế thu_nhập
    cá_nhân theo tháng , quý thì không phải khai thuế'
  sentences:
  - trường_hợp nào sử_dụng tác_phẩm đã công_bố không phải xin phép nhưng phải trả_thù_lao ?
  - mục_tiêu để học_sinh trung_cấp sư_phạm học chương_trình giáo_dục quốc_phòng và an_ninh là gì ?
  - không phát_sinh thuế thu_nhập cá_nhân có phải nộp tờ khai không ?
- source_sentence: 'thẩm_quyền xử_phạt 1. thanh_tra khoa_học và công_nghệ có thẩm_quyền xử_phạt các hành_vi vi_phạm_quy_định
    tại chương ii của nghị_định này. thẩm_quyền xử_phạt của thanh_tra khoa_học và công_nghệ 1. thanh_tra viên thuộc thanh_tra
    bộ khoa_học và công_nghệ , thanh_tra sở khoa_học và công_nghệ đang thi_hành công_vụ có quyền : a ) phạt cảnh_cáo. b )
    phạt tiền đến 500. 000 đồng. c ) tịch_thu tang_vật , phương_tiện vi_phạm hành_chính có giá_trị không vượt quá 1. 000.
    000 đồng. d ) áp_dụng biện_pháp khắc_phục hậu_quả quy_định tại điểm d khoản 3 điều 3 của nghị_định này. quy_định về mức
    phạt tiền tối_đa , thẩm_quyền xử_phạt đối_với cá_nhân , tổ_chức. 2. thẩm_quyền xử_phạt vi_phạm hành_chính của những người
    được quy_định tại các điều từ 16 đến 21 của nghị_định này là thẩm_quyền áp_dụng đối_với một hành_vi vi_phạm hành_chính
    của cá_nhân. trong trường_hợp phạt tiền , thẩm_quyền xử_phạt đối_với tổ_chức gấp 02 lần thẩm_quyền xử_phạt đối_với cá_nhân'
  sentences:
  - thanh_tra viên thuộc thanh_tra bộ khoa_học và công_nghệ có quyền xử_phạt tổ_chức đại_diện sở_hữu công_nghiệp làm sai_lệch
    nội_dung chứng_chỉ hành_nghề không ?
  - nguồn tài_chính từ nguồn thu hoạt_động sự_nghiệp có phải là một trong các nguồn của đơn_vị sự_nghiệp công_lập không ?
  - hội_đồng tư_vấn tuyển_chọn thực_hiện nhiệm_vụ khoa_học cấp_bộ của bộ tư_pháp có những trách_nhiệm gì ?
- source_sentence: '" 1. đầu_tư chương_trình , dự_án kết_cấu_hạ_tầng kinh_tế - xã_hội. trường_hợp thật_sự cần_thiết tách riêng
    việc bồi_thường , hỗ_trợ , tái_định_cư , giải_phóng mặt_bằng thành dự_án độc_lập , đối_với dự_án quan_trọng quốc_gia do
    quốc_hội xem_xét , quyết_định. đối_với dự_án nhóm a do thủ_tướng chính_phủ , hội_đồng nhân_dân cấp tỉnh xem_xét , quyết_định
    theo thẩm_quyền. việc tách riêng dự_án độc_lập được thực_hiện khi phê_duyệt chủ_trương đầu_tư dự_án quan_trọng quốc_gia
    , dự_án nhóm a. 2. đầu_tư phục_vụ hoạt_động của cơ_quan nhà_nước , đơn_vị sự_nghiệp công_lập , tổ_chức chính_trị , tổ_chức
    chính_trị - xã_hội. 3. đầu_tư và hỗ_trợ hoạt_động đầu_tư cung_cấp sản_phẩm , dịch_vụ công_ích , phúc_lợi xã_hội. 4. đầu_tư
    của nhà_nước tham_gia thực_hiện dự_án theo phương_thức đối_tác công tư. 5. đầu_tư phục_vụ công_tác lập , thẩm_định , quyết_định
    hoặc phê_duyệt , công_bố và điều_chỉnh quy_hoạch theo quy_định của pháp_luật về quy_hoạch. 6. cấp bù lãi_suất tín_dụng
    ưu_đãi , phí quản_lý. cấp vốn điều_lệ cho các ngân_hàng chính_sách , quỹ tài_chính nhà_nước_ngoài ngân_sách. hỗ_trợ đầu_tư
    cho các đối_tượng chính_sách khác theo quyết_định của thủ_tướng chính_phủ. chính_phủ quy_định trình_tự , thủ_tục thực_hiện
    đầu_tư đối_với đối_tượng quy_định tại khoản này. "'
  sentences:
  - các nước phát_triển khi tham_gia_công_ước chống sa_mạc_hóa của liên_hợp quốc sẽ có những nghĩa_vụ nào ?
  - ban quản_lý các dự_án đầu_tư xây_dựng thanh_tra chính_phủ có cơ_cấu tổ_chức như thế_nào ?
  - đối_tượng đầu_tư công bao_gồm những_ai ?
- source_sentence: 1. công_ước này sẽ bắt_đầu có hiệu_lực với điều_kiện tuân_thủ các quy_định của khoản 6 điều này , vào ngày
    đầu tháng tiếp_theo sau khi hết một hạn kỳ 12 tháng kể từ ngày văn_bản phê_chuẩn , chấp_nhận , chuẩn_y hay gia_nhập thứ
    mười được đệ_trình kể_cả những văn_bản chứa_đựng một tuyên_bố được làm chiếu theo điều 92. 5. mọi quốc_gia thành_viên
    của công_ước la - haye 1964 về ký_kết_hợp_đồng mà phê_chuẩn , chấp_nhận hay chuẩn_y công_ước này , hoặc gia_nhập công_ước
    này và tuyên_bố hay đã tuyên_bố chiếu theo điều 92 rằng họ không bị ràng_buộc bởi phần thứ ba của công_ước sẽ hủy bỏ vào
    lúc phê_chuẩn , chấp_nhận , chuẩn_y hay gia_nhập , bản công_ước la - haye 1964 về ký_kết_hợp_đồng_bằng cách gửi một thông_cáo
    với mục_đích đó cho chính_phủ hà_lan. 6. vì mục_đích của điều này , các sự phê_chuẩn , chấp_nhận , chuẩn_y và gia_nhập
    công_ước này của các quốc_gia thành_viên của công_ước la - haye 1964 về ký_kết_hợp_đồng hay công_ước la - haye 1964 về
    mua_bán hàng_hóa chỉ bắt_đầu có hiệu_lực kể từ ngày các thông_báo hủy_bỏ của các quốc_gia đó đối_với hai công_ước nói
    trên cũng sẽ có hiệu_lực. người giữ lưu_chiểu bản công_ước này sẽ thỏa_thuận với chính_phủ hà_lan , vốn là người giữ lưu_chiểu
    các công_ước 1964 , để đảm_bảo sự phối_hợp cần_thiết về vấn_đề này
  sentences:
  - công_ước viên về mua_bán hàng_hóa quốc_tế năm 1980 sẽ bắt_đầu có hiệu_lực với điều_kiện gì ?
  - sau khi giữ người trong trường_hợp khẩn_cấp thì cơ_quan điều_tra phải thông_báo ngay cho những_ai ?
  - đăng_kiểm viên có hành_vi làm sai_lệch kết_quả kiểm_định xe cơ_giới bị phạt tiền như thế_nào ?
