- source_sentence: '<2-hop>


    2.0 Management of the Government Salary Payroll

    In a letter to the Auditor General dated 29th November 2022 referenced HRM 155/222/02, the Minister of Finance, Planning
    and Economic Development (MoFPED) highlighted that, despite the reforms introduced by Government to mitigate against persistent
    supplementary requests for additional funds to cater for wage shortfalls, there has not been significant results and yet
    expenditure on wage is a substantial percentage of all entity budgets. Other anomalies highlighted included: payments
    for non-existent employees  underpayments to staff and irregular overpayments to staff, among others.

    Accordingly, I carried out a special audit on wage payroll in Local Government (LG) entities to establish the root causes
    of the identified challenges and propose remedial measures.  The audit covered four (4) FYs from 2019/2020 to 2022/2023
    to which I issued a separate detailed audit report and below is a summary of the findings from the special audit; key

    Iganga DLG had a wage budget of UGX.31,651,868,130, out of which UGX.30,714,036,110 was utilised for the period under
    review. Below is a summary of the key findings from the special audit;'
  sentences:
  - What are key audit matters and how they related to audit of financial statements?
  - What were the key findings of the special audit on wage payroll in Local Government entities, and how did the wage budget
    utilization compare between Lira DLG and Iganga DLG?
  - What topics are covered in the Auditor General's report on Namutumba District Local Government?
- source_sentence: 'a. The physical structure is condemned

    The  Ministry  of  health  engineering  and  Physical  planning  department  declared  the Grade  A  hospital  structure  unfit  for  human  occupation  due  to  the  dilapidated
    structure and broken plumbing and electrical components that were beyond repair.

    This  therefore,  reduced  the  number  of  beds  available  in  the  Regional  Referral Hospital to the public. Refer
    to pictures below;

    15

    Services that were exclusively offered at the campus i.e. the Diabetic clinic and the Mental disabilities clinic have
    been affected and have since not gotten a permanent placement in the regional referral hospital.

    The Accounting Officer explained that renovation works were set to commence with the project currently under detailed
    technical review by the infrastructure division of the Ministry of Health.'
  sentences:
  - Why did the Ministry of Health declare the hospital structure unfit?
  - What is the expenditure for Ihe service delivery under focus areas?
  - How did the DLGs and LGs fail to meet their deadlines and what were the consequences for both procurement and reporting?
