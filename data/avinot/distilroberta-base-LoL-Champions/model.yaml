widgetData:
- source_sentence: 'As senna, Watch your positioning at all times so she cannot land crucial spells on you.


    Keep the minion wave closer to your side of the map to force her to over-extend for farm.


    Senna is quite weak early, you might be able to abuse that to gain an early health advantage. But if you can’t, don’t
    worry.


    Focus on farming early on if you can’t get kills. Try to poke her down often: whenever she uses her Q, try and use yours.

    '
  sentences:
  - As riven, Riven will begin to fall as the game continues, so she will have to accumulate an early lead on. She should
    rely on peaks to win the game. She will have a lot of articles during this phase of the game, which will let her dry a
    lot of damage if she manages to catch an enemy. Level 16 is a massive power peak, which means that she can completely
    decimate the enemies that are joined together. She will have to find flanks on the enemy frequently.
  - As senna, Watch your position at all times so it can't put crucial spells on you. Keep the minion wave closer to your
    side of the map to force it to overtake for the farm. Senna is weak enough early, you might be able to abuse it to gain
    an early health benefit. But if you can, don't worry. Focus on agriculture early if you can't get killed.
  - Against zac, Zac really has long cooling times on his engagement abilities. As a result, he can really use them as a tool
    of engagement or escape only once in a fight. If you know that he is without these abilities- try to fight him. Placing
    the vision around his entrances into the jungle and into the river will reduce his ability to get successful ganks. Note
    that Zac can gank from afar with his E however. The easiest way for Zac to kill the Crab Scuttle is by using his E. If
    you see him killing the Crab Scuttle, it will usually mean that his E is on cooldown and he will miss an escape tool.
- source_sentence: 'As teemo, Use your t to prevent the enemy ADC from doing anything in this game. Always focus on the champion
    that is close to your carry for maximal effectiveness.


    Try to lure enemies into fighting near your Ultimate t infested areas. It will allow you to auto-win a major fight due
    to the amount of damage your Ultimate t traps do.


    Ensure that your Ultimate t traps are in the choke points during neutral objective fights. This will make it really hard
    for the enemy team to do anything in the fight.'
  sentences:
  - As taric, Taric will have his Q maxed at level 9. This means that he will heal a lot during a fight as long as he has
    enough mana to constantly use the ability. At level 11, Taric will have two points in his Ultimate R. This means that
    he will be able to use the ability frequently, which will make him powerful enough in team combat. At level thirteen,
    Taric will have two of his maximum capabilities out. This means that he will excel in team combat and will be successfully
    peeled for his port.
  - As annie, Look for aggressive parts at level 2 that you are stronger than it at level 2. Look for aggressive parts when
    its dizziness is down. Fight it after it uses its dizziness that you will win a battle with it. After you have obtained
    your first element, just keep pushing it in and get turn plates. Look for roaming opportunities when possible.
  - As teemo, Use your t to prevent the ADC enemy from doing anything in this game. Always focus on the champion who is close
    to your door for maximum efficiency. Try to attract enemies into the fight near your infested areas Ultimate t. It will
    allow you to self-win a major fight due to the amount of damage your Ultimate t traps do. Make sure your Ultimate t traps
    are in the choking points during neutral objective combats. This will make it really difficult for the enemy team to do
    anything in the fight.
- source_sentence: 'As senna, Just like in the mid-game, you should stick with your Support throughout the later parts of
    the game. Do not go around the map alone as you will die easily.


    Do not play super aggressive in team fights. Just kite and auto-attack the nearest enemy champion. If you walk too far
    forward, the enemy will focus you and take you down.


    Continue to kite in team fights and consistently adapt your positioning. Avoid standing still in fights as you’ll be an
    easy target.'
  sentences:
  - As senna, Just like in the middle of the game, you have to stay with your support throughout the later parts of the game.
    Do not go around the map alone because you will die easily. Do not play super aggressive in team fights. Just kite and
    automatic attack the nearest enemy champion. If you walk too far forward, the enemy will concentrate and down you. Continue
    kiteing in team fights and systematically adapt your positioning.
  - As udyr, You are really good at securing the goals in early play. Look to secure the goals whenever they are. Find a healthy
    balance between the glove of your allies, the agriculture of your jungle and safety goals. Make sure you don't fall behind
    in XP trying to gank constantly. Look several times at the gank tracks that are wider or Flashless. Your champion is very
    good at several times the glove tracks over and over again.
  - As bard, Once you reach this stage, you should focus more on roaming and the impact of the map with your Ultimate R &
    E. When you keep in depth, make sure to keep your E ready to escape any sticky situation. Before leaving your track, drop
    some W shrines here and there. This will help your ADC stay healthy, especially when they are against a poke track. Always
    try to lure enemy travellers to push and use the wall behind them to E and then stun them with your Q. The association
    with your Jungler/other travelers will give maximum efficiency and enemies generally do not plan such coins.
- source_sentence: 'Against trundle, When Trundle activates his n, back away immediately. He will become much tankier and
    your tanks will be weak. Re-engage when his Subjugate Subjugate n has cooled off.


    He has great pick potential in the mid game with his e. Avoid standing too far forward as he may push you towards his
    team and then all-in you.


    Poke is your best friend against Trundle. Getting him really low makes it near impossible for him to all-in or fight your
    team.'
  sentences:
  - As kalista, If she has a support that can complete her escarment power, she will easily take the level path one himself.
    Kalista's passive does so so that she can easily avoid the CC abilities especially if it turns out that it is a skill
    shot. It also allows her to jump in and out of nonwarded brushes to drop the vision on the enemies. Once she gets her
    Ultimate x, her down pursuit potential becomes unmatched.
  - Against trundle, When Trundle activates his n, backs off immediately. He will become much more tankier and your tanks
    will be weak. Re-engagement when his Subjugate Subjugate n has cooled. He has great potential of choice in the middle
    of the match with his e. Avoid standing too far ahead that he can push you towards his team and then all of you. Poke
    is your best friend against Trundle.
  - As viego, Viego is decent enough during the team fights because of his W and Q. His life flight will help him during the
    full fights, and his Ultimate R will act as a decent finish movement. Viego will win a massive power peak once he has
    two points in his Ultimate R. He can run squishy targets, execute them and use his Passive for much longer than any other
    champion in his situation. He will have his basic elements through this phase of the game. He should be able to flatten
    a lot of damage and catch the out-of-guard enemies with his W. His E should help him shoot several ganks as well.
- source_sentence: 'As mordekaiser, Another point in his Ultimate R will allow him to 1 v 1 target quite frequently. He should
    be able to secure picks even now.


    He is pretty decent during late-game fights, as his AoE abilities will hurt a lot. His survivability is quite appreciable
    as well.


    His tankiness will be massive during this phase of the game. He should be focused on absorbing a lot of damage for the
    enemy team while simultaneously picking off enemies when possible.'
  sentences:
  - As karma, Unlike most champions, Karma unlocks her Ultimate has at level 1. This means that at level 6, she doesn't have
    as much pressure compared to many other champions especially if they re-level 6 power peak is very strong. When Karmas
    d is down, she is vulnerable to attack and will need to play safely while he is on the cooldown. His Q can easily be avoided
    if the enemy builds a huge wave or positions properly.
  - As mordekaiser, Another point in his Ultimate R will allow him to 1 v 1 target quite frequently. He should be able to
    secure the choices even now. He is quite decent during the fights at the end of the game, because his AoE abilities will
    do a lot of harm. His survival is just as appreciable. His tankness will be massive during this phase of the game. He
    should be focused on absorbing a lot of damage for the enemy team while simultaneously dropping enemies when possible.
  - As renekton, If you can get a murder or two, you can snowball your lead quite quickly. Every time your Ultimate t is up,
    you can look for aggressive games to try to kill the enemy. Your Ultimate t is an excellent trading tool that makes you
    much stronger. Keep the minion wave even or slightly closer to your side of the map early. This will allow you to run
    the enemy down while protecting yourself from the ganks. If you keep pushing when you are not forward, you will be unable
    to run the enemy down and you will be an easy target for the enemy Jungler.
