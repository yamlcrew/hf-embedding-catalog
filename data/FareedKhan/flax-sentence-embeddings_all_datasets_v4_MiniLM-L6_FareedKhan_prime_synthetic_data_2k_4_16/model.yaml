widgetData:
- source_sentence: '

    Optic nerve disease, as defined by the MONDO source, encompasses both non-neoplastic and neoplastic disorders affecting
    the optic nerve (second cranial nerve), making it a critical condition impacting the visual pathway from the optic nerve
    to the visual cortex. This disorder, according to the UMLS description, involves a disruption of neural transmission relevant
    to visual processing. The document highlights specific medications, including Amiodarone, Linezolid, Metronidazole, Trimethadione,
    and Ethadione, as having contraindication with optic nerve disease. This suggests that their use may not be advisable
    in cases of this condition due to potential exacerbation or interaction risks. The gene/protein PAX6 is associated with
    optic nerve disease, indicating genetic factors that contribute to its development. Furthermore, optic nerve disease is
    part of a broader classification including optic atrophy, central nervous system disease, optic neuritis, and other related
    conditions, emphasizing its significance within the spectrum of disorders affecting the visual system. Therefore, when
    considering the use of intracranial abscess medications in cases where optic nerve disease is implicated, healthcare providers
    should exercise caution due to the potential contraindication and the importance of preserving optic nerve function.'
  sentences:
  - Given my family health history with Mendelian disorders, I'm seeking information on a genetic disease associated with
    an absent or obstructed anal opening and potential kidney malformations, like agenesis of the kidneys. Could you identify
    conditions that present these characteristics?
  - Can you give me a list of pills or tablets that act on the RNASE2 gene or its associated protein?
  - Which condition impacting the visual pathway, from the optic nerve to the visual cortex, would deem the use of intracranial
    abscess medications inadvisable?
- source_sentence: '

    Bisindolylmaleimide I is a solid-form drug sourced from the DrugBank database. This compound belongs to the category of
    Acids, specifically Acyclic, Anti-Inflammatory Agents, Dicarboxylic Acids, Enzyme Inhibitors, Heterocyclic Compounds,
    Fused-Ring, Imides, and Maleates. It is notably experimental in nature. Notably, Bisindolylmaleimide I functions to target
    multiple kinases, namely PIM1, PDPK1, and PRKCI, showcasing its multifaceted approach to drug therapy and its potential
    utility in inhibiting various biological pathways or processes.'
  sentences:
  - What solid-form drugs simultaneously target PRKCI and PIM1 kinase proteins?
  - Which genes or proteins interact with IER3IP1 and are also associated with undifferentiated carcinoma of the corpus uteri,
    ensuring they code for active proteins?
  - Is there an interaction between ferric cation and the proteins or genes associated with the smooth endoplasmic reticulum?
- source_sentence: "\n\nThe gene in question is involved in a variety of functions and biological processes, as well as exhibiting\
    \ specific patterns of expression across different tissues and anatomical locations.\n\n**Functional Annotations:**\n\n\
    - **Superfamily:** Transmembrane proteins (TM)\n- **Cellular Components:** Cell membrane and plasma membrane\n- **Pathways:**\
    \ ABC-family proteins mediated transport, Abacavir transmembrane transport\n- **Biological Processes:**\n  - Transmembrane\
    \ transport\n  - Transepithelial transport\n  - Terpenoid transport\n  - Response to drug\n  - Carboxylic acid transmembrane\
    \ transport\n  - Export across plasma membrane\n  - Regulation of chloride transport\n  - Transport across blood-brain\
    \ barrier\n  - Regulation of response to osmotic stress\n  - Phospholipid translocation\n  - Positive regulation of anion\
    \ channel activity\n  - Stem cell proliferation\n  - Xenobiotic detoxification by transmembrane export across the plasma\
    \ membrane\n  - Xenobiotic transport across blood-brain barrier\n  - Ceramide translocation\n  - G2/M transition of mitotic\
    \ cell cycle\n\nThese annotations suggest the gene's role in transporting substances across cellular membranes, often\
    \ with a focus on transmembrane and active transport mechanisms, and its involvement in processes like response to chemical\
    \ stimuli, detoxification, transport across barriers like the blood-brain barrier, and specific pathways like ABC-family\
    \ transporters.\n\n**Expression Patterns:**\n\n- **Expression Present:** The gene is expressed in many different tissues\
    \ and anatomical locations, including uterine cervix, islets of Langerhans, pituitary gland, zones of skin, lymph nodes,\
    \ tendons, large intestines, renal glomeruli,"
  sentences:
  - What is the name of the neuroendocrine carcinoma subtype that has the potential to metastasize to various parts of the
    body?
  - Which gene or protein is involved in the transport of pharmaceuticals that exhibit a synergistic effect when combined
    with Lanoteplase, for instance, the ATP-binding cassette transporter subfamily B member 1 (ABCB1) protein?
  - Can you identify a gene or protein involved in atrial fibrillation that also has a role in ubiquitin ligase binding and
    is active in the rapid repolarization phase of cardiac activity?
- source_sentence: '

    GZMK, also known as TRYP2, is a gene encoding a serine protease that is part of the cytoplasmic granules of cytotoxic
    lymphocytes such as cytolytic T lymphocytes (CTL) and natural killer (NK) cells. This group of enzymes is crucial for
    the ability of these cells to recognize and lyse target cells bearing ''nonself'' antigens, typically peptides or proteins
    from intracellular pathogens. A key feature of GZMK is the absence of N-glycosylation consensus sequences found in other
    granzymes. This gene product is known for exhibiting serine-type peptidase activity and serine-type endopeptidase activity,
    playing an essential role in proteolysis which is part of the immune response.


    GZMK shows expression across a wide range of anatomical locations, including the uterus, zone of skin, lymph node'
  sentences:
  - Could you identify the cellular pathways that precede or follow the 'Formation of tubulin folding intermediates by CCT/TriC'?
  - Please find genes or proteins that interact with the extracellular matrix, exhibit serine peptidase activity, and trigger
    caspase-independent cell death through Bid-linked mitochondrial disruption.
  - Which genes and proteins interact with amino acid:proton symporter activity?
- source_sentence: '

    Epstein-Barr virus-associated mesenchymal tumor is a disease designated as a type of leiomyosarcoma within the disease
    nomenclature system MONDO. This specific condition is uniquely characterized by its association with the Epstein-Barr
    virus and exhibits symptoms commonly related to an underlying malignancy, such as fatigue, fever, and muscle pain. Identified
    as a subgroup of leiomyosarcoma, it also encompasses related diseases including Epstein-Barr virus-related tumor, follicular
    dendritic cell sarcoma, and myopericytoma, all of which share the hallmark of being influenced by the Epstein-Barr virus.
    This classification emphasizes the role of viral infection in the development and manifestation of these tumor types,
    offering insights into potential pathways of disease progression and suggesting avenues for targeted therapeutic interventions.'
  sentences:
  - Could you provide me with a list of medications that display synergistic effects when combined with Lemborexant, are prescribed
    for the same indications, and possess an elimination half-life close to 37 hours? I am interested in exploring alternative
    treatments compatible with Lemborexant's therapeutic indications that may offer extended efficacy through the prolonged
    half-life of the secondary drug when co-administered.
  - Find conditions linked to carboxylesterase 2 (CES2) that should not be treated with Rosiglitazone.
  - What type of leiomyosarcoma commonly manifests with fatigue, fever, and muscle pain?
