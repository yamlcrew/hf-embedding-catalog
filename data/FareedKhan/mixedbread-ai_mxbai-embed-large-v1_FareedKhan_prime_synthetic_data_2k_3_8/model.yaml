widgetData:
- source_sentence: '

    Xanthogranulomatous pyelonephritis is a disease characterized by chronic, destructive infections of the kidney, marked
    by the infiltration of lipid-laden macrophages. This condition is often linked to obstruction due to infected renal stones,
    commonly caused by bacteria such as Proteus or Escherichia coli. The UMLS description highlights that this disease results
    in diffuse renal destruction, leading to a grossly enlarged and nonfunctional kidney. It is closely related to pyelonephritis,
    and its symptoms include nephrolithiasis and kidney stones. The involvement of macrophage infiltration and tissue destruction,
    along with its links to nephrolithiasis and urinary obstruction, makes xanthogranulomatous pyelonephritis a disease with
    significant similarities to pyelonephritis.'
  sentences:
  - Which gene/protein, involved in controlling the breakdown of fatty acids and integral to both sugar and fat metabolic
    processes, interacts with the gene/protein essential for oxygen uptake and carbon dioxide release in red blood cells?
  - What are the biological pathways that interact with the NELFA gene/protein, overlap with or lead into HIV Transcription
    Elongation, contribute to HIV-1 pathogenesis, and are involved in the limited transcriptional elongation of HIV-1 genomic
    RNA?
  - What renal disease might involve macrophage infiltration and tissue destruction, with links to nephrolithiasis and urinary
    obstruction, similar to pyelonephritis?
- source_sentence: '

    Choroid plexus neoplasm, defined as an intraventricular papillary neoplasm originating from the choroid plexus epithelium,
    is a broad category encompassing various subtypes involving choroid plexus papilloma, atypical choroid plexus papilloma,
    and choroid plexus carcinoma, as outlined in the MONDO database. This hierarchy notably designates adult choroid plexus
    neoplasm as a subtype, which in turn serves as a classification for a subtype or precursor to benign choroid plexus tumors.
    This reflects the nuanced distinction within the pathology of these tumors, indicating their varying degrees of malignancy
    and growth dynamics within the brain''s ventricular system.'
  sentences:
  - What disease serves as a subtype of adult choroid plexus tumors and simultaneously as a subtype or precursor to benign
    choroid plexus tumors, reflecting their classification hierarchy?
  - Search for genes or proteins that interact with VDAC1 and exhibit a shared association with an identical effect or phenotype.
  - Can you recommend any cancer medications compatible with Mirabegron that are known to effectively reduce cancerous white
    blood cell growth with a high success rate among patients?
- source_sentence: "\n\nThe term \"cell\" refers to the fundamental unit of structure and function in all living organisms.\
    \ Cells are the basic structural, functional, and biological units of all known living organisms. They are essentially\
    \ the smallest units of life, and all multicellular organisms, including humans, are composed of cells.\n\nHere is a more\
    \ detailed breakdown:\n\n1. **Bacteria** - They are unicellular microorganisms. The cell division method of reproduction\
    \ is a binary fission.\n\n2. **Archaea** - Also unicellular organisms in the domain Archaea, often found in extreme environments\
    \ like hot springs or salt flats, they have different cell structures than bacteria, such as methanogenic ones.\n\n3.\
    \ **Eukaryotic Cells**:\n   - **Prokaryotes (Bacteria and Archaea)**, while not eukaryotic themselves, are closely related\
    \ at the evolutionary level and all are unicellular.\n   - **Eukaryotic Cells**: These are found in plants, animals, fungi,\
    \ and protists. They have a well-defined nucleus made of DNA and are often more complex and varied in structure. Eukaryotic\
    \ cells include:\n     - **Plant Cells**: These cells have cell walls, chloroplasts (for photosynthesis), and larger sizes\
    \ than animal cells.\n     - **Animal Cells**: These do not have cell walls, have a nucleus, and lack chloroplasts. Animal\
    \ cells can further be divided into somatic (body) cells and germ (sex-producing) cells such as sperm and eggs.\n    \
    \ - **Fungal Cells**: These cells are generally surrounded by a cell wall and often have more complex structures compared\
    \ to simple plants and animals.\n     - **Protist Cells**: These are eukaryotic cells that are not classified into plant,\
    \ animal, or fungal groups, characterized by a unique combination of features from various eukaryotic lineages.\n\n4.\
    \ **Viral Cells (Hypothetical)**: This category mentioned includes \"Viral Capsid, DNA Virus Capsid, and RNA Virus Capsid\"\
    . Viruses are not living organisms under the traditional biological definition, as they do not have cells and cannot obtain\
    \ or use energy or grow independently. However, they can replicate only within the living cells of organisms. They are\
    \ made up of proteins and a type of nucleic acid (either DNA or RNA), and they may be referred to in terms of \"caps"
  sentences:
  - Which pharmaceutical shares a similar gene or protein carrier with Testosterone cypionate and possesses an elimination
    half-life of around 4 hours?
  - Which gene or protein that interacts with FDFT1 also shares associated effects or phenotypes with it and is critically
    involved in the regulation of cell growth, differentiation, and transformation?
  - Which gene or protein is not expressed in the stomach fundus and nasal cavity epithelial tissue?
- source_sentence: '

    Acute infantile liver failure due to synthesis defect of mtDNA-encoded proteins, linked to mutations in the TRMU gene,
    is a rare, life-threatening condition, primarily affecting infants of Middle Eastern descent. This mitochondrial respiratory
    chain deficiency is caused by an impairment in the synthesis of proteins encoded by mitochondrial DNA, leading to severe
    liver dysfunction in periodic episodes. These episodes are characterized by elevated liver enzymes, jaundice, vomiting,
    coagulopathy, hyperbilirubinemia, and lactic acidemia. Indeed, the condition is so rare that it is estimated to occur
    in less than one in a million individuals. Inherited in an autosomal recessive pattern, it manifests with a constellation
    of symptoms, including hypotonia, abdominal distention, feeding difficulties in infancy, generalized hypotonia, acute
    hepatic failure, lactic acidosis, hepatomegaly, elevated hepatic transaminase, and abnormalities in the coagulation cascade.
    Additionally, affected individuals may exhibit macrovesicular or microvesicular steatosis within their liver, along with
    mitochondrial respiratory chain defects.'
  sentences:
  - What drugs target the SCN5A sodium channel and have a metabolic half-life between 1.5 and 3.5 hours, ideally close to
    2 hours?
  - What is the hepatopathy associated with TRMU gene mutations that manifests as periodic episodes of severe liver dysfunction?
  - Identify pathways associated with the conversion of sulfide to sulfate that also share interactions with a common gene
    or protein.
- source_sentence: '

    CZEN 002 is a novel, investigational anti-fungal synthetic octapeptide, derived from alpha-Melanocyte-Stimulating Hormone
    (a-MSH), effective against Candida albicans, a major cause of vaginitis and candidiasis in individuals with compromised
    immune systems. This drug modulates inflammatory and immune responses while uniquely killing Candida albicans without
    direct membrane damage. Its mode of action targets an unidentified receptor in yeast, setting it apart from classical
    anti-fungal methods. CZEN 002''s pharmacodynamics highlight its ability to effectively combat fungal infections without
    depending on membrane disruption. Importantly, it displays potential in affecting the MC1R gene/protein, a relation crucial
    for understanding its broader biological impacts and therapeutic utility. However, its status as investigational underscores
    the need for further research to fully elucidate its efficacy, safety, and target specificity.'
  sentences:
  - Can you find a DNA repair pathway that is hierarchically linked to Depyrimidination and contributes to genomic stability
    by playing a role in abasic site formation?
  - Identify genes or proteins that exhibit interaction with LRP8 and are linked to a similar effect or phenotype.
  - Could you recommend a drug effective against Candida albicans, suitable for treating candidiasis with vaginitis, that
    also targets the MC1R gene/protein?
