  - List conditions linked to Hepatocyte Growth Factor (HGF) that should not be treated with Nisoldipine.
  - Could you provide me with a list of medications that act on NMDA glutamate receptors by interacting with the genes or
    proteins associated with them and possess a half-life near 12 hours?
  - Which gene or protein, functioning as a part of the voltage-gated potassium channel present in cardiac cells, neurons,
    and microglial cells, mediates the transportation of compounds that exhibit synergistic effects when combined with Omega-3
    fatty acid ethyl esters?
- source_sentence: '

    Lingual goiter subtypes manifest with specific effects or phenotypes that significantly impact various physiological systems.
    Among these, Euthyroid goiter stands out with a notable phenotype characterized by the absence of thyroid hormone imbalances,
    despite the presence of goiter. This subtype is often linked to conditions such as Euthyroid Multinodular Goiter, indicating
    benign thyroid nodules without hormonal disturbance. Additionally, individuals with Euthyroid goiter may present with
    symptoms associated with the Thyrocerebrorenal Syndrome and Branchiootorenal Syndrome, highlighting the broad spectrum
    of issues linked to these genetic conditions. Furthermore, the presence of a goiter as a symptom suggests an enlargement
    of the thyroid gland, which can lead to complications such as respiratory difficulties or other functional impairments.
    This specific manifestation of a lingual goiter subtype underscores the complexity and variability of thyroid disorders
    and their impact on a range of medical conditions.'
  sentences:
  - Which gene/protein, involved in controlling the breakdown of fatty acids and integral to both sugar and fat metabolic
    processes, interacts with the gene/protein essential for oxygen uptake and carbon dioxide release in red blood cells?
  - Could you describe the specific effects or phenotypes associated with lingual goiter subtypes?
  - Identify a gene or protein that interacts with CXCL1, where both are linked to a common effect or phenotype.
- source_sentence: '


    Epilepsy is a neurological disorder characterized by recurrent seizures, which can be partial (affecting one part of the
    body), generalized (involving both sides of the body), or both. Seizures occur due to abnormal electrical activity in
    the brain. The condition can affect individuals of all ages, including infants and children. While the epilepsy itself
    does not typically affect life expectancy, several complications can arise:


    ### Seizure Types

    - **Tonic-clonic seizures** (formerly known as grand mal seizures) involve a stiffening of the muscles, followed by loss
    of consciousness, and can result in convulsions.

    - **Absence seizures** feature brief lapses in consciousness, often not noticed by others unless a child is in the midst
    of an activity.

    - **Myoclonic seizures** cause sudden, jerky muscle contractions.

    - **Partial seizures** can affect only one part of the body and are often associated with auras (premonitory symptoms)
    or post-seizure confusion.


    ### Complications of Epilepsy

    1. **Status Epilepticus**: Continuous seizure activity that lasts longer than five minutes or frequent seizures without
    recovery in between can lead to brain damage or even death if not treated promptly.

    2. **SUDEP (Sudden Unexpected Death in Epilepsy)**: Although uncommon, SUDEP occurs in people with epilepsy, especially
    those with a high risk of death, including those with frequent tonic-clonic seizures or uncontrolled epilepsy.

    3. **Emotional Health Issues**: People with epilepsy may experience depression, anxiety, and suicidal thoughts due to
    the psychological impacts of the condition and its treatments.

    4. **Heart and Respiratory Conditions**: These can contribute to the risk of SUDEP, particularly in people with epilepsy.


    ### Genetic Factors

    Epilepsy can be influenced by genetic factors, as certain genes such as POMC, P'
