      kesin olarak tespit edilebilirse, tasarruf bu arzuya göre düzeltilir. ÜÇÜNCÜ KİTAP MİRAS HUKUKU BİRİNCİ KISIM MİRASÇILAR
      İKİNCİ BÖLÜM ÖLÜME BAĞLI TASARRUFLAR İKİNCİ AYIRIM TASARRUF ÖZGÜRLÜĞÜ A. Tasarruf edilebilir kısım I. Kapsamı Madde
      505- (Değişik birinci fıkra: 4/5/2007-5650/1 md.) Mirasçı olarak altsoyu, ana ve babası veya eşi bulunan miras bırakan,
      mirasının saklı paylar dışında kalan kısmında ölüme bağlı tasarrufta bulunabilir. Bu mirasçılardan hiç biri yoksa, mirasbırakan
      mirasının tamamında tasarruf edebilir. II. Saklı pay'
  - source_sentence: Taşınmaz lehine irtifak hakkı nedir?
