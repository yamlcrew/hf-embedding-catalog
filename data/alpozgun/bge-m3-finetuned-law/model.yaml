widgetData:
- source_sentence: Suçla ilgili kanun maddesinde sadece hapis cezası veya adlî para cezasından birinin uygulanabileceği durumlarda,
    ödenecek miktar nasıl belirlenir?
  sentences:
  - Madde 766- Bir taşınırın mülkiyetini nakleden kimse özel bir hukukî ilişkiye dayanarak o şeyin zilyetliğini korursa, mülkiyet
    teslimsiz geçmiş olur. Ancak, bu işlem üçüncü kişileri zarara sokmak veya taşınır rehni kurallarından kurtulmak için yapılmışsa,
    mülkiyetin nakli sonuç doğurmaz. Böyle bir amaç güdülüp güdülmediğini hâkim takdir eder. II. Sahiplenme 1. Sahipsiz şeyler
    Madde 767- Sahipsiz bir taşınırı malik olmak iradesiyle zilyetliğine geçiren kimse, onun maliki olur. 2. Sahipsiz duruma
    gelen hayvanlar Madde 768- Tutulan av hayvanları, yeniden serbest kalır ve sahipleri onları gecikmeksizin ve ara vermeksizin
    aramaz ve tekrar tutmak için uğraşmazsa, sahipsiz duruma gelirler. Ehlileştirilmiş hayvanlar tekrar vahşileşir ve sahiplerine
    dönmezlerse, sahipsiz duruma gelirler. Arı oğulu başkasının taşınmazına uçmuş olmakla sahipsiz duruma gelmez. III. Bulunmuş
    eşya 1. Arama ve ilân
  - MADDE 75. - (1) Uzlaşma kapsamındaki suçlar hariç olmak üzere, yalnız adlî para cezasını gerektiren veya kanun maddesinde
    öngörülen hapis cezasının yukarı sınırı üç ayı aşmayan suçların faili; a) Adlî para cezası maktu ise bu miktarı, değilse
    aşağı sınırını, b) Hapis cezasının aşağı sınırının karşılığı olarak her gün için yirmi Türk Lirası üzerinden bulunacak
    miktarı, c) Hapis cezası ile birlikte adlî para cezası da öngörülmüş ise, hapis cezası için bu fıkranın (b) bendine göre
    belirlenecek miktar ile adlî para cezasının aşağı sınırını, Soruşturma giderleri ile birlikte, Cumhuriyet savcılığınca
    yapılacak tebliğ üzerine on gün içinde ödediği takdirde hakkında kamu davası açılmaz. (2) Özel kanun hükümleri gereğince
    işin doğrudan mahkemeye intikal etmesi hâlinde de fail, hâkim tarafından yapılacak bildirim üzerine birinci fıkra hükümlerine
    göre saptanacak miktardaki parayı yargılama giderleriyle birlikte ödediğinde kamu davası düşer. (3) Cumhuriyet savcılığınca
    madde kapsamına giren suç nedeniyle önödeme işlemi yapılmadan dava açılması veya dava konusu fiilin niteliğinin değişmesi
    suretiyle madde kapsamına giren bir suça dönüşmesi hâlinde de yukarıdaki fıkra uygulanır. (4) Suçla ilgili kanun maddesinde
    yukarı sınırı üç ayı aşmayan hapis cezası veya adlî para cezasından yalnız birinin uygulanabileceği hâllerde ödenmesi
    gereken miktar, yukarıdaki fıkralara göre adlî para cezası esas
  - Madde 342- Ana ve baba, velâyetleri çerçevesinde üçüncü kişilere karşı çocuklarının yasal temsilcisidirler. İyiniyetli
    üçüncü kişiler, eşlerden her birinin diğerinin rızasıyla işlem yaptığını varsayabilirler. Vesayet makamlarının iznine
    bağlı hususlar dışında kısıtlıların temsiline ilişkin hükümler velâyetteki temsilde de uygulanır. V. Çocuğun fiil ehliyeti
    Madde 343- Velâyet altındaki çocuğun fiil ehliyeti, vesayet altındaki kişinin ehliyeti gibidir. Çocuk, borçlarından ana
    ve babanın çocuk malları üzerindeki haklarına bakılmaksızın kendi malvarlığı ile sorumludur. VI. Çocuğun aileyi temsil
    etmesi Madde 344- Velâyet altındaki çocuk, ayırt etme gücüne sahip ise ana ve babanın rızasıyla aile adına hukukî işlemler
    yapabilir; bu işlemlerden dolayı ana ve baba borç altına girer. VII. Çocuk ile ana ve baba arasındaki hukukî işlemler
    Madde 345- Çocuk ile ana veya baba arasında ya da ana ve babanın menfaatine olarak çocuk ile üçüncü kişi arasında yapılacak
    bir hukukî işlemle çocuğun borç altına girebilmesi, bir kayyımın katılmasına ve hâkimin onayına bağlıdır. C. Çocuğun korunması
    I. Koruma önlemleri
- source_sentence: Tutuklu, hükümlü veya suç delillerini bildirmeme eyleminin kamu görevlisi tarafından göreviyle bağlantılı
    olarak işlenmesi durumunda ceza ne olur?
  sentences:
  - MADDE 283. - (1) Suç işleyen bir kişiye araştırma, yakalanma, tutuklanma veya hükmün infazından kurtulması için imkân
    sağlayan kimse, altı aydan beş yıla kadar hapis cezası ile cezalandırılır. (2) Bu suçun kamu görevlisi tarafından göreviyle
    bağlantılı olarak işlenmesi hâlinde, verilecek ceza yarı oranında artırılır. (3) Bu suçun üstsoy, altsoy, eş, kardeş veya
    diğer suç ortağı tarafından işlenmesi hâlinde, cezaya hükmolunmaz. Tutuklu, hükümlü veya suç delillerini bildirmeme MADDE
    284. - (1) Hakkında tutuklama kararı verilmiş olan veya hükümlü bir kişinin bulunduğu yeri bildiği hâlde yetkili makamlara
    bildirmeyen kimse, bir yıla kadar hapis cezası ile cezalandırılır. (2) İşlenmiş olan bir suça ilişkin delil ve eserlerin
    başkaları tarafından saklandığı yeri bildiği hâlde yetkili makamlara bildirmeyen kimse, yukarıdaki fıkra hükmüne göre
    cezalandırılır. (3) Bu suçların kamu görevlisi tarafından göreviyle bağlantılı olarak işlenmesi hâlinde, verilecek ceza
    yarı oranında artırılır. (4) Bu suçların üstsoy, altsoy, eş veya kardeş tarafından işlenmesi hâlinde, cezaya hükmolunmaz.
    Gizliliğin ihlâli
  - 'Madde 34 – (Değişik: 3/10/2001-4709/13 md.) Herkes, önceden izin almadan, silahsız ve saldırısız toplantı ve gösteri
    yürüyüşü düzenleme hakkına sahiptir. Toplantı ve gösteri yürüyüşü hakkı ancak, millî güvenlik, kamu düzeni, suç işlenmesinin
    önlenmesi, genel sağlığın ve genel ahlâkın veya başkalarının hak ve özgürlüklerinin korunması amacıyla ve kanunla sınırlanabilir.
    Toplantı ve gösteri yürüyüşü düzenleme hakkının kullanılmasında uygulanacak şekil, şart ve usuller kanunda gösterilir.
    XII. Mülkiyet hakkı Madde 35 – Herkes, mülkiyet ve miras haklarına sahiptir. Bu haklar, ancak kamu yararı amacıyla, kanunla
    sınırlanabilir. Mülkiyet hakkının kullanılması toplum yararına aykırı olamaz. XIII. Hakların korunması ile ilgili hükümler
    A. Hak arama hürriyeti Madde 36 – Herkes, meşru vasıta ve yollardan faydalanmak suretiyle yargı mercileri önünde davacı
    veya davalı olarak iddia ve savunma ile adil yargılanma hakkına sahiptir.[16] Hiçbir mahkeme, görev ve yetkisi içindeki
    davaya bakmaktan kaçınamaz. B. Kanuni hakim güvencesi Madde 37 – Hiç kimse kanunen tabi olduğu mahkemeden başka bir merci
    önüne çıkarılamaz. Bir kimseyi kanunen tabi olduğu mahkemeden başka bir merci önüne çıkarma sonucunu doğuran yargı yetkisine
    sahip olağanüstü merciler kurulamaz. C. Suç ve cezalara ilişkin esaslar'
  - 'ÜÇÜNCÜ KİTAP MİRAS HUKUKU BİRİNCİ KISIM MİRASÇILAR İKİNCİ BÖLÜM ÖLÜME BAĞLI TASARRUFLAR BİRİNCİ AYIRIM TASARRUF EHLİYETİ
    A. Ehliyet I. Vasiyette Madde 502- Vasiyet yapabilmek için ayırt etme gücüne sahip ve onbeş yaşını doldurmuş olmak gerekir.
    II. Miras sözleşmesinde Madde 503- Miras sözleşmesi yapabilmek için ayırt etme gücüne sahip ve ergin olmak, kısıtlı bulunmamak
    gerekir. B. İrade sakatlığı Madde 504- Mirasbırakanın yanılma, aldatma, korkutma veya zorlama etkisi altında yaptığı ölüme
    bağlı tasarruf geçersizdir. Ancak, mirasbırakan yanıldığını veya aldatıldığını öğrendiği ya da korkutma veya zorlamanın
    etkisinden kurtulduğu günden başlayarak bir yıl içinde tasarruftan dönmediği takdirde tasarruf geçerli sayılır. Ölüme
    bağlı tasarrufta kişinin veya şeyin belirtilmesinde açık yanılma hâlinde mirasbırakanın gerçek arzusu kesin olarak tespit
    edilebilirse, tasarruf bu arzuya göre düzeltilir. ÜÇÜNCÜ KİTAP MİRAS HUKUKU BİRİNCİ KISIM MİRASÇILAR İKİNCİ BÖLÜM ÖLÜME
    BAĞLI TASARRUFLAR İKİNCİ AYIRIM TASARRUF ÖZGÜRLÜĞÜ A. Tasarruf edilebilir kısım I. Kapsamı Madde 505- (Değişik birinci
    fıkra: 4/5/2007-5650/1 md.) Mirasçı olarak altsoyu, ana ve babası veya eşi bulunan miras bırakan, mirasının saklı paylar
    dışında kalan kısmında ölüme bağlı tasarrufta bulunabilir. Bu mirasçılardan hiç biri yoksa, mirasbırakan mirasının tamamında
    tasarruf edebilir. II. Saklı pay'
- source_sentence: Taşınmaz lehine irtifak hakkı nedir?
  sentences:
  - MADDE 199. - (1) Kıymetli damgayı sahte olarak üreten, ülkeye sokan, nakleden, muhafaza eden veya tedavüle koyan kişi,
    bir yıldan beş yıla kadar hapis ve adlî para cezası ile cezalandırılır. (2) Sahte olarak üretilmiş kıymetli damgayı bilerek
    kabul eden kişi, üç aydan bir yıla kadar hapis ve adlî para cezası ile cezalandırılır. (3) Sahteliğini bilmeden kabul
    ettiği kıymetli damgayı bu niteliğini bilerek tedavüle koyan kişi, bir aydan altı aya kadar hapis cezası ile cezalandırılır.
    (4) Damgalı kâğıtlar, damga ve posta pulları ve muayyen bir miktar vergi veya harcın ödendiğini belgelemek amacıyla kullanılan
    pullar, kıymetli damga sayılır. Para ve kıymetli damgaları yapmaya yarayan araçlar MADDE 200. - (1) Paralarla kıymetli
    damgaların üretiminde kullanılan alet veya malzemeyi izinsiz olarak üreten, ülkeye sokan, satan, devreden, satın alan,
    kabul eden veya muhafaza eden kişi, bir yıldan dört yıla kadar hapis ve adlî para cezası ile cezalandırılır. Etkin pişmanlık
  - 'Madde 302- Davalının, çocuğun doğumundan önceki üçyüzüncü gün ile yüzsekseninci gün arasında ana ile cinsel ilişkide
    bulunmuş olması, babalığa karine sayılır. Bu sürenin dışında olsa bile fiilî gebe kalma döneminde davalının ana ile cinsel
    ilişkide bulunduğu tespit edilirse aynı karine geçerli olur. Davalı, çocuğun babası olmasının olanaksızlığını veya bir
    üçüncü kişinin baba olma olasılığının kendisininkinden daha fazla olduğunu ispatlarsa karine geçerliliğini kaybeder. III.
    Hak düşürücü süreler Madde 303- Babalık davası, çocuğun doğumundan önce veya sonra açılabilir. Ananın dava hakkı, doğumdan
    başlayarak bir yıl geçmekle düşer. (İptal ikinci fıkra: Anayasa Mahkemesi’nin 27/10/2011 tarihli ve E.: 2010/71, K.: 2011/143
    sayılı Kararı ile.) Çocuk ile başka bir erkek arasında soybağı ilişkisi varsa, bir yıllık süre bu ilişkinin ortadan kalktığı
    tarihte işlemeye başlar. Bir yıllık süre geçtikten sonra gecikmeyi haklı kılan sebepler varsa, sebebin ortadan kalkmasından
    başlayarak bir ay içinde dava açılabilir.21 IV. Ananın malî hakları'
  - DÖRDÜNCÜ KİTAP EŞYA HUKUKU İKİNCİ KISIM SINIRLI AYNÎ HAKLAR BİRİNCİ BÖLÜM İRTİFAK HAKLARI VE TAŞINMAZ YÜKÜ BİRİNCİ AYIRIM
    TAŞINMAZ LEHİNE İRTİFAK HAKKI A. Konusu Madde 779- Taşınmaz lehine irtifak hakkı, bir taşınmaz üzerinde diğer bir taşınmaz
    lehine konulmuş bir yük olup, yüklü taşınmazın malikini mülkiyet hakkının sağladığı bazı yetkileri kullanmaktan kaçınmaya
    veya yararlanan taşınmaz malikinin yüklü taşınmazı belirli şekilde kullanmasına katlanmaya mecbur kılar. Yapma borçları,
    irtifaka başlı başına konu olamaz; ona ancak yan edim olarak bağlanabilir. B. Kurulması ve sona ermesi I. Kurulması 1.
    Tescil Madde 780- İrtifak hakkının kurulması için tapu kütüğüne tescil şarttır. İrtifak hakkının kazanılmasında ve tescilinde,
    aksi öngörülmüş olmadıkça taşınmaz mülkiyetine ilişkin hükümler uygulanır. İrtifak hakkının zamanaşımı yoluyla kazanılması,
    ancak mülkiyeti bu yolla elde edilebilecek taşınmazlarda mümkündür. 2. Sözleşme Madde 781- İrtifak hakkının kurulmasına
    ilişkin sözleşmenin geçerli olması, resmî şekilde düzenlenmesine bağlıdır. 3. Kendi taşınmazı üzerinde irtifak hakkı Madde
    782- Malik kendisine ait iki taşınmazdan biri üzerinde diğerinin lehine irtifak hakkı kurabilir. II. Sona ermesi 1. Genel
    olarak Madde 783- İrtifak hakkı, tescilin terkini veya yüklü ya da yararlanan taşınmazın yok olmasıyla sona erer. 2. Her
    iki taşınmaza aynı kimsenin malik olması
- source_sentence: Polis, jandarma gibi üniformalı personelin bulunduğu kamu kurum ve kuruluşlarında bayrak töreni nasıl yapılır?
  sentences:
  - 'Madde 3 - Bu Kanunun kapsamına giren nitelikte bir işyerini kuran, her ne suretle olursa olsun devralan, çalışma konusunu
    kısmen veya tamamen değiştiren veya herhangi bir sebeple faaliyetine son veren ve işyerini kapatan işveren, işyerinin
    unvan ve adresini, çalıştırılan işçi sayısını, çalışma konusunu, işin başlama veya bitme gününü, kendi adını ve soyadını
    yahut unvanını, adresini, varsa işveren vekili veya vekillerinin adı, soyadı ve adreslerini bir ay içinde bölge müdürlüğüne
    bildirmek zorundadır. (Değişik ikinci fıkra: 15/5/2008-5763/1 md.) Bu Kanunun 2 nci maddesinin altıncı fıkrasına göre
    iş alan alt işveren; kendi işyerinin tescili için asıl işverenden aldığı yazılı alt işverenlik sözleşmesi ve gerekli belgelerle
    birlikte, birinci fıkra hükmüne göre bildirim yapmakla yükümlüdür. Bölge müdürlüğünce tescili yapılan bu işyerine ait
    belgeler gerektiğinde iş müfettişlerince incelenir. İnceleme sonucunda muvazaalı işlemin tespiti halinde, bu tespite ilişkin
    gerekçeli müfettiş raporu işverenlere tebliğ edilir. Bu rapora karşı tebliğ tarihinden itibaren otuz iş günü içinde işverenlerce
    yetkili iş mahkemesine itiraz edilebilir. (Değişik beşinci cümle: 16/9/2014-6552/1 md.) İtiraz üzerine görülecek olan
    dava basit yargılama usulüne göre dört ay içinde sonuçlandırılır. Mahkemece verilen kararın temyizi hâlinde Yargıtay altı
    ay içinde kesin olarak karar verir. Kamu idarelerince bu'
  - 'Madde 22 – (Değişik: 22/2/2001 - 2001/2130 K.) 1) Bayrak, aşağıda belirtilen şekilde törenle çekilir ve indirilir: A)
    Türk Silahlı Kuvvetlerindeki bayrak törenlerinde, bir subay veya astsubay komutasında, birliğin seviyesine uygun sayıda
    silahlı erlerden oluşan bir saygı kıt’ası, Bayrağın çekileceği veya çekili bulunduğu direğin karşısında veya yakınında,
    varsa bando veya boru çalacak askerlerle birlikte cephe alır. Gerektiği kadar asker, Bayrağın direğe çekiliş veya indirilişi
    için hazır bulunur ve çekilmesinden sonra veya indirilmesinden önce Bayrağı selamlar. Varsa bando İstiklal Marşını veya
    boru Bayrak marşını (Deniz Kuvvetleri Komutanlığı ve Sahil Güvenlik Komutanlığına mensup gemilerde bando yoksa silistre)
    çalmaya başladığı anda subay ve astsubaylar elle, kıt’a tüfekle Bayrak çekilinceye veya indirilinceye kadar selam durur.
    B) Küçük deniz araçlarında tören, serdümen tarafından yapılır. C) Emrinde polis, jandarma gibi üniformalı personel bulunan
    kamu kurum ve kuruluşlarında ve bu personelin bulunduğu karakollarda tören, (A) bendindeki esaslara göre yapılır. D) Emrinde
    üniformalı özel güvenlik teşkilatı bulunan kamu kurum ve kuruluşlarında Bayrak, bir güvenlik görevlisi tarafından çekilir
    ve indirilir. Güvenliği aksatmayacak şekilde yeterli sayıda personeli bulunan kuruluşlarda ise Bayrağı çeken ve indiren
    güvenlik görevlisiyle birlikte en az üç kişilik üniformalı person'
  - Madde 7 - Resmî sicil ve senetler, belgeledikleri olguların doğruluğuna kanıt oluşturur. Bunların içeriğinin doğru olmadığının
    ispatı, kanunlarda başka bir hüküm bulunmadıkça, her hangi bir şekle bağlı değildir.
- source_sentence: Bir kişi, ticari sır, bankacılık sırrı veya müşteri sırrı niteliğinde olan bilgi veya belgeleri yetkisiz
    kişilere verirse veya ifşa ederse, hangi suçtan yargılanır?
  sentences:
  - 'Madde 18 – (Ek: 7/5/2010-5982/25 md.) Bu Kanunun yürürlüğe girdiği tarihte Anayasa Mahkemesinin mevcut yedek üyeleri
    asıl üye sıfatını kazanır. Bu Kanunun yürürlüğe girdiği tarihten itibaren otuz gün içinde, Türkiye Büyük Millet Meclisi
    bir üyeyi Sayıştay Genel Kurulunun ve bir üyeyi de baro başkanlarının gösterecekleri üçer aday içinden seçer. Türkiye
    Büyük Millet Meclisinin yapacağı üye seçimi için aday göstermek amacıyla; a) Bu Kanunun yürürlüğe girdiği tarihten itibaren
    beş gün içinde, Sayıştay Başkanı adaylık başvurusunu ilan eder. İlan tarihinden itibaren beş gün içinde adaylar Başkanlığa
    başvurur. Başvuru tarihinin sona erdiği günden itibaren beş gün içinde Sayıştay Genel Kurulunca seçim yapılır. Her Sayıştay
    üyesinin (…)[113] oy kullanabileceği bu seçimde en fazla oy alan üç kişi aday gösterilmiş sayılır. b) Bu Kanunun yürürlüğe
    girdiği tarihten itibaren beş gün içinde, Türkiye Barolar Birliği Başkanlığı adaylık başvurusunu ilan eder. İlan tarihinden
    itibaren beş gün içinde adaylar Türkiye Barolar Birliği Başkanlığına başvurur. Başvuru tarihinin sona erdiği günden itibaren
    beş gün içinde Türkiye Barolar Birliği Başkanlığının ilanında gösterilen yer ve zamanda baro başkanları tarafından seçim
    yapılır. Her bir baro başkanının (…)[114] oy kullanabileceği bu seçimde, en fazla oy alan üç kişi aday gösterilmiş sayılır.
    c) (a) ve (b) bentleri uyarınca yapılan seçimlerin sonucu'
  - MADDE 367- Belirli süreli kira sözleşmesi, sürenin bitiminde kendiliğinden sona erer. Ancak, tarafların örtülü olarak
