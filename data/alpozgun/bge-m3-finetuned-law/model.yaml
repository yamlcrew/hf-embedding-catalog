      bir merci önüne çıkarılamaz. Bir kimseyi kanunen tabi olduğu mahkemeden başka bir merci önüne çıkarma sonucunu doğuran
      yargı yetkisine sahip olağanüstü merciler kurulamaz. C. Suç ve cezalara ilişkin esaslar'
    - 'ÜÇÜNCÜ KİTAP MİRAS HUKUKU BİRİNCİ KISIM MİRASÇILAR İKİNCİ BÖLÜM ÖLÜME BAĞLI TASARRUFLAR BİRİNCİ AYIRIM TASARRUF EHLİYETİ
      A. Ehliyet I. Vasiyette Madde 502- Vasiyet yapabilmek için ayırt etme gücüne sahip ve onbeş yaşını doldurmuş olmak gerekir.
      II. Miras sözleşmesinde Madde 503- Miras sözleşmesi yapabilmek için ayırt etme gücüne sahip ve ergin olmak, kısıtlı
      bulunmamak gerekir. B. İrade sakatlığı Madde 504- Mirasbırakanın yanılma, aldatma, korkutma veya zorlama etkisi altında
      yaptığı ölüme bağlı tasarruf geçersizdir. Ancak, mirasbırakan yanıldığını veya aldatıldığını öğrendiği ya da korkutma
      veya zorlamanın etkisinden kurtulduğu günden başlayarak bir yıl içinde tasarruftan dönmediği takdirde tasarruf geçerli
