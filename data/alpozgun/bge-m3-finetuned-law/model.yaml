      kullanılan pullar, kıymetli damga sayılır. Para ve kıymetli damgaları yapmaya yarayan araçlar MADDE 200. - (1) Paralarla
      kıymetli damgaların üretiminde kullanılan alet veya malzemeyi izinsiz olarak üreten, ülkeye sokan, satan, devreden,
      satın alan, kabul eden veya muhafaza eden kişi, bir yıldan dört yıla kadar hapis ve adlî para cezası ile cezalandırılır.
      Etkin pişmanlık
    - 'Madde 302- Davalının, çocuğun doğumundan önceki üçyüzüncü gün ile yüzsekseninci gün arasında ana ile cinsel ilişkide
      bulunmuş olması, babalığa karine sayılır. Bu sürenin dışında olsa bile fiilî gebe kalma döneminde davalının ana ile
      cinsel ilişkide bulunduğu tespit edilirse aynı karine geçerli olur. Davalı, çocuğun babası olmasının olanaksızlığını
      veya bir üçüncü kişinin baba olma olasılığının kendisininkinden daha fazla olduğunu ispatlarsa karine geçerliliğini
      kaybeder. III. Hak düşürücü süreler Madde 303- Babalık davası, çocuğun doğumundan önce veya sonra açılabilir. Ananın
      dava hakkı, doğumdan başlayarak bir yıl geçmekle düşer. (İptal ikinci fıkra: Anayasa Mahkemesi’nin 27/10/2011 tarihli
      ve E.: 2010/71, K.: 2011/143 sayılı Kararı ile.) Çocuk ile başka bir erkek arasında soybağı ilişkisi varsa, bir yıllık
      süre bu ilişkinin ortadan kalktığı tarihte işlemeye başlar. Bir yıllık süre geçtikten sonra gecikmeyi haklı kılan sebepler
