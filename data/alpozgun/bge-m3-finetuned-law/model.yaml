      kanunla sınırlanabilir. Mülkiyet hakkının kullanılması toplum yararına aykırı olamaz. XIII. Hakların korunması ile ilgili
      hükümler A. Hak arama hürriyeti Madde 36 – Herkes, meşru vasıta ve yollardan faydalanmak suretiyle yargı mercileri önünde
      davacı veya davalı olarak iddia ve savunma ile adil yargılanma hakkına sahiptir.[16] Hiçbir mahkeme, görev ve yetkisi
