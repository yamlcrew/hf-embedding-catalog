      1. Tescil Madde 780- İrtifak hakkının kurulması için tapu kütüğüne tescil şarttır. İrtifak hakkının kazanılmasında ve
      tescilinde, aksi öngörülmüş olmadıkça taşınmaz mülkiyetine ilişkin hükümler uygulanır. İrtifak hakkının zamanaşımı yoluyla
      kazanılması, ancak mülkiyeti bu yolla elde edilebilecek taşınmazlarda mümkündür. 2. Sözleşme Madde 781- İrtifak hakkının
      kurulmasına ilişkin sözleşmenin geçerli olması, resmî şekilde düzenlenmesine bağlıdır. 3. Kendi taşınmazı üzerinde irtifak
      hakkı Madde 782- Malik kendisine ait iki taşınmazdan biri üzerinde diğerinin lehine irtifak hakkı kurabilir. II. Sona
      ermesi 1. Genel olarak Madde 783- İrtifak hakkı, tescilin terkini veya yüklü ya da yararlanan taşınmazın yok olmasıyla
      sona erer. 2. Her iki taşınmaza aynı kimsenin malik olması
  - source_sentence: Polis, jandarma gibi üniformalı personelin bulunduğu kamu kurum ve kuruluşlarında bayrak töreni nasıl
      yapılır?
    sentences:
    - 'Madde 3 - Bu Kanunun kapsamına giren nitelikte bir işyerini kuran, her ne suretle olursa olsun devralan, çalışma konusunu
      kısmen veya tamamen değiştiren veya herhangi bir sebeple faaliyetine son veren ve işyerini kapatan işveren, işyerinin
      unvan ve adresini, çalıştırılan işçi sayısını, çalışma konusunu, işin başlama veya bitme gününü, kendi adını ve soyadını
      yahut unvanını, adresini, varsa işveren vekili veya vekillerinin adı, soyadı ve adreslerini bir ay içinde bölge müdürlüğüne
      bildirmek zorundadır. (Değişik ikinci fıkra: 15/5/2008-5763/1 md.) Bu Kanunun 2 nci maddesinin altıncı fıkrasına göre
      iş alan alt işveren; kendi işyerinin tescili için asıl işverenden aldığı yazılı alt işverenlik sözleşmesi ve gerekli
      belgelerle birlikte, birinci fıkra hükmüne göre bildirim yapmakla yükümlüdür. Bölge müdürlüğünce tescili yapılan bu
      işyerine ait belgeler gerektiğinde iş müfettişlerince incelenir. İnceleme sonucunda muvazaalı işlemin tespiti halinde,
      bu tespite ilişkin gerekçeli müfettiş raporu işverenlere tebliğ edilir. Bu rapora karşı tebliğ tarihinden itibaren otuz
      iş günü içinde işverenlerce yetkili iş mahkemesine itiraz edilebilir. (Değişik beşinci cümle: 16/9/2014-6552/1 md.)
      İtiraz üzerine görülecek olan dava basit yargılama usulüne göre dört ay içinde sonuçlandırılır. Mahkemece verilen kararın
      temyizi hâlinde Yargıtay altı ay içinde kesin olarak karar verir. Kamu idarelerince bu'
    - 'Madde 22 – (Değişik: 22/2/2001 - 2001/2130 K.) 1) Bayrak, aşağıda belirtilen şekilde törenle çekilir ve indirilir:
      A) Türk Silahlı Kuvvetlerindeki bayrak törenlerinde, bir subay veya astsubay komutasında, birliğin seviyesine uygun
      sayıda silahlı erlerden oluşan bir saygı kıt’ası, Bayrağın çekileceği veya çekili bulunduğu direğin karşısında veya
      yakınında, varsa bando veya boru çalacak askerlerle birlikte cephe alır. Gerektiği kadar asker, Bayrağın direğe çekiliş
