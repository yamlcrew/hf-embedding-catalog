widgetData:
- source_sentence: post-discharge oral hygiene follow-up plan
  sentences:
  - The patient is advised to continue regular oral hygiene measures and follow-up with their primary care dentist.
  - 'PLAN: Follow-up with the patient as clinically indicated.'
  - The patient's last available report revealed significant improvement in kidney function. No further information is currently
    available. The patient is advised to follow up with his primary care physician for routine care.
- source_sentence: Genetic mutations associated with PKD
  sentences:
  - We identified an insertion of C at 650 bp of coding sequence (exon 2) leading to frameshift mutation [p.R217Pfs*8] in
    the PKD patient, but not in the control subject. In addition, we also identified a novel point mutation [c.244C > T;]
    at exon 2 in the patient, but not in the control subject.
  - Following the National Comprehensive Cancer Network guidelines, the patient will be monitored with careful history and
    physical, blood pressure measurement, and urine and plasma catecholamine assessment every three months through the first
    year and every 6–12 months thereafter through 10 years.
  - 'Genetic analysis showed two variants in NR2E3: a missense variation c.1118T>C, which leads to substitution of leucine
    with proline in amino acid position 373, and c.349+5G>C, which involves a gene sequence near a splicing site.'
- source_sentence: What was the patient's diagnosis based on the MRI results?
  sentences:
  - Magnetic resonance imaging of the orbit showed hyperintensity and increased thickness of the preseptal orbital tissue,
    and optic nerve thickening in the right eye.
  - 'Probands #1 and #2 presented with significant and consistent delays in cognitive function, language and sensorimotor
    development.'
  - An MRI was performed, which revealed the presence of a declivous purulent material inside the lateral ventricles with
    a moderate dilatation of these structures and semi-recent ischemic strokes.
- source_sentence: Post-operative complications of extended left hepatectomy
  sentences:
  - The patient was referred to the Oncology Department for further management and treatment. A multidisciplinary team approach
    would be used to develop an optimal treatment strategy.
  - However, on postoperative day 15, the patient was readmitted with symptoms of abdominal pain, fevers, elevated total bilirubin,
    and leukocytosis. A CT scan revealed the formation of a collection in the hepatic fossa and a dilated right posterior
    bile duct, which prompted the placement of a drain.
  - Post-operatively, the patient recovered well, and was discharged on the 7th post-operative day without any complications.
    Follow-up assessments did not report any issues, and the patient was advised to maintain ample rest and a nutritious diet
    with frequent walkthroughs to avoid stress on the abdomen.
- source_sentence: moderate level of depression diagnosis
  sentences:
  - The right upper limb was examined and revealed a morphological variant of the coracobrachialis muscle (CBM) that corresponded
    to the classical description, originating from the apex of the coracoid process together with the short head of the biceps
    brachii.
  - The patient's symptoms are suggestive of depression. The Beck Depression Inventory score was 24, indicating a moderate
    level of depression.
  - The patient was admitted due to symptoms of Major Depressive Disorder (MDD) which included restlessness, sleep problems,
    depressed mood, decreased social function, and suicidal thoughts as reported by the patient.
