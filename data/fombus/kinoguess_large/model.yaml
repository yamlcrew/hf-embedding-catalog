widgetData:
- source_sentence: Ученик средней школы к услугам обществу примешал доброту.
  sentences:
  - 'Склизкий гад в сливном бачке; мохнатый зверь; похожий на чудовище из «Аленького цветочка»; гигантские мокрицы под кроватью — все
    они существуют на самом деле. Все; что им нужно — пугать детей; потому что из детских криков они получают электричество.Полнометражный
    мультфильм рассказывает о кризисах в мире монстров; их жизни. Но однажды вся мирная жизнь монстров оказывается под угрозой:
    в их мир попадает ребенок. А с детьми столько хлопот; что они могут довести даже монстров.'
  - В Нью-Йорк по приглашению главы крупного юридического концерна прибывает Кевин Ломакс; молодой адвокат. До этого он был
    известен тем; что защищал исключительно негодяев и притом не проиграл ни одного процесса. На новом месте работы он вполне
    счастлив; он живет в роскошной квартире с любящей женой; его окружают интересные люди.
  - Представьте себе — Вы оказываете кому-либо существенную услугу и просите этого человека отблагодарить не Вас; а трёх других
    людей; которые; в свою очередь; отблагодарят ещё троих; и так далее; распространяя тепло и доброту в мировом масштабе.
    Насколько действенной может оказаться подобная сердечная идея? Ученик седьмого класса Тревор МакКинни решил это проверить;
    начав цепочку добра.
- source_sentence: У тебя никакой информации нет. Выложи нормальную информацию, чтобы я мог сделать краткое описание.
  sentences:
  - Июль 1942 года. На подступах к Сталинграду обескровленные; измотанные советские войска ведут тяжелые оборонительные бои;
    неся огромные потери… Фильм рассказывает о подвиге рядовых солдат; любви к родной земле; об истинной цене победы…
  - Инженер Бен отправляется в необычное путешествие. В ходе своей поездки он встречает семерых незнакомцев; включая смертельно
    больную Эмили; которая называет себя девушкой с подбитыми крыльями. Бен неожиданно влюбляется в нее; что сильно усложняет
    его первоначальный план. Сможет ли он разгадать послание судьбы?
  - Рассказ о нелегких буднях учительницы английского языка; преподающей в одной из школ калифорнийского городка Лонг-Бич.
    Ее ученики — почти сплошь субъекты; для которых английский совсем не является родным языком. Ко всему прочему; Лонг-Бич
    славится своими бандитскими традициями.
- source_sentence: Таким образом, я описал фильм «Восьмая нервная речь» (другие названия «Нервная речь» или «Бездомный». Хотя
    фильм и относится к произведениям кинематографа, его можно назвать наиболее короткой повестью с цитатами о собаке и о
    существе человека.
  sentences:
  - Трогательная лирическая киноповесть о судьбе собаки; теряющей любимого хозяина; об отношении людей к «братьям меньшим»;
    которое как рентгеном просвечивает души; выявляя в одних низость и мелочную подлость; а в других — благородство; способность
    сострадать и любить…
  - Закон и преступление; порядок и беспредел; защитник и жертва — неизбежное противостояние и столкновение. Полицейские — порядок;
    законопослушные граждане — закон. Но все ли граждане; слывущие добропорядочными; соблюдают законы; и всем ли представителям
    закона стоит доверять? Прикрываясь значком полицейского; они вершат беззаконие и из праведников превращаются в изощренных
    насильников.
  - Когда засуха; пыльные бури и вымирание растений приводят человечество к продовольственному кризису; коллектив исследователей
    и учёных отправляется сквозь червоточину (которая предположительно соединяет области пространства-времени через большое
    расстояние) в путешествие; чтобы превзойти прежние ограничения для космических путешествий человека и найти планету с подходящими
    для человечества условиями.
- source_sentence: Фильм — о борьбе женщины за справедливость в поисках убийцы ее дочери, когда полиция seemingly не заинтересована
    в расследовании. Произошедшее побудило ее нанять монтажиста, который закрепляет 3 большого плаката со своеобразным обращением
    к начальнику полиции, принимающему расстановку сил и власти над престарелыми гражданами.
  sentences:
  - Трогательная и захватывающая история сближения двух абсолютно разных собак — породистой комнатной неженки и обычной дворняги.
    Изящная и пушистая как игрушка; коккер-спаниельша Леди была любимицей хозяев; пока в их семье не появился младенец. Надетый
    намордник стал последней каплей; подтолкнувшей обиженную героиню к бегству. Но на улице ее поджидала целая куча опасностей;
    о существовании которых она даже не подозревала. И тогда на помощь миниатюрной черноглазой красотке пришел пес Бродяга;
    благородство которого было не в породе; а в душе.
  - Идёт третий год Войн клонов. Галактическая Республика; некогда бывшая спокойным и гармоничным государством; превратилась
    в поле битвы между армиями клонов; возглавляемых канцлером Палпатином; и армадами дроидов; которых ведёт граф Дуку; тёмный
    лорд ситхов. Республика медленно погружается во тьму. Лишь рыцари-джедаи; защитники мира и справедливости; могут противостоять
    злу; которое вскоре поглотит галактику. Но настоящая битва идёт в душе у молодого рыцаря-джедая Энакина; который разрывается
    между долгом джедая и любовью к своей жене; сенатору Падме Амидале. И от того; какое чувство в нём победит; зависит будущее
    всего мира.
  - Спустя несколько месяцев после убийства дочери Милдред Хейс преступники так и не найдены. Отчаявшаяся женщина решается
    на смелый шаг; арендуя на въезде в город три билборда с посланием к авторитетному главе полиции Уильяму Уиллоуби. Когда
    в ситуацию оказывается втянут ещё и заместитель шерифа; инфантильный маменькин сынок со склонностью к насилию; офицер
    Диксон; борьба между Милдред и властями города только усугубляется.
- source_sentence: В отдаленном волшебном королевстве живут заколдованная принцесса Фиона и ее семья. Фиону превратили в козла,
    а ее семью осудили на вечную охоту за глупыми носителями ее образа.
  sentences:
  - В первом и последнем плавании шикарного «Титаника» встречаются двое. Пассажир нижней палубы Джек выиграл билет в карты;
    а богатая наследница Роза отправляется в Америку; чтобы выйти замуж по расчёту. Чувства молодых людей только успевают
    расцвести; и даже не классовые различия создадут испытания влюблённым; а айсберг; вставший на пути считавшегося непотопляемым
    лайнера.
  - Двое бандитов Винсент Вега и Джулс Винфилд ведут философские беседы в перерывах между разборками и решением проблем с должниками
    криминального босса Марселласа Уоллеса.В первой истории Винсент проводит незабываемый вечер с женой Марселласа Мией. Во второй
    рассказывается о боксёре Бутче Кулидже; купленном Уоллесом; чтобы сдать бой. В третьей истории Винсент и Джулс по нелепой
    случайности попадают в неприятности.
  - Жил да был в сказочном государстве большой зеленый великан по имени Шрек. Жил он в гордом одиночестве в лесу; на болоте;
    которое считал своим. Но однажды злобный коротышка — лорд Фаркуад; правитель волшебного королевства; безжалостно согнал
    на Шреково болото всех сказочных обитателей.И беспечной жизни зеленого великана пришел конец. Но лорд Фаркуад пообещал
    вернуть Шреку болото; если великан добудет ему прекрасную принцессу Фиону; которая томится в неприступной башне; охраняемой
    огнедышащим драконом…
