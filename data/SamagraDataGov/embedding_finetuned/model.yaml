    - '''Agro-industries generate residues like husk, hull, shell, peel, testa, skin, fibre, bran, linter, stone, seed, cob,
      prawn, head, frog legs, low grade fish, leather waste, hair, bones, coir dust, saw dust, bamboo dust, etc. which could
      be recycled or used efficiently through agro-processing centres. In the last three decades, rice and sugarcane residues
      have increased by 162 and 172 %, respectively. Their disposal problem needs serious rethinking (Vimal, 1981). To some
      extent these organic residues are used as soil conditioner, animal feed, fuel, thatching and packing materials. These
      can also be put to new uses for manufacture of various chemicals and specific products (like silica, alcohol, tannins,
      glue, gelatine, wax, etc), feed, pharmaceuticals (Iycogenin, antibiotics, vitamins, etc.), fertilizers, energy, construction
      materials, paper pulp, handicraft materials etc. Residues from fruit and vegetable industries, fish and marine industries
      and slaughter o straw decrease their efficiency without pretreatment.'''
  - source_sentence: What is the purpose of using pectolytic enzymes in fruit juice processing?
    sentences:
    - '''Aggregating producers into collectives is one of the best mechanism to improve access of small producers to investment,
      technology and market.  The facilitating agency should however keep the following factors in view:   a. Types of small
      scale producers in the target area, volume of production, socioeconomic status, marketing arrangement  b. Sufficient
      demand in the existing market to absorb  the additional production without  significantly affecting the prices  c. Willingness
      of producers to invest and adopt new technology, if identified, to increase  productivity or quality of produce  d.
      Challenges in the market chain and market environment e. Vulnerability of the market to shocks, trends and seasonality  f.
      Previous experience of collective action (of any kind) in the community g. Key commodities, processed products or semi-finished
      goods demanded by major  retailers or processing companies in the surrounding areas/districts  h. Support from Government
      Departments, NGOs, specialist support agencies and  private companies  for enterprise development  i. Incentives for
      members (also disincentives) for joining the PO    Keeping in view the sustainability of a Producer Organisation, a
      flow chart of activities along with timeline, verifiable indicators and risk factors is provided at Attachment-5.'''
    - '''2. Sampling method to be adopted – Random Size of the card including area for label and   other details = 20 x 30
      cmm = 600 cm 2 No. of Grids = 30 Area of each grid = 7 x 2 cm = 14 cm 2 Total No. of eggs / cm 2 to be accommodated
      = 96,000 – 1,08,000 Mean number of egg / cm 2 of the card in the grid area excluding area for labeling = 200 – 250 Number
      of counts/ card of size 20 x 30 cm to be taken No. of parasitised eggs = 12 • 3-4 days old parasitised egg card has
      to be selected for examination • count the number of eggs and eggs  parasitised in an area  by 1 cm 2 • Per card of
      size 20 x 30 cm count randomly in 12 positions • Repeat the process for three different cards of same age • Express
      the per cent parasitisation . The result should fall in range of 85-90 per cent.'''
    - '''Pectins are colloidal in nature, making solutions viscous and holding other materials in suspension. Pectinesterase
      removes methyl groups from the pectin molecules exposing carboxyl groups which in the presence of bi- or multivalent
      cations, such as calcium, form insoluble salts which can readily be removed. At the same time, polygalacturonase degrades
      macromolecular pectin, causing reduction in viscosity and destroying the protective colloidal action so that suspended
      materials will settle out. Extensive use of pectolytic enzymes is made in processing fruit juices. Addition of pectic
      enzymes to grapes or other fruits during crushing or grinding results in increased yields of juice on pressing. Wine
      from grapes so treated will usually clear faster when fermentation is complete, and have better color.'''
  - source_sentence: What is the purpose of the PM-Kisan Portal?
    sentences:
    - '''   2) In case of cultivable land in the State of Nagaland which is categorised as Jhum  land as per definition under
      Section–2(7) of the Nagaland Jhum Land Act, 1970 and which is owned by the community/clan/village council/village chieftan,
      the identification of beneficiaries under PM-Kisan scheme, shall be on the basis of certification of land holding by
      the village council/chief/head of the village, duly verified by the administrative head of the circle/sub division and
      countersigned by the Deputy Commissioner of the District. Provided that the name of the beneficiary is included in the
      state of Nagaland''s Agriculture Census of 2015-16. This proviso shall not be applicable in cases of succession and
      family partition.  The list of such beneficiaries shall be subject to the exclusions under the operational guidelines.  5.6  For
      identification of *bona fide* beneficiary under PM-Kisan Scheme in Jharkhand, the following proposal of Government of
      Jharkhand was considered and approved by the Committee: \''The farmer will be asked to submit ''Vanshavali (Lineage)''
      linked to the entry of land record comprising his \\ her ancestor''s name giving a chart of successor. This lineage
      chart shall be submitted before the Gram Sabha for calling objections. After approval of the Gram Sabha, the village
      level \\ circle level revenue officials will verify and authenticate the Vanshawali and possession of holding. This
      authenticated list of farmers after due verification of succession chart shall be countersigned by the District level
      revenue authority. Farmers'' names, subject to the exclusion criterion after following the aforementioned process, shall
      be uploaded on the PM-Kisan portal along with other required details for this disbursement of benefit under the scheme.\'''''
    - '''Deep summer ploughing should be done for field preparation for pulses,apply FYM and compost @ 8-10 t/ha and mix well.
      Sowing of Pigeon pea should be done by the end of June in rows at the spacing of 60-90x15-20 cm. Seed rate should be
      12-15 kg/ha Seed should be treated with Carbendazim or Thirum @3g/kg seed Fertilizer dose should be scheduled as per
      the soil test results. In general, 20-25 kg N, 45-50 kg P and 15-20 kg K and 20 kg S should be given basal. Improved
      varieties like Chhattisgarh Arhar -1, Chhattisgarh-2, Rajivlochan and TJT-501 should be sown. Soybean and other pulse
      crops should be sown with proper drainage arrangement. For this seed should be treated with culture before sowing. The
      quantity of Rhizobium culture@5g + PSB @ 10 g/kg seed should be used for this seed treatment.'''
    - '''Union Territory. The details of farmers are being maintained by the States / UTs either in electronic form or in
      manual register. To make integrated platform available in the country to assist in benefit transfer, a platform named
      **PM-Kisan Portal** available at URL (**http://pmkisan.gov.in**) has been be launched for uploading the farmers'' details
      at a single web-portal in a uniform structure. 9.2  The PM-Kisan Portal has been created with the following objectives
      -  i)  To provide verified and single source of truth on farmers'' details at the portal.  ii)  Timely assistance to
      the farmers in farm operation  iii)  A unified e-platform for transferring of cash benefits into farmer''s bank account  through
      Public Financial Management System (PFMS) integration.  iv)  Location wise availability of benefited farmers'' list.  v)  Ease
      of monitoring across the country on fund transaction details.'''
  - source_sentence: What should be done before sowing pigeonpea in fields where it is being sown for the first time after
      a long time?
    sentences:
    - '''The sole arbitrator shall be appointed by NABARD in case of dispute raised by NABARD, from the panel of three persons
      nominated by RSA. Similarly, the sole arbitrator shall be appointed by RSA if dispute is raised by RSA from the panel
      of three persons nominated by NABARD. The language of the Arbitration shall be English and the arbitrator shall be fluent
      in English. The arbitrator should be person of repute and integrity and place of arbitration shall be Mumbai.\''   9.
      NABARD shall have the right to enter into similar MoU/agreements with any other  RSA/Institution.  10. Any notice required
      to be given under this MoU/Agreement shall be served on the party at  their respective address given below by hand delivery
      or by registered post :'''
    - '''y Firstly, Treat 1kg seeds with a mixture of 2 grams of thiram and one gram of carbendazim or 4 grams of Trichoderma
      + 1 gram of carboxyne or carbendazim. Before planting, treat each seed with a unique Rhizobium culture of pigeon pea.
      A packet of this culture has to be sprinkled over 10 kg of seeds, then mix it lightly with hands, so that a light layer
      is formed on the seeds. Sow this seed immediately. There is a possibility of the death of culture organisms from strong
      sunlight. In fields where pigeonpea is being sown for the first time after a long time, it must use culture.'''
    - '''Organic farming is one of the several approaches found to meet the objectives of sustainable agriculture. Organic
      farming is often associated directly with, \''Sustainable farming.\'' However, ‘organic farming’ and ‘sustainable farming’,
      policy and ethics-wise are t wo different terms. Many techniques used in organic farming like inter-cropping, mulching
      and integration of crops and livestock are not alien to various agriculture systems including the traditional agriculture
      practiced in old countries like India. However, organic farming is based on various laws and certification programmes,
      which prohibit the use of almost all synthetic inputs, and health of the soil is recognized as the central theme of
      the method. Organic products are grown under a system of agriculture without the use of chemical fertilizers and pesticides
      with an environmentally and socially responsible approach. This is a method of farming that works at'''
