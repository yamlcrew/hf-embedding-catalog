widgetData:
- source_sentence: How will the performance of CBBOs be assessed in the third and fourth year?
  sentences:
  - ''' (iv) In third and fourth year, performance of the CBBOs will be assessed  based on - (a) issuing Share Certificates
    to each member in third  year, if any; (b) audited Financial Statements for FPOs for second year and third year in due
    time and filing as required; (c) MoU and vendor registration as per Business Plan with Marketing Agencies/Institutional
    Buyers; (d) trading/uploading of produce in e-NAM/other sources, if any; (e) second tranche equity grant  to FPOs, if
    any; and (f) second tranche of credit guarantee facility, if any .    (v) In the fifth year, performance of the CBBOs
    will be assessed based on  (a) audited Statements of accounts of FPO and filing it; (b) 100% of agri-business plan executed
    and value chain developed;  (c) revenue model showing financial growth in last 3 consecutive  years; (d) detailed project
    completion Report; and (e) third tranche of credit guarantee facility if any.'''
  - '''5. Tussock caterpillar, Notolopus (=Orygyia) postica , Lymantriidae, Lepidoptera Symptom of damage:  Defoliation. Nature
    of damage:  Caterpillars of the moth feed on the leaves. Egg: Eggs are laid in clusters on the leaves and covered over
    with hairs. Larva:  Caterpillars are gregarious in young stages. Full grown larva possess a brown head, a pair of long
    pencil of hairs projecting forwardly from the prothorax, yellowish tuft of hairs arising from the lateral side of the
    first two abdominal segment and long brownish hairs arising from 8 th abdominal segment. Pupa:  Pupation takes place in
    silken cocoon. Adult:  Small adult with yellowish brown wings. Female moth is wingless. Presence of bipectinate antenna.'''
  - '''The Kisan Credit Card (KCC) scheme was introduced in 1998 for issue of Kisan Credit Cards to farmers on the basis of
    their holdings for uniform adoption by the banks so that farmers may use them to readily purchase agriculture inputs such
    as seeds, fertilizers, pesticides etc. and draw cash for their production needs. The scheme was further extended for the
    investment credit requirement of farmers viz. allied and non-farm activities in the year 2004. The scheme was further
    revisited in 2012 by a working Group under the Chairmanship of Shri T. M. Bhasin, CMD, Indian Bank with a view to simplify
    the scheme and facilitate issue of Electronic Kisan Credit Cards. The scheme provides broad guidelines to banks for operationalizing
    the KCC scheme. Implementing banks will have the discretion to adopt the same to suit institution/location specific requirements.'''
- source_sentence: How should State Government disclose ceiling premium rate for a crop in the tender document?
  sentences:
  - '''However, in absence of insured area of last year/season  for all proposed crops or any crop, net sown area of that
    crop(s) will be considered for calculation of weighted premium of district. This data will be used for calculation of
    L1 only.  7.1.5  Bidding **shall be done through e-tendering** and work order may be released within 2 weeks of the  opening
    of the Tender.  7.1.6  Depending on the risk profile, historical loss cost and cost benefit analysis for the proposed
    crop(s) in district(s) of any cluster, if the State Government feels that the premium rate likely to be offered by bidding
    Insurance Companies would be abnormally high, then the State Govt. can fix a ceiling on  premium rates for such crop(s)
    proposed to be included in the bidding evaluation for the bidding period. However, recourse to this ceiling provision
    may be done only in well justified cases and not as  a general practice. The ceiling premium rate may be derived based
    on statistical evaluation/actuarial premium analysis, loss cost, historical payout etc and name of such crop should be
    disclosed by State  Govt. compulsorily in the tender document.  7.1.7  In such cases where a ceiling has been indicated,
    State government must call financial bids in two step  bidding or in two separate envelopes. First bid/envelop is for
    disclosing the premium rate offered by each participating Insurance Company for such ceiling crops and must be categorised
    under \''Ceiling  Premium Rate\'' and  2nd  bid envelop is for bidding of crop wise premium rate for all crops included
    in tender. Time interval for opening of both bid/envelop should be compulsorily mentioned in the bidding documents and
    should preferably be on the same day. All participating Insurance Companies have to submit the bid offer as per the procedure
    mentioned above.  7.1.8  State Govt.'''
