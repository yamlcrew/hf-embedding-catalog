widgetData:
- source_sentence: ممكن تخبرني ارتفاع برج الخليفة
  sentences:
  - الزيادات في سكان الجبل الأسود. أنهى الجبل الأسود عام 2014 عدد سكانه 621800 نسمة ، وهو ما يمثل زيادة قدرها 279 شخصًا مقارنة
    بعام 2013.
  - يبلغ ارتفاعه الإجمالي 829.8 مترًا (2،722 قدمًا) وارتفاع السقف (باستثناء الهوائي) 828 مترًا (2،717 قدمًا) ، وكان برج خليفة
    أطول مبنى في العالم منذ ظهوره في أواخر عام 2008. برج خليفة
  - في 4 يناير 2010 ، تحولت أنظار العالم إلى برج خليفة حيث افتتح صاحب السمو الشيخ محمد بن راشد آل مكتوم ، نائب رئيس الدولة
    رئيس مجلس الوزراء حاكم دبي ، أطول برج في العالم. تلا ذلك عرض ضوئي وصوتي مذهل وتم بثه في جميع أنحاء العالم. يشارك.
- source_sentence: فوائد الشاي الأخضر المثلج
  sentences:
  - فوائد الشاي الأخضر المثلج. تم استخدام الشاي الأخضر المثلج لسنوات لعلاج الأمراض المختلفة وكان يستخدم بشكل شائع من قبل الشعب
    الصيني القديم. في الصين القديمة ، كان الشاي الأخضر المثلج يستخدم لعلاج الاكتئاب والصداع. على عكس الشاي المعتاد ، فهو يحتوي
    على نسبة منخفضة من الكافيين مما يؤدي غالبًا إلى الغثيان وكثرة التبول والأرق.
  - نعم ، يمكنك أن تصبح أطول بوصتين في الفضاء ؛ لكنه سيعود إلى الارتفاع الطبيعي عند العودة إلى الأرض ، حيث تضغط الجاذبية على
    الغضروف اللين في عمودك الفقري. الذهاب تسجيل الدخول التسجيل
  - 'إذا كنت ترغب في قراءة المزيد عن الفوائد الصحية العديدة الرائعة للشاي الأخضر ، فقم بإلقاء نظرة على هذا المقال: أفضل 10
    فوائد صحية مستندة إلى الأدلة للشاي الأخضر. مقال عن التغذية قائم على الأدلة من خبرائنا في هيئة التغذية.'
- source_sentence: تحديد التمايز
  sentences:
  - (انظر أيضا النيازك). معظم المعادن الشائعة المكونة للصخور عبارة عن مجموعات من أكثر المواد وفرة في الأرض ، مع الأخذ في الاعتبار
    تمايز الأرض إلى طبقات أخف وأكثر كثافة في وقت مبكر من تاريخها ، انظر أيضًا النيازك). معظم المعادن الشائعة المكونة للصخور
    عبارة عن مجموعات من أكثر المواد وفرة في الأرض ، مع مراعاة تمايز الأرض إلى طبقات أخف وأكثر كثافة في وقت مبكر من تاريخها.
  - التفاضل. ن. 1. فعل أو عملية أو نتيجة التفرقة. 2. (الرياضيات) الرياضيات عملية مستخدمة في حساب التفاضل والتكامل يتم فيها
    تحديد مشتق دالة أو متغير ؛ عكس التكامل. انظر التكامل 6.
  - 'يبقى الدجاج المطبوخ جيدًا لمدة 3 إلى 4 أيام في الثلاجة و 4 أشهر في الفريزر. كيف تتحقق مما إذا كان الدجاج النيء سيئًا؟
    أفضل طريقة هي شم وإلقاء نظرة على الدجاج: علامات الدجاج الفاسد هي الرائحة الحامضة واللون الباهت والملمس اللزج. تخلصي من
    أي دجاجة ذات مظهر أو رائحة كريهة.'
- source_sentence: هل يمكنك استخدام الخل لإزالة الشمع من أذنك
  sentences:
  - فوائد الخل الأبيض في الأذنين. قد يعمل الخل على فك شمع الأذن المتصلب. إذا شعرت بعدم الراحة أو الحكة أو الألم في أذنك ،
    فقد لا تكون حالة خطيرة. في بعض الحالات ، قد يكون سبب عدم الراحة في الأذن هو انسداد الأذن بالشمع ، أو دخول صابون أو شامبو
    في الأذن ، أو تراكم الماء من السباحة أو الاستحمام.
  - الديمقراطية هي ضد 300 ، وواحدة من أفضل الروايات المصورة لهذا العام. في اليونان القديمة ، يحاول جيش أثيني صغير النوم في
    الليلة السابقة لمعركة ضد الأمير زركسيس وجحافله الفارسية الضخمة. إنهم غير قادرين على النوم ، لذلك يبدأ أحد الجنود في سرد
    ​​قصة - قصة شجاعة ومعركة وثمن الحرية.
  - 'إذا كنت غير قادر على إزالة الشمع أو إذا أصبحت أذنك أكثر تهيجًا ، فاطلب العلاج الطبي. قد تسبب حالات أخرى أعراض تراكم شمع
    الأذن. من المهم أن يتمكن طبيبك من استبعاد هؤلاء. يمكنهم استخدام منظار الأذن ، وهو أداة مضاءة بمكبر ، لرؤية بوضوح في أذنك
    الداخلية. لإزالة تراكم الشمع ، قد يستخدم طبيبك:'
- source_sentence: متوسط ​​درجة الحرارة في أورلاندو فلوريدا
  sentences:
  - يستخدم سيلوستازول لعلاج أعراض العرج المتقطع. تتسبب هذه الحالة في انخفاض تدفق الدم إلى الساقين ، مما يؤدي إلى الشعور بالألم
    أثناء المشي. يحسن سيلوستازول قدرتك على المشي لمسافات أطول دون ألم. يمكن أيضًا استخدام سيلوستازول لأغراض غير مدرجة في دليل
    الدواء هذا.
  - طقس جنوب فلوريدا. تتمتع جنوب فلوريدا بمتوسط ​​درجة حرارة سنوي يبلغ 82 درجة فهرنهايت ، وتتراوح من متوسط ​​منخفض يبلغ 75
    درجة فهرنهايت في الشتاء إلى 89 درجة فهرنهايت في الصيف ، مما يجعلها مكانًا مثاليًا إجازة والاستمتاع بأفضل سلعنا! جنوب فلوريدا
    أيضًا رطب للغاية ، مما يجعل الهواء والحرارة أكثر سخونة. على سبيل المثال ، درجة حرارة 80 درجة فهرنهايت مع رطوبة 85٪ ، تبدو
    في الواقع وكأنها 99 درجة فهرنهايت. في بعض الأيام تشعر وكأنك تستطيع قطع الهواء بسكين! هذا هو سبب أهمية تكييف الهواء بالنسبة
    لنا.
  - تقع أورلاندو في وسط فلوريدا ، ويبلغ متوسط ​​درجة الحرارة الإجمالية فيها 83 درجة مئوية ومتوسط ​​منخفض يبلغ 62 درجة مئوية.
    في المتوسط ​​الأكثر دفئًا في جاكسونفيل هو يوليو ويناير هو متوسط ​​أبرد الشهور.
