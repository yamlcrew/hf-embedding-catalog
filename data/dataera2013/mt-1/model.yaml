widgetData:
- source_sentence: How do longer inputs enhance the problem-solving capabilities of an LLM?
  sentences:
  - 'Longer inputs dramatically increase the scope of problems that can be solved with an LLM: you can now throw in an entire
    book and ask questions about its contents, but more importantly you can feed in a lot of example code to help the model
    correctly solve a coding problem. LLM use-cases that involve long inputs are far more interesting to me than short prompts
    that rely purely on the information already baked into the model weights. Many of my tools were built using this pattern.'
  - 'If you think about what they do, this isn’t such a big surprise. The grammar rules of programming languages like Python
    and JavaScript are massively less complicated than the grammar of Chinese, Spanish or English.

    It’s still astonishing to me how effective they are though.

    One of the great weaknesses of LLMs is their tendency to hallucinate—to imagine things that don’t correspond to reality.
    You would expect this to be a particularly bad problem for code—if an LLM hallucinates a method that doesn’t exist, the
    code should be useless.'
  - "blogging\n            68\n\n\n            ai\n            1098\n\n\n            generative-ai\n            942\n\n\n\
    \            llms\n            930\n\nNext: Tom Scott, and the formidable power of escalating streaks\nPrevious: Last\
    \ weeknotes of 2023\n\n\n \n \n\n\nColophon\n©\n2002\n2003\n2004\n2005\n2006\n2007\n2008\n2009\n2010\n2011\n2012\n2013\n\
    2014\n2015\n2016\n2017\n2018\n2019\n2020\n2021\n2022\n2023\n2024\n2025"
- source_sentence: How did other teams respond to the author's use of Claude Artifacts?
  sentences:
  - 'This prompt-driven custom interface feature is so powerful and easy to build (once you’ve figured out the gnarly details
    of browser sandboxing) that I expect it to show up as a feature in a wide range of products in 2025.

    Universal access to the best models lasted for just a few short months

    For a few short months this year all three of the best available models—GPT-4o, Claude 3.5 Sonnet and Gemini 1.5 Pro—were
    freely available to most of the world.'
  - 'I’ve found myself using this a lot. I noticed how much I was relying on it in October and wrote Everything I built with
    Claude Artifacts this week, describing 14 little tools I had put together in a seven day period.

    Since then, a whole bunch of other teams have built similar systems. GitHub announced their version of this—GitHub Spark—in
    October. Mistral Chat added it as a feature called Canvas in November.

    Steve Krouse from Val Town built a version of it against Cerebras, showcasing how a 2,000 token/second LLM can iterate
    on an application with changes visible in less than a second.'
  - Structured and Gradual Learning. In organic datasets, the relationship between tokens is often complex and indirect. Many
    reasoning steps may be required to connect the current token to the next, making it challenging for the model to learn
    effectively from next-token prediction. By contrast, each token generated by a language model is by definition predicted
    by the preceding tokens, making it easier for a model to follow the resulting reasoning patterns.
- source_sentence: How does the new llamafile improve the process of running an LLM on a personal computer?
  sentences:
  - 'A year ago, the only organization that had released a generally useful LLM was OpenAI. We’ve now seen better-than-GPT-3
    class models produced by Anthropic, Mistral, Google, Meta, EleutherAI, Stability AI, TII in Abu Dhabi (Falcon), Microsoft
    Research, xAI, Replit, Baidu and a bunch of other organizations.

    The training cost (hardware and electricity) is still significant—initially millions of dollars, but that seems to have
    dropped to the tens of thousands already. Microsoft’s Phi-2 claims to have used “14 days on 96 A100 GPUs”, which works
    out at around $35,000 using current Lambda pricing.'
  - 'Embeddings: What they are and why they matter

    61.7k

    79.3k



    Catching up on the weird world of LLMs

    61.6k

    85.9k



    llamafile is the new best way to run an LLM on your own computer

