    40.5k

    49.2k



    How to implement Q&A against your documentation with GPT3, embeddings and Datasette

    37.3k

    44.9k



    Lawyer cites fake cases invented by ChatGPT, judge is not amused

    37.1k

    47.4k'
  - 'Qwen2.5-Coder-32B is an LLM that can code well that runs on my Mac talks about Qwen2.5-Coder-32B in November—an Apache
    2.0 licensed model!


    I can now run a GPT-4 class model on my laptop talks about running Meta’s Llama 3.3 70B (released in December)'
- source_sentence: What technique is being used by an increasing number of labs to create training data for smaller models?
  sentences:
  - 'Another common technique is to use larger models to help create training data for their smaller, cheaper alternatives—a
    trick used by an increasing number of labs. DeepSeek v3 used “reasoning” data created by DeepSeek-R1. Meta’s Llama 3.3
    70B fine-tuning used over 25M synthetically generated examples.

    Careful design of the training data that goes into an LLM appears to be the entire game for creating these models. The
    days of just grabbing a full scrape of the web and indiscriminately dumping it into a training run are long gone.

    LLMs somehow got even harder to use'
  - 'An interesting point of comparison here could be the way railways rolled out around the world in the 1800s. Constructing
    these required enormous investments and had a massive environmental impact, and many of the lines that were built turned
    out to be unnecessary—sometimes multiple lines from different companies serving the exact same routes!

    The resulting bubbles contributed to several financial crashes, see Wikipedia for Panic of 1873, Panic of 1893, Panic
    of 1901 and the UK’s Railway Mania. They left us with a lot of useful infrastructure and a great deal of bankruptcies
    and environmental damage.

    The year of slop'
  - 'Here’s the sequel to this post: Things we learned about LLMs in 2024.

    Large Language Models

    In the past 24-36 months, our species has discovered that you can take a GIANT corpus of text, run it through a pile of
    GPUs, and use it to create a fascinating new kind of software.

    LLMs can do a lot of things. They can answer questions, summarize documents, translate from one language to another, extract
    information and even write surprisingly competent code.

    They can also help you cheat at your homework, generate unlimited streams of fake content and be used for all manner of
    nefarious purposes.'
- source_sentence: What are some reasons why better informed people have chosen to avoid using LLMs?
  sentences:
  - 'There’s a flipside to this too: a lot of better informed people have sworn off LLMs entirely because they can’t see how
    anyone could benefit from a tool with so many flaws. The key skill in getting the most out of LLMs is learning to work
    with tech that is both inherently unreliable and incredibly powerful at the same time. This is a decidedly non-obvious
    skill to acquire!

    There is so much space for helpful education content here, but we need to do do a lot better than outsourcing it all to
    AI grifters with bombastic Twitter threads.

    Knowledge is incredibly unevenly distributed

    Most people have heard of ChatGPT by now. How many have heard of Claude?'
  - 'I find I have to work with an LLM for a few weeks in order to get a good intuition for it’s strengths and weaknesses.
    This greatly limits how many I can evaluate myself!

    The most frustrating thing for me is at the level of individual prompting.

    Sometimes I’ll tweak a prompt and capitalize some of the words in it, to emphasize that I really want it to OUTPUT VALID
    MARKDOWN or similar. Did capitalizing those words make a difference? I still don’t have a good methodology for figuring
    that out.

    We’re left with what’s effectively Vibes Based Development. It’s vibes all the way down.

    I’d love to see us move beyond vibes in 2024!

    LLMs are really smart, and also really, really dumb'
  - 'The year of slop

    2024 was the year that the word "slop" became a term of art. I wrote about this in May, expanding on this tweet by @deepfates:'
