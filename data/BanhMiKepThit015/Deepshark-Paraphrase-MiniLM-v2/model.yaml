widgetData:
- source_sentence: Làm thế nào để cải thiện độ chính xác của mô hình tự động học khi làm việc với dữ liệu có cấu trúc cây
    phức tạp, trong điều kiện tập dữ liệu huấn luyện ban đầu bị hạn chế và cần tối ưu quá trình gán nhãn?
  sentences:
  - Nominal set plays a central role in a group-theoretic extension of finite automata to those over an infinite set of data
    values. Moerman et al. proposed an active learning algorithm for nominal word automata with the equality symmetry. In
    this paper, we introduce deterministic bottom-up nominal tree automata (DBNTA), which operate on trees whose nodes are
    labelled with elements of an orbit finite nominal set. We then prove a Myhill-Nerode theorem for the class of languages
    recognized by DBNTA and propose an active learning algorithm for DBNTA. The algorithm can deal with any data symmetry
    that admits least support, not restricted to the equality symmetry and/or the total order symmetry. To prove the termination
    of the algorithm, we define a partial order on nominal sets and show that there is no infinite chain of orbit finite nominal
    sets with respect to this partial order between any two orbit finite sets.
  - We introduce the Song Describer dataset (SDD), a new crowdsourced corpus of high-quality audio-caption pairs, designed
    for the evaluation of music-and-language models. The dataset consists of 1.1k human-written natural language descriptions
    of 706 music recordings, all publicly accessible and released under Creative Common licenses. To showcase the use of our
    dataset, we benchmark popular models on three key music-and-language tasks (music captioning, text-to-music generation
    and music-language retrieval). Our experiments highlight the importance of cross-dataset evaluation and offer insights
    into how researchers can use SDD to gain a broader understanding of model performance.
  - We present a novel feasibility study on the automatic recognition of Expressed Emotion (EE), a family environment concept
    based on caregivers speaking freely about their relative/family member. We describe an automated approach for determining
    the \textit{degree of warmth}, a key component of EE, from acoustic and text features acquired from a sample of 37 recorded
    interviews. These recordings, collected over 20 years ago, are derived from a nationally representative birth cohort of
    2,232 British twin children and were manually coded for EE. We outline the core steps of extracting usable information
    from recordings with highly variable audio quality and assess the efficacy of four machine learning approaches trained
    with different combinations of acoustic and text features. Despite the challenges of working with this legacy data, we
    demonstrated that the degree of warmth can be predicted with an $F_{1}$-score of \textbf{61.5\%}. In this paper, we summarise
    our learning and provide recommendations for future work using real-world speech samples.
- source_sentence: Làm thế nào để quản lý khóa bảo mật một cách an toàn và tiện lợi khi cần truy cập từ nhiều thiết bị khác
    nhau?
  sentences:
  - 'Personal cryptographic keys are the foundation of many secure services, but storing these keys securely is a challenge,
    especially if they are used from multiple devices. Storing keys in a centralized location, like an Internet-accessible
    server, raises serious security concerns (e.g. server compromise). Hardware-based Trusted Execution Environments (TEEs)
    are a well-known solution for protecting sensitive data in untrusted environments, and are now becoming available on commodity
    server platforms.

    Although the idea of protecting keys using a server-side TEE is straight-forward, in this paper we validate this approach
    and show that it enables new desirable functionality. We describe the design, implementation, and evaluation of a TEE-based
    Cloud Key Store (CKS), an online service for securely generating, storing, and using personal cryptographic keys. Using
    remote attestation, users receive strong assurance about the behaviour of the CKS, and can authenticate themselves using
    passwords while avoiding typical risks of password-based authentication like password theft or phishing. In addition,
    this design allows users to i) define policy-based access controls for keys; ii) delegate keys to other CKS users for
    a specified time and/or a limited number of uses; and iii) audit all key usages via a secure audit log. We have implemented
    a proof of concept CKS using Intel SGX and integrated this into GnuPG on Linux and OpenKeychain on Android. Our CKS implementation
    performs approximately 6,000 signature operations per second on a single desktop PC. The latency is in the same order
    of magnitude as using locally-stored keys, and 20x faster than smart cards.'
  - The problem of constrained coverage path planning involves a robot trying to cover maximum area of an environment under
    some constraints that appear as obstacles in the map. Out of the several coverage path planning methods, we consider augmenting
    the linear sweep-based coverage method to achieve minimum energy/ time optimality along with maximum area coverage. In
    addition, we also study the effects of variation of different parameters on the performance of the modified method.
  - 'We present a new technique for efficiently removing almost all short cycles in a graph without unintentionally removing
    its triangles. Consequently, triangle finding problems do not become easy even in almost $k$-cycle free graphs, for any
    constant $k\geq 4$.

    Triangle finding is at the base of many conditional lower bounds in P, mainly for distance computation problems, and the
    existence of many $4$- or $5$-cycles in a worst-case instance had been the obstacle towards resolving major open questions.

    Hardness of approximation: Are there distance oracles with $m^{1+o(1)}$ preprocessing time and $m^{o(1)}$ query time that
    achieve a constant approximation? Existing algorithms with such desirable time bounds only achieve super-constant approximation
    factors, while only $3-\epsilon$ factors were conditionally ruled out (Pătraşcu, Roditty, and Thorup; FOCS 2012). We prove
    that no $O(1)$ approximations are possible, assuming the $3$-SUM or APSP conjectures. In particular, we prove that $k$-approximations
    require $\Omega(m^{1+1/ck})$ time, which is tight up to the constant $c$. The lower bound holds even for the offline version
    where we are given the queries in advance, and extends to other problems such as dynamic shortest paths.

    The $4$-Cycle problem: An infamous open question in fine-grained complexity is to establish any surprising consequences
    from a subquadratic or even linear-time algorithm for detecting a $4$-cycle in a graph. We prove that $\Omega(m^{1.1194})$
    time is needed for $k$-cycle detection for all $k\geq 4$, unless we can detect a triangle in $\sqrt{n}$-degree graphs
    in $O(n^{2-\delta})$ time; a breakthrough that is not known to follow even from optimal matrix multiplication algorithms.'
- source_sentence: Làm thế nào để đánh giá hiệu suất của các hệ thống lưu trữ dữ liệu lớn một cách khách quan và hiệu quả?
  sentences:
  - Data warehouse architectural choices and optimization techniques are critical to decision support query performance. To
    facilitate these choices, the performance of the designed data warehouse must be assessed, usually with benchmarks. These
    tools can either help system users comparing the performances of different systems, or help system engineers testing the
    effect of various design choices. While the Transaction Processing Performance Council's standard benchmarks address the
    first point, they are not tunable enough to address the second one and fail to model different data warehouse schemas.
    By contrast, our Data Warehouse Engineering Benchmark (DWEB) allows generating various ad-hoc synthetic data warehouses
    and workloads. DWEB is implemented as a Java free software that can be interfaced with most existing relational database
    management systems. The full specifications of DWEB, as well as experiments we performed to illustrate how our benchmark
    may be used, are provided in this paper.
  - 'Determinant maximization problem gives a general framework that models problems arising in as diverse fields as statistics
    \cite{pukelsheim2006optimal}, convex geometry \cite{Khachiyan1996}, fair allocations\linebreak \cite{anari2016nash}, combinatorics
    \cite{AnariGV18}, spectral graph theory \cite{nikolov2019proportional}, network design, and random processes \cite{kulesza2012determinantal}.
    In an instance of a determinant maximization problem, we are given a collection of vectors $U=\{v_1,\ldots, v_n\} \subset
    \RR^d$, and a goal is to pick a subset $S\subseteq U$ of given vectors to maximize the determinant of the matrix $\sum_{i\in
    S} v_i v_i^\top $. Often, the set $S$ of picked vectors must satisfy additional combinatorial constraints such as cardinality
    constraint $\left(|S|\leq k\right)$ or matroid constraint ($S$ is a basis of a matroid defined on the vectors).

    In this paper, we give a polynomial-time deterministic algorithm that returns a $r^{O(r)}$-approximation for any matroid
    of rank $r\leq d$. This improves previous results that give $e^{O(r^2)}$-approximation algorithms relying on $e^{O(r)}$-approximate
    \emph{estimation} algorithms \cite{NikolovS16,anari2017generalization,AnariGV18,madan2020maximizing} for any $r\leq d$.
    All previous results use convex relaxations and their relationship to stable polynomials and strongly log-concave polynomials.
    In contrast, our algorithm builds on combinatorial algorithms for matroid intersection, which iteratively improve any
    solution by finding an \emph{alternating negative cycle} in the \emph{exchange graph} defined by the matroids. While the
    $\det(.)$ function is not linear, we show that taking appropriate linear approximations at each iteration suffice to give
    the improved approximation algorithm.'
  - Generating value from data requires the ability to find, access and make sense of datasets. There are many efforts underway
    to encourage data sharing and reuse, from scientific publishers asking authors to submit data alongside manuscripts to
    data marketplaces, open data portals and data communities. Google recently beta released a search service for datasets,
    which allows users to discover data stored in various online repositories via keyword queries. These developments foreshadow
    an emerging research field around dataset search or retrieval that broadly encompasses frameworks, methods and tools that
    help match a user data need against a collection of datasets. Here, we survey the state of the art of research and commercial
    systems in dataset retrieval. We identify what makes dataset search a research field in its own right, with unique challenges
    and methods and highlight open problems. We look at approaches and implementations from related areas dataset search is
    drawing upon, including information retrieval, databases, entity-centric and tabular search in order to identify possible
    paths to resolve these open problems as well as immediate next steps that will take the field forward.
- source_sentence: Làm thế nào để cải thiện độ chính xác của hệ thống dịch tự động từ giọng nói sang văn bản mà không cần
    phụ thuộc vào dữ liệu văn bản gốc?
  sentences:
  - 'Intelligent voice assistants, such as Apple Siri and Amazon Alexa, are widely used nowadays. These task-oriented dialogue
    systems require a semantic parsing module in order to process user utterances and understand the action to be performed.
    This semantic parsing component was initially implemented by rule-based or statistical slot-filling approaches for processing
    simple queries; however, the appearance of more complex utterances demanded the application of shift-reduce parsers or
    sequence-to-sequence models. Although shift-reduce approaches were initially considered the most promising option, the
    emergence of sequence-to-sequence neural systems has propelled them to the forefront as the highest-performing method
    for this particular task. In this article, we advance the research on shift-reduce semantic parsing for task-oriented
    dialogue. We implement novel shift-reduce parsers that rely on Stack-Transformers. This framework allows to adequately
    model transition systems on the Transformer neural architecture, notably boosting shift-reduce parsing performance. Furthermore,
    our approach goes beyond the conventional top-down algorithm: we incorporate alternative bottom-up and in-order transition
    systems derived from constituency parsing into the realm of task-oriented parsing. We extensively test our approach on
    multiple domains from the Facebook TOP benchmark, improving over existing shift-reduce parsers and state-of-the-art sequence-to-sequence
    models in both high-resource and low-resource settings. We also empirically prove that the in-order algorithm substantially
    outperforms the commonly-used top-down strategy. Through the creation of innovative transition systems and harnessing
    the capabilities of a robust neural architecture, our study showcases the superiority of shift-reduce parsers over leading
    sequence-to-sequence methods on the main benchmark.'
  - We investigate end-to-end speech-to-text translation on a corpus of audiobooks specifically augmented for this task. Previous
    works investigated the extreme case where source language transcription is not available during learning nor decoding,
    but we also study a midway case where source language transcription is available at training time only. In this case,
    a single model is trained to decode source speech into target text in a single pass. Experimental results show that it
    is possible to train compact and efficient end-to-end speech translation models in this setup. We also distribute the
    corpus and hope that our speech translation baseline on this corpus will be challenged in the future.
  - Advanced Persistent Threats (APTs) are a main impendence in cyber security of computer networks. In 2015, a successful
    breach remains undetected 146 days on average, reported by [Fi16].With our work we demonstrate a feasible and fast way
    to analyse real world log data to detect breaches or breach attempts. By adapting well-known kill chain mechanisms and
    a combine of a time series database and an abstracted graph approach, it is possible to create flexible attack profiles.
    Using this approach, it can be demonstrated that the graph analysis successfully detects simulated attacks by analysing
    the log data of a simulated computer network. Considering another source for log data, the framework is capable to deliver
    sufficient performance for analysing real-world data in short time. By using the computing power of the graph database
    it is possible to identify the attacker and furthermore it is feasible to detect other affected system components. We
    believe to significantly reduce the detection time of breaches with this approach and react fast to new attack vectors.
- source_sentence: Làm thế nào để nhận biết và theo dõi các khái niệm mới xuất hiện trong dữ liệu văn bản trước khi chúng
    trở thành kiến thức phổ biến?
  sentences:
  - 'The outbreak of COVID-19 pandemic has exposed an urgent need for effective contact tracing solutions through mobile phone
    applications to prevent the infection from spreading further. However, due to the nature of contact tracing, public concern
    on privacy issues has been a bottleneck to the existing solutions, which is significantly affecting the uptake of contact
    tracing applications across the globe. In this paper, we present a blockchain-enabled privacy-preserving contact tracing
    scheme: BeepTrace, where we propose to adopt blockchain bridging the user/patient and the authorized solvers to desensitize
    the user ID and location information. Compared with recently proposed contract tracing solutions, our approach shows higher
    security and privacy with the additional advantages of being battery friendly and globally accessible. Results show viability
    in terms of the required resource at both server and mobile phone perspectives. Through breaking the privacy concerns
    of the public, the proposed BeepTrace solution can provide a timely framework for authorities, companies, software developers
    and researchers to fast develop and deploy effective digital contact tracing applications, to conquer COVID-19 pandemic
    soon. Meanwhile, the open initiative of BeepTrace allows worldwide collaborations, integrate existing tracing and positioning
    solutions with the help of blockchain technology.'
  - Digital holography is a 3D imaging technique by emitting a laser beam with a plane wavefront to an object and measuring
    the intensity of the diffracted waveform, called holograms. The object's 3D shape can be obtained by numerical analysis
    of the captured holograms and recovering the incurred phase. Recently, deep learning (DL) methods have been used for more
    accurate holographic processing. However, most supervised methods require large datasets to train the model, which is
    rarely available in most DH applications due to the scarcity of samples or privacy concerns. A few one-shot DL-based recovery
    methods exist with no reliance on large datasets of paired images. Still, most of these methods often neglect the underlying
    physics law that governs wave propagation. These methods offer a black-box operation, which is not explainable, generalizable,
    and transferrable to other samples and applications. In this work, we propose a new DL architecture based on generative
    adversarial networks that uses a discriminative network for realizing a semantic measure for reconstruction quality while
    using a generative network as a function approximator to model the inverse of hologram formation. We impose smoothness
    on the background part of the recovered image using a progressive masking module powered by simulated annealing to enhance
    the reconstruction quality. The proposed method is one of its kind that exhibits high transferability to similar samples,
    which facilitates its fast deployment in time-sensitive applications without the need for retraining the network. The
    results show a considerable improvement to competitor methods in reconstruction quality (about 5 dB PSNR gain) and robustness
    to noise (about 50% reduction in PSNR vs noise increase rate).
  - 'We study how collective memories are formed online. We do so by tracking entities that emerge in public discourse, that
    is, in online text streams such as social media and news streams, before they are incorporated into Wikipedia, which,
    we argue, can be viewed as an online place for collective memory. By tracking how entities emerge in public discourse,
    i.e., the temporal patterns between their first mention in online text streams and subsequent incorporation into collective
    memory, we gain insights into how the collective remembrance process happens online. Specifically, we analyze nearly 80,000
    entities as they emerge in online text streams before they are incorporated into Wikipedia. The online text streams we
    use for our analysis comprise of social media and news streams, and span over 579 million documents in a timespan of 18
    months. We discover two main emergence patterns: entities that emerge in a "bursty" fashion, i.e., that appear in public
    discourse without a precedent, blast into activity and transition into collective memory. Other entities display a "delayed"
    pattern, where they appear in public discourse, experience a period of inactivity, and then resurface before transitioning
    into our cultural collective memory.'
