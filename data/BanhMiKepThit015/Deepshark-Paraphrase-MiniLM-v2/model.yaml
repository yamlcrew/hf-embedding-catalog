      \emph{estimation} algorithms \cite{NikolovS16,anari2017generalization,AnariGV18,madan2020maximizing} for any $r\leq
      d$. All previous results use convex relaxations and their relationship to stable polynomials and strongly log-concave
      polynomials. In contrast, our algorithm builds on combinatorial algorithms for matroid intersection, which iteratively
      improve any solution by finding an \emph{alternating negative cycle} in the \emph{exchange graph} defined by the matroids.
      While the $\det(.)$ function is not linear, we show that taking appropriate linear approximations at each iteration
      suffice to give the improved approximation algorithm.'
    - Generating value from data requires the ability to find, access and make sense of datasets. There are many efforts underway
      to encourage data sharing and reuse, from scientific publishers asking authors to submit data alongside manuscripts
      to data marketplaces, open data portals and data communities. Google recently beta released a search service for datasets,
      which allows users to discover data stored in various online repositories via keyword queries. These developments foreshadow
      an emerging research field around dataset search or retrieval that broadly encompasses frameworks, methods and tools
      that help match a user data need against a collection of datasets. Here, we survey the state of the art of research
      and commercial systems in dataset retrieval. We identify what makes dataset search a research field in its own right,
      with unique challenges and methods and highlight open problems. We look at approaches and implementations from related
      areas dataset search is drawing upon, including information retrieval, databases, entity-centric and tabular search
      in order to identify possible paths to resolve these open problems as well as immediate next steps that will take the
      field forward.
  - source_sentence: Làm thế nào để cải thiện độ chính xác của hệ thống dịch tự động từ giọng nói sang văn bản mà không cần
      phụ thuộc vào dữ liệu văn bản gốc?
    sentences:
    - 'Intelligent voice assistants, such as Apple Siri and Amazon Alexa, are widely used nowadays. These task-oriented dialogue
      systems require a semantic parsing module in order to process user utterances and understand the action to be performed.
      This semantic parsing component was initially implemented by rule-based or statistical slot-filling approaches for processing
      simple queries; however, the appearance of more complex utterances demanded the application of shift-reduce parsers
      or sequence-to-sequence models. Although shift-reduce approaches were initially considered the most promising option,
      the emergence of sequence-to-sequence neural systems has propelled them to the forefront as the highest-performing method
      for this particular task. In this article, we advance the research on shift-reduce semantic parsing for task-oriented
      dialogue. We implement novel shift-reduce parsers that rely on Stack-Transformers. This framework allows to adequately
      model transition systems on the Transformer neural architecture, notably boosting shift-reduce parsing performance.
      Furthermore, our approach goes beyond the conventional top-down algorithm: we incorporate alternative bottom-up and
      in-order transition systems derived from constituency parsing into the realm of task-oriented parsing. We extensively
      test our approach on multiple domains from the Facebook TOP benchmark, improving over existing shift-reduce parsers
      and state-of-the-art sequence-to-sequence models in both high-resource and low-resource settings. We also empirically
      prove that the in-order algorithm substantially outperforms the commonly-used top-down strategy. Through the creation
      of innovative transition systems and harnessing the capabilities of a robust neural architecture, our study showcases
      the superiority of shift-reduce parsers over leading sequence-to-sequence methods on the main benchmark.'
    - We investigate end-to-end speech-to-text translation on a corpus of audiobooks specifically augmented for this task.
      Previous works investigated the extreme case where source language transcription is not available during learning nor
      decoding, but we also study a midway case where source language transcription is available at training time only. In
      this case, a single model is trained to decode source speech into target text in a single pass. Experimental results
      show that it is possible to train compact and efficient end-to-end speech translation models in this setup. We also
      distribute the corpus and hope that our speech translation baseline on this corpus will be challenged in the future.
    - Advanced Persistent Threats (APTs) are a main impendence in cyber security of computer networks. In 2015, a successful
      breach remains undetected 146 days on average, reported by [Fi16].With our work we demonstrate a feasible and fast way
      to analyse real world log data to detect breaches or breach attempts. By adapting well-known kill chain mechanisms and
      a combine of a time series database and an abstracted graph approach, it is possible to create flexible attack profiles.
      Using this approach, it can be demonstrated that the graph analysis successfully detects simulated attacks by analysing
      the log data of a simulated computer network. Considering another source for log data, the framework is capable to deliver
      sufficient performance for analysing real-world data in short time. By using the computing power of the graph database
      it is possible to identify the attacker and furthermore it is feasible to detect other affected system components. We
      believe to significantly reduce the detection time of breaches with this approach and react fast to new attack vectors.
  - source_sentence: Làm thế nào để nhận biết và theo dõi các khái niệm mới xuất hiện trong dữ liệu văn bản trước khi chúng
      trở thành kiến thức phổ biến?
    sentences:
    - 'The outbreak of COVID-19 pandemic has exposed an urgent need for effective contact tracing solutions through mobile
      phone applications to prevent the infection from spreading further. However, due to the nature of contact tracing, public
      concern on privacy issues has been a bottleneck to the existing solutions, which is significantly affecting the uptake
      of contact tracing applications across the globe. In this paper, we present a blockchain-enabled privacy-preserving
      contact tracing scheme: BeepTrace, where we propose to adopt blockchain bridging the user/patient and the authorized
      solvers to desensitize the user ID and location information. Compared with recently proposed contract tracing solutions,
      our approach shows higher security and privacy with the additional advantages of being battery friendly and globally
      accessible. Results show viability in terms of the required resource at both server and mobile phone perspectives. Through
      breaking the privacy concerns of the public, the proposed BeepTrace solution can provide a timely framework for authorities,
      companies, software developers and researchers to fast develop and deploy effective digital contact tracing applications,
      to conquer COVID-19 pandemic soon. Meanwhile, the open initiative of BeepTrace allows worldwide collaborations, integrate
      existing tracing and positioning solutions with the help of blockchain technology.'
    - Digital holography is a 3D imaging technique by emitting a laser beam with a plane wavefront to an object and measuring
      the intensity of the diffracted waveform, called holograms. The object's 3D shape can be obtained by numerical analysis
      of the captured holograms and recovering the incurred phase. Recently, deep learning (DL) methods have been used for
      more accurate holographic processing. However, most supervised methods require large datasets to train the model, which
      is rarely available in most DH applications due to the scarcity of samples or privacy concerns. A few one-shot DL-based
      recovery methods exist with no reliance on large datasets of paired images. Still, most of these methods often neglect
      the underlying physics law that governs wave propagation. These methods offer a black-box operation, which is not explainable,
      generalizable, and transferrable to other samples and applications. In this work, we propose a new DL architecture based
      on generative adversarial networks that uses a discriminative network for realizing a semantic measure for reconstruction
      quality while using a generative network as a function approximator to model the inverse of hologram formation. We impose
      smoothness on the background part of the recovered image using a progressive masking module powered by simulated annealing
      to enhance the reconstruction quality. The proposed method is one of its kind that exhibits high transferability to
      similar samples, which facilitates its fast deployment in time-sensitive applications without the need for retraining
      the network. The results show a considerable improvement to competitor methods in reconstruction quality (about 5 dB
      PSNR gain) and robustness to noise (about 50% reduction in PSNR vs noise increase rate).
    - 'We study how collective memories are formed online. We do so by tracking entities that emerge in public discourse,
      that is, in online text streams such as social media and news streams, before they are incorporated into Wikipedia,
      which, we argue, can be viewed as an online place for collective memory. By tracking how entities emerge in public discourse,
      i.e., the temporal patterns between their first mention in online text streams and subsequent incorporation into collective
      memory, we gain insights into how the collective remembrance process happens online. Specifically, we analyze nearly
      80,000 entities as they emerge in online text streams before they are incorporated into Wikipedia. The online text streams
      we use for our analysis comprise of social media and news streams, and span over 579 million documents in a timespan
      of 18 months. We discover two main emergence patterns: entities that emerge in a "bursty" fashion, i.e., that appear
      in public discourse without a precedent, blast into activity and transition into collective memory. Other entities display
      a "delayed" pattern, where they appear in public discourse, experience a period of inactivity, and then resurface before
      transitioning into our cultural collective memory.'
