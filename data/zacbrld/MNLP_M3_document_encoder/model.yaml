    (E*) excl.
  - 'So, the probability is: Probability = (Number of ways to Multiplying both sides of the equation by $\frac{X(X-1)}{2}$,
    we get: $\frac{X(X-1)}{2} = 3 \times 7$ $X(X-1) = 6 \times 7$ $X(X-1) = 42$ Expanding the equation, we have: $X^2 - X
    = 42$ Rearranging the equation, we get: $X^2 - X - 42 = 0$ This is a quadratic equation that can be factored as: $(X -
    7)(X + 6) = 0$ Setting each factor equal to zero, we have two possible solutions: $X - 7 = 0$ or $X + 6 = 0$ Solving for
    $X$, we find: $X = 7$ or $X = -6$ Since the number of apples cannot be negative, the value of $X$ is 7.'
