    A σ-algebra defines the set of events that can be measured, which in a probability context is equivalent to events that
    can be discriminated, or "questions that can be answered at time t {\displaystyle t} ". Therefore, a filtration is often
    used to represent the change in the set of events that can be measured, through gain or loss of information. A typical
