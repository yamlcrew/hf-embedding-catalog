  - 'Section: Structure and dynamics > Composition. Like microtubules, neurotubules are made up of protein polymers of α-tubulin
    and β-tubulin, globular proteins that are closely related. They join together to form a dimer, called tubulin. Neurotubules
    are generally assembled by 13 protofilaments which are polymerized from tubulin dimers. As a tubulin dimer consists of
    one α-tubulin and one β-tubulin, one end of the neurotubule is exposed with the α-tubulin and the other end with β-tubulin,
    these two ends contribute to the polarity of the neurotubule – the plus (+) end and the minus (-) end. The β-tubulin subunit
    is exposed on the plus (+) end. The two ends differ in their growth rate: plus (+) end is the fast-growing end while minus
    (-) end is the slow-growing end. Both ends have their own rate of polymerization and depolymerization of tubulin dimers,
    net polymerization causes the assembly of tubulin, hence the length of the neurotubules.'
- source_sentence: 'We want to find the value of $X$ in the given situation. We are told that James has $X$ apples, and 4
    of them are red and 3 of them are green. We want to find the probability that both apples he chooses are green. The total
    number of apples James has is $X$, and the total number of green apples is 3. To find the probability, we can use the
    formula: In this case, the number of favorable outcomes is choosing 2 green apples out of the 3 available green apples.
    The total number of possible outcomes is choosing any 2 apples out of the $X$ total apples. So, the probability is: Probability
    = (Number of ways to choose 2 green apples) / (Number of ways to choose 2 apples) Since we are given that the probability
    is $\frac{1}{7}$, we can write: $\frac{1}{7} = \frac{3 \choose 2}{X \choose 2}$ Simplifying, we have: $\frac{1}{7} = \frac{3}{\frac{X(X-1)}{2}}$'
  sentences:
  - 'Article: A common type system for clinical natural language processing. One challenge in reusing clinical data stored
    in electronic medical records is that these data are heterogenous. Clinical Natural Language Processing (NLP) plays an
    important role in transforming information in clinical text to a standard representation that is comparable and interoperable.
    Information may be processed and shared when a type system specifies the allowable data structures. Therefore, we aim
    to define a common type system for clinical NLP that enables interoperability between structured and unstructured data
    generated in different clinical settings. We describe a common type system for clinical NLP that has an end target of
    deep semantics based on Clinical Element Models (CEMs), thus interoperating with structured data and accommodating diverse
    NLP approaches. The type system has been implemented in UIMA (Unstructured Information Management Architecture) and is
    fully functional in a popular open-source clinical NLP system, cTAKES (clinical Text Analysis and Knowledge Extraction
    System) versions 2.0 and later. We have created a type system that targets deep semantics, thereby allowing for NLP systems
    to encapsulate knowledge from text and share it alongside heterogenous clinical data sources. Rather than surface semantics
    that are typically the end product of NLP algorithms, CEM-based semantics explicitly build in deep clinical semantics
    as the point of interoperability with more structured data types.'
