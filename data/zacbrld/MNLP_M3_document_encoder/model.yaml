      {R_{+}^{3}}{2M}}}(\eta +\sin \eta ).} A ( η ) = 1 + cos ⁡ η 2 {\displaystyle A(\eta )={\frac {1+\cos \eta }{2}}} . This
      expression is valid both in the matter region R < R b {\displaystyle R<R_{b}} , and the vacuum region R > R b {\displaystyle
      R>R_{b}} , and continuously transitions between the two.
  - source_sentence: 'Section: Properties and parameters > Plasma potential. Since plasmas are very good electrical conductors,
      electric potentials play an important role. The average potential in the space between charged particles, independent
      of how it can be measured, is called the "plasma potential", or the "space potential". If an electrode is inserted into
      a plasma, its potential will generally lie considerably below the plasma potential due to what is termed a Debye sheath.
      The good electrical conductivity of plasmas makes their electric fields very small. This results in the important concept
      of "quasineutrality", which says the density of negative charges is approximately equal to the density of positive charges
      over large volumes of the plasma ( n e = ⟨ Z ⟩ n i {\displaystyle n_{e}=\langle Z\rangle n_{i}} ), but on the scale
      of the Debye length, there can be charge imbalance. In the special case that double layers are formed, the charge separation
      can extend some tens of Debye lengths. The magnitude of the potentials and electric fields must be determined by means
      other than simply finding the net charge density. A common example is to assume that the electrons satisfy the Boltzmann
      relation: n e ∝ exp ⁡ ( e Φ / k B T e ) . {\displaystyle n_{e}\propto \exp(e\Phi /k_{\text{B}}T_{e}).} Differentiating
      this relation provides a means to calculate the electric field from the density: E → = k B T e e ∇ n e n e .'
    sentences:
    - When the integers a and b are coprime, the standard way of expressing this fact in mathematical notation is to indicate
      that their greatest common divisor is one, by the formula gcd(a, b) = 1 or (a, b) = 1. In their 1989 textbook Concrete
      Mathematics, Ronald Graham, Donald Knuth, and Oren Patashnik proposed an alternative notation a ⊥ b {\displaystyle a\perp
      b} to indicate that a and b are relatively prime and that the term "prime" be used instead of coprime (as in a is prime
      to b). A fast way to determine whether two numbers are coprime is given by the Euclidean algorithm and its faster variants
      such as binary GCD algorithm or Lehmer's GCD algorithm. The number of integers coprime with a positive integer n, between
      1 and n, is given by Euler's totient function, also known as Euler's phi function, φ(n). A set of integers can also
      be called coprime if its elements share no common positive factor except 1. A stronger condition on a set of integers
      is pairwise coprime, which means that a and b are coprime for every pair (a, b) of different integers in the set. The
      set {2, 3, 4} is coprime, but it is not pairwise coprime since 2 and 4 are not relatively prime.
    - 'Let''s assume the number of cans of corn Beth bought is C. Twice the number of cans of corn she bought would be 2C.
      So, 15 more than twice the number of cans of corn she bought would be 2C + 15. We know that Beth purchased 35 cans of
      peas, so we can set up the equation: 2C + 15 = 35. To isolate C, we can subtract 15 from both sides of the equation:
      2C = 35 - 15 = 20. Dividing both sides of the equation by 2, we get C = 20/2 = 10. Therefore, Beth bought 10 cans of
      corn.'
    - '{\displaystyle n_{e}\propto \exp(e\Phi /k_{\text{B}}T_{e}).} Differentiating this relation provides a means to calculate
      the electric field from the density: E → = k B T e e ∇ n e n e . {\displaystyle {\vec {E}}={\frac {k_{\text{B}}T_{e}}{e}}{\frac
      {\nabla n_{e}}{n_{e}}}.} It is possible to produce a plasma that is not quasineutral. An electron beam, for example,
      has only negative charges. The density of a non-neutral plasma must generally be very low, or it must be very small,
      otherwise, it will be dissipated by the repulsive electrostatic force.'
  - source_sentence: If X {\displaystyle X} is a linear space and g {\displaystyle g} are constants, the system is said to
      be subject to additive noise, otherwise it is said to be subject to multiplicative noise. This term is somewhat misleading
      as it has come to mean the general case even though it appears to imply the limited case in which g ( x ) ∝ x {\displaystyle
      g(x)\propto x} . For a fixed configuration of noise, SDE has a unique solution differentiable with respect to the initial
      condition.
    sentences:
    - Nontriviality of stochastic case shows up when one tries to average various objects of interest over noise configurations.
      In this sense, an SDE is not a uniquely defined entity when noise is multiplicative and when the SDE is understood as
      a continuous time limit of a stochastic difference equation. In this case, SDE must be complemented by what is known
      as "interpretations of SDE" such as Itô or a Stratonovich interpretations of SDEs.
    - 'Article: RNA-Seq technology and its application in fish transcriptomics.. High-throughput sequencing technologies,
      also known as next-generation sequencing (NGS) technologies, have revolutionized the way that genomic research is advancing.
      In addition to the static genome, these state-of-art technologies have been recently exploited to analyze the dynamic
      transcriptome, and the resulting technology is termed RNA sequencing (RNA-seq). RNA-seq is free from many limitations
      of other transcriptomic approaches, such as microarray and tag-based sequencing method. Although RNA-seq has only been
      available for a short time, studies using this method have completely changed our perspective of the breadth and depth
      of eukaryotic transcriptomes. In terms of the transcriptomics of teleost fishes, both model and non-model species have
      benefited from the RNA-seq approach and have undergone tremendous advances in the past several years. RNA-seq has helped
      not only in mapping and annotating fish transcriptome but also in our understanding of many biological processes in
      fish, such as development, adaptive evolution, host immune response, and stress response. In this review, we first provide
      an overview of each step of RNA-seq from library construction to the bioinformatic analysis of the data. We then summarize
      and discuss the recent biological insights obtained from the RNA-seq studies in a variety of fish species.'
