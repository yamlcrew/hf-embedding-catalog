  - 'Cerebellar Purkinje neurons have been proposed to have two distinct bursting modes: dendritically driven, by dendritic
    Ca2+ spikes, and somatically driven, wherein the persistent Na+ current is the burst initiator and the SK K+ current is
    the burst terminator. Purkinje neurons may utilise these bursting forms in information coding to the deep cerebellar nuclei.'
