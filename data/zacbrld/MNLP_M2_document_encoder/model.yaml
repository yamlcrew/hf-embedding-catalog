  - 'Clandestine chemistry is not limited to drugs; it is also associated with explosives, and other illegal chemicals. Of
    the explosives manufactured illegally, nitroglycerin and acetone peroxide are easiest to produce due to the ease with
    which the precursors can be acquired.

    Uncle Fester is a writer who commonly writes about different aspects of clandestine chemistry. Secrets of Methamphetamine
    Manufacture is among his most popular books, and is considered required reading for DEA agents. More of his books deal
    with other aspects of clandestine chemistry, including explosives, and poisons. Fester is, however, considered by many
    to be a faulty and unreliable source for information in regard to the clandestine manufacture of chemicals.'
  - A novel input representation has been developed consisting of a combination of sparse encoding, Blosum encoding, and input
    derived from hidden Markov models. this method predicts T-cell epitopes for the genome of hepatitis C virus and discuss
    possible applications of the prediction method to guide the process of rational vaccine design.
