widgetData:
- source_sentence: Military activity affects the physical geology. This was first noted through the intensive shelling on
    the Western Front during World War I, which caused the shattering of the bedrock and changed the rocks' permeability.
    New minerals, rocks, and land-forms are also a byproduct of nuclear testing.
  sentences:
  - 'Silicon can form sigma bonds to other silicon atoms (and disilane is the parent of this class of compounds). However,
    it is difficult to prepare and isolate SinH2n+2 (analogous to the saturated alkane hydrocarbons) with n greater than about
    8, as their thermal stability decreases with increases in the number of silicon atoms.  Silanes higher in molecular weight
    than disilane decompose to polymeric polysilicon hydride and hydrogen.  But with a suitable pair of organic substituents
    in place of hydrogen on each silicon it is possible to prepare polysilanes (sometimes, erroneously called polysilenes)
    that are analogues of alkanes. These long chain compounds have surprising electronic properties - high electrical conductivity,
    for example - arising from sigma delocalization of the electrons in the chain.

    Even silicon–silicon pi bonds are possible. However, these bonds are less stable than the carbon analogues. Disilane and
    longer silanes are quite reactive compared to alkanes. Disilene and disilynes are quite rare, unlike alkenes and alkynes.
    Examples of disilynes, long thought to be too unstable to be isolated were reported in 2004.'
  - 'The increasing sophistication of brain-reading technologies has led many to investigate their potential applications
    for lie detection. Legally required brain scans arguably violate “the guarantee against self-incrimination” because they
    differ from acceptable forms of bodily evidence, such as fingerprints or blood samples, in an important way: they are
    not simply physical, hard evidence, but evidence that is intimately linked to the defendant''s mind. Under US law, brain-scanning
    technologies might also raise implications for the Fourth Amendment, calling into question whether they constitute an
    unreasonable search and seizure.'
  - Military activity affects the physical geology. This was first noted through the intensive shelling on the Western Front
    during World War I, which caused the shattering of the bedrock and changed the rocks' permeability. New minerals, rocks,
    and land-forms are also a byproduct of nuclear testing.
- source_sentence: Right after a bombing in Moscow on September 6, 1999, several anti-nuclear activists were detained under
    suspicion. Vladimir Slivyak was one of the three arrested under suspicion. He was an activist in the anti-nuclear movement
    and a Voronezh action camp organizer. After the bombing Slivyak was pushed into a car by several men who claimed to be
    Moscow police. The police interrogated and threatened Slivyak for around ninety minutes before letting him go. The Moscow
    police thought environmentalists from the anti-nuclear movement were associated with the bombing since an earlier bombing
    occurred on August 31 at Manezh Palace in Moscow . After the incident, on August 31, several more bombings occurred which
    agitated many people, leading to the racially profiled arrest of dark-skinned Muscovites and visitors to the Russian capital.
  sentences:
  - The technique works backwards from the target to identify a precursor molecule and an enzyme that converts it into the
    target, and then a second precursor that can produce the first and so on until a simple, inexpensive molecule becomes
    the beginning of the series. For each precursor, the enzyme is evolved using induced mutations and natural selection to
    produce a more productive version. The evolutionary process can be repeated over multiple generations until acceptable
    productivity is achieved. The process does not require high temperature, high pressure, the use of exotic catalysts or
    other elements that can increase costs. The enzyme "optimizations" that increase the production of one precursor from
    another are cumulative in that the same precursor productivity improvements can potentially be leveraged across multiple
    target molecules.
  - Right after a bombing in Moscow on September 6, 1999, several anti-nuclear activists were detained under suspicion. Vladimir
    Slivyak was one of the three arrested under suspicion. He was an activist in the anti-nuclear movement and a Voronezh
    action camp organizer. After the bombing Slivyak was pushed into a car by several men who claimed to be Moscow police.
    The police interrogated and threatened Slivyak for around ninety minutes before letting him go. The Moscow police thought
    environmentalists from the anti-nuclear movement were associated with the bombing since an earlier bombing occurred on
    August 31 at Manezh Palace in Moscow . After the incident, on August 31, several more bombings occurred which agitated
    many people, leading to the racially profiled arrest of dark-skinned Muscovites and visitors to the Russian capital.
  - One of the main sources of information about the Earth's composition comes from understanding the relationship between
    peridotite and basalt melting. Peridotite makes up most of Earth's mantle. Basalt, which is highly concentrated in the
    Earth's oceanic crust, is formed when magma reaches the Earth's surface and cools down at a very fast rate. When magma
    cools, different minerals crystallize at different times depending on the cooling temperature of that respective mineral.
    This ultimately changes the chemical composition of the melt as different minerals begin to crystallize. Fractional crystallization
    of elements in basaltic liquids has also been studied to observe the composition of lava in the upper mantle. This concept
    can be applied by scientists to give insight on the evolution of Earth's mantle and how concentrations of lithophile trace
    elements have varied over the last 3.5 billion years.
- source_sentence: 'The group designs numerous structural concepts such as frameworks and floors like Dalle O''Portune and
    D-Dalle.

    The timber design office of excellence is an entity specializing in the design and optimization of wood construction projects.
    It stands out for its ability to meet the highest demands in terms of performance, durability and aesthetics, and is thus
    recognized for its contribution to the realization of ambitious projects in the field of timber construction.'
  sentences:
  - 'The group designs numerous structural concepts such as frameworks and floors like Dalle O''Portune and D-Dalle.

    The timber design office of excellence is an entity specializing in the design and optimization of wood construction projects.
    It stands out for its ability to meet the highest demands in terms of performance, durability and aesthetics, and is thus
    recognized for its contribution to the realization of ambitious projects in the field of timber construction.'
  - 'In waterways, the term bridge strike may be used when a water vessel collides with a bridge. This may include a collision
    to the bridge span or a collision to the bridge support structure such as a pier. Bridge protection systems are used to
    mitigate the effects of a ship strike.

    In 2014, the United States Coast Guard published statistics that it investigated 205 bridge strikes in the eleven years
    prior to the publication. All of those collisions involved involved a fixed, swing, lift or draw bridge. That number was
    1.2% of all vessel collision incidents investigated by the Coast Guard. The primary causal factor was the lack of accurate
    air draft data, the distance between water surface to the top most part of the vessel.'
  - 'Post, Stephen Garrard. Encyclopedia of bioethics. Third edition. Macmillan Reference USA, 2003. ISBN 0028657748. ISSN
    0950-4125; DOI:10.1108/09504120510573477.  (5-Volume Set; 3062 pages).

    Reich, Warren Thomas Encyclopedia of Bioethics. First edition.  New York: Free Press, 1978.  ISBN 0029261805.  ISBN 978-0029261804.  (4-Volume
    Set; 1933 pages)

    Reich, Warren Thomas Encyclopedia of Bioethics. Second edition.  New York: Free Press, 1982.  (5-Volume Set; 2950 pages)

    Reich, Warren Thomas Encyclopedia of Bioethics. Third edition.  New York: Simon & Schuster Macmillan, 1995; London: Simon
    and Schuster and Prentice Hall International, c1995. Rev. ed. (5-Volume Set; 2950 pages; 464 articles) ISBN 0028973550.
    ISBN 978-0028973555.'
- source_sentence: 'Regression is used to make predictions based on the retrieved data through statistical trends and statistical
    modeling. Different uses of this technique are used for fetching Photometric redshifts and measurements of physical parameters
    of stars. The approaches are listed below:


    Artificial neural network (ANN)

    Support vector regression (SVR)

    Decision tree

    Random forest

    k-nearest neighbors regression

    Kernel regression

    Principal component regression (PCR)

    Gaussian process

    Least squared regression (LSR)

    Partial least squares regression'
  sentences:
