  - "Title: \nText: Issuer Purchases of Equity Securities Repurchases of common stock are made to support the Company\x80\x99\
    s stock-based employee compensation plans and for other corporate purposes.\nOn February 13, 2006, the Board of Directors\
    \ authorized the purchase of $2.0 billion of the Company\x80\x99s common stock between February 13, 2006 and February\
    \ 28, 2007.\nIn August 2006, 3M\x80\x99s Board of Directors authorized the repurchase of an additional $1.0 billion in\
    \ share repurchases, raising the total authorization to $3.0 billion for the period from February 13, 2006 to February\
    \ 28, 2007.\nIn February 2007, 3M\x80\x99s Board of Directors authorized a twoyear share repurchase of up to $7.0 billion\
    \ for the period from February 12, 2007 to February 28, 2009."
