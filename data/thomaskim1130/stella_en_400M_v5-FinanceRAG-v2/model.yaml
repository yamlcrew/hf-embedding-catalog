      \ amount of ending net receivables of loans in foreclosure inventory, excluding loans that are guaranteed by U. S. \
      \ government agencies and loans subject to LTSCs.\nNorth America Consumer Mortgage Quarterly Credit Trends \x80\x94\
      Net Credit Losses and Delinquencies\x80\x94Home Equity Loans Citi\x80\x99s home equity loan portfolio consists of both\
      \ fixed-rate home equity loans and loans extended under home equity lines of credit.\nFixed-rate home equity loans are\
      \ fully amortizing.\nHome equity lines of credit allow for amounts to be drawn for a period of time with the payment\
      \ of interest only and then, at the end of the draw period, the then-outstanding amount is converted to an amortizing\
      \ loan (the interest-only payment feature during the revolving period is standard for this product across the industry).\n\
      After conversion, the home equity loans typically have a 20-year amortization period.\nAs of December 31, 2015, Citi\x80\
      \x99s home equity loan portfolio of $22.8 billion consisted of $6.3 billion of fixed-rate home equity loans and $16.5\
