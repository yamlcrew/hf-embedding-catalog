      \ daily averages are unavailable.\nDetailed average volume, Interest revenue and Interest expense exclude Discontinued\
      \ operations.\nSee Note 2 to the Consolidated Financial Statements.\nAverage rates reflect prevailing local interest\
      \ rates, including inflationary effects and monetary corrections in certain countries.\nAverage volumes of securities\
      \ borrowed or purchased under agreements to resell are reported net pursuant to ASC 210-20-45.\nHowever, Interest revenue\
      \ excludes the impact of ASC 210-20-45.\nThe fair value carrying amounts of derivative contracts are reported net, pursuant\
      \ to ASC 815-10-45, in Non-interest-earning assets and Other non-interest bearing liabilities.\nInterest expense on\
      \ Trading account liabilities of ICG is reported as a reduction of Interest revenue.\nInterest revenue and Interest\
      \ expense on cash collateral positions are reported in interest on Trading account assets and Trading account liabilities,\
      \ respectively.\nIncludes cash-basis loans.\nIncludes brokerage receivables.\nDuring 2015, continued management actions,\
