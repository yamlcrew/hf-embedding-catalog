    \ or quarterly averages have been used by certain subsidiaries where daily averages are unavailable.\nDetailed average\
    \ volume, Interest revenue and Interest expense exclude Discontinued operations.\nSee Note 2 to the Consolidated Financial\
    \ Statements.\nAverage rates reflect prevailing local interest rates, including inflationary effects and monetary corrections\
    \ in certain countries.\nAverage volumes of securities borrowed or purchased under agreements to resell are reported net\
    \ pursuant to ASC 210-20-45.\nHowever, Interest revenue excludes the impact of ASC 210-20-45.\nThe fair value carrying\
    \ amounts of derivative contracts are reported net, pursuant to ASC 815-10-45, in Non-interest-earning assets and Other\
