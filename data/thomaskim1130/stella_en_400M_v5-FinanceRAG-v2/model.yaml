  - "Title: \nText: TELEFLEX INCORPORATED NOTES?TO CONSOLIDATED FINANCIAL STATEMENTS — (Continued) The Company issued 82,865,\
    \ 93,367 and 105,239 of non-vested restricted stock units in 2017, 2016 and 2015, respectively, the majority of which\
    \ provide for vesting as to all underlying shares on the third anniversary of the grant date.\nThe weighted average grant-date\
    \ fair value for non-vested restricted stock units granted during 2017, 2016 and 2015 was $187.85, $142.71 and $118.00,\
    \ respectively.\nThe Company recorded $11.2 million of expense related to restricted stock units during 2017, which is\
    \ included in cost of goods sold or selling, general and administrative expenses.\nThe unamortized share-based compensation\
    \ cost related to non-vested restricted stock units, net of expected forfeitures, was $13.2 million, which is expected\
    \ to be recognized over a weighted-average period of 1.8 years.\nThe Company uses treasury stock to provide shares of\
    \ common stock in connection with vesting of the restricted stock units.\nTELEFLEX INCORPORATED NOTES?TO CONSOLIDATED\
    \ FINANCIAL STATEMENTS — (Continued) F-37 Note 13?— Income taxes The following table summarizes the components of the\
    \ provision for income taxes from continuing operations:\n|  | 2017 | 2016 | 2015 |\n|  | (Dollars in thousands) |\n|\
    \ Current: |  |  |  |\n| Federal | $133,621 | $2,344 | $-4,700 |\n| State | 5,213 | 5,230 | 2,377 |\n| Foreign | 35,444\
    \ | 28,842 | 53,151 |\n| Deferred: |  |  |  |\n| Federal | -258,247 | -25,141 | -35,750 |\n| State | 1,459 | -1,837 |\
    \ -5,012 |\n| Foreign | 212,158 | -1,364 | -2,228 |\n|  | $129,648 | $8,074 | $7,838 |\nThe Tax Cuts and Jobs Act (the\
    \ “TCJA”) was enacted on December 22, 2017.\nThe legislation significantly changes U. S.  tax law by, among other things,\
    \ permanently reducing corporate income tax rates from a maximum of 35% to 21%, effective January 1, 2018; implementing\
    \ a territorial tax system, by generally providing for, among other things, a dividends received deduction on the foreign\
    \ source portion of dividends received from a foreign corporation if specified conditions are met; and imposing a one-time\
    \ repatriation tax on undistributed post-1986 foreign subsidiary earnings and profits, which are deemed repatriated for\
    \ purposes of the tax.\nAs a result of the TCJA, the Company reassessed and revalued its ending net deferred tax liabilities\
    \ at December 31, 2017 and recognized a?$46.1 million?provisional tax benefit in the Company’s consolidated statement\
    \ of income for the year ended December 31, 2017.\nAs a result of the deemed repatriation tax under the TCJA, the Company\
    \ recognized a $154.0 million provisional tax expense in the Company’s consolidated statement of income for the year ended\
    \ December 31, 2017, and the Company expects to pay this tax over an eight-year period.\nWhile the TCJA provides for a\
    \ territorial tax system, beginning in 2018, it includes?two?new U. S.  tax base erosion provisions, the global intangible\
    \ low-taxed income (“GILTI”) provisions and the base-erosion and anti-abuse tax (“BEAT”) provisions.\nThe GILTI provisions\
    \ require the Company to include in its U. S.  income tax return foreign subsidiary earnings in excess of an allowable\
    \ return on the foreign subsidiary’s tangible assets.\nThe Company expects that it will be subject to incremental U. S.\
    \  tax on GILTI income beginning in 2018.\nBecause of the complexity of the new GILTI tax rules, the Company is continuing\
    \ to evaluate this provision of the TCJA and the application of Financial Accounting Standards Board Accounting Standards\
    \ Codification Topic 740, \"Income Taxes. \"\nUnder U. S.  GAAP, the Company may make an accounting policy election to\
    \ either (1) treat future taxes with respect to the inclusion in U. S.  taxable income of amounts related to GILTI as\
    \ current period expense when incurred (the “period cost method”) or (2) take such amounts into a company’s measurement\
    \ of its deferred taxes (the “deferred method”).\nThe Company’s selection of an accounting policy with respect to the\
    \ new GILTI tax rules will depend, in part, on an analysis of the Company’s global income to determine whether the Company\
    \ expects to have future U. S.  inclusions in taxable income related to GILTI and, if so, what the impact is expected\
    \ to be.\nThe determination of whether the Company expects to have future U. S.  inclusions"
