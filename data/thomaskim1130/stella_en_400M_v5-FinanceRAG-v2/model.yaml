    - "Title: \nText: MetLife, Inc.  Notes to Consolidated Financial Statements \x80\x94 (Continued) $4.3 billion, of which\
      \ $1.6 billion is deductible for income tax purposes.\nFurther information on goodwill is described in Note 6.\nSee\
      \ Note 5 for the VOBA acquired as part of the acquisition and Note 7 for the value of distribution agreements (\x80\x9C\
      VODA\x80\x9D) and the value of customer relationships acquired (\x80\x9CVOCRA\x80\x9D).\nAs part of the integration\
      \ of Travelers\x80\x99 operations, management approved and initiated plans to reduce approximately 1,000 domestic and\
      \ international Travelers positions, which was completed in December 2006.\nMetLife initially recorded restructuring\
      \ costs, including severance, relocation and outplacement services of Travelers\x80\x99 employees, as liabilities assumed\
      \ in the purchase business combination of $49 million.\nFor the years ended December 31, 2006 and 2005, the liability\
      \ for restructuring costs was reduced by $4 million and $1 million, respectively, due to a reduction in the estimate\
      \ of severance benefits to be paid to Travelers employees.\nThe restructuring costs associated with the Travelers acquisition\
      \ were as follows:\n|  | Years Ended December 31, |\n|  | 2006 | 2005 |\n|  | (In millions) |\n| Balance at January\
      \ 1, | $28 | $— |\n| Acquisition | — | 49 |\n| Cash payments | -24 | -20 |\n| Other reductions | -4 | -1 |\n| Balance\
      \ at December 31, | $— | $28 |\nOther Acquisitions and Dispositions On June 28, 2007, the Company acquired the remaining\
      \ 50% interest in a joint venture in Hong Kong, MetLife Fubon Limited (\x80\x9CMetLife Fubon\x80\x9D), for $56 million\
      \ in cash, resulting in MetLife Fubon becoming a consolidated subsidiary of the Company.\nThe transaction was treated\
      \ as a step acquisition, and at June 30, 2007, total assets and liabilities of MetLife Fubon of $839 million and $735\
      \ million, respectively, were included in the Company\x80\x99s consolidated balance sheet.\nThe Company\x80\x99s investment\
      \ for the initial 50% interest in MetLife Fubon was $48 million.\nThe Company used the equity method of accounting for\
      \ such investment in MetLife Fubon.\nThe Company\x80\x99s share of the joint venture\x80\x99s results for the six months\
      \ ended June 30, 2007, was a loss of $3 million.\nThe fair value of the assets acquired and the liabilities assumed\
      \ in the step acquisition at June 30, 2007, was $427 million and $371 million, respectively.\nNo additional goodwill\
      \ was recorded as a part of the step acquisition.\nAs a result of this acquisition, additional VOBA and VODA of $45\
      \ million and $5 million, respectively, were recorded and both have a weighted average amortization period of 16 years.\n\
      Further information on VOBA and VODA is described in Note 5 and Note 7, respectively.\nOn June 1, 2007, the Company\
      \ completed the sale of its Bermuda insurance subsidiary, MetLife International Insurance, Ltd.  (\x80\x9CMLII\x80\x9D\
      ), to a third party for $33 million in cash consideration, resulting in a gain upon disposal of $3 million, net of income\
      \ tax.\nThe net assets of MLII at disposal were $27 million.\nA liability of $1 million was recorded with respect to\
      \ a guarantee provided in connection with this disposition.\nFurther information on guarantees is described in Note\
      \ 16.\nOn September 1, 2005, the Company completed the acquisition of CitiStreet Associates, a division of CitiStreet\
      \ LLC, which is primarily involved in the distribution of annuity products and retirement plans to the education, healthcare,\
      \ and not-for-profit markets, for $56 million, of which $2 million was allocated to goodwill and $54 million to other\
      \ identifiable intangibles, specifically the value of customer relationships acquired, which have a weighted average\
      \ amortization period of 16 years.\nCitiStreet Associates was integrated with MetLife Resources, a focused distribution\
      \ channel of MetLife, which is dedicated to provide retirement plans and financial services to the same markets.\nFurther\
      \ information on goodwill and VOCRA is described in Note 6 and Note 7, respectively.\nSee Note 23 for information on\
      \ the disposition of the annuities and pension businesses of MetLife Insurance Limited (\x80\x9CMetLife Australia\x80\
      \x9D), P. T.  Sejahtera (\x80\x9CMetLife Indonesia\x80\x9D) and SSRM Holdings, Inc.  (\x80\x9CSSRM\x80\x9D).\nSee Note\
      \ 25 for information on the Company\x80\x99s acquisitions subsequent to December 31, 2007."
