    \ we maintain $2.5 million in stockholders’ equity for continued listing (or meet the alternatives of market value of\
    \ listed securities of $35 million or net income from continuing operations). NASDAQ had granted us a grace period through\
    \ February 10, 2017, to regain compliance with Listing Rule 5550(b)(1), but we were unable to regain compliance within\
