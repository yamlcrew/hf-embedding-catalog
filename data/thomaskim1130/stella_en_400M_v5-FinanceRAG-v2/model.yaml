      \ provide for vesting as to all underlying shares on the third anniversary of the grant date.\nThe weighted average\
      \ grant-date fair value for non-vested restricted stock units granted during 2017, 2016 and 2015 was $187.85, $142.71\
      \ and $118.00, respectively.\nThe Company recorded $11.2 million of expense related to restricted stock units during\
      \ 2017, which is included in cost of goods sold or selling, general and administrative expenses.\nThe unamortized share-based\
      \ compensation cost related to non-vested restricted stock units, net of expected forfeitures, was $13.2 million, which\
      \ is expected to be recognized over a weighted-average period of 1.8 years.\nThe Company uses treasury stock to provide\
      \ shares of common stock in connection with vesting of the restricted stock units.\nTELEFLEX INCORPORATED NOTES?TO CONSOLIDATED\
      \ FINANCIAL STATEMENTS — (Continued) F-37 Note 13?— Income taxes The following table summarizes the components of the\
      \ provision for income taxes from continuing operations:\n|  | 2017 | 2016 | 2015 |\n|  | (Dollars in thousands) |\n\
      | Current: |  |  |  |\n| Federal | $133,621 | $2,344 | $-4,700 |\n| State | 5,213 | 5,230 | 2,377 |\n| Foreign | 35,444\
