    sentences:
    - "Title: \nText: Cash Flow Hedges Citigroup hedges the variability of forecasted cash flows associated with floating-rate\
      \ assets/liabilities and other forecasted transactions.\nVariable cash flows from those liabilities are synthetically\
      \ converted to fixed-rate cash flows by entering into receive-variable, pay-fixed interest rate swaps and receivevariable,\
      \ pay-fixed forward-starting interest rate swaps.\nVariable cash flows associated with certain assets are synthetically\
      \ converted to fixed-rate cash flows by entering into receive-fixed, pay-variable interest rate swaps.\nThese cash flow\
      \ hedging relationships use either regression analysis or dollar-offset ratio analysis to assess whether the hedging\
      \ relationships are highly effective at inception and on an ongoing basis.\nPrior to the adoption of ASU 2017-12, Citigroup\
      \ designated the risk being hedged as the risk of overall variability in the hedged cash flows for certain items.\n\
      With the adoption of ASU 2017-12, Citigroup hedges the variability from changes in a contractually specified rate and\
      \ recognizes the entire change in fair value of the cash flow hedging instruments in AOCI.\nPrior to the adoption of\
      \ ASU 2017-12, to the extent that these derivatives were not fully effective, changes in their fair values in excess\
      \ of changes in the value of the hedged transactions were immediately included in Other revenue.\nWith the adoption\
      \ of ASU 2017-12, such amounts are no longer required to be immediately recognized in income, but instead the full change\
      \ in the value of the hedging instrument is required to be recognized in AOCI, and then recognized in earnings in the\
      \ same period that the cash flows impact earnings.\nThe pretax change in AOCI from cash flow hedges is presented below:\n\
      |  | Year ended December 31, |\n| In millions of dollars | 2018 | 2017 | 2016 |\n| Amount of gain (loss) recognized\
      \ in AOCI on derivative |  |  |  |\n| Interest rate contracts-1 | $-361 |  | $-165 | $-219 |\n| Foreign exchange contracts\
      \ | 5 | -8 | 69 |\n| Total gain (loss) recognized in AOCI | $-356 |  | $-173 | $-150 |\n| Amount of gain (loss) reclassified\
      \ from AOCI to earnings | Otherrevenue | Net interestrevenue | Otherrevenue | Otherrevenue |\n| Interest rate contracts-1\
      \ | $— | $-301 | $-126 | $-140 |\n| Foreign exchange contracts | -17 | — | -10 | -93 |\n| Total gain (loss) reclassified\
      \ from AOCI into earnings | $-17 | $-301 | $-136 | $-233 |\n(1) After January 1, 2018, all amounts reclassified into\
      \ earnings for interest rate contracts are included in Interest income/Interest expense (Net interest revenue).\nFor\
      \ all other hedges, including interest rate hedges prior to January 1, 2018, the amounts reclassified to earnings are\
      \ included primarily in Other revenue and Net interest revenue in the Consolidated Statement of Income.\nFor cash flow\
      \ hedges, the changes in the fair value of the hedging derivative remain in AOCI on the Consolidated Balance Sheet and\
      \ will be included in the earnings of future periods to offset the variability of the hedged cash flows when such cash\
      \ flows affect earnings.\nThe net gain (loss) associated with cash flow hedges expected to be reclassified from AOCI\
      \ within 12?months of December?31, 2018 is approximately $404 million.\nThe maximum length of time over which forecasted\
      \ cash flows are hedged is 10 years.\nThe after-tax impact of cash flow hedges on AOCI is shown in Note?19 to the Consolidated\
      \ Financial Statements."
