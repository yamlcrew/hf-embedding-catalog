      \ to the issuance of our earnings release for the fourth quarter of 2017.\n\nIn accordance with authoritative guidance\
      \ issued by the SEC, the income tax effect for certain aspects of the 2017 Tax Act represent provisional amounts for\
      \ which our accounting is incomplete, but with respect to which a reasonable estimate could be determined and recorded\
      \ during the fourth quarter of 2017.\n\nThe actual effects of the 2017 Tax Act and final amounts recorded may differ\
      \ materially from our current estimate of provisional amounts due to, among other things, further interpretive guidance\
      \ that may be issued by U. S.  tax authorities or regulatory bodies, including the SEC and the FASB.\n\nWe will continue\
      \ to analyze the 2017 Tax Act and any additional guidance that may be issued so we can finalize the full effects of\
      \ applying the new legislation on our financial statements in the measurement period, which ends in the fourth quarter\
