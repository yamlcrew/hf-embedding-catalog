  - "Title: \nText: | _id | d824b7f4a |\n| title |  |\n| text | OTHER CONTINGENCIES — INDEMNIFICATIONS Equatorial Guinea Tax\
    \ Claim: In 2004, we received a request for indemnification from the purchaser of CMS Oil and Gas.\nThe indemnification\
    \ claim relates to the sale of our oil, gas and methanol projects in Equatorial Guinea and the claim of the government\
    \ of Equatorial Guinea that we owe $142 million in taxes in connection with that sale.\n\nCMS Energy concluded that the\
    \ government’s tax claim is without merit and the purchaser of CMS Oil and Gas submitted a response to the government\
    \ rejecting the claim.\nThe government of Equatorial Guinea has indicated that it still intends to pursue its claim.\n\
    We cannot predict the financial impact or outcome of this matter.\nMoroccan Tax Claim: In May 2007, we sold our 50 percent\
    \ interest in Jorf Lasfar.\n\nAs part of the sale agreement, we agreed to indemnify the purchaser for 50 percent of any\
    \ tax assessments on Jorf Lasfar attributable to tax years prior to the sale.\nIn December 2007, the Moroccan tax authority\
    \ concluded its audit of Jorf Lasfar for tax years 2003 through 2005.\nThe audit asserted deficiencies in certain corporate\
    \ and withholding taxes.\n\nIn January 2009, we paid $18 million, which was charged against a tax indemnification liability\
    \ established when we recorded the sale of Jorf Lasfar, and accordingly it did not affect earnings.\n\nMarathon Indemnity\
    \ Claim regarding F. T.  Barr Claim: On December 3, 2001, F.  T.  Barr, an individual with an overriding royalty interest\
    \ in production from the Alba field, filed a lawsuit in Harris County District Court in Texas against CMS Energy, CMS\
    \ Oil and Gas and other defendants alleging that his overriding royalty payments related to Alba field production were\
    \ improperly calculated.\n\nCMS Oil and Gas believes that Barr was paid properly on gas sales and that he was not entitled\
    \ to the additional overriding royalty payment sought.\nAll parties signed a confidential settlement agreement on April\
    \ 26, 2004.\nThe settlement resolved claims between Barr and the defendants, and the involved CMS Energy entities reserved\
    \ all defenses to any indemnity claim relating to the settlement.\n\nThere is disagreement between Marathon and certain\
    \ current or former CMS Energy entities as to the existence and scope of any indemnity obligations to Marathon in connection\
    \ with the settlement.\nBetween April 2005 and April 2008, there were no further communications between Marathon and CMS\
    \ Energy entities regarding this matter.\nIn April 2008, Marathon indicated its intent to pursue the indemnity claim.\n\
    \nPresent and former CMS Energy entities and Marathon entered into an agreement tolling the statute of limitations on\
    \ any claim by Marathon under the indemnity.\nCMS Energy entities dispute Marathon’s claim, and will vigorously oppose\
    \ it if raised in any legal proceeding.\nCMS Energy entities also will assert that Marathon has suffered minimal, if any,\
    \ damages.\nCMS Energy cannot predict the outcome of this matter.\n\nIf Marathon’s claim were sustained, it would have\
    \ a material effect on CMS Energy’s future earnings and cash flow.\n\nOTHER CONTINGENCIES — INDEMNIFICATIONS Equatorial\
    \ Guinea Tax Claim: 2004, we received request for indemnification from purchaser of CMS Oil and Gas.\n indemnification\
    \ claim relates to sale of our oil, gas methanol projects in Equatorial Guinea claim of government of Equatorial Guinea\
    \ we owe $142 million in taxes connection with sale.\n CMS Energy concluded government’s tax claim without merit purchaser\
    \ CMS Oil and Gas submitted response to government rejecting claim.\n\ngovernment of Equatorial Guinea still intends to\
    \ pursue claim.\n cannot predict financial impact or outcome of matter.\n Moroccan Tax Claim: May 2007, we sold 50 percent\
    \ interest in Jorf Lasfar.\n sale agreement agreed to indemnify purchaser for 50 percent of tax assessments on Jorf Lasfar\
    \ attributable to tax years prior to sale.\n December 2007, Moroccan tax authority concluded audit of Jorf Lasfar for\
    \ tax years 2003 through 2005.\n audit asserted deficiencies in corporate and withholding taxes.\n\nJanuary 2009, paid\
    \ $18 million charged against tax indemnification liability established recorded sale Jorf Lasfar did not affect earnings.\n\
    \ Marathon Indemnity Claim regarding F. T. Barr Claim: December 3, 2001, F. T. Barr, individual with overriding royalty\
    \ interest in production from Alba field filed lawsuit in Harris County District Court in Texas against CMS Energy, CMS\
    \ Oil and Gas other defendants alleging overriding royalty payments related to Alba field production were improperly calculated.\n\
    \nCMS Oil and Gas believes Barr was paid properly on gas sales not entitled to additional overriding royalty payment sought.\n\
    \ parties signed confidential settlement agreement on April 26, 2004.\n settlement resolved claims between Barr defendants\
    \ involved CMS Energy entities reserved all defenses to any indemnity claim relating to settlement.\ndisagreement between\
    \ Marathon and current or former CMS Energy entities to existence scope of indemnity obligations to Marathon in connection\
    \ with settlement.\n\nBetween April 2005 and April 2008, no further communications between Marathon and CMS Energy entities\
    \ regarding this matter.\n In April 2008, Marathon indicated intent to pursue indemnity claim.\n Present former CMS Energy\
    \ entities and Marathon entered agreement tolling statute of limitations on any claim by Marathon under indemnity.\n CMS\
    \ Energy entities dispute Marathon’s claim vigorously oppose it if raised in legal proceeding.\n CMS Energy entities assert\
    \ Marathon suffered minimal, if, damages.\n\nCMS Energy cannot predict outcome matter.\n If Marathon’s claim sustained\
    \ material effect on CMS Energy’s future earnings and cash flow.\n\n\n"
