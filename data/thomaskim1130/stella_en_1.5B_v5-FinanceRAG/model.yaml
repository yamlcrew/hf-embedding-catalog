    \ we have assumed that the principal of our 2017 senior convertible debt will be paid on February 15, 2027, which is the\
    \ maturity date of such debt.\n\n(7) For purposes of this table, we have assumed that the principal of our 2015 Senior\
    \ Convertible Debt will be paid on February 15, 2025, which is the maturity date of such debt.\n(8) For purposes of this\
