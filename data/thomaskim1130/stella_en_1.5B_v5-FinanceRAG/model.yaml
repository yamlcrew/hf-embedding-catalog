    - "Title: \nText: | _id | d815ddb0a |\n| title |  |\n| text | Income Taxes 2017 Tax Act: The President signed U. S.  tax\
      \ reform legislation (\x80\x9C2017 Tax Act\x80\x9D) on December 22, 2017, which is considered the enactment date.\n\
      The 2017 Tax Act includes a broad range of provisions, many of which significantly differ from those contained in previous\
      \ U. S.  tax law.\nChanges in tax law are accounted for in the period of enactment.\nAs such, our 2017 consolidated\
      \ financial statements reflect the immediate tax effect of the 2017 Tax Act.\n\nThe 2017 Tax Act contains several key\
      \ provisions including, among other things: ?\na one-time tax on the mandatory deemed repatriation of post-1986 untaxed\
      \ foreign earnings and profits (E&P), referred to as the toll charge; ?\na reduction in the corporate income tax rate\
      \ from 35 percent to 21 percent for tax years beginning after December 31, 2017; ?\n\nthe introduction of a new U. S.\
