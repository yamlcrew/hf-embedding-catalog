  - "Title: \nText: | _id | d815ddb0a |\n| title |  |\n| text | Income Taxes 2017 Tax Act: The President signed U. S.  tax\
    \ reform legislation (\x80\x9C2017 Tax Act\x80\x9D) on December 22, 2017, which is considered the enactment date.\nThe\
    \ 2017 Tax Act includes a broad range of provisions, many of which significantly differ from those contained in previous\
    \ U. S.  tax law.\nChanges in tax law are accounted for in the period of enactment.\nAs such, our 2017 consolidated financial\
    \ statements reflect the immediate tax effect of the 2017 Tax Act.\n\nThe 2017 Tax Act contains several key provisions\
    \ including, among other things: ?\na one-time tax on the mandatory deemed repatriation of post-1986 untaxed foreign earnings\
    \ and profits (E&P), referred to as the toll charge; ?\na reduction in the corporate income tax rate from 35 percent to\
    \ 21 percent for tax years beginning after December 31, 2017; ?\n\nthe introduction of a new U. S.  tax on certain off-shore\
    \ earnings referred to as global intangible low-taxed income (GILTI) at an effective tax rate of 10.5 percent for tax\
    \ years beginning after December 31, 2017 (increasing to 13.125 percent for tax years beginning after December 31, 2025),\
    \ with a partial offset by foreign tax credits; and ?\n\nthe introduction of a territorial tax system beginning in 2018\
    \ by providing a 100 percent dividend received deduction on certain qualified dividends from foreign subsidiaries.\nDuring\
    \ the fourth quarter of 2017, we recorded an income tax benefit of $1,272.4 million, which was comprised of the following:\
