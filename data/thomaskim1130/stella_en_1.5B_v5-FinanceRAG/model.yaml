    \ payments which is recorded as a liability on the balance sheet as of March 31, 2019. This obligation is due under an\
    \ operating lease from our acquisition of Atmel for a building in San Jose, California.\n\n(2) Capital purchase obligations\
    \ represent commitments for construction or purchases of property, plant and equipment. These obligations were not recorded\
    \ as liabilities on our balance sheet as of March 31, 2019, as we have not yet received the related goods or taken title\
    \ to the property.\n(3) Other purchase obligations and commitments include payments due under various types of licenses\
    \ and outstanding purchase commitments with our wafer foundries.\n(4) The Term Loan Facility matures on May 29, 2025.\n\
