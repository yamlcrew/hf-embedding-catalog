      \ of 10.5 percent for tax years beginning after December 31, 2017 (increasing to 13.125 percent for tax years beginning\
      \ after December 31, 2025), with a partial offset by foreign tax credits; and ?\n\nthe introduction of a territorial\
      \ tax system beginning in 2018 by providing a 100 percent dividend received deduction on certain qualified dividends\
      \ from foreign subsidiaries.\nDuring the fourth quarter of 2017, we recorded an income tax benefit of $1,272.4 million,\
      \ which was comprised of the following: ?\nincome tax benefit of $715.0 million for the one-time deemed repatriation\
      \ of foreign earnings.\n\nThis is composed of a $1,181.0 million benefit from the removal of a deferred tax liability\
      \ we had recorded for the repatriation of foreign earnings prior to the 2017 Tax Act offset by $466.0 million for the\
      \ toll charge recognized under the 2017 Tax Act.\nIn accordance with the 2017 Tax Act, we expect to elect to pay the\
      \ toll charge in installments over eight years.\n\nAs of December 31, 2017, we have recorded current and non-current\
      \ income tax liabilities related to the toll charge of $82.0 million and $384.0 million, respectively.  ?\nan income\
      \ tax benefit of $557.4 million, primarily related to the remeasurement of our deferred tax assets and liabilities at\
      \ the enacted corporate income tax rate of 21 percent.\n\nThe net benefit recorded was based on currently available\
      \ information and interpretations made in applying the provisions of the 2017 Tax Act as of the time of filing this\
