      \ and 2011, respectively.\nFuture minimum lease payments under noncancelable operating leases having remaining terms\
      \ in excess of one year as of September 28, 2013, are as follows (in millions):\n| 2014 | $610 |\n| 2015 | 613 |\n|\
      \ 2016 | 587 |\n| 2017 | 551 |\n| 2018 | 505 |\n| Thereafter | 1,855 |\n| Total minimum lease payments | $4,721 |\n\n\
      | Total minimum lease payments | $4,721 |\nOther Commitments As of September 28, 2013, the Company had outstanding off-balance\
      \ sheet third-party manufacturing commitments and component purchase commitments of $18.6 billion.\n\nIn addition to\
      \ the off-balance sheet commitments mentioned above, the Company had outstanding obligations of $1.3 billion as of September\
      \ 28, 2013, which consisted mainly of commitments to acquire capital assets, including product tooling and manufacturing\
      \ process equipment, and commitments related to advertising, research and development, Internet and telecommunications\
      \ services and other obligations.\n\nContingencies The Company is subject to various legal proceedings and claims that\
      \ have arisen in the ordinary course of business and that have not been fully adjudicated.\nIn the opinion of management,\
      \ there was not at least a reasonable possibility the Company may have incurred a material loss, or a material loss\
      \ in excess of a recorded accrual, with respect to loss contingencies.\nHowever, the outcome of litigation is inherently\
      \ uncertain.\n\nTherefore, although management considers the likelihood of such an outcome to be remote, if one or more\
      \ of these legal matters were resolved against the Company in a reporting period for amounts in excess of management’s\
      \ expectations, the Company’s consolidated financial statements for that reporting period could be materially adversely\
      \ affected.\nApple Inc.  v.  Samsung Electronics Co. , Ltd, et al.\n\nOn August 24, 2012, a jury returned a verdict\
      \ awarding the Company $1.05 billion in its lawsuit against Samsung Electronics Co. , Ltd and affiliated parties in\
      \ the United States District Court, Northern District of California, San Jose Division.\nOn March 1, 2013, the District\
      \ Court upheld $599 million of the jury’s award and ordered a new trial as to the remainder.\n\nBecause the award is\
      \ subject to entry of final judgment, partial re-trial and appeal, the Company has not recognized the award in its results\
