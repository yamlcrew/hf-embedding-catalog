      In generale comunque, eccezion fatta per i casi succitati, l''embolia gassosa è un evento molto raro. embolia lipidica
      (chiamata anche liquida, adiposa o grassosa o sindrome lipido-embolica), quando l''embolo è costituito da un ammasso
      di grasso. I lipidi infatti essendo idrofobici e quindi insolubuli nel sangue idrofilo si dispongono a formare una micella
      che può provocare l''ostruzione del vaso. Tale embolia si verifica specialmente come effetto collaterale anche tardivo
      nel caso di eventi traumatici alle ossa del bacino e agli arti inferiori. embolia da liquido amniotico, nelle donne
      durante la gravidanza può accadere che del liquido amniotico venga spinto nel circolo sanguigno materno. embolia da
      colesterolo, causata da placche aterosclerotiche all''interno di un vaso sanguigno.'
