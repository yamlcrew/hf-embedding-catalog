    - Cosa suggerisce Aldo al protagonista riguardo ai dipinti del Catena e cosa succede successivamente?
    - Cosa è l'embolia gassosa?
  - source_sentence: "FireHouse (album)\nFireHouse è il primo album in studio del gruppo musicale statunitense FireHouse,\
      \ pubblicato il 7 settembre 1990 dalla Epic Records.\n\nIl disco \nL'album è stato certificato doppio disco di platino\
      \ negli Stati Uniti, e disco d'oro in Canada, Giappone e Singapore.\n\nVennero estratti i quattro singoli Shake & Tumble,\
      \ Don't Treat Me Bad, All She Wrote e la ballata Love of a Lifetime, diventato il brano più famoso del gruppo.\n\nLa\
      \ traccia Don't Walk Away appare in una scena del film The Wrestler diretto da Darren Aronofsky nel 2008.\n\nIl brano\
      \ Overnight Sensation è parte della colonna sonora del videogioco Brütal Legend.\n\nTracce\n\nFormazione\n C.J. Snare\
      \ – voce, tastiere\n Bill Leverty – chitarre\n Perry Richardson – basso\n Michael Foster – batteria, percussioni\n\n\
      Classifiche\n\nNote\n\nCollegamenti esterni"
    sentences:
    - Quando è stato pubblicato l'album FireHouse e quale disco ha ottenuto nella certificazione degli Stati Uniti?
    - Chi ha scritto la sceneggiatura del film 'Oggi a me... domani a te'?
    - Chi è Marco Andreolli?
  - source_sentence: 'Precipitine sieriche contro i microbi nel fieno ammuffito rispetto all''età, al sesso, all''atopia e
      al fumo degli agricoltori.Questo studio si è basato su un campione di 3.065 agricoltori su una popolazione più ampia
      di 12.056 agricoltori finlandesi. I dati sono stati raccolti in un''indagine postale condotta dall''Istituto di previdenza
      sociale della Finlandia. Campioni di siero per la determinazione degli anticorpi precipitanti sono stati prelevati presso
      i centri sanitari locali. Le precipitazioni sono state determinate con il metodo della micropiastra diffusione immunitaria.
      Il pannello dell''antigene era costituito da antigeni miceliali di Micropolyspora faeni, Thermoactinomyces vulgaris,
      Aspergillus fumigatus e Aspergillus umbrosus. Precipitine a uno qualsiasi dei quattro microbi sono state rilevate nell''8,6%
      dei sieri. Le cause più comuni di test di precipitina positivi erano Aspergillus umbrosus e Thermoactinomyces vulgaris,
      che concorda con i risultati precedenti riportati dalla Finlandia In generale, le precipitine erano più prevalenti tra
      le donne, il che corrisponde alle tradizioni culturali locali e negli agricoltori più anziani. La prevalenza delle precipitine
      non differiva tra i soggetti non atopici e atopici (definiti come coesistenza passata o presente di dermatite atopica
      inclusi eczema infantile e/o febbre da fieno o altre riniti allergiche). Al contrario, la prevalenza delle precipitine
      era circa 1,5-2 volte maggiore tra i non fumatori rispetto ai fumatori, il che conferma i risultati dei rapporti precedenti.
      Negli studi futuri sulla presenza di precipitine, i dati dovrebbero essere controllati rispetto all''età, al sesso e
      al fumo. '
    sentences:
    - Quali sono i quattro microbi che sono stati utilizzati per la determinazione delle precipitine nel siero degli agricoltori?
    - Le strutture tricline delle proteine bovine a basso pH e ovine ad alto pH sono simili nonostante la transizione conformazionale
      pH-dipendente delle proteine bovina e suina?
    - Quali due canzoni vengono eseguite dopo il monologo 'Eva e la bambola'?
