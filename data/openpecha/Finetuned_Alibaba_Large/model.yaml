widgetData:
- source_sentence: What is the name of the monastery founded by Karma Rolpai Dorje?
  sentences:
  - Amid the splendor of this natural beauty stood the monastery called Karma Shar Tsong Ridro, which is a famous place in
    the religious history of Tibet. It was founded by Karma Rolpai Dorje, the fourth reincarnation of Karmapa, who himself
    was the first incarnation recognized in Tibet; and it was at this monastery that our great reformer Tsongkhapa was initiated
    as a monk in the fourteenth century of the Christian era.
  - In the Year of the Water Bird (1933), Thupten Gyatso, the Thirteenth Dalai Lama, departed from this world. This event
    left the people of Tibet desolate, as he had done much for the peace and welfare of Tibet. Following his death, the people
    decided to build a golden mausoleum of special magnificence as a token of their homage and respect, which was erected
    inside the Potala Palace in Lhasa.
  - Mr. Nehru's personality had impressed me very much. Although the mantle of Mahatma Gandhi had fallen on him, I could not
    catch any glimpse of spiritual fervor in him; but I saw him as a brilliant practical statesman, with a masterly grasp
    of international politics, and he showed me that he had a profound love for his country and faith in his people. For their
    welfare and progress, he was firm in the pursuit of peace.
- source_sentence: How did the Dalai Lama describe the period of darkness for Tibetan refugees?
  sentences:
  - The Dalai Lama was appalled and filled with consternation upon learning the terms of the agreement. He described the agreement
    as a mixture of 'Communist clichés, vainglorious assertions which were completely false, and bold statements which were
    only partly true.' The terms were far worse and more oppressive than anything he had imagined, and he felt that Tibet
    was expected to 'hand ourselves and our country over to China and cease to exist as a nation.' Despite their strong opposition,
    they felt helpless and abandoned, with no choice but to acquiesce and submit to the Chinese dictates, hoping that the
    Chinese would keep their side of the forced, one-sided bargain.
  - Thus, for almost fifteen years, the Tibetan refugees entered a period of darkness. The prospect of returning to our homeland
    seemed further off then when we had first come into exile. But of course night is the time for regeneration and during
    these years the resettlement programme was brought to fruition. Gradually, more and more people were taken off the roads
    and put into the new settlements around India. Also, a few of the refugees left India to found small communities around
    the world.
  - The Dalai Lama felt a sense of loss and nostalgia regarding the Chinese road in Tibet. Although he acknowledged that the
    road made travel faster and more convenient, he preferred the traditional way of travel. He expressed this sentiment by
    stating, 'It was certainly ten times faster and more convenient, but like all Tibetans, I preferred it as it had always
    been before.'
- source_sentence: What reforms did the Dalai Lama establish after the forced resignations of his Prime Ministers?
  sentences:
  - The Chinese requisitioned houses, and bought or rented others; and beyond the Ngabo, in the pleasant land beside the river
    which had always been the favorite place for summer picnics, they took possession of an enormous area for a camp. They
    demanded a loan of 2000 tons of barley. This huge amount could not be met from the state granaries at that time because
    of heavy expenditure, and the government had to borrow from monasteries and private owners. Other kinds of food were also
    demanded, and the humble resources of the city began to be strained, and prices began to rise.
  - After the forced resignations of his Prime Ministers, the Dalai Lama established the Reform Committee. One of his main
    ambitions was to establish an independent judiciary. He also focused on education, instructing the Kashag to develop a
    good educational program. Additionally, he aimed to improve communications by considering the development of a system
    of roads and transportation. Furthermore, he abolished the principle of hereditary debt and wrote off all government loans
    that could not be repaid. These reforms were disseminated widely to ensure their implementation.
  - The Dalai Lama's brother, Taktser Rinpoche, managed to escape to Lhasa by pretending to go along with the Chinese authorities'
    demands. The Chinese had put him under duress, restricted his activities, and tried to indoctrinate him. They proposed
    that he would be set free to go to Lhasa if he agreed to persuade the Dalai Lama to accept Chinese rule, and if the Dalai
    Lama resisted, he was to kill him. Taktser Rinpoche pretended to agree to this plan in order to escape and warn the Dalai
    Lama and the Tibetan Government of the impending danger from the Chinese. He eventually decided to renounce his monastic
    vows, disrobe, and go abroad as an emissary for Tibet to seek foreign support against the Chinese invasion.
- source_sentence: How did Tibet maintain its independence from 1912 to 1950?
  sentences:
  - Throughout this period Tibetans never took any active steps to prove their independence to the outside world, because
    it never seemed to be necessary.
  - For example, there were now factories where there had been none before, but all that they produced went to China. And
    the factories themselves were sited with no regard for anything other than utility, with predictably detrimental results
    to the environment.
  - In Tantric practices, the chakras and nadis hold significant importance as they are central to the practitioner's ability
    to control and suppress the grosser levels of consciousness, thereby allowing access to subtler levels. This process is
    crucial for experiencing profound spiritual realizations, particularly those that occur at the point of death. By meditating
    on these energy centers and channels, practitioners can demonstrate remarkable physiological phenomena, such as raising
    body temperatures and reducing oxygen intake, which have been observed and measured in scientific studies.The chakras
    are described as energy centers, while the nadis are energy channels. The practice of focusing on these elements enables
    the practitioner to temporarily prevent the activity of grosser levels of consciousness, facilitating the experience of
    subtler levels. This is aligned with the Buddhist understanding that the most powerful spiritual realizations can occur
    when the grosser levels of consciousness are suppressed, such as at the moment of death.
- source_sentence: Who gave the Dalai Lama a lecture before he left Lhasa, and what was it about?
  sentences:
  - The settlement of Mangmang held significant importance in the Dalai Lama's journey as it was the last settlement in Tibet
    before crossing into India. It was here that the Dalai Lama received the crucial news that the Indian government was willing
    to grant asylum, providing a sense of safety and relief. Despite the harsh weather and his own illness, Mangmang served
    as a pivotal point where final decisions were made about who would accompany him into India and who would stay behind
    to continue the fight. The Dalai Lama's departure from Mangmang marked the end of his journey within Tibet and the beginning
    of his exile.
  - Before the Dalai Lama left Lhasa, he was given a long lecture by General Chang Chin-wu, the permanent representative of
    China. The lecture covered several topics, including recent events in Hungary and Poland, the solidarity of socialist
    powers, the Dalai Lama's visit to India, and specific instructions on how to handle questions about the Indo-Tibetan frontier
    and the situation in Tibet. General Chang Chin-wu also suggested that the Dalai Lama prepare his speeches in advance.
  - Everywhere I went, I was accompanied by a retinue of servants. I was surrounded by government ministers and advisors clad
    in sumptuous silk robes, men drawn from the most exalted and aristocratic families in the land.
