- source_sentence: 'The Eto Rangers ride in Space-Time Transmitting Machine Kirinda to repair the Novel Worlds of Mugen. The
    Eto Rangers themselves are anthropomorphic animals, each representing one of the 12 Chinese zodiac animals (and The Twelve
    Branches in Buddhism). In Japan they are known as the Eto animals. The Novel Worlds are stories created by the human imagination,
    such as old folk tales as well as newer books. These living worlds play out repeatedly, and are necessary for the good
    of humanity. Princess Aura rules Mugen, which is an island continent hanging over an ocean from the skybound Novel Pole.
    The Great God Goal gives her power, but she may never leave the small palace island area. Their nemesis is the forgotten
    Spirit of Cats, Nyanma (real name, Chocolat), who was excluded from the choice of 12 protectors by being disqualified
    from the race (in actual legend there are many versions of this story). She seeks her revenge by distorting Novel Worlds
    with Jarei Monsters.When a Jarei Monster goes to a Novel World they alter the story, turning it into a different version,
    sometimes a parody of itself. Bakumaru, the Spirit of Mice, must use the Genmakyou mirror to reveal (Jarei Shouran!) the
    evil spirit once enough clues lead to its identity. Often the Eto Rangers must play out some of the story to find out
    who or what it is, sometimes even taking on the role of one of the characters in the tale. After defeating the creature,
    Kirinda is called when Bakumaru holds up his hand with one of Aura''s 12 gems on it and calls out Daikourin Kirinda! Kirinda
    descends from a dimensional slit and purifies the evil spirit with a beam weapon, calling out Jouka! (Purification).(Source:
    Wikipedia)'
  sentences:
  - Eto Rangers, Novel Worlds, Mugen adventure
  - romantic karaoke night, love hotel, smell fetish
  - Olympic Paralympic animated promotional styles
