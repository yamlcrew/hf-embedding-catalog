widgetData:
- source_sentence: 본 발명의 다양한 실시예는 다공성 공기극을 포함하는 평관형 공전해 셀 스택 및 그의 제조 방법에 관한 것이다. 구체적으로, 본 발명의 다양한 실시예는 공기극의 다공성이 최적화되어 전기화학적
    성능이 향상된 평관형 공전해 셀 스택 및 그의 제조 방법에 관한 것이다.
  sentences:
  - 일 실시예에 따른 광학 기반 힘 추정 장치는 본체, 본체의 하부에 피검체가 접촉하도록 배치된 커버, 커버의 양 측면에 연결되고 커버를 지지하고 본체의 내부로 향하도록 돌출된 지지부, 및 지지부에 배치되고, 반사체에
    광을 조사하는 광원, 반사체에 의해 반사된 광을 검출하는 디텍터, 및 반사된 광을 기초로 상기 피검체의 접촉힘을 추정하는 회로부를 포함할 수 있다.
  - '실시예는 에어로졸 발생 장치에 관한 것으로서, 특히 가열부로의 전원 인가를 위한 듀티비를 이용하여 사용자에 의한 퍼프를 산정하는 에어로졸 발생 장치에 관한 것이다.

    실시예인 에어로졸 발생 장치는 에어로졸 형성 물품이 삽입되는 가열 공간을 가열하는 가열부와, 프로세서로부터의 제어 신호에 의해 가열부로의 전원 공급 및 전원 차단을 수행하는 전원 공급부와, 가열 공간이나 가열부의
    온도를 감지하여 온도 감지값을 프로세서에 인가하는 온도 센서와, 전원 공급부로 제어 신호를 인가하여 가열부의 가열 동작을 제어하며, 온도 센서로부터의 온도 감지값에 따라 제어 신호의 듀티비를 가변하는 프로세서를
    포함하고, 프로세서는 듀티비의 변화를 이용하여 사용자의 퍼프를 판단하여 산정하는 것이 바람직하다.'
  - 본 발명은 공기극의 다공성이 최적화되어 전기화학적 성능이 향상된 평관형 공전해 셀 스택 및 그의 제조 방법에 관한 것으로서, 보다 상세하게는 공기극의 다공성에 대해 전도도 및 TPB 사이의 적절한 정도를 찾아서
    최적화하고, 공기극 전류집전층을 제거하여 공기극에서 생성된 산소가 충분히 빠져나가도록 한 대신 다공성의 금속 박막층을 형성하여 전기전도도를 보충시킨 전기화학적 성능이 향상된 평관형 공전해 셀을 포함하는 스택, 및
    이의 제조방법에 관한 것이다.
- source_sentence: 관련 출원의 교차 참조
  sentences:
  - '본 문서에 개시된 다양한 실시예에 따른 전자 장치는, 디스플레이, 시각적 정보가 표시되는 상기 디스플레이의 액티브 영역(active area)에 배치되는 제1 터치 센서, 상기 전자 장치의 엣지(edge)에 인접한
    논 액티브 영역(non-active area)에 배치되는 제2 터치 센서 및 상기 디스플레이, 상기 제1 터치 센서 및 상기 제2 터치 센서와 전기적으로 연결되는 프로세서를 포함할 수 있고, 상기 프로세서는, 상기
    제2 터치 센서로부터 터치 신호를 수신할 수 있고, 상기 터치 신호에 기반하여, 상기 디스플레이를 제어할 수 있다. 이 밖에도 다양한 실시예가 가능할 수 있다. '
  - 배터리 모듈이 개시된다. 본 발명의 일 실시 예에 따른 배터리 모듈은 일측에 개구부가 형성되고 내부 공간을 제공하는 본체 프레임; 상기 내부 공간에 수용되는 복수의 배터리 셀; 상기 개구부에 결합되는 엔드 프레임;
    그리고, 상기 본체 프레임과 상기 엔드 프레임은 적어도 일부가 겹치도록 구성된 보강구조를 포함할 수 있다.
  - 특정 실시형태에서, 내부 공기 유동으로부터 질소 산화물과 같은 오염물을 제거하기 위한 시스템이 개시되며, 이는 제올라이트 및 염기성 금속 산화물을 포함하는 흡착제 물질을 포함할 수 있다.
- source_sentence: 본 발명은 배터리 팩 하우징 플라스틱 복합재에 관한 것이다.
  sentences:
  - 본 발명은 배터리 팩 하우징 플라스틱 복합재에 관한 것으로서, 본 발명의 일 실시예에 따른 배터리 팩 하우징 플라스틱 복합재는, 플라스틱 기재 및 유기물 보강섬유 및 무기물 보강섬유 중 적어도 하나를 포함하는,
    보강섬유를 포함하는 직물을 포함할 수 있다.
  - "본 발명은 발효천연물을 이용한 기능성 벽지에 관한 것으로서, 보다 상세하게는 벼 부산물, 대마 부산물 및 이들의 조합 중 어느 하나를 발효시킨 발효천연물을 포함하여 환경 친화적이고, 난연성, 방충 및 소취성을\
    \ 가지며 강도가 향상된 발효천연물을 이용한 기능성 벽지에 관한 것이다. \n본 발명에 따른 발효천연물을 이용한 기능성 벽지는 원사로 직조된 직물층;과 상기 직물층의 하면에서 상기 직물층을 지지하기 위해 형성되는\
    \ 원지층;과 상기 직물층의 상면에 형성되며, 발효천연물이 포함된 코팅조성물이 코팅된 표면층;을 포함한다."
  - '열적 이벤트가 발생한 경우에, 원하는 방향으로 벤팅 가스가 배출되게 유도하도록 구성된 배터리 셀, 배터리 모듈, 배터리 팩 및 자동차를 제공한다.

    본 발명의 일 측면에 따른 배터리 셀은, 전극 조립체과, 상기 전극 조립체에 연결되는 전극 리드와, 상기 전극 조립체를 내부에 수용하고, 상기 전극 리드를 지지하도록 구성된 셀 케이스 및 상기 셀 케이스에 구비되고,
    상기 셀 케이스의 내압이 증가함에 따라 상기 셀 케이스의 일정 영역으로 벤팅 가스가 배출되게 유도하도록 구성된 벤팅 유도부를 포함한다.'
- source_sentence: 본 발명은, 방사선 촬상 장치에 관한 것이다.
  sentences:
  - 본 발명은 자기공명영상용 RF 코일에 관한 것으로, 일정 반경 상에 나란하게 배치되는 복수 개의 슬롯 안테나(110)를 포함하며, 상기 슬롯 안테나(110)는, 일측이 개구되고 타측이 폐쇄된 사각의 횡단면을 갖되,
    일부 구간에 절개 형성된 슬롯(111a)이 형성된 외부 도체(111)와, 상기 외부 도체(111) 내에 길이 방향으로 배치되는 판상의 내부 도체(112)와, 상기 외부 도체(111)와 상기 내부 도체(112) 사이에
    개재되는 유전체(113)를 포함한다.
  - '이하에서 "MC-Mem-Op들"로 지칭되는 메모리-중심 메모리 동작들과, 이하에서 "CC-Mem-Op들"로 지칭되는 코어-중심 메모리 동작들 사이의 순서화는, 이하에서 "IC-펜스들"로 지칭되는 인터-중심 펜스들을
    사용하여 강제된다. IC-펜스들은, 메모리 제어기, 캐시 제어기 등이, IC-펜스 전에 도달하는 MC-Mem-Op들(또는 때때로 CC-Mem-Op들)을 IC-펜스 후로 재순서화하지 않음으로써 메모리 파이프라인 전체에
    걸쳐 그리고 메모리 제어기에서 MC-Mem-Op들 및 CC-Mem-Op들의 순서화를 강제하게 하는 순서화 프리미티브 또는 순서화 명령어에 의해 구현된다. IC-펜스의 프로세싱은 또한, 메모리 제어기가 IC-펜스
    명령어를 발행한 스레드에 순서화 확인응답을 발행하게 한다. IC-펜스들은 코어에서 추적되고, 순서화 확인응답이 수신될 때 완료로 지정된다. 실시예들은, IC펜스와 함께 사용될 때, 감소된 데이터 전송 및 완료 시간들과
    함께 캐싱된 MC-Mem-op들과 MC-Mem-Op들 사이에 적절한 순서화를 제공하는 완료 레벨-특정 캐시 플러시 동작을 포함한다. '
  - 방사선 촬상 장치(1)는, 입사한 방사선의 에너지 또는 입자의 수에 대응하는 전하를 생성하는 복수의 화소 G와, 복수의 화소 G 마다 접속되는 것과 동시에, 화소 G로부터 제공된 전하에 근거하여 디지털 값을 생성하는
    복수의 신호 처리부(45)와, 복수의 화소 G 및 복수의 신호 처리부(45)를 포함한 방사선 검출기(2)가, 이차원 형상으로 배치된 회로 기판(3)을 구비한다.  복수의 신호 처리부(45)는, 전하에 근거하는 아날로그
    값을 디지털 값으로 변환하는 신호 변환부(46)와, 디지털 값을 생성하기 위한 클록 신호를 신호 변환부(46)에 제공하는 클록 신호 생성부(48)를 각각 포함한다.
- source_sentence: 본 발명은 웨이트 운동 기기 및 방법에 관한 것이다.
  sentences:
  - '본 발명은 바나듐 전해액의 제조 방법에 관한다. 본 발명의 방법은 촉매 지지체가 불필요하다. 본 발명의 방법은 촉매의 소실이 없다. 본 발명의 방법은 생산 속도가 빠르다. '
  - 본 개시내용의 구현예는 수소화분해된 시클로파라핀을 생성하기 위해 탄화수소 공급물에서 시클로파라핀의 선택적 개환을 위한 방법을 포함한다. 특히, 본 방법은 수소화분해 조건 하에서 시클로파라핀을 포함하는 탄화수소 공급물을
    수소 및 비황화, 저산도, 금속 함유 제올라이트를 포함하는 촉매와 접촉시키는 단계를 포함하며, 상기 금속은 백금, 니켈, 로듐 및 이들의 혼합물로 이루어진 그룹으로부터 선택된다. 이 방법은 석유 스트림을 윤활유
    베이스 스톡으로 업그레이드하는 데 유용하다.
  - 웨이트 운동 기기가 개시된다. 개시된 웨이트 운동 기기는, 사용자의 웨이트 운동에 따라 움직임이 발생하는 운동 본체; 상기 운동 본체의 움직임을 검출하는 센서; 사용자 인터페이스 화면을 출력하는 디스플레이; 및
    상기 검출된 움직임에 대응하는 사용자의 운동 상태를 나타내는 제1 인디케이터와 상기 운동 본체를 이용한 운동 시에 권장되는 운동 가이드를 나타내는 제2 인디케이터를 상기 사용자 인터페이스 화면에 표시하도록 상기
    디스플레이를 제어하는 프로세서를 포함하고, 상기 프로세서는, 상기 사용자의 운동 상태에 기초하여, 상기 제2 인디케이터의 위치를 적응적으로 변경하도록 상기 디스플레이를 제어할 수 있다.
