  sentences:
  - "Product Description: This console table offers classic structure and everyday function with a streamlined, versatile\
    \ silhouette. Made from engineered wood, it features a rectangular top and two open lower shelves—ideal for baskets, books,\
    \ or decorative accents. The long, narrow frame fits neatly behind a sofa or along a hallway wall, while the four-leg\
    \ base keeps the look timeless and grounded. Finished in a neutral tone, it’s easy to coordinate with traditional or transitional\
    \ decor. Plus, the surface is both scratch- and stain-resistant for added durability.\n Features: - Add a touch of rustic\
    \ industrial charm to your home with this 70.9-inch Extra Long Console Table. Designed with both form and function in\
    \ mind, this versatile table serves beautifully as a sofa table, hallway console, foyer accent piece, or even a stylish\
    \ TV stand. - Whether placed behind your sectional sofa, in the entryway, or along a hallway wall, this versatile piece\
    \ serves as both a functional storage solution and a stylish focal point. - Extra-Long Console Table for Versatile Use\
    \ - Measuring 70.87” L x 11.61” W x 31.5” H, this narrow, elongated table is perfect behind a large sectional sofa, along\
    \ hallway walls, or in your entryway. Its extended surface gives you ample room to display decor, organize essentials,\
    \ or create a stylish drop zone. - 2-Tier Storage Design for Functionality - Features a spacious tabletop and a sturdy\
    \ lower shelf, perfect for storing books, baskets, décor items, or even shoes. The open shelving design keeps everything\
    \ visible and accessible, making organization simple and stylish. - Sturdy Construction for Long-Lasting Durability -\
    \ Crafted from premium E1-grade MDF and reinforced with a heavy-duty steel frame, this console table supports up to 330\
    \ lbs on the top surface. It's designed for everyday use and built to handle your storage and display needs effortlessly."
  - 'Product Description: Our console table is just the right mix of mid-century modern and industrial. Featuring a fiber-reinforced
    concrete table top that comes in a half-moon shape, it''s coated in a neutral white tone for a more casual vibe. The stainless
    steel base consists of three slender legs and curved stretchers, and the gold finish rounds out the overall look with
    a stunning flourish. At 51" wide, there''s a lot of room for vases, decor, or a handy accent lamp to illuminate your entryway
    or a corner of your living area. Features: - With a unique mix of materials and finishes, this sofa table blurs the lines
    between mid-century, industrial and modern; versatile piece can be used as a console table, sofa table or entryway table
    - Top is made of fiber-reinforced concrete, which is real concrete with reduced permeability and improved impact/abrasion
    resistance - Foam-core construction technology dramatically reduces the weight of the table top - One-piece base consists
    of tubular steel legs welded to curved solid steel stretchers in a brushed bronze finish. - Semi-porous wax finish over
    natural cement; unattended spills may leave stains. - Hand brushed, powder coated metal finish. - Top is 2 inches thick,
    metal stretchers are 1 inch thick with 5 inch floor clearance below; legs are fitted with adjustable levelers'
  - "Product Description: This console table adds a hint of rustic charm to your entryway or living room. Crafted from solid\
    \ pine wood, it showcases a rectangular tabletop and a four-leg base that provides a stable foundation. With three spacious\
    \ drawers with decorative metal cup pulls, you’ll have plenty of room to tuck away keys, mail, and other essentials. Plus,\
    \ a lower shelf offers an additional spot for baskets or decor. Whether you're displaying family photos or organizing\
    \ everyday items, this table is a versatile addition to your space.\n Features: - Comes in a variety of finishes to choose\
    \ from - Shelf weight capacity: 20 lbs. - The holes are 65mm (2.55906 inches) apart from each other"
- source_sentence: Doors made primarily of solid glass, either clear or frosted. This value refers to non-tempered (standard)
    glass, used for its transparency and classic display appeal.
  sentences:
  - 'Product Description: This china cabinet combines form and function, providing you with an elegant way to display and
    store your dining essentials. With adjustable shelves, 5 transparent doors, 7 opaque lower doors, 2 small drawers and
    three open shelves (non-adjustable), it is a versatile product that allows you to adapt to specific storage and display
    requirements. Whether you want to display fine tableware or maintain a well-organized dining room, this cabinet is a stylish
    and practical choice. Features: - Transparent glass upper doors: The top section of the cabinet features five transparent
    glass doors framed with stylish cross frames. These glass doors allow you to showcase your finest diningware, glassware,
    or collectibles, creating an elegant and open display area. - Adjustable shelves: Inside the glass doors, you''ll find
    adjustable shelves on each side of the cabinet, providing flexibility to accommodate items of various heights. This customizable
    shelving allows you to organize and display your items with ease. - Black painted handles: The china cabinet is equipped
    with black painted handles, adding a sleek and modern touch to its design. These handles offer a convenient and stylish
    way to access the storage compartments. - Opaque lower doors: The lower section of the cabinet features seven solid, opaque
    doors, providing concealed storage space. These doors keep items hidden from view while maintaining a clean and organized
    appearance in your restaurant. - Painted finish: The entire cabinet is finished with a smooth and durable paint coating,
    ensuring both aesthetics and longevity. The paint finish is easy to clean, maintaining the cabinet''s pristine appearance.
    - There are two drawers for you to put knives, forks and other small utensils. There are three open shelves above for
    you to put the juicer, coffee machine and other common appliances.'
  - 'Product Description: Hi, My dear friend, if you are worried about finding a suitable storage cabinet, then come and take
    a look at our 2-door 2-drawer cabinet! The design of tempered glass doors presents everything you like in an orderly manner
    before your eyes, while the bottom drawer design can hide all your clutter. Its function is completely defined by you,
    and its super strong storage space is a good choice for placing books, handbags, skincare products, bath towels, artworks,
    and tableware! Features: - This is a multifunctional storage cabinet that can be placed in the kitchen, dining room, living
    room, bathroom, bedroom, study, or office for use. - Tempered glass doors have super high transparency, allowing your
    favorite ornaments to be displayed in front of you at any time, and effectively prevent dust. - The bottom drawers come
    with metal slides and slanted handles, making it smoother and more convenient to pull. - The back of the cabinet is equipped
    with an anti tipping device, which makes the cabinet fit closer to the wall and prevents accidental tipping. - Include
    all hardware and clear instructions to facilitate rapid assembly and provide quality after-sales service.'
  - 'Product Description: Create a warm welcome with the clean lines of this console table. Whether tucked behind the sofa
    or as a display for a menagerie of trinkets, this accent table is the perfect backdrop to create a magazine-ready display.
    With its durable steel frame and tempered glass top and shelf, creates a subtle mid-century look in any living area. The
    clean lines of the tabletop and frame are offset by the geometric frame base, creating visual interest and making it easy
    to incorporate into a variety of styles and spaces. Features: - Clean with a soft, dry cloth; no harsh chemicals or abrasive
    cleaning materials'
