  sentences:
  - 'Product Description: Bring mid-century modern style to your entryway or living room with this streamlined console table.
    It''s made from a blend of solid and engineered wood with acacia veneers, and it''s built on a trestle base with four
    flared dowel legs. Featuring antique bronze hardware, the two drawers offer out-of-sight storage for smaller accessories,
    while the expansive desktop provides a perfect platform for framed photos or a stylish lamp.  Features: '
  - 'Product Description: A bold linear profile sets this modern contemporary console table apart. Its closed bottom frame
    echoes the shape of the tabletop, creating a balanced geometric look. The durable tempered glass top creates an artful
    backdrop for framed photos, flowers, or your favorite collections of decorative items, while the sturdy steel lower shelves
    offer tons of functional storage. A warm metallic finish allows the console table to easily blend with your existing décor,
    instantly updating your hallway, living room, or home office ensemble. Features: - A handcrafted finish is applied to
    the steel frame - Tabletop weight capacity is 45 lbs, lower shelves can support 30 lbs each - Clean with a soft, dry cloth;
    no harsh chemicals or abrasive cleaning materials'
  - "Product Description: Linear + lift. A birdcage-style frame defines this console table with clean vertical bars and an\
    \ elongated oval top. Its open frame is made from iron, and it has a matte black powder-coated finish that adds subtle\
    \ texture and a modern edge. Two open shelves create airy display space for books, ceramics, or sculptural decor. Slim\
    \ proportions make it a natural fit in entryways, open-concept spaces, or behind a sofa. This console table features rounded\
    \ corners that soften the silhouette. Plus, the capped feet protect floors from scrapes and scratches. Ships fully assembled.\n\
    \ Features: - Built from solid iron for lasting strength and durability - Open oval-shaped frame with two spacious metal\
    \ shelves - Sleek black finish and clean lines for a bold, contemporary look - Wipe clean with a dry cloth"
- source_sentence: Indicates that the product does not have drawer glides, making this attribute irrelevant or not applicable.
