    interior style. Features: - Decorative cutout panels add timeless traditional charm - Wide tabletop displays décor or
    everyday essentials - Open shelf offers extra storage and organization - 42.1'''' W Tabletop supports 45 lbs and shelf
    38 lbs - Quick assembly with clear step-by-step instructions'
  - 'Product Description: This console table has a pleasing silhouette that infuses your entryway with a casual elegance.
    It''s made from kiln-dried solid and engineered wood with a finish that highlights the natural grain variation. Rubbed
