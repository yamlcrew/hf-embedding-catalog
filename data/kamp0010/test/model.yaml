    \ self.__config.undefine_symbols:\n            un_symbols = self.__config.undefine_symbols\n            cmd.append(''.join(\n\
    \                [' -U\"%s\"' % undef_symbol for undef_symbol in un_symbols]))\n\n        return cmd"
