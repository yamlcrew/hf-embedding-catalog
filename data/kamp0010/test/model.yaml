- source_sentence: // StartPlugins starts all plugins in the correct order.
  sentences:
  - "func (co *Coordinator) StartPlugins() {\n\t// Launch routers\n\tfor _, router := range co.routers {\n\t\tlogrus.Debug(\"\
    Starting \", reflect.TypeOf(router))\n\t\tif err := router.Start(); err != nil {\n\t\t\tlogrus.WithError(err).Errorf(\"\
    Failed to start router of type '%s'\", reflect.TypeOf(router))\n\t\t}\n\t}\n\n\t// Launch producers\n\tco.state = coordinatorStateStartProducers\n\
    \tfor _, producer := range co.producers {\n\t\tproducer := producer\n\t\tgo tgo.WithRecoverShutdown(func() {\n\t\t\tlogrus.Debug(\"\
    Starting \", reflect.TypeOf(producer))\n\t\t\tproducer.Produce(co.producerWorker)\n\t\t})\n\t}\n\n\t// Set final log target\
    \ and purge the intermediate buffer\n\tif core.StreamRegistry.IsStreamRegistered(core.LogInternalStreamID) {\n\t\t// The\
    \ _GOLLUM_ stream has listeners, so use LogConsumer to write to it\n\t\tif *flagLogColors == \"always\" {\n\t\t\tlogrus.SetFormatter(logger.NewConsoleFormatter())\n\
    \t\t}\n\t\tlogrusHookBuffer.SetTargetHook(co.logConsumer)\n\t\tlogrusHookBuffer.Purge()\n\n\t} else {\n\t\tlogrusHookBuffer.SetTargetWriter(logger.FallbackLogDevice)\n\
    \t\tlogrusHookBuffer.Purge()\n\t}\n\n\t// Launch consumers\n\tco.state = coordinatorStateStartConsumers\n\tfor _, consumer\
    \ := range co.consumers {\n\t\tconsumer := consumer\n\t\tgo tgo.WithRecoverShutdown(func() {\n\t\t\tlogrus.Debug(\"Starting\
    \ \", reflect.TypeOf(consumer))\n\t\t\tconsumer.Consume(co.consumerWorker)\n\t\t})\n\t}\n}"
  - "def __add_symbols(self, cmd):\n        \n\n        if self.__config.define_symbols:\n            symbols = self.__config.define_symbols\n\
