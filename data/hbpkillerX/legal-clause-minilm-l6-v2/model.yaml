widgetData:
- source_sentence: 'Since December 31, 2003 (the "Balance Sheet Date"), except as set forth on Schedule 2.7 hereto and in
    the SEC Reports, neither the Company nor any of its Subsidiaries has:'
  sentences:
  - 'Since the date of the RMAG Interim Balance Sheet, RMAG has been operated only in the ordinary course, consistent with
    past practice, and there has not been any adverse change, or any event, fact or circumstance which might reasonably be
    expected to result in an adverse change, in either event that would have a RMAG Material Adverse Effect. Without limiting
    the generality of the foregoing, except as set forth on Schedule 3.6, since October 1, 1999, there has not been with respect
    to RMAG any:'
  - Since September 1, 2011 through the date of this Agreement, except as contemplated by this Agreement, (a) the Company
    and its Subsidiaries have conducted their respective businesses in the ordinary course of business consistent with past
    practice and (b) there has not been (i) any event, circumstance, change, occurrence, state of facts or effect (including
    the incurrence or arising of any liabilities of any nature, whether or not accrued, contingent or otherwise) that has
    had or would be reasonably likely to have, individually or in the aggregate, a Company Material Adverse Effect, or (ii)
    any action taken or agreed to be taken by the Company or any of its Subsidiaries that, if taken during the period from
    the date of this Agreement through the Effective Time, would constitute a breach of clause (v), (vi), (viii), (ix), (x),
    (xi), (xv) or (xvii) of Section 5.1.
  - 'Except as set forth on Schedule 4.9, since the date of the Latest Balance Sheet, each of the Company and the Company
    Subsidiaries has conducted its business only in the ordinary course consistent with past custom and practices. Except
    as set forth on Schedule 4.9, since the date of the Latest Balance Sheet, there has not been any:'
- source_sentence: 'Except as set forth in the Guarantor SEC Documents, since September 30, 2000, the business of Guarantor
    and its subsidiaries has been conducted in the ordinary course and there has not occurred: (i) any changes, effects or
    circumstances, including any damage to, destruction or loss of any asset of the Company (whether or not covered by insurance)
    constituting, individually or in the aggregate, a Material Adverse Effect; (ii) any amendments or changes in the Guarantor
    Charter Documents, except as provided in Section 4.03(a); (iii) any material change by Guarantor in its accounting methods,
    principles or practices (other than as required by GAAP subsequent to the date of this Agreement); or (iv) any sale of
    a material amount of assets of Guarantor, except in the ordinary course of business.'
  sentences:
  - (a) Since the Balance Sheet Date, there has not been a Parent Material Adverse Effect.
  - The Servicer, in its sole discretion and consistent with its customary and usual credit and collection practices, may
    accelerate (or elect not to accelerate) the maturity of all or any Scheduled Payments under any Contract in the Contracts
    Pool under which a default under the terms thereof has occurred and is continuing (after the lapse of any applicable grace
    period); provided that the Servicer is required to accelerate the Scheduled Payments due under any Contract in the Contracts
    Pool (and take other action in accordance with the Originator's past practice, including repossessing the related Equipment,
    to realize upon the value of such Contract and the related Equipment) to the fullest extent permitted by the terms of
    such Contract, promptly after such Contract becomes a Defaulted Contract.
  - Since December 30, 2010, except as contemplated by or as disclosed in this Agreement the Company and its Subsidiaries
    have conducted their respective businesses only in the ordinary course and in a manner consistent with past practice and,
    since such date, (a) there has not been any Company Material Adverse Effect and (b) the Company and its Subsidiaries have
    not taken or legally committed to take any of the actions specified in Sections 5.01(a) through 5.01(cc).
- source_sentence: 'Since the Balance Sheet Date, the Business has been conducted in the ordinary course consistent with past
    practices and there has not been:'
  sentences:
  - Since the Balance Sheet Date, there have been no events or changes having a material adverse effect on the assets, liabilities,
    financial condition or operations of the Company or, to the Shareholders' or the Company's Knowledge (as defined in Section
    10.2 of this Agreement), on the future prospects of the Company. Since the Balance Sheet Date, no Company has made any
    distributions or payments to any of the Shareholders (other than normal compensation that may have been paid to the Shareholders
    in their capacity as bona fide employees) and has not entered into any agreements other than in the ordinary course of
    business. Since the Balance Sheet Date, each Company has carried on business in the usual, regular and ordinary course
    in substantially the same manner as heretofore conducted and has not taken any unusual actions in contemplation of this
    transaction except to the extent that Buyer has given its prior specific consent.
  - (a) Since January 1, 1997, except (i) as disclosed in any Regulatory Reporting Document filed since January 1, 1997 and
    prior to the date hereof or (ii) as set forth in Section 5.16 of the Company Disclosure Schedule, neither the Company
    nor any of its Subsidiaries has (A) incurred any liability which has had a Company Material Adverse Effect, (B) suffered
    any change in its Condition which would have a Company Material Adverse Effect, other than changes after the date hereof
    which affect the banking industry as a whole, (C) failed to operate its business, in all material respects, in the ordinary
    course consistent with past practice and prudent banking practices or (D) changed any accounting practices.
  - Since September 30, 2000 other than in connection with or arising out of this Agreement and the transactions contemplated
    hereby, the Company and its Subsidiaries have conducted their respective businesses in the Ordinary Course and there has
    not been (i) any condition, event or occurrence which has had or would reasonably be expected to have a Material Adverse
    Effect on the Company or (ii) any action which, if it had been taken after the date hereof, would have required Holdings'
    consent under Section 3.1.
- source_sentence: Since December 31, 2018 and through the date of this Agreement, there has not been any Material Adverse
    Effect. From December 31, 2018 to the date of this Agreement, except as contemplated hereby, (i) the business of the Company
    and its Subsidiaries, taken as a whole, has been conducted in all material respects in the ordinary course and (ii) there
    has not been any action taken by the Company or its Subsidiaries that would have constituted a material breach of Section
    6.1(b) (other than actions or events of the kind set forth in Sections 6.1(b)(vi), (vii), (xx) and (xxi) (as it relates
    to Sections 6.1(b)(vi), (vii) and (xx)) that have been taken or occurred in the ordinary course of business consistent
    with past practice), if such action had been taken after the date of this Agreement without the consent of Parent.
  sentences:
  - 'Except as set forth on Section 3.9 of the Company Disclosure Letter or as otherwise required by, or necessary to effectuate
    the transactions contemplated by this Agreement, since January 1, 2019: (a) the business of the Company and its Subsidiaries
    taken as a whole has been conducted, in all material respects, in the ordinary course of business; (b) there has not been
    or occurred any Material Adverse Effect on the Company; and (c) neither the Company nor any of its Subsidiaries has taken
    any action that, had such action been taken during the period from the date hereof through the Effective Time, would require
    the prior written consent of Parent pursuant to clauses (d), (e), (m), (n), (o), or, to the extent relating to any of
    the foregoing, clause (aa), of Section 5.2. Since April 1, 2019, there have been no general base salary or hourly rate
    of pay increases among the employees of the Company or any of its Subsidiaries.'
  - The Stock Appreciation Rights shall be immediately exercisable in the event of any Change in Control (as defined in the
    Plan) of Pluris.
  - Except as set forth in Section 4.08 of the Company Disclosure Letter, or as expressly provided in this Agreement, since
    December 31, 2015, each of the Company and its Subsidiaries has conducted its business in the ordinary course consistent
    with past practice. Without limiting the foregoing, since December 31, 2015, there has not, directly or indirectly, occurred
    (a) any event, change, effect or circumstance, including any damage to, destruction or loss of any asset of the Company
    or any of its Subsidiaries (whether or not covered by insurance), constituting or that would reasonably be expected to
    result in a Material Adverse Effect or (b) any other action that would require AcquisitionCo’s consent under Section 6.01
    if it occurred after the date of this Agreement (excluding for avoidance of doubt any action specifically approved by
    the Company Board or a standing committee (other than the Special Committee) thereof, and in the case of committee approval,
    specifically disclosed to the Company Board, prior to the date of this Agreement.
- source_sentence: 'Since the Balance Sheet Date, the Company Group has conducted the Business in the ordinary course consistent
    with past practices. Without limiting the generality of the foregoing, except as set forth on Schedule 5.13, since the
    Balance Sheet Date, there has not been:'
  sentences:
  - (a) From December 31, 2011 to the Signing Date, (i) each Parent Entity conducted such Parent Entity’s operations only
    in the ordinary course of business consistent with past practices and (ii) there has not occurred and continued to exist
    any event, change, effect, fact, circumstance or condition which, individually or in the aggregate, has had, or would
    reasonably be expected to have or result in, a Parent Material Adverse Change.
  - 'Notwithstanding the provisions of paragraph 2 above, all Restricted Equivalents then outstanding will immediately vest,
    in the event of:'
  - (a) Since the Balance Sheet Date, the Business has in all material respects been conducted in the Ordinary Course of Business
    and there has not been any event, occurrence, development or state of circumstances or facts that has had or would reasonably
    be expected to have, individually or in the aggregate, a Material Adverse Effect.
