widgetData:
- source_sentence: og jeg derefter er underrettet, at han i Mandags Morges Kl. 5, skal have paa en tyvagtig Maade krøbet over
    mit Plankeværk ind i min Gaard gaaet ind i sit Kammer, taget endeel Sager, og derefter er han igien gaaet bort, uden at
    nogen veed hvor han er bleven af, saa nødes jeg herved at efterlyse bemeldte Niels Stephensen, med Anmodning at han vil
    indfinde sig, for at giøre Rigtighed for anseelige Penge og videre som ham er betroet
  sentences:
  - saa bliver han end videre herved efterlyst, med Erindring til alle og enhver, ikke enten at huse, hæle eller i Tieneste
    antage denne Tyv, men de hannem maatte forekomme, anmode hannem at anholde og mig derom notificere
  - ombedes ingen at huse eller hæle med ham, ei heller at antage ham i nogen Slags Tieneste
  - saa ombedes alle og enhver, om bemeldte Pige skulde forlange noget i mit Navn, hun da ei maa betroes
- source_sentence: da han ved alle Leyligheder, og Steder her i Landet er eftersøgt, men ey bleven funden eller nogen Oplysning
    om ham faaet
  sentences:
  - og hans Broder Hans Witt, der skal opholde sig i Sielland,
  - er Natten imellem den 6te og 2de et Mai sidstleden undvigt Reserven Jørnen Andersen Dannemarre.
  - En skikkelig Karl søger Gaardskarls Plads;
- source_sentence: uden at hans Opholdsted har været at opdage
  sentences:
  - er efter at have begaaet stor Utroskab bortløben den 12 hujus af min Tieneste
  - som haver paa en utilbørlig Maade forladt Staden og Mesterens Arbeide, og er paa Herberget og ved Laden skyldig
  - igen at indfinde sig paa Districter, og søge den Tieneste, hvortil han har fæstet sig, hos Bonden Oluf Nielsen i Pederstrup
    Sogn i bemeldte Ballerup
- source_sentence: En tyk undersætsig Pige ved Navn Kirsten, som har tient mig fra Michelsdag af, er bortgaaet af sin Tieneste
  sentences:
  - 'saaledes undvigt begge uden allerringeste beføyet Aarsag nemlig: den Ene navnlig Ole Espensen af Anders Andersens Læg
    i Høng, 23 a 24 Aar gammel [...] og den Anden navnlig Niels Hansen [...] aldeles uden mindste Føye af sin Tieneste undvigt
    og vides ikke hvor er'
  - den Mulct den sig paadrager, i Følge Forordningen af 4de Februar. 1733. den 19de Post som slig Bortrømt huser eller hæle
  - indkaldes herved sub pæna præclusi & perpetui silentii, med Aar og Dags Varsel alle Dem som formeene sig at have noget
    at fordre hos S. T. Hr. Assessor Mathias Leth Sommerhielm, eller i hens Boe efter hans ved Døden afgangne Hustrue, Frue
    Friderikke Dorothea Sehestedt paa Tomb Gaard i Smaalenenes Amt, af hvad Beskaffenhed og under hvad Titul deres Fordringer
    end maatte være der ved at fremkomme og saadant deres havende Krav inden forbemeldte Tids Forløb for ham at anmelde og
    beviisliggiøre.
- source_sentence: saa finde vi os beføyet, saavel for at besørge de publiqve Midlers Stkkerhed, som i Anledning af den Nød
    og Armod hans Undvigelse har foraarsaget hans efterladte Kone og smaa Børn her, at lade ham herved eftelyse og indkalde
    til at indfinde sig her Byen
  sentences:
  - men ingen veed om ham at sige.
  - Friseur W. har logeret hos mig i lille Kongensgade og absenteret sig i April Maaned, samt efterladt sig en luk Kuffert,
    saa bedes han at komme til mig inden 8 Dage for at gjøre Rigtighed, hvis ikke, sættes hans efterladte Tøi paa Auction
    og forbeholdes min Ret.
  - thi anmodes enhver som træffer denne Karl at paagribe ham og imod de sædvanlige Indbringerpenge at levere ham til Compagniet.
