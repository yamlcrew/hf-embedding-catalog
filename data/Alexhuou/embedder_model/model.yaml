- source_sentence: 'This question refers to the following information.

    Although in Protestant Europe, [Peter the Great] was surrounded by evidence of the new civil and political rights of individual
    men embodied in constitutions, bills of rights and parliaments, he did not return to Russia determined to share power
    with his people. On the contrary, he returned not only determined to change his country but also convinced that if Russia
    was to be transformed, it was he who must provide both the direction and the motive force. He would try to lead; but where
    education and persuasion were not enough, he could drive—and if necessary flog—the backward nation forward.

    —Robert K. Massie, Peter the Great: His Life and World

    Based on the above passage, what kinds of reforms did Peter the Great embrace?'
  sentences:
  - 'Identify the antecedent of the following conditional proposition: When the university raises tuition, then either the
    governor approves of it or the board of trustees doesn''t prevent it.'
  - Which of the following disorders is not suitable for population carrier screening?
  - 'This question refers to the following information.

    "To slacken the tempo would mean falling behind. And those who fall behind get beaten. But we do not want to be beaten.
    No, we refuse to be beaten! One feature of the history of old Russia was the continual beatings she suffered because of
    her backwardness. She was beaten by the Mongol khans. She was beaten by the Turkish beys. She was beaten by the Swedish
    feudal lords. She was beaten by the Polish and Lithuanian gentry. She was beaten by the British and French capitalists.
    She was beaten by the Japanese barons. All beat her––because of her backwardness, because of her military backwardness,
    cultural backwardness, political backwardness, industrial backwardness, agricultural backwardness. They beat her because
    it was profitable and could be done with impunity. You remember the words of the pre-revolutionary poet: "You are poor
    and abundant, mighty and impotent, Mother Russia." Those gentlemen were quite familiar with the verses of the old poet.
    They beat her, saying: "You are abundant," so one can enrich oneself at your expense. They beat her, saying: "You are
    poor and impotent," so you can be beaten and plundered with impunity. Such is the law of the exploiters––to beat the backward
    and the weak. It is the jungle law of capitalism. You are backward, you are weak––therefore you are wrong; hence you can
    be beaten and enslaved. You are mighty––therefore you are right; hence we must be wary of you.

    That is why we must no longer lag behind."

    Joseph Stalin, speech delivered at the first All-Union Conference of Leading Personnel of Socialist Industry, February
    4, 1931

    Stalin''s efforts to advance Russia as justified by his mention of the "continual beatings" were vindicated by which of
    the following historical events?'
