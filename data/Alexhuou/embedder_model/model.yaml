    of $12,000 cash and land with an adjusted basis to Chyme of $10,000 and a fair market value of $30,000. Chyme did not
    have unrealized receivables, appreciated inventory, or properties that had been contributed by its partners. What was
    the amount of Gulde’s basis in the land?
