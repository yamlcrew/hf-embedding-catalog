widgetData:
- source_sentence: In the Annual Report on Form 10-K, the consolidated financial statements are included immediately following
    Part IV and incorporated by reference.
  sentences:
  - What movies contributed to higher revenue in 2023 compared to the previous year?
  - How are the financial statements incorporated in the 10-K report?
  - What was the ending store count for the Family Dollar segment after the fiscal year ended January 28, 2023?
- source_sentence: Readers are cautioned not to place undue reliance on forward-looking statements, which speak only as of
    the date they are made. We undertake no obligation to update or revise publicly any forward-looking statements, whether
    because of new information, future events, or otherwise.
  sentences:
  - What impact did the IRS deadline extension in 2023 have on Intuit's fiscal results?
  - What risks are associated with relying on forward-looking statements according to the provided text?
  - What were the total minimum lease payments and their net amounts after imputed interest for operating and finance leases
    as of January 31, 2023?
- source_sentence: CMS made significant changes to the structure of the hierarchical condition category model in version 28,
    which may impact risk adjustment factor scores for a larger percentage of Medicare Advantage beneficiaries and could result
    in changes to beneficiary RAF scores with or without a change in the patient’s health status.
  sentences:
  - What significant regulatory change did CMS make to the hierarchical condition category model in its version 28?
  - Which section of IBM’s 2023 Annual Report is reserved for Financial Statements and Supplementary Data?
  - What strategic goals are set for the Printing segment at HP Inc.?
- source_sentence: In December 2023, the FCA published a consultation proposing to revise the U.K. commodity derivatives framework.
    The FSMA 2023 reformed the U.K.’s commodity derivatives regulatory regime including revoking the MIFID II position limit
    requirements and transferring the powers to set position limits and controls from the FCA to the operator of trading venues.
    The FCA proposal requires U.K. trading venues to set position limits for critical and related contracts, to establish
    accountability thresholds and to report enhanced position data.
  sentences:
  - What was the percentage increase in revenues from aviation services in 2023 compared to 2022?
  - What was the impairment loss recognized by the Company due to TDA integration and restructuring efforts for the year ending
    December 31, 2023?
  - What changes did the FCA propose in its December 2023 consultation regarding the U.K. commodity derivatives framework?
- source_sentence: Operating cash flow provides the primary source of cash to fund operating needs and capital expenditures.
  sentences:
  - What is the primary source of cash used by the company to fund operating needs and capital expenditures?
  - What kinds of products and services does the Company provide under the AARP Program?
  - What was the total assets under supervision (AUS) for all categories combined in 2023?
