widgetData:
- source_sentence: 서울여자대학교 수시모집 지원자에게 필요한 최초합격자 발표 정보는 다음과 같습니다. 최초합격자 발표는 2024년 11월 8일부터 12월 13일까지입니다. 합격자는 본교 입학처 홈페이지에서
    합격 여부를 확인하여야 하며, 등록기간 내에 등록을 마쳐야 합니다.
  sentences:
  - SWU의 SI(Social Innovation)교육에 대해 알려줘.
  - 학교생활기록부 교과성적 반영방법을 설명해 주세요.
  - 서울여자대학교 수시모집 지원자에게 필요한 최초합격자 발표 정보를 알려줘.
- source_sentence: 고등학교 졸업(예정)자의 경우 학교생활기록부 제출 방법은 다음과 같습니다. 원본 대조필 및 학교장 직인 날인 후 제출하여야 합니다. 외국 고등학교 졸업(예정)자의 경우는 한국어나 영어로
    번역 공증받은 문서를 제출하여야 합니다.
  sentences:
  - 언론영상학부-저널리즘전공의 졸업 후 진로는 무엇입니까?
  - 서울여자대학교에 있는 박물관학전공의 교육 내용을 설명해줘.
  - 고등학교 졸업(예정)자의 경우 학교생활기록부 제출 방법을 설명해줘.
- source_sentence: 심리·인지과학학부-인지학습과학전공의 졸업 후 진로는 교육프로그램 개발자, 교육기업 데이터 분석 업무, 인지학습 치료사, 인지행동 치료사, 교육컨설턴트, 국가연구소, 이러닝 관련 산업분야
    등입니다.
  sentences:
  - 서울여자대학교에 있는 예술심리치료전공의 목표를 설명해줘.
  - 서울여자대학교 수시모집 지원자에게 필요한 교과성적 산출 방법을 설명해줘.
  - 심리·인지과학학부-인지학습과학전공의 졸업 후 진로를 설명하세요.
- source_sentence: 2024학년도 서울여자대학교 수시모집 지원자에게 필요한 정보는 다음과 같습니다. 수시모집 지원기간은 2024년 9월 10일부터 9월 13일까지입니다. 지원자는 인터넷 입학원서접수 사이트에
    접속하여 원서접수를 완료해야 하며, 전형료 결제는 신용카드, 계좌이체 등으로 가능합니다. 또한, 지원자는 제출서류를 등기우편으로 제출하여야 하며, 서류제출 마감일은 2024년 9월 13일입니다.
  sentences:
  - 박물관학전공의 교육 목표는 무엇입니까?
  - 2024학년도 서울여자대학교 수시모집 지원자에게 필요한 정보를 알려줘.
  - 학생부종합 전형으로 지원할 수 있는 전형의 유형을 모두 알려줘
- source_sentence: 학교생활기록부 교과성적 대체 점수(비교내신) 대상자는 논술(논술우수자전형), 실기/실적(실기우수자전형_체육) 지원자 중 고등학교 졸업학력 검정고시 출신 지원자 및 교과성적 산출 불가자입니다.
  sentences:
  - 고등학교 학교생활기록부 제출 방법을 설명하세요.
  - 청소년학전공의 교육 내용은 무엇입니까?
  - 학교생활기록부 교과성적 대체 점수(비교내신) 대상자를 알려줘.
