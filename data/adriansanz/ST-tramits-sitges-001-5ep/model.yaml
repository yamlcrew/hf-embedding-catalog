widgetData:
- source_sentence: Per accedir a un habitatge amb protecció oficial al municipi de Sitges s'ha d'estar inscrit en el Registre
    municipal de sol·licitants.
  sentences:
  - Quin és el motiu perquè la renovació de la inscripció en el Registre municipal de sol·licitants d'habitatge amb protecció
    oficial de Sitges és necessària?
  - Quin és el sector que es veu afectat per la disminució d'ingressos?
  - Quin és el propòsit de la descripció de l'activitat?
- source_sentence: Aquest tràmit permet presentar ofertes i/o pressupostos sol·licitats per l'Ajuntament de Sitges en procediments
    de contractes menors.
  sentences:
  - Quin és el requisit per a sol·licitar l'ajut econòmic a l'Ajuntament de Sitges?
  - Què passa amb la llicència de gual quan es vol reduir les característiques físiques?
  - Quin és el propòsit del tràmit de presentació d'ofertes?
- source_sentence: Estudis universitaris fins al grau de llicenciatura
  sentences:
  - Quin és el propòsit de la subvenció per a les persones autònomes?
  - Quin és el requisit per als establiments oberts al públic destinats a espectacles públics i activitats recreatives musicals?
  - Quins estudis universitaris es poden fer amb aquesta ajuda?
- source_sentence: Les entitats especialitzades i acreditades com a proveïdores de la Xarxa de Serveis Socials d'Atenció Pública
    interesades en la la gestió delegada dels serveis públics de l'Ajuntament de Sitges així determinats, poden presentar-se
    a les respectives convocatòries per a l'adjudicació.
  sentences:
  - On comencen i acaben les activitats de l'Estiu Jove?
  - Quin és el benefici per a l'Ajuntament de Sitges de la gestió delegada?
  - Quin és el paper de l’organització en la valoració d'una proposta?
- source_sentence: Publicada la llista d'infants admesos i exclosos a les estades esportives, s'obre un termini perquè les
    persones admeses puguin demanar qualsevol canvi a la sol·licitud inicial.
  sentences:
  - Quin és el contingut del volant històric de convivència?
  - Quin és el període en què es pot demanar un canvi a la sol·licitud inicial?
  - Quin és el paper de les escoles de Sitges en les activitats de foment de l'esport escolar
