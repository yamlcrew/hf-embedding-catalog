widgetData:
- source_sentence: Aquelles persones que fan un ús regular i continuat de la deixalleria municipal poden gaudir d’una bonificació
    del 20% sobre la quota de les taxes per recollida, tractament i eliminació d'escombraries i altres residus urbans domiciliaris.
  sentences:
  - Quin és el contingut dels documents dirigits a l'Ajuntament de Sitges?
  - Quin és el benefici de la deixalleria municipal?
  - Quin és el mètode de pagament dels ajuts atorgats en cas de normalitat?
- source_sentence: Les subvencions per al desenvolupament i/o consolidació de sectors econòmics del municipi tenen com a objectiu
    generar un benefici ambiental per al municipi, a través de la promoció de pràctiques sostenibles.
  sentences:
  - Quin és el requisit per a la llicència per a la modificació d'un règim de propietat horitzontal?
  - Quin és el benefici ambiental esperat de les subvencions per al desenvolupament i/o consolidació de sectors econòmics
    del municipi?
  - Quin és el propòsit de la liquidació de l'import corresponent a l'exercici?
- source_sentence: Aquelles persones que s'hagin inscrit a les estades esportives organitzades per l'Ajuntament de Sitges
    i que formin part d'una unitat familiar amb uns ingressos bruts mensuals, que una vegada dividits pel nombre de membres,
    siguin inferiors entre una i dues terceres parts de l'IPREM, poden sol·licitar una reducció de la quota d'aquestes activitats
    o l'aplicació de la corresponent tarifa bonificada establerta en les ordenances dels preus públics.
  sentences:
  - Quin és el benefici de les subvencions per a les entitats culturals?
  - Quin és el paper de l'IPREM en la sol·licitud de reducció de la quota d'una estada esportiva?
  - Quin és el paper de l'Ajuntament en la resolució d'una situació sanitària no adequada en un domini particular?
- source_sentence: La inscripció al cens municipal facilita la recuperació d’aquests animals en cas de pèrdua alhora que permet
    a l’Ajuntament disposar de les dades necessàries en cas que s’hagin de realitzar campanyes sanitàries.
  sentences:
  - Quin és el tipus de serveis auxiliars que es consideren despeses elegibles?
  - Quin és el benefici d'estacionar a les zones verdes per als residents?
  - Quin és el motiu pel qual es crea el cens municipal d’animals de companyia?
- source_sentence: A la nostra vila hi ha veïns i veïnes que els agradaria tornar a fer de pagès o provar-ho per primera vegada.
  sentences:
  - Quin és l'objectiu principal de l'activitat del Viver dels Avis de Sitges?
  - Quin és el propòsit del carnet de conductor de taxi?
  - Quin és el paper de les persones en relació amb les indemnitzacions?
