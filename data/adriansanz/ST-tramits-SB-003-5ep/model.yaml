widgetData:
- source_sentence: 'P.2 El contingut mínim del projecte és: a) Memòria justificativa, amb: - La descripció de la finca o finques
    d''origen amb indicació de les seves superfícies i llindars. - La descripció de les finques resultants, la seva superfície
    i els seus llindars...'
  sentences:
  - Quin és el format de sortida de la informació sobre aquesta ciutat?
  - Quins són els requisits bàsics per sol·licitar la subvenció?
  - Quin és el contingut mínim del projecte de parcel·lació?
- source_sentence: 'La Comissió de Garanties té dues funcions: aclarir els dubtes interpretatius que es plantegin en l''aplicació
    del mateix.'
  sentences:
  - Quines són les dues funcions de la Comissió de Garanties?
  - Quin és el propòsit d'una llicència d'obres mitjanes en relació amb els moviments de terres?
  - Quin és el nom del conjunt d'habitatges que es troba al terme municipal de Viladecans?
- source_sentence: 'No cal presentar al·legacions en els següents casos: En el cas que la baixa s’hagués iniciat per manca
    de confirmació bastarà amb realitzar el tràmit de confirmació per que l’expedient de baixa s’arxivi, sempre i quan continuï
    residint al mateix domicili.'
  sentences:
  - És necessari que una persona tècnica professional empleni els documents d'autocontrol?
  - Quin és el tema principal de la secció d'horari d'obertura i tancament?
  - Quan no cal presentar al·legacions en un expedient de baixa d'ofici?
- source_sentence: L'Ajuntament de Sant Boi obre convocatòria de concessió de beques per col·laborar en el finançament de
    projectes i activitats dels i de les joves del municipi en diferents àmbits i promoure i facilitar els processos d'emancipació
    juvenils i garantir la igualtat d'oportunitats i la cohesió social entre la població jove.
  sentences:
  - Quin és el propòsit del servei de llista d'espera?
  - Quin és el problema que es tracta en aquest apartat?
  - Quin és l'objectiu de les beques per a joves 2024 de l'Ajuntament de Sant Boi?
- source_sentence: Empadronament d'un/a menor en un domicili diferent al domicili dels progenitors - Amb autorització de les
    persones progenitores
  sentences:
  - Quin és el límit de temps màxim per al període de funcionament en proves?
  - Què es necessita per participar en aquest procediment de selecció?
  - Quin és el resultat de l'empadronament d'un/a menor en un domicili diferent al dels progenitors amb autorització?
