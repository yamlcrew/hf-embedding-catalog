widgetData:
- source_sentence: El seu objecte és que -prèviament a la seva execució material- l'Ajuntament comprovi l'adequació de l’actuació
    a la normativa i planejament, així com a les ordenances municipals sobre l’ús del sòl i edificació.
  sentences:
  - Quin és el paper de les ordenances municipals en la llicència d'extracció d'àrids i explotació de pedreres?
  - Quin és el percentatge de bonificació que es pot obtenir?
  - Quin és el propòsit del tràmit d'adjudicació d'habitatges socials i d'emergència?
- source_sentence: La renda és un element important en la tramitació d'un ajornament o fraccionament, ja que es té en compte
    per determinar si el sol·licitant compleix els requisits per a sol·licitar el criteri excepcional.
  sentences:
  - Quin és el paper de la renda en la tramitació d'un ajornament o fraccionament?
  - Quin és l'objectiu del tràmit C03?
  - Quin és el paper de les ordenances municipals en la llicència de parcel·lació?
- source_sentence: L’article 14 de la llei 39/2015 estableix l’obligatorietat de l’ús de mitjans electrònics, informàtics
    o telemàtics per desenvolupar totes les fases del procediment de contractació.
  sentences:
  - Quin és el paper de les ordenances municipals sobre l’ús del sòl i edificació en el tràmit de modificació substancial
    de la llicència d'obres?
  - Quin és el requisit per a la intervenció d'una persona tècnica?
  - Quin és el propòsit de l’article 14 de la llei 39/2015?
- source_sentence: El seu objecte és que -prèviament a la seva execució material- l'Ajuntament comprovi l'adequació de l’actuació
    a la normativa i planejament, així com a les ordenances municipals sobre l’ús del sòl i edificació.
  sentences:
  - Quin és el paper del planejament en el tràmit de llicència d'obres per l'obertura, la pavimentació i la modificació de
    camins rurals?
  - Quin és el requisit per presentar una sol·licitud?
  - Quin és el resultat de la falta de presentació de la documentació tècnica corresponent?
- source_sentence: L’Ajuntament de Sant Quirze del Vallès reconeix un dret preferent al titular del dret funerari sobre la
    corresponent sepultura o al successor o causahavent de l’anterior titular d’aquest dret, que permet adquirir de nou el
    dret funerari referit, sobre la mateixa sepultura, un cop el dret atorgat ha exhaurit el termini de vigència
  sentences:
  - Quin és el requisit per a les instal·lacions solars per mantenir la bonificació?
  - Quin és el paper del cens electoral en les eleccions?
  - Quan es pot adquirir de nou el dret funerari?
