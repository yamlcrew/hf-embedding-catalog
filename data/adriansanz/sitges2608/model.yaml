widgetData:
- source_sentence: Les respectives convocatòries determinaran les parades disponibles així com les seves característiques
    i descripció.
  sentences:
  - Quin és l'objectiu secundari dels ajuts per a la creació de noves empreses?
  - Qui és responsable de la resolució de la situació en un domini particular?
  - Quin és el paper de les convocatòries?
- source_sentence: Cal revisar la informació i els terminis de la convocatòria específica de cada procés que trobareu a la
    Seu electrònica de l'Ajuntament de Sitges.
  sentences:
  - Quin és el paper de la Seu electrònica de l'Ajuntament de Sitges en un procés de selecció de personal?
  - Quin és l'objectiu principal de sol·licitar el certificat d'antiguitat i legalitat d'una finca?
  - Quin és el propòsit dels ajuts a la contractació laboral en relació amb l'ocupació?
- source_sentence: Per a poder rebre les subvencions pel suport educatiu a les escoles públiques de Sitges, els beneficiaris
    han de presentar un projecte d'acció que compleixi els requisits establerts en la convocatòria corresponent.
  sentences:
  - Quin és el propòsit de la sol·licitud d'ajuts?
  - Quin és el paper de l'Ajuntament de Sitges en la Fira de la Vila del Llibre de Sitges?
  - Quin és el requisit per a poder rebre les subvencions pel suport educatiu a les escoles públiques de Sitges?
- source_sentence: Posteriorment a l’obtenció de l’informe favorable, caldrà realitzar l’acte de comprovació en matèria d’incendis
    i procedir a efectuar la comunicació prèvia corresponent.
  sentences:
  - Quin és el paper de la comunicació prèvia en la prevenció d'incendis?
  - Quins són els requisits per a presentar una sol·licitud de subvenció?
  - Quins animals es consideren animals de companyia?
- source_sentence: El termini per a la presentació de les sol·licituds de modificació del projecte o activitat subvencionat
    és de 15 dies naturals abans de la finalització del projecte o activitat.
  sentences:
  - Quin és el termini per a la presentació de les sol·licituds de modificació del projecte o activitat subvencionat?
  - Quins són els tres tipus de llicència d'obra?
  - Quin és el registre on es troben les dades d'inscripció?
