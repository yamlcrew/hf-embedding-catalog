widgetData:
- source_sentence: Si dins el termini que s'hagi atorgat amb aquesta finalitat els habitatges que en disposen no s'han adaptat,
    la llicència pot ésser revocada.
  sentences:
  - Qui pot sol·licitar la pròrroga de la prestació?
  - Quin és el resultat de la constatació dels fets denunciats per part de l'Ajuntament?
  - Què passa si no s'adapten els habitatges d'ús turístic dins el termini establert?
- source_sentence: En cas que a la sepultura hi hagi despulles, la persona titular podrà triar entre traslladar-les a una
    altra sepultura de la què en sigui el/la titular o bé que l'Ajuntament les traslladi a l'ossera general.
  sentences:
  - Què passa amb les despulles si la persona titular decideix traslladar-les a una altra sepultura?
  - Quins són els beneficis de la llicència de publicitat dinàmica?
  - Quan es va aprovar els models d'aval per part de la Junta de Govern Local?
- source_sentence: La colònia felina té un paper important en la reducció del nombre d'animals abandonats, ja que proporciona
    un refugi segur i un entorn adequat per als animals que es troben en situació de risc o abandonament.
  sentences:
  - Quin és el termini per justificar la realització del projecte/activitat subvencionada?
  - Quins són els tractaments mèdics que beneficien la salut de l'empleat municipal?
  - Quin és el paper de la colònia felina en la reducció del nombre d'animals abandonats?
- source_sentence: 'La realització de les obres que s’indiquen a continuació està subjecta a l’obtenció d’una llicència d’obra
    major atorgada per l’Ajuntament: ... Compartimentació de naus industrials existents...'
  sentences:
  - Quin tipus d’obra es refereix a la compartimentació de naus industrials existents?
  - Quin és el benefici principal del tràmit de canvi de titular de la llicència de gual?
  - Quin és el tipus de garantia que es pot fer mitjançant una assegurança de caució?
- source_sentence: Els membres de la Corporació tenen dret a obtenir dels òrgans de l'Ajuntament les dades o informacions...
  sentences:
  - Quin és el paper dels òrgans de l'Ajuntament en relació amb les sol·licituds dels membres de la Corporació?
  - Quin és el motiu principal perquè un beneficiari pugui perdre el dret a una subvenció?
  - Quin és el benefici de la presentació de recursos?
