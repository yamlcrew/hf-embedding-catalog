widgetData:
- source_sentence: 'El Viver dels Avis de Sitges. Activitat d''hort municipal per a la gent gran A la nostra vila hi ha veïns
    i veïnes que els agradaria tornar a fer de pagès o provar-ho per primera vegada. Potser molts d’ells enyoren el contacte
    amb la terra i voldrien tenir un petit hort per dedicar-li un parell d’hores cada dia i poder seguir el cicle natural
    de plantar, regar i recollir els fruits de la terra, gaudint així d’un entorn on la naturalesa és generosa amb qui la
    treballa. Aquest tipus d’activitat ha demostrat beneficis terapèutics i eugenèsics entre els seus principals destinataris:
    la gent gran. Al nostre municipi tenim la sort de comptar amb un ampli espai públic com és el viver municipal. Dins d''aquest
    viver s''hi han habilitat 10 parcel·les sobre una superfície de 300 m2.'
  sentences:
  - Acceptació / Renúncia. Ajuts per al projecte d'implantació i l'ús de la targeta de fidelització del comerç local de Sitges  Descripció
  - Justificació Subvencions per a projectes i activitats de les entitats esportives i esportistes de Sitges Les persones
    i entitats beneficiaries hauran de justificar la realització del projecte/activitat subvencionada com a màxim el dia 31
    de març de 2023.
  - Ajuts per les despeses d'instal·lació de mesures higièniques i de seguretat per al retorn a l'activitat comercial d'establiments
    físics (COVID-19) Són ajuts econòmics extraordinaris destinats a col·laborar amb la despesa que suposa la implementació
    de mesures higièniques de prevenció, protecció i mesures de seguretat per a la reobertura dels establiments comercials
    i la tornada a l’activitat econòmica d’aquests establiments físics. Únicament es prendran en consideració per a l’atorgament
    de l’ajut la compra de material fungible i les inversions per a la instal·lació de mesures higièniques i de seguretat
    relacionades amb la gestió i prevenció de la pandèmia COVID-19 d’acord amb l’annex 1 de les Bases que regulen l'atorgament
    de l'ajut. L’àmbit temporal de l’ajut econòmic extraordinari tindrà caràcter retroactiu al moment de la declaració de
    l’estat d’alarma; seran despeses finançables totes aquelles que s’hagin produït des de la declaració de l’estat d’alarma
    i fins la data de finalització el període de presentació de sol·licituds. L’import finançable serà el 100% del cost de
    compra del material fungible i d’inversió excepte l’IVA de la despesa que no formarà part de l’ajut econòmic extraordinari.
    L’import màxim de l’ajut econòmic extraordinari anirà en funció del nombre de persona beneficiaris/ries amb dret a l’ajut,
    entre un mínim de 500 € i un màxim de 3.000 €.
- source_sentence: Justificació de l'ajut a la consolidació d'empreses de persones donades d'alta al règim especial de treballadors
    autònoms Les persones beneficiàries de l'ajut a la consolidació d'empreses de persones donades d'alta al règim especial
    de treballadors autònoms.
  sentences:
  - Preinscripció a la Fira d'Art de Sitges Amb l’objectiu de fomentar la participació d’artistes plàstics d’arreu de Catalunya,
    anualment s'organitza la Fira d'Art. Ubicada al carrer de Port Alegre (Platja de Sant Sebastià), els artistes (dibuix,
    pintura, gravat i escultura) poden exposar i vendre les seves obres.
  - 'Llicència ambiental (Annex II) Mitjançant la Llicència ambiental la persona interessada sol·licita a l’Ajuntament l’inici
    o modificació substancial d’una activitat econòmica, de les incloses en l’annex II de la Llei 20/2009, de prevenció i
    control ambiental de les activitats (LPCAA), i hi adjunta el projecte tècnic acreditatiu del compliment dels requisits
    necessaris que estableix la normativa vigent per a l’exercici de l’activitat. Aquestes activitats se subdivideixen en:
    Activitats sotmeses a una llicència ambiental amb declaració d’impacte ambiental Activitats sotmeses a una llicència ambiental
    i a un procés de decisió prèvia sobre la necessitat de declaració d’impacte ambiental i a avaluació d’impacte ambiental
    simplificada Activitats sotmeses a una llicència ambiental sense necessitat de sotmetre’s a cap procés d’avaluació d’impacte
    ambiental També està subjecta a llicència ambiental la modificació substancial de qualsevol activitat de l’annex II de
    la LPCAA, amb els mateixos procediments, documentació i requisits que els establerts per al seu atorgament. Amb aquest
    formulari no es poden comunicar els establiments turístics (càmpings de fins a 1500 unitats d’acamapada).'
  - 'Servei de teleassistència El sistema de teleassistència o telealarma consisteix en un dispositiu que es facilita a persones
    grans o discapacitades, que viuen soles permanentment o durant gran part del dia, o bé que viuen amb altres persones que
    presenten idèntiques característiques d''edat o discapacitat. Aquest sistema permet: Connectar fàcilment amb la central
    receptora d’alarmes les 24 hores del dia, els 365 dies de l’any facilitant la connexió immediata la línia telefònica i
    d’una manera còmoda i ràpida. Només cal prémer un botó. Sistema de mans lliures, que permet poder establir contacte verbal
    sense necessitat de despenjar cap telèfon ni d’acostar-se al terminal teleassistència. Mobilització dels recursos que
    existeixen a la localitat, mitjançant un fitxer actualitzat per avís d’ambulància o metge en cas d’urgència i coordinació
    amb els recursos de la comunitat per a l’atenció d’emergències socials, caigudes,.... Mobilització dels recursos propis
    de l’usuari. Custòdia de claus Etc. Donat que la disponibilitat d''aparells és limitada, les sol·licituds es prioritzaran
    en funció del grau de necessitat de l''usuari/ària. A aquests efectes es valorarà per part dels Serveis Socials municipals
    el grau d''autonomia personal, la situació de solitud i els ingressos de la unitat familiar (vegeu l''ordenança reguladora
    del preu públic).'
- source_sentence: Instal·lació de parada a la Fira de la Vila del Llibre de Sitges L'Ajuntament de Sitges, sota el paraigua
    de la marca cultural registrada Vila del Llibre, organitza la Fira de la Vila del Llibre de Sitges consistent en un conjunt
    de parades instal·lades al Passeig Marítim, dedicades exclusivament a la venda de llibres i activitats relacionades amb
    les arts del llibre (il·lustració, enquadernació, gravat…), ocupades per empreses del sector i entitats culturals, amb
    activitat editorial acreditada.
  sentences:
  - Queixes, observacions i suggeriments  Descripció
  - Confirmació de continuïtat de residència al municipi de persones estrangeres no obligades a renovar la seva inscripció
    padronal Les persones estrangeres amb ciutadania d'estats de la Unió Europea, o de l'Espai Econòmic Europeu, o amb targeta
    de residència de règim comunitari o de llarga durada, estan obligades a comunicar la seva continuïtat de residència al
    municipi de Sitges cada cinc anys, o cada dos en cas de no constar inscrites al Registre Central d'Estrangers, a comptar
    des de la darrera inscripció padronal. La no confirmació durant el període establert suposa l'inici d'un expedient de
    baixa en el Padró Municipal d'Habitants.
  - 'Llicència d''obra menor La realització d’obres està subjecta a l’obtenció d’una llicència atorgada per l’Ajuntament.
    S’estableixen tres tipus de llicència segons la magnitud de l’obra a realitzar: TIPUS A Construcció de piscines (comunitàries
    o particulars) Reparació / rehabilitació d’edificis i façanes en general i especialment d’edificis afectats per patologies
    Modificació de la coberta dels edificis amb augment de volum però sense augment de superfície construïda Actuacions puntuals
    que afectin o alterin l’estructura i / o fonaments de l’edifici Obres que modifiquin les instal·lacions o serveis dels
    espais comuns d’un edifici plurifamiliar Moviments de terres no inclosos en altres llicències Enderrocs parcials Murs
    de contenció de terres Formació de lavabos en locals comercials i magatzems Instal·lació d’aparells elevadors, ascensors
    i aparells mecànics en edificacions existents L''acumulació de residus i el dipòsit de materials que alterin les característiques
    del paisatge. Construcció o instal·lació de cisternes que afectin l''estat de càrregues de l''edifici. Canvis de distribució
    puntual interior (en locals i habitatges) sense afectar elements estructurals. TIPUS B Col·locació de bastides a una alçada
    superior a PB + 1 PP o a més de 6,00 m Arrebossat, estucat i pintat de façanes que necessiten una bastida amb una alçada
    superior a PB + 1 PP o a més de 6,00 m. Noves obertures ( finestres o portes ) o modificacions de les dimensions existents
    Reparació de balcons o elements sortints Construcció d’envans pluvials Construcció de pous i foses sèptiques Estintolament
    de façanes Construcció o modificació de tanques que requereixin obra. Reparació de sostres i terrats sense afectar elements
    estructurals. TIPUS C Obertures per a tub extractor Instal·lació d''aparells d''aire condicionat o d''altres similars
    Instal·lació d''antenes parabòl·liques Formació de barbacoes Col·locació de portes, finestres, persianes i reixes en obertures
    de façana Co·locació i/o canvi de paviments i escales a l''exterior de l''edifici Arrebossat, estucat i pintat de façanes
    que no necessiten una bastida amb una alçada inferior a PB + 1 PP o menys de 6.00 m Construcció, reparació i substitució
    de canonades de desguàs i claveguerons a l''exterior de l''edifici (sense bastida). Tala d''arbres'
- source_sentence: 'Ajuts per a fomentar la contractació laboral de persones i millora de l''ocupació Els ajuts tenen com
    a objectiu millorar l''ocupabilitat i la inserció de persones en situació d''atur o parades incentivant la contractació
    de qualitat. Podran sol·licitar l''ajut aquelles persones físiques o jurídiques, persones autònomes o empreses, amb seu
    fiscal al municipi o fora però amb centre de treball a Sitges, i entitats sense ànim de lucre del municipi de Sitges també
    legalment constituïdes i inscrites en els registres pertinents, que hagin realitzat contractacions de personal per compte
    d''altri durant el període de l''1 de juliol de 2023 al 30 de juny de 2024. Resten fora d’aquesta convocatòria les empreses
    de treball temporal. Els contractes que donaran dret a ser declarada beneficiària de l’ajut seran els formalitzats des
    del seu inici com a contractes indefinits o fixes discontinus o bé per conversió de contractes temporals en contractes
    indefinits o fixes discontinus. Queden exclosos els contractes d’alta direcció i les contractacions a familiars: a cònjuges,
    ascendents, descendents i parents fins a segon grau. Únicament es prendran en consideració per a l’ajut econòmic les despeses
    derivades de la contractació de personal (retribucions i quotes empresarials a la seguretat social). Les quanties dels
    ajuts no podran excedir del 50 % dels costos derivats de la contractació. S''estableixen els seguents imports màxims a
    percebre segons les modalitats de contractació: De 3.000,00 € per als contractes de treball indefinits, fixos discontinus
    o conversió de contractes temporals a indefinits amb jornada de treball del 100%, els quals la persona contractada estigui
    inclosa dins del col·lectius vulnerables pel Servei Públic d''Ocupació Estatal (SEPE). De 2.000,00 € per als contractes
    de treball indefinits, fixos discontinus o conversió de contractes temporals a indefinits amb jornada de treball del 100%
    per a la resta de col·lectius. L’import es reduirà proporcionalment per aquells contractes celebrats com a fixes discontinus
    en funció del percentatge d’activitat econòmica feta durant l’any natural. Igualment es reduirà l’import per aquells contractes
    celebrats a temps parcial. En ambdós casos el percentatge per poder optar a l’ajut serà el resultant d’aplicar el percentatge
    d’activitat econòmica com el percentatge per temps parcial, i haurà de ser igual o superior al 50,00 %. Només es poden
    presentar dues contractacions En cas que dues contractacions donin dret a l''ajut econòmic, l''import màxim a percebre
    per a totes les contractacions serà de 3.000,00 €.'
  sentences:
  - Acceptació / Renúncia Ajuts per a la creació de noves empreses per persones donades d'alta al règim especial de treballadors
    autònoms  Descripció
  - Comunicació prèvia de primera utilització i ocupació d'edificis i instal·lacions Aquest tràmit permet comunicar a l'Ajuntament
    de Sitges la finalització de les obres de nova construcció, o bé aquelles que hagin estat objecte de modificació substancial
    o d'ampliació quan per a l’autorització de les obres s’hagi exigit un projecte tècnic i a l’empara d’una llicència urbanística
    d’obra major. Simultàniament, s'acordarà el retorn de la quantia en concepte de garanties o avals dipositats, si escau.
  - 'Ajuts per a fomentar l''emprenedoria i la creació de noves empreses Són ajuts destinats únicament a cobrir les despeses
    inicials necessàries per a la posada en marxa del negoci. Les despeses subvencionables seran únicament aquelles estrictament
    necessàries per a la posada en marxa del negoci com ara: despeses de constitució, reformes del local, inversió inicial
    en tecnologia, desenvolupament de la web corporativa, desenvolupament d’aplicacions de venda on line, fiança, assegurances,
    registre de marques i patents, ... L’import de la subvenció serà com a màxim el 80% de la factura presentada, excepte
    l’IVA de la despesa que no formarà part de la despesa finançable, amb un import màxim de l’ajut de 6.000,00 €. Amb aquest
    ajut es vol incentivar l’autoocupació i la creació d’empreses donant suport a les persones que desenvolupin la seva activitat
    professional al municipi de Sitges, les quals hagin iniciat la seva activitat econòmica entre l’1 de juliol de 2023 i
    fins el 30 de juny de 2024.'
- source_sentence: Acceptació / Renúncia Subvencions per a projectes i activitats a entitats de l'àmbit de polítiques socials  Descripció
  sentences:
  - 'Subvencions per al desenvolupament i/o consolidació de sectors econòmics del municipi Subvencions per a entitats destinades
    a fomentar el desenvolupament i la consolidació de sectors econòmics locals. L''objectiu és impulsar iniciatives per millorar
    la competitivitat, la generació d''ocupació i potenciar el naixement de nous sectors econòmics en el municipi i l’enfortiment
    dels existents, contribuint així al creixement econòmic sostenible i al benestar de la comunitat. Per valorar l’interès
    de la proposta es tindrà en compte: Tipus d’activitat Antecedents Dates de celebració Accions de promoció dutes a terme
    des de l’organització'
  - Autorització d'accés a les àrees de vianants Permet obtenir l'autorització municipal per l'accés de vehicles a les àrees
    restringides a vianants establer-tes al municipi (actualment nucli de Garraf i Platja de Sant Sebastià). Les persones
    interessades poden presentar aquesta sol·lictud, i en cas de compliment dels requisits establerts (persones residents,
    titulars de plaça d'aparcament, autotaxis, establiments hotelers), se'ls traslladarà la resolució d’autorització.
  - Declaració de baixa de la Taxa pel servei municipal complementari de recollida, tractament i eliminació de residus comercials
    Declaració tributària mitjançant la qual es sol·licita la baixa d'una activitat de la Taxa pel servei municipal complementari
    de recollida, tractament i eliminació de residus comercials .
