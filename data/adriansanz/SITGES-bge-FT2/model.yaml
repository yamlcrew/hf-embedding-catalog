    - Queixes, observacions i suggeriments  Descripció
    - Confirmació de continuïtat de residència al municipi de persones estrangeres no obligades a renovar la seva inscripció
      padronal Les persones estrangeres amb ciutadania d'estats de la Unió Europea, o de l'Espai Econòmic Europeu, o amb targeta
      de residència de règim comunitari o de llarga durada, estan obligades a comunicar la seva continuïtat de residència
      al municipi de Sitges cada cinc anys, o cada dos en cas de no constar inscrites al Registre Central d'Estrangers, a
      comptar des de la darrera inscripció padronal. La no confirmació durant el període establert suposa l'inici d'un expedient
      de baixa en el Padró Municipal d'Habitants.
    - 'Llicència d''obra menor La realització d’obres està subjecta a l’obtenció d’una llicència atorgada per l’Ajuntament.
      S’estableixen tres tipus de llicència segons la magnitud de l’obra a realitzar: TIPUS A Construcció de piscines (comunitàries
      o particulars) Reparació / rehabilitació d’edificis i façanes en general i especialment d’edificis afectats per patologies
      Modificació de la coberta dels edificis amb augment de volum però sense augment de superfície construïda Actuacions
      puntuals que afectin o alterin l’estructura i / o fonaments de l’edifici Obres que modifiquin les instal·lacions o serveis
      dels espais comuns d’un edifici plurifamiliar Moviments de terres no inclosos en altres llicències Enderrocs parcials
      Murs de contenció de terres Formació de lavabos en locals comercials i magatzems Instal·lació d’aparells elevadors,
      ascensors i aparells mecànics en edificacions existents L''acumulació de residus i el dipòsit de materials que alterin
      les característiques del paisatge. Construcció o instal·lació de cisternes que afectin l''estat de càrregues de l''edifici.
      Canvis de distribució puntual interior (en locals i habitatges) sense afectar elements estructurals. TIPUS B Col·locació
      de bastides a una alçada superior a PB + 1 PP o a més de 6,00 m Arrebossat, estucat i pintat de façanes que necessiten
      una bastida amb una alçada superior a PB + 1 PP o a més de 6,00 m. Noves obertures ( finestres o portes ) o modificacions
      de les dimensions existents Reparació de balcons o elements sortints Construcció d’envans pluvials Construcció de pous
      i foses sèptiques Estintolament de façanes Construcció o modificació de tanques que requereixin obra. Reparació de sostres
      i terrats sense afectar elements estructurals. TIPUS C Obertures per a tub extractor Instal·lació d''aparells d''aire
      condicionat o d''altres similars Instal·lació d''antenes parabòl·liques Formació de barbacoes Col·locació de portes,
      finestres, persianes i reixes en obertures de façana Co·locació i/o canvi de paviments i escales a l''exterior de l''edifici
      Arrebossat, estucat i pintat de façanes que no necessiten una bastida amb una alçada inferior a PB + 1 PP o menys de
      6.00 m Construcció, reparació i substitució de canonades de desguàs i claveguerons a l''exterior de l''edifici (sense
      bastida). Tala d''arbres'
  - source_sentence: 'Ajuts per a fomentar la contractació laboral de persones i millora de l''ocupació Els ajuts tenen com
      a objectiu millorar l''ocupabilitat i la inserció de persones en situació d''atur o parades incentivant la contractació
      de qualitat. Podran sol·licitar l''ajut aquelles persones físiques o jurídiques, persones autònomes o empreses, amb
      seu fiscal al municipi o fora però amb centre de treball a Sitges, i entitats sense ànim de lucre del municipi de Sitges
      també legalment constituïdes i inscrites en els registres pertinents, que hagin realitzat contractacions de personal
      per compte d''altri durant el període de l''1 de juliol de 2023 al 30 de juny de 2024. Resten fora d’aquesta convocatòria
      les empreses de treball temporal. Els contractes que donaran dret a ser declarada beneficiària de l’ajut seran els formalitzats
      des del seu inici com a contractes indefinits o fixes discontinus o bé per conversió de contractes temporals en contractes
      indefinits o fixes discontinus. Queden exclosos els contractes d’alta direcció i les contractacions a familiars: a cònjuges,
      ascendents, descendents i parents fins a segon grau. Únicament es prendran en consideració per a l’ajut econòmic les
      despeses derivades de la contractació de personal (retribucions i quotes empresarials a la seguretat social). Les quanties
      dels ajuts no podran excedir del 50 % dels costos derivats de la contractació. S''estableixen els seguents imports màxims
      a percebre segons les modalitats de contractació: De 3.000,00 € per als contractes de treball indefinits, fixos discontinus
      o conversió de contractes temporals a indefinits amb jornada de treball del 100%, els quals la persona contractada estigui
      inclosa dins del col·lectius vulnerables pel Servei Públic d''Ocupació Estatal (SEPE). De 2.000,00 € per als contractes
      de treball indefinits, fixos discontinus o conversió de contractes temporals a indefinits amb jornada de treball del
      100% per a la resta de col·lectius. L’import es reduirà proporcionalment per aquells contractes celebrats com a fixes
      discontinus en funció del percentatge d’activitat econòmica feta durant l’any natural. Igualment es reduirà l’import
      per aquells contractes celebrats a temps parcial. En ambdós casos el percentatge per poder optar a l’ajut serà el resultant
      d’aplicar el percentatge d’activitat econòmica com el percentatge per temps parcial, i haurà de ser igual o superior
      al 50,00 %. Només es poden presentar dues contractacions En cas que dues contractacions donin dret a l''ajut econòmic,
      l''import màxim a percebre per a totes les contractacions serà de 3.000,00 €.'
    sentences:
    - Acceptació / Renúncia Ajuts per a la creació de noves empreses per persones donades d'alta al règim especial de treballadors
      autònoms  Descripció
    - Comunicació prèvia de primera utilització i ocupació d'edificis i instal·lacions Aquest tràmit permet comunicar a l'Ajuntament
      de Sitges la finalització de les obres de nova construcció, o bé aquelles que hagin estat objecte de modificació substancial
      o d'ampliació quan per a l’autorització de les obres s’hagi exigit un projecte tècnic i a l’empara d’una llicència urbanística
      d’obra major. Simultàniament, s'acordarà el retorn de la quantia en concepte de garanties o avals dipositats, si escau.
    - 'Ajuts per a fomentar l''emprenedoria i la creació de noves empreses Són ajuts destinats únicament a cobrir les despeses
      inicials necessàries per a la posada en marxa del negoci. Les despeses subvencionables seran únicament aquelles estrictament
      necessàries per a la posada en marxa del negoci com ara: despeses de constitució, reformes del local, inversió inicial
      en tecnologia, desenvolupament de la web corporativa, desenvolupament d’aplicacions de venda on line, fiança, assegurances,
      registre de marques i patents, ... L’import de la subvenció serà com a màxim el 80% de la factura presentada, excepte
      l’IVA de la despesa que no formarà part de la despesa finançable, amb un import màxim de l’ajut de 6.000,00 €. Amb aquest
      ajut es vol incentivar l’autoocupació i la creació d’empreses donant suport a les persones que desenvolupin la seva
      activitat professional al municipi de Sitges, les quals hagin iniciat la seva activitat econòmica entre l’1 de juliol
      de 2023 i fins el 30 de juny de 2024.'
  - source_sentence: Acceptació / Renúncia Subvencions per a projectes i activitats a entitats de l'àmbit de polítiques socials  Descripció
    sentences:
    - 'Subvencions per al desenvolupament i/o consolidació de sectors econòmics del municipi Subvencions per a entitats destinades
      a fomentar el desenvolupament i la consolidació de sectors econòmics locals. L''objectiu és impulsar iniciatives per
      millorar la competitivitat, la generació d''ocupació i potenciar el naixement de nous sectors econòmics en el municipi
      i l’enfortiment dels existents, contribuint així al creixement econòmic sostenible i al benestar de la comunitat. Per
      valorar l’interès de la proposta es tindrà en compte: Tipus d’activitat Antecedents Dates de celebració Accions de promoció
      dutes a terme des de l’organització'
    - Autorització d'accés a les àrees de vianants Permet obtenir l'autorització municipal per l'accés de vehicles a les àrees
      restringides a vianants establer-tes al municipi (actualment nucli de Garraf i Platja de Sant Sebastià). Les persones
      interessades poden presentar aquesta sol·lictud, i en cas de compliment dels requisits establerts (persones residents,
      titulars de plaça d'aparcament, autotaxis, establiments hotelers), se'ls traslladarà la resolució d’autorització.
    - Declaració de baixa de la Taxa pel servei municipal complementari de recollida, tractament i eliminació de residus comercials
      Declaració tributària mitjançant la qual es sol·licita la baixa d'una activitat de la Taxa pel servei municipal complementari
      de recollida, tractament i eliminació de residus comercials .
