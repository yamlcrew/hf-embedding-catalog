widgetData:
- source_sentence: Caldrà executar l'obra comunicada prèviament d'acord amb les condicions específiques que es contenen en
    el model normalitzat CT02.
  sentences:
  - Quin és el propòsit de la instal·lació d'un circ sense animals a la via pública?
  - Quin és el destinatari de les dades bloquejades?
  - Quin és el format de presentació de la comunicació prèvia?
- source_sentence: Armes utilitzables en activitats lúdico-esportives d’airsoft i paintball...
  sentences:
  - Quin és el paper de l'AFA en la venda de llibres?
  - Quin és el benefici de tenir dades personals correctes?
  - Quin és el tipus d'activitats que es poden practicar amb les armes de 4a categoria?
- source_sentence: En les activitats sotmeses al règim d’autorització ambiental o llicència municipal d’activitat (Annex I
    o Annex II de la Llei 20/2009) cal demanar aquest certificat previ a la presentació de la sol·licitud d’autorització ambiental
    o llicència municipal.
  sentences:
  - Quin és el benefici de tenir el certificat de compatibilitat urbanística en les activitats sotmeses a llicència municipal
    d’activitat?
  - Com puc controlar la recepció de propaganda electoral per correu?
  - Quin és el benefici de la cessió d'un compostador domèstic per a l'entorn?
- source_sentence: La persona interessada posa en coneixement de l’Administració, les actuacions urbanístiques que pretén
    dur a terme consistents en l'apuntalament o reforç provisional d'estructures existents fins a la intervenció definitiva.
  sentences:
  - Qui pot participar en el Consell d'Adolescents?
  - Quin és el resultat de la presentació de la comunicació prèvia?
  - Quin és el paper de la persona interessada en relació amb la presentació de la comunicació prèvia?
- source_sentence: La persona consumidora presenti la reclamació davant de l'entitat acreditada en un termini superior a un
    any des de la data en què va presentar la reclamació a l'empresa.
  sentences:
  - Quin és el tràmit per inscriure'm al Padró d'Habitants sense tenir constància de la meva anterior residència?
  - Quin és el resultat de la modificació substancial de la llicència d'obres en relació a les autoritzacions administratives?
  - Quin és el paper de l'entitat acreditada en la tramitació d'una reclamació?
