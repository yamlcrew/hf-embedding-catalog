widgetData:
- source_sentence: La inscripció en aquest registre caduca en el termini d'un any, llevat que sigui renovada abans del transcurs
    d'aquest termini mitjançant la presentació d'una declaració responsable sobre el compliment dels requisits exigits.
  sentences:
  - Quin és el requisit per a la sol·licitud del volant d'empadronament?
  - Què passa si no es renova la inscripció en el Registre municipal de sol·licitants?
  - Quin és el segon objectiu que han de tenir els projectes/activitats per a rebre aquesta subvenció?
- source_sentence: 'AVÍS: Places exhaurides de l''activitat de psicomotricitat fins nou avís. Les persones interessades poden
    contactar amb el Departament d''Esports, el qual obrirà un llistat d''espera, si escau.'
  sentences:
  - Què passa si les places de Psicomotricitat estan exhaurides?
  - Quin és el paper del tractament en la declaració?
  - Quin és el període de temps que es requereix per a la venda d'articles d'artesania?
- source_sentence: El registre de noves patents en relació a les noves línies d’actuació és una despesa subvencionable per
    a la reactivació i adaptació del negoci post COVID19.
  sentences:
  - Quins són els tipus de despeses que es poden finançar amb les subvencions?
  - Quin és el paper de les organitzacions membres del Consell de Cooperació en els projectes de cooperació internacional?
  - Quin és el propòsit del registre de noves patents en relació a les noves línies d’actuació?
- source_sentence: 'Justificació de les subvencions atorgades per l''Ajuntament de Sitges per les activitats culturals incloses
    dins els següents tipus: Activitats de difusió cultural. Iniciatives de recuperació i difusió del patrimoni cultural,
    tradicional i popular. Activitats de formació no reglada i de recerca. Activitats d''animació socio-cultural.'
  sentences:
  - Quins són els residus que es recullen en el servei municipal complementari?
  - Quin és el paper de l'expedient d'ajut a la contractació laboral de persones en la contractació laboral?
  - Quin és el paper de les activitats d'animació socio-cultural?
- source_sentence: La comunicació és un element important en la cura dels gats, ja que implica la capacitat per a comunicar-se
    de manera efectiva amb les autoritats competents i amb els altres implicats en la cura dels animals.
  sentences:
  - Qui són considerats titulars o nous exercents en el cas dels espectacles, establiments oberts al públic i les activitats
    recreatives?
  - Quin és el paper de la comunicació en la cura dels gats?
  - Quin és el benefici de la llicència de gual per a la persona titular?
