widgetData:
- source_sentence: Aquest tràmit permet a la nova persona titular sol·licitar el canvi de nom d'una llicència de gual, sempre
    que no variïn la utilització ni les característiques de la llicència concedida prèviament, i s’acompleixen les ordenances
    vigents.
  sentences:
  - Quin és el resultat de la presentació del tràmit de comunicació d'inici i modificació substancial d'activitat en un establiment?
  - Quin és el benefici per a les entitats especialitzades de la gestió delegada?
  - Necessito canviar el titular de la meva llicència de gual
- source_sentence: Mitjançant aquest tràmit la persona interessada posa en coneixement de l'Ajuntament l'inici o modificació
    substancial d'una activitat econòmica, de les incloses en l'annex de la Llei de facilitació de l'activitat econòmica,
    i hi adjunta el projecte i el certificat tècnic acreditatiu del compliment dels requisits necessaris que estableix la
    normativa vigent per a l'exercici de l'activitat.
  sentences:
  - Quins canvis es poden fer en els tanques?
  - Què és necessari per gaudir d'exempció de les taxes per recollida d'escombraries?
  - Quin és el resultat de la presentació del certificat tècnic acreditatiu?
- source_sentence: La instal·lació i utilització d’una grua torre està subjecta a l’obtenció d’una llicència municipal.
  sentences:
  - Quin és el propòsit de la Declaració de baixa de la Taxa pel servei municipal complementari de recollida, tractament i
    eliminació de residus comercials?
  - Quin és el paper de la persona beneficiària en el pagament de l'ajut de lloguer just?
  - Què és necessari per a la instal·lació i utilització d'una grua torre?
- source_sentence: El procediment d'adjudicació serà mitjançant concurs públic, amb la presentació de la sol·licitud dins
    del termini establert per cada convocatòria, amb la priorització de casos amb seguiment social i educatiu a persones i
    famílies en situació de vulnerabilitat social i econòmica.
  sentences:
  - Quins són els casos que tenen prioritat en l'adjudicació dels habitatges del Fons d'Habitatges d'Inclusió Social?
  - Quin és el paper del certificat del nombre d'habitatges en el tràmit d'obertura d'una oficina de farmàcia?
  - Quin és el paper de la Junta de Govern Local en relació amb les garanties?
- source_sentence: Els comerciants locals han de sol·licitar els ajuts per al projecte de la targeta de fidelització dins
    del termini establert per l'Ajuntament de Sitges.
  sentences:
  - Quin és el paper de la persona cuidadora en la gestió de les emergències en la colònia felina?
  - Quin és el termini perquè els comerciants locals puguin sol·licitar els ajuts per al projecte de la targeta de fidelització?
  - Quin és el règim especial al qual han d'estar inscrites les persones per rebre els ajuts?
