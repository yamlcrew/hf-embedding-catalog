widgetData:
- source_sentence: L'Espai d'escalada és una instal·lació municipal en forma de túnel a una sala interior, amb una llargada
    de 10m, una amplada de 4,6m i una alçada de 4m.
  sentences:
  - Quin és el registre on es comprova la inscripció dels estrangers amb ciutadania de l'Espai Econòmic Europeu?
  - On es pot trobar les bases generals de les convocatòries de selecció de personal de l'Ajuntament?
  - Quina és la llargada de l'Espai d'Escalada?
- source_sentence: Les activitats s’organitzen per setmanes.
  sentences:
  - Quin és el format en què es desenvolupen les activitats de l'Estiu Jove?
  - Quin és el paper del subjecte passiu en la gestió de pagaments?
  - Quin és el benefici de les subvencions?
- source_sentence: Les Estades Esportives cerquen que els infants aprenguin a relacionar-se i a compartir mitjançant l'esport,
    experiències i vivències amb d'altres infants amb qui no estan en contacte durant la resta de l'any.
  sentences:
  - Quin és el propòsit de l'ajut per a la creació de noves empreses?
  - Quin és el propòsit de la llicència de parcel·lació?
  - Quin és el benefici principal de les Estades Esportives?
- source_sentence: Declaració tributària mitjançant la qual es sol·licita la baixa d'una activitat de la Taxa pel servei municipal
    complementari de recollida, tractament i eliminació de residus comercials.
  sentences:
  - Quin és el format de la Declaració de baixa?
  - Quin és el resultat de justificar una sol·licitud de canvi a les estades esportives?
  - Quin és el període de celebració de la Fira d'Art de Sitges?
- source_sentence: Les entitats inscrites en el Registre resten obligades a comunicar a l’Ajuntament qualsevol modificació
    en les seves dades registrals, podent sol·licitar la seva cancel·lació o comunicant la seva dissolució.
  sentences:
  - Quin és el procediment per cancel·lar la inscripció d'una entitat al Registre municipal d'entitats?
  - Quin és el propòsit de la quota del servei de les Llars d'Infants Municipals?
  - Quin és el paper de les entitats de protecció dels animals en la gestió de les colònies urbanes felines?
