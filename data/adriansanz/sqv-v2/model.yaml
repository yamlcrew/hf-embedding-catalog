- source_sentence: L'aportació de residus a la Deixalleria municipal us permet obtenir una bonificació de la taxa de residus
    del 15%.
  sentences:
  - Quin és el benefici de la Deixalleria municipal?
  - Quin és el benefici de tenir un volant de convivència?
  - Quin és el benefici de tenir el certificat del nombre d’habitants i habitatges del Padró d’Habitants?
- source_sentence: La presentació de la comunicació prèvia, acompanyada de la documentació exigida, habilita a la persona
