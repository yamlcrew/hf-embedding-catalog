widgetData:
- source_sentence: Comunicació prèvia per l'execució de cales, pous i sondejos, en terreny privat, previs a l'actuació definitiva.
  sentences:
  - Quin és el requisit per a l'execució de les obres en terreny privat?
  - Quin és el propòsit del tràmit de rectificació de dades personals?
  - Quin és el requisit per a la crema en zones de conservació?
- source_sentence: En el mateix tràmit també es pot actualitzar el canvi de domicili o dades personals, si escau.
  sentences:
  - Quins tributs puc domiciliar amb aquest tràmit?
  - Quin és el compromís del titular de l'activitat en la Declaració responsable?
  - Quin és el tràmit que permet actualitzar les dades personals?
- source_sentence: El reconeixement administratiu del dret comunicat es produeix salvat el dret de propietat, sens perjudici
    del de tercers ni de les competències d’altres organismes i administracions.
  sentences:
  - Quin és el tràmit que permet una major transparència en la gestió dels animals domèstics?
  - Quin és el requisit per considerar una tala de masses arbòries?
  - Quin és el reconeixement administratiu del dret comunicat?
- source_sentence: El seu objecte és que -prèviament a la seva execució material- l'Ajuntament comprovi l'adequació de l’actuació
    a la normativa i planejament, així com a les ordenances municipals.
  sentences:
  - Quin és el resultat de rectificar les meves dades personals?
  - Quin és el paper de les llicències urbanístiques en la instal·lació de construccions auxiliars o mòduls prefabricats?
  - Quin és l'objectiu de l'Ajuntament en aquest tràmit?
- source_sentence: 'Permet sol·licitar l’autorització per a l’ús comú especial de la via pública per a reserves temporals
    d’estacionament i espai públic per: càrrega/descàrrega de materials diversos davant d''una obra;'
  sentences:
  - Quin és el propòsit de les actuacions de manteniment d'elements de façana i cobertes?
  - Quin és el tràmit per canviar el domicili del permís de conducció i del permís de circulació?
  - Quins són els materials que es poden càrregar/descarregar en l'ocupació i reserves temporals amb càrrega/descàrrega de
    materials?
