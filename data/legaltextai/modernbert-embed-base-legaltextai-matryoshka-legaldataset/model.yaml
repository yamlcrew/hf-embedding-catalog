      .


       


       


       


      6.2


      Federal-based liability


       


      In additional to state-based liability, traders trading on the basis of inside information may also be liable under
      the federal securities laws. Federal insider trading liability carries with it potentially both civil and criminal liability.
      Like state-based liability, federal liability for insider trading is derived from the common law. There is no federal
      statute that explicitly prohibits insider trading. Rather, courts have interpreted Section 10b of the Securities Act
      of 1934, the Act’s anti-fraud provision, as prohibiting insider trading.


       


       


       


       


      6.2.1


      Rule 10b-5


       


      § 240.10b-5 Employment of manipulative and deceptive devices.


      It shall be unlawful for any person, directly or indirectly, by the use of any means or instrumentality of interstate
      commerce, or of the mails or of any facility of any national securities exchange,


           (a) To employ any device, scheme, or artifice to defraud,

           (b) To make any untrue statement of a material fact or to omit to state a material fact necessary in order to make
      the statements made, in the light of the circumstances under which they were made, not misleading, or

           (c) To engage in any act, practice, or course of business which operates or would operate as a fraud or deceit
      upon any person,


      in connection with the purchase or sale of any security.


       


       


       


      6.2.2


      SEC v. Texas Gulf Sulphur Co.


       


      The following case, Texas Gulf Sulphur is an early federal insider trading case. In TGS, the court starts from the position
      that insiders, as fiduciaries, have an obligation not to use the corporation’s information for their personal benefit.
      As fiduciaries, insiders have an obligation to “disclose” the confidential inside information, or “abstain from trading”
      while in possession of the corporation’s material, confidential inside information. Questions arise as to what information
      is material and when is information no longer confidential such that an insider may freely trade on it.


       


      United States Court of Appeals for the Second Circuit


      401 F.2d 833


      No. 296, Docket 30882


      1968-08-13


      401 F.2d 833 (1968)


      SECURITIES AND EXCHANGE COMMISSION,  v. TEXAS GULF SULPHUR CO.[ … ][ … ]


      o us.


      THE FACTUAL SETTING


      This action derives from the exploratory activities of TGS begun in 1957 on the Canadian Shield in eastern Canada. In
      March of 1959, aerial geophysical surveys were conducted over more than 15,000 square miles of this area by a group
      led by defendant Mollison, a mining engineer and a Vice President of TGS. The group included defendant Holyk, TGS''s
      chief geologist, defendant Clayton, an electrical engineer and geophysicist, and defendant Darke, a geologist. These
      operations resulted in the detection of numerous anomalies, i. e., extraordinary variations in the conductivity of rocks,
      one of which was on the Kidd 55 segment of land located near Timmins, Ontario.


      On October 29 and 30, 1963, Clayton conducted a ground geophysical survey on the northeast portion of the Kidd 55 segment
      which confirmed the presence of an anomaly and indicated the necessity of diamond core drilling for further evaluation.'
    - '6.5.2


      Cases


       


       


       


       


      6.5.2.1


      United States v. Algernon Blair, Inc. (1973)


       


      United States Court of Appeals for the Fourth Circuit


      479 F.2d 638


      No. 72-2443


      1973-06-14


      479 F.2d 638 (1973)


      UNITED STATES of America, for the use of Coastal Steel Erectors, Inc., Appellant,

      v.

      ALGERNON BLAIR, INCORPORATED, and United States Fidelity and Guaranty Company, Appellees.


      No. 72-2443.


      United States Court of Appeals, Fourth Circuit.


      Argued May 9, 1973.


      Decided June 14, 1973.


      [ … ]


      CRAVEN, Circuit Judge:


      May a subcontractor, who justifiably ceases work under a contract because of the prime contractor''s breach, recover
      in quantum meruit the value of labor and equipment already furnished pursuant to the contract irrespective of whether
      he would have been entitled to recover in a suit on the contract? We think so, and, for reasons to be stated, the decision
      of the district court will be reversed.


      The subcontractor, Coastal Steel Erectors, Inc., brought this action under the provisions of the Miller Act, 40 U.S.C.A.
      § 270a et seq., in the name of the United States against Algernon Blair, Inc., and its surety, United States Fidelity
      and Guaranty Company. Blair had entered a contract with the United States for the construction of a naval hospital in
      Charleston County, South Carolina. Blair had then contracted with Coastal to perform certain steel erection and supply
      certain equipment in conjunction with Blair''s contract with the United States. Coastal commenced performance of its
      obligations, supplying its own cranes for handling and placing steel. Blair refused to pay for crane rental, maintaining
      that it was not obligated to do so under the subcontract. Because of Blair''s failure to make payments for crane rental,
      and after completion of approximately 28 percent of the subcontract, Coastal terminated its performance. Blair then
      proceeded to complete the job with a new subcontractor. Coastal brought this action to recover for labor and equipment
      furnished.


      The district court found that the subcontract required Blair to pay for crane use and that Blair''s refusal to do so
      was such a material breach as to justify Coastal''s terminating performance. This finding is not questioned on appeal.
      The court then found that under the contract the amount due Coastal, less what had already been paid, totaled approximately
      $37,000. Additionally, the court found Coastal would have lost more than $37,000 if it had completed performance. Holding
      that any amount due Coastal must be reduced by any loss it would have incurred by complete performance of the contract,
      the court denied recovery to Coastal. While the district court correctly stated the "`normal'' rule of contract damages,"[1]
      we think Coastal is entitled to recover in quantum meruit.[2]


      [ … ]


      that the complaint is not clear in regard to the theory of a plaintiff''s recovery does not preclude recovery under
      quantum meruit. [ … ] A plaintiff may join a claim for quantum meruit with a claim for damages from breach of contract.[5]


      In the present case, Coastal has, at its own expense, provided Blair with labor and the use of equipment. Blair, who
      breached the subcontract, has retained these benefits without having fully paid for them. On these facts, Coastal is
      entitled to restitution in quantum meruit.


      [ … ]


      The impact of quantum meruit is to allow a promisee to recover the value of services he gave to the defendant irrespective
      of whether he would have lost money on the contract and been unable to recover in a suit on the contract. [ … ] The
      measure of recovery for quantum meruit is the reasonable value of the performance, Restatement of Contracts § 347 (1932);
      and recovery is undiminished by any loss which would have been incurred by complete performance. 12 Williston on Contracts
      § 1485, at 312 (3d ed. 1970). While the contract price may be evidence of reasonable value of the services, it does
      not measure the value of the performance or limit recovery.[7] Rather, the standard for measuring the reasonable value
      of the services rendered is the amount for which such services could have been purchased from one in the plaintiff''s
      position at the time and place the services were rendered.[8]


      Since the district court has not yet accurately determined the reasonable value of the labor and equipment use furnished
      by Coastal to Blair, the case must be remanded for those findings.'
