      Committee Notes on Rules—2014 Amendment


      Changes Made After Publication and Comment. No changes were made after publication and comment.


      Amendment by Public Law


      1975 —Exception (23). Pub. L. 94–149 inserted a comma immediately after “family” in catchline.


       


      The Rule has been amended to clarify that if the proponent has established the stated requirements of the exception--regular
      business with regularly kept record, source with personal knowledge, record made timely, and foundation testimony or
      certification--then the burden is on the opponent to show that the source of information or the method or circumstances
      of preparation indicate a lack of trustworthiness. While most courts have imposed that burden on the opponent, some
      have not. It is appropriate to impose this burden on opponent, as the basic admissibility requirements are sufficient
      to establish a presumption that the record is reliable.


      The opponent, in meeting its burden, is not necessarily required to introduce affirmative evidence of untrustworthiness.
      For example, the opponent might argue that a record was prepared in anticipation of litigation and is favorable to the
      preparing party without needing to introduce evidence on the point. A determination of untrustworthiness necessarily
      depends on the circumstances.


      Changes Made After Publication and Comment


      In accordance with a public comment, a slight change was made to the Committee Note to better track the language of
      the rule.


      The Rule has been amended to clarify that if the proponent has established the stated requirements of the exception--set
      forth in Rule 803(6)--then the burden is on the opponent to show that the possible source of the information or other
      circumstances indicate a lack of trustworthiness. The amendment maintains consistency with the proposed amendment to
      the trustworthiness clause of Rule 803(6).


      Changes Made After Publication and Comment


      In accordance with a public comment, a slight change was made to the Committee Note to better track the language of
      the rule.


      The Rule has been amended to clarify that if the proponent has established that the record meets the stated requirements
      of the exception--prepared by a public office and setting out information as specified in the Rule--then the burden
      is on the opponent to show that the source of information or other circumstances indicate a lack of trustworthiness.
      While most courts have imposed that burden on the opponent, some have not. Public records have justifiably carried a
      presumption of reliability, and it should be up to the opponent to “demonstrate why a time-tested and carefully considered
      presumption is not appropriate.” Ellis v. International Playtex, Inc., 745 F.2d 292, 301 (4th Cir. 1984). The amendment
      maintains consistency with the proposed amendment to the trustworthiness clause of Rule 803(6).


      The opponent, in meeting its burden, is not necessarily required to introduce affirmative evidence of untrustworthiness.
      For example, the opponent might argue that a record was prepared in anticipation of litigation and is favorable to the
