    sentences:
    - 'Although Article III expressly contemplated jurisdiction over suits between States and individuals, nothing in the
      Article or in any other part of the Constitution suggested the States could not assert immunity from private suit in
      their own courts or that Congress had the power to abrogate sovereign immunity there. . . .


      2


      [25] Our historical analysis is supported by early congressional practice, which provides "contemporaneous and weighty
      evidence of the Constitution''s meaning." Printz. [E]arly Congresses did not believe they had the power to authorize
      private suits against the States in their own courts. . . .


      3


      [26] The theory and reasoning of our earlier cases suggest the States do retain a constitutional immunity from suit
      in their own courts. We have often described the States'' immunity in sweeping terms, without reference to whether the
      suit was prosecuted in state or federal court. [citations omitted]  . . . .As it is settled doctrine that neither substantive
      federal law nor attempted congressional abrogation under Article I bars a State from raising a constitutional defense
      of sovereign immunity in federal court, our decisions suggesting that the States retain an analogous constitutional
      immunity from private suits in their own courts support the conclusion that Congress lacks the Article I power to subject
      the States to private suits in those fora.


      4


      [27] Our final consideration is whether a congressional power to subject nonconsenting States to private suits in their
      own courts is consistent with the structure of the Constitution. We look both to the essential principles of federalism
      and to the special role of the state courts in the constitutional design.


      [28] Although the Constitution grants broad powers to Congress, our federalism requires that Congress treat the States
      in a manner consistent with their status as residuary sovereigns and joint participants in the governance of the Nation.
      . . .


      [29] Petitioners contend that immunity from suit in federal court suffices to preserve the dignity of the States. Private
      suits against nonconsenting States, however, present "the indignity of subjecting a State to the coercive process of
      judicial tribunals at the instance of private parties," regardless of the forum. Not only must a State defend or default
      but also it must face the prospect of being thrust, by federal fiat and against its will, into the disfavored status
      of a debtor, subject to the power of private citizens to levy on its treasury or perhaps even government buildings or
      property which the State administers on the public''s behalf.


      [30] In some ways, of course, a congressional power to authorize private suits against nonconsenting States in their
      own courts would be even more offensive to state sovereignty than a power to authorize the suits in a federal forum.
      Although the immunity of one sovereign in the courts of another has often depended in part on comity or agreement, the
      immunity of a sovereign in its own courts has always been understood to be within the sole control of the sovereign
      itself. A power to press a State''s own courts into federal service to coerce the other branches of the State, furthermore,
      is the power first to turn the State against itself and ultimately to commandeer the entire political machinery of the
      State against its will and at the behest of individuals. . . .


      [31] It is unquestioned that the Federal Government retains its own immunity from suit not only in state tribunals but
      also in its own courts. In light of our constitutional system recognizing the essential sovereignty of the States, we
      are reluctant to conclude that the States are not entitled to a reciprocal privilege.


      [32] Underlying constitutional form are considerations of great substance. Private suits against nonconsenting States—especially
      suits for money damages—may threaten the financial integrity of the States. . . .  


      [33] A general federal power to authorize private suits for money damages would place unwarranted strain on the States''
      ability to govern in accordance with the will of their citizens. Today, as at the time of the founding, the allocation
      of scarce resources among competing needs and interests lies at the heart of the political process. While the judgment
      creditor of a State may have a legitimate claim for compensation, other important needs and worthwhile ends compete
      for access to the public fisc. Since all cannot be satisfied in full, it is inevitable that difficult decisions involving
      the most sensitive and political of judgments must be made. If the principle of representative government is to be preserved
      to the States, the balance between competing interests must be reached after deliberation by the political process established
      by the citizens of the State, not by judicial decree mandated by the Federal Government and invoked by the private citizen.
      . . . When the Federal Government asserts authority over a State''s most fundamental political processes, it strikes
      at the heart of the political accountability so essential to our liberty and republican form of government. . . .'
    - '(C) Payment of Expenses. Instead of or in addition to the orders above, the court must order the disobedient party,
      the attorney advising that party, or both to pay the reasonable expenses, including attorney’s fees, caused by the failure,
      unless the failure was substantially justified or other circumstances make an award of expenses unjust.


      (c) Failure to Disclose, to Supplement an Earlier Response, or to Admit.


      (1) Failure to Disclose or Supplement. If a party fails to provide information or identify a witness as required by
      Rule 26(a) or (e), the party is not allowed to use that information or witness to supply evidence on a motion, at a
      hearing, or at a trial, unless the failure was substantially justified or is harmless. In addition to or instead of
      this sanction, the court, on motion and after giving an opportunity to be heard:


      (A) may order payment of the reasonable expenses, including attorney’s fees, caused by the failure;


      (B) may inform the jury of the party’s failure; and


      (C) may impose other appropriate sanctions, including any of the orders listed in Rule 37(b)(2)(A)(i)–(vi).


      (2) Failure to Admit. If a party fails to admit what is requested under Rule 36 and if the requesting party later proves
      a document to be genuine or the matter true, the requesting party may move that the party who failed to admit pay the
      reasonable expenses, including attorney’s fees, incurred in making that proof. The court must so order unless:


      (A) the request was held objectionable under Rule 36(a);


      (B) the admission sought was of no substantial importance;


      (C) the party failing to admit had a reasonable ground to believe that it might prevail on the matter; or


      (D) there was other good reason for the failure to admit.


      (d) Party’s Failure to Attend Its Own Deposition, Serve Answers to Interrogatories, or Respond to a Request for Inspection.


      (1) In General.


      (A) Motion; Grounds for Sanctions. The court where the action is pending may, on motion, order sanctions if:


      (i) a party or a party’s officer, director, or managing agent—or a person designated under Rule 30(b)(6) or 31(a)(4)—fails,
      after being served with proper notice, to appear for that person’s deposition; or


      (ii) a party, after being properly served with interrogatories under Rule 33 or a request for inspection under Rule
      34, fails to serve its answers, objections, or written response.


      (B) Certification. A motion for sanctions for failing to answer or respond must include a certification that the movant
      has in good faith conferred or attempted to confer with the party failing to act in an effort to obtain the answer or
      response without court action.


      (2) Unacceptable Excuse for Failing to Act. A failure described in Rule 37(d)(1)(A) is not excused on the ground that
      the discovery sought was objectionable, unless the party failing to act has a pending motion for a protective order
      under Rule 26(c).


      (3) Types of Sanctions. Sanctions may include any of the orders listed in Rule 37(b)(2)(A)(i)–(vi). Instead of or in
      addition to these sanctions, the court must require the party failing to act, the attorney advising that party, or both
      to pay the reasonable expenses, including attorney’s fees, caused by the failure, unless the failure was substantially
      justified or other circumstances make an award of expenses unjust.


      (e) Failure to Preserve Electronically Stored Information. If electronically stored information that should have been
      preserved in the anticipation or conduct of litigation is lost because a party failed to take reasonable steps to preserve
      it, and it cannot be restored or replaced through additional discovery, the court:


      (1) upon finding prejudice to another party from loss of the information, may order measures no greater than necessary
      to cure the prejudice; or


      (2) only upon finding that the party acted with the intent to deprive another party of the information’s use in the
      litigation may:


      (A) presume that the lost information was unfavorable to the party;


      (B) instruct the jury that it may or must presume the information was unfavorable to the party; or


      (C) dismiss the action or enter a default judgment.


      (f) Failure to Participate in Framing a Discovery Plan. If a party or its attorney fails to participate in good faith
      in developing and submitting a proposed discovery plan as required by Rule 26(f), the court may, after giving an opportunity
      to be heard, require that party or attorney to pay to any other party the reasonable expenses, including attorney’s
      fees, caused by the failure.'
    - 'Could the court have followed the majority rule and still afforded the optionee relief? See Note, 63 Calif. L. Rev.
      11, 126 (1965) and Sy Jack Realty Co. v. Pergament Syosset Corp., 27 N.Y.2d 449, 318 N. Y.S.2d 720, 267 N.E.2d 462 (1971).


      3. In the principal case, the optionee''s letter, though sent on time, was never received by the optionor. The general
      rule with respect to acceptances is that they are effective on dispatch even though they are lost or delayed in the
      course of transit. The leading case announcing this rule is Household Fire & Carriage Acc. Ins. Co. v. Grant, 4 Ex.
      D. 216 (1879). See also Restatement Second §56 and §63 Comment b; 37 Mich. L. Rev. 655 (1939). Do you agree with the
      rule?


       


       


       


      4.9.11


      C. Langdell, Summary of the Law of Contracts 20-21 (2d ed. 1880)


       


      C. LANGDELL, SUMMARY OF THE LAW OF CONTRACTS 20-21 (2d ed. 1880): "It has been claimed that the purposes of substantial
      justice, and the interests of contracting parties as understood by themselves, will be best served by holding that the
      contract is complete the moment the letter of acceptance is mailed; and cases have been put to show that the contrary
      view would produce not only unjust but absurd results. The true answer to this argument is, that it is irrelevant; but,
      assuming it to be relevant, it may be turned against those who use it without losing any of its strength. The only cases
      of real hardship are where there is a miscarriage of the letter of acceptance, and in those cases a hardship to one
      of the parties is inevitable. Adopting one view, the hardship consists in making one liable on a contract which he is
      ignorant of having made; adopting the other view, it consists of depriving one of the benefit of a contract which he
      supposes he has made. Between these two evils the choice would seem to be clear: the former is positive, the latter
      merely negative; the former imposes a liability to which no limit can be placed, the latter leaves everything in statu
      quo. As to making provision for the contingency of the miscarriage of a letter, this is easy for the person who sends
      it, while it is practically impossible for the person to whom it is sent."


       


       


       


      4.9.12


      Llewellyn, Our Case-Law of Contract: Offer and Acceptance


       


      LLEWELLYN, OUR CASE-LAW OF CONTRACT: OFFER AND ACCEPTANCE (pt. 2), 48 Yale L.J. 779, 795 (1939): "As between hardship
      on the offeror which is really tough, and hardship on the offeree which would be even tougher,[130] the vital reason
      for throwing the hardship of an odd delayed or lost letter upon the offeror remains this: the offeree is already relying,
      with the best reason in the world, on the deal being on; the offeror is only holding things open; and, in view of the
      efficiency of communication facilities, we can protect the offeree in all these deals at the price of hardship on offerors
      in very few of them."


      [130] For regarding the hardship of an opposing rule as even tougher on the offeree there are two good reasons. In the
      first place, the ingrained usage of business is to answer letters which look toward deals, but the usage is not so clear
      about acknowledging letters which close deals. The absence of an answer to a letter of offer is much more certain to
      lead to inquiry than is the absence of an answer to a letter of acceptance, so that the party bitten by the mischance
      has under our rule a greater likelihood of being aware of uncertainty and of speedily discovering his difficulty. This
      goes to the hazards of communication. In the second place, and regarding the time of closing, the risk of the market
      shifting against the offeror, unbalanced by the chance of gain if it shifts in his favor, rests under our law on the
      offeror during one transmission period plus time for answer — subject to effective telegraphic or telephone communication.
      He wants the deal; he takes that risk. But to fail to close the deal as against the offeree until the letter of agreement
      arrives is to extend that unbalanced risk of the market without observable reason.'
