      Changes Made After Publication and Comment


      In accordance with a public comment, a slight change was made to the Committee Note to better track the language of
      the rule.


      Committee Notes on Rules—2017 Amendment


      The ancient documents exception to the rule against hearsay has been limited to statements in documents prepared before
      January 1, 1998. The Committee has determined that the ancient documents exception should be limited due to the risk
      that it will be used as a vehicle to admit vast amounts of unreliable electronically stored information (ESI). Given
      the exponential development and growth of electronic information since 1998, the hearsay exception for ancient documents
      has now become a possible open door for large amounts of unreliable ESI, as no showing of reliability needs to be made
      to qualify under the exception. 


      The Committee is aware that in certain cases—such as cases involving latent diseases and environmental damage—parties
      must rely on hardcopy documents from the past. The ancient documents exception remains available for such cases for
      documents prepared before 1998. Going forward, it is anticipated that any need to admit old hardcopy documents produced
      after January 1, 1998 will decrease, because reliable ESI is likely to be available and can be offered under a reliability-based
      hearsay exception. Rule 803(6) may be used for many of these ESI documents, especially given its flexible standards
      on which witnesses might be qualified to provide an adequate foundation. And Rule 807 can be used to admit old documents
      upon a showing of reliability—which will often (though not always) be found by circumstances such as that document was
      prepared with no litigation motive in mind, close in time to the relevant events.'
    - 'The owner, from the nature and necessity of the case, takes the benefit of part performance, and therefore by merely
      so doing does not necessarily waive anything contained in the contract. To impute to him a voluntary waiver of conditions
      precedent from the mere use and occupation of the building erected, unattended by other circumstances, is unreasonable
      and illogical because he is not in a situation to elect whether he will or will [189] not accept the benefit of an imperfect
      performance. To be enabled to stand upon the contract he cannot reasonably be required to tear down and destroy the
      edifice if he prefers it to remain. As the erection is his by annexation to the soil he may suffer it to stand, and
      there is no rule of law against his using it without prejudice to his rights.


      The present case was evidently tried upon an erroneous theory of the law. Although partial payments were to be made
      as the work proceeded under the contracts, yet the consideration and condition of those payments was the performance
      of the work according to the plans and specifications, and in the best and most workmanlike manner, and the final payments
      were not to be made until after all the work was completed and certified by the architects. Although the contracts were
      not performed, the plaintiff has recovered all the installments, less the sum which the referee allowed as damages for
      the non-performance. In receiving the evidence as to the value and strength of the buildings, nothwithstanding non-performance
      of the contracts, evidence which could have no bearing except upon the question of damages, it is manifest that he proceeded
      upon views on the law in such cases which I have endeavored to show are unsound.


      It is not necessary to give any opinion upon the question whether the referee might properly find upon the evidence
      that the defendant waived the conditions of the contract by any express approval of the work, or by any other interference
      or conduct on his part. We only say that, according to the settled law in this state, the plaintiff cannot recover the
      payments which by the terms or true construction of the contract are due only on condition of performance by him, unless
      he can show such performance or prove that it has been waived.[1] And the law does not adjudge that a mere silent occupation
      of the building by the owner amounts to a waiver, nor does it deny to him the right so to occupy and still insist upon
      the contract. The question of waiver of the condition [190] precedent will always be one of intention to be arrived
      at from all the circumstances, including the occupancy.


      To conclude, there is, in a just view of the question, no hardship in requiring builders, like all other men, to perform
      their contracts in order to entitle themselves to payment, where the employer has agreed to pay only on that condition.
      It is true that such contracts embrace a variety of particulars, and that slight omissions and inadvertences may sometimes
      very innocently occur. These should be indulgently regarded, and they will be so regarded by courts and juries. But
      there can be no injustice in imputing to the contractor a knowledge of what his contract requires, nor in holding him
      to a substantial performance. If he has stipulated for walls of a given material and with a hard inside finish, he knows
      what he is to do and must perform it. If he has engaged for a given number and size of windows, joists, beams and sills,
      he cannot, with the specifications before him, innocently, depart from his contract. If he fails to perform when the
      requirement is plain, and when he can perform if he will, he has no right to call upon the courts to make a new contract
      for him; nor ought he to complain if the law leaves him without remedy.[1]


      The judgment should be reversed and a new trial granted.


      All the judges concurred in this opinion.


      Judgment reversed and new trial ordered.


      ----------


      [1] Morrell v. Irving F. Ins. Co., 33 N.Y. 447: Mason v. Hey ward, 3 Minn. 188; Mehurin v. Stone, 37 Ohio, 56.


      [2] Zottman v. San Francisco, 20 Cal. 108; Mapes v. Comm''rs of Olmstead Co., 11 Minn. 371; Belt v. Stetson, 26 Minn.
      415; Bozarth v. Dudley, 44 N.J. 309; Cincinnati v. Cameron, 33 Ohio, 374.


      ----------


      [1] Cited in Cunningham v. Jones, 20 N.Y. 487; Bonesteel v. Mayor, etc., of N.Y. 22 N.Y. 166; Catlin v. Tobias, 26 N.Y.
      222; Glacius v. Black, 50 N.Y.'
    - '§ 1973c. See *3Georgia v. Ashcroft, 539 U. S. 461, 461-462 (2003). On May 6, 2005, the United States Attorney General
      precleared the procedures Arizona adopted under Proposition 200.


      In the District Court the plaintiffs in this action are residents of Arizona, Indian tribes, and various community organizations.
      In May 2006, these plaintiffs brought suit challenging Proposition 200’s identification requirements. On September 11,
      2006, the District Court denied their request for a preliminary injunction, but it did not at that time issue findings
      of fact or conclusions of law. These findings were important because resolution of legal questions in the Court of Appeals
      required evaluation of underlying factual issues.


      The plaintiffs appealed the denial, and the Clerk of the Court of Appeals set a briefing schedule that concluded on
      November 21, two weeks after the upcoming November 7 election. The plaintiffs then requested an injunction pending appeal
      from the Court of Appeals. Pursuant to the Court of Appeals’ rules, the request for an injunction was assigned to a
      two-judge motions/sereening panel. See Rule 3-3 (CA9 2002). On October 5, after receiving lengthy written responses
      from the State and the county officials but without oral argument, the panel issued a four-sentence order enjoining
      Arizona from enforcing Proposition 200’s provisions pending disposition, after full briefing, of the appeals of the
      denial of a preliminary injunction. The Court of Appeals offered no explanation or justification for its order. Four
      days later, the court denied a motion for reconsideration. The order denying the motion likewise gave no rationale for
      the court’s decision.


      Despite the time-sensitive nature of the proceedings and the pendency of a request for emergency relief in the Court
      of Appeals, the District Court did not issue its findings of fact and conclusions of law until October 12. It then concluded
      that “plaintiffs have shown a possibility of success on the merits of some of their arguments but the Court cannot say
      that at this stage they have shown a strong likelihood.” *4Order in No. CV 06-1268-PHX-ROS etc. (D. Ariz., Oct. 11,
      2006), pp. 7-8, App. to Application for Stay of Injunction[ … ]. The District Court then found the balance of the harms
      and the public interest counseled in favor of denying the injunction.


      II


      “A State indisputably has a compelling interest in preserving the integrity of its election process.” Eu v. San Francisco
      County Democratic Central Comm., 489 U. S. 214, 231 (1989). Confidence in the integrity of our electoral processes is
      essential to the functioning of our participatory democracy. Voter fraud drives honest citizens out of the democratic
      process and breeds distrust of our government. Voters who fear their legitimate votes will be outweighed by fraudulent
      ones will feel disenfranchised. “[T]he right of suffrage can be denied by a debasement or dilution of the weight of
      a citizen’s vote just as effectively as by wholly prohibiting the free exercise of the franchise.” Reynolds v. Sims,
      377 U. S. 533, 555 (1964). Countering the State’s compelling interest in preventing voter fraud is the plaintiffs’ strong
      interest in exercising the “fundamental political right” to vote. Dunn v. Blumstein, 405 U. S. 330, 336 (1972) (internal
      quotation marks omitted). Although the likely effects of Proposition 200 are much debated, the possibility that qualified
      voters might be turned away from the polls would caution any district judge to give careful consideration to the plaintiffs’
      challenges.


      Faced with an application to enjoin operation of voter identification procedures just weeks before an election, the
      Court of Appeals was required to weigh, in addition to the harms attendant upon issuance or nonissuance of an injunction,
      considerations specific to election cases and its own institutional procedures. Court orders affecting elections, especially
      conflicting orders, can themselves result in voter *5confusion and consequent incentive to remain away from the polls.
      As an election draws closer, that risk will increase. So the Court of Appeals may have deemed this consideration to
      be grounds for prompt action. Furthermore, it might have given some weight to the possibility that the nonprevailing
      parties would want to seek en banc review. In the Ninth Circuit that procedure, involving voting by all active judges
      and an en banc hearing by a court of 15, can consume further valuable time. These considerations, however, cannot be
      controlling here. It was still necessary, as a procedural matter, for the Court of Appeals to give deference to the
      discretion of the District Court.'
