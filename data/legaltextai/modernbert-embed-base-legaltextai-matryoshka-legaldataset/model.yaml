    \ one would you find most defendant-friendly? \n\nAs a prosecutor, which one would you find most prosecution-friendly?\n\
    \n \n\n \n\n \n\n \n\n13.2.1\n\nForce v. Non-Consent: An Ongoing Struggle to Define Rape\n\n \n\nAfter reading the passage\
    \ from Rusk v. State, below, compare and contrast the MPC's section from 1962 with the proposed section governing sexual\
    \ assault.\n\n \n\nPassages taken from the Dissent of Rusk v. State, 43 Md. App. 476, 406 A.2d 624 (1979), rev'd, 289\
    \ Md. 230, 424 A.2d 720 (1981)):\n\nUnfortunately, courts,[ … ] often tend to confuse these two elements force and lack\
