    sentences:
    - 'Street Name at 10-6 to 10-7.


      DTC has been estimated to hold "about three-quarters of [the] shares in publicly traded companies." Garvin, supra, at
      315; accord Kahan & Rock, supra, at 1236; Street Name at 10-4 n.2. "The shares of each company held by DTC are typically
      represented by only one or more `immobilized'' jumbo stock certificates held in DTC''s vaults." Street Name at 10-7.
      "The immobilized jumbo certificates are the direct result of Section 17A(e) of the Exchange Act, in which Congress instructed
      the SEC to `use its authority . . . to end the physical movement of securities certificates. . . .''" Id. at 10-7 n.10.


      The depository system is what enables public trading of securities to take place. In 2014, the NYSE reported average
      daily volume of approximately 1 billion shares and approximately 4 million separate trades. See NYSE Factbook, http://www.nysedata.com/factbook
      (last visited June 19, 2015). The failure of the certificate-based system to keep up with much lower trading volumes
      in the 1960s demonstrates that it cannot meet current demand. Prefatory Note at 2. Without immobilization and DTC, "implementing
      a system to settle securities within five business days (T+5), much less today''s norm of T+3 or the current goals of
      T+1 or T+0, would simply be impossible." Kahan & Rock, supra, at 1238. Trading at current levels is only possible because
      of share immobilization and DTC. Street Name at 10-7; accord Garvin, supra, at 315-16; Prefatory Note at 2-3.


      Because of the federal policy of share immobilization, it is now Cede—not the ultimate beneficial owner and not the
      DTC-participant banks and brokers—that appears on the stock ledger of a Delaware corporation. Cede is typically the
      largest holder on the stock ledger of most publicly traded Delaware corporations. Street Name at 10-6. To preserve the
      pre-immobilization status quo—at least at the federal level—the SEC provided that for purposes of federal law, the custodial
      banks and brokers remain the record holders. Depositories are defined as "clearing agencies." 15 U.S.C. § 78c(23)(A).
      The term "record holder" is defined as "any broker, dealer, voting trustee, bank, association or other entity that exercises
      fiduciary powers which holds securities of record in nominee name or otherwise or as a participant in a clearing agency
      registered pursuant to section 17A of the Act." 17 C.F.R. § 240.14c-1(i). The term "entity that exercises fiduciary
      powers" is similarly defined as "any entity that holds securities in nominee name or otherwise on behalf of a beneficial
      owner but does not include a clearing agency registered pursuant to section 17A of the Act or a broker or a dealer."
      Id. § 240.14c-1(c). Federal law thus looks through DTC when determining a corporation''s record holders. For example,
      when determining whether an issuer has 500 or more record holders of a class of its equity securities such that it must
      register under 15 U.S.C. § 781(g), DTC does not count as a single holder of record. Each DTC participant member counts
      as a holder of record. Michael K. Molitor, Will More Sunlight Fade The Pink Sheets?, 39 Ind. L. Rev. 309, 315-16 (2006)
      (citing SEC interpretive releases).


      The federal regulations also ensure that a corporation can easily find out the identities of the banks and brokers who
      hold shares through DTC. Federal regulations require that DTC "furnish a securities position listing promptly to each
      issuer whose securities are held in the name of the clearing agency or its nominee." 17 C.F.R. § 240.17Ad-8(b). The
      participant listing is known colloquially as the "Cede breakdown," and it identifies for a particular date the custodial
      banks and brokers that hold shares in fungible bulk as of that date along with the number of shares held. A Delaware
      corporation can obtain a Cede breakdown with ease. In 1981, this court noted that a Cede breakdown could be obtained
      in a matter of minutes. Hatleigh Corp.'
