    - "I will not be requiring you to read these materials. Nor will you be tested on them. After discussions with a number\
      \ of colleagues, I decided that I will present an optional lecture or two on sexual assault.\n\n \n\n \n\n \n\n \n\n\
      13.1\n\nIntroduction\n\n \n\nTo a greater degree than any of the other crimes we study in this class, the very definition\
      \ of rape has been a subject of dispute and reform in recent years. Perhaps that is because the basic result element\
      \ that rape law criminalizes—sexual intercourse—is not, unlike death or battery, itself considered bad. When someone\
      \ intentionally kills another, there is usually little question (except in cases of self-defense) that the result is\
      \ bad and that a crime may have occurred. Unlike most intentional killing, intentional sex is not inherently wrong.\
      \ Indeed, in some situations, much of the evidence of rape may rest in the perceptions and interpretations of the involved\
      \ parties. \n\nThe traditional elements of rape law are: 1) sexual intercourse; 2) with force; 3) and lack of consent.\
      \ Because the sexual intercourse element of rape can be difficult to distinguish from lawful, intentional behavior,\
      \ rape law has struggled to create a regime that balances the punishment of wrongdoers with the protection of the rights\
      \ of the accused. Originally, rape law established strict rules governing punishable behavior that were under-inclusive\
      \ and strongly protected accused men: for example, a claim of rape had to include the use of physical force by the accused\
      \ and physical resistance by the victim. Additionally, there was a spousal exception to rape, so that husbands could\
      \ not be criminally liable for rape of their wives. \n\nAs the cases in this section demonstrate, however, rape law\
      \ reform in the past several decades has dramatically affected these requirements. Namely, feminist legal reformers\
      \ have challenged and in many jurisdictions weakened or eliminated the force requirement. That has shifted more legal\
      \ focus onto the question of whether there was consent. Consider what problems consent itself may have as a central\
      \ element of rape law. As you read the cases and essays in this section, consider how different formulations of rape\
      \ law balance several very serious considerations of our criminal system: punishing wrongdoers; differentiating between\
      \ levels of blameworthiness; and protecting the rights of defendants. What evidentiary or normative roles did the traditional\
      \ rape requirements play? What are the risks of limiting or removing them? How should our system balance the risks of\
      \ over-inclusivity and under-inclusivity? What social and intimate relationships between men and women do the various\
      \ possible rape rules promote and change? And as always, how do these questions implicate the justifications of punishment\
      \ such as retribution and deterrence?\n\n \n\n \n\n \n\n \n\n13.1.1\n\nExcerpt from Criminal Law: Cases, Controversies\
      \ and Problems (West Academic Publishing 2019) by Joseph E. Kennedy (used with permission).\n\n \n\nhttps://app.box.com/s/ixs8jw1d0oi45q68xvpk3vl69m2p6y71\n\
      \n \n\n \n\n \n\n \n\n13.2\n\nStatutes\n\n \n\nConsider some of these questions while you are reviewing these statutes.\n\
      \nHow do the statutes define sex, if at all? \n\nHow do they define force, if at all? \n\nWhat is the mens rea required?\
      \ \n\nHow do you think they balance the rights of the accused with the harm to be avoided? \n\nAs a defense attorney,\
      \ which one would you find most defendant-friendly? \n\nAs a prosecutor, which one would you find most prosecution-friendly?\n\
      \n \n\n \n\n \n\n \n\n13.2.1\n\nForce v. Non-Consent: An Ongoing Struggle to Define Rape\n\n \n\nAfter reading the passage\
      \ from Rusk v. State, below, compare and contrast the MPC's section from 1962 with the proposed section governing sexual\
      \ assault.\n\n \n\nPassages taken from the Dissent of Rusk v. State, 43 Md. App. 476, 406 A.2d 624 (1979), rev'd, 289\
      \ Md. 230, 424 A.2d 720 (1981)):\n\nUnfortunately, courts,[ … ] often tend to confuse these two elements force and lack\
      \ of consent and to think of them as one. They are not. They mean, and require, different things. [ … ]What seems to\
      \ cause the confusion what, indeed, has become a common denominator of both elements is the notion that the victim must\
      \ actively resist the attack upon her."
    - '(c) Procedures.


      (1) Supporting Factual Positions. A party asserting that a fact cannot be or is genuinely disputed must support the
      assertion by:


      (A) citing to particular parts of materials in the record, including depositions, documents, electronically stored information,
      affidavits or declarations, stipulations (including those made for purposes of the motion only), admissions, interrogatory
      answers, or other materials; or


      (B) showing that the materials cited do not establish the absence or presence of a genuine dispute, or that an adverse
      party cannot produce admissible evidence to support the fact.


      (2) Objection That a Fact Is Not Supported by Admissible Evidence. A party may object that the material cited to support
      or dispute a fact cannot be presented in a form that would be admissible in evidence.


      (3) Materials Not Cited. The court need consider only the cited materials, but it may consider other materials in the
      record.


      (4) Affidavits or Declarations. An affidavit or declaration used to support or oppose a motion must be made on personal
      knowledge, set out facts that would be admissible in evidence, and show that the affiant or declarant is competent to
      testify on the matters stated.


      (d) When Facts are Unavailable to the Nonmovant. If a nonmovant shows by affidavit or declaration that, for specified
      reasons, it cannot present facts essential to justify its opposition, the court may:


      (1) defer considering the motion or deny it;


      (2) allow time to obtain affidavits or declarations or to take discovery; or


      (3) issue any other appropriate order.


      (e) Failing to Properly Support or Address a Fact. If a party fails to properly support an assertion of fact or fails
      to properly address another party’s assertion of fact as required by Rule 56(c), the court may:


      (1) give an opportunity to properly support or address the fact;


      (2) consider the fact undisputed for purposes of the motion;


      (3) grant summary judgment if the motion and supporting materials — including the facts considered undisputed — show
      that the movant is entitled to it; or


      (4) issue any other appropriate order.


      (f) Judgment Independent of the Motion. After giving notice and a reasonable time to respond, the court may:


      (1) grant summary judgment for a nonmovant;


      (2) grant the motion on grounds not raised by a party; or


      (3) consider summary judgment on its own after identifying for the parties material facts that may not be genuinely
      in dispute.


      (g) Failing to Grant All the Requested Relief. If the court does not grant all the relief requested by the motion, it
      may enter an order stating any material fact — including an item of damages or other relief — that is not genuinely
      in dispute and treating the fact as established in the case.


      (h) Affidavit or Declaration Submitted in Bad Faith. If satisfied that an affidavit or declaration under this rule is
      submitted in bad faith or solely for delay, the court — after notice and a reasonable time to respond — may order the
      submitting party to pay the other party the reasonable expenses, including attorney’s fees, it incurred as a result.
      An offending party or attorney may also be held in contempt or subjected to other appropriate sanctions.


       


       


       


      11.1.3


      Adickes v. S.H. Kress & Co.


       


      Supreme Court of the United States


      398 U.S. 144, 26 L. Ed. 2d 142, 90 S. Ct. 1598, 1970 U.S. LEXIS 31, SCDB 1969-101


      No. 79


      1970-06-01


      [ … ]


      CERTIORARI TO THE UNITED STATES COURT OF APPEALS FOR THE SECOND CIRCUIT.


      [ … ]


      MR. JUSTICE HARLAN delivered the opinion of the Court.


      Petitioner, Sandra Adickes, a white school teacher from New York, brought this suit in the United States District Court
      for the Southern District of New York against respondent S. H. Kress & Co. ("Kress") to recover damages under 42 U.
      S. C. § 1983[1] for an alleged violation of her constitutional rights under the Equal Protection Clause of the Fourteenth
      Amendment.'
    - 'Id. at 345.


      The Court''s injunction barred the Defendants from: "posting on any Internet web site" DeCSS; "in any other way . .
      . offering to the public, providing, or otherwise trafficking in DeCSS"; violating the anti-trafficking provisions of
      the DMCA in any other manner, and finally "knowingly linking any Internet web site operated by them to any other web
      site containing DeCSS, or knowingly maintaining any such link, for the purpose of disseminating DeCSS." Universal II,
      111 F. Supp. 2d at 346-47.


      The Appellants have appealed from the permanent injunction. The United States has intervened in support of the constitutionality
      of the DMCA. We have also had the benefit of a number of amicus curiae briefs, supporting and opposing the District
      Court''s judgment. After oral argument, we invited the parties to submit responses to a series of specific questions,
      and we have received helpful responses.


      Discussion


      I. Narrow Construction to Avoid Constitutional Doubt


      The Appellants first argue that, because their constitutional arguments are at least substantial, we should interpret
      the statute narrowly so as to avoid constitutional problems. They identify three different instances of alleged ambiguity
      in the statute that they claim provide an opportunity for such a narrow interpretation.


      First, they contend that subsection 1201(c)(1), which provides that "[n]othing in this section shall affect rights,
      remedies, limitations or defenses to copyright infringement, including fair use, under this title," can be read to allow
      the circumvention of encryption technology protecting copyrighted material when the material will be put to "fair uses"
      exempt from copyright liability.[12] We disagree that subsection 1201(c)(1) permits such a reading. Instead, it clearly
      and simply clarifies that the DMCA targets the circumvention of digital walls guarding copyrighted material (and trafficking
      in circumvention tools), but does not concern itself with the use of those materials after circumvention has occurred.
      Subsection 1201(c)(1) ensures that the DMCA is not read to prohibit the "fair use" of information just because that
      information was obtained in a manner made illegal by the DMCA. The Appellants'' much more expansive interpretation of
      subsection 1201(c)(1) is not only outside the range of plausible readings of the provision, but is also clearly refuted
      by the statute''s legislative history.[13] See Commodity Futures Trading [444] Commission v. Schor, 478 U.S. 833, 841
      (1986) (constitutional doubt canon "does not give a court the prerogative to ignore the legislative will").


      Second, the Appellants urge a narrow construction of the DMCA because of subsection 1201(c)(4), which provides that
      "[n]othing in this section shall enlarge or diminish any rights of free speech or the press for activities using consumer
      electronics, telecommunications, or computing products." This language is clearly precatory: Congress could not "diminish"
      constitutional rights of free speech even if it wished to, and the fact that Congress also expressed a reluctance to
      "enlarge" those rights cuts against the Appellants'' effort to infer a narrowing construction of the Act from this provision.


      Third, the Appellants argue that an individual who buys a DVD has the "authority of the copyright owner" to view the
      DVD, and therefore is exempted from the DMCA pursuant to subsection 1201(a)(3)(A) when the buyer circumvents an encryption
      technology in order to view the DVD on a competing platform (such as Linux). The basic flaw in this argument is that
      it misreads subsection 1201(a)(3)(A). That provision exempts from liability those who would "decrypt" an encrypted DVD
      with the authority of a copyright owner, not those who would "view" a DVD with the authority of a copyright owner.[14]
      In any event, the Defendants offered no evidence that the Plaintiffs have either explicitly or implicitly authorized
      DVD buyers to circumvent encryption technology to support use on multiple platforms.[15]


      We conclude that the anti-trafficking and anti-circumvention provisions of the DMCA are not susceptible to the narrow
      interpretations urged by the Appellants. We therefore proceed to consider the Appellants'' constitutional clai[ … ]


      45.


      III. Constitutional Challenges Based on the First Amendment


      A. Applicable Principles


      Last year, in one of our Court''s first forays into First Amendment law in the digital age, we took an "evolutionary"
      approach to the task of tailoring familiar constitutional rules to novel technological circumstances, favoring "narrow"
      holdings that would permit the law to mature on a "case-by-case" basis. See Name.Space, Inc.'
