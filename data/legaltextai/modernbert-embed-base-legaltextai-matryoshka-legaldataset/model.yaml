    sentences:
    - "Any high-speed pursuit is inherently dangerous to the lives of the pursuing police officers. In even the most ethereal\
      \ of abstractions, it is not possible to imagine that the ‘wanton disregard’ of the person fleeing does not encompass\
      \ disregard for the safety of the pursuing officers.” [ … ]Unlike the majority, I find the Court of Appeal’s statement\
      \ in Johnson persuasive.\n\nIndeed, I agree with Justice Baxter that if any offense should easily qualify as inherently\
      \ dangerous, Vehicle Code section 2800.2 certainly would.[ … ]\n\n I would abrogate the nonstatutory second degree felony-murder\
      \ rule and leave it to the Legislature to define precisely what conduct subjects a defendant to strict criminal liability.\n\
      \nBAXTER, J., Dissenting.\n\n[ … ]\n\nThe majority focus upon subdivision (b) of section 2800.2, which was added in\
      \ 1996. [ … ] The majority reasons that, because some statutory “points” violations are not inherently dangerous, one\
      \ can commit the unitary felony described in both subdivisions of section 2800.2 in a way that does not place human\
      \ life at risk.\n\nI am not persuaded. Subdivision (a) of section 2800.2 gives clear and specific notice that one who,\
      \ in order to elude police pursuit, drives with reckless indifference to safety is guilty of a felony. Such reckless\
      \ driving is, of course, inherently dangerous—by definition, it creates a substantial risk that someone will be killed.\
      \ Moreover, there is no doubt that defendant committed exactly the reckless endangerment of human life forbidden by\
      \ the statute. [ … ]\n\n[ … ]\n\n[Here] principal reason for applying the felony-murder rule is present. The purpose\
      \ of the felony-murder doctrine “is to deter those engaged in felonies from killing negligently or accidentally.” (Hansen,\
      \ supra, 9 Cal.4th 300, 308, quoting People v. Satchell (1971) 6 Cal.3d 28, 43 [ … ].) Because the doctrine absolves\
      \ the prosecution from proving malice, it properly applies when “the killer is engaged in a felony whose inherent danger\
      \ to human life renders logical an imputation of malice on the part of all who commit it.” (Ibid.)\n\nThose requirements\
      \ are met here. It is appropriate to deter persons from killing negligently or accidentally—as did defendant—while engaged—as\
      \ was defendant—in recklessly unsafe driving to elude police pursuit, a specific form of conduct made felonious by section\
      \ 2800.2, subdivision (a). Moreover, the inherent danger such conduct poses to human life is so clear that it is logical\
      \ to impute malice to anyone who commits it.\n\nUnder such circumstances, it perverts reason to refuse to apply the\
      \ felony-murder rule simply because subdivision (b) of section 2800.2 may additionally describe a nondangerous felony.\
      \ Where society has warned, in plain statutory words, that the particular conduct committed by the defendant *1144is\
      \ both dangerous and felonious, it should not matter that the statute may forbid non-dangerous conduct as well.\n\n\
      It is worth noting that, although the Legislature elected to include subdivision (b) as part of section 2800.2, it could\
      \ just as easily have added a separate section, establishing a distinct felonious offense of committing three “points”\
      \ violations while driving to elude a peace officer. This would equally have satisfied the apparent legislative purpose\
      \ to deter flight from the police by expanding the circumstances under which driving to elude a pursuing police officer\
      \ would constitute a felony. [ … ] \n\n[ … ] If subdivision (a) described an inherently dangerous felony before the\
      \ addition of subdivision (b) in 1996 [ … ], the unchanged words of that subdivision equally do so following the 1996\
      \ amendment [ … ].\n\n[ … ]\n\n \n\n \n\n \n\n9.5.2.8\n\nNotes & Questions (People v. Howard)\n\n \n\nNotes and Questions\n\
      \n1.    Understanding Felony Murder. How would you summarize the rule statement from Howard if you were writing it in\
      \ a brief (or on an exam)? Explain, in your own works, why the court finds Mr. Howard not guilty.\n\n2.    Deep Thinking.\
      \ In the case, we learn that Mr. Howard was driving a car that he stole, earlier that day. Why isn’t that more serious\
      \ crime the subject of his felony murder prosecution? How would you change the facts of the case so that the car theft\
      \ could serve as the target crime for Mr. Howard’s felony murder prosecution? \n\n3.    A Dubious Doctrine."
    - "On 22 December 1985, defendant John Forrest admitted his critically ill father, Clyde Forrest, Sr., to Moore Memorial\
      \ Hospital. Defendant’s father, who had previously been hospitalized, was suffering from numerous serious ailments,\
      \ including severe heart disease, hypertension, a thoracic aneurysm, numerous pulmonary emboli, and a peptic ulcer.\
      \ By the morning of 23 December 1985, his medical condition was determined to be unbeatable and terminal. Accordingly,\
      \ he was classified as “No Code,” meaning that no extraordinary measures would be used to save his life, and he was\
      \ moved to a more comfortable room.\n\nOn 24 December 1985, defendant went to the hospital to visit his ailing father.\
      \ No other family members were present in his father’s room when he arrived. While one of the nurse’s assistants was\
      \ tending to his father, defendant told her, “There is no need in doing that. He’s dying.” She responded, “Well, I think\
      \ he’s better.” The nurse’s assistant noticed that defendant was sniffing as though crying and that he kept his hand\
      \ in his pocket during their conversation. She subsequently went to get the nurse.\n\nWhen the nurse’s assistant returned\
      \ with the nurse, defendant once again stated his belief that his father was dying. The nurse tried to comfort defendant,\
      \ telling him, “I don’t think your father is as sick as you think he is.” Defendant, very upset, responded, “Go to hell.\
      \ I’ve been taking care of him for years. I’ll take care of him.” Defendant was then left alone in the room with his\
      \ father.\n\nAlone at his father’s bedside, defendant began to cry and to tell his father how much he loved him. His\
      \ father began to cough, emitting a gurgling and rattling noise. Extremely upset, defendant pulled a small pistol from\
      \ his pants pocket, put it to his father’s temple, and fired. He subsequently fired three more times and walked out\
      \ into the hospital corridor, dropping the gun to the floor just outside his father’s room.\n\nFollowing the shooting,\
      \ defendant, who was crying and upset, neither ran nor threatened anyone. Moreover, he never denied shooting his father\
      \ and talked openly with law enforcement officials. Specifically, defendant made the following oral statements: “You\
      \ can’t do anything to him now. He’s out of his suffering.” “I killed my daddy.” “He won’t have to suffer anymore.”\
      \ “I know they can burn me for it, but my dad will not have to suffer anymore.” “I know the doctors couldn’t do it,\
      \ but I could.” “I promised my dad I wouldn’t let him suffer.”\n\n[ … ]Though defendant’s father had been near death\
      \ as a result of his medical condition, the exact cause of the deceased’s death was determined to be the four point-blank\
      \ bullet wounds to his head. Defendant’s pistol was a single-action .22-calibre five-shot revolver. The weapon, which\
      \ had to be cocked each time it was fired, contained four empty shells and one live round.\n\nAt the close of the evidence,\
      \ defendant’s case was submitted to the jury for one of four possible verdicts: first-degree murder, second-degree murder,\
      \ voluntary manslaughter, or not guilty. After a lengthy deliberation, the jury found defendant guilty of first-degree\
      \ murder. [ … ]\n\n[ … ]\n\n In his second assignment of error, defendant asserts that the trial court committed reversible\
      \ error in denying his motion for directed verdict as to the first-degree murder charge. Specifically, defendant argues\
      \ that the trial court’s submission of the first-degree murder charge was improper because there was insufficient evidence\
      \ of premeditation and deliberation presented at trial. We do not agree[ … ].\n\nWe recently addressed this very issue\
      \ in the case of State v. Jackson, 317 N.C. 1[ … ]. Our analysis of the relevant law in that case is instructive in\
      \ the case at bar:\n\nBefore the issue of a defendant’s guilt may be submitted to the jury, the trial court must be\
      \ satisfied that substantial evidence has been introduced tending to prove each essential element of the offense charged\
      \ [ … ].\n\nFirst-degree murder is the intentional and unlawful killing of a human being with malice and with premeditation\
      \ and deliberation. [ … ]\n\nPremeditation and deliberation relate to mental processes and ordinarily are not readily\
      \ susceptible to proof by direct evidence. Instead, they usually must be proved by circumstantial evidence."
    - '17 U.S.C. § 107(4).[9] The fourth fair-use factor greatly favors Koons.


      [259] CONCLUSION


      Having explored the statutory factors and weighed them together in light of the purposes of copyright, Campbell, 510
      U.S. at 78, we think that the district court''s conclusion was correct — that copyright law''s goal of "promoting the
      Progress of Science and useful Arts," U.S. Const., art. I, § 8, cl. 8, would be better served by allowing Koons''s use
      of "Silk Sandals" than by preventing it, see Castle Rock Entm''t, 150 F.3d at 141. We therefore conclude that neither
      he nor the other defendants engaged in or are liable for copyright infringement. We affirm the judgment of the district
      court.


      -------[ … ]


      64.


      ----------


      [*] The Honorable J. Garvan Murtha of the United States District Court for the District of Vermont, sitting by designation.


      [1] See E. Kenly Ames, Note, Beyond Rogers v. Koons: A Fair Use Standard for Appropriation, 93 Colum. L.Rev. 1473, 1477-80
      (1993).


      [2] Guggenheim''s figures for catalogue and postcard sales include sales at the Deutsche Guggenheim Berlin. It is possible,
      therefore, that those sales are double-counted in Deutsche Bank''s and Guggenheim''s earnings calculations.


      [3] As the Supreme Court noted in Campbell, however, a finding of transformativeness "is not absolutely necessary for
      a finding of fair use." Campbell, 510 U.S. at 579, 114 S.Ct. 1164 (citing Sony Corp. of Am. v. Universal Studios, Inc.,
      464 U.S. 417, 455 n. 40, 104 S.Ct. 774, 78 L.Ed.2d 574 (1984)); see also 17 U.S.C. § 107 (listing "multiple copies for
      classroom use" as among the categories of potentially fair uses); Rebecca Tushnet, Copy This Essay: How Fair Use Doctrine
      Harms Free Speech and How Copying Serves It, 114 Yale L.J. 535, 555 (2004) (noting that historically some forms of "pure
      copying" were "at the core of fair use"). Nor is transformativeness necessarily the only important factor. See Campbell,
      510 U.S. at 578, 114 S.Ct. 1164 ("[T]he four statutory factors . . . [a]re all to be explored, and the results weighed
      together, in light of the purposes of copyright.").


      [4] It has been suggested that the exploitation of new, complementary markets is the hallmark of fair use. See Ty, Inc.
      v. Publ''ns Int''l, 292 F.3d 512, 517 (7th Cir. 2002) ("[C]opying that is complementary to the copyrighted work (in
      the sense that nails are complements of hammers) is fair use, but copying that is a substitute for the copyrighted work
      (in the sense that nails are substitutes for pegs or screws), or for derivative works from the copyrighted work, is
      not fair use." (citation omitted)); see also 4-13 Melville B. Nimmer & David Nimmer, Nimmer on Copyright § 13.05[B][1]
      (2006) ("[I]f . . . the defendant''s work, although containing substantially similar material, performs a different
      function than that of the plaintiff''s, the defense of fair use may be invoked."). But as the Seventh Circuit recognized,
      this reasoning is in tension with the Copyright Act''s express grant to copyright holders of rights over derivative
      works. See Ty, Inc., 292 F.3d at 518 ("Were control of derivative works not part of a copyright owner''s bundle of rights,
      it would be clear that [defendant''s] books fell on the complement side of the divide and so were sheltered by the fair-use
      defense."). A derivative use can certainly be complementary to, or fulfill a different function from, the original.


      [5] Koons''s clear conception of his reasons for using "Silk Sandals," and his ability to articulate those reasons,
      ease our analysis in this case. We do not mean to suggest, however, that either is a sine qua non for a finding of fair
      use — as to satire or more generally.


      [6] We have said that when "''the copyrighted [material is] unpublished, the second [fair-use] factor weighs heavily
      in favor''" of the plaintiff.'
