  - '(c) Procedures.


    (1) Supporting Factual Positions. A party asserting that a fact cannot be or is genuinely disputed must support the assertion
    by:


    (A) citing to particular parts of materials in the record, including depositions, documents, electronically stored information,
    affidavits or declarations, stipulations (including those made for purposes of the motion only), admissions, interrogatory
    answers, or other materials; or


    (B) showing that the materials cited do not establish the absence or presence of a genuine dispute, or that an adverse
    party cannot produce admissible evidence to support the fact.


    (2) Objection That a Fact Is Not Supported by Admissible Evidence. A party may object that the material cited to support
    or dispute a fact cannot be presented in a form that would be admissible in evidence.


    (3) Materials Not Cited. The court need consider only the cited materials, but it may consider other materials in the
    record.


    (4) Affidavits or Declarations. An affidavit or declaration used to support or oppose a motion must be made on personal
    knowledge, set out facts that would be admissible in evidence, and show that the affiant or declarant is competent to
    testify on the matters stated.


    (d) When Facts are Unavailable to the Nonmovant. If a nonmovant shows by affidavit or declaration that, for specified
    reasons, it cannot present facts essential to justify its opposition, the court may:


    (1) defer considering the motion or deny it;


    (2) allow time to obtain affidavits or declarations or to take discovery; or


    (3) issue any other appropriate order.


    (e) Failing to Properly Support or Address a Fact. If a party fails to properly support an assertion of fact or fails
    to properly address another party’s assertion of fact as required by Rule 56(c), the court may:


    (1) give an opportunity to properly support or address the fact;


    (2) consider the fact undisputed for purposes of the motion;


    (3) grant summary judgment if the motion and supporting materials — including the facts considered undisputed — show that
    the movant is entitled to it; or


    (4) issue any other appropriate order.


    (f) Judgment Independent of the Motion. After giving notice and a reasonable time to respond, the court may:


    (1) grant summary judgment for a nonmovant;


    (2) grant the motion on grounds not raised by a party; or


    (3) consider summary judgment on its own after identifying for the parties material facts that may not be genuinely in
    dispute.


    (g) Failing to Grant All the Requested Relief. If the court does not grant all the relief requested by the motion, it
    may enter an order stating any material fact — including an item of damages or other relief — that is not genuinely in
    dispute and treating the fact as established in the case.


    (h) Affidavit or Declaration Submitted in Bad Faith. If satisfied that an affidavit or declaration under this rule is
    submitted in bad faith or solely for delay, the court — after notice and a reasonable time to respond — may order the
    submitting party to pay the other party the reasonable expenses, including attorney’s fees, it incurred as a result. An offending
    party or attorney may also be held in contempt or subjected to other appropriate sanctions.


     


     


     


    11.1.3


    Adickes v. S.H. Kress & Co.


     


    Supreme Court of the United States


    398 U.S. 144, 26 L. Ed. 2d 142, 90 S. Ct. 1598, 1970 U.S. LEXIS 31, SCDB 1969-101


    No. 79


    1970-06-01


    [ … ]


    CERTIORARI TO THE UNITED STATES COURT OF APPEALS FOR THE SECOND CIRCUIT.


    [ … ]


    MR. JUSTICE HARLAN delivered the opinion of the Court.


    Petitioner, Sandra Adickes, a white school teacher from New York, brought this suit in the United States District Court
    for the Southern District of New York against respondent S. H. Kress & Co. ("Kress") to recover damages under 42 U. S.
    C. § 1983[1] for an alleged violation of her constitutional rights under the Equal Protection Clause of the Fourteenth
