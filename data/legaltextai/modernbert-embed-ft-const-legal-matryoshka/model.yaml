    III. CONCLUSION


    Discrimination against employees, either because of their failure to conform to sex stereotypes or their transgender and
    transitioning status, is illegal under Title VII. The unrefuted facts show that the Funeral Home fired Stephens because
    she refused to abide by her employer''s stereotypical conception of her sex, and therefore the EEOC is entitled to summary
    judgment as to its unlawful-termination claim. RFRA provides the Funeral Home with no relief because continuing to employ
    Stephens would not, as a matter of law, substantially burden Rost''s religious exercise, and even if it did, the EEOC
    has shown that enforcing Title VII here is the least restrictive means of furthering its compelling interest in combating
