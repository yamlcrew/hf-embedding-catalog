  - 'Eventually, HCC moved to dismiss the complaint. The District Court granted the motion, concluding that Mr. Wilson lacked
    standing under Article III. On appeal, a panel of the Fifth Circuit reversed, holding that Mr. Wilson had standing and
    that his complaint stated a viable First Amendment claim. [citation omitted]


     


    The Fifth Circuit’s merits analysis proceeded in two steps. First, the court concluded that a verbal “reprimand against
    an elected official for speech addressing a matter of public concern is an actionable First Amendment claim under § 1983.”
    [citation omitted] Next, the court reasoned that the Board’s imposition of other punishments—such as limiting Mr. Wilson’s
    eligibility for officer positions and his access to certain funds—did “not violate his First Amendment rights” because
    Mr. Wilson did not have an “entitlement” to those privileges. [citation omitted] In sum, the court held that Mr. Wilson’s
    § 1983 action could proceed, but only as to the Board’s unadorned censure resolution. HCC’s request for rehearing en banc
    failed by an equally divided vote. [citation omitted].


     


    In time, HCC filed a petition for certiorari in this Court. It asked us to review the Fifth Circuit’s judgment that Mr.
    Wilson may pursue a First Amendment claim based on a purely verbal censure. Last year, we agreed to take up that question.
    [citation omitted] But as merits briefing unfolded, Mr. Wilson did not just seek to defend the Fifth Circuit’s judgment;
    he also sought to challenge it in part. Specifically, he argued that the Fifth Circuit erred to the extent that it upheld
    the Board’s nonverbal punishments as consistent with the First Amendment. Generally, however, when a respondent in this
    Court seeks to alter a lower court’s judgment, he must file and we must grant a cross-petition for review. [citation omitted]
    Mr. Wilson filed no such petition in this case. As a result, we decline to take up his *1259 challenge to the Fifth Circuit’s
    judgment, and the only question before us remains the narrow one on which we granted certiorari: Does Mr. Wilson possess
    an actionable First Amendment claim arising from the Board’s purely verbal censure?


     


     


    II


    A


    The First Amendment prohibits laws “abridging the freedom of speech.” One obvious implication of that rule is that the
    government usually may not impose prior restraints on speech. [citation omitted] But other implications follow too. Relevant
    here, no one before us questions that, “[a]s a general matter,” the First Amendment prohibits government officials from
    subjecting individuals to “retaliatory actions” after the fact for having engaged in protected speech. [citations omitted]
    Mr. Wilson argues that the Board’s censure resolution represents exactly that kind of impermissible retaliatory action.


     


    Almost immediately, however, this submission confronts a challenge. When faced with a dispute about the Constitution’s
    meaning or application, “[l]ong settled and established practice is a consideration of great weight.” [citation omitted]
    Often, “a regular course of practice” can illuminate or “liquidate” our founding document’s “terms & phrases.” [citations
    omitted] That principle poses a problem for Mr. Wilson because elected bodies in this country have long exercised the
    power to censure their members. In fact, no one before us has cited any evidence suggesting that a purely verbal censure
    analogous to Mr. Wilson’s has ever been widely considered offensive to the First Amendment.


     


    As early as colonial times, the power of assemblies in this country to censure their members was “more or less assumed.”
    [citation omitted] It seems, too, that assemblies often exercised the power to censure members for views they expressed
    and actions they took “both within and without the legislature.” [citations omitted]


     


    The parties supply little reason to think the First Amendment was designed or commonly understood to upend this practice…


     


     


    If anything, censures [of public officials] have proven more common yet at the state and local level…According to HCC
    and undisputed by Mr. Wilson, it seems elected bodies in this country issued no fewer than 20 censures in August 2020
    alone. [citation omitted]


     


    If this longstanding practice does not “put at rest” the question of the Constitution’s meaning for the dispute before
    us, it surely leaves a “considerable impression.” [citation omitted] On Mr. Wilson’s telling and under the Fifth Circuit’s
    holding, a purely verbal censure by an elected assembly of one of its own members may offend the First Amendment.'
  - '[citation omitted]


     


    We assessed the lawfulness of that handgun ban by scrutinizing whether it comported with history and tradition. Although
    we noted that the ban “would fail constitutional muster” “[u]nder any of the standards of scrutiny that we have applied
    to enumerated constitutional rights,”…we did not engage in means-end scrutiny when resolving the constitutional question.
    Instead, we focused on the historically unprecedented nature of the District’s ban, observing that “[f]ew laws in the
    history of our Nation have come close to [that] severe restriction.” [citation omitted] Likewise, when one of the dissents
    attempted to justify the District’s prohibition with “founding-era historical precedent,” including “various restrictive
    laws in the colonial period,” we addressed each purported analogue and concluded that they were either irrelevant or “d[id]
    not remotely burden the right of self-defense as much as an absolute ban on handguns.” [citations omitted] Thus, our earlier
    historical analysis sufficed to show that the Second Amendment did not countenance a “complete prohibition” on the use
    of “the most popular weapon chosen by Americans for self-defense in the home.” [citation omitted]


     


     


    2


    As the foregoing shows, Heller’s methodology centered on constitutional text and *2129 history. Whether it came to defining
    the character of the right (individual or militia dependent), suggesting the outer limits of the right, or assessing the
    constitutionality of a particular regulation, Heller relied on text and history. It did not invoke any means-end test
    such as strict or intermediate scrutiny.


     


    Moreover, Heller and McDonald expressly rejected the application of any “judge-empowering ‘interest-balancing inquiry’
    that ‘asks whether the statute burdens a protected interest in a way or to an extent that is out of proportion to the
    statute’s salutary effects upon other important governmental interests.’ ” [citations omitted] We declined to engage in
    means-end scrutiny because “[t]he very enumeration of the right takes out of the hands of government—even the Third Branch
    of Government—the power to decide on a case-by-case basis whether the right is really worth insisting upon.” [citation
    omitted] We then concluded: “A constitutional guarantee subject to future judges’ assessments of its usefulness is no
    constitutional guarantee at all.” [citation omitted]


     


    Not only did Heller decline to engage in means-end scrutiny generally, but it also specifically ruled out the intermediate-scrutiny
    test that respondents and the United States now urge us to adopt. Dissenting in Heller, Justice BREYER’s proposed standard—“ask[ing]
    whether [a] statute burdens a protected interest in a way or to an extent that is out of proportion to the statute’s salutary
    effects upon other important governmental interests,” …—simply expressed a classic formulation of intermediate scrutiny
    in a slightly different way. [ci8tations omitted] In fact, Justice BREYER all but admitted that his Heller dissent advocated
    for intermediate scrutiny by repeatedly invoking a quintessential intermediate-scrutiny precedent. [citations omitted]Thus,
    when Heller expressly rejected that dissent’s “interest-balancing inquiry,” [citation omitted] it necessarily rejected
    intermediate scrutiny.5


     


    In sum, the Courts of Appeals’ second step is inconsistent with Heller’s historical approach and its rejection of means-end
    scrutiny. We reiterate that the standard for applying the Second Amendment is as follows: When the Second Amendment’s
    plain text covers an individual’s *2130 conduct, the Constitution presumptively protects that conduct. The government
    must then justify its regulation by demonstrating that it is consistent with the Nation’s historical tradition of firearm
    regulation. Only then may a court conclude that the individual’s conduct falls outside the Second Amendment’s “unqualified
    command.” [citation omitted]


     


     


    C


    This Second Amendment standard accords with how we protect other constitutional rights. [One example is] the freedom of
    speech in the First Amendment, to which Heller repeatedly compared the right to keep and bear arms. [citation omitted]
    In that context, “[w]hen the Government restricts speech, the Government bears the burden of proving the constitutionality
    of its actions.” [citations omitted] In some cases, that burden includes showing whether the expressive conduct falls
    outside of the category of protected speech. [citation omitted] And to carry that burden, the government must generally
    point to historical evidence about the reach of the First Amendment’s protections.'
