  - source_sentence: Discuss the implications of the Insular Cases on the application of the Citizenship Clause to American
      Samoa, particularly in distinguishing between incorporated and unincorporated territories. What are the practical concerns
      associated with this distinction?
    sentences:
    - 'To the extent jus soli is adopted into the Fourteenth Amendment, the concept of allegiance is manifested by the Citizenship
      Clause’s mandate that birthright citizens not merely be born within the territorial boundaries of the United States
      but also “subject to the jurisdiction thereof…” [citations omitted]


       


       Appellants would find any allegiance requirement of no moment because, as non-citizen nationals, American Samoans already
      “owe[ ] permanent allegiance to the United States.”[citations omitted] Yet, within the context of the Citizenship Clause,
      “[t]he evident meaning of the[ ] ... words [“subject to the jurisdiction thereof”] is, not merely subject in some respect
      or degree to the jurisdiction of the United States, but completely subject to their political jurisdiction, and owing
      them direct and immediate allegiance.” **375 [citations omitted] *306  It was on this basis that the Supreme Court declined
      to extend constitutional birthright citizenship to Native American tribes. [citations omitted]…Even assuming a background
      context grounded in principles of jus soli, we are skeptical the framers plainly intended to extend birthright citizenship
      to distinct, significantly self-governing political territories within the United States’s sphere of sovereignty—even
      where, as is the case with American Samoa, ultimate governance remains statutorily vested with the United States Government.
      [citations omitted]


      III


      Analysis of the Citizenship Clause’s application to American Samoa would be incomplete absent invocation of the sometimes
      contentious Insular Cases, where the Supreme Court “addressed whether the Constitution, by its own force, applies in
      any territory that is not a State.” [citations omitted]


       


      “The doctrine of ‘territorial incorporation’ announced in the Insular Cases distinguishes between incorporated territories,
      which are intended for statehood from the time of acquisition and in which the entire Constitution applies ex proprio
      vigore, and unincorporated territories [such as American Samoa], which are not intended for statehood and in which only
      [certain] fundamental constitutional rights apply by their own force.”[citations omitted].


       


      Appellants and Amici contend the Insular Cases have no application because the Citizenship Clause textually defines
      its own scope.[citations omitted].


       


      Amici Curiae suggest territorial incorporation doctrine should not be expanded to the Citizenship Clause because the
      doctrine rests on anachronistic views of race and imperialism. But the Court has continued to invoke the Insular framework
      when dealing with questions of territorial and extraterritorial application. [citations omitted] Although some aspects
      of the Insular Cases’ analysis may now be deemed politically incorrect, the framework remains both applicable and of
      pragmatic use in assessing the applicability of rights to unincorporated territories. [citations omitted]


       


      As the Supreme Court…emphasized, the “common thread uniting the Insular Cases ... [is that] questions of extraterritoriality
      turn on objective factors and practical concerns, not formalism.” [citations omitted] While “fundamental limitations
      in favor of personal rights” remain guaranteed to persons born in the unincorporated territories, [citations omitted],
      the Insular framework recognizes the difficulties that frequently inure when “determin[ing] [whether a] particular provision
      of the Constitution is applicable,” absent inquiry into the impractical or anomalous. [citations omitted]


      A


       American citizenship “is one of the most valuable rights in the world today.” [citations omitted] “The freedoms and
      opportunities secured by United States citizenship long have been treasured by persons fortunate enough to be born with
      them, and are yearned for by countless less fortunate.” [citations omitted]. Accordingly, even if the Insular framework
      is applicable, Appellants cite to a bevy of cases to argue citizenship is a fundamental right. [citations omitted] But
      those cases do not arise in the territorial context. Such decisions do not reflect the Court’s considered judgment as
      to the existence of a fundamental right to citizenship for persons born in the United States’ unincorporated **377 *308
      territories. [citations omitted].7


       


       “Fundamental” has a distinct and narrow meaning in the context of territorial rights. It is not sufficient that a right
      be considered fundamentally important in a colloquial sense or even that a right be “necessary to [the] [ ]American
      regime of ordered liberty.” [citations omitted]. Under the Insular framework the designation of fundamental extends
      only to the narrow category of rights and “principles which are the basis of all free government.” [citations omitted]


       


      In this manner the Insular Cases distinguish as universally fundamental those rights so basic as to be integral to free
      and fair society.'
    - '633, 649 (concurring opinion).


      An innkeeper or common carrier has always been allowed to'' exclude drunks, criminals and'' diseased persons, but only
      because the public’s interest in protecting his and his guests’ health and property outweighs its interest in providing
      accommodations for this small group of travelers. As a general rule, innkeepers and carriers cannot refuse their services
      on account of race; though the rule developed in this country that they can provide “separate but equal” facilities.
      And for a period of our history even,this Court upheld state laws giving sanction to such a rule. Compare Plessy v.
      Ferguson, 163 U. S. 537, with Gayle v. Browder, 352 U. S. 903, affirming, 142 F. Supp. 707. But surely Shelley v. Kraemer,
      supra, and Barrows v. Jackson, supra, show that the day has passed when an innkeeper, carrier, housing developer, or
      retailer can draw a• racial'' line, refuse service to some on account of color, and obtain the aid of a State in enforcing
      his personal bias by sending outlawed customers to prison or exacting fines from them.


      Business, such as this restaurant, is still private property. '' Yet there is hardly any private enterprise that does
      not feel the pinch of some public regulation — from price control, to health and fire inspection, to zoning, to safety
      measures, to minimum wages and working conditions, to unemployment insurance. When the doors of a business are open
      to the public, they must be open to all regardless of race if apartheid is not to become engrained in our public places.
      It cannot by reason of the Equal Protection Clause become so engrained with the aid of state courts, state legislatures,
      or state police.


      II.


      There is even greater reason to bar a State through its judiciary from throwing its weight on the side of racial discrimination
      in the present case, because we deal here with a place of public accommodation under license from, the State. This is
      the idea I expressed in Garner v. Louisiana, 368 U. S. 157, where another owner of a restaurant refused service to a
      customer because he was a Negro. That view is not novel; it.stems from the dissent of the first Mr. Justice Harlan in
      the Civil Rights Cases, 109 U. S. 3, 58-59:


      “In every material sense applicable to the practical enforcement of the Fourteenth Amendment, railroad corporations,
      keepers of inns, and managers of places of public amusement are agents or instrumentalities of the State, because they
      are charged with duties to the public, and are amenable, in respect of their duties and functions, to governmental regulation.
      It seems to me that, within the principle settled in Ex parte Virginia, a denial, by these instrumentalities of the
      State, to the citizen, because of his race, of that equality of civil rights secured to him by law, is a denial by the
      State, within the meaning of the Fourteenth Amendment. If it be not, then that race is left, in respect of the civil
      rights in question, practically at the mercy of corporations and individuals wielding power under the States.”


      The nexus between the State and the private enterprise may be control, as in the case of a state agency. Pennsylvania
      v. Board of Trusts, 353 U. S. 230. Or the nexus may be one of numerous other devices. “State support of segregated schools
      through any arrangement, management, funds, or property cannot be squared” with the Equal Protection Clause. Cooper
      v. Aaron, 358 U. S. 1, 19. Cf. Hampton v. Jacksonville, 304 F. 2d 320. A state-assisted enterprise serving the public
      does not escape its constitutional duty to serve all customers irrespective of race, even though its actual operation
      is in the hands of a lessee. Burton v. Wilmington Parking Authority, 365 U. S. 715. Cf. Boynton v. Virginia, 364 U.
      S. 454. State licensing and surveillance.of a business serving the public also brings its service into the public domain.
      This restaurant needs a permit from Louisiana to operate; and during the existence of the license the State has broad
      powers of visitation and control. This restaurant is thus an instrumentality of the State since the State charges it
      with duties to the public and supervises its performance. The State''s interest in and activity with regard to its restaurants
      extends far beyond any mere income-producing licensing requirement.'
    - 'Among other things, courts at this second step have sometimes considered whether an employee’s speech interests are
      outweighed by “ ‘the interest of the State, as an employer, in promoting the efficiency of the public services it performs
      through its employees.’ ” Id., at 417, 126 S.Ct. 1951 *2424 (quoting Pickering, 391 U.S. at 568, 88 S.Ct. 1731).


       


      Both sides ask us to employ at least certain aspects of this Pickering–Garcetti  framework to resolve Mr. Kennedy’s
      free speech claim. They share additional common ground too. They agree that Mr. Kennedy’s speech implicates a matter
      of public concern. See App. to Pet. for Cert. 183; Brief for Respondent 44. They also appear to accept, at least for
      argument’s sake, that Mr. Kennedy’s speech does not raise questions of academic freedom that may or may not involve
      “additional” First Amendment “interests” beyond those captured by this framework. Garcetti, 547 U.S. at 425, 126 S.Ct.
      1951; see also Keyishian v. Board of Regents of Univ. of State of N. Y., 385 U.S. 589, 603, 87 S.Ct. 675, 17 L.Ed.2d
      629 (1967); Brief for Petitioner 26, n. 2. At the first step of the Pickering–Garcetti  inquiry, the parties’ disagreement
      thus turns out to center on one question alone: Did Mr. Kennedy offer his prayers in his capacity as a private citizen,
      or did they amount to government speech attributable to the District?


       


      Our cases offer some helpful guidance for resolving this question. In Garcetti, the Court concluded that a prosecutor’s
      internal memorandum to a supervisor was made “pursuant to [his] official duties,” and thus ineligible for First Amendment
      protection. 547 U.S. at 421, 126 S.Ct. 1951. In reaching this conclusion, the Court relied on the fact that the prosecutor’s
      speech “fulfill[ed] a responsibility to advise his supervisor about how best to proceed with a pending case.” Ibid.
      In other words, the prosecutor’s memorandum was government speech because it was speech the government “itself ha[d]
      commissioned or created” and speech the employee was expected to deliver in the course of carrying out his job. Id.,
      at 422, 126 S.Ct. 1951.


       


      By contrast, in Lane a public employer sought to terminate an employee after he testified at a criminal trial about
      matters involving his government employment. 573 U.S. at 233, 134 S.Ct. 2369. The Court held that the employee’s speech
      was protected by the First Amendment. Id., at 231, 134 S.Ct. 2369. In doing so, the Court held that the fact the speech
      touched on matters related to public employment was not enough to render it government speech. Id., at 239–240, 134
      S.Ct. 2369. Instead, the Court explained, the “critical question ... is whether the speech at issue is itself ordinarily
      within the scope of an employee’s duties.” Id., at 240, 134 S.Ct. 2369. It is an inquiry this Court has said should
      be undertaken “practical[ly],” rather than with a blinkered focus on the terms of some formal and capacious written
      job description. Garcetti, 547 U.S. at 424, 126 S.Ct. 1951. To proceed otherwise would be to allow public employers
      to use “excessively broad job descriptions” to subvert the Constitution’s protections. Ibid.


       


      Applying these lessons here, it seems clear to us that Mr. Kennedy has demonstrated that his speech was private speech,
      not government speech. When Mr. Kennedy uttered the three prayers that resulted in his suspension, he was not engaged
      in speech “ordinarily within the scope” of his duties as a coach. Lane, 573 U.S. at 240, 134 S.Ct. 2369. He did not
      speak pursuant to government policy. He was not seeking to convey a government-created message. He was not instructing
      players, discussing strategy, encouraging better on-field performance, or engaged in any other speech the District paid
      him to produce as a coach. See Part I–B, supra. Simply put: Mr. Kennedy’s prayers did not “ow[e their] existence” to
      Mr. Kennedy’s responsibilities as a public employee.'
  - source_sentence: Discuss the implications of the Thirteenth Amendment as it relates to Congress's power to enact laws
      against private racial discrimination in property transactions. How does the text support the assertion that Congress's
      authority extends beyond state action?
    sentences:
    - '––––, ––––, 142 S.Ct. 1539, 1545, ––– L.Ed.2d –––– (2022) (THOMAS, J., concurring) (internal quotation*2301 marks omitted).
      Either way, the Due Process Clause at most guarantees process. It does not, as the Court’s substantive due process cases
      suppose, “forbi[d] the government to infringe certain ‘fundamental’ liberty interests at all, no matter what process
      is provided.” Reno v. Flores, 507 U.S. 292, 302, 113 S.Ct. 1439, 123 L.Ed.2d 1 (1993); see also, e.g.,Collins v. Harker
      Heights, 503 U.S. 115, 125, 112 S.Ct. 1061, 117 L.Ed.2d 261 (1992).


       


      As I have previously explained, “substantive due process” is an oxymoron that “lack[s] any basis in the Constitution.”
      Johnson, 576 U.S. at 607–608, 135 S.Ct. 2551 (opinion of THOMAS, J.); see also, e.g.,Vaello Madero, 596 U.S., at ––––,
      142 S.Ct., at 1545 (THOMAS, J., concurring) (“[T]ext and history provide little support for modern substantive due process
      doctrine”). “The notion that a constitutional provision that guarantees only ‘process’ before a person is deprived of
      life, liberty, or property could define the substance of those rights strains credulity for even the most casual user
      of words.” McDonald v. Chicago, 561 U.S. 742, 811, 130 S.Ct. 3020, 177 L.Ed.2d 894 (2010) (THOMAS, J., concurring in
      part and concurring in judgment); see also United States v. Carlton, 512 U.S. 26, 40, 114 S.Ct. 2018, 129 L.Ed.2d 22
      (1994) (Scalia, J., concurring in judgment). The resolution of this case is thus straightforward. Because the Due Process
      Clause does not secure any substantive rights, it does not secure a right to abortion.


       


      The Court today declines to disturb substantive due process jurisprudence generally or the doctrine’s application in
      other, specific contexts. Cases like Griswold v. Connecticut, 381 U.S. 479, 85 S.Ct. 1678, 14 L.Ed.2d 510 (1965) (right
      of married persons to obtain contraceptives)*; Lawrence v. Texas, 539 U.S. 558, 123 S.Ct. 2472, 156 L.Ed.2d 508 (2003)
      (right to engage in private, consensual sexual acts); and Obergefell v. Hodges, 576 U.S. 644, 135 S.Ct. 2584, 192 L.Ed.2d
      609 (2015) (right to same-sex marriage), are not at issue. The Court’s abortion cases are unique, see ante, at 2257
      – 2258, 2277 – 2278, 2280 – 2281, and no party has asked us to decide “whether our entire Fourteenth Amendment jurisprudence
      must be preserved or revised,” McDonald, 561 U.S. at 813, 130 S.Ct. 3020 (opinion of THOMAS, J.). Thus, I agree that
      “[n]othing in [the Court’s] opinion should be understood to cast doubt on precedents that do not concern abortion.”
      Ante, at 2277 – 2278.


       


      For that reason, in future cases, we should reconsider all of this Court’s substantive due process precedents, including
      Griswold, Lawrence, and Obergefell. Because any substantive due process decision is “demonstrably erroneous,” Ramos
      v.Louisiana, 590 U.S. ––––, ––––, 140 S.Ct. 1390, 1424, 206 L.Ed.2d 583 (2020) (THOMAS, J., concurring in judgment),
      we have a duty to “correct the error” established in those precedents, Gamble v. United States, 587 U.S. ––––, ––––,
      139 S.Ct. 1960, 1984-1985, 204 L.Ed.2d 322 (2019) (THOMAS, J., concurring).'
    - 'On October 21, the superintendent further observed to a state official that “[t]he issue is quickly changing as it
      has shifted from leading prayer with student athletes, to a coaches [sic] right to conduct” his own prayer “on the 50
      yard line.” Id., at 88.


       


      On October 23, shortly before that evening’s game, the District wrote Mr. Kennedy again. It expressed “appreciation”
      for his “efforts to comply” with the District’s directives, including avoiding “on-the-job prayer with players in the
      ... football program, both in the locker room prior to games as well as on the field immediately following games.” Id.,
      at 90. The letter also admitted that, during Mr. Kennedy’s recent October 16 postgame prayer, his students were otherwise
      engaged and not praying with him, and that his prayer was “fleeting.” Id., at 90, 93. Still, the District explained
      that a “reasonable observer” could think government endorsement of religion had occurred when a “District employee,
      on the field only by virtue of his employment with the District, still on duty” engaged in “overtly religious conduct.”
      Id., at 91, 93. The District thus made clear that the only option it would offer Mr. Kennedy was to allow him to pray
      after a game in a “private location” behind closed doors and “not observable to students or the public.” Id., at 93–94.


       


      After the October 23 game ended, Mr. Kennedy knelt at the 50-yard line, where “no one joined him,” and bowed his head
      for a “brief, quiet prayer.” 991 F.3d at 1019; App. 173, 236–239. The superintendent informed the District’s board that
      this prayer “moved closer to what we want,” but nevertheless remained “unconstitutional.” Id., at 96. After the final
      relevant football game on October 26, Mr. Kennedy again knelt alone to offer a brief prayer as the players engaged in
      postgame traditions. 443 F.Supp.3d 1223, 1231 (W.D. Wash. 2020); App. to Pet. for Cert. 182. While he was praying, other
      adults gathered around him on the field. See 443 F.Supp.3d at 1231; App. 97. Later, Mr. Kennedy rejoined his players
      for a postgame talk, after they had finished singing the school fight song. 443 F.Supp.3d at 1231; App. 103.


       


       


      C


      Shortly after the October 26 game, the District placed Mr. Kennedy on paid administrative *2419 leave and prohibited
      him from “participat[ing], in any capacity, in ... football program activities.” Ibid. In a letter explaining the reasons
      for this disciplinary action, the superintendent criticized Mr. Kennedy for engaging in “public and demonstrative religious
      conduct while still on duty as an assistant coach” by offering a prayer following the games on October 16, 23, and 26.
      Id., at 102. The letter did not allege that Mr. Kennedy performed these prayers with students, and it acknowledged that
      his prayers took place while students were engaged in unrelated postgame activities. Id., at 103. Additionally, the
      letter faulted Mr. Kennedy for not being willing to pray behind closed doors. Id., at 102.


       


      In an October 28 Q&A document provided to the public, the District admitted that it possessed “no evidence that students
      have been directly coerced to pray with Kennedy.” Id., at 105. The Q&A also acknowledged that Mr. Kennedy “ha[d] complied”
      with the District’s instruction to refrain from his “prior practices of leading players in a pre-game prayer in the
      locker room or leading players in a post-game prayer immediately following games.” Ibid. But the Q&A asserted that the
      District could not allow Mr. Kennedy to “engage in a public religious display.” Id., at 105, 107, 110. Otherwise, the
      District would “violat[e] the ... Establishment Clause” because “reasonable ... students and attendees” might perceive
      the “district [as] endors[ing] ... religion.” Id., at 105.


       


      While Mr. Kennedy received “uniformly positive evaluations” every other year of his coaching career, after the 2015
      season ended in November, the District gave him a poor performance evaluation. Kennedy v. Bremerton School Dist., 869
      F.3d 813, 820 (C.A.9 2017).'
    - 'Nor was the scope of the 1866 Act altered when it was re-enacted in 1870, some two years after the ratification of
      the Fourteenth Amendment.71 It is quite true that some members of Congress supported the Fourteenth Amendment “in order
      to eliminate doubt as to the constitutional validity of the Civil Rights Act as applied to the States.” Hurd v. Hodge,
      334 U.S. 24, 32—33, 68 S.Ct. 847, 852. But it certainly does not follow that the adoption of the Fourteenth Amendment
      or the subsequent readoption of the Civil Rights Act were meant somehow to limit its application to state action. The
      legislative history furnishes not the slightest factual basis for any such speculation, and the conditions prevailing
      in 1870 make it highly implausible. For by that time most, if not all, of the former Confederate States, then under
      the control of “reconstructed” legislatures, had formally repudiated racial discrimination, and the focus of congressional
      concern had clearly shifted from hostile statutes to the activities of groups like the Ku Klux Klan, operating wholly
      outside the law.72


       


       **2202 *437 Against this background, it would obviously make no sense to assume, without any historical support whatever,
      that Congress made a silent decision in 1870 to exempt private discrimination from the operation of the Civil Rights
      Act of 1866.73 “The cardinal rule is that repeals by implication are not favored.” Posadas v. National City Bank, 296
      U.S. 497, 503, 56 S.Ct. 349, 352, 80 L.Ed. 351. All Congress said in 1870 was that the 1866 law “is hereby re-enacted.”
      That is all Congress meant.


       


       As we said in a somewhat different setting two Terms ago, “We think that history leaves no doubt that, if we are to
      give (the law) the scope that its origins dictate, we must accord it a sweep as broad as its language.” United States
      v. Price, 383 U.S. 787, 801, 86 S.Ct. 1152, 1160. “We are not at liberty to seek ingenious analytical instruments,”
      ibid., to carve from s 1982 an exception for private conduct—even though its application to such conduct in the present
      context is without established precedent. And, as the Attorney General of the United States said at the oral argument
      of this case, “The fact that the statute lay partially dormant for many years cannot be held to diminish its force today.”


       


       


       


      V.


      The remaining question is whether Congress has power under the Constitution to do what s 1982 purports to do: to prohibit
      all racial discrimination, private and public, in the sale and rental of property. Our starting point is the Thirteenth
      Amendment, for it was pursuant *438 to that constitutional provision that Congress originally enacted what is now s
      1982. The Amendment consists of two parts. Section 1 states:


      “Neither slavery nor involuntary servitude, except as a punishment for crime whereby the party shall have been duly
      convicted, shall exist within the United States, or any place subject to their jurisdiction.”


      Section 2 provides:


      “Congress shall have power to enforce this article by appropriate legislation.”


       As its text reveals, the Thirteenth Amendment “is not a mere prohibition of state laws establishing or upholding slavery,
      but an absolute declaration that slavery or involuntary servitude shall not exist in any part of the United States.”
      Civil Rights Cases, 109 U.S. 3, 20, 3 S.Ct. 18, 28, 27 L.Ed. 835. It has never been doubted, therefore, “that the power
      vested in Congress to enforce the article by appropriate legislation,” ibid., includes the power to enact laws “direct
      and primary, operating upon the acts of individuals, whether sanctioned by state legislation or not.” Id., at 23, 3
      S.Ct., at 30.74


       


       Thus, the fact that s 1982 operates upon the unofficial acts of private individuals, whether or not sanctioned by state
      law, presents no constitutional problem. If Congress has power **2203 under the Thirteenth Amendment to eradicate conditions
      that prevent Negroes from buying and renting property because of their race or color, then no federal statute calculated
      to achieve that objective *439 can be thought to exceed the constitutional power of Congress simply because it reaches
      beyond state action to regulate the conduct of private individuals. The constitutional question in this case, therefore,
      comes to this: Does the authority of Congress to enforce the Thirteenth Amendment “by appropriate legislation” include
      the power to eliminate all racial barriers to the acquisition of real and personal property? We think the answer to
      that question is plainly yes.'
