    *1994 The program imposes no geographic limitation: Parents may direct tuition payments to schools inside or outside the
    State, or even in foreign countries. [citation omitted] In schools that qualify for the program because they are accredited,
    teachers need not be certified by the State,…and Maine’s curricular requirements do not apply…Single-sex schools are eligible.
    [citation omitted]


     


    Prior to 1981, parents could also direct the tuition assistance payments to religious schools. Indeed, in the 1979–1980
    school year, over 200 Maine students opted to attend such schools through the tuition assistance program. App. 72. In
    1981, however, Maine imposed a new requirement that any school receiving tuition assistance payments must be “a nonsectarian
    school in accordance with the First Amendment of the United States Constitution.” [citation omitted] That provision was
    enacted in response to an opinion by the Maine attorney general taking the position that public funding of private religious
    schools violated the Establishment Clause of the First Amendment. We subsequently held, however, that a benefit program
    under which private citizens “direct government aid to religious schools wholly as a result of their own genuine and independent
    private choice” does not offend the Establishment Clause. [citation omitted] Following our decision in Zelman, the Maine
    Legislature considered a proposed bill to repeal the “nonsectarian” requirement, but rejected it. App. 100, 108.


     


    The “nonsectarian” requirement for participation in Maine’s tuition assistance program remains in effect today. The Department
    has stated that, in administering this requirement, it “considers a sectarian school to be one that is associated with
    a particular faith or belief system and which, in addition to teaching academic subjects, promotes the faith or belief
    system with which it is associated and/or presents the material taught through the lens of this faith.” [citation omitted]
    “The Department’s focus is on what the school teaches through its curriculum and related activities, and how the material
    is presented.” …“[A]ffiliation or association with a church or religious institution is one potential indicator of a sectarian
    school,” but “it is not dispositive.”


     


     


    B


    This case concerns two families that live in SAUs that neither maintain their own secondary schools nor contract with
    any nearby secondary school. App. 70, 71. Petitioners David and Amy Carson reside in Glenburn, Maine. Id., at 74. When
    this litigation commenced, the Carsons’ daughter attended high school at Bangor Christian Schools (BCS), which was founded
    in 1970 as a ministry of Bangor Baptist Church. Id., at 74, 80. The Carsons sent their daughter to BCS because of the
    school’s high academic standards and because the school’s Christian worldview aligns with their sincerely held religious
    beliefs. Id., at 74. Given that BCS is a “sectarian” school that cannot qualify for tuition assistance payments under
    Maine’s program, id., at 80, the Carsons paid the tuition for their daughter to attend BCS themselves, id., at 74.


     


    Petitioners Troy and Angela Nelson live in Palermo, Maine. Id., at 78. When this litigation commenced, the Nelsons’ daughter
    attended high school at Erskine Academy, a secular private school, and their son attended middle school at Temple Academy,
    a “sectarian” school affiliated with *1995 Centerpoint Community Church. Id., at 78, 90, 91. The Nelsons sent their son
    to Temple Academy because they believed it offered him a high-quality education that aligned with their sincerely held
    religious beliefs. Id., at 78. While they wished to send their daughter to Temple Academy too, they could not afford to
    pay the cost of the Academy’s tuition for both of their children. Id., at 79.


     


    BCS and Temple Academy are both accredited by the New England Association of Schools and Colleges (NEASC), and the Department
    considers each school a “private school approved for attendance purposes” under the State’s compulsory attendance requirement.
    Id., at 80, 90. Yet because neither school qualifies as “nonsectarian,” neither is eligible to receive tuition payments
    under Maine’s tuition assistance program. Id., at 80, 90. Absent the “nonsectarian” requirement, the Carsons and the Nelsons
    would have asked their respective SAUs to pay the tuition to send their children to BCS and Temple Academy, respectively.
    Id., at 79.


     


    In 2018, petitioners brought suit against the commissioner of the Maine Department of Education. Id., at 11–12.'
