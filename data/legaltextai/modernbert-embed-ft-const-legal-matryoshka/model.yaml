    Supreme Court of the United States.


    SAMUEL M. CLYATT


    v.


    UNITED STATES.


    No. 235.


    |


    Argued December 13, 14, 1904.


    |


    Decided March 13, 1905.


    Synopsis


    ON WRIT of Certiorari to the United States Circuit Court of Appeals for the Fifth Circuit, bringing up for review a judgment
    of the Circuit Court for the Northern District of Florida, convicting defendant of returning certain specified persons
    to a condition of peonage, which judgment had been taken to the Circuit Court of Appeals by a writ of error to the Circuit
    Court. Reversed and the cause remanded for a new trial.


     


    **429 Statement by Mr. Justice Brewer:


    Considers the constitutionality of Sections 1990 and 5526, Rev. Stat. (U. S. Comp. Stat. 1901, pp. 1266, 3715),  [Anti-Peonage
    Act]


    *215 Mr. Justice Brewer delivered the opinion of the court:


     


    …What is peonage? It may be defined as a status or condition of compulsory service, based upon the indebtedness of the
    peon to the master. The basal fact is indebtedness. As said by Judge Benedict, delivering the opinion in Jaremillo v.
    Romero, 1 N. M. 190, 194: ‘One fact existed universally: all were indebted to their masters. This was the cord by which
    they seemed bound to their master’s service.’ Upon this is based a condition of compulsory service. Peonage is sometimes
    classified as voluntary or involuntary; but this implies simply a difference in the mode of origin, but none in the character
    of the servitude. The one exists where the debtor voluntarily contracts to enter the service of his creditor. The other
    is forced upon the debtor by some provision of law. But peonage, however created, is compulsory service,—involuntary servitude.
    The peon can release himself therefrom, it is true, by the payment of the debt, but otherwise the service is enforced.
    A clear distinction exists between peonage and the voluntary performance of labor or rendering of services in payment
    of a debt. In the latter case the debtor, though contracting to pay his indebtedness by labor or service, and subject,
    like any other contractor, to an action for damages for breach of that contract, can elect at any time to break it, and
    no law or force compels *216 performance or a continuance of the service. We need not stop to consider any possible limits
    or exceptional cases, such as the service of a sailor…or the obligations of a child to its parents, or of an apprentice
    to his master, or the power of the legislature to make unlawful, and punish criminally, an abandonment by an employee
    of his post of labor in any extreme cases. That which is contemplated by the statute is compulsory service to secure the
    payment of a debt. Is this legislation within the power of Congress? It may be conceded, as a general proposition, that
    the ordinary relations of individual to individual are subject to the control of the states, and are not intrusted to
    the general government; but the 13th Amendment, adopted as an outcome of the Civil War, reads:


    ‘Sec. 1. Neither slavery nor involuntary servitude, except as a punishment for crime whereof the party shall have been
    duly convicted, shall exist within the United States, or any place subject to their jurisdiction.


    ‘Sec. 2. Congress shall have power to enforce this article by appropriate legislation.’


    This amendment denounces a status or condition, irrespective of the manner or authority by which it is created. The prohibitions
    of the 14th and 15th Amendments are largely upon the acts of the states; but the 13th Amendment names no party or authority,
    but simply forbids slavery and involuntary servitude, grants to Congress power to enforce this prohibition by appropriate
    legislation. The differences between the 13th and subsequent amendments [can be described as follows:]


    This amendment, as well as the 14th, is undoubtedly self-executing without any ancillary legislation, so far as its terms
    are applicable to any existing state of circumstances. By its own unaided force and effect it abolished slavery, and *217
    established universal freedom. Still, legislation may be necessary and proper to meet all the various cases and circumstances
    to be affected by it, and to prescribe proper modes of redress for its violation in letter or spirit. And such legislation
    may be primary and direct in its character; for the amendment is not a mere prohibition of state laws establishing or
    upholding slavery, but an absolute declaration that slavery or involuntary servitude shall not exist in any part of the
    United States. . . .'
