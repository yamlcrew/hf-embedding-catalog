    precedents and the majority opinion. The constitutional regime we have lived in for the last 50 years recognized competing
    interests, and sought a balance between them. The constitutional regime we enter today erases the woman’s interest and
    recognizes only the State’s (or the Federal Government’s).


     


     


     


    B


    The majority makes this change based on a single question: Did the reproductive right recognized in Roe and Casey exist
    in “1868, the year when the Fourteenth Amendment was ratified”? Ante, at 2252 – 2253. The majority says (and with this
    much we agree) that the answer to this question is no: In 1868, there was no nationwide right to end a pregnancy, and
    no thought that the Fourteenth Amendment provided one.


     


    Of course, the majority opinion refers as well to some later and earlier history. On the one side of 1868, it goes back
    as far as the 13th (the 13th!) century. See ante, at 2249, 142 S.Ct. 2111. But that turns out to be wheel-spinning. First,
    it is not clear what relevance *2324 such early history should have, even to the majority. See New York State Rifle &
    Pistol Assn., Inc. v.Bruen, 597 U.S. ––––, ––––, 142 S.Ct. 2111, 2136, ––– L.Ed.2d –––– (2022) (“Historical evidence that
    long predates [ratification] may not illuminate the scope of the right”). If the early history obviously supported abortion
    rights, the majority would no doubt say that only the views of the Fourteenth Amendment’s ratifiers are germane. See ibid.
    (It is “better not to go too far back into antiquity,” except if olden “law survived to become our Founders’ law”). Second—and
    embarrassingly for the majority—early law in fact does provide some support for abortion rights. Common-law authorities
    did not treat abortion as a crime before “quickening”—the point when the fetus moved in the womb.2 And early American
    law followed the common-law rule.3 So the criminal law of that early time might be taken as roughly consonant with Roe’s
    and Casey’s different treatment of early and late abortions. Better, then, to move forward in time. On the other side
    of 1868, the majority occasionally notes that many States barred abortion up to the time of Roe. See ante, at 2253, 2260,
    142 S.Ct. 2111. That is convenient for the majority, but it is window dressing. As the same majority (plus one) just informed
    us, “post-ratification adoption or acceptance of laws that are inconsistent with the original meaning of the constitutional
    text obviously cannot overcome or alter that text.” New York State Rifle & Pistol Assn., Inc., 597 U.S., at –––– – ––––,
    142 S.Ct., at 2137. Had the pre-Roe liberalization of abortion laws occurred more quickly and more widely in the 20th
    century, the majority would say (once again) that only the ratifiers’ views are germane.


     


    The majority’s core legal postulate, then, is that we in the 21st century must read the Fourteenth Amendment just as its
    ratifiers did. And that is indeed what the majority emphasizes over and over again. See ante, at 2267 (“[T]he most important
    historical fact [is] how the States regulated abortion when the Fourteenth Amendment was adopted”); see also ante, at
    2242 – 2243, 2248 – 2249, and n. 24, 23, 25, 28. If the ratifiers did not understand something as central to freedom,
    then neither can we. Or said more particularly: If those people did not understand reproductive rights as part of the
    guarantee of liberty conferred in the Fourteenth Amendment, then those rights do not exist.


     


    As an initial matter, note a mistake in the just preceding sentence. We referred there to the “people” who ratified the
    Fourteenth Amendment: What rights did those “people” have in their heads at the time? But, of course, “people” did not
    ratify the Fourteenth Amendment. Men did. So it is perhaps not so surprising that the ratifiers were not perfectly attuned
    to the importance of reproductive rights for women’s liberty, or for their capacity to participate as equal members of
    our Nation.'
