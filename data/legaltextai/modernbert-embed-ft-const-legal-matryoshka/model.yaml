  - 'Such laws would furnish the readiest means of compulsion. The 13th *244 Amendment prohibits involuntary servitude except
    as punishment for crime. But the exception, allowing full latitude for the enforcement of penal laws, does not destroy
    the prohibition. It does not permit slavery or involuntary servitude to be established or maintained through the operation
    of the criminal law by making it a crime to refuse to submit to the one or to render the service which would constitute
    the other. The state may impose involuntary servitude as a punishment for crime, but it may not compel one man to labor
    for another in payment of a debt, by punishing him as a criminal if he does not perform the service or pay the debt.


    If the statute in this case had authorized the employing company to seize the debtor, and hold him to the service until
    he paid the $15, or had furnished the equivalent in labor, its invalidity would not be questioned. It would be equally
    clear that the state could not authorize its constabulary to prevent the servant from escaping, and to force him to work
    out his debt. But the state could not avail itself of the sanction of the criminal law to supply the compulsion any more
    than it could use or authorize the use of physical force. ‘In contemplation of the law, the compulsion to such service
    by the fear of punishment under a criminal statute is more powerful than any guard which the employer could station.’
    Ex parte Hollman, 79 S. C. 22, 21 L.R.A.(N.S.) 249, 60 S. E. p. 24, 14 A. & E. Ann. Cas. 1109.


    **153 What the state may not do directly it may not do indirectly. If it cannot punish the servant as a criminal for the
    mere failure or refusal to serve without paying his debt, it is not permitted to accomplish the same result by creating
    a statutory presumption which, upon proof of no other fact, exposes him to conviction and punishment. Without imputing
    any actual motive to oppress, we must consider the natural operation of the statute here in question (Henderson v. New
    York [Henderson v. Wickham] 92 U. S. p. 268, 23 L. ed. 547), and it is apparent that it furnishes a convenient instrument
    for the coercion *245 which the Constitution and the act of Congress forbid; an instrument of compulsion peculiarly effective
    as against the poor and the ignorant, its most likely victims. There is no more important concern than to safeguard the
    freedom of labor upon which alone can enduring prosperity be based. The provision designed to secure it would soon become
    a barren form if it were possible to establish a statutory presumption of this sort, and to hold over the heads of laborers
    the threat of punishment for crime, under the name of fraud, but merely upon evidence of failure to work out their debts.
    The act of Congress deprives of effect all legislative measures of any state through which, directly or indirectly, the
    prohibited thing, to wit, compulsory service to secure the payment of a debt, may be established or maintained; and we
    conclude that § 4730, as amended, of the Code of Alabama, in so far as it makes the refusal or failure to perform the
    act or service, without refunding the money or paying for the property prima facie evidence of the commission received
    of the crime which the section defines, is in conflict with the 13th Amendment, and the legislation authorized by that
    Amendment, and is therefore invalid.


    In this view it is unnecessary to consider the contentions which have been made under the 14th Amendment…


