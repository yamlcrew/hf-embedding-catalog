  sentences:
  - '{"product_name": "Компьютерный стол КСТ-08.1", "Бренд": null, "Цвет": "Белый", "Материал": null, "description": "Компьютерный
    стол КСТ-08.1 — это идеальный выбор для создания комфортного рабочего пространства и предоставляет достаточно места для
    размещения компьютера, монитора и других необходимых аксессуаров. Столешница выполнена из ЛДСП отечественного производства
    с матовым покрытием, что придаёт ей стильный и современный вид. Стол КСТ-08.1 оснащён тумбой с тремя выдвижными ящиками,
    что позволяет удобно хранить канцелярские принадлежности и документы. Также предусмотрена полка для системного блока,
    что помогает поддерживать порядок на рабочем месте. Полка для клавиатуры обеспечивает комфортное использование. Стол имеет
    прямую форму, а зеркальная сборка позволяет установить его как с левой, так и с правой стороны, что добавляет универсальности
    в его использовании. Компьютерный стол КСТ-08.1 станет надёжным помощником в организации рабочего процесса, обеспечивая
    комфорт и функциональность рабочего пространства.", "Производитель": "Россия"}'
