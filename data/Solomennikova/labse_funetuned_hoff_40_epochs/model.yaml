  - '{"product_name": "Стул Stick 45.5х82х66 см", "Бренд": null, "Цвет": "Белый", "Материал": null, "description": "Трудно
    поверить, что стул Stick полностью изготовлен из полипропилена. Кажется, что его сиденье и спинка связаны из пряжи умелой
    мастерицей. Благодаря изысканному дизайну изделие будет превосходно смотреться и на кухне, и на веранде, и в саду. Стул
    лёгок, поэтому переносить его с места на место не составит труда. Ему не страшны дождь и пыль, а помыть изделие можно
    под струей воды.\nСтул имеет эргономичную форму и очень удобен, а любители сидеть на мягком могут положить на сиденье
    подушку-галету.", "Производитель": "Китай"}'
  - '{"product_name": "Зеркало настенное в багетной раме EVOFORM витой махагон 68х148 см", "Бренд": "EVOFORM", "Цвет": "Махагон",
    "Материал": null, "description": "При изготовлении зеркал торговой марки «Evoform» используются серебряные зеркальные
    полотна мирового производителя AGC - Asahi Glass Co (Япония). AGC - первая компания, применившая новейшую технологию Mirox
    New Generation Ecological. Это новое поколение экологически чистых, высококачественных, стойких к воздействиям зеркал.
    Срок полезного использования зеркала AGC в 3 раза превышает аналогичный показатель традиционных зеркал. Повышенная стойкость
    поверхности зеркала к абразивным средствам очистки в семь раз выше, чем у традиционных зеркал. Зеркала Evoform не подвергаются
    точечной коррозии и «цветению» с течением времени, устойчивы к высоким температурам при равномерном нагревании (до 80°C).
    Изделия проходят сертификацию Cradle to Cradle (безотходная система производства). Багет для зеркал торговой марки «Evoform»
    изготавливается из вспененного полистирола. Он не боится влажности и перепада температур, поэтому его можно смело использовать
    в ванных комнатах, в помещениях с низкими или высокими температурами (подвалы, гаражи, неотапливаемые в зимний период
    дачи или бани, сауны, беседки).", "Производитель": "Россия"}'
