  - '{"product_name": "Каркас кровати Леа цвет синий 140х200 см", "Бренд": null, "Цвет": "синий", "Материал": null, "description":
    "Кровать Леа - это изящное сочетание стиля и функциональности. Обивка из нежного велюра придает ей шик и роскошь. Современный
    и лаконичный дизайн кровати позволит создать в спальне атмосферу комфорта. На мягкую спинку удобно облокотиться, чтобы
    почитать перед сном. Высокие деревянные опоры придают модели визуальную легкость и облегчают уборку. Расположенный под
    основанием короб решит проблему хранения запасных подушек, постельного белья, вещей сезонного пользования.\n Эта модель
    доступна только в тех вариантах обивки, которые представлены в нашем ассортименте.", "Производитель": "Россия"}'
- source_sentence: шкаф шк
  sentences:
  - '{"product_name": "Чехол для матраса MILDEX Base 80х200 см", "Бренд": "MILDEX", "Цвет": null, "Материал": null, "description":
    "Чехол для матраса изготовлен из махрового полотна, на которое с изнаночной стороны нанесено 100% влагозащитное покрытие
    «Мембрана». Для крепления на матрасе чехол имеет резинку по периметру. Использование чехла является отличной защитой,
    которая препятствует проникновению влаги, загрязнению вашего матраса, продлевает срок службы матраса. Защитный чехол удобен
    в эксплуатации: его можно стирать в обычной стиральной машине, он легко надевается и снимается с матраса, имеет долгий
    срок службы и привлекательный внешний вид.", "Производитель": "Россия"}'
  - '{"product_name": "Лампа соляная STAY GOLD 2-3 E14, 12x20x12 см", "Бренд": "STAY GOLD", "Цвет": "Коричневый,Розовый",
    "Материал": null, "description": "Лампа соляная 2-3 из материала гималайская каменная соль в цвете «светло-розовый».",
    "Производитель": "Россия"}'
  - '{"product_name": "Батут TRIUMPH NORD Триумфальный с лестницей 366х88х366 см", "Бренд": "TRIUMPH NORD", "Цвет": "Чёрный,Зелёный",
    "Материал": null, "description": "Проводить время на дачном участке или придомовой территории можно и с пользой, и с удовольствием:
    для этого достаточно установить на открытом пространстве батут TRIUMPH NORD. Физическая активность на свежем воздухе –
    прекрасная альтернатива сидению с гаджетами в руках: подпрыгивание на батуте укрепляет мышцы, развивает координацию движений,
    способствует сбросу лишнего веса. Прыжковое полотно из перматрона обеспечивает мощный отскок. Для безопасности тренировок
    предусмотрена нейлоновая защитная сетка, которая крепится к кольцу из стекловолокна. Модель подходит для использования
    детьми и взрослыми – важно только не превышать рекомендованную максимальную нагрузку.", "Производитель": "Китай"}'
