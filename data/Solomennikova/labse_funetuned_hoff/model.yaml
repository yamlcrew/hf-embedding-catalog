- source_sentence: кухонные столы
  sentences:
  - '{"product_name": "Фальшпанель Белла 4.6х35.6х1.6 см", "Бренд": null, "Цвет": "фисташка", "Материал": "МДФ с покрытием
    ПВХ", "description": "", "Производитель": "Россия"}'
  - '{"product_name": "Журнальный стол Лофт", "Бренд": null, "Цвет": "Чёрный,Дуб", "Материал": null, "description": "Низкий
    овальный столик на металлокаркасе создан для современного домашнего интерьера, гармонично впишется в гостиную, дополнит
    балкон или станет отличным вариантом для дачи. Столешница из МДФ представлена в трех базовых расцветках: под дерево, мраморный
    черный и белый, что позволяет выбрать именно тот вариант, который наиболее гармонично дополнит интерьер.\nКонструкция
    отличается долговечностью и прочностью. Высокая устойчивость к механическим повреждениям обеспечивает надежность использования
    этого столика долгие годы. Особое внимание следует уделить функциональности данного изделия.", "Производитель": "Россия"}'
  - '{"product_name": "Матрас пружинный Sanvi 90х200 см", "Бренд": "ARMOS", "Цвет": null, "Материал": null, "description":
    "Двусторонний матрас «Sanvi» относится к матрасам переменной жёсткости. Можно выбрать более комфортную сторону, просто
    перевернув матрас. Рельефная ортопена с одной стороны обеспечивает выраженный массажный эффект и отлично снимает напряжение.\nТермочувствительная
    вязко-эластичная пена с «эффектом памяти» с другой стороны быстро принимает форму тела под воздействием тепла и давления,
    постепенно восстанавливает объем без нагрузки. Пена Memory Pro - оптимальный выбор для людей с хроническими болями в спине,
    заболеваниями опорно-двигательного аппарата, спортсменов с интенсивными нагрузками и напряжением в мышцах. В основе матраса
    независимый пружинный блок Pocket Spring Multi повышенной комфортности, более 1000 пружин на спальное место. Данный блок
    отлично подстраивается под индивидуальные анатомические особенности спящего, уменьшая нагрузку на суставы и повышая качество
    сна. Армирован пружинный блок прочным бикоттоном. Такая конструкция обладает высокой упругостью, прочностью и повышенной
    несущей способностью.\nЧехол выполнен из мягкого, нежного трикотажа, простеганного на объемном гипоаллергенном волокне.",
    "Производитель": "Россия"}'
