- source_sentence: набор кружек
  sentences:
  - '{"product_name": "Каркас кровати Селена цвет кашемир", "Бренд": null, "Цвет": "кашемир", "Материал": null, "description":
    "Коллекция Селена представлена в трендовых оттенках Сантьяго и Кашемир, что придает ей современный вид. Фасады с покрытием
    Soft-touch приятны на ощупь и создают уютную атмосферу. В классическом стиле с рамочными фасадами в пленке ПВХ, коллекция
    также включает утолщенные колпаки модулей с фрезеровкой в древесной пленке. Петли Titus из Словении с возможностью установки
    демпфера обеспечивают долговечность, а скрытые направляющие с доводчиком гарантируют плавное и бесшумное закрывание ящиков.
    Цоколи в нижней части моделей добавляют яркий акцент и завершенность дизайну. \nОснование в комплект не входит.", "Производитель":
    "Россия"}'
  - '{"product_name": "Набор журнальных столов лофт Duae", "Бренд": null, "Цвет": "Белый,Чёрный", "Материал": null, "description":
    "", "Производитель": "Россия"}'
  - '{"product_name": "Матрас пружинный MILDEX Memphis 140х200 см", "Бренд": "MILDEX", "Цвет": null, "Материал": null, "description":
    "Пружинный матрас Memphis средней жёсткости. В основе матраса используется независимый пружинный блок «Hard Pocket» плотностью
    500 пружин на спальное место. \n Уникальная пена повышенной плотности Bi-foam, обладающая анатомическим эффектом, равномерно
    распределяет нагрузку по всей площади матраса.Природный комбинированный наполнитель Bi-Cocos обеспечивает оптимальную
    жесткость. Сочетание двух этих материалов с пружинным блоком Hardpocket в матрасе, прекрасно воспринимает даже большие
    нагрузки, оказывая необходимую анатомическую поддержку, что благоприятно сказывается на качестве сна. \n Мягкий трикотажный
    чехол с высокообъёмной стежкой поможет расслабиться после напряженного дня. \n Особенности:\n - Использование природных
    материалов", "Производитель": "Россия"}'
