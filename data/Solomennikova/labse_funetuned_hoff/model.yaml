    хранения аксессуаров и средств ухода за обувью.\nТумба изготовлена из ЛДСП с декоративным покрытием, за которым легко
    ухаживать: достаточно протирать поверхность мягкой салфеткой с любым средством для мебели, не содержащим абразивов..",
    "Производитель": "Россия"}'
