      trong trường hợp nào?
    sentences:
    - 'Biển số S.505b được đặt, bên dưới biển báo số P.106a “Cấm xe ô tô tải” để chỉ các loại xe tải chịu hiệu lực của biển
      báo và trọng tải toàn bộ xe cho phép (bao gồm trọng tải bản thân xe và khối lượng chuyên chở cho phép) tương ứng với
      mỗi loại xe không phụ thuộc vào số lượng trục.

      Biển số S.505b được lắp đặt cho từng cầu. Biển đặt bên phải theo chiều đi cách hai đầu cầu từ 10 m đến 20 mở vị trí
      dễ quan sát.

      Trường hợp cầu hư hỏng đột xuất, cầu có tải trọng khai thác thấp, ngoài việc đặt biển số S.505b còn phải đặt bổ sung
      các bảng thông tin hướng dẫn ở hai đầu đoạn tuyến để thông báo cho người tham gia giao thông về vị trí tải trọng của
      cầu có tải trọng khai thác thấp nhất nằm trong đoạn tuyến.


      Hình F.6 - Biển số S.505b'
    - '26.1. Biển báo cấm được đặt ở nơi đường giao nhau hoặc trước một vị trí trên đường cần cấm.

      Biển có hiệu lực bắt đầu từ vị trí đặt biển trở đi. Nếu vì lý do nào đó, biển đặt cách xa vị trí định cấm thì phải đặt
      biển phụ số S.502 để chỉ rõ khoảng cách từ sau biển cấm đến vị trí biển bắt đầu có hiệu lực.

      26.2. Khi cần thiết để chỉ rõ hướng tác dụng của biển và chỉ vị trí bắt đầu hay vị trí kết thúc hiệu lực của biển phải
      đặt biển phụ số S.503 “Hướng tác dụng của biển”.

      26.3. Các biển báo cấm từ biển số P.101 đến biển số P.120 không cần quy định phạm vi có hiệu lực của biển, không có
      biển báo hết cấm.

      26.4. Khi cần thiết, trong trường hợp cấm vì lý do cầu đường bị tắc, hư hỏng thì kèm theo các biển báo cấm nêu tại khoản
      26.3 Điều này đặt các biển chỉ dẫn lối đi cho xe bị cấm.

      26.5. Biển số P.121 và biển số P.128 có hiệu lực đến hết khoảng cách cấm ghi trên biển phụ số S.501 hoặc đến vị trí
      đặt biển số DP.135 “Hết tất cả các lệnh cấm”.

