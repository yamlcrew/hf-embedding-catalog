widgetData:
- source_sentence: 'Biển báo có hình mũi tên chỉ thẳng và rẽ trái đồng thời cho phép người tham gia giao thông rẽ phải nếu
    không có biển báo khác.

    Đúng hay sai?'
  sentences:
  - 'a) Để báo cấm rẽ trái hoặc rẽ phải (theo hướng mũi tên chỉ) ở những vị trí đường giao nhau, đặt biển số P.123a "Cấm rẽ
    trái" hoặc biển số P.123b "Cấm rẽ phải". Biển không có giá trị cấm quay đầu xe.

    b) Biển có hiệu lực cấm các loại xe (cơ giới và thô sơ) rẽ sang phía trái hoặc phía phải trừ các xe được ưu tiên theo
    quy định.

    c) Trước khi đặt biển cấm rẽ, có thể đặt biển chỉ dẫn hướng đi thích hợp.


    Hình B.23 - Biển số P.123'
  - 'a) Biển số S.507 được sử dụng độc lập để báo trước cho người tham gia giao thông biết chỗ rẽ nguy hiểm và để chỉ hướng
    rẽ.

    b) Biển được đặt trong trường hợp người tham gia giao thông khó nhận biết hướng rẽ của đường. Biển có thể đặt đồng thời
    hai biển ngược chiều nhau để chỉ hướng rẽ trái và rẽ phải, với độ cao đặt biển từ 1,2 m đến 1,5 m. Trường hợp cần dẫn
    hướng trong đường cong có thể sử dụng tiêu phản quang.

    c) Biển không thay thế cho việc đặt các biển báo nguy hiểm số W.201 (a,b) và W.202 (a,b,c).


    Hình F.9 - Biển số S.507'
  - 'Để báo hiệu đường đi sát vách núi, đặt biển báo nguy hiểm số W223(a,b) “Vách núi nguy hiểm". Biển dùng để báo nguy hiểm
    cho người tham gia giao thông phải cẩn thận. Biển đặt ở nơi sắp vào đoạn đường đi sát vách núi vừa hẹp vừa hạn chế tầm
    nhìn. Khi dùng biển cần chú ý vách núi nằm ở bên trái hay bên phải đường để đặt biển W.223a hoặc biển W.223b cho phù hợp.


    Hình C.25 - Biển số W.223'
- source_sentence: Biển báo "người tham gia giao thông không được phép đi bộ" yêu cầu gì?
  sentences:
  - '29.1. Biển báo nguy hiểm hoặc cảnh báo chủ yếu có hình tam giác đều, ba đỉnh lượn tròn; một cạnh nằm ngang, đỉnh tương
    ứng hướng lên trên, trừ biển số W.208 “Giao nhau với đường ưu tiên” thì đỉnh tương ứng hướng xuống dưới .

    29.2. Kích thước cụ thể của hình vẽ và màu sắc được quy định chi tiết ở Điều 12, Điều 13 và Phụ lục C của Quy chuẩn này.'
  - 'a) Để chỉ dẫn cho người tham gia giao thông biết đường phía trước có làn đường dành riêng cho ô tô khách theo chiều ngược
    lại, đặt biển số I.413a "Đường phía trước có làn đường dành cho ô tô khách". Biển được đặt ở nơi đường giao nhau đầu đường
    một chiều mà hướng ngược chiều có ô tô khách được phép chạy.

    b) Để chỉ dẫn cho người tham gia giao thông biết ở nơi đường giao nhau rẽ phải hoặc rẽ trái là rẽ ra đường có làn đường
    dành riêng cho ô tô khách, đặt biển số I.413b hoặc biển số I.413c báo hiệu "Rẽ ra đường có làn đường dành cho ô tô khách".
    Tùy theo hướng rẽ mà lựa chọn kiểu biển cho phù hợp.


    Hình E.13 - Biển số I.413'
  - 'Để báo trước sắp đến nơi giao nhau cùng mức của các tuyến đường cùng cấp (không có đường nào ưu tiên) trên cùng một mặt
    bằng, đặt biển số W.205(a,b,c,d,e) "Đường giao nhau". Biển được đặt trước nơi đường giao nhau ở ngoài phạm vi nội thành,
    nội thị là chủ yếu. Trong nội thành, nội thị có thể châm chước không đặt biển này.


    Hình C.5 - Biển số W.205'
- source_sentence: 'Biển báo này yêu cầu tất cả phương tiện không được phép lưu thông vào khu vực có biển báo.

    Đúng hay sai?'
  sentences:
  - '34.1. Các biển hiệu lệnh phải đặt tại vị trí cần báo hiệu lệnh. Do điều kiện khó khăn nếu đặt xa hơn phải đặt kèm biển
    phụ số S.502.

    34.2. Các biển hiệu lệnh có hiệu lực kể từ vị trí đặt biển. Riêng biển số R.301a nếu đặt ở sau nơi đường giao nhau tiếp
    theo thì hiệu lực của biển kể từ vị trí đặt biển đến nơi đường giao nhau tiếp theo. Các biển R.301(a,b,c,d,e,f,g,h), R.302(a,b,c),
    R.411, R.412(a,b,c,d,e,f,g,h) và biển R.415 không cấm xe rẽ phải, rẽ trái để ra, vào cổng nhà hoặc ngõ, ngách, hẻm hoặc
    lối ra vào cơ quan, đơn vị trên đoạn đường có hiệu lực của biển.

    34.3. Nếu đoạn đường phải thi hành biển hiệu lệnh đi qua các nút giao (trừ giao với các ngõ, ngách, hẻm hoặc lối ra vào
    cơ quan, đơn vị; hoặc khu đất lân cận mà phương tiện chỉ có thể ra, vào khu đất bằng một lối đi chung), biển hiệu lệnh
    phải được nhắc lại đặt phía sau nút giao theo hướng đường đang có biển hiệu lệnh, trừ các biển R.420, R.421, các biển
    hiệu lệnh có tác dụng trong khu vực và các trường hợp có qui định riêng.'
  - 'Quy chuẩn này quy định về báo hiệu đường bộ bao gồm: đèn tín hiệu giao thông; biển báo hiệu đường bộ; vạch kẻ đường và
    các dấu hiệu khác trên mặt đường; cọc tiêu, tường bảo vệ, rào chắn, đinh phản quang, tiêu phản quang, cột Km, cọc H; thiết
    bị âm thanh báo hiệu đường bộ.

    Quy chuẩn này quy định về báo hiệu đường bộ áp dụng cho tất cả các tuyến đường bộ trong mạng lưới đường bộ Việt Nam, các
    đường nằm trong hệ thống đường bộ tham gia Điều ước quốc tế mà Việt Nam là thành viên (Hiệp định GMS-CBTA, các thỏa thuận
    trong ASEAN và các thỏa thuận quốc tế khác) - sau đây gọi là các tuyến đường đối ngoại.'
  - 'Để báo trước sắp đến đoạn đường có chiều đi và chiều về phân biệt bằng dải phân cách cứng, đặt biển số W.235 "Đường đôi".
    Trong nội thành, nội thị có thể không đặt biển này.


    Hình C.37 - Biển số W.235'
- source_sentence: Giả sử một xe ô tô con và một xe tải di chuyển cùng lúc trên đoạn đường có biển báo có số 80,90 này.
    Xe ô tô con di chuyển với tốc độ 95 km/h và xe tải di chuyển với tốc độ 85 km/h. Xe nào sẽ bị phạt, và lý do tại sao?
  sentences:
  - 'Quy chuẩn này quy định về báo hiệu đường bộ bao gồm: đèn tín hiệu giao thông; biển báo hiệu đường bộ; vạch kẻ đường và
    các dấu hiệu khác trên mặt đường; cọc tiêu, tường bảo vệ, rào chắn, đinh phản quang, tiêu phản quang, cột Km, cọc H; thiết
    bị âm thanh báo hiệu đường bộ.

    Quy chuẩn này quy định về báo hiệu đường bộ áp dụng cho tất cả các tuyến đường bộ trong mạng lưới đường bộ Việt Nam, các
    đường nằm trong hệ thống đường bộ tham gia Điều ước quốc tế mà Việt Nam là thành viên (Hiệp định GMS-CBTA, các thỏa thuận
    trong ASEAN và các thỏa thuận quốc tế khác) - sau đây gọi là các tuyến đường đối ngoại.'
  - 'Hình A.1 - Các dạng đèn tín hiệu

    a) Dạng đèn 1 Kiểu 1 là dạng đèn thường dùng, có 3 đèn tín hiệu xanh - vàng - đỏ. Ngoài ra còn các kiểu 2, 3, 4 các loại
    đèn báo hiệu cho phép ngoài đèn chính còn đèn mũi tên báo hiệu cho phép xe đi thẳng hoặc rẽ trái, rẽ phải, quay đầu.

    b) Dạng đèn 2 bao gồm các kiểu đèn ba màu hình mũi tên nhằm điều khiển các phương tiện theo các hướng cụ thể.

    c) Dạng đèn 3: Bên trái là đèn 2 mũi gạch chéo màu đỏ, bên phải là đèn mũi tên màu xanh. Khi tín hiệu màu đỏ sáng, các
    phương tiện phải dừng lại, khi đèn màu xanh sáng, các phương tiện được phép đi theo hướng mũi tên.

    d) Dạng đèn 4: Đèn tín hiệu 2 màu, xanh và đỏ. Kiểu 1 là đèn dạng đứng: tín hiệu đỏ ở trên, tín hiệu xanh ở dưới; Kiểu
    2 là đèn dạng nằm ngang: đèn đỏ bên trái, đèn xanh bên phải. Tín hiệu màu đỏ các phương tiện dừng lại, tín hiệu màu xanh
    các phương tiện được đi.

    e) Dạng đèn 5: Đèn tín hiệu một màu đỏ. Kiểu 1 là đèn tròn, kiểu 2 là đèn chữ thập.Khi đèn sáng cấm đi, đặt phía sau nút
    giao theo chiều đi.

    i) Dạng đèn 6 gồm 4 tín hiệu màu trắng có đường kính từ 80 mm đến 100 mm: bảng bố trí đèn tín hiệu.

    k) Dạng đèn 7 là đèn tín hiệu điều khiển người đi bộ, người đứng màu đỏ, người đi màu xanh. Khi tín hiệu đỏ sáng, người
    đi bộ không được phép đi, khi tín hiệu xanh sáng, người đi bộ được phép đi trong phần đường dành cho người đi bộ. Kiểu
    1: Tín hiệu đỏ bên trái, tín hiệu xanh bên phải; Kiểu 2: tín hiệu đỏ ở trên, tín hiệu xanh ở dưới.

    l) Dạng đèn 8 là đèn đếm lùi dùng để hỗ trợ cho các phương tiện giao thông biết thời gian có hiệu lực của tín hiệu đèn.
    Chữ số trên đèn đếm lùi phải hiển thị được ở 2 trạng thái màu xanh và màu đỏ. Khi tín hiệu xanh, chữ số màu xanh, khi
    tín hiệu đỏ, chữ số màu đỏ. Kiểu 1 thường sử dụng cho đèn ở vị trí thấp, kiểu 2 dùng cho đèn ở vị trí cao hoặc ở phía
    bên kia nút giao.

    m) Dạng đèn 9 là đèn sử dụng để cảnh báo nguy hiểm: đèn nhấp nháy có dạng hình tròn hoặc đèn hình chữ có nội dung cảnh
    báo nguy hiểm. Nội dung của chữ có thể thay đổi tùy theo yêu cầu cần cảnh báo. Chu kỳ nháy của đèn phải phù hợp để gây
    chú ý nhưng vẫn phải cho người điều khiển phương tiện đọc được nội dung cần cảnh báo.

    n) Ngoài các dạng đèn nêu trên, còn có thể sử dụng đèn mũi tên kết hợp hình một loại phương tiện để điều khiển, chỉ dẫn
    một loại phương tiện cụ thể.

    o) Với các dạng đèn đã nêu, có thể bố trí các tín hiệu khác nhau (xanh, vàng, đỏ) trên cùng một bóng đèn nhưng phải đảm
    bảo một tín hiệu màu duy nhất, rõ ràng trên mặt đèn ở từng thời điểm trong chu kỳ của đèn.

    p) Kích thước của đèn từ 200 mm đến 300 mm với các đèn tín hiệu chính. Với các đèn có số, chữ và hình phương tiện tham
    gia giao thông có thể điều chỉnh phù hợp để người tham gia giao thông dễ dàng nhận biết.'
  - 'Quy chuẩn này quy định về báo hiệu đường bộ bao gồm: đèn tín hiệu giao thông; biển báo hiệu đường bộ; vạch kẻ đường và
    các dấu hiệu khác trên mặt đường; cọc tiêu, tường bảo vệ, rào chắn, đinh phản quang, tiêu phản quang, cột Km, cọc H; thiết
    bị âm thanh báo hiệu đường bộ.

    Quy chuẩn này quy định về báo hiệu đường bộ áp dụng cho tất cả các tuyến đường bộ trong mạng lưới đường bộ Việt Nam, các
    đường nằm trong hệ thống đường bộ tham gia Điều ước quốc tế mà Việt Nam là thành viên (Hiệp định GMS-CBTA, các thỏa thuận
    trong ASEAN và các thỏa thuận quốc tế khác) - sau đây gọi là các tuyến đường đối ngoại.'
- source_sentence: Biển báo với hình mũi tên chỉ hướng đi thẳng và rẽ trái áp dụng cho các phương tiện tham gia giao thông
    trong trường hợp nào?
  sentences:
  - 'Biển số S.505b được đặt, bên dưới biển báo số P.106a “Cấm xe ô tô tải” để chỉ các loại xe tải chịu hiệu lực của biển
    báo và trọng tải toàn bộ xe cho phép (bao gồm trọng tải bản thân xe và khối lượng chuyên chở cho phép) tương ứng với mỗi
    loại xe không phụ thuộc vào số lượng trục.

    Biển số S.505b được lắp đặt cho từng cầu. Biển đặt bên phải theo chiều đi cách hai đầu cầu từ 10 m đến 20 mở vị trí dễ
    quan sát.

    Trường hợp cầu hư hỏng đột xuất, cầu có tải trọng khai thác thấp, ngoài việc đặt biển số S.505b còn phải đặt bổ sung các
    bảng thông tin hướng dẫn ở hai đầu đoạn tuyến để thông báo cho người tham gia giao thông về vị trí tải trọng của cầu có
    tải trọng khai thác thấp nhất nằm trong đoạn tuyến.


    Hình F.6 - Biển số S.505b'
  - '26.1. Biển báo cấm được đặt ở nơi đường giao nhau hoặc trước một vị trí trên đường cần cấm.

    Biển có hiệu lực bắt đầu từ vị trí đặt biển trở đi. Nếu vì lý do nào đó, biển đặt cách xa vị trí định cấm thì phải đặt
    biển phụ số S.502 để chỉ rõ khoảng cách từ sau biển cấm đến vị trí biển bắt đầu có hiệu lực.

    26.2. Khi cần thiết để chỉ rõ hướng tác dụng của biển và chỉ vị trí bắt đầu hay vị trí kết thúc hiệu lực của biển phải
    đặt biển phụ số S.503 “Hướng tác dụng của biển”.

    26.3. Các biển báo cấm từ biển số P.101 đến biển số P.120 không cần quy định phạm vi có hiệu lực của biển, không có biển
    báo hết cấm.

    26.4. Khi cần thiết, trong trường hợp cấm vì lý do cầu đường bị tắc, hư hỏng thì kèm theo các biển báo cấm nêu tại khoản
    26.3 Điều này đặt các biển chỉ dẫn lối đi cho xe bị cấm.

    26.5. Biển số P.121 và biển số P.128 có hiệu lực đến hết khoảng cách cấm ghi trên biển phụ số S.501 hoặc đến vị trí đặt
    biển số DP.135 “Hết tất cả các lệnh cấm”.

    26.6. Biển số P.123 (a,b) và biển số P.129 có hiệu lực tại khu vực đặt biển.

    26.7. Biển số P.124 (a, b, c, d, e, f) có hiệu lực ở vị trí nơi đường giao nhau, chỗ mở dải phân cách nhưng không cho
    phép quay đầu xe hoặc căn cứ vào biển phụ số S.503.

    26.8. Biển số P.125, P.126, P.127(a,b,c), P.130, P.131(a,b,c) có hiệu lực đến nơi đường giao nhau tiếp giáp hoặc đến vị
    trí đặt biển hết cấm (các biển số DP.133, DP.134, DP.135, DP.127d). Các biển số P.130 và P.131(a,b,c) còn căn cứ vào các
    biển phụ.

    26.9. Nếu đoạn đường phải thi hành biển cấm đi qua các nút giao (trừ giao với các ngõ, ngách, hẻm hoặc lối ra vào cơ quan,
