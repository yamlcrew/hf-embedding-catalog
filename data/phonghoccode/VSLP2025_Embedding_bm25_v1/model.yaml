  sentences:
  - "1. Giấy phép lái xe được cấp trước ngày Luật này có hiệu lực thi hành được tiếp tục sử dụng theo thời hạn ghi trên giấy\
    \ phép lái xe. \n2. Giấy phép lái xe được cấp trước ngày Luật này có hiệu lực thi hành nếu chưa thực hiện đổi, cấp lại\
    \ theo quy định của Luật này có hiệu lực sử dụng như sau:\na) Giấy phép lái xe hạng A1 được tiếp tục điều khiển xe mô\
    \ tô hai bánh có dung tích xi-lanh từ 50 cm3 đến dưới 175 cm3 hoặc có công suất động cơ điện từ 04 kW đến dưới 14 kW;\n\
    b) Giấy phép lái xe hạng A2 được tiếp tục điều khiển xe mô tô hai bánh có dung tích xi-lanh từ 175 cm3 trở lên hoặc có\
    \ công suất động cơ điện từ 14 kW trở lên và các loại xe quy định cho giấy phép lái xe hạng A1 quy định tại điểm a khoản\
    \ này;\nc) Giấy phép lái xe hạng A3 được tiếp tục điều khiển xe mô tô ba bánh, các loại xe quy định cho giấy phép lái\
    \ xe hạng A1 quy định tại điểm a khoản này và các xe tương tự;\nd) Giấy phép lái xe hạng A4 được tiếp tục điều khiển máy\
    \ kéo có trọng tải đến 1.000 kg;\nđ) Giấy phép lái xe hạng B1 số tự động cấp cho người không hành nghề lái xe được tiếp\
    \ tục điều khiển xe ô tô số tự động chở người đến 08 chỗ (không kể chỗ của người lái xe); xe ô tô tải, kể cả ô tô tải\
    \ chuyên dùng số tự động có trọng tải dưới 3.500 kg;\ne) Giấy phép lái xe hạng B1 cấp cho người không hành nghề lái xe\
    \ được tiếp tục điều khiển xe ô tô chở người đến 08 chỗ (không kể chỗ của người lái xe); xe ô tô tải, máy kéo có trọng\
    \ tải dưới 3.500 kg;\ng) Giấy phép lái xe hạng B2 cấp cho người hành nghề lái xe được tiếp tục điều khiển xe ô tô chở\
    \ người đến 08 chỗ (không kể chỗ của người lái xe); xe ô tô tải, máy kéo có trọng tải dưới 3.500 kg;\nh) Giấy phép lái\
    \ xe hạng C được tiếp tục điều khiển xe ô tô tải, máy kéo có trọng tải từ 3.500 kg trở lên và các loại xe quy định cho\
    \ các giấy phép lái xe hạng B1, B2 quy định tại các điểm đ, e và g khoản này;\ni) Giấy phép lái xe hạng D được tiếp tục\
    \ điều khiển xe ô tô chở người từ 09 chỗ (không kể chỗ của người lái xe) đến 29 chỗ (không kể chỗ của người lái xe) và\
    \ các loại xe quy định cho các giấy phép lái xe hạng B1, B2, C quy định tại các điểm đ, e, g và h khoản này;\nk) Giấy\
    \ phép lái xe hạng E được tiếp tục điều khiển xe ô tô chở người trên 29 chỗ (không kể chỗ của người lái xe) và các loại\
    \ xe quy định cho các giấy phép lái xe hạng B1, B2, C, D quy định tại các điểm đ, e, g, h và i khoản này;\nl) Giấy phép\
    \ lái xe hạng FB2, FD được tiếp tục điều khiển các loại xe quy định cho giấy phép lái xe hạng B2, D quy định tại điểm\
    \ g và điểm i khoản này khi kéo rơ moóc; giấy phép lái xe hạng FC được tiếp tục điều khiển các loại xe quy định cho giấy\
    \ phép lái xe hạng C quy định tại điểm h khoản này khi kéo rơ moóc, đầu kéo kéo sơ mi rơ moóc; giấy phép lái xe hạng FE\
    \ được tiếp tục điều khiển các loại xe quy định cho giấy phép lái xe hạng E quy định tại điểm k khoản này khi kéo rơ moóc hoặc\
    \ xe ô tô chở khách nối toa.\n3. Trường hợp người có giấy phép lái xe đã được cấp trước ngày Luật này có hiệu lực thi\
    \ hành có nhu cầu đổi, cấp lại giấy phép lái xe thì thực hiện như sau:\na) Giấy phép lái xe hạng A1 được đổi, cấp lại\
    \ sang giấy phép lái xe hạng A với điều kiện hạn chế là chỉ được điều khiển xe mô tô hai bánh có dung tích xi-lanh đến\
    \ dưới 175 cm3 hoặc có công suất động cơ điện đến dưới 14 kW;\nb) Giấy phép lái xe hạng A2 được đổi, cấp lại sang giấy\
    \ phép lái xe hạng A;\nc) Giấy phép lái xe hạng A3 được đổi, cấp lại sang giấy phép lái xe hạng B1;\nd) Giấy phép lái\
    \ xe hạng A4 được đổi, cấp lại sang chứng chỉ điều khiển xe máy chuyên dùng cho người điều khiển máy kéo có trọng tải\
    \ đến 1.000 kg và chứng chỉ bồi dưỡng kiến thức pháp luật về giao thông đường bộ cho người điều khiển xe máy chuyên dùng;\n\
    đ) Giấy phép lái xe hạng B1 số tự động được đổi, cấp lại sang giấy phép lái xe hạng B với điều kiện hạn chế là chỉ được\
    \ điều khiển xe ô tô số tự động;\ne) Giấy phép lái xe hạng B1, B2 được đổi, cấp lại sang giấy phép lái xe hạng B hoặc\
    \ hạng C1 và chứng chỉ điều khiển xe máy chuyên dùng cho người điều khiển máy kéo có trọng tải đến 3.500 kg;\ng) Giấy\
    \ phép lái xe hạng C giữ nguyên và đổi, cấp lại cùng hạng và chứng chỉ điều khiển xe máy chuyên dùng cho người điều khiển\
    \ máy kéo có trọng tải trên 3.500 kg;\nh) Giấy phép lái xe hạng D được đổi, cấp lại sang giấy phép lái xe hạng D2\
    \ và chứng chỉ điều khiển xe máy chuyên dùng cho người điều khiển máy kéo có trọng tải trên 3.500 kg;\ni) Giấy phép lái\
    \ xe hạng E được đổi, cấp lại sang giấy phép lái xe hạng D và chứng chỉ điều khiển xe máy chuyên dùng cho người điều\
    \ khiển máy kéo có trọng tải trên 3.500 kg;\nk) Giấy phép lái xe hạng FB2 được đổi, cấp lại sang giấy phép lái xe hạng\
    \ BE hoặc hạng C1E và chứng chỉ điều khiển xe máy chuyên dùng cho người điều khiển máy kéo có trọng tải đến 3.500 kg;\n\
    l) Giấy phép lái xe hạng FC được đổi, cấp lại sang giấy phép lái xe hạng CE và chứng chỉ điều khiển xe máy chuyên dùng\
    \ cho người điều khiển máy kéo có trọng tải trên 3.500 kg;\nm) Giấy phép lái xe hạng FD được đổi, cấp lại sang giấy phép\
    \ lái xe hạng D2E và chứng chỉ điều khiển xe máy chuyên dùng cho người điều khiển máy kéo có trọng tải trên 3.500 kg;\n\
    n) Giấy phép lái xe hạng FE được đổi, cấp lại sang giấy phép lái xe hạng DE và chứng chỉ điều khiển xe máy chuyên dùng\
    \ cho người điều khiển máy kéo có trọng tải trên 3.500 kg.\n4. Người học lái xe đã được đào tạo lái xe trước ngày Luật\
    \ này có hiệu lực thi hành hoặc đang được đào tạo lái xe tại ngày Luật này có hiệu lực thi hành chưa được sát hạch, cấp\
    \ giấy phép lái xe thì được sát hạch, cấp giấy phép lái xe theo hạng giấy phép lái xe đổi, cấp lại quy định tại khoản\
    \ 3 Điều này.\n5. Chứng nhận đăng ký xe, biển số xe máy chuyên dùng cấp trước ngày Luật này có hiệu lực thi hành vẫn có\
    \ giá trị sử dụng.\n6. Chứng nhận chất lượng an toàn kỹ thuật và bảo vệ môi trường được cấp trước ngày Luật này có hiệu\
    \ lực thi hành thì có giá trị sử dụng đến hết thời hạn ghi trên giấy chứng nhận đó.\n7. Việc đấu giá biển số xe ô tô được\
    \ thực hiện trước ngày Luật này có hiệu lực thi hành và đến ngày Luật này có hiệu lực thi hành đã được cấp văn bản xác\
    \ nhận biển số xe ô tô trúng đấu giá thì tiếp tục thực hiện theo Nghị quyết số 73/2022/QH15 của Quốc hội về thí điểm đấu\
    \ giá biển số xe ô tô; trường hợp chưa được cấp xác nhận biển số xe ô tô trúng đấu giá thì tiếp tục thực hiện theo Nghị\
    \ quyết số 73/2022/QH15 của Quốc hội về thí điểm đấu giá biển số xe ô tô và quy định tại điểm d khoản 1 Điều 38 của Luật\
    \ này./."
  - 'Nhằm bảo đảm cho giao thông thông suốt, phòng tránh tai nạn, ở những đoạn đường hay xảy ra điều kiện xấu, gây mất an
    toàn giao thông thì tại những vị trí trước khi vào những đoạn đường đó, đặt biển báo mô tả tình trạng đường sá để nhắc
    lái xe tập trung quan sát, giảm tốc độ, biển số I.445 gồm các loại dưới đây:

    - Biểu báo đường trơn phải chạy chậm (biển số I.445a) biển đặt tại vị trí thích hợp trước đoạn đường bị trơn trượt khi
    trời mưa hoặc láng dầu vv...;

    - Biển báo đường dốc phải đi chậm, lái xe phải cẩn thận (biển số I.445b) biển đặt ở vị trí thích hợp trước đoạn đường
    có độ dốc lớn và tầm nhìn hạn chế;

    - Biển báo đoạn đường sương mù, tầm nhìn hạn chế phải đi chậm, tập trung quan sát (biển số I.445c) biển đặt trước đoạn
    đường nhiều sương mù;

    - Biển báo đoạn đường có nền đường yếu (biển số I.445d) biển đặt ở vị trí thích hợp trước đoạn đường mà nền đường có hiện
    tượng sụt lún, không bằng phẳng, nhắc nhở lái xe đi chậm và cẩn thận;

    - Biển báo xe lớn hoặc quá khổ đi sát về bên phải (biển số I.445e) biển đặt ở nơi thích hợp trước khi đi vào đoạn đường
    có từ hai làn xe trở lên, hướng dẫn cho lái xe lớn hoặc quá khổ phải đi tốc độ thấp không được chiếm làn đường của các
    loại xe khác;

    - Biển báo chú ý khu vực có gió ngang mạnh (biển số I.445f) biển đặt biển ở vị trí trước khi đi vào cầu lớn, cầu vượt
    qua vịnh hoặc cửa núi đoạn đường thường có gió ngang cường độ mạnh;

    - Biển báo đoạn đường nguy hiểm hay xẩy ra tai nạn (biển số I.445g) đặt biển ở nơi thích hợp trước khi vào đoạn đường
    hay xẩy ra tai nạn;

    - Biển báo đường xuống dốc liên tục (biển số I.445h) đặt biển ở nơi thích hợp khi sắp vào đoạn đường xuống dốc liên tục,
    nhằm nhắc nhở lái xe phải đi chậm, đi sát bên phải;


    Hình E.52 - Biển số I.445 (a,b,c)


    Hình E.53- Biển số I.445 (d,e,f)


