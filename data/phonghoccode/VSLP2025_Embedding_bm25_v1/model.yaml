      \ lái xe hạng D được tiếp tục điều khiển xe ô tô chở người từ 09 chỗ (không kể chỗ của người lái xe) đến 29 chỗ (không\
      \ kể chỗ của người lái xe) và các loại xe quy định cho các giấy phép lái xe hạng B1, B2, C quy định tại các điểm đ,\
      \ e, g và h khoản này;\nk) Giấy phép lái xe hạng E được tiếp tục điều khiển xe ô tô chở người trên 29 chỗ (không kể\
      \ chỗ của người lái xe) và các loại xe quy định cho các giấy phép lái xe hạng B1, B2, C, D quy định tại các điểm đ,\
      \ e, g, h và i khoản này;\nl) Giấy phép lái xe hạng FB2, FD được tiếp tục điều khiển các loại xe quy định cho giấy phép\
      \ lái xe hạng B2, D quy định tại điểm g và điểm i khoản này khi kéo rơ moóc; giấy phép lái xe hạng FC được tiếp tục\
      \ điều khiển các loại xe quy định cho giấy phép lái xe hạng C quy định tại điểm h khoản này khi kéo rơ moóc, đầu kéo\
      \ kéo sơ mi rơ moóc; giấy phép lái xe hạng FE được tiếp tục điều khiển các loại xe quy định cho giấy phép lái xe hạng\
      \ E quy định tại điểm k khoản này khi kéo rơ moóc hoặc xe ô tô chở khách nối toa.\n3. Trường hợp người có giấy phép\
      \ lái xe đã được cấp trước ngày Luật này có hiệu lực thi hành có nhu cầu đổi, cấp lại giấy phép lái xe thì thực hiện\
      \ như sau:\na) Giấy phép lái xe hạng A1 được đổi, cấp lại sang giấy phép lái xe hạng A với điều kiện hạn chế là chỉ\
      \ được điều khiển xe mô tô hai bánh có dung tích xi-lanh đến dưới 175 cm3 hoặc có công suất động cơ điện đến dưới 14\
      \ kW;\nb) Giấy phép lái xe hạng A2 được đổi, cấp lại sang giấy phép lái xe hạng A;\nc) Giấy phép lái xe hạng A3 được\
      \ đổi, cấp lại sang giấy phép lái xe hạng B1;\nd) Giấy phép lái xe hạng A4 được đổi, cấp lại sang chứng chỉ điều khiển\
      \ xe máy chuyên dùng cho người điều khiển máy kéo có trọng tải đến 1.000 kg và chứng chỉ bồi dưỡng kiến thức pháp luật\
      \ về giao thông đường bộ cho người điều khiển xe máy chuyên dùng;\nđ) Giấy phép lái xe hạng B1 số tự động được đổi,\
      \ cấp lại sang giấy phép lái xe hạng B với điều kiện hạn chế là chỉ được điều khiển xe ô tô số tự động;\ne) Giấy phép\
      \ lái xe hạng B1, B2 được đổi, cấp lại sang giấy phép lái xe hạng B hoặc hạng C1 và chứng chỉ điều khiển xe máy chuyên\
      \ dùng cho người điều khiển máy kéo có trọng tải đến 3.500 kg;\ng) Giấy phép lái xe hạng C giữ nguyên và đổi, cấp lại\
      \ cùng hạng và chứng chỉ điều khiển xe máy chuyên dùng cho người điều khiển máy kéo có trọng tải trên 3.500 kg;\nh)\
      \ Giấy phép lái xe hạng D được đổi, cấp lại sang giấy phép lái xe hạng D2 và chứng chỉ điều khiển xe máy chuyên\
      \ dùng cho người điều khiển máy kéo có trọng tải trên 3.500 kg;\ni) Giấy phép lái xe hạng E được đổi, cấp lại sang\
      \ giấy phép lái xe hạng D và chứng chỉ điều khiển xe máy chuyên dùng cho người điều khiển máy kéo có trọng tải trên\
      \ 3.500 kg;\nk) Giấy phép lái xe hạng FB2 được đổi, cấp lại sang giấy phép lái xe hạng BE hoặc hạng C1E và chứng chỉ\
      \ điều khiển xe máy chuyên dùng cho người điều khiển máy kéo có trọng tải đến 3.500 kg;\nl) Giấy phép lái xe hạng FC\
      \ được đổi, cấp lại sang giấy phép lái xe hạng CE và chứng chỉ điều khiển xe máy chuyên dùng cho người điều khiển máy\
      \ kéo có trọng tải trên 3.500 kg;\nm) Giấy phép lái xe hạng FD được đổi, cấp lại sang giấy phép lái xe hạng D2E và\
      \ chứng chỉ điều khiển xe máy chuyên dùng cho người điều khiển máy kéo có trọng tải trên 3.500 kg;\nn) Giấy phép lái\
      \ xe hạng FE được đổi, cấp lại sang giấy phép lái xe hạng DE và chứng chỉ điều khiển xe máy chuyên dùng cho người điều\
      \ khiển máy kéo có trọng tải trên 3.500 kg.\n4. Người học lái xe đã được đào tạo lái xe trước ngày Luật này có hiệu\
      \ lực thi hành hoặc đang được đào tạo lái xe tại ngày Luật này có hiệu lực thi hành chưa được sát hạch, cấp giấy phép\
      \ lái xe thì được sát hạch, cấp giấy phép lái xe theo hạng giấy phép lái xe đổi, cấp lại quy định tại khoản 3 Điều này.\n\
      5. Chứng nhận đăng ký xe, biển số xe máy chuyên dùng cấp trước ngày Luật này có hiệu lực thi hành vẫn có giá trị sử\
      \ dụng.\n6. Chứng nhận chất lượng an toàn kỹ thuật và bảo vệ môi trường được cấp trước ngày Luật này có hiệu lực thi\
      \ hành thì có giá trị sử dụng đến hết thời hạn ghi trên giấy chứng nhận đó.\n7. Việc đấu giá biển số xe ô tô được thực\
      \ hiện trước ngày Luật này có hiệu lực thi hành và đến ngày Luật này có hiệu lực thi hành đã được cấp văn bản xác nhận\
      \ biển số xe ô tô trúng đấu giá thì tiếp tục thực hiện theo Nghị quyết số 73/2022/QH15 của Quốc hội về thí điểm đấu\
      \ giá biển số xe ô tô; trường hợp chưa được cấp xác nhận biển số xe ô tô trúng đấu giá thì tiếp tục thực hiện theo Nghị\
      \ quyết số 73/2022/QH15 của Quốc hội về thí điểm đấu giá biển số xe ô tô và quy định tại điểm d khoản 1 Điều 38 của\
      \ Luật này./."
    - 'Nhằm bảo đảm cho giao thông thông suốt, phòng tránh tai nạn, ở những đoạn đường hay xảy ra điều kiện xấu, gây mất an
      toàn giao thông thì tại những vị trí trước khi vào những đoạn đường đó, đặt biển báo mô tả tình trạng đường sá để nhắc
      lái xe tập trung quan sát, giảm tốc độ, biển số I.445 gồm các loại dưới đây:

      - Biểu báo đường trơn phải chạy chậm (biển số I.445a) biển đặt tại vị trí thích hợp trước đoạn đường bị trơn trượt khi
      trời mưa hoặc láng dầu vv...;

      - Biển báo đường dốc phải đi chậm, lái xe phải cẩn thận (biển số I.445b) biển đặt ở vị trí thích hợp trước đoạn đường
      có độ dốc lớn và tầm nhìn hạn chế;

      - Biển báo đoạn đường sương mù, tầm nhìn hạn chế phải đi chậm, tập trung quan sát (biển số I.445c) biển đặt trước đoạn
      đường nhiều sương mù;

      - Biển báo đoạn đường có nền đường yếu (biển số I.445d) biển đặt ở vị trí thích hợp trước đoạn đường mà nền đường có
      hiện tượng sụt lún, không bằng phẳng, nhắc nhở lái xe đi chậm và cẩn thận;

      - Biển báo xe lớn hoặc quá khổ đi sát về bên phải (biển số I.445e) biển đặt ở nơi thích hợp trước khi đi vào đoạn đường
      có từ hai làn xe trở lên, hướng dẫn cho lái xe lớn hoặc quá khổ phải đi tốc độ thấp không được chiếm làn đường của các
      loại xe khác;

      - Biển báo chú ý khu vực có gió ngang mạnh (biển số I.445f) biển đặt biển ở vị trí trước khi đi vào cầu lớn, cầu vượt
      qua vịnh hoặc cửa núi đoạn đường thường có gió ngang cường độ mạnh;

      - Biển báo đoạn đường nguy hiểm hay xẩy ra tai nạn (biển số I.445g) đặt biển ở nơi thích hợp trước khi vào đoạn đường
      hay xẩy ra tai nạn;

      - Biển báo đường xuống dốc liên tục (biển số I.445h) đặt biển ở nơi thích hợp khi sắp vào đoạn đường xuống dốc liên
      tục, nhằm nhắc nhở lái xe phải đi chậm, đi sát bên phải;


      Hình E.52 - Biển số I.445 (a,b,c)


      Hình E.53- Biển số I.445 (d,e,f)


      Hình E.54 - Biển số I.445 (g,h)'
    - '6.1. Đèn tín hiệu chính điều khiển giao thông được áp dụng ba loại màu tín hiệu: xanh, vàng và đỏ; chủ yếu có dạng
      hình tròn, lắp theo chiều thẳng đứng hoặc nằm ngang.

      6.1.1. Thứ tự tín hiệu lắp theo chiều thẳng đứng: đèn đỏ ở trên, đèn vàng ở giữa và đèn xanh ở dưới.

      6.1.2. Thứ tự tín hiệu lắp đặt theo chiều ngang: đèn đỏ ở phía bên trái, đèn vàng ở giữa và đèn xanh ở phía bên phải
      theo chiều đi.

      6.2. Đèn tín hiệu ngoài ba dạng đèn chính còn được bổ sung một số đèn khác tuỳ thuộc vào quy mô nút giao và tổ chức
      giao thông.

      6.2.1. Đèn có hình mũi tên hoặc các hình có ký hiệu phù hợp với quy định của Quy chuẩn này, được lắp đặt trên mặt phẳng
      ngang với đèn tín hiệu. Các hình trên đèn có thể là hình một loại phương tiện giao thông hoặc hình người đi bộ.

      6.2.2. Trong từng tín hiệu của đèn có thể có hình mũi tên. Nếu mũi tên chỉ hướng cho phép rẽ trái thì đồng thời cho
      phép quay đầu, trừ khi có đặt biển báo số P.124 (a,b) “Cấm quay đầu xe”.

      6.2.3. Đồng hồ đếm ngược (khi đang hoạt động bình thường) có tác dụng báo hiệu thời gian có hiệu lực của đèn.

      6.2.4. Đèn tín hiệu có hình chữ thập màu đỏ báo hiệu xe phải dừng lại. Trong trường hợp xe đã ở trong nút giao thì phải
      nhanh chóng đi ra khỏi nút giao.

      6.3. Ý nghĩa của đèn tín hiệu: tín hiệu đèn giao thông có 03 màu, gồm: màu xanh, màu vàng, màu đỏ; có hiển thị thời
      gian hoặc không hiển thị thời gian. Người tham gia giao thông đường bộ phải chấp hành như sau:

      6.3.1. Tín hiệu xanh: tín hiệu đèn màu xanh là được đi; trường hợp người đi bộ, xe lăn của người khuyết tật đang đi
      ở lòng đường, người điều khiển phương tiện tham gia giao thông đường bộ phải giảm tốc độ hoặc dừng lại nhường đường
      cho người đi bộ, xe lăn của người khuyết tật qua đường;

      6.3.2. Tín hiệu đèn màu vàng phải dừng lại trước vạch dừng; trường hợp đang đi trên vạch dừng hoặc đã đi qua vạch dừng
      mà tín hiệu đèn màu vàng thì được đi tiếp.

      Trường hợp tín hiệu đèn màu vàng nhấp nháy, người điều khiển phương tiện tham gia giao thông đường bộ được đi nhưng
      phải quan sát, giảm tốc độ hoặc dừng lại nhường đường cho người đi bộ, xe lăn của người khuyết tật qua đường hoặc các
      phương tiện khác.

      6.3.3. Tín hiệu đèn màu đỏ là cấm đi: báo hiệu phải dừng lại trước vạch dừng. Nếu không có vạch dừng thì phải dừng trước
      đèn tín hiệu theo chiều đi.

      6.3.4. Trường hợp không có vạch dừng, thì vị trí đặt đèn tín hiệu gần nhất theo chiều đi coi như là vạch dừng.

      6.3.5. Tại một thời điểm, trên cùng một bộ đèn tín hiệu chỉ được sáng một trong ba màu: xanh, vàng hoặc đỏ.

      6.4. Ý nghĩa của đèn hình mũi tên.

      6.4.1. Nếu đèn có lắp đèn hình mũi tên màu xanh thì các loại phương tiện giao thông chỉ được đi khi tín hiệu mũi tên
      bật sáng cho phép. Tín hiệu mũi tên cho phép rẽ trái thì đồng thời cho phép quay đầu nếu không có báo hiệu cấm quay
      đầu khác.

      6.4.2. Nếu đèn có hình của một loại phương tiện giao thông nào đó xanh thì chỉ loại phương tiện đó được phép đi.

      6.4.3. Khi tín hiệu mũi tên màu xanh được bật sáng cùng một lúc với tín hiệu đỏ hoặc vàng thì các phương tiện đi theo
      hướng mũi tên nhưng phải nhường đường cho các loại phương tiện đi từ các hướng khác đang được phép đi.

      6.4.4. Khi tín hiệu mũi tên màu đỏ được bật sáng cùng lúc với tín hiệu đèn chính màu xanh thì phương tiện không được
      đi theo hướng mũi tên. Những nơi bố trí mũi tên màu đỏ cần bố trí làn chờ cho các xe đi hướng đang có đèn màu đỏ.

      6.4.5. Khi tín hiệu màu đỏ có hình của một loại phương tiện nào đó bật sáng cùng lúc với tín hiệu đèn chính màu xanh
      thì loại phương tiện đó không được đi. Những nơi có bố trí đèn hình phương tiện màu đỏ thì cần bố trí làn chờ cho phương
      tiện đó.

      6.5. Điều khiển giao thông bằng loại đèn hai màu.

      6.5.1. Điều khiển giao thông đối với người đi bộ bằng loại đèn hai màu: khi tín hiệu màu đỏ có tín hiệu hình người tư
      thế đứng hoặc chữ viết “Dừng lại”; khi tín hiệu màu xanh, có hình người tư thế đi hoặc chữ viết “Đi”.

      Người đi bộ chỉ được phép đi qua đường khi tín hiệu đèn xanh bật sáng và đi trong hàng đinh gắn trên mặt đường hoặc
      vạch sơn dành cho người đi bộ qua đường. Tín hiệu đèn xanh nhấp nháy báo hiệu chuẩn bị chuyển sang tín hiệu màu đỏ;
      người đi bộ lúc này không được bắt đầu đi ngang qua đường.

      6.5.2. Loại đèn hai màu xanh và đỏ không nhấp nháy dùng để điều khiển giao thông ở những nơi giao nhau với đường sắt,
      bến phà, cầu cất, giá cho máy bay lên xuống ở độ cao không lớn vv... Đèn xanh bật sáng: cho phép các phương tiện giao
      thông được đi. Đèn đỏ bật sáng: cấm đi. Hai đèn xanh và đỏ không được cùng bật sáng một lúc.

      6.5.3. Loại đèn đỏ hai bên thay nhau nhấp nháy nơi giao nhau với đường sắt, khi bật sáng thì mọi phương tiện phải dùng
      lại và chỉ được đi khi đèn tắt. Ngoài ra để gây chú ý, ngoài đèn đỏ nhấp nháy còn trang bị thêm chuông điện hoặc tiếng
      nói nhắc nhở có tàu hỏa.

      6.6. Để điều khiển giao thông trên tùng làn đường riêng có thể áp dụng bộ đèn tín hiệu gồm 2 màu treo trên phần đường
      xe chạy, tín hiệu xanh có hình mũi tên phải đặt phía trên làn đường cần điều khiển, tín hiệu đỏ có hình hai gạch chéo.
      Những tín hiệu của đèn này có ý nghĩa như sau.

      6.6.1. Tín hiệu xanh cho phép đi ở trên làn đường có mũi tên chỉ;

      6.6.2. Tín hiệu đỏ phải dừng lại theo điểm 6.3.3 khoản 6.3 Điều này trên làn đường có đèn treo tín hiệu màu đỏ.'
  - source_sentence: Biển báo giới hạn tốc độ "50" yêu cầu người tham gia giao thông tuân thủ như thế nào?
    sentences:
    - 'Quy chuẩn này quy định về báo hiệu đường bộ bao gồm: đèn tín hiệu giao thông; biển báo hiệu đường bộ; vạch kẻ đường
      và các dấu hiệu khác trên mặt đường; cọc tiêu, tường bảo vệ, rào chắn, đinh phản quang, tiêu phản quang, cột Km, cọc
      H; thiết bị âm thanh báo hiệu đường bộ.

      Quy chuẩn này quy định về báo hiệu đường bộ áp dụng cho tất cả các tuyến đường bộ trong mạng lưới đường bộ Việt Nam,
      các đường nằm trong hệ thống đường bộ tham gia Điều ước quốc tế mà Việt Nam là thành viên (Hiệp định GMS-CBTA, các thỏa
      thuận trong ASEAN và các thỏa thuận quốc tế khác) - sau đây gọi là các tuyến đường đối ngoại.'
    - 'Quy chuẩn này quy định về báo hiệu đường bộ bao gồm: đèn tín hiệu giao thông; biển báo hiệu đường bộ; vạch kẻ đường
      và các dấu hiệu khác trên mặt đường; cọc tiêu, tường bảo vệ, rào chắn, đinh phản quang, tiêu phản quang, cột Km, cọc
      H; thiết bị âm thanh báo hiệu đường bộ.

      Quy chuẩn này quy định về báo hiệu đường bộ áp dụng cho tất cả các tuyến đường bộ trong mạng lưới đường bộ Việt Nam,
      các đường nằm trong hệ thống đường bộ tham gia Điều ước quốc tế mà Việt Nam là thành viên (Hiệp định GMS-CBTA, các thỏa
      thuận trong ASEAN và các thỏa thuận quốc tế khác) - sau đây gọi là các tuyến đường đối ngoại.'
    - '30.1. Biển báo nguy hiểm và cảnh báo được đặt trước nơi định báo một khoảng cách phù hợp với phương tiện tham gia giao
      thông và thực tế hiện trường đảm bảo dễ quan sát, không ảnh hưởng tới tầm nhìn.

      30.2. Khoảng cách từ biển đến nơi định báo nên thống nhất trên cả đoạn đường có tốc độ trung bình xe như nhau. Trường
      hợp đặc biệt cần thiết, có thể đặt biển xa hoặc gần hơn, cần thiết có thêm biển phụ số S.502 “Khoảng cách đến đối tượng
      báo hiệu”.

      30.3. Biển số W.208 “Giao nhau với đường ưu tiên”: trong khu đông dân cư đặt trực tiếp trước vị trí giao nhau với đường
      ưu tiên, ngoài khu đông dân cư thì tùy theo khoảng cách đặt xa hay gần vị trí giao nhau với đường ưu tiên mà có thêm
      biển phụ số S.502.

      30.4. Mỗi kiểu biển báo báo một yếu tố nguy hiểm có thể xảy ra ở một vị trí hoặc một đoạn đường. Nếu yếu tố nguy hiểm
      xảy ra trên một đoạn đường, đặt biển phụ số S.501 “Phạm vi tác dụng của biển” để chỉ rõ chiều dài đoạn đường nguy hiểm
      bên dưới các biển số W.202(a,b), W.219, W.220, W.221a, W.225, W.228, W.231, W.232. Nếu chiều dài có cùng yếu tố nguy
      hiểm lớn thì đặt biển nhắc lại kèm biển phụ số S.501 ghi chiều dài yếu tố nguy hiểm còn lại tiếp đó.

      30.5. Hạn chế sử dụng biển báo nguy hiểm và cảnh báo tràn lan nếu các tính chất không thực sự gây nguy hiểm cho người
      tham gia giao thông.

      30.6. Trong phạm vi những đoạn đường hạn chế tốc độ:

      30.6.1. Trường hợp chỗ ngoặt nguy hiểm đã có biển hạn chế tốc độ tối đa nhỏ hơn hoặc bằng 40 km/h thì không phải đặt
      biển báo chỗ ngoặt nguy hiểm (biển số W.201 (a,b) và biển số W.202 (a,b));

      30.6.2. Trường hợp đường xấu, trơn, không bằng phẳng, nếu đã đặt biển hạn chế tốc độ tối đa dưới 50 km/h thì không phải
      đặt biển báo về đường không bằng phẳng, đường trơn (biển số W.221(a,b) và biển số W222a);

      30.6.3. Đường trong khu đông dân cư, tốc độ xe đi chậm, liên tục có đường giao nhau tại ngã ba, ngã tư thì không nhất
      thiết đặt biển số W.205(a,b,c,d,e) “Đường giao nhau”.

      30.7. Tại các nơi đường được ưu tiên giao với các đường khác mà không được xem là nơi đường giao nhau theo quy định
      của Quy chuẩn này thì không cần đặt các biển W.207, W.208. Tuy nhiên, có thể sử dụng các biển này hoặc sử dụng vạch
      sơn kiểu mắt võng khi xử lý vị trí là điểm tiềm ẩn tai nạn giao thông, điểm đen tai nạn giao thông.'
  - source_sentence: 'Biển báo này yêu cầu tất cả các phương tiện tham gia giao thông di chuyển với tốc độ tối đa 90 km/h.

      Đúng hay sai?'
    sentences:
    - 'a) Để báo hiệu bắt đầu đoạn đường vào phạm vi khu đông dân cư, đặt biển số R.420 "Bắt đầu khu đông dân cư”.

      b) Biển có tác dụng báo cho người tham gia giao thông biết phạm vi phải tuân theo những quy định đi đường được áp dụng
      ở khu đông dân cư.

      c) Đoạn đường qua khu vực đông dân cư được xác định bắt đầu bằng biển số R.420 “Bắt đầu khu đông dân cư” và kết thúc
      bằng biển số R.421 “Hết khu đông dân cư”.

      Đối với đoạn đường nằm trong đô thị: Căn cứ vào mức độ đô thị hóa và mật độ dân cư sinh sống bên đường để đặt biển báo
      hiệu "Bắt đầu khu đông dân cư” (Biển số R.420) và biển báo hiệu "Hết khu đông dân cư” (Biển số R.421) trên các tuyến
      đường ở vị trí vào, ra đô thị cho phù hợp (không đặt biển báo theo địa giới hành chính được quy hoạch, nếu chưa đô thị
      hóa hoặc dân cư thưa thớt); Biển số R.420 có hiệu lực khu đông dân cư đối với tất cả các tuyến đường nằm trong khu đông
      dân cư đô thị cho đến vị trí đặt biển số R.421.

      Đối với đoạn đường nằm ngoài đô thị: Đoạn đường được xác định là qua khu đông dân cư khi có chiều dài từ 500 m trở lên,
      khoảng cách từ nhà tới mép đường (phần xe chạy) từ 6m trở xuống và mật độ các lối ra vào nhà trung bình dưới 10 m; ngoài
      ra, trong trường hợp đặc biệt khác như tại các nút giao cần phải hạn chế tốc độ mà xen kẹp ngắn với khu dân cư cũng
      có thể kéo dài khu dân cư qua các nút giao.

      d) Trong phạm vi biển số R.420 có hiệu lực, khi gặp biển báo tốc độ tối đa cho phép (biển số P.127) người tham gia giao
      thông phải chấp hành quy định của biển số P.127.


      Hình D.19 - Biển số R.420'
    - '1. Người lái xe mô tô hai bánh, xe gắn máy chỉ được chở một người, trừ những trường hợp sau thì được chở tối đa hai
      người:

      a) Chở người bệnh đi cấp cứu;

      b) Áp giải người có hành vi vi phạm pháp luật;

      c) Trẻ em dưới 12 tuổi;

      d) Người già yếu hoặc người khuyết tật.

      2. Người lái xe, người được chở trên xe mô tô hai bánh, xe mô tô ba bánh, xe gắn máy phải đội mũ bảo hiểm theo đúng
      quy chuẩn kỹ thuật quốc gia và cài quai đúng quy cách.

      3. Người lái xe mô tô hai bánh, xe mô tô ba bánh, xe gắn máy không được thực hiện các hành vi sau đây:

      a) Đi xe dàn hàng ngang;

      b) Đi xe vào phần đường dành cho người đi bộ và phương tiện khác;

      c) Sử dụng ô, thiết bị âm thanh, trừ thiết bị trợ thính;

      d) Buông cả hai tay; đi xe bằng một bánh đối với xe mô tô, xe gắn máy hai bánh; đi xe bằng hai bánh đối với xe mô tô,
      xe gắn máy ba bánh;

      đ) Sử dụng xe để kéo, đẩy xe khác, vật khác, dẫn dắt vật nuôi, mang, vác và chở vật cồng kềnh; chở người đứng trên xe,
      giá đèo hàng hoặc ngồi trên tay lái; xếp hàng hóa trên xe quá giới hạn quy định;

      e) Ngồi về một bên điều khiển xe; đứng, nằm trên xe điều khiển xe; thay người lái xe khi xe đang chạy; quay người về
      phía sau để điều khiển xe hoặc bịt mắt điều khiển xe; sử dụng chân chống hoặc vật khác quệt xuống đường khi xe đang
      chạy;

      g) Hành vi khác gây mất trật tự, an toàn giao thông đường bộ.

      4. Người được chở trên xe mô tô hai bánh, xe mô tô ba bánh, xe gắn máy  khi tham gia giao thông đường bộ không được
      thực hiện các hành vi sau đây:

      a) Mang, vác vật cồng kềnh;

      b) Sử dụng ô;

      c) Bám, kéo hoặc đẩy các phương tiện khác;

      d) Đứng trên yên, giá đèo hàng hoặc ngồi trên tay lái;

      đ) Hành vi khác gây mất trật tự, an toàn giao thông đường bộ.

      5. Xe mô tô, xe gắn máy không được xếp hàng hóa vượt quá chiều rộng giá đèo hàng về mỗi bên 0,3 mét, vượt quá về phía
      sau giá đèo hàng 0,5 mét theo thiết kế của nhà sản xuất; chiều cao xếp hàng hóa tính từ mặt đường xe chạy không vượt
      quá 02 mét.'
    - 'a) Để báo đường cấm các loại xe (cơ giới và thô sơ) kể cả các xe được ưu tiên theo quy định, có độ dài toàn bộ kể cả
      xe và hàng lớn hơn trị số ghi trên biển đi qua, đặt biển số P.119 "Hạn chế chiều dài xe".

      b) Trị số ghi trên biển là chỉ độ dài cho phép lớn nhất tính bằng mét đối với xe đơn chiếc nhằm ngăn ngừa khả năng gây
      ách tắc giao thông.

      c) Biển được đặt ở những đoạn đường có bán kính đường cong nằm nhỏ, đèo dốc quanh co hoặc ở những đoạn đường mà xe có
      chiều dài lớn, gây nguy hiểm.


      Hình B.19- Biển số P.119'
  - source_sentence: Biển báo tam giác viền đỏ nền vàng yêu cầu người tham gia giao thông làm gì khi gặp biển báo này?
    sentences:
    - '1. Khi phát hiện phương tiện giao thông đường bộ vi phạm quy định dừng, đỗ trên đường bộ gây cản trở, ùn tắc giao thông
      hoặc nguy cơ dẫn đến tai nạn giao thông đường bộ nhưng người điều khiển phương tiện tham gia giao thông đường bộ, chủ
      phương tiện giao thông đường bộ không có mặt tại nơi xảy ra vi phạm hoặc có mặt nhưng không chấp hành yêu cầu của Cảnh
      sát giao thông thì Cảnh sát giao thông thực hiện việc di chuyển phương tiện vi phạm ra khỏi vị trí dừng, đỗ trên.

      Trường hợp không đủ điều kiện thực hiện thì Cảnh sát giao thông được thuê tổ chức, cá nhân thực hiện việc di chuyển
      phương tiện đó.

      2. Khi người điều khiển phương tiện tham gia giao thông đường bộ hoặc chủ phương tiện giao thông đường bộ có hành vi
      cản trở, chống đối việc di chuyển phương tiện vi phạm ra khỏi vị trí dừng, đỗ thì Cảnh sát giao thông thực hiện các
      biện pháp quy định tại khoản 1 Điều 73 của Luật này, nếu người đó vẫn tiếp tục cản trở, chống đối thì Cảnh sát giao
      thông được cưỡng chế thi hành.

      3. Người điều khiển phương tiện tham gia giao thông đường bộ hoặc chủ phương tiện giao thông đường bộ vi phạm phải trả
      chi phí cho việc di chuyển hoặc thuê di chuyển phương tiện đó.

      4. Trong quá trình thực hiện việc di chuyển phương tiện theo quy định tại khoản 1 Điều này, Cảnh sát giao thông, tổ
      chức, cá nhân được thuê thực hiện việc di chuyển phương tiện phải có trách nhiệm bảo đảm an toàn cho phương tiện được
      di chuyển.'
    - 'Để báo trước gần tới đoạn đường đang tiến hành thi công sửa chữa, cải tạo, nâng cấp có người và máy móc đang làm việc
      trên mặt đường, đặt biển số W.227 báo hiệu "Công trường". Khi gặp biển báo này tốc độ xe chạy phải giảm cho thích hợp,
      không gây nguy hiểm cho người và máy móc trên đoạn đường đó.


      Hình C.29 - Biển số W.227'
    - '45.1. Chức năng biển chỉ dẫn trên đường cao tốc.

      Cung cấp thông tin đầy đủ, chính xác cho người điều khiển phương tiện nhằm lái xe an toàn trên đường cao tốc và đi đến
      địa điểm mong muốn, cụ thể:

      45.1.1. Chỉ dẫn tên đường và hướng tuyến;

      45.1.2. Chỉ dẫn địa điểm, hướng đi, khoảng cách đến các thành phố, thị xã, thị trấn và các tuyến đường;

      45.1.3. Chỉ dẫn đến các địa điểm khu công nghiệp, dịch vụ công cộng như: sân bay, bến tàu, bến xe khách, bến tàu thuỷ,
      bến phà, Công trình kiểm soát tải trọng xe, trạm dừng nghỉ, nơi nghỉ mát, nơi danh lam thắng cảnh và giải trí;

      45.1.4. Thông báo chuẩn bị tới nút giao, lối ra phía trước;

      45.1.5. Chỉ dẫn tách, nhập làn khi ra, vào đường cao tốc;

      45.1.6. Chỉ dẫn tốc độ tối đa, tốc độ tối thiểu khi tham gia giao thông trên đường cao tốc;

      45.1.7. Chỉ dẫn giữ khoảng cách lái xe an toàn cho người điều khiển phương tiện;

      45.1.8. Cung cấp tần số sóng radio nhằm giúp người tham gia giao thông trên đường cao tốc nắm bắt thông tin về tình
      trạng giao thông, thời tiết và các thông tin tiện ích trên đường cao tốc.

      45.1.9. Các biển chỉ dẫn khác: biển chỉ dẫn địa danh; địa phận hành chính cấp tỉnh, thành phố; biển tên cầu, tên công
      trình lớn.

      45.1.10. Các biển chỉ dẫn trên đường cao tốc có mã là IE.

      45.2. Yêu cầu đối với biển chỉ dẫn trên đường cao tốc

      Biển chỉ dẫn trên đường cao tốc phải đáp ứng được các yêu cầu sau:

      45.2.1. Nội dung ghi trên biển chỉ dẫn phải ngắn gọn, đơn giản, dễ hiểu; ưu tiên sử dụng các ký hiệu, số hiệu và hình
      vẽ minh hoạ;

      45.2.2. Kích cỡ chữ viết, chữ số và ký hiệu phải đảm bảo để người điều khiển phương tiện nhìn rõ và nắm bắt được nội
      dung từ khoảng cách ít nhất là 150 m trong điều kiện thời tiết bình thường;

      45.2.3. Phải được dán màng phản quang, đảm bảo yêu cầu theo tiêu chuẩn quốc gia về “Màng phản quang dùng cho báo hiệu
      đường bộ”.

      45.3. Kích thước biển chỉ dẫn trên đường cao tốc

      Kích thước biển chỉ dẫn trên đường cao tốc được xác định trên cơ sở diện tích cần thiết để bố trí nội dung thông tin
      chỉ dẫn. Kích thước biển chỉ dẫn loại A (áp dụng cho đường có tốc độ thiết kế 100 km/h và 120 km/h) được quy định chi
      tiết tại Phụ lục P của Quy chuẩn này. Kích thước biển chỉ dẫn loại B (áp dụng cho đường có tốc độ thiết kế 60 km/h và
      80 km/h) được điều chỉnh trên cơ sở chiều cao chữ quy định trong Bảng 4 của Quy chuẩn này cho phù hợp.Trường hợp đặc
      biệt có thể điều chỉnh cục bộ cho cân đối, phù hợp và đáp ứng thông tin rõ ràng.'
  - source_sentence: 'Biển báo phía trên báo hiệu rằng người tham gia giao thông có thể tiếp tục đi thẳng hoặc rẽ trái tại
      vị trí này.

      Đúng hay sai?'
    sentences:
    - "1. Phương tiện tham gia giao thông đường bộ di chuyển với tốc độ thấp hơn phải đi về bên phải theo chiều đi của mình.\
      \ \n2. Trên đường có nhiều làn đường cho xe đi cùng chiều được phân biệt bằng vạch kẻ phân làn đường, người điều khiển\
      \ phương tiện tham gia giao thông đường bộ phải cho xe đi trong một làn đường và chỉ được chuyển làn đường ở những nơi\
      \ cho phép; mỗi lần chuyển làn đường chỉ được phép chuyển sang một làn đường liền kề; khi chuyển làn đường phải có tín\
      \ hiệu báo trước; phải quan sát bảo đảm khoảng cách an toàn với xe phía trước, phía sau và hai bên mới được chuyển làn.\
      \ \n3. Trên một chiều đường có vạch kẻ phân làn đường, xe thô sơ phải đi trên làn đường bên phải trong cùng, xe cơ giới,\
      \ xe máy chuyên dùng đi trên làn đường bên trái.\n4. Trên làn đường dành riêng cho một loại phương tiện hoặc một nhóm\
      \ loại phương tiện, người điều khiển loại phương tiện khác không được đi vào làn đường đó."
    - '56.1. Quy định chung đối với tiêu phản quang

      56.1.1. Tiêu phản quang là thiết bị dẫn hướng được gắn các công cụ phản quang để dẫn hướng xe chạy vào ban đêm hoặc
      trong điều kiện sương mù, điều kiện hạn chế tầm nhìn. Tiêu phản quang được bố trí tại các nơi mà tuyến đường có thể
      gây hiểu lầm hoặc chưa rõ về hướng đường. Chiều cao đặt tiêu phản quang phù hợp với địa hình, quy mô tuyến đường, bảo
      đảm tiêu phản quang phát huy tác dụng dẫn hướng.

      56.1.2. Tiêu phản quang phải gắn công cụ phản quang cho phép nhìn rõ vào buổi tối dưới ánh đèn pha ô tô đạt tiêu chuẩn
      trong điều kiện thời tiết bình thường ở cự ly 300 m.

      56.1.3. Công cụ phản quang có thể là các tấm nhựa phản quang, các khối kim loại gắn phản quang, màng phản quang dán
      trên các miếng kim loại v.v... Công cụ phản quang có thể có dạng hình tròn, hình chữ nhật, hình tam giác hoặc hình đa
      giác được gắn lên các lan can phòng hộ, tường bảo vệ hoặc gắn xuống mặt đường. Công cụ phản quang cũng bao gồm các vật
      liệu phản quang dạng dải quấn quanh các cọc tiêu phản quang.

      56.1.4. Tiêu phản quang màu vàng được sử dụng ở các dải phân cách giữa, tại bên đường các đường một chiều hay bên phải
      của đường hai chiều. Tiêu phản quang màu đỏ được sử dụng cho hướng ngược chiều (bên trái) theo chiều đi của đường hai
      chiều (để cảnh báo người lái đi nhầm đường) và sử dụng cho các đường lánh nạn.

      56.1.5. Tiêu phản quang bao gồm: tiêu phản quang bố trí bên đường hoặc trên dải phân cách, tiêu phản quang dạng mũi
      tên và đinh phản quang (còn gọi là cóc phản quang) bố trí trên mặt đường.

      56.2. Tiêu phản quang bố trí bên đường hoặc trên dải phân cách

      56.2.1. Phạm vi áp dụng tiêu phản quang bố trí bên đường hoặc trên dải phân cách:

      a) Trên các đường cao tốc:

      + Bố trí dọc hai bên đường. Khi đó, nếu lan can phòng hộ cách mép phần đường xe chạy dưới 2,4 m, gắn tiêu phản quang
      lên lan can phòng hộ. Các trường hợp khác có thể bố trí tiêu phản quang dạng cột đặt bên đường;

      + Bố trí ít nhất một bên trên các nhánh nối của các nút giao khác mức liên thông.

      b) Trên các đường khác: nên sử dụng tiêu phản quang tại vị trí các đoạn đường bị thu hẹp phần đường xe chạy mà không
      có lan can phòng hộ, các đoạn đường đèo dốc quanh co hạn chế tầm nhìn, trong phạm vi đường lánh nạn, nơi đường bộ giao
      nhau với đường sắt. Nơi đường thường xuyên có sương mù cần bố trí tiêu phản quang trên các vật thể cứng liền kề phần
      xe chạy như các đầu đảo giao thông, bó vỉa v.v... khi khó nhận biết các vật thể này về ban đêm.

      56.2.2. Không cần sử dụng tiêu phản quang bố trí bên đường và trên dải phân cách trong các trường hợp sau:

      a) Trên mặt đường đã được gắn đinh phản quang liên tục;

      b) Đã sử dụng tiêu phản quang dạng mũi tên trong các đường cong;

      c) Tại những nơi có đèn đường chiếu sáng liên tục về ban đêm;

      d) Làn đường mở rộng dần theo chiều xe chạy.

      56.2.3. Vị trí và khoảng cách tiêu phản quang bố trí bên đường và trên dải phân cách như sau:

      a) Tiêu phản quang đặt cách mép phần xe chạy phía ngoài cùng từ 0,6 m - 2,4 m và cách đều mép mặt đường, lượn cong đều
      theo mép phần đường xe chạy;

      b) Trên đường thẳng, khoảng cách giữa tiêu phản quang không nhỏ hơn 10 m và không quá 100 m;

      c) Trong phạm vi đường cong nằm, khoảng cách nhỏ nhất giữa các tiêu phản quang là 6 m và tối đa là 100 m phụ thuộc vào
      bán kính đường cong;

      d) Phần đường thẳng tiếp giáp với điểm bắt đầu hoặc kết thúc của đường cong bố trí 3 tiêu. Tiêu đầu tiên cách điểm bắt
      đầu hoặc kết thúc của đường cong là 1S; tiêu thứ hai cách tiêu thứ nhất là 3S, và tiêu thứ 3 cách tiêu thứ 2 là 6S nhưng
      cũng không cách xa quá 100 m (S là khoảng cách giữa các tiêu bố trí trong đường cong).

      56.3. Tiêu phản quang dạng mũi tên

      56.3.1. Tiêu phản quang dạng mũi tên bao gồm một biển vẽ dạng mũi tên chỉ hướng màu đen trên nền vàng gắn trên đỉnh
      các cột (xem Hình 34a). Tiêu phản quang dạng mũi tên chỉ hướng ngược chiều (bên trái) màu trắng trên nền đỏ thường sử
      dụng cho đường 2 chiều không có dải phân cách giữa (Hình 34b)


      Hình 34a - Tiêu phản quang dạng mũi tên

       


      Hình 34b - Tiêu phản quang dạng mũi tên (bên trái) cho đường 2 chiều

      56.3.2. Kích thước tiêu phản quang dạng mũi tên được quy định như sau:


       


      * Ở các đoạn đường đèo dốc, sương mù có thể tăng kích thước lên 1 cấp nâng cao an toàn giao thông.

      56.3.3. Tiêu phản quang dạng mũi tên được sử dụng trong phạm vi đường cong nằm trong các trường hợp sau:

      a) Trên các đường cao tốc tại các đường cong có bán kính bằng bán kính tối thiểu nhỏ nhất theo cấp đường;

      b) Trên các nhánh rẽ trái gián tiếp của các nút giao khác mức liên thông;

      c) Trên các đoạn đường cong hạn chế tầm nhìn hoặc các đường cong được đánh giá là điểm đen, điểm tiềm ẩn về tai nạn
      giao thông; các đường cong được gắn biển số W.201 “Chỗ ngoặt nguy hiểm” có lưng hướng ra phía vực sâu mà không có tường
      bảo vệ hoặc lan can phòng hộ; các đường cong dạng con rắn.

      56.3.4. Tiêu phản quang dạng mũi tên được bố trí ở phía lưng của đường cong nằm, bắt đầu từ điểm bắt đầu cho đến điểm
      kết thúc đoạn cong. Khoảng cách giữa các tiêu phản quang dạng mũi tên không nhỏ hơn 12 m và không lớn hơn 60 m.

      56.4. Đinh phản quang

      56.4.1. Đinh phản quang theo phương dọc đường được bố trí như sau:

      a) Trên các đường cao tốc:

      + Bố trí trên các vạch sơn kênh hóa dòng xe tại đầu các mũi đảo tách dòng và nhập dòng. Trong trường hợp này, cần sử
      dụng đinh phản quang trong phạm vi từ mũi đảo thực (đảo cứng) cho đến mũi hết mũi đảo bằng vạch sơn với cự ly giữa các
      đinh phản quang tối đa là 6 m.

      + Có thể bố trí đinh phản quang trên các vạch sơn phân chia giữa phần xe chạy chính và làn dừng xe khẩn cấp.

      b) Với đường nhiều hơn 2 làn xe mỗi hướng không có dải phân cách cố định, có thể bố trí một hàng đinh phản quang tại
      tim đường nằm giữa vạch sơn phân chia hai chiều xe chạy hoặc phân làn đường, mép đường.

      c) Đối với đường có 2 làn xe, cần xem xét bố trí đinh phản quang tại tim đường kết hợp với vạch sơn phân chia chiều
      đường xe chạy, đặc biệt đối với tuyến đường tại khu vực miền núi, đường đèo dốc quanh co, nhiều sương mù, tầm nhìn hạn
      chế. Trong trường hợp cần thiết, có thế gắn đinh phản quang tại dọc theo mép đường xe chạy.

      d) Chiều rộng đinh phản quang tối thiểu 10cm và không vượt quá chiều rộng vạch sơn bố trí đinh.

      56.4.2. Có thể sử dụng đinh phản quang màu vàng gắn theo phương ngang đường tại vị trí mặt đường bị thấp xuống hoặc
      vồng lên đột ngột theo phương ngang đường và trên vạch dừng xe nơi phần đường người đi bộ cắt qua không có tín hiệu
      đèn điều khiển.

      56.4.3. Đinh phản quang không được nhô cao khỏi mặt đường quá 2,5 cm.'
