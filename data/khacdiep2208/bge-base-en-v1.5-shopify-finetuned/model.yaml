    of the image is a live preview of a Shopify store, titled "My Store," displaying a hero section with text "e our latest
    products" and a prominent "Shop all" button, overlaid with illustrations of people. In the top right corner of this preview,
    icons for different device views (desktop, tablet, mobile) are visible.
