      *   It highlights that after providing essential product details, the next crucial step is to define the product pricing
      for customers.'
  - source_sentence: How do I set a password for my Shopify development store?
    sentences:
    - 'There are many ways to enhance a store’s functionality. Depending on your client’s needs, you can choose and customize
      a theme, migrate information from another platform, add products to the store, organize products into collections, set
      up payment and shipping information, among other options.


      Follow this [general checklist for starting a new Shopify store](https://help.shopify.com/en/manual/intro-to-shopify/initial-setup/new-to-shopify-checklists/general-checklist)
      to cover the basics.


      Here are some ways to further enhance a store:


      *   Migrate your client''s product, customers, and orders data from another platform using a Store Importer app.

      *   Add multiple products at one time by [importing them with a CSV file](https://help.shopify.com/en/manual/products/import-export/import-products#importing-products-with-a-csv-file).

      *   [Customize a theme](https://help.shopify.com/en/manual/online-store/themes/theme-structure/extend/edit-theme-code#before-you-customize-your-theme)
      to better suit a client’s needs.

      *   [Buy a domain from Shopify](https://help.shopify.com/en/manual/domains/add-a-domain/buying-domains). You can help
      create a store''s brand by using a custom domain.

      *   Create [pages](https://help.shopify.com/en/manual/online-store/themes/theme-structure/pages#add-a-new-webpage-to-your-online-store)
      that describe the store. Common page types include About Us, contact information, FAQs, and [policy pages](https://help.shopify.com/en/manual/checkout-settings/refund-privacy-tos)
      (returns, shipping, and privacy).

      *   Work with your client to develop high-quality images for their products. Review Shopify''s tips for creating and
      uploading images.

      *   Review your client''s [tax settings](https://help.shopify.com/en/manual/taxes) or help your client to contact an
      appropriate tax expert. Many merchants need to charge taxes on their sales and report and remit those taxes to their
      government.

      *   Add apps from the Shopify App Store. Apps let you quickly extend the functionality of the client''s store.'
    - '*   It introduces the "Theme library" concept, explaining that themes in this section are only visible to the user
      and can be switched by publishing to the store.

      *   The page also highlights "Popular free themes" which offer core features and are easily customizable without requiring
      coding.'
    - '**Viewing or setting the password**


      1.  From your Shopify admin, go to **Online Store > Preferences**.

      2.  In the **Password protection > Password** field, enter a password. This is the password you''ll give to the visitors
      who you want to access your online store. Don''t use the same password you use to log in to your admin.

      3.  Click **Save**.'
