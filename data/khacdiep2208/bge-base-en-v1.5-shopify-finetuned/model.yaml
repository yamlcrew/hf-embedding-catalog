- source_sentence: What settings are available for logo and favicon customization?
  sentences:
  - 'One layout file won’t cover every eventuality, and there will be situations where you require a completely different
    layout. While you could hide elements with CSS, a better approach is to create an alternate layout with different HTML
    markup.


    A good example might be a specific landing page for a product or a newsletter sign-up page that doesn’t require the same
    “site furniture” as the rest of the site. In these situations, it’s possible to designate that the micro-render with an
    “alternative” layout file.


    Creating an alternative layout is very straightforward. First, create a new file, give it a relevant name and the `.liquid`
    extension, and save it in the layouts folder in your theme directory. In this file, place any necessary HTML (HTML declarations,
    CSS, JS links, etc.) along with the two placeholders discussed above.


    To use this layout file and effectively override the default `theme.liquid` layout file, use a specific Liquid syntax
    as the first line in any template file (`index.liquid`, `product.liquid`, etc.). In this instance, the default `theme.liquid`
    will not be applied, but rather the specified alternative layout file.


    It’s also possible to request that no layout file be applied. The syntax for this must be the first line at the top of
    the relevant template (`index.liquid`, `product.liquid`, etc.). A use case for this might be when rendering output from
    your store in an alternative syntax such as JSON.'
  - The image displays a multi-panel view of the Shopify theme editor interface, focusing on header and logo customization,
    alongside a live preview of a store. On the far left, a "Header" settings panel is visible, showing "Desktop logo position"
    with "Middle left" selected, and an option to "Edit your logo in theme settings." It also includes sections for "Menu"
    configuration, allowing for the selection of the "Main menu" and a "Desktop menu type" with "Dropdown," "Mega menu," and
    "Drawer" options. Adjacent to this, a "Theme settings" panel is dedicated to "Logo" customization. This panel allows users
    to "Select image" or "Explore free images" for the main store logo and adjust the "Desktop logo width" using a slider,
    currently set to "90 px." Below the main logo settings, there's a "Favicon image" section with similar "Select image"
