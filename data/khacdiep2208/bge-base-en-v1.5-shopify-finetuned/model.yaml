- source_sentence: What is the mission of the SBDC organization mentioned in the Shopify training?
  sentences:
  - For a full list of available Liquid and Shopify tags, variables, and properties available in the templates, visit the
    Shopify documentation.
  - 'This page serves as a title slide, introducing the fundamental question: "What is Shopify".


    The image displays a presentation slide with a clean and modern design. The top-left two-thirds of the slide are white,
    while the bottom-right third is a dark blue-gray, separated by a diagonal line running from the top right to the bottom
    left. Centered on the white portion of the slide, the text "What is Shopify" is presented in a large, dark blue serif
    font, clearly indicating the main topic or question for the subsequent content.'
  - '


    ### Presentation Overview

    The page introduces a presentation titled "Shopify 101".

    It identifies the moderator as Alaina Capasso, providing her email (aecapasso@uri.edu) and affiliation (RI Small Business
    Development Center) and role (Webinar Coordinator).

    The presentation is given by Amanda Basse.


    The image on this page is the logo for "AMERICA''S SBDC RHODE ISLAND," positioned in the bottom right corner. The logo
    features "AMERICA''S" in small, capitalized letters above the much larger, bolded "SBDC," which is dark blue with a thin
    white outline. A star design is incorporated into the "A" of "AMERICA''S," extending over the "SBDC." Below "SBDC," "RHODE
    ISLAND" is displayed in capitalized white letters within a red rectangular banner. The entire logo is set against a dark
    blue diagonal shape that occupies the bottom right portion of the slide, with the rest of the slide being white.


    ### Organization''s Mission

    The text describes the organization''s mission to train, educate, and support entrepreneurs, including both new (pre-venture)
    and established small businesses.

    It highlights that the organization is positioned within the nationwide network of SBDCs (Small Business Development Centers).

    The organization offers resources, key connections at state and national levels, workshops, and both online and in-person
    support.

    The primary goal is to equip Ocean State entrepreneurs to achieve their next level of growth.


    The bottom half of the page features three distinct logos against a light background. On the left is the "POWERED BY SBA"
    logo, which includes a stylized "SBA" in blue with a red outline and the text "U.S. Small Business Administration" below
    it, indicating the organization is supported by the SBA. In the center, there is a logo for "THE UNIVERSITY OF RHODE ISLAND,"
    with smaller text underneath stating "DIVISION OF RESEARCH AND ECONOMIC DEVELOPMENT," presented in a formal, serif typeface.
    On the right, the "RHODE ISLAND COMMERCE CORPORATION" logo is displayed, featuring a light blue, abstract sail-like shape
    next to the bold "RHODE ISLAND" text, with "COMMERCE CORPORATION" in a smaller, white font on a dark blue rectangular
    background below it, signifying a partnership or affiliation with this entity.'
- source_sentence: What steps are involved in testing and launching a Shopify store?
  sentences:
  - '*   This page serves as a table of contents, outlining various topics related to setting up, managing, and launching
    a Shopify store.

    *   It covers configuring shipping methods, rates, and zones, as well as setting up payment gateways, including Shopify
    Payments and third-party providers.

    *   The document details managing taxes, importing customer data (with steps for preparing CSV files and verifying imports),
    and tips for customer information management.

    *   It also addresses order fulfillment methods (manual or automatic), testing the store before launch (simulating or
    using real transactions), and steps for launching the store such as website testing, legal page setup, and password removal.

    *   Finally, it includes a section for a final checklist and strategies for marketing the online store to drive traffic.'
  - 'This page presents a comprehensive checklist for setting up a new online store.

    The checklist covers essential administrative and operational tasks, from initial login and password protection to defining
    the store''s name, legal business name, and physical address.

    It includes financial setup steps like adding billing information, setting default currency, and configuring taxes and
    payment gateways.

    Logistics are addressed with options for setting default weight units, shipping settings, Shopify Markets setup, and pickup/local
    delivery options.

    The checklist also covers staffing, domain setup, and a recommendation to explore the Shopify App store for additional
    business tools.


    The Shopify New Store Checklist displays a vertical list of fourteen setup tasks, each accompanied by an unchecked square
    checkbox to its left, indicating pending actions. The tasks are presented as clickable links, suggesting they lead to
    specific configuration pages or instructions. These tasks include logging into the store, password protecting it, naming
    the store and setting its legal business name, entering the business address, adding billing information, setting the
    default currency, setting a default weight unit for listings, setting up shipping settings, configuring Shopify Markets
    (if applicable), setting up pickup and local delivery, setting up taxes, setting up payment gateways, staffing the store
    (if applicable), and setting up the domain. The final item on the list is a prompt to explore the Shopify App store, which
    includes an external link icon, to find apps that could assist the business. At the bottom right corner of the page, the
    text "Source: New Store Checklist" is visible, with "New Store Checklist" highlighted as a clickable link.'
  - As you grow, maintaining healthy profit margins is crucial. A trap some entrepreneurs fall into is overspending on shiny
    new tools or large ad campaigns without a clear return. It's important to regularly review your expenses – app subscriptions,
    advertising spend, shipping costs, packaging, etc. – and ensure you're getting value from each. For example, you might
    be paying for several apps that have overlapping functions; consider consolidating or removing ones you don't truly need.
    Negotiate with suppliers or service providers for better rates once your volume increases (this can apply to product suppliers,
    shipping carriers, or even app providers if you move to a higher tier). When it comes to ads, closely monitor performance
    and pause campaigns that are consistently unprofitable. Sometimes, taking a lean approach (almost a bootstrap mindset)
    even as you scale can save you from cash flow crunches. Avoid tying up too much cash in inventory – yes, you want to avoid
    stockouts, but overstocking is also dangerous if the product doesn't sell as fast as predicted. Use data to forecast demand
    more accurately and consider just-in-time inventory strategies or print-on-demand models to reduce risk. Another area
    to watch is your cost of goods sold (COGS) and landed costs; explore whether larger bulk orders from your supplier could
    give you a discount, or if there are ways to optimize logistics. Many expert entrepreneurs find that operational efficiencies
    and cost savings can significantly boost their bottom line without any increase in sales. Essentially, **run a tight ship**
    – invest in growth, but stay prudent and ensure every dollar spent has a purpose and an expected return. This set of habits
    keeps your business financially healthy and ready to weather challenges like market downturns or rising ad costs.
