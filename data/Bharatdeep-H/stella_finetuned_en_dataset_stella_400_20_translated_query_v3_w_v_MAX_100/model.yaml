- source_sentence: "**Breaking News:**\n\nA reliable government source has confirmed a major announcement impending for tomorrow.\
    \ A complete shutdown is imminent. Stay informed—this information stems from a cabinet briefing held this morning. The\
    \ details suggest:\n\n**Country Lockdown:** Effective from Wednesday, 18th March, to 31st March.\n\n1. **Gatherings Prohibited:**\
    \ All religious, sporting, social, and cultural gatherings are banned. Business and religious premises will close, with\
    \ exceptions for grocery stores, public markets, and provision shops. Mosque access and Islamic events are restricted,\
    \ pending Muzakarah meeting outcomes.\n\n2. **Travel Restrictions:** Nationwide travel restrictions will be imposed on\
    \ all citizens. Those recently returned from abroad must self-quarantine.\n\n3. **Border Control:** All tourists and visitors\
    \ are barred from entering the country.\n\n4. **School Closures:** All public and private schools, including kindergartens,\
    \ nurseries, residential schools, and other educational institutions, will shut down.\n\n5. **Higher Education Institutions:**\
    \ Both public and private universities and colleges will close.\n\n6. **Essential Services Exemption:** Government and\
    \ private premises will close, except for essential services like water, electricity, telecommunications, postal services,\
    \ transport, fuel, gas, lubrication, broadcasting, banking, health, pharmacies, fire-fighting, ports, airports, prisons,\
    \ security, defense, sanitation, and food supply.\t verdict: ['Partly false information']"
  sentences:
  - UNESCO declared Islam ‘most peaceful religion in world' UNESCO denies declaring Islam ‘most peaceful religion’ -- and
    the story originated on a satirical website
  - All schools closing in South Africa this week Only a few schools have shut so far in South Africa as third Covid-19 wave
    looms
  - Australian Prime Minister to announce mandatory lockdown Misinformation circulates online that Australia has announced
    a nationwide 'shut down'
- source_sentence: "Netherlands - Senate - The current \"pandemic\" and all the freedom-restricting measures were detailed\
    \ in a scenario proposed by the Rockefeller Foundation in 2010! It's like a dream!\t verdict: ['Missing context']"
  sentences:
  - The current pandemic and all liberticidal measures were detailed in a scenario proposed by the Rockefeller Foundation
    in 2010. The Rockefeller Foundation imagined a fictional scenario, not the current pandemic
  - A photo shows tractors "today" on a highway in "Holland". There is nothing to read about it in the German press. This
    photo of peasant protests was taken in 2019 - and the media reported on the road blockade
  - This photo shows elderly social activist joining India's ruling Bharatiya Janata Party. This image has been digitally
    manipulated to insert the face of an Indian activist
- source_sentence: "These blue masks are the most common in Uganda due to their availability and the ease of purchasing them\
    \ from street vendors at minimal cost. However, the Canadian government has banned their use, stating that these Chinese-made\
    \ masks contain graphene, a material shown to cause cellular lung damage. \"Health Canada's preliminary risk assessment\
    \ revealed a potential for early lung damage from inhaling microscopic graphene,\" they said. The Quebec provincial government\
    \ directed people to stop distributing and using these masks, keeping them in a safe place. If you regularly wear masks,\
    \ choose an alternative, preferably reusable cloth masks. They are a safer option. As our medical authorities may not\
    \ conduct their own research on what Ugandans constantly inhale, we should adopt the findings of other countries and also\
    \ ban the sale and use of these blue masks. Share this information to protect others' lung health.\t verdict: ['Partly\
    \ false information.']"
  sentences:
  - 'Long-term mask-wearing may cause advanced-stage lung cancer, one study shows Fact check: Long-term face mask use will
    not cause lung cancer'
  - Video showing the call to prayer at a famous church in Spain This video shows the call to prayer during a concert at Eton
    College in England
  - All ‘blue masks’ contain graphene Only a small percentage of all blue surgical masks contain graphene
- source_sentence: "**Person of the Year: TIME names JAIR BOLSONARO, President of Brazil, and Leader of the Free World.**\n\
    \n**TIME Magazine's Personality of the Year! President Jair Messias Bolsonaro! Second place, Trump! A Victory for Conservatism!\
    \ Eat your hearts out, leftists. Bite your nails in envy, you pack of fools! It's Bolsonaro, damn it! \U0001F926\U0001F602\
    \U0001F4AA\U0001F1E7\U0001F1F7**\t verdict: ['False information']"
  sentences:
  - Jair Bolsonaro at Times as Personality of the Year The cover of Time magazine that shows Bolsonaro as "personality of
    the year" is a montage
  - Wearing face masks can cause carbon dioxide toxicity; can weaken immune system Wearing face masks does not cause hypercapnia
    or affect the immune system
  - 'Donald Trump said: "The Brazilian press fears the candidacy of a military man more than that of one convicted of corruption"
    There is no record that Trump said that the Brazilian press fears the candidacy of a military man'
