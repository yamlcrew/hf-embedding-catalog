widgetData:
- source_sentence: What is the relationship between the x- and y-coordinates in a linear relationship, and how can this relationship
    be represented visually on a graph?
  sentences:
  - '"A linear relationship is a relationship between variables such that when plotted on a coordinate plane, the points lie
    on a line." Additionally, "You can think of a line, then, as a collection of an infinite number of individual points that
    share the same mathematical relationship."'
  - '"A ''model'' is a situation-specific description of a phenomenon based on a theory, that allows us to make a specific
    prediction." and "In physics, it is particularly important to distinguish between these two terms. A model provides an
    immediate understanding of something based on a theory."'
  - '"Use capital letters to denote sets, $A,B, C, X, Y$ etc. [...] if you stick with these conventions people reading your
    work (including the person marking your exams) will know — ''Oh $A$ is that set they are talking about'' and ''$a$ is
    an element of that set.''"'
- source_sentence: What factors influence whether thin-film interference results in constructive or destructive interference?
  sentences:
  - '"For nonrelativistic velocities, an observer moving along at the same velocity as an Ohmic conductor measures the usual
    Ohm''s law in his reference frame, $\textbf{J}_{f}'' = \sigma \textbf{E}''$... the current density in all inertial frames
    is the same so that (3) in (4) gives us the generalized Ohm''s law as $\textbf{J}_{f}'' = \textbf{J}_{f} = \sigma (\textbf{E}
    + \textbf{v} \times \textbf{B})$ where v is the velocity of the conductor."'
  - '"Thin-film interference thus depends on film thickness, the wavelength of light, and the refractive indices."'
  - '"A summary of the properties of concave mirrors is shown below: • converging • real image • inverted • image in front
    of mirror. A summary of the properties of convex mirrors is shown below: • diverging • virtual image • upright • image
    behind mirror."'
- source_sentence: How do non-conservative forces affect the total energy change in a system undergoing an irreversible process?
  sentences:
  - '"Energy is conserved but some mechanical energy has been transferred into nonrecoverable energy $W_{\mathrm{nc}}$. We
    shall refer to processes in which there is non-zero nonrecoverable energy as irreversible processes."'
  - '"Hamilton’s equations give $2s$ first-order differential equations for $p_{k},q_{k}$ for each of the $s=n-m$ degrees
    of freedom. Lagrange’s equations give $s$ second-order differential equations for the $s$ independent generalized coordinates
    $q_{k},\dot{q}_{k}."'
  - '"Determine what happens as $\Delta x$ approaches 0."'
- source_sentence: What are the conditions under which a mutant virus is likely to replace a wildtype virus in a population,
    according to the SIR model of disease dynamics?
  sentences:
  - '"In the limit of high Reynolds number, viscosity disappears from the problem and the drag force should not depend on
    viscosity. This reasoning contains several subtle untruths, yet its conclusion is mostly correct. ... To make \( F \)
    independent of viscosity, \( F \) must be independent of Reynolds number!"'
  - '"A more mathematically rigorous name would be the renormalization monoid."'
  - '"I^{\prime}$ increases exponentially if $\frac{\beta^{\prime}(d+c+\gamma)}{\beta}-\left(d+c^{\prime}+\gamma^{\prime}\right)>0$
    or after some elementary algebra, $\frac{\beta^{\prime}}{d+c^{\prime}+\gamma^{\prime}}>\frac{\beta}{d+c+\gamma}$." Additionally,
    "our result (4.6.8) suggests that endemic viruses (or other microorganisms) will tend to evolve (i) to be more easily
    transmitted between people $\left(\beta^{\prime}>\beta\right) ;$ (ii) to make people sick longer $\left(\gamma^{\prime}<\gamma\right)$,
    and; (iii) to be less deadly $c^{\prime}<c$."'
- source_sentence: What is the relationship between the smallest perturbation of a matrix and its rank, as established in
    theorems regarding matrix perturbations?
  sentences:
  - '"Suppose $A \in C^{m \times n}$ has full column rank (= n). Then $\min _{\Delta \in \mathbb{C}^{m \times n}}\left\{\|\Delta\|_{2}
    \mid A+\Delta \text { has rank }<n\right\}=\sigma_{n}(A)$."'
  - '"Complementary angles have measures that add up to 90 degrees."'
  - '"If a beam of light enters and then exits the elevator, the observer on Earth and the one accelerating in empty space
    must observe the same thing, since they cannot distinguish between being on Earth or accelerating in space. The observer
    in space, who is accelerating, will observe that the beam of light bends as it crosses the elevator... that means that
    if the path of a beam of light is curved near Earth, it must be because space itself is curved in the presence of a gravitational
    field!"'
