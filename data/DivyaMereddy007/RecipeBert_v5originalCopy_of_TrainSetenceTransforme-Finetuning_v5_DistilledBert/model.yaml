    and boil until thick and clear.", "Remove from heat and stir in jello.", "Set aside to cool.", "But don't allow it to
    set. Layer strawberries in baked crust.", "Pour cooled glaze over. Continue layering berries and glaze.", "Refrigerate.",
    "Serve with whipped cream."]
  - Vegetable-Burger Soup ["1/2 lb. ground beef", "2 c. water", "1 tsp. sugar", "1 pkg. Cup-a-Soup onion soup mix (dry)",
    "1 lb. can stewed tomatoes", "1 (8 oz.) can tomato sauce", "1 (10 oz.) pkg. frozen mixed vegetables"] ["Lightly brown
    beef in soup pot.", "Drain off excess fat.", "Stir in tomatoes, tomato sauce, water, frozen vegetables, soup mix and sugar.",
    "Bring to a boil.", "Reduce heat and simmer for 20 minutes. Serve."]
- source_sentence: Summer Spaghetti ["1 lb. very thin spaghetti", "1/2 bottle McCormick Salad Supreme (seasoning)", "1 bottle
