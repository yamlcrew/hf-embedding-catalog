widgetData:
- source_sentence: What is the estimated training cost and hardware usage for Microsoft’s Phi-2 model?
  sentences:
  - 'So far, I think they’re a net positive. I’ve used them on a personal level to improve my productivity (and entertain
    myself) in all sorts of different ways. I think people who learn how to use them effectively can gain a significant boost
    to their quality of life.

    A lot of people are yet to be sold on their value! Some think their negatives outweigh their positives, some think they
    are all hot air, and some even think they represent an existential threat to humanity.

    They’re actually quite easy to build

    The most surprising thing we’ve learned about LLMs this year is that they’re actually quite easy to build.'
  - 'A year ago, the only organization that had released a generally useful LLM was OpenAI. We’ve now seen better-than-GPT-3
    class models produced by Anthropic, Mistral, Google, Meta, EleutherAI, Stability AI, TII in Abu Dhabi (Falcon), Microsoft
    Research, xAI, Replit, Baidu and a bunch of other organizations.

    The training cost (hardware and electricity) is still significant—initially millions of dollars, but that seems to have
    dropped to the tens of thousands already. Microsoft’s Phi-2 claims to have used “14 days on 96 A100 GPUs”, which works
    out at around $35,000 using current Lambda pricing.'
  - 'There’s now a fascinating ecosystem of people training their own models on top of these foundations, publishing those
    models, building fine-tuning datasets and sharing those too.

    The Hugging Face Open LLM Leaderboard is one place that tracks these. I can’t even attempt to count them, and any count
    would be out-of-date within a few hours.

    The best overall openly licensed LLM at any time is rarely a foundation model: instead, it’s whichever fine-tuned community
    model has most recently discovered the best combination of fine-tuning data.

    This is a huge advantage for open over closed models: the closed, hosted models don’t have thousands of researchers and
    hobbyists around the world collaborating and competing to improve them.'
- source_sentence: How does the author compare the difficulty of training an LLM to another complex task?
  sentences:
  - 'Sometimes it omits sections of code and leaves you to fill them in, but if you tell it you can’t type because you don’t
    have any fingers it produces the full code for you instead.

    There are so many more examples like this. Offer it cash tips for better answers. Tell it your career depends on it. Give
    it positive reinforcement. It’s all so dumb, but it works!

    Gullibility is the biggest unsolved problem

    I coined the term prompt injection in September last year.

    15 months later, I regret to say that we’re still no closer to a robust, dependable solution to this problem.

    I’ve written a ton about this already.

    Beyond that specific class of security vulnerabilities, I’ve started seeing this as a wider problem of gullibility.'
  - 'So training an LLM still isn’t something a hobbyist can afford, but it’s no longer the sole domain of the super-rich.
    I like to compare the difficulty of training an LLM to that of building a suspension bridge—not trivial, but hundreds
    of countries around the world have figured out how to do it. (Correction: Wikipedia’s Suspension bridges by country category
    lists 44 countries).

    You can run LLMs on your own devices

    In January of this year, I thought it would be years before I could run a useful LLM on my own computer. GPT-3 and 3.5
    were pretty much the only games in town, and I thought that even if the model weights were available it would take a $10,000+
    server to run them.'
  - 'Here’s the sequel to this post: Things we learned about LLMs in 2024.

    Large Language Models

    In the past 24-36 months, our species has discovered that you can take a GIANT corpus of text, run it through a pile of
    GPUs, and use it to create a fascinating new kind of software.

    LLMs can do a lot of things. They can answer questions, summarize documents, translate from one language to another, extract
    information and even write surprisingly competent code.

    They can also help you cheat at your homework, generate unlimited streams of fake content and be used for all manner of
    nefarious purposes.'
- source_sentence: When did OpenAI make GPT-4o free for all users?
  sentences:
  - 'Prompt injection is a natural consequence of this gulibility. I’ve seen precious little progress on tackling that problem
    in 2024, and we’ve been talking about it since September 2022.

    I’m beginning to see the most popular idea of “agents” as dependent on AGI itself. A model that’s robust against gulliblity
    is a very tall order indeed.

    Evals really matter

    Anthropic’s Amanda Askell (responsible for much of the work behind Claude’s Character):'
  - 'OpenAI made GPT-4o free for all users in May, and Claude 3.5 Sonnet was freely available from its launch in June. This
    was a momentus change, because for the previous year free users had mostly been restricted to GPT-3.5 level models, meaning
    new users got a very inaccurate mental model of what a capable LLM could actually do.

    That era appears to have ended, likely permanently, with OpenAI’s launch of ChatGPT Pro. This $200/month subscription
    service is the only way to access their most capable model, o1 Pro.

    Since the trick behind the o1 series (and the future models it will undoubtedly inspire) is to expend more compute time
    to get better results, I don’t think those days of free access to the best available models are likely to return.'
  - "Industry’s Tardy Response to the AI Prompt Injection Vulnerability on RedMonk Conversations\n\n\nPosted 31st December\
    \ 2023 at 11:59 pm · Follow me on Mastodon, Bluesky, Twitter or subscribe to my newsletter\n\n\nMore recent articles\n\
    \nTwo publishers and three authors fail to understand what \"vibe coding\" means - 1st May 2025\nUnderstanding the recent\
    \ criticism of the Chatbot Arena - 30th April 2025\nQwen 3 offers a case study in how to effectively release a model -\
    \ 29th April 2025\n\n\n \n\n\nThis is Stuff we figured out about AI in 2023 by Simon Willison, posted on 31st December\
    \ 2023.\n\nPart of series LLMs annual review\n\nStuff we figured out about AI in 2023 - Dec. 31, 2023, 11:59 p.m. \nThings\
    \ we learned about LLMs in 2024 - Dec. 31, 2024, 6:07 p.m."
- source_sentence: Which podcasts featured discussions about Large Language Models according to the context?
  sentences:
  - 'Then there’s the rest. If you browse the Chatbot Arena leaderboard today—still the most useful single place to get a
    vibes-based evaluation of models—you’ll see that GPT-4-0314 has fallen to around 70th place. The 18 organizations with
    higher scoring models are Google, OpenAI, Alibaba, Anthropic, Meta, Reka AI, 01 AI, Amazon, Cohere, DeepSeek, Nvidia,
    Mistral, NexusFlow, Zhipu AI, xAI, AI21 Labs, Princeton and Tencent.

    Training a GPT-4 beating model was a huge deal in 2023. In 2024 it’s an achievement that isn’t even particularly notable,
    though I personally still celebrate any time a new organization joins that list.

    Some of those GPT-4 models run on my laptop'
  - 'We don’t yet know how to build GPT-4

    Frustratingly, despite the enormous leaps ahead we’ve had this year, we are yet to see an alternative model that’s better
    than GPT-4.

    OpenAI released GPT-4 in March, though it later turned out we had a sneak peak of it in February when Microsoft used it
    as part of the new Bing.

    This may well change in the next few weeks: Google’s Gemini Ultra has big claims, but isn’t yet available for us to try
    out.

    The team behind Mistral are working to beat GPT-4 as well, and their track record is already extremely strong considering
    their first public model only came out in September, and they’ve released two significant improvements since then.'
  - 'I also gave a bunch of talks and podcast appearances. I’ve started habitually turning my talks into annotated presentations—here
    are my best from 2023:


    Prompt injection explained, with video, slides, and a transcript

    Catching up on the weird world of LLMs

    Making Large Language Models work for you

    Open questions for AI engineering

    Embeddings: What they are and why they matter

    Financial sustainability for open source projects at GitHub Universe


    And in podcasts:



    What AI can do for you on the Theory of Change


    Working in public on Path to Citus Con


    LLMs break the internet on the Changelog


    Talking Large Language Models on Rooftop Ruby


    Thoughts on the OpenAI board situation on Newsroom Robots'
- source_sentence: Why does the author find it difficult to determine the impact of capitalizing words in prompts?
  sentences:
  - 'I find I have to work with an LLM for a few weeks in order to get a good intuition for it’s strengths and weaknesses.
    This greatly limits how many I can evaluate myself!

    The most frustrating thing for me is at the level of individual prompting.

    Sometimes I’ll tweak a prompt and capitalize some of the words in it, to emphasize that I really want it to OUTPUT VALID
    MARKDOWN or similar. Did capitalizing those words make a difference? I still don’t have a good methodology for figuring
    that out.

    We’re left with what’s effectively Vibes Based Development. It’s vibes all the way down.

    I’d love to see us move beyond vibes in 2024!

    LLMs are really smart, and also really, really dumb'
  - 'The boring yet crucial secret behind good system prompts is test-driven development. You don’t write down a system prompt
    and find ways to test it. You write down tests and find a system prompt that passes them.


    It’s become abundantly clear over the course of 2024 that writing good automated evals for LLM-powered systems is the
    skill that’s most needed to build useful applications on top of these models. If you have a strong eval suite you can
    adopt new models faster, iterate better and build more reliable and useful product features than your competition.

    Vercel’s Malte Ubl:'
  - 'Just this week, the New York Times launched a landmark lawsuit against OpenAI and Microsoft over this issue. The 69 page
    PDF is genuinely worth reading—especially the first few pages, which lay out the issues in a way that’s surprisingly easy
    to follow. The rest of the document includes some of the clearest explanations of what LLMs are, how they work and how
    they are built that I’ve read anywhere.

    The legal arguments here are complex. I’m not a lawyer, but I don’t think this one will be easily decided. Whichever way
    it goes, I expect this case to have a profound impact on how this technology develops in the future.'
