widgetData:
- source_sentence: МультНайтШоу. Выпуск 1. В гостях Джо Байден, поет Мультимати МультНайтШоу - юмористическое нарисованное
    вечернее шоу, где обсуждаются актуальные новости страны и мира, в гости приходят герои настоящего, прошлого и даже будущего.В
    первом выпуске мы обсудим актуальные новости недели, посмотрим анимационную версию нового сериала «Дом Дракона», пригласим
    в нашу студию небезызвестного президента США Джо Байдена, увидим новый клип от Мультимати и многое другое.
  sentences:
  - 'Информационные технологии: Искусственный интеллект'
  - 'Образование: Высшее образование'
  - 'Массовая культура: Юмор и сатира, Новости и политика: Международные новости'
- source_sentence: СarJitsu. 2 сезон, 4 серия. Сушист vs Оксана «Новиков» CarJitsu — бои в формате POP MMA, где в вместо ринга
    бойцы сражаются в салоне автомобиля. В этом выпуске встретились эпатаж и мастерство! Дракон и Японский самурай, Андрей
    «Сушист» Мешков и Александр «Оксана» Новиков! Узнайте, кому удалось порулить этой машиной! Комментирует YURI THE PROFESSIONAL
    18+
  sentences:
  - 'Книги и литература: Комиксы и графические романы'
  - 'Спорт: Борьба, Массовая культура'
  - 'Религия и духовность: астрология, События и достопримечательности: Комедия и стендап'
- source_sentence: ВЫПУСК №4 НЕУДОБНЫЙ СТЕНДАП Новогодний выпуск Неудобного Стендапа уже на канале! На этот раз за 5000 рублей
    сразятся Иван Бобровников, Аля Кокушкина и Егор Константинов. Комики расскажут свои шутки посетителям парка ВДНХ, и выступят
    в гончарной мастерской, в раздевалке катка и в аниме-магазине. Кто заберёт бабло, а кто уйдёт ни с чем определят случайные
    зрители.
  sentences:
  - Массовая культура, Карьера, Изобразительное искусство
  - Хобби и интересы, Транспорт
  - 'Массовая культура: Юмор и сатира'
- source_sentence: МАКСИМ НАРОДНЫЙ Выпуск №65 ГОТОВИМ С АКТЁРОМ СЕРИАЛА «САЛЮТ, НАЧАЛЬНИК» ДЕНИСОМ ЗАЙНУЛЛИНЫМ В новом выпуске
    у ведущего канала Максима в гостях актёр театра и кино Денис Зайнуллин. Максим и Денис готовят бешбармак. Это просто и
    вкусное блюдо, которое позволит удивить всех гостей. По вопросам рекламы пишите на email
  sentences:
  - 'Еда и напитки: Кулинария, Массовая культура'
  - Массовая культура, Фильмы и анимация
  - 'Бизнес и финансы: Бизнес: Бизнес в ИТ'
- source_sentence: Роман Юнусов и популярный озвучер Карен Арутюнов попали в клуб богачей В новом выпуске шоу «Спортивный
    Интерес» Рома Юнусов и Карен Арутюнов почувствуют себя богатеями или даже мафиози. А всё потому, что им предстоит освоить
    вид спорта, куда без членства в клубе не попасть. Да, мы отправили героев на поле для гольфа. Солнце, трава, песок, клюшка
    - вот неполный список того, что мешало ребятам бить по мячу. Ну, а кто выполнил драйв и прошёл лунку быстрее оппонента,
    ты узнаешь, посмотрев выпуск до конца.
  sentences:
  - 'Семья и отношения: Уход за пожилыми людьми'
  - Массовая культура, Спорт
  - 'Транспорт, Спорт: Автогонки, События и достопримечательности: Спортивные события'
