widgetData:
- source_sentence: Trường có chịu trách nhiệm cho vật dụng cá nhân bị mất cắp không?
  sentences:
  - Nhà trường không chịu trách nhiêm cho việc mất bất kỳ tài sản cả nhân nào.
  - khách ghé thăm trường từ thứ Hai đến thứ Sáu, từ 08:00 đến 17:00, phải xuất trình giấy tờ cá nhân có dán ảnh với bảo vệ
    nhà trường để được cấp thẻ ra vào.
  - Trường UNIS Hà Nội không chịu trách nhiệm về bất kỳ vật dụng nào bị thất lạc hay mất trộm.
- source_sentence: Tầm nhìn của UNIS Hà Nội là gì?
  sentences:
  - Học sinh nào ăn mặc không đúng mục sẽ phải thay đổi trang phục ngay lập tức.
  - 65 phút.
  - “Cộng đồng học tập của chúng tôi sẽ là hình mẫu truyền cảm hứng vì một thế giới tốt đẹp hơn”.
- source_sentence: Học sinh khối 11 và 12 của UNIS Hà Nội có mấy lựa chọn về chương trình học?
  sentences:
  - Bằng Tú tài của Trường Trung học phổ thông UNIS Hà Nội và Chứng chỉ Tú tài quốc tế.
  - DP là một khoá học tiền đại học nghiêm ngặt kéo dài 2 năm với các bài kiểm tra đầu ra đáp ứng nhu cầu của học sinh khối
    11 và 12 với động lực học tập cao.
  - Học sinh khối 11 và 12 của trường UNIS Hà Nội có ba lựa chọn về chương trình học.
- source_sentence: Quy định về hút thuốc tại UNIS Hà Nội là gì?
  sentences:
  - 15:45 đến 17:30.
  - UNIS Hà Nội là trường học không thuốc là. Nghiêm cấm hút thuốc trong trường hoặc cạnh khu vực công trường hoặc trong các
    hoạt động của nhà trường cả trong và ngoài khuôn viên trường.
  - Xã hội/Cảm xúc; Học thuật; Phát triển sự nghiệp Tư vấn lựa chọn đại học/cao đáng; Quan tâm đến các vấn đề quốc tế.
- source_sentence: Phụ huynh có quy định gì khi ở trong khuôn viên trường?
  sentences:
  - Trường là thành viên của Hội đồng các trường quốc tế châu Âu (ECIS) và Hội đồng các trường hải ngoại khu vực Đông Á (EARCOS).
  - Bằng Tú tài của Trường Trung học phổ thông UNIS Hà Nội.
  - Phụ huynh phải đeo Thẻ ra vào của trường UNIS Hà Nội trong suốt thời gian thám quan trường.
