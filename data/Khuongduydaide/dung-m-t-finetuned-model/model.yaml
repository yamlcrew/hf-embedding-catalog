widgetData:
- source_sentence: Giờ học vào Thứ Tư là gì?
  sentences:
  - 08:10 đến 14:35.
  - 'Nhà ăn không sử dụng tiền mặt - mọi hoạt động thanh toán đều được thực hiện qua Thẻ thông minh Campus Card[cite: 702].'
  - Nhà trường sẽ tiến hành điều tra mọi khiếu nại và sẽ có biện pháp kỷ luật hoặc biện pháp xử lý thích hợp.
- source_sentence: Nhà trường có chịu trách nhiệm về vật dụng bị mất trộm không?
  sentences:
  - Học sinh cư xử đúng mực và trung thực, nhận thức sâu sắc về lẽ phải và sự công bằng.
  - UNIS Hà Nội là trường học không thuốc lá. Nghiêm cấm hút thuốc trong trường hoặc cạnh khu vực cổng trường hoặc trong các
    hoạt động của nhà trường cả trong và ngoài khuôn viên trường.
  - 'Trường UNIS Hà Nội không chịu trách nhiệm về bất kỳ vật dụng nào bị thất lạc hay mất trộm[cite: 543].'
- source_sentence: Dép xỏ ngón có được phép sử dụng ở mọi nơi không?
  sentences:
  - Nhìn chung, học sinh trường Trung học phổ thông sẽ phải dành khoảng một tiếng rưỡi để làm bài tập mỗi tối.
  - Phụ huynh và học sinh không được phép ra vào khuôn viên trường học ngoài giờ làm việc của nhà trường trừ trường hợp có
    hoạt động được tổ chức tại đây.
  - 'Dép xỏ ngón không được phép sử dụng trong phòng thiết kế công nghệ hoặc phòng thí nghiệm khoa học[cite: 533].'
- source_sentence: Những loại trang phục nào bị cấm?
  sentences:
  - Phòng G01, Toà nhà B5.
  - 'Không được mặc trang phục rách rưới, bẩn thỉu, cẩu thả, hở hang, để lộ ngực hay nội y[cite: 507, 509].'
  - Tăng cường giải quyết vấn đề bằng phương thức hòa bình.
- source_sentence: Vi phạm Cấp độ 3 bao gồm những hành vi nghiêm trọng nào?
  sentences:
  - Hút thuốc, đánh nhau, sử dụng ma tuý/rượu, trộm cắp, gây nguy hiểm cho bản thân hoặc người khác.
  - Bằng Tú tài của Trường Trung học phổ thông UNIS Hà Nội và Chứng chỉ Tú tài quốc tế.
  - 'Vui lòng liên hệ Văn phòng Trường THPT qua điện thoại/email để: Thông báo vắng mặt.'
