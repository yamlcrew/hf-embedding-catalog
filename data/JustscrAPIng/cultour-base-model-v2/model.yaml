widgetData:
- source_sentence: 'Nhà tang lễ Bệnh viện Nguyễn Tri Phương, còn gọi là nhà tang lễ Quảng Đông, tọa lạc tại địa chỉ 336 Trần
    Phú, Phường 7, Quận 5, Thành phố Hồ Chí Minh, phục vụ nhu cầu tổ chức tang lễ cho cộng đồng người Việt và người Hoa. Địa
    điểm này hoạt động 24/24, cung cấp dịch vụ tổ chức tang lễ trọn gói, có bãi đậu xe riêng và được nhiều người đánh giá
    cao về sự chu đáo, giá cả hợp lý.

    https://phucanvienlongan.vn/blogs/tin-tuc/tim-hieu-ve-nha-tang-le-benh-vien-nguyen-tri-phuong'
  sentences:
  - french colonial architecture indochina villa balcony yellow walls shutters kiến trúc pháp thuộc địa đông dương biệt thự
    tường vàng cửa chớp
  - secular non-religious atheism no religion không tôn giáo vô thần thế tục
  - restaurant place to eat food dining hungry lunch dinner eatery nhà hàng quán ăn tiệm cơm ăn uống
- source_sentence: 'Trường Đại học Bách khoa (ĐHQG TPHCM) là trường đại học hàng đầu về kỹ thuật và công nghệ tại Việt Nam.
    Cơ sở 1 tọa lạc tại Quận 10, là nơi học tập của nhiều khoa, phòng ban và các khu chức năng quan trọng của trường. '
  sentences:
  - institution school university college education academy library trường học đại học thư viện giáo dục
  - restaurant place to eat food dining hungry lunch dinner eatery nhà hàng quán ăn tiệm cơm ăn uống
  - secular non-religious atheism no religion không tôn giáo vô thần thế tục
- source_sentence: 'Hội quán Tuệ Thành (còn gọi là Miếu Thiên Hậu hoặc Chùa Bà Chợ Lớn) là một công trình kiến trúc tín ngưỡng
    dân gian lâu đời của người Hoa tại Chợ Lớn, TP. Hồ Chí Minh. Hội quán được xây dựng vào khoảng cuối thế kỷ 17, dùng làm
    nơi hội họp, quản lý di dân, và đặc biệt là thờ cúng Thiên Hậu Thánh Mẫu. Công trình này có giá trị văn hóa, lịch sử sâu
    sắc với kiến trúc đặc trưng, nhiều cổ vật quý báu và là một điểm đến tâm linh quan trọng.

    https://ttvhq5.com.vn/chua-ba-tue-thanh-hoi-quan/'
  sentences:
  - chinese folk religion ancestor worship shenism tín ngưỡng dân gian trung hoa thờ cúng tổ tiên
  - marketplace market bazaar shopping buy food groceries ben thanh chợ bến thành mua sắm thực phẩm đồ khô
  - restaurant place to eat food dining hungry lunch dinner eatery nhà hàng quán ăn tiệm cơm ăn uống
- source_sentence: Nhà tang lễ TP.HCM (Lê Quý Đôn) là một nhà tang lễ cũ nằm ở số 25, đường Lê Quý Đôn, phường 07, quận 03,
    TP.HCM. Đây là một cơ sở tang lễ lâu đời, nay đã được thay thế bởi một nhà hàng lẩu Đài Loan có tên Man Tang Guo Lê Quý
    Đôn tại số 6B Lê Quý Đôn, Phường Võ Thị Sáu, Quận 3.
  sentences:
  - secular non-religious atheism no religion không tôn giáo vô thần thế tục
  - institution school university college education academy library trường học đại học thư viện giáo dục
  - place of worship temple church pagoda shrine mosque pray spiritual nơi thờ tự chùa đền nhà thờ thánh đường miếu
- source_sentence: Đình Phú Xuân tọa lạc tại Huyện Nhà Bè, TP.HCM, đã được UBND Thành phố xếp hạng là di tích kiến trúc nghệ
    thuật cấp Thành phố vào năm 2012. Đình nằm trong một khuôn viên rộng rãi, có nhiều cây xanh, bên bờ Rạch Đời.
  sentences:
  - traditional vietnamese architecture wooden red tile roof kiến trúc truyền thống việt nam nhà gỗ mái ngói đỏ nhà rường
  - christian church jesus catholic protestant cross bible công giáo tin lành nhà thờ chúa giêsu thánh giá kinh thánh
  - traditional vietnamese architecture wooden red tile roof kiến trúc truyền thống việt nam nhà gỗ mái ngói đỏ nhà rường
