  sentences:
  - 'cluster: ANALYSIS:  In analyzing the issue of whether the applicants were denied the right to counsel, the court carefully
    reviewed the transcript of the hearing and found that it did not support the applicants'' allegations. The court noted
    that the applicants had been informed that their original lawyer, Philip U. Okpala, would not be attending the hearing
    and that they had been given the opportunity to request an adjournment, which was denied. The court also found that the
    Board Member had not pressured the applicants to proceed without counsel, but rather had given them the opportunity to
    decide whether to proceed with or without counsel. In analyzing the issue of whether the Board made capricious findings
    of fact, the court determined that the Board''s conclusion that the police were unable to locate the perpetrator of the
    ticket incident and that the principal claimant did not pursue the matter further was reasonable and not made arbitrarily
    or irrationally.'
  - 'cluster: SUMMARY:  **(1) Facts**


    The case before the court involves a patent dispute between Eli Lilly Canada Inc. and Novopharm Limited. Eli Lilly Canada
    Inc. had sought a motion to bifurcate the issues of quantum from those of validity and infringement of the patent in suit.
    Prothonotary Tabib granted the motion, and Novopharm Limited appealed the decision. The parties involved in the case had
    been litigating for some time, and the court was considering the appropriateness of bifurcation to speed up the determination
    of the liability issues and to avoid quantification exercises.


    **(2) Issue**


    The issue before the court was whether Prothonotary Tabib erred in granting the motion to bifurcate the issues of quantum
    from those of validity and infringement of the patent in suit. Novopharm Limited argued that Prothonotary Tabib had made
    an error of law in granting the motion without sufficient evidence to support the decision. Specifically, Novopharm Limited
    argued that Prothonotary Tabib had failed to heed the evidentiary requirements set out by the Federal Court of Appeal
    in Realsearch Inc. v. Valon Kone Brunette.


    **(3) Rule**


    The court applied the principles established in previous cases, including Z.I. Pompey Industrie v. ECU-Line N.V. and Merck
    and Co. v. Apotex Inc. The court held that the applicant bears the burden of convincing the court on a balance of probabilities
    that bifurcation or severance is more likely than not to result in the just, expeditious, and least expensive determination
    of the proceeding on its merits.


    **(4) Analysis**


    The court analyzed the decision of Prothonotary Tabib and found that she had considered multiple factors before granting
    the motion to bifurcate. The court noted that Prothonotary Tabib had considered the evidence before her, the pleadings,
    her knowledge of the history of the proceeding, and the issues it involved. The court also found that Prothonotary Tabib
    had not implicitly applied or assumed the existence of a presumption in favor of bifurcation in patent infringement cases.
    The court concluded that Prothonotary Tabib had not made an error of law in granting the motion to bifurcate.


    **(5) Conclusion**


    The court dismissed Novopharm Limited''s appeal, finding that Prothonotary Tabib had not erred in granting the motion
    to bifurcate the issues of quantum from those of validity and infringement of the patent in suit. The court held that
    Prothonotary Tabib had considered the necessary factors and had not made an error of law in granting the motion. The court
    also noted that even if it had exercised its discretion de novo, it would have reached the same conclusion as Prothonotary
    Tabib.'
