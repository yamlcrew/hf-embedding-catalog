    documents, preparation for a contested motion, preparation for examination, and preparation for a status review. The respondents
    argued that certain items should be reduced or disallowed, while the applicants argued that the complexity and importance
    of the case justified the claimed costs. The court allowed 6 units for item 1, 5 units for item 5, 5 units for item 8,
