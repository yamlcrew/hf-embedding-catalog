    sentences:
    - 'cluster: SUMMARY:  **(1) Facts**


      The person concerned, an inmate at Warkworth Institution in Campbellford, Ontario, has been working as a grievance clerk
      for approximately two and a half years. He initiated a group complaint with fellow inmate Helmut Buxbaum regarding the
      state of laundered bed linens, which he described as "absolutely disgusting" with stains and other bodily emissions.
      The complaint was denied at each level of the grievance process, including the Third level appeal, which was decided
      by the Acting Assistant Commissioner Karen J. Wiseman. The person concerned sought to have new bed linens issued and
      the unit laundry room converted into a full-scale laundromat, allowing inmates to launder their own bed linens.


      **(2) Issue**


      The issues before the court were: (1) whether the Correctional Service of Canada (CSC) made a reviewable error in denying
      the person concerned''s Third level appeal, and (2) whether the determination of the outcome of the person concerned''s
      grievance was appropriately delegated by the Commissioner of Corrections to the Acting Assistant Commissioner Karen
      J. Wiseman.


      **(3) Rule**


      The court applied the standard of review of patently unreasonable to the decision of the Acting Assistant Commissioner.
      The court held that the CSC did not make a reviewable error in denying the person concerned''s Third level appeal. The
      decision was based on pure findings of fact, and the CSC had considered the efforts made by staff members to resolve
      the complaint, including exchanging the soiled bed linens. The court also held that the determination of the outcome
      of the person concerned''s grievance was appropriately delegated by the Commissioner of Corrections to the Acting Assistant
      Commissioner.


      **(4) Analysis**


      The court analyzed the standard of review applicable to the decision of the Acting Assistant Commissioner, citing Tehrankari
      v. Canada (Correctional Service), [2000] F.C.J. 495, and Baker v. Canada (Minister of Citizenship and Immigration),
      [1999] 2 S.C.R. 817. The court applied the standard of patently unreasonable to the decision, as it was based on pure
      findings of fact. The court also examined the CSC''s decision-making process, citing subsection 82(a) of the Regulations,
      which requires consideration of efforts made by staff members to resolve the complaint. The court found that the CSC
      had considered these efforts and had not made a reviewable error in denying the person concerned''s Third level appeal.


      Regarding the delegation of authority, the court examined the relevant legislation, including sections 75-82 of the
      Regulations, and Commissioner''s Directive Number 081. The court held that the Acting Assistant Commissioner had the
      proper authority to render the final decision in the grievance process, citing subsection 2(2) of the Act, which allows
      for delegation of powers and functions in cases of absence, incapacitation, or vacancy.


      **(5) Conclusion**


      The court concluded that the CSC did not make a reviewable error in denying the person concerned''s Third level appeal,
      and that the determination of the outcome of the grievance was appropriately delegated by the Commissioner of Corrections
      to the Acting Assistant Commissioner. The court dismissed the application for judicial review, finding no reason to
      intervene in the decision of the Acting Assistant Commissioner.'
