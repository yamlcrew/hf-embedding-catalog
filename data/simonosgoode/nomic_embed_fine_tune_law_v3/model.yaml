    sentences:
    - 'cluster: SUMMARY:  **(1) Facts**


      The person concerned, a former member of the Canadian Forces, applied to the Minister of Veterans Affairs for a pension
      in respect of recurrent inversion sprains of his right ankle, which he alleged was consequential to his pensioned condition
      of pes planus. The Minister refused to extend pension entitlement, and the decision was affirmed by the review panel
      and appeal panel of the Veterans Review and Appeal Board. The person concerned sought judicial review of the decision,
      arguing that the Board erred in concluding that the inversion sprain was not consequent to his existing pensioned conditions.


      The person concerned had served in the Canadian Forces for over 20 years, during which time he developed eight disabilities
      for which he received disability pensions, including pes planus of both feet. He applied for a pension in respect of
      recurrent inversion sprains of his right ankle, which he alleged was consequential to his pensioned condition of pes
      planus. The Minister refused to extend pension entitlement, and the decision was affirmed by the review panel and appeal
      panel of the Board.


      **(2) Issue**


      The issue before the court was whether the Board erred in concluding that the inversion sprain was not consequent to
      the person concerned''s existing pensioned conditions. This question turned on two issues: (1) did the Board disregard
      the medical evidence; and (2) did the Board fail to apply the statutory burden of proof under the Veterans Review and
      Appeal Board Act.


      **(3) Rule**


      The court applied the standard of review of patent unreasonableness for questions of fact and reasonableness simpliciter
      for questions of mixed law and fact. The court also considered the statutory rules of evidence binding the Board, which
      required it to accept uncontradicted evidence, draw all reasonable inferences in favour of the applicant, and resolve
      any doubt in favour of the applicant.


      **(4) Analysis**


      The court found that the Board made a patently unreasonable credibility finding with respect to the medical opinion
      of Dr. Saunders, who had a historical professional relationship with the person concerned and had physically examined
      him. The Board failed to refer to Dr. Saunders'' evidence that he was the person concerned''s physician and had examined
      him, which was relevant to the decision under review. The court also found that the Board erred by not making clear
      whether it applied the statutory burden of proof in section 39 of the Veterans Review and Appeal Act to the facts.


      **(5) Conclusion**


      The court concluded that the Board''s decision did not stand up to a probing examination and was therefore not reasonable.
      The court referred the matter back to another panel of the Board for redetermination, with instructions to weigh the
      evidence and apply the statutory burden of proof. If the Board concludes that the person concerned''s recurrent inversion
      sprains of his right ankle are consequential to his pes planus, the Board must take into account that the person concerned
      is already receiving a small pension with respect to this same ankle injury.'
