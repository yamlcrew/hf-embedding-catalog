      Citizenship Judge for re-determination. The court''s decision was based on the finding that the Judge''s decision was
      not reasonable and that the Judge breached the duty of procedural fairness. The court''s decision highlights the importance
      of procedural fairness in citizenship applications and the need for Citizenship Judges to provide applicants with a
      fair opportunity to address concerns raised during the interview.'
