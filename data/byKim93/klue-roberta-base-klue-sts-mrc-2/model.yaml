  sentences:
  - 박근혜 대통령이 17일 포항제철소 내 파이넥스 3공장을 찾은 것은 세계 제철 기술을 선도하는 핵심 사업이라는 점을 평가한 것이라고 포스코 측은 설명했다.파이넥스 3공장은 지난 1월 가동을 시작했다. 하루 5700,
    연 200만의 쇳물을 뽑아내고 있다. 포스코 관계자는 “이곳에서 생산한 쇳물은 모두 제강공장에서 사용된다”며 “기존의 고로에서 나온 쇳물과 품질에 전혀 차이가 없다”고 설명했다. 포스코는 1992년 파이넥스 공법
    기술 개발에 착수해 11년 만인 2003년 연 60만 규모의 1공장 가동을 시작했다.포스코 관계자는 “다른 철강업체들도 파이넥스와 같은 용선기술 개발에 나섰지만 모두 실패했다”며 “이에 해외 업체들로부터 기술수출
    요청이 이어지고 있다”고 설명했다. 실제로 3공장 가동으로 유휴설비가 된 1공장 설비는 인도의 메스코스틸이 관심을 보여 지난 8월 설비 매각에 관한 양해각서(MOU)를 체결했다. 중국 충칭강철과 함께 추진 중인
    연산 300만t 규모의 충칭 파이넥스 공장도 내년 중 첫 삽을 뜰 예정이다.포스코는 파이넥스 공법이 기존 고로 방식보다 생산비용이 저렴하고 환경친화적인 만큼 해외 수출이 확대될 것으로 기대하고 있다. 파이넥스는
    고로 방식에 비해 황산화물(SOx)과 질소산화물(NOx) 배출량이 각각 60%, 85% 정도 적다. 회사 관계자는 “공장 설비의 85%를 국내 37개 중소기업에서 제작하기 때문에 해외에 수출하면 중소기업 동반성장
    효과를 기대할 수 있다”고 강조했다.
  - 한국 사람들은 종종 양 극단을 오간다. 교회에 나가면서 점을 보는가 하면, 절에 다니면서 정화수를 떠놓고 민간신앙을 지킨다. 산신에 치성을 드리면서 유교적인 제사를 지내기도 한다. 한옥에는 남방문화의 상징인 대청마루와
    북방에서 유래한 온돌을 함께 만들었다. 한(恨)으로 진 응어리를 흥(興)으로 풀어낸다. 《극단의 한국인, 극단의 창조성》은 ‘극단’이란 열쇳말로 한국인의 기질을 분석한 책이다. 저자는 극단을 포용하는 한국인의 특징을
    네 가지로 분류한다. 한국인은 극단과 극단을 수용하고, 극단을 넘나들고, 극단의 중간지대를 만들어 충돌을 피하고, 부분을 깨부수어서 더 큰 통합을 만들어낸다는 것이다. 저자는 “한국인은 서로 대척점에 있는 것들을
    끌어안고, 나아가 여러 가지를 용광로에 넣고 융복합해서 새로운 것을 뽑아낸다”며 “이것이 한민족이 발전할 수밖에 없는 이유”라고 말한다.한국인은 ‘빨리빨리’를 ‘은근과 끈기’ 있게 하는 민족이다. 저자는 “어느
    민족이 빨리빨리 하면서 완성도를 높일 수 있느냐”며 “억척스럽게 놀고 억척스럽게 일하는 사람들이 한국인”이라고 말한다. 동시에 “조선시대 궁에서는 500년을 하루도 빠짐없이 왕의 일거수일투족을 기록했고 백성들은
    매일 논으로 나가 농사짓는 고역을 감당했다”며 “한국인은 하나를 시작하면 지치지 않고 오랜 기간 지속하는 끈기가 있는 사람들”이라고 분석한다. 서로 상충돼 보이는 두 가지 기질이 공존하는 것이다.저자는 우리말에도
    극단을 포용하는 문화가 반영됐다고 본다. 나들이, 빼닫이, 여닫이 등 반대되는 요소를 하나로 묶은 단어가 수없이 많다는 게 저자의 설명이다. 한국의 음식 문화도 양 극단을 넘나든다. 정착의 산물인 발효식품이 유난히
    발달한 한편 겉절이, 상추쌈 같은 자연 상태의 음식을 그대로 즐기기도 한다. 오래 끓이는 뚝배기와 한순간에 파르르 끓어오르는 양은냄비를 모두 애용한다.한국인의 창조 유전자는 때로 적극성으로 표출된다. 해외에 나가보면
    어딜 가도 한 번은 한국 사람을 마주칠 만큼 한국인들은 세계 곳곳에 퍼져 있다. 미국 내 유학생 수도 중국 인도에 이어 세 번째로 많다. 어디 이뿐일까. 유대인은 세계 60여 개국에 흩어져 살고, 중국인은 100여
    개국에서 이민자로 살고 있는데 인구가 고작 5000만명에 불과한 한국 사람들은 175개국에 삶의 터전을 잡았다. 저자는 “새로운 것에 대한 호기심과 굽힐 줄 모르는 도전정신이 만들어낸 결과”라며 “가진 것이라고는
    맨몸뿐인 사람들이 근면과 성실로 세계 곳곳을 파고들고 있다”고 말한다.
