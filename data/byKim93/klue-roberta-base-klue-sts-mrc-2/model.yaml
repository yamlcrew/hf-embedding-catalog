  - source_sentence: 오스만 튀르크의 영토가 축소된 원인은?
    sentences:
    - '미국과 영국, 프랑스 등지에서는 민주주의가 발전했다. 일본은 오세아니아의 군도에 대한 지배권을 확고히 할 수 있게 되었다.


      한편, 독일은 베르사유 조약으로 말미암아 반성보다 지독한 가난과 배상금에 대한 것에 시달렸으며 오스만 튀르크도 세브르 조약을 맺음으로써 영토가 크게 줄어들었다(1922년 해체, 1923년 터키 공화국 수립).
      오스트리아와 헝가리도 각각 생제르맹 조약, 트리아농 조약을 맺음으로써 영토가 크게 줄어들었다. 불가리아는 뇌이 조약으로 남도브루자를 루마니아에 떼어주었다.


      이탈리아는 승전국이었으나 연합국에게 영토를 보장받기는커녕 냉대를 받았다. 결국 1922년에 베니토 무솔리니에 의한 파시스트 정권이 수립된다. 이탈리아와 마찬가지로 중국은 연합국임에도 불구하고 산둥 반도에 대한
      이권을 돌려받지 못하였다. 우드로 윌슨의 민족자결주의 원칙에 따라 중앙유럽의 많은 국가는 독립하였으며, 독립을 조건으로 영국을 도왔던 인도는 그 약속이 무산되자 지속적인 투쟁 운동을 시작했다.


      한편, 우드로 윌슨 미국 대통령은 민족 자결주의를 제창하였으며, 전쟁의 방지와 세계의 평화를 위해 국제 연맹을 설립할 것을 제안하였다. 이로써 국제 연맹이 설립되었으나, 정작 미국은 의회의 반대로 가입에 실패하였다.
      결국 다시 고립의 길을 걸었다.'
    - 내과 외과 소아청소년과 산부인과 마취통증의학과 등 5개 ‘필수 진료과목’ 전문의(醫)를 모두 갖추지 못한 시·군·구가 전국 251곳 가운데 27곳에 달했다. 교통사고나 심근경색 등으로 응급실을 찾은 환자를 전담하는
      응급의학과 전문의가 없는 지방자치단체도 51곳이었다. ▶관련기사 A3면건강보험심사평가원의 시·군·구별 ‘전문과목별 전문의 인원 현황’과 ‘표시과목별 의원 현황’에 따르면 전문의 수는 최근 5년(2009~2013년)
      사이에 1만명 넘게 증가했는데도 필수 진료과목 전문의를 다 갖추지 못한 지방자치단체는 오히려 4곳 늘었다. 필수 진료과목이란 ‘응급의료에 관한 법률 시행규칙’에서 응급의료기관에 당직 전문의를 반드시 두도록 한
      5개 진료과목을 말한다.경북 영양군은 내과를 제외한 모든 필수 진료과목에서 전문의가 한 명도 없었다. 강원 양양군은 산부인과 소아청소년과 마취통증의학과 등 3개 필수과목 전문의가 없다. 외과 전문의가 없는 지자체는
      경북 봉화군·울릉군 등 3곳이었고 마취통증의학과 전문의가 없는 곳도 강원 양구군, 충북 단양군 등 9곳에 달했다.소아청소년과 전문의를 찾을 수 없는 지자체는 충북 보은군·괴산군과 전북 진안군 등 14곳, 산부인과
      전문의가 없는 곳은 경북 고령군·의성군과 전남 구례군 등 12곳이었다.
    - “‘컴퓨터가 그리 좋으면 학교를 그만두라’는 엄마의 조언이 텀블러 설립의 발단이 됐다.”야후가 최근 인수한 마이크로 블로깅 사이트 ‘텀블러’ 창업자 데이비드 카프(사진)의 성공 요인을 두고 주요 외신들이 전한
      말이다. 여느 부모와 달리 컴퓨터에 빠져 살던 14세 소년이 자신이 원하는 일에 몰두할 수 있도록 과감하게 학교 중퇴를 권유한 엄마의 결정이 20대 억만장자 탄생의 밑거름이 됐다는 것이다.22일 뉴욕타임스 등에
      따르면 그는 2000년 뉴욕의 일류 공립학교인 브롱크스과학고에 다녔다. 당시 14세인 카프는 머리가 총명했지만, 내성적인 데다 하루 종일 컴퓨터에 빠져 살았다.그의 엄마 바버라 에이커먼은 “카프는 10대 소년이
      그렇듯 여자친구와 비디오 게임을 좋아했지만, 컴퓨터만큼 그를 매혹시키지는 못했다”며 “그의 열정을 살릴 공간이 필요했다”고 회고했다. 당시 사립학교의 과학교사였던 에이커먼은 아들이 학교를 중퇴하는 대신 홈스쿨을
      통해 학업을 계속하도록 했다. 이정선 기자 sunee@hankyung.com
  - source_sentence: 녹지 프리미엄 단지'라고 불리는 아파트에서 걸어서 갈 수 있는 역의 이름은?
    sentences:
    - 조환익 한국전력 사장(사진)이 서울 삼성동 한전 본사 건물을 매각하지 않겠다는 뜻을 내비쳤다. ‘선매각 후이전’이라는 정부의 공공기관 혁신도시 이전 방침과 거리가 있는 데다 삼성생명 KB금융 등이 이 부지를
      매입하기 위해 물밑 경쟁을 벌이는 상황이어서 파장이 예상된다. 조 사장은 29일 지식경제부 출입기자들과 만나 한전 본사 건물에 대해 “(지금으로서는) 매각할 생각이 없다”며 “일반매각보다는 향후 개발을 통해
      수익을 창출하는 방안을 정부와 협의하겠다”고 말했다. 한전은 내년 8월 전남 나주 혁신도시로 이전이 예정돼 있다. 정부 방침에 따르면 혁신도시로 본사를 옮기는 공공기관은 이전 전에 본사 건물을 매각해야 한다.
      서울 삼성동 한전 본사 부지는 7934㎡ 규모로 시가 3조원으로 추정된다. 서울 강남권에 위치한 사실상 마지막 금싸라기 땅이기 때문이다. 조 사장은 또 연내 전기요금 추가 인상 가능성에 대해 “단정적으로 이야기할
      수 없지만 현재로서는 전기요금을 추가로 인상할 생각이 없다”고 밝혔다. 전기요금 누진제 축소와 관련해서는 “누진제를 통해 마련한 재원으로 빈민들에게 싸게 전기를 공급하는 것은 좋다”면서도 “(일부 계층을 대상으로)
      과도한 요금을 책정하는 것은 문제가 있다고 본다”고 설명했다.
    - LG생활건강의 한방 화장품 브랜드 ‘후’는 지난달 말 모델 이영애 씨와 11년 연속으로 계약을 갱신했다. 후가 연매출 약 4300억원(지난해 기준)의 대형 브랜드로 성장하기까지 중화권 한류스타인 이씨의 공로가
      컸다는 이유에서다. 후의 대표 제품인 ‘비첩자생 에센스’가 ‘이영애 에센스’라는 별칭으로 불릴 정도로 양측은 끈끈한 관계를 이어오고 있다.빠르게 변하는 유행만큼 모델도 자주 바뀌는 화장품업계에서 10년 이상
      장수하는 ‘대기록’을 쓴 연예인이 속속 등장하고 있다.이씨 못지않은 장수모델로 10년째 SK-Ⅱ 모델로 활동 중인 김희애 씨가 대표적이다. “놓치지 않을 거예요”라는 김씨의 광고문구는 SK-Ⅱ의 상징이 됐다.
      회사 측은 “SK-Ⅱ와 김씨는 이제 브랜드와 모델의 관계를 넘어 ‘가족’이라고 표현해야 할 정도”라고 했다. 국내 화장품 광고 역사상 최장수 광고모델은 채시라 씨로 알려졌다. 1991년부터 2006년까지 15년
      동안 코리아나 모델로 활동했다.화장품 광고에 자주 등장하는 전지현 이나영 송혜교 등은 ‘특A급 모델’임은 분명하지만 브랜드를 여러 차례 갈아탔다. 전씨는 에뛰드 라네즈 한율 일리 헤라, 이씨는 라네즈 아이오페
      랑콤 숨, 송씨는 에뛰드 이니스프리 라네즈 등 다양한 브랜드의 모델로 활동했다.김태희 씨는 2004년 LG생활건강 오휘 모델로 활동하다가 2006년 아모레퍼시픽 헤라로 바꾸고, 2011년 다시 오휘로 복귀한
      독특한 사례다. 이 과정에서 아모레퍼시픽과 LG생활건강이 거액의 모델료를 제시하며 치열한 ‘김태희 쟁탈전’을 벌이기도 했다.화장품업계 관계자는 “화장품 브랜드가 많아지면서 모델 계약을 할 연예인이 ‘동이 났다’는
      얘기가 나온 지 오래”라며 “1년 안팎의 단발계약이 대부분이라 한 브랜드에서 장수모델로 활동하는 것은 대단히 어려운 일”이라고 말했다.
    - 경기 용인시는 성남 분당신도시와 가까운 지리적 이점 덕분에 2000년대 중반 ‘버블세븐’으로 불리며 수도권 주택시장을 주도했지만 과잉공급과 2008년 금융위기 여파로 미분양이 급증하면서 ‘불 꺼진 집’이 속출했다.
      수도권 내 대표적인 미분양 지역으로 꼽혔다.그랬던 용인 지역 분위기가 달라졌다. 수도권 전세난으로 매매 전환 수요가 늘면서 지난해 1만9055가구의 아파트가 거래돼 수원시(2만280가구)에 이어 수도권 아파트
      거래량 2위에 올랐다. 청약 열기도 달아올라 지난주 분양한 풍덕천동 ‘e편한세상 수지’는 평균 8.29 대 1로 1순위에서 마감됐다.용인에서 최근 가장 주목받고 있는 곳은 처인구 역북지구다. 용인시청과 용인교육청,
      용인동부경찰서 등이 입주한 용인행정타운과 가깝고 인근 역삼지구와 함께 1만여가구 대규모 주거단지로 개발되고 있다. 수지와 동백에 이어 용인을 대표하는 신흥 주거지로 떠오른 역북지구에서 우미건설이 이달 1260가구
      규모의 ‘우미린 센트럴파크’를 분양한다.○녹지율 40%의 1260가구 대단지처인구에서 가장 높은 34층 아파트로 1260가구 모두 전용 59·75·84㎡ 중소형으로 구성됐다. 모든 가구를 남향 위주로 설계했고
      건폐율(대지 면적 대비 건물 바닥 면적 비율)이 12.8%에 불과해 녹지율이 40%에 달한다. 근린공원 어린이공원과 맞닿아 있고 함박산도 끼고 있어 ‘녹지 프리미엄 단지’로 평가받는다.역북지구는 용인 시내는
      물론 서울로의 이동이 쉽다. 걸어서 갈 수 있는 용인 경전철 명지대역을 이용해 분당선 기흥역에서 환승하면 서울 강남권까지 약 50분이면 도착할 수 있다. 2017년 개통 예정인 국도 42호선 대체 우회도로(수원신갈IC
      방면)를 이용하면 경부고속도로 기흥IC와 수원IC까지 거리도 12㎞ 정도로 줄어든다. 단지 바로 옆에 이마트가 문을 열고 초등학교가 들어설 예정이다. 용신중학교와 용인고등학교도 가깝다.○중소 평형 ‘혁신 설계’
      도입중소형 특화 설계도 눈에 띈다. 모든 가구 주방을 주부의 동선을 최소화하는 ‘ㄷ’자 형태로 배치했다. 전용 59㎡(A타입)에는 3개 침실에 모두 수납공간을 설치한다. 전용 75㎡에는 현관 옆에 입구를 높인
      ‘워크인 수납공간’을 제공한다. 전용 84㎡ 일부 타입에는 주방 대형 수납공간이나 작업공간으로 활용할 수 있는 대형 주방을 들여 공간 활용도를 높였다. 일부 가구엔 레저용품 등을 보관할 수 있는 지하 창고도
      제공한다. 안전하게 택배를 발송·수령할 수 있는 무인택배시스템도 갖출 계획이다.방문한 친인척 등이 머무르거나 기념일 파티공간으로 이용할 수 있는 게스트하우스를 설치한다. 입주자 휴식공간인 ‘카페 린’도 마련한다.
      어린 자녀들이 통학버스를 안전하게 기다릴 수 있도록 스쿨버스존을 설치하고 남녀 구분이 있는 독서실도 문을 연다. 실내골프연습장과 피트니스센터, 샤워실 등 커뮤니티시설도 마련한다. 모델하우스는 용인시 역삼동 주민센터
      옆에 문을 연다. 김보형 기자/김하나 한경닷컴 기자 kph21c@hankyung.com
  - source_sentence: 후속 공정에서 추가 비용 발생이 예상되는 설비를 주문한 나라는?
    sentences:
    - 삼성중공업이 지난 1분기에 대규모 적자를 냈다. 해양플랜트 프로젝트의 잠재적 손실에 대비해 대규모 충당금을 쌓았기 때문이다. ▶본지 4월23일자 A13면 참조 삼성중공업은 1분기에 매출 3조4311억원, 영업손실
      3625억원, 당기순손실 2724억원을 기록했다고 25일 공시했다. 작년 1분기에 4402억원의 영업이익과 3005억원의 당기순이익을 냈던 것과 비교하면 큰 폭으로 적자전환했다. 매출은 전년 동기 대비 11.7%
      감소했을 뿐인데도 이익이 크게 줄어든 이유는 해양플랜트 프로젝트 손실에 대비해 약 5000억원의 충당금을 쌓았기 때문이라고 회사 측은 설명했다. 앞서 지난 2월부터 삼성중공업의 해양플랜트 프로젝트와 관련해 경영진단을
      진행한 삼성그룹 컨트롤타워인 미래전략실은 대규모 부실이 있다고 판단하고 충당금을 쌓도록 했다. 삼성중공업 관계자는 “2012년에 수주한 호주 인펙스프로젝트의 익시스(Ichthys) 해양가스처리설비(CPF)와
      지난해 수주한 나이지리아 에지나(Egina) 부유식 생산저장하역설비(FPSO) 등 2건의 해양플랜트 공사에서 손실이 예상된다”고 말했다. 그는 “인펙스프로젝트의 CPF는 상세설계 등 후속 공정에서 사양이 바뀌면서
      작업 물량과 비용이 증가했으며, FPSO는 나이지리아 현지에서 생산 비용이 늘어날 것으로 보인다”고 덧붙였다. 삼성중공업은 2건의 해양플랜트 프로젝트 외에 다른 프로젝트는 정상적으로 진행되고 있다고 밝혔다.
      회사 관계자는 “예상 손실을 1분기에 반영한 만큼 2분기부터는 경영 실적이 정상 수준으로 회복할 것”이라고 내다봤다.삼성중공업은 이날 실적전망 공시를 통해 올해 매출이 14조6000억원, 법인세 비용 차감 전
      순이익이 2000억원 정도일 것이라고 밝혔다.
    - 차입금 갚기가 벅찬 한계기업 가운데 대기업이 늘면서 부실위험을 ‘대형화’하고 있다는 경고가 나왔다. 대기업 부실이 현실로 닥칠 경우 전체 자금시장의 불안으로 번질 수 있다는 우려다. LG경제연구원은 3일 ‘부실위험
      기업의 대형화가 금융회사 건전성을 떨어뜨리고 있다’는 제목의 보고서에서 국내 금융회사의 부실자산 규모가 올 들어 지난 9월 말까지 6조8000억원 늘어난 39조8000억원에 달했다며 이같이 분석했다. 이한득
      연구위원은 “올 들어 증가한 부실자산은 대부분 은행에서 발생했는데 대기업 대출이 특히 문제가 됐다”고 설명했다. 은행 부문의 경우 대기업의 부실채권 증가폭은 올 들어 9월까지 8조5000억원에 달해 지난해 같은
      기간의 3조2000억원을 훨씬 웃돌았다. 같은 기간 중소기업의 부실채권 증가폭은 10조4000억원으로 전년 동기와 동일했다. 보고서는 올 들어 대기업의 부실 정도가 커지고 있다며 중소기업은 글로벌 금융위기 당시
      구조조정이 상당히 진행된 반면 대기업은 최근에야 부실이 현실화되기 시작했기 때문이라고 분석했다. 이자보상배율 1을 밑돌아 영업이익으로 이자도 갚지 못하는 한계기업을 살펴봐도 대형화 추세가 두드러졌다. 전체 상장기업의
      차입금 가운데 한계기업 차입금이 차지하는 비중은 2005년 13.3%에서 올해 상반기 34.0%로 확대됐다. 한계기업의 평균 차입금이 같은 기간 1270억원에서 6799억원으로 5.4배 뛴 데 따른 것이다.
      한계기업의 차입금 가운데 대기업이 차지하는 비중이 93.2%에서 99.1%까지 치솟으면서 개별 부실의 덩치 자체가 커졌다. 이 연구위원은 “상장사 가운데 한계기업의 차입금은 대부분 대기업이 갖고 있는 셈”이라며
      “1개 대기업의 부실은 25개 중소기업의 부실과 비슷할 정도로 시장에 미치는 영향이 크다는 게 문제”라고 우려했다.보고서는 위험을 최소화하려면 선제적인 구조조정이 해답이라며 부실 가능성이 높은 기업을 선별해
      추가적인 자금 공급을 억제해야 부실 확산을 막을 수 있다고 지적했다.
    - "1967년 제3차 중동 전쟁에서 이스라엘의 압도적인 승리에 이어 아랍 단체들의 다수는 영토를 회복하고 다른 목적들을 추진하는 데 전통적인 각 주 간의 교전 상태로 양자 택일들을 찾고 있었다. 이스라엘은 되풀이적으로\
      \ 팔레스타인의 피다인 게릴라들에 의하여 국경을 건너는 공격들에 의하여 타격되었다.\n\n1970년 9월 1일 국왕을 암살하는 데 몇몇의 시도들이 실패하였다. 9월 6일 팔레스타인 해방대중전선의 납치 사건들의\
      \ 연속들에서 3대의 항공기가 그들에 의하여 납치되었는 데 자르카에 상륙한 스위스 항공과 TWA 항공, 그리고 카이로에 상륙한 팬아메리칸 항공이었다. 9월 9일 당시 바레인으로부터 영국해외항공 항공기도 또한\
      \ 자르카로 납치되었다. 전부의 인질들이 옮겨진 후, 항공기들은 지시적으로 텔레비전 카메라들 앞에 폭발되었다. 국왕을 직접 맞서 화나게 한 반란자들은 이르비드 지역을 \"해방된 지방\"으로 선언하였다.\n\n\
      9월 16일 후세인 국왕은 계엄령을 선포하였다. 이어진 날 요르단의 탱크들은 암만에 있는 팔레스타인의 기구들의 본부들을 공격하였고, 육군은 또한 자르카, 이르비드, 살트와 스웨일레에 있는 진영들을 공격하기도\
      \ 하였다.\n\n1970년 9월은 검은 9월로 알려졌으며 어쩌다 \"후외적인 사건들의 시기\"로서 언급되었다. 그 일은 34세의 군주가 성공적으로 자신의 왕정을 타도하는 시도들을 진압한 한해였다. 폭력은 양쪽으로부터\
      \ 7천에서 8천의 사망에 결과를 가져왔다. 무장한 분쟁은 팔레스타인 해방 기구와 수천명의 팔레스타인인들을 레바논으로 배제와 함께 1971년 7월까지 지속되었다. \n\n결과로서 후세인이 조국에서 인기를 유지하였어도\
      \ 아랍 세계는 10년간 세월의 나머지를 통하여 그를 크게 고립시켰다. 1974년 아랍 지도자들은 팔레스타인 해방 기구를 \"팔레스타인 국민의 단 하나의 합법적인 대표\"로 선언하여 요르단강 서안 지구의 팔레스타인인들을\
      \ 위한 연설자로서 후세인의 역할을 가져갔다.\n\n지미 카터 미국 대통령, 안와르 사다트 이집트 대통령과 메나헴 베긴 이스라엘 총리 사이의 1978년 캠프데이비드 협정은 요르단의 후세인 국왕을 들어오지 못하게\
      \ 하였다. 이어진 해 후세인 국왕은 유엔 총회 연설에서 협정을 비난하였다. 이 입장은 그와 조국이 필요하던 다른 아랍 지도자들과 우호를 재설립하는 도움을 주었다. \n\n 후세인은 팔레스타인 해방 기구의 지도자\
      \ 야세르 아라파트와 화해에서 전혀 성공적이지 않았고, 결국 1988년 요르단강 서안 지구의 행정적과 법적의 통치로 요르단의 주장을 포기하였다."
