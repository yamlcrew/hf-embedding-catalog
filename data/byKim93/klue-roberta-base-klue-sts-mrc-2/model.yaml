    - 퇴거 위기에 처한 아동주거빈곤가구를 지원하기 위해 긴급임시주택 사업이 시작된다. 초록우산어린이재단(회장 이제훈), 홈앤쇼핑(대표이사 김옥찬), 구로구청(구청장 이성), 서울주택도시공사(이하 ‘SH공사’, 사장
