widgetData:
- source_sentence: How do the Connection Conditions and Compliance Processes relate to a Generator's System and what role
    does a Control Engineer play in this context?
  sentences:
  - The Connection Conditions specify the minimum technical, design, and operational criteria that must be complied with by
    NGET at Connection Sites and by Users connected to or seeking connection with the National Electricity Transmission System,
    including Generators. The Compliance Processes outline the steps that NGET and any Generator or DC Converter Station owner
    must follow to demonstrate compliance with the Grid Code concerning their Plant and Apparatus. In this context, a Control
    Engineer is a person nominated by the relevant party for the control of its Plant and Apparatus, ensuring adherence to
    these conditions and processes.
  - The European Commission plays a role in the context of the Grid Code by imposing legally binding decisions that the licensee
    must comply with, as part of the obligations under the Electricity Regulation.
  - The Electricity Act 1989 allows parties who are required to comply (or are exempt from complying) with its provisions
    to reproduce the Grid Code publication to undertake their licence or statutory duties within Great Britain.
- source_sentence: What is the notification level for Customer Demand Management in England and Wales, and how does it relate
    to the E&W Offshore Transmission System?
  sentences:
  - The Transmission Licence is integral to the Balancing Mechanism as it defines the processes and conditions under which
    the National Grid Electricity Transmission (NGET) operates. The Balancing Mechanism, as specified in NGET's Transmission
    Licence, is a critical component of the Grid Code that ensures the balance between electricity supply and demand. This
    mechanism is supported by the Balancing Principles Statement, which is prepared in accordance with Condition C16 of the
    Transmission Licence. The operations at the Transmission Control Centre are crucial for implementing the Balancing Mechanism,
    as control calls originating from or destined to the control desk at the Transmission Control Centre have priority to
    manage real-time electricity demand and supply. This setup ensures adherence to electricity demand management rules and
    grid code regulations across transmission systems in the UK.
  - A BM Participant is a person responsible for and controls one or more BM Units, or where a Bilateral Agreement specifies
    that a User is required to be treated as a BM Participant for the purposes of the Grid Code. This does not imply that
    they must be active in the Balancing Mechanism. In contrast, De-Synchronising an importing BM Unit refers to the act of
    ceasing to consume electricity at an importing BM Unit, which involves taking a Generating Unit, Power Park Module, or
    DC Converter off a System to which it has been Synchronised by opening any connecting circuit breaker.
  - The notification level for Customer Demand Management in England and Wales is 12 MW. This is relevant to the E&W Offshore
    Transmission System as it forms part of the overall E&W Transmission System, which includes NGET’s Transmission System
    and any E&W Offshore Transmission Systems. Compliance with these notification levels is crucial for managing electricity
    demand and ensuring adherence to grid code regulations across transmission systems in the UK.
- source_sentence: where dc converter station control point be at?
  sentences:
  - The Authority-Led Modification Report has the meaning given in GR.17.4. An Authority-Led Modification is a Grid Code Modification
    Proposal in respect of a Significant Code Review, raised by the Authority pursuant to GR.17. The relationship between
    the two is that the Authority-Led Modification Report is defined within the context of GR.17.4, which is part of the broader
    framework of Authority-Led Modifications as outlined in GR.17.
  - The National Electricity Transmission System is the network that connects the User’s Connection Site to the rest of the
    electricity grid, ensuring the flow of Active Power while accounting for system losses or third-party system effects.
  - In the case of a DC Converter Station, the Control Point will be at a location agreed with NGET.
- source_sentence: Cud yu pleese explane wot GR.26.7 meens in the context of energy compliance?
  sentences:
  - A BM Participant is responsible for controlling one or more BM Units, which can include those at power stations with Black
    Start Capability. These power stations are registered through a Bilateral Agreement with a User, as having the ability
    to start up from shutdown and energize a part of the system without an external power supply, upon instruction from NGET.
    The CUSC agreements, which include the CUSC Framework Agreement and Bilateral Agreements, are part of the contractual
    framework that governs the relationships and responsibilities of parties involved in the transmission system, including
    BM Participants. These agreements ensure that BM Participants adhere to the rules and regulations set out in the Grid
    Code, facilitating the coordination and control necessary for maintaining system stability and compliance.
  - GR.26.7 refers to the meaning of an Approved Fast Track Proposal, provided that no objection is received pursuant to GR.26.12.
  - The Authority is involved in revising standards from time to time with its approval, as mentioned in the context of dynamic
    parameters and transmission systems. Additionally, the Authority grants the right for unaccompanied access to sites containing
    exposed HV conductors, as indicated by the term 'Authority for Access'.
- source_sentence: How BM Unit Data is used in the Balancing Code and what dynamic parameters are listed under BM Unit Data?
  sentences:
  - A Power Park Module serves as a common collection busbar to which the higher voltage side of two or more Power Park Unit
    generator transformers are connected. This setup is crucial for the functional operation of the Power Park Module, as
    it includes auxiliaries that are necessary for its operation but are not directly part of the generating unit. Compliance
    processes, as identified in the Grid Code, ensure that these connections and operations adhere to the necessary standards
    and regulations.
  - A Bilateral Agreement specifies that a User is required to be treated as a BM Participant for the purposes of the Grid
    Code. This does not imply that they must be active in the Balancing Mechanism.
  - BM Unit Data is used in the Balancing Code, which is split into three sections dealing with the submission of BM Unit
    Data from BM Participants and other information for the following day and ahead of Gate Closure (BC1), the post Gate Closure
    process (BC2), and the procedures and requirements in relation to System Frequency control (BC3). The dynamic parameters
    listed under BM Unit Data are those parameters listed in Appendix 1 to BC1 under the heading BM Unit Data – Dynamic Parameters.
