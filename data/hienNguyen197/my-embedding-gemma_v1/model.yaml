widgetData:
- source_sentence: Theo Chỉ thị 228, những ai được cử làm trưởng ban chỉ đạo bầu cử Trung ương, miền Bắc và miền Nam?
  sentences:
  - Chỉ thị 228 nhấn mạnh tầm quan trọng của việc tổ chức bầu cử công bằng.
  - Theo quy định năm 1728, những tiêu chuẩn nào áp dụng cho việc tuyển chọn dân thường vào đội lính Tứ trấn?
  - Chỉ thị 228 quy định ai sẽ giữ chức vụ trưởng ban chỉ đạo bầu cử ở Trung ương, miền Bắc và miền Nam?
- source_sentence: Cuộc khủng hoảng kinh tế và sự vô sản hóa của phong trào dân tộc trong giai đoạn 1919-1930 đã tác động
    như thế nào đến sự khác biệt và thái độ chính trị của các giai cấp, tầng lớp nhân dân Việt Nam?
  sentences:
  - Tình hình kinh tế Việt Nam dưới thời Pháp thuộc trong giai đoạn 1919-1930 có những đặc điểm gì nổi bật?
  - Giai đoạn 1919-1930, khủng hoảng kinh tế và quá trình vô sản hóa trong phong trào dân tộc đã ảnh hưởng ra sao đến sự phân
    hóa và lập trường chính trị của các tầng lớp xã hội Việt Nam?
  - Số lượng công nhân tại Xưởng Thống Nhất là bao nhiêu và mỗi tháng họ sản xuất những loại vũ khí nào?
- source_sentence: Đại hội đại biểu toàn quốc lần thứ VI của Đảng Cộng sản Việt Nam đã chỉ ra những sai lầm, khuyết điểm chính
    nào của Đảng và Nhà nước trong giai đoạn 1976-1980?
  sentences:
  - Đại hội đại biểu toàn quốc lần thứ VI của Đảng Cộng sản Việt Nam đã chỉ ra những sai lầm, khuyết điểm chính của Đảng và
    Nhà nước trong giai đoạn 1976-1980 là gì?
  - Đại hội đại biểu toàn quốc lần thứ VI của Đảng Cộng sản Việt Nam đã đề ra những thành tựu và định hướng phát triển nào
    cho đất nước?
  - Việc điều chỉnh sổ đinh theo các hình thức khác nhau ở các tỉnh miền núi phía Bắc như Lạng Sơn, Cao Bằng, Thái Nguyên,
    Hưng Hóa, Tuyên Quang dưới triều Minh Mệnh (1840) phản ánh điều gì về chính sách cai trị của triều đình đối với các dân
    tộc thiểu số?
- source_sentence: Những nước xã hội chủ nghĩa đã thành lập liên minh nào vào tháng 5-1955 và liên minh này đã vượt qua những
    thách thức nào?
  sentences:
  - Vào tháng 5 năm 1955, các quốc gia xã hội chủ nghĩa đã lập nên liên minh gì và liên minh đó đã đối mặt với những khó khăn
    ra sao?
  - Năm 1947, Khu X đã đào tạo bao nhiêu giáo viên và có bao nhiêu người tham gia các lớp bình dân, cùng với sự so sánh với
    năm liền kề trước đó?
  - Các nước xã hội chủ nghĩa đã đối mặt với những vấn đề kinh tế nội bộ nào trong thời kỳ Chiến tranh Lạnh?
- source_sentence: Quân đội đầu triều Lê được chia thành những loại hình đơn vị chính nào?
  sentences:
  - Đầu triều đại nhà Lê, binh chế được tổ chức thành các loại đơn vị nào?
  - Chính sách tuyển quân của nhà Lê tập trung vào những đối tượng nào?
  - Thông báo số 22 - TB/TW ban hành ngày 21-10-1980 đã đề cập đến những điểm cấp bách nào về phương thức quản lý hợp tác
    xã?
