- source_sentence: What are the conditions that must be met for the appointment of a depositary established in a third country
    for non-EU AIFs?
  sentences:
  - '(a)


    for EU AIFs, in the home Member State of the AIF;


    (b)


    for non-EU AIFs, in the third country where the AIF is established or in the home Member State of the AIFM managing the
    AIF or in the Member State of reference of the AIFM managing the AIF.


    6.


    Without prejudice to the requirements set out in paragraph 3, the appointment of a depositary established in a third country
    shall, at all times, be subject to the following conditions:


    (a)'
  - '(c)


    the financial soundness of the proposed acquirer, in particular in relation to the type of business pursued and envisaged
    in the investment firm in which the acquisition is proposed;


    (d)


    whether the investment firm will be able to comply and continue to comply with the prudential requirements based on this
    Directive and, where applicable, other Directives, in particular Directives 2002/87/EC and 2013/36/EU, in particular,
    whether the group of which it will become a part has a structure that makes it possible to exercise effective supervision,
    effectively exchange information among the competent authorities and determine the allocation of responsibilities among
    the competent authorities;


    (e)'
  - '(f)


    the undertaking shall describe the expected decarbonisation levers and their overall quantitative contributions to achieve
    the GHG emission reduction targets (e.g., energy or material efficiency and consumption reduction, fuel switching, use
    of renewable energy , phase out or substitution of product and process).


    Disclosure Requirement E1-5 – Energy consumption and mix


    The undertaking shall provide information on its energy consumption and mix.


    The objective of this Disclosure Requirement is to provide an understanding of the undertaking’s total energy consumption
    in absolute value, improvement in energy efficiency, exposure to coal, oil and gas-related activities, and the share of
    renewable energy in its overall energy mix.'
