    The undertaking shall disclose the pollutants that it emits through its own operations, as well as the microplastics it
    generates or uses.


    The objective of this Disclosure Requirement is to provide an understanding of the emissions that the undertaking generates
    to air, water and soil in its own operations, and of its generation and use of microplastics.


    The undertaking shall disclose the amounts of:


    (a)'
  - 'Families of substances or mixtures or specific substances, such as water, air, acids, bases, oxidising agents, with which
    the substance or mixture could react to produce a hazardous situation (like an explosion, a release of toxic or flammable
    materials, or a liberation of excessive heat), shall be listed and if appropriate a brief description of measures to be
    taken to manage risks associated with such hazards shall be given.


    10.6. Hazardous decomposition products


    Known and reasonably anticipated hazardous decomposition products produced as a result of use, storage, spill and heating
    shall be listed. Hazardous combustion products shall be included in section 5 of the safety data sheet.


    11. SECTION 11: Toxicological information'
  - '4. In order for a district heating and cooling system to qualify as efficient, Member States shall ensure that where
