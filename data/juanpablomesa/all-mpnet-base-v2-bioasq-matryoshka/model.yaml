widgetData:
- source_sentence: 'Extensive messenger RNA editing generates transcript and protein diversity in genes involved in neural
    excitability, as previously described, as well as in genes participating in a broad range of other cellular functions. '
  sentences:
  - Do cephalopods use RNA editing less frequently than other species?
  - GV1001 vaccine targets which enzyme?
  - Which event results in the acetylation of S6K1?
- source_sentence: Yes, exposure to household furry pets influences the gut microbiota of infants.
  sentences:
  - Can pets affect infant microbiomed?
  - What is the mode of action of Thiazovivin?
  - What are the effects of CAMK4 inhibition?
- source_sentence: "In children with heart failure evidence of the effect of enalapril is empirical. Enalapril was clinically\
    \ safe and effective in 50% to 80% of for children with cardiac failure secondary to congenital heart malformations before\
    \ and after cardiac surgery,  impaired ventricular function , valvar regurgitation,  congestive cardiomyopathy,  , arterial\
    \ hypertension, life-threatening arrhythmias coexisting with circulatory insufficiency.   \nACE inhibitors have shown\
    \ a transient beneficial effect on heart failure due to anticancer drugs and possibly a beneficial effect in muscular\
    \ dystrophy-associated cardiomyopathy, which deserves further studies."
  sentences:
  - Which receptors can be evaluated with the [18F]altanserin?
  - In what proportion of children with heart failure has Enalapril been shown to be safe and effective?
  - Which major signaling pathways are regulated by RIP1?
- source_sentence: Cellular senescence-associated heterochromatic foci (SAHFS) are a novel type of chromatin condensation
    involving alterations of linker histone H1 and linker DNA-binding proteins. SAHFS can be formed by a variety of cell types,
    but their mechanism of action remains unclear.
  sentences:
  - What is the relationship between the X chromosome and a  neutrophil drumstick?
  - Which microRNAs are involved in exercise adaptation?
  - How are SAHFS created?
- source_sentence: Multicluster Pcdh diversity is required for mouse olfactory neural circuit assembly. The vertebrate clustered
    protocadherin (Pcdh) cell surface proteins are encoded by three closely linked gene clusters (Pcdhα, Pcdhβ, and Pcdhγ).
    Although deletion of individual Pcdh clusters had subtle phenotypic consequences, the loss of all three clusters (tricluster
    deletion) led to a severe axonal arborization defect and loss of self-avoidance.
  sentences:
  - What are the effects of the deletion of all three Pcdh clusters (tricluster deletion) in mice?
  - what is the role of MEF-2 in cardiomyocyte differentiation?
  - How many periods of regulatory innovation led to the evolution of vertebrates?
