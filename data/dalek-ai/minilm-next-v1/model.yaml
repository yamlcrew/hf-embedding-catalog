- source_sentence: "I am the IT manager at Acme Corp, looking to streamline our monthly sales report generation and distribution\
    \ process for April 2023. We have a comprehensive sales database identified as \"sales_db_01,\" which records crucial\
    \ data including transaction dates, product IDs, quantities sold, and sales figures. \n\nOur goal is to produce a detailed\
    \ report in PDF format that captures total sales, top-performing products, and sales trends by comparing them with the\
    \ previous month's figures. This report should then be disseminated to our dynamic sales team and key stakeholders' list,\
    \ which is maintained in our internal contact management system under the group \"sales_team.\"\n\nTo execute this task,\
    \ I'd like to request the call of the following functions:\n1. Generate the sales report from \"sales_db_01\" for the\
    \ month of April 2023 in a PDF format.\n2. Retrieve the current contact list from our internal contact management system\
    \ for the group \"sales_team.\"\n3. Distribute the generated report to the retrieved contacts with an accompanying message\
    \ detailing the enclosed monthly sales report for April 2023.\n\nCould you assist me with calling the necessary functions\
    \ to complete this automated report generation and distribution task?"
  sentences:
  - Retrieve the acceleration information of a vehicle
  - Retrieves a list of contacts from the internal contact management system based on the specified group.
  - Assess sales trends over a specified time period from POS sales data.
- source_sentence: I'm planning to take farming loans for my fields in Kansas and Texas. The crops are corn and soybean respectively.
    The loan amount I'm looking at is around $80,000 for each field. Also, could you get me details on agriculture loans from
    Bank of America in the USA?
  sentences:
  - Calculate the water requirement for a specific crop
  - Get the details of an user, including their reservations.
  - Retrieve information on agricultural loans
- source_sentence: I need information on private equity firms in New York, focusing on the technology industry. Also, can
    you get details on a couple of private equity deals involving companies named "TechSoft" and "Digittal", deals are sized
    500 and 700 million in the USA. Lastly, I need more information on a private equity firm named "CapitalGrow".
  sentences:
  - Monitors the energy distribution across different sectors in real-time for a specified time range.
  - Retrieve information about a private equity deal
  - Analyze stock market data for a given company
