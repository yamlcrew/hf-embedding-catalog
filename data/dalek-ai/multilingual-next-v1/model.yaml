    how and where to return the item.
  - Allows users to donate money for animal welfare
- source_sentence: 'As the manager of our renewable energy facilities, I need to update our Renewable Energy Certificate (REC)
    system with the latest activities. We recently generated 500 MWh of energy from our solar farm identified as "SF123",
    on April 15, 2023. I request to register this new production under our RECs. Additionally, we need to retire an existing
    REC with the ID "REC456". Furthermore, we have sold 350 MWh of energy and need to transfer the ownership of the associated
    REC "REC789" to the new owner identified as "O12345". Lastly, I require a compliance report for our plant’s owner ID "O67890"
    for the period starting January 1, 2023, to March 31, 2023.


    To accomplish these tasks, please execute the following function calls with the provided details:

    1. Register the new production of 500 MWh for solar farm "SF123" on the date April 15, 2023,

    2. Update the status of REC ID "REC456" to ''retired'',

    3. Transfer the ownership of REC ID "REC789" to the new owner with ID "O12345",

    4. Generate a compliance report for owner ID "O67890" for the first quarter of the year 2023.'
  sentences:
  - Get the details of an user, including their reservations.
  - Registers a new Renewable Energy Certificate for a given energy production source and date.
  - Generates a compliance report for Renewable Energy Certificates over a specified period.
- source_sentence: I need to check on the status of the switches in my home automation system and also want to review the
