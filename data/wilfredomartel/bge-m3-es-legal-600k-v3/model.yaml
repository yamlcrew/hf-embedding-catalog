      un monto superior. Por lo tanto, el planteamiento de constitucionalidad subsistente carecía de la trascendencia necesaria
      para la procedencia del recurso.
    - Mediante la Resolución No. 001-MTOP-SUBZ6-DPJ-18, emitida el 26 de marzo de 2018, el Subsecretario Zonal 6 del Ministerio
      de Transporte y Obras Públicas (MTOP) aprobó la disolución y liquidación voluntaria de la personalidad jurídica de la
      Asociación de Conservación Vial “El Cabo”. Esta asociación tenía su domicilio en la Parroquia El Cabo, Cantón Paute,
      Provincia del Azuay. La resolución se basó en la solicitud presentada por el presidente de la asociación y en el informe
      favorable de la Unidad de Asesoría Jurídica Zonal del MTOP. La aprobación de la disolución y liquidación surte efectos
      jurídicos y se rige por las disposiciones del Código Civil, el Reglamento para el Otorgamiento de Personalidad Jurídica
      a las Organizaciones Sociales y demás normativa aplicable.
  - source_sentence: ¿Es procedente la acción extraordinaria de protección contra un auto de nulidad dictado por una Sala
      de Corte Provincial, aun cuando este no ponga fin al proceso principal, si se alega grave vulneración al debido proceso
      y la prohibición de doble juzgamiento?
    sentences:
    - La Sala de Admisión de la Corte Constitucional, conformada por las juezas Alejandra Cárdenas Reyes, Carmen Corral Ponce
      y Daniela Salazar Marín, decidió ADMITIR a trámite la acción extraordinaria de protección 963-23-EP. Como medida para
      garantizar el debido proceso y en aplicación de los principios de dirección del proceso, formalidad condicionada, celeridad
      y concentración, se dispuso que los jueces de la Sala Especializada de lo Penal, Penal Militar, Penal Policial, Tránsito,
      Corrupción y Crimen Organizado de la Corte Nacional de Justicia presenten un informe de descargo ante la Corte Constitucional
      en el término de diez días, contados a partir de la notificación del auto. Esta decisión se fundamenta en la relevancia
      constitucional de la alegada violación grave de derechos, específicamente en la negativa de la suspensión condicional
      de la pena sobre una base no prevista por el COIP.
    - Sí, es procedente la acción extraordinaria de protección contra un auto de nulidad dictado por una Sala de Corte Provincial,
      incluso si este no pone fin al proceso principal, siempre que se demuestre una grave y evitable vulneración de derechos
      fundamentales. El artículo 437, numeral 1 de la Constitución de la República del Ecuador (CRE) permite esta acción contra
      autos firmes o ejecutoriados que vulneren derechos, sin necesidad de agotar todos los recursos ordinarios si estos son
      ineficaces o inadecuados. En el caso expuesto, la declaratoria de nulidad del auto de sobreseimiento, que implicaría
      volver a juzgar al accionante, vulneraría la garantía del Non Bis In Ídem (Art. 76, numeral 7, literal 'i' de la CRE)
      y el principio de non reformatio in peius (Art. 77.14 de la CRE), configurando una grave afectación al debido proceso
      que justifica la intervención de la Corte Constitucional.
    - El árbitro se declaró competente para resolver la controversia basándose en el principio de "Kompetenz-Kompetenz", analizando
      la cláusula décima segunda sobre controversias contenida en el contrato de arrendamiento de 15 de marzo de 2018. Este
      principio permite al propio tribunal arbitral determinar su competencia. La decisión se fundamentó en el acuerdo de
      las partes y el reglamento del centro de arbitraje, asegurando que todo lo actuado se ciñera a los preceptos constitucionales
      sobre el debido proceso. La cláusula arbitral fue considerada separable y autónoma, lo que permitió al árbitro desestimar
      las excepciones previas de la demandada relativas a la supuesta incompetencia del tribunal, el error en la forma de
      proposición de la demanda, y la falta de requisitos legales. La cuantía de la demanda se estableció en US$ 20.000,00.
  - source_sentence: ¿De qué manera la Sala de lo Civil de la Corte Provincial de El Oro, en la sentencia del 12 de marzo
      de 2021 dentro del proceso 07571-2020-01605, incurrió en falta de motivación al no notificar el informe final del sumario
      administrativo al accionante?
    sentences:
    - Los docentes Diego Vinicio Orellana Villavicencio y Julio César Cuenca Tinitana, tras ganar un concurso de méritos y
      oposición convocado por la CIFI-UNL y obtener sus acciones de personal y actas de posesión, tienen derecho a ser reintegrados
      a sus cargos de Docentes Titulares Auxiliares 1. La Sala de lo Civil y Mercantil de la Corte Provincial de Justicia
      de Loja confirmó la sentencia de primera instancia, ordenando a la UNL activar a los accionantes en el sistema SPRYN
      y reintegrarlos a sus puestos. Se establece que la UNL debe cancelarles todas las remuneraciones dejadas de percibir
      y los beneficios de ley desde la fecha de vulneración de sus derechos, especificando los puntos de inicio para el cálculo
      de estas remuneraciones. La sentencia se fundamenta en la vulneración del derecho al debido proceso en la garantía de
      motivación, al derecho a la igualdad material y no discriminación, al derecho al trabajo, y a la seguridad jurídica.
      Se cita la jurisprudencia de la Corte Constitucional sobre la motivación de los actos públicos, el principio de igualdad
      formal y material, y la protección del derecho al trabajo y la estabilidad laboral. La Corte Provincial enfatiza que
      los conflictos internos entre la UNL y la CIFI-UNL no pueden trasladarse a los administrados, protegiendo la confianza
      legítima y la buena fe.
    - La acción extraordinaria de protección argumenta que el laudo arbitral de mayoría incurrió en contradicciones y una
      motivación arbitraria al resolver sobre el pago del anticipo y la aplicación de tipos de cambio, vulnerando el derecho
      a la tutela judicial efectiva de CELEC EP. Se señala que el tribunal equiparó "fecha de pago" con "fecha de plazo de
      pago" sin fundamento contractual ni lógico, a pesar de que el Contrato Complementario No. 2 modificó la cláusula de
      pago del anticipo. Esta interpretación, que contradice la asunción del riesgo cambiario pactada y genera un perjuicio
      a CELEC EP al obligar a un pago de diferencia en dólares, carece de una fundamentación fáctica y normativa suficiente.
      El tribunal no explicó coherentemente por qué aplicó una tasa de cambio diferente a la acordada, lo que contraviene
      el artículo 75 de la Constitución, que garantiza la tutela judicial efectiva mediante decisiones fundadas en derecho
      y razonadas.
    - La Sala de lo Civil de la Corte Provincial de El Oro, al dictar sentencia el 12 de marzo de 2021 en el proceso No. 07571-2020-01605,
      incurrió en una grave falta de motivación al basar su decisión en un informe final del sumario administrativo que no
      fue debidamente notificado al accionante para su contradicción. El accionante señala que dicho informe, que sugería
      su destitución, no le fue comunicado, impidiéndole ejercer su derecho a la defensa y a contradecir las conclusiones
      que fundamentaron la revocatoria de la sentencia de primera instancia. La Sala, al considerar intrascendente la notificación
      de este informe y confundir piezas procesales, contraviene lo establecido en la SENTENCIA CONSTITUCIONAL No. 234-18-SEP-CC,
      la cual establece que la falta de notificación de informes finales en sumarios administrativos acarrea la violación
      del derecho constitucional a la defensa y a la motivación de las resoluciones.
  - source_sentence: ¿Cómo la Sala Multicompetente de la Corte Provincial del Cañar, al confirmar la acción de protección,
      vulneró el principio de igualdad y el derecho a la igualdad formal del GAD Municipal de Azogues, al apartarse de criterios
      jurisprudenciales previos en casos similares?
    sentences:
    - La Sala Multicompetente de la Corte Provincial del Cañar, al confirmar la acción de protección, vulneró el principio
      de igualdad y el derecho a la igualdad formal del GAD Municipal de Azogues al aplicar criterios jurisprudenciales de
      forma inconsistente. La Sala se apartó de pronunciamientos anteriores en casos análogos sobre el cobro de áreas de cesión,
      otorgando un beneficio al accionante que no correspondía, lo cual constituye una discriminación directa contra el GAD
      Municipal. El principio de igualdad exige que casos similares sean tratados de manera idéntica, y la Sala, al no observar
      el principio 'stare decisis' sin una justificación válida, generó un trato diferenciado e injustificado. Esta actuación
      arbitraria y sin motivación suficiente contraviene el derecho fundamental a ser tratado de manera idéntica ante la ley,
      afectando la predictibilidad y la confianza en el sistema de justicia.
    - La Presidencia de la Corte Provincial de Justicia de Pichincha desestimó la acción de nulidad propuesta contra el laudo
      arbitral. El principal argumento para desestimar la acción fue la acogida de la excepción de falta de legítimo contradictor
      respecto al Dr. Armando Bermeo Castillo. Se determinó que el árbitro único no era la parte procesal llamada por ley
      a contradecir la demanda de nulidad, ya que su calidad de árbitro cesó con la emisión del laudo, y la resolución sobre
      el fondo del asunto no le afectaría ni produciría cosa juzgada. La titularidad del derecho sustancial recaía únicamente
      en INFOCONTAB Cía. Ltda. Además, se analizó la causal de nulidad invocada por el actor, relacionada con el literal d)
      del artículo 31 de la Ley de Arbitraje y Mediación (LAM), que se refiere a la incongruencia 'extra' y 'ultra petita'.
      Se concluyó que el actor no especificó cómo el laudo incurrió en estos vicios, limitándose a alegar vulneraciones de
      derechos constitucionales y errores en la valoración de la prueba, cuestiones que escapan al ámbito de competencia de
      la Presidencia en una acción de nulidad. Se determinó que el laudo no incurrió en incongruencia 'extra petita' ni 'ultra
      petita', ya que la condena al pago de USD $12.000 más intereses se ajustaba a las pretensiones de la demanda arbitral
      y no superaba la cuantía fijada. Finalmente, se recordó que la acción de nulidad es un mecanismo de control judicial
      del procedimiento arbitral, no una revisión del fondo de la controversia, y que las causales son limitadas a las establecidas
      en el artículo 31 de la LAM, no siendo procedente invocar vulneraciones constitucionales genéricas o confundir la acción
      con un recurso de casación.
    - El Ministerio de Agricultura y Ganadería (MAG) interpuso una Acción Extraordinaria de Protección basándose en los artículos
      94 y 437 de la Constitución de la República del Ecuador, que establecen la procedencia de esta acción contra sentencias
      o autos definitivos que violenten derechos reconocidos en la Constitución. Específicamente, el MAG argumentó que la
      sentencia de segunda instancia emitida el 08 de julio de 2022, y el auto interlocutorio del 14 de diciembre de 2022,
      que resolvió el recurso de aclaración y ampliación, violaron el derecho al debido proceso (Art. 76, numeral 1), el derecho
      a la seguridad jurídica (Art. 82), y el derecho a la igualdad formal, material y no discriminación (Art. 66, numeral
      4) de la Constitución. Se citaron diversas sentencias de la Corte Constitucional, como la Nro. 0016-13-SEP-CC y la Nro.
      061-13-SEP-CC, para sustentar que la acción de protección no es vía para resolver controversias de mera legalidad o
      para aplicar normas infraconstitucionales de forma general, y que la terminación de contratos ocasionales por causas
      legales no vulnera el derecho al trabajo ni la estabilidad laboral, especialmente cuando se trata de proyectos de inversión
      con financiamiento temporal. Asimismo, se hizo referencia a la sentencia Nro. 001-18-SEP-CC y la Nro. 169-16-SEP-CC
      para enfatizar la obligación de las autoridades de garantizar el cumplimiento de normas y derechos de las partes, y
      a la sentencia Nro. 048-17-SEP-CC, caso Nro. 0238-13-EP, que señala que la emisión sucesiva de contratos ocasionales
      no otorga derecho a estabilidad sin concurso previo. La argumentación del MAG se centró en que la vinculación de la
      accionante fue para un proyecto de inversión con financiamiento no permanente, el cual finalizó el 31 de diciembre de
      2021, y que la desvinculación se ajustó a lo dispuesto en el artículo 146 literal f) del Reglamento a la LOSEP.
  - source_sentence: ¿Bajo qué normativa y procedimiento el Ministerio de Cultura y Patrimonio aprobó los estatutos y otorgó
      personalidad jurídica a la Asociación Social y Cultural “6 de Mayo” con domicilio en Marcabelí, provincia de El Oro,
      según el Acuerdo DM-2019-009?
    sentences:
    - El Decreto N° 1387 de febrero de 2004 modificó el Decreto Ejecutivo N° 1148, que creaba la Secretaría General de la
      Presidencia de la República, basándose en la necesidad de dotar a esta Secretaría de atribuciones que le permitieran
      cumplir con el objeto de su creación. La modificación se fundamentó en el ejercicio de las atribuciones conferidas al
      Presidente de la República por el artículo 171, numeral 9 de la Constitución Política de la República y el artículo
      11, letra g) del Estatuto del Régimen Jurídico y Administrativo de la Función Ejecutiva. El Art. 1 del Decreto N° 1387
      sustituye el Art. 2 del Decreto N° 1148, detallando las atribuciones del Secretario General de la Presidencia de la
      República, que incluyen dirigir la administración de la Secretaría, actuar como consejero y vocero del Presidente, coordinar
      proyectos de interés nacional, atender asuntos administrativos, celebrar contratos, nombrar y remover personal, y conferir
      delegaciones. Adicionalmente, el Art. 2 del Decreto N° 1387 establece que la Dirección Administrativa Financiera, la
      Unidad de Tecnología y la Oficina de Coordinación Diplomática dependerán de la Secretaría General de la Presidencia
      de la República. El Art. 3 sustituye el Art. 15 del Estatuto del Régimen Jurídico y Administrativo de la Función Ejecutiva,
      detallando las atribuciones del Secretario General de la Administración Pública, quien coordinará con ministros y funcionarios,
      actuará como vocero oficial del Gobierno Nacional, dirigirá la administración general y financiera de su secretaría,
      y tendrá la facultad de nombrar y remover al subsecretario y personal de su dependencia.
    - La Sala de Admisión de la Corte Constitucional, en el caso 1654-23-EP, determinó la inadmisibilidad de la acción extraordinaria
      de protección contra un auto de apremio personal en materia de alimentos, basándose en la caracterización de auto definitivo
      establecida en la sentencia No. 1502-14-EP/19. Según esta caracterización, un auto es definitivo si pone fin al proceso
      o causa un gravamen irreparable. Para poner fin al proceso, debe resolver sobre el fondo de las pretensiones con autoridad
      de cosa juzgada material, o impedir la continuación del juicio o el inicio de uno nuevo. En el caso analizado, el auto
      de apremio personal del 5 de junio de 2023, dictado contra Eduardo Vicente Goyes Peña, no cumplió con estos supuestos.
      La Sala concluyó que, al ser una medida temporal y mutable en materia de alimentos, no resolvía el fondo ni impedía
      la continuación del proceso, descartando así los criterios 1.1 y 1.2 para considerar un auto como definitivo.
    - El Ministerio de Cultura y Patrimonio, en ejercicio de sus atribuciones constitucionales y legales, aprobó los estatutos
      y otorgó personalidad jurídica a la Asociación Social y Cultural “6 de Mayo” mediante el Acuerdo Ministerial DM-2019-009.
      Este acto se fundamenta en el artículo 154, numeral 1 de la Constitución de la República, que faculta a los ministros
      de Estado a ejercer la rectoría de las políticas públicas y expedir los acuerdos y resoluciones administrativas necesarios.
      La base normativa específica para este procedimiento es el Decreto Ejecutivo Nro. 193, que expidió el “Reglamento para
      el Otorgamiento de Personalidad Jurídica a las Organizaciones Sociales”, el cual derogó decretos anteriores. Adicionalmente,
      se invocan disposiciones de la Ley Orgánica de Participación Ciudadana, particularmente los artículos 30, 31, 32 y 36,
      que reconocen el derecho a la libre asociación, la incidencia de las organizaciones en políticas públicas y los requisitos
      para tramitar la personalidad jurídica. El artículo 17 del Estatuto del Régimen Jurídico y Administrativo de la Función
      Ejecutiva también otorga facultades a los ministros para despachar asuntos ministeriales sin autorización presidencial
      previa, salvo excepciones. La Coordinación General Jurídica del Ministerio emitió el informe motivado Nro. MCYP-CGJ-19-0059-M,
      concluyendo que la asociación cumplió con todos los requisitos establecidos en el reglamento, y recomendando la aprobación
      del estatuto y el otorgamiento de la personalidad jurídica, decisión que fue formalizada por el Ministro de Cultura
      y Patrimonio.
