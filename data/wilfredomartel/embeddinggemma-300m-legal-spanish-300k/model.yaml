widgetData:
- source_sentence: ¿Qué derechos constitucionales alegó Gemo Ortiz que fueron vulnerados por la sentencia de la Sala Multicompetente
    de la Corte Provincial de Justicia de Sucumbíos en el caso 1316-24-EP?
  sentences:
  - Gemo Ortiz alegó que la sentencia emitida por la Sala Multicompetente de la Corte Provincial de Justicia de Sucumbíos
    vulneró sus derechos constitucionales al trabajo, a la seguridad social, al debido proceso en sus garantías de cumplimiento
    de normas y derechos de las partes, de la defensa y de la motivación, y a la seguridad jurídica. Adicionalmente, sostuvo
    que se vulneró la obligación del Estado de garantizar y respetar los derechos de las personas. Estos reclamos se basaron
    en la argumentación de que el GAD Sucumbíos inobservó las disposiciones legales de los artículos 58 de la Ley Orgánica
    de Servicio Público (LOSEP) y 143 de su Reglamento al dar por terminada su relación laboral, a pesar de que la necesidad
    institucional se había vuelto permanente por ministerio de la ley, lo que, según su criterio, precarizó su situación laboral
    y derivó en una motivación falaz del acto administrativo.
  - La igualdad de cónyuges ante la ley, como se desprende de los artículos 100 y 101 del Código Civil para el Estado de Veracruz,
    implica que no debe existir una presunción legal a favor de ninguno de los cónyuges en cuanto a la necesidad de recibir
    alimentos. Según el criterio del Segundo Tribunal Colegiado del Séptimo Circuito, esta igualdad obliga a que la carga
    de demostrar la necesidad alimentaria recaiga en quien la alega, es decir, el cónyuge actor, quien debe probar los hechos
    constitutivos de su acción, incluyendo su insuficiencia económica.
  - El procedimiento iniciado por Ángel René Caiza López contra el Ministerio del Interior, el Comandante General de la Policía
    Nacional y la Procuraduría General del Estado en la Corte Provincial de Justicia de Tungurahua es una acción de protección.
    El auto emitido por la Sala Especializada de la Familia, Niñez, Adolescencia y Adolescentes Infractores de la Corte Provincial
    de Justicia de Tungurahua, con número de juicio 18202-2023-03164, se refiere a este caso como "procedimiento especial
    de garantías jurisdiccionales No. 18202-2023-03164 por acción de protección". La Sala, integrada por los jueces José Gabriel
    Barragán García, José Luis López Erazo y Lucila Cristina Vanes Sevilla (ponente), ha dictado un auto en el que se agrega
    el escrito presentado por el accionante y se dispone notificar a la contraparte. Además, se ordena remitir el expediente
    a la Corte Constitucional, conforme lo establece el Art. 62 de la Ley Orgánica de Garantías Jurisdiccionales y Control
    Constitucional. Se mencionan los correos electrónicos institucionales de los jueces que conformaron el tribunal para las
    notificaciones correspondientes a la sentencia que es motivo de la presente Acción Extraordinaria de Protección.
- source_sentence: ¿A qué autoridades se dirige el oficio del Séptimo Tribunal de Garantías Penales del Guayas para solicitar
    la comparecencia de los testigos en el juicio penal 0051-2013?
  sentences:
  - Según la Resolución N 101/01 de la Dirección General de la Marina Mercante y del Litoral, los oficiales y tripulantes
    de la Armada Nacional en servicio activo que deseen embarcarse en naves de bandera ecuatoriana deben obtener un permiso
    provisional de embarco. Para ello, deben presentar una solicitud de la empresa armadora del buque detallando el nombre
    de la nave, la duración del contrato y el cargo a desempeñar. Adicionalmente, se requiere una copia de los certificados
    de competencia vigentes, conforme a los cursos modelo OMI, que acrediten su capacidad para las funciones a bordo. En caso
    de que la nave sea de tráfico internacional, también se debe presentar el número de la orden general y el artículo correspondiente
    que autoriza el embarque durante el período de licencia. Los capitanes de puerto o superintendentes de terminales petroleros
    tienen la obligación de no aceptar en el rol de zarpe a miembros de la Armada en servicio activo sin dicho permiso.
  - El oficio No. 5088-JP-051-2013-7TGPG, emitido por el Séptimo Tribunal de Garantías Penales del Guayas, se dirige principalmente
    al SEÑOR JEFE PROVINCIAL DE ANTINARCOTICOS DE LA POLICÍA NACIONAL DEL GUAYAS. Adicionalmente, para la citación de los
    testigos que son miembros de la Policía Nacional, se indica que los oficios se dirigirán al señor Comandante del Distrito
    Metropolitano de Guayaquil y a la Dirección General de Personal de la Policía Nacional, así como a Comandos de Distrito
    específicos como Duran. Para el perito, se cita a la Dirección Provincial del Guayas del Consejo de la Judicatura.
  - El juez fundamentó su decisión en que la Cooperativa de Ahorro y Crédito "JUVENTUD ECUATORIANA PROGRESISTA" LTDA. fue
    notificada mediante oficio el 14 de junio de 2018, y la audiencia se realizó en enero de 2019, transcurriendo un lapso
    de seis meses, tiempo considerado suficiente para que hiciera valer sus derechos. Además, señaló que la hipoteca y la
    prohibición de enajenar fueron actos voluntarios y extraprocesales, no ordenados judicialmente. El juez aplicó la teoría
    de los actos propios (stoppel), argumentando que la falta de diligencia interna de la cooperativa en dar a conocer la
    notificación a su departamento correspondiente no puede generar una nulidad procesal, ya que la entidad recibió la notificación
    y tuvo la oportunidad de comparecer. Se consideró que alegar la nulidad basándose en errores propios y la falta de acción
    oportuna vulneraría los principios de seguridad jurídica y tutela judicial efectiva, consagrados en los artículos 82 y
    75 de la Constitución de la República del Ecuador.
- source_sentence: ¿Cuál fue la decisión del Tribunal de la Sala de lo Civil de la Corte Provincial de Justicia de El Oro
    respecto a la apelación del demandado sobre la excepción de extinción total de la obligación por pago efectivo, y qué
    pruebas se consideraron relevantes en segunda instancia?
  sentences:
  - La Sala Especializada de la Familia, Niñez, Adolescencia y Adolescentes Infractores de la Corte Provincial de Justicia
    de Azuay, al conocer el recurso de apelación presentado por Milton René Samaniego Ávila, desechó dicho recurso y confirmó
    la sentencia de primera instancia. El argumento principal para desestimar la apelación fue que, a criterio de la Sala,
    la acción de protección interpuesta por el accionante era improcedente debido a que el asunto trataba sobre una "mera
    legalidad". Esto implicaba que la Sala consideraba que la controversia se centraba en la interpretación y aplicación de
    normas legales ordinarias, y no en una violación directa de derechos constitucionales que justificara la procedencia de
    la acción de protección.
  - Los accionantes Jerson Gerardo Sánchez Riofrio y Edgar Eduardo Muñoz Ortiz fundamentaron su alegato sobre la falta de
    competencia del juez que dictó la orden de prisión preventiva en la supuesta contravención de resoluciones emitidas por
    el Pleno del Consejo de la Judicatura. Específicamente, señalaron que la Resolución 07-2023 de la Corte Nacional de Justicia
    confería competencia exclusiva a los jueces de la Unidad Especializada para el Juzgamiento de los Delitos de Corrupción
    y Crimen Organizado para conocer delitos relacionados con el crimen organizado. Alegaron que, dado que la Unidad Judicial
    de Garantías Penales con competencia en Delitos Flagrantes de Guayaquil no poseía esta especialización, no tenía competencia
    para dictar la orden de prisión preventiva. Además, hicieron referencia a una reforma posterior (resolución no. 173 del
    18 de octubre de 2023) que, a su entender, clarificaba que los jueces ordinarios ya no eran competentes para estos casos
    desde la flagrancia, debiendo comunicarse la causa al juez especializado.
  - El Tribunal de la Sala de lo Civil de la Corte Provincial de Justicia de El Oro resolvió rechazar el recurso de apelación
    interpuesto por el demandado. La excepción de extinción total de la obligación por solución o pago efectivo fue analizada,
    determinando que el demandado no probó dicha excepción, ya que los cheques presentados nunca fueron cobrados por el actor
    ni pagados o protestados por el banco girado. La prueba documental, incluyendo el oficio del Banco de Machala indicando
    que los cheques no fueron presentados al cobro, fue fundamental para esta decisión. El tribunal también confirmó la sentencia
    de primera instancia en cuanto a la existencia de la obligación y el monto adeudado, basándose en las facturas y comprobantes
    de retención presentados por el actor, así como en el reconocimiento implícito de la obligación por parte del demandado
    al alegar su extinción.
- source_sentence: ¿Bajo qué circunstancias se considerarán como nuevos los vehículos automóviles y otros vehículos terrestres
    que ingresan al país bajo el régimen de importación temporal con reexportación en el mismo estado, según la modificación
    de la Resolución 020 del COMEXI?
  sentences:
  - Sí, se vulneró el derecho al debido proceso, específicamente el principio de motivación, en la sentencia emitida por la
    Sala Especializada de lo Civil y Mercantil de la Corte Provincial de Guayas contra José Antonio Véliz Morán. El accionante
    argumenta que la Sala calificó su reclamo de jubilación patronal como un asunto de "mera legalidad" sin un análisis profundo
    de la vulneración de sus derechos constitucionales a la salud, al trabajo y a la seguridad jurídica, derivados de la aplicación
    retroactiva de la Resolución C.D. N° 476 del IESS. Según Véliz Morán, la motivación de la sentencia fue "aparente", limitándose
    a la exposición de normas jurídicas sin un análisis agudo de los hechos y la pertinencia de su aplicación a su caso particular.
    La Corte Constitucional, citada en el texto, ha establecido que las resoluciones deben enunciar las normas y explicar
    su aplicación a los hechos, y que la falta de motivación las hace nulas. La Sala no habría cumplido con este deber al
    no verificar la existencia de vulneraciones a derechos constitucionales, limitándose a una formalidad.
  - La pretensión principal de Neptalí Eduardo Cobo Cruz al interponer la acción extraordinaria de protección fue solicitar
    a la Corte Constitucional que declare la violación de sus derechos fundamentales y, en consecuencia, ordene la reparación
    integral de los mismos. Específicamente, solicitó que se dejen sin efecto jurídico el auto de abandono del recurso de
    apelación del 30 de septiembre de 2016 y el auto que negó la revocatoria del 31 de enero de 2017, dictados dentro del
    proceso N- 13305-20147-0003 por la Sala de lo Civil de la Corte Provincial de Manabí. Además, pidió que se tramite y resuelva
    el recurso de apelación pendiente. Los derechos que consideró vulnerados fueron el derecho a la tutela efectiva, imparcial
    y expedita de los derechos e intereses (Art. 75 de la Constitución), el derecho a la motivación de las resoluciones (Art.
    76, numeral 7, literal l) de la Constitución), y el derecho a recurrir (Art. 76, numeral 7, literal m) de la Constitución).
  - La Comisión Ejecutiva del Consejo de Comercio Exterior e Inversiones (COMEXI), mediante la Resolución N° 127, modificó
    el artículo 2 de la Resolución 020. Se considerarán como nuevos los vehículos automóviles y demás vehículos terrestres
    que, habiendo ingresado al país bajo el régimen de importación temporal con reexportación en el mismo estado para cumplir
    contratos de obras públicas, soliciten un cambio de régimen a importación a consumo una vez que el plazo para la ejecución
    de dicho contrato haya fenecido.
- source_sentence: ¿Cuál fue la razón principal por la que se desechó el recurso de revisión en el amparo directo 8063/2018,
    derivado del cual se presentó el recurso de reclamación 99/2019?
  sentences:
  - La sentencia T-883/10 explica que el "estado de cosas inconstitucional" declarado en 1998 para Cajanal, debido al incumplimiento
    masivo del derecho de petición, no puede ser utilizado por la entidad como excusa para seguir vulnerando los derechos
    fundamentales de los ciudadanos. La Corte Constitucional ha reiterado en sentencias como la T-1234/08 que, si bien la
    crisis estructural de Cajanal justifica demoras, la entidad debe informar a los peticionarios sobre los requisitos, las
    razones del retraso, el tiempo estimado de respuesta y las gestiones para ajustar los tiempos. El incumplimiento de estos
    lineamientos, como ocurrió en el caso de la señora Barón de Calao al no recibir respuesta en 19 meses, constituye una
    vulneración del derecho de petición.
  - El recurso de revisión en el amparo directo 8063/2018 fue desechado por el Presidente de la Suprema Corte de Justicia
    de la Nación debido a que no se actualizaba un planteamiento de constitucionalidad que hiciera procedente dicho medio
    de impugnación extraordinario. La finalidad del recurso de revisión, según la fracción IX del artículo 107 de la Constitución
    y el artículo 81, fracción II, de la Ley de Amparo, es revisar sentencias de Tribunales Colegiados de Circuito donde se
    haga un pronunciamiento de constitucionalidad, ya sea sobre una norma general o la interpretación directa de un precepto
    constitucional. En el caso, los recurrentes argumentaban que el Tribunal Colegiado había interpretado el artículo 94 constitucional
    al analizar la irretroactividad de la jurisprudencia bajo el artículo 217 de la Ley de Amparo, y que la inaplicación de
    criterios jurisprudenciales constituía un tema de constitucionalidad. Sin embargo, la Presidencia determinó que la mera
    aplicación de la Ley de Amparo, sin un análisis profundo de un precepto constitucional, no satisfacía el requisito de
    constitucionalidad, y que la cuestión de la irretroactividad de la jurisprudencia en este contexto era una cuestión de
    legalidad. Por lo tanto, al no existir un tema propiamente constitucional, el recurso de revisión fue desechado por improcedente.
  - Patricio Heriberto Gutiérrez Tipán alegó que la sentencia de la Sala de la Corte Provincial de Justicia de Pichincha vulneró
    principalmente su derecho al debido proceso en la garantía básica de la motivación, consagrado en el Artículo 76, numeral
    7, literal I) de la Constitución. Como consecuencia de esta vulneración, también alegó la afectación de su derecho a la
    seguridad jurídica (Artículo 82 de la Constitución) y a la tutela judicial efectiva (Artículo 75 de la Constitución).
    Argumentó que la sentencia de la Sala carecía de la debida motivación porque no contenía una argumentación sólida, técnica
    y no observó los parámetros de comprensibilidad, lógica y razonabilidad establecidos por la Corte Constitucional. Específicamente,
    señaló que la Sala no analizó su alegato sobre la sentencia del juez inferior ser inmotivada, realizó un análisis superficial,
    incoherente, con fórmulas oscuras, erráticas, incompletas o inconsistentes, y no explicó la pertinencia de la aplicación
    de las normas a los antecedentes de hecho del caso. Además, criticó que la Sala negara la acción por la existencia de
    la vía contencioso-administrativa sin un análisis previo de la vulneración de derechos, y que insinuara una exigencia
    de temporalidad o inmediatez del daño no prevista en la Constitución ni en la ley.
