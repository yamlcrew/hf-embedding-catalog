  widget:
  - source_sentence: Who were some of the scholars mentioned as having transmitted knowledge from Hammad ibn Abi Qatada?
    sentences:
    - 'بن أبي ثابت وغيرهم. وعنه ابن المبارك وحسين بن علي \n\nالجعفي وعبد الله بن صالح العجلي وأبو أحمد الزبيري وغيرهم. قال
      العجلي: ثقة، وقال أبو حنيفة: غلب حمزة الناس على القرآن والفرائض. وقال الثوري: ما قرأ حمزة حرفا من كتاب الله إلا بأثر.
      قال ابن حجر: انعقد الإجماع على تلقي قراءته بالقبول. لكن نقل صاحب المغني (1/492 ط 3) عن أحمد أنه كان يكره قراءة حمزة
      والكسائي لما فيها من الكسر والإدغام والتكلف وزيادة المد. (تهذيب التهذيب 3/27، وميزان الاعتدال 1/605، ووفيات الأعيان
      1/167، والأعلام 2/308). \n\nخ \n\nخباب بن الأرت (؟ - 37 ه): \n\nهو خباب بن الأرت بن جندلة بن سعد، أبو يحيى أو أبو عبد'
    - 'عين ودين على الغير - ولم نجوز بيع الدين لغير من هو عليه - بطل الصلح في الدين، وفي العين القولان في تفريق الصفقة. \n\nولو
      مات شخص عن ابنين، والتركة ألفا درهم ومائة دينار، وهي دين في ذمة الغير، فصالح أحدهما أخاه من الدين على ألفي درهم جاز؛
      لأنه إذا كان في الذمة فلا ضرورة إلى تقدير المعاوضة فيه، فيجعل مستوفيا لأحد الألفين ومعتاضا عن الدنانير الألف الآخر().
      \n\nظهور دين على التركة بعد التخارج: \n\n20 - الأصل أن الدين يتعلق بالتركة، ويقدم سداده على تقسيم التركة؛  :  من بعد
      وصية يوصى بها أو دين(). \n\nلكن الفقهاء يختلفون في وقت ابتداء ملكية الوارث للتركة إذا كانت مدينة. \n\nفعند'
    - 'ولعل العام هو المتأخر الذي أريد به العموم، وينسخ به الخاص، وهذا هو الذي اختاره القاضي، والأصح عندنا: تقديم الخاص وإن
      كان ما ذكره \n\nالقاضي ممكنا، ولكن تقدير النسخ محتاج إلى الحكم بدخول الكافرة تحت اللفظ، ثم خروجه عنه، فهو إثبات وضع،
      ورفع بالتوهم، وإرادة الخاص باللفظ العام غالب معتاد، بل هو الأكثر، والنسخ كالنادر، فلا سبيل إلى تقديره بالتوهم، ويكاد
      يشهد لما ذكرناه من سير الصحابة والتابعين كثير، فإنهم كانوا يسارعون إلى الحكم بالخاص على العام، وما اشتغلوا بطلب التاريخ
      والتقدم والتأخر(). \n\nوقيل على الشذوذ: إنه يخصص من طريق المفهوم، فإن الرجال يقتضي مفهومه قتل غيرهم، فإذا لم'
  - source_sentence: كيف يؤثر حصول الشخص على قليل من النقد مقابل نصاب أكبر في الحول التجاري؟
    sentences:
    - 'للنساء لما سبق بيانه، وكرهه الحنفية والحنابلة(). \n\nالتصفيق في الصلاة على وجه اللعب : \n\n7 - قال الشافعية، وهو أحد
      قولي الحنابلة: إن التصفيق في الصلاة على وجه اللعب يبطلها وإن كان قليلا، لمنافاة اللعب للصلاة. والأصل في ذلك حديث الصحيحين:
      «من نابه شيء في صلاته فليسبح، وإنما التصفيق للنساء». ولمنافاته للصلاة. \n\nوالقول الآخر للحنابلة: أنه لا يبطلها إن قل،
      وإن كثر أبطلها؛ لأنه عمل من غير جنسها، فأبطلها كثيره عمدا كان أو سهوا(). \n\nوأما الحنفية فقد قالوا: إن ما يعمل عادة
      باليدين يكون كثيرا، بخلاف ما يعمل باليد الواحدة فقد يكون قليلا، والعمل الكثير الذي ليس من أفعال الصلاة ولا'
    - 'موسى : واجعل لي وزيرا من أهلي هارون أخي اشدد به أزري وأشركه في أمري() فإذا جاز ذلك في النبوة كان في الإمامة أولى، ولأن
      ما وكل إلى الإمام من تدبير الأمة لا يقدر على مباشرة جميعه إلا باستنابة، ونيابة الوزير المشارك له في التدبير أجدى في
      تنفيذ الأمور من تفرده بها، ليستظهر به على نفسه، وبها يكون أبعد من الزلل وأمنع من الخلل. \n\nقال الماوردي وأبو يعلى ما
      مفاده:() يشترط في لفظ تولية وزارة التفويض اشتماله على أمرين: \n\nأحدهما: عموم النظر، والثاني: \n\nالنيابة، فإن اقتصر
      على عموم النظر دون النيابة فكان بولاية العهد أخص فلم تنعقد به الوزارة، وإن اقتصر به على النيابة فقد أبهم ما'
    - 'بالدراهم وباع بالدنانير، وقصد التجارة مستمر، وتم الحول، فلا زكاة إن لم تبلغ الدنانير قيمة الدراهم. وهناك قول في المذهب
      أن التقويم يكون أبدا بغالب نقد البلد. \n\nالحالة الثانية: أن يكون رأس المال نقدا دون النصاب، وفيه وجهان: \n\nأصحهما:
      أنه يقوم بذلك النقد. \n\nوالثاني: أنه يقوم بغالب نقد البلد. ومحل الوجهين إن لم يملك ما يتم به النصاب. فإن ملك قوم به.
      وصورته: أن يشتري بمائة درهم وهو يملك مائة أخرى، فلا خلاف أن التقويم بالدراهم. لأنه اشترى ببعض ما انعقد عليه الحول، وابتدأ
      الحول من حين ملك الدراهم. \n\nالحال الثالث: أن يملك بالنقدين جميعا. وهو على ثلاثة أضرب. \n\nالأول: أن يكون كل'
  - source_sentence: كيف يرى الشافعية حقيقة إسلام المميز كاستقلال من غير افتقار؟
    sentences:
    - 'ذلك عن عمر ، وبه يقول شريح والقاسم بن محمد وسالم بن عبد الله والأوزاعي وابن أبي ليلى ومالك والشافعي وعبد الملك بن يعلى
      قاضي البصرة(). \n\nوفي كشاف القناع: إذا عزر من وجب عليه التعزير وجب على الحاكم أن يشهره لمصلحة كشاهد زور ليجتنب(). \n\nوجاء
      في التبصرة: التعزير لا يختص بالسوط واليد والحبس، وإنما ذلك موكول إلى اجتهاد الإمام. قال أبو بكر الطرطوشي في أخبار الخلفاء
      المتقدمين: إنهم كانوا يعاملون الرجل على قدره وقدر جنايته، فمنهم من يضرب، ومنهم من يحبس، ومنهم من يقام واقفا على قدميه
      في المحافل، ومنهم من تنزع عمامته. \n\nقال القرافي: إن التعزير يختلف باختلاف الأعصار والأمصار، فرب'
    - 'الحنفية والمالكية والحنابلة وبعض الشافعية إلى أن إسلام المميز يصح استقلالا من غير افتقار إلى حكم حاكم، أو تبعيته لأحد
      أبويه؛ لأن النبي  دعا عليا  إلى الإسلام، وهو ما زال في صباه فأسلم، وكان أول من أسلم من الصبيان؛ ولقوله : «كل مولود يولد
      على الفطرة»()؛ ولأن الإسلام عبادة محضة فصحت من الصبي العاقل كالصلاة والصوم والحج وغيرها من العبادات. \n\nويرى الشافعية
      في الراجح عندهم أن إسلام المميز استقلالا لا يصح؛ لأنه غير مكلف بدليل قوله : «رفع القلم عن ثلاثة عن النائم حتى يستيقظ
      وعن الصبي حتى يحتلم وعن المجنون حتى يفيق» وفي رواية: «وعن الصبي حتى يبلغ»(). \n\nولأن نطقه بالشهادتين إما'
    - 'سنا ولا ظفرا، فلا يحل ما ذبح بهما أو صيد بهما. وفرق بعض الفقهاء بين السن والظفر القائمين فمنع الذبح بهما، بخلاف المنزوعين.
      ولا يحل ما أزهقت نفسه بمثقل كالحجر ونحوه. وينبغي تعاهد الآلة لتكون محددة فتريح الذبيحة. \n\nوإن كان المصيد به حيوانا
      كالكلب والصقر ونحوهما اعتبر أن يكون معلما. ومعنى التعليم في الجارحة أن تصير بحيث إذا أرسلت أطاعت، وإذا \n\nزجرت انزجرت،
      وقيل بأن تترك الأكل من الصيد ثلاث مرات. \n\nويذكر الفقهاء تفصيل ذلك والخلاف فيه في مباحث الصيد ومباحث الذبح(). \n\nآلات
      الجهاد: \n\n5 - يجب إعداد العدة للجهاد، وتجوز مقاتلة العدو بالسلاح المناسب لكل عصر، وفي تحريقهم بالنار'
  - source_sentence: ما هي الأحكام القانونية التي يحكم بها الفقهاء على عقد "المضاربة" وما هو موقفهم منها؟
    sentences:
    - 'ما بعد البلوغ ما دامت الحاجة قائمة لذلك. \n\n53 - والعلة في هذا الترخيص تدريبهن عن شأن تربية الأولاد، وتقدم النقل عن
      الحليمي: أن من العلة أيضا استئناس الصبيان وفرحهم(). وأن ذلك يحصل لهم به النشاط والقوة والفرح وحسن النشوء ومزيد التعلم.
      فعلى هذا لا يكون الأمر قاصرا على الإناث من \n\nالصغار، بل يتعداه إلى الذكور منهم أيضا. وممن صرح به أبو يوسف: ففي القنية
      عنه: يجوز بيع اللعبة، وأن يلعب بها الصبيان(). \n\n54 - ومما يؤكد جواز اللعب المصورة للصبيان - بالإضافة إلى البنات -
      ما ثبت في الصحيحين عن الربيع بنت معوذ الأنصارية  أنها قالت: «أرسل رسول الله  غداة عاشوراء إلى قرى الأنصار'
    - 'وأما ما يتصل بالإبضاع فإن الصيغة اللفظية قد تكون \n\nصريحة بلفظ الإبضاع، أو البضاعة، وقد تكون غير صريحة، كأن يقول:
      خذ هذا المال مضاربة، على أن يكون الربح كله لي. وهذه الصورة محل خلاف بين الفقهاء(). فذهب الحنابلة إلى أن هذا العقد لا
      يصح، واعتبروا ذلك من باب التناقض؛ لأن قوله: «مضاربة» يقتضي الشركة في الربح، وقوله: «الربح كله لي» يقتضي عدمها، فتناقض
      قوله، ففسدت المضاربة، ولأنه اشترط اختصاص أحدهما بالربح، وهذا شرط يناقض العقد ففسد، ولأن اللفظ الصريح في بابه لا يكون
      كناية في غيره، فالمضاربة لا تنقلب إبضاعا ولا قرضا. وعلى هذا اعتبروا هذا العقد مضاربة فاسدة(). \n\nوذهب الحنفية'
    - 'فقيه، أصولي، متكلم، نحوي، كان شيخ الشافعية في بلاد اليمن. تفقه على جماعات منهم: خاله الإمام أبو الفتوح بن عثمان العمراني
      وزيد بن عبد الله اليافعي وغيرهما. \n\nمن تصانيفه: «البيان» في فروع الشافعية، و«غرائب الوسيط»، و «الزوائد»، و «الأحداث»،
      و «شرح الوسائل»، و «مختصر الإحياء»، و «مناقب الإمام الشافعي». \n\n(طبقات الشافعية 4/324، وشذرات الذهب 4/185، والأعلام
      9/180، ومعجم المؤلفين 13/196). \n\nيسيرة الصحابية (؟ -؟) هي يسيرة أم ياسر. وقيل: يسيرة بنت ياسر، الصحابية المهاجرة .
      كانت من المهاجرات الأول المبايعات. وقال \n\nابن سعد: أسلمت وبايعت وروت عن رسول الله (حديثا. \n\n(الإصابة'
  - source_sentence: What is the procedure for increasing or decreasing penalties in cases like those described in the text?
    sentences:
    - المحتاج شرح المنهاج»؛ و «الإيعاب شرح العباب المحيط بمعظم نصوص الشافعية والأصحاب»؛ و «الصواعق المحرقة في الرد على أهل
      البدع والزندقة»؛ و «إتحاف أهل الإسلام بخصوصيات الصيام». \n\n(البدر الطالع 1 \\ 109؛ ومعجم المؤلفين 2 \\ 152؛ والأعلام
      للزركلي 1 \\ 223) \n\nابن حزم (384 -456 ه) \n\nهو علي بن أحمد بن سعيد بن حزم الظاهري. أبو محمد. عالم الأندلس في عصره.
      أصله من الفرس. أول من أسلم من أسلافه جد له كان يدعى يزيد مولى ليزيد بن أبي سفيان . كانت لابن حزم الوزارة وتدبير المملكة،
      فانصرف عنها إلى التأليف والعلم. كان فقيها حافظا يستنبط الأحكام من الكتاب والسنة على طريقة أهل الظاهر، بعيدا عن
    - 'آت بالدين في وقت كذا فأنا مسلم أو مؤمن، ونحو ذلك من الشروط التي يعلق عليها، فلا يلزم إسلام إذا وجد ذلك الشرط، بل يبقى
      على كفره بسبب أن الدخول في الدين يعتمد الجزم بصحته والمعلق ليس جازما(). \n\nأما العقود فيرى جمهور الفقهاء أن الأصل فيها
      أن تكون منجزة وعلى وجه الخصوص في التمليكات والنكاح، وأجازوا التعليق في الطلاق بناء على قاعدة من ملك التنجيز ملك التعليق().
      \n\nومنهم من أجاز تعليق البيع في بعض صوره كالشافعية. \n\nومنهم من أجاز تعليق العقود بإطلاق كبعض الحنابلة. \n\nقال ابن
      القيم: إن تعليق العقود والفسوخ والتبرعات والالتزامات وغيرها بالشروط أمر قد تدعو إليه الضرورة أو الحاجة'
    - 'العلانية، ما لفلان هذا عليك ولا قبلك هذا المال الذي ادعاه، وهو كذا وكذا، ولا شيء منه. وللقاضي أن يزيد على هذا في التغليظ
      وينقص، وليس عندهم التغليظ بالزمان والمكان؛ لأن المقصود تعظيم المقسم به، وهو حاصل بدون ذلك. وفي إيجاب التغليظ حرج على
      القاضي. وهم مجمعون على أن من وجهت إليه اليمين لا يعتبر ناكلا إن أبى التغليظ(). \n\nالتحالف: \n\n27 - مصدر تحالف، ومن
      معانيه في اللغة: طلب كل من المتداعيين يمين الآخر. وهذا المعنى هو الموافق للشرع. غاية الأمر أن التحالف يكون أمام القضاء().
      \n\nوالمراد هنا حلف المتخاصمين في مجلس القضاء. \n\nإذا اختلف البائع والمشتري في مقدار الثمن أو المبيع أو'
