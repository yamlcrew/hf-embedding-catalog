  widget:
  - source_sentence: ما هي الأحكام القانونية التي يحكم بها الفقهاء على عقد "المضاربة" وما هو موقفهم منها؟
    sentences:
    - 'وأما ما يتصل بالإبضاع فإن الصيغة اللفظية قد تكون \n\nصريحة بلفظ الإبضاع، أو البضاعة، وقد تكون غير صريحة، كأن يقول:
      خذ هذا المال مضاربة، على أن يكون الربح كله لي. وهذه الصورة محل خلاف بين الفقهاء(). فذهب الحنابلة إلى أن هذا العقد لا
      يصح، واعتبروا ذلك من باب التناقض؛ لأن قوله: «مضاربة» يقتضي الشركة في الربح، وقوله: «الربح كله لي» يقتضي عدمها، فتناقض
      قوله، ففسدت المضاربة، ولأنه اشترط اختصاص أحدهما بالربح، وهذا شرط يناقض العقد ففسد، ولأن اللفظ الصريح في بابه لا يكون
      كناية في غيره، فالمضاربة لا تنقلب إبضاعا ولا قرضا. وعلى هذا اعتبروا هذا العقد مضاربة فاسدة(). \n\nوذهب الحنفية'
    - إن المضاربة رخصة يقتصر فيها على ما ورد، ويبقى ما عداه على الأصل من المنع، ولا يجوز اعتبار قيمة العرض رأس مال(). \n\nوعلل
      الشافعية عدم جواز المضاربة على عروض، بأن المضاربة عقد غرر، إذ العمل فيها غير مضبوط والربح غير موثوق به، وإنما جوزت للحاجة،
      فاختصت بما يروج غالبا وتسهل التجارة به وهو الأثمان() ولأن المقصود بالمضاربة رد رأس المال والاشتراك في الربح، ومتى عقد
      على غير الأثمان لم يحصل المقصود، لأنه ربما زادت قيمته، \n\nفيحتاج أن يصرف العامل جميع ما اكتسبه في رد مثله إن كان له
      مثل، وفي رد قيمته إن لم يكن له مثل، وفي هذا إضرار بالعامل، وربما نقصت قيمته فيصرف جزءا يسيرا من
    - 'المضاربة كذلك() \n\nما يتعلق بالعاقدين من الشروط: \n\n10 - يشترط في كل من طرفي عقد المضاربة - وهما رب المال والعامل
      - شروط لا بد منها لصحة المضاربة، وتفصيل ذلك فيما يلي: \n\nقال المالكية والشافعية: يشترط لصحة المضاربة أن تقع من أهل
      التصرف وهو الحر البالغ الرشيد الذي يصح منه التوكيل والتوكل، أي المتأهل لأن يوكل غيره ويتوكل لغيره، لأن العاقدين كل واحد
      منهما وكيل عن صاحبه وموكل لصاحبه، فمن جاز له أن يوكل ويتوكل جاز له عقد شركة المضاربة، ومن لا فلا، وعلى ذلك لا تصح المضاربة
      من عبد إلا بإذن سيده أو كان مأذونا له في التجارة، وكذا غيره من المحجور عليهم. \n\nوقال الرملي: ويجوز لولي'
    - 'في المضاربة : \n\n11 - المضاربة: عقد على الشركة في الربح بمال من أحد الجانبين، وعمل من الجانب الآخر، ولا مضاربة بدونهما.
      \n\nثم المدفوع إلى المضارب أمانة في يده؛ لأنه يتصرف فيه بأمر مالكه، لا على وجه البدل والوثيقة، وهو وكيل فيه، فإذا ربح
      فهو شريك فيه، وإذا فسدت انقلبت إجارة، واستوجب العامل أجر مثله، وإذا خالف كان غاصبا لوجود التعدي منه على مال غيره().
      \n\nوللتفصيل انظر مصطلح: (قراض، شركة). \n\n12 - هذا وقد سبق الكلام عن التعدي في الصدقة، والوصية، والأكل، والشرب، في
      مصطلح (إسراف). \n\nسابعا: التعدي على النفس وما دونها : \n\n13 - التعدي على الأبدان بما يوجب قصاصا أو غيره هو: قتل'
    - 'لا يتغابن به الناس في مثله وإن قال له: اعمل برأيك، ولو اشترى يصير مخالفا لأن المضاربة توكيل بالشراء، والتوكيل بالشراء
      مطلقا ينصرف إلى المتعارف، وهو ما يكون بمثل القيمة أو بما يتغابن الناس في مثله، ولأن الشراء بما لا يتغابن في مثله محاباة،
      والمحاباة تبرع، والتبرع لا يدخل في عقد المضاربة، هذا مذهب الحنفية(). \n\nوقال المالكية: للعامل أن يشارك بإذن رب المال،
      أو يخلط المال بماله أو بمال قراض عنده، وللعامل الإبضاع بإذن رب المال، وإذا شارك العامل في مال المضاربة غيره بغير إذن
      رب المال فإنه يضمن، لأن رب المال لم يستأمن غيره. \n\nولا يجوز للعامل أن يشتري سلعا للمضاربة بنسيئة وإن'
  - source_sentence: ما هي الآراء حول تحريم شرب الدخان وفقًا للمذاهب الإسلامية المختلفة؟
    sentences:
    - 'القول بإباحة شرب الدخان من الحنفية: الشيخ عبد الغني النابلسي، وقد ألف في إباحته رسالة سماها (الصلح بين الإخوان في إباحة
      شرب الدخان) ومنهم صاحب الدر المختار، وابن عابدين، والشيخ محمد العباسي المهدي صاحب الفتاوى المهدية، والحموي شارح الأشباه
      والنظائر. \n\nومن المالكية: علي الأجهوري، وله رسالة في إباحته سماها (غاية البيان لحل شرب \n\nما لا يغيب العقل من الدخان)
      ونقل فيها الإفتاء بحله عمن يعتمد عليه من أئمة المذاهب الأربعة، وتابعه على الحل أكثر المتأخرين من المالكية، ومنهم: الدسوقي،
      والصاوي، والأمير، وصاحب تهذيب الفروق. \n\nومن الشافعية: الحفني، والحلبي، والرشيدي، والشبراملسي،'
    - 'من ذلك. \n\nوعند الحنفية والمالكية: إن تعمد ذلك فعليه القضاء والكفارة. وعند الشافعية والحنابلة عليه القضاء فقط، إذ
      الكفارة عندهم تكون بالجماع فقط في نهار رمضان(). \n\nوكذلك يفطر الصائم بمضغ الدخان أو \n\nنشوقه، لأنه نوع من أنواع التكييف،
      ويصل طعمه للحلق، ويتكيف به الدماغ مثل تكيفه بالدخان الذي يمص بالعود. \n\nوهذا ما صرح به المالكية، وقواعد المذاهب الأخرى
      لا تأباه(). \n\nحق الزوج في منع زوجته من شرب الدخان: \n\n31 - يرى جمهور الفقهاء (الحنفية والمالكية وأحد وجهين عند الشافعية
      والحنابلة) أن للزوج منع زوجته من كل ما له رائحة كريهة، كالبصل والثوم، ومن ذلك شرب الدخان المعروف؛ لأن'
    - 'ابن عابدين، وأبو السعود، \n\nواللكنوي. \n\nومن المالكية: الشيخ يوسف الصفتي. \n\nومن الشافعية: الشرواني. \n\nومن الحنابلة:
      البهوتي، والرحيباني، وأحمد بن محمد المنقور التميمي(). \n\nواستدلوا بما يأتي: \n\n21 - أ - كراهة رائحته، فيكره قياسا
      على البصل النيء والثوم والكراث ونحوها. \n\n22 - ب - عدم ثبوت أدلة التحريم، فهي تورث الشك، ولا يحرم شيء بمجرد الشك، فيقتصر
      على الكراهة لما أورده القائلون بالحرمة(). \n\n\n\nحكم شرب الدخان في المساجد ومجالس القرآن والعلم والمحافل: \n\n23 -
      لا يجوز شرب الدخان في المساجد باتفاق، سواء قيل بإباحته أو كراهته أو تحريمه، قياسا على منع أكل الثوم والبصل في المساجد،'
    - 'إنه حرام، وقال آخرون: إنه مباح، وقال غيرهم: إنه مكروه. \n\nوبكل حكم من هذه الأحكام أفتى فريق من كل مذهب، وبيان ذلك
      فيما يلي: \n\nالقائلون بتحريمه وأدلتهم: \n\n5 - ذهب إلى القول بتحريم شرب الدخان من الحنفية: الشيخ الشرنبلالي، والمسيري،
      \n\nوصاحب الدر المنتقى، واستظهر ابن عابدين أنه مكروه تحريما عند الشيخ عبد الرحمن العمادي. \n\nوقال بتحريمه من المالكية:
      سالم السنهوري، وإبراهيم اللقاني، ومحمد بن عبد الكريم الفكون، وخالد بن أحمد، وابن حمدون وغيرهم. \n\nومن الشافعية: نجم
      الدين الغزي، والقليوبي، وابن علان، وغيرهم. \n\nومن الحنابلة الشيخ أحمد البهوتي، وبعض العلماء النجديين. \n\nومن هؤلاء'
    - 'بذلك، إلا أن قواعدهم كالحنفية في أن الدواء والتفكه لا يلزم الزوج(). \n\nحكم التداوي بالتبغ: \n\n33 - من القواعد العامة
      التي أجمع عليها الفقهاء أن الأشياء المحرمة النجسة المنصوص عليها كالخمر لا يجوز التداوي بها. \n\nأما ما لا نص فيه فإنه
      يختلف باختلاف اجتهاد الفقهاء. \n\nفمن قال بنجاسة الدخان وأنه يسكر كالخمر لا يجوز عنده التداوي به. \n\nلكنه عند جمهور
      الفقهاء طاهر ويجوز التداوي به، كما يؤخذ ذلك من نصوصهم. وهذا إذا كان يمكن التداوي به. \n\nقال الشيخ عليش المالكي: الدخان
      متمول، لأنه طاهر فيه منفعة شرعية لمن اختلت \n\nطبيعته باستعماله وصار له كالدواء، فهو كسائر العقاقير التي يتداوى بها'
  - source_sentence: Can you provide examples from early Islamic jurisprudence where the concept of "general" was used to
      override "specific"?
    sentences:
    - 'نوعين: عام وخاص. والعموم والخصوص هنا بالنسبة لأصل الصيغة كما سبق بيانه. \n\nأما العام فهو ما يبرأ به عن كل عين ودين
      وحق، وألفاظه كثيرة وللعرف فيها مدخل، على ما سبق. \n\nوقد صرح الحنفية بتفصيل لفكرة العموم والخصوص لم نقف على مثله صريحا
      عند غيرهم، إذ قال الحنفية: يستوي في العموم أن يكون على سبيل الإخبار، كما لو قال: هو بريء من حقي. وأن يكون على سبيل الإنشاء،
      كقوله: أبرأتك من حقي، على ما بحثه الشرنبلالي الحنفي(). \n\nأما الإبراء الخاص، فله عدة صور فيها عموم وخصوص تبعا لموضوع
      الإبراء: \n\nأ - إبراء خاص بدين خاص، كأبرأته من دين كذا، أو بدين عام، كأبرأته مما لي عليه. فيبرأ عن'
    - 'كرجل وفرس() . \n\nالألفاظ ذات الصلة : \n\nالعام : \n\n2 - العام في اللغة: الأمر الشامل المتعدد، سواء أكان الأمر لفظا
      أم غير لفظ؛ يقال عمهم الخير أو المطر: إذا شملهم، وأحاط بهم. \n\nوفي الاصطلاح: هو اللفظ المستغرق لجميع ما يصلح له، بوضع
      واحد من غير حصر() \n\nالحكم الإجمالي : \n\n3 - إذا ورد في النص لفظ خاص ثبت الحكم لمدلوله، ما لم يقم دليل على تأويله،
      وإرادة معنى آخر منه() . \n\nوإن تعارض الخاص مع العام بأن دل كل منهما على خلاف ما يدل عليه الآخر، فذهب الشافعية إلى أن
      الخاص يخصص العام، سواء علم أن الخاص متأخر عن العام، أم تقارنا، أم علم تأخره عن الخاص، أم جهل التاريخ() . \n\nوقال'
    - 'يتناول أفرادا مختلفة الحدود على سبيل البدل، مثل كلمة قرء فإنه مشترك يصدق على الحيض والطهر على سبيل البدل، وكذلك كلمة
      العين فإنها اسم للناظر وعين الشمس وعين الركبة وعين الماء، وللنقد \n\n\n\nمن المال، تطلق على كل واحد منها على سبيل البدل().
      \n\nالحكم الإجمالي: \n\n5 - ذهب جمهور الأصوليين إلى أن العام يوجب الحكم فيما يتناوله، فإذا ورد في النص لفظ عام ثبت الحكم
      لما يتناوله، ما لم يقم دليل على خلافه. \n\nواختلف الأصوليون فيما وراء ذلك من أحكام العموم، والتفصيل في الملحق الأصولي.
      \n\n\n\n\n\n\n\n\n \n\nعموم البلوى \n\nالتعريف: \n\n1 - من معاني العموم في اللغة: الشمول والتناول، يقال: عم المطر'
    - 'رغيفا لم يبر إلا بأكل الرغيف كله، وإن حلف ألا يأكله حنث بأكل بعضه(). \n\nقال الغزالي في المستصفى: وقد ذهب قوم: إلى
      أن الخاص والعام يتعارضان ويتدافعان، فيجوز أن يكون الخاص سابقا، وقد ورد العام بعده لإرادة العموم، فنسخ الخاص. ويجوز أن
      يكون العام سابقا وقد أريد به العموم، ثم نسخ باللفظ الخاص بعده. فعموم الرقبة مثلا يقتضي إجزاء الكافرة مهما أريد به العموم،
      والتقييد بالمؤمنة يقتضي منع إجزاء الكافرة، فهما متعارضان. وإذا أمكن النسخ والبيان جميعا فلم يتحكم بحمله على البيان دون
      النسخ؟ ولم يقطع بالحكم على العام بالخاص؟ ولعل العام هو المتأخر الذي أريد به العموم، وينسخ به الخاص،'
    - 'ولعل العام هو المتأخر الذي أريد به العموم، وينسخ به الخاص، وهذا هو الذي اختاره القاضي، والأصح عندنا: تقديم الخاص وإن
      كان ما ذكره \n\nالقاضي ممكنا، ولكن تقدير النسخ محتاج إلى الحكم بدخول الكافرة تحت اللفظ، ثم خروجه عنه، فهو إثبات وضع،
      ورفع بالتوهم، وإرادة الخاص باللفظ العام غالب معتاد، بل هو الأكثر، والنسخ كالنادر، فلا سبيل إلى تقديره بالتوهم، ويكاد
      يشهد لما ذكرناه من سير الصحابة والتابعين كثير، فإنهم كانوا يسارعون إلى الحكم بالخاص على العام، وما اشتغلوا بطلب التاريخ
      والتقدم والتأخر(). \n\nوقيل على الشذوذ: إنه يخصص من طريق المفهوم، فإن الرجال يقتضي مفهومه قتل غيرهم، فإذا لم'
  - source_sentence: ما هو الشرط في لفظ تولي وزارة التفويض وفقاً لما ورد في المقطع؟
    sentences:
    - 'ولاية تفتقر إلى عقد، والعقود لا تصح إلا بالقول الصريح غالبا، ونظرا لأهمية وزارة التفويض وخطورتها فلا يكفي فيها مجرد
      الإذن، بل لا بد من عقد معين صادر عن الخليفة لمن يكلفه. \n\nويتم تولية الوزارة بالألفاظ التي تشعر بمقصودها، وتمييزها
      عن غيرها كسائر الولايات لأن ولاية الوزارة من العقود العظيمة والأساسية التي لها خطرها وآثارها. مثل أن يقول له: وليتك
      الوزارة، أو وليتك وزارتي فيما إلي، أو استوزرتك. \n\nفإن أذن الخليفة لشخص بأحد شئون الدولة فلا يتم الانعقاد والتقليد
      حكما، وإن أمضاه الولاة عرفا، حتى يسند له الخليفة الوزارة بلفظ() لكن قال أبو يعلى: فقياس المذهب أنه يصح \n\nالتقليد'
    - 'أن تطلق نفسها ثلاثا في التوكيل والتمليك، وأما في الاختيار فليس لها أن تطلق نفسها أكثر من واحدة، إلا أن يجعل لها أكثر
      من ذلك، سواء جعله لها بلفظه، أو بنيته، وتقع رجعية() \n\n\n\nثالثا: التفويض في الوزارة: \n\nأنواع الوزارة: \n\n14 - يقسم
      الفقهاء الوزارة إلى ضربين: وزارة تفويض، ووزارة تنفيذ، وسيأتي الكلام على وزارة التنفيذ في (وزارة، وتنفيذ). \n\nتعريف
      وزارة التفويض: \n\n15 - وزارة التفويض هي أن يستوزر الإمام من يفوض إليه تدبير الأمور برأيه وإمضاءها على اجتهاده. \n\nمشروعيتها:
      \n\n16 - وزارة التفويض مشروعة   حكاية عن نبيه موسى : واجعل لي وزيرا من أهلي هارون أخي اشدد به أزري وأشركه في'
    - 'أخص فلم تنعقد به الوزارة، وإن اقتصر به على النيابة فقد أبهم ما استنابه فيه من عموم وخصوص أو تنفيذ وتفويض فلم تنعقد
      به الوزارة، وإذا جمع بينهما انعقدت وتمت. \n\nشروط وزارة التفويض: \n\n17 - يعتبر في تقليد وزارة التفويض، شروط الإمامة
      إلا النسب وحده. \n\nويزاد على الإمامة شرط، وهو أن يكون من أهل الكفاية فيما وكل إليه من أمر الحرب والخراج خبيرا بهما،
      فإنه مباشر لهما تارة بنفسه، وتارة يستنيب فيهما(). \n\nاختصاصات وزير التفويض: \n\n18 - لوزير التفويض اختصاصات واسعة فكل
      ما صح من الإمام صح من هذا الوزير إلا ثلاثة أشياء. \n\nأحدها: ولاية العهد فإن للإمام أن يعهد إلى من يرى وليس ذلك للوزير.'
    - 'أن يستوزر الإمام من يفوض إليه تدبير الأمور برأيه، وإمضاءها على اجتهاده(). \n\nوهي أصل الولايات والوظائف بعد الخلافة،
      لأن وزير التفويض ينظر في كل ما ينظر فيه الخليفة، فالخليفة هو الأصيل، ووزير التفويض يقوم مقامه. \n\nشروط وزارة التفويض:
      \n\n6 - يشترط في وزير التفويض ما يأتي() \n\nأ - الإسلام: يشترط في الوزير أن يكون مسلما، لأن الله تعالى أمر بطاعة أولي
      الأمر، والوزير منهم، واشترط القرآن الكريم أن يكون مسلما  :  أطيعوا الله وأطيعوا الرسول\n\nوأولي الأمر منكم() ومحل الشاهد  :
      منكم أي من المسلمين، ولأن المطلوب الطاعة في تنفيذ الأحكام الشرعية التي وردت في النصوص الشرعية في القرآن'
    - 'موسى : واجعل لي وزيرا من أهلي هارون أخي اشدد به أزري وأشركه في أمري() فإذا جاز ذلك في النبوة كان في الإمامة أولى، ولأن
      ما وكل إلى الإمام من تدبير الأمة لا يقدر على مباشرة جميعه إلا باستنابة، ونيابة الوزير المشارك له في التدبير أجدى في
      تنفيذ الأمور من تفرده بها، ليستظهر به على نفسه، وبها يكون أبعد من الزلل وأمنع من الخلل. \n\nقال الماوردي وأبو يعلى ما
      مفاده:() يشترط في لفظ تولية وزارة التفويض اشتماله على أمرين: \n\nأحدهما: عموم النظر، والثاني: \n\nالنيابة، فإن اقتصر
      على عموم النظر دون النيابة فكان بولاية العهد أخص فلم تنعقد به الوزارة، وإن اقتصر به على النيابة فقد أبهم ما'
  - source_sentence: Who were some of the scholars mentioned as having transmitted knowledge from Hammad ibn Abi Qatada?
    sentences:
    - 'تقدمت ترجمته في ج3 ص351. \n\n\n\nحماد بن أبي سليمان: \n\nتقدمت ترجمته في ج1 ص348. \n\nحماد بن زيد (98-179ه): \n\nهو
      حماد بن زيد بن درهم، أبو إسماعيل الأزدي البصري الجهضمي، قال أبو حاتم بن حبان: كان ضريرا، وكان يحفظ حديثه كله. روى عن
      أبان بن تغلب وإبراهيم بن عقبة والأزرق بن قيس وإسحاق بن سويد العدوي وأنس بن سيرين وغيرهم. روى عنه أحمد بن إبراهيم الموصلي
      وأحمد بن عبد الملك بن واقد وإسحاق بن عيسى بن الطباع والأسود بن عامر وبشر بن معاذ وغيرهم. قال عبد الرحمن بن مهدي: الأئمة
      في الحديث أربعة: الأوزاعي، ومالك بن أنس، وسفيان الثوري وحماد بن زيد. قال محمد بن سعد: حماد بن زيد بن درهم،'
    - 'بن أبي ثابت وغيرهم. وعنه ابن المبارك وحسين بن علي \n\nالجعفي وعبد الله بن صالح العجلي وأبو أحمد الزبيري وغيرهم. قال
      العجلي: ثقة، وقال أبو حنيفة: غلب حمزة الناس على القرآن والفرائض. وقال الثوري: ما قرأ حمزة حرفا من كتاب الله إلا بأثر.
      قال ابن حجر: انعقد الإجماع على تلقي قراءته بالقبول. لكن نقل صاحب المغني (1/492 ط 3) عن أحمد أنه كان يكره قراءة حمزة
      والكسائي لما فيها من الكسر والإدغام والتكلف وزيادة المد. (تهذيب التهذيب 3/27، وميزان الاعتدال 1/605، ووفيات الأعيان
      1/167، والأعلام 2/308). \n\nخ \n\nخباب بن الأرت (؟ - 37 ه): \n\nهو خباب بن الأرت بن جندلة بن سعد، أبو يحيى أو أبو عبد'
    - 'حماد بن أبي سليمان.\n\n\n\nحماد بن أبي سليمان \n\nتقدمت ترجمته في ج1 ص348.\n\n\n\nحمديس (230-289 ه): \n\nهو أحمد بن
      محمد الأشعري، أبو جعفر، المعروف بحمديس القطان، يقال إنه من ذرية أبي موسى الأشعري، فقيه مالكي، من أصحاب سحنون، كان علما
      في الفضل ومثلا في الخير مع صلابة شديدة في مذاهب أهل السنة، وكان ورعا كاملا ثقة مأمونا مجانبا لأهل الأهواء والسلطان،
      رحل فلقي بالمدينة أبا مصعب وغيره، وبمصر أصحاب ابن القاسم، وابن وهب وأشهب، وأخذ عنه جماعة منهم ابن اللباد، والأبياني.
      \n\n(قضاة قرطبة وعلماء إفريقية ص197، ترتيب المدارك 2\\254، الديباج المذهب 1\\48، شجرة النور الزكية ص70). \n\nالحناطي:
      هو'
    - '179 ه) \n\nهو حماد بن زيد بن درهم، أبو \n\nإسماعيل، الأزدي الجهضمي البصري، شيخ العراق في عصره. من حفاظ الحديث المجودين.
      روى عن ثابت البناني، وأنس بن سيرين، وعبد العزيز بن صهيب، وعاصم الأحول، وصالح بن كيسان، وغيرهم. وعنه ابن المبارك، وابن
      وهب، وابن عيينة، والثوري، وهو أكبر منه، ومسلم بن إبراهيم وغيرهم. قال ابن مهدي: أئمة الناس في زمانهم أربعة: الثوري، ومالك،
      والأوزاعي، وحماد بن زيد. وقال يحيى بن معين: ليس أحد أثبت من حماد بن زيد، وقال يحيى بن يحيى: ما رأيت شيخا أحفظ منه. وقال
      أحمد بن حنبل: هو من أئمة المسلمين من أهل الدين، وهو أحب إلي من حماد بن سلمة، يحفظ أربعة آلاف حديث،'
    - 'له الأوزاعي وغيره. وكان فيه تشيع لم يظهر منه. ورمي بالتدليس. وهو ثقة. \n\n(تهذيب التهذيب 2\\432). \n\nالحليمي: تقدمت
      ترجمته في ج 1 ص 348. \n\nحماد (؟ - 167 ه) \n\nهو حماد بن سلمة بن دينار، أبو سلمة، مولى تميم. مفتي أهل البصرة، أحد رجال
      الحديث. كان إماما في العربية فقيها وفصيحا مفوها مقرئا، شديدا على المبتدعة. قد احتج به مسلم في أحاديث عدة في الأصول وتحايده
      البخاري. \n\nروى عن ثابت البناني وقتادة وخاله حميد الطويل وآخرين. وروى عنه ابن جريج والثوري وشعبة وآخرون. \n\nمن تصانيفه:
      «العوالي في الحديث»، و «كتاب السنن». \n\n(ميزان الاعتدال 1\\590، وتهذيب التهذيب 3\\11، وهدية العارفين 5\\334،'
