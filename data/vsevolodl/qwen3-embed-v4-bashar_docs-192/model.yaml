  base_model: Qwen/Qwen3-Embedding-0.6B
  widget:
  - source_sentence: Under what circumstances can a judge's ruling from a place of wrongdoers be executed, according to Islamic
      law?
    sentences:
    - 'بالتصرف دون صاحبه(). \n\nأما الوصايا التي يجوز تنفيذها والتي لا يجوز تنفيذها، وشروط الموصي والوصي فيرجع لمعرفة ذلك
      إلى مصطلح «وصية». \n\nتنفيذ حكم قاضي البغاة: \n\n9 - لا خلاف بين الفقهاء  في أنه لو ظهر أهل البغي على بلد فولوا قاضيا
      منهم، فرفع حكمه إلى قاضي أهل العدل نفذ من أحكامه ما ينفذ من أحكام قاضي أهل العدل بشروط هي: \n\nأ - أن يكون لهم تأويل
      غير ظاهر البطلان، فإن لم يكن لهم تأويل فلا ينفذ أحكام قاضيهم. وقال المالكية: فإن لم يكن لهم تأويل فيتعقب أحكامه، فما
      وجد منها صوابا مضى، وما ليس كذلك رد. \n\nب - ألا يكون ممن يستبيحون دماء أهل العدل وأموالهم، فإن كانوا كذلك لا تنفذ'
    - '(زكاة الفطر). \n\nج - العشور: \n\n13 - ذهب المالكية والحنابلة إلى عدم جواز \n\nالتحول عن الواجب إلى البدل في العشور().
      \n\nوذهب الحنفية إلى جواز التحول عن الواجب إلى البدل في العشور، وذلك للأدلة التي سبق ذكرها، وكذلك يجوز التحول من الواجب
      إلى الأعلى فقط عند الشافعية إذا كانت الحبوب والثمار نوعا واحدا. \n\nوإن اختلفت الأنواع: أخذ الواجب من كل نوع بالحصة
      إن لم يتعسر، فإن عسر أخذ الواجب من كل نوع بأن كثرت، وقل ثمرها ففيه أوجه: \n\nالوجه الأول، وهو الصحيح: أنه يخرج من الوسط
      رعاية للجانبين(). \n\nوالثاني: يؤخذ من كل نوع بقسطه. \n\nوالثالث: من الغالب، وقيل: يؤخذ الوسط قطعا(). \n\nوفي الموضوع'
    - 'ومعه أكثر العلماء() حيث لم يعدوا الموالي من الآل. أما أزواجه  فذكر أبو الحسن بن بطال في شرح البخاري أن الفقهاء كافة
      اتفقوا على أن أزواجه   لا يدخلن في آله الذين حرمت عليهم الصدقة،() لكن في المغني عن عائشة  ما يخالف ذلك. قال: روى الخلال
      بإسناده \n\nعن ابن أبي مليكة أن خالد بن سعيد بن العاص بعث إلى عائشة  سفرة من الصدقة، فردتها، وقالت: إنا آل محمد لا تحل
      لنا الصدقة. قال صاحب المغني: وهذا يدل على أنهن من أهل بيته في تحريم الزكاة. وذكر الشيخ تقي الدين أنه يحرم عليهن الصدقة
      وأنهن من أهل بيته في أصح الروايتين(). \n\nحكم أخذ آل البيت من الصدقة المفروضة: \n\n6 - إن آل محمد'
  - source_sentence: According to which school of thought does the contract become valid if it specifies planting and sowing
      but does not mention the quantity?
    sentences:
    - 'وضع الاسم العلم للمولود وغيره، وبمعنى: تحديد العوض في العقود، \n\nكالمهر والأجرة والثمن، وبمعنى: التعيين بالاسم مقابل
      الإبهام. \n\nالألفاظ ذات الصلة: \n\nأ - التكنية: \n\n2 - التكنية مصدر: كنى بتشديد النون، أي: جعل له كنية، كأبي فلان
      وأم فلان() \n\nوتفصيل الأحكام المتعلقة بالتكنية ينظر في مصطلح (كنية). \n\nب - التلقيب: \n\n3 - التلقيب: مصدر لقب بتشديد
      القاف. واللقب واحد الألقاب، وهو ما كان مشعرا بمدح أو ذم. \n\nومعناه: النبز بالتمييز(). والنبز بالألقاب المكروهة منهي
      عنه في  :  ولا تنابزوا بالألقاب(). \n\nفإن قصد به التعريف فلا يدخل تحت النهي، ومن ذلك تعريف بعض الأئمة المتقدمين، كالأعمش'
    - 'من كتب الفقه وفي مصطلح (إقرار) \n\nالتناقض في الشهادة: \n\n6 - لا يخلو التناقض في شهادة الشهود من أحد ثلاثة أحوال:
      \n\nأ - التناقض في الشهادة قبل الحكم: \n\nإذا حصل التناقض في الشهادة برجوع الشهود() عن كل أو بعض شهادتهم بعد أداء الشهادة
      وقبل الحكم بحضور القاضي تكون شهادتهم كأن لم تكن، ولا يصح الحكم بموجب \n\nشهادتهم؛ لأن الشهود لما أكذبوا أنفسهم بالرجوع
      تناقض كلامهم، والقضاء بالكلام المتناقض لا يجوز؛ لأنه لا يدري أصدقوا في الأول أم في الثاني، \n\nوهذا قول عامة أهل العلم.
      \n\nوقال أبو ثور: يحكم بموجب هذه الشهادة؛ لأنها قد أديت فلا تبطل برجوع من شهد بها كما لو رجع الشهود بعد الحكم().'
    - 'يضر بالأرض. \n\nأما إذا قال له: آجرتكها لتزرعها أو تغرسها، فإنه لا يصح؛ لأنه لم يعين أحدهما، فوجدت جهالة. \n\nوإذا
      قال له: آجرتك لتزرعها وتغرسها، صح العقد عند الحنابلة، وله أن يزرعها كلها ما شاء، أو أن يغرسها كلها ما شاء. وفي قول عند
      الشافعية: يصح، وله أن يزرع النصف، ويغرس النصف؛ لأن الجمع يقتضي التسوية. وفي القول الثاني: لا يصح؛ لأنه لم يبين المقدار
      من كل واحد منها. \n\nأما إن أطلق، وقال: آجرتك لتنتفع بها ما شئت، فله الزرع والغرس والبناء عند الحنابلة، للإطلاق. وللشافعية
      في الأرض التي لا ماء لها، ولم يذكر أنه يكتريها للزراعة، وجهان: \n\nأحدهما: لا يصح، لأن الأرض عادة تكترى'
  - source_sentence: من هو رجل بريرة الذي كانت زوجته له قد اعتقت؟
    sentences:
    - أهل العلم على أنه إذا عتقت الأمة - وزوجها عبد - فلها الخيار في فسخ النكاح لخبر بريرة . قالت عائشة  «كاتبت بريرة فخيرها
      رسول الله  في زوجها، وكان عبدا فاختارت نفسها»(). ولأن \n\nعليها ضررا في كونها حرة تحت عبد. \n\nواختلفوا فيما إذا عتقت
      وزوجها حر، فالجمهور على أنه لا خيار لها، لأنها كافأت زوجها في الكمال، فلم يثبت لها الخيار. \n\nوذهب طاوس وابن سيرين
      ومجاهد والنخعي والثوري والحنفية إلى أن لها الخيار. واستدلوا بما روي في حديث بريرة أن زوجها كان حرا، كما رواه النسائي
      في سننه(). \n\nوأجمع الفقهاء على بقاء نكاح الكتابية التي أسلم زوجها، سواء قبل الدخول أو بعده، لأن للمسلم أن يبتدئ
    - 'قال: إن أقل التعزير ليس مقدرا فيرجع فيه إلى اجتهاد الإمام أو الحاكم فيما يراه وما تقتضيه حال الشخص(). \n\nج - التعزير
      بالحبس : \n\n16 - الحبس مشروع بالكتاب والسنة والإجماع \n\nأما الكتاب فقوله تعالى:  واللاتي يأتين الفاحشة من نسائكم فاستشهدوا
      عليهن أربعة منكم فإن شهدوا فأمسكوهن في البيوت حتى يتوفاهن الموت أو يجعل الله لهن سبيلا() وقوله:  إنما جزاء الذين يحاربون
      الله ورسوله ويسعون في الأرض فسادا أن يقتلوا أو يصلبوا أو تقطع أيديهم وأرجلهم من خلاف أو ينفوا من الأرض(). فقد قال الزيلعي:
      إن المقصود بالنفي هنا الحبس. \n\nوأما السنة فقد ثبت: «أن الرسول  حبس بالمدينة أناسا في تهمة دم،'
    - 'واختلاف الفقهاء في ذلك يرجع إليه في مصطلح: (قضاء). \n\nحرمان الوارث من الميراث بالتهمة: \n\n12 - لا خلاف بين الفقهاء  في
      حرمان القاتل عمدا عدوانا من الميراث. واختلفوا في توريث القاتل خطأ أو القاتل بحق. فذهب البعض إلى حرمانهما، وذلك لتهمة
      استعجال الإرث قبل أوانه. \n\nوالتفصيل: في مصطلح: (إرث). \n\nعدم وقوع طلاق المطلق في مرض الموت: \n\n13 - لا يقع طلاق
      المريض مرض الموت عند فريق من الفقهاء لتهمة قصد إضرار الزوجة بحرمانها الميراث. \n\nوانظر للتفصيل مصطلح: (طلاق). \n\nالتعزير
      بالتهمة: \n\n14 - لا خلاف بين الفقهاء  في أن الحدود لا تقام بالتهمة. \n\nأما التعزير بالتهمة فقد ذهب الحنفية'
  - source_sentence: هل يمكن اعتبار الإبراء كإسقاط، أم أنه يجب النظر إليه كتمليك، وفقًا للآراء المختلفة بين المدارس القانونية؟
    sentences:
    - 'الملك. \n\nونقل القاضي زكريا عن النووي في الروضة قوله: المختار أن كون الإبراء تمليكا أو إسقاطا من المسائل التي لا يطلق
      فيها ترجيح، بل يختلف الراجح بحسب المسائل، لقوة الدليل وضعفه؛ لأن الإبراء إنما يكون تمليكا باعتبار أن الدين مال، وهو
      إنما يكون مالا في حق من له الدين، فإن أحكام المالية إنما تظهر في حقه. \n\nومما غلب فيه معنى التمليك عند المالكية ترجيحهم
      اشتراط القبول في الإبراء، كما سيأتي(). \n\nعلى أن هناك ما يصلح بالاعتبارين (الإسقاط والتمليك بالتساوي). ومنه ما نص عليه
      الحنفية أنه لو أبرأ الوارث مدين مورثه غير عالم بموته، ثم بان ميتا، فبالنظر إلى أنه إسقاط يصح، وكذا بالنظر'
    - 'الراء له عدد من المعاني منها: إلزام الشيء والتزامه. وأما بفتح الراء \n\nفمعناه العلامة، ويجمع على أشراط كسبب وأسباب.
      \n\nومعناه في الاصطلاح كما قال الحموي: التزام أمر لم يوجد في أمر وجد بصيغة مخصوصة(). \n\nوهو يشبه التقييد لما فيه من
      الالتزام. \n\nالحكم الإجمالي: \n\n7 - ذكر الأصوليون والفقهاء الأحكام الخاصة بمصطلح تقييد في عدد من المواطن، ومن أشهر
      مسائله عند الأصوليين مسألة حمل المطلق على المقيد، ومما قالوه في ذلك أن المطلق والمقيد إما أن يختلفا في السبب والحكم،
      وإما أن يتفقا فيهما، وإما أن يختلفا في السبب دون الحكم، فإن كان الأول فلا حمل اتفاقا، كما قال الآمر لمن تلزمه طاعته:'
    - 'يضر بالأرض. \n\nأما إذا قال له: آجرتكها لتزرعها أو تغرسها، فإنه لا يصح؛ لأنه لم يعين أحدهما، فوجدت جهالة. \n\nوإذا
      قال له: آجرتك لتزرعها وتغرسها، صح العقد عند الحنابلة، وله أن يزرعها كلها ما شاء، أو أن يغرسها كلها ما شاء. وفي قول عند
      الشافعية: يصح، وله أن يزرع النصف، ويغرس النصف؛ لأن الجمع يقتضي التسوية. وفي القول الثاني: لا يصح؛ لأنه لم يبين المقدار
      من كل واحد منها. \n\nأما إن أطلق، وقال: آجرتك لتنتفع بها ما شئت، فله الزرع والغرس والبناء عند الحنابلة، للإطلاق. وللشافعية
      في الأرض التي لا ماء لها، ولم يذكر أنه يكتريها للزراعة، وجهان: \n\nأحدهما: لا يصح، لأن الأرض عادة تكترى'
  - source_sentence: ما هي الأماكن الأخرى المهمة داخل حدود الحرم المكي الشريف؟
    sentences:
    - 'الملك. \n\nونقل القاضي زكريا عن النووي في الروضة قوله: المختار أن كون الإبراء تمليكا أو إسقاطا من المسائل التي لا يطلق
      فيها ترجيح، بل يختلف الراجح بحسب المسائل، لقوة الدليل وضعفه؛ لأن الإبراء إنما يكون تمليكا باعتبار أن الدين مال، وهو
      إنما يكون مالا في حق من له الدين، فإن أحكام المالية إنما تظهر في حقه. \n\nومما غلب فيه معنى التمليك عند المالكية ترجيحهم
      اشتراط القبول في الإبراء، كما سيأتي(). \n\nعلى أن هناك ما يصلح بالاعتبارين (الإسقاط والتمليك بالتساوي). ومنه ما نص عليه
      الحنفية أنه لو أبرأ الوارث مدين مورثه غير عالم بموته، ثم بان ميتا، فبالنظر إلى أنه إسقاط يصح، وكذا بالنظر'
    - 'نظيفا»() وذكر القاضي في حديث ابن عباس في «غسل النبي  قال فجففوه بثوب»(). \n\nوللتفصيل ينظر (ر: تكفين). \n\nالتنعيم
      \n\nالتعريف: \n\n1 - التنعيم موضع في الحل في شمال مكة الغربي، وهو حد الحرم من جهة المدينة المنورة. \n\nقال الفاسي: المسافة
      بين باب العمرة وبين أعلام الحرم في هذه الجهة التي في الأرض لا التي على الجبل اثنا عشر ألف ذراع وأربعمائة ذراع وعشرون
      ذراعا بذراع اليد(). \n\nوإنما سمي التنعيم بهذا الاسم لأن الجبل الذي عن يمين الداخل يقال له ناعم والذي عن اليسار يقال
      له منعم أو نعيم والوادي نعمان(). \n\nالأحكام المتعلقة بالتنعيم: \n\n2 - أجمع الفقهاء على أن المعتمر المكي لا بد له من'
    - 'كفارا، ولم ينكر النبي  ذلك عليه(). \n\nأخذ الأجرة على التعاويذ والرقى: \n\n28 - ذهب جمهور الفقهاء إلى جواز أخذ الأجرة
      على التعاويذ والرقى، وإليه ذهب عطاء، وأبو قلابة، وأبو ثور، وإسحاق، واستدلوا بحديث أبي سعيد الخدري  الذي سبق ذكره (ف
      - 14) واستدل الطحاوي للجواز وقال: يجوز أخذ الأجر على الرقى، لأنه ليس على الناس أن يرقي بعضهم بعضا؛ لأن في ذلك تبليغا
      عن الله تعالى. وكره الزهري أخذ الأجرة على القرآن مطلقا، سواء أكان للتعليم أو للرقية(). \n\n\n\nتعويض \n\nالتعريف: \n\n1
