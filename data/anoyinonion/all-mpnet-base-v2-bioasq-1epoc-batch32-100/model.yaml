widgetData:
- source_sentence: We employed genetic, cytological, and genomic approaches to better understand the role of PR-Set7 and H4K20
    methylation in regulating DNA replication and genome stability in Drosophila cells. Thus, coordinating the status of H4K20
    methylation is pivotal for the proper selection of DNA replication origins in higher eukaryotes. The methylation state
    of lysine 20 on histone H4 (H4K20) has been linked to chromatin compaction, transcription, DNA repair and DNA replication.
    Histone turnover is often associated with various histone modifications such as H3K56 acetylation (H3K56Ac), H3K36 methylation
    (H3K36me), and H4K20 methylation (H4K20me). We review the signaling pathways and functions associated with a single residue,
    H4K20, as a model chromatin and clinically important mark that regulates biological processes ranging from the DNA damage
    response and DNA replication to gene expression and silencing. <CopyrightInformation>© 2016 by The American Society for
    Biochemistry and Molecular Biology, Inc.</C In particular, the methylation states of H3K4, H3K36 and H4K20 have been associated
    with establishing active, repressed or poised origins depending on the timing and extent of methylation. 5BrC and 5ClC
    may cause aberrant methylation of cytosine during DNA replication and mimic the endogenous methylation signal associated
    with gene silencing.
  sentences:
  - Is H4K20 methylation associated with DNA replication?
  - What is the function of the protein Cuf1?
  - Which syndromes are associated with heterochromia iridum?
- source_sentence: 'The Abbreviated Injury Scale (AIS) is an objective anatomically-based injury severity scoring system that
    classifies each injury by body region on a 6 point scale. AIS is the system used to determine the Injury Severity Score
    (ISS) of the multiply injured trauma patient.


    AIS CLASSIFICATIONS

    The AIS classifies individual injuries by body region as follows:

    AIS 1 – Minor

    AIS 2 – Moderate

    AIS 3 – Serious

    AIS 4 – Severe

    AIS 5 – Critical

    AIS 6 – Maximal (currently untreatable)'
  sentences:
  - What is the role of the Hof1-Cyk3 interaction in yeast?
  - Which drugs are included in the MAID chemotherapy regimen for sarcoma?
  - What is Abbreviated Injury Scale (AIS) used to determine?
- source_sentence: Multicluster Pcdh diversity is required for mouse olfactory neural circuit assembly. The vertebrate clustered
    protocadherin (Pcdh) cell surface proteins are encoded by three closely linked gene clusters (Pcdhα, Pcdhβ, and Pcdhγ).
    Although deletion of individual Pcdh clusters had subtle phenotypic consequences, the loss of all three clusters (tricluster
    deletion) led to a severe axonal arborization defect and loss of self-avoidance.
  sentences:
  - Does thyroid hormone affect cardiac remodeling?
  - What are the effects of the deletion of all three Pcdh clusters (tricluster deletion) in mice?
  - Which R/bioconductor package has been developed to aid in epigenomic analysis?
- source_sentence: Huntington disease (HD; OMIM 143100), a progressive neurodegenerative disorder, is caused by an expanded
    trinucleotide CAG (polyQ) motif in the HTT gene. Mutations of the huntingtin protein (HTT) gene underlie both adult-onset
    and juvenile forms of Huntington's disease (HD).
  sentences:
  - What is resistin?
  - Does thyroid hormone signaling affect microRNAs expression in the heart?
  - What gene is mutated in Huntington's disease?
- source_sentence: Nusinersen is a modified antisense oligonucleotide that binds to a specific sequence in the intron, downstream
    of exon 7 on the pre-messenger ribonucleic acid (pre-mRNA) of the SMN2 gene. This modulates the splicing of the SMN2 mRNA
    transcript to include exon 7, thereby increasing the production of full-length SMN protein. It is approved for treatment
    of  spinal muscular atrophy.
  sentences:
  - Describe mechanism of action of Nusinersen.
  - What is Mobilome-seq?
  - What percentage of currently available drugs are metabolized by CYP3A4?
