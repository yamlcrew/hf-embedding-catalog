  - source_sentence: What are some popular attractions that draw millions of visitors to the Midwest's biggest city on the
      western shore of Lake Michigan?
    sentences:
    - "The 100-step climb to the top of Cana Island Lighthouse in Bailey's Harbor rewards visitors with some of the best views\
      \ of Lake Michigan's Door County shoreline. Walk along the rock-ledge shore for great photo ops of the 1870s-era lighthouse,\
      \ or stack stones and leave a little statue behind (it's tradition). All along the peninsula, roadside cherry stands,\
      \ state parks and small towns keep visitors coming back.\n\n There's peaceful pleasure in wending along the hilly two-lane\
      \ highways and pausing at gems like Hands On Art Studio in Fish Creek and Savory Spoon Cooking School in Ellison Bay.\
      \ Sit under the stars and enjoy an evening production at Peninsula Players Theatre south of Fish Creek.\n\nTop Things\
      \ to Do in Door County\n\n\n \n03\nof 25"
    - "If you're going to while away the summer on a front porch, why not go to the biggest one of them all, at Mackinac Island's\
      \ iconic Grand Hotel? (Even if you don't want to pay for a room, at least walk by for a peek at this white-columned\
      \ landmark.) Most visitors come to this no-cars-allowed island for leisurely carriage rides and fudge-munching, but\
      \ if you leave the downtown area, you'll find yourself in one of Michigan's prettiest state parks, where a 70-mile trail\
      \ network winds through woods and limestone outcroppings.\n\n\n \n05\nof 25\n\n\n  Indianapolis  \n \n\n\n\n\n\n \n\
      \ Jason Lavengood/Visit Indy"
    - "John Noltner\n\n On the western shore of Lake Michigan, the Midwest's biggest city blends outdoor recreation and cosmopolitan\
      \ luxuries. Millions visit each year to shop the Magnificent Mile, explore Millennium Park and cheer on one of the pro\
      \ sports home teams. Jazz clubs and theaters keep the party going into the night."
  - source_sentence: What types of animals can be seen near the Wildlife Loop Road at Custer State Park?
    sentences:
    - "We have one answer for anyone who says the Midwest is flat: Ohio's Hocking Hills. Here, just 55 miles southeast of\
      \ Columbus, cornfields give way to Appalachia. Hocking Hills State Park encompasses some of the best scenery, including\
      \ Ash Cave, a rock shelf that soars 90 feet above the trail. Other outdoor adventures include a zipline canopy tour,\
      \ the 17-mile bikeway between Nelsonville and Athens and tube floats on the Hocking River.\n\n\n \n02\nof 25\n\n\n \
      \ Door County, Wisconsin  \n \n\n\n\n\n\n \n Greg Scheidemann"
    - "Family Travel\n \n\n Road Rally\n \n\n View All\n \n\n\n\n\n\nDestinations\n\n\n\n\n\n\n\n\n\n\n\nDestinations\n\n\n\
