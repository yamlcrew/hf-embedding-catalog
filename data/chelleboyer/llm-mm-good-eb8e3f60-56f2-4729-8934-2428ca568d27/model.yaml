widgetData:
- source_sentence: What are the key contributions of Shen and Wan (2023) in the field of reference-free evaluation?
  sentences:
  - may be constrained by the quality and variety of the reference data.
  - 'Springer.







    Tyen et al. (2023)


    Gladys Tyen, Hassan Mansoor, Peter Chen, Tony Mak, and Victor Cărbune. 2023.



    LLMs cannot find reasoning errors, but can correct them!



    arXiv preprint arXiv:2311.08516 (2023).







    Valmeekam et al. (2023)


    Karthik Valmeekam, Matthew Marquez, and Subbarao Kambhampati. 2023.



    Can large language models really improve by self-critiquing their own plans?



    arXiv preprint arXiv:2310.08118 (2023).







    Verga et al. (2024)


    Pat Verga, Sebastian Hofstatter, Sophia Althammer, Yixuan Su, Aleksandra Piktus, Arkady Arkhangorodsky, Minjie Xu, Naomi
    White, and Patrick Lewis. 2024.'
  - 'Reference-Free Evaluation (Shen and Wan, 2023; Zheng et al., 2023a; He et al., 2023b):'
- source_sentence: What role do LLM judges play in the iterative refinement process described in the context?
  sentences:
  - 'Gopalakrishnan et al. (2023)


    Karthik Gopalakrishnan, Behnam Hedayatnia, Qinlang Chen, Anna Gottardi, Sanjeev Kwatra, Anu Venkatesh, Raefer Gabriel,
    and Dilek Hakkani-Tur. 2023.



    Topical-chat: Towards knowledge-grounded open-domain conversations.



    arXiv preprint arXiv:2308.11995 (2023).







    Guan et al. (2021)


    Jian Guan, Zhexin Zhang, Zhuoer Feng, Zitao Liu, Wenbiao Ding, Xiaoxi Mao, Changjie Fan, and Minlie Huang. 2021.



    OpenMEVA: A benchmark for evaluating open-ended story generation metrics.



    arXiv preprint arXiv:2105.08920 (2021).







    Guo et al. (2024)'
  - 'Li et al. (2023c)


    Junlong Li, Shichao Sun, Weizhe Yuan, Run-Ze Fan, Hai Zhao, and Pengfei Liu. 2023c.



    Generative judge for evaluating alignment.



    arXiv preprint arXiv:2310.05470 (2023).







    Li et al. (2023a)


    Qintong Li, Leyang Cui, Lingpeng Kong, and Wei Bi. 2023a.



    Collaborative Evaluation: Exploring the Synergy of Large Language Models and Humans for Open-ended Generation Evaluation.



    arXiv preprint arXiv:2310.19740 (2023).







    Li et al. (2023b)


    Ruosen Li, Teerth Patel, and Xinya Du. 2023b.



    Prd: Peer rank and discussion improve large language model based evaluations.



    arXiv preprint arXiv:2307.02762 (2023).







    Li et al. (2017)'
  - '3.2.3. Feedback for Refinement


    After receiving the initial response, LLM judges provide actionable feedback to iteratively improve output quality. By
    analyzing the response based on specific task criteria, such as accuracy, coherence, or creativity, the LLM can identify
    weaknesses in the output and offer suggestions for improvement. This iterative refinement process plays a crucial role
    in applications that require adaptability (Madaan et al., 2024; Paul et al., 2023; Chen et al., 2023a; Xu et al., 2023c;
    Huang et al., 2023).'
- source_sentence: What metrics does the LLMS (2025) framework introduce to investigate position bias in pairwise comparisons?
  sentences:
  - '6.2. Metric


    The evaluation of LLMs-as-Judges models centers around assessing the extent to which the model’s judgments align with
    human evaluations, which are typically considered the benchmark for quality. Given the complexity and subjectivity of
    many evaluation tasks, achieving high agreement with human ratings is a key indicator of the LLM’s performance. To quantify
    this agreement, a range of statistical metrics is employed. Below, we outline these metrics and their applications in
    evaluating LLMs-as-Judges models.




    6.2.1. Accuracy'
  - 'Recent studies have further examined position bias in the LLMs-as-judges context.

    For instance, a framework (LLMS, 2025) is proposed to investigate position bias in pairwise comparisons, introducing metrics
    such as repetition stability, position consistency, and preference fairness to better understand how positions affect
    LLM judgments.

    Another study (Zheng et al., 2023a) explores the limitations of LLMs-as-judges, including position biases, and verifies
    agreement between LLM judgments and human preferences across multiple benchmarks.

    These findings underscore the need for robust debiasing strategies to enhance the fairness and reliableness of LLMs-as-judges.'
  - Current LLM-as-Judge systems primarily focus on processing textual data, with limited attention to integrating other modalities
    like images, audio, and video. This single-modal approach falls short in complex scenarios requiring multimodal analysis,
    such as combining visual and textual information in medical assessments. Future systems should develop cross-modal integration
    capabilities to process and evaluate multimodal data simultaneously (Chen et al., 2024b). Leveraging cross-modal validation
    can enhance evaluation accuracy. Key research areas include efficient multimodal feature extraction, integration, and
    the design of unified frameworks for more comprehensive and precise evaluations.
- source_sentence: How does the work by Jiefeng Chen et al. (2023c) propose to improve selective prediction in large language
    models?
  sentences:
  - Overconfidence bias (Khan et al., 2024; Jung et al., 2024) in the context of LLMs-as-judges refers to the tendency of
    models to exhibit an inflated level of confidence in their judgments, often resulting in overly assertive evaluations
    that may not accurately reflect the true reliability of the answer. This bias is particularly concerning in evaluative
    contexts, as it can lead LLMs-as-judges to overstate the correctness of certain outputs, compromising the objectivity
    and dependability of assessments.
  - "[Biases (§7.1)\n[Presentation-Related \n(§7.1.1)\n[Position bias (Blunch, 1984; Raghubir and Valenzuela, 2006; Ko et al.,\
    \ 2020; Wang et al., 2018; LLMS, 2025; Zheng et al., 2023a; Chen et al., 2024a; Wang et al., 2023b; Li et al., 2023c;\
    \ Zheng et al., 2023b; Raina et al., 2024; Hou et al., 2024; Li et al., 2023d, b; Khan et al., 2024; Zhou et al., 2023a;\
    \ Li et al., 2024a; Shi et al., 2024a; Stureborg et al., 2024; Zhao et al., 2024a), Verbosity bias (Nasrabadi, 2024; Ye\
    \ et al., 2024b, a), leaf, text width=41em] ]\n[Social-Related (§7.1.2)"
  - 'Journal of Natural Language Processing 30, 1 (2023), 243–249.







    Chen et al. (2024e)


    Junjie Chen, Weihang Su, Zhumin Chu, Haitao Li, Qinyao Ai, Yiqun Liu, Min Zhang, and Shaoping Ma. 2024e.



    An Automatic and Cost-Efficient Peer-Review Framework for Language Generation Evaluation.





    arXiv:2410.12265 [cs.CL]


    https://arxiv.org/abs/2410.12265




    Chen et al. (2023c)


    Jiefeng Chen, Jinsung Yoon, Sayna Ebrahimi, Sercan O Arik, Tomas Pfister, and Somesh Jha. 2023c.



    Adaptation with self-evaluation to improve selective prediction in llms.



    arXiv preprint arXiv:2310.11689 (2023).







    Chen et al. (2024d)'
- source_sentence: How do Dong et al. (2022) contribute to the understanding of in-context learning in their survey?
  sentences:
  - Additionally, the LLMAAA (Zhang et al., 2023a) framework incorporates an active learning strategy to efficiently select
    high-information samples for annotation, thereby mitigating the effects of noisy labels and reducing the reliance on costly
    human annotation. These approach not only enhance the performance of task-specific models but also offer new perspectives
    on the efficient application of LLMs in annotation workflows.
  - 'Dong et al. (2024a)


    Qingxiu Dong, Li Dong, Xingxing Zhang, Zhifang Sui, and Furu Wei. 2024a.



    Self-Boosting Large Language Models with Synthetic Preference Data.



    arXiv preprint arXiv:2410.06961 (2024).







    Dong et al. (2022)


    Qingxiu Dong, Lei Li, Damai Dai, Ce Zheng, Jingyuan Ma, Rui Li, Heming Xia, Jingjing Xu, Zhiyong Wu, Tianyu Liu, et al.
    2022.



    A survey on in-context learning.



    arXiv preprint arXiv:2301.00234 (2022).







    Dong et al. (2024b)


    Yijiang River Dong, Tiancheng Hu, and Nigel Collier. 2024b.



    Can LLM be a Personalized Judge?



    arXiv preprint arXiv:2406.11657 (2024).







    Dorner et al. (2024)


    Florian E. Dorner, Vivian Y. Nastl, and Moritz Hardt. 2024.'
  - The search task is a fundamental component of information retrieval (IR), focusing on identifying the most relevant documents
    from extensive text collections based on user queries. Traditionally, relevance assessments in search tasks have been
    conducted by human annotators following established guidelines. However, recent advances in large language models (LLMs)
    have opened up new opportunities for utilizing these models as evaluators, offering an automated and scalable approach
    to relevance assessment.
