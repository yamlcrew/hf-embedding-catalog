widgetData:
- source_sentence: IHSG melemah setelah nilai tukar rupiah terhadap dolar AS kembali menyentuh level psikologis Rp16.000 per
    dolar.
  sentences:
  - Investor cenderung wait and see terhadap sektor konstruksi dan BUMN karya yang sangat bergantung pada alokasi anggaran
    infrastruktur.
  - Pelemahan nilai tukar rupiah dapat meningkatkan kekhawatiran pasar, khususnya pada sektor berbasis impor.
  - Siswa SMK memamerkan produk inovasi teknologi hasil tugas akhir di acara Techno Fest 2025.
- source_sentence: IHSG berada dalam tren konsolidasi setelah penguatan signifikan pekan sebelumnya, dengan volume perdagangan
    yang menurun drastis.
  sentences:
  - Kondisi konsolidasi biasanya terjadi saat pasar mencari katalis baru dan pelaku pasar memilih sikap hati-hati.
  - Workshop penulisan puisi digelar oleh Balai Bahasa untuk generasi muda di kawasan Nusa Tenggara Timur.
  - Menjelang libur panjang, pelaku pasar cenderung wait and see dan melakukan posisi defensif.
- source_sentence: IHSG kembali menguji resistance psikologis di level 7.000 setelah seminggu penuh mengalami akumulasi oleh
    investor institusi lokal.
  sentences:
  - Volume transaksi meningkat tajam di saham-saham lapis satu seperti BBCA, TLKM, dan ASII, menandakan potensi breakout jangka
    pendek.
  - Aksi jual asing terlihat paling signifikan di saham-saham blue chip seperti BBCA, TLKM, dan ASII yang memiliki eksposur
    tinggi terhadap ekonomi global.
  - Komunitas pemuda desa meluncurkan program bank sampah digital untuk meningkatkan kesadaran lingkungan.
- source_sentence: IHSG menunjukkan tren sideways sepanjang pekan terakhir menjelang pengumuman data inflasi domestik dan
    hasil rapat dewan gubernur Bank Indonesia.
  sentences:
  - Saham sektor transportasi dan logistik terpukul akibat potensi kenaikan biaya operasional yang signifikan.
  - Museum tekstil menggelar pameran khusus tentang sejarah batik tulis dari berbagai daerah di Indonesia.
  - Ketidakpastian terhadap arah kebijakan moneter jangka pendek membuat investor ritel cenderung wait and see dan menahan
    diri untuk entry.
- source_sentence: IHSG ditutup melemah setelah rilis laporan keuangan emiten tambang menunjukkan penurunan laba bersih akibat
    penurunan harga komoditas global.
  sentences:
  - Sekolah menengah kejuruan mengadakan pameran hasil karya teknologi siswa, termasuk robot sederhana dan alat pendeteksi
    banjir.
  - Ketegangan politik di kawasan Teluk menyebabkan harga komoditas melonjak dan arus dana keluar dari pasar berkembang.
  - Fluktuasi harga komoditas seperti batu bara dan nikel memiliki pengaruh besar terhadap kinerja emiten tambang di Bursa
    Efek Indonesia.
