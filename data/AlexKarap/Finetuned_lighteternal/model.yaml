      για την 7η Νοεμβρίου 2024).
  - source_sentence: 'Διαγωνισμού, με κριτήριο 24SYMV015733439 2024-11-07 ΚΟΙΝΩΝΙΑ ΤΗΣ ΠΛΗΡΟΦΟΡΙΑΣ Μ.Α.Ε. - ΟΡΓΑΝΙΣΜΟΣ ΤΗΛΕΠΙΚΟΙΝΩΝΙΩΝ
      ΤΗΣ ΕΛΛΑΔΟΣ ΑΝΩΝΥΜΗ ΕΤΑΙΡΕΙΑ Το Έργο χρηματοδοτείται από το Ευρωπαϊκό Ταμείο Θάλασσας και Αλιείας (ΕΤΘΑ) και από Εθνικούς
      Πόρους 8 επιλογής την πλέον συμφέρουσα από οικονομική άποψη προσφορά βάσει βέλτιστης σχέσης ποιότητας - τιμής», της
      υπ’ αρ. 11985/9-12-2020 (14-12-2020 ορθή επανάληψη) διακήρυξης, για το Υποέργο 1: …’. 26. Την υπ’ αρ. 7817/8-6-2021
      Απόφαση της ΚτΠ Α.Ε. με θέμα: ‘Αποτέλεσμα τεχνικο - οικονομικής αξιολόγησης της Προσφοράς που υποβλήθηκε στο πλαίσιο
      του Ηλεκτρονικού Διεθνούς Ανοικτού Άνω των Ορίων Διαγωνισμού, με κριτήριο επιλογής «την πλέον συμφέρουσα από οικονομική
      άποψη βάσει βέλτιστης σχέσης ποιότητας - τιμής», της υπ’ αρ. 11985/9-12-2020 (14-12-2020 ορθή επανάληψη) διακήρυξης,
      για το Υποέργο 1: …’. 27. Το υπ’ αρ. 8709/22-6-2021 έγγραφο της ΚτΠ Α.Ε. με θέμα: ‘Πρόσκληση υποβολής Φακέλου Δικαιολογητικών
