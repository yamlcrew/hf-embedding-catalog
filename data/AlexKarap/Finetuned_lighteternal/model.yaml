  sentences:
  - Το κείμενο αναφέρεται σε συμβόλαια ανοικτού κώδικα (B2S) για υπηρεσίες διαχείρισης βάσεων δεδομένων (RDBMS). Συγκεκριμένα,
    περιλαμβάνει 11 διαφορετικά είδη συμβολαίων με κωδικούς όπως AAJ-83517 έως AAL-31960. Κάθε συμβόλαιο έχει συγκεκριμένο
    κόστος ανά μονάδα (π.χ. 0,062706€), ελάχιστο αριθμό μονάδων (90), και μηνιαίο πάγιο (6€). Τα συνολικά κόστη κυμαίνονται
    από 514,88€ έως 197.838,34€ με συνολική αξία συμβολαίων 4.119,76€ έως 197.838,34€ για την περίοδο 2024-11-07 όπως ορίζεται
    στο 24SYMV015731676.
  - Πρόκειται για συμβόλαια παροχής υπηρεσιών διαχείρισης βάσεων δεδομένων (RDBMS) που προσφέρονται από την ΚΟΙΝΩΝΙΑ ΤΗΣ ΠΛΗΡΟΦΟΡΙΑΣ
    Μ.Α.Ε., θυγατρική του ΟΤΕ. Τα συμβόλαια είναι τύπου ανοικτού κώδικα και κατηγοριοποιούνται σε διάφορες εκδόσεις (B1MS,
    B2S, Basic, Additional IOPS κ.λπ.). Κάθε έκδοση έχει διαφορετικό κόστος ανά μονάδα με βάση τις παρεχόμενες υπηρεσίες.
    Το συνολικό κόστος προκύπτει από τον πολλαπλασιασμό των μονάδων με την τιμή μονάδας συν το μηνιαίο πάγιο των 6€. Η χρονική
    περίοδος που καλύπτονται τα κόστη είναι από μια συγκεκριμένη ημερομηνία (07/11/2024) και μετά, όπως ορίζεται σε σχετική
    σύμβαση (24SYMV015731676).
  - Συλλογή συμβολαίων για υπηρεσίες διαχείρισης βάσεων δεδομένων (RDBMS), με χαρακτηριστικά ανοικτού κώδικα, που προσφέρονται
    από τον οργανισμό τηλεπικοινωνιών ΟΤΕ. Τα συμβόλαια διαφέρουν ως προς την έκδοση (π.χ. B2S, B1MS) και τις προσφερόμενες
    λειτουργίες (όπως επιπλέον IOPS). Οι οικονομικές παράμετροι περιλαμβάνουν τιμή ανά μονάδα υπηρεσίας, ελάχιστο αριθμό απαιτούμενων
    μονάδων (90) και σταθερό μηνιαίο τέλος 6€. Τα συνολικά ποσά κυμαίνονται σε ένα ευρύ φάσμα, υποδεικνύοντας διαφορετικές
    κλίμακες χρήσης των υπηρεσιών, με ημερομηνίες έναρξης που καθορίζονται από συγκεκριμένη σύμβαση (24SYMV015731676 για την
    7η Νοεμβρίου 2024).
- source_sentence: 'Διαγωνισμού, με κριτήριο 24SYMV015733439 2024-11-07 ΚΟΙΝΩΝΙΑ ΤΗΣ ΠΛΗΡΟΦΟΡΙΑΣ Μ.Α.Ε. - ΟΡΓΑΝΙΣΜΟΣ ΤΗΛΕΠΙΚΟΙΝΩΝΙΩΝ
    ΤΗΣ ΕΛΛΑΔΟΣ ΑΝΩΝΥΜΗ ΕΤΑΙΡΕΙΑ Το Έργο χρηματοδοτείται από το Ευρωπαϊκό Ταμείο Θάλασσας και Αλιείας (ΕΤΘΑ) και από Εθνικούς
    Πόρους 8 επιλογής την πλέον συμφέρουσα από οικονομική άποψη προσφορά βάσει βέλτιστης σχέσης ποιότητας - τιμής», της υπ’
    αρ. 11985/9-12-2020 (14-12-2020 ορθή επανάληψη) διακήρυξης, για το Υποέργο 1: …’. 26. Την υπ’ αρ. 7817/8-6-2021 Απόφαση
    της ΚτΠ Α.Ε. με θέμα: ‘Αποτέλεσμα τεχνικο - οικονομικής αξιολόγησης της Προσφοράς που υποβλήθηκε στο πλαίσιο του Ηλεκτρονικού
    Διεθνούς Ανοικτού Άνω των Ορίων Διαγωνισμού, με κριτήριο επιλογής «την πλέον συμφέρουσα από οικονομική άποψη βάσει βέλτιστης
    σχέσης ποιότητας - τιμής», της υπ’ αρ. 11985/9-12-2020 (14-12-2020 ορθή επανάληψη) διακήρυξης, για το Υποέργο 1: …’. 27.
    Το υπ’ αρ. 8709/22-6-2021 έγγραφο της ΚτΠ Α.Ε. με θέμα: ‘Πρόσκληση υποβολής Φακέλου Δικαιολογητικών Κατακύρωσης στο πλαίσιο
    του'
  sentences:
  - Η ΚτΠ Α.Ε., μέσω των αποφάσεων και εγγράφων της με αριθμούς 7817/8-6-2021 και 8709/22-6-2021, διαχειρίζεται τη διαδικασία
    αξιολόγησης προσφορών για διεθνή διαγωνισμό άνω των ορίων. Ο διαγωνισμός διέπεται από το κριτήριο επιλογής της βέλτιστης
    σχέσης ποιότητας-τιμής, όπως ορίζεται στη διακήρυξη υπ’ αρ. 11985/9-12-2020 (με διόρθωση στις 14-12-2020). Το έργο που
    προκηρύσσεται χρηματοδοτείται από το Ευρωπαϊκό Ταμείο Θάλασσας και Αλιείας σε συνδυασμό με εθνικούς πόρους.
  - Ανακοινώνεται η διεξαγωγή διαγωνισμού από την ΚτΠ Μ.Α.Ε. - ΟΤΕ Α.Ε., με αριθμό διακήρυξης 24SYMV015733439, ημερομηνίας
    7 Νοεμβρίου 2024. Το έργο, που αφορά το Υποέργο 1, χρηματοδοτείται συνδυαστικά από το ΕΤΘΑ και εθνικούς πόρους. Η επιλογή
    αναδόχου θα γίνει σύμφωνα με τη διακήρυξη υπ’ αρ. 11985/9-12-2020 (διορθωμένη στις 14-12-2020), εφαρμόζοντας το κριτήριο
    της πλέον συμφέρουσας οικονομικής προσφοράς βάσει σχέσης ποιότητας-τιμής, όπως επιβεβαιώθηκε από την απόφαση υπ’ αρ. 7817/8-6-2021
    και τη σχετική πρόσκληση δικαιολογητικών κατακύρωσης με αριθμό 8709/22-6-2021.
  - Διαγωνισμός προκηρύχθηκε από την ΚΟΙΝΩΝΙΑ ΤΗΣ ΠΛΗΡΟΦΟΡΙΑΣ Μ.Α.Ε., οργανισμό τηλεπικοινωνιών, με αριθμό αναφοράς 24SYMV015733439
    και ημερομηνία 7 Νοεμβρίου 2024. Το έργο χρηματοδοτείται τόσο από το Ευρωπαϊκό Ταμείο Θάλασσας και Αλιείας (ΕΤΘΑ) όσο
    και από εθνικούς πόρους. Η επιλογή του αναδόχου θα γίνει βάσει της πλέον συμφέρουσας οικονομικής προσφοράς που προκύπτει
    από την βέλτιστη σχέση ποιότητας-τιμής, σύμφωνα με τους όρους της διακήρυξης υπ’ αρ. 11985/9-12-2020 (με ορθή επανάληψη
    στις 14-12-2020). Συγκεκριμένα, πρόκειται για το Υποέργο 1 του διαγωνισμού.
- source_sentence: απαιτεί από τον οικονομικό φορέα να αντικαταστήσει ένα φορέα που δεν πληροί σχετικό κριτήριο επιλογής ή
    για τον οποίο συντρέχουν λόγοι αποκλεισμού των παραγράφων 1, 2 και 4 του άρθρου 73, τους οποίους ανέφερε ο αναθέτων φορέας.
    Ο αναθέτων φορέας μπορεί να απαιτήσει από τον οικονομικό φορέα την αντικατάσταση φορέα για τον οποίον συντρέχουν λόγοι
    αποκλεισμού της παρ. 6 του άρθρου 73. Άρθρο 309 Πρότυπα διασφάλισης ποιότητας και πρότυπα περιβαλλοντικής διαχείρισης
    (άρθρο 81 της Οδηγίας 2014/25/ΕΕ) 1. Οι αναθέτοντες φορείς, εάν απαιτούν την προσκόμιση πιστοποιητικών που εκδίδονται
    από ανεξάρτητους οργανισμούς που βεβαιώνουν ότι ο οικονομικός φορέας συμμορφώνεται με ορισμένα πρότυπα διασφάλισης ποιότητας,
    συμπεριλαμβανομένης της προσβασιμότητας για άτομα με ειδικές ανάγκες, παραπέμπουν σε συστήματα διασφάλισης ποιότητας,
    βασιζόμενα στη σχετική σειρά ευρωπαϊκών προτύπων που έχουν πιστοποιηθεί από διαπιστευμένους οργανισμούς. Οι
  sentences:
  - Σύμφωνα με τις διατάξεις του σχετικού νομικού πλαισίου, ο οικονομικός φορέας ενδέχεται να υποχρεωθεί να αντικαταστήσει
    έναν άλλο φορέα που δεν πληροί τα κριτήρια επιλογής ή έχει λόγους αποκλεισμού (παραγράφους 1,2 και 4 του άρθρου 73), όπως
    θα προσδιορίσει ο αναθέτων φορέας. Επιπλέον, υπάρχει πρόβλεψη για αντικατάσταση σε περιπτώσεις φορέων με αποκλεισμούς
    της παραγράφου 6 του ίδιου άρθρου. Το άρθρο 309 ρυθμίζει επίσης τις απαιτήσεις για πρότυπα διασφάλισης ποιότητας και περιβαλλοντικής
    διαχείρισης, όπου οι αναθέτοντες φορείς μπορούν να ζητούν βεβαιώσεις από ανεξάρτητους οργανισμούς. Οι οργανισμοί αυτοί
    πρέπει να πιστοποιούν τη συμμόρφωση με συγκεκριμένα ευρωπαϊκά πρότυπα, συμπεριλαμβανομένων των προδιαγραφών προσβασιμότητας,
    μέσω διαπιστευμένων φορέων πιστοποίησης.
  - Ο οικονομικός φορέας μπορεί να κληθεί να αντικαταστήσει έναν άλλο φορέα που δεν ανταποκρίνεται στα κριτήρια επιλογής ή
    υπόκειται σε λόγους αποκλεισμού (παραγράφους 1 έως 4 του άρθρου 73), όπως θα καθορίσει ο αναθέτων φορέας. Επιπλέον, προβλέπεται
    η αντικατάσταση για περιπτώσεις που αφορούν αποκλεισμούς της παραγράφου 6 του ίδιου άρθρου. Το άρθρο 309 της Οδηγίας 2014/25/ΕΕ
    καθορίζει τις προϋποθέσεις για την εφαρμογή προτύπων διασφάλισης ποιότητας και περιβαλλοντικής διαχείρισης. Συγκεκριμένα,
    οι αναθέτοντες φορείς μπορούν να απαιτούν πιστοποιητικά από ανεξάρτητους οργανισμούς που επιβεβαιώνουν τη συμμόρφωση με
    σχετικά ευρωπαϊκά πρότυπα, συμπεριλαμβανομένων των προδιαγραφών προσβασιμότητας για άτομα με αναπηρίες. Τα εν λόγω συστήματα
    πρέπει να έχουν πιστοποιηθεί από αναγνωρισμένους οργανισμούς πιστοποίησης.
  - Η απαίτηση αντικατάστασης οικονομικού φορέα από τον αναθέτοντα ισχύει όταν ο αρχικός φορέας δεν πληροί τα κριτήρια επιλογής
    ή υπόκειται σε λόγους αποκλεισμού των παραγράφων 1,2 και 4 του άρθρου 73. Επιπλέον, προβλέπεται η αντικατάσταση για φορείς
    που εμπίπτουν στην παράγραφο 6 του ίδιου άρθρου. Παράλληλα, το άρθρο 309 της Οδηγίας 2014/25/ΕΕ ορίζει ότι οι αναθέτοντες
    φορείς μπορούν να ζητούν πιστοποιητικά από ανεξάρτητους οργανισμούς που επιβεβαιώνουν τη συμμόρφωση με πρότυπα διασφάλισης
    ποιότητας, συμπεριλαμβανομένων των προδιαγραφών προσβασιμότητας για ΑμεΑ. Τα εν λόγω συστήματα πρέπει να βασίζονται στη
    σχετική σειρά ευρωπαϊκών προτύπων και να έχουν πιστοποιηθεί από διαπιστευμένους οργανισμούς.
