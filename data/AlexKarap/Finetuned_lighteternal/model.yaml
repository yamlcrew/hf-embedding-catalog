      κόστος ανά μονάδα (π.χ. 0,062706€), ελάχιστο αριθμό μονάδων (90), και μηνιαίο πάγιο (6€). Τα συνολικά κόστη κυμαίνονται
      από 514,88€ έως 197.838,34€ με συνολική αξία συμβολαίων 4.119,76€ έως 197.838,34€ για την περίοδο 2024-11-07 όπως ορίζεται
      στο 24SYMV015731676.
    - Πρόκειται για συμβόλαια παροχής υπηρεσιών διαχείρισης βάσεων δεδομένων (RDBMS) που προσφέρονται από την ΚΟΙΝΩΝΙΑ ΤΗΣ
      ΠΛΗΡΟΦΟΡΙΑΣ Μ.Α.Ε., θυγατρική του ΟΤΕ. Τα συμβόλαια είναι τύπου ανοικτού κώδικα και κατηγοριοποιούνται σε διάφορες εκδόσεις
      (B1MS, B2S, Basic, Additional IOPS κ.λπ.). Κάθε έκδοση έχει διαφορετικό κόστος ανά μονάδα με βάση τις παρεχόμενες υπηρεσίες.
      Το συνολικό κόστος προκύπτει από τον πολλαπλασιασμό των μονάδων με την τιμή μονάδας συν το μηνιαίο πάγιο των 6€. Η χρονική
