widgetData:
- source_sentence: 'της Εταιρείας ή αν συντρέχουν λόγοι ανωτέρας βίας. Στον Ανάδοχο που κηρύσσεται έκπτωτος από τη Σύμβαση,
    επιβάλλονται, με απόφαση του αποφαινόμενου οργάνου, ύστερα από γνωμοδότηση του αρμόδιου οργάνου, το οποίο υποχρεωτικά
    καλεί τον ενδιαφερόμενο προς παροχή εξηγήσεων, αθροιστικά οι παρακάτω κυρώσεις: α) ολική κατάπτωση της εγγύησης καλής
    εκτέλεσης της Σύμβασης. β) είσπραξη εντόκως της προκαταβολής που χορηγήθηκε στον έκπτωτο από τη σύμβαση Ανάδοχο, είτε
    από ποσόν που δικαιούται να λάβει, είτε με κατάθεση του ποσού από τον ίδιο, είτε με κατάπτωση της εγγύησης προκαταβολής.
    Ο υπολογισμός των τόκων γίνεται από την ημερομηνία λήψης της προκαταβολής από τον Ανάδοχο μέχρι την ημερομηνία έκδοσης
    της απόφασης κήρυξής του ως εκπτώτου, με το ισχύον κάθε φορά ανώτατο όριο επιτοκίου για τόκο από δικαιοπραξία, από την
    ημερομηνία δε αυτή και μέχρι της επιστροφής της, με το ισχύον κάθε φορά επιτόκιο για τόκο υπερημερίας. Επιπλέον,'
  sentences:
  - 'Η σύμβαση περιλαμβάνει ρήτρες για έκτακτες περιστάσεις που αφορούν την Εταιρεία ή ανωτέρα βία. Σε περίπτωση έκπτωσης
    του αναδόχου, εφαρμόζεται σύστημα κυρώσεων κατόπιν σχετικής διαδικασίας. Συγκεκριμένα, επιβάλλονται στον έκπτωτο ανάδοχο
    οι εξής κυρώσεις αθροιστικά: α) πλήρης κατάπτωση της εγγύησης καλής εκτέλεσης και β) είσπραξη με τόκους της προκαταβολής
    που έλαβε, είτε από δικαιούμενο ποσό, είτε μέσω κατάθεσης από τον ίδιο, είτε με κατάπτωση της εγγύησης προκαταβολής. Ο
    υπολογισμός των τόκων γίνεται σε δύο φάσεις: αρχικά μέχρι την απόφαση έκπτωσης με βάση το ανώτατο όριο επιτοκίου για δανεισμό,
    και στη συνέχεια με επιτόκιο υπερημερίας από τη δημοσίευση της απόφασης έκπτωσης.'
  - 'Η σύμβαση προβλέπει ειδικές διατάξεις για έκτακτες καταστάσεις όπως ανωτέρα βία που αφορούν την Εταιρεία. Σε περίπτωση
    που ο ανάδοχος κηρυχθεί έκπτωτος, ακολουθείται συγκεκριμένη διαδικασία επιβολής κυρώσεων. Συγκεκριμένα, μετά από απόφαση
    του αρμόδιου οργάνου κατόπιν γνωμοδότησης και κλήσης σε εξηγήσεις του αναδόχου, επιβάλλονται οι ακόλουθες κυρώσεις: α)
    πλήρης κατάπτωση της εγγύησης καλής εκτέλεσης και β) είσπραξη με τόκους της προκαταβολής που έλαβε ο έκπτωτος ανάδοχος.
    Οι τόκοι υπολογίζονται ως εξής: από την ημερομηνία λήψης της προκαταβολής μέχρι την απόφαση έκπτωσης βάσει του ανώτατου
    επιτοκίου για δανεισμό, και στη συνέχεια με το επιτόκιο υπερημερίας.'
  - 'Σε περίπτωση που η Εταιρεία ή συντρέχουν λόγοι ανωτέρας βίας, εφαρμόζονται ειδικοί όροι. Για τον ανάδοχο που κηρύσσεται
    έκπτωτος από τη σύμβαση, προβλέπονται κυρώσεις μετά από απόφαση του αρμόδιου οργάνου και σχετική γνωμοδότηση. Συγκεκριμένα,
    επιβάλλονται αθροιστικά οι εξής ποινές: α) πλήρης κατάπτωση της εγγύησης καλής εκτέλεσης της σύμβασης και β) είσπραξη
    με τόκους της προκαταβολής που δόθηκε στον έκπτωτο ανάδοχο, είτε από ποσό που δικαιούται να λάβει, είτε μέσω κατάθεσης
    από τον ίδιο, είτε με κατάπτωση της εγγύησης προκαταβολής. Οι τόκοι υπολογίζονται από την ημερομηνία λήψης της προκαταβολής
    μέχρι τη δημοσίευση της έκπτωσης, με βάση το ανώτατο όριο επιτοκίου για δανεισμό, και από εκεί και έπειτα με το επιτόκιο
    υπερημερίας.'
- source_sentence: 'ενσωματωμένο στον Call Server σε διάταξη υψηλής διαθεσιμότητας Active / Hot Stand by. Το λογισμικό περιλαμβάνει
    τις κατάλληλες διεπαφές για την εξαγωγή όλων των στατιστικών σε βάση δεδομένων SQL και την απεικόνιση σε πραγματικό χρόνο
    σε οθόνες TV. 3. Visual Automated Attendant λογισμικό Interactive Voice Response που σε συνδυασμό με το Contact Center
    δίνει την δυνατότητα για ευέλικτη δρομολόγηση εισερχόμενων κλήσεων σύμφωνα με τις ανάγκες του έργου. Παρέχονται υπηρεσίες
    όπως: Διαχείριση και παραμετροποίηση μέσω Web Browser. Database Read / Write. Digit Collection. Ανταλλαγή δεδομένων –
    Correlator Data με το Omni Touch Contact Center. 4. OmniPCX Enterprise Media Services (OXE MS) Το λογισμικό OmniPCX Enterprise
    media services σε πλήρη ΙΡ ανάπτυξη, αντικαθιστά τους IP media gateway και τον αντίστοιχο φυσικό εξοπλισμό των DSPs (Digital
    Signal Processors) μέσω λύσεων λογισμικού. Το λογισμικό OXE – MS δίνει την δυνατότητα πλεονάζοντος (redundant) media gateway
    σε active-active διάταξη, εξασφαλίζοντας έτσι την απρόσκοπτη λειτουργία του συνόλου του συστήματος – SIP Trunks, φωνητικές
    οδηγίες, μουσική στην αναμονή, πόρους DSP'
  sentences:
  - Το σύστημα Call Server λειτουργεί με αρχιτεκτονική Active/Hot Stand by υψηλής διαθεσιμότητας. Διαθέτει λογισμικό που επιτρέπει
    τη συλλογή και αποθήκευση στατιστικών σε SQL βάση δεδομένων, καθώς και την άμεση οπτικοποίησή τους σε οθόνες τηλεόρασης.
    Επιπλέον, το Visual Automated Attendant σε συνδυασμό με το Contact Center προσφέρει ευέλικτη διαχείριση εισερχόμενων κλήσεων
    βάσει των απαιτήσεων του έργου. Οι προσφερόμενες υπηρεσίες περιλαμβάνουν διαδικτυακή διαχείριση μέσω browser, ανάγνωση/εγγραφή
    στη βάση δεδομένων, συλλογή ψηφιακών πληροφοριών και διασύνδεση με το Omni Touch Contact Center μέσω correlator data.
  - Το λογισμικό που είναι ενσωματωμένο στον Call Server έχει σχεδιαστεί για υψηλή διαθεσιμότητα και λειτουργεί σε διάταξη
    Active/Hots Stand by. Διαθέτει ειδικές διεπαφές για την εξαγωγή στατιστικών στοιχείων σε SQL βάση δεδομένων και την άμεση
    προβολή τους σε οθόνες τηλεόρασης σε πραγματικό χρόνο. Το σύστημα περιλαμβάνει επίσης το Interactive Voice Response (IVR)
    μέσω του Visual Automated Attendant, το οποίο σε συνεργασία με το Contact Center επιτρέπει την προσαρμοστική δρομολόγηση
    κλήσεων. Οι παρεχόμενες λειτουργίες καλύπτουν τη διαχείριση μέσω web browser, τις λειτουργίες ανάγνωσης/εγγραφής στη βάση
    δεδομένων, τη συλλογή ψηφιακών πληροφοριών και την ανταλλαγή δεδομένων με το Omni Touch Contact Center.
  - Το σύστημα επικοινωνίας Call Server διαθέτει αρχιτεκτονική υψηλής διαθεσιμότητας τύπου Active/Hot Stand by. Περιλαμβάνει
    λογισμικό που επιτρέπει την καταγραφή και αποθήκευση στατιστικών στοιχείων σε SQL βάση δεδομένων, καθώς και την άμεση
    απεικόνιση των δεδομένων αυτών σε τηλεοπτικές οθόνες. Επιπλέον, το σύστημα προσφέρει προηγμένες δυνατότητες διαχείρισης
    κλήσεων μέσω του Visual Automated Attendant και του Contact Center, εξασφαλίζοντας ευέλικτη δρομολόγηση βάσει αναγκών.
    Οι προσφερόμενες υπηρεσίες περιλαμβάνουν διαχείριση εξ αποστάσεως μέσω web browser, λειτουργίες βάσης δεδομένων (ανάγνωση/εγγραφή),
    συλλογή ψηφιακών στοιχείων και διασύνδεση με το Omni Touch Contact Center για ανταλλαγή correlator data. Το λογισμικό
    OmniPCX Enterprise Media Services αντικαθιστά τον παραδοσιακό εξοπλισμό IP media gateway και DSPs με λύσεις λογισμικού,
    προσφέροντας πλεονασμό (redundancy) σε active-active διάταξη για αδιάλειπτη λειτουργία του συστήματος, συμπεριλαμβανομένων
    SIP Trunks, φωνητικών οδηγιών, μουσικής αναμονής και πόρων DSP.
