- source_sentence: 'αντιγράφων ασφαλείας αντιγράφονται στη θέση δημιουργίας αντιγράφων ασφαλείας. Η στρατηγική επαναφοράς
    εν συντομία θα ήταν: 1) σταματήστε την εφαρμογή IMS 2) αφαιρέστε τα υπάρχοντα αρχεία εφαρμογής 3) αντιγράψτε τα αρχεία
    εφαρμογής IMS από τη θέση δημιουργίας αντιγράφων ασφαλείας 4) ξεκινήστε την εφαρμογή IMS 1.7.1.6 Δυνατότητες αναζήτησης
    Εκτός από το τυπικό ερώτημα της βάσης δεδομένων ( SQL queries, κ.λπ.), η βάση δεδομένων και τα product susbystems θα παραδοθούν
    με την ενσωμάτωση των μηχανών αναζήτησης δεδομένων, όπου απαιτείται από τις απαιτήσεις, με τις ακόλουθες επιλογές: (α)
    Αναζήτηση με λέξεις-κλειδιά σε πλήρες κείμενο, με λέξεις ή φράσεις. (β) Σύνθετη αναζήτηση, σε συνδυασμό με δεδομένα όπως
    ημερομηνία, κατηγορία ή θέμα, λέξεις ή φράσεις. (γ) Όταν ορισμένα αποτελέσματα δεν μπορούν να εμφανιστούν σε μια οθόνη
    στο σύνολό τους, θα δημιουργηθεί μια προεπισκόπηση τέτοιων δεδομένων χωρίς νέα κλήση στη βάση δεδομένων.'
