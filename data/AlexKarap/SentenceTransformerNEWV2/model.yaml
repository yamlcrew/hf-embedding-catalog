- source_sentence: 'Μοντελοποίηση» δίνει έμφαση στην αποτύπωση του Επιχειρησιακού Οράματος (Business Vision) του συστήματος,
    το οποίο με τη σειρά του συντελεί στο σωστό σχεδιασμό των κατάλληλων διαδικασιών και ρόλων αλλά και στον καθορισμό των
    αρμοδιοτήτων του οργανισμού και των στελεχών του μέσα στο νέο επιχειρησιακό μοντέλο. Το Πακέτο Εργασίας «Επιχειρησιακή
    Μοντελοποίηση» περιλαμβάνει τις εξής ενέργειες: ▪ Ανάλυση Επιχειρησιακού Πλαισίου: Στόχο αυτής της ενέργειας αποτελεί
    η αρχική προσέγγιση αναγνώρισης των διαδικασιών κάθε είδους (π.χ. υποβολή ηλεκτρονικών αιτήσεων διαφόρων τύπων) οι οποίες
    εμπλέκονται στο νέο τεχνολογικό περιβάλλον, καθώς και της λειτουργίας αλλά και οργάνωσης / δομής αυτών των διαδικασιών
    στα πλαίσια του υπό υλοποίηση περιβάλλοντος. Στις διαδικασίες αυτές περιλαμβάνονται όσες σχετίζονται και επηρεάζουν είτε
    άμεσα είτε έμμεσα τη λειτουργία και διαχείριση του νέου συστήματος καθώς και εκείν ες που επηρεάζονται από αυτό. Στα πλαίσια'
