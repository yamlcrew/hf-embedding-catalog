- source_sentence: 'κηρύσσεται έκπτωτος μέσα σε προθεσμία τριάντα (30) ημερών από την άπρακτη πάροδο της προθεσμίας συμμόρφωσης,
    με απόφαση της Εταιρείας. Ο Ανάδοχος δεν κηρύσσεται έκπτωτος για λόγους που αφορούν σε υπαιτιότητα της Εταιρείας ή αν
    συντρέχουν λόγοι ανωτέρας βίας. Στον Ανάδοχο που κηρύσσεται έκπτωτος από τη Σύμβαση, επιβάλλονται, με απόφαση του αποφαινόμενου
    οργάνου, ύστερα από γνωμοδότηση του αρμόδιου οργάνου, το οποίο υποχρεωτικά καλεί τον ενδιαφερόμενο προς παροχή εξηγήσεων,
    αθροιστικά οι παρακάτω κυρώσεις: α) ολική κατάπτωση της εγγύησης καλής εκτέλεσης της Σύμβασης. β) είσπραξη εντόκως της
    προκαταβολής που χορηγήθηκε στον έκπτωτο από τη σύμβαση Ανάδοχο, είτε από ποσόν που δικαιούται να λάβει, είτε με κατάθεση
    του ποσού από τον ίδιο, είτε με κατάπτωση της εγγύησης προκαταβολής. Ο υπολογισμός των τόκων γίνεται από την ημερομηνία
    λήψης της προκαταβολής από τον Ανάδοχο μέχρι την ημερομηνία έκδοσης της απόφασης κήρυξής του ως'
  sentences:
  - 'Ανακηρύσσεται έκπτωτοι μέσα σε προθεσμία τριάντα ( 30 ) ημέρων από την άπρακτα πάροδο της προθεσμίαν συμμόρφωσης , με
    Ἀπόφαση της Εταιρειας . Ο Ανάδοχου δεν Ανακηρύσσεται έκπτωτοι για λόγους που αφορουν σε συνυπαιτιότητα της Εταιρειας είτε
    αν δικαιολογούνται λόγοι ανωτέρα βιαιοπραγίας . Στον Ανάδοχο που Ανακηρύσσεται έκπτωτος από τη Σύμβαση , επιβάλονται ,
    με Ἀπόφαση του αποφαινόμενου ὀργάνου , ύστερα από γνωµοδότηση του συναρμόδιου ὀργάνου , το οποίο υποχρεωτικά καλεί τον
    ενδιαφερόμενης προς παροχή Παρεξηγήσεων , κεφαλαιοποιητικά οι παρακάτων κυρώσεις : α ) ολική κατάπτωσή της μεσεγγύησης
    καλής εκτελεσης της Σύμβασης . β ) είσπραξη εντόκως της προκαταβολη που χορηγείτο στον έκπτωτοι από τη σύμβαση Ανάδοχο
    , είτε από κονδύλι που δικαιούταν να ληφθεί , είτε με επανακατάθεση του ποσού από τον ίδιο , είτε με κατάπτωσή της εγγύησης
    προκαταβολη . Ο Συνυπολογισμός των τόκων ξαναγίνεται από την Hμερομηνία λήψεως της προκαταβολής από τον Ανάδοχο μέχρι
    την Hμερομηνία Εκδοσης της ἀπόφασης κήρυξής του ως'
  - 'Ανακηρύσσεται έκπτωτοι μέσα σε προθεσμία τριάντα ( 30 ) ημέρων από την άπρακτα πάροδο της προθεσμίαν συμμόρφωσης , με
