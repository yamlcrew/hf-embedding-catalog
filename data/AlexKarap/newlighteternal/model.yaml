widgetData:
- source_sentence: Σε τέτοια περίπτωση καταπίπτουν υπέρ της Αναθέτουσας Αρχής και οι Εγγυητικές Επιστολές Προκαταβολής και
    Καλής Εκτέλεσης
  sentences:
  - Τα τεχνικά χαρακτηριστικά περιλαμβάνουν μονόχρωμη τεχνολογία εκτύπωσης με χρήση laser. Επιπλέον, διαθέτει έγχρωμη οθόνη
    LCD διαστάσεων 2,4 ιντσών.
  - Η Γενική Γραμματεία Πληροφοριακών Συστημάτων Δημόσιας Διοίκησης (ΓΓΠΣΔΔ) παρέχει τις υπηρεσίες της εφαρμόζοντας νέες μεθόδους
    και πρακτικές.
  - Στην περίπτωση αυτή, τόσο η εγγυητική επιστολή προκαταβολής όσο και η εγγυητική επιστολή καλής εκτέλεσης καθίστανται άκυρες
    προς όφελος της αναθέτουσας αρχής.
- source_sentence: υποχρεωτικά για το διάστημα από την υπογραφή της σύμβασης μέχρι το πέρας του ενός τετάρτου (1/4) της αρχικής
  sentences:
  - Κατά την τριακοστή επαλήθευση, επιβεβαιώθηκε η πλήρης λειτουργικότητα του συνόλου του έργου σε δοκιμαστικό στάδιο που
    προσομοίωνε το πραγματικό σενάριο χρήσης.
  - Από την ημερομηνία υπογραφής της σύμβασης έως και το πέρας του ενός τετάρτου (ενός τέταρτου) της αρχικής διάρκειας.
  - Το συγκεκριμένο υποέργο με αριθμό 19 αφορά την παροχή τεχνικής υποστήριξης τόσο για το σύστημα ΣΥΖΕΥΞΙΣ ΙΙ όσο και για
    το Δίκτυο Δημοσίου Τομέα (ΔΔΤ).
- source_sentence: ανάλυσης της Εκπαίδευσης ανά θεματική ενότητα και επίπεδο επιμόρφωσης • Προσδιορισμός Εναλλακτικών Εκπαιδευτικών
  sentences:
  - Η έρευνα επικεντρώνεται στον εξοπλισμό των γραφείων (συμπεριλαμβανομένων όλων των απαραίτητων στοιχείων όπως ηλεκτρονικοί
    υπολογιστές και περιφερειακά) καθώς και στο ανθρώπινο δυναμικό που στελεχώνει τις υπηρεσίες. Στο πλαίσιο αυτό, εξετάζονται
    διάφορες προσεγγίσεις για τη δημιουργία συστημάτων ασφαλείας δεδομένων.
  - Μελέτη της εκπαίδευσης ανά θεματική ενότητα και επίπεδο σπουδών, με στόχο τον εντοπισμό διαφορετικών εκπαιδευτικών μεθόδων.
    Αναζήτηση καινοτόμων εκπαιδευτικών προσεγγίσεων.
  - Η φάση που αφορά τον έλεγχο της πρώτης έκδοσης ενός παραδοτέου έργου έχει συγκεκριμένο χρονικό πλαίσιο διάρκειας 29 μηνών.
- source_sentence: Βιολέτης πληροφορικής (IT senior Θεματικές 1 & 3 30% experts) Έμπειρος σύμβουλος Νικόλαος 5 πληροφορικής
    (IT senior Θεματική 3 100%
  sentences:
  - Το σύστημα παρέχει δικτυακές συνδέσεις μέσω των πρωτοκόλλων SMB, NFS, S3 API, FTP, Qumulo SHIFT και Qumulo CSI, εξασφαλίζοντας
    έτσι την αποτελεσματική διασύνδεση και πρόσβαση.
  - 'Η διαχείριση ενός έργου περιλαμβάνει τρία θεμελιώδη στάδια: αρχικά την έγκριση παραλαβής της εργασίας που έχει ανατεθεί,
    στη συνέχεια την εκτέλεση όλων των απαραίτητων εργασιών και τέλος την ολοκλήρωση με τις υπόλοιπες απαιτούμενες ενέργειες.'
  - Ο βιολέτης είναι ειδικός στην πληροφορική με τίτλο "senior" και έχει εξειδίκευση στις θεματικές ενότητες 1 και 3, κατέχοντας
    το 30% της απαιτούμενης γνώσης. Επιπλέον, διαθέτει πιστοποίηση ως IT senior στη θεματική ενότητα 3 με ποσοστό επιτυχίας
    100%.
- source_sentence: κοινωνικών δικτύων, ο σημασιολογικός ιστός και η προσωποποίηση. Η κινητή επικοινωνία, το υπολογιστικό νέφος,
    τα
  sentences:
  - Η λειτουργική ενότητα 3 απεικονίζεται αναλυτικά στον συγκεντρωτικό πίνακα εξόδων συντήρησής της.
  - 'Η σύμβαση αφορά την εφαρμογή γνώσεων σε τρεις διαφορετικούς νομικούς κλάδους: στο εργατικό δίκαιο, στη φορολογική νομοθεσία
    και στην κοινοτική έννομη τάξη. Ο ανάδοχος πρέπει να εξασφαλίζει τη συμμόρφωση της εργασίας του με το σύνολο αυτών των
    νομικών πλαισίων.'
  - 'Στον τομέα των ψηφιακών τεχνολογιών, τρεις σημαντικές εξελίξεις ξεχωρίζουν: τα κοινωνικά δίκτυα, ο σημασιολογικός ιστός
    και η προσωποποιημένη εμπειρία χρήστη. Συγχρόνως, παρατηρείται ραγδαία πρόοδος στην κινητή επικοινωνία και τις τεχνολογίες
    υπολογιστικού νέφους, οι οποίες διαμορφώνουν το σύγχρονο τεχνολογικό τοπίο.'
