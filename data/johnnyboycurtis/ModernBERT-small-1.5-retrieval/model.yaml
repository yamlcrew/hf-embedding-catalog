- source_sentence: who is catch me if you can based on
  sentences:
  - Catch Me If You Can Catch Me If You Can is a 2002 American biographical crime film directed and produced by Steven Spielberg
    from a screenplay by Jeff Nathanson. The film is based on the life of Frank Abagnale, who, before his 19th birthday, successfully
    performed cons worth millions of dollars by posing as a Pan American World Airways pilot, a Georgia doctor and a Louisiana
    parish prosecutor. His primary crime was check fraud; he became so experienced that the FBI eventually turned to him for
    help in catching other checking forgers. The film stars Leonardo DiCaprio and Tom Hanks, with Christopher Walken, Martin
    Sheen, and Nathalie Baye in supporting roles.
  - Ghost Rider (Johnny Blaze) Centurious appeared, stealing Blaze's soul into his soul crystal. Zarathos, weakened from the
    ordeal used the last of his strength to shatter the crystal, freeing Blaze's soul and many others contained inside of
    the crystal as well. Before the crystal was reformed, Centurious was absorbed into the crystal. Zarathos followed him
    into the crystal, freeing Blaze from the curse, restoring his soul, and ending his time as the Ghost Rider.[31]
  - Colonial Brazil In contrast to the neighboring Spanish possessions, which had several viceroyalties with jurisdiction
    initially over New Spain (Mexico) and Peru, and in the eighteenth century expanded to viceroyalties of Rio de la Plata
    and New Granada, the Portuguese colony of Brazil was settled mainly in the coastal area by the Portuguese and a large
    black slave population working sugar plantations and mines. The boom and bust economic cycles were linked to export products.
    Brazil's sugar age, with the development of plantation slavery, merchants serving as middle men between production sites,
    Brazilian ports, and Europe was undermined by the growth of the sugar industry in the Caribbean on islands that European
    powers seized from Spain. Gold and diamonds were discovered and mined in southern Brazil through the end of the colonial
    era. Brazilian cities were largely port cities and the colonial administrative capital was moved several times in response
    to the rise and fall of export products' importance. Unlike Spanish America that fragmented in many republics, Brazil
    remained as a single administrative unit with a monarch, giving rise to the largest country in Latin America. Like Spanish
    America with European Spanish, Brazil had linguistic integrity of Portuguese. Both Spanish America and Brazil were Roman
    Catholic.
