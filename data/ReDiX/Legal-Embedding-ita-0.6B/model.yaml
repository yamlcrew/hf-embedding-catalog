    disponendo il giudice dell’intero fascicolo delle indagini preliminari ed essendo possibili acquisizioni probatorie ulteriori
    se decisive ai fini della pronuncia della sentenza di non luogo a procedere. D’altro canto, sebbene non sia prevista espressamente
    la possibilità per l’imputato e per la persona offesa di interloquire sul punto, la decisione emessa all’esito di tale
    udienza postula un contraddittorio argomentativo tra le parti e vede potenzialmente coinvolta anche la persona offesa
    in quanto destinata-ria dell’avviso dell’udienza. Il non luogo a procedere e l’assoluzione dibattimentale sono, dunque,
    le pronunce attraverso le quali l’art. 131-bis c.p. può trovare il suo sbocco processuale. Non pare, invece, possibile
    pervenire, in difetto di una specifica previsione, al riconoscimento di tale speciale causa di non punibilità in applicazione
    dell’art. 129 c.p.p. in considerazione del fatto che l’ambito operativo di tale previsione è ontologicamente limitato
    «alle sole pronunce che possono dav-vero essere adottate con immediatezza in ogni stato e grado del processo» 37. Tra
    tali pronunce non rien-tra certo quella che dichiara la particolare tenuità del fatto in quanto l’adozione della relativa
    formula di proscioglimento può avvenire solo dopo l’accertamento della sussistenza, della penale rilevanza e dell’ascrivibilità
    all’imputato del fatto per cui si procede 38. Diverse sono le ricadute, sul piano processuale, della scelta di non intervenire
