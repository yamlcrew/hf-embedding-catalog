- source_sentence: Quale norma impedisce che l’estinzione riconosciuta a S. sia trasferita a V.?
  sentences:
  - https://www.gazzettaufficiale.it/atto/stampa/serie_generale/originario 23/26 ai familiari superstiti, che gia' godono
    del diritto al collocamento obbligatorio con precedenza rispetto ad ogni altra categoria e preferenza a parita' di titoli,
    ai sensi dell'articolo 1, comma 2 della legge 23 novembre 1998, n. 407, deve essere garantito un programma di assunzione
    presso le amministrazioni pubbliche, nei limiti delle relative facolta' assunzionali autorizzate a legislazione vigente,
    con rispetto della qualifica e delle funzioni corrispondenti al titolo di studio ed alle professionalita' possedute. Le
    modalita' di attuazione sono stabilite da apposito regolamento adottato ai sensi dell'articolo 17, comma 3, della legge
    23 agosto 1988, n. 400, dai Ministri della pubblica amministrazione e dell'interno. Per le assunzioni del personale di
    cui all'articolo 3 del decreto legislativo 30 marzo 2001, n. 165, restano salve le disposizioni previste dai rispettivi
    ordinamenti. 2. Il coniuge e i figli dell'invalido riconosciuto vittima del dovere, ai sensi della legge 13 agosto 1980,
    n. 466, e della legge 23 dicembre 2005, n. 266, possono ottenere l'iscrizione negli elenchi del collocamento obbligatorio
    di cui all'articolo 8 della legge 12 marzo 1999, n. 68, secondo le modalita' previste per i soggetti di cui alla legge
    23 novembre 1998, n. 407. 3. L'articolo 1, comma 2, del decreto del Presidente della Repubblica 10 ottobre 2000, n. 333,
    si interpreta nel senso che i familiari dell'invalido riconosciuto vittima del dovere possono iscriversi negli elenchi
    del collocamento obbligatorio di cui all'articolo 8 della legge 12 marzo 1999, n. 68, purche' il dante causa non risulti
    contestualmente iscritto. 4. I soggetti tenuti all'adempimento dell'obbligo di assunzione devono indicare con cadenza
    annuale, secondo i parametri di cui al decreto legislativo 27 ottobre 2009, n. 150, e attraverso lo strumento della pubblicazione
    sui siti istituzionali e mediante una comunicazione al Dipartimento della funzione pubblica della Presidenza del Consiglio
    dei ministri, la dotazione organica distinta per aree o categorie, il numero dei soggetti da assumere in base alle previsioni
    dell'articolo 18 della legge 12 marzo 1999, n. 68, il numero dei soggetti gia' reclutati a copertura della quota obbligatoria,
    le procedure avviate per il collocamento obbligatorio, con indicazione del tipo di avviamento al lavoro. 5. Al fine di
    garantire l'effettivita' del diritto al collocamento delle vittime del dovere, di cui all'articolo 1, commi 563 e 564,
    della legge 23 dicembre 2005, n. 266, alle vittime del terrorismo e delle stragi di tale matrice, di cui all'articolo
    1 della legge 3 agosto 2004, n. 206, alle vittime della criminalita' organizzata di cui all'articolo 1, comma 2, della
    legge 20 ottobre 1990, n. 302 in caso di inadempimento delle disposizioni del presente articolo e di quelle di cui all'articolo
    5 del decreto legislativo 30 marzo 2001, n. 165 e all'articolo 1, comma 5, del decreto del Presidente della Repubblica
    9 maggio 1994, n. 487, un numero di assunzioni corrispondente a quelle che non sono state realizzate sono rese indisponibili
    nell'ambito delle facolta' assunzionali dell'amministrazione interessata. 6. Alle vittime del dovere ed ai loro familiari,
    anche superstiti, di cui all'articolo 1, commi 563 e 564, della legge 23 dicembre 2005, n. 266, possono essere riconosciuti
    permessi orari a recupero per un numero massimo di diciotto ore annue non continuative e comunque in modo tale che non
    sia necessario procedere alla sostituzione del personale, al fine di partecipare a iniziative pubbliche, anche presso
    scuole e istituzioni, finalizzate alla diffusione della cultura della legalita' e della memoria delle vittime del dovere,
    del terrorismo e della criminalita' organizzata, in deroga al limite massimo di ore previsto dal contratto collettivo
    nazionale di lavoro del comparto di appartenenza. 7. Il permesso di cui al comma 6 viene concesso a semplice richiesta
    del dipendente avente titolo, salva la produzione di idonea documentazione attestante i motivi dell'assenza come sopra
    qualificati. 8. Le ore di assenza per la partecipazione alle iniziative pubbliche di cui al comma 6 sono retribuite e
    soggette a recupero secondo la disciplina contrattuale vigente.
  - La declaratoria di tale estinzione, spettante al S., non può peraltro essere estesa anche al V. in forza della regola
    di estensione di cui all'art. 587 c.p.p., essendosi nei suoi confronti consolidato il giudicato di colpevolezza prima
    del verificarsi dell'effetto estintivo, venuto a maturazione in ragione del protrarsi del decorso del termine di prescrizione
    successivamente alla proposizione dei ricorsi (Sez. 2, n. 26708 del 20/05/2009, Borrelli, Rv. 244664; Sez. 6, n. 23251
    del 18/03/2003, Cammardella, Rv. 226007; Sez. 1, n. 12369 del 23/10/2000, Russo, Rv. 217393). Ciò chiarito, deve naturalmente
    anche qui procedersi alla previa verifica dell'insussistenza dei presupposti per pronunciare nei confronti del S. un proscioglimento
    più favorevole a sensi dell'art. 129 c.p.p., comma 2, (estensibile in ipotesi sicuramente, ove non basato su motivi personali,
    anche al V., in forza della ricordata regola di cui all'art. 587 c.p.p.). Tali presupposti non sono nella specie ravvisabili.
    I motivi proposti in ordine al falso, infatti, vuoi quelli intesi a contestare la natura pubblica attestativa del documento
    redatto dal S. ovvero la effettiva falsità ideologica del passaggio relativo all'avvenuto rimborso da parte del V., vuoi
    quelli diretti a contestare la sussistenza di un dolo penalmente rilevante, sono basati, quando non su rilievi di merito,
    su presunti vizi motivazionali - autonomi o collegati a prospettate letture del diritto sostanziale alternative a quella
    offerta (in conformità alla dominante giurisprudenza) dai giudici di merito - che, se anche sussistenti, sarebbero comunque
    irrilevanti al fine di impedire la declaratoria della causa estintiva del reato, in quanto comporterebbero un annullamento
    con rinvio della sentenza impugnata, precluso dall'obbligo di immediata declaratoria della detta causa. La sentenza impugnata
    deve, pertanto, essere annullata senza rinvio nei confronti del S. in ordine al reato di falso (che resta invece fermo,
    con la irrogata pena di anni uno e mesi quattro di reclusione, per il V.), perchè estinto per prescrizione.
  - dopo che con l’atto di opposizione a decreto penale di condanna l’imputato abbia avanzato la richiesta di ammissione al
    giudizio abbreviato incondizionato. Tuttavia, nel caso di specie, sembra che permanga il vulnus del diritto di difesa.
    Difatti, nell’ipotesi di fissazione dell’udienza preliminare l’imputato può chiedere l’ammissione di atti e documenti,
    ivi compresa la documentazione dell’investigazione difensiva. Quindi, prima che siano formulate le con-clusioni, può avanzare
    richiesta di giudizio abbreviato non condizionato. In tal caso, gli atti di investi-gazione difensiva sono equiparati
    agli atti di indagine compiuti dal pubblico ministero, in quanto vi è una rinuncia generalizzata al contraddittorio nella
    formazione della prova 44. Di tal guisa, l’imputato «si precostituisce le condizioni per essere giudicato allo stato degli
    atti, garantendosi l’accesso al rito e la tendenziale immutabilità – salvo interventi ex officio del giudice – del quadro
    probatorio su cui ha fon-dato la scelta della definizione anticipata del processo» 45. Ovviamente, si pone il problema
    delle modalità attuative del contraddittorio, in quanto qualora la produzione documentale e la richiesta di giudizio abbreviato
    si susseguano rapidamente il pubblico ministero potrebbe non disporre del tempo necessario per presentare prove contrarie.
    La soluzione, fra l’altro più aderente al dato normativo, è stata individuata dalla Corte costituzionale, che, nell’ipotesi
    in parola, ha ritenuto che il giudice sia tenuto, sicuramente, a concedere un termine al pubblico ministero, sempre che
    questi lo richieda, per confutare gli elementi probatori acquisiti su richiesta della contropar-te 46. Peraltro, la normativa
    contenuta nel d.d.l. n. 2067 S, approvato al Senato ed ora di nuovo all’esame della Camera dei deputati, all’art. 41,
    prevede la sostituzione del comma 4 dell’art. 438 c.p.p. con un nuovo comma, che dispone, nell’ipotesi di richiesta di
    giudizio abbreviato immediatamente dopo il de-posito dei risultati delle indagini difensive, che il giudice provveda solo
    dopo che sia decorso il termine non superiore a sessanta giorni, eventualmente richiesto dal pubblico ministero, per lo
    svolgimento di indagini suppletive limitatamente ai temi introdotti dalla difesa. Viceversa, come già esposto e come emerge
    chiaramente nel caso di specie, nell’ipotesi di giudizio abbreviato atipico, ossia disposto a seguito dell’emissione del
    decreto penale di condanna, affinché l’imputato possa chiedere l’acquisizione della documentazione difensiva sarà necessario
    che egli avanzi la richiesta di giudizio abbreviato condizionato, giacché in caso di richiesta di abbreviato incondiziona-to
    non vi sarebbe alcuno spazio per acquisire documentazioni preventive. Ma, l’integrazione probatoria deve prefigurarsi
    come «indispensabile ai fini della decisione», cioè oggettivamente idonea ed utile ad assicurare il completo accertamento
    dei temi rilevanti a norma dell’art. 187 c.p.p. 47 e, pertanto, il giudice può rigettare la richiesta laddove ritenga
    che non ricorra il re-quisito in parola. Ne consegue che all’imputato potrebbe comunque essere preclusa la possibilità
    di far acquisire la documentazione difensiva. Appare, quindi, evidente la disparità di trattamento delle due fattispecie
    processuali, che indurrebbe ad ipotizzare un dubbio di incostituzionalità, che non pare risulti superato neanche dalla
    normativa, innanzi richiamata, contenuta nel d.d.l. n. 2067 S, atteso che essa si limita ad introdurre la disciplina dell’ipotesi
    inerente alla richiesta di giudizio abbreviato avanzata immediatamente dopo il deposito della documentazione dell’attività
    investigativa.
- source_sentence: Quale prova ha consentito al giudice di affermare che la giovane fosse già sul luogo di M. prima delle
    14:00?
  sentences:
  - PREMESSA Di grande interesse la decisione adottata nello scorso ottobre dalla Procura generale presso la Corte di cassazione,
    in tema di avocazione facoltativa 1 ex art. 412, comma 2, c.p.p. L’occasione è stata la definizione del reclamo presentato
    ai sensi dell’art. 70, comma 6-bis, ord. giud. dal pubblico ministero di primo grado istituito presso il Tribunale di
    Milano avverso il provvedimento di avocazione adottato dal procuratore generale presso la relativa Corte di appello. Per
    confutare la sussistenza dei presupposti legittimanti la sostituzione del pubblico ministero pro-cedente con quello istituito
    presso il giudice di secondo grado si escludeva, in primo luogo, che il pro-curatore generale presso la Corte di appello,
    successivamente all’avvenuta fissazione dell’udienza ca-merale di controllo sull’inazione ed alla ricezione del relativo
    avviso, potesse disporre l’avocazione per ragioni “squisitamente di merito”. In secondo luogo, si censuravano gli stessi
    presupposti di merito su cui era fondata l’iniziativa del procuratore generale, denunciando l’asserita incongruenza delle
    deter-minazioni dell’organo avocante con le risultanze probatorie già emerse in esito all’attività d’indagine. Al di là
    dei profili concreti relativi alla vicenda da cui ha preso origine la querelle, il provvedimento che si annota risulta
    di notevole importanza poiché le ragioni del contendere erano tutte imperniate su una regola centrale della giustizia
    penale e del nostro assetto politico-istituzionale. Per la soluzione del-le questioni esposte nel reclamo, infatti, era
    dirimente prendere posizione su come l’obbligatorietà dell’azione penale sancita nell’art. 112 Cost. conformi la fisionomia
    del potere di avocazione. È noto il generale ostracismo che da tempo si indirizza verso ogni dibattito sui profili problematici
    dell’attuale assetto dell’azione penale nel nostro ordinamento, nonostante l’assoluta ineffettività pratica
  - 'ziale: nel procedimento cautelare e nel procedimento di esecuzione, l’omessa notifica dell’avviso di fis-sazione dell’udienza
    camerale integra una nullità assoluta ai sensi dell’art. 179 c.p.p. Nonostante l’arresto giurisprudenziale delle Sezioni
    Unite, secondo cui l’omissione della notifica all’imputato dell’avviso di udienza preliminare costituisce una ipotesi
    di nullità assoluta, di recente al-cune pronunce della Cassazione hanno recuperato la tesi della natura intermedia di
    tale invalidità. Tale opzione esegetica si basa sulla funzione meramente di filtro della udienza preliminare (Cass., sez.
    IV, 12 novembre 2015, n. 46991) e sulla differenza strutturale e concettuale tra l’avviso e la citazione (Cass., sez.
    V, 9 ottobre 2013, n. 49473). Le Sezioni Unite si interrogano sull’effettiva consapevolezza di un mutamento di giurisprudenza,
    rinvenendosi in una ipotesi di overruling contra reum. Invero, la funzione di nomofilachia affidata dal(l’art. 65 ord.
    giud. alla Corte di cassazione è stata nel tempo valorizzata, attribuendo sempre maggior rilievo al precedente di legittimità.
    Di conseguenza, perché una sentenza determini una overruling, deve mo-strare l’intenzione di mutare l’indirizzo giurisprudenziale
    consolidato e deve essere sostenuta da un apparato argomentativo persuasivo. Secondo la Suprema corte, queste caratteristiche
    non connotano le sentenze delle Sezioni semplici, causa del presunto contrasto, prive di alcun riferimento alla giurispru-denza
    delle Sezioni unite e di argomentazioni dirimenti (Cass., sez. VI, 15 aprile 2010, n. 17779). In conclusione, le Sezioni
    Unite ribadiscono il seguente principio di diritto: “L’omessa notifica all’im-putato dell’avviso di fissazione dell’udienza
    preliminare configura un’ipotesi di nullità assoluta, insanabile e rile-vabile d’ufficio in ogni stato e grado del procedimento,
    derivante dall’omessa citazione dell’imputato”: LE CONDIZIONI ED I LIMITI DELLA CONFISCA DEI BENI DOPO LA MORTE DEL SOGGETTO
    SOCIALMENTE PE-RICOLOSO'
  - 'M.S. in un orario in cui era ivi già presente la Sp.Ma. (che però non la vide mai arrivare). Ne conseguiva, pertanto,
    che S.S., a giudizio della Corte, aveva detto una bugia ai genitori, quando aveva affermato di essere in procinto di uscire
    perchè aveva ricevuto il messaggio della cugina, messaggio che, al contrario, in quel momento non le era stato ancora
    inviato. Sono state esaminate le deposizioni dei testi Pe.An., Ma.Gi., T.P., D.B.G. e quella del teste O., datore di lavoro
    della T.P. e della D.B.G. stessa, in uno a quelle dei testi Na.Gi. e Gi.Fe., per inferirne la conclusione che la S.S.
    fosse giunta entro le ore 14:00 presso l''abitazione M.. L''arrivo effettivo di S.S. a casa M. era supportato anche da
    un colloquio intercettato in carcere tra la S.C. ed il marito, durante il quale la prima affermava: quel giorno sarebbe
    stato meglio se fosse caduto un fulmine sulla casa e ci avesse fulminati tutti prima che giungesse la ragazza (cfr. fl.
    367). Ancora, dialogando con la figlia M.V., la S.C. affermava che il fatto era avvenuto a casa loro e ciò determinava
    che tutto fosse contro di loro. S.S. doveva, in effetti, essere stata uccisa tra le ore 14,00 e le 14,20 circa, alla stregua
    delle conclusioni del medico legale, St., che aveva calcolato i tempi di digestione della giovane, collocando la morte
    dopo circa un''ora dalla consumazione del pasto. I risultati dei tabulati. Dai tabulati telefonici derivano, ancora, elementi
    significativi per la ricostruzione dei fatti, a giudizio della Corte territoriale. Alle 14:18:47 M.F., amica di S.S.,
    le aveva inviato un sms, senza ricevere risposta. La stessa M.F., dopo poco, alle 14:23:11, aveva chiamato S.S., per ottenere
    riscontro sul messaggio, e non aveva ricevuto risposta. Il mancato riscontro di S.S. al messaggio e alla chiamata dell''amica
    era stato ritenuto da costei inusuale. Ciò perchè, anche in ritardo, S.S. era solita dare un cenno di riscontro. La sentenza
    ha ripreso i contatti registratisi nell''arco temporale di riferimento e ha riepilogato che: alle 13:59 S.A.M. aveva chiamato
    la M.S. e non aveva ricevuto risposta; alle 14:23:31 Sp.Ma. aveva inviato alla M.S. il seguente sms:il tempo di mettere
    il costume e vengo; alle 14:24:03 M.S. aveva replicato: avviso S.S.? alle14:24:30 la Sp.Ma. aveva risposto: ok; La Sp.Ma.,
    hanno osservato i giudici di merito, era rimasta stupita dalla richiesta della M.S., poichè la presenza di S.S. era scontata
    dalla sera precedente. Erano seguiti gli sms da M.S. a S.S. delle 14:25:08 e delle 14:28:13 e, dunque, lo squillo dall''utenza
    della S.S. alla M.S. alle 14:28:26. Alle 14:28:40 la M.S. aveva mandato un sms alla Sp.Ma. dal testo: sto tentando in
    bagno. Alle 14:31 la M.S. aveva ricevuto un sms dall''amica Ci.An., cui aveva risposto;'
- source_sentence: Quale ente di controllo mantiene il registro delle amministrazioni che utilizzano contratti diretti con
    le proprie società interne?
  sentences:
  - 'Il Presidente della Giunta rappresenta la Regione; dirige la politica della Giunta e ne è responsabile; promulga le leggi
    ed emana i regolamenti regionali; dirige le funzioni amministrative delegate dallo Stato alla Regione, conformandosi alle
    istruzioni del Governo della Repubblica36. Art. 12237. Il sistema di elezione e i casi di ineleggibilità e di incompatibilità
    del Presidente e degli altri componenti della Giunta regionale nonché dei consiglieri regionali sono disciplinati con
    legge della Regione nei limiti dei principi fondamentali stabiliti con legge della Repubblica, che stabilisce anche la
    durata degli organi elettivi. Nessuno può appartenere contemporaneamente a un Consiglio o a una Giunta regionale e ad
    una delle Camere del Parlamento, ad un altro Consiglio o ad altra Giunta regionale, ovvero al Parlamento europeo. Il Consiglio
    elegge tra i suoi componenti un Presidente e un ufficio di presidenza. I consiglieri regionali non possono essere chiamati
    a rispondere delle opinioni espresse e dei voti dati nell’esercizio delle loro funzioni. 36 Comma così sostituito con
    l’articolo 1, comma 1, lettera b), della legge costituzionale 22 novembre 1999, n. 1. 37 Articolo così sostituito con
    l’articolo 2, comma 1, della legge costituzionale 22 novembre 1999, n. 1. Con le disposizioni transitorie, la stessa legge
    costituzionale ha inoltre stabilito: «Art. 5. - 1. Fino alla data di entrata in vigore dei nuovi statuti regionali e delle
    nuove leggi elettorali ai sensi del primo comma dell’articolo 122 della Costituzione, come sostituito dall’articolo 2
    della presente legge costituzionale, l’elezione del Presidente della Giunta regionale è contestuale al rinnovo dei rispettivi
    Consigli regionali e si effettua con le modalità previste dalle disposizioni di legge ordinaria vigenti in materia di
    elezione dei Consigli regionali. Sono candidati alla Presidenza della Giunta regionale i capilista delle liste regionali.
    È proclamato eletto Presidente della Giunta regionale il candidato che ha conseguito il maggior numero di voti validi
    in ambito regionale. Il Presidente della Giunta regionale fa parte del Consiglio regionale. È eletto alla carica di consigliere
    il candidato alla carica di Presidente della Giunta regionale che ha conseguito un numero di voti validi immediatamente
    inferiore a quello del candidato proclamato eletto Presidente. L’Ufficio centrale regionale riserva, a tal fine, l’ultimo
    dei seggi eventualmente spettanti alle liste circoscrizionali collegate con il capolista della lista regionale proclamato
    alla carica di consigliere, nell’ipotesi prevista al numero 3) del tredicesimo comma dell’articolo 15 della legge 17 febbraio
    1968, n. 108, introdotto dal comma 2 dell’articolo 3 della legge 23 febbraio 1995, n. 43; o, altrimenti, il seggio attribuito
    con il resto o con la cifra elettorale minore, tra quelli delle stesse liste, in sede di collegio unico regionale per
    la ripartizione dei seggi circoscrizionali residui. Qualora tutti i seggi spettanti alle liste collegate siano stati assegnati
    con quoziente intero in sede circoscrizionale, l’Ufficio centrale regionale procede all’attribuzione di un seggio aggiuntivo,
    del quale si deve tenere conto per la determinazione della conseguente quota percentuale di seggi spettanti alle liste
    di maggioranza in seno al Consiglio regionale.'
  - 'Quanto al concorso nel delitto di omicidio, ogni dubbio è stato escluso dalla sentenza di secondo grado, che, convalidando
    la ricostruzione dei primi giudici, ha specificamente richiamato gli elementi a carico della S.C., componendoli in un
    quadro unitario che induceva a ritenere ampiamente provato il suo contributo causale e materiale al delitto. La decisione
    impugnata esamina accuratamente la questione (cfr. fll. 720 ss e 729), spiegando che, dopo il rientro a casa della S.C.
    e della M.S. seguito al perpetrato sequestro, si consumò l''atroce delitto nei confronti della giovane S.. Le due imputate
    erano in casa e avevano realizzato poco prima il sequestro di persona. Il loro comune alibi era risultato falso e le modalità
    commissive dell''omicidio avevano richiesto necessariamente la compresenza e il concorso materiale di due persone. M.M.
    era, dal canto suo, estraneo a questa fase della vicenda delittuosa. Tutti questi elementi, saldati logicamente in una
    sequenza non altrimenti interpretabile, attestavano il concorso di S.C., unitamente alla figlia M.S., nell''omicidio.
    L''impraticabilità della prospettazione alternativa assumente come unico autore dell''omicidio il M.M. discendeva: - dall''assenza
    di qualsiasi credibile movente, essendosi rivelato privo di consistenza quello di natura sessuale, smentito da più dati
    processuali (assoluta mancanza di annotazioni nel diario della S. su eventi siffatti; ritenuta inattendibilità delle dichiarazioni
    di Se.Do.; intercettazioni sui commenti con la S.C.); - dal fatto che il M.M. non era stato in grado di fornire una descrizione
    della fase esecutiva conciliabile con i dati di prova acquisiti. Alla stregua dei risultati degli esami autoptici e della
    consulenza eseguita, il delitto doveva ascriversi a due persone, da identificare nelle imputate (cfr sentenza impugnata
    fl. 760 e ss.). L''omicidio era stato consumato mediante strangolamento e, cioè, attraverso un''asfissia meccanica da
    costrizione delle vie aeree esterne. La sentenza ha richiamato la documentazione fotografica allegata alla consulenza
    St., spiegando le ragioni della mancata acquisizione della consulenza Ca.Ar. (cfr. fl. 763). Si è valorizzato ,.r.a.i.r.b.s.s.o.a.d.r.i.r.d.a.c.r.b.v.u.s.p.e.n.n.p.a.d.c.S.s.a.r.i.s.v.s.p.p.d.c.d.v.d.d.c.d.m.c.a.c.s.e.d.e.c.i.
    m.a.p.e.s.a.p.v.i.a.c. L.d.s.d.f.d.i.e.d.c.c.e.l.m.d.s.i.d.d. L.i.r.c.e.u.s.n.n.f.a.b.p.e.r.c.i.a.f.1.d.r.a.L.i.r.e.s.l.s.c.d.S.r.l.i.t.d.u.c.
    N.p.d.i.Misseri Michele a.d.i.v.q.a.d.d.a.a.d.a.u.u.c.m.c.i.c.l.t.t.c.a.i.d.l.p.c.c.e.s.a.v.c.d.a.g.d.C.t.c.e.i.d.f.l.m.d.c.c.a.i.l.(.f.7.s.i
    . L.C.t.h.e.c.d.d.a.l.r.a.a.s.d.c.d.p.arbarello e.h.s.a.p.q.m.s.d.p.q.c.a.i.a.C.s.i.p. S., giungendo alla conclusione
    che le affermazioni del M.M. sul punto non fossero per nulla credibili (cfr sentenza ai fll. 770 e ss.). Si è, quindi,
    correttamente escluso che S.S. fosse stata uccisa con una corda, per l''incompatibilità di tale assunto con le caratteristiche
    e l''andamento dei solchi impressi sul collo. La durata dell''azione avrebbe, poi, consentito alla vittima di tentare
    disperate iniziative di difesa e di opposizione allo strangolamento che stava subendo, usando le mani per allentare l''asfissia
    o muovendo la testa per liberare il collo. Nel caso in esame non erano stati invece rinvenuti sul corpo della vittima
    segni di lotta o legati al tentativo di allentamento della cintura stretta al collo, come reazione istintiva al soffocamento
    che si stava compiendo. L''impronta repertata dal medico legale era netta e priva di sbavature, a dimostrazione che la
    vittima non aveva opposto alcuna resistenza. Lo strangolamento non poteva quindi essere opera di un unico soggetto, ma
    doveva essere avvenuto per effetto del concorso sinergico di due persone, l''una che aveva posto in essere la specifica
    azione di soffocamento da dietro alla vittima e l''altra che le aveva inibito ogni tentativo di difendersi'
  - 'VADEMECUM PER LE SOCIETA’ IN HOUSE NEL NUOVO CODICE DEGLI APPALTI E NEL TESTO UNICO DELLE SOCIETA’ PUBBLICHE Sommario
    PARTE 1: CONTESTO NORMATIVO PARTE 2: ISCRIZIONE ELENCO SOCIETÀ IN HOUSE PARTE 3: INDICAZIONI OPERATIVE Premessa Il presente
    documento è stato predisposto per coadiuvare gli operatori del settore sulle molteplici soluzioni e possibili opzioni
    e/o clausole statutarie che si possono considerare in sede di redazione degli statuti delle società in house providing.
    Sono qui delineate le linee operative per l’esercizio del controllo analogo da parte delle amministrazioni aggiudicatrici
    ed alcuni spunti di riflessione per la coordinazione delle proprie società in house alle quali si partecipa assieme ad
    altre amministrazioni aggiudicatrici per la gestione comune dei servizi pubblici. 1. Contesto normativo Il contesto normativo
    di riferimento per quel che qui interessa è costituito: a) dalla direttiva 2014/24/UE del Parlamento europeo e del Consiglio
    del 26 febbraio 2014, dal d.lgs.18 aprile 2016, n. 50 (Codice dei contratti pubblici) e s.m.i., nonché dalla giurisprudenza
    europea e nazionale sull’in house providing; b) dal d.lgs.19 agosto 2016, n. 175 (Testo unico delle società a partecipazione
    pubblica) e s.m.i.; c) dalle Linee guida ANAC n. 7 sull’iscrizione nell’elenco delle società in house, emanate ai sensi
    dell’art. 192 del d.lgs. n. 50/2016 con deliberazione del Consiglio n. 951 del 20 settembre 2017. 2. Iscrizione elenco
    società in house In relazione alla competenza attribuita all’ANAC dalla norma di cui all’articolo 192 del d.lgs.18 aprile
    2016, n. 50, l’Autorità detiene un elenco delle amministrazioni aggiudicatrici e degli enti aggiudicatori che operano
    mediante affidamenti diretti nei confronti di proprie società in house.'
