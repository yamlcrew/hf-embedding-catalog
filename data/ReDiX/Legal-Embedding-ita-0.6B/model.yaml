    - 'lega 32, anziché limitarsi a riconoscere efficacia di giudicato al peculiare proscioglimento per tenuità del fatto,
      si sarebbe dovuto intervenire sia sull’art. 538 c.p.p., spezzando il rigido legame condanna-risarcimento 33, sia sul
      meccanismo che regola i rapporti tra azione civile e azione penale (art. 75 c.p.p.), autorizzando il danneggiato ad
      agire in sede civile senza dover attendere l’irrevocabilità della decisione penale sulla tenuità del fatto 34. Il danneggiato,
      nonostante la previsione dell’art. 651-bis c.p.p. è, infatti, tenuto a dimostrare, davanti al giudice civile, la sussistenza
      del nesso di causalità tra condotta e danno e a quantificare quest’ultimo, e va incontro al rischio che le sue aspettative
      risarcitorie siano deluse, ben potendo, la ritenuta tenuità del fatto desunta, tra l’altro, dall’esiguità del danno,
      influenzare, pur in assenza di un vincolo giuridi-co 35 – che esiste solo per quanto attiene alla sussistenza del fatto
      e alla sua attribuibilità al soggetto – le determinazioni del giudice civile in tema di risarcimento. Meno chiaro, nel
      silenzio della legge, è se si possa pervenire ad una pronuncia ex art. 131-bis c.p. al termine dell’udienza preliminare.
      In senso positivo depone il fatto che l’art. 425 c.p.p. contiene una formula coerente con la causa di esclusione della
      punibilità, ben potendo rientrare la declaratoria ex art. 131-bis c.p. nell’ipotesi di «per-sona non punibile per qualsiasi
      causa» 36. A ciò si aggiunga il fatto che l’udienza preliminare si presta ad essere una sede idonea alle verifiche necessarie
      a tale declaratoria, disponendo il giudice dell’intero fascicolo delle indagini preliminari ed essendo possibili acquisizioni
      probatorie ulteriori se decisive ai fini della pronuncia della sentenza di non luogo a procedere. D’altro canto, sebbene
      non sia prevista espressamente la possibilità per l’imputato e per la persona offesa di interloquire sul punto, la decisione
      emessa all’esito di tale udienza postula un contraddittorio argomentativo tra le parti e vede potenzialmente coinvolta
      anche la persona offesa in quanto destinata-ria dell’avviso dell’udienza. Il non luogo a procedere e l’assoluzione dibattimentale
      sono, dunque, le pronunce attraverso le quali l’art. 131-bis c.p. può trovare il suo sbocco processuale. Non pare, invece,
      possibile pervenire, in difetto di una specifica previsione, al riconoscimento di tale speciale causa di non punibilità
      in applicazione dell’art. 129 c.p.p. in considerazione del fatto che l’ambito operativo di tale previsione è ontologicamente
      limitato «alle sole pronunce che possono dav-vero essere adottate con immediatezza in ogni stato e grado del processo»
      37. Tra tali pronunce non rien-tra certo quella che dichiara la particolare tenuità del fatto in quanto l’adozione della
      relativa formula di proscioglimento può avvenire solo dopo l’accertamento della sussistenza, della penale rilevanza
      e dell’ascrivibilità all’imputato del fatto per cui si procede 38. Diverse sono le ricadute, sul piano processuale,
      della scelta di non intervenire sull’art. 129 c.p.p. L’efficacia di tale disposizione non è, infatti, limitata alla
      fase dibattimentale; al contrario essa inter-viene a definire l’ambito dei poteri officiosi del giudice, sia qualora
      investito di un rito speciale deflati-vo, sia in sede di impugnazione. Non a caso si ritiene che non sia possibile pervenire
      al proscioglimento immediato per tenuità del fatto nel caso in cui sia stata formulata l’istanza di applicazione della
      pena su richiesta delle parti o la richiesta di decreto penale di condanna 39. In tali ipotesi, il giudice che ritenga
      il fatto tenue, può solo re- 32 Si legge all’art. 1, lett. m) della legge delega: «escludere la punibilità (...) senza
      pregiudizio per l’esercizio dell’azione civile per il risarcimento del danno e adeguando la relativa normativa processuale
      penale».'
    - ALLEGATO E - MODALITÀ DI ADESIONE AL CODICE DI CONDOTTA I Produttori di Software, anche se non associati ad Assosoftware,
      possono presentare domanda di adesione al presente Codice di condotta per uno o più Software Gestionali dagli stessi
      prodotti, laddove ritengano che tali SW soddisfino i requisiti del medesimo Codice. A tal fine, inviano la domanda all’ufficio
      di Segreteria dell’OdM presso Assosoftware, secondo le modalità qui di seguito descritte. In particolare, il Produttore
      presenta all’OdM la domanda di adesione redatta secondo la modulistica ed istruzioni rese disponibili sul Sito web dell’OdM,
      nella quale andranno indicati il o i SW gestionale/i per cui intende aderire, secondo la apposita scheda sintetica pubblicata
      sul medesimo Sito web. Alla domanda va allegata la documentazione indicata nella predetta modulistica1 e un questionario
      compilato dal Produttore, sulla base del modello reso disponibile dall’OdM, per la autovalutazione della conformità
      del SW Gestionale per cui si intende aderire ai requisiti previsti dal Codice di condotta e, in particolare, alle misure
      previste dai relativi Allegati A e B, nonché una dichiarazione con cui il Produttore si impegna al rispetto delle regole
      stabilite dal medesimo Codice di condotta secondo il modello pubblicato sul predetto Sito web. Entro i termini indicati
      dall’art. 20.2 del Codice di condotta, l’OdM verifica la completezza della documentazione, le informazioni riportate
      nel suddetto questionario di autovalutazione, la dichiarazione di impegno e l’assenza di circostanze ostative alla candidatura
      all’adesione al Codice di condotta da parte del Produttore richiedente. Ove necessario, può richiedere al Produttore
      di fornire gli ulteriori documenti ed informazioni necessarie per completare la domanda. Accertate la regolarità della
      domanda di adesione, la completezza delle documentazioni presentate da parte del richiedente e la sussistenza dei requisiti,
      l’OdM invia al Produttore richiedente apposita comunicazione, volta a dare conferma della suddetta adesione al Codice
      di condotta in riferimento al o ai SW per cui è stata approvata l’adesione medesima. A seguito della ricezione di tale
      conferma, i dati del Produttore aderente e dei relativi SW sono inseriti nell’Elenco dei Produttori del Software aderenti
