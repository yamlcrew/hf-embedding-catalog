  - ALLEGATO E - MODALITÀ DI ADESIONE AL CODICE DI CONDOTTA I Produttori di Software, anche se non associati ad Assosoftware,
    possono presentare domanda di adesione al presente Codice di condotta per uno o più Software Gestionali dagli stessi prodotti,
    laddove ritengano che tali SW soddisfino i requisiti del medesimo Codice. A tal fine, inviano la domanda all’ufficio di
    Segreteria dell’OdM presso Assosoftware, secondo le modalità qui di seguito descritte. In particolare, il Produttore presenta
    all’OdM la domanda di adesione redatta secondo la modulistica ed istruzioni rese disponibili sul Sito web dell’OdM, nella
    quale andranno indicati il o i SW gestionale/i per cui intende aderire, secondo la apposita scheda sintetica pubblicata
    sul medesimo Sito web. Alla domanda va allegata la documentazione indicata nella predetta modulistica1 e un questionario
    compilato dal Produttore, sulla base del modello reso disponibile dall’OdM, per la autovalutazione della conformità del
    SW Gestionale per cui si intende aderire ai requisiti previsti dal Codice di condotta e, in particolare, alle misure previste
    dai relativi Allegati A e B, nonché una dichiarazione con cui il Produttore si impegna al rispetto delle regole stabilite
    dal medesimo Codice di condotta secondo il modello pubblicato sul predetto Sito web. Entro i termini indicati dall’art.
    20.2 del Codice di condotta, l’OdM verifica la completezza della documentazione, le informazioni riportate nel suddetto
    questionario di autovalutazione, la dichiarazione di impegno e l’assenza di circostanze ostative alla candidatura all’adesione
    al Codice di condotta da parte del Produttore richiedente. Ove necessario, può richiedere al Produttore di fornire gli
    ulteriori documenti ed informazioni necessarie per completare la domanda. Accertate la regolarità della domanda di adesione,
    la completezza delle documentazioni presentate da parte del richiedente e la sussistenza dei requisiti, l’OdM invia al
    Produttore richiedente apposita comunicazione, volta a dare conferma della suddetta adesione al Codice di condotta in
    riferimento al o ai SW per cui è stata approvata l’adesione medesima. A seguito della ricezione di tale conferma, i dati
    del Produttore aderente e dei relativi SW sono inseriti nell’Elenco dei Produttori del Software aderenti pubblicato sul
    Sito web dell’OdM, dandone informazione anche al Garante, affinché possa aggiornare il registro di cui all’art. 40, paragrafo
    6, del Regolamento. L’eventuale mancata conferma della adesione al Codice di condotta presentata da parte di un Produttore
    del Software deve essere motivata da parte dell’OdM, fermo restando che tale diniego non preclude la possibilità per il
    Produttore di successiva presentazione della domanda di adesione che può avvenire non prima di un anno unitamente ad una
    breve nota che illustri le misure adottate per superare le ragioni che avevano condotto al precedente diniego. Qualora
    si verificassero modifiche o variazioni rilevanti rispetto alle informazioni e documentazioni fornite dalla SWH e valutate
    dall’OdM in relazione al Software Gestionale per il quale si è ottenuta l'adesione al Codice di condotta, il Produttore
    deve, tempestivamente, darne comunicazione all'OdM e collaborare con l’OdM per fornire le integrazioni ed aggiornamenti
    necessari per effettuare le relative, ulteriori valutazioni al fine di poter confermare la permanenza delle condizioni
    relative alla
