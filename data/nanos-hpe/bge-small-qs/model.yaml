    - 'HPE Cray XD665

      HPE is bringing the power of supercomputing to datacenters of any size with the HPE Cray XD665 System .

      HPE Cray XD665 System is a top-performing GPU-accelerated server, delivering mixed-HPC/AI workload

      solutions to rack-scale, in a rack and roll fashion.  

      HPE Cray XD665 System is a 4U chassis system that contains a single 2x CPU node with 4x Nvidia H100

      Tensor Core SXM5 GPUs. It offers a complete, scalable solution for AI & HPC customers everywhere, with

      flexibility of fabric, memory, storage and operating system. HPE Cray XD665 System provides maximum

      performance for advanced HPC Simulations, AI Training and Deep Learning.  

      Built with Exascale-ready networking technologies, integrated storage, extensive software portfolio and

      management tools, HPE Cray XD665 Systems can enable customers to innovate and prepare for tomorrow''s

      challenges.

      HPE Cray XD665 Server System Key Features

      4U Single-Node Chassis (Air & Liquid-Cooled)

      GPUs: 4x NVIDIA® H100 Tensor Core SXM5 GPUs providing leadership performance for AI Training,

      Deep Learning and advanced HPC simulations. PCIe GPUs are not supported on Cray XD665.

      CPUs: Support for 4 th  Generation AMD® EPYC® Scalable Processors: "Genoa"

      DRAM: Support for up to 24x DDR5 4800MT/s DIMMs

      High-Speed Fabric: 5x PCIe Gen 5.0 Half-Height, Half-Length slots supporting Slingshot 11, Infiband

      NDR and Ethernet, providing direct switchable connections between High-Speed Fabric, GPUs, NVMe

      drives and CPUs.

      Storage: Up to 8 SFF NVME U.3 and 2 M.2 RAID SSDs

      Power Supplies: 6x 3,000-Watt capacity per server system, providing full N+N redundancy.

      PCIe Expansion: 1x HHHL PCIe 5.0, 1x OCP 3.0 expansion slot with embedded 2-port 10G Base-T

      (RJ45), 1 1GbE NIC, 1x BMC Port, 1x VGA, 1x USB3.0, PWR Button/Reset/ID Button/Status LEDs  

      NVIDIA and NVLink are trademarks and/or registered trademarks of NVIDIA Corporation in the U.S. and

      other countries. All third-party marks are the property of their respective owners.  

      AMD and EPYC are trademarks and/or registered trademarks of Advanced Micro Devices, Inc. in the U.S.

      and other countries. All third-party marks are property of their respective owners

       

