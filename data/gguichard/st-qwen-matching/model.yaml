    "opportunity_place": "", "opportunity_expertise_area": "Assurance", "opportunity_tools": "", "opportunity_activity_area":
    "", "opportunity_type": "1", "opportunity_description": "What is the context?\nDesign of the new Developer Workplace to
    enhance developer experience and productivity, while :\n- Hardening security of the development environments, \n- Streamlining
    Identity and Access Management for Developers.\n- Leveraging Generative AI at scale\n\nRole : Shape the new Developer
    Workplace and Experience and lead the transformation.\n\nMain Tasks :\nDiscovery:\n- Understand the current Developer
    Workplace\n- Identify main pain points \n- Organize workshops with tribes to collect their needs\n- Understand security
    challenges\nVision : \n- Define the best fit options for the Developer Workplace\n- Share and federate teams and stakeholders
    around the new Developer Workplace.\n- Project Management / Coordination\nDefine the roadmap\n- Work with the Tribes Product
    Owners and IT Managers to onboard the requirements in their backlogs\n- Follow up the delivery\nChange management \n-
