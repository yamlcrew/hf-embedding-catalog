      "", "opportunity_type": "1", "opportunity_description": "Ingénieur Etudes et Développement Java/Web/DevOps\n☒ Expérimenté
      (3 à 7 ans d’XP)\n\nDescription de la mission : \nAu sein de la Tribu Crédits en charge des différentes applications
      en lien avec l’octroi et la gestion de crédits des marchés particuliers, professionnels et entreprises, nous recherchons
      un Ingénieur Etudes et Développement Java/Web/DevOps pour intervenir au sein de la Squad Assurance Des\nEmprunteurs
      (ADE).\nLa Squad ADE, responsable du périmètre IT qui permet de gérer la souscription et la substitution d’assurance,
      est en lien avec diverses applications crédits dépendantes d’autres Squads de la Tribu et avec le producteur d’assurance
      emprunteur CAAPE (groupe CA).\nAu sein de celle-ci, les missions consistent à participer à la conception applicative,
      au développement et au déploiement des solutions informatiques, à l’accompagnement de la phase de recette et au suivi
      de déploiement sur les projets suivants :\n- Projet Case Management : mise en œuvre d’échanges via API et/ou flux Kafka
      entre l’outil du parcours ADE et la solution Case Management.\n- Projet « Décote CACI Individuelle » : mise en œuvre
      d’échanges via API avec le producteur CAAPE et évolution d’écrans dans le parcours ADE \n- Passage en mode API des échanges
      entre LCL et CAAPE : désengagement du protocole d’échange actuel, en voie d’obsolescence.\n\nLe consultant contribuera
      également au maintien en conditions opérationnelles du parc applicatif Java/Web de la Squad (framework LCL Java/JEE).\n\nCompétences
      techniques attendues :\nConception, développement et appels d’API REST, architecture microservice\nDéveloppement avec
      version Java 11 ou supérieure\nFramework Open source Spring Boot\nGestion de versioning du code source Java avec Git,
      Gestion du référentiel avec GitLab.\nTest unitaire Framework JUnit\nArchitecture évènementielle avec Kafka\nUtilisation
      de l’outil de suivi de qualité de code SonarQube\nInfrastructure basée sur la conteneurisation avec Docker, déploiement
      sur plateforme Kubernetes\n\nProfil recherché / compétences attendues :\nCapacité à proposer, concevoir et développer
      des solutions applicatives pertinentes, en cohérence avec le cadre technique existant.\nCapacité à mettre en oeuvre
      opérationnellement les sujets techniques pris en charge en autonomie.\nLa DSI de LCL est en cours de transformation
      agile.\nLa connaissance et la pratique de ces modes de fonctionnement serait appréciable.", "opportunity_criteria":
      "", "opportunity_extract": 1}'
