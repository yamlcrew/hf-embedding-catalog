widgetData:
- source_sentence: What analogy is used to describe the training energy cost of less efficient models like the largest Llama
    3 model?
  sentences:
  - 'The two main categories I see are people who think AI agents are obviously things that go and act on your behalf—the
    travel agent model—and people who think in terms of LLMs that have been given access to tools which they can run in a
    loop as part of solving a problem. The term “autonomy” is often thrown into the mix too, again without including a clear
    definition.

    (I also collected 211 definitions on Twitter a few months ago—here they are in Datasette Lite—and had gemini-exp-1206
    attempt to summarize them.)

    Whatever the term may mean, agents still have that feeling of perpetually “coming soon”.'
  - 'I think this means that, as individual users, we don’t need to feel any guilt at all for the energy consumed by the vast
    majority of our prompts. The impact is likely neglible compared to driving a car down the street or maybe even watching
    a video on YouTube.

    Likewise, training. DeepSeek v3 training for less than $6m is a fantastic sign that training costs can and should continue
    to drop.

    For less efficient models I find it useful to compare their energy usage to commercial flights. The largest Llama 3 model
    cost about the same as a single digit number of fully loaded passenger flights from New York to London. That’s certainly
    not nothing, but once trained that model can be used by millions of people at no extra training cost.'
  - "blogging\n            105\n\n\n            ai\n            1259\n\n\n            generative-ai\n            1086\n\n\n\
    \            llms\n            1073\n\nNext: Tom Scott, and the formidable power of escalating streaks\nPrevious: Last\
    \ weeknotes of 2023\n\n\n \n \n\n\nColophon\n©\n2002\n2003\n2004\n2005\n2006\n2007\n2008\n2009\n2010\n2011\n2012\n2013\n\
    2014\n2015\n2016\n2017\n2018\n2019\n2020\n2021\n2022\n2023\n2024\n2025"
- source_sentence: What is the main reason given for the lack of AI agents running in production despite many prototypes?
  sentences:
  - 'I’m still trying to figure out the best patterns for doing this for my own work. Everyone knows that evals are important,
    but there remains a lack of great guidance for how to best implement them—I’m tracking this under my evals tag. My SVG
    pelican riding a bicycle benchmark is a pale imitation of what a real eval suite should look like.

    Apple Intelligence is bad, Apple’s MLX library is excellent

    As a Mac user I’ve been feeling a lot better about my choice of platform this year.

    Last year it felt like my lack of a Linux/Windows  machine with an NVIDIA GPU was a huge disadvantage in terms of trying
    out new models.'
  - 'A lot of people are excited about AI agents—an infuriatingly vague term that seems to be converging on “AI systems that
    can go away and act on your behalf”. We’ve been talking about them all year, but I’ve seen few if any examples of them
    running in production, despite lots of exciting prototypes.

    I think this is because of gullibility.

    Can we solve this? Honestly, I’m beginning to suspect that you can’t fully solve gullibility without achieving AGI. So
    it may be quite a while before those agent dreams can really start to come true!

    Code may be the best application

    Over the course of the year, it’s become increasingly clear that writing code is one of the things LLMs are most capable
    of.'
  - 'A year ago, the only organization that had released a generally useful LLM was OpenAI. We’ve now seen better-than-GPT-3
    class models produced by Anthropic, Mistral, Google, Meta, EleutherAI, Stability AI, TII in Abu Dhabi (Falcon), Microsoft
    Research, xAI, Replit, Baidu and a bunch of other organizations.

    The training cost (hardware and electricity) is still significant—initially millions of dollars, but that seems to have
    dropped to the tens of thousands already. Microsoft’s Phi-2 claims to have used “14 days on 96 A100 GPUs”, which works
    out at around $35,000 using current Lambda pricing.'
- source_sentence: What significant development in Artificial Intelligence occurred in 2023 according to Simon Willison’s
    weblog?
  sentences:
  - 'Stuff we figured out about AI in 2023






















    Simon Willison’s Weblog

    Subscribe







    Stuff we figured out about AI in 2023

    31st December 2023

    2023 was the breakthrough year for Large Language Models (LLMs). I think it’s OK to call these AI—they’re the latest and
    (currently) most interesting development in the academic field of Artificial Intelligence that dates back to the 1950s.

    Here’s my attempt to round up the highlights in one place!'
  - 'Stuff we figured out about AI in 2023






















    Simon Willison’s Weblog

    Subscribe







    Stuff we figured out about AI in 2023

    31st December 2023

    2023 was the breakthrough year for Large Language Models (LLMs). I think it’s OK to call these AI—they’re the latest and
    (currently) most interesting development in the academic field of Artificial Intelligence that dates back to the 1950s.

    Here’s my attempt to round up the highlights in one place!'
  - '“Agents” still haven’t really happened yet

    I find the term “agents” extremely frustrating. It lacks a single, clear and widely understood meaning... but the people
    who use the term never seem to acknowledge that.

    If you tell me that you are building “agents”, you’ve conveyed almost no information to me at all. Without reading your
    mind I have no way of telling which of the dozens of possible definitions you are talking about.'
- source_sentence: What is the chain-of-thought prompting trick and how does it help language models solve problems?
  sentences:
  - 'The GPT-4 barrier was comprehensively broken

    Some of those GPT-4 models run on my laptop

    LLM prices crashed, thanks to competition and increased efficiency

    Multimodal vision is common, audio and video are starting to emerge

    Voice and live camera mode are science fiction come to life

    Prompt driven app generation is a commodity already

    Universal access to the best models lasted for just a few short months

    “Agents” still haven’t really happened yet

    Evals really matter

    Apple Intelligence is bad, Apple’s MLX library is excellent

    The rise of inference-scaling “reasoning” models

    Was the best currently available LLM trained in China for less than $6m?

    The environmental impact got better

    The environmental impact got much, much worse'
  - '“Agents” still haven’t really happened yet

    I find the term “agents” extremely frustrating. It lacks a single, clear and widely understood meaning... but the people
    who use the term never seem to acknowledge that.

    If you tell me that you are building “agents”, you’ve conveyed almost no information to me at all. Without reading your
    mind I have no way of telling which of the dozens of possible definitions you are talking about.'
  - 'One way to think about these models is an extension of the chain-of-thought prompting trick, first explored in the May
    2022 paper Large Language Models are Zero-Shot Reasoners.

    This is that trick where, if you get a model to talk out loud about a problem it’s solving, you often get a result which
    the model would not have achieved otherwise.

    o1 takes this process and further bakes it into the model itself. The details are somewhat obfuscated: o1 models spend
    “reasoning tokens” thinking through the problem that are not directly visible to the user (though the ChatGPT UI shows
    a summary of them), then outputs a final result.'
- source_sentence: How did the construction of railways in the 1800s impact the environment?
  sentences:
  - 'An interesting point of comparison here could be the way railways rolled out around the world in the 1800s. Constructing
    these required enormous investments and had a massive environmental impact, and many of the lines that were built turned
    out to be unnecessary—sometimes multiple lines from different companies serving the exact same routes!

    The resulting bubbles contributed to several financial crashes, see Wikipedia for Panic of 1873, Panic of 1893, Panic
    of 1901 and the UK’s Railway Mania. They left us with a lot of useful infrastructure and a great deal of bankruptcies
    and environmental damage.

    The year of slop'
  - 'These price drops are driven by two factors: increased competition and increased efficiency. The efficiency thing is
    really important for everyone who is concerned about the environmental impact of LLMs. These price drops tie directly
    to how much energy is being used for running prompts.

    There’s still plenty to worry about with respect to the environmental impact of the great AI datacenter buildout, but
    a lot of the concerns over the energy cost of individual prompts are no longer credible.

    Here’s a fun napkin calculation: how much would it cost to generate short descriptions of every one of the 68,000 photos
    in my personal photo library using Google’s Gemini 1.5 Flash 8B (released in October), their cheapest model?'
  - 'The top five: ai (342), generativeai (300), llms (287), openai (86), chatgpt (78).

    I’ve written a lot about this stuff!

    I grabbed a screenshot of my Plausible analytics for the year, fed that to ChatGPT Vision, told it to extract the data
    into a table, then got it to mix in entry titles (from a SQL query it wrote) and produced this table with it. Here are
    my top entries this year by amount of traffic:




    Article

    Visitors

    Pageviews





    Bing: “I will not harm you unless you harm me first”

    1.1M

    1.3M



    Leaked Google document: “We Have No Moat, And Neither Does OpenAI”

    132k

    162k



    Large language models are having their Stable Diffusion moment

    121k

    150k



    Prompt injection: What’s the worst that can happen?

    79.8k

    95.9k'
