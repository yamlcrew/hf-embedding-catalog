    \ lambda / \ lambda < 10 ^ { - 9 } $. wavelength accuracy is obtained by providing two fundamental ingredients : 1 ) an
    absolute and information - rich wavelength source and 2 ) the ability of the spectrograph and its data reduction of transferring
    the reference scale ( wavelengths ) to a measurement scale ( detector pixels ) in a repeatable manner. the goal of this
    work is to improve the wavelength calibration accuracy of the harps spectrograph by combining the absolute spectral reference
    provided by the emission lines of a thorium - argon hollow - cathode lamp ( hcl ) with the spectrally rich and precise
    spectral information of a fabry - p \ '' erot - based calibration source. on the basis of calibration frames acquired
    each night since the fabry - p \ '' erot etalon was installed on harps in 2011, we construct a combined wavelength solution
    which fits simultaneously the thorium emission lines and the fabry - p \ '' erot lines. the combined fit is anchored to
    the absolute thorium wavelengths, which provide the ` zero - point '' of the spectrograph, while the fabry - p \ '' erot
    lines are used to improve the ( spectrally ) local precision. the obtained wavelength solution is verified for auto -
    consistency and tested against a solution obtained using the harps laser - frequency comb ( lfc ). the combined thorium
    + fabry - p \ '' erot wavelength solution shows significantly better performances compared to the thorium - only calibration.
    the presented techniques will therefore be used in the new harps and harps - n pipeline, and will be exported to the espresso
    spectrograph.'
