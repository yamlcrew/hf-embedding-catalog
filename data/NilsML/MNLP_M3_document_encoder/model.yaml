- source_sentence: Electromagnetic radiation behaves like particles as well as what?
  sentences:
  - quantum metrology allows us to attain a measurement precision that surpasses the classically achievable limit by using
    quantum characters. the metrology precision is raised from the standard quantum limit ( sql ) to the heisenberg limit
    ( hl ) by using entanglement. however, it was reported that the hl returns to the sql in the presence of local dephasing
    environments under the long encoding - time condition. we evaluate here the exact impacts of local dissipative environments
    on quantum metrology, based on the ramsey interferometer. it is found that the hl is asymptotically recovered under the
    long encoding - time condition for a finite number of the probe atoms. our analysis reveals that this is essentially due
    to the formation of a bound state between each atom and its environment. this provides an avenue for experimentation to
    implement quantum metrology under practical conditions via engineering of the formation of the system - environment bound
    state.
  - plasmons in two - dimensional electron systems with nonparabolic bands, such as graphene, feature strong dependence on
    electron - electron interactions. we use a many - body approach to relate plasmon dispersion at long wavelengths to landau
    fermi - liquid interactions and quasiparticle velocity. an identical renormalization is shown to arise for the magnetoplasmon
    resonance. for a model with n > > 1 fermion species, this approach predicts a power - law dependence for plasmon frequency
    vs. carrier concentration, valid in a wide range of doping densities, both high and low. gate tunability of plasmons in
    graphene can be exploited to directly probe the effects of electron - electron interaction.
  - 'the study of earth - mass extrasolar planets via the radial - velocity technique and the measurement of the potential
