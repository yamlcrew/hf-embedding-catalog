- source_sentence: What type of electrons are electrons that are not confined to the bond between two atoms?
  sentences:
  - Gap genes themselves are under the effect of maternal effect genes, such as bicoid and nanos. Gap genes also regulate
    each other to achieve their precise striped expression patterns. The maternal effect is when the phenotype of offspring
    is partly determined by the phenotype of its mother, irrespective of genotype. This often occurs when the mother supplies
    mRNA or proteins to the egg, affecting early development. In developing Drosophila, maternal effects include axis determination.
  - the human capacity for working together and with tools builds on cognitive abilities that, while not unique to humans,
    are most developed in humans both in scale and plasticity. our capacity to engage with collaborators and with technology
    requires a continuous expenditure of attentive work that we show may be understood in terms of what is heuristically argued
    as ` trust ' in socio - economic fields. by adopting a ` social physics ' of information approach, we are able to bring
    dimensional analysis to bear on an anthropological - economic issue. the cognitive - economic trade - off between group
    size and rate of attention to detail is the connection between these. this allows humans to scale cooperative effort across
    groups, from teams to communities, with a trade - off between group size and attention. we show here that an accurate
    concept of trust follows a bipartite ` economy of work ' model, and that this leads to correct predictions about the statistical
    distribution of group sizes in society. trust is essentially a cognitive - economic issue that depends on the memory cost
    of past behaviour and on the frequency of attentive policing of intent. all this leads to the characteristic ` fractal
    ' structure for human communities. the balance between attraction to some alpha attractor and dispersion due to conflict
    fully explains data from all relevant sources. the implications of our method suggest a broad applicability beyond purely
    social groupings to general resource constrained interactions, e. g. in work, technology, cybernetics, and generalized
    socio - economic systems of all kinds.
  - we consider a long - term optimal investment problem where an investor tries to minimize the probability of falling below
    a target growth rate. from a mathematical viewpoint, this is a large deviation control problem. this problem will be shown
    to relate to a risk - sensitive stochastic control problem for a sufficiently large time horizon. indeed, in our theorem
    we state a duality in the relation between the above two problems. furthermore, under a multidimensional linear gaussian
    model we obtain explicit solutions for the primal problem.
