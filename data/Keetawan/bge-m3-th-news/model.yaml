- source_sentence: 'พล.ต.ท.คำรบ นำสว.สำรอง บุกถึงสำนักงานตำรวจแห่งชาติ ขอตำรวจคุ้มครองพยานคดีฮั้วเลือกสว. ถูกคุกคาม-ใช้เงินจ้างไม่ให้ให้ข้อมูลเจ้าหน้าที่
    จี้ ผบ.ตร. สั่งพื้นที่ดูแลความปลอดภัย 10 จังหวัด


    วันที่ 23 พ.ค. 2568 เมื่อเวลา 14.00 น. ที่สำนักงานตำรวจแห่งชาติ (ตร.) พล.ต.ท.คำรบ ปัญญาแก้ว นำตัวแทนกลุ่มสว.สำรองและผู้สมัครรับเลือกสว.
    เดินทางมายื่นหนังสือที่สำนักงานตำรวจแห่งชาติถึงผู้บัญชาการตำรวจแห่งชาติเพื่อขอเพิ่มความเข้มข้นในการดูแลความสงบเรียบร้อยและความปลอดภัยในชีวิตและทรัพย์สินของพยานในคดีฮั้วเลือกสว.
    พล.ต.ท.คำรบ กล่าวว่า เนื่องจากในช่วงการสืบสวนไต่สวนคดีฮั้วสว. ได้มีพยานบุคคลมาให้การกับเจ้าหน้าที่กรมสอบสวนคดี หรือ ดีเอสไอ
    และ สำนักงานคณะกรรมการการเลือกตั้ง หรือ กกต. หลายราย รวมถึงคนที่อยากจะมาให้การเพิ่มเติมอีกหลายราย แต่ปรากฏว่ามีกลุ่มของขบวนการฮั้วสว.
    ได้ใช้อิทธิพลกดดันข่มขู่พยานทั้งคนที่เคยให้การแล้วและผู้ที่จะมาให้การเพิ่มเติม รวมถึงใช้เงินจ้างไม่ให้มาให้ปากคำกับเจ้าหน้าที่
