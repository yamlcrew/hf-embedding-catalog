    โดยเฉพาะจังหวัดที่มีข้อมูลว่ามีการฮั้วการเลือกสว. อย่างเข้มข้น ประมาณ 10 กว่าจังหวัดเป็นพิเศษ เพื่อดูแลความปลอดภัยในชีวิตและทรัพย์สิน
    รวมถึงหาข้อมูลเกี่ยวกับซุ้มมือปืน เพิ่มความเข้มข้นในการปิดล้อม ตรวจค้น ตั้งด่านและภารกิจต่างๆ เพื่อให้ทุกคนรู้สึกปลอดภัย


    พล.ต.ท.คำรบ ขอให้ตำรวจสืบสวนให้ถึงกลุ่มมือปืนในพื้นที่ เพราะขณะนี้พวกตนมีข้อมูลว่ากลุ่มคนเหล่านี้เริ่มขยับตัว จึงอยากให้สำนักงานตำรวจแห่งชาติเริ่มมีคำสั่งที่เป็นรูปธรรมว่าพื้นที่ใดที่เกิดเหตุเรื่องความไม่ปลอดภัยหรือมีเหตุร้ายเกิดขึ้นที่เกี่ยวข้องกับการเลือกสว.ที่ผ่านมาอยากให้ตำรวจและประเมินร่วมเจ้าหน้าที่ในพื้นที่เพื่อป้องกันเหตุที่จะเกิดขึ้นได้
