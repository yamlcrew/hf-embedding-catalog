  - 'โซเชียลตื่นเต้น ระบบทดสอบแจ้งเตือนผ่านโทรศัพท์มือถือ (Cell Broadcast) ดังพร้อมกันเวลา 13.00 น. ย้ำเป็นเพียงการทดสอบระบบไม่ต้องตื่นตระหนก
    และไม่มีการให้กดลิงก์ โปรดระวังมิจฉาชีพสวมรอย


