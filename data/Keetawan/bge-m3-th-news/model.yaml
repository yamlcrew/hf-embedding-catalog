  widget:
  - source_sentence: 'ปลัดกระทรวงการคลัง ลวรณ แสงสนิท เปิดเผยว่า การประชุมอนุกรรมการกลั่นกรองโครงการกระตุ้นเศรษฐกิจ ที่มี
      พิชัย ชุณหวชิร รองนายกฯ และ รมว.คลัง เป็นประธาน จะมี การนำข้อเสนอโครงการกระตุ้นเศรษฐกิจต่างๆ เข้าสู่ที่ประชุมคณะกรรมการนโยบายกระตุ้นเศรษฐกิจที่มี
      นายกฯ แพทองธาร ชินวัตร นั่งเป็นประธานการประชุมอีกรอบ โฟกัสไปที่ การ ทบทวนแผนการใช้งบประมาณกระตุ้นเศรษฐกิจจำนวน 1.57
      แสนล้าน ที่จะนำไปใช้กับมาตรการดูแลผู้ที่ได้รับผลกระทบจาก นโยบายภาษีตอบโต้ของสหรัฐฯ จากเดิมที่เตรียมนำงบประมาณดังกล่าวสำหรับรองรับ
      โครงการเติมเงิน 10,000 บาท ผ่านดิจิทัลวอลเล็ตเฟส 3-4 สำหรับประชาชนทั่วไป


      ทั้งนี้ หน่วยงานที่เกี่ยวข้อง กระทรวงการคลัง สำนักงบประมาณ สำนักงานสภาพัฒนาการเศรษฐกิจและสังคมแห่งชาติ ได้ส่งรายการที่เสนอให้มีการทบทวนให้คณะกรรมการฯพิจารณา
       ส่วนงบประมาณจำนวน 1.57 แสนล้านจะเพียงพอที่จะนำไปใช้ในโครงการรับมือกับมาตรการภาษีตอบโต้ของสหรัฐฯหรือไม่เป็นอีกเรื่อง


      ซึ่งในประเด็นนี้ รัฐบาลโดย กระทรวงการคลัง ได้เสนอให้มีการกู้เงินเพื่อนำมาใช้ในการกระตุ้นเศรษฐกิจเพิ่มเติมอีกจำนวน 5
      แสนล้านบาท แต่ติดปัญหาระเบียบการเงินการคลังของประเทศ ดังนั้นจึงมีการเสนอให้ออก โทเคนดิจิทัลของรัฐบาลหรือ G Token เป็นการระดมทุนแทนการกู้เงินโดยตรง


      ปรากฏว่า เมื่อวันที่ 3 เม.ย.ที่ผ่านมา ธนาคารแห่งประเทศไทย ได้ทำหนังสือเวียนความเห็นของ ธปท.ต่อ การขออนุมัติวิธีการกู้เงินตามกฎหมายว่าด้วยการบริหารหนี้สาธารณะ
      ในรูปแบบ การออกโทเคนดิจิทัล ลงนามโดยผู้ว่าการ ธปท. เศรษฐพุฒิ สุทธิวาทนฤพุฒิ ในกรณีที่สำนักเลขาธิการ ครม. มีหนังสือลับ
      ด่วนที่สุด แจ้งว่ากระทรวงการคลังเสนอ ครม. พิจารณาวิธีการกู้เงินในรูปแบบ จี โทเคน ให้เหตุผลว่า เพื่อพัฒนากลไกการบริหารหนี้สาธารณะให้มีประสิทธิภาพ
      ภาครัฐสามารถเข้าถึงแหล่งเงินทุนที่หลากหลายมากขึ้น ตลอดจนเป็นการส่งเสริมการออมของประชาชนและขอให้ ธปท.เสนอความเห็นประกอบการพิจารณาของ
      ครม.ด้วย


      ...


      สรุปว่า การออกโทเคนดิจิทัลเป็นการระดมทุนที่รัฐบาลนำมาประยุกต์ใช้เพื่อเพิ่มประสิทธิภาพการทำธุรกรรมให้สะดวก รวดเร็ว เป็นทางเลือกในการออมการลงทุนของประชาชน
      เป็นตราสารทางการเงินที่มีความสำคัญต่อระบบเศรษฐกิจ จึงจำเป็นต้องมีระบบกระบวนการที่มีประสิทธิภาพและปลอดภัย รวมทั้งมีการคุ้มครองประชาชนเทียบเท่าพันธบัตรรัฐบาล
      ต้องอยู่ภายใต้กรอบของกฎหมาย ภายใต้ พ.ร.บ.หลักทรัพย์และตลาดหลักทรัพย์ที่สอดคล้องกับวัตถุประสงค์ ต้องเป็นไปตามกรอบวินัยการเงินการคลังเช่นเดียวกับการกู้ยืมเงินภายใต้กฎหมายว่าด้วยหนี้สาธารณะ
      ต้องไม่ขัดกับ พ.ร.บ.เงินตรา พ.ศ.2501 และต้องไม่นำมาใช้เป็นสื่อกลางในการชำระเงิน การระดมทุนด้วยการออกจี โทเคน ควรทดสอบในวงจำกัดก่อนเพื่อให้เกิดความมั่นใจ
      เพราะมีไม่กี่ประเทศที่ออกจี โทเคน เพื่อระดมทุน จบข่าว.


