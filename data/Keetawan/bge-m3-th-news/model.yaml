      สงครามแดง–น้ำเงิน “ทักษิณ–เนวิน ชิดชอบ” ครูใหญ่ภูมิใจไทย เคลียร์ใจกันยากขึ้นทุกขณะ


      ต่างฝ่ายต่างติดอาวุธนิติสงครามสู้กันแตกหัก ถ้ายังปิดดีลกันไม่ลง คงต้องพังกันไปข้าง ขึ้นอยู่กับใครจะเสียท่าเรื่องข้อกฎหมายก่อน


      ฝ่าย สว.สีน้ำเงินเร่งสปีดเลือกองค์กรอิสระ อาศัยการเปิดประชุมสภาสมัยวิสามัญปลายเดือน พ.ค. เร่งกระบวนการตรวจสอบประวัติผู้ได้รับการเสนอชื่อเป็น
      กกต. ตุลาการศาลรัฐธรรมนูญ และจ่อลงมติเลือก 3 กรรมการ ป.ป.ช. เปิดเกม รุกยึดองค์กรอิสระ ถือดุลคุมเกมนิติสงครามที่มีแนวโน้มต้องสู้กันยาว


      แต่ถูกเตะสกัด ขวางลำการเลือกองค์กรอิสระ ไม่ยอมค่ายสีน้ำเงินกินรวบองค์กรอิสระฝ่ายเดียว


      ปมฮั้วเลือก สว.พาเพื่อไทย–ภูมิใจไทย ถูกนำใช้เป็นเครื่องมือต่อรองแลกดีลผลประโยชน์การเมือง ทั้งเรื่องการปรับ ครม. การแชร์ส่วนแบ่งเก้าอี้
      สว.


      2 ขั้วใหญ่ ให้ความสำคัญชิงดีลอำนาจการเมืองมาก่อนปัญหาเศรษฐกิจประเทศ สวนความรู้สึกประชาชน อารมณ์คนไทยมองรัฐบาลใส่ใจแก่งแย่งอำนาจมากกว่าปากท้อง
      ก็ยิ่งเขย่าเสถียรภาพรัฐบาลน่าห่วงมากขึ้น


      ปล่อยปมนิติสงครามตีคู่กับปัญหาปากท้อง หากดีลฮั้วยังเจรจาไม่ลงตัว อาจลามพังยกคณะ!!!


