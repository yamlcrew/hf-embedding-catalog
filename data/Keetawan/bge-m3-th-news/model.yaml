      ล่าสุดศาลปกครองสูงสุด กลับคำพิพากษาชั้นต้น สั่ง ยิ่งลักษณ์ ชินวัตร อดีตนายกรัฐมนตรี ชดใช้ความเสียหายโครงการจำนำข้าว
      ขั้นตอนระบายข้าวแบบรัฐต่อรัฐ 10,028 ล้านบาท


