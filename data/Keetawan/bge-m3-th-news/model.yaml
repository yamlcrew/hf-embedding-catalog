    นายกฯแพทองธาร ชินวัตร ต้องเร่งสั่งการให้กระทรวงที่เกี่ยวข้อง อาทิ กระทรวงการคลัง กระทรวงพาณิชย์ กระทรวงเกษตรฯ ดำเนินการทันที
    เพื่อปกป้องสินค้าไทย ผมมีข้อมูลจาก สภาพัฒน์  ที่คำนวณโดย แบงก์ชาติ ระบุว่า เรื่องสินค้าที่ทะลักเข้ามาไทย (Import Flooding)
    เป็นเรื่องแรกที่รัฐบาลต้องจัดการทันที เพราะถ้าไม่จัดการที่จุดนี้ให้ได้ก่อน มาตรการอื่นจะไม่มีผลเท่าที่ควร เช่น ถ้าใช้มาตรการกระตุ้นการบริโภค
    เงินก็จะไหลออกไปประเทศอื่นที่เป็นเจ้าของสินค้า ไม่ได้ช่วยให้ภาคการผลิตของเราโตขึ้นแบบอดีต เงินที่รัฐบาลอัดฉีดลงไปจะไหลออกไปหมด
    ถ้าไม่ปิดรูนี้ให้สนิท ก็แก้ไขปัญหาไม่ได้


