    ทั้งนี้ เมื่อถึงเวลา 13.00 น. ตามกำหนดเวลา พบว่า โทรศัพท์ได้มีเสียงแจ้งเตือนนาน 8 วินาที พร้อมข้อความว่า"National Alert
    now ทดสอบแจ้งเตือนภัย Cell Broadcast จากกรมป้องกันและบรรเทาสาธารณภัย (ปภ.) โปรดอย่าตื่นตระหนก


    This is a test message from Department of Disaster Prevention and Mitigation (DDPM). No action required.-"


    โดยหลายคนได้แคปภาพแจ้งเตือนจากโทรศัพท์มือถือออกมาแชร์ในโซเชียลกันอย่างตื่นเต้น พร้อมติดแฮชแท็ก#cellbroadcastซึ่งไทยรัฐออนไลน์เองก็ได้รับระบบแจ้งเตือนดังกล่าวเช่นเดียวกัน


