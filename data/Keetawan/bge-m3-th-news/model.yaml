      คลิกอ่านคอลัมน์ “กล้าได้กล้าเสีย” เพิ่มเติม'
    - 'ศาลปกครองสูงสุด พิพากษาให้ “ยิ่งลักษณ์ ชินวัตร” ชดใช้คดีจำนำข้าว 10,028 ล้านบาท ชี้ พฤติการณ์ประมาทเลินเล่ออย่างร้ายแรง
      ต้องรับผิดทางละเมิดต่อกระทรวงการคลัง


      วันที่ 22 พฤษภาคม 2568 ตั้งแต่เวลา 13.30 น. ศาลปกครองสูงสุดนัดอ่านคำพิพากษาในคดีที่กระทรวงการคลังยื่นอุทธรณ์คำพิพากษาศาลปกครองกลางที่สั่งเพิกถอนคำสั่งกระทรวงการคลังที่
      135/2559 ลงวันที่ 13 ตุลาคม 2559 ที่ให้นางสาวยิ่งลักษณ์ ชินวัตร อดีตนายกรัฐมนตรี ชดใช้ค่าสินไหมทดแทนกรณีปล่อยให้มีการทุจริตในโครงการรับจำนำข้าว
      และเพิกเฉยไม่ระงับยับยั้งความเสียหายที่เกิดขึ้นแก่ราชการ เป็นเงิน 35,717,273,028 บาท ในคดีที่นางสาวยิ่งลักษณ์ และนายอนุสรณ์
      อมรฉัตร สามี ร่วมกันยื่นฟ้องนายกรัฐมนตรี รัฐมนตรีว่าการกระทรวงการคลัง รัฐมนตรีช่วยว่าการกระทรวงการคลัง ปลัดกระทรวงการคลัง
      สำนักนายกรัฐมนตรี กระทรวงคลัง กรมบังคับคดี อธิบดีกรมบังคับคดี และเจ้าพนักงานบังคับคดี สำนักงานบังคับคดีแพ่ง กรุงเทพมหานคร
      กรณีที่ร่วมกันมีคำสั่งดังกล่าวโดยไม่ชอบด้วยกฎหมาย ทั้งนี้ ศาลได้เปิดโอกาสเป็นครั้งแรกให้สื่อมวลชนเข้าเก็บภาพได้ประมาณ
      5 นาที


      ล่าสุดผู้สื่อข่าวรายงานหลังศาลปกครองสูงสุดนัดอ่านคำพิพากษาเสร็จสิ้นว่าศาลปกครองสูงสุดมีคำพิพากษากลับคำพิพากษาศาลปกครองชั้นต้น
      เป็นให้นางสาวยิ่งลักษณ์ อดีตนายกรัฐมนตรี และอดีตฐานะประธานกรรมการนโยบายข้าวแห่งชาติต้องชดใช้ค่าเสียหายส่วนระบายข้าวแบบรัฐต่อรัฐ
      หรือ จีทูจี ร้อยละ 50 เป็นเงิน 10,028,861,880.83 บาท(มูลค่าความเสียหายจีทูจี 20,057,723,761.66 บาท)


      ทั้งนี้ ศาลเห็นว่านางสาวยิ่งลักษณ์ ซึ่งเป็นนายกรัฐมนตรีและประธานคณะกรรมการนโยบายข้าวฯ ไม่ได้ติดตามการระบายอย่างเต็มความสามารถและใกล้ชิด
      และเข้าร่วมประชุมคณะกรรมการการแข่งขันทางการค้า (กขค.) เพียงครั้งเดียว และตลอดการดำเนินโครงการมีหนังสือทักท้วง และมีข้อเสนอแนะจากสำนักงานการตรวจเงินแผ่นดินว่าโครงการมีการทุจริต
      ขอให้ยกเลิกโครงการดังกล่าว แต่ก็ยังดำเนินโครงการต่อ พฤติการณ์ดังกล่าวจึงเห็นได้ว่ายังคงละเว้นเพิกเฉยไม่ติดตามให้หน่วยงานที่เกี่ยวข้องรายงานผลความเสียหายให้ทราบเพื่อป้องกันปัญหา
      ซึ่งโดยวิสัยของผู้ฟ้องคดีที่ 1 เมื่อได้รับทราบว่ามีความเสียหายเกิดขึ้นก็ควรติดตามตรวจสอบอย่างใกล้ชิด แต่ไม่ได้ดำเนินการจนทำให้เกิดเหตุทุจริตส่งผลให้การระบายข้าวไม่ทัน
      ต้องนำมาเก็บไว้และเกิดการเน่าเสียพฤติการณ์ของนางสาวยิ่งลักษณ์ จึงเป็นการประมาทเลินเล่ออย่างร้ายแรงที่ต้องรับผิดทางละเมิดต่อกระทรวงการคลัง


      ...


      จึงมีคำพิพากษาแก้คำพิพากษาของศาลปกครองชั้นต้น เป็นให้คำสั่งกระทรวงการคลังที่ 1351/2559 ลงวันที่ 13 ตุลาคม 2559 ที่สั่งให้นางสาวยิ่งลักษณ์ชดใช้ค่าสินไหมทดแทนเป็นเงิน
      35,717,273,028.23 บาท'
    - 'คุณชญาวดี ชัยอนันต์ ผู้ช่วยผู้ว่าการแบงก์ชาติสายองค์กรสัมพันธ์ โฆษกแบงก์ชาติ  ได้พูดในเวทีเสวนาหัวข้อ “จับตาอนาคตเศรษฐกิจไทย
      : เมื่อโลกเปลี่ยน ไทยต้องปรับ”  ในงาน มหกรรมการเงิน Money Expo กรุงเทพ ครั้งที่ 25 เมื่อวันเสาร์ที่ผ่านมาว่า มาตรการภาษีของสหรัฐฯส่งผลกระทบโดยตรงต่อภาคการส่งออกของไทย
      เนื่องจากสหรัฐฯเป็นคู่ค้าอันดับหนึ่งของไทย ไทยมีสัดส่วนการส่งออกไปสหรัฐฯ 18% ของการส่งออกทั้งหมด เรื่องภาษีสหรัฐฯจึงไม่ใช่เรื่องไกลตัว
      แต่เป็นเรื่องใกล้ตัว  และเกี่ยวข้องกับการจ้างงานเป็นแสนเป็นล้านคนที่อยู่ในอุตสาหกรรมที่เกี่ยวข้อง


      นอกจากนี้ ภาษีสหรัฐฯ  ยังส่งผลกระทบต่อ “ความเชื่อมั่น”  ด้วย หากไทยโดนสหรัฐฯเก็บภาษีที่ 36% อาจทำให้นักลงทุนต่างชาติที่ทำธุรกิจอยู่ในไทย
      หรือ กำลังตัดสินใจจะเข้ามาลงทุนในไทย ตัดสินใจย้ายฐานผลิตไปยังประเทศอื่นที่สหรัฐฯเก็บภาษีน้อยกว่าไทย  และมีข้อได้เปรียบกว่าไทย
      จะทำให้การลงทุนจากต่างประเทศหยุดชะงัก เป็นผลกระทบที่รุนแรงมาก


      เรื่องที่น่าเป็นห่วงอีกเรื่องก็คือ ไทยมีความเสี่ยงที่สินค้าจากประเทศอื่นที่ส่งออกไปสหรัฐฯไม่ได้ จะทะลักเข้ามาในประเทศไทย
      ส่วนใหญ่เป็นสินค้าที่มีต้นทุนการผลิตต่ำ ขายได้ในราคาถูก ทำให้ผู้ผลิตไทยเผชิญกับการแข่งขันที่เข้มข้นขึ้น  ตอนนี้หลายอุตสาหกรรมเจอการแข่งขันที่สูงขึ้นแล้ว
      เช่น เฟอร์นิเจอร์ เครื่องนุ่งห่ม เครื่องใช้ไฟฟ้า  เพราะต้นทุนการผลิตของเราอาจสูงกว่าประเทศอื่น ในอนาคตบริษัทเล็กๆจะถูกสินค้าจากต่างประเทศเข้ามากระทบมากขึ้น
      สิ่งที่เราคิดว่าไกลตัว กำลังจะมาเคาะประตูบ้านเราในไม่ช้า


      คุณชญาวดี กล่าวว่า การรับมือจากผลกระทบของมาตรการภาษีสหรัฐฯ ส่วนหนึ่งต้องฝากไว้กับทีมรัฐบาลที่จะเดินทางไปเจรจากับสหรัฐฯ
      แต่ผลกระทบโดยตรงที่เกิดขึ้นกับภาคการส่งออก อาจน้อยกว่าผลกระทบทางอ้อม โดยเฉพาะ กรณีมีสินค้าจากประเทศอื่นทะลักเข้ามาในประเทศไทย
      ภาครัฐควรมีมาตรการที่เข้มข้นในการจัดการสินค้านำเข้าอย่างจริงจัง เราเชื่อมั่นว่าจะผ่านมรสุมครั้งนี้ไปได้ ภาคเอกชนของไทยเก่งและประเทศไทยก็มีของ
      แต่ภายใต้โลกที่เปลี่ยนไป เราต้องมาคิดว่าจะทำอย่างไรให้สิ่งที่เรามีอยู่ดีขึ้น ทำให้เครื่องยนต์ทางเศรษฐกิจของเราเดินหน้าต่อไปได้
       ภาครัฐต้องสนับสนุนและเป็นลมใต้ปีกให้ด้วย


      ...


      ประเด็นที่ คุณชญาวดี จุดประกายขึ้นมาเรื่อง สินค้าราคาถูกจากประเทศอื่นที่ส่งไปสหรัฐฯไม่ได้ จะทะลักเข้ามาไทย  ผมเห็นด้วยว่าเป็นเรื่องสำคัญอย่างยิ่ง
      นายกฯแพทองธาร ชินวัตร ต้องเร่งสั่งการให้กระทรวงที่เกี่ยวข้อง อาทิ กระทรวงการคลัง กระทรวงพาณิชย์ กระทรวงเกษตรฯ ดำเนินการทันที
      เพื่อปกป้องสินค้าไทย ผมมีข้อมูลจาก สภาพัฒน์  ที่คำนวณโดย แบงก์ชาติ ระบุว่า เรื่องสินค้าที่ทะลักเข้ามาไทย (Import Flooding)
      เป็นเรื่องแรกที่รัฐบาลต้องจัดการทันที เพราะถ้าไม่จัดการที่จุดนี้ให้ได้ก่อน มาตรการอื่นจะไม่มีผลเท่าที่ควร เช่น ถ้าใช้มาตรการกระตุ้นการบริโภค
      เงินก็จะไหลออกไปประเทศอื่นที่เป็นเจ้าของสินค้า ไม่ได้ช่วยให้ภาคการผลิตของเราโตขึ้นแบบอดีต เงินที่รัฐบาลอัดฉีดลงไปจะไหลออกไปหมด
      ถ้าไม่ปิดรูนี้ให้สนิท ก็แก้ไขปัญหาไม่ได้


      ตัวอย่างที่เห็นชัดก็คือ ปี 2565–2567 การบริโภคสินค้าภาคเอกชนเติบโตเฉลี่ยปีละ 6% แต่จีดีพีภาคการผลิตกลับหดตัวเฉลี่ยปีละ
      0.6% สาเหตุหนึ่งก็มาจาก การนำเข้าสินค้าโต 5%


      สินค้าราคาถูกที่ทะลักเข้ามาเมืองไทย หลักๆก็มาจากจีน ตัวอย่างล่าสุดที่เห็นชัดเจนก็คือ ปี 2567 ไทยนำเข้าสินค้าขั้นสุดท้าย
      (Final Goods) เพิ่มขึ้นจากปี 2565 ราว 13,000 ล้านดอลลาร์สหรัฐฯ เป็นการนำเข้าจากจีนถึง 7,500 ล้านดอลลาร์ มากกว่าครึ่งหนึ่งของการนำเข้าสินค้าที่เป็น
      Final Goods เมื่อมองไปข้างหน้าสินค้าจีนที่จะทะลักเข้ามาไทยมีแนวโน้มรุนแรงขึ้น  เพราะจีนส่งออกไปสหรัฐฯได้ยากขึ้น เมษายน
      2568 ที่ผ่านมา จีนส่งออกไปยังสหรัฐฯลดลงถึง 21% แต่จีนกลับส่งออกไปทั้งโลก (รวมสหรัฐฯ) เพิ่มขึ้น 8% และที่น่าตกใจก็คือ
      จีนส่งออกมาไทยเพิ่มขึ้นถึง 28% เพิ่มขึ้นเกือบ 1 ใน 3 ของสินค้าที่จีนส่งเข้ามาเมืองไทยในปี 2567 น่ากลัวไหมครับ.


      “ลม เปลี่ยนทิศ”


      คลิกอ่านคอลัมน์ “หมายเหตุประเทศไทย” เพิ่มเติม'
  - source_sentence: 'พล.ต.ท.คำรบ นำสว.สำรอง บุกถึงสำนักงานตำรวจแห่งชาติ ขอตำรวจคุ้มครองพยานคดีฮั้วเลือกสว. ถูกคุกคาม-ใช้เงินจ้างไม่ให้ให้ข้อมูลเจ้าหน้าที่
      จี้ ผบ.ตร. สั่งพื้นที่ดูแลความปลอดภัย 10 จังหวัด


      วันที่ 23 พ.ค. 2568 เมื่อเวลา 14.00 น. ที่สำนักงานตำรวจแห่งชาติ (ตร.) พล.ต.ท.คำรบ ปัญญาแก้ว นำตัวแทนกลุ่มสว.สำรองและผู้สมัครรับเลือกสว.
      เดินทางมายื่นหนังสือที่สำนักงานตำรวจแห่งชาติถึงผู้บัญชาการตำรวจแห่งชาติเพื่อขอเพิ่มความเข้มข้นในการดูแลความสงบเรียบร้อยและความปลอดภัยในชีวิตและทรัพย์สินของพยานในคดีฮั้วเลือกสว.
      พล.ต.ท.คำรบ กล่าวว่า เนื่องจากในช่วงการสืบสวนไต่สวนคดีฮั้วสว. ได้มีพยานบุคคลมาให้การกับเจ้าหน้าที่กรมสอบสวนคดี หรือ
      ดีเอสไอ และ สำนักงานคณะกรรมการการเลือกตั้ง หรือ กกต. หลายราย รวมถึงคนที่อยากจะมาให้การเพิ่มเติมอีกหลายราย แต่ปรากฏว่ามีกลุ่มของขบวนการฮั้วสว.
      ได้ใช้อิทธิพลกดดันข่มขู่พยานทั้งคนที่เคยให้การแล้วและผู้ที่จะมาให้การเพิ่มเติม รวมถึงใช้เงินจ้างไม่ให้มาให้ปากคำกับเจ้าหน้าที่
      สร้างความไม่สบายใจและรู้สึกไม่ดีให้กับประชาชนในพื้นที่และบุคคลที่เกี่ยวข้อง จึงได้ทำหนังสือร้องเรียนถึงผู้บัญชาการตำรวจแห่งชาติเพื่อให้สั่งการให้ตำรวจพื้นที่ในจังหวัดต่างๆ
      โดยเฉพาะจังหวัดที่มีข้อมูลว่ามีการฮั้วการเลือกสว. อย่างเข้มข้น ประมาณ 10 กว่าจังหวัดเป็นพิเศษ เพื่อดูแลความปลอดภัยในชีวิตและทรัพย์สิน
      รวมถึงหาข้อมูลเกี่ยวกับซุ้มมือปืน เพิ่มความเข้มข้นในการปิดล้อม ตรวจค้น ตั้งด่านและภารกิจต่างๆ เพื่อให้ทุกคนรู้สึกปลอดภัย


      พล.ต.ท.คำรบ ขอให้ตำรวจสืบสวนให้ถึงกลุ่มมือปืนในพื้นที่ เพราะขณะนี้พวกตนมีข้อมูลว่ากลุ่มคนเหล่านี้เริ่มขยับตัว จึงอยากให้สำนักงานตำรวจแห่งชาติเริ่มมีคำสั่งที่เป็นรูปธรรมว่าพื้นที่ใดที่เกิดเหตุเรื่องความไม่ปลอดภัยหรือมีเหตุร้ายเกิดขึ้นที่เกี่ยวข้องกับการเลือกสว.ที่ผ่านมาอยากให้ตำรวจและประเมินร่วมเจ้าหน้าที่ในพื้นที่เพื่อป้องกันเหตุที่จะเกิดขึ้นได้
      ตอนนี้ประชาชนคนไทยมองว่าเรื่องนี้เป็นภัยใกล้ตัวที่เกิดขึ้นในสังคมไทยอยากให้ตำรวจเข้ามาตอบสนองในภารกิจนี้ด้วย


      ...


      ด้านนายแทนคุณ จิตต์อิสระ อดีตผู้สมัคร สว. กล่าวว่ากลุ่มที่มีพรรคการเมืองอยู่เบื้องหลังพยายามเคลื่อนไหวใน 3 ลักษณะ คือ
      ผู้มีอิทธิพลทางการเมืองที่พยายามแทรกแซงกระบวนการยุติธรรม นายทุนที่สนับสนุนพรรคการเมืองหรือทุนสีเทา และกลุ่มอันตราย จึงอยากให้รัฐบาลมีความจริงใจในการกวาดล้างผู้มีอิทธิพลทางการเมืองและนักธุรกิจสีเทาและที่สนับสนุนให้มีการเคลื่อนไหวคุกคามพยาน
      และมีการส่งบุคคลอันตรายในลักษณะคล้ายมือปืนเข้าไปสอดส่องและคุกคามพยาน ทำให้รู้สึกหวาดกลัวและไม่กล้าที่จะให้ข้อมูลหรือแสดงตัวว่าจะให้ข้อมูลกับเจ้าหน้าที่ของรัฐ
      ซึ่งหากป้องกันได้ก็จะสามารถกวาดล้างอิทธิพลทางการเมืองอิทธิพลนายทุนสีเทารวมถึงอิทธิพลของผู้ที่ครอบครองอาวุธหรือใช้ความรุนแรงได้ในคราวเดียว
      จึงอยากฝากตำรวจต้องแสดงมาตรฐานทางวิชาชีพว่าเป็นมืออาชีพจริงๆ ไม่เข้าข้างไม่ฝักใฝ่ทางการเมืองไม่ช่วยเหลือใครทำหน้าที่อย่างตรงไปตรงมาโดยเฉพาะการคุ้มครองพยานซึ่งเป็นการสร้างมาตรฐานเหมือนกับดีเอสไอ
      กกต. และอีกหลายหน่วยงาน พร้อมทั้งฝากไปถึงสว. ชุดปัจจุบันขอให้หยุดปฏิบัติหน้าที่เพื่อความสง่างาม


      ภายหลังยื่นหนังสือนายพิสุทธิ์ ทรัพย์วิจิตร ได้ร้องเพลง ลมหนาวในหน้าร้อน เป็นกำลังใจทำหน้าที่ตำรวจ'
