    sentences:
    - '“นายกฯ อิ๊งค์” รับทบทวนแจก “เงินดิจิทัลวอลเล็ตเฟส 3” หลังประชุมบอร์ดนโยบายโครงการกระตุ้นเศรษฐกิจ โยนคลังแถลงต่อ


      เมื่อเวลา 16.05 น. วันที่ 19 พฤษภาคม 2568 ที่ทำเนียบรัฐบาล น.ส.แพทองธาร ชินวัตร นายกรัฐมนตรี เปิดเผยภายหลังเป็นประธานการประชุมคณะกรรมการนโยบายโครงการกระตุ้นเศรษฐกิจ
      ครั้งที่ 2/2568 ถึงโครงการดิจิทัลวอลเล็ตเฟส 3 โดยผู้สื่อข่าวถามว่าสรุปเดินหน้าต่อหรือต้องทบทวน โดยนายกรัฐมนตรีตอบกลับสั้นๆ
      ว่า“ทบทวนค่ะ เดี๋ยวให้กระทรวงการคลังแถลง”'
    - 'กกต. แจง ไม่ได้รับเรื่องแจ้งจากผู้ตรวจการเลือกตั้ง กรณีฮั้วเลือก สว. ในวันเลือกระดับประเทศ พบยื่นแจ้งต่อประธาน กกต.
      หลังผ่านวันไปแล้ว พร้อมชี้ 6 มาตรการดักทางทุจริต


      วันที่ 20 พฤษภาคม 2568 สำนักงานคณะกรรมการการเลือกตั้ง (กกต.) ออกเอกสารชี้แจงกรณีที่มีบางสื่อนำเสนอข่าวว่า นายแสวง บุญมี
      เลขาธิการ กกต. ไม่ได้ดำเนินการกรณีผู้ตรวจการเลือกตั้งประจำจังหวัด ตามที่มีการแจ้งว่าจะมีโพยฮั้ว สว. ซึ่งเป็นการเอื้อให้มีการฮั้วในวันเลือกระดับประเทศ
      26 มิถุนายน 2567 ที่เมืองทองธานี โดยชี้แจงว่า


      1.ในวันดังกล่าวไม่ได้ปรากฏว่ามีผู้ตรวจการเลือกตั้งประจำจังหวัดผู้ใดรายงานการกระทำผิดตามแบบรายงานของผู้ตรวจการเลือกตั้งประจำจังหวัด
      ตามระเบียบ กกต. ว่าด้วยผู้ตรวจการเลือกตั้งข้อ 32 แต่อย่างใด ซึ่งหากพบการกระทำผิด เป็นหน้าที่ของผู้ตรวจการเลือกตั้งประจำจังหวัด
      ต้องรายงาน กกต. ทันทีเพื่อดำเนินการตามหน้าที่และตามอำนาจต่อไปและแบบรายงานดังกล่าวจะเป็นต้นเรื่องเพื่อให้สำนักงาน กกต.
      พิจารณาดำเนินการตามระเบียบ กกต. ว่าด้วยการสืบสวนไต่สวนและวินิจฉัยชี้ขาด ปี 2561 และฉบับแก้ไขเพิ่มเติมฉบับที่ 5 ปี 2566
      ต่อไป แต่ปรากฏภายหลังการเลือก ส.ว. ระดับประเทศ ผ่านไปแล้วว่าผู้ตรวจการเลือกตั้งประจำจังหวัดได้ยื่นแบบรายงานการเลือกตั้ง
      ลงวันที่ 28 มิถุนายน 2567 ต่อประธาน กกต. ซึ่งผ่านการเลือกระดับประเทศไปแล้ว


      2.ในวันเลือกระดับประเทศ พนักงานสืบสวนที่ถูกสั่งให้ไปปฏิบัติหน้าที่รับเรื่องร้องเรียน หรือร้องคัดค้านในการกระทำผิดในสถานที่เลือก
      ก็ไม่ได้รายงานว่ามีผู้ตรวจการเลือกตั้งจังหวัดผู้ใดยื่นแบบรายงานต่อพนักงานสืบสวน หรือมีผู้สมัครคนใดมาร้องหรือให้ถ้อยคำต่อพนักงานสืบสวน
      ที่จุดรับเรื่องร้องเรียนในสถานที่เลือก ถึงเหตุที่มีการกระทำผิดตามกฎหมายแต่อย่างใด ซึ่งการนำเสนอข่าวดังกล่าวที่มีการแจ้งว่ามีการกระทำผิดนั้นจึงไม่เป็นความจริง


      ...


      ทั้งนี้ เพื่อประโยชน์แห่งความสุจริตและเที่ยงธรรมในสถานที่เลือก กกต. และผู้อำนวยการเลือกตั้งระดับประเทศ มีมาตรการเพื่อการเลือกเป็นไปโดยสุจริตและเที่ยงธรรม
      6 มาตรการ ซึ่งประกอบไปด้วย


      1. จัดให้มีจุดรับเรื่องร้องเรียนเรื่องที่กระทำผิดอันอาจเป็นความผิดในสถานที่เลือก2. จัดสถานที่ให้สื่อมวลชนสังเกตการณ์มองได้อย่างชัดเจน3.
      อนุญาตให้ผู้สังเกตการณ์จากต่างประเทศ ตัวแทนจากสถานทูตประจำประเทศไทย หรืออียู และองค์กรเอกชนไทย เข้าไปสังเกตการณ์ในสถานที่เลือก4.
      สั่งให้ผู้ตรวจการเลือกตั้งระดับจังหวัดกรุงเทพมหานครและปริมณฑล เข้าไปตรวจในสถานที่เลือก5. บันทึกภาพวิดีโอจากกล้องวงจรปิด
      ตั้งแต่เหตุการณ์ผู้มาสมัครรายงานตัว การลงคะแนน การนับคะแนน การประกาศผลคะแนน6. สั่งการให้ชุดสืบสวนหาข่าวแฝงตัวในพื้นที่สถานที่เลือกและโรงแรมที่ผู้สมัครมาพักโดยรอบ
      เพื่อหาข่าวเกี่ยวกับการกระทำความผิดก่อนวันเลือกจนถึงสิ้นสุดกระบวนการเลือก


      พร้อมแนบตัวอย่างเอกสารแบบรายงานของผู้ตรวจการเลือกตั้งประจำจังหวัด ที่จะมีการบันทึกแจ้งเหตุการกระทำผิดกฎหมายเกี่ยวกับการเลือกตั้งและพรรคการเมืองหรือการกระทำใดที่เป็นเหตุให้การเลือกไม่สุจริตและเที่ยงธรรมชอบด้วยกฎหมาย
      2 หน้ากระดาษ ซึ่งเป็นเอกสารลับ.'
    - '“อนุทิน” ยืนยันไม่โหวตคว่ำ พ.ร.บ. งบประมาณปี 2569 ศาลไต่สวนชั้น 14 ไม่เกี่ยวรัฐบาล โวผ่าตัดเลนส์ตามองอนาคตชัด เชื่อรัฐอยู่ครบเทอม
      บอก “กล้าธรรม” เติบโต ไม่คานอำนาจภูมิใจไทย คุย “ธรรมนัส” ตลอด


      วันที่ 19 พ.ค. 2568 ที่ทำเนียบรัฐบาล นายอนุทิน ชาญวีรกูล รองนายกรัฐมนตรีและรัฐมนตรีว่าการกระทรวงมหาดไทย กล่าวว่า วันนี้มาต้อนรับประธานาธิบดีอินโดนีเซียกันพร้อมหน้าพร้อมตา
      ทุกอย่างเป็นปกติดี ส่วนที่มีการมองว่า พรรคเพื่อไทยจับมือกับพรรคกล้าธรรม ส่วนทางภูมิใจไทยก็จับมือกับนายพีระพันธุ์ สาลีรัฐวิภาค
      หัวหน้าพรรครวมไทยสร้างชาติ เพื่อต่อรองอะไรหรือไม่ นายอนุทินกล่าวว่า ภูมิใจไทยร่วมมือกับทุกพรรค แม้กระทั่งฝ่ายค้าน ถ้าเกิดทำเรื่องที่เป็นประโยชน์ต่อบ้านเมืองต่อประชาชนพร้อมหมดทุกอย่าง
      เราเอาประชาชนเป็นหลัก พร้อมยืนยันไม่มีการโหวตคว่ำร่าง พ.ร.บ. งบประมาณรายจ่ายประจำปีงบประมาณ 2569 ขอยืนยันไม่รู้ใครไปพูด
      เราทำงบประมาณมาด้วยกัน และผ่านคณะรัฐมนตรีเป็นที่เรียบร้อย งบประมาณมีประโยชน์ต่อประเทศและประชาชน กระทรวงมหาดไทยกระทรวงเดียวที่ตนดูแลอยู่ก็
      4 แสนล้านบาท กระทรวงศึกษาธิการประมาณ 5 แสนล้านบาท กระทรวงอุดมศึกษาฯ อีก 2 แสนล้านบาท และกระทรวงแรงงานอีก 2-3 หมื่นล้านบาท
      เฉพาะในส่วนงบประมาณที่ตนกำกับดูแล ก็เกือบล้านล้านบาท ถ้าเห็นชอบหรือโหวตคว่ำจะผ่าน ครม. ได้อย่างไร และยังมีกระทรวงอื่นๆ
      อีก ดังนั้นเรื่องนี้เป็นเรื่องของรัฐบาล เป็นเรื่องของประชาชนเราต้องให้การสนับสนุนอยู่แล้ว เพราะเป็นงบประมาณที่เราทำเอง


      ส่วนการเติบโตของพรรคกล้าธรรม เป็นการคานอำนาจพรรคภูมิใจไทยในรัฐบาลหรือไม่ นายอนุทินกล่าวว่า ไม่มี ทุกพรรคการเมืองก็ต้องการเติบโต
      และพรรคไหนก็ตามที่สามารถรับใช้ประชาชนได้ ทำให้ประชาชนมีความมั่นใจ พรรคนั้นก็จะเติบโตเหมือนพรรคภูมิใจไทย พร้อมยอมรับคุยกับร้อยเอกธรรมนัส
      พรหมเผ่า สส. พะเยาและที่ปรึกษาพรรคกล้าธรรมอยู่ตลอดเวลา ทำงานร่วมกันตลอด


      ...


      คดีชั้น14 ไม่เกี่ยวรัฐบาล


      นายอนุทินยืนยันด้วยว่ารัฐบาลมีความเข้มแข็ง ทุกวันนี้ก็ 320 กว่าเสียง ยิ่งมีสมาชิกมาเพิ่มในพรรคกล้าธรรม ก็ทำให้รัฐบาลเข้มแข็งมากขึ้น
      ตนก็ไปผ่าตัดเลนส์ตาได้อย่างสบายใจ ส่วนกรณีศาลฎีกา แผนกคดีอาญาของผู้ดำรงตำแหน่งทางการเมือง นัดไต่สวนคดีชั้น 14 ซึ่งเกี่ยวกับนายทักษิณ
      ชินวัตร ในวันที่ 13 มิถุนายน จะเป็นจุดอันตรายกับรัฐบาลหรือไม่ นายอนุทินยืนยันว่า ไม่เกี่ยวกับรัฐบาล อันนั้นเป็นเรื่องของกระบวนการยุติธรรม
      ส่วนรัฐบาลเป็นเรื่องของฝ่ายบริหารประเทศ ไม่ว่าอะไรเกิดขึ้นรัฐบาลก็ยังอยู่บริหารประเทศไทย เพราะมันแยกโดยสามเส้าของอำนาจอธิปไตยอยู่แล้ว
      ฝ่ายบริหาร นิติบัญญัติ และตุลาการ ไม่เกี่ยวข้องกัน


      ต้องแยกแยะเรื่องส่วนตัว


      ส่วนความเป็นพ่อลูกระหว่างนายทักษิณกับนายกรัฐมนตรี ต้องเกี่ยวพันกันอยู่แล้วนั้น นายอนุทินกล่าวว่า คนที่เติบโตมีภาระรับผิดชอบ
      มาถึงในระดับบริหารได้ ทุกคนไม่เฉพาะคนใดคนหนึ่ง ต้องแยกแยะถูก ว่าอันไหนเป็นเรื่องส่วนตัว เรื่องของประเทศ และของประชาชน
      ถ้าเรื่องส่วนตัวเอามารวมไม่ได้ ถ้ารวมกันก็ทำงานไม่ได้ และยังไม่เห็นใครในรัฐบาลเอาเรื่องส่วนตัวและส่วนรวมมาผสมกันแล้วมาทำงาน


      โวเห็นรัฐบาลอยู่ครบเทอม


      ส่วนวันนี้เป็นวันแรกที่ สว. ไปให้ปากคำกับคณะกรรมการการเลือกตั้ง หรือ กกต. ได้ให้กำลังใจอย่างไรเพราะพลเอกเกรียงไกร ศรีรักษ์
      รองประธานวุฒิสภาคนที่หนึ่ง ก็เป็นเพื่อนกับนายอนุทินนั้น นายอนุทินกล่าวว่า ไม่ทราบ อันนั้นเป็นอำนาจของนิติบัญญัติ ตนชัดเจน
      เพื่อนก็เพื่อนงานก็งาน“ตอนนี้ผมแต่เรื่องการทำงาน สายตาที่เคยขุ่นมัว เปลี่ยนเลนส์เรียบร้อยแล้ว ตอนนี้ชัดใสปิ๊ง กลับมาหล่อเหมือนเดิม
      และเห็นอนาคตรัฐบาลชัด อยู่ครบเทอม”'
  - source_sentence: '“หมอวรงค์” ชี้ ศาลปกครองสูงสุดมีคำพิพากษาให้ “ยิ่งลักษณ์ ชินวัตร” ชดใช้ค่าเสียหายส่วนระบายข้าวแบบจีทูจี
      10,028 ล้านบาท คดีรับจำนำข้าวจบลงบนชัยชนะประชาชน ลั่น ใครทุจริตต้องติดคุก ใครทำชาติเสียหายต้องชดใช้


      เมื่อเวลา 16.51 น. วันที่ 22 พฤษภาคม 2568นพ.วรงค์ เดชกิจวิกรมประธานพรรคไทยภักดี อดีต สส.พิษณุโลก ผู้ชำแหละโครงการจำนำข้าว
      และยื่นร้องต่อคณะกรรมการป้องกันและปราบปรามการทุจริตแห่งชาติ (ป.ป.ช.) ให้ตรวจสอบการทุจริตจำนำข้าวและระบายข้าว โพสต์ข้อความผ่านทางเฟซบุ๊กภายหลังศาลปกครองสูงสุดมีคำพิพากษากลับคำพิพากษาศาลปกครองชั้นต้น
      เป็นให้น.ส.ยิ่งลักษณ์ ชินวัตร อดีตนายกรัฐมนตรีและอดีตฐานะประธานกรรมการนโยบายข้าวแห่งชาติ ต้องชดใช้ค่าเสียหายส่วนระบายข้าวแบบรัฐต่อรัฐ
      หรือ จีทูจี เป็นเงิน 10,028,861,880.83 บาทนั้น


      นพ.วรงค์ ระบุว่า จบแล้วจำนำข้าว หลังจากที่ศาลปกครองสูงสุด มีคำพิพากษากลับคำพิพากษาศาลปกครองกลาง ให้ น.ส.ยิ่งลักษณ์ ต้องจ่ายค่าเสียหายจากโครงการรับจำนำข้าว
      10,028 ล้านบาท เฉพาะในส่วนของคดีทุจริตการระบายข้าวแบบจีทูจี“อย่างน้อยๆ คดีรับจำนำข้าว ทุกอย่างได้จบลงบนชัยชนะของประชาชน
      นั่นคือใครทุจริตต้องติดคุก ใครทำชาติเสียหายต้องชดใช้ และนี่จะเป็นบรรทัดฐานในการกำหนดนโยบายของพรรคการเมือง ว่าท่านต้องร่วมรับผิดชอบ
      พร้อมทิ้งท้ายว่า ผมเชื่อว่าพี่น้องคนไทยคงสบายใจขึ้น อย่างน้อยพวกเราก็ยังมีศาลเป็นที่พึ่ง”


