widgetData:
- source_sentence: The two patent families both expire in the United States in 2029.
  sentences:
  - What method is used to record amortization and costs for owned content that is predominantly monetized on an individual
    basis?
  - What year do the patent families related to DARZALEX expire in the United States?
  - What was the primary reason for the net cash used in investing activities in 2022?
- source_sentence: In October 2020, Fortis Advisors LLC filed a complaint against Ethicon Inc. and others in Delaware's Court
    of Chancery. The lawsuit alleges breach of contract and fraud related to Ethicon's acquisition of Auris Health Inc. in
    2019. The case underwent a partial dismissal in December 2021, and as of January 2024, the trial's decision is pending.
  sentences:
  - What types of payment rates are used for dialysis treatments and associated pharmaceuticals?
  - What legal claims does Fortis Advisors LLC allege against Ethicon Inc. in the lawsuit related to the acquisition of Auris
    Health Inc.?
  - What were the key components of the acquisition deal between ICE and Black Knight completed on September 5, 2023?
- source_sentence: Net cash provided by operating activities was $712.2 million and $223.7 million for the year ended December
    31, 2023 and 2022, respectively. The increase was primarily driven by timing of payments to vendors and timing of the
    receipt of payments from our customers, as well as an increase in interest income.
  sentences:
  - What caused the increase in net cash provided by operating activities between 2022 and 2023?
  - How long did Joanne D. Smith serve as the Vice President - Marketing at Delta?
  - How does the management experience of Mr. Robert G. Goldstein benefit the company?
- source_sentence: We believe that, to varying degrees, our trademarks, trade names, copyrights, proprietary processes, trade
    secrets, trade dress, domain names and similar intellectual property add significant value to our business
  sentences:
  - What were the net interest expense on pre-acquisition-related debt and the cost associated with the extinguishment of
    senior notes for 2022 as part of non-GAAP adjustments?
  - How did the fluctuation in foreign currency exchange rates impact the consolidated net operating revenues in 2023?
  - What does the company believe adds significant value to its business regarding intellectual property?
- source_sentence: The consolidated financial statements are incorporated by reference in the Annual Report on Form 10-K,
    indicating they are treated as part of the document for legal and reporting purposes.
  sentences:
  - What does it mean for financial statements to be incorporated by reference?
  - What is contained within the pages 163-309 of the financial section?
  - What were the key business segments of The Goldman Sachs Group, Inc. as reported in their 2023 financial disclosures?
