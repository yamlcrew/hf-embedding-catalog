widgetData:
- source_sentence: Total net additions to property and equipment for AWS in 2023 amounted to $24,843 million.
  sentences:
  - What technological feature helps protect digital transactions in the Visa Token Service?
  - What was the total net addition to property and equipment for AWS in the year 2023?
  - By what proportion did net cash used in financing activities increase from 2022 to 2023?
- source_sentence: 'Leases generally contain one or more of the following options, which the Company can exercise at the end
    of the initial term: (a) renew the lease for a defined number of years at the then-fair market rental rate or rate stipulated
    in the lease agreement; (b) purchase the property at the then-fair market value or purchase price stated in the agreement;
    or (c) a right of first refusal in the event of a third-party offer.'
  sentences:
  - What are the requirements for health insurers and group health plans in providing cost estimates to consumers?
  - What options does the company have at the end of the lease term for their leased properties?
  - How much did the company incur in intangible amortization costs related to the eOne acquisition in 2022?
- source_sentence: We recorded an acquisition termination cost of $1.35 billion in fiscal year 2023 reflecting the write-off
    of the prepayment provided at signing.
  sentences:
  - How much did NVIDIA record as an acquisition termination cost in fiscal year 2023 related to the Arm Share Purchase Agreement?
  - What is included in the consolidated financial statements and accompanying notes mentioned in Part IV, Item 15(a)(1) of
    the Annual Report on Form 10-K?
  - What risks are associated with projecting the effectiveness of internal controls into future periods as mentioned?
- source_sentence: Item 8 is labeled as Financial Statements and Supplementary Data.
  sentences:
  - What was the percentage of trading days in 2023 where trading-related revenue was recorded as positive?
  - How is the discount rate for the Family Dollar goodwill impairment evaluation determined?
  - What is the title of Item 8 in the financial document?
- source_sentence: Details about legal proceedings are included in Part II, Item 8, "Financial Statements and Supplementary
    Data" of the Annual Report on Form 10-K, under the caption "Legal Proceedings".
  sentences:
  - Where can details about legal proceedings be located in an Annual Report on Form 10-K?
  - How many stores did AutoZone operate in the United States as of August 26, 2023?
  - In the context of Hewlett Packard Enterprise's recent financial discussions, what factors are expected to impact their
    operational costs and revenue growth moving forward?
