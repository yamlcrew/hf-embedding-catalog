- source_sentence: "Radhey Shyam Gupta vs U.P. State Agro Industries on 20 November, 1998\r\n\r\nThe services of the appellant,\
    \ who was a permanent employee of the U.P. State Agro Industries Corporation, were terminated by an order dated 25th May,\
    \ 1983. The termination was made under Rule 41 of the U.P. State Agro Industries Corporation Service Rules, 1977, which\
    \ provided for termination of service of a permanent employee by giving three months' notice or pay in lieu thereof.\r\
    \n\r\nThe appellant challenged the termination order before the Allahabad High Court, which dismissed the writ petition.\
    \ The appellant then filed this appeal by special leave.\r\n\r\nThe main contention of the appellant is that the termination\
    \ of his service is punitive in nature and has been passed in violation of the principles of natural justice. It is submitted\
    \ that the termination order, though innocuous in form, is, in reality, an order of dismissal based on certain allegations\
    \ of misconduct for which no inquiry was held.\r\n\r\nFrom the record, it appears that certain allegations were made against\
    \ the appellant regarding his involvement in a case of misappropriation of funds. A preliminary inquiry was conducted,\
    \ but no formal departmental inquiry was held. The services of the appellant were terminated shortly after the preliminary\
    \ inquiry.\r\n\r\nThe law is well-settled that if the termination of service of a permanent employee is founded on misconduct,\
    \ it amounts to punishment and the employee is entitled to the protection of Article 311 of the Constitution. The form\
    \ of the order is not decisive. The court has to look into the substance of the matter.\r\n\r\nIn the instant case, the\
    \ termination of the appellant's service is clearly founded on the allegations of misconduct. The preliminary inquiry\
    \ was held to ascertain the truth of the allegations. The termination order was passed soon after the inquiry. The entire\
    \ exercise was a camouflage to dismiss the appellant from service without holding a proper inquiry.\r\n\r\nWe are, therefore,\
    \ of the opinion that the termination of the appellant's service is punitive in nature and has been passed in violation\
    \ of the principles of natural justice. The impugned order of termination is liable to be set aside.\r\n\r\nThe appeal\
    \ is allowed. The judgment of the High Court is set aside. The writ petition filed by the appellant is allowed and the\
    \ termination order dated 25th May, 1983 is quashed. The appellant shall be reinstated in service with all consequential\
    \ benefits."
