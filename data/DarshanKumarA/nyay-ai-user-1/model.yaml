      \ this contention and held that the termination was a simple termination of service under the rules and was not punitive.\r\
      \n\r\nThe main question for consideration in this appeal is whether the termination of the appellant's service was punitive\
      \ in nature. It is now well settled that the form of the order is not conclusive and the court can go behind the order\
      \ to find out the true character of the action. If the court finds that the termination is a mere camouflage for dismissing\
      \ the employee on grounds of misconduct, it will be held to be punitive and will be struck down if the provisions of\
      \ Article 311 have not been complied with.\r\n\r\nIn the present case, the termination order is ex facie a simple order\
      \ of termination. There is nothing in the order to suggest that it was passed by way of punishment. The appellant has\
      \ not been able to produce any evidence to show that the termination was a camouflage for his dismissal. The mere fact\
      \ that some preliminary inquiry was held to ascertain the appellant's suitability for the post does not make the termination\
      \ punitive.\r\n\r\nWe are, therefore, of the opinion that the High Court was right in holding that the termination of\
      \ the appellant's service was not punitive. The appeal is accordingly dismissed. There will be no order as to costs."
