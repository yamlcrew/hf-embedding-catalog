    - "Delhi Transport Corporation vs D.T.C. Mazdoor Congress on 4 September, 1990\r\n\r\nThis appeal by the Delhi Transport\
      \ Corporation is directed against the judgment of a Division Bench of the Delhi High Court declaring certain regulations\
      \ empowering the Corporation to terminate the services of a permanent employee by giving one month's notice as ultra\
      \ vires Article 14 of the Constitution.\r\n\r\nThe respondent, a permanent employee of the Corporation, was served with\
      \ a notice of termination under Regulation 9(b) of the Delhi Road Transport Authority (Conditions of Appointment and\
      \ Service) Regulations, 1952. The regulation provided that the service of an employee could be terminated by giving\
      \ one month's notice or pay in lieu thereof without assigning any reason.\r\n\r\nThe respondent challenged the validity\
      \ of the regulation on the ground that it was arbitrary and conferred unguided power on the authority. The High Court\
      \ accepted the contention and struck down the regulation.\r\n\r\nThe question that arises for consideration is whether\
      \ a regulation which empowers a public sector undertaking to terminate the services of its permanent employees by giving\
      \ one month's notice without assigning any reason is arbitrary and violative of Article 14 of the Constitution.\r\n\r\
      \nIt is now a well-established principle of law that an arbitrary power is violative of Article 14 of the Constitution.\
      \ The principle of reasonableness and rationality which is legally as well as philosophically an essential element of\
      \ equality or non-arbitrariness is projected by Article 14 and it must characterize every State action, whether it be\
      \ under authority of law or in exercise of executive power without making of law.\r\n\r\nIn the present case, Regulation\
      \ 9(b) confers an absolute and arbitrary power on the authority to terminate the services of a permanent employee without\
      \ assigning any reason. It is not controlled by any guidelines and is liable to be misused. A permanent employee has\
      \ a right to continue in service till the age of superannuation and his services cannot be terminated except for misconduct\
      \ or on disciplinary grounds. A regulation which empowers the authority to terminate the services of a permanent employee\
      \ by giving one month's notice is arbitrary and violative of Article 14 of the Constitution.\r\n\r\nWe are, therefore,\
      \ of the opinion that the High Court was right in striking down Regulation 9(b). The appeal is dismissed with costs."
