  - "Delhi Transport Corporation vs D.T.C. Mazdoor Congress on 4 September, 1990\r\n\r\nThis appeal by the Delhi Transport\
    \ Corporation is directed against the judgment of a Division Bench of the Delhi High Court declaring certain regulations\
    \ empowering the Corporation to terminate the services of a permanent employee by giving one month's notice as ultra vires\
    \ Article 14 of the Constitution.\r\n\r\nThe respondent, a permanent employee of the Corporation, was served with a notice\
    \ of termination under Regulation 9(b) of the Delhi Road Transport Authority (Conditions of Appointment and Service) Regulations,\
    \ 1952. The regulation provided that the service of an employee could be terminated by giving one month's notice or pay\
    \ in lieu thereof without assigning any reason.\r\n\r\nThe respondent challenged the validity of the regulation on the\
    \ ground that it was arbitrary and conferred unguided power on the authority. The High Court accepted the contention and\
    \ struck down the regulation.\r\n\r\nThe question that arises for consideration is whether a regulation which empowers\
    \ a public sector undertaking to terminate the services of its permanent employees by giving one month's notice without\
    \ assigning any reason is arbitrary and violative of Article 14 of the Constitution.\r\n\r\nIt is now a well-established\
    \ principle of law that an arbitrary power is violative of Article 14 of the Constitution. The principle of reasonableness\
    \ and rationality which is legally as well as philosophically an essential element of equality or non-arbitrariness is\
    \ projected by Article 14 and it must characterize every State action, whether it be under authority of law or in exercise\
    \ of executive power without making of law.\r\n\r\nIn the present case, Regulation 9(b) confers an absolute and arbitrary\
    \ power on the authority to terminate the services of a permanent employee without assigning any reason. It is not controlled\
    \ by any guidelines and is liable to be misused. A permanent employee has a right to continue in service till the age\
    \ of superannuation and his services cannot be terminated except for misconduct or on disciplinary grounds. A regulation\
    \ which empowers the authority to terminate the services of a permanent employee by giving one month's notice is arbitrary\
    \ and violative of Article 14 of the Constitution.\r\n\r\nWe are, therefore, of the opinion that the High Court was right\
    \ in striking down Regulation 9(b). The appeal is dismissed with costs."
  - "G.M. Talang vs The Union Of India on 11 April, 1974\r\n\r\nThis is an appeal by special leave from the judgment of the\
    \ High Court of Delhi dismissing a writ petition filed by the appellant challenging the termination of his service.\r\n\
    \r\nThe appellant was employed as a Senior Scientific Officer in the Ministry of Defence. His services were terminated\
    \ by an order dated January 20, 1971, under Rule 5 of the Central Civil Services (Temporary Service) Rules, 1965. The\
    \ rule provides that the services of a temporary Government servant shall be liable to termination at any time by a notice\
    \ in writing given either by the Government servant to the appointing authority or by the appointing authority to the\
    \ Government servant.\r\n\r\nThe appellant contended that the termination order was punitive in nature and was passed\
    \ in violation of Article 311 of the Constitution. He alleged that the termination was a camouflage for his dismissal\
    \ on the ground of his alleged association with certain undesirable elements. The High Court rejected this contention\
    \ and held that the termination was a simple termination of service under the rules and was not punitive.\r\n\r\nThe main\
    \ question for consideration in this appeal is whether the termination of the appellant's service was punitive in nature.\
    \ It is now well settled that the form of the order is not conclusive and the court can go behind the order to find out\
    \ the true character of the action. If the court finds that the termination is a mere camouflage for dismissing the employee\
    \ on grounds of misconduct, it will be held to be punitive and will be struck down if the provisions of Article 311 have\
    \ not been complied with.\r\n\r\nIn the present case, the termination order is ex facie a simple order of termination.\
    \ There is nothing in the order to suggest that it was passed by way of punishment. The appellant has not been able to\
    \ produce any evidence to show that the termination was a camouflage for his dismissal. The mere fact that some preliminary\
    \ inquiry was held to ascertain the appellant's suitability for the post does not make the termination punitive.\r\n\r\
    \nWe are, therefore, of the opinion that the High Court was right in holding that the termination of the appellant's service\
    \ was not punitive. The appeal is accordingly dismissed. There will be no order as to costs."
