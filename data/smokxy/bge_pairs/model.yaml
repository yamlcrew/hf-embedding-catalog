    54. Unirrigated stage * Early maturing * Straight sowing Govinda, Govinda, Govinda Dry sowing Narendra-8 Narendra-8 Narendra-97
    Narendra-97 + Planting Govinda, Govinda, Govinda GovindaNarendra-80 Dry sowing Govinda, Govinda-80 Dry sowing Dry sowing
    Dry sowing Dry sowing Malaviya Paddy-2 (HUR-3022) 2. Irrigated stage + Early maturing day Narendra-8 Narendra-48 Narendra-8
    02'''
  - '''(4) The Chief Executive shall be entrusted with substantial powers of management as the Board may determine. (5) Without
    prejudice to the generality of sub-section (4), the Chief Executive may exercise  the powers and discharge the functions,
    namely:-  (a) do administrative acts of a routine nature including managing the day-to-day affairs of the Producer Company;
    (b) operate bank accounts or authorise any person, subject to the general or special approval of the Board in this behalf,
    to operate the bank account;  (c) *make arrangements for safe custody of cash and other assets of the Producer Company;*
    (d) sign such documents as may be authorised by the Board, for and on behalf of the company; (e) maintain proper books
    of account; prepare annual accounts and audit thereof; place the  audited accounts before the Board and in the annual
    general meeting of the Members;  (f) furnish Members with periodic information to appraise them of the operation and functions
    of the Producer Company; (g) make appointments to posts in accordance with the powers dele-gated to him by the Board;
    (h) *assist the Board in the formulation of goals, objectives, strategies, plans and policies;*  i)  advise the Board
    with respect to legal and regulatory matters concerning the proposed  and ongoing activities and take necessary action
    in respect thereof;  (j)  *exercise the powers as may be necessary in the ordinary course of business;* (k) discharge
    such other functions, and exercise such other powers, as may be delegated by the Board.  (6) The Chief Executive shall
    manage the affairs of the Producer Company under the general superintendence, direction and control of the Board and be
    accountable for the performance of the Producer Company.'''
  - '''29.5.4  Firing/Drying Once optimum fermentation is achieved, it is necessary to destroy enzymes. The „dhool‟ is fed
    to the driers by conveyors at a temperature of 90-120 o C for 12-15 minutes. This process reduces the moisture content
    of fermented tea from ~ 60% to < 4%. It terminates fermentation by inactivating the enzymes. It makes the product fit
    for sorting and packaging. In driers the inlet and outlet temperature may range from 82-98 o C and 45-55 o C respectively.
    Fluidized bed driers are being used recently. In this the blown hot air moves the dhool by process of fluidization. The
    disadvantage of firing is loss of considerable amount of volatile aroma compounds.'''
- source_sentence: What are some pests that infest mung bean crops during the Kharif season?
  sentences:
  - '''Sowing Time and Temperature: As soon as the rains begin, millet should be sown by the second week of July. The millet
    plant needs a temperature of 25 Â° C to germinate and 30 to 3 Â° C to grow. Its plants give good yield even at 40 Â° C.
    Millet sowing method: In natural farming method, sowing millet on ridge is considered the best method. Sowing on the bed
    reduces the quantity of seed and saves up to 70% of water. And when the drain is irrigated, the roots of the crop grown
    on the bed move towards the water in search of moisture, which makes the roots more developed and the plant stronger.
    And if it rains and the field is waterlogged, there is less chance of damage to the crop grown on the beds. Seed rate:
    The natural cultivation of millets requires 5 kg / ha of certified seed. Seed treatment: Millet seeds are sown by treating
    them with \''Beejamrut,\'' which protects the seeds from soil-borne diseases. Treating the seed leads to better germination
    and higher yield as a crop. Nutrient management: Prior to sowing for nutrient availability.'''
  - '''4. Collection of Corcyra eggs : Corcyra eggs are loosely laid and they are collected through the wire mesh at the bottom
    on a receiving container with funnel setup on an enamel tray. Eggs are to be collected daily and continuously for 4 days
    from each drum.. On the fifth day it is to be vacated and cleaned. A sheet of blotting paper is spread on the tray or
    in  the funnel set up. It retains most of the moths scales and body fragments while the eggs were easily rolled out during
    cleaning. The eggs are cleaned and separated from the moth’s scales by using a new gadget namely Corcyra moth scales and
    egg separator developed by TNAU.'''
  - '''Covering - Covering crops in mung bean covers the empty space by spreading the residues obtained from crops such as
    stalks, gasses and pollen in the husk, which increases the amount of organic carbon in the crop and along with the back
    formation of the cover, draws water from the atmosphere and gives it to the plants as moisture. Irrigation Management
    - Generally, Kharif crops do not require irrigation. If there is a lack of rain, an irrigation must be done while the
    pods are forming. Weed control - In natural farming, weeds grow and are removed by hand. Application of Jeevamrut - When
    mung beans are grown in a natural way, the first spraying of Jeevamrut is done at the initial stage of the crop and the
    second spraying is done at the time of fruiting. Pest management - In kharif, there is an infestation of pests like termites,
    scorpions, mongoose, whitefly, green oil, leaf beetle, legume borer, and succulent, etc. in mung bean crops, for the control
    of which spraying of decoction and firewood should be done at an interval of one day.'''
- source_sentence: How do corporates support POs with primary processing machinery?
  sentences:
  - '''27.1 Introduction Fruit beverages and drinks are one of the popular categories of beverages that are consumed across
    the globe. The fruit beverages and drinks are easily digestible, highly refreshing, thirst quenching, appetizing and nutritionally
    far superior to most of the synthetic and aerated drinks. In recent past the consumption of fruit based beverages and
    drinks has increased at a fast rate. Fruit juices or pulp used for the preparation of these products are subjected to
    minimal processing operations like filteration, clarification and pasteurization. The fruit juice or pulp, are mixed with
    ingredients like sugar, acid, stabilizers, micronutrients and preservative to develop beverages and drinks. There are
    various categories of fruit juice or pulp based beverages and drinks which are listed below. Natural fruit juices, sweetened
    juices, ready-to-serve beverages, nectar, cordial, squash, crush, syrup, fruit juice concentrate and fruit juice powder
    belong to the category of non-alcoholic and non-carbonated beverages. The principle groups of fruit beverages are as follows:
    • Ready-to-Serve (RTS) pre-packaged Beverages • Fruit juice and Nectars • Dilutable beverages'''
  - '''Dairy animals/ Pigs/ Goats Protection during rains Heavy rainfall and high humidity predisposes mastitis in crossbred
    cows hence keep dairy shed clean and dry. Use post milking teat dip cup to prevent mastitis. Don’ts feed mouldy feed and
    fodder which causes detrimental effects on health of animals. i.e. black spots on stored dry fodder, unacceptable odour
    of oil cakes. In rainy season, dairy animals suffer with tick infestation. 5 to 10% ticks present on body of animals and
    90 to 95 % present in the shed. Hence spray ectoparasiticide i.e., cypermethrin or deltamethrin 2-4% on animals’ body
    and also in the shed. Use flamegun to burn floor and walls of shed every 10 to 15 days. Hybrid Napier perennial fodder
    CO-5 performance is excellent in in Goa climatic condition. Farmer can get 300 to 350 metric tons of green fodder yield
    with six to seven cutting a year. Farmer can go for plantation in Kharif. Sololy grazing of dairy animals on lush greens
    may cause digestive disturbance and comparatively low fat in milk hence always daily offer dry fodder along with greens.
    Avoid water leakages in the shed which causes slippery floor. Apply lime in and around shed which causes disinfection
    and keep floor dry which helps to rest animals on the floor.'''
  - '''    7.22 What support is available from government departments for market linkage? Many State Governments have schemes
    for preferential procurement of produce from POs. For example, procurement of certified seeds through POs has been implemented
    by the Government of Chhattisgarh. The facilitating agency should be able to get the relevant information from the respective
    Governments. 7.23 What support is available from corporates for market linkage? The corporates need continuous supply
    of desired quality produce for processing and value addition. Therefore, they prefer to enter into contract with few producer
    organisations who will meet their requirement. Usually the following mechanisms are adopted:  a. Retail chains tie up
    with POs for procurement. b. Corporates extend dealership for farm machinery and inputs to POs. c. Corporates provide
    primary processing machinery to PO with buy-back arrangement  for the produce'''
- source_sentence: What does an Industry Analysis entail?
  sentences:
  - '''Aggregating producers into collectives is one of the best mechanism to improve access of small producers to investment,
    technology and market.  The facilitating agency should however keep the following factors in view:   a. Types of small
    scale producers in the target area, volume of production, socioeconomic status, marketing arrangement  b. Sufficient demand
    in the existing market to absorb  the additional production without  significantly affecting the prices  c. Willingness
    of producers to invest and adopt new technology, if identified, to increase  productivity or quality of produce  d. Challenges
    in the market chain and market environment e. Vulnerability of the market to shocks, trends and seasonality  f. Previous
    experience of collective action (of any kind) in the community g. Key commodities, processed products or semi-finished
    goods demanded by major  retailers or processing companies in the surrounding areas/districts  h. Support from Government
    Departments, NGOs, specialist support agencies and  private companies  for enterprise development  i. Incentives for members
    (also disincentives) for joining the PO    Keeping in view the sustainability of a Producer Organisation, a flow chart
    of activities along with timeline, verifiable indicators and risk factors is provided at Attachment-5.'''
  - '''a. Executive summary    b. Business Description c. Industry/Sector analysis d. Marketing plan e. Operations plan  f.
    Financial plan    7.8 What is included in an executive summary? The executive summary is an abstract containing the important
    points of the business plan. Its purpose is to communicate the plan in a convincing way to important audiences, such as
    potential investors, so they will read further. It may be the only chapter of the business plan a reader uses to make
    a quick decision on the proposal. As such, it should fulfill the reader''s (financier''s) expectations. It is prepared
    after the total plan has been written. The executive summary should describe the following:  a. The industry and market
    environment in which the opportunity will develop and  flourish   b. The special and unique business opportunity—the problem
    the product or service will  be solving   c. The strategies for success—what differentiates the product or service from
    the  competitors'' products  d. The financial potential—the anticipated risk and reward of the business e. The management
    team—the people who will achieve the results   f.  The resources or capital being requested—a clear statement to your
    readers about what you hope to gain from them, whether it is capital or other resources    7.9 What is included in a Business
    Description? The business description explains the business concept by giving a brief yet informative picture of the history,
    the basic nature, and the purpose of the business, including business objectives and why the business will be successful.
    The purposes of the business description are to:  a. Express clearly  understanding of the business concept   b. Share
    enthusiasm for the venture   c. Meet the expectations of the reader by providing a realistic picture of the business  venture    7.10
    What is Industry Analysis?'''
  - '''-Black cloth, -Khada cloth -Saw dust -0.025 % Sodium hypochlorite -Chick pea / groundnut seedlings -Bleaching powder
    -Coffee powder -Multivitamin syrup -10 % sucrose -Beaker 500 ml -Measuring cylinder -Egg laying chamber Procedure : 1.
    Release  10 males and 5 females at 2: 1 ratio in plastic containers and cover with thin black cloth . ( Female require
    multiple mating to lay fertile eggs ) . 2. To induce the moths to lay more eggs multivitamin syrup 2 drops + 10 % sucrose
    is given through cotton swabs 3. Daily collect the egg cloth after 3 rd day of copulation . Provide 25- 28 o C , 80- 90
    % R.H during egg laying. A female lays 300 –700 eggs 4. Sterilize the egg cloth in 0.025 % sodium hypochlorite for ten
    seconds and immediately dip the egg cloth in distilled water in 3 different buckets having distilled water one by one  and
    then dry it in shade. 5. Raise chickpea or groundnut seedlings in a week interval and provide for feeding 6. Place newly
    hatched larvae on chickpea/groundnut seedlings along with egg cloth for one day or place 3-4 eggs in vials containing
    artificial diet 7. Pick young larvae and rear on bhendi vegetable individually in  penicillin vials to avoid cannibalism.
    8. Daily change diet till pre pupal stage 9. Collect pre –pupae and allow for pupation in plastic container having saw
    dust 10. Pupae sterilization is done with the help of coffee filter by  dip method 11. Transfer the pupae inside the egg
    lying chamber by keeping them on a separate petri dish without lid.'''
