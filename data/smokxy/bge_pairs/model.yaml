widgetData:
- source_sentence: What is packaged drinking water?
  sentences:
  - '''26.6  Packaged Drinking Water (other than mineral water) It can be defined as water derived from the surface water
    or underground water or sea water which is subjected to herein-under specified treatments, namely decantation, filtration,
    combination of filtration, aerations, filtration with membrane filter depth filter, cartridge filter, activated carbon
    filtration, de-mineralization, remineralization, reverse osmosis and packed after disinfecting the water to a level that
    shall not lead any harmful contamination in the drinking water by means of chemical agents or physical methods to reduce
    the number of micro-organisms to level beyond scientifically accepted level for foods safety or its susceptibility. The
    standards, packaging and labelling requirements have also been specified under FSSAI rules.'''
  - '''Some fruit or vegetable powders are produced from juices, concentrates, or pulps by using a spray drying technique.
    Dry powders can be directly used as important constituents of dry soups, yogurt, etc. The drying is achieved by spraying
    of the slurry into an airstream at a temperature of 138°C to 150°C and introducing cold dry air either into the outlet
    end of the dryer or to the dryer walls to cool them to 38°C– 50°C. The most commonly used atomizers are rotary wheel and
    single-fluid pressure nozzle. A wide range of fruit and vegetable powders can be dried, agglomerated, and instantized
    in spray drying units, specially equipped with an internal static fluidized bed, integral filter, or external vibrofluidizer.
    Bananas, peaches, apricots, and to a lesser extent citrus powders are examples of products dried by such techniques.'''
  - '''LEAF FEEDER 7. Leaf webber , Eucosma critica, Eucosmidae, Lepidoptera Symptom of damage: During vegetative stage of
    the crop, the caterpillar damages leaves by webbing, while at the floral stages of the crop they enter the buds, flowers
    and pods and feed on the immature seeds. Nature of damage: Young larva gets itself concealed into the frass produced during
    the course of scratching. The grown-up larva then draws the two leaves together and spins a thread between them, in which
    it passes later instar and also pupates. Egg: Oval, creamy white in colour, laid singly in leaves, petioles or stem. Larva:
    Young larvae are pale-yellow in colour, moderately stout, smooth, except for a few short scattered hairs. It hibernates
    in larval form. Pupa: Yellowish in colour, gradually turn to light-brown and finally to dark brown. Pupates in thin papery
    white silken cocoon. Adult: Dusky brown with forewings having four black dots and a silvery transparent mark'''
