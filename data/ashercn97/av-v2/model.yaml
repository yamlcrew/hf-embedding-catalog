    on franky"s shoulder. "want a moment?" g-billy stroked her hair comfortingly. "..please.." cadence had her face buried
    in franky"s chest. "i"ll stay.." stomp stepped forward, kneeling the othet side of franky, unclipping the chains. "..just
    for comfort.." he earned a nod from cadence as the others left. "..you okay?" stomp asked, sitting franky back. "..."
    cadence sniffed, gripping franky"s top. stomp sniffled abit, then rubbed cadence back as she cried into franky"s jacket.
    "...this is all my fault.." she muffled into his jacket quietly. "dont say that.." "it is..if i"d of just said no to cole
    or not cheated on him..franky wouldnt be in this mess..he wouldnt be hated by cole...and he wouldnt be dead...i hate myself...he"s
    innocent and he"s dead.." cadence cried, hugging franky. "..im so sorry...so so sorry.." stomp couldnt tell her otherwise,
