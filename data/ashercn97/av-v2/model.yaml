      see what happened, Warin could see their bodies. There were many Black Mages. And a few Time Mages too. There was also
      a gang of thieves, who went into the dome and came out minutes later with odd machines and metal things. Then they carried
      it off on Chocobo back. Where to, he didn"t know. He quickly scuffled down a path, up a stepladder, and was now sitting
      on a small mound of rich brown earth, not far above the top of the dome. He could see the hole where the spell hit.
      The iron was broken and it was still burning with fire and smoke. The metal was melting and falling over. And he could
      see a body... it was Mustadio, or his father, he didn"t know which one. One of them was dead. It was horrible seeing
      it. He raised his bow, took aim and thought about it. If he shot at them, they"d find him and kill him. If he didn"t,
      Leo Cyneburga would probably kill him for losing Mustadio"s workshop to these thieves. He sighed. At least this way
      he knew he was doing the right thing. He aimed it and was ready to fire when a sound caught his ears. He turned and
      looked into a man"s face. Before he had time to even cry out, a sword pierced his side and he fell down the hill with
      a thud. The man was cloaked all in black; even his eyes were pitch as night. Thanatodin he was, Head of Lucavi"s Hand.
      "Be careful you fools! You missed a guard." He said in a cold and high pitched voice. "Now hurry and find the forwarder!
      I want that machine found! And the Zodiac Stone that powers it, as well. Now!" Aeris, the flower-girl who lived in Zarghidas"
      slum was walking down the street, selling flowers. She lived in these slums, where flowers were scarce, with her mother.
      And of course Cloud, her . . . what was he? She could have said friend, or bodyguard, or boyfriend. The man never talked
