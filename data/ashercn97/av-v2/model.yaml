      because it saved her life. She drew the gun up, it was a struggle to reach it, but she did. One of the Goblins now saw
      her moving and made his way over her, but she blasted off a round of the gun into its face, knocking it back. It didn"t
      kill it, but it harmed it well enough that it and its partner drew back. Another Knight with them, who was still alive,
