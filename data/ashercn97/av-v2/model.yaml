    his lip bleeding. "Cole!" Zendaya shouted. "WHY DONT YOU TELL THE TRUTH!" cole spun round and approched zendaya with the
    knife. "tell what truth, cole?!" Zendaya asked, Cole pulled an angry face and turned to franky with force, grabbing him
    by his shirt. "Last chance, franky!" Cole raised the knife. "Me and cadence slept together!" Franky cried, cole gave him
    a sly grin, gripping the knife. "COLE NO!" zendaya pleaded him Cole gave franky a sadistic grin, sliding the knife into
    franky"s stomach. Franky cried out in pain as the knife punctured his skin. Quick as a flash, cole pulled the knife out,
    leaving franky bleeding on the ground. Zendaya let tears fall. "FRANKY!' she shouted, crying in fear and sadness as franky
    lay panting on the ground, blood surrounding him as cole stared, grinning. "This..is the hard way" Cadence sat on the
    hospital bed, staring at the drip that was injected into her hand. she exhaled heavily, reaching for her phone. "franky.."
    she said quietly, holding her phone to her heart as she began texting, suddenly CeCe burst through the door. "i came as
    soon as i got your call" CeCe smiled, taking a seat next to cadence. "i brought your clothes, charger and some snacks.
    and obviously, shampoo" "thanks CeCe.." cadence thanked her, putting the bags down on the floor. "so..whats wrong?" "i
    have liver poisoning.." cadence shrugged, a tear falling. "but..how?" CeCe looked confused. "i overdosed.." "on what?!"
    "paracetamol..i think" cadence rubbed her head. "why did you do that?" CeCe exclaimed, raising an eye. "i dont know!"
    cadence shrugged, holding her phone tightly. "well..ok..all that matters is that you get better" Meanwhile Franky crouched
    on the floor, his hands pressed against his wound. "You-" franky struggled. "You dont d-deserve cadence!" "And you dont
    deserve to live...but im being nice" cole grinned. "How is stabbing someone nice?!" Zendaya shouted. "Shut it you" he
    threw a brick at zendaya, hitting her in the cheek as she squealed in pain. "Just leave it zen..he"ll h-hurt you t-too.."
    Franky managed painfully As cole slammed the basememt door. Zendaya cried at the sight. "Franky! Please..keep breathing.."
    She cried, trying to break free. "Zen..stop it..y-you"ll hurt y-yourself.." Franky gave her a considerate smile before
    leaning back against the wall as he closed his eyes. "Franky?" Zen said quietly through tears, looking at him. "...franky?"
    "...yeah.." Franky was out of breath and opened his eyes slightly, speaking quietly. "..dont leave me.." Zen cried hysterically.
    "..your g-gonna be..ok.." He shut his eyes again. "N-no!" Zendaya panicked, wanting franky to open his eyes. "Please..
    Stay awake" "Tell cadence.." Franky kicked his phone to zendaya. "..tell her.." He coughed blood. "I love her.." "Franky?"
    Franky closed his eyes for the last time as he exhales his last breath. Silence. "Franky?" Zendaya called out to him,
    before breaking down into tears as frankys body lay limply against the wall. hi guys! Thank you for reading my story and
    staying with me after 7 months of being inactive. It really helps me when writing the chapters, knowing i have people
    to write it for. Im so sorry for leaving you all. Some of you might notice that i usually update this fanfic in the morning
    at about 9:30 ( gmt+1 ). Well this might change because i help out at the stables and i have a horse (sometimes two) to
    care for, ride etc. So updates might be published in the evening or later at night. Thank you for reading my fanfic, its
    greatly appriciated! Thanks for all the positive reviews telling me your all exicted to read the next chapter! Next chapter
    coming soon! Do you think frankys dead? Will zendaya text cadence? Or will she ring the EPF? Cadence cried on cece"s shoulder.
    "What if I die?" Cadence said, fear in her voice. "your not gonna die!" cece shouted, obviously upset that her friend
