      was near the bad area. All of the slums were bad, but she was near the real bad part. And it was nighttime, and it was
      worse at night. Before he came she never went this way, it was nothing but thieves and murderers and rapist and war
      criminals hiding out. She hated it. It was a quick way to her house, and now that Cloud was here she could go that way.
      Yet she never felt quite safe. As she was walking by she caught sight of a monk, a new one in town, who was eyeing her.
      She hated it when new thugs moved in. They usually found out that Aeris was out-of-bounds, and some spiky headed freak
      would show up and cause a lot of trouble if they messed with her, but not always. "Hey baby." She caught a smug and
      cold voice behind him. With a sigh she kept walking, but it came again. The cat calls again. Where was Cloud? She needed
      him right now. She hated seeing him fight with them, but she needed him. "Yo" Dav, don"tcho go messin" wi"h her, she
      got some hell" ova boyfriend." "Shut up. You t"ink I"m "fraid o" some sh"t like that?" Aeris started moving faster,
      and so did the cat calls and footsteps. This new guy didn"t get the message yet. He would. Cloud would come save her.
      He always would. She could feel him behind him, closing in. "C"mon baby, why don"tcho come over "ere" Aeris closed her
      eyes, afraid of what could happen. She started moving faster, but she could feel his hand now on her shoulder. She stopped
      moving. The man"s hands were now on her back, moving down . . . "Argh!" The man fell over, not quite dead, but he was
      bleeding something awful. Cloud reached down and wrapped one of his gloved fist around the man"s bony throat. "Leave
      her alone." He said in a quiet and chilling voice. The man was making gargling sounds and Aeris had enough. "Cloud,
