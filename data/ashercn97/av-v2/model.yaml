      midst of battle, two more Goblins dead at his hand. Agrias wanted to help, but at that moment it all went dark and she
      passed out, as she heard Cid crying "Master of all swords, Cut Energy!" and with that everything went black. His name
      was Warin Guerino, a guard in Goug Machine City. He was a Black Sheep knight in charge of watching "The Dome" as it
      was called, where Mustadio and his father worked. Worker 8 was really the guard, but the Black Sheep kept order whenever
      it wasn"t such a big deal that an eight food robot was needed. When the meteor hit, half an hour ago, he had been across
