    with Altima, no one there cared of rank or class when around one another. "Gariland is closest. We"ll never reach the
    desert in this condition, unless we find a Priest or even a Chemist out here in the forest." Agrias sighed and cursed,
    forgetting all dignity. She had recovered her sword, which was good because she was unused to fighting with the gun she
    found. The forest was dark, filled with old trees of names which are long forgotten, great trunks of brown and red with
    leaves of yellow and green. The trees were so tall and so thick of branch and dense of leaves that no sunlight could get
    through, and being the night it was almost impossible to see Cid thought he was only a few feet away. This was life, or
    so Agrias Oaks believed. After the war all had become different for her. Upon their return, she and Cid were arrested
    at once for "heresy" and taken before Cardinal Romia. As were Mustadio and the rest who appeared that late day when all
    of them (Save Ramza and Alma) returned. The Cardinal, who was of course in on the High Priest Plot, had also learned off
    from Zalmo of the Heretic Beoulve and his group. It all went uphill then. Romia ordered to know what had happened to the
    heretic Beoulve, but before any of them told him King Delita himself appeared at the Glabados Church and after a heavy
    talk that Agrias had not heard, they were freed. Cleared of all charges of heresy and murder, and given jobs. Oddly enough
    all of the jobs they were given benefited Delita. Agrias hated him, but Ovelia had told her one night that she had married
    him for love, not because he made her. Agrias didn"t know if he believed the Queen, but if Ovelia said so, then she"d
    believe her. For now anyway. "Agrias." She was brought out of her memories as Orlandu spoke again, the old man now was
    prodding at his arm that had been broken with a long knife. "We"ll have to move, you up for a travel tonight or another
    few hours of rest?" Agrias didn"t speak, not right away anyway. She was tired and near death, if that potion had not been
    found she would have slipped off into blissful eternal slumber, but she was alive and in such pain. Moving out was smarter,
    who knows when the Goblins would be back. Of course rest would be a great help to her injured body. "We should move to
    Gariland now, Cid, we have to." Idris Brennus was only twenty-four years old, and he had been even younger when he became
    the Lieutenant to Leo Cyneburga. Shortly after the war Ovelia gave birth to a son while she was at Beltha Garrison, while
    on her way back to Igros the carriage was attacked. Her guards were slaughtered by the assassins, save only Idris who
    was able to get the queen away from the carriage. Her son was saved too, but a week later he died anyway, the cause has
    yet to be found. Despite this, Idris was made Chief Lieutenant of the Black Sheep. When the Goblins began invading the
    cities around Sweegy Wood, Cyneburga put Idris in charge of finding their base. After weeks of battle in the Wood he learned
    of Rat Cellar and the old Death Corps base the Goblins were now using. Idris had been at the siege with Leo and his friend
    Roland Bedivere when it began, and when Cyneburga had road back to Igros, Idris was in charge. He was now of the siege.
    Three days after Leo left, around the same time that Agrias Oaks the Hokuten and his boss Leo Cyneburga had their argument,
    he decided to lead an attack squad around back. And so the Dragoon Lancer had done so, he and his squad, which was made
    of two knights, an archer and a chemist. They moved quickly around back and closed in on the upper floors of the building.
    Several Goblins and the mysterious mages were waiting, and they appeared to be arguing. Idris had moved close to hear.
    The Goblins spoke in their own language, but the Mages seamed to understand. They however spoke in the common tongue.
    "We"re not going out there again, too many archers. It takes to long to charge our spells before they get their arrows
    at us." The Goblin chief, Idris thought it looked like a chief being larger and darker than the others, grunted in it"s
    own horrible language but the mage stood by his decision. Idris could see them arguing, perhaps the mages and the goblins
    would kill each other. If the Goblins fought the mages at these close ranges, they"d win. And then the Black Sheep could
    swarm them without fear of magic. It all looked like it was going perfect, until a second goblin, also tall and dark of
    skin like the leader, entered and spoke of two warriors in the forest who they had tried to kill, but had slaughtered
    seven of their warriors. Were these two in the forest Black Sheep? Or Hokuten? Or Shrine Knights maybe? Before Idris could
    do anything else, several Goblins turned his way. It was then that Idris learned that he and his squad was sneaking towards
    them using their own escape route into the forest. The Goblins stopped in their tracks for a second and stared at the
    group of Black Sheep. And then with a snarl the goblins charged . . . Author"s Notes: Well, I have it up later than I
    thought, only because I didn"t originally plan on the Idris part which took some time to write, and because I had other
    things to do. I just felt I should add some more. As for Ovelia"s death, if you have to complain then I"m just ignoring
    you, killing off people is fun and this isn"t the last time it"ll happen so get over it. NOTE: As of right now I am not
    working on this story on a regular basis. I"m working on "Two Robots, Red as Blood (2RRB)" my Megaman Fanfic and "The
    Unwritten Chapters (UC)" my very long, masterpiece of a Digimon Fanfic. Since UC will take me a very long time to work,
    I"m only waiting on 2RRB until I start work on this story again. I will be finishing it. I promise.'
- source_sentence: I should"ve known that since that huge mansion was her house, she"d be able to escape even with my using
    her magic. There was nothing else I could do other than to make the house constantly change and make things difficult
    for her, I wasn"t as skilled as she was. "..." Ellen looked at me with a puzzled look on her face, "Still not dead? I
    have to applaud your tenacity." Suddenly she looked at if something had hit her, "Ah, could it be... Are you that worried
    about your father?" I felt the anger inside me boil even more but now it was mixed with worry, "Stay away from him!' Ellen
    turned away from me yet again, refusing to look at what she used to be. "Oh, I know. You and your father, Viola. A close
    family of two." I wanted to tell her that she knew nothing about my father and I but when I tried to think back on my
    memories, I realized that this body, Ellen"s body, didn"t have my memories. "Those memories stayed in your body. He"s
    a kind man. A hunter, isn"t he?" She asked even though she knew the answer already, "And he even sent you that letter.
    What a good father." Ellen turned back to me and began getting closer to me once more, "So then, I suppose you"re worried
    about what"ll happen when you"re gone?" Ellen walked back over to me, knelt down and held my face in her hands, "It"ll
    be just fine. I"ll give him Viola"s share of love." She smiled even more, "And I"ll take her share of love, too. So..."
    "Viola?" A man"s voice called out and footsteps running on the path were getting closer. "Daddy!' When my father got closer
    to Ellen she ran up to him and hugged him! "Viola?! Are you safe?! Are you hurt anywhere?" "I"m okay daddy," Ellen had
    the nerve to call my father her own, more tears ran down my face as he didn"t know what had happened. "Daddy... That"s
    not me! Daddy..." Ellen then went to my father"s side and feigned fear, knowing that once she moved he would see me. "What?!
    Why..." he then looked back towards me as I started trying to crawl to him. "Fh... ah... aa... th..." I tried calling
    my father but not even I was sure he could understand me, "...dh ...dha... di..." "S-STAY AWAY, MONSTER!" Hearing that
    shattered my heart, he couldn"t hear me, he didn"t know. In one last attempt to tell him that I was his daughter and not
    the witch in my body I tried reaching out to him, but he raised his gun. He must"ve been hunter before coming out to look
    for me. BANG Pain enveloped the left side of my head, it hurt so much that I couldn"t bring myself to move anymore. Even
    though I hadn"t moved, my father shot me again as if to make sure I was dead. Once he believed that I had truely died,
    as I thought I had died right there, I could still see my daddy walk back towards Ellen and tell her that they were going
    back home. I had no control over the body that had been shot and I wanted to cry even more when Ellen stopped and giggled
    at what happened then went to catch up with my father. "She now believes you"re dead." The woman"s voice whispered in
    my ear as her hand uncovered my eyes and I went back to seeing darkness. "Now it"s time to go home and for you to start
    healing." (This is my first attempt at a "The Witch"s House" story. I"ve played the game and went through the Normal Ending
    and the True ending. I"ll have to play again for the third-psuedo ending, but I saw a video of it on youtube. I know this
    isn"t my longest first chapter I"ve ever written but I felt it was okay for a start. Hope this isn"t too confusing for
    a read and hope you enjoy it, please read and review.) ~Viola~ We were walking for a long time it seemed, the woman only
    stopped once in a while to adjust her hold on me and continued walking. I hated being blind, I hated not being able to
    see where we were, there were so many things I hated right now and one of them was that my leg itched but I didn"t have
    legs which made it that much worse. I wanted to ask where we were at the moment but with my voice still damaged I couldn"t
    utter a coherent word. There were so many things I wanted to say, so many things I wanted to complain about but couldn"t.
    The sounds of the forest were soothing and peaceful despite all the horror that went unnoticed. Though I couldn"t help
    but listen to the birds singing, crickets chirping, animals running about after the rain had let up. "Just rest Viola;
    I"ll wake you when we get to my home." The woman"s voice softly told me, it was strange how she seemed to know what I
    wanted to say but I did as I was told and tried to sleep. ~Silver Witch~ It is such a shame for a sweet young girl to
    be caught up in something so horrendous, all she had wanted to do was make her friend happy and this is how she"s repaid.
    I looked down at the sleeping girl in my arms and hoped that she was asleep, it was hard to tell when she had no eyes
    but that would be remedied in time. In time Ellen will regret wronging Viola and she will take back what is rightfully
    hers, but that day is far from now and we have plenty of time. I knew this path like the back of my hand, there was no
    getting lost in this forest for myself and my guest. Walking past several rose bushes I stopped as I was greeted by a
    black cat with a white tipped tail, my demon to be precise. "My, my, you never bring in a soul to me." The demon spoke,
    eyeing Viola, eager to take her soul which I wasn"t going to allow. "She"s not for you, you mangy cat." I walked passed
    him and proceeded towards my home up ahead. "If you"re not giving me her souls then what are you going to do with that
    mangled mess of a child?" His voice sounded perplexed and annoyed, it"s been a couple of days since I offered a soul or
    two to him so it"s no wonder he"s testy, "It"s also not like you to help another witch." "She"s not a witch; she"s just
    a poor girl who befriended a witch." When I stepped in front of the door the door opened on its own allowing me to walk
    inside. I heard the demon following me closely now until we stepped into the house, "Ahh, the body switching spell." the
    cat realized what I was saying about Viola"s situation, "Such a tricky spell with difficult requirements. The easiest
    people to fool for that spell are bleeding hearts and gullible children." Without turning I uttered a spell under my breath
    to throw a book I had left on the dining room table at the possessed cat. I smiled when I heard him shriek most likely
    after dodging the book, going onto more important matters I uttered another spell to place several towels on the couch
    in front of the fire place and I set Viola down on it. By how she was breathing I could tell Viola was sleeping but I
    didn"t have the heart to wake her, so after covering her with one of my quilts I left to do some work. Using my magic
    to create a shortcut to one of my personal rooms where I study magic and make potions, I began looking through the books
    I had for the ones that"ll help the girl. "Cat, do you remember where I had placed the books on restoration spells?" I
    hoped that my feline companion would know since I wasn"t finding the book amongst the pile I had left on the table next
    to an empty ceramic bowl. "You mean the one you threw at me? It"s in the living room." Ignoring the snide comment I went
    back to the living room to retrieve the book and flipped through it to see that it was indeed the book I needed. Opening
    it to where I needed it, I ventured back into my private room and began working on the potion. " "Bodily Restoration"
    " my cat read after hopping onto the table to read what I had the book open to, "You need a couple more ingredients for
    this type of potion, my faithful witch." I could hear the spitefulness in his voice when he said "my faithful witch",
    I didn"t mind it though; it was something I ignored long ago. "It"s nothing I can"t find in my garden or out in the woods."
    "You might want to help your guest first... She"s bleeding all over your couch." I mentally slapped myself for not wrapping
    up Viola"s wounds first, it should"ve been the first thing I did once I got inside but I guess working on the healing
    potions overshadowed it. Grabbing several sheets I began tearing them so it would be easier to wrap up Viola"s legs to
    stop the bleeding, when all the bandages were made I quickly went through my supply cabinets and grabbed several jars
    filled with various plants and liquids. Going over to Viola I gently removed the quilt I started to use a scrap sheet
    to dab away the blood that was coming out of the open leg wounds. Opening one of the jars filled with a cloudy substance
    in it, I took part of the cloth I had in hand, dipping it in the jar and began lightly smeared the substance over Viola"s
    wounds. Putting an appropriate amount of the balsam fir resin on the wounds I began wrapping up her legs to prevent any
    possible infections and so when it gets to the time where I can get to heal her legs there would be no complications.
    The eyes on the other hand were another story, I couldn"t exactly treat them until Viola was awake and it would be rude
    to wake up a young girl from her slumber. Gently sitting her up I put bandages around her head, making sure that the eyes
    were covered and fasten it so the bandages wouldn"t come off so easily. Softly laying Viola back down on the pillow I
    went back into my study and began grabbing various ingredients. The first thing I intend on restoring was her eyes because
    even though the book states that growing the legs back would be a quick procedure, it"s quite painful and would take a
    few months to be able to walk without feeling pain. That and I felt that seeing was far more important than walking because
    what was the point in being able to walk but not see where you were going. When I finished crushing some herbs into powder
    I added them into a bowl and then set it over the fire in the fireplace. ~Viola~ Smelling something cooking and burning
    wood I sat up, feeling what I was on I realized that I had been sleeping on a couch and had a blanket covering me. I guess
    the woman didn"t want to wake me up when we arrived at her home, but now I was hungry. The invisible cook at Ellen"s house
    didn"t seem to be that great because all he seemed to make was some sort of stew which had cabbage and wieners in it,
    that and it was hard to ask for food when you couldn"t speak. "Aa...ah... Mmh..." I hoped that the woman was nearby to
    hear me, I didn"t know if she had anyone else living with her or not. "Hey! Your guest is up and looks like she wants
    something!" I heard a male voice speak, the voice sounded a lot like that black cat"s but this voice had a different and
    more refined tone to it. Hearing something close to glass quickly being put on a wooden table and rushed footsteps, I
    felt the woman touch my hand to tell me she was here. "What is it that you need Viola?" I put my hand on my stomach and
    then I took the woman"s hand and wrote "I"m hungry" in her palm with my finger. "Of course, I"ll have dinner prepared
    in a moment." I heard her get up and then ask, "How does lamb, cooked vegetables and cheesecake for dessert sound?" That
    dinner sounded wonderful, my mouth was already watering all I could do was nod rapidly because it"d been a while since
    I had something that good. Hearing her footsteps fading all I could do was wait and I wasn"t sure how much time had passed
    but I had a feeling that it was quite a bit due to me now having bandages around my head and my legs. There wasn"t much
    I could do so I just sat on the couch and listened to the sounds of flames crackling, food sizzling and plates being placed
    on a table. While I waited for dinner to be prepared, I unconsciously started braiding my hair like I did every day when
    I woke up. It didn"t take me long to finish making two braids even with Ellen"s hair being as long as it was after I had
    taken the ribbon out, but since I only had that one ribbon I had to tie both braids together behind me rather than have
    them at my front like I used to do. Smelling the delicious scent of dinner waft through the air I could tell that dinner
    was almost done, using my hands to feel what part of the couch was what I took the blanket off of my and hung it on the
    back. With the sound of footsteps coming back into the living room the woman"s soft voice rang, "It"s time for dinner,
    Viola." With that being said she picked me up carefully and walked me into the dining room, I assumed of course. She sat
    me down on a chair and pushed it in to where I was close to the table and once I was close I began lightly feeling where
    my plate and utensils were at. I heard the woman giggle before placing a fork in my hand and felt a cat jump on my lap.
    "Pay no mind to me, I"m just here for this assist." I heard that same man"s voice ring. My left hand was now being held
    by the woman while she uttered some words that I couldn"t understand and when she was finished she let go. "Now place
    your left hand on the cat"s head." I did what she told me and a gasp left passed my lips when I could see! But... I had
    no control of where I my sight went. "In other terms the spell that she used is for sight-stealing, the only drawback
    is that only I can control what you see." The cat spoke to me as he continued to look at the plate full of food. "I"m
    sorry, but it"s the least I can do for now." She apologized as she sat down at the other side of the table. Right now
    all the cat was looking at was my food; I couldn"t exactly see who my caretaker was all I caught a glimpse of was her
    silvery hair. I tried to get the cat to raise his head up a bit but he wouldn"t budge, so I gave up and began eating.
    The cooked vegetables were delicious; the carrots, tomatoes, broccoli, and some type of squash were well seasoned. When
    I tried to tear a piece of lamb off of the leg but with just using the fork it was rather difficult and just as I was
    about to take my left hand off the cat"s head to take the knife and cut it an invisible person picked up my knife, took
    my fork and began cutting the meat off the bone and into small pieces. When the invisible person handed the fork back
    to me, I got a piece on the fork and ate it to find that it was cooked very well and the taste of rosemary added flavor
    to the meat. "Tch." The cat"s head lightly jerked as he sneezed downward and tried to move back some but was forced to
    stop when his back end hit my stomach. "You used rosemary didn"t you?" The woman giggled at the cat"s accusation, "Rosemary
    makes the meat taste better and I figured that Viola would like it." "You know fully well that I can"t stand rosemary,
    it"s a demon repellant." I felt the cat cringing his nose under my palm as he kept his sight on my plate. "Well you"re
    stuck there until Viola is finished eating because I"m not gonna let you leave this table before that." I continued eating
    the lamb and veggies while having to ignore the cat"s low growling and it"s failing attempts to move away from my plate.
    By the time I had finished off the lamb the witch"s demon was itching to run out of the dining room, but under protest
    he obeyed her orders and stayed though he seemed relieved that the scent of rosemary was fading. Soon after I was finished
    with my dinner the woman got up to take my plate along with hers to the kitchen and when she came back she had set down
    a plate of blueberry cheesecake in front of me. It had been years since I had cheesecake, I"ve hadn"t had any of the dessert
    since mom had passed from an illness and father wasn"t the greatest baker in the world. Out of habit I used my fork to
    push the blueberries into the cheesecake until they weren"t seen and then started eating, I heard the woman chuckle at
    what I had just done. "That"s quite the unusual way of eating a cheesecake." I "looked" down in embarrassment but then
    continued eating because I couldn"t exactly explain. As I continued to eat the cheesecake I had some difficulty keeping
    the sauce from dripping anywhere other than the plate so I had to use my other hand thus blinding myself but it was better
    than getting my clothes dirty... Well any more than they already were. "Viola, I also must apologize for not having a
    spare dress or any other clothes for you. I would lend you some of my clothes but they would be much too big on you, so
    hopefully by tomorrow I"ll have something for you to wear other than that dress." I nodded in understanding as I finished
    off the rest of the cheesecake; since the woman and I were finished she got up from the table with her plate in hand,
    walked to my side of the table and took my plate. After hearing the glass being placed on a metal surface, most likely
    the sink she came back shooed the cat off my lap and carried me. Since I didn"t have the cat to see I had no idea where
    we were going but when we happened to be in another room the nice fragrance in the air I would guess that we were in a
    bathroom. "I figured that you would like a bath before going to bed..." she paused for a second then sat me down on a
    small stool. "Is that alright with you?" I don"t think I could"ve nodded my head fast enough, a bath was another thing
    I really wanted, I couldn"t stand the blood, sweat and greasy feeling any longer. It didn"t take the woman long to draw
    the bath and helped me in after getting the filthy clothes and bandages off. To be honest it felt rather nice to be helped,
    though it was only because I was both blind and had no legs, but in time that would be different... I hope. By the time
    the woman was finished helping me get clean, she picked me up out of the tub and wrapped me up in a towel while she wrung
    out my hair. She stopped for a moment telling me that she"ll be right back, that she had to get something for me to wear
    for the night, so I waited with the big towel wrapped around me like a blanket. When I heard her get back she slipped
    something over my head and helped me out of the towel and get my arms through the sleeves as well as giving me other garments
    to wear. Once I was in the oversized nightgown the woman carried me to yet another room and laid me down on a soft bed.
    With no words being exchanged the woman tucked me in and left the room. ~Silver Witch~ I didn"t see any problem with letting
    young Viola take my bed for a while, my home was meant to house one person but it"ll change. I needed to finish that potion
    I was working on since the book instructed that it"d sit for a little over an hour to allow the brew to cool down and
    for the ingredients to set in. Putting all the contents in a decent sized bottle I set it aside as I opened another book
    of potions and flipped through the pages to a potion that heals the throat. "Hey!" I let out a sigh when the cat tried
    to get my attention, "You need to keep up your responsibilities and bring me souls so you can have your magic." I looked
    at the cat out of the corner of my eye, "Tomorrow. You"ll get your souls tomorrow, now let me work in peace." "I"m holding
    you to that, my faithful witch." I paid no mind to where the mangy cat went and while I allowed the fire to begin boiling
    the water I looked up at the clock that hung above the door to find that it was nearing midnight. Thinking that Voila
    would be fast asleep by now, I grabbed the bottle and a small eye dropper and headed to my room to find the young girl
    lying on her back holding one of the throw pillows I forgotten to take off the bed. Quietly unscrewing the lid to the
    jar I used the eye dropper to get a bit of the potion, I set the jar down and as careful as possible I lightly pushed
    up each of Viola"s eyelids and placed a few drops of the potion in each eye socket. After placing the appropriate amount
    of drops in each eye, I squeezed the rest of the potion back in the jar and tip-toed out of the room. Going into the living
    room closet I took out a spare blanket I had and muttering a spell I conjured a bed next to the still bloody couch and
    I went to sleep. "Hope you enjoy your new sight in the morning, dear Viola.' (Sorry this took so long to get finished
    and posted up. I got distracted by playing "Mad Father" which was recommended to me, finishing Silent Hill 3, starting
    Silent Hill Origins and coming up with story ideas. Hope you like this chapter and I really appreciate all the reviews,
    story favorites and follows, I didn"t expect this story to be liked that much but I appreciate it all the same.) I know
    this isn"t what you"re wanting to see but I feel like I should leave a note explaining a thing or two. First off, I"m
    really happy at all the reviews for this story because I never thought that it would get that popular but I don"t know
    if I"ll ever get back to it. Maybe if I play the game a few times more to get the motivation I"d probably be able to throw
    out another chapter but until then this story is kinda on a haitus. Secondly, when I read my thirtieth review from Rukifellth
    I wanted to reply back "I just discovered "The Diary of Ellen" last night and am still reading it, so of course there"s
    going to be mistakes. This story was made probably before the prequel was released and translated into English.' So putting
    that into consideration I may go back and edit some of the story so that it makes sense with the prequel pertaining to
    Ellen"s degenerative disease. So until the time comes where I"m finally in the mood to write more "A Witch"s Revenge"
    there won"t be another update for a while. A thousand apologies for this.
  sentences:
  - Just wanted to jump in and say I was really impressed by all these comments. I expected to jump down to the bottom of
    this thread and find trolls, but you're both responding to each other's comments very thoughtfully.
  - '"Dude, you seriously need to see a psychologist. Because this is far from beautiful, it"s plain creepy and shouts "I"m
    a stalker with a delusion in mind!''" I yelled at him, feeling myself freak out more and more about the statue then quickly
    covered it back up. "That, my dear, is what you"ll become in the future." Riccardo said, obviously not acknowledging what
    I just said. "I am not going to be pregnant! I"ll do everything in my power to make sure that never happens!" "Deny it
    all you want, dear Fiona, but that is what you"ll be when the time comes." Riccardo shot back then added, "Go ahead...
    you may touch it." "Seriously dude, it doesn"t have the "BOOM pregnant" powers so I"m not going to even bother touching
    it. Aren"t you even listening!" I was getting scared but what he said next just went over the top. "You will be mine,
    Fiona!" the mad keeper declared as his sinister laugh echoed throughout the room as he left. I felt so paralyzed with
    fear that I backed up slowly to a corner, purposely fell on the ground, curled into a ball and almost started crying.
    Tears were welling up in my eyes but they refused to fall, I tried dismissing everything Riccardo had said from my mind
    but his declaration and laugh stayed no matter how hard I tried to be rid of it. I looked behind where the statue was
    to see a small bottle that had a picture of lavender on it, getting up, I picked up the bottle, uncorked it and the scent
    that came out was really nice, relaxing even. Corking the liquid lavender I put it in the miscellaneous section of my
    bag then picked up the Garden Key which unlocked the door that lead to the marionette room, bathroom and the kitchen.
    From the moment I grabbed the key I quickly made a mad dash to the door out of the room and began running to the small
    yard with the sealed well and had the backwards bench. Though before using the key I went over to the two vases that were
    somewhat hidden behind the well, I didn"t find any items in the first vase but the second one had magnesia in it which
    looked like a small light green diamond that was pretty to look at, I liked pretty things. Getting back on track I went
    to the locked garden door and just as I was about to use the key, a noise resembling bells resounded in the air, I looked
    to my right and walked away from the door a bit to see what it was. Floating from where I just left there was a blue glowing
    ball just flying about, in all honesty it looked pretty like a blue lightning bug but unfortunately I had to remember
    that it was a Lumi and Lumis plus me equals bad things, so I quickly got back to the door unlocked it and closed the door
    behind me just before the pretty creature could catch my azoth"s scent. Knowing where I was I dug through my key items
    side of the bag to get out the REST key plate so I wouldn"t have to spend so much time sifting through the bag just to
    look for it like I did with the METH key plate. The whole hallway was lit by pretty glass chandeliers on the ceilings
    which was good, walking down the corridor on my right there was the marionette room which I had to pass since I didn"t
    get the broken marionette, on my left was the door to the kitchen and just up ahead were the stairs leading down to the
    restroom. I stopped in front of an arch made on the wall and looked down to see some stones looking like they were about
    to crumble, I kicked that spot a few time and once it was cleared... "EEEK!" I literally jumped a foot in the air and
    back stepped a bit away from the bugs crawling out of the hole. "God, I hate bugs! Moths and butterflies are cute but
    any other bug, no!" I wigged out and as soon as all the bugs seemed to crawl away to a new home I looked into the hole
    to find Refined Antimony. "Okay, maybe the antimony was worth it." I put the ball of orangish-yellow powder in my back
    with the magnesia and regular antimony as I went down stairs to put in the key plate, once it was in the slot the door
    to the bathroom was unlocked but I didn"t go inside the bathroom right away because I went to pick up the broken half
    of the original REST plate which was the "RE" part. The bathroom was nothing interesting; there was a sink that in the
    game was a status restore spot, the shower that serves as a hiding spot and the stalls back there was a dummy hiding spot,
    a storage space and the path leading down to the Castle Gate Key and a pair of special boots. I went into the restroom
    anyway to get the item that I knew was in there which was actually a medallion, then went out before I had any unexpected
    company. Jogging up the stairs I looked around the corner to find that the coast was clear so it was safe for me to go
    to the kitchen, upon entering the kitchen my sight immediately went to the ham hanging above the cutting counter. "Ham?
    I always thought those were severed heads." I shrugged my shoulders as I went to the other side of the counter to reach
    over and grab the jerky on the counter, "I wonder which jerky this is?" I looked around to see if anyone was watching
    as I tore a tiny piece off and ate it, "Chicken...and it"s good, but gotta save it for Hewie." I told myself as I went
    around to where I was on the inside to find something to wrap the chicken jerky in. Under the cutting counter was some
    paper towels so I used that as a wrap, finishing wrapping the chicken jerky, I placed it in my bag and made sure that
    it didn"t get on the bisque doll. From there I decided to unlock the short cut back to the guest room, when I opened the
    door to the dining room I had to stop and stare at how amazing the whole place looked because never in my life had I ever
    seen a more beautiful dining room. The chandelier lit up the head of the table while the second chandelier was off on
    the back half of the long table, heck I couldn"t help but feel the fabric the deep red curtains were made of along with
    the table cloth and the lit candles made everything even more stunning. Walking along the right side of the table I found
    the other half of the original key plate, I was going to use it for when I get to the water tower, retrieving the other
    half of the key plate I went straight to the door out of the dining room to unlock it thus opening another pathway. I
    went back into the kitchen and went down the stairs leading to a storeroom though when I was held up by the boards of
    wood. For some reason, I didn"t just want to kick it down or charge into it...I wanted to break it with style, so I got
    into a fighting stance like I would in karate, mind you I"m a black belt, and knowing fully well what I"m wanting to do
    I chambered my back leg and stuck the barrier with a side kick. The wooden barrier broke away when I brought my leg back,
    I had to relish in that small victory as I went down the stairs though when I saw the map on the table I did not like
    what I was going to encounter when I went back upstairs. I picked up the map and looked at it, I remember clearly never
    even looking at it because it always seemed useless. "Okay, so I"m at like Belli Castle and totally lost. Oh my god, a
    map it"ll help me, wait this map is useless." I spoke in one of those voices that"s often used in a mocking tone. After
    looking at the map I folded it carefully and placed it in my bag for any possible future use but if I get to the other
    side of the castle with Daniella stalking me, the map"s going in a fire. Before leaving the storeroom I opened the lid
    to the vase and ended up pulling out more chicken jerky, I wrapped it up in the same "packaging" I had the first chicken
    jerky in and put the vase on its side to show that I"ve looked at it. As I was going up the stairs I thought I heard the
    sound of fast shifting footsteps, I knew who it was and I was not going to like it but I was not going to what Fiona did,
    I was going to keep my distance. Upon getting back into the kitchen once I got a few steps away from the stairway to the
    storeroom I heard something that sounded like something, or rather someone, beat against the glass window. The sound in
    the silent kitchen made me jump a little but it wasn"t enough to make me hug the counter where Debilitas was hiding behind,
    reason why; I haven"t the faintest idea but I don"t care. Giving the sound a moment to settle, I let out a sigh to hopefully
    start off what"s supposed to happen and practically on cue Debilitas sprung from his hiding spot. "Bye-bye!" I bid farewell
    for now as I ran out the door, slamming it behind me and sprinted to the corridor and started going up the wide stairs.
    "I will not pull a Fiona. I will not pull a Fiona. I will not-aaaah!'' My thought were interrupted when the tip of the
    boot caught the very edge of the third step which caused me to fall, "God dang it! I pulled a fricken Fiona!" I hissed
    because the majority of the injury I sustained went straight to my knees since that was what I fell on. As I was trying
    to get back up on my feet and continue to get away from Debilitas, the door leading to the kitchen was being opened. I
    looked back to see the door opening, the gardener of the castle closing the door behind him, at first he had his back
    to me but as he turned around and saw me it took him a few moments to actually get through his head that I was near and
    had a look of surprise on his face. The look of surprise lasted for a few moments as he was laughing but it faded and
    turned to a look as if he was mean and scary, I managed to get back up on my feet and run up the rest of the stairs but
    it was there that I felt eyes watching me, I didn"t like that one bit since it got my paranoia worked up even though there
    was no one in front of me. Before I could even try to look around the corner the sound of dragging footsteps from behind
    me sounded closer, I turned around to see that Debilitas was practically in arm"s reach of me! Deciding to not be a coward
    for once in my life I got into my fighting stance and was fully prepared to fight off the guy, but when he took only a
    step forward and angry voice yelled. "Exire Debilitas!" I looked behind me to find no one there, "Oh come on! I tried
    that and he didn"t even do a dang thing!'' When I looked back to Debilitas he looked off in the distance as if the voice
    came from there, he held out his hand as if contemplating whether to touch or grab me but then he wore the face of a beaten
    child as he put his hand down. As he turned to leave the man looked back at me as if saying that he was sorry or something
    close to that, from there he left the area to who knows where and I let out a sigh of relief, "I hate to say this but
    thank you Riccardo.''"Please excuse me, Miss." Riccardo"s voice rung in the halls again, I turned around to find him walking
    out in the open wearing his brown garbs and had the hood over his head. "I am Riccardo, keeper of the castle." "Yeah,
    you"re also the creep who made that disturbing statue of me pregnant in the music room!" I shot back, still not even remotely
    amused. Riccardo let out a hearty chuckle when I said my piece, "Everyone"s a critic when it comes to art, I thought you
    would appreciate it." From what I could see on Riccardo"s face, he now wore a different type of expression that I couldn"t
    read, "So sorry to hear about your accident. Your parents..." I held my head in my hands as another memory flash went
    through my mind, all I could remember that it was dark, the car was heading for a log pile, the car crashed and Fiona"s
    scream. My head was slowly but surely killing me, heck it was worse than a migraine! "As Master Ugo and Mistress Ayla
    are both deceased, you, Miss Fiona are the sole surviving heir of Belli Castle." When Riccardo mentioned my, well, Fiona"s
    parents another memory appeared in my mind, Ayla looking in the back seat at her daughter while Ugo was driving the car
    sometime during the evening. Fiona"s mother placed her hand on her father"s hand lovingly, everything seemed like nothing
    could go wrong in that span of time. The headache got progressively worse to where it felt like someone was pounding on
    the inside of my skull, "Are you in pain, Miss?" Riccardo asked, putting on a tone of worry or concern. "Will you be all
    right?" "Yeah, and could I at least have a cold washrag to ease this fricken headache." I groaned as it was starting to
    become unbearable, so unbearable that I was crying from the pain."I will get one for you, now you"ve had a long day. Please
    rest upstairs, your bed has been prepared." were the last words I heard from Riccardo as I fell to the ground and passed
    out from the pain. ~Third POV~ After Britt passed out on the ground the castle"s keeper walked over to her unconscious
    body and stared at her with an unknown intent in his eyes that couldn"t be seen due to the top half of his face being
    hidden by the hood. Being careful not to wake her up Riccardo picked up the woman and proceeded to carry her back to the
    guest bedroom without encountering Debilitas or the maid, Daniella. Having to trouble carrying Britt or as he knows her,
    Fiona, to the bedroom, he laid her down on the bed, removed her boots, pulled the covers from underneath Britt and covered
    her up. Finishing tending to the unconscious woman, he left the room to go get the wash cloth to help ease the headache
    Britt received. While Britt slept it gave the memories suppressed by Fiona"s trauma to start surfacing, like the memory
    that appeared before it went a little longer, how the car crashed into the pile of logs, the windshield breaking into
    the car from wood, Fiona screaming in fear, and the man in the dark coat and hat peering into the car looking at Fiona.
    ~Britt"s POV~ I jumped awake from the dream/memory that played in my mind, everything felt so real and unknowingly putting
    myself in Fiona"s position I brought my knees to my chest and almost started crying again. "It"s just a dream...no...
    They"re Fiona"s memories, losing her parents in a car crash and now in this nightmare." I spoke to myself as I realized
    that I was in the guest room bed with the covers on. I raised my hand to my forehead to find no washrag. "So much for
    getting that cold washrag." As I stretched out I felt that something was amiss...where the flip did my bag go? Literally
    I scrambled out of bed, my foot getting wrapped up in the blankets thus me falling to the floor and when I finally got
    the covers off my feet I did a complete circle to see that my bag was hanging on the bedpost. I sighed in relief that
    Riccardo or whoever carried me back to the room didn"t leave my bag just laying around, I put my bag back on my body and
    let out another sigh which was of disappointment that I was still in a video game character"s body and in this blasted
    castle. I wanted to go home where everything was normal and sane, my thoughts of going home were interrupted when I heard
    a dog"s cry. "Hewie!" I exclaimed as I ran out the room, not even bothering to get my boots or to look out the window
    to see if he was really where he was at. The cool air actually felt rather nice and was doing wonders for the pounding
    headache I had, after getting down the first flight of stairs I noticed that the door to the broken marionette was opened
    but I couldn"t be bothered with that at the moment. Going down the rest of the stairs the soft ground felt nice on my
    feet even though I was still wearing my socks but more important matters had to be addressed. I ran to the bound white
    German Shepard, pet him a few times to calm him down, the whines he was making just tore my heart to shreds so I went
    over to the tree, managed to undo the wire holding the noose around Hewie"s neck and I got the wire off him. Once the
    wire was off him I grabbed the capture device that was used by dog catchers and with force I broke it in half by slamming
    it on my knee, sure it kinda hurt but it was worth it because it was now broken and can"t be used. Getting back to Hewie,
    I knelt down on the ground till we were almost eye to eye with one another and I couldn"t help but notice a blue sparkle
    in his eyes...wait a sec, Hewie"s eyes were brown... I slightly jumped at the Shepard"s sudden bark but it wasn"t aggressive,
    "Hewie?" When I said his name he started to growl, "I thought Hewie liked being called by his name and what"s with his
    eyes?'' "Sorry, I"ve noticed that your eyes...they"re not well...animal-like." The dog cocked his head in confusion as
    he continued to watch me, "You probably think I"m crazy," I put my face in my hands and ran them over my hair, "God, I
    wish I was at home talking to one of my friends."When I mentioned the fact that I wished I was at home talking to one
    of my friends Hewie barked once again, I looked into his eyes and seen that they were an icy blue, something about them
    didn"t seem right. "Okay, um, just curious, you wouldn"t happen to know anyone that"s not from around here... Do you?"
    Hewie barked again which made me start wondering if this white German Shepard was really Hewie. He brought up his paw
    to show a spiked collar tied around its leg, it looked like something one of my friends would... I went wide-eyed, "Lex?"
    I asked, unsure if that was really who "Hewie" was and to my surprise the dog barked happily. I fell backwards to the
    ground, sat down, totally not believing this was happening. I looked at the dog, who bared it"s teeth as if grinning.
    ~Lex"s POV~ Did this Fiona look-alike call me by my real name? I shout excitely, which came out as barking. This"ll be
    weird, but I guess I have to protect Britt. That"s fine, but since I"m a dog, things may be different for me... "Damn,
    this"ll be weird.'' I had a hard time believing that we were in this kind of situation, it was just way too strange but
    this was how it"s going to be until we"ve reached the very end. Britt"s reaction to realizing that I was me was pretty
    funny, I noticed that she made a minor change to Fiona"s costume which was by just adding a pair of capris on under the
    skirt and the bag. I also noticed that she didn"t have her boots on. "Hey, where are your boots?" I tried asking but like
    before it came out as barks so I had to point to her feet so she"d know what I was talking about. "Oh, I left my boots
    in the room, when I saw you with the wire around your neck I immediately ran out here without even thinking about putting
    the boots back on...Speaking of which I don"t even remember taking them...Eeeeew, Riccardo touched my legs!" I couldn"t
    help but snicker at how Britt was reacting but then again if we were in the opposite positions we were in, I wouldn"t
    be too thrilled about it either. When Britt got up I knew that we were going to be going back to the guest room and waiting
    for us there would be Debbie. "Ready Lex?" Britt asked but then reached into her bag; pulled out something wrapped in
    a paper towel and thanks to my dog sense of smell it smelled like chicken. "Here"s some chicken jerky I found, I figured
    you would want something to eat." "Thanks," I barked as I ate the chicken jerky Britt gave me; it was pretty good and
    definitely filled my stomach for now. Once I was done eating Britt and I starting going up the long flight of stairs and
    by the time we got to the door to the guest bedroom all we had to do was walk in. Wasting no more time we went inside
    the room Britt didn"t seem surprised to see Debbie sitting on the bed, swinging his feet back and forth and when he saw
    Britt he waved to her and I think he was trying to say "hi" to her. I was ready to attack as he went into his flailing
    moment to look intimidating and when I looked to Britt to see if she was okay, her expression was that of confusion or
    wondering what the hell he was doing. She backed up a bit when Debbie got on all fours like a dog and tried to touch Britt
    but that was when I stepped in and started barking at him, he didn"t look remotely happy about me being here and then
    got up and tried to look threatening to me. "Lexi use bite attack!" Britt commanded and I noticed that she pointed towards
    his neck so running towards the mentally challenged man I jumped up and managed to bite into his neck, drawing blood.
    I could tell Debbie didn"t like it from how he was shouted in pain, I let go of him when he looked like he was going to
    slap me and from the moment I let go he ran out of the room holding his neck wound. "Yay Lex! That earned you 1900 experience
    points!" Britt made a Pokémon reference as she kneeled down to me and was petting me. Something was telling me that this
    was only the beginning of our adventure through Belli Castle. (8 and 1/2 pages...That"s how long this chapter is, I hope
    you like it and I really appreaciate the reviews I"m getting even though they"re anon reviews. Nice reviews are nice reviews
    and I hope I continue getting them because I really love them and love this story since I have some ideas in mind. Lex,
    I really hope I got you in character, you may scold me if I didn"t get you in character. Well time to work on the fourth
    chapter. Byebye. Also I know that in the game lavender is a plant but I wasn"t sure how exactly one would be able to use
    it so I put it in it"s liquid form which the scent is much stronger, so that"s how it"s going to be.)'
  - Well some of the offenders need no sexual offender treatment. If you drunkenly expose yourself to some people on the street,
    then after a jail sentence, you probably aren't going to do it again, or if you are the thing to treat is more alcoholism.
    Even among the sex offender as sex offender class, the field is just too broad to speak of effective therapy or prevention.
    Incest of the parent child variety is easily dealt with through removal of the child, and restricting visitation. While
    one or both parties may need therapy, treatment is not always needed, the behavior stops when the access does. Someone
    who downloads child pornography may need very different treatment depending on the nature of the downloading, and the
    nature of the images. Even rapists almost certainly need different types of treatment according to the type of the offense
    (violent vs. date for example). Prevention methods also almost certainly vary based on the offense to be prevented. Anti
    date rape education and outreach probably has only minor effects upon violent rape for example. Though of course certain
    methods can probably have multi offense reductions (increased public and undercover policing on trains would probably
    counter both exposure and groping for example). Still, it is hard to see how one can reduce sexual offenses in broad strokes.
- source_sentence: '"Let"s give him what he wants. I may have only the basic Zero armor for the Liger, but that"s all I need.
    After all, I beat the Berserk Fury with that. Time to show you guys just who"s over confident." Bit nearly shouted. "The
    area within a twelve mile radius is a designated zoid battle ground. Only competitors and personnel have authorized entry.
    The Blitz Team verses the Stratus Team. Area scanned, battle field set up, ready...Fight" the Judge said. The Blitz Team
    advanced slowly, fully alert and causeous, but mostly because the Liger had donned the Panzer armor, slowing it down dramatically.
    Before long, though, there radars found an object racing toward them. A fox type zoid charged the Blitz Teams three worriers.
    It was white, with a slight tinge of blue in it, like a star. It looked similar to the Shadow Fox, but was very different
    from any other fox-type zoid know, like how the Liger Zero looked rather unique in comparison to other Liger"s. The only
    visible armament with a laser Vulcan gun on its back. "Everyone, watch out. One thing I"ve found is that he"s good. Really
    good. Don"t play around." Jamie commanded from his post in the Hover Cargo. "Roger that." they all returned. The Gun Sniper
    stopped in its tracks and opened up with her Gatling rifles and the various smaller guns on her wrist. The agile fox just
    danced around the shells as they grazed the dirt to its sides. The Liger tried to keep up with its movements, the insanely
    heavy Panzer armor slowed his reflexes to much. Before long it was face to face with the Liger and Fox. It leaped over
    the Liger and tackled the Shadow Fox, then bounded off before turning around to fire the back mounted weapon at the Liger
    Zero"s turning body, but the beams just shattered on contact with the dense metal. So, it took off towards the Gun Sniper
    instead, blowing right passed the other two, much to the annoyance of the Liger"s piolet, who had just turned all the
    way around. "How can he have reflexes like that. In a matter of seconds, he knocked our two best down and is closing in
    on the Gun Sniper. That shouldn"t be possible!" Jamie was nearly shouting. Even Dr. Tauros had stopped playing with his
    zoid models to watch the match for a change. However, after a few moments, his gaping jaw closed and curled his lips into
    a smile that meant that he understood what was happening. "Bit, according to the computer, you only have ten minutes until
    you hit critical and have to switch armor. Hurry up." Jamie commanded. "Easy for you to say." Bit returned. "You aren"t
    the one sweating his life away." Bit inhaled a deep breath as the scope for the Hybrid Cannons slid in front of his eye.
    Brad was not having fun. The opposing zoid was always ahead of him, dodging every attack, while Leena just fired madly,
    and to no avail. Brad leaped again, trying to come down on Lance from above, but the enemy just jumped backwards, Brad"s
    claw hitting earth. Brad pulled his paw free and turned to face the enemy fox, and was about to try again when some thing
    caught his eye and he tore off to the left. Lance simply looked around for the cause of this sudden development. Unfortunately,
    he didn"t notice the twin lasers of raw golden energy blazing towards him in time, and only avoided a direct hid, being
    thrown by the intense shockwaves that fallowed. Rolling and tumbling on the earth, Lance contemplated his current situation.
    "Rrr. Starlight, please stay with me. We have a match to win. Don"t freeze on me now!" he pleaded with the mechanical
    fox. It stood up, the damage minor to what it could have been. Mostly scratches and dents in his armor. He looked over
    at the Liger Zero. "What awesome assault power. But I wonder, just how long can he hold out with the abnormal heat that
    that armor must be emitting. How long till he has to..." He was cut of with the answer as the Liger"s armor broke off
    and crashed on the ground. The basic body of the cat creature shook itself, enjoying the new freedom from the insanely
    heavy steel plates. It then bounded off towards the team transport, what ever it was they called it, as the Gun Sniper
    charged out, fully reloaded. "Must be off to change his armor. It"s the only logical explanation." Lance sighed. "This
    could be the chance I need to focus on the other two." He jumped from side to side, trying to avoid Leena"s relentless
    assault. However, her accuracy had improve to a degree, forcing Lance to completely focus on her, giving Brad the lack
    of attention he needed to carefully aim at his prey. The black fox"s back mounted canon opened fire on the white enemy,
    punching into his side, knocking him down to the ground. Leena ran over and promptly started to stomp him with her zoids
    massive foot as Brad charged in, his front paws lighting up the same way they had only three days ago. "Strike Laser Claw!"
    he cried as he jumped into the air, claws stretched forward. "Right. You wish." Lance said out loud. He twisted his controls,
    and the two ion boosters ignited and, throwing him out from under Leena, and away from Brad. "Brad, watch it!" Leena shouted
    over her com as Lance pulled away, tripping her and making her fall to the ground in his place. But it was too late. Brad"s
    strike hit home, just on the wrong person. Leena was out of the battle. "BRAD!! WHAT WAS THAT FOR!" "Leena"s been knocked
    out?!" Bit cried as the white armor locked in place. "Uh, yeah." Jamie exclaimed. Things were definitely not going their
    way. Lance was using them to attack each other, which caused confusion and disunity with one another. "Listen Brad, don"t
    get to close. Try and stay one step ahead of him until Bit can get back." "Alright. But if this doesn"t work Jamie, I"m
    taking your next paycheck." was the reply. Brad opened fire, running along the side of his rival at the same time. But
    the other fox did the same, holding them at a stalemate. Then, an idea began to form within the mercenaries mind. He pulled
    a small trigger in his controls, and thick black smoke poured out, swallowing himself, and billowing out around Lance"s
    zoid. He could tell from the way that Lance was moving that he lacked the same scanning equipment as the Shadow Fox. Be
    moved over to the right in as stealthy a way as possible, but Lance still jerked his zoids head in that direction. Brad
    moved one foot to the left, and Lance opened fire. Brad easily avoided, and dashed towards the edge of the smoke. "Now"s
    my chance.'' he thought to himself as his front paws lit up. He jumped almost strait up and out, startling hie adversary.
    "What"s this?!" Lance screamed inside of his cockpit. Brad had disappeared within a thick shroud of smoke. He turned on
    a heat censor, but nothing showed. "The smoke must be hot enough to hide his heat signature. Well then," he smiled, flipping
    a switch. Everything inside the cockpit was drowned out buy the sudden burst of noise. He had turned his sound receivers
    up to their max. He listened hard, trying to pinpoint Brads location. He heard it faintly. A step off to the left. He
    turned to face it, and maxed out his cameras to get as clear a view as he could, but the cloud was all to thick. Then,
    he heard a louder one just over to the right. His gun blared to life at the new target, but he had no way of knowing weather
    or not he had managed to make contact. Then, his attention was forced up as the Shadow Fox burst out above him, claws
    ready for a Strike Laser Claw. "Good thinking, but it wont work. You"ve left yourself quite vulnerable actually." he grinned
    as he aimed his gun up at the Shadow Fox. "You need some way of quickly changing your position before you can pull off
    a move like that. Without them, you wont survive." he fired, pummeling Brads zoid, who fell off balance. He then charged
    in and used his zoids skull to smash right into Brads, flipping him over his back and crashing him. This victory was shot
    lived though, because only a few seconds after did a green blur race overhead, showering him with bullets. "What the..."
    he was cut off again as a white Liger rammed his left side. "Hi, it"s me." Bit smirked. "Hey Jam...Wild Eagle. How you
    doing?" "Ha ha ha. The Wild Eagle fears no man or pilot. He will crush all opposition." the Raynos pilots alter-ego exclaimed.
    He turned and flew into the back of what remained of the cloud. When he raced out, he was met by several rounds of shells,
    tearing through his armor. Jamie, or more correctly, the Wild Eagle, crashed and skidded to a halt. "Three down, one more."
    Lance muttered. "But the damage I"ve sustained..." he said as he punched a few keys. "My head armor, front legs, and left
    side are all down over thirty percent. I"ll have to end this as quickly I can." Bit watched as Jamie was taken down only
    minutes after entering the fray. But, he had done a good deal of damage to Lance. And, Bit had a plan. "Hey you! I"m challenging
    you to a one charge battle!" "I accept." came a calm, almost frightening reply, but no face to match it with. It really
    was spine tingling. "This will be easy. With the Liger"s Strike Laser Claw, I can end this pretty easily. No sweat.''
    Bit took off at a run, charging the opposing fox-type zoid head-on. "Let"s do this right." The Liger"s front claws burned
    to life. "Strike Laser Claw!" He leapt high into the air, but when he tilted his head down to check his aim, Lance wasn"t
    in the correct spot. He was directly under him. He jumped up and smashed into the Liger Zeros stomach, knocking it off
    balance, and into the ground. Lance charged in, just as Bit did the same. He watched as Bit prepared for the Stike Laser
    Claw, playing directly into his hand. "Thank you, Mister Cloud. That"s exactly what I expected, and wanted you to do.
    Starlight. Let"s do this!" he moved in. He jumped right into Bit, catching the young pilot off guard. He looked down on
    the fallen zoid. "Your pathetic. I thought that the mighty Liger Zero would do better than that. I"m ashamed. And so,
    I"ll end this." He vaulted into the air. Bit looked up in horror. He saw and all to familiar light blaze to life above
    him. Then, a very familiar command was heard. "STRIKE LASER CLAW!" Lance"s attack cut both the Liger"s right legs off,
    freezing his battle command system. "Battle over! Battle over!" the judge decreed, raising his arms. "The winner is, the
    Stratus Team." "WHAT?!" Bit shouted, slamming his fist onto the console. "We lost?! NOOOOO!" "Liger!" Bit screamed inside
    of his zoid as he looked at the screen. "What? A command system freeze. How is that possible? Liger!" The battle had been
    in progress for only fifteen minutes, and already, Bit was out. The Blitz Team was facing off against the Amazoness Team.
    A team composed completely of women, and used a Hellcat, Lightening Saix, and was lead by a Royal Saber Tiger. Even with
    the Jager, the Liger Zero simply refused to perform at its best. Its mobility was barely that of the basic Zero unit,
    and it moved at more of a trot than a run. Bit just couldn"t figure it out. "Leena, Brad, you two have got to win this
    one on your own. Liger"s out, and if we loose, we"ll be booted out of Class S." "Whatever. Really Bit. Your hopeless.
    Ahahahah." Leena laughed as she unloaded just about every ounce of ammunition on the Hellcat. "Points for Leena. Oh yah!"
    Brad, on the other hand, had his hands full. The Liger had originally been despatched to deal with the Saber, while Brad
    could use the Shadow Foxes maneuverability to take down the Saix, while the Liger would deal with the Royal Saber. But
    now that Bit was out of the match, he was stuck trying to fight both off. "Leena, support would be nice. Gloat later!"
    he hailed as he dodged another charge from the Lightening Saix. It landed and skid to a halt, pivoting on its heals. But
    its lack of ability to make such a tight turn in such little time was all Brad needed. He took a firing stance and unleashed
    as many rounds on the ultra fast zoid as he possibly could. When it fell over, and didn"t get back up, Brad took that
    as a system freeze. What happened next was rather unexpected. A shower of missiles and other explosives crashed around
    Brad, rocking him around, and taking him out of the battle. "What happened?!" he inquired of no one in particular. Although
    he could no longer move, his main camera showed him that it was actually Leena who had done that. "LEENA!" he shouted.
    "Yes. I got that Saber Tiger. I DID! HA!" she jubilantly decreed. Brad looked all around and found that lying behind him
    was the crumpled remains of the final enemy zoid. Leena had been attacking it as it tried to creep up on Brad, and therefore,
    caught it off guard. "Battle over! Battle over!" the judge announced. "The winner is, the Blitz Team!" Elsewhere on the
    planet Zi, in a small café where most zoid pilots hung out when not doing matnence or battling. A figure in a black cloak
    laughed. He had been watching the battle, and been taking note of the Blitz Teams style. When he had calmed down, he set
    some money on the counter and walked out of the restaurant. "Not much of a team." he smiled. "Bit!" Leena yelled at the
    blond haired pilot at the Tauros Base. "Get that zoid of yours in gear. We barely won because of you." They were discussing
    the battle of the previous day. "And the Shadow Fox was seriously damaged." Brad put in. "Hey now, wait a second." Bit
    defended. "You can"t blame that on me. Leena did that." "Because you weren"t there to deal with that Saber. So she did
    what needed to be done. So get that Liger into shape." "And soon." Doctor Tauros put in. "We just got a call from the
    battle commission. The next battle has been set. And I think it just might be what we need to stimulate the Liger Zero."
    "What do you mean Doc?" Bit asked. "It"s against Lance Celeric." Jamie explained. "And this will help Liger how?" "Don"t
    you get it Bit?" Leena nearly shrieked. "Liger"s upset because we were beat by one zoid. And it was Lance who was in that
    zoid." she exclaimed. "Your right. It"s time for revenge. After three months of failed performance by me and the Liger,
    we can go up against the guy that did this to us. Lets do it." Bit said, jumping up. "Jamie, we"re going to need a strategy.
    Get a move on it! Go!" "Hey partner." Bit began as he walked into the hanger where his zoid stood tall. "I know your still
    pretty upset about what happened against Lance, but we need you to wake up. We"re up against him again tomorrow, and need
    you at your best. Alright." he comforted. The zoid stood up tall and growled in a response of pride and anticipation.
    "The area within a twelve mile radius is a designated Zoid Battle Ground." the judge began. "Only competitors and personnel
    have authorized entry. Area scanned. Battle field set up. The Blitz Team verses the Stratus Team. Battle mode 0963. Ready;
    Fight!" he commanded. Bit rushed out in the Schneider armor, only find that Lance was using similar components. His armor
    was green with five long laser blades visible to the naked eye. No long range weapon of any kind was to be seen. "Buster
    Slash!" he commanded, the five rushing blades snapping to attention, glowing with a bright blue. Lance seemed to copy
    this, only he was equipped with just three rushers. The two zoids locked horns (figuratively), struggling to get there
    own weapon past the others. "Bit!" Leena shouted in a warning tone. "Watch out!" She opened every last compartment that
    her zoid possessed, as multiple targeting squares merged together on Lance. "WEASEL UNIT TOTAL ASSAULT!" she cried, emptying
    herself of her ammunition. Lance looked up to see the onslaught that the Gun Sniper had unleashed. "I don"t think so."
    he muttered, a smile crossing his face. He twisted his zoids head, throwing the Liger Zero Schneider to the side slightly,
    and running off in the opposite direction. "Time for the Gun Sniper." he said, closing in on the defenseless zoid as it
    tried to escape in vain. The two side rushing blades retracted half way, so as to point out to the sides, and expose the
    razor sharp edges. He cut through the right leg, just below the knee, allowing gravity to pull on the overly armed zoid,
    crushing its entire right side in the proses. Then, he spotted the Raynos flying in overhead. He made a wide turn, and
    running up the back of the falling Gun Sniper, he retracted all three lancets. As he leaped over the pile of metal and
    guns, several boosters on his zoids back and legs flared to life. He rased up, and just as he passed under the flying
    zoid, the center razor swung forward, slashing Jamie"s zoid"s belly and wing, bringing it down. However, the downside
    to this maneuver was that Lance was incapable of landing properly, and tumbled to the ground. "Well, that could have gone
    better." he sighed. He slowly stood up, finding the Shadow Fox over to the left, gun poised and ready. "That thing has
    a CAS as well?" Tauros pondered. "That can"t be good. But that"s also one of the coolest things I"ve ever seen." he squeaked,
    picking up a model of the Liger Zero and a Blade Liger. "Grr," he said, commandeering for his little toys and the battle
    he was imitating. Bit looked up to find both Leena and Jamie down, but that Brad was satisfactorily pummeling Lance. He
    stood up and bolted over to aid his teammate. Brad was doing fairly well. He had managed to seriously damage Lances armor,
    and was pushing the opposing fox zoid to its limit. "Maybe I can get a decent bonus for this. Not to mention all the points
    I"ll get." he snickered. Just then, the green fox leaped over the attack in attempt to tackle Brad and the Shadow Fox,
    who just sprung back as Lance landed. He opened fire again, but this time, Lance was ready, jumping back and forth in
    a zig-zag, closing in on Brad, who took the initiative, and jumped forward with a Strike Laser Claw ready. His paws met
    with the honed edge of the blade, a silent struggle taking place as they pushed at each other. The built up they had created
    exploded, throwing them away from each other. They both rolled and bounced off the ground. Lance was amazed at how quickly
    Brad had reacted to his counter. The rumors of Brad"s skills were not lies. Lance zig-zagged inwards, blades ready for
    an attack. He met Brad"s Strike Laser Claw head on, their attacks equal to one another"s. They were pushed away by the
    intense growth of power. Lance struggled to his feet and diverted his eyes to the right, finding the Liger Zero charging
    in. He turned to face off with his true rival, and lunged at the oncoming zoid. They met and struggled for a second, then
    broke free and passed. Bit landed with all blades in their safety position. Lance looked to his left side to see a deep
    line cut into his side that went through the armor and grazed the main body. "Bit just copied my own attack.'' he gasped.
    "The very same one that I used on the Raynos, only with a slight twist. But how. Could he be...'' he was cut off by something
    rather strange. The Liger was extending its forward blades, and stretching the two longer ones out to the sides. They
    burned with an intensity like never before. Then, very peculiarly, they all retracted. It came running in with all blades
    down. Then, the swords snapped out, the two side ones lancing forward. Pink lightening sparked between the seven swords.
    A barrier of surplus energy formed, then intensified into an azure field of raw power. It was a attack like none other.
    Bit looked back at Lance after their little exchange. He needed to think of a way to take him down. "Any suggestions Liger?"
    he asked of the zoid. In response, a screen flashed in front of him. It depicted the Schneider with all seven blades in
    position for an attack. The words "Seven Blade Attack" were below it. "Are you sure you can do it Liger. Last time we
    did this, it nearly cost us the Schneider." Bit questioned his zoid. It simply growled in compliance. "If you say so."
    His zoid made its preparations for the attack. It primed the blades, charged energy, and then stormed forward. Only Lance
    was doing something of a similar nature. He had his three rushing blades forward, and two more out to the side. However,
    Bit feared it not. He stayed focused and prepared. They closed in on one another. "Seven Blade Attack!" "Star Shower Slash!"
    Lance replyed. They connected, crossed, and landed in identical crouches. Bit folded all his weapons back, turned, and
    smiled at Lance, who collapsed to the ground. "Battle over. Battle over!" the judge decreed, raising his arms. "The winner
    is, the Blitz Team." "We won." Bit exclaimed. When he looked back to see if he should help Lance, he could see the other
    pilots amphibius shaped carrier approaching, and a cloaked figure walking up to it. He pulled out a control switch and
    a hanger door popped open. Mechanical arms reached out and grabbed the Starlight Schneider, hauling it into the compartment.
    Bit tried to get a close up view, but the hood on the cloak was up, covering his face. "Good bye Lance. See you around."
    he solemnly said. So, what did everyone think. I"m gonna take a break from this one to work on a couple of other fics.
    Please read and review.'
