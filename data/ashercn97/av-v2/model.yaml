  - TIME Turner PERSON were showing CARDINAL films in honor of actor writer PERSON ( whose birthday is DATE ) . Cronym has
    only been dead now for DATE , but he was an impressive character actor in comedy and in drama . I was lucky DATE to see
    the FAC production of THE PETITION a CARDINAL person play Cronym played with his wife and partner PERSON , and I can vouch
    he was a crisp and fine a performer on stage as he was in his films . Captain PERSON is CARDINAL of the most detestable
    villains in motion pictures , turning his prison into a private torture chamber , with the apparent acquiescence of his
    guards ( note PERSON , his personal guard and assistant ) . He has his way in the prison due to the weakness of the burned
    out warden PERSON and the bullying of a political hack from the Governor's office ( PERSON ) who is impressed by PERSON's
    claims of the need for discipline . But as the wise but alcoholic doctor ( PERSON ) points out , while discipline has
    a place the GPE has never given an order to PERSON telling him to crucify the prisoners . It's a rather pitiful prison
    system we see here , and sad to say it remains a problem . The warden keeps bemoaning his failure to come to grips with
    rehabilitation and punishment , but he has no real suggestions in him , and he is really more upset about what he will
    do when he is forced out for the rest of his life . The doctor tries to give a degree of humanity to the prisoners lives
    ( interestingly enough , like the alcoholic doctor played by PERSON in MUTINY ON THE BOUNTY ) , but he is aware that he
    has no place to work outside the prison he is in either . PERSON , in fact , taunts him as a surgical butcher , suggesting
    something he did went terribly wrong . PERSON and his guards seem to fall into dominating and assaulting the prisoners
    at the drop of a hat . When PERSON is walked into accidentally by Cronym in the lunchroom , PERSON starts clubbing him
    until even Cronym points out it was his own fault not PERSON's . Only at CARDINAL late point in the film , when Cronym
    is beating up PERSON in his locked office , do we see some of the guards react - but none intervene . The film ( well
    directed by noir specialist PERSON ) follows DATE of ORG's system before it collapses . There have been increasing numbers
    of prisoners dying because Cronym has purposely put them into unsanitary and deadly work , especially in the main drains
    of the prison . CARDINAL prisoner , PERSON , has refused to crack so far ( he has been put in solitary due to a " shiv
    " being planted on him , with the connivance of Cronym and Teal ) . He returns to his cell and the prisoner who was the
    collaborator on this is killed later on in a stunningly good scene in the prison workshop . ORG is determined to escape
    and learns from a dying prisoner that there is a route through the drain . It has to be used in a timed escape that requires
    a riot in the prison yard and the use of an armed truck . To coordinate PERSON need the help of the prison trustee ( PERSON
    ) , but the latter is up for parole . ORG plans the escape with his cell mates ( PERSON in his ORDINAL film , PERSON ,
    PERSON , PERSON , and PERSON ) . In the course of their discussions they each tell stories about their lives , showing
    that the economic forces of the world frequently force them into crime ( GPE embezzles to help him and his wife ; PERSON
    takes the blame for a murder his wife - PERSON - committed to help him when he was being arrested for giving food to the
    NORP in the war ; PERSON , a colorful confidence man , is robbed with his own gun of the proceeds of a swindle and a visit
    to the gambling tables by an attractive woman who also steals his car ; ORG has been keeping his crippled , cancer ridden
    wife ( PERSON ) from knowing he is a criminal and prisoner ) . CARDINAL gets a feeling that these men did not have to
    become criminals but were forced into it . This is the weakness of the film , forgetting how many criminals in prison
    deserve to be in prison for their actions . As was pointed out in another review on this thread , there are sexual criminals
    who we never see , and the ones sentenced to death ( the film is set in DATE ) are never even mentioned . Nor are problems
    among male or female prisoners in their own prisons dealing with sexual predators among their fellow prisoners ( and the
    guards sometimes ) . However , one can safely say that no prisoner deserves a set of guards controlled by an ego-maniacal
    sadist like ORG's PERSON . The film was shot shortly after EVENT , so it is notable that PERSON likes to play NORP music
    ( so long established as music for NORP ) in his office . In fact , when he beats PERSON in his office he has the ORG
    music playing loudly to drown PERSON's screams ( oddly enough the music is not from the " RING " Cycle , but from TANNHAUSER
    , and it is the " WORK_OF_ART " music which was supposed to be sensual ! ) . Still the film shows the cruel , power-mad
    Captain as an unforgettable villain . He is as aware at the end of ORG's plans as he can be - but he is also aware of
    the warning PERSON gives him - that power mad people end up being destroyed by their power . In his last few moments (
    as one sees in the film ) Captain PERSON does find out how true this comment is .
  - This is a good point and I partially agree. It s true the people who live there are really the only ones who can make
    their lives better we can only help them. That being said, I think we could have controlled the corruption. I also agree
    with the other post that it would have been better had we left Bin Ladin in Tora Bora. There are probably better ways
    to ensure our security
- source_sentence: 'Sora frowned, "Then what do you suggest? I"m trying to do you a solid here!" She crossed her arms. Despite
    how angry she was pretending to be, she was grateful that she did not have to go out in the rain. Basil shrugged, "I don"t
    know, I just usually sleep these things out for better or wetter." he said giving a half smirk at the play on words. "What
    do you do when you"re caught in the rain?" he asked figuring he might as well keep the conversation going. Sora stared
    out at the rain, her back to Basil for the time being. She was trusting him not to stab her for the moment, but then she
    turned just enough so that she could see him out of the corner of her eye. Sora smirked at his joke, it was actually kind
    of funny. She shrugged, "I try to avoid being caught in the rain. But otherwise I usually hide under a tree, just as we
    are now. But I"m not as affected by the cold as you." "Yeah I suppose you can see it coming, flying in the sky as you
    do." He lay his head on his bag, "Why don"t you sit down there"s no reason to stand by the edge and get wet." he muttered
    looking at the huge tree that use to be standing tall and mighty. Sora shrugged, "Not always, but on occasion I do spot
    it." She shivered, cold from the rain. Sora turned back to face him completely, shaking her hair out one last time. She
    hunkered down next to Basil, wishing for the rain to stop. Sora sighed, pulling her knees up to her chest. Did guys sit
    like this? She cocked her head, thinking about it. Sora decided they did too. "What is it?" Basil noticed the occasional
    head action with a thinking face. He was trying very hard not to hug the warmer boy next to him. He was suddenly jealous
    of warm-blooded people, he wasn"t quite sure why. Sora"s eyes widened with surprise, "What"s what" She was oblivious of
    the fact that she was an open book. Sora was suspicious of the expression on Basil"s face, but couldn"t quite read it.
    "What"s with you making all the strange faces over there, I mean really can"t you deal with your supposed sworn enemy
    for a little rainstorm or what?" Sora"s ears reddened, "I"m not making any strange faces!" She crossed her arms defensively.
    Sora sighed, "And here I was thinking you weren"t actually trying to kill me. Guess I was mistaken." Sora glared at him
    out of the corner of her eyes. Basil rolled his eyes Sora was the one that was always making him the enemy. He yawned
    still drowsy and slowly closed his eyes. It didn"t take long for him to fall into a semi conscious sleep. He started to
    fall over on Sora"s shoulder. Sora jumped slightly when Basil landed on her shoulder. She poked his head, he seemed to
    be asleep. Sora whispered, "Are you all right there?" She didn"t want to wake him if he was asleep, but she wanted to
    make sure he was sleeping not passing out.. He was certainly cold enough to be the unconscious one. Basil just mumbled
    something incoherent. He could hear the question he just couldn"t put it through his mind to move his mouth at all. He
    instead continued to sleep giving up the useless effort of trying to talk while he was already half asleep. Sora sighed,
    of course he was asleep. She moved his head to her lap, his was going to hurt himself sleeping on her shoulder. Basil
    was freezing, hopefully the boy would warm up and wake up. Sora leaned her head against the tree trunk, wondering if she
    could fall asleep too. Basil muttered some more, it was odd to know you were dreaming but were unable to do anything about
    it. He desperately wanted to get up and go find the nearest ray of sun. Something his mind told him that was impractical
    so he slowly drifted back to sleep for awhile before he was startled awake by rolling over and falling off of whatever
    he had been sleeping on. Sora yelped, jolted from her daze. She grumbled, cracking her neck, "Finally you"re awake, sleeping
    beauty. Pray tell, did you sleep well?" Sora crossed her arms. Basil looked up somewhat sheepishly, "Yeah." he muttered
    he got up quickly and stretched which felt good. To his delight it was only drizzling now which wasn"t as bad as a rainstorm.
    Sora stood up as well, looking at the drizzle. It was much better and not as painful looking as before. She stretched
    as well, and Basil had had the right idea, it felt good after sitting still so long. Sora asked, looking around for potential
    threats, "So, are we going to get moving or shall we wait out the drizzle. Personally, I"d want to get out of here before
    it got worse again." Sora shrugged noncommittally at the end, just to say she did not really care. "Alright fine lets
    go." Basil picked up his bag checking inside to make sure his china was still okay. Sora sighed, stepping out in the rain.
    Then she mentally smacked herself. Sora queried, "Ah, where"re we going Basil? Just in direction A?" Basil looked down
    at him, "I was under the impression that you were leading us." he said after all it was his suggestion and Basil had already
    told him he was lost. Sora cleared her throat, "Right then, I chose this way." She pointed in a direction, walking that
    way. Hopefully, this would get them somewhere. Otherwise they would be lost in the woods forever. "Alright, lead on."
    Basil was surprised Sora hadn"t made a withering remark about him following, or any indication that he wanted him to go
    away. Sora lead Basil on, really hoping with all her might that she did not lead them to a band of slave hunters or something
    awful like that. Basil would hold it over her forever. There was a noise somewhere nearby. This resulted in Sora jumping
    about halfway to the moon before composing herself. She reached for her dagger, waiting to see if it was a person or just
    a woodland creature. Basil just watched their surroundings trying to pin it down. He figured it was just a deer or some
    other woodland creature. He continued on passing Sora, still calm as ever he wasn"t going to bed the weak one now that
    is wasn"t raining. A/N: Hooray another chapter for your...pleasure. Or something to that end. We still don"t own +anima,
    but we do own anyone who appears in this story. Eon: I don"t know how to play manacle . fSora followed after Basil now,
    jumpy after the noise. She ran a hand through her hair; it must have been nothing, just her overactive paranoid mind at
    work. Then there were several more noises. Sora whispered, "I"m beginning to think it"s not a woodland creature." Then
    a man popped out of the bushes, how bizarre. Normally, Sora might have laughed, but he was holding a sword. She reached
    for a dagger, she knew he was hostile, but was he just defending himself, or was he trouble? Still, Sora wanted to be
    prepared for the worst. Basil tilted his head usually you didn"t try to pop out of bushes in such a position unless you
    were looking for a fight or something worse. While Sora was distracted he looked at the trees for archers. He suddenly
    pushed Sora down on the ground. Sora made a sort of noise between a yell and a growl. She asked, knowing Basil was not
    a complete fool, "What, archers or something?" Sora"s face was to the ground, so now she was relying completely on her
    ears to tell her what was going on. Basil nodded silently, looking at an arrow that had bounced off the scales on his
    arm. "What do you want?" he asked looking at a man and keeping an eye on the archers. He wasn"t sure why they attracted
    so many situations like this. You would think they could just live peacefully and put away their differences. The man
    replied, "To go through these woods you must pay a tax, but I see you"re +anima. That means your bodies are worth far
    more than the tax." Sora sighed; this was just not their day. Rain and now slave hunters. She would hear about this one
    later. Sora tried to lift her head, but Basil still had her to the ground. The archers seemed to have stopped with the
    arrows since they were useless on Basil"s scales. "Is it your daily bush tax or? I mean I really don"t think the bush
    looks that valuable enough to tax on." Basil retorted why was everyone always after +anima? He was getting tired of the
    same speech of slavery over and over. The man yelped, "Not on the bush stupid child! To pass through the forest. The bush
    was just my ingenious hiding place." Sora muttered to the dirt, "If you have to say it"s ingenious then it"s not true."
    Two men silently crept towards the pair. They tiptoed behind Basil, although neither could see them. The men sprang, hoping
    to catch the two kids off guard. "Anyways you"re only half correct my stupid man. This boy!" Basil rammed Sora"s head
    into the ground with his foot so he couldn"t speak. "Is not a +anima, he is obviously a human. A +anima would have much
    better instincts, might even be a bit taller. So here." he fished in his pockets and tossed a sack of coins in front of
    the man. "Since it seems I have no choice I"ll come with you. However I see no point in bringing this weak human boy along
    too." he kept Sora"s head rammed into the ground so he couldn"t speak. Sora made a noise of protest, but her mouth was
    forced into the dirt. She tried to wriggle away from the force of his foot, but then saw that he was actually doing her
    a favor. Sora stopped squirming and did her best just to think human. Weak little human. The man pondered this, picking
    up the purse. Then an idea occurred to him. He picked up the purse, tossing it to a minion; the minion stashed it away
    in a pocket. Then the men hauled Basil off of Sora and Sora was hauled off the ground. Sora would have made a snarky comment,
    but she was coughing dirt out of her mouth. A/N: My apologies, Eonalis" comment was deleted here and I felt the need to
    tell the world in order to explain the random topic change. Sora muttered, "I don"t think I"m going on a trip." The man
    explained, "Human slaves sell too, and now I have your money and the money I will have from selling that one." Sora growled,
    but chose to keep her mouth shut. "No, you have twenty rocks." Basil answered still smirking. "Have you ever heard of
    manacle?" he asked the men still showing his wonderful sharp teeth off. The man"s smile fell off his face, trying to figure
    out what the child was talking about. His face furrowed, "Is that not a children"s game?" The men released the two kids,
    wondering if that was a threat of sorts. The teeth worried them and they wanted to get further away from them. "It"s a
    game of strategy and light and dark actually." Basil said trying his best to sound cryptic. "I don"t suppose a man like
    you could play and win it." Sora looked at Basil out of the corner of her eyes, trying to figure out what he was getting
    at. The man frowned, "I certainly think I could. But this is not the time; we need to get a move on." "I"m just saying
    I don"t think your smart enough to play it anyways, so you might as well give me back the pieces." Basil said, obviously
    the man hadn"t gotten what he meant. He had to say it blunter; he had a plan of course. The man huffed, his pride hurt,
    "Hey! I could definitely beat you. In fact, I challenge you to a game!" Sora suddenly followed the plan, boy that man
    was slow. But Basil was wily; another reason to worry that Basil would kill her. Basil made a face as if he was surprised,
    "Oh I suppose so, but what"re you going to put on stake? I mean I have some money to bet, but you don"t seem to have very
    successful at your bush tax scam over here. Do you even have anything of value?" Sora smirked, keeping watch of the minions.
    The man crossed his arms, looking aggravated. He frowned, he really did not have any money, and Basil was actually correct,
    much to his chagrin. The man replied, "Well, I suppose we can play for your freedom." Sora interjected, "Both of us?"
    The man sighed, "Yes." "Alright let"s play." Basil pulled a small wooden game board out of his bag and set it on a tree
    stump then sat down cross-legged in front of the man. "Since I"m so generous I"ll let you go first." Sora wondered how
    Basil fit all that stuff in his bag. The man sat down too, crossing his arms as if to prove he was too mature for this
    game. Sora sat down next to Basil, not wanting to be too far off. The man slid his piece along. Basil bumped a couple
    of his black pieces on the board slowly making it toward the end of the board. It seemed he had the luck of the dice.
    He waited for the man"s next move with great anticipation. Sora frowned, this game made no sense whatsoever. The man frowned
    as well, his expression looking like Sora"s own. He slid along his black piece, bumping one of Basil"s pieces. The man
    looked up for their approvals or smirks of victory. Basil moved his piece over again bumping the man"s piece back to where
    it was he brought another piece behind it so he couldn"t bump it back anymore. The man slid a piece, whacking two of Basil"s
    pieces. He really had no idea how this game worked and was just bluffing his way through. Basil simply moved his opponents
    pieces off the board, "You lose." he said simply. The man yelped, "You cheated!" He stood up, crossing his arms. The man
    was mad that he lost, although he had no idea how he lost. Sora stood up, "Then I guess it"s time to go. Pick up your
    game." The man snapped his fingers, "Not a chance." Sora frowned; all the slave traders were the same, always backing
    out of their deals. A man lunged at her, but she ducked away from him. Basil shrugged he had figured something like this
    would happen, but he had to give it a chance. He picked up the pieces and his board. Avoiding a punch to the head and
    put them in his bag. He decided to punch the dishonest man see what happens and the likes, that and he had cheated. The
    man fell back into a tree, much to Sora"s amusement. The nimble child ducked out of the way of several men, debating just
    flying off, and leaving Basil to his own devices. She decided against it, it was not the best plan. The minions paused,
    seeing that their boss had been punched. They looked to each other, trying to figure out what to do with themselves. One
    decided it would be wise to catch the perpetrators. He nodded and all the men set about to capturing the kids again. Sora
    sighed, these people. She asked Basil, "Split up? Or run at random?" "Meh I guess it really doesn"t matter either way
    were running away." he kicked one guy in the gut, and started a quick jog still looking behind him. He wasn"t exactly
    sure what Sora was doing behind him. Sora sprinted after him, before suddenly finding herself on the ground. On of the
    men Basil had kicked had her ankle. Sora kicked him in the face, twisting away from a second man. How many men did it
    take to catch two kids? Honestly, they were pretty sad. Then, by an unfortunate twist of fate, they all ganged up on Sora,
    sending three more men after Basil. Sora sighed; her plan of running at random was just not going so well. Basil was caught
    off guard as he was tackled by three men. He growled this was hardly the predicament he wanted to be in, especially after
    it had been raining. He really didn"t fancy killing anyone either so he let them drag him off. That didn"t stop him from
    dragging his feet in the dark and making it more difficult for them. Sora was hauled off the ground; she could see Basil
    being dragged off as well. He certainly was not at his best after the rain, and he had been ambushed by three men. Sora
    herself had no excuse, except she had not had the chance to use her dagger. She was better at attacking from a distance
    and dodging strikes or arrows. The men dragged the two kids into a wagon that they had nearby. Sora wondered how they
    had missed that before, it had been behind some trees as well as being colored the same green as the leaves. Sora sighed,
    but settled for coming up with a better plan later. Basil was banged forcefully into the wagon. Successfully getting more
    bruises on his body than he cared to have. He was then blindfolded and chained down brutally. He wasn"t sure if Sora had
    escaped the same fate. He didn"t know where his bag was either. His poor tea pot, he moaned. "Stupid I should have brought
    it with me." he sulked. It wasn"t long before the cart started on its way. "Hello any one else here?" Sora was shoved
    around as well, although since she was tiny, they did not shove as hard. Still, she was underweight and rammed her head
    on something hard. Sora mad an aggravated noise as she was blindfolded as well and her arms were chained up. She muttered,
    "Yeah, if you chain me up then what"s the point in blindfolding me?" The man kicked her side. Sora growled, but resigned
    to silence for fear of receiving another bruise on her side. Then she heard Basil"s request. Sora replied, "I"m here,
    I don"t know if there"s anyone else though." "Lucky me." Basil sighed, "I don"t suppose you got my saddle bag when we
    were fleeing?" he scooted over, using his feet to navigate his way over to Sora. He wondered where they were going, but
    was pretty sure it was a slave market. You think they would run into a new situation like a government testing facility
    or something. He sighed, the poor teapot, which was all he was really mad over though. Sora huffed, "Are you implying
    something?" She reached to punch his arm, but remembered her hands were tied. Sora sighed, that was going to be really
    annoying before this trip was over. Sora tilted her head, thinking. She nodded, "I think I had it at some point, but then
    when the men tackled me." Sora shrugged, a useless gesture when they both could not see, still it was a force of habit.
    She wished that she could see everything; it was driving her out of her mind not to be able to see. Sora relied on her
    sight and right now there could be an assassin the room with them and she would have no clue. Speaking of which, where
    were they going? No doubt a slave market, but she liked to keep an open mind about the matter. Not that there was an amazing
    alternative. "Ugh it"s probably broken then." Basil muttered a particularly large bump threw him into Sora. He wasn"t
    sure why he helped out Sora so much if all they were going to do was get captured or some other tragedy. He hissed indignantly
    this was a little embarrassing none to say. Sora made a noise of surprise when Basil bumped into her, but it was not quite
    a shriek. She moved over a slight to compensate for the space he was taking up. Sora sighed, "Sorry. I"ll spot you a new
    one." She knew that that teacup was his life, and felt bad for losing it, even though it was not exactly her fault. Sora
    was more than irritated with being caught again; it was like the two of them were the ultimate trouble magnet, no matter
    where they went disaster followed. "Ugh I hate when you"re blind on journeys like this you never know how far you have
    to travel." Basil said with a bored tone of voice, granted he had gone on a lot of journeys like this only to start an
    uprising of slaves in the market. He was pretty hopeful that this next experience would go something like that. Sora nodded,
    before realizing he couldn"t see her. She added, "I agree, it"s freaking me out." Sora leaned her back against the wall,
    sighing. She was already dreaming up a plan for escape, but she could not exactly think of one without knowing where they
    were going. Sora queried, "Where do you think we"re headed?" "Some rotten place or another, I haven"t really noticed a
    difference whenever I"ve been forcefully kidnapped." Basil remarked somewhat dryly, "You don"t need to worry about me
    trying to kill you when you have all these thugs around." He squirmed a bit, wishing he had something to past time of
    their journey hopefully it was quick. Sora smirked, "Ah, I actually wasn"t thinking you were going to kill me. You"re
    hands are chained as well as mine, I think I would hear you soon enough." Then again, she was in fact chained up as well,
    so there was not much she could do to defend herself. Sora sighed; the unknowns were too many and made her really nervous.
    She jittered slightly, worrying about just about everything. Namely, being tied up, how she could not defend herself.
    "Well I"m glad that"s decided," he said suddenly the wagon halted to a stop, throwing him face down on the floor. Another
    reason why hands were so useful. "Well I guess this is our destination." Sora shrugged, "Hm." She wanted to say something,
    but really had nothing more to say than that. Sora managed to keep herself upright, although now she was tensed and ready
    to go. There were footprints outside, some were the heavy footprints of thugs, while others were lighter, but Sora could
    not place exactly what type of people they were. There were hands around Sora"s face, and then here blindfold was pulled
    off. Her eyes were unfocused, from paying close mind to the sounds. Sora blinked, trying to clear her vision, getting
    a view on the situation. There were thugs; the one who pulled off the blindfold was not a thug though. He was some gangly
    scholarly looking person and Sora did not welcome this. Sora looked to Basil, he was still blindfolded. Basil was slowly
    dragged off the truck. He flipped his head back and forth surprised. He dragged his feet into the dirt just incase they
    were going to take him somewhere. He was determined to give them the worst time possible since they had broken his china
    set, or left it on the ground somewhere.'
  sentences:
  - 'Generally. The only one not happy with the reorganizations was Will. He had taken the outcome of his last discussion
    with Robin quite badly, and would rather die than admit that her ideas had brought forth a big improvement of their well-being.
    And now his friends had apparently deserted him in favor of the girl, all he could do was keep a low profile and sulk.
    He grudgingly did the tasks appointed to him, but only because otherwise he would have both Littles glaring him to death.
    He avoided a confrontation though, waiting for the tiniest slip-up on Robin"s part. Robin, on the other hand, was completely
    oblivious to Will"s sentiments. She had been working non-stop on improving camp-life even more, while also supervising
    the fighting-classes and listening to people"s suggestions and problems. It turned out that of all people, she was the
    most approachable for that sort of thing. Ever since that one afternoon, now commonly referred to as the "Turnaround",
    Robin was considered the unofficial leader of the community, along with John Little. Wulf had been approached as well
    but was very reluctant, and eventually settled for being an advisor when asked. He ended up doing a lot of work in the
    background, and Robin and John didn"t know what they would ever do without him. As autumn wore on, the changes in the
    Forest area became noticeable. An increasing number of patrols returned to the city to report that the villages were strangely
    deserted. At first, the Sheriff didn"t pay any attention to it. It was only when it was time to collect the monthly taxes,
    that he became concerned: he needed that money to bribe the barons. When the fourth patrol returned without any money
    with them, George exploded. "What do you mean: "No one there"?! Those bloody peasants can"t just have vanished, now can
    they?!'' The poor soldier was positively trembling with fear, knowing what happened to men who infuriated the Sheriff.
    "N-no, Milord... b-but th-'' "Then where have they gone, you insignificant fool, where?!'' The poor man took a deep breath,
    and mustered all his courage before stammering: "Th-there"s this rumour, you see, about the Forest,'' taking George"s
    silence as encouragement, he continued, "they say that groups of people have entered it, and haven"t returned. Entire
    villages going in, and none ever coming back.'' The Sheriff had got his temper back under control, and asked in a dangerously
    calm voice: "And do you also know why?'' The soldier seemed to shrink under the eye of his commander, and could only whisper.
    "Th-they say it"s because of the ghosts... and the hooded woman.'' George raised his eyebrows. "The hooded woman?'' He
    furiously hoped the man wouldn"t say the answer he dreaded. He hoped in vain. "Y-yes, Milord. The woman who you wanted
    captured almost two months ago. They say she"s luring everyone in there, seeking her revenge... No one knows who she is.''
    The soldier shuddered at the thought. George tried to keep his breathing leveled, while he sought a way out of this ridiculous
    mess. He hadn"t failed to notice the man"s superstitious fear of the Locksley wench. He sorted his thoughts, and finally
    answered the still trembling man before him. "First of all, we do know her name, and there is nothing about her that you
    should be afraid of, you superstitious fool. She is Robin of Locksley, who failed to pay her debts and thus has become
    an outlaw. So she is still in the Forest, you say? And gathering allies? Well, we"ll see who has the last laugh...'' he
    trailed of, but continued with renewed force, directing his speech anew to the soldier. "Captain, I want you to issue
    a search for this woman. Take a patrol and enter the Forest, do everything you must to find her, but bring her to me alive.
    Is that understood?'' "Yes, Milord! At once!'' The soldier jumped into action, relieved that he was at least going to
    live out this day. When he had left, George had begun pacing. So she thought she was smart, didn"t she? Hiding in a Forest
    believed to be haunted, gathering men... this could actually prove to be quite fun, he thought. But the problem of money
    still remained. With each passing day the barons were getting more and more restless because of the imminent return of
    the Lionheart, and money was needed more than ever to appease their worries. And there was also a second reason for haste;
    Prince John had also started to entertain the thought of becoming king. Even though George had a head start on gaining
    the barons" favour opposed to the weak-minded Prince, said Prince"s title was practically perfect for becoming king. Luckily
    for the Sheriff, the Prince was even more cruel, perverted and disturbed than he was, so he was even less popular with
    the people than the Sheriff - if that were possible. So, though not that urgent yet, those issues were enough to make
    George act fast. Having finally decided what to do, he walked to the heavy doors of his main hall, and yelled through
    them up the stairs: "Guy!! Get down here!'' Not long after, his solemn looking cousin appeared in the doorway. "You called,
    cousin?'' "Yes", said George, who had returned to his desk, "I need you to do something for me.'' Grateful that he hadn"t
    lost his life during his audience with the Sheriff, the captain acted out his given orders immediately. He would not waste
    a chance at getting on the Sheriff"s good side. He started with having posters hung up in Nottingham and the surrounding
    towns, portraying a woman wearing a hooded cloak - who didn"t even look remotely like Robin - and written underneath it:
    "Robin Hood. Whoever can bring her to the Sheriff alive shall receive 100 gold pieces." The captain apparently hadn"t
    remembered Robin"s real last name, and so had named her after her appearance. Since no one questioned it, the name soon
    took flight and was heard often in market conversations. Secondly, the captain assembled a patrol for an excursion into
    a certain Forest. It was hard to find any volunteers for this, as none of the soldiers were very keen on entering Sherwood.
    Every last one of them believed in the ghost stories. Eventually, the captain ended up on using the ever-successful technique
    of "force-volunteering", and managed to gather a grand total of eight men. He thought this to be enough to catch one girl.
    Quite satisfied with himself, he informed the Sheriff that he was leaving on the search for Robin Hood. The patrol rode
    out of Nottingham at a swift pace, and reached the Forest by midday. The soldiers had been laughing and joking loudly
    during the journey, but when they came to the Forest"s border, not a sound was being made and none of them were smiling.
    Even the captain, so eager to please the Sheriff, hesitated at the Forest"s forbidding atmosphere. They stood there a
    while, until the captain cleared his throat. "Well men, in we go. Just keep your eyes open, and be alert at all times.
    Maybe there aren"t any ghosts, but there are other things in there.'' Ignoring the remarks the ghost-believers behind
    him made, he spurred on his horse to follow the main road leading into the Forest. He hoped he would not have to leave
    it. The small group had penetrated the Forest quite deep, when finally they heard a noise. It was immediately followed
    by a flying arrow, aimed to land just in front of the captain"s horse"s feet. It reared, and the man was barely able to
    keep his balance. Within the second, his men had pulled out their crossbows and were looking around for the offending
    archer. Then, the far end of a bow descended in front of the captain"s face, and started pulling at the badge on his vest
    proclaiming his rank. Startled, he tried to grab bow, but was only rewarded with a light tap on the nose and rich laugh
    coming from above him. Only then did he and his men have the wit to look above rather than around themselves. Sitting
    on the branch over the captain"s head was a young person, with red hair just past the shoulders and dressed in greens
    and browns. On their face was a huge grin. The captain made his horse retreat a bit to get himself out of his vulnerable
    position and to get a better view of his attacker. He could now see it was a woman sitting on the branch, and he realized
    he must be looking at none other than Robin Hood. Before he could utter a word, the girl leaned backwards and somersaulted
    to the ground, landing smoothly on her feet. She straightened, and smiled pleasantly at the captain. "Who are you, and
    what brings you into our Forest?'' The man regained the control over his tongue, and tried very hard to be intimidating.
    "I"m the Sheriff"s captain, and I"m ordered to arrest you, Robin Hood.'' To his dismay, the girl chuckled. "Robin Hood?
    So you came up with that name! I"ve seen the posters you made too. Tell me, am I really that hideous?'' The captain didn"t
    answer that question, for the last thing he could do was to tell an outlaw that she was quite pretty, actually. Instead,
    he sought to scare her again. "If you do not come with us willingly, we will have to use force. And trust me, you wouldn"t
    want that.'' Robin shook her head. "Sorry, but I"m not going to come willingly, nor am I about to trust you. I suggest
    you save yourself the effort and go back to where you came from.'' "That is out of the question,'' the captain said, and
    on his gesture, the soldiers aimed their crossbows at her, "if I must, I will have you crippled to ease our return to
    Nottingham. Be sure that I will not hesitate.'' Robin merely smiled, and a voice erupted from the side of the road: "Ye
    don"t want to be doin" tha" mate.'' With that, a curtain made of a net with leaves attached to it, bordering the road,
    fell down. It revealed a group of fourteen men, all aiming their longbows at the soldiers. A very tall, bushy-haired man
    stepped up to stand next to Robin, smirking triumphantly behind his beard. "Lower your weapons, if you value your lives.''
    Robin said. When the soldiers had hastily complied, she stepped forward to the captain. The tall man eyed the captain
    warily, daring him to try anything. Robin beckoned the soldier to her and softly said to him: "Return to Nottingham with
    your men, and tell the Sheriff that if he wants to catch me, he will have to send something better than your little patrol.
    I must say that I find this a bit insulting. Tell him also, that his horrible deeds will not go unpunished. Before the
    Lionheart returns and gives him a trial, he better watch his back, for we"ll be there to make him pay for what he"s done.''
    She retreated with a smile on her face, but he could the determination it harboured. Before he could answer her, the bushy-haired
    man cut him off. "Off ye go then! And don"t come back!'' He then brought down his arm, and his group fired a warning at
    the soldiers. The least brave of them turned their horses and fled, immediately followed by their colleagues and their
    captain. They rode out of the Forest like madmen, with arrows following them and laughter ringing in their ears. They
    didn"t slow down for anything until they reached the city, and only then did the captain realize that the bloody woman
    had stolen his captain"s badge. He slammed shut the doors of the stable angrily, and steeled himself for the report he
    was about to give to the Sheriff. His lord would not be happy. Hours later, the captain fell onto his bed with pain coursing
    through his entire body. The Sheriff had not been mild with his punishment, but luckily for the soldier, he had not been
    in the mood to kill either. When the captain had told his tale and had conveyed Robin"s message, George had released a
    furious beating on his back, accompanied by a colourful string of curses the poor soldier had never heard before. When
    he had calmed down enough, George had thought everything over, and had told the captain to get up and clean himself. He
    was the one who had come closest to Robin Hood, and though it didn"t mean much yet, it was the only tool at their disposal.
    He was now in charge of all expeditions into the Forest concerning her, but he didn"t know whether he was to be happy
    with this promotion or not. In another part of town, the eight soldiers were sitting in a tavern, getting very drunk.
    To everyone who wanted to listen, they told the story of their mission. Apparently, they hadn"t registered it was a camouflage-curtain
    falling down, and so they were now telling an outrageous tale about Forest giants appearing out of nowhere whenever they
    wanted, girls falling out of trees and mysteriously flying arrows. This story appealed very much to people"s imagination,
    and by the following morning everyone in and around Nottingham had heard it, or at least one of the uncountable versions.
    It even traveled to Locksley, where a slightly worried Sarah laughed at the things her mistress had supposedly done, things
    she very much hoped were just gossip. But she did welcome these stories, as they told her Robin wasn"t dead or captured.
    As long as that was still the case, she wouldn"t allow herself to get overly worried. Back in Sherwood Forest, no one
    knew about the legend being created about them. They were just happy to have won the first confrontation, and were already
    preparing for the next, which they knew would undoubtedly come. The rebellion was official. N/A: Next chapter will be
    from Robin"s point of view again, and I think it will include some more of Will and his issues. I am not going to reveal
    anything about a romance yet, but I can say that Will is not kin to Robin. I"m thinking up this story as I go, and I"m
    not sure yet who Robin is going to fall for. Anyhoo, a happy and prosperous 2005 for everyone, and let"s hope that the
    people in south-east Asia can more or less pick up their lives again. N/A: I finally have proof that people don"t read
    my story once and then cast it aside! I can"t believe I"m on the author watch of 5 people! To some of you, that may seem
    laughable, but to me it"s really something. I can"t seem to be able to stop smiling, my family says it"s quite disturbing.
    I"ll just ignore them, ne? miz greenleaf: Wow, you sure review fast! I"m glad you like the story, though I doubt I"m worth
    the praise you give me (It still feels great though ;)). I"ll try to update faster, but I don"t dare to make any promises...
    Chapter eleven: Musings The men"s serious air vanished at the hasty retreat of the Nottingham soldiers. They were reluctant
    to admit that they had been nervous, and the only way they now showed it was through their loud laughter. Some sent a
    few arrows flying after the fleeing riders, while others hung the curtain back up for future use. After erasing all signs
    of the encounter, the group leisurely walked back to the Tree-village. While the men were joking and laughing amongst
    themselves, John was talking in hushed tones with Robin. "I still think ye took a huge risk by steppin" up to "em alone.
    They could"ve shot ye before ye had time te say "boo"! And comin" within whisperin" distance with tha" bloke up front
    wasn"t what we"d rehearsed either. What were ye thinkin", Robin!'' It was obvious that underneath his gruff demeanor,
    John had been very worried for her. During the time she"d been with them, he had grown to like her very much. Robin blushed
    a bit at being told off, but wasn"t about to go down without a fight. "Firstly, we didn"t "rehearse" anything. There wasn"t
    enough time for that after the warning - remind me that we improve our look-out system - and I just followed my instincts.
    Secondly, I thought it would be smart to make sure that the Sheriff knows he can"t scare us that easily. To be frank,
    it irked me that he only sent eight cowardly soldiers and a pansy-ass captain to stop us. Can you blame me for being a
    tad bit disappointed after all the effort we put into this?'' John shook his head. "Personally, I"m happy it was so small
    a patrol. Yer right when ye say we weren"t prepared enough. Think of what would"ve happened if their force had been more
    impressive? "T would"ve been a bloodbath. Now we know there"s still room for improvement, and let"s hope that despite
    your challengin" the Sheriff there"ll still be enough time to do just that.'' He looked at her defeated-looking face,
    and clapped a hand on her shoulder. "Hey, don"t look so glum, I"m not sayin" ye screwed up. But ye have to know that there"s
    a difference between bravery and bein" rash. Yes, in my opinion we have to be cautious, but that doesn"t mean we"re cowards.
    You least of all.'' Robin perked up a bit at his words but scolded herself mentally anyway, for she had once again forgotten
    that what she was doing was dangerous. She realized now that she had been so caught up in preparing a rebellion, that
    she had allowed her imagination to run free again. She had unconsciously pictured an entertaining and glorious battle
    - much like the tales of heroes she had been told before going to bed during her childhood - and had failed to separate
    fairytales from reality. She sternly told herself she had to get serious if she ever wanted all of this to work, and that
    at this point she could not afford to be fooling around, lest it cost her the good outcome of the rebellion. After steeling
    her resolve one last time, she set her thoughts on how to improve the apparently failing look-out system. For the rest
    of the journey, Robin was too preoccupied to keep much of a conversation going with John. He didn"t mind, since he figured
    she had a lot to think about, and he didn"t want to pry. Instead, he joined the men in their boisterous conversation,
    firing jokes at each other. The atmosphere in the village at their return was one of both anticipation and apprehension.
    Anticipation because they wanted to see if all their planning and training had been worth it, and apprehension because
    there was always the possibility that something had gone wrong. Many people had gathered to witness the return of the
    patrol, and quite a few were now checking if anyone was missing. But all their worries vanished when the patrol came close
    enough for the onlookers to see their big grins and hear the bantering going on between them. The group was greeted very
    enthusiastically, and while the men were telling the others all about their - grossly exaggerated - adventure, Robin hung
    to the back a bit and tried to spot both Wulf and Wat the cook. The latter came into her view first, and she signaled
    him she wanted to talk. "Aye, Robin?'' He asked, just as cheerful as the others. "what can I do for ye?'' "Ask all the
    women to help you prepare as big a feast as we can afford. I want to celebrate our first victory.'' Wat looked delighted
    at the prospect, and nodded energetically. "Right-o Robin! You"ll be in for a treat the tonight!'' And with a last wink,
    he departed to mobilize his squad of kitchen-queens. With that taken care of, Robin continued to try and spot Wulf, and
    was finally rewarded with the sight of a familiar mop of messy brown hair. She meandered through the vast mass of people
    that separated her from Wulf, and finally managed to get his attention. "I was wonderin" where ye were hidin". Wulf greeted
    her with his trademark grin. "Not feelin" like joinin" the festivities?'' Robin chuckled. "Not yet anyway, there are some
    things I need to take care of. That"s where you come in.'' "Oh?'' Wulf raised an eyebrow in question. "And what could
    be so important that it can"t wait until after the feast?'' "The fact that, as your father pointed out to me, we were
    very badly prepared and quite lucky that the Nottingham patrol was only small.'' Wulf"s eyes widened in surprise. Now
    it was Robin"s turn to raise an eyebrow. "You didn"t believe all those fantastical stories they are telling, did you?''
    Wulf blushed. "No, of course not. Never believed them.'' He shook his head a bit to forcefully, and Robin chuckled again.
    "You are the worst liar I"ve ever seen. Now come, we have a scouting system to improve.'' And before he could protest,
    she pulled him with her to their headquarters. On their way to the large tree house that was set up as their headquarters
    for all coordination, the pair ran into Will. He had for some reason not been present at the gathering, and was only now
    moving towards the noises that indicated a party was in the making. Robin intended to move past him without seeking a
    confrontation, as she had done ever since the Turnaround, but Will wasn"t so accommodating. "I"d have thought you would
    enjoy a party that"s given in your honour, Milady, but it seems you"re looking for someplace more calm for your "activities".''
    Will was smirking suggestively between her and Wulf, and when the bushy-haired boy began to blush, Will"s smirk only increased.
    Robin eyed him coldly. If he wanted a fight, he could certainly get one. "For your information, that party is to celebrate
    our first victory. But you wouldn"t know that, since you obviously weren"t invited, were you? And as for where we"re going,
    that isn"t of any importance to you. So just scamper off now, and go see if anyone is willing to share some food with
    you.'' Not waiting for Will to answer, she pushed past him roughly, gesturing for Wulf to follow her. She didn"t see how
    Will opened his mouth to shout something after her, then thought the better of it and continued towards the party, his
    shoulders tensed and his back rigid.'
