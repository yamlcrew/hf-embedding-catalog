    - TIME Turner PERSON were showing CARDINAL films in honor of actor writer PERSON ( whose birthday is DATE ) . Cronym has
      only been dead now for DATE , but he was an impressive character actor in comedy and in drama . I was lucky DATE to
      see the FAC production of THE PETITION a CARDINAL person play Cronym played with his wife and partner PERSON , and I
      can vouch he was a crisp and fine a performer on stage as he was in his films . Captain PERSON is CARDINAL of the most
      detestable villains in motion pictures , turning his prison into a private torture chamber , with the apparent acquiescence
      of his guards ( note PERSON , his personal guard and assistant ) . He has his way in the prison due to the weakness
      of the burned out warden PERSON and the bullying of a political hack from the Governor's office ( PERSON ) who is impressed
      by PERSON's claims of the need for discipline . But as the wise but alcoholic doctor ( PERSON ) points out , while discipline
      has a place the GPE has never given an order to PERSON telling him to crucify the prisoners . It's a rather pitiful
      prison system we see here , and sad to say it remains a problem . The warden keeps bemoaning his failure to come to
      grips with rehabilitation and punishment , but he has no real suggestions in him , and he is really more upset about
      what he will do when he is forced out for the rest of his life . The doctor tries to give a degree of humanity to the
      prisoners lives ( interestingly enough , like the alcoholic doctor played by PERSON in MUTINY ON THE BOUNTY ) , but
      he is aware that he has no place to work outside the prison he is in either . PERSON , in fact , taunts him as a surgical
      butcher , suggesting something he did went terribly wrong . PERSON and his guards seem to fall into dominating and assaulting
      the prisoners at the drop of a hat . When PERSON is walked into accidentally by Cronym in the lunchroom , PERSON starts
      clubbing him until even Cronym points out it was his own fault not PERSON's . Only at CARDINAL late point in the film
      , when Cronym is beating up PERSON in his locked office , do we see some of the guards react - but none intervene .
      The film ( well directed by noir specialist PERSON ) follows DATE of ORG's system before it collapses . There have been
      increasing numbers of prisoners dying because Cronym has purposely put them into unsanitary and deadly work , especially
      in the main drains of the prison . CARDINAL prisoner , PERSON , has refused to crack so far ( he has been put in solitary
      due to a " shiv " being planted on him , with the connivance of Cronym and Teal ) . He returns to his cell and the prisoner
      who was the collaborator on this is killed later on in a stunningly good scene in the prison workshop . ORG is determined
      to escape and learns from a dying prisoner that there is a route through the drain . It has to be used in a timed escape
      that requires a riot in the prison yard and the use of an armed truck . To coordinate PERSON need the help of the prison
      trustee ( PERSON ) , but the latter is up for parole . ORG plans the escape with his cell mates ( PERSON in his ORDINAL
      film , PERSON , PERSON , PERSON , and PERSON ) . In the course of their discussions they each tell stories about their
      lives , showing that the economic forces of the world frequently force them into crime ( GPE embezzles to help him and
      his wife ; PERSON takes the blame for a murder his wife - PERSON - committed to help him when he was being arrested
      for giving food to the NORP in the war ; PERSON , a colorful confidence man , is robbed with his own gun of the proceeds
      of a swindle and a visit to the gambling tables by an attractive woman who also steals his car ; ORG has been keeping
      his crippled , cancer ridden wife ( PERSON ) from knowing he is a criminal and prisoner ) . CARDINAL gets a feeling
      that these men did not have to become criminals but were forced into it . This is the weakness of the film , forgetting
      how many criminals in prison deserve to be in prison for their actions . As was pointed out in another review on this
      thread , there are sexual criminals who we never see , and the ones sentenced to death ( the film is set in DATE ) are
      never even mentioned . Nor are problems among male or female prisoners in their own prisons dealing with sexual predators
      among their fellow prisoners ( and the guards sometimes ) . However , one can safely say that no prisoner deserves a
      set of guards controlled by an ego-maniacal sadist like ORG's PERSON . The film was shot shortly after EVENT , so it
      is notable that PERSON likes to play NORP music ( so long established as music for NORP ) in his office . In fact ,
      when he beats PERSON in his office he has the ORG music playing loudly to drown PERSON's screams ( oddly enough the
      music is not from the " RING " Cycle , but from TANNHAUSER , and it is the " WORK_OF_ART " music which was supposed
      to be sensual ! ) . Still the film shows the cruel , power-mad Captain as an unforgettable villain . He is as aware
      at the end of ORG's plans as he can be - but he is also aware of the warning PERSON gives him - that power mad people
      end up being destroyed by their power . In his last few moments ( as one sees in the film ) Captain PERSON does find
      out how true this comment is .
