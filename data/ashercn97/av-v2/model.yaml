- source_sentence: '           Hello Fellow Bloggers!  This is my final attempt at starting up a blog. I always start, it
    lasts DATE, and then I burn out. BUT this is something I would really like to get into, maybe it will last this time.   For
    those of you who don''t know, I am a DATE country girl lost somewhere in the big city. I have adapted well though, if
    I must say so myself. I have been living in GPE for DATE. My mother in PERSON live here also and I have a (almost) DATE
    dalmatian. I have been dating the same guy for DATE, and plan on making it last forever. I am a Signing Team Manager for
    a local ORG store, and love hanging out with my friends... I guess thats the basics, so lets go on to TODAY!  It was DATE.
    Can I say any more? Everything that could go wrong, Did. I didn''t get CARDINAL of what I wanted to get done accomplished,
    and.....WHOA... I don''t wanna start of complaining, if I do that I will never get anyone to read my blog.  DATE was DATE.
    Period.  Does anyone else watch the Swan? I am a Reality Show Fanatic. I can''t believe these people leave there family
    for DATE to make a physical transformation. I recently made a rather large transformation myself, but I don''t think that
    I could have been so successful if I didn''t have my friends and family there to back me up. Not that I am knocking the
    show by any means... I plan to watch it...in TIME.  I gotta tape wrestling too. (I am NOT a redneck) I tape it, and then
    ORG and I watch it when he gets off. It has become a ritual. I never watched wrestling before PERSON and I got together.
    What is this effect guys have on us gals? Somehow they always tend to rub off on me. Before Gene it was PERSON and Matchbox
    Twenty... It''s just weird how that happens.   I promise as time progresses my posts will be more interesting. I just
    gotta get back in the swing of things.   ''After a while you learn the subtle difference between holding a hand and chaining
    a soul, and you learn that love doesn''t mean leaning and company doesn''t mean security, and you begin to learn that
    kisses aren''t contracts and presents aren''t promises, and you begin to accept your defeats with your head up and your
    eyes open, with the grace of an adult, not the grief of a child. You learn to build all your roads on DATE because DATE''s
    ground is too uncertain for plans. After a while you learn that even sunshine burns if you get too much. So, plant your
    own garden and decorate your own soul, instead of waiting for someone to bring you flowers. And you learn that you really
    can endure... that you really are strong, and you really do have worth.''             '
