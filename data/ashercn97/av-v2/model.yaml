    as the penguins ran down the step, turning the light on. "franky!" cadence screamed, running to his side, crying hysterically.
    "franky wake up!" she shook him, the others unhooking zendaya who was hugging petey. the officers ran over to franky.
    "cole stabbed him.." zendaya told them all, crying as she held her wrist and walked over to cadence. "zendaya..can we
