    and Vaughn sat. He placed his tray down before taking a seat. Josie looked up from a book on wormholes and as did Lucas
    from his unappetizing dinner. "Hey, Marshall. Hey, where"s Corrine?" asked Josie. "She wasn"t feeling too good so she"s
    upstairs resting a bit," replied Marshall. He thought it would be best to leave out the part about Corrine"s near-collision
    with the ground. "Is she ok?" asked Vaughn. "Yeah, I think she"ll feel better after getting some rest," replied Marshall,
    "she said it was probably all the stress from school." "Well, she should just chillax. I mean she"s the smartest kid in
    the school," said Lucas. Josie scoffed at Lucas" remark. "Did you just say "chillax?''" Lucas just glared at Josie. "So
    what if I did?" Josie just rolled her eyes and continued her reading on wormholes. Marshall ate his dinner in relative
    peace except for another little scuffle between Miss Redhead and Mr. Conspiracy Freak that had to do with Lucas claiming
    to see Durst flying across the school. Vaughn interrupted his thoughts. "You"re being really thoughtful tonight. Is Corrine
    on your mind?" "Yeah. I guess I"m just...worried," replied Marshall. "At least you have someone to care about," said Vaughn
    with a slightly exasperated sigh. Marshall smiled a little bit. "Don"t start complaining about not having anybody to care
    about. You have four great friends and may be one means a little more?" asked Marshall. Vaughn shrugged and glanced over
    at Josie. Unusually, her nose was buried in her book. Vaughn sighed. "I"m not even sure what I feel anymore. Well, anyways,
    when you head back upstairs tell Corrine I hope she feels better." Marshall nodded. "Sure thing." Lucas held up his fork
    to eye level, examining it. A look of slight disgust appeared on his face. "Do they actually expect us to eat this stuff?"
    Josie looked up reproachfully at the "food" on his fork. Marshall chuckled and gathered his tray. "Well, I"m going to
    go ahead and go before I get sick." They all said bye as Marshall dumped his tray on the cart and walked off. He headed
    out of the cafeteria and took a left instead of going up the stairs. He paused at the door to the nurse"s office before
    turning the handle and walking in. "Uh, Nurse Robins?" A women appearing to be in her late forties looked up from her
    small but cluttered desk. "Yes, may I help you?" Marshall stepped inside the nurse"s office. It was not too small a desk
    and filing cabinet occupying one half while the other half had two sick beds, partitioned off from the rest of the room.
    "Uh, do you by any chance have any aspiring?" He knew it sounded dumb but he felt like he needed to do something. Nurse
    Robins smiled. "Yes, I do have some. Hold on one second." She got up from behind the desk and went over to a medicine
    cabinet and opened it. She pulled out a bottle of aspirin and two paper cups. She put some aspiring in one and water in
    the other. "May I ask who"s the one needing the aspirin?" "My friend has a migraine and isn"t feeling all that great,"
    said Marshall. "Oh dear. Does he or she need to come see me?" she asked worriedly as she handed him the two cups. Marshall
    took the cups gratefully and shook his head. "No, ma"am. Just a migraine from school stress." The nurse gave a reassuring
    smile. "Alright then. But if your friend doesn"t feel better, send him down here." Marshall nodded. "Thank you," he said
    hastily as he headed out. Marshall quickly ascended the steps and made it to Josie and Corrine"s room. Balancing the cups,
    he opened the door and headed in. He was slightly surprised to see Josie, Vaughn, and Lucas there, and even more so, to
    see Corrine up and sitting on her bed. She gave him a slightly tired and sleepy smile. Josie was sitting legs crossed
    next to Corrine on her bed and Lucas was sitting on Josie"s bed. Vaughn meanwhile was sitting in the computer chair. Marshall
    walked over to Corrine and handed her the aspiring and water. "I thought this might help. How are you feeling?" Corrine
    took the aspirin and water. "A lot better. Thanks," she said with a smile. "Looks like ickle Nurse Wheeler"s checking
    on Corrine," said Lucas with a laugh. Corrine laughed. "Well, then I guess he"s my ickle Nurse Wheeler," said Corrine.
    This caused the whole group to start laughing. Josie patted her friend on the back. "You need to take it easy, Corrine.
    You don"t need to stress yourself out so much about school! We all already know you"re perfect!" The group laughed once
    more including Corrine. "Alright guys. I promise to take it easier on myself!" A/N: Ok so I know this chapter is a little
    on the short side but the next one will be longer. And something pivotal will happen in the next chapter! Have I got you
    guys on the edge of your seats? Rate and review please! A/N: Thanks to all my loveoly reviewers for my last chapter! See!
    Your reviews prompted and encouraged me to update faster: ) Heheheheheheh! Anyways, here"s chapter 20! Chapter 20: Happy
    is a Yuppie Word The next few days rolled by, filled with nothing but sea, sand, and sky. Finally, Friday arrived. Josie,
    Corrine, and Lucas sat in the living room watching "The Revenge of the Prep School Piranhas 2" while Marshall and Vaughn
    were in the kitchen making lunch and secretly organizing a few last minute details for Corrine"s party. Vaughn sat checking
    off a list as Marshall stood pacing occasionally. "Ok, so after lunch, I"m going to go take Corrine over to the other
    side of the island for some last minute sight-seeing and stuff. That"ll give you guys a couple of hours to get everything
    set up here. You guys have everything you need, right?" "Yep," replied Vaughn," we have all the stuff for the cake and
    the other food, too. Oh and Sam said she was going to bring her husband Frank and Brooklyn said her sister Lydia arrived
    from Miami two days ago and would bring her tonight." "Alright. So everything"s set!" said Marshall. Vaughn nodded and
    then looked around, frowning slightly, as he sniffed the air. "Dude, is something...burning?" Marshall stared wide-eyed
    at Vaughn before scrambling over to the oven to turn it off. "Smooth move, Marshall. You nearly burned down the villa
    on our last day!" said Vaughn chuckling. Marshall had packed some food, blankets, and other stuff in the back of the Jeep
    as Corrine got in the passenger"s side. "We"ll meet up with you guys later at Smitheman"s Port to go sailing!" said Josie.
    "Why are you guys staying behind? I don"t want to leave you three to the confinements of the villa. You might drive each
    other insane and doing something rash," said Corrine. Josie tiptoed over to the window on Corrine" side of the car. She
    glanced around carefully as if no one else could hear what she was about to say. "We thought you two deserved some time
    along and away from the short-tempered redheaded elf, clueless jock, and Mr. Conspiracy Freak. And besides there"s a beach
    behind the villa, remember?" Corrine laughed and shook her head. "You"re in a loving mood, aren"t you, Josie?" Josie just
    smiled and shrugged as she started to walk back to the house. "Have fun, Corrine!" she yelled over her shoulder. Corrine
    and Marshall waved as they pulled out of the driveway and onto the road. Corrine looked out the window, enjoying the peaceful
    and beautiful scenery roll by. "So, where exactly are we going?" asked Corrine curiously. "You"ll see," Marshall replied
    with a secretive little smile on his face. After a while, Corrine and Marshall arrived at a secluded area with plenty
    of palm trees and other tropical plants obscuring the view of the beach. Through chinks in the mass of trees, they could
    see the sparkling blue waters of the ocean and hear the waves lapping the sun-warmed sands. Marshall quickly parked the
    car and hopped out to get everything out of the back. While Marshall was doing that, Corrine got out an walked towards
    the semi-dense expanse of trees that hid the beach from sight. As she stepped in among the trees, she could see the sparkling
    waters a bit more clearly. Curiously, she crept forward until she stood on the border between the stark white sands and
    the grove of trees. Her jaw dropped in awe as she surveyed the scene before her. It was an inlet or cove that resembled
    a crescent moon in shape. The clear aquamarine waters glittered from the sun as sea foam and waves gently lapped at the
    white sand beach. The beach was surrounded by a huge stretch of palm trees and tropical foliage, making a giant wall that
    seemed to isolate this little cove from the rest of the world. Marshall appeared behind her, picnic basket in one arm
    and a blanket in the other. "Surprise," he said softly. "You like it?" Corrine just stood in awe before turning around
    and throwing her arms around Marshall"s neck and planted a big kiss on his lips. He immediately dropped everything and
    kissed her back while spinning her around. Corrine laughed. He placed her back down and rested his forehead against hers.
    "Happy birthday, Corrine." For a second Corrine looked puzzled but then the little light bulb inside her head went off
    and an embarrassed look appeared on her face. "I forgot all about that!" she said with an embarrassed laugh. "Well, you"ve
    had a lot on your mind, no doubt." Corrine picked up the folded blanket and Marshall picked up the basket. He took her
    hand in his and entwined their fingers as they made their way down to the beach. Corrine spread out the blanket on the
    warm sands. "Well I don"t know about you, Marshall, but I am definitely going for a swim," said Corrine as she slipped
    off her tank top and shorts to reveal her turquoise tankini. "I thought you said you didn"t know about where we were going,"
    said Marshall slightly puzzled. "I didn"t. But a certain redhead tipped me off saying I should bring my bathing suit with
    me," replied Corrine.'
  - '             ok..so i got this fish tank for valentine''s day and i really wanted to have a pet shark but instead a got
    a bunch of feeder fishes. for some reason, they all got sick but one. the runt out of the group survived. she outlived
    all her brothers and sisters. then one day, i got a few guppies added to my tank but that didn''t last long because they
    miracuously disappeared while i was on vacation. so now all i have is one guppy and a gold fish name wanda. i ran out
    of food a week ago...i''ve been neglecting them. i never really got to attached to the guppy but wanda, i did care about
    and i didn''t want her to die. well, i was at my parent''s house the other day and i saw my sister''s turtle and thought
    about wanda. i asked my sis if i could have some of her turtle food for my fishy. yes i am lazy and didn''t feel like
    going to the pet store. well when i got home, i crushed the turtle stick food and put one in the tank. wanda was so excited
    cuz she hasn''t seen food in awhile. she went in for the food and she choked. the stick was too big for her little mouth.
    she was gagging. i didn''t know what to do. i was so scared for her. i could see the food in her mouth. it was too hard
    for her to swallow it. a tear came to my eye...i felt my fish slipping away from me and if she died, it would have been
    all my fault. i called my friend and told him that my fish was choking. he was no help. he just laughed at me. so i hung
    up the phone and prayed that the food stick would just get soft so she could either swallow it or cough it up. after about
    5 minutes of gagging, she coughed up the food. i was so relieved but then i saw her going for the food again but luckily
    it was soft enough for her to swallow. go figure.   well that''s my fish story. i hope i never have to live through that
    again. it was pretty traumatizing. but i did learn something...that maybe i shouldn''t get a shark ..and not to feed wanda
    turtle food. :-)          '
- source_sentence: She walked from underneath the large, dense tree branches where they were sleeping, into a small clearing.
    The clearing was surrounded by large pine and fir trees; the last of the snow clung to their branches. The forest floor
    was carpeted by old, discarded pine needles. There were a few patches of left over snow scattered along the forest floor.
    The carcass of a deer, killed during the early morning, lay at the clearing edge. "Sister..." "Yes... I hear you." She
    answered. She was not afraid. The voice was familiar. A small light, like a firefly, danced in the darkness. She smiled
    as she watched the light dance between the trees branches, slowly coming towards her. She watched as the small light seemed
    to swim in her blue eyes. Smiling she spoke to the light. "Show yourself, Sophia." She yawned; laying down on the dried
    pine needles that covered the ground. She extended her paws forward waiting for her sister to appear. A small flash of
    light grew into a form she was quite familiar with. It was a young woman; nude, green eyes, yellow hair; beautiful features.
    Her wings extending, covering a distance twice her height, gently folded together behind her... "Sister..." Sophia smiled
    as she looked at her sister sitting on the ground. "It is good to see you..." "It"s been a while..." Sophia continued
    as she kneeled down next to her. "You look good as a wolf." She ran her hands across her fur. She tilted her head, laughing
    as she scratched her sister behind her ears. "Nice coloring..." She was looking at the tip of her sister"s tail. "Gray
    with a silver tip?" She smiled. "Angelic white..." "Huh?" She was enjoying her sister scratching behind her ears. She
    did not hear the question or the comment. "Your tip of your tail?" She pointed it out. "It"s angelic white... I bet, it
    never gets dirty... Huh?" She rose up, supporting herself with her front legs. She looked at her sister and smiled. "It
    is good to see you... Sophia." She continued to speak. "But why are you here?" "Sophia"s" green eyes seem to lose their
    brightness as she shook her head. It was though she had some bad news. "I... I... I..." She stuttered, looking away, almost
    ashamed to say it. "I"ve come"...; she paused, "to take you home now..." She continued, her eyes were starting to tear
    up. "They sent me to bring you back home..." "No!" She quickly responded. She rose from the ground and stepped back from
    her sister. "You can"t..." "I don"t want to..." Sophia covered her green eyes with her hand, concealing the fact that
    she started to cry. "But they..." Sophia was shaking her head. She knew how bad her sister wanted to stay. She remembered
    when her sister first heard the howling; she was excited, something Sophia had not seen in her sister in a long time.
    When her sister left to discover the source of the howl, she smiled. Sophia knew her sister would not be coming back for
    a little while. "They, what?" His voice came from the darkness. He moved from the shadows, into the moonlight. His large,
    black body was imposing; he walked slowly towards them. His eyes burned as he glared at Sophia, standing next to his mate.
    He slowly moved towards Sophia. Each paw quietly placed in front of the other paw. "Who are they?" He growled. Sophia
    turned quickly to him. Her green eyes ablaze, she reached out her hand and pointed at him. "Back down, wolf!" Her soft
    features were hard. "This is between us..." Her voice and her words were like weapons and she used them indiscriminately.
    "You are just a dog... sit down and obey!" She narrowed her eyes and continued to point at him; she moved her hand pointing
    in a downward motion. He stood there glaring, his growl grew louder, and his mouth opened up exposing rows of sharp teeth.
    "You think me a dog? Wait till I get my teeth in you!" The wind, blowing from her direction, seemed to pick up, almost
    blowing him backwards. He lowered his head and continued to push forward. His eyes continued to glare at her. "Stop it!"
    She cried out, she was looking at both of them. "Enough... Both of you..." She was standing between them. Her head lowered
    and looking at the ground. She was crying, her fur wet with tears. Both of them were surprised by her outburst. "Enough!"
    Her voice cracked, she was starting to sob. "I am not leaving..." She was sobbing, shaking her head, her eyes closed tight
    as if that would stop the pain. "You don"t understand...," Sophia paused, "they will just take you... You know that..."
    Sophia continued to explain to her, pleading. "Take her...?" The black wolf raised his head in disbelief. He looked at
    his mate and then he looked at Sophia. "What do you mean... take her?" "Be happy with the time you had..." Sophia walked
    towards her, kneeling down on one leg, putting her hands around her furry neck and hugged her. She cried into her sister"s
    fur, gently stroking her face. "You may be a wolf, but I see you as an angel... My sister!" Sophia whispered into her
    ear. "I can"t..." She pleaded with Sophia. The black wolf stared at his mate as her sister embraced her. "What can I do...?"
    "It is so little time, I"m asking for..." She continued as she looked at the black wolf, tears fell from her eyes. "10...
    Maybe 15 more years... That"s all I need..." She turned her head, nuzzled her sister"s face. "Sister, I want this..."
    "it is nothing compared to eternity" she continued to plead with Sophia Sophia continued to listen to her pleading and
    begging to let her stay. "It is not up to me... Sister." "I can"t..." "Why?" "I can"t..." "Why not..." She raised her
    head up, looking at Sophia, who was now standing looking down at her sister, her face red with tears. Her green eyes seem
    to lose their luster. The expression on Sophia"s face seemed to ask her for something concrete. Something she could take
    back to them so they would understand. What came next caught Sophia and the black wolf by surprised. "I"m with pups..."
    "Pups!" Both her sister and the black wolf spoke. Their mouths dropped open, their eyes wide with surprise as they looked
    at each other. "How..." Sophia quickly responded, she shook her head, raised her hand out. "I know how..." "When..." Sophia
    corrected herself. The black wolf stood motionless. Pups, little ones, the future there sitting in front of him, in his
    mate"s body. He looked at her and she at him. Her eyes nervous, it reminded him of the first time when she tried to howl.
    He slowly walked over to her side. He greeted her, rubbing his nose against hers as she closed her eyes. "I am so happy..."
    He replied. He sat down next to her and looked at Sophia. Sophia stood, motionless, her hands on her hips and she was
    shaking her head with her eyes closed. Thinking about the situation; an angel and a wolf mating? "Sister... I don"t know
    what to say..." Sophia looked at both of them. She watched as her sister leaned her head against her mate. He leaned into
    her body. "This is unexpected..." Sophia opened her green eyes and stared at the ground. She brought her hand up and rubbed
    her chin. Sophia stood thinking to herself about the ramifications of an angel and a wolf. The history of man was filled
    with the mating of gods and man, but not wolfs and angels. She was in the middle of her thought process when something
    caught her attention out of the corner of her green eyes. Looking up, suddenly her eyes widened with surprise. "Sister!"
    Sophia quickly raised her arm and pointed. "Your tail!" "Huh... What!" they both turned quickly, looking at her tail.
    Sophia quickly ran to her side, grabbing her tail as if to pat the fire out. "No, no!" Sophia spoke quickly as she continued
    to no avail to try to stop it. Sophia turned to look to her sister as she was trying to stop it. She looked at her tail,
    slowly fading, turning into golden embers rising to heaven fading into the nothing. "They are taking you, sister!" Sophia"s
    face strained with concern. "No...!" She looked at the black wolf. "My pups..." He watched not knowing what to do. His
    eyes watched in disbelief. There was nothing for him to fight, nothing to chase off. Fear rose from his belly, something
    he had never experienced before tonight. "What can I do...?" He placed his head next to her head. He breathed in deeply
    taking in her scent. "What can I do..." his eyes teared up, it was a helpless feeling, one he had never experienced in
    his life. He looked into her eyes, watching her, knowing he could not help. "What can I do..."The tears rolled down his
    face. "Remember me... Please." She looked at her mate. Her eyes seem to be resigned to her fate. The tears flowed as she
    thought about her pups. "What about...", he started to ask about the pups. She could only rest her head against him crying.
    "They are taking me..." she whispered between sobs. Sophia quickly wrapped her arms around her body squeezing her tight.
    "No... No..." her tears flowed as she cried into her sister"s fur. She held on tightly, hoping, knowing it would not help
    her stay. "No... No... I am so sorry..." Sophia cried, her face buried in her sister"s coat. "Please stop..." Sophia moved
    her hand to her sister"s belly, feeling the life that existed inside." Sophia was crying as her sister"s form gently slipped
    away from her grasp. She, knowing her time was short, stared into the black wolf"s gaze. She noticed something out of
    the corner of her eye. "Huh!" She quickly looked over and saw it. She with all her remaining strength freed herself from
    Sophia"s grip. "What!" Sophia leaned forward with her arms open as if she could catch her. The black wolf raised his head,
    surprised as he watched her leap across the clearing. She straddled the remains of a carcass of an animal that he had
    killed earlier that morning. She reached down with her mouth and tore a piece of flesh off the body. Holding the flesh
    in her mouth, she turned, looking over her shoulder at Sophia. Her blue eyes seemed to be saying, "I"m sorry, sister".
    "Sister! ... No!" Sophia yelled and screamed. " Please..." Her body was still fading as the embers drifted into the night
    sky. She looked at both Sophia and her mate as she quickly chewed, then swallowed the flesh. She squeezed her eyes tight,
    grimaced. It tasted of life lost, she choked it down. "My pups..." Is all she could say repeatedly. She suddenly collapsed
    to the ground, and lay silent. Sophia watched as the transformation ceased. She had eaten the flesh of an animal and she
    would pay a heavy price. Sophia slowly walked over to her, stunned at what her sister had done, wiping the tears from
    her face. She sniffed as she bent down over her sister. She could hear her murmuring "my pups..." She stared down at her
    sister with her green eyes, with a hint of sadness; she rubbed her coat from nose to tail. The black wolf walked slowly
    over, sitting down, he lowered his head and sniffed." Will her..." "Yes... She will be fine..." She had a content look
    on her face, her green eyes shone. The smile came easy. Sophia, still looking down at her sister, smiled; her green eyes
    glowed, and her yellow hair flowed down her nude body to her waist. Her wings spread wide, twice her height as she turned
    to him. "We will be watching..." She disappeared in a bright light and the rushing sound of wind. He lay next to her,
    putting his head on her neck. He could hear her breathing soft, her heart beat steady. Taking a deep breath, he closed
    his eyes slowing falling asleep next to her on the warm pine needles. Spring came to the valley with the melting of snow
    and ice. The streams flowed fast down the mountainside, filling the lake full, forcing the old out and the new in. There
    is a chill in the air, which was offset by the warmth of the sun"s rays. The flowers of the valley bloomed along the water"s
    edge. The bird songs filled the air as they scourged for food to feed their young. This particular spring was welcomed
    by the yelping of four new pups; three females and one male. The young male"s coat was black, like his father with yellow
    eyes. One sister had bright blue eyes; her coat was steel grey with a white chest and belly. Another sister"s coat was
    a mixture of grey and black with black eyes. The third sister had a coat of chestnut brown and amber eyes, her tail was
    the same as her coat but the tip was white. After weeks of feeding from their mother, they would finally leave the den,
    enjoying the world outside. They bounced, ran, played, peed, and pooped to their hearts content just like all pups would
    be doing in the spring. "I"m home..." The black wolf laughed. He was greeted by four pups bouncing all over him. "Whoa,
    now..." He raised his head up, each one jumping and licking his mouth. "Food! Food! They cried out repeatedly. "Take it
    easy... Your father will give you some..." she laughed; she smiled as she came out of the darkness of the den. He regurgitated
    his meal, and they promptly lapped it up. "Soon, they will be eating by themselves..." He walked over; they gently rubbed
    their heads together then touched noses. "Hmmm" she gazed at him, "it"s so nice having a home..." "I like that..." He
    smiled, turned, looked over his shoulder at their pups. "What?" "Home..." She caressed his coat with her head. She leaned
    heavily against him, rubbing against him nose to tail. She sat down, watching their pups play with each other. Bouncing,
    jumping, and growling. One even tried to howl. "Not as bad as her first time." He thought. The black wolf walked over
    and lay down next to her as she watched the pups play. His front paws extended, he laid his head down upon them. "I am
    so tired..." They sat next to each other, their tails intertwined. The birds filled the air with song. The pups rough
    housed in the tall grass. The cool, spring breeze brushed through the pines and the leaves of the trees. "Hello... Sister..."
    Both of them quickly turned their heads in the direction of the voice. It was Sophia. Her green eyes shining like emeralds,
    smiled, her yellow hair was tied up in a ponytail. Her wings were folded and brought forward partially covering her nude
    body. She tilted her head, smiled, and gave a quick finger wave. She was standing next to a large tree a few feet behind
    them. The black wolf looked at her with suspicion. After what happened last time, he didn"t really trust her. He gave
    a slight growl so that she would notice. The pups heard, raised their heads, and went running for their mother. When they
    finally reached her, she was standing facing Sophia. She was smiling and laughing, her blue eyes were filled with happiness.
    "How are you doing, Sophia?" She leapt up on her hind legs, Sophia caught her front paws. Sophia gave her a hug and a
    playful scratch behind the ears. "It is so nice to see you..." The black wolf, however, gave a different response. He
    stood up slowly, growling, his ears back and his eyes narrowed. "Good morning, Sophia." She responded, her pups staring
    at the strangely beautiful somewhat familiar sight. Her pups gathered around her feet. "It is good to see you..." Sophia
    smiled, her green eyes focusing down at her sister"s feet at her pups. The black wolf stared, watching carefully. The
    male pup turned to watch him... Turned back and he attempted to growl, heckles raised. "Oh my... What a cute little male
    you have there, sister." A new voice sounded. It was Angelina, the youngest of the four sisters. She was shorter than
    Sophia, nude, with long, brown hair, and hazel eyes. She was quite beautiful and hid her wings folded behind her back.
    She was sitting on a fallen tree behind the black wolf. She was bracing her head up with her hand that was placed on her
    knee. She tilted her head slightly, smiled, and looked playfully at the young male pup. The black wolf quickly turned
    to see the new threat. Angelina smiled at him and gave a slight little finger wave. "Hello..." Her greeting was bright
