      that her mother and her older sister were scared and it was Maggie"s fault. She was probably gonna get in trouble in
      the end, but she didn"t care. Maybe her momma would stop being scared if she had something else to think about. So,
      little Mariah wiped her nose with her hand and crept over to Maggie"s side. Then, without hesitation, she chomped her
