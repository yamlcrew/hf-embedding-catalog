      to reattach his head to his neck." Maggie spat. "So, you killed Charlie?" "I just wanted the bike." "Get away from my
      kids." Maggie"s face suddenly contorted into stone seriousness, "You"re not good enough for him." As soon as the words
      had left her mouth, the wolverine smile was back on her face. But, she had blocked out the other two kid"s cries so
      well, that she didn"t even notice it when Mariah stopped. It"s amazing how perceptive children are when it comes to
