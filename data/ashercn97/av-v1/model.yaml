      glimmered in the light. He recognized the chain instead of the diamond. He had seen the thick coil around his father"s
      neck his whole life. "I suppose not," he said as he sheathed his sword. He removed his gloves and walked towards Danu,
      a strange contemplative look in his eyes. She became increasingly aware of her height, or lack thereof. He was tall,
      with dark hair and black eyes that seemed to pierce her soul. She felt her breath hitch in her throat, almost as if
      it was stuck. There was a certain attraction that she had never felt before. The man picked up the pendant. In his hands
      the stone turned from a diamond to a ruby. Danu stared at the man in front of her with shock. She hadn"t ever expected
      a prince to even speak to her. She was about to drop to her knees. She would have had the necklace not stopped her before
      she had lowered herself only a few inches to the degree of a princess to a king. She stood again, feeling more confused
      than ever. "My lord, please forgive my impertinence. I was not aware of your identity." He was much too young to be
      Primus, and the only other prince alive was Septimus. He had the most notorious reputation. But whatever could be said
