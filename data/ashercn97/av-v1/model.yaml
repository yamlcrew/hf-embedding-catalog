      one she"d been in, but she still didn"t like it. And she liked the fact that it was happening at night even less. Septimus
      was sound asleep next to her. He"d managed to fall asleep before the storm hit, and hadn"t been awakened by it like
      she had. Another crack and flash, almost simultaneous, echoed through the small cabin. She buried her head into the
      pillow, debating whether or not to wake her husband. After all, he was supposed to protect her. But she wasn"t in any
      real danger. Finally, her need to have company won out and she shook Septimus gently. He sat up faster than she had
      seen anyone move, looking around as if there was great danger. "Septimus?" she asked. "Danu? I thought... What time
      is it?" "I"m not entirely sure," she confessed. "I think it"s about one or two in the morning." He looked over at her
      rumpled hair and the dark circles starting to form under her eyes. It was clear that she"d been up for a while. "Why
      are you awake?" he asked. A flash, so close that it had to have hit the wire strung to the ship for that exact purpose
      echoed through her skin. She almost jumped, but grabbed Septimus" hand. "The storm. I"ve been afraid of them for a while."
      He pulled her into his arms. "You should have woken me up when it started." She snuggled into his embrace, feeling her
      muscles relax. As long as she listened to his heartbeat she could ignore the thunder crashing just outside her room.
      "I didn"t want to disturb you," she mumbled. "You looked so peaceful sleeping there, and you need your rest. We"ll be
