      "Do you wanna play "Knights of the Round Table" with us?" Lazlo chirped in. "Huzzah!'' Said Clam from somewhere inside
      the cabin. "Listen Lazlo, I need to talk to you in private..." "There"s no secrets between friends." Lazlo said, smiling.
      Edward hated that smile for all the reasons he hated Lazlo. Anger bubbled up inside him. "Why does he always have to
      make this harder for me!? Why?" "Laaazlooo!'' He yelled angrily, shaking his fist at Lazlo. "When I say "private", I
      mean private!" "But..." "No buts! I didn"t walk all the way here from Nurse Leslie"s office for buts!" His reddening
      face seemed to make Lazlo suddenly concerned. "Edward, relax. Whatever"s bothering you, I"m sure we can talk about it..."
      Edward cut him off. "That"s what I wanna talk to you about..." "Maybe he needs Biryani Rice! I always feel cranky "till
