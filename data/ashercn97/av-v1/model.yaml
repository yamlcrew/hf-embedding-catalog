      to her chest to keep her head as low as possible. She saw that the corner of the bed skirt had been torn off, which
      was what Maggie had tied around her arm. "You slut!" Lisa screamed, "That"s Egyptian cotton!" With that, she came back
      up, just in time to see a flash of blonde hair as Maggie made her way to the bathroom. "Leese, the kids!" Jackson exclaimed.
      Lisa jumped to her feet and shot toward the hallway of the bathroom just as the bathroom door flew open to reveal Maggie
      standing there, one hand clamped around Luhki"s arm and the other pressing the barrel of her gun to Luhki"s temple.
      Maggie was staring at her with bright beaming eyes that were wide and watery and wild. She looked like she had lost
      whatever mind she had had. "Mrs. Rippner!" she exclaimed, her voice high and peppy, "I"ve been meaning to talk to you
      about my salary." "Has all that bleach you put in your hair seeped through to your brain?" Lisa hissed, "Let my babies
      go or I will shoot you between the eyes." "If you so much as twitch an eyelid, little Luhki won"t be livin" up to her
      namesake for very long." Maggie retorted, visibly pressing the gun harder against the small child"s head. "What is this,
      psycho teens take Miami? Is Charlie the video store clerk gonna come waltzing in with an AK in a second?" Lisa said,
