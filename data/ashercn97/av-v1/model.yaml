      like he was talking to a child. "I know a yoga move that can help you." Edward had been glaring at Lazlo"s hand on his
      shoulder up to that moment. He looked up as Lazlo"s words reached his ears: stupid, ridiculous words. The anger that
      had been piling up inside him suddenly sloshed to his knees, leaving him feeling empty. Lazlo got the feeling his suggestion
