      Dealing With Clyde Jackson"s eyes went from Davey"s face to Clyde"s. "Kill him." He said, letting his hand snake its
      way discreetly down to his ankle to release from the one remaining tie. Lisa watched poor Davey"s dark blue eyes widen
      in a combination of shock at what Jackson had just said and fear at the fact that Clyde might just do it. "I don"t want
      him." Clyde said. There were chunks of dried blood hanging from his face just below his ear. Lisa smiled with a slight
      sensation of pride blooming inside her at the sight of the wound. "I want that bitch of a wife you got." The smile faded.
      Asshole. Jackson"s grip on Lisa"s waist tightened. "Not gonna happen." "So, you don"t care if I do away with this little
      prick?" Clyde said, nudging Davey"s temple with the barrel of the gun.'
