    it was how panic lit Solanaceae"s features when I mentioned it. Who knows? It was happening, though. I was sure of it.
    So long that said Death nuisance doesn"t kill me in detention I should be fine. Speaking of the devil... Just a few yards
    from the Myth classroom, I ran into Solanaceae. She looked irritated beyond all belief and sent a nasty look my way when
    she noticed me. "You just HAD to go and get us detention for life didn"t you?" She muttered coldly. I just glared at her.
    Like it was my fault she tried to strangle me (AGAIN). And so yes maybe I started it, but it was...It...She had it coming.
    "It was your fault. Don"t be modest now." "Bugger off." "Don"t try anything. We"re in deep enough as it is." "And who"s
    fault is that?" "Yours! You bitch!" Solanaceae then made a very rude and unladylike gesture to me. "Oh real mature." I
    hiss. Golden eyes narrowed all the while, I couldn"t help but feel that her energy was strangely off today. Suddenly I
    wondered if starting something at this particular moment had been such a great idea. I got my answer when she reached
    for her wand, pulling it out to aim right between my eyes in one quick fluid motion. So this was how it was going to go?
    I had practice in this certain situation, and I mirrored her movement exactly. There was a tense crackling silence. I
    was ready, I had a spell on the tip of my tongue. I was almost hoping Professor Drake would show up; last time this happened
    she hit me full on with a hex that made me grow large bat ears that stayed put for forty-eight hours. "Mobiarmus Demoenum!"
    "Lumindo Horrendenta !" We said the spells at the exact same moment, and simultaneously two streaks of light shot out
    from our wands and clashed violently together in a flurry of green and black sparks. This was not supposed to happen.
    I know I had just taken a huge risk. That spell; Is the one I learned just in case. I couldn"t - I couldn"t help myself.
    It was in a forbidden spell book. That"s not all. A forbidden DEATH spell book. One I had gotten from the library. Dammit...
    Why did I do that? On school grounds - I felt suddenly very lightheaded. I world around me swam. Everything turned to
    black. All around me, there was nothing but darkness. A color darker than black. Complete void. Until the surroundings
    formed into place around me. A large elegant room, with marble floor and high ceiling that had deep red tapestries on
    the walls. I saw a woman walking out, a woman with long dark black hair, and equally as dark eyes, shining strangly. I
    had never seen her before I was sure of it. But she was so familiar. Alongside her fell a child. A little girl, with equally
    as dark hair and eyes. They were in a sort of conversation - but it was all muffled to me. I only understood parts "Do
    you understand why..." The woman was saying softly, but I could hear an edge to it that shouldn"t have been there. "...No...I
    dont...Should I?" The voice was familiar. The scenec dissolved around me once more. I only heard voices this time. No
    images. "I will." "You dont undertsand this could cost you your life!" "I know." "You can"t -!" "I"m protecting her! I
    can and I will." Then after that, I saw a scene playing out in front of me very, very clearly.'' I could feel this person"s
    emotions like I was watching this happen from their eyes... Bright moonlight glistened off of the pale skin of the figure
    walking stealthily through the corridor. A dark claret hood pulled tightly around their head, and the rest cloaked their
    body. Dark eyes, the color of amythest, a deep royal purple stared out into the darkness, darting around. Checking for
    any signs of a guard. A small thin strand of almost black hair escaped the hood, hanging loosly in the way. Just barely.
    A women, a girl of no more than 14 years of age tip-toed quietly through the corridoor. Stealth was all that mattered.
    All that mattered was not getting caught. For if she was caught, she would be killed without mercy. But some things, she
    believed were just worth the risk. Soft black leather boot padded across the marble floors with extreme caution, and the
    cloak swished silently around her ankles. The risk was all too real for her, but she must do as she was told.'
  - 'Leonidas turned to Gorgo. She had been standing on the balcony, and must have heard him enter their room and begin to
    approach her. She had not turned to address him. He put his hands over her shoulders. "Gorgo-" "I know it is your duty.
    As king, you are the first warrior into battle." He brought his hands around her waist. "No, my queen...these are raiders
    we are facing, not a true army. I go only to ensure that every last one of them is made to pay for the Spartan blood they
    have spilled." At last, she turned to him. He glanced down to the small, rounded mound that was her womb. It had not been
    long since she had told him of the child that shared her body, but Leonidas was already so eager for his heir. He settled
    one of his large hands upon her flesh, hoping again to feel his child move. Gorgo held his hand more firmly to her body.
    "No, Leonidas. It is too soon for the babe to kick." He nodded, slightly disappointed. "I will not be gone long, Gorgo.
    Weeks, at most. I will return to you the same man I have always been." She rounded on him, "But I will not be the same
    woman! I will be bigger, as round as a sphere and as swollen as a melon! You won"t want what I have become, you"ll take
    a slave as your whore, you"ll take my babe away from me and-" Leonidas gripped her shoulders and forced her to look at
    him. "Gorgo! What is this madness you speak of?! Have you lost your mind? You must have forgotten that I chose you as
    my wife," he bit out. Gorgo had been behaving strangely for the past few weeks, ever since her body began to grow fuller
    from the child. She avoided him during the day and slept further to her side of their bed at night. When she allowed him
    to touch her belly so that he might feel for his child, she often insisted that he was not doing it right and would leave
    in frustration. The midwife brought into the palace had assured them that it was safe for the babe if Leonidas were to
    take his wife again, so long as he was very gentle. Gorgo had seemed repulsed at the idea one moment and then eager for
    it the next; as of yet, Leonidas had stopped approaching her all together. His wife began to cry, and Leonidas hated himself
    for becoming upset with her. He brought her closer into his arms and allowed her tears to fall upon the linen of his robe.
    Careful not to upset her further, he reached up and stroked her hair. He could not understand why she thought he would
    be so eager to take another woman; in fact, he could not understand why Gorgo had been so withdrawn and angry with him
    at all. It seemed every step he took would irritate her to no end, every breath he took lead her into further annoyance.
    "Gorgo, Gorgo, you are my queen, my only love..." He crooned to her. Carefully, Leonidas backed her up to their bed and
    he had her lay back on the blankets there. Her face glistened with tears, her breasts and belly heaved slightly as she
    cried. Leonidas moved to lay on his side beside her, propping himself up on one elbow and looked down at her. "I want
    no other woman, and I would never dishonor you by taking another. There will only be one queen of Sparta. You and no other."
    He rested his hand over the gentle bump of her belly, then slowly stroking up her body towards her face. Gorgo shivered
    and gasped when his hand passed over her breast. To Leonidas, the sound was akin to a call from one mate to another. He
    cupped her face and leaned down to kiss her. To his relief and satisfaction, Gorgo responded to him. They simply kissed
    for a time, reacquainting themselves to each other. It had been a long time since Gorgo had allowed Leonidas to touch
    her as a husband, and he had been beginning to feel almosr desperate for the return of his wife. He would take what she
    would give, and not press her for more. He cared too much for Gorgo and for their child to risk upsetting her. The heir
    she carried was the future of all Sparta. They parted, and Gorgo moved to present her back to him. Leonidas moved his
    body to mold her shape against his, and he reached around her waist to lay his hand over her belly. "I"m sorry, Leonidas.
    The midwife warned me months ago that I would become upset at the rustling of a feather, but I hadn"t believed her- I
    laughed and told her that I was not the same as the other women she had seen to in the past. This is punishment for my
    arrogance! I"ve driven you to chasing raiders across Greece just so that you may find a bit of peace..." Leonidas laughed
    softly against her hair. "No, no, Gorgo. I go because of my duty as king. I go to discourage any others from even thinking
    of attacking Spartan villages or farms again, to protect the people. I will think of you every day, Gorgo, and beg the
    gods to deliver me back home swiftly so that I may see you with our babe." His woman was silent for a short time. "Leonidas,
    do you truly still want me?" "Yes. You are...too close to see yourself clearly. You cannot see what I can. I see you,
    healthy and strong, growing ripe with my seed. You have the mother"s glow about your face, your hair shines and your breasts
    have become even fuller. I would have to be a eunuch not to desire you." He laughed. Despite herself, Gorgo laughed too.
    "Thank you, Leonidas. I think I only wished to hear you say that." He drew her closer. "Then I will tell you every day."
    They slept, yet somewhere in the night, Leonidas woke at the faint, tiny fluttering of the child beneath his palm. Over
    fifty days had passed since Leonidas and his small band had departed from the city, intent on eradicating the rebels and
    raiders that had already killed hundreds of innocent Spartans. The days were blistering hot, the nights only slightly
    cooler. Leonidas and his fellow warriors hardly noticed the weather; they had edured all forms of hardships in their agoge,
    this was nothing in comparison. As of yet they had found but traces of the raiders. A few footprints, an abandoned campsite,
    broken spears and arrowheads. In the king"s estimation, they were perhaps three days from their quarry. Once word had
    spread that true warroriors, led by the king himself, had come to defend the citizens, the rebels had wisely run off.
    Their trail was erratic in an effort to confuse the Spartans chasing them, but it would do them no good. The only thing
    that they had accomplished by prolonging the chase was to enrage the Spartans further. Leonidas was not the only man whose
    wife was with child. Dilios, the captain, and five of the other warriors were impatient to return back to their women
    and hopeful sons. Leonidas sat on a smooth boulder, taking his turn on the perimeter watch as the man he"d replaced went
    off to sleep. The moon was full and bright in the night sky, it"s perfect round shape reminding him of Gorgo"s growing
    belly. "My wife waits with child as well," Dilios had told him earlier that day. "Halcyone has born me two sons, and hopes
    this time for a girl. I think she is lonely for a daughter in the house." Leonidas had smiled at his friend. "This will
    be my first. I hope for many children; sons, of course, but Gorgo once told me that she would someday want a daughter.
    I think women are like us- they want a child to take after them." Dilios agreed. "You are correct, sire. Halcyone has
    told me that if Aphrodite answers her prayers and she is given a daughter, she will teach her all the secrets that she
    has learned in the kitchen. I hope only for another son." Leonidas had raised his brows. "Why another son, Dilios? I have
    met your boys. They are large, fast and strong. The agoge will be child"s play to them, they will be prize additions to
    my armies. Why not allow Halcyone a girl to share her cooking skill?" Dilios had laughed then. "Because, if she should
    have a daughter, the girl will know the secret of attracting many suitors- Halcyone seduced me with her wonderful food.
    Once I had a meal with her family and learned that had cooked it all herself, I asked her father to give her to me that
    very night. If she passed on her secrets to a girl, all of Sparta"s young men would be begging at my door!" The men had
    laughed then, but Leonidas no longer felt so humorous. Gorgo was with child; he wanted to be by her side, not rummaging
    around abandoned campsites searching for murdering scum. Suppose something happened while he was away? His child could
    be lost, his wife injured or worse! He had to stop the grim thoughts, he had only to complete the task of tracking the
    raiders, and then he would return. His eyes burned out into the distance, his anger growing within, urging him to chase
    the rebels, faster and farther, all the way to the sea if it would only bring him back to Sparta. Gorgo rested her arms
    on the balcony of the royal bedchambers; the grand rooms where she had slept alone for many nights. She stared at the
    moon, hoping that somehow Leonidas was watching it as well. It would connect them, in a way, even if neither of them were
    aware of it. She glanced down and pressed a hand to her bulging womb. The child was within, moving inside of her. It had
    began shortly after Leonidas had left the city to hunt down the raiders that were slaughtering Sparta"s innocent people.
    Gorgo hoped it was a good omen that their child was so restless. It meant that the little boy or girl would be restless
    in life, always striving for greatness and earning pride. She had once dreamed that Leonidas would return, and kiss her
    belly just in time to feel their child kick. It would be a great thing if he would return to her that very night, as their
    babe seemed more restless than usual. Ten more days had passed, and Leonidas had still not returned to Sparta. Gorgo knew
    that he was Sparta- the world"s- finest warrior, but how could she not worry? The raider killings might have been a diversion,
    a way of baiting him to leave the city, taking only a handful of his fellow soldiers. Could they all have walked into
    a trap? To be ambushed by hundreds? She shuddered at the thought as images of bloodshed flashed through her mind. "You
    must think only happy thoughts- otherwise, the poisonous worries of your mind may harm the child." The words of the palace
    midwife were not so comforting. Gorgo knew that worrying over her husband for days on end was not healthy. She had gone
    about her queen"s duties the same as she had before, and tried to keep herself as useful as she was able. As she began
    to swell, it was not so easy as it once was. Still, there was time. Leonidas would return to Sparta in time to see the
    birth of his child, the future heir to all of Sparta. He had to. "These were the last of them, sire. Their leader has
    been captured for interrogation, the rest have been driven to the sea." Leonidas turned to face the captain, his expression
    grim with purpose. "Good. Then we can begin the return journey to Sparta at once." It had been many days, over a hundred,
    since he had first left his city and his wife. The rebels had been clever in evading them, but no chase lasted forever.
    They had been caught when Dilios noticed their pattern of hiding during the day and moving along the foothills at night.
    All of the men had been eager to get back to Sparta, and so they had been eager to cut through the raiders all the more
    quickly. Leonidas had led the attacks, each strike of his sword leading them closer to home and closer to their wives"
    embrace. The raiders had been a strange assembled group of insurgents, all of them hailing from different nations. Obviously,
    the legends of Sparta"s warriors had somehow escaped them and they had had no idea what they had been facing. They stood
    on this plain and taunted us. I"ve never before seen such fools, Leonidas thought as he wiped the blade of his sword free
    of blood. Smiling slightly beneath his beard, he glanced around and saw that taking ten other warriors had indeed been
    unnecessary. One lone Spartan would have been enough to rid the countryside of these raiders. As it happened, Leonidas
    and each of his warriors had made a few kills, but the battle (such as it was) had been over in a matter of minutes. The
    raiders were young, poorly trained and despite having robbed so many families, they had been far too ill-equipt to even
    hope facing off with true warriors. They had been lambs sent to the slaughter, a clear warning to any others that might
    think to attack Sparta"s country farms. No matter now, Leonidas thought. The raiders have been taken care of. No warriors
    of mine have been lost. It is time to return to our city. The journey back to Sparta was not no long. Indeed, most of
    their time had been spent in pursuit of the rebels but now that the warriors were headed back home, the days passed with
    ease. The warriors even marched late into the night, greatly aided by the pale silver light of the full moon that hung
    above them in the midnight sky. He thought of Gorgo again at seeing the moon"s perfect round shape. He knew that by the
    time he returned to Sparta and was presented to her, she would have grown much larger than the last time he had seen her.
    Their last night together, he had felt their child move beneath his hand. Surely by now their babe was moving constantly,
    eager to be born and claim its birthright as the future king or queen of Sparta. Leonidas smiled softly at the thought,
    hoping that their child born would be a son. He anticipated fighting with this future king, sparring, teaching the boy
    how best to hold a spear and how to hunt for deer in the wilds. All would be useful for when the time came for the boy
    to take to his agoge trials. Yes, Leonidas hoped for a son; he wouldn"t know what to do with a daughter. What could he
    possibly do? He could not fight with a girl, he might injure her upon sparring. He knew nothing of female customs and
    had no true interest in such things. All a princess would be required to learn was how to present herself correctly to
    courts and then take in lessons of Spartan law and philosophy when she came of age. Until then, all a princess did was
    play with her precious pet animals and toys. Sparta would fall if its king began to play with weaved silk dolls! Please,
    Zeus, a beg you for a son...I would be lost with a daughter! Days passed and finally the men came over a hill and saw
    Sparta. Leonidas allowed them to cheer as they moved down the road leading to the city, their horses" hooves beating the
    earth like thunder. Dilios followed Leonidas to the palace once the other soliders were dismissed to their homes. The
    rebel leader was taken away to be questioned and then killed; there was no room for mercy in Sparta. "Why do you not return
    to your wife, Dilios? I"m sure you must miss Halcyone"s cooking," Leonidas had joked to him as they"d made their way up
    the palace steps. Dilios nodded. "I admit that I do, sire. Halcyone has been staying close to the midwife who resides
    within your palace; I wish to see if she is here before checking our house." Leonidas nodded. "No bother. Perhaps you
    might wish to bathe before seeing her?" The king suggested, gesturing to the both of them. The battle and the journey
    had made them filthy- dust and dirt clung to their exposed, sweaty skin. Their hair had grown as matted as their beards,
    the dried blood of their enemy clung both to their clothes and to their skin. Dilios glanced down at himself as if noticing
    his appearance for the first time. "Perhaps you are right, sire." Servants had been called forward to bathe the king;
    they washed his body, oiled his skin and attended to his hair and beard. Gorgo had been told of his return, and despite
    his eagerness to see her, Leonidas was reluctant to allow her to see him as filthy as a common dog. He wished to embrace
    and kiss her, but no woman would have allowed him to touch her as filthy as he had been! Once he had dismissed the attending
    servants, Leonidas had felt refreshed and more than ready to see his queen. He went directly to their chambers, but she
    was not within, wiating for him as he had expected. He stood in their rooms for a moment, absorbing her delicate female
    scent. Gorgo, Gorgo, my wife and queen... He left their chambers to go down into the gardens; that was a place that had
    held private meaning to them for years, even before they were married, back when they had had their first meeting. Leonidas
    ran a hand through his newly cut hair and headed through the courtyard, instinct carrying him toward her. As Leonidas
    moved, he tilted his head. He had thought he had heard...no, he had heard something. He paused to listen. It was a sweet
    sound, taking on form and lyrics. A woman was singing. Smiling, Leonidas followed the sound, not at all surprised to find
    Gorgo sitting on the stone bench before the fountain; this was the place where he had told her of his intention to take
    her as his wife. Her back was facing him, and Leonidas almost felt content to listen to her for a while more, but could
    not stand aside from her much longer. "I have never heard you sing," Gorgo turned to face him, her face lighting up as
    he had never seen before. "Husband!" Leonidas moved to her side and embraced her tightly, surprised and somehow pleased
    to see how large her womb had grown in the time he was away chasing the rebels. Gorgo smiled at him and rested a hand
    over the large bump of her body. "Yes, didn"t I tell you? As round as a sphere and as swollen as a melon!" He laughed
    and carefully touched her, hoping to feel the babe move within. He felt nothing, but did not show disappointment. How
    could he, now that he was back in Sparta? "I thought of you and our child every night that I could see the moon," he told
    her. "Its shape made me think of you, being so round and perfect." Gorgo laughed, kissing him. "I am glad that you have
    come back, for I have been told that it is only a few days more before our child will come forth. I am ready, but also
    afraid." She confessed, holding him as close to her as she was able. He held her. "You need not be afraid, wife. This
    child will come, and will be my heir to the throne." She nodded. "Yes, I know. It is only that...while it lives within
    me, we share the same life. I can protect it. When she-" "Or he!" "Or he, is born, we will be separate. Anything could
    go wrong." Leonidas shook his head. "Nothing will." "That is not a promise you can make, my love." Leonidas nodded. "I
    know it is not. Gorgo, this child will have everything, I promise you. I will lay down my life to protect you and all
    the rest of Sparta." "And if you die? What will become of us then?" Leonidas thought for a moment. "Then I will rage through
    Hades to come back to you both." No more than ten days had passed since Leonidas"s return to Sparta when he was roused
    from his sleep by his queen"s cry of pain. He was awake in an instant, alert to any threat, ready to kill for her. Gorgo
    had been sleeping beside him, but she had moved to sit up and placed her hands over her bulging womb. She turned to him,
    her eyes large, glowing with fear and happiness. "Leonidas, it"s time. Help me, you must bring me to the midwife." Leonidas
    moved quickly to do what he knew needed to be done. Carefully, he moved off the bed and eased her onto her feet. He was
    alarmed to see that her thighs were smeared with a strange fluid, but he said nothing for fear of upsetting her further.
    The king guided her out of their bedchamber and down a short corridor to find the old, experienced midwife that would
    safely deliver his heir. And she will deliver our child safely, or I will end her myself! He felt his heart pounding,
    but he indicated no fear or excitement. He was king, and had to keep his composure before all, even with the servants.
    He called for the widwife, who answered them within minutes with several other servants following suit. Around them, Leonidas
    could sense the entire palace coming awake. "Oh, Gorgo, I had expected you at about any time, come on, come into the chamber
    here." The midwife ushered the queen into her chambers, and then ordered her servants to fetch linens, a blade and hot
    water. Leonidas began to follow the women inside, but the midwife moved to block his entrance. "No, my lord, you cannot
    be here for the birth." At once, he felt ready to strike her for her insolence. "What foolishness do you speak? Gorgo
    is my wife, it is my child to be born this night!" The midwife stood her ground. "I am no fool, sire, but I say again:
    no man will enter." "I am not just a man, I am your king." "You are a man all the same. Your father was just as arrogant
    and stubborn when I delivered you and your brothers! Sire, you must wait outside this chamber-" A pained cry from inside
    drew both their attention away. Leonidas stepped forward to go to Gorgo, but the midwife moved to block his path to her.
    "Sire, you must not-" "Leonidas, stop," He turned to find his father, bleary-eyed from interrupted sleep. Androcles moved
    forward, flanked by servants and advisors- Cadmus, Gorgo"s father, was among them. "You cannot be with her now," The midwife
    took advantage of Leonidas"s attention being on his father, and slipped into the chamber, locking the heavy door behind
    her. Leonidas realized that he"d been locked out and he beat his fist against the door. Androcles moved forward. "Leonidas,
    you must stop. Birth is a woman"s realm where men have no place. Gorgo must do this alone."'
