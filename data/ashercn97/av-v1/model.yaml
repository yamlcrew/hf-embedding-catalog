      and music. She knew that her uncle had a music machine thing, she couldn"t remember its proper name, but he didn"t creak
      floorboards that way when he played it. There was too much carpet in his cabin. She moved silently, almost stalking
      the noise. The creak was subtle, so subtle that anyone not looking for it would have missed it. In all the commotion
      that was happening above deck, Danu was surprised that she had heard it in spite of the fact that she had conditioned
      herself to respond to even the slightest noise. She leaned against the wall, just a few feet from where a man dressed
      all in black stood. He had unsheathed his sword, and appeared to be taking great care to make as little noise as possible.
      "Come here often?" Danu asked. She couldn"t help but try to lighten what appeared to be a very tense moment for him.
      "Who are you?" He tensed up even more, his gloves hiding the whiteness of his knuckles as he gripped his sword even
