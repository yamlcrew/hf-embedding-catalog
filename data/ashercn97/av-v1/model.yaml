      originally thought. She braced herself for impact, grateful that this time someone had managed to land the ship relatively
      smoothly. The previous landing had jarred her much more than she would have liked. She paced around her cabin six times,
      the heels of her boots lightly tapping on the wooden floor. Her cabin wasn"t particularly large, but she paced it diligently,
      biding her time. She wanted to get out of the stuffy space, but was still afraid to do so. There was something about
      being on land that made all of the crew members more adventurous. They usually spent the first day lazing about near
      the ship, but hardly paid much attention to their surroundings and people. The only ones they cared about were the ones
      with weapons. Danu slipped her boots off her feet. She held them in her hand and carefully opened the door. She continued
      to hold her boots in one hand as she crept along. Her skirt, though much more voluminous than preferred for sneaking
      around, hardly rustled at all as she turned one corner after another. There was a huge ruckus from the top deck, and
      Danu stepped back a bit before continuing on. She had no clue what was going on, but it didn"t look like anyone was
