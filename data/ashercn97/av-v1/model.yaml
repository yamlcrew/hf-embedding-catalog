    sentences:
    - '"Maggie?" Jackson breathed. Author"s Note: Okay, so, which sin would be worse? Davey being in on the plot against the
      Rippners or Davey actually having the nerve to kiss Jackson"s woman? I"m curious to know. Be sure to tell me what you
      thought of the chapter, kay! 8 Author"s Note: Forgive me the extreme delay with this update. I"ve been super busy with
      a play that I"m in, but opening night is soon so updates will be better. Just bear with me for a while. Anyways, thanks
      for all the reviews and on to the story! Chapter Seven: The Babysitter Maggie, seventeen year old Maggie, the flipping
      babysitter was standing there, leaned against the doorframe holding a semi automatic handgun. She beamed a blinding
      smile at Jackson and said, "Hello, Mr. Rippner!" Jackson figured that she looked very much like the cat that got the
      cream at the moment...then it occurred to him that he was the cream. He didn"t like being gotten much. Point and fact,
      he didn"t like it at all. "Are you surprised?" she asked, that grin not faltering the slightest little bit. "Terribly,"
      Jackson said, his voice steady and even. Years of training had taught him how to handle shock. "I didn"t think they
      gave gun permits to bitchy cheerleaders." Maggie was obviously fairly new and hadn"t had as much training as he had.
      She managed to keep the grin, but her eyes widened considerably and then narrowed. "Language, Jackson." She said, gesturing
      with her head to where Mariah and Luhki sat in the corner with their arms around each other. Luhki suddenly sniffed,
      audibly swallowed, and then, in a very tiny voice, said, "Daddy?" "Shut up!" Maggie screamed, her head snapping in the
      direction of the children. "Stupid little brats." As soon as she had raised her voice to his children, without even
      realizing it, Jackson begun to ferociously jerk at his bindings in attempt to get to his captor. He wanted to rip her
      throat out for screaming at his kids like that. "Don"t yell at my kids, Maggie." Jackson warned, keeping his voice cool
      and even. Maggie turned to him, her eyes wide and brilliant as though her mind were bordering at the edge of the map
      and about to swan dive over it. "You know, I"ve been following your career for years!" she said coming over to kneel
      at the side of the bed, putting herself at eye level with him. "I"m your biggest fan. Getting Senator Weinstein"s granddaughter
      to shoot him seven times simply by using your power of persuasion...it was awe inspiring." "So, you"re Clyde"s partner."
      Jackson said, shaking his head. "Little young aren"t you?" "Old enough." "Here I thought Clyde had better taste." "Now,
      don"t be mean, Jackson." Maggie said, straightening and walking towards his kids. "Or I"ll have to be mean." "Get away
      from my kids." Jackson demanded, not even realizing that he was really in no position to be making demands. "You"re
      right!" Maggie chirped, "We"d much more enjoy the time alone, I think. Okay, kiddies, into the bathroom." Luhki kept
      her arms draped around her little sister as she looked back and forth between her babysitter and her father. Then, she
      turned her little chin up at the woman in blatant defiance. "No." She said. She looked so much like Lisa at that moment
      that it almost made Jackson smile. Maggie looked bug eyed at the comment. "What did you say?" "I...I...I wanna stay
      with my daddy." Luhki stated, looking down at her feet and away from Maggie"s glaring eyes. Maggie tucked her handgun
      into the back of her waistband and grabbed Luhki by the arm, a little harder than was necessary to move a five year
      old, and dragged her into the bathroom. Mariah screamed as her big sister was torn away from her and thrown into the
      bathroom. "Hey!" Jackson bellowed, fighting against his restraints. Maggie stormed back over and snatched Mariah from
      her feet and shoved her into the bathroom with Luhki. Jack Jr. was screaming as well from his play pen and it wasn"t
      long before Maggie had grabbed the two year old and put him down in the empty bathtub before she slammed the door closed
      on the three crying children, blocking out the noise of their sobs. Jackson tried to rip his hands out of the handcuffs
      but to no avail. Maggie flashed him a brilliant smile as she sauntered back over to the bed. "Alone at last." "If you
      hurt so much as a hair on one of my kids" heads, I swear to God I will rip your jaw off of your face and feed it to
      the dog." Jackson seethed. "You don"t have a dog." Maggie countered without losing her smile. "I"m buying Lisa one for
      Christmas." "Oh Lord," Maggie sighed, rolling her eyes and plopping down beside him on the edge of the bed, "Do we have
      to talk about her? She"s just too...common for someone like you." Jackson wanted to smack the grin off of her face.
      His lips pressed together in concentration and he tugged yet again on the handcuffs that held him to the bed. In his
      eyes, Lisa was anything but common and he refused to sit idly by and let her be insulted by the likes of a wannabe assassin.
      She suddenly swung one leg over to the other side of him so that she was sitting on top of him, straddling his hips.
      "You need someone who understands you. Someone...who shares in the enjoyment of your job." She leaned forward, exposing
      him to her cleavage and talking so that her lips were brushing against his face every time they moved. "Someone who
      can appreciate the art of what you do." "You mean someone like you?" Jackson snorted. "You know," Maggie went on as
      if she hadn"t noticed the mockery in his tone or the murder blazing in his eyes, "I admire your work. The only reason
      I even took this gig with Clyde was because he said that I would get to meet you." She slid her hand down, letting the
      tips of her fingers knead at his chest. "I think that we could do really great jobs together." "Don"t touch me." Jackson
      hissed, attempting to throw her off of him but unable to do so. Maggie"s eyes lit up. "Don"t fight me, Jackson." Maggie
      said as she began to rotate her hips and grind herself down on his pelvis, searching for any hint of arousal and finding
      none. However, she would not be deterred. "Don"t you see? We shouldn"t be fighting each other. We should be helping
      each other." Jackson looked up at his hands, refusing to give Maggie the satisfaction of having him looking at her.
      He would have liked nothing more than to throw her down to the floor and beat her to death with a baseball bat. Threatening
      his family was not acceptable. The fact that she was touching was unacceptable. The entire situation at hand was pretty
      much unacceptable. "Get your hands off my husband, bitch!" Jackson broke into a full fledged grin as he turned and looked
      to see his gorgeous Lisa standing there in all her glory. She was dripping wet from head to toe, covered in mud and
      what appeared to be hey, her hair was matted to her head, and she was aiming the 9mm at Maggie"s head. "What if I don"t
      want to?" Maggie said, running one hand over Jackson"s hair, though he twisted his head to get away from her touch.
      "Then I shoot you in the head." Lisa answered. Maggie threw back her head and laughed from deep in her stomach, "You
      think you can stand there and threaten me with my own gun?" "You think I"m gonna let you rape my husband in my own house?"
      Lisa countered, stepping forward. Jackson wanted to shake his head. Once again, people were underestimating Lisa. It
      seemed that no matter how many guys she managed to kill, they were never going to understand just how dangerous she
      really was. True, when had first began watching her, he thought that she was an ordinary workaholic type of woman who
      would be easy to scare, easy to control. She had surprised him with her resilience. He had never doubted her again,
      but these other idiots apparently didn"t learn so well. Mellmott had mistaken her for a weak little woman, Larsard had
      thought her to be easy pickings, and now Maggie thought that she would be able to intimidate her. Fools. "This is what
      the great Jackson Rippner wants? This common little mouse of a girl! I can"t believe it." Maggie said. Jackson winced.
      That wasn"t going to go over well with Lisa. "Mouse?" Lisa asked, her eyes narrowing. "Rape your husband in you own
      house, huh?" Maggie went on, stroking Jackson"s cheek. Suddenly, she leaned down and ran her tongue along his face then
      looked back up at Lisa with a twisted grin on her face. "How do you plan to stop me?" Without even thinking about it,
      Lisa squeezed the trigger. Actually, in the sudden rage at seeing Maggie touch lick Jackson, she had pulled the trigger.
      The gun had jerked and instead of hitting Maggie between the eyes, she had hit her in the shoulder. The force was enough
      to throw her off of Jackson though, so Lisa chalked that up to a point for her. "You bitch!" Maggie screamed from the
      other side of the bed, her hand clutched to her now bleeding shoulder. Lisa trotted over to the edge of the bed and
      with one hand, held the gun fixed on the other side of the bed in case Maggie should expose herself. With her other
      hand, she untied one of Jackson"s ankles. Her plan was to get Jackson untied and to let him deal with Maggie. She may
      have been more than embodied with impulse to survive and protect her young, but she lacked in the killer instinct that
      Jackson possessed. She hurried up to the head of the bed and jerked open the drawer of the nightstand. After rummaging
      through it as quickly as she could, she found the keys to the handcuffs were missing. Her gaze snapped to Jackson, who
      shrugged as best he could, then she looked to the other side of the bed. Lisa swallowed the lump in her throat and slowly
      made her way around the foot of the bed, but when she reached the other side, there was no one there. "Shit!" she said.
      "Lisa!" Jackson"s voice rang out just as a bullet flew past Lisa"s head and shattered her beloved picture window. Lisa
      turned and saw Maggie standing with her gun poised to fire again. She had a swath of material tied around the wound
