  sentences:
  - '"Maggie?" Jackson breathed. Author"s Note: Okay, so, which sin would be worse? Davey being in on the plot against the
    Rippners or Davey actually having the nerve to kiss Jackson"s woman? I"m curious to know. Be sure to tell me what you
    thought of the chapter, kay! 8 Author"s Note: Forgive me the extreme delay with this update. I"ve been super busy with
    a play that I"m in, but opening night is soon so updates will be better. Just bear with me for a while. Anyways, thanks
    for all the reviews and on to the story! Chapter Seven: The Babysitter Maggie, seventeen year old Maggie, the flipping
    babysitter was standing there, leaned against the doorframe holding a semi automatic handgun. She beamed a blinding smile
    at Jackson and said, "Hello, Mr. Rippner!" Jackson figured that she looked very much like the cat that got the cream at
    the moment...then it occurred to him that he was the cream. He didn"t like being gotten much. Point and fact, he didn"t
    like it at all. "Are you surprised?" she asked, that grin not faltering the slightest little bit. "Terribly," Jackson
    said, his voice steady and even. Years of training had taught him how to handle shock. "I didn"t think they gave gun permits
    to bitchy cheerleaders." Maggie was obviously fairly new and hadn"t had as much training as he had. She managed to keep
    the grin, but her eyes widened considerably and then narrowed. "Language, Jackson." She said, gesturing with her head
    to where Mariah and Luhki sat in the corner with their arms around each other. Luhki suddenly sniffed, audibly swallowed,
    and then, in a very tiny voice, said, "Daddy?" "Shut up!" Maggie screamed, her head snapping in the direction of the children.
    "Stupid little brats." As soon as she had raised her voice to his children, without even realizing it, Jackson begun to
    ferociously jerk at his bindings in attempt to get to his captor. He wanted to rip her throat out for screaming at his
