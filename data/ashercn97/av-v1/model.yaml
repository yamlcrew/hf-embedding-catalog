      with him.'''' he said to Holo and Connor. The Assassin sighed as he got up. ''"Aedel, if I were you I"d be concerned
      about what he said. He did say he"d go get something. And I"m wondering what that thing could possibly be.'''' Holo
      sat on the bench behind the two. ''"Whatever it is, we"d better be ready for anything.'''' Aedel shrugged as he sat
      down with Holo. ''"Couldn"t we lockpick the door?'''' he asked Connor. ''"We can"t.'''' the Assassin replied to the
      wolf. ''"I tried earlier, and even my hidden blade couldn"t do anything. We"re locked down here until he comes back.''''
      A few moments later, Britain came back, dragging a figure behind him. As he got closer to the group, they could see
      ears and a tail on the limp body behind the man. Aedel shouted at England. ''"Who is this?!'''' England dropped Votie"s
      body in front of the metallic bars, the choker jingling lightly as she hit the ground. Although there were no visible
      violence marks, she seemed completely unconscious. ''"You filthy bastard!'''' Aedel shouted again, hitting a metal bar
      in front of him. Britain grinned, laughing. "Stupid dog." ''"What purpose would it serve you to make her unconscious
      like that, Britain?'''' Holo asked the man as she came closer to the metal gate. "So she can"t struggle through this."
      he replied, pulling out a long, thin sword out of its sheath. He started drawing on Votie, pushing the sword ever so
      slightly under her skin, at the base of her stomach. ''"Wait.'''' Aedel said calmly. ''"Isn"t there anything we could
      do in order for you not to do this?'''' "No." the man smiled, continuing to cut as the blood started pouring, tracing
      a heart around Votie"s stomach. After he stepped back and surveyed his work, he took her body, carelessly throwing it
      onto her stomach. He grabbed her tail, lightly tapping the sword against it. ''"Bastard...'''' the wolf mumbled. ''"Stop
      it or you"ll be the one getting cut down!'''' The man laughed again. "Oh? And how, pray tell do you plan on getting
      out?" They heard the sickening crack of the sword hitting bone and being pulled back. ''"Don"t worry about me, I have
      plenty of ways to get out.'''' The wolf shrugged. ''"By the way, haven"t you ever heard of...'''' the wolf grinned.
      ''''...poison?'''' England raised an eyebrow curiously. "What"re you talking about...?" The wolf smiled again. ''"You"ve
      been poisoned.'''' the wolf said as he pointed at his gauntlet. ''"Works everytime.'''' Britain cursed to himself. "Bastard..."
      He fell down on the ground, sleeping heavily. ''"Well, now we only need to find a way to get out.'''' Connor said. ''"Good
      job Aedel.'''' The wolf smiled back at him. ''"I know you don"t have this thing in your gauntlet, and I"m impressed
      it still works even after two hundred years myself.'''' Holo looked at the metal bars and found a small crack caused
      by Aedel"s hit on it earlier. ''"Guys, help me, we"ll break the bar by pulling it out of place.'''' The wolf and the
      Assassin obeyed quickly as they pulled on the bar. ''"Harder!'''' Aedel said while making a big, final effort. The metal
      bar broke in a "cling" sound, and the group got out of the prison cell. ''"Pick up Votie, and get out of here.'''' Connor
      said to Aedel as the wolf picked her up. ''"Holo, follow him and protect him while you get out, I"ll go and find the
      Governor.'''' Holo nodded as the wolves walked out of the basement in which they were locked and got out of the mansion.
      Meanwhile, Connor got up the stairs and quickly entered the room in which they got knocked out earlier. ''"He isn"t
      here, but...'''' The Assassin picked up a letter. Reading it, he quickly got out of the mansion and followed the wolves,
      helping them carry Votie back to safety. Votie twitched weakly in Connor"s arms. "M...Ma...ma..." ''"It"ll be okay Votie.''''
      he said to her. ''"Don"t worry about her, she"ll be fine.'''' Votie fell asleep in his arms, clinging to him weakly,
      the blood drying on her stomach, as the group went back to their inn. Getting in the inn, Aedel grabbed Votie and took
      her in Holo and his" room. The wolves entered the room and locked the door behind them. Aedel then put down Votie on
      his bed, and summoned one of his servants. ''"Take care of her wounds, please.'''' he asked his servant. ''"Yes, Master,
      it"ll be a pleasure.'''' she said to him while starting to heal the woman"s wounds. Holo sat down next to the two. ''"Aedel,
      you should go downstairs and tell Adams about what happened back there. I"ll stay here with them.'''' The wolf nodded,
      going down the inn"s stairs and sitting on a chair next to Connor and Adams". The wolf explained all of the details
      to Sam Adams. ''''...and that"s pretty much it.'''' The man looked a little confused. ''"And what about the Governor?''''
      he asked. Connor replied to him, getting out the letter he picked up from the Governor"s desk. ''"Seems like he made
      fun of us and ran away again.'''' ''"I see...'''' Adams seemed thoughtful. ''"Well, at least you"re all safe, that"s
      the most important part!'''' he said, enthusiastic as always. The two Assassins nodded, and they talked the night away.
      Votie woke up early in the morning. She looked around weakly, trying to get her bearings. The servant looked at her
      with a smile, putting her hand on Votie"s head, taking her temperature. ''"You"ve healed good dear. But don"t go running
      out yet, else you"ll get yourself hurt again.'''' She smiled warmly to Votie. ''"W-Where"s Mom?...'''' Votie asked.
      ''"Master Aedelwulf and Miss Holo went this morning to get her I think. They should be back quickly, don"t worry.''''
      she said gently. Votie looked at her tail, weakly pulling herself up on her arms. ''"Try not to move your tail too much
      either, your bones were crushed a little, they"re fixed now but the wound"s not completely healed yet.'''' the servant
      said to Votie. Holo and Aedel went inside the mansion again, running through the corridors, opening every doors. When
      they finally found Ukraine, she was sobbing on her bed, but England was nowhere to be found. Ukraine closed her eyes
      tightly as the light flood the room, looking frantically as her eyes adjusted to the intake in light, expecting England
      to be there once more. ''"Miss Ukraine.'''' Holo said to her gently. ''"It is Aedel and I. We"re bringing you back to
      safety with Votie. Any objections?'''' she says, smiling warmly. She shakes her head, standing on weak legs, wanting
      to exit the building as quickly as possible. ''"Here, let me help you.'''' Aedel said, taking her in his arms. They
      went back to the inn, and did the same thing as before for Ukraine, healing her as well. Votie, despite not being able
      to walk, jumped into her mothers" arms, nuzzling and purring and taking in the warmth of her chest and finding solace
      in the beating of her heart. ''"Glad everything is back to normal.'''' Aedel said, walking in the room. Votie"s ears
      turned towards where Aedel"s voice was. She purred even louder. The wolf smiled at Votie. ''"Well! Whenever you feel
      like it, we"re having dinner downstairs. See you then.'''' Aedel walked back out and went downstairs, along with Holo,
      Connor and Adams. Votie snuggled into Ukraine, shifting into a cat, licking Ukraine"s head as she shifted into cat form.
      In one swift motion Ukraine had her scruff in her mouth, carrying her downstairs. The day ended softly, a more festive
      mood setting in the inn. Holo noticed Votie eyeing her scarf intently, tail swishing as much as it could, her rear wiggling
      in the air. Holo looked at Votie who was trying to play with the scarf. ''"Haha, silly cat!'''' She gave her the scarf.
      As soon as Votie got it, she started wrestling with the fox fur, playing happily as Holo laughed slightly to the scene.
      Author"s Note: Hey! Sorry for not posting in such a long time, had alot of things going on (again, I"m all sorry about
      it) and couldn"t post. This is the end of the 1700s years and now moving towards 1939 in the next chapter. By the way,
      big thanks to Votie for her support and ideas for the story and last chapter (Love ya!) and see you all whenever I"ll
      post next chapter! Writer-Wolf, out! Wolf and History Author"s Note: Chapter 13 is up! It went quicker than expected,
      Votie and I felt inspired alot lately and thus we"ve been able to put this chapter quickly thanks to it! Wait no more,
      here"s chapter 13! Chapter 13: Wolf and Cold Grounds ''"It was a harsh winter. The winds blew as if they were mad, and
      snow was swirling around us in a beautiful dance. We were four, walking to a small building I called home. We were back
      in Lonoare.'''' Aedel opened the frozen door of their home and let the three women behind him get in as well. He closed
      the door behind the group in a sigh. ''"Damn it"s freezing, even though I"m used to it I must say it"s a harsh night.''''
      Votie grinned, her tail swishing under her jacket. "What"s wrong big brother? Can"t take the cold?" She smiled playfully
      at him. ''"Well...'''' he said to her, putting his tongue out to her in a just as playful way. ''''...we just took a
      boat from America, I got seasick a little from it, we ran and walked for miles in harsh snow, and I have to get used
      to the weather again because America is so hot in summer!'''' he said, laughing a little. Ukraine smiles, holding her
      daughters hand as they got everything situated. ''"Welcome to our humble home!'''' Holo said to her with a smile. ''"I"m
      glad we"re back here!'''' Ukraine smiled as well. ''"It"s a beautiful home you have there. To make it even more perfect,
      could I make dinner for us?'''' ''"Sure!'''' she replied. As Holo showed to Ukraine where everything needed for cooking
      was, she lit up a fire from their little fireplace to warm the place up. ''"Here...'''' she said, lighting the wood
      up with a flint and a small steel piece. ''"That should do it.'''' She turned around to see Aedel laughing while Votie
      played and wrestled with him. After a while, the group ate dinner. The atmosphere was a jolly and warm one, to which
      Aedel didn"t complain about. It had been so long since he wanted to get back home. Feeling comfortable and nice again
      made him wonder why he hadn"t come back earlier. ''"Wars, problems, everything...'''' he mumbled to himself, eating
      a potato piece from which they had bought earlier in a small town nearby. ''"It"s crazy how it changed so quickly...''''
      the wolf mumbled again. "Change is imminent sadly. Everything and everyone is changing at any given moment, and for
      the most part there"s nothing that can be done." Ukraine smiled sadly, eating her dinner quietly. ''"I guess you"re
      right.'''' the wolf shrugged. Suddenly, the wolves heard a knocking on their home"s door. Wondering who it was, Aedel
      got up and went to the doorstep. Finland knocked on the door again. ''"It"s Finland, let me in, please.'''' the man
      said in a serious voice. The wolf opened the door to him with a confused look on his face. ''"Come, come. Why are you
      here?'''' he said, closing the door behind him. ''"I must ask you something, Aedelwulf.'''' the man replied. ''"If I
      were to need you to fight with me in a war, would you accept?'''' Aedel replied to him with a sigh. ''"Guess I don"t
      have much of a choice... Can"t anything go right for a single day?'''' Finland sighed in relief at the answer. ''"Thanks.
      I"m off again, sorry for interrupting your dinner.'''' he said, running back outside as the wolf closed the door again.
      ''"Can"t anything go right...'''' he mumbled again. "I thought you liked going to war." Votie said, wondering about
      the validity of that statement. ''"Oh, but I do.'''' the wolf replied to her. ''"Just sometimes I wish we could have
      a small break to relax.'''' The cat looked down to the ground with a sad face. "Same here..." ''"I"m wondering who"s
      in war again, and why Finland would need us to help him.'''' Holo said to the group. The others shrugged. Votie got
      up quickly and went to the house"s door. "I"m going to go talk with him. I"ll be back later." she said before running
      off. Aedel nodded to her as he got up the small stairs leading to his fireplace and the kitchen, and put some wood in
      the fireplace. Votie ran down the path leading to their home, pulling her jacket closer to her body, looking every which
      way for Finland. After a little while of searching, she found him getting out a small building that seemed like a shop.
      She waved to him, grabbing his attention before sprinting to shorten the distance between herself and him. As she caught
      up she was panting heavily, catching her breath. "Hey... I wanted to talk about what you said earlier... What"s been
      happening?" ''"Well...'''' he started. ''"I don"t want to reminize you about bad moments, even though you might not
      remember it, but ever since Russia died from the guillotine back in 1500, the Russian government went wild and everything
      got wrong with a man named Lenin lately. Now they have a new governor, Stalin, and they want war against Germany and
      want to take our lands to make war to them.'''' "What!? I knew this would happen! If only I could"ve saved him..." She
      shook her head, looking back at Finland. "Thank you. I"ll relay the information back to Aedel and we"ll be ready to
      help as soon as possible." Finland nodded back at her and went to another house, a long night ahead of him. ''"They
      want war with Germany?'''' Holo asked Votie as she gave them the information. "Yes. As of right now I don"t know why
      however. I know the outcome will be horrendous though just from judging the two.'''' Votie replied. ''"I see.'''' Aedel
      said, thoughtful, putting his hand under his chin. ''"If I"m correct it won"t be an easy task to repel so many men.
      Russia"s army is made out mostly of soldiers.'''' Ukraine looked down sadly, looking away from everyone else. ''"Well,
      as long as war isn"t at our doors I guess we"ll be just fine.'''' Aedel said, sighing. A few months later, Russia started
      to invade Finland after a refusal of mutual assistance from the country. War was officially started. The morning was
      a cold one, the winter was just starting. The wolves were standing next to a bunch of Finnish soldiers, as well as a
      few Germans. ''"Garde à vous!'''' the commander said to the soldiers in front of him. The group replied by a military
      hand on their forehead. ''"Soldiers! Russia has decided to invade our beautiful country in order to take our lands for
      their own! They are actually marching towards us at a quick rate! They"ll be here in a few months, until then, you all
      need to learn the basics of military training! You!'''' he pointed at Holo. ''"Show our soldiers how to move quickly
      on a field! I feel you"re quite the agile type!'''' Holo smiled as she advanced towards a small parkour made of a few
      rubber tires. She ran through the tires, over a fallen tree, and over a few walls easily. ''"Good job!'''' the commander
      yelled at her in the distance. ''"Now!'''' he said, turning towards the other soldiers. ''"The Miss will show you how
      to move like that, and make you agile people as well!'''' ''"YES MY COMMANDER!'''' the soldiers replied to him, with
      a hand on their forehead again. Votie watched the soldiers train, wondering what to do, staring at the sky absent mindedly.
      The commander came to see her in a quick sigh. ''"Whew. Not at all easy to yell like that.'''' he said with a smile.
      Votie shrugged, smiling. "I find it easy." The commander laughed a little. ''"For you it must be!'''' He pointed at
      Aedel and Holo. ''"Do you know those two? I feel like I"ve seen them before but I can"t put my finger on what their
      names were.'''' "Yeah." She pointed to Holo. "That"s my big sister, Holo..." She then pointed to Aedel. "...and that"s
      Aedelwulf, Holo"s mate." As she said so, her tail swished, her ears drooping just a bit. ''"I see.'''' he said, thoughtful.
      I felt like there was something between them earlier so I was wondering. A few moments later, all of the soldiers had
      done their agility training. ''"Troops!'''' the commander yelled. ''"It is now time for a much different kind of training!
      Most of you have already held a rifle in their hands, but it doesn"t mean you were all good with it!'''' The commander
      went to Aedel. ''"Aedelwulf! Have you ever held a rifle, or shot one before?'''' The wolf replied quickly. ''"No, my
      commander!'''' The commander smiled. ''"Then you shall be the first to train!'''' The Assassin wasn"t sure about himself.
      ''"Yes, my commander.'''' he said, unsure. The high-graded gave him a Karabiner 98k and took him to the shooting range.
      ''"It is quite simple! You see those wooden pieces? You need to aim in the middle of the circles on each of them! The
      circle and the small bar you have on your rifle"s end must be perfectly equal on both horizontal and vertical sides
      so that you aim right! To put another bullet in the chamber, just pull the handle on the right of your rifle! Now try
      it!'''' he said to the wolf. Aedel slowly advanced towards one of the shooting spots and started aiming. ''"Circle and
      bar, equal...'''' he mumbled as he aimed at one of the wooden pieces. He then shot on the target. ''"Good!'''' the commander
      said as he went to see where the shot was taken. ''"You need to aim a little more left, when you shot your arm must"ve
      went a little to the right side! Another trick, try holding your breath while aiming, it"ll help!'''' The wolf tried
      again as he mumbled the same ''"Circle and bar, equal...'''' again. He then took a shot almost in the middle of the
      target. ''"That"s much better, congrats!'''' the commander said to him. ''"Everyone take a place and try yourselves
      out as well! Rifles are in the back, ammo as well!'''' he yelled to the soldiers as they went to train. Votie watched
      them, Ukraine sitting behind her. Votie"s ears flattenned out to her head more as the day went by. She eventually went
      to take a walk, looking down at everything to try and clear her head, though finding it unsuccessful. Her mind flashed
      back to her and Latvia"s first date and she sighed sadly at the memory. "Big wolfy is lucky... Him and Holo are never
      separated... They"re always together... Why can"t Latvia and I have what they do...?" Her tail laid limply behind her
      as she kept her slow walk towards nowhere in particular. Hours later, they went back home and as they walked, Holo noticed
      about Votie"s down. She came closer to her sister. ''"What"s wrong?'''' she asked. "Nothing... I"m fine" Votie replied
      to her, quickly getting away from the wolf. ''"Alright.'''' Holo simply shrugged. Back in their home, they cooked dinner
      and went to bed quickly, as many harsh days were coming towards them, and they"d need all the energy they could get
      from sleep to be able to get through them. Votie and Ukraine headed up to their room, Votie wishing she could see her
      husband again, crying into her pillow. The next morning went by quickly as the wolves trained and helped their military
      companions to train as well. Eventually the sun rose up in the sky and as the group was eating some of their food, the
      commander went to Votie who was sitting with Aedel and Ukraine. ''"Miss Votie?'''' he asked. ''"May I talk with you
      for a second?'''' "Sure..." The cat went to see him. After a few steps the commander started talking. ''"I noticed you
      don"t train with your friends, and it"s not like I want you to. War is an extremely dangerous thing, especially in these
      days. I was wondering if I could do anything for you, I also noticed you were feeling down a bit yesterday, and I was
      wondering as I said if I could help.'''' "Thank you for the offer, but no, it"ll be alright... I can go train now if
      you"d like me to.'''' ''"Alright.'''' the commander shrugged. ''"If you want to train, guns are in the back, and pick
      up some ammo from the ammo crate next to it.'''' he said as he went back to look at how his soldiers were doing. Votie
      went to get a rifle. She practiced even when the others had long since stopped, silently praying that her husband was
      alright, knowing that she wouldn"t be able to see Latvia.'
  - source_sentence: 'She"d noticed in the center of the room that Cassie was slowing down in her frantic scribbling, focusing
      on a single sheet of paper for more than a few seconds. That meant she was seeing something clearly. Something that
      mattered to her. Or someone that mattered to her. That could mean... "What do you see, Cassie? Who do you see?" Agent
      Hollis leaned down, trying to keep her face open and inviting. Cassie didn"t answer, just switched the colors in her
      hands, adding tiny details to the object she was drawing. Agent Hollis looked over to the other agents and shrugged
      at their impatience; they"d learn soon enough it wasn"t easy to hurry this Watcher along. She"d lose the vision if they
      weren"t careful. Agent Hollis sat back on her heels, and waited. She"d only Push the Watcher if she had too, if she
      didn"t answer or tried to move to another sheet of paper without explaining. After a long moment of the younger woman
      choosing one final color and adding her signature in the corner. She still didn"t speak, and Agent Hollis sighed. Plan
      B it was then. "Tell me what you see, Cassie," she said and pushed, her eyes going blind for a moment as she exerted
      her will over the other woman. Cassie swayed, her eyes narrowing as she glared for a moment, making it clear she knew
      full well that she was being influenced. Then the ragged blonde shook all over and shrugged, then held the image out
      to the agent. "It"s just a lily, Kira. A pendant." She smiled down at the image she"d drawn, and then spoke so softly
      the other woman almost didn"t hear her. "He gave me a flower..." At her words, the agent felt a ripple of excitement
      and then vicious jealousy sweep over her, but she ruthlessly buried both before they could affect her. There was too
      much work to do for her to become distracted. She took the picture Cassie had offered and rose, turning to the agents
      under her command. "It"s time. He"s coming for her." Hope you enjoyed! I"m probably going to be posting chapters ever
      day or so - I didn"t want to spam your inboxes! Chapter 1 "Yesterday" has gone,Future"s coming next.So move, clock"s
      on.It"s a countdown... "In a Row" - Nothink Nick checked his watch again and resisted the urge to drum his fingers on
      the steering wheel, knowing it would only earn him a sharp comment from the Shadow in the passenger seat. And they couldn"t
      dissolve into an argument again, not now, not when they sat literally right around the corner from the lab where the
      Holmes woman and one old friend were being held. He settled for picking up the envelope on the console between them
      and running his fingers silently along the folds, not opening it, though, not yet. Not until 2:58 on the dot. God he
      hoped Cassie would be ready. That she even could be ready, considering the cocktail Division likely had her on. "You"re
      sure she"s seen-" "The pendant up against a digital clock stopped at 3:00 p.m. exactly. As I told you the last time,
      and the time before that." Mitchell Bryce didn"t bother to turn to look at Nick, but the Mover could imagine the annoyance
      in the Shadow"s dark eyes. He knew that the Shadow had in fact told Nick more than once now, and knew too that Bryce
      needed to rescue his cousin and so had every bit of a stake in the success of this mission as Nick did. With that in
      mind, Nick tried again to calm the impatience welling up within him. He"d have thought the months without word or hint
      of Cassie"s location would have been worse, but it seemed having her just out of reach was driving him even more crazy.
      It was just... they were so close. After nearly 6 months of planning and scraping and doing everything in his power
      to find her, to get some bead on where the hell Division had taken his lover, they finally were in position to begin
      the rescue, to fight back and take her back from the bastards who had stolen her from him. "God, I hope Emily gets here
      soon," Nick cringed as the words slipped out, half expecting Bryce to snap. When the expected sarcastic comment didn"t
      happen, he risked a glance over to see Bryce"s face carefully blank, his hand half-hiding his eyes. After a moment,
      the dark-haired man sighed and straightened. "The lovely Ms. Hu will be here." He tugged as his tie and smoothed down
      imaginary wrinkles, the only sign that he might be as stressed as Nick was. "She risks losing too much not to arrive
      on schedule." Nick nodded, and scrubbed a hand across his face. He knew all too well Emily and Bryce had lost someone,
      lost the same someone as a matter of fact. And it was unfortunately likely due to the somebody he"d lost. Cassie"s gifts
      were always stronger when it came to her friends and family, and there wasn"t much chance that one after another of
      some of their past contacts were getting snatched up after she was taken was just a coincidence. Hook Waters had been
      only one of those scooped up by Division. At least there was a chance to get Hook back, or as much of a chance as getting
      Cassie back. He was the only one so far who was actually being kept in the same Division lock up as his Watcher friend.
      He and their original rescue target, Anna Holmes, Cassie"s mother. She"d been who they were trying to rescue in the
      first place those 6 months ago when the mission had gone so very wrong. He still wasn"t totally sure what had... He
      shook his head at himself. He knew exactly what had gone wrong - Ms. Kira Hudson, or Agent Kira Hollis as she seemed
      to be called lately. They"d thought she was fine after the mess in Hong Kong. She"d rendezvoused with he and Cassie
      as planned, and for a while the three of them, he, Kira, and Cassie, had done fairly well moving from city to country,
      laying low and keeping under the Division radar. It had almost been like a family - almost. If not for the sheer bitchyness
      that was Kira and Cassie alone in a room together for any length of time at all, he might have been perfectly happy,
      or as happy as a group of psychics on the run could be. But then... Then Kira started Pushing, and not just marks around
      them, but Nick himself, and Cassie. Pushing them to do things that just didn"t make sense. Petty things, like Cassie
      refusing to speak to him for days, or Nick locking Cassie out of their current squat in the middle of a thunderstorm.
      Nick talked to Kira, Cassie screamed at her, and their various friends when they were allowed took turns trying to explain
      just how utterly invasive being Pushed really was. But Kira didn"t stop. Didn"t seem to want to. And as for the rest
      of her behavior, it was increasingly erratic, until finally she all but walked back into Division hands. For all he"d
      once promised to keep looking, to always come for her, Nick couldn"t go after her that time. Not this way unfortunately.
      In any case, Kira"s little stunt had put Cassie in front of a bullet, and Nick"d had his hands full trying to keep the
      young Watcher from bleeding out before he could find a Stitch to patch her up. By the time Cassie was out of the woods,
      Kira and the Division Sniffs and Pushers who"d managed to snag her were gone. Back to the U.S. and whatever facility
      was deemed proper to re-integrate a psychic and possibly an agent who"d been on the outside as long as Kira had. In
      any case, Kira"d been M.I.A. for several years, and Nick, he hadn"t missed her as much as he might have expected. He
      still had Cassie, and in the coming days as they both grew older and somehow wiser, that impractically dressed and ancient-eyed
      young woman meant far more than Kira ever did. If forced to choose between them, and God knew he really had been forced
      to choose between them, Cassie came first and would continue to come first, no matter what. He just hoped he wouldn"t
      have to deal with that choice right now in the midst of their rescue mission. Word on the street had it that an Agent
      Hollis was likely part of the team keeping tabs and guard on Cassie and Anna Holmes. If it was the same Hollis that
      Carver had thought Kira to be, they could be in deep shit. Kira"s presence complicated things even more than the rescue
      itself. With Carver long dead, she was definitely the strongest Pusher on record, and while he and Cassie had some experience
      with holding her off, no one else on their team did. And even he and Cassie could only hold her off to a point. Worse
      was the fact that Kira might very well have shared the trick Nick had figured out to avoiding Watchers all those years
      ago in Hong Kong with her superiors. If that happened, this mission would be over almost before it began. He set the
      letter back on the console carefully, and then his fingers drifted up to his throat and the pendant he"d taken to wearing
      under his shirt after Cassie"d been taken. He"d meant to give it to her as both a birthday present and celebratory gift
      when they"d rescued her mother. That hadn"t happened, obviously. The pendant had come to mean both hope and failure.
      Just the chance of the former kept him wearing it though, needing that fragile connection with the woman he"d lost.
      Nick barely heard a slight snort from the other man in the car and he jerked his hand away from the pendant with an
      embarrassed cough. Bryce didn"t look over, just smirked knowingly out the window. Nick ignored him best he could, and
      checked the clock again. Almost time to open their respective envelopes. Nick was fairly sure he knew his part in the
      plan already, but there was no knowing for sure until he read the instructions Emily had written. Instructions she should
      be wiping from her memory as they waited. But she"d said she"d meet them here after that. So where the hell was she?
      He shook his head and hoped the other two members of their merry band of idiots were in position. There was no way to
      check at this point, but if they weren"t... Well that would blow any chance of getting into the facility itself. He
      glanced at the clock and started: 2:58 p.m. He all but lunged for the envelope again, and this time Bryce looked anything
      but smug, leaning in to look at the card himself. His wasn"t set to be opened til 3:43 p.m., and Nick didn"t even want
      to consider the stress that time period would be causing the Shadow. Nick pulled out the card and flipped it over to
      read. "Drive straight to the gates then drive straight through them - 3:00 p.m." He blinked and raised an eyebrow at
      his companion. Bryce shrugged, and Nick turned the key in the ignition starting the engine. The clock changed to 2:59
      p.m., and Nick felt his blood begin to pound. They had one minute and if Emily hadn"t shown by then, they"d need to
      go without her. That would make finding their targets in the facility that much harder to track, but they wouldn"t have
      a choice. He drummed his fingers on the steering wheel as the seconds ticked away, finally not caring if it bothered
      the man beside him. 10, 9, 8... He flexed his hands and moved one to hover over the gearshift. 3, 2, 1. 3:00 p.m. Nick
      slammed the SUV into drive and gunned it, slamming his foot down on the accelerator and the vehicle all but shrieked
      into motion. He barely slowed at the stop sign at the corner, wheeling the SUV right and sending Bryce almost sliding,
      his hand on the door and his seatbelt the only things keeping the Shadow securely in his seat. They roared down the
      street and toward the facility entrance at the far end. The massive gate at the entrance was visibly shut, and Nick
      swallowed as he stepped even harder on the accelerator, pushing the SUV to even higher speeds. As they approached Nick
      forced himself to let go of the steering wheel with one hand, preparing the Push the shit out of the gate if it didn"t
      open on its own. At the very last second, he saw the massive pieces of metal begin to slide apart. "Thank you, Matthew,"
      he muttered with a grin and slammed his foot on the accelerator again, sending the SUV flying past the gates and the
      guard station where he just barely saw the agents beginning to panic. Phase One fucking complete. Nick continued to
      drive, wheeling through the large parking lot to a side entrance Matt"s intel told them might be the closest way to
      reach the Holmes women. He glanced in the rearview mirror to see another pair of SUVs barreling their way in behind
      him. "Seems the ladies have arrived on schedule," Bryce said from beside him, his smirk showing his satisfaction at
      the turn of events. One of the vehicles followed close behind him, Emily likely at the wheel. The other spun to face
      the gate almost as soon as it entered and a barrage of fireballs began to fly from the open drivers side window to the
      guard station. Their favorite little pyrokinetic, Lex, was clearly having the proverbial and literal blast with the
      distraction role she was playing for their mission. Nick could only hope she"d keep moving fast enough to evade the
      agents that would soon come storming after her in the absence on any other intruder to follow. She should be fine though,
      he reminded himself. According to the rumors, Lex had kept herself out of Division hands her entire life using only
      her pyrokinetic tricks, an impressive set of street smarts, and a kick ass driving ability. Or so he"d heard. He wished
      her well silently - she was on her own for a while or at least as long as Bryce could pull off Shadowing all three of
      them as they entered the building. Nick came to a screeching halt with Emily right behind him. All three psychics ran
      from their respective vehicles, engines still on and running. With any luck, they"d stay that way - facilitating the
      quick getaway they"d need if the mission proved to be a success. The three of them pounded up the exterior steps to
      the door, pausing only a moment before the internal lock triggered itself and they entered. Once again, Nick thought
      a heartfelt "thank you" to the young technopath they"d met only months before Cassie"d been taken. Nick doubted they"d
      have ever narrowed down Cassie"s location without the Tech"s help, and he was still proving his worth with every damn
      move they made. It was almost enough to make Nick ignore the younger man"s obvious crush on Nick"s Watcher love. Almost
      anyway. The hallway the door led to was clear, but the first passageway off to the left definitely wasn"t. Nick didn"t
      even have time to Push the agents - Bryce was already moving, breaking into a sequence of viciously efficient martial
      arts that had the trio of Division goons out cold with what looked to be very little effort. That talent had not been
      something the Shadow had mentioned. Handy little trick. Nick couldn"t help the whistle that escaped his lips, but Bryce
      barely acknowledged it, straightening his jacket almost casually. Behind them, Emily had used the momentary distraction
      to strip off her gloves, reaching each into the pockets of her jacket to pull out two objects - a cufflink and a pen,
      previously owned by Hook Waters and Cassie respectively. With Nick and Bryce guarding her, Emily brought each item up
      to her face allowing the psychic "scent" to seep into her hands as the Sniff activated her psychometric gifts to the
      forefront of her mind. She swayed as her gift took her for a moment, and then shook her head to clear it. "Cassie is
      down that hall and up 2 flights of stairs. Behind the blast doors in the... fifth room on the left. She seems stationary
      for now." Emily turned her head to blink down the hallway just ahead of them. "Hook - he"s that way... but he"s moving.
      I can"t get a clear fix on his location." It didn"t take Nick even a moment to make his decision. "Bryce take Emily
      with you. Head after Hook. I"ll get the women." Bryce didn"t bother to nod, just took Emily by the elbow and set off
      at a swift jog down the hallway, leaving Nick to set off in the other direction. Chapter 2 I don"t know where we"re
      headingI"m willing and ready to goWe can"t drive it so fast we just need to slow downAnd just roll Anything that"s worth
      havingIs sure enough worth fighting forQuiting"s out of the questionWhen it gets tough gotta fight some moreWe gotta
      fight fight fight fight fight for this love "Fight for this Love" - Cheryl Cole Nick burst through the door to the stairwell
      and started climbing up at a run, knowing he"d need to move fast now that his Shadow was heading to another part of
      the building. At least Emily and Bryce might get safely to Hook without a Sniff catching on to that goal. He was on
      his own, not that he"d really thought a Shadow would help much at this point anyway - any Division goon worth their
      paycheck would know exactly where Nick was headed. He kept climbing, keeping his mind on Cassie as his goal, knowing
      he needed that mental encouragement. He heard a slam and looked up startled as he reached the first landing and looked
      through the window slit in the door to see an agent pounding on the door to the stairwell. For some reason the door
      wouldn"t open even when he swiped his access card. Nick grinned and tossed a quick salute at the camera in the corner
      then kept climbing to the next floor. He paused at that landing, seeing several other agents waiting through the window,
      all apparently having the same trouble getting through the lock that their counterparts downstairs had. Nick let out
      a long breath and twitched his fingers as he brought his power to mind, then he nodded at the camera and hearing the
      lock disengage with a metallic click, he wrenched open the door off its hinges with his gift and then sent it slamming
      back through into the hallway knocking two of the waiting agents sprawling. The other few were handled with another
      quick wave of Nick"s hands slamming into the walls, ceiling, and floor like pinballs. Nick barely spared them a glance
      beyond a quick check to make sure they were well and truly out cold, before he was moving again and heading through
      the blast doors down the hall. They slid open as he approached. He paused a little into the hallway, surprised that
      no one was waiting to attack. Then he just shook his head, chalking it up to the Tech guardian angel watching from through
      the security system. He half jogged down the hallway, counting doors until he reached the fifth door, still half cringing
      at the thought of the sound of phantom footsteps around him. He took a deep breath, feeling something inside him tremble
      in hope that this really might be the door he"d been looking for these past many months. Then he softly pushed it open.
      "Hey, Nick," her soft voice reached him before the door was even open, and he felt his knees go weak as he finally saw
      her smile, alive and in front of him. Her eyes were glassy, likely due to some drug Division had shoved through her
      system, but they were steady despite it. Nick smiled to himself remembering how she"d long ago told him that she and
      her mother both saw more clearly when drunk off their asses. Cassie had since proven that more than once on their time
      on the run, and he had a sudden suspicion that held true to just about any type of intoxicant. Clearly the Division
      goons were even dumber than he"d thought. Though that certainly explained how Cassie"s mom had managed to keep her schemes
      in motion, even in Division"s hands. "Hey, you," he replied softly, stepping into the room and wrapping his arms around
      her, allowing himself a slow shaky breath at the feel of her back where she belonged. "You ready to get the hell out
      of here?" "Oh yeah." The grin was clearly forced, and Nick felt himself cringe inside at the dark circles under her
      eyes, but something about the tilt of her head said her attitude was still there. That part of her that was always willing
      to step up against anyone who wanted her to back down. Whatever they had her on, they hadn"t managed to break his feisty
      little Watcher. With that reminder firmly in his mind, he pulled out of the embrace, his hand finding her"s instinctively
      as they turned back to the door and slipped quietly out into the hall. They were almost to the blast door when he heard
      the sound he"d been so paranoid and waiting for, light footsteps with that click of high heels. He stiffened and then
      turned to put himself between Cassie and the woman at the other end of the hall. The pair of women he realized as a
      second moved from behind the first, her dark form almost more a shadow that a person. The first, of course, was Kira
      as he"d known in the pit of his stomach it would be. She strode forward slowly, as if stalking toward her prey. Nick
      glanced back over his shoulder looking for a way out, but the blast doors were closed, and in any case, there though
      the glass were at least some of the agents he"d knocked out on his way in, and it wasn"t likely they"d let the pair
      of psychics past them easily. Not after the humiliatingly easy way Nick had gotten past them to get to Cassie"s room
      there in the first place. "Well shit," he heard Cassie mutter from behind him, and he heartily agreed. This was not
      going to go particularly well. "Hello, Nick," Kira said as she paced toward him. Her voice was serene and almost casual,
      and Nick suddenly remembered the way her voice had been all those years ago back in Hong Kong when he"d gone to find
      her in Carver"s thrall. She"d been cruel then, and she"d only gotten worse with time. That didn"t seem to have changed
      either. "So nice to see you again, though not exactly what I would have expected. Not considering your promise to me."'
    sentences:
    - 'A short burst of gunfire brought her slamming out of her reverie, and she noticed Taka passing a single corpse without
      a second glance. She moved nervously to the side as she and then the pair behind her moved past the corpse in turn.
      She"d seen no evidence yet that the bastards might move even after a bullet to the brain, but if they could move after
      looking otherwise dead due to infection, who was to say? In any case, Dannie sure as hell wasn"t to take the chance
      of standing within reach of one of them. Not if she could help it. She kept closer to Carlos after that, trusting in
      the leader"s aim and arsenal just the slightest bit more than the others. She needed that reassurance right about now,
      with each new infected they saw, and then killed, she was reminded of just how helpless she was. She found her hands
      itched for her tiny little Bodyguard model pistol that she usually kept in her purse. When she"d announced her intention
      to work with the military overseas, her brother had insisted on her knowing how to use a weapon competently. He"d bought
      her the little handgun, and he"d then ruthlessly trained her until she could accurately empty the entirety of the tiny
      weapon"s 6 shots in the clip and 1 in the chamber into the target"s forehead. That she"d never actually used that training
      during her relief work wasn"t important; the lessons and practice had grown into their weekly Friday lunch sibling date,
      one she"d never missed since they started the tradition a couple years prior. Carlos opened fire again, this time on
      a trio of infected huddled awkwardly around an SUV, and it occurred to her that she"d likely be missing that tradition
      tomorrow. It was all too likely that her brother would end up among the missing, too. She shivered and fought back tears
      at the thought, hoping the men hadn"t noticed. She forced away the melancholy thoughts, and tried to distract herself
      by guessing how many different types of weapons the men might had tucked into their uniforms. That didn"t help her mood
      all that much, as the concept only reminded her that she had exactly zero weapons stored about her own person. She resolved
      to ask the men to give her a pistol, a knife, hell just something resembling a weapon as soon as they reached a pause
      in their trek. Finally, she was pleased to see the guard stand at the bottom of the garage, signaling a halt to their
      slightly dizzying descent from the 3rd floor to the street level. Carlos and Taka approached the booth cautiously, clearly
      keeping an eye on both the guard stand"s sliding door and the entrance to the street itself. Dannie almost followed
      close behind them, but Nicholai"s hand on her shoulder kept her still. "Open space could mean an ambush. Wait until
      they check it out," he whispered down to her, and she nodded silently, moving backwards slightly to place herself in
      the more protected position between the redhead and Yuri. She kept her eyes fixed on the pair in the lead, feeling her
      heart rate quicken without warning at her anxiety for the men. It wasn"t that surprising their health had become her
      problem; if even one of their little band fell, the odds of any of them surviving the night would drop that much lower.
      And fuck if she didn"t know the odds of survival were pretty damned low to begin with. Carlos inched toward the guard
      booth with Taka covering him. He was nearly to the door hanging just ajar when a snarling four-legged figure hurled
      itself out of the booth through the window. "Son of a bitch!" None of them blamed Carlos for the outburst, nor Taka
      for the spattering of Japanese curses that followed as they fired on the charging creature. Finally the thing lay dead,
      and almost as one, the five of them crept close to peer at it. "Was that a goddamned cocker spaniel?" Yuri asked, clearly
      offended by the very idea. "Looks like. Apparently the infection is transferring to animals, too. Great," Carlos answered,
      his face just as disgusted. He shook his head and straightened. "Come on, let"s keep moving. There"s nothing else here."
      He moved into the lead again, pausing at the garage entrance, and then waving the others forward. They turned onto the
      empty street, and Dannie rubbed her arms as the eerie quiet sent a chill down her spine. At least it was the only chill,
      she noted. She normally got cold easy, but the heat wave was keeping her relatively comfortable even in the skirt and
      thin cap-sleeved shirt. What almost sounded like the wind echoed down the street, and Dannie paused, barely noting that
      the men had paused with her. Was that moaning? It only took a moment for the significance of the sound to sink in, and
      then Carlos was ordering them to move. Together the quintet sprinted for an alley way, ducking down the narrow passage
      as a crowd of infected turned onto the street they"d just been on. There was no way of knowing if the infected had seen
      or sensed them, and the group of soldiers and single civilian keep up a brisk pace, running down the alley and then
      turning onto another, even more deserted back street. They slowed to a jog and then to a walk, and then came to a halt,
      Dannie stumbling to lean against a wall. "You all right there Dannie?" Carlos called quietly, and she waved his slightly
      superior concern away, still too winded to reply. She had not signed up for long distance sprinting, and damned if she
      didn"t need a minute to catch her breath. She didn"t get it; Carlos was turning away, the smirk once again on his face,
      when Taka let out a strangled shout and a mutilated monstrous something came leaping into their midst. The men opened
      fire, more on instinct than with a clear clue of what the fuck their attacker was. Under the rain of gunfire, the gruesome
      thing fell fairly quickly, but another shout, this time from Dannie as she stared upwards in horror warned the men that
      the monster had not been alone. This one seemed smarter, or at least more agile. It jumped and ducked, avoiding the
      bullets the men were firing desperately. Dannie just tired to stay clear and out of their way, praying to God she wouldn"t
      be a distraction to any of the men as they faced off with that thing. She did, of course, but damned if it wasn"t her
      fault. It was the creature"s. It leapt from one building to another across the alley way, landing and then clambering
      down the fire escape directly above Dannie. An enormously long tongue whipped out and down, grabbing her knot of hair
      and lifting her screaming from the ground, pulling her up toward a gaping mouth. Gunfire sounded again, this time terrifyingly
      in her direction. Dannie didn"t know whether she was screaming about the creature with its tongue in her hair or the
      bullets flying past far too close for comfort, all she knew was that she was terrified and helpless. There was a garbled
      roar of pain above her and then she was dropping painfully back to the concrete, parts of a long whippy tongue falling
      down on top of her. She scrambled backwards just in case the creature decided to chase after its escaped meal, instinctively
      craving the comfort of the wall, though it hadn"t been much help before. A creak of abused metal suddenly cut through
      the sound of gun fire, and she looked up again, her mouth open in shock as the fire escape creaked again and began to
      fall. For just a moment everything seemed to stop, and she could have sworn the world itself when silent as the metal
      began to crash towards her. "I"m going to die," she mouthed. Then she was hit by a solid dark mass, lunging in and throwing
      her clear of the collapsing structure. She was tucked under a larger body, and she simply held on as the crash of the
      fire escape and the hopefully deceased creature slammed into the pavement only a few feet from them. There was another
      moment of silence, this time genuine, as the survivors collectively held their breath, as if unsure they"d really managed
      to escape this last round of death and destruction. Finally, Dannie coughed, clearing her throat of the dust the crash
      had thrown up. As if that was a cue, the men began coughing and cursing around her as well. "Fucking shit," she breathed,
      too out of breath to really yell. "What the fuck were those things?" From where he"d landed more than half on top of
      her, Carlos shook his head. "Not a clue." He pushed himself shakily to his feet and offered her a hand. She took it
      with a faint sense of déjà vu, and stood even less steadily than he had. "I think the file called them "lickers.''"
      Nicholai stumbled up from their far side, easing around the fallen monster and twisted metal with a look of distaste.
      "Lickers. Really." It was far from the title Dannie would have chosen for the monsters, but Nicholai seemed unfazed.
      "Lickers. For the tongues, you see?" He made the motion of a long tongue falling out of his mouth, and then to her mild
      shame, Dannie started to giggle. It went on longer than she"d expected, her giggles giving way to hysterical laughter
      as the sight of yet another creature, this time having met a truly gruesome end right in front of her, sunk in. The
      laughter dragged on and tears began pouring down her cheeks, and she tried to bring herself under control, knowing she
      was finally falling prey to shock and hating that the soldiers around her were witnessing it. "At least someone is having
      fun." Yuri"s voice was cold, and something made her laughter die in her throat. Nicholai glared at the other man, but
      Dannie frankly was gratefully he"d shaken her out of her hysteria. Still, something in his voice spoke of more than
      just cruelty. She looked up at the harsh soldier, and then looked around, realizing their little band was one man short.
      "Taka?" she asked quietly, wanting to be wrong, but already knowing the truth. Yuri shook his head sharply and then
      glanced behind him. She stepped over to the huddled form he"d indicated, ignoring Carlos"s soft call for her not to
      look. Taka lay there in pieces, his head less than a yard away from the second of the disgusting creatures" corpses.
      Dannie couldn"t help it: she took a few faltering steps and then vomited against the wall of the alley. She was dimly
      aware of someone"s strong hands holding her hair and their leader"s voice softly whispering that it wasn"t her fault.
      She was grateful to Carlos for the sentiment at least, but she couldn"t help but think he was wrong. "Maybe it is her
      fault." Clearly Yuri agreed with her. The scowling soldier went on, not caring that the subject of discussion stood
      right in their midst. "If we hadn"t left the helo for her and the other, our men would still be alive." Carlos waited
      for Dannie to straighten and then handed her a canteen he"d detached from some portion of his gear she hadn"t had reason
      to notice thus far. She took it gratefully and unscrewed the cap and took a swig to rinse her mouth out once, and then
      twice. Only after she took one last actual drink and handed it back did he turn and face his sullen subordinate. "Yuri,
      think for a moment. Listen." Carlos nodded up and down the alley way. "What do you hear? Not much, huh? Not even from
      the comm." He shrugged and clipped his canteen back on his hip. "If we"d moved on as ordered, I"m not sure any of us
      would be left by now." Yuri opened his mouth as if to argue, but instead he let the silence sink over them. Dannie didn"t
      blame him. Whoo hoo new chapter already up! Give my beta askita a quick thanks, because this was beta"ed at 1 in the
      morning cuz I was impatient to get this posted lol! Oh! Speaking of askita, she"s got an RE fic up too called Revolt.
      Only one chap so far but it"s got potential. And no, I don"t own anything. Haven"t we been through this already? Chapter
      4: Over Fire The group, now whittled down to a quartet, stood in silence in the wake of Carlos"s admonishment. It was
      an uneasy silence this time, unlike the focused quiet of their trek through the parking garage. This quiet, Dannie knew,
      only meant that none of them knew what to say to each other. She certainly didn"t; hell, she wasn"t even sure she knew
      how to meet the mens" eyes. She turned away, and wiped at her mouth again with the back at her hand, still more than
      half convinced she could taste vomit on her own breath. Her throat was still raw, even if the taste was all in her head.
      She shook her head at herself, and her long hair flopped into her face, causing her to frown. The licker had really
      fucked up her up-do. She pulled her hair the rest of the way down and attempted to pin it back into a knot. It wasn"t
      as tight as it had been, she realized ruefully, but at least this way it wouldn"t obstruct her vision. She wished absently
      that she had some kind of a hair tie so she could just braid it back, but those had been in her purse. Along with her
      phone to call her likely to already be dead brother, and breath mints for her vomit breath, and bandages for the new
      scrapes on her other knee, and... and... and just something like normalcy. She turned back to find the men pointedly
      not watching her or meeting each other"s eyes. Her gaze lingered on their weaponry, and for a moment she thought of
      her purse again, and one other much missed item. "I need a gun." That she"d actually said it out loud surprised her
      almost as much as it did the men. All three jumped, startled out of their personal brooding. She found herself rather
      glad the hoard they"d run from hadn"t actually followed them; none of their group had been much up to keeping track
      of their surroundings. Now they were paying attention again, or at least attention to her. Yuri sneered at her, not
      that Dannie would have expected anything else; Nicholai looked skeptical; and Carlos, well, Carlos looked calculating.
      It was much the same look that she"d seen on him when he and Nicholai had decided to take her with them from the roof,
      and Dannie hoped that was a good sign in this case. Carlos studied her a moment. "Do you know how to use one?" he finally
      asked, no hint of his thoughts in his voice. Yuri opened his mouth, clearly wanting to argue, but Carlos just shut him
      down with a single solemn look before turning back to Dannie. "Be honest with me. We don"t have time for more than a
      crash course, and an amateur with a weapon could be dangerous to the rest of us." Dannie took a breath to settle herself
      under the weight of his steady gaze and then nodded. "My brother... Derek"s a cop, Dad was military. When I set up to
      go overseas, they got me a concealed carry course." "Caliber?" ".380 in a Smith & Wesson Bodyguard pistol," she answered
      without hesitation, then waited for the "manly men" to make the expected quips. Yuri was quick to take advantage of
      that. "Cute. That"s more of an accessory than a weapon. It would hardly do anything but tickle an attacker." "It will
      do a hell of a lot more if you aim in the right place, and I do. Are you accurate enough to do damage with something
      that small?" Dannie shot back, irritated despite expecting it. Carlos shook his head sharply at the scowling pair before
      Yuri could continue the verbal battle. "Enough." As much as it annoyed her to do so, Dannie obeyed the steely order,
      vaguely wondering just how she"d managed to end up as subordinate to the dark man as the others were. Carlos flicked
      his eyes between Yuri and Dannie as if daring either of them to speak again. Then he nodded to himself, and reached
      back to draw one of his pistols from its holster and held it out to Dannie. She took it gingerly, forcing herself to
      hide her apprehension. The 9 mm handgun was definitely larger than her little Bodyguard. That hadn"t been all that much
      bigger than her palm, but this... this had some heft to it. She double checked that the safety was on, and then released
      the clip to check how many rounds were left. Satisfied that she had more than half a clip left, she shoved it back in
      smoothly, and then gripped the weapon properly with her right hand ready to squeeze the trigger, but not too close for
      the safety of those around her. Finally relatively comfortable with the larger handgun, she looked up to find all three
      men studying her with a considering air. She swallowed, a little unnerved by the attention, but then straightened her
      shoulders and stared back. "Extra clips?" she asked with as forced smile. Carlos pulled a couple from one of the many
      pockets on his ammo belt, and handed them to her. Dannie shoved one into each of her skirt pockets carefully, hoping
      they"d actually stay in. Her pockets weren"t exactly intended to hold anything like this after all. Fairly certain she
      wouldn"t need to hold anything else now, she wrapped her empty left hand around the bottom of the 9 mm and her right
      hand, steadying the unfamiliar weight as she"d been taught. Dannie was all too aware that after a while she"d need that
      extra steadiness. Even the recoil on her little Bodyguard was hell on her tiny wrists after a while. The 9 mm was probably
      going to hurt. So be it. It was sure as hell better than being unarmed. She took a deep breath and then lifted her eyes
      to the men again. Yuri didn"t look all that convinced, but Nicholai seemed grudgingly respectful at her competent handling
      on the weapon thus far. "Alright then. Hold your fire unless you"re sure of a kill shot. We"ll need to save ammo," Carlos
      said gruffly, his eyes proud though the rest of his face was carefully schooled into impassiveness. Dannie just nodded,
      encouraged by his words, though she didn"t bother to say so. "Let"s move out. Yuri on our 6, Nicholai and Dannie take
      the center. I"ll take point." Carlos paused for only a moment by Taka"s body, a solemn look on his face. He muttered
      something under his breath than almost sounded like an apology, but then leaned down to take the fallen man"s dog tags
      and refill his own pouches with as much of Taka"s ammo as he could hold. Yuri ground his teeth behind her, but as he
      and Nicholai passed the body, they did the same. Dannie didn"t have room to carry anything else, but she thought a prayer
      for him as she passed, though she found she couldn"t actually stand to look at his mutilated body again. Once had been
      more than enough, and they didn"t have time for her to be sick again. Her head cocked to the side as the now familiar
      moaning began to fill her hearing. Now they really didn"t have time. The men picked up their pace to a slow jog as they
      trekked through the back alleys and side streets, barely pausing to gun down the scattered groups of infected they encountered.
      Dannie gritted her teeth and forced herself to keep up. She hadn"t needed to fire yet; the men"s automatic weapons could
      drop the infected at a farther distance and with a hell of a lot more speed than her pistol. She just held on and waited;
      with the way the night had gone so far, there was no doubt she"d need the weapon eventually. The team ducked across
      a larger street and the moaning grew to a roar. Dannie had only a moment to look, but the sheer number of infected filling
      the streets had her nearly faltering from absolute fear. Yuri was at her back though, a hand on her shoulder shoving
      her forward before she could stumble to a halt. "Keep moving!" he ordered, and she snapped back to the present, forcing
      the panic down with a nod to him over her shoulder. Yuri dropped back into the tail guard position, and as the hoards
      began to pour down the alley behind them at that painful shuffling run, Nicholai dropped back behind to join him. Carlos
      turned half to look as the trailing men opened fire, both of them forced to slow to a careful backwards march as they
      aimed and fired. Their leader slowed too, boxing Dannie back in between them with a bare glance. She now turned her
      gaze back and forth to either side, keeping track of anything threat that might come from that direction to take her
      men the way Phil had been taken. She too finally opened fire, the 9 mm bucking into life in her hands as they passed
      a small cul de sac with a trio of infected shuffling their way. Despite the pain that caused her to grimace at the much
      stronger kick of the heavy pistol, her aim was true, and each infected dropped with a bullet to the head. She allowed
      herself to think for a brief moment that her brother would have been proud, but then she had to move again as Yuri and
      Nicholai almost drew abreast of her, still firing steadily to the rear. Dannie began to wonder vaguely where the hell
      they were going to go with infected at every turn, but then the sound of squealing tires and gun fire began to echo
      ahead of them, and she guessed Carlos was likely making his way to that sign of other armed survivors. Voices crackled
