  - source_sentence: 'Jack crossed his arms, "Why would I do that?" "Because it"s over, Jack." Declan ran a hand through his
      hair, "She made her choice and she happened to choose the guy who owns our bar, not to mention our home. From the first
      day, he"s always done right by us. Let it go, Emily isn"t the only girl in the world." Declan checked his watch, "Look,
      I need to go. I"ll catch you later Jack." Jack waved as his brother stepped out of the bar, and thought on his words.
      Unaware of the turmoil over at the Stowaway, Emily followed the sounds of rattling metal and ripping cardboard coming
      from the guestrroom. She knocked on the door and peeked inside to find Nolan kneeling on the floor, surrounded by connecting
      pieces and small tools. "What"re you doing?" He looked up at her and smiled, "This was supposed to be a surprise. Baby
      will need a crib, I figured mine is still good. I sent an assistant to get this bad boy out of storage." Emily stepped
      into the room for a closer look at the plain wood rails that would come together to make a baby crib. "This was yours?"
      "Yep." Emily ran her hands over the nearest wood frame, "It"s hard to picture you as a baby, Nolan." "We were all kids
      once, Ems. What, you think I hatched from an egg fully grown?" "Sometimes I can"t help but wonder." Emily eyed the small
      pile of screws and bolts he"d laid out on the floor at his side according to size, from smallest to largest. "Do you
      need any help?" The man shook his head, always teasing her. "Don"t let my geek chicness fool you, I"m a born builder.
      Even blindfolded, I can put together anything from Ikea." "Impressive." "Thanks." Nolan stood and guided her from the
      room, "Have a rest and I"ll show you when it"s ready." "You"re always telling me to rest, I feel fine." Emily groused.
      "The books say you need to rest." "And I say I feel fine. I"m not going on bed-rest any time soon." "All right, all
      right. Do your yoga or have a swim." Nolan lead her out of the room and promised her, "Let me put this together, you"ll
      see, it"ll be great." After taking Nolan"s advice and having a lazy swim in the pool, Emily removed her bathing suit
      and took a shower. The hot water enveloped her, the suds of shampoo tingled over her scalp. She felt great, she felt
      secure and happy. Nolan was still in the guest room when she"d come in from the pool, and she decided to leave him to
      his project. Nolan loved a project; she was not even three months into her pregnancy but the man had made plans to remake
      his house into a home for the three of them, he"d already read several books regarding pregnancy and child health and
      now he was assembling his own crib for the guest room that he had already decided to remake into a nursery. They were
      going to make a family. Emily warmed every time she saw Nolan, the friend who had become a lover and who would soon
      become the father to her child. Emily wanted to get through her pregnancy and skip to the end, to where the three of
      them would share the house and their lives. She combed out her hair and put on a chemise for the night, and over that
      she put on another of the man"s t-shirts. "Emily, are you up there?" She stepped out of his room and looked down from
      the upstairs landing. Nolan was down in the living room, "Come on down here, I want to show off my handiwork." "That
      crib better not have wi-fi, GPS or a touch-screen," Emily teased him as she moved down the stairs. "Excuse me, it"s
      a Nolcorp crib - it has a built-in hologram mobile, high-def surveillance monitors and an incubation system." Nolan
      fired back at her as he opened the door to the guestrroom. He stood aside and let her into the room first. Tears rose
      in Emily"s eyes at the sight of it, the polished wood crib. It was old. It was plain. It had been built for Nolan, and
      he had rebuilt it for the child they would share. Moving forward, she gripped the rail, the soft scent of old wood holding
      in the air. "Nolan, it looks great." She breathed. He knew she was happy, but all the same he didn"t like to see her
      crying and tried to make her laugh instead. "You sound so surprised, everyone underestimates me!" Emily swiped away
      her tears with the back of her hand, "So sensitive, you know I didn"t mean it like that." He shook his head and then
      lightly shook the crib"s railing, "Feel free to test it, I can guarantee that it"s structurally sound." "Nolan, this
      is wonderful. I love it." "Let"s hope the kid loves it enough to sleep through the night." The man had read through
      a library"s worth of books on infant and toddler care already - the one thing he wasn"t looking forward to was a greater
      lack of sleep. Emily turned to hug him, "You"re really getting ahead of yourself with this." She could feel the low
      rumble of his laugh through her chest as he hugged her to him, tightly. "Says the girl who spent the last decade in
      vengeance school. I thought you"d appreciate all this prep." "You know I do, super-dad." Emily kissed him. "I like the
      sound of that, say it again." He gently commanded as he backed her up to the guest bed. Emily moved to lay on her back
      as Nolan moved to lay beside her, propped on an elbow. "Nolan Ross, the super-dad." "As you say, so shall it be." He
      bowed his head while intoning the words. "Is that from a movie?" "Of course." "Why am I not surprised?" They went on,
      teasing, taunting each other for the rest of the night. Nolan kissed her belly and Emily ran her fingers through his
      hair, the two of them eventually settling down to sleep. Emily had another charity meeting to host and Nolan had to
      put in an appearance at the unveiling of Nolcorp"s latest and greatest gadget. It would be a busy day for them both,
      it would be the day that broke them. Before the fire, before Nolan, Emily had not allowed herself to dream of a new
      life for herself. Vengeance did not allow fantasies of lovers and children - not when she had spent a decade planning
      the downfall of so many people, saving the Graysons for last. After seeing that twisted family ripped apart, as her
      own family had been, Emily had allowed herself to feel secure with Nolan. She had trusted him in the beginning, but
      after the fire, in living with the man, her trust and affection had grown deeper, simmering until lust flashed between
      them, changing everything that they could ever be to each other going forward. It was late. Past midnight, and though
      the room was dark, light from the city just beyond the glass had managed to slip in between the curtains. Emily rolled
      over in bed, unable to sleep and unable to focus. She laid a hand over her belly, flattening her palm and spreading
      her fingers. Tired eyes wandered over the room, settling on the window. The view was different than what she had grown
      used to: Manhattan greeted her every morning now rather than a view of the Hamptons shore, the noise of a city screamed
      over gently rolling waves. Emily rolled onto her back, wondering what Nolan was doing in that moment. She hoped he was
      asleep, or, if his insomnia was keeping him up as hers was, then she hoped he was playing a game or working on his latest
      invention. That familiar ache pierced her chest and she hoped that, whatever he was doing, Nolan didn"t hate her. I
      deserve to be alone. I can"t face him, not after... Sleep would not be coming to her that night, Emily knew it. With
      great effort, she pulled her thoughts away from her friend. Perhaps she was meant to be alone, a fitting punishment
      for the innocents who had suffered for her vendetta. The woman threw back the covers and went to the living room, crossing
      onto her balcony to feel the early morning chill over her skin as autumn rolled over the city. The hard ache pulsed
      through her chest as her mind conjured some clever thing Nolan would say if only he was there with her. But Nolan was
      not, and Emily had to remember what it was to be alone in the world again. It was the dream again, that horrible day
      when it had all come falling down on them. The man had been tortured for days, powerless to free himself. Powerless
      to do anything, which tore at him, clawing into his mind with constant recriminations of I could have...I should have...It"s
      my fault...Why didn"t I...? Stripping a man of choice and ability, leaving him powerless but to stand and witness horror
      is nothing short of living torture. Any man who has had to endure the pain of a loved one can attest: there is no punishment
      worse than being rendered helpless to stop the pain of another. Nearly every night for the past several weeks, Nolan"s
      guilt had forced him to relive the pain of that horrible day. The confusion, the shock, the panic and fear, and finally,
      the pain of loss, of shattered happiness, of being helpless to stop yet another tragedy from happening to his Emily.
      Emily, are you all right? No. What are-? My God, is that blood? Emily, don"t move, I"ll call Dr. Thorton and an ambulance-
      Don"t, Nolan. It"s gone. It took effort to break himself from the nightmare, but Nolan had managed to do so the last
      few nights. Yes, he can wake himself, but even in his waking life he is not free of the memories that clawed through
      his mind, forcing him to see the proof and hear the words that their child would never be. The man snapped awake, his
      long form spread across the living room sofa, every last inch of him aching, a mind split by the pain of a torn heart
      and a body flooded by alcohol. "God, just make it stop," he muttered the infantile plea as he moved to stand, begging
      for a moment free of pain. Despite the cool air flowing in from the back door he"d left open, Nolan was sweating. He
      was sick, he knew, but he didn"t care. He wanted alcohol poisoning, he wanted some horrible disease - hell, if Tyler
      were to show up with a machete, Nolan would offer his neck. The man staggered to the guest bathroom, vomiting into the
      toilet, cradling his head on the cold bathroom tiles, haunted now not by the dream but by his memory of what horror
      took place that day. She thinks it"s her fault. I know. She said as much to me. Why did this happen? We did everything
      right... The body has a better knowledge of these things than our medical knowledge ever will. I"m sorry, Mr. Ross.
      So am I. "Stop it!" Nolan pulled at his hair, pounding his temples to rid himself of the memories. Their life together
      had ended that day, everything Nolan had never admitted to wanting had been taken from him. And Emily, she... Grunting,
      Nolan pulled himself up off the floor and he crossed to the wet bar, no longer locked against the child who would never
      be. It was nearly empty now thanks to Nolan"s glorious binge. Emily, it"s me. How do you feel? God, the way she"d looked
      at him... Empty. Nolan threw a bottle against the wall, a scream of anger unleashed from his raw throat. After everything,
      it wasn"t supposed to be this way - it was our turn to be happy! "It wasn"t supposed to be this way," Nolan sobbed out
      to the empty house. It had been empty for days and he hated every inch of the echoing glass building. He stood and staggered
      out to the backyard, hating Emily, hating his house, the beach, the sun, the Graysons, David and the whole world. Compared
      to most, Nolan"s life had seemed charmed by the grace of his genius and the wealth that had been born of it, but his
      genius had flourished as a direct result of his constant loneliness. For so long, all he"d wanted was a friend, so desperate
      for someone who understood and cared for him that he"d taken Emily"s every insult like a loving martyr. But that time
      had passed, everything had changed between them...and yet Emily was gone and he was alone again, friendless and a father
      to no one. "You"re a coward, Emily." Nolan said to the empty air. He sank to his knees on the shore as memories rose
      in his mind to torture him. After the...what had happened, time had stretched on in the house for days. Emily had faded
      in a way that Nolan had never seen before. She had shut down, crushed under the weight of her own sorrow. Thinking back,
      Nolan had hated the ghost that haunted his home, the wraith of misery that Emily had become. They had not shared their
      pain, they had grieved separately, which might have hurt Nolan most of all, that Emily had turned away from him as she
      so often had in the past. He missed her happy, golden and bright. He wasn"t used to seeing her in such a state of defeat
      and he didn"t know what to do with her. It seemed that the loss had eaten its way down to her very spirit. Nolan had
      done what he could. He"d discreetly removed the crib from the room as she slept, silent tears slipping down his face
      as he went to task with a screwdriver, taking the hated thing apart and calling his assistant to take it back to storage.
      He made her favorite meals, only to have Emily refuse to join him for dinner. He"d had flowers delivered, bright bouquets
      that wilted in the darkness of her room. Then, one day, Nolan had finally had enough of Emily"s mourning. He couldn"t
      take another day of her staying in bed in the dark guest room, he took it upon himself to break the hold that depression
      had over her. Finding his courage, the man had thrown open her door, ripped down the dark curtains to flood the room
      with light, and before Emily could demand just what the hell he was doing, Nolan pulled Emily over his shoulder and
      strode straight outside, jumping into the pool, clothes and all, bringing Emily into the water with him. When they surfaced,
      Emily had lashed out at him, screeching nonsense, punching and clawing at him like an animal. Nolan took it, absorbing
      her rage and despair, allowing himself to become the target of her violence. It took several minutes, but Emily"s fury
      began to ebb away as fresh despair took its place. Nolan watched as her face crumbled into sobs. "Oh God, Nolan...Nolan,
      my baby..." He brought her into his hold, cradling her head against his chest. There were no words that would comfort
      her, he knew, and so the man said nothing. It was some time later that found both Nolan and Emily in dry clothes. They"d
      showered together, Nolan reassuming his role as caretaker, scrubbing away her sorrow, holding her as she sobbed against
      him, accepting her kisses of gratitude but not pushing her for more. He set a plate of hearty lasagna before her on
      the table. He wanted to see her smile, but more than anything, he needed to see her eat. Three silent bites into the
      meal, Nolan had to ask her, "How do you feel?" "Better." He knew she was lying, but he pressed on. "Emily, I"m sorry
      for being rough. I just couldn"t take seeing you like that anymore." She shook her head. "It"s all right. You didn"t
      hurt me, Nolan. We all need a good kick in the ass sometimes, and you gave me mine." He gave her a small smile, "Interesting
      twist, huh? Seriously though, are you all right?" Emily went quiet for several long moments, searching for an answer.
      "No. But maybe I will be. Nolan?" "Hmm?" Emily finally raised her eyes to his. "I"m sorry too. For hurting you." The
      knot of dread in his stomach had him worried that Emily wasn"t just talking about what she"d done to him in the pool.
      The next morning, Nolan knew Emily was gone before he found her note on the kitchen counter downstairs. He"d woken up
      without her beside him and felt it: there was a stillness to his home that he once constantly craved as a haven from
      the ignorance he faced in the outside world. Now, though... Nolan had taken her letter outside to the backyard, needing
      the cool fresh air to combat his rising anger. Cold eyes had skimmed the words but it didn"t matter what she"d written,
      that she claimed she"d come back soon or that she"d signed it "I love you, Emily". All the man could feel was the weight
      of his failure. He knew exactly where Emily was, but it didn"t change anything. She was gone. She was gone because he
      couldn"t offer her enough to stay. He"d crumpled her note and tossed it in the pool. Returning upstairs, the man laid
      his palm on the blanket they"d shared the night before. The man was tired, a soul-deep weariness that he"d been carrying
      since that horrible day of loss. He had worked to pull Emily from her despair, ignoring his own in the process, but
      without another to focus his energies on, without a project of a sort, Nolan was lost in the tragedy. He made the effort
      to climb into the bed and sleep, alone as he had for years. Jack raised his brows, so surprised to see Nolan stagger
      through the door that he forgot his anger with the other man. "What are you doing here, Nolan?" Nolan slid onto a barstool
      and tilted his head, "I"m collecting on my investment, Porter. Now, I"ll have a big bottle of vodka...and a straw. I
      drank the bar at my house." Jack looked at this man, his friend, and he saw ruin. Nolan"s face was thin to start with,
      but the dark shadows circling his bloodshot eyes and grim expression made him look positively ghoulish. Jack had seen
      his share of depressed drinkers, but he knew this was different. It was clear Nolan hadn"t seen the sun in days, his
      hair had fallen forward, clinging to the clammy skin of his forehead. There was a yellowing bruise on his jaw and a
      scratch on his right temple and the edge of his eyebrow. Gone was the sly smile and bright clothes, Nolan was wearing
      all black, the long sleeves of his wrinkled Oxford were pushed up past his elbows. He couldn"t help himself, Jack looked
      his fill of the scars that ate away Nolan"s left forearm. The comparison of the skin to melted wax was not flattering,
      but it was accurate. He recalled from when he"d visited earlier in the summer that Nolan had called the burn the price
      he had paid to help a friend; Jack had only thought the burn to be on the back of his hand, he"d never expected an injury
      so severe. He looked up to see Nolan glaring at him, "See something interesting?" Nolan took a $100 bill and laid it
      on the bar. "I"ll have that bottle now, and here, I"ll pay for it up front. Don"t want to be accused of taking advantage
      of you." Jack took the money and ignored Nolan"s reference to their fight. "You want a whole bottle? Come on, what"s
      eating you, Nolan?" Taking the bottle, Nolan poured himself a shot, and gulped it down. Then another, and one more after
      that. Finally, taking a deep breath, Nolan was ready to talk. "Emily took off last night...no, it was three nights ago,
      I think...I don"t know, but I"ve been drinking since then." Jack furrowed his brow, "I get it." Nolan blinked tiredly,
      wondering if Jack actually did, somehow, understand what had happened. "Do you?" "You two got into a fight, right?"
      God, Jack, what is it like in your stupid, simple world? Nolan did not voice this thought, of course. He wasn"t looking
      for another black eye. "I wish it was that simple, but no, we didn"t fight." It was there, hovering just out of his
      grasp, everything Nolan wanted to share with Jack - with someone. But he did as he always did, and kept quiet to protect
      their secrets. "We just...we have a whole world of problems." Jack leaned in, concern on his face. "You have any idea
      where she might"ve gone?" Nolan blinked at Jack; it took a second, but then he remembered that most men didn"t have
      his tech resources, or if they did, they had no reason to keep multiple locations under surveillance. Again, Jack"s
      world was simple. "Oh, that"s not the problem, I know exactly where she is. 122 east 27th street, the Big Apple. I have
      the place wired." Nolan pulled out his cell and squinted at the screen rather than zooming in on the figure sitting
      alone at the kitchen island. He didn"t want to see her face, he didn"t trust himself not to throw the phone against
      the wall. "She"s there right now, looks like she"s eating a...what is that, maybe a bagel? It"s good that she"s eating
      again." Jack checked the phone screen for himself and rolled his eyes. "What the hell, Nolan. You know where she is,
      so why not go after her?" Nolan shook his head and gulped down a hard shot, groaning as it burned its way down his throat.
      "No. I"m not chasing her. I"m going to wait until she"s finally had enough of running away from her problems. I"ll be
      here for her when she comes back...if she comes back." Jack frowned, any lingering anger he"d carried for the man finally
      slipping away. He had carried a torch for Emily for too long and let his jealousy get the best of him, but in seeing
      Nolan this miserable, he was able to let it go. The man had seen men drink themselves half to death over a woman, and
      from what he could see, Nolan was already there. "I"m sorry Nolan." "So am I." Nolan sighed and bowed his head. "We
      both lost our Amandas, Jack." Nolan refused to leave Emily"s side as she was brought into the hospital, save for the
      treatment given to his arm. Even now, over five hours later, he would not budge from her bedside. He sat in a chair,
      his long fingers laced with her own, his voice silent even as his mind raced - replaying the nights" events and making
      plans for their future. Everything was in the air now, but the moment was upon him: with Emily out of commission, Nolan
      was in charge. For months he"d longed for this control, but not like this. Not with the beach house destroyed and Emily
      injured. He squeezed her hand. No, not like this.'
    sentences:
    - '"Than why, if you have no hope left, did you save me? What would it be of your concern what happens to me?" "Someone
      told me to find a reason to life. And I thought I could find it with you." "You could not have been more wrong about
      this." "Maybe. But we are here." Claire paused. "You know... You are actually one of the first who believed me, that
      I am no heretic. Even most from the Great Swamps believe, that everyone from the Great Swamp is a heretic." "Is that
      so?" There was silence for a while. While they have talked, it started to rain. Large drops hit the ground, making it
      difficult to see anything. Lightning flashed shortly, illuminating the church and the thunder shock the ground. "I wonder
      what happened to Petrus." Rhea suddenly asked. "I broke his nose, last time I saw him. I figured that breaking his nose
      after he essentially told me to do anything I want with you was a fitting retribution." "Perhaps he realized my weakness
      all along. Maybe that is the reason, he left me behind. After all, it was my frailty and my ignorance that sealed Vince
      and Nico"s fate to end as Hollows." "That is not an excuse. He was supposed to take care for you. He should have done
      it right." "I can hardly blame him." Claire stood up, taking a few steps away. "He was tasked to care for you and he
      failed. He made a run back to the Shrine and left you rot for good. How can you be so forgiving?" At the same moment,
      something hit her from behind. A morning star, by the feeling of it. Claire staggered, hitting the bench beside Rhea,
      before she fell to the ground. She hissed in pain, before turning around. Petrus stood behind her, his broken nose swollen
      and red. "Oh, it"s you?" he asked. "You saved Milady, did you not?" "Seems like it, coward." Claire hissed, clenching
      her teeth. She had broken her ribs yet again, the third time, if she was right. "Too bad, that you will not save her
      another time." He gave Rhea a short glance. She sat there, unafraid and dignified. "It will amount to nothing. Without
      her family"s name she is worth nothing." "Is that so, Petrus? I wonder what has gotten into you." "Oh, humanity does
      come in handy in Lordran. You two will die because of this." "Oh, shut up." Claire snapped, reaching for her sword.
      "In my eyes, you are just a traitor who is escaping his duties as a guard." "And you are a heretic from the Swamps,
      no matter what you claim to be." Claire drew her sword, standing up on shaking legs. Taking her shield would cost to
      much time and she had to defend Rhea as well. She took it into both hands, before looking at Petrus. She was faster
      than him, but his armour would be difficult to pierce. Claire stepped aside, before attacking him. Her sword was blocked
      by his shield and he countered with his morning star. Claire avoided it by a hair"s breath, but stumbled across a fragment
      of a statue. Her fall reminded her of her broken ribs and she gave a small cry of pain. Petrus lifted his morning star
      - probably to crush her skull and end her (Undead) life - but he stopped. His eyes widened, he let his morning star
      fall on the ground and he looked down on his chest. "Why... How could I... What the... What did I wrong..." An ominous,
      but yet cheerfull voice answered him. "Thou hast sinned. Fear thine indelible wrongdoings. I shall accept thy next confession,
      in the hereafter!" Petrus slumped and fell to the ground, hitting it with a heavy thud. "You shalt burn his body so
      he does not rise as a Hollow again." The man advised her. Claire could only nod, to stunned to say anything else. Rhea
      was crying, she could see it from her place. Surely Petrus had meant some sort of comfort to her in Lordran, even after
      his betrayal. Claire stood up, before she lit a flame. Petrus body was soon enveloped by her flames and as she watched
      them burn, she almost regretted not to burn him as he stilled lived. He would have deserved it. "May I ask your name,
      dear sir?" Rhea asked. "My name is Oswald of Carim the Pardoner. You are friends. Sin is my dominion, so do one of you
      feel the need to confess?" "Thank you for saving us." Claire said, before turning around. "Hmm... Thou with the silver
      hair... Thou art carrying heavy sin as well. Like Petrus thou art drenched in sin." "Yes I do. And I am willing to atone
      for it." "Thou art? This is rare. Most deny this very fact." "Does it matter? I am willing to atone. My goal is to ring
      the Bells of Awakening. I need to find a way to Blighttown." "Blighttown! A swamp filled with sin and chaos!" Oswald
      exclaimed. "I think I should get going. I did lose too much time. Farewell."Claire turned around. For some reason she
      was sure that Oswald would not harm Rhea - he killed Petrus so she should be safe. Her sins may have tainted her but
      she wished to atone for them - alone. It was her objective from the beginning and staying here would not bring her any
      further. "Thou art welcome anytime. It is only human to sin and to confess."Oswald said in a disturbingly cheerful voice.
      "I will remember this." Claire said, suppressing a shudder. "Vereor Nox." Rhea quietly said. The street of the Lower
      Undead Burg was quiet. The only noise was the screaming of someone, who fell prey to the Capra Demon. Next chapter,
      sorry it took so long (again). I was in Italy for the two last weeks without internet. In the next few days, I will
      reupload the first few chapters that are better readable and with lesser errors. So far, I"ve done the story roughly
      a third. Chapter 9 and 10 are almost finished, still in need of spell checking though, And I would like to thank who
      recommended my story on TvTropes! Seriously, saved my day, as I waited (and still waiting) for the Skyrim DLC. This
      chapter is for you! Chapter 8: Maw in the sewer Claire carefully observed the demon before her. It patrolled the streets
      but had not taken any interest in her - yet. From her hiding place she could see him killing another one of the thieves
      that lured in the dark. The Capra Demon hold two broadswords in his hands and had the shape of a goat walking on two
      legs with a skull as its helmet. Even from distance Claire could smell it - blood, gore, dirt and possibly more - but
      the dogs around it and feeding on everything that the demon left over did not seemed to care. Claire carefully loaded
      her crossbow, aiming at the first dog, nearer to her. A bolt ended its life and Claire quickly reload. The second one
      missed - the dog howled in anger and jumped at her. A quick thrust with her sword ended its life but the Capra Demon
      closed in, quicker than she thought it could even move. Claire stumbled back, trying to get distance between it and
      her so she could use her flame. It was quick and its swords hit the ground only inches before her feet. Strong and heavy
      attacks and yet fast enough to make it difficult to gain ground - Claire cursed her rotten luck. But maybe she did deserve
      it. Finally she was able to create a flame without tripping over her feet and threw it. The stench of burning fur reached
      her nose and she quickly moved around the goat demon, to stab it from behind and to cut its tensions. Lucky enough,
      the Capra Demon was distracted by her fire ball and did not realize until it was to late. It fell to his knees and she
      cut its neck. Blood soaked the partly burned fur as it fell to the ground, limp and hopefully dead. Claire sheathed
      her sword and started to search for the key to the sewers, looking first at the other end of the small room the demon
      was in. Finally, she found it: Laying on the ground at the top of a staircase leading to nowhere. She took it before
      turning around and leaving the small room. Only then she heard the noise of something stepping behind her. Claire turned
      around, ready for the worst. The Capra Demon, with its sliced neck, stood again, shakingly, but it stood. Claire turned
      around and run. The Demon screamed in fury and charged after her, while Claire was running as fast as she could towards
      the door to the sewers. Thugs, dogs and Hollows alike jumped out of the way of the furious Capra Demon while it chased
      Claire to the door. Upon reaching the door, Claire slammed the key into the lock and turned it around. The key fell
      from her shaking hands and she turned around ready to face the furious demon. Instead she saw a man clad in golden armour
      strolling towards her. "Lautrec?" she asked weakly. "You know that there is a Capra Demon after me?" "I disposed of
      it." he answered and shrugged. "While you was busy running away from it." "Thank you then." Claire picked the key off
      the ground and unlocked the door. Cold air touched her face as she took a few steps down the dark staircase. Lautrec
      followed her down, until she turned around. "You do not need to follow me around." "You have been running from such
      a lowly demon like the Capra Demon. How do someone like you know what is waiting in the sewers?" "It is not your concern
      what I do." "My honour as a knight demands, however, that I repay your favour." "The favour is repaid by you slaying
      the Capra Demon, is it not?" "Oh it is. But I took interest in the one who managed to kill the gargoyles so she could
      ring the bells." "I was not alone." "Oh, that is the reason? A companion, brave enough to do the killing for you?" "He
      only helped me. He did not do the killing by himself." "Help can often lead to reliance. What happens if you rely on
      the wrong person?" "I doubt that he would betray me. He is not the man for this." "Is he? Or is this faith ill-placed?"
      "It is not." "But you need to rely on no one but yourself. Or else someone might think it would be fine to kill someone
      with humanity in order to survive. Take this little maiden at Firelink Shrine for example... she is easy prey." "She
      is not easy prey. She is not an animal to be hunted down." "Is she?" Claire turned around and lead the way to the sewer.
      She could hear the noise of Hollows. Lautrec continued to follow her. "It would be an easy kill. So much humanity, so
      few uses for her." "Please stop it." Both of them fought against countless Undead on their way down. Lautrec continued
      to try to convince Claire of the possibilities that would be open if she would kill people for their humanity but she
      did not paid to him much heed. In the sewers there were Undead, giant rats, dogs and butchers. Claire was partly glad
      that Lautrec was with her - without him it would be much more complicated to reach the ground. After Lautrec took down
      a butcher, Claire heard a quiet cry for help. Curiously she followed the noise to a room full of barrows. A man with
      a tattered robe gave a bashful smile as she looked at him. "You! You must help me! Or else she will have me for lunch!
      So please!" Lautrec huffed and crossed his arms. "What a fool. To be caught by such a lowlifes like them. And caught
      into a barrel! What a joke!" Claire gave him a sour look. By the accent she could imagine that the man was from the
      Great Swamps and that he maybe would be a fellow pyromancer. It would feel reassuring having another pyromancer around
      - a keepsake of her lost home. She lifter her sword, sticking it between the loose planks and broke the barrel. The
      poor man fell against her, knocking her from her legs. "Thank you. Without your aid I would be her supper. Being eaten
      alive! I shudder to think..." "You are a pyromancer of the Great Swamp, are you not?" "Y-Yes, I am Laurentius of the
      Great Swamps." "I am Claire, as well from the Swamps. Glad to meet a fellow pyromancer in Lordran." "Yes, yes, fine
      that you like each other. But this fellow should head up to Firelink Shrine. Not to imagine, what would happen next
      to him." Lautrec huffed again. "Will you be fine, girl?" Laurentius asked worried. "I will be fine. Do not worry." "Sure?"
      "Yes. I will." "Good, then I will take my leave. We will meet again." "Yes, we will." "Don"t dare to go hollow." "Neither
      should you." Lautrec was silent after that - an ominous silence. Claire did her best to ignore the knight in golden
      armour, taking out her enemies before they would take her out. Water dripped from the low ceiling, run down the wall
      and gathering on the floor. Occasionally, a slime dropped down in their way but it was easily killed by Claire"s pyromancy.
      Suddenly, Lautrec stood still. "Someone is following us." "Who?" "I do not know. But he is close." Claire lifted her
      own sword. From the darkness of a shadow a knight stepped forward. Claire sighed in relief as she recognized Solaire"s
      steel armour. "Solaire." she stepped between Lautrec"s blade and the sun knight. "Claire. Good to see you in one piece."
      Claire felt his soft surcoat at her face, as he hugged her, short, but affectionately. "And this fellow is...?" asked
      Lautrec warily. "Knight Solaire of Astora. A comrade. And you are are by chance the rude knight who departed with Claire?"
      "I might be. The name is Knight Lautrec of Carim." "An honour to meet you and thank you for taking care of Claire."
      Solaire sounded matter-of-factly, but he seemed to be on edge. "May I take over? I am used to fight alongside Claire.
      And you seem to be... slightly tiered." "And I still have to repay my debt to her." Lautrec retorted. "Is that so? I
      think your help until now is enough repayment." "But I am dying to see the one who rang the First Bell of Awakening
      fighting a real foe." "You saw her fighting long enough. Claire let us go forward - the faster we get out of the sewers,
      the more lucky we both will be." Without waiting for an answer he grabbed her arm softly and forced her going with him.
      She took a few steps, before trying to free herself. "Solaire, what has gotten into you?" "Later." "No, now!" "Later."
      Claire"s heart seemed to stop - what would happen, if Lautrec was right after all? Suddenly she felt afraid of him.
      Solaire suddenly stopped and looked around. "Serious, Claire, you should stop being so trustful. Not everyone is a knight
      in shining armour." "And what about you, Solaire?" Claire asked. "What did he told you?" "And what are you doing?" "What
      did he told you?" "That it might not be right to trust you." Claire turned around. "And maybe he was right." Claire
      suddenly felt cold steel at her neck. Solaire"s sword lingered there for a moment, before he withdraw it. "It may be
      wrong to trust me, yes. I might cause more trouble for than I am worth. But I had more chances to kill you than I could
      even count. So, do not trust me if you wish - but be aware that I will not kill you. I could have done it. But I did
      not." "But you..." "I had a reason. And excuse me my worries, but there is something off with this man - Lautrec of
      Carim I mean." "What should be off with him?" "I followed you quite a while. He seems to be... dangerous. Claire, stay
      away from him at any cost. I do not know what he is up to - yet - but it is definitely nothing good." "I do not think
      that." Solaire sighed. "Better safe than sorry. I cannot force you - but I will not be always near you to save you."
      "I can take care of myself." "I know. But I just want to make sure that you reach your goal." "By the way... How did
      you knew that I am here?" "I met Rhea and Oswald. They told me you left for the sewers. Shortly after I went after you
      I met this pyromancer - Laurentius, was it? - and he showed me which direction you have taken. It was easy to find you."
      "Why did you came after me in the first place?" "I was worried." "That does not seem like a sufficient reason to follow
      me." "Claire, we are Undead, I actually have a certain interest in you not dying on me and you are a suicidal young
      girl, who wants to atone by ringing the Bells of Awakening guarded by monsters. I think I have the right to be worried.
      And you are a still inexperienced. I, too, wish not to see someone turn Hollow." Claire was silent. Solaire continued.
      "You are a fearful opponent. But Lordran is dangerous." "Solaire? But could you please stop aiding me so much? I know,
      you want to make sure I am safe but I wish to learn to do things on my own. You said it yourself: You will not be always
      near me." "Fine. But be careful. No rushing into battles like before." "Fine, fine." Claire gave a small smile. After
      hours of wading trough cold water, fighting of monsters and Undead, a court filled with light came in sight. Light-filled
      was an exaggeration but in contrast to the dark sewers it was a welcome change. Claire was glad to breath - almost -
      fresh air and she quickly moved down the stairs followed by Solaire. At the ground level of the court they stood still
      for a second. The walls were marked by claws and Claire spotted at least four corpses laying at the ground. Additionally,
      a pool of water had gathered in the other half of the court leaving no other way out. "Seems like a dead end." Solaire
      said. "We should head back and find an other way down." "If there is one." "There should be one. I know about a difficult
      detour via New Londo and the Valley of the Drakes. But it would take a long time and I do not know if we can reach it."
      "We do not know until we tried, don"t we?" Claire sighed and forced herself to smile. "Yes, right." Both Undead turned
      around and walked back to the door, as they heard small waves breaking at the stones of broken pillars. As Claire turned
      around, she could see a small head - almost like the head of a crocodile - looking around, fixating then both Undead
      before rising. Solaire nudged her in the side. "I guess, we have a problem." he muttered. A giant maw opened up. Half
      of the body of the dragon seemed to be maw - the rest stomach. Claire lit a fire ball in her hand, while Solaire readied
      a lightning bolt. "Any ideas?" she asked. "Not dying?" he suggested. "Besides that?" The dragon crashed into the ground.
      Claire"s fireball crushed against scales, Solaire"s lightning bolt hit the creature in the maw. A scream echoed from
      the walls. Claire created another fire ball. Solaire, on the other side of the dragon, lured it to himself. Claire run
      closer to it, smelling the stench of its maw, the scales and the rotten flesh between the teeth. A fireball hit the
      maw, teeth blackened with soot. The dragon turned its attention to the woman, while Solaire staggered fell to one knee.
      He seemed to be exhausted, but got up quickly. Black, quick eyes fixated Claire and she moved back. With surprising
      speed the dragon crawled towards her and her back hit the wall. The dragon did not stop - and she clenched her teeth,
      before drawing her sword and took it in both hands. In the last second before the impact she rolled aside and dragon
      crashed into the wall, falling to the ground. As it tried to regain balance Claire quickly jumped on it - careful to
      not fall into the maw of the abomination. She reached the head, took her sword in both hands and lifted it. A quick
      swing was all she needed to behead the beast - it slumped immediately. Claire jumped down, wiping her sword clean of
      the blood. Solaire approached her, reaching out to her. He affectionately gave a pat on her shoulder, before he examined
      the right claw of the dragon. "I think, this is the solution to one of our problems." he said, holding up a key. "With
      this you should be able to continue towards Blighttown." "What about you?" Solaire sighed. "I have my own quest. And
      you did have proven that you are ready to fight your own battles. You have become strong." "You won"t come with me?"
      "You asked me to let you go alone, did you not? I think you can do it. Alone. Some say that the fate of the Chosen Undead
      is one of solitude and I simply know, that you will come back to Firelink Shrine alone. I know that we will meet again.
      And never forget, there will always be somebody to help you." "And still you distrust Lautrec." "Do not trust everyone.
      Choose your comrades wisely and you will reach your goal with your friends alive. But now I must bid you farewell -
      I guess Blighttown is not a place to look for my own sun." "You and your sun. Is there something I should know about
      Blighttown?" "Some say that a powerful Pyromancer is located there. No one I know does know more about this person,
      so be careful and do not hunt ghosts." "Pyromancers usually get along just fine. We are outcasts of society after all."
      "It is a shame, really. You magic might be unrefined, but it is everything that is left from the ancient fire sorcery
      of the Witch of Izalith." "It is?" "A pyromancer does not know the story behind his own magic? How sad." "Do you know
      the history behind every of your miracles?" "Oh, no I don"t. But I would like to." "I would like a lot of things. Knowing
      more about Pyromancy is one of them." Solaire laughed. "I think I know where the gate fitting to the key is located.
      You should go - maybe you will find out more about pyromancy than you like." "Do you want to get rid of me?" "No, I
      just want to see you again soon." "Fool." "Likewise." Claire laughed. "Show me your gate, or else we both won"t fulfil
      our goals." The gate lead down to the darkness. Wooden planks were everything that separated a by-passer from the depths.
      Claire looked down, before she turned around a last time. Solaire gave her an encouraging nod, before lifting his hand
      to bid her a silent farewell. Claire nodded back and returned the gesture, before both Undead departed to their respective
      destinations.'
    - '"No. Not unless you go first~" She growled, now glaring in my direction again. I felt the icy-cold feeling wash over
      me again. I really wish she would stop with that by the way. "...Piss off." "Oh, someone"s getting testy - " "Poison!"
      Note to self: Try to take Solanaceae wand before insulting her when there is no Professor present. .... ...... "I leave
      for less than ten minutes, and in that time -" "She raised her wand at me first. I"d just like to point out." Solanaceae
      whipped her head in my direction, one hand over her left eye, which is probably a black eye by now, "You"re pinning
      this on me? Really, Vita?" She hissed. I glared harshly in her direction, not regretting what I had done to her one
      bit. "You tried to strangle me Solanaceae. Again!" The purple haired girl turned back to Professor Wu, who has now it
      seemed was waiting patiently for the two of us to stop bickering back and forth, and snarled, "Well, Vita invaded my
      personal bubble!" "I did what?" "You bloody well heard me - Or should I say it a little slower for you?" "You are the
      scum of the earth Solanaceae." "Hell beast." "Coming from a Necromancer, that"s almost a compliment." "You"re a right
      git Vita you know that?" "Hey did you know your accent gets heavier when you"re mad?" "I - What? What the bleeding hell
      are you on about? It most certainly does not!" "It does," I said in a sing-song voice, grinning when I noticed her twitch
      with irritation slightly. I still can"t figure out after all these years why her voice is a sensitive subject, but hey,
      I"ll take what I can get. And abuse the power it gives me. Professor Wu was clearly a woman with ample amounts of patience
      - Well, I suppose anyone who puts up with the two of us has to. But the Life Professor was watching the exchange with
      one brow raised. She"s probably used to it after five whole years of it. If she was annoyed, her voice gave no sign
      of it. "Miss Vita, Miss Solanaceae, if you are just about finished?" I glanced up, licking my lips and tasting the metallic
      taste of my own blood, but my gold eyes were still fiery. "Ah, yeah we"re done here. So can I leave?" Solanaceae "tch"ed,
      and I tried to ignore her presence altogether. Even though, I let my eyes fall, looking at the Necromancer briefly,
      I can admire my work, can"t I? She definitely had a black eye, thanks to my good aim, I also managed to knock her pretty
      hard in the jaw. Sadly it didn"t break. I don"t think. I"m not sure. I hope so. She"d have lots of bruises, though,
      that"s for sure. Not to mention the blood on her hands from when I had tried to copy her tactics and dug my nails into
      her skin as hard as I possibly could. Bad day to decide to not wear gloves Solanaceae. That was a terrible idea. Since...well...today
