    got up from the fallen tree, walked over to him. She squatted in front of him and stared into his eyes. "You got a nice
    growl there, but your eyes are saying something different." She reached out and patted in between his ears. "Huh?" Was
    his only response; as he turned his head away from her. "Besides", she tilted her head, "you know, we would never hurt
    our sister..." She laughed aloud, "but you..." she smirked. "Well, well..." She came from around the side of Sophia. It
    was Seraphina. She was the tallest and the oldest of the four sisters; her hair was the color of flame. It fell to her
    waist. Her eyes were the color of amber. She was beautiful and nude. She had a mischievous grin on her face. Seraphina
    knelt down, hugging her sister. "What a beautiful coat you have..." She reached out and picked up one of the female pups.
    "Well now, little girl," she held her in her arms with her belly exposed to the world. She playfully scratched it, the
    little pup, laughing, tried to bite her fingers. She growled. "Oh, my, so feisty!" Seraphina laughed, her amber eyes glowed.
    "So beautiful..." All the sisters laughed. "It is good to see you all..." She spoke looking up to her sisters. The black
    wolf stepped by her side, still not trusting them. Angelina noticed this immediately. "You don"t have to worry; she looked
    at the black wolf, "she"s eaten the flesh of an animal." "Hmmph..." He responded, turning his head opposite of her. "We
    can never bring her back now..." Angelina continued, she leaned in close to his black ears. She had a mischievous smirk
    on her face and her eyes narrowed. "But... we can come and see her anytime we want... I mean any time!" He looked up into
    her eyes and he slowly shook his head and closed them slowly. "What the!" Angelina rose up, putting her hand on her waist.
    "Are you..." She pointed at him. "Sticking your tongue out at me!" She turned to look at her mate, just as the pups and
    the others did. He was sitting up, his ears perked up, his eyes narrowed, and the tip of his red tongue exposed at the
    front of his muzzle. "Indeed..." He responded. "Oh my..." "Ha ha..." The sisters roared with laughter. Hmmph..." Angelina
    folded her arms, pretending to pout. "That will not work on me..." He continued, he motioned in the direction of his mate.
    "She tries it all the time." Smiles lit up all around. Seraphina was holding a little female high up in the air. She gazed
    down at the angel holding her firmly. She was smiling and laughing, talking to the pup. "Aaachoo!" The pup sneezed. Seraphinas"
    eyes widened in surprise. "What!" The others raced to her side. She was still holding the pup high into the air. The black
    wolf and his mate rose up on their hind legs supported by her sisters. The pups sat on the ground watching the scene.
    "How can this be?" Seraphina spoke, gazing at all of them. When the pup had sneezed, the little female pup turned into
    a little girl. If that was not surprising enough, she had two large, brown ears with white tufts sitting on top of her
    head. A tail was attached to her back covered in fur of chestnut with a white tip. She smiled, laughing, exposing two
    canines in her mouth. She was slowly brought back down to earth, smiling all the way. She stood on two legs quite wobbly,
    but she reached out and grabbed her mother"s coat around her neck to support her. Sophia spoke. She was standing next
    to Seraphina, looking down at the child on the ground. She raised her eyes to Seraphina. "How can this be?" Sophia was
    puzzled; they looked at each other shaking their heads, and then returned her gaze to the pups. "I don"t... Understand."
    The black wolf sniffed his daughter. "It"s her..." He looked at his mate and at the rest of his pups. The little girl
    released her mother"s coat, turned, and ran to her brother and sisters. They smiled, laughed as her sister came to them.
    They jumped up and greeted her as if nothing had changed. She sneezed again, then transformed back to a wolf pup. The
    adults watched, amazed, not understanding what was going on. "It is possible..." Seraphina spoke running her hands through
    her flame colored hair. She watched as the pups were playing. She rose up on her hind legs, Sophia caught her front paws.
    "What you mean?" They all looked at Seraphina for the answer. "You were with pup before you ate the flesh..." She looked
    at her sister, Sophia let her front paws go, and she sat on the ground in front of her. Seraphina continued to explain.
    She could see the worry in her sister"s eyes and the black wolf"s eyes. "It"s not that ... that.. it will be all right..."
    Seraphina smiled. "Because, it occurred after they were conceived." She smiled watching the pups play. "So..." Angelina
    spoke looking up to her sister. She questioned her with her eyes. "What about..." Angelina asked. Seraphina was watching
    the pups play and then turned looking at the group. She looked at her sisters and the black wolf; her eyes conveyed that
    everything is all right. She looked up to each sister, they all smiled. "We will be here to help... Seraphina spoke, they
    all nodded their heads. "Once they"ve mastered their transformation it should be relatively easy." "But..." The black
    wolf interrupted, his eyes filled with worry but she smiled at him. "The pups have the attributes of both mother and father..."
    She placed her hand on her sister and scratched behind her ears. She turned her head and looked over her shoulder. She
    finished her sentence. "The pups have the attributes of both mother and father, she paused and smiled, "Angel and Wolf."
  sentences:
  - Mr. Jefferies finally got done lecturing on Ancient Greece and passed out our work for the day. We could work together
    or separate but since I was sitting next to Rhydian now we decided to work together. Looking around while he read over
    the worksheet I noticed Tom and Shannon sitting together and working too. Feeling a weight on my leg I looked over to
    see Rhydian with a grin on his beautifully smooth lips and smiled back. "Is it bad that I can"t stop thinking about more
    of your explanations?" I whispered so low only he could hear, this of course only made his grin grow. He moved his hand
    higher up onto my thigh and moved his lips an airs breath from my ear. "No I think that"s a very good thing. Cause I haven"t
    thought of anything other than what happened in the darkroom the entire time." He whispered into my ear then he bit my
    earlobe before pulling away and looking back down at his paper. This of course left my heart trying to jump out of my
    chest and my head swirling. I shook my head to clear it of all thoughts of Rhydian and heard him chuckle beside me. "Maddy,
    Rhydian I see you haven"t gotten much work done. Would you like to explain why?" Mr. Jefferies asked looking between the
    both of us. "Uh we are a bit confused on what we are supposed to do." I replied cautiously. Nodding he leaned over the
    table and started explaining the questions to us. The next thing we know the lunch bell was ringing and everyone was packing
    up. Walking down the hall towards the cafeteria people were bumping into me from every direction and I could feel my wolf
    surfacing again just not as fast. Trying to control the wolf while it was still new to me was hard but I was learning.
    I was about to enter the cafeteria when I felt someone pull me back from the door. Rhydian had ahold of my arm while looking
    me up and down before continuing to pull me backwards. We ended up in the boy"s locker room in front of his locker. "What
    are we doing here?" I asked obviously confused. "Well I couldn"t very well let you continue going around the school looking
    like that, now could I." he grinned once again looking me up and down and I remembered I was still in the short shorts,
    tights, and my school shirt. "Well what can I do while still at school?" I asked once again confused. He was taking the
    lock off his locker door and pulled out gym pants and a t-shirt of his. "Are you serious?" I practically squealed at him.
    He laughed and pulled me closer kissing me on my lips. He pushed the clothes into my hands and turned around. "Yes now
    hurry and change so we can go get some food." He pretty much barked at me. I pulled my clothes off and pulled his shirt
    over my head then pulled the gym pants up my legs laughing when they trapped my feet inside. "Okay I"ll admit it was a
    good try but the pants have swallowed me." I explained tugging on his shoulder letting him know he could turn back around.
    He looked me up and down once again but this time his wolf was surfacing for some reason. "Do I look so bad that even
    your wolf finds it horrific?" I laughed nervously. "Quite the opposite you look great in MY clothes. Here." He kneeled
    down on his knees and rolled the legs of the pants up until my feet finally were free. Then he looked up at me and his
    eyes were yellow and I finally understood. His wolf was possessive of me. He ran his hands up my legs to my hips and over
    the sides of my ribs then he pulled me in for a kiss. Much like the one in the darkroom this one was passionate and out
    of control. A part of me knew that we should stop before we got caught but when I saw his wolf rise mine decided to join
    the party to. He slid his hands back down my sides and around my thighs picking me up and closing my legs around his waist.
    He held me up against the lockers kissing me senseless. Finally we pulled a part for air and I kissed down his neck while
    he ran his hands back up my thighs but this time when he made it to the bottom of his shirt they went underneath it. The
    feeling of his hands running over my bare skin wasn"t calming my wolf but riling it up even more. I threw my head back
    and moaned when he ran his fingers down my spine. Pulling his head back to mine I kissed him deeply while tugging on his
    hair in which he groaned. When we heard the latch on the door squeak we jumped apart before the person could see our position.
    "What do you lot think you"re doing in here?" the PE teacher asked. "Maddy needed some clothes since hers weren"t exactly
    school dress code." Rhydian spoke with all the confidence in the world. I on the other hand couldn"t even look at the
    teacher since my eyes were still yellow and my veins were black. He held me behind him in a protective stance while the
    teacher thought over his answer. "Okay but you need to leave now that she"s changed." She ordered. "Yes ma"am." He replied
    pulling me by the waist out of the locker rooms. His arm was still tight around my waist when he pulled me into the darkroom.
    "Are you okay now? Enough to go get food before class?" he asked looking me over to see that the inky veins were fading
    fast and that my eyes were once again my natural brown. "Yes I"m okay. Let"s get food." I stood on my tip toes and kissed
    him on the lips before turning around and walking out the door. Walking through the cafeteria doors the giant room was
    almost empty which was a sign class was about to start. We went up to the counter and I started to laugh. "Veggie day!"
    I exclaimed. "Never mind I"m no longer hungry. You should get something though." He said like he might be sick. "No I"m
    good till I get home. Let"s get to class." I replied still laughing hard. He smiled while shaking his head and pulled
    me close to his body. Next thing I know I"m being tickled then the loud shrill sound of the bell sounded and we went running.
    "Maddy, Rhydian your late!" the teacher called out. Jefferies walked in and noticed my clothes. "At least your better
    dress than our last meeting Maddy." He nodded at me as he walked back out of the room and we took our seats. When the
    teacher started teaching I started to think about what I was going to do when I got home. This had already been a long
    day. Tomorrow probably wasn"t going to be any better if we kept up like today. Merry Christmas y"all! Leave me some reviews.
    They make me sooo happy! A/N Okay for my regular readers I have decided since so many of you want me to continue with
    the story that has developed with chapters two and three to post it separately since some was getting confused. The title
    you should look for now if you still wish to read it is Maddian Wolfblood. Now that I have a new laptop I"ll try and update
    at least once a week. Also PLEASE send in ideas for the story I would love to see what you guys want to happen and I"ll
    see what I can do to incorporate them into the story. By the way one of you asked about Tom and Shannon finding out and
    I already have an idea for that rattling around inside my head so that will be coming up in the next few chapters. So
    hopefully you will keep reading and reviewing and I do believe I will try to update some more tonight or at the latest
    tomorrow since after all it is Christmas A/N Okay this chapter is dedicated to one of you guys. I"m loving all the feedback
    and ideas .Also there is another idea I got from a Lucy that wanted me to write a one shot of Maddian reuniting in season
    3. I will try to do this for you but I don"t know how good it will be cause of the fact I have not yet watched season
    3. But I will look around on YouTube and such and see if I can make a good story. So with no further distractions and
    music blaring here"s your one-shot! Chapter Four Unknown POV Running that"s all I could do. I followed his scent until
    I finally came upon a farm with a pretty large stone house and no other houses for what seemed like miles. I went a little
    closer being careful to avoid the broken branches on the ground and dried leaves not wanting anyone to know I was here
    just yet. His scent seemed to disappear into the house I seen a shed and ran for it. I could at least hide out here and
    rest then continue tracking him later. Walking in and noticing the shelves that held wooden boxes and picture frames and
    a lot of other things I quickly darted behind them and curled up to rest. Before everything went black I started to remember
    how we ran to the village and had the time of our lives. Now I understood why my mother had been a tame before going wild.
    There was so much we didn"t know about and so much to do. My sister the daddy"s girl she is was too scared to come with
    me when I told her I was leaving. Truthfully she was only my half-sister her mother died before mine came along. My mother
    was proud and beautiful there"s really no question to why my father fell for her even if she happened to be a tame before
    she came to the wild. All I could think about was how much it was going to hurt her when she found me gone. Just as I
    was about to fall asleep when I heard a noise, it was the door opening. A male wolfblood walked in he was talk with curly
    hair about the color of sand. He looked like he could be intimidating if he wanted to be but something about him gave
    off the thought of laid back and childishness. Either way I wasn"t taking the chance I ran for it pushing him to the side
    and running out the door. I was trying to quickly find his scent again when I heard another door slam open and out walks
    a female wolfblood that was about the same age as the male. Her eyes were yellow and her veins where an inky black, she
    was about to change. The male came up behind me in about the same shape, both had growls ripping from their throats, a
    clear warning. Then the door slammed again and I see him. Rhydian. But there was another. A tomboyish girl that wasn"t
    very tall or big but still had an air of superiority about her. Her dark brown hair flowed just passed her shoulders and
    her tanned skin worked together perfectly to make her look more feminine than she seemed to want. I was guessing that
    the two older wolves were her parents and she resembled them a lot mainly because she too had let her wolf come closer
    to the surface. But even as she was threatening me I couldn"t help but think she was beautiful. "Jesse?!" Rhydian asked
    almost like he thought he was dreaming. "Hey Rhydian." Rhydian POV I couldn"t believe Jesse actually came. I mean I did
    tell him he could leave but I didn"t think he would follow me especially after his father"s issues with me. Neither one
    of us are high on his favorites list but still. "Jesse does he know you"re here?" I asked thinking that I"d have to keep
    running to keep Maddy and the Smiths safe. He turned to look at me after pretty much just staring straight at Maddy answering
    with, "I don"t think anyone knows I left yet. Although it probably won"t slow him down." "Who are you?" Maddy asked. "He"s
    Alric"s son. He"s okay. We watched each other"s backs." I quickly explained. Maddy seemed to finally get tired of the
    staring and yelled at him. "Stop staring at me like I"m a freak!" "Sorry." "Are you here to help your father?" Mrs. Smith
    asked him while looking around the perimeter of their property. "No. I just had to get away and I didn"t know where else
    to go so I followed Rhydian." He seemed scared which was no surprise Emma could do that to almost anyone. Except Maddy.
    "Come inside." She said while walking back toward the door. It had been a few days since I had been back and the Smiths
    had gotten me back into school and situated while waiting for Alric to finally show himself. He had made a couple appearances
    but nothing to say that he was done waiting. Jesse on the other hand was loving the human world like I always knew he
    would. Honestly he fit in too well to be a wild wolf. He had been hanging around Tom and Shannon but mainly he hung around
    Maddy. I wasn"t sure how she felt about it though, at times she seemed happy to have another friend other times not so
    much. A couple times I had caught him staring at her like he had the first time he saw her. Finally I got tired of trying
    to guess and just came straight out and asked him. "So you and Maddy seem to be pretty good friends now." The way I stated
    it, it sounded more like a question than a statement. "Yeah, about that, I had a question for you. Does she have a boyfriend
    or anything?" he seemed scared about asking me. Why would he be scared by me? It"s not like I have a claim on her. It"s
    your own fault. Tell him she"s yours. My wolf demanded. "No not that I know of why?" I replied while ignoring my wolf.
    "I was thinking of asking her out. I mean get real who wouldn"t want to. She"s beautiful and fierce and smart. The list
    just keeps going." He seemed almost in a day dream so I snapped my fingers in front of his eyes and he shook his head
    and focused on me again. Kill him. My wolf demanded again. Shut up. "You can always try." I encouraged him then walked
    out not being able to take the thoughts of him and Maddy together. "Jesse! Rhydian! Maddy! Can you come down?" We all
    ran out of our rooms when we heard Emma yell, my eyes connected with Maddy"s and we both seemed to have the same question
    in them. "Yes mum?" "Jesse we want some more information on you. Like why you"re not helping your father and why you seem
    to fit into the human world so easily." Emma stared straight at him and he stepped back from her. Finally he took a deep
    breath and sat down on the sofa. "I"m not helping my father because he and I don"t exactly see eye to eye on something"s.
    Anything really. As for fitting in so well I"m not sure. Maybe it is because my mother was a tame before she came to the
    wild. She used to tell me stories about her family and the stuff they would do. She hasn"t seen them for a while because
    she ran off from them but she still remembers and would tell me." He seemed sadden by talking of his mother. Perhaps he
    missed her, after all that was the reason he gave me for not leaving at first. "Why did your mother run away, Jesse?"
    Emma seemed emotional about the topic as well. "She discovered Eolas and some other skills that she couldn"t use unless
    she was in the wild. So she left." "What does she look like?" Emma demanded. "Black hair down to her back, dark blue eyes,
    pale skin, and a stare that could rival yours. Why?" he asked. Then added, "She looks a lot like you." "Is her name Louise?"
    "Yes. How did you know?" Jesse asked while Emma looked at Dan with a slight smile on her face. She almost looked like
    she was going to cry. Dan on the other hand just wrapped his arms around her. "Because she is my cousin. I"ve missed her
    for so long." Jesse seemed to think that over then suddenly looked over at Maddy with a look of horror on his face. I
    on the other hand could barely contain my laughter. They were related. Well no date now. "So that means we are related."
    He looked at Emma while she nodded. "Great." "You can stay with us as long as you wish." Dan said looking at both me and
    Jesse. "Thanks Mr. Smith." We both replied at the same time to which we cracked up laughing. Maddy seemed to be frozen
    in place so I went over to her and threw an arm around her shoulders shaking her out of her thoughts. "Watch it you might
    hurt yourself if you think too hard." I teased while smiling. She looked up at me and just shook her head laughing. "That
    explains your good health cause you never think." She retorted to which I pulled her on my lap while tickling her. I looked
    up as she struggled over to Jesse who was watching us. He just smiled and shook his head. Looking me straight in the eyes
    he mouthed two words. You win. I smiled back because he was right. I had won, maybe not Maddy"s heart but I had her none
    the less and plenty of other stuff to be thankful for. Regardless of that or the fact that they are related. He gets too
    close to her and he will wish he hadn"t. I think my facial expression showed what I was thinking cause threw his head
    back laughing so hard I thought he might pass out. Ugh stupid boys. My wolf muttered always to have the last word. A/N
    okay so probably not what you had in mind but it popped into mine when I read the request so I figured why not. Tell me
    what you think. A/N Hi guys and gals. I"m sorry if you are waiting on an update. I"m working on it for all three of my
    stories. I don"t feel very well at the moment but I promise you I will update soon. I do have a question for you guys
    though. The chapters I have wrote in Rhydian"s POV, are they well written? I find it hard to know when they are well written
    considering I"m a girl trying to write from a guy"s POV. I"m writing stories for my senior project and I"m kind of tired
    of writing from a girls POV. So can you guys give me some feedback and some help please? And once again I swear I will
    work on updating. Thank you. A/N Someone asked for a Dances with Wolfbloods one-shot so here"s what I came up with. Hopefully
    y"all like it. Had to pull myself off of tumblr to write this Rhydian"s POV Leaning against the lockers with Jana on one
    side and Maddy on the other but Maddy had her head on my shoulder I could feel her breath brushing my neck from her light
    snoring. I shrugged my shoulder roughly trying to wake her. She woke startled and looked around when she looked toward
    me I asked her about the journal in her lap. "I made it for Shannon. Hoping she could forget about the files." She explained
    while turning it over and over in her hands. "Just give her time. She"ll be okay." I replied. I couldn"t help but watch
    her out of the corner of my eye. She was beautiful. I kept hearing the Three K"s speak of the Disko that they have planned.
    Could I ask her too it? Was it possible she would say yes? "Um...Maddy could I speak to you alone for a moment?" I asked
    pushing myself up off of the floor and holding a hand down for her. She took my hand with a worried expression but didn"t
    question me until we were alone outside since our darkroom was taken at the moment. "What"s wrong?" she inquired shivering
    as the wind chose then to blow. I shrugged out of my jacket and swung it over her shoulders and pulled it tight until
    she grabbed it to hold. She smiled and looked away then looking me back in the eyes she repeated her question. "Nothing
    is wrong, it"s just that I had a question for you. I just figured to ask you away from distractions would be better."
    I explained but in the end kind of ended up rambling. I was losing my nerve. This isn"t good. "Well..." she said getting
    slightly impatient. She shifted from one foot to the other while waiting and I decided to just go for it. "Will you go
    with me to the dance?" I spoke quickly and I wasn"t actually sure she heard me until she looked at me with wide eyes.
    She seemed a bit frozen. Was it that bad of an idea? I shouldn"t have asked her, now I understand that. It had been a
    good three minutes without any kind of verbal response from her, so I decided to speak instead. "Never mind it was a stupid
    idea. I"ll see you in class." When I started to walk away I seen her face fall a bit and she seemed to try not to cry.
    I knew by her reaction before though that I miss interpreted her actions. Or she probably was crying because she was disgusted
    or creeped out. A few minutes later he walked into class but instead of sitting next to me like usual she sat next to
    Shannon. I should have known that she wouldn"t want anything to do with me. The rest of class went as normal as it could
    have without Maddy by my side. She disappeared after class with Shannon and then reappeared in the cafeteria for lunch.
    We all sat at the same table Tom chatting away while Maddy and me we basically sleeping in our food. All of a sudden Shannon
    came running in and over to our table doing everything except jumping in place. Although I suspect she would have started
    to if we hadn"t jumped in. "Shannon you okay?" Maddy asked with a smirk on her beautifully smooth lips. I really need
    to stop thinking like that... "Harry flipping Averwood just asked me to the disko!"She practically yelled. We all laughed
    and congratulated her. I wasn"t exactly up for talking about the dance which just reminded me I no longer needed the tickets
    I had. "I need Maddy there so Rhydian you should come to and Toms going anyway so we could make a group thing out of this.
    Or if you want to keep the K"s away from you then you and Maddy could go together." Shannon offered while smiling still,
    I swear her face was going to break in half if she didn"t stop smiling so big. "I"m good." I spoke. "Come on Rhydian!"
    Maddy practically whined. I just looked at her for a moment then got up shaking my head and walked out of the room. I
    knew she was following me but had no clue as to why. "I think you made your decision already, Maddy." I growled at her
    without turning around to face her. Honestly I didn"t know if I was more hurt or angry at who else was on her mind. "Yes
    I have made up my mind. Maybe you should stop and let me explain." She shouted back at me. I stopped but didn"t dare turn
    around and let her see the emotions running across my face. "Fine." This is just the first part. I will also be updating
    my other two stories soon. I just have to find time in between my classes. Thanks for being patient. I know most don"t
    like waiting.
  - 'Clamping her mouth shut, thakfully no one had come running at her screams, she tried to calm herself down. Her whole
    body shook with the effort it took her to be quiet when ligtning struck again. Tears streamed down Danu"s face as she
    struggled to keep from screaming. She hugged her blankets as close to her as physically possible. Her arms and legs burned
    as she curled in upon herself. Shaking from the thunder still ringing in her ears, Danu beganto sob. Her body shook with
    each heaving sob. No longer trying to be quiet, the fear had overcome her, her crying grew in volume. Someone should have
    heard, apart from the fact that the pelting rain disquised any and all noise. Clinging on to her beadclothes for all she
    was worth, danu"s musscels relaxedone by one. Softly, gently, she fell asleep and into dreams about a tall man with dark
    peircing eyes. A/N: So I said that I"d try to get Septimus into this chapter. It was a lot harder than I anticipated.
    In case you can"t tell. He"s the one that she"s dreaming about. Hopefully it will all make sense later. On a less happy
    note. I will probably not update for quite some time now. I somehow managed to hurt my wrist while at school and guess
    what. It turns out that I have tendonitis which is temporary, so... Hopefuly I"ll be able to write more in a few weeks.
    But the brace means that it"s hard to do just about anything and I have to get a splint so that it will be completly imobilized.
    Recap. Septimus will be in the next chapter. He"s fully introduced there and everything. And you probably won"t get it
    for a while. The only reason I managed to type this up is I did it one handed while on spring break. And yes, I get that
    our spring break is a little late. Whatever. Lakeside Gravity Danu was curled up in her chair with the book Yvaine had
    given her. Her boots stuck out of the fluffy mess of skirt and petticoats that she wore as they rested on the armrest.
    Her long brown hair hung down the other side of the chair. She felt the slight dip of the ship that signaled descent,
    and sighed. Sticking a random piece of parchment in the pages, she stretched the kinks out of her neck and sat up. The
    door was still safely shut, which meant that she had a few moments more than she originally thought. She braced herself
    for impact, grateful that this time someone had managed to land the ship relatively smoothly. The previous landing had
    jarred her much more than she would have liked. She paced around her cabin six times, the heels of her boots lightly tapping
    on the wooden floor. Her cabin wasn"t particularly large, but she paced it diligently, biding her time. She wanted to
    get out of the stuffy space, but was still afraid to do so. There was something about being on land that made all of the
    crew members more adventurous. They usually spent the first day lazing about near the ship, but hardly paid much attention
    to their surroundings and people. The only ones they cared about were the ones with weapons. Danu slipped her boots off
    her feet. She held them in her hand and carefully opened the door. She continued to hold her boots in one hand as she
    crept along. Her skirt, though much more voluminous than preferred for sneaking around, hardly rustled at all as she turned
    one corner after another. There was a huge ruckus from the top deck, and Danu stepped back a bit before continuing on.
    She had no clue what was going on, but it didn"t look like anyone was going to be coming down for quite some time. She
    continued on for only a few moments before hearing slight creaking and music. She knew that her uncle had a music machine
    thing, she couldn"t remember its proper name, but he didn"t creak floorboards that way when he played it. There was too
    much carpet in his cabin. She moved silently, almost stalking the noise. The creak was subtle, so subtle that anyone not
    looking for it would have missed it. In all the commotion that was happening above deck, Danu was surprised that she had
    heard it in spite of the fact that she had conditioned herself to respond to even the slightest noise. She leaned against
    the wall, just a few feet from where a man dressed all in black stood. He had unsheathed his sword, and appeared to be
    taking great care to make as little noise as possible. "Come here often?" Danu asked. She couldn"t help but try to lighten
    what appeared to be a very tense moment for him. "Who are you?" He tensed up even more, his gloves hiding the whiteness
    of his knuckles as he gripped his sword even tighter. "That"s no way to treat a lady." The man looked her over. In her
    blue dress, the golden chain around her neck glimmered in the light. He recognized the chain instead of the diamond. He
    had seen the thick coil around his father"s neck his whole life. "I suppose not," he said as he sheathed his sword. He
    removed his gloves and walked towards Danu, a strange contemplative look in his eyes. She became increasingly aware of
    her height, or lack thereof. He was tall, with dark hair and black eyes that seemed to pierce her soul. She felt her breath
    hitch in her throat, almost as if it was stuck. There was a certain attraction that she had never felt before. The man
    picked up the pendant. In his hands the stone turned from a diamond to a ruby. Danu stared at the man in front of her
    with shock. She hadn"t ever expected a prince to even speak to her. She was about to drop to her knees. She would have
    had the necklace not stopped her before she had lowered herself only a few inches to the degree of a princess to a king.
    She stood again, feeling more confused than ever. "My lord, please forgive my impertinence. I was not aware of your identity."
    He was much too young to be Primus, and the only other prince alive was Septimus. He had the most notorious reputation.
    But whatever could be said about him, he was powerful and alive. He could cut off her head in an instant if he felt like
    it. He walked around her, letting go of the pendant as he circled. His eyes wandered over every inch of her from her light
    brown hair tumbling down her back, to the faintest touch of a blush on her cheeks. What he noticed the most, was that
    her eyes were the most brilliant shade of blue. He would have sworn that they were brighter than the sky and more intense
    than the ocean. They burned with emotion, with only a hint of fear at the surface. He had always favored the color blue,
    but in that moment he loved it. "Strong willed, a good sense of pride, common sense. You have some fine traits, even if
    you are a little short." "I"m not short," Danu replied a little quickly. "Feisty too. I would say that you meet most of
    the qualifications. Now tell me, who is your next of kin?" And I"m going to leave it here for now. Sorry it"s taken me
    so long to get back to this. I didn"t expect my wrist to hurt for as long as it did. I"m still working on everything,
    it"s just been on hold for longer than I would have originally liked. Thank you all for putting up with me and my sporadic
    updates. I"ll try to get the next chapter up next week. Danu mumbled something about a captain and her uncle, looking
    down at the floor. She couldn"t help it. Being in front of a prince, no a king, was intimidating. "I"m afraid I didn"t
    catch that," Septimus said. "My Uncle, Captain Shakespeare is physically the closest relative available. If you want one
    of my parents, I"m afraid you"ll have to travel a while to get to them. Even on the ship," Danu said. His voice had softened
    and that made Danu a little more comfortable. She still stared at the floor, unsure of how to act in the presence of a
    king, but she had managed to find her voice. "Is he on the ship now?" Septimus asked. "Yes." Danu looked up at him, wondering
    what he was asking. Septimus held out his arm for her to take. "Would you lead me to him?" She took it, not sure if it
    was a wise thing to turn a king down. Not that she wanted to. He was attractive, and she felt drawn to him. His eyes were
    dark and smoldering, like the ones she had been dreaming about. She led him down the corridor, and then through a few
    twists and turns to the cabin of Captain Shakespeare. There was music playing, as it usually was when the crew had free
    time. Danu knocked as loudly as she could. "Captain?" she called through the door. "There"s someone here to see you."
    The music stopped. There was a slight scuffling noise, and then a pause. Captain Shakespeare opened the door in a dressing
    gown, a smudge on his right cheek. Danu internally rolled her eyes. "What can I help you with?" he asked Septimus "May
    we come in?" Septimus asked. "I seem to have found a young lady on board and I"m not sure I want the crew to come rushing
    down and find her." Captain Shakespeare nodded. He wasn"t too keen on the idea of them finding Danu either. He would do
    anything to keep her safe. "So what can I do for you today?" Septimus took a deep breath. Even though he had spent his
    whole life trying to become king, he was unsure of what to do in the situation he was in. The stone had not only chosen
    him, but it seemed it had chosen a queen as well. "I"m Septimus. Former prince, and now king of Stormhold. And I have
    to ask you for your niece"s hand in marriage." Both of Danu"s and Captain Shakespeare"s jaws dropped at the request. Captain
    Shakespeare because he wasn"t sure what would prompt such a question, and Danu"s at the idea that he would ask her uncle
    without asking her. "Why would you ask such a thing?" Captain Shakespeare asked. "Under normal circumstances I wouldn"t,"
    Septimus replied. "After all, we only just met. Normally I would have asked to court her and then marry her. But the stone
    chose me to be king, and it appears to have chosen her to be my consort." "It can do that?" Danu asked. "Under rare circumstances.
    Usually it tells the king when his love is near," he explained. "As most of the kings met their wives after they had been
    king for a while." Danu blushed a little and looked back at the floor. While she found him startlingly handsome, the way
    he looked at her was slightly intimidating. He looked at her as if she was the most beautiful creature he had ever seen.
    Septimus wished that Danu would look at him. Her eyes were blue. His favourite colour was blue, and her eyes were it.
    When she had looked at him before it had flooded him with feelings that he wasn"t quite sure exactly what they were. But
    the longer he stood close to her, the more intense a pull he felt towards her. He supposed it could be the ruby hanging
    around her neck, but that seemed unlikely. "And what do you want Danu?" Captain Shakespeare asked. She pondered his question
    for a few seconds. "I think that he"s right," she said. "It does feel as if the stone can choose, and I don"t feel as
    if questioning it too much would be the wisest thing ever. After all, you"re a pirate on a flying ship." She looked at
    her uncle and he nodded his head. There wasn"t anything he could argue with that. "If she agrees to marry you, then I
    have no objections." Danu and Septimus looked at each other, each daring to hope. Danu nodded her assent, and Septimus
    felt his mouth curve in a fraction of a smile. "Would you marry us?" he asked Captain Shakespeare. "Here? Now?" "I know
    it"s a little unusual, but this whole thing is unusual," Septimus said. "And you"re a captain of a ship. If you do it,
    it"s just as binding as if a priest did it." "Alright," Captain Shakespeare said. He performed the wedding, acting as
    both witness and officiator. The couple stood in front of him, nervous and excited, in spite of having just met. "You
    may now kiss the bride." Septimus leaned down to kiss her. It was slow, sweet and tender. Danu wrapped her arms around
    Septimus" neck, enjoying it. And a crash burst through the door, and the crew entered. "What have I told you about knocking
    my door down?" Captain Shakespeare bellowed. "I was conducting a wedding!" "We thought you were in trouble," the first
    mate said. "And who"s the couple?" another of the crew asked. "Meet my niece Danu, and her new husband King Septimus,"
    Captain Shakespeare said. There were a few gasps in the crew. They certainly hadn"t been expecting a prince to board their
    ship and then become king while on it. They fell to their knees. "Excuse me," one of them said. He was a fairly short
    member, with black hair and brown eyes. "It seems there was a bit of a misunderstanding, and your men are dead." Septimus
    felt his rage grow, but he could also feel the woman who was next to him. One of her hands was on his back, trying to
    calm him down, and it was working. "I fear that means I"ll have to come up with alternate means of making sure that my
    wife and I arrive back at the palace unscathed," he said. "If I might offer my services," Captain Shakespeare said. "After
    all, she is my favourite niece, and her mother would kill me if anything were to happen to her. And I"ll make sure that
    my crew behaves from here on out." Septimus nodded in agreement. He wanted to go punch something, but would wait until
    that was acceptable. So I really loved writing the last chapter. I have no clue if this is even in character anymore,
    but it"s my fic. So what I say goes. Right? Danu awoke in the morning to find herself wrapped up in strong arms. There
    was a split second of panic before she remembered the events of the day before and snuggled closer to her pillow. Her
    pillow turned out to be her husband"s chest. She snuggled into him and he laughed. "What are you doing?" She mumbled,
    wanting to get back to sleep. The previous night, while enjoyable, hadn"t exactly been restful. "I was just thinking.
    It seems strange to become king, and then so quickly after that find my queen. The same day that I had become king. What
    do you think?" "I think that if you"re going to ask me questions like this in the morning, you shouldn"t keep me up so
    late." She pulled an actual pillow from under Septimus"s head and covered her face and ears with it. It was a poor attempt
    to block out the noise. And it was slightly folly in that it caused Septimus to laugh deeply, and her head was still resting
    on his chest. "I don"t recall you complaining last night." Danu pulled the pillow from over her head and glared at him.
    Septimus was once again caught by her eyes. Bright blue, and beautiful. She must have had a human ancestor somewhere in
    order to have eyes that colour. But he wouldn"t have it any other way. He kissed her, surprising his wife. He pulled away
    after a moment, but she gripped him tightly, holding him close. "Now I remember why I wasn"t complaining last night,"
    she whispered. "But why don"t you show me some more." Septimus was all too eager to oblige. ~oOo~ ~oOo~ ~oOo~ ~oOo~ The
    morning was delightfully less eventful than the day before. Or that was the way that Danu saw it. There was no one unexpected
    coming aboard, and no one leaving. The one thing that she could have done without was the way that she blushed, or at
    least felt like blushing, every time someone looked at her too long. She didn"t have anything to blush about. Sure, she
    was now a married woman. But that hardly changed anything. She was still the same girl she had been just the day before.
    Only now she had a title. Just thinking about that was enough to make her shake her head. How was she going to explain
    that one to her mother? Hi mum. I went off with Uncle Dauntless and got myself married. And my husband is the most feared
    man in all of Stormhold, and the king. That wouldn"t go over too well. "How are you my dear?" Captain Shakespeare asked.
    "More than a little tired," Danu admitted. She then wondered if that was too much information for her uncle. It probably
    was, but she hadn"t said anything incriminating. "More brides than you have spent the first few days after their wedding
    exhausted," Captain Shakespeare assured his niece. Danu could feel the blush rise around her cheeks. It had felt almost
    constant, but it burned brighter with a fervor that she wanted to hide. Captain Shakespeare laughed. "Don"t worry. No
    one here thinks anything of it." That made Danu feel slightly better. But only slightly. She was still embarrassed out
    of her mind. "There you are," Septimus swept in followed by the first mate. "I"ve just been talking with George here about
    security and our route. He said that you were the best person to consult with in terms of navigation. But he assures me
    that we"re safer here than anywhere else." "I usually set the routes for our trips," Captain Shakespeare said. "But George
    here is in charge of security. Not that I can"t take care of myself or my crew. He"s just better at making sure that no
    one gets close enough to even try anything." "Though," Danu interjected, "with your reputation we likely won"t have any
    trouble at all." "I guess I do have a bad habit of killing people who get in my way," Septimus admitted. "And I really
    hate traitors. So there is some truth to the rumors." Danu rolled her eyes. She knew that the rumors wouldn"t have gotten
    as far as they had, or been as outlandish as they had been, if they hadn"t had some grain of truth. "Just try to avoid
    killing people unnecessarily, please." "I think I can manage that." Danu smiled. She might have jumped headfirst into
    marriage, but she was founding that she could at least be a positive influence in Septimus" life. Hopefully she could
    be a positive influence for her home. A/N: So I"m not really sure anymore where this story is going. I guess that"s what
    happens when there"s a few years between chapters. And I"m not going to promise that I"ll get the next chapter up soon.
    I really have no clue when I"ll have the time and/or energy to write it. Or if another story will take precedence. I am
    really hoping to get this finished and done soon, though. But the best and easiest way to get me to write more is to tell
    me that you liked it. I thrive off feedback. And actually the only reason that the past two chapters have gone up is because
    someone liked/followed my story. So if you want to read more, let me know. Danu shook her head as she clung onto the pillow.
    The thunderstorm they were flying into wasn"t the biggest one she"d been in, but she still didn"t like it. And she liked
    the fact that it was happening at night even less. Septimus was sound asleep next to her. He"d managed to fall asleep
    before the storm hit, and hadn"t been awakened by it like she had. Another crack and flash, almost simultaneous, echoed
    through the small cabin. She buried her head into the pillow, debating whether or not to wake her husband. After all,
    he was supposed to protect her. But she wasn"t in any real danger. Finally, her need to have company won out and she shook
    Septimus gently. He sat up faster than she had seen anyone move, looking around as if there was great danger. "Septimus?"
    she asked. "Danu? I thought... What time is it?" "I"m not entirely sure," she confessed. "I think it"s about one or two
    in the morning." He looked over at her rumpled hair and the dark circles starting to form under her eyes. It was clear
    that she"d been up for a while. "Why are you awake?" he asked. A flash, so close that it had to have hit the wire strung
    to the ship for that exact purpose echoed through her skin. She almost jumped, but grabbed Septimus" hand. "The storm.
    I"ve been afraid of them for a while." He pulled her into his arms. "You should have woken me up when it started." She
    snuggled into his embrace, feeling her muscles relax. As long as she listened to his heartbeat she could ignore the thunder
    crashing just outside her room. "I didn"t want to disturb you," she mumbled. "You looked so peaceful sleeping there, and
    you need your rest. We"ll be at the palace soon, and then life will get interesting." He looked into her blue eyes, feeling
    himself falling for her. He had known it would happen, but he hadn"t expected how quickly it was happening. Part of him
    wanted to fight it, to remain as detached from his emotions as he had been while his brothers were alive. But a larger
    portion of him wanted to let himself be vulnerable now that his survival didn"t depend on him remaining aloof. "I"m not
    going to sleep when you can"t," he said. "I..." he trailed off. "Thank you." Danu whispered the words, softly exhaling
    as she curled up in the space that she seemed to fit as if it had been made for her. When her nose tickled his neck, it
    was all he could do to keep from kissing her breathless. He wasn"t sure if she needed that. While it would be a distraction
    from the storm, and he certainly wouldn"t be complaining, she had looked exhausted. Still, her lips ghosted over his skin,
    occasionally placing a kiss on particularly vulnerable parts of his neck. It looked like sleep wasn"t exactly on her mind.
    He kissed her heartily, his hands roaming over her. He enjoyed the little gasps and sounds that came from her as he distracted
    her from the storm raging outside. A/N: So yes, this chapter"s short. I really didn"t have much of an idea going on when
    I started. I"ll get them to the palace soon. I hope. Anyway. I"m doing much better at updating now. But seriously, reviews
    or anything would be greatly appreciated.'
