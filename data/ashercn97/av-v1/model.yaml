  - source_sentence: She walked from underneath the large, dense tree branches where they were sleeping, into a small clearing.
      The clearing was surrounded by large pine and fir trees; the last of the snow clung to their branches. The forest floor
      was carpeted by old, discarded pine needles. There were a few patches of left over snow scattered along the forest floor.
      The carcass of a deer, killed during the early morning, lay at the clearing edge. "Sister..." "Yes... I hear you." She
      answered. She was not afraid. The voice was familiar. A small light, like a firefly, danced in the darkness. She smiled
      as she watched the light dance between the trees branches, slowly coming towards her. She watched as the small light
      seemed to swim in her blue eyes. Smiling she spoke to the light. "Show yourself, Sophia." She yawned; laying down on
      the dried pine needles that covered the ground. She extended her paws forward waiting for her sister to appear. A small
      flash of light grew into a form she was quite familiar with. It was a young woman; nude, green eyes, yellow hair; beautiful
      features. Her wings extending, covering a distance twice her height, gently folded together behind her... "Sister..."
      Sophia smiled as she looked at her sister sitting on the ground. "It is good to see you..." "It"s been a while..." Sophia
      continued as she kneeled down next to her. "You look good as a wolf." She ran her hands across her fur. She tilted her
      head, laughing as she scratched her sister behind her ears. "Nice coloring..." She was looking at the tip of her sister"s
      tail. "Gray with a silver tip?" She smiled. "Angelic white..." "Huh?" She was enjoying her sister scratching behind
      her ears. She did not hear the question or the comment. "Your tip of your tail?" She pointed it out. "It"s angelic white...
      I bet, it never gets dirty... Huh?" She rose up, supporting herself with her front legs. She looked at her sister and
      smiled. "It is good to see you... Sophia." She continued to speak. "But why are you here?" "Sophia"s" green eyes seem
      to lose their brightness as she shook her head. It was though she had some bad news. "I... I... I..." She stuttered,
      looking away, almost ashamed to say it. "I"ve come"...; she paused, "to take you home now..." She continued, her eyes
      were starting to tear up. "They sent me to bring you back home..." "No!" She quickly responded. She rose from the ground
      and stepped back from her sister. "You can"t..." "I don"t want to..." Sophia covered her green eyes with her hand, concealing
      the fact that she started to cry. "But they..." Sophia was shaking her head. She knew how bad her sister wanted to stay.
      She remembered when her sister first heard the howling; she was excited, something Sophia had not seen in her sister
      in a long time. When her sister left to discover the source of the howl, she smiled. Sophia knew her sister would not
      be coming back for a little while. "They, what?" His voice came from the darkness. He moved from the shadows, into the
      moonlight. His large, black body was imposing; he walked slowly towards them. His eyes burned as he glared at Sophia,
      standing next to his mate. He slowly moved towards Sophia. Each paw quietly placed in front of the other paw. "Who are
      they?" He growled. Sophia turned quickly to him. Her green eyes ablaze, she reached out her hand and pointed at him.
      "Back down, wolf!" Her soft features were hard. "This is between us..." Her voice and her words were like weapons and
      she used them indiscriminately. "You are just a dog... sit down and obey!" She narrowed her eyes and continued to point
      at him; she moved her hand pointing in a downward motion. He stood there glaring, his growl grew louder, and his mouth
      opened up exposing rows of sharp teeth. "You think me a dog? Wait till I get my teeth in you!" The wind, blowing from
      her direction, seemed to pick up, almost blowing him backwards. He lowered his head and continued to push forward. His
      eyes continued to glare at her. "Stop it!" She cried out, she was looking at both of them. "Enough... Both of you..."
      She was standing between them. Her head lowered and looking at the ground. She was crying, her fur wet with tears. Both
      of them were surprised by her outburst. "Enough!" Her voice cracked, she was starting to sob. "I am not leaving..."
      She was sobbing, shaking her head, her eyes closed tight as if that would stop the pain. "You don"t understand...,"
      Sophia paused, "they will just take you... You know that..." Sophia continued to explain to her, pleading. "Take her...?"
      The black wolf raised his head in disbelief. He looked at his mate and then he looked at Sophia. "What do you mean...
      take her?" "Be happy with the time you had..." Sophia walked towards her, kneeling down on one leg, putting her hands
      around her furry neck and hugged her. She cried into her sister"s fur, gently stroking her face. "You may be a wolf,
      but I see you as an angel... My sister!" Sophia whispered into her ear. "I can"t..." She pleaded with Sophia. The black
      wolf stared at his mate as her sister embraced her. "What can I do...?" "It is so little time, I"m asking for..." She
      continued as she looked at the black wolf, tears fell from her eyes. "10... Maybe 15 more years... That"s all I need..."
      She turned her head, nuzzled her sister"s face. "Sister, I want this..." "it is nothing compared to eternity" she continued
      to plead with Sophia Sophia continued to listen to her pleading and begging to let her stay. "It is not up to me...
      Sister." "I can"t..." "Why?" "I can"t..." "Why not..." She raised her head up, looking at Sophia, who was now standing
      looking down at her sister, her face red with tears. Her green eyes seem to lose their luster. The expression on Sophia"s
      face seemed to ask her for something concrete. Something she could take back to them so they would understand. What
      came next caught Sophia and the black wolf by surprised. "I"m with pups..." "Pups!" Both her sister and the black wolf
      spoke. Their mouths dropped open, their eyes wide with surprise as they looked at each other. "How..." Sophia quickly
      responded, she shook her head, raised her hand out. "I know how..." "When..." Sophia corrected herself. The black wolf
      stood motionless. Pups, little ones, the future there sitting in front of him, in his mate"s body. He looked at her
      and she at him. Her eyes nervous, it reminded him of the first time when she tried to howl. He slowly walked over to
      her side. He greeted her, rubbing his nose against hers as she closed her eyes. "I am so happy..." He replied. He sat
      down next to her and looked at Sophia. Sophia stood, motionless, her hands on her hips and she was shaking her head
      with her eyes closed. Thinking about the situation; an angel and a wolf mating? "Sister... I don"t know what to say..."
      Sophia looked at both of them. She watched as her sister leaned her head against her mate. He leaned into her body.
      "This is unexpected..." Sophia opened her green eyes and stared at the ground. She brought her hand up and rubbed her
      chin. Sophia stood thinking to herself about the ramifications of an angel and a wolf. The history of man was filled
      with the mating of gods and man, but not wolfs and angels. She was in the middle of her thought process when something
      caught her attention out of the corner of her green eyes. Looking up, suddenly her eyes widened with surprise. "Sister!"
      Sophia quickly raised her arm and pointed. "Your tail!" "Huh... What!" they both turned quickly, looking at her tail.
      Sophia quickly ran to her side, grabbing her tail as if to pat the fire out. "No, no!" Sophia spoke quickly as she continued
      to no avail to try to stop it. Sophia turned to look to her sister as she was trying to stop it. She looked at her tail,
      slowly fading, turning into golden embers rising to heaven fading into the nothing. "They are taking you, sister!" Sophia"s
      face strained with concern. "No...!" She looked at the black wolf. "My pups..." He watched not knowing what to do. His
      eyes watched in disbelief. There was nothing for him to fight, nothing to chase off. Fear rose from his belly, something
      he had never experienced before tonight. "What can I do...?" He placed his head next to her head. He breathed in deeply
      taking in her scent. "What can I do..." his eyes teared up, it was a helpless feeling, one he had never experienced
      in his life. He looked into her eyes, watching her, knowing he could not help. "What can I do..."The tears rolled down
      his face. "Remember me... Please." She looked at her mate. Her eyes seem to be resigned to her fate. The tears flowed
      as she thought about her pups. "What about...", he started to ask about the pups. She could only rest her head against
      him crying. "They are taking me..." she whispered between sobs. Sophia quickly wrapped her arms around her body squeezing
      her tight. "No... No..." her tears flowed as she cried into her sister"s fur. She held on tightly, hoping, knowing it
      would not help her stay. "No... No... I am so sorry..." Sophia cried, her face buried in her sister"s coat. "Please
      stop..." Sophia moved her hand to her sister"s belly, feeling the life that existed inside." Sophia was crying as her
      sister"s form gently slipped away from her grasp. She, knowing her time was short, stared into the black wolf"s gaze.
      She noticed something out of the corner of her eye. "Huh!" She quickly looked over and saw it. She with all her remaining
      strength freed herself from Sophia"s grip. "What!" Sophia leaned forward with her arms open as if she could catch her.
      The black wolf raised his head, surprised as he watched her leap across the clearing. She straddled the remains of a
      carcass of an animal that he had killed earlier that morning. She reached down with her mouth and tore a piece of flesh
      off the body. Holding the flesh in her mouth, she turned, looking over her shoulder at Sophia. Her blue eyes seemed
      to be saying, "I"m sorry, sister". "Sister! ... No!" Sophia yelled and screamed. " Please..." Her body was still fading
      as the embers drifted into the night sky. She looked at both Sophia and her mate as she quickly chewed, then swallowed
      the flesh. She squeezed her eyes tight, grimaced. It tasted of life lost, she choked it down. "My pups..." Is all she
      could say repeatedly. She suddenly collapsed to the ground, and lay silent. Sophia watched as the transformation ceased.
      She had eaten the flesh of an animal and she would pay a heavy price. Sophia slowly walked over to her, stunned at what
      her sister had done, wiping the tears from her face. She sniffed as she bent down over her sister. She could hear her
      murmuring "my pups..." She stared down at her sister with her green eyes, with a hint of sadness; she rubbed her coat
      from nose to tail. The black wolf walked slowly over, sitting down, he lowered his head and sniffed." Will her..." "Yes...
      She will be fine..." She had a content look on her face, her green eyes shone. The smile came easy. Sophia, still looking
      down at her sister, smiled; her green eyes glowed, and her yellow hair flowed down her nude body to her waist. Her wings
      spread wide, twice her height as she turned to him. "We will be watching..." She disappeared in a bright light and the
      rushing sound of wind. He lay next to her, putting his head on her neck. He could hear her breathing soft, her heart
      beat steady. Taking a deep breath, he closed his eyes slowing falling asleep next to her on the warm pine needles. Spring
      came to the valley with the melting of snow and ice. The streams flowed fast down the mountainside, filling the lake
      full, forcing the old out and the new in. There is a chill in the air, which was offset by the warmth of the sun"s rays.
      The flowers of the valley bloomed along the water"s edge. The bird songs filled the air as they scourged for food to
      feed their young. This particular spring was welcomed by the yelping of four new pups; three females and one male. The
      young male"s coat was black, like his father with yellow eyes. One sister had bright blue eyes; her coat was steel grey
      with a white chest and belly. Another sister"s coat was a mixture of grey and black with black eyes. The third sister
      had a coat of chestnut brown and amber eyes, her tail was the same as her coat but the tip was white. After weeks of
      feeding from their mother, they would finally leave the den, enjoying the world outside. They bounced, ran, played,
      peed, and pooped to their hearts content just like all pups would be doing in the spring. "I"m home..." The black wolf
      laughed. He was greeted by four pups bouncing all over him. "Whoa, now..." He raised his head up, each one jumping and
      licking his mouth. "Food! Food! They cried out repeatedly. "Take it easy... Your father will give you some..." she laughed;
      she smiled as she came out of the darkness of the den. He regurgitated his meal, and they promptly lapped it up. "Soon,
      they will be eating by themselves..." He walked over; they gently rubbed their heads together then touched noses. "Hmmm"
      she gazed at him, "it"s so nice having a home..." "I like that..." He smiled, turned, looked over his shoulder at their
      pups. "What?" "Home..." She caressed his coat with her head. She leaned heavily against him, rubbing against him nose
      to tail. She sat down, watching their pups play with each other. Bouncing, jumping, and growling. One even tried to
      howl. "Not as bad as her first time." He thought. The black wolf walked over and lay down next to her as she watched
      the pups play. His front paws extended, he laid his head down upon them. "I am so tired..." They sat next to each other,
      their tails intertwined. The birds filled the air with song. The pups rough housed in the tall grass. The cool, spring
      breeze brushed through the pines and the leaves of the trees. "Hello... Sister..." Both of them quickly turned their
      heads in the direction of the voice. It was Sophia. Her green eyes shining like emeralds, smiled, her yellow hair was
      tied up in a ponytail. Her wings were folded and brought forward partially covering her nude body. She tilted her head,
      smiled, and gave a quick finger wave. She was standing next to a large tree a few feet behind them. The black wolf looked
      at her with suspicion. After what happened last time, he didn"t really trust her. He gave a slight growl so that she
      would notice. The pups heard, raised their heads, and went running for their mother. When they finally reached her,
      she was standing facing Sophia. She was smiling and laughing, her blue eyes were filled with happiness. "How are you
      doing, Sophia?" She leapt up on her hind legs, Sophia caught her front paws. Sophia gave her a hug and a playful scratch
      behind the ears. "It is so nice to see you..." The black wolf, however, gave a different response. He stood up slowly,
      growling, his ears back and his eyes narrowed. "Good morning, Sophia." She responded, her pups staring at the strangely
      beautiful somewhat familiar sight. Her pups gathered around her feet. "It is good to see you..." Sophia smiled, her
      green eyes focusing down at her sister"s feet at her pups. The black wolf stared, watching carefully. The male pup turned
      to watch him... Turned back and he attempted to growl, heckles raised. "Oh my... What a cute little male you have there,
      sister." A new voice sounded. It was Angelina, the youngest of the four sisters. She was shorter than Sophia, nude,
      with long, brown hair, and hazel eyes. She was quite beautiful and hid her wings folded behind her back. She was sitting
      on a fallen tree behind the black wolf. She was bracing her head up with her hand that was placed on her knee. She tilted
      her head slightly, smiled, and looked playfully at the young male pup. The black wolf quickly turned to see the new
      threat. Angelina smiled at him and gave a slight little finger wave. "Hello..." Her greeting was bright and cheerful,
      Angelina smiled. "You are a big fella... Aren"t you?" she directed her comment at the big, black wolf. She got up from
      the fallen tree, walked over to him. She squatted in front of him and stared into his eyes. "You got a nice growl there,
      but your eyes are saying something different." She reached out and patted in between his ears. "Huh?" Was his only response;
      as he turned his head away from her. "Besides", she tilted her head, "you know, we would never hurt our sister..." She
      laughed aloud, "but you..." she smirked. "Well, well..." She came from around the side of Sophia. It was Seraphina.
      She was the tallest and the oldest of the four sisters; her hair was the color of flame. It fell to her waist. Her eyes
      were the color of amber. She was beautiful and nude. She had a mischievous grin on her face. Seraphina knelt down, hugging
      her sister. "What a beautiful coat you have..." She reached out and picked up one of the female pups. "Well now, little
      girl," she held her in her arms with her belly exposed to the world. She playfully scratched it, the little pup, laughing,
      tried to bite her fingers. She growled. "Oh, my, so feisty!" Seraphina laughed, her amber eyes glowed. "So beautiful..."
      All the sisters laughed. "It is good to see you all..." She spoke looking up to her sisters. The black wolf stepped
      by her side, still not trusting them. Angelina noticed this immediately. "You don"t have to worry; she looked at the
      black wolf, "she"s eaten the flesh of an animal." "Hmmph..." He responded, turning his head opposite of her. "We can
      never bring her back now..." Angelina continued, she leaned in close to his black ears. She had a mischievous smirk
      on her face and her eyes narrowed. "But... we can come and see her anytime we want... I mean any time!" He looked up
      into her eyes and he slowly shook his head and closed them slowly. "What the!" Angelina rose up, putting her hand on
      her waist. "Are you..." She pointed at him. "Sticking your tongue out at me!" She turned to look at her mate, just as
      the pups and the others did. He was sitting up, his ears perked up, his eyes narrowed, and the tip of his red tongue
      exposed at the front of his muzzle. "Indeed..." He responded. "Oh my..." "Ha ha..." The sisters roared with laughter.
      Hmmph..." Angelina folded her arms, pretending to pout. "That will not work on me..." He continued, he motioned in the
      direction of his mate. "She tries it all the time." Smiles lit up all around. Seraphina was holding a little female
      high up in the air. She gazed down at the angel holding her firmly. She was smiling and laughing, talking to the pup.
      "Aaachoo!" The pup sneezed. Seraphinas" eyes widened in surprise. "What!" The others raced to her side. She was still
      holding the pup high into the air. The black wolf and his mate rose up on their hind legs supported by her sisters.
      The pups sat on the ground watching the scene. "How can this be?" Seraphina spoke, gazing at all of them. When the pup
      had sneezed, the little female pup turned into a little girl. If that was not surprising enough, she had two large,
      brown ears with white tufts sitting on top of her head. A tail was attached to her back covered in fur of chestnut with
      a white tip. She smiled, laughing, exposing two canines in her mouth. She was slowly brought back down to earth, smiling
      all the way. She stood on two legs quite wobbly, but she reached out and grabbed her mother"s coat around her neck to
      support her. Sophia spoke. She was standing next to Seraphina, looking down at the child on the ground. She raised her
      eyes to Seraphina. "How can this be?" Sophia was puzzled; they looked at each other shaking their heads, and then returned
      her gaze to the pups. "I don"t... Understand." The black wolf sniffed his daughter. "It"s her..." He looked at his mate
      and at the rest of his pups. The little girl released her mother"s coat, turned, and ran to her brother and sisters.
      They smiled, laughed as her sister came to them. They jumped up and greeted her as if nothing had changed. She sneezed
      again, then transformed back to a wolf pup. The adults watched, amazed, not understanding what was going on. "It is
      possible..." Seraphina spoke running her hands through her flame colored hair. She watched as the pups were playing.
      She rose up on her hind legs, Sophia caught her front paws. "What you mean?" They all looked at Seraphina for the answer.
      "You were with pup before you ate the flesh..." She looked at her sister, Sophia let her front paws go, and she sat
      on the ground in front of her. Seraphina continued to explain. She could see the worry in her sister"s eyes and the
      black wolf"s eyes. "It"s not that ... that.. it will be all right..." Seraphina smiled. "Because, it occurred after
      they were conceived." She smiled watching the pups play. "So..." Angelina spoke looking up to her sister. She questioned
      her with her eyes. "What about..." Angelina asked. Seraphina was watching the pups play and then turned looking at the
      group. She looked at her sisters and the black wolf; her eyes conveyed that everything is all right. She looked up to
      each sister, they all smiled. "We will be here to help... Seraphina spoke, they all nodded their heads. "Once they"ve
      mastered their transformation it should be relatively easy." "But..." The black wolf interrupted, his eyes filled with
      worry but she smiled at him. "The pups have the attributes of both mother and father..." She placed her hand on her
      sister and scratched behind her ears. She turned her head and looked over her shoulder. She finished her sentence. "The
      pups have the attributes of both mother and father, she paused and smiled, "Angel and Wolf."
    sentences:
    - Mr. Jefferies finally got done lecturing on Ancient Greece and passed out our work for the day. We could work together
      or separate but since I was sitting next to Rhydian now we decided to work together. Looking around while he read over
      the worksheet I noticed Tom and Shannon sitting together and working too. Feeling a weight on my leg I looked over to
      see Rhydian with a grin on his beautifully smooth lips and smiled back. "Is it bad that I can"t stop thinking about
      more of your explanations?" I whispered so low only he could hear, this of course only made his grin grow. He moved
      his hand higher up onto my thigh and moved his lips an airs breath from my ear. "No I think that"s a very good thing.
      Cause I haven"t thought of anything other than what happened in the darkroom the entire time." He whispered into my
      ear then he bit my earlobe before pulling away and looking back down at his paper. This of course left my heart trying
      to jump out of my chest and my head swirling. I shook my head to clear it of all thoughts of Rhydian and heard him chuckle
      beside me. "Maddy, Rhydian I see you haven"t gotten much work done. Would you like to explain why?" Mr. Jefferies asked
      looking between the both of us. "Uh we are a bit confused on what we are supposed to do." I replied cautiously. Nodding
      he leaned over the table and started explaining the questions to us. The next thing we know the lunch bell was ringing
      and everyone was packing up. Walking down the hall towards the cafeteria people were bumping into me from every direction
      and I could feel my wolf surfacing again just not as fast. Trying to control the wolf while it was still new to me was
      hard but I was learning. I was about to enter the cafeteria when I felt someone pull me back from the door. Rhydian
      had ahold of my arm while looking me up and down before continuing to pull me backwards. We ended up in the boy"s locker
      room in front of his locker. "What are we doing here?" I asked obviously confused. "Well I couldn"t very well let you
      continue going around the school looking like that, now could I." he grinned once again looking me up and down and I
      remembered I was still in the short shorts, tights, and my school shirt. "Well what can I do while still at school?"
      I asked once again confused. He was taking the lock off his locker door and pulled out gym pants and a t-shirt of his.
      "Are you serious?" I practically squealed at him. He laughed and pulled me closer kissing me on my lips. He pushed the
      clothes into my hands and turned around. "Yes now hurry and change so we can go get some food." He pretty much barked
      at me. I pulled my clothes off and pulled his shirt over my head then pulled the gym pants up my legs laughing when
      they trapped my feet inside. "Okay I"ll admit it was a good try but the pants have swallowed me." I explained tugging
      on his shoulder letting him know he could turn back around. He looked me up and down once again but this time his wolf
      was surfacing for some reason. "Do I look so bad that even your wolf finds it horrific?" I laughed nervously. "Quite
      the opposite you look great in MY clothes. Here." He kneeled down on his knees and rolled the legs of the pants up until
      my feet finally were free. Then he looked up at me and his eyes were yellow and I finally understood. His wolf was possessive
      of me. He ran his hands up my legs to my hips and over the sides of my ribs then he pulled me in for a kiss. Much like
      the one in the darkroom this one was passionate and out of control. A part of me knew that we should stop before we
      got caught but when I saw his wolf rise mine decided to join the party to. He slid his hands back down my sides and
      around my thighs picking me up and closing my legs around his waist. He held me up against the lockers kissing me senseless.
      Finally we pulled a part for air and I kissed down his neck while he ran his hands back up my thighs but this time when
      he made it to the bottom of his shirt they went underneath it. The feeling of his hands running over my bare skin wasn"t
      calming my wolf but riling it up even more. I threw my head back and moaned when he ran his fingers down my spine. Pulling
      his head back to mine I kissed him deeply while tugging on his hair in which he groaned. When we heard the latch on
      the door squeak we jumped apart before the person could see our position. "What do you lot think you"re doing in here?"
      the PE teacher asked. "Maddy needed some clothes since hers weren"t exactly school dress code." Rhydian spoke with all
      the confidence in the world. I on the other hand couldn"t even look at the teacher since my eyes were still yellow and
      my veins were black. He held me behind him in a protective stance while the teacher thought over his answer. "Okay but
      you need to leave now that she"s changed." She ordered. "Yes ma"am." He replied pulling me by the waist out of the locker
      rooms. His arm was still tight around my waist when he pulled me into the darkroom. "Are you okay now? Enough to go
      get food before class?" he asked looking me over to see that the inky veins were fading fast and that my eyes were once
      again my natural brown. "Yes I"m okay. Let"s get food." I stood on my tip toes and kissed him on the lips before turning
      around and walking out the door. Walking through the cafeteria doors the giant room was almost empty which was a sign
      class was about to start. We went up to the counter and I started to laugh. "Veggie day!" I exclaimed. "Never mind I"m
      no longer hungry. You should get something though." He said like he might be sick. "No I"m good till I get home. Let"s
      get to class." I replied still laughing hard. He smiled while shaking his head and pulled me close to his body. Next
      thing I know I"m being tickled then the loud shrill sound of the bell sounded and we went running. "Maddy, Rhydian your
      late!" the teacher called out. Jefferies walked in and noticed my clothes. "At least your better dress than our last
      meeting Maddy." He nodded at me as he walked back out of the room and we took our seats. When the teacher started teaching
      I started to think about what I was going to do when I got home. This had already been a long day. Tomorrow probably
      wasn"t going to be any better if we kept up like today. Merry Christmas y"all! Leave me some reviews. They make me sooo
      happy! A/N Okay for my regular readers I have decided since so many of you want me to continue with the story that has
      developed with chapters two and three to post it separately since some was getting confused. The title you should look
      for now if you still wish to read it is Maddian Wolfblood. Now that I have a new laptop I"ll try and update at least
      once a week. Also PLEASE send in ideas for the story I would love to see what you guys want to happen and I"ll see what
      I can do to incorporate them into the story. By the way one of you asked about Tom and Shannon finding out and I already
      have an idea for that rattling around inside my head so that will be coming up in the next few chapters. So hopefully
      you will keep reading and reviewing and I do believe I will try to update some more tonight or at the latest tomorrow
      since after all it is Christmas A/N Okay this chapter is dedicated to one of you guys. I"m loving all the feedback and
      ideas .Also there is another idea I got from a Lucy that wanted me to write a one shot of Maddian reuniting in season
      3. I will try to do this for you but I don"t know how good it will be cause of the fact I have not yet watched season
      3. But I will look around on YouTube and such and see if I can make a good story. So with no further distractions and
      music blaring here"s your one-shot! Chapter Four Unknown POV Running that"s all I could do. I followed his scent until
      I finally came upon a farm with a pretty large stone house and no other houses for what seemed like miles. I went a
      little closer being careful to avoid the broken branches on the ground and dried leaves not wanting anyone to know I
      was here just yet. His scent seemed to disappear into the house I seen a shed and ran for it. I could at least hide
      out here and rest then continue tracking him later. Walking in and noticing the shelves that held wooden boxes and picture
      frames and a lot of other things I quickly darted behind them and curled up to rest. Before everything went black I
      started to remember how we ran to the village and had the time of our lives. Now I understood why my mother had been
      a tame before going wild. There was so much we didn"t know about and so much to do. My sister the daddy"s girl she is
      was too scared to come with me when I told her I was leaving. Truthfully she was only my half-sister her mother died
      before mine came along. My mother was proud and beautiful there"s really no question to why my father fell for her even
      if she happened to be a tame before she came to the wild. All I could think about was how much it was going to hurt
      her when she found me gone. Just as I was about to fall asleep when I heard a noise, it was the door opening. A male
      wolfblood walked in he was talk with curly hair about the color of sand. He looked like he could be intimidating if
      he wanted to be but something about him gave off the thought of laid back and childishness. Either way I wasn"t taking
      the chance I ran for it pushing him to the side and running out the door. I was trying to quickly find his scent again
      when I heard another door slam open and out walks a female wolfblood that was about the same age as the male. Her eyes
      were yellow and her veins where an inky black, she was about to change. The male came up behind me in about the same
      shape, both had growls ripping from their throats, a clear warning. Then the door slammed again and I see him. Rhydian.
      But there was another. A tomboyish girl that wasn"t very tall or big but still had an air of superiority about her.
      Her dark brown hair flowed just passed her shoulders and her tanned skin worked together perfectly to make her look
      more feminine than she seemed to want. I was guessing that the two older wolves were her parents and she resembled them
      a lot mainly because she too had let her wolf come closer to the surface. But even as she was threatening me I couldn"t
      help but think she was beautiful. "Jesse?!" Rhydian asked almost like he thought he was dreaming. "Hey Rhydian." Rhydian
      POV I couldn"t believe Jesse actually came. I mean I did tell him he could leave but I didn"t think he would follow
      me especially after his father"s issues with me. Neither one of us are high on his favorites list but still. "Jesse
      does he know you"re here?" I asked thinking that I"d have to keep running to keep Maddy and the Smiths safe. He turned
      to look at me after pretty much just staring straight at Maddy answering with, "I don"t think anyone knows I left yet.
      Although it probably won"t slow him down." "Who are you?" Maddy asked. "He"s Alric"s son. He"s okay. We watched each
      other"s backs." I quickly explained. Maddy seemed to finally get tired of the staring and yelled at him. "Stop staring
      at me like I"m a freak!" "Sorry." "Are you here to help your father?" Mrs. Smith asked him while looking around the
      perimeter of their property. "No. I just had to get away and I didn"t know where else to go so I followed Rhydian."
      He seemed scared which was no surprise Emma could do that to almost anyone. Except Maddy. "Come inside." She said while
      walking back toward the door. It had been a few days since I had been back and the Smiths had gotten me back into school
      and situated while waiting for Alric to finally show himself. He had made a couple appearances but nothing to say that
      he was done waiting. Jesse on the other hand was loving the human world like I always knew he would. Honestly he fit
      in too well to be a wild wolf. He had been hanging around Tom and Shannon but mainly he hung around Maddy. I wasn"t
      sure how she felt about it though, at times she seemed happy to have another friend other times not so much. A couple
      times I had caught him staring at her like he had the first time he saw her. Finally I got tired of trying to guess
      and just came straight out and asked him. "So you and Maddy seem to be pretty good friends now." The way I stated it,
      it sounded more like a question than a statement. "Yeah, about that, I had a question for you. Does she have a boyfriend
      or anything?" he seemed scared about asking me. Why would he be scared by me? It"s not like I have a claim on her. It"s
      your own fault. Tell him she"s yours. My wolf demanded. "No not that I know of why?" I replied while ignoring my wolf.
      "I was thinking of asking her out. I mean get real who wouldn"t want to. She"s beautiful and fierce and smart. The list
      just keeps going." He seemed almost in a day dream so I snapped my fingers in front of his eyes and he shook his head
      and focused on me again. Kill him. My wolf demanded again. Shut up. "You can always try." I encouraged him then walked
      out not being able to take the thoughts of him and Maddy together. "Jesse! Rhydian! Maddy! Can you come down?" We all
      ran out of our rooms when we heard Emma yell, my eyes connected with Maddy"s and we both seemed to have the same question
      in them. "Yes mum?" "Jesse we want some more information on you. Like why you"re not helping your father and why you
      seem to fit into the human world so easily." Emma stared straight at him and he stepped back from her. Finally he took
      a deep breath and sat down on the sofa. "I"m not helping my father because he and I don"t exactly see eye to eye on
