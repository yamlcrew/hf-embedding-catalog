      hair and Lisa had both fists tangled in the material of Maggie"s tee shirt. Maggie rammed Lisa back into the bureau
      and Lisa countered by shoving Maggie into the wall. Jackson looked on helplessly. He couldn"t help but think about how
      this scene was most men"s fantasy come true and all he could think about was ripping that little bitch away from his
      wife and blowing her brains out. Wait a second! His head snapped around to the other side of the bed where he spotted
      the two handguns laying on the nightstand, completely undisturbed and completely within his reach. He scooted back up
      onto the bed and then over to the other side, grabbing the 9mm and swinging it across his body to take aim. "Lisa!"
      he called. Lisa looked over her shoulder, tugged herself out of Maggie"s grasp and dove to the floor. Maggie didn"t
      even notice that Jackson had the gun until after he had fired. Blood exploded from her side and the impact sent her
      smashing back against the wall. Her face held a sort of wide eyed shock as she slowly slid down the wall to the floor.
      Lisa peered up at Jackson from the floor, then leapt to her feet and flew at him. As soon as she landed on top of him,
      she attacked his mouth with her own. "Who says you"re a lousy shot?" she said breathlessly. "Leese, babe," Jackson said,
      licking his lips and looking at her with a dark smoldering look, "there"s something I really want you to do for me."
      "Anything." Lisa said. Jackson grinned but didn"t say anything. Instead, Lisa"s attention was drawn to a clinking sound.
      She looked up and saw Jackson shaking his still handcuffed wrist back and forth. "Oh, right!" Lisa exclaimed, climbing
      off of him and grabbing the keys from the floor. She got him uncuffed in no time and as soon as his hand was free, both
      of his arms were around her. Lisa threw her own arms around his neck and squeezed him tightly against her. She just
      needed to be closer to him. Then, as if from nowhere, Davey, soaked to the bone, came bumbling through the bedroom door.
      His hair was caked to his forehead and releasing a steady stream of water down his face. His hands were over his face
      and he seemed to be rubbing his eyes vigorously. "Lisa, couldn"t leave without say...well...I"m sorry. That was so wrong
      of me." His hands dropped and he saw Jackson, but it was too late. The words were out of his mouth. "I shouldn"t have
      kissed you." Lisa felt Jackson"s body tense under her touch and she instinctively tightened her grasp on his shoulders
      in preparation to hold him back. "What?" Jackson growled, his eyes narrowing as his gaze zoomed in on his target: Davey.
      But, Jackson wasn"t going to get his shot at Davey just yet, because at that exact moment, a .38 snub nose revolver
      came into view, the barrel resting right at Davey"s temple. Along with the gun, Clyde came gliding into the room. Author"s
      Note: Be sure to let me know what you think! Am I slipping up anywhere? Author"s Note: Sorry for the long delay. Finals
      and all that. On the brighter side, we are nearing the end of our story. Thanks for the reviews, your support, and your
