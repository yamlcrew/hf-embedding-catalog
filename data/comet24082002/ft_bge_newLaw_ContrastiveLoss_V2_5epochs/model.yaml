- source_sentence: Tem bưu chính hết thời hạn cung ứng theo quy định có phải hủy tem bưu chính đó không?
  sentences:
  - 'Đối tượng phát hành giấy tờ có giá

    Tổ chức tín dụng, chi nhánh ngân hàng nước ngoài phát hành giấy tờ có giá theo Giấy phép thành lập, hoạt động của
    tổ chức tín dụng, chi nhánh ngân hàng nước ngoài, bao gồm:

    1. Ngân hàng thương mại.

    2. Ngân hàng hợp tác xã.

    3. Chi nhánh ngân hàng nước ngoài.

    4. Công ty tài chính, công ty cho thuê tài chính.'
  - 'Công bố và sử dụng chứng cứ

    1. Mọi chứng cứ được công bố và sử dụng công khai, trừ trường hợp quy định tại khoản 2 và 3 Điều này.

    2. Chủ tịch Ủy ban Cạnh tranh Quốc gia, Cơ quan điều tra vụ việc cạnh tranh, Hội đồng xử lý vụ việc hạn chế cạnh tranh
    không công bố và sử dụng công khai các chứng cứ sau đây:

    a) Chứng cứ thuộc bí mật nhà nước theo quy định của pháp luật;

    b) Chứng cứ liên quan tới thuần phong mỹ tục, bí mật nghề nghiệp, bí mật kinh doanh, bí mật cá nhân theo yêu cầu chính
    đáng của người tham gia tố tụng cạnh tranh.

    3. Trường hợp cần thiết, Chủ tịch Ủy ban Cạnh tranh Quốc gia, Cơ quan điều tra vụ việc cạnh tranh, Hội đồng xử lý vụ việc
    hạn chế cạnh tranh có quyền công bố và sử dụng công khai một số, một phần hoặc toàn bộ chứng cứ vào thời điểm thích hợp
    cho việc điều tra và xử lý vụ việc cạnh tranh.

    4. Cơ quan, người tiến hành tố tụng, người tham gia tố tụng phải giữ bí mật những chứng cứ thuộc trường hợp không công
    bố và sử dụng công khai quy định tại khoản 2 Điều này theo quy định của pháp luật.'
  - '"Điều 48. Thời hạn cấp Phiếu lý lịch tư pháp

    1. Thời hạn cấp Phiếu lý lịch tư pháp không quá 10 ngày, kể từ ngày nhận được yêu cầu hợp lệ. Trường hợp người được cấp
    Phiếu lý lịch tư pháp là công dân Việt Nam đã cư trú ở nhiều nơi hoặc có thời gian cư trú ở nước ngoài, người nước ngoài
    quy định tại khoản 2 và khoản 3 Điều 47 của Luật này, trường hợp phải xác minh về điều kiện đương nhiên được xóa án tích
    quy định tại khoản 3 Điều 44 của Luật này thì thời hạn không quá 15 ngày.

    2. Trường hợp khẩn cấp quy định tại khoản 1 Điều 46 của Luật này thì thời hạn không quá 24 giờ, kể từ thời điểm nhận được
    yêu cầu."'
- source_sentence: Ban quản lý các dự án Lâm nghiệp cần phải đề xuất các chương trình dự án mới về phát triển lâm nghiệp không?
  sentences:
  - '"Điều 40. Hình thức đấu giá, phương thức đấu giá

    1. Tổ chức đấu giá tài sản thỏa thuận với người có tài sản đấu giá lựa chọn một trong các hình thức sau đây để tiến hành
    cuộc đấu giá:

    a) Đấu giá trực tiếp bằng lời nói tại cuộc đấu giá;

    b) Đấu giá bằng bỏ phiếu trực tiếp tại cuộc đấu giá;

    c) Đấu giá bằng bỏ phiếu gián tiếp;

    d) Đấu giá trực tuyến.

    2. Phương thức đấu giá bao gồm:

    a) Phương thức trả giá lên;

    b) Phương thức đặt giá xuống.

    3. Hình thức đấu giá, phương thức đấu giá phải được quy định trong Quy chế cuộc đấu giá và công bố công khai cho người
    tham gia đấu giá biết.

    4. Chính phủ quy định chi tiết điểm d khoản 1 Điều này."'
  - 'Khóa, mở khóa tài khoản định danh điện tử

    ...

    5. Hình thức yêu cầu khóa, mở khóa tài khoản định danh điện tử:

    a) Chủ thể danh tính điện tử thực hiện theo các bước hướng dẫn trên ứng dụng VNelD để yêu cầu khóa tài khoản định danh
    điện tử;

    b) Chủ thể danh tính điện tử liên hệ với tổng đài tiếp nhận và giải quyết các yêu cầu về định danh và xác thực điện tử,
    cung cấp thông tin xác thực chủ tài khoản định danh điện tử để yêu cầu khóa, mở khóa tài khoản định danh điện tử;

    c) Chủ thể danh tính điện tử đến cơ quan quản lý định danh và xác thực điện tử, cung cấp thông tin xác thực chủ tài khoản
    định danh điện tử để yêu cầu khóa, mở khóa tài khoản định danh điện tử.

    6. Khóa, mở khóa tài khoản định danh điện tử khi có yêu cầu của cơ quan tiến hành tố tụng, cơ quan chức năng có thẩm quyền

    Cơ quan tiến hành tố tụng, cơ quan chức năng có thẩm quyền có văn bản gửi cơ quan quản lý định danh và xác thực điện tử
    cùng cấp đề nghị khóa, mở khóa tài khoản định danh điện tử, trong đó nêu rõ lý do, thời hạn khóa.'
  - 'Nhiệm vụ và quyền hạn

    …

    13. Thực hiện chế độ báo cáo định kỳ và đột xuất với Bộ Nông nghiệp và Phát triển nông thôn, các cơ quan có liên quan
    và nhà tài trợ về tình hình và kết quả hoạt động của các chương trình, dự án. Tổng hợp, thống nhất với nhà tài trợ các
    nội dung phát sinh trong quá trình thực hiện chương trình, dự án và đề xuất trình Bộ quyết định.

    14. Được Bộ trưởng ủy quyền làm chủ dự án đối với chương trình, dự án thuộc nhiệm vụ của Bộ do Chính phủ Việt Nam viện
    trợ ra nước ngoài theo quy định hiện hành của Nhà nước Việt Nam và Văn kiện chương trình, dự án ký kết.

    15. Tổ chức thực hiện nhiệm vụ đối với việc nghiệm thu, bàn giao chương trình, dự án theo quy định.

    16. Đề xuất các chương trình, dự án mới về phát triển lâm nghiệp và phát triển nông thôn.

    17. Quản lý tổ chức, bộ máy, biên chế và tài sản của Ban theo quy định; thực hiện chế độ tiền lương và các chế độ chính
    sách đãi ngộ, khen thưởng, kỷ luật đối với cán bộ, viên chức thuộc phạm vi quản lý của Ban.

    18. Thực hiện các quyền và trách nhiệm khác của chủ dự án theo quy định của pháp luật.

    19. Thực hiện nhiệm vụ khác do Bộ trưởng giao.'
- source_sentence: Người lao động nào được miễn đóng đoàn phí công đoàn?
  sentences:
  - 'PHẪU THUẬT ĐIỀU TRỊ HỞ MI

    ...

    V. CÁC BƯỚC TIẾN HÀNH

    1. Kiểm tra hồ sơ

    2. Kiểm tra người bệnh

    3. Thực hiện kỹ thuật

    3.1. Vô cảm

    - Uống hay tiêm thuốc an thần, giảm đau.

    - Gây mê nếu người bệnh kém hợp tác.

    - Gây tê tại chỗ bằng.

    3.2. Kỹ thuật

    Cách thức phẫu thuật điều trị hở mi tùy thuộc nguyên nhân gây hở mi. Trong bài này chúng tôi mô tả những phương pháp thường
    được áp dụng là: Phẫu thuật hở mi do sẹo, hở mi do liệt dây VII.

    3.2.1. Hở mi do sẹo gây lật mi

    - Đánh dấu vùng có sẹo mi và vùng dự định lấy da hay làm vạt da.

    - Gây tê tại chỗ.

    - Rạch da, cắt bỏ sẹo mi hay giải phóng các chỗ dính sao cho bờ mi trở lại vị trí giải phẫu bình thường của nó.

    - Khâu cò mi tạm thời.

    - Lấy dấu vùng bị khuyết da mi.

    - Lấy da ghép (sau tai, trước tai, thượng đòn và mặt trong cánh tay) và ghép da.

    - Dùng vạt da nếu vùng khuyết da mi nhỏ.

    ...'
  - 'Đối tượng được thăm gặp phạm nhân

    1. Đối tượng được thăm gặp phạm nhân gồm: Ông, bà nội; ông, bà ngoại; bố, mẹ đẻ; bố, mẹ vợ (hoặc chồng); bố, mẹ nuôi hợp
    pháp; vợ hoặc chồng; con đẻ, con dâu, con rể, con nuôi hợp pháp; anh, chị, em ruột; anh, chị, em dâu, rể; anh, chị em
    vợ (hoặc chồng); cô, dì, chú, bác, cậu, cháu ruột, số lượng thân nhân mỗi lần đến thăm gặp phạm nhân không quá 03 người.

    2. Đại diện cơ quan, tổ chức hoặc cá nhân khác ngoài những người được quy định tại Khoản 1 Điều này được thăm gặp phạm
    nhân nếu Thủ trưởng cơ sở giam giữ xét thấy phù hợp với yêu cầu công tác phòng, chống tội phạm và công tác quản lý, giáo
    dục cải tạo phạm nhân.'
  - '"Điều 23. Đối tượng, mức đóng, tiền lương làm căn cứ đóng đoàn phí

    [...] 6. Đoàn viên công đoàn hưởng trợ cấp Bảo hiểm xã hội từ 01 tháng trở lên, trong thời gian hưởng trợ cấp không phải
    đóng đoàn phí; đoàn viên công đoàn không có việc làm, không có thu nhập, nghỉ việc riêng từ 01 tháng trở lên không hưởng
    tiền lương, trong thời gian đó không phải đóng đoàn phí”.'
- source_sentence: Quá thời hạn mà doanh nghiệp chưa thanh toán đủ hợp đồng chuyển nhượng có thời hạn quyền khai thác tài
    sản kết cấu hạ tầng hàng hải thì giải quyết thế nào?
  sentences:
  - 'Cách tiến hành

    5.1. Chẩn đoán lâm sàng

    5.1.1. Bệnh viêm ruột hoại tử ở gà

    5.1.1.1. Đặc điểm dịch tễ

    - Bệnh viêm ruột hoại tử thường xảy ra ở gà ít ngày tuổi từ 2 tuần đến 5 tuần tuổi, gà tây từ 7 tuần đến 12 tuần tuổi
    nhưng cũng có thể xảy ra ở gà hậu bị và gà đẻ.

    - Bệnh lây lan qua đường thức ăn, nước uống do vi khuẩn C. perfringens có nhiều trong môi trường đất, thức ăn, phân, chất
    độn chuồng, rác, chất chứa đường ruột,...

    - Tỷ lệ nhiễm bệnh viêm ruột hoại tử ở gà con có thể lên tới 50 %, ở gà thịt khoảng từ 13 % đến 37,3 %.

    5.1.1.2. Triệu chứng lâm sàng

    - Trong trường hợp cấp tính gà chết nhanh (từ 1 h đến 2 h) khi chưa biểu hiện triệu chứng của bệnh. Tỷ lệ chết cao, có
    thể lên tới 50 %.

    - Gà thường chết đột ngột, các triệu chứng lâm sàng thấy được trong thời gian ngắn.

    - Triệu chứng thường thấy của bệnh là gà bị tiêu chảy, phân nhiều nước, có màu đỏ, nâu đỏ, màu vàng hoặc lẫn thức ăn.

    - Gà có biểu hiện ủ rũ, ăn ít, giảm tăng trọng, xác chết gầy và ướt.

    5.1.1.3. Bệnh tích đại thể

    - Bệnh tích thường quan sát thấy ở phần ruột non chủ yếu là ở không tràng và hồi tràng. Niêm mạc ruột bị xuất huyết, hoại
    tử. Lớp chất nhày ở ruột có màu xám nâu đến vàng xanh lá cây hoặc có màng giả.

    - Thành ruột non và thỉnh thoảng ở đoạn manh tràng mỏng, dễ nát, giãn to và tích khí.

    - Gan không to nhưng màu sắc thay đổi, có màu thẫm hoặc vàng hơn bình thường. Trên bề mặt gan có lấm tấm điểm hoại tử
    màu vàng.

    - Lách có thể sưng to, sưng huyết hoặc xuất huyết, có các điểm hoại tử.

    - Thận có thể sưng to, biến màu có thể có các điểm hoại tử.

    ...'
  - 'Chuyển nhượng có thời hạn quyền khai thác tài sản kết cấu hạ tầng hàng không

    ...

    8. Hợp đồng chuyển nhượng quyền khai thác tài sản kết cấu hạ tầng hàng không gồm các nội dung chủ yếu sau:

    a) Thông tin của bên chuyển nhượng;

    b) Thông tin của doanh nghiệp nhận chuyển nhượng;

    c) Danh mục tài sản được chuyển nhượng quyền khai thác;

    d) Thời hạn chuyển nhượng; giá chuyển nhượng; phương thức và thời hạn thanh toán; hạng mục công trình đầu tư, nâng cấp
    và các nội dung cần thiết khác;

    đ) Quyền và nghĩa vụ của các bên;

    e) Trách nhiệm tổ chức thực hiện.

    g) Trong thời hạn 90 ngày, kể từ ngày ký Hợp đồng, doanh nghiệp nhận chuyển nhượng có trách nhiệm thanh toán tiền chuyển
    nhượng cho cơ quan được giao quản lý tài sản theo Hợp đồng, Cơ quan được giao quản lý tài sản có trách nhiệm nộp tiền
    vào tài khoản tạm giữ trong thời hạn 03 ngày làm việc, kể từ ngày nhận được tiền chuyển nhượng.

    Trường hợp quá thời hạn quy định tại điểm này mà doanh nghiệp nhận chuyển nhượng có thời hạn quyền khai thác tài sản kết
    cấu hạ tầng hàng không chưa thanh toán hoặc chưa thanh toán đủ số tiền theo hợp đồng đã ký kết thì cơ quan được giao quản
    lý tài sản có văn bản đề nghị kèm theo bản sao Hợp đồng chuyển nhượng và chứng từ về việc nộp tiền của doanh nghiệp nhận
    chuyển nhượng (nếu có) gửi Cục thuế (nơi có tài sản) để xác định và ra Thông báo về số tiền chậm nộp theo quy định của
    pháp luật về quản lý thuế.

    Thời hạn nộp tiền cụ thể và quy định việc nộp tiền chậm nộp phải được ghi rõ tại Quy chế đấu giá, Hợp đồng chuyển nhượng
    có thời hạn quyền khai thác tài sản kết cấu hạ tầng hàng không.

    ...'
  - '"Điều 9. Các giấy tờ, tài liệu được miễn chứng nhận lãnh sự, hợp pháp hóa lãnh sự

    1. Giấy tờ, tài liệu được miễn chứng nhận lãnh sự, hợp pháp hóa lãnh sự theo điều ước quốc tế mà Việt Nam và nước ngoài
    liên quan đều là thành viên, hoặc theo nguyên tắc có đi có lại.

    2. Giấy tờ, tài liệu được chuyển giao trực tiếp hoặc qua đường ngoại giao giữa cơ quan có thẩm quyền của Việt Nam và cơ
    quan có thẩm quyền của nước ngoài.

    3. Giấy tờ, tài liệu được miễn chứng nhận lãnh sự, hợp pháp hóa lãnh sự theo quy định của pháp luật Việt Nam.

    4. Giấy tờ, tài liệu mà cơ quan tiếp nhận của Việt Nam hoặc của nước ngoài không yêu cầu phải hợp pháp hóa lãnh sự, chứng
    nhận lãnh sự phù hợp với quy định pháp luật tương ứng của Việt Nam hoặc của nước ngoài."'
- source_sentence: Cách ghi thông tin phiếu điều chỉnh thông tin căn cước công dân được hướng dẫn thế nào?
  sentences:
  - 'Phạm nhân nhận, sử dụng thuốc chữa bệnh

    1. Thân nhân phạm nhân khi đến thăm gặp hoặc qua đường bưu chính, có thể gửi thuốc chữa bệnh, thuốc bổ cho phạm nhân theo
    chỉ định của y sỹ, bác sỹ tại cơ sở giam giữ hoặc tại cơ sở khám, chữa bệnh của Nhà nước nơi phạm nhân khám và điều trị.
    Thuốc do thân nhân gửi cho phạm nhân phải có nhãn, mác ghi rõ hàm lượng, công dụng, nơi sản xuất và còn thời hạn sử dụng.

    ...'
  - '“Điều 76. Trách nhiệm của Thẩm phán

    1. Trung thành với Tổ quốc, gương mẫu chấp hành Hiến pháp và pháp luật.

    2. Tôn trọng nhân dân, tận tụy phục vụ nhân dân, liên hệ chặt chẽ với nhân dân, lắng nghe ý kiến và chịu sự giám sát của
    nhân dân.

    3. Độc lập, vô tư, khách quan, bảo vệ công lý trong xét xử; chấp hành quy tắc ứng xử, đạo đức nghề nghiệp Thẩm phán, giữ
    gìn uy tín của Tòa án.

    4. Giữ bí mật nhà nước và bí mật công tác theo quy định của pháp luật.

    5. Học tập, nghiên cứu để nâng cao kiến thức, trình độ chính trị và chuyên môn nghiệp vụ Tòa án.

    6. Chịu trách nhiệm trước pháp luật về việc thực hiện nhiệm vụ, quyền hạn và các quyết định của mình; nếu có hành vi vi
    phạm pháp luật thì tùy theo tính chất, mức độ vi phạm mà bị xử lý kỷ luật hoặc truy cứu trách nhiệm hình sự theo quy định
    của luật. Thẩm phán trong khi thực hiện nhiệm vụ, quyền hạn của mình mà gây thiệt hại thì Tòa án nơi Thẩm phán thực hiện
    nhiệm vụ xét xử có trách nhiệm bồi thường và Thẩm phán đã gây thiệt hại có trách nhiệm bồi hoàn cho Tòa án theo quy định
    của luật.”'
  - 'Tờ khai Căn cước công dân (CC01)

    ...

    2. Cách ghi thông tin

    a) Mục “Họ, chữ đệm và tên”, “Họ và tên gọi khác”: ghi đầy đủ họ, chữ đệm và tên theo giấy khai sinh; chữ in hoa đủ dấu.
    Chỉ ghi họ, tên gọi khác nếu trong giấy khai sinh có họ và tên gọi khác;

    b) Mục “Ngày, tháng, năm sinh”: ghi ngày, tháng, năm sinh của công dân được cấp, đổi, cấp lại thẻ Căn cước công dân. Ngày
    sinh ghi 02 chữ số; năm sinh ghi đủ bốn chữ số. Đối với tháng sinh từ tháng 3 đến tháng 9 ghi 01 chữ số, các tháng sinh
