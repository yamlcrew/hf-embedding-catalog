  - source_sentence: Ban Kiểm tra Hội Nhà văn Việt Nam hoạt động theo Quy chế do ai có thẩm quyền quy định?
    sentences:
    - "Tiêu chuẩn Trưởng thôn, Tổ trưởng tổ dân phố và Phó trưởng thôn, Phó Tổ trưởng tổ dân phố \n1. Tiêu chuẩn chung:\n\
      ...\nb) Là công dân Việt Nam, đủ 18 tuổi trở lên; có đầy đủ năng lực hành vi dân sự và có đủ sức khỏe để thực hiện nhiệm\
      \ vụ được giao;"
    - 'Miễn nhiệm, cách chức thành viên Hội đồng thành viên

      1. Chủ tịch và thành viên khác của Hội đồng thành viên bị miễn nhiệm trong những trường hợp sau đây:

      a) Không còn đủ tiêu chuẩn và điều kiện quy định tại Điều 28 của Điều lệ này;

      b) Có đơn xin từ chức và được Thủ tướng Chính phủ chấp thuận bằng văn bản (đối với Chủ tịch Hội đồng thành viên) và
      Bộ Tài chính chấp thuận bằng văn bản (đối với thành viên Hội đồng thành viên khác);

      c) Có quyết định điều chuyển, bố trí công việc khác hoặc nghỉ hưu;

      d) Không đủ năng lực, trình độ đảm nhận công việc được giao; bị mất hoặc bị hạn chế năng lực hành vi dân sự;

      đ) Không đủ sức khỏe hoặc không còn uy tín để giữ chức vụ thành viên Hội đồng thành viên;

      e) Các trường hợp bị miễn nhiệm khác theo quy định của pháp luật có liên quan.

      2. Chủ tịch và thành viên khác của Hội đồng thành viên bị cách chức trong những trường hợp sau đây:

      a) SCIC không hoàn thành các mục tiêu, chỉ tiêu kế hoạch kinh doanh trong 02 năm liên tục; không bảo toàn và phát triển
      vốn đầu tư theo yêu cầu của Thủ tướng Chính phủ, Bộ Tài chính mà không giải trình được nguyên nhân khách quan hoặc giải
      trình nguyên nhân không được Thủ tướng Chính phủ, Bộ Tài chính chấp thuận;

      b) Bị truy tố và bị Tòa án tuyên là có tội;

      c) Không trung thực trong thực thi quyền, nghĩa vụ hoặc lạm dụng địa vị, chức vụ, sử dụng tài sản của SCIC để tư lợi
      hoặc phục vụ lợi ích của tổ chức, cá nhân khác; báo cáo không trung thực tình hình tài chính và kết quả sản xuất kinh
      doanh của SCIC.

      3. Trong thời hạn 60 ngày, kể từ ngày có quyết định miễn nhiệm, cách chức, Hội đồng thành viên SCIC phải họp để kiến
      nghị Bộ Tài chính xem xét, quyết định bổ nhiệm người thay thế thành viên Hội đồng thành viên SCIC hoặc trình Thủ tướng
      Chính phủ xem xét, quyết định bổ nhiệm người thay thế Chủ tịch Hội đồng thành viên SCIC.'
    - 'Trách nhiệm, quyền hạn của cơ quan chỉ đạo, cơ quan quản lý báo chí và cơ quan chủ quản báo chí

      ...

      3. Cơ quan chủ quản báo chí

      a) Thực hiện chức trách, quyền hạn của cơ quan chủ quản báo chí theo quy định của Đảng, pháp luật của Nhà nước.

      b) Lãnh đạo, chỉ đạo, đánh giá, quy hoạch, đào tạo, bồi dưỡng lãnh đạo cơ quan báo chí theo quy định của Đảng, pháp
      luật của Nhà nước.

      c) Bổ nhiệm, bổ nhiệm lại, phân công phụ trách lãnh đạo cơ quan báo chí sau khi có ý kiến bằng văn bản của Ban Tuyên
      giáo Trung ương, Bộ Thông tin và Truyền thông.

      d) Khen thưởng và đề nghị cấp thẩm quyền khen thưởng đối với cơ quan báo chí, lãnh đạo cơ quan báo chí.

      đ) Kỷ luật, tạm đình chỉ chức vụ, cho từ chức, miễn nhiệm lãnh đạo cơ quan báo chí theo quy định. Xem xét, thay thế
      kịp thời, không chờ hết thời hạn giữ chức vụ đối với lãnh đạo cơ quan báo chí để cơ quan báo chí bị xử lý vi phạm từ
      hình thức cảnh cáo trở lên. Chịu trách nhiệm trong phạm vi, quyền hạn đối với sai phạm của cơ quan báo chí.

      e) Thực hiện chế độ, chính sách đối với lãnh đạo cơ quan báo chí theo quy định của Đảng, pháp luật của Nhà nước.

      g) Thanh tra, kiểm tra, giám sát và giải quyết khiếu nại, tố cáo đối với tập thể, cá nhân cơ quan báo chí thuộc thẩm
      quyền quản lý theo quy định.

      h) Lãnh đạo, chỉ đạo xử lý kỷ luật cơ quan báo chí, lãnh đạo cơ quan báo chí theo yêu cầu của cơ quan chỉ đạo, cơ quan
      quản lý báo chí và cấp thẩm quyền. Báo cáo bằng văn bản với cơ quan chỉ đạo báo chí, cơ quan quản lý báo chí về việc
      chấn chỉnh, xử lý kỷ luật tập thể, cá nhân lãnh đạo cơ quan báo chí vi phạm.

      i) Phối hợp chặt chẽ với cơ quan chỉ đạo, cơ quan quản lý báo chí chỉ đạo, định hướng hoạt động của cơ quan báo chí.'
  - source_sentence: Tàng trữ trái phép vũ khí quân dụng bị xử lý hình sự như thế nào?
    sentences:
    - 'Hồ sơ đề nghị xác định trước xuất xứ

      Trước khi làm thủ tục hải quan đối với lô hàng xuất khẩu, nhập khẩu, tổ chức, cá nhân có đề nghị xác định trước xuất
      xứ hàng hóa thì nộp bộ hồ sơ đề nghị xác định trước xuất xứ, gồm:

      1. Đơn đề nghị xác định trước xuất xứ hàng hóa xuất khẩu, nhập khẩu theo mẫu tại Phụ lục I ban hành kèm Thông tư này:
      01 bản chính;

      2. Bảng kê khai chi phí sản xuất theo mẫu tại Phụ lục II và Bảng khai báo xuất xứ của nhà sản xuất/nhà cung cấp nguyên
      liệu trong nước theo mẫu tại Phụ lục III ban hành kèm Thông tư này trong trường hợp nguyên liệu, vật tư đó được sử dụng
      cho một công đoạn tiếp theo để sản xuất ra một hàng hóa khác: 01 bản chụp;

      3. Quy trình sản xuất hoặc Giấy chứng nhận phân tích thành phần (nếu có): 01 bản chụp.

      4. Catalogue hoặc hình ảnh hàng hóa: 01 bản chụp.'
    - 'Nguyên tắc điều động, luân chuyển, biệt phái

      1. Ban cán sự đảng, Tổng Thanh tra Chính phủ quyết định việc điều động, luân chuyển công chức và biệt phái công chức,
      viên chức thuộc thẩm quyền quản lý của Thanh tra Chính phủ.

      2. Việc điều động công chức phải căn cứ vào yêu cầu nhiệm vụ và phẩm chất chính trị, đạo đức, năng lực, trình độ chuyên
      môn, nghiệp vụ của công chức.

      3. Luân chuyển công chức bảo đảm thực hiện chủ trương đào tạo, bồi dưỡng toàn diện và sử dụng có hiệu quả đội ngũ công
      chức; tạo điều kiện cho công chức trẻ, có triển vọng, công chức trong quy hoạch được rèn luyện thực tiễn.

      4. Kết hợp luân chuyển với điều động, bố trí hợp lý đội ngũ công chức trong Thanh tra Chính phủ; tăng cường công chức
      cho những nơi khó khăn có nhu cầu, khắc phục tình trạng nơi thừa, nơi thiếu và cục bộ, khép kín trong công tác cán bộ.

      5. Công chức, viên chức được cử biệt phái chịu sự phân công, bố trí, đánh giá, kiểm tra việc thực hiện nhiệm vụ của
      cơ quan, tổ chức nơi được cử đến biệt phái, nhưng vẫn thuộc biên chế của cơ quan, tổ chức cử biệt phái, kể cả trường
      hợp công chức, viên chức giữ chức vụ lãnh đạo, quản lý được biệt phái đến giữ vị trí lãnh đạo, quản lý tương đương với
      chức vụ hiện đang đảm nhiệm.

      6. Công chức, viên chức được điều động, luân chuyển, biệt phái phải chấp hành nghiêm quyết định điều động, luân chuyển,
      biệt phái của cấp có thẩm quyền.'
    - '"3. Hình thức xử phạt bổ sung:

      Tịch thu tang vật, phương tiện vi phạm đối với hành vi vi phạm quy định tại khoản 1, khoản 2 Điều này.

      4. Biện pháp khắc phục hậu quả:

      Buộc khôi phục lại tình trạng ban đầu đối với các hành vi vi phạm quy định tại khoản 1, khoản 2 Điều này."'
  - source_sentence: Công ty bắt người lao động phải tăng ca cuối năm được không?
    sentences:
    - 'Cơ quan đăng ký, cơ quan cung cấp thông tin

      1. Văn phòng đăng ký đất đai trực thuộc Sở Tài nguyên và Môi trường, Chi nhánh của Văn phòng đăng ký đất đai (sau đây
      gọi là Văn phòng đăng ký đất đai) thực hiện đăng ký, cung cấp thông tin về biện pháp bảo đảm bằng quyền sử dụng đất,
      tài sản gắn liền với đất quy định tại Điều 25 Nghị định này.

      2. Cục Hàng không Việt Nam trực thuộc Bộ Giao thông vận tải thực hiện đăng ký, cung cấp thông tin về biện pháp bảo đảm
      bằng tàu bay quy định tại Điều 38 Nghị định này.

      3. Cục Hàng hải Việt Nam trực thuộc Bộ Giao thông vận tải hoặc Chi cục Hàng hải, Cảng vụ Hàng hải theo phân cấp của
      Cục Hàng hải Việt Nam (sau đây gọi là Cơ quan đăng ký tàu biển Việt Nam) thực hiện đăng ký, cung cấp thông tin về biện
      pháp bảo đảm bằng tàu biển, tài sản khác quy định tại Điều 41 Nghị định này.

      4. Tổng công ty lưu ký và bù trừ chứng khoán Việt Nam thực hiện đăng ký, cung cấp thông tin về biện pháp bảo đảm bằng
      chứng khoán đã đăng ký tập trung theo quy định của pháp luật về chứng khoán.

      5. Trung tâm đăng ký giao dịch, tài sản của Cục Đăng ký quốc gia giao dịch bảo đảm thuộc Bộ Tư pháp (sau đây gọi là
      Trung tâm đăng ký giao dịch, tài sản) thực hiện đăng ký, cung cấp thông tin về biện pháp bảo đảm bằng động sản không
      phải là tàu bay, tàu biển, chứng khoán đã đăng ký tập trung (sau đây gọi là động sản) và trường hợp khác quy định tại
      Điều 44 Nghị định này.

      6. Việc xác định cơ quan có thẩm quyền đăng ký, cung cấp thông tin về biện pháp bảo đảm bằng quyền sử dụng khu vực biển,
      tài sản gắn liền với khu vực biển thực hiện theo quy định của pháp luật về khai thác, sử dụng tài nguyên biển.

      7. Việc xác định cơ quan có thẩm quyền cung cấp thông tin trong trường hợp tổ chức, cá nhân tự tra cứu thông tin thông
      qua mã số sử dụng cơ sở dữ liệu và trong hoạt động cung cấp thông tin giữa cơ quan có thẩm quyền, người có thẩm quyền
      với cơ quan đăng ký thực hiện theo quy định tại khoản 2 Điều 50 và Điều 52 Nghị định này.'
    - 'TÁI TẠO PHỤC HỒI TỔN THƯƠNG GÂN GẤP 2 THÌ

      I. ĐẠI CƯƠNG

      - Tái tạo phục hồi gân hai thì trong các tổn thương gân gấp vùng II đến muộn sau 3 tuần, nguyên tắc là ghép gân tự thân
      và đưa miệng nối gân ra ngoài vùng II

      ...'
    - 'Làm thêm giờ

      1. Thời gian làm thêm giờ là khoảng thời gian làm việc ngoài thời giờ làm việc bình thường theo quy định của pháp luật,
      thỏa ước lao động tập thể hoặc nội quy lao động.

      2. Người sử dụng lao động được sử dụng người lao động làm thêm giờ khi đáp ứng đầy đủ các yêu cầu sau đây:

      a) Phải được sự đồng ý của người lao động;

      b) Bảo đảm số giờ làm thêm của người lao động không quá 50% số giờ làm việc bình thường trong 01 ngày; trường hợp áp
      dụng quy định thời giờ làm việc bình thường theo tuần thì tổng số giờ làm việc bình thường và số giờ làm thêm không
      quá 12 giờ trong 01 ngày; không quá 40 giờ trong 01 tháng;

      c) Bảo đảm số giờ làm thêm của người lao động không quá 200 giờ trong 01 năm, trừ trường hợp quy định tại khoản 3 Điều
      này.

      3. Người sử dụng lao động được sử dụng người lao động làm thêm không quá 300 giờ trong 01 năm trong một số ngành, nghề,
      công việc hoặc trường hợp sau đây:

      a) Sản xuất, gia công xuất khẩu sản phẩm hàng dệt, may, da, giày, điện, điện tử, chế biến nông, lâm, diêm nghiệp, thủy
      sản;

      b) Sản xuất, cung cấp điện, viễn thông, lọc dầu; cấp, thoát nước;

      c) Trường hợp giải quyết công việc đòi hỏi lao động có trình độ chuyên môn, kỹ thuật cao mà thị trường lao động không
      cung ứng đầy đủ, kịp thời;

      d) Trường hợp phải giải quyết công việc cấp bách, không thể trì hoãn do tính chất thời vụ, thời điểm của nguyên liệu,
      sản phẩm hoặc để giải quyết công việc phát sinh do yếu tố khách quan không dự liệu trước, do hậu quả thời tiết, thiên
      tai, hỏa hoạn, địch họa, thiếu điện, thiếu nguyên liệu, sự cố kỹ thuật của dây chuyền sản xuất;

      đ) Trường hợp khác do Chính phủ quy định.

      4. Khi tổ chức làm thêm giờ theo quy định tại khoản 3 Điều này, người sử dụng lao động phải thông báo bằng văn bản cho
      cơ quan chuyên môn về lao động thuộc Ủy ban nhân dân cấp tỉnh.

      5. Chính phủ quy định chi tiết Điều này.”

      Theo quy định trên thì người sử dụng lao động được sử dụng người lao động làm thêm giờ nếu được sự đồng ý của người
      lao động và tuân thủ các quy định về số giờ làm thêm của Luật này.'
  - source_sentence: Định mức về phương tiện đi lại của Thanh tra tài nguyên và môi trường được quy định như nào?
    sentences:
    - '"1. Việc tiếp nhận hồ sơ đăng ký cư trú được thực hiện dưới hình thức trực tiếp tại cơ quan đăng ký cư trú, Cổng dịch
      vụ công quốc gia, Cổng dịch vụ công Bộ Công an, Cổng dịch vụ công quản lý cư trú.

      3. Trường hợp thực hiện đăng ký cư trú qua Cổng dịch vụ công quốc gia, Cổng dịch vụ công Bộ Công an, Cổng dịch vụ công
      quản lý cư trú thì người yêu cầu đăng ký cư trú khai báo thông tin và đính kèm bản quét hoặc bản chụp các văn bản, giấy
      tờ cần thiết theo quy định. Công dân có trách nhiệm xuất trình bản chính các giấy tờ, tài liệu đã cung cấp khi có yêu
      cầu của người làm công tác đăng ký cư trú."'
    - 'Định mức về xe chuyên dùng

      1. Đối với Thanh tra Bộ Tài nguyên và Môi trường và các đơn vị trực thuộc Bộ Tài nguyên và Môi trường được giao thực
      hiện chức năng thanh tra chuyên ngành thì việc trang bị xe theo định mức thỏa thuận với Bộ Tài chính và do Bộ trưởng
      Bộ Tài nguyên và Môi trường quyết định sau khi có ý kiến bằng văn bản của Bộ Tài chính.

      2. Đối với Thanh tra Sở Tài nguyên và Môi trường do Chủ tịch Ủy ban nhân dân cấp tỉnh quyết định sau khi có ý kiến thống
      nhất của Ban Thường vụ Tỉnh ủy, Thường trực Hội đồng nhân dân cùng cấp.

      Như vậy, theo quy định trên thì định mức về phương tiện đi lại của Thanh tra tài nguyên và môi trường được quy định
      như sau: '
    - 'Người có quyền yêu cầu xác định cha, mẹ, con

      1. Cha, mẹ, con đã thành niên không bị mất năng lực hành vi dân sự có quyền yêu cầu cơ quan đăng ký hộ tịch xác định
      con, cha, mẹ cho mình trong trường hợp được quy định tại khoản 1 Điều 101 của Luật này.

      2. Cha, mẹ, con, theo quy định của pháp luật về tố tụng dân sự, có quyền yêu cầu Tòa án xác định con, cha, mẹ cho mình
      trong trường hợp được quy định tại khoản 2 Điều 101 của Luật này.

      3. Cá nhân, cơ quan, tổ chức sau đây, theo quy định của pháp luật về tố tụng dân sự, có quyền yêu cầu Tòa án xác định
      cha, mẹ cho con chưa thành niên, con đã thành niên mất năng lực hành vi dân sự; xác định con cho cha, mẹ chưa thành
      niên hoặc mất năng lực hành vi dân sự trong các trường hợp được quy định tại khoản 2 Điều 101 của Luật này:

      a) Cha, mẹ, con, người giám hộ;

      b) Cơ quan quản lý nhà nước về gia đình;

      c) Cơ quan quản lý nhà nước về trẻ em;

      d) Hội liên hiệp phụ nữ.'
  - source_sentence: Giấy phép học viên bay của nhân viên hàng không có thời hạn hiệu lực không?
    sentences:
    - '"Điều 100. Cấp Giấy chứng nhận quyền sử dụng đất, quyền sở hữu nhà ở và tài sản khác gắn liền với đất cho hộ gia đình,
      cá nhân, cộng đồng dân cư đang sử dụng đất có giấy tờ về quyền sử dụng đất

      1. Hộ gia đình, cá nhân đang sử dụng đất ổn định mà có một trong các loại giấy tờ sau đây thì được cấp Giấy chứng nhận
      quyền sử dụng đất, quyền sở hữu nhà ở và tài sản khác gắn liền với đất và không phải nộp tiền sử dụng đất:

      a) Những giấy tờ về quyền được sử dụng đất trước ngày 15 tháng 10 năm 1993 do cơ quan có thẩm quyền cấp trong quá trình
      thực hiện chính sách đất đai của Nhà nước Việt Nam dân chủ Cộng hòa, Chính phủ Cách mạng lâm thời Cộng hòa miền Nam
      Việt Nam và Nhà nước Cộng hòa xã hội chủ nghĩa Việt Nam;

      b) Giấy chứng nhận quyền sử dụng đất tạm thời được cơ quan nhà nước có thẩm quyền cấp hoặc có tên trong Sổ đăng ký ruộng
      đất, Sổ địa chính trước ngày 15 tháng 10 năm 1993;

      c) Giấy tờ hợp pháp về thừa kế, tặng cho quyền sử dụng đất hoặc tài sản gắn liền với đất; giấy tờ giao nhà tình nghĩa,
      nhà tình thương gắn liền với đất;

      d) Giấy tờ chuyển nhượng quyền sử dụng đất, mua bán nhà ở gắn liền với đất ở trước ngày 15 tháng 10 năm 1993 được Ủy
      ban nhân dân cấp xã xác nhận là đã sử dụng trước ngày 15 tháng 10 năm 1993;

      đ) Giấy tờ thanh lý, hóa giá nhà ở gắn liền với đất ở; giấy tờ mua nhà ở thuộc sở hữu nhà nước theo quy định của pháp
      luật;

      e) Giấy tờ về quyền sử dụng đất do cơ quan có thẩm quyền thuộc chế độ cũ cấp cho người sử dụng đất;

      g) Các loại giấy tờ khác được xác lập trước ngày 15 tháng 10 năm 1993 theo quy định của Chính phủ.

      2. Hộ gia đình, cá nhân đang sử dụng đất có một trong các loại giấy tờ quy định tại khoản 1 Điều này mà trên giấy tờ
      đó ghi tên người khác, kèm theo giấy tờ về việc chuyển quyền sử dụng đất có chữ ký của các bên có liên quan, nhưng đến
      trước ngày Luật này có hiệu lực thi hành chưa thực hiện thủ tục chuyển quyền sử dụng đất theo quy định của pháp luật
      và đất đó không có tranh chấp thì được cấp Giấy chứng nhận quyền sử dụng đất, quyền sở hữu nhà ở và tài sản khác gắn
      liền với đất và không phải nộp tiền sử dụng đất.

      3. Hộ gia đình, cá nhân được sử dụng đất theo bản án hoặc quyết định của Tòa án nhân dân, quyết định thi hành án của
      cơ quan thi hành án, văn bản công nhận kết quả hòa giải thành, quyết định giải quyết tranh chấp, khiếu nại, tố cáo về
      đất đai của cơ quan nhà nước có thẩm quyền đã được thi hành thì được cấp Giấy chứng nhận quyền sử dụng đất, quyền sở
      hữu nhà ở và tài sản khác gắn liền với đất; trường hợp chưa thực hiện nghĩa vụ tài chính thì phải thực hiện theo quy
      định của pháp luật.

      4. Hộ gia đình, cá nhân đang sử dụng đất được Nhà nước giao đất, cho thuê đất từ ngày 15 tháng 10 năm 1993 đến ngày
