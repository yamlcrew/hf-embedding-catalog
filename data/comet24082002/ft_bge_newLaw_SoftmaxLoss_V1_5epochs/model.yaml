  - source_sentence: Gói thầu mua sắm thường xuyên trị giá 100 triệu đồng có thể áp dụng hình thức chào hàng cạnh tranh rút
      gọn hay không?
    sentences:
    - "“Điều 57. Phạm vi áp dụng chào hàng cạnh tranh\n 1. Chào hàng cạnh tranh theo quy trình thông thường áp dụng đối với\
      \ gói thầu quy định tại Khoản 1 Điều 23 của Luật Đấu thầu có giá trị không quá 05 tỷ đồng.\n 2. Chào hàng cạnh tranh\
      \ theo quy trình rút gọn áp dụng đối với gói thầu quy định tại Điểm a Khoản 1 Điều 23 của Luật Đấu thầu có giá trị không\
      \ quá 500 triệu đồng, gói thầu quy định tại Điểm b và Điểm c Khoản 1 Điều 23 của Luật Đấu thầu có giá trị không quá\
      \ 01 tỷ đồng, gói thầu đối với mua sắm thường xuyên có giá trị không quá 200 triệu đồng.”"
    - 'Cơ cấu tổ chức

      1. Vụ Tổ chức cán bộ.

      2. Vụ Kế hoạch, Tài chính.

      3. Vụ Pháp chế.

      4. Vụ Đào tạo.

      5. Vụ Thi đua, Khen thưởng.

      6. Vụ Khoa học, Công nghệ và Môi trường.

      7. Vụ Thư viện.

      8. Vụ Văn hóa dân tộc.

      9. Vụ Gia đình.

      10. Văn phòng Bộ.

      11. Thanh tra Bộ.

      12. Cục Di sản văn hóa.

      13. Cục Nghệ thuật biểu diễn.

      14. Cục Điện ảnh.

      15. Cục Bản quyền tác giả.

      16. Cục Văn hóa cơ sở.

      17. Cục Hợp tác quốc tế.

      18. Cục Mỹ thuật, Nhiếp ảnh và Triển lãm.

      19. Tổng cục Thể dục thể thao.

      20. Tổng cục Du lịch.

      21. Ban Quản lý Làng Văn hóa - Du lịch các dân tộc Việt Nam.

      22. Viện Văn hóa Nghệ thuật quốc gia Việt Nam.

      23. Báo Văn hóa.

      24. Tạp chí Văn hóa Nghệ thuật.

      25. Trung tâm Công nghệ thông tin.

      26. Trường Cán bộ quản lý văn hóa, thể thao và du lịch.

      Các đơn vị quy định từ khoản 1 đến khoản 21 Điều này là các đơn vị hành chính giúp Bộ trưởng thực hiện chức năng quản
      lý nhà nước, các đơn vị quy định từ khoản 22 đến khoản 26 Điều này là các đơn vị sự nghiệp phục vụ chức năng quản lý
      nhà nước của Bộ.

      Bộ trưởng Bộ Văn hóa, Thể thao và Du lịch trình Thủ tướng Chính phủ ban hành các quyết định quy định chức năng, nhiệm
      vụ, quyền hạn và cơ cấu tổ chức của Tổng cục Thể dục thể thao, Tổng cục Du lịch và Ban Quản lý Làng Văn hóa - Du lịch
      các dân tộc Việt Nam và quyết định ban hành danh sách các đơn vị sự nghiệp khác hiện có thuộc Bộ.

      Bộ trưởng Bộ Văn hóa, Thể thao và Du lịch quy định chức năng, nhiệm vụ, quyền hạn và cơ cấu tổ chức của các cơ quan,
      đơn Vị thuộc Bộ, trừ các đơn vị quy định tại các khoản 19, 20 và 21 Điều này.

      Vụ Khoa học, Công nghệ và Môi trường, Vụ Tổ chức cán bộ, Vụ Pháp chế có 03 phòng; Vụ Kế hoạch, Tài chính có 07 phòng;
      Thanh tra Bộ có 05 phòng; Văn phòng Bộ có 09 phòng.

      Cục Di sản văn hóa, Cục Điện ảnh, Cục Hợp tác quốc tế, Cục Mỹ thuật, Nhiếp ảnh và Triển lãm có văn phòng và 04 phòng.

      Cục Nghệ thuật biểu diễn có văn phòng và 05 phòng.

      Cục Bản quyền tác giả có văn phòng và 06 phòng.

      Cục Văn hóa cơ sở có văn phòng và 08 phòng.'
    - 'Điều kiện đăng ký thường trú

      ...

      2. Công dân được đăng ký thường trú tại chỗ ở hợp pháp không thuộc quyền sở hữu của mình khi được chủ hộ và chủ sở hữu
      chỗ ở hợp pháp đó đồng ý trong các trường hợp sau đây:

      a) Vợ về ở với chồng; chồng về ở với vợ; con về ở với cha, mẹ; cha, mẹ về ở với con;

      b) Người cao tuổi về ở với anh ruột, chị ruột, em ruột, cháu ruột; người khuyết tật đặc biệt nặng, người khuyết tật
      nặng, người không có khả năng lao động, người bị bệnh tâm thần hoặc bệnh khác làm mất khả năng nhận thức, khả năng điều
      khiển hành vi về ở với ông nội, bà nội, ông ngoại, bà ngoại, anh ruột, chị ruột, em ruột, bác ruột, chú ruột, cậu ruột,
      cô ruột, dì ruột, cháu ruột, người giám hộ;

      c) Người chưa thành niên được cha, mẹ hoặc người giám hộ đồng ý hoặc không còn cha, mẹ về ở với cụ nội, cụ ngoại, ông
      nội, bà nội, ông ngoại, bà ngoại, anh ruột, chị ruột, em ruột, bác ruột, chú ruột, cậu ruột, cô ruột, dì ruột; người
      chưa thành niên về ở với người giám hộ.

      ...

      7. Việc đăng ký thường trú của người chưa thành niên phải được sự đồng ý của cha, mẹ hoặc người giám hộ, trừ trường
      hợp nơi cư trú của người chưa thành niên do Tòa án quyết định.

      8. Công dân không được đăng ký thường trú mới tại chỗ ở quy định tại Điều 23 của Luật này, trừ trường hợp quy định tại
      điểm a khoản 2 Điều này.'
  - source_sentence: Hồ sơ thay đổi thông tin đăng ký thuế gồm những thành phần nào?
    sentences:
    - '“1. Trung thành với Tổ quốc, Nhân dân và Hiến pháp, phấn đấu thực hiện công cuộc đổi mới, vì mục tiêu dân giàu, nước
      mạnh, dân chủ, công bằng, văn minh.

      “1a. Có một quốc tịch là quốc tịch Việt Nam.” Điều này được bổ sung bởi Khoản 1 Điều 1 Luật Tổ chức Quốc hội sửa đổi
      2020 có hiệu lực từ ngày 01/01/2021.”

      2. Có phẩm chất đạo đức tốt, cần, kiệm, liêm, chính, chí công vô tư, gương mẫu chấp hành pháp luật; có bản lĩnh, kiên
      quyết đấu tranh chống tham nhũng, lãng phí, mọi biểu hiện quan liêu, hách dịch, cửa quyền và các hành vi vi phạm pháp
      luật khác.

      3. Có trình độ văn hóa, chuyên môn, có đủ năng lực, sức khỏe, kinh nghiệm công tác và uy tín để thực hiện nhiệm vụ đại
      biểu Quốc hội.

      4. Liên hệ chặt chẽ với Nhân dân, lắng nghe ý kiến của Nhân dân, được Nhân dân tín nhiệm.

      5. Có điều kiện tham gia các hoạt động của Quốc hội.”'
    - 'Ngôn ngữ, hình thức của điều ước quốc tế

      1. Điều ước quốc tế hai bên phải có văn bản bằng tiếng Việt, trừ trường hợp có thỏa thuận khác với bên ký kết nước ngoài.

      2. Trong trường hợp điều ước quốc tế được ký kết bằng nhiều thứ tiếng thì các văn bản có giá trị ngang nhau, trừ trường
      hợp có thỏa thuận khác với bên ký kết nước ngoài.

      3. Trong trường hợp điều ước quốc tế chỉ được ký kết bằng tiếng nước ngoài thì trong hồ sơ đề xuất ký kết phải có bản
      dịch bằng tiếng Việt của điều ước quốc tế đó.

      4. Trong trường hợp nước Cộng hòa xã hội chủ nghĩa Việt Nam bảo lưu, chấp nhận hoặc phản đối bảo lưu của bên ký kết
      nước ngoài, tuyên bố đối với điều ước quốc tế nhiều bên thì trong hồ sơ trình phải có dự thảo văn bản liên quan đến
      bảo lưu, tuyên bố đó bằng tiếng Việt và tiếng nước ngoài được sử dụng để thông báo cho cơ quan lưu chiểu điều ước quốc
      tế nhiều bên.

      5. Bản chính điều ước quốc tế hai bên của phía Việt Nam phải được in trên giấy điều ước quốc tế, đóng bìa theo mẫu do
      Bộ Ngoại giao ban hành, trừ trường hợp có thỏa thuận khác với bên ký kết nước ngoài.'
    - '"Điều 6. Kế hoạch chuyển đổi Phòng công chứng

      1. Đối với các tỉnh, thành phố trực thuộc Trung ương có từ 05 Phòng công chứng trở lên thì Sở Tư pháp chủ trì, phối
      hợp với Sở Tài chính, Sở Nội vụ, Sở Lao động - Thương binh và Xã hội xây dựng Kế hoạch chuyển đổi các Phòng công chứng
      trình Ủy ban nhân dân tỉnh, thành phố trực thuộc Trung ương (sau đây gọi là Ủy ban nhân dân cấp tỉnh) phê duyệt.

      Ủy ban nhân dân cấp tỉnh quyết định phê duyệt Kế hoạch chuyển đổi các Phòng công chứng. Trong trường hợp cần thiết thì
      lấy ý kiến bằng văn bản của Bộ Tư pháp trước khi quyết định.

      2. Kế hoạch chuyển đổi các Phòng công chứng bao gồm các nội dung chủ yếu sau đây:

      a) Sự cần thiết chuyển đổi các Phòng công chứng;

      b) Số lượng các Phòng công chứng thuộc trường hợp chuyển đổi theo quy định tại Điều 5 của Nghị định này;

      c) Lộ trình chuyển đổi các Phòng công chứng;

      d) Trách nhiệm tổ chức thực hiện Kế hoạch.

      3. Căn cứ vào Kế hoạch chuyển đổi các Phòng công chứng đã được Ủy ban nhân dân cấp tỉnh phê duyệt, Sở Tư pháp phối hợp
      với Sở Tài chính, Sở Nội vụ, Sở Lao động - Thương binh và Xã hội xây dựng Đề án chuyển đổi đối với từng Phòng công chứng
      theo trình tự, thủ tục quy định tại Điều 7 của Nghị định này.

      Đối với các tỉnh, thành phố trực thuộc Trung ương có dưới 05 Phòng công chứng thì không cần thiết phải xây dựng Kế hoạch
      chuyển đổi mà xây dựng ngay Đề án chuyển đổi từng Phòng công chứng theo quy định tại Điều 7 của Nghị định này."'
  - source_sentence: Dự án nào được quyền chuyển nhượng dự án đầu tư trong khu công nghiệp?
    sentences:
    - 'Quyền và nghĩa vụ của thương nhân xuất khẩu, nhập khẩu LPG/LNG/CNG

      1. Thương nhân xuất khẩu, nhập khẩu LPG/LNG/CNG được thực hiện theo phương án kinh doanh của thương nhân và phải bảo
      đảm chất lượng LPG/LNG/CNG xuất khẩu, nhập khẩu theo quy định.

      2. Được ủy quyền bằng văn bản cho chi nhánh hoặc công ty con bán LPG/LNG/CNG vào khu phi thuế quan.

      3. Được tổ chức mua, bán LPG/LNG/CNG và LPG chai theo hợp đồng với thương nhân có Giấy chứng nhận đủ điều kiện còn hiệu
      lực và khách hàng công nghiệp.

      4. Quy định giá bán LPG/LNG/CNG và LPG chai cho thương nhân thuộc hệ thống mình quản lý.

      5. Tổ chức thực hiện dịch vụ và cung ứng các dịch vụ cho thuê: kho chứa, cảng xuất, nhập, giao nhận, phương tiện vận
      chuyển LPG/LNG/CNG.

      6. Được thiết lập hệ thống phân phối kinh doanh khí theo quy định của Luật thương mại.

      7. Kiểm tra, giám sát hệ thống phân phối do thương nhân quản lý tuân thủ các quy định của Nghị định này.

      8. Liên đới chịu trách nhiệm đối với các hành vi vi phạm của hệ thống phân phối do thương nhân quản lý trong hoạt động
      kinh doanh khí theo quy định của pháp luật.

      9. Quản lý số lượng chai LPG thuộc sở hữu của thương nhân.

      10. Tổ chức bán lẻ LPG và LPG chai trong hệ thống phân phối do thương nhân quản lý, bán trực tiếp cho khách hàng sử
      dụng và niêm yết công khai giá bán lẻ.

      11. Thực hiện kiểm định theo quy định các chai LPG, bồn chứa LPG/LNG/CNG; thiết bị phụ trợ dùng LPG, thiết bị phụ trợ
      kinh doanh LNG/CNG thuộc sở hữu thương nhân.

      12. Kiểm tra chất lượng, bảo dưỡng và thay thế các chai LPG, thiết bị phụ trợ dùng LPG/LNG/CNG, bảo đảm an toàn cho
      khách hàng sử dụng.

      13. Phải xây dựng, áp dụng, duy trì hệ thống quản lý chất lượng đối với sản phẩm khí.

      14. Thông báo bằng văn bản tới các đơn vị trong hệ thống phân phối và Sở Công Thương, Sở Tài chính nơi có hệ thống phân
      phối của thương nhân khi có sự thay đổi về giá bán LPG.

      15. Tuân thủ các quy định của pháp luật về đăng ký nhãn hiệu hàng hóa.

      16. Tuân thủ các quy định về quản lý an toàn, phòng cháy và chữa cháy, quản lý đo lường, chất lượng trong hoạt động
      kinh doanh khí quy định tại Nghị định này và pháp luật có liên quan.

      17. Phải thực hiện công bố tiêu chuẩn áp dụng đối với sản phẩm khí do mình nhập khẩu. Trường hợp, thương nhân xuất khẩu,
      nhập khẩu có thực hiện pha chế khí, trong đó có sử dụng phụ gia để pha chế khí thì thương nhân phải thông báo về Bộ
      Khoa học và Công nghệ tiêu chuẩn của phụ gia và cam kết bảo đảm chất lượng phụ gia không ảnh hưởng đến an toàn cho người,
      động vật, thực vật, môi trường và chất lượng khí.

      18. Trước 30 tháng 3 hàng năm có trách nhiệm báo cáo hệ thống phân phối, nhãn hiệu hàng hóa, hoạt động xuất khẩu, nhập
      khẩu và mua bán khí trên thị trường đến Bộ Công Thương.

      19. Lập sổ theo dõi hoặc cơ sở dữ liệu điện tử ứng dụng công nghệ thông tin theo dõi LPG chai bán cho thương nhân kinh
      doanh LPG khác hoặc khách hàng sử dụng. Tại sổ theo dõi hoặc cơ sở dữ liệu điện tử phải có các thông tin sau về LPG
      chai: chủ sở hữu, loại chai, số sê ri chai, hạn kiểm định trên chai, tên và địa chỉ thương nhân mua LPG chai, khách
      hàng sử dụng, ngày giao nhận LPG chai.'
    - 'Quyền đăng ký sở hữu công nghiệp theo các điều ước quốc tế

      1. Tổ chức, cá nhân nước ngoài đáp ứng các điều kiện để được bảo hộ quyền sở hữu công nghiệp tại Việt Nam quy định tại
      Điều 2 của Nghị định này có thể nộp đơn đăng ký sở hữu công nghiệp tại Việt Nam theo các điều ước quốc tế về hoặc liên
      quan đến thủ tục nộp đơn quốc tế.

      2. Tổ chức, cá nhân Việt Nam có thể nộp đơn đăng ký quốc tế sở hữu công nghiệp để yêu cầu bảo hộ quyền của mình tại
      Việt Nam nếu điều ước quốc tế có quy định.'
    - '“Điều 118. Điều kiện của nhà ở tham gia giao dịch

      1. Giao dịch về mua bán, cho thuê mua, tặng cho, đổi, thế chấp, góp vốn bằng nhà ở thì nhà ở phải có đủ điều kiện sau
      đây:

      a) Có Giấy chứng nhận theo quy định của pháp luật, trừ trường hợp quy định tại khoản 2 Điều này;

      b) Không thuộc diện đang có tranh chấp, khiếu nại, khiếu kiện về quyền sở hữu; đang trong thời hạn sở hữu nhà ở đối
      với trường hợp sở hữu nhà ở có thời hạn;

      c) Không bị kê biên để thi hành án hoặc không bị kê biên để chấp hành quyết định hành chính đã có hiệu lực pháp luật
      của cơ quan nhà nước có thẩm quyền;

      d) Không thuộc diện đã có quyết định thu hồi đất, có thông báo giải tỏa, phá dỡ nhà ở của cơ quan có thẩm quyền.

      Các điều kiện quy định tại điểm b và điểm c khoản này không áp dụng đối với trường hợp mua bán, thuê mua nhà ở hình
      thành trong tương lai.

      2. Giao dịch về nhà ở sau đây thì nhà ở không bắt buộc phải có Giấy chứng nhận:

      a) Mua bán, thế chấp nhà ở hình thành trong tương lai;

      b) Tổ chức thực hiện tặng cho nhà tình nghĩa, nhà tình thương;

      c) Mua bán, thuê mua nhà ở thuộc sở hữu nhà nước; mua bán, thuê mua nhà ở xã hội, nhà ở để phục vụ tái định cư không
      thuộc sở hữu nhà nước; bán nhà ở quy định tại khoản 4 Điều 62 của Luật này;

      d) Cho thuê, cho mượn, cho ở nhờ, ủy quyền quản lý nhà ở;

      đ) Nhận thừa kế nhà ở;

      e) Chuyển nhượng hợp đồng mua bán nhà ở thương mại được xây dựng trong dự án đầu tư xây dựng nhà ở bao gồm cả trường
      hợp đã nhận bàn giao nhà ở từ chủ đầu tư nhưng chưa nộp hồ sơ đề nghị cơ quan nhà nước có thẩm quyền cấp Giấy chứng
      nhận đối với nhà ở đó.

      Các giấy tờ chứng minh điều kiện nhà ở tham gia giao dịch quy định tại khoản này thực hiện theo quy định của Chính phủ.

      3. Trường hợp nhà ở cho thuê thì ngoài các điều kiện quy định tại các điểm b, c và d khoản 1 Điều này, nhà ở còn phải
      bảo đảm chất lượng, an toàn cho bên thuê nhà ở, có đầy đủ hệ thống điện, cấp, thoát nước, bảo đảm vệ sinh môi trường.“'
  - source_sentence: Nghỉ Quốc khánh của lao động nước ngoài có được nghỉ bù khi trùng ngày lễ Tết của Việt Nam không?
    sentences:
    - 'I. ĐỐI TƯỢNG PHẢI QUYẾT TOÁN THUẾ

      1. Đối với cá nhân trực tiếp quyết toán với cơ quan Thuế

      Cá nhân cư trú có thu nhập từ tiền lương, tiền công từ hai nơi trở lên mà không đáp ứng điều kiện được ủy quyền quyết
      toán theo quy định (các trường hợp được ủy quyền nêu tại điểm 3 mục I công văn này) thì phải trực tiếp khai quyết toán
      thuế TNCN với cơ quan thuế nếu có số thuế phải nộp thêm hoặc có số thuế nộp thừa đề nghị hoàn hoặc bù trừ vào kỳ khai
      thuế tiếp theo.

      Cá nhân có mặt tại Việt Nam tính trong năm dương lịch đầu tiên dưới 183 ngày, nhưng tính trong 12 tháng liên tục kể
      từ ngày đầu tiên có mặt tại Việt Nam là từ 183 ngày trở lên thì năm quyết toán đầu tiên là 12 tháng liên tục kể từ ngày
      đầu tiên có mặt tại Việt Nam.

      Cá nhân là người nước ngoài kết thúc hợp đồng làm việc tại Việt Nam khai quyết toán thuế với cơ quan thuế trước khi
      xuất cảnh. Trường hợp cá nhân chưa làm thủ tục quyết toán thuế với cơ quan thuế thì thực hiện ủy quyền cho tổ chức trả
      thu nhập hoặc tổ chức, cá nhân khác quyết toán thuế theo quy định về quyết toán thuế đối với cá nhân. Trường hợp tổ
      chức trả thu nhập hoặc tổ chức, cá nhân khác nhận ủy quyền quyết toán thì phải chịu trách nhiệm về số thuế TNCN phải
      nộp thêm hoặc được hoàn trả số thuế nộp thừa của cá nhân.

      Cá nhân cư trú có thu nhập từ tiền lương, tiền công được trả từ nước ngoài và cá nhân cư trú có thu nhập từ tiền lương,
      tiền công được trả từ các tổ chức Quốc tế, Đại sứ quán, Lãnh sự quán chưa khấu trừ thuế trong năm thì cá nhân phải quyết
      toán trực tiếp với cơ quan thuế, nếu có số thuế phải nộp thêm hoặc có số thuế nộp thừa đề nghị hoàn hoặc bù trừ vào
      kỳ khai thuế tiếp theo.

      Cá nhân cư trú có thu nhập từ tiền lương, tiền công đồng thời thuộc diện xét giảm thuế do thiên tai, hỏa hoạn, tai nạn,
      bệnh hiểm nghèo ảnh hưởng đến khả năng nộp thuế thì không ủy quyền cho tổ chức, cá nhân trả thu nhập quyết toán thuế
      thay mà phải trực tiếp khai quyết toán với cơ quan thuế theo quy định.'
    - 'Hành vi vi phạm khác

      Vi phạm một trong các trường hợp sau thì bị tước danh hiệu Dân quân tự vệ:

      1. Cố ý làm hỏng vũ khí vật liệu nổ quân dụng, công cụ hỗ trợ, trang bị, phương tiện kỹ thuật quân sự nhưng chưa đến
      mức truy cứu trách nhiệm hình sự.

      2. Bị khởi tố bị can.

      3. Bị áp dụng biện pháp đưa vào cơ sở giáo dục bắt buộc.

      4. Sử dụng trái phép chất ma túy.

      5. Bị áp dụng biện pháp đưa vào cơ sở cai nghiện bắt buộc.

      6. Bị áp dụng biện pháp giáo dục tại xã, phường, thị trấn.'
    - 'Xây dựng kế hoạch sử dụng đất hàng năm cấp huyện

      1. Xác định các chỉ tiêu sử dụng đất cấp tỉnh đã phân bổ cho cấp huyện trong năm kế hoạch và phân bổ đến từng đơn vị
      hành chính cấp xã.

      2. Xác định nhu cầu sử dụng đất cho các ngành lĩnh vực trong năm kế hoạch và phân bổ đến từng đơn vị hành chính cấp
      xã, gồm:

      a) Chỉ tiêu sử dụng đất trong kế hoạch sử dụng đất năm trước chưa thực hiện hết nhưng phải phù hợp với kinh tế - xã
      hội trên địa bàn cấp huyện;

      b) Nhu cầu sử dụng đất của các tổ chức, hộ gia đình, cá nhân trên địa bàn cấp huyện trên cơ sở xem xét đơn đề nghị của
      người có nhu cầu sử dụng đất.

      3. Tổng hợp nhu cầu sử dụng đất, cân đối xác định các chỉ tiêu sử dụng đất cho các ngành, lĩnh vực trong năm kế hoạch
      và phân bổ đến từng đơn vị hành chính cấp xã.'
  - source_sentence: Quy định cụ thể về ngân hàng đất nông nghiệp như thế nào?
    sentences:
    - 'Ngân hàng đất nông nghiệp

      1. Ngân hàng đất nông nghiệp là doanh nghiệp nhà nước do Chính phủ thành lập theo quy định của pháp luật về doanh nghiệp.

      2. Ngân hàng đất nông nghiệp có chức năng tạo lập quỹ đất nông nghiệp thông qua việc thuê quyền sử dụng đất, nhận chuyển
      nhượng quyền sử dụng đất, nhận ký gửi quyền sử dụng đất nông nghiệp; cho nhà đầu tư có nhu cầu thuê, thuê lại đất để
      sản xuất nông nghiệp.

      3. Hoạt động của Ngân hàng đất nông nghiệp không vì mục đích lợi nhuận, được Nhà nước bảo đảm khả năng thanh toán, được
      miễn thuế và các khoản phải nộp ngân sách nhà nước.

      4. Kinh phí hoạt động của Ngân hàng đất nông nghiệp được cấp từ ngân sách nhà nước; ứng từ Quỹ phát triển đất hoặc Quỹ
      đầu tư phát triển, quỹ tài chính khác được ủy thác; vay từ các tổ chức tín dụng được phép hoạt động tại Việt Nam; huy
      động vốn của các tổ chức, cá nhân và các nguồn khác theo quy định của pháp luật để thực hiện việc tạo lập quỹ đất quy
      định tại khoản 2 Điều này.

      5. Chính phủ quy định chi tiết Điều này.'
    - 'Thời điểm lập hóa đơn

      1. Thời điểm lập hóa đơn đối với bán hàng hóa (bao gồm cả bán tài sản nhà nước, tài sản tịch thu, sung quỹ nhà nước
      và bán hàng dự trữ quốc gia) là thời điểm chuyển giao quyền sở hữu hoặc quyền sử dụng hàng hóa cho người mua, không
      phân biệt đã thu được tiền hay chưa thu được tiền.

      2. Thời điểm lập hóa đơn đối với cung cấp dịch vụ là thời điểm hoàn thành việc cung cấp dịch vụ không phân biệt đã thu
      được tiền hay chưa thu được tiền. Trường hợp người cung cấp dịch vụ có thu tiền trước hoặc trong khi cung cấp dịch vụ
      thì thời điểm lập hóa đơn là thời điểm thu tiền (không bao gồm trường hợp thu tiền đặt cọc hoặc tạm ứng để đảm bảo thực
      hiện hợp đồng cung cấp các dịch vụ: kế toán, kiểm toán, tư vấn tài chính, thuế; thẩm định giá; khảo sát, thiết kế kỹ
      thuật; tư vấn giám sát; lập dự án đầu tư xây dựng).

      3. Trường hợp giao hàng nhiều lần hoặc bàn giao từng hạng mục, công đoạn dịch vụ thì mỗi lần giao hàng hoặc bàn giao
      đều phải lập hóa đơn cho khối lượng, giá trị hàng hóa, dịch vụ được giao tương ứng.

      ...

      Thời điểm xác định thuế GTGT

      1. Đối với bán hàng hóa là thời điểm chuyển giao quyền sở hữu hoặc quyền sử dụng hàng hóa cho người mua, không phân
      biệt đã thu được tiền hay chưa thu được tiền.

      ...'
    - '"Điều 46. Nhập tài sản riêng của vợ, chồng vào tài sản chung

      1. Việc nhập tài sản riêng của vợ, chồng vào tài sản chung được thực hiện theo thỏa thuận của vợ chồng.

      2. Tài sản được nhập vào tài sản chung mà theo quy định của pháp luật, giao dịch liên quan đến tài sản đó phải tuân
      theo hình thức nhất định thì thỏa thuận phải bảo đảm hình thức đó.

      3. Nghĩa vụ liên quan đến tài sản riêng đã nhập vào tài sản chung được thực hiện bằng tài sản chung, trừ trường hợp
      vợ chồng có thỏa thuận khác hoặc pháp luật có quy định khác."'
