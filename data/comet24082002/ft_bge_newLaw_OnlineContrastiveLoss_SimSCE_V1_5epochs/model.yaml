    sử dụng xe ô tô phục vụ công tác, xe ô tô chuyên dùng thì Thủ trưởng các đơn vị căn cứ vào số lượng xe ô tô hiện có trong
    từng thời điểm quyết định bố trí xe ô tô phục vụ công tác cho các đối tượng này.

    3. Đối với việc quản lý, sử dụng xe ô tô không đúng qui định thì Thủ trưởng cơ quan, đơn vị và các cá nhân liên quan phải
    chịu trách nhiệm về việc sử dụng ô tô trái với qui định của Nhà nước; tùy theo tính chất mức độ của hành vi vi phạm và
    mức độ thiệt hại mà phải bồi thường thiệt hại đồng thời bị xử lý kỷ luật theo qui định của Pháp luật.'
  - '...

    IV. CHUẨN BỊ

    1. Người thực hiện: 04 người

