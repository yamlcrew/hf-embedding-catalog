  - source_sentence: Nhân viên khai thác mặt đất phục vụ chuyến bay được cấp Giấy phép nhân viên hàng không cần đáp ứng mấy
      điều kiện?
    sentences:
    - 'Chế độ quản lý, sử dụng xe ô tô phục vụ công tác đối với các chức danh có tiêu chuẩn sử dụng xe.

      1. Xe ô tô phục vụ Chánh án Tòa án nhân dân tối cao, Phó chánh án Tòa án nhân dân tối cao được Nhà nước chi phí sử dụng
      xe ô tô theo nhu cầu công tác.

      2. Xe ô tô phục vụ Cán bộ, Lãnh đạo có hệ số phụ cấp lãnh đạo từ 0,7 đến dưới 1,25 và các đối tượng khác khi có nhu
      cầu sử dụng xe ô tô phục vụ công tác, xe ô tô chuyên dùng thì Thủ trưởng các đơn vị căn cứ vào số lượng xe ô tô hiện
      có trong từng thời điểm quyết định bố trí xe ô tô phục vụ công tác cho các đối tượng này.

      3. Đối với việc quản lý, sử dụng xe ô tô không đúng qui định thì Thủ trưởng cơ quan, đơn vị và các cá nhân liên quan
      phải chịu trách nhiệm về việc sử dụng ô tô trái với qui định của Nhà nước; tùy theo tính chất mức độ của hành vi vi
      phạm và mức độ thiệt hại mà phải bồi thường thiệt hại đồng thời bị xử lý kỷ luật theo qui định của Pháp luật.'
    - '...

      IV. CHUẨN BỊ

      1. Người thực hiện: 04 người

      - Bác sỹ: 01

      - Kỹ thuật viên: 03

      2. Người bệnh:

      - Sau tai nạn sinh hoạt, tai nạn lao động…..

      - Có chẩn đoán gãy Dupuytren và có chỉ định điều trị bảo tồn.

      - Được giải thích kỹ mục đích của thủ thuật, quá trình tiến hành làm thủ thuật.

      - Được vệ sinh sạch sẽ, bộc lộ vùng cẳng chân bên bó bột.

      - Với người bệnh gây mê cần nhịn ăn uống 6 giờ.

      3. Phương tiện:

      - Thuốc gây mê tĩnh mạch hoặc gây tê tại chỗ

      - Máy C- ARM

      - Bơm, kim tiêm, bông băng, cồn, gạc

      - Bàn nắn.

      - Bột thạch cao: 4- 6 cuộn khổ 20cm (bột liền), 6- 8 cuộn khổ 20cm (bột tự cán).

      - Bông lót: 2-3 cuộn khổ 20cm.

      4. Thời gian thực hiện thủ thuật: 60- 80 phút.

      V. CÁC BƯỚC TIẾN HÀNH

      1. Tư thế:

      Người bệnh nằm ngửa trên bàn chỉnh hình để được gây mê hoặc gây tê tại chỗ.

      2. Vô cảm:

      - Gây mê tĩnh mạch

      - Gây tê tại ổ gãy

      3. Kỹ thuật:

      - Sau gây mê, gây tê cho người bệnh nằm ngửa kê đệm gối dưới đùi. Cố định gối của người bệnh vào bàn chỉnh hình.

      - Kỹ thuật viên 1. Tay trái nắm bàn chân, tay phải đỡ dưới gót chân của người bệnh kéo thẳng trục 5-7 phút.

      - Kỹ thuật viên 2. Đứng vuông góc với KTV1 nắn đầu dưới xương chày ra ngoài. Đẩy mắt cá trong lên trên. Đưa bàn chân
      vẹo vào trong.

      - Kỹ thuật viên 3. Kiểm tra trên C- ARM và bó bột Cẳng bàn chân.

      ...'
    - 'Nhiệm vụ của Hội đồng sát hạch

      1. Xây dựng và ban hành quy chế hoạt động của Hội đồng sát hạch.

      2. Thành lập Tổ sát hạch theo từng lĩnh vực chuyên môn và trình độ tiếng Anh.

      3. Tổ chức xây dựng kế hoạch sát hạch, quy trình sát hạch, nội dung sát hạch, đề và đáp án sát hạch trình Cục trưởng
      Cục Hàng không Việt Nam ban hành.

      4. Tổ chức sát hạch và báo cáo Cục trưởng Cục Hàng không Việt Nam kết quả sát hạch để cấp giấy phép, năng định chuyên
      môn, chứng nhận trình độ tiếng Anh cho nhân viên hàng không.

      5. Chủ tịch Hội đồng sát hạch chịu trách nhiệm về việc lựa chọn sát hạch viên và kết quả sát hạch trước Cục trưởng Cục
      Hàng không Việt Nam.

      6. Tổ chức chấm phúc khảo (nếu có) đối với bài sát hạch trên giấy và thông báo kết quả cho người đề nghị phúc khảo.

      7. Lập Biên bản làm việc của Hội đồng sát hạch theo mẫu quy định tại Phụ lục 06 ban hành kèm theo Thông tư này.'
