  sentences:
  - 'Chế độ quản lý, sử dụng xe ô tô phục vụ công tác đối với các chức danh có tiêu chuẩn sử dụng xe.

    1. Xe ô tô phục vụ Chánh án Tòa án nhân dân tối cao, Phó chánh án Tòa án nhân dân tối cao được Nhà nước chi phí sử dụng
