- source_sentence: Nội dung của hợp đồng trợ giúp pháp lý bao gồm những gì?
  sentences:
  - '“Điều 69. Cơ cấu tổ chức của Ủy ban nhân dân thị trấn

    Ủy ban nhân dân thị trấn gồm Chủ tịch, Phó Chủ tịch, Ủy viên phụ trách quân sự, Ủy viên phụ trách công an.

    Ủy ban nhân dân thị trấn loại I, loại II có không quá hai Phó Chủ tịch; thị trấn loại III có một Phó Chủ tịch.”'
  - 'Phần II.

    ...

    7. TRƯỞNG PHÒNG VẬT TƯ, THIẾT BỊ Y TẾ.

    Dưới sự lãnh đạo của giám đốc bệnh viện, trưởng phòng vật tư, thiết bị y tế chịu trách nhiệm giúp giám đốc tổ chức, thực
    hiện công tác quản lý và sử dụng mọi vật tư, thiết bị y tế.

    ...

    II. QUYỀN HẠN:

    1. Chủ trì giao ban phòng hàng ngày và dự giao ban bệnh viện.

    2. Bố trí nhân lực trong phòng cho phù hợp với công việc.

    3. Nhận xét từng thành viên trong phòng về năng lực, khả năng chuyên môn, tinh thần phục vụ để trình giám đốc xét khen
    thưởng, đề bạt, kỷ luật.

    4. Kiểm tra các đơn vị trong bệnh viện về quản lý và sử dụng vật tư thiết bị y tế theo quy định.

    5. Được tham gia các hội đồng theo quy định của Nhà nước và sự phân công của giám đốc.'
  - '1. Trợ giúp viên pháp lý, luật sư thực hiện trợ giúp pháp lý tham gia tố tụng với tư cách là người bào chữa hoặc người
    bảo vệ quyền và lợi ích hợp pháp cho người được trợ giúp pháp lý theo quy định của Luật này và pháp luật về tố tụng.

    2. Khi người được trợ giúp pháp lý yêu cầu cử người thực hiện trợ giúp pháp lý tham gia tố tụng, trong thời hạn 03 ngày
    làm việc kể từ ngày thụ lý vụ việc, tổ chức thực hiện trợ giúp pháp lý có trách nhiệm cử người thực hiện trợ giúp pháp
    lý.

    Trường hợp người được trợ giúp pháp lý là người bị bắt, người bị tạm giữ yêu cầu cử người thực hiện trợ giúp pháp lý,
    trong thời hạn 12 giờ kể từ thời điểm thụ lý, tổ chức thực hiện trợ giúp pháp lý có trách nhiệm cử người thực hiện trợ
    giúp pháp lý.

    3. Trong thời hạn 12 giờ kể từ thời điểm nhận được yêu cầu trợ giúp pháp lý của người bị bắt, người bị tạm giữ hoặc trong
    thời hạn 24 giờ kể từ thời điểm nhận được yêu cầu trợ giúp pháp lý của bị can, bị cáo, người bị hại là người được trợ
    giúp pháp lý theo quy định của pháp luật về tố tụng, cơ quan, người có thẩm quyền tiến hành tố tụng có trách nhiệm thông
    báo cho Trung tâm trợ giúp pháp lý nhà nước tại địa phương. Ngay sau khi nhận được thông báo của cơ quan, người có thẩm
    quyền tiến hành tố tụng, Trung tâm trợ giúp pháp lý nhà nước có trách nhiệm thụ lý theo quy định tại khoản 4 Điều 30 của
    Luật này và cử người thực hiện trợ giúp pháp lý tham gia tố tụng.

    4. Việc cử người tham gia tố tụng phải được lập thành văn bản và gửi cho người được trợ giúp pháp lý, cơ quan tiến hành
    tố tụng có liên quan.'
- source_sentence: Bộ Giáo dục và Đào tạo có quyền xây dựng trình Thủ tướng Chính phủ phê duyệt quy hoạch mạng lưới các cơ
    sở giáo dục đại học không?
  sentences:
  - 'Quản lý và sử dụng quỹ dự phòng tài chính

    1. Ngân hàng Nhà nước thực hiện trích lập quỹ dự phòng tài chính theo quy định tại khoản 2 Điều 10 và khoản 2 Điều 16
    Chế độ tài chính của Ngân hàng Nhà nước ban hành kèm theo Quyết định số 07/2013/QĐ-TTg.

    2. Quỹ dự phòng tài chính được sử dụng như sau:

    2.1. Bù đắp phần còn lại của những tổn thất, thiệt hại về tài sản xảy ra trong quá trình hoạt động sau khi đã được bù
    đắp bằng tiền bồi thường của các tổ chức, cá nhân gây ra tổn thất, của tổ chức bảo hiểm và sử dụng dự phòng rủi ro trích
    lập trong chi phí theo quyết định bằng văn bản của Thống đốc Ngân hàng Nhà nước quy định tại điểm 3.3 khoản 3 Điều 6 Thông
    tư này.

    2.2. Bù đắp khoản chênh lệch chi lớn hơn thu hàng năm (nếu có) do ảnh hưởng từ hoạt động điều hành chính sách tiền tệ
    quốc gia. Ngân hàng Nhà nước có trách nhiệm đánh giá, xác định chính xác khoản chênh lệch chi lớn hơn thu do ảnh hưởng
    từ hoạt động điều hành chính sách tiền tệ. Thống đốc Ngân hàng Nhà nước quyết định (bằng văn bản) và chịu trách nhiệm
    về việc sử dụng quỹ dự phòng tài chính để bù đắp chênh lệch chi lớn hơn thu do ảnh hưởng từ hoạt động điều hành chính
    sách tiền tệ quốc gia.

    3. Trường hợp quỹ dự phòng tài chính không đủ bù đắp các tổn thất, thiệt hại, chênh lệch chi lớn hơn thu hàng năm (nếu
    có), Ngân hàng Nhà nước phối hợp với Bộ Tài chính trình Thủ tướng Chính phủ biện pháp xử lý phần còn thiếu.'
  - 'Hội đồng trường

    1. Hội đồng trường là tổ chức chịu trách nhiệm quyết định về phương hướng hoạt động của Trường, huy động và giám sát việc
    sử dụng các nguồn lực dành cho Trường, gắn Trường với cộng đồng và xã hội.

    2. Các thành viên của Hội đồng trường do Chủ tịch Viện Hàn lâm bổ nhiệm theo đề nghị của hai Bên (Bên Việt Nam do Chủ
    tịch Viện Hàn lâm đề xuất; Bên Pháp do Đại sứ quán Pháp tại Việt Nam đề xuất). Hội đồng trường gồm 20 thành viên (trong
    đó có 01 Chủ tịch và 02 Phó Chủ tịch) không thuộc biên chế của Trường, không hưởng lương, nhưng được hưởng thù lao và
    phụ cấp khi tham gia các hoạt động của Hội đồng trường. Mức thù lao, phụ cấp sẽ được xác định trong quy chế chi tiêu nội
    bộ của Trường. Thành viên Hội đồng trường của mỗi Bên bao gồm:

    a) 02 đại diện do Chính phủ hai nước cử;

    b) 03 đại diện các trường đại học và tổ chức nghiên cứu;

    c) 02 nhà khoa học ở ngoài Trường;

    d) 03 đại diện từ các tổ chức kinh tế - xã hội.

    ...'
  - 'Nhiệm vụ và quyền hạn

    ...

    15. Về hoạt động khoa học và công nghệ, bảo vệ môi trường

    a) Ban hành hoặc trình cấp có thẩm quyền ban hành quy định hoạt động khoa học và công nghệ, giáo dục bảo vệ môi trường
    trong các cơ sở giáo dục;

    b) Tổ chức thực hiện các nhiệm vụ khoa học, công nghệ và đổi mới sáng tạo, giáo dục bảo vệ môi trường; quản lý, sử dụng
    có hiệu quả nguồn lực khoa học và công nghệ trong lĩnh vực giáo dục và đào tạo theo quy định của pháp luật.

    ...'
- source_sentence: Doanh nghiệp cho thuê lại lao động đã được cấp giấy phép hoạt động nhưng để người không đủ điều kiện làm
    người đại diện theo pháp luật thì có bị xử lý gì không?
  sentences:
  - 'Thẩm quyền phê duyệt nhiệm vụ và đồ án quy hoạch xây dựng

    1. Thủ tướng Chính phủ phê duyệt nhiệm vụ và đồ án quy hoạch xây dựng sau:

    a) Quy hoạch chung xây dựng khu kinh tế, quy hoạch chung xây dựng khu công nghệ cao;

    b) Quy hoạch chung xây dựng khu du lịch, khu nghiên cứu, đào tạo, khu thể dục thể thao cấp quốc gia.

    2. Ủy ban nhân dân cấp tỉnh phê duyệt nhiệm vụ và đồ án quy hoạch xây dựng sau:

    a) Quy hoạch xây dựng vùng liên huyện, quy hoạch xây dựng vùng huyện;

    b) Quy hoạch chung xây dựng khu chức năng, trừ các quy hoạch quy định tại khoản 1 Điều này.

    c) Quy hoạch phân khu xây dựng khu chức năng.

    3. Ủy ban nhân dân cấp huyện phê duyệt nhiệm vụ và đồ án quy hoạch chi tiết xây dựng và quy hoạch nông thôn trong phạm
    vi địa giới hành chính do mình quản lý sau khi có ý kiến thống nhất bằng văn bản của cơ quan quản lý quy hoạch xây dựng
    thuộc Ủy ban nhân dân cấp tỉnh.

    4. Ủy ban nhân dân các cấp tổ chức lập quy hoạch xây dựng có trách nhiệm trình Hội đồng nhân dân cùng cấp quyết định trước
    khi được cơ quan nhà nước có thẩm quyền xem xét, phê duyệt.

    5. Hình thức, nội dung phê duyệt nhiệm vụ và đồ án quy hoạch xây dựng gồm:

    a) Nhiệm vụ, đồ án quy hoạch xây dựng phải được phê duyệt bằng văn bản;

    b) Văn bản phê duyệt quy hoạch xây dựng phải có các nội dung chính của đồ án quy hoạch xây dựng được quy định tại các
    điều 23, 26, 27, 28, 30 và 31 của Luật này và danh mục các bản vẽ được phê duyệt kèm theo.'
  - "Tạm hoãn, miễn thực hiện nghĩa vụ tham gia Dân quân tự vệ trong thời bình\n1. Công dân được tạm hoãn thực hiện nghĩa\
    \ vụ tham gia Dân quân tự vệ trong trường hợp sau đây:\na) Phụ nữ mang thai hoặc nuôi con dưới 36 tháng tuổi; nam giới\
    \ một mình nuôi con dưới 36 tháng tuổi;\nb) Không đủ sức khỏe thực hiện nhiệm vụ của Dân quân tự vệ;\nc) Có chồng hoặc\
    \ vợ là sĩ quan, quân nhân chuyên nghiệp, công chức, viên chức, công nhân quốc phòng, hạ sĩ quan, binh sĩ đang phục vụ\
    \ trong Quân đội nhân dân;\n...\n2. Công dân được miễn thực hiện nghĩa vụ tham gia Dân quân tự vệ trong trường hợp sau\
    \ đây:\n a) Vợ hoặc chồng, con của liệt sĩ;\nb) Vợ hoặc chồng, con của thương binh, bệnh binh, người bị nhiễm chất độc\
    \ da cam suy giảm khả năng lao động từ 81% trở lên;\nc) Quân nhân dự bị đã được sắp xếp vào đơn vị dự bị động viên;\n\
    d) Người trực tiếp nuôi dưỡng, chăm sóc Bà mẹ Việt Nam anh hùng; người trực tiếp nuôi dưỡng người suy giảm khả năng lao\
    \ động từ 81% trở lên;\nđ) Người làm công tác cơ yếu.\n3. Công dân thuộc diện tạm hoãn, miễn thực hiện nghĩa vụ tham gia\
    \ Dân quân tự vệ quy định tại các điểm c, d, đ, e, g khoản 1 và các điểm a, b, d khoản 2 Điều này nếu tình nguyện thì\
    \ được xem xét tuyển chọn vào Dân quân tự vệ.\n..."
  - '"Điều 28. Thu hồi giấy phép

    1. Doanh nghiệp cho thuê lại bị thu hồi giấy phép trong các trường hợp sau đây:

    a) Chấm dứt hoạt động cho thuê lại lao động theo đề nghị của doanh nghiệp cho thuê lại;

    b) Doanh nghiệp giải thể hoặc bị Tòa án ra quyết định tuyên bố phá sản;

    c) Không bảo đảm một trong các điều kiện quy định tại Điều 21 Nghị định này;

    d) Cho doanh nghiệp, tổ chức, cá nhân khác sử dụng giấy phép;

    đ) Cho thuê lại lao động để thực hiện công việc không thuộc danh mục công việc được thực hiện cho thuê lại lao động tại
    Phụ lục II ban hành kèm theo Nghị định này;

    e) Doanh nghiệp cho thuê lại có hành vi giả mạo các văn bản trong hồ sơ đề nghị cấp, gia hạn, cấp lại giấy phép hoặc tẩy
    xóa, sửa chữa nội dung giấy phép đã được cấp hoặc sử dụng giấy phép giả."'
- source_sentence: Giấy chứng nhận quyền sử dụng đất sẽ được cấp cho các đối tượng nào?
  sentences:
  - '"Điều 9. Phương thức đóng

    Phương thức đóng bảo hiểm xã hội tự nguyện theo Khoản 2 Điều 87 của Luật Bảo hiểm xã hội được quy định như sau:

    1. Người tham gia bảo hiểm xã hội tự nguyện được chọn một trong các phương thức đóng sau đây để đóng vào quỹ hưu trí và
    tử tuất:

    a) Đóng hằng tháng;

    b) Đóng 03 tháng một lần;

    c) Đóng 06 tháng một lần;

    d) Đóng 12 tháng một lần;

    đ) Đóng một lần cho nhiều năm về sau nhưng không quá 5 năm một lần;

    e) Đóng một lần cho những năm còn thiếu đối với người tham gia bảo hiểm xã hội đã đủ điều kiện về tuổi để hưởng lương
    hưu theo quy định nhưng thời gian đóng bảo hiểm xã hội còn thiếu không quá 10 năm (120 tháng) thì được đóng cho đủ 20
    năm để hưởng lương hưu.

    2. Trường hợp người tham gia bảo hiểm xã hội đã đủ tuổi nghỉ hưu theo quy định mà thời gian đã đóng bảo hiểm xã hội còn
    thiếu trên 10 năm nếu có nguyện vọng thì tiếp tục đóng bảo hiểm xã hội tự nguyện theo một trong các phương thức quy định
    tại các Điểm a, b, c, d và đ Khoản 1 Điều này cho đến khi thời gian đóng bảo hiểm xã hội còn thiếu không quá 10 năm thì
    được đóng một lần cho những năm còn thiếu để hưởng lương hưu theo quy định tại Điểm e Khoản 1 Điều này.

    Điều 10. Mức đóng

    Mức đóng bảo hiểm xã hội tự nguyện theo Khoản 1 Điều 87 của Luật Bảo hiểm xã hội và theo phương thức đóng tại Khoản 1
    Điều 9 Nghị định này được quy định như sau:

    1. Mức đóng hằng tháng bằng 22% mức thu nhập tháng do người tham gia bảo hiểm xã hội tự nguyện lựa chọn.

    Mức thu nhập tháng do người tham gia bảo hiểm xã hội tự nguyện lựa chọn thấp nhất bằng mức chuẩn hộ nghèo của khu vực
    nông thôn theo quy định của Thủ tướng Chính phủ và cao nhất bằng 20 lần mức lương cơ sở tại thời điểm đóng.

    ..."'
  - "Giấy chứng nhận quyền sử dụng đất, quyền sở hữu nhà ở và tài sản khác gắn liền với đất\n1. Giấy chứng nhận quyền sử dụng\
    \ đất, quyền sở hữu nhà ở và tài sản khác gắn liền với đất được cấp cho người có quyền sử dụng đất, quyền sở hữu nhà ở,\
    \ quyền sở hữu tài sản khác gắn liền với đất theo mẫu thống nhất trong cả nước. \nBộ trưởng Bộ Tài nguyên và Môi trường\
