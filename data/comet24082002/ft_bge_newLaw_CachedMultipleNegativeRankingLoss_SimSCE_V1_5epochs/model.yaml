- source_sentence: Cấp Giấy chứng nhận quyền sử dụng đất đối với trường hợp đất nông nghiệp có diện tích nhỏ hơn diện tích
    tối thiểu được quy định như thế nào?
  sentences:
  - '"Điều 29. Cấp Giấy chứng nhận quyền sử dụng đất, quyền sở hữu nhà ở và tài sản khác gắn liền với đất đối với trường hợp
    thửa đất có diện tích nhỏ hơn diện tích tối thiểu

    1. Thửa đất đang sử dụng được hình thành từ trước ngày văn bản quy định của Ủy ban nhân dân cấp tỉnh về diện tích tối
    thiểu được tách thửa có hiệu lực thi hành mà diện tích thửa đất nhỏ hơn diện tích tối thiểu theo quy định của Ủy ban nhân
    dân cấp tỉnh nhưng có đủ điều kiện cấp Giấy chứng nhận quyền sử dụng đất, quyền sở hữu nhà ở và tài sản khác gắn liền
    với đất thì người đang sử dụng đất được cấp Giấy chứng nhận quyền sử dụng đất, quyền sở hữu nhà ở và tài sản khác gắn
    liền với đất.

    2. Không được công chứng, chứng thực, cấp Giấy chứng nhận quyền sử dụng đất, quyền sở hữu nhà ở và tài sản khác gắn liền
    với đất và không được làm thủ tục thực hiện các quyền của người sử dụng đất đối với trường hợp tự chia tách thửa đất đã
    đăng ký, đã được cấp Giấy chứng nhận thành hai hoặc nhiều thửa đất mà trong đó có ít nhất một thửa đất có diện tích nhỏ
    hơn diện tích tối thiểu theo quy định của Ủy ban nhân dân cấp tỉnh.

    3. Trường hợp người sử dụng đất xin tách thửa đất thành thửa đất có diện tích nhỏ hơn diện tích tối thiểu đồng thời với
    việc xin được hợp thửa đất đó với thửa đất khác liền kề để tạo thành thửa đất mới có diện tích bằng hoặc lớn hơn diện
    tích tối thiểu được tách thửa thì được phép tách thửa đồng thời với việc hợp thửa và cấp Giấy chứng nhận quyền sử dụng
    đất, quyền sở hữu nhà ở và tài sản khác gắn liền với đất cho thửa đất mới."'
  - 'Trình tự, thủ tục chấp thuận hoạt động mua nợ

    1. Tổ chức tín dụng, chi nhánh ngân hàng nước ngoài có nhu cầu được chấp thuận hoạt động mua nợ lập 01 (một) bộ hồ sơ
    theo quy định tại Điều 6 Thông tư này gửi qua đường bưu điện hoặc nộp trực tiếp cho Ngân hàng Nhà nước (Cơ quan Thanh
    tra, giám sát ngân hàng).

    2. Trong thời hạn 40 (bốn mươi) ngày kể từ ngày nhận đủ hồ sơ hợp lệ, Ngân hàng Nhà nước xem xét chấp thuận hoạt động
    mua nợ cho tổ chức tín dụng, chi nhánh ngân hàng nước ngoài bằng Quyết định sửa đổi, bổ sung Giấy phép. Văn bản này là
    một bộ phận không tách rời của Giấy phép. Trường hợp từ chối, Ngân hàng Nhà nước thông báo bằng văn bản cho tổ chức tín
    dụng, chi nhánh ngân hàng nước ngoài và nêu rõ lý do.'
  - Người có tài sản trưng mua là tổ chức, cá nhân, hộ gia đình trong nước, tổ chức, cá nhân nước ngoài có quyền sở hữu tài
    sản thuộc đối tượng trưng mua.
- source_sentence: Xe ô tô kinh doanh vận tải hành khách bằng xe buýt phải đáp ứng điều kiện nào?
  sentences:
  - 'Địa bàn quản lý

    1. Đội 1: Quản lý khu vực phía Bắc, từ địa bàn tỉnh Thanh Hóa trở ra phía Bắc.

    2. Đội 2: Quản lý khu vực miền Trung, từ địa bàn tỉnh Nghệ An trở vào đến hết địa bàn tỉnh Ninh Thuận, Lâm Đồng và các
    tỉnh Tây Nguyên.

    3. Đội 3: Quản lý khu vực miền Nam, từ địa bàn tỉnh Bình Thuận trở vào phía Nam.

    Địa bàn quản lý của các Đội không bao gồm địa bàn trên biển.'
  - '"Điều 131. Các trường hợp chấm dứt hợp đồng thuê nhà ở

    1. Trường hợp thuê nhà ở thuộc sở hữu nhà nước thì việc chấm dứt hợp đồng thuê nhà được thực hiện khi có một trong các
    trường hợp quy định tại khoản 1 Điều 84 của Luật này.

    2. Trường hợp thuê nhà ở không thuộc sở hữu nhà nước thì việc chấm dứt hợp đồng thuê nhà ở được thực hiện khi có một trong
    các trường hợp sau đây:

    a) Hợp đồng thuê nhà ở hết hạn; trường hợp trong hợp đồng không xác định thời hạn thì hợp đồng chấm dứt sau 90 ngày, kể
    từ ngày bên cho thuê nhà ở thông báo cho bên thuê nhà ở biết việc chấm dứt hợp đồng;

    b) Hai bên thỏa thuận chấm dứt hợp đồng;

    c) Nhà ở cho thuê không còn;

    d) Bên thuê nhà ở chết hoặc có tuyên bố mất tích của Tòa án mà khi chết, mất tích không có ai đang cùng chung sống;

    đ) Nhà ở cho thuê bị hư hỏng nặng, có nguy cơ sập đổ hoặc thuộc khu vực đã có quyết định thu hồi đất, giải tỏa nhà ở hoặc
    có quyết định phá dỡ của cơ quan nhà nước có thẩm quyền; nhà ở cho thuê thuộc diện bị Nhà nước trưng mua, trưng dụng để
    sử dụng vào các mục đích khác.

    Bên cho thuê phải thông báo bằng văn bản cho bên thuê biết trước 30 ngày về việc chấm dứt hợp đồng thuê nhà ở quy định
    tại điểm này, trừ trường hợp các bên có thỏa thuận khác;

    e) Chấm dứt theo quy định tại Điều 132 của Luật này."'
  - 'Kinh doanh vận tải hành khách bằng xe buýt theo tuyến cố định

    ...

    2. Xe ô tô kinh doanh vận tải hành khách bằng xe buýt

    a) Phải có chỗ ưu tiên cho người khuyết tật, người cao tuổi và phụ nữ mang thai;

    b) Phải có phù hiệu “XE BUÝT” và được dán cố định phía bên phải mặt trong kính trước của xe; phải được niêm yết đầy đủ
    các thông tin trên xe;

    c) Phải có sức chứa từ 17 chỗ trở lên. Vị trí, số chỗ ngồi, chỗ đứng cho hành khách và các quy định kỹ thuật khác đối
    với xe buýt theo quy chuẩn kỹ thuật do Bộ Giao thông vận tải ban hành. Đối với hoạt động kinh doanh vận tải hành khách
    bằng xe buýt trên các tuyến có hành trình bắt buộc phải qua cầu có trọng tải cho phép tham gia giao thông từ 05 tấn trở
    xuống hoặc trên 50% lộ trình tuyến là đường từ cấp IV trở xuống (hoặc đường bộ đô thị có mặt cắt ngang từ 07 mét trở xuống)
    được sử dụng xe ô tô có sức chứa từ 12 đến dưới 17 chỗ.

