- source_sentence: Liên hiệp hợp tác xã phải gửi thông báo về việc tạm ngừng hoạt động đến Phòng Đăng ký kinh doanh bao lâu
    trước khi tạm ngừng hoạt động?
  sentences:
  - "Cơ cấu tổ chức và biên chế\n1. Lãnh đạo\nChi nhánh Trung tâm Internet Việt Nam tại thành phố Hồ Chí Minh có Trưởng Chi\
    \ nhánh và các Phó Trưởng Chi nhánh.\nTrưởng Chi nhánh chịu trách nhiệm trước Giám đốc Trung tâm Internet Việt Nam và\
    \ trước pháp luật về kết quả thực hiện chức năng, nhiệm vụ, quyền hạn được giao.\nCác Phó Trưởng Chi nhánh giúp Trưởng\
    \ Chi nhánh điều hành các mặt công tác của Chi nhánh, chịu trách nhiệm trước Trưởng Chi nhánh và trước pháp luật về nhiệm\
    \ vụ được phân công.\n2. Tổ chức bộ máy\n- Phòng Tổng hợp và Dịch vụ.\n- Phòng Khai thác mạng. \nChức năng, nhiệm vụ và\
    \ mối quan hệ công tác giữa các phòng của Chi nhánh do Trưởng Chi nhánh xây dựng trình Giám đốc Trung tâm Internet Việt\
    \ Nam quyết định.\n3. Số lượng người làm việc, lao động của Chi nhánh do Trưởng Chi nhánh xây dựng, trình Giám đốc Trung\
    \ tâm Internet Việt Nam quyết định."
  - 'THỦ TỤC HÀNH CHÍNH CẤP TỈNH

    ...

    13. Tạm ngừng hoạt động của liên hiệp hợp tác xã, chi nhánh, văn phòng đại diện, địa điểm kinh doanh của liên hiệp hợp
    tác xã

    a) Trình tự thực hiện:

    + Trường hợp đăng ký trực tiếp:

    Bước 1: Nộp hồ sơ

    - Khi tạm ngừng hoạt động liên hiệp hợp tác xã, tạm ngừng hoạt động chi nhánh, văn phòng đại diện, địa điểm kinh doanh
    của liên hiệp hợp tác xã, liên hiệp hợp tác xã gửi thông báo bằng văn bản đến Phòng Đăng ký kinh doanh thuộc Sở Kế hoạch
    và Đầu tư, nơi đã cấp Giấy chứng nhận đăng ký liên hiệp hợp tác xã, Giấy chứng nhận đăng ký chi nhánh, văn phòng đại diện,
    địa điểm kinh doanh cho liên hiệp hợp tác xã ít nhất 15 ngày trước khi tạm ngừng hoạt động.

    Bước 2: Tiếp nhận hồ sơ

    - Người đến làm thủ tục nộp bản sao hợp lệ giấy chứng minh nhân dân hoặc hộ chiếu còn hiệu lực.

    ...'
  - '"Điều 6. Thời hiệu xử lý vi phạm hành chính

    1. Thời hiệu xử phạt vi phạm hành chính được quy định như sau:

    a) Thời hiệu xử phạt vi phạm hành chính là 01 năm, trừ các trường hợp sau đây:

    Vi phạm hành chính về kế toán; hóa đơn; phí, lệ phí; kinh doanh bảo hiểm; quản lý giá; chứng khoán; sở hữu trí tuệ; xây
    dựng; thủy sản; lâm nghiệp; điều tra, quy hoạch, thăm dò, khai thác, sử dụng nguồn tài nguyên nước; hoạt động dầu khí
    và hoạt động khoáng sản khác; bảo vệ môi trường; năng lượng nguyên tử; quản lý, phát triển nhà và công sở; đất đai; đê
    điều; báo chí; xuất bản; sản xuất, xuất khẩu, nhập khẩu, kinh doanh hàng hóa; sản xuất, buôn bán hàng cấm, hàng giả; quản
    lý lao động ngoài nước thì thời hiệu xử phạt vi phạm hành chính là 02 năm.

    Vi phạm hành chính về thuế thì thời hiệu xử phạt vi phạm hành chính theo quy định của pháp luật về quản lý thuế;

    b) Thời điểm để tính thời hiệu xử phạt vi phạm hành chính quy định tại điểm a khoản 1 Điều này được quy định như sau:

    Đối với vi phạm hành chính đã kết thúc thì thời hiệu được tính từ thời điểm chấm dứt hành vi vi phạm.

    Đối với vi phạm hành chính đang được thực hiện thì thời hiệu được tính từ thời điểm phát hiện hành vi vi phạm;

    c) Trường hợp xử phạt vi phạm hành chính đối với cá nhân,tổ chức do cơ quan tiến hành tố tụng chuyển đến thì thời hiệu
    được áp dụng theo quy định tại điểm a và điểm b khoản này. Thời gian cơ quan tiến hành tố tụng thụ lý, xem xét được tính
    vào thời hiệu xử phạt vi phạm hành chính.

    d) Trong thời hạn được quy định tại điểm a và điểm b khoản này mà cá nhân, tổ chức cố tình trốn tránh, cản trở việc xử
    phạt thì thời hiệu xử phạt vi phạm hành chính được tính lại kể từ thời điểm chấm dứt hành vi trốn tránh, cản trở việc
    xử phạt."'
- source_sentence: Thực hiện gia hạn tạm trú cho người đã được cấp giấy miễn thị thực tại Cục Quản lý xuất nhập cảnh, Bộ Công
    an có phải nộp lệ phí?
  sentences:
  - 'Thủ tục: Gia hạn tạm trú cho người đã được cấp giấy miễn thị thực

    ...

    - Phí: 10USD/lần.

    - Tên mẫu đơn, mẫu tờ khai: Tờ khai đề nghị cấp thị thực, gia hạn tạm trú (Mẫu NA5) ban hành kèm theo Thông tư số 04/2015/TT-BCA
    ngày 05/01/2015.

    - Yêu cầu, điều kiện thực hiện thủ tục hành chính:

    + Có hộ chiếu hoặc giấy tờ có giá trị đi lại quốc tế còn giá trị ít nhất 01 năm.

    + Người nhập cảnh bằng giấy miễn thị thực được cơ quan, tổ chức, cá nhân tại Việt Nam bảo lãnh và có lý do chính đáng.

    + Không thuộc các trường hợp chưa cho nhập cảnh và tạm hoãn xuất cảnh theo quy định tại Điều 21 và Điều 28 của Luật Nhập
    cảnh, xuất cảnh, quá cảnh, cư trú của người nước ngoài tại Việt Nam.

    ...'
  - 'Quy định nội bộ về cấp tín dụng, quản lý nợ, chính sách dự phòng rủi ro

    ...

    2. Quy định nội bộ về cấp tín dụng, quản lý nợ tối thiểu phải đáp ứng các yêu cầu sau:

    a) Được xây dựng trên cơ sở thông tin, số liệu khách hàng đã thu thập được, kết quả xếp hạng khách hàng theo hệ thống
    xếp hạng tín dụng nội bộ;

    b) Được sử dụng thống nhất trong toàn hệ thống, làm cơ sở để thẩm định, phê duyệt cấp tín dụng, quản lý nợ đối với khách
    hàng cụ thể;

    c) Có quy định chính sách tín dụng đối với khách hàng, trong đó bao gồm quy định về điều kiện cấp tín dụng, hạn mức cấp
    tín dụng, lãi suất, hồ sơ, trình tự, thủ tục, quy trình thẩm định, phê duyệt cấp tín dụng, quản lý nợ;

    d) Có quy định về quản lý nhằm đảm bảo tuân thủ quy định của Ngân hàng Nhà nước về các tỷ lệ đảm bảo an toàn trong hoạt
    động của tổ chức tín dụng, chi nhánh ngân hàng nước ngoài;

    đ) Có quy định về trách nhiệm, quyền hạn của các đơn vị, cá nhân trong việc thẩm định, phê duyệt cấp tín dụng, quản lý
    chất lượng tín dụng, quản lý tài sản bảo đảm;

    e) Có quy định về quy trình, nội dung kiểm tra, kiểm soát trước, trong và sau khi cấp tín dụng;

    g) Có quy định về biện pháp bảo đảm, thẩm định và quản lý tài sản bảo đảm;

    h) Có quy định về định giá tài sản bảo đảm, bao gồm nguyên tắc, định kỳ, phương pháp, quy trình và trách nhiệm của từng
    đơn vị, cá nhân có liên quan đến việc định giá tài sản bảo đảm theo quy định của pháp luật để đảm bảo giá trị tài sản
    bảo đảm phù hợp với giá trị thị trường khi tính số tiền trích lập dự phòng cụ thể theo quy định tại Thông tư này;

    i) Có quy định về các biện pháp thu hồi nợ.

    ...'
  - 'Bảo trì, bảo dưỡng, duy trì hoạt động, nâng cấp, chỉnh sửa Cổng thông tin điện tử Viện kiểm sát nhân dân tối cao

    1. Cổng thông tin điện tử phải được thường xuyên kiểm tra, bảo dưỡng, sửa chữa, giám sát hoạt động để đảm bảo hoạt động
    liên tục 24 giờ trong tất cả các ngày.

    2. Hằng năm, Văn phòng phối hợp với Cục Thống kê tội phạm và Công nghệ thông tin rà soát và đề xuất phương án nâng cấp,
    chỉnh sửa Cổng thông tin điện tử cho phù hợp với nhu cầu thực tế. Đồng thời xây dựng phương án trang bị đầy đủ trang thiết
    bị cần thiết phục vụ cho việc thu thập, xử lý và cập nhật thông tin cho Cổng thông tin điện tử, bảo đảm khai thác hiệu
    quả hạ tầng công nghệ hiện có.'
- source_sentence: Các tổ chức nào được phép kinh doanh ngoại hối ở Việt Nam?
  sentences:
  - '"Điều 2. Giải thích từ ngữ

    Tại Thông tư này, các từ ngữ dưới đây được hiểu như sau:

    1. Tổ chức tín dụng được phép hoạt động ngoại hối là các ngân hàng, tổ chức tín dụng phi ngân hàng và chi nhánh ngân hàng
    nước ngoài được kinh doanh, cung ứng dịch vụ ngoại hối (sau đây gọi là tổ chức tín dụng được phép).

    ..."'
  - '"Điều 24. Mục đích sử dụng các quỹ

    ...

    2. Mục đích sử dụng Quỹ:

    ...

    e) Quỹ phúc lợi tập trung được trích lập từ lợi nhuận sau thuế của Công ty mẹ và nguồn đóng góp khác (nếu có). Quỹ phúc
    lợi được dùng để:

    - Đầu tư xây dựng hoặc sửa chữa các công trình phúc lợi của Công ty mẹ;

    - Chi cho các hoạt động phúc lợi của người lao động trong Công ty mẹ bao gồm cả người quản lý, kiểm soát viên của Công
    ty mẹ làm việc theo hợp đồng lao động và người quản lý, kiểm soát viên của Công ty mẹ do nhà nước bổ nhiệm;

    - Góp một phần vốn để đầu tư xây dựng các công trình phúc lợi chung trong ngành hoặc với các đơn vị khác theo hợp đồng;

    - Sử dụng một phần quỹ phúc lợi để trợ cấp khó khăn đột xuất cho những người lao động kể cả những trường hợp về hưu, về
    mất sức, lâm vào hoàn cảnh khó khăn, không nơi nương tựa hoặc làm công tác từ thiện xã hội;

    - Mức chi sử dụng quỹ do Tổng giám đốc Công ty mẹ quyết định được ghi trong quy chế quản lý, sử dụng quỹ của Công ty mẹ."'
  - '“1. Trong thời hạn 06 tháng, kể từ ngày nhận được bản án, quyết định dân sự đã có hiệu lực pháp luật của Tòa án nước
    ngoài mà không có yêu cầu thi hành tại Việt Nam, đương sự, người có quyền, lợi ích hợp pháp liên quan hoặc người đại diện
    hợp pháp của họ có quyền gửi đơn đến Bộ Tư pháp Việt Nam theo quy định của điều ước quốc tế mà Cộng hòa xã hội chủ nghĩa
    Việt Nam là thành viên hoặc Tòa án có thẩm quyền của Việt Nam theo quy định của Bộ luật này trong trường hợp điều ước
    quốc tế mà Cộng hòa xã hội chủ nghĩa Việt Nam là thành viên không quy định hoặc không có điều ước quốc tế liên quan để
    yêu cầu Tòa án không công nhận bản án, quyết định dân sự đó.

    2. Trường hợp người làm đơn chứng minh được vì sự kiện bất khả kháng hoặc trở ngại khách quan mà không thể gửi đơn đúng
    thời hạn quy định tại khoản 1 Điều này thì thời gian có sự kiện bất khả kháng hoặc trở ngại khách quan đó không tính vào
    thời hạn gửi đơn.”'
