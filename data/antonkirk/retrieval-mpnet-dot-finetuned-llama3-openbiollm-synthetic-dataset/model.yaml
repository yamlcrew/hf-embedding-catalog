widgetData:
- source_sentence: Pulmonary stenoses, brachytelephalangy, inner ear deafness
  sentences:
  - "This article needs more medical references for verification or relies too heavily on primary sources. Please review the\
    \ contents of the article and add the appropriate references if you can. Unsourced or poorly sourced material may be challenged\
    \ and removed.  \nFind sources: \"Chondropathy\" – news · newspapers · books · scholar · JSTOR (October 2020)  \n  \n\
    Chondropathy  \nSpecialtyOrthopedics  \n  \nChondropathy refers to a disease of the cartilage. It is frequently divided\
    \ into 5 grades, with 0-2 defined as normal and 3-4 defined as diseased.\n\n## Contents\n\n  * 1 Some common diseases\
    \ affecting/involving the cartilage\n  * 2 Repairing articular cartilage damage\n  * 3 References\n  * 4 External links\n\
    \n## Some common diseases affecting/involving the cartilage[edit]"
  - 'A number sign (#) is used with this entry because of evidence that Keutel syndrome (KTLS) is caused by homozygous mutation
    in the gene encoding the human matrix Gla protein (MGP; 154870) on chromosome 12p12.


    Description


    Keutel syndrome is an autosomal recessive disorder characterized by multiple peripheral pulmonary stenoses, brachytelephalangy,
    inner ear deafness, and abnormal cartilage ossification or calcification (summary by Khosroshahi et al., 2014).


    Clinical Features'
  - '##  Description


    Primary or spontaneous detachment of the retina occurs due to underlying ocular disease and often involves the vitreous
    as well as the retina. The precipitating event is formation of a retinal tear or hole, which permits fluid to accumulate
    under the sensory layers of the retina and creates an intraretinal cleavage that destroys the neurosensory process of
    visual reception. Vitreoretinal degeneration and tear formation are painless phenomena, and in most cases, significant
    vitreoretinal pathology is found only after detachment of the retina starts to cause loss of vision or visual field. Without
    surgical intervention, retinal detachment will almost inevitably lead to total blindness (summary by McNiel and McPherson,
    1971).


    Clinical Features'
- source_sentence: APS, catastrophic, diagnostic criteria, treatment options
  sentences:
  - 'A number sign (#) is used with this entry because of evidence that myofibrillar myopathy-8 (MFM8) is caused by homozygous
    or compound heterozygous mutation in the PYROXD1 gene (617220) on chromosome 12p12.


    Description


    Myofibrillar myopathy-8 is an autosomal recessive myopathy characterized by childhood onset of slowly progressive proximal
    muscle weakness and atrophy resulting in increased falls, gait problems, and difficulty running or climbing stairs. Upper
    and lower limbs are affected, and some individuals develop distal muscle weakness and atrophy. Ambulation is generally
    preserved, and patients do not have significant respiratory compromise. Muscle biopsy shows a mix of myopathic features,
    including myofibrillar inclusions and sarcomeric disorganization (summary by O''Grady et al., 2016).


    For a general phenotypic description and a discussion of genetic heterogeneity of myofibrillar myopathy, see MFM1 (601419).


    Clinical Features'
  - "Rectal tenesmus  \nSpecialtyGeneral surgery  \n  \nRectal tenesmus is a feeling of incomplete defecation. It is the sensation\
    \ of inability or difficulty to empty the bowel at defecation, even if the bowel contents have already been evacuated.\
    \ Tenesmus indicates the feeling of a residue, and is not always correlated with the actual presence of residual fecal\
    \ matter in the rectum. It is frequently painful and may be accompanied by involuntary straining and other gastrointestinal\
    \ symptoms. Tenesmus has both a nociceptive and a neuropathic component.\n\nVesical tenesmus is a similar condition, experienced\
    \ as a feeling of incomplete voiding despite the bladder being empty.\n\nOften, rectal tenesmus is simply called tenesmus.\
    \ The term rectal tenesmus is a retronym to distinguish defecation-related tenesmus from vesical tenesmus.[1]"
  - "This article needs additional citations for verification. Please help improve this article by adding citations to reliable\
    \ sources. Unsourced material may be challenged and removed.  \nFind sources: \"Catastrophic antiphospholipid syndrome\"\
    \ – news · newspapers · books · scholar · JSTOR (February 2018) (Learn how and when to remove this template message) \
    \ \n  \nCatastrophic antiphospholipid syndrome  \nOther namesCatastrophic APS"
- source_sentence: Excess cholesterol, foam cells, gallbladder wall changes
  sentences:
  - "Cholesterolosis of gallbladder  \nMicrograph of cholesterolosis of the gallbladder, with an annotated foam cell. H&E\
    \ stain.  \nSpecialtyGastroenterology  \n  \nIn surgical pathology, strawberry gallbladder, more formally cholesterolosis\
    \ of the gallbladder and gallbladder cholesterolosis, is a change in the gallbladder wall due to excess cholesterol.[1]\n\
    \nThe name strawberry gallbladder comes from the typically stippled appearance of the mucosal surface on gross examination,\
    \ which resembles a strawberry. Cholesterolosis results from abnormal deposits of cholesterol esters in macrophages within\
    \ the lamina propria (foam cells) and in mucosal epithelium. The gallbladder may be affected in a patchy localized form\
    \ or in a diffuse form. The diffuse form macroscopically appears as a bright red mucosa with yellow mottling (due to lipid),\
    \ hence the term strawberry gallbladder. It is not tied to cholelithiasis (gallstones) or cholecystitis (inflammation\
    \ of the gallbladder).[2]\n\n## Contents"
  - Meningococcal meningitis is an acute bacterial disease caused by Neisseria meningitides that presents usually, but not
    always, with a rash (non blanching petechial or purpuric rash), progressively developing signs of meningitis (fever, vomiting,
    headache, photophobia, and neck stiffness) and later leading to confusion, delirium and drowsiness. Neck stiffness and
    photophobia are often absent in infants and young children who may manifest nonspecific signs such as irritability, inconsolable
    crying, poor feeding, and a bulging fontanel. Meningococcal meningitis may also present as part of early or late onset
    sepsis in neonates. The disease is potentially fatal. Surviving patients may develop neurological sequelae that include
    sensorineural hearing loss, seizures, spasticity, attention deficits and intellectual disability.
  - "Retiform parapsoriasis  \nSpecialtyDermatology  \n  \nRetiform parapsoriasis is a cutaneous condition, considered to\
    \ be a type of large-plaque parapsoriasis.[1] It is characterized by widespread, ill-defined plaques on the skin, that\
    \ have a net-like or zebra-striped pattern.[2] Skin atrophy, a wasting away of the cutaneous tissue, usually occurs within\
    \ the area of these plaques.[1]\n\n## See also[edit]\n\n  * Parapsoriasis\n  * Poikiloderma vasculare atrophicans\n  *\
    \ List of cutaneous conditions\n\n## References[edit]\n\n  1. ^ a b Lambert WC, Everett MA (Oct 1981). \"The nosology\
    \ of parapsoriasis\". J. Am. Acad. Dermatol. 5 (4): 373–95. doi:10.1016/S0190-9622(81)70100-2. PMID 7026622.\n  2. ^ Rapini,\
    \ Ronald P.; Bolognia, Jean L.; Jorizzo, Joseph L. (2007). Dermatology: 2-Volume Set. St. Louis: Mosby. ISBN 1-4160-2999-0.\n\
    \n## External links[edit]\n\nClassification\n\nD\n\n  * ICD-10: L41.5\n  * ICD-9-CM: 696.2\n\n  \n  \n  * v\n  * t\n \
    \ * e\n\nPapulosquamous disorders  \n  \nPsoriasis\n\nPustular"
- source_sentence: Pulmonary hypoplasia, respiratory insufficiency, megaureter, hydronephrosis
  sentences:
  - 'A rare fetal lower urinary tract obstruction (LUTO) characterized by closure or failure to develop an opening in the
    urethra and resulting in obstructive uropathy presenting in utero as megacystis, oligohydramnios or anhydramnios, and
    potter sequence.


    ## Epidemiology


    Prevalence is unknown, but is higher in males than females.


    ## Clinical description


    Atresia of urethra often presents on routine antenatal ultrasound with megacystis, oligohydramnios or anhydramnios and
    sometimes urinary ascites. It may cause fetal death. In cases that survive to birth, additional symptoms include respiratory
    insufficiency due to pulmonary hypoplasia, megaureter, hydronephrosis and enlarged often cystic and functionally impaired/non-functional
    dysplastic kidneys as well as abdominal distention. Furthermore, a Potter sequence can be found due to oligo- or anhydramnios.
    Patients may present with patent urachus or vesicocutaneous fistula.


    ## Etiology'
  - X-linked distal spinal muscular atrophy type 3 is a rare distal hereditary motor neuropathy characterized by slowly progressive
    atrophy and weakness of distal muscles of hands and feet with normal deep tendon reflexes or absent ankle reflexes and
    minimal or no sensory loss, sometimes mild proximal weakness in the legs and feet and hand deformities in males.
  - 'A number sign (#) is used with this entry because Chudley-McCullough syndrome (CMCS) is caused by homozygous or compound
    heterozygous mutation in the GPSM2 gene (609245) on chromosome 1p13.


    Description


    Chudley-McCullough syndrome is an autosomal recessive neurologic disorder characterized by early-onset sensorineural deafness
    and specific brain anomalies on MRI, including hypoplasia of the corpus callosum, enlarged cysterna magna with mild focal
    cerebellar dysplasia, and nodular heterotopia. Some patients have hydrocephalus. Psychomotor development is normal (summary
    by Alrashdi et al., 2011).


    Clinical Features'
- source_sentence: Thyroid-stimulating hormone receptor gene, chromosome 14q31, homozygous mutation
  sentences:
  - 'A number sign (#) is used with this entry because dermatofibrosarcoma protuberans is caused in most cases by a specific
    fusion of the COL1A1 gene (120150) with the PDGFB gene (190040); see 190040.0002.


    Description


    Dermatofibrosarcoma protuberans (DFSP) is an uncommon, locally aggressive, but rarely metastasizing tumor of the deep
    dermis and subcutaneous tissue. It typically presents during early or middle adult life and is most frequently located
    on the trunk and proximal extremities (Sandberg et al., 2003).


    Clinical Features


    DFSP was first described by Taylor (1890). Sirvent et al. (2003) stated that, because DFSP is relatively rare, grows slowly,
    and has a low level of aggressiveness, its clinical significance has been underestimated. In particular, they noted that
    the existence of pediatric cases has been overlooked.


    Gardner et al. (1998) described a father and son with dermatofibrosarcoma protuberans. The tumors arose at ages 43 and
    14 years, respectively.'
  - "Visuospatial dysgnosia is a loss of the sense of \"whereness\" in the relation of oneself to one's environment and in\
    \ the relation of objects to each other.[1] Visuospatial dysgnosia is often linked with topographical disorientation.\n\
    \n## Contents\n\n  * 1 Symptoms\n  * 2 Lesion areas\n  * 3 Case studies\n  * 4 Therapies\n  * 5 References\n\n## Symptoms[edit]\n\
    \nThe syndrome rarely presents itself the same way in every patient. Some symptoms that occur may be:"
  - 'A number sign (#) is used with this entry because of evidence that congenital nongoitrous hypothyroidism-1 (CHNG1) is
    caused by homozygous or compound heterozygous mutation in the gene encoding the thyroid-stimulating hormone receptor (TSHR;
    603372) on chromosome 14q31.


    Description


    Resistance to thyroid-stimulating hormone (TSH; see 188540), a hallmark of congenital nongoitrous hypothyroidism, causes
    increased levels of plasma TSH and low levels of thyroid hormone. Only a subset of patients develop frank hypothyroidism;
    the remainder are euthyroid and asymptomatic (so-called compensated hypothyroidism) and are usually detected by neonatal
    screening programs (Paschke and Ludgate, 1997).


    ### Genetic Heterogeneity of Congenital Nongoitrous Hypothyroidism'
