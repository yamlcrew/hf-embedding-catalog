    - 'A number sign (#) is used with this entry because dermatofibrosarcoma protuberans is caused in most cases by a specific
      fusion of the COL1A1 gene (120150) with the PDGFB gene (190040); see 190040.0002.


      Description


      Dermatofibrosarcoma protuberans (DFSP) is an uncommon, locally aggressive, but rarely metastasizing tumor of the deep
      dermis and subcutaneous tissue. It typically presents during early or middle adult life and is most frequently located
      on the trunk and proximal extremities (Sandberg et al., 2003).


      Clinical Features


      DFSP was first described by Taylor (1890). Sirvent et al. (2003) stated that, because DFSP is relatively rare, grows
      slowly, and has a low level of aggressiveness, its clinical significance has been underestimated. In particular, they
      noted that the existence of pediatric cases has been overlooked.


      Gardner et al. (1998) described a father and son with dermatofibrosarcoma protuberans. The tumors arose at ages 43 and
      14 years, respectively.'
