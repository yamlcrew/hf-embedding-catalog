  - I understand. Our ship's surgeon often makes the same complaint. Do call when you are ready.
  - Irrelevant, since we are here.
- source_sentence: Aye, sir. Aye, sir. Return to your station, Sub-commander. The boarding action on the Enterprise will begin
    with my command. If they resist, destroy her. Execution of state criminals is both painful and unpleasant. I believe the
    details are unnecessary. The sentence will be carried out immediately after the charges have been recorded. I demand the
    Right of Statement first.[SEP]You understand Romulan tradition well. The right is granted.
  sentences:
  - ' No, I... it''s just... you''re just coming off the surgery and you''re not yourself yet and I work for you and Even
    though last year''s... [Frustrated sigh as House starts smiling smugly.] you''re smiling! I''m saying no and you''re smiling!'
  - I wish to ask a question. What of Sarek's family, his wife and son?
  - Thank you. I shall not require much time. No more than twenty minutes, I should say.
- source_sentence: Mankind, ready to kill. That's the way it was in 1881. I wonder how humanity managed to survive. We overcame
    our instinct for violence. Some desk-bound Starfleet bureaucrat cut these cloak-and-dagger orders.[SEP]Aye, but why the
    secrecy? This star system's under Federation control.
  sentences:
  - It's in a border area, Mister Scott. The Klingons also claim jurisdiction.
  - ' That''s your argument? Better outcome?'
  - Are you all right, Captain?
- source_sentence: We're trying to help you, Oxmyx. Nobody helps nobody but himself. Sir, you are employing a double negative.
    Huh? I fail to see why you do not understand us. You yourself have stated the need for unity of authority on this planet.
    We agree.[SEP]Yeah, but I got to be the unity.
  sentences:
  - Co-operation, sir, would inevitably result
  - Quite right, Mister Scott. There's somebody holding us down. All systems are go, but we're not moving.
  - ' So today I''m jailbait but in 22 weeks anybody can do anything to me. Will I be so different in 22 weeks?'
- source_sentence: What happened? Where have I been? Right here, it seems. But that girl. She was so beautiful. So real. Do
    you remember anything else? No.[SEP]Good. Perhaps that explains why he's here. Nothing was real to him except the girl.
  sentences:
  - Sweeping the area of Outpost two. Sensor reading indefinite. Double-checking Outpost three. I read dust and debris. Both
    Earth outposts gone, and the asteroids they were constructed on, pulverised.
  - ' It''s killing you.'
  - Captain, the Melkotian object.
