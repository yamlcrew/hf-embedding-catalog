  - Aucune récidive tumorale n’a été retrouvée par cytologie urinaire, urétéro-pyélographie rétrograde et urétéroscopie souple.
  - La patiente ne fume pas, ne prend que très rarement de l’alcool et n’a pas d’allergie aux médicaments.
- source_sentence: La cystographie se révéla normale.
  sentences:
  - La cystographie rétrograde était normale.
  - Le reste de l’urètre était normal.
  - L’examen anatomo-pathologique conclut à un carcinome indifférencié, de stade pT 1 grade 3.
- source_sentence: Le patient a été mis sous antibiothérapie adaptée (pénicilline A + aminoside).
  sentences:
  - Les prélèvements de sang et d'urine sont effectués 10 heures plus tard.
  - En octobre 2003, la patiente était en excellent état général.
  - L’étude anatomopathologique de la biopsie était en faveur d’un adénocarcinome à cellules claires.
