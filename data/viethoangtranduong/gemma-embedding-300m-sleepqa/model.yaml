widgetData:
- source_sentence: what are children and adolescents who do not get the recommended amount of sleep for their age at increased
    risk for?
  sentences:
  - since cpap masks require a tight seal to avoid air leaks, sleeping in a way that presses on the mask is more than uncomfortable
    - it can also compromise your treatment's efficacy. a cpap mask's headgear can also interfere with sleep, particularly
    if they have hard plastic buckles or stiff anchor straps. when choosing a cpap mask, you should consider both the footprint
    of the mask - length and width, as well as depth - and where the headgear rests against your face. the goal is to find
    an effective mask that is still comfortable for you to sleep in.
  - on average, a school-aged child (ages 6-13 years) requires 9-11 hours of sleep a night. children and adolescents who do
    not get the recommended amount of sleep for their age are at increased risk for chronic conditions, such as diabetes,
    obesity, and decreased academic performance, and this risk can be amplified or diminished based on socioeconomic status.
    achieving quality sleep is paramount to all school-age children this year, as the nation collectively moves through these
    challenging times. sleep foundation spoke with two k-12 teachers and a guidance counselor about how they plan on navigating
    this transitional year.
  - sleep and the immune system are closely linked, so receiving adequate sleep generally promotes healing. research suggests
    sleep improves immunity because of its effects on hormones in the body and the inflammation response. sleeping enough
    before you fall ill could be the best way to avoid the common cold. healthy adults should sleep for seven or more hours
    each night. research shows that people who are sleep deprived in the week before being exposed to the cold virus are more
    likely to develop symptoms than people who receive adequate sleep. studies suggest that those who sleep less than five
    hours per night are more than twice as likely to become symptomatic than those who sleep more than seven hours per night.
- source_sentence: what is the american academy of sleep medicine (aasm)?
  sentences:
  - sleep talking that is offensive, sexually explicit, or reveals secrets may cause embarrassment or shame; however, people
    are very rarely aware that they are talking in their sleep at the time and typically have no recollection of the episodes
    when they wake up. episodes of sleep talking tend to be short, and they rarely involve long or drawn-out conversations.
    the total episode may involve only a handful of words or a few sentences. research is mixed about the source of the content
    during episodes of sleep talking. speech may not have any clear connection to a person's life, recent events, or prior
    conversations.
  - people with asthma may wake up wheezing. in turn, poor sleep may exacerbate asthma symptoms. taking daily asthma medication
    as recommended by your doctor may relieve symptoms of nocturnal asthma. acid reflux describes a condition when stomach
    acid flows upward into the esophagus. approximately one in five adults in the u.s. have gastroesophageal reflux disease
    (gerd), in which acid reflux symptoms are chronic or severe. symptoms of gerd often worsen after eating or when lying
    down. people with gerd may experience nighttime awakenings and symptoms such as heartburn, regurgitation, coughing, or
    choking. gerd symptoms can also trigger asthma.
  - the american academy of sleep medicine (aasm) is a medical society that organizes expert panels to help guide treatment
    for sleep problems. aasm's recommendations for sleep medications offer useful information about sleep aids for insomnia,
    but your doctor can best explain how those recommendations apply in your individual circumstances. in some cases, the
    best sleep aid may not be a medicine at all. non-drug treatments such as a type of counseling called cognitive behavioral
    therapy for insomnia (cbt-i) or a focus on sleep hygiene can often make it easier to get to sleep. these approaches may
    be combined with medications as part of a plan to get better sleep over the long-term without relying on sleep aids.
- source_sentence: how many trauma victims develop ptsd?
  sentences:
  - the fight-flight-freeze response can remain activated long after a traumatic experience has ended. while not all people
    who have repetitive nightmares are diagnosed with a mental health disorder, these nightmares are a common experience in
    people diagnosed with post-traumatic stress disorder (ptsd). it's thought that less than 10% of trauma victims develop
    ptsd. ptsd is a disorder that develops following a traumatic event. people diagnosed with this disorder have recurrent
    and involuntary memories of the event, which may come during the day (e.g. flashbacks) or during sleep (nightmares). people
    with ptsd often avoid both external reminders (people, places, activities) and internal memories, thoughts, or feelings
    about the event.
  - scientists do not know what causes rem sleep disorder. animal studies suggest that it has to do with certain neural pathways
    in the brain. in an individual without rbd, certain neural pathways inhibit muscle activity during rem sleep, and disruption
    in these neural pathways lead to rem sleep without atonia. rem sleep behavior disorder often coexists with other neurological
    conditions like parkinson's disease, lewy body dementia, multiple system atrophy, narcolepsy, or stroke. in many cases,
    rem sleep behavior disorder precedes the development of one of these neurodegenerative diseases. one study found that
    38 percent of men aged 50 or older with rem sleep behavior disorder eventually developed parkinson's disease, lewy body
    dementia, or multiple symptom atrophy, usually within 13 years.
  - then, lay on it for a few minutes, and see if it begins deflating. if it loses a noticeable amount of air, it likely has
    a hole or tear somewhere, meaning it's time to move on to step two. air mattress leaks are usually caused by a small hole
    or tear in the vinyl. in some cases, the source of a leak could also be a damaged gasket. either way, the next step is
    to locate the source. rips and tears will usually be quick to locate. for smaller holes, there are a few strategies to
    implement.
- source_sentence: what is the nhs?
  sentences:
  - it wraps over the massage chairs, allowing employees the chance to gaze up at the water until they doze off. the national
    health service (nhs) is the united kingdom's publicly-funded health system. fatigue is common among medical professionals
    and can have a serious effect on their performance, making rest a priority for the nhs. since 2018, some nhs hospitals
    have installed nap pods in the hope of reducing employee fatigue. they have proven a success, particularly during night
    shifts, and nap pods continue to be added to more nhs hospitals.
  - not only does alcohol increase snoring, drinking before bed can even induce obstructive sleep apnea in people who don't
    have the disorder. alcohol's effect on snoring and sleep is dose-related, so if you tend to drink multiple drinks, start
    by cutting back. if that doesn't reduce your snoring, try to stop drinking a few hours before bed or consider cutting
    out alcohol altogether. snoring sometimes results from physical issues that medical professionals can resolve through
    surgery. although surgery should be viewed as a last resort, there are a few surgeries that are known to reduce snoring.
  - enzymes in the liver eventually metabolize the alcohol, but because this is a fairly slow process, excess alcohol will
    continue to circulate throughout the body. the effects of alcohol largely depend on the consumer. important factors include
    the amount of alcohol and how quickly it is consumed, as well as the person's age, sex, body type, and physical shape.
    the relationship between alcohol and sleep has been studied since the 1930s, yet many aspects of this relationship are
    still unknown. research has shown sleepers who drink large amounts of alcohol before going to bed are often prone to delayed
    sleep onset, meaning they need more time to fall asleep.
- source_sentence: what does good sleep hygiene describe?
  sentences:
  - researchers found later start times had the greatest impact on high school students, who reported start times after 8:30am
    led to an average of 43-52 minutes of additional sleep per night. the survey data showed that while weekday bedtimes remained
    largely consistent (with a shift of about 14 minutes later), weekday wake times were as much as 60 minutes later than
    prior to the start time change. on average, high schoolers gained nearly four additional hours of sleep per week, which
    also helped decrease weekend oversleep to make-up for the sleep loss during their week. middle school students also reported
    an increase in sleep duration, though not as dramatic as high schoolers.
  - 'episodes typically last a couple of minutes and resolve on their own. narcolepsy is a sleep disorder characterized by
    excessive daytime sleepiness, sleep paralysis, hallucinations, and, in some cases, cataplexy. there are two major types
    of narcolepsy: type 1 and type 2, differentiated by whether or not a person experiences cataplexy. people diagnosed with
    type 1 narcolepsy experience episodes of cataplexy, while people with type 2 narcolepsy do not. for people with type 1
    narcolepsy, episodes of cataplexy typically begin after the onset of excessive sleepiness. while type 1 and type 2 narcolepsy
    both have the name narcolepsy in it, the cause for type 1 narcolepsy is well understood (loss of a neurotransmitter, orexin),
    whereas the cause for type 2 narcolepsy is not well understood.'
  - good sleep hygiene describes a set of habits that promote healthy sleep. incorporating these habits into your daily routine
    can help improve the quality of sleep you get each night. if stress is keeping you up, relaxation methods can help relieve
    your stress during the day. meditation and yoga can both reduce stress and anxiety. you can also incorporate relaxation
    techniques into your bedtime routine, such as progressive muscle relaxation, deep breathing exercises, or aromatherapy.
    if your anxiety is interfering with your quality of life, it may be beneficial to consult a mental health professional.
