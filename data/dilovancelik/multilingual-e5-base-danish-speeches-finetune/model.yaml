widgetData:
- source_sentence: Glæde
  sentences:
  - Den 4. maj fejrer vi glæden, håbet og friheden.
  - – fordi vi ville – og fordi der var en begyndende efterspørgsel – og den efterspørgsel hænger selvfølgelig sammen med,
    at det er blevet økonomisk muligt for flere og flere at købe en elbil. Ladestanderen bliver brugt dagligt, og jeg gætter
    på, at vi om få år vælger at opsætte nogle flere til glæde for lærere og elever på BG og andre der benytter vores parkeringsplads.
  - Forening viser tydeligt, hvor hildede vi har været i Synet paa det politiske Arbejde. Upartipolitisk! Hvilket Monstrum
    af et Ord, og hvilken Negativisme det indebærer. Ser man paa vore Medlemmers højst uensartedede Herkomst og Livsindstilling,
    turde det iøvrigt være en ganske overflødig Bemærkning, at vort Arbejde ikke kan tages til Indtægt for noget specielt
    politisk Parti.
- source_sentence: Kontekst utilstrækkelig
  sentences:
  - Til støtte for De Forenede Nationers aktion i Korea vil regeringen fortsat yde sit bidrag ved at stille hospitalsskibet
    ”Jutlandia" til rådighed for De Forenede Nationers enhedskommando, og regeringen vil forberede Danmarks deltagelse i det
    internationale hjælpe- og genopbygningsarbejde i Korea efter fjendtlighedernes afslutning.
  - Og dertil kommer de mange tusinde, som får suppleret deres indkomst med offentlige tilskud eller kontantydelser. Det er
    alt for mange. Det kan vi ikke være bekendt. Det kan vi ikke leve med.
  - og det er at
- source_sentence: Forvirring
  sentences:
  - Som De tidligere har hørt, blev der i 1913 i afdøde Lærer Ludvig Triers Bo oprettet et Legat, kaldet „Ludvig Triers Legat
    til Fremme af Kvinders økonomiske Selvstændighed”. Og D. K. anmodedes om at styre dette Legat og uddele Renten af Kapitalen,
    naar denne engang blev ledig. Fore­løbig skulde nogle Slægtninge af Lud­vig Trier nyde Renten, saa længe de levede. Nu
    er imidlertid en Kapital paa omkring 14,000 Kr. i Februar i Aar bleven ledig ved en Legatnyders Død; den vil i Juni Termin
    blive ud­betalt til D. K., og vi vil altsaa til næste Aar faa en endnu større Sum at uddele til hint udmærkede Formaal.
  - Uddannelse
  - I don't know what to say.
- source_sentence: Medicin
  sentences:
  - Jeg hedder Amal, og jeg er 19 år gammel, jeg er lige pt i gang med et sabbatår hvor jeg efterfølgende gerne vil starte
    på drømmestudiet, som er medicin[.]
  - 'Vi skal være Dig gode og [faste] Sønner og Døtre, Danmark, [det] lover vi Dig i Dag, og det [giver] vi Dig Haandslag
    paa, [Kong] Christian. Ja, om kongen [samler] vi os i denne Stund, den [største] vor Slægt har oplevet. Naar [svundne]
    Dage Folket havde valgt [en Konge], stævnede de til Tinge [for at] hylde ham under aaben [Himmel]. Den 10. Februar, da
    vi [Sønderjyder] stemte os hjem, kaarede vi [Kong] Christian af Danmark til Konge. [Denne] Dag løfter vi alle om een vor
    Konge paa Skjold; som frie [Mænd] og Kvinder hylder vi Danmarks konge og Dronning, nu ogsaa [vor] Konge og Dronning, idet
    vi [samles] i et tusindstemmigt [Hyldestråb]: Kong Christian og [Dronning] Alexandrine leve!'
  - Findes der noget menneske, ærede dommere, eller vil der nogen sinde blive født noget menneske, der i stedet for 2.600
    dr. ville foretrække at betale 3.360 dr. og en rente på 560 dr., i alt 3.920 dr., det beløb, som Formion påstår at have
    lånt og afleveret til Lampis? Betalte han virkelig i Bosporos – og det 13 miner for meget - når han havde mulighed for
    at betale beløbet tilbage i Athen som et returlån?
- source_sentence: Bygge- og anlægsvirksomhed
  sentences:
  - For hvis disse årsager alene var nok,
  - Venligst
  - 'Den betydelige forringelse i balancen udadtil hænger sammen med tre forhold: den stærke stigning i befolkningens forbrug,
    den stærke stigning i den samlede bygge- og anlægsvirksomhed og stigningen i den øvrige investering.'
