widgetData:
- source_sentence: What are the miracles of the Prophet Moses, peace be upon him?
  sentences:
  - ومن قوم موسى أمة يهدون بالحق وبه يعدلون. وقطعناهم اثنتي عشرة أسباطا أمما وأوحينا إلى موسى إذ استسقاه قومه أن اضرب بعصاك
    الحجر فانبجست منه اثنتا عشرة عينا قد علم كل أناس مشربهم وظللنا عليهم الغمام وأنزلنا عليهم المن والسلوى كلوا من طيبات ما
    رزقناكم وما ظلمونا ولكن كانوا أنفسهم يظلمون. وإذ قيل لهم اسكنوا هذه القرية وكلوا منها حيث شئتم وقولوا حطة وادخلوا الباب
    سجدا نغفر لكم خطيئاتكم سنزيد المحسنين. فبدل الذين ظلموا منهم قولا غير الذي قيل لهم فأرسلنا عليهم رجزا من السماء بما كانوا
    يظلمون.
  - And We did certainly send Moses with Our signs and a clear authority To Pharaoh, Haman and Qarun; but they said, "[He
    is] a magician and a liar And when he brought them the truth from Us, they said, "Kill the sons of those who have believed
    with him and keep their women alive." But the plan of the disbelievers is not except in error And Pharaoh said, "Let me
    kill Moses and let him call upon his Lord. Indeed, I fear that he will change your religion or that he will cause corruption
    in the land But Moses said, "Indeed, I have sought refuge in my Lord and your Lord from every arrogant one who does not
    believe in the Day of Account
  - And We did certainly send Moses with Our signs and a clear authority To Pharaoh and his establishment, but they followed
    the command of Pharaoh, and the command of Pharaoh was not [at all] discerning He will precede his people on the Day of
    Resurrection and lead them into the Fire; and wretched is the place to which they are led And they were followed in this
    [world] with a curse and on the Day of Resurrection. And wretched is the gift which is given
- source_sentence: ما المخلوقات التي تسبح الله؟
  sentences:
  - Ha, Meem Ayn, Seen, Qaf Thus has He revealed to you, [O Muhammad], and to those before you - Allah, the Exalted in Might,
    the Wise To Him belongs whatever is in the heavens and whatever is in the earth, and He is the Most High, the Most Great
    The heavens almost break from above them, and the angels exalt [Allah] with praise of their Lord and ask forgiveness for
    those on earth. Unquestionably, it is Allah who is the Forgiving, the Merciful And those who take as allies other than
    Him - Allah is [yet] Guardian over them; and you, [O Muhammad], are not over them a manager
  - And certainly did Our messengers come to Abraham with good tidings; they said, "Peace." He said, "Peace," and did not
    delay in bringing [them] a roasted calf But when he saw their hands not reaching for it, he distrusted them and felt from
    them apprehension. They said, "Fear not. We have been sent to the people of Lot And his Wife was standing, and she smiled.
    Then We gave her good tidings of Isaac and after Isaac, Jacob She said, "Woe to me! Shall I give birth while I am an old
    woman and this, my husband, is an old man? Indeed, this is an amazing thing They said, "Are you amazed at the decree of
    Allah? May the mercy of Allah and His blessings be upon you, people of the house. Indeed, He is Praiseworthy and Honorable
    And when the fright had left Abraham and the good tidings had reached him, he began to argue with Us concerning the people
    of Lot Indeed, Abraham was forbearing, grieving and [frequently] returning [to Allah] [The angels said], "O Abraham, give
    up this [plea]. Indeed, the command of your Lord has come, and indeed, there will reach them a punishment that cannot
    be repelled
  - وعادا وثمود وقد تبين لكم من مساكنهم وزين لهم الشيطان أعمالهم فصدهم عن السبيل وكانوا مستبصرين. وقارون وفرعون وهامان ولقد
    جاءهم موسى بالبينات فاستكبروا في الأرض وما كانوا سابقين. فكلا أخذنا بذنبه فمنهم من أرسلنا عليه حاصبا ومنهم من أخذته الصيحة
    ومنهم من خسفنا به الأرض ومنهم من أغرقنا وما كان الله ليظلمهم ولكن كانوا أنفسهم يظلمون.
- source_sentence: What is the language of the Quran?
  sentences:
  - Ha, Meem [This is] a revelation from the Entirely Merciful, the Especially Merciful A Book whose verses have been detailed,
    an Arabic Qur'an for a people who know As a giver of good tidings and a warner; but most of them turn away, so they do
    not hear And they say, "Our hearts are within coverings from that to which you invite us, and in our ears is deafness,
    and between us and you is a partition, so work; indeed, we are working Say, O [Muhammad], "I am only a man like you to
    whom it has been revealed that your god is but one God; so take a straight course to Him and seek His forgiveness." And
    woe to those who associate others with Allah Those who do not give zakah, and in the Hereafter they are disbelievers Indeed,
    those who believe and do righteous deeds - for them is a reward uninterrupted
  - Indeed, the Day of Judgement is the appointed time for them all The Day when no relation will avail a relation at all,
    nor will they be helped Except those [believers] on whom Allah has mercy. Indeed, He is the Exalted in Might, the Merciful
    Indeed, the tree of zaqqum Is food for the sinful Like murky oil, it boils within bellies Like the boiling of scalding
    water [It will be commanded], "Seize him and drag him into the midst of the Hellfire Then pour over his head from the
    torment of scalding water [It will be said], "Taste! Indeed, you are the honored, the noble Indeed, this is what you used
    to dispute
  - Indeed, We sent the Qur'an down during the Night of Decree And what can make you know what is the Night of Decree The
    Night of Decree is better than a thousand months The angels and the Spirit descend therein by permission of their Lord
    for every matter Peace it is until the emergence of dawn
- source_sentence: ما المخلوقات التي تسبح الله؟
  sentences:
  - Indeed, those who do not expect the meeting with Us and are satisfied with the life of this world and feel secure therein
    and those who are heedless of Our signs For those their refuge will be the Fire because of what they used to earn Indeed,
    those who have believed and done righteous deeds - their Lord will guide them because of their faith. Beneath them rivers
    will flow in the Gardens of Pleasure Their call therein will be, "Exalted are You, O Allah," and their greeting therein
    will be, "Peace." And the last of their call will be, "Praise to Allah, Lord of the worlds
  - And in Moses [was a sign], when We sent him to Pharaoh with clear authority But he turned away with his supporters and
    said," A magician or a madman So We took him and his soldiers and cast them into the sea, and he was blameworthy And in
    'Aad [was a sign], when We sent against them the barren wind It left nothing of what it came upon but that it made it
    like disintegrated ruins And in Thamud, when it was said to them, "Enjoy yourselves for a time But they were insolent
    toward the command of their Lord, so the thunderbolt seized them while they were looking on And they were unable to arise,
    nor could they defend themselves And [We destroyed] the people of Noah before; indeed, they were a people defiantly disobedient
  - وأصحاب اليمين ما أصحاب اليمين. في سدر مخضود. وطلح منضود. وظل ممدود. وماء مسكوب. وفاكهة كثيرة. لا مقطوعة ولا ممنوعة. وفرش
    مرفوعة. إنا أنشأناهن إنشاء. فجعلناهن أبكارا. عربا أترابا. لأصحاب اليمين. ثلة من الأولين. وثلة من الآخرين.
- source_sentence: Mikä on tahattoman tapon rangaistus?
  sentences:
  - وآتوا اليتامى أموالهم ولا تتبدلوا الخبيث بالطيب ولا تأكلوا أموالهم إلى أموالكم إنه كان حوبا كبيرا. وإن خفتم ألا تقسطوا
    في اليتامى فانكحوا ما طاب لكم من النساء مثنى وثلاث ورباع فإن خفتم ألا تعدلوا فواحدة أو ما ملكت أيمانكم ذلك أدنى ألا تعولوا.
    وآتوا النساء صدقاتهن نحلة فإن طبن لكم عن شيء منه نفسا فكلوه هنيئا مريئا. ولا تؤتوا السفهاء أموالكم التي جعل الله لكم قياما
    وارزقوهم فيها واكسوهم وقولوا لهم قولا معروفا. وابتلوا اليتامى حتى إذا بلغوا النكاح فإن آنستم منهم رشدا فادفعوا إليهم أموالهم
    ولا تأكلوها إسرافا وبدارا أن يكبروا ومن كان غنيا فليستعفف ومن كان فقيرا فليأكل بالمعروف فإذا دفعتم إليهم أموالهم فأشهدوا
    عليهم وكفى بالله حسيبا.
  - By the star when it descends Your companion [Muhammad] has not strayed, nor has he erred Nor does he speak from [his own]
    inclination It is not but a revelation revealed Taught to him by one intense in strength One of soundness. And he rose
    to [his] true form While he was in the higher [part of the] horizon Then he approached and descended And was at a distance
    of two bow lengths or nearer And he revealed to His Servant what he revealed The heart did not lie [about] what it saw
    So will you dispute with him over what he saw And he certainly saw him in another descent At the Lote Tree of the Utmost
    Boundary Near it is the Garden of Refuge When there covered the Lote Tree that which covered [it] The sight [of the Prophet]
    did not swerve, nor did it transgress [its limit] He certainly saw of the greatest signs of his Lord
  - And never is it for a believer to kill a believer except by mistake. And whoever kills a believer by mistake - then the
    freeing of a believing slave and a compensation payment presented to the deceased's family [is required] unless they give
    [up their right as] charity. But if the deceased was from a people at war with you and he was a believer - then [only]
    the freeing of a believing slave; and if he was from a people with whom you have a treaty - then a compensation payment
    presented to his family and the freeing of a believing slave. And whoever does not find [one or cannot afford to buy one]
    - then [instead], a fast for two months consecutively, [seeking] acceptance of repentance from Allah. And Allah is ever
    Knowing and Wise But whoever kills a believer intentionally - his recompense is Hell, wherein he will abide eternally,
    and Allah has become angry with him and has cursed him and has prepared for him a great punishment
