  sentences:
  - “모든 개통이 중단된 상태입니다. 현재도 방송통신위원회가 들이닥친다고 해 매장에서 도망나와 문자 드리는 겁니다. 신청하신 분들께 정말 고개 숙여 사죄드립니다.”지난 2일 서울 왕십리의 한 휴대폰 판매점에서 아이폰6
    16GB 제품을 산 김선정 씨(가명)는 3일 오전 황당한 휴대폰 문자를 받았다. 전날 구입한 아이폰6 개통이 취소됐다는 판매점의 문자였다. 출고가 78만9800원의 고가 제품을 18만원에 구입했다는 사실에 기뻤던
    것은 하루뿐이었다. 추위에 떨며 판매점 앞에서 밤을 새워 줄을 섰던 것이 분통이 터졌다.2일 새벽 벌어진 ‘아이폰6 대란’에 방통위가 강력 제재 의사를 밝히자 보조금 상한(최대 34만5000원)보다 더 싸게 아이폰6를
    팔았던 판매점들이 급히 개통 취소·기기 회수에 나섰다. 전날 싼값에 아이폰 신제품을 구했다며 웃었던 소비자들은 분통을 터뜨렸다. 아이폰6 시판 이후 일요일엔 ‘판매 대란’, 월요일엔 ‘회수 대란’이 잇따라 벌어진
    것이다. 모두 단말기유통구조개선법(단통법) 탓이다.○새벽까지 줄 서 산 아이폰6 ‘반납’소비자가 합법적으로 살 수 있는 아이폰6 16GB 모델의 최저가는 50만2300원이다. 출고가에 현재 통신사들이 책정한 최대
    보조금(대리점 재량 보조금 포함) 28만7500원을 뺀 값이다. 지난 1일 저녁과 2일 새벽, 이 제품을 10만~20만원대에 살 수 있다는 정보가 여러 인터넷 커뮤니티에 올라왔다. 불법 보조금을 추가한 것이다.
    소비자들은 싼값에 판다는 ‘좌표(판매점 장소)’를 공유하고 밤 늦게 집을 나섰다.이른 새벽에 판매점 앞에 긴 줄이 생기는 등 소동이 벌어졌다. 방통위는 2일 오후 3시 SK텔레콤 KT LG유플러스 등 통신 3사
    임원을 긴급 호출해 강력 경고했다. 현장에는 시장조사관을 급파해 보조금 지급 방식·규모 등을 파악하기로 했다. 상황이 심상찮게 돌아가자 해당 판매점들은 이미 아이폰6 16GB 모델을 구입한 소비자들에게 취소 요청
    문자를 보냈다. 예약 신청만 해 아직 휴대폰을 받지 못한 사람에게는 ‘개통 취소’, 현장에서 휴대폰을 직접 구입해 가져간 사람에게는 ‘기기 회수’를 요구하고 있다. 김씨도 이 문자를 받은 소비자 중 한 명이다.○“불법보조금,
    이번뿐 아냐”소비자는 억울하게 됐다. 불법을 저지른 주체는 판매점 측이지 소비자가 아니다. 자영업자 법률상담 전문가인 이강진 변호사는 “소송을 걸면 소비자가 유리하지만 판매점 측에 충분한 자금이 없어 소비자가 이겨도
    보상받을 수 없다는 게 문제”라고 말했다.한 판매점주는 단통법 이후 불법 보조금 사태가 이번이 처음이 아니라고 했다. 그는 “단통법 시행 이후 똑같은 사건이 있었지만 당시에는 믿을 만한 사람들끼리만 알고 정보를
    공유했다”며 “아이폰6 판매 경쟁이 치열해 표면화됐을 뿐”이라고 말했다. 통신 3사의 경쟁 과열과 함께 애플의 ‘끼워팔기’ 정책도 이번 대란을 부추겼다는 지적이다. 비인기 모델을 일정량 이상 팔지 않으면 다른 모델을
    공급하지 않는 계약이다. 국내 통신사와 맺은 이 계약 때문에 인기 모델인 64GB 물량을 받기 위해 16GB 기기를 무리하게 팔려다 이번 대란이 빚어졌다는 것이다. 방통위 통신시장조사과에서는 향후 1~2주간 물의를
    일으킨 판매점을 조사하고 이후 한 달여간 전수조사에 착수할 계획이다.휴대폰 판매 경쟁은 대리점과 판매점의 생존 본능에서 비롯되는 것이다. 단통법은 이 본질적인 경쟁의 생리를 억눌러 ‘불법’이란 낙인을 찍었다. 시장이
    정상적으로 돌아갈 리가 없다. 제값 다 주고 물건을 산 소비자가 하루 만에 ‘호갱(호구 고객)’이 되는가 하면 싼값에 산 소비자가 구매 취소를 당하기도 한다. 시장의 가격경쟁을 정면으로 무시한 단통법 탓에 애먼
    소비자만 피해를 입게 됐다. 김보영/김순신 기자 wing@hankyung.com 어제 아이폰 대란으로 왕십리가 이슈화되어 네이버 메인페이지에 몇시간동안 사진이 올라와 있고 뉴스도 나왔다고 합니다 .개통처에서는 상태를
    심각하게 생각하여 모든 개통이 중단된 상태입니다. 현재도 방통위가 들이닥친다고 하여 매장에서 도망나와 어제 문자 저장되어 있는 분들께만 우선 문자 드리는것입니다.
  - “이길 수 없어 아예 사들이기로 했습니다.”에릭 레프코프스키 그루폰 대표(CEO·사진)가 밝힌 한국 소셜커머스 업체 티켓몬스터(티몬) 인수 이유다. 레프코프스키 대표는 12일 코엑스 컨퍼런스룸에서 기자회견을 열고
    “그루폰이 세계1위이지만 그루폰코리아로는 기존 한국 업체들을 넘어설 수 없었다”고 설명했다. 그는 이번 딜에 ‘적을 이길 수 없다면 동지가 돼라’는 미국 속담을 활용했다고 전했다. 그루폰은 지난 8일 2억6000만달러에
    티몬을 인수한다고 발표했다.그루폰의 공동창업자인 레프코프스키 대표는 “인수가 최종 확정되면 투자를 확대해 티몬이 한국 1위의 전자상거래 기업이 될 수 있도록 적극 지원하겠다”며 “티몬은 그루폰의 해외 사업장 중
    가장 비중있는 곳이 될 것”이라고 말했다. 현재 그루폰은 미국 본사를 비롯 전 세계 48개국에서 소셜커머스 업체를 운영하고 있다.그루폰은 티몬 인수를 시작으로 아시아 시장을 적극 공략할 방침이다. 레프코프스키 대표는
    “한국은 전자상거래 시장 규모가 세계에서 네 번째로 큰 시장”이라며 “한국을 아시아 시장 공략의 전초 기지로 삼겠다”고 말했다. 현재 그루폰은 티몬과 함께 다른 아시아 국가의 소셜커머스 업체를 인수하기 위해 대상을
    물색하고 있다.레프코프스키 대표는 소셜커머스 업계의 미래 먹거리로 ‘모바일’을 꼽았다. 누구나 스마트폰을 사용하게 되면서 언제 어디서나 구매할 수 있는 모바일 플랫폼이 중요해졌다는 것. 그는 “지난 3분기에만 900만명의
    고객들이 그루폰 모바일 애플리케이션을 내려받았다”며 “현재 그루폰 전체 매출의 54%가량이 모바일에서 나오고 있다”고 설명했다. 이어 “티몬도 50% 이상의 매출이 모바일 시장에서 발생하고 있다”며 “함께 시너지를
    내기 좋은 구조”라고 덧붙였다.미국 회사들의 3분기 실적 발표 이후 제기된 ‘소셜커머스 위기론’에 대해서는 동의할 수 없다고 밝혔다. 올 3분기에는 전 세계 1위 업체인 그루폰이 순손실을 기록하고 2위 업체인 미국
    리빙소셜이 영업손실을 기록하면서 위기론이 나왔었다.레프코프스키 대표는 “그루폰의 재무상황은 건전하다”며 “현재 그루폰은 부채없이 11억달러의 현금을 보유하고 있고, 에비타지수(EBITDA·상각 전 영업이익 대비
    기업가치)는 3억달러에 달한다”고 말했다. 또 그는 “소비자들의 만족도가 매우 높기 때문에 지속적으로 성장할 것으로 전망한다”고 덧붙였다. 미국 시장조사업체 ‘포어시(foresee)’에 따르면 그루폰의 소비자 만족도는
    85%로 아마존, 페이스북, 구글보다 높았고, 판매자의 75%도 그루폰에 만족하는 것으로 나타났다. 그는 다만 “둔화되고 있는 성장률은 걱정”이라고 말했다. 사업 초기 매년 100% 가까이 성장하던 그루폰의 매출
    성장률은 최근 10% 수준으로 급감했다.
  - 소프라노 홍혜경(56)은 한국이 낳은 세계적인 ‘디바’다. 그는 전속 가수 없이 1년마다 모든 가수가 재계약을 해야 하는 미국 뉴욕 메트로폴리탄 오페라극장(메트)에서 31년째 활동 중이다. 메트는 성악가들에게 ‘꿈의
    무대’로 불리는 세계 최정상급 오페라극장이다.홍혜경이 10년 만에 국내 오페라 무대에 선다. 다음달 8~10일 서울 서초동 예술의전당 오페라극장 무대에 오르는 모차르트의 오페라 ‘피가로의 결혼’에서 백작부인 로지나
    역을 맡는다. 그가 국내 전막 오페라 무대에 출연하는 것은 2005년 푸치니의 오페라 ‘라보엠’에 이어 두 번째다.공연에 앞서 21일 서울 세종로에서 만난 그는 “‘피가로의 결혼’ 무대에 오른다는 것은 굉장히 맛있는
    음식을 씹어보는 느낌”이라며 “제가 느낀 감동을 국내 관객에게 전달하고 싶다”고 말했다.홍혜경은 이번 무대를 제작하는 무악오페라단으로부터 출연 요청을 받자마자 주저 없이 이 작품을 골랐다. 그는 “모차르트 오페라
    중에서 ‘피가로의 결혼’과 ‘돈 지오반니’는 특별히 사랑하는 작품”이라고 설명했다. 그는 “‘라보엠’ 같은 비극보다 희극이 더 어렵기 마련이지만 모차르트 오페라는 신기하게도 대본의 내용만 완전히 소화하면 쉽게 연기할
    수 있다”고 말했다. 모차르트와 대본 작가 로렌초 다 폰테가 환상적 궁합을 이뤘다는 설명이다. 그는 “더 보탤 것도, 뺄 것도 없이 완전히 그 인물이 되면 된다”며 “기가 막히게 완벽한 작품”이라고 덧붙였다.2012~2013
    시즌에도 메트에서 같은 작품을 공연했다. 이번과 마찬가지로 로지나 역을 맡았다. 전편에 해당하는 로시니의 ‘세비야의 이발사’에서 로지나는 알마비바 백작과 결혼해 신분이 상승했지만 이 작품에서는 바람둥이 남편에게
    실망해 애정이 식은 상태다. 홍혜경은 “젊을 때 사랑에 빠져 신분을 뛰어넘는 결혼을 하고,남편에게 배반당하기도 하는 등 감정선이 굉장히 복잡한 것이 매력”이라며 “여러 가지 모습으로 연기할 수 있는, 재미있고 현실적
    인물”이라고 말했다. 이번 공연에서는 젊고 열정적인 느낌을 강조할 계획이다. “사랑하는 이의 아이를 둘 낳은 활력으로 가득 찬 로지나를 연기할 거예요. 살면서 경험한 모든 감정을 끌어낼 겁니다.”홍혜경은 자신에게
    맞는 역을 엄격하게 고르는 성악가다. 레퍼토리를 잘못 고르면 목이 망가진다는 것이 그의 지론이다. ‘나비부인’의 초초상 역을 한 번도 맡지 않았던 이유다. 초초상은 고음역대의 고난도 아리아를 자주 불러야 하는 배역이다.
    그는 내년 보스턴심포니오케스트라와 함께 이 작품을 공연할 예정이다. 초초상을 해보지 않고 성악가 생활을 마무리하면 후회할 것 같아서다. 그는 “초초상 역에 어울리지 않는다는 것을 알고 있다”며 “내년에 시도해보고,
    정말 맞지 않는지 확인해볼 것”이라고 말했다.그는 언젠가 국립오페라단을 맡고 싶다는 소망도 내비쳤다. 홍혜경은 지난해 단장직을 제안받았으나 고사했다. “오페라단을 제대로 하려면 한국에 살아야 하는데 당장은 여기서
    살 수가 없거든요. 앞으로 해야 한다는 것은 확실하지만 시기적으로 지금은 아니에요.”
- source_sentence: 보닌이 살인 혐의로 체포되어 받은 형벌은?
  sentences:
  - "9일간의 감시 끝에, 1980년 6월 11일, 경찰은 보닌이 다섯 명의 십대 소년들을 자신의 밴으로 유인하는 데 성공하지 못한 채 겉보기에는 무작위로 운전하는 것을 목격했다. 경찰은 보닌의 승합차가 할리우드 고속도로\
    \ 근처 황량한 주차장에 주차할 때까지 따라간 뒤 조심스레 차량에 접근했다. 차 안에서 들려오는 소음과 쿵 하는 소리를 들은 사복 경찰관들은 수갑을 채우고 묶은 17세의 오렌지 카운티 가출자 해롤드 유진 테이트를\
    \ 강간하는 행위로 보닌을 발견했다. \n\n처음에는 미성년자 성폭행 혐의로 기소되어 미란다 살인 혐의로 붙잡혔던 보닌은 25만 달러의 채권 대신 구금되었다. 다음날 먼로는 보닌의 차를 훔쳐 고향인 미시간주로 달아났다.\n\
    \n보닌의 밴 안에서, 수사관들은 프리웨이 킬러 살인사건에서 그의 과실을 증명하는 많은 유물들을 발견했다. 이 품목에는 나일론 코드 길이, 칼 종류, 타이어 다리미, 플라이어, 코트 행거 등 가정용 기구 등 다양한\
    \ 고정 장치가 포함됐다. 더욱이 보닌의 승합차 내부와 자택 일부에는 피범벅이 광범위하게 깔려 있었고, 차량 조수석 쪽과 뒷좌석의 내부 손잡이는 피해자들이 차량을 빠져나가지 못하도록 명백한 노력으로 제거된 상태였다.\
    \ 글러브 박스 안에서 수사관들은 또한 살인과 관련된 신문 스크랩북을 발견했다."
  - 이달에만 새 아파트 5만6000여 가구가 선보이는 등 신규 분양이 쏟아지고 있다. 하지만 수도권 인기 택지지구는 청약자가 몰리면서 당첨되기가 쉽지 않다. 전세난에 시달리는 무주택 실수요자들은 속앓이를 할 수밖에
    없다.수도권 거주자들이 아파트 당첨 확률을 높일 수 있는 방법은 뭘까. 부동산전문가들은 ‘특별공급’과 ‘지역 우선배정’을 적극 노리라고 조언한다.주택공급에 관한 규칙 제19조는 특별공급을 다루고 있다. 특별공급은
    지방자치단체 등 기관추천과 국토교통부에서 운영하는 생애최초·다자녀·신혼부부·노부모 부양 등 5가지로 규정돼 있다. 기관추천 특별공급 대상자는 국가보훈대상자, 장기복무 제대군인이나 10년 이상 복무한 군인, 장애인과
    중소기업 장기근속자 등이 해당한다. 기관추천 물량은 전체의 10%지만 시·도지사 승인이 있을 땐 10%를 초과할 수 있다. 생애최초 물량은 총 가구의 20% 범위 내에서 입주자 모집공고 승인권자(지방자치단체장)와
    협의할 수 있다. 신혼부부와 다자녀는 각각 10% 범위 안이고 노부부 부양 물량은 일반적으로 3% 이내다. 국토부 주택정책과 관계자는 “특별공급은 경쟁률이 상대적으로 낮다”며 “요건에 해당하면 특별공급을 적극 활용하는
    게 좋다”고 말했다.아파트는 원칙적으로 해당 지역 거주자에게 먼저 공급하고 다른 청약 가능지역 주민은 후순위로 밀린다. 예컨대 경기 수원시 재건축 일반분양 아파트의 경우 수원 거주자에게 먼저 100%를 공급한 뒤
    남는 물량이 있으면 서울, 인천, 경기지역 거주자에게 분양한다.하남 미사, 화성 동탄, 김포 한강 등 부지 면적이 66만㎡를 넘는 신도시급 택지지구에선 특례가 적용된다. 주택공급에 관한 규칙 제30조에서 규정한
    지역 우선배정에 따른 것이다. 특별시인 서울과 광역시인 인천 택지지구에선 해당 지자체 1순위자에게 분양 물량 50%를 우선 배정하고, 나머지 50%는 수도권 전체 1순위자에게 공급한다. 이때 수도권 전체 1순위자
    범위 안에는 해당 지자체 1순위자로 지역 우선에서 낙첨된 청약자도 포함된다.
  - '요리요시가 군세 회복을 위해 힘쓰는 동안 아베씨는 고로모가와 남쪽까지 세력을 넓혔다. 현지에서는 조정에서 발행한 적찰(赤札)은 힘을 잃고 대신 아베씨측의 쓰네키요가 발행한 백찰(白札)이 현지에서의 세금 징수의
    한 수단이 되었다. 오니키리베와 기노미에서의 싸움에서 입은 손실을 메꾸기는 쉽지 않았다. 너무 많은 고쿠가 쓰와모노들을 잃어 좀처럼 회복이 어려웠던 요리요시는 거듭 교토에 있을 때에 구축했던 무사단을 재편성하고
    간토ㆍ도카이ㆍ기나이의 무사들까지 끌어들여 병력 증강에 힘썼다. 한편 고헤이(康平) 5년(1062년) 봄, 임기가 끝난 요리요시의 후임으로서 무쓰노카미가 된 다카시나노 쓰네시게(高階經重)가 무쓰에 도착했지만, 군지들은
    쓰네시게를 따르지 않았고, 어쩔수 없이 쓰네시게는 다시 교토로 돌아가버렸다. 이에 무쓰노카미는 예전대로 요리요시가 맡게 되었다.


    고전을 면치 못하던 요리요시는 당시 중립을 지키고 있던 데와 센보쿠(仙北, 지금의 일본 아키타현)의 부수장(俘囚長)으로 데와 기요하라씨의 족장 미쓰요리(光賴)에게 ''어마어마한 선물''을 계속 보내면서 한편으로는
    조정의 명령을 빌미로 내세우며 자신에게 힘을 보태줄 것을 거듭 요청했고, 마침내 미쓰요리는 그의 제안을 받아들여 여름 7월에 동생 다케노리(武則)를 총대장으로 하는 군세를 요리요시측에 파견했다. 이렇게 편성된 1만의
    연합군(1만의 군사 가운데 요리요시측 3천을 제외하고는 모두 기요하라씨의 군사들이었다.)이 다시 아베씨에 대한 공격을 개시했다. 기요하라씨의 참전으로 전세는 단번에 역전되어, 고마쓰(小松) 요새에서의 첫 승리를
    시작으로 요리요시군은 승리를 거듭해 마침내 9월 17일에 아베씨의 거점이던 구리야가와·우바토(嫗戸, 지금의 모리오카 시 아베노타테쵸安倍館町) 요새를 함락시켰다. 사다토는 방패에 들려 요리요시 앞에 끌려왔다가 그와
    눈이 마주치는 순간 숨을 거두었고, 그의 목은 통나무 위에 놓여져 이마에 대못이 박혔다. 쓰네키요는 고통을 더욱 깊게 느끼도록 무딘 칼로 썰듯이 참수되었다. 아베씨의 몰락으로 전투는 끝났다.'
- source_sentence: 공략법 소개를 통한 경품 응모는 며칠까지 가능한가?
  sentences:
  - ㈜넥슨(대표 이정헌)은 17일 자사가 서비스하는 온라인 RPG ‘아스가르드’에 ‘R:EVOLUTION’ 업데이트를 실시했다. 이번 업데이트로 ‘퀵던전’에 등장하지 않았던 신규 맵과 몬스터를 추가하고, 몬스터에 타입을
    부여해 다양한 공략으로 사냥의 재미를 더했다. 또 일정 확률로 맵 또는 난이도를 선택할 수 있으며, ‘퀵던전 나가기 동의/예약’ 기능 등 편의성을 개선했다. ‘델크레비스’ 지역에 신규 보스레이드도 추가했다. 레이드를
    완수하면 ‘보스 스톤’을 보상으로 지급하고, 획득한 ‘보스 스톤’을 모아 다양한 아이템으로 교환할 수 있다. 또 ‘스킬창’에 ‘버튼 조합’ 기능을 추가해 3개 스킬을 연속으로 사용할 수 있도록 변경했다. ‘버튼
    조합’은 최대 7개 세트까지 생성할 수 있으며, 버튼 사용 시 등록된 스킬들이 순차적으로 발동된다. 이 밖에도 신규 화폐 단위 ‘젬’ 추가, 직업 밸런스 조정, ‘미션북’, ‘퓨플시스템’ 등 유저 가이드 개선 등
    다방면으로 개선을 진행했다. 넥슨은 업데이트를 기념해 2021년 1월 13일까지 ‘퀵던전’을 10회 이상 완수하면 누적 횟수에 따라 추첨을 통해 ‘넥슨캐시(1만 원, 100명)’, ‘아스가르드 마우스 장패드(70명)’,
    ‘넥슨캐시(3만 원, 30명)’ 등 다양한 아이템을 지급한다. 같은 기간 ‘공략게시판’에 자신만의 퀵던전 공략법과 플레이 팁을 소개하면 추첨을 통해 ‘넥슨캐시(1만 원, 10명/ 5만 원, 5명/ 10만 원, 1명)’,
    ‘아스가르드 마우스 장패드(30명)’를 지급한다.
  - 경남 김해시 삼방동 신어산 자락에 있는 가야CC. 일대 수십개의 골프장이 과열 경쟁으로 경영난을 겪고 있는 가운데 가야CC만 ‘나홀로 성장’을 하고 있어 화제다. 2011년 매출 200억여원, 영업이익 40억원이던
    가야CC는 지난해엔 매출 360억원, 영업이익 90억원을 기록했다. 올해 영업이익 목표는 100억원 이상이다.내장객은 지난해 36만여명을 기록해 전년보다 6만여명, 3년 전에비해서는 8만여명이 늘었다. 한 해 5억원
    이상 적자를 내던 식음료 분야도 가격을 20%가량 낮췄음에도 2년 전부터 연 5억원 이상 흑자로 돌아섰다. 회원권 가격도 인근 지역 골프장과 달리 올 들어서만 지난해보다 300만원 정도 뛰었다.부산과 경남에 최근
    5곳의 신규 골프장이 생기면서 골프장들이 어려움을 겪고 있는 데 비해 가야CC는 내장객, 매출, 영업이익 모두 늘고 있다. 비결이 무엇일까.우선 부산·경남지역에서 경영 성적이 좋은 7개 회사가 2011년 가야CC를
    1519억원에 7분의 1씩 동일하게 출자하면서 탄탄하게 운영하고 있기 때문이다. 가야CC는 1988년 경남지역 출신 재일 동포 40명이 설립, 운영했지만 잔디가 엉망이 되는 등 관리가 힘들다는 이유로 매물로 내놨다.
    이를 신한은행 계열의 신한제8호구조조정조합(신한CRC)이 2006년 12월 인수했다가 2011년 12월 지역 기업인들로 구성된 신어홀딩스가 사들였다.가야CC 회장을 맡고 있는 신정택 세운철강 회장(전 부산상공회의소
    회장)을 비롯 강병중 넥센 회장, 허용도 태웅 회장, 김희근 삼한종합건설 회장, 이명근 성우하이텍 회장, 구자신 쿠쿠 회장, 이원길 서원유통 회장이 주주로 참여하고 있다. 신 회장은 “골프장이 국내 최고 수준이
    될 때까지 이익금 배당을 유보하고 골프장 개선에 투자하고 있다”고 말했다.골프장 전문관리 업무를 맡아온, ‘잔디박사’로 통하는 김영섭 사장을 영입해 골프장을 운영하고 있는 것도 강점이다. 삼성그룹 계열의 동래베네스트CC
    등에서 33년 동안 골프장 관리 업무를 해온 김 사장은 “3년 전 올 때만 해도 잔디가 엉망이고 거의 죽어 있어 골퍼들에게 핀잔을 듣기 일쑤였다”며 “해마다 10억원 이상 투입해 잔디병을 잡고 죽었던 잔디를 살려냈다”고
    했다. 5시간 걸리던 라운딩 시간도 3개팀을 줄여 30분 이상 단축했다. 김 사장은 “투자자들이 최고의 골프장으로 만들어달라며 골프장 개선에 흔쾌히 돈을 쓰라고 해 빠른 시간 안에 골프장의 명성을 올려놓을 수 있었다”고
    설명했다.신 회장은 “투자와 직원 복지 및 자부심 향상을 통해 국내 최고의 골프장을 만들겠다”고 강조했다.
  - 한국은행이 내년 통화신용정책 목표를 기존 물가안정에서 ‘성장세 회복 지원’으로 전환하기로 했다. 최근 소비자물가 상승률이 0%대를 지속하면서 물가 상승에 대한 우려가 줄어든 만큼 점차 탄력받고 있는 경기 회복세를
    지원하겠다는 의지로 풀이된다. 나아가 섣부른 금리 정상화(인상)보다는 경기 회복세가 여의치 않을 경우 오히려 금리를 내릴 수 있다는 점을 시사한 것으로 해석된다. ▶관련기사 A3면한은 금융통화위원회는 26일 기준금리
    운용과 금융 안정을 위한 시장 대응 방안 등을 담은 ‘2014년 통화신용정책 운영 방향’을 발표했다. 한은은 우선 “성장세 회복이 지속되도록 지원하는 가운데 중기적 시계에서 소비자물가 상승률이 물가안정 목표 범위(연
    2.5~3.5%) 내에서 유지되도록 하는 데 중점을 둘 것”이라고 강조했다. 지난해 말 발표한 올해 운영 방향에서 ‘물가안정 기조를 확고히 유지하는 가운데’라는 전제를 깔며 경기부양을 언급한 것과 비교하면 ‘물가’와
    ‘성장’의 우선 순위가 바뀐 것이다. 최근 저물가 지속에는 “상당 기간 물가안정 목표의 하한을 밑도는 현상에 대해 향후 추이를 주의깊게 살피면서 목표 범위 내에서 유지되도록 유의하겠다”고 밝혔다. 11월 소비자물가는
    3개월 연속 0%대 상승률을 이어가며 18개월째 한은 물가 목표 범위의 하한선(2.5%)을 밑돌고 있다. 장기 저금리로 인해 ‘일본식 디플레이션’ 우려가 커지는 분위기를 반영한 것으로 분석된다.
- source_sentence: 동탁에게서 탈출한 정태를 받아들여주지 않은 인물은?
  sentences:
  - '곤충은 부정적 또는 긍정적이든 다양한 분위기와 이미지를 설정하는데 유용하므로 문학의 소재로서 흔히 사용된다. 우리의 시와 소설 등에 대한 곤충 문화에 대한 연구는 없었으나, 나비야 청산가자(청구영언), 반딧불이(정약용),
    금롱속의 귀뚜라미, 방우선(이규보), 구더기와 개미(이광수), 귀뚜라미(김소월), 나비춤(정을병), 장수하늘소(이외수) 등의 당대의 유명 작가들의 시조, 시 및 소설에서 그 흔적을 찾아보는 것이 어렵지 않다. 구비문학에서는
    더 많은 관련성을 볼 수 있는데 그 대표로서 속담을 꼽을 수 있다. ''송충이는 솔잎을 먹어야 산다.'' 또는 ''쇠똥벌레 떠밀 듯 한다.'' 등과 같이 곤충이 관련된 속담을 551구 정도 찾을 수 있고 여기에
    등장한 곤충 무리만도 43 무리가 구분된다.


    카프카의 변신에서는 어느 날 문득 주인공이 커다란 해충으로 변하게 되는데 카프카는 주인공 그레고르 잠자가 변한 벌레가 어떤 곤충이었는지 정확히 밝히지 않는다. 단지 혐오감을 전할뿐이다. ‘변신’에서의 벌레는 한
    인간이 사회의 경제적이고 기능적 존재로서의 의무를 이행할 수 없거나 그것을 원치 않을 경우, 산업사회 속에서 무용하고 열등하며 부정적인 존재인 ‘해충’의 이미지를 비유하며 자유를 갈망하는 한 개인의 실존형식과 그것을
    추구하는 삶의 태도를 형상화했다. 경제적 능력을 상실한 그레고르가 가족이라는 사회적 울타리 안에서 추방되어야하는 무용한 존재, 해충으로 그려지는 ‘변신’은 결국 인간이 인간으로서의 자유의지를 갖고 행하는 존재에서
    자본주의 사회의 이익을 창출하기 위한 수단, 도구로 전락하는 ‘인간소외’를 주제로 한다.


    고대 이집트, 마야 그리고 중국의 그림문자와 상형문자에는 곤충의 형태를 차용한 문자들이 많으며, 대부분 나라의 언어에는 곤충이름이나 그의 생산물에서 유래한 것이 많다. 한 예로 폭스바겐의 ''Beetles(딱정벌레)''란
    자동차 제품명과 어린이용 출판사인‘ladybeetles(무당벌레)’를 들 수 있는데 전자는 차의 생김새에서 그리고 후자는 어린이들이 무당벌레를 좋아하므로 상징으로서 이용하게 된 것이다.'
  - '아칸바로에서 발굴된 공룡 토우는 존재하는 수만 가지의 토우 중에서 우연히 공룡을 닮아 있던 것을 골라내 문제삼고 있는 것에 불과한 게 아닌가 라는 지적도 있다. 공룡은 6500만 년 전에 멸종했으므로 인류와 공존했던
    시기는 없다. 그 때문에 공룡을 본뜬 토우가 어떻게 만들어졌는지가 논의의 대상이 되고 있는데 기원전에 공룡의 화석이나 파충류를 관찰해 창조되었다는 설, 심지어 인류와 공룡이 공존했던 시대가 있었다는 설 등을 주창하는
    사람도 있다.


    또 토우의 조형 안에는 현재는 실수로 여겨지는 공룡관에 근거한 것이나, 반인반수의 코끼리 인간, 악어 인간이나 날개를 가지는 용 등, 공상의 산물로 밖에 생각할 수 없는 것도 다수 존재하고 있다 .


    게다가 아칸바로의 유적을 조사를 한 고고학자 찰스 디 페소 (Charles C. Di Peso)는 미발굴 상태라는 현장에서 누군가 다시 묻은 것 같은 확실한 흔적을 발견했다고 주장했다. . 이 때문에 데이 페소는
    발데마어 율스루트와 그 사용인인 티나헤로가 날조한 것이라고 생각했다. 한편 이 흔적은 발굴 작업중단 시의 현장 보존용이라는 주장도 있지만, 티나헤로는 ''조사하지 않은 현장''이라고 디 페소에게 말했다.'
  - '젊을 때부터 재략이 많아 영제 말기에 천하가 장차 혼란스러워질 것을 알고, 몰래 호걸 들과 친밀히 지냈다. 집안은 재산이 풍부해 밭은 사백 경이나 있었으나 많은 식객을 거느리고 있어서 언제나 먹을 것이 부족해
    명성은 산동에 알려졌다.


    효렴으로 추천되어 삼공부에 추천되었으나 공거를 보내도 모두 거절했으며, 후에 영제가 죽었을 때 하진은 정치를 보좌받기 위해 그와 순유, 화흠을 등용해 정태를 상서시랑으로 삼으면서 봉거도위의 관직을 더했다. 십상시와
    권력을 다투는 하진이 동탁을 불러들이려 하자 이를 반대했다. 또한 다른 시급한 일들도 진언했으나 하진이 받아들이지 않자 순유에게 ‘하진은 보필하기가 쉽지 않다’고 말하며 관직을 버리고 떠났다.


    과연 하진은 살해되고 동탁이 그 자리를 차지했다. 그러자 정태는 하옹, 오경(伍瓊)과 함께 원소와 연결해 반동탁연합군의 궐기를 유도하였다. 동탁이 이에 대응해 대규모의 군대를 동원하려 하자 아무도 거스르려는 자가
    없었다. 동탁의 군세가 커질수록 그 전횡도 심해질 것이므로 정태 혼자 나서서 “정치는 덕으로 하는 것이지 숫자로 하는 것이 아닙니다”고 말했다. 동탁이 불쾌해하며 ‘병사들은 아무런 의미가 없는 것이냐’고 묻자 정태는
    순간 두려웠지만 다음과 같이 속여 말했다.




    동탁은 감격하면서 정태를 장군으로 삼아 반동탁 연맹군에 대항하게 했는데, 어떤 자가 “정태의 지혜는 보통 사람 이상이라 결탁해 산동과 음모를 꾀하고 있습니다. 지금 그에게 병마를 맡기면 그 무리에게 가세하려 할
    것입니다. 결국에는 명공의 우환거리가 될 것입니다.”고 조언하니 다시 거두어 들이고 의랑(議郞)에 임명하여 조정에 잡아두었다.


    그 후 동탁이 온갖 만행을 저지르고 장안으로 천도할 때 기근까지 발생하여 많은 사대부들이 죽자 정태는 개인 재산을 풀어 날마다 빈객들을 모아 구조해 많은 사람을 구한다. 또한 하옹과 순유, 오경, 충집과 더불어
    계획해 함께 동탁을 주살하려 했으나 사건이 누설되어 하옹 등이 붙잡혔다. 이때 정태는 탈출해 무한에서 동쪽으로 도주해서 원술에게 갔는데, 원술은 정태의 의탁을 기꺼이 받아들였고 원술이 정태를 양주자사에 제수하려
    했지만 정태는 관직에 오르기 전에 도중에 병에 걸려 죽으니 당시 41세였다.'
- source_sentence: 아이폰5의 화면 크기는?
  sentences:
  - 2011년 10월 애플 창업자 스티브 잡스가 세상을 떠났을 때 ‘잡스 후광’ 얘기가 나왔다. 후계자가 잘하든 못하든 잡스 영향력이 워낙 커서 애플이 한두 해는 잘 굴러갈 것이란 얘기였다. 실제로 애플은 작년 가을까지
    1년 동안은 잘하는 듯했다. 주가도 천정부지로 치솟았다. 그러나 겨울로 접어들면서 분위기가 달라졌다. 잡스의 마술이 끝났다느니, 혁신이 멈췄다는 얘기가 나오기 시작했다.팀 쿡은 최고경영자(CEO)로 취임한 이후
    깜짝 놀랄 만한 것을 보여주지 못했다. 쿡의 첫 번째 아이폰은 작년 가을에 내놓은 아이폰5라고 할 수 있다. 이 폰은 4인치로 화면이 커졌는데도 더 가벼워지고 더 얇아졌다. 디자인 측면에서는 혁신적이었다. 그러나
    디자인 말고는 깜짝 놀랄 만한 게 없었다. 특히 구글지도를 대체한 애플지도가 문제가 됐다. 허겁지겁 탑재했던지 엉터리였다. 길이 구겨지고 다리가 끊기는 등 전혀 애플답지 않았다.시장을 선도하는 ‘카테고리 리더’로서
    위상도 약해졌다. 애플은 어느 순간부터 삼성을 따라하기 시작했다. 삼성이 4인치, 5인치대의 큰 화면 갤럭시폰으로 인기를 끌자 3.5인치 아이폰 화면을 4인치로 키웠다. 아이패드도 마찬가지. 잡스는 생전에 7인치대
    삼성 갤럭시탭에 대해 “D.O.A.(나오자마자 사망)”라고 악담을 했지만 그가 세상을 떠난 지 1년 후 애플은 7인치대 아이패드 미니를 내놓았다.따지고 보면 ‘애플의 혁신’은 ‘잡스의 마술’이었다. 잡스는 강력한
    카리스마로 조직을 이끌었고 소비자 입장에서 디테일을 꼼꼼하게 챙겼다. 아이팟으로 음악시장을 혁신할 때 음반사업자들을 설득한 것도 잡스였고, 아이폰을 내놓기 전에 미국 이동통신사 AT&T를 설득한 것도 잡스였다.
    반면 쿡은 세계 최대(가입자 7억명) 이동통신사인 차이나모바일을 설득하지 못해 중국 시장에서 고전하고 있다.경쟁사들이 이젠 할 만큼 한다는 점도 애플한테는 위협 요소다. 애플은 삼성이 특허를 침해했다며 핵전쟁급
    소송을 벌였지만 실리도 챙기지 못한 채 삼성 위상만 높여줬다. 삼성은 스마트폰 1위 업체로 올라섰다. 작년 4분기엔 애플이 아이폰을 4780만대 판매한 반면 삼성은 스마트폰을 6000만대 이상(추정치) 팔았다.
    태블릿 시장에서도 애플 독무대가 흔들리고 있다. 아이패드는 2010년 4월 발매 후 2~3년 동안 시장을 독점하다시피 했다. 경쟁사들이 수백 종의 태블릿 제품을 내놓고 덤볐지만 모두 참패했다. 그러나 작년 하반기부터
    달라지고 있다. 넥서스7, 갤럭시노트10.1 등이 호평을 받고 있다. 올해는 안드로이드 진영의 공세가 더욱 거세지고 윈도 진영도 가세할 것으로 예상된다.애플이 애플TV로 혁신을 이어갈 것이란 얘기도 있다. 잡스가
    애플TV에 대해 ‘취미’라고 말하면서도 말년에 심혈을 기울였고 쿡도 “큰 관심을 가지고 있다”고 말했으니 연말께 혁신적인 애플TV가 나올 가능성은 있다. 그러나 TV 시장은 삼성 LG 등이 이미 장악하고 있고 국가마다
    케이블 사업자, 콘텐츠 사업자들과 협상해야 해 스마트폰과 달리 단숨에 세계 시장을 장악하긴 어렵다.
  - '애니메이션 전문 채널 애니원, 애니박스(대표: 곽영빈)이 오는 크리스마스를 맞아 크리스마스 이브(목)와 당일(금) 양일간 크리스마스 특집 방송을 방영한다. 다가오는 이번 크리스마스는 여느 때와는 달리 외출을 자제하면서
