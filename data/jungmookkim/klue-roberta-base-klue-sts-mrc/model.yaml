    라바 인 뉴욕, 라바 아일랜드 등 방영 애니원 채널에서는 ‘크리스마스 홈파티’ 컨셉으로 12월 24일(목) 11시부터 극장판 짱구는 못말려와 안녕 자두야3가 방영되고 크리스마스 당일인 12월 25일(금)에는 신작인
    극장판 도라에몽-진구와 구름왕국과 신 도라에몽 시리즈를 오전 8시부터 만나볼 수 있다. 한편, 애니박스 채널에서는 ‘Merry 애니박스’ 컨셉으로 12월 24일(목) 오전 8시부터 극장판 뽀로로와 신작인 밍꼬발랄
    프렌즈가 방영되고 크리스마스 당일, 12월 25일(금)에는 신작인 뽀로로 동화나라를 오전 8시에 첫 공개할 예정이다. 그 뿐만 아니라, 라바 시리즈와 극장판 짱구는 못말려까지 연속으로 만나볼 수 있다.'
  - 포스코그룹이 지난 1분기 포스코건설과 대우인터내셔널 등 비철강 부문의 실적 개선에 힘입어 영업이익과 매출이 전년 동기에 비해 소폭 증가했다. 포스코는 지난 1분기 연결기준 영업이익이 작년 같은 기간 대비 1.9%
    증가한 7313억원을 기록했다고 24일 발표했다. 매출은 15조4401억원으로 5.8% 늘었다. 다만 세후이익과 순이익은 전년 동기 대비 27%, 81%씩 줄었다. 국세청 세무조사 등으로 1900억원가량의 세금
    추징을 예상해 미리 반영한 결과다. 비철강 부문은 선전했다. 포스코건설 매출은 전년 동기보다 35% 증가한 2조1430억원, 영업이익은 104% 늘어난 1410억원이었고 대우인터내셔널도 매출이 4조9280억원,
    영업이익 640억원으로 전년 동기보다 22%, 52% 증가했다.철강업 실적은 부진했다. 포스코 단독 기준 매출은 7조3640억원, 영업이익은 5180억원으로 집계됐다. 작년 동기 대비 4.1%, 10.8% 각각
    줄었다. 영업이익률은 7.0%로 양호한 수준을 유지했다. 포스코는 2분기 철강 가격 인상이 어려울 것으로 전망했다. 포스코 관계자는 이날 기업설명회(IR)에서 “통상적으로 2분기가 철강재 성수기라는 점에서 가격
    회복이 예상되지만 중국의 철강재 가격 회복세가 둔화됐다”며 “철광석 등 원료 가격 하락으로 수요산업의 인하 요구도 강하다”고 설명했다. 한편 오숭철 포스코 가치경영실 상무는 동부제철 인천공장(인천스틸) 및 동부발전당진
    패키지 인수와 관련해 “매력적인 부분이 있다”며 적극적 검토 의사를 밝혔다. 앞서 산업은행은 포스코가 동부제철 인천공장에 대해 총 인수금액의 20~30%를 부담하되 이 공장의 경영권과 동부발전당진의 우선인수협상권을
    갖도록 하는 방식의 패키지 인수를 제안한 바 있다.
