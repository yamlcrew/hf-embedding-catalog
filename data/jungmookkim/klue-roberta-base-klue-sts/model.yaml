  sentences:
  - 정부는 15일 자정부터 프랑스, 독일, 스페인, 영국, 네덜란드 등 유럽 5개국에서 온 여행객들을 위한 특별 입국 절차를 시행할 예정입니다.
  - 국내 학회 메일 평균 용량을 알려줘
  - 그것은 또한 주요 도시들을 방문하기에도 좋습니다.
- source_sentence: 대부분의 로마 여행지와 가까우며 로마 시내에서 살짝 벗어나기 때문에 주변 역시 매우 조용합니다.
  sentences:
  - 그 날 오후, 문 대통령은 경기도 평택의 마스크 생산업체인 우일 C&T를 방문했습니다.
  - 일시적인 자금 지원이나 유동성 공급만으로는 어려움을 극복하기 힘든 기업이 생기기 시작했습니다.
  - 로마 바티칸 시국 뒷편 주택가에 위치해서 매우 조용합니다.
- source_sentence: 겨울에 눈이 많은 곳은 대관령이야? 아니면 진부령이야?
  sentences:
  - 너는 처음 메일 주소를 만들게 된 계기가 뭐야?
  - 더위에는 커피 말고 물 많이 마시는게 좋아.
  - 집주인때문에 저는 이 나라에서 잊어버릴수 없는 기억을 받았어요.
- source_sentence: 숙소 바로 근처에 맛있는 아시안 푸드 음식점이 있는 것도 좋았어요.
  sentences:
  - 저희 숙소 근처에 맛있는 아시아 음식점이 있어서 좋았습니다.
  - 하지만 반대로, 산토리니 여행은 호스트 때문에 좋은 추억이 되었습니다.
  - 어제하고 그제 중에서 일일 일식 한 날이 언제였었지?
- source_sentence: 어느 쪽이 네이버 메일을 더 많이 사용할까요? 삼십대랑 사십대
  sentences:
  - 지메일 연동은 네이버 메일에서 사용할 수 있어, 네이트메일에서 사용할 수있어?
  - 지내는 동안 호스트의 친절과 세심한 배려에 감동했어요.
  - 벌금은 1차 300만 원, 2차 500만 원, 3차 1000만 원입니다.
