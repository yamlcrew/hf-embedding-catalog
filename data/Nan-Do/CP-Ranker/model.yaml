- source_sentence: "We have N coins numbered 1 to N with two distinguishable sides. A string S represents the current state\
    \ of the coins. If the i-th character of S is 1, coin i is showing heads; if that character is 0, coin i is showing tails.\n\
    \n  You can repeat the following operation zero or more times.\n\n    * Choose a pair of integers (i,j) such that 1\\\
    leq i < j\\leq N and j-i\\geq \\bm{2}. Flip coin i and coin j.\n\n  Determine whether it is possible to make all the N\
    \ coins show tails. If it is possible, find the minimum number of operations needed.\n\n  You are given T test cases to\
    \ solve.\n\n  Constraints\n\n    * 1 \\leq T \\leq 2\\times 10^5\n    * 3 \\leq N \\leq 2\\times 10^5\n    * S is a string\
    \ of length N consisting of 0 and 1.\n    * All numbers in the input are integers.\n    * For each input file, the sum\
    \ of N over the test cases is at most 2\\times 10^5.\n\n    Input\n\n    The input is given from Standard Input in the\
    \ following format:\n\n    T\r\n    \\mathrm{case}_1\r\n    \\vdots\r\n    \\mathrm{case}_T\r\n    \n\n    ​ Each case\
    \ is in the following format:\n\n    N\r\n    S\r\n    \n\n    Output\n\n    Print T lines. The i-th line (1\\leq i \\\
    leq T) should contain the minimum number of operations needed to make all the coins show tails if it is possible, and\
    \ -1 otherwise.\n\n  Sample Input 1\n\n  5\r\n  3\r\n  101\r\n  6\r\n  101101\r\n  5\r\n  11111\r\n  6\r\n  000000\r\n\
