  - source_sentence: "You are given an array of n integer numbers a0 , a1 , ..., an - 1. Find the distance between two closest\
      \ (nearest) minimums in it. It is guaranteed that in the array a minimum occurs at least two times.\n\n      Input\n\
      \n    The first line contains positive integer n ( 2 ≤ n ≤ 10 5) — size of the given array. The second line contains\
      \ n integers a0 , a1 , ..., an - 1 ( 1 ≤ ai ≤ 10 9) — elements of the array. It is guaranteed that in the array a minimum\
      \ occurs at least two times.\n\n      Output\n\n    Print the only number — distance between two nearest minimums in\
      \ the array.\n\n      Examples\n          Input\n        2\n        3 3\n          Output\n        1\n          Input\n\
      \        3\n        5 6 5\n          Output\n        2\n          Input\n        9\n        2 1 3 5 4 1 2 3 1\n    \
      \      Output\n        3"
