    \  * 1 \\leq S \\leq 10^{18}\n    * All values in input are integers.\n\n    Input\n\n    Input is given from Standard\
    \ Input in the following format:\n\n    S\r\n    \n\n    Output\n\n    Print six integers X_1,Y_1,X_2,Y_2,X_3, and Y_3\
