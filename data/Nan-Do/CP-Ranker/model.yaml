  - source_sentence: "There is a directed graph with N vertices and M edges, where vertices are numbered from 1 to N and edges\
      \ are numbered from 1 to M. Edge i is a directed edge from vertex A_i to vertex B_i with weight W_i.\n\n  Find the minimum\
      \ value of the bitwise \\mathrm{XOR} of the weights of edges included in a walk from vertex 1 to vertex N.\n\n  What\
      \ is a walk from vertex 1 to vertex N?\n\n  Intuitively, it is \"a path from vertex 1 to vertex N that may visit the\
      \ same vertex or edge multiple times.\" Formally, it is a sequence of edges (e_1,\\ldots,e_k) that satisfies all of\
      \ the following conditions:\n\n    * e_1 starts at vertex 1.\n    * For all 1 \\leq i < k, the endpoint of e_i and the\
      \ starting point of e_{i+1} are the same.\n    * e_k ends at vertex N.\n  What is the bitwise \\mathrm{XOR} operation?\n\
      \n  The bitwise \\mathrm{XOR} of non-negative integers A and B, denoted A\\ \\mathrm{XOR}\\ B, is defined as follows:\n\
      \n    * When A\\ \\mathrm{XOR}\\ B is written in binary, the digit at the 2^k place (k \\geq 0) is 1 if exactly one\
      \ of the digits at the 2^k place of A and B in binary is 1, and 0 otherwise.\n  For example, 3\\ \\mathrm{XOR}\\ 5 =\
      \ 6 (in binary: 011\\ \\mathrm{XOR}\\ 101 = 110).\n  In general, the bitwise \\mathrm{XOR} of k non-negative integers\
      \ p_1, p_2, p_3, \\dots, p_k is defined as (\\dots ((p_1\\ \\mathrm{XOR}\\ p_2)\\ \\mathrm{XOR}\\ p_3)\\ \\mathrm{XOR}\\\
      \ \\dots\\ \\mathrm{XOR}\\ p_k), and it can be proved that this does not depend on the order of p_1, p_2, p_3, \\dots\
      \ p_k.\n\n  Constraints\n\n    * 2 \\leq N \\leq 1000\n    * 0 \\leq M \\leq 1000\n    * 1 \\leq A_i,B_i \\leq N\n \
      \   * 0 \\leq W_i < 2^{10}\n    * All input values are integers.\n\n    Input\n\n    The input is given from Standard\
      \ Input in the following format:\n\n    N M\r\n    A_1 B_1 W_1\r\n    A_2 B_2 W_2\r\n    \\vdots\r\n    A_M B_M W_M\r\
      \n    \n\n    Output\n\n    If there is no walk from vertex 1 to vertex N, output -1.\n\n    If there is a walk from\
      \ vertex 1 to vertex N, output the minimum value of the bitwise \\mathrm{XOR} of the weights of edges included in such\
      \ a walk.\n\n  Sample Input 1\n\n  3 3\r\n  1 2 4\r\n  2 3 5\r\n  1 3 2\r\n  \n\n  Sample Output 1\n\n  1\r\n  \n\n\
      \  The bitwise \\mathrm{XOR} of the weights of edges included in the walk (edge 1, edge 2) is 1.\n\n  Sample Input 2\n\
      \n  4 4\r\n  1 4 7\r\n  4 2 2\r\n  2 3 4\r\n  3 4 1\r\n  \n\n  Sample Output 2\n\n  0\r\n  \n\n  The bitwise \\mathrm{XOR}\
      \ of the weights of edges included in the walk (edge 1, edge 2, edge 3, edge 4) is 0.\n\n  Note that the walk may include\
