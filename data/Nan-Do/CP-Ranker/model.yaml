      ]\n\n\nkc = 0 \n\nfor row in placement:\n    for i in range(len(row)):\n        if (row[i] == '.'):\n            count\
      \ = 0\n            if (i > 0 and row[i - 1] == 'S'):\n                count += 1\n            if (i < len(row) - 1 and\
