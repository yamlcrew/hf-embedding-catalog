      제작 노하우가 부족한 탓이다.예산 확보가 어렵다는 점도 약점으로 꼽힌다. 광고와 간접광고(PPL)를 적극적으로 활용하는 방송사 드라마와 달리 웹드라마는 자금 조달과 수익 창출이 쉽지 않다. 포털사이트에서 제공되는
