      있는 포털사이트 네이버도 최근 동향에 긍정적인 견해를 밝혔다. 네이버 TV캐스트 관계자는 “웹드라마는 잠재적으로 발전 가능성이 높은 시장”이라며 “지난해 웹드라마 서비스를 본격화한 이후 고품질 콘텐츠를 제공하고자
