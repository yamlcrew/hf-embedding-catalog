      가기로 한 가족여행을 미루어도 될 것 같아③ 병 : 일본으로부터 수입한 냉장고의 엔화 대금 지급을 서둘러야 해④ 정 : 지난번 미국 출장에서 쓰고 남은 달러를 원화로 빨리 환전해야겠어⑤ 무 : 일본과의 무역에서
      흑자가 나 국내에 인플레이션 우려가 있어 해설 문제의 그림은 원·달러 환율 상승과 원·엔 환율 하락 추세를 나타내고 있다. 즉 달러화 가치가 상승하고 엔화 가치가 하락하고 있다는 얘기다. 달러 가치가 상승하므로
      달러 표시 외채 상환과 미국여행은 서두르는 것이 좋다. 달러 환전은 나중에 바꾸는 것이 유리하다. 엔화 가치는 하락하므로 엔화 대금 지급은 미루는 것이 이득이다. 통상적으로 국제수지 흑자로 인한 인플레이션 우려는
      환율 상승(엔화 가치 상승) 시 나타나는 문제다.'
    - 국내 연구진이 알츠하이머의 원인 물질인 독성이 있는 베타아밀로이드 단백질을 제거하는 먹는 치료 물질을 개발했다. 김혜연 고센바이오텍 연구소장과 김영수 한국과학기술연구원(KIST) 선임연구원, 김동진 KIST
      뇌과학연구소장으로 구성된 연구진은 알츠하이머 치매를 유발하는 베타아밀로이드 단백질의 덩어리를 제거하는 EPPS라는 경구용 신약 후보물질을 개발했다고 국제학술지 ‘네이처 커뮤니케이션즈’ 최신호(9일자)에 발표했다.
      논문 주저자인 김 소장과 교신저자인 김 선임연구원은 부부다.기존 알츠하이머 치료 물질은 베타아밀로이드가 독성을 띠지 않도록 억제하는 데 집중하고 있다. 반면 이 물질은 기존에 축적된 베타아밀로이드 단백질을 뇌에서
      제거하는 효능이 있다. 연구진은 발상을 바꿔 치매 증상이 상당히 진행된 환자의 증상을 완화하는 약물을 찾는 과정에서 이 물질을 찾아냈다. 베타아밀로이드가 정상인의 뇌에서도 발견되지만, 알츠하이머 환자에게는 응집된
      형태로 나타난다는 데서 아이디어를 얻었다. 이 물질은 응집된 베타아밀로이드 단백질을 독성이 없는 단백질로 바꿔주는 효과가 있는 것으로 나타났다.투약 방식에서도 발상을 바꿨다. 주사제나 알약, 패치 대신 먹는
      방식을 택했다. 치매에 걸려 길을 못찾는 실험용 쥐에게 물에 타서 3개월간 먹인 결과 길을 다시 제대로 찾아가는 것으로 나타났다. 김 소장은 “국내외 제약사와 임상 연구를 추진할 계획”이라고 말했다.
    - '코카인 용액을 혈관에 주사하면 최단 시간에 최대의 혈중 농도를 얻을 수 있다. 다른 투여 방식과 달리 코카인 주사는 투여 직후부터 2~5분 동안 귀울림과 청각의 왜곡을 일으킬 수 있다. 코카인 사용자를 대상으로
      한 어느 연구에 따르면 주사 후 효과가 최고조에 달하는 데 걸리는 시간은 평균 3.1분이다 행복감은 금방 지나간다. 코카인 자체의 독성을 감안하지 않더라도, 코카인에 섞인 불용성 불순물 때문에 색전증이 발생할
      위험이 있다. 다른 불법 약물 주사와 마찬가지로 주사 도구가 제대로 소독되지 않은 경우 혈액 매개 감염병에 걸릴 위험도 있다. 또한 코카인의 혈관 수축 효과 때문에, 흔히 그러듯 몇 시간 내로 여러 차례 투여하는
      경우 갈수록 주사를 놓기 힘들어진다. 따라서 주사를 시도하는 횟수가 늘어나고 잘못된 주사 시도로 인한 악영향이 커질 수 있다.날짜=2020-04-11


      코카인과 헤로인을 섞어서 주사하는 것을 “스피드볼”이라고 부른다. 두 약물의 상반된 효과가 서로를 보완해 주지만, 그 때문에 과다 복용의 징후가 감춰질 수 있어 위험하다. 스피드볼은 존 벨루시, 크리스 팔리,
      미치 헤드버그, 리버 피닉스, 레인 스테일리, 필립 시모어 호프먼 등의 유명인사를 포함한 여러 사람의 사망 원인이 되었다. 과학자들은 초파리 따위 동물에 코카인을 주사하여 코카인 중독의 기제를 연구하기도 한다.'
  - source_sentence: 1987년 일본 시리즈 우승팀을 지도한 감독은?
    sentences:
    - '전년도에 2년 연속 일본 시리즈 정상에 오른 세이부 라이온스의 모리 마사아키 감독이 퍼시픽 리그 올스타팀을 지휘했고 센트럴 리그 우승을 이끈 요미우리 자이언츠의 오 사다하루 감독이 센트럴 리그 올스타팀의 지휘를
      맡았다. 1987년부터 MVP 수상자에게 상금과 상품을 증정해 온 산요 전기가 이 해부터 특별 협찬 기업이 되면서 대회명도 ‘산요 올스타 게임’(サンヨーオールスターゲーム)이라는 명칭이 변경됐다(2006년까지).


      지붕을 씌우고 좌우 양쪽의 100m 넓이를 가지는 도쿄 돔이 개장하면서 ‘야구의 질이 달라졌다’라고 말할 정도였고, 시즌 종료와 함께 긴 역사를 가졌던 한큐 브레이브스와 난카이 호크스가 매각되면서 프로 야구도
      새로운 시대를 맞이하려 하고 있었다.


      7월 23일로 치를 예정이었던 1차전이 우천으로 인해서 24일로 연기됐다. 1차전에서는 결과적으로 올스타전 최종 개최가 되는 한큐 니시노미야 구장에서 개최돼 니시노미야 구장의 홈팀인 한큐의 호시노 노부유키가
      퍼시픽 올스타팀의 선발 투수로서 등판하여 책임 투구 이닝을 무실점으로 틀어 막았고 한큐의 주력 타자인 부머 웰스가 대형 홈런을 날리는 등 역사 깊은 구단의 화려한 해체와 같은 전개가 이뤄졌다.


      2차전에서는 나고야 구장에서 개최됐는데 오 사다하루를 동경하여 프로에 입문한 고졸 신인 다쓰나미 가즈요시가 선발 출전했고, 당시에는 지명타자가 올스타전에 도입돼 있지 않아서 가도타 히로미쓰가 3번 타자 겸 우익수로서
      선발 출전했다. 6회에 오카다 아키노부(한신)의 역전 홈런으로 센트럴 올스타팀은 1승 1패를 기록했고 오카다는 2차전 MVP에 선정됐다. 그리고 최종전인 3차전에서는 개장한 지 4개월 된 도쿄 돔에서 처음으로
      올스타전이 개최됐는데 당시 도쿄 돔을 홈구장으로 사용하고 있던 닛폰햄 파이터스의 에이스 니시자키 유키히로가 퍼시픽 올스타팀의 선발 투수로서 3이닝을 퍼펙트(2회말에는 클린업에게서 3자 연속 삼진, 3회말 2사에
      대타 다쓰나미로부터 5개째의 삼진) 기록을 세웠다. 1986년 이후 2년 만에 연장전으로 들어가면서 무승부 직전의 12회말, 야수를 전부 기용한 센트럴 올스타팀은 투수 미즈노 가쓰히토를 대타로 보냈는데 이것이
      끝내기 희생 플라이가 되면서 센트럴 올스타팀이 쇼와 시대의 마지막 올스타전을 승리로 매듭지었다.


      3차전이 열린 도쿄 돔에서는 1988년도 야구 명예의 전당 시상식이 거행됐는데 센트럴 올스타팀의 감독이자 요미우리를 지휘하고 있는 오 사다하루의 후임으로 유력하게 거론돼던 나가시마 시게오가 그해 야구 명예의
      전당의 헌액자로서 등장했다(그 후 히로오카 다쓰로를 임명하려 했으나 고사했고 후지타 모토시가 재부임). 사다하루·나가시마의 ‘ON 콤비’가 올스타전 무대에서 동시에 등장한 것은 1979년(나가시마는 감독, 사다하루는
      현역 선수) 이후의 일이었고 이들 두 사람이 양대 리그의 감독으로서 올스타전에 나란히 등장한 것은 그로부터 13년 후인 2001년이다.


      그 해에는 워렌 크로마티의 대역으로 요미우리에서 대활약한 뤼밍츠가 감독 추천으로 올스타전에 첫 출전하여 전 경기에 선발로 출전했지만 무안타에 그쳤다.'
    - 8월 주택 매매 거래량이 전달보다 증가했다. 실거래 가격도 상승한 것으로 나타나 ‘8·28 부동산 대책’ 효과로 실수요자의 주택 매수 심리가 회복되고 있다는 분석이 나온다.국토교통부는 지난달 주택 매매 거래
      건수는 4만6586건으로 취득세 감면 종료 여파로 거래가 급감한 7월(3만9608건)보다 17.6% 증가했다고 12일 발표했다. 다만, 작년 같은 달(4만866건)과 비교해서는 2.7% 감소했다.주간 단위 거래량을
      살펴보면 매매 시장 회복세가 눈에 띈다. 8월 첫째 주 작년보다 5.4% 감소했던 매매 거래 건수는 8월 넷째 주와 다섯 번째 주에는 전년 대비 각각 3.7%와 11.3% 늘었다. 8·28 대책 효과가 본격적으로
      나타난 9월 첫째 주에는 전년보다 24.1%나 증가했다. 김홍진 국토부 주택정책과장은 “8월 셋째 주부터 거래량이 전년 대비 증가세로 돌아선 것을 감안할 때 9월부터는 거래량이 점차 회복될 것”이라고 설명했다.지역별로도
      서울과 수도권이 각각 5805건과 1만9745건으로 작년 같은 달보다 18.4%와 14.3% 증가했다. 반면 지방은 2만6841건으로 작년보다 12.3% 감소했다. 이는 8·28 대책이 주로 수도권 주택 매수
      심리 회복에 영향을 미친 결과로 풀이된다.매매 거래량 증가 속에 실거래가도 전반적으로 상승한 것으로 집계됐다. 서울 개포동 개포주공4단지 전용 42㎡는 7월(5억7000만원)보다 2000만원 가까이 오른 5억8900만원에
      거래됐다. 같은 기간 서울 가락동 시영 전용 40㎡도 4억8300만원에서 5억원으로 뛰었다. 지난 7월 5억4400만원에서 거래됐던 성남시 분당 서현동 시범한신 84㎡도 8월 들어 3000여만원 오른 5억7500만원에
      팔렸다. 하지만 재건축 추진이 지연되고 있는 서울 대치동 은마 전용 84㎡는 전달보다 5000만원 이상 내린 7억9000만원에 거래됐다.
    - 하기우다 고이치 일본 관방 부(副)장관은 “군 위안부 문제에 대한 일본 정부의 방침은 이제까지 밝혀온 대로다”며 “전제조건 없이 (한·일) 정상회담을 열어야 한다고 거듭 말해왔다”고 30일 밝혔다.일본 정부
      대변인인 스가 요시히데 관방장관을 대신해 이날 기자회견에 나선 하기우다 부장관은 내달 2일 열리는 한·일 정상회담이 군 위안부 문제를 매듭짓는 기회가 돼야 한다는 박근혜 대통령의 일본 언론 인터뷰 발언에 대한
      질문을 받자 이같이 답했다.일본 정부는 군 위안부 문제가 1965년 한·일 청구권 협정으로 종결된 사안이라며 ‘정치·외교 문제화해서는 안 된다’는 방침을 밝혀왔다. 박 대통령은 일본 아사히·마이니치신문과의 서면
      인터뷰에서 이번 정상회담이 군 위안부 문제를 매듭짓는 기회가 돼야 한다고 강조하고 피해자들이 받아들일 수 있는 해결 방안을 제시할 것을 일본 정부에 촉구했다.스가 장관은 지난 23일 “위안부 문제를 포함한 일·한
      간의 현안에 대해서는 국장급 협의 등을 진행하며 앞으로도 끈질기게 협의한다는 기존 자세에 전혀 변함이 없다”고 밝혔다. 그러나 군 위안부 문제를 놓고 양측의 조율이 순탄치 않게 진행된 끝에 일본 측이 요구한
      정상 간 오찬 없이 회담만 하는 것으로 28일 발표된 뒤 일본 측 분위기가 한층 차가워졌다고 외교소식통들은 전했다.
  - source_sentence: SLF를 활용하여 시중에 유동성을 공급한 기관은?
    sentences:
    - 중국 인민은행이 22일부터 기준금리를 내리기로 한 것은 당국의 경제정책 기조가 공격적인 경기부양 모드로 전환했음을 보여준다는 평가다. 일본 유럽에 이어 중국까지 경기부양 대열에 동참하면서 침체 상태에 빠진 글로벌
      경기에도 적잖은 활력을 불어넣을 것으로 기대되고 있다.중국 경제는 연초부터 경고음을 내기 시작했다. 지난 2월 수출이 전년 동월 대비 18.1% 급감한 것이 발단이 됐다. 지방정부 부채, 그림자금융, 기업 부채
      급증 등으로 중국 경제가 2008년의 미국과 같은 위기에 봉착할 것이라는 우려도 제기됐다.이에 중국 정부는 인프라 투자 확대, 수출기업에 대한 세제 감면 혜택 등을 골자로 하는 ‘미니 부양책’을 내놨다. 이
      덕분에 1분기 7.4%였던 중국의 경제성장률은 2분기 들어 7.5%로 반등했다. 그러자 중국 정부는 다시 경제구조 개혁 강화를 전면에 내세웠다. 국유기업 개혁, 지방정부 부채 감축, 공급 과잉 산업에 대한 구조조정
      등을 밀어붙였다.하지만 7월 들어 경기 회복세가 다시 둔화되기 시작했다. 연초부터 시작된 부동산 가격 하락이 결정타였다. 중국은 지난해 말까지만 해도 급등하는 부동산 가격을 잡기 위해 노력했다. 올 들어선 주요
      도시의 부동산 가격이 전월 대비 하락세로 돌아서기 시작하더니 5월부터 전국으로 확산되기 시작했다.국가통계국 발표에 따르면 10월 중국 주요 70개 도시 중 69개 도시의 신규주택 가격이 전월 대비 하락세를 보였다.
      부동산 가격이 하락하자 고정자산 투자 증가세도 둔화됐고, 민간소비도 얼어붙기 시작했다.중국 정부는 9월을 기점으로 각종 경기 부양책을 내놓았다. 인민은행이 그 선봉에 섰다. 단기유동성지원창구(SLF), 담보보완대출(PSL),
      중기유동성지원창구(MLF) 등 각종 정책 수단을 이용해 9월 이후 약 1조5000억위안가량의 유동성을 시중에 풀었다. 하지만 이 같은 유동성 공급책은 만기가 정해져 있고, 중소기업과 농촌 등 특정 부문에만 자금을
      공급하는 것이어서 그 효과가 제한적일 수밖에 없었다.2008년 국내총생산(GDP) 대비 160%였던 총부채 규모가 지난 6월 251%로 단기 급증한 것도 적극적인 경기 부양을 망설이는 요인으로 작용했다. 인민은행은
      “이번 금리 인하가 통화정책 기조의 변화를 보여주는 게 아닌 중성적인 조정일 뿐”이라며 “안정적인 성장과 일자리 창출 및 민생에 큰 영향을 주는 중소기업의 융자비용을 낮추기 위한 것”이라고 설명했다. 하지만
      이번 대출 기준금리 인하 폭(-0.4%포인트)이 2008년 11월(-1.08%포인트) 이후 최대라는 건 중국 당국이 조급했음을 보여준다는 지적이다.월스트리트저널(WSJ)은 “중국 정부가 그동안 경기 둔화를 막기
      위해 산발적으로 벌여온 노력이 실패했음을 인정하는 것”이라고 평가했다. 블룸버그통신도 “중국 정부의 경제정책 방점이 구조 개혁에서 경기 부양으로 이동했음을 보여준다”고 분석했다.10월 3분기 경제성장률이 나왔을
      때만 해도 리커창(李克强) 중국 총리는 “중국 경제는 여전히 합리적인 구간에 있다”며 “연간 경제성장 목표치(7.5% 전후)는 달성할 수 있을 것”이라고 강조했다.하지만 10월 각종 실물경기 지표들이 9월보다
      더 나빠진 것으로 나오자 4분기 성장률이 7.2~7.3%까지 추락할 수도 있다는 관측이 확산됐다.자오상증권은 “금리 인하가 투자와 소비는 물론 부동산 경기 회복에 도움을 줄 것”이라며 “향후 더욱 잦은 금리
      인하가 이뤄질 수 있다”고 내다봤다.
    - 새 주인을 찾은 팬택이 부활의 시동을 걸었다. 인도네시아에 스마트폰 20만대를 수출하기 위해 막바지 협상을 벌이는 등 해외 사업에서 정상화의 실마리를 찾고 있다. 재정비를 거의 마무리한 팬택은 이르면 이번주
      신임 대표이사를 선임할 예정이다. 대표이사는 팬택 인수를 주도한 정준 쏠리드 대표와 문지욱 팬택 중앙연구소 소장(부사장)이 공동으로 맡을 것이란 전망이 나온다.○연내 수출 계약…내년 공급15일 전자 및 투자은행(IB)업계에
      따르면 팬택은 인도네시아 업체에 스마트폰 20만대를 수출하는 내용의 계약을 추진 중이다. 연내 계약을 마무리한 뒤 내년 5~6월 공급할 계획이다. 팬택 관계자는 “스마트폰은 단가 절감을 위해 중국 및 인도네시아
      현지 공장에서 주문자상표부착생산(OEM) 방식으로 제조할 것”이라며 “새로 출범하는 팬택의 첫 사업”이라고 말했다.팬택의 해외 사업이 예상보다 빠르게 진척되고 있는 것은 팬택의 새 주인인 쏠리드-옵티스 컨소시엄이
      인수가 확정되기 전부터 회사 회생을 위해 힘쓴 덕택이다. 쏠리드-옵티스 컨소시엄은 인도네시아 진출 추진 과정에서 전략적으로 팬택 인수를 결정했다. 스마트폰 수출을 위해 현지 업체와 접촉하는 등 여러 방면으로
      노력했다.팬택은 인도네시아 통신사 등과 협력해 현지 휴대폰, 통신장비, 사물인터넷(IoT) 등 전방위 모바일 시장을 공략한다는 전략이다. 인구 2억5000여만명의 인도네시아 통신시장은 2018년 아시안게임 개최를
      앞두고 급변하고 있다. 현재 75%를 차지하고 있는 2세대(2G) 이동통신 인프라를 내년부터 4G로 전환할 예정이어서 성장 잠재력이 크다.○이번주 ‘뉴 팬택’ 출범팬택 신설 법인은 이르면 이번주 공식 출범한다.
      작년 8월 법정관리(기업회생절차)에 들어간 팬택은 지난달 쏠리드-옵티스 컨소시엄에 팔렸다. 서울중앙지방법원은 이달 말 회생절차를 종결할 예정이다. 15개월 만에 법정관리를 졸업하는 것이다. 법원은 팬택을 팬택(신설
      법인)과 팬택자산관리(존속 법인)로 나눠 팬택은 신설 법인으로 출범시키고 팬택자산관리는 청산하기로 했다.신설 법인에서 정 대표는 대외적인 업무와 주요 의사결정을 담당할 예정이다. 문 대표는 스마트폰 등 모바일
      기기의 기획과 개발, 생산을 책임진다. 임직원 구조조정은 지난달 마무리했다. 약 500명이 남고 400여명이 회사를 떠났다.정 대표는 제4이동통신사업 진출도 추진 중인 것으로 알려졌다. 통신업계에 따르면 쏠리드는
      제4이동통신사업자 신청서를 제출한 퀀텀모바일 컨소시엄에 주주로 참여했다. 쏠리드는 비교적 탄탄한 재무구조를 갖추고 있어 사업권을 따내는 데 유리할 것이란 분석이 나온다. 자금력을 갖춘 대기업이 불참해 무산될
      것이란 관측이 있는 제4이동통신사업자 선정에 변수가 될지 관심이다. 통신업계 관계자는 “쏠리드는 중소업체면서도 안정적인 재무구조를 갖춘 기업”이라며 “제4이동통신사업권을 따면 최근 인수한 팬택의 사업에도 긍정적인
      영향을 미칠 것”이라고 말했다.
    - 어린이 ‘안전’에 초점을 맞춘 스마트밴드가 속속 출시되고 있다. 손목에 늘 차고 다니는 웨어러블 기기는 스마트폰보다 어린이들이 분실할 위험이 작다. 여기에 실시간 위치확인기능, 긴급상황 알림기능 등을 추가해
      부모가 자녀의 안전을 확인할 수 있도록 했다.LG전자는 9일 미취학 어린이와 초등학교 저학년을 대상으로 하는 스마트밴드 ‘키즈온’을 SK텔레콤과 LG유플러스를 통해 내놓았다. 어린이는 키즈온을 손목에 차고,
      부모는 스마트폰과 키즈온 기기를 연동하는 모바일 애플리케이션(앱)을 자신의 스마트폰에 설치하면 이용할 수 있다.어린이는 복잡한 전화번호를 누를 필요 없이 버튼 하나만 누르면 미리 등록된 보호자에게 전화를 걸
      수 있다. 보호자가 건 전화는 10초 이상 어린이가 받지 않으면 자동으로 통화가 시작된다.위성과 통신사 기지국, 와이파이 등의 네트워크를 통해 자녀 위치도 실시간으로 확인할 수 있다. 배터리 충전이 필요한 상황에도
      보호자에게 알림이 간다. 출고가는 15만4000원이다.앞서 지난 7일 SK텔레콤은 통신기기 전문기업 인포마크와 함께 개발한 ‘T키즈폰 준’을 내놓았다. 손목에 차거나 목걸이 형태로 걸 수 있는 이 기기는 부모가
      미리 등록한 30명과만 통화할 수 있다.
  - source_sentence: 1945년 8월 하순 당시 조만식이 있었던 도시는?
    sentences:
    - 박근혜 대통령은 여수 앞바다 기름 유출 사고 후 잇단 부적절한 발언으로 논란을 빚은 윤진숙 해양수산부 장관을 6일 전격 해임했다. 박근혜 정부가 출범한 이후 국무위원이 해임된 것은 처음이다. ▶관련기사 A9면민경욱
      청와대 대변인은 이날 긴급 브리핑을 통해 “박 대통령은 정홍원 국무총리의 해임 건의를 받고 윤 장관을 해임 조치했다”고 밝혔다. 민 대변인은 브리핑 직후 기자들과 만나 “정 총리는 국회 대정부 질문이 끝난 뒤
      총리 공관에서 윤 장관을 만나 해임 건의 방침을 결정한 것으로 알고 있다”며 “총리는 대통령에게 전화를 걸어 해임을 건의했고 박 대통령은 전화를 받자마자 해임을 결정했다”고 전했다. 정 총리는 앞서 국회 대정부
      질문 도중 해임 건의를 요구한 김도읍 새누리당 의원의 질의에 “깊이 고민해서 오늘 중으로 결론을 내겠다”고 답했다. 국회 답변 이후 2시간여 만에 ‘속전속결’식 해임이 이뤄진 것이다.청와대 관계자는 “국무총리가
      장관의 해임을 건의하고 대통령이 이를 수용한 것은 흔치 않은 케이스”라며 “그만큼 윤 장관의 발언에 대해 심각하게 받아들이고 있다는 의미”라고 설명했다. 총리 건의로 대통령이 장관을 해임한 것은 역대 두 번째다.
      고건 전 총리는 2003년 당시 최낙정 해양수산부 장관의 해임을 노무현 대통령에게 건의했고, 최 장관은 취임 14일 만에 낙마했다. 윤 장관은 전날 당정 협의에서 기름 유출 사고에 대해 “GS칼텍스가 1차 피해자이고
      어민이 2차 피해자”라고 말해 여론의 지탄을 받았다. 이에 앞서 지난 1일 기름유출 사고 발생 현장에서 주민들의 항의를 받으면서도 코를 막는 모습(사진)을 보여 비판을 받았다.
    - '테니스에서 럭키 루저로 본선에 합류할 선수를 결정하는 규정은 다음과 같다: 예선 마지막 회전에서 탈락한 모든 선수 중 ATP 랭킹(남자) 또는 WTA 랭킹(여자)이 높은 순서대로 럭키 루저로 결정될 우선권을
      갖는다. 드물게 예선 마지막 회전 탈락자 수보다 많은 기권자가 본선에서 나올 경우 예선 마지막 회전 이전 회전의 탈락자들 중 랭킹이 높은 순서대로 럭키 루저로 결정될 우선권을 얻는다.


      2005년 윔블던 예선 마지막 회전에서 미국의 저스틴 짐멜스톱과 스위스의 조르주 바스틀의 경기 당시, 예선 마지막 회전에서 랭킹이 가장 높은 선수였던 짐멜스톱은 예선 2회전에서 얻은 등 부위의 통증을 이유로
      바스틀과의 경기 시작 전에 미리 경기를 포기하기로 마음먹고 이를 의도적으로 상대 선수에게도 알렸다. 그는 기권하더라도 럭키 루저로 본선에 진출하게 될 것이 거의 확실했지만, 대회 운영위 측은 최소한 한 게임만이라도
      경기를 진행할 것을 요청했다(더불어 등 통증을 회복할 수 있는 시간도 제공했다). 짐멜스톱은 결국 본선에서 안드레 애거시가 기권함에 따라 럭키 루저로 본선에 진출, 본선 3회전까지 진출하여 오스트레일리아의 레이튼
      휴이트에게 패했다.


      럭키 루저로 본선에 진출하게 될 것을 미리 예상하고 예선 마지막 경기를 미리 포기해버린 짐멜스톱의 이러한 행동은 일반적으로 도덕적이지 못한 것으로 간주된다. 그러나 한편으로는 어떤 선수라도 그와 같은 상황에
      처한다면 무리해서 마지막 예선 경기를 뛸 이유가 없는 것이 사실이다. 다시 말해, 예선 마지막 회전에서 럭키 루저가 될 것이 거의 확실한 상위 랭킹의 선수는 상대 선수에게 의도적으로 져줄 가능성이 상존한다.
      여기에는 위의 사례에서와 같은 선수의 부상뿐만이 아니라, 개인적인 친분 관계는 물론 금품 거래까지 개입될 소지가 있다.


      이러한 일이 발생한 직후, 그랜드 슬램 대회에 새로운 규정이 도입되었다. 2006년부터 그랜드 슬램 대회 본선의 럭키 루저는 예선 마지막 회전에서 패한 최상위 랭킹 선수 4명 중에서 무작위로 추첨하여 뽑게 되었다.
      럭키 루저가 될 가능성이 불확실해짐에 따라 랭킹이 높은 선수도 예선 마지막 경기까지 최선을 다하게 되고, 이로써 예선의 경쟁을 마지막까지 치열하게 유지하려는 의도이다. 단, 이 규정은 다른 모든 대회에까지 적용되지는
      않는다.'
    - "조선인민공화국\n 그리하여 9월 6일에 '전국인민대표자회의'를 열고 박헌영이 건준을 「조선인민공화국」(약칭 인공)으로 변모시켰다 \n\n1945년 8월 하순, 여운형 등은 밀사 손치웅을 평양에 파견하여 조만식에게\
      \ 남으로 내려올 것을 권고하였다. 그러나 조만식은 '여운형에게 뜻은 함께 하겠으나 몸은 여기 남겠다.'며 사양하였다. 1945년 9월 7일 여운형은 미군정이 시작되기 전까지 지속되었던 조선인민공화국의 주석에\
      \ 선출된 이승만과 함께 부주석에 선출되었다. 9월 8일 미 24군단이 한반도 입성하고 군정을 선포하였을 때, 미군정장관 아널드는 오긍선을 만나는데, 오긍선은 한민당의 송진우를 소개해 주었다. 그리고 다음날\
      \ 9월 11일 한민당을 대표한 조병옥, 윤보선 등은 미 군정장관 등을 만나 인공은 \"일본과 협력한 한인집단\"에 의해 조직되었으며, 여운형은 \"한인들에게 잘 알려진 부일협력 정치인\"이라고 왜곡하여 주장하였다.\
      \ 이묘묵도 명월관에서 미군정 관리들에게 '여운형이 잘 알려진 친일파이며 인공은 공산주의적 경향이 있다.'고 왜곡하여 주장하였다 \n\n \n1945년 10월초, 여운형은 미 군정 사령관 존 하지와 첫 대면이\
      \ 이루어졌는데, 첫 대화내용은 다음과 같다.\n\n이러한, 존 하지의 왜곡된 선입견과 그 배경은 미군정 고문으로 위촉된 9명의 한국민주당들의 모함으로 밝혀지게 된다\n\n \n1945년 10월 20일, 미군정의\
      \ 주관하에 대대적인 환영행사 속에 이승만이 귀국하게 된다. 여운형은 이승만에게 찾아가 인공이 설립된 경로를 설명하고 인공 주석에 취임할 것을 요청하러 만났으나, 이승만은 침묵으로 답하고 이후 한국민주당과 함께\
      \ 손을 잡고 독자적인 행보를 걷게 된다.\n이어 1945년 11월 3일, 대한민국 임시정부의 환국 때 그는 중경 임시정부 요인들을 맞아주었으나, 충칭 임시정부만을 추대하자는 내용인 '임정 정통론' 추대에는\
      \ 반대하였다. \n\n귀국한 대한민국 임시정부 요인 중 김원봉과 장건상, 김성숙 등이 그를 찾아온다. 이들과의 면담에서 여운형은 호쾌한 성격과 달변으로 이들을 매료시켜, 김원봉 등을 좌파 진영으로 영입하게\
      \ 된다."
  - source_sentence: 쿠팡이츠 프로모션으로 제일제면소 음식을 2만원 이상 배달시켰을 때 받을 수 있는 상품은?
    sentences:
    - CJ푸드빌이 운영하는 별미국수 전문점 제일제면소가 성큼 다가온 가을을 맞이해 가을 별미국수 2종을 출시한다고 밝혔다. 이번 콘셉트는 ‘가을 향 그대로 담은 별미 국수’로 쌀쌀한 날씨에 따뜻하게 즐길 수 있는
      칼국수와 입맛을 돋우는 비빔국수 총 2종을 출시한다. ‘가을송이 불고기칼국수’는 향긋한 송이버섯과 노릇하게 구운 불고기를 고명으로 올린 감칠맛 가득한 고기 육수의 가을 특선 칼국수다. 송이버섯은 항산화 작용
