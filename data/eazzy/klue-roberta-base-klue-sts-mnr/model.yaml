      쪽파 등 총7가지 고명이 조화롭게 어우러져 다양한 식감과 맛을 즐길 수 있다. 신메뉴와 함께 먹으면 더욱 든든한 ‘별미 요리 메뉴’도 선보인다. ‘새우강정’은 통통한 새우를 바삭하게 튀겨낸 후 쌀떡, 꽈리고추와
      새콤달콤 칠리 소스에 버무렸다. 제일제면소의 인기메뉴인 씨앗닭강정을 잇는 강정 시리즈로 출시한다. 일부 매장에서는 프리미엄 전골인 ‘가을송이 한우국수전골’도 만날 수 있다. 진한 향의 송이버섯과 각종 버섯,
      질 좋은 한우를 제일제면소 특제 육수에 끓여 나오는 프리미엄 국수 전골이다. 서늘한 가을 날씨에 뜨끈하게 즐기기 제격이다. 신메뉴인 별미 국수 2종과 ‘새우강정’, ‘가을송이 한우국수전골’은 모두 O2O 서비스로
