    - 미디어 생태계가 급변하고 있다. 최근 방송과 통신이 인터넷을 기반으로 융합되면서 각종 콘텐츠의 유통·소비 방식이 다변화하고 있다. 미디어 환경이 생산자에서 이용자 중심으로 변화함에 따라 인터넷TV(IPTV)
      등 양방향 텔레비전 서비스를 통한 주문형비디오(VOD) 이용도 증가하고 있다.인터넷과 모바일 중심의 콘텐츠도 속속 등장하고 있다. 가장 대표적인 콘텐츠가 웹드라마다. PC 웹과 모바일에서 소비되는 편당 10분
      정도 분량의 콘텐츠다. 올해만 해도 ‘후유증’ ‘러브 인 메모리2’ ‘뱀파이어의 꽃’ ‘꿈꾸는 대표님’ ‘출중한 여자’ 등이 시청자를 만났다. 최근 종방한 ‘간서치열전’(사진)은 첫 편 공개 이후 130만건의
