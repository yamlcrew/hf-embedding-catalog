      최근 들어 기획 단계부터 웹드라마를 염두에 둔 작품이 늘고 있다. 그야말로 드라마 콘텐츠 시장에 새 바람이 불고 있는 셈이다.한 웹드라마 제작팀 관계자는 “드라마 방송의 활로가 제한적이다 보니 제작 여건을 갖춘
