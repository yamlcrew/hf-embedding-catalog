- source_sentence: Định nghĩa về tình trạng hiếm muộn
  sentences:
  - ' Những người sau điều trị ung thư có thể gặp các vấn đề về sức khỏe răng miệng, tùy thuộc vào các phương pháp điều trị
    mà họ nhận được: Hóa trị có thể ảnh hưởng đến men răng và làm tăng nguy cơ mắc các vấn đề răng miệng lâu dài. Liệu pháp
    xạ trị liều cao đến vùng đầu và cổ có thể làm thay đổi sự phát triển của răng. Nó cũng có thể gây ra bệnh nướu răng và
    sản xuất nước bọt thấp hơn, gây khô miệng. Thuốc steroid có thể làm tăng nguy cơ mắc các vấn đề về mắt như bong tróc mắt
    ảnh hưởng đến thị lực (đục thủy tinh thể). Để theo dõi các vấn đề này trong tương lai, người bệnh nên sắp xếp các cuộc
    hẹn thường xuyên với nha sĩ và bác sĩ nhãn khoa.'
  - ' Vắc xin phòng cúm

    : Khá nhiều cha mẹ băn khoăn liệu trẻ có cần vắc xin phòng cúm hay không, thì câu trả lời là có. Biến chứng của cúm ở
    trẻ dưới 5 tuổi thường nghiêm trọng, do đó để bảo vệ sức khỏe cho trẻ, cha mẹ nên đưa đi tiêm phòng cúm. Lịch tiêm cụ
    thể cha mẹ cần tham vấn với bác sĩ. Cha mẹ cần lưu ý virus cúm mỗi năm lại biến đổi, do đó trẻ cần được tiêm phòng hàng
    năm. Vắc xin phòng cúm Ngoài chế độ dinh dưỡng, trẻ 8 tháng cần 5mg kẽm nguyên tố/ngày để trẻ ăn ngon, đạt chiều cao và
    cân nặng đúng chuẩn và vượt chuẩn. Kẽm đóng vai trò tác động đến hầu hết các quá trình sinh học diễn ra trong cơ thể,
    đặc biệt là quá trình phân giải tổng hợp axit nucleic, protein... Các cơ quan trong cơ thể khi thiếu kẽm có thể dẫn đến
    một số bệnh lý như rối loạn thần kinh, dễ sinh cáu gắt,... Vì vậy cha mẹ cần tìm hiểu về

    Vai trò của kẽm và hướng dẫn bổ sung kẽm hợp lý cho bé

