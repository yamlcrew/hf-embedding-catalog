  widget:
  - source_sentence: Chấn thương phần mềm nghiêm trọng
    sentences:
    - ' Theo Đông y, bạc thau có tính mát, vị đắng, hơi cay và chua. Cây có tác dụng điều kinh, lợi tiểu, thanh nhiệt, cầm
      máu, thư cân hoạt lạc, tiêu đờm, nhuận phế, chỉ khái. Vậy

      Trong dân gian Việt Nam,

      thường được dùng để làm thuốc chữa

      kinh nguyệt không đều

      rong kinh

      , bí tiểu tiện, rát buốt, tiểu ít, màu nước tiểu đục. Ngoài ra,

      dùng trong điều trị lở ngứa, mụn nhọt, sát khuẩn, giải độc,

      viêm phế quản

      và sốt rét cũng rất hiệu quả. Người ta thường dùng tươi, giã nát ra đắp lên những nơi bị

      gãy xương

      hoặc đắp lên mụn nhọt cho hút mủ lên da non. Bên cạnh đó, người ta hay dùng bạc thau phơi khô để chữa ho đặc biệt là
      cho trẻ em. cây bạc thau chữa bệnh gì? bạc thau kinh nguyệt không đều , rong kinh bạc thau viêm phế quản gãy xương Ở
      Quảng Tây (Trung Quốc), bạc sau được dùng bằng cách lấy toàn cây để trị ho, nhức mỏi chân tay, viêm thận thuỷ thũng
      hay dùng ngoài trị độc do giang mai.'
    - '1.1. Định nghĩa Các bác sĩ cho biết những chấn thương phần mềm được gọi là nghiêm trọng khi: Vết thương phần mềm làm
      lộ gân, xương khớp, thần kinh và/hoặc mạch máu; Vết thương mất đoạn gân hoặc xương. 1.2. Hậu quả Tình trạng này nếu
      không được điều trị đúng cách sẽ có nguy cơ dẫn đến di chứng: Nhiễm trùng; – gân ,mạch máu, thần kinh,cơ... Hoại tử
      xương Biến dạng, co rút cơ quan vận động; Cứng khớp; Làm mất chức năng vận động của chi thể, ảnh hưởng lớn đến cuộc
      sống của người bệnh. 1.3. Điều trị Các biện pháp phù hợp thường được áp dụng đối với dạng chấn thương này là: Khâu da
      che phủ thì đầu (vết thương đơn giản không bị căng kéo); Ghép da tự thân; Xoay vạt da tại chỗ; có cuống mạch liền Chuyển
      vạt da rời có cuống mạnh rời (nối vi phẫu mạch máu). Chuyển vạt da Theo khuyến cáo của bác sĩ, quyết định khâu da thì
      đầu hay để hở hoặc chuyển vạt cơ che phủ các chấn thương là rất quan trọng. Điều này phụ thuộc rất nhiều vào trình độ
      chuyên môn của phẫu thuật viên.Đánh giá vết thương và xử lý vết thương theo thang tạo hình từ thấp tới cao tương ứng
      với độ phức tạp của vết thương.'
    - ' (CPP – Cerebral Perfusion Pressure) có mối liên quan mật thiết với

      . Áp lực tưới máu não được định nghĩa là hiệu số giữa áp lực động mạch trung bình (Mean Arterial Pressure - MAP) và
      áp lực nội sọ (ICP). Điều đó có nghĩa là: CPP = MAP - ICP. Áp lực động mạch trung bình là áp lực trung bình ở động mạch
      cảnh. MAP = (áp lực thì tâm thu + 2 áp lực thì tâm trương)/3.

      ở người bình thường là trên 50mmHg. Áp lực tưới máu não nên duy trì ở mức 70 - 80mmHg và áp lực nội sọ ở mức dưới 15mmHg.
      Áp lực tưới máu não áp lực nội sọ Áp lực tưới máu não Tình trạng tăng

      dẫn đến quá trình giảm áp lực tưới máu não và lưu lượng máu não, là nguyên nhân chính gây tử vong đối với các bệnh nhân
      bị chấn thương sọ não. Bởi vậy, việc duy trì áp lực tưới máu não ở một giá trị thích hợp trong thời gian nhanh nhất
      chính là một trong những yếu tố then chốt của hoạt động chăm sóc đặc biệt cho người bệnh, tránh hoại tử não ở bệnh nhân
      bị tăng

      , đặc biệt với người bị

      thường gặp trong tai nạn giao thông. áp lực nội sọ áp lực nội sọ chấn thương sọ não  Theo dõi mức

      và

      cho phép đánh giá chính xác những thay đổi áp lực và lưu lượng máu trong não, phục vụ tốt nhất cho quá trình chẩn đoán
      và điều trị ở các bệnh nhân bị

      chấn thương sọ não nặng

      , hôn mê,... áp lực nội sọ áp lực tưới máu não chấn thương sọ não nặng  Video đề xuất:   Khám sức khỏe định kỳ tại Vinmec:
      Bảo vệ bạn trước khi quá muộn!  XEM THÊM: Chức năng của dịch não tủy Chức năng của dịch não tủy Điều trị ở bệnh nhân
      tụ máu não do chấn thương sọ não Điều trị ở bệnh nhân tụ máu não do chấn thương sọ não Chấn thương sọ não: Nhận biết
      và điều trị thế nào? Chấn thương sọ não: Nhận biết và điều trị thế nào?    Thần kinh Điều chỉnh áp lực tưới máu não
      Chấn thương sọ não Điều chỉnh áp lực trong sọ Áp lực tưới máu não Dịch não tủy'
  - source_sentence: Định nghĩa về tình trạng hiếm muộn
    sentences:
    - ' Những người sau điều trị ung thư có thể gặp các vấn đề về sức khỏe răng miệng, tùy thuộc vào các phương pháp điều
      trị mà họ nhận được: Hóa trị có thể ảnh hưởng đến men răng và làm tăng nguy cơ mắc các vấn đề răng miệng lâu dài. Liệu
      pháp xạ trị liều cao đến vùng đầu và cổ có thể làm thay đổi sự phát triển của răng. Nó cũng có thể gây ra bệnh nướu
      răng và sản xuất nước bọt thấp hơn, gây khô miệng. Thuốc steroid có thể làm tăng nguy cơ mắc các vấn đề về mắt như bong
      tróc mắt ảnh hưởng đến thị lực (đục thủy tinh thể). Để theo dõi các vấn đề này trong tương lai, người bệnh nên sắp xếp
      các cuộc hẹn thường xuyên với nha sĩ và bác sĩ nhãn khoa.'
    - ' Vắc xin phòng cúm

      : Khá nhiều cha mẹ băn khoăn liệu trẻ có cần vắc xin phòng cúm hay không, thì câu trả lời là có. Biến chứng của cúm
      ở trẻ dưới 5 tuổi thường nghiêm trọng, do đó để bảo vệ sức khỏe cho trẻ, cha mẹ nên đưa đi tiêm phòng cúm. Lịch tiêm
      cụ thể cha mẹ cần tham vấn với bác sĩ. Cha mẹ cần lưu ý virus cúm mỗi năm lại biến đổi, do đó trẻ cần được tiêm phòng
      hàng năm. Vắc xin phòng cúm Ngoài chế độ dinh dưỡng, trẻ 8 tháng cần 5mg kẽm nguyên tố/ngày để trẻ ăn ngon, đạt chiều
      cao và cân nặng đúng chuẩn và vượt chuẩn. Kẽm đóng vai trò tác động đến hầu hết các quá trình sinh học diễn ra trong
      cơ thể, đặc biệt là quá trình phân giải tổng hợp axit nucleic, protein... Các cơ quan trong cơ thể khi thiếu kẽm có
      thể dẫn đến một số bệnh lý như rối loạn thần kinh, dễ sinh cáu gắt,... Vì vậy cha mẹ cần tìm hiểu về

      Vai trò của kẽm và hướng dẫn bổ sung kẽm hợp lý cho bé

      . Vai trò của kẽm và hướng dẫn bổ sung kẽm hợp lý cho bé Ngoài kẽm, cha mẹ cũng cần bổ sung cho trẻ các vitamin và khoáng
      chất quan trọng khác như lysine, crom, vitamin nhóm B,... giúp con ăn ngon, có hệ miễn dịch tốt, tăng cường đề kháng
      để ít ốm vặt. Hãy thường xuyên truy cập website

      Vinmec.com

      và cập nhật những thông tin hữu ích để chăm sóc cho bé và cả gia đình nhé. Vinmec.com  Bài viết tham khảo nguồn: mayoclinic.org
      và whattoexpect.com   Thực Phẩm bảo vệ sức khỏe LAMINKID I: Sản phẩm có công dụng bổ sung vi khoáng và vitamin cho cơ
      thể. Hỗ trợ tiêu hóa, tăng cường hấp thu thức ăn, giúp trẻ ăn ngon. Hỗ trợ nâng cao đề kháng cho trẻ, hỗ trợ giảm nguy
      cơ mắc bệnh do sức đề kháng kém như viêm đường hô hấp trên, cảm cúm.  Đối tượng sử dụng: - Trẻ biếng ăn, kém hấp thu
      thức ăn, trẻ gầy yếu, suy dinh dưỡng, chậm phát triển. - Trẻ có sức đề kháng kém, đang ốm hoặc vừa ốm dậy, trẻ hay mắc
      các bệnh viêm đường hô hấp trên, cảm cúm.   Chịu trách nhiệm về chất lượng sản phẩm: Công ty Cổ phần dược phẩm Elepharma
      Số 9, phố Trương Công Giai, tổ 17, Phường Dịch Vọng, Quận Cầu Giấy, Thành phố Hà Nội, Việt Nam (ĐT) 1800 6091; (E) info.elepharma@gmail.com
