  sentences:
  - ' Theo Đông y, bạc thau có tính mát, vị đắng, hơi cay và chua. Cây có tác dụng điều kinh, lợi tiểu, thanh nhiệt, cầm máu,
    thư cân hoạt lạc, tiêu đờm, nhuận phế, chỉ khái. Vậy

    Trong dân gian Việt Nam,

    thường được dùng để làm thuốc chữa

    kinh nguyệt không đều

    rong kinh

    , bí tiểu tiện, rát buốt, tiểu ít, màu nước tiểu đục. Ngoài ra,

    dùng trong điều trị lở ngứa, mụn nhọt, sát khuẩn, giải độc,

    viêm phế quản

    và sốt rét cũng rất hiệu quả. Người ta thường dùng tươi, giã nát ra đắp lên những nơi bị

    gãy xương

    hoặc đắp lên mụn nhọt cho hút mủ lên da non. Bên cạnh đó, người ta hay dùng bạc thau phơi khô để chữa ho đặc biệt là cho
    trẻ em. cây bạc thau chữa bệnh gì? bạc thau kinh nguyệt không đều , rong kinh bạc thau viêm phế quản gãy xương Ở Quảng
    Tây (Trung Quốc), bạc sau được dùng bằng cách lấy toàn cây để trị ho, nhức mỏi chân tay, viêm thận thuỷ thũng hay dùng
    ngoài trị độc do giang mai.'
  - '1.1. Định nghĩa Các bác sĩ cho biết những chấn thương phần mềm được gọi là nghiêm trọng khi: Vết thương phần mềm làm
    lộ gân, xương khớp, thần kinh và/hoặc mạch máu; Vết thương mất đoạn gân hoặc xương. 1.2. Hậu quả Tình trạng này nếu không
    được điều trị đúng cách sẽ có nguy cơ dẫn đến di chứng: Nhiễm trùng; – gân ,mạch máu, thần kinh,cơ... Hoại tử xương Biến
    dạng, co rút cơ quan vận động; Cứng khớp; Làm mất chức năng vận động của chi thể, ảnh hưởng lớn đến cuộc sống của người
    bệnh. 1.3. Điều trị Các biện pháp phù hợp thường được áp dụng đối với dạng chấn thương này là: Khâu da che phủ thì đầu
    (vết thương đơn giản không bị căng kéo); Ghép da tự thân; Xoay vạt da tại chỗ; có cuống mạch liền Chuyển vạt da rời có
    cuống mạnh rời (nối vi phẫu mạch máu). Chuyển vạt da Theo khuyến cáo của bác sĩ, quyết định khâu da thì đầu hay để hở
    hoặc chuyển vạt cơ che phủ các chấn thương là rất quan trọng. Điều này phụ thuộc rất nhiều vào trình độ chuyên môn của
    phẫu thuật viên.Đánh giá vết thương và xử lý vết thương theo thang tạo hình từ thấp tới cao tương ứng với độ phức tạp
    của vết thương.'
  - ' (CPP – Cerebral Perfusion Pressure) có mối liên quan mật thiết với

    . Áp lực tưới máu não được định nghĩa là hiệu số giữa áp lực động mạch trung bình (Mean Arterial Pressure - MAP) và áp
    lực nội sọ (ICP). Điều đó có nghĩa là: CPP = MAP - ICP. Áp lực động mạch trung bình là áp lực trung bình ở động mạch cảnh.
    MAP = (áp lực thì tâm thu + 2 áp lực thì tâm trương)/3.

    ở người bình thường là trên 50mmHg. Áp lực tưới máu não nên duy trì ở mức 70 - 80mmHg và áp lực nội sọ ở mức dưới 15mmHg.
    Áp lực tưới máu não áp lực nội sọ Áp lực tưới máu não Tình trạng tăng

    dẫn đến quá trình giảm áp lực tưới máu não và lưu lượng máu não, là nguyên nhân chính gây tử vong đối với các bệnh nhân
    bị chấn thương sọ não. Bởi vậy, việc duy trì áp lực tưới máu não ở một giá trị thích hợp trong thời gian nhanh nhất chính
    là một trong những yếu tố then chốt của hoạt động chăm sóc đặc biệt cho người bệnh, tránh hoại tử não ở bệnh nhân bị tăng

