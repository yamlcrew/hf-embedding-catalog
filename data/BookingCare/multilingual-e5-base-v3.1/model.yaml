      tư vấn dinh dưỡng cho bé tại:       nhi khoa Trẻ 8 tháng tuổi Vận động của trẻ LaminKid Trẻ mọc răng Dinh dưỡng của
      trẻ Nhận thức của trẻ Giấc ngủ của trẻ'
    - ' Hiếm muộn

      hiện đang là một gánh nặng của ngành y tế Việt Nam, ảnh hưởng đến khoảng 15-20% các cặp vợ chồng ở độ tuổi sinh sản.
      Theo tổ chức Y tế thế giới (WHO) quy định: hiếm muộn là bệnh lý của cơ quan sinh sản, một cặp vợ chồng được gọi là hiếm
      muộn khi không có khả năng có thai sau một năm chung sống trở lên, giao hợp đều đặn và không sử dụng

      nào. Với các cặp vợ chồng có người vợ trên 35 tuổi thì thời gian quy định là 6 tháng. Vì vậy, khi người vợ trên 35 tuổi,
      sau 6 tháng mong con nhưng vẫn không thể có thai được nên được khám và điều trị sớm. Tuy nhiên đối với những trường
      hợp, nguyên nhân hiếm muộn tương đối rõ ràng thì việc tính thời gian không còn được đặt ra. Hiếm muộn biện pháp tránh
      thai'
  - source_sentence: Chơi trò chơi đố chữ
    sentences:
    - ' Việc

      dạy trẻ nói

      sẽ trở nên hấp dẫn hơn nhiều khi nó được thực hiện thông qua một trò chơi. Trẻ ở lứa tuổi mới biết đi sẽ thích một trò
      chơi có tên "Đây là gì?" Khi đưa trẻ đến một môi trường mới - quán cà phê, sân bay hoặc chợ - hãy chỉ vào một thứ gì
      đó và hỏi trẻ, "Đây là gì?" Thách thức trẻ tìm ra tên chính xác. Để giúp trẻ không nản lòng, hãy bắt đầu với một vài
      đồ vật - một con mèo, một cái bánh quy – mà bố mẹ chắc chắn rằng trẻ đã biết. Sau đó, thỉnh thoảng lại lén nói một từ
      mới. Nếu trẻ không biết, hãy thì thầm câu trả lời và để trẻ hét lên. Sau đó, giới thiệu cho trẻ biết đồ vật đó là gì
      và nó hoạt động như thế nào. Ví dụ "Đó là một chiếc ô. Chúng ta sử dụng ô để khi trời mưa để không bị ướt." dạy trẻ
      nói  Những đứa trẻ ở độ tuổi lớn hơn sẽ đánh giá cao một trò chơi phức tạp hơn một chút có tên "Điều gì xảy ra tiếp
      theo?" Bắt đầu kể cho trẻ nghe một câu chuyện, và ngay khi cốt truyện bắt đầu đi lên cao trào, hãy yêu cầu trẻ kể cho
      bố mẹ nghe kết thúc của nó. Nếu trẻ không đủ vốn từ để tự mình trình bày cụ thể, bố mẹ có thể giúp con bằng cách đặt
      một số câu hỏi gợi ý như "Con có nghĩ con chó sói bỏ chạy không?" Một khi bố mẹ đã gợi ý một hướng cốt truyện, bố mẹ
      có thể hỏi trẻ để biết thêm suy nghĩ của chúng một cách chi tiết hơn như "Con nghĩ chú chó đã đi đâu?" hoặc "Ai đã đi
      cùng trẻ?"'
    - '  3.1 Tầm soát cho đối tượng hội chứng Lynch, có 02 nhóm Người có thân nhân thế hệ một (cha mẹ, anh em) đã bị ung thư
      đại-trực tràng trước tuổi 45. Các đối tượng này dễ bị ung thư gấp 10 lần người thường, Người có hơn 2 người thân thế
      hệ một bị bất kỳ ung thư nào. Các đối tượng này dễ bị ung thư gấp 6 lần người thường. Vì

      hay xảy ra từ tuổi 50 vì thế nên tầm soát ở độ tuổi này chúng ta có thể giảm tỷ lệ 50% ung thư và kéo dài thời gian
      sống hơn 12 tháng. Test nên dùng cho các đối tượng này là nội soi đại tràng. Nếu trong gia đình có người rất trẻ, dưới
      40 tuổi bị ung thư, nên tầm soát những người trong gia đình sớm hơn 10 năm và nên thực hiện kiểm tra nội soi đại tràng
      mỗi 5 năm. ung thư đại - trực tràng  3.1.1 Ung thư đại tràng không do polyp (Hereditary non-polyposis colon cancer:
      HNPCC) Loại ung thư này (hình 9) hay xảy ra trong gia đình và gây bệnh ở người trẻ, trước tuổi 45. Ngoài nội soi đại
      tràng cho những người thân trong gia đình mỗi 5 năm tính từ tuổi người mắc bệnh, cần thử DNA để so sánh với DNA của
      người thân đã bị ung thư trước đó. Các đối tượng trong gia đình này cần nội soi đại tràng, nội soi dạ dày, chụp nhũ
      ảnh, siêu âm vùng chậu và thử tế bào tử cung vì ngoài

      họ có thể bị ung thư dạ dày, ung thư vú, tử cung và buồng trứng. ung thư đại tràng   Đa polyp trong gia đình (Familial
      Adenomatous Polyposis: FAP) Loại bệnh này ít gặp hơn loại

      không do polyp nhưng sẽ diễn tiến thành ung thư đại tràng khi trên 50 tuổi, vì thế cần tầm soát tất cả người thân của
      bệnh nhân đã mắc bệnh này bắt đầu từ 10 tuổi, nội soi đại tràng chậu hông hoặc nội soi toàn bộ đại tràng. Nếu có bệnh
      FAP (hình 10), nên cân nhắc quyết định cắt toàn bộ đại tràng để phòng ngừa polyp hóa ác. ung thư đại tràng  Theo dõi
      sau cắt polyp ác tính: Những polyp đại trực tràng lớn hơn 1cm, không cuống, nghịch sản có nguy cơ hóa ác cao. Sau cắt
      polyp qua nội soi, cần theo dõi và nội soi kiểm tra định kỳ như sau: Mỗi 01 tháng trong 03 tháng đầu, trong năm thứ
      nhất. Mỗi 03 tháng trong 06 tháng kế tiếp, trong năm thứ nhất. Mỗi 06 tháng trong năm thứ hai. Mỗi năm, từ năm thứ 03
      đến năm thứ 05. Những tổn thương polyp ác tính, lịch nội soi kiểm tra tương tự như lịch theo dõi những ung thư đại trực
      tràng đã được phẫu thuật như: Xét nghiệm máu tìm chỉ điểm ung thư (CEA) 06 tháng sau mổ, trong 05 năm. Nội soi đại tràng
      kiểm tra 06 tháng sau mổ, trong năm thứ nhất. Nội soi đại tràng kiểm tra 01 năm sau mổ, trong năm thứ hai. Nội soi đại
      tràng kiểm tra 03 năm sau mổ, trong năm thứ ba về sau.  Theo dõi các bệnh viêm đại tràng Các bệnh

      viêm đại tràng

      gồm

      viêm loét đại tràng

      (hình 11) và bệnh

      Crohn

      gây phản ứng viêm trên hơn một nửa đại tràng và khiến bệnh nhân dễ bị ung thư gấp 10 lần người bình thường. viêm đại
      tràng viêm loét đại tràng Crohn Các tác giả khuyến cáo nếu viêm đại tràng trên 8 năm thì hàng năm nên nội soi đại tràng.
      Mục tiêu chính là phát hiện tổn thương tiền ung thư. Nếu có dị sản nặng do ít nhất 2 chuyên gia giải phẫu bệnh xác nhận
      thì nên cắt toàn bộ đại tràng để ngừa ung thư.'
    - 'Nếu ngã theo cơ thế chống tay hay sưng nề nhiều vùng cổ bàn tay nghi ngờ gãy xương thuyền cần đến các cơ sở y tế chuyên
      khoa để chẩn đoán kịp thời. được chẩn đoán bằng hỏi bệnh sử, khám thực thể, chụp Xquang cổ bàn tay. Trong một vài trường
      hợp thì phim Xquang chụp ngay sau chấn thương có vẻ bình thường và việc chẩn đoán có thể bị chậm sau 2-3 tuần chỗ gãy
      mới rõ trên Xquang. Cả chụp CT và MRI có thể có giá trị để đánh giá những điểm khác nhau của gãy xương thuyền. Chẩn
      đoán và điều trị sớm là quan trọng để có kết quả tối ưu. Gãy xương thuyền Những triệu chứng của gãy xương thuyền là:
      đau, sưng, ấn đau vùng cổ tay, không có biến dạng rõ ràng vì thế mà gãy xương thuyền có thể nhầm lẫn với bong gân cổ
      tay nên bác sĩ phải hỏi bệnh sử tỉ mỉ về cơ chế gãy chấn thương và cần phải khám lâm sàng thích hợp.'
  - source_sentence: Thiếu vi chất dinh dưỡng ảnh hưởng đến trẻ như thế nào?
    sentences:
    - '3.1 Thiếu vitamin A có vai trò quan trọng đối với trẻ nhỏ, giúp trẻ phát triển bình thường, tăng cường khả năng miễn
      dịch và bảo vệ giác mạc, da, niêm mạc. Đặc biệt, vitamin A còn có tác dụng phòng ngừa các bệnh nhiễm trùng như tiêu
      chảy, đường hô hấp, khô giác mạc và mù lòa. Nếu

      thiếu vitamin A

      trẻ sẽ dễ gặp các bệnh về mắt và tăng nguy cơ nhiễm trùng. Vitamin A thiếu vitamin A 3.2 Thiếu canxi và vitamin D  Thiếu
      vitamin D

      là nguyên nhân chính gây ra

      bệnh còi xương ở trẻ em

      , bởi vì thiếu vitamin D làm giảm hấp thụ canxi ở ruột, cơ thể sẽ huy động lượng canxi ở trong xương đi vào máu gây
      ra rối loạn quá trình khoáng hóa xương. Trẻ sẽ có những biểu hiện như quấy khóc, nôn trớ, ra mồ hôi trộm, rụng tóc,
      đầu to, thóp rộng, răng mọc chậm, chậm biết đi, biến dạng xương, lồng ngực dô,... Từ đó, làm giảm chiều cao của trẻ.
      Thiếu vitamin D ảnh hưởng đến hệ miễn dịch, sức đề kháng của trẻ. Trẻ dễ mắc các bệnh lý như viêm đường hô hấp trên,
      hay tái phát. Thiếu vitamin D bệnh còi xương ở trẻ em 3.3 Thiếu sắt  Sắt

      là một trong những thành phần của huyết sắc tố, tham gia vào quá trình vận chuyển oxy và hô hấp tế bào. Thiếu sắt dẫn
      tới thiếu máu và các bệnh viêm đường hô hấp, các bệnh nhiễm khuẩn ở trẻ. Thiếu sắt làm cho trẻ bị thiếu các dưỡng chất
      ảnh hưởng đến tăng trưởng và phát triển của cơ thể. Sắt 3.4 Thiếu iot Khi cơ thể trẻ thiếu i-ốt, tuyến giáp phát triển
      lớn và gây

      bệnh bướu cổ

      . Bên cạnh đó, trẻ thiếu i-ốt còn làm tăng nguy cơ chậm phát triển trí tuệ, chậm lớn, thiểu năng và đần độn. bệnh bướu
      cổ 3.5 Thiếu kẽm Kẽm là một trong những vi chất có vai trò quan trọng trong quá trình tăng trưởng và miễn dịch. Trẻ
      bị thiếu kẽm sẽ

      chậm lớn và giảm sức đề kháng, suy dinh dưỡng và chậm phát triển chiều cao. biếng ăn , Tóm lại, vi chất dinh dưỡng là
      những chất chỉ chiếm một lượng nhỏ trong cơ thể nhưng đóng vai trò rất quan trọng trong tăng trưởng, duy trì và nâng
      cao sức khỏe, phát triển trí tuệ,... Thiếu vi chất là tình trạng thường gặp ở trẻ nhỏ ảnh hưởng đến sự phát triển của
      trẻ. Do vậy, khi trẻ có những biểu hiện thiếu vi chất dinh dưỡng thì cha mẹ hãy đưa trẻ đến ngay cơ sở y tế để được
      kiểm tra. Ngoài ra cha mẹ cũng nên cho trẻ khám định kỳ nhằm phát hiện sớm tình trạng thiếu vi chất ở trẻ.    Thiếu
      vi chất dinh dưỡng LaminKid Suy dinh dưỡng Vi chất dinh dưỡng Chậm phát triển chiều cao Chậm phát triển trí tuệ'
    - ' Bất kỳ ai bị tiểu đường đều có nguy cơ cao mắc hôn mê do tiểu đường, tuy nhiên những yếu tố dưới đây được xem là các
      nguy cơ hàng đầu dẫn đến tình trạng này, bao gồm: Nếu bạn đang sử dụng máy bơm insulin, bạn cần phải kiểm tra thường
      xuyên lượng đường trong máu của mình. Việc cung cấp insulin có thể dừng lại nếu máy bơm bị lỗi hoặc ống thông bị xoắn
      hay rơi ra khỏi vị trí. Khi bị thiếu hụt insulin có thể dẫn đến tình trạng nhiễm toan ceton do tiểu đường.  Vấn đề về
      cung cấp insulin: Khi cơ thể bị ốm hoặc gặp phải chấn thương sẽ khiến cho lượng đường trong máu của bạn có xu hướng
      tăng cao đột ngột. Điều này có thể gây ra nhiễm toan ceton do tiểu đường nếu bạn bị bệnh tiểu đường loại 1 và không
      tăng liều insulin để bù đắp cho lượng bị thiếu hụt. Một số tình trạng sức khoẻ khác, chẳng hạn như bệnh thận hoặc

      suy tim sung huyết

      , cũng có thể làm tăng nguy cơ mắc hội chứng tăng áp lực thẩm thấu bệnh tiểu đường (hyperosmolar).  Bệnh tật, chấn thương
      hoặc phẫu thuật: suy tim sung huyết Nếu bạn không theo dõi thường xuyên lượng đường trong máu hoặc dùng thuốc không
      theo chỉ dẫn của bác sĩ, bạn sẽ có nguy cơ cao mắc các biến chứng tiểu đường lâu dài, thậm chí là hôn mê do tiểu đường.  Bệnh
      tiểu đường không được kiểm soát tốt: Đôi khi những người mắc bệnh tiểu đường cũng có thể gặp phải chứng

      rối loạn ăn uống

      chọn không sử dụng insulin theo chỉ dẫn với mong muốn có thể giảm cân. Đây là một hành động khá nguy hiểm, đe dọa đến
      tính mạng và làm tăng nguy cơ hôn mê do tiểu đường.  Cố ý bỏ bữa hoặc không dùng insulin: rối loạn ăn uống Rượu là một
      trong những yếu tố có thể tác động khó lượng đến lượng đường trong máu của bạn. Tác dụng an thần của rượu có thể khiến
      bạn khó nhận biết được khi nào mình đang gặp phải các triệu chứng của hạ đường huyết. Điều này cũng sẽ làm tăng nguy
      cơ hôn mê do tiểu đường.  Uống nhiều rượu: Một số loại thuốc bị cấm sử dụng, chẳng hạn như

      cocaine

      hoặc thuốc lắc, có thể làm tăng nguy cơ lượng đường trong máu cao ở mức nghiêm trọng và các tình trạng khác liên quan
      đến hôn mê do tiểu đường.  Sử dụng các loại thuốc bất hợp pháp: cocaine'
    - ' Việc lạm dụng hoặc sử dụng không đúng các sản phẩm giải độc gan có thể để lại một số tác dụng không mong muốn, khiến
      cho tình trạng bệnh lý ở gan nặng hơn cũng như gây ra các tác dụng phụ toàn thân, nặng hơn có thể dẫn đến

      suy gan

      , đe dọa tính mạng. Do đó, không nên tự ý sử dụng các loại thuốc hoặc thực phẩm chức năng giải độc gan nếu không có
      hướng dẫn, chỉ định của bác sĩ. suy gan Một số bệnh nhân mắc các bệnh lý gan mật tự ý dùng các thuốc giải độc gan đơn
      thuần với hy vọng điều trị được bệnh. Đây là quan điểm sai lầm bởi vì gan bị nhiễm độc là do nhiều nguyên nhân khác
      nhau. Điều quan trọng là phải tìm được nguyên nhân mới hy vọng điều trị bệnh hiệu quả. Thực tế là các thuốc giải độc
      gan chỉ hỗ trợ điều trị tổn thương gan chứ không tác dụng trực tiếp đến nguyên nhân bệnh. Do đó, các sản phẩm giải độc
      gan không thể thay thế điều trị y khoa. Phương pháp dân gian giải độc gan được truyền miệng từ xa xưa không phải đều
      phù hợp với tất cả bệnh nhân. Tác dụng và hiệu quả còn tùy thuộc vào cơ địa từng người, bệnh cảnh cụ thể, cũng như liều
      lượng, cách dùng, cách bảo quản,... Việc sử dụng tùy tiện các loại cây thuốc nam không những không mang lại hiệu quả
      điều trị mà còn có thể ảnh hưởng đến sức khỏe người bệnh. Một số người bệnh

      nghiện rượu

      bia tỏ ra chủ quan khi dùng thuốc giải độc gan vì cho rằng mỗi khi đã sử dụng thuốc giải độc gan thì có thể uống bao
      nhiêu bia, rượu cũng được. Điều này hoàn toàn sai lầm vì thuốc giải độc gan không thể hỗ trợ điều trị khi nguyên nhân
      không được giải quyết. nghiện rượu'
  - source_sentence: Có cách nào để cải thiện môi trường làm việc độc hại không?
    sentences:
    - ' Chấn thương đầu, cổ, tủy sống rất nguy hiểm vì có thể gây mất vận động (liệt),

      hôn mê

      và tử vong.

      Chấn thương tủy sống

      là nguyên nhân tổn thương thần kinh và gây ra

      khó thở

      . hôn mê Chấn thương tủy sống khó thở  Người bệnh bị chấn thương đầu, cổ, tủy sống cần được vận chuyển hết sức thận
      trọng. Bởi bất cứ vận động nào không phù hợp cũng có thể làm chấn thương nặng thêm như liệt tay hoặc chân. Nếu người
      bệnh không tỉnh, cần thực hiện hỗ trợ sự sống cơ bản.'
    - ' Quá trình mang thai bị tê tay chân là hiện tượng phổ biến thường gặp. Nếu ở mức độ nhẹ thì bệnh chỉ gây ảnh hưởng
      đến sinh hoạt hằng ngày. Nhưng nếu như tình trạng tê tay chân diễn ra liên tục và kèm theo các chứng

      chóng mặt

      , khó nhấc tay chân, co cơ,... cần nghĩ đến dấu hiệu của một bệnh lý khác. chóng mặt Lúc này, bạn cần tới các cơ sở
      y tế uy tín gần nhất để được thăm khám chuyên sâu và có hướng điều trị phù hợp.'
    - ' Tương tự như chất độc trong không khí,

      có thể gây hại cho sức khỏe tinh thần và thể chất của người lao động. Nếu bạn tiếp tục làm việc quá lâu, nó có thể dẫn
      đến mức độ căng thẳng cao, lòng tự trọng bị tụt giảm và bệnh lý trầm cảm. môi trường làm việc độc hại Nếu sự vấn đề
      đến từ lãnh đạo hoặc tư duy của công ty, bạn sẽ không thể làm được gì nhiều để cải thiện, tuy nhiên nếu vấn đề chỉ đến
      từ 1 hoặc 2 người, bạn có thể thảo luận với người quản lý đáng tin cậy hoặc nói chuyện với bộ phận nhân sự (HR). Sau
      đó, công ty có thể thuê trợ giúp từ bên ngoài như thông qua chương trình hỗ trợ nhân viên (EAP) để giúp giải quyết vấn
      đề. Nếu không có sự lựa chọn nào ngoài việc ở lại lúc này, hãy thử đặt mình vào một vỏ bọc nhỏ, cố gắng tránh mọi thị
      phi và giữ an tĩnh cho riêng mình. Tập trung vào các mục tiêu bên ngoài công việc và bắt đầu lập kế hoạch để thoát ra
      ngoài.'
