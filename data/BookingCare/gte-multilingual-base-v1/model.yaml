widgetData:
- source_sentence: Hàng ngày, tôi uống thuốc huyết áp hỗ trợ điều trị viêm gan do gan nhiễm mỡ thì có thể tiêm vaccine Covid-19
    được không? Nếu tiêm vaccine có phải ngưng uống thuốc gì không?
  sentences:
  - Nếu huyết áp sau điều trị ổn định ở mức huyết áp tối thiểu <90 mmHg và huyết áp tối đa <140 mmHg thì Anh/Chị có thể tiêm
    tại các cơ sở đủ điều kiện tiêm chủng. Nếu huyết áp của Anh/Chị ở mức cao hơn thì Anh/Chị cần tiêm vaccine tại bệnh viện
    hoặc cơ sở đủ năng lực hồi sức cấp cứu ban đầu theo quy định của Bộ Y tế. Đồng thời, khi tiêm vắc xin, Anh/Chị vẫn duy
    trì uống thuốc điều trị của mình và không cần ngưng thuốc.
  - Với tình trạng xét nghiệm của anh/chị thì bác sĩ có chẩn đoán là bệnh lý gì gây nên tình trạng xét nghiệm máu có các chỉ
    số cao hơn và thấp hơn so với bình thường không ạ? Anh/chị nên có kết quả chẩn đoán của bác sĩ khám bệnh để bác sĩ tư
    vấn có tiêm phòng được/tạm hoãn/chống chỉ định tiêm phòng vaccine Covid-19.
  - Những triệu chứng như bạn mô tả cũng thường xuất hiện ở người bị thiếu máu. Để chẩn đoán chính xác có bị thiếu máu hay
    không và mức độ thiếu máu, bạn chỉ cần xét nghiệm công thức máu. Xét nghiệm công thức máu cho kết quả nhanh, chi phí hợp
    lý và mọi cơ sở y tế đều có thể làm được. Bạn nên tới cơ sở y tế để xét nghiệm để rõ chẩn đoán.
- source_sentence: Tổn thương dây chằng điều trị như thế nào?
  sentences:
  - Dấu hiệu ban đỏ tím xuất hiện dạng mạch máu ở chân, tăng về mùa đông có thể là triệu chứng của hội chứng Raynaud hoặc
    viêm mạch. Tuy nhiên, các triệu chứng mà bạn mô tả không rõ ràng và đặc hiệu cho bệnh cụ thể nào, vì vậy việc nhận định
    tổn thương da do nguyên nhân gì và lựa chọn phương pháp điều trị cần được dựa trên đánh giá của bác sỹ chuyên môn Dị ứng
    miễn dịch.
  - Đầu gối đứng lên ngồi xuống kêu lụp cụp và nặng dây chằng bên trong đầu gối phải. Bạn cần đến khám với bác sĩ chuyên khoa
    để kiểm tra đánh giá thực tế tình trạng tổn thương từ đó đưa ra hướng xử trí và tư vấn phù hợp nhất.
  - Chụp cộng hưởng từ (MRI) không chống chỉ định với lứa tuổi của bạn. Trước khi thực hiện chụp MRI, bệnh viện sẽ có những
    tư vấn an toàn cộng hưởng từ. Chống chỉ định MRI chủ yếu ở các bệnh nhân có cấy ghép các bộ phận kim loại.
- source_sentence: Đã bị viêm gan B có thể tiêm phòng nữa không?
  sentences:
  - Viêm gan B là bệnh do virus HBV gây ra, nếu tình trạng nhiễm trở nên mãn tính thì điều quan trọng cần làm là ngăn chặn
    và giảm thiểu tổn hại cho gan. Nếu được điều trị đúng cách thì tiên lượng bệnh thường rất tốt. Tuy nhiên, không phải lúc
    nào cũng phải điều trị ngay bằng các thuốc kháng virus mà cần theo dõi và xét nghiệm đánh giá tình trạng gan cũng như
    cơ thể để việc điều trị đạt được hiệu quả cao nhất. Việc cần làm của bạn là nên theo dõi và khám gan định kỳ, hạn chế
    các gắng sức quá mức, bổ sung dinh dưỡng và hạn chế tiêu thụ các chất gây hại cho gan. Nhiều người thắc mắc bị viêm gan
    B có tiêm phòng được không, trên thực tế, nếu kết quả xét nghiệm đưa ra HBsAg dương tính đồng nghĩa với việc đã nhiễm
    virus viêm gan B thì việc tiêm ngừa sẽ không còn hiệu quả. Vắc-xin phòng viêm gan B chỉ có tác dụng với những người chưa
    từng mắc viêm gan B. Nếu người bệnh xét nghiệm máu phát hiện đang nhiễm virus viêm gan B (HBsAg dương tính) thì nên thực
    hiện tiếp các xét nghiệm chuyên sâu để theo dõi tình trạng và diễn biến của bệnh, không cần tiêm phòng vắc-xin.
  - Trường hợp bé rụng rốn nhưng chưa khô rốn bạn nên sát khuẩn cho bé bằng cồn trắng 70 độ. Ngoài ra bạn nên chú ý vệ sinh
    rốn cho con sạch sẽ, tránh để rốn nhiễm trùng.
  - Bạn bị nhiễm Covid, đang cách ly tại nhà và có triệu chứng có đờm ở cổ họng, nghẹt mũi thì bạn bị nhiễm Covid 19 mức độ
    nhẹ. Điều trị cần dùng thuốc điều trị triệu chứng như súc họng bằng nước súc họng và uống thuốc long đờm, nhỏ thuốc nhỏ
    mũi 2 - 3 lần/ ngày. Theo dõi nhiệt độ và tần số thở, spO2. Nếu thở nhanh hơn 20 lần/phút, spO2 giảm hơn 93% cần liên
    hệ y tế địa phương để được hướng dẫn đến bệnh viện theo dõi điều trị tiếp.
- source_sentence: Có tiền sử bệnh thận nếu mang thai ảnh hưởng gì không?
  sentences:
  - Ông bạn đã 85 tuổi, bị tai biến mạch máu não thể nhồi máu não (có cục máu đông trong não) mới bị được 2 tuần nên việc
    điều trị còn nhiều rủi ro. Hiện giờ tốt nhất ngoài việc dùng thuốc tại bệnh viện (hoặc tại nhà) cần kết hợp tập phục hồi
    chức năng, hạn chế các yếu tố nguy cơ để tránh bị trở lại. Đây là việc làm đòi hỏi sự kết hợp cả bác sĩ, bệnh nhân và
    sự hỗ trợ của người nhà. Sự kiên trì, động viên khích lệ để bệnh nhân chịu khó tập luyện thì mới có thể thành công.
  - Vợ bạn có tiền sử viêm cầu thận và đã khỏi cách đây 16 năm tuy nhiên sau khi khỏi không biết có định kỳ khám kiểm tra
    chức năng thận và phân tích nước tiểu không. Các trường hợp tổn thương thận mạn tính (bệnh thận mạn) đôi khi chỉ thể hiện
    thay đổi ở phân tích nước tiểu mà không có triệu chứng lâm sàng. Các trường hợp bệnh thận mạn tính này thường sẽ nặng
    lên hoặc thể hiện rõ hơn khi mang thai. Trường hợp của vợ bạn nên được theo dõi bởi chuyên khoa thận trong suốt quá trình
    mang thai và cả sau sinh nữa.
  - Việc đang mang thai khiến cho bà mẹ có nguy cơ mắc Covid-19 cao nếu phơi nhiễm với virus SARS-CoV-2. Sau khi tiêm vaccine
    Covid-19, ngoài việc theo dõi các phản ứng của vaccine, cơ thể cần 2-3 tuần để đáp ứng với vaccine sinh được kháng thể
    miễn dịch. Theo hướng dẫn mới nhất của Bộ Y tế phụ nữ đang mang thai cần hoãn tiêm trong đợt này. Do đó tùy theo kế hoạch
    dự định của chị, chị có thể chủ động cân nhắc lợi ích và nguy cơ. Nếu hoãn lại việc mang thai thì chị nên hoàn thành phác
    đồ tiêm chủng vaccine Covid-19 AstraZeneca gồm 2 mũi trước khi mang thai ít nhất một tháng.
- source_sentence: Tăng bạch cầu có ảnh hưởng gì tới viêm lợi không?
  sentences:
  - Bé nhà bạn ngoài hay bị nhiệt, viêm lợi ra thì còn có vấn đề sức khỏe nào khác không?Cháu đã uống thuốc gì để điều trị
    nhiệt, viêm lợi ?Bạch cầu của cháu tăng có thể do nhiều nguyên nhân, thường gặp là do viêm nhiễm hoặc do dùng một số loại
    thuốc. Bạn nên đưa bé đến khám để được chẩn đoán tốt hơn.
  - Bạch cầu mono là một loại bạch cầu có chức năng bảo vệ cơ thể thông qua cơ chế thực bào. Khoảng tham chiếu ở bệnh viện
    đa khoa quốc tế Vinmec Times City là 0,3-0,9G/L. Trong kết quả xét nghiệm bạch cầu mono 2,2 của em chưa rõ đơn vị tính
    là G/L hay % nên bác sĩ không tư vấn rõ hơn cho em được, em tự đối chiếu nhé.
  - Điều trị phẫu thuật và làm xét nghiệm mô bệnh học là phương pháp điều trị các khối u tuyến nước bọt tốt nhất. Phẫu thuật
    khối u tuyến nước bọt mang tai phụ thuộc vào loại, kích thước, tính chất khối u. Theo đó, phẫu thuật có thể tiến hành
    loại bỏ một phần hoặc loại bỏ toàn bộ tuyến nước bọt và có hoặc không kèm theo loại bỏ các hạch bạch huyết, dây thần kinh
    có liên quan.Bên cạnh đó còn có phương pháp phẫu thuật tái tạo, nghĩa là sau khi phẫu thuật để loại bỏ khối u, bác sĩ
    có thể đề nghị phẫu thuật tái tạo để sửa chữa khu vực. Trong quá trình phẫu thuật tái tạo, bác sĩ phẫu thuật làm việc
    để sửa chữa cải thiện khả năng nhai, nuốt, nói hoặc thở, có thể cần ghép da, mô hoặc dây thần kinh từ các bộ phận khác
    của cơ thể để xây dựng lại các khu vực trong miệng, cổ họng hoặc hàm của bệnh nhân.Vì không có thông tin về chẩn đoán
    của em trước mổ, tính chất (mềm hay cứng, đau hay không đau, có xâm lấn hay không...) và kích thước khối u, phương pháp
    phẫu thuật, thời gian phẫu thuật bao lâu rồi, em đã thăm khám lại với bác sĩ mổ cho mình hay chưa. Nên chưa thể kết luận
    liệt dây thần kinh 9,10 sau mổ u tuyến nước bọt có khả năng phục hồi khôngTuy nhiên, bác sĩ có một vài lời khuyên dành
    cho em:Tái khám đúng lịch để theo dõi tiến triển của khối u cũng như khả năng tái phát của khối u sau điều trị. Đồng thời
    bác sĩ sẽ đánh giá mức độ tổn thương thần kinh, kết hợp khám chuyên khoa Vật lý trị liệu- Phục hồi chức năng để tập luyện
    chức năng nói, nuốt.Xét nghiệm thường xuyên theo chỉ định của bác sĩBổ sung dinh dưỡng và uống nhiều nước.
