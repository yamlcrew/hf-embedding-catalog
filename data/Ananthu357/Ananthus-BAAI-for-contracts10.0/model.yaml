  - What determines the completion of performance of the contract?
- source_sentence: Early completion bonus
  sentences:
  - In case of ambiguity, order of precedence shall be referred.
  - Contractor shall be entitled for a bonus of 1% for each 30 days early completion of work.
  - "The Railway shall have the right to let other contracts in connection with the works. The Contractor shall afford other\
    \ Contractors reasonable opportunity for the storage of their materials and the execution of their works and shall properly\
    \ connect and coordinate his work with theirs. If any part of the Contractor\x92s work depends upon proper execution or\
    \ result upon the work of another Contractor(s), the Contractor shall inspect and promptly report to the Engineer any\
    \ defects in such works that render it unsuitable for such proper execution and results. The Contractor's failure so-to\
    \ inspect and report shall constitute an acceptance of the other Contractor's work as fit and proper for the reception\
    \ of his work, except as to defects which may develop in the other Contractor's work after the execution of his work."
- source_sentence: Out of scope works
  sentences:
  - 'as to execution or quality of any work or material, or as to the measurements of the works the decision of the Engineer
    thereon shall be final subject to the appeal (within 7 days of such decision being intimated to the Contractor) to the
    Chief Engineer '
  - Should works over and above those included in the contract require to be executed at the site, the Contractor shall have
    no right to be entrusted with the execution of such works which may be carried out by another Contractor or Contractors
    or by other means at the option of the Railway.
  - What is the order of precedence in the case of ambiguity between drawings and technical specifications?
- source_sentence: Deadline
  sentences:
  - shall be read in conjunction with the Standard General Conditions of Contract which are referred to herein and shall be
    subject to modifications additions or suppression by Special Conditions of Contract and/or Special Specifications, if
