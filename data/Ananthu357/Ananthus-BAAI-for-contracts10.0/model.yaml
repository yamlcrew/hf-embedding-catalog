  - the sand, stone, clay ballast, earth, trees, rock
  - not later than 30 days after the date of receipt
- source_sentence: Can the stones/rocks/bounders obtained during excavation be used for construction if found technically
    satisfactory?
  sentences:
  - use the same for the purpose of the works either free of cost or pay the cost
  - Any material found during excavation should be reported to the engineer.
  - No certificate other than Maintenance Certificate, if applicable, referred to in Clause 50 of the Conditions shall be
    deemed to constitute approval
