name: Update HF Embedding Catalog

on:
  schedule:
    # Every day at 03:00 UTC
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      max_list:
        description: "Max models to list per pipeline tag (0 = all)"
        required: false
        default: "0"
      limit:
        description: "Max stale models to (re)fetch this run (0 = all stale)"
        required: false
        default: "0"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run catalog fetch
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          # Stop the fetch gracefully at 100 min so the remaining ~20 min of the
          # 120-min job budget is left for writing the catalog + commit + push.
          # Without this the runner hard-kills Python at the job timeout and the
          # whole run's work is lost (no catalog written, nothing committed).
          MAX_RUNTIME_MIN: "100"
        run: |
          MAX_LIST="${{ github.event.inputs.max_list || '0' }}"
          LIMIT="${{ github.event.inputs.limit || '0' }}"

          ARGS=""
          if [ "$MAX_LIST" = "0" ]; then
            ARGS="$ARGS --all"
          else
            ARGS="$ARGS --max-list $MAX_LIST"
          fi
          if [ "$LIMIT" != "0" ]; then
            ARGS="$ARGS --limit $LIMIT"
          fi

          echo "Running: python fetch_catalog.py $ARGS"
          python fetch_catalog.py $ARGS

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add --force data/ catalog.yaml catalog.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            STATS=$(git diff --cached --stat | tail -1)
            git commit -m "chore: update catalog $(date -u +%Y-%m-%d) — $STATS"
            git push
          fi
